body:
  text: 卷之五十一自汗門病機內經自汗論內經曰汗者心之液陽加於陰謂之汗又云勞則氣耗喘且汗出飲食飽甚汗出於胃驚而奪精汗出於心持重行遠汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾原病式曰心熱則汗出東垣曰西南坤土也在人則為脾胃夫人之汗猶天地之雨陰滋其濕則為霧露為雨也心為君火主熱脾胃屬土主濕濕熱相搏為汗明矣經云衛氣者所以溫分肉充皮毛肥腠理司開闔者也又曰陽氣者衛外而為固者也是以體虛之人或為風暑濕邪所幹遂使分肉不溫皮毛不充腠理不密開闔不固則陽氣外泄而汗為之出也又曰氣虛則多寒雖見熱中蒸蒸為汗終傳大寒知始為熱中表虛亡陽不任外寒中傳寒中多成痹寒矣汗為心腎俱虛陰陽偏勝所致心之所藏在內者為血發外為汗差汗乃心之液而自汗之證未有不由心腎俱虛而得之故陰虛陽必湊發熱而自汗陽虛陰必乘發厥而自汗皆陰陽偏勝所致也自汗陽虛自汗者無時而濈濈然出動則為甚屬陽虛腠理不固胃氣之所司也故經云陽氣有餘為身熱無汗人以衛氣固其表衛氣不固則表虛自汗而津液為之發泄也自汗屬氣虛濕熱汗為心液心火不蒸則液不出脾濕下流何汗之有惟火鬱蒸津液上騰如霧衛氣不固則泄出而為汗也所以治汗專務固表之劑而弗效者殊不知心火不靜脾濕不降如之何其遏也智者審之脈候脈來微而澀濡而虛而弱者皆主自汗也脈大而虛浮而軟者自汗也傷寒陰陽俱緊當無汗若自汗者曰亡陽不治治法治自汗當清心火和胃氣實腠理三者兼之汗出於心熱之所致汗出於脾濕氣上騰汗泄於膚衛氣不固所以清心則液榮於內而為血和胃液周流而不騰實腠理則衛氣充而液不泄知斯三者治汗畢矣治自汗與盜汗不同自汗陽虛治當補氣以衛外盜汗陰虛治當滋陰以榮內衛者陽氣榮者陰血治陽者人參黃耆防風桂枝之類是也治陰者當歸地黃黃柏黃精之類是也治自汗用人參黃耆少佐桂枝防風達表故云黃耆得防風而力愈大陽虛者亦可少加附子以行參耆之功火氣上蒸胃中濕氣亦能作汗宜涼膈散心火不寧煩躁出汗者安神丸清心湯之類痰飲留膈而亦能作汗宜加二陳湯硃砂滾痰丸之類不治證汗出發潤一不治也汗出如油二不治也汗出如珠三不治也君子見機辨之不可不早藥方仲景桂枝湯治病人發熱自汗此胃氣不和或傷風惡風脈浮自汗桂枝一錢芍藥二錢甘草一錢上水二盞姜三片棗一枚煎八分食前溫服建中湯治表虛自汗官桂五分芍藥二錢甘草一錢上水二盞姜三片棗一枚煎八分服黃耆建中湯治虛勞自汗即建中湯加黃耆血虛者加當歸名當歸建中湯桂枝附子湯治婦人血虛自汗不止當歸建中湯加桂枝附子各五分空心服柴胡桂枝湯治發熱自汗或寒熱自汗柴胡一錢桂枝人參各五分甘草炙二分芍藥八分半夏生薑各六分黃芩五分上水盞半棗二枚煎七分食前溫服黃耆湯治喜怒驚恐房勞致陰陽偏虛者或自汗盜汗不止黃耆蜜炙一錢白茯苓熟地黃酒浸肉桂天門冬去心麻黃根龍骨各一錢五味子浮小麥炒防風各八分當歸酒洗甘草炙各七分上水二盞姜三片煎一盞食遠服發厥自汗加附子二片發熱自汗加石斛一錢大補黃耆湯治自汗虛弱之人可服黃耆防風山茱萸肉當歸白朮炒各八分肉桂甘草炙各四分五味子十一粒人參白茯苓熟地黃肉蓯蓉各一錢上水盞半姜三片棗一枚煎七分不拘時服玉屏風散治表虛自汗防風黃耆蜜炙各一錢白朮炒二錢上水盞半姜三片煎七分服和劑牡蠣散治諸虛不足及大病後體虛津液不固常常自汗黃耆蜜炙麻黃根牡蠣煅淬醋中各五錢上作二服每服水盞半加小麥百粒煎至八分食前溫服調衛湯治濕勝自汗補胃氣虛弱表虛不任風寒麻黃根黃耆蜜炙各一錢羌活生甘草生地黃生黃芩半夏各五分麥門冬當歸豬苓蘇木紅花各三分五味子九粒上水二盞煎八分熱服耆附湯治氣虛陽弱虛汗倦怠黃耆蜜炙熟附子各等分每服四錢水一錢姜五片煎六分食遠溫服涼膈散治胃中溫熱上蒸自汗者宜此連翹一兩山梔大黃黃芩薄荷葉各半兩甘草一兩半朴硝三錢為散為飲任服辰砂五苓散治濕熱自汗小便不利白朮白茯苓豬苓澤瀉各半兩肉桂辰砂各二錢另研為細末和勻每服二錢硃砂安神丸治心神不寧煩躁自汗方見驚悸門三建湯治真氣不足上盛下虛面亦自汗小便頻數大川烏制附子制天雄制各二錢上水二盞姜五片煎八分無時服弗效加黃耆肉桂正元散治下元氣虛心腹脹滿時常自汗方見諸虛門頭汗頭汗證乃身無汗只是頭面出汗陽氣上脫也柴胡桂薑湯治頭汗出脅滿小便不利往來寒熱心煩而嘔柴胡桂枝黃芩各一錢乾薑炮甘草牡蠣各五分天花粉一錢上水盞半煎七分食遠溫服心液汗心液汗證人多有之乃心氣溢盛故也面常發赤小兒因驚得之宜用收心氣涼心血參歸湯治心汗人參當歸酒浸各一錢上先用豬心一枚破作數片煎湯澄清汁煎藥服艾湯煎治別無汗獨胸間一塊有汗此思慮過多名曰心汗白茯神為末用艾葉煎湯調下數服撲粉止汗法牡蠣粉麻黃根天花粉白芷糯米粉敗蒲扇燒灰上為細末用綿包裹撲身上止汗紅粉麻黃根牡蠣煅各一兩赤石脂龍骨各半兩上為細末絹袋盛撲又方用川芎白芷白朮藁本各等分為末每一兩入糯米粉三錢和勻用絹袋盛撲身上日三度忌桃李雀肉仍灸大椎百壯即止飲食汗凡飲食汗出如洗日久心虛液耗令人消渴及半身不遂偏風痿疾此乃飲食慓悍之氣亦不可不為早治也安胃湯治飲食汗出宜用此藥按而收之黃連五味子烏梅肉甘草半生半炙各一錢升麻梢三分水盞半煎八分食遠溫服忌面蒜薑椒牡蠣白朮散治漏風證飲酒中風汗多食則汗出如洗久不治必成消渴證牡蠣煅一錢白朮炒防風各二錢上水二盞煎八分食遠溫服撫芎湯治自汗頭眩噁心痰逆川芎白朮炒陳皮各半兩甘草一錢上作二服每服水盞半姜三片煎八分食後服易簡方牡蠣散治一切自汗盜汗用牡蠣不拘多少火煅通紅醋淬五六次為末每一兩加定粉半兩和勻用絹袋盛之撲身上一方治虛汗不止玄府不閉用白朮四兩分作四分制一分用黃耆同炒一分用石斛同炒一分用牡蠣同炒一分用麥麩同炒各煅炒黃色去余藥只用白朮細炒每服三錢粟米湯調下盡四兩為妙又方青桑第三葉焙乾為末空心米飲調下二錢最止心汗一方何首為末唾調敷臍中即止汗一方鬱金為末臨臥以唾調乳上能止自汗救急方治自汗不止用陳糯米不以多少麥麩同炒令黃色研為細末米飲調下三錢或熱豬肉蘸末食之亦可一方五倍子為末唾津調填臍中以帛縛定即止一方治自汗盜汗麥麩炒黃色椒目各等分每三錢水盞半煎八分露一宿溫服道藏經治暑月汗漬腋下赤腫及痱瘡蕩以雪水蚌粉敷之一方治自汗不止粳米炒黃色為末絹袋撲身一方止自汗盜汗臨臥時少飢食宿蒸餅一枚不可飲湯水只干吃盡便就枕不過三次效盜汗門病機敘論戴氏曰盜汗者睡中而汗出也不睡則不能汗出方其睡熟也湊湊然出焉覺即止而不復出矣非若自汗而自出也雜病盜汗責其陽虛與傷寒盜汗非比是亦心虛所致宜斂心氣益腎水使陰陽調和水火升降其汗自止盜汗陰虛丹溪曰盜汗屬血虛陰虛乃陽蒸陰分而液出者為盜汗故陰虛陽必湊發熱而盜汗陰虛火炎者法當補腎所謂壯水之主以制陽光是也脈候平人脈虛細微者善盜汗也尺脈虛浮或滑澀為盜汗脈濡者為有盜汗陰陽俱虛也治法治盜汗東垣有法有方東垣云盜汗者寐中而通身出汗如浴覺來方知是屬陰虛榮血之所主也宜補陰降火當歸六黃湯之類是也若虛寒者只以黃耆六一湯盜汗發熱因陰虛用四物湯加黃柏兼氣虛加人參黃耆白朮小兒盜汗不用治蓋血未足也藥方當歸六黃湯治盜汗之聖藥當歸生地黃熟地黃黃連黃芩黃柏各一錢黃耆蜜炙二錢上水二盞煎八分服或加甘草浮麥麻黃根黃耆六一湯治陰陽俱虛而盜汗黃耆蜜炙六錢甘草炙一錢水二盞煎一盞服黃耆湯治虛盜汗黃耆蜜炙人參甘草炙白扁豆炒白朮炒白茯苓陳皮半夏制山藥乾葛各等分每服八錢水二盞煎一盞溫服神效麥麩湯治心氣盜汗麥麩炒黃色一錢防風白朮炒牡蠣制黃耆蜜炙各錢半水二盞棗二枚煎八分調辰砂妙香散極效辰砂妙香散治盜汗補氣血安心神大補陰丸治盜汗方見虛損門玉屏風散治自汗盜汗俱效方見自汗門白苓湯治虛盜汗黃耆炙防風白茯苓白朮各一錢麻黃根甘草牡蠣各五分小麥五粒上水盞半煎八分食遠服麥煎散治營衛不調夜多盜汗四肢煩痛肌肉消瘦知母石膏甘草炙滑石地骨皮杏仁去皮尖赤芍藥葶藶人參白茯苓麻黃銀各等分上為末每服二錢浮麥煎湯食遠調服石斛散治陰虛盜汗柴胡防風五味子小草遠志去心黃耆炙官桂石斛白朮炒甘草炙茯苓各等分上每服七錢水二盞煎八分食前溫服生地黃煎治陰火盜汗生地黃當歸黃耆炙黃連黃芩甘草炙麻黃根黃柏浮小麥各一錢水二盞煎八分溫服術茯湯治脾虛盜汗白朮三錢白茯苓二錢上水盞半姜三片棗二枚煎八分調妙香散至夜溫服參苓散治睡中汗出酸棗仁炒去衣人參白茯苓各等分上為細末每服三錢食遠米飲調下大人小兒皆可服龍膽散治盜汗有熱龍膽草防風各等分上為細末每服一錢溫米飲調下臨臥服防風散治盜汗不止防風一兩人參半兩川芎四錢上為細末每服三錢臨臥米湯調下正氣散治盜汗黃柏炒知母炒各二錢甘草炙六分上水盞半煎八分熱服四白散治男婦血虛發熱夜多盜汗羸瘦腳痛不能行白朮白扁豆白茯苓白豆蔻厚朴薑汁炒黃耆各七分藿香益智仁人參半夏陳皮烏藥甘草芍藥各五分檀香沉香各一分上水二盞姜三片棗二枚煎八分食前溫服椒目散治盜汗日久不止椒目麻黃根各等分上為細末每服一錢食後無灰酒調下白朮散治盜汗極驗白朮半斤切成小塊用浮麥一升水一斗煮乾如白朮尚硬又加水者爛取起切片焙乾去麥上為末每服三錢別用浮麥煎湯食遠調服治盜汗歌曰睡中有汗醒時知熟煮豬筒骨最宜濃汁熱調平胃散清晨一服夜應稀陰汗下焦濕熱不行以致陰間及囊俱有汗出常常不幹是也治法宜去下焦濕熱利小水滋陰而自止青娥丸治陰汗不幹方見腰痛門大蒜丸治陰汗濕癢用大蒜煨熟剝去皮爛碾同豆豉末搜和丸梧桐子大硃砂為衣每服三十丸空心燈草湯下珍珠散治陰汗蛤粉牡蠣粉等分為細末絹袋盛撲腳汗腳汗為脾經濕熱內淫於四肢故令手足心常有汗至冬陽氣內伏而汗愈多由此知其濕熱內淫也清脾散治手足心出汗白朮炒蒼朮茯苓半夏黃連各一錢滑石柴胡升麻甘草羌活各五分水二盞加燈心煎八分空心服牡蠣散治腳汗除穢氣牡蠣煆白礬枯密陀僧黃丹各等分上為細末每用少許乾摻腳指縫中即收易簡諸方本草衍義椒目治盜汗切效將椒目微炒研為細末每服五分以豬上唇煎湯調臨臥服蓋椒目行水又治水腫本草藥性論治盜汗牡蠣為末煉蜜丸梧桐子大每服三十丸空心白湯下一方治盜汗浮小麥一撮煎湯調防風牡蠣末二錢空心服道藏經治陰汗綿黃耆淨洗橫切細入銚內滴酒炒乾脆為末以豬心煮熟蘸食之效肘後方治腳汗用白礬一兩水二升煎洗腳瘥一方治腳汗用白礬乾葛等分為咀每二兩水三升煎十餘沸乘熱洗腳一日二次經三五日自然無汗一方治腳汗用楊花不拘多水水煎洗腳鋪於鞋底中蹉之一方治腳汗不幹用燒人場內死屍土灰鋪於鞋底蹉之效
