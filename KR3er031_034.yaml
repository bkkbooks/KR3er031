body:
  text: 卷之三十四痞塊門病機痞塊敘論痞痞塞不通之義也由氣血鬱滯凝結而作塊堅硬而成形致於寒熱作痛嘔吐脹悶甚者飲食不入令人漸漸黃瘦始因脾胃所傷或因瘧久而成謂之瘧母右關脈弦而緊細者是也丹溪謂在中為痰飲在左為死血在右為濕痰氣結極是但堅積既久非尋常氣血痰藥所能消除必須內外兼攻內經所謂留者攻之堅者削之使愈過半隨即調理氣血然後復攻方可保十全之效也痞證甚者可與癥積門參看施治凡婦人有痞塊多是血塊治法治痞先須開鬱豁痰消堅化血然後理脾胃調正氣凡痞塊在皮裡膜外須用補氣藥及香附開之兼二陳湯先須斷厚味為要藥方祕方化鐵丸治痞塊等積香附米四兩用巴豆三十粒去皮膜研細同香附熱水浸透春二日夏一日秋五日冬十日取出洗淨曬只用一半三稜莪朮半夏各一兩醋煮過丁香肉豆蔻麵包炒各半兩杏仁去皮尖炒熟青皮陳皮良薑各八錢多年壁土炒上為細末醋糊丸梧桐子大每服二三十丸空心薑湯下醫林阿魏丸方見積聚門治諸積痞塊宣明積氣丹方同上門治痞塊東垣廣朮潰堅湯方見腫脹門治痞塊積堅硬如石形大如盤經驗治痞方治一切痞塊豬澀脾七個新針七枚每一針刺一脾爁為度皮硝七錢每一錢擦一脾瓷器盛七日鐵器焙乾又用水紅花子七錢同脾搗為細末用無灰酒空心調下一年以下者一服可愈五年以下者二服十年以下者三服醫林小阿魏丸治痞塊山楂三兩石鹼二錢半夏一兩皂角水浸透三次曬乾上為末薑汁糊為丸梧桐子大每服五十丸食遠薑湯下千金大硝石丸治痞積硝石六兩大黃八兩另研人參甘草各三兩上為細末以好陳醋三升置瓷器中以竹片作準每入一升作一刻先入大黃不住手攪使微沸盡一刻乃下余藥又盡一刻微火熬使可丸如雞子黃大每服一丸白湯化下或丸如梧桐子大每服三五十丸服後當下如雞肝或如米泔赤黑色等物乃效下後忌風冷宜軟粥將息聖散子方見積聚門治痞積成塊集成消痞方木鱉子二十枚去殼獖豬腰一對黃連末三錢上將腰子切開煨熟搗爛入二味和丸如緑豆大湯下三十丸太無神功助化散治男子婦人腹中痞塊不拘氣血食積所成此方之妙不可盡述萹蓄五錢瞿麥穗二錢大麥芽五錢神麯五錢木香錢半甘草五錢川大黃三兩上為細末男用燈心淡竹葉等分煎湯及無灰酒一同調服一錢酒多於湯婦人用紅花當歸燈心等分及無灰酒一同調服亦酒多於湯忌油膩動氣之物及房事一月藥須黃昏時服次早二便見惡物為度云岐牡丹皮湯治婦人久虛羸瘦血塊走注心腹疼痛牡丹皮桂心當歸延胡索各一兩莪朮牛膝赤芍藥各二兩京三稜兩半上為細末每服三錢水酒各半煎服沒藥散治一切血氣臍腹撮痛及産後惡露不行兒枕塊痛沒藥血竭各研細末桂心當歸蒲黃紅花木香玄胡索乾漆炒赤芍藥各等分上為極細末每服二錢熱酒調下若血塊衝心痛甚至危者以大順散三錢熱酒調下立止丹溪胎前血塊方胎前血塊如盤難服峻劑此方主之香附醋煮四兩桃仁去皮尖一兩海粉醋煮二兩白朮一兩上為末麵糊丸梧桐子大每服七十丸酒下産後消塊方産後消血塊滑石三錢沒藥二錢血竭二錢有用丹皮一錢無血竭上為細末糊丸惡露不下以五靈脂為細末陳皮湯調下一錢又方消血塊香附子童便浸桃仁去皮留尖上等分為末醋糊丸服敷貼藥神方二仙膏治痞氣腹中作塊明礬雄黃各二兩研細先將二兩水糊和成膏紙攤貼患處即效不效再以後二兩攤貼須看貼藥之後大便如膿下即愈三聖膏貼痞塊化為膿血用未化石灰半斤為末瓦上微炒紅提出候熱稍減入大黃末一兩炒熱仍提出入桂心末五錢略炒以米醋熬成膏厚攤烘熱貼上即愈經驗四聖膏專貼痞塊耆葉獨蒜鹽穿山甲上以好醋搗成餅量痞大小貼之兩炷香為度痞化為膿水從大便中出琥珀膏大黃朴硝各一兩為末以大蒜搗膏貼之又方以水紅花或子每一碗以水三碗用桑柴文武火熬成膏量痞大小紙攤貼以無力為度仍將膏用酒調服忌葷腥油膩不飲酒者白湯下針灸法長桑君針積塊癥瘕先於塊上針之甚者又於塊首一針塊尾一針立應針訖灸之章門天樞氣海通谷上脘中脘上六穴皆灸積塊可按證選用奔豚氣塊攻心脅痛滿奄奄欲絶先以湯洗手足之卻取下穴期門氣海關元各灸五壯醫案丹溪治一婦人因哭子後胸否有塊如杯食減面淡黃黧黑憊甚脈弦虛細澀日晡發熱知其勢危補瀉兼用以補中益氣湯隨時加減與東垣痞氣丸相間服之食前用湯食後用丸必湯多於丸一月寒熱退食稍進仍服前藥二月後忽大寒熱天明退其塊加大至晚手足下半節皆腫遂停藥數日忽腫如失天明胸中之塊覺小遂以二陳加白朮桔梗枳實服半月而安次年生子一婦人年四十面白形瘦性急因有大不如意三月後乳房作一塊漸漸長大掩心微痛膈悶飲食減四之三每早口苦兩手脈微而短澀豫知其月經水不來矣遂與參朮歸芎佐以氣藥作大服一晝夜與四次外以大琥珀膏貼塊上防其塊長經一月餘得補藥百帖食及平時之半仍用前藥又過一月脈氣漸允又與前藥吞潤下丸百帖月經亦來澀脈減五分之四時天氣熱意其經行必紫色仍以前藥加醋炒三稜吞潤下丸以抑青丸十五粒佐之又經一月塊消食美如常矣一人年五十餘因飲酒醉後受怒氣左脅下與臍平作痛自此以後漸成小塊或起或不起而痛痛止則伏面黃口乾無力食少吃些物便噯此氣味轉惡風寒脈之左大於右弦澀長此木火甚脾胃傷而陰血耗且與和胃湯以補胃氣滋養陰血吞下保和丸逐其糟粕胃實血充時卻用消塊和胃湯即人參三錢白朮錢半陳皮一錢芍藥當歸各五分乾葛紅花各三分作一劑煎服吞下保和丸一婦人腹下有塊一男子心痛膈有塊俱用白朮湯吞保和丸三十粒愈白朮二錢青皮一錢芍藥木通川芎蒼朮甘草各五分一婦脅下有塊漸長大脈數而大詢之近已發熱食亦減倦怠先與補之次攻其塊用陳皮五錢白朮一兩柴胡當歸青皮各五錢木通三錢甘草一錢作八帖先服次服攻塊丸用醋炒青皮一兩桃仁五錢醋三稜兩半桂枝三錢半海藻八錢神麯糊丸一少婦瘧後左脅下有塊小便少用厚朴柴胡黃木通各二錢三稜白朮青皮各四錢甘草五分薑一片煎食前熱服一婦人年五十形氣俱實富而勞神味厚性急常經水過多醫每用澀藥止之後病走氣胸腹中共有大小塊十餘枚遇夜痛甚著床纍月其脈兩手皆澀而弱此因用澀藥致敗血積聚不行故耳時三月間以蜀葵根煎湯再煎人參白朮陳皮青皮甘草梢牛膝成湯入玄明粉少許研桃仁調熱飲之服三帖腹痛下塊一枚再並渣服又下一枚後去葵根玄明粉服數劑漸消一婢色紫稍肥性沉多憂年近四十經不來三月小腹當中有塊初起如粟漸如炊餅豫診之兩手皆澀重取稍滑令按其塊痛捫之高寸許遂與千金硝石丸下四五次後忽自言乳頭有汁恐是孕豫曰非澀脈無孕之理又與三五帖診之脈稍虛豫悟曰前藥太峻止與四物湯倍加白朮佐以陳皮甘草至三十帖體充完再與硝石丸四五次自云塊消一暈便令莫服逾半月經行痛甚下黑血近半升內有椒核者數十粒而塊消去半又求藥豫曉之不必用藥次月當盡消矣至次月經行又下黑血塊而又消其大半彼又索藥豫曰再次月必盡消矣後果然大凡攻藥病熱一退正氣自復而邪氣由漸而消若胃氣弱者盡劑攻之必傷胃氣又反致禍醫者不可不知也一人年六十素好酒八月間因行暑熱中得病兩足冷過膝上脘有塊如掌大牽引脅痛不可眠臥飲食減少卻不渴已自服生料五積散三劑診其脈俱沉澀而小按之不為弱皆數而右為甚大便如常小便赤澀遂用大承氣湯減大黃之半而熱加炒黃連芍藥川芎乾葛甘草作湯下栝蔞仁半夏黃連貝母丸至十二帖足冷退至脛塊減半遂止藥至半月飲食復舊諸症皆除一人病腳氣夜半痞繞脅有塊硬如石痛欲死用杉木湯服下食頃大下三次氣通塊散方用杉木節一大節橘葉一大升無葉以皮代之大腹檳榔七個三味切用童便三升共煮一升半分二服若一服得快利則止後服
