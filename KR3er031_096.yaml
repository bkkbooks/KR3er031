葉炸熟水浸淘淨以油鹽調食治病具見本草野蜀葵生荒野中就地叢生苗高五寸許葉似葛勒子秧葉而厚大又似地牡丹葉微苦微帶甜救飢採嫩葉炸熟水浸淘洗淨油鹽調食治病具見本草鐵掃帚生荒野中就地叢生一本二三十莖苗高三四尺葉似苜蓿葉而細長又似細葉胡枝子葉亦短小開小白花其葉味苦無毒救飢採嫩苗葉炸熟換水浸去苦味油鹽調食治病具見本草羊角苗又名羊姝科亦名合鉢兒俗名婆婆針扎兒又名紐絲藤一名過路黃生田野下濕地中拖藤蔓而生莖色青白葉似馬兜鈴葉而長大又似山藥葉亦長大面青背頗白皆兩葉相對生莖葉折之俱有白汁出葉間出穗開五瓣小白花結用似羊角狀中有白穰其葉味甘微苦救飢採嫩葉炸熟換水浸去苦味邪氣淘淨以油鹽食治病具見本草虎尾草生密縣山野中科苗高二三尺莖圓葉頗似柳葉而瘦短又似兔兒尾菜葉瘦窄又似黃精葉頗軟抪莖攢生味甘微澀無毒救飢採嫩苗葉炸熟換水淘去澀味油鹽調食治病具見本草胡蒼耳又名回回蒼耳生田澤中葉似皂莢葉微長大又似望江南葉而小頗硬色微淡緑莖有線楞結實如蒼耳實但長𧣪音哨味微苦救飢嫩苗之葉炸熟水浸去苦味淘淨以油鹽調食治病今人傳說治諸般瘡採葉用好酒熬吃消腫以上救飢二本共八十五種葉可食天門冬一名萬歲藤一名婆羅樹本草名顛勒或名地門冬或名筵門冬或名巔棘或名淫羊食或名管松生奉高山谷及建州漢州今處處有之春生藤蔓大如叉股長至丈餘延附草木上葉如茴香極尖細而疏滑有逆刺亦有澀而無刺者其葉如絲杉而細散皆名天門冬夏生白花亦有黃花及紫花者秋結黑子在其根枝旁入伏後無花暗結子其根白或黃紫色大如手指長三四寸大者為勝其生高地根短味甜氣香者上其生水側下地者葉細似蘊而微黃根長而味多苦氣臭者下亦可服味苦甘性平大寒無毒垣衣地黃及貝母為之使畏曾青服天門冬誤食鯉魚中毒浮萍解之救飢採根換水浸去苦味去心煮食或曬乾煮熟入蜂蜜和食尤佳最妙治病具見本草麥門冬本草云秦名羊韭齊名愛韭楚名馬韭越名羊耆一名禹葭音加一名禹餘糧生隨州陸州及函谷堤阪肥土石間久廢處有之今輝縣山野中亦有葉似韭菜而長冬夏長生根如穬麥而白色出江寧者小潤出新安者大白其大者苗如鹿蔥小者如韭葉味甘性平微寒無毒地黃車前為之使惡款冬苦瓠苦芺烏老切畏木耳苦參青蘘救飢採根換水浸去邪味淘洗淨蒸熟去心食治病具見本草百合一名重箱一名摩羅一名中逢一名強瞿生荊州山谷今處處有之苗高數尺干粗如箭四面有葉如雞距又似大柳葉而寬青色稀疏葉近莖微紫莖端碧白開淡黃白花如石榴觜而大四垂向下覆長藥花心有檀色每一顛須五六花子紫色圓如梧桐子生於枝葉間每葉一子不在花中此又異也根色白形如松子殼四向攢生中間出苗又如葫蒜重疊生三四十瓣味甘性平無毒一云有毒又有一種開紅花名山丹不堪用救飢採根煮熟食之甚益人氣又云蒸過與蜂蜜調和食之或研粉蜜調尤佳治病具見本草章柳根本草一名商陸一名䓪音湯根一名夜呼一名白昌一名當陸一名章陸爾雅謂之蓫湯廣雅謂之馬尾易謂之莧陸生咸陽川穀今處處有之苗高三四尺干粗似雞冠花干微有線楞色微紫赤葉青如牛舌微闊而長干如人形者有神亦有赤白二種花赤根白宜入藥可食赤者不可用殺人慎之救飢取白色根切作片子炸熟換水浸洗淨淡食得大蒜良凡制薄切以東流水浸二宿撈出與豆葉隔問入甑蒸從午至亥如無葉用豆依法蒸之亦可花白者年多仙人採之作脯可以下酒治病具見本草菖蒲一名堯韭一名昌陽生上洛池澤及蜀郡嚴道戌衛衡州並嵩嶽石磧上今池澤處處有之葉似蒲而匾有脊一如劍刃其根旁屈有節狀如馬鞭干大根旁引三四小根一寸九節者良節密者佳有十二節者露根不可用又一種名蘭蓀又謂溪蓀根形氣色極似石上菖蒲葉正如浦無脊俗謂之菖蒲生於水次失水則枯其菖蒲味辛性溫無毒秦皮秦艽為之使惡地膽麻黃不可犯鐵令人吐逆救飢採根肥大節稀水浸去其邪味製造作果食之治病具見本草苧根舊云閩蜀江浙多有之今許州人家田野中亦有種者皮可績布苗高七八尺一科十數莖葉似楮葉而不花叉面青背白上有短毛又似蘇子葉其葉間出細穗花如白楊而長每一朵凡十數穗花青白色子熟茶褐色其根黃白色如手指粗宿根地中至春自生不須藏種荊楊讓一歲二三削剝其皮以竹刀刮其表厚處自脫得里如筋者煮之用緝以苧近蠶種之則蠶不生其根味甘性寒救飢採其根刮洗去皮煮極熟食之甜美治病具見本草蒼朮一名山薊一名山姜一名山連一名山精生鄭山漢中山谷今近郡山谷亦有嵩山茅山者佳苗淡青色高二三尺莖作蒿干葉抪莖而生梢葉似棠葉腳葉有三五叉皆有鋸齒小刺開花紫碧色亦似刺薊花或有黃白花者根長如指大而肥實皮黑茶褐色味苦甘一云味甘辛性溫無毒以防風地榆為之使也救飢採根去黑皮薄切浸三四宿去苦味熟食亦作煎餌久服輕身延年益壽不飢治病具見本草以上載本草野山藥生輝縣太行山山谷中妥他果切藤而生藤似葡萄條稍細藤頗紫色其葉似家山藥葉而大微尖根比家山藥極細瘦甚硬皮色微赤味微甘性溫平無毒救飢採根煮熟食之治病具見本草山蘿蔔生山谷間田野中亦有之苗高五七寸四散分生莖葉其葉似菊葉而闊大微有艾香每莖五七葉排生如一大葉梢間開紫花根似野胡蘿蔔根而黲白色味苦救飢採根炸熟水浸淘去苦味油鹽調食治病具見本草野胡蘿蔔生荒野中苗葉似家胡籮卜俱細小葉間攛生莖叉梢頭開小白花衆花攢開如傘蓋狀比蛇床子花頭又大結子比蛇床子亦大其根比家胡蘿蔔尤細小味甘救飢採根洗淨蒸食生食亦可治病具見本草老鴉蒜生水邊下濕地中其葉直生出土四垂葉狀似蒲而短背起劍脊其根形如蒜瓣味甘微土氣救飢採根炸熟水浸淘淨油鹽調食治病具見本草以上出救荒二本共十一種根可食薏苡仁俗名回回米生真定平澤及山野交趾生者最大今處處有之苗高三四尺葉似黍葉而稍大開紅白花作穗子結實青白色形如珠而稍長故名薏苡子味甘微寒無毒今人俗亦呼為菩提子救飢採實春取其中仁煮粥食取葉煮飲亦香治病具見本草雀麥本草一名燕麥一名蘥音藥止於荒野林下今處處有之苗似燕麥而又細弱結穗像麥穗而極細小每穗又分作小叉穗十數個子甚細小味甘性平無毒救飢採子舂去皮搗作面蒸食作餅食妙治病具見本草蒺藜子本草一名旁通一名即藜一名茨生馮翊平澤或道旁今在處皆有之布地蔓生細葉而開小黃花結子有三角刺人是也味苦辛性溫微寒無毒烏頭為之使又有一種白蒺藜出同州沙苑開黃紫花作莢子結子狀如腰子樣小如黍粒補賢藥多用味微甘有小毒救飢收子炒微黃搗去刺磨面作燒餅或蒸食皆可治病具見本草以上載本草稗音拜子有二種水稗生水田邊旱稗生田野中今處處有之苗葉似穇子葉色深緑腳葉頗帶紫色梢頭出扁穗結子如黍粒大茶褐色其味微苦性微溫救飢採子搗米煮粥食蒸食尤佳或磨作麵食亦可治病具見本草燕麥田野處處有之其苗似麥攛七宣切葶但細弱葉小瘦細抪音布莖而生結細長穗其麥粒極細小其味微甘性溫無毒救飢採子舂去皮蘑為麵食之治病具見本章地稍瓜生田野中苗長尺許作地攤科生葉似獨掃葉而細窄光硬又似沙蓬葉亦硬周圍攢莖而生莖葉間開小白花結角長大如蓮子兩頭尖𧣪又似鴻嘴形名地稍瓜其味甘救飢其角嫩時摘取炸食角苦皮破剝取角中嫩穰生食治病具見本草山黧豆一名山豌豆生密縣山野中苗高尺許其莖窊面劍脊葉似竹葉而齊短兩兩對生開淡紫花結小角兒其豆扁如𧰎豆味甘救飢採取角兒煮食或打取其豆食皆可治病具見本草野黍生荒野中科苗皆類家黍而莖葉細弱穗甚瘦小黍粒亦極細小其味微甜性微溫救飢採子舂去粗皮糠或搗或磨面蒸糕食之甚甜治病具見本草以上出救荒二本共八種實可食蒼耳草本草名枲耳俗名道人頭一名羊負來詩謂之卷耳爾雅謂之苓耳生陸安州川穀及陸安田野今處處有之葉青白類黏胡菜葉莖葉梢間結實比桑椹短小而多刺其實味微苦甘性溫葉味苦辛性微寒有小毒又云無毒救飢採嫩苗炸熟換水浸去苦味淘淨油鹽調食其子炒微黃搗去皮磨為面作燒餅蒸食亦可或用子熬油點燈治病具見本草羊蹄苗一名東方宿俗呼豬耳朵生陳留川澤今所在有之苗初就地生後攛生莖叉高二尺余其葉窄長頗似萵苣而色深青似大藍葉微闊莖節間紫赤色其花青白成穗子三稜根似牛蒡而堅實味苦性寒無毒救飢採苗葉炸熟水浸淘淨苦味油鹽調食其子熟時打子搗為米以滾水湯三五次淘淨下鍋作水飯食之治病具見本草土茜瓜本草根名茜根一名地血生喬山川穀徐州人謂之牛蔓西土出者佳今北土處處有之土茜根可以染紅葉似棗葉形頭尖下闊紋脈豎直莖方莖葉俱澀四五葉對生節間莖蔓延附草木開五瓣淡銀褐花結小如緑豆粒生青熟紅根紫赤色味鹹性寒無毒一云味甘一云味酸畏鼠姑葉味微酸救飢採葉炸熟水浸作成黃色淘冷油鹽調食其子紅熟摘食治病具見本草王不留行本草名剪金草一名剪金花生太山山谷今祥符間亦有之苗高一尺余其莖對節生叉葉似石竹子葉而寬短抪莖對生腳葉似槐葉而狹長開粉紅花結蒴如松子大似罌粟殼樣極小有子如葶藶子大而黑色其味苦甘性平無毒救飢採葉炸熟換水淘去苦味油鹽調食子搗為麵食之治病具見本草以上載本草天茄兒生田野中苗高一尺許莖有線楞葉似姑娘草葉而大又似和尚菜葉卻小開五片小白花結子似野葡萄大紫黑色味微甜救飢採嫩葉炸熟水浸去邪味淘淨油鹽調食其子熟時亦可摘食治病具見本草蓬子菜生田野中所在處處有之其苗嫩時莖有紅紫線楞葉似鹻蓬菜微細苗老結子葉則生出叉刺其子如獨掃子大苗葉味甘救飢採嫩苗葉炸熟水浸淘淨油鹽調食曬乾炸食尤佳及採其子搗米青色或煮粥或磨面作餅食之皆可治病具見本草苦扁豆俗名羊尿胞生延津縣郊野中在處亦有之苗高二尺許莖似黃耆苗莖上有細毛葉似胡豆葉微小又似蒺藜葉卻大枝葉間開紅紫花結殼如拇指頭大中間多虛俗呼為羊尿胞內有子如麻音頃子大茶褐色子葉味俱甚苦救飢採葉炸熟換水浸浣苦味淘淨油鹽調食及取子水侵淘去苦味曬乾或磨或搗為面作燒餅食之皆可治病具見本草米布袋生田野中苗就地生葉似澤漆葉而窄其葉順莖排生梢頭攢結三四角中有子如黍粒大微扁味微甜救飢採角取子水淘洗淨下鍋煮食其嫩苗葉炸熟油鹽調食亦可治病具見本草以上出救荒二本共八種葉實皆可食黃精苗一名重樓一名救窮一名仙餘糧生山谷南北皆有之嵩山茅山者佳根生肥地者大如拳薄地猶如拇指葉似竹葉或兩葉或三葉四葉五葉俱皆對節而生味甘性平無毒又云莖光澤者謂之太陽之草名曰黃精食之可以長生其葉不對節莖葉毛鉤子者謂之太陰之草名曰鉤吻食之入口立死又云莖不紫花不黃為異性也救飢採嫩葉炸熟換水浸去苦味淘洗淨油鹽調食山中人採根九蒸九曝食甚甘美其蒸曝用甕去底安釜上裝置黃精令滿密蓋蒸之令氣溜即曝之如此九蒸九曝令極熟若不熟則刺人喉咽久食長生辟穀其生者若初服之只可一寸半漸漸增之十日不食他食能長服之止三尺服三百日後盡見鬼神餌必升天又云花實極可食之罕得見至難得依法食之治病具見本草地黃苗俗名婆婆奶一名芐一名芑生咸陽川澤今處處有之苗初就地生葉如山白菜葉而毛澀葉面深青色又似芥菜葉而不花叉比芥菜葉頗厚葉中攛出莖上有細毛莖梢開筒子花紅黃色北人謂之牛奶子花結實如小麥粒根長四五寸細如手指皮赤色味甘苦性寒無毒惡貝母畏蕪荑得麥門冬清酒良忌鐵器救飢採葉煮羹食或搗絞根汁搜面作餅飪汲水淘食之或取根浸洗淨九蒸九曝任意服食或煎以為煎食久服輕身不老變白延年治病具見本草牛蒡子本草名惡實米去萼名鼠黏子俗名夜叉頭根謂之牛菜生魯山平澤今處處有之苗高二三尺葉如芋葉長大而澀花淡紫色實似葡萄而褐色外殼如栗梂而小多刺鼠過之則綴惹不可脫故名殼中有子如半麥粒而扁小根長尺余粗如拇指其色灰黲味辛性平一云其味甘無毒救飢採苗葉炸熟水浸去邪味淘淨汪鹽調食及掘出取根水浸洗淨煮熟食之久服甚益人輕身耐老治病具見本草以上載本草水豆兒一名葳菜生水澤中其莖葉比菹草又細狀類細綿連綿不絶根如叉股而色白根下有豆如退皮緑豆瓣味微甘救飢採花及根豆擇洗潔淨煮食生以鹽醃食亦可治病具見本草水蔥生水邊及淺水中科苗倣佛類家蔥而極細長梢頭結蓇葖倣佛類蔥蓇葖而小開黲白花其根類蔥根皮色紫黑根苗味俱甘微帶咸救飢採嫩苗連根揀擇洗淨炸熟水浸淘洗淨以油鹽調食之治病具見本草菹草即水藻也生坡塘及水泊中莖如粗線長三四尺葉形似柳葉面狹長故名柳葉菹又有葉似蓬子葉者根粗如叉股而色白味微咸性微寒救飢撈取莖葉連嫩根揀擇洗淘潔淨銼碎炸熟油鹽調食或加小米煮粥食尤佳無毒治病具見本草以上載救荒二本共六種根葉可食蒲筍本草名其苗為香蒲即甘蒲也一名睢一名醮俚俗名此蒲為香蒲謂菖蒲為臭蒲其香蒲水邊處處有之根比菖蒲根極肥大而少節其葉初未出水時葉莖紅白色採以為筍後攛梗於叢葉中花抱梗端如武士棒杵故俚俗謂蒲棒蒲黃即花中蕊屑也細若金粉當欲開時有便取之市廛間亦採之以蜜搜作果食貨賣甚益小兒其味甘性平無毒救飢採近根白筍揀剝洗淨炸熟油鹽調食蒸食亦可或採根刮去粗皺曬乾磨面打餅蒸食之亦可也治病具見本草蘆筍其苗名葦子草本草有蘆根爾雅謂之葭菙生下濕陂澤中其狀都似竹但差小而葉抱莖生無枝叉花白作穗如茅花根如竹根亦差小而節疏露出浮水者不堪用味甘辛其性寒無毒救飢採嫩筍炸熟以油鹽調食其根甘甜亦可生咂食之治病具見本草茭筍本草有菰根又名菰蔣草江南人呼為茭草俗又呼為茭白生江東池澤水中及岸際今在處水澤邊皆有之苗高二三尺葉似蔗荻又似茅葉而長大闊厚葉間攛葶開花如葦結實青子根肥剝取嫩白筍可啖久根盤厚生菌細嫩亦可啖名菰菜三年以上心中生葶如藕白軟中有黑脈甚堪啖名菰首味甘性大寒無毒救飢採茭菰筍炸熟油鹽調食或採子舂為米合粟煮粥食之甚濟飢治病具見本草茅芽根一名白茅菅其芽一名茅針生楚地山谷今田野處處有之春初苗布地如針夏生白花茸茸然至秋而枯其根至潔白亦甚甘美根性寒茅針性平其花性溫俱味甘無毒救飢採嫩芽剝取嫩茸食甚益小兒及取根咂食甜味久服利人食此茅針可斷谷治病具見本草以上四種載本草根筍皆可食葛根一名黃金生汝山川穀及海州成州浙江並澧鼎之間今處處有之苗引藤蔓長二三丈莖淡紫色葉似楸葉而小色青開花似豌豆花粉紫色結實如皂莢而小根形狀如手皆味甘性平無毒一云性冷殺野葛巴豆並百藥諸毒救飢取根入土深者水浸洗淨蒸食之或以水中揉出澄濾成塊蒸煮皆可食及採花曬乾炸食之亦可治病具見本草何首烏一名野苗一名交藤一名夜合一名地精一名陳知白又名桃柳藤亦名九真藤出真州河南縣其嶺外江南諸州及虔州皆有以西洛嵩山歸德柘城縣者為勝今鈞州密縣山谷中亦有之蔓延而生莖蔓紫色葉似山藥葉而不光嫩葉間開黃白花似葛勒花結子有稜似蕎麥而極細小如粟粒大根大如拳各有五稜瓣狀似甜瓜樣中有花紋形如鳥獸山嶽之狀者極珍有赤白二種赤者雄白者雌又云雄者苗葉黃白雌者赤黃色一云雄苗赤生必相對遠不過三四尺夜則苗蔓相交或隱化不見凡修合藥須雌雄相合服有驗宜偶日服二四六八日是也其藥本無名因何首烏見藤葉夜交採服有功因以採人為名耳又云其為仙草五十年者如拳大號山奴服之一年髭發烏黑一百年者如碗大號山哥服之一年顏色紅悅一百五十年者如盆大號山伯服之一年齒落重生二百年者如斗栲栳大號山翁服之一年顏如童子行及奔馬三百年者如三斗栲栳大號山精服之一年延齡純陽之體久服成地仙又云其頭九數者服之乃仙味苦澀性微溫無毒一云味甘茯苓為之使酒下最良忌鐵器豬羊血及豬肉無鱗魚與蘿蔔相惡若並食令人髭鬢早白腸風多熱故救飢掘根洗去泥土以苦竹刀切作片米泔水浸經宿換水煮去苦味再以水淘洗淨或蒸或煮食之花亦可炸食治病具見本草以上二種本草根及花皆可食栝蔞俗名天花粉本卓有栝蔞實一名地蔞生弘農川穀及山陰地今處處有之入土深者良生鹵地者有毒詩所謂果蓏之實是也根亦名白藥大者細如手臂皮黃肉白苗引藤蔓葉似甜瓜葉而作花叉有細毛開花似胡蘆花淡黃色實在花下大如拳生青熟黃根味苦性寒無毒枸杞為使惡乾薑畏牛膝乾漆反烏頭救飢採根剝皮至白處寸切之水浸一日一次換水浸經四五日取出爛搗以絹袋盛之澄濾令極細如粉或將根曬乾搗為面水浸澄濾二十餘遍使極膩如粉或為燒餅或作煎餅切細面皆可食採栝蔞穰煮粥食極甘取子炒乾搗爛用水熬油用亦可治病具見本草以上出救荒莖可食菊花一名日精一名傅廷年生雍州川澤及鄧衡齊州田野今處處有之味苦甘性平無毒白朮枸杞桑根白皮為之使救飢取莖紫氣香而味甘者採葉炸食或作羹皆可青莖無大氣味作蒿苦者不堪食名苦薏其花亦可炸食或炒茶食治病具見本草金銀花本草名忍冬亦名冬藤歸不載所出州土今輝縣山野中亦有之其藤凌冬不凋故名忍冬草附樹而蔓延生莖微紫色對節生葉葉似薜荔葉而青又似水茶白葉頭微圓而軟背頗澀又似黑豆葉而大開花五出微香蒂帶紅色花初開白色經一二日則色黃故名金銀花本草中不言善治癰疽發背近代名人用之奇效味甘性溫無毒救飢採花炸熟油鹽調食及採嫩葉換水煮熟浸去邪味淘淨以油鹽調食之治病具見本草以上載本草望江南其花名茶花兒人家園圃中多種苗高二尺許莖微淡赤色葉似槐葉而肥大微尖又似胡蒼耳葉頗大及似皂角葉亦大開五片金黃化結角長三寸許其葉味微苦救飢採嫩苗葉煮熟水浸淘去苦味油鹽調食花可炒食葉可炸食治病具見本草大蓼生密縣梁家沖山谷中拖藤而生莖有線楞而頗硬對節分生莖叉巢亦對生葉似山蓼葉微短而拳曲節間閉白花其葉味微苦微辣救飢採葉炸熟換水浸去辣味作成黃色淘洗淨油鹽調食花亦可炸食治病具見本草以上出救荒二本共四種花葉皆可食荇絲菜一名藕茺菜水中拖蔓而生葉似初生小荷葉近莖有丫劐葉浮水上葉中攛莖上開金黃花其莖味微甜酸無毒救飢採嫩莖炸熟以油鹽調食治病具見本草水慈菰俗呼為剪刀草生水中其莖面窊背方皆有絲楞其葉三角似剪刀形葉中攛生莖叉梢間開三片白花黃心結青蓇葖如青楮桃狀頗小根類蔥根而粗大其味微甜救飢採近根嫩筍莖炸熱油鹽調食治病具見本草以上出救荒莖可食木部茶樹本草有茗苦茶圖經云生山南漢中心谷閩浙蜀荊江湖淮南山中皆有之惟建州北苑數處産者性味獨與諸方不同今密縣梁家沖山谷間亦有之其樹大小皆類梔子春初生芽為雀舌麥顆又有新芽一發便長寸絲微粗如針漸至環腳軟枝條之類茶老則似水茶舊葉而長又似初生青岡橡葉而小光澤又云冬生葉可作羹飲世呼早採者為茶晚取者為茗一名荈蜀人謂之苦茶今通謂之茶茶荼聲近故呼之又有研治作餅名為臘茶者皆味苦甘性微寒無毒加茱萸蔥姜等良又別有一種蒙山中頂上清峰荼云春分前後多聚人力候雷初發聲並手齊採若得四兩服之即為地仙救飢採嫩葉或冬生葉可煮作羹食之或蒸焙作茶食之亦可治病具見本草夜合樹本草名合歡一名合昏生益州及雍洛山谷今鈞州鄭州山野中亦有之木似梧桐其枝甚柔弱葉似皂莢葉又似槐葉極細而密互相交結每一風來輒似相解了不相牽綴其葉至暮而合故名合昏花紅白色瓣上若絲茸然散垂結實作莢子極薄細味甘性平無毒救飢採嫩葉炸熟水浸淘淨以油鹽調食曬乾炸食尤好治病具見本草木槿樹本草云木槿如小葵花淡紅色五葉成一花朝開暮斂花與枝兩用湖南北人家多種植為籬障亦有千葉者人家園圃多栽種性平無毒葉味甜救飢採嫩葉炸熟冷水淘淨以油鹽調食治病具見本草椿樹本草有椿木樗木舊不載所出州土今處處有之二木形干大抵相類椿木實而葉香可啖樗為山椿江東人呼為虎目葉脫處有痕如樗蒲子又如眼目故得此名夏中生莢樗之有花者無莢有莢者無花莢常生臭樗上未見椿上有莢者然世俗不辨樁樗之異故俗名為椿莢其實樗莢耳其無花不實木大端直為椿有花而莢木小干多迂矮者為樗椿味苦有毒樗味苦有小毒性溫一云其性熱無毒救飢採嫩葉炸熟水浸淘淨以油鹽調食治病具見本草白楊樹本草白楊樹皮舊不載所出州土今處處有之此木高名白楊樹葉圓如梨肥大而尖葉背甚白葉邊鋸齒狀葉蒂小無風自動也味苦性平無毒救飢採嫩葉炸熟作成黃色換水淘去苦味洗淨以油鹽調食治病具見本草青楊樹在處有之今密縣山野間亦多有其樹高大葉似白楊樹葉而狹小色青皮亦頗青故名青楊其葉味微苦無毒救飢採葉炸熟水浸作成黃色換水淘洗淨以油鹽調食治病具見本草黃楝樹生鄭州南山野中葉似初生椿樹葉而極小又似楝葉色微帶黃開花紫赤色結子如豌豆大生青熟亦紫赤色葉味微苦救飢採嫩芽葉炸熟換水浸去苦味油鹽調食蒸芽暴乾亦可作茶煮飲可也治病具見本草凍青樹姜密縣谷間樹高丈餘枝葉似枸骨子樹而極茂盛凌冬不凋又似樝子樹葉而小亦似穁芽葉微窄頭頗圓而不尖開白花結子如豆粒大青黑色葉味微苦救飢採芽葉炸熟水浸去苦味淘洗淨油鹽調食治病具見本草兜櫨樹生密縣梁家沖山谷中樹甚高大其木枯朽極透可作香焚俗名壞香葉似回回醋樹葉而薄窄又似花楸樹葉卻少花叉葉皆對生味微苦救飢採嫩芽葉炸熟水浸去苦味淘洗淨油鹽調食治病具見本草椒樹本草蜀椒一名南椒一名巴椒一名蘑藙生武都川穀及巴郡歸峽蜀川陝洛間人家園圃多種之高四五尺似茱萸而小有針刺葉似刺縻葉微小葉堅而滑可煮食甚辛辛香結實無花但生於葉間如豆顆而圓皮紫赤此椒江淮及北土皆有之莖實皆相類但不及蜀中者皮肉厚腹裡白氣味濃烈耳又云出荊州西城者佳味辛性溫大熱有小毒多食令人乏氣口閉者殺人十月勿食椒損氣傷心令人多忘事杏仁為之使畏款冬花救飢採嫩葉炸熟換水浸淘淨油鹽調食椒顆調和百味香美治病具見本草檀樹生密縣山野中樹高一二丈葉似槐葉而長大開淡粉紅花葉味苦救飢採嫩芽葉炸熟換水浸去苦味淘洗淨以油鹽調食治病具見本草以上葉可食酸棗樹爾雅謂之樲棗出河東川澤今城壘坡野間多有之其木似棗而皮細莖多棘刺葉似棗葉微小花似棗花結實紫紅色似棗而圓小核中仁微扁名酸棗仁入藥用味酸性平一云其性微熱惡防己救飢採取其棗為果食之亦可釀酒熬作燒酒飲未紅熟時採取煮食亦可治病具見本草實棗兒本草名山茱萸生漢中川穀及琅琊冤句東海承縣海州今鈞州山谷中亦有之木高丈餘葉面寬稍圓紋脈微粗似榆葉無二開淡黃白花結實似酸棗大微長兩頭尖𧣪色赤既乾則皮薄味酸性平微溫無毒一云味鹹辛大熱蓼實為之使惡桔梗防己救飢摘實棗紅熟者食之治病具見本草野木瓜名八月樝又名杵瓜出新鄭縣山野中蔓延而生妥附卓木上葉似黑豆葉微小光澤四五葉攢生一處結瓜如肥皂大味甘救飢採嫩瓜換水煮食樹熟者亦可摘食治病具見本草無花果生山野中今人家園圃中亦栽葉形如葡萄葉頗長硬而厚梢作三叉枝葉間生果初則青小熟大狀如李子似紫茄色其味甘救飢採果食之治病具見本草山裡果兒一名山裡紅生新鄭縣山野中枝莖似初生桑條上多小刺葉似菊花葉稍團又似花桑葉亦團開白花紅果救飢採樹紅果食之治病具見本草山梨兒一名鐵刷子生鈞州山野中科條高三四尺枝條上有小刺葉似杏葉頗圓小開白花結實如葡萄熟則紅黃色救飢採果食之治病具見本草木桃兒生中牟土山間樹高五尺余枝條上氣脈積聚為疙瘩狀類小桃兒極堅實故名木桃其葉似楮葉而狹小無花叉卻有細鋸齒又似青檀葉梢間另又開紫花結子似梧桐子而大熟則淡銀褐色其味甘救飢採取其子熟者食之治病具見本草荊子本草有牡荊實一名荊實俗名黃荊生河間南陽冤句山谷並眉州蜀州平壽都鄉高岸及田野中今處處有之即作箠杖者作科條生枝莖堅徑對生枝叉葉似麻葉而疏短又有葉似棣葉而短小卻多花叉者開花作穗花色粉紅微帶紫結實大如黍粒而黃黑色味苦性溫無毒防風為之使惡石膏烏頭陶隱居登真隱訣云荊木之華葉通神見鬼精救飢採子換水淘去苦味曬乾搗磨為麵食之治病具見本草以上八種實可食枸杞一名枸忌一名羊乳一名仙人杖一名西王母杖一名地仙苗生常山平澤今處處有之其莖幹高四五尺上有小刺春生苗葉如石溜葉而軟薄莖葉間開小紅紫花隨便結實形如棗核熟則紅色味微苦性寒根大寒子微寒無毒一云味甘平白色無刺者良陝西枸杞長一二丈圍數寸無刺根皮如厚朴甘美異於諸處生子如櫻桃全少核曝乾如餅極爛有味救飢採葉炸熟水淘淨油鹽調食作羹食亦可子紅熟時亦可食若渴煮葉作飲以代茶飲之治病具見本草柏樹本草有柏實生太山山谷中及陝州宜州其干州者最佳密州側柏葉尤佳今處處有之味甘一云味甘辛性平無毒葉味苦一云味苦辛微濕無毒牡礪及桂瓜子為之便畏菊花羊蹄草諸石及面麴救飢列仙傳云赤松子食柏子齒落更生採柏葉新生弱嫩者換水浸其苦味初食苦澀入蜜或棗肉和食尤好後稍易吃遂不復飢冬不寒而夏不熱治病具見本草皂莢樹生雍州川穀及魯之鄒縣懷孟産者為勝今處處有之其木極有高大者葉似槐葉瘦長而尖枝間多刺結實有三種形小者為豬牙皂莢良又有長六寸及尺二者用之當以肥厚者為佳味辛鹹性溫有小毒柏實為之使惡麥門冬畏空青人參苦參可作沐藥不要入湯救飢採嫩葉炸熟換水浸洗淘淨以油鹽調食又以子不以多少炒舂去赤皮浸軟煮熟以糖漬之可食無毒治病具見本草楮桃樹本草名楮實一名榖實生少室山今所在有之樹有二種一種皮有斑花紋謂之斑榖今多用皮為冠一種皮無花斑紋枝葉大相類其葉似葡萄葉作瓣又上多毛澀而有子者為佳其桃如彈大青緑色後漸變深紅色乃成熟浸洗去穰取中子入藥一云皮斑者是楮皮白者是榖皮可作紙實味甘性寒葉味亦甘性涼俱無毒救飢採葉並楮桃帶花炸爛水浸過盦干作餅焙熟食之或取樹熟楮桃紅蕊食之甘美不可久食令人骨軟治病具見本草以上四種葉實皆可食槐樹本草有槐實生河南平澤今處處有之其木有極高大者爾雅云槐有數種葉大而黑者名懷槐晝合夜開者名守宮槐葉細而青緑者但為之槐其功不言有別開黃花結實似豆角狀味苦酸鹹性寒無毒景天為之使救飢採嫩芽葉炸熟換水浸洗淘去苦味以油鹽調食或槐化炒熟食之治病具見本草花葉皆可食棠梨今處處有之生荒野中葉似蒼朮葉有圓葉者亦有三叉葉者葉邊皆有鋸齒又似女兒茶葉其葉色頗黲白開白花結棠梨如小楝子大味甘酸花葉味微苦澀救飢採花炸熟食或曬乾磨面作燒餅食亦可及採嫩葉炸熟水浸淘淨油鹽調食或蒸曬作茶食亦可其棠梨經霜熟時可摘食治病具見本草花葉實皆可食桑椹樹本草有桑根白皮舊不載所出州土今處處有之其葉飼蠶結實為桑椹有黑白二種桑之精英盡在於椹桑根白皮東行根益佳肥白者良出土者不可用殺人味甘性寒無毒製造忌鐵器及鉛葉丫者名雞桑最堪入藥續斷麻子桂心為之使桑椹味甘性緩或云木白皮亦可用救飢採桑椹熟者食之或熬成膏攤於桑葉上曬乾搗作餅收藏或直取椹子曬乾可藏經年及取椹子清汁置瓶中封三二日即成酒其色味似葡萄酒甚佳亦可熬燒酒可藏經年味力俞佳其葉嫩老皆可炸熟食之皮炒乾磨面可食之治病具見本草榆錢樹本草有榆皮一名零榆生潁川山谷秦州今處處有之其木高大春時未生葉其枝條間先生榆莢形狀似錢而薄小色白俗呼為榆錢後方生葉似山茱萸葉而長尖𧣪潤澤榆皮味甘其性平無毒救飢採肥嫩榆葉炸熟水浸淘淨油鹽調食其榆錢煮糜羹食佳今人多睡或焯過曬乾備用或為醬皆可食榆皮刮去其上乾燥鄒澀者取中間軟嫩之皮銼碎曬乾炒焙極干搗磨為面拌糠乾草末蒸食取其滑澤易食又云榆皮與檀皮為末服之令人不飢根皮亦可曬乾搗磨為面作餅食之治病具見本草葉實皆可食竹筍本草竹葉有䈽竹葉苦竹葉淡竹葉本經並不載所出州土今處處有之竹之類甚多而入藥者惟此三種人多不能盡別䈽竹堅而促節體圓而質徑成白如霜作苗者有一種亦不名䈽竹苦竹亦有二種一種出江西及閩中本極粗大筍味甚苦不可啖一種出江浙近地亦時有之肉厚而葉長闊笑微苦味俗呼甜苦筍食所最貴者亦不聞入藥用淡竹肉薄節間有粉南人以燒竹瀝者醫家只有此一品又有一種薄殼者名甘竹葉最勝又有實中竹䈽竹並以筍為佳於藥無用凡取竹瀝惟用淡竹苦竹䈽竹爾陶隱居云竹實出藍田江東乃有花而無實而頃來斑斑有實狀如小麥堪可為飯圖經云竹筍味甘無毒又云而有微毒救飢採竹嫩筍炸熟油鹽調食焯過曬乾炸熟尤佳治病具見本草俱可食谷部山扁豆生田野中小科苗高一尺許梢葉似蒺藜葉微大根葉比苜蓿葉頗長又似初生豌豆葉開黃花結小扁角兒味甜救飢採嫩角炸食其豆熟時收取豆煮食治病具見本草山緑豆生輝縣太行山車箱沖山野中苗莖似家緑豆莖微細葉比家緑豆葉狹窄尖𧣪開白花結角亦瘦小其豆黲緑色其味微甘救飢採取其豆煮食或磨麵攤煎餅食之亦好治病具見本草野豌豆生田野中苗初就地拖秧而生後分生莖叉苗長二尺余葉似胡豆葉稍大又似苜蓿葉亦大開淡紫花結角似家豌豆角但秕小味苦救飢採用煮食或收取豆煮食或磨面製造食用與家豌豆同治病具見本草回回豆又名那合豆生田野中莖青似蒺藜葉又似初生嫩皂莢葉而有細鋸齒開五片淡紫花如蒺藜花樣結角如杏仁樣而肥有豆如牽牛子般大其味辛性溫救飢採豆煮食治病具見本草蠶豆今處處有之生田野中苗高二尺許莖方其葉狀類黑豆葉而圓長光澤枝幹豎直色似豌豆頗白莖葉梢間開白花結短角其豆如甜子而小色赤荏味微甜淡救飢採豆煮食炒食亦可治病具見本草胡豆生田野中其苗初就地生後分莖叉葉以苜蓿葉而細莖葉梢間開蔥白褐色花結子角有豆如𧰎豆狀味甜救飢採豆煮食或蘑麵食皆可治病具見本草以上實可食御米本草名象榖一名米囊今處處有之苗高三尺葉似榖葉色而大邊皺多有花叉開四片紅白花亦有千葉花者結殼似骲箭頭殼中有米數千粒似葶藶子色白隔年種則佳米味甘其性平無毒救飢採嫩葉炸熟油鹽調食取米作粥或與面作餅皆可食其米和竹瀝煮粥食之極美治病具見本草蕎麥處處種之苗高二三尺許就地科叉生其莖色紅葉似杏葉而微軟梢開小白花結實作三稜蒴兒味甘平性微寒無毒救飢採嫩苗葉炸熟油鹽調食多食微瀉其麥或蒸使氣餾於烈日曬令口開春取仁煮作飯食或為面作餅蒸食皆可治病具見本草赤小豆本草舊云江淮種蒔今北土多有之苗高一二尺葉似豇豆葉微團𧣪開花似豇豆花微小淡褐色有腐氣人故呼為腐婢結角比緑豆角頗大角之皮色微白帶紅其豆有赤白黧色三種味甘酸性平無毒合鮓食成消渴為醬合鮓食成口瘡久食之則身重也救飢採嫩葉炸熟水淘洗淨油鹽調食明目豆角亦可煮食又法赤小豆一升半炒大豆黃一升半焙二味搗米每服一合新水下日三服盡三升可度十一日不飢又說小豆食之逐津液行小便久服則虛人令人黑瘦枯槁治病具見本草蘇子人家多種之苗高二三尺莖方窊面四楞上有澀毛葉皆對生似紫蘇葉而大開淡紫花結子比紫蘇子大味微辛性溫救飢採嫩葉炸熟換水浸洗淨油鹽調食其子可炒食亦可油房榨油用無毒治病具見本草黑豆苗生密縣山野中苗似家黑豆每三味攢生一處居中大葉如緑豆葉旁兩葉似黑豆葉微圓開小粉紅花結角比家黑豆角極瘦小其豆亦極細小味微苦澀救飢採角煮食或打取豆蒼皆可苗葉嫩時採取炸熟水淘去苦味油鹽調食多食則瀉治病具見本草黃豆苗今處處有之苗高一二尺葉似黑豆葉而大結角比黑豆角稍肥大其葉味甘救飢採苗葉炸熟水浸淘淨油鹽調食或採角煮食或收豆煮食及蘑為麵食皆可治病具見本草豇豆苗今處處有之人家圍圃中多種就地拖秧而生亦延籬落葉似赤小豆葉而極長𧣪開淡粉紫花結角長五七寸其豆味微甘救飢採苗葉炸熟水浸淘淨油鹽調食及採嫩角炸食亦可其豆成熟時打取豆食治病具見本草刀豆苗處處有之人家園籬邊多種之苗葉似豇豆葉肥大開淡粉紅花結角如皂角狀而長其形似屠刀樣故以名之味微甘微淡救飢採嫩苗葉炸熟水浸淘淨油鹽調食及採嫩角炸食豆熟時收豆煮食亦可磨麵食治病具見本草以上葉實皆可食果部桃樹本草有桃核仁生太山川穀河南陝西出者尤大而美今處處有之樹高丈餘葉狀似柳葉而闊大又多紋脈開花紅色結實品類甚多其油桃光小金桃色深紅崑崙桃肉深紫紅色又有餅子桃面桃鷹嘴桃雁過紅桃凍桃之類名多不能盡載山中有一種桃正是月令中桃始華者謂山桃不堪食啖但中入藥桃核仁味苦甘其性平無毒救飢採葉炸熟水浸作成黃色換水淘淨油鹽調食桃實熟軟時摘食之其結硬未熟時亦可煮食或切作片曬乾研為糝收藏之備用治病見本草櫻桃樹處處有之古謂之含桃甚似桑葉而狹窄微軟開粉紅花結桃似郁李子而小紅色鮮明味甘性熱救飢採紅熟者食之治病具見本草胡桃仁一名核桃生北土舊云張騫從西域將來陝洛間多有之今鈞鄭間亦有其樹葉大株葉厚而多陰開花成穗花色蒼黃結實外有青皮包之狀似梨大熟時漚去青皮取其核是胡核味甘性平一云性熱無毒救飢採核桃漚去青皮取穰食之令人體肥健治病具見本草梨樹出鄭州及宣城今處處有之其樹葉似棠葉而大色青開花白色結實形樣甚多鵝梨出鄭州極大味香美而漿多宣城皮厚而肉實味極長水梨出北都皮薄而漿多味差短又有消梨紫煤梨赤梨甘棠御兒梨紫花梨青梨茅梨桑梨之類不能盡具其名梨實味甘微酸性寒無毒救飢其梨結硬未熟時摘取煮食已經霜熟摘取生食或蒸食亦佳或削其皮曬作梨糝收貯備用亦可治病具見本草柿樹舊不載所出州土今南北皆有之然華山者皮薄而味甘珍宣歙荊襄閩廣諸州但生啖不堪為乾棵柿壓丹石毒烏柿宣越者性溫諸柿食之皆善而宜人其樹高一二丈葉似軟棗葉頗小而頭微圓結實種類甚多有牛心柿蒸餅柿蓋柿塔柿蒲柿紅柿黃柿朱柿棵柿其乾柿火乾者謂之烏柿諸柿味甘性寒無毒救飢採取軟熟柿食之其柿未軟者摘取以溫水醂熟食之粗心柿不可多食令人腹痛生柿彌冷尤不可多食之治病具見本草葡萄生隴西五原敦煌山谷及河東舊雲漢張騫使西域得其種還而種之中國始有蓋此果之最珍者今處處有之苗作藤蔓而極長大盛者一二本綿被山谷葉類絲瓜葉頗壯而邊多花叉開花極細而黃白色其實有紫白二色形之圓鋭亦二種又有無核者味甘性平無毒又有一種櫻薁真相似然櫻薁乃是千歲葉但山人一概收而釀酒救飢採葡萄為果食之又熟時取汁以釀酒飲治病具見本草李子樹本草有李核仁舊不載所出州土今處處有之其樹大高丈餘葉似郁李子葉微尖𧣪而潤澤光後開白花結實種類甚多見爾雅者有休無實李李之無實者一名趙李座接慮季即今之麥李細實有溝道與麥同熟故名之駁赤李其子赤者是也又有青李緑李赤李房陵李朱仲李馬肝李黃李紫李水李散見書傳美其味之可食皆不入藥今有穿條紅御黃子其李實味甘微苦一云味酸核仁味微苦性平俱無毒救飢摘取李實色熟者食之不可臨水上食亦不可和蜜食損五臟及與雀肉同食和漿水食令人霍乩澀氣多食令人虛熱治病具見本草木瓜生蜀中並山陰蘭亭而宣州者佳今處處有之其樹枝狀似奈花深紅色葉又似柿葉微小而厚爾雅謂之柕其實形如小瓜又似枯蔞而小兩頭尖長淡黃色味酸其性溫無毒救飢採成熟木瓜食之多食之亦不益人治病具見本草郁李仁本草郁李仁生濕州高山川穀丘陵上今處處有之木高四五尺枝條花葉皆似李惟子小花或白或赤結實似櫻桃赤色其仁味酸性平一云味苦辛實味甘酸根性涼俱無毒救飢其實紅熟時摘取食之酸甜美治病具見本草菱角本草名芰實一名菱處處有之水中拖蔓生葉浮水上三尖鋸齒葉開黃白花花落而實有二種一種四角一種二角兩角中又有嫩皮而紫色者謂之浮菱食之尤美味甘性平無毒一云性冷救飢採菱角鮮大者去殼食殼老及雜小者煮熟食或曬其實火燔以為米充糧作粉極白潤宜人服食家蒸曝蜜和餌之斷谷長生又云雜白蜜食令人生蝨一云多食臟冷損陽氣痿莖腹脹滿暖姜酒飲或含吳茱萸咽津液即消其菱夏月採治病具見本草以上實可食石榴樹本草名安石榴一名丹若廣雅謂之若榴舊雲漢張騫使西域得其種還今處處有之木不甚高大枝柯附干自地便生作業種極易成折其木條盤土中便生葉似枸杞葉而長微尖葉緑微帶紅色花有黃赤二色實亦有甘酸二種甘者可食其酸者入藥味甘酸性溫無毒又有一種子白瑩徹如水晶者味亦甘謂之水晶石榴救飢採嫩葉炸熟油鹽調食榴果熟時摘取食之不可多食損人肺及損人齒令黑治病具見本草杏樹本草有杏核仁生晉山川穀今處處有之其實有數種黃而圓者名金杏熟最早扁而青黃者名木杏其子皆入藥又小者名山杏不堪入藥其樹高丈餘葉頗圓淡緑頗帶紅色葉似本葛葉而光嫩微尖開花色紅結實金黃色核仁味甘苦性溫冷利有毒得火良惡黃芩黃耆葛根解蜴毒畏蘘草杏實味微酸其性熱救飢採葉炸熟以水浸漬作成黃色換水淘淨油鹽調食其杏黃熟時摘取食不可多食令人發熱及傷筋骨治病具見本草棗樹本草有大棗乾棗也一名美棗一名良棗生棗出河東平澤及近地州郡青晉絳蒲州者特佳江南出者堅燥少肉樹高一二丈葉似酸棗葉而大比皂角葉亦大尖𧣪光澤葉間開青黃色小花結實種數甚多爾雅云壺棗江東呼棗大而鋭上者為壺壺猶瓠也邊腰棗雲子細腰又謂轆轤棗擠白棗即今棗子白乃熟遵羊棗實小而圓紫黑色俗又呼為羊屎棗洗大棗河東猗氏縣出大棗如雞卵蹶泄苦棗雲子味苦晰無實棗云不著子者還味稔棗云還味短味也又有水菱棗御棗叩朴落蘇也又有牙棗皆味甘美其餘不能盡別其名大棗味甘性平無奉殺烏頭毒牙齒有病人切忌食生棗味甘辛多食令人寒熱腹脹羸瘦人不可食蒸煮食補腸胃肥中益氣不宜合和慈白食救飢採嫩葉炸熟水浸作成黃色淘淨油鹽調食其棗紅熟時摘取食之其結生硬未紅時煮食之亦可治病具見本草沙果樹一名花紅南北皆有今中牟岡野中亦有之人家園圃中亦多栽種樹高丈餘葉似櫻桃葉而色深緑又似急藶子葉而大開粉紅花似桃花瓣微長不尖結實似李而甚大其味甘微酸救飢採嫩葉炸熟油鹽調食其果紅熟時摘食之治病具見本草以上葉實皆可食蓮藕本草有藕實一名水芝丹一名蓮生汝南池澤今處處有之生水中其葉名荷圓徑尺余其花世謂之蓮花色有紅白二色花中結實謂之蓮房俗名蓮蓬其蓮青皮里白子為的即蓮子也的中青心為蒼其的至秋表皮色黑而沉水就蓬中乾者謂之石蓮其根謂之藕爾雅云荷芙渠其莖茄其葉邁其本密云是莖下白蒻在泥中藕節間初生萌芽也其花菡萏其實蓮其根藕其中的的中薏是也芙蕖其總名別名芙蓉又云其花未發為菡萏已發為芙蓉連實莖味甘性平寒無毒救飢採藕熟食生食皆可蓮子蒸食或生食亦可又可休糧仙家貯石蓮子乾藕經千年者食之至妙又以實磨為麵食或屑為米加粟煮飯食之皆可治病具見本草雞頭實一名芡實一名雁喙實幽人謂之雁頤出雷澤今處處有生澤中葉大如荷而皺背紫有刺俗謂雞頭盤花結實形類雞頭故以名之中有子如皂角子大莖褐色其近根莖𦵸嫩者名蒍𦵸人採以為菜茹實味甘性平無毒救飢採嫩莖葉炸食實熟採實剝仁食之蒸過烈日曬之其皮即開舂去皮搗仁為粉蒸炸作餅皆可食多食不益脾胃氣兼難消化生食動風冷氣與小兒食不能長大故駐年耳治病具見本草山藥本草名薯蕷一名山芋出明州滁州生高山山谷今處處有之春生苗蔓延籬圓莖紫色葉青有三尖角似千葉狗兒秧葉而光澤開白花結實如皂角子大其根皮色黲黃中則白色人家園圃種者肥大如手臂味美懷孟間産者入藥最佳味甘性溫平無毒紫芝為之使惡甘遂毒救飢掘取根蒸熟食甚美或火燒熟食之或煮食皆可其實亦可煮食治病具見本草芋頭本草一名土芝生田野中今處處有之人家多栽種葉似小荷葉而偏長不圓近蒂邊皆有一劐兒根狀如雞子大皮色茶褐其中白色味辛性平有小毒其藥冷無毒救飢本草芋有六種青芋細長毒多初煮須要灰汁換水煮熟乃堪食白芋真芋蓮禪芋紫芋毒少蒸煮食之又宜冷食療熱止渴野芋大毒不堪食也治病具見本草荸薺本草名烏芋一名水萍又名燕尾草爾雅謂之芍有二種根黑皮厚肉硬白者謂之豬荸薺皮薄色淡紫肉軟者謂之羊荸薺生水田中葉似莎草而厚肥梢又長窄葉間生葶其葶三稜梢頭開花醬褐色根即荸薺其味微苦甘性微寒無毒救飢採根煮熟食製作粉食之厚人腸胃不飢服丹石人尤宜食解丹石毒孕婦不可食治病具見本草以上根可食菜部莙達菜所在有之人家園圃中多種苗葉就地生葉類白菜葉而短葉莖亦窄葉稍圓形狀似糜匙樣味鹹其性平微寒微毒救飢採苗葉炸熟以水浸洗淨油鹽調食不可多食破腹治病具見本草蕓薹菜今處處有之葉似菠菜葉下兩旁多兩叉開黃花結角似蔓菁角有子如小芥子大味辛性溫無毒經冬寒其根不死闢蠹音渡救飢採苗葉炸熟水浸淘淨以油鹽調食治病具見本草萵苣菜生密縣山野間苗葉就地生葉似萵苣葉而小又似苦苣葉而卻寬大葉腳花叉頗少葉頭微尖邊有細鋸齒葉間攛葶開淡黃花其苗葉味微苦救飢採苗葉炸熟水浸淘去苦味油鹽調食生採亦可食治病具見本草山苦蕒生新鄭縣山野中苗高二尺余莖似高苣葶而節稠其葉甚花有三五尖又似花苦苣菜甚大開淡棠褐花表微紅味苦救飢採嫩苗葉炸熟水淘去苦味以油鹽調食治病具見本草莧菜本草有莧實一名馬莧幽薊間訛呼為人杏菜生淮揚川澤及田野中今處處有之苗高一二尺莖有緑楞葉如小藍葉大有赤白二色家者茂盛而大野者細小葉薄味甘性寒無毒不可與鱉肉同食生鱉瘕救飢採嫩葉炸熟水淘洗淨以油鹽調食之若曬乾炸食尤佳無毒治病具見本草冬葵菜本草冬葵子是秋種葵覆養經冬至春結子故謂之冬葵子生少室山野今處處有之苗高二三尺莖及花葉似蜀葵而差小子及根俱味甘性寒無毒黃芩為之使根解蜀椒毒葉味甘性滑利為百菜主其心傷人微毒救飢採葉炸熟水浸淘洗淨油鹽調食服丹石人尤宜食天行病後食之頓喪明熱食亦令人熱悶動風治病具見本草水芹菜俗作芹菜一名水英出南海池澤今水邊多有之根莖就地二三寸分生莖叉其莖方凹面四楞對生葉似痢莧菜葉而闊短邊有大鋸齒又似薄荷葉而短開白花似蛇床子花味甘性平無毒又云大寒春秋二時龍帶精入芹菜中人過食之作蛟龍病救飢發英時採之炸熟食芹有二種秋芹取根白色赤芹取莖葉並堪食又有渣音粗芹可為生菜食之治病具見本草香菜生伊洛間人家園圃種之苗高一尺許莖方凹面四稜莖色紫稔葉似薄荷葉微小邊有細鋸齒亦有細毛梢頭開花作紫花淡藕褐色其味辛香性溫救飢採嫩苗葉炸熟油鹽調食治病具見本草黃芽菜生密縣山谷中苗初就地生葉似初生山萵苣葉而小葉腳邊微有花叉又似孛孛丁葉而頭頗圓莖中攛生葶叉高五六寸許開小黃花結小細子黃茶褐色葉味甘救飢採苗葉炸熟換水淘淨以油鹽調食治病具見本草水芥菜水邊多生苗高尺許葉似家芥菜葉極小色微淡緑葉多花叉亦細開小黃花結小子角兒其葉味微辛無毒救飢採苗葉炸熟水浸去辣味淘洗淨以油鹽調食治病具見本草山白菜生輝縣山野中苗葉頗似家白菜而葉莖細長其葉尖𧣪邊有鋸齒叉又似莙達菜葉而尖瘦亦小味甘微苦救飢採苗葉炸熟換水淘油鹽調食治病具見本草野韭生荒野中形苗狀如韭苗葉極細弱葉圓比紫韭又細葉中攛葶開小粉紫花似韭花狀苗葉味辛救飢採苗葉炸熟油鹽調食生而食亦可治病具見本草山蔥一名隔蔥又名鹿耳蔥生輝縣太行山山野中葉似玉簪葉微圓葉中攛七官切葶葶似蒜葶甚長而澀梢頭結蓇葖似蔥蓇葖微小開白花結子黑色味苦辣救飢採苗葉炸熟油鹽調食生醃食亦可治病具見本草薤韭一名石韭生輝縣山野中葉似蒜葉頗窄又似肥韭葉微闊花似韭花頗大根似韭根甚大其味辣可食救飢採苗葉炸熟油鹽調食生亦可食冬寒之月採取根炸熟可食治病具見本草銀絲菜所在人家園圃多種苗葉皆似萵苣細長色頗青白攛葶高二尺許關四瓣淡黃花結蒴似蕎麥蒴而圓中有子如油子大淡黃色其葉味微苦其性涼救飢採嫩葉炸熟水浸淘淨油鹽調食生揉亦可食治病具見本草澤蒜又名小蒜生田野中今處處有之生山中者名蒚力的切苗似細韭葉中心攛葶開淡粉紫花根似蒜而甚小味甘性溫有小毒又云熱有毒救飢採苗根作羹或生醃或炸熟以油鹽調食亦可治病具見本草
