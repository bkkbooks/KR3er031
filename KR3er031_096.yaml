body:
  text: 卷之九十六救荒本草序植物之生於天地間莫不各有所用苟不見諸載籍雖老農老圃亦不能盡識而可烹可芼者皆躪籍於牛羊鹿豕而已自神農氏品嘗草木辨其寒溫甘苦之性作為醫藥以濟人之夭札後世賴以延生而本草書中所載多伐病之物而於可茹以充腹者則未之及也敬惟周王殿下體仁遵義孳孳為善凡可以濟人利物之事無不留意嘗讀孟子書至於五穀不熟不如荑稗因念林林總總之民不幸罹於旱潦五穀不熟則可以療飢者恐不止荑稗而已也苟能知悉而載諸方冊俾不得已而求食者不惑甘苦於荼薺取昌陽棄烏喙因得以裨五穀之缺則豈不為救荒之一助哉於是購田夫野老得甲坼句萌者四百餘種植於一圃躬自閲視俟其滋長成熟乃召畫工繪之為圖仍疏其花實根乾枝葉之可食者匯次為書一帙名曰救荒本草命臣為序臣惟人情於飽食暖衣之際多不以凍餒為虞一旦遇患難則莫知所措惟付之於無可奈何故治己治人鮮不失所今殿下處富貴之尊保有邦域於無可虞度之時乃能念生民萬一或有之患深得古聖賢安不忘危之旨不亦善乎神農品嘗草木以療斯民之疾殿下區別草木欲濟斯民之飢同一仁心之用也雖然今天下方藥雍熙泰和之治禾麥産瑞家給人足不必論及於荒政耳殿下亦豈忍睹斯民仰食於草木哉是編之作蓋欲辨載嘉植不沒其用期與圖經本草並傳於後世庶幾萍實有徵而凡可以烹芼者得不躪籍於牛羊鹿豕苟或見用於荒歲其及人之功利又非藥石所可擬也尚慮四方所産之多不能盡録補其未備則有俟於後日云永樂四年丙戍歲秋八月奉議大夫左長史臣卞同拜手謹序徐春甫序春甫自讀醫書深味醫藥誠為資生之具不容以不究心詳悉而盡通變化裁之妙用也及讀救荒本草乃知周王殿下位富貴之尊尚留心於醫藥而推及窮民不幸而罹凶歲則藥草森然茂叢郊野人莫之敢嘗其中可以充胃氣而權救生之策者則有某藥可以為蔬調而食之可以免斃其濟利之功不亦大哉人惟知藥草之為藥殊不知藥草正所以濟急療生救權之妙用也周王殿下其用權之仁人乎其啓迪醫師之活法乎昔睿宗獻皇帝在藩邸為生民念念拳拳於醫藥裒集醫方選要刊布行世正是居廟堂之上則思其民安不忘危之意耳況司其術何獨不然乎甫故採輯例之本草庶為資生之一助云嘉靖甲子孟春望日太醫院臣徐春甫拜手謹序救荒本草草部刺薊菜本草名小薊俗名青刺薊北人呼為千針草出冀州生平澤中今處處有之苗高尺余葉似苦苣葉莖葉俱有刺而葉不皺葉中心出花頭如紅藍而青紫色性涼無毒一云味甘性溫平救飢採嫩苗葉炸熟水浸淘淨油鹽調食甚美能除風熱治病具見本草大薊奮不著所出州土云生山谷中今鄭州山野間亦有之苗高三四尺莖五稜葉似大花苦苣菜莖葉俱多刺其葉多皺葉中心開淡紫花味苦性平無毒根有毒救飢採嫩苗葉炸熟水淘淨去苦味油鹽調食治病具見本草牛膝一名山莧菜一名百倍俗名接骨草一名鼓槌草一名對節菜生河內川穀及江椎閩粵吳越皆有之苗高二尺莖方青紫色其莖有節如鶴膝又如牛膝又如鼓槌以此名之葉似莧菜葉而長頗尖𧣪對節而生開花作穗根味苦酸性平無毒葉味甘微酸惡螢火陸英龜甲畏白前救飢採苗葉炸熟換水浸去酸味淘淨以油鹽調食治病具見本草款冬花一名橐石一名顆冬一名虎鬚一名免奚生常山山谷及上黨水旁關中蜀北岩昌秦州雄州皆有今鈞州密縣山谷間亦有之莖青微帶紫色葉似葵葉甚大而叢生又似石葫蘆葉頗團開黃花根紫色圖經云葉似荷而鬥直大者容一升小者容數合俗為蜂鬥葉又名水斗葉此物不避冰雪最先春前生雷中出花世謂鑽凍又云有葉似萆薢開黃花青紫萼去土一二寸初出如菊花萼通直而肥實無子陶隱居所謂出高麗百濟者近此類也其葉味苦花味辛甘性溫無毒杏仁為之使得紫菀良惡皂莢硝石玄參畏貝母辛荑麻黃黃芩黃連青葙子救飢採嫩葉炸熟水浸淘淨去苦味油鹽調食治病具見本草萹蓄一名萹竹生東萊山谷今在處有之布地生道旁自似石竹葉微闊嫩緑如竹赤莖如叉股節間花出甚細淡桃紅色結小細子根如蒿根苗葉味苦性平一云味甘苦無毒救飢採苗葉炸熟水浸淘淨以油鹽調食治病具見本草大藍生河內平澤今處處有之人家園圃中多種苗高尺余葉類白菜葉微厚而狹窄尖𧣪淡粉青色莖叉梢間開黃花結小莢其子黑色本草謂菘藍可以為靛染青以其葉似菘菜故名菘藍又名馬藍爾雅謂之葳馬藍味苦性寒平無毒救飢採葉炸熟水浸去苦味以油鹽調食治病具見本草瞿麥又名石竹子一名苣句麥一名大菊一名大蘭又名燕麥生太山川穀今處處有之苗高一尺以上葉似獨掃葉而尖小又似小竹葉而細窄莖亦有節梢間開紅白花而結實內有小黑子味苦辛性寒平無毒蓑草牡丹為之使惡螵蛸救飢採嫩苗葉炸熟水浸淘淨以油鹽調食之治病具見本草紅花葉本草名紅藍花一名黃藍出梁漢及西域滄魏亦種之今處處有之苗高二尺許莖葉有毛似刺薊葉而潤澤窊面梢結梂匯亦多刺開紅花蕊出梂上圃人採之採已復出至盡而罷梂中結實百顆如小豆大其花曝乾以染真紅又作胭脂味辛性溫無毒葉味甘美救飢採嫩葉炸熟油鹽調食子可榨作油任用治病具見本草萱草花俗名川草花本草一名鹿蔥生山野處處有之花名宜男風土記云懷妊婦佩其花生男故名宜男人家園圃中多種其葉就地叢生兩邊分垂葉似菖蒲葉而柔弱又似粉條兒菜葉而肥大葉間攛葶開金黃花味甘無毒根涼亦無毒葉味甘救飢採嫩苗葉炸熟水浸淘淨油鹽調食治病具見本草車前草一名車輪菜詩經名芣苡一名蝦蟆衣爾雅之馬舄幽州人謂之牛舌草生滁州及真定平澤今處處有之春初生苗葉布地如匙面纍年者長及尺余又似玉簪葉稍小而薄葉叢中心攛葶三四莖作穗如鼠尾花甚密青色微赤結實如葶藶子赤黑色生道旁味甘寒無毒一云味甘性平葉及根味甘性寒常山為之使救飢採嫩苗葉炸熟水浸去涎沫淘淨油鹽調食治病具見本草黃耆一名戴糝一名戴椹一名獨椹一名芰草一名獨脂一名百本一名王孫生蜀郡山谷及白水漢中河東陝西出綿上呼為綿黃舍今處處有之根長三尺獨莖叢生枝幹其葉扶疏作羊齒狀似槐葉微尖小又似蒺藜葉闊大而青白色開黃紫花如槐花大結小尖角長寸許味甘性微溫無毒一云味苦微寒惡龜甲白蘚皮救飢採嫩苗葉炸熟換水浸淘洗去苦味油鹽調食藥中補益呼為羊肉治病具見本草威靈仙一名能消出商州上洛華山並平澤及陝西河東河北河南河湖石州寧化等州郡不聞水聲者良今密縣梁家沖山野中亦有之苗高一二尺莖方如叉股四稜莖多短茸白毛葉似柳葉而闊邊有鋸齒又似旋覆花葉其葉作層生每層六七葉相對排如車輪樣有六層至七層者花淺紫色或碧白色作穗似蒲臺子亦有似菊花頭者結實青色根稠密多須味苦性渴無毒惡茶及麵湯以甘草梔子代飲可也救飢採葉煨熟換水浸去苦味再以水淘淨以油鹽調食治病具見本草馬兜鈴根名雲南根又名土青木香生關中及信州滁州河東河北江淮夔浙州郡皆有今高阜音負去處亦有之春生苗如藤蔓葉如山藥葉而厚大背白開黃紫花頗類枸杞花結實如鈴作四五瓣葉脫時鈴尚垂之其狀如馬項鈴故得名味苦性寒又云平無毒救飢採葉炸熟水浸去苦味淘淨以油鹽調食治病具見本草旋覆花一名戴椹一名金沸草一名盛椹上黨田野人呼為金錢花爾雅云復盜唐出隨州生平澤川穀今處處有之苗多近水旁初生大如紅花葉而無刺苗長二三尺以上葉似柳葉稍寬大莖細如蒿干開花似菊花如銅錢大深黃色花味鹹甘性溫微冷利有小毒葉苦味性平涼救飢採葉炸熟水浸去苦味淘淨以油鹽調食治病具見本草防風一名銅藝一名茴草一名百枝一名屏風一名蕳根一名百蜚生同州沙苑川澤邯鄲琅邪上蔡陝西山東處處皆有今中牟田野中有之根土黃色與蜀葵根相類稍細短莖葉俱青緑色莖深而葉淡葉似青蒿葉闊大又似米蒿葉而稀疏莖似茴香開細花白色結實似胡荽子而闊大味甘性辛溫無毒殺附子毒惡乾薑藜蘆白蘞芫花又有石防風亦療頭風眩痛又有叉頭者令人發狂叉尾者發痼疾救飢採嫩苗葉作菜茹炸熟可食極爽口治病具見本草郁臭苗本草茺蔚子是也一名益母一名益明一名大札一名貞蔚皆云蓷益母也亦謂蓷臭穢生海濱池澤今田野處處有之葉似荏子葉又似艾葉而薄小色青莖方節節開小白花結子黑茶褐色三稜細長味辛甘微溫一云微寒亦無毒救飢採苗葉炸熟水浸淘淨以油鹽調食治病具見本草澤漆本草一名漆莖大戟苗也生太山川澤及冀州鼎州明州今處處有之苗高二三尺科叉生莖紫赤色葉似柳葉微細短開黃紫花狀似杏花而瓣頗長生時摘葉有白汁出亦能齧音咬人故以為名味苦辛性微寒無毒一云有小毒一云性冷微毒小豆為之使惡薯蕷令嘗葉味帶澀苦食過回味甜救飢採葉及嫩莖炸熟水浸淘淨以油鹽調食採嫩葉蒸過曬乾作茶吃亦可治病具見本草酸漿草本草名酢與醋字同漿草一名醋母草一名鳩酸草俗為小酸芽舊不著所出州土今處處有之生道旁砂濕地葉如初生小水萍每莖端皆叢生三葉開黃花結黑子南人用苗揩鍮哥偷石器令白如銀色光豔味酸性平葉無毒救飢採嫩苗葉生食治病具見本草蛇床子一名蛇粟一名蛇米一名棗棘一名牆蘼爾雅一名盱生臨淄川穀田野今處處有之苗高二三尺青碎作叢似蒿枝葉似小葉蘼蕪又似藁本葉每枝上有花頭百餘結同一窠開白花加傘蓋狀結子半黍大黃褐色味苦辛甘無毒性平一云有小毒惡牡丹皮巴豆貝母救飢採嫩苗葉炸熟水浸淘冷油鹽調食治病具見本草夏枯草本草一名夕句一名乃東一名燕面生蜀郡川穀及河淮浙滁平澤今祥符西田野中亦有之苗高二三尺其葉對節葉似旋覆葉而極長大邊有細鋸齒背白上多氣脈紋路葉端開花作穗長二三寸許其花紫白似丹參花葉味苦微辛性寒無毒土瓜為之使俗又謂之郁臭苗非是也救飢採嫩葉炸熟換水浸淘去苦味油鹽調食治病具見本草桔梗一名利如一名房圖一名白樂一名梗草一名薺苨生嵩高山谷及冤句和州解州今鈞州密縣山野亦有之根如手指大黃白色春生苗莖高尺余葉似杏葉而長橢四葉相對而生嫩時亦可煮食開花紫碧色頗似牽牛花秋後結子葉名隱忍其根有心無心者乃薺苨也根葉味辛苦性微溫有小毒一云味苦性平無毒節皮為之使得牡蠣遠志療恚怒得硝石石膏療傷寒畏白芨龍眼龍膽草救飢採葉炸熟換水浸去苦味淘洗淨以油鹽調食治病具見本草茴香一多蘹香子北人呼為土茴香茴蘹音相近故云耳今處處有之人家園圃中多種苗高三四尺莖粗如筆管旁有淡黃袴葉抪莖而生袴葉上發生青色細葉似蓬葉而長極疏細如系髮狀袴葉間分生叉枝梢頭開花花結如傘蓋黃色結子如蒔蘿子微大而長亦有線瓣味微苦辛性平無毒救飢採苗葉炸熟換水淘淨油鹽調食子調和諸般食味香美治病具見本草藁本一名鬼卿一名地新一名微莖生崇山山谷及西川河東兗杭州今衛輝輝縣栲栳圈山谷間亦有之俗名山園荽莖高五七寸葉似芎藭葉細小又似園荽葉而稀疏莖比園荽莖頗硬直味辛微苦性平溫微寒無毒惡䕡茹又畏青葙子故也救飢採嫩苗葉炸熟水浸洗淘冷以油鹽調食治病具見本草川芎一名芎藭葉名蘼蕪一名茳蘺生武功川穀科谷西嶺雍州川澤及冤句其關陝蜀川江東山川亦多有以蜀川者為勝今處處有之人家園圃多種苗葉似芹而葉微細窄卻有花叉又似白芷葉亦細又如園荽葉微壯又有一種葉似蛇床子葉而亦粗壯開白花其芎人家種者形塊大重實多脂潤其里色白味辛甘性溫無毒山中出者瘦細味苦甘節大莖細狀如馬御謂之馬御芎狀如雀腦者謂之雀腦芎此最有力白芷為之使畏黃連其蘼蕪味辛香性平溫無毒救飢採葉炸熟換水浸去辛味淘淨以油鹽調食亦可以煮飲甚香治病具見本草柴胡一名地熏一名山菜茹草葉一名藝蒿生弘農川穀及冤句壽州淄州關陝江湖間皆有銀州者為勝今鈞州密縣山谷間亦有苗甚辛香莖青紫堅硬微有細線楞葉似竹葉而小開小黃花根淡赤色味苦性平微寒無毒半夏為之使惡皂莢畏女菀藜蘆又有苗似斜蒿亦有似麥門冬苗而短者開黃花生丹州結青子與他處者不類救飢採苗葉炸熟換水浸淘去苦味油鹽調食治病具見本草漏蘆一名野蘭俗名莢蒿根名鹿驪根俗呼為鬼油麻生喬山山谷及秦州海州曹兗州今鈞州新鄭沙岡間亦有之苗葉就地叢生葉似山芥菜葉而大又多花叉亦似白屈菜葉又似大蓬蒿葉又似風花菜腳葉而大葉中攛葶上開紅白花根苗味苦鹹性寒無毒連翹為之使救飢採葉炸熟水浸淘去苦味油鹽調食治病具見本草龍膽草一名龍膽一名陵遊俗呼草龍膽生齊朐山谷及冤句襄州吳興皆有之今鈞州新鄭山岡間亦有根類牛膝而根一本十餘莖黃白色宿根苗高尺余葉似柳葉而細短又似小竹開花如牽牛花青碧色似小鈴形樣陶隱居注云狀以龍葵味苦如膽因以為名味苦性寒大寒無毒貫衆小豆為之使惡防葵地黃又云浙中又有山龍膽草味苦微甘此同類而別種救飢採葉炸熟換水浸淘去苦味以油鹽調食勿空腹服餌令人溺不禁治病具見本草前胡生陝西漢梁江淮荊襄江寧咸州諸郡相孟越衢婺睦等州皆有今密縣梁家沖山野中亦有之苗高二三尺青白色似斜蒿味甚香美葉似野菊花葉而瘦細頗似山蘿葡葉亦細又似藝蒿開黲白花類蛇床子花秋間結實根細青紫色一云外黑裡白味甘辛微苦性微寒無毒半夏為之使惡皂莢畏藜蘆救飢採葉炸熟換水浸淘淨以油鹽調食治病具見本草地榆生桐柏山及冤句山谷今處處有之密縣山野中亦有此多宿根其苗初生布地後攛葶直高三四尺對分生葉葉似榆葉而狹細頗長作鋸齒狀青色開花如椹子紫黑色又類豉故名玉豉其根外黑裡紅似柳根亦入釀酒葉燒作灰能爛石味苦甘酸性微寒一云沉寒無毒得發良惡麥門冬救飢採嫩葉炸熟用水浸去苦味換水淘淨以油鹽調食無茶時用葉作飲甚解熱治病具見本草連翹一名異翹一名蘭華一名折根一名軹音紙一名三廉爾雅謂之連草一名連苕音條生太山山谷及河中江寧澤潤淄兗鼎嶽利州南康皆有之今密縣梁家沖山谷中亦有科苗高三尺莖杆赤色葉如榆葉大面光色青黃邊微細鋸齒又似金銀花葉微尖𧣪音哨開花黃色可愛結房狀似山梔子厥微匾而無稜瓣底中有子如雀舌樣極小其子折之間片片相比如翹以此得名味苦性平無毒葉味亦若救飢採嫩葉炸熟換水浸去苦味淘洗淨油鹽調食治病具見本草仙靈脾本草名淫羊藿一名剛前俗名黃德祖千兩金乾雞筋放杖草棄杖草俗又呼三枝九葉草生上郡陽山山谷及江東陝西泰山漢中湖湘介州等郡並永康軍皆有之今密縣山野中亦有苗高二尺許莖似小豆莖極細緊葉似杏葉頗長近蒂皆有一缺又似緑豆葉亦長而光梢間開花白色亦有紫色花作碎小獨頭根紫色有須形類黃連狀味辛性寒一云性溫無毒生處不聞水聲者良薯蕷紫芝為之使救飢採嫩葉炸熟水浸去邪味淘淨油鹽調食治病具見本草野生薑本草名劉寄奴生江南其越州滁州皆有之今中牟南沙岡間亦有之莖似艾蒿長二三尺余葉似菊葉而瘦細又似野艾蒿葉亦瘦細開花白色結實黃白色作細筒子蒴兒蓋蒿之類也其子似稗而細苗葉味苦性溫無毒救飢採嫩葉炸熟水浸淘去盡苦味以油鹽醋調食治病具見本草馬蘭頭本草名馬蘭舊不著所出州土但云生澤旁如澤蘭北人見其花呼為紫菊以其花似菊而紫也苗高一二尺莖亦紫色葉似薄荷邊皆鋸齒又似地瓜兒葉微大味辛性平無毒又有山蘭生山側似劉寄奴葉無丫不對生花心微黃赤救飢採苗葉炸熟新汲水浸去苦味淘洗淨以油鹽調食治病具見本草豨蘞音杴俗名黏糊菜俗又呼火杴草舊不著所出州郡今處處有之苗高三四尺金稜銀線素根紫秸莖叉對節而生莖葉頗類蒼耳莖葉紋脈豎直梢葉間開花深黃色又有一種葉似芥葉而尖開花如菊結實頗似鶴蝨科苗味苦性寒小毒救飢採嫩苗葉炸熟水洗去苦味淘淨以油鹽調食治病具見本草澤瀉俗名水薺菜一名水瀉一名及瀉一名鵠瀉生汝南池澤及齊州山東河陝江淮亦有漢中者為佳今水邊處處有之叢生苗葉其葉似牛舌草葉紋脈豎直葉叢中間攛葶對分莖叉莖有線楞梢間開三瓣小白花結實小青細子味甘葉味微寒俱無毒也救飢採葉炸熟水浸淘淨油鹽調食治病具見本草竹節菜一名翠蝴蝶又名翠娥眉又名笪竹花一名倭青草南北皆有今新鄭縣山野中亦有之葉似竹葉微寬短莖淡紅色就地叢生攛節似初生嫩葦節梢葉間開翠碧花狀類蝴蝶其葉味甜救飢採嫩苗葉炸熟油鹽調食治病具見本草獨掃苗生田中今處處有之葉似竹形而柔弱細小抪音布莖而生莖葉梢間結小青子子小如栗粒科莖老時可為掃帚葉味微甘救飢採嫩苗葉炸熟水浸淘淨以油鹽調食曬乾炸食不破腹尤佳妙治病具見本草兔兒酸一名兔兒漿所在田野中皆有之苗比水葒矮短莖葉皆類水葒其莖節密其葉亦稠比水葒葉稍薄小味酸性溫救飢採苗炸熟以新汲水浸去酸味淘淨油鹽調食治病具見本草鹻蓬音減一名鹽蓬生水旁下濕地莖似落梨亦有線楞葉似篷而肥壯比篷葉亦稀疏莖葉間結青子極細小其葉味微咸性溫無毒救飢採苗葉炸熟水浸去鹹味淘洗淨以油鹽調食治病具見本草䕡蒿田野中處處有之苗高二尺余莖幹似艾其葉細長鋸齒葉抪音布莖而生味微咸性微寒救飢採嫩苗炸熟水浸淘淨油鹽調少食治病具見本草水萵苣一名水波菜水邊多生苗高一尺余葉似麥藍葉而有細鋸齒兩葉對生每兩葉間對叉又生兩枝梢間開青白花結小青蓇葖如小椒大其葉味微苦性寒救飢採苗葉炸熟水淘淨油鹽調食治病具見本草金盞菜一名地冬瓜菜生田野中苗高二三尺莖初微赤而有線路葉似綿柳葉微厚抪莖而生莖葉稠密開花紫色黃心其葉味甘微寒救飢採苗葉炸熟水洗淨油鹽調食治病具見本草紫雲菜生密縣梁家沖山野中苗高一二尺莖方紫色對節生叉葉似山小菜葉頗長抪梗對生葉頂及葉間開淡紫花其葉味微苦救飢採嫩苗葉炸熟水浸淘去苦味油鹽調食治病具見本草鴉蔥生田野中板葉尖長榻地而生葉似初生薥秫葉而小又似初生小藍葉細窄而尖其葉邊皆曲皺葉中攛葶上結小蓇葖後出白英味微辛救飢採嫩苗葉炸熟水淘洗出辣氣以油鹽調食生葉可食之治病具見本草匙頭菜生密縣山野中作小科苗其莖面分五色背圓葉似尖匙頭樣有如杏葉大邊微鋸齒開淡紅花結子黃褐色葉味甜救飢採葉炸熟水浸淘淨油鹽調食治病具見本草雞冠菜生田野中苗高尺絲葉似青英菜葉而窄小又似山菜葉而窄𧣪梢開出穗似兔兒尾穗卻微細小開粉紅花結實如莧菜子苗葉味苦救飢採苗葉炸熟水浸淘去苦氣以油鹽調食治病具見本草水蔓青一名地膚子生中牟縣南沙岡中苗高一二尺葉倣佛似地瓜兒葉卻甚少卷邊窊面又似雞兒腸葉頗尖𧣪梢間出穗開淡藕絲褐色花其葉味微甜救飢採苗葉炸熟以油鹽調食治病具見本草野園荽音雖生祥符西北田野中苗高一尺余苗葉結實皆似家胡荽但細小瘦窄味甜微辛香救飢採嫩苗葉炸熟油鹽調食治病具見本草牛尾菜生輝縣鴉子口山野間苗高二三尺葉似龍鬚菜葉葉間分生叉枝及出一細絲蔓又似金剛刺葉而小紋脈皆豎莖葉梢間開白花結子黑色其葉味微甘救飢採嫩葉炸熟水浸淘淨以油鹽調食治病具見本草山萮菜生密縣山野中苗初榻地生其葉之莖背圓面窳五化切葉似初出冬蜀葵稍小五花叉鋸齒邊又似蔚臭苗葉而硬厚頗大後攛莖深紫色梢葉頗小其味微辣救飢採苗葉炸熟水浸淘洗淨油鹽調食治病具見本草綿絲菜生輝縣山野中苗高一二尺葉似兔見尾葉但短小又似柳葉亦比短小梢頭攢生小蓇葖開黲白花其葉味微甜救飢採苗葉炸熟水浸淘淨以油鹽調食治病具見本草米蒿生田野中所在處處有之苗高人許葉似園荽葉微細葉叢間分生莖叉梢上開小青黃花結小細角似葶藶角兒味苦救飢採嫩苗炸熟水浸淘淨以油鹽調食治病具見本草舌頭菜生密縣山野中苗葉榻地生葉似山白菜葉而小頭頗團葉面不皺比山白菜葉亦厚狀類豬舌形故以為名救飢採葉炸熟水浸去苦味換水淘淨以油鹽調食治病具見本草紫香蒿生中牟縣平野中苗高一二尺莖方紫色葉似邪蒿葉而背白又似野葫蘿蔔葉微短莖葉梢間結小青子比灰菜子又小其葉味微苦救飢採葉炸熟水浸去苦味以油鹽調食治病具見本草金盞兒花人家園圃中多種苗高六七寸葉似初生萵苣葉比萵苣葉狹窄而厚抪莖生葉莖端開金黃色盞子樣花其葉味微酸救飢採苗葉炸熟水浸去酸味淘淨油鹽調食治病具見本草六月菊生祥符西田野中苗高一二尺莖似鐵桿音杆蒿莖葉似雞腸葉但長而澀又似馬蘭頭葉而硬短梢葉間開淡紫花葉味微酸澀救飢採葉炸熟水浸去邪味以油鹽調食治病具見本草柳葉菜生鄭州賈峪音欲山山野中苗高二尺余莖淡紅色葉似柳葉而厚短有澀毛梢間開四瓣深紅花結細長角兒其葉味微甜救飢採苗葉炸熟以油鹽調食治病具見本草婆婆指甲菜生田野中作比根科生莖細弱葉象女人指甲又似初生棗葉微薄細莖梢間結小花瓣苗葉味甘無毒救飢採嫩苗葉炸熟油鹽調食治病具見本草鐵桿蒿生田野中苗莖高二三尺葉似獨掃葉微肥短又似萹蓄葉而短小分生莖叉梢間開淡紫花黃心其葉味苦救飢採葉炸熟水淘去苦味以油鹽調食治病具見本草山甜菜生密縣韶華山山谷中苗高二三尺莖青白色葉似初生綿花葉而窄花叉頗淺其莖葉間開五瓣淡紫花結子如枸杞子生則青熟則紅色其葉味苦救飢採葉炸熟換水浸淘去苦味以油鹽調食治病具見本草剪刀股音古生田野中處處有之就地作小科苗葉似嫩苦苣葉而細小色頗似蘭亦有白汁莖叉梢間開淡黃花葉味苦救飢採嫩苗葉炸熟水浸淘去苦味油鹽調食治病具見本草鵝兒腸生許州水澤邊就地妥莖而生對節生葉葉似𧰎豆葉而薄又以佛指甲葉微𧣪葉間分生枝叉開白花結子似葶藶子其葉味甜救飢採苗葉炸熟以油鹽調食治病具見本草毛連菜一名常十八生田野中苗初榻地生後攛莖叉高二尺許葉似刺薊葉而長大梢尖其葉邊褗音堰曲皺上有澀毛梢間開銀褐花味微苦澀救飢採葉炸熟水浸淘淨油鹽調食治病具見本草小桃紅一名鳳仙花一名夾竹桃又名海蒳音納俗名染指甲草人家園圃中多種今處處有之苗高一尺許葉面窄邊有細鋸齒開紅花結實形類桃樣極小有子似蘿蔔子取之易迸北諍切