為末敷傷處又用金沸草根擂汁調塗筋封口便可相續止痛鈐方接骨續筋丹生血止痛乳香沒藥自然銅制南木香生地黃熟地黃川羌活川獨活防風南星松嫩心去毛粉草側柏葉醋煮草烏五枚炮去尖柘木粳火煨成炭上各等分惟松柘柏並加一倍共為細末生薑自然汁調下一錢或蜜丸彈子大薑汁和酒嚼下神授方治傷筋閃骨痛甚鮮生地黃一斤搗糟薑瓜舊糟一斤生薑四兩赤小豆半斤上搗爛同炒熱以帛裹罨傷處夾縛定不三日而安百選止痛滅瘢丹敷痛立止仍無瘢痕砂糖蔥白各等分上爛搗敷傷處一方以半夏末水調塗傷處一宿不見痕經驗續筋方金沸草根搗爛和渣汁以筋相對塗封之即續邵氏白螵子治諸傷至重但不透膜者咸白螵海味中揀大片色白而有紅絲者成片鋪貼傷處油紙罨之軟白縛定血即止如有膏脂出不傷內膜者即剃去患人頂發勿令患人知以隔帛熱尉斗於頂心尉之膏脂自入以桑白皮線縫合再用血竭草木蠟葉磁石為末摻之即合桃紅散貼損折筋骨痛腫草烏三個去皮血出肉破者不可用飛羅面天南星貝母各半兩國丹二錢上為細末生薑自然汁調貼如作潮熱者以清茶調貼如皮破見血者去草烏封口藥凡損傷肉皮破裂者以此封之牡蠣煅存性赤石脂生研國丹各等分上為細末香油調塗瘡口要消腫散血合口加血竭乾摻之神應膏治跌打刀傷接骨止痛如神臘月豬板油五兩黃蠟半斤鉛丹真者自然銅淬研密陀僧研各四兩硃砂一兩另研上用新鐺先溶豬油次下黃蠟於冷處下鉛丹陀僧自然銅緩火再煎水中滴之不散更出鐺冷下硃砂攪勻至凝丸如彈子大用筍皮趁冷收凡遇木石損傷碎者用火化開糊傷處滑上然後夾定用此藥服時重丸梧桐子大每服十丸蔥酒調下或傷深者須填孔中淺者油單紙攤貼甚者燈心裹木夾之如藥力散再覺痛更一服痛即止又痛甚者又貼之即止易簡諸方二十道益母膏治損傷瘀血在內每遇天陰則痛用損藥煎成入膏二匙調和服或只用膏一味酒調方見胎産門一方治跌打而骨未折以小粉炒黑為末臨時蔥汁煮釅醋調敷患處接骨用舊油靴皮以陳醬抹在皮上炭火燒化存性又用蛤薄蟲甜瓜子一處搗為細末每用一錢半熱酒一碗調服立效聖惠方治打撲墜損惡血攻心悶亂以乾荷葉五片燒煙盡細研食前童便一盞調三錢日三服又方打傷瘀血在骨節及血脹不行用鐵一片酒三升煮取一升服之效又方治腦骨破及骨折蔥白細切同蜜搗和厚封損處立瘥孫真人方治跌打肌肉瘀血流注紫黑色或傷面目青黑大黃為末薑汁調塗一宿黑者紫二宿紫則白矣又方治傷重血出不止大黃燒存性為末加入石灰蔥薑汁和勻作餅用時取研敷患處血即止而不害五月五日合之妙一方治跌打損傷瘀血留注經絡而成痼疾用老茄種切薄片炕干為末溫酒調服三錢日二服十年積血亦下矣塞上方治傷損瘀血在內煩悶者用蒲黃熱酒調服三錢效海藏方治跌打損傷此能推陳致新生血止痛用沒藥二錢好熱酒空心調服一方治跌打骨斷白芨末酒調三錢服神效其功不下自然銅五銖錢一方治閃折筋骨傷損用骨碎補為末煮黃米粥稠和裹患處一方治跌打損傷胡桃肉和酒杵飲之愈一方用麥麩熱酒釅醋和之敷患處一方用薑汁四兩香油四兩順攪勻以無灰酒熱調下善飲者多飲之致醉為美一方用米醋酒糟炒熱調和平胃散罨之一方骨碎者用肥皂爛搗和醋厚塗之束以帛一方接骨安置妥貼縛定用雄雞一隻以好熱酒一碗就刺雞血在酒內乘熱攪飲之即愈金瘡門古名金鏃科藥方金瘡白葉治一切金刃所傷黃柏黃芩當歸赤芍藥黃連牡丹皮生地黃木鱉子仁黃耆地骨皮桑白皮甘草各錢半白芷馬蓼梢葉生者一錢火燒過上用桐油二兩煎黃色濾去渣再煎油少熟入細白枝松香一片慢慢煎須頻頻柳枝攪勻卻入乳香沒藥虢丹各七錢煎數沸出火頃時以少綿鋪於前濾藥渣布上濾過先用瓦鉢滿盛清水八分卻濾藥於鉢水中將去清水中如繃面狀繃三二百度愈繃愈白故名白藥常以清水浸傾於冷地上用物遮蓋勿令塵入五七日一換水凡刀斧一應金傷量傷孔大小取一塊填於傷孔中以白紙護之隨手不疼一日一換五日生肉筋斷加杜仲續斷各二錢同煎收瘡口加龍骨五分煎入藥內損傷只敷於油紙上貼之即愈卻不須入接筋龍骨等劑完璧散治一切金瘡神效黃柏四兩黃連三兩黃葵花三兩焙降真末一兩檳榔二兩芍藥一兩以上共為末木鱉子半兩海螵蛸三兩二味同研龍骨一兩另研密陀僧一兩研血竭二兩麝香二錢研輕粉一錢韶粉一兩滴乳二錢黃丹三兩如法制再同研上研極細淨罐密收勿泄氣過三日方用遇金瘡血不止干貼立止所傷久以蔥鹽湯洗挹干用唾津調貼紙封留孔流膿水百草散治金瘡五月五日平旦使四人出四方各於五里內採一方草木莖葉每種各半把不可放過一件日正午時細切碓搗並石灰極令爛熟約草一石和石灰一斗先鑿大實中桑樹令可受藥取藥納孔中築實令堅仍以桑樹皮蔽之用麻油搗石灰極黏密泥之勿令泄氣又以桑皮纏之使堅牢至九月九日午時取出陰乾百日藥成搗之日曬令乾磨羅為末收貯凡一切金瘡出血折傷即時用此藥封裹再勿傷動不過十日即愈不腫不膿不畏風若傷後數日方得此藥須蔥鹽溫湯洗令血出然後敷此藥大驗平時尤宜多合以備濟人金瘡之要無出於此一方云採時勿得回顧任意摘取回入杵臼內爛搗如泥量藥多少以意入石灰和勻取出拍成餅子日中曬乾遇用旋取研細若刀斧傷干敷以血止為度湯火傷冷水調開塗敷如蛇蠍犬鼠咬傷先以溫水洗以津液調敷如疥瘡先爪破以末藥摻之濕癬以醋調藥敷之其效如神灰蛋散治金瘡血出不止及久年惡瘡石灰細研雞蛋清以和過灰成餅為度上將灰蛋糰子煅過候冷再研細遇金瘡摻之患處若多年惡瘡以薑汁調敷一方單以石灰摻傷處裹定亦血止而愈龍骨膏治金瘡龍骨赤石脂五倍子黃丹煅海螵蛸各等分上各研入麝少許共研勻摻上如干先以鹽水洗挹乾摻神聖餅子治一切金瘡跌打石木傷損血出不止敷此藥即止無膿即愈海螵蛸一兩青薊草萵苣菜韭菜各一握五月五日未時本人不語將三味同搗爛次下螵蛸杵作餅子陰乾用時搗摻之沒藥散治刀箭傷止血定痛風化石灰澱粉各一兩枯礬三錢沒藥另研乳香務一錢另研上為細末貯之用桃花散治金瘡並一切惡瘡黃丹軟石膏煅各等分和研勻如桃花色摻傷處甚妙花蕊石散太獄活血丹方見傷損門並治金瘡神效凡殺傷未透膜此藥可愈乳香沒藥各皂角子大上研爛以小便半盞酒半盞調藥通口服然後用花蕊石散或龍骨散敷上立止殺傷重甚但氣未絶以此敷上取蔥白搗爛炒熱遍敷傷處頃則再易其痛自止神仙刀箭藥桑葉陰乾為末用之凡遇傷無得末子可旋取鮮桑葉炕干為末敷鮮桑葉搗汁調金瘡藥敷傷尤速合口三神散治金刃或打傷血出不止降真香末五倍子末銅末鑄鏡面上削下者於乳鉢內研細以上各等分上和勻敷損處昔安豐擊朱嵩碎首用此而愈軍中一捻金散金櫻葉嫩苧葉各二兩桑葉一兩凡金瘡遇有鮮者搗爛敷之若欲致遠陰乾為末敷上線縛血止口合名草血竭進方以五月五日或閉日收之良生乾地黃散治金瘡傷重煩悶者生地黃白芷當歸桃仁去皮尖麩炒續斷黃芩赤芍羚羊角屑炙甘草各一兩芎藭桂心各三錢上為細末每服二錢食前溫酒調下日二服白薇散治金瘡煩悶不得眠痛不已白薇枳實辛荑仁栝蔞根赤芍炙甘草各一兩酸棗仁微炒二兩上為細末每服二錢食前溫酒調下日三服淋豆酒治因金瘡中風反張者大豆六合雞矢白乾者一合上將大豆炒令焦黑次入雞失白同炒乘熱淬入三升酒中密蓋良久濾去渣每服五合如人行五里更一服汗出佳未瘥更制一服取汗出為度服藥後宜食熱薑粥助之一方用大豆一味炒半熟搗碎以熱酒淋之熱飲覆取汗出箭頭方蜣螂乳香各等分麝香少許為末撥動摻之又方治箭鏃入骨不可拔者巴豆半粒螳螂一枚同研敷傷處微癢且忍極癢不能忍即撼動拔之以連仲湯洗以牛膽石灰散敷之又方治箭頭不出蜣螂十枚土狗三枚婦人發灰少許上將蜣螂去殼取白肉與二味同研如泥生塗中箭處少頃微癢即以兩手捉之箭頭自出解骨丸治箭頭不出雄黃蜣螂象牙末各等分為細末煉蜜丸黍米大入瘡口內後細嚼羊腎脂摩塗之覺癢箭頭自出鼠油膏出箭頭鼠一枚熬取油蜣螂皂角燒灰澱粉龍骨各一錢乳香少許另研上為細末以鼠油熬成膏敷瘡口內外用磁石末蓋之箭頭自出薰葫蘆法治金瘡得風身體強痙口噤不能言或因打破而得刀斧所傷得風臨死用此並瘥干葫蘆一枚長柄者開其口隨瘡大小相因圍塞四周勿令泄氣底開一孔取麻油燭二枝燃薰入葫蘆底進盡一枝更用一枝不過半日即愈若不止可住一二日再薰之以瘥為度劉寄奴散斂金瘡止疼痛劉寄奴不拘多少可為末摻之效治湯火傷處先以糯米湯雞翎掃上然後用此末藥摻上即止痛又無痕大凡傷處急用炒鹽末摻上護肉不壞方可用藥敷之為美朱氏集驗方云劉寄奴劉裕微時伐荻見大蛇長數丈射之傷而去明日復至聞有杵臼聲往視之見青衣童子數人搗藥問其故答曰我王為劉寄奴所射合藥敷之帝曰吾神何不死答曰寄奴王者不死不可殺帝叱之皆散收藥而返每遇金瘡敷之良驗寄奴高祖小字因名其藥云易簡諸方一方治刀斧傷打撲傷用夏枯草口嚼爛盦上即愈一方以白芨末敷之愈金瘡合口甚效一方收金瘡口以雞內金焙乾為末敷之立止蠶蛾散治刀斧傷止血定痛生肌晚蠶蛾不以多少為細末每用乾摻於瘡上以綿裹不須再動一止便可一方治金瘡血出不止亦治疳瘡五倍子生研為末乾摻上血止而不腫痛一方治金瘡傷損血出用臘月生牛膽入石灰末懸透風處候乾為末用敷金瘡血止而愈一方治金瘡諸傷瘀血不散用野苧葉捶爛塗傷處即散血如瘀血入腹用順流水擂葉去渣服即通瘀血化為水此藥於四五月收之秋後無矣一方治箭頭刀刃中在咽喉胸膈不得出及針刺入肉不出者螻蛄蟲即土狗乾者濃煎汁滴上三五度箭頭自出又方細嚼杏仁塗之亦出一方用白芨末石膏火煅共研勻干敷金瘡收口極速一方五月五日採青蒿多多搗汁和石灰或爛搗同灰和作糰子陰乾收藏用時旋研末摻一方止血定痛石灰韭菜共搗作餅干為末敷諸傷血痛隨止此藥軍中人多用之取簡而效鼠肉末酒出箭頭用大雄鼠一枚取精肉薄切焙為末每服二錢熱酒調下若覺箭瘡癢忍之少時箭頭自出孫真人方治金瘡未愈而交合血出不止取本婦人衣帶二寸燒灰為末水調服湯火傷門藥方炙柏散治湯火傷黃柏去皮淨用臘月豬膽汁塗炭火炙焦色研末敷赤石脂散治湯火傷肉赤爛痛赤石脂寒水石大黃各等分上為末新汲水調塗當歸膏治湯火傷初起泡漿熱毒焮赤疼痛毒氣壅盛腐化成膿此膏斂口生肌拔毒止痛當歸黃蠟各一兩麻油四兩先將油煎當歸焦黑去渣淨次入蠟急攪之放冷入瓷鉢內用時以帛攤貼淡寮四黃散治湯火傷發泡疼痛黃連黃柏黃芩大黃白芨各等分上為細末水調成膏以雞翎時塗瘡上又方用螺螄殼多年枯白煅為粉瘡破乾摻之不破用清油調敷之效治湯火傷未成瘡者小麥炒黑為度研為細末加入半膩粉香油調塗易簡諸方經驗方治湯火傷至妙劉寄奴為末先以糯米湯雞翎掃瘡上後將末摻上不痛亦無痕又方以白芨末白蘞末摻上止痛生肌又方用石膏末油調敷愈又方慎火爛搗搗如泥塗之效此草一名挂壁青高不上尺青葉肥莖江南人家以盆栽之置房上諺云避火草而且青翠也祕方治火傷用大蜂房不拘多少為末少用片腦香油調搽又方扁柏葉為末油調敷一方以雞子清調尤妙又方黃葵花葉為末敷竹木簽刺門藥方十二道梅師方治竹木刺入肉中不出土牛膝莖搗爛塗之又方用烏羊糞研爛水調塗之或割象於屑津塗之其刺頭出用指甲摘出又方嚼白梅肉敷之又方用鹿角燒末唾津和塗之自出桂蠟丸治惡刺入肉不出用桂皮為末以黃蠟溶化和桂末作丸如豆大遇與刺人一丸置刺處以濕紙五層扎定用炭火炙蠟丸溶入肉刺內其刺自出無刺在內者尤見速愈妙又方治刺不出者用萆麻子研爛以絹帛襯傷處為後敷藥時時看覷若覺刺出即拔之恐藥太緊好肉努出也又方用豆豉嚼爛塗之良又方用雙杏仁搗爛以車脂和塗之即出又方治諸竹木及針刺入肉不出者用生薑橘皮鹽等分研為膏塗之自出松脂方治刺入肉痛悶百理不瘥松脂敷瘡上以帛縛三五日當有根出不疼不癢不覺自落杖瘡門藥方乳香膏治杖瘡金瘡一切打破俱好乳香沒藥川芎自然銅以上各七錢當歸羌活獨活川牛膝石膏劉寄奴黑牽牛黃柏破故紙白膠香生地黃熟地黃赤芍藥白芍藥紫金皮黃丹白芷各半兩白蠟一兩麻油四兩上除膠香丹蠟外余藥為末入油內煎以柳枝不住手攪試將成膏卻入三味更試成膏以生布濾淨以瓷器盛水傾在水中用軟油單隻紙貼瘡上深者以膏塗孔中血竭膏治杖瘡血竭輕粉干胭脂密陀僧乳香沒藥各等分上為細末先以冷水洗淨拭乾以豬脂溶調搽在紅紙上貼之龍腦散治杖瘡熱毒疼痛龍腦一字輕粉錢半密陀僧二錢麝香少許黃丹一兩上為細末每用乾摻上用青布貼之留一孔去毒氣靈異膏治杖瘡金瘡跌打湯火傷久不愈而成惡毒川鬱金三兩生地黃二兩粉草一兩臘豬板油一斤上銼入豬油內煎焦色濾去渣入黃臘四兩熬化攪勻以淨器收貯浸在涼水中一日夜取起用時先以溫水洗瘡拭乾卻敷膏在瘡上外以白紙貼之止血定痛且無疤痕治凍瘡尤妙散腫圍藥治杖瘡未破只青腫者用此消腫定痛大黃無名異炒木耳炒各等分上為極細末用蜜水調圍四旁腫處易簡諸方祕方治杖瘡不問已破未破用生半夏為末韭汁調敷妙止痛止血且無痕又方單用大黃末一味以雞蛋清調敷愈二黃膏治杖瘡奇妙用黃丹黃蠟香油三味先用香油四兩鐵杓熬滾入蠟一兩再熬化提起入黃丹調得稀糊樣為度以油單紙攤貼外用帛束之不過三日愈一方治杖瘡奇效官粉一兩赤石脂一錢水銀一分以麻油鉢內杵成膏搽瘡上蓋上油傘紙縛定立效一方治杖瘡不作瘢痕止痛黍米炒黑研末香麻油調搽患處鐵布衫治打擊不痛未打之先服此藥再打並不知痛用乳香沒藥無名異自然銅地龍木鱉子去殼先將鋼煅醋內淬七次共為末煉蜜丸彈子大溫酒化下一丸臨時再酒一二盞任打不痛一方加草烏以草烏入燒紅土炕醋潑蒸之過日用
