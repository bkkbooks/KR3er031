body:
  text: 卷之七十九傷損門古方名正骨科病機傷損敘論內經曰有所墮墜惡血留內腹中脹滿不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡刺足內踝下然谷之前出血刺足肘上動脈不已刺三毛各一痏見血立已左刺右右刺左靈樞云有所墮墜惡血留於內若有所大怒氣上而不下積於脅下則傷肝又中風及有所擊打若醉入房汗出當風則傷脾又頭痛不可取於腧者有所擊墮惡血在於內痛不已則側刺不可遠取也張子和云諸落馬墜井打撲傷損閃肭損折杖瘡腫發焮痛不止者可峻下二三十行痛止腫消宜以通經散導水丸等藥或加湯劑瀉之後服和血消腫散毒之藥傷損要分亡血過多與未出血之異玉機云打撲金刃損傷是不因氣動而病生於外外受有形之物所傷乃血肉筋骨受病非如七情六淫為病有在氣有在血之分也所以損傷一症專從血論但須分其有瘀血停積而亡血過多之證蓋打撲墮墜皮不破而內損者必有瘀血若金刃傷皮出血或至亡血過多二者不可同法而治有瘀血者宜攻利之若亡血多者兼補而行之又察其所傷有上下輕重淺深之異經絡氣血多少之殊惟宜先逐瘀血通經絡和和血止痛然後調氣養血補益胃氣無不效也頃見圍城中軍士被傷不問頭面手足胸背輕重醫者例以大黃等藥利之又大黃缺少遂以巴豆代之以為不於初時瀉去毒氣後則多致危殆致於略傷手指亦悉以藥利之殊不知大黃之藥惟與有瘀血者相宜若亡血過多元氣胃氣虛弱之人不可服況巴豆大熱有毒止能破堅逐積用於此疾尤非切當所以有服下藥過後其脈愈見堅大醫者不察又以為瘀血未盡而後下之因而夭折人命可不慎歟脈候經曰肝脈搏堅而長色不青當病墜若搏因血在脅下令人嘔逆金匱云寸口脈浮微而澀當亡血若汗出設不出汗者當身有瘡被刀斧所傷亡血故也金瘡出血脈沉細者生浮大者死從高顛仆內有積血腹脹滿其脈堅強者生小弱者死凡傷損脈候既出血脈當微小未出血脈當浮大若相反者死治法治墮墜要識傷損淺深備知整頓手法良方云墮墜之病內經靈樞金匱子和所論詳矣獨正骨兼金鏃科惟危氏言其整頓手法折傷手足各有六出臼四折骨背脊骨折法十不治並用藥法至矣盡矣今之學者專攻治外不行診視不明其脈焉知內傷輕重因此有誤不淺淺耳若能識折傷出臼處搦入其窠折傷處依法夾縛明脈理何經受證用後項次序之藥終無夭閼之禍可不謹乎整理折傷治例凡手有四折骨六出臼手臂出臼此骨上段骨是臼下段骨是杵四邊筋脈鎖定或出臼亦有銼損筋者所以出臼也此骨須拽手直一人拽須用手把定此骨搦教歸窠看骨出那邊用杉木皮或竹一片夾定一邊一邊不用夾須在屈直處夾才服藥後不可放定了或時拽曲拽直此處筋多服藥後若不屈直則恐成固疾日久曲直不得肩胛上出臼只是手骨出臼歸下身骨出臼歸上或出左或出右須用舂杵一枚矮凳一個令患者立凳上用杵撑在於出臼之處或低用物墊起杵長則墊起凳令一人把住手拽去凳一人把住舂杵令一人助患人放身從上坐落骨節已歸窠矣神效若不用其小凳則用兩小梯相對木棒穿從兩梯股中過用手把住木棒正稜在出臼腋下骨節蹉跌之處放身從上出骨節自然歸臼矣腳有六出臼四折骨或腳板上交牙處出臼須用一人拽出自用手摸其骨節或骨突出在內用手正從此骨頭拽歸外或骨突向外須用力拽歸內則歸窠若只拽不用手整入窠必成廢疾腳膝出臼與手臂出臼同或出內或出外亦用一邊縛定此處筋脈最多服藥後時時用曲直不可定放又恐再出窠時常看顧不可疏慢凡跨骨從臀上出者可用三兩人捉定腿拔伸乃用腳跨入如跨骨從檔內出不可整矣凡手骨出者看如何出若骨出向左則向右邊拔若骨出向右則向左拔入凡手腳骨皆有兩陘若一脛斷則可治兩脛俱斷決不可治矣凡傷損重者大蓋要拔伸捺正或取開捺正然後敷貼填塗夾縛拔伸當相近本骨損處不可別去一節骨上凡拔伸且要相度左右骨如何出有正拔伸者有斜拔伸者凡認損處只須揣摸骨頭平正不平正便可見凡左右損處只相度骨縫子細捻捺忖度便見大概要骨頭歸臼要撏搽皮相就入骨凡拔伸或用一人或用二人三人看難易何如凡骨碎斷須要本處平正如何大抵骨低是骨不曾損左右看骨方是損處要拔伸捺正用藥貼夾縛平正方是捺正復要時時轉動使活凡皮破骨出差又拔伸不入撙捺相近爭一二分者用快刀刮些捺入骨不須割肉自爛碎了可以入骨骨入之後用黑龍散貼四圍腫處留瘡口用風流散填所用要快刀雕刀皆可凡腦骨傷損碎輕輕用手撙令平正若皮不破用黑龍散敷貼若破用風流散填瘡口絹片包之不可見風恐成陂傷風之患若水與風入腦成破傷風則必發頭疼不可復治急用玉真散敷之在發內者須剪去發然後好敷貼凡肩胛骨出相度如何整用椅一個令患人於椅後伸兩手於椅手圈住及以軟衣被盛墊脅下使一人捉定兩人拔伸墜下手腕又著手腕絹縛之凡肩井骨及脅下有損不可夾縛只是捺平令安貼平正用黑龍散貼絹縛兩脅骨亦如此凡頷骨脫令患人坐定用揉臉百十遍令患人口張開兩大拇指入患人口內拿定牙外用兩手指將下頷往上兜即入臼矣凡骨被打斷或筋骨有破處用風流散填塗卻用針線縫合其皮又四圍用黑龍散敷貼凡平處骨碎皮不破先用藥貼即用夾縛大概看曲轉處腳凹之類不可夾縛恐後伸不得止用黑龍散貼帛片包縛庶得曲轉屈伸如舊如指骨斷止用苧根夾縛腿上用苧麻繩夾縛如錢繩許凡皮破用風流散填塗未破用黑龍散貼須用杉木皮夾縛凡夾縛用杉木皮數片周面緊夾縛留開背一縫夾縛必三度必要緊凡用杉木皮浸約如指大片疏排令周匝用小繩三度緊縛三日一次淋洗換塗貼藥凡貼藥用板子一片將皮紙或油紙以水調黑龍散攤勻在上然後卷之貼損處凡打撲墜墮刀刃傷損便覺氣絶不能言取藥不及挑開口以熱小便灌之妙凡傷重必用藥水泡洗然後塗藥如傷輕不必洗便塗藥凡夾縛夏二三日冬四五日可解開夾縛處用熱藥水泡洗凡腫甚是血作用熱藥水泡洗然後塗藥黑龍散之類凡皮里有碎骨只用黑龍散敷貼後皮肉自爛其碎骨必自然出來然後方愈凡損一月內尚可整理久則不可凡傷損不可吃草藥吃則所出骨不能如舊草藥性烈故耳凡跌損腸肚汙血且服散血下血藥如四物加大黃之類凡損大小便不通未可服損藥蓋損藥用酒必熱且用四物湯承氣之類大小便通方可服損藥凡傷重者未服損藥先服氣血藥如勻氣散之類凡服損藥不可吃冷物惟牛肉極冷若吃痛不可治凡損藥必熱便生血氣以接骨耳凡損藥用酒不拘紅酒生酒只要無灰凡損藥必不可無乳香沒藥若市缺此二味以番降真香代之若缺血竭亦以降真香代之凡損藥如小紅丸大活絡丹七釐散黑龍散風流散三釐散之類皆是必用緊要之藥凡損藥三四月間不可多合五六月間尤甚存散藥以罐貯之密封口隨時旋丸用為妙凡渾身無故損痛乃是風損當用風損藥如排風湯之類用藥加減法凡損若不折骨不碎骨則不可用自然銅損藥中當去之無痰涎者不可用半夏老人有傷損骨脈冷者每服藥加當歸川芎川烏丁香木香人參去芍藥生地黃此亦是二十五味中加減之法耳或傷臟腑者不問老少如有血並痰從口中出者用清心藥加丁皮川芎半夏入二十五味內同服或皮膚熱者加黃柏皂角半兩入二十五味內同服凡傷重氣血潮作瞀悶脹痛宜先通氣而後通血血隨氣故也和劑七氣湯彭氏勻氣散烏藥順氣散俱可選用用麻藥法顛撲損傷骨肉疼痛整頓不得先用麻藥一服待其不識痛方可下手或服後麻不倒可加曼陀羅花草烏五錢用好酒調些少與服若其人如酒醉再不可加藥傷損有老幼虛弱人並血出甚者此藥逐時相度入用不可過多亦有重者若見麻不倒者又旋添些更未倒又添酒調服少許已倒便住藥切不可過多用敷藥法瘡口血出不止即用方中止血藥敷之如洗開後瘡孔大須先用降真香龍骨沒藥摻之肉即生瘡孔上須用油單紙貼放膿血出莫待蔽塞如夏月用藥以薄荷葉貼瘡孔一日一度湯洗又用藥摻如肉上滿瘡口用手搦不痛如好肉一般即用收瘡口藥敷上卻莫蔽貼待風晾瘡口立收若未生實肉切不可先收瘡口裡面恐作患也去惡血法墜墮金刃石打諸般損傷至重者皆先服清心藥次服清小便三服去血藥或被傷者血未結打從瘡口出或結在口用藥打從大腸泄下諸傷惡血未積者用藥打散四肢或歸臟腑者或歸上膈者打從口中吐出或歸中膈者打從大腸泄出先用此急救次服止痛藥即二十五味藥中加減用用藥湯使法凡藥皆憑湯使所使但先用清心藥煎後用童便一盞同服或止痛重傷者則用薑湯燈心湯調二十五味藥服之薄荷湯亦可凡傷或刀傷及內損臟腑恐作煩悶崩血之患如折骨者用薑酒服接骨藥敷之如骨碎被重打重顛重木及重石壓者皆先用湯使法並未用酒服如輕損傷者則用薑湯調下二十五味藥立效傷破肚皮用藥法如傷孔大則肚腸與脂膏俱出接收入內縫住如孔小隻有膏出先用清心藥服用手擘去膏不用縫此膏出者已無用了不可復入肚中反成禍只須擘去不妨此是間肉但放心去之肚內被傷者專用利大小便不可待祕住恐成重患傷破腸肚治療法傷損肚皮已破腸出在外若腸全斷者難治但傷破而不斷者皆可治療腸及肚皮破者用花蕊石散敷線上輕用手從上縫之莫待糞出清油捻滑放入肚內肚皮裂開者用麻縷為線或捶桑白皮為線亦用花蕊石散敷線上須用從里重縫肚皮不可縫外重皮留外皮間用藥摻待生肉傷重入內身痛者凡墮墜傷重物壓損甚者此等皆驚動四肢臟腑必有惡血留內專怕噁心先用清心藥行血藥及通大小便藥次第服之臨服加童便一二杯服自然疏通而無惡血汙積攻心之患次用止痛藥服之立效損傷十不治證凡損傷腦骨打碎在頭上可治在太陽穴乃致命處不治凡手足骨傷甚者不治凡傷損內里證候多者不治肚腸半傷破者可治全斷者不可治老人左肱壓碎者不治傷破陰子者不治血出盡者不治脈不實重者不治肩內耳後傷重透內者皆不必用藥脅下傷透內者不治藥方黑龍散貼藥始此治趺撲傷損筋骨碎痛差爻出臼先前蔥湯或藥汁淋洗拔伸整頓擦令骨相續平正後卻用薑汁生地黃汁和水調稀卻將熟軟帛或皮紙量損處大小薄攤於上貼之次以杉木皮約如指大片疏排令周匝將小繩三度縛之要緊三日一次如前淋洗貼里不可去夾直骨處勿令搖動候骨生牢穩方去夾則復如故若被刀箭傷蟲獸傷成瘡穰爛肌肉不生跌磕腫痛並用薑汁和水調貼有破則留口以風流散填塗穿山甲燒存性丁香皮各六兩土當歸二兩百草霜半兩枇杷葉去毛半兩上焙研為末薑汁水調或研生地黃汁調亦可風流散治損傷皮肉血出不止或破腦傷風用藥填塞塗敷血竭二錢半另研番降真香節四錢燈心一把龍骨花者二錢另研蘇木少許同降真另研紅花二錢焙乾為末當歸尾三錢乳香半兩同燈心研沒藥半兩另研新雞一斤一隻縛死不去毛雜用酷煮半熟砍碎用好黃泥封固穀殼文火煨乾去骨末桔梗少許上為細末每用少許乾摻瘡口上如血流不止多摻之候血藥將干又用清油調塗瘡口上修合一料以備急用淋洗湯凡傷重用此煎洗之然後上藥大生蔥一根切同牛薑一片搗爛荊芥穗銼土當歸各三錢上三味煎湯熱洗患處大活血丹治損傷筋骨疼痛浮腫腹有瘀血灌於四肢煩悶不安癰疽發背筋肉壞爛諸般風疾左癱右瘓手足頑麻婦人血風諸疾産後敗血不行流入四肢頭面浮腫血氣凝滯渾身疼痛經脈欲來作痛不來並宜服之每服半丸無灰酒磨化微煎三五沸不拘時溫服不限多少此藥將紗葛袋收持淨處經久不壞可備急用孕婦勿服損在上食後服損在下食前服傷重不拘余仿此南星薑汁浸一宿芍藥骨碎補黑豆酒煮大栗老者去皮川烏炮白芷以上各一斤自然銅火煅醋淬木鱉子切面炒川牛膝酒洗乳香各半斤同燈心另研沒藥四兩另研血竭六兩另研細辛十兩青桑炭一斤用大桑木去皮燒為炭淬醋滅上先將粗藥料為細末再以細藥各研和勻醋煮糯米糊丸如彈子大每服半丸小紅丸治傷損皮破骨出手足碎斷筋骨壞爛疼痛至甚晝夜呻吟百治不止手足久損筋骨差爻舉動不得損後傷風肢節攣縮遂成偏廢勞傷筋骨肩背疼痛四肢疲乏動用無常服壯筋骨治經絡生血氣每服三十丸生薑煎酒或鹽湯下不拘時孕婦禁服土當歸川烏炮楊白皮芍藥各六兩川芎莪朮炮各三兩肉桂四兩丁香乾薑炮各三兩細辛四兩附子三兩半制續斷一兩浸酒乳香另研沒藥另研各三錢骨碎補六兩薑製上為末醋糊丸緑豆大硃砂為衣每服三十丸酒送下大紅丸治損傷骨碎筋斷疼痛痹冷內外俱損瘀血留滯外腫內疼不問年深日近並宜服之南星制赤蘞芍藥各一斤土當歸牛膝酒浸各十兩細辛八兩赤小豆二升川烏一斤七兩炮自然銅四兩煅存性骨碎補一斤薑製青桑炭五斤醋淬上為細末醋糊丸梧桐子大硃砂為衣每服三十丸溫酒下醋湯亦可損在上食後服損在下空心服傷重不時服發明復元活血湯治從高墜下惡血流於脅下疼痛不可忍大黃酒浸半兩柴胡當歸各二錢桃仁五十枚研如泥紅花五分天花粉穿山甲炮甘草各一錢上水一鍾酒一鍾煎八分食前服局方當歸導滯散治一切墜打腫痛當歸尾酒洗大黃各二兩上為細末每服三錢酒調服以瘀血通利為度紫金散整骨續筋生肌止痛內傷肝肺嘔血不止或在心腹脹痛四肢無力左右半身風瘓並宜服之紫金皮降真香節骨碎補去毛炒琥珀當歸桃仁去皮尖炒各二兩蒲黃大黃煨各一兩續斷細者五兩無名異酒淬七次牛膝酒浸一宿各三兩朴硝半兩度過淨者上為末以蘇木煎酒調二錢日進三服效加味大承氣湯治傷損極重大小便不通者方服此藥俟大小便通方服損藥小兒孕婦勿服大黃枳殼各二錢芒硝甘草陳皮紅花當歸蘇木木通各一錢厚朴五分上咀作二服每服水盞半煎五七沸溫服不拘時此乃專治傷重在內瘀血不散腹脹二便不通心腹悶亂欲死須得此藥通下瘀血隨服損藥二十五味治損丸一切損傷骨碎筋疼不問輕重並治白芷醋炒紫金皮醋炒劉寄奴川當歸赤芍藥米泔浸黑牽牛川牛膝生地黃鹽水浸炒川芎乳香沒藥破故紙醋炒木通自然銅骨不碎者不用臨病看勢下藥草烏醋炒孕婦勿服木香川烏炮孕婦不用藿香骨碎補木賊官桂羌活獨活各一兩熟地黃鹽水炒土牛膝茶水炒各半兩金刃傷挫出臼者去自然銅惟骨碎骨折者用之自然銅服早恐成大疾只宜臨好時入之為妙其餘同研為末煉蜜丸如彈子大黃丹為衣或被跌打損傷金刃箭鏃不論輕重每服一丸溫酒磨化服細嚼酒送下病在上食前服病在下空心服沒藥降靈丹治跌打損傷筋斷骨折攣急疼痛不能屈伸及榮衛虛弱外受風邪內傷經鉻筋骨緩縱身體倦怠四肢少力沒藥另研當歸酒洗焙白芍藥骨碎補去毛煅川烏生去皮臍自然銅火煅醋淬十二次研為細末水飛過焙各一兩乳香一兩另研生地黃川芎各一兩半上為細末以生薑自然汁同煉蜜和丸每一兩分作四丸每服一丸擂碎水酒各半鍾入蘇木少許煎八分空心服花蕊石散治一切金刃箭鏃傷中及跌打損傷豬犬咬傷或至死急於傷處摻藥其血化為黃水再摻藥便活如內傷重血入臟腑熱酒童便各半調一大錢服之立效若牛觸腸出未損者急收腸入細絲或麻練為線縫合肚皮縫上摻藥血止立活並不封裹瘡口恐作膿血如瘡干以津液潤之後摻藥婦人産後敗血不盡血迷血暈惡血奔心胎死腹中胎衣不下至死者但心頭暖急以童便調一錢取下惡物如豬肝片終身不患血風血氣若在膈上有血化為黃水即時吐出或隨小便出立效圖見左下花蕊石搗粗末一兩硫黃上色明者四兩為末上和勻先以紙筋泥固濟瓦罐子一個候乾入藥密封口以鐵線扎牢候乾安在四方磚上磚上書八卦五行字樣用炭二十斤籠疊周匝自辰時從下生火先文後武漸漸上徹至晚方息經宿勿動次早取出研細末以淨瓷罐收貯依前使用泰獄活血丹治一切外傷內損墜墮折傷疼痛腹內瘀刺脅奔心及左癱右瘓走疰疼痛癰腫痔漏婦人冷氣入腹血脈不通産後敗血灌注四肢吹奶腫痛並宜服之亂髮皂角水洗淨二斤薰乾用清油二斤入鍋內頻以手炒看亂髮如糊即住火勿久炒栗楔謂栗三顆共一毯中有偏者是去殼切日曬乾皂角大黑豆熱水洗過退去黑皮烘乾花桑根如臀大者火燃煙盡醋淬取出焙各一斤萆麻仁另研塗墨三兩乳香四兩好者研入醋一碗蒸熟細墨半斤一半用萆麻仁三兩乳鉢內研塗墨上塗盡用紙裹以黃泥固濟曬乾以炭五七斤煅通紅放地上盆蓋出火氣半日一半用硇砂二兩醋化塗墨上炙乾硇砂明淨者二兩醋化塗墨上上為末入乳香膏和搗膏若少加醋糊丸彈子大甚者一丸輕者半丸無灰酒一盞乳香一豆大同藥磨化煎三五沸臨臥溫服以痛就床臥欲出汗以衣被蓋之仍以藥塗損處忌一切動風動氣之物婦人諸疾用當歸末一錢依法煎服有孕禁服乳香神應散治跌