body:
  text: 卷之七十二便濁門病機便濁敘論內經曰諸轉反戾水液渾濁皆屬於熱脾胃濕熱下流滲入膀胱故使便溲或白或赤而渾濁不清也原病式曰小便渾濁皆屬於熱如夏月天氣熱則水液渾濁冬月天氣寒則水清潔水體清而火體濁故也如清水火煎自濁戴氏曰赤白二濁俱是濕熱雖有赤白之異終無寒熱之分丹溪曰便濁皆是濕熱有痰有虛濕痰流注宜燥中宮之濕附録云人之五臟六腑俱各有精然腎為藏精之腑而聽命於心貴乎水火升降精氣內持若調攝失宜思慮不節嗜欲過度水火不交精元失守由是而為赤白濁之患赤濁是心虛有熱因思慮得之白濁腎虛有寒白濁主氣分有熱謂腎虛寒恐誤也過於淫欲而得之其狀漩白如油光彩不定漩腳澄下凝如膏糊治法赤者當清心調氣白者溫補下元又須清上使水火既濟陰陽葉和精氣自固矣便濁得於酒色太過仁齊直指云精之主宰在心精之藏制在腎凡人思慮過情酒色無度心腎氣虛不能管攝陰陽不能升降上下乖睽是以清濁不分而赤白濁證所由生也脈候兩尺脈洪數為膀胱小腸有熱必便濁洪大而澀按之無力或微細或沉緊而澀為元氣不足尺脈虛或浮者急疾者皆難治遲者易治女人尺脈澀而弱者或洪數而促者皆為便濁白帶心脈短小因心虛所致必遺精白濁治法治赤白濁以疏濕熱清痰為主丹溪曰濁證多是濕熱濕痰宜燥中宮之濕用二陳湯加蒼白朮去熱用黃柏青黛滑石山梔痰盛者以二陳加南星蛤粉神麯糊丸青黛為衣虛勞者不宜峻用寒涼當用補陰滋腎氣胃弱者兼用人參以柴胡升麻升其胃中之氣便濁與遺精治法異同便濁皆是小腸膀胱濕熱而或兼痰遺精多屬心腎邪火或主於虛病機大有不同也古人共方出治者以其固澀之意無異再若其固澀之藥庶可相同若論病機猶當推察不可一途一治今固分門立方醫者宜加詳審若論婦人白帶赤帶庶其病機同而出治可以相參也故丹溪云濁主濕熱有痰有虛赤屬血白屬氣寒則堅凝熱則流通與痢帶同治可也治案一人便濁經年形瘦作心虛主治用珍珠粉丸和定志丸服一婦人年近六十形肥奉養膏粱飲食厚味中焦不清濁氣流入膀胱下注白濁白濁即濕痰也用二陳去痰加升麻柴胡升胃中清氣加蒼朮白朮補胃去濕服四貼後濁減大半卻覺胸滿因升麻柴胡升動胃氣痰壅滿悶又用本方加炒曲白朮香附素無痰者雖升動不滿也藥方丹溪方治一切赤白濁及婦人帶下青黛蛤粉椿根白皮滑石乾薑炮黃柏炒褐色上末神麯糊丸食前空心飲湯下六七十丸立方法以黃柏去濕熱青黛解鬱熱蛤粉鹹寒入腎椿皮同固滑又方治一切濕熱濁流黃柏炒黑一兩生柏一兩蛤粉三兩神麯一兩上為末水糊丸梧桐子大每服五十丸食前服二陳湯治濁加升提之藥使大便利而小便長方見痰門珍珠粉丸治精滑白濁黃柏真蛤粉各一斤珍珠三兩一方有青黛無珍珠亦效上為末水糊丸梧桐子大每服一百丸空心溫酒下或椿皮滑石青黛俱好定志丸治心虛水火不濟遺精便濁遠志去心石菖蒲各一兩人參白茯苓各三兩上為末煉蜜丸梧桐子大硃砂為衣每服七丸空心米飲下半夏丸治濕痰流注白濁神效半夏燥濕豬苓分水肝脈弦者宜加青黛神麯糊丸服清心蓮子飲治心虛有熱小便赤濁或有沙漠方見淋門補中益氣湯治胃氣虛弱下陷便濁久而不愈者效方見內傷門局方妙香散治心虛遺精白濁麝香一錢另研人參五分木香二錢茯苓茯神黃耆遠志去心各一兩桔梗甘草各半兩辰砂二錢另研山藥二兩薑汁炒上為細末每服二錢食前溫酒調下河間祕真丸治思想無窮所欲不遂意淫於外入房太甚宗筋弛縱發為筋痿及為白淫白濁及白物隨溲而下白龍骨一兩另研訶子大者五枚砂仁半兩硃砂一兩另研一分為衣上為細末每服十丸糊丸梧桐子大空心溫酒下水陸二仙丹治赤白濁及遺精金櫻子依製法録熬膏芡實子肉為末各等分上以金櫻膏調芡實末丸梧桐子大每服三十丸空心米飲下妙應丸治赤白便濁通用真龍骨煅辰砂另研牡蠣煅研石菖蒲各二錢半川楝子蒸去核五錢白茯苓益智仁石蓮肉各三錢半桑螵蛸瓦上烙干菟絲子制上末山藥作糊丸梧桐子大每服五十丸空心人參酸棗湯下東垣治濁固本丸蓮花蕊黃連炒白茯苓砂仁益智半夏黃柏炒各三兩甘草炙一兩豬苓二兩半為末蒸餅為丸空心溫酒下五十丸子午丸治心腎俱虛夢寐驚悸常有自汗煩悶短氣悲憂不樂消渴引飲漩下赤白停凝濁甚四肢無力面黃肌瘦耳鳴頭暈韭子去殼二兩蓮肉去心枸杞子白龍骨川巴戟去心破故紙炒琥珀另研苦楮實白礬枯赤茯苓白茯苓蓮花蕊鹽蒸芡實白牡蠣文蛤各一兩硃砂兩半為衣上末用肉蓯蓉一斤酒蒸搗爛研為膏和丸梧桐子大以硃砂為衣每服五十丸空心濃煎萆薢湯下忌酒面房勞三白丸治遺精白濁龍骨牡蠣煅各一兩鹿角霜二兩上末神麯糊為丸梧桐子大每服五十丸空心溫酒送下百一固真丹治元臟久虛便濁婦人赤白帶下崩中下血並治蒼朮米泔浸咀淨片一斤分四制四兩用茴香食鹽各一兩同炒令術黃色用度四兩用川烏一兩制切片川楝子一兩和皮核同炒四兩用花椒去目一兩故紙一兩同炒四兩用好酒醋各一升同煮二三沸將術焙乾留酒上以四制術為末前煮酒醋打糊丸如梧桐子大每服三十丸男子鹽湯婦人醋點湯空心下經驗桑螵蛸散治男子小便日數十次稠如米泔或赤或白心神恍惚瘦弱少食此病多因房勞過度耗散真氣得之桑螵蛸鹽水煮遠志去心甘草水煮石菖蒲鹽炒龍骨煅研人參茯神當歸酒洗鱉甲上為末每服二錢臨臥人參湯調下白濁諸方楊氏萆薢分清飲治真元不足下焦虛寒或服寒涼利藥過多小便白濁頻數無度漩面如油光彩不定漩腳澄下凝如膏糊益智仁川萆薢石菖蒲烏藥各等分上每服四錢水一盞鹽一捻煎七分食前服一方加茯苓甘草和劑茯兔丸治思慮太過心腎虛損真元不固便溺余滴白濁夢遺白茯苓三兩菟絲子五兩制石蓮子二兩一方加五味子二兩名玄兔丹亦效上末酒糊丸梧桐子大每服三十丸空心溫酒下鹽湯亦可鎖精丸治白濁破故紙炒青鹽各四兩白茯苓五倍子各一兩上細末酒糊丸梧桐子大每服三十丸空心溫酒下濟生四精丸治白濁煩渴鹿茸制肉蓯蓉制山藥白茯苓各等分上細末米糊丸梧桐子大每服三十丸空心棗湯送下固精丸治下元虛損小便白濁或如米泔凝脂腰重少力並治牡蠣煅白茯苓桑螵蛸酒浸炙白石脂韭子炒五味子菟絲子制龍骨各等分上細末酒糊丸如梧桐子大每服七十丸空心鹽湯下仁齊煉鹽散治漏精白濁雪白食鹽不拘多少入瓷瓶按蓋密煅紅極透取出地上放一夜蓋密白茯苓山藥各一兩為末入煅鹽一兩同研勻棗肉合蜜丸梧桐子大每服三十丸空心棗湯下淡寮五子丸治小便頻數時有白濁菟絲子制韭子炒益智仁茴香蛇床子炒各等分為末酒糊丸梧桐子大每服七十丸米飲下芡實丸治勞傷心腎水火不交面如油光不定小便白濁不禁芡實肉蓮花蕊各二兩茯神山茱萸肉龍骨五味子枸杞子熟地黃酒浸韭子炒肉蓯蓉酒浸川牛膝酒浸紫石英煅七次各一兩上末山藥煮糊丸梧桐子大每服七十丸空心酒或鹽湯下八味丸治腎虛白濁方見虛損門經驗方治小便白濁出髓條酸棗仁炒白朮人參白茯苓破故紙炒益智大茴香牡蠣左邊者煅青鹽各等分上末酒糊丸梧桐子大每服五十丸空心酒下經驗加味十全湯十全大補湯加益智仁空心煎服治白濁久而不愈諸藥不效者三服即愈心虛白濁歌白濁皆因心氣虛不應只作腎虛醫四君子湯加遠志一服之間見效奇赤濁諸方局方導赤散治心虛蘊熱小便赤澀遂成赤濁方見積熱門香苓散治男婦赤濁妙香散五苓散見濕門上二味和勻等分每服三錢麥門冬煎湯空心調服三黃丸治赤濁方見熱門每服五十丸五苓散煎湯空心送下仁齊蓮子六一散治心經虛熱小便赤濁石蓮子六兩甘草炙一兩上末每服三錢燈心湯調下濟生瑞蓮丸治思慮傷心小便赤濁白茯苓石蓮肉去心龍骨生天門冬去心麥門冬去心柏子仁炒另研紫石英煅遠志制當歸酒浸酸棗仁炒龍齒各一兩乳香半兩另研煉蜜丸梧桐子大硃砂為衣每服七十丸空心溫酒或棗湯下遠志丸治小便赤濁如神遠志半斤甘草水煮去心茯神益智仁各二兩上細末酒煮麵糊丸梧桐子大每服五十丸臨臥棗湯下集成伏暑湯治心經伏暑小便赤濁人參白朮赤茯苓香薷澤瀉褚苓蓮肉去心麥門冬去心等分上咀每服半兩水煎服易簡諸方道藏經方治白濁小便頻數用陳冬瓜仁炒為末空心米湯調下三錢多服見效一方治小便白濁白茯苓四兩豬苓二兩水二碗煮一碗去豬苓用茯苓焙乾為末溶臘丸彈子大每服一丸早晨細嚼燈心棗湯下聖惠方治腎虛遺精白濁韭子二兩微炒為散食前酒下二錢一方治思慮傷脾以致白濁用厚朴薑製二兩羊脛骨炭火煅紅閉殺研如粉一兩麵糊丸梧桐子大每服百丸空心飲下一方治小便赤濁用茺蔚子莖葉搗取自然汁一小盞空心通口服若癮疹者或癢者煎湯浴灸法氣海一穴在臍下一寸半可灸五壯治白濁便不禁關元一穴在臍下三寸治同上
