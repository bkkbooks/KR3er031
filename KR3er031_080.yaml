body:
  text: 卷之八十外科理例上外科引世醫號外科為易治不過敗毒敷貼而已一切表裡輕重虛實攻補弗之審察其不誤人也幾希前代雖有外科等書亦不深著明切自薛新甫氏心法發揮及汪省之氏理例等書一出然後集外科者頗知本源由內而外發表攻裡虛補實瀉各有條綱則有辨之而未詳盡也甫集二氏之要領附於醫統俾業是者以為考據之便云癰疽敘論外科冠癰疽於雜病之先者變故生於頃刻性命懸於毫芒故也夫癰疽之名雖有二十餘證而其要有二何則陰陽二證而已發於陽者為癰為火為實發於陰者為疽為郁為虛故陽發則皮薄色赤腫高多有椒眼數十而痛淺陰發則皮厚色淡腫硬狀如頑膚隱木而痛深又有陽中之陰似熱而非熱雖腫而實虛若亦而不燥欲痛而無膿既浮而復消外盛而內腐陰中之陽似冷而非冷不腫而實赤微而燥有膿而痛外雖不盛而內實煩悶陽中之陰其人多肥肉緊而內虛陰中之陽其人多瘦肉緩而內實而又有陽變而為陰者草醫涼劑之過也陰變而為陽者大方熱藥之驟也然陽變陰者其證多猶可返於陽故多生陰變而陽者其證少不能復為陽矣故多死然間有生者此醫偶合於法百中得一耳所謂發者積於中而發於外也大抵人之一身皆本於五臟五臟之氣皆本於胃氣胃氣為五臟之根本故胃受谷脾化之以生氣脾主肌肉胃氣傳五臟而行血脈以經絡一身而晝夜一周雖癰疽有虛實寒熱皆由氣鬱而成其因有三內因外因不內外因內因候於人迎人迎者左關是也人迎指左關誤也內因當候於胃脈之人迎胃為五臟六腑之源故主內因也外因候於氣口氣口者右關是也以氣口專指右關誤也兩手皆為氣口經曰氣口者太陰也太陰肺司皮毛腠理故以外因候氣口明矣人迎氣口脈和平則為不內不外因也其源有五一天行時氣二七情內郁三體虛外感四身熱搏於風冷五食炙爆飲酒服丹石等熱毒以此五者為邪氣鬱於胃中胃氣盛而體實則邪氣相搏而流注於經絡澀於所滯血脈會聚壅結而成癰胃氣弱而體虛則邪氣盛而宿於經絡凝滯留積血脈不朝內腐而成疽故曰外形如粟中可容谷外貌如錢里可養拳惡毒膿管寸長深滿膿血膠黏用藥可痊臭穢無絲血敗氣衰陽絶陰盛神仙難醫醫之用當酌其宜量人虛實察病冷熱推其所因究其所原而後治之治內外相應不可一概而施治矣如病發於陽而極熱則當有順其氣勻其血氣順則邪毒宣通而不滯血勻則血脈流動而自散蓋氣為陽血為陰陰陽調和病者自安外則用涼藥而觸之熱盛則氣得涼而易散不散則熱已痿而血凝於涼此陽變而陰之漸乃壞爛之根也急以溫涼以治解其外攻四圍之血路出其中間已成之膿毒然後依法以收其功也如病發於陰而極冷則內用平補之藥以宣其氣滋其血助其元陽健其脾胃待其飲食進精神回然後順氣勻血如常法外用熱藥以朝會一身之氣血回死肌拔毒氣然後用溫藥以散之其極冷者或又為涼藥所誤不得已用三建而回陽則病必旁出再作方為佳此陰變為陽之候更生之兆也若內陽不回外證不見是為獨陽絶陰不可為矣蓋陽者氣也陰者血也陽動則陰隨氣運則血行氣不運則血死血死則肌死肌死則病死矣冷證則用熱藥者不過行氣血也氣血遇熱則行涼則止也雖然冷熱之藥用之固妙尤當先乳香豆粉救其心護其膜蓋心為一身之膜為五臟之囊槖病之初發毒必上攻心胞絡故先嘔逆而後癰疽或先癰疽而後嘔者胞絡根於心者苟治之不早則心主受毒神無守舍元氣昏瞑矣病之初發毒沁膀胱肌肉苟治之不早則毒氣透膜膜透則元氣泄臟腑失養精神枯槁脈壞絶矣故病至盛而生者內見五臟而膜完全者也亦有至微而死者肌肉未潰而膜先透者也此救心護膜所以為第一義歟是方乃遇神仙祕授神聖工巧不可具述寶之寶之青囊書癰疽條論聖惠方云癰疽何以別之然五臟不調則致癰久患消渴之證亦多發癰疽之疾飲食不節喜怒不常陰氣不足陽氣有餘榮衛不和則血澀不行血澀不行則衛氣不通而熱相搏乃發為癰疽故生大熱甚則肉腐為膿然不能陷肌膚於骨髓骨髓不為焦枯五常不為傷損下陷肌膚骨髓傷損內連五臟血氣枯竭當其病下陷筋骨良肉無餘癰疽之生有內有外內則生於胸腹臟腑之間外則生於膚腠肌肉之表凡此二毒發無定處而有常名夫癰之本者死於血老不作汗內陳不脫垢蒸氣不能外達留積而成熱所為也夫癰疽疔毒膿水之成非天降非地出蓋積熱之所成也夫保全性命者謁醫於無傷防萌於未形理之未成是謂朝覺夕理然而發有多端感動不一為瘡為癤為疔為癰為疽初覺小勢須懷大怖時人輕之誤死者衆夫癰疽初生其患至微人多不以為然宜速療治熱發於皮膚之間是以浮腫根小至大不過一二寸為癰也大府積熱騰出於外內之間其發暴盛腫皮光軟侵展廣大為癰疽有虛有實虛則補之實則瀉之有實熱者易療虛寒邪熱者難治腫起堅硬膿稠為實腫下軟慢膿清者為虛蓋病多有方法而無次序臨時倉惶何能辨治多誤致斃也夫治癰疽者同夫暴厥之疾有是傷必為患然而發癰疽宜乎急治者有發於喉舌頭面腦項之間肩背胸膈乳奶之上生此險處皆為大毒朝覺夕理或可獲痊或不遇良醫自復明此兼使常醫治之得痊幸矣人多不知為急慢其始初延及勢大毒成難救以此傷生者多矣凡療癰疽如救火拯溺追奔逐賊之類若不速療必為大禍然癰疽所發有三等腫高而軟者發於血脈腫低而堅者發於骨肉皮色不變者發於骨髓瘡淺者欲在薄處瘡深者欲在厚處也癰疽腫大按乃痛者膿深小按便痛者膿淺所按之處不復者無膿必清水也按之即復者有膿也發腫都軟者血瘤也非癰也發腫日漸增長而不大熱時時牽痛者氣瘤也謂氣結為腫久久不消亦成癰疽疔毒此是氣塞所為也留積既久潰肉腐膿因人盛衰因病變異而施治之斯能痊也虛實條論瘡瘍之證五善之中見一二善證者可治七惡之內見一二惡證者難治若虛中見惡證者不救實中無惡證者自愈此證雖云屬火未有不由陰虛而致者故經云督經虛從腦出膀胱經虛從背出豈可專泥於火而用苦寒藥乎夫苦寒之藥雖治陽證尤當分表裡虛實次第時宜豈可始未悉用涼藥凡瘡堅硬而不澤不澤不光澤而色夭堅如牛項之皮瘡頭如粟脈洪大按之澀此精氣已絶死不治癰疽之作皆五臟六腑蓄毒不流非獨榮氣壅塞而發其行也有處其生也有歸假令發於喉舌者心之毒皮毛者肺之毒肌肉者脾之毒骨髓者腎之毒發於下者陰之毒發於上者陽之毒外者六腑之毒內者五臟之毒故內曰壞而外曰潰上曰從下曰逆發於上者得之速發於下者得之緩感於六腑者易治感於五臟者難治也發背腦疽大疔懸癰脫疽腳發之類皆由膏粱厚味盡力房勞七情六淫或丹石毒藥精虛氣耗所致非獨因榮衛凝滯而生也必灸之以拔其毒更辨其因及察邪在臟腑之異虛實之殊而治之庶無誤也凡大癰大疽藉氣血為主若塌而不起或潰而不腐或不收斂及膿少或清皆氣血虛也宜大補之以參耆之類切忌苦寒攻伐之劑亦有膿反多者乃氣血虛不能禁止也若潰後發熱作渴脈大而膿愈多此真氣虛邪氣盛也俱不治氣血充實之人患腫高皆赤色易腐潰而膿且稠又易收斂怯弱之人多不起發不腐潰及難收斂若不審察妄投攻劑虛虛之禍不免矣大抵瘡之始發先發為腫氣血鬱積蒸肉為膿故多痛膿潰之後腫退肌寬痛必漸減若反痛甚乃虛然也宜補之有穢氣所觸者和解之風寒所逼者溫散之齊氏云名德之元太醫令瘡疽之證有臟腑氣血上下真邪虛實不同也不可不辨腫起堅硬膿稠者實也腫下輕慢膿稀者虛也瀉利腸鳴飲食不入嘔吐無時手足俱冷小便自利或難大便滑聲音不出精神不爽悉臟腑虛也大便硬小便澀飲食如故腹滿膨脹胸膈痞悶肢節疼痛口苦咽乾煩躁多渴身熱脈大精神昏塞悉臟腑實也諸瘡疽膿水清稀瘡口不合聚腫不赤肌寒肉冷自汗色脫者氣血虛也腫起色赤寒熱疼痛皮膚壯熱膿水稠黏頭目昏重氣血實也頭痛鼻塞目赤心驚咽喉不利口舌生瘡煩渴飲冷睡語咬牙者上實也精滑不禁大便自利腰腳沉重睡臥不寧者下虛也肩項不便四肢沉重目視不正睛不瞭瞭食不知味聲嘶色敗四肢浮腫者真氣虛也腫焮尤甚痛不可近多日不潰寒熱往來便後祕塞便前如淋心神煩悶恍惚不寧者邪氣實也又曰諸痛為實諸癢為虛又曰其脈洪大而數者實也微細而軟者虛也虛則補之和其氣血托裡是也實則瀉之疏利而導其氣是也經云血實宜決之氣虛宜掣引之潰瘍雖有表證發熱宜以托裡藥為主佐以發表劑腫瘍腫瘍者癰疽未見膿而腫者也丹溪云腫瘍內外皆壅宜托裡散為主如用大黃宜戒猛浪之非潰瘍潰瘍者癰疽之膿已潰出者也丹溪云潰瘍內外皆虛宜以補接為主欲用香燥宜戒虛虛之失腫瘍治法腫高焮痛脈浮者邪在表也宜托治之內托復煎散是也腫硬痛深脈沉者邪在內也宜下之黃連內疏湯仙方活命飲苦參丸之類是也外無焮腫內則便利調和者邪在經絡也宜和榮衛托裡養榮湯白芷升麻輩焮痛煩躁或咽乾作渴者宜降火黃連解毒湯焮痛發熱或拘急或頭痛者邪在表也宜散之荊防敗毒散人參敗毒散之類汗之瘡已是也大痛或不痛者邪氣實也宜隔蒜灸之更用解毒劑仙方活命飲煩躁飲冷焮痛脈數者邪在上也宜清之清涼飲金銀花散是也惡瘡久而不潰者氣實兼寒邪也宜宣而補之十宣散是也焮痛發熱汗多大渴便祕譫語者結陽證也宜下之黃連內疏湯破棺丹是也不作膿或熟而不潰者虛也宜補之補中益氣湯十全大補湯八珍湯是也焮痛或不作膿者邪氣凝結也宜解之仙方活命飲腫痛飲冷發熱睡語者火也宜清之清心湯防風通聖散加黃連不作膿或不潰及不斂者陽氣虛也宜補之托裡消毒散瘡後當調養若瘰癧流注之證尤當補益否則更扶不起難以措治矣潰瘍治法膿熟不潰者陽氣虛也宜補之聖愈湯是也瘀肉不腐者宜大補陽氣參耆歸術是也更以桑柴火灸之膿清不斂者氣血俱虛宜大補八珍湯是也潰後食少不睡或發熱者虛也宜補之內補黃耆湯倦怠懶言食少不睡者虛也宜補之黃耆人參湯寒氣襲於瘡口不斂或陷下不斂者溫補之十全大補湯脈大無力或微澀而肌肉遲生者氣血俱虛也峻補之十全大補湯出血或膿多煩躁不眠者乃亡陽也急補之膿多或清者氣血俱虛也宜峻補之右關脈弱而肌肉遲生者宜健脾胃六君子湯是也膿清補之不應及不痛或木悶及硬堅者俱不治潰瘍作痛膿出而反痛者虛也宜補之膿潰之後脈澀遲緩者易愈以其有胃氣故也脈細而沉時直者裡虛欲變證也若痛尚未痊洪滑粗散者難療以正氣虛邪氣實也脈數虛而痛者屬陰火宜滋陰托裡散加地黃脈數實而痛者邪氣實也宜泄之脈實便祕而痛者邪在內也宜下之清涼飲脈澀而痛者氣血虛寒也溫補之定痛托裡散若有膿為脂膜間膈不出或作脹痛者宜用針引之或用利刀剪之腐肉堵塞者去之潰瘍發熱脈浮或弱而熱或惡寒者陽氣虛也宜補氣補中益氣湯脈澀而有熱者血虛也宜補血四物湯人參養榮湯之類是也午前熱者補氣為主四君子湯之類午後熱者補血為主四物湯脈浮數發熱而痛者邪在表也宜散之脈沉數發熱而痛者在內也宜下之東垣云發熱惡熱大渴不止煩躁肌熱不欲近衣脈洪大按之無力或目痛鼻乾者非白虎湯證也此血虛發熱宜當歸補血湯又有火鬱而熱者如不能食而熱自汗氣短者虛也宜以甘寒之劑瀉熱補氣如能食而熱口苦幹燥大便難者以辛苦大寒之劑下之以泄火補水瘡瘍膿血大泄當大補氣血為先雖有他證以末治之凡癰大潰發熱惡寒皆屬氣血虛甚若左手脈不足者補血藥多於補氣藥右手脈不足者補氣藥多於補血藥切不可發表癰疽脈狀浮脈主表證浮數之脈應發熱不發熱反惡寒癰疽也脈洪主血實積熱腫瘍洪大則瘡勢進膿未成宜下潰膿後洪大難治若自利者不救滑脈主熱主虛膿未潰者主內消膿潰後宜托裡所謂始為熱終為虛也數脈主熱仲景曰數脈不時見主生惡瘡又曰肺脈俱數則生瘡諸瘡脈洪數里欲有膿結也散脈膿潰後煩滿尚未全退其脈洪滑粗散難治以正氣虛邪氣實也又曰肢體沉重肺脈大則斃謂浮散也芤脈主血氣虛膿潰後見之易治牢脈按之實大而弦且浮且沉而有堅實之意瘰癧結核得之不可內消實脈久病虛人得此最忌瘡疽得此宜急下之以邪氣與臟腑俱實故也弦脈浮弦不時見為飲為痛主寒主虛弦洪相搏外緊內熱欲發瘡疽緊脈主痛瘡腫得之氣血沉澀澀主氣澀血虛膿潰後得之妨短脈諸病脈短難治瘡腫脈短真氣短也細脈主亡陽陽氣衰也瘡腫脈來細而沉時直者裡虛欲變證也微脈主虛真氣復者生邪氣勝者危凡瘡腫潰後脈微而至勻者當自差遲脈痼疾得之則善若新病得之主氣血虛憊潰後得遲脈必自痊緩脈見於瘡腫潰後皆易愈沉脈水氣得之為逆瘡瘍後得之邪氣深虛脈為血氣不足也腫瘍得之宜托裡和氣養血是也濡脈主氣血俱虛瘡腫得之宜補虛托裡排膿弱脈主虛形氣不足大抵瘡家得沉遲濡弱之脈皆宜托裡而從補法也促脈主熱蓄於裡下之則和瘡脈促宜急下之代脈諸病見之不祥瘡瘍促結亦難治況代脈乎動脈動於陽陽虛發厥動於陰陰虛發熱治瘡瘍脈狀身重脈緩濕重除濕身熱脈大心燥發熱腫瘍乍來乍去除熱諸痛眩運動搖脈弦者去風脈澀氣滯燥渴亡津液脈澀瀉氣補血寒勝則浮食不入便溺多惡寒脈緊細瀉寒水數脈時見必生惡瘡諸浮數脈應發熱反灑淅惡寒若有痛處當發癰疽脈滑而數滑則為寒數則為熱滑為榮數為衛榮相逢則結為癰熱之所過則為癰膿東垣曰瘡瘍憑脈今世外科只視瘡形並不察脈所以不辨虛實而誤人者多矣瘡瘍五善七惡醫瘡概舉五善七惡此特謂腸胃之內臟腑瘡疽之證也發背腦疽別有善惡載之於後五善者動息自寧飲食知味為一善大小便調為二善膿潰腫消水鮮不臭為三善神彩精明語聲清亮為四善體氣平和為五善七惡煩躁時嗽腹痛渴甚或泄利無度或小便如淋一惡也膿血既潰腫焮尤甚膿色敗臭痛不可近二惡也目視不正黑睛緊小白睛青赤瞳子上看三惡也喘粗短氣恍惚嗜臥四惡也肩背不便四肢沉重五惡也不能服藥食不下不知味六惡也聲嘶色敗唇鼻青赤面目四肢浮腫七惡也五善之中乍見一二善證瘡亦回也七惡之內忽見一二惡證宜深懼之又有證合七惡皮急緊而知善又或證合五善皮緩虛而知惡此又在人詳審大抵虛中見惡證者不可救實證無惡候者當自痊瘡瘍膿潰後尚煩痛脈洪大滑數者難治微弱遲緩者易痊諸瘡五逆白睛青黑眼小服藥則嘔腹痛渴甚肩項中不便聲嘶色脫是為五逆其熱渴利嘔蓋毒氣入里臟腑之傷故不治定癰死地分一伏兔二腓腨三背四五臟俞五項六腦七髭八鬢九頤背上九處不可患癰第一入髮際為玉枕亦為舌本第二頸項節第三椎為崇骨第四大椎為玉臟第五脊骨兩邊肺俞穴第六夾脊兩邊脾俞及肝俞穴第七夾脊兩邊腎俞二穴第八後心對鳩尾第九鳩尾骨穴正面五處不可患癰第一喉骨為垂膺第二胸為神舍第三心鳩尾第四當兩乳穴第五當臍中為神闕第六臍下二寸為腸屈間側面三處不可患癰耳下近耳後牙車尖央陷中為喉脈一穴當臍下一穴為肩骨承山上三寸一穴腨腸癰發有不可治腦上諸陽所會穴則髓出頸項近咽喉一有所礙藥食莫進腎俞與腎相抵命之所關穴則透空此三處有疽並難治發背透膜者不治此言肝俞以上未潰肉陷面青唇黑便瘀者死此言臟壞便血右頤後一寸三分毒鋭者不治潰喉者不治陰入腹者不治入囊者死鬢深及寸余者不治瘡瘍腰背強急瘛瘲皆不治發背治之難易疽發背上以兩手上搭著者謂之左右搭頭多如蜂窠者易治以兩手下搭著者謂之腰疽亦易治以兩手上下俱搭不著者謂之發背此證最重以上所言地分皆脈絡所會內系臟腑患者得而早言醫者審證按法治之皆為不死設不早治治不對證雖發於不死地分恐亦誤死也占色候生死病人目中赤脈從上下貫瞳人一脈一年死二脈二年死若脈下者療之瘥而上忽多赤貫上下如脂赤色從額上下至鼻黑色出額上大如指及連鼻上至肩併為死候癰之源有五一天行二瘦弱氣滯三怒氣四腎氣虛五服法酒服丹藥食炙爆熱毒生癱所感不同膏粱之變足生大疔受如持虛膏粱厚味熱毒內積其變多生大疽其受毒部分則毒從虛處受之大疔大疽也以其根深在內也此言疽因厚味內熱為變而生陽氣者精則養神柔則養筋開闔不得寒氣從之乃生大僂陷脈為瘻留連肉腠人身陽氣其精微以養神其柔和以養筋陽氣在筋表開法失宜在外寒氣從而襲之如襲其筋絡則筋絡拘急為僂俯如陷入經脈則經脈凝瘀為表瘻留連分肉節腠間不易散矣此言陽僂因陽氣開闔失宜外寒襲陷經脈凝瘀而生也榮氣不從逆於肉理乃生癰腫榮生血榮氣流行失宜不從其道阻逆於肉理則血鬱熱聚而為癰腫此言癰腫因榮氣失宜逆於肉理血鬱熱聚而生也三陽為病發寒熱下為癰疽三陽為太陽在上為手太陽小腸在下為足太陽膀胱故在上發寒熱在下為癰腫當視三陽之脈辨治之東方之域魚鹽之地其民食魚嗜咸安其處美其食魚熱中鹽勝血故其民黑色疏理其病為癰疽諸癰腫筋攣骨痛此寒氣之腫八風之變也經曰寒傷形形傷腫八風八方之風靈樞云東南方來名弱風傷人也在肌西南方來名謀風傷人也在肉東方來名嬰兒風傷人也在筋北方來名大剛風傷人也在骨此寒氣之腫八風之變而為癰腫筋攣骨痛腎移寒於肝癰腫少氣腎傷於寒轉於脾脾主肉分肉之間衛氣行處腎寒移脾則分肉寒而衛氣礙故堅結為癰腫肉結血傷而氣少此言癰腫因寒傳脾而生也脾移寒於肝癰腫筋攣脾主肉肝主筋肉溫則筋舒今脾傳寒於肝故肉寒則衛氣結聚為癰腫筋寒則急為筋攣皆寒傳肝也肝滿肺滿腎滿皆實則為肝肺腎癰滿實脈氣滿實也以臟氣邪盛故脈氣如是此言肝肺腎癰因臟氣邪盛而生當察脈治癰生源於臟腑五臟菀熟癰發六腑菀積也熟熱也五臟積熱六腑受之陽熱相搏熱之所過則為癰也此言五臟積熱六腑受生六腑不和留給為癰六腑屬陽而主氣肌肉上為陽脈邪氣遊於六腑則肌肉上之脈不和邪氣停留肌膚結聚而為癰腫矣辨臟腑內癰中府隱隱痛者肺疽其上肉微起者肺癰巨闕隱隱痛者心疽其上肉微起者心癰期門隱隱痛者肝疽其上肉微起者肝癰章門隱隱痛者脾疽其上肉微起者脾癰京門隱隱痛者腎疽其上肉微起者腎癰中脘隱隱痛者胃疽其上肉微起者胃癰天樞隱隱痛大腸疽其上肉微起大腸癰丹田隱隱痛三焦疽其上肉微起三焦癰關元隱隱痛小腸疽其上肉微起小腸癰明瘡瘍本末今富貴之人飲食肥甘日久太過其氣味俱厚之物乃陰中之物不能走空竅先行陽道反行陰道逆於肉理則濕氣大勝子土能令母火實火乃大旺熱濕既盛必來克腎若雜以不順必損其真水腎腎既受邪積久水泛水泛則從濕熱之化而上行其瘡多出背出腦此為大疔之最重也若毒氣行於肺或脾胃之部分毒之次也若出於他經又其次也濕熱之毒所止處無不潰爛故經曰膏梁之變足生大疔受如持虛如持虛器以授物物無不受故治大疔之法必當瀉其榮氣以標本言之先受病為本非苦寒之劑為主為君不能除其苦楚疼痛也陰滯於陽為疽陽滯於陰為癱癰疽因陰陽相滯而生蓋氣陽也血陰也血行脈內氣行脈外相併周流寒與濕搏之則凝泣行遲為不及熱與火搏之則沸騰行速為太過氣得邪而鬱則津液稠黏為痰為飲積久滲入脈中血為之濁此陰滯於陽也血得邪而鬱隧道阻隔或溢或結積久滲出脈外氣為之亂此陽滯於陰也病皆由此不特癰疽陽滯於陰謂陽盛而滯其陰脈則浮洪弦數滯於陽謂陰弱而滯其陽脈則沉弱細澀陽滯以寒治之陰滯以熱治之汗之則瘡已經曰汗之則瘡已此治癰疽之大法也又曰營氣不從逆於肉裡乃生癰腫凡瘡瘍皆因營衛鬱結於經絡而遂成癰腫潰爛大抵始初宜用發散疏通如活命散奪命丹之屬汗之以疏泄營衛之邪毒即大勢自衰然後細分治理清涼解利和氣行血必不至於危殆而不可救也瘡疽分三治潔古云瘡瘍者火之屬須分內外以治其本經曰膏粱之變足生大疔其源在裡發於表也受如持虛言內結而發諸外皆是從虛而出也假如太陽經虛從鬢而出陽明經虛從髭而出督脈經虛從腦而出經曰地之濕氣感則害人皮肉筋脈其源在外盛則內行也若脈沉實當先疏通以絶其源若脈浮大當先托裡以防邪氣侵內又有內外之中者邪氣至盛遏絶經絡故發癰腫經曰榮氣不從逆於肉理乃生癰腫是也此因失托裡及失疏通及失和榮衛而然也治瘡大要須明托裡疏通行榮衛三法托裡者治其外之內也疏通者治其內之外也行榮衛者治其中也內之外者其脈沉實發熱煩躁外無焮赤痛深在內邪氣沉於裡也故先疏通以絶其源如內疏黃連湯是也外之內者其脈浮數焮腫在外形證外顯恐邪氣極則肉行或汗或先托裡以防入內如荊防敗毒散內托復煎散是也內外之中者外無焮惡之氣內則臟腑宣通知其在經當和榮衛如當歸黃耆湯東垣白芷升麻湯是也用此三法雖未全瘥必無變證亦可使邪氣峻減而易痊也其汗下和解之間又有外治之次第詳見天容穴疔瘡條瘡瘍灸法總論精要曰瘡瘍灸法有回生之功大凡針灸若未潰則拔引郁毒已潰則補接陽氣祛散寒邪瘡口自臺其功甚大瘡瘍在外者引而拔之在內者疏而下之若毒氣鬱結氣血凝聚輕者或可藥散重者藥無全功東垣云若不針烙則毒氣無從而散膿瘀無從而泄過時不烙反攻於內故治毒者必用隔蒜灸舍是而用苦寒之劑其壯實內有火者或可彼怯弱氣寒未有不敗者也又有毒氣沉伏或年高氣弱若服克伐之劑氣血愈虛膿因不潰必假火力以成功凡疔毒痛甚者則灸至不痛不痛者灸至痛亦無不愈中虛者不灸而服毒藥則瘡毒未除中氣先傷未有不敗者也李氏云治疽之法著艾勝於用藥緣熱毒中隔內外不通不發泄則不解散又有處貧居僻一時無藥用灸尤便大概用蒜取其散毒有力著艾炷多者取其火力透也如法灸之瘡發膿潰繼以神異膏貼之不日而安一則瘡不開大二則內肉不潰三則瘡口易合見效甚速瘡瘍針法總論經曰癰疽之生膿血之成積微之所生也故聖人治病於未形愚者反是已成膿者惟砭石鈹鋒之所取也瘡瘍一科用針為貴用之之際須視其潰之淺深審其肉之厚薄若皮薄針深反傷良肉益增其潰肉厚針淺膿毒不出反益其痛至於附骨疽氣毒流注及其經久不消內潰不痛宜燔針開之若治咽喉當用三稜針若丹瘤及癰疽四畔赤焮疼痛如灼宜砭石砭之去血以泄其毒重者減輕者消精要又云癰有椒眼十數頭或如蜂窠蓮房膿血不出者用針橫直裂之如無椒眼之類只消直入取膿不必裂之一法當椒眼上個個灸之亦佳不必裂也又云癰者皮薄腫高多有椒眼粒疽者皮膚頑硬狀如牛頸之皮癰成膿則宜針針宜用馬銜鐵為之形如韭葉樣兩面皆利可以橫直裂之五六分許攻去毒血先灸之而後裂疽成膿則宜烙可用銀篦大二寸長六寸火上燒令赤急於毒上尉烙得膿利為度烙法方其已熟未潰之時用鐵箸一烙極是快意方扇火欲著時誠是驚人豫常用矣臨時猶且顫悸況未曾經歷者乎烙後膿水流通百無所忌名曰熟瘡其瘡突者針口宜向下然須是熟於用烙者識淺深知穴道審生熟非其時則所出皆生血當其時則出黃膿瘀肉用尖針烙者不得法尖針頭細其口易合惟用平圓頭者為妙蓋要孔穴透或恐瘡口再合用牛膝根如瘡口之大小略割去粗皮插入瘡口外留半寸許則用嫩橘葉地錦草各一握研成膏敷之牛膝能使惡血常流二草溫涼止痛隨干隨換此十全之功也火烙針其針圓如箸大頭圓長六七寸一樣二枚捻蘸香油於炭火中燒紅於瘡頭近下烙之宜斜入向軟處一烙不透再烙必得膿出瘡口烙者名熟瘡膿水當流不假按抑仍須紝之勿令口合論瘡瘍須針決凡瘡不起者托而起之不成膿者補而成之使不內攻膿成宜及時針之若畏痛而不肯針者誤也有恐傷良肉而不肯針者惑也殊不知瘡雖發於肉薄之處若膿成其腫亦高寸余瘡皮又厚分許用針深不過二分若發於背腫高必有三四寸針入止於寸許況患處肉已壞矣何痛之有何傷之慮怯弱之人及患附骨疽待膿自通必至大潰不能收斂血氣瀝盡而亡者多矣灸刺須分經絡劉河間云灸刺瘡瘍須分經絡部分氣血多少俞穴遠近從背出者當從太陽五穴選用至陰在足小指外側去爪甲角如韭葉通谷在足小指外側本節前陷中是穴束骨在足小指外側本節後陷中崑崙在足外踝後跟骨上陷中委中在膕中央約橫紋中動脈是穴從鬢出者當從少陽五穴選用竅陰在足小指之次指端去爪甲如韭葉是穴夾溪在足小指次指岐間本節前陷中臨泣在足小指次指本節後間陷中陽輔在足外踝上四寸輔骨前絶骨端如前三分陽陵泉在膝下一寸外臁陷中從髭出者當從陽明五穴選用厲兌在足大指次指去爪甲如韭葉內庭在足大指次指外間陷中陷谷在足大指間本節後陷中衝陽在足趺上五寸骨間動脈去陷谷三寸解溪在衝陽後一寸五分腕上陷中從腦出者則以絶骨一穴在外踝上三寸動脈中一說癰疽初發必先當頭灸之以開其戶次看所發分野屬何經脈即內用所屬經脈之藥引經以發其表外用所屬經脈之俞穴針灸以泄其邪內外交治邪無容矣騎竹馬灸法丹溪曰諸項灸法皆好惟騎竹馬灸法尤為切要此消患於未形也其法先令患人以肘憑几豎臂腕腰直用篾一條自臂腕中曲紋盡處男左女右貼肉量起直至中指尖盡處為則不量指中卻用竹槓一條令患人脫衣騎定令身正直前行二人扛起令腳不著地又令二人扶定勿令僵仆卻將所量臂腕篾從竹槓坐處尾骶骨盡處直豎竹上貼脊背量至篾盡為則用墨點此只是取中非灸穴也另用薄篾量病人中指節相去兩橫為則男左女右截為一則就前所點記處兩邊各量開盡處則是灸穴各灸五壯或七壯不可多灸不問癰生何處及乳癰並用此法灸之無不愈者一云疽發於左即灸左疽發於右即灸右甚者左右皆灸蓋此二穴心脈所過處經曰諸痛瘡瘍皆屬心火又云心主血心氣滯則血不行故逆於肉理而生癰灸此使心火調暢血脈流通即能奏效起死回生隔蒜灸法東垣曰初覺發背欲結未結赤熱腫痛先以濕紙覆其上立視紙先干處即癰頭也取蒜切片如三錢厚安頭上用大艾柱艾之三壯換一蒜片痛者灸至不痛不痛者灸至痛早覺早灸為上一日二日十灸十活三日四日六七活五日六日三四活過十數日者不可灸若有十數頭作一處者用蒜研成膏作薄餅鋪頭上聚艾燒之亦能活也若初發赤腫中間有一黃粟米頭便用獨蒜切去兩頭取中間切片安瘡頭上著艾灸十四壯多至四十九壯本事方云一人四月背疽治之逾月益甚矣以艾加瘡上自旦及暮灸百五十壯知痛乃已明日鑷去黑痂膿盡不痛使別以藥敷之日一易易時旋去黑爛月餘乃平丹溪曰癰疽之發或因內有積熱或因外寒而鬱內熱若於始發之際外灸以散其毒治之早者亦可移重就輕轉深於淺元戎云瘡自外而入者不宜灸自內而出者宜灸外入者托之而不內內出者接之而令外故經云陷者灸之蜞針法其法取大活蜞二三枚先以竹節無底者二寸高許安瘡頭上少注水於其竹中放蜞入任吮其瘡血出蜞亦飽脹而死瘡去惡血亦漸輕愈隨用藥治之有云蜞針吮血可施於輕小證候若積毒在臟腑徒竭其血於外無益愚謂雖用蜞針仍須按證施藥則內外兼治亦可已矣若云徒竭其血於無益斯言過唉毒為積血而成今吮去其惡血亦驅其毒之一端也附子餅灸法附子為末唾津和為餅如三錢厚安瘡上以艾炷灸之漏大炷大漏小炷小但灸令微熱不可令痛干則易之如咽則止來日如前再灸直至肉平為效仍用前補藥作膏貼之豆豉餅灸法豆豉餅專治發背已潰未潰用江西淡豆豉為末唾津和作餅置患處灸之餅乾再用唾津和之瘡大用水和搗成硬泥依瘡大小作餅子厚三分如已有瘡孔勿覆孔上四布豉餅列艾其上灸之使微熱勿令破肉如熱痛急易之日灸三度先有瘡孔者孔出汗即瘥八味丸治驗人有不耐勞不能食冷或飲食作脹大便不實或口舌常破生瘡服涼藥愈盛盜汗不止小便頻數腰腿無力或咽津或呼吸覺冷氣入腹或陰囊濕癢或手足冷或面白或黧黑或畏寒短氣以上諸證皆屬腎虛非附子不可治論金銀花酒金銀花生取藤葉一把瓷器內爛研入白酒少許調和稀稠得宜塗敷四圍中心留口以泄毒氣又法取藤五兩木杵捶碎生甘草節一兩二味以水二碗用砂瓶文武火煎至一碗入無灰酒一碗再熬十數沸去渣分三服渣敷患處一日夜吃盡病熱重日夜兩劑服至大小便通利藥力到矣或用乾者終不及生者力大效速或只用藤五六兩搗爛入熱酒一鍾絞取汁酒溫服渣罨患處四五服而平此藤延蔓附樹或園圃牆垣之上藤方而紫葉似薜荔而清三月間花微香蒂帶黃色花初開色白經一二日色黃故又名金銀花又名鷺鷀藤又名金叉股又名老翁須因藤左纏又名左纏藤凌冬不調又名忍冬在處有之治癰疽發背乳癰初發便當服此不問疽生何處皆有奇效兼麥飯石膏神異膏貼之尤效論槐花酒槐花酒槐花四五兩炒微黃乘熱入酒二鍾煎十餘沸去渣熱服未成者二三服已成者一二服一人髀患毒痛甚服消毒藥不減飲槐花酒一服勢隨大退再服托裡消毒藥而愈一人發背十餘日勢危脈大先飲槐花酒二服殺其勢退再服敗毒散二劑托裡藥數劑漸潰又用桑柴灰灸患處每日灸良久仍以膏藥貼之灸至數次膿潰腐脫以托裡藥加白朮陳皮月餘而愈一人肩疽脈數用槐花酒一服勢頓退更以金銀花黃耆甘草十餘服而平大抵腫毒非用蒜灸及飲槐花酒先去其毒雖托裡諸藥其效未必甚速但胃寒人不宜過劑論十六味流氣飲治無名惡腫癰疸丹溪曰夫十六味流氣飲乃表裡氣血藥也復以疏風助陽之藥參入非脈之洪緩沉遲緊細者不宜用諸家往往不分經絡脈證不俱時宜但云消毒化毒又云不退加補氣血藥此又使人不能無疑也論十宣散經曰諸痛癢瘡瘍皆屬心火言其當也如瘡盛形羸邪高痛下始熱終寒此反常也故當察時宜而權治可收十全之功此表裡血氣之藥若用於乳癰疽初發或已發或內托或身倦惡寒熱少或脈緩澀或弦或緊細宜用之散風寒以助陽乃始熱終寒之變也若施於積熱焮毒更不分經絡時宜不能不無懼也丹溪曰精要謂治未成者速散已成者速潰若用於輕小證侯與冬月時令盡有內托之功冬月腫瘍用之亦可轉重就輕移深於淺夏潰瘍用之其桂朴之溫散佐以防風白芷雖有參耆亦難倚仗世人用此不問是癰是疽是冬是夏無經絡無前後如言人騎瞎馬半夜臨深池危哉又曰燥血瀉氣藥太多涉虛者勿輕用一士背臀腿節次生疽率用五香連翹湯十宣散致不救一人年六十好酒肉背疽與參膏十五六斤而愈若用十宣能保無危論內托散精要謂一日至三日進十數服防毒氣攻臟腑名護心散切詳緑豆解丹毒又言治石毒味甘入陽明性寒能補為君以乳香去惡毒入少陰性溫善竄為佐甘草性緩解五金八石及百藥毒為使想此方專為服丹石發疽者設不因丹石而發疽恐非必用之劑丹溪曰癰疽因積在臟腑非一朝一夕治當先助氣壯胃是根本堅固而以行經活血為佐參以經絡時令是毒外發施治之早可以內消此乃內托之本意又云內托散性冷治嘔有降火之理若夫老年者病深諸證備者體虛者緑豆雖補將有不勝重任之患矣論神仙追毒丸精要曰初成膿宜烙得膿利為效亦服追毒丸丹溪曰追毒丸下積取毒之藥決無取膿之效今用烙而得膿若在裡而血氣實則膿自出以托不出何不以和氣活血藥佐以參耆補劑使膿托出其方用五倍子消毒殺蟲解風為君山茨菰千金子大戟皆驅逐走泄為臣佐以麝香升散用之以治癰疽實非所宜果見臟腑有積毒或異蟲纏滯深固而體氣不虛者亦快藥但戒勿輕用耳論飛龍奪命丹飛龍奪命丹治疔瘡惡腫初發或發而黑陷毒氣內陷者丹溪曰世多用之香竄燥毒之劑無經不至故能宣泄備汗吐下三法病因食一切禽畜毒發及瘡脈沉緊細數蘊毒在裡並濕毒用之神效若大熱大渴毒氣焮發而脈浮洪在表及膏粱積熱之人未宜輕舉論獨聖散癰疽皆緑氣滯血凝或因怒氣所致用香附子去毛以生薑汁淹一夕曬乾研為末白湯調服二錢無時丹溪曰本方謂疽後常服半年尤效此皆施於體實氣鬱之人不可一概而用之也一人厚味氣鬱性重年近六十患背疽醫與諸藥皆不行惟飲香附末甚快始終只此一味而安此千百而一二瘡腫分淺深瘡疽有三腫高而軟者發於血脈腫下而堅者發於筋骨皮肉色不辨者發於骨髓又曰以手按搖瘡腫根牢而大深也根小而浮者淺也又驗初生瘡時便覺壯熱惡寒拘急頭痛精神不寧煩躁飲冷瘡疽必深也若起居平和飲食如故其瘡浮淺也惡瘡初生其頭如粟微似有痛癢誤觸破之即焮展有深意酌其深淺浮則表之深則疏之辨癰與疽治法精要云始患高腫五七日忽平陷者是攻內之候以托裡散內補湯填補臟腑令實最怕透膜者十無一生丹溪曰癰之邪淺其稽留壅遏獨在經脈之中而專於外故初發時身表便熱患處便如枕如盆高腫痛甚者縱欲下陷緣正氣內固不肯受故或便祕或發渴發逆以拒之是以骨髓終不焦枯五臟終不損也疽之邪其稽留壅遏內連五臟而不專攻於外故身或無熱患處或不腫痛甚者聲嘶色脫眼黑青小十指腫黑者多死治癰初發當以潔古法為主表者散之里者下之火以灸之藥以敷之膿未成者必內消已成者速潰治疽初發當以涓子法為主填補臟腑令實勿令下陷之邪延曼外以火灸引邪透出使有穴歸而不亂攻可轉死為生變凶為吉今世不分癰疽一概宣熱拔毒外以五香托其氣內以大黃竭其血終不自悟其藥之非惜哉瘡名有三曰癤曰癱曰疽癤者初生突起浮赤無根腳腫見於皮膚止闊一二寸有小痛疼數日後微軟薄皮剝起始出清水後白破膿出如不破用替針丸癰者初生紅腫突起闊三四寸發熱惡寒燥渴或不渴抽掣疼痛四五日後按之微軟此證毒氣浮淺春夏宜防風敗毒散加薑蔥棗煎秋冬去薑蔥棗加木香身半以上加栝蔞身半以下加射干又有皮色不變但肌肉內微痛甚發熱惡寒煩渴此證熱毒深沉日久按之中心微軟膿成用火烙開以決大膿宜服托裡之藥疽者初生白粒如粟米便覺癢痛觸著其痛應心此疽始發之兆或誤觸著便覺微赤腫痛三四日後腳根赤暈展開渾身壯熱口微渴瘡上亦熱此疽也疽上或漸生白粒如黍米逐個用銀篦挑去勿令見血或有少血亦不妨不見血尤妙卻用老皮散敷之五七日瘡頭無數如蜂房膿不肯出冬用五香連翹湯夏用黃連羌活散夏初用防風敗毒散加蔥棗秋去之加木香若形氣實脈洪數有力痛腫焮開壯熱便閉宜五利大黃湯復元通氣散可選用通利又有初生白粒誤觸後便覺情思不暢背腫如石身體煩疼胸膈痞悶怕聞食氣此謂外如麻里如瓜疽毒深惡內連臟腑疽頂白粒如椒者數十間有大如蓮子蜂房者指捺有膿不流時有清水微腫不突根腳紅暈漸漸展開或癢痛或不痛疽不甚熱瘡反陷下如頑之皮漸變黑色恍惚沉重脈若虛弱便用大料參耆歸術濃煎調服瘡瘍鬱冒俗呼昏迷是也宜汗之則愈辨瘤若發腫都軟不痛者血瘤虛腫而黃者水也發腫日漸增長而不大熱時時牽痛者氣瘤氣結氣腫久而不消後亦成膿諸癃瘤疣贅等至年衰皆自內潰治於壯年可無後憂疽分虛實用藥瘡疽痛息自寧飲食知味脈證俱緩緩則治本故可以王道平和之藥徐而治之亦無不愈若脈實焮腫煩躁寒熱脈證俱實非硝黃猛烈之劑不能除投以王道之劑則非也若瘡瘍聚腫不潰潰而膿水清稀或瀉利腸鳴飲食不入嘔吐無時或手足並冷此脈證俱虛非大補之藥不能平投以硝黃攻伐之劑亦非也故治其證者當辨表裡虛實隨宜治之庶得萬全治瘡須分補瀉東垣曰瘡疽受之有內外之別治之有寒溫之異受之外者法當托裡以溫劑反用寒涼之藥則是皮毛之邪引入骨髓矣受之內者法當疏利以寒劑反用溫劑托裡則是骨髓之病上徹皮毛矣殆必表裡通潰共通為瘡助為毒苦楚百倍輕則危重則死矣男女癰疽治法不同男婦癰疽精要謂治法無異丹溪曰婦人情性偏執比之男子其難何止十倍雖有虛證宜補亦當以執為慮一婦人早寡善飲啖形肥偉性沉篤年六十六月間患背疽近脊醫乃橫直裂開取血雜以五香十宣散酒飲月餘未嘗及其寡居之郁酒肉之毒偏執之滯時令之熱竟至平陷淹延兩三月不愈小兒瘡疽小兒純陽多熱心氣鬱而多瘡胎食過而受熱毒犀角散為最余如法若大下恐傷其胃癰疽當分經絡丹溪曰六陽經有多氣少血者有少血多氣者有多氣多血者不可概論諸經惟少陽厥陰生癰理宜預防以其多氣少血血少肌肉難長瘡口久不合必成死證或者遽用驅毒利藥以伐陰分之血禍不旋踵才得腫疼參之脈證若有虛弱便與滋補血氣無虧可保終吉若用尋常驅熱拔毒及散氣藥虛虛之禍如反掌耳一人年三十左腿外臃紅腫一人年四十脅下紅腫二人皆不預防本經少陽血少猛浪用大黃攻裡而死一人年六十左膊外側一核一女髀骨中痛二人亦不預防本經血少猛浪用五香十宣表散死以上病例不繫膏粱丹毒火熱之變因虛勞氣鬱所致只宜補形氣調經脈瘡當自消不待汗下而已也若不詳脈症經絡受病之異下之先犯病禁經禁故致失手也內托凡癰疽或已成血氣虛者邪氣深者邪氣散漫不能突起亦難潰膿或潰後膿少或膿清稀或堅硬不軟或雖得膿而根腳紅膿開大皆氣血虛邪氣盛兼以六淫之邪變生諸證必用內托以補藥為主令其毒熱出於肌表則易愈也須是補藥為君活血驅邪之藥為臣或以辛香之藥行其鬱滯或加溫熱之藥御其風寒亦有瘡疽腫痛初生一二日便覺脈沉細而煩悶臟腑弱而皮寒邪毒猛浪恍惚不寧外證沉深者即當用托裡散或增損茯苓湯及溫熱之劑以從治之或問內托河間治腫焮於外根盤不深形證在表其表多浮病在皮肉非氣盛則必侵於內急須內托宜復煎散除濕散郁使胃氣和平如或未已再煎半料飲之如大便祕及煩熱少服黃連湯如微利及煩熱已退卻與復煎散如此是榮衛俱行邪氣不能內傷內消內消當審淺深大小經絡處所形脈虛實如腦背腰項臀腨皆太陽經宜黃連羌活脊背連脅處為近少陽宜敗毒散形實脈實者宜漏蘆湯五利大黃湯等疏利之氣虛參耆為主血虛當歸人參為主佐以消毒加以引經六經分野各隨本經標本寒溫氣血多少以行補瀉惟少陽一經治與氣血虛同法凡栝蔞射干穿山甲蟾酥連翹地丁大力子金銀花木鱉子之類皆內消之藥外施貼藥外施貼藥正是發表之意經曰發表不遠熱大凡熱得氣則散得冷則凝痛醫敷貼冷藥豈理也哉瘡瘍作渴瘡瘍作渴不問腫潰但脈數發熱而渴用竹葉黃耆湯不發熱不渴或脈數無力而渴或口乾用補中益氣湯若脈數便祕用清涼飲尺脈洪大按之無力而渴用加減八味丸若治口燥舌黃飲水不渴此丸尤妙精要曰渴與口乾不同不宜用丹藥鎮墜禍如反掌惟桑枝煎五味湯以救陽水甚妙丹溪曰不言食味起火怒氣生火房勞激火吾恐渴亦未易止也精要曰瘡作渴甚急與神仙追毒丸取下惡毒清膽湯千金漏蘆湯五香連翹湯六味車鰲散萬金散皆可選用利後仍渴卻用生津補氣藥津液生氣血充渴自止丹溪曰大渴而與利藥非明示脈證何以知其當下後言利後仍渴卻用補藥又不明言脈證恐是但有大渴必下下後尚渴方與補藥古人治未病如此用藥可乎況渴屬上焦當腫瘍時猶或可用或潰瘍後渴多因氣血之虛何待利後方議其虛也癰疽初發乃氣血虛用參耆以補氣歸地以養血或忍冬丸黃耆六一湯一人瘍後發背未潰脈數無力此陰虛火動用加減八味丸㕮咀二劑稍緩次用丸劑而愈一人腦疽作渴脈雖洪按之無力治以此藥不信自用滋陰等藥愈盛七惡並至而死東垣云人病疽愈後發渴多致不救惟加減八味丸絶妙蓋癰疽多因虛而得疽安而渴者服此丸則渴止而安未渴者服此丸永不渴或未疽而先渴者服此丸不惟渴止而疽亦不作一貴人疽未安而渴作一日飲水數升豫用加減八味丸諸醫大笑皆用木瓜烏梅紫蘇參苓百藥煎等劑而渴愈甚不得已用此三日渴止其疾本以腎水枯竭心火上炎是以生渴此藥生水降火為最醫者鑑之精要曰疽向安後發渴與加減八味丸丹溪曰疽後發渴此時氣血兩虛當用參耆補氣歸地補血渴者當止何必澤瀉茯苓佐以肉桂以導水耶若忍冬丸黃耆六一湯亦為切當忍冬養血黃耆補氣渴何由作甫按丹溪此論疽後發渴氣血兩虛治以參耆補氣歸芐養血則渴自止何必以桂導水此誠確論東垣謂疽後作渴非八味丸莫能止蓋腎水虛而然非八味丸誠不能止故其理也至於概用八味九不論疽後之虛而云未疽作渴悉能服之疽亦不作恐非通論夫何癰疽多因積熱而成經云脈數不退必作瘡瘍可見火積之久而後疽作也豫意未疽先渴此火之象當以解熱敗毒涼血生津則渴自止而疽或不作若遽用八味丸似非切當且附子性悍惟用於疽後虛熱以其從治之法為宜世人不知其虛而惟以清熱解渴之劑所以東垣特激而進之之意云耳甫恐後之醫者執辭害意雖於未疽之先作渴概用附子豈不誤耶大抵疽後作渴遠用丹溪補養氣血甚穩當而用之或不能效再用八味丸以後治之庶無剽悍之誤也瘡瘍嘔逆精要云瘡瘍嘔逆有二證一初發不曾得內托伏熱在心一氣虛脾氣不正其伏熱在心者與內托散氣虛者宜嘉禾散有寒熱宜正氣散兼與山藥丸以補腎丹溪曰諸逆衝上嘔噦皆屬於火托裡散性涼固有降火之理若嘉禾散徒溫暖以助火耳山藥丸補腎以壯下焦之陰粗為近理然治嘔須分先後腫瘍時當作毒氣上攻治之潰瘍後當作陰虛補之若年老因疽潰後嘔不食者宜參耆白朮膏佐使藥隨時隨證加減亦用獨參湯而愈者山藥丸緩急未易治河間謂瘡瘍嘔逆濕氣侵於胃也藥中宜倍加白朮瘡腫寒熱用藥法嘗見治寒以熱而寒彌甚治熱以寒而熱彌熾何也假如心實生熱者當益其腎腎水滋熱自除腎虛生寒者當補其心心火降寒自退此所謂寒之而熱者取之陰熱之而寒者取之陽也又寒因熱用熱因寒用要在通其理類而已又聞微者逆之甚者從之蓋治寒以熱必涼而行之治熱以寒必溫而行之此亦欲其調和也其間有正有權者蓋病有微有甚微者逆治理之正也甚者從治理之權也瘡瘍面赤不得攻下瘡瘍及諸病面赤雖伏大熱禁不得攻裡為陽氣怫鬱邪氣在經宜發表以去之故曰火鬱則發之雖大便數日不去宜多攻其表以發散陽氣少加潤燥之藥若見風脈風證只可用發表風藥便可以通利也若只乾燥只宜潤之可也瘡瘍發寒熱或汗瘡瘍發寒熱多汗或先寒後熱或先熱後寒或連日作或間日作必先嘔痰然後寒熱解大汗出精要言以上之證不可專以為熱亦有氣虛而得亦有因怒而得或先感寒邪脾氣不正而然者丹溪曰因氣虛者當以補氣藥補之因怒者當以順氣藥和之脾氣不正者以脾藥調養之今用不換金正氣散悉是溫散瀉衛之藥欲以一兩人參收拾十四兩之瀉衛藥可乎若用於腫瘍時感寒邪者猶或庶幾彼氣虛者因怒者脾氣不正者此方能兼治乎抑不知其用於腫瘍耶潰瘍耶論疽疾咽喉口舌生瘡凡疽疾咽喉口舌生瘡精要歸罪不得內托以致熱毒衝心云一貴人病此與琥珀犀角膏一日而安丹溪云腫瘍用之為近理若潰瘍後用之升散寧不助邪致虛以速其死也後有犀角散以大黃佐黃耆用黃耆則知為虛矣用大黃又似疑其有實熱夫瘡既潰而體虛縱有舊熱將自漸因膿血而消何必以冷藥利動臟腑若在秋冬何異刀劍論瘡瘍食肉東垣曰瘡瘍食肉乃自棄也瘡瘍乃榮氣而作今反補之自棄何異雖藥治不能愈也精要曰羊雞牛鵝魚面煎爆炒炙等味犯之必發熱用梔子黃芩湯最效丹溪曰梔芩苦參犀角佐輔人參固可解食毒之熱若寒月與虛人寧無加減乎經曰膏粱之變足生大疔此言癰疽之因也禁戒厚味恐其引起宿火之熱此誠富貴豢養口腹者所當謹若素貧者大不然矣嘗治一人背癰住尺穴深而黑家貧得此急作參耆歸術膏多肉餛飩與之而安多肉餛飩補氣之有益者也論氣血喜香惡臭精要曰凡血氣聞香則行聞臭則逆飲食調令香美益脾土養真氣瘡瘍或為穢氣所觸可用香藥薰之丹溪曰甘而淡者可養脾土若香美者但能助火故經以熱傷脾寒傷氣為戒今曰益脾養氣施之腫腐似有暢達之益潰瘍後用香美恐有發濕熱損真陰之患論膿潰夫癰疽瘡瘍皆由氣血壅滯而生當推虛實表裡而早治之可以內消此內托裡之意也若毒氣已結者勿泥此內消之法當辨膿之有無淺深急酌量刺之緩則穿通臟腑腐爛筋骨可不慎哉若脈緊數為膿未成緊去但數為膿已成以手按之熱者有膿不熱無膿按之熱硬未有膿按之半軟半硬已有膿大軟方是膿成若大按之痛者膿深按之不甚痛者膿未成按之則復痛者為有膿不復痛者無膿薄皮剎起者膿淺皮色不變不高阜者膿深淺者宜砭深者宜針手足指梢及乳上宜膿大軟方開口麻豆後肢節有癰稍覺有膿便用決破遲則成攣曲之疾癱疽膿成十死一生凡癰疽膿成十死一生故聖人弗使已成已成膿血砭石鋒針取之也但病者多喜內消而醫者即用十宣散敗毒散流氣飲之類殊不知十宣散雖有參耆然防風白芷厚朴桔梗皆足以托氣況不分經絡時令氣血多少安可概用敗毒散乃表散也雖有表證不過一二服況非表證寧用之乎流氣飲乃行氣散血之藥服之過度則氣血虛耗何以為膿此三藥不可輕用明矣若膿既成昧者待其自穿殊不知少壯充實者或能自破若老弱之人又有攻發太過不行針刺膿毒乘虛內攻穿腸腐膜鮮不誤事一婦乳癰膿成及時針刺不月而愈一人腿癰膿成畏針幾殆後為針之大補三月而平一人腿癰脈證俱弱治以托裡得膿不急針延久方潰後膿水開泄不斂而斃論惡肉惡肉者腐肉者也癰疽潰後腐肉凝滯必須去之推陳致新之意若壯者筋骨強盛氣血充溢真能勝邪或自去或自平不能為害若年高及怯弱之人血津少肌肉澀設或留而不去則有腐爛筋肉之患惡肉取之及時新肉早生得以全愈若去之稍遲或致不救若取之失多大潰而死嘗見腐肉既去雖少壯者不補其氣血亦不能收斂若怯弱者不取惡肉不補氣血未見其能生者也腐肉可用手法去之或用雄黃輕粉敷之蠹肉努出用遠志末酒調塗之又法息肉突出烏頭半兩苦酒三升浸漬三日洗之日夜三四次諸瘡努肉如蛇突出數寸硫黃末敷之即縮膿潰後蠹肉不腐亦用硫黃輕粉敷之四圍仍有腫焮處用毫針燒赤刺之約一米深紅腫則縮論膿蝕追蝕膿法使毒氣外泄而不內攻惡肉易去好肉易生也若紝其瘡血出不止者未可紝紝但摻追蝕藥於瘡上侍其熟可紝方紝若紝痛應心者亦不可紝誤觸其痛焮腫必倍常必生變證若瘡瘍膿成未破者於上薄皮剝起者當用破頭代針之藥安其上以膏貼之膿出之後用收膿化毒藥若膿血未盡便用生肌務欲早愈則毒氣未盡必再發生肌止痛肌肉脾之所主也潰後收斂遲速者乃氣血盛衰使然世人但知生肌用龍竭止痛用乳沒豫謂不然生肌之法當先理脾胃助氣血為主則肌肉自生豈假龍竭之屬設若膿毒未盡就用生肌反增潰爛壯者輕者不過復潰或遲斂而已怯者重者必致內攻或潰而不斂者亦多矣止痛之法熱者清之寒者溫之實者瀉之虛者補之膿郁者開之惡肉侵蝕者去之如是則痛自止豈特乳沒之屬哉瘡痛不可忍者苦寒藥可施於資稟厚者若素稟薄者宜補中益氣湯加苦寒藥血熱者四物湯加黃芩鼠黏子連翹在下加黃柏若肥人濕熱瘡痛者羌活防風荊芥白芷取其風能勝濕也每見瘡作先發為腫血氣鬱積蒸肉為膿故痛多在瘡始作時膿潰之後腫退肌寬痛必漸減若反痛者虛也宜參耆之屬補之亦有穢氣所屬者宜和解之乳香芍藥之屬亦有風寒所逼宜羌活肉桂之屬以溫散之一人發背毒氣未盡早用生肌竟復潰爛治以解毒藥而愈一人腿腫因寒作痛與乳香定痛丸而愈一婦時毒因熱作痛與防風通聖散而愈一人已潰因虛作痛與益氣養榮湯而愈一人癰腫因實作痛與黃連內疏湯而愈論瘻並治法諸瘡久患成瘻常有膿水不絶其膿不臭內無歹肉須先服參耆歸術大劑托裡為主或服以丸尤宜用附子浸透切作片厚二三分於瘡上著艾灸之仍服前托裡之藥隔三日再灸不五七次肌肉自長滿矣又有膿水惡物漸潰根深者用面硫黃大蒜三物一處搗爛看瘡大小捻作餅子厚三分安瘡上用艾炷炙二十一壯每壯一易後隔四五日方用翠霞錠子並信效錠子護用紝入瘡內歹肉盡去好肉長平然貼收斂之藥內服應病之劑調理瘥羅謙甫云一人病頭目赤腫耳前熱甚疼痛不可忍發熱惡寒牙關緊急涕唾稠黏飲食難下不得安臥一瘍醫于堅硬上砭之數四五百餘針腫赤不減其痛益甚不知所由診其脈浮緊按之洪緩此寒覆皮毛郁遏經絡熱不得升聚而赤腫經云天寒地凍則水冰人氣在中皮膚緻密腠理閉塞汗不出血氣強內堅滿當是之時而善行水者不能往水善穿地者不能鑿凍善用針者亦不能取四厥必待天溫冰釋凍解而水可行地可穿人脈亦由是也又云冬月閉藏水冰地坼故用藥而多針石也宜以苦溫之劑溫經散寒致勝理少苦發之少辛散之也麻黃苦溫發之者也防風辛溫散之者也升麻苦辛葛根甘草解肌出汗專治陽明經中之邪故以為臣血流而不行則痛少加白芷辛溫當歸以和血散滯濕熱則腫以蒼朮苦甘能泄皮膚腠理之濕熱人參甘草甘溫白芍藥酸寒調中益氣使補其里也故以為佐如法煎服薄衣覆其首厚被覆其身臥暖則經血溫腠理開寒乃散陽氣升而其腫減去八九再服去麻黃防風加連翹鼠黏子而痛悉去經云汗之則瘡已信哉附骨疽骨附乃流注之敗證也如用涼藥則內傷其脾外冰其血脾主肌肉脾氣受傷飲食必減肌肉不生血為脈絡血既受冰則血氣不旺而愈滯宜用理脾脾健則肉自生血氣自運行矣又曰白虎飛尸留連周期或展轉數歲冷毒朽骨出盡自愈若附骨腐者可痊正骨腐者則終為廢疾矣又有毒自手足或頭面腫起或兼疼痛上至頸項骨節去處如癧瘍貫珠此風濕流氣之證也宜加減小續命獨活寄生湯主之有兩膝腫痛起或至遍身骨節疼痛者此風濕痹又名歷節風宜附子八物湯瘡瘍所致之由氣血充實經絡通暢決無患此若氣血素虧七情所傷經絡鬱滯或腠理不密六淫外侵隧道壅塞醫者須當察其所由辨其虛實庶不誤人論癰可治不可治發背腦疽脫疽腫痛赤色水衰火旺之色尚可治若黑或紫火極似水之象也乃腎水已竭精氣已涸決不治凡腫不高色不赤不焮痛脈無力不飲食腫不潰腐不爛膿水青或多而不止肌肉不生屬元氣虛也皆難治宜峻補之或膿血既泄腫痛尤甚膿水敗臭煩躁時嗽腹痛渴甚泄利無度小便如淋乃惡證也皆不治腫瘍一日至四五日未成膿而痛者宜灸至不痛灸而不痛或麻木者明灸之凡瘡瘍發熱而痛者發於陽也可治脈不數不熱不痛者發於陰也難治不痛者最惡不可視為常疾此證不可不痛不可太痛煩悶者不治頭面赤腫時毒發於面鼻耳項者是也經云身半以上腫天之氣也身半以下腫地之氣也乃邪客心肺之間上攻頭目而為腫此感四時不正之氣也與膏粱積熱之證不同硝黃之劑非大便祕實不可用若不審其因及辨其虛實表裡概用攻之必致有誤嘗見饑饉之時芻蕘之人多患之乃是胃氣有損邪氣從之不可不察常治邪在表者用葛根牛蒡子湯人參敗毒散或普濟消毒飲子邪在裡者五利大黃湯梔子仁湯表裡俱不解者防風通聖散表裡俱解而腫不退者犀角升麻湯腫甚者砭患處出惡血以泄其毒十日外自愈若嚏出膿血即愈欲其作膿者用托裡消毒散欲其收斂者用托裡散此法最為穩當五七日咽喉閉塞言語不出頭面不腫食不知味者不治時毒者為回邪之毒氣感於人也其候發於鼻面耳項咽喉赤腫無頭或結核有根令人憎寒發熱頭痛或肢體痛恍惚不寧咽喉閉塞人不識者將為傷寒便服解藥一二日腫氣益增方悟始求瘍醫原夫此疾古無方論世俗通為丹瘤病家惡言時毒切恐傳染考之經曰人身忽然變赤狀如塗丹謂之丹毒此風熱惡毒所為與時毒特不同耳蓋時毒初狀如傷寒五七日間乃能殺人治者宜精辨之先論脈滑數浮洪沉緊弦澀皆其候蓋浮數者邪在表也沉澀者邪氣深也氣實之人急服化毒丹以攻之熱實不利大黃湯下之有表證者解毒升麻湯以發之年高氣耎者五香連翹湯生之又於鼻內搐通氣散取十餘嚏作效若搐藥不嚏者不可治如嚏出膿者治之必愈左右之人每日用嚏藥搐之必不傳染其病人亦每日用嚏藥三五次以泄熱毒此治時毒之良法也經三四日不解者不可大下尤宜和之犀角連翹散之類至七八日大小便通利頭面腫起高赤者可服托裡散黃耆散宜針鐮出血泄其毒氣十日外不治自愈也此病若五日已前精神昏亂咽喉閉塞語聲不出頭面不腫食不知味者必死殊不知病有陰有陽有可汗有可下有微甚有逆從不可不審也裡實而不利者下之表實而不散者解之表裡俱實而不解者解表攻裡表裡俱解而不消者和之腫甚焮痛者砭去惡血更用消毒之劑不作膿或不潰者托之饑年普患者不宜用峻利當審治之一人頭面腫痛服硝黃敗毒之劑愈甚診之脈浮數邪在表尚未解用荊芥敗毒散二劑勢退大半更以葛根牛蒡子湯四劑而瘥此憑脈發表證也一人患此腫痛發熱作渴脈實便祕以五利大黃湯下之諸證悉退以葛根牛蒡子湯四劑而痊此憑脈攻裡證也一人表裡俱解腫痛尚不退以葛根升麻湯二劑而消此憑證也一人腫痛發寒熱脈浮數以荊防敗毒散二劑少愈再用人參敗毒散二劑勢減半又二劑而瘥此憑脈發表也一人耳面赤腫作痛咽乾發熱脈浮數先以荊防敗毒散二劑勢退大半又以葛根牛蒡子湯四劑而瘥一婦腫痛用硝黃之劑攻之稍緩翌日復痛診之外邪已退此瘀血欲作痛也用托裡消毒散潰之而愈此憑脈與藥也頭面赤腫焮痛服涼藥不應者須砭針去血再用本方必效一人年三十患肩毒服人參敗毒散一劑更服十宣散去參桂加金銀花天花粉四劑而潰因怒動肝火風熱上壅頭面青腫焮痛飲冷荊防敗毒散加芩連薄荷二劑不因急砭針患處去黑血盞許仍以一劑勢退大半再服人參敗毒散四劑而愈泰和二年四月民多疫癘初覺憎寒體熱次傳頭目腫盛目不能開上喘咽喉不利舌乾口燥俗云大頭天行親戚不通染之多殆一人病此五六日醫以承氣加藍根下之稍緩翌日其病如故下之又緩終莫能愈漸至危篤東垣云身半以上天之氣也身半以下地之氣也此邪熱客於心肺之間上攻頭目腫盛以承氣泄胃中之實熱是誅罰無過不知適其至所為故遂制普濟消毒飲黃連半兩黃芩味苦寒瀉心肺間熱為君半兩橘紅玄參生甘草各二錢鼠黏子薄荷板藍根馬勃各一錢人參三錢瀉火補氣為臣連翹一錢白殭蠶炒七分升麻一錢柴胡味苦平行少陽陽明二經氣不得伸二錢桔梗辛苦以截諸藥於上使攻其病邪者也上為細末半用湯調時時服之半用蜜丸噙化服盡良久愈凡遠邇有病此者書方遍貼之濟人甚衆或加芎歸為咀每帖五錢水二盞煎一盞食遠稍熱時時服之如大便祕結加酒蒸大黃一二錢以利之腫勢甚宜砭血升麻牛蒡子散治時毒頭面腫有瘡及項胸膈者脈浮洪表候者升麻牛蒡子桔梗甘草葛根玄參麻黃連翹上咀各一錢姜三片水二盞煎八分取微汗一人腮頰腫焮至於牙齦俱腫右關脈數此陽明胃經風火上攻也治以犀角升麻湯而消犀角升麻湯治胃火上攻頰腮腫痛並牙痛並效方見火門瘰癧瘰癧必起於少陽一經不守禁忌延及陽明大抵食味之厚鬱氣之積曰毒曰風曰熱皆此三端招引變換須分虛實實者易治虛者可補以其三焦相火氣多血少婦人見此月經不調寒熱變生稍久轉為潮熱危矣自非寡欲斷味神仙不治也瘰癧者結核是也或在耳後或在耳前或在耳下連及頤項又或在頸下連及缺盆皆謂之瘰癧或在胸前及於兩脅者皆謂之馬刀手足少陽經之疾少陽司相火但凡女子小兒三焦火窒一經蓄怒憂思驚恐抑鬱氣逆遂致痰火積於經結核不散而成瘰癧至於發熱憎寒煩渴盜汗或寒熱往來日漸羸瘦邪熱寢盛則必費調理可不慎與又云結核連續者為瘰癧刀形長如蜆蛤者為馬刀脈澀者補血為主脈弱者補氣為主脈浮數者及腫痛宜祛風清熱涼血腫硬不潰者補氣血為主鬱抑所致者解鬱結調氣血潰後不斂者屬氣血俱虛宜大補之虛勞所致者補之因有核而不斂者腐而補之脈實而不斂或不消者下之治瘰癧結核及頭面諸瘡腫胸肋間腫痛必用此法始經曰火淫所勝治以鹹寒先用食鹽一二兩炒過以長流水一大碗煎放溫作三四次頓服少時以雞翎於咽喉中探引吐涎三兩升後服涼血通經如玉燭散四物涼膈散解毒湯之類地膽斑蝥制度如法能攻瘰癧之毒以其破瘰癧之根從小便中出或如粉片漿汁或如血塊爛肉亦其驗耳服此藥者當以木通滑石等為嚮導不然恐遺毒於小腸膀胱也夏枯草本草言大治瘰癧散滯氣而有補養厥陰血脈之功而經不言其能退寒熱虛者儘可倚仗實者以行散之藥佐之外施艾灸亦漸取效此草三四月間開紫花夏至時便枯蓋稟純陽之氣得榮則枯耳此瘰癧中之要藥也桑椹取極熟黑色者二斗以布濾取自然汁砂器內文武火慢熬成薄膏每日白湯點一匙食後稍遠服日三次散腫潰堅湯治馬刀結硬如石沿在耳下至缺盆或肩上肋下者皆手足少陽經分或頰或頰車堅硬如石乃陽明經分或二經瘡已破流膿並皆治之柴胡梢四錢桔梗半兩升麻龍膽草黃芩梢半生半酒炒連翹各三錢炙甘草白芍藥當歸尾各三分黃連二錢黃柏知母炒栝蔞根酒浸葛根昆布酒洗廣朮酒浸微炒三稜酒拌濕炒透二錢上咀每服六七錢水二盞浸大半日煎一盞熱服臥宜去枕頭低腳高每噙一口作數次咽留一口送下後項丸藥服畢臥藥在膈上停留以制上病故也若能食糞硬者加至七八錢一劑前藥取半料為末煉蜜丸如緑豆大每服百丸用本湯下連翹散堅湯治耳下或肩上及缺盆瘡核如石動之無根或生兩脅或未破潰或已流膿成瘡此手足少陽經分也柴胡一兩二錢當歸尾酒洗黃芩生廣朮酒炒三稜酒炒連翹芍藥各半兩黃連酒炒蒼朮各二錢栝蔞根一兩酒炒龍膽草酒洗黃芩酒炒各七錢炙甘草三錢上一半煎如前法服一半為丸亦如前法服玉燭散治瘰癧自消和血通經當歸川芎芍藥熟地黃大黃芒硝黃芩甘草各等分上為粗末每服三錢水盞半生薑三片煎七分溫服每日食後一服七日效升麻調經湯治繞項結核或至頰車此陽明胃經瘰癧也手足少陽足少陰腎經俱能結塊此藥並治升麻一錢連翹半兩葛根龍膽草四錢桔梗半兩條黃芩六錢當歸尾一錢芍藥三錢生黃芩四錢黃柏七錢知母一錢廣朮三稜黃連炙甘草各半兩上藥一半煎服一半蜜丸煎藥吞下如前法救苦化堅湯治瘰癧馬刀挾癭從耳下或耳後下頸至經或入缺盆乃手足少陽經分其在頰間或頰車乃足陽明經分受心脾之邪而作今將二證合而治之升麻一錢葛根五分真漏蘆五分三味俱足陽明本經藥連翹一錢諸瘡必用之藥瀉十二經之邪火十二經瘡藥不可無能散諸氣聚血結丹皮五分涼血散滯血歸身三分生地三分以上和血涼血白芍藥三分夏月焙之腹痛必用之藥味酸能收散氣黃耆一錢固皮毛腠理補表之元氣及能活血脈生血散火邪瘡家聖藥肉桂三分大辛熱能散結積陽證瘡瘍須少用之又曰寒因熱用或有煩躁者去之麥芽一錢治腹中急縮兼能消食補胃柴胡八分鼠黏子一五分若無馬刀挾癭不在少陽者去柴胡一味防風五分凡瘡在上部雖無手足太陽經證亦當用之為能散結有脊痛項強加羌獨活昆布二分味大咸瘡堅硬者用之以咸能軟堅也廣朮三分煨三稜三分煨二味削堅積瘡毒堅硬者用之不甚堅者減人參三分氣弱氣短者加黃柏三分有熱煩躁腎中有伏火或腳無力者加倍益智仁二分或嘔吐胃不和及腹脹者更加厚朴曲末炒三分炙甘草五分能調諸藥瀉火助胃調中除邪氣黃連三分瀉心火治諸瘡上為極細末滾湯泡蒸餅和勻捻作餅子日中曬乾搗如米粒大每服一錢或二錢白湯送下量病人虛實無令藥多妨其飲食此治之大法也如在少陽陽明經分為馬刀挾癭者去獨活漏蘆升麻葛根加瞿麥三分氣不順者加橘皮邪在上焦加黃芩在中焦加黃連在下焦加黃柏知母防己皆酒製用之大便不通印壅起邪盛急加酒大黃以利之如血燥不行加桃仁酒大黃風澀不行加煨皂角仁秦艽大黃如陰寒祕結以局方半硫丸或加附子乾薑冰冷與之大抵諸瘡素弱者少用苦寒多加參耆甘草之類泄火以補元氣為主海藻散治瘰癧海藻洗昆布何首烏不犯鐵器皂角刺炒黃色各一兩蛇蛻一條上五味為細末用豬項下刀口肉燒熟蘸藥末食之向患處一邊側臥一伏時每核上灸七壯煙從口中出為度膿盡即安瞿麥飲子治瘰癧馬刀瘡瞿麥穗半斤連翹一斤上為粗末水煎臨臥服此藥經效多不能速驗宜待歲月之人自消除也連翹湯治前證連翹瞿麥各斤大黃三兩甘草二兩上咀每服半兩煎食後服十餘日後可於臨泣穴炙二七壯服藥不可止五六十日效柴胡連翹湯治前證柴胡連翹黃芩炒知母酒炒各半兩中桂三分炙甘草黃柏酒炒生地黃各三錢歸尾錢半瞿麥穗六錢鼠黏子一錢上咀每服半兩水二盞煎一盞食後稍熱服柴胡通經湯治小兒項側有核堅而不潰名曰馬刀柴胡歸尾桔梗生甘草連翹三稜鼠黏子黃芩黃連各五分紅花少許上咀水二盞煎一盞食後稍熱服白花蛇散治九漏瘰癧發於項頸之間憎寒發熱或痛或不痛白花蛇酒浸軟去皮骨焙乾稱二兩生犀角二錢鎊牽牛半生半炒一兩青皮半兩上為細末每服一錢入膩粉五分硬勻五更糯米飲調服已時利下惡物乃瘡之根也更候十餘日再進一服忌發風熱毒物已成瘡者一月可效四聖散治瘰癧服白花蛇散轉利後服此調之永去其根海藻洗石決明煅羌活瞿麥穗各等分上為細末每服二錢米湯調下清水盡為度遇仙無比丸專治瘰癧白朮檳榔防風牽牛半生半炒郁李仁湯泡去皮密陀僧甘草各半兩斑蝥去翅足糯米炒去米上以斑蝥減半為末糊丸梧桐子大每服二十丸早晚煎甘草檳榔湯送下服至一月後覺腹中微痛於小便中取下毒物有如魚目狀已破者自合未破者自消湜齊立應散治瘰癧神效已破未破皆可服連翹赤芍藥川芎當歸炙甘草滑石研各半兩黃芩三錢白牽牛生取末二錢半土蜂房蜜水洗飯上蒸日曬乾二錢川烏尖七個地膽去頭足秫米炒以米黃為度去米用三錢上為細末每服抄一大錢匕濃煎木通湯調下臨臥服毒根從小便中出痛澀不妨毒出如粉片塊血爛肉是也如未效後再服繼以薄荷丹解其風熱且地膽性帶毒濟以烏尖或衝上麻悶不能強制嚼蔥白一寸茶清下以解之如小便澀燈心煎湯調五苓散服瘰癧以好膏貼之薄荷丹解瘰癧風熱之毒自小便宣毒之後須常服此土薄荷皂角去子皮連翹何首烏米泔浸蔓荊子三稜炮荊芥各一兩上為末好豉二兩半以米醋煎沸酒豉淹令軟研如糊和丸梧桐子大每服三十丸食後熟水下日一服常服為妙神祕丸治瘰癧多年不愈斑蝥去頭足秫米炒一分薄荷葉三分上為細末雞子清和丸梧桐子大空心茶清下二丸午時後服三丸臨臥服四丸次日空心服五丸臍下痛小便取下惡物為效如小便澀吃蔥茶少許必效散治瘰癧斑蝥去頭足麵炒二十一個荊芥穗黑牽牛直殭蠶炒去絲嘴上為細末每服一錢五更好酒調下日中當利惡物如不下次日五更再進一服或更不下第三日五更先吃秫米粥一碗次服此藥其毒決下如小便痛澀以蔥茶解之或煎木通燈心湯利之雌雄散治前證斑蝥一雌一雄足翅全者新瓦焙焦去頭翅足貫衆二錢鶴蝨甘草各五分為細末作粥服飽飯後好茶濃點一盞調下射干連翹湯治瘰癧寒熱往來射干連翹玄參赤芍藥木香升麻前胡山梔仁當歸炙炙甘草各一兩大黃炒二兩上咀每服三錢水一盞煎七分入芒硝少許食後溫服日再服栝蔞子散治瘰癧初腫疼痛寒熱四肢不寧栝蔞子微炒連翹何首烏皂角子微炒牛蒡子微炒大黃微炒白螺殼山梔仁漏蘆牽牛微炒生甘草各一兩上為細末每服二錢食後溫酒調下皂角子丸治瘰癧肥皂角子一升玄參連翹各一兩上以水五升於砂鍋內慢火熬水盡為度先揀皂角子軟者每服三粒食後臨臥時細嚼津下硬者搗爛煉蜜和丸如榛子大每夜含化一丸半月效忌酒熱物連翹飲治瘰癧結核不論已潰未潰新薄荷葉二斤取自然汁肥皂角一條去皮水浸去渣取汁上二味砂鍋熬膏青皮陳皮各一兩連翹半兩牽牛半生半炒末一兩皂角子炮去皮以仁為末兩半上為末用膏子丸每服三十丸煎連翹湯下十日效蝙蝠散治瘰癧多年不愈神效蝙蝠一個貓頭一個上以二物俱撒上黑豆同燒其骨化研為細末瘡濕即以末藥乾摻之瘡干以香油調敷之內服連翹等湯效化氣調經湯治流注瘰癧與神應丸間服之香附米四兩酒浸一宿曬乾陳皮二兩羌活白芷各一兩天花粉牡蠣煅甘草各半兩皂角刺半兩上為細末每服二錢用清油不拘時調下日三次追毒神異湯治瘰癧熱盛脈有力者以此下之辰砂一錢血竭一錢麝香一字共研末大黃半兩大甘草半兩上分一半為末一半咀河水一盞煎臨臥調末藥服渣再煎托裡救苦神應丸治一切流注癧瘡與調經湯間服川烏頭炮去皮臍陳皮各一兩當歸酒浸甘草節白芷沒藥各半兩蟬蛻去土半兩大皂角去皮弦生地黃薑黃各兩半上將皂角捶碎水四碗煎二碗濾去渣用汁同煮烏頭至爛為度搗如泥余諸藥卻另為末和烏頭泥為丸如梧桐子大每服六十丸半飢時薄荷湯下若瘡既破有腐腫黑肉當服化氣調經湯外貼太乙神聖等膏為妙綱目太乙膏治瘰癧瘡神效沒藥四錢黃丹五兩冰片五分乳香輕粉各三錢麝香五分香油一斤上用清油黃丹熬成用蔥七枝次第下熬焦為度槐枝攪滴水不散提起卻入乳沒輕粉腦麝攪勻瓷器收用琥珀膏治頸項瘰癧初發如梅子結腫堅硬漸若連珠不消不潰或穿穴潰膿不絶經久難愈漸成瘻疾並治琥珀一兩研細丁香木香各二兩桂心半兩硃砂研細白芷當歸木鱉仁防風木通各半兩黃丹七兩垂柳枝三兩松脂二兩麻油一斤二兩上藥用琥珀丁香硃砂桂心木香五味羅為細末其餘藥並細咀以油浸一宿入鐺內以慢火煎候白芷焦黃漉出次下松脂末濾去渣再澄清油入鐺內慢火熬下黃丹以柳枝不住手攪令黑色滴水成珠不散看軟硬得所入琥珀等味攪勻瓷器盛用時看大小用紙攤貼翠玉膏治瘰癧亦治臁瘡瀝清四兩黃蠟銅緑各三兩沒藥一錢上件先將銅緑為末香油調勻又將瀝清黃蠟火上溶開次下細銅緑火上攪勻將沒藥等二味旋入攪勻用河水一樽將藥傾在內用手扯開勻油紙里看瘡大小分用將塊子口嚼捻成餅子貼於瘡上紙封三日易之蜂房膏治熱毒氣毒結成瘰癧露蜂房蛇蛻玄參蛇床子黃耆各三分杏仁半兩亂髮雞子大丸鉛丹黃蠟各二兩上先將五味少以酒拌過宿用香油半斤內杏仁亂髮同煎焦黑濾淨更入鐺內煎慢火熬至滴水不散然後下丹蠟熬至五七沸傾入瓷盆中攤貼瘡上一日一換洗敷藥白芷荊芥二味煎湯候溫用軟帛蘸洗拭乾好膏藥貼敷藥半夏生南星生各二錢血竭一錢輕粉少許上為細末津唾調敷又方治鼠癧貓頭骨一個燒灰麝香一錢為極細末清油調敷又方黃顙魚開肚入萆麻子二十一粒以綿縛定投入廁坑內冬三月春秋二月夏一月取出洗淨用黃泥固濟文武火煨焦存性研為細末香油調敷亦治臁瘡龍泉散治瘰癧末破塗之自消龍泉粉即磨刀石上濃汁青石者佳瓦粉各半兩昆布廣朮三稜各二錢上為細末熟水調塗之用此去痰尤速一日一易螺灰散大田螺連殼煅成灰為細末破者乾摻未破者香油調敷易簡方一方大蜘蛛屋角頭網者五枚曬乾為細末酥酒調如面脂一日兩度貼一方治風腫瘰癧赤腫地松搗末香油調敷鮮者爛搗敷外臺祕要治癧瘡殭蠶炒為末水調五分服每日一服半月效一方馬齒莧陰乾燒灰存性臘月豬油和敷先用溫泔水漬洗瘡拭乾敷之月兩度肘後方治瘰癧初起如毒核宜速消之海藻一斤洗淨酒一升漬數日稍稍飲之自消又方七月七日日出時取芝麻花五月五日取麻葉二件曬乾作炷子於癧上灸百壯效又方用生玄參搗爛敷之日二易之針灸法靈樞寒熱篇帝曰寒熱瘰癧在頸腋者何氣使生岐伯曰此皆鼠瘻寒熱之毒氣也留於脈而不去者也帝曰去之奈何岐伯曰鼠瘻之本皆在於臟其末上出於頸腋之間浮於脈中而未內著於肌肉而外為膿血者易去也帝曰去之奈何岐伯曰請從其本引其末可使衰去而絶其寒熱審按其道以取之徐往徐來以去之其小如麥者一刺知三刺而已按經言其末出於頸項肩上缺盆當於手足少陽經取之針與灸如後穴天井肩井曲池各灸五壯肘尖上穴皆手少陽之經癧瘡出於頰下及頰車者當於手足陽明經取之後穴合谷足三里各七壯一法以手仰至肩上微舉肘骨尖上是穴隨瘡灸之瘡在右邊即灸右手瘡在左邊即灸左手艾炷如箸頭大再灸如前三次永無恙如患四年用藥不退辰時著艾申時即落所感稍深三灸即安仍以蒜片貼癧瘡上灸之五七壯易蒜再灸多灸效一法以線系項垂下至乳頭用銅錢記丟過背脊心是穴灸五壯灸了可服通利藥治案一婦患瘰癧延至胸腋膿水淋漓日久五心煩熱盜汗食少嗜臥月水不調臍腹作痛豫謂血虛而然非止癧瘡服逍遙散月餘小可更服八珍湯加牡丹皮香附子又月餘而經通再加黃耆白斂兩月而愈此憑證也一人勞倦耳下焮腫惡寒發熱頭疼作渴右脈大而軟當服補中益氣湯彼自用藥發表遂至嘔吐始信豫用六君子湯更服補中益氣湯而愈此憑證也大抵內傷榮衛失守皮膚間無氣滋養則不任風寒胃氣下陷則陽火上衝氣喘發熱頭痛脈大此不足之證也誤作外感表實而反泄之寧免虛虛之禍東垣云內傷右脈大外感左肺大當以此別之雖然以左右脈別內外此亦雖憑必須察形觀色審證參之以脈乃得不誤丹溪治一老人飢寒作勞患頸痛發熱惡寒骨節疼痛無汗妄語脈洪數而左甚治以參耆歸朮陳皮甘草每貼加附子一片五貼而愈一少年九月間發熱頭痛妄語大渴形肥脈數左大以參朮為君茯芍臣耆佐附子一片使蓋人肥而脈左大於右事急矣非附則參耆無捷功五十貼大汗而愈此皆在左脈大丹溪悉以內傷治之若依執東垣作外感寧不殺人一婦年二十二歲耳下結核經水每過期午後頭痛服頭痛藥愈甚治以八珍湯加柴胡地骨皮二十餘劑愈此憑證也一婦癧瘡潰後發熱煩躁作渴脈大無力此血虛也以當歸補血湯六劑頓退又以聖愈湯數劑少健加以八珍湯加貝母遠志三十餘劑而斂此證憑脈也一婦患癧四肢倦怠類癢證以養氣血健脾胃而愈此憑證也一人患癧痰盛胸膈痞悶脾胃脈弦此脾土虛肝乘木也當實脾土伐肝木為主彼以治痰為先乃服苦寒化痰藥不應又加破氣藥病甚始用六君子湯加芎歸數劑飲食少思以補中益氣湯加白朮月餘中氣少復又以益氣養榮湯月餘腫消而氣血亦復夫右關脈弦弦屬木乃木盛而克脾土為賊邪也虛而用苦寒之藥是虛虛也況痰為病不一主治之法不同凡治痰利藥太多則脾虛而痰反易生如中氣不足必用參朮為主佐以痰藥此憑證與脈也一人患瘰癧久而不斂神思困倦脈虛豫欲投以托裡彼為不然乃服散腫潰堅湯半月後發熱飲食少思復求治投益氣養榮湯三月喜其謹守得以收救此憑證也齊氏曰瘰瀝結核初覺宜內消之如經久不除氣血漸衰肌寒肉冷或膿清稀毒氣不出瘡口不合聚腫不赤結核無膿外證不明者並宜托裡膿未成者使膿早成既以潰者使新肉早生氣血虛者托裡補之陰陽不和托裡調之大抵托裡之法使瘡無變壞之證所以宜用也一人患瘰久而不斂膿出清水面黃羸瘦每清晨作泄與二神丸數服泄止更以六君子加芎歸月餘肌體漸復灸以豆豉餅及用補劑作膏藥貼之三月而愈此憑證也一婦潰後核不腐以益氣養榮湯三十餘貼更敷針頭散腐之再與前湯三十餘劑而斂一人患癧腫硬久而不消亦不作膿服散毒藥不應令灸肘尖二穴更服益氣養榮湯月餘而消一人尚硬亦灸前穴服前湯膿成針之斂嘗治二三年不愈者連灸三次兼用托裡藥即愈一人患癧腫痛發寒熱大便祕以射干連翹散六劑熱退大半以仙方活命飲四劑而愈一婦耳下腫痛發寒熱與荊防敗毒散四劑表證悉退以消腫潰堅湯數劑消大半再用神功栝蔞散四劑而平以上俱憑證也一婦肝經積熱患癧作痛脈沉數以射干連翹湯四劑少愈更用散腫潰堅丸月餘而消一婦肝經風熱耳下腫痛發熱脈浮數以薄荷丹治之而消一人年二十歲耳下患癧焮痛左關脈數此肝經風熱所致以荊防敗毒散三貼表證悉退再與散腫潰堅丸月餘平復已上俱恁脈也一婦因怒耳下腫痛以荊防敗毒散加連翹黃芩四劑而愈此無脈證而用發表藥必有所見也嘗治前證旬日不消者以益氣血藥及飲遠志酒並效無膿自消有膿自潰一人因怒耳下腫或脅作痛以小柴胡湯加青皮紅花桃仁四劑而愈此憑證也一人腫硬不作膿脈弦而數以小柴胡湯兼神效栝蔞散各數劑及隔蒜灸數次月餘而消此憑脈與證也一婦頸痛不消與神功栝蔞散六劑少定更以小柴胡加青皮枳殼貝母數劑痛腫減大半再以四物小柴胡數劑而平一人氣血已復核尚不潰用針頭散及必效散各三次不旬日而愈此皆憑證也一婦年三十患瘰癧已潰不愈與八珍湯加小柴胡地骨皮夏枯草香附貝母五十劑形氣漸轉更與必效散二服瘡口遂合惟氣血未平再用藥三十餘劑而平治瘰癧用必效散與栝蔞散相間服之神效今人不論虛實概用必效散殊不知斑蝥性冷大毒利水破血大損元氣若氣血實者用此劫之而投補劑或可愈若虛而用此或用追蝕之藥瘀肉雖去而瘡口不合元氣虛不可救一人耳下患核五枚如貫珠年許尚硬面色痿黃飲食不甘勞而發熱脈數濡而澀以益氣養榮湯六十餘劑元氣已復患處已消一核尚存必效散進二服而平一婦瘰癧不消膿清不斂用八珍湯少愈忽肩背痛不能回顧此足太陽經氣鬱所致當服防風通氣湯彼云瘰癧膽經病也是經火動而然自服涼肝降火之藥反至不食痛盛豫診之胃氣弱甚先以四君加陳皮炒芍藥羌活半夏蔓荊子數劑食進痛止繼以防風通氣二劑而愈此皆憑脈與證也一人神勞多怒頸腫一塊久而不消諸藥不應以八珍湯加柴胡香附每日更隔蒜灸數壯及日飲遠志酒二三杯漸消一婦月經不行漸熱咳嗽肌瘦胸膈不利頸腫一塊日久不消令服逍逍散月餘更服八珍湯加丹皮香附又月餘加黃耆白蘞兩月餘熱退腫消經行而愈一人因暴怒項下腫痛胸膈痞悶兼發熱用方脈流氣二劑胸膈利以荊防敗毒散二劑而熱退肝脈尚弦澀以小柴胡加芎歸芍藥四劑脈證頓退以散腫潰堅丸一料將平惟一核不消服神仙無比丸二兩而瘳此憑證與脈也一小兒周歲項患胎毒俟有膿出碗許乳食如常用托裡藥月餘而愈又一兒患此待膿自出幾至不救大抵瘡淺宜砭瘡深宜刺使瘀血出於毒聚之始則易消也況小兒氣血不弱膿成不針不砭鮮不斃矣一人項下患毒已成因畏針烙延至胸赤如霞其脈滑數飲食不進月餘不寐甚倦豫密針之膿出即睡覺而思食用托裡散兩月而愈又一人患此及時針刺數日而愈又一人素虛患此畏針直潰通項頰氣血愈虛而死一人耳後患毒脈證俱實宜用內疏黃連湯彼以嚴冬不服寒劑竟至不救羅謙甫曰用寒遠寒用熱遠熱假者反之雖違其時以從其證又云凡治病必察其下謂察時下之宜而權治之故曰經者常也法者用也醫者意也隨其所宜而治之則萬全矣一婦因怒項腫後月水不通四肢浮腫小便如淋此血分證也先以椒仁丸數服經行腫消更以六君子加柴胡枳殼數劑痊亦有先因小便不利後身發腫致經水不通名曰水分宜葶藶丸治之良方云婦人腫滿若先因經水斷絶後致四肢浮腫小便不通名曰血分水化為血血不通則復化為水矣宜服椒仁丸一癧婦咽間如一核所哽咽吐不出倦怠發熱先以四七湯而咽利更以逍遙散愈一婦所患同前兼膈不利肚腹膨脹飲食少思睡臥不安用分心氣飲並效以上皆憑證也一婦久郁患癧不潰既潰不斂發熱口乾月水短少飲食無味日晡尤倦以益氣養榮湯二十餘劑少健豫謂須服百劑庶保無虞彼欲速效反服斑蝥之劑及用追蝕毒藥而復結以致不能收斂流水不止遂致不救一人因勞而患癧怠情發熱脈洪大按之無力宜用補中益氣湯彼不信輒服攻伐之劑吐瀉而死大抵此證原屬虛損若不審虛實而犯病禁經禁鮮有不誤凡治先以調經解鬱更以隔蒜灸之多自消如不消即以琥珀膏貼之候有膿則針之否則變生他證設若兼痰兼陰虛等證只宜加痰藥不可干擾余經或氣血已復而核不消卻服散堅之劑至月許不應氣血亦不覺損方進必效散或進神仙無比丸其毒一下即止二藥更服益氣養榮湯數劑以調理瘡口不斂豆豉餅琥珀膏貼之虛甚而不慎飲食起居七情者俱不治此證以氣血為主氣血壯實雖不用追蝕之藥亦能自腐但取去其核易於收斂若氣血虛不先用補劑而數用攻蝕之藥適以自敗若發寒熱眼內有赤脈貫瞳人亦不治一脈者一年死二脈者二年死最驗靈樞經寒熱篇流注流注多因鬱結或暴怒或脾虛濕氣逆於肉理或腠理不密寒邪客於經絡或閃撲或産後瘀血流注關節或傷寒餘邪未盡為患皆因其氣不足邪得乘之常治郁者開之怒者平之閃撲及産後瘀血者散之脾虛及腠理不密者徐而補之傷寒餘邪調而解之大要以固元氣為主佐以見證之藥如久而瘡口寒者更用豆豉餅或附子餅灸之有膿管或瘀血者用針頭散腐及錠子尤效若不補血氣及不慎飲食起居七情俱不治抑鬱所致而不痛者宜調經脈補血氣腫硬作痛者行氣和血潰而不斂者益氣血為主傷寒餘邪未盡者和而解之暴怒所致胸膈不利者調氣為主脾虛濕熱凝滯肉理而然健脾除濕為主閃肭瘀血凝滯為患者活氣血調經鉻寒邪所乘筋攣骨痛或遍身痛宜溫經絡養血氣一人因怒脅下作痛以小柴胡對四物加青皮桔梗枳殼而愈一人因怒脅下腫痛胸膈不利脈沉遲以方脈流氣飲數劑而少愈更以小柴胡二十劑而痊一婦因閃肭肩患腫遍身作痛以黑丸子二服而痛止又以方脈流氣飲二劑而腫消更以二陳湯對四物加香附枳殼桔梗愈一婦腿患筋攣骨痛諸藥不應脈遲緊用大防風湯二劑即退又二劑而安一人腿患流注潰而不斂用人參養榮湯及附子餅灸更以補劑煎膏貼之兩月而愈一人脾氣素弱臂腫一塊不痛肉色不變飲食少思半載不潰先以六君子加芎歸芍藥二十餘劑飲食漸進更以豆豉餅日灸數壯於前藥再加黃耆肉桂三十劑膿熟針去以十全大補湯及附子餅灸之月餘而斂一人腫腿肉色不變不痛脈浮而滑以補中益氣湯加半夏茯苓枳殼木香煎以附子餅灸之彼云氣無補法乃服方脈流氣飲愈虛始用六君子湯加芎歸數劑飲食少進再服補劑月餘消一人臂腫筋攣骨痛年餘方潰不斂診脈更虛以內塞散一料少愈以十全大補湯及附子餅灸愈一人形勞氣弱背臂微腫以益氣養榮湯間服黑丸子及木香生地作餅覆患處尉之月餘膿成針之仍服藥而愈一人臂患年餘尚硬飲食少思朝寒暮熱八珍湯加柴胡地骨牡丹皮月餘寒熱少止再用益氣養榮湯附子餅灸兩月餘膿成針之更服人參養榮湯半載而愈一人臂注出腐骨三塊尚不斂發熱作渴脈浮大而澀氣血俱損多服生氣血之劑庶可保全彼謂火尚未盡乃用涼藥內服外敷幾危求治其形甚悴脈愈虛先以六君子加芎歸月餘飲食漸進以八珍湯加肉桂三十餘劑瘡色乃赤更以十全大補湯外以附子餅年餘瘥一老傷寒表邪未盡股患流注發熱以人參敗毒散二劑熱止矣香附餅叉小柴胡加二陳羌活川芎歸朮枳殼數劑而消一婦經不調兩月或三月一至四肢腫飲食少日晡發熱豫曰此脾土氣血虛也用養脾滋氣血藥飲食進則浮腫自消氣血充則經水自調彼以為緩用峻劑先通月經果腹痛滯不止遍身浮腫飲食減沒於木旺之月懸癰懸癰者患於肛門之前陰囊之後是也治之不早鮮不傷生凡覺腫痛急用甘草節煎湯服之以緩其勢隨以本方對證治之焮腫發熱者清肝解毒小柴胡制甘草之屬腫痛甚者解毒為主以制甘草是也不作膿或不潰者血虛也八珍湯腫痛小便赤澀者肝經濕熱也宜分利清肝龍膽瀉肝湯是也一人穀道前患毒焮痛寒熱此肝經濕熱所致名曰懸癰屬陰虛先以制甘草二服頓退再以四物加車前青皮甘草節制黃柏知母四服而消一人患此焮痛發寒熱以小柴胡湯加制甘草二劑少退又制甘草四劑而消一人腫痛小便赤澀以加減龍膽瀉肝湯加制甘草二劑少愈以參耆歸朮黃柏知母制甘草四劑而潰更以四物加黃柏知母參耆制甘草而愈一人膿熟不潰脹痛小便不利急針之尿膿皆利以小柴胡加黃柏白芷金銀花四劑痛止以托裡消毒散數劑而愈一人懸癰已潰但久不斂脈大無力以十全大補湯加五味麥門冬灸以豆豉餅月餘而愈一人腫痛發熱以小柴胡加黃連青皮四劑少愈更加以龍膽瀉肝湯數劑而消凡治懸癰初起腫痛或小便赤澀先用制甘草一二劑及蒜灸更以龍膽瀉肝湯若發熱腫痛者小柴胡湯加車前黃柏芎歸膿已成即針之已潰用八珍湯加制甘草柴胡梢酒黃柏知母小便澀而脈有力者仍用龍膽瀉肝湯加制甘草小便澀而脈無力者用清心蓮子飲加制甘草膿清不斂者用大補劑間以豆豉餅灸或久而不斂者亦用附子餅灸並效囊癰囊癰之患濕熱下注也有作膿者此濁氣順下將流入滲道因陰道或虧水道不利而然膿儘自安不藥可也惟在善於調攝耳又有因腹腫漸流入囊腫甚則囊自裂開睪丸懸掛水出以杉木炭末敷外以紫蘇葉包裹仰臥養之精要謂癰入囊者死將以為腐腎耶豫治數人悉以濕熱入肝經施治而以補陰佐之雖膿潰皮脫睪丸懸掛亦不死但下虛年老者非大補不起大抵此證屬陰道虧濕熱不利所致故滋陰降濕藥不可缺常治腫痛小便祕滯者用除濕為主滋陰佐之腫痛已退便利已和者除濕滋陰藥相兼治之欲其成膿托裡為主滋陰佐之候膿成即針之仍用托裡滋陰若濕毒已盡者專用托裡如膿清或多或斂遲者用大補之劑或附子餅灸之膿成脹痛者急針之更飲消毒之劑腫痛未作膿者疏導肝之滯濕腫硬發熱清肝降火凡膿清不斂大補血氣已潰者滋陰托裡一人囊癰未作膿而腫痛以加減龍膽瀉肝湯二劑少愈更以四物加木通知母黃柏而消一人膿熟作脹致小便不利急針之膿出以小柴胡加黃柏白芷金銀花四劑少愈更以托裡散數劑而消一人年五十陰囊腫痛得熱愈盛服蟠蔥散不應肝脈數此囊癰也乃肝經濕熱所致膿已成急針之以龍膽湯脈證悉退更服托裡滋陰藥外敷杉木炭紫蘇末月餘而愈一人囊腫狀如水晶時痛時癢出水小腹按之作水聲小便數脈遲緩此醉後飲水入房汗出遇風寒濕毒乘聚於囊名水疝也先以導水丸二服腹水已去小便如常再以胃苓散倍加白朮茯苓更用氣針引去聚水而瘥一人焮腫痛甚小便澀發熱脈數以龍膽瀉肝湯倍車前木通澤瀉茯苓病去半仍以前湯加黃柏金銀花四劑又減二三便利如常惟一處不消此欲成膿再用前湯加金銀花皂角針白芷數劑惟腫痛脈滑數乃膿已成針之腫消投滋陰托裡藥及紫蘇末敷之愈一婦陰內膿水淋漓或痛或癢狀如蟲行少陰脈滑數此陰中有瘡也名曰䘌由心神煩郁胃氣虛弱氣血凝滯所致與升麻白芷黃連木通當歸川芎白朮茯苓柴胡煎服以榻腫湯薰洗更搽蒲黃水銀兩月而愈又有子臟虛寒冷氣下衝致陰脫出謂之下脫或因産時努力而脫者宜當歸散久不愈者補中益氣湯倍加升麻柴胡舉之下疳腫痛或發熱者肝經濕熱也清肝燥濕腫痛發寒熱者邪氣傷表也發散之腫痛小便赤澀者肝經濕熱壅滯也疏肝導濕張子和曰遺精癃閉陰痿脬痹精滑白淫皆男子之疝不可妄歸之腎冷若血涸不月月罷腰膝上熱足熱嗌乾癃閉小腹有塊或定或移前陰突出後陰痔核皆女子疝也但女子不謂之疝而謂之瘕一人患小便腫硬焮痛寒熱先以人參敗毒散二貼而止更以小柴胡加黃連青皮而愈一人潰而腫痛小便赤澀以加減龍膽瀉肝散加青皮黃連二劑少愈以小柴胡加黃連知母茯苓數劑而愈一人莖腫不消一人潰而腫痛發熱小便祕澀日晡或熱一小兒腫痛諸藥不應各以小柴胡吞蘆薈丸數劑並愈一人陰莖或腫或作痛或梃縱不收一人莖中作痛急縮或作癢白物如精隨溺而下此筋疝也並用龍膽瀉肝湯皆愈一人潰而腫痛發熱日晡尤甚以小柴胡加黃柏知母當歸而愈一人潰愈惟莖中一塊不散以小柴胡加青皮荊防治之更以荊防牛膝何首烏滑石甘草各半兩煎湯薰洗各數服而消一人年逾四十素有淋患疳瘡焮痛倦怠用小柴胡加連柏青皮當歸而愈一人因勞莖竅作癢時出白物發熱口乾以清心蓮子飲而安一人玉莖腫痛小便如淋自汗甚苦時或尿血少許尺脈洪滑按之則澀先用清心蓮子飲加牛膝山梔黃柏知母數劑少愈更以滋腎丸一劑而痊先賢云如自汗小便少不可以藥利之既以自汗則津液外亡小便自少若利之則榮衛涸竭無以制火煩熱愈甚當俟熱退汗止小便自行也兼此乃陽明經火忌利小便也一老患疳瘡小便淋澀脈細體倦此氣虛兼濕熱也用清心蓮子飲及補中益氣湯而愈下疳瘡丹溪用青黛蛤粉密陀僧黃連為末敷又以雞肫皮燒存性為末敷下疳瘡並臁瘡哈粉臘茶苦參密陀僧為末河水洗淨豬油調敷又方米泔水洗瘡淨用頭髮鹽水洗去油淨再用清湯洗曬乾燒灰敷瘡即生靨又方治注疳瘡蝕臭腐爛疼痛難忍兼治小兒疳瘡黃柏炙黃丹三錢輕粉五分乳香三錢密陀僧三錢高木香三錢麝香少許上為末用蔥湯洗瘡次貼之此藥敷藥木香檳榔黃連銅青輕粉枯礬海螵蛸麝香各等分為末洗後至夜敷上洗藥黃連黃柏當歸白芷獨活防風荊芥朴硝等分水煎入錢五十文烏梅五個鹽一匙同煎沸溫洗日五七次敷前項藥便毒內蘊熱毒寒熱者解散之勞役而患者補之不遂交感或強固精氣致敗而結者解散之濕熱而致者清肝導濕大抵此證多患於勞役之人亦有內蘊熱毒而生者須辨虛實及膿成否不可妄投藥餌常見治此概用大黃之類下之以求內消或膿成令膿從大便出鮮有見其痊者人多欲內消者恐收之難也若補養氣血不旬日而收矣若膿既成其有可消之理再用克伐之劑反為難也一人患此未作膿小便祕澀以八正散三劑少愈以柴胡加澤瀉山梔木通二劑而愈一老婦腫痛膿未作小便滯肝脈數以加減龍膽瀉肝湯加山梔黃柏四劑而消一人腫痛發寒熱以荊防敗毒散二劑而止解散二劑而消一人膿未成大痛以消毒托裡內疏藥不應脈洪大毒尚在以仙方活命飲一貼痛止又劑而消一人腫痛日晡發熱以小柴胡加青皮天花粉四劑痛止熱退以神效栝蔞散四劑而消一人焮腫作痛大小便祕脈有力以五燭散二劑頓退更以龍膽瀉肝湯四劑而消一人潰而痛不止諸藥不應診之脈大按之則數乃毒未解也以仙方活命飲而止又二劑而消一人潰而痛不止以小柴胡黃柏知母芎歸四劑少止更以托裡當歸湯數劑而斂一人服克伐藥以求內消致瀉利少食以二神丸先止其瀉以十全大補倍加白朮茯苓數劑而消一人不慎房勞患此腫痛以雙解散二服其病即止更以補中湯數劑而膿成針之以八珍湯加五味子麥門冬柴胡三十餘劑大抵便癰者血疝也俗呼為便毒言於不便處患之故也乃足厥陰肝經絡及衝任督脈亦屬肝之旁絡也是氣血流通之道路今壅而腫痛此則熱毒所致宜先疏導其滯更用托裡之劑此臨證制宜也一人年逾四十患便毒克伐太過飲食少思大便不實遺精脈微東垣云精滑不禁大便自利腰腳沉重下虛也仲景曰微弱之脈主氣血俱虛先以六君子加破故紙肉豆蔻煎服泄止食進更以十全大補湯加行經藥十餘劑而消一人患便毒膿稀脈弱以十全大補湯加五味麥冬白斂三十餘劑稍愈更以參耆歸術膏而平因新婚復熱聚腫堅硬四肢冷脈弱皮寒飲食少思此虛極也仍用前藥加桂附三劑稍可彼欲速愈自用連翹消毒散泄利不止而歿一人年逾四十數勞苦患便毒發寒熱先以小柴胡加青皮一服表證悉退次以補中益氣湯加穿山甲二劑腫去三四更以托裡之藥五六服膿成刺去旬日而斂夫便毒足厥陰濕氣因勞倦而發用射干三寸同生姜煎食前服利二三行效射干紫花者是紅花者非又方破故紙炒牛蒡子炒牽牛炒大黃酒拌煨各等分上為細末每服一兩酒調下又方已成膿者大黃連翹各半兩枳實三錢厚朴二錢甘草節各二錢桃仁二十一粒上咀作三服姜三片水煎服消毒飲治便毒初發三四日可消皂角刺金銀花防風當歸大黃甘草節栝蔞仁各等分上水酒各半煎食前溫服仍頻提掣頂中發立效又方白殭蠶槐花各等分為末酒調服一方加大黃又方木鱉子大黃栝蔞桃仁草龍膽各等分上咀濃煎露一宿清晨溫服立愈又方梔子大黃乳香沒藥代赭石各一錢當歸五分作一服水煎溫服一人腫而不潰以參耆歸朮白芷皂角刺柴胡甘草節數劑而潰以八珍湯加柴胡數劑愈一人潰而腫不消且不斂診之脈浮而澀以豆豉餅灸更以十全大補湯月餘而愈乳癰暴怒或兒口氣所吹痛腫者疏肝行氣腫焮痛甚者清肝消毒焮痛發寒熱者發散表邪未成膿者疏肝行氣不作膿或不潰托裡為主潰而不斂或膿清者大補氣血一婦稟實性躁懷抱久郁左乳內結一核不消按之微痛以連翹飲子二十餘劑少退更以八珍湯加青皮桔梗香附貝母二十餘劑而消一婦發熱作渴至夜尤甚兩乳忽腫服敗毒藥熱反熾診之肝脈洪數乃熱入血室以加味小柴胡治之熱止腫消一婦兩乳內時常作痛口內常辣臥起若急臍下牽痛以小柴胡加青皮黃連梔子而愈一婦郁久左乳內結核如杏許三月不消心脈澀脾脈大按之多力以八珍湯加貝母遠志香附柴胡青皮桔梗五十餘劑而潰又三十餘劑而愈一婦久郁右乳內結三核年餘不消朝寒暮熱飲食不甘此乳岩也乃七情所傷肝經血氣枯槁之證宜補氣血解鬱結遂以益氣養榮湯百餘劑血氣漸復更以木香餅灸之嘉其謹疾而消一婦膿成不潰脹痛豫欲針之令毒不侵展不又數日痛極始針湧出敗毒三四碗虛證蜂起幾殆用大劑補之兩月餘始安夫乳者有囊橐有膿不針則遍患諸囊矣少壯者得以收斂老弱者多致不救一婦腫而不作膿以益氣養榮湯加香附青皮數劑膿成針之旬日而愈一婦右乳腫發熱怠惰嗜臥無氣以動至夜熱尤甚以補中益氣湯兼逍遙散而痊一産婦因乳少服藥通之致乳房腫痛而脹發熱作渴狀若傷寒以玉露散而愈夫乳汁氣血行化者在上為乳在下為經若衝任脈盛脾胃氣壯則乳汁多而濃血衰則少而淡所乳之子亦弱而多病此自然之理也亦有屢産有乳再産無乳或大便澀滯乃亡津液也三因論云産婦乳脈不行有二有氣血盛閉而不行者有氣血弱澀而不行者虛當補之盛當疏之盛者當用通草漏蘆土瓜根輩虛者當用煉成鍾乳粉豬懸蹄鯽魚之類概可見矣亦有乳汁不止者多屬於虛不約束也一婦乳癰愈後發熱服養氣血藥不應八珍湯加炮乾薑四劑而愈仍以前湯加黃耆香附三十餘劑而安一婦乳癰膿成針刺之及時不月而愈一婦因怒兩乳腫兼頭痛寒熱以人參敗毒散二劑表證以退以小柴胡加芎歸桔梗枳殼四劑而痊一婦郁久乳內結核餘年不散日晡微熱飲食不思治以益氣養榮湯嫌緩乃服行氣之劑勢愈甚潰而日出清膿不止復求治診之脈洪而數辭不治又年餘果歿一婦産次子而無乳服下乳藥但作脹豫謂乳皆血氣所化今脹而無乳是氣血竭而津液亡也當補氣血自有乳矣與八珍湯倍加參朮少加肉桂二十餘劑乳遂生後因勞役傷竭蓋初産有乳再而無其氣血只給一産耳其衰可知間有産後乳出不止亦為氣虛宜補藥止之其或斷乳兒不吮亦能作脹用麥芽炒為末白湯調服以散之若兒吮破乳頭成瘡用蒲公英末或黃連胡粉散摻之若乳頭裂破以丁香末或蛤粉胭脂末敷之並效一婦郁久右乳腫硬以八珍湯加遠志貝母柴胡青皮及隔蒜灸兼服神效栝蔞散兩月而消一婦左乳內腫如桃許不痛色不變發熱漸消瘦以八珍湯加香附遠志青皮柴胡百餘劑又間服神效栝蔞散三十餘劑膿潰而愈患者或責效大速或不戒七情俱難治大抵四十餘後者尤難治蓋因陰血日虛也況醫用藥不分經絡虛實未有能保痊也一婦乳內腫一塊如雞子大勞則作痛久而不消服托裡藥不應此乳勞證也肝經血少所致先與神效栝蔞散四劑更隔蒜灸腫少退再服八珍湯倍加香附夏枯草蒲公英仍間服前散月餘而消又有乳疽一證腫硬木悶雖破而不潰腫亦不消尤當急服此散及隔蒜灸此二證乃七情所傷氣血所損亦榮證也宜戒怒節飲食慎起居否則不治一婦年逾二十稟弱乳內作痛頭疼脈浮與人參敗毒散倍參一劑表證悉退但飲食少思日晡微熱更以小柴胡同六君子二劑熱退食進方以托裡藥加柴胡十餘劑針出膿而愈一婦亦患此豫謂須多服養氣血解鬱結藥可保無害不信乃服攻伐之劑及大如碗口出膿乃清不斂而沒一婦因怒左乳作痛內腫發熱表散太過致熱益甚以益氣養榮湯數劑熱止膿成焮痛針之不從遂腫脹大熱發渴始針膿大泄以前湯百餘劑始愈一人因怒左乳腫痛肝脈弦數以復元通氣散二劑少愈以柴胡湯加青皮芎歸而消一後生作勞風寒夜發熱左乳痛有核如掌脈細澀而數此因陰滯於陽也詢之以酒得遂以栝蔞子石膏乾葛川芎白芷蜂房生薑同研入酒飲之四帖而安夫乳頭厥陰所經乳房陽明所屬厥陰者肝也乃女子致命之地宗筋之所且各有囊橐其始焮腫雖盛受患止於一二橐若膿成不刺攻潰諸囊矣壯者猶可弱者多致不救所以必針而後愈用蒲公英忍冬藤少入酒煎服即欲睡是其功也及覺而病安矣未潰以青皮加栝蔞桃仁連翹川芎橘葉皂角刺甘草節隨證加減煎服已潰以芎歸參耆白芍青皮連翹栝蔞甘草節煎一婦乳癰氣血頗實但瘡口不合百法不應與神效栝蔞散四帖少可更與四帖及豆豉餅灸而愈一婦乳癰寒熱頭痛與荊防敗毒散一帖更以蒲公英一握入酒二三盞再搗取酒熱服渣熱罨患處而消此因頭痛發熱乃表證也故用表散蒲公英俗呼孛孛丁夏秋間開黃花似菊散熱毒消腫核散滯氣解金石毒聖藥乳硬多因乳母不知調養所致或忿怒所逆鬱悶所遏厚味所釀以致厥陰之氣不行故竅閉而汁不通陽明之血沸騰故熱甚而化膿或因乳子膈有滯痰含乳而睡口氣焮熱所吹而成結核初便忍痛揉軟吮令汁透可散否則結成矣治以青皮疏厥陰之滯石膏清陽明之熱生甘草節行濁滯之血栝蔞子導毒消腫或加沒藥青橘葉皂角刺金銀花當歸或湯或散佐以少酒若加艾火兩三壯於痛處尤妙粗工便用針刀必惹崛病腹癰一人年逾三十腹患癰腫脈數喜冷齊氏曰瘡瘍腫起堅硬者實也河間曰腫硬瞀悶煩躁飲冷邪在內也用清涼飲倍加大黃三帖稍緩次以四物湯加芩連梔子木通四劑而潰更以十宣散去參耆桂加金銀花天花粉彼欲速效自服溫補藥肚腹遂腫小便不利仍用清涼飲膿潰數碗以托裡藥治之而愈一人腹癰焮痛煩躁作嘔脈實河間曰瘡瘍火屬須分內外以治其本又云嘔噦心煩腫硬瞀悶或皮肉不變脈沉而實毒在內也當疏其內以絶其源用內疏黃連湯利二三行諸證悉去更以連翹消毒散而愈一人腹癰膿熟開遲脈微細膿出後瘡口微膿如蟹吐沫此內潰透膜也瘡瘍透膜十無一生雖用大補亦不能救此可為待膿自出之戒也一人腹內一塊不時作痛痛則不知人事良久方蘇諸藥不應其脈沉細非瘡也河間云失笑散治疝氣及婦人血氣痛欲死並效與一服痛去六七再服而平此藥治産後心腹絞痛及兒枕痛尤妙一人素嗜酒色小腹患腫毒脈弱微痛欲求內消豫謂當助胃壯氣兼行經活血佐之可消彼欲速效自用敗毒等藥勢果盛瘡不潰膿飲食少思兩月餘復請診脈愈弱盜汗不止聚腫不潰肌寒肉冷自汗色脫此氣血俱虛故不能發腫成膿以十全大補湯三十餘服膿成針之反加煩躁脈大此亡陽也以聖愈湯三服仍以蔥湯百服而愈疔瘡脈浮數者散之脈沉實者下之表裡俱實解表攻裡麻木大痛或不痛者並灸之更兼攻毒疔瘡以其瘡形如丁蓋之狀也多因肥甘過度不慎房酒以致邪毒蓄結遂生疔瘡經曰膏粱之變足生大疔是也亦有人患多汗滴入肉食而生亦有誤食死牛馬而生不可不慎初生頭凹腫痛赤黃赤黑無復定色便令煩躁悶亂或憎寒頭痛或嘔吐心逆者是也急於艾炷灸之若不覺痛針瘡四邊皆令血出以回瘡錠子從瘡口紝之貼以膏藥仍服五香連翹湯漏蘆湯等疏下之為效針之不痛多血者以猛火燒鐵針通赤於瘡上烙之令如焦炭取痛為效亦紝前錠子貼以膏藥經一二日膿潰根出服托裡散依常療之如針不痛其人眼黑或見火光者不可治此毒已入臟腑也一人足患作膿惡寒嘔吐時發昏亂脈浮數明灸二十餘壯始痛以奪命丹一服腫起更以荊防敗毒散而愈一人左手臂患之是日一臂麻木次日半體皆然神思昏潰遂明灸二十餘壯猶不痛至百壯始痛以奪命丹一服始腫起更用神異膏及防風敗毒散而愈一人腳面生疔形雖如粟其毒甚大宜峻利之藥攻之因其怯弱以隔蒜灸五十餘壯癢止再灸片時知痛更貼膏藥再以人參敗毒散一服漸愈至陰之下道遠位僻藥力難達若用峻劑則藥力未到胃氣先傷不如灸之為宜一人感風毒面生疔十餘枚腫痛脈數服荊防敗毒散稍愈尚可畏更用奪命丹一服而愈一婦六十右耳下天容穴間一疔其頭黑靨四邊泡起黃水時流渾身麻木發熱譫語時時昏沉六脈亂洪用烏金散以汗之就用鈹針刺瘡心不痛周遭再刺十餘下紫黑血出方知疼痛即將寸金錠子紝之瘡內外用提疔子放瘡上膏日貼護次日汗後精神微爽卻用破棺丹下之病即定其瘡潰動後用守效散貼塗紅玉錠子紝之八日疔出茲所謂審脈證汗下之間外治次第如此殊勝不察脈證但見發熱譫語便投下藥或兼香竄之藥遂至誤人遠矣世人多雲是瘡不是瘡且服五香連翹湯然或中或否致誤者多蓋不審形氣虛實瘡毒淺深發表攻裡所因不同故也此藥善於驅逐又以五般香竄佐之與漏蘆相間大黃為佐大黃入陽明太陽性能走不守泄諸實熱以其峻捷故號將軍雖各有參耆漏蘆甘草之補藥寧免驅逐之禍乎一人胸患遍身麻木脈數而實急針出惡血更明灸數壯始痛服防風通聖散得利而愈一夫人面生疔腫焮痛甚數日不潰肺證俱實治以荊防敗毒散加芩連稍愈彼以為緩乃服托裡散一劑勢盛痛極始悟再服用涼膈散二服痛減腫潰又與連翹消毒散十餘劑而愈一人唇生疔瘡以五日腫硬脈數煩躁喜冷此胃經積熱所致先以涼膈散一服熱去五六更與奪命丹二粒腫退二三再以荊防敗毒散四劑而愈一人患之發熱煩躁脈實以清涼飲下之而愈一鄭氏舉家生疔多在四肢皆食死牛肉所致刺去惡血更服紫金丹悉愈一人唇下生疔脈證俱實法宜下之反用托裡故口鼻流膿而死是謂實實之禍也一老婦足大指患疔甚痛令灸之不從專服敗毒藥致真氣虛而邪氣愈實竟不救蓋敗毒藥雖能表散瘡毒然而感有表裡所發有輕重體段有上下所稟有虛實豈可一概而用之耶且至陰之下藥力難到專假藥力則緩不及事不若灸之為速故下部患瘡皆宜隔蒜灸之不痛者宜明灸之及針疔四釁去惡血以奪命丹一粒入瘡頭孔內仍以膏藥貼之若患在手足紅絲攻心腹者就放絲盡處刺去惡血宜服荊防敗毒散若絲近心腹者宜挑破瘡頭去惡水以膏藥貼之如麻木者服奪命丹如牙關緊急或喉內患者並宜噙一二丸疔瘡丹溪用磁石為末苦酒和封之根即出又方巴豆十粒大半夏一粒大附子半個蜣螂一枚上各為末用麝和看瘡大小以紙繩子圍瘡口以藥泥上用帛貼敷時換新藥以瘥為度活人甚多
