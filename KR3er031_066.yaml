body:
  text: 卷之六十六面部候病機敘論靈樞經曰首面與身形也屬骨連筋同血合於氣耳天寒則冽地凌冰其卒寒或手足懈惰然其面不衣何也岐伯曰十二經脈三百六十五絡其血氣皆上於面而走空竅其精陽氣上走於目而為睛其彆氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走唇舌而為味其氣之津液皆上熏於面而皮又厚其肉堅故天氣甚寒不能勝之也又曰頭面者諸陽之會也難經曰人面獨能耐寒者何也諸陽脈皆上頭故令面耐寒也又云手足六陽之經皆上至頭而走足陽明胃之經起鼻交頞入齒中俠口環唇循頰車上耳門前過客主人穴若胃中風熱上攻令人面腫或面鼻色紫風刺癮疹或熱或寒當分虛實寒熱調治之面熱面寒經曰面熱者足陽明病熱面寒者為胃寒陽明胃經氣盛有餘則身以前皆熱況其人素食膏粱積熱於胃陽明經多血多氣本實則風熱上行諸陽皆會於頭目故面熱之病生矣先以調胃承氣湯七錢加黃連二錢犀角一錢疏下二三行徹其本熱次以升麻加黃連湯去經絡中風熱上攻如此則標本之邪熱退矣面腫屬肝風胃火面浮屬脾土肺金面腫與浮最宜分別腫則為實因風火上炎紅腫而熱或接而痛此邪有餘脈必急躁緊實當用防風通聖散之類散而瀉之面浮則為虛因脾傷勞後飲食失節水土不調脾氣輸散不常肺氣傳布失度故面虛浮眼下如臥蠶之狀或有氣喘皆其候也此正氣不足脈必虛弱或浮而無力當用實脾散順氣消導分利之面色應五臟難經云肝外證面青喜潔善怒心外證面赤口乾善笑脾外證面黃善噫善思善味肺外證面白善嚏善愁不樂欲哭腎外證面黑善恐欠久病人面色轉黃此欲愈也病人面紅難愈不病人面色紅有肺火瘦人面紅血虛有火瘦人面白色如枯骨此血虛氣弱當防痰火病作亦難治女人面兩顴頰紅色名曰帶桃花此肺金燥火所乘心火克肺大腸膀胱無蔭故多淫而無子女人面色青者性惡多怒面黃者乃脾胃濕熱病黃而兼青色者為木剋土主死不治不病人面色如灰塵眼下青黑即有病至不能治病應愈面色如煤不開者終必死治法治頭面腫子和汗法速效戴人治頭面腫者為風乘陽明經也陽明為氣血俱多乃與通聖散入薑蔥豆豉同煎服取微汗以草莖刺鼻中出血其腫立消學者不可不知也面浮氣喘者有虛有實虛者宜理脾調氣實者宜降氣瀉氣蘇子降氣湯木香檳榔丸皆可選用藥方和劑防風通聖散去硝黃加生薑蔥白豆豉煎服取汗方見風門治面目皆腫風火炎上者一服立愈大便結者不去硝黃木香檳榔丸治氣喘面浮腫胸膈飽悶方見氣門升麻黃連湯治面熱升麻葛根各錢半黃連酒炒黃芩酒炒各六分炙甘草白芷各五分芍藥七分生犀角川芎各四分半荊芥穗薄荷葉各三分上咀作一服水一盞煎八分食後服升麻附子湯治面寒升麻葛根各一錢四分白芷黃耆酒炒附子炮各九分半草豆蔻人參各七分益智甘草炙各四分水二盞蔥白五莖煎八分食後服胃風湯治虛風證能食麻木牙關緊搐目瞤動胃中風熱故面獨腫宜用此方升麻白芷各一錢乾葛蒼朮制各五分柴胡藁本各二分羌活黃柏蔓荊子甘草炙各分半草豆蔻白薑各二分當歸七分麻黃三分水二盞棗二枚煎八分食遠服梔子荊芥湯治頭面生瘡梔子荊芥黃芩川芎白芷白芍藥桔梗生地黃升麻枳殼麩炒大黃各一錢甘草五分上水二盞煎八分食後服玉容散治面生黑皯雀斑甘松三奈茅香各半兩白芷白芨白蘞白殭蠶白附子天花粉緑豆粉各一兩防風零陵香藁本各二錢肥皂二定去皮弦為細末每早洗面白附丹治男子婦人面生黑斑點白附子白芨白蘞白茯苓密陀僧研白石脂研定粉研各等分上為末人乳汁和丸圓眼大陰乾用時先用洗面洗淨次用濕漿水磨化敷之或為末乳汁調敷亦可胡粉丹治前證胡粉密陀僧白芷白附子白茯苓各等分上為末先用蘿蔔煎湯洗面淨後用羊乳調藥至夜敷息處次早洗去黃連散治面部熱毒惡瘡黃連黃柏炙胡粉炒上為末香油調敷豬油亦可礬硫散治風熱上攻陽明經面鼻紫色風刺癮疹枯礬硫黃各半兩上為末入丹染與色同用津調塗敷內服防風通聖散硫黃膏治面部生瘡或鼻赤風刺粉刺生硫黃白芷天花粉膩粉各五分芫青七個去翅足全竭一枚蟬蛻五個上為細末用麻油黃蠟約如合面油多少熬溶離火方入前末藥和勻每用臨臥時洗面淨以少許塗面近眼處勿塗數日間腫處自平赤鼻亦消退風刺一夕見效痄腮候痄腮牙病而外及於腮頰俱腫是也山居治痄腮用雞子清調赤小豆末敷之易簡諸方梅師方治人面目卒得赤黑丹如疥狀不急治遍身即死鹿角燒末豬脂和塗之又方治人頭面患癧瘍用雄黃硫黃礬石為末豬脂和塗又方無青子二兩杏仁一兩並搗栝蔞一個銼豬胰五具用淳酒四盞浸之至夜溫熱敷患處其皮膚光白若赤可加土瓜根一兩大棗七枚自白肘後方治面目身上赤斑或癢或瘰子腫起不即治之日益甚用羚羊角燒為灰研極細以雞子清和塗之效又方治面皯𪒟如雀卵色以羖羊膽一枚酒三杯同煮三沸以塗拭之日三度瘥又方治前證以苦酒漬白朮用汁常以拭面即漸愈之又方治面及鼻病酒皶以馬藺子杵爛水調敷之聖惠方治黑痣生於面用藜蘆灰五兩水一碗淋灰汁銅器中盛以重湯煮令如黑膏以針微撥破痣處點之良不過三次又方治皯𪒟用密陀僧一兩細研以人乳汁調塗面每夜用之效或同煎二三沸塗令面光澤又方去黑子夜以暖漿洗面以布揩黑子令赤痛水研白檀香濃汁塗之旦又以漿水洗面仍以鷹屎粉黑子上點洗之妙又方治面皯皰及産婦黑疱如雀卵色用白茯苓末蜜和敷之崔元亮海上方滅瘢膏用黃礬石燒令汁出胡粉炒令黃各八分惟要細研以臘月豬脂和更研如泥取生布拭患處令痛即用藥塗五度後取鷹屎白燕窩中草燒作灰各等分人乳調塗之其瘢自滅內平如故葛氏方治黑皯令人面色好用白殭蠶並白牽牛細辛等分為末人乳丸緑豆大臨洗面時溫水化開洗面效孫真人食忌云炊湯經宿洗面令人無顏色炊湯洗浴令人成癬未經宿者亦然一方療大面皯令人細膩用鹿角尖取實白處於平石上磨濃取一合乾薑一兩搗末密絹篩和鹿角汁勻每夜先以暖漿水洗後敷藥二三次七日顏色好塗藥勿見風日慎之又方治面上暴生瘡用生杏仁搗爛以雞子清調如煎餅至夜洗面塗之旦以水洗之數十次愈子母祕録治面上皯黑子以李核仁去皮細研以雞子清和如餳至夜塗旦以水洗之後塗胡粉不過五六日有效慎風衍義方用石灰調水一碗如稠粥揀好糯米粒全者半置灰中半灰外經宿灰中米色變如水精若人手面上有黑靨子及紋刺先微微以針頭撥動置少許如水精者於其上經半日許靨汁自出則去藥不用且勿著水二三日效又方治指甲爪破面用生薑自然汁調輕粉敷破處無痕又方治粉刺以白礬末少許酒調塗之又方治頸油汙衣領者每日梳洗畢以雞子清用手擦頸上併發際雖新衣亦不汙也至妙千金方治面生粉刺搗菟絲子絞取汁塗之妙又方治面上皶刺皯𪒟用木蘭皮細切一斤以三年酢漿浸之百日出於日中曬搗末漿水調服方寸匕日三服良又方治鼻面酒皺皰用鸕鷀糞一合研臘月豬脂和每夜敷之又方冬瓜子退去皮搗為丸空心服三十丸令人白潔如玉醫案一人不病忽一日滿面黑色自想氣色黑者死求醫診視一醫為診脈無病似為穢氣蓄於面部不散故致黑色曾有是否患者曰果登廁被臭氣隱忍良久下廁遂有此醫曰去惡臭無過至香可用沉檀焚爐中安帳內患人以被圍坐勿令香氣散出瞑目端坐候香氣盡方可揭帳依其法行之面色漸變旬日如故一人年六十身瘦弱病頭面不耐寒氣弱不敢當風行坐諸藥不效醫為診脈皆弦細而微且其人年高素食茶果而陽明之經本虛經云氣不足則身以前皆寒栗此由胃氣虛不上榮於頭面故惡風寒先以附子理中湯溫其中氣次以升麻加附子主之針灸陷谷面腫目癰腫刺出血立愈頰車頰腫口急頰車痛不可以嚼針灸皆可合谷列缺地倉面頷腫生瘡皆可用取胃經其一云足陽明之脈是動則病灑灑惡寒顏黑取腎經其二足少陰腎脈是動則病飢不欲食面如漆柴視盛虛寒熱取之少陰絡治面黑齒長而垢腹脹閉太陽絡太陰絡腹脹閉不得息善噫嘔逆則面赤不逆則面黑髭發門病機敘論六節藏象論篇曰腎者主蟄封藏之本精之處也其華在發五臟生成篇曰腎之合骨也其榮發也多食甘則骨痛而發落注云甘益脾勝於腎腎不勝故骨痛而發脫落上古天真論曰女子一七歲腎氣實齒更髮長五七陽明脈衰面始焦發始墮丈夫八歲腎氣實髮長齒更五八腎氣衰發墮齒稿巢氏病源云足少陽膽之經其榮在須足少陰腎之精其華在發衝任之脈為十二經之海謂之血海其別絡上唇口若血盛則榮於頭髮故鬚髮美若血氣衰弱經脈虛竭不能榮潤故鬚髮禿落靈樞經帝曰婦人無須者無氣血乎岐伯曰衝脈任脈皆起於胞中上循背裡為經絡之海其浮而外者循腹上行會於咽喉別絡唇口今婦人之生有餘於氣不足於血以其數脫血也女人月月而經通故云數腫血衝任之脈不榮口唇故須不生焉又曰人有傷於陰陰氣絶而不起陰不用然其須不去宦者獨去其故何也岐伯曰宦者去其宗筋傷其衝脈血瀉不覆皮膚內結唇口不榮故須不生有人未嘗被傷不脫於血其須不生何也曰此天之所不足也稟衝任不盛宗筋不成有氣無血唇口不榮故須不生眉須鬢髮總為血之經帝曰髭發黃赤者多熱多氣白者少血少氣黑色者多血少氣美眉者太陽多血通髯極須者少陽多血美須陽明多血此其時然也治法岐伯曰上古之人其知道者法於陰陽和於術數飲食有節起居有常能妄作勞故能形與神俱而盡終其天年度百歲乃去甫謂果能如古人之知道則不須藥其髭發必能與形神俱而不衰白也今人不能如古人又不知資給之養其不早歲墮白者幾希愚見今人七情六欲內外交侵若不襲方藥以資之鮮有能存其形神者也必於四八之年先備滋益之藥不待於既衰之後用之亦是追及古人之十一也較之自棄者不亦偉哉此則所謂雖不盡其自然之天是亦其次曲而存之者也髭發黑美須養氣血氣血盛則髭發美氣血衰則髭發白此必然之理也人年三十之後常服補腎滋陰之藥保和氣血至老頭須不白信有驗矣用藥於既衰之後豈能及之乎如凡事止於未動之先則易為矣若於既去之後而欲挽復之者鮮有及焉黑髮烏須當知六子延齡益算須重七珍神仙六子丸七珍至寶丹二藥皆滋陰之妙劑人於鬚髮未白之先制此二藥常常相間吞服不息必能益壽烏須若暫服不常故難取效知者審之藥方神仙六子丸男子三十年後服此藥一歲二單制服不息永不白鬚發年四十之上或有微白及少年人焦黃不潤服此百日自然漆黑其效如神菟絲子制如法金錠子覆盆子五味子枸杞子蛇床子炒各一兩何首烏酒浸一宿焙牛膝同上地骨皮熟地黃酒浸各三兩舶上茴香鹽炒川木瓜各二兩上十二味為細末用浸兔絲酒澄清作糊為丸梧桐子大每服五十丸空心食前溫酒送下一方加人參白朮茯苓各加一兩尤有神效服此大忌三白失禁不效七珍至寶丹又名七寶美髯丹方見虛損門中張天師草還丹久服輕身如列子之乘虛白髮反黑地骨皮生地黃酒洗石菖蒲川牛膝酒洗遠志菟絲子如法制等分為細末煉蜜丸梧桐子大每服五十丸空心酒下不飲酒鹽湯下制時忌女人雞犬東垣青絲散補虛牢牙黑髭發白芷茯苓各半兩細辛當歸川芎甘草甘松各二錢升麻旱蓮草地骨皮生地黃熟地黃青鹽破故紙各三錢寒水石香附子制何首烏各二錢半麝香五分細茶末二錢上為細末倉日為始背東面西擦牙早不見日晚不見燈擦畢咽藥漱津塗須一月白者反黑忌三白二七丹大能黑髭發其功無比瓊玉膏補氣血黑髭發八珍湯久服烏須黑髮三方並見虛損門三青膏黑髭發有驗生胡桃皮生酸石榴皮生柿子皮上先將石榴剜去子入丁香裝滿稱過分兩然後卻將胡桃皮柿子皮與石榴子丁香等分曬乾同為細末用牛乳和勻盛於錫瓶中或瓷瓶中封口埋於馬糞內十日取出將白線一條扯緊點此藥於中即走至兩頭皆黑者是藥中也如不走不黑再埋馬糞中數日三聖膏治髭發脫落能令再生黑附子蔓荊子柏子仁各半兩上為末用烏雞脂搗和令乾以瓷瓶封口百日取出塗髭發脫落處日二三次五日便生自然牢壯巫靈散黑髭發極效五倍子炒百藥煎膽礬青胡桃皮酸石榴皮訶子木瓜皮豬牙皂角何首烏細辛各等分上為細末煉蜜丸如小錢大常以木炭灰內焙養勿得離灰如要烏髭發時用熱酒化開塗之大能黑潤五神還童丹一名五精丸堪嗟髭發白如霜要黑元來有妙方不用擦牙並染造都來五味配陰陽赤石脂與川椒等辰砂一味最為良茯神能養心中液乳香分兩要相當棗肉為丸梧子大空心酒下十五雙十服之後君休摘管教華髮黑而光兼能明目並延壽老翁變作少年郎赤石脂川椒辰砂飛茯神乳香各一兩為末棗肉杵丸梧桐子大空心酒下三十丸點白及黃髮方母丁香為末和薑汁調如膏每日拔去白以銀簪挑點根孔再生即黑有效又方用黑桑椹和油核桃肉搗成泥點白再出黑解熾發醒頭膏荊芥穗二錢香油半兩柏子油少許先以荊芥入油煎焦再加柏油少許擦發頃時梳之自開北京通用烏須方兩京各處烏髮惟此方頗好用之雖不至簡至妙然不壞須傷肉製得法者可黑一月五倍子要川中大者打如豆大鍋內炒黑色白煙起時自然炒作一團取起裹濕青布內踏成餅以石壓曬乾收聽用紅銅花用細紅銅絲炭火煆醋中淬之不拘遍次以化盡為度去醋取銅花曬乾皂礬三分明礬三分沒石子一分食鹽二分硇砂淨一分每次染時旋配倍子末以二錢為則銅四分余皆一二分和勻作一副以燒酒或煎濃茶用瓷酒杯調如稀糊坐湯中煮之杯內緑色生面為好先用皂角湯洗須淨拭乾將藥以掠柄塗上以皮紙答濕包之或以青布囊囊之過夜次早溫水洗之不潤用胡桃油捻指潤之一連染兩夜其黑如漆亦妙經驗擦牙烏須方先期而擦者永不再青鹽一斤嫩槐枝葉五斤黑鉛四兩沒石子尖者七錢上用黑鉛青鹽入鍋同槐枝炒攪俱以成灰提起聽用將沒石子研細末和入用瓷器盛之每日早晚洗面畢以藥擦牙漱水吐掌內擦鬢久久自然潤黑牛膽散明目清心壯精神黑髭發去風濕補虛損何首烏白茯苓槐角子各二兩當歸生地黃各一兩為末裝入臘月黑牛膽內挂於背日透風處十日取出曬乾研為末酒調二錢常服之發永不白二仙丹久服永黑何首烏川牛膝各一斤製法用黑豆蒸但要換豆多蒸幾次是為妙法類要烏須羊肝丸不獨烏須亦能明目黑羊肝一具竹刀切片瓷盆曬塗之以羊膽曬乾又塗至三五十枚愈多尤妙夏月用稀絹幪之免其蠅汙曬乾聽用熟地黃六兩蒸當歸酒浸川芎白芍藥酒炒何首烏如法制旱蓮草如法蒸各四兩覆盆子炒山茱萸肉各三兩白茯苓人乳浸日曬夜露候乾用生地黃酒浸一宿曬乾四兩血餘壯年人童男女及自己發為佳多至一二斤用皂角湯洗淨再用花椒湯洗曬乾入砂罐炭火燒成灰放地上三日出去火毒取下淨研三兩上除血餘不磨以群藥共為末另用熟地十二兩酒煮濃汁二碗作糊為丸梧桐子大空心酒下八十丸臨睡酒下五十丸極能烏鬚髮聰耳目悅顏色洗髮菊花散治鬚髮乾燥能令潤澤干菊花二兩川芎蔓荊子干柏葉桑白皮香白芷細辛旱蓮草各一兩上咀每次二兩漿水三碗煎至二碗去渣洗髮大妙丁砂散掠髭發大訶子一個煨去核母丁香百藥煎一錢鐵砂少許醋炒七次陳茶葉一撮上為極細末水一碗熬數沸不去滓放在淨瓷器內每夜臨臥溫漿水洗淨髭發拭乾以藥水掠之次早溫水洗淨百日後其發自黑婦人用之尤好用藥時取新鐵釘一枚浸之妙滋榮散長髭發不落生薑皮焙乾一兩人參一兩上為細末用生薑一塊切斷蘸藥擦落處自長一日一次生地生薑汁治髭發黃赤一染即黑生地黃生薑各半斤洗淨石臼杵絞取自然汁留渣用上用不蛀皂角一條去皮弦蘸前藥汁慢火炙黃以汁完為度卻將前渣同入罐內火煆存性為末用鐵器盛之每用三錢白湯一盞調勻放三日臨睡時將藥塗髭發自然即黑五汁膏一染即黑鮮胡桃皮鮮酸石榴皮黑桑椹旱蓮草鮮生地黃上各及時取汁瓷盆曬作餅為末和合用鹼水調少入明礬食鹽和如稀糊染如常法易簡諸方千金方治白髮還黑烏芝麻九蒸九曬為末以棗肉丸服之又方治發落不生令長麻子一升炒黑壓油搽頭髮妙千金翼方治發薄不生先以米泔洗禿處以生薑揩令大熱臘月豬脂搗入生鐵一塊煎煮數沸敷之遍生道藏經方治髭發脫落更生桑白皮四兩咀水二碗煎五六沸去滓洗沐自然不落落者更生又方用羊糞燒灰淋汁洗之二三日一度不過十度自生外臺方治人無發用甜瓜葉搗汁塗之即生又方治發黃赤用好醋二碗大黑豆半升熬令稠黏敷之即黑子母祕録治發黃又脫落收自己發皂角洗淨曬乾每一兩入花椒瓣五十粒泥包炭火煆如黑糟細研為末每服一錢好酒空心調服大能長黑梅師方治少年白拔去以白蜜點毛孔中即生黑髮不生者取梧桐子搗汁塗上自生且黑張潞方烏須大效用小雄雌烏雞一對淨處餵養不得雜群雞只與黑芝麻一件並水吃不可食雜物長大生卵時專記先生者收之為號用好硃砂一兩略破卵頭一小孔入硃砂用皮紙糊封孔於數重時用後生之卵一齊令雞抱之候雞雛出時其藥卵自然結實打破取出爛研如粉蒸餅和丸如緑豆大不計時候酒下五六丸黑者不白白者變黑孫真人食忌治發落不生以側柏葉陰乾為末菜油調塗又方治發黃以熊脂塗發梳之時散頭髮入床底伏地一食之間即黑不過一升脂甚驗
