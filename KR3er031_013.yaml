body:
  text: 卷之十三傷寒門上病機內經敘論素問熱論篇帝曰今夫熱病者皆傷寒之類也或愈或死其死皆以六七日之間其愈皆以十日以上者何也願悶其故岐伯對曰巨陽者諸陽之屬也其脈連於風府故為諸陽主氣也人之傷於寒也則為病熱熱雖甚不死其兩感於寒而病者必不免於死帝曰願聞其狀岐伯曰傷寒一日巨陽受之故頭項痛腰脊強二日陽明受之陽明主肉其脈俠鼻絡於目故身熱目痛而鼻乾不得臥也三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾三陽經絡皆受其病而未入於臟者故可汗而已四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴六日厥陰受之厥陰脈循陰器絡於肝故少腹滿囊縮而厥三陰三陽五臟六腑皆受病榮衛不行五臟不通則死矣其不兩感於寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病日已矣帝曰治之奈何岐伯曰治之各通其臟脈病日衰已矣其未滿三日者可汗而已其滿三日者可泄而已帝曰熱病已愈時有所遺者何也岐伯曰諸遺者熱甚而強食之故曰遺若此者皆病已衰而熱有所藏因其穀氣相搏兩熱相合致有所遺也帝曰善治遺奈何岐伯曰視其虛實調其逆從可使必已帝曰病熱當何禁之岐伯曰當病熱少愈食肉則復多食則遺此其禁也亦有瘥後多勞而復熱者亦謂之遺凡病傷寒而成溫者先夏至日為病溫後夏至日為病暑暑當與汗皆出勿止要知暑熱病須用率涼忌大發汗張仲景傷寒論辨陶尚文曰客有過豫而問之曰甚矣傷寒之深奧桂枝麻黃二湯之難用也服之而愈者才一二不愈而雙重者十常八九仲景立法之大賢也何其方之難憑有如此哉今人畏而不用以參蘇飲和解散等平和之劑而代之然亦未見其妙也子盍與我言之答曰籲難言也請以經語證之經曰冬氣嚴寒萬類潛藏君子固密則不傷於寒觸冒之者乃名傷寒耳其傷於四時皆能為病以傷寒為毒者以其最成殺厲之氣也中而即病名曰傷寒不即病者其寒毒藏於肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也以此言之傷寒者乃冬時感寒即病之名桂枝麻黃二湯為當時之傷寒設與過時之溫暑者有何預焉夫受病之源則同所發之時既異治之則不可混也請略陳之夫春溫夏熱秋涼冬寒者四時之正氣也以成生長收藏之用風亦因四時之氣成溫涼寒熱也若氣候嚴寒風亦凜冽天道暄和風亦溫暖冬時坎水用事天令閉藏水冰地凍風與寒相因而成殺厲之氣人觸冒之腠理鬱塞乃有發熱惡寒惡風之證其餘時月則無此證也仲景固知傷寒乃冬時殺厲之氣所成非比他病可緩故其言特詳於此書而略於雜病也倘能因名以求其實則思過半矣大率此書傳世久遠遺失頗多晉太醫令王叔和得散亡之餘詮次流傳其功博矣惜乎以己論混經未免穿鑿附會成無己氏因之順文注釋並無闕疑正誤之言以致將冬時傷寒之方通解溫暑遺禍至今而未已也溫暑必別有方今皆失而無徵也我朝宋景濂學士嘗嘆傷寒作全書得其旨者蓋為傷寒之初中人必先入表表者何則足太陽寒水之經此經行身之後自頭貫脊乃有頸痛脊強惡寒之證在他經則無此證矣況此經乃一身之綱維為緒陽之主氣猶四通八達之衢治之一差其變不可勝言者矣故宜此二湯發散表中寒邪經曰辛甘發散為陽者是也若以此湯通治春溫夏熱之病則誤甚矣曰傷寒發於冬時已聞命矣邪之在表為太陽經也一經而有二藥之分又何耶曰在經雖一然則有榮衛之別焉寒傷榮證乃惡寒發熱無汗脈浮緊蓋浮為在表緊為惡寒有寒則見無寒則不見也當用麻黃湯輕揚之劑發而去之寒邪退汗出表和而愈曰緊脈固為寒矣脈之緩者亦用桂枝湯又何耶曰風則傷衛衛傷則自汗緣太陽受風不能衛護腠理疏而汙泄所以脈見浮緩也脈雖浮緩其受傷寒則一故亦宜桂枝辛溫之藥解散寒邪腠理閉而汗止表和而愈又有榮衛俱傷者表之二湯又難用也故復設大青龍湯然此藥難用非庸俗得而識也曰溫暑既無方法治之則將奈何脈證與傷寒有何分別曰溫暑雖殊亦冬時感受寒邪而不即發在人身中伏藏歷過二三時之久天道大變寒化為熱人在氣交之中亦隨天地而化觀仲景以即病之傷寒與溫暑時令為病之名豈無異哉治之之方亦必隨時以用辛涼苦寒矣安得概用冬時治寒辛溫之方乎今無其方者蓋散亡之也經既稱變為溫變為熱則已改易冬時之寒為溫熱矣方亦不容不隨時更變也夫溫病欲出值天時和煦自內達表脈反見於右關不浮緊而微數曰惡寒否乎曰傷寒自冬月風寒而成外則有惡寒惡風之證既名為溫則無此證矣盍觀之經曰太陽病發熱不惡寒而渴者溫病也不惡寒則病非因外來渴則明其自內達表曰春夏之病亦有頭痛惡寒脈浮緊者何也曰此作冬時所受之寒乃冒非時暴寒之氣耳或溫暑將發又受暴寒雖有脈浮之證未若冬時之甚也宜辛涼之藥通其內熱而解之斷不可用桂枝麻黃之劑矣曰溫熱與傷寒治之不同也已聞命矣敢問傷寒之在三陽則為熱邪既傳三陰則為陰證矣以熱治固其宜也三陰篇以四逆散涼藥以治四逆大承氣以治少陰其故又何耶嗚呼此蓋叔和以殘缺之經作全書銓次將傳經陰證與直中陰經之陰證混同立論所以遺禍至今而未已也姑略陳之蓋風寒之初中人無常或入於陰或入於陽皆無定體非但始太陽終厥陰或自太陽始日傳一經六日至厥陰邪氣衰不治而愈者亦有不罷再傳者或有間經而傳者或有傳至二三經而止者或有始終只在一經者或有越經而傳者或有初入太陽不作鬱熱便入少陰而成真陰證者或有直中陰經而成寒證者緣經無明文後人有妄治之失若夫自三陽傳次三陰之陰證外雖有厥逆內則熱邪耳若不發熱四肢便厥冷而惡寒者此則直中陰經之寒證也若夫太陽受邪行盡三陽氣分傳次三陰之血分則熱入深矣熱入既深表雖厥冷真熱邪也經曰亢則害承乃制熱極反兼寒化也若先熱後厥逆者傳經之陰證也經云厥深熱亦深厥微熱亦微是也固宜四逆散承氣湯看微甚而治之如其初病便厥但寒無熱此則直中陰經之寒證也急宜四逆輩以溫之經云發熱惡寒發於陽也無熱惡寒發於陰也尚何疑哉又有日傳二經為兩感者傳經未終而斃矣病有標本治有逆從豈可概論之乎曰陰證之不同已聞命矣嘗讀劉守真書云傷寒無陰證人傷於寒則為熱病熱病乃汗病也造化汗液皆陽氣也遍考內經靈樞諸篇並無寒證陰證乃雜病也叔和誤入之耳守真高明之士亦私淑仲景者而議論之異者何耶曰雖守真之明達蓋亦因傷寒論以桂枝麻黃通治溫暑之誤而有是說故叮嚀云天道溫熱之時用桂枝必加冷藥於其中免致黃生斑出之患若知此湯自與冬時即病之傷寒設不為過時之溫暑設則無此論矣觀其晚年悟道著病機氣宜保命集其中羌活湯辛涼之藥以治非時傷寒其妙如神足可補仲景之遺旨何其高哉夫內經言傷寒即為熱病而無寒者語其常也仲景之論有寒有熱者言其變也合常與變而無遺者也所謂道並行而不相悖而反相為用也此其所以為醫家萬世之準繩標的也歟客唯而退遂請著其說云兩感傷寒者不治帝曰其病兩感於寒者其脈應與其病形何如岐伯曰兩感於寒者一日巨陽與少陰俱病則頭痛口乾而煩滿二日陽明與太陰俱病則腹滿身熱不欲食譫語三日少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人六日死兩感傷寒有淺深虛實之說王海藏曰天之邪氣感則害人五臟以是知內外兩感臟腑俱病欲表之則有里欲下之則有表表裡既不能一治故云兩感者不治然所稟有虛實所感有淺深虛而感之深者必死實而感之淺者可生余用大羌活湯間有生者十得一二立此以待好生君子趙嗣真曰仲景論傷寒兩感為必死之證而復以治有先後發表攻裡之說繼之者蓋不忍坐視而欲覬其萬一之可活也活人書云宜救里以四逆湯救表以桂枝湯殊不知仲景云太陽與少陰俱病則病頭痛為太陽邪盛於表口乾而喝為少陰邪盛於裡陽明與太陰俱病則身熱譫語為陽明邪盛於表不欲食腹滿為太陰邪盛於裡少陽與厥陰俱病則耳聾為少陽邪盛於表囊縮而厥為厥陰邪盛於裡三陽之頭痛身熱耳聾救表已自不可三陰之腹滿口乾囊縮而厥不下可乎活人書引下利身疼痛虛寒救里之例而欲施於煩渴腹滿譫語囊縮實熱之證然乎否乎蓋仲景所謂發表者葛根麻黃是也所謂攻裡者調胃承氣是也活人書所謂救里則是四逆救表則是桂枝今以救為攻豈不相悖若以四逆攻裡是以火濟火而腹滿囊縮譫語等證而益滋甚榮衛臟腑何由而通行六日而死也必矣玉機微義云王海藏大羌活湯治兩感傷寒出太陽例藥也然傷寒兩感有兼風兼濕不同或表裡虛實之異治者宜辨表裡寒熱擴充治之表中於風內傷於寒者可治表中於濕內傷於寒者可治表中於熱內傷於寒者可治大抵兩感傷寒多是表裡俱虛是以易老曰當切脈逆從知其吉凶兩感之邪三陰三陽皆有之脈從陽可治從陰難治陽生陰死之謂也蓋三陽有合病三陰無合病今陰與陽合病則為兩感病為反常故不治素問傷寒主於傳經故病皆熱治以發表攻裡而已仲景傷寒推而至於入臟而有虛實寒熱之殊故有攻表救里之異汪氏質疑曰嘗考素問傷寒證治由陽入陰悉言為熱至於仲景則寒熱兼言王安道以仲景三陰寒證為直中陰分之淆說而弗察夫素問之言熱者主於邪氣在經以為法之常仲景之言寒言熱者主於邪氣在胃以盡法之變推而至於脈證從舍應否之殊有補素問之所未備者惜其語未瑩而讀之者不復察但能明於三陽之同於熱而不能無疑於三陰之互現乎寒也以言夫證治之在陽經也如謂太陽病頭腰骨節疼痛惡寒發熱無汗而脈浮緊者麻黃湯治之有膀胱腑熱而小便赤澀不利者五苓散利之有陽明病身熱目疼鼻乾不得臥而脈長者升麻葛根湯揚之有胃腑實熱譫語潮熱多汗腹脹實痛便閉等證此胃中亡液有乾燥糞也調胃承氣大小承氣下之有胃中蓄血其人善忘糞硬及易而色黑者抵當湯下之有少陽病胸脅痛而耳聾口苦目眩往來寒熱而脈弦者小柴胡湯和之有下太早邪熱乘虛入內而心下滿硬痛者以氣結胸若結胸而無大熱但頭汗出者此為水結並以大陷胸湯下之但滿而不痛此為痞宜半夏瀉心湯主之水蓄為痞口渴煩躁小便不利者五苓散利之或漱水不咽加半夏主之上焦頭頸不強不痛胸中痞滿氣上衝咽而脈微浮者瓜蒂散吐之三陽證治昭明有如此至論三陰俱有吐利四逆腹滿腹痛譫語便祕煩躁等證則寒熱證治互現而不專於熱若有戾於素問之旨者而實則有不相悖而反相為用也蓋邪淺而在經者惟鬱而為熱此素問之所以主其常也邪深入於胃者有寒而有熱也此仲景所以通其變也何言在經在胃之分也蓋胃氣內實者脾得乎乾運之機而為之播氣於三陰故熱邪由陽傳陰侵及於經而不能入於胃故素問三陰之熱證具焉治宜瀉熱解表而仲景三陰之證間有熱邪之在經者治法猶夫素問也如雲腹滿時痛者病屬太陰桂枝加芍藥湯主之夫腹滿者太陰經之證也治以桂枝以解表芍藥甘草以瀉火是也又云少陰病四逆散主之夫四逆者寒未甚也仲景以為少陰之證也治以柴胡以解表芍藥甘草以瀉熱是也又厥陰條云手足厥寒者當歸四逆湯主之夫手足厥寒者即厥陰經之證也治以桂枝細辛以解表芍藥甘草以瀉熱是也詳之若夫胃氣內虛者脾失健運之令邪氣乘虛而入邪既入胃則不再傳經矣大抵邪氣傷虛不傷實膽脾肝腎四臟固密而無出無入故經有病而邪有傳一入於胃猶川瀆而注之海則不復溢而之他矣其虛而未甚者胃氣尚與邪搏而為實熱之證其虛之其也不能勝其熱之傷因之下陷而裡寒之證作矣斯謂熱極生寒其證多危以其氣之虛脫也則治法豈容拘於熱而不思所以廣而通之耶故仲景於邪氣在胃而為裡熱之治也下之清之則以硝黃石膏之輩於邪氣在胃而為裡寒之治也溫之補之則以參朮草棗薑附之屬證治俱為主乎胃而不分及於三陰之經之臟至於證兼乎表裡而跡涉於疑似者則又審輕重參標本察虛實而先後左右之而莫不統之胃焉自今觀之裡熱之實而為譫語潮熱腹脹大實腹滿大便祕結而脈沉實而數則宜下如太陰條云大實腹痛者桂枝加大黃主之又云少陰病自利清水色純青心下必痛口乾燥者宜大承氣湯下之又厥陰條云下利譫語者有燥糞也宜大承氣湯下之之類是也有裡實熱兼頭身疼痛惡寒發熱之表證者則宜先解後攻又云傷寒十三日不解胸脅滿而嘔日晡所發潮熱潮熱者實也先以小柴胡湯以解外後以柴胡加芒硝湯下之之類是也有裡實熱證重而表證輕者治宜下中兼解如雲傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯之類是也有裡熱而未實者治宜清之如雲煩渴身熱不惡寒而脈洪大者白虎主之又曰太陽少陽合病自利者黃芩湯主之又曰少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之又厥陰條云下利欲飲水者裡熱也白頭翁湯主之之類是也有裡熱而似寒者此謂陽盛拒陰亦宜清之如雲傷寒脈滑而厥者白虎湯主之之類是也有熱上傳心肺者治宜清上為主如雲少陰病得之二三日以上心煩不得眠者黃連阿膠湯主之又厥陰條云傷寒六七日大下後手足厥逆咽喉不利吐膿血者麻黃升麻湯主之之類此其為裡熱之治主乎胃也裡寒之盛而為嘔吐下利清穀四肢厥冷時腹自痛小便清白而脈沉微之屬則宜溫之如雲自利不渴者病屬太陰以其臟有寒也宜四逆輩溫之又如少陰病下利便膿血者桃花湯主之又厥陰條云嘔吐涎沫頭痛者吳茱萸湯主之之屬是也有裡寒而似熱者此謂陰盛格陽亦宜溫之如雲少陰病下利清穀裡寒外熱手足厥冷脈微欲絶身反不惡寒面赤色或口乾嘔咽痛宜通脈四逆湯主之之屬是也有裡寒而兼虛者洽宜補中溫中如雲少陰病得之二三日口中和其背惡寒者附子湯主之又云惡寒脈微而復利利止亡血也四逆人參湯主之之屬是也有裡寒而兼頭身疼痛惡寒發熱之表證者治宜先溫後解如厥陰條云下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆攻表宜桂枝湯之屬是也有裡寒輕而表證重者治宜汗中兼溫如雲少陰病得之二三日宜微發汗麻黃附子甘草湯主之又云少陰病始得之反發熱脈沉者麻黃附子細辛湯主之之屬是也此其為裡寒之治者主乎胃也是知素問之言熱者其在經也仲景兼言寒者其在胃也此其為義博而法殊而實相為出入而不可以偏廢者也王安道乃謂傷寒傳變有熱而無寒仲景三陰之言寒者乃直中陰經寒證混同論治殊不知直中寒證者由於正氣虛甚腠理疏豁邪氣乘虛直入臟腑之內應時而作不分經絡而一於虛寒且無表證之兼惟治以附子理中湯之屬仲景三陰之寒者則大異於是其寒也久而後變如謂少陰病脈緊至七八日下利脈暴微之屬是也且有表證之相兼如厥陰條云下利腹脹滿身體疼痛者先溫其里乃攻其表之屬是也則證雖與直中同而其所傷所治則異豈可以此而亂仲景之旨乎抑素問有云三陽經絡皆受其病未入於臟者可汗而已臟亦指胃臟而言即素問形臟四之臟也又云盛則瀉之虛則補之不盛不虛以經取之此謂邪氣在胃耳審虛實之分若未入胃則里無盛虛主治在經而已然則經胃之分久矣誠為傷寒之要也學者苟能明此則夫仲景三百九十七法可觸類而通矣傷寒傳足不傳手經辨傷寒傳足不傳手經者世俗之謬論也豈有是哉人稟天地請以天地間可證者言之盈天地至大而運行者莫如元氣與水且以有形論之則江河湖海溪澗溝澮以為行水瀦水之道焉人之充滿一身無非血氣亦有十二經脈大小絡脈經絡血海以為行血停血之隧道風行水動氣行血流皆自然之理也夫人之氣自平旦會於膻中朝行手太陰肺以次分布諸經行盡周天三百六十五度在人行三百六十五骨節明日寅時復會於手太陰也血亦隨氣流布運行不息榮衛一身腠理司開闔維持綱紀以為一身動靜云為之主所以一脈愆和則百脈皆病理固然而不得不然也彼云傳足不傳手者何所據乎請備言其所由蓋傷寒乃冬時感寒即病之名也冬乃坎水用事其氣嚴寒凜冽水冰地凍在時則足太陽少陰正司其令觸冒之者則二經受病其次則足少陽厥陰繼冬而司春令而亦受傷何也蓋風木之令起於大寒節正當十二月中至春分後方行溫令故風寒亦能傷之足陽明太陰中土也與冬時無預而亦傷之何也紫陽朱子曰土無定位無成名無專氣寄旺於四季能終始萬物則四時寒熱溫涼之氣皆能傷之也況表邪傳裡必歸於脾胃而成燥糞用承氣湯以除去胃氣和矣手之六經主於夏秋故不傷之足之六經蓋受傷之方分境界也若言傷足不傷手則可以為傳足不傳手則不可也況風寒之中人先入榮衛晝夜循環無所不至豈間斷於手經哉經曰兩感於寒者六日死若三陰三陽五臟六腑皆受病榮衛不行臟腑不通則死矣豈虛語哉嘗觀此事難知曰傷寒至五六日間漸變神昏不語或睡中獨語一二句目赤唇焦舌乾不飲水稀粥與之則咽不與則不思六脈沉數而不洪心下不痞腹中不滿大小便如常或傳之十日以來形如醉人此熱傳手少陰心經也然未知何經而來答曰太陽傷風風為陽邪陽邪傷衛陰血自燥熱蓄膀胱壬病逆於丙丙丁兄妹由是傳心心火自上而逼肺所以神昏也梔子黃芩黃連湯若在丙者導赤散在於丁者瀉心湯若脈浮沉俱有力者是丙丁俱有熱也導赤瀉心各半服之宜者矣此膀胱傳丙足傳手經也又謂腑傳臟也又下傳上也表傳裡也壬傳丁者乃坎傳離也名越經傳氣逆而喘者非肺經乎如謂不然何仲景麻黃二湯乃心肺藥也請細思之傷寒傳經大法有四曰循經曰專經曰越經曰再經循經六經以次傳一日太陽二日陽明三日少陽四日太陰五日少陰六日厥陰是也專經邪氣即在一經不傳不變是也越經間經而傳如一日太陽病頭頸項痛腰脊強二日不傳陽明卻越而傳少陽胸脅痛而耳聾之類是也再經六經以次傳遍卻又復起而再傳太陽頭痛脊強之類是也傷寒即病之名春分以後夏秋之間皆非傷寒證候各以其溫熱因時而治之張仲景曰陰陽大論云春氣溫和夏氣暑熱秋氣清冷冬氣凜冽此則四時正氣之序也冬時嚴寒萬類深藏君子固密則不傷於寒觸冒之者乃名傷寒耳其傳於四時之氣皆能為病以傷寒為毒耳以其最成殺厲之氣也中而即病者名曰傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也是以辛苦之人春夏多溫熱皆由冬時積寒而致非時行之氣也學者審之溫病辨問曰傷寒溫病何以辨答曰溫病於冬時感寒所得也至春變為溫病耳傷寒汗不愈而過經其證尚在而不除者亦溫病也經曰溫病之脈行在諸經不知何經之動隨其經之所在而取之太陽證頭痛惡寒汗後過經不愈診得尺寸俱俘者太陽病溫也陽明證身熱目疼汗下後過經不愈診尺寸俱長者陽明病溫也少陽證胸脅痛汗下後過經不愈診尺寸懼弦者少陽病溫也太陰證腹滿喘干診尺寸俱沉細過經不愈者太陰病溫也少陰證口燥而渴診尺寸俱沉微過經不愈者少陰病溫也厥陰證煩滿囊縮診尺寸俱微鍰過經不愈者厥陰病溫也是故隨其經而取之隨其證而治之如發斑乃溫毒也治溫大抵不宜多發汗其過時而發不在表也已經汗下亦不在表也經曰不惡寒而反渴者溫病也明其熱自內達外無表證明矣傷寒有從脈舍證從證舍脈之殊從脈舍證如傷寒脈滑而厥者白虎湯清之脈微面赤身熱者溫之從證舍脈如脈浮大心下硬有熱屬臟者攻之脈促厥冷為虛脫非溫劑不可陽明脈遲不惡寒身體濈濈汗出用大承氣湯下之少陰病始得之反發熱而脈沉宜麻黃細辛湯微汗之之類脈洪者熱為相應主生脈微身熱為不應主死傷寒合病並病論合病並病世所當明若非得其精專焉能識此證哉合病者兩經或三經齊病不傳者為合病並病者一經先病未盡又過一經之傳者為並病若並而未盡是傳未過尚有表證法當汗之若並之已盡是為傳過法當下之是知傳則入腑不傳不入腑言其有傳受如此也陰陽互相合病皆自下利太陽陽明合病主葛根湯太陽少陽合病主黃芩湯少陽陽明合病主承氣湯三陽合病無表證者俱可下但三陽經合病仲景無背惡寒語句雖則有口燥渴心煩背微惡寒者乃屬太陽證而非三陽合病也三陽若與三陰合病即是兩感所以三陰無合病例也傷寒三陰三陽經證足太陽膀胱起於目內眥上額交巔上從巔絡腦還出別下項循肩膊內夾脊抵腰中入循膂絡腎屬膀胱傷寒一二日發熱惡寒頭痛腰脊強渾身疼痛尺寸脈俱浮者或緩或緊太陽經證也足陽明胃經主肌肉其脈起鼻交頞中從目下循鼻外及挾口環唇循咽喉下膈屬胃絡脾故傷寒二三日身熱目疼鼻乾不得臥尺寸脈俱長者陽明經證也足少陽膽經主榮百節流氣三部其脈起目鋭眥上抵頭角下耳後入耳中又下胸中循脅裡出氣街故傷寒三四日胸脅痛耳聾或口苦舌乾或寒熱往來而嘔尺寸脈俱弦此少陽經證也足太陰脾經為三陰之首其脈起足大指之端上循膝入腹上膈挾咽連舌本散舌下又注心中在於脾胃絡於咽喉故傷寒四五日腹滿咽乾手足自溫或自利不渴或腹痛尺寸脈俱沉細此太陰經證也足少陰腎經其脈起足小指之下貫脊屬腎上循肝膈入肺循喉嚨挾舌木又絡心注胸中腎惡燥故病傷寒五六日口燥舌乾而渴惡寒尺寸脈俱沉此傳少陰經證也足厥陰肝經欲盡也其脈起足指叢毛循股入陰毛環陰器抵小腹夾胃上貫膈布脅肋循喉嚨後上入頏顙連目系出額會於巔又下環唇內故病人唇青舌卷煩滿囊縮尺寸脈俱微緩此傳厥陰經證也傷寒見證施治為要法傷寒六七日厥陰見證其太陽陽明少陽太陰少陰五經之證未除者當先解表表邪除方可攻裡於此雖是厥陰經證要審表證在否何如若表證悉除只用本經之藥可也經曰七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈由此觀之可見六日傳到厥陰而前證仍在必待七日而漸釋若表證未除下虛其里則表邪乘虛入內而譫語發狂之證作矣其或傳過一經則前經之證遂釋亦常有矣所以傷寒當看六經見證施治不拘日數方為妙工傷寒雜證分二科論王海藏云世之治傷寒有法療雜病有方是則是矣惜猶未盡也吾謂治雜病亦有法療傷寒亦有方蓋法者循經而設方者緣病而立方即法也法即方也果有二乎要知明達之士全識部分經絡表裡臟腑虛實而疏觀之豈有二哉自後世才智不及古人而通方之士亦鮮是以分傷寒雜病為二門故有長於此而短於彼者亦有長於彼而短於此者所以國家取士分科而人各一於所習宜乎愈學而愈陋愈專而愈粗也試以傷寒雜病二科論之傷寒從外而之內者法當先治外而後治內雜病從內而之外者法當先治內而後治外至於中外不相及而治主病機其方法一也亦何必分之為二哉大抵雜病傷寒俱不外乎表裡虛實寒熱表則汗里則下中則和不易之法也劑之寒熱溫涼在其中矣餘風産小兒目疾瘡瘍等科局於專門其理顯其習易無怪其工之粗且淺也是以知證不知脈知藥不知源是豈知真而全識哉其所常見常聞者粗有曉會其所未嘗見未嘗聞者則有不知也此但繼述祖跡而不及創物者遠矣嗚呼天之生人智有限量尺有所短寸有所長自古然耳若夫庸人鄙夫藉此以計功謀利而無明道正誼之心徒資舌辨以御人甚之視同業如寇讎專妒忌為心術誤人性命恬不知恤甘為忍人不顧陰德其教之有所失耶時世之有所俾然耶抑疾者之不幸而有所自致耶傷寒挾內傷者甚多東垣曰西北二方極寒肅殺之氣傷寒者多東南二方溫和之地傷寒者少經曰邪之所湊其氣必虛內傷者用補中益氣湯從六經所見之證加減用之氣虛甚者少加附子以行參耆之功北方無內傷者用仲景法脈候素問云寸口脈浮而盛病在外外者表也寸口脈沉而緊曰病在中中者里也仲景云脈浮者病在表可發汗又曰表有病者脈當浮結胸證脈浮者不可下則知脈屬陽證無疑矣難經曰傷寒之脈陰陽俱盛而緊澀傷寒論曰陰陽脈俱緊名曰傷寒寸口脈浮而緊浮則為風緊則為寒浮澀而緊為傷寒脈經曰遲緊為寒脈陽浮而陰弱謂之傷風脈緊而無汗謂之傷寒脈陰陽俱盛重感於寒而緊澀變為溫瘧陰陽緊盛傷寒之脈前病熱未已後復感於寒也脈陽浮而滑陰濡而弱更遇於風變為風溫脈陽洪數陰實大太過溫熱兩合變為溫毒脈陽濡弱陰弦緊更遇溫氣變為瘟疫病發熱脈沉細表得太陽名曰痓病病太陽關節疼痛而煩脈沉細名曰濕痹病太陽身疼痛脈微弱弦芤名曰中暍脈沉細而疾身涼四肢冷煩躁不欲飲水狂悶名曰陽厥傷寒熱盛得脈大者生沉細者死已汗沉小者生浮大者死保命集脈浮而緊者為表實可汗麻黃湯主之脈浮而緩者為表虛可固表驅寒桂枝湯主之脈沉而數或疾而滑或沉實有力皆為裡實兼大便燥者可下大承氣湯主之脈沉而細或微而遲按而無力尺中弱皆為裡虛可救里二便利手足厥冷者四逆湯主之脈沉細者不可汗尺脈遲者不可汗浮而數為表實當汗之麻黃湯之類浮而遲為表虛宜固表桂枝湯之類不浮不沉中診而數為中焦之實熱調胃承氣湯之類兼有頭痛惡寒者大小柴胡湯斟酌用之不浮不沉中診而遲或微或細為中虛也建中理中湯之類沉而數者為裡實法當下大承氣湯之類沉而遲者為裡虛法當溫姜附之類陶節庵曰傷寒脈專以浮中沉遲數辨其陰陽寒熱及表裡虛實而斷諸浮在表輕手得之曰浮略重手於皮膚之下肌肉之上陰陽各半故屬半表半裡得之曰中沉為在裡重指於肌肉之下筋骨之間得之曰沉諸遲為寒諸數駑熱陰陽寒熱虛實用在有力無力中分有力者為陽為熱為實無力者為陰為寒為虛雜病以弦為陽傷寒以弦為陰雜病以緩為弱傷寒以緩為和傷寒以大為病進以緩為邪退緩為胃脈有胃氣曰生無胃氣曰死傷寒脈中有神曰生神者氣血之先也兩手無脈曰雙伏一手無脈曰單伏必有正汗也寸口陽脈中或見沉細者但無力者為陽中伏陰尺部陰脈中或見沉數者為陰中伏陽寸口數大有力為重陽尺部沉細無力為重陰寸口細微如絲為脫陽尺部無力為脫陰寸口脈浮而有力主寒邪表實宜汗浮而無力主風邪表虛宜固尺脈沉而有力主陽邪在裡為實宜下無力主陰邪在裡為虛宜溫寸脈弱而無力切忌發吐尺脈弱而無力切忌治下初按來疾去遲名曰內虛外實去疾來遲名曰內實外虛尺寸俱均勻名曰緩緩者和而生也汗下後脈靜者生躁亂身熱者死乃邪氣勝故也溫之後脈來歇至者正氣脫而不復生也純弦之脈名曰負負者死按之解索名曰陰陽離離者死陰病見陽脈者生陽病見陰脈者死治法治傷寒用藥大例凡證有頭疼惡寒發熱是為傷寒無則皆非也何則傷寒則惡寒傷食則惡食理固然也但在冬時惡寒為甚其餘時月雖有惡寒亦微未若冬時之惡寒為甚也雖四時皆有傷寒治之不可一概論也冬時氣寒腠理微密非辛甘溫不可故以桂枝等湯以治之然風與寒常相因寒則傷榮惡寒頭痛脈浮緊而無汗則用麻黃湯開發腠理以散寒邪得汗則愈風則傷衛頭痛惡風脈浮緩而自汗則用桂枝湯充塞腠理以散邪汗止則愈經云辛甘發散為陽是也若夫榮衛俱傷又非此二湯所能治也須大青龍湯然此湯太峻又非庸常之可擬也余亦有代之者蓋冬時為正傷寒風寒猛冽觸冒之者必宜幸溫散之其非冬時亦有惡寒頭痛之證皆宜辛涼之劑通表裡和之則愈矣若以冬時所用之藥通治之則殺人多矣曰辛涼者何謂也羌活沖和湯是也兼能代大青龍湯為至穩嗚呼此方可代三方危險之藥如坦夷其神乎哉世皆所未知也過此則少陽陽明二經在乎半表半裡肌肉之間脈亦不浮不沉外證在陽明則有目疼鼻乾不得眠之證脈似洪而長以葛根湯解肌湯升麻湯之類治之在少陽則胸脅痛而耳聾脈見弦數以小柴胡湯加減而和之本方有加減法此二經不從標本從乎中治余嘗以小柴胡湯加葛根芍藥治少陽陽明合病如拾芥但不使世俗知此過此不已則傳陽明之本為入里大便實其外證悉罷謂無頭痛惡寒也脈見沉實不浮譫語惡熱六七日不大便口燥咽乾輕則大柴胡湯重則三承氣湯選用或曰邪既入里為實無非大黃苦寒之藥下之何其用方之雜乎傳來非一治之則殊且病有三焦俱傷者則痞滿燥實俱全宜大承氣湯厚朴苦溫以去痞枳實苦寒以泄滿芒硝鹹寒以潤燥軟堅大黃苦寒以泄實去熱病斯愈矣邪在中焦則有燥實堅三證故用謂胃承氣湯以甘草和中芒硝潤燥大黃泄實不用枳實厚朴以傷上焦虛無氤氳之元氣謂胃之名於此立也上焦受傷則為痞實用小承氣湯枳實厚朴除痞大黃去實去芒硝則不傷下焦血分之真陰謂不伐其根也若夫大柴胡湯則有表邪尚未除而里證又急不得不下而以此湯通其表裡而緩治之猶有老弱及血氣兩虛之人不宜用此三陽之邪大里為患春夏秋有不頭痛惡寒而反渴者此則為溫病暑病亦熱此之溫病猶加熱也治宜加減小柴胡湯蓋此湯春可治溫夏可治暑秋能潤肺又宜升麻葛根湯解肌湯敗毒散中暑而渴者小柴胡石膏湯人參白虎湯看渴微甚而用之無不效者經曰發熱不惡寒者皆不在傷寒之例矣陶氏瑣言看傷寒見證治法大抵傷寒先須識證察得陰陽表裡虛實親切復用汗吐下溫和解之法庶無誤矣先看兩目或赤或黃赤為陽毒黃為膽之濕熱次看口舌有無胎狀有白胎者丹田有熱胃中有寒邪初入里如滑邪未全入猶帶表裡宜解之已後見黃胎為熱入里宜下解之黑胎生芒刺為熱極深難治不死則危再後用手按心胸周小腹有無痛處如心胸滿悶為表在未經下者非結胸也乃表邪傳在胸中未入於腑證雖滿而為表在也當屬少陽部分只用小柴胡加枳實入金叉煎服實為驗過神藥也如按心則痛手不可近大渴譫語以經下者為虛熱結胸湯下之反加煩躁者死如見瞑者知太陽經衄血將解也犀角地黃湯若見額汗出齊頸而還身無汗小便自利大便黑渴飲水漿不欲咽此瘀血證也或小腹痛有滿當按其痛處問其小便通利若何如通利知其有蓄血下焦宜破瘀血桃仁承氣湯下之盡黑物則愈小水不利頭汗齊頸而還或欲水漿知邪熱在內津液留結發黃宜茵陳湯加梔子滑石入鹽少許利小便清則愈凡看傷寒尺脈弱而無力者宜小柴胡湯和解之若傷寒服藥不效眼珠如火燥渴欲危身如塗撲脈洪大不知人狂妄叫喊此因邪熱在於三焦宜三黃石膏湯治之名陽毒也凡看傷寒手指甲青肚痛吐瀉四肢厥冷脈沉無力名陰毒宜附子理中湯治之凡看傷寒吐蛔者雖有大熱忌下之犯下藥必死蓋自胃中虛寒則蛔上膈上凶之兆也急用炮乾薑理中湯加烏梅川椒服待蛔定卻用小柴胡湯退熱蛔聞酸苦則定凡看傷寒渴飲水漿自救宜少飲之不可太多則水傳心下為喘咳為噦為痢為水結為腫等證見矣當開後外條凡兩感傷寒雖為必死復有可救乃自治法用藥瘥也且太陽與少陰頭疼痛邪在表不食腹滿邪在裡少陽與厥陰耳聾脅痛邪在表囊縮邪在裡三陽頭痛身熱耳聾嘔吐已自不可下之其三陰腹滿口渴囊拳便不可下乎先用麻黃葛根為解肌謂胃承氣為攻裡最為的當一投一效今之醫人用古活人書引身痛下利虛寒攻裡之藥而治煩滿囊拳實熱之證天地之遠豈不死知活人救里用四逆攻表用桂枝豈不差乎用是熱劑正謂抱薪救火而腹滿煩數實熱何由而痊臟腑何由而通所死者多矣是時兩感莫作不治執定於心也傷寒合病者二陽經同受病之不傳也並病者一經先病又過一經之稱也是太陽陽相併若未盡是傷太過尚有表證尤當汗之麻黃桂枝各半湯若並已盡是為傳過太陽證潮熱手足汗出大便硬時譫語者是也當下之承氣湯是知傳則病不傳則止實出三陽證太陽陽明並病麻黃葛根湯太陽少陽合病黃芩湯少陽陽明合病小柴胡加蛤蚧若三陽三陰合病即是兩感也六經據證正治之法初起一二日足太陽膀胱受證此經從頭項貫於腰脊故有頭痛惡寒發熱脊強脈按皮膚之上輕手便得一經有二藥之分浮而有力無汗為表實是傷寒表證寒傷榮血用麻黃髮腠理表汗除邪而愈脈來浮緩無力有汗者為表虛是傷風表證風則傷衛氣冬月桂枝湯充塞腠理止汗散邪為愈有言桂枝發汗者非發汗也仲景云臟無他病里和也衛氣不和表病也自汗出者衛不和也榮血不與衛合故用桂枝甘緩之劑以其和合榮衛汗出風邪由此而解矣邪無容地汗自出矣非發也實祕汗孔也發字當作出字論其餘月感冒非時暴寒之證無汗以羌活湯加蘇葉蔥白髮散若少陰心經有血熱用生地黃無則去之如太陰肺經有痰熱鼻塞用黃芩無則去之此二味有所別也其秋濕春溫夏暑之證正宜加之切勿依方一概妄用有汗加味沖和湯逐邪而愈也汗甚不止加黃耆白朮若將冬時正傷寒之藥混治非時冒寒之輕若將非時冒寒之藥混治冬時正傷寒之重必為害矣不死則危如一日至十二日若見頭痛惡寒不論日數多少尚有表證熱未解還用發散切不可下若下之變為結胸等證再若二三日至六七日或八九日十三四日頭痛惡寒皆陰反怕熱或胸腹滿悶硬痛便實口渴譫語妄言皆熱邪傳裡年老元虛之人大柴胡湯下之年壯元實熱深之人大小承氣下之切不可拘於日數始太陽終厥陰之論也若夫頭痛惡熱止則惡寒自汗無發熱者汗後表虛也故用黃耆建中加桂枝以和表也其不止者去桂加炒白朮附子少許以溫之亦可不必拘於日數也又有少陰證似太陽太陽脈似少陰開記後條明白矣七日傳邪足厥陰肝經此經循陰郤絡於肝會於顛頂故有煩滿囊拳而渴一身無熱四肢微厥脈至筋骨間沉緩有力此熱從三陽傳入厥陰里證也表雖冷內有熱邪正謂陽極發厥宜承氣湯下之不必拘於日數也兩陰多盡名厥陰也如初起無身熱便四肢厥冷怕寒不渴或腹痛吐利者脈沉遲無力此證非從三陽經傳來乃是直中厥陰也急用附子四逆湯溫之再灸丹田氣海三十壯如怔仲不省人事脈全無者必死也口中出沫寒痛者鹽炒茱萸薑湯煎服為效矣傷寒六經證治要例傷寒發執惡寒頭項痛腰脊強則知病在太陽經也身熱目痛鼻乾不得眠則知病在陽明經也胸脅痛耳聾口苦舌乾往來寒熱而嘔則知病在少陽經也腹滿咽乾手足自溫或自利不渴或腹滿時痛則知病在太陰經也引衣蜷臥惡寒或舌乾口燥則知病在少陰經也煩滿囊縮則知病在厥陰經也潮熱自汗譫語發渴不惡寒反惡熱揭去衣被揚手擲足或發斑黃狂亂五六日不大便則知病入於胃腑也凡見頭痛惡寒發熱腰脊痛項強脈浮者則是表證不拘日數多少理用解表之劑無疑凡見耳聾脅痛寒熱嘔而口苦脈見弦數者即是半表半裡證不拘日數多少便用和解之劑無疑少陽經行身之側而兼半表半裡凡見頭痛惡寒悉除反見怕熱作渴譫語揭衣揚手發狂發斑發黃潮熱自汗大便不通小便短赤或胸中連臍腹注悶疼痛脈沉有力或上氣喘促則傳裡證不拘日數多少便用通利下藥無疑凡傷寒初起無頭痛無身熱就便怕寒四肢厥冷或腹痛吐瀉或口味白沫或流冷涎或戰栗面如刀割引衣蜷臥不渴脈來沉遲無力即是直中陰經真寒證候急用溫裡熱藥輕則理中湯重則四逆湯要在隨所見證分表裡而治之切莫亂投湯劑不可拘於日數若非深得仲景之旨豈能至此耶陶氏家祕表證頭痛惡寒發熱脈浮緊無汗麻黃湯脈浮緩有汗桂枝湯項強几几無汗惡風太陽與陽明合病下利頭目痛鼻乾脈浮葛根湯頭痛發熱不惡寒而渴肌肉痛脈浮大而長葛根解肌湯加減服之頭痛身熱惡風表不解脈浮而滑心下有水氣而嘔噦者小青龍湯頭痛項強發熱傷寒見風傷風見寒脈浮緊無汗而煩躁大青龍湯往來寒熱脈浮而弦或浮而細胸滿脅痛少陽經病心煩喜嘔欲傳於裡此為半表半裡也小柴胡湯身熱不惡寒反惡熱手足濈濈汗出面赤譫語大便實過經不解或嘔不止或寒熱往來大柴胡湯日晡潮熱不惡寒反惡熱大便祕譫語而嘔陽明經病調胃承氣湯汗後不惡寒無表證六七日不大便腹脹滿潮熱狂言而喘者小承氣湯六七日不大便腹滿煩渴並少陰舌乾口燥日晡發熱脈沉實者大承氣湯表邪已解小腹急大便黑小便不利此瘀血也桃仁承氣湯陽證未除下之太早即成結胸胸中作痛按之甚脈浮滑謂之小結胸小陷胸湯五六日不大便口乾而渴潮熱心下至少腹俱硬滿胸中大痛起高突按之不可近其痛愈甚者名大結胸大陷胸湯汗後而熱不退脈洪大而渴及虛煩中暍躁悶白虎湯煩渴而發赤斑者化斑湯汗後身痛脈弱尺脈或遲黃耆湯建中湯手足溫微腹痛而惡寒脈尺寸俱遲者小建中湯汗吐下後虛弱邪傳於心中懊憹而煩不得眠梔子豉湯太陽病渴而飲水小便不利熱結膀胱五苓散傷寒無表證四肢厥冷下利清穀脈微遲四逆湯傷寒證用藥引例合汗吐下溫和解利大法表汗用麻黃無蔥苗不發甚加豆豉吐痰用瓜蒂無豆豉不湧下實熱用大黃無枳實難通甚者加芒硝鐵鏽水以逐熱開結解表裡非柴胡不能壞證須加鱉甲烏梅紫蘇桔梗溫經用附子無干姜不熱甚者泥水澄清煎加蔥白再甚者加麝香皂莢陰燥者加蜜一匙其燥則止中寒重者薑汁煎服竹瀝無薑汁不行經絡蜜導法無皂角不能開祕結止嘔吐非半夏薑汁不能止胃虛者加老米一撮煎藥虛煩非人參竹葉不能止甚者加山梔炒米渴加石膏去濕利小水非五苓散不能除熱甚者加桂一字消渴非天花粉乾葛不能止補元氣生脈必用人參五味子麥門冬止焦嘔衄必用犀角地黃下焦蓄血必用桃仁承氣表虛非黃耆桂枝不能固虛除濕助脾必用茯苓白朮黃疸發黃必用茵陳蒿瀉裡熱除狂非承氣湯不可春溫須用辛涼非柴胡乾葛不可治四時感冒非羌活沖和湯不能治救陰毒里證須四逆湯除吐蛔厥須理中烏梅入乾薑花椒化斑毒須白虎湯可汗凡頭痛項強肢節腰背俱強身疼拘急惡寒翕翕發熱汗不出脈浮數浮緊皆屬表證可汗若發汗後不解仍有發熱而脈浮者宜再汗之凡頭痛身痛拘急憎寒發熱表未解者脈雖遲可汗太陽病脈弱可汗傷寒身體痛便清自調者可汗日晡寒熱如瘧屬陽明脈浮可汗不可汗傷寒自汗濈濈無表證脈浮而緩或弦細濡弱者不可汗脈浮而緊法當身痛宜以汗解若尺脈遲者不可汗陰病脈沉細數不可汗在裡故也傷寒風溫四肢不收頭痛身熱常汗不解治在少陰厥陰不可汗汗自出譫語內煩不得臥善驚目無精光兩脛溫先傷於溫後傷於熱因而中暍若兩脛冷腹滿頭目痛妄言治在足太陰不可汗汗出必不能言耳聾不知痛所身青面變而死傷寒形象中風常微汗自出而嘔者心中懊發汗則痓不可汗傷寒脈弦細頭痛而反熱屬少陽不可汗太陽與少陽並病頭項強痛或眩冒心下痞堅不可汗少陰咳而下利譫語者強汗之故也動氣不問上下左右皆不可汗咽中閉塞不可汗汗之則吐血厥不可汗汗之聲亂咽嘶亡血家不可汗汗之則寒栗而衄衄家不可汗汗之必額陷直視淋者不可汗汗之必痓汗家不可重汗汗之必恍惚脈短者死口瘡下利清穀不可汗汗之必脹滿大凡取汗之法不可不謹若勞役乘涼解衣新沐表虛為風寒所遏與夫口燥舌乾咽乾喉痛瀉利內傷房室陰虛中暑金瘡癰腫初破經水適來新産血虛脈沉細或豁大無力者皆不可汗也範云患傷寒熱甚不得汗出徐文伯為診視時武帝有賜九錫之命云謂文伯可得速愈乎文伯曰便瘥甚易但君元氣不足恐一年後不復起耳奈何云曰朝聞道夕死可矣況二年乎遂以蒸法取汗而愈後二年果卒所以取汗之法必先審其虛實可否也可吐大法春宜吐春時陽氣在上邪氣亦在上故宜吐病在膈上者可吐脈大胸滿多痰食在胃口及下部無脈者可吐脈滑手足逆冷脈乍結以客氣在胸中滿實鬱而疼不能食欲使人按之而反有涎吐出及下利日數行寸口脈微滑者宜吐之其利即止也傷寒汗下後虛煩若劇者必反覆顛倒不得眠心中懊憹梔子湯吐其邪熱傷寒三四日邪在胸中者可吐以瓜蒂散或淡鹽湯虛者以人參蘆湯痰多者用二陳湯服後以箸探吐不可吐凡怯弱與房勞內傷虛證與夫胎而産後血氣俱虛脈沉而弱者不可吐若膈上有寒而乾嘔者宜溫不宜吐諸四逆病但有厥逆者不可吐可下傷寒汗後不解蒸蒸發熱或渴而嘔邪在胃腑可下調胃承氣湯潮熱腹痛者可下大柴胡湯嘲熱脈實可下大承氣湯汗後潮熱不惡寒腹滿而喘陽明胃經病可下大小承氣湯下後潮熱不大便腹硬大柴胡湯陽明若多汗胃中必有燥糞大便硬譫語者可下小承氣湯嘲熱手足濈濈汗出大便難譫語者可下大承氣湯傷寒五六日不大便繞臍痛躁煩發作有時者必有燥糞也可下調胃承氣湯凡吐後腹滿者可下同上吐下後微煩小便數大便硬者可下小承氣湯或腹滿不減者可下同上脈沉有力內實潮熱不解可下大柴胡湯病者無表裡證發熱六七日脈雖浮數可下大柴胡湯凡以手按臍腹硬者或痛不可按者可下大小承氣湯太陽證不解熱結膀胱其人如狂血自下者即愈小腹急結者可下桃仁承氣湯下後不解再按臍腹有無痛處若有硬處手不可按者可再下之太陽結胸潮熱脈不浮可下大陷胸湯少陰失下而咳逆大便實可下小承氣湯少陰病下利清水色青者心下必痛口乾燥者可下大柴胡湯小承氣湯太陽證身黃脈沉結小腹堅小便不利為無血小便自利人如狂者血證候也抵當湯下之陽明證其人喜忘必有瘀血屎雖堅大便必黑抵當湯下之陽明病無汗小便不利必中懊憹必發黃可下大承氣合茵陳湯不可下傷寒惡寒惡風者不可下凡腹中時滿時減者不可下凡腹脹可揉可按而愈者不可下臍左右有動氣者不可下陰虛勞倦內傷多手足冷者不可下脈浮有表證者尺脈弱者俱不可下少陰脈微裡寒外熱乾嘔者不可下表不解心下有水氣脅痛發熱不可下陽明病面赤色心下硬滿不可下凡脈沉不實不疾或細而虛按之無力者不可下咽中閉塞虛家諸血逆厥及亡血經水適來適斷或熱入血室胎前産後崩漏小便清白以上皆不可下也火攻法治傷寒不得汗者以火燒地令赤用鮮柏葉桃葉鋪席熱地上令病者臥之取汗或燒火磚噴之以醋紙包置被中熏之或燒熱噴之以醋紙包尉胸背四肢皆取汗之法也或以燒針刺之或以艾火灸之或以火置於床下或向火於胸前此皆逼迫寒氣而出汗者也水攻法傷寒熱甚欲飲水者須察病人大小壯怯審其邪熱輕重淺深酌量多少與之若人壯熱深者多與之人怯熱淺者少與之須取新汲井水味甘而涼者以大碗盛則涼若飲少三五口而止若飲多者半碗一碗而止待少時口渴欲飲仍前汲新水與之蓋頻以與之無妨不宜一飲而極意也凡飲水後寒戰交作汗出為美此為欲解而即愈也若欲飲水而不與之則愈乾燥而熱愈熾無由而作汗必躁而悶亂故以傷寒時欲飲水者為病解也熱盛者必用水漬法以青布浸新汲水中略忖干置之胸膻熱則易之以手心按之而熱退或以水噀其面以不澆其身或置病人於水中或以水浸手與足或浸舌漱口而不欲咽者大抵陽證陽脈內實熱甚煩渴口乾與水無疑有不當飲水而誤與之則停心下輕為支結重為結胸若應以汗解誤以水漬則熱不退而益煩陰證與水則咳逆胃虛與之為嘔噦汗後與之為發喘或腹脹或小便不利或為寒栗皆誤用水之過也證候表裡虛實陰陽寒熱八字為傷寒之綱領表證發熱惡寒惡風頭疼身痛腰脊強目痛鼻乾胸脅痛耳聾或往來寒熱而嘔脈浮而大或緊或緩皆表證也發汗麻黃湯葛根湯大青龍小青龍解肌桂枝湯桂枝麻黃各半湯里證不惡風寒反惡熱身不疼掌心並腋下濈濈汗出及腹中硬滿大便不通或腹痛或腹鳴自利小便如常或譫語潮熱或咽乾口渴舌乾或煩滿囊縮而厥唇青舌卷脈俱細而沉或微緩皆里證也下小承氣湯大承氣湯調胃承氣湯大柴胡湯桃仁承氣湯大陷胸湯溫理中湯四逆湯真武湯朮附湯大建中湯表虛證發熱惡寒身痛自汗脈浮緩無力表虛也和解桂枝湯表實證發熱惡寒頭痛身疼而無汗脈浮緊表實也發汗麻黃湯大青龍湯按麻黃湯皆用於即病之傷寒過時亦不用也裡虛證有寒有熱腹鳴自利不渴唇青舌卷或無熱惡寒下利清穀身體痛脈沉微溫中理中湯救里真武湯四逆湯尉法見陰毒條灸法見陰毒條裡實證腹中硬大便不通譫語小承氣湯下之潮熱腹痛大柴胡湯下之不惡寒反惡熱譫語掌心或腋下有汗出謂胃承氣湯咽燥胃干腹滿大承氣湯下大小承氣湯大柴胡湯調胃承氣湯表裡俱見證仲景治傷寒有表復有里今例於左學者審之表裡俱見疑似之間最宜詳悉蓋在表者宜汗在裡者宜下今既兩證俱有大率表證多者則先治其表里證多者則先和其里傷寒脈浮大是表證當汗其人發熱煩渴小便赤當下此是表裡俱見五苓散分利之仲景云中風發熱六七日不解而煩有表裡證渴欲飲水水入即吐名曰水逆五苓散分利之六七日不大便頭痛有熱者是里證當下其人小便清者知不在裡仍在表卻當汗此兩證俱見桂枝湯和之病人心下滿不欲食大便硬脈沉細是里證當下其人欲汗出微惡寒手足冷卻當汗此兩證俱見小柴胡湯和解太陽病表證未除醫反下之遂協熱而利不止心下痞硬謂之表裡不解桂枝人參湯太陽病醫反下之因而腹痛是有表復有里桂枝芍藥湯痛甚加大黃太陽病桂枝證誤為醫下之利遂不止脈促者表未解也喘而汗出者葛根黃芩黃連湯清之脈浮大是表其人心下痞悶卻當下若煩渴燥澀小便赤宜用大柴胡湯和其胃氣脈浮緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱此陽明證也脈反浮而緊是有表裡懼見不可汗下宜梔子豆豉湯吐之有表證而脈遲者不可汗亦不可下宜小建中湯脈弦細不欲食則當下其人頭上汗出身熱微惡寒手足冷此兩證俱見宜小柴胡湯和之和解小柴胡湯桂枝人參湯吐梔子豆豉湯無表裡證無表裡證者但非汗證又非下證俱可用小柴胡湯服後俟其餘證更以小柴胡加減法治之傷寒四五日至十三日過經無表證與里證又未可下小柴胡湯不愈大便硬者大柴胡湯六七日目中不了了睛不和無表裡證發熱大便難脈雖浮數大柴胡湯甚者大承氣湯下後脈數不解至六七日不大便有瘀血也抵當湯脈數善飲消穀六七日不大便亦瘀血證也少陰病始得之反發熱脈雖沉以麻黃細辛附子湯微汗之是也若二三日常見少陰無陽證者麻黃甘草附子湯微汗之此二證又非表裡之所能拘不可不知也表熱裡寒證病人身大熱反欲得衣熱在皮膚寒在骨髓仲景無治法宜與陰旦湯寒已次以小柴胡湯加桂以溫其里脈必沉而遲手足微厥下利清穀此裡寒也所以陰證亦有發熱者此表熱也表寒裡熱證身大寒反不欲衣寒在皮膚熱在骨髓也仲景亦無治法先與白虎加人參湯熱除次以桂枝麻黃各半湯以解其外脈必滑身厥舌乾也所以少陰惡寒而倦此表寒也時時自煩不欲厚衣此裡熱也大柴胡湯下之陰證凡陰證身靜有語無聲氣短吵息目不了了鼻中呼不出吸不入口鼻氣粗水漿一入二便不噤面上恐寒有如刀割面青黑目睛無光有虛陽泛上面臉赤血不紅活為異耳必身重難以轉側或喜向壁臥或淹臥欲寢或閉目不欲見人懶語言語或氣少難以答應或鼻氣往來自冷聲音不響亮或前輕而後重或時燥熱寒渴不能飲水唇口或青或紫或白不見紅色手足自冷手爪青紫血不紅活小便白色或有淡黃大便不實或肌肉之分以手按之殊無大熱陰甚者則冷透手也雖是發熱與陽證大異不可以面赤煩渴為論誤作陽證須要詳辨明白可也溫四逆湯真武湯陽證凡陽證身痛無語有聲目睛了了鼻中呼吸出入能往而能來口鼻中氣熱面紅無彩唇紅口乾舌燥能飲涼水陽旺身輕如常睹目見人語聲響亮口鼻呼吸往來自然小便赤澀大便祕硬手足溫暖爪甲俱紅此皆陽證之大略也陽證似陰病人手足清冷大小便祕澀小便赤煩悶昏迷不眠又有身寒反不欲衣口渴指甲紅色此陰失守而病在肌表元陽潛入侵於內矣法當大承氣湯下之是也不可作陰證治大便祕小便赤其脈沉滑四肢厥冷以其伏熱深也陰證似陽煩躁面赤身熱脈反沉微病人手足逆冷大小便利或泄或清昏沉多眠又有身熱甚反欲得衣口不渴指甲黑色此為陽失守而避在肌表淫陰惡攻於內法當溫之不可以陽證治韓氏微旨曰面色雖見陽證皆陽在上焦其下焦陰氣已盛若調理得下焦有陽則上焦陽氣必降下上焦雖見陽其熱淺於下焦也理中四逆隨證輕重用溫治法見發熱溫經例理中湯四逆湯甘草乾薑湯陰盛格陽傷寒六七日無大熱身冷脈細煩躁不飲水此陰盛格陽也活人書以霹靂散通散寒氣然後熱氣上行汗出乃愈許氏云不甚渴者可用附子霹靂散渴者不可與服面赤煩躁不渴或渴不欲水脈七八至按之不鼓姜附湯主之正陽回陰附子霹靂散溫傷寒例云面少赤陰盛於內隔陽在外其病必重用通脈四逆湯正合仲景法陽盛拒陰身表涼疼痛四肢冷諸證脈沉數而有力承氣湯主之王太僕云身寒厥冷其脈滑數按之鼓擊於指者此名陽盛拒陰便祕者以大承氣湯下之下大小承氣湯陽毒仲景云陽毒者受天地惡毒之氣入於陽經其證初病大熱咽喉痛發斑如錦紋狂躁面赤譫語脈洪大滑促宜陽毒升麻湯或青黛一物湯陽毒之證初受病時所感邪毒深重加以當汗失汗當下失下或吐下後邪熱乘虛而入或誤服熱藥使毒熱散漫至於六脈洪大舌卷焦黑鼻中如煙煤身面錦斑狂言直走或逾牆上屋登高而歌棄衣而走皆其證也五日可治六七日不可治陽毒升麻湯主之咽痛玄參升麻湯熱甚者時狂時昏口噤咬牙或見鬼神或吐膿血或吐藥不可下用水漬法消散陽毒升麻湯吐法升麻梔子湯玄參升麻湯水漬法若熱甚者時狂時昏口噤咬牙不可下用水漬法候牙稍寬亂稍定投藥治之陰毒陰毒之證初受病時所感寒邪深重致陰氣獨盛發汗吐下後變成陰毒六脈沉微腹中絞痛或自下利四肢沉重咽喉不利虛汗嘔逆唇青面黑手足厥冷身如被杖短氣不得息此陰毒之候三日可治四五日不可治先服甘草湯真武湯附子湯次灸氣海關元二三百壯或用蔥尉臍下以手足溫和脈息漸動為效如厥逆寒極囊縮者可用熏法有回生之驗陰毒本腎氣虛寒或傷冷物復傷風邪內既伏陰外又感寒或先感寒而內伏陰內外皆陰故陽氣不守遂發頭痛腰重腹痛眼睛痛身體倦怠而不甚熱四肢逆冷臍腹築痛六脈沉細時或來疾尺部小短而微寸口盛時大者皆其候也或煩躁虛汗不止或時鄭聲指甲面色俱青正陰回陽霹靂散正元散天雄散附子散溫經真武湯四逆湯白朮湯肉桂湯劫金液丹尉法腹中急痛炒鹽包蔥餅尉熏法逆厥囊縮者以炒豆投熱醋中如法熏之灸關元氣海神闕發熱翕翕然而發熱者表熱也蒸蒸而熱者裡熱也表熱者風寒客於皮膚邪熱怫鬱於外表熱而里不熱也裡熱者陽氣下陷入於陰中裡熱甚而達表也其在半表半裡者以表熱未罷邪氣傳裡里未作實則表裡俱熱而但輕於純在裡也至於三陰發熱則有腹痛手足厥冷其脈或沉或下利為異節庵調太陰厥陰皆不發熱惟少陰反有發熱蓋謂本經原無熱證但三陽經之熱未去病至三陰而三陽經之熱證猶在故仲景有謂腹滿時痛者病屬太陰桂枝加芍藥湯主之夫腹滿太陰經證也治以桂枝以解表甘草芍藥以瀉熱是也又厥陰條云手足厥寒者當歸四逆湯主之夫手足厥寒者厥陰經證也治以桂枝細辛以解表芍藥甘草以瀉熱是也脈陰陽俱虛熱不止汗後下後復發熱脈躁急利與熱懼不止者難治發汗太陽病發熱頭痛惡寒脈浮緊無汗為表實麻黃湯太陽陽明合病頭痛目疼鼻乾脈浮發熱下利葛根湯太陽表證未解心下有水氣頭痛發熱惡風小青龍湯傷寒見風傷風見寒太陽無汗脈浮緊煩躁大青龍湯解肌太陽頭痛發熱惡寒自汗脈浮緩為表虛桂枝湯脈浮緩反無汗脈緊反煩躁俱用桂枝麻黃各半湯太陽陽明頭痛發熱不惡寒而渴肌肉痛脈浮大而長葛根解肌湯兩解榮衛兼和是也如傷寒見風脈風見寒脈為榮衛兩傷脈浮緊無汗大青龍湯發熱脈浮大小便赤煩渴此表裡證俱見或有汗脈浮小便澀並宜五苓散六經表少陽發熱胸滿脅痛小柴胡太陰熱而腹痛桂枝湯少陰發熱脈沉者麻黃附子細辛湯下利厥逆裡寒外熱脈不出者通脈四逆湯厥陰手足厥冷而身熱者當歸四逆湯下傷寒發熱四五日發汗不解蒸蒸發熱屬胃也調胃承氣湯陽明病身熱汗出濈濈然脈實者同上汗後不惡寒但熱者並陽明發汗過多而反熱俱大承氣湯傷寒六七日目中不了了無表裡證大便難身微熱此為實急下之大承氣湯脈浮數者大柴胡湯身熱汗不出內實反惡熱或發熱汗出不解心下痞嘔吐而利俱大柴胡湯無痞滿無潮熱無譫語脈不沉俱勿輕下溫脈浮熱甚反灸之因火而動必咽燥吐血四逆湯脈浮而遲表熱裡寒下利清穀四逆湯和頭痛身熱小便自利或惡寒心中悸而煩者小建中湯脈浮發熱無汗而渴表裡相半小柴胡湯壯熱頭痛心中煩者梔子黃芩湯大下後身熱不去心中結痛者未欲解梔子豆豉湯發汗又復下之惡寒發熱者小建中湯瘥後勞役復發熱者小柴胡湯食復發熱梔子豉湯病後虛羸微熱不去者竹葉石膏湯雙解里證已急或脈浮或頭痛風寒表證仍在者過經不解是也大柴胡湯此解表攻裡之法故曰雙解非前兩解之比也出血傷寒七八日不解自胸至頭上面目俱帶紫黑壅腫寸脈浮大而數是欲作衄而不能出也用箬葉或茅刺於兩鼻中彈刺之出血一二升而安今西北方人於兩尺澤刺出血如射即安謂之打寒此許學士遺意也正易所謂血去惕出有自來矣但北方之人不諳此理凡一切雜病內傷動輒刺血亦謂之打寒甫見氣血俱虛而病者又行此法是犯虛虛之戒而遂致於不可救者何限哉越婢太陽病發熱惡寒熱多寒少脈微弱不可表散宜解表邪而益胃滋津桂枝二越婢一湯吐病如桂枝證頭不痛項不強胸中痞硬上逆胸有寒也宜吐之瓜蒂散或心中結痛而煩梔子豉湯劫有汗下後陰陽之氣下陷熱不退其人昏倦不渴不食者宜鎮之來復丹靈砂丹針身熱惡寒取後溪身熱汗出手足厥冷取大都身熱頭痛不食取三焦俞汗不出取合谷後溪陽池身熱而喘取三間餘熱不盡取曲池煩滿汗不出取風池命門汗出煩熱取五處攢竹上脫煩心好壯則取巨闕商丘身熱頭痛汗不出取曲泉身熱進退頭取神道關元懸顱以上出針經灸六脈沉細一息二三至取氣海關元少陰發熱取大溪發熱反欲得衣熱在肌表寒在骨髓脈沉遲手足或微厥下利清穀此陰證發熱表未解四逆湯通脈四逆湯活人書表熱裡寒先與陰旦湯已次用小柴胡湯加桂溫表惡寒惡寒者不見風亦惡寒身雖熱亦不欲去衣被其風寒客於榮衛陰氣上入於陽中則灑淅而惡寒也經曰發熱惡寒者發於陽也無熱惡寒者發於陰也謂如或已發熱或未發熱必先惡寒而繼之以發熱此發於陽也若初病惡寒而倦脈沉細而緊此發於陰也在陽則發汗在陰則溫里或下證悉具而微惡寒者是由表未解當先解表而後攻裡若少陰病惡寒而蜷足厥冷自利煩躁脈不至者不治發汗太陽發熱無汗惡寒陽明雖有下證但惡寒者表未解也俱麻黃湯解肌太陽發熱有汗惡寒陽明脈遲汗出多微惡寒表未盡也俱桂枝湯發熱惡寒熱多寒少脈微弱無陽也不可汗越婢湯大下後復發汗心下痞惡寒無汗先桂枝湯後攻痞三黃瀉心湯和少陽頭痛發熱惡寒小柴胡湯發熱微惡寒柴胡桂枝湯桂枝二越婢一湯下利後惡寒而倦手足溫者小建中湯尺寸脈微而惡寒陰陽表裡俱虛更不可吐下小建中湯下少陰惡寒而蜷時時自煩不欲厚衣大柴胡湯清吐下後七八日不解發熱而渴時時惡寒表裡俱熱白虎湯發熱汗出後惡寒而嘔但心下痞者五苓散溫少陰惡寒脈沉細四逆湯理中湯汗後惡寒者虛也芍藥附子甘草湯汗後惡寒脈細數浮遲嘔不止理中丸惡寒脈微而復利正亡血也四逆加人參湯惡寒反不欲近衣熱在骨髓寒在肌表從治法先用白虎加人參湯次用桂枝麻黃各半湯寒熱往來寒熱往來者陰陽相勝邪正相爭而作也蓋陽不足陰邪出於表而與之爭故陰勝而為寒陰不足則陽邪入於裡而與之爭故陽勝而為熱邪居表多則多寒邪居里多則多熱邪在半表半裡則寒熱相半乍往乍來而間作也小柴胡湯專主寒熱寒多者加桂枝熱多者加大黃是大法也亦有熱甚反寒者夏月不宜用桂亦有婦人熱入血室而作寒熱者亦屬少陽經也和解半表豐里寒熱往來小柴胡湯熱多白虎加桂湯寒多柴胡薑桂湯先熱後寒陰不足也小柴胡芍藥湯心煩喜嘔脅滿不欲食小柴胡湯胸滿或泄而嗽小柴胡去棗加五味子湯渴而不嘔頭汗出小便不利胸滿柴胡乾薑湯不嘔清便寒熱日二三發桂枝麻黃各半湯厥陰惡寒發熱自瘧為欲愈桂枝麻黃各半湯太陽證似瘧一日再發脈洪大者桂掛二麻黃一湯婦人中風續得寒熱發熱有時經水適斷此為熱入血室其血必結故使如瘧小柴胡湯越婢惡寒而熱脈微不可更發汗桂枝二越婢一湯雙解病至十餘日結熱在裡復往來寒熱大柴胡湯下寒熱而惡熱胃實也調胃承氣湯寒多熱少仲景書只有熱多寒少之條無寒多熱少之證脈浮緩手足厥麻黃桂枝各半湯熱多寒少大小便清利脈浮桂枝麻黃各半湯尺脈遲者黃耆建中湯脈微弱無陽者桂桂二越婢一湯潮熱潮熱屬陽明陽明主於未申一日一發日晡而作者是也太陽旺於巳午少陽旺於寅卯若於此時發熱者為邪未入胃腑可下之非謂潮熱也脈浮而緊潮熱而利或小便難大便溏者熱未入腑猶帶表邪當先和解其外如小便利大便硬方可攻之經曰潮熱陽明內實也又曰潮熱者外欲解也又曰其熱不潮未可與承氣湯以此知傷寒潮熱則是表解裡氣將復下之而愈若熱未潮表未罷必和解之隨證而治發汗潮熱非發於日晡時腹滿鼻乾心脅痛身黃麻黃連翹赤豆湯和解潮熱惡寒或溏咳逆小柴胡湯陽明中風脈浮弦小便難而噦腹滿脅痛無汗嗜臥小柴茯苓湯潮熱脈浮兼寒小柴胡加桂枝湯解肌日晡潮熱脈虛者微汗之桂枝湯散熱潮熱身寒為熱未實陽明中風也梔子柏皮湯陽明脈浮潮熱或盜汗黃芩湯攻下汗後潮熱不惡寒腹滿而喘陽明胃經實證也大小承氣湯下後潮熱大便復硬大柴胡湯脈實者大承氣湯結胸潮熱屬太陽脈不浮者大陷胸湯腹滿不大便潮熱小承氣湯微利之病人煩熱汗出則解又加瘧狀日晡熱脈實可下小承氣湯大柴胡湯惡證傷寒五六日吐汗下後不解日晡潮熱如見鬼狀循衣摸床微喘直視服承氣湯脈弦者生澀者死煩熱煩熱者不經汗吐下邪熱傳裡則為煩熱與發熱有異也經云病邪在表發熱汗出而解如未作膈實但當和解微熱而已若心下滿而煩則有吐下之殊也宜別其虛實而為劑之重輕若先煩而悸者為實先悸而煩者為虎虛謂心中或嘔或吐之貌陽明病心煩喜嘔壯熱往來心下悸小便不利小柴胡加茯苓湯發汗後解半日許脈浮數者可更發汗桂枝湯汗後晝煩夜靜不嘔不渴無表證脈微沉乾薑附子湯又云煩熱為煩而熱有時而煩者是也所以有陰有陽有真陽內郁有陰中伏陽之證發汗邪在表而煩熱者桂枝麻黃各半湯發熱後解半日許復煩脈浮數者可更汗桂枝湯和解心煩熱而嘔或胸中煩而不嘔小柴胡湯兼吐心煩不眠者酸棗仁湯煩熱而渴竹葉石膏湯和中傷寒二三日心中悸而煩熱是虛也小建中湯分利汗後煩熱而渴五苓散之類可水汗後胃干煩熱不得眠欲飲水少少與之吐汗後煩熱心胸煩悶人參散吐之實煩而胸中窒者梔子豉湯脈浮上部填塞心胸滿者瓜蒂散反覆顛倒心中懊憹但藥有輕重之不同耳和表裡生津液隨證分治熱者白虎湯寒者附子湯脈表未解也熱者渴者熱未實上焦燥也五苓散生津和表裡陰虛而邪盛熱煩於內心中煩不得眠者黃連阿膠湯扶陽散煎背惡寒背為陽腹為陰陽氣不足陰氣盛故背惡寒背為五臟之所繫陰氣乘於陽也發汗無汗惡風表實脈緊寒傷榮俱麻黃湯脈浮者升麻湯和解背惡寒兼潮熱柴胡加桂湯汗出惡寒附子瀉心湯解肌自汗背惡寒惡風桂枝湯保命集背惡寒表未解葛根湯清三陽合病額有汗口燥不仁白虎湯傷寒無大熱口燥渴心煩背微惡寒白虎加人參湯下背惡寒有潮熱腹滿小承氣湯溫少陰病一二日口中和背惡寒無熱也附子湯發汗後不解反惡寒者虛也陽微也芍藥甘草附子湯以補榮衛在陰者四肢冷大便滑溫中湯四逆湯脈沉緊而細內自煩躁不飲水此為陰盛格陽身冷四逆湯霹靂散尺脈遲小建中湯身寒拘急泄下重腹滿少陰也溫中益陰灸背惡寒口中和灸關元穴惡寒惡寒者不見風亦惡寒身雖熱亦必欲近衣被其風寒客於榮衛陰氣上入陽中則灑淅而惡寒也經曰發熱惡寒者發於陽也無熱惡寒者發於陰也或已發熱或未發熱必先惡寒而繼之以發熱此則發於陽也若初病惡寒而蜷脈沉細而緊此則發於陰也在陽則發汗在陰則溫里或下證悉具而微惡寒者是表猶未解當先解表而後攻裡若少陰病惡寒而蜷足厥冷自利煩躁脈不至者為不治惡寒陰寒為病口中和惡寒陽氣內陷口乾而煩發汗惡寒大率多屬表若太陽發熱無汗惡寒麻黃湯陽明雖有下證但惡寒表未解也麻黃湯和解少陽頭痛發熱惡寒小柴胡湯發熱微惡寒柴胡桂枝湯桂枝二越婢一湯解肌太陽發熱有汗惡寒陽明脈遲汗出多微惡寒表未盡也桂枝湯或大下後復發汗心下痞惡寒無汗先用桂枝湯然後攻痞三黃瀉心湯汗吐下後八九日不解發熱而渴時時惡寒表裡俱熱白虎湯和中下利後惡寒而蜷手足溫者尺寸脈微而惡寒此陰陽表裡俱虛不可更吐下俱小建中湯溫經少陰經惡寒脈沉細四逆湯理中湯汗後惡寒虛也芍藥甘草附子湯下少陰惡寒而蜷時時自煩不欲厚衣大柴胡湯惡風惡風者見風則怯密室之中無所惡也風傷榮衛氣虛則腠理不密由是而惡風悉屬於陽非比惡寒有陰陽之別若無汁而惡寒者為傷寒當發其汗汗出而惡風者為中風當解其肌不可更發汗若里證甚而惡風未罷者尤當先解其表三陽風溫皆有此證不可不辨發汗太陽頭痛發熱身痛骨節痛無汗惡風而喘麻黃湯解肌有汗而惡風為中風衛病桂枝加葛根湯太陽中風陽浮陰弱惡風自汗出鼻鳴乾嘔桂枝湯和中汗不止必惡風煩躁不得臥先防風白朮牡蠣湯次用小建中湯清吐下後七八日不解表裡俱熱時時惡風大渴舌乾燥而煩白虎加人參湯溫發汗太過衛虛亡陽遂漏不止而惡風者法當溫桂附湯小便難四肢微急難以屈伸同上風濕惡風不欲去衣骨節煩痛不得屈伸汗出短氣小便不利或身微腫甘草附子湯脈浮身重汗出惡風防己黃耆湯針先刺風池風府卻與桂枝葛根湯自汗衛氣者所以實腠理而固津液者也衛為邪所幹不能衛護於外由是而汗出焉且自汗者有表裡虛實之分若自汗出惡風寒為表未解當先解肌以至汗泄惡風與汗後惡寒皆為表虛必用溫劑若汗出不惡風寒則為表解里未和須攻下之或汗出發潤如油如凝珠而不流者不治汗出而濡此其風濕甚者濕邪干於衛氣氣不能固於外則皮膚為之疏而津液妄泄濈濈然潤漐漐然出也解肌太陽中風自汗脈浮緩桂枝湯和解自汗身熱不渴柴胡加桂湯補自汗而小便數者不可與桂枝湯宜芍藥甘草二物或小建中湯黃耆建中湯分利自汗而渴小便難五苓散不渴者茯苓甘草湯白汗而渴小便利勿用五苓散疏風太陽病發熱脈沉細搖頭口噤背反張自汗不惡寒名柔痓中風也小續命湯汗多亡陽煩躁惡風不得臥先與防風白朮牡蠣湯汗止服小建中湯溫發汗多遂漏不止曰漏風亡陽桂枝附子湯少陰自汗小便清白咽乾嘔吐厥逆甘草乾薑湯霍亂吐利自汗手足冷脈沉絶不渴者理中湯陰證四肢逆冷自汗四逆湯消暑中暑霍亂吐利自汗內熱渴甚者香茹飲白虎湯小柴胡湯冷服從治吐利後自汗出而厥脈欲絶通脈四逆湯加豬膽汁下陽明汗多而渴不大便者調胃承氣湯自汗出不惡風寒則為表證罷而里證實也承氣湯里未和熱越故下之才覺汗多未至津液干宜速下之則為達經免致用蜜導也陽明自汗小便利小便利為津液內竭大便雖硬不可攻可用蜜導煎法其法用蜜二合於銅器中微火煎之稍凝如飴攪之勿令焦少以皂角末和之乘熱捻作棗子樣冷則硬納穀道中欲大便急去之撲法汗多不止用白朮藁本川芎白芷各一兩牡蠣糯米粉各二兩為細末相和周身撲之盜汗盜汗者睡著則汗出醒則止也雜病盜汗責其陰虛傷寒盜汗在半表半裡知其膽有熱也專主於小柴胡為當矣和解盜汗出而微惡寒小柴胡加桂湯脈浮大欲眠目合則汗小柴胡湯清熱冬陽明脈浮潮熱盜汗黃芩湯下素有積熱在內脈實大柴胡湯陽明盜汗裡實者調胃承氣湯撲法如自汗法頭汗頭為諸陽之首諸陽經絡循於頭三陰之經則至頸而還故頭汗者邪傳諸陽津液上湊則汗見於頭也若遍身汗出者謂之熱越今熱不得熱而陽氣上騰津液上湊故汗出於頭夫裡虛不可下內涸不可汗既頭有汗不可再汗也其或實熱在內小便利而大便黑為畜血瘀熱在裡小便不利渴引水漿必發黃熱入血室虛煩水結皆令頭汗此為熱鬱於內而上達或吐或下以去其邪又或小便不利內外關格而頭汗則為陽脫誤下濕家額上汗出而喘小便難大便利者亦陽脫也二者難治百問云表實裡虛頭汗不可下病頭汗出者切忌小便難為逆和解汗下後胸脅滿小便不利往來寒熱心煩頭汗出柴胡桂薑湯寒濕相搏邪在半表半裡小柴胡湯吐陽明下之外有熱手足溫不結胸心中懊憹飢不能食但頭汗出梔子豉湯分利心下滿頭汗出水結胸小半夏茯苓湯頭汗出齊頸而還發黃證也茵陳湯茵陳五苓散下頭汗譫語是為血熱屬陽明承氣湯手足汗傷寒手足汗者太陽傳入陽明之府熱聚於胃則津液旁達於四肢也手足漐漐汗出大便難譫語為熱聚於胃可知陽明中寒者不能食小便不利手足濈濈出汗此欲作痼瘕即是中寒下蘊熱大便燥譫語手足汗出大承氣湯調胃承氣湯溫挾寒水穀不分手足汗者理中湯無汗寒邪傷人獨不汗出寒傷榮而不傷衛衛無邪氣所幹則皮腠固密津液不泄是以汗不出也及其傳裡為熱則亦自汗出也當汗之證與麻黃三服而汗不出者死不治寒邪在表欲飲水內蓄因其亡陽久虛皆令無汗傷寒無汗邪在表而腠理密也宜散之經所謂陽明無汗小水不利心中懊憹身必發熱發汗太陽頭痛發熱無汗麻黃湯脈浮緊發熱無汗麻黃湯陽明反無汁脈浮而喘者麻黃湯和解脈浮而遲為無陽不能作汗身必癢桂枝麻黃各半湯解肌項背強幾兒無汗葛根湯剛痓發熱無汗葛根湯小續命湯清利發熱無汗悸不止白虎湯渴欲飲水無表證者白虎加人參湯無汗小便不利心中懊憹身必發黃五苓齒陳湯助陽陽明主有汗今無汗身癢如蟲行皮中虛久故也黃耆建中湯朮附場熟附子配麻黃發中有補趙嗣真曰乾薑配生附補中有發蒸法漬形火攻皆同用頭痛太陰少陰有身熱而無頭痛蓋二經皆不上頭故也厥陰有頭痛而無身熱若身熱而又頭痛屬陽經也傷寒頭痛屬三陽乃邪氣上攻也太陽專主頭痛陽明少陽亦有之三陰無頭痛太陰少陰二經至胸而還惟厥陰循喉嚨上絡於頏顙會於巔故有頭痛傷寒頭痛太陽經居多頭角痛屬少陽頭額痛及鼻屬陽明頭頂痛屬厥陰經厥陰頭痛甚而手足寒者為黃病若兩感於寒太陽與少陽俱病則頭痛口苦幹煩滿而渴與夫頭痛熱甚入連於腦手足寒者則為真頭痛矣發汗傷寒頭痛發熱無汗惡寒不惡風麻黃湯大便六七日不通頭痛有熱小便清者知不在裡仍在表也須當汗解頭痛甚者必衄葛根蔥白湯荊防散川芎石膏湯和解少陽頭痛往來寒熱脈弦細無汗邪在半表半裡小柴胡湯發熱頭痛似瘧為欲愈桂枝麻黃各半湯解肌太陽頭痛發熱自汗表浮緩桂枝湯傷風汗出發熱惡風不惡寒桂枝湯輕者柴胡加桂湯天行勞復頭痛四肢疼蔥豉湯太陽病下之脈細數頭痛未止連須蔥白湯清太陽傷寒頭痛須用酒炒黃芩羌活薄荷葉輩自汗頭痛及風暑雜病俱白虎湯少加芎荊尤妙竹葉石膏湯利夏月頭痛惡寒心下煩躁不快五苓散吐頭痛發寒熱脈緊寸大即是痰厥瓜蒂散中寒濕鼻塞聲重而頭痛瓜蒂搐鼻法痰涎胸瞞頭痛寒熱瓜蒂散溫厥陰頭痛及少陰證嘔而吐涎沫吳茱萸湯夏月頭疼身冷自汗此中暑溫朮附湯厥陰頭痛脈微遲為欲愈不愈者小建中湯下陽明頭痛不惡寒微惡熱不大便胃氣實也調胃承氣湯表邪入里大便祕有熱脈沉而滑或尺寸俱長皆可下有熱不惡寒反惡熱或不大便小便赤者胃實也調胃承氣湯項強傷寒項強乃太陽膀胱之經走頭項而行背及腰而下足也所以太陽感受風寒則項為之強急必待發汗而解太陽中風加之寒濕亦項強口噤背反張為痓病也宜溫之發汗太陽病項強反汗出惡風為表實麻黃湯太陽中風項強口噤背反張無汗為剛痓麻黃湯解肌太陽項強無汗葛根湯項背強幾兒反汗出惡風者桂枝加葛根湯有汗項強脈浮緩桂枝湯太陽寒濕項強口噤背反張有汗為柔痓桂枝湯和解頭項強身熱惡風腹中滿手足溫而渴小柴胡湯溫陰毒初得病手足項強咽喉痛心腹痛短氣厥逆吐利身如被杖附子湯陰毒甘草湯正陽湯有誤下太陽結胸項強理中丸若損甚者兼與四逆湯太陽誤下而厥者故用此不厥者不可輕用下結胸病亦有項強如柔痓狀大陷胸丸針四肢拘急四肢拘急者手足不能自如屈伸不便蜷臥惡風之類四肢諸陽之本因發熱汗多亡陽陽虛而有是證也和傷寒四肢拘急自汗脈浮小便數心煩惡寒手足倦怠芍藥甘草湯溫太陽病汗出遂漏不止惡風小便難拘急者桂枝加附子湯吐利後汗出發熱惡寒四肢拘急而厥冷者四逆湯一身盡痛由陰氣上入陽中或陽微陰虛相搏所致脈沉實為陽盛格陰解一身盡痛熱而惡寒面寒宜解表桂枝湯溫一身盡痛發熱面黃大小便反快者甘草附子湯利一身盡痛發熱身如重黃頭汗出背強小便不利此中濕也茵陳五苓散下一身盡痛發熱面黃七八日後熱結在裡有瘀血也宜下之桃仁承氣湯抵當湯身體痛身痛太陽表證居多也雖雲表邪未解而有發汗溫經先後之不同自利脈沉為陰病身痛身重屬手陽明為陽病又有陽邪內行不榮於表而身痛不可不知太陽身痛但拘急中濕身痛不可轉側陰毒身痛體勢沉篤宛如被杖發汗太陽脈浮身痛無汗麻黃湯陽明雖有下證但身痛者表未解也麻黃湯解肌發熱有汗身痛桂枝湯陽明脈浮葛根湯汗後霍亂身痛桂枝湯和中汗後脈沉遲身痛血不足也黃耆建中湯溫陰毒嘔逆下利身痛如被杖唇青面黑甘草四逆湯少陰證身痛脈沉肉瞤筋惕真武湯小便利者朮附湯筋惕肉瞤此發汗過多亡陽之所致內經曰陽氣者精則養神柔則養筋發汗過多津液枯少陽氣虛筋肉失所養故惕惕然跳瞤而動為虛甚也故仲景特設真武湯以救之謂因發汗吐下後表裡俱虛而有此狀為逆而難治也溫筋惕肉瞤而四肢厥冷真武湯和經蓋陽虛者茯苓桂枝甘草白朮湯疏風動氣在左肝血之虛也不可發汗發汗則重擊其肝血不能藏故筋惕肉瞤此為逆證先服防風白朮牡蠣湯次服小建中湯胸脅滿胸脅滿胸膈間氣塞閉也非心下滿也脅滿者脅肋下氣填脹也非腹中滿也胸滿多帶表證脅滿多挾半表半裡證邪氣自表傳裡必先自胸脅已次經心腹發汗胸中至表猶近也葛根湯陽明喘而胸滿麻黃杏仁石膏湯和解半表半裡脅下痞硬沖和湯去棗加牡蠣或已汗下胸脅滿微結小便不利渴而不嘔但頭出汗或往來寒熱柴胡薑桂湯胸脅俱滿或脅下硬痛或嘔舌上白胎或不大便並小柴胡湯調中寒中太陰誤下之愈不快䐜脹或吐或利理中湯加枳實陳皮吐邪氣留於胸中聚而為實非上吐不可如四日在胸吐之則已汗下之而煩熱胸中窒者梔子豉湯吐之胸中痞硬氣上衝咽喉不得息此為胸中有寒也瓜蒂散吐之下陽明少陽合病下利身熱脅痛大柴胡湯汗後頭疼心下痞脅滿十棗湯心下滿傷寒心下滿者當心下高起滿硬者是也不經下後而滿者則有吐下之分若下後滿者有結胸痞氣之別如病人手足厥脈乍緊邪結胸中心下滿而煩飢不得食病在胸中當吐之經下後心下滿而硬痛者為實邪結胸滿而不痛為虛邪虛邪留滯則但滿而不硬痛也脈雙弦而遲者必心下硬實則心下滿虛則心下悸和解滿而不痛半夏瀉心湯嘔而發熱小柴胡湯分消飲水多心下滿脹牡蠣澤瀉湯利小水傷寒例云心下滿心下悸皆邪在胸而停水也吐病人手足厥冷脈乍緊邪結在胸心滿而狂飲不能食者吐下心下滿而硬痛結胸大陷胸湯心下滿按之濡關上脈浮者大黃黃連瀉心湯陽明病心下硬滿不可攻之利遂不止者死利止者愈諸瀉心例心下痞滿而復惡寒汗出者附子瀉心湯汗後胃不和心下痞硬乾噫食臭脅下水氣腹中雷鳴下利者生薑瀉心湯心下痞而乾嘔心煩不得安下之痞益甚此作但胃中虛客氣上逆故硬也甘草瀉心湯結胸經曰病發於陽而反下之熱入因作結胸注云發熱惡寒者發於陽也外證項強心下滿硬而痛者是也此為實邪在裡法當下之若脈浮大若表證若水氣慎不可下亦有不因下而心下硬滿者經曰病人手足厥脈乍緊邪結胸中心下滿而煩飢不飲食當吐之是則病在胸中也經曰陽明病心下硬滿不可下下之利不止而死是則自表傳裡留於心下未痊為實法當吐故有此戒其或結胸證具而煩躁者不治活人書分五種按之則痛為小結胸不按而痛手不可近為大結胸飲水不散而成拮胸為水結胸心下懊憹煩躁煩渴為實熱結胸婦人熱入血室為血結胸和解結胸脈浮者是表有熱或煩渴嘔噦宜先服小柴胡湯解表方可下之飲水不散而成水結胸小半夏茯苓湯小柴胡去棗加牡蠣湯泄熱如汗後未全解誤下之為小結胸煩渴脈實三黃瀉心湯表未全解尚不敢用理中邪熱在胸膈痞結或未辨虛實先與理中加枳實尢妙先理其氣枳實理中丸桔梗枳殼湯韓祗和七物調中丸太陰證下之心胸硬滿及用諸藥不效者增損理中丸結胸手不可近用陷胸等藥不效枳實理中丸渴加栝蔞逐寒無熱證此寒實結也枳實理中丸三物白散檳榔散下心下按之痛脈浮滑為小結胸小陷胸湯實熱脈沉緊心下痛手不可按為大結胸大陷胸湯有兼項強如柔痓狀或從心下至臍上不可近大陷胸湯血結胸小腹滿小便不利抵當湯水解結胸喘促狂亂極熱大燥用地龍水一服未效再服自然汗出愈水漬法結胸煩亂欲死凝雪湯漬布薄胸上熱除為度痞胸滿而不痛者為痞關脈沉心下滿而不硬按之不痛名曰痞經曰病發於陰而反下之因作痞注云無熱惡寒者發於陰也其結胸之輕者乎外證心下滿而不痛按之則濡是其虛邪留滯故但滿而不痛也惟枳梗最良欲攻之亦須表證解而後可不滿不硬但煩悶者非痞也謂之支結凡痞而硬為水停濡者為氣聚保命集云脾不能行氣於臟結而不散為痞和解表未解不滿不硬而心下煩悶曰支結柴胡桂枝湯服五苓散後心下痞而惡寒表未解也先與桂枝湯乃可攻輕者通用桔梗枳實湯胸滿而濡者半夏瀉心湯胸脅微結小柴胡湯加薑牡蠣表證未罷因數下之協熱而利心下痞硬為表裡俱病桂枝人參湯下利心下痞硬乾噫食臭腹鳴甘草瀉心湯桂枝人參湯分利痞滿小便不利五苓散飲水過多成支結小半夏茯苓湯雙解胸滿硬按之不痛為痞關脈沉緊大柴胡湯溫散痞而不利朮附散胃寒咳逆氣虛理中湯四逆湯下心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒十棗湯下之必其脈沉實無表證方可用瀉痞例滿而不痛半夏瀉心湯心下痞手足溫按之濡其脈關上浮者黃連瀉心湯乾噫食臭脅下有水氣生薑瀉心湯兼止嘔逆下利腹鳴用甘草瀉心湯兼調胃祗和用厚朴瀉心湯宣明治痞用檳榔散腹脹滿傷寒六日邪氣入胃是在腹也脾為中央之土所以腹滿多屬太陰也經謂非太陰腹中無虛滿常痛者為裡實下之時減者為裡虛當溫之若表解內不消非大滿猶寒熱亦未可下是邪全未入腑若大滿大實兼有燥便須滿之四五日方可與下謂邪已入腑也大抵陽熱為邪則腹滿而吐利食不下若曾經吐汗下後而腹滿治法各有不同是又不可不知和解腹中滿痛小柴胡湯去黃芩陽明發熱腹滿微喘口苦咽乾或不大便譫語者並小柴胡湯噦而小便難者加茯苓三陽合病腹滿身重難以轉側譫語口中不仁小柴胡湯有汗白虎湯和中氣汗後脹滿厚朴半夏甘草人參湯桔梗半夏湯腹滿痛者脾不勝水水與氣搏皮肉之間腹中漉漉有聲小半夏茯苓湯加桂枝溫太陰腹滿吐食不下枳梗理中丸下利腹滿身痛先溫其里四逆湯後攻其表桂枝湯太陽病反下之因而腹滿時痛桂枝芍藥湯下少陰六七日不大便腹滿痛者急下之大小承氣湯大實痛者桂枝大黃湯譫妄脈沉數煩渴不拘日調胃承氣湯少腹滿少腹滿者臍下滿是也若心胸滿腹滿皆為邪氣而非物今小腹滿皆為有物而非氣故在上而滿者氣也在下而滿者物也小便自利則為蓄血小便不利乃是溺澀滲利之劑宜分兩途經曰病人素有痞氣連在膈脅痛引小腹入陰筋者名臟結也死分利少腹硬小便不利五苓散陰陽易小腹痛燒裩散下少腹急結者可攻之桃仁承氣湯輕者犀角地黃湯太陽病六七日表證在脈微沉不結胸發狂小腹硬滿小便自利抵當湯溫小腹滿手足厥冷真武湯不結胸小腹滿按之痛者此冷結在膀胱灸關元穴腹痛邪氣入里與正氣相搏則為腹痛蓋陽邪傳裡而痛者其痛不常當以辛劑和之陰寒在內而痛者則痛無休時欲作利也當以熱劑溫之有燥糞宿食為痛者則煩而不便腹滿而痛也則須下之按而痛甚為實按之痛減為虛和中傷寒陽脈澀陰脈弦腹中痛泄利建中湯桂枝芍藥湯小建中湯不愈小柴胡湯和血厥陰證小腹痛當歸四逆湯溫中傷寒四五日腹中痛若轉氣下趨小腹者此欲自利也四逆湯少陰病厥逆或利而咳四逆五味子乾薑湯少陰腹痛手足厥逆泄利脈微欲絶不惡寒面色赤裡寒外熱通脈四逆湯加芍藥腹痛小便不利真武湯清熱胸中有熱胃中有邪氣腹痛欲嘔吐而痛者為上熱下寒也黃連湯下關脈實大腹痛腹滿便祕繞臍而痛發作有時有燥糞也大小承氣湯腹滿而痛桂枝加大黃湯下之早因而腹痛未可遽下小建中湯尉用灰包之法具陰證陰毒之下咽痛咽痛為少陰證為陽毒以太陽之邪傳於少陰故也少陰之脈循喉嚨挾舌本其熱邪毒氣上衝而痛或成瘡不納穀食或吐膿血又有陽厥應下反發汗則口赤爛故有不可下不可汗汗下則必是亡陽惟甘桔湯為陰陽通用之藥也清解脈陰陽俱緊主無汗有汗曰亡陽屬少陰法當咽痛甘桔湯豬膚湯少陰腹痛有熱咽痛者黃連龍骨湯陽毒咽痛口瘡赤爛蜜浸黃連汁噙升麻六物湯解毒陽毒咽痛脈浮數而大吐膿血千金外臺鳥羽扇膏溫中有非時暴寒附於少陰之經脈微弱而咽痛次必下利古方謂之腎傷寒先用半夏桂甘湯次服四逆湯下利不止手足徹冷無熱證者四順湯丸即理中湯丸中加之甘草一倍是也少陰中風胸滿心煩腰痛頭痛咽痛脈弦吐沫三因用桂枝附子噙敷咽痛口瘡蜜清炙黃柏焦碾為末每用半錢摻口中吹點脅痛脅痛少陽證表解里未和或素有痞積在臍旁痛引小腹入陽筋者名臟結主死和解往來寒熱脅痛及胸痛滿小柴胡湯加茯苓柴胡牡蠣湯傷寒表裡有水或熱邪偏注多令脅痛乾嘔微利發熱而咳脅痛者小青龍湯身涼兩脅刺痛此熱攻注於脅也賺氣湯或結而成塊或走入脾間作痛五磨飲子下身涼表證罷乾嘔脅痛裹有水十棗湯針刺關元仍服小柴胡湯咳逆夫咳逆者俗謂之吃忒是也才發聲於喉間則遽止兀兀然連數聲然而短促不長古人謂之穢者非也噦與乾嘔無異俱其聲濁惡而長然皆有聲而無物若將噦為咳逆誤人多矣逆因胃氣本虛汗下太過或復飲水水寒相搏而成咳逆保命集云胸中氣不交也少陰經至胸中交於厥陰水火相搏而有聲故也導氣保命集治咳逆如聖加枳實湯汗下後喘氣而咳逆如聖加人參藿香杏仁湯世俗用橘皮半夏湯清利少陰下利咳而嘔渴心煩不得眠豬苓湯有熱而咳逆脈洪大乃火熱奔心上行肺不得納故也甘草瀉心湯溫胃寒咳逆先服理中湯次服旋覆代赭石湯水寒相搏小青龍去麻黃加附子脈微細咳逆者胃寒橘皮乾姜半夏生薑湯羌活附子湯下少陰失下咳逆大便實小承氣湯便軟瀉心湯傷寒謂陰陽氣欲作汗升之不上降之不下故為咳逆劫總録治嘔吐噦咳逆通正散柿蒂湯嗅法藥無效以硫黃乳香等分為末酒煎急令患人嗅之灸法期門二穴嘔吐噦乾嘔嘔者聲物俱出者也吐者無聲而但出物者也仲景復言乾嘔以別之則嘔為有物明矣干猶空也但空嘔而無所出耳然嘔吐俱有物出較之重輕則嘔甚於吐也蓋表邪傳裡裡氣上逆故嘔吐而水穀不下也嘔吐有四證不可不辨有胃熱脈弦數口苦煩渴有胃寒脈弦遲逆冷不食小便利有水氣先渴後嘔膈間怔忡有膿血喉中腥奔逆上衝不須治之嘔膿儘自愈大抵寒邪半表半裡則多嘔吐及其裡熱而嘔吐者亦有之故經曰嘔多雖有陽明證不可攻之為其氣逆未收斂為實也若嘔而脈弱小便復利身熱而見厥者難治以其虛寒甚也噦則乾嘔之甚者有聲出而無物出也亦因胃氣本虛汗下太過亦有熱氣壅鬱上下氣不得通而噦者輕則和解之通利之甚則溫散之小便不通腹滿而噦者不治發汗太陽陽明合病當自利之若不利但嘔葛根加半夏湯和解半表半裡證多嘔小柴胡湯胸中有熱胃中有邪氣陰陽不交腹中痛欲嘔吐者黃連湯黃芩加半夏生薑湯以升降陰陽三陽發熱而嘔吐俱用小柴胡湯分利中風發熱六七日不解而煩渴欲飲水水入即吐名水逆五苓散先渴後嘔為水停心下亦茯苓湯先嘔後渴此為欲解當與水解凡嘔而渴者豬苓湯五苓散清熱有虛熱少氣氣逆欲吐竹葉石膏湯活人書治瘥後有餘熱在胃脘而嘔者竹葉加生薑汁湯嘔而思水者急與豬苓湯溫膈上有寒及寒厥或嘔不渴乾薑附子湯乾嘔吐涎沫頭痛吳茱萸湯嘔吐手足冷小橘皮湯寒多而嘔吐理中湯不飲水而吐理中湯去朮加生薑胸中似嘔無奈者生薑汁半夏湯曾經汗下關脈遲胃中虛冷而吐乾薑黃連黃芩人參湯少陰吐者真武去附子加生薑諸嘔吐食不下小半夏湯下乾嘔短氣汗出不惡寒者表解里未和十棗湯吐逆大小便不通厥逆無脈大承氣湯嘔而不止發熱柴胡證具心下急鬱郁微煩大柴胡湯千金方云生薑治嘔吐之聖藥乾嘔乾嘔者嘔而無物出也大抵熱在胃脘與穀氣並熱氣上熏心下兀兀欲吐不吐故有此證傷寒表不解而心下有水氣乾嘔身熱微喘或自利小青龍湯不發熱不惡寒肋痛乾嘔者十棗湯自汗頭痛乾嘔桂枝湯乾嘔吐涎沫頭痛吳茱萸湯得陽反劇者小柴胡湯乾嘔自利黃芩半夏生薑湯裡寒外熱脈微欲絶乾嘔通脈四逆湯噦金匱要略曰噦逆者橘皮竹茹湯嘔噦手足冷厥小橘皮湯若胸滿虛煩大橘皮湯胃氣寒者溫中湯理中湯吳茱萸湯噦不止者橘皮乾薑湯半夏生薑湯咳嗽咳謂有聲而無痰嗽謂有痰而無聲咳嗽則有聲而有痰者也肺為邪所乘氣逆而不下也故令咳嗽有肺寒而嗽者有肺熱而嗽者有停飲而嗽者有邪在半表半裡而嗽者治各不同陶氏謂水咳有證不可不辨水與表寒相合而咳用小青龍湯汗之水與裡寒相合而咳真武湯溫之里病合水動肺而咳十棗湯下之發表太陽證罷表未解心下有水氣乾嘔發熱而咳小青龍湯太陽發熱而咳嗽方同上太陽發熱嘔噦而咳小柴胡湯少陽寒熱往來而咳嗽胸脅滿或泄利小柴胡去棗參加五味子乾薑湯咳嗽潮熱腹滿脈微弦而浮脅痛鼻乾不得汗嗜臥小便難陽明中風也小柴胡湯導痰其人素有痰證看熱濕風火宜兼治之咳嗽有痰大半夏湯療春冬傷寒秋夏傷冷濕咳嗽喉中鳴上氣不得下橘皮湯溫經少陰咳嗽真武湯少陰或咳或悸小便不利四逆散少陰病腹痛小便不利四肢沉重而咳嗽者此人有水氣真武湯加五味子細辛乾薑少陰四肢厥逆腹中痛或溏泄而咳嗽四逆散加五味子乾薑喘傷寒發喘有邪在表者有邪在裡者有水氣者在表者心腹濡而不堅外證無汗法當汗之在裡者心腹脹滿外證有汗法當下之水氣而喘心下忪忡法當以青龍湯主之至若直視譫語喘滿者死汗出發潤喘不休者此為肺絶死身汗如油而喘不休為命絶死發汗太陽病無汗而喘麻黃湯太陽陽明合病胸滿而喘麻黃湯邪氣外盛壅遏使氣不利而喘者雖汗而喘不已見其邪氣在表也雖經汗下宜發之麻黃杏子石膏湯誤下太陽利不止脈促喘而有汗葛根黃連黃芩湯太陽汗後飲水多而水停心下小青龍去麻黃加杏仁小腹滿加茯苓解肌太陽下之微喘表未解桂枝湯加厚朴杏子湯分利水停心下腎氣乘心為悸為喘五苓散溫直指方云陰證喘則必促脈伏而逆反陰丹理中湯四逆湯陰毒喘促來蘇丹下喘而腹滿有潮熱者此為欲解喘而氣促短腹滿大柴胡湯小承氣湯兼結胸者陷胸湯灸寒邪下陷喘而咳者灸肺俞煩躁傷寒煩躁者煩為擾擾而煩躁為憤躁之躁合而言之煩躁為熱也有陰陽虛實之別焉心熱則煩陽實陰虛腎熱則躁陰實陽虛煩為熱輕躁為熱甚有先煩而後躁有先躁而後煩有邪在表而煩躁者有邪在裡而煩躁者有不煩便作躁悶者此則陰盛隔陽也如此者證之常也其或結胸證悉具煩躁者死發熱下利厥逆煩躁不得臥者死少陰病煩躁吐利四肢逆者死少陰病五六日自利復煩躁不得臥者死解表太陽中風脈浮緊發熱惡寒身痛不汗而煩躁大青龍湯得病三四日脈弱無太陽證柴胡湯分利煩躁消渴辰砂五苓散下利咳而嘔煩躁不臥豬苓湯和下利咽痛胸滿而煩豬膚湯自汗心煩小便多芍藥甘草湯少陰心煩不臥黃連雞子湯雞清散溫陰盛而煩躁少陰病吐利手足厥冷煩躁欲死者吳茱萸湯外臺云陰躁欲坐井水中宜熱藥溫之下之後復發汗晝而煩躁不得眠夜而安靜不渴無熱證乾薑附子湯陰盛發躁名陰躁四逆湯六七日無大熱陰盛隔陽身冷脈細煩躁不飲水霹靂散欲飲水者不可與灸傷寒六七日脈微細手足厥冷而煩躁灸厥陰懊憹懊為煩惱憹為鬱悶之貌即心下煩惱鬱郁然不舒憤憤然無奈心中不安比之煩躁而甚者也有自下後表中陽乘虛入內陷鬱結不散伏於心胸之間宜吐之正所謂木鬱達之之意經曰表未解反下之胃中虛空客氣衝上飢不思食而為懊憹由此觀之皆下早所致邪結心胸大小便不利熱結胃中有燥糞此為實懊憹可下之吐陽明脈浮緊咽燥腹滿而喘發熱汗出惡熱心中懊憹舌上胎者梔子豉湯發汗吐下之後虛煩不得眠甚則反覆顛倒心中懊憹梔子豉湯下陽明病下之後懊憹而煩中有燥糞承氣湯短氣煩躁咽硬胸中懊憹大陷胸湯陽明無汗小便不利心中懊憹者必發黃茵陳蒿湯驚惕傷寒驚惕者心中惕惕然而不安也或因下吐或因溫針或因火劫鎮定與悸證同涼心心神煩亂怔忡兀兀欲吐氣亂而熱似懊憹狀硃砂安神丸和解傷寒八九日下之胸滿驚惕小便不利譫語一身盡痛不可轉側而煩者陽熱客於胸中也驚者心惡熱而神不守也便不利津液不行裡虛也譫語身痛不營於表也柴胡龍骨牡蠣湯戰栗傷寒戰栗為病欲解也戰者正氣勝栗者邪氣勝也陰陽爭戰故為之搖也邪氣外與正氣爭則為戰邪氣內與正氣爭則為栗戰得汗而解栗則不戰而但鼓頷遂成寒逆多不得解以陰氣內盛陽虛不勝故也惟正氣將實邪氣欲出其人本虛邪正相爭微而振動而作戰為正勝邪故欲解也溫栗而不戰陰氣內熱正不勝邪姜附四逆湯桂苓白朮甘草湯韓氏治下汗後戰救逆湯微減與羊肉湯再投而戰解振傷寒振者森然欲寒聳然欲動是也近乎戰也皆責其虛寒下後復發汗必振寒表裡俱虛也亡血家發汗寒栗而振者血氣俱虛也其振欲仆地有身為之振搖者皆發汗過多亡陽經虛不能自主持故身振搖也溫太陽病發汗後不解其人仍發熱心下悸頭眩心瞤動振欲劈地真武湯吐下后里虛氣上逆眩脈沉緊身為振搖者茯苓桂枝白朮甘草湯小建中湯悸傷寒悸者心中築築然動怔仲不能自安者也其證有二為氣虛為停飲其氣虛者陽氣內弱心中空虛正氣內動而為悸也其停飲者由飲水過多停留心下心火畏水不能自安而為悸也又有汗下之後正氣內虛亦令人悸與氣虛而悸者則有甚也治停飲而悸必分水氣雖有餘邪亦先治悸免致水氣散走而為他證也活人書云悸有八九證皆屬三陽和解飲水多而心下悸雖有他邪亦先治水恐水溢為喘為腫為咳為噦為利也茯苓甘草湯往來寒熱心下悸小便不利心煩喜嘔小柴胡湯少陽發汗譫語悸動小柴胡湯溫少陰病四逆心下悸四逆散加桂汗後臍下悸又作奔豚茯苓桂甘大棗湯補中虛則心下悸脈結代心悸動炙甘草湯傷寒三四日心下悸而煩小建中湯發汗過多其人胸中陽氣不足心下悸欲得按者桂枝甘草湯汗多怔仲不定益榮湯養心湯心神不寧怔仲不得眠安神丸鎮固脈浮因火逼劫之驚狂臥起不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯所以固陽收脫鎮其浮氣也渴傷寒發渴大率有二一則熱盛於內津液為熱所耗故令渴也二則汗利過多耗奪津液亦令渴也蓋傷寒在表不甚作渴六七日傳至厥陰為消渴者渴飲水多而小便少乃熱能消水也朱氏曰脈浮而渴屬太陽有汗而渴屬陽明自利而渴屬少陰至於厥陰則熱之極矣太陽無汗而渴忌白虎宜柴胡陽明多汗而渴戒五苓宜竹葉石膏湯若先嘔後渴則為欲解當與水飲之和解太陽脈弦而渴熱在半表裡小柴胡湯加天花粉太陽表不解心下有水氣渴者小青龍湯去半夏加栝蔞湯脅下滿手足溫而渴者小柴胡去半夏加人參天花粉湯厥陰病消渴氣上衝心疼熱茯苓白朮甘草桂四物湯汗下後往來寒熱胸脅滿小便不利頭汗心煩渴而不嘔柴胡桂枝幹薑湯解肌生津太陽脈浮必用桂枝脈浮發熱渴欲飲水小便不利豬苓湯少陰下利咳而嘔渴煩不得眠豬苓湯汗多不可服汗吐下後六七日不解表裡俱熱惡風大渴舌上乾燥欲飲水白虎加人參湯太陽服桂枝湯大汗出煩渴中暍手足冷汗出煩渴四肢不收汗後脈供大而渴陽明脈長有汗發熱而渴並用白虎加人參湯夏至左右虛煩而渴發熱不惡寒竹葉石膏湯分利小便不利而渴必發黃茵陳五苓散汗後脈浮煩渴者五苓散辰砂天水散與水厥陰脈微欲飲水宜少少與之渴而常飲勿極意也溫少陰自利而渴小便清利下焦虛寒也甘草乾薑湯心煩但欲寐或自利而渴屬少陰理中湯活人書云少陰自利而渴白通湯加豬膽汁通脈四逆湯真武湯下陽明脈長而實有汗而渴調胃承氣湯脈沉滑熱實煩燥而渴大陷胸湯厥陰證煩滿囊縮大小便不通發熱引飲尺寸脈俱微緩直指云厥陰屬肝心之母也裡熱已極子乘母氣挾心火以為煩煩消渴之兆也口燥咽乾口燥咽乾緣邪熱聚於胃府津液枯燥作渴不可輕於發汗和解少陽邪在中焦口苦舌乾不甚渴脈弦者小柴胡湯少陽脈弦寒熱往來而嘔口燥咽乾方同上清熱涼胃口乾少津液脈浮緊微數白虎加人參湯陽明無大熱背微惡寒口燥咽乾煩渴方同上下少陰病得之二三日口燥咽乾急下之大承氣湯此熱在下焦消鑠腎水下之不可緩也漱水不欲咽此證屬陽明凡內有熱者欲飲水令欲漱水而不欲咽是熱在經里無熱也陽明氣血俱多經中熱甚迫血妄行故知必作衄也凡傷寒脈浮鼻中燥口燥但欲漱水不欲咽者是欲衄也亦有瘀血漱水者清熱涼血陽明身熱頭痛脈微漱水不欲咽必發衄犀角地黃湯不止茅花湯逐血外證無寒熱漱水不欲咽必發狂此瘀血停留也桃仁承氣湯甚者抵當湯下盡黑物為度發狂傷寒熱毒在胃併入於心遂使神不寧而志不定也故發狂始則少臥不飢妄語妄笑甚則登高而歌棄衣而走逾垣上屋皆獨陽亢極熱之所致非大下之不能止也亦有當汗不汗瘀熱在下焦蓄血小便不利而發狂也其或狂言直視便溺自遺其與汗後脈燥大熱狂言不食者難治解散太陽不解熱結膀胱其人如狂血自下者愈外不解者桂枝湯病熱六七日未得汗脈洪脈數面赤目脹身體大熱煩躁狂言欲走葶藶苦酒湯梔子仁湯陽毒發狂斑爛譫語升麻湯又有火劫驚狂謂之火邪其人亡陽煩躁臥起不安金匱風引湯柴胡湯加龍骨牡蠣火劫因用火逼病人劫出其汗故當亡陽驚狂不安也清熱三陽熱極脈大身熱渴而狂者黃連解毒湯不已用承氣吐下後及虛人未解者人參白虎湯加辰砂清其浮火直指方用寒水石黃連末各一錢冷水調治陽狂龍膽草一物湯陽毒發狂眼珠如火脈洪大渴三黃石膏湯下蓄血血逆則喜忘血下蓄則內爭其人如狂輕者犀角地黃湯甚者抵當湯蓄血發狂者以熱在下焦少腹硬小便自利必下血乃愈抵當湯脈弦而長調胃承氣湯脈沉實者有表證大柴胡湯小腹結急者桃仁承氣湯無求子云胸滿唇痿舌青口燥但漱水不欲咽無裡熱里有瘀血必發狂也犀角地黃湯加芍藥壯陰陽氣獨勝陰氣暴絶發狂躁妄言面赤咽痛發斑或下利赤黃脈洪實或滑促宜酸苦之藥收陰抑陽令陰氣復大汗解矣葶藶苦酒生艾湯譫語傷寒熱盛則譫語胃中實熱上乘於心心為熱冒則神識昏迷妄有所見而言也輕則睡中呢喃重則不睡亦語有譫語者有獨語者有言語不休者有言亂者此數者可見熱之輕重也大抵熱入於胃水涸糞結必發譫語為實也有被火劫取汗而譫語者有亡陽譫語者有下利清穀不渴譫語者為虛也脈來沉實洪數有力大便不通小水赤燥而渴譫語狂妄腹中滿硬痛或虛熱汗自出或下利純清水心腹硬痛者皆里證邪熱燥糞也宜下之或氣上逆而喘滿或清氣下奪而自利者皆逆也經曰直視譫語喘滿者死下利者亦死謂其正氣脫絶也譫語身微熱脈浮大者生逆冷脈沉細不過一日死和解已發汗身和譫語柴胡桂枝湯婦人經水適來熱入血室譫語者小柴胡湯清熱譫語不惡寒反惡熱白虎湯煩躁不眠白虎加梔子湯三陽合病腹滿身重難以轉側口中不仁面垢譫語遺尿脈滑實不可下白虎湯腹滿微喘口乾咽爛或不大便久則譫語是因火劫所致亦用白虎湯溫亦有陽虛陰盛而譫妄脈沉細弱者當溫經助陽下身熱汗出胃實譫語或下利而譫語調胃承氣湯大小承氣湯凡下利譫語必有燥糞而脈實當下之譫語小便利大便實小腹滿手不可近為瘀血抵當湯晝夜譫語喜忘婦人經水適來為熱入血室方同上針法服湯遲熱入胃中津液燥上焦不榮成血結胸狀當刺期門鄭聲傷寒鄭聲者為其聲之不正也語曰鄭聲淫是也又為重語也因汗後病人本音失正為正氣虛而不全故便轉聲而不正也如大小便利不渴手足冷脈微細弱者是也當從助陽扶正者多和解則同譫語之例也鄭聲其脈微自利厥逆白通湯霍亂吐瀉傷寒霍亂者因其飲食邪氣所傷胃府陰陽乖隔遂上吐而下利揮霍而撩亂也邪在上焦吐而不利邪在下焦利而不吐邪在中焦既吐且利乃謂之霍亂但稱吐利是以有異也凡霍亂而吐利死者少乾霍亂不吐利死者多若上不得吐下不得泄所以邪氣不得發泄正氣不通陰陽隔絶而不可治故多死也故霍亂之證多伏熱邪食積所傷脈雖沉手足雖厥不可峻用熱藥附子之劑惟以正氣理中為止若煩渴而躁當以五苓分利之劑守真氏用益元散亦此義也和解通用霍香正氣散霍亂吐瀉潮熱者小柴胡湯汗後霍亂身體重者桂枝湯風寒暑濕邪自外入除濕湯清利吐利大渴煩躁冷汗出兩腳轉筋尺脈遲沉手足微厥宜清暑益氣湯白虎加人參湯霍亂吐利熱多渴欲飲水五苓散溫腹痛四肢拘急吐利轉筋者理中湯寒多不渴者理中丸治中湯四順附子湯吐利轉筋入腹者雞矢白湯脈微緩四肢冷建中湯脈沉細四君子湯加芍藥生薑吐利止汗出而厥不飲水四肢拘緊脈微欲絶通脈四逆湯加豬膽汁自利傷寒自利表邪傳裡裡虛協熱則自下利又有不應下而便攻之內虛協熱亦為自利要當別其陰陽三陽自利身熱太陽下利手足溫少陰厥陰下利身涼無熱此大概也若自利清穀不渴小便色白微寒厥冷皆寒證也渴欲飲水二便黃赤發熱後重皆熱證也自利身涼脈小為順身熱脈大為逆三陽合病必自下利於陽明少陽合病為甚重陽明為土少陽為木二氣不和若陽明勝則脈長利土胃實則生少陽勝則脈弦土被木賊為死名曰負大抵自利者不可發汗邪氣內攻復泄其津液胃氣轉虛必成脹滿自利不止手足厥灸之不溫脈不回者死少陰自利煩躁不得臥者死和解太陽與陽明合病必自下利葛根湯嘔者加半夏或升麻葛根湯太陽與少陽合病自利黃芩湯清利自利而渴屬少陰白虎湯黃連阿膠散脈浮大而長千金葛根黃芩黃連湯協熱自利白頭翁湯自利下血柏皮湯少陰腎虛客熱下利咽痛胸滿心煩者豬膚湯協熱自利臍下必熱白頭翁湯赤石脂丸溫毒下利膿血桃花湯下後脈數不解自利不止必協熱當便膿血若此者俱犀角地黃湯溫自利不渴屬太陰理中丸自利清穀脈微此為寒少陰證溫中白通湯四逆湯自利腹寒而痛手足冷理中湯吳茱萸湯澀自利不止裡寒而下脫桃花湯赤石脂禹餘糧湯如腸滑洞泄便溺遺矢薛氏朱雀湯灸下利不止脈微手足厥灸氣海少陰吐利手足不冷反發熱脈不至灸少陰太溪穴熱入血室衝脈為血海即血室也男女皆有此血氣亦有此衝脈非獨婦人男子由陽明而傷女子則隨經而入男子則下血譫語婦人則月水適來皆以經氣所虛宮室不闢邪得乘虛而入血自下即愈和解婦人傷寒經水適來得之七八日晝則明瞭暮則譫語如見鬼狀此熱入血室也其血必結聚寒熱如瘧小柴胡湯許氏加生地黃保命集加牡丹皮元戎方先服小柴胡湯次以四物湯柴物湯更妙溫保命集表虛自汗身涼拘急脈沉而遲桂枝加附子紅花湯發熱惡寒經水凝滯桂枝加紅花湯下大實滿桃仁承氣湯少腹滿小便和抵當湯針期門穴昔許學士醫一人傷寒熱入血室學士曰此非湯藥可愈宜用刺期門出血豫不用針求善針者至指而刺之遂愈鬱冒傷寒鬱冒是表裡俱虛乘寒所致郁為鬱結氣不舒冒為昏冒為神不清謂之昏迷是也昏冒家汗出自愈所以然者汗出而和也少陰下利止而欲眩時時自冒者死不治謂虛極而脫也漬形為汗太陽病下先誤之而不止因復發汗以此表裡俱虛故致鬱冒汗出自愈表和也溫吐下後極虛復發汗又與水因得噦而冒理中湯下有熱而怫鬱或不得臥有燥糞調胃承氣湯針太陽少陽並病頭痛冒悶如結胸狀刺大椎一間瘛瘲傷寒瘛瘲病至於危也緣熱極而生風風主乎動故瘛則筋急而縮瘲則筋脈緩而伸或縮成伸動而不定故曰瘛瘲俗謂之搐是也邪氣熱極而然也熱盛則風搏風主乎動並撩經絡故四肢瘛瘲而不寧也經曰傷寒瘛瘲絶汗乃出如貫珠不流又有四肢動而不止似瘛而無力不得伸縮者此為肝絶也發散或汗不流是汗出時蓋覆不周故腰背手足搐搦牛蒡根兩解疏風滌熱防風通聖散因於血弱不能養筋者大秦艽湯動氣動氣者乃臟氣不調在肌膚間築築跳動隨臟所主而形見於臍之左右上下者也難經腎臟載之有真氣內虛水結不散氣與相搏則發奔豚以其從氣之衝突如豚之奔皆不宜汗下然而濁不言當臍之有動者脾為中州以行四臟之津液妄施汗下必先動脾是以不言而喻也左右上下不宜汗下何況中州之氣其敢輕動之乎傷寒所以看外證為要若有動氣不可輕易汗下此證不在脈之可見但憑外證須問而知或手探而得行氣散熱傷寒汗下後臍四旁有動氣保命四氣散剛痓柔痓傷寒痓病屬太陽經太陽中風重感寒濕而致痓也大發濕家汗則成痓新産血虛汗出傷風亦作痓證傷寒頭痛常自汗出而嘔若欲汗之必發痓經曰身熱足寒頭項強急惡寒時時頭熱面赤惡寒背反張口噤脈沉細如發癇狀是為痓也仰目是陽痓合目是陰痓無汗先譫語者發剛痓有汗先厥逆者發柔痓陽痓易瘥陰痓難愈治例云發熱惡寒無汗為剛痓發熱不惡寒有汗為柔痓二痓兼治通用小續命湯痓脈沉弦而遲或帶緊或散於指外皆惡候也二痓通治小續命煬剛痓為陽去附子柔痓為陰去麻黃剛痓發熱惡寒無汗葛根湯麻黃葛根湯麻黃獨活防風湯柔痓發熱不惡寒有汗桂枝葛根湯桂枝栝蔞葛根湯桂枝川芎防風湯溫陰痓厥逆筋脈拘急汗出不止桂心白朮散項強頭搖口噤附子散閉目閣眼附子防風散下胸滿口噤臥不著席咬牙足攣急此剛痓大承氣湯次用續命湯調理分利頭項強小腹滿小便不利五苓散疏風養血防風當歸散厥證傷寒厥證手足厥冷是也陽氣伏藏陰氣越出陰陽不相接順所以厥也陽氣內陷熱氣逆伏而手足厥冷也先熱而後厥者熱伏於內也先厥而後熱者陰退而陽氣得復也始得便厥者是陽氣不足而陰氣勝也大抵厥逆為陰所主寒者多若發熱七八日身冷此名臟厥難治有冷厥有熱厥若未辨陰陽且與四順丸試之直指云厥證未辨疑似且與理中丸試之陽厥則有熱陰厥則無熱此可明矣厥為陰之盛也若更加之惡寒而蜷者陰氣之極也初厥脈遲沉而弱下利清穀或惡寒蜷臥煩躁不利手足厥冷不知人皆為惡候難治溫病四肢逆冷脈沉而細足蜷臥而惡寒引衣自覆不飲水下利清穀而厥者陰厥也四逆湯厥逆脈不至者通脈四逆湯寒厥脈伏接遲弱陰氣勝陽不得復厥多熱少理中湯手足指頭微冷謂之清方同上寒熱而厥面色不澤昏昧當用錦衣包手足溫必大汗而解也急服五味子湯少陰病吐利手足厥冷煩躁欲死者吳茱萸湯無熱而厥當歸四逆湯加吳茱萸生薑白通湯附子湯隨宜選用補厥而有熱者黃耆人參建中湯熱厥必四五日才發半日之間熱復來也發熱日多厥者少病自愈外證多昏憒脈雖伏按之數而有力治法兼下解例中用清解厥而渴者白虎湯寒熱而厥面色不澤冒悶兩手忽無脈或一手無脈必是有正汗也麻黃桂枝各半湯厥而心下悸先治其水茯苓甘草湯厥而惡熱不眠譫語白虎湯吐諸陽受氣於胸邪氣留客則陽氣不得敷施而手足為之厥脈乍緊心中滿而煩飢不能食病本在胸中當吐之瓜蒂散下先發熱而後厥者揚手擲足煩躁飲水畏熱頭汗大便祕小便赤怫鬱昏憒當下失下氣血不通所謂熱深厥亦深也大柴胡湯小承氣湯厥而脈沉滑頭面有汗指甲爪溫皆陽實伏熱在內也大小調胃承氣等湯灸脈促寒厥灸太溪四逆手足不溫謂之四逆邪在表則手足熱邪在表裡之間則手足溫至於邪傳少陰則手足有厥冷之證與厥陰又相遠也此少陰證雖未至厥而手足加之不溫是四逆也若傳至厥陰則手足冷而為厥矣然自熱而至厥傳經之邪四逆散主之非若得病手足便逆而不溫者四逆湯主之溫之則為陰經受邪而陽氣不足也經曰諸四逆見吐利煩躁者不治和少陰病四逆或咳或悸或小便不利或腹中痛滿或利下重並用四逆散溫初病以來四肢厥逆即四逆湯陰病下利清穀裡寒外熱手足厥逆脈微欲絶者身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者此陰盛於內不相通也通脈四逆湯下手足逆冷大便祕小便赤或大便黑燥脈沉而滑此為陽證白虎湯甚者大承氣湯尉法同陰證例搖頭傷寒至於搖頭病之危極者也為榮衛絶陰陽竭必死有里痛所致有卒口噤背反張獨搖頭者痓病風主動然也至於陽反獨留形體如煙直視搖頭者為心絶也頭眩頭眩半表半裡之間表邪傳裡表中陽虛故頭眩又有汗下後而眩冒者亦陽虛所致太陽少陽合病故頭眩責其虛也少陰下利止時時眩冒此虛極而脫也風家亦有眩冒風主動故也針經云上虛則眩下虛則厥陽明病頭眩不惡寒能食而咳其人必咽痛陽明中風亦頭眩諸如此者皆非逆也其諸逆者發汗劇言亂目眩者死也和解傷寒邪居半表半裡表中陽虛故時時目眩也葛根湯風家多頭眩亦宜解肌方同上少陽病口苦咽乾目眩小柴胡湯陽明病但頭眩不惡寒能食而咳茯苓白朮甘草乾薑湯太陽病若下之更復發汗以此表裡俱虛其入必眩冒冒家汗自出而愈溫太陽病發汗汗不止眩冒身瞤動振振欲劈地真武湯吹鼻暈眩鼻塞而煩此頭中寒濕宜瓜蒂散吹之取下濕水而愈衄血傷寒衄者經絡熱盛迫血妄行出於鼻者為衄也責其熱在表也陽盛則欲衄雜病衄者責其熱在裡也又有不應發汗而強汗之因致衄者雖然傷寒甚邪猶在經然亦不可發汗雖仲景以桂枝麻黃治衄非治衄也欲散其經中邪氣耳傷寒脈浮口鼻燥但欲漱水不欲咽是欲衄也陽明病口鼻乾燥而能食則衄也傷寒病煩目瞑劇者必衄衄為欲解太陽發熱脈浮緊身無汗自衄者愈若愈衄不止頭汗出身無汗及發熱汗不至足者死發散傷寒脈浮緊不發汗因致衄者再與麻黃湯有汗脈浮緩而衄再與桂枝湯二方蓋為脈浮而設發散經中邪氣須是的當方可用之經曰奪血者無汗若再汗之是重虛也奪汗者無血俗以血為紅汗蓋有旨也若衄成流者不服藥能自止也若點滴者須是藥止衄家不可大汗汗之則額上陷脈緊急直視不能胸不得眠不可不慎涼血太陽病衄血及服桂枝後衄者為欲解也犀角地黃湯凡傷寒及瘟家應發汗而失之熱蘊於經而為衄血及吐血者俱用前方及黃芩芍藥湯不止用茅花湯脈浮大發熱下利鼻衄乾嘔者黃芩芍藥湯清利衄煩而渴欲飲水水入即吐者先服五苓散次服竹葉石膏湯升發不因下而自利加衄者麻黃升麻湯溫鎮傷寒少陰病但厥無汗而強發之必動其血或從口鼻或從目出是名下厥上竭為難治當歸四逆湯黑錫丹水貼汗後熱退血不止用新汲井水以草紙數層濕透貼於頂上及項脊上溫則易之必止吐血諸陽受邪其邪在表當汗不汗致使血毒入臟積瘀於內遂成吐血是經絡熱盛陽氣壅迫血熱妄行其人發躁必吐血也涼血服桂枝湯後吐血者犀角地黃湯黃芩湯柏枝湯芍藥地黃湯凡吐血鮮紅皆是熱也宜涼之凡吐血紫黑成塊而脈遲細為瘀血而寒凝也宜肉桂丹皮乾薑之辛散而行之諸書有載用溫熱藥亦特過矣凡失血病多為火載血液妄行其為寒者千百之一二也附子輩詎可輕用正如烈火何可益以硝黃少有差失遂至不救可不慎哉下當汗不汗熱毒深入故吐血瘀血甚者抵當丸脈實者桃仁承氣湯三黃瀉心湯大黃散蓄血蓄血者血在下焦結聚而不行蓄積而不散者是也又云熱毒流於下而成瘀血謂之蓄血此由太陽隨經瘀熱在裡血為熱所搏結而不行蓄於下焦之所致小腹覺有硬滿小便自利者是也年高人小便不利者韓祇和以嚏法通之解太陽病不解熱結膀胱發狂血自下桂枝湯清陽證溢血當清之涼血地黃湯下熱在下焦少腹滿小便自利其人如狂桃仁承氣湯抵當湯輕者犀角地黃湯溫陰證下血如豚肝當溫之芎歸白朮湯下血衝脈為血之海所謂血室是也男女各有此血氣亦各有此衝脈也衝脈得熱血必妄行男子則為下血譫語婦人則為寒熱似瘧皆為熱入血室迫血下行則為血協熱下利也有謂下焦虛寒腸胃不固清濁不分而便下膿血是則濕熱為病亦可通謂寒也和解太陽病不解其人如狂熱結膀胱而血自下者愈若不瘥桂枝湯小腹硬滿抵當湯陽明病下血譫語胸脅滿如結胸夜則見鬼此為熱入血室小柴胡湯涼血少陰下血桃花湯腹滿身熱下膿血如魚腦曰濕毒同上黃連阿膠湯地榆散下下後無表裡證脈數不解消穀易飢大便祕此為瘀血桃仁承氣湯抵當湯或小柴胡湯加桃仁大黃效下焦蓄血其人狂小腹急便利抵當湯大便不利大便不利者謂大便難也皆因發汗利小水耗其津液以致腸胃乾燥而轉屬陽明裡證者多矣其小便自數者則為津液偏勝故使大便亦難也若下若發汗小便數大便硬者為津液內竭也若脈浮脈虛惡寒猶帶表邪不可便下其嘔吐者為邪未入府雖有陽明證不可攻下小便清者知邪不在裡仍在表也陽明自汗或已發汗小便自利不大便者亦為津液內竭宜蜜煎法導通之汗有表證小便難大便不利有津液可作汗小便縮不可誤下汗煩臥不著席梔子湯五苓散得汗而解和解陽結證能食不大便或頭汗出惡寒手足冷或心下滿不食大便硬不可下用沖和湯作汗小柴胡湯吐三下不通不可太攻當上吐以提之下經曰其脈浮而數能食不大便此為實名曰陽結大柴胡湯若不了了得糞而解其脈沉而遲不能食身體重大便反硬名曰陰結金液丹傷寒六七日不大便有熱頭痛小承氣湯六七日不大便繞臍湧煩躁發作有時此為糞硬方同上少陰六七日腹脹不大便急下之大承氣湯潮熱大便結陽盛陰虛下證已具調胃承氣湯大柴胡湯溫陰結者金液丹難知厚朴湯臟結而厥四逆湯極冷服之熏浴虛者用皂角燒煙燻大便即通棕櫚皮煎湯坐盆中浴之亦謂外迎導法蜜煎導豬膽汁導尉法服藥不通速以鹽炒熱布裹尉臍下須臾即通若臍下冷結不通不可便尉冷散攻心必死須先服理中湯乃可尉
