濕氣在上也瓜蒂一株為末不許吹入鼻中清水徐徐出一晝夜濕盡痛止良方丁香散治頭痛不止丁香一錢白芷半兩瓜蒂一兩上為細末用半字吹入鼻即瘥數貼頭痛頭風諸藥急風散治男婦偏正頭痛夾腦頭風太陽穴痛坐臥不安生川烏去皮臍辰砂研各一兩南星洗二兩上為細末酒調塗貼痛處小兒貼囟門良方止痛太陽丹大天南星川芎各等分上為細末用連須蔥白同搗爛作餅貼於太陽痛處乳香餅治氣攻頭痛不可忍者乳香一錢萆麻子十四粒上同搗爛作餅貼太陽穴上如痛定急去之解開頭髮出氣決明散治頭痛決明子為末水調貼太陽穴一方用決明築枕去頭風明目烏麥餅子治久病頭痛諸藥不效烏麥面半斤吳茱萸二兩為末和勾淨水調作餅子入𨫼上𨫼熟乘熱分頭髮蓋在頭上如帽子外以厚帛包裹定一時熱氣入腦而痛即止冷則去之未愈更換熱者無不愈也枕頭方治頭風頭痛百藥不效者食茱萸葉細銼灑酒拌勻以絹袋盛之於甑中蒸熟乘熱分作二包更換枕頭以效為度顏思退方治頭風掣痛黃臘二斤鹽半斤香油二兩上溶蠟入油鹽和勻捏作一兜盔樣可合腦大小蓋至額痛立止尉法治風頭痛雖重綿厚帛不能御風寒者艾葉揉如綿用帛夾住包頭上用尉斗尉艾使熱氣入內良久即愈正傳經驗方貼頭風熱痛朴硝大黃各等分上為細末用井底泥和作餅子貼兩太陽穴神效易簡諸方聖惠方治頭風痛每天陰風雨先發者用桂心一兩為末酒調如膏敷頂上並額角效兵部手集方治頭痛不可忍多是風痰所致梔子末和蜜濃噙舌上吐即止千金方治頭風痛大黑豆三升炒令無聲先要盛一斗二升瓶一隻盛九升清酒乘豆熱投於酒中蜜泥封之七日溫服一方凡飲酒頭痛以竹茹三兩水五升煮取三升去滓令冷破雞子三枚攪調更煮三沸飲之一方治頭項強不得仰視蒸大豆一升令變色納囊中枕之斗門方治卒頭痛白殭蠶炒去絲研為末以熱水調下二錢又方治偏頭風痛用雄黃細辛等分為末左邊痛嗅入右鼻右邊痛嗅入左鼻立效又方治痰厥頭痛用烏梅肉十個鹽二錢水一盞煎七分去滓無時溫服吐即佳又方治頭風痛惡寒用大附子一枚去皮臍緑豆一合同煮豆熟為度去附子服豆即瘥每個附子可煮五次後為末服之一方治偏頭痛用蓽茇為末令患人口噙水左邊痛左鼻吸一字右邊痛右鼻吸一字甚效一方治頭風旋用蟬蛻微炒為末每服一錢溫酒調下一方治頭風端午日採蒼耳二兩茵陳一兩甘草半兩為末每服三錢熱酒或茶調下一方治頭痛蒼耳川芎當歸等分為末每服三錢臨臥茶清調下灸法神庭穴在髮際前上五分灸三壯上星穴在髮際上一寸半灸三壯後頂百會風池以上諸穴隨灸一處可愈眩運門病機眩運敘論經曰諸風掉眩皆屬肝木又曰歲木太過風氣流行脾土受邪民病飧泄食減甚則忽忽善怒眩冒顛疾又云狥蒙招尤目瞑耳聾下實上虛過在足少陽厥陰甚則入肝眩運證乃風火之象原病式云諸風掉眩皆屬肝木風主動故也所謂風氣甚而頭目眩運者由風木旺必是金衰不能制木而木復生火火風皆屬陽陽主乎動兩動相搏則為之旋轉故火本動也焰得風則自然旋轉也眩運之證當分內外所因嚴用和云眩運之證雖六屬於肝風上攻所致然體虛之人外感六淫內傷七情皆能眩運當以脈證別之風則脈浮有汗項強不仁寒則脈緊無汗筋攣掣痛暑則脈虛煩悶濕則脈細沉重吐逆及其七情所感遂使臟氣不平鬱而生涎結而為飲隨氣上逆令人眩運眉稜骨痛眼不可開寸脈多沉此為異耳若疲勞過度下虛上實金瘡吐衄便利及婦人崩傷産後去血過多皆令人眩運當隨其所因而治之眩運之病三虛宜審肥人眩運氣虛有痰瘦人眩運血虛有火傷寒吐汗下後必是陽虛故針經云上虛則眩此三者責其虛也四氣眩運凡眩運挾風則有汗寒則掣痛暑則熱悶濕則重滯此四氣乘虛而眩運也七情鬱而生痰動火氣因上厥此七情致虛而眩運也淫欲過度腎家不能納氣歸元使諸氣逆奔而上此氣虛眩運也吐血或崩漏肝家不能收攝榮氣使諸血失道此血虛眩運也要尋致病之因隨機應變其間以墜鎮下行為最不可妄施汗下尋常眩運屬痰火者多丹溪曰痰在上火在下火炎上而動其痰也此病屬痰者多蓋無痰不能成眩運也雖有因風者亦必有痰也又曰火動其痰二陳湯加芩連蒼朮羌活挾氣血虛者亦以治痰為主兼補虛藥脈候左手脈緩而浮大者為風脈虛大必是久病左手脈數為熱多脈澀而芤有死血右手脈滑大為痰厥頭眩脈實為痰積治法張子和云夫頭風眩運手足麻痹胃脘痛皆風寒濕三氣雜至合而為痹也在上謂之停飲可用獨聖散吐之吐訖後服清上辛涼之藥凡眩運多年不已胸膈痰涎壅塞氣血頗實吐之甚效玉機微義云眩運一證人皆稱為上盛下虛所致而不明言其所以然之故夫所謂虛者氣血虛也所謂盛者痰涎風火也原病之由有氣虛者乃清氣不能上升或汗多亡陽當升陽補氣有血虛者乃因亡血過多陽無所附當益陰補血此皆不足之證有因痰涎郁遏者宜開痰導郁重則吐下有因風火所動者宜清上降火有因外感而得者嚴氏雖分四氣之異皆當散邪此皆有餘之證也鎮墜藥治眩運須識標本世有所謂氣不歸元而用丹藥鎮墜沉香降氣之法香燥散氣其不歸之氣豈能因此而復耶凡用鎮墜所謂急則治其標也若謂使氣歸元必無是理既曰歸元豈肯復作凡鎮墜少止又復作眩者此氣未歸元而未治其本也要氣歸元必求其本緩而圖之丹溪治法頭眩痰挾氣虛屬火治痰為主兼補氣藥如東垣半夏白朮天麻湯之類也眩運不可當者以大黃酒炒為末茶清調下即止或用黑錫丹鎮墜之皆急則治標也火動其痰及濕痰二陳湯加黃芩蒼朮羌活散風行濕早起眩運須臾自定日以為常者正元飲吞下黑錫丹傷濕頭運腎著湯加川芎名除濕湯疏風川芎茶調散有痰青州白丸子丹溪治一老婦患赤白帶下年半頭眩坐之不得睡之則安專治赤白帶帶愈其眩亦安春甫治一婦人忽眩倒不能動診其脈兩寸浮大而滑知風痰眩運而兼火也以半夏白朮天麻湯下滾痰丸一百粒即愈藥方眩運通用方劑半夏白朮天麻湯加味二陳湯川芎茶調散並見前風眩頭運劑愈風餅子治風邪眩運或先服吐藥後服此川芎川烏炮各半兩甘菊花白芷細辛防風荊芥羌活天麻甘草炙各一兩半薄荷一兩半上為末泡蒸餅捏作餅子每服三五餅細嚼茶湯任下本事川芎散治風眩頭運山茱萸肉一兩甘菊花人參芎藭山藥茯神各半兩為末每服二錢酒調下白附子丸治風痰眩運頭痛全蠍半兩炒白附子炮南星制半夏制旋覆花甘菊花天麻川芎橘紅殭蠶炒乾薑生各一兩上為末生薑半斤取汁打糊丸梧桐子大煎荊芥湯下五十丸芎菊散治諸陽受風頭目旋運目視昏暗肝氣不清芎藭甘菊花各一兩白殭蠶細辛防風羌活各三錢旋覆花草決明蟬蛻各一錢天麻密蒙花荊芥穗上為細末每服二錢水一盞煎七分食後溫服天麻羌活丸治頭目風眩邪氣鼓作或時旋運天麻羌活白芷藁本芎藭芍藥細辛麻黃各二兩牛黃另研麝香另研各一分上為細末煉蜜為丸皂角子大不拘時薄荷煎酒下三丸人參前胡湯治風痰頭運目眩人參八分前胡南星制半夏曲各一錢二分木香五分枳殼橘紅赤茯苓各一錢紫蘇甘草炙各七分水二盞姜五片煎一盞食後服風寒挾虛諸劑嚴氏三五七散治風寒入腦陽虛頭痛目眩轉運如在舟車之上耳內蟬鳴風寒濕痹腳氣緩弱天雄炮去皮臍細辛各三兩山茱萸肉乾薑炮各五兩防風山藥各七兩上為細末每服二錢食前溫酒調服人參湯治風虛眩運但覺屋地俱轉目不敢開人參白朮麥門冬當歸防風各兩獨活官桂黃耆芍藥各兩半上咀每服五錢水盞半煎八分食遠服白朮散治風邪在胃頭旋不止復加嘔逆白朮厚朴薑製甘菊花各半兩防風白芷人參各一兩上咀每服五錢水盞半姜五片煎八分食遠服蔓荊子散治風氣頭旋運悶起則欲倒蔓荊子甘菊花半夏羚羊角鎊枳殼茯神芎藭黃芩防風各七分麥門冬石膏各一錢地骨皮天麻細辛甘草各半兩上咀水二盞姜三片煎八分不拘時服芎藭散治風虛頭旋眼目昏痛眩運倦怠心忪芎藭前胡各一兩防風各半兩人參一兩蔓荊子天麻酒浸焙白殭蠶一兩炒上為細末每服二錢食後酒調服痰火眩運諸劑隱君滾痰丸治痰火頭眩目運如坐舟車胸滿背脹一服立止方見痰門防風通聖散治風熱眩運一服即愈方見風門芎犀丸治偏正頭痛及風眩目運一邊鼻不聞香臭常流清涕或作臭氣服芎蠍等藥不效者此藥不十服愈及治噴嚏稠濃川芎硃砂一兩為衣石膏研四兩冰片四錢人參茯苓甘草炙細辛各二兩犀角鎊梔子仁各一兩阿膠炒兩半麥門冬三兩上為末煉蜜丸彈子大硃砂為衣食後細嚼三丸茶酒任下祕方加味二陳湯治氣鬱痰火眩運陳皮半夏人參茯苓黃芩川芎各一錢甘草木香各五分磨汁上水二盞姜三片煎七分食後服嚴氏玉液湯治七情氣鬱生涎隨氣上逆頭目昏運心悸眉痛大半夏泡七次四錢沉香磨汁二匙生薑十片水煎溫服氣血虛眩諸劑一局方十全大補湯治氣血兩虛頭眩運痛方見虛損門茯神湯治七情所感氣血不足臟氣不行鬱而生涎結為痰飲留於心經則有怔忡四肢緩弱頭目眩運人參黃耆半夏麥門冬山藥前胡熟地黃各一錢枳殼一錢半遠志甘草水煮薑汁炒甘草炙各七分白茯苓茯神各二錢上作二服水盞半姜五片秫米一小撮煎一盞服鎮墜諸劑黑錫丹治陰陽不升降上盛下虛黑錫二兩炒末肉豆蔻附子炮去皮濟破故紙炒胡蘆巴官桂茴香各一兩青皮川楝子陽起石木香沉香各半兩上用新鐵銚內將錫化開下硫黃末提起以木杵擂極細投地上退火毒同餘藥研百至黑光色為度酒糊丸梧桐子大陰乾入布袋內擦亮空心姜鹽湯下四十丸女人艾葉湯下良方加烏藥磁石各半兩養正丹治上盛下虛眩運此藥升降陰陽及咳逆翻胃霍亂吐瀉硫黃黑錫水銀硃砂研各一兩先以硫黃為末將鉛入鐵銚內溶化傾出取淨錫一兩復化入硫末漸入漸攪為末再入水銀同擂如硬再火上微煅又擂勻放冷研極細末糯米糊丸緑豆大每服三十丸空心鹽湯下嚴氏沉香磁石丸治上盛下虛頭目眩運耳鳴耳聾沉香半兩研磁石煅七次醋淬研水飛巴戟胡蘆巴陽起石煅附子制川椒去目炒山茱萸肉山藥炒各一兩青鹽另研甘菊花蔓荊子各半兩上為細末酒煮米糊丸每服七十丸空心鹽湯下濕鬱眩運諸劑芎術湯治冒雨中濕眩運嘔逆頭重不食方見頭痛門除眩湯治感濕感寒頭重眩運方見濕門丹溪頭運方治痰火眩運清降利痰極效南星半夏各一錢甘草五分桔梗陳皮各一錢枳殼七分茯苓黃芩各八分上咀水二盞姜七片煎八分食後服丹溪加味六君子湯治氣虛痰甚風邪眩運不休者人參白朮茯苓各一錢甘草五分陳皮半夏各錢半荊芥穗五分上水二盞姜三片棗二枚煎一盞去滓入竹瀝二匙溫服良方六合湯治血虛風眩四物湯加秦艽羌活水煎服凡失血過多血虛眩運只以芎歸二味煎服易簡諸方一方治頭目眩運大黃荊芥穗防風各等分水煎服以利為度一方治失血過多眩運不醒用芎藭當歸酒浸等分每服四錢水煎溫服甚者加附子一方治諸風目運用蟬蛻為末飲下一錢頸項強痛與傷寒項強條參治病機經曰諸痙項強皆屬於濕項強有痰熱客經丹溪曰男子項強不能回顧動則微痛診其脈強而數實右手為甚豫作痰熱客太陽之經以二陳湯加酒炒黃芩羌活紅花服二劑而愈藥方本事木瓜煎治筋項強不得轉移宣州木瓜二個取蓋去穰沒藥一兩乳香一分上二味納木瓜中用蓋子合了竹籤釘之飯上蒸三四次爛研成膏子每服三五錢地黃酒化下生地黃汁半盞無灰酒和之八分一盞燒暖化膏有人患此病日午後發黃昏時定豫曰此病必先從足起經言足十二經絡惟足太陽之筋從足至項椒附散治腎氣上攻項背不能轉移大附子一枚六錢以上者炮去皮臍為末用上每服二錢好川椒草五粒用白麵填滿水盞半姜七片煎七分去椒入鹽通口服一人筋痛連及背胛不可轉服諸藥不效豫憶千金方有腎氣攻背強一病用前方頓瘥蓋腎氣上攻不得通用椒下達以歸經自能安矣養神湯治精神短少不得臥項筋腫急腹難伸黃耆一錢人參三分甘草七分白朮三錢柴胡升麻各四錢當歸五分蒼朮五分川芎三分半夏七分大麥面五分木香一分黃芩酒炒二錢陳皮一分黃連五分黃柏三錢上咀每服五錢水二盞姜三片煎八分不拘時稍熱服針灸法取手足太陽之經經云足太陽之脈是動則病項似拔視虛盛陷下取之又云項痛不可俯仰刺足太陽不可以顧刺手太陽又云風頸項痛刺風府又云邪客手足太陽之絡令人頭項肩痛刺足小指爪甲上與肉交者二痏立已
