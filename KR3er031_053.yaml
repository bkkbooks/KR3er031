body:
  text: 卷之五十三頭痛門病機頭痛敘論靈樞厥病云厥頭痛取足六經手少陰真頭痛頭痛甚腦盡痛手足寒至節死不治難經曰手三陽之脈受風寒伏留而不去則厥頭痛入連在腦者名真頭痛嚴氏論云氣血俱虛風寒暑濕之氣所侵傳於陽經伏留不去名厥頭痛蓋厥者逆也逆壅而衝於頭也痛引腦顛陷至泥丸宮者名真頭痛非藥之能愈夕發旦死旦發夕死東垣論頭痛甚詳東垣論金匱真言篇曰東風生於春病在肝俞在頭項故春氣者病在頭又諸陽會於頭面如足太陽膀胱之脈病沖頭痛足少陽膽經之脈病頭角額痛夫風從上受之風寒傷上邪從外入客於經絡令人振寒頭痛身重惡寒治在風池風府調其陰陽不足則補有餘則瀉汗之則愈此傷寒頭痛也頭痛耳鳴九竅不利腸胃之所生乃氣虛頭痛也心煩頭痛者病在膈中過在手巨陽少陰乃濕熱頭痛也如氣上而不下頭痛顛疾者下虛上實也過在足少陰巨陽甚則入腎寒濕頭痛也如頭半邊痛者先取手少陽陽明後取足少陽陽明此偏頭痛也有真頭痛者甚則腦盡痛手足寒至節者旦發夕死夕發旦死有厥逆頭痛者所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛凡頭痛皆以風藥治之者總其大體而言也高巔之上惟風可到故味之薄者陰中之陽乃自地升天者也然亦有三陽三陰之異故太陽頭痛惡風脈浮緊川芎羌活獨活麻黃之類為主陽明頭痛自汗發熱惡寒脈浮緩長實者升麻葛根石膏白芷為主太陰頭痛必有痰體重或腹痛為痰癖其脈沉緩蒼朮半夏南星為主少陰頭痛三陰三陽經不流行而足寒氣逆為寒厥其脈沉細麻黃附子細辛湯為主厥陰頭項痛或吐痰沫厥冷其脈浮緩吳茱萸湯主之血虛頭痛當歸川芎為主氣虛頭痛人參黃耆為主血氣俱虛頭痛調中益氣湯少加川芎蔓荊子細辛其效如神半夏白朮天麻湯治痰厥頭疼藥也清空膏乃風濕熱頭痛藥也羌活附子湯厥逆頭痛藥也如濕氣在頭者以苦吐之不可執方而治頭痛病多屬三陽之經張子和云頭痛不止乃三陽受病也三陽分部分頭與項痛者足太陽經也攢竹痛俗呼為眉骨痛是也額角上痛俗呼為偏頭痛足少陽經也如痛久不已則令人散目以三陽之經受病皆胸膈有宿痰之致然也先以茶調散吐之吐訖可服川芎薄荷辛涼之藥清上故脈書云寸脈急為頭痛是也頭痛屬外感傷寒者多活人書云頭痛者陽證也太陽證頭痛發熱惡寒無汗麻黃湯有汗桂枝湯若已發汗未發汗頭痛如破者連須蔥白湯不止者葛根蔥白湯陽明證頭痛不惡寒反惡熱胃實也調胃承氣湯少陽頭痛小柴胡湯太陰少陰並無頭痛仲景只有厥陰證吳茱萸湯頭痛屬火熱之為病張子和醫丹陽僧病頭痛不敢見明知其熱以布圜其巔上置冰於其中日易數次戴人曰此三陽蓄熱故也乃置炭火於暖室中出汗湧吐三法並行七日而愈一婦人偏頭痛五七年大便結燥兩目赤腫眩運世之頭風藥無不服其頭上針艾數千百矣一日戴人診其脈急數而有力風熱之甚也此頭角痛三焦相火之經乃陽明燥火勝金故也夫金勝則肝氣鬱肝氣鬱則氣血壅氣血壅則上下不通故燥於裡尋陽明治以大承氣湯冷河水煎二兩加芒硝一兩煎成頓令分三五服下泄如湯二十餘行次服七宣丸神功丸以潤之菠菱葵菜豬羊血以滑之三劑之外目豁首輕燥澤結釋而愈頭痛大法分內外之因頭痛自內而致者氣血痰飲五臟氣鬱之病東垣論氣虛血虛痰厥頭痛之類是也自外而致者風寒暑濕之病仲景傷寒東垣六經之類是也脈候內經曰寸口脈中手短者曰頭痛脈經曰陽弦則頭痛又曰寸口脈浮中風發熱頭痛脈緊而頭痛者傷寒脈緊上寸口者傷風頭痛凡寸口緊急或短或浮或弦皆為頭痛脈浮滑為風痰易治短澀者難治脈浮緊屬太陽浮緩長屬陽明弦細屬少陽浮緩屬厥陰治法治頭痛須分內外為要風寒暑濕火熱皆外邪氣血痰飲五臟之證皆內邪宜隨其氣血痰飲七情內火分虛實寒熱而調其內治其外也然氣血虛而用補宜用東垣之法若三因等方用附子以治氣虛此則從陽虛立意非人身平和之血氣也若夫年久偏正頭風者多因內挾痰涎風火鬱遏經絡氣血壅滯之證然亦有血虛者須宜分別以治之分經用藥治頭痛法太陽頭痛惡風寒川芎為引導陽明頭痛自汗發熱惡寒白芷少陽頭痛往來寒熱而脈浮弦者柴胡太陰頭痛體重痰實及腹痛半夏少陰頭痛三陰三陽經不流行而足寒逆為厥頭痛細辛厥陰頭痛項痛脈微浮緩欲入太陽其疾痊然亦當用川芎氣虛頭痛用黃耆血虛頭痛用當歸氣血俱虛頭痛黃耆當歸傷寒太陽頭痛麻黃湯桂枝湯陽明頭痛白虎湯少陽頭痛小柴胡湯少陽頭痛大便多祕或可下之太陰頭痛脈浮桂枝湯脈沉理中湯少陰頭痛脈浮微麻黃附子細辛湯厥陰頭痛外傷本經桂枝麻黃各半湯嘔而微吐清水吳茱萸湯丹溪治法頭痛多主於痰痛甚者火多宜清痰降火用二陳湯加白芷川芎為主肥人多是濕痰宜半夏蒼白朮瘦人是熱與血虛宜四物湯加酒芩防風勞復下虛之人似傷寒發熱汗出兩太陽穴痛甚此相火自下衝上宜補中益氣湯加川芎當歸甚者加知母黃柏蔓荊子細辛偏頭風在左屬風及血虛風用荊芥薄荷血用當歸川芎芍藥酒黃柏在右屬痰與熱痰用蒼朮半夏熱用酒製片芩諸家不分所屬故藥多不效如因感冒而頭痛者宜加防風羌活藁本葛根升麻柴胡之類風熱上攻天麻蔓荊子臺芎酒芩苦頭痛加細辛痰厥痛甚者吐之火者清之散之虛者補之壯實熱痛大便結燥者大承氣湯頭面壅腫有熱脈弦數者涼膈散去硝黃加桔梗枳殼荊芥薄荷如頂巔痛者宜加藁本酒炒升柴面上紅腫因氣實連頭痛者胃風湯面腫生蒼調胃承氣湯加薄荷荊芥治頭痛用發散之誤節齊雜著云久病頭痛略感風寒便發寒月須重綿厚帕包裹者此屬鬱熱本熱而標寒也世人不識悉用辛溫解表之藥暫時得效誤認為寒殊不知因其本有鬱熱毛竅常疏故風寒易入外寒束其內熱閉逆而為痛辛熱之藥雖能開發散其標之寒邪然以熱濟熱病本益深惡寒愈甚矣惟當瀉火涼血為主而佐以辛溫散表之劑以從法治之則可愈而根可除也若有感冒發散之後還宜調理正氣則因其病機而補益之庶無復作之患也藥方發散風寒諸劑局方川芎茶調散治諸風上攻偏正頭痛鼻塞聲重薄荷葉二兩荊芥穗川芎各一兩羌活白芷甘草各半兩細辛防風各二錢半上為細末每服二錢食後茶清調下仲景麻黃附子細辛湯治三陰三陽經不流行而足寒氣逆為厥頭痛其脈沉細麻黃細辛各六錢附子一個去皮臍生用上咀水三升三合先煮麻黃令沸減七合掠去上沫納諸藥煎取一升去渣分三服東垣羌活附子湯治冬犯寒腦痛及齒亦痛名曰腦風麻黃附子炮防風白芷殭蠶黃柏各七分羌活蒼朮各五分升麻二分黃耆三分甘草二分佛耳草三分無嗽不用上咀水二盞煎一盞去渣溫服河間如聖餅子治風寒伏留陽經痰飲氣逆頭痛防風天麻各半兩南星乾薑川芎甘草各一兩半夏半兩川烏去皮一兩上為末蒸餅糊調作餅如錢每用五餅以荊芥末細嚼茶清下三因芎半散治傷風寒生冷及氣虛痰厥頭痛如破兼眩運嘔吐附子去皮臍生用烏頭去皮生用南星乾薑甘草炙川芎細辛各一錢上細切作一服加生薑五片芽茶少許水二盞煎一盞溫服嚴氏小芎細辛湯治風寒在腦或感邪濕頭重而疼眩運嘔吐川芎二錢細辛白朮各一錢甘草五分上咀水盞半姜五片芽茶少許煎七分食後服寶鑑川芎神功散治風寒鬱熱上攻頭目令人偏正頭痛川芎川烏白芷南星麻黃各一錢甘草二錢五分姜三片棗一枚水煎服仲景麻黃湯治太陽傷寒頭痛無汗桂枝湯治太陽中風頭痛有汗見傷寒門局方加減三五七散治風寒入腦陽虛頭痛山茱萸肉一斤細辛半斤乾薑炮一斤防風一斤五兩附子十二枚炮去皮臍茯苓上為末每服二錢溫酒調下本事川芎香附湯治厥頭痛風寒腦後疼及傷寒傷風一切頭痛川芎香附子羌活蒼朮米泔浸各一兩細辛茵陳各七錢半甘菊薄荷白芷各二兩荊芥甘草各八錢上為細末每服二錢食後茶清調下良方天香散治年久頭風不得愈者天南星半夏各制川烏去皮白芷各二錢上咀作一服水二鍾生薑自然汁小半盞煎一盞食遠服三因藿香散治體虛傷風停聚痰飲上厥頭痛或偏正頭疼並治藿香洗去土草烏炮去皮各半兩川烏炮去皮濟一兩乳香如皂角子大三塊上為細末每服一錢食後薄荷湯下大川芎湯治新沐感風名曰首風旋運昏眩偏正頭痛川芎四兩天麻一兩上為細末煉蜜和丸每兩作十丸每服細嚼茶酒任下一丸楊氏必勝散治風寒流注陽經以致偏正頭痛六年不愈最效附子大者生去皮臍切四段以生薑自然汁一盞浸一宿火炙乾再浸再炙以汁盡為度高良薑各等分上為末每服二錢臘茶清調下食後連進二服忌熱物少頃百選都梁丸治風吹項背頭目昏眩及腦痛婦人胎前産後傷風頭痛白芷大塊白者洗去土淨沸湯泡四五次銼用上為末煉蜜丸如彈子大每服一丸細嚼荊芥點茶下聖惠川芎散治偏正頭風疼痛川芎羌活細辛香附子槐花甘草炙石膏各半兩荊芥穗薄荷菊花茵陳防風各一兩上為末每服二錢茶清食後服忌動風物聖惠九龍丸治婦人男子八般頭風一切頭痛川芎川烏石膏白芷草烏南星半夏各半兩細辛全蠍各二錢半上為末韭汁丸梧桐子大每服五十丸茶清下聖惠川芎丸消風化痰利咽膈清頭目治頭眩心忪煩熱頸項肩背拘蜷肢體煩疼皮膚搔癢腦昏目疼鼻塞面上遊風狀如蟲行川芎薄荷葉各十八兩甘草六兩細辛一兩二錢防風六兩桔梗二十四兩上為末煉蜜丸梧桐子大每服十丸細嚼茶清臨臥服神效香芎散治偏正頭風香附子炒川芎石膏飛白芷甘草薄荷各一兩川烏半兩去皮臍上為末每服二錢食後茶清調下直指芎芷散治風壅頭痛川芎白芷荊芥穗軟石膏上為末每服一錢食後沸湯調下本事牙皂散治偏正頭風痛豬牙皂角去筋香白芷白附子各等分上為末每服二錢食後茶清調下右痛右側臥左痛左側臥追風散治諸風上攻頭痛目眩鼻塞聲重皮膚瘙癢眉角引牽婦人血風及一切頭痛川烏炮防風石膏另研各一兩殭蠶炒去絲嘴甘草炙荊芥全蠍去毒炒各半兩川芎七錢半麝香一錢上為細末每服二錢食後茶清調下痰火頭痛諸劑良方清上瀉火湯燕京溫官人年少時氣弱常於氣海三里灸之節次約千餘壯至老添熱厥頭痛雖冬天大寒尤喜寒風則頭痛少愈若在暖處其痛復作五七年不愈此皆灸之過也羌活知母酒浸黃芩黃柏酒浸炙甘草黃耆各一錢防風升麻各七分生地黃柴胡梢甘草根黃連酒浸藁本各五分蔓荊子當歸身蒼朮各三分荊芥穗川芎各二分細辛紅花各少許上水二盞蔥白一寸煎八分食遠服良方既濟解毒湯治上熱頭目腫痛胸膈煩悶不得安臥身半以下皆寒足䯒尤甚大便微祕升麻柴胡當歸身連翹黃芩酒炒蔓荊子黃連酒炒甘草炙大黃大便利者勿用桔梗各二錢上咀水二盞煎一盞食後溫服忌酒濕麵食大料生冷硬物良方飛虎散治風熱痰火偏正頭風疼痛白附子白芷荊芥穗石膏煅川芎天麻薄荷防風各半兩蒼朮米泔浸兩頭尖黑心者不用各一錢上為細末每服一錢食後溫酒或茶清調下清空膏治偏正頭痛久不愈善治風熱目痛腦疼除血虛頭痛不治其餘悉治羌活防風黃連甘草炙兩半柴胡七錢川芎半兩枯芩兩半酒炒一半上為細末每服三錢茶清調如膏抹口內臨臥白湯下頭痛甚