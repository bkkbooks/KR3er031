虛痰止下泄利小便消腫滿及霍亂嘔逆利腰臍間血上而皮毛中而心胃下而腰臍在氣主氣在血主血又無汗則發有汗則止與黃耆同功蒼者氣味辛烈主大風在身面風眩頭痛除惡氣闢山嵐瘴氣消痃癖氣塊心腹脹痛健胃安脾寬中進食發汗除上焦濕功最大若補中焦除濕力小於白朮又鹽水炒佐黃柏力健行下焦腰足濕熱一名山精神農經曰必欲長生當服山精愚按二術功用頗同俱能補燥濕但白者補性多蒼者治性多黃耆味甘氣微溫無毒入手少陽經手足太陰經惡龜甲白鮮皮陰乾柔韌皮微黃肉中白者佳治瘡瘍生用補虛蜜炒之用主癰疽久敗瘡排膿止痛大風癩疾五痔鼠瘻補虛小兒百病治脾胃虛弱瘡瘍血脈不行內托陰證瘡瘍必用之補丈夫虛損五勞羸瘦補中生血補肺氣實皮毛瀉陰火為退虛熱聖藥治虛勞自汗無汗則發有汗則止又治消渴腹痛泄痢腸風血崩帶下月候不勻産前後一切病補腎三焦命門元氣藥中補益呼為羊肉外行皮表中補脾胃下治傷寒尺脈不至是上中下內外三焦之藥也性畏防風防風能制黃耆黃耆能得防風其功愈大蓋相畏而相使者也故二味世多相須而用又東垣云瀉陰火者謂內傷者上焦陽氣陷下陰分而為虛熱非陰分相火之火也病風不能言脈沉口噤有形湯藥緩不及事用黃耆防風煮湯數十斛置床下氣如煙霧熏蒸之氣令口鼻俱受效陷甲生大肉常有血痛疼同當歸等分為末貼瘡上有惡肉少加硫黃甘草味甘氣平生寒炒熟溫陽也無毒入足厥陰經太陰經少陰經白朮乾漆苦參為之使惡遠志反大戟芫花甘遂海藻去皮用服此忌豬肉及菘菜主五臟六腑寒熱邪氣堅筋骨長肌肉倍力金瘡腫解毒溫中下氣煩滿短氣傷臟咳嗽止渴通經脈利血氣解百藥毒久服輕身延年能補三焦元氣健胃和中養血補血治腹中急縮痛善和諸藥使相協而不爭故名國老性緩能解諸急熱藥用之緩其熱寒藥用之緩其寒生用大瀉熱火消瘡疽與黃耆同功又治肺痿吐膿血惟中滿禁用之下焦藥亦少用恐大緩不能達梢子生用除胸中積熱去莖中痛節生用消腫導毒咽痛炙二兩煎湯咽服或加桔梗名甘桔湯肺痿久咳嗽涕唾寒熱炙為末取小便三合調末一錢匕日二三服初得赤白痢一兩炙豆蔻七個末三升煎一升分服又方一兩炙生薑半兩將水一升煎至八合服之立效小兒初生取一指長炙銼水二合煮取一合綿漬點口中當吐惡汁令兒無病或加黃連一條尤妙中烏頭巴豆毒及飲饌中毒煮汁服之又方加大豆名甘豆湯效更速中蠱毒炙嚼咽汁當即吐出嚼而不吐非毒菊花味苦甘氣平寒無毒桑白皮為之使正月採根三月採葉五月採莖九月探花皆陰乾味甘而花黃應候開者入藥野菊味苦者名苦薏大傷胃不用又用白菊亦入藥主風頭眩腫痛目欲脫淚出皮膚死肌惡風濕痹身上諸風四肢遊風腰痛去來陶陶除胸中煩熱安腸胃明目養目血去翳膜久服利血氣輕身耐老延年頭風眩眼昏旋倒取九月九日花二三斤絹囊盛貯入酒浸七日服之日三又用花釀酒名菊花酒又有用花作枕俱治上病酒醉不醒應候花末敗方寸匕疔腫垂死菊葉一握搗絞汁一升入口即活冬用根變白延年三月上寅採莖九月上寅採花十二月上寅採根並陰乾百日等分以成日合搗千杵為末酒調一錢或蜜丸梧桐子大酒服七丸日一服久服效菖蒲味辛苦氣溫無毒秦艽為之使惡麻黃忌飴糖羊肉勿犯鐵五月十二月採陰乾生石澗一寸九節者良露根勿用主風寒濕痹咳逆上氣開心孔補五臟通九竅明耳目出音聲主耳聾耳鳴頭風頭氣癰瘡疥瘙殺諸蟲止小便利四肢濕痹不得屈伸下氣除煩悶止心腹痛久服輕身聰明不忘不迷惑延年高志不老胎動不安及日月未足而欲産搗生根汁二三升服之血海敗及産後下血不止用二兩入酒四盞煎二盞分作二服小兒溫瘧積熱不解煎湯浴之中惡與卒死鬼擊搗生根汁灌之癰腫發背生搗貼之瘡乾者搗末水調途遍身熱毒瘡痛不痛搗末二三斗布席上恣臥以被蓋之五七日愈遠志味苦氣溫無毒得茯苓冬葵子龍骨良殺天雄附子毒畏珍珠藜蘆蠐螬四月採根葉陰乾凡使先去心不則令人煩主咳逆傷中補不足除邪氣利九竅益智慧耳目聰明不忘強志倍力利丈夫定心氣止驚悸益精陽主夢邪去心下膈氣久服輕身不老好顏色延年葉名小草主益精補陰氣止虛損夢泄黃精味甘氣平無毒二月採陰乾單服九蒸九曝入藥生用主補中益氣安五臟益脾胃潤心肺除風濕補五勞七傷久服輕身延年不飢耐寒暑博物志曰太陽之草名曰黃精餌之可以長生薯蕷俗名曰山藥味甘氣溫平無毒手太陰經藥二門冬紫芝為之使惡甘遂日乾生用懷慶良主傷中補虛羸除寒邪氣補中益氣力長肌肉治頭風眼眩止腰痛強陰補心肺不足除煩熱涼而能補亦潤皮毛乾燥主泄精健忘開達心孔多記事久服耳目聰明輕身不飢延年五味子味酸氣溫味厚氣輕陰中微陽無毒入手太陰足少陰經蓯蓉為之使惡葳蕤勝烏頭陰乾主益氣咳逆上氣勞傷羸瘦補不足強陰益男子精止渴生津在上滋肺在下補腎又氣耗散者用此收之多食致虛熱收補之驟也夏月與黃耆人參麥門冬少加黃柏煎服使人精神頓加兩足筋力湧出寒月與乾薑同用治肺寒氣逆咳嗽又火熱嗽必用之蓋火氣盛者驟用寒涼藥恐心相逆宜用五味子等酸收之藥斂而降之肉蓯蓉味甘酸鹹氣微溫無毒五月五日採陰乾先用酒浸一宿並削去俘甲劈破中心去白膜如竹絲草樣卻用酒蒸酥油塗炙主五勞七傷補中除莖中寒熱痛養五臟強陰益精氣多子婦人癥瘕久服輕身治男絶陽不興及泄精尿血遺瀝女絶陰不産及血崩帶下陰痛暖腰膝強筋髓命門相火不足以此補之丹溪云峻補精血驟用反致動大便鎖陽味甘鹹酥油塗炙主補陰氣益精可代蓯蓉治虛而大便燥結不燥者勿用菟絲子味辛甘氣平溫無毒得酒良酒浸曝乾再浸又再曝杵末用宜丸不宜煮主續絶傷補不足益氣力肥健療男子女人虛寒腰痛膝冷添精補髓強陰堅筋骨主莖中寒精自出溺有餘瀝鬼交泄精尿血口苦燥渴寒血為積久服明目輕身延年小兒頭瘡及女人面瘡煎湯洗之小兒熱痱取莖葉採以浴之小兒痘瘡癢瘍取子及莖葉煎濃湯熱漬洗之牛膝味苦酸氣平無毒惡龜甲畏白前陰乾長大而柔潤者佳酒漬用忌牛肉主寒濕痿痹四肢拘攣不可屈伸逐血氣傷熱火爛墮胎久服輕身耐老療傷中少氣男子陰消老人失溺補中續絶壯陽益精填骨髓止發白除腰脊痛婦人月水不通血結癥瘕産後心腹痛並血暈活血生血能引諸藥下行腰腿之疾不可缺病人虛羸加而用之老瘧久不斷取根一握水六盞煎三盞作三服未發前服臨發又服小便不利莖中痛欲死及婦人血結腹痛取一大握酒煮飲之立愈金瘡痛及卒得惡瘡不識取生根搗敷之竹木刺入肉嚼爛罨之即出女葳即葳蕤味甘氣平無毒畏滷咸立春後採陰乾主中風暴熱四肢拘攣不能動搖跌筋結肉諸不足補五勞七傷主時疾寒熱虛勞客熱頭痛目痛眥爛淚出心腹結氣濕毒腳膝痛莖中寒久服去面黑皯好顏色潤澤輕身不老又云主霍亂泄利薏苡仁味甘氣微寒無毒八月採實採根無時主筋急拘攣不可屈伸風濕痹下氣除筋骨邪氣不仁利腸消水腫令人能食久服輕身益氣其根下三蟲此藥力勢和緩凡用須倍於他藥古方心肺藥多用之治肺痿肺癰吐膿血咳嗽涕唾上氣取仁十兩水三升煎一升入少酒服蛔蟲攻心腹痛取根切水煮濃汁服之蟲死盡出石斛味甘氣平無毒惡凝水石巴豆畏殭蠶雷丸生石上採莖陰乾酒洗蒸用主傷中除痹下氣補五臟虛勞羸瘦強陰益精壯筋骨補內絶不足治胃中虛熱有功平胃氣長肌肉逐皮膚邪熱痱痛腳膝疼冷痹軟弱久服厚腸胃輕身延年定志除驚巴戟天味辛甘氣微溫無毒覆盆子為之使惡雷丸丹參採根陰乾主大風邪氣陰痿不起強筋骨安五臟補中增志益氣療頭面遊風大風血癩小腸及陰中相引痛補五勞利男子治夜夢鬼交泄精病人虛損加而用之補骨脂一名破故紙味苦辛氣大湯無毒惡甘草忌羊內酒浸一宿東流水洗蒸半日日乾主五勞七傷風虛冷痹四肢疼痛骨髓傷敗陽衰腎冷精流腰痛膝冷囊濕小便利及婦人血氣衰男子勞傷下元虛冷添精益氣用一斤制再用烏麻油一升合炒令麻子聲絶播去麻子取補骨脂為末醋者麵糊丸如梧桐子大溫酒或鹽湯下又方同胡桃肉研爛為丸芎藭味辛氣溫無毒少陽經藥入手足厥陰經白芷為之使畏黃連形塊重實色白者良主中風入腦頭痛寒痹筋攣鍰急金瘡婦人血閉無子治少陽頭痛血虛頭痛之聖藥散肝經風頭面風不可缺又治一切血破癥結宿血養新血鼻洪吐血溺血痔瘻腦癰發背瘰癧癭贅排膿消瘀長肌上行頭目下行血海通肝經血中之氣藥也治一切心腹堅痛脅痛疝痛溫中散寒開鬱行氣燥濕葉名蘼蕪辛香亦治風辟邪春秋注云麥鞠鞠藭所以御濕行細辛療金瘡止痛得牡蠣療頭風吐逆單服久服則走散真氣辛散故也婦人經絡住驗胎法生為末空心濃煎又湯下一匙腹內微動是有胎也婦人崩中不止一兩銼酒一大盞前五分入生地黃汁二合煎二三沸食前分作二服當歸味甘辛氣溫陽中微陰無毒入手少陰經足太陰厥陰經畏菖蒲海藻惡熱面陰乾酒浸用主咳逆上氣溫瘧虛勞寒熱洗疥癬在皮膚中婦人漏下絶子諸惡瘡瘍金瘍煮飲之又溫中止痢腹痛療齒痛不可忍酒蒸治頭痛諸頭痛皆屬木故以血藥治之治血通用和血補血破惡血大補不足決取立效之藥氣血昏亂服之即定能使氣血各有所歸故名當歸婦人産後備急男子補虛速效不可缺也頭止血身和血尾破血全用無獎又云全用和血大抵全用在參耆皆能補血在大黃牽牛皆能破血從桂附則熱從硝黃則寒芍藥味苦酸氣微寒氣薄味厚陰也降也陰中之陽有小毒入手足太陰經雷丸為之使惡石斛畏硝石鱉申小薊反藜蘆有赤白一種花亦有一色主邪氣腹痛除血痹破堅積寒熱疝症利小便益氣通順血脈抑肝緩中扶陽收陰補血散惡血利大小腸通月水消癰腫發背痔瘻又下痢疾必用之痢而腹中痛者炒用後重生用脾經之藥白者補赤者瀉赤者利小便下氣白者止痛散血得炙甘草為佐治腹中痛夏月少加黃芩如惡寒而痛加肉桂又云惟治血虛腹痛蓋諸痛宜辛散芍藥酸收故也酒浸炒與白朮同用能補脾與川芎同用則能瀉肝與參術同用則能補氣又産後不便用以其酸寒伐生髮之氣也又血虛寒禁用又云冬月減芍藥以避中寒茺蔚子即益母草味辛甘氣微溫無毒主明目益精除水氣療血逆大熱頭痛心煩産前後諸疾行血養血難産久服輕身莖主癮疹癢可作湯浴苗葉同功搗敷疔腫乳癰搗苗絞汁服消疔腫諸惡毒腫子死腹中産後血脹血暈小兒疳痢車前子味甘鹹氣寒無毒五月五日採陰乾主氣癃止痛利水道小便淋瀝除濕痹雖利小便而不走氣與茯苓同功明目療肝中風熱沖目赤痛養肺強陰益精令人有子又治婦人産難為末酒服之葉及根主鼻衄瘀血尿血搗汁飲之熱痢搗葉汁一盞入少蜜煎服耆實耆草之實味苦酸氣平無毒八月九月採日乾主益氣充肌膚明目聰慧先知久服不飢不老輕身卷柏味辛甘氣溫平微寒無毒五月七月採陰乾主五臟邪氣女子陰中寒熱痛癥瘕血閉絶子治脫肛散淋結頭中風眩痿蹶強陰益精鎮心治鬼邪啼泣久服輕身和顏色生用破血炙過止血蒲黃味甘氣平無毒主心腹膀胱寒熱利小便止血消瘀血久服輕身益氣力延年治一切吐衄唾崩腸風血痢尿血撲血血症帶下月候不勻心腹痛産後諸血病並瘡癤風腫若破血消腫即生用補血止血則炒用蒲萼篩黃粉下後有赤滓是炒用以澀腸已泄殊勝續斷味苦辛氣微溫無毒地黃為之使惡雷丸陰乾節節斷皮黃皺者為真酒浸用主傷寒補不足調血脈金瘡癰傷折跌續筋骨婦人乳難産後一切病崩中漏血尿血金瘡血內漏止痛生肌及腕傷惡血腰痛關節緩急縮小便止泄精子宮冷久服益氣力骨碎補味苦氣溫無毒採根無時削去毛用主破血止血補傷折骨碎療骨中毒氣風血疼痛五勞六極亦入婦人血氣藥本名胡孫薑唐明皇以其主折傷有效故名搗末煮黃米粥和之裹傷處菴䕡子味苦氣微寒微溫無毒荊實為之使陰乾狀如蒿艾之類主五臟瘀血腹中水氣腫脹留熱風寒濕痹身體諸痛腰腳重骨節煩疼婦人月水不通消食明目久服輕身延年不老人家種此闢蛇諸瘀血不散變成癰搗取生汁一升服之打撲損折瘀血並單服煮服之更妙蒺藜子味苦辛氣溫微寒無毒烏頭為之使有黑白二種黑者有二角刺不入湯藥入丸散並妙主惡血破癥結積聚喉痹乳癰久服長肌肉明目輕身治身體風癢頭痛咳逆傷肺肺痿小兒頭瘡癰腫陰瘡止遺瀝泄精溺血治風明目最良其葉主風癢可煮以浴白癜風取白子生搗為末酒調服之又收花陰乾為末每服二三錢飯後溫酒調服地膚子又名落帚味苦氣寒無毒烏頭為之使主膀胱熱利小便補中益精氣強陰久服耳目聰明輕身耐老作湯沐浴去皮膚中熱氣洗目去熱暗雀盲澀痛其葉搗絞汁主泄瀉止赤白痢解惡瘡毒決明子味鹹苦甘氣平微寒無毒耆實為之使惡大麻子十月十日採陰乾忌日主青盲淫膚赤白膜眼赤痛出除肝家熱久服益精志輕身又解蛇毒貼腦心止鼻紅日取一匙挪令淨空心吞之百日見夜光作枕勝黑豆治頭痛明目青葙子味苦氣微寒無毒三月採莖葉陰乾五月六月採子主邪氣皮膚中熱風瘙身癢殺蟲蟲惡瘡疥蝨痔蝕下部𧈟瘡子名草決明療唇口青治肝臟熱毒沖眼赤障青盲翳腫益腦髓明耳目鎮肝漏蘆味苦鹹氣寒無毒主皮膚熱惡瘡疽痔乳癰溫痹下乳汁止遺溺泄精尿血腸風治撲損續筋骨敷金瘡止血長肉久服輕身益氣耳目聰明不老延年天名精一名麥句薑味甘氣寒無毒垣衣為之使五月採主瘀血血症欲死下血止血利小便治金瘡折傷久服輕身耐老丹參味苦氣微寒無毒畏鹹水犯藜蘆五月採根曝乾又云冬採良夏採虛惡主心腹邪氣鳴腸幽幽如走水寒熱積聚破癥除瘕止煩滿益氣養血破宿血生新血安生胎落死胎止血崩帶下調婦人經脈不勻治骨節疼痛四肢不遂腰脊強腳痹軟弱風邪留熱頭痛眼赤熱溫狂悶中惡百邪鬼魅腹痛惡瘡癭贅腫毒排膿止痛生肌肉玄參味苦鹹氣微寒無毒足少陰經君藥惡黃耆乾薑大棗山茱萸反藜蘆三四月採根日乾凡用時勿犯銅主腹中寒熱積聚女子産乳余疾補腎氣令人目明強陰益精治暴中風傷寒身熱支滿狂邪忽忽不知人溫瘧灑灑頭風熱毒骨蒸傳尸邪氣血瘕堅癥散頸下核癰腫又此藥乃樞機之劑管領諸氣上下肅清而不濁治空中氣氤氳之氣無根之火此為聖藥也紫參味苦辛氣寒無毒畏辛荑三月採根火炙使紫色主心腹積聚寒熱邪氣通九竅利大小便療腸胃大熱唾血衄血腸中聚血婦人血閉癰腫諸瘡仲景治痢用之茜根一名地蘇木味苦氣寒陰中微陽二三月採入藥炒用勿犯鐵器主寒濕風痹黃疸補中治六極傷心肺衄血吐血內崩下血尿血産後血暈乳結損撲瘀血去諸死血主蠱毒尤勝周禮庶氏掌除蠱毒以嘉草攻之蓑荷與茜也中蠱或吐下血如爛肝茜草根蘘荷葉各二兩切水四升煮取一升頓服之茅根味甘氣寒無毒六月採主勞傷虛羸補中益氣除瘀血血閉寒熱利小便下五淋止消渴解腸胃熱婦人崩中苗如針謂之茅針可啖益小兒生採敷金瘡止血並痛煮服之主鼻衄及下血溺血惡瘡腫未潰者煮服之主潰一針一孔二針二孔花亦主衄血吐血金瘡艾葉味苦氣微溫陰中之陽無毒三月三日五月五日採陳久者良亦生搗汁用又作煎勿見風主灸百病可作煎止下痢赤白吐血衄瀉血婦人漏血安胎止腹痛闢風寒暖子宮使人有子除心腹惡氣一切鬼氣利陰氣生肌肉療五臟痔下部𧈟瘡汁殺蛔蟲醋煎作煎治癬良實主明目壯陽助陰治鬼氣治百惡鬼氣取實和乾薑上為末蜜九如桐子大空心服一二十丸以飯壓之日再服又熟艾如雞子大三枚水五升煎取二升頓服亦可病人齒無色舌上白喜睡不知痛癢處或下痢此𧈟蟲食下部也急治之以竹筒一頭納下部孔中一頭燒艾令煙入更入少雄黃良地榆味苦甘酸氣微寒氣味俱厚陰也無毒得發良惡麥門冬主婦人乳痓痛七傷帶下病月水不止血崩産前後諸血疾腸風血痢赤白痢及小兒疳熱瀉痢極效療金瘡止痛除惡肉蝕膿諸瘻惡瘡熱瘡可作金瘡膏性沉寒入下焦熱血痢則可若虛寒人水瀉及冷痢勿輕用小兒疳痢濃煮汁飲之大小薊根味甘苦氣溫又云涼五月陰乾主養精保血大薊主女子赤白沃安胎止吐血衄血下血療癰腫惡瘡生研酒並小便任服又鹽研罯敷小薊專主血疾紅藍花味辛甘苦氣溫陰中之陽無毒堪作脂胭又染真紅主産後血暈口噤腹內惡血不盡絞痛胎死腹中並酒煮服又主蠱毒下血多用則破血少用則入心養血和血與當歸同功苗生搗敷遊腫子吞數粒主天行瘡子不出胭脂主小兒聤耳滴耳中喉痹塞不通搗濕花絞汁一小升細服之瘥為一度無濕花浸乾者如前法極神驗之一切腫搗取汁服之不過再三服量腫大小而多少服之女子中風血熱煩渴兼血氣刺痛取子一升杵碎酒拌曬乾重杵為末蜜丸如桐子大空腹酒下四十丸牡丹味辛苦氣寒陰中微陽無毒入手厥陰經足少陰經畏菟絲子採根皮去心主寒熱中風瘛瘲痓驚癇邪氣虛勞無汗骨蒸熱瀉陰中火除癥堅瘀血留舍腸胃不散衄血吐血女子經脈不通血瀝腰痛治胎下胞産後一切冷熱血氣治神志不足安五臟療癰瘡排膿止痛鬱金味辛苦氣寒純陽無毒色赤似薑黃主血積下氣涼心止血破惡血血淋尿血女人宿血氣心痛溫醋摩服之治金瘡生肌亦啖馬藥主馬熱病小兒方馬醫多用之此芳草也古用合釀酒以降神衍義云不香丹溪云性輕揚能致達酒氣於高遠如龍涎無香能散達諸香之氣耳因輕揚之性古人用以治郁遏薑黃味辛苦氣寒又云溫無毒色黃類生薑而圓有節似鬱金云是經種三年以上老薑也主心腹結積疰忤下氣脹治氣為最破血通月經治撲損瘀血産後敗血攻心消癰腫其主治功力烈於鬱金延胡索味辛苦氣溫無毒入手足太陰經生奚國如半夏色黃主破血産後諸病因血所為者婦人月經不調腹中結塊崩中淋露因損下血産後血暈暴血衝上或酒摩及煮服又治心氣痛小腹痛暴腰痛莎草根一名香附子味甘氣微寒陽中之陰無毒陰乾石臼搗淨勿犯鐵用須童便浸或醋煮主除胸中熱充皮毛久服益氣長鬚眉大能下氣開鬱又逐去凝血炒黑能止血治崩漏血中之氣藥凡血氣藥必用之能引血藥至氣分而生血婦人之仙藥也婦人乳腫痛搗末醋煮厚敷之鯉腸即旱蓮子草味甘酸氣平無毒陰乾主血痢針灸瘡發洪血不可止者敷之立已汁塗發眉生速而繁作烏藥用之鼠尾草味苦氣微寒無毒四月採葉七月採花陰乾主鼠瘻寒熱下痢膿血不止白花者主白下赤花者主赤下濃煎服或為末粥飲下劉寄奴草味苦氣溫無毒主破血産後余疾下血止痛極效治心腹痛下氣水脹雞冠子氣涼無毒入藥炒用主止腸風瀉血赤白痢婦人崩中帶下柴胡味苦氣平微寒氣味俱輕陽也升也陰中之陽無毒少陽經厥陰經行經之藥半夏為之使畏女菀藜蘆生銀夏者最良主心腹去腸胃中結氣飲食積聚寒熱邪氣推陳致新久服輕身明目除往來寒熱早晨潮熱傷寒心下煩熱諸痰熱結實胸中邪逆痛本經頭痛在經主氣在臟主血婦人産前後必用之藥加以四物秦艽牡丹皮等同為調經之劑佐以三稜廣朮巴豆之類能消血治傷寒寒熱往來為最要藥又治瘧必用之又能引清氣行陽道升提胃氣上行春令又後人治勞方中多用之若止虛勞而無實熱用之致死矣前胡味苦氣微寒無毒半夏為之使惡皂莢畏藜蘆主痰滿胸膈中痞心腹結氣風頭痛去痰實下氣最要治傷寒寒熱推陳致新明目治小兒一切疳氣白薇味苦鹹氣平大寒無毒惡黃耆大黃乾薑乾漆山茱萸大棗三月三日採根陰乾不見日主暴中風身熱支滿忽忽不知人狂惑邪氣寒熱疼溫瘧灑灑發作有時療傷中淋瀝下水氣黃連味苦氣寒味厚氣薄陰中陽也無毒入手少陰經黃芩龍骨為之使惡菊花芫花玄參畏款冬花勝烏頭解巴豆毒服之惡豬肉忌冷水主熱氣目痛眥傷泣出明目腸澼腹痛下痢婦人陰中腫痛久服令人不忘鎮肝益膽眼暴赤腫久下赤白膿血為治痢之最解熱毒瀉心火止驚悸止消渴調胃厚腸除胃中濕熱煩躁噁心鬱熱在中焦兀兀欲吐心下痞滿及諸瘡腫毒必用之又主形瘦氣急小兒疳氣酒浸炒上行薑汁炒辛散沖熱有功治痢同木香搗末白蜜丸如桐子大空腹下二三十丸再服神效又方與乾薑各為末每服用連二錢薑半錢空心溫酒下久脾泄用一兩同生薑四兩慢火炒令薑干去薑取連杵末每空心茶調二錢小兒食土和好上泥煎汁搜之日乾與服胡黃連味苦氣平無毒惡菊花玄參生胡國似干楊柳枝心黑外黃折之塵出如煙者真忌豬肉令人漏精主久痢成疳傷寒咳嗽溫瘧骨蒸勞熱補肝膽明目理腰腎去陰汗小兒驚癇寒不下食霍亂下痢小兒藥多用之又治婦人胎蒸虛驚黃芩味苦氣平寒味薄氣厚陽中陰也無毒入手太陰經山茱萸龍骨為之使惡蔥實畏丹砂牡丹藜蘆三月三日採根陰乾主諸熱黃疸腸澼泄痢逐水下血閉惡瘡疽蝕火瘍目赤腫解在肌風熱泄肺受火邪上逆於膈上消膈上熱痰及胃中濕熱小腹絞痛利小腸主天行熱疾疔瘡乳癰發背枯飄者名宿芩入肺經酒炒上行主中部積血圓實者名子芩入大腸除熱補膀胱不足滋其化源治下痢膿血腹痛後重身熱與芍藥甘草同用又主妊娠為安胎之聖藥清熱降火故也又得厚朴黃連止腹痛得五味子牡蒙牡蠣令人有子得黃耆白蘞赤小豆瘻疾療之草龍膽味苦澀氣大寒氣味俱厚陰也無毒貫衆為之使惡防葵地黃主骨間寒熱驚癇邪氣殺蠱毒除胃中伏熱時氣溫熱黃疸下焦濕腫熱泄下痢去腸中小蟲益肝膽氣止驚惕酒浸之則上行治兩目赤腫睜脹瘀肉高起疼痛不可忍佐柴胡眼疾必用之藥也久服益智不忘輕身耐老空腹勿餌令人溺不禁又治癰腫口瘡小兒驚癇客忤疳氣防己味辛苦氣平寒陰也無毒通行十二經殺雄黃毒惡細辛畏萆薢根採陰乾去皮用大如車軸理解者良漢防己君木防己使即根苗之名主風寒溫瘧熱氣諸癇除邪利大小便療風水氣腰以下至足濕熱腫腳氣去膀胱熱及傷寒寒熱邪氣中風手足腳攣急又主肺氣喘嗽膈間支滿殺癰腫惡結諸瘑疥癬蟲瘡漢主水氣木主風氣葛根味甘氣平性輕浮無毒足陽明經行經的藥殺野葛巴豆百藥毒五月採根曝乾取入士深者去皮用主消渴身大熱嘔吐諸痹起陰氣解諸毒療傷寒中風頭痛解肌發表出汗治脾虛而渴能升提胃氣除胃熱解酒毒療金瘡止痛生根汁大寒治天行時病壯熱煩渴熱毒吐血及妊娠熱病心悶小兒熱痞葉主金瘡止血葛谷主下痢十歲以上花主消酒並小豆花末服方寸匕飲酒不知醉葛粉甘寒主壓丹石解鳩毒水調服三合食之去煩熱利大小便止渴栝蔞根一名天花粉味苦氣寒味厚陰也無毒枸杞為之使惡乾薑畏牛膝乾漆反烏頭入地深者良主消渴身熱煩滿大熱補虛安中續絶傷除腸胃中痼熱八疸身黃唇乾口燥短氣通水遂止小便利排膿消腫毒生肌長肉消乳癰發背痔瘻瘡癤撲損瘀血莖葉治中熱傷暑最效子味苦甘性潤治痰嗽利胸膈甘能補肺潤能降氣胸有痰者以肺之逼失降下之令令得甘緩潤下之助則痰自降宜為治嗽之要藥又洗滌胸膈中垢膩治消渴之妙藥又止吐血腸風瀉血赤白痢並炒用又下乳汁取仁炒乾令香熟為末酒調一匕合面臥少時苦參味苦氣寒沉純陰無毒玄參為之使惡貝母菟絲反藜蘆少入湯用多作丸服或酒浸主心腹結氣癥瘕積聚黃疸溺有餘瀝逐水除癰腫補中明目止淚治時氣惡病大熱腸澼熱痢熱毒皮風肌燥殺蟲瘡疥赤癩眉脫治大風有功及遍身熱細疹癢痛胸頸臍腹近陰處皆然有人用揩齒歲久遂得腰重之疾蓋能峻補陰氣氣降而不升故也癩疾惡物取五斤切以好酒三斗煮一斗每飲一合日三服不絶瘟病狂言心燥結胸垂死取一二兩以酒二升煮一升頓服之有汗無汗或吐皆瘥腸風瀉血並熱痢炒帶煙出為末飯飲下卒心痛取一兩酒煎熱服防葵味辛甘苦氣寒無毒三月三日採根日乾依時採者入水沉勿誤用狼毒主疝瘕腸泄膀胱熱結溺不下咳逆溫瘧鬼瘧癲癇驚邪狂走小腹支滿膈脹口乾除腎邪強志久服堅筋骨益氣輕身藍實味苦甘氣寒無毒即大葉藍莖葉可染青主解諸母殺蟲鬾音其小兒鬼也疰鬼螫毒填骨髓明耳目調五臟六腑利關節益心力久服頭不白輕身其葉汁殺百藥毒毒藥毒箭毒刺金瘍血悶鱉瘕蟲蛇傷蜘蛛蜂螫毒箭疔瘡腫毒遊風熱腫天行熱狂心煩躁悶寒熱頭痛鼻紅吐血赤眼産後血暈小兒壯熱熱疳丹熱禿瘡治鱉瘕葉一斤搗以水二升絞取汁一升日一服諸蟲傷咬取汁一碗入雄黃麝香二物隨意多少投汁中以點咬處若是毒者即再服其汁神效青布燒作灰敷惡瘡經年不瘥者及炙瘡止血令不中風青黛一名靛花味鹹甘氣寒出波斯國染澱甕上沫紫碧色者用之同青黛功主解諸藥毒收五臟鬱火小兒諸熱驚癇發熱天行頭痛並水研服之治小兒疳熱痢消瘦諸病瀉肝消食積殺惡蟲物化為水磨敷熱瘡惡腫金瘡下血蛇犬等毒甚效景天一名慎火味苦酸氣平無毒一云有小毒四月四日七月七日採陰乾主大熱火瘡身熱煩邪惡氣諸蟲毒金瘡止血風疹惡癢熱毒丹腫浴小兒去煩熱驚氣風疹生搗敷小兒赤遊丹毒花主女人漏下赤白輕身明目茵陳蒿味苦辛氣平微寒陰中微陽無毒入足太陽經五月及立秋採陰乾主風濕寒熱邪氣熱結黃疸通身發黃小便不利解傷寒煩熱腹痛行滯氣化痰利膈久服輕身益氣耐老仲景治熱濕陽黃茵陳梔子大黃湯陰黃茵陳附子湯大抵以此藥為主各隨寒熱而佐以他藥知母味辛苦氣寒無毒足少陽經本藥勿犯鐵器行經上頸酒炒用主消渴熱中除邪氣肢體浮腫下水補不足益氣捕腎水瀉腎中火治有汗骨蒸熱勞往來傳尸疰病傷寒久瘧煩熱消痰止嗽潤心肺患人虛而口乾加用之又治溪毒大勝兼闢射工夏月出行取屑自隨欲人水先取少許投上流貝母味辛苦氣平微寒無毒厚朴白薇為之使畏秦艽礬石反烏頭若用去心主傷寒煩熱淋瀝邪氣疝瘕喉痹乳癰金瘡風痙腹中結實心下滿咳嗽上氣消痰潤心肺散心胸鬱結之氣殊有功詩云言採其虻者是也與連翹同主項下瘤癭疾敷惡瘡能斂瘡口産難及胞衣不出取七枚作末酒調下人蓄惡瘡燒友油調服之昔有人左膊有瘡如人面歷試諸藥無苦至貝母瘡乃聚眉閉口因以小葦筒毀其口灌之數日成痂愈地骨皮即枸杞根味苦氣寒陰也入足少陰經手少陽經去骨用根皮主五內邪氣熱中消渴風濕周痹補傷大勞解有汗骨蒸及去肌熱涼血堅筋骨滋陰利大小腸紫菀味苦辛氣溫無毒款冬為之使惡天雄瞿麥雷丸遠志畏茵陳陰乾蜜水浸一宿焙乾去蘆頭主咳逆上氣胸中寒熱結氣去蠱毒痿蹶安五臟益肺氣療肺痿咳唾膿血消痰止喘悸五勞體虛補不足小兒驚癇久嗽不瘥款冬花各一兩百部半兩為末每服三錢匕生薑二片烏梅一個煎湯調食後臨臥各一服速效百部味甘苦氣微溫又云微寒無毒一云有小毒酒浸炒入藥主肺熱咳嗽上氣潤益肺治嗽多用又治疳蛔及傳尸骨蒸勞殺寸白蟯蟲亦去風煮作湯洗牛大蝨即去並治一切樹木蟲蛀燼之亦可殺蠅蠓款冬花味辛甘氣溫無毒杏仁為之使得紫菀良惡硝石玄參畏貝母辛荑麻黃黃耆黃芩黃連青葙百草中惟此不顧冰雪最先春也採花陰乾微見花未舒者良主咳逆上氣善喘息呼吸連連不絶涕唾稠黏潤心肺消痰止咳治肺痿癰吐膿血心虛驚悸洗肝明目喉痹諸驚癇寒熱邪氣除煩補勞劣古今治嗽之最取花於無風處密器燒用筆管吸其煙滿口則咽之數日效白前味甘辛氣微溫一云微寒無毒白而長比於細辛形粗而脆主胸脅逆氣咳嗽上氣衝喉中呼吸欲絶不得眠常作水雞聲善能保定肺氣治嗽多用之以溫藥相佐使尤佳馬兜鈴味苦氣寒無毒青木香子也只取向裡面子去革膜入藥妙用主肺熱咳嗽氣上逆連連不息痰結喘促又主血痔瘻瘡以藥於瓶中燒熏病處桔梗味辛苦氣微溫味厚氣輕陽中陰有小毒畏白芨龍眼龍膽凡使去頭及兩畔附枝米泔浸一宿焙乾用主胸脅痛如刀刺腹滿腸鳴幽幽驚恐悸氣治鼻寒喉痹利嗌咽胸膈之氣治肺熱氣奔促嗽逆消痰涎肺癰排膿養血補內漏治下利破血積氣中惡下蠱毒及小兒驚癇客忤能載諸藥不下沉故名舟楫如大黃苦泄峻下之藥欲引至胸中至高之分成功必用此又能開提氣血氣血藥中宜用之又得牡蠣遠志療恚怒硝石石膏療傷寒紫蘇味辛甘氣溫主下氣除寒中解肌發表治心腹脹滿開胃下食止腳氣通大小腸煮汁飲之治蟹毒子尤良主肺氣喘嗽咳逆潤心肺消痰氣腰腳中濕風結氣調中下氣止霍亂嘔吐反胃利大小便破癥結消五膈菰根味甘氣大寒無毒南人呼為茭主腸胃痼熱消渴止小便利蘆根味甘氣寒主小兒赤丹治諸癰疽發背乳房搗敷之亦罯毒箭蛇蟲咬妊娠胎動不安漏胎下血産婦前後心煩悶天行熱疾大渴大狂服金石藥人心熱俱煎服之漬蘆汁療消渴蘆麻産婦枕之止血暈安臍上止産後腹痛蠶咬人毒取汁飲之今以蘆近蠶種則蠶不生甘蕉根味甘氣大寒無毒主癰腫結熱發背諸毒小兒赤遊搗敷之干則易産後血脹悶天行狂熱煩悶及消渴金石發動躁熱絞汁服蕉油治暗風癇病流涎作暈悶欲倒者得吐便瘥有奇效又婦人塗發令黑及不落用竹筒插皮中取之如取漆法蘆根味甘氣寒主消渴客熱止小便利治寒熱時疾煩悶妊孕人心熱治嘔噦不下食胃中熱水煮頓服之良解食魚蟹中毒其花名蓬茸主卒霍亂危急者取一把煮濃汁頓服二升立瘥蘭草味辛甘氣平寒無毒衍義云即春秋開花之蘭香入藥煎用主利水道殺蟲毒闢不祥胸中痰癖久服益氣輕身不老通神消諸痹散久積陳郁之氣甚效其氣清香生津止渴消渴證非此小除諸痹必用杜若味辛氣微溫無毒得辛荑細辛良惡柴胡前胡採根日乾主胸脅下逆氣溫中風入腦戶頭痛腫多涕淚虛眩目視䀮䀮除口臭氣久服益精明目輕身令人不忘獨活一名羌活味苦甘辛氣平微溫氣味俱輕陽也升也後人分用以紫色而節密者為羌活黃色而作塊者名獨活羌活氣雄獨活氣細主風寒所擊金瘡止瘡奔豚癇痓女子疝瘕療諸賊風百節痛風無拘久新者久服輕身耐老本經不分羌活手足太陽經風藥又足厥陰少陰經藥主賊風失音不語多癢血癩手足不遂口面喎斜治肢節疼痛一身盡痛非此不除又去溫濕風加川芎治足太陽少陰痛獨活足少陰行經之藥治風痛足少陰伏風而不治太陽故兩足寒濕痹不能動止非此不除又主風毒齒痛加細辛治少陰經頭痛升麻味甘苦氣平微寒味薄氣厚陽中之陰也無毒陽明經本經藥亦走手陽明經太陰經形輕而黑堅實者第一細削皮青緑色者亦佳謂之雞骨升麻去黑皮並腐爛主解百毒殺百精殃鬼闢瘟疫瘴氣邪氣蠱毒煎濃汁服之入口皆吐出治中惡腹痛時氣毒癘頭痛寒熱小兒風癇時氣熱風腫癰喉痛口瘡肺痿肺癰咳唾膿血瘡家之聖藥主脾胃解肌肉間熱手足陽明經治風之的藥及發散本經風邪若元氣不足陽氣陷下用此升提陽氣上行又脾痹非梢子不除天行時病發斑瘡頭面及身須臾周匝如火燒不治數日死用五兩水煮綿沾汁洗之小兒斑瘡及豌豆瘡心燥不安治方同上細辛味大辛氣溫氣厚陽也無毒手少陰經引經之藥惡狼毒山茱萸黃耆畏消石滑石反藜蘆出華陰者良陰乾忌生菜單用末不可過錢匕氣塞不通死主咳逆頭痛腦痛百節拘孿風濕痹痛消死肌溫中下氣破痰開胸中滯除齒痛口臭喉痹鼻癰風眼淚下風癇顛疾下乳結汗不出血閉不行安臟益肝膽通精氣久服明目利九竅輕身長年治少陰頭痛如神當少用之獨活為使諸風通用之藥溫陰經去內寒治邪在裡之表頭面風痛不可缺得當歸芍藥白芷芎藭牡丹藁本甘草共療婦人得決明鯉魚膽青羊肝共療目痛口臭及𧈟豎齒腫痛煮取濃汁熱含冷吐瘥防風味甘辛氣溫純陽無毒脾胃二經行經藥太陽經本經藥乃卒伍卑賤之職隨所引而至者也惡乾薑藜蘆白蘞羌花殺附子毒實而脂潤頭節堅者良去蘆並叉頭叉尾者不用主大風頭眩痛惡風風邪目盲無所見風行周身骨節疼痹煩滿頭面去來四肢攣急金瘡內痙治風通用瀉肺實散頭目中滯氣除上焦風邪之仙藥誤服瀉人上焦元氣又能去濕諸風藥皆然風能勝濕故也又藥中潤劑也身去身半以上風梢去身半以下風得澤瀉藁本療風得當歸芍藥起石禹餘糧療婦人子臟風乾薑味辛氣溫大熱氣薄味厚陽中之陰無毒秦椒為之使惡黃芩黃連主胸滿咳逆上氣溫中止血出汗逐風濕痹腸澼下痢生用辛能發散寒邪去風寒濕痹入肺利肺氣肺寒咳嗽與五味子同用以勝寒炮之則微苦故止而不移能溫中理脾治裡寒泄痢霍亂脹滿腹中冷痛中下焦寒濕又沉寒痼冷腎中無陽脈氣欲絶黑附子為引用又炮之與補陰藥同用能引血藥入氣分生血治血虛發熱故産後大熱必用之炒黑能止唾血痢血水瀉無度炙為末粥飲調一錢立效血痢燒黑不令成灰為末每服一錢米飲調下傷寒後陰陽易病取四兩為末湯調頓服覆衣被出汗生薑味辛甘氣微溫氣味俱輕陽也無毒去皮即熱留皮則冷殺半夏毒生者尤良主傷寒頭痛鼻塞咳上氣入肺開胃口益脾胃散風寒治痰嗽止嘔吐為嘔家之聖藥久服去臭氣通神明無病人夜不宜食之夜氣宜靜屢動氣故也佐大棗能厚腸生和半夏主心下急痛搗汁和蜜服主中熱不能食又汁和杏仁泥煎成膏水調服下一切結氣貫心胸壅膈冷熱氣神效治痢切如麻粒大和好茶煎一兩碗任意呷之大妙霍亂注痢轉筋欲死取三兩搗破以酒一升煮三四沸頓服之愈狐臭用汁塗腋下絶根本暴赤眼無瘡者以古銅錢刮淨薑上取汁於錢唇點目熱淚出今日點來日愈麻黃味苦甘氣溫氣味俱薄陽也升也無毒手太陽及足太陰經手少陰陽明經榮衛藥也厚朴為之使惡辛荑石葦立秋採莖陰乾令青陳久者良凡使用折去根節用水煮一二沸去沫不則令人煩悶主中風傷寒頭痛溫瘧發表出汗去邪熱氣止咳逆上氣除寒熱破症堅積聚發太陽少陰經汗出表上寒邪泄衛實去榮中寒消赤黑斑毒治身上毒風麻痹不仁不可多服令人虛根節能止汗小兒瘡疱倒黶黑者去節半兩以蜜一匙同炒良久水半斤煎沸去沫再煎去二分之一乘熱盡服之避風其瘡復出一法用無灰酒煎效更速白芷味辛氣溫氣味俱輕陽也無毒陽明經引經藥手陽明經本經藥當歸為之使惡旋覆花主女人漏下赤白血閉陰腫寒熱風侵頭目淚出長肌膚潤澤可作面脂去面瘢手陽明頭痛中風寒熱解利藥也治風通用去肺經風熱宜作寒治心腹血刺痛能蝕膿乳癰發背瘰癧腸風痔瘻一切瘡疥排膿止痛內託生肌又與辛荑細辛同用治鼻塞病藁本味辛苦氣溫氣厚味薄陽也升也無毒太陽經本經藥惡䕡茹畏青葙子採根曝乾三十日成主婦人疝瘕陰中寒腫痛腹中急除風頭痛長肌膚悅顏色太陽經風藥治寒邪結郁及本經頭痛頂顛痛大寒犯腦腦齒痛引諸藥上至顛頂清明前立秋後凡中霧露之氣皆濕邪中於上焦白木湯中加木香同治之此既治風又治濕也天麻味辛甘氣平無毒五月採根曝乾其苗名定風草主頭風諸風濕痹四肢拘攣小兒風癇驚氣利腰膝強筋力通血脈關竅久服益氣輕身長年又主諸毒惡氣鬼疰蠱毒支滿寒疝熱毒癰腫衍義云凡用須別藥相佐使然後見功仍須多用之赤箭一云即天麻苗也味辛氣溫無毒主殺鬼精物蠱毒惡氣消癰腫下支滿疝氣下血久服益氣力強陰肥健輕身增年赤箭則言苗用之有自表入里之功天麻則言根用之有自內達外之理枲耳實一名蒼耳味苦甘氣溫子熟時採日乾用忌食豬肉入藥炒用古今方多單用主風頭寒痛風濕周痹四肢拘攣惡肉死肌瘰癧疥癬瘙癢久服益氣耳目聰明強志輕身填髓暖腰腳葉味苦辛微寒治療同秦艽味苦辛氣平微溫陰中微陽手陽明經藥菖蒲為之使羅紋者佳主寒熱邪氣寒濕風痹肢節痛下水利小便療風無問久新通身攣急治五種黃病酒黃黃疸大效主傳尸骨蒸及時氣治下牙痛口瘡黃疸皮肉眼如金色小便赤心煩口乾用五兩牛乳三升煮取一升分溫再服瘥又方加芒硝一兩狗脊味苦甘氣平微溫無毒萆薢為之使惡敗醬細銼酒拌蒸從巳至申主腰背強關機緩急周痹寒濕膝痛頗利老人療失溺不節男子腳弱腰痛續筋骨堅利俯仰女子傷中白蘚味苦咸氣寒無毒惡螵蛸桔梗茯苓萆薢四月五月採根陰乾根皮良主頭風黃疽咳逆淋瀝女子陰中腫痛濕痹死肌不可屈伸起止行步治一切熱毒風風瘡疥癬赤爛眉發脫脆水萍味辛酸氣寒無毒水中大萍葉圓闊寸許背紫色三月採曝乾主暴熱身癢下水氣勝酒長鬚發主消渴久服輕身治時行熱病發汗甚有功五月取陰乾燒煙灰去蚊採萍歌云不在山兮不在岸採時須在七月半管甚癱風與緩風些少微風都不算豆淋酒內下三錢鐵撲頭上也出汗水腫小便不利搗汁飲之又末服方寸匕日二服良惡疾遍身瘡濃煮汁漬浴半月效此方甚奇古木賊味甘微苦無毒四月採去節銼以水潤濕火上熏用主目疾退翳膜益肝膽明目又消積塊療腸風止痢及婦人月水不斷又發汗至易得牛角角䚡麝香治休息痢歷久不瘥得禹餘糧當歸芎藭療崩中赤白得槐鵝桑耳療腸風下血又與槐子枳殼相宜主痔疾血出羊躑躅味辛氣溫有大毒惡諸石及面不入湯服二四月採花陰乾取花黃色羊誤食其藥躑躅而死主賊風在皮膚中淫淫痛溫瘧惡毒諸痹鬼疰蠱毒豨蘞味苦氣寒有小毒四五六月採葉曝乾主熱𧈟煩滿不能食生搗汁服二四合多則令人唾五月五日採葉及枝頭灑酒與蜜水九蒸九曝仍熬搗為末蜜丸如梧桐子大空心溫酒或米飲下二三十丸多服久服治中風偏麻痹骨間疼腰膝無力附子味辛甘氣溫大熱有大毒惡蜈蚣畏防風黑豆甘草黃耆人參烏韭冬月採為附子春月採為烏頭凡使水浸文武火炮令裂表裡皆黃折去皮臍用俗方每用須人參甘草生薑相配者制其毒也主風寒咳逆邪氣溫中金瘡破癥堅積聚血瘕寒濕踒躄拘攣膝痛不能行步腰脊風寒陰毒傷寒煩躁迷悶不省四肢厥逆心腹冷痛霍亂轉筋下痢赤白除腎中寒甚白朮為佐除濕之聖藥又墮胎為百藥之長通行諸經引用之藥入手少陽三焦命門性走而不守浮中沉無所不至陽中之陽故行而不止非若乾薑止而不行丹溪云童便煮而浸之以殺其毒且可助下行之力入鹽尤捷此佐使之藥世俗相襲用為治風及補藥殺人多矣治丁腫甚者生末醋調塗之干即再塗口噤卒不開用末納管中吹入喉中瘥久患口瘡生末醋面調男左女右貼腳心日再摻腳氣連腳腫滿久不瘥生末生薑汁調如膏塗敷腫上干再塗之烏頭味辛甘氣溫大熱有大毒遠志為之使反半夏栝蔞貝母白蘞白芨惡藜蘆忌豉汁春時初生有腦形似烏鳥之頭故名也主中風惡風洗洗出汗除寒濕痹咳逆上氣破積聚寒熱消胸上痰冷臍間痛肩胛痛不可俯仰又墮胎治風痹血痹半身不遂行經藥也其汁煎之名射罔味苦殺禽獸一名鳥喙主瘻瘡根結核瘰癧毒腫及蛇咬先取藥塗尖畔漸漸近瘡習習逐痛至骨瘡有熱膿及黃水出塗之若無膿水有生血及新傷肉破即不可塗立殺人中之者以甘草藍青小豆葉浮萍冷水解之天雄味辛甘氣大溫有大毒遠志為之使忌豉汁主大風寒濕痹歷節痛拘孿緩急關節重不能行步頭面風去來疼痛破積聚邪氣金瘡強筋骨輕身健行長陰氣強志令人武勇力作不倦又墮胎治一切風一切氣通九竅利皮膚調血脈消風痰側子味辛氣大熱有大毒是又附子旁尖並角削下者附子傍生絶小如大棗核者亦是主癰腫濕痹大風筋骨攣急歷節腰腳疼冷寒熱鼠瘻治遍身風疹冷酒調服神妙療腳氣亦多驗又墮胎附子烏頭烏喙天雄側子五物同出而異名似烏鳥頭者為烏頭又云原種者為烏頭兩歧狀如牛角者為鳥喙細長至三四者為天雄根旁如芋散生者為附子旁連生小者為側子烏頭旁出側子後世補虛寒須用附子仍取端平而圓大半兩以上者其力全風家即多用天雄亦取大者以其尖角多熱性不肯就下取其能散也半夏味辛微苦氣平生微寒熟溫陽中陰也有毒入足陽明經太陰經少陽經射干柴胡為之使惡皂莢畏雄黃生薑乾薑秦皮皂莢反烏頭陳久者良須用湯洗泡十許過令滑盡不爾戟人喉用此必須生薑制其毒服之忌羊內羊血飴糖主傷寒寒熱心下堅下氣喉咽腫疼頭眩胸脹咳逆腸鳴止汗能消痰涎止嘔吐調胃健脾治胸中寒痰痞塞太陰痰厥頭痛非此不除又治痰瘧墮胎摩塗消癰腫生令人吐熟令人下脾惡濕半夏能燥濕勝水所以化痰而益脾又諸血證禁用之渴者去之燥津液也妊娠婦薑炒用之蠍螫人水研塗之立止産後暈絶一兩搗為末冷水丸如大豆納鼻孔中即愈此扁鵲法也天南星味苦辛氣平有毒畏附子乾薑生薑入藥炮用主中風除風痰麻痹下氣破堅積消癰腫利胸膈散金瘡撲損瘀血蛇蟲咬疥癬惡瘡墮胎丹溪云欲其下行以黃柏引之中風牙噤不開取末和龍腦少許擦牙二三十遍即開破傷風防風等分同為末醋調上貼何首烏以人名稱味甘苦澀氣微溫無毒茯苓為使忌豬羊血惡萊蔔春夏採根以苦竹刀切米泔浸經宿曝乾木杵臼搗之忌鐵有雌雄二種雄者色赤雌者色白凡修合須雌雄相合本名交藤一名夜合因何首烏服之而得名主瘰癧消癰腫療頭面風瘡五痔腰膝止心痛益血氣黑髭鬚悅顏色久服長筋骨益精髓延年不老令人有子亦治婦人産後及帶下諸疾凡服為末酒調威靈仙味苦氣溫無毒忌茗及麵湯冬月丙丁戊己日採根陰乾主諸風濕令通十二經脈治大風皮膚風癢痛風在上下去大腸風宣通五臟去腹內冷滯心膈痰水久積癥瘕痃癖氣塊膀胱宿膿惡水腰膝冷痛腳疾不能履及治折傷多服疏人真氣虛者禁用腰膝痛腳腫不履酒洗為末空心溫酒調下二錢或蜜丸溫酒下二三十丸仙茅味辛氣溫有毒以米泔浸赤汁出毒忌犯鐵器及食牛乳及黑牛肉主心腹冷氣不能食腰腳風冷攣痹不能行丈夫虛勞老人失溺益陽道久服通神強記助筋骨益肌膚長精神明耳目白附子味甘辛氣溫無毒一云有小毒三月採凡用炮主心痛血痹面上百病行藥勢治中風失音諸風冷氣疥癬風瘡頭面痕陰囊下濕腿無力又宜入面脂高良薑味辛苦氣大溫純陽無毒主暴冷胃中冷逆衝心霍亂腹痛反胃嘔食轉筋瀉痢健脾胃消宿食萆薢俗名土茯苓味苦甘氣平無毒薏苡為之使畏葵根大黃柴胡牡蠣主腰背痛強骨節風寒濕周痹惡瘡不瘳熱氣傷中恚怒陰痿失溺關節少血老人五緩葫蘆巴味苦氣溫純陽云是番蘆蔔子春生苗夏結子至秋採之主元臟虛冷氣最要得附子硫黃治腎虛冷腹脅脹滿面色青黑得蘹香子桃仁治膀胱氣甚效白頭翁味甘苦氣溫一云寒無毒一云有毒得酒良四月採主溫瘧狂易寒熱癥瘕積聚腹痛癭氣項下瘤癧治赤毒痢甚效逐血止痛療金瘡鼻衄齒痛一切風氣及百節骨痛暖腰膝阿魏味辛氣平熱無毒性極臭而能止臭亦奇物也凡使先於淨鉢中研如粉蒸於熱酒器上滾過任用主殺諸少蟲去臭氣破症積下惡氣治心腹痛闢瘟治瘧治傳尸邪鬼蠱毒木香味辛苦氣溫味厚於氣陰中陽也無毒形如枯骨油重者良主邪氣闢毒疫瘟鬼主淋露久服強志不夢寤魘寐調諸氣散肺中滯氣行肝氣若治中下焦氣結滯須檳榔為使治心腹積年冷氣痃癖脹痛九種心痛女人血氣刺痛酒末服之治腹中氣不轉運和胃氣止霍亂吐瀉嘔逆反胃安胎健脾火煨實大腸和黃連治痢疾又得生薑橘皮相佐使絶佳又療癰腫毒又御霧露之氣久痢不愈取一塊方圓一寸黃連半兩水升半煎同干去黃連薄切焙乾為末作三服一服橘皮湯下二服陳米湯下三服甘草湯下蘹香子一名茴香味辛氣平無毒入手足少陰經太陽經陰乾得酒良入藥炒用主諸瘻霍亂和諸食中甚香破一切臭氣開胃下食止嘔吐調中止痛主幹濕腳氣膀胱冷氣腫痛或連髀間疼痛攣引入小腹不可忍腎勞㿗疝又療惡毒取苗葉搗汁服之日三用滓貼腫上冬月用根零陵香古謂薰草亦即蕙香也味甘辛氣平無毒得酒良主邪惡氣心腹痛滿下氣酒煎服可止痛癘風牙齒痛煎含良婦人浸油飾發香無以加肉豆蔻一名肉果味苦辛氣溫無毒入手陽明經湯搜米麵粉裹灰火中煨黃熟用油色肥實佳溫中開胃下氣消食治積冷心腹脹痛霍亂中惡脾胃虛冷氣並冷熱虛泄赤白痢小兒傷乳吐逆泄瀉之要藥凡痢以白粥飲服霍亂氣並生薑湯服草豆蔻一名草果味辛氣溫陽也無毒入足太陰陽明經麵包煨熟用主溫中心腹痛嘔吐霍亂治風寒客邪在胃口善去心胃客寒作痛調散冷氣力甚速消酒毒去口臭氣治食積寒瘧甫考草豆蔻即今之草果是也故前人編在果部本草經云其形如圓眼當作荔枝但頗鋭而殼微淡紅有紋稜其中子如石榴子其氣味極辛土人鮮採醃作果以消食解酒此正切於草果之形狀出處治療何其詳備奈何今世之醫不考其真而怪夫本草經遺而不載卻又別尋草豆蔻謂難得其真所以在處用之不同江南多以建寧草仁為豆蔻江北有以辣子為豆蔻其於本草經形狀出處大不然矣今之好事者又於別集新添草果之條妄意混注更不考草豆蔻即其真此其失又甚於不考者也白豆蔻一名肉果味辛氣大溫味薄氣厚陽也無毒主積冷氣止吐逆反胃谷下氣胃冷宜服又散肺中滯氣入肺經別有清高之氣上焦元氣不足以此補之紅豆蔻味辛溫無毒主腸虛水瀉心腹攪痛霍亂嘔吐酸水解酒毒不宜多服令人舌粗不思飲食消瘴霧氣毒去宿食治冷氣腹痛吐泄痢疾生南海諸谷云是高良薑子其苗如蘆葉似薑花作穗嫩葉卷而生微帶色縮砂蜜君即砂仁味辛苦氣溫無毒主虛勞冷瀉宿食不消赤白泄痢止休息痢溫脾下氣治脾胃氣結滯不散腹中虛冷痛又能安胎行氣故也與白檀香豆蔻為使則入肺與人參益智為使則入脾與黃柏茯苓為使則入腎與赤白石脂為使則入大小腸妊娠因氣動胎痛不可忍炒熟搗為末酒調服二錢蓽澄茄味辛氣溫無毒嫩胡椒青時採者主下氣消食腹間氣脹心腹冷痛霍亂吐瀉腎氣膀胱冷古方偏用染髮使君子味甘氣溫無毒始因郭使君療小兒用此物後因名之用仁或兼用殼主小兒五疳小便白濁殺蟲療瀉痢蘆薈味苦氣寒無毒出波斯國似黑餳水滴脂淚而成主熱風煩悶胸膈間熱氣明目鎮心小兒諸熱癇癲驚風療五疳殺三蟲及痔病瘡瘻解巴豆毒患癬在頭項間延上耳頰用一兩研炙甘草半兩末和勻先以溫漿水洗過帛拭乾敷之神效𧈟齒取四分末先以鹽揩齒洗淨後敷上京三稜味苦辛氣平陰中之陽無毒黃色體重狀若鯽魚而小火炮用主治老癖癥瘕結塊婦人血脈不調心腹痛落胎消惡血色白屬氣破血中之氣損真氣虛者勿用蓬莪朮味苦辛氣溫無毒火炮醋炒用得酒醋良主心腹痛中惡疰忤鬼氣霍亂冷氣飲食不消酒研服之又療婦人血氣痛破痃癖氣最良通月經消瘀血治積聚諸氣為最要藥婦人藥中多用色黑屬血破氣中文血入氣藥能發諸香大黃使味苦氣大寒味極厚陰中之陰降也無毒入手足陽明經黃芩為之使無所畏火干凡有用蒸有生有熟或酒浸或酒洗錦紋者佳主下瘀血血閉寒熱破癥瘕積聚留飲宿食蕩滌腸胃推陳致新通利水道調中化食安和五臟性走而不守瀉諸實熱不通心腹脹滿下大使燥結號稱將軍取其蕩滌峻快也又敷貼一切瘡癤癰腫酒浸引之上至巔入太陽經以舟楫載之可浮胸中若用於下不用酒浸洗得芍藥黃芩牡蠣細辛茯苓療驚恙怒心下悸氣得硝石紫石英桃仁療女子血閉葶藶味辛苦氣大寒無毒榆皮為之使惡殭蠶立夏後採實陰乾炒用得酒良主瘕癥積聚結氣飲食寒熱破堅遂邪通利水遂走泄為功大降氣治皮間邪水上出面目浮腫及肺壅上氣咳嗽喘促痰飲又治肺癰喘不得臥久服令人虛病人涉虛者宜遠之澤瀉味甘咸氣寒味厚陰也陰中微陽無毒入足太陽經少陰經畏海蛤文蛤主風寒濕痹乳難消水養五臟益氣力肥健久服耳目聰明不飢延年輕身面生光能行水上入膀胱腎經治淋閉逐膀胱三焦停水瀉腎邪去陰間汗除濕行水為最要之藥多服病人眼行去其水故也凡服此者小便多則腎氣必虛古方止泄精今不敢用旋花味甘氣溫無毒五月採陰乾主益氣去面皯黑色媚好其根味辛主腹中寒邪氣利小便久服不飢輕身旋覆花味鹹甘氣溫一云冷利有小毒六月採花日乾花如菊深黃色呼為金錢花主結氣痰飲脅下滿驚悸除水利大腸去五臟間寒熱補中下氣治頭風明目消胸中痰結唾如膠漆病人稍涉虛者不宜多服傷寒汗下後心下痞堅噫氣不除者宜此根主濕葉主敷金瘡止血石龍芻一名龍鬚即今作席者味苦氣微寒無毒五月七月採莖八月九月採根主心腹邪氣小便不利淋閉風濕鬼疰惡毒療蛔蟲除熱久服補虛羸輕身耳目聰明延年通草臣今謂之木通味辛甘氣平味薄陽也無毒正月採枝陰乾去皮用主去惡蟲除脾胃寒熱通利九竅血脈關節令人不忘治五淋利小便導小腸熱治脾疸疾常欲眠心煩噦出音聲療耳聾治鼻塞散癰腫諸結不消及金瘡惡瘡喉痹鼠瘻踒折齆鼻瘜肉女人血閉催生墮胎下乳通脫木俗名通草輕白可愛女工取以節物也亦能利陰竅行小水主蠱毒其花上粉主諸蟲瘻惡瘡痔疾取粉納瘡中瞿麥臣味苦辛氣寒陽中微陰無毒蓑根牡丹為之使惡螵蛸立秋採實陰乾主關格諸癃結小便不通出刺癰腫排膿明目去翳破胎墮子下閉血養腎氣逐膀胱邪氣竹木刺入肉中不出為末水服方寸匕或煮汁飲之百合味甘氣平無毒花白者入藥佳主邪氣腹脹心痛利大小便補中益氣除浮腫腹脹痞滿寒熱通身疼痛百邪鬼魅涕泣不止狂叫驚悸殺蠱毒乳癰喉痹發背及諸瘡腫張仲景治傷寒壞後百合病須此病名百合而治以百合不識其義紫草味苦氣寒無毒三月採陰乾可以染紫者主心腹邪氣五疸補中益氣利九竅通水道療腹脹腫滿合膏療小兒瘡及面皶治傷寒時疾發瘡疹不出者服此使其發出單煮湯飲治豌豆瘡其效尢速又云細銼一兩百沸湯大盞泡便以物合定勿令泄氣候溫量兒大小服半合至一合須出當輕減萱草根味甘氣寒無毒五月採花八月採根治沙淋下水氣主酒疸黃色通身音取根搗汁服亦取嫩苗煮食之又主小便赤澀身體煩熱根洗淨研汁一大盞生薑汁半盞相合時時細呷治大熱衄血又取根細切酒煎服治破傷風神效花名宜男懷妊婦人佩之則生男燈芯草即前龍芻重出根及苗主五淋生煮服苗可以為席故席煮服更良燈芯燒灰存性取少許吹喉中治急喉痹甚捷塗乳上與少兒吃治夜啼酸漿味酸氣平寒微無毒入家園圃中俱有開白花結青殼熟則深紅殼中有子如櫻桃大赤紅色五月採陰乾用主煩熱滿定志益氣利水道産難吞其實立産小兒食之能除熱有益根絶苦搗汁飲之治黃疸多效石葦味苦甘氣平微寒無毒杏仁為之使得菖蒲良生山谷石上不聞水聲及人聲者良三月採葉陰乾用之去黃毛毛射入肺令人咳不可療入藥微炙用主勞熱邪氣五癃閉不通利小便水道止煩下氣補五勞安五臟去惡風益精氣南人炒末冷酒服療發背效海藻味苦咸氣寒無毒一云有小毒反甘草七月七日採曝乾主癭瘤氣頸下核破散結氣癱腫癥瘕堅氣腹中上下鳴下十二水腫主闢百邪鬼魅治氣疾急滿療疝氣下墜痛核腫治頷下瘰癧如梅李取一斤洗淨酒浸數日稍稍飲之又治頸下卒結囊欲成癭同前法又同昆布等分為末蜜丸如杏核大含之稍稍咽下澤蘭味苦甘辛氣微溫無毒香草也有枝梗葉如菊而尖長微香防己為使主乳婦內衄中風余疾大腹水腫身面四肢浮腫骨節痛金瘡癱腫瘡瘍通九竅利關脈養血氣治産前後百病昆布味鹹氣寒無毒一云小毒主十二種水腫癭瘤聚結氣瘻瘡凡海中菜皆療痿瘤結氣又㿗卵腫煮汁咽之甘遂味苦甘氣大寒有毒瓜蒂為之使惡遠志反甘草陰乾連珠者良主大腹疝瘕腹滿面目浮腫留飲宿食破癥堅積聚利水道水結胸中非此不除其氣直透所結處專於行水攻決為用入藥須斟酌大戟味苦甘氣寒陰中微陽有毒小豆為之使反甘草畏菖浦蘆草鼠屎十二月採根陰乾主蠱毒十二水腫腹滿急痛積聚癥結中風皮膚疼痛吐逆善治瘀血通月水墮胎孕又治頸癰腫澤漆大戟苗也味苦辛氣微寒無毒一云微毒小豆為之使惡薯蕷三月三日七月七採莖葉陰乾主皮膚熱大腹水氣四肢面目浮腫丈夫陰氣不足蕘花味苦辛氣寒有毒主傷寒溫瘧下十二水腫破積聚大堅癥瘕蕩滌腸胃留癖飲食寒熱邪氣利水道痰飲咳逆芫花味辛苦氣溫有毒決明為之使反甘草陰乾凡用微熬不可近眼主咳逆上氣喉鳴喘咽腫短氣蠱毒鬼瘧疝瘕癰腫消胸中痰水善唾水腫五水在五臟皮膚及腰痛久服令人虛殺蟲魚其根療疥瘡可用毒魚商陸味辛甘酸氣平有毒忌犬肉有赤白二種花赤者根赤花白者根白白者入藥用赤者見鬼神甚毒但貼腫外用不可服主水脹疝瘕痹尉除癰腫殺鬼精物瀉蠱毒敷惡瘡療胸中邪氣滿十種水墮胎如人形者有神水腫取生者去皮切如小豆許一大盞以水三升煮二升爛即取粟米一大盞煮成粥空心服一度不得雜食又切生根雜生鯉魚肉煮作湯又取六七兩搗汁三合和酒半升看大小相度服利下水瘥痹不通薄切醋蒸腫去敷之石癰堅如石不作膿搗生根搽之燥即易取軟為度一切熱毒腫和鹽少許搗效之日再易牽牛子味苦氣寒屬火善走有毒有黑白二種用黑者炒用之主下氣療腳滿水腫除風毒利大小便落胎以氣藥引之則入氣以血藥引之則入血大瀉元氣用者戒之不脹滿不大便祕者勿用羅謙甫云牽牛味辛烈瀉人元氣若病濕氣勝不得施化致大小便不通則宜用之然濕病之根在下焦是血分中氣病不可用辛辣氣藥瀉上焦太陰之氣也凡人飲食勞倦皆血受病率以此藥瀉之是血病瀉氣使氣血俱虛也萆麻子味甘辛氣平屬陰有毒主水癥水脹又主身體瘡癢疥癩浮腫尸疰惡氣榨取油塗之其藥治腳風腫催生及胞衣不下取七枚研如膏塗腳底心子及衣下速洗拭去不爾腸出即用此膏塗頂腸當自入一切腫毒疼痛搗敷瘥水癥水研二十枚服之吐惡沫加至三十枚三日一服瘥則止㽱風手指牽曲鼻塌去皮擘為二片黃連等分銼如豆用水浸春夏二四日秋冬五六日取一片平旦日中面東用浸藥水吞下水少旋添勿令乾漸加至三四枚微利不妨瘰癧炒熟去皮爛嚼臨睡服二三枚漸加至八九枚效海金沙主通利小腸得梔子馬牙硝共療傷寒熱狂白兔藿一名白葛味苦氣平無毒主蛇虺蜂蠆猘狗菜肉蠱毒鬼疰風疰諸大毒不可入口者皆消除之又去血可抹著痛上立消毒入腹煮飲即解徐長卿味辛氣溫無毒三月採主鬼物百精蠱毒疫疾邪惡氣溫瘧久服強悍輕身大青味苦氣大寒無毒三四月採莖葉陰乾主療時氣天時熱疾頭痛大熱口瘡及金石藥毒薺苨味甘氣寒形如桔梗今人謂之土人參亦有改造以混今參也主解百藥毒殺蠱毒蟲咬熱狂溫疾取根搗末或生汁服之出毒箭封疔毒鉤吻味辛氣溫有大毒半夏為之使惡黃芩葉似黃精而頭尖處有兩毛不入湯主金瘡乳癰中惡氣咳逆上氣水腫殺鬼疰蠱毒殺烏獸太上曰太陰之精名曰鈞吻食之入口則死常山味苦辛氣寒有毒畏玉札忌蔥及菘菜雞肉陰乾如骨者佳主傷寒發熱溫瘧鬼毒胸中痰結吐逆療鬼蠱往來灑灑惡寒得甘草吐瘧效不可多服令人大吐年老及久病人服之能傷真氣病人稍近虛怯勿用蜀漆常山苗也味辛氣平微溫純陽有毒栝蔞桔梗為使五月採葉陰乾主瘧及咳逆寒熱腹中癥堅痞結積聚邪氣蠱毒鬼疰多服令人吐逆狼毒味辛氣平有大毒大豆為之使惡麥句薑二八月採根陰乾陳而沉水者良主咳逆上氣破積聚飲食寒熱水氣脅下積癖惡瘡鼠瘻疸蝕鬼精蠱毒殺飛鳥走獸亦殺鼠牙子味苦酸氣寒有毒蕪荑為使惡地榆八月採根曝乾中濕腐爛生衣者殺人主邪氣熱氣疥瘙惡瘍瘡痔去白蟲治婦人陰瘡中爛煎湯洗之又治蛇毒蠟月豬脂搗和敷上立瘥鬼臼味辛氣溫有毒畏垣衣不入湯主殺蠱毒鬼疰精物辟惡氣不祥逐邪解百毒續隨子即千金子味辛氣溫有毒主婦人血結月閉症癖痃癖瘀血蠱毒鬼疰心腹痛冷氣脹滿利大小腸除痰飲積聚下惡滯物莖中白汁剝人面皮去皯𪒟鶴蝨味苦氣平存小毒主蛔蟯蟲咬心腹痛用之為散以肥肉臛汁服方寸匕亦丸散中用治殺蟲最要蚤休即紫河車俗呼重樓金線味苦氣微寒有毒五月採根日乾主驚癇搖頭弄舌熱氣在腹中癲疾癰瘡陰蝕下三蟲去蛇毒解百毒癰毒醋磨敷甚效亦磨酒調服預知子味苦氣寒無毒採無時其實如皂莢子去皮研服之主殺蟲療蠱治諸毒天行溫疾敷一切蛇蟲咬傳云取二枚綴衣領上遇蠱毒物則聞其有聲當便知之故名又云雙仁者可帶水蓼味辛無毒生水澤中莖赤葉大於家蓼主蛇毒搗敷之絞汁服止蛇毒入心水煮漬腳消氣腫絡石味苦氣溫微寒無毒杜仲牡丹為之使畏貝母菖蒲絡木石而生莖節著處即生根鬚凌冬不凋葉圓如細橘正青花白子黑採莖葉日乾附石者良薜荔木蓮地錦石血等其類主風熱死肌癰瘍口乾舌焦癰腫不消喉舌腫水漿不下除邪氣養腎主腰髖痛堅筋骨利關節強腰腳久服輕身明目潤澤好顏色不老延年久服汁去蛇毒心悶刀斧諸瘡封之立瘥喉痹不通須臾欲絶取二兩水一升煎一大盞細細吃須臾即通背癰取莖葉爛研絞汁和蜜或酒飲數升大妙營實薔薇子也味酸氣溫微寒無毒白花者良陰乾根莖葉同功冬取根夏取莖葉主癰疽惡瘡結肉跌損敗瘡熱氣陰蝕不瘳利關節治頭瘡白花久服輕身益氣根止泄利腹痛五臟客熱除邪益氣疽癩諸瘡金瘡傷處生肉復肌蛇床子味苦辛甘氣乎無毒一云小毒惡牡丹巴豆貝母五月採實陰乾凡入藥捋去皮殼取仁微炒若作湯洗瘡則生肌主婦人陰中腫痛男子陰癧濕癢除痹氣利關節癲癇惡瘡溫中下氣令婦人子臟熱男子陰強治腰胯疼四肢頑痹陰汗濕癬浴男子陰去風冷大風身癢煎湯浴之瘥久服輕身好顏色令人有子主溫中藥取仁為末白粉少許和勻相得如棗大綿裹納之陰戶痛及産後陰下脫取子絹袋盛蒸尉之王不留行味苦甘氣平陽中之陰無毒二月八月採根苗花子並用主金瘡止血逐痛出刺除痹內寒風毒風疹癰疽惡瘡瘻乳婦人難産及經脈不勻竹木針刺在肉中不出疼痛為末熟水調方寸匕即出敗醬味苦咸氣平微寒無毒入足少陰經手厥陰經氣如敗豆醬故名主暴熱火瘡赤氣疥瘙疽痔馬鞍熱氣除癰腫結氣風痹破多年凝血能化膿為水催生落胎及産後諸病止腹痛仲景用治腹癰下膿惡實即牛蒡子又名鼠黏子味辛苦氣平秋後採子酒拌蒸用冬採根蒸暴乾不爾令人吐主明目利腰膝療風毒腫瘡疹喉痹風熱痰壅咽膈不利牙齒疼痛頭面浮腫吞一枚可出癰瘡頭根亦主風毒癰疽惡瘡浸酒去風根莖生搗汁和酒服療傷寒寒熱汗出中風面腫搗根及葉入鹽少許封熱毒腫敷杖瘡金瘡永不畏風取汁夏月多浴去皮膚習習如蟲行風癱緩及丹石毒風毒明目利腰腳取子末之投酒中浸日每日飲一二盞隨性多少風熱閉塞咽喉遍身浮腫取子一合半生半熟杵末酒調下一錢瘥瘡庖將出炒子令熟杵為末每服一錢荊芥二穗水煎七分溫服如瘡疹已出更服亦妙皮膚風熱遍身生癮疹取子與浮萍等分為末薄荷湯調一錢日二服白藥味辛氣溫無毒主金瘍生肌治喉中熱塞常服消腫毒解熱毒甚效諸瘡癰腫不散取生根爛搗敷貼無則生用末水調塗之乾薹即海中苔菜味鹹氣寒主痔殺蟲及霍亂嘔吐不止煮汁服之又心腹煩悶冷水研如泥飲之即止下一切丹石殺諸藥毒不可多食令人痿黃少血色殺木蠹蟲內木孔中凡海族之流皆下丹石草蒿即青蒿味苦氣寒無毒四月採苗日乾根莖花葉併入藥四者勿同用春夏用苗秋冬用子主疥瘙痂癢惡瘡殺蟲生搗敷金瘡止血生肉止痛又主鬼氣尸疰伏連婦人血氣腹內滿及冷熱久痢止瀉開胃明目黑毛髮治勞瘦留熱在骨節間童便浸之良心痛熱黃生搗汁服並敷之瀉痢飯飲調末五錢或入生薑煎濃汁服骨蒸勞熱細銼入童便浸大釜中煎半去滓再以微火煎成膏丸如梧桐子大空心既臥酒下二十丸鬼氣取子為末酒服方寸匕惡瘡臭肉燒灰淋汁和石灰煎藜蘆味辛苦氣寒有毒黃連為之使反細辛芍藥五參惡大黃二月採根陰乾去蘆頭微炒用不入湯主蠱毒咳逆泄痢腸澼頭瘍頭禿疥瘙惡瘡殺諸蟲毒去死肌療喉痹不通治馬刀爛瘡及馬疥癬吐上膈風痰暗風癇病取一兩濃煎防風湯浴過焙乾微炒作末溫水下半錢吐為度射干即鳥翣根味苦氣平微溫有毒三月三日採根陰乾主咳逆上氣咳唾言語氣臭喉痹咽痛不得消息散結氣消腫毒行太陰厥陰之積痰使結核自消甚捷腹中邪逆飲食大熱胸滿腹脹通女人月閉消瘀血久服令人虛治便毒足厥陰濕氣因勞而發取三寸與生薑同煎食前服利三兩行效山豆根味甘當作苦無毒主解諸藥毒止痛消瘡腫殺小蟲寸白蟲含口中解咽喉痛腫解毒人馬急發黃咳嗽患禿瘡水研敷之蛇含味苦氣微寒無毒陰乾主驚癇寒熱邪氣除熱金瘡疽痔鼠瘻惡瘡頭瘍丹疹治蛇蟲蜂虺咬白蘞味苦甘氣平微寒無毒一云有毒代赭為之使反烏頭主癰腫諸瘡散結氣止痛除熱目中赤小兒驚癇溫瘧女子陰中腫痛殺火毒湯火瘡刀箭瘡白蘞白芨古今服餌方少用多用於斂瘡方中疔腫發背水調末敷之良白芨味苦辛氣平微寒陽中之陰無毒紫石英為之使惡理石畏杏仁主癰腫惡瘡敗疽傷陰死肌胃中邪氣賊風鬼擊痱緩不仁除白癬疥蟲羊蹄味苦氣寒屬水無毒取根用主頭禿疥瘙除熱女子陰蝕浸淫疽痔殺蟲醋磨貼腫毒塗癬立效連翹味苦氣平微寒氣味俱輕陽也無毒手足少陽經陽明經藥入手少陰經陰乾主寒熱鼠屢瘰癧癰腫惡瘡癭瘤結熱蠱毒有神功瀉心火降脾胃濕熱通利五淋及月經除心經客熱尤宜小兒治血證以防風為上使連翹為中使地榆為下使百草灰五月五日採露取之一百種陰乾燒灰以井花水為團或重煉以醋和為餅主腋臭及金瘡腋臭腋下挾之干即易當抽一身痛悶瘡出即止以水及小便洗之不過三度愈金瘡止血生肌刮敷瘡上䕡茹味辛酸氣寒有小毒甘草為之使惡麥門冬五月採根陰乾黑頭者良主蝕惡肉敗瘡死肌殺疥蟲排膿惡血除大風熱氣善忘不樂金星草味苦氣寒無毒凌冬不凋葉背冬生黃星點子兩行相對如金色五月和根採風乾主癰疽瘡毒大解硫黃及丹石毒發背癰結核用葉和根酒煎服之先服食藥悉下毒去瘡愈或作末冷水服及塗瘡腫上殊效根碎之浸油塗頭大生毛髮老年人不可輒服紫葛味甘苦氣寒無毒生山谷中三月四月採根皮日乾不入方用主癰腫惡瘡取根皮搗末醋和封之蒲公英即黃花地丁味苦氣平無毒入陽明太陰經四五月採主婦人乳癰腫水煮汁飲之搗封之立消一名構耩耨草葉如苦苣花似小菊先春開花花罷飛絮潰堅散腫消結核有奇功解石毒散滯氣穀精草味辛氣溫無毒二三月谷田中採之主喉痹牙齒風痛口舌諸瘡明目去翳又餵驢馬主蟲顙毛焦等病牛扁味苦氣微寒無毒主身皮瘡熱可作浴湯殺牛蝨小蟲又療牛病夏枯草味苦辛氣寒無毒稟純陽之氣得陰氣則枯王瓜為使四月採主寒熱瘰癧鼠瘻頭瘡破症散癭腳腫濕痹輕身鴨跖草味苦氣大寒無毒葉如竹花深碧有角如鳥嘴花好為色主寒熱瘴瘧痰飲丁腫小兒丹毒發熱狂癇腹痞又治熱痢蛇犬咬癰疽等毒山茨菰根有小毒主癰腫瘡瘻瘰癧結核等醋磨敷之又取莖葉搗為膏入蜜貼瘡口上清血出效芮實檾麻子也味苦氣平無毒主赤白冷熱痢炒為末蜜漿水調服各一枚破癰腫葉似苧高四五尺秋間取皮為索蠡實即馬藺子也味甘平溫無毒除胃熱風寒濕痹堅筋骨利大小便止煩滿産後血暈婦人崩中帶下止吐衄消腫毒一名荔實月令云荔挺出是也注云葉似蒲根可為刷久服長肌膚令人肥健
