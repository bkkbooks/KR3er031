body:
  text: 卷之九十四本草集要上本草圖經敘昔神農嘗百草之滋味以救萬民之疾苦後世師祖由是本草之學興焉漢魏以來名醫相繼傳其書者則有吳普李當之藥録陶隱居蘇恭等注解國初兩詔近臣總領上醫兼集諸家之説則有開寶重校本草其言藥之良毒性之寒溫味之甘苦可謂備且詳矣然而五方物産風氣異宜名類既多贋偽難別以虺床當蘼蕪以薺苨亂人參古今猶且患之況今醫師所用皆出於市買所得蓋自山野之人隨時採獲無復究其所從來以此為療欲中病不亦遠乎昔唐永徽中刪定本草之外復有圖經相輔而行圖以載其形色經以釋其異同而明皇御製又有天寶單方藥圖皆所以敘物真濫使人易知原診處方有所依據二書失傳且久散落殆盡雖鴻都祕府亦無其本天寶方書但存一卷類例粗見本末可尋宜乎聖君哲輔留意於搜輯也先詔命儒臣重校神農本草等凡八書光祿卿直祕閣臣禹錫尚書祠部郎中祕閣校理臣億太常博士集賢校理臣頌殿中丞臣檢光祿寺丞臣保衡相次被選仍領醫官秦宗古朱有章等編繹纍年既而補注本草成書奏御又詔天下郡縣圖上所産藥本用永徽故事重命編理臣禹錫以諸考正群書資衆見則其功易就論著文字出異手則其體不一今天下所上繪事千名其解説物類皆據世醫之所聞見事有詳略言多鄙俚向非專一整比緣飾以文則前後不倫披尋難曉乃以臣頌向嘗刻意此書於是建言奏請俾專撰述臣頌既被旨則裒集衆説類聚詮次粗有條目其間玉石金土之名草木蟲魚之別有一物而雜出諸群者有同名而形類全別者則參用古今之説互相發明其荄梗之細大華實之榮落雖與舊説相戾併兼有之崖略不備則稍援舊注以足成文意注又不足乃更旁引經史及方書小説以條悉其本原若陸英為蒴藋花則據爾雅之訓以言之諸香本同則用嶺表録異以證之之類是也生出郡縣則以本經為先今時所宜次之若菟絲生於朝鮮今則出於冤句奚獨生於少室今乃來自三蜀之類是也收採時月有不同者亦兩全其説若赤箭本經但著採根今乃並取莖苗之類是也生於外夷者則據今傳聞或用書傳所載若玉屑玉泉今人但云玉出於于闐不究所得之因乃用平居誨行程記為質之類是也藥有上中下品皆用本經為次第其性類相近而人未的識或出遠方莫能形似者但於前條附之若溲疏附於枸杞琥珀附於茯苓之類是也又方書所載簡而要者昔人已述其明驗今世亦嘗用之及今諸郡醫工所陳經效之藥皆並載其方用天寶之例也自余書傳所無今醫又不解則不敢臆説淺見傅會其文故但闕而不録又有今醫所用而舊經不載者並以類次繫於末卷曰本經外類其間功用尤著與舊名附近者則次於逐條載之若通脫次於木通石蛇次於石蟹之類是也總二十卷目録一卷撰次甫就將備親覽恭惟主上以至仁厚德函養生類一物失所則為之惻然且謂札瘥薦至四時代有救恤之惠無先醫術早歲屢敕近臣酬校岐黃內經重定針艾俞穴或範金揭石或鏤板聯絲憫南方蠱惑之妖於是作慶曆普救方以賜之思下民資用之闕於是作簡要濟衆方以示之今復廣藥譜之未備圖地産之所宜物色萬殊指掌斯見將使合和者得十全之效飲餌者無未達之疑納斯民於壽康召和氣於窮壤太平之致茲有助焉臣學不該通職預編述仰奉宸旨深愧寡聞嘉祐六年九月日朝奉郎太常博士充集賢校理新差知穎州軍州兼管內勸農及管開治溝洫河道事騎都尉借紫臣蘇頌謹上雷公炮製論敘苦夫世人使藥豈知自有君臣既辨君臣寧分相制只如栨毛今鹽草也沾溺立消斑腫之毒象膽揮黏乃知藥有情異鮭魚插樹立便乾枯用狗膽塗之以犬膽灌之插魚處立如故也卻當榮盛無名無名異形似玉仰面又如石炭味別止楚截指而似去甲毛聖石開盲明目而如雲離日當歸止血破血頭尾效各不同頭止血尾破血蕤仁足睡不眠生熟驗之立據箅淡型滷常使飯甑中箅能淡鹽味如酒沾交今蜜枳繳枝又云交加枝鐵遇神砂如泥似粉石經鶴糞化作塵飛栨見橘花如漿似髓斷絃折劍遇鸞血而如初以鸞血煉作膠黏折處永不斷也海竭江枯投遊波燕子是也而立泛令鉛拒火須仗修天今呼為補天石如要形堅豈忘紫背有紫背天葵如常食菜只是背紫面青能堅鉛形留砒住鼎全賴宗心別有宗心草今呼石竹不是食者心恐誤其草出欻州生處多蟲獸雌得芹花此草名為立起其形如芍藥花色青可長三尺葉上黃斑色味苦澀堪用煮雌黃立住火立便成灰炮遇赤須其草名赤須今呼為虎鬚草是用煮硇砂即住火驗木留金鼎水中生火非猾髓而莫能海中有獸名曰猾以髓入在油中其油沾水水中生火不可救之用酒噴之即滅勿放屋下收長齒生牙賴雄鼠之骨末其齒若折年多不生者取雄鼠脊骨作末揩折處齒立生如故發眉墮落塗半夏而立生眉發墮落者以生半夏莖搗之取涎塗發落處立生目闢眼𥍃有五花而自正五加皮是也其葉有雄雌三葉為雄五葉為雌須是五葉者作末酒浸飲之其目𥍃者正腳生肉栨裩系菪根腳生肉栨者取莨菪根於裩帶於系之感應永不痛囊皺泉多夜煎竹木多小便者夜煎萆薢一件服之永不夜起也益智萆薢故名縮泉丸體寒腹大全賴鸕鷀若患腹大如鼓米飲調鸕鷀末服立枯如故也血泛經過飲調瓜子甜瓜子內仁搗作末去油飲調服之立絶咳逆數數酒服熟雄天雄以酒泡過一錢匕服立定遍體疹風冷調生側附子傍生者曰側子作末冷酒調服立瘥腸虛瀉痢須假草零搗五倍子作末以熱水調服之立止久渴心煩宜投竹瀝除癥去塊全仗硝硇硝硇即硝石硇砂二味於乳鉢中研作粉同煅了酒調服神效益食加觴須煎蘆朴不食者並飲酒少者煎逆水蘆根並厚朴二味湯服強筋健骨須是蓯鱓蓯蓉並鱓魚二味作末以黃精汁丸服之可力倍常十也出乾寧記中駐色延年精蒸神錦出顏色服黃精自然汁拌細研神錦於柳木甑中蒸七日了以水蜜丸服顏色可如美女之容知瘡所在口點陰膠陰膠即是甑中氣垢少許於口中則知臟腑所起直徹至住處知痛足可醫也産後肌浮甘皮酒服産後肌浮酒服甘皮立愈口瘡舌坼立愈黃蘇口瘡舌坼以根黃塗酥炙作末含之瘥腦痛欲亡鼻投硝末頭痛者以硝石末入鼻中立止神速心痛欲死速覓延胡以延胡索作末酒服之立愈如斯百種是藥之功某忝遇明時謬看醫理雖尋聖法難可窮微略陳藥餌之功能豈溺仙人之要術其用藥炮熬煮炙不能記年月哉欲審元由須看海集神農本草經分上中下三品上藥一百二十種為君主養命以應天無毒多服久服不傷人欲輕身益氣不老延年者本上經中藥一百二十種為臣主養性以應人無毒有毒斟酌其宜欲遏病補虛羸者本中經下藥一百二十五種為佐使主治病以應地多毒不可久服欲除寒熱邪氣破積聚愈疾者本下經三品合三百六十五種法三百六十五度一度應一日以成一歲後梁陶隱居又加名醫別録亦三百六十五種倍其數合七百三十名本經用朱書別録用墨書以別之上品藥性亦皆能遺疾但其勢力和厚不為倉卒之效然歲月常服必獲大益中品藥性療病之辭漸深輕身之説漸薄服之者祛患為速而延齡為緩下品藥性直主攻擊毒烈之氣傾損中和不可常服出産收採藏蓄市買俱宜明辨藥品所産各有風土之宜必本圖經取用方能致效人參生自上黨黃耆産於綿山山藥地黃鬚珍懷慶玄胡蒼朮必羡茅山舶上茴香堅且實漢中防己大而圓廣木香川當歸隨土著號胡黃連銀柴胡因地擅名若非預求真藥何能奏績收功至於草木根荄收採各有其時取根多以二月八月斯時氣液尚藏收莖惟在夏末初秋此際發生正旺又云春收宜早秋採宜遲大都要因氣味盛全採而收之各當其時可也蓄藏之法亦要究心有宜曬曝火烘之不同又必風吹密固之各異黃精二地貯固實則不蔀黴半夏南星灰湯煨曬方堅實人參枸杞遇梅雨必要頻烘薏苡山藥逢溫熱可將數曬硼砂收同緑豆冰片貯以燈芯之類若不著意留心未免噬臍空手百凡市肆買求尤宜留神辨認或非道地之真則多莠苗相泥以西呆為木香指玄參為續斷明松脂滴作乳香五靈脂搗充沒藥山梔染黑作砂仁半夏煮黃為胡索牛蹄銼為犀角虎脛假以驢䯒綿花梗形似藿香土當歸樣同獨活川芎雜以藁本馬藺揉於澤蘭末五靈攙入麝香捶樟腦偽充冰片石灰和麵作成附子紫皮調土捏作小丁香巧偽百般不能枚舉精詳細察存乎其人藥有四氣五味本草經云藥有四氣寒熱溫涼此兼性氣而言也又有香臭腥臊之四氣如沉檀腦麝之氣香阿魏大蒜其氣臭魚蛤銅錢其氣腥雞鴨狐貍其氣臊此則四氣而兼性氣為言也本經獨言寒熱溫涼四性而不言香臭腥臊恐或遺之耳五味酸咸甘苦辛蓋天地定位惟五行生化萬類生物者氣也成之者味也如寒氣堅故鹹味可用以軟熱氣軟故苦味可用以堅風氣散故酸味可用以收臊氣收故辛味可用以散土為中氣無所不和故甘味可用以緩此四氣五味藥之紀綱業醫者須詳明之方可以為司命之寄也藥用必明六化內經曰治病必明六化分治五味五色所生五臟所宜乃可以言盈虛生病之絡也謹候氣宜無失病機其主病何如曰司歲備物則無遺主矣採藥歲也司歲物何也天地之專精也曰司氣者何如曰司氣主歲同然有餘不足也不足則物薄有餘則物精非司歲物何如曰散也非專精則散氣散物則物不純故質同而異等也氣味有厚薄性用有靜躁治保有多少力化有淺深夫藥有寒熱溫涼之性有酸苦辛咸甘淡之類各有所能不可不通也夫藥之氣味不必同同氣之物其味俱咸其氣皆寒之類是也凡同氣之物必有諸味同味之物必有諸氣互相氣味各有厚薄性用不等制方者必明其用凡藥昆蟲草木産之有地根葉花實採之有時失其地則性味少異失其時則氣汁不全又況新陳之不同精粗之不等須採而用之斯有效也藥有輕清重濁輕清成象本乎天者親上也味薄茶之類重濁成形本乎地者親下也味厚大黃之類氣味辛甘發散為陽酸苦湧瀉為陰清中清者清肺以助其天真清中濁者榮華腠理濁中清者榮養於神濁中濁者堅強骨髓藥用氣味所宜凡藥之所用皆以氣味為主補瀉在味隨時而換氣薄為陽中之陰氣厚者為陽中之陽味薄為陰中之陽味厚者為陰中之陰辛甘淡之熱者為陽中之陽辛甘淡之寒者為陽中之陰酸苦咸之寒者為陰中之陰酸苦咸之熱者為陰中之陽夫辛甘淡酸苦咸乃味之陰陽又為地之陰陽也溫涼寒熱乃氣之陰陽又為天之陰陽也氣味生成而陰陽造化之機存焉一物之內氣味兼有一藥之中理性具焉主對治療由是而出凡藥苦平升微寒平亦升甘辛平降甘寒瀉火苦寒瀉濕熱苦甘寒瀉血熱茯苓淡為在天之陽也陽當上行何謂利水而泄下亦不離乎陽之體故人手太陽麻黃苦為在地之陰也陰當下行何謂發汗而升上經云味之薄者乃陰中之陽所以麻黃髮汗而升上然亦不離乎陰之體故入手太陰附子氣之厚者乃陽中之陽故經云發熱大黃味之厚者乃陰中之陰故經云泄下粥淡為陽中之陰所以利小便茶苦為陰中之陽所以清頭目凡藥根之在土中者中半以上脈之上行也以生苗者為根中半以下氣脈之下行也以入土者為梢病在中焦與上焦者用根在下焦者用梢根升梢降大凡藥根有上中下人身半以上天之陽也用頭在中焦者用身半以下地之陰也用梢述類象形者也凡藥之五味大抵隨五臟所入之味而為補瀉甘入脾酸入肝鹹入腎苦入心辛入肺所入之味亦不過因其性而調治之辛主散酸主收甘主緩苦主堅咸主軟辛能散結潤燥苦能燥濕軟堅咸能軟堅酸能收緩甘能緩急淡能利竅肝苦急急食甘以緩之甘草心苦緩急食酸以收之五味子脾苦濕急食苦以燥之白朮肺苦氣上逆急食苦以瀉之訶子皮腎苦燥急食辛以潤之知母黃柏腎欲堅急食苦以堅之知母肝欲散急食辛以散之川芎心欲軟急食鹹以軟之芒硝脾欲緩急食甘以緩之甘草肺欲收急食酸以收之白芍肝虛以陳皮生薑之類補之經云虛則補其母水能生木腎乃肝之母腎水也若補其腎熟地黃黃柏是也如無他證惟不足錢氏地黃丸主之實則白芍藥瀉之如無他證錢氏瀉青丸主之實則瀉其子心乃肝之子以甘草瀉心心虛則炒鹽補之虛則補其母木能生火肝乃心之母肝木也心火也以生薑補肝如無他證錢氏安神丸是也實則甘草瀉之如無他證以錢氏方中重則瀉心湯輕則導赤散脾虛則甘草大棗之類補之實則以枳殼瀉之如無他證虛則以錢氏益黃散實則瀉黃散心乃脾之母以炒鹽補心肺乃脾之子以桑白皮瀉肺肺虛則五味子補之實則桑白皮瀉之如無他證實則用錢氏瀉白散虛則用阿膠散虛則以甘草補脾土補其母也實則以澤瀉瀉腎水瀉其子也腎虛則熟地黃黃柏補之瀉以澤瀉瀉之腎本無實本不可瀉錢氏有補腎地黃丸無瀉腎之藥肺乃腎之母金生水故也以五味子補肺而已五宜肝色青宜食甘糯米牛肉棗葵皆甘心色赤宜食酸小豆犬肉李韭皆酸肺色白宜食苦麥羊肉杏薤皆苦脾色黃宜食鹹大豆豕肉栗藿皆咸腎色黑宜食辛黃黍雞肉桃蔥皆辛五禁咸走血血病毋多食鹹苦走骨骨病毋多食苦辛走氣氣病毋多食辛酸走筋筋病毋多食酸甘走肉肉病毋多食甘五入五味入胃各歸所喜攻酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常氣增而久夭之由也蓋陰之所生本在五味陰之五官傷在五味故味過於酸肝氣以津脾氣乃絶味過於咸大骨氣勞短肌膚黑心氣抑味過於甘心氣喘滿色黑腎氣不衡味過於苦脾氣不濡胃氣乃厚味過於辛筋脈沮弛精神乃央與殃同是故謹和五味骨正筋柔氣血以流腠理以密則長有天命矣五傷多食鹹則脈凝泣而變色多食苦則皮稿而毛拔多食辛則筋急而爪枯多食酸則肉胝胸而唇揭多食甘則骨痛發落六陳藥枳殼陳皮與半夏茱萸狼毒及麻黃六般之藥宜陳久入用之時仔細詳十八反本草明言十八反逐一從頭説與君人參芍藥與沙參細辛玄參及紫參苦參丹參並前藥一見藜蘆便殺人白芨白蘞並半夏栝蔞貝母五般真莫見烏頭與烏喙逢之一反疾如神大戟芫花並海藻甘遂以上反甘草若還吐蠱用翻腸尋常犯之都不好蜜臘莫與蔥相睹石決明休見雲母藜蘆莫使酒米侵人若犯之都是苦十九畏硫黃原是火之精朴硝一見便相爭水銀莫與砒相見狼毒最怕密陀僧巴豆性烈最為上偏與牽牛不順情丁香莫與鬱金見芒硝難合京三稜川烏草烏不順犀人參又忌五靈脂官桂善能調冷氣石脂相見便蹺蹊大凡修合看逆順炮鑑炙爆要精微七方大方之説有二有君一臣三佐九之大方有分兩大而頓服之大方蓋治肝及在下而遠者宜頓服而數少之大方病有兼證而邪不專不可以一二味治者宜君一臣三佐九之大方王太僕以人之身三折之上為近下為遠近為心肺遠為肝腎中為脾胃以豫睹之身半以上其氣三天之分也身半以下其氣三地之分也中脘人之分也又手之三陰陽亦天也其氣高足之三陰陽亦地也其氣下戊己之陰陽亦人也其氣猶中州故肝之三服可並心之七服腎之二服可並肺之七服也小方之説亦有二有君一臣二之小方有分兩微而平服之小方蓋治心肺及在上而近者宜分兩微而少服而頻之小方徐徐而呷之是也病無兼證邪氣專可一二味而治者宜君一臣二之小方故腎之二服可分為肺之九服及肝之三服也緩方之説有五有甘緩之之緩方糖蜜棗葵甘草之屬是也蓋病在胸膈取甘能戀也有丸藥以緩之之緩方蓋丸之比湯散其氣力宣行遲故也有品件群衆之緩方蓋藥味衆則各不得騁其性也如萬病丸七八十味遞相拘制也有無毒治病之緩方蓋藥氣味薄則長於補上治上比至其下力已衰故補上治上制之以緩緩則氣味薄也故王太僕云治上補上方若迅急則上不任而迫走於下制緩方而氣味厚則勢與急同急方之説有五有急病急攻之急方如心腹暴痛兩陰溲便閉塞不通借備急丹以攻之此藥用不宜長蓋病不容俟也又如中風於關緊急漿粥不入用急風散之屬是也有湯散蕩滌之急方蓋湯散之比丸下咽易散而施用速也有藥性有毒之急方蓋有毒之藥能上湧下泄可以奪病之大勢也有氣味厚藥之急方藥之氣味厚者宜趨下而氣力不衰也故王太僕云治下補下方之緩緩慢則滋道路而力又微制急方而氣味薄則力與緩等奇方之説有二有古單方之奇方獨用一物是也病在上而近者宜奇方也有數合陽數之奇方謂一三五七九皆陽之數也以藥味之數皆單也君一臣三君三臣五亦合陽之數也故奇方宜下不宜汗偶方之説有三有兩味相配之偶方有古之復方之偶方蓋方之相合者是也病在下而遠者宜偶方也有數合陰數之偶方謂二四六八十也皆陰之數君二臣四君四臣六亦合數之陰也故偶方宜汗不宜下復方之説有一方二方三方相合之復方如桂枝越脾一方如調胃承氣湯方芒硝甘草大黃外參以連翹薄荷黃芩梔子以為涼膈散是本方之外別加餘味者皆是也有分兩均劑之復方如胃風湯各等分是也以內經考之其奇偶四則反以味數奇者為奇方味數偶者為偶方下復云汗者不可以奇下者不可以偶及觀仲景之制方桂枝湯汗藥也反以三味為奇大承氣湯下藥下反以四味為偶何也豈臨事制宜復有增損者乎考其大旨王太僕所謂汗藥如不以偶則氣不足以外發下藥如不以奇則藥毒攻而致過必如此言是奇則單行偶則並行之謂也何者下本易行故宜單汗或難出故宜並蓋單行則力孤而微並行則力齊而大此王太僕之意也然太僕又以奇方為古之單方偶為復方此又七方之中已有偶又有復何也豈非偶方者二方相合之屬也復方者二方四方相合之方歟不然何以偶方之外又有復方者歟此復字非重復之復乃反復之復何以言之蓋內經既言奇偶之方不言又有重復之方惟云奇之不去則偶之是為重方重方者即復方也下又云偶之不去則反佐以取之所謂寒熱溫涼反從其病也由是言之復之為方反復亦不遠內經之意也十齊宣可以去壅薑橘之屬是也鬱而不散宜宣劑以散之俚之人皆以宣為瀉劑抑不知十劑之中已有通劑舉世皆曰春宜宣以為下奪之藥抑不知仲景曰大法春宜吐以春病則人病在頭故也況十劑之中獨不見吐劑豈非宣劑則所謂吐劑者乎內經曰其高者因而越之即宣者升而上之也以君召臣曰宣義或同傷寒邪氣在上宜瓜蒂散頭痛蔥根豆豉湯傷寒懊憹宜梔子豉湯精神昏憒宜梔子厚朴湯自瓜蒂而下皆湧劑也乃仲景不傳之妙令人皆作平劑用之未有發其祕者豫因發之然則為湧明矣故風癇中風胸中諸實痰飲寒結胸中熱鬱於上上而不下下久則喘嗽脹滿水腫之病生焉非宣劑莫能愈也通可以去滯木通防己之屬是也留而不行宣通劑以行之流通之謂也前後不得溲便宜木通海金沙大黃琥珀八正散之屬裡急後重數至圊而不便雖通與瀉相類大率通為輕而瀉為重也凡麻痹鬱滯經隧不利非通劑莫能愈也補可以去弱人參羊肉之屬是也弱而不足宜補劑以扶之補其不足也俚人皆知山藥丸鹿茸丸之補劑然此乃衰老下脫之人方宜用之今往往於少年之人用之其極甚矣古之甘平甘溫苦溫辛溫皆作補劑豈獨硫黃天雄為補哉況五臟各有補瀉肝實瀉心肺虛補腎經曰東方實西方虛瀉南方補北方大率虛有六表虛裡虛上虛下虛陰虛陽虛設陽虛則以乾薑附子陰虛則補以大黃硝石世傳以熱為補以寒為瀉雖非一日豈知苦酸甘辛鹹各補其臟經曰精不足者補之以味善用藥者使病者進五穀真得補之道也若大邪未去方滿方悶心火方實腎水方耗而驟言鹿茸附子庸詎知其所謂補劑者乎瀉可以去結葶藶硝黃之屬是也間而有餘宜瀉劑以除之泄瀉之謂也諸痛為實痛隨利減經曰實則瀉之其實者散而瀉之中滿者瀉之於內大黃牽牛甘遂巴豆之屬皆瀉劑也惟巴豆不可不慎焉蓋巴豆之性燥熱毒不去變生他疾縱不得已而用之必以他藥制其毒百千證中或可一二用之非有暴急之疾大黃牽牛甘遂芒硝足矣令人往往以巴豆熱而不畏以大黃寒而反畏庸詎知其所謂瀉劑者乎輕可以去實麻黃葛根之屬是也實而氣蘊宜輕劑以揚之風寒之邪始發皮膚頭痛身熱宜輕劑或風散升麻葛根之屬是也經曰因其輕而揚之發散所謂解表也疥癬痤痱宜解表汗以泄之毒以熏之皆輕劑也故桂枝麻黃防風之屬亦然設感冒傷風頭痛身熱二日內用雙解散及嚏藥解表出汗皆輕劑之云耳重可以去怯磁石鐵粉之屬是也怯則氣浮宜重劑以鎮之鎮墜之謂也其藥則硃砂水銀寒水石黃丹之類以其體重故也久病咳嗽涎潮於上咽喉不利形羸不可峻攻以此墜之故內經曰重者因而減之貴其漸也滑可以去著冬葵子榆白皮之屬是也澀則氣著宜滑劑以利之周禮曰滑以養竅大便燥結小便淋澀皆宜滑劑燥結者其麻仁郁李之類乎淋澀者其葵子滑石之類乎前後不通者前後兩陰俱閉也此名曰三焦約也約猶束也先以滑劑潤養其燥然後攻之則無失矣澀可以去脫牡蠣龍骨之屬是也滑利氣脫宜澀劑以收之寢汗不禁澀以麻黃根滑瀉不已澀以豆蔻枯白礬烏賊魚骨罌粟殼凡酸味皆同乎澀者收斂之意也咳嗽上奔以薺汁烏梅煎寧肺者皆酸澀劑也然此數種當治本以去邪不可執一以便澀斯為萬全也燥可以去濕桑白皮赤小豆之屬是也濕則為重宜燥劑以除之積寒久冷食已不飢吐利腥穢屈伸不便上下水液澄徹清冷此為大寒之故宜用乾薑良薑附子胡椒輩以燥之非積寒之病不可用也若久服則變血溢血泄大枯大涸溲便癃祕聾瞽委弱之疾設有久服而此疾不作者慎勿執以為是蓋疾不作者一二誤死者百千也若病濕者則白朮陳皮木香防己蒼朮皆能除濕亦燥之平劑也若黃連黃柏黃芩大黃其味皆苦苦屬火皆能燥濕此內經之本旨也然世相違久矣嗚呼其獨薑附之儔方為燥劑乎濕可以去枯紫石英白石英之屬是也枯則為燥宜濕劑以潤之潤雖與滑相類其間少有不同經曰辛以潤之蓋辛走氣化液故也若夫硝性雖咸本屬真陰之水誠濡枯之上藥也人有枯涸皺褐之病非獨金化為然蓋有火以乘之非濕劑莫能愈也五位補瀉木位之主其瀉以酸其補以辛厥陰之客以辛補之以酸瀉之以甘緩之火位之主其瀉以甘其補以咸少陰之客以甘瀉之以咸收之少陽之客以咸補之以甘瀉之以咸軟之土位之主其瀉以苦其補以甘太陰之客以甘補之以苦瀉之以甘緩之金位之主其瀉以辛其補以酸陽明之客以酸補之以辛瀉之以苦泄之水位之主其瀉以咸其補以苦太陽之客以苦補之以咸瀉之以苦堅之以辛潤之客勝則瀉客補主主勝則瀉主補客隨其緩急以施治之內淫藥治內經曰天地之氣內淫而病治之奈何曰諸氣在泉風淫於內治以辛涼佐以苦甘以甘緩之以辛散之熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之火淫於內治以鹹冷佐以苦辛以酸收之以苦發之燥淫於內治以苦溫佐以甘辛以苦下之寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之毒藥療病則度帝曰有毒無毒服有約乎岐伯曰病有新久方有大小有毒無毒固宜當制矣其大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九谷肉菜果食養盡之無使過之傷其正也不盡行復如法必先歲氣無伐天和無代化無違時調養必和待其來復又曰大積大聚其可犯也衰其大半而止過者死各經引使主治藥小腸膀胱太陽經藁本羌活下用黃柏小腸腑氣小茴香血玄胡索寒大茴香川烏熱赤茯苓膀胱腑氣人參益智仁血肉桂生地黃寒川椒大茴香熱滑石山梔仁胃與大腸陽明經葛根白芷升麻降下石膏胃腑氣人參白朮血當歸牡丹皮寒乾薑胡椒丁香熱軟石膏黃連大腸腑氣枳殼木香檳榔血地榆桃仁寒乾薑肉豆蔻熱黃連槐角子三焦與膽少陽經柴胡川芎下氣青皮膽腑氣人參青皮血當歸川芎寒乾薑半夏木香熱竹茹山梔膽汁肺手太陰經升麻白芷蔥白肺臟氣人參黃耆桑白皮杏仁蘇子血當歸熟地黃阿膠蒲黃寒乾薑生薑熱黃芩石膏天冬竹葉脾足太陰經升麻酒白芍藥脾腑氣人參黃耆白朮木香藿香砂仁血當歸人參白芍藥寒乾薑砂仁附子熱甘草白芍藥心手少陰經獨活細辛心臟氣人參麥冬石菖蒲血當歸生地肉桂寒附子天雄桂熱黃連硃砂犀角牛黃甘草腎足少陰經獨活肉桂腎臟氣附子川椒大茴香血桂熟地黃枸杞子杜仲寒同氣藥熱黃柏知母地骨皮肝與心胞絡厥陰經柴胡川芎下氣青皮肝臟氣木香青皮吳茱萸香附子血芍藥生地黃川芎寒桂木香熱柴胡山梔仁黃連龍膽草胞絡氣香附血川芎寒附子熱黃連歌早小腸膀胱屬太陽藁本羌活是本鄉三焦膽與肝胞絡少陽厥陰柴胡強太陽陽明並足胃葛根白芷升麻當太陰肺脈中焦起白芷升麻蔥白詳脾經少與肺部異升麻兼之白芍嘗少陰心經獨活主腎經獨活加桂良通經用此藥為使豈有何病在膏肓東垣用藥凡例凡解利傷風以防風為君甘草白朮為佐經云辛甘發散為陽風宜辛散防風味辛及治風通用故以為君凡解利傷寒以甘草為君防風白朮為佐是寒宜甘發也或有別證於前隨證治病藥內選用分兩以君臣論凡眼暴發赤腫以防風黃芩為君以瀉火以黃連當歸根和血為佐兼以各經藥用之凡眼久病昏暗熟地黃歸根為君羌活防風為臣甘草甘菊為佐凡痢疾腹痛以芍藥甘草為君當歸白朮為佐見血先後以三焦熱論凡水瀉以茯苓白朮為君芍藥甘草為佐凡諸風以防風為君隨治病為佐凡嗽以五味子為君有痰者以半夏為佐喘者以阿膠為佐有熱無痰以黃芩為佐但分兩多寡不同耳凡小便不利以黃柏知母為君茯苓澤瀉為佐凡下焦有濕草龍膽防己為君甘草為佐凡痔漏以蒼朮防風為君甘草芍藥為佐詳別證加減凡諸瘡以黃連當歸為君甘草黃芩為佐凡瘧以柴胡為君隨所發時屬經分用引經藥佐治氣藥論治氣用氣藥枳殼利肺氣多服損胸中至高之氣青皮瀉肝氣多服損真氣木香行中下焦氣香附快滯氣陳皮瀉逆氣紫蘇散表氣厚朴瀉衛氣檳榔瀉至高之氣藿香之馨香上行胃氣沉香升降真氣腦麝散真氣若此之類氣實所宜其中有行散者有損泄者其過劑乎用之能治氣之標而不能治氣之本其調氣有木香味辛氣能上升如轉達而不達固宜用之若陰火衝上而用之則反助火邪矣故必用黃柏知母而少用木香佐之治血藥論治血用血藥四物湯之類是也請陳其氣味專司之要川芎血中之氣藥也通腎經性味甘寒能生真陰之虛也當歸分三治血中主藥也通肝經性味辛溫能活血各歸其經也芍藥陰分藥也通肝經性味酸寒能和血治血虛腹痛也若求陰藥之屬必於此而取則焉若治者隨經損益損其一二之所宜為主治可也此特論血病而求血藥之屬耳若虛血弱又當長沙血虛以人參補之陽旺則生陰血也若四物者獨能主血分受傷為氣不虛也輔佐之屬若桃仁紅花蘇木血竭牡丹皮者血滯所宜蒲黃阿膠地榆百草霜棕櫚炭者血崩所宜乳香沒藥五靈脂凌霄花者血痛所宜蓯蓉鎖陽牛膝枸杞子益母草夏枯草敗龜板者血虛所宜乳酪血液特物血燥所宜乾薑肉桂血寒所宜生地黃苦參血熱所宜此特取其證治大略耳余宜觸類而長之也治火藥論君火者心火也可以濕伏可以水滅可以直折惟黃連之屬可以制之相火者龍火也不可以水折之當從其性而伏之惟黃柏之屬可以降之噫瀉火之法豈止如此虛實多端不可不察以臟氣司之如黃連瀉心火黃芩瀉肺火芍藥瀉脾火石膏瀉胃火柴胡瀉肝火知母瀉腎火此皆苦寒之味能瀉有餘之火苦飲食勞倦內傷九氣與火不兩立為陽虛之病以甘溫之劑除之如黃耆人參甘草之屬若陰微陽強相火熾盛以乘陰位為血虛之病以甘寒之劑降之如當歸地黃之屬若心火亢極鬱熱內實為陽強之病以鹹冷之劑折之如大黃朴硝之屬若腎水受傷真陰失守無根之火為陰虛之病以壯水之劑制之如生地黃玄參之屬若有腎命門火衰為陽脫之病以溫熱之劑濟之如附子乾薑之屬若胃虛過食冷物抑遏陽氣於脾土為火鬱之病以升散之劑發之如升麻乾葛柴胡防風之屬不明諸此類而求火之為病施治何所據依故於諸經集略其説以備處方之甩庶免實實虛虛之禍也治痰藥例熱痰虛痰必用天門冬治咳逆消火痰清肺知母潤肺消痰止嗽黃芩瀉肺火治膈上熱痰痰因火上攻治以降火也黃連治中焦熱痰噁心兀兀欲吐噁心欲吐者痰也栝蔞子潤肺降痰胸有痰者以肺受火逼失降下之令得甘緩潤下之劑則痰自降治嗽之要藥也青黛收五臟鬱火消熱