body:
  text: 卷之八十八幼幼彙集上形肖天地論人稟天地陰陽之氣以生藉父母精血以成其形人之始孕一月如珠露二月如桃花三月男女分四月形象具五月五臟生六月六腑成七月關竅通八月遊其魂九月三轉身十月受氣足及其生也頭圓象天足方象地五臟以法五嶽九竅以布九州四肢分比四時六腑配乎六律膽視同乎日月呼吸猶乎風雲氣血行類江河毛髮比之草木一年象三百六十節二腸應二十四氣天有風水寒暑人有取與喜怒天之氣升人之氣亦升天之氣降人之氣亦降浮亦浮沉亦沉人與天地同一橐籥其不與天地參者矣胎氣稟受不同論千金論曰兒在母胎受其精氣一月胚二月胎三月血脈四月形體成五月能動六月筋骨成七月毛髮生八月臟腑具九月穀神入胃十月百神備而生生後六十日瞳子成能笑語識人百日任脈生能反覆一百八十日尻骨成能獨立二百一十日掌骨成能匍匐三百日臏骨成能獨倚三百六十日為一期膝骨成乃能移步此理之常不如是者身不得其平矣或有四五歲不能行立此皆受胎氣之不足者也若筋實則多力骨實則早行血實則形瘦多發肉實則少病精實則伶利多語笑不怕寒暑氣實則少發而體肥此皆受胎氣之充足者也大抵稟賦得中陰陽純粹剛柔兼濟氣血相和精神全備形體壯健其未周之先顱顧堅合睛黑神清口方背厚骨粗臀滿臍深肚軟莖小卵大齒細發潤聲洪穩睡此皆受胎氣之得中和者也以故聽其聲觀其形則可以知其虛實壽夭矣聯珠論夫人稟陰陽二氣生疾病於三焦然冠壯易明童幼難治黃帝云吾不能察其幼小者為別是一家調理爾此不在黃帝圖經之論也又云小兒如水上之波草頭之露以意用藥毋令造次焉惟小兒臟腑脆嫩血氣未足肌體不密精神未備故稱不易醫也初生曰嬰兒三歲曰小兒十歲曰童子大小各異且不可一概而用藥也必明消息形候審定生死察病患之淺深知藥性之寒溫乃世之良工也多服種子熱藥遺患胎源論東垣云一人問中年得子一歲之後身生紅絲瘤不救後四子皆病紅絲而死何以然曰此乃腎中伏火精氣多有紅絲以氣相感生子故有此疾俗名胎瘤是也子試觀之果如其言遂以滋陰丸以瀉腎火忌酒醋辛爆熱物其妻以六味地黃丸受胎五月之後以黃芩白朮散間而用之後生三子前證不作今已俱壯噫合觀以上所論則知其警戒深矣妊婦不守禁忌生子多疾論古人胎養胎教之方最為慎重所以上古之人多壽多賢良有以也內則曰古者婦人妊子寢不側坐不偏立不蹕不食邪味割不正不食席不正不坐目不視邪色耳不聽淫聲夜則令瞽誦詩道正事如此則生子形容端正才過人矣又要飲食清淡飢飽適中自然妊娠清氣身不受病臨産易生子疾亦少痘疹亦稀此為氣血貫通所感明驗夫何後世風俗漸偷鮮能悟道男婦縱欲無往弗勝懷孕之時殊不加意以致臨産氣血乖張不能順應生兒下地驚搐無時此蓋胎中受毒病種淵深雖良醫神劑莫之能為嬰幼論王隱君嬰兒初生車籃襁褓各隨風俗大概厥初下地之時勿待其出聲急以帛裹指展去舌上汙血用手一遲啼聲一出即入腹中斯為患矣如下地少頃不能出聲者急以溫水一口少許灌之即出聲也久不出聲者以其臍帶倒捋入腹然以口頻進氣於兒口中則自能啼初浴先將以豬膽汁一個入湯溫浴之則不生瘡疥次用桃李梅根或枝各兩許㕮咀煎湯浴之則去不祥浴罷即看口中舌下並齶上或有白泡相連去處即便用指摘去則無重舌等病此其大略凡嬰兒六十日後瞳人將成而能應和人情自此為有識之初便當誘其正性父母尊長漸次令其別之僮僕婢妾不可訓其手舞足蹈無禮罵人高舉放倒猛推閃避兒雖強笑失色驚駭乖張惡性自此無端乳母縱嗜厚味純醪煎爆兒亦受之於乳是以驚疳積癖瀉痢由之而生及其臨病又忌灌以苦辛之藥味姑惜隱忍無所不致大抵愛子之偏無出於母所嗜之食任其飽足必致所傷余幼時酷嗜甘飴忽於一日飴中有蚯蚓引頭而出自此不敢食飴至長始知長上為之不然脾疳久患深染難調奈何不為戕害大抵庠序之教禮義節文之誨幼稚幼學通字未真須自千文蒙求調其句讀候其舌便語清始可入大學課其文字成性純然精神不耗何病之有凡人之病其義有五一曰稟受之病與生俱生者是也二曰果報之病伯牛之癩袁盎之瘡者是也三曰六淫之病風寒暑濕燥火外邪所侵者是也四曰七情之病喜怒憂思悲恐驚者是也五曰金瘡顛撲外傷者是也外傷之證顯而易曉其所謂七情者責當在誰六淫之疾則亦以此而召耳護養千金論曰小兒二百四十日掌骨成母當教以匍匐一周滿母當扶以行步此皆則法若或暖衣重圍不見風日不著地氣致令筋骨軟弱數歲不能行者有之今觀田舍小兒則反是所以見風日得土氣筋力常健豈貴賤之理有異哉明乎此則保嬰之道得矣乳哺乳哺之法不可不慎小兒脾胃怯弱乳食易傷初得作嘔瀉久則成積癖乳母飲食乳汁便通兒食其乳所感立應母食熱則乳熱母食寒則乳寒夏食熱乳則致吐逆冬食寒乳則致嗽利母不欲怒怒則氣上為狂母不欲醉醉則身熱腹痛懷孕乳兒致令黃瘦腹大腳軟名曰鬾病大都乳哺不可大過諺云小兒常病傷於飽也又曰忍三分飢吃七分飽亦至論也除胎毒方書皆云小兒一出腹啼聲未發之時急用綿裹指拭去口內惡汁固是良法而倉猝之際或有不及者故有黃連甘草朱蜜等法用之殊佳東垣云只須淡豆豉一味煎湯與三五口其毒自下又能助胃氣也尤妙擇乳母凡乳母稟賦之厚薄性情之緩急德行之善惡兒食其乳能速肖之此其關係非為小故殊不知漸染既久識性皆同猶接木之造化也故不可不擇顱囟論顱囟經曰囟門未合筋骨柔弱囟門青筋肺虛不榮囟門常坑滑瀉便便囟門突起風疾不止囟門久冷吐利清清囟門虛軟顛癇不免囟門扁闕暴泄易脫囟門喎長風作必亡囟門連額驚癇易得囟門未完怕熱怯寒囟門緩收胎氣不周囟門動數神昏氣弱囟門寬大多疾受害顱囟者精神之門戶也開竅之橐籥也上下相貫百會相通七竅應透五臟所藉泥丸之官魂魄之穴氣實則闔氣虛則開良由長大不可不合醫師見之當知可否用藥消息之囟門寬大受病深重恐藥難療不可不慎也小兒初生總論千金方云小兒初生一周之內密室襁褓天地八風之邪豈得為害良由在胎之時母失調護或過勞相干或過食傷胃或驚恐相觸或跌撲致傷誕生之後故有胎驚胎黃胎寒胎熱胎肥胎怯諸證生焉外因浴洗拭口斷臍灸囟之不得其法致有噤口臍風鎖肚不乳等證患此者多難救療雖黃帝之聖亦稱不能察別今世小兒醫尤宜精審淺深虛實而權衡為治乃濟世之良工也初生小兒必忌外客所觸古人一歲之內忌之者並無客忤之患小兒略識人物不宜攜至神廟觀望神象閃爍恐生恐懼小兒初生無穀道者逾旬日必不可救至腹脹不食乳則成內傷雖通穀道已不勝其治矣必須早速用刀刺要對孔親切開通之後用綿帛如榆錢大卷如指以香油浸透插之使其再不合縫四傍用生肌散搽之自俞小兒將入夏時用色帛縫囊盛去皮尖杏仁七個與兒隨身佩之聞雷自然不驚初生回氣法小兒初生或有氣怯而欲絶者必因難産或受寒所致不可便斷臍帶急烘綿絮包裹懷中以胎衣置火上燒燃又用大紙捻蘸清油燒於臍帶上下使暖氣入腹須臾氣回拭口法小兒在胎口含經血以成形始生之時口中多有穢血未盡啼聲未出急用新綿裹指拭去口中穢血為妙若一啼則咽入腹而穢毒有所不免古人仍用黃連甘草等法皆所以解其毒也則兒聰慧痘疹亦稀疾病亦少誠不可不加意者甘草黃連法妊婦臨月預辦甘草黃連臨産時先用甘草煎汁收生之際急以綿帛裹指蘸甘草汁拭其兒口次用黃連少許同甘草煎如前法拭口內次用朱蜜朱蜜法錢氏曰用好硃砂細研水飛過煉好白蜜調和成膏如小豆大乳汁化服三日內止進三粒鎮心安神亦能解穢血之毒牛黃法真牛黃煉蜜和成膏如小豆大乳汁化服些須形色不實者不可服身黃胎熱者宜服豬乳法張煥論云初生兒或未有奶子産婦之乳未下可用豬乳代之可免驚癇痘瘡錢氏曰初生小兒至滿月內可當取豬乳滴口中最佳聖惠方云取豬乳須令豬兒飲母次便提豬兒後腳起口自離乳急用手捋之即得乳矣非此法不可取也下胎毒法凡下胎毒只宜用淡豆豉煎濃汁與三五日其毒自下又能助養脾氣消化乳食用淡豆豉是無鹽的楊氏曰小兒在胎受病非一大抵裡氣鬱結壅閉不通宜取下胎毒為妙初生沐浴法小兒洗浴不可先斷臍帶候洗了方斷不致水濕傷臍可免臍風臍瘡等證用清油調發灰敷臍洗兒不可用水打濕臍帶千金論曰浴兒當調和湯看冷熱若不得所令兒水驚即成疾病冬寒不可久浴則傷風寒夏不可久浴則傷熱水溫不妨浴時當護兒背須風邪自此而入使之發熱成癇斷臍法千金論曰凡斷臍切不可刀割咬斷後纏結所留臍帶令致兒足跌上短則中寒令兒肚中不調或成內釣若先斷臍然後浴者水入臍中則令腹痛其臍斷訖連臍帶中多有蟲者宜急剔撥去不然則入腹成疾大抵兒初生斷臍之後宜用熟艾厚裹愛護若乳母不謹或因洗浴水入臍中或遺尿在裙抱之內濕氣於臍中或因解脫為風冷邪氣所侵皆能令兒臍腫多啼不能乳哺即成臍風也錢氏曰初生兒若洗訖斷臍帶須隔單衣咬斷將暖氣呵七遍斷臍當留六寸長則傷肌短則傷臟中寒或成內瘤急剔去臍帶中穢蟲免令入腹成疾又挼汁不盡暖氣少寒氣多則成臍風裹臍法千金論曰裹臍須令白練柔軟方四寸新綿厚半寸與帛等合之緩急得中急則令兒吐哯兒生二十日乃解臍視之或燥刺其腹疼啼叫當解之易衣再裹解臍須閉戶下帳冬間用火令臍里溫暖藏胎衣法凡兒衣盛於新瓶內以青帛裹其瓶口上仍用磚密蓋頭置便宜處待滿三日然後依月吉地向陽高燥之處埋地三尺瓶上土厚二尺須牢築令兒長壽有志若藏衣不謹令兒不利著衣法千金論云小兒用父故衣綿改衣女用母故衣綿改之勿使新綿切不可過厚恐傷皮膚生瘡發癇皆自此始聖惠論曰小兒一期之內造衣服皆須用故帛為之不可用新綿若用新綿則令兒壯熱或作驚癇曬衣法大抵兒衣日曬夜收不可露天過夜次早與兒穿上致染濕熱使兒不安此則所謂八邪之害久則令兒黃瘦腹痛身七壯熱夜間啼哭或生瘡疥世俗謂之無辜疾謂其衣在露天過夜染著無辜鳥屎令兒致疾故曰無辜疾其實非理先哲所謂八邪之害則濕熱風寒驚積飢飽是也變蒸論初中小兒變蒸者陰陽水火變蒸於氣血而使形體成就是五臟之變蒸而七情所由生也變者性情變易也蒸者身體蒸熱也兒當變蒸之候身上溫溫壯熱上唇頭起白泡珠如魚目耳尻俱冷目無光彩微欲驚而不乳哺輕則如此重則脈亂壯熱躁渴夜啼傷寒相似或自汗盜汗如此音須用古法調和不可深治太過亦有胎氣稟實當其變蒸之候皆無形證自然一一變易知覺此為暗變蒸也就物言之亦有變龍蛻骨虎換爪豹變文物類尚變況於人乎故兒初生三十二日為一變六十四日為二變兼蒸九十六日為三變一百二十八日為四變並蒸一百六十日為五變一百九十二日為六變並蒸百二十四日為七變二百五十六日為八變並蒸二百八十八日為九變三百二十日為十變並蒸此十變畢後更逾六十四日為一大蒸逾一百二十八日為二大蒸逾一百九十二日為三大蒸通計五百七十六日總共十變八蒸兒乃血脈充榮骨肉堅壯而成人也凡一變蒸三十二日其候當二十八九日之間或有微熱至三十六七日方退此為先期五日而作後期五日而已重者常有十日輕者先二日而微覺後二日而即退亦全不見候而暗變者為胎盛也寶鑑謂初變屬肝木二變肺金三變心火四變脾土五變腎水五行生剋故有變蒸錢氏謂初變屬腎水為天一生水故以生成為次序二說俱通大抵亦有不依序而變如傷寒不循經之次第也但看何臟見候而調之為妙如蒸於肝則目昏而微赤蒸於肺則嚏咳而毛豎蒸於脾則吐乳而或瀉蒸於心則微驚而壯熱蒸於腎尻冷而耳熱五臟六腑各見其候以意消息調和不必深固膠執而返求全之毀也抑此自然有是變蒸之理輕者不須用藥至期自愈甚者過期不愈按候而調之著中而已變蒸藥方寶鑑紫陽黑散治小兒變蒸壯熱亦治傷寒發熱麻黃去節三錢大黃酒炒黑一錢杏仁去皮尖二錢上同一處搗和燒存性以杏仁膏和之密器盛每服一豆許乳汁調和灌之平和飲子治嬰兒變蒸於三日後三日進一服可免百病百日內宜服人參錢半白茯苓一錢炙甘草五分升麻二分上咀水半盞煎三分不時服弱者加白朮一錢調元散治小兒變蒸脾弱不乳吐乳多啼人參陳皮白朮厚朴薑製香附子各一錢藿香炙甘草各五分上為末每服一錢薑棗煎服當歸飲子治小兒變蒸有寒熱者當歸一錢人參一錢木香官桂各三分炙甘草五分上銼每用一錢薑棗煎服參杏膏治小兒變蒸潮熱人參半錢杏仁去皮尖一錢炙甘草一錢川升麻煨五分上為極細末百日以前每用一字麥門冬煎湯調服經驗柴胡飲子治兒變蒸之期有似傷寒兩疑之間用之極穩軟柴胡紫蘇葉薄荷葉陳皮黃芩各五分炙甘草三分桔梗五分芍藥五分上銼水一盞棗姜煎三四分不時與服抱龍丸治變蒸壯熱微驚者方見驚風門論色脈素問曰神之變也其華在面視其五色黃赤為熱白為寒青黑為痛此所謂視而可兒者也錢氏云左頰為肺額上為心鼻上為脾下頦為腎赤者熱也隨證施治之全嬰方云左頰屬肝東方之位春見微青者平深青者病白色者絶赤色主身熱拘急肝熱生風青黑色主驚悸腹痛淺赤色主潮熱夜間發日中歇唇紅焦燥脈必緊數右頰屬肺西方之位秋見微白者平深白者病赤色者絶淺色主潮熱或大便堅而氣粗壅急青白色主咳嗽噁心青色主風入肺時時咳嗽青黑色主驚風或肚痛盤腸內吊額上屬心南方之位火性炎上故居上夏見微赤者平深赤者病黑色者絶赤色主心經有風熱心躁驚悸睡臥不安青黑色主心中有邪驚風腹痛手足瘛瘲而啼叫黃色主驚疳骨熱口渴皮毛乾燥夜多盜汗頭髮焦黃鼻上屬脾中央之位色見微黃者平深黃者病青色者絶赤色主身熱不思乳食深黃色主小便不通鼻孔乾燥氣粗鼻衄夜間多哭淡白色主瀉泄食不化青色主吐乳口乾大小便不利下頦屬腎北方之位冬見微黑者平深黑者病黃色者絶赤色主膀胱與腎有熱水道不利小便癃閉小兒目赤心熱導赤散主之淡紅者心虛熱生犀角散補之青者肝熱瀉青丸主之淺淡者補之黃者脾熱瀉黃散主之無精光者腎虛地黃丸主之如面目浮腫主久咳嗽乃脾受疳積也凡小兒唇白主吐涎嘔逆吐血便血唇紅渴飲煩燥如久渴瀉唇紅者是虛證也不可用涼藥唇黃主脾受積後發腫唇口紫及吐涎者主蟲痛不吐涎者是積痛唇口四畔黃如橘主口臭乃脾之積熱也唇青主血虛脾寒為冷所乘蓋脾開竅於唇木來剋土知脾弱不能食也凡小兒舌乾舌白舌燥舌黃舌苔舌赤腫皆主大便不通或通利必色焦黃如舌裂舌上芒刺舌上出血皆熱極陽毒也舌上生瘡心脾有熱舌卷主驚久患瀉利舌黑必潤不可認為熱蓋久病上焦虛熱故也久瀉利舌黑者必死觀形氣形者面形也氣者神氣也原夫小兒證候不可取之一端在表裡相應內外消息豈膠柱鼓瑟者所能觀其形而知其證哉信斯言也況小兒虛實有非系乎肥瘦而系乎氣色者何以言之蓋有肥而氣怯瘦而氣壯氣怯則色必嫩其為虛可知氣壯則色必盛其為實可知五臟之氣形於面部則肝青心赤肺白腎黑脾黃是其五色肝旺於春心旺於夏肺旺於秋腎旺於年各七十二日脾寄旺於四季後一十八日是其本位然有時乎不春不冬而面變青黑者非肝之與腎也不秋不夏而面變赤白者非心之與肺也蓋五臟之氣色層見疊出隨形流證初無一定忽然青黑主乎痛忽然赤者主乎熱忽然白者主乎冷忽然黃者主乎積此氣之開闔非系乎時非拘乎位又如心主額肝主眼並左臉脾主唇之上下肺主右臉腎主耳前頦外其形或見於位或露於他部所謂不可取之一端此其選也且脾主唇之上下為吐瀉或患利日久然其色黑則腎之乘脾水反剋土名為強勝其臟或敗爾肝主眼並左臉其色青本色也主驚駭驚風是為順證若見白色乃肺克肝即為逆證以此推考變而通之存乎其人嬰兒惟察其面部五色以知病源又看目睛有神無神神者目中精神光彩是也隱顯橫衝應位而見以應五臟五色青黑黃白赤是也肝青心赤脾黃肺白腎黑凡五臟主病蘊其內必有形色見於外小兒有病先觀本部形色論其五行生剋吉凶形色若有相應然後聽聲切脈面部位見證歌額紅火熱燥青色有驚風青若印堂見人驚火則紅忽然生黑氣客忤祟為沖青在山根露遭驚必兩重若遠斯處赤瀉燥定相攻察病形色歌大病唇紅不可醫看來眼慢不相宜睛青頰赤並乾黑髮直鴉聲轉淚啼手足無紋指頭白鼻乾燥熱口角垂昏沉口禁不開眼便是神仙難治之五臟精明面上窺假如肝病面青時三春白氣如形見此病須亡余仿之目如赤白並青黑面若黃時病易瘳目黑與青並赤白面無黃色救無由五臟病證形色總見面部青色者為驚積不散欲發風候紅赤色者為熱為痰積壅盛驚悸煩躁增進黃色者亦為熱為食積癥瘕痞癖疳疾若神思昏沉其候潮熱氣粗困倦或嘔嘰或瀉利白色為寒為肺氣不利大腸滑泄欲作吐痢黑色者為痛所傳不煩變證即為逆候榮衛失序為痰為惡候正口常紅無病乾燥脾熱白為虛人中黑腹痛蟲動點點黑吐痢山根紫傷乳食驚青人叫喚黑為危印堂青驚紅驚熱白無病額青驚紅熱兩眉紅夜啼躁熱兩眼黑睛黃傷寒白睛黃濕積赤心熱淡紅心虛熱青肝熱太陽紅血淋青驚兩紋青第二驚赤傷寒右青驚紅驚青惡危候風池紅熱多啼黃吐逆金匱青筋驚兩頰熱赤啼哭顴紅熱准上準頭近顙黃吐利赤熱紅紫痰氣青驚承漿黃吐青驚危證目無精彩瞳人不活眼珠上膜赤脈貫瞳人俱死證也面部分五臟病證額上心證赤色者心經有風熱主心煩驚悸臥坐不安青黑色中有邪主驚風腹痛寶鑑云心乃中邪手瘛瘲而啼叫青黑甚則心腹痛微黃色皮乾燥主盜汗頭髮干黃燥主驚疳骨熱微渴左臉肝證赤色身熱拘急肝風熱也青黑主驚或腹痛淺赤潮熱心燥有一等小兒夜間潮熱日中面臉不安唇紅乾燥恐驗不真脈必緊數右臉肺證赤色身熱淺色潮熱或不便而氣粗壅嗽青白色主咳嗽噁心青色主風入肺時時咳嗽青黑主驚風欲發或腹痛嬰兒盤腸內吊鼻上脾證赤色身熱不思飲食深黃色小便不通鼻孔乾燥氣粗主衄血寶鑑云鼻乾喘息鼻氣有聲主衄血肺熱淡白色主泄瀉食不化下頦腎證赤色主膀胱熱膀胱與腎為表裡有熱則水道不利小便不通面部雜病證印堂證青黑色主腹痛夜啼靈祕云印堂青黑夜啼如傷風主頭疼不止眉上證寒主久痢靈祕云痢疾眉頭皺王氏云眉中心淡白色主泄瀉糞白食物不化人中證寶鑑云人中左右兩邊黃主傷食人中下青主乳不化便清糞白靈祕云人中鼻下俱青亦主乳食不消唇口證唇白主吐涎嘔逆亦主吐血便血唇紅赤乾燥而皺者主渴靈祕云渴來唇帶赤唇紅赤不皺主口臭大便不通夜間心躁不睡紅乾而燥主熱王氏云口臭唇黃脾受積後必發腫夜起糞白不化又曰唇口紫吐涎主蟲痛飛仙論云唇口紫不吐涎是積寶鑑云口四畔黃如橘脾之積熱千金云唇纈赤主心熱口舌生瘡至聖訣云唇紅赤主衄血唇白赤熱唇口動主驚熱又云口滴清水欲生重舌又主口瘡有一等小兒脾冷流涎頸下常濕名曰滯頤不在此條錢氏云口頻撮氣不和益黃散又云血虛怯為冷所乘則唇青孫真人云唇青主脾寒或時腹疼乳食減少舌上證舌乾舌白舌黑舌燥舌苔舌黃舌赤腫主便不通雖通少焦黃舌裂舌上芒刺舌上出血皆熱極陽毒也舌上生瘡心脾熱舌上卷主驚有久瀉痢舌黑必潤不可以為熱蓋久痢上焦虛熱舌黑必潤死不治氣噎證氣噎不通必主驚候靈祕云噎飲須知死嘆氣硬氣下氣頻呵缺主驚兩耳證王氏云耳前微赤主耳聾微黃主腎驚睡中咬牙耳輪乾燥主疳骨蒸熱面色淡白主噁心不食驚瀉面青白主吐瀉靈祕云主驚風欲發王氏云面青唇白主吐奶不化胃冷難經云面白喜嚏悲愁不樂只欲哭面青黑色吐沫者蟲痛不吐沫者食積亦主驚靈祕云主天釣風面脊遍身熱發躁多變痢疾面青有汗口內氣熱必發釣痛以上三證出靈祕寶鑑云面黃夜臥盜汗面青白有驚面青黑或時吐沫者客忤面黑青主天釣啼呼凶面青臉赤主壯熱驚搐面青白黑往來不定主心腹痛發渴無時寶鑑云臉赤面黃白主心疳壯熱千金云面赤目黃主小便不禁通真子云面青筋急或多嗔悶面紅赤色主傷寒發熱心燥不安若淡鮮欲驚發狂靈祕云主身熱傷寒通真子云面赤心煩仍喜笑面黃臉赤主傷寒潮熱驚搐睡臥不安如肉內微微赤者主疳食潮熱錢氏云心疳面黃臉赤身壯熱安神丸主之面黃白色主疳積大便不調夜起食不消嘔逆寶鑑云面黃白有積靈祕云面黃白主脾肺有積通真子云面色痿黃瀉利無時錢氏云面㿠白氣發肚腹疼痛不思乳食面目皆黃是脾熱黃疸寶鑑云黃疸皆因胃熱錢氏云此證多於大病之後若不因病而身微黃者胃熱面黃肚大脾干初生嬰兒身黃曰胎疸頭面青筋此為欲發驚因熱必作搐因吐必肚痛若頭面大小青筋如緑繩透起者急治不爾便發搐搐則進退難瘥非時弄色面色不定謂之弄色面色非時變易不定者是胎風有驚亦主客忤面色或青或白或黑不定者心腹冷痛面部察色應病歌兩腮肝肺位鼻準內斯脾正額為心主頦間三腎隨有內斯形外觀之識病機面赤唇青者傷寒熱證推驚風青黑應唇臉所由知面黃多積病瘧疾亦何辭白多應是瀉痢更蹙雙眉面青肝有病春患最難醫舉金來剋木余仿此推之頭者諸陽經絡所會面者五臟氣血之榮色者五臟精神之華五臟虛敗色必枯槁五臟充實色必光華面色光澤者生面色枯槁者死經以望為先故曰能察色脈可以萬全面青屬肝病面赤屬心病面黃屬脾病面白屬肺病面黑屬腎病各位色見以生克論虎口三關脈訣虎口者叉手處是也三關者第二指之三節是也除大拇指第二指名食指第一節為初關又名風關第二節為中關又名氣關第三節為末關又名命關男以左手女以右手側看之驚風初得紋出虎口或在初關多是紅色傳至中關也赤而紫若病又傳過其色紫青病勢深重其色青黑而紋亂者病深若見純黑者危大抵紅者風熱輕赤者風熱甚紫者熱驚青春積驚青赤相半驚積風熱主急驚風青而紫淡伸縮來去主慢驚風紫紋青紋或黑紋隱隱相雜似出不出主有慢脾風凡手紋在初關者易治過中關者難治透未關者不治三關直透大抵不治然脈絞彎曲入里者病雖重而證順猶可用力若紋勢如弓反出外駸駸靠於指甲者斷不能生三關紋如流珠三五點相連或形於面或形於身此危惡之甚者三關五色脈紋應病歌小兒三歲內虎口脈須參男左女右手食指別三關無病紋難認色隱淡紅黃色明應有患青驚白是疳紫色為風襲紅熱挾傷寒黑時中惡極黃積主脾殃青黑驚為慢紋多氣亂看內釣紋侵掌危亡入命關三關指掌圖一風關紋見易治二氣關紋見病重三命關紋見難治初關紋見紅赤為風熱青紫為驚積黑紫主凶上二關者危上三關者必死初關紋見隱隱認之不明者主慢驚寅關紋見淺青色便青腹痛深青色主驚悸青黑色主驚搐內釣淺紅色主內熱或吐瀉不乳紅赤主驚熱深紫主煩躁驚哭亂紋見主傷乳或吐瀉紅紋為熱輕青紋定是驚紫紋為變重黑色命歸泉黃色隱隱見安寧無病延有紋侵入掌內吊病留連凡透三關者神仙應莫痊入門歌五指梢頭冷驚來不可安若逢中指熱必定是傷寒中指獨自冷麻豆證相參男左女右手分明仔細看小兒壽夭相法小兒初生叫聲連綿相屬者壽聲絶而復揚急者不壽啼聲散不成人啼聲深不成人臍小者不壽通身軟弱如無骨者不壽汗血者多厄不壽兒小便凝如脂膏者不成人常搖手足者不成人兒頭毛不周匝者不成人兒生枕骨不成者能言而死凡掌骨不成者能匍匐而死臏骨不成者能立而死踵骨不成者能倨而死身不收者死股間無生肉者死魚口者死陰囊下白者死赤者死小兒壽夭歌身軟陽痿頭四破臍小臍高肉不收發稀色脆短聲啼遍體青筋俱不壽尸踵臏骨若不成能倨能行能立死臍深色老性尊持方是人家長命子小兒相眼神法小兒病證或有畏若太衝有脈神氣未脫囟門未陷看顏色三關未至黯點者猶可著力雖然五臟六腑之精氣上注於目望而知之當先以目中神氣之全為驗若目中神氣有者必不死目無神者必死五竅相通應證心竅通於舌心為臟小腸為腑心色赤主夏三月心味苦心液汗心主血心聲言心氣呵有餘笑不足憂千金云心氣實則笑不休虛則悲不已肝竅通兩目肝為臟膽為腑其色青旺春三月肝味酸肝液浪肝主筋肝聲泣肝氣噓有餘怒不足悲千金怒則實悲則虛脾竅通唇口脾為臟胃為腑其色黃旺四季月脾味甘脾液涎脾主肌肉脾聲歌脾氣呼有餘腹滿不足少氣肺竅通鼻孔肺為臟大腸為腑其色白旺秋三月肺味辛肺液涕內主氣外主皮毛肺聲哭肺氣哂有餘喘不足嘆息腎竅通兩耳腎為臟膀胱為腑其色黑旺冬三月腎味鹹腎液唾腎主骨腎聲呻腎氣吹有餘瀉泄不足則厥逆小兒得病之源大喜後乳食變驚癇喜屬心大喜後乳食則傷其心錢氏曰心主驚驚是癇也素問云暴怒傷陰暴喜傷陽孫真人云傷陰則瀉傷陽則驚通真子云喜後飲水傷於三焦多成喘急大哭後乳食多成吐瀉錢氏云哭屬肺大哭後乳食則傷肺肺氣逆則作吐瀉肺與大腸為表裡故瀉也大飢後乳食多成腹痛千金云飢人急食多成腹痛修真祕云飢食過多成結積聚又云食不欲急急則傷脾扁鵲云急食久成痞塊面黃大飽後飲水多成氣乏素問云飲多則肺布葉是故氣逆而上奔也故能生痰疾仙經云飽後迎風多成暴厥不醒如中風之狀也大驚後乳食嘔吐心痛大驚後乳食則手少陰經受邪多成心痛抱朴子云大驚乳食及飲水氣節不通或吐逆翻胃百端經曰驚後飲水則傷心舌多成不語也當風乳兒或嗽吐腹膨倉公曰小兒迎風飲乳風冷入肺則令咳嗽寶鑑云風冷傷於乳令兒成嘔吐氣冷腹膨又經曰形寒飲冷則傷肺傷肺則咳嗽肺主氣氣傷則腹脹夜露乳兒多成嘔吐修真訣云夜露下乳兒冷乳入喉不散多成嘔逆寶鑑云天中餵乳氣逆停胸皆成嘔逆正食便乳成疳黃口臭王氏云正飧便乳令兒口臭牙中出血通真子云乳食並餐令兒面黃口臭又能生痰癖正汗便乳成心疳壯熱葛洪云汗者心之液正汗便乳則傷其心心傷則液散液散則皮膚燥成心疳壯熱食熱面乳兒多成龜胸孫兆云母食五辛令兒龜胸徐氏云食熱面便乳兒久必成龜胸食酸鹹炙爆乳兒成渴聖惠方云乳母恣食五辛炙爆厚味停積乳兒致兒臟腑生熱熱則煩躁生渴不止又云兒食醬肉渴飲水漿則成渴痢醉臥當風乳兒失音乳母醉臥當風乳兒令兒失音抱朴子云乳母飲酒過度當風取涼乳兒風冷酒毒邪乳入喉故令兒失音不語也嗽後飲乳成驚喘痰噎嗽後飲乳痰聚不散氣道不利關膈不通則成痰噎而驚喘悲喜未定便乳成涎嗽孟氏云悲喜未定便乳兒必涎嗽引風寶鑑云悲喜未定飲水則逆其氣氣逆勝血血隨氣行多成吐血兒啼未定便乳生癭氣凡兒啼未定便以乳塞其口乳之令氣不得消散故結聚成癭也孟氏云兒啼未定肺竅開即便乳兒與氣相逆氣凝結聚多成瘰癧癭瘤也小兒無患歌孩兒常體貌情態貌殊然鼻內干無涕喉中絶響涎頭如青黛染唇似點朱鮮臉方花映竹頰綻水浮蓮喜引方才笑非時手不宣縱哭無多哭雖眠不久眠意同波浪靜性若鏡中天此子俱安吉何愁患再纏養子日用法吃熱吃軟吃少則不病吃冷吃硬多則多病忍三分寒吃七分飽頻操肚少洗澡歌曰四時欲得小兒安常要一分飢與寒但願人皆依此法自然諸病不相干養子十法一要背暖經云背脊三椎下節之兩旁是肺之俞也若風寒傷於肺俞使人毫毛畢直皮膚閉而為病熱其證或咳嗽或喘或嘔噦或吐逆及胸滿憎寒壯熱皆肺經著寒而得之也故要背暖二要肚暖俗云肚無熱肚肚者胃也為水穀之海若冷則物不腐化腸鳴腹痛嘔噦泄瀉等疾生焉經云胃熱而能消穀必能飲食故要肚暖三要足暖經曰足為陽明胃經所司寒從下起故要足暖四要頭涼經曰頭者六陽之會諸陽所湊也頭為髓之海若大熱則髓溢汗泄或顱囟腫起或頭縫開解或頭瘡目疾俗云頭無涼頭故頭宜涼五要心胸涼心屬丙火若外受客熱內接心火則內外俱熱也其證輕則口乾舌燥腮紅面赤重則啼叫驚跳故心宜涼六者精神未全小兒忽見非常之物或見未識之人或聞雞鳴犬吠忽見牛馬等畜或嬉戲驚駭或忽聞大聲因而作搐者緣心氣乘虛而精神離散故也當用補心益氣藥治之如用鎮心牛黃硃砂琥珀金銀腦麝水銀等藥則成慢驚風搐以致腹脹足冷不能療也七者吐瀉慢驚經曰脾為黃婆胃為金公主養五臟六腑若脾胃全固則津液通行氣血流暢表裡沖和一身康健蓋脾胃屬土而惡濕小兒變蒸上唇腫而頭熱或上氣身熱父母不曉妄作傷寒傷食治之或以解藥出汗或以通藥宣泄或以涼藥鎮心或以帛湯振繳致令冷熱不調內傷脾胃搏於大腸故糞便清色久不已者必吐吐不已者作搐搐作又言熱則生風轉用涼藥治之愈覺敗傷真氣漸不救者多矣經云脾土虛弱肝木乘之故筋攣而作搐宜用補脾溫胃暢氣之藥治之庶可得其生也八者嘔奶糞青小兒在胎之時其母取涼過度冷氣入於胞胎之中兒生之後因悲啼未定便與乳食使氣與食蓄結於中久而不散致傷脾胃輕則嘔奶糞青重則腹中氣鳴氣逆涎潮流溢以致難治九者勿得輕服輕粉硃砂水銀輕粉俱有毒雖云下痰性冷損心氣辰砂雖云鎮墜性寒損神小兒服之易傷每每被其誤也多矣十者因浴致生丹毒小兒一周之內不可輕易頻洗肌膚脆嫩腠理不密洗之恐濕熱之氣鬱蒸不散變生赤遊丹毒片片如胭脂身發壯熱若毒氣入腹者死又有因浴傷寒咳嗽上氣外感之疾多由此也聽聲驗病訣樂記曰凡音之起由人心生也人心之動物使之然也感於物而動故形於聲聲相應故生變蓋人病蘊於內聲音顯於外樂聲亂則五音不和人聲亂則五臟不和所以聽聲音驗人之疾病也素問云視喘息聽聲音而知所苦是故周官云以五氣五色五聲視以生死孫真人云五臟不和五聲不順五色不定必主病也三因方云觀五臟有餘不足喉之於聲中之守也中盛則氣盛中虛則氣弱故聲如從室中言氣之濕也言而微終日乃復言氣之奪也言語善惡不避規疏此神明之亂也鄭聲音意不相續陰陽失守也故曰得守者生失守者死五臟虛實主病錢氏曰心主驚實則叫哭發熱飲水而搐虛則困臥悸動不安心病多叫手足動搖驚悸心氣熱則心胸亦熱欲言不能而有就涼之意故合面臥心熱視其睡口中氣溫或合面睡及上竄搖頭咬牙皆心熱也導赤散主之心實則氣上下澀合臥則氣不通故喜仰臥則氣得上下通也瀉心湯主之肝主風實則目直視大叫呵缺項急頓悶虛則咬牙多缺氣熱則外生氣溫則內生肝熱手尋衣領及亂捻物肝有風目連扎不搐得心熱則搐治肝瀉青丸治心導赤散肝熱甚身反張直不搐治與有風同凡病或新或久皆引肝風風動而止於頭目連扎也若熱入目牽其筋脈兩背俱緊不能轉視故目直也若得心熱則搐以其子母俱有實熱風火相摶故也潔古曰肝主謀熱則尋衣捻物目連扎直視不能轉視或極則身反強直折皆風熱也目者肝之竅肝屬木木性急故如此也脾主困病則困睡泄瀉不思乳食實則困睡身熱飲水虛則吐瀉生風肺主喘實則悶亂喘促有飲水者有不飲水者虛則哽氣長出氣肺熱手掐眉目鼻面肺盛復有風冷胸滿短氣氣急喘嗽上氣當先散肺熱後散風冷肺只傷寒則不胸滿肺虛熱唇深紅色治之散虛熱脾肺怯唇白色當補若悶亂虛煩氣粗喘促者難治肺虛損故也脾肺病久則虛而唇枯脾者肺之母也母子皆虛不能相營故名曰怯脾主唇唇白澤者吉白如枯骨者死潔古曰肺主氣燥則壯熱飲水喘悶鼻乾燥手捫眉面瀉白散主之胸滿短氣氣急喘嗽上氣皆是肺氣有餘復感風邪所傷謂之微邪先瀉而後發散腎主虛無實也虛者由胎氣不成則神不足目多白睛顱囟開解面色㿠白此皆難養不過八八之數若恣欲多不及四旬而亡或謂因病而致腎虛者非也又腎氣不足則下竄蓋骨重惟欲墜下而縮身也腎水陰也腎虛則畏明宜補之潔古曰下竄者腎水不足兩足熱不喜衣覆足然此者臍以下皆腎之所主緣心氣下行於腎部也此乃腎不足而心有餘宜地黃丸主之小兒諸病狀小兒驚哭聲沉不響者是病重醫難得效聲浮者輕調治便瘥頭皮乾枯筋脈緊急唇外赤而內白有瘡痍而無津至者兼驚而難痊此為熱之極矣眼赤是肝積熱怕明心肝有驚牙疳奶食之毒吃食不消是脾積冷耳聾是腎之虧胎癬是肺積風潮熱因驚而得或悲或歌是邪入脾口瘡肚脹疳積氣逆吐蟲胃與大腸積熱瘧疾是脾之傷開口睡是五臟毒盛多哭是驚風入肺愛吃泥土脾臟生蟲夜多盜汗是血虛有熱五心熱是疳癆聤耳是腎經邪熱腹脹噁心是脾胃之積愛吃木炭是肝臟生蟲吃茶葉知為心臟吃生米須識脾宮推之以理度之以意斯為醫哲圓融小兒雜病歌小兒雜病切須知不問童兒與女兒多睡只因肝是本心中積熱夜驚啼叫呼冷汗因蟲痛寒熱其中積在脾臉赤口瘡心肺壅虛風搐搦四肢垂冷滑傷脾或瀉痢如膿如血下無時積多肚大多掀水氣喘腮黃不問醫眼重吐涎頭擺急莫教脈息慢微微甚笑愚人偏問鬼不求良藥苦求師雜證病機訣急驚風眼喜張慢脾風眼喜閉啼而不哭是煩哭而不啼是燥張口出舌是風瞑目似睡不思乳食是虛腹痛盈盈是氣壅翻身伏臥是脾疾換手長揮聞言即哭是實清涕流出肺經受寒搖頭硬頸三焦壅熱魚目定睛夜死面青唇黑晝亡雜病不治歌吐瀉生風眼上膜風在眼中抓不著急驚過了喘無休慢驚過了皮膚薄盤腸過了心中孤嗽吐嘔逆心凹惡傷寒赤脈青相交結熱面黑皮毛落痘子入腹眼不開熱瀉出取口乾惡鎖口腰低唇黑青積痢脾毒唇捲縮此病因驚無有積豈有神仙留妙藥小兒輕易服藥戒羅謙甫案一小兒五月間因食冷粉腹中作痛遂於市藥鋪中贖得神芎丸服臍腹漸加冷痛時發時止逾七八年不已因思古人云寒者熱之治寒以熱良醫不能廢其繩墨而更其道也據所傷之物寒也所攻之藥亦寒也重寒傷胃其為冷病可知矣凡人之脾胃喜溫而惡冷況小兒血氣尚弱不任其寒故陽氣潛伏寒毒留連久而不除也治病必先其本當用和中養氣之藥以救前失服之月餘方愈嗚呼康子具藥孔子曰未達不敢嘗此保生之重者也奈何常拱默而令切脈以謂能知病否且脈者人之血氣附行經絡之間熱勝則脈疾寒勝則脈遲實則有力虛則無力至於所傷何物豈能別其形象乎醫者不可不審其病源且此子之父不以病源告醫而求藥於市肆以致七年之病皆昧此理也孫真人云未診先問最為有準東坡云只圖愈疾不欲困醫二公之言有功於世大矣小兒不宜服涼藥足脛冷腹虛脹糞色青吐乳食眼珠青面青白脈沉微此皆寒症不宜涼藥小兒不宜服熱藥足脛熱兩腮紅大便祕小便赤渴不止上氣急脈緊數此皆熱候不宜熱藥用藥活法用藥之法不可僻執古方當因證輕重加減藥味冷熱玄微務合其理切忌妄施誤投丸散頃刻傷殘性命天理不容為醫者可不自慎如雄黃牙硝石英硼砂丹砂之類不可火煎川烏附子鬱金南星半夏不可生用務須精細依法修制斯藥無不獲效矣服藥則例病在胸膈上者先食而後服藥病在心腹以下者先服藥而後食病在四肢血脈者宜空心而在旦病在骨髓者宜飽滿而在夜病在表者不以時候金銀薄荷之誤古方所載金銀薄荷為湯使後之醫士遂以薄荷外加以金銀耳環同煎殊缺明理夫環為女人常帶之物垢膩浸漬用以煎煮其味雜乎藥內大非所宜昔何澄論金銀薄荷即金錢薄荷是也今之家園薄荷葉小者如金錢考其名曰金錢薄荷此理甚明非所謂再加金銀同煎大概錢字與銀字相近故訛以傳訛是亦魚魯亥豕之類是也薑棗姜味辛微溫無毒生者發散寒邪炮者守中和胃棗味甘平無毒滋補脾胃調和百藥去核煎不去核者令人煩悶小兒雞醫於大人夫醫之道誠為難矣故治小兒為尤難孫真人云能醫十男子莫醫一婦人何也男子者榮衛氣壯婦人血脈相沖兼産又難為治千金云婦人之病比男子十倍難療又云能醫十婦人莫醫一小兒何也婦人可以問病血氣尚全小兒言語不能精神未備切脈難憑故曰難小兒十五候死證眼上赤脈下貫瞳人頂門突起兼及作坑鼻孔黑燥肚大青筋目多直視睹不轉睛指甲青黑忽作鴉聲舒舌出口齧齒咬人魚口氣急啼不出聲蛔蟲既出必是死形用藥速救十無一生五臟克絶心病目黑腎克心壬癸日絶肝病皮黑肺克肝庚辛日絶脾病唇青肝克脾甲乙日絶肺病頰腫目赤心克肺丙丁日絶腎病面腫唇黃土克腎戊己日絶胎熱證第一病機巢氏曰小兒在胎母食熱毒之物或熱藥令兒生下身熱面赤眼閉口熱痰盛喘急大便不通小便赤澀多因胎中受熱或因誤服溫劑致令熱蓄於內蒸胎氣固有此證若久而不治則鵝口重舌紫赤丹瘤急驚風搐皆由此而生也治法小兒初生有胎熱證者宜先以木通散煎與母服使通於乳令兒飲之通心氣解煩熱不可求速效乳母服藥漸次解熱百無一失若以涼藥攻之必致嘔吐也變生大患乳母仍忌辛辣酒面厚味庶易得安藥方木通湯治小兒胎熱諸熱腸腑閉澀瘡毒丹斑母子同服木通萹豆各五錢大黃赤茯苓甘草各三錢瞿麥滑石山梔子車前黃芩各一錢上水盞半燈心十莖薄荷五葉同煎釀乳法乳母服之豬苓澤瀉赤茯苓天花粉茵陳生甘草生地黃山梔等分上咀每服六錢水煎食後乳母捏去宿乳卻服此藥甘豆湯治小兒胎熱甘草一錢黑豆二錢淡竹葉十片上咀水一鍾燈心七莖煎不拘時服四聖散治小兒胎受熱毒生下兩目不開燈心黃連秦皮木賊上水一鍾棗子一枚煎澄清去渣無時洗兩目自開後服地黃膏地黃膏治胎熱山梔子緑豆粉各兩半粉草六錢上為末用生地黃搗杵兩半和好蜜一兩半以薄瓦器盛在銅銚內煮成膏如稀糊候冷後分入前藥末同在乳鉢內再研勻和丸芡實大每以半丸麥門冬湯化服胎寒證第二病機小兒初生百日內覺口冷腹痛身起寒粟時發戰栗曲足握拳晝夜啼哭不已或口禁不開名曰胎寒其證在胎時母因腹痛而致寒經云胎寒多腹痛亦有産婦喜啖生冷或胎前外感風寒暑濕治以涼藥內傷胎氣則生後昏昏多睡間哯乳瀉白若不早治多成慢驚治法胎寒證必對證施藥如腹痛身冷啼哭不寧者以當歸散定其痛如氣息不順者以勻氣散調其氣不乳者以白朮散養其胃氣白芍湯去其寒濕乳母更宜忌口藥方當歸散治小兒胎中受寒面色青白腹痛啼哭不寧當歸官桂川芎白姜炮香附子木香甘草各等分上為末每服一字以乳汁調下日二服看大小加減服之勻氣散治小兒胎寒咳嗽氣喘腹脹桔梗陳皮一錢砂仁茴香各五分白姜二分半粉草四分上為細末每服一字空心沸湯調參苓白朮散治小兒脾胃虛寒瀉泄不思乳食方見瀉泄門白芍藥湯治胎腹痛乳母同服白芍藥炒澤瀉各一錢炙草薄荷各二分上水煎加姜三片鉤藤一錢如乳母服宜大劑胎肥證第三病機小兒生下肌肉厚遍身紅如血色滿月以後漸漸肌瘦目白睛紅花色五心熱大便難時時吐涎者是也當用浴體法主之浴體法天麻末二錢全蠍硃砂各五分烏蛇肉酒浸白礬各三錢青黛二錢麝香一字上同研勻用水三碗入藥三錢桃枝一握並藥五七枝同煎至十沸溫浴之勿浴背胎怯證第四病機小兒生下面色無精光肌肉薄大便白水身無血色時時哽氣多噦目無精彩當如前法浴體胎驚候第五病機巢氏曰小兒在胎因母驚悸有所觸撲驚氣入胎子乘母氣降生之後其兒精神不爽顏色虛白初則溫溫有熱其後頰赤多驚物動則恐聲響則悸印堂青色壯熱哯乳睡中多驚手足微掣久則成癇受驚之輕者青龍湯全蠍餅至聖保命丹重者用奪命丹治之錢氏曰小兒壯熱吐乳心神不寧手足抽掣身體強直眼目反張則是胎驚風證治法小兒胎驚視其眉間氣色赤而鮮碧者可治若黯青黑者不可治虎口指紋曲入里者可治交出外者不治先宜解表風邪利驚化痰調氣貼囟甚則以朱銀丸利之凡初生嬰兒難以用藥如遇此候急取豬乳細研牛黃麝香各少許調末入口中則愈矣藥方青龍丸治小兒胎熱化痰鎮驚人參天麻茯神白附子炮牛膽南星烙各一兩甘草炙錢半青黛一錢硃砂水飛半錢麝香一錢上為細末煉蜜為丸如梧桐子大用鉤藤皂莢子煎湯研化不拘時服參蠍散治小兒胎驚定心神天漿子天竺黃人參硃砂全蠍天麻蟬蛻麝香少許上為末煉蜜為丸如梧桐子大每服一丸金銀湯下豬乳膏治小兒諸驚胎癇全蠍一個焙琥珀硃砂少許上為末每服一字麥門冬煎湯調下獨活湯治胎驚發散風邪羌活獨活各一分檳榔天麻麻黃去節甘草各半分上銼散每服半錢煎服於內加南星末蜜調下可貼囟用胎黃候第六病機巢氏曰小兒在胎受母熱毒生下遍身面目俱壯熱大便祕小便黃色多啼不乳千金論云小兒生下遍身面目皆黃如金色身上壯熱大便不通小便濁赤不思乳食啼叫不止此胎黃之候也皆因母受熱而傳於胎也有此證者乳母服地黃湯治法胎黃胎疸證母子俱宜服地黃湯及地黃飲子小兒百日內及半周不因病後身微黃者胃熱也若自生而身黃者胎疸也經云諸疸皆熱色深黃者是也犀角散主之若淡黃兼白者胃怯也白朮散主之方見瀉門藥方地黃湯生地赤芍藥天花粉赤茯苓川芎當歸豬苓澤瀉甘草茵陳各等分上銼用水煎食前服生地黃飲子治小兒生下滿身面目俱黃狀如金色面赤身熱眼閉不開大便不通小便如梔汁滿身生瘡生地黃赤芍藥各一錢羌活當歸甘草一錢上為極細末用燈心煎湯食前服犀角散治小兒胎熱一身盡黃犀角茵陳栝蔞根升麻煨甘草龍膽草生地黃寒水石煅等分上咀用水煎不拘時服臍風候第七病機小兒生後有臍風證者多因斷臍帶後為風濕所傷而成也風入臍者令臍腫腹脹口撮多啼不能乳飲謂之臍風若入經絡多變為癇當作癇證治之臍風致於四肢柔直日夜多啼不能吮乳甚則發為風搐若臍邊青黑撮口不開是為內搐不治爪甲黑者則死治法王氏曰熱在胸膛伸縮拿氣亦令臍腫宜千金龍膽湯主之藥方控痰飲治臍風宜先用此吐風痰次用益脾散和脾又用辰砂膏利驚即愈或手足攣拳噤口不開不治蠍梢銅青各五分硃砂一錢膩粉一字麝香少許上為末每服一字臘茶清調下先吐風痰然後和胃或有甘草方吐痰隨輕重用宣風散治小兒初生因斷臍後外傷風濕唇青不乳多喘撮口全蠍二十一個頭足全去毒用無灰酒炙塗為末用麝香一字另研上為極細末用半字金銀煎湯或麥門冬湯調化食遠服防風散治小兒臍風防風羌活白芷當歸黃耆甘草各五分上為細末少許燈心湯調服撮口候第八病機聖惠論小兒撮口皆由在母胎中挾於風熱兒生之後氣血未調洗浴當風而成此疾若口吐白沫四肢覺冷必難用藥也小兒患諸風疾傳入惡候至於撮口病致危急凡有臍風撮口胎風撮口鎖肛撮口釣腸撮口卵疝撮口應病悉入成風風入心脾俱能撮口夫患在撮口者皆由結鬱於中干及腸胃閉不得通氣不能化腹中滿脹肚下青筋撮口不乳證候甚急若不速與利下無可救療若將撮口以為常少緩之則斃矣治法撮口最為急候治法貴乎疏利以辰砂膏利之而愈一臘之內見之尤甚藥方辰砂殭蠶散治初生撮口辰砂水飛五分殭蠶直的去緑嘴炒一錢蛇蛻炒一錢麝香研半分上為細末少許用蜜調敷唇口龍膽湯治嬰孩月內胎驚氣盛發熱臍風撮口龍膽草鉤藤柴胡黃芩炒桔梗赤芍藥炒茯苓各五分甘草炙五分蜣螂二枚去翅足炙大黃一兩濕紙包火煨上為極細末用棗去核煎或加防風麥門冬煎湯調服撮風散治小兒撮口赤腳蜈蚣半條炙鉤藤一分硃砂全蠍梢各一錢麝香一字上為末每服一字竹瀝調下口噤候第九病機巢氏病源云小兒在胎母吃熱物熱入臟腑兒生之後熱毒結聚滿口舌上其形如粟令兒不能開口名曰口噤聖惠方云初生兒須防三病一曰口噤二曰撮口三曰臍風皆是急病就中噤口尤甚若過一臘方免此病但看牙關緊急不能吃奶啼聲漸小口吐涎沫便是此證急看兒上齶有白點子先以指甲刮去次後服藥治法治口噤噤風之證看兒上齶有點子以指甲輕輕割破次服定命散辰砂全蠍散之類如口噤不開諸藥不效者生南星研為極細末龍腦少許合和用指蘸生薑汁於大牙根上擦之立開凡臍風撮口噤口等風數證雖異受病之源一同大抵裡氣鬱結壅閉不通並宜服淡豆豉汁取下胎毒千金方云小兒氣高若有微熱即須下之若不時下則成大患難為療矣紫霜九量與之藥方定命散治小兒初生口噤不乳蟬蛻二十枚去嘴足全蠍十個去毒上為極細末入輕粉少許和研用乳汁調化服辰砂全蠍散治小兒初生口噤辰砂飛半錢全蠍去毒炙二十枚硼砂龍腦麝香各一字上為極細末用乳母唾調塗口唇里及牙齒上或用豬乳少許調入口內蜘蛛方治小兒口噤不開不能吮乳蜘蛛一枚去足及口炙令焦細研用豬乳一合和為三服徐徐灌之神妙入麝香少許治牙疳極妙蜈蚣方治同前蜈蚣一條去足炙令焦為末麝香少許以豬乳和之蓋豬乳能獨主小兒口噤不開之證鎖肛證第十病機小兒由胎中受熱熱毒壅盛結於肛門閉而不通無復滋潤所以有鎖肛之候至若第三日不通急令婦人以溫水漱口吸咂兒前後心並臍下手足心共七處凡四五次仍以輕粉半錢蜜少許溫水化開時時將少許服之以通為度如便不通即是肛門內合當以物透而通之金簪為上玉簪次之須探入二寸許以蘇合香丸納入孔中糞出為快也若肚脹膨脹不能乳食作呻吟聲至於一七難可望其有生也藥方蘇合香丸治小兒鎖肛大便不通方見驚風門豬膽煎治法導入小兒肛門豬膽一枚以竹管一個插入膽內以絲線密上扎定以竹管插入肛門方逼膽汁入即通臍突候第十一病機臍為兒之根蒂胎氣固則形體壯臍深則根命長受氣乖違形痿臍突凡兒斷臍利益漸長漸深吻乳調和愈實是血脈之相順致形體之相資初生之兒有在胃及胸膛則頻頻伸引厄厄作聲努脹其氣抑入根本之中所以臍突腫赤虛大可畏無識之人將謂斷臍不利而使然者則非也斷臍不盈亦一臘之內隨其根蒂自腐實者深之弱者淺之深淺之理以其稟賦得之良由胎中母多驚熱宜與散熱之藥其臍歸本不必以毒藥敷之恐毒傷入為害藥方山梔五苓散治小兒臍突梔子仁炒白朮炒白茯苓豬苓澤瀉各一錢官桂五分上為極細末每服一錢或五分用蜜湯燈心湯調下二豆湯治前證赤小豆豆豉天南星制白蘞各一錢上為細末每用半錢用芭蕉自然汁調敷臍四傍一日一次二日二次若得小腑下白即安眼閉候第十二病機治法小兒初生眼閉不開者由産母食熱毒之物致成斯疾治法當以熊膽少許蒸水洗眼上一日七八次如三日不開用生地黃湯服仍洗乳頭須要山茵陳湯以開眼藥方生地黃湯治兒初生眼不開乾生地黃赤芍藥川芎當歸栝蔞根甘草各一錢上為末少許抹兒口中燈心煎湯調抹入口中連服效山茵陳湯釀乳山茵陳澤瀉各三錢栝蔞根豬苓甘草生生地黃各一錢半上為咀水煎食後服初服二服且捏去宿乳第三服後卻令兒吃乳若産母自乳亦可服驚風門第十三病機驚風總論閻孝忠曰小兒急慢驚風古無之惟曰陰陽滴而已所謂急慢者後世名之耳正如赤白痢疾之類是也直指方云急者屬陽陽盛而陰虧慢者屬陰陽虧而陰盛陽動而躁疾陰靜而遲緩其始也皆因臟腑虛而得之虛能發熱熱則生風是以風生於肝痰生於脾驚出於心熱出於肺而心亦主熱驚風痰熱合為四證四證已具八候生焉凡扎眼搖頭張口出舌唇青臉赤面青眼青瀉青太陽髮際印堂青筋三關虎口脈紋紅紫或青者皆驚風也大抵熱論虛實證別逆順治有先後蓋實熱為急驚虛熱為慢驚慢驚本無熱所以發熱者虛使然耳急驚屬陽用藥以涼慢驚屬陰用藥以溫其不可以陰陽無別故曰熱論虛實者此也男搐左視左女搐右視右男眼上竄女眼下竄男握拇指出外女握拇指入里男引手挽左直右曲女引手挽右直左曲皆為之順反之則逆亦有先搐左而雙搐者但搐順則無聲搐逆則有聲其指紋形勢攣入里者順出外者逆出入相半者難痊故曰證別逆順者此也凡熱盛生驚驚盛生風風盛發搐治搐先於截風治風先於利驚治驚先欲豁痰治痰先於解熱其若四證俱有又當兼施並理一或有遺必生他證故曰治有先後者此也綱領如此若析急慢驚風而言之則暴烈為急驚沉重為慢驚而慢脾則又重而深矣急驚變為慢驚之因急驚變為慢驚者因壯熱精神恍惚發驚搐醫以吐下藥太過多以涼驚藥不愈荏苒經曰脾虛不實昏睡露睛涎鳥氣粗肢冷時疼時作瘛瘲此急驚變成慢驚也慢驚變為急驚之因慢驚變為急驚者因傷乳食或吐或瀉時作瘛瘲醫以溫熱藥太過以慢驚藥不愈體熱涎盛面紅目赤大便不通小便赤瀝舌白唇紅急發驚搐此慢驚變成急驚也驚有四證八候四證者驚風痰熱是也八候者搐搦掣顫反引竄視是也搐者兩手伸縮搦者十指開合掣者勢如相撲顫者頭偏不正反者身仰向後引者臂若開弓竄者目直似怒視者睛露不活四證已備八候生焉四證既無八候安有專是藥者可不究心及此脈病證治明有條類大抵嬰孩得疾貴乎早治若初覺受驚傷風發熱便與疏解何患之有傳變之異所謂闖門之盜不可以固留逆流之水不可以順決此有疾在謹其初之意也脈候脈訣啓蒙云小兒脈促急為虛驚直指云浮數洪緊為急驚沉遲散緩為慢驚虎口脈紋青紫為驚風紅者風熱輕赤者風熱盛紫者驚熱青者驚積青而淡紫伸縮來去主慢驚青紫相半驚積風熱俱有主急驚風紫絲青絲或黑絲隱隱相雜似出而不出主慢脾風形勢彎入里者順出外者逆治法驚風痰熱四證用藥法小兒有熱熱盛生痰痰盛生驚驚盛生風風盛生搐搐盛則牙關急急甚反張上竄痰涎壅牙關緊風熱極閉經絡即作搐搦涎壅胃口悶亂不醒才入中脘手足拳攣是諸關竅不通百脈凝滯有退熱而愈者有治痰而愈者有治驚而愈者有通關而愈者皆是依證用藥不可不究竟其所以受病凡病在熱不可妄治痰病在驚不可妄治風病在痰不可妄治驚病在風不可妄治搐治法病在驚驚由痰熱得者只可退熱化痰其驚自止病在風風由驚作只可利驚化痰其風自散病在痰涎急須退熱化痰若還有搐須用截風散驚此為活潑之治也治驚當分三因錢氏曰小兒驚搐因傷風后得之口中氣出熱呵缺煩悶手足動搖當發散大青膏主之小兒本怯多此病也因傷食後得之身體溫多睡或吐不思乳食而發搐當先定搐搐退白餅子下之後與安神丸主之惟瘡疹能發搐風火相爭故也治當瀉心肝補母也類萃治小兒因傷風而得驚搐者同大人傷風寒之類當辨有汗無汗陰陽二證用大青膏仲景小續命之類開發則愈傷食發搐謂不因他證忽然而搐此因飲食過度致損脾胃故見多睡或吐不思乳食脾胃既虛引肝風則發搐當先定其搐加羌活防風煎下瀉青丸後用白餅子下其食漸漸用調中丸異功散養其氣或因斑疹而得搐者蓋疹為脾虛所生脾虛而肝旺乘之木來勝土熱氣相擊動於心神心喜為熱神氣不安故也斑為心所生心主熱熱則生風風屬於肝二臟相搏故發搐也宜瀉肝補其母導赤散地黃丸主之丹溪治驚風大法小兒驚風有二急驚屬痰熱宜涼瀉一云用降火下痰丸養血藥作湯下之慢驚屬脾虛所主多死宜用溫補一云當義脾世以一藥通治二驚此甚妄也急驚風熱口瘡手心伏熱痰嗽痰喘並用湧法重則用瓜蒂散輕則用赤小豆苦參末須用酸虀汁調服之候小定用通聖散蜜丸服之間以桑樹上桑牛陰乾為末調服以平其風又以北薄荷葉寒水石各一兩青黛白殭蠶辰砂各一錢全蠍二枚豬牙皂角槐角各五分為末燈心湯和乳汁灌之角弓反張目直視因驚而致宜南星半夏入薑汁竹瀝灌之更灸印堂頻吐瀉者將成慢驚用錢氏白朮散加山藥扁豆炒肉豆蔻麵包煨各一錢入姜一片煎服若慢驚已作加細辛天麻各一錢全蠍三個去梢白附子八分麵煨驚而瀉用參苓芍藥酒炒白朮姜煎夏月加薑黃連生甘草服之驚風候各有所屬小兒非時釣上眼睛是肝風驚白日無時喜笑驚風在心夢中五指捻動驚風在筋畏人恐怖驚在脾夢中非時手足抽動驚風在肝心二臟面色赤非時作黑驚在腎無時咬人驚風在骨非時手足拿人驚在三焦夢中吐舌驚在心睡時喉中響拽驚在肺並胃脘面色青白無時發熱戰驚在脾無時面上黑色惡叫驚在腎治驚大法有方用藥有序急以退熱疏風下痰定搐開關當下便不可用巴豆硝粉腦麝牛黃大寒之劑下之大黃可也恐傷真氣元陽也小兒易虛易實用溫涼之劑無過與不及要問前醫曾經解利不曾又不知真假逆順傷寒傷風麻痘食積變蒸熱急亦致發搐假搐是也各有見證可驗牙關不緊若無痰潮見其驚風便言熱則生風便與腦麝巴霜牛黃輕粉大寒毒劑截風峻取下痰以致脾胃虛損以傳慢候夭傷者多矣凡百病不可損其胃氣醫者慎之曾經下後諸病猶存不得再下有驚散驚有熱退熱有痰利痰壅實則去壅實熱退則不生痰驚散則不生風壅實去氣自平病何由作錢氏曰溫驚丸涼驚丸利驚丸何也虛則溫之實則利之熱則涼之通驚開關楊氏曰驚風搐搦關竅不通皆由痰塞中脘留滯百節所致痰之潮塞者氣實使之治風痰當用半夏南星全蠍殭蠶亦當用蘇合香丸同青州白丸子同薄荷煎湯調入生薑汁灌服蓋使氣下則痰下痰下則關竅自通若搐鼻不嚏者不治驚風不能治證急驚眼睛翻轉口中出血兩足擺跳肚腹搐動或神緩而摸體尋衣或證篤而神昏氣促噴藥不下通關不嚏心煩忽叫者不治慢驚四肢厥冷吐瀉咳嗽面黯神慘鴉聲胃痛兩脅動氣口生白瘡髮直搖頭眼青不轉涎鳴喘嗌頭軟大小便不禁手足一邊牽引者皆為不治慢脾身冷黏汗直臥如尸喘嗽頭軟背曲口禁搖頭痰如拽鋸面無潤澤唇促氣粗者不治藥方通治驚風諸劑通關劑治小兒驚風搐搦關竅不通南星炮一錢豬牙皂角二錠燒存性殭蠶炒一錢麝香一字赤腳蜈蚣一條炙上為細末以指點薑汁蘸藥少許擦牙或用物引滴入藥兩三點涎自出口自開噴驚散治小兒一切驚風不省人事牙關緊者吹鼻立醒半夏一錢豬牙皂角半錢上為末用一豆許用管子吹入鼻立醒青州白丸子治一切驚風風痰壅盛半夏泡七次川烏去皮臍半兩南星三兩白附子半兩上搗羅為末以生絹袋盛用井花水擺浮出者更以手擦令出如有渣更研再入絹袋擺盡為度放瓷盆中曬夜露至曉棄水別用井花水攪又曬至來日早再換新水攪如此三次春五日夏三日秋七日冬十日去水曬乾候如玉片碎研以糯米粉煎粥丸如緑豆大初服五丸加至十丸生薑湯下不拘時蘇合香丸治小兒一切驚證用此開關利竅蘇合香油入安息油內各一兩安息香別為末無灰酒一升熬成膏薰陸香別研一兩青木香白檀香沉香丁香麝香白朮烏犀屑硃砂研水飛訶梨勒煨去皮香附子炒蓽茇各二兩龍腦五錢上為末煉蜜丸梧桐子大每服一丸薑湯化下鎮驚丸小兒急慢痰壅手足抽掣口眼喎斜煩躁生嗔精神昏悶常服寧心鎮驚疏風順氣俱用人參甘草半生半炙茯神殭蠶去嘴炒枳殼麩炒各五錢白附子炮膽南星炒茯苓硼砂牙硝硃砂飛各錢半全蠍去尾十個麝香一字上為細末糯米糊丸芡實大薑湯或麥門冬湯化下消驚丸治小兒驚風鎮心利痰解熱人參天麻茯苓硃砂水飛全蠍去毒炒殭蠶去嘴炒羚羊角鎊犀角天南星牛膽制四錢麝香一字上為極細末煉蜜丸如芡實大用菖蒲煎湯研化食後服牛黃清心丸治小兒四證八候去風痰散驚熱南星半夏白附子川烏炮各一兩川鬱金五錢上五味作粗未用臘月黃牛膽三個取汁和藥入膽內扎定縣當風處三月取出入添馬牙硝硃砂雄黃硼砂一錢腦麝少許如膽藥一兩硝砂四味各一錢稀麵糊丸黍米大薄荷湯送一歲十丸大牛黃清心丸治小兒諸風狂亂驚癇痰涎壅塞精神昏瞶牛黃羚羊角鎊各一錢芍藥炒防風白朮麥門冬黃芩炒各錢半當歸半錢人參蒲黃炒神麯炒各錢半犀角鎊一錢山藥炒七錢肉桂一錢白蘞七錢甘草雄黃水飛八分龍腦半錢乾薑炮七分茯苓川芎炒錢半桔梗杏仁去皮尖麵炒去面研成膏柴胡炒各一錢三分半麝香一字阿膠炒成珠一錢半棗去核十個研成膏大黑豆炒一錢半上為細末煉蜜丸芡實大竹葉煎湯研化服抱龍丸抱者保也龍者肝也肝應東方青龍木木生火謂生我者父母也肝為母心為子母安則子安況心藏神肝藏魂神魂既定驚從何生故曰抱龍丸理小兒諸驚四時感冒瘟疫邪熱煩躁不寧痰嗽氣急瘡疹欲出發搐並宜用此常服驅風化痰解鎮心熱和脾胃益精神鎮虛驚恐怖譫語人參天竺黃琥珀檀香茯苓各一兩五錢甘草炙三兩枳殼炒枳實炒辰砂飛五兩山藥炒一斤牛膽南星炒一兩金箔一百片上為極細末隨手新汲水和勻如芡實大陰乾治法用蔥白煎湯或薄荷湯痰壅咳甚生薑湯痘疹瘡見形有驚白湯下心悸不安燈心湯入珍珠末一分和勻不拘時服定志丸治小兒驚風已退神志未定以此調之琥珀茯神人參遠志薑製焙白附子天麻麥門冬酸棗仁甘草炙等分為末上煉蜜丸皂角子大硃砂為衣每服一丸薄荷湯調下龍虎壽生丹治小兒急慢驚風諸證全蠍去毒炒十四個天麻煨二錢殭蠶去嘴炒辰砂水飛膽南星白附子炮白花蛇肉酒浸去骨各一錢防風二錢代赭石醋煅七次鐵華粉各半錢龍腦一字麝香一字上為細末煉蜜為丸如芡實子大金箔為衣用薄荷煎湯研化不拘時服急驚風候第十四病機小兒急驚者本因熱生於心身熱面赤引飲口中氣熱大小便黃赤劇則搐也蓋熱甚則生風風屬肝此陽盛陰虛也以利驚丸主之除其痰熱不可與巴豆及溫藥大下之恐搐止虛熱不消也熱痰客於心胃或因聞大聲非當則動而驚矣搐過後則又如故此無陰也若熱極雖不因聞聲及驚亦自發搐急驚證上竄反張搐搦口流痰涎壯熱並有之其或有親左視右者有僵僵仰也屬陽有僕僕覆也屬陰拳握指有里有外醫分男女定陰陽順逆之理有左右引搐連及腳手身體顫動初則搐搦俱作久而搐住只搦有急有緩但只肩動又瘛瘲瘛瘲者候之輕也搐則盛也搦又重也反張牙關緊急喉中有涎即是驚風候如牙關不緊口無痰涎只反張搐搦上竄者未可便作驚風蓋夾驚夾食傷寒豆疹或三焦蘊熱五臟不宣流入經絡熱在筋脈亦作搐溺錢氏搐搦有真假急驚量其分數約熱之輕重而利之脈候浮數洪緊為急驚虎口脈紋青紫相半驚風積聚俱有主急驚治法潔古云急驚陽證也俱腑受病耳小兒熱痰客於心肺是以少陽相火旺經云熱極生風因聞火聲而作蓋謂東方震卦得火氣而發搐火本不動得風而動當用利驚丸導赤散瀉青丸地黃丸主之搐止服安神丸小兒欲發驚風候神先不定顧左復右觀上反下或已定其精凝其神恍恍惚惚怕物懼人不若常日嬉戲者當急療之如有熱先退熱有驚散驚熱退不生痰驚散不作風良久自然安定急驚欲下之理一時發作上竄斜視反張速宜下之若傳過或已搐定少緩之間未可便下有所得失急驚候至為要緊急在片時之間若或差殊間有得失所見端的無疑急須投藥稍有疑惑少緩片時不可救矣急驚證治難易急驚證鼻中出血者易大小二便順利者易治急驚風未投藥四證俱全已服藥四肢垂嚲者難治噴藥及藥不下者難治急驚搐搦之後四體軟者難治搐後目睛翻轉者難治驚搐已住神精緩慢手尋娘衣或尋自身體者亦不可治驚搐證住但神昏氣促者不治驚證口中血出難治驚證二便自遺者難治藥方涼驚丸治小兒驚疾搐熱龍膽草防風青黛各三錢鉤藤一錢牛黃一字麝香龍腦一字黃連半錢上為末曲糊丸如黍米大每服三十丸金錢薄荷煎湯食遠下瀉青丸治小兒肝受風熱目睛上視急驚發搐當歸龍膽草川芎梔子仁羌活防風各一錢大黃濕紙包煨半錢上為極細末煉蜜為丸如芡實大用砂蜜湯研化食前服錢氏利驚丸治小兒急驚痰熱潮搐輕粉一錢天竺黃青黛各一錢牽牛炒取頭末五錢上為細末煉蜜丸梧桐子大以薄荷煎湯研化食前服導赤散治小兒內熱小便赤黃心躁睡語用此治急驚生地黃木通甘草等分上銼散每服三錢水一盞竹葉三個煎服安神丸治小兒驚悸渴悶脈實面紅頰赤口燥麥門冬馬牙硝白茯苓山藥寒水石各半兩硃砂一兩甘草半兩龍膽一字上為末煉蜜為丸如雞頭子大每服半丸砂糖水下定搐散治小兒急驚搐赤腳蜈蚣去足酒炙一條麻黃膽南星白附子直殭蠶炒羌活代赭石醋淬七次用蠍梢川薑黃各二錢硃砂一錢上為末每服一字荊芥紫蘇湯調如搐不止加烏蛇肉炙入金箔鎮心丸治小兒風壅痰熱心神不寧驚悸煩渴唇焦頰赤夜臥不安譫語狂妄急驚搐搦紫河車用黑豆煮軟切作片一錢半人參甘草炙茯苓各五錢山藥兩半辰砂水飛一兩牙硝錢半麝香半錢龍腦一字金箔十二片上為極細末煉蜜丸如雞頭子大金箔為衣用薄荷煎湯研化食後服常服安鎮心神退驚止熱大青膏治小兒驚熱涎盛眠臥不安或即發搐大青葉二錢半白附子炮錢半青黛大麻煨各一錢全蠍梢去青半錢硃砂水飛一字麝香一字烏梢蛇酒浸半錢天竺黃一字上為細末生蜜丸芡實大薄荷湯研化食遠服金棗化痰丸治小兒急驚痰壅神效大麻七錢膽南星半夏制二錢白附子全蠍各一錢輕粉一錢硃砂二錢半雄黃一錢麝香三分珍珠五分枳實一錢半硼砂一錢金箔二十片為衣槐角七錢金棗三十三個上為細末將棗去核用巴豆二十粒入棗內麵包煨熟去巴豆不用將棗肉同藥末搗勻為丸重一分濃煎薄荷湯化下五仙丹治前證天麻四錢酒浸一宿全蠍水洗去頭足瓦上烙干四錢白附子錢半辰砂一錢巴霜四分上為細末薑湯加煉蜜一匙調服二分半量兒大小虛實與之為丸磨化服亦可慢驚風候第十五病機楊氏曰慢驚之證或因急驚過用涼藥或取下大過傳變而成或吐痢不止而得或氣虛暴吐而成有臟腑虛洞泄成者風邪入於腸胃故大便不禁而痢又有久痢胃氣虛脫成者有傷寒傳變陰證而成者有得之久嗽成癇者有下積峻取而成者有吐血瀉血而成者有感風不解誤藥而成者有得之發癇不已者有得蟲積衝心者有卵腫疝氣腹痛得之者有日夜盜汗脾困多睡煩躁引飲四肢浮腫大小便祕丹瘤腫毒龍帶纏腰走馬急疳皆傳慢候惟吐瀉積利成虛治之則變證甚速慢驚者因久吐瀉而胃氣漸虛胃與肺母子也母虛亦令子衰二經虛則生虛痰者肺胃所出也痰則凝滯在於咽喉如拽鋸之聲時復瘛瘲是也小兒因病後或吐瀉脾胃虛損遍身冷口鼻氣出亦冷手足時瘲瘛昏睡露睛此無陽也急驚慢驚陰陽二證切宜辨而治之急驚合涼瀉慢驚合溫補世之俗醫不知分別誤死甚多小兒傷於風冷病吐瀉醫謂脾虛以溫補之不已復以涼藥治之又不能已謂本傷風復又攻之脾氣即虛故大便不聚而成瀉當去脾風風去則利止宣風散主之使君子丸補其胃亦有諸吐利久不瘥者脾虛生風而成驚脈候脈沉遲散緩為慢驚風虎口脈紋青淡紫色伸縮來去主慢驚風青紫或黑紋隱隱相雜似出而不出主慢脾風治法閻孝忠曰慢驚得於大病之後吐瀉之餘或誤取轉致脾胃虛損風邪乘之似搐而不甚搐名曰瘛瘲似睡而精神慢四肢冷而口中氣皆冷睡中露睛或胃痛而啼哭如鴉聲此證已危蓋脾胃虛損故也潔古曰慢驚陰證也俱臟受病耳蓋小兒泄瀉病久脾胃虛損若不早治則成慢驚名曰瘛瘲似搐而不甚搐也脾肺俱虛肝木所乘是為慢驚也常用溫補羌活膏主之醫慢驚不可急攻急驚陽證稍易理慢驚陰證最難治服藥已愈而尚虛乏未待三五日之間者有之俗謂過街候發為定論不可輕易妄劑投之攻急則前功俱廢慢驚所治之理須究問原由所發若是急驚傳陰為慢驚者乃陽癇所作陰癇也當察陽證未純其陰證用藥斟酌如因泄瀉而作慢驚者男兒為重如因吐逆而作慢驚者女子為重即陽脫而陰盛小兒有長幼之別臟腑有虛實之分有瀉三五次便成風候乃由虛之盛也或有二三日泄方成風候或有五七日瀉不止而成風候暴瀉成風猶可速治蓋回陽調中補氣之謂易若久瀉漸傳成風候者為虛乏故難理療慢驚不治證四肢厥冷吐瀉咳嗽面黯神慘鴉聲胃痛兩脅動氣口生白瘡髮直搖頭睛不轉涎鳴喘嗌頭軟大小便不禁手足一邊牽引者皆為不治唇臉青紫者不治一身不管百節似癱者不治藥方理中湯治小兒慢驚脾胃寒虛泄瀉方見脾胃門朮附湯治小兒身冷泄瀉慢驚白朮炒二錢甘草炙一錢熟附子六分上水一盞生薑五片棗二枚煎食前溫服醒脾散治小兒吐瀉不止痰作慢驚脾困昏沉默默不食木香一錢全蠍去毒炙五分天麻煨白朮炒人參茯苓殭蠶去嘴炒白附子炮甘草炙各一錢上為細末用棗去核煎湯調化不拘時服王氏惺惺散治小兒吐瀉脾弱內虛生驚人參茯苓木香天麻扁豆全蠍炙陳米炒各等分上咀每服二錢薑棗煎服星香全蠍散治小兒慢驚風昏迷痰搐木香膽南星人參陳皮各錢全蠍炙甘草炙五分上為咀每服一錢入紫蘇三葉薑棗同煎烏蠍四君子湯治前證人參白朮茯苓甘草炙川烏全蠍炙等分上為細末服半錢姜艾湯調下再服去川烏一方以烏蠍四君子湯調下蘇合香丸亦妙醒風湯治小兒吐瀉後胃虛生風手足搐搦驚悸天麻炮防風人參白附子炮全蠍毒炒殭蠶去嘴炒天南星甘草炙上咀用姜三片冬瓜仁三十粒同煎不拘時服定命飲子治小兒吐瀉脾胃虛弱不止半夏曲天麻甘草炙茯苓去皮白朮炒老生薑上咀加薑棗煎食遠服或為細末薑棗湯調服亦可益黃散治脾虛吐瀉不止及成慢驚陳皮丁香五粒訶子肉青皮炒甘草炙各五分上咀水煎膿服無時錢氏白朮散治小兒脾虛吐瀉積痛頻泄欲成慢驚人參白朮炒茯苓甘草炙加半分藿香各等分木香少許葛粉上為末每服一二錢薑棗湯調服丹溪加白扁豆山藥肉豆蔻用姜一片煎服若慢驚已作加全蠍天麻細辛白附子麵煨同煎服天王散治小兒吐瀉或誤服冷藥脾虛生風成慢驚天南星一個重八九錢去臍淨黃土地坑子深三寸炭火五斤燒通紅赤入好酒半盞後入南星卻用炭三兩條蓋卻坑子候南星微裂取出銼碎再炒熟為極細末用五錢天麻煨取末一錢麝一字和勻三歲用五分生薑防風煎湯調化不拘時服亦治久嗽噁心四聖散治小兒慢驚痰滯竄視搐搦以少許吹入鼻中全蠍去毒炒七個殭蠶去嘴炒四個天南星去皮臍生用七錢半川烏去皮臍生用三錢上將南星研極細末調作餅裹全蠍殭蠶川烏外用水濕紙重包慢火煨赤色放在地上一伏時取起研為極細末用少許吹入鼻中以薑汁調一字服全蠍觀音散治小兒吐瀉脾虛發作慢驚全蠍去毒炒十個天麻煨防風白芷各一錢人參黃耆茯苓甘草炙白扁豆薑湯浸去皮炒各錢半上為極細末棗二枚冬瓜仁炒煎湯調下不時服調氣散治小兒慢驚之後以此調理木香香附子制人參陳皮藿香甘草各等分上咀每服二錢姜三片棗一枚水一盞煎服太乙保生丹治小兒慢驚尚有陽證全蠍十四個白附子生直殭蠶膽南星蟬蛻琥珀各二錢麝香半錢防風硃砂各一錢上為末粟米粉糊丸梧桐子大金箔為衣每服一丸薄荷湯調夜啼候第十六病機夜啼者有陰陽二證陰者臟冷也夜則陰盛與冷相搏臟氣交擊故作痛而啼陽者臟熱夜則陽衰與臟熱交擊亦作痛而啼也藥方安神散治小兒一百二十日內夜啼蟬蛻四十九個只用後半截上為細末分作四服用鉤藤煎湯不時調化服五味子散治小兒夜啼及腸痛至夜則似鬼祟五味子當歸赤芍藥白朮各五錢茯神陳皮桂甘草炙各二錢上咀每服三錢水煎燈花膏治小兒夜啼不已燈花七分硃砂一字上研末白蜜調兒睡抹唇內哭無聲候第十七病機幼幼新書云鍾洪聲大澗遠流長形處胞胎之中受氣充足水火兼濟心腎不虧所以發聲清響洪亮是其根本深壯稟賦充實抑自然之理也初生啼哭發聲不出或短促厄厄上下氣不相乘此由胎氣不足根本不壯何必藥焉縱使以意投藥終非長大之兒醫當不可不察客忤候第十八病機小兒客忤是外人帶來穢惡之邪氣忤之一若中人是為客忤雖是父母家人或從遠來外至經履神廟喪門飲酒騎馬乍至汗氣穢氣近兒若一染之皆為客忤凡兒中忤面變五色狀若驚癇但目不上視或口吐青白沫喘息腹痛反側瘛瘲如驚無異此緣小兒心虛精神不足易犯客忤之氣切不可作驚治宜補心神自不畏犯凡中忤發搐脈來弦急而數面色變易視其口中有懸壅左右有小泡即以竹刺潰之或以指甲摘之藥用避邪正氣散安神自愈也物觸候第十九病機大抵小兒隨其心性不可觸逆凡有所愛之物不可強直取之心神所好若不遂欲心氣解散神逐物遷不食不言神昏如醉四肢垂嚲狀如中惡醫士見之莫之措手如有此證詢其母及左右順其所欲然後用藥則安也藥方沉香順氣散治小兒物忤逆觸沉香茯神紫蘇葉人參甘草炙各一錢上為細末紫蘇梗煎湯調化不拘時服安息香煎治同前安息香蘇合香檀香藿香甘草膽南星各等分上為細末薑汁調作小餅每用磨化塗奶上及焚煙避一切客忤及物觸犀角散治客忤驚啼壯熱犀角麥門冬天麻鉤藤硃砂各一錢鐵粉雄黃各半錢麝香少許上為末每服半錢金銀煎湯調服伏龍肝散治前灶心黃土二兩研雞子一枚二件和水少許調勻塗五心及頂門天釣候第二十如魚之上鉤故云天釣病機錢氏云小兒天釣病皆由乳母飲酒食肉房勞熱毒之氣流入乳中兒食其乳遂使傳其熱毒痰涎蘊積不得宣通加之外挾六淫致有此證其患壯熱驚悸眼目翻騰手足抽掣或啼或笑喜怒不常甚者爪甲皆青如祟之狀初得之時四肢瘛瘲壯熱無時頻頻呵缺脈大而實治法速宜解利風熱藥方鉤藤飲治小兒天釣潮熱鉤藤人參各半錢犀角三分甘草炙二分全蠍天麻各一分上為末每服一錢水半盞煎過半溫服天竺黃散治小兒天釣目睛釣上四肢瘛瘲天竺黃臘茶甘草炙各一錢全蠍生薄荷葉裹煨炙七個緑豆半生半熟炒四十粒荊芥穗雄黃水飛枯礬各等分上為細末每服半錢人參煎湯調服內釣候第二十一病機病源曰驚風內釣腹痛多啼汗出糞清咬乳睛慢流涎或唇焦黑囊腫傴僂眼內紅筋斑血虎口脈紋侵入掌中藥方桃符丸治小兒內釣銀硃半錢乳香一錢蒜煨一個上為細末用蒜研勻丸如黍米大半歲兒五丸薄荷煎湯化下全幼方用青龍湯加鉤藤鉤子七個皂角子七粒薄荷湯同煎服癇證候第二十二病機內經曰癇為神不守舍謂神亂也大抵癇證皆由驚動是臟氣不平鬱而生涎閉塞諸經厥而乃成或在母胎中受驚或幼小感風寒暑濕或飲食不節逆於臟氣而成者有矣胎內受驚與飲食作癇者多而外感者間而有之癇證有三千金云小兒之癇有三日驚癇風癇食癇是也驚癇起於驚怖大啼大駭而作也風癇緣衣蓋過暖熱則生風先時初起屈指如數物而作也食癇因乳食太過鬱積熱壅其作不思乳食吐而發熱後作癇者是也癇名有五三因方云古方有五癇謂各循五臟之所發也又謂發時其狀有五如牛馬豬羊雞聲是也其證備載於大人科但小兒之癇多是三癇三癇之中而食癇居多也治法楊氏曰癇證為小兒之惡候也小兒血脈不壯骨氣未盛為風邪所傷為驚駭所觸為乳哺失節停滯結癖經絡而得之大抵治法當別陰陽為要大概血滯心竅邪氣在心痰積遏經成癇故宜順氣豁痰為良法也凡小兒發癇其候神氣拂鬱瞪眼直視面目牽引口禁涎流腹脹手足抽掣似死似生或聲或啞或項背反張或腰脊強直但四肢柔弱時發而時醒者醒後當以平和氣血湯藥調下蘇合丸未作之先宜服五癇丸發癇時耳後高骨間必有青紋見之以針挑破血出啼叫庶氣血疏通而癇不作十歲以下皆可灸以除其根十歲以上可吐以斷其源也藥方安神散治小兒截癇安心神人參茯苓菖蒲白蘚皮遠志各五錢石膏二錢半犀角銼甘草炙各一錢上咀加麥門冬一撮煎服牛黃膏治小兒風癇迷悶抽搐潮涎膽南星全蠍去毒炒蟬蛻去足各二錢殭蠶去嘴炒白附子防風天麻煨各一錢上為細末蒸棗肉研膏丸如小豆大用荊芥淡薑湯調服太乙散治小兒胎癇正發未分瘥後天漿子炒全蠍梢各二十一個防風麝香一字天麻辰砂飛各五錢上為細末用乳汁調化不時服錢氏五癇丸鎮一切癇硃砂半兩水銀一錢鉛二兩雄黃一兩珍珠一兩上為末煉蜜丸麻子大每服一丸金銀煎湯下南星散治癇後喑不能言天南星濕紙裹煨上為末每服一字豬膽汁調下利驚丸治食癇熱癇者宜下之方見驚門瓜蒂散治小兒十歲以上可用吐法方見大人痰門灸法神庭一穴入髮際五分百會一穴在頂心囟會一穴在上星後一寸長強一穴在尾骶端上隨意會相宜灸炷如麥大灸三壯即愈傷寒候第二十三病機類萃云小兒傷寒與大人無異所以異者兼有夾食而已其或有二證某證某方皆無越張朱格例特不過大小之分劑中病則止按仲景傷寒論云春氣溫和夏氣暑熱秋氣清涼冬氣冷冽此四時正氣之序也惟冬時嚴寒去寒就溫不致於傷偶然觸冒名為傷耳若冬冒寒伏藏於肌膚而未即病至春而發者為之溫病至夏而發者為之熱病至此則冬伏寒隨春夏之氣改變為病既久之後不得復言其寒也故曰溫病不惡寒者其理可見矣如春應暖而反寒夏應熱而反冷秋應涼而反熱冬應寒而反溫非其時而有其氣此四時乖戾之氣也偶即中傷謂之時氣又與傷寒不同若小兒在襁褓中或長成而稟賦怯弱多因乳母解脫衣服不避風寒所致也然小兒患此口不能言其致病之由脈不能診其必然之理但只煩啼發熱而已故不可不盡心焉初得之時嬰幼則以虎口三關脈紋紅色驗之長而童稚則以一指按其三部據左手脈之緊盛而斷之其喘急憎寒心氣熱呵缺頓悶項急者是也其惡寒惡風必畏入藏身引衣密隱是為表證惡熱內實者必出頭露面揚手躑足煩渴燥糞掀衣氣粗是為里證至若頭額冷汗手足涼口冷氣面色黑暗淡大便瀉青此為陰證視其小便或赤或白可以知裡熱之有無或清或濁可以知里之輕重舉是觀之則汗下清溫之法可類推矣脈候難經曰傷寒之脈陰陽俱盛而緊澀傷寒論云脈陰陽俱緊者名曰傷寒寸口脈浮而緊浮則為風緊則為寒浮澀而緊為傷寒脈沉微而熱不退者危治法陶節庵曰凡熱證有頭疼惡寒皆是傷寒無則皆非也何則傷寒則惡寒傷食則惡食理固然也但在冬時惡寒為甚蓋冬為正傷寒天氣嚴凝風寒猛烈觸冒之者惡寒殊甚其餘時月惡寒亦微冬時惡寒腠理閉密非辛溫不可故以桂枝等藥以治之然風與寒常相因寒則傷榮惡寒頭痛脈浮而無汗則用麻黃湯開發腠理以散邪得汗則愈風則傷衛頭痛惡風脈浮緩而自汗則用桂枝湯充塞腠理以散邪汗止即愈若夫榮衛俱傷又非此二湯所治也須大青龍湯然此湯大峻其可代之者有非冬時惡寒頭痛之證皆宜辛涼之劑通表裡以和之則愈矣若以冬時所用桂枝辛涼之藥而通治之則殺人矣曰辛涼者何羌活沖和湯是也兼能代大青龍湯為至穩過此則少陽陽明二經在乎半表裡肌肉之間脈亦不浮不沉外證在陽明則有目疼鼻乾不得眠之證脈洪而長以葛根解肌湯升麻湯治之在少陽則胸脅痛而耳聾脈見弦數以小柴胡加減以和之此三經者不從標本從乎中也以小柴胡湯加葛根芍藥治少陽陽明俱病如拾芥若傳入里外證悉罷已無頭痛惡寒脈見沉實便作實熱譫語惡熱六七日不大便口燥咽乾而渴輕則大柴胡湯重則三承氣湯選用比之大人劑惟輕緩而治之可也麻黃湯治傷寒頭痛發熱腰痛骨節痛惡寒無汗而喘以此汗之蓋暖取汗漐漐至手足心而止不須再服桂枝湯傷寒發熱惡寒有汗以此和之此為表虛不可再汗大青龍湯治傷寒脈浮緊頭痛身痛發熱惡寒不得汗出煩躁擾亂不安以此汗之羌活沖和湯治太陽經傷寒無汗發熱頭痛惡寒脊強脈浮緊又治非冬時或有暴寒中人如傷寒者以此治之萬全此方代麻黃湯用極平穩無害解肌湯治溫病天行時氣頭痛壯熱四時感冒發熱而渴不惡寒者用此升麻湯治傷寒頭痛憎寒壯熱四肢疼痛鼻乾不臥兼治四時感冒不正之氣忽然惡寒頭重敗毒散傷寒風溫瘟疫頭目昏眩四肢疼痛憎寒壯熱項強目疼小柴胡湯治傷寒要藥不俱少陽和解表解有礙者多宜用之無誤在小兒尤為平劑已上方並見大人傷寒門一傷寒五六日往來寒熱胸脅苦痛默默悸欲食心煩喜嘔或胸膈煩而不嘔或渴或腹中痛或脅下痞或心下悸小便不利或不渴身有微熱者此湯主之一氣虛血弱腠理開邪氣因入與正氣相搏結於脅下邪正分爭往來寒熱休作有時此湯主之一傷寒五六日頭汗出微惡寒心下滿不欲食不便硬脈細者為陽微陰結必有表復有里脈沉亦在裡汗出為陽微假令純陰結不得復有外證悉入在裡此為半在表半在裡也脈雖沉緊不得為少陰病所以然者陰不得有汗也今頭汗出故知非少陰也此湯主之一陽明病發潮熱大便溏小便少胸膈滿此湯與之一陽明病脅下硬滿不大便而嘔舌上白苔者此與之一太陽病不解病過十日轉入少陽脅下硬滿嘔不能食往來寒熱尚未吐下脈沉緊者此湯主之一傷寒瘥後復更發熱此湯主之大柴胡湯治陽明病外證身熱汗出而不惡寒但惡熱宜服此陽明病脈逆發熱汗出而不惡寒頭眩小便難此欲發疽證宜服此陽明病脅下硬滿大便祕而嘔口燥者此湯服之陽明病中風其脈浮大氣短心痛鼻乾嗜臥不得汗一身盡黃小便難有潮熱而噦此湯主之一傷寒脅下堅滿少陰乾嘔不食往來寒熱若未吐下此湯服之若已吐下發汗譫語者此湯主之一傷寒五六日陽脈澀陰脈弦腹中急痛此湯主之一傷寒六七日目中不了了無表裡證大便難身微熱此湯主之小承氣湯治太陽吐下而微煩小便數大便堅者與此上焦熱壅胸痞而實故用枳實厚朴以瀉上焦之痞大黃瀉實去芒硝不傷陰分之血也大承氣湯治傷寒裡實三焦俱熱腹滿而喘者宜服此湯調胃承氣湯治傷寒十餘日不惡寒但惡熱者實也腹中滿不大便蒸蒸鬱郁者宜用之已上諸方並見大人傷寒門若小兒劑比大人減半或三分之二與之附四時感冒藥方參蘇散香蘇散十神湯五積散藿香正氣散已上諸方見大人傷寒門用劑減服中暑候第二十四病機小兒伏中暑證發熱汗出引飲或吐瀉霍亂腹痛又有脈虛手足微寒發渴口熱者又有煩熱而嘔吐利不食至成搐搦如驚狀似傷寒者不可便作驚病及傷寒用藥只可與五苓散六和半夏湯消息之萬無一失有偏寒偏熱者以意用藥甚不可執一也藥方用辰砂五苓散治小兒伏暑吐瀉作渴心神恍惚即五苓加添辰砂六和半夏湯治小兒中暑霍亂吐瀉煩渴痰嗽二方並見大人暑瀉濕證候第二十五病機巢氏曰濕者水氣也活人書云風雨襲虛山澤蒸氣豈止大人中濕小兒亦有受濕者緣小兒入夏以來脾胃虛弱腠理開疏或因連日陰雨或地上蒸濕小兒坐臥於上便受熱氣脈見沉緩身體煩痛發熱惡寒或多汗惡風精神昏悶或小便不利大便溏瀉若久不愈則手足垂嚲入臟則喑啞不言治法大要疏利小水其濕自除不可發汗及峻攻之參苓散治小兒受濕身痛面浮發熱惡風多汗作嘔小便不利人參白朮豬苓澤瀉乾薑炮各二錢赤茯苓木通各二錢上咀入燈心十莖車前子一撮水煎食前服除濕湯治小兒寒濕所傷手足軟弱吐瀉不能抬舉疼痛人參白朮蒼朮茯苓半夏厚朴姜炒陳皮藿香大腹皮洗甘草炙各等分上咀水煎不拘時服諸熱候第二十六病機小兒氣稟純陽臟腑易得生熱陰陽氣遷熏蒸於外致令身熱也肝熱則兩眼赤腫流淚羞明或生翳瘴心熱則口內生瘡小便赤淋瀝不通肺熱則鼻衄不止大便祕結脾熱則生重舌木舌流涎流沫胃熱則口作臭腎熱則耳聾或出膿血至於五臟蘊蓄風熱毒風令兒面赤如緋五心煩熱四肢溫壯痰涎壅盛目澀多渴上衝咽喉則與氣血相搏結聚壅盛而成喉閉也大抵小兒多因熱生風風生驚欲兒無病先清其熱此所謂拔本塞源者也楊氏曰小兒病惟熱居多夫熱有潮熱驚熱夜熱餘熱實熱虛熱表熱裡熱食熱疳熱壯熱煩熱氣熱血熱積熱鬱熱風熱客熱癖熱瘡疹熱諸熱大同而小異熱之始發必有所因也潮熱者發歇有時驚熱者顛叫恍惚夜熱者夕發旦止餘熱者寒邪未盡實熱者壯盛壅滯虛熱者氣血俱虛脾胃虛熱表熱者輕手按之便覺或因腠理感傷裡熱者大便祕結小便赤黃食熱者厚味之變乳母所遺疳熱者腹大面黃身熱形瘦壯熱者一向不止煩熱者心燥不安積熱者頰赤口瘡風熱者汗出風熱客熱者去來不定癖熱者腹中有塊鬱熱者怫熱悶亂痰熱者涎嗽引飲瘡疹熱者耳鼻尖冷諸證得之各有所歸其間或有三兩證交互者宜隨其輕重而處治之脈候脈經曰小兒脈沉而數者骨間熱浮大而數為風熱小兒八至九至為發熱難經曰熱病之脈陰陽俱浮或浮而數治法心熱者咬牙上竄面赤搖頭瀉心湯主之肝熱者手尋衣及亂捻物瀉青丸主之脾熱者熱在肌肉遇熱尤甚怠惰嗜臥身熱飲水四肢不收瀉黃散主之肺熱者手掐眉日西尤甚喘嗽寒熱壯熱飲水輕者瀉白散重者涼膈散主之腎熱兩足不喜衣履然此者臍之下皆腎之所主緣心氣下行於腎部東垣滋腎地黃丸主之潮熱者因傷寒時疫觸變邪氣陰氣不足陽氣有餘陽邪暴傷則血氣凝滯不即流通壅逆無歸傳於足陽明之經遂生潮熱早晚兩度或日一次如潮水之應期也傷寒論云潮熱者實熱也當利大便實者大柴胡湯下之虛者百解散汗之驚熱者顛身發熱面青自汗心悸不寧脈數煩躁顏叫恍惚以錢氏涼驚丸安神丸主之夜熱者夜間發熱是陰中有陽邪也以元戎四物湯二連湯主之實熱者手心熱肚背先熱噯氣吐乳大便酸臭宜下積丸主之疳熱者形瘦多渴吃食不長肌肉骨蒸盜汗泄瀉無常肚大腳弱是也宜龍膽丸胡黃連丸蘆薈丸之類壯熱者一向不止由血氣壅實五臟生熱蒸尉於內則眠臥不安精神恍惚熏發於外表裡俱熱煩躁喘粗甚則發驚火府丹主之煩熱者心躁不安五心煩熱四肢溫壯小便赤澀一粒金丹主之積熱者頰赤口瘡下盛則腰腿壅腫表裡實則身熱便澀虛則汗下後仍熱也或內因酒面煎爆熱藥峻補外因大暖爐火侵逼皆能生熱此內外蘊積之熱非食積熱也宜以三黃丸四順飲主之風熱者汗出身熱呵缺面赤因其解脫風邪所傷客於皮毛則惡風發熱目澀多睡陽氣有餘身熱無汗陰氣有餘身寒有汗陰陽有餘無汗而寒經曰汗出身熱者風熱也消風散緑霞丸主之虛熱者陰陽寒及諸熱汗下之後耗去太過氣血未調飲食勞傷致令虛熱其候困倦少力面色青白泄瀉多尿虛汗自出恍惚神慢噓氣軟弱又有久嗽久瀉久痢久瘧久血以致諸疾之後成者皆虛熱也凡病久則血氣虛氣虛則發厥血虛則發熱氣血皆虛則手足厥而身熱也宜以惺惺散四君子湯錢氏白朮散主之客熱者為陽邪干於心也心若受邪則熱形於額故先起於頭面次而身熱恍惚多驚聞聲驚恐良由真氣虛而邪氣勝也邪氣既勝真氣與之交爭發渴無時進退不定如客之往來故曰客熱導赤散黃連瀉心湯主之癖熱者涎嗽飲水由乳食下消伏結於中致成癖塊也宜與白朮散滋養津液次以珍珠丸下其痰涎或以妙丸子磨之寒熱者證如瘧狀陰陽相勝也先寒而後熱陽不足先熱而後寒陰不足寒多而熱少陰勝陽也熱多而陰少陽勝陰也寒然相半陰陽交攻也寒熱隔日陰陽乍離也陽盛發熱陰盛發寒也其有頭痛汗出者有嘔吐不食者有憎寒而飲水者壯熱而飲湯者有筋骨疼痛者或瀉或祕或內寒而外熱或內熱而外寒又有寒而腹痛熱而腹鳴是有食積也因於食積者當用白餅子下之次行補助以錢氏白朮散寒多熱少者小柴胡湯加桂熱多寒少者白虎湯寒熱相半者並用小柴胡主之血熱者每日巳午間發熱遇夜則涼六合湯主之痘疹熱耳鼻尖冷是也人參敗毒散升麻葛根湯參蘇飲之類藥方瀉心湯治心熱黃連一兩微炒為末酒水調二三分量兒大小與之導赤散治小腸實熱生地黃木通甘草各等分竹葉煎服瀉青丸治肝熱當歸龍膽草川芎梔子大黃羌活防風上為末蜜丸如芡實大每服一丸或半丸洗肝散治肝經積熱眼目赤腫羞明兼有風痰防風羌活當歸川芎薄荷甘草大黃各等分為末水調瀉黃散治脾熱口臭咽乾藿香七錢防風四兩山梔一兩石膏五錢甘草三兩上為末同蜜酒炒香每服一錢瀉黃散治脾熱口苦身體蒸熱皮膚如橘之黃困倦喜睡黃連黃芩梔子黃柏茵陳各五錢茯苓澤瀉各三錢水煎服瀉白散治肺熱桑白皮地骨皮各一兩甘草三錢為末水調服清神散治肺熱鼻塞生瘡不聞香臭或有餘毒人參白朮茯苓甘草防風桔梗細辛天花粉上等分咀散入薄荷少許煎不拘時服滋腎地黃丸治腎熱黃柏二錢知母一錢桂一分半上為末熟水丸如梧桐子大每服二十丸食前百沸湯下梨漿飲治胃熱口氣痰飲嘔逆不思飲食乃胃家蓄熱茵陳去梗童便浸一宿起曬乾柴胡黃芩人參前胡甘草秦艽生地黃薄荷各等分上咀加梨漿一匙水煎服三黃丸治胃肺大腸及三焦之熱方見大人火門芩連四物湯治榮熱而燥川芎當歸白芍藥生地黃各半兩黃芩黃連各二錢半上咀水煎食前服六合湯治血熱即遍體生瘡每日巳午間發熱遇夜則涼當歸川芎白芍藥炒生地黃大黃煨柴胡各等分水煎服四順散治實熱氣脈壯實臟腑熱結大便祕澀當歸川芎大黃甘草各等分上銼水煎食前服六和湯治虛熱三焦五臟不和啼哭煩躁夜出盜汗川芎當歸白芍藥生地黃人參白朮各等分上咀水煎不拘時服火府丹治心虛心熱小便赤澀多驚睡臥不穩生地黃木通各五錢當歸梔子黃芩甘草各二錢上咀水煎服惺惺散方見痘疹門錢氏白朮散四君子湯二方見泄瀉門並治虛熱之劑消風散治小兒風熱因解衣風邪客於皮毛惡風發熱多睡荊芥穗甘草炙川芎羌活殭蠶去嘴人參茯苓蟬蛻藿香葉防風各半兩厚朴姜炒芍藥陳皮去白各二錢上為細末用茶清或乳香煎湯調下不拘時服生犀角丸解散風熱清心肺利咽喉犀角珍珠天竺黃防風羌活茯神各三錢大黃煨甘草炙硃砂飛各一錢上為細末煉蜜丸如芡實子大用薄荷煎湯研化入麥門冬去心不拘時服地骨皮散治潮熱壯熱地骨皮柴胡知母人參甘草赤茯苓半夏各等分水姜煎服甘露飲子治胃中客熱口臭不思飲食或煩躁齦腫膿血滿口腥臭目赤口瘡皆可服方見大人火門寒水石散利小腸去心熱墜驚寒水石滑石各二兩甘草五錢為末湯調服絳雪丹治小兒煩渴芒硝硃砂各一兩上為末飯丸雞子大三歲一丸沙糖水化下小柴胡湯治往來寒熱白虎湯治寒熱發渴升麻葛根湯治小兒疹天行時熱參蘇散治小兒痘疹熱已上四方並見傷寒門直指保和丸治小兒癖積熱方見脾胃門感應丸紫霜丸治癖熱方見積門牙疳候第二十七病機走馬牙疳者多因氣虛受邪及有宿滯留而不去積溫成熱虛熱之氣上蒸或食甜酸鹹膩之物脾雖喜甘積滯日久蘊熱上熏於口致齒焦黑爛間出清血血聚成膿膿臭成蟲侵蝕口齒甚至腮頦穿破乳食不便面色光浮氣喘熱作名走馬牙疳宜蘆薈丸主之外用燒鹽散銅青散敷之若經久不愈敷於唇之上下乃成硼砂證或齒落骨露飲食減少氣促痰鳴必致危矣內金散治小兒牙根臭爛黑色有蟲作痛雞內金即雞䏶內黃皮陰乾為末一兩白芷五錢銅青一錢麝香一字上為極細末用溫鹽水攪口貼立效散治牙疳青黛黃柏末白枯礬五倍子各一錢上為極細末用米泔水攪口內貼真黃散治走馬牙疳雞䏶真黃皮不以多少油燈上燒存性研極細末入黃柏白礬枯麝香一字用米泔水攪口內貼燒鹽散治小兒走馬牙疳肉潰黑爛橡斗食鹽麝香上用橡斗大者入食鹽滿殼二合為一個或五七個安於炭火內和鹽煅透取出放地上以瓦蓋定退火毒候冷取起為末入麝少許同研極細末用米泔水攪敷貼勿用紙裹瓦盒盛有鹽能作潤濕
