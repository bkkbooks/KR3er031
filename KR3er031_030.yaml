body:
  text: 卷之三十脹滿門病機脹滿敘論內經曰諸腹脹大皆屬於熱又曰諸濕腫滿皆屬脾土又曰太陰所至為中滿霍亂吐下又云腹滿䐜脹支鬲胠脅下厥上冒過在太陰陽明乃寒濕鬱遏也又曰諸腹脹大鼓之如鼓皆屬於熱原病式云氣為陽陽為熱氣甚則如是也針經曰夫脹者皆在於臟腑之外排臟腑而郭胸脅脹皮膚故命曰脹或厥氣在下榮氣留止寒氣逆上真邪相攻兩氣相摶乃合為脹也陰陽應象論曰濁氣在上則生䐜脹清氣在下則生飧泄此陰陽反作病之逆從也脹滿鼓脹乃病之新久輕重之名愚謂脹滿只是濕熱飲食勞倦內傷脾氣積滯之所始致是為脹滿苦積損既久脾氣日虧氣凝血聚漸著不行由脹滿而成鼓脹以其外雖堅滿中空無物有似於鼓堅固難治俗名單腹脹以其四肢皆不腫而惟腹中脹腫如鼓乃氣血結成蠱毒之形而不可解釋消散故又名曰蠱血化為蟲因字之義而命名也生氣通天論曰病久則傳化上下不並不通也良醫弗為此之謂也脹滿與水腫不同脹滿只是腹脹中滿雖主於脾有濕熱寒暑氣血之殊異而非四肢腫脹為水溢經絡皮膚之下治以消水內經所謂開鬼門潔淨府者是也水腫之病輕而易治脹滿之病重而難治學者詳之脹滿病多緣七情內傷勞倦飲食濕熱所致經曰飲食入胃遊溢精氣上歸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行是則脾胃中土主生萬物雖具坤靜之德而有干健之運凡有七情思慮傷脾及房勞過傷飲食失節則脾土之陰受虧而轉輸之官失職致使心肺之陽不降腎肝之陰不升而成天地不交之痞清濁相淆而成壅塞濕氣不流鬱而為熱濕熱積留因成脹滿腹脹有寒濕及外感之殊經曰臟寒生滿脹脈經曰胃中寒則脹滿脾為陰中之至陰故經曰太陰所至為蓄滿大抵脾濕有餘無陽不能施化如土久於雨水則為泥矣豈能生化萬物必待和風暖日濕去陽生自然生長矣若此者宜以辛熱藥治之其有外感者如東垣所謂八益之邪自外而入感風寒之邪傳入於裡寒變為熱作胃實日晡潮熱大渴引飲譫語是太陽陽明並病大實大滿者大承氣湯下之少陽陽明微滿實者小承氣湯下之五常政大論曰下之則脹已是也腹脹分三因陳無擇云臟氣不平勝乘相因為病如怒傷肝肝克脾脾氣不正必脹於胃名曰勝克怒乘肺肺氣不傳必脹於大腸名曰乘克憂思結聚本臟氣鬱皆內所因或冒寒暑風濕隨經絡傳至陽明致脹者皆屬外因飲食飢飽生冷甜酸結聚不散或作痞塊膨脹滿悶屬不內外因也五臟各有脹靈樞經曰夫心脹者煩心短氣臥不安肺脹者虛滿而喘咳肝脹者脅下滿而痛引小腹脾脹者吐噦四肢煩熱體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛六腑脹胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯冬日重感於寒則飧泄不化小腸脹者少腹䐜脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿於皮膚中輕輕然而不堅膽脹者脅下痛脹口中苦善太息脈候針經曰其脈大堅以澀者脹也脈經曰關上脈虛則內脹脈遲而滑者脹脈盛而堅者脹嚴氏曰脹脈浮者易治虛者難治治法治脹滿宜理脾土養肺金夫脹滿之病皆因脾失健運之常須要補脾養肺以制肝木俾脾無賊邪之患滋腎以制心火使肺氣得清兼以節飲食戒慮念無有不安者古方用禹餘糧丸所以實脾制肝若善用者以之增減因證使之殊為切當治腹脹有因利下之過經曰下之則脹已此因濕熱飲食有餘脾胃充實者言也如仲景治傷寒邪入三陰經及入於裡而成內實腹滿堅實大便祕而不利者宜以三承氣湯下之可也若因脾虛內寒不足而氣不能連化精微而成腹滿者故宜以甘溫補脾為主少佐以辛熱行其壅滯之氣庶使脾土旺健而脹運行斯可愈矣即經所謂塞因塞用從治之法耳醫者不察乎此惟執下之脹已急於獲效病者苦於脹滿喜行利藥以求通快殊不知暫快一時則真氣愈傷腹脹愈甚去死不遠俗謂氣無補法者以其痞塞似難於補不思正氣虛而不能運行為病經曰壯者氣行則愈是也腹脹治法當察其所因若因內傷飲食厚味大實大滿氣滯脈洪大實者宜下之若因過服下藥瀉利後所致或脾胃素弱不能運化者皆宜補益助脾行濕蓋此時正氣已衰矣況積而脹乎故云平治之又如血蓄血瘀而致者當以血藥治之寒者熱之熱者清之結者散之清濁混淆者分消之或升降其氣或消導其邪皆宜適事為故可也治案丹溪治一人年五十嗜酒病瘧半年患脹診其脈弦而澀重則大瘧未愈手足瘦而腹大如蜘蛛狀豫教以參術為君當歸川芎芍藥為臣黃連陳皮茯苓厚朴為佐生甘草些小作濃湯飲之一日定三次彼亦嚴守戒忌一月後瘧愈又半年小便長而脹愈中間雖稍有加減大意只是補氣行濕一人年四十餘性嗜酒大便時見血春間患脹色黑腹大形如鬼狀脈澀而數重似弱以四物湯加苓連木通白朮陳皮厚朴生甘草作湯與之一月而安一補氣一補血余藥大率相出入皆獲安或曰氣無補法今何補氣而安曰氣無補法俗論也痞悶壅塞似難於補不思正氣虛者不能自運經曰壯者氣行則愈怯者著而為病若不補氣邪何由行一人年近五十得腹脹自制禹餘糧丸服之其脈弦澀而數丹溪曰此丸新制煅煉之火邪尚存溫熱之藥味太多宜自加減不可執方病者曰此方不可加減服之一月口鼻中出黑血骨立而死患腹脹按之不痛者為虛按之痛者實也腹中滿不減不驚人此當下之舌黃沫下者下之黃自去腹滿時減復如故此為寒當以溫藥腹滿口中苦幹燥腹中有水是飲也跗陽脈微弦法當腹滿不滿者必下部閉塞大便難兩腳下疼痛此虛氣寒氣從下向上當以溫藥服之取瘥腹滿轉痛來趣小腹為欲自下利也藥方脹滿通用調理諸劑濟生紫蘇子湯治憂思過度致傷脾胃心腹脹滿喘促嘔逆腸鳴氣走漉漉有聲大小便不利脈虛緊而澀紫蘇子一兩大腹皮草果半夏厚朴木香陳皮木通白朮枳實人參甘草各半兩上每服五錢水盞半薑三片棗一枚煎七分服濟生大正氣散治脾胃怯弱為風寒濕氣所傷遂致心腹脹滿有妨飲食白朮陳皮各二錢半夏制藿香葉厚朴薑炒桂枝枳殼炒檳榔乾薑炮各一錢甘草炙五分上作一服水二盞薑三片棗一枚煎八分不時溫服濟生平肝飲子治喜怒不節肝氣不平邪乘脾胃心腹脹滿頭暈嘔逆脈浮而弦防風枳殼桔梗赤芍藥桂枝各一錢木香人參檳榔川芎當歸陳皮甘草各五分上作一服水二盞薑三片煎七分不時服濟生強中湯治食啖生冷過飲酒漿有傷脾胃以致腹脹人參青皮陳皮丁香各錢半白朮一錢附子制草果仁乾薑各七分厚朴薑製甘草炙各五分上作一服水盞半薑五片棗一枚煎八分食遠服嘔者加半夏食麵腹脹者加籮卜子祕方大異香散治失飢傷飽痞悶停酸旦食不能暮食病名殼脹三稜蓬朮青皮半夏曲陳皮藿香桔梗枳殼炒香附炒益智各一錢甘草炙三分上咀作二服每服水盞半薑三片棗一枚煎八分食遠服局方紫沉通氣湯治三焦氣澀不能宣通腹脹便澀局方沉香降氣湯治中脘脹滿時復脅肋肚痛每要噫氣則快不噫則不快日漸面浮磨檳榔入紫蘇同煎下保神丸尤妙局方木香流氣飲調榮衛利三焦行痞氣消脹滿三方並見諸氣門拔萃木香順氣湯治濁氣在上則生䐜脹木香草豆蔻麵包煨蒼朮制各二分厚朴制四分當歸五分青皮益智仁白茯苓陳皮澤瀉乾薑吳茱萸泡半夏各二分升麻柴胡各一分上咀作一服水二盞煎服忌生冷硬物惱思房勞內經曰留者行之結者散之以柴胡升麻之苦平行少陽陽明二經發散清氣運行陽分為君以生薑半夏草豆蔻益智仁辛甘大熱消散中寒為臣以厚朴木香蒼朮青皮苦辛大溫通順滯氣以當歸陳皮人參之辛甘溫調和榮衛滋養中氣濁氣不降以苦泄之吳茱萸之苦熱泄之者也氣之薄者為陽中之陰茯苓甘草平澤瀉鹹平氣薄引導濁陰之氣自天而下故以為佐氣味相合散之泄之上之下之使清濁之氣各安其位也範天睞夫人先因勞役飲食失節加之憂思氣結病心腹脹滿旦食則不能暮食兩脅刺痛診其脈弦而細至夜濁陰之氣當降而不降䐜脹尤甚大抵陽主運化飲食勞倦損傷脾胃陽氣不能運化精微故為脹滿先灸中脘乃胃之募穴引胃中生髮之氣上行陽道又以前藥助之使濁陰之氣自此而降矣拔萃人參芎歸湯治腹脹煩躁喘急虛汗厥逆小便赤大便黑名曰血脹人參木香辣桂五靈脂炒烏藥蓬朮煨甘草炙砂仁各五分川芎一錢半當歸半夏泡各一錢上作一服水二盞薑五片棗一枚紫蘇葉四個煎八分食前服拔萃中滿分消湯治中滿寒脹寒疝大小便不通四肢厥冷食入反出下虛中滿腹中寒心下痞躁寒厥奔豚不收並治之益智半夏制木香茯苓升麻各一錢人參青皮川烏制當歸柴胡乾薑蓽澄茄黃連各六分黃耆黃柏吳茱萸草豆蔻厚朴麻黃澤瀉各五分上咀作一服水盞半薑三片棗一枚煎八分食前服忌戒酒色漿面食生冷硬物拔萃廣朮潰堅湯治胸滿腹脹內有積塊堅硬如石令人坐臥不安大便小水帶滯氣促上喘面色痿黃廣朮煨黃連柴胡甘草神麯炒澤瀉各一錢黃芩吳茱萸青皮升麻各五分陳皮草豆蔻厚朴制當歸尾益智各五分紅花二分半夏制五分乾葛二分上作一服水二盞先浸藥少時煎至一盞禽遠服忌灑面中滿服後漸減積塊未遺再服半夏厚朴湯半夏厚朴湯半夏一錢厚朴八分神麯六分桃仁十四粒黃芩生用澤瀉紅花白茯苓橘紅蘇木青皮吳茱萸蒼朮草豆蔻黃連當歸尾豬苓三稜升麻各四分乾生薑肉桂甘草柴胡昆布乾葛各三分上咀作一服水二盞煎一盞食遠服良方沉香散治腹脹氣喘坐臥不得沉香木香各二錢枳殼蘿蔔子各三錢上作一服水二盞薑三片煎七分不拘時服直指香橘湯治七情所傷中脘不快腹脅脹滿香附子橘皮半夏各二錢甘草六分上咀作一服水盞半薑三片棗一枚煎七分通口服聖惠木通散治胸腹膨脹脅肋刺痛小便赤澀大便不利或腫木通紫蘇莖陳皮甘草炙各二錢上咀作一服水二盞薑三片棗一枚燈心十莖煎一盞不拘時通口服良方甘露散治脾虛水濕不利腹脹中滿人參白朮茯苓豬苓各半兩滑石六兩澤瀉半兩甘草四錢上為細末每服三錢食前滾白湯調下良方撞關飲子治關格不通氣不升脹滿丁香不見火沉香不見火砂仁白豆蔻三稜炮香附米烏藥各一錢半甘草炙五分上作一服水二盞煎七分食遠溫服良方溫胃湯治憂思聚結脾肺氣凝陽不能正大腸與胃氣不平脹滿上衝咳食不下脈虛而緊澀附子制厚朴當歸白芍藥人參甘草炙陳皮各一錢乾薑一錢川椒去合口炒出汗三分上作一服水二盞薑三片煎一盞食前服拔萃中滿分消丸治中滿腹脹氣脹水脹熱脹厚朴制一兩半夏枳實炒各半兩黃芩乾薑知母各四錢茯苓砂仁澤瀉陳皮各三錢豬苓人參薑黃白朮甘草各一錢黃連四錢上為細末湯泡蒸餅為丸如梧桐子大每服一百丸焙熱食後熱湯送寒因熱用故焙服聖惠木香拓氣丸治中滿腹脹下虛損者木香胡椒草豆蔻麵包煨青皮各三錢蘿蔔子炒陳皮各五錢蠍梢二錢半上為細末麵糊為丸如梧桐子大每服三十丸溫米飲下忌油膩只吃白粥百日為佳量人大小與之苦陰囊腫者以青鹽白麵乾薑為末水調敷上和劑禹餘糧丸治中滿氣脹喘滿及水氣脹蛇含石大者三兩以鐵銚盛入炭火中煅與鐵銚子一樣通紅鉗出將藥傾入醋碗中淬之候冷研極細末真針砂五兩水淘淨控干銚內炒入禹餘糧一處用水醋二升就銚內煮令醋乾為度卻用銚子同一藥入炭火中煅令通紅鉗出銚子傾藥在淨磚上候冷研極細禹餘糧三兩同入針砂內製上三品為主其次量人虛實入下項藥木香牛膝酒浸莪朮炮白蒺藜炒桂心川芎白豆蔻土茴香炒三稜炮羌活茯苓乾薑炮青皮附子炮陳皮當歸酒浸一宿上各半兩虛人老人用半兩壯實之人隨意減之共為細末拌勻以湯泡蒸餅丸如梧桐子大每服五十丸空心溫酒下忌鹽並咸物犯此則發病愈甚拔萃木香分氣丸善治脾胃不和心腹脹滿脅膨喘咳乾嘔咽喉不利飲食不化服此最效木香檳榔青皮陳皮三稜莪朮炮乾薑薑黃玄胡索赤茯苓白朮枳殼肉豆蔻各等分秋分加丁香上為末麵糊丸梧桐子大每服三十丸薑湯下忌生茄馬齒莧良方十全丸治心腹痞悶脅肋脹滿食少丁香木香各一兩枳殼炒三稜蓬朮炮青皮陳皮砂仁檳榔各二兩香附子炒四兩上為細末麵糊丸如梧桐子大每服五十丸食前米飲送下集要蓽澄茄丸治痞滿脹滿殼脹氣脹皆用蓽澄茄白豆蔻砂仁青皮蘿蔔子木香各三分肉豆蔻茴香炒辣桂丁香各一分半陳皮三分上為細末麵糊丸梧桐子大每服三十九空心陳皮煎湯下治脹滿攻下劑三因七物厚朴湯治腹滿發熱脈浮數飲食如故脹滿者為熱厚朴制六錢大黃炒三錢甘草炙枳實炒各二錢桂心一錢上作二服每服水二盞薑棗煎食遠溫服嘔者加半夏醫林枳殼銼散治熱證脹滿厚朴制枳殼炒桔梗各二錢甘草炙大黃制各一錢上咀作一服水二盞薑五片棗一枚煎服簡易桃溪氣實丸治心腹脹滿腰脅俱病如抱一甕肌腠堅硬按之如鼓兩腳腫滿屈膝仰臥不能屈伸一切氣積飲食不下腹內氣走大便祕結寒熱往來如傷寒宜服此黑牽牛取頭末檳榔青皮各一兩大黃制一兩半木香茴香羌活陳皮川芎當歸各半兩上為細末皂角熬膏為丸梧桐子大每服百丸生薑燈心湯下簡易是齋推氣丸治三焦痞塞氣不升降腹脹檳榔陳皮黃芩枳實大黃黑牽牛各等分上為末煉蜜丸梧桐子大每服五十丸臨臥白湯送下拔萃沉香交泰丸治濁氣在上而擾清陽之氣鬱而不伸為腹脹沉香陳皮去白白朮各三錢枳實炒澤瀉當歸酒洗白茯苓吳茱萸湯泡青皮木香各二錢大黃制二兩厚朴制半兩上為細末湯浸蒸餅為丸梧桐子大每服七八十丸食前白湯送下微利為度良方消脹丸治諸脹木香大黃茯苓厚朴薑製澤瀉各一兩黑牽牛取頭末滑石各六兩上為細末滴水丸梧桐子大每服五十丸食前薑湯下宣明雞屎醴散治心腹脹滿旦食不能暮食致成嘔逆鼓脹雞屎醴乾者炒大黃桃仁各等分上為末每服二錢水盞半薑三片煎七分食前服宣明肉豆蔻丸肉豆蔻檳榔輕粉各一錢黑牽牛取頭末一兩半上為末糊丸緑豆大每服一三十丸食後連翹湯下日三服淡寮導氣丸治諸痞塞關格不通腹脹如鼓大便祕結小腸腎氣等疾功效尤速青皮用水蛭等分同炒赤去水蛭莪朮用虻蟲等分同炒赤去虻蟲三稜乾漆炒去漆檳榔斑蝥同炒去蝥茱萸牽牛同炒去牛乾薑硇砂同炒去硇附子青鹽炒去鹽赤芍藥川椒炒去椒胡椒茴香炒去茴香石菖蒲桃仁同炒去仁各等分銼與所同炒藥熱去水蛭等不用只用青皮等十味為細末酒糊丸梧桐子大每服五十丸空心紫蘇湯下淡寮三稜煎丸治心腹堅脹脅下滿硬胸中痞塞喘滿短氣常服順氣消積滿除膨脹京三稜生半斤搗為細末以酒三升於銀石器內熬成膏子杏仁泡去皮尖炒黃色乾漆炒煙盡麥芽炒各一兩青皮去穰蘿蔔子炒神麯炒各二兩硇砂五錢上為細末三稜膏為丸梧桐子大每服二十丸食後米飲下東垣沉香海金沙丸治一切積聚脾濕腫脹肚大青筋羸瘦海金沙錢半沉香一錢輕粉一錢牽牛末二兩上為末獨蒜搗如泥為丸梧桐子大每服二十丸煎百沸湯空心通草湯下量人虛實與之良方遇仙如意丹治氣積氣脹痃癖水蠱與之白茯苓青皮陳皮各一錢白豆蔻白朮人參丁香三稜炮石菖蒲砂仁官桂蓬朮炮遠志木香各三錢山藥半兩香附子五兩牽牛頭末半斤甘草五分上為細末醋打糊為丸梧桐子大每服一百二十丸臨睡白湯下看老少虛實加減服忌生冷硬物氣蠱水蠱每服三百丸立消若風病加地骨皮一兩婦人月信不調産後腹中有塊作痛並宜服此服後利數行吃冷水一口即止服前甘露飲補之良方小檳榔丸治脾虛腹脹不食快氣寬中極效檳榔蘿蔔子炒木香牽牛炒各等分上為末糊丸梧桐子大每服三五十丸食後薑湯下醫林陳橘皮丸治虛勞堅癖腹脹羸瘦飲食不消面痿黃四肢無力陳橘皮去白炒木香檳榔厚朴制硫黃另研大黃炒上為丸煉蜜丸梧桐子大每服三十丸食後米飲或酒下敷法治腹脹堅硬如石或陰囊腫大先用甘草煎湯一盞服之後用此藥敷腫處大戟芫花甘遂海藻各等分上為末醋糊和藥塗腫脹處灸法脾腧二穴在背脊十一椎下兩旁相去各一寸半隨年壯灸之肝腧二穴在九椎下兩傍各開一寸半灸百壯三焦腧二穴在十三椎下兩傍各開寸半治心腹脹滿背痛飲食吐逆小便不利羸瘦少氣分水一穴在臍上一寸治腹脹繞臍結痛灸百壯愈導引法一法蹲坐住心卷兩手發心向下左右手搖臂遞互欹身盡轉勢卷頭築肚兩手衝脈至臍下來去三七去腹腫急悶食不消化一法腹中若脹有寒以口呼出氣三十過止一法若腹中滿飲食苦飽端坐伸腰以口納氣數十滿吐之以便為故不便復為之有寒氣腹中不安亦行之一法端坐伸腰口內氣數十除腹滿食飲過飽寒熱腹中痛一法兩手向身側一向偏相極勢發頂足氣散下又似爛物解散手掌指直舒左右相背然去來三三始正身前後轉動膊腰七去腹脹膀胱腰脊臂冷血脈急強悸一法脾主土要暖始得發汗去風冷邪氣若腹內有氣脹先須暖足摩上下並氣海不限遍數多為佳始得左回右轉立七扭氣如用腰身內一十五法回轉三百六十骨節動脈搓筋氣血布澤二十四氣和調臟腑均氣用頭搖動振呼向上吸氣向下分明知氣去來莫御平腰轉身摩氣蹙回動盡心氣放散送至湧泉穴不失氣之行度用之有益易簡諸方千金方治心腹脹滿以草豆蔻一兩去皮為末以木瓜生煎湯調下半錢不拘時衛生易簡方治心腹脹用蕪青子一合水一升和研取汁一盞頓服少頃得利或吐腹中自寬或得汗愈又方治腹滿不能用藥獨蒜煨熟去皮綿裹納下部中冷即易又治關膈脹滿大小便不通亦用上法氣立通又方用郁李仁一合搗末和麵作餅吃入口即大便通利氣便安大治身體腫氣急臥不得又方治腹內氣脹滿喘息不得用葶藶一升炒紫色酒浸七日研爛每服三匙無時酒調下大效又方治腹內氣脹用檳榔為末每服二錢水煎食前服梅師方治腹滿不能服藥用煨生薑如指大一塊綿裹乘熱內下部中冷即易之
