body:
  text: 卷之十八疸證門病機敘論內經云溺黃赤安臥者疸病巢氏病源云黃疸之病此由酒食過度臟腑不和水穀相併移於脾胃復為風濕所搏瘀結不散熱氣鬱蒸故食已如飢令身體面目及爪甲小便盡黃而欲安臥若身體多赤黑多青皆見者必寒熱身疼而色微黃齒垢黃爪甲上黃黃疸也渴而疸者其病難治疸而不渴其病可治發於陰部其人必嘔發於陽部其人振寒而微熱又云黃疸者一身盡痛發熱面色洞黃七八日壯熱口裡有血當下之法如肫肝狀其人少腹內急若其人眼睛澀痛鼻骨痛兩膊及項強腰背急即其患黃多大便澀但令得小便快即不慮死不用大便多多則心腹脹不食此由寒濕在表則熱蓄於脾胃腠理不開瘀熱與宿谷相搏煩郁不得消則大小便不得通故身體面目皆變黃色黃疸病大法有五一曰黃疸二曰黃汗三曰谷疸四曰酒疸五曰女勞疸黃汗疸為病身體俱腫汗出而渴其汗能染衣黃如柏汁此由脾胃有出入水或風所閉熱結而成黃汗也黃疸即前酒食過度臟腑不和水穀相併結於脾胃風濕相搏熱氣熏蒸云云而成黃疸谷疸之證食畢即頭眩心中怫鬱不安遍身發黃此脾胃有熱因飢過食所傷胃氣所致也酒疸之證身目發黃心中懊痛足脛滿小便黃面發赤斑此由飢中飲酒大醉當風入水所致其證心中懊憹面熱不能食時欲嘔吐者是也女勞疸身目俱黃發熱惡寒小腹滿急小便不利此由過於勞傷極於房室大熱大勞而交接所致也疸證以濕熱為源丹溪云疸證不必分五種同是濕熱如盦醬相似內傷發黃略例云內傷勞役飲食失節生黃只用建中理中足矣不必用茵陳新病必須消導久病從谷疸治之傷寒陰陽證發黃詳見本門脈候脈經曰脈沉渴欲飲水小便不利皆發黃也脈浮者宜汗之吐之脈沉者宜下之利之要略曰寸口脈浮而緩則為風緩則為脾疸非中風四肢苦煩脾色必黃瘀熱不行尺脈浮為傷腎趺陽脈緊為傷脾寸口近掌無脈口鼻黑色不治治法治黃疸用子和三法分表裡極效一身盡痛而黃者濕邪勝在表也傷寒當汗不汗則生黃邪在表也並宜汗之不痛乾燥熱勝而黃脈沉弦者邪在表也宜先下之上膈煩悶其脈浮或欲嘔者宜先吐之原發黃證皆其濕熱鬱結必表裡分消疏利之立愈矣治黃疸必利小水為捷徑黃疸多為脾濕不流並積熱而成此病目睛皮膚小水皆黃必須利小水乃為捷徑小水一清而黃即退疸證雖有五種總為濕熱不散身熱身痛發黃小便澀當滲利之以五苓散茵陳黃連之類輕者小溫中丸重者大溫中丸熱多加黃連濕多加茵陳五苓散加食積藥不治證疸而渴者難治疸而不渴音易治疸病以十八日為期治之十日以上為疾劇者為難治寸口無脈鼻出冷汗腹膨形如煙燻搖頭直視為難治環口黎黑油汗發黃為脾絶死不治凡五疸久久變黑者皆難治疸證服解利之藥久而不愈及口淡怔仲耳鳴腳軟憎寒發熱小便濁皆為虛甚宜四君子湯吞八味丸不可強服涼藥通利以致脾氣虛弱腎水枯涸必至危篤額上黑微汗出手足心熱薄暮則發膀胱急小便自利名曰女勞疸腹如水狀不治腹滿者多難治硝石礬石散主之藥方通治疸證方加味五苓散治濕熱鬱滯為疸煩渴引飲小便不利山茵陳山梔子各一錢白朮赤茯苓豬苓澤瀉黃連各七分甘草三分上水二盞燈草十根煎八分食遠溫服活人茯苓滲濕湯治黃疸寒熱嘔吐而渴身目俱黃小便不利食少白茯苓澤瀉茵陳各五分梔子仁黃芩各八分青皮陳皮防己各五分白朮蒼朮各一錢枳實黃連各九分上水煎服茵陳湯治疸證發熱大小便澀茵陳梔子仁各二錢赤茯苓葶藶各錢半枳實甘草各五分水二盞姜三片煎八分食前服秦艽散治五疸口淡耳鳴腳熱發寒熱小便白濁秦艽當歸酒洗芍藥白朮官桂赤茯苓陳皮熟地黃小草川芎各一錢半夏七錢炙甘草五分上分二帖每帖水二盞姜三片煎八分不拘時服小溫中丸治黃疸與食積又可制肝燥脾脾虛須用白朮湯使針砂十兩醋炒七次令通紅另研苦參夏加冬減白朮五兩山楂各二兩吳茱萸一兩冬加夏減蒼朮半斤川芎夏減神麯各半斤香附米一斤童便浸一宿炒上為細末醋糊丸梧桐子大每服七八十丸食前鹽湯下大溫中丸針砂十四兩制如前陳皮蒼朮青皮厚朴薑製三稜醋煮莪朮醋煮黃連苦參白朮各五兩生甘草二兩香附子一斤制如前上為細末醋糊丸梧桐子大每服七八十丸食遠鹽湯下必效散治黃疸通用葶藶隔紙炒草龍膽山梔子茵陳枳實甘草各五分水二盞姜三片煎八分食前服柴苓梔子湯治黃疸清解之劑柴胡黃芩人參半夏各八分陳皮炙甘草白朮茯苓各一錢豬苓澤瀉山梔各七分上水二盞姜三片棗一枚煎一盞食遠服叔和硝石礬石散二味等分煅為末每服二錢大麥粥汁和服日三服取汗愈若小腹滿急小便不利用滑石石膏各三錢入粳米一撮同煎服黃汗金匱桂枝加黃耆湯治黃汗身腫汗出出已輒輕久久必身瞤胸中痛腰以下無汗不能食煩躁小便不利桂枝蒼朮各一錢甘草五分黃耆二錢水煎加薑棗食粥以助藥力黃耆散治汗黃身腫發熱不渴汗出染衣色黃黃耆蜜炙麥門冬茵陳赤芍藥各一錢石膏二錢豆豉一撮甘草炙五分水二盞姜三片煎八分溫服耆芍桂酒湯治汗出入水水從汗孔入而成黃汗黃耆五兩芍藥三兩桂二兩上三味以苦酒一斗水七升煎三升溫服一升空心服至六七日乃解苦心煩不止者以苦酒阻故也黃疸茵陳栝蔞散治黃疸茵陳二錢木通山梔各錢半大黃炮一錢石膏二錢栝蔞殼一錢半上水二盞姜三片蔥一莖煎八分食前溫服金匱小半夏湯治黃疸小便色不異欲利腹滿而喘半夏炮七次薑汁拌每服三錢入姜十片水煎服梔子滑石湯治黃疸腹滿小便不利面赤自汗為裡實當下之大黃黃柏各二兩梔子十五枚滑石四兩上水六升煮四升去渣澄清更取一升頓服一曰病黃疸發熱煩滿胸滿口燥者以病發火劫其汗兩熱所得然黃家所得從濕得之一劫大發而黃壯熱在裡當下之黃連散治黃疸大小便祕澀壅熱纍效黃連大黃酒炒各二兩黃芩酒炒炙甘草各一兩上為極細末每服二錢食後溫水調下日三服先用瓜蒂散搐鼻所下黃水即服黃連散搐鼻瓜蒂散治黃疸小便身如金色兼治酒疸瓜蒂二錢母丁香一錢黍米四十九粒赤小豆五分上為細末每用夜臥先含水一口卻於兩鼻孔中搐入半字至明日取下黃水便服黃連散病輕者五日效重者半月效酒疸葛根湯治酒疸葛根六錢枳實麩炒山梔子豆豉各三錢甘草五分上咀作二劑每劑水二盞煎八分食遠服白朮湯治酒疸因下後變成黑疸目青面黑心中如啖韭狀皮膚不仁其脈微而數桂心白朮炒各三兩豆豉葛根杏仁去皮尖炙甘草錢半枳殼麩炒三錢上咀作二服每服水二盞姜三片煎八分食遠服酒蒸黃連丸治酒疸發黃小便不利川黃連去須淨二斤好酒五升上將黃連以酒煮乾為度研為細末煮麵糊丸梧桐子大每服三十丸食後煎二陳湯加葛根茵陳煎湯送下又療傷酒過度熱毒下血大便泄瀉溫米飲下如神散治酒疸積毒不散發黃久積流入清氣道中用此吹鼻苦葫蘆子苦瓜子各七粒黃黍米三百粒安息香皂角子大二粒上為細末以一字吹入鼻內滴出黃水一升吹勿過多或過多者即以黍米穰燒灰麝香少許吹鼻內立止谷疸穀芽枳實小柴胡湯治谷疸食已即飢而頭眩心中郁怫不安飢飽所致蒸疸而黃穀芽枳實厚朴各一錢山梔大黃柴胡黃芩各六分陳皮半夏人參炙甘草各五分上水二盞姜三片棗一枚煎八分不拘時服茵陳蒿湯治谷疸寒熱不食食即頭眩久久黃色為谷疸茵陳九錢大黃四錢半山梔錢半上作二服每服水二盞煎八分食遠服谷疸丸治飢飽失宜蘊熱發黃苦參二兩龍膽草一兩牛膽一枚上二味為末以牛膽汁入煉蜜為丸梧桐子大每服五十丸空心白湯下一方不用牛膽用豬膽加山梔五錢人參七錢大麥飲下女勞疸滑石散治女勞疸病滑石兩半枯礬五錢上為末每服二錢大麥粥湯食前調下以小便出黃水為度食勞疳黃疸膽礬丸治男婦食勞黃疸疰癖膽礬三錢黃蠟一兩肥棗五十枚上用瓷石器內先下米醋次下礬棗慢火熬半日取棗去核次下蠟再慢火熬一二時成膏入臘茶末二兩和丸緑豆大每服三十丸食後茶清送下棗礬丸治食勞疸身目皆黃色皂礬不拘多少砂鍋煅令通紅醋點赤紅用紅棗煮爛干上為細末棗肉搗作丸梧桐子大每服二三十丸食後薑湯下無擇養勞湯治五疸虛弱腳軟心悸口淡耳鳴微發寒熱氣急小便白濁當作虛勞治之黃耆當歸桂心甘草炙橘皮白朮人參各一兩白芍藥三兩生地黃五味子茯苓各二錢遠志五錢上咀每服四錢水盞半姜三片棗三枚煎七分空心服小建中湯治虛人疸證方見虛損門疸證久為寒變治驗羅謙甫云六月時雨淋漓人多病瘟疫一人因勞役過度渴飲涼茶及食冷物遂令腹痛肢節亦疼身體沉重腹滿不食以為外感傷重通聖散服添身體困甚醫治之以百解散發其汗越四日以小柴胡湯二服後加煩躁抵六日以三一承氣湯下之煩躁又甚又投白虎加人參湯柴胡飲子之類病愈增又易醫用黃連解毒湯硃砂膏服至十七日後病勢稍增傳變身目似黃肢體沉重背惡寒皮膚冷心下痞硬按之而痛眼澀不欲開目睛不了了譫語自汗小便利大便祕面不赤命豫治之診其脈緊細按之虛空兩寸脈短不及本位此證得之因熱而飲冷加以寒藥過度助水乘心及木侮土先因其母凌傳於子經云傳所不勝乘其所勝也時復淋雨乃寒濕相合此證陰證發黃明也豫以茵陳附子乾薑湯主之經云寒淫於內治以甘熱住以苦辛濕淫所勝治以苦熱以淡滲之以苦燥之附子乾薑辛甘大熱散黃治寒故以為主半夏草豆蔻辛熱白朮陳皮甘溫健脾燥濕故以為臣生薑辛溫以散之澤瀉甘平以滲之枳實微苦寒瀉其痞閉茵陳微苦寒其氣輕浮佐以姜附能去膚膜間之寒濕而退其黃故為佐使也煎服一劑前證減半再服悉去又以理中湯服之數日氣得平復或者難曰發黃皆以為熱今暑隆盛又以熱藥治之何也豫曰理所當然熱因寒用非為時也始雖陽證過用寒涼如為濕熱終為寒濕非急反者不能治也茵陳附子乾薑甘草湯因服寒藥過度身目俱黃皮冷心下痞眼澀不開自汗小便利熟附子三錢乾薑炮二錢茵陳錢半草豆蔻一錢麵包煨茯苓五分枳實澤瀉各五分白朮五分半夏制陳皮三錢水盞半姜五片煎八分服黑疸黃疸久久變為黑疸身黃額黑或身面俱黑是也酒疸下之久為黑疸目青面黑心中如啖蒜韭狀大便黑皮膚不仁雖有白朮湯治法多難愈易簡諸方一方治黃疽變成黑疽醫所不治者用土瓜根不拘多少搗取汁一盞空心作一服不愈再服食療方治黃疸用生茅根一握細切以豬肉一斤同煮以熟為度食肉飲汁愈又方用好羅紋秦艽一兩咀作二帖用好酒一盞煎至半盞空心服得利止又方用蘿蔔子炒為末白飲調下方寸匕日三服一方治黑疸多死急用栝蔞根搗汁六合頓服當有黃水從小便中出如未出更服之一方治黃疸以絲瓜連子燒灰存性為末因面病麵湯下酒病酒湯下數服愈一方以梅樹根酒煎服效一方治疸用麻黃一把去節以綿裹用酒五盞煎服半盞去渣不拘時溫服之又治傷寒證發黃疸宜汗之則愈冬月酒煎春夏用水一方治急心黃疸以百合蒸和蜜食之效一種紅花者名山丹不可食白花者即百合也一方治疸皮膚眼目如金色小便赤取青小麥搗汁每服一盞空心服或取青麥苗搗汁不拘時多服良一方以野苧根煎湯服多服止渴解毒極好一方用葛根一味加白豆蔻五粒酒煎空心服效外臺祕要取楊枝一握細搗水一鍾煎半鍾不拘時服一方取東引桃枝煎服忌女人雞犬見之黃腫病黃腫病即世俗所謂黃胖起於食積濕鬱而成由脾濕不行積滯所致丹溪用大小溫中丸俱效大溫中丸小溫中丸二方並見前疸證門粉礬平胃丸治脾胃積滯濕鬱黃胖而似浮腫蒼朮米泔浸白朮各二兩厚朴薑汁炒半兩陳皮一兩甘草砂仁各五錢皂礬二兩用粉制上為末除皂礬另制用紅秈米粉一升先將皂礬砂鍋內炒去煙盡再下粉炒香熟為度取起和前平胃末一處醋煮糊丸梧桐子大每服五十丸日二服薑湯吞下忌麵食生冷紫金丸治黃胖理脾胃進飲食紫金皮針沙陳皮青皮香附子蒼朮厚朴薑汁炒三稜砂仁各一兩上為末神麯糊丸梧桐子大每服三十丸食前白湯下或酒與川椒湯下俱可忌牛肉魚面一方用平胃散加神麯麥芽砂仁皂礬制如前服綱目緑礬丸治黃胖緑礬六兩以米醋鐵杓內炒七次干為度放地上出火氣南星一兩咀炒黃色曲一兩炒黃色大皂角一斤鐵鍋水煮爛操出濃膠濾去渣淨汁入鍋加棗肉再熬成濃膠和前藥用紅棗六兩蒸去皮核入皂角膠內用上前三味為細末和入皂角及棗膠內搗勻丸梧桐子大每服五丸清晨下床每用薑湯下夜臥上床再服忌油膩煎炒如身上發紅斑急煎棗湯解之自愈棗礬丸治黃胖皂礬五兩煅棗肉三兩干蒸餅三兩上為末用生薑自然汁丸梧桐子大每服二十丸食前米飲下日二服上礬味酸以瀉肝棗味甘以補脾也
