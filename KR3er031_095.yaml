body:
  text: 卷之九十五本草集要下木部桂味甘辛氣大熱有小毒入手少陰經桂枝入足太陰經忌生蔥生桂陽採皮陰乾凡用刮去粗皮主溫中利肝肺氣心腹冷痛霍亂轉筋風寒頭痛腰痛出汗止唾咳嗽鼻齆能墮胎通血脈消瘀血堅骨節治風痹骨攣腳軟宣導百藥無所畏殺草木毒牡桂味辛氣溫無毒生南海山谷主上氣咳逆結氣喉痹吐吸利關節補中益氣久服通神輕身不老菌桂味辛氣溫無毒生交趾桂林山谷立秋採無骨正圓如竹主百病養精神和顏色為諸藥先聘通使久服輕身不老面生光華媚好常如童子按三種之桂所出各異焉治亦稍別世俗所用皆單桂也枝條薄者為桂枝宜入治頭目發表散風寒仲景救表用桂枝非以其斂汗蓋表有風邪故病自汗以桂枝溫榮衛而發其邪邪去則表密而汗自止正辛甘發散之義後人用桂止汗失經旨矣身乾厚實者為肉桂宜入治臟補腎氣及下焦寒冷秋冬下部腹痛非此不除刮去粗厚用近里者為桂心又有嫩小枝條為桂心味淡尤宜入治上焦藥及橫行手臂桂雖有小毒亦從類化與芩連為使小毒何施與烏附同用全得熱性冬月與人參麥門冬甘草同用能調中益氣護榮實衛風頭痛遇天將陰風雨先發者桂心一兩為末酒調如膏敷頂上並額角效唾血吐血桂心為末水調下方寸匕中風失音四肢逆冷取一兩以水三升煮取一升服盡取汗槐實味苦酸咸氣寒無毒景天為之使十月上巳日採之主五內邪氣熱止涎唾補絶傷五痔火瘡婦人乳瘕子臟急痛又墮胎催生吞七粒治丈夫婦人陰瘡濕癢産門癢痛久服明目補腦益氣頭不白延年槐枝洗瘡及陰囊下濕癢春採嫩枝鍛為黑灰以揩齒去蟲槐白皮味苦主中風不仁酒煮服之煎湯洗五痔男子陰疝卵腫婦人産門癢痛小兒驚癇壯熱莖葉同又治一切惡瘡爛瘡疥癬煎膏止痛長肉消癰腫煮汁含之治口齒風疳槐花味苦涼大腸熱治五痔心痛眼赤殺腹臟蟲及熱治皮膚風並腸風瀉血赤白痢並炒用槐膠主一切風化涎急風口噤或破傷風任作湯散丸煎雜諸藥用之亦可水煮和諸藥為丸柏實味甘辛氣平無毒牡蠣及桂為之使畏菊花羊蹄諸石及面曲入藥微炒用用扁葉者名側柏主驚悸安五臟益氣血除風濕痹療恍惚虛損吸吸歷節腰中重痛腰腎中冷潤腎燥之藥去頭風興陽道久服令人潤澤美色耳目聰明不飢不老輕身延年柏葉尤良味苦澀氣微溫四時各依方採陰乾主吐血衄血痢血崩中赤白尿血輕身益氣令人耐寒暑去濕痹此補陰之要藥性多燥久得之大益脾以澀其肺作末和油塗之生髮炙罯凍瘡柏白皮主火灼爛瘡長毛髮大風疾眉發脫落用葉九蒸九曬搗為末煉蜜丸梧桐子大日三服夜一服熟水下五丸或十丸百日再生男女及小兒蟲痢大腹下黑血如茶腳色或膿血如澱色者取葉焙乾為末同黃連煎為汁服之殊效松脂味苦甘氣溫無毒六月採透明如乳香者佳主疽惡瘡頭瘍白禿疥瘙風氣殺蟲於疼以少許咬之蟲自死貼諸瘡膿血生肌止痛抽風煉之令白如玉安五臟除熱胃中伏熱咽乾消渴及風痹死肌歷節風惡風癩疾久服輕身不老延年松實主虛羸少氣補不足松葉苦澀主風濕瘡生毛髮安五臟守中不飢延年切如粟須服方寸匕日三服闢瘟疫除惡病多取青葉搗爛用酒浸七日取酒服治腳氣風痹不能行及諸歷節風松節溫主百節久風風虛腳痹軟弱疼痛燥血中之濕浸酒服松根白皮苦溫主辟穀不飢補勞益氣松花拂取似蒲黃久服輕身卻病茯苓味甘淡氣平陽也無毒入手太陰足太陽少陽赤者入足太陰手少陽少陰經惡白蘞畏牡蠣地榆雄黃秦艽龜甲忌醋及酸物得松之餘氣而成者陰乾中有赤筋最損目用者去之主胸脅逆氣憂恚驚邪恐悸心下結痛寒熱煩滿咳逆口焦舌乾利小便水腫淋結膈中痰水肺痿痰壅調胃氣伐腎邪降肺火益氣力保神守中久服安魂養神不飢延年淡利竅甘助陽除濕行水之聖藥白色者補赤色者利又赤者破結氣如小便多及汗多陰虛者不宜服其有抱根者名茯神主闢不祥療風眩風虛五勞口乾止驚悸恚怒驚癇善忘開心益智安魂魄養精神補勞乏又治心下急痛堅滿人虛而小腸不利加而用之琥珀味甘氣平屬陽無毒松脂所化以手摩熱能盛草者為真主安五臟定魂魄能殺精魅邪鬼療蠱毒利小便通五淋明目摩翳止心痛破結症瘀血産後血暈止血生肌合金瘡丹溪云能利小便以燥脾土有功若血少而小便不利者反致燥急之苦茯苓琥珀二物皆自松出而所稟各異茯苓生成於陰者也琥珀生於陽而成於陰故皆治榮而安心利水也枸杞味苦氣寒根大寒子微寒無毒冬採根春夏採葉秋採莖實陰乾主五內邪氣熱中消渴同痹補內傷大勞強陰益精去皮膚骨節間風腎家風眼赤痛風癢瘴膜久服堅筋骨輕身不老明目血虛用之酸棗味酸氣平無毒惡防己八月探實陰乾四十日成主心腹寒熱邪結氣聚四肢痠疼濕痹筋骨風臍上下痛心虛煩及振悸不得眠寧心志斂虛汗止煩渴補中益肝氣堅筋骨助陰氣久服安五臟輕身延年又云膽實多睡熱也生用茶葉薑汁調服膽虛不睡寒也炒熟竹葉湯調服梔子味苦氣寒味薄陰中陽也無毒入手太陰經七稜者良炒用主五內邪氣胃中熱氣面赤酒疱皶鼻白癩赤癩瘡瘍目赤熱痛血痢挾毒熱下小便赤澀不利治濕熱發黃加茵陳豆豉治嘔加生薑陳皮治心腹久痛加生薑汁善去心中客熱虛煩不得眠反覆顛倒心中懊憹又治大病後勞復既亡血亡津液臟腑無潤養內生虛熱非此不除又能屈曲下行降火善開鬱熱塊中之火丹溪六郁方中用之輕浮而象肺色赤而象火故治高之分瀉肺中之火用仁去心胸熱用皮去肌表熱柏木黃柏也味苦微辛氣寒陰中之陽降也無毒足少陰經藥足太陽引經藥惡乾漆二月五月採緊厚鮮黃者上凡使用生蜜水浸曬乾再用蜜塗慢火炙令蜜赤佳主五臟腸胃中結熱黃疸腸痔止泄痢女子漏下赤白陰傷蝕瘡男子莖上瘡煮汁洗屑末敷之蜜炒為末治口瘡又云配細辛治口瘡有神功補腎水膀胱不足諸痿厥腳膝無力癱瘓必用之藥堅腎瀉膀胱熱清小便降相火治骨蒸勞陰痿洗肝明目鼻紅吐血下血治蛔心痛虛噦蛔出小腸虛痛久服通神根名檀桓作結塊如茯苓主心腹百病安魂魄不飢渴久服輕身延年通神心脾熱舌頰生瘡蜜炙與青黛一分同為末入龍腦一字研勻搽瘡上有涎即吐竹葉味苦甘氣平寒陰中微陽無毒䈽竹淡竹為上苦竹次之余不入藥主咳逆上氣溢筋急惡瘍殺小蟲涼心經除煩熱風痙喉痹嘔吐根作湯益氣止渴補虛下氣消毒汁主風痙實通神明輕身益氣別說云竹實大如雞子葉層層包裹味甘勝似蜜此鳳凰所食者今結實如小麥子者非淡竹葉味辛甘氣寒主胸中痰熱咳逆上氣吐血熱毒風壓丹石毒止消渴燒瀝味甘性緩治卒中風失音不語風痹胸中熱狂煩悶壯熱頭痛頭風並懷妊人頭旋倒地安胎治子煩除陰虛人發大熱消虛痰痰盛人氣虛少食者宜用之又痰在四肢非此不能開止驚悸瘟疫迷悶小兒驚癇天吊莖葉同用竹皮茹味苦氣微寒主嘔啘噎膈溫氣寒熱吐血衄血崩中溢筋苦竹葉及瀝療口瘡目赤痛明目利九竅治不睡解酒毒下熱壅作瀝功用與淡竹同齒間血出苦竹茹四兩醋漬一宿含之又云以竹葉儂煮與鹽少許含之卒得惡瘡不識燒苦竹葉和雞子黃敷之妊娠失墜胎動或痛取淡竹瀝服或炙竹茹四兩酒煎服竹根煮汁亦佳爆竹闢妖氣人家為山魈所崇擲瓦不開戶牖不安祈禳不效後有人教以旦夜於庭垣中若除夕爆竹數十竿至曉寂然遂止楮實味甘氣寒無毒取中子日乾四十日成主陰痿水腫益氣補虛勞助腰膝充肌膚明目久服不飢不老輕身葉主小兒身熱食不下生肌可作湯浴又主惡瘡生肉又鼻衄不止搗取汁飲三升不住再飲良久衄瘥又主水利炙乾為末烏梅湯調日再服樹皮主逐水利小便可為紙其紙燒灰酒調服能止血暈血崩金瘡出血皮間白汁療癬敷蛇蟲蜂犬咬山茱萸味酸澀氣平微溫無毒入足厥陰經少陰經蓼實為之使惡桔梗防風防己陰乾去核用主心下邪氣寒熱溫中逐寒濕痹去三蟲補腎氣興陽道堅長陰莖添精髓祕精止小便暖利腰膝療耳鳴止女人月水不定老人尿不節久服輕身明目強力長年核能澀精五加皮味辛苦氣溫微寒無毒遠志為之使畏蛇皮玄參五月七月採莖十月採根陰乾主心腹疝氣腹痛益氣療躄小兒不能行疽瘡陰蝕男子陰痿囊濕小便遺瀝女人陰癢腰脊痛腳痹痛風弱五緩治多年瘀血在皮肌補中益精堅筋骨強志意久服輕身耐老釀酒飲治風痹四肢攣急延年不死仙經藥也杜仲味辛甘氣平溫氣味俱薄陽也無毒惡蛇蛻玄參凡用炒去絲主腰脊痛補中益精氣堅筋骨強志除陰下濕癢小便遺瀝腳中痠疼不欲踐地久服輕身耐老南藤即丁公藤生依南樹故云味辛氣溫無毒主風血補虛老起陽強腰腳除痹逐冷氣排風邪煮汁服亦酒浸冬月用之石南味辛苦氣平有毒五加皮為之使二月四月採葉八月採實蔭干主香腎氣內傷陰衰利筋骨皮毛療腳弱五臟邪氣除熱女子不可久服令思男實殺蟲毒破積聚逐風痹女貞實味苦甘氣平無毒立冬採葉似冬青樹或云即冬青也主補中安五臟養精神除百疾久服肥健輕身不老桑根白皮味甘辛氣溫無毒入手太陰經續斷桂心麻子為之使惡鐵及鉛東行者為佳出土上者殺人採無時刮去青黃簿皮勿令皮上涎落入藥炒用主傷中五勞六極羸瘦崩中脈絶補虛益氣瀉肺氣有餘喘嗽唾血虛勞客熱消痰止渴去肺中水氣浮腫腹滿利水道去寸白作線可以縫金瘡更以熱雞血塗之唐安金藏剖腹用此法桑葉主除寒熱風痛出汗煮汁服主霍亂腹痛鹽挼敷治蛇蟲蜈蚣咬葉枝條細銼水煎濃汁可常服療遍體風癢腳氣風氣拘孿肺嗽口乾利小便輕身聰明桑皮中白汁主小兒口瘡及鵝口舌上生瘡得之神效又塗金刃傷燥痛須臾血止更剝白皮裹之令汁得入瘡中良冬月用根皮蛇咬蜈蚣蜘蛛毒敷之效桑耳味甘有毒黑者主女子漏下赤白治血病癥瘕積聚陰痛陰陽寒熱無子黃熟陳白者止久泄益氣金色者治癖飲積聚腹痛金瘡桑椹曝乾為末蜜和丸服主消渴治金石發熱久服不飢變白不老取黑者一斤和蝌蚪子一斤瓶盛封閉懸屋東頭一百日化為黑泥染白髮如漆又取二七枚和胡桃脂研如泥拔去白髮點孔中即生黑桑上寄生味苦甘氣平無毒桑木氣厚生意濃無採捋者自然生出採莖葉陰乾凡桷櫸柳楓等上皆有寄生唯桑上者佳假乘之氣耳主腰痛小兒背強癢腫安胎充肌膚堅發齒長鬚眉主金瘡去痹女子崩中不足懷妊漏血不止産後余疾下乳汁其實明目輕身久服通神南燭枝葉味苦氣平無毒南方謂之黑飯樹主止泄除睡強筋益氣力久服輕身長年不飢變白去老取莖葉搗碎漬汁浸糯米九浸九蒸九曝米粒正黑袋盛之可適遠方日進一合不飢取汁炊飯名烏飯合歡即夜合相味甘氣平無毒採皮及葉用不拘時主安五臟利心志令人歡樂無憂補陰有捷功久服輕身明目得所欲又皮煎膏消癰腫續筋骨葉可洗衣垢益智子味辛氣溫無毒入手足太陰經足少陰經主君相二火去皮用主遺精虛漏小便遺瀝益氣安神補不足安三焦調諸氣治脾胃中受寒邪止嘔噦攝涎唾當於補中藥內兼用之夜多小便者取二十四枚打碎入鹽同煎服有奇驗榆皮味甘氣平性滑利無毒二月採皮取白曬乾八月採實煎勿令中濕濕則傷人主大小便不利通水道除邪氣消腫毒除諸瘡滑胎久服輕身不飢又令人多睡實尤良味微辛能助肺氣殺諸蟲消心腹間惡氣卒心痛療小兒頭瘡痂疕又塗瘡癬妙花主小兒癇小便不利傷熱小兒白禿瘡搗皮末酷和塗之蟲自出妊娠滑胎易産焙搗末臨月日三服方寸匕令産極易乾漆味辛咸氣溫有毒半夏為之使畏雞子又忌油脂又畏蟹見蟹則不幹入藥搗碎炒用主絶傷補中續筋骨填髓腦安五臟五緩六急風寒濕痹消瘀血痞結腰疼女子疝瘕癥經脈不通削年深積治血氣心痛去蛔殺三蟲生漆去長蟲久服輕身耐老蔓荊實味苦辛甘氣微寒溫陽中之陰無毒太陽經藥惡烏頭石膏主筋骨間寒熱濕痹拘攣明目堅齒利九竅去白蟲久服輕身耐老主風頭痛腦鳴目淚出治太陽頭痛頭昏悶散風邪除目睛內痛牡荊實味苦氣溫無毒防風為之使惡石膏陰乾主除骨間寒熱通利胃氣止咳逆上氣取莖截於火上燒承取瀝飲之去心悶煩熱頭風旋目眩心頭洋洋欲吐卒失音小兒心熱驚癇止消渴除痰唾氣實痰盛人宜服之丹溪云虛痰用竹瀝實痰用荊瀝二味開經絡行血氣俱用薑汁助送辛荑味辛氣溫無毒芎藭為之使惡五石脂畏菖蒲蒲黃黃連石膏採實曬乾用之去心及外毛毛射入肺咳主五臟身體寒熱風頭腦痛面肝溫中解肌利九竅通鼻塞涕出治面腫引齒痛眩冒生鬚髮去白蟲久服下氣輕身明目延年木蘭味苦氣寒無毒臘月採皮陰乾主身大熱在皮膚中去面熱赤皰酒皶惡風熱疾陰下濕癢聰明耳目蕤核味甘氣溫採實去核殼取仁陰乾主心腹邪結氣明目目赤痛傷淚出目腫眥爛眼風癢鉤藤味甘苦氣微寒無毒三月採主小兒寒熱十二驚癇客忤胎風惟療小兒秦皮味苦氣寒無毒大戟為之使惡吳茱萸陰乾主風寒濕痹灑灑寒氣除熱目中青翳白膜肝中久熱兩目赤腫疼痛風淚不止療男子少精婦人帶下小兒癇身熱作湯浴瘥水煎澄清點洗赤眼極效久服頭不白輕身密蒙花味甘氣平微寒無毒凡用酒浸一宿候乾卻採蜜合調蒸之日乾主青盲盧翳赤澀多眵淚消目中赤脈小兒麩痘及疳氣攻眼樂華味苦氣寒無毒決明為之使五月採花主目痛淚出傷眥消目腫南人取以合黃連作煎療目赤爛甚效仙人杖味鹹氣平無毒此是筍欲成竹時立死者色黑如漆五六月收之主噦氣嘔逆闢痁小兒吐乳大人吐食並水煮服小兒驚癇及夜啼安身伴睡良又痔疾燒為末服方寸匕丁香味辛氣溫純陽無毒入手太陰足陽明少陰經主溫脾胃止霍亂嘔逆冷氣腹痛風毒諸腫治口氣齒疳䘌腎氣賁豚壯陽暖腰膝有大如棗核者名母丁香為末實紗囊如小指納陰中主陰冷病能變白以生薑汁和拔去白鬚塗孔中即異常黑蘇合香味甘氣溫無毒此香來從西域云是諸香汁煎之色亦黃主辟惡殺鬼精物溫瘧蠱毒癇痓去三蟲除邪令人無夢魘沉香味辛氣溫陽也無毒入水沉而中實不空者佳主療風水腫毒去惡風補右尺命門壯元陽暖腰膝散滯氣保和衛氣用為使上而至天下而至泉無所不之又止轉筋吐瀉冷氣麻痹骨節不仁濕風皮膚癢心腹痛氣痢藿香味甘辛氣微溫陽也入手足太陰經主療風水腫毒去惡氣治口臭霍亂心痛芳香之氣助脾開胃溫中快氣治吐逆為最要之藥上焦壅煎湯嫩口入順氣烏藥則理肺入黃耆四君子湯則理脾紫真檀味鹹辛氣溫無毒入手太陰足少陰經通行陽明經主惡毒風毒醋和塗敷之末敷金瘡止血止痛妙又治心腹痛霍亂中惡鬼氣能調氣而清香引芳香之物上行最宜橙橘之屬佐以薑棗將以葛根豆蔻縮砂益智通行陽明之經在胸膈之上處咽嗌之中同為理氣之劑龍腦香及膏香味辛苦氣溫屬陽無毒出波律國形似白松樹作杉木氣明淨狀若梅花瓣者甚佳膏乃根下清液砍木作坎而承之者清香為百藥先萬物中香無出其上者主心腹邪氣風濕積聚耳聾明目去目赤膚翳通利關膈熱塞大人小兒風涎閉壅及暴驚熱丹溪云屬火世知其寒而通利然未達其暖而輕浮飛揚局方但喜其香而貴細動輒與麝同用為桂附之助然人身陽易動陰易虧幸思之愚按龍腦性大辛善走故能散熱通利結氣古今方目痛喉痹下疳多用之者取辛散也人欲死者吞之氣散盡也世人誤以為寒不知辛散性甚似乎涼耳諸香皆屬陽豈有香之至者而反寒乎治時疾發豌豆瘡及赤瘡心煩狂躁氣喘妄語取一錢細研旋滴豬心血和丸如芡實子大每服一丸紫草湯下少時心神便定瘡收散安息香味辛苦氣平無毒主心腹惡氣鬼疰治邪氣魍魎鬼胎蠱毒燒之去鬼來神闢衆惡杉材味辛氣溫屬陽無毒須油杉良主療漆瘡取節作屑水煮汁浸洗腳氣腫滿殊效煎木屑服之療心腹脹痛去惡氣乳香味辛苦氣溫陽也入丸散微炒主療風水腫毒去惡氣療諸瘡調血氣定諸經之痛治心腹痛耳聾中風口噤又催生煎膏止痛長肉檳榔味辛苦氣溫味厚氣輕陰中陽也無毒狀若雞心正穩尖長中要實有錦文者良主消穀逐水除痰癖治心痛殺三蟲伏尸寸白治後重如神墜諸藥至於極下破滯氣泄胸中至高之氣南方人食之以祛瘴厲又腳氣衝心大者一枚為末童便薑汁溫浸共半盞調枳谷味苦酸辛氣微寒味薄氣厚陽也陰中微陽無毒陰乾陳久者良去穰核麩炒用主胸膈痞塞散結氣逐水消脹滿安胃化痰涎消食破癥結痃癖除寒熱結止痢長肌肉利五臟走大腸泄肺氣損胸中至高之氣勿多用又治遍身風疹風痛大風在皮膚中如麻豆苦癢通利關節主皮毛胸膈之病腸風痔疾二方同黃耆各半斤糊丸米飲下二十丸湖陽公主胎肥難産方士進瘦胎散用四兩和甘草二兩為末空心服一錢匕茶清點服枳實味苦酸氣寒純陰無毒陳久者良主胸膈痰癖逐停水破結實消脹滿心下急痞痛去脾經積血故治心下痞脾無積血則不痞也故傷寒結胸用之又治逆氣脅痛消宿食安胃氣本經不分殼實殼大者性舒而緩治在高主氣滯在胸膈實小者性酷而速治在下主血滯在心腹故有高低緩急之分厚朴味苦辛氣溫陽中之陰無毒乾薑為之使惡澤瀉寒水石硝石陰乾肉厚紫色者佳入藥去粗皮生薑汁炒主中風傷寒頭痛寒熱驚悸氣血痹死肌去三蟲溫中益氣消痰下氣厚腸胃走冷氣療霍亂胃中冷逆嘔吐酸水泄痢淋露消宿食破宿血治腹痛脹滿散結之神藥若虛弱之人雖腹脹宜酌量用之誤服脫人元氣與枳實大黃同用能瀉實滿是消痰下氣也與橘皮蒼朮同用能除濕滿是溫中益氣也與解利藥同用則治傷寒頭痛與泄利藥同用則厚腸胃蓋用苦則瀉用溫則補也茗苦搽今茶也早採者為茶晚採者為茗味甘苦氣微寒無毒入手足厥陰經主瘻瘡清頭目利小便去痰熱渴下氣消宿食去人脂令人少睡作飲加茱萸蔥姜等良茶飲序云釋滯消壅一日之利暫佳養氣侵精終身之纍斯大赤白痢對和黃連半兩生薑一兩點服效諸爛瘡及燙火瘡細嚼敷貼或為末香油調敷妙目熱赤澀痛嚼爛貼目兩角痛即止烏藥味辛氣溫無毒八月採根主中惡心腹痛蠱毒疰忤鬼氣宿食不消天行疫瘴膀胱腎間冷氣攻衝背膂婦人血氣小兒腹中諸蟲治一切氣除一切冷痛癰癤疥癩貓犬百病並可摩服巴豆味辛氣溫有大毒芫花為之使惡蘘草畏大黃黃連用之去心皮又熬令黃色另搗如膏以和丸散主傷寒溫瘧寒熱破癥瘕結聚堅積留飲痰癖大腸水脹滌蕩五臟六腑開通閉塞利水穀遂女子月閉殺腹藏蠱去惡肉排膿消除鬼毒蠱疰邪物殺蠱魚斑蝥蛇虺毒人吞一粒便欲死而鼠食之三年重三十斤物性乃有相耐如此此斬關奪門之將不可輕用若急治為水穀道路之劑去皮心膜油生用若緩治為消堅磨積之劑炒煙去令紫黑研用丹溪云去胃中寒積無寒積者勿用箭鏃入骨不可拔取微熬螳蜋同研塗傷處須臾痛定微癢忍待極癢不可忍便撼動箭鏃即拔之立出速以生肌膏敷之兼治背瘡皂莢味辛咸氣溫有小毒引入厥陰經柏實為之使惡麥門冬畏空青人參苦參九十月採陰乾如豬牙者良去皮子酥炙用不入湯藥主風痹死肌邪氣風頭淚出利九竅通關節殺精物勞蠱療腹脹滿破堅症墮胎可為沐藥治卒中風昏迷鬼魘不悟卒死卒頭痛為末吹鼻中投莢酒中盡取其精火內煎成膏塗帛貼一切腫毒兼止疼痛皂角針治瘡中用之直達瘡所又米醋煎嫩刺作濃煎敷瘡癬極效一人患大風惡疾用刺一二斤為灰蒸又曬研為末食上濃煎大黃湯調一錢匕服一旬鬚眉再生愈大腹皮味辛氣溫無毒鳩鳥多棲此樹上宜先酒洗仍以大豆汁洗方可用主冷熱氣攻心腹大腸壅毒痰膈醋心並以姜鹽同煎入疏氣藥良下氣健脾開胃烏桕木根皮味苦氣微溫有毒主暴水癥結積聚又治大便不通用此木方停一寸劈破水煎取小半盞服之立通不用多兼能取水又解蛇毒豬苓味甘苦而淡氣平無毒入足太陽經少陰經主痎瘧解毒蠱痊不祥除濕利水道久服輕身耐老治渴解傷寒瘟疫大熱發汗又治腫脹滿洗從腳上至小腹腫此藥行水之功多大燥亡津液無濕證勿用久服損腎昏目郁李仁味酸苦氣平陰中之陽無毒主大腹水腫面目四肢浮腫利小便水道腸中結氣關格不通破血潤燥根主齒齦腫齲齒堅齒煎濃汁含漱之昊茱萸味辛苦氣溫大熱氣味俱厚陽中陰也有毒入足太陰少陰厥陰經蓼實為之使惡丹參硝石畏紫石英九月九日採陰乾凡用先於湯中浸去苦汁凡六七遍然後用主溫中下氣止痛咳逆寒熱除濕血痹逐風邪開腠理治寒邪所隔氣不得上下脾胃傷冷痰氣閉胸心腹絞痛不可忍霍亂轉筋嘔逆胸膈滿及治下焦寒濕疝痛寒氣諸藥不可代也腳氣衝心可和主薑汁飲之良下氣最速腸虛人服之愈甚根殺三蟲下寸白東南行者良南行枝主大小便卒關格不通取斷如手第二指中節含之即下秦椒味辛苦氣溫有毒惡栝蔞防葵畏雄黃去閉口者主風邪氣溫中除寒痹堅齒髮明目除云膜女人月閉不通産後惡血痢多年痢腹中冷痛出汗利五臟久服輕身好顏色耐老增年通神蜀椒味辛氣溫大熱有毒杏仁為之使畏款冬雄黃陰乾用須微炒使出汗取紅去目並黃殼主邪氣咳逆溫中遂骨節皮膚死肌寒濕痹痛下氣除六腑寒冷傷寒溫瘧大風汗不出心腹冷氣痛除齒疼壯陽療陰汗縮小便開腠理通血脈堅齒髮明目殺鬼疰蠱毒蟲魚蛇毒久服之頭不白輕身延年又云多食令人乏氣又十月勿食之口閉者殺人椒目味苦辛有小毒能行水治水蠱又治盜汗尤效將目微炒搗為極細末用半錢匕以生豬上唇煎湯一合調臨睡服效蛇入口中不得出用刀破蛇尾納生椒三粒包著須臾即出漆瘡煎湯洗之齒痛醋煎含之有人陰冷漸漸冷氣入陰囊腫滿日夜痛悶揀淨椒以布帛包著丸囊令厚半寸須臾熱氣大通日再易之取消瘥胡椒味辛氣大溫無毒屬火而有金性燥主下氣溫中祛寒痰止霍亂心腹冷痛及冷痢調食用之味甚辛辣快膈殺一切魚肉鱉菌毒不可多服大傷脾胃肺氣積久而大楝實味苦氣寒陰中之陽有小毒有雌雄二種根白生子者為雌服食用此無子雄者誤服吐瀉殺人主溫疾傷寒大熱煩狂殺三蟲疥瘍利小便水道入心主上下部腹痛心暴痛根東行者煮汁服療蛔蟲甚效皮治遊風熱毒風疹惡瘡疥癩禿瘡並煎湯浸洗訶黎勒味苦酸氣溫性急喜降無毒六稜黑色肉厚者良取皮去核用之主冷氣心腹脹滿胸膈結氣泄逆氣消痰除煩下食開胃澀腸止久痢赤白氣痢霍亂吐瀉又治肺氣因火傷極郁遏脹滿喘急咳嗽味酸苦故有收斂降火之功氣虛者亦少用痰嗽咽喉不利含三枚殊勝麒麟竭味甘咸氣平有小毒勿誤用海母血長相似但血竭咸而甘似梔子氣嚼之不爛如蠟者為上主五臟邪氣帶下止痛破積血金瘡生肉敷一切惡瘡疥癬久不合者亦不可多使卻引膿主打傷損折內傷血聚並宜酒服沒藥味苦辛氣平無毒生波斯國似安息香色黑主破血止痛療金瘡杖瘡諸惡瘡痔漏卒下血目中翳暈痛膚赤婦人産後血氣痛治打撲損折血滯腫痛不可忍皆以酒投飲之良紫葳即凌霄花味酸氣微寒無毒畏滷鹽主婦人産乳余疾崩中帶下癥瘕血閉寒熱羸瘦養胎治血中痛之要藥也又治酒齄熱毒風刺風莖葉味苦主痿蹶益氣亦與花同功松煙墨味辛無毒粗者不堪非松煙者不入藥主止血生肌膚合金瘡主産後血暈崩中卒下血醋磨服之亦主昧目物芒入目磨點瞳子上又止血痢及小兒客忤搗篩和水溫服之赤白痢乾薑好墨各五兩為末醋漿和丸如梧桐子大服三四十丸米飲下日夜六七服效産後血暈以丈夫小便濃煎墨服一升衛豫一名鬼箭味苦氣寒無毒八月採陰乾削取皮羽用主女子崩中下血腹滿汗出除邪殺鬼毒蠱疰中惡腹痛療婦人血氣大效能落胎虎杖根氣微溫主通利月水破瘤血癥結惡瘕撲損瘀血酒漬根服之天竺黃味甘氣寒無毒此竹內所生如黃土著竹成片者一名竹膏主小兒驚風天弔客忤痰壅失音鎮心明目去諸風熱療金瘡止血滋養五臟小兒藥最宜和緩故也蘇方木味甘咸酸氣平陽中之陰無毒主破血排膿止痛消癰腫撲損療血治婦人血氣心腹痛月候不調血噤血暈産後血脹悶欲死者酒煮五兩取濃汁服之效椰子皮味苦氣平無毒主止血止鼻衄吐逆霍亂煮汁服之殼中肉益氣去風漿服之主消渴塗頭益發令黑櫻櫚子主澀腸止瀉痢腸風崩中帶下及養血皮味苦澀氣平止鼻洪吐血破癥治崩中帶下腸風赤白痢入藥燒作灰不可絶過作繩入士千年不爛楓香脂一名白膠香味辛苦氣平性疏通無毒主癮疹風癢浮腫齒痛外科之要藥大風子主風瘡疥癬殺蟲柳華一名柳絮味苦氣寒無毒初生有黃蕊者為花及花干絮方出絮之下有小黑子隨絮而飛主風水黃疸面熱黑痂疥惡瘡金瘡絮止血貼灸瘡良葉主馬疥痂瘡煎以洗馬疥立愈實主潰癰逐膿血枝葉及根皮煎作膏塗癰疽腫毒疔瘡妒乳枝細銼煎汁含之治牙齒痛蕪荑味辛氣平無毒一月採實陰乾主五內邪氣散皮膚骨節中淫淫溫行毒去三蟲逐寸白化食治腸風痔漏惡疥癬雷丸味苦咸氣寒有小毒荔實厚朴為之使惡葛根入藥炮用赤者殺人主殺三蟲逐毒氣胃中熱利丈夫不利女子作摩膏除小兒百病除皮中熱結積蠱毒白蟲寸白自出不止久服令人陰痿白辣一名辣針小棗也味辛氣寒無毒主心腹痛癰腫潰膿止痛決剌結五倍子味苦酸氣平無毒主療齒宣疳䘌肺臟風毒流溢皮膚作風濕癬瘡瘙癢膿血水五痔下血小兒面鼻疳瘡末摻口瘡效煎澄汁洗眼去熱風濕癢腫痛含口中治頑痰有功又解諸熱毒又治腸虛泄痢收斂之劑也黃藥根味苦氣平無毒主諸惡瘡瘻喉痹蛇犬咬毒取根研服之亦含亦塗又治馬心肺熱等疾椿木葉味苦澀氣寒有毒無花不實者為椿有花而莢者為樗主洗瘡疥風疽水煮葉汁用之皮主疳䘌樗木根葉尤良樗白皮主赤白久痢治小兒疳痢殺口鼻中疳蟲及蛔蟲腸滑痔疾瀉血不止女子血崩月信來多赤白帶下取東引細根皮水煮服之又能縮小便入藥蜜炙用桐葉味苦氣寒無毒桐有四種未詳孰是此用者主惡蝕瘡著陰皮主五痔殺三蟲花主敷諸瘡飼豬肥大三倍梓白皮味苦氣寒無毒主熱去三蟲療目中疾煎湯洗小兒壯熱一切瘡疥皮膚瘙癢葉搗敷豬瘡飼豬肥大三倍釣樟根皮俗呼烏樟主金瘡止血治賁豚腳氣水腫煎服並煎湯洗瘡癢疥癬中惡心痛鬼疰霍亂腹脹酒煮服之樺木皮味苦氣平無毒主諸黃疸濃煎汁飲之又主時行熱主毒碗豆瘡特良又乳癰初發腫硬以無灰酒服方寸匕臥及覺瘥千金藤生北地者根大如指色黑如漆生南土者黃赤如細辛主一切血毒諸氣霍亂中惡天行虛勞瘧瘴痰塊嗽不利癰腫蛇犬毒藥石發癲癇悉主之木鱉味甘氣溫無毒主折傷消結腫惡瘡生肌止腰痛肛門腫痛婦人乳痛桃竹筍味苦有小毒主六畜瘡中蛆搗碎納之蛆盡出梳篦主蝨病活蝨入腹為病如癥瘕者煮汁服又梳篦垢主小兒惡氣霍亂水和飲之敗扇主蚊子新造屋柱下四隅埋之蚊永不入燒為末和粉粉身上止汗彌敗者佳本草菜部冬葵子味甘氣寒性滑利無毒黃芩為使是秋種葵覆養經冬至春作子者主五臟六腑寒熱羸瘦五癃利小便療婦人乳癰下乳汁久服堅骨長肌肉輕身延年難産取一二合杵破水煮服之癰節未潰者水吞三五粒便作頭膿出根主惡瘡療淋利小便服丹石人宜之蜀葵味甘氣寒陰中之陽無毒根莖併入藥根花俱陰乾主客熱利小便治惡瘡及帶下散膿血惡汁煮食主丹石發熱結葉燒為末敷金瘡搗碎敷火瘡炙者與小兒食治熱毒下痢及大小丹痢搗汁服亦可花治淋澀水腫催生落胎並一切瘡疥小兒風疹子花有五色赤者治赤帶白者治白帶空心酒調末二錢匕赤治血燥白治氣燥又白者療痰瘧黃蜀葵花與蜀葵花別種春生苗葉尖狹多缺夏末開淡黃花採之曬乾用主治小便淋及催生又瘡家要藥主諸惡瘡膿水久不瘥者作末敷之愈子催生臨産時取四十九粒或二三錢炒研末溫水調服莢蔔根俗名蘿蔔味辛甘氣溫平無毒忌與地黃何首烏同食令發白主大下氣消穀去痰癖主咳嗽解面毒生搗汁服主消渴治肺痿能止血消血衍義云散氣用生薑下氣用萊蔔子治喘嗽下氣消食水研服吐風痰醋研塗消腫毒蕪青味苦氣溫無毒主利五臟輕身益氣消食可長食之令人肥健諸菜之中最有益者昔諸葛亮所止令兵士獨種此為其有大利今三蜀江陵人呼為諸葛菜根主消渴敷熱毒風腫子主明目芥味辛氣溫無毒歸鼻主除腎邪氣利九竅明耳目安中久食溫中又云多食動氣子治風腫毒及麻痹醋研敷之撲損瘀血腰痛腎冷和生薑研微暖塗貼之心痛酒醋服白芥味辛氣溫無毒主冷氣子主敷射工及疰氣上氣發汗胸膈痰冷麵青丹溪云痰在皮裡膜外非此不能達又遊腫諸毒為末豬膽和如泥敷之日三易莧實味甘氣寒無毒忌與鱉同食以鱉細銼和莧置濕處則變為生鱉主青盲白翳明目除邪利大小便去寒熱殺蛔蟲久服益氣力不飢輕身馬齒莧味酸氣寒性滑無毒用葉小者節葉間有水銀入藥不用莖節主目盲白翳利大小便止赤白下去寒熱殺諸蟲止渴破癥結癰瘡服之長年不白和梳垢敷丁腫又燒為灰和多年醋滓先灸丁腫以封之即根出又敷豌豆瘡良生搗絞汁服當利下惡物去白蟲亦治疳痢又主三十六種風結瘡以一釜煮澄清內蠟三兩重煎成膏塗之亦可塗白禿濕癬敷杖瘡又療多年惡瘡子明目主青盲白霧杵為末每一匙煮蔥豉粥和攪食之苦苣味苦氣平不可同血食作痔疾主除面目及舌下黃折取莖中白汁敷丁腫出根又漬癰上立潰碎莖葉敷蛇咬根主赤白痢及骨蒸並煮服之薺味甘氣溫無毒主利肝氣和中其實名菥蓂子主明目目暴赤痛去瘴翳根汁點目中亦效根葉燒灰治赤白痢王瓜味苦氣寒無毒即月令所謂王瓜生者是也三月採陰乾主消渴內痹瘀血月閉寒熱痠疼益氣愈聾療諸邪氣熱結鼠瘻散癰腫留血止小便數遺不禁子潤心肺肺痿吐血腸風泄血赤白炒用蠱毒取搗汁和酒服當吐下下乳汁為末酒服一錢日三黃疸黑疸取根汁六合頓服當有黃水隨小便出未愈再服瓜蒂即瓜也味苦氣寒有毒七月七日採陰乾去瓜皮用蒂約半寸許主大水身面四肢浮腫下水殺蟲毒咳逆上氣風癇喉風痰涎暴塞及食諸果病在胸腹中皆吐下之去鼻中息肉為末羊脂和少許敷之日三次療黃疸及暴急黃和小豆丁為末吹鼻中少時黃水出亦可服方寸匕胃弱及病後産後勿輕用諸亡血諸虛家不可用花主心痛咳逆苦瓠味苦氣寒有毒主大水面目四肢浮腫下水令人吐茄子根及枯莖葉主凍腳傷者湯漬之水芹即芹菜味甘氣平寒無毒主女子赤沃止血養精保血脈益氣令人肥健嗜食治煩渴三月八月龍帶精入芹菜中人遇食之病蛟龍瘕發則似癲面色青小腹滿痛狀如懷妊服硬糖二三斤日二度吐出如蜥蠍繁縷即雞腸草味酸氣平無毒五月五日日中採之乾用主積年惡瘡不愈有神效又主破血宜産婦口齒方燒灰或作末揩齒宣露治淋取滿兩手握水煮服胡荽味辛氣溫微毒子入藥炒用主消穀利大小腸通小腹氣通心竅久食損人精神令人多忘發酸臭腳氣主小兒禿瘡油煎敷之亦主蠱直痔及食肉中毒下血煮冷取汁服小兒痘疹不出欲令速出用胡荽二三兩用酒二大盞煎令沸滾之便以物合定不令泄氣候冷去渣微微從頸以下噴一身令到除面不噴蓼實味辛氣溫無毒主明目溫中耐風寒下水氣面目浮腫癰瘍瘰癧歸鼻除腎氣葉歸舌除大小腸氣利中霍亂轉筋多取煮湯及熱捋腳又搗敷小兒頭瘡馬蓼去腸中蛭蟲水蓼搗敷蛇咬又煮漬腳捋之消腳氣腳腫痛成瘡頻淋洗之蔥實味辛氣溫無毒蔥忌與蜜同食主明目補中不足其莖蔥白入手太陰經足陽明經可作湯主傷寒寒熱出汗中風面目腫喉痹不通安胎歸目除肝邪氣利五臟殺百藥毒通大小腸霍亂轉筋及賁豚氣腳氣心腹痛及心迷悶連根用主傷寒頭痛如破又莖葉用鹽研置蛇蟲傷並金瘡水入皸腫痛治蚯蚓毒大抵發散為功多食昏人神韭味辛微酸氣溫性急無毒忌與蜜同食其子入藥炒主歸心安五臟主胃中熱充肝氣則病人可久食韭汁生研冬月用根細飲之下膈間瘀血甚效又中風疾失音心脾痛上氣喘息胸膈氣結滯及中惡腹脹俱搗飲之小兒初生灌之即吐惡血令無病狂犬咬蛇虺蟲毒並惡瘡搗敷之多食昏人目未出糞土為韭黃滯不宜食花食之動風子主夢泄精滑溺白甚良薤味辛苦氣溫入手陽明經無毒取白良白冷清熱忌輿牛肉同食主金瘡敗諸瘡中風寒水腫生搗熱塗之與蜜同搗塗湯火瘡甚效宜心歸骨菜芝也輕身不飢耐老除寒熱去水氣溫中散結利病人止久痢冷瀉同黃柏煮食絶赤痢霍亂乾嘔煮之服之胸膈卒痛肺氣喘急俱搗生汁細飲之葫大蒜也味辛氣溫屬火有毒獨子者入藥佳五月五日採主散癰腫急瘡除風邪殺毒氣健胃善化肉破冷氣爛痃癖闢瘟疫氣瘴氣蠱毒蛇蟲溪毒治中暑毒霍亂轉筋腹痛爛嚼溫水嗌之又鼻血不止爛搗塗足心止即拭去醋浸之經年者良此物氣極葷煮為羹臑極俊美熏氣亦微下氣溫中消穀生食久食傷肝氣損目明又傷肺傷脾引痰宜戒之癰疽發背惡瘡腫核初發取紫皮獨頭蒜橫切作片子用厚一分貼腫頭中心炷艾如梧桐子灸蒜上勿令大熱若覺痛即擎起蒜蒜焦更用新者如已痛者灸至不痛不痛者灸至痛以多為善無不效者疣贅之類亦依此灸小蒜味辛氣溫有小毒歸脾腎主霍亂腹中不安消穀理胃溫中除邪痹毒氣華他用蒜齏吐人惡物云是此又云是大蒜假蘇荊芥也味辛苦氣溫取花實成穗者曝乾用主寒熱鼠瘻瘰癧生瘡破結聚氣下瘀血除濕痹辟邪氣通利血脈傳送五臟能發汗解渴除冷風治頭風眩暈婦人血風等為要藥治産後血暈搗末童便調熱服三錢匕如神口噤者挑齒灌之或灌鼻中産後中風身強直取末酒和服又杵末酷和封風毒丁腫水蘇一名雞蘇味辛氣微溫無毒七月採主吐血衄血血崩血痢産後中風下氣闢口臭去毒辟惡氣久服通神明輕身耐老香薷味辛氣微溫無毒主霍亂腹痛吐下治霍亂不可缺也下氣除煩熱調中溫胃治傷喜利小便散水腫治水甚捷有徹上徹下之功肺得之則清化行而熱自下又治口氣甚捷蓋口臭是脾有鬱火溢入肺中失其清和甘美之意而濁氣上干故也薄荷味辛苦氣涼溫無毒入手太陰經厥陰經主賊風傷寒發汗通利關節傷風頭腦風及小兒涎驚風壯熱及上行之藥能引諸藥入榮衛又主風氣壅並下氣消宿食惡氣心腹脹滿霍亂骨蒸勞熱用其汁與衆藥熬為膏新大病瘥人勿食令虛汗不止貓食則醉本草果部藕實蓮子也味甘氣平無毒主補中養神益氣力除百疾安心止渴止痢治腰痛固精久服輕身耐老不飢延年多食令人喜藕甘寒除熱毒口渴煩悶解酒毒消瘀血破産後血悶搗罯金瘡熱傷散血止痛生肌蒸煮食開胃補五臟節搗汁止吐血衄血不止荷鼻即荷葉蒂味苦主安胎去惡血留好血血痢煮服之荷葉及房皆破血胎衣不下酒煮服之蓮花忌地黃蒜鎮心輕身益顏色雞頭實味甘氣平無毒主濕痹腰脊膝痛補中除暴痰益精氣強志令耳目聰明久服輕身不飢耐老神仙覆盆子味甘氣平微熱無毒五月採主益氣輕身令發不白又主男子腎虛精竭陰痿女子食之有子山楂子主消食行結氣健胃消食積痰益小兒又催瘡痛消滯血治婦人兒枕痛濃煎汁入砂糖服立效橘皮味辛苦氣溫味厚陰也無毒陳久者良主胸中瘕熱遂氣利水氣除膈間痰熱導滯氣止嘔咳痰逆霍亂泄瀉久服去臭下氣通神去白理肺氣降痰留白理脾胃消食青橘葉導胸脅逆氣行肝氣乳腫痛及脅癰藥中用之以行經橘核治腰痛膀胱氣痛腎冷炒去殼研酒調服青皮味苦辛氣寒足厥陰經引經藥入手少陽經主氣滯消食破積結膈氣治小腹痛須用之瀉肝氣治脅痛須醋炒用勿多服損人真氣陳皮治高青皮治低大棗味甘氣平溫氣厚陽也無毒去烏頭毒不宜合生蔥食入藥用擘去核主心腹邪氣安中養脾助十二經平胃氣通九竅補少氣少津液身中不足大驚四肢重和百藥久服輕分長年中滿者勿食牙齒病者忘之栗味鹹氣寒無毒主益氣厚腸胃令人耐飢灰火中煨令汗出食之勿多食滯氣膈食若袋盛懸微干生食補腎氣治腰腳無力生嚼罯可出箭頭惡刺並敷瘰癧腫小兒疳瘡患風水氣人不宜食以咸故也殼煮汁飲之止反胃消渴柿味甘氣寒屬陰無毒不可與蟹同食令腹痛主通耳鼻氣腸澼不足厚腸胃澀中健胃氣消宿食梅實烏梅也味酸氣平陽也無毒火熏干之為烏梅曬乾瓷器藏收之為白梅去核用主下氣除熱煩瞞收肺氣安心肢體痛偏枯不仁死肌去青黑痣惡疾止下痢澀腸止泄消酒毒好唾口乾去痰治瘧瘴傷寒煩熱及霍亂燥渴虛勞骨蒸入建茶乾薑為丸治休息痢大驗燒灰杵末敷一切惡瘡肉出腐肉立盡白梅研敷刀箭止血刺在肉中嚼封之即出乳癰腫毒杵爛貼之亦和藥點痣蝕惡肉多食損齒傷骨葉煮濃汁服之止休息痢桃核仁味苦甘氣平苦重於甘陰中陽也無毒入手足厥陰經取仁陰乾湯浸去皮尖研如泥用主瘀血血閉血結血燥癥瘕邪氣殺小蟲通潤大便除卒暴擊血通血水止痛苦以破滯血甘以生新血花味苦三月三日採陰乾殺疰惡鬼令人好顏色除水腫石淋利大小便下三蟲酒漬服之除百病桃花味苦氣微溫著樹上自幹不落實中者正月採之主殺百鬼精物五毒不祥中惡腹痛破血有人吐血諸藥不效取此燒存性研末湯調服立愈桃蠹食桃樹蟲也殺鬼邪惡不祥葉味苦辛主除尸蟲出瘡中蟲桃膠下石淋破血中惡煉之主保中不飢輕身桃符主精魅邪氣煮汁飲之桃者五木之精令人作符著門上厭鬼邪氣鬼所畏也杏核仁味甘苦氣溫有小毒入手太陰經得火良惡黃芩黃耆葛根解錫毒湯浸去皮尖熬令黃其兩仁者殺人可毒狗主咳逆上氣雷鳴喉痹下氣定喘潤心肺散肺經風寒咳嗽消心下急滿痛散結潤燥産乳金瘡寒心賁豚燒令煙未盡研如泥物包納女子陰中治蟲丹溪云性熱因寒者用東垣云杏仁下喘治氣色桃仁療狂治血也俱治大便燥但有血氣之分晝則便難行陽氣也夜則便難行陰血也年高人便祕不可泄者脈浮在氣杏仁陳皮脈沉在血桃仁陳皮入肺與大腸為表裡故用為使荔枝子核慢火燒存性為末酒調服治心痛及小腸氣棐實味甘無毒主五痔去三蟲蠱毒食其子良此肺家果也不可多啖引火入肺滑大腸木瓜實味酸氣溫無毒入手足太陰經凡用勿犯鐵主腳氣水腫濕痹邪氣霍亂吐下轉筋不止治冷熱痢心腹痛止渴降痰喘此物入肝故益筋與血腰腎腳膝無力不可缺也安石榴味甘酸無毒凡皮使畏勿犯鐵漿水浸之一宿用主咽燥渴多食損人肺榴留也性滯戀膈成痰實酸皮澀止下痢止漏精東行根療蛔蟲寸白花百葉者主心熱吐血及衄血干乏作末吹鼻中立瘥金瘡刀斧傷破血流和石灰搗末敷上梨味甘微酸氣寒除客熱心煩肺熱咳嗽消渴梨者利也流利下行之謂也酒病煩渴人宜之勿多食令人寒中金瘡乳婦尤不可食胡桃味甘氣溫無毒食之令人肥健潤黑髮補下元亦用之不可多食動風生痰助腎火取肉燒令黑未盡煙和松脂研敷瘰癘瘡又和胡粉為泥拔白鬚發以內孔中其毛皆黑榛子味甘氣平無毒主益氣力寬腸胃令人不飢健行枇杷葉味苦辛氣平無毒火炙布拭去毛用止卒嘔噦不止不欲食下氣治肺熱久嗽並渴疾砂糖味甘氣寒無毒主心肺大腸熱和中助脾小兒多食損齒髮疳䘌生蟯蟲甘生濕濕生火也與鯽魚同食成疳蟲葵葉同食生流癖與筍不消成症本草谷部胡麻一名巨勝即胡地黑芝麻八谷之中惟此為勝故名味甘氣平無毒主傷中虛羸補五內益氣力長肌肉填髓腦堅筋骨久服輕身不老明耳目耐飢渴寒暑生者磨瘡腫生禿髮療金瘡止痛嚼塗小兒頭瘡及濕淫惡瘡婦人陰瘡苗各青蘘味甘氣寒無毒主五臟邪氣風寒濕痹補腦髓堅筋骨耳目聰明不飢不老增壽榨汁沐頭髮良牛傷熱灌之愈白油麻味甘氣寒無毒生寒炒則熱主治虛勞滑腸胃行風氣通血脈潤肌膚又生嚼敷小兒頭上諸瘡良其油性冷常食所用滑骨髓通大小腸治蛔心痛敷一切瘡疥癬殺一切蟲取油一合雞子兩枚芒硝一兩攪服之少時即瀉治熱毒甚良又取油煎沸對和無灰酒服之取微汗治癰疽發背腫毒甚效又治發症飲油一升多吐出蚰蜒入耳以油作煎餅枕臥須臾自出陳者煎膏生肌長肉止痛消癰腫補皮裂有牙齒及脾胃疾人不可吃若煎煉食之與火無異戒之麻蕡云是花又云即實又云花實蕡是三物未詳味辛氣平有毒畏牡蠣白薇惡茯苓主五勞七傷利五臟下血寒氣破積止痹散膿多食令見鬼狂走久服通神明輕身麻子味甘氣平無毒入足太陽經與手陽明經九月採入土者損人用帛包沸湯中浸湯冷出之垂井中一夜勿著水次用曝乾新瓦上將去殼用主補中益氣中風汗出皮膚頑痹逐水利小便潤大腸風熱燥結便難止消渴破積血復血脈催生治橫逆産及下乳産後余疾長髮可為沐藥久服肥健不老花味苦微熱治惡風黑色遍身苦癢諸風惡血及女人經不通䗪蟲為使根汁及煮服之主瘀血石淋難産帶下崩中不止根及葉搗汁飲一升主腕折骨痛捶打瘀血心腹滿無時煮乾麻汁服亦同骨髓風毒疼痛不可運動取麻仁一大升慢火炒香熟杵令極細如粉分為十帖取無灰酒一大湯碗入砂盆中柳木捶子麻粉旋濾取白酒令粉盡即去余後合酒一處煎取一半待溫空服頓服日用一帖藥盡即瘥生大豆味甘內經云咸氣平惡五參龍膽得前胡烏喙杏仁牡蠣良黑者入藥小者尤佳主塗癰腫煮汁飲殺鬼毒止痛烏頭毒諸藥毒逐水脹除胃中熱痹傷中淋露下瘀血散五臟結積內寒久服令人身重炒為屑主胃中熱去腫除痹消穀止腹脹炒令黑煙未斷及熱後投酒中主風痹癱瘓口噤産後諸風虛熱血病大豆黃卷以生豆為芽孽使曬乾味甘氣平主濕痹筋攣膝痛五臟胃氣結積益氣止毒豆豉味苦氣寒無毒無鹽者皆主傷寒頭痛寒熱疸氣惡毒煩躁滿悶虛勞喘急心中懊憹用一升和蔥白煮汁服治傷寒時疾發汗又兩腳疼冷浸酒服之暴痢腹痛及血痢和薤白煮汁服安胎取汁服惡瘡熬末敷之赤小豆味辛甘酸氣溫平陰中之陽無毒主下水排癰腫膿血寒熱熱中消渴止泄利小便吐逆卒澼水和塗消散毒氣和雞子白調塗熱毒取汁洗小兒急黃爛瘡和鯉魚煮食之治腳氣及大腹水腫久食令人虛花名腐婢味辛氣平十月採陰乾主痎瘧寒熱邪氣泄痢陰不起止消渴酒病頭痛白扁豆味甘氣微溫和中下氣治霍亂吐痢不止殺一切草木及酒毒河肫毒葉主霍亂又吐利後轉筋生搗研以少酢浸汁服之亦敷蛇蟲咬花主女子赤白下乾末米飲和服之緑豆味甘氣寒無毒皮寒肉平用之勿去皮主消渴丹毒煩熱風疹藥石發動熱氣奔豚生研絞汁服亦煮食作枕明目治頭風罌子粟味甘氣平無毒主反胃胸中痰滯及丹石發動不下食和竹瀝煮作粥食之極美粟殼性澀止泄痢澀腸今人虛勞嗽者多用止嗽及溫熱泄痢者用止痢劫病之功雖急殺人如劍戒之粟米味鹹氣微寒無毒主養腎氣去脾胃中熱益氣陳者味苦主胃熱消渴利小便止痢粳米味甘苦氣平微寒無毒入手太陰少陰經主益氣止煩渴止泄平和五臟補益胃氣其功莫及與熟雞頭相合作粥食之益精強志聰明耳目糯稻米味苦甘氣溫無毒主溫中令人多熱大便堅止霍亂取二合水研服之稻稗治黃疸遍身煮汁服陳廩米味鹹酸氣溫無毒主下氣除煩渴開胃氣止泄又蒸作餅和醋封腫毒惡瘡效大麥味鹹甘氣溫無毒蜜為使主消渴除熱益氣調中水漬之生芽為孽凡用炒杵去皮補脾胃化宿食破癥結冷氣止心腹脹滿開胃止霍亂下氣消痰催生落胎亦行上焦滯血治産後祕結鼓脹不通胃氣虛人宜服以代戊己腐熟水穀又久食多食消腎戒之小麥味甘咸氣微寒無毒去皮則熱面熱而麩涼帶皮用主除熱止燥渴咽乾利小便養肝氣暴淋煎湯飲之浮者止盜汗治大人小兒骨蒸肌熱婦人勞熱神麯味甘氣溫六月六作陳久者良入藥炒令香主調中下氣開胃化水穀消宿食主霍亂心膈氣痰逆破癥結去冷氣治赤白痢下水穀治小兒腹堅大如盤落胎下鬼胎大畜食米脹欲死者煮汁灌之酒味苦甘辛氣大熱有毒糯米面曲造者入藥用主殺百邪惡毒氣通血脈厚腸胃御風寒霧氣養脾扶肝行藥勢能行諸經不止與附子同味辛者能散為導引可以通行一身之表至極高之分味辛苦者能下甘者居中而緩淡者利小便社酒祭社余者噴屋四壁去蚊子內小兒口中令速語糟置撲損瘀血浸洗凍瘡敷蛇蜂毒丹溪云酒溫中發熱近於相火性喜升大傷肺氣助火生痰變異諸病戒之又云醇酒宜冷飲有三益焉先經肺分得溫中之寒以養肺次入胃中得寒中之溫以養脾冷酒行遲傳化以漸令人不得恣飲故云三益愚謂熱飲則發散傳化速而可多冷飲則停凝而不能多故以不可多飲為益者好飲之人及被強勸而過飲則不宜用冷也醋味酸氣溫無毒米造者入藥陳者良主消癰腫斂咽瘡散水氣殺邪毒治産後並傷損金瘡血暈下氣除煩破癥塊堅積婦人心痛血氣多食損齒傷筋骨治口瘡以醋漬黃柏皮含之愈醬味鹹酸氣冷利以豆作陳久者良主除熱止煩滿殺百藥熱瘡及火毒並治蛇蟲蜂躉等毒飴糖味甘氣微溫無毒入足太陰經糯與粟米作者佳余不堪用主補虛乏止渴消痰潤肺和脾胃魚骨哽喉中及誤吞錢環服之出中滿不宜用嘔吐家忌之仲景嘔家不用建中湯以甘故也丹溪云大發溫中之熱本草石部丹砂味甘氣微寒無毒又云有毒惡磁石畏寒水大塊色光明者佳細研水飛用主身體五臟百病養精神安魂魄益氣明目通血脈止煩渴涼心熱殺精魅邪惡鬼治瘡癢疥瘻久服通神明不老小兒初生細研蜜調塗口中令吮之良又痘瘡將出蜜調服之解痘毒令出少此物鎮養心神但宜生使煉服則有毒少有不作痰者周禮以丹砂石膽雄黃礬石磁石為五毒古人惟以攻瘡瘍玉屑味甘氣平無毒惡鹿角主除胃中熱喘息煩滿止渴屑如麻豆大服之久服輕身延年玉泉衍義云泉字疑漿字味甘氣平無毒畏款冬花主五臟百病柔筋強骨安魂魄長肌肉益氣久服耐寒暑不飢渴不老神仙人臨死服五斤死三年尸不變石鐘乳味甘氣溫無毒蛇床為之使惡牡丹玄石牡蒙畏紫石英明白光潤輕鬆色如煉硝石者佳主咳逆上氣明目益精安五臟通百節利九竅下乳汁療腳弱疼冷下焦傷竭久服延年益壽令人有子不煉服之令人淋丹溪云此慓悍劑夫藥者氣之偏可用於暫而不可久石藥又偏之甚者自唐時膏粱之家惑於方士服食致長生之說以石藥體厚氣厚習以成俗受此氣悍之禍而不知哀哉殷蘖石鐘乳根也味辛氣溫無毒惡防己畏木通主爛傷瘀血泄痢寒熱鼠瘻癥瘕結氣其根又名孔公孽味辛氣溫木蘭為之使惡細辛及羊血青黃色主傷食不化邪結氣惡瘡疽瘻痔男女陰蝕瘡利九竅下乳汁雲母味甘氣平無毒澤瀉為之使畏鮀甲及東流水惡徐長卿忌羊血二月採凡有五色惟黑者不任用主身皮死肌中風寒熱如在車船上除邪氣安五臟益子精明目治赤白痢及帶下久服輕身延年耐寒暑敷金瘡並一切惡瘡良風疹遍身百計不瘥煅粉清水調服陽起石雲母根也味鹹氣微溫無毒桑螵蛸為之使惡澤瀉菌桂雷丸蛇蛻石葵畏菟絲忌羊血形如狼牙色白明瑩者佳水飛研用主崩中漏下補不足破子臟中血癥瘕結氣寒熱腹痛無子陰痿不起莖頭寒陰下濕癢臭汗男子婦人下部虛冷腎氣乏絶子臟久寒石膽膽礬也味酸苦辛氣寒有毒水英為之使畏桂芫花辛荑白薇出有銅處主明目目痛金瘡鼠瘻惡瘡諸癇痓女子陰蝕痛石淋寒熱崩中下血諸邪毒氣煉餌服之不老增壽神仙能化鐵為銅空青味甘酸氣寒無毒畏菟絲子生有銅處銅精熏則生空青其腹中空破之有漿者最佳主青盲耳聾明目療亦痛去膚翳止淚出利九竅通血脈養精神益肝氣久服輕身延年不老能化鋼鐵鉛錫作余腹中漿點眼為最要藥殼亦磨翳曾青味酸小寒無毒畏菟絲子與空青同山色亦相類但其形小纍纍連珠相綴甚難得主目痛止淚出風痹利關節通九竅破癥堅積聚養肝膽療頭風爽神氣止煩渴補不足久服輕身不老能化金銅扁青即石緑味甘氣平無毒主目痛明目折跌癰腫金瘡小瘳破積聚解毒氣及丈夫莖中百病益精令人有子禹餘糧味甘氣寒無毒壯丹為之使主咳逆寒熱煩滿下赤白血閉癥瘕大熱煉餌服之不飢輕身延年重可以去怯餘糧之重為鎮固之劑也白石英味甘辛氣微溫無毒大如指長二三寸六面如屑白潔有光主消渴陰痿不足咳逆胸膈間久寒益氣除風濕痹療肺痿肺癰吐膿下氣利小便久服輕身長年紫石英味甘辛氣溫無毒入手少陰經足厥陰經長石為之使畏扁青附子不欲黃連麥句姜明徹如水精紫石達頭如樗蒲者主心腹咳逆邪氣補不足女子風寒在子宮十年無子療上氣寒熱邪氣結氣補心氣虛定驚悸安魂魄填下焦久服溫中輕身延年又散癰腫醋淬生薑米醋煎敷之青石赤石黃石白石黑石脂等味甘氣平無毒畏黃芩大黃主黃疸泄痢腸澼膿血陰蝕下血赤白吐血衄血邪氣癰腫疽痔惡瘡頭癢疥瘙久服補髓安心澀精鎮五臟益氣肥健不飢輕身延年五石脂各取五色補五臟澀可以去脫石脂為收斂之劑也青石脂味甘酸主養肝膽氣明目女子帶下百病赤石脂味甘酸辛氣溫惡松脂大黃畏芫花主養心氣明目益精療腹痛泄癖下痢赤白小便利女子崩中漏下黃石脂味苦惡細辛畏黃連蜚蠊主養脾氣調中大人小兒泄痢下膿血去白蟲除黃疸白石脂味甘酸惡松脂畏黃芩主養肺氣厚腸胃療驚悸不足心下煩腹痛泄瀉痢便膿血黑石脂味鹹主養腎氣強陰治陰蝕瘡口瘡礬石味酸澀氣寒無毒一云有小毒甘草為之使畏麻黃惡壯蠣入藥用白色光明者主寒熱泄痢白沃陰蝕惡瘡瘰癘疥癬目痛堅骨齒齒痛去鼻中肉息除風消痰止渴治痰壅及心肺煩熱生含咽津治急喉痹煉餌之輕身不老延年性卻水故治涎藥用之蛇咬蠍螫燒刀頭令赤置礬其上看成汁熱滴咬處立瘥甲疽或因割甲傷肌或甲長侵肉遂成瘡腫火枯為末著瘡中痛急即塗少酥緑礬味涼無毒主治喉痹蟲牙口瘡及惡瘡疥癬釀鯽魚燒灰和服療腸風泄血火煅赤釅醋淬過復煅如此三度研細棗肉丸如緑豆大溫水下治小兒疳氣不可療硝石味苦辛咸氣寒有毒朴硝再煎煉上結芒硝其在下焚結如石燒之成焰者是火為之使惡苦參苦菜曾青主五臟積熱胃脹閉滌去蓄結飲食推陳致新除邪氣傷寒腹中大熱煩滿消渴煉之如膏久服輕身天地鬼神之物能化金石芒硝水煎朴硝傾木盆中結芒有廉稜者是主五臟積聚久熱胃閉辛能潤燥咸能軟堅破留血除痰實利大小便通月水破五淋推陳致新經云熱淫於內治以鹹寒佐以苦寒故用大黃芒硝相須為使朴硝味苦辛咸氣寒有毒畏麥句姜初採掃得一煎而成者是主百病寒熱邪氣逐六腑積聚結固留癖破留血停痰痞滿大小便不通推陳致新治天行熱疾消腫毒排膿軟堅能化七十二種石煉餌服之輕身神仙丹溪云善消化驅逐以之治病致用病退則已煉服補益豈理也哉三硝本一物朴硝力緊芒硝次之硝石更緩玄明粉味辛甘氣寒以朴硝煉成者丹溪云以火煅而成性溫陰中有陽之藥治心熱煩躁並五臟宿滯癥結腸胃宿垢軟積開痰明目退膈上虛熱大除胃熱食鹽味鹹氣寒無毒漏蘆為之使河東者為勝主殺鬼蠱邪疰毒氣下部䘌瘡吐胸中痰癖止心腹卒痛堅齒止齒縫出血中蚯蚓毒化湯中洗沃之又用接藥入腎多食傷肺喜咳又令人失色膚黑走血損筋病嗽及水者禁之戌鹽味鹹氣寒無毒西羌所出者是主明目目痛益氣堅肌骨去蠱毒心腹痛溺血諸血舌齒血出去煩熱痰滿敷疥癬癰腫瘰癧滷鹼味苦咸氣寒無毒主大熱消渴狂煩除邪及下蠱毒柔肌膚去濕熱消痰磨積塊洗滌垢膩勿過服頓損人太陰玄精石味鹹氣溫無毒色青白龜背者良主除風冷邪氣濕痹補益精氣婦人痼冷漏下心腹積聚冷氣無名異味甘氣平無毒狀如黑石灰嚼之如餳主金瘡折傷肉損止痛生肌滑石味甘氣寒性沉重無毒入足陽明經石葦為之使畏曾青白如凝脂軟滑者佳用須甘草和之青黑色者不可用身熱泄癖女子乳難癃閉利小便通九竅泄上氣滌胃中積聚寒熱益精氣久服輕身耐老長年燥濕實大府化食毒行積滯逐凝血解燥渴補脾胃降妄火之要藥石膏味辛甘氣微寒無毒入手太陰經少陽經足陽明經雞子為之使惡莽草巴豆畏鐵細理白澤者良主中風寒熱心下逆氣驚喘口乾舌焦不能息腹中堅痛産乳金瘡治中熱發熱惡熱燥熱日晡潮熱傷寒時氣肌肉壯熱頭痛如裂大渴引飲清金治火潤肺除三焦大熱瀉胃火治胃熱不食又治胃熱能食善消以辛也故能解肌出汗上行至頭以甘也故能緩脾益氣止渴生津胃虛寒人勿服又揩齒益齒凝水石即寒水石味辛甘氣寒無毒畏地榆入藥須燒過此有二種有縱理有橫理色青明者佳主身熱時氣腹中積聚邪氣皮中如火燒煩滿五臟伏熱止渴壓丹石毒解巴豆毒理石味辛甘氣寒無毒滑石為之使惡麻黃如石膏順理而細主身熱去來大熱結熱利胃解煩止渴益精明目破積聚去三蟲長石味辛苦氣寒無毒理如馬齒方而澤潤玉色狀同石膏但厚大縱理而長主身熱胃火結氣四肢寒厥止消渴利小便通血脈明目去翳下三蟲殺蟲毒雄黃味苦甘辛氣微寒又云大溫有毒武都山所出赤如雞冠明徹而不臭者佳可入服食藥余但可療瘡主寒熱鼠瘻惡瘡疽痔死肌疥蟲䘌瘡鼻中息肉及絶筋破骨百節中大風中惡蠱毒腹中痛殺精物惡鬼邪氣百蟲毒勝五兵殺諸蛇虺毒煉食之輕身神仙佩之鬼神不能近入山林虎狼伏涉川水毒物不敢傷妊娠佩之轉女為男雌黃味辛甘氣平寒有毒與雄黃同山生金精熏則生雌黃色如金似雲母甲錯可折主惡瘡頭禿痂疥殺毒蟲蜂蝨蛇身癢邪氣諸毒下部䘌瘡石硫黃味酸甘氣溫大熱有毒主婦人陰蝕疽痔惡血及下部䘌瘡止血殺疥蟲堅筋骨除頭禿療心腹痃癖冷氣咳逆上氣腳冷疼弱壯陽道治下元虛冷元氣將絶久患寒泄脾胃虛弱垂命欲盡服之皆效中病便已不可過劑至陽之精能化金銀銅鐵等物水銀味辛氣寒性滑重有毒畏磁石出於丹砂主疹瘻痂瘍白禿殺皮膚中蝨墮胎除熱以敷男子陰瘡消毒氣殺金銀銅錫毒熔化還復為丹得鉛則凝得硫黃則結並棗肉研則散得紫河車則伏輕粉味辛忌一切血飛煉水銀為之主瘰癧殺瘡疥癬蟲鼻上酒齄風瘡燥癢靈砂味甘氣溫無毒惡磁石畏寒水乃水銀硫黃煉成者主五臟百病養精神安魂魄益氣明目通血脈止煩滿殺精魅惡鬼氣密陀僧味鹹辛甘氣平有小毒主久痢五痔金瘡口瘡面上瘢䵟面膏藥用之金屑金箔同味辛氣平有毒畏水銀煉熟用生者殺人主鎮精神安魂魄堅骨髓通利五臟小兒驚傷風癇失志銀屑銀箔同味辛氣平有毒用煉熟者主安五臟定心神止驚悸除邪氣及小兒癲疾狂走珊瑚味甘氣平無毒似玉紅潤油色者佳主宿血鼻衄末吹鼻中鎮心止驚明目去目中翳硇砂味鹹苦辛氣溫有毒畏漿水忌羊血形如牙硝光淨者良用之須澄去土石入瓷器中重湯煮不宜生用主積聚痃癖破結血爛胎止痛下氣療宿冷去惡肉生肌柔金銀可為焊藥合他藥治目中翳不宜多服腐壞人腸胃蓬砂一名硼砂味苦辛氣溫無毒消痰止嗽破癥結喉痹含化咽津緩以取效亦用焊金銀砒霜味苦酸有大毒畏緑豆冷水醋入藥酷煮殺毒用信州宮井鑿取者佳色黃赤明徹不雜主諸瘧風痰在胸膈可作吐藥又能消肉積大損人不可輕服磁石味幸咸氣寒無毒柴胡為之使殺鐵毒惡牡丹莽草石脂主周痹風濕肢節中痛不可持物洗洗酸痟除大熱煩滿及耳聾目昏養腎臟強骨氣益精通關節消癰腫鼠瘻頸核喉痛小兒驚癇煉水飲之令人有子誤吞針取棗核大鑽竅絲穿令吞之針自出柔鐵熟鐵也味辛氣平有毒諸鐵無正入丸散者惟煮汁用之主堅肌耐痛鐵落味辛甘氣平無毒燒鐵赤沸砧上打落細皮屑主風熱惡瘡瘍痘瘡痂疥氣在皮膚中鐵精氣平微溫煅灶中飛出如塵紫色輕虛者可磨盛銅器主明目化銅療驚悸定心氣小兒風癇陰瘡脫肛鐵漿取諸鐵於器中以水浸之經久色青沫出即堪染皂主解諸毒入腹蛇犬虎狼惡蟲等齧服之亦鎮心主癲癇發熱急黃狂走六畜癲狂鐵華粉味鹹氣平無毒取鋼煅作葉平面磨錯光淨以鹽水灑之於醋甕中陰處埋之一百日鐵上衣生刮取之細研如面和合諸藥丸散主安心神堅骨髓強智力除風邪養血氣延年變白去百病隨乎冷熱和合諸藥用棗膏為丸生鐵氣微寒主療下部及脫肛水煮汁洗之耳聾燒令赤投酒中飲之被打瘀血在骨節筋外不去取一斤用酒三升煮一升服鐵鏽生鐵上衣也主惡瘡疥癬和油塗之蜘蛛蟲等咬和蒜磨敷之稱錘主賊風止産後血症腹痛俗呼兒枕及喉痹熱塞並燒令赤投酒中熱飲之無錘用斧或杵又主婦人難産橫逆及胎衣不下鐺墨主蟲毒中惡血暈吐血以酒或米細研溫服之亦塗金瘡生肌止血在面慎勿塗之墨入肉如節赤銅屑味苦氣平微毒主治腋臭以醋和炒熱如麥飯袋盛先刺腋下脈去血封之神效又熬極熱投酒中服五合日三主賊風又能焊人骨細末和中溫服之銅青氣平微毒生熟銅俱有毒銅器上緑色是銅之精神也主治婦人血氣心痛合金瘡止血明目去膚赤息肉自然銅味辛氣平無毒生出銅處方圓不定色青黃如銅煅用凡使勿用方金牙誤餌吐殺人療折傷散血止痛續筋骨破積聚以酒磨服治打撲損研極細水飛過同當歸沒藥各五分酒調頓服仍磨敷痛處古文錢主治翳瘴明目療風赤眼鹽滷浸用婦人橫逆産心腹痛月隔五淋燒以醋淬用眼暴赤痛取生薑一塊淨洗去皮古青錢刮取薑汁就錢稜上點熱淚出愈鉛丹味辛氣微寒即今黃丹化鉛而成主吐逆胃反驚癇癲疾除熱下氣除毒熱臍攣金瘡溢血治瘧及久積煎膏止痛生肌煉化還成九光久服通神明經云澀可以去脫而固氣鉛丹收斂神氣以鎮驚也粉錫即光粉也味辛甘氣寒無毒主伏尸毒螫殺三蟲去鱉症療惡瘡墮胎止小便利炒黑治小兒疳氣久痢伏龍肝味辛氣溫此灶中對釜月下年深黃土主婦人崩中吐血止咳逆止血消癰腫毒氣醋調服或蒜和作泥妊娠時疫熱病令胎不墜水和塗臍干即易又水調服之中風不語心煩恍惚手足不隨或腹中痛滿取五升搗末和冷水八升取汁盡服之石灰味辛氣溫有毒用風化者主疽瘍疥瘙熱氣惡瘡癩疾死肌墮眉殺痔蟲去黑子息肉五月五日採百草葉合石灰搗為團風乾末以治金瘡生肌止血大效又臘月黃牛膽搜和卻內膽中當風掛百日研之更勝産後脫肛玉門不閉取一斗熬令黃以水三斗投灰中澄清澆洗礬石味辛甘氣大熱有毒棘針為之使忌羊血惡鶩尿虎掌細辛畏水得火良火煉服主寒熱鼠瘻蝕瘡死肌風痹腹中堅癖邪氣破積聚痼冷口鼻中息肉不煉服則殺人及百獸石蟹味鹹氣寒無毒即是生蟹年月久深水沫相著因化成石故有泥石相著用須去其泥及石主青盲目淫膚翳及丁翳漆瘡解一切藥毒並蠱毒消癰腫治天行熱疾並熱水磨服細研水飛過入諸藥相佐用點眼良石燕氣涼無毒主淋以水煮汁飲之婦人難産兩手各把一枚立驗桃花石味甘氣溫無毒色似桃花光潤而體重舐之不著舌主大腸中冷膿血痢久服令人肌悅能食代赭味苦甘氣寒無毒入手少陰經足厥陰經畏天雄附子赤紅青色如雞冠白澤者良主鬼疰賊風蠱毒殺精鬼惡鬼腹中毒邪氣女子赤沃漏下帶下百病産難墜胎血痹血瘀小兒驚癇疳疾止泄痢脫精尿血遺尿金瘡長肉青礞石細研為粉用主治食積不消留滯臟腑宿食癥塊久不瘥及小兒食積羸瘦婦人積年食癥攻刺心腹得硇砂巴豆大黃京三稜等良可作丸藥姜石味鹹氣寒無毒生土石間狀如姜有五種色白者良所在有之似爛不磣者良主熱豌豆瘡丁腫等毒大凡石類多主癰疽花乳石色正黃黃石中有淡白點以此得花之名或名花蕊石火煅用主金瘡止血倉卒中金刀刮末敷之即合不作膿又療産婦血暈惡血出礪石即磨刀石無毒主破宿血下石淋除癥結伏鬼物惡氣燒赤熱投酒中飲之不灰木性大寒如爛木燒之不燃石類也主熱痱瘡和棗肉石灰為粉敷身漿水味甘酸氣涼微溫無毒粟米新熟白花者良不可同杏實食主調中引氣開胃止渴霍亂泄痢消宿食宜作粥薄暮啜之解煩去睡地漿氣寒無毒掘地作坎以水沃其中攪令濁俄頃取之主解中諸毒煩悶山中毒菌又楓樹上菌食之令人笑不止飲此解之半天河氣微寒無毒此竹籬頭水及空筒中者主鬼疰狂邪氣惡毒與飲勿令知之又槐樹間主諸風及惡瘡風瘙疥癢亦溫取洗瘡千里水及東流水氣平無毒滌蕩邪穢快順疾速通關下膈煎煮湯藥禁咒鬼神又煉雲母用之為雲母所畏臘雪味甘氣寒無毒臘月取之解一切毒治天行時氣瘟疫小兒熱癇狂啼大人丹石發動酒後暴熱黃疸仍少溫服之秋露水味甘氣平無毒朝露未晞時拂取之在百草頭者愈百疾止消渴澤肌肉柏葉上者主明目百花上者令人好顏色本草獸部龍骨味甘氣平微寒陽也無毒得人參牛黃良畏干棗蜀椒理石色青白者良五色具者尤佳黑色者下主心腹鬼疰精物老魅咳逆泄痢膿血尿血鼻血吐血女子漏下癥瘕堅結小兒熱氣驚癇止夢寐泄精小便泄精腸癰內疽陰蝕止盜汗縮小便夜臥自驚多夢紛紜者加用之安心神定魂魄去脫固氣澀腸小兒臍瘡不瘥燒灰細研敷之齒得人參牛黃良畏石膏主小兒大人驚癇身熱癲疾狂走心下結氣不能喘息諸痙大人骨間寒熱殺精物蠱毒角主驚癇瘛瘲身熱如火腹中堅及其熱泄象牙氣平無毒主諸鐵及雜物入肉刮取屑細研和水敷瘡上及雜物刺等立出喉中刺水調飲之舊牙梳屑尤佳及小便不通生煎服之小便多燒灰飲下象膽隨四時在四腿春前左夏前右秋後左冬後右主目疾和乳滴目中又可和水塗瘡腫胸前小橫骨作灰酒服之令人能浮水牛黃味苦氣平涼有小毒一云無毒人參為之使惡龍骨地黃龍膽草常山畏牛膝乾漆輕鬆重疊可揭微折香摩手甲上黃透甲者為真吐出者名生黃為上其次有角黃心黃肝膽黃得之陰乾百日使勿令見日月光主驚癇寒熱熱盛狂痙除邪祟鬼魅療小兒百病諸癇熱口噤不開大人狂癲中風失音久服安魂定魄令人不忘得牡丹菖蒲利耳目小兒新生去驚邪辟惡氣取一大豆許細研和熟蜜以綿蘸之令兒吮之一日令盡牛角䚡味苦氣溫性澀無毒凡用燒為黑灰存性酒調服主下閉血瘀血疼痛女人帶下血崩不止髓味甘補中填骨髓久服延年膽味苦氣大寒可丸藥又除心腹熱渴利口焦燥益目精肉味甘主消渴止噦泄安中益氣養脾胃消水腫齒主小兒牛癇黃犍牛烏牯牛溺主水腫腹脹腳滿利小便取三升服旋以銅器取新者阿膠味甘辛氣平微溫味薄氣厚陽也無毒入手太陰經足少陰經厥陰經畏大黃薯蕷為之使得火良用東阿井水煮牛皮或驢皮為之主心腹內崩勞極灑灑如瘧狀腰腹痛四肢痠疼小腹痛止痢養肝氣益肺金定喘肺虛極損咳吐膿血非此不補又治女子下血安胎血虛而胎不安者須此久服輕身益氣鹿茸味甘酸又云苦辛氣溫無毒不破損及不出卻血者佳力在血中也形如小紫茄者上又云毋用太嫩唯長四五寸節端如瑪瑙紅者最佳陰乾不可鼻嗅酥炙用主漏下惡血溺血破留血在腹散石淋癰腫骨中熱疽養骨安胎下氣治寒熱驚癇虛勞灑灑如瘧羸瘦四肢痠疼腰脊痛腳膝無力小便利泄精女人崩中赤白帶下益氣強志生齒不老角味鹹氣溫杜仲為之使七月採主惡瘡癰腫逐邪惡氣留血在陰中小腹血急痛腰脊痛折傷惡血尿血輕身益氣強筋骨補絶傷又婦人夢與鬼交者取末和清酒服即出鬼精妖魅貓鬼病人不肯言鬼用角屑搗末水服方寸匕即言實也髓辛甘氣溫主丈夫女子傷中絶脈筋急痛咳逆以酒和服之地黃汁煎作膏填骨髓蜜煮壯陽令有子肉溫補中強五臟益氣力生者療口偏割薄片左患右貼右患左貼正即除之按月令冬至一陽生麋角解夏至一陰生鹿角解麋茸利補陽鹿茸利補陰白膠味甘氣平溫無毒得火良畏大黃煮鹿角作之一名鹿角膠主傷中勞絶腰痛羸瘦補中益氣婦人血閉無子止痛安胎療吐血下血崩中漏下赤白淋露折跌傷損久服輕身延年麋脂味辛氣溫無毒主癰腫惡瘡死肌寒風濕痹四肢拘緩不收風頭腫氣通腠理不可近陰令痿角味甘主痹止血補虛勞益氣力填骨髓暖腰膝壯陽道茸尤良熊脂味甘氣微寒一云微溫無毒十一月取此是背出膏寒月則有主風痹不仁筋急五臟腹中積聚寒熱羸瘦頭瘍白禿面皯皰久服強志不飢輕身又云有痼疾者不可食食則終身不能除膽味苦氣寒惡防己地黃主時氣盛熱變為黃疸小兒驚癇五疳殺蟲治惡瘡又久痔不瘥塗之取瘥乃止神效麝香味辛氣溫無毒春分取之生者益良主辟惡氣殺鬼精物溫瘧蠱毒癇痓去三蟲療諸凶邪鬼氣中惡心腹暴痛脹急痞滿風毒婦人産難墮胎又能療蛇毒犀角味苦酸咸又云甘辛氣寒無毒松脂為之使惡雷丸入藥用雄者須用生角烏色未經湯水浸煮凡犀角紙裹置懷中良久取出搗則易碎故人氣暖厚若蘑服取角尖為候凡治一切角大忌鹽主百毒蠱疰邪鬼瘴氣殺鉤吻鴆羽蛇毒解山瘴溪毒除邪不迷惑魘寐療傷寒溫疫頭痛煩悶大熱發狂中風失音小兒風熱驚癇又治發背癰疽瘡腫破血化膿安心神止煩亂鎮肝明目久服輕身丹溪云屬陽性走散痘瘡後用此散餘毒若無餘毒而血虛或燥熱者不宜用又鹿取茸犀取尖其精鋭之力盡在是矣羚羊角味鹹苦氣寒無毒屬木入厥陰經角多節而尖圓繞彎中深鋭紫小有掛痕者是主明目益氣起陰去惡血疰下闢蟲毒惡鬼不祥安心氣常不魘寐療傷寒時氣寒熱熱在肌膚溫風注毒伏在骨間除邪氣驚夢狂越闢謬小兒驚癇治山瘴散産後血衝心煩悶燒末酒服之又燒灰或屑末治食噎不通久服強筋骨輕身益氣利丈夫羖羊角味鹹苦氣溫微寒無毒菟絲子為之使青羝為佳取無時勿使中濕濕則有毒主青盲明目殺疥蟲止寒泄止驚悸又蟲毒吐血婦人産後余痛小兒驚癇燒之辟惡鬼虎狼去蛇久服安心益氣輕身青羊肝膽主青盲明目膽點眼中主赤瘴白膜風淚又解蟲毒齒主小兒羊癇寒熱三月三日取肉味苦甘氣熱主緩中及大風汗出虛勞寒冷補中益氣安心時疾初愈人不可食食當復發脛骨治牙齒疏豁虎骨味辛氣微溫無毒雄者勝酒或酥炙用主邪惡氣殺鬼疰毒止驚悸惡瘡鼠瘻頭骨尤良治筋骨臂脛毒風攣急屈伸不得走疰疼痛酒浸服脊脛骨妙風從虎故宜治風虎至有力故可補腰膝膏主狗齧瘡頭禿瘡爪辟惡鬼膽主小兒疳痢驚癇研水服之愈豹肉味酸氣平無毒主安五臟補絶傷輕身益氣久服利人耐寒暑脂可合生發膏朝塗暮生齒骨極堅人得之詐為佛牙以為誑俗白馬莖味鹹甘氣平無毒陰乾百日用主傷中脈絶陰不起強志益氣長肌肉肥健生子眼主驚癇腹滿瘧疾殺鬼用之懸蹄主驚邪瘛瘲乳難衄血內漏崩辟惡氣鬼毒蠱疰不祥齒主小兒驚癇水摩服溺味辛微咸主消渴破癥堅積聚男子伏梁積疝婦人瘕疾銅器盛飲之又治鱉瘕又洗頭瘡白禿牡狗陰莖味鹹氣平無毒六月上伏取陰乾百日主傷中陰痿不起令強熱大生子除女子帶下十二疾膽主明目酒調服之及注目中又敷痂瘍惡瘡頭骨主金瘡止血燒灰存性敷之附骨疽及魚眼瘡燒煙燻之白狗血味鹹主癲疾發作及鬼擊之病取熱血一升飲之又塗身上肉味鹹酸性溫主安五臟補傷絶壯陽道輕身益氣黃色者上白黑次之陰虛發熱人不宜食大抵人身之虛多是陰虛世俗往往用此為補不知其害犬肉不可炙食致消渴又不可與蒜同食頓損人乳汁主青盲取白犬生子目未開時汁注目中療十年盲狗子目開即瘥狐陰莖味甘有毒主女子絶産陰癢小兒陰㿗卵腫雄狐糞燒之辟惡在木石上尖頭堅者是顫燒以辟邪心肝生服治狐魅肝燒灰以治風狐骨味甘氣溫無毒主風佳尸疰鬼疰毒氣在皮中淫躍如針刺者心腹痛走無常處及鼠瘻惡瘡頭骨尤良炙骨和麝香雄黃為丸治痔及瘻瘡甚效肉療諸疰主痔作羹臛食之糞燒灰主寒熱鬼瘧發無期度者極驗兔頭骨味甘氣平無毒臘月者良主頭眩痛癲疾皮毛及頭燒灰酒下主難産催生併産後胎衣及余血不下腦髓塗凍瘡肉補中益氣妊娠忌食不可同白雞肉食豚卵味甘氣溫無毒陰乾藏之勿令敗主驚癇癲疾鬼疰蠱毒除寒熱奔豚五癃邪氣攣縮懸蹄主五痔伏熱在腸腸癰內蝕四足主傷撻諸敗瘡下乳汁膽味苦咸主傷寒熱渴又大便不通內入下部即通小兒頭瘡取汁敷之肉味甘咸多食令人暴肥引風肝女子陰中苦癢搔之痛悶炙熱內陰中當有蟲食肝出野豬黃味辛甘氣平無毒三歲者膽中有黃和水服之主金瘡止血生肌療癲癇及鬼疰脂婦人有乳煉精細以一匙和酒一盞日三服獺肝味甘咸氣微熱有毒主鬼疰尸勞一門相染者火炙末和方寸匕日再服又治蠱毒卻魚鯁止久嗽燒服之肉療疫氣瘟病又牛馬時行病又治水氣脹滿膽主明目亦入點藥中屎主魚臍瘡研敷之鼺鼠氣微溫主墮胎令易産臨産帶之或燒末臨時飲之膃肭臍味鹹氣大熱無毒酒浸一日微火上炙令香入藥欲驗其真取置睡犬傍犬忽驚跳若狂又臘月衝風處置盂水浸之不凍主鬼氣濕疰夢與鬼交鬼魅狐魅心腹痛中惡邪氣宿血結塊痃癖羸瘦暖腰膝助陽氣治臍腹積冷精衰脾胃勞極筆頭尖氣微寒年久使之者良主小便不通小便數難陰腫中惡脫肛淋漓燒灰水服之交婚多莖痿取灰酒服之敗鼓皮氣平主蠱毒燒作屑水和服之病人當呼蠱主名姓令取蠱即瘥諸血味甘氣寒主補人身血不足並生飲之又解諸藥毒止渴除丹石毒去煩熱本草禽部丹雄雞味甘難云辛氣微溫無毒一云有小毒主女子崩中漏下赤白沃補虛溫中止血通神殺毒闢不祥冠血主乳難療白癜風諸瘡又自縊死心下溫者剌血滴口中男雌女雄百蟲入耳中滴之即出頭蟲殺鬼肪主耳聾腸主遺溺小便數不禁肝及左翅毛起陰䏶胵里黃皮微寒主泄痢小便遺溺除熱止煩並尿血崩中帶下屎白微寒主消渴傷寒寒熱破石淋利小便止遺溺滅瘢痕敷風痛翮羽主下血閉黑雌雞主風寒濕痹五緩六急安胎補産後虛羸治癰疽排膿補新血血主中惡腹痛及踒折骨痛乳産黃雌雞味甘酸主傷中消渴小便數不禁腸澼泄痢補益五臟續絶傷止勞劣補精助陽雞子主除熱火瘡癇痓可作虎魄神物卵白微寒療目熱赤痛除心下伏熱止煩滿咳逆小兒下泄婦人産難胞衣不下醯漬之一宿療黃疸破大煩熱諸雞肉補虛羸最要故食治方中多用之有風人不宜食又患骨熱者不可食丹溪云屬土而有金與木火性補故助濕中之火又云屬巽助肝火遺尿䏶胵一具並腸燒末服之男雌女雄小兒鵝口不乳燒䏶胵黃皮末乳和敷之小兒卒驚似有痛處而不知疾狀冠血滴口中少許瘥白鵝膏氣微寒無毒主耳卒聾以灌之毛主射工水毒亦可飲其血及以塗身又主小兒驚癇極者又燒灰主噎肉平利五臟主消渴煮汁飲之白鴨屎主殺石藥毒解結縛散蓄熱主熱毒痢為末水調服之熱腫毒瘡雞子白和敷之又敷蛐蟺咬瘡良肉補虛除熱和臟腑利水道主病水浮腫古方用鴨頭丸又取白鴨或青頭鴨一隻治如食法和米並五味煮令極熟作粥食之立愈雁肪味甘氣平無毒主風攣拘急偏枯氣不通利久服益氣不飢輕身耐老鷓鴣味甘氣溫無毒一云微毒主嶺南野葛菌生金毒及溫瘴久欲死者合毛熬酒浸之生搗取汁服良不可與竹同筍食之雀卵味酸氣溫無毒主下氣男子陰痿不起強之令熱多精有子腦主耳聾塗凍瘡立瘥頭血主雀盲黃昏間目無所見者是肉大溫壯陽益氣暖腰膝冬月者良妊娠忌食之雄雀屎名白丁香兩頭尖者是五月取之良研如粉煎甘草湯浸一宿干任用療目熱痛生胬肉赤白膜和男首生乳如薄泥點之即消神效決癰癤塗之立潰女人帶下溺不利蜜和丸股途疝瘕爛痃癖諸塊伏梁伏翼一名蝙蝠味鹹氣平無毒莧實雲實為之使生大山山谷及古屋壁間立夏後採陰乾重一斤色白如雪集則倒懸者佳主目瞑明目夜視有精光久服令人喜樂媚好無憂延年又治五淋利水道取血滴目令人夜中見物糞名夜明砂炒服治瘰癧燒灰酒服方寸匕主子死腹中又小兒無辜疳熬搗為散任意拌飯並吃食與吃燕屎味辛氣平有毒胡燕者入藥主蟲毒鬼疰逐不祥邪氣破五淋利小便窠與屎同多以作湯浴小兒治驚邪鷹眼睛和乳汁研之夜三注眼中三日見碧霄中物烏鴉氣平無毒治瘦咳嗽骨蒸勞臘月用瓦瓶泥煨熟為灰調服鴝鵒肉臘月者良主五痔止血治老嗽及厄噫炙食或為散飲服目睛和乳汁研點目甚明雄鵲味甘氣寒無毒燒作灰以石投中解散者雄凡鳥雌雄難別其翼左覆右者雄右覆左者雌主石淋消結熱燒作灰淋取汁飲之窠多年者療癲狂鬼魅及蠱毒等燒之仍呼祟物名號亦敷瘻瘡良鸕鷀頭氣微寒主鯁及噎燒服之啄木鳥氣平無毒主痔漏燒灰酒服之牙齒疳䘌蟲牙燒末內牙齒孔中淮南子曰啄木愈齲魚狗即翠鳥味鹹無毒主鯁及魚骨入肉不可出痛甚者燒令黑為末頓服之煮汁飲亦佳本草蟲魚部石蜜味甘氣平微溫無毒生山谷岩崖間色白如膏者良主心腹邪氣諸驚癇痓安五臟諸不足益氣補中止痛解毒除衆病和百藥養脾胃止腸澼除口瘡久服強志輕身不飢不老蜜蠟味甘氣微溫無毒惡芫花主下痢膿血補中續絶傷金瘡益氣不飢耐老露蜂房味苦咸氣平有毒惡乾薑丹參黃芩芍藥牡蠣七月七日採陰乾有大小二種俱可用入藥炙主驚癇瘛瘲寒熱邪氣癲疾鬼精蠱毒腸痔血熬之良又療蜂毒腫毒炙末豬脂調塗亦可煎湯洗水煮服之下諸惡物崩中漏下赤白使人無子炙末三指撮酒服之乳癰汁不出燒灰研每服二錢水一盞煎六分溫服白蠟一名蟲蠟屬金冬青樹上細蟲食樹液而生者全稟收斂舉凝之氣外科之要藥生肌止血定痛接骨續筋補虛與合歡樹皮同入長肌肉膏藥用神效桑螵蛸味鹹甘氣平無毒得龍骨良畏旋覆花生桑枝上者良螳螂子也三月採蒸之炙用否則令人泄主傷中疝瘕陰痿益精主女子血閉腰痛通五淋利小便水道療男子虛損腎衰夢寐失精遺溺白濁小便自利不可缺也蚱蟬味鹹甘氣寒無毒生楊柳上五月採蒸乾之勿令蠹主小兒驚癇夜啼癲病寒熱婦人乳難胞衣不出又墮胎蟬蛻治目昏翳頭風目眩又風寒客皮膚瘙癢不已和薄荷為末酒調一錢日三服又水煎汁治小兒出痘疹不快良蟬花有一種蟬其脫殼頭上有一角如花冠狀主小兒天吊驚癇瘛瘲夜啼心悸木虻味苦氣平微寒有毒五月採取啖牛馬時腹有血者良干之去翅足炒用主目赤痛眥傷淚出瘀血血閉寒熱酸𢠹無子蜚虻虻之能飛者大如蜜蜂味苦氣微寒有毒惡麻黃主逐瘀血破下血積堅痞癥瘕寒熱通利血脈及九竅喉痹斑蝥味辛氣寒有毒馬刀為使及畏巴豆丹參空青七八月豆成時取之陰乾去翅足糯米炒熟米黃為度否則吐瀉人主寒熱鬼疰蠱毒鼠瘻瘡癬瘰癧惡瘡疽蝕死肌破石癃通水道血積傷人肌墮胎蜻蛉氣微寒無毒此有數種宜用青色大眼者去翅足炒用強陰止精暖水臟蜣螂味鹹氣寒有毒畏羊角石膏五月五日取蒸藏之臨用火炙良去足勿置水中令人吐主小兒驚癇瘛瘲腹脹寒熱疳蟲大人癲疾狂傷搗為丸塞下部引痔蟲出盡瘥丁瘡取蜣螂心腹下梢白者研貼半日許再易血盡根出愈如神忌食油肉一切惡瘡疽鼠瘻取十數枚杵爛敷之或乾者杵末油調敷箭鏃入骨微熬巴豆並研勻塗傷處待急癢不可忍便撼動箭鏃拔出之塵沙入眼不可出生取一枚手持其背於眼上影之塵沙自出蜘蛛氣微寒有毒勿用五色者取身小尻大深灰色腹內有蒼黃膿者去頭足研如膏投入藥用主大人小兒㿉七月七日取其網療喜忘著衣領中勿令人知又蠍螫蛇齧塗其汁蜂及蜈蚣毒者生置痛處令吸其毒小兒大腹丁奚燒灰熟啖之贅疣取網纏之自落發背瘡杵以醋和先挑四畔令血出張露敷之干即易鼠瘻腫核痛已有瘡口出膿水燒二七枚敷之即愈蝟皮味鹹甘氣平無毒一云有小毒勿使中濕主五痔陰蝕下血赤白五色血汁不止除腫痛引腰背酒煮殺之又腹痛疝積燒為灰酒調服之又治胃逆開胃氣有功牡鼠味甘氣微溫無毒主療踒折續筋骨搗敷之三日一易油煎令消入蠟敷湯火瘡醫針人而折針在肉中及箭鏃刀刃在諸隱處不出杵鼠肝及腦敷之糞兩頭尖主小兒癇疾大腹時行勞復五靈脂寒號蟲糞也味甘氣溫無毒用好酒研飛煉令去沙石佳主療心腹冷氣小兒五疳闢疫治腸風通利氣脈女子血閉産婦血暈行經血亦能止血婦人心痛血氣刺痛甚效蠐螬味鹹氣微溫有毒生河內平澤及人家積糞草中反行者良主惡血血瘀痹氣破折血在脅下堅滿痛月閉目中淫膚青翳白膜取汁滴目中又敷癰疽痔漏惡瘡又治喉痹取汁點喉中即開白殭蠶味鹹辛氣平無毒一云有小毒惡螵蛸桔梗茯苓萆薢白僵死白色而條直者佳勿令中濕濕即有毒不可用入藥炒主小兒驚癇夜啼去三蟲滅黑䵟諸瘡瘢痕令人面色好男子陰瘍病女子崩中亦白産後余痛治中風失音並一切風疾去皮膚風動如蟲治喉痹散痰結末之敷丁腫根當自出中風急喉痹欲死者生薑自然汁調灌之又敷刀斧一切金瘡原蠶蛾味鹹氣溫有小毒入藥取雄者原再也是第二番蠶以其敏於生育也主益精氣強陰道交接不倦亦止泄精尿血又治金瘡凍瘡燙火瘡並滅瘡痕屎一名蠶砂氣溫主腸鳴熱中消渴風痹癮疹癱瘓不隨蠶蛻主血風病益婦人治吐血鼻洪腸風下血帶下赤白痢敷丁腫入藥燒用牙宣牙癰揩齒齦上口瘡干敷患處小兒走馬疳入麝香少許貼患處醫家多用蠶蛻紙而東人用蠶欲眠起所脫皮雖二用各殊然東人所用為正用當微炒和諸藥可作丸散蠍味甘辛有毒形緊小者良捕得用火乾死投用之去腹中土有用全者有用梢者梢力尤切主諸風癮疹及中風半身不遂口眼喎斜語澀手足抽掣小兒驚風不可闕又酒服治耳聾石龍子味鹹氣寒有小毒惡硫黃斑蝥蕪荑大者長七八寸金碧色生川穀五月取於石上令乾有四名在草澤者名螈蠑蜥蜴在屋壁者名蝘蜓守宮主五癃邪結氣破石淋下血利小便水道䗪蟲味鹹氣寒有毒畏皂莢菖蒲十月取曝乾主心腹寒熱洗洗血積癥瘕破堅下血閉生子蜈蚣味辛氣溫有毒赤頭足者良七八月採端午日者尤佳入藥炙去頭足用主鬼疰蠱毒啖諸蛇蠱魚毒殺鬼物老精溫瘧去三蟲心腹寒熱積聚墮胎去惡血雞好食之故中其毒以烏雞屎水調塗咬處又畏蛞蝓蜒蚰觸之則死故取以治其毒大蒜塗之亦效蛤蚧味鹹氣平有小毒一雌一雄常相隨形如大守宮凡採之須存其尾功力全在其尾也入藥去頭足洗出鱗鬣內不淨以酥炙用良主久肺勞嗽傳尸殺鬼物邪氣療咳嗽出血下淋瀝通水道入藥二用又云男服雌女服雄鼠婦味酸氣溫無毒多在下濕處甕器底及土坑中五月五日取主氣癃不得小便婦人月閉血瘕癇痓寒熱利水道衣魚味鹹氣溫無毒多在故紙中即白蠹魚也主婦人疝瘕小便不通小兒中風項強背起摩之又淋閉取以摩臍及小腹溺即通又敷瘡滅瘢蝦蟆味辛甘氣寒有毒五月五日取陰乾東行者良入藥炙或燒灰用主邪氣破症堅血癰腫陰瘡服之不患熱病治小兒疳又殺疳蟲鼠瘻惡瘡蟲食下部猘犬傷瘡狂犬傷發狂欲死能合玉石取肪塗玉刻之如蠟丹溪云煮食發濕不宜食之小兒洞泄下痢燒末飯調方寸匕癬瘡燒末豬脂和敷之跌折損傷生搗爛敷之剝取皮貼亦效溫病發斑困者取一枚生搗絞汁服之眉間白臘名蟾酥治癰疽疔腫蟲牙齒縫中血出以紙捻子蘸乾末少許血出處按之立止以硃砂麝香為丸如麻子大小兒疳瘦者空心一丸如腦疳以乳汁調滴鼻中立效緑桑螺似蝸牛黃小雨後好緣桑葉故云主患脫肛燒末和諸膏敷之立縮蛞蝓味鹹氣寒無毒形類蝸牛蛞蝓二角蝸牛四角兼背上有肉附殼而行主賊風喎僻轉筋及脫肛驚癇攣縮蝸牛主治同生研水服止消渴取一兩燒灰豬脂和敷脫肛立縮又研和真蛤粉敷發背螻蛄味鹹氣寒無毒一云有毒夜出者良夏至取曬乾入藥炒用主産難出肉中刺潰癰腫下哽噎解毒除惡瘡十種水病腫滿喘促小便不利研末溫酒或湯調一錢匕又云自腰以前甚澀主止大小便從腰以後甚利主下大小便若出拔刺多用其腦敷之白項蚯蚓味鹹氣寒有小毒三月取陰乾入藥當去土子鹽水洗微炙主蛇瘕去三蟲伏尸鬼疰蠱毒殺長蟲仍自化作水入蔥葉管中即化療傷寒伏熱狂謬大腹黃疸又治腎臟風下疰腳氣病須用之仍以鹽湯送人被其毒以鹽水浸咬處又以鹽湯飲其屎封狂犬傷毒出犬毛神效溫病大熱狂言研汁飲之小便不通研汁和冷水服半碗中蠱毒者取十四枚以苦酒三升浸之蚓死但服其汁田中螺氣大寒生水田大如桃李者主目熱赤痛取黃連末內其中良久汁出取以注目中生浸取汁飲之止消渴碎其肉敷熱瘡爛殼燒末服之主反胃煮汁飲療熱醒酒牡蠣味鹹氣平微寒無毒入足少陰經貝母為之使得甘草牛膝遠志蛇床良惡麻黃吳茱萸辛夷主傷寒寒熱溫瘧灑灑驚喜怒氣除拘緩瘰癧癰腫喉痹鼠瘻女子帶下赤白心脅氣結痛除老血軟積痞咸能軟堅也澀大小腸止大小便療鬼交泄精久服強骨節殺邪鬼延年和杜仲服止盜汗和麻黃根蛇床子乾薑為粉去陰汗引以柴胡能去脅下之硬引以茶清能消結核引以大黃能除股間腫地黃為之使能益精收澀止小便本腎經藥也石決明味鹹氣平寒無毒七孔九孔者良以上者不佳凡用先蘑去上粗皮用鹽並東流水瓷器中煮一伏時搗末主目障翳痛青盲久服益精輕身海蛤味苦咸氣平寒無毒蜀漆為之使畏狗膽甘遂芫花此是海中爛殼久在泥沙風波淘灑自然圓淨以小而久遠者佳主咳逆上氣喘息煩滿胸痛寒熱療陰痿文蛤味鹹氣平無毒生東海表有文此是未爛時殼猶有文者二蛤同類惟分新舊耳主惡瘡蝕五痔咳道胸痹腰痛脅急鼠瘻大孔出血崩中漏下墜痰軟堅止渴燥濕收澀固濟治急疳蝕口鼻數日盡欲死燒灰臘豬脂和塗之又治疝痛能降能消能軟能燥同香附末薑汁調服珍珠氣寒無毒用新完未經鑽綴者佳乳無聲為度主鎮心綿裹塞耳主聾敷面令人潤澤好顏色粉點目中主膚翳瞳膜小兒驚熱藥中亦用之貝子味鹹氣平有毒燒用之良主目翳鬼疰蠱毒腹痛下血五癃利水道解肌散結熱龜甲味鹹甘氣平無毒惡沙參畏狗膽卜師鑽過者名敗龜板大者良入藥用生脫者勿令中濕中濕即有毒凡用酥炙豬脂酒皆可炙主漏下赤白破癥瘕痎瘧五痔陰蝕濕癢癱緩四肢重弱小兒顱不合頭瘡難燥女子陰瘡心腹痛腰背痠疼骨中寒熱傷寒勞復或肌體寒熱欲死大有補陰之功力猛兼去瘀血續筋骨治勞倦久服輕身不飢益氣資智亦使人能食龜乃陰中至陰之物稟北方之氣而生故能補陰血不足又方家以其靈於物故用以補心甚驗鱉甲味鹹氣平無毒惡礬石生取甲良九肋者佳釀醋浸炙黃色用主心腹癥瘕堅積寒熱去痞息肉陰蝕痔惡肉消瘡腫療溫瘧勞瘦骨蒸熱小兒脅下堅婦人漏下五色羸瘦墮胎頭燒灰主小兒諸疾又治脫肛血亦可塗之肉甘溫主傷中益氣補不足忌與莧菜同食又三足者為能不可食丈夫陰頭癰取甲一枚燒末雞子白和敷良産難取甲燒灰服方寸匕立出蟹即螃蟹味鹹氣寒有毒八月後食之良霜後更美主胸中邪氣熱結痛喎僻面腫敗漆燒之致鼠解結散血愈漆瘡黃能化漆為水腳中髓並殼中黃熬為末內金瘡中能續斷筋爪墮胎破宿血産後血閉酒及煮湯煎服良水蛭味鹹苦氣平微寒有毒畏鹽及石灰用水中小者五月六月採曬乾腹中有子者去之細銼後微火炒令色黃乃熟不宜入腹生子為害主逐惡血瘀血月閉蝕血癰積聚無子利水道又墮胎治折傷有功熱酒調下末一錢食頃痛可更一服或和麝香研為末酒調一錢當下蓄血蓋苦走血咸勝血也癰腫毒取十餘枚次第令啖腫處血滿自脫更用飢者取皮皺肉白瘥馬刀味辛氣微寒有毒丹溪云溫中有火主漏下赤白寒熱破石淋殺禽獸賊鼠蛤蜊性冷無毒丹溪云濕中有火止消渴開胃解酒毒主老癖能為寒熱者及婦人血塊煮食之此物雖冷然與丹石相反服丹石人不宜食療燙火傷取殼灰火燒研為末油調塗之神妙蚌性冷無毒丹溪云濕中有火主婦人虛勞下血並疰瘻血崩帶下又止消渴除煩熱壓丹石毒以黃連末內之取汁點赤眼並暗良爛殼粉飲下治反胃痰飲又蚌粉治疳止痢醋調敷癰腫淡菜味甘氣溫無毒又名東海夫人主補五臟虛損理腰腳氣益陽食治産後血結腹內冷痛消痃癖癥瘕婦人帶下漏下丈夫久痢並煮食之雖形狀不典而甚益人蚺蛇膽味甘苦氣寒有小毒割膽看內細如粟米著水中浮走者為真沉而散者非也主心腹䘌痛下部䘌瘡目腫痛小兒五疳蛇蛻味鹹甘氣平無毒又云有毒畏磁石及酒五月五日十五日取之白如銀色完全石上者佳主小兒百二十種驚癇瘛瘲癲疾寒熱腸痔蠱毒蛇癇辟惡止嘔逆明目去翳膜火熬之良甚療諸惡瘡白花蛇味甘咸氣溫有毒九月十月採捕之火乾用去頭尾酒浸三日棄酒火炙去皮骨主中風濕痹不仁筋脈拘急口眼喎斜半身不遂骨節疼痛疥癩暴風瘙癢此蛇治風速於諸蛇然大毒頭尾各一尺尤甚去之只取中段用烏蛇味甘氣平無毒背有三稜色黑如漆尾細尖長者佳眼不陷為真酒浸去頭尾炙熱去皮骨入丸散用亦浸酒合膏主諸風瘙癮疹疥癬皮膚不仁頑痹諸風性至善不噬物鯪鯉甲氣微寒有毒主五邪鬼魅驚啼悲傷及痔漏惡瘡疥癬蟻瘻燒作灰敷之以酒或水和服方寸匕山瘴瘧煎湯服之或為末酒調服吹乳疼痛取甲炙黃木通各一兩自然銅半兩搗羅為末每服二錢溫酒調下氣痔下膿燒一兩存性豆蔻仁三枚同為末米飲調二錢甚者加蝟皮一兩燒入蠡魚即鱧魚味甘氣寒無毒諸魚膽皆苦惟此膽可食主濕痹面目浮腫下大水療五痔取魚腸以五味炙令香以綿裹納穀道中一食頃蟲當出鯽魚味甘氣溫春不食其頭又不可合豬肝雉肉食主諸惡瘡燒以醬汁和塗之或取豬脂煎用又主腸癰令專作羹主胃弱不下食調中下氣補虛作膾主腸澼水穀不調又赤白久痢又釀白礬燒灰治腸風血痢又開其腹內少鹽燒之治齒痛丹溪云諸魚皆屬火惟鯽魚屬土故屬陽明而有調胃實腸之功多食能動火諸魚皆然燒灰主咳嗽小兒口瘡頭瘡重舌目翳鯉魚膽味苦氣寒無毒不計大小並三十六鱗頭有毒主目熱赤痛青盲明目久服強悍益志氣耳聾滴之小兒熱腫塗之肉燒灰治咳逆氣喘煮食療水腫腳滿下氣又安胎治懷妊身腫又天行病後不可食烏賊魚骨味鹹氣微溫無毒又云有小毒惡白蘞白朮附子主女子漏下赤白經汁血閉陰蝕腫痛寒熱癥瘕無子驚氣入腹腹痛環臍陰中寒腫令人有子又止瘡多膿汁不燥殺蟲治心痛消目中浮翳細研和蜜點之又療牛馬目中障翳小兒痢下細研米飲下之丈夫陰頭癰末粉敷之腹中有墨主血刺心痛醋磨服鰻鱺魚味甘有毒有五色紋者其功勝主五痔瘡瘻殺諸蟲壓諸草石藥毒熏下部蟲療婦人産戶瘡蟲疰腰背間濕風痹常如水洗及濕腳氣人服之良患諸瘡瘻及癧瘍風婦人帶下百病一切風瘙如蟲行者長食之燒之熏膻中斷蛀蟲置其骨箱中斷白魚諸蟲咬衣服又熏諸木竹闢蛀蟲又治蚊蟲取乾者於室燒之蚊化為水青魚膽主目暗滴汁目中並塗惡瘡石首魚味甘無毒和蓴菜作羹開胃益氣干之名為養炙食之消瓜成水亦主卒腹脹食不消頭中有石如棋子主下石淋磨服之亦燒為灰末服本草人部發髲味甘氣溫又云有小寒無毒主五癃關格不通利小便水道療小兒癇大人痓仍自還神化合雞子黃煎之化為水療小兒驚熱及熱瘡亂髮微溫補陰功甚捷主咳嗽五淋大小便不通小兒驚癇燕面瘡豌豆瘡鼻衄欲死燒之研末調方寸匕又吹內立已止血悶血暈金瘡傷風血痢燒灰勿絶過煎膏長肉消瘀血破傷風及沐發中風取如雞子大無油器中熬焦黑研為末以好酒一盞沃之入何首烏末二錢和勻候溫灌之過一二刻又灌之極效口誤吞發繞喉取己頭髮燒末其水調服一錢人乳汁味甘氣寒無毒主補五臟令人肥白悅澤點服止淚明目療赤痛頭垢氣溫主淋閉不通傷寒勞復丸服之或浸取汁服治噎酸漿水煎膏服又治中蠱毒及菌毒米飲或酒化下竹木刺在肉中塗之即出百邪鬼魅水服一小豆大人屎氣寒主療時行大熱狂走解諸毒宜用絶乾者為末沸湯沃服之善破丁腫開以新者封之一日根爛或燒灰醋和如泥敷乾即易糞清臘月截淡竹去皮浸滲取汁治天行熱狂熱痰中毒並露瘡取汁服之人溺氣寒童子者尤佳主療寒熱頭痛溫氣熱勞咳嗽肺痿降火最速主卒血攻心撲損瘀血吐血鼻洪和少生薑汁煎一二沸乘熱服難産及胞衣不下薑蔥煎乘熱飲即下産後溫飲一杯壓下敗血惡物免血暈之疾氣血虛無熱者不可用打撲杖瘡及蛇犬等咬熱淋患處浣褲汁月經衣婦人裩襠主解毒箭並女勞復傷寒陰陽易燒經衣熱水服方寸匕交州夷人以焦銅為鏃頭毒藥鏃鋒上中之即死月水汁解之又裩襠主陰陽易當陰上割取燒末服方才匕童女裩尤佳若女患陰易即須男子裩也陰易病者人患時行病起後合陰陽便即相著甚於本病其候小便赤澀寒熱甚者見服此便通利死人枕冢墳中取用煮服之治尸疰病腹中石蛔邪氣入肝眼痛多見鬼物或問三病不同皆用死人枕而瘥何也徐嗣伯曰尸疰者鬼氣也伏而未起故令人沉滯得死人枕治之魂氣飛越不復附體故尸疰自瘥石蛔者醫療即癖蛔蟲轉堅世間藥不能遣所以須鬼物驅之然後乃散故令煮死人枕服去邪氣入肝故使眼痛而見魍魎須邪物以鉤之故用死人枕之氣因而去之故令埋於冢間也
