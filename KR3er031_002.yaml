body:
  text: 卷之二內經要旨上唐太僕令啓玄子王冰序夫釋縛脫艱全真導氣拯黎元於仁壽濟羸劣以獲安者非三聖道則不能致之矣孔安國序尚書曰伏羲神農黃帝之書謂之三墳言大道也班固漢書藝文志曰黃帝內經十八卷素問即其經之九卷也兼靈樞九卷乃其數焉雖復年移代革而授學猶存懼非其人而時有所隱故第七一卷師氏藏之今之奉行惟八卷耳然而其文簡其意博其理奧其趣深天地之象分陰陽之候列變化之由表死生之兆彰不謀而遐邇自同勿約而幽明斯契稽其言有徵驗之事不忒誠可謂至道之宗養生之始矣假若天機迅發妙識玄通藏謀雖屬乎生知標格亦資於古訓未嘗有行不由徑出不由戶者也然刻意研精探微索隱或識契真要則目牛無全故動則有成猶鬼神幽贊而命世奇傑時時間出焉則周有秦公漢有淳于公魏有張公華公皆得斯道之妙者也咸日新其用大濟蒸人華葉遞榮聲實相副蓋教之著矣亦天之假也冰弱年慕道夙好養生幸遇真經式為龜鏡而世本紕繆篇目重疊前後不倫文義懸隔施行不易披會亦難歲月既淹襲以成弊或一篇重出而別立二名或兩論併合而都為一目或問答未已別樹篇題或脫簡不書而云世闕重合經而冠針服並方宜而為咳篇隔虛實而為逆從合經絡而為論要節皮部為經絡退至道以先針諸如此流不可勝數且將升岱嶽非徑奚為欲詣扶桑無舟莫適乃精勤博訪而並有其人歷十二年方臻理要詢謀得失深遂夙心時於先生郭子齋堂受得先師張公祕本文字昭晰義理環周一以參詳群疑冰釋恐散於末學絶彼師資因而撰注用傳不朽兼舊藏之卷合八十一篇二十四卷勒成一部冀乎究尾明首尋注會經開發童蒙宣揚至理而已其中簡脫文斷義不相接者搜求經論所有遷移以補其處篇目墜缺指事不明者量其意趣加字以昭其義篇論吞併義不相涉闕漏名目者區分事類別目以冠篇首君臣請問禮儀乖失者考校尊卑增益以光其意錯簡碎文前後重疊者詳其旨趣削去繁雜以存其要辭理祕密難粗論述者別撰玄珠以陳其道凡所加字皆朱書其文使古今必分字不雜揉庶厥昭彰聖旨敷暢玄言有如列宿高懸奎張不亂深泉淨瀅鱗介咸分君臣無夭枉之期夷夏有延齡之望俾工徒勿誤學者惟明至道流行徽音纍屬千截之後方知大聖之慈惠無窮時大唐寶應元年歲次壬寅序校上內經素問表臣聞安不忘危存不忘亡者往聖之光務求民之瘼恤民之隱者上主之深仁在昔黃帝之御極也以理身緒餘治天卜坐於明堂之上臨觀八極考建五常以謂人之生也負陰而抱陽食味而被色外有寒暑之相蕩內有喜怒之交侵天昏札瘥國家代有將欲斂時五福以敷錫厥庶民以與岐伯上窮天紀下極地理遠取諸物近取諸身更相問難垂法以福後世於是雷公之倫受業傳之而內經作矣歷代寶之未有失墜蒼周之興秦和述六氣之論且明於左史厥後越人得其一二演而述難經西漢倉公傳其舊學東漢仲景撰其遺論晉皇甫謐次而為甲乙及隋楊上善纂而為太素時則有全元起者始為之訓解闕第七一通迄唐寶應中太僕王冰篤好之得先師所藏之卷大為次注由是三皇遺文爛然可觀惜乎唐令列之醫學付之藝技之流而薦紳先生罕言之去聖已遠其述暗昧是以文注紛錯義理混淆殊不知三墳之餘帝王之高致聖賢之能事唐堯之授四時虞舜之齊七政神禹修六腑以興帝功文王推六子以敘卦氣伊尹調五味以致君箕子陳五行以佐世其致一也奈何以至精至微之道傳之以至下至賤之人其不廢絶為已幸矣頃在嘉祐中仁宗念聖祖之遺事將墜於地乃詔通知其學者俾之是正臣等承乏典校伏念旬歲遂乃搜訪中外裒集衆本浸尋其義正其訛舛十得其三四余不能具竊謂未足以稱明詔副聖意而又採漢唐書録古醫經之存於世者得數十家敘而考正焉貫穿錯綜磅礴會通或端本以尋支或溯流而討源定其可知次以舊目正謬誤者六千餘字增注義者二千餘條一言去取必有稽考舛文疑義於是詳明以之治身可以消患於未兆施於有政可以廣生於無窮恭惟皇帝撫大同之運擁無疆之休述先志以奉成興微學而永正則和氣可召災害不生陶一世之民同躋於壽域矣陰陽篇第一陰陽應象大論篇帝曰陰陽者天地之道也萬物之紀綱變化之父母生殺之本始神明之府也治病必求其本指陰陽言故積陽為天積陰為地陰靜陽躁陽生陰長陽殺陰藏陽化氣陰成形故曰天地者萬物之上下也陰陽者血氣之男女也左右者陰陽之道路也水火者陰陽之徵兆也陰陽者萬物之能始也故曰陰在內陽之守也陽在外陰之使也此言陰陽為天地萬物生殺之本而人物之生莫不具此天地陰陽清陽為天濁陰為地地氣上為云天氣下為雨雨出地氣云出天氣故清陽出上竅濁陰出下竅清陽發腠理濁陰走五臟清陽實四肢濁陰歸六腑水為陰火為陽陽為氣陰為味味歸形形歸氣氣歸精精歸化精食氣形食味化生精氣生形味傷形氣傷精氣耗則傷精也精化為氣氣傷於味陰味出下竅陽氣出上竅味厚者為陰薄為陰之陽氣厚者為陽薄為陽之陰味厚則瀉薄則通氣薄則發泄厚則發熱壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣氣味辛甘發散為陽酸苦湧泄為陰氣得少火則生故曰少火生氣氣得壯火則耗故曰壯火食氣天氣通於肺地氣通於嗌風氣通於肝雷氣通於心穀氣通於脾雨氣通於腎六經為川腸胃為海九竅為水注之氣以天地為之陰陽陽之汗以天地之雨名之陽之氣以天地之疾風名之暴風象雷逆氣象陽天不足西北故西北方陰也而人右耳目不如左明也地不滿東南故東南方陽也而人左手足不如右強也曰何以然曰東方陽也陽者其精並於上並於上則上明而下虛故使耳目聰明而手足不便也西方陰也陰者其精並於下並於下則下盛而上虛故其耳目不聰明而手足便也故俱感於邪其在上則右甚在下則左甚此天地陰陽所不能全也故邪居之夫陰陽之應天地猶水之在器也器圓則水圓器曲則水曲人之氣血亦如是故隨不足則邪氣留居之陰陽應象也寒極生熱熱極生寒寒氣生濁熱氣生清清陽在下則生飧泄濁氣在上則生䐜脹此陰陽反作病之逆從也生氣通天論曰陽氣者則天與日失其所則折壽而不彰故天運當以日光明是故陽因而上衛外者也故陽氣者一日而主外平旦人氣生日中而陽氣隆日西而陽氣已虛氣門乃閉是故暮而收拒無擾筋骨無見霧露犯此三時形乃困薄皆所以順陽氣也陽出則出陽藏則藏暮陽氣衰內行陰分故宜收斂以拒虛邪順此三時天真久遠陰者藏精而起亟也陽者衛外而為固也陰不勝其陽則脈流薄疾並乃狂陽不勝其陰則五臟氣爭九竅不通凡陰陽之要陽密乃固兩者不和若春無秋若冬無夏因而和之是謂聖度故陽強不能密陰氣乃絶陰平陽閉精神乃治陰陽離決精氣乃絶陰應於內陽衛於外起者起而應也亟者數也外有所召則內數起以應之如外以順召則心以喜起而應外以逆召則肝以怒起而應故曰起亟陰陽之要在於陽密陽密則固而中和且平若陰陽不和則是偏陰偏陽而絶陰陽之道聖人惟貴密守因而和之有以節度則自然陰平陽閉精神治否則陽離陰厥精神絶矣金匱真言論曰陰中有陰陽中有陽平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也故人亦應之夫言人之陰陽則外為陽內為陰言人身之陰陽則背為陽腹為陰言人身臟腑中之陰陽則臟者為陰腑者為陽肝心脾肺腎五臟皆為陰膽胃大腸小腸膀胱三焦六腑皆為陽所以欲知陰中之陰陽中之陽者何也為冬病在陰夏病在陽春病在陰秋病在陽皆視其所在為施針石也故背為陽陽中之陽心也背為陽陽中之陰肺也腹為陰陰中之陰腎也腹為陰陰中之陽肝也腹為陰陰中之至陰脾也此皆陰陽表裡內外雌雄相輸應也故以應天之陰陽也此言陰陽之中而又有陰陽者焉可見天人一理相為應孚晝夜臟腑則同矣攝生篇第二上古天真論篇黃帝問於天師曰余聞上古之人春秋皆度百歲而動作不衰今時之人年半百而動作皆衰者時勢異耶人將失之耶岐伯對曰上古之人其知道者法於陰陽和於術數飲食有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲乃去今時之人不然也以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰也夫上古聖人之教下也皆謂之虛邪賊風避之有時恬惔虛無真氣從之精神內守病安從來此言法道清淨精神內守而不妄耗故虛邪不能以為害帝曰余聞上古有真人者提挈天地把握陰陽呼吸精氣獨立守神肌肉若一故能壽敝天地無有終時此其道生中古之時有至人者淳德全道和於陰陽調於四時去世離俗積精全神遊行天地之間視聽八遠之外此蓋益其壽命而強者也亦歸於真人其次有聖人者處天地之和從八風之理適嗜欲於世俗之間無恚嗔之心行不欲離於世被服章三字疑衍舉不欲觀於俗外不勞形於事內無思想之患以恬愈為務以自得為功形體不敝精神不散亦可以百數其次有賢人者法則天地象似日月辨列星辰逆從陰陽分別四時將從上古合同於道亦可使益壽而有極時此言攝養有真人聖人賢人之不同故壽考則因之而有上次中等之異矣帝曰人年老而無子者材力盡耶將天數然耶岐伯曰女子七歲腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下故有子三七腎氣平均故真牙生而長極四七筋骨堅髮長極身體盛壯五七陽明脈衰面始焦發始墮六七三陽脈衰於上面皆焦發始白七七任脈虛太衝脈衰少天癸竭地道不通故形壞而無子也丈夫八歲腎氣實髮長齒更二八腎氣盛天癸至精氣溢瀉陰陽和故能有子三八腎氣平均筋骨徑強故真牙生而長極四八筋骨隆盛肌肉滿壯五八腎氣衰發墮齒稿六八陽氣衰於上面焦髮鬢頒白七八肝氣衰筋不能動天癸竭精少腎臟衰形體皆極八八則齒髮去腎者主水受五臟六腑之精而藏之故五臟盛乃能瀉今五臟皆衰筋骨解墮天癸盡矣故髮鬢白身體重行步不正而無子爾曰其有年已老而有子者何也曰此其天壽過度氣脈常通而腎氣有餘也此雖有子男不過盡八八女不過盡七七而天地之精氣皆竭矣凡老而生子子壽不能過天癸之數此言人稟陰陽之氣盛衰故有常數然而因時保守無妄作勞庶幾可久帝曰夫道者年皆百歲能有子乎岐伯曰夫道者能卻老而全形身年雖壽能生子也四氣調神大論篇曰春三月此謂發陳天地俱生萬物以榮夜臥早起廣步於庭被髮緩形以使志生生而勿殺與而勿奪賞而勿罰此春氣之應養生之道也逆之則傷肝夏為寒變奉長者少夏三月此謂蕃秀天地氣交萬物華實夜臥早起無厭於日使志無怒使華英成秀使氣得泄若所愛在外時惟陽氣宣通發陽在外故所愛亦順之也此夏氣之應養長之道也逆之則傷心秋為痎瘧奉收者少冬至重病秋三月此謂容平天氣以急地氣以明急風急也明氣清也早臥早起與雞俱興使志安寧以緩秋刑收斂神氣使秋氣平無外其志使肺氣清此秋氣之應養收之道也逆之則傷肺冬為飧泄奉藏者少冬三月此為閉藏水冰地坼無擾乎陽早臥晚起必待日光使志苦伏若匿若有私意若已有得若有私意言慎密不出如有私也若已有得雖未得若已得不欲擾冒而紊犯氣志也去寒就溫無泄皮膚使氣亟奪此冬氣之應養藏之道也逆之則傷腎春為痿厥奉生者少夫四時陰陽者萬物之根本也所以聖人春夏養陽秋冬養陰以從其根故與萬物沉浮於長生之門逆其根則伐其本壞其真矣故陰陽四時者萬物之始終也死生之本也逆之則災害生從之則苛疾不起是謂得道道者聖人行之愚者佩之當作悖從陰陽則生逆之則死從之則治逆之則亂反順為逆是謂內格身內陰陽扦格不和是故聖人不治已病治未病不治已亂治未亂此之謂也夫病已成而後藥之亂已成而後治之譬猶渴而穿井鬥而鑄兵不亦晚乎此言當順四時而攝養惟聖人善順之則苛疾不起愚者逆之所以災害生焉可不慎哉生氣通天論曰陰之所生本在五味陰之五宮傷在五味生在五味節也本也宮傷五味失節嗜欲太過之害也下文可見故味過於酸肝氣以津脾氣乃絶味過於咸大骨氣勞短肌心氣抑味過於甘心氣喘滿色黑腎氣不衡衡平也味過於苦脾氣不濡胃氣乃厚味過於辛筋脈沮弛精神乃央是故謹和五味骨正筋柔血氣以流腠理以密如是則氣骨以精謹道如法長有天命此言節五味以調五臟謹如法則亦可以長年陰陽應象論帝曰法陰陽奈何岐伯曰陽勝則身熱腠理閉喘粗為之俯仰汗不出而熱齒乾以煩冤腹滿死能冬不能夏陰勝則身寒汗出身常清數栗而寒寒則厥厥則腹滿死能夏不能冬此陰陽更勝之變病之形能也曰調此二者奈何曰能知七損八益則二者可調不知用此則早衰之節也七損八益之道謂女子二七而天癸至七七而絶男子二八而天精通八八而盡女子以時下月故曰損男子以節而瀉故曰益不知此而早衰也年四十而陰氣自半也起居衰矣年五十體重耳目不聰明矣年六十陰痿氣大衰九竅不利下虛上實涕泣俱出矣故曰知之則強則知七損八益是也不知則老故同出而名異耳智者察同愚者察異愚者不足智者有餘愚不足知有餘有餘則耳目聰明身體輕強老者復壯壯者益治是以聖人為無為之事樂恬惔之能從欲快志於虛無之守故壽命無窮與天地終此聖人之治身也此言人同此生自幼至壯壯而老皆由乎陰陽天癸之始終自然消長之道也知之者謹以節養以順受其正不知者循欲以戕伐其真是以有名之異同也故曰同異病能篇第三至真要大論篇帝曰夫百病之生也皆生於風寒暑濕燥火以之化之變也經言盛者瀉之虛者補之工巧神聖可得聞乎岐伯曰審察病機無失氣宜此之謂也曰願聞病機曰諸風掉眩皆屬於肝諸寒收引皆屬於腎諸氣膹郁皆屬於肺諸濕腫滿皆屬於脾諸熱瞀瘈皆屬於火諸痛瘡癢皆屬於心諸厥固泄皆屬於下諸痿喘嘔皆屬於上諸禁鼓栗如喪神守皆屬於火諸痙項強皆屬於濕諸逆衝上皆屬於火諸腹脹大皆屬於熱諸躁狂越皆屬於火諸暴強直皆屬於風諸病有聲鼓之如鼓皆屬於熱諸病胕腫疼酸驚駭皆屬於火諸轉反戾水液渾濁皆屬於熱諸病水液澄徹清冷皆屬於寒諸嘔吐酸暴注下迫皆屬於熱此言百病皆生於五臟五臟之病又不外乎風寒暑濕燥火之六淫而諸病莫不兼之病機大要實病於此矣故大要曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疏其血氣令其條達而致和平此之謂也此總結上文之意有無求之求其五臟六淫之有無也盛虛責之責其五臟六淫之虛實也如虛則補之實則瀉之五勝五運之勝也風論篇帝曰風之傷人也或為寒熱或為熱中或為寒中或為厲風或為偏枯或為風也或當作均其病各異其名不同或內至五臟六腑不知其解願聞其説岐伯對曰風氣藏於皮膚之間內不得通外不得泄風者善行而數變腠理開則灑然寒閉則熱而悶其寒也則衰飲食其熱也則消肌肉故使人怢栗而不能食名曰寒熱風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道氣道也不利故使肌肉憤䐜而有瘍衛氣有所凝而不行故其肉有不仁也厲者有榮衛熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰厲風此風氣入於經脈之中也榮行脈中故風入脈中與榮氣合則熱而血腐壞也其氣不清言潰亂也然而血脈潰亂榮復挾風陽脈上頭鼻為呼吸之所故鼻柱壞而色為惡皮膚破而潰爛經曰脈風盛為癘潰是也以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以季夏戊己傷於邪者為脾風以秋庚辛中於邪者為肺風以冬壬癸中於邪者為腎風風中五臟六腑之俞亦為臟腑之風各入其門戶所中則為偏風風氣循風府而上則為腦風風入系頭則為目風眼寒飲酒中風則為漏風入房汗出中風則為內風新沐中風則為首風久風入中則為腸風飧泄外在腠理則為泄風故風者百病之長也至其變化乃為他病也無常方然致甲乙經作故字有風氣也帝曰五臟風之形狀不同者何願聞其診及其病能岐伯曰肺風之狀多汗惡風色皏然白時咳短氣晝日則瘥暮則甚診在眉上其色白肺臟有風則眉間皏白色皏薄白肺色薄白時咳短氣晝則陽氣在表故瘥暮則陽氣入里風內應之故甚心風之狀多汗惡風焦絶善怒嚇赤色病甚則言不可快診在口其色赤焦絶謂唇焦而文理斷絶風薄於心則神亂故善怒而嚇人也舌為心之苗故病甚則舌強而言不快也肝風之狀多汗惡風色微蒼嗌乾善怒時憎女子診在目下其色青善怒時憎女子皆木之性曲而又直故也脾風之狀多汗惡風身體怠惰四肢不欲動色薄微黃不嗜食診在鼻上其色黃脾主四肢故不欲動鼻於中而主土故脾候之而色黃也腎風之狀多汗惡風面龐然浮腫脊痛不能正立隱曲不利診在肌上其色黑龐然言腫起也腎脈起於足下上股內後廉貫脊故脊痛不能正立也隱曲者謂隱蔽委曲之處腎風薄精氣內微故隱曲之事不利為也胃風之狀頸多汗惡風飲食不下鬲塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大胃風失衣則外寒而內熱故䐜脹胃合脾而主肉胃氣不足則肉不長故瘦也首風之狀頭面多汗惡風當先風一日則病甚頭痛不可以出內至其風日則病少愈漏風之狀或多汗常不可單衣食則汗出甚則身汗喘息惡風衣常濡口乾善渴不能勞事因醉取風為漏風其狀口乾善渴近衣則身熱如火臨食則汗流如雨骨節懈怠不欲自勞泄風之狀多汗汗出泄衣上口中乾上漬其風不能勞事身體盡痛則寒泄風汗多則津液涸而亡陽故口乾而寒也此為泄風痹論篇帝曰痹之安生岐伯對曰風寒濕三氣雜至合而為痹也其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹也帝曰其有五者何也岐伯曰以冬遇此者為骨痹以春遇此者為筋痹以夏遇此者為脈痹以至陰遇此者為肌痹以秋遇此者為皮痹帝曰內舍五臟六腑何氣使然岐伯曰五臟皆有合病久而不去者內舍於其合也故骨痹不已復感於邪內舍於腎筋痹不已復感於邪內舍於肝脈痹不已復感於邪內舍於心肌痹不已復感於邪內舍於脾皮痹不已復感於邪內舍於肺所謂痹者各以其時重感於風寒濕之氣也凡痹之客五臟者肺痹者煩滿喘嘔心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫厥氣上則恐肝痹者夜臥則驚多飲數小便上為引如懷小便上引而痛如懷孕之狀腎痹者善脹尻以代踵脊以代頭脾痹者四肢懈怠發咳嘔汁上為大塞腸痹者數飲而出不得中氣喘爭時發飧泄胞痹者少腹膀胱按之內痛若沃以湯澀於小便上為清涕以上十二痹證皆風寒濕外邪所傷而致之也邪舍於其臟腑則其臟腑之證見焉治者審之淫氣喘息痹聚在肺淫氣憂思痹聚在心淫氣遺溺痹聚在腎淫氣乏竭痹聚在肝淫氣肌絶痹聚在脾諸痹不已亦益內也此屬內傷外邪合而為痹是也其風勝者其人易已也帝曰痹其時有死者或痛久者或易已者其故何也岐伯曰其入臟者死其留連於筋骨間者疼久其留皮膚間者易已曰其客於六腑何也曰此亦其飲食居處為其病本也四方土地高下溫涼不同物性剛柔飧居亦異經曰水穀之寒熱感則害六腑是也六腑亦各有俞風寒濕氣中其俞而食飲應之循俞而入各舍其腑也曰以針治之奈何曰五臟有俞六腑有合循脈之分各有所發各隨一作治其過則病瘳也曰榮衛之氣亦令人痹乎曰榮者水穀之精氣也調和於五臟灑陳於六腑乃能入於脈也故循脈上下貫五臟絡六腑也衛者水穀之悍氣也其氣慓疾滑利不能入於脈也故循皮膚之中分肉之間熏於肓膜散於胸腹逆其氣則病從其氣則愈不與風寒濕氣合故不為痹帝曰善此言水穀之精沖盛榮衛邪氣自不能入而為害何痹之有帝曰痹或痛或不痛或不仁或寒或熱或燥或濕其故何也岐伯曰痛者寒氣多也有寒故痛也其不痛不仁者病久入深榮衛之行澀經絡時疏故不痛皮膚不榮故為不仁其寒者陽氣少陰氣多與病相益故寒也其熱者陽氣多陰氣少病氣勝陽遭陰故為痹熱其多汗而濡者此其逢濕甚也陽氣少陰氣盛兩氣相感故汗出而濡也曰夫痹之為病不痛何也岐伯曰痹在於骨則重在於脈則血凝而不流在於筋則屈不伸在於肉則不仁在於皮則寒故具此五者則不痛也凡痹之類逢寒則蟲當作急逢熱則縱帝曰善痿論篇帝曰五臟使人痿何也岐伯曰肺主身之皮毛心主身之血脈肝主身之筋膜脾主身之肌肉腎主身之骨髓故肺熱葉焦則皮毛虛弱急薄著則生痿躄也心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地也肝氣熱則膽泄口苦筋膜乾則筋急而攣發為筋痿脾氣熱則胃干而渴肌肉不仁發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿帝曰何以得之岐伯曰肺者藏之長也為心之蓋也有所失亡所求不得則發肺鳴鳴則肺熱葉焦故曰五臟因肺熱葉焦發為痿躄此之謂也五臟之痿皆固肺熱而致之然本臟各有相火而生痿也悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下崩數溲血也故本病曰大經空虛發為肌痹傳為脈痿思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫故下經曰筋痿者生於肝使內也使內謂勞役筋力費竭精氣有漸於濕以水為事若有所留居處相濕肌肉濡潰痹而不仁發為肉痿故下經曰肉痿者得之濕地也有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水藏也今水不勝火則骨枯而髓虛故足不任身發為骨痿故下經曰骨痿者生於大熱也下經古經也帝曰何以別之岐伯曰肺熱者色白而毛敗心熱者色赤而絡脈溢肝熱者色蒼而爪枯脾熱者色黃而肉蠕動腎熱者色黑而齒稿帝曰如夫子言可矣論言治痿者獨取陽明何也岐伯曰陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋陰陽總宗筋之會會於氣街而陽明為之長皆屬於帶脈而絡於督脈故陽明虛則宗筋縱帶脈不引故足痿不用也帝曰治之奈何岐伯曰各補其榮而通其俞調其虛實和其逆順筋脈骨肉各以其時受月則病已矣時受月謂受氣之時月如肝王甲乙心王丙丁之類是也厥論篇帝曰厥之寒熱者何也岐伯曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥陽謂足之三陽脈也陰謂足之三陰脈也帝曰熱厥之為熱也必起於足下者何也岐伯曰陽氣起於足五指之表陰脈者集於足下而聚於足心故陽氣勝則足下熱也曰寒厥之為寒也必從五指而上於膝者何也曰陰氣起於五指之裡集於膝下而聚於膝上故陰氣勝則從五指至膝上寒其寒也不從外皆從內也曰寒厥何失而然也曰前陰者宗筋之所聚太陰陽明之所合也春夏則陽氣多而陰氣少秋冬則陰氣盛而陽氣衰此人者質壯以秋冬奪於所用下氣上爭不能復精氣溢下邪氣因從之而上也氣因於中陽氣衰不能滲營其經絡陽氣日損陰氣獨在故手足為之寒也帝曰熱厥何為而然也岐伯曰酒入於胃則絡脈滿而經脈虛脾主為胃行其津液者也陰氣虛則陽氣入陽氣入則胃不和胃不和則精氣竭精氣竭則不營其四肢也此人必數醉若飽以入房氣聚於脾中不得散酒氣與穀氣相搏熱盛於中故熱遍於身內熱而溺赤也夫酒氣盛而慓悍腎氣日衰陽氣獨勝故手足為之熱也此言寒熱二厥皆損其陽氣竭其精氣之所致也四肢無氣以營乏則為厥逆寒熱雖異虛損則同帝曰厥或令人腹滿或令人暴不知人或至半日遠至一日乃知人者何也岐伯曰陰氣盛於上則下虛下虛則腹脹滿陽氣盛於上則下氣重上而邪氣逆逆則陽氣亂陽氣亂則不知人也帝曰善願聞六經脈之厥狀病能也曰巨陽之厥則腫首頭重足不能行發為眴音縣僕陽明之厥則顛疾欲走呼腹滿不得臥面赤而熱妄見而妄言少陽之厥則暴聾頰腫而熱脅痛胻不可以運太陰之厥則腹滿䐜脹後不利不欲食食則嘔不得臥少陰之厥則口乾溺赤腹滿心痛厥陰之厥則少腹腫痛腹脹涇溺不利好臥屈膝陰縮腫胻內熱盛則瀉之虛則補之不盛不虛以經取之此六經之説厥狀皆有盛衰虛實實則瀉之虛則補之不盛不虛只以本經留呼多少而取之太陰厥逆胻急攣心痛引腹治主病者經脈行有左右候其有過者取之故云治主病者少陰厥逆虛滿嘔變下泄清治主病者厥陰厥逆攣腰痛虛滿前閉譫語治主病者三陰俱逆不得前後使人手足寒三日死太陽厥逆僵仆嘔血善衄治主病者少陽厥逆機關不利者腰不可以行項不可以顧發腸癰不可治驚者死陽明厥逆喘咳身熱善驚衄嘔血手太陰厥逆虛滿而咳善嘔沫治主病者手心主少陰厥逆心痛引喉身熱死不可治手太陽厥逆耳聾泣出項不可以顧腰不可以俯仰治主病者手陽明少陽厥逆發喉痹嗌腫痓治主病者五臟生成論曰臥出則風吹之血凝於膚者為痹凝於脈者為澀凝於足者為厥此三者血行而不得反其空大經隊也故為痹厥也評熱病論篇帝曰有病身熱汗出煩滿煩滿不為汗解此為何病岐伯曰汗出而身熱者風也汗出而煩滿不解者厥也病名曰風厥帝曰願卒聞之岐伯曰巨陽主氣故先受邪少陰與其為表裡也得熱則上從之從之則厥也帝曰治之奈何岐伯曰表裡刺之飲之服湯上從之謂少陰從太陽而上也飲之湯為止逆上之腎氣也熱論篇帝曰今夫熱病者皆傷寒之類也或愈或死其死皆以六七日之間其愈皆以十日以上者何也傷於四時之氣皆能為病以傷寒為毒者最乘殺厲之氣中而即病名曰傷寒不即病者名曰寒毒藏於肌膚至夏至氣變為溫病夏至後變為熱病皆原於傷寒所至故曰熱病者皆傷寒之類也校正按傷寒論變溫變暑與王注異王注本素問為説仲景本陰陽大論為説岐伯曰人之傷於寒也則為病熱熱雖甚不死寒毒薄於肌膚陽氣閉密不得發散而內怫結故傷寒反病熱其兩感於寒而病者必不免於死帝曰願聞其狀岐伯曰傷寒一日巨陽受之巨陽者諸陽之屬也其脈連於風府穴名故為諸陽主氣也故頭項痛腰脊強二日陽明受之陽明主肉其脈挾鼻絡於目故身熱目疼而鼻乾不得臥也三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾三陽經絡皆受其病而未入於臟者故可汗而已四日太陰受之太陰脈布胃中絡於嗌故腹滿而嗌乾五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮曰治之奈何岐伯曰治之各通其臟脈病日衰已矣其未滿三日可汗而已其滿三日可泄而已其病兩感於寒者一日則巨陽與少陰俱病則頭痛口乾而煩滿二日則陽明與太陰俱病則腹滿身熱不欲食譫言三日則少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人六日死六日當作三日下文可見三陰三陽五臟六腑皆受病榮衛不行五臟不通則死矣帝曰五臟已傷六腑不通榮衛不行如是之後三日乃死何也岐伯曰陽明者十二經脈之長也其血氣盛故不知人三日其氣乃盡故死矣此言兩感於寒者邪氣悍暴之甚必死其不兩感於寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而嚏十二日厥陰病衰囊縱少腹微下大氣大邪氣也皆去病日已矣此言不兩感者六日之後邪氣從始次第而自退病日愈帝曰熱病已愈時有所遺者何也所遺邪氣未盡去也曰諸遺者熱甚而強食之故有所遺也若此者皆病已衰而熱有所藏因其穀氣相搏兩熱相合故有所遺也曰治遺奈何曰視其虛實調其逆從可使必已曰病熱當何禁之曰病熱少愈食肉則復多食則遺此其禁也此言遺禁者皆病愈不知禁謹而復作熱故曰遺也凡病傷寒而成瘟者先夏至日者為病瘟後夏至日者為病暑暑當與汗皆出勿止評熱論篇帝曰有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何岐伯曰病名陰陽交交者死也人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪卻而精勝也精勝當能食而不復熱復熱者邪氣也汗者精氣也今汗已出而輒復熱者是邪勝也不能食者精無裨也病而留者其壽可立而傾也且夫熱論曰汗出而脈尚躁盛者死今脈不與汗相應此不勝其病也其死明矣狂言者是失志失志者死今見三死不見一生雖愈必死也汗出脈躁不勝其病狂言失志此三死也烏能生瘧論篇帝曰夫痎瘧皆生於風其蓄作有時者何也岐伯曰瘧之始發也先起於毫毛伸欠乃作寒栗鼓頷腰脊俱痛寒去則內外皆熱頭痛如破渴欲冷飲此論瘧病之形狀也下皆發明此節之意帝曰何氣使然岐伯曰陰陽上下交爭虛實更作陰陽相移也陽並於陰陽兼瘧邪而言謂瘧邪隨陽氣而入於陰分則陰實而陽虛陽明虛則寒栗鼓頷也巨陽虛則腰背頭項痛三陽俱虛則陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒陽盛則外熱陰虛則內熱內外皆熱則喘而渴故欲冷飲也此釋上文陰陽交爭隨經而作寒熱也此皆得之夏傷於暑熱氣盛藏於皮膚之內腸胃之外此榮氣之所舍也舍猶居也此令人汗空疏腠理開因得秋氣汗出遇風及得之以浴水氣舍於皮膚之內與衛氣並居衛氣者晝日行於陽夜行於陰此氣得陽而外出得陰而內薄內外相搏是以日作曰其間日而作者何也曰其氣之舍深內薄於陰陽氣獨發陰邪指瘧邪內著陰與陽爭不得出是以間日而作也夫瘧氣者並於陽則陽勝並於陰則陰勝陰勝則寒陽勝則熱瘧者風寒之氣不常也病極則復曰瘧先寒而後熱者何也曰夏傷於大暑其汗大出腠理開發因遇夏氣淒滄之水寒藏於腠理皮膚之中秋傷於風則病成矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧曰先熱而後寒者何也曰此先傷於風而後傷於寒故先熱而後寒也亦以時作名曰溫瘧其但熱而不寒者陰氣先絶陽氣獨發則少氣煩冤手足熱而欲嘔名曰疸瘧此瘧寒熱所因至此乃言瘧有數種也帝曰夫瘧之寒湯火不能溫也及其熱冰水不能寒也此皆有餘不足之類當此之時良工不能止必須其自衰乃刺之其故何也曰經言無刺熇熇之熱無刺渾渾之脈無刺漉漉之汗漉漉汗大出也故為其病逆未可治也故經曰方其盛時必毀因其衰也事必大昌此之謂也夫瘧之始發也陽氣並於陰當是之時陽虛而陰盛外無氣故先寒栗也陰氣逆極則復出之陽陽與陰復並於外則陰虛而陽實故先熱而渴夫瘧之未發也陰未並陽陽未並陰因而調之真氣得安邪氣乃亡故工不能治其已發為其氣逆也曰攻之奈何曰瘧之且發也陰陽之且移也必從四末始也陽已傷陰從之故先其時堅束其處令邪氣不得入陰氣不得出審候見之在孫絡盛堅而血者皆取之此直往而未得並者四末言四肢也此言牢縛四肢令氣各在其處則邪所居處必自見之則剌出血耳帝曰瘧不發其應何如岐伯曰瘧氣者必更盛更虛當氣之所在也病在陽則熱而脈躁在陰則寒而脈靜極則陰陽俱衰衛氣相離故病得休衛氣集則復病也離謂不相爭集謂邪相會瘧者陰陽更勝也或甚或不甚故或渴或不渴論曰夏傷於暑秋必病瘧今瘧不必應者何也曰此應四時者也其病異形者反四時也其以秋病者寒甚以冬病者寒不甚以春病者惡風以夏病者多汗曰夫病溫瘧與寒瘧而皆安舍舍於何臟曰溫瘧得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外也如是者陰虛而陽盛則熱矣衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧帝曰疸瘧何如曰疸瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因其所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不及於陰故但熱而不寒氣內藏於心而外舍於分肉之間令人消爍脫肉故命曰疸瘧至真要大論篇帝曰火熱復惡寒發熱有如瘧狀或一日發或間數日發其故何也曰勝復之氣會遇之時有多少也陰氣多而陽氣少則其發日遠陽氣多而陰氣少則其發日近此勝復相搏盛衰之節瘧亦同法陰陽齊等則一日之中寒熱相半陽多陰少則一日之發但熱不寒陽少陰多則隔日發先寒後熱雖勝復之氣若氣微則一發之後六七日乃發故云愈而復發或頻三日發而六七日止或隔十日發而四五日止者皆由氣之多少會遇與不會遇也俗謂鬼柙暴疾而從祈禱避匿者病勢已過旋至於斃自謂其分寧不傷乎習俗既久卒難離革悲哉奈何咳論篇帝曰肺之令人咳何也岐伯曰五臟六腑皆令人咳非獨肺也曰願聞其狀曰皮毛者肺之合也皮毛先受邪氣邪氣以從其合也邪氣謂寒邪也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則內外合邪因而客之則為肺咳五臟各以其時受病非其時各傳以與之此言五臟受病之由各以其時謂旺月也若非旺月則不受邪故各傳以與之是也人與天地相參故五臟各以治時感於寒則受病微則為咳甚則為泄為痛乘秋則肺先受邪乘春則肝先受邪乘夏則心先受邪乘至陰則脾先受邪乘冬則腎先受之曰何以異之異分別也曰肺咳之狀咳而喘息有音甚則唾血心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹肝咳之狀咳則兩脅下痛甚則不可轉轉則兩胠下滿胠亦脅也脾咳之狀咳則右胠下痛陰陰引肩背甚則不可以動動則咳劇腎咳之狀咳則腰背相引而痛甚則咳涎曰六腑之咳奈何曰五臟之久咳乃移於六腑脾咳不已則胃受之胃咳之狀咳咳而嘔嘔甚則長蟲出肝咳不已則膽受之膽咳之狀嘔膽汁肺咳不已則大腸受之大腸咳狀咳而遺失心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失腎咳不已則膀胱受之膀胱咳狀咳而遺溺久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也通結上文曰治之奈何曰治臟者治其俞治腑者治其合浮腫者治其經此總結一篇之義也舉痛論篇帝曰余聞善言天者必有驗於人善言古者必有驗於今善言人者必有厭於已如此則道不惑前要數極所謂明也今豫問於夫子令言而可知視而可見捫而可得今驗於已如發蒙解惑可得聞乎岐伯再拜而對曰何道之問也發問甚大而此只及五臟卒痛甚不可曉帝曰願聞人之五臟卒痛何氣使然岐伯曰經脈流行不止環周不休寒氣入經而稽遲澀而不行客於脈外則血少客於脈中則氣不通故卒然而痛曰其痛或卒然而止者或痛甚不休者或痛甚不可按者或按之而痛止者或按之無益者或喘動應手者或心與背相引而痛者或脅肋與少腹相引痛者或腹痛引陰股者或痛夙昔而成積者或卒然痛死不知人少間復生者或痛而嘔者或腹痛而後泄者或痛而閉不通者凡此諸痛各不同形別之奈何曰寒氣客於脈外則脈寒脈寒則縮蜷縮蜷則脈絀急絀急則外引小絡故卒然而痛得炅則痛立止因重中於寒則痛久矣寒氣客於經脈之中與炅氣相搏則脈滿滿則痛而不可按也此當作痛甚不休也寒氣稽留炅氣上從則脈充大而血氣亂故痛甚不可按也寒氣客於腸胃之間膜原之下血不能散小絡急引故痛按之則血氣散故按之痛止寒氣客於俠脊之脈則深按之不能及故按之無益也寒氣客於衝脈衝脈起於關元隨腹直上寒氣客則脈不通脈不通則氣因之故喘動應手矣寒氣客於背俞之脈則血脈澀脈澀則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至熱氣至則痛止矣寒氣客於厥陰之脈厥陰之脈者絡陰器繫於肝寒氣客於脈中則血澀脈急故脅肋與少腹相弓痛矣厥氣客於陰股寒氣上及少腹血澀在下相引故腹痛引陰股寒氣客於小腸膜原之間絡血之中血澀不得注於大經血氣稽留不得行故夙昔而成積矣寒氣客於五臟厥逆上瀉陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣寒氣客於腸胃厥逆上出故痛而嘔也寒氣客於小腸不得成聚故後泄腹痛矣熱氣留於小腸腸中痛疸熱焦渴則堅幹不得出故痛而閉不通矣帝曰所謂言而可知者也視而可見奈何曰五臟六腑固盡有部視其五色黃赤為熱白為寒青黑為痛此所謂視而可見者也曰捫而可得奈何曰視其主病之脈堅而血及陷下者皆可捫而得者也生氣通天論篇帝曰夫自古通天者生之本本於陰陽天地之間六合之內其氣九州九竅五臟十二節皆通乎天氣其生五其氣三數犯此者則邪氣傷人此壽命之本也支氏曰人不知節欲而數犯傷其正氣則邪氣乘正氣之虛而入為害也故曰邪氣傷人王注直云邪氣傷正氣而不先言耗損之由則邪何從而入也蒼天之氣清冷則志意治順之則陽氣固雖有賊邪弗能害也此因時之序故聖人傳精神服天氣而通神明失之則內閉九竅外壅肌肉衛氣散解此謂自傷氣之削也陽氣者若天與日失其所則折壽而不彰故天運當以日光明是故陽因而上衛外者也因於寒欲如運樞起居如驚神氣乃浮因於暑汗煩則喘喝大聲也靜則多言體若燔炭汗出而散病因於暑則當汗泄不為發表邪熱內攻中外俱熱故煩躁喘數大呵而出其聲也因於濕首如裹濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿因於氣為腫四維相代陽氣乃竭濕氣熏蒸清道不利故首如有物蒙之若裹也熱傷血不能養筋致為拘攣濕傷筋不能束骨故為痿弱濕熱甚以致正氣不宣通故四維發腫諸陽受氣於四肢也今人見膝間關節腫痛便作風治者誤矣陽氣者煩勞則張精絶闢積於夏使人煎厥煎迫而成厥逆目盲不可以視耳閉不可以聽潰潰乎若壞都汩汩乎不可止陽氣煩勞則主陰絶闢積不已至夏火愈亢而時若煎迫而氣逆上火既亢上則目盲耳閉精敗神去如潰散之壞都所儲之水散流而不可遏矣病而至此為壞極矣陽氣者大怒則形氣絶而血菀於上使人薄厥有傷於筋縱其若不容怒則氣上血隨積焉陰陽相搏氣血奔並因薄厥生菀陳積也薄迫也怒氣傷於筋則為痿而不維持也故曰縱其若不容汗出偏沮使人偏枯身常偏汗出者久久而成偏枯汗出見濕乃生痱痤陽氣發泄寒水制之熱鬱皮膚則為瘡痱膏粱之變足生大疔膏粱厚味內多滯熱皮厚肉疏故內變為疔足多也勞汗當風寒薄為皶郁乃痱此陽為陰遏而不通暢故迫為皶粉刺也輕為痱痤陽氣者精則養神柔則養筋開闔不得寒氣從之乃生大僂陷脈為痿留連肉腠內精微以養神外柔和以養筋開闔失宜為寒所襲則筋絡拘耎形容僂俯矣寒氣下陷於脈中則為痿留連於肉腠而不舒營氣不從逆於肉理乃生癰腫營氣不順血鬱肌肉故成癰腫魄汗未盡形弱而氣爍穴俞以閉發為風瘧汗出未止形弱氣消風寒薄之穴俞隨閉熱藏不出以至秋陽復收兩熱相合寒熱相移以所起為風故為風瘧風者百病之始也清淨則肉腠閉拒雖有大風苛毒弗之能害起居有度不妄作勞是為清淨真氣內固故皮腠閉密雖有大風苛毒弗能傷害也病久則傳化上下不並良醫弗為病久上下不通則陰陽否隔良醫妙法莫能為何也陽蓄積病死而陽氣當隔隔者當瀉三陽蓄積不通不急瀉之則死風客淫氣精乃亡邪傷肝也淫氣甚而風客之則傷精邪氣傷於肝為本經也因而飽食筋脈橫解腸澼為痔因而大飲則氣逆因而強力腎氣乃傷高骨乃壞食甚飽則腸胃橫滿而筋脈解故有腸澼為痔之患大飲甚則肺氣逆而上奔強力入房則腎氣傷高骨壞而不為用高骨謂腰之高骨春傷於風邪氣留連乃為洞泄夏傷於暑秋為痎瘧秋傷於濕上逆為咳發為痿厥冬傷於寒春必病瘟四時之氣更傷五臟陰陽應象篇曰春傷於風夏生飧泄夏傷於暑秋必痎瘧秋傷於濕冬生咳嗽冬傷於寒春必病瘟二論大同王安道云此四章諸家注釋多戾經旨蓋非有四傷一定之説原其病之根因有此耳其氣盛者有傷之而過後消散不作者及過後作者其為各時一病而治各有方又不必拘定前之傷也成無己王海藏之注皆推求過極陰陽應象論曰寒傷形熱傷氣氣傷痛形傷腫故先痛而後腫者氣傷形也先腫而後痛者形傷氣也風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡泄天有四時五行以生長收藏以生寒暑燥濕風人有五臟化五氣以生喜怒悲憂恐故喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽厥氣上行滿脈去形喜怒不節寒暑過度生乃不固此言天以五行以應人之五志善攝養者得其中和不善節者生乃不固脈要精微篇曰風成為寒熱經曰因於露風乃生寒熱疸成為消中疸濕熱也濕熱內積故為消中王注善食而瘦乃食㑊也厥成為顛疾厥氣逆也氣逆上則為顛久風為飧泄即春傷於風夏生飧泄此其候者也脈風成為癘經曰風寒客於脈而不去名癘脈要精微篇曰五臟者中之守也中盛臟滿氣勝傷恐聲如從室中言是中氣之濕也腹中氣盛肺臟滿變傷於恐聲如在室腹中有濕氣也言而微終日乃復言者此奪氣也言微聲低不能相續乃奪氣不足然也衣被不斂言語善惡不避親疏者此神明之亂也此心火熾甚而神志昏亂故不知其親疏也倉廩不藏者是門戶不要也倉廩為脾胃門戶為魄門即肛門也不藏不要皆不得其正不禁固而時瀉也水泉不止者是膀胱不藏也小便流注而不度是也得守者生失守者死總結上文兩節之意以起下文五臟者身之強也頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂附一作俯筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣五臟者身之強也今若所言皆失強也蓋五臟之氣內屬本臟外循各經故為守為強有如是者下文云得強者生失強者死總結上文之義玉機真藏篇曰大骨枯稿大肉陷下胸中氣滿喘息不便其氣動形期六月死真藏脈見乃豫之期日肺司治節氣息由之其氣動形為無氣相接故聳舉肩背以遠求報氣矣夫如是皆形臟已敗神臟亦傷見是證者則後一百八十日內死矣見真臟之脈候乃與死日之期矣此肺之臟也大骨枯稿大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破䐃真藏見十月之內死此脾臟之病也真臟見十月之內死恐當作真臟未見故遠至十月方死䐃肉之標肘膝後內如塊者陰氣微弱陽氣內燔故身熱也脾主肉故肉如脫䐃如破敗也大骨枯稿大肉陷下肩髓內消缺盆深陷動作益衰真藏未見期一歲死見其真藏乃豫之期日此腎之臟也大骨枯稿大肉陷下胸中氣滿喘息不便內痛引肩項期一月死真藏見乃豫之期日此心之臟也大骨枯稿大肉陷下胸中氣滿喘息不便腹內痛肩項身熱破䐃脫肉目匡陷真藏見目不見人立死其見入者至其所不勝之期則死此肝臟病故目陷也不勝之時謂庚辛也帝曰願聞虛實以決死生岐伯對曰五實死五虛死脈盛心也皮熱肺也腹脹脾也前後不通腎也悶瞀肝也此謂五實此五實為五臟邪氣之實脈細心也皮寒肺也氣少肝也泄利前後腎也飲食不下脾也此謂五虛此五虛為五臟真氣不足也帝曰其時有生者何也岐伯曰漿粥入胃泄注止則虛者活身汗得後利則實者活此其候也五虛五實得此二者則生無此二者其死必也五臟生成論曰頭痛顛疾下虛上實過在足少陰巨陽甚則入腎徇蒙招尤膀胱脈從顛絡腦俠脊抵腰中循膂絡腎屬膀胱然腎虛不能引巨陽之氣故頭痛而為上顛之疾也經病甚則入於臟徇當作眴蒙招搖眴蒙謂目瞬動而矇昧下文之目冥是也招搖謂頭振掉不定也目冥耳聾下實上虛過在足少陽厥陰甚則入肝腹滿䐜脹支膈胠脅胠脅上也支執持也胸膈胠脅皆不執持不利也肝膽之經也下厥上冒謂氣逆上而冒於目過在足太陰陽明咳嗽上氣厥在胸中過在手陽明太陰此咳嗽上氣厥逆之病在於胸中也心煩頭痛病在鬲中過在手巨陽少陰此相火為病熱在膈而心煩上行而頭痛陽明脈解篇帝曰足陽明之脈病惡人與火聞木音則惕然而驚鐘鼓不為動聞木音而驚者何也岐伯對曰陽明者胃脈也胃者十也故聞木音而驚者土惡木也曰其惡火何也曰陽明主肉其脈血氣盛邪客之則熱熱則惡火曰其惡人何也曰陽明厥則喘而惋惋然郁內也惋則惡人惡人作煩也曰或喘而死者或喘而生者何也曰厥逆連臟則死連經則生厥連於經脈者易愈連於臟者則神去而死也帝曰病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上之處皆非其素能也病反能者何也曰四肢者諸陽之本也陽受氣於其四肢之故也陽盛則四肢實實則能登高也曰其棄衣而走者何也曰熱盛於身故棄衣而欲走也曰其妄言罵詈不避親疏而歌者何也曰陽盛則使人妄言罵詈不避親疏而不欲食不欲食故妄走也陰陽別論篇曰二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治汪氏質疑注此言陽明燥金之氣為病也心以燥血不能生而榮於百脈脾以燥弱不能衛津液而潤於四肢則筋脈無所滋養故肢體為之徑急而不能伸曲也在於女子則月經不利此燥之至也燥立傳變亦終歸其所主故燥甚則風熱上攻於肺而為消渴東垣云上消者多飲水而少食主於肺是也其或津液生痰而不生血痰積肺中有時孤陽泛上則痰隨之賁上而喘急大作孤陽降下則痰隨墜而喘急憩息斯皆燥其不治之驗王注以大腸胃四經混説強謂以男子少精牽扯曲説愈講愈繁而不通矣三陽為病發寒熱下為癰腫及為痿厥腨痛其傳為索澤其傳為頽疝三陽為太陽寒氣鬱而不散則發寒熱久之為癰腫如流注之疾痿厥足冷無力悁痠疼也索澤潤澤之氣消索也頽疝即睪垂縱緩內作頽疝也一陽發病少氣善咳善泄其傳為心掣其傳為鬲此少陽相火為病壯火食氣故少氣火爍肺金則善咳火入於心故掣三焦內結故隔塞不通皆火之過二陽一陰發病主驚駭咳背痛善噫善欠名曰風厥此肝經風燥為病故驚咳噫欠為風厥二陰一陽發病善脹心滿善氣君相二火之病故善脹滿經曰諸腹脹大皆屬於熱三陽三陰發病為偏枯痿易四肢不舉此寒濕二氣合病寒濕之邪滯於經絡則血氣不周蔭於肢體故偏枯痿易四肢不舉之證作矣陰結者便血一升陰主血故再結二升二盛三結三升陰陽結斜多陰小陽曰石水少腹腫經曰三陰獨至期於石水為腹堅如石而水腫也二陽結謂之消陽明熱結故善消水穀三陽結謂之鬲太陽寒水凝蓄胸膈則嗝其飲食犯寒而吐逆亦然三陰結謂之水太陰濕土人感之內聚於脾不能散布積於腹而為水腫其或溢於四肢而為水腫之類是也一陰一陽結謂之喉痹此少陽相火與厥陰風木相扇而為病也風火俱陽邪陽邪從類而上攻故為喉痹之病治以薄荷荊芥以去風生甘草桔梗玄參黃芩之類以泄火是也陰搏陽別謂之有子陰脈中有陽之別如尺脈搏手與寸口殊別則為有孕今診尺脈滑利是也陽加於陰謂之汗陽氣上搏則蒸而為汗是也陰陽虛腸闢死闢利也胃氣不留腸開不禁此陽氣竭絶故死陰虛陽搏謂之崩陰脈不足陽脈盛搏則內崩而血下流此陰中附火然也經脈別論帝曰人之居處動靜勇怯脈亦為之變乎岐伯對曰凡人之驚恐恚勞動靜皆為變也是以夜行則喘出於腎淫氣病肺有所墮恐喘出於肝淫氣害脾有所驚恐喘出於肺淫氣傷心渡水跌僕喘出於腎與骨當是之時勇者氣行則已怯者著而為病此言病之變而淫氣於別臟勇壯者不能淫怯弱者則受害也飲食飽甚汗出於胃驚而奪精汗出於心持重遠行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾故春秋冬夏四時陰陽生病起於過用此為常也不適其性而強云為過則病生此理之常也皮部論曰百病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳入於經留而不去傳入於腑廩於腸胃邪之始入於皮也淅然起毫毛開腠理其入於絡也則絡脈盛色變其入客於經也則感虛乃陷下其留於筋骨之間寒多則筋攣骨痛熱多則筋弛骨消肉爍䐃破毛直而敗此言病始於皮毛不愈而漸入於筋骨間有寒熱之易也逆調論帝曰人有逆氣不得臥而息有音者有不得臥而息無音者有起居如故而息有音者有得臥行而喘者有不得臥不能行而喘者有不得臥而喘者皆何臟使然以上六問而下止三答亦脫簡也岐伯對曰不得臥而息有音者是陽明之逆也足三陽者下行今逆而上行故息有音也陽明者胃脈也胃者六腑之海水穀海也其氣亦下行陽明逆不得從其道故不得臥也下經上古經也曰胃不和則臥不安此之謂也夫起居如故而息有音者此肺之絡脈逆也絡脈不得隨經上下故留經而不行絡脈之病人也微故起居如故而息有音者也夫不得臥臥則喘者是水氣之客也夫水者循津液而流也腎者水藏主津液主臥與喘也病能篇帝曰人之不得偃臥者何也偃仰也岐伯對曰肺者藏之蓋也肺氣盛則脈大脈大則不得偃臥帝曰人有臥而有所不能安者何也岐伯曰藏有所傷及精有所寄則不安故人不能懸其病也五臟有傷精氣有所之寄故臥不安人不能懸其病於空中也評熱篇帝曰有病腎風者面胕痝然壅害於言可刺否痝然腫起貌壅為目下壅如臥蠶腎脈入肺中循喉嚨挾舌本故妨害於言語岐伯對曰虛不當刺不當刺而刺後五日其氣必至至謂臟氣未至也此言腎虛真氣不足不可刺故五臟五日一至循至腎臟而邪氣至也曰其至何如曰至必少氣時熱時熱從胸背上至頭汗出手熱口乾善渴小便黃目下腫腹中鳴身重難以行月事不來煩而不能食不能正偃正偃則咳病名曰風水帝曰願聞其説岐伯曰邪之所湊其氣必虛陰虛者陽必湊之故少氣時熱而汗出也小便黃者少腹中有熱也不能正偃者胃中不和也正偃則咳其上迫肺也諸有水氣者微腫先見於目下也其氣上逆故口苦舌乾臥不得正偃正偃則咳出清水也諸水病者故不能臥臥則驚驚則咳甚也腹中鳴者病本於胃也薄脾則煩不能食食不能下者胃脘鬲也身重難以行者胃脈在足也月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也此腎氣不足之至悉皆小陰經之病水不勝火故其病然也水熱穴論帝曰少陰何以主腎腎何以主水岐伯對曰腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其末在肺皆積水也曰腎何以能聚水而生病曰腎者胃之關也關門不利故聚水而從其類也關者所以司出入也腎主下焦膀胱為腑主其分注關竅二陰故腎氣化則二陰通二陰閉則胃䐜滿故云腎者胃之關也關閉則水積水積則氣停氣停則水生水積則氣溢氣水同類故云關閉不利聚水而從其類也經曰下焦溢為水此之謂也上下溢於皮膚故為胕腫胕腫者聚水而生病也曰諸水皆生於腎乎曰腎者牝藏也地氣上者屬於腎而生水液也故曰至陰勇而勞其則腎汗出腎汗出逢於風內不得入於臟腑外不得越於皮膚客於玄府行於皮里傳為胕腫本之於腎名曰風水風客玄府汗未出內伏皮膚傳化為水從風而水故名風水所謂玄府者汗空也故水病下為胕腫大腹上為喘呼不得臥者標本俱病故肺為喘呼腎為水腫肺為逆不得臥分為相輸俱受者水氣之所留也此雖腎肺二臟之病要皆水氣所留也平人氣象論曰頸脈動喘疾咳曰水頸脈為耳下及結喉兩旁人迎脈也水氣上溢則肺被熱熏陽氣上逆故頸脈鼓盛而咳喘也目裹微腫如臥蠶之狀曰水溺黃赤安臥者曰黃疸正理論云腎勞胞熱溺黃安臥謂之勞疸以女勞得之也食已如飢者曰胃疸胃熱則消穀故食已如飢面腫曰風風從上行故面腫者曰風足脛腫曰水下焦有水則足脛腫也目黃曰黃疸火氣上蒸故目黃靈樞曰目黃者病在胸逆調篇帝曰人身非常溫也非常熱也為之熱而煩滿者何也岐伯對曰陰氣少而陽氣勝故熱而煩滿也曰人身非衣寒也中非有寒氣也寒從中生何也曰是人多痹氣也陽氣少陰氣多故身寒如從水中出此言寒氣陰寒之為非衣之寒而中寒也帝曰人有四肢熱逢風寒如炙如火者何也曰是人者陰氣虛陽氣盛四肢者陽也兩陽相得而陰氣虛少小水不能滅盛火也而陽獨治獨治者不能生長也獨勝而止耳治者王也勝者盛也獨勝謂陰獨盛而火止滅也逢風而如炙如火者是人當肉爍也爍消也曰人有身寒湯火不能熱厚衣不能溫然不凍栗是為何病曰是人者素腎氣勝以水為事太陽氣衰腎脂枯不長一水不能勝兩火腎者水也而生於骨腎不生則髓不能滿故寒甚至骨也所以不能凍栗者肝一陽也心二陽也腎孤藏也一水不能勝二火故不能凍栗病名曰骨痹是人當攣節也腎不生水則髓不滿而筋骨幹稿所以當攣節也是矣通評虛實篇帝曰腸澼便血何如岐伯曰身熱則死寒則生曰腸澼下白沫何如曰脈沉則生脈浮則死陰病見陽脈如相反故死曰腸澼下膿血何如曰脈懸絶則死滑大則生曰腸澼之屬身不熱脈不懸絶何如曰滑大者生懸澀者死以藏期之肝見庚辛死心見壬癸死之類曰巔疾何如曰脈搏大滑久自已脈小堅急死不治曰巔疾之脈虛實何如曰虛則可治實則死巔疾之脈虛則可治實則死似與搏而滑大相反搏而滑非實也正滑泛而躍也故自已曰消痹虛實何如曰脈實大病久可治脈懸小堅病久不可治消瘦也痹勞熱也瘦熱病久脈當微弱者生茲為實大者可治似相反也愚謂當時傳刻者之誤耳凡治消疸僕擊偏枯痿厥氣滿發逆肥貴人則膏粱之疾也隔塞閉絶上下不通則暴憂之病也暴厥耳聾偏閉塞不通內氣暴薄也不從內外中風之病故瘦留著也此言消疸僕擊偏枯之疾非內外中風之變證乃膏粱暴憂內氣暴薄不得宣通故二便閉塞廋匿留著而不去也廋匿也跖跛寒風濕之病也跖足也跛不能履也此則風寒濕之病也黃疸暴病癲疾厥狂久逆之所生也氣久厥逆而不下行怫積上焦故為黃疸及厥狂之疾作也五臟不平六腑閉塞之所生也六腑不通則五臟之氣壅滯不平大便閉則肺氣喘逆之類是也頭痛耳鳴九竅不利腸胃之所生也此亦六腑閉塞之餘意六腑為腸胃最要腸胃結滯則氣不流通氣不流通則逆上而為頭痛耳鳴者矣腹中論篇帝曰有病心腹滿旦食則不能暮食此為何病岐伯對曰名為鼓脹曰治之奈何曰治之以雞矢醴一劑知二劑已曰其時有復發者何也曰飲食不節故時有病也雖然其病且已時故當病氣聚於腹也曰有病胸脅支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名為何何以得之曰病名血枯此得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也曰治之奈何曰以四烏鰂骨一䕡茹二物併合之丸以雀卵大如小豆以五丸為後飯飲以鮑魚汁利腸中及傷肝也按烏鰂骨䕡茹鮑魚汁皆攻積血散惡血雀卵治陰痿起陰之藥並非生血治血枯劑學者詳之曰病有少腹盛上下左右皆有根此為何病可治否曰病名伏梁曰何因而得之曰裹大膿血居腸胃之外不可治治之每切按之致死曰何以然曰此下則因陰必下膿血上則迫胃脘上鬲挾胃脘內癰此久病也難治居臍上為逆居臍下為從勿動亟奪此伏梁衝脈之為病以其裹大膿血居腸胃之外上行循腹下行絡陰上則迫近於胃脘下則因薄於陰器若因薄於陰則便下膿血若迫近於胃則病氣上出於鬲復俠胃脘內長其癰也所以然者以本有大膿血在腸胃之外故也久則難治居臍上為近心故為逆居臍下為遠心故為從亟數也奪去也言其不可移動但數數去之斯可矣曰人有身體髀股胻皆腫環臍而痛是為何病曰病名伏梁此風根也其氣溢於大腸而著於肓肓之原在臍下故環臍而痛也不可動之動之為水溺澀之病此亦衝脈之病所以髀股胻皆腫亦名伏梁其氣溢於大腹著肓之原故環臍而痛不可動謂不可用大毒之藥擊動而峻下之則為水而溺澀也病能篇帝曰人病胃脘癰者診當何如岐伯對曰診此者當候胃脈其脈當沉細沉細者氣逆逆者人迎甚盛盛則熱人迎者胃脈也逆而盛則熱聚於胃口而不行故胃脘為癰也此言胃癰病胃脈不常沉細胃脈細故人迎脈大人迎結喉兩旁之動脈也人迎大則熱聚於胃口故成胃脘癰由氣逆熱盛而致之也曰有病頸癰者或石治之或針灸治之而皆已其真安在曰此名同異等者也夫癰氣之息者宜以針開除去之夫氣盛血聚者宜石而瀉之此所謂同病異治也此言癰雖同而治異也癰為氣之息故氣盛血聚宜用砭石針之瀉去惡血而自愈今用排針者是也帝曰有病怒狂者此病安生曰生於陽也曰陽何以使人狂曰陽氣者因暴折而難決故善怒也病名曰陽厥曰何以知之曰陽明者常動巨陽少陽不動不動而動大疾此其候也陽脈動則人迎脈常動者也巨陽脈在天容位分少陽脈在天窗位分二脈不常動而反動故病也曰治之奈何曰奪其食則已夫食入於陰長氣於陽故奪其食則已食少則氣衰故節去其食則病自已使之服以生鐵洛為飲則鐵漿也夫生鐵洛者下氣疾也氣上逆則狂飲鐵洛所以下其逆上之氣也曰有疾身熱解墮汗出如浴惡風少氣此為何病曰病名曰酒風曰治之奈何曰以澤瀉術各十分麋銜五分合以三指撮為後飯澤瀉去風濕益氣術止汗去火風麋銜治風濕筋痿後飯藥先食後故曰後飯奇病篇帝曰病脅下滿氣逆二三歲不已是為何病岐伯對曰病名曰息積此不妨於食不可灸刺積為導引服藥藥不能獨治也氣逆息難故曰息積氣不在胃故不妨食灸則火邪內攻刺則正氣外瀉故皆不可惟宜積為導引而氣流行兼藥治則可矣若不導引只以藥攻亦難治也帝曰人有病頭痛以數歲不已此安得之名為何病岐伯曰當有所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛病名曰厥逆帝曰善此寒邪客逆久而不散故為厥逆頭痛也帝曰有病口甘者病名為何何以得之曰此五氣之溢也名曰脾疸疸熱也夫五味入口藏於胃脾為之行其精氣津液在脾故令人口甘也此肥美之所發也此人必數食甘美而多肥也肥者令人內熱甘者令人中滿故其氣上溢轉為消渴治之以蘭除陳氣也食甘肥則內熱鬱積而不外泄令人中滿氣上溢為消渴治之以蘭草蘭辛能發散陳久肥甘不化之氣故曰以蘭除陳氣也曰有病口苦者病名為何何以得之曰病名膽疸膽汁味苦故口苦夫肝者中之將也取決於膽咽為之使此人者數謀慮不決故膽虛氣上溢而口為之苦治之以膽募俞肝者將軍之官謀慮出焉膽者中正之官決斷出焉咽為之使恐咽字之誤也常作因為之使故膽虛氣上溢而口苦也胸腹曰募背脊曰俞膽募則在期門下五分俞在脊第十椎下兩旁各開一寸半支秉中曰膽上溢入咽故口苦咽為使是也金匱真言論曰春氣者病在頭夏氣者病在臟秋氣者病在肩背冬氣者病在四肢故春善病鼽衄仲夏善病胸脅長夏善病洞瀉寒中秋善病風瘧冬善病痹厥此四時不節而各致其病也故下云能節養者皆不病也故冬不按蹺春不鼽衄春不病頸項仲夏不病胸脅長夏不病洞瀉寒中秋不病風瘧冬不病痹厥此言冬不按蹺則四時不能為病也何也冬乃藏精祕密若冬按蹺則精不能藏而致四時病夫精者身之本也故藏於精者春不病溫夏暑汗不出者秋成風瘧五臟生成篇曰諸脈者皆屬於目諸髓者皆屬於腦諸筋者皆屬於節諸血者皆屬於心諸氣者皆屬於肺故人臥則血歸於肝肝受血而能視足受血而能步掌受血而能握指受血而能攝血氣者人之神故受血者皆能神於運用宣明五氣論曰五味所入酸入肝辛入肺苦入心鹹入腎甘入脾是謂五入五氣所病心為噫肺為咳肝為語脾為吞腎為欠為嚏胃為氣逆為噦為恐大腸小腸為泄下焦溢為水膀胱不利為癃不約為遺溺膽為怒是為五病膽為中正決斷無私其剛決故為怒也十一臟皆取決於膽也五精所並精氣並於心則喜並於肺則悲並於肝則憂並於脾則畏並於腎則恐是謂五並虛而相併者也五臟以勝相併故有五志如肺虛心精並之故喜故曰虛而相併也五臟所惡心惡熱肺惡寒肝惡風脾惡濕腎惡燥是謂五惡五臟化液心為汗肺為涕肝為淚脾為涎腎為唾是謂五液五病所發陰病發於骨陽病發於血陰病發於肉陽病發於冬陰病發於夏是謂五發五邪所亂邪入於陽則狂邪入於陰則痹搏陽則為顛疾搏陰則為喑陽入之陰則靜陰出之陽則怒是為五亂五臟所藏心藏神肺藏魄肝藏魂脾藏意腎藏志是謂五臟同精而出入者謂之魄同神而往來者謂之魂心有所憶謂之意專意不移謂之志五臟所主心主脈肺主皮肝主筋脾主肉腎主骨是謂五主五勞所傷久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋是謂五勞所傷刺志論帝曰願聞虛實之要岐伯對曰氣實形實氣虛形虛此其常也反此者病谷盛氣盛谷虛氣虛此其常也反此者病脈實血實脈虛血虛此其常也反此者病形氣相反穀氣不應血脈不浮故皆反法當病曰何謂反氣虛身熱此謂反也谷入多而氣少此謂反也谷不入而氣多此謂反也脈盛血少此謂反也氣盛身寒得之傷寒氣虛身熱得之傷暑寒傷形故氣盛身寒熱傳氣故氣虛身熱谷入多而氣少者得之有所脫血濕居下也氣小則脫血而下故濕居下也谷入少而氣多者邪在胃及與肺也谷少氣多乃胃中邪氣併入於肺而非正氣之多也脈少血多者飲中熱也飲留胃中而作熱也脈大血少者脈有風氣水漿不入此之謂也風氣盛滿則水漿不入也陰陽應象篇曰天之邪氣感即害人五臟水穀之寒熱感則害人六腑地之濕氣感則害人皮膚筋脈四時之氣天之邪也感之則害五臟飲食寒熱感之則傷六腑地之濕氣感則有傷經脈故害於皮膚筋脈各以其近而受害也太陰陽明篇曰陽者天氣也主外陰者地氣也主內故陽道實陰道虛故犯賊風虛邪者陽受之飲食不節起居不時者陰受之陽受之則入六腑陰受之則入五臟入六腑則身熱不時臥上為喘呼入五臟則腹滿閉塞下為飧泄久為腸澼此言賊風虛邪陽受之入六腑飲食起居陰受之入五臟與陰陽應象論天之邪氣害人五臟水穀寒熱害人六腑兩説相反其理安在此謂虛邪外傷有餘飲食內傷不足二者之傷互有所受不可執一而言傷也惟濕從外傷故及皮膚濕從內成亦傷臟腑此又不可一途而云然也故曰陽病者上行極而下陰病者下行極而上此言物極則反理之常也傷於風者上先受之傷於濕者下先受之風陽氣也濕陰氣也陽從上陰從下火就燥水流濕類也陰陽應象篇曰天有四時五行以生長收藏以生寒暑燥濕風人有五臟化五氣以生喜怒憂思悲恐喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽厥氣上行滿脈去形喜怒不節寒暑過度生乃不固故重陰必陽重陽必陰靈樞經曰智者之養生也必順四時而適寒暑若五志不常寒暑過度戕賊天真何可長久六元正紀篇曰風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡泄甚則水閉胕腫濕勝濡泄水氣內勝則傷脾胃而瀉利也其則脾胃之氣一行水道溢於皮膚則為水閉肉如泥按之陷下而不起也故曰胕腫太陰陽明論帝曰脾病而四肢不用何也岐伯對曰四肢皆稟氣於胃而不得至徑胃氣不得徑至以達四肢必因於脾乃得稟也今脾病不能為胃行其津液四肢不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉四肢稟氣於胃襲脾而布化脾不布化故四肢不用胃氣不能獨施故也脈要精微篇曰陰盛則夢涉大水恐懼陽盛則夢大火燔灼陰陽俱盛則夢相殺毀傷上盛則夢飛下盛則夢墜甚飽則夢與其飢則夢取肝氣盛則夢怒肺氣盛則夢哭短蟲多則夢聚衆長蟲多則夢相擊毀傷氣厥論篇帝曰五臟六腑寒熱相移者何岐伯曰腎移熱於肝癰腫少氣脾移寒於肝癰腫筋攣肝移寒於心狂鬲中心移寒於肺肺消肺消者飲一溲二死不治肺移寒於腎為湧水湧水者按腹不堅水氣客於大腸疾行則鳴濯濯如囊裹漿水之病也脾移熱於肝則為驚衄肝移熱於心則死心移熱於肺傳為鬲消肺移熱於腎傳為柔痓腎移熱於脾傳為虛腸澼死不可治胞移熱於膀胱則癃溺血膀胱移熱於小腸鬲腸不便上為口糜小腸移熱於大腸為慮瘕為沉大腸移熱於胃善食而瘦又謂之食亦胃移熱於膽亦曰食亦膽移熱於腦則辛頞鼻淵鼻淵者濁涕下不止也傳為衄衊瞑目故得之氣厥也臟腑相移各以所司而為病皆由氣厥逆而得也虙伏同調經論篇帝曰經言陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒余已聞之矣不知其所由然也岐伯曰陽受氣於上焦以溫皮膚分肉之間今寒氣在外則上焦不通上焦不通則寒氣獨留於外故寒栗寒氣在皮膚之外則上焦不通而發寒栗帝曰陰虛生內熱奈何岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱王安道曰此陰字指人身之陰與水穀之味也夫有所勞倦者過動屬火也形氣衰小者壯火食氣也穀氣不盛者勞傷元氣則少食而氣衰也上焦不行者清陽不升也下脘不通者濁陰不降也夫胃受水穀則清陽升而濁陰降以傳化出入滋養一身也今胃不能納而穀氣衰少則清無升濁無降矣故內熱汪寅谷曰人身之中陰氣虛損為熱蓋勞倦傷脾胃氣因虛下陷重壓下脘氣道之分而上焦之氣因以不行少火鬱為壯火而為內熱傷氣等證其治以東垣補中益氣為宜斯所謂勞傷形體飲食失節而致熱者乎內傷之説蓋原於此帝曰陽盛生外熱奈何岐伯曰上焦不通則皮膚緻密腠理閉塞玄府不通衛氣不得泄越故外熱外傷寒毒內薄諸陽外盛則皮膚收皮膚收則腠理密故衛氣蓄聚無所留行矣寒氣外薄陽氣內爭積火內燔故生外熱也帝曰陰盛生內寒奈何岐伯曰厥氣上逆寒氣積於胸中而不瀉不瀉則溫氣去寒獨留則血凝血凝則脈不通其脈盛大以澀故中寒溫氣陽氣也陰逆內滿則陽氣去於皮外也舉痛論帝曰余知百病生於氣也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結九氣不同何病之生氣皆能致病故問之岐伯對曰怒則氣逆甚則嘔血及飧泄故氣上矣怒則陽氣逆上肝氣乘脾故甚則嘔血及飧泄何以明之怒則面赤甚則色蒼經曰盛怒不止則傷志明喜則志氣和達榮衛通利故氣緩矣悲則心系急肺布葉舉而上焦不通榮衛不散熱氣在中故氣消矣恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣寒則腠理閉氣不行故氣收矣腠謂津液滲瀉之所理謂文理逢會之中身寒則衛氣沉故皮膚文理及滲瀉之處皆祕閉而氣不流行衛氣收斂於中而不發泄也炅則腠理開榮衛通汗大泄故氣泄矣驚則心無所倚神無所依慮無所定故氣亂矣勞則喘且汗出外內皆越故氣耗矣勞於力役則氣奔速而陽外發喘息汗出外內皆逾越常紀故氣耗損思則心有所存神有所歸正氣留而不行故氣結矣九氣致病於此可詳矣內經要旨下論治篇第四岐伯曰神有餘則笑不休神不足則悲治神有餘則瀉其小絡之血小絡當是手少陰心經之小絡出血勿之深斥無中其大經神氣乃平異法方宜篇帝曰醫之治病一病而治各不同皆愈何也岐伯對曰地勢使然也不同謂針石灸焫毒藥導引按摩之不同地勢有高下燥濕之勢也故東方之域天地之所始生也魚鹽之地海濱傍水其民食魚而嗜咸皆安其處美其食魚者使人熱中鹽者勝血故其民皆黑色疏理其病皆為癰瘍其治宜砭石故砭石者亦從東方來東方之域魚鹽之地海濱之民多食魚魚發瘡而熱中鹽發渴而勝血故民黑色病瘡瘍治宜砭石砭石以石為針而決膿血西方者金玉之域砂石之處天地之所收引也其民陵居而多風水土剛強其民不衣而褐薦華食而脂肥故邪不能傷其形體其病生於內其治宜毒藥故毒藥者亦從西方來西方之民水土剛強腠理閉密外邪不能傷故病多內傷七情飲水色欲而已治宜毒藥攻其內也北方者天地所閉藏之域也其地高陵居風寒冰冽其民樂野處而乳食藏寒生滿病其治宜灸焫故灸焫者亦從北方來北方水寒冰冽故病臟寒其治宜艾灸燒灼謂之灸焫南方者天地所長養陽之所盛處也其地下水土弱霧露之所聚也其民嗜酸而食胕故其民皆致理而赤色其病攣痹其治宜微針故九針者亦從南方來南方之民嗜酸故腠理致密又卑下之濕內鬱而不得發泄故病攣痹用微針所以疏瀉之是也中央者其地平以濕天地所以生萬物也衆其民食雜而不勞故其病多痿厥寒熱其治宜導引按蹺故導引按蹺者亦從中央出也中央之地濕故生物衆四方輻輳故民食雜不勞然濕氣在下民多病痿厥寒熱治宜導引謂搖其筋骨動其支節按蹺謂抑皮肉捷舉手足是也故聖人雜合以治各得其所宜故治所以異而病皆愈者得病之情知治之大體也聖人治人隨方而各得其宜也陰陽應象篇曰善治者治皮毛止於始萌其次治肌膚救其已生其次治筋脈攻其已病其次治六腑治其已甚其次治五臟治五臟者半死半生也此言治病當治其未病則易愈延及腑臟則病深而難愈故曰半死半生病之始起也可刺而已始起者輕微在於經腠外邪未及深入可剌以針而瀉之已止也其盛者可待衰而已邪氣盛甚而遽止之非惟不足以祛邪而正氣亦反受其傷也故必待其衰而治之如藏瘧者不可於其勢之方興而止痢者必俟其勢將艾如兵法避鋭盛而擊惰歸之意也因其輕而揚之因從其所因也因其邪氣輕浮於表而用氣輕薄之劑而發揚之如傷寒一二日用葛根之類是也因其重而減之重則沉重而下墜者如痢後重者減去之即瀉其實也因其衰而彰之彰猶楊也此指傷寒邪氣已衰欲作正汗者因而揚於外也朱肱氏云傷寒七八日忽然兩手無脈或一手無脈此是正汗來用甘草細辛之類助其汗正謂此也其高者因而越之越過也如膈上痰壅盛者用稀涎之類吐之使上越也其下者引而竭之引導引也如濕氣勝而為濡瀉等證用五苓散之類又如積痢在下而為裡急後重等證用承氣湯牽牛散之類引而竭之也中滿者瀉之於內中滿心下滿悶而外無脹急之形痞病是也斯乃濕熱之為以黃連枳實厚朴之類瀉之使內消而無滓穢形之於外也其有邪者漬形以為汗此言熱邪內郁宜於汗解因其腠理乾燥而汗不得出者以溫水微漬形體使之腠理滋潤以接其汗之出也今用熱湯圍浴而出汗者是也其在皮毛者汗而發之傷寒二三日邪在表者用麻黃之類以發其汗也其慓悍者按而收之慓疾悍暴按降收斂也蓋謂陰虛火炎上而為喘嗽等證宜以滋陰降火之劑如四物湯加柏知五味子之類故曰按而收之其實者散而瀉之散汗解也瀉下也蓋謂疫瘟之邪從內而達於外者並表裡兼治如防風通聖之屬故曰散而瀉之血實宜決之瘀血壅盛者宜紅花蘇木之屬通之如産後積惡經閉聚脹等證用黑神散以決之氣虛宜掣引之掣引猶言升提也脾胃不足陽氣下陷而用升提之藥補中益氣之類是也又導引家使其氣行通暢亦是形不足者補之以氣精不足者補之以味氣神氣也味五味也形不足宜溫養神氣而調和之精不足宜飲食藥品之滋味以補之也有餘者瀉之邪氣有餘者為實實者瀉之如汗下吐法是也不足者補之正氣不足為虛虛者補之本草云補可以去弱人參羊肉之屬是也高者抑之邪氣在上者抑之如吐衄等證而內實者用桃仁承氣湯之類下之下者舉之正氣下陷舉而升之如瀉泄痢疾久則下陷宜用升麻柴胡補中益氣湯之類是也堅者削之堅積於內以三稜莪朮之類削之客者除之邪客於經者除去之勞者溫之溫溫養也勞倦內傷者當澄心息慮以溫養之結者散之陽氣結滯者如氣鬱不舒用青皮香附枳殼紫蘇之類散之留者攻之留不去也攻攻擊也積塊不移各從所惡攻之如硇砂水銀去肉積神麯麥芽去酒積水蛭虻蟲去血積木香檳榔去氣積附子硫黃去寒積又云氣血留積為毒者不以毒藥攻擊之可乎如紫蘇去魚腥積丁香桂心去菜積如貝母南星硝黃草藥之屬敷貼而攻之亦是燥者潤之本草云潤可以去燥如麻仁當歸之屬是濡者燥之燥可以去濕如桑白皮赤小豆之屬是也急者緩之如火氣上逆而急者生甘草之屬緩之散者收之陽氣精神耗散者以五味子酸棗仁之類收之逸者行之過乎安逸氣血凝滯而成病者使之行動以道其阻也驚者平之驚者有所激而然宜和而平之或用平驚之藥或以平常習見之法平之則不驚也如病機賦云有人聞聲則驚藥治之不效一醫命患者高坐堂上堂下以木擊其物且諭之曰物之能鳴平常也何懼之有且言且擊患人目見久之而心自定以後則不驚懼此則平之之法也上之下之摩之浴之薄之卻之開之發之適事為故總結上文量病證候適事而用之湯液醪醴論岐伯曰夫上古作湯液故為而弗服也中古之世道德稍衰邪氣時至服之萬全當今之世必齊毒藥攻其中鑱石針艾治其外也帝曰形弊血盡而功不足者何曰神不使也曰何謂神不使曰針石道也精神不進志意不治故病不可愈病而至於形弊血盡精神脫去可知雖有湯藥針石皆弗之能起也故病不可愈此今世之人斫喪故也今精神壞去榮衛不可復收何者嗜欲無窮而憂患不止精氣弛壞榮衛併除故神去之而病不愈也神去則機息精神者生之原榮衛者氣之主神氣俱無生意則不使矣病何由痊移精變氣論岐伯曰中古之治病至而治之湯液十日以去八風五痹之病八風八方之風也五痹骨脈筋皮肌是也十日不已治以草蘇草荄之枝本末為助標本已得邪氣乃服草蘇謂藥煎草荄謂草根枝莖也凡用藥有用苗者有用根者有用莖者用而不愈則兼其苗荄華實而用之俾其相佐助而去病也故云本末為助暮世之治病也則不然治不本四時不知日月不審逆從四時之氣各有所在如春氣在經脈治當隨所在而伏其邪日有寒溫明暗月有空滿虧盈逆從如升降浮沉當順寒熱溫涼逆從是也病形已成乃欲微針治其外湯液治其內粗工凶凶以為可攻故病未已新病復起粗工粗略者也凶凶不料事宜之可否也如此則舊病不愈反增新病也藏氣法時篇帝曰合人形以法四時五行而治何如而從何如而逆岐伯對曰五行者金木水火土也更貴更賤易時則貴失時則賤以知死生以決成敗而定五臟之氣間甚之時死生之期也五臟之氣歇為間旺為甚則死生之期也肝主春足厥陰少陽主治其日甲乙肝苦急氣有餘也急食甘以緩之急急速也風傷肝風性急速內為飧泄等證以升提之藥如甘草之甘緩之故曰風淫於內治以辛涼佐以苦甘云云心主夏手少陰太陽主治其日丙丁心苦緩心氣虛也急食酸以收之緩舒緩也心主熱在液為汗心熱則腠理舒緩而為汗泄等證以酸棗仁五味子之酸收之脾主長夏足太陰陽明主治其日戊己脾苦濕急食苦以燥之脾主濕濕氣內襲而為腫滿等證以蒼白朮之苦燥之肺主秋手太陰陽明主治其日庚幸肺苦氣上逆急食苦以泄之肺主氣肺氣上逆而為咳嗽等證則以葶藶黃芩訶子皮之苦泄而降之腎主冬足少陰太陽主治其日壬癸腎苦燥急食辛以潤之腎主水腎熱則液涸而為陰火等證以黃柏知母之辛潤之或腎液枯而大便結燥者用當歸紅花之辛潤之故曰大便難者取足少陰此也病在肝愈於夏夏不愈甚於秋秋不死持於冬起於春禁當風肝病者平旦慧爽也下晡甚金旺然也夜半靜肝欲散急食辛以散之用辛補之酸瀉之酸味收故瀉宜當咸瀉之然肝欲散不當又以酸收咸軟為補之為瀉之也肝主筋風邪傷筋則攣以川芎之辛散之則補以芍藥之酸收之則瀉病在心愈在長夏長夏不愈甚於冬年不死持於春起於夏禁溫食熱衣心病者日中慧夜半甚平旦靜心欲耎急食鹹以耎之用鹹補之甘瀉之取其柔軟舒緩之意心主脈火邪內結則脈堅實以芒硝之咸軟之則補以甘草之甘緩之則瀉病在脾愈於秋秋不愈甚於春春不死持於夏起於長夏禁溫食鮑食濕地濡衣脾病者日昳慧昳昃也日出甚下晡靜脾欲緩急食甘以緩之用苦瀉之甘補之脾惡濕所以濕與飽皆傷脾脾傷則胃氣下陷少火鬱為壯火以甘草之甘緩之則補以黃連大黃之苦下之則瀉病在肺愈於冬冬不愈甚於夏夏不死持於長夏起於秋禁寒飲食寒衣肺病者下晡慧日中甚夜半靜肺欲收急食酸以收之用酸補之辛瀉之肺主氣肺熱則清氣耗散而為汗出喘嗽等證以五味烏梅之酸收之則為補以麻黃桂枝之辛散之則為瀉病在腎愈於春春不愈甚於長夏長夏不死持於秋起於冬禁犯焠㶼煩熱也熱食溫炙衣腎病者夜半慧四季甚下晡靜腎欲堅急食苦以堅之用苦補之咸瀉之腎主二便瀉痢則下虛以黃連黃芩之苦堅之則下元固閉而為補以芒硝之咸軟之則下元失守而為瀉夫邪氣之客於身也以勝相加至其所生而愈至其所不勝而甚至於所生而持自得其位而起必先定五臟之脈乃可言間甚之時死生之期也以勝相加如病肝木則肺金以勝而加之至己所生則愈至克己之氣所不勝而甚至生己之氣而持至己自旺之位而起先定五臟之脈謂肝弦心鉤肺浮腎營脾代之類如經曰必先知經脈然後知病脈乃可言間甚死生之期云血氣形志篇曰形樂志苦病生於脈治之以灸刺謂形不勞而志思苦者結慮深思榮衛乖否宜盛瀉虛補灸刺為宜之此順氣之道也形樂志樂病生於肉治之以針石筋骨不勞心神悅懌病生於肉衛氣留滿以針瀉之結聚膿血以石破之今世之用扉針以破決之是也形苦志樂病生於筋治之以尉引勞形者傷筋治以藥尉及導引則筋自舒而愈也形苦志苦病生於咽嗌治之以百藥形志俱苦則氣血兩耗而咽嗌為之不利也治以百藥乃榮衛益理氣藥血藥並行是也形數驚恐經絡不通病生於不仁治以按摩醪藥按摩所以導其閉塞而使之通其經絡者也醪藥則藥酒也藥以酒漬使其能通經絡血脈而善行氣者也湯液醪醴論篇帝曰其有不從毫毛生而五臟陽以竭也津液充郭其魄獨居孤精於內氣耗於外形不可與衣相保此四極亟而動中是氣拒於內而形施於外治之奈何此水氣脹滿之病其本不從毫毛生五臟陽氣竭耗而脈氣孤危故魄獨居此四極亟而動中氣拒內形施外故不與衣相保岐伯對曰平治於權衡去宛陳莝是以微動四極溫衣繆刺其處以復其形開鬼門潔淨府此言量其內外輕重而施治如水氣在內則用以微動四極繆剌其處以復其形以牽牛甘遂之類瀉之去其積故曰去宛陳莝水氣在表用蒼朮羌活之類汗之故曰開鬼門水氣在下用五苓散之類以利小水故曰潔淨府藏氣法時論曰肝病者兩脅下痛引小腹令人善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之取其經厥陰與少陽氣逆則頭痛耳聾不聰頰腫取血者此肝經之病而合於膽凡經絡到處皆為之病兩脅下痛引小腹善怒此為肝經實病目䀮䀮無見耳無所聞善恐此肝脈系膽脈風火上攻故也脅中血滿獨異於常隨其左右而利之也心病者胸中痛脅支滿脅下痛膺背肩甲間痛兩臂內痛虛則脅腹大脅下與腰相引而痛取其經少陰太陽舌下血者其變病剌郤中血者此心經之病而合於小腸舌下為舌本心之系郤中為心脈在掌後去腕半寸脾病者身重善飢肉痿足不收行善瘈腳下痛虛則腹滿腸鳴飧泄食不化取其經太陰陽明少陰血者此脾經之病而合於脾者善行瘈故取足太陰陽明少陰出血也肺病者喘咳逆氣肩背痛汗出尻陰股膝髀腨足皆痛虛則少氣不能報息耳聾咽乾取其經太陰足太陽之外厥陰內血者此肺經之病實則喘咳逆氣肩背股膝俱痛虛則少氣耳聾太陽之外厥陰之內有血滿異於常者則取之腎病者腹大脛腫喘咳身重寢汗出憎風虛則胸中痛大腹小腹痛清厥意不樂取其經少陰太陽血者此腎經之病凡剌虛則補剌實則瀉不盛不虛以經取之是謂得道經絡有血剌而去之是謂守法猶當揣形定氣先取血脈而後乃調有餘不足腹中論帝曰夫子數言熱中消中不可服膏粱芳草石藥石藥發顛芳草發狂夫熱中消中者皆富貴人也今禁膏粱是不合其心禁芳草石藥是病不愈願聞其説熱中多飲溲數消中多食數溲皆脾氣上溢肥甘所致故禁膏粱石藥芳草之濃美也岐伯對曰夫芳草之氣美石藥之氣悍二者其氣急疾堅徑故非緩心和人不可以服此二者曰不可以服此者何以然曰夫熱氣慓悍慓疾也藥氣亦然二者相遇恐內傷脾脾者土也而惡木服此藥者至甲乙日更論熱氣慓盛則木氣有餘躁怒傷脾故至甲乙日更論脾病之增減五常政大論篇帝曰天不足西北左寒而右涼地不滿東南右熱而左溫其故何也岐伯對曰陰陽之氣高下之理大小之異也東南方陽也陽者其精降於下故右熱而左溫西北方陰也陰者其精奉於上故左寒而右涼是以地有高下氣有溫涼高者氣寒下者氣熱故適寒涼者脹之溫熱者瘡下之則脹已汗之則瘡已此腠理開閉之常大小之異耳曰其於壽夭何如曰陰精所奉其人壽陽精所降其人夭陰精所奉高之地也陰方之地陽不妄泄寒氣外持邪不數中而正堅守故壽延陽精所降地之下也陽方之地陽氣耗散發泄無度風濕數中真氣傾竭故夭折即事驗之今中原之境西北方人多壽東南方人多夭其中各有微甚耳此方土之異也帝曰其病治之奈何曰西北之氣散而寒之東南之氣收而溫之所謂同病異治也西北方皮膚閉腠理密人皆食熱故宜散宜寒東南方人腠理疏冬皆長冷故宜收宜溫散不解表故曰氣寒氣涼治以寒涼行水漬之氣溫氣熱治以溫熱強其內守必同其氣可使平也假者反之寒方以寒熱方以熱是正治也西北方有病冷假熱方以除之東南方有病熱假涼方以除之是則假者反上之正法以取之岐伯曰補上下者從之治上下者逆之上者天氣下者地氣不及則順而和之太過則逆而治之也以所在寒熱盛衰而調之故曰上取下取內取外取以求其過能毒者以厚藥不勝毒者以薄藥此之謂也藥之厚薄藥之氣味厚薄也上下內外求治其過當因人之體氣厚薄而施則可以求其過也氣反者病在上取之下病在下取之上病在中傍取之氣反者謂病下而反上病上而反下病反在上而治取於下病反在下而治取於上病在中而治取於傍如寒逆於下熱反攻於上不利於下氣盈於上則溫下以調之余仿此治熱以寒溫而行之治寒以熱涼而行之治溫以清冷而行之治清以溫熱而行之故消之削之吐之下之補之瀉之久新同法治法要審輕重剛柔逆順以施之新久則皆同一理法也曰病在中而不實不堅且聚且散奈何曰無積者求其藏虛則補之藥以祛之食以隨之行水漬之和其中外可使必已曰有毒無毒服有約乎曰病有新久方有大小有毒無毒固宜常制矣有約常制即下文云大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九穀肉菜果食養盡之無使過之傷其正也不盡行復如法約節約也假如無毒治病病已十去其九須以此為節約再勿藥也須以穀肉菜果隨五臟所宜食之養之以盡其余病也若違約節而過用之必至於傷正氣也六元正紀論帝曰論言熱無犯熱寒無犯寒豫欲不遠熱不遠寒奈何上之寒熱二字所用之寒熱也下之寒熱二字因氣之寒熱也遠猶避也不遠寒不遠熱猶言可以熱治熱而寒治寒者也岐伯對曰發表不遠熱攻裡不遠寒出汗宜熱藥故不避熱下利宜寒藥故不避寒如是則夏亦可用寒皆謂不獲已而用之也帝曰不發不攻而犯寒犯熱何如曰寒熱內賊其病益甚曰願聞無病何如曰無者生之有者甚之犯寒熱者其病益甚無病犯禁猶能生病故曰無則生有則甚曰生者何如曰不遠熱則熱至不遠寒則寒至寒至則堅痞腹滿痛急下利之病生矣熱至則身熱吐下霍亂癰疽瘡瘍瞀音冒悶也郁注下瞤瘈腫脹嘔鼽衄頭痛骨節變肉痛血溢血泄淋閉之病生矣曰治之奈何曰時必順之犯者治以勝也春宜涼夏宜寒秋宜溫冬宜熱此時之宜不可不順犯熱治以酸寒犯寒治以甘熱犯涼治以苦溫犯溫治以辛涼所謂勝也帝曰婦人重身毒之何如岐伯曰有故無殞亦無殞也曰願聞其故何謂也岐伯曰大積大聚其可犯也衰其大半而止過者死帝曰善重身謂懷妊也毒之謂有毒病用毒藥以攻之有大積大聚之故治其大半則止過之者死非重身者大毒治病十去其六而止當有約也況重身者豈無約乎曰郁之甚者治之奈何曰木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之然調其氣過者折之以其畏也所謂瀉之郁鬱滯也達發奪泄折五者欲其通達之意也王注以達為吐以發為汗以奪為下以泄為利小水皆非也如氣悽清之甚則肺金太過而木鬱之病生焉治以輕揚味薄之劑散之使之鬱氣解而肝木之氣伸矣治郁之餘仍以辛熱之味以瀉肺氣畏其熱則氣斯服肝肺之氣各得其平無獲鬱滯之患故曰過者折之以其畏也余皆仿此王安道曰此段十三句通為一章當分三節自帝曰至水鬱折之九句為一節治郁法之問答也然調其氣一句為一節治郁之餘法也過者折之以其畏也所謂瀉之三句為一節調氣之餘法也過病之起多由乎郁郁者滯而不通之義或因所乘而為郁或不因所乘而本氣自郁皆郁也豈惟五運之變能使然哉郁既非五運之變可拘則達之發之奪之瀉之折之之法固可擴而充之矣可擴而充其應變不窮之理也且夫達者通暢之也如肝性急怒氣逆胠脅或脹大時上炎治以苦寒辛散而不愈者則用升發之藥加以厥陰報使而從治之又如久風入中為飧泄及不因外風之入而清氣在下為飧泄則以輕揚之劑舉而散之凡此之類皆達之之法也王氏以吐訓達以汗為發不能使人無疑以為肺金盛而抑制肝木歟則瀉肺氣舉肝氣可矣不必吐也以為脾胃濁氣下流而少陽清氣不升歟則益胃升陽可矣不必吐也雖然木鬱固有吐之之理今以吐宇總該達字則凡木鬱皆當用吐矣其可乎哉帝曰假者何如岐伯曰有假其氣則無禁也所謂主氣不足客氣勝也假借也主氣不足客氣勝之故假借寒熱暖涼以資夫正氣則客可犯之謂也主氣謂五臟應四時春夏秋冬也客氣謂六氣加臨之氣至真要大論曰上淫乎下所勝平之外淫乎內所勝治之上淫乎下天之氣也所謂司天之氣風淫所勝平以辛涼佐以苦甘以甘緩之以酸瀉之之類是也外淫乎內地之氣也所謂在泉之氣風淫於內治以辛涼佐以苦甘以甘緩之以辛散之是也皆隨所制勝以平之也司天之氣曰平在泉之氣曰治此其義見矣謹察陰陽所在而調之以平為期正者正治反者反治陰病陽不病陽病陰不病正也以寒治熱以熱治寒正治也陰位以見陽脈陽位以見陰脈反也以寒治寒以熱治熱反治也夫氣之勝也微者隨之甚者制之氣之復也和者平之暴者奪之皆隨勝氣安其屈伏無問其數以平為期此其道也隨制平奪皆不以數之多少以氣和平為度帝曰氣有多少病有盛衰治有緩急方有大小願聞其約岐伯對曰氣有高下病有遠近證有中外治有輕重適其至所為故也臟腑有高下遠近證候有表裡藥治有輕重調其多少和其緊慢令藥氣之病所為故勿令太過與不及也大要曰君一臣二奇之制也君二臣四偶之制也君二臣三奇之制也君三臣六偶之制也古之單方獨用一物曰奇病在上而近者宜奇方古之復方曰偶有二味相配之偶有二方相合之偶病在下而遠者宜偶方制者謂因時制宜之義以病有遠近治有輕重所宜故云制也若以君臣藥味數之陰陽奇偶則亦然也故曰近者奇之遠者偶之汗者不可以奇下者不可以偶奇者單行而力微故近者奇之可也偶者並行而力大故遠者必以偶也汗不可以奇蓋謂汗難出故以偶下不以偶謂下易行故以奇及觀仲景制方桂枝湯汗藥也亦以三味為奇大承氣湯下藥也亦以四味為偶此見方因時制宜不必拘泥奇偶而失其治之大體補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其所至此之謂也王注謂補上治上之方若迅急則上不住而反迫於下所以宜制氣味之薄方欲其升浮而使之至於病所而後可以療其病也補下治下之方若慢緩則滋道路而力微所以宜制氣味之厚方欲其降沉急而至於病所而後可以療其病也適宜也凡制方須宜至其病所而無太過不及之謂也病所遠而中道氣味之者食而過之無越其制度也又有病在於下焦其勢不容於遽急而用和緩之氣味者慮其中道而止也宜於藥後以食送之至病所要亦無違上下之制是故平氣之道近而奇偶制小其服也遠而奇偶制大其服也大則數少小則數多多則九之少則二之大方有二有藥味數少專攻之大方有君一臣二佐九之大方凡治肝腎及在下而遠者宜服數少之大方病有兼證而邪不專不可以一二味治者宜服君一臣二佐九之大方故腎之二服可分作肺之九服肝之三服也奇之不去則偶之是謂重方偶之不去則反佐以取之所謂寒熱溫涼反從其病也重方則復方也奇偶不去則反復以取之所謂寒熱溫涼反從其病如黃連治口瘡佐以乾薑而速之類是也故曰反佐取之帝曰五味之用何如岐伯對曰辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或耎或堅以所利而行之調其氣使其平也五味辛以散之半夏白芷防風之辛皆散甘以緩之甘草大棗之甘皆緩酸以收之白芍藥五味子之酸皆收苦以瀉之大黃黃連之苦皆泄咸以軟之芒硝海石之咸皆軟淡以滲之茯苓白朮之淡皆滲是也寒者熱之熱者寒之微者逆之甚者從之病之微者可以逆治以寒攻熱以熱攻寒是也病之甚者不可逆治當順其性而從之所謂以熱而攻熱也如傷寒發熱反以麻黃薑桂之辛從其性而攻發之之類是也帝曰何謂逆從岐伯曰逆者正治從者反治從少從多觀其事也逆其病而施謂之正從其病勢而用方謂之反反從之方或一二味而從之是謂從少或三四味而從之是謂從多從少從多當觀病之微甚事之輕重帝曰反治何謂岐伯曰熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異汪氏質疑注經文反治者即從治之法上文曰從者反治是也熱因寒用者謂熱藥因病之熱以其本病之寒而用也如傷寒腎氣素本虛寒而寒盛於內格陽於外病變面赤身熱脈數無力者經曰脈至而從按之不鼓諸陽皆然是也有因內傷過服涼藥以致肌膚大熱或譫語口乾脈無力者此皆本於寒而變病似熱實非熱也宜以熱藥反治之也寒因熱用者謂寒藥因病之寒以其本病之熱而用也如傷寒熱甚失於汗下亢陽內郁拒陽於外病變渾身厥冷而脈實者經曰諸陰之反脈至而從按之鼓甚而盛也是也有積熱於內而外反惡寒者有火炎於內反覺冷氣自腹衝上者此皆本於熱而變病似寒實非寒也宜以寒藥反治之也塞因塞用者言補塞之藥因壅塞之病而用也釋者謂氣虛中滿而用補藥特其一耳有因氣虛而胸中痞者有氣虛腹中有塊作痛或上或下或有或無者有氣虛大便裡急後重者有氣虛小便祕澀者有氣虛而肢節腫痛者有氣虛而背肩脹急者此皆本於氣虛不能運行而變病似塞實非塞也宜補氣及收澀之藥反治此塞因塞用之類也通因通用者言通利之藥因通塞之病而用也釋者謂熱結塞凝而致泄者以通利之藥亦特其一耳有因食積而痢者宜通積化食之藥有下焦積熱而小便不禁或遺精滯濁者宜通竅解熱之藥有患瘧鬱熱於表外蒸汗出者宜清熱解表之藥有傷風熱怫於表外蒸汗出者宜散風之藥有患痹濕氣熏蒸汗出者宜散濕之藥有血積於內以致血隧壅遏而傍流之血妄行者宜通血之藥此皆本於塞而變病似通實非通也宜通利之藥反治此通因通用之類也必伏其所主者正治之法藏諸用也而先其所因者因其勢而利導之之意也伏其吾之所以主治者而先其所因以順從而漸殺之法法主於治其通而先通因通用積去而利止則先通之者所以塞之也而吾主治之意至是顯諸仁矣反治之法主於雙病本其始而言亦正治也故言乎其始藥治亦順與正治之法同言乎其終藥治似逆與正治之法異故曰始同終異也夫反治之法微故宜加深長之思此章之義博不可以偏之致自異也而釋者不察得失相參如謂中滿宜補瀉痢宜下之者可也至謂蜜煎烏頭醇酒冷飲之類皆察其小而遺其大者余寧已於言哉可使破積可使潰堅可使氣和可使必已此結上文反治之效也帝曰病之中外何如岐伯曰從內之外者調其內內傷元氣不能外衛腠理而為汗泄等證宜補中益氣之類以調其內則外證自除是謂治其本也從外之內者治其外風寒外鬱而為喘嗽或為鼻衄等證宜麻黃桂枝之類以疏其外則內患自除是亦治其本也從內之外而盛於外者先調其內而後治其外如積熱於內而為癰腫瘡瘍等證先以苦寒疏其內實後用通經關郁排膿之劑或針砭等法以治其外斯則內外悉平是謂先本而後標者也從外之內而盛於內者先治其外而後調其內邪氣外郁內熱而為痰火壅實等證先以辛散之味以解其外後用消痰降火之劑以治其內斯則內外俱安是亦先本而後標之者也中外不相及則治其主病病在中或在外兩不相干而非從內之外從外之內者則於內於外專治其主病而已矣曰論言治寒以熱治熱以寒而方士不能廢繩墨而更其道也有病熱者寒之而熱有病寒者熱之而寒二者皆在新病復起奈何治此問治病不衰而反因藥之寒熱而隨生寒熱之新病也岐伯曰諸寒之而熱者取之陰諸熱之而寒者取之陽所謂求其屬也陰腎也陽心也其心屬火腎屬水也此言腎之真陰已虧而發熱誤投寒藥以治則熱反熾豈知熱之不衰由於真水之不足乎宜求滋腎之劑如山藥枸杞地黃之類所謂壯水之主以制陽光是也又如心之元陽已虧而身寒者誤投熱藥以治則寒反甚豈知寒之不衰由於真火之不足乎宜求補心之劑如人參附子之類所謂益火之原以消陰翳是也如果益心寒亦通行如果強腎熱之猶可心也腎也水火之原也陰陽之本所謂屬也服寒而反熱服熱而反寒治其旺氣是以反也旺氣時旺之氣也如夏月感寒鬱而為熱宜辛散之藥醫見其身熱其時旺之氣亦熱乃以寒藥治之寒性收斂表邪不能發散而熱反甚矣發冬月傷寒失於汗下邪氣傳變亢陽內鬱而身寒者宜苦攻之醫見身寒時旺之氣亦寒乃以熱藥治之熱性慓悍內邪未得疏通而寒反甚矣是皆治其旺氣而有所失也正發表不遠熱攻裹不遠寒相同一意曰不治旺而然者何也曰不味旺味屬也此承上文而言上味玩味也下味藥味也如肺之氣虛而身寒其寒也由於肺氣之不足也宜補其氣則生陽矣若誤投以辛熱之藥味則陽虛陰必湊而身寒反甚蓋徒知寒者熱之而不玩味乎味之辛者旺於秋而屬於肺辛先入肺以散肺氣如之何其弗寒也如心血虛內身熱其熱也由於心血之不足也宜補其血則生陰矣若誤投以苦寒之味則陰虛陽必乘而身熱反熾蓋徒知熱者寒之而不玩味乎味之苦者旺於夏而屬於心苦先入心以瀉心血如之何其弗熱也故曰不味旺味而有所犯也五味入胃各歸所喜攻酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常也氣增而久夭之由也五味久服各增其氣如黃連服久而反熱故曰久而增氣物化之常增氣不已臟氣偏勝氣有偏勝則有偏絶故曰夭之由也五常政大論曰必先歲氣無伐天和無盛盛無虛虛而遺人夭殃無致邪無失正絶人長命此言人應天地陰陽虛實寒熱治之宜各察其歲氣天和無實實虛虛之誤庶不失其正而夭人命也大要曰無伐化無違時必養必和待其來復此之謂也此承上文而言引古經以證無伐天和之義也五臟別論曰拘於鬼神者不可與言至德惡於針石者不可與言至巧藏氣法時論曰肝色青宜食甘粳米牛肉棗葵皆甘心色赤宜食酸小豆犬肉李齏皆酸肺色白宜食苦麥羊肉杏薤皆苦脾色黃宜食鹹大豆豕肉栗藿皆咸腎色黑宜食辛黃黍雞肉桃蔥皆辛毒藥攻邪五穀為養五果為助五畜為益五菜為充氣味合而服之以補精益氣毒藥謂金玉土石草木菜果蟲魚鳥獸之類然辟邪安正惟毒藥為能故通謂毒藥也五穀粳米小豆大豆麥黃黍五果桃李杏栗棗五菜葵藿薤蔥韭食以存性藥以防命氣味溫補以存精形此謂氣味合而服之以補精益氣也宣明五氣篇五味所禁辛走氣氣病無多食辛咸走血血病無多食鹹苦走骨骨病無多食苦甘走肉肉病無多食甘酸走筋筋病無多食酸是謂五禁無令多食五味太過則致病病者則愈甚故無多食下文之義可見矣五臟生成篇多食鹹則脈凝泣而色變多食苦則皮稿而毛拔多食辛則筋急而爪枯多食酸則肉胝䐢而唇揭多食甘則骨痛而發落此五味之所傷也五味入口內養五臟各有所欲所欲太過則互有所傷故不宜過欲也陰陽應象大論陽為氣陰為味味厚者為陰薄為陰之陽氣厚者為陽薄為陽之陰味厚則泄薄則通氣薄則發泄厚則發熱辛甘發散為陽酸苦湧泄為陰味厚者為陰中之陰則泄如大黃之類味薄者為陰中之陽則通如苦茶之類氣厚者為陽中之陽則發熱如附子之類氣薄者為陽中之陰則發泄如麻黃桂枝之類是也故辛甘發散為陽酸苦湧泄為陰也脈候篇第五脈要精微篇黃帝問曰診法何如岐伯對曰診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻血氣未亂故乃可診有過之脈平旦未勞於事陰氣未擾陽氣未耗故可以候有過之病脈也切脈動靜而視精明神氣也察五色觀五臟有餘不足六腑強弱形之盛衰以此參伍決死生之分參伍視察五色等事與所切脈參合比伍而其決死生之分也夫脈者血之府也長則氣治安也短則氣病數則煩心大則病進上盛則氣高下盛則氣脹上盛謂寸口下盛謂尺中代則氣衰細則氣少澀則心痛渾渾革至如湧泉病進而色弊綿綿其去如弦絶者死渾渾脈混亂也革至謂脈弦實如湧泉脈迫迫而出不反也綿錦其去脈來綿綿相續不見其去如弦之數絶主病色而死矣微妙在脈不可不察察之有紀從陰陽始始之有經從五行生生之有度四時為宜察脈在手陰陽升降之妙故曰紀綱始之有經言知其經常之大概次從五行之生旺次從四時之所宜所謂有度也如此微妙皆可察而知也是故聲合五音色合五行脈合陰陽此申上文微妙不可不察而各有合之之理是也持脈有道虛靜為寶虛心靜性春日浮如魚之遊在波不甚浮也夏日在膚泛泛乎萬物有餘盛大充足秋日下膚蟄蟲將去隨氣而降故曰下膚觀蟄蟲可見冬日在骨蟄蟲周密君子居室深沉之義此言四時之常脈所謂始之有經是也尺內兩旁則季脅季末也極下也尺外以候腎尺裡以候腹中附上關上也左外以候肝內以候鬲右外以候胃內以候脾上附上寸上也右外以候肺內以候胸中左外以候心內以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝䯒足中事也自尺內至於上附上六部之分位以診十二候也上竟上者之四句總結上文診候之各得其宜也平人氣象篇帝曰平人何如岐伯對曰人一呼脈再動一吸脈再動呼吸定息脈五動閏以定息命曰平人一呼一吸脈各再動定息脈又一動為五動也曰平人一呼脈一動一吸脈一動曰少氣呼吸定息五動曰平今呼吸各一息脈為遲以減平人之半少氣可知矣人一呼脈三動一吸脈三動而躁尺熱曰病溫尺不熱脈滑曰病風脈澀曰痹躁煩躁也尺熱尺分皮膚熱是為病瘟尺不熱而滑為風澀為血少故病痿痹是為數脈也人一呼脈四動以上曰死脈絶不至曰死乍疏乍數曰死一呼四動一吸亦四動是倍平人之半此數而又甚者也脈絶不至乍疏乍數皆其穀氣絶亡故皆主死平人之常氣稟於胃胃者平人之常氣也人無胃氣曰逆逆者死無胃氣四時之脈不得其本臟和氣也觀下文可以知之春胃微弦曰平弦多胃少曰肝病但弦無胃曰死胃而有毛曰秋病毛甚曰今病春胃氣則弦而軟是也弦多謂弦甚五注如始張弓弦胃氣少者乃本氣自病純弦絶無胃氣者死胃而毛秋病毛甚者金剋木故即病夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死胃而有石曰冬病石甚曰今病夏胃氣則弦而滑是也但鉤謂洪大而堅有石謂沉伏得冬脈故冬病石甚水剋火故即病也長夏胃微耎弱曰平弱多胃少曰脾病但代無胃曰死耎弱有石曰冬病弱甚曰今病長夏胃氣軟弱是也弱多無力也代不能還也主死弱而沉為冬病弱甚曰即病秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰今病秋胃氣浮是也毛多浮微也為肺氣不足而病也浮微而欲絶者死浮而弦為春病弦甚曰為即病年胃微石曰平石多胃少曰腎病但石無胃曰死石而有鉤曰夏病鉤甚曰今病冬胃氣沉是也石多沉伏也為腎氣不充也但石沉而堅也石而有鉤沉滑也而病於夏石甚為即病也玉機真藏篇曰春以胃氣為本病肝脈來盈實而滑如循長竿長而緊也曰肝病死肝脈至急益徑如新張弓弦曰肝死真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死夏以胃氣為本病心脈來喘喘連屬其中微曲曰心病死心脈來前曲後居如操帶鉤曰心死帶鉤陷下不動也真心脈至堅而搏如循薏苡子纍纍然色赤黑不澤毛折乃死長夏以胃氣為本病脾脈來實而盈數如雞舉足曰脾病死脾脈來鋭堅如鳥之啄如鳥之距如屋之漏如水之流曰脾死真脾脈至弱而乍疏乍數色黃青不澤毛折乃死秋以胃氣為本病肺脈來不上不下如循雞羽曰肺病死肺脈來如物之浮如風吹毛曰肺死浮而散也真肺脈至大而虛如以毛羽中人膚色赤白不澤毛折乃死冬以胃氣為本病腎脈來如引葛按之益堅曰腎病死腎脈來發如奪索辟辟然如彈石曰腎死促而腎也真腎脈至搏而絶如指彈石辟辟然色黑黃不澤毛折乃死玉機真藏論岐伯曰春脈者肝也東方木也萬物之所以始生也故其氣來耎弱輕虛而滑端直以長曰弦反此者病其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中太過為陽居表故在外不及為陰居中故在內太過令人善怒忽忽眩冒而顛疾其不及則令人胸痛引背下則兩脅胠滿太過肝氣實則怒視眩冒悶氣上為顛疾不及肝氣不流故脅痛胠滿也夏脈者心也南方火也萬物之所以盛長也故其氣來盛去衰曰鉤即前曲後居來疾去遲也反此者病其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病在中太過則令人身熱而膚痛為浸淫不及則令人煩心上見咳唾下為氣泄心脈太過則身熱而膚痛浸淫流布而痛不及為心煩咳唾下則氣泄秋脈者肺也西方金也萬物之所以收成也故其氣來輕虛以浮來急去散故曰浮反此者病其氣來毛而中央堅兩旁虛此謂太過病在外其氣來毛而微此謂不及病在中太過則令人逆氣背痛慍慍然不及則令人喘呼吸少氣而咳上氣見血下聞病音上見血喘而咯血下聞病音復又咳嗽也冬脈者腎也北方水也萬物之所以合藏也故其氣來沉以搏曰營反此者病其氣來如彈石此謂太過病在外其去如數此謂不及病在中太過則令人懈㑊懈倦也似熱不熱似寒不寒似弱不弱似強不強無可名狀謂之懈㑊病也脊脈痛而少氣不欲言其不及則令人心懸如病飢䏚中清脊中痛少腹滿小便變䏚中季脅之下俠脊兩旁空軟處也腎外當䏚故曰䏚清清冷也脊中兩腎之中少腹䏚之前小腹滿腎氣不行也故小便變或赤或澀也帝曰脾脈獨何主曰脾脈者土也孤藏以灌四旁者也善者不得見惡者可見脾寄旺於四季故善不可見惡可見其來如水之流此為太過病在外如鳥之啄此謂不及病在中太過則令人四肢不舉不及則令人九竅不通中氣不足不能灌溉於四旁則五臟不和故九竅不通也平人氣象篇曰欲知太過與不及寸口之脈中手短者曰頭痛寸口脈中手長者曰足脛痛寸口脈中手促上擊者曰肩背痛寸口脈沉而堅者曰病在中寸口脈浮而盛者曰病在外寸口脈沉而弱曰寒熱及疝瘕少腹痛寸口脈沉而橫曰脅下有積腹中有橫積痛寸口脈沉而喘曰寒熱脈盛滑堅者曰病在外脈小實而堅者病在內脈小弱以澀謂之久病脈滑浮而疾者謂之新病脈急者曰疝瘕少腹痛脈滑曰風脈澀曰痹緩而滑曰熱中盛而緊曰脹尺脈緩澀謂之解㑊安臥脈盛謂之脫血尺澀脈滑謂之多汗尺寒脈細謂之後泄脈尺粗常熱謂之熱中婦人手少陰脈動甚者孕子也少陰在掌後陷中當小指而應手者也動謂動也經脈別論曰陰搏陽別謂之有子經脈別論篇曰食入於胃濁氣歸心淫精於脈脈氣流經精氣歸肺肺朝百脈輸精於皮毛毛脈合精行氣於腑腑精神明留於四臟氣歸於權衡權衡以平氣口成寸以決死生氣口乃手太陰肺脈為脈之大會百脈盡朝故以其分決死生是成寸口脈法寸關尺三部是也飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也水精布經五臟四時俱以常度不相失也平人氣象篇曰人以水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真藏脈不得胃氣也所謂脈不得胃氣者肝不弦腎不石也石弦而曰不謂不似微弦微石之和也五臟仿此玉機真藏論曰見真藏曰死何也岐伯曰五臟者皆稟氣於胃胃者五臟之本也藏氣者不能自致於手太陰必因於胃氣乃至於手太陰也故五臟各以其時自為自為其狀而至太陰而至於手太陰也故邪氣勝者精氣衰也故病甚者胃氣不能與之俱至於手太陰故真藏之氣獨見者病勝藏也故曰死高保衡新校正云真藏脈者無餘物和雜故名真也如弦是肝脈若微弦則和而有胃氣微弦二分胃氣一分弦氣故曰微弦若三分俱弦則為真藏脈矣脈要精微篇曰心脈搏堅而長當病舌卷不能言其耎而散者當消環自已肺脈搏堅而長當病唾血其耎而散者當病灌汗至令不復發散也肝脈搏堅而長色不青當病墜若搏若搏或墜或擊傷而搏也因血在脅下令人喘逆其耎而散者色澤當病溢飲溢飲者渴暴多飲而溢入肌皮腸胃之外也胃脈搏堅而長其色赤當病折髀髀抵伏兔故病如折也其耎而散者當病食痹脾脈搏堅而長其色黃當病少氣其耎而散色不澤者當病足䯒腫若水狀也腎脈搏堅而長其色黃而赤者當病折腰其耎而散者當病少血至令不復也搏堅皆為太過軟而散皆為不及五臟各因太過不及而病也陰陽別論篇曰脈有陰陽知陽者知陰知陰者知陽凡陽有五五五二十五陽所謂陰者真藏也見則為敗敗必死也所謂陽者胃脘之陽也別於陽者知病處也別於陰者知死生之期三陽在頭三陰在手所謂一也汪心谷云陰者五臟之陰也陽者胃之陽氣也二十五陽一歲五臟脈變各經陽氣有五合為二十五也三陽三陰手足三陽三陰經也一同也夫經脈者由於胃氣衝灌而行貫乎四時曰春弦夏鉤秋毛冬石兼微曰平如胃之陽氣少者曰病以寸尺候其病處或在腎在腹在膻中之類若胃之陽氣已絶不能與脈俱至於手之太陰而五臟之陰氣獨見見則為敗敗必死也其死必於所不勝之期如肝見庚辛心見壬癸脾見甲乙肺見丙丁腎見戊己故曰知死生之期王氏及素問鈔皆以人迎氣口牽強注釋於理益晦知者審之凡持真脈之藏脈者肝至懸絶急十八日死汪氏真脈之臟脈者謂真臟脈之至數以分五臟之屬也至脈之應也懸絶止絶也急徑也十八肝臟之得數也日日乾庚辛是也脈絶死於所不勝之期凡脈至流行內應五臟肝心脾肺腎之氣外應先天五行水一火二木三金四土五之數故脈五至為小息五十至為一大息若五十至之中有胃氣無止絶曰平無胃氣兼止絶有常數者曰死凡脈止絶法以至絶至復數起周五臟而得其餘數則應所屬之臟氣已絶至於所不勝之期日而死肝至十八日死者除五臟三五一十五餘三屬木內應於肝故知肝氣已絶庚辛日乾為死之期也心至懸絶九日死肝至十八加心至九數共二十七數除五臟五周五五二十五餘二屬火內應於心故知心氣已絶壬癸日乾為死之期也肺至懸絶十二日死肝心已共二十七數加肺十二數共合三十九數除五臟七周五七三十五數餘四屬金內應於肺故知肺氣已絶丙丁日乾死之期也腎至懸絶七日死肝心肺已共三十九數加腎七數共合四十六數除五臟九周五九四十五數餘一屬水內應於腎故知腎氣已絶戊己日乾死之期也脾至懸絶四日死肝心肺腎已共四十六數加脾四數共合五十大衍之數五臟十周終數而止為天五屬土內應乎脾故知脾氣已絶甲乙日乾死之期也脈訣云五十不止身無病數內有止皆知定亦此義也脈要精微篇岐伯曰反四時者有餘為精不足為消精增進也消消滅也脈有陰陽盛衰四時有餘不足之應人迎氣口是也應太過不及為精應不足有餘為消陰陽不相應病名曰關格當大而細當細而大謂之反四時當不足反應有餘為精當有餘反應不足為消此則為精至於有餘為消至於不足者也春夏陰氣消滅寸口主陰當應不足而反應之太過是不及者反為精進也春夏陽氣增進人迎主陽當應有餘而反應之不足是有餘者反為消滅也故曰應不足有餘為消陰陽不相應即人迎之陽脈而反應之不足氣口之陰脈而反應之有餘故曰陰陽不相應病名曰關格關主不得便溺格主吐逆是也六節藏象篇曰人迎一盛一倍也病在少陽二盛病在太陽三盛病在陽明四盛以上為格陽人迎為足陽明胃脈動在結喉兩旁比之寸口盛一倍者病在少陽盛二倍者病在太陽盛三倍者病在陽明四倍以上陽盛之極故格拒而食不得入所謂格則吐逆者是也寸口一盛病在厥陰二盛病在少陰三盛病在太陰四盛以上為關陰寸口為手太陰肺經動脈穴出經渠比之人迎盛一倍者病在厥陰盛二倍者病在少陰盛三倍者病在太陰四盛以上陰盛之極故關閉而溲不得通也人迎與氣口俱盛四倍以上為關格關格之脈羸不能極於天地之精氣則死矣不能極於天地之精氣不得天地陰陽之中正也如北極之處乎中故曰極也至真要大論篇曰脈從而病反者其診何如岐伯對曰脈至而從按之不鼓諸陽皆然曰諸陰之反其脈何如曰脈至而從按之鼓甚而盛也此言病熱而脈敝按之不鼓手乃陰盛格陽而致之非熱也諸陽然也病寒脈按之鼓擊手下而盛者乃陽盛拒陰而然非寒也脈要精微篇曰粗大者陰不足陽有餘為熱中也來疾去徐上實下虛為厥顛疾來徐去疾上虛下實為惡風也故中惡風者陽氣受也有脈俱沉細數者少陰厥也沉細數散者寒熱也浮而散者為眴僕浮為虛散為不足故頭眩而仆倒也諸浮不躁者皆在陽則為熱其有躁者在手熱在手之三陽也諸細而沉者皆在陰則為骨痛其有靜者在足病在足之三陰經諸過者切之澀者陽氣有餘也陽有餘故血少滑者陰氣有餘也陰有餘故血多陽氣有餘為身熱無汗陰氣有餘為多汗身寒陰陽有餘則無汗而寒推而外之內而不外有心腹積也內外脈經之兩旁內而不外侵外也推而內之外而不內身有熱也脈侵外為陽氣有餘故身熱推而上之上而不下腰足清也脈湧上出為陽氣在上故足冷也推而下之下而不上頭項痛也脈在下是陰氣有餘故頭痛按之至骨脈氣少者腰脊痛而身有痹也平人氣象篇曰病熱而脈靜泄而脈大脫血而脈實病在中脈虛病在外脈澀堅者皆難治此病脈虛實相反者曰難治脈盛滑堅者曰病在外脈小實而堅者病在內盛滑為陽病在外小實為陰病在內脈小弱以澀謂之久病脈滑浮而疾者謂新病小弱以澀為血氣虛故為久病浮滑而疾為陽氣足故為新病三部九候篇帝曰決死生奈何岐伯曰形盛脈細少氣不足以息者危形瘦脈大胸中多氣者死形氣相得者生參伍不調者病三部九候皆相失者死上下左右之脈相應如參舂者病甚上下左右相失不可數者死此皆言失常候者病相失不可數者死數之極也中部之候雖獨調與衆臟相失者死中部之候相減者死目內陷者死獨調至數勻也衆臟相失言皆不應也相減者減於上下謂其偏少也帝曰何以知病之所在岐伯曰察九候獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病相失之候凡有七診者此也參伍不調隨其獨異者言病耳以左手足上上去踝五寸按之庶右手足當踝而彈之其應過五寸以上蠕蠕然者不病其應疾中手渾渾然者病中手徐徐然者病其應上不能至五寸彈之不應者死此言足陽明胃經衝陽之脈診之以決生死以左手足上上去踝五寸按之謂以自手而診足上之脈也庶次也次以右手診其右足彈之按而動移也尋其脈之有無也其應手上不能至五寸者死王注手足踝上皆有動脈蓋差誤也必先知經脈然後知病脈經脈四時胃氣之脈凡診必先察胃氣然後察病脈脫肉身不去者死形肉瘦脫身體不能動移者主死形肉已脫九候雖調猶死七診雖見九候皆從者不死形肉脫瘦九候調亦死也然四時之氣順七診互見不死必審其所始病與今之所方病而後各切循其脈視其經絡浮沉以上下逆從循之其脈疾者不病其脈遲者病脈不往來者死精神去胃氣絶皮膚著者死骨枯乾也通評虛實論曰脈實滿手足寒頭熱何如岐伯曰春秋則生冬夏則死春秋月建為三陽司天而應頭之三陽經屬陽而主熱也三陰在泉而應手足陰經宜得陰氣而寒也脈實滿為陽邪之實宜通身壯熱陽證相應斯為順也今頭熱而手足寒者其在春秋亦應時為順也冬夏月建三陰司天而三陽在泉當頭寒而手足熱故冬夏為逆則主死也亦如南北政歲當三陽司天三陰在泉宜寸大而尺細歲當三陰司天三陽在泉宜寸小而尺大亦此義也色診篇第六脈要精微篇帝曰夫精明五色者氣之華也赤欲如帛裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼五色精微之象見矣其壽不久也五臟生成篇曰色見青如草茲者死黃如枳實者死色青黃也黑如炲煤也者死赤如衃血者死敗惡凝聚之血是也白如枯骨者死此五色之見死者也青如翠羽者生赤如鵝冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生此五色之見生者也生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝蔞實生於腎如以縞裹紫此五臟所生之外榮也玉機真藏篇帝曰吾得脈之大要天下至數五色脈變揆度奇恆道在於一神轉不回回則不轉乃失其機得脈之大要天下之至極之術數何也五色合五臟之脈應時而變揆度奇恆道在於一而不二也莫非其神乎神轉不回回則不轉乃失其機亦神去則機息之義同也臟象篇第七六節臟象篇黃帝問曰臟象何如岐伯對曰心者生之本神之處也其華在面其充在血脈為陽中之太陽通於夏氣肺者氣之本魄之處也其華在毛其充在皮為陽中之太陰通於秋氣腎者主蟄封藏之本精之處也其華在發其充在骨為陰中之少陰通於冬氣肝者罷極之本魂之居也其華在爪其充在筋以生血氣其味酸其色蒼此陽中之少陽通於春氣脾胃大腸小腸三焦膀胱者倉廩之本營之居也名曰器能化糟粕轉味而出入者也其華在唇四白其充在肌此至陰之類通於土氣凡十一臟取決於膽也後當云脾者倉廩之本營之居也支氏曰自脾及胃大小腸膀胱云者乃兼統論也金匱真言論帝曰五臟應四時各有收受乎岐伯對曰東方青色入通於肝開竅於目藏精於肝其病發驚駭其味酸其類草木其畜雞巽方雞其穀麥五穀之長其應四時上為歲星木之精氣上為歲星十二年一周天是以春氣在頭也萬物發榮上故在頭也其音角其數八成數八也其臭臊是以知病之在筋也其在聲為呼其變動為握在志為怒怒傷肝悲勝怒風傷筋燥勝風酸傷筋辛勝酸南方赤色入通於心開竅於耳手少陰之絡會於耳藏精於心其病在五臟其味苦其類火其畜羊其谷黍黍赤色其應四時上為熒惑星火之精氣上為熒惑七百四十日一周天是以知病之在脈也其音徵其數七成數七也其臭焦其在聲為笑在變動為憂在志為喜喜傷心恐勝喜熱傷氣寒勝熱苦傷氣咸勝苦中央黃色入通於脾開竅於口藏精於脾故病在舌本其味甘其類土其畜牛其谷稷色黃味甘其應四時上為鎮星土之精氣上為鎮星二十八年一周天是以知病之在肉也其音宮其數五其臭香在聲為歌在變動為噦在志為思思傷脾怒勝思思傷肉風勝濕甘傷肉酸勝甘西方白色入通於肺開竅於鼻藏精於肺故病在背其味辛其類金其畜馬乾為馬其谷稻色白其應四時上為太白星金之精氣上為太白星三百六十五日一周天是以知病之在皮毛也其音商其數九成數九其臭腥其在聲為哭在變動為咳在志為憂憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛北方黑色入通於腎開竅於二陰藏精於腎故病在溪其味鹹其類水其畜彘亥為豕其谷豆黑色其應四時上為辰星水之精氣上為辰星三百六十五日一周天是以知病之在骨也其音羽其數六成數六其臭腐其在聲為呻在變動為栗在志為恐恐傷腎思勝恐寒傷血燥勝寒咸傷血甘勝咸靈蘭祕典篇帝曰願聞十二藏相使貴賤何如岐伯對曰心者君主之官也神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉膻中者臣使之官喜樂出焉脾胃者倉廩之官五味出焉大腸者傳導之官變化出焉小腸者受盛之官化物出焉腎者作強之官伎巧出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣凡此十二官不得相失也故主明則下安以此養生則壽歿世不殆以為天下則大昌主不明則十二官危使道閉塞而不通形乃大傷以此養生則殃以為天下者其宗大危戒之戒之經度篇第八血氣形志篇曰夫人之常數太陽常多血少氣少陽常少血多氣陽明常多血多氣少陰常少血多氣厥陰常多血少氣太陰常多氣少血此天之常數人身之經絡氣血多少與天道寒熱盛衰相應氣為陽而配乎熱血為陰而配乎寒夫太陽為天之六氣斯時天氣寒盛而熱衰應人手足太陽二經多血而少氣少陽為天之三氣斯時天氣熱盛而寒衰應人手足少陽二經少血而多氣陽明為天之五氣斯時天氣先熱而後寒應人手足陽明二經多氣而多血少陰為天之二氣斯時天氣寒少而熱多應人手足少陰二經少血而多氣厥陰為天之初氣斯時天氣寒盛而熱衰應人手足厥陰二經多血而少氣太陰為天之四氣斯時天氣熱盛而寒衰應人手足太陰二經多氣而少血故曰天道之常數云爾足太陽與少陰為表裡少陽與厥陰為表裡陽明與太陰為表裡是為足之陰陽也手太陽與少陰為表裡少陽與心主為表裡陽明與太陰為表裡是為手之陰陽也陰陽離合篇帝曰願聞三陰三陽之離合也岐伯曰聖人南面而立前曰廣明後曰太衝南方丙丁火位陽氣盛明故曰廣明廣大也嚮明而治故聖人南面而立然在人身中則心臟在南故謂前曰廣明衝脈在北故後謂太衝然太衝者腎脈與衝脈合而盛大故曰太衝太衝之地名曰少陰少陰之上名曰太陽腎臟為陰膀胱腑為陽陰氣在下陽氣在上此為表裡合一之經氣太陽根起於至陰結於命門名曰陰中之陽太陽居少陰之地故曰陰中之陽中身而上名曰廣明廣明之下名曰太陰身之上曰廣明身之下曰太陰又曰心臟下則太陰脾臟是也太陰之前名曰陽明陽明胃脈行脾脈之前太陰脾脈行胃脈之後陽明根起於厲兌名曰陰中之陽陽明居太陰之前故曰陰中之陽厥陰之表名曰少陽少陽居厥陰之表為陰中之少陽少陽根起於竅陰名曰陰中之少陽是故三陽之離合也離謂別離應用合為配合於陰別離則正位於三陽配合則表裡為臟腑太陽為開陽明為闔少陽為樞太陽司動靜之機故為開陽明執禁固之權故為闔少陽司動靜之微故為樞三經者不得相失也搏而勿浮命曰一陽搏而勿浮為有胃氣之脈也既有胃氣則三陽齊一而不相失也故命曰一陽願聞三陰何如岐伯曰外者為陽內者為陰然則中為陰中則內也其衝在下名曰太陰衝脈在脾之下故言在下皆言臟位及經脈之次也太陰根起於隱白名曰陰中之陰太陰之後名曰少陰脾臟之下近後則腎之位太陰脈起於大指端少陰脈起於小指下少陰根起於湧泉名曰陰中之少陰少陰之前名曰厥陰厥陰根起於大敦名曰陰中之絶陰是故三陰之離合也太陰為開厥陰為闔少陰為樞三經者不得相失博而勿沉名曰一陰厥者盡也陰至此而盡故曰陰中之絶陰胃臟之前近肝之位厥陰脈交出太陰之後搏而勿沉不至於弱伏是亦胃氣之脈者也經脈篇手太陰肺經之脈起於中焦下絡大腸還循胃口上鬲屬肺從肺系橫出腋下循臑內行少陰心主之前循臂內上骨下廉入寸口上魚際循魚際出大指之端其支者從腕後出次指內廉出其端手陽明大腸經之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉循臑外前廉上肩出髃骨之前廉上出柱骨之會於大椎下入缺盆絡肺下鬲屬大腸其支別者從缺盆上頸貫頰入下齒縫中還出俠口交人中左之右右之左上俠鼻孔足陽明胃之脈起於鼻交頞中旁約大腸之脈下循鼻外入上齒中還出俠口環唇下交承漿卻循頤下後廉出大迎循頰車上耳前過客主人循髮際至額顱其支別者從大迎前下人迎循喉嚨入缺盆下鬲屬胃絡脾其直者從缺盆下乳內廉下俠臍入氣衝其支者起胃口下循腹裡下至氣衝而合以下髀關抵伏免下入膝臏中下循胻外廉下足跗入中指內間其支者下膝三寸而別以下入中指外間其支者別跗上入大指間出其端足太陰脾經之脈起於大指之端循指側白肉際過核骨後上內踝前廉上腨內循䯒骨後交出厥陰之前上循膝股內前廉入腹屬脾絡胃上鬲挾咽連舌本散舌下其支別者復從胃別上鬲注心中手少陰心經之脈起於心中出屬心系下鬲絡小腸其支者從心系俠咽系目其直者復從心系卻上肺出腋下下循臑肉後廉行太陰心主之後下肘內廉循臂內後廉抵掌後兌骨之端入掌內後廉循小指之內出其端手太陽小腸經之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外廉出肩解繞肩胛交肩上入缺盆絡心循咽下鬲抵胃屬小腸其支別者從缺盆循頸上頰至目鋭眥卻入耳中其支者別循頰上䪼抵鼻至目內眥足太陽膀胱經之脈起於目內眥上額交巔上其支別者從巔至耳上角其直行者從巔入腦還出別下項循肩膊後俠脊抵腰中入循膂絡腎屬膀胱其支別者從腰中下貫臀入膕中其支別從膊內左右別下貫胛俠脊內過髀樞循髀外從後廉下合膕中以下貫腨內出外踝之後循京骨至小指外側端足少陰腎經之脈起於足小指之下斜趨足心出然谷之下循內踝之後別入跟中上腨內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝鬲入肺中循喉嚨挾舌本其支者從肺出絡心注胸中手厥陰心包絡之脈起於胸中出屬心包下鬲歷絡三焦其支者循胸出脅下腋三寸上抵腋下下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支別者從掌中循小指次指出其端手少陽三焦經之脈起於小指次指之端上出兩指之間循手表腕出臂兩骨之間上貫肘循臑外上肩交出足少陽之後入缺盆布膻中散絡心包下鬲循屬三焦其支者從膻中上出缺盆上項挾耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中卻出至目鋭眥足少陽膽經之脈起於目鋭眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出少陽之後入缺盆其支者從耳後入耳中出走耳前至目鋭眥後下大迎合手少陽於䪼下臨頰車下頸合缺盆下胸中貫鬲絡肝屬膽循脅裡出氣沖下毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀外出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗之上入小指次指之間其支別者別跗上入大指循歧骨內出其端還貫入爪甲出三毛足厥陰肝經之脈起於大指聚毛之上循足胕上廉去內踝一寸上踝三寸交出太陰之後上膕內廉循股入陰中環陰器抵少腹挾胃屬肝絡膽上貫鬲布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫鬲上注肺督脈起於下極之餘並於脊裡上至風府入腦上巔循額至鼻柱屬陽脈之海任脈起於中極之下以上毛際循腹裡上關元至喉嚨屬陰脈之海運氣篇第九六節藏象篇黃帝問曰余聞天以六六之節以成一歲人以九九制會計人有三百六十五節以為天地久矣不知其謂也六六謂六甲之日以成一歲之節限九九制會謂九同於九野之數以制人形之會通也岐伯對曰昭乎哉問也請遂言之夫六六之節九九制會者所以正天之度氣之數也六六之節天之度也九九之制會天之數也所謂氣數者生成之氣也周天之分凡三百六十五度四分度之一以十二節氣均之則氣有三百六十日而終兼之小月日又不足其數矣是以六十四氣而常置閏焉何者以其積差分故也天地之生育本祖於陰陽人神之運用為始終於九氣律書曰黃鐘之律管長九寸冬至之日氣應灰飛由此則萬物之生咸因於九氣矣天度者所以制日月之行也氣數者所以紀生化之用也制謂準度紀謂紀綱準日月之行度者所以明日月之行遲速世紀化生之為用者所以彰氣至而斯應也氣應無差則生成之理不替遲速以度大小之月生焉故日異長短月移寒暑收藏生長無失時宜也天為陽地為陰日為陽夜為陰行有分紀周有道理日行一度月行十三度而有奇焉故大小月三百六十五日而成歲積氣余而盈閏矣日行遲故晝夜行天之一度而三百六十五日一周天而猶有度之奇分矣月行速故晝夜行天之十三度余而二十九日一周天也言有奇者謂十三度外復行十九分度之七故云月行十三度而有奇也書曰期三百有六旬有六日以閏月定四時成歲則其義也積余盈閏者蓋以月之大小不盡天度故也立端於始表正於中推余於終而天度畢矣端首也始初也表彰示也正鬥建也中月半也推退位也言立首氣於初節之日示鬥建於月半之辰退餘閏於相望之後是以閏之前則氣不及月閏之後則月不及氣故常月之制建初立中閏月之紀無初無中縱歷有之皆他節氣也故歷無雲其候閏某月節閏某月中也推終之義斷可知乎故曰立端於始表正於中推余於絡也由斯推日成閏故能令天度畢焉天有十日日六竟而周甲甲六復而終歲三百六十日法也十日謂甲乙內丁戊己庚辛壬癸之日也十者天地之至數也易曰天九地十是也六十日而周甲子之數甲子六周而復始則終一歲之日是三百六十日之歲法非天度之數也此蓋十二月各三十日者若除小月其日又差之也帝曰夫子言積氣盈閏願聞何謂氣岐伯曰五日謂之候三候謂之氣六氣謂之時四時謂之歲而各從其主治焉各從其主治謂一歲之日各歸從五行之一氣而為之主以旺也故下文曰云云五運相襲而皆治之終期之日周而復始時立氣布如環無端候以同法故曰不知年之所加氣之盛衰虛實之所起不可以為工矣曰五運之始如環無端其太過不及何如曰五運更立各有所勝盛虛之變此其常也曰平氣何如曰無過者也曰太過不及奈何曰在經有也曰何謂所勝曰春勝長夏長夏勝冬冬勝夏夏勝秋秋勝春所謂得五行時之勝各以氣命其臟曰何以知其勝曰求其至也皆歸始春未至而至此謂太過則薄所不勝而乘所勝也命曰氣淫不分邪僻內生工不能禁至而不至此謂不及則所勝妄行而所生受病所不勝薄之也命曰氣迫所謂求其至者氣至之時也凡氣之至皆謂立春前十五日乃候之初也未至而至謂所直之氣未應至而先期至也先期而至是氣有餘故曰太過至而不至謂所直之氣應至不至而後期至後期而至是氣不足故曰不及太過則薄所不勝而乘所勝不及則所勝妄行而所生受病所不勝薄之也凡五行之氣我克者為所勝克我者為所不勝生我者為所生假令肝木有餘是肺金不足金不制木故木太過木氣既余則反薄肺金而乘於脾土矣此皆五臟之氣內相淫併為疾故命曰氣淫也余太過例同又如肝木氣少不能制土土氣無畏而遂妄行水被土凌故云所勝妄行而所生受病也肝木之氣不平肺金之氣自薄故曰所不勝薄之然木氣不平土金交薄相迫為疾故曰氣迫也余不及皆同例謹候其時氣可與期失時反候五治不分邪僻內生工不能禁曰有不襲乎岐伯曰蒼天之氣不得無常也氣之不襲是謂非常非常則變矣曰非常而變奈何曰變至則病所勝則微所不勝則甚汪氏曰變者非常也至氣至也所勝我克彼也所不勝彼克我也重復也時六氣之時也此言六氣失序而邪有微甚之殊夫六氣者主氣是也初氣厥陰風木二君火三相火四濕土五燥金六寒水由初逮終以應六六之氣是氣相襲而順否為逆而且病焉如初病厥陰風木司令若風氣弗應而變濕氣大行者邪屬太陰土也木能剋土乃所不勝者故邪為微若風木之氣弗應而變燥氣大行者邪屬陽明金也金來剋木乃所不勝者故邪為甚是在丁年謂之重感經曰乘年之虛則邪甚也失守之和亦邪甚也因而重感於邪則病危矣夫丁屬陰乾從化為不及木運不及則不勝之燥金凌之然木內應於肝而肝以感年運所不勝之邪於時重感之矣是一歲而受二傷故曰重感於邪則死矣若丁木不及之年燥金之變不當風木之時者亦為微邪故曰非時則微當時則甚余仿此王注謂直年至後二三四五歲病豈理也哉天元紀論篇帝曰五運相襲而皆治之終期之日周而夏始余已知之矣願聞其與三陰三陽之候奈何合之鬼臾區曰夫五運陰陽者天地之道也萬物之紀綱變化之父母生殺之本始神明之府也可不通乎故物生謂之化物極謂之變陰陽不測謂之神神用無方謂之聖夫變化之為用也在天為玄在人為道在地為化化生五味道生智玄生神神在天為風在地為木在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水此五行變化以應天地運氣之理與陰陽應象頗同故在天為氣在地成形形氣相感而化生萬物矣然天地者萬物之上下也左右者陰陽之道路也水火者陰陽之徵兆也金木者生成之始終也氣有多少形有盛衰上下相召而損益彰矣曰何謂氣有多少形有盛衰氣謂風熱燥濕寒形謂木火土金水曰陰陽之氣各有多少故曰三陰三陽也形有盛衰謂五行之治各有太過不及也故其始也有餘而往不足隨之不足而往有餘從之知迎知隨氣可與期應天為天符承歲為歲直三合為治應天為木運之歲上見厥陰火運之歲上見少陽少陰土運之歲上見太陰金運之歲上見陽明水運之歲上見太陽此五者天氣下降如合符運故曰應天為天符也承歲謂木運之歲歲當亥卯火運之歲歲當寅午土運之歲歲當辰戌丑未金運之歲歲當巳酉水運之歲歲當申子此五者歲之所宜故曰承歲為歲直也三合謂火運之歲上見少陰年辰臨午土運之歲上見太陰年辰臨丑未金運之歲上見陽明年辰臨酉此三者天氣運氣與年辰俱會故云三合為治也歲治亦曰歲位三合亦為天符六微旨論曰天符歲會曰太乙天符謂天運與歲相會帝曰上下相召奈何鬼臾區曰寒暑燥濕風火天之陰陽也三陰三陽上奉之木火土金水火相火地之陰陽也生長化收藏下應之天以陽生陰長地以陽殺陰藏天有陰陽地亦有陰陽故陽中有陰陰中有陽所以欲知天地之陰陽者應天之氣動而不息故五歲而右遷應地之氣靜而守位故六期而環會天有六氣地有五位天以六氣臨地地以五位承天蓋以天氣不加君火故也以六加五即五歲而餘一氣故遷一位若以五承六則常六歲乃備盡天元之氣故六歲而環會所謂周而復始也地氣左行往而不返天氣東轉常自火運數五歲已其次氣正當君火之上法不加臨則右遷君火氣上以臨相火之上故曰五歲而右遷也由斯動靜上下相臨而天地萬物之情變化之機可見矣動靜相召上下相臨陰陽相錯而變由生也曰上下周紀其有數乎曰天以六為節地以五為制周天氣者六期為一備終地紀者五歲為一周君火以明相火以位五六相合而七百二十氣為一紀凡三十歲千四百四十氣凡六十歲而為一周不及太過斯皆見矣君火在相火之右但立名於君位不立歲氣故天之六氣不偶其氣以行君火之正守位而奉天之命以宣行火令耳以名奉天故曰君火以名守位稟命故曰相火以位也鬼臾區曰甲己之歲土運統之乙庚之歲金運統之丙辛之歲水運統之丁壬之歲木運統之戊癸之歲火運統之帝曰其於三陰三陽合之奈何曰子午之歲上見少陰丑未之歲上見太陰寅申之歲上見少陽卯酉之歲上見陽明辰戌之歲上見太陽巳亥之歲上見厥陰少陰所謂標也厥陰所謂終也厥陰之上風氣主之少陰之上熱氣主之太陰之上濕氣主之少陽之上相火主之陽明之上燥氣主之太陽之上寒氣主之所謂本也是謂六元五運行論曰丹天之氣經於牛女戊分黅天之氣經於心尾己分蒼天三氣經於危室柳鬼素天之氣經於亢氐昴畢玄天之氣經於張翼婁胃所謂戊己分者奎璧角軫則天地之門戶也戊土屬乾己土屬巽遁甲經曰六戊為天門六己為地戶晨暮占雨以西北東南義取此也雨為土用濕氣主之故曰占焉帝曰論言天地者萬物之上下左右者陰陽之道路未知其所謂也岐伯對曰所謂上下者歲上下見陰陽之所在也左右者諸上見厥陰左少陰右太陽見少陰左太陰右厥陰見太陰左少陽右少陰見少陽左陽明右太陰見陽明左太陽右少陽見太陽左厥陰右陽明所謂面北而命其位言其見也面向北而言之也上南也下北也左西也右東也帝曰何謂下岐伯曰厥陰在上則少陽在下左陽明右太陰少陰在上則陽明在下左太陽右少陽太陰在上則太陽在下左厥陰右陽明少陽在上則厥陰在下左少陰右太陽陽明在上則少陰在下左太陰右厥陰太陽在上則太陰在下左少陽右少陰所謂面南而命其位言其見也主歲者位在南故面北而言其左右在下者位在北故面南而言其左右也上天位也下地位也面南左東也右西也上下異而左右殊也上下相遘寒暑相臨氣相得則和不相得則病曰相得而病者何也曰以下臨上不當位也間氣何如岐伯曰隨氣所在期於左右於左右尺寸四部分位承之以知應與不應過與不過也曰期之奈何曰從其氣則和逆其氣則病逆謂當浮不浮當沉不沉至真要論曰厥陰之至其脈弦少陰之至其脈鉤太陰之至其脈沉太陽之至大而浮陽明之至短而澀少陽之至大而長至而和則平至而甚則病至而反則病至而不至者病未至而至者病陰陽易者危不當其位者病見於他位也迭移其位者病謂左見右脈右見左脈氣差錯故耳失守其位者危已見於他鄉本宮見賊殺之氣尺寸反者死子午卯酉四歲有之反謂歲當陰在寸而反見於尺歲當陽在尺而反見於寸尺寸俱反乃謂反也若尺獨然或寸獨然是不應氣非反也陰陽交者死先立其年以知其氣左右應見然後乃可以言生死之逆順陰陽交寅申巳亥辰戌丑未八年有之交謂歲當陰在右脈反見左歲當陽在左脈反見右左右交見是謂交若左獨然或右獨然是不應之氣非交也至真要論篇曰夫子言察陰陽所在而調之論言人迎與寸口相應若引繩大小齊等命曰平陰之所在寸口何如岐伯對曰視歲南北可知之矣曰願卒聞之曰北政之歲少陰在泉則寸口不應厥陰在泉則右不應太陰在泉則左不應南政之歲少陰司天則寸口不應厥陰司天則右不應太陰司天則左不應諸不應反其診則見矣曰尺候何如曰北政之歲三陰在下則寸不應三陰在上則尺不應南政之歲三陰在天則寸不應三陰在泉則尺不應左右同故曰知其要者一言而終不知其要流散無窮此之謂也帝曰主歲何如岐伯對曰氣有餘則制己所勝而侮所不勝其不及則己所不勝侮而乘之己所勝輕而侮之侮反受邪寡於畏也六微旨篇帝曰願聞天道六六之節盛衰何也岐伯對曰上下有位左右有紀故少陽之右陽明治之陽明之右太陽治之太陽之右厥陰治之厥陰之右少陰治之少陰之右太陰治之太陰之右少陽治之此所謂氣之標蓋南面而待之也少陽之上火氣治之中見厥陰陽明之上燥氣治之中見太陰太陽之上寒氣治之中見少陰厥陰之上風氣治之中見少陽少陰之上火氣治之中見太陽太陰之上濕氣治之中見陽明所謂本也本之下中之見也見之下氣之標也標本不同氣應異象曰其有至而至有至而不至有至而太過何也曰至而至者和至而不至來氣不及也未至而至來氣有餘也曰至而不至未至而至何如曰應則順否則逆逆則變生變生則病至真要論帝曰勝復之動時有常乎氣有必乎岐伯曰時有常位而氣無必也曰願聞其道曰初氣終三氣天氣主之勝之常也四氣盡終氣地氣主之復之常也有勝則復無勝則否帝曰復已而勝何如曰勝至則復無常數也衰乃止耳復已而勝不復則害此傷生也曰復而反病何也曰居非其位不相得也大復其勝則主勝之故反病也所謂火燥熱也帝曰治之奈何曰夫氣之勝也微者隨之甚者制之氣之復也和者平之暴者奪之皆隨勝氣安其屈伏無問其數以平為期此其道也帝曰氣之上下何謂也曰身半以上其氣三矣天之分也天氣主之身半以下其氣三矣地之分也地氣主之以名命氣以氣命處而言其病半則所謂天樞也身半謂臍中也所謂天樞也天樞穴當臍兩旁同身寸之二寸其氣三者假如少陰司天則上有熱中有太陽兼之三也六氣皆然司天者其氣三司地者其氣三故身半以上三氣身半以下三氣也以名言其氣以氣言其處以氣處寒熱而言其病之形證也故上勝而下俱病者以地名之下勝而上俱病者以天名之上勝下病地氣鬱也故從地郁以名地病下勝上病天氣塞也故從天塞以名天病夫以天名者方順天氣為制逆地氣而攻之以地名者方從天氣為制則可假如陽明司天少陰在泉上勝而下俱病者是拂於下而生也天氣正勝天可逆之故順天之氣方同清也少陰等司天上下勝同法所謂勝至報氣屈伏而未發也復至則不以天地異名皆如復氣為法勝至未復而病生以天地異名為式復氣以發則所生無問上勝下勝悉皆依復氣為病寒熱之主也標本篇第十標本病傳論篇帝曰病有標本刺有逆從奈何岐伯曰凡刺之方必別陰陽前後相應逆從得施標本相移故曰有其在標而求之於標有其在本而求之於本有其在標而求之於本有其在本而求之於標故治有取標而得者有取本而得者有逆取而得者有從取而得者故知逆與從正行無問知標本者萬舉萬當不知標本是謂妄行夫陰陽逆從標本之為道也小而大言一而知百病之害少而多淺而博言一而知百也以淺而知深察近而知遠言標與本易而勿及標本之道包括雖大若有志於此則亦易而可知矣世人自盡莫有能及之者治反為逆治得為從先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本先熱而後生中滿者治其標先病而後泄者治其本先泄而後生他病者治其本必且調之乃治其他病先病而後生中滿者治其標先中滿而後煩心者治其本人有客氣有同氣客氣為標本不同同氣為標本相同大小不利治其標大小利治其本病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本至真要大論篇帝曰病生於本余知之矣生於標者治之奈何岐伯曰病反其本得標之病治反其本得標之方六氣標本所從不同奈何岐伯曰氣有從本者有從標本者有不從標本者少陽太陰從本少陰太陽從本從標陽明厥陰不從標本從乎中也故從本者化生於本從標本者有標本之化從中者以中氣為化也少陽之本火太陰之本濕本末同故從本也少陰之本熱其標陰太陽之本寒其標陽本末異故從本從標陽明之中太陰厥陰之中少陽本末與中不同故不從標本從乎中也從本從標從中皆以其化生之用也汪注陽明本燥標陽中濕厥陰本風標陰惟此二經本末與中不同故治從乎中也是故百病之起有生於本者有生於標者有生於中氣者有取本而得者有取標而得者有取中氣而得者有取標本而得者有逆取而得者有從取而得者逆正順也若順逆也故曰知標與本用之不殆明知逆順正行無問此之謂也不知是者不足以言診足以亂經針刺篇第十一陰陽應象篇岐伯曰善用針者從陰引陽從陽引陰以右治左以左治右以我知彼以表知里以觀過與不及之理見微得過用之不殆從陰引陽二句言在上者治下在下者治上以我知彼欲體察也以表知里達內外也過與不及總結上文觀夫陰陽左右表裡之過與不及也善針者不待病形已具方知過與不及若微見徵兆便知其過其明如此用針豈有至危殆哉八正神明篇岐伯曰天溫日明則人血淖多也液而衛氣浮故血易瀉而氣易行天寒日陰則人血凝泣而衛氣沉月始生則氣血始精衛氣始行月郭滿則血氣實肌肉堅月郭空則肌肉減經絡虛衛氣去形獨居是以因天時而調血氣也是以天寒無刺天溫無凝月生無瀉月滿無補月郭空無治攻也是謂得時而調之因天之序盛虛之時移光定位正立而待之故月生而瀉是謂臟虛月滿而補血氣揚溢絡有留血命名重實月郭空而治是謂亂經陰陽相錯真邪不辨沉以留止外虛內亂淫邪乃起帝曰星辰八正何候岐伯曰星辰者所以制日月之行也八正者所以候八風之虛邪以時至者也四時者所以分春秋冬夏之氣所在以時調之也八正之虛邪而避之勿犯也以身之虛而逢天之虛兩虛相感其氣至骨入則傷五臟工候救之弗能傷也故曰天忌不可不知也人忌於天故云天忌帝曰善其法星辰者余聞之矣願聞法往古者岐伯曰法往古者先知針經也驗於來今者先知日之寒溫月之虛盛以候氣之浮沉而調之於身觀其立有驗也觀其冥冥者言形氣榮衛之不形於外而工獨知之觀其冥冥者言形氣榮衛之不形於外而工獨知之以日之寒溫月之虛盛四時氣之浮沉參伍相合而調之至常先見之然而不形於外故曰觀於冥冥帝曰余聞補瀉未得其意岐伯對曰瀉必用方方者以氣方盛也以月方滿也以日方溫也以身方定也以息方吸而內針乃復候其方吸而轉針乃復候其方呼而徐引針故曰瀉必用方其氣而行焉補必用員員者行也行者移也刺必中其榮復以吸排針也吸則內針無令氣忤靜以久留無令邪布吸則轉針以得氣為故候呼引針呼盡乃去大氣皆出故命曰瀉補則久留今瀉而曰靜以久留而先補者若真氣不足針乃瀉之則經脈不滿邪氣無所排遣故先補真氣令足後乃瀉出其邪矣引謂引出去謂離穴候呼而引至其門呼盡乃離穴戶則經氣審以平定邪氣無所拘留故大邪之氣隨針而出也呼謂氣出吸謂氣入轉謂轉動大氣大邪之氣謂錯亂陰陽者寶命全形篇岐伯曰凡刺之真必先治神五臟已定九候已備後乃存針衆脈不見衆凶弗聞內外相得無以形先可玩往來乃施於人人有虛實五虛勿近五實勿遠至其當發間不容瞚瞬也手動若務針耀而勻靜意視義觀適之變是謂冥冥莫知其形見其烏烏見其稷稷從見其飛不知其誰烏烏嘆其氣至稷稷嗟其已應言所針得失如從空中見飛鳥之往來豈復知其所使之元主耶是但見脈經盈虛而為信亦不知其誰之所召遣爾伏如橫弩起如發機血氣之未應針伏如橫弩之安靜其應針也則起如機發之迅速帝曰何如而虛何如而實岐伯曰刺虛者須其實刺實者須其虛經氣已至慎守勿失淺深在志遠近若一如臨深淵手如握虎無營於衆物離合真邪篇岐伯曰天地溫和則經水安靜天寒地凍則經水凝泣天暑地熱則經水沸溢卒風暴起則經水波湧而隴起夫邪之入於脈也寒則血凝泣暑則氣淖澤虛邪因而入客亦如經水之得風也經之動脈其至也亦時隴起其行於脈中循循然其至寸口中手也時大時小大則邪至小則平其行無常處在陰與陽不可為度從而察之三部九候卒然逢之早遏其路曰候氣奈何曰夫邪去絡入經也舍於血脈之中其寒溫未相得如湧波之起也時來時去故不常在故曰方其來也必按而止之止而取之無逢其沖而瀉之沖謂應水刻數之平氣也靈樞經曰水下一刻人氣在太陽水下二刻人氣在少陽水下三刻人氣在陽明水下四刻人氣在陰分然氣在太陽則太陽獨盛氣在少陽則少陽獨盛夫見獨盛者便謂邪來以針瀉之則反傷其真氣故下文云云真氣者經氣也經氣太虛故曰其來不可逢此之謂也故曰候邪不審大氣已過瀉之則真氣脫脫則不復邪氣復至而病益蓄故曰其往不可追此之謂也不可挂以發者待邪之至時而髮針瀉矣若先若後者血氣已盡其病不可下故曰知其可取如發機知其不可取如扣椎故曰知機道者不可挂以發不知機者扣之不發此之謂也帝曰不足者補之奈何岐伯曰必先捫而循之切而散之推而按之彈而怒之抓而下之通而取之外引其門以閉其神呼盡內針靜以久留以氣至為故如待所貴不知日暮其氣以至適而自護候吸引針氣不得出各在其處推闔其門令神氣存大氣留止故命曰補候吸引針大氣不泄補之為義斷可知矣推闔其門以下乃解上文三句義也大氣謂大經之氣流行營衛者也調經篇岐伯曰瀉實者氣盛乃內針針與氣俱內以開其門而利其戶針與氣俱出精氣不傷邪氣乃下外門不閉以出其疾搖大其道而利其路是謂大瀉必切而出大氣乃屈補虛者持針勿置以定其意候呼內針氣出針入針孔四塞精無從去方實而疾出針氣入針出熱不得還閉塞其門邪氣布散精氣乃得存動氣候時近氣不失遠氣乃來是謂追之離合真邪篇帝曰補瀉奈何岐伯對曰此攻邪也疾出以去盛血而復其真氣此邪新客溶溶未有定處也推之則前引之則止逆而刺之刺出其血其病立已去血須視血盛而邪擁甚故刺去其血而立已針解篇岐伯曰刺虛則實之者針下熱也氣實乃熱也滿而泄之者針下寒也氣虛乃寒也菀陳則除之者出惡血也邪盛則虛之者出針勿按徐而疾則實者徐出針而疾按之疾而徐則虛者疾出針而徐按之刺實須其虛者留針陰氣隆至乃去針也刺虛須其實者陽氣隆至針下熱乃去針也經氣已至慎守勿失者勿變更也淺深在志者知病之內外也遠近如一者淺深其候等也刺志論篇曰夫實者氣入也虛者氣出也氣實者熱也氣虛者寒也入實者右手開針空也入虛者左手閉針空也右手持針左手捻穴故實者右手開針空以瀉之虛者左手開針空以補之三部九候篇曰經病者治其經孫絡病者治其孫絡血有血留正剌而去之靈樞曰經脈為里支而橫者為絡絡之別者為孫絡是以知孫絡則絡之別支而橫者也血病身有痛者治其經絡其病者在奇邪奇邪之脈則繆刺之奇謂奇繆不偶之氣而與脈經繆處也故繆刺繆剌者剌絡脈左取右右取左也留瘦不移節而刺之上實下虛切而從之索其結絡脈刺出其血以見通之通評虛實篇帝曰春亟治經絡夏亟治經俞秋亟治六腑冬則閉塞閉塞者用藥而少針石也所謂少針石者非癰疽之謂也癰疽不得頃時回診要經終篇曰凡刺胸腹必避五臟中心者環死其動為噫中肝者五日死其動為語中脾者十日死其動為吞中腎者二日死其動為嚏中肺者三日死其動為咳中膽者一日半死其動為嘔中鬲者皆為傷中其病雖愈不過一歲必死刺避五臟者知逆從也所謂從者鬲與脾腎之處不知者反之刺胸腹者必以布𢅎著之乃從單布上刺刺之不愈復刺必肅刺腫搖針經刺勿搖此刺之道也刺禁論岐伯曰藏有要害不可不察肝生於左肺藏於右心部於表腎治於裡脾謂之使胃為之市鬲肓之上中有父母父母心肺陰陽是也七節之傍中有小心從之有福逆之有咎刺胕上中大脈血出不止者死跗為足跗大脈動而不止者乃胃之大經刺面中溜脈不幸為盲刺頭中腦戶入腦立死刺舌下中脈太過出血不止為喑刺足下布絡中脈血不出為腫刺郤中大脈令人僕脫色刺氣街中脈血不出為腫鼠伏如伏鼠也刺脊間中髓為傴刺乳上中乳房為腫根蝕刺缺盆中內陷氣泄令人喘逆咳刺手魚腹內陷為腫無刺大醉令人氣亂無刺大怒令人氣逆無刺大勞人無刺新飽人無刺大飢人無刺大渴人無刺大驚人靈樞經云新內無刺已剌無內大怒無剌已刺無怒大勞無剌已剌勿勞大醉無刺已刺勿醉大飽無刺已刺勿飽大飢無剌已剌勿飢大渴無刺已刺勿渴大驚大恐必定其氣乃刺之也刺陰股中大脈血出不止死刺客主人內陷中脈為內漏為聾刺膝髓出液為跛刺臂大陰脈出血多立死刺足少陰脈重虛出血為舌難以言刺膺中陷中肺為喘逆仰息刺肘中內陷氣歸之為不屈伸刺陰股下三寸內陷令人遺溺刺腋下脅間內陷令人咳刺少腹中膀胱溺出令人少腹滿刺腨腸內陷為腫刺匡目眶上陷骨中脈為漏為盲刺關節中液出不得屈伸調經論篇帝曰夫子言虛實者有十生於五臟五脈耳夫十二經脈皆生其病今夫子獨言五臟夫十二經脈者皆絡三百六十五節節有病必被經脈經脈之病皆有虛實何以合之岐伯曰五臟者故得六腑與為表裡經絡支節各生虛實其病所居隨而調之病在脈調之血病在血調之絡病在氣調之衛病在肉調之分肉病在筋調之筋病在骨調之骨燔針劫刺其下及與急者病在骨焠針藥尉病不知所痛兩蹺為上身形有痛九候莫病則繆刺之痛在於左而右脈病者巨刺之必謹察其九候針道備矣離合真邪篇帝曰真邪以合波隴不起候之奈何岐伯對曰審捫循三部九候之盛虛而調之察其左右上下相失及相減者審其病臟以期之不知三部者陰陽不別天地不分地以候地天以候天人以候人調之中府以定三部故曰刺不知三部九候病脈之處雖有太過且至工不能禁也禁禁止也然候邪之處尚未能知復能禁止其候氣耶雖有太過之邪至於其經工亦不能用針以禁絶也誅伐無過命曰大惑反亂大經真不可復用實為虛以邪為真用針無義反為氣賊奪人正氣以從為逆榮衛散亂真氣已失邪獨內著絶人長命豫人夭殃不知三部九候故不能久長三部言人身中之有上中下三部經隊由之故察候存亡悉由於是部各有三候如上部天兩額之動脈以應手也足少陽脈氣所行上部地兩頰之動脈在鼻孔下兩旁動脈應手近巨髎之分足陽明脈氣所行上部人在前耳動脈應手少陽脈氣所行中部天在掌後寸口經渠動脈中部地在陽明合谷之分動脈中部人在少陽神門之分動脈下部天足厥陰羊矢下一寸半五里之分臥而取之動脈應手女子取太衝在足大指本節後二寸下部地足少陰太溪之分動脈下部人足太陰在魚腹上起筋間直五里下箕門之分動脈下部鞏足單衣沉取乃得至如候胃氣者當取足上衝陽之分動脈應手此二部中之三部也骨空篇第十二骨空論髓空在腦後五分顱際鋭骨之下即風府穴是也一在斷基下一在項下中復骨下一在脊骨上空在風府上脊骨下空在尻骨下空數髓空在面俠鼻或骨空在口下當兩肩兩膊骨空在膊中之陽臂骨空在臂陽去踝四寸兩骨空之間股骨上空在股陽出上膝四寸䯒骨空在輔骨之上端股際骨空在毛中動下尻骨空在髀骨之後相去四寸扁骨有滲理湊無髓孔易骨無空此言人身骨節有空則髓有孔若骨無空體亦無孔何以滲湊精微而相滋養者也凡灸關節多用此空
