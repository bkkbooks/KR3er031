body:
  text: 卷之三十七瘧證門病機內經敘論生氣通天論曰夏傷於暑秋為痎瘧痎老也夏熱已甚秋陽復收兩熱相攻故為瘧又曰魄汗未盡形弱而氣爍穴俞以閉發為風瘧禮記月令曰孟秋行夏令則民多瘧疾瘧論篇帝曰夫痎瘧皆生於風其蓄作有時者何也岐伯對曰瘧之始發也先起於毫毛伸欠乃作寒栗鼓頷腰脊俱痛寒去則內外皆熱頭痛如破渴欲飲冷帝曰何氣使然願聞其道岐伯曰陰陽上下交爭虛實更作陰陽相移也陽並於陰則陰實而陽虛陽明虛則寒栗鼓頷也巨陽虛則腰背頭項痛三陽俱虛則陰氣勝陰氣勝則骨寒而痛寒生於內故中外皆寒陽盛則外熱陰虛則內熱外內皆熱則喘而渴故欲冷飲也此皆得之夏傷於暑熱氣盛藏於皮膚之內腸胃之外此榮氣之所舍也又云腠理開因得秋氣汗出遇風及得之以浴水氣舍於皮膚之間與衛氣並居衛氣者晝行於陽夜行於陰此氣得陽而外出得陰而內搏內外相搏是以日作帝曰其間日而作者何也岐伯曰其氣之舍深內搏於陰陽氣獨發陰邪內著陰與陽爭不得出是以間日而作也帝曰善其作日晏與其日早者何氣使然岐伯曰邪氣客於風府循膂而下衛氣一日一夜大會於風府其明日日下一節故其作也晏此先客於脊背也每至於風府則腠理開腠理開則邪氣入邪氣入則病作以此日作稍益晏也其出於風府日下一節二十五日下至骶骨二十六日入於脊內注於伏膂之脈其氣上行九日出於缺盆之中其氣日高故作日益早也其間日發者由邪氣內搏於五臟橫連募原也其道遠其氣深其行遲不能與衛氣俱行不得皆出故間日乃作也帝曰衛氣每至於風府腠理乃發發則邪氣入入則病作今衛氣日下一節其氣之發也不當風府其日作者奈何岐伯曰此邪氣客於頭項循膂而下者也故虛實不同邪中異所則不得當其風府也故邪中於頭項者氣至頭項而病中於背者氣至背而病中於腰脊者氣至腰脊而病中於手足者氣至手足而病衛氣之所在與邪氣相合則病作故風無常府衛氣之所發必開其腠理邪氣之所合則其府也帝曰風之與瘧也相似同類而風獨常在瘧則有時而休者何也岐伯曰風氣留其處故常在瘧氣隨經絡沉以內搏故衛氣應乃作帝曰瘧先寒而後熱者何也岐伯曰夏傷於大暑其汗大出腠理開發因遇夏氣淒滄之小寒藏於脈理皮膚之中秋傷於風則病成矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧帝曰先熱而後寒者何也岐伯曰此先傷於風而後傷於寒故先熱而後寒也亦以時作名曰溫瘧其但熱而不寒者陰氣先絶陽氣獨發則少氣煩冤手足熱而欲嘔名曰疸瘧疸熱極為之也帝曰夫瘧者之寒湯火不能溫也及其熱冰水不能寒也此皆有餘不足之類當此之時良工不能止必須其自衰乃刺之其故何也岐伯曰經言無刺熇熇之熱無刺渾渾之脈無刺漉漉之汗故為其病逆未可治也夫瘧之始發也陽氣並於陰當是之時陽虛而陰盛外無氣故先寒栗也陰氣逆極則復出之陽陽與陰復並於外則陰虛而陽實故先熱而渴夫瘧氣者並於陽則陽盛並於陰則陰勝陰勝則寒陽勝則熱瘧者風寒之氣不常也病極則復病之發也如火之熱不可當也故曰方其盛時必毀因事衰也事必大昌此之謂也夫瘧之未發也陰未並於陽陽未並於陰因而調之真氣得安邪氣乃亡故工不能治其已發為其氣逆也瘧氣者必更盛更虛當氣之所在也病在陽則熱而脈躁在陰則寒而脈靜至極則陰陽俱衰衛氣相離故病得休衛氣集則復病也帝曰瘧有一二日或至數日發或渴或不渴其故何也岐伯曰其間日者邪氣邪與衛氣客於六腑而有時相失不能相得故休數日乃作也瘧者陰陽更勝也或甚或不甚或渴或不渴帝曰夏傷於暑秋必病瘧今瘧不必應者何也岐伯曰此應四時者也其病異形者反四時也其以秋病者寒甚以冬病者寒不甚以春病者惡風以夏病者多汗溫瘧候帝曰夫病溫瘧與寒瘧而皆安舍舍於何藏岐伯曰溫瘧得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外也如是者陰虛而陽盛則熱矣衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧疸瘧候帝曰疸瘧何如岐伯曰疸瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛而不衰則病矣其氣不及於陰故但熱而不寒氣內藏於心而外舍於分肉之間令人消爍脫肉故名曰疸瘧治以青皮湯白虎湯之類是也山嵐瘴瘧候巢氏病源云此病生於嶺南帶山嵐之氣其狀發寒熱休作有時皆由山溪源嶺溫毒之氣故也其病重於傷暑之瘧勞瘧巢氏云凡瘧久不瘥者則表裡俱虛客邪未散真氣不復故疾雖暫間小勞便發痰瘧候痰瘧者謂患人胸膈先有停痰結實因成瘧疾即令人心下脹滿氣逆煩嘔也嚴氏云內經謂瘧生於風又夏傷於暑此四時之氣也或乘涼飲冷當風臥濕飢飽失時致脾胃不和痰積中脘遂成此疾所謂無痰不成瘧一日一發者易治間日一發或二三日一發者難愈五臟瘧候巢氏曰心病為瘧者令人心煩其病欲飲清水多寒少熱若人本來心性和雅而急卒反於常倫或言未竟便住以手剔腳爪此人必死禍雖未及呼曰行尸此心病聲之候也虛則補之實則瀉之不可治者明而察之肝病為瘧者令人色蒼蒼然氣息喘悶戰掉狀如死者若人本來少於悲恚忽爾嗔怒出言反常乍寬乍急言未竟以手向眼如有所思若不即病禍必至矣此肝病聲之證也其人若虛則為風寒所傷若實則為熱氣所損陽則瀉之陰則補之肺病為瘧乍來乍去令人心寒寒甚則發熱善驚如有所見此肺瘧證也若人本來語聲雄忽爾不亮拖氣用力方得出言而反於常人呼共語直視不應雖曰未病勢當不久此則肺病聲之候也察觀疾表裡相應依源審治乃不失也脾病為瘧者令人寒腹中痛腸中鳴鳴已汗出若其人本來少於喜怒而忽反常瞋喜無度正言鼻笑不答於人此是脾病聲之候也不盈句月病必至也腎病為瘧者令人悽悽然腰脊痛而宛轉大便澀自掉不定手足寒若人本來不喜不怒忽然謇而好嗔怒反於常性此腎已傷雖未發覺是其候也見人未言而前開口笑還閉口不聲舉手柵腹此腎病聲之證虛實表裡浮沉清濁宜以察之逐以治之瘧有三因陳無擇云夫瘧備三因外則感四氣內則動七情飲食肌飽房室勞逸皆能致之經所謂夏傷暑秋痎瘧者此則因時而敘耳不可專以此論外所因證有寒瘧有溫瘧有疸瘧並同素問有濕瘧者寒熱身重骨節煩疼脹滿自汗善嘔因汗出復浴濕舍皮膚及冒雨水有牝瘧者寒多不熱但慘戚振栗病以時作此則多感陰濕陽不能制陰也五種瘧疾以外感風寒暑濕與衛氣相併而成除疸瘧獨熱溫瘧先熱牝瘧無熱外諸瘧皆先寒後熱內所因證病者以蓄怒傷肝氣鬱所致名曰肝瘧以喜傷心心氣耗散所致名曰心瘧以思傷脾氣鬱涎結所致名曰脾瘧以憂傷肺肺氣凝痰所致名曰肺瘧以失志傷腎所致名曰腎瘧所致之證同素問此五種瘧疾以感氣不和郁潔痰飲所致不內外因有疫瘧者一歲之間長幼相似有鬼瘧者夢寐不祥多生恐怖有瘴瘧者乍熱乍寒乍有乍無南方多病有胃瘧者飲食飢飽傷胃而成世謂食瘧有勞瘧者經年不瘥前後復發微勞不任亦有數年不瘥結成症癖在腹脅名曰老瘧亦曰瘧母以上證各有方以治之瘧分三陰三陽淺深之異機要云經曰夏傷於暑秋必痎瘧傷之淺者近而暴傷之重者遠而緩痎瘧者久瘧也是知夏傷暑氣閉而不能發泄於外邪氣內行至秋而為瘧也有中三陽者有中三陰者其證各殊也在太陽經謂之寒瘧治多汗之在陽明謂之熱瘧治多下之在少陽經謂之風瘧治多和之此三陽受病謂之暴瘧發在夏至後處暑前此乃傷之淺者近而暴也在陰經則不分三經總謂之濕瘧當從太陰經論之發在處暑後冬至前此乃傷之重者遠而緩為痎瘧也瘧非脾寒及鬼食辨子和云內經既以夏傷於暑而為瘧何世醫皆以脾寒治之用薑附雄黃之類復有指為食瘧此又非也豈知內經之論則不然皆夏傷於暑遇秋風寒而後發也邪熱淺則連日邪熱深則間日併入於裡則寒併入於表則熱若此論則了不相干於脾也治平之時其民夷靜雖用砒石辰砂有毒之藥以熱治熱亦能取效擾攘之時其民勞苦內火與外火俱動以熱攻熱轉為瀉血吐血瘡瘍嘔吐之疾豈與夷靜之人同治哉豫嘗用張長沙汗吐下三法愈瘧病極多大忌錯作脾寒治之玉機微義云瘧無脾寒及鬼食皆是得之於暑又謂治平與擾攘之時治瘧不同皆確論也然食瘧則世亦有之者豫觀其用藥以白虎加人參湯小柴胡五苓散桂苓甘露飲之類則調之也甚者咸欲承氣大柴胡湯下之更不愈以常山散吐之悉是寒藥降火之劑蓋以瘧從火之化也又有謂治芻蕘貧賤之人與富貴膏粱不同之論固是仍用溫脾散辰砂劫藥貧賤之人豈與治平時人同歟貧賤者脾胃虛寒其可用劫劑歟此上恐非出於子和之筆也學者審之或問俗以瘧為脾寒何也曰此亦有理天地之間唯昊楚閩廣人患此至多為陽氣之所盛處其地卑濕長夏之時人多患暍瘧霍亂瀉痢傷濕熱也本暑盛陽極人伏陰在內脾困體倦腠理開發或因納涼於水閣木陰及泉水澡浴而微寒客於肌肉之間經所謂遇夏氣淒滄之小寒迫之是也或勞役飢飽內傷而即病作故指肌肉屬脾發則多惡寒戰栗乃謂之脾寒爾實由風寒濕暑之邪鬱於腠理夏時毛竅疏通而不為病至秋氣收斂之際表邪不能發越故進退不已往來寒熱病勢如凌虐人之狀所以名瘧即四時之傷寒故十二經皆能為病古方治法多兼於裡內傷取效脾胃和而精氣疏通陰陽和解諸邪悉散此實非脾病也但病氣隨經升降其發早晏日次不等內經具病例已詳後世以發表解肌溫經散寒等法亦未嘗執於燥脾劫劑也又曰既瘧本夏傷暑為病世有不服藥餌或人與符咒厭之亦止何也曰此夏時天地氣交百物生髮濕熱熏蒸諸蟲吐毒之際人因暑熱汗出神氣虛散感得時行不正之氣為病故與厭之亦止若移精變氣之謂也然古人稱瘧不得為脾寒者正恐人專於溫脾之説不明造化之源而失病機氣宜之要故也瘧疾大法有五丹溪曰瘧有暑有風有濕有痰有食積久而發者為老瘧不已者為瘧母風暑之瘧多因夏月在風涼處歇遂閉汗不能得泄暑舍於內故大法當汗之瘧而惡飲食者必自飲食上得之當用青皮湯之類是也三日一發者受病一年間日一發者受病半年一日一發者受病一月連發二日住一日者氣血俱病俗名脾寒乃因名而速其實也苟因飲食而得之未必是寒況其他乎脈候要略曰瘧脈自弦弦數多熱弦遲多寒弦而小緊者下之瘥弦遲者宜溫弦緊者宜發汗針灸浮大者可吐之弦數者風發也以飲食消息止之肺經曰瘧脈自弦微則為虛代散則死瘧脈弦大者吐之不愈須再吐之凡弦而大者為瘧脈若虛濡而數者非瘧也乃陰虛證耳每日午後惡寒發熱至曉亦得微汗而解此皆似瘧而非瘧治法治瘧之始當以汗解瘧疾多因風寒暑濕而得之乃天之邪氣所傷當以汗解故仲景河間悉用發表之藥但以寒熱多少分經絡而治傅氏云瘧系外邪當以汗解或汗不得出鬱而成痰宜養胃化痰發汗邪氣得出自然和也瘧無汗要有汗發散邪為主帶補有汗要無汗扶正氣為主帶散無汗以升麻葛根川芎蒼朮柴胡之屬有汗以當歸芍藥參耆黃柏之屬調之發散之後便宜止截凡瘧數作之後發散和解了便宜截之久則中氣虛弱邪愈深而難治治瘧初作不可峻截瘧疾多起於暑熱風濕未經發散遽用常山烏梅丹砒劫劑輕者必重重者必危夫三日一作者陰經受病也作於子午卯酉少陰瘧也作於寅申巳亥厥陰瘧也作於辰戌丑未日太陰瘧也瘧得於暑當汗而解或因取涼太過汗郁成痰其初感也弱者即病胃氣強者伏而不動至於再感復因內傷其病乃作宜其難瘥夫感暑與風皆外邪也非汗多不解若已經誤用劫劑胃氣重傷似難速愈必先與參朮等補劑加減以取汗得汗而虛又行補養下體屬陰最難得汗補藥力到汗出至足方是佳兆又有感病極深邪氣必自臟傳至腑其發無時若發於午之後寅之前者血受病也為難愈須漸漸趲早方是佳兆治此疾者春夏為易秋冬為難大忌飽食以汗之難易為優劣也汗吐下三法治瘧瘧疾有三陰三陽之異蓋傷於陽者近而暴傷在陰者遠而深在氣則發之早在血則發之晏淺則日作深則間之此雖分在陰在陽是乃淺深之謂皆當從汗而發也機要謂在三陽經其汗下和解同傷寒治外邪解而內未已者以早晚分氣血而用大柴胡湯大承氣桃仁承氣下之兩廣撮生論暑毒瘴瘧每用疏轉之劑取下根源其有先傷暑後發瘧涉年餘者度其腹中有癖水磨沉香下解毒雄黃丸黑血如泥瀉下極臭由是遂愈因知諸瘧皆有積在治法之外又當隨輕重而利導之實者加子和舟車丸浚川散隱君滾痰丸之類虛者養正丹木香檳榔丸之類可見常山於瘧作效為能消痰破癖上可吐涎而下可利水故也久瘧胸中鬱郁欲吐而不能吐當以藜蘆散雄黃散吐之此為暴病而氣實者設也丹溪論邪氣深入陰分血分而成久瘧者必當用升發藥自臟而出之於腑然後自表作汗而解若用下藥則邪氣愈陷下而難出也又久瘧之人正氣虛者不可用劫藥損其胃氣劫之數次不愈者病若不變必待春來陽氣上升瘧氣隨升發之氣而出方已遇此者當以補之內經刺瘧法足太陽之瘧令人腰痛頭重寒從背起先寒後熱熇熇暍暍然熱止汗出難已刺委中足膝後橫紋中央是穴出血三合虛者勿刺宜大調中湯加羌活柴胡桂枝足陽明之瘧令人先寒灑淅灑淅寒甚久乃熱熱去汗出喜見日月光火氣乃快然宜刺足陽明跗上衝陽穴足背上五寸骨間動脈宜大調中湯加桂枝石膏黃芩芍藥足少陽瘧令人身體解㑊寒不甚熱不甚惡見人見人心中惕惕然熱多汗出甚宜刺足少陽俠溪穴在足小指次指歧骨間本節前陷中是穴大調中湯加柴胡黃芩芍藥人參足太陰瘧令人不樂好太息不嗜食多寒熱汗出病至則善嘔嘔已乃衰即取之公孫公孫為太陰絡在足大指本節後同身寸一寸刺灸藥宜大調中湯加桂枝芍藥甘草人參足少陰之瘧令人嘔吐甚多寒熱熱多寒少欲閉戶牖而處其病難已取大溪此少陰絡也在足內踝後跟骨上動脈陷中刺三分灸三壯藥宜大調中湯加知母黃芩足厥陰之瘧令人腰痛少腹滿小便不利如癃狀非癃也數便意恐懼氣不足腹中悒悒刺足厥陰太衝在足大指本節後二寸陷中藥宜大調中湯加川芎當歸玄胡苦楝脈沉微加附子諸瘧治宜風瘧自感風而得惡風自汗煩躁頭疼轉而為瘧風陽氣也故先熱後寒可與解散如川芎白芷青皮柴胡紫蘇細辛檳榔之類溫瘧一證亦先熱後寒此為傷寒壞病與風瘧大略相同熱多寒少小柴胡湯熱少寒多小柴胡加桂夫寒瘧自感寒而得無汗惡寒攣痛面慘轉而為瘧寒陰氣也故先寒後熱可與發散寒邪生料五積散增桂養胃湯或良薑官桂草果之類甚則薑附湯附子理中湯暑瘧為暑勝熱多得之一名疸瘧陰氣獨微陽氣獨發但熱不寒裡實不泄煩渴且嘔肌肉消爍合用小柴胡湯香薷飲嘔者縮脾飲方見暑門加生薑溫服下消暑丸熱多燥甚者少與竹葉湯常山柴胡於暑證最便當暑盛時作者人參白虎湯之類濕瘧因冒襲雨濕汗出澡浴得之身體痛重肢節煩疼嘔逆脹滿合用五苓散除濕湯加蒼朮茯苓之屬寒多者加薑桂牝瘧為久受陰濕陰盛陽虛不能制陰所以寒多不熱氣虛而泄悽愴振振柴湖桂薑湯減半黃芩加以半夏食瘧一名胃瘧飲食無節飢飽有傷致然也凡食啖生冷鹹酸魚鹽肥膩中脘生痰皆為食瘧其狀苦飢而不能食食則中滿嘔逆腹痛青皮陳皮草果半夏砂仁白豆蔻作劑或煎四獸湯下紅丸子之屬瘴瘧乃山嵐瘴氣蒸毒所致自嶺以南地方苦炎燥濕不常人多患瘴瘧其狀血乘上焦病若來時令人迷困甚則發燥狂妄亦有啞而不能言者皆由敗血瘀於心毒涎聚於脾此為實熱所致而尤甚於暑瘧者也治之須用涼膈散疏通大府小柴胡加大黃或木香丸觀音丸之類勞瘧則前數證經久不瘥真氣以耗邪氣猶存或藥暫止小勞來復法當調養氣血十全大補湯之屬有熱者止以八珍湯瘧母此為前證彌年越歲經汗吐下榮衛虧損邪氣伏藏脅間結有症癖成塊不移此證未可直攻急作烏頭七棗湯以扶其里候其內氣已完繼已經效驅瘧丹或消癖丸下之愈鬼瘧世俗之謂也乃邪入陰分夜間發作故名鬼但凡午後及夜作者用四物湯加黃柏酒炒知母紅花升麻提起陽分方可截之醫林集要云瘧在陰經而夜發者桃仁承氣湯下之再截治瘧有汗要無汗須扶正氣以小柴胡桂枝湯或白虎桂枝湯亦可無汗要有汗須散邪帶補桂枝湯加黃耆知母石膏湯或人參柴胡飲子熱多寒少目痛多汗肺大者以大柴胡湯微利之餘邪未盡以白芷石膏三物湯以盡其邪治瘧總套初得病勢方熾二三髮間未宜遽截不論寒熱多少且用清脾飲或草果飲或二陳湯加草果五七分或平胃散加草果柴胡各五分又或養胃湯加川芎草果各五分熱少者進取微汗寒多者宜快脾湯服後寒仍多者養胃湯加附子桂枝各五分獨寒者尤宜不效則七棗湯熱多者宜驅瘧飲或參蘇飲每服加草果五分大熱不除宜小柴胡湯渴甚者以五苓散白虎湯入辰砂少許獨熱無寒亦與小柴胡湯熱雖極不甚渴者本方加桂或以柴胡桂薑湯候可截則截之雜著云邪從外入者宜發散之又須分別陰分陽分而用藥邪瘧及新瘧發熱者可散可截虛瘧及久瘧者宜補氣血若過服截藥致傷脾胃則必綿延不休久瘧不愈寒多熱少咳嗽痰涎用四獸飲二服以後參朮草果截之醫林集要云久瘧不已宜服七寶飲久瘧不得汗以二陳湯倍加蒼白朮少加檳榔久瘧以二陳湯加川芎蒼朮白朮柴胡葛根一補一發藥也久瘧欲吐不吐者宜探而吐之或用藜蘆末水調服以吐為度甚者發寒熱頭痛如破渴而飲水多汗可以參耆芩連梔子川芎蒼朮白朮之類治之瘧大渴大熱用小柴胡湯去半夏加黃連黃柏知母梔子麥門冬天花粉瘧母治法以丸藥消導之醋炙鱉甲為君三稜莪朮香附海粉青皮桃仁紅花神麯麥芽隨證加減丸醋湯下瘧因勞役憂思而作汗多食少倦甚者補中益氣湯小柴胡湯加常山截瘧神效瘧疾能食而痰伏者小胃丹下之不能者必從飲食上得之以食治清脾湯之類瘧疾既久脾胃虛寒及老弱不食可用理中湯加青皮草果半夏茯苓久而不已薑附湯婦人久瘧用小柴胡合四物湯服之小兒瘧疾有痞塊生地芍藥各一錢陳皮川芎炒黃芩半夏各一錢甘草三分加薑煎調醋炙鱉甲末效治案一男子痎瘧脅下有肥氣腹中作痛形如覆杯病已三載兩手脈沉伏而有力以三花神佑丸五六十丸下之五六行以涼水止之蓋冷主收斂故也一二日服白虎湯五七日後以常山散吐出冷痰涎水又以柴胡湯和之間服妙功丸磨積愈正傳有二男子皆年四五十各得痎瘧三年俱發於寅申巳亥日一人晝發發於巳而退於申一人夜發發於亥而退於寅晝發者乃陰中之陽病宜補氣解表與小柴胡倍柴胡人參加白朮川芎葛根陳皮青皮蒼朮夜發者為陰中之陰病宜補血疏肝用小柴胡湯合四物湯加青皮各與干帖加薑棗煎於未發前二時每日一帖服至八帖同日得大汗而愈丹溪治一人因勞役發嗽得痎瘧又服發散藥變為發熱舌短語言不正痰吼有聲脈洪實似滑先用獨參湯加竹瀝二蛤殼一服後吐膠痰舌本正後用黃耆人參湯服半月愈一人性急好酒色味厚適多憂怒患久瘧忽大熱下臭積大孔痛陷下此大虛脈弦大而浮以瓦磨如錢圓燒紅童便淬急取以紙裹於痛處恐外寒乘而入也以參歸陳皮煎服淡味半月安一婦病瘧三日一發食少經不行已三月脈無時冬寒議作虛寒治疑誤再診見其梳洗言動如常知果誤也經不行非無血為痰所凝脈無非血氣衰則積痰生熱結伏其脈而不見耳當作實熱治與三花丸旬日後食進脈出帶微弦謂胃氣既全雖不藥瘧當自愈而經行也令淡滋味果應一婦身材小味厚痎疲瘧月餘間日發於申酉頭與身痛寒多喜極熱辣脈伏面慘晦作實熱治之以十棗湯為末粥丸黍米大服十粒津咽日三次令淡飯半月大汗愈一婦人久痢因哭子變瘧一日五六作汗如雨不止脈微數疲甚無邪可治陰虛陽散死在旦夕且服四獸等熱劑遂用參朮二兩白芍藥一兩黃耆半兩炙甘草二錢作四大劑服之而愈藥方治瘧通用諸劑濟生清脾飲治疸瘧脈來弦數但熱不寒或熱多寒少口苦咽乾小便赤澀青皮厚朴薑製白朮黃芩草果柴胡茯苓半夏甘草炙各等分每服五錢水盞半薑五片煎七分溫服不拘時仲景小柴胡二陳湯治熱痰作瘧用此和解方見傷寒門活人白虎加桂枝湯治瘧但熱不寒及有汗者知母桂枝甘草炙粳米各一錢石膏五錢上咀水盞半煎一盞去滓溫服局方參蘇飲治瘧初作用此散解方見風寒門局方二陳湯治食痰作瘧方見痰門局方五苓散治瘧疾小水不利用此分理陰陽方見濕門草果飲治諸瘧通用草果白芷良薑青皮川芎紫蘇甘草炙各等分上咀每服五錢水盞半加薑煎亦治寒瘧拔萃桂枝黃芩湯治瘧服藥寒熱轉甚者此三陽合病也桂枝黃芩一錢人參柴胡錢半石膏知母各一錢半夏甘草各五分上咀作一服水盞半煎七分服御藥柴胡栝薑根湯治一切瘧疾往來寒熱煩渴引飲柴胡二錢天花粉黃芩人參甘草炙各一錢上薑五片棗二枚水盞半煎八分通口服簡易七寶飲治一切瘧疾或先寒後熱或先熱後寒不問鬼瘧食瘧常山厚朴薑製青皮陳皮甘草炙檳榔草果各一錢上咀作一服於未發隔夜水一盞酒一盞共煎一盞去渣露一宿再將渣煎另放亦露一宿來日當發之晨蕩溫面東先服頭服少頃再服藥渣大有神效和劑人參養胃湯治瘧疾寒多熱少者必須先服此藥人參厚朴制陳皮各一錢半蒼朮二錢茯苓半夏制草果藿香甘草炙各一錢上咀作一服薑三片棗二枚煎不拘時服濟生萬安散治一切瘧病之初以其氣壯進此藥以取效氣虛胃弱及妊婦不宜服之蒼朮厚朴薑炒陳皮檳榔常山酒浸甘草炙各錢半上咀水二盞煎一盞去渣露一宿臨發早溫服忌熱物驅瘧飲治諸瘧久瘧不愈者草果青皮陳皮人參茯苓半夏制厚朴蒼朮炒檳榔白朮甘草各一兩良薑五錢上咀每服七錢水二盞棗二枚烏梅一個煎八分食遠服白朮散治邪氣留於經絡與衛氣相併日發瘧疾寒熱交作者初受風寒者尤宜麻黃白朮茯苓桂心各七分陳皮青皮桔梗白芷甘草炙半夏制紫蘇烏梅肉各六分上作一服水二盞薑三片棗一枚煎八分食遠服老瘧飲治久瘧結成癥瘕癖在胸脅諸藥不愈者蒼朮制草果桔梗青皮陳皮良薑各七分白芷茯苓半夏制枳殼炒甘草炙桂心乾薑炮紫蘇川芎各五分上咀作一服水二盞入鹽少許煎八分食前服徐氏正氣散退寒瘧正胃氣進飲食脾胃虛怯者用之尤宜藿香草果各二兩半夏制陳皮厚朴砂仁甘草炙各一兩上為細末每服三錢匕生薑棗子煎俟瘧未發前和渣服辨疑柴葛二陳湯治一切瘧傷暑濕勞食等證柴胡乾葛白朮陳皮半夏制黃芩寒陰瘧即除之蒼朮制川芎甘草各五分上咀作一服水二盞生薑三片煎服乾葛川芎蒼朮乃發散外邪之藥久瘧者及發散過者除之不思飲食加山楂麥芽枳實各五分痰盛加貝母知母寒痰停飲加草果仁陽分汗多加人參黃耆去葛根陰分加酒芍藥川當歸川芎生地黃各八分或用升麻以提之久瘧微邪潮熱加四君子湯去祛邪之藥欲截加常山檳榔青皮貝母各一錢雜著二術柴葛湯治諸瘧必用之劑白朮蒼朮柴胡葛根陳皮各七分甘草五分若一日一發及午前發者邪在陽分加枯芩茯苓半夏各一錢熱甚頭痛加川芎軟石膏各一錢口渴加石膏知母麥門冬各一錢若間日或三日發午後或夜發者邪在陰分加川芎當歸酒炒芍藥熟地黃酒炒知母各一錢酒黃耆酒紅花各四分提在陽分可截之若間一日連發二日或日夜各發者氣血俱病加人參黃耆白茯苓各一錢以補氣川芎地黃歸芍以補血若陽瘧多汗用黃耆人參白朮以斂之無汗用柴胡蒼朮白朮黃芩葛根以發之若陰瘧多汗用當歸白芍熟地黃耆黃柏以斂之無汗用柴胡蒼朮川芎紅花升麻以發之胃氣弱飲食少或服截藥傷脾胃而食少者加人參酒芍藥大麥芽各一錢傷食痞悶或有食積者加神麯麥芽枳實各一錢黃連五分痰盛加薑半夏南星枳實炒各一錢黃連黃芩各六分若欲截之加檳榔常山青皮黃芩各一錢烏梅肉三個日久虛瘧寒熱不多或無寒而但微熱者邪氣已無只用四君子湯合四物湯加柴胡黃芩黃耆陳皮以滋補氣血活人柴苓湯治瘧熱多寒少口燥心煩少睡方見傷寒門溫瘧暑瘧解散諸劑機要桂枝羌活湯治瘧處暑以前發頭項痛脈浮惡風無汗桂枝羌活防風甘草各一錢上咀作一服水盞半煎八分溫服如吐加半夏曲麻黃羌活湯治前證惡風無汗麻黃羌活防風甘草各一錢煎如前式白芷湯治瘧熱多寒少身頭痛脈長先以大柴胡湯下之微利為度後微熱不盡者當服白芷湯以盡其邪白芷一錢知母二錢石膏四錢上為粗未水盞半煎八分溫服桂枝芍藥湯治瘧疾寒熱大作不論先後此太陽陽明合病也謂之大爭寒熱作則必戰經曰熱戰而動也發熱則必泄汗經曰汗出不愈知內熱也陽盛陰虛之證內實外虛不治熱久而傳陰經也此湯主之桂一錢黃耆石膏芍藥知母各三錢上咀水盞半煎服局方香薷飲治傷暑發瘧香薷二錢厚朴扁豆炒各一錢上咀水盞半烏梅一個煎八分臨時入薑汁一匙溫服五物香薷飲香薷縮脾飲並治暑瘧方見暑門直指地龍丸治瘴瘧諸瘧大熱煩躁生地龍二條研細上入薑汁薄荷汁生蜜各少許新汲水調下熱熾加腦子少許良方茵陳藁湯治疸瘧發作有時但熱不寒頭痛不安通身俱黑大腸祕熱小便黃赤宜服此茵陳蒿山梔子柴胡黃芩桔梗牡丹皮貝母荊芥穗升麻半夏羌活杏仁去皮尖獨活麻黃去根節各五錢細辛一分上咀每服四錢水盞半薑三片煎一沸急瀉出臨發熱頭痛去渣熱服不拘時但此瘧止發熱並初發時先壯熱者可服熱多寒少食後服此藥良方大青飲治疸瘧積熱痰盛寒少熱多煩躁引飲大青一兩莖葉紫者是不紫即是遠志不可用也如無真者以青黛代之大黃醋炒赤芍藥常山炒龍膽草去土甘草炙各三兩上搗篩每服五錢水盞半薑三片煎八分溫服氣盛熱多宜服若得利成熱稍退則止人素有虛痰年四十以上者不可服之痰瘧諸劑良方半夏散治痰瘧發作有時熱多寒少頭痛額角並胸前肌肉瞤動食才入口即吐出面色帶赤宜服此半夏泡七次為末薑汁和調作餅曬乾藿香羌活芎藭各一分牽牛各半兩上為細末每服三錢食後白湯調下和劑勝金丸治一切瘧寒熱不一嘔噦頭痛煩渴喘息胸膈停痰雞心檳榔一兩日乾川常山四兩酒浸蒸焙乾上為末水煮麵糊丸如梧桐子大每服三十丸於未發前半日冷酒下便睡不得吃熱湯飲次日又用冷酒下二十丸仍不得吃熱飲食又次日飲食無拘子和常山飲治瘧疾膈上有痰涎宜吐以取效若用砒霜之類發吐縱瘧已脾胃受傷須用無毒之藥吐痰為佳常山二兩少煮曬乾上咀每服一兩水煎空心服機要藜蘆散治久瘧不能飲食胸中鬱郁如吐欲吐不能吐者痰結也當以此吐之則已大藜蘆為末每服半錢溫齏水調下以吐為度機要雄黃散治瘧如前雄黃瓜蒂赤小豆各一錢上為細末每服半錢溫齏水調下以吐為度食瘧諸劑三因紅丸子專治食瘧蓬朮三稜各二兩醋煮伏時胡椒一兩青皮三兩炒陳魏一分醋化上為細末另用蒼朮末同阿魏醋米糊為丸梧桐子大炒土朱為衣每服五十丸二陳湯四獸飲皆可下局方二陳湯加妙仁青皮豆蔻專治食瘧方見前直指四獸湯治食瘧諸瘧和胃消痰半夏人參茯苓白朮橘紅草果生薑烏梅大棗各等分甘草炙減半上咀以鹽少許醃食頃濕紙厚裹慢火煨香熟每服四錢水盞半煎七分溫服淡寮露薑飲治脾胃痰瘧發為寒熱生薑四兩上和皮搗汁一碗夜露至曉空心冷服勞瘧諸劑良方芎歸鱉甲飲治勞瘧表裡俱虛真元未復病雖暫止小勞又發川芎當歸鱉甲醋炙茯苓青皮陳皮半夏制芍藥各等分上咀每服一兩水二盞薑五片棗二枚烏梅一個煎一盞食遠服熱多加柴胡寒多加草果良方鱉甲煮散治勞瘧鱉甲去裙醋炙黃耆牛膝酒洗天靈蓋酥炙菟絲子制續斷各五分羌活柴胡赤茯苓生地黃木香陳皮去白芎藭山茱萸獨活藿香各三分麝香另研一分上末作一服水盞半鹽少許煎七分空心和渣服或煉蜜和丸每服五十丸鹽湯空心下良方烏梅丸治勞瘧瘴鬼等瘧悉皆治之烏梅肉微炒肉蓯蓉酒浸一宿割去皺皮炙乾鱉去裙醋炙黃桃仁湯泡去皮尖及雙仁麥麩炒黃色各三兩香豉一合麝香半錢常山川升麻人參甘草炙知母桂心各三錢上為末入麝香研勻煉蜜和搗丸如梧桐子大每服未發前空心溫酒下三十丸至發時又下三十丸每日服之以瘥為度良方露星飲治久瘧成勞白茯苓檳榔常山秦艽柴胡黃芩半夏官桂白朮甘草各等分上咀每服三錢水酒各半盞煎露一宿次早溫服瘴瘧諸劑良方沃雪湯治山嵐瘴瘧蒼朮炒甘草鹽浸炙各三兩防風細切白芍藥厚朴乾葛各四兩朴硝兩半研上咀每服四錢水二盞煎一盞不拘時熱服服畢少時以薑蔥作羹或作粥吃了避風坐臥身體潤即愈兩滓又合煎服良方香椿散治瘴氣噁心四肢疼痛口吐酸水不思飲食憎寒壯熱發過引飲二廣八閩多山嵐煙霧蛇虺蠱毒之氣當七八月之間芒華髮時此時瘴疾大作謂之黃芒瘴又謂黃茅瘴人因虛怯又因傷飢傷飽或沖煙霧或涉溪澗遂得此疾謂之黑腳瘴蝦蟆瘴啞瘴其名不一並皆治之香嫩椿葉三兩酒浸炒南壁土向日者甘草炙陳芽茶各二兩上為細末每服四錢用酒調下如患久者更入甘遂柴胡各半兩空心臨臥服良方保安湯治山嵐瘴瘧寒熱久不瘥常山半兩青蒿知母各一兩桃仁去皮尖研半兩上咀每服三錢水盞半生薑半分煎至七分不拘時熱服良方預固丸治嶺南諸瘧丹砂雄黃各一兩並研細水飛過令乾鬼臼半兩為末阿魏一分用酒半升熬成膏入藥上再研令勻以阿魏膏和丸如雞頭子大緋絹袋貯十丸常執手中頻嗅雖瘴氣中行不得惹遇瘴病者井花水嚼下三丸瘥良方破塊丸治瘴疾結成氣塊腹中不能消散服之效蓽茇大黃各一兩俱生用上為細末入麝香少許煉蜜丸如梧桐子大每服三十丸空心冷酒下日三服虛瘧寒瘧諸劑簡易定齋草果飲快脾治瘧草果仁蒼朮制厚朴制陳皮半夏曲甘草炙烏梅各等分上咀每服五錢水盞半薑五片棗二枚煎七分溫服寒甚者加薑附熱加柴胡瘴瘧加檳榔寶鑑交加飲子治痰瘴氣虛寒瘧肉豆蔻草豆蔻各二個一個煨一個生用厚朴二寸半生半制大甘草二寸半生半炙生薑二塊一生一煨上等分水煎發日空心服未愈再服濟生七棗湯治五臟氣虛陰陽相勝作為痎瘧發作無時寒多熱少附子一枚炮以鹽水浸再炮如此七次去皮臍上咀水一盞棗七枚薑七片煎八分當發日空心溫服濟生果附湯治氣虛瘧疾寒多熱少或只單寒草果仁附子炮製各等分上咀每服五錢水一盞薑七片棗一枚煎服淡寮分利順元散治體虛之人患瘧寒多不可用截藥川烏附子各一兩南星二兩木香五錢銼臨時入除木香以三味一半生一半炮和咀每服四錢棗七枚薑十片水一盞煎七分發前一日及當發日早晨連進一二服半生半熟所以能利解陰陽也辨疑桂附二陳湯治寒瘧但寒少熱多腰足冷附子炮製半夏制陳皮白茯苓肉桂炙甘草上咀每服四錢水一盞薑三片棗一枚煎服久瘧母瘧諸劑辨疑二十四味斷瘧飲治久瘧常山酒炒草果檳榔知母酒炒陳皮青皮川芎枳殼柴胡黃芩荊芥白芷人參紫蘇蒼朮白朮半夏良薑茯苓桂葛根甘草杏仁烏梅各等分上咀每服一兩水二盞薑三片棗一枚煎八分發日早服鱉甲烏梅丸治久瘧不愈鱉醋炙一個川常山二兩酒炒褐色烏梅肉五錢人參七錢知母貝母檳榔各兩半青皮陳皮各一兩去白草果仁八錢上為細末酒糊丸梧桐子大每服七十丸酒下忌豬羊雞半月浸酒藥治久瘧服諸藥不效者常山炒蒼朮制各一兩草果青皮陳皮貝母甘草各五錢鱉甲炙一個烏梅肉微炒人參各四錢上咀用老酒半鏃入瓶中浸藥每晨服一二杯忌怒勞冷食濟生鱉甲飲子治瘧疾久不愈脅下痞滿腹中結塊名曰瘧母草果仁鱉甲醋炙黃耆白朮白芍藥厚朴制檳榔橘紅川芎甘草炙各等分上咀每服四錢水一盞薑七片棗一枚烏梅一個煎服直指消癖丸治瘧母停結癖腹脅堅痛芫花炒硃砂細研等分上為末煉蜜丸小豆大每服十丸濃煎棗湯下去癖須用芫花大戟下之下後即與養胃湯鬼瘧劑良方神效手把丸治鬼瘧猢孫頭骨虎頭骨貓頭骨砒霜常山硃砂細研乳香另研麝香白芥子阿魏各一分蜈蚣一枚上為細末碾令勻取五月五日午時煉蜜和搗五百杵丸如皂角子大以緋絹裹一丸男左女右臂上系之發時於淨室內焚香恭誠解下男左女右手把之時時就鼻嗅之五度效鬼瘧神效丸砒霜硃砂乳香各半兩麝香阿魏安息香緑豆粉猢孫頭骨上各為末和研勻蒸餅丸梧桐子大發前男左女右手把一丸便臥一伏時便瘥萬安丸治鬼瘧虎頭骨酒炙三兩藜蘆六兩雄黃鬼臼天雄制蕪荑炒皂角酥炙去皮絲各一兩上為細末入別研雄黃末勻煉蜜和丸彈子大令患人頭上戴一丸立止或於房內燒之避邪截瘧諸劑宣明瘧神丹治諸般瘧疾白砒一兩雄黃一錢上以五月五日用粽子尖左右研三千下日未出不令雞犬見婦人知丸如梧桐子大發前一日面東冷水下一丸發明斬鬼丹人信五錢用明礬五錢蓋罐內火煅微有黑煙出取起放土地上冷雄黃三錢明亮者上共研勻極細五月五日五家粽角為丸如小豆大未發前面東涼水下三丸嚼破吞之妙小兒一丸以吐為效祕方鬼哭丹治諸瘧疾緑豆一兩信石明者三錢上碾極細以蒸餅為丸如緑豆大每服三丸發日早五更以新汲水朝東吞下忌濕面生冷葷腥玉機一剪金治瘧聖藥信石黑豆雄黃各等分上以石臼搗為末用細絹子捻藥一捻於中裹如豆大用絲扎定剪下每服一丸星宿全時用汲水吞下勿令人知宣明辟邪丹治瘴瘧鬼瘧食瘧緑豆四十九粒雄黑豆四十九粒硃砂二錢另研白砒另研二錢上為末同研勻滴水丸黃丹為衣每服一粒取桃枝研汁調井花水向日吞下集成常山飲截諸瘧常山檳榔烏梅草果知母甘草炙穿山甲炮每服五錢水盞半煎一盞露一宿臨發日前二時溫服祕方四神飲常山二錢檳榔柴胡貝母各一錢上咀水二盞煎加黑豆二七粒臨發前二時空腹服之選要驅瘧丹治久瘧諸瘧如神常山末草果末菖蒲末緑豆粉各一兩信石醋煮二錢半上用稀麵糊搜和分作一百二十餅每以一餅用茶清浸露一宿臨發日五更冷服痰飲在上即吐痰飲在下即瀉小兒用一角依前法服忌豬羊魚雞面和劑克效餅子治一切瘧疾發作有時先覺有時乃作寒栗鼓振頤頷中外皆寒腰脊俱痛寒戰既已內外皆熱頭痛如破渴欲飲冷或痰聚胸中煩滿欲吐或先寒後熱或先熱後寒或寒多熱少或熱多寒少或寒熱相半或但熱而不寒或但寒而不熱或一日一發或間日一發或發後五六日再發皆治甘草炙緑豆末荷葉炮各五錢定粉研龍腦研麝香研各半錢金箔二十五片為衣信石醋煮兩半硃砂飛一兩上為細末煉蜜搜和每兩作二十餅捻扁以金箔為衣每服一餅新汲水磨化日發者未發前服之間日發者不發夜服隔數日發者前一日夜服連日發者侵晨服百選碧霞丹治久瘧不愈東方甲乙木巴豆取肉去油南方丙丁火官桂去粗皮中央戊己土硫黃去土石西方庚辛金白礬另研北方壬癸水青黛另研各等分上於五月初一日修治了用紙各包以盤盛依前方位排定勿令貓犬婦人見之安頓神前至端日午時用五家粽角尖和前藥令勻丸如梧桐子大令患人以綿裹一丸塞在鼻中男左女右於未發前一日安之約度尋常發過少許方除發明煮藥豆法治久瘧瘧母痞塊者不宜用消痞丸散等破氣並熱藥只宜制豆法食盡二升自然消愈大黑豆二升常山半斤枳實四兩血竭五錢另研上用水一斗先銼常山枳實煮十餘沸入豆候熟去二味再入血竭末用武火熬盡汁取出曬乾每日食之一二合後可灸章門二穴其痞自消易簡諸方一方用獨蒜十二個煨熟桃仁一百個去皮尖爛搗入黃丹丸如豆大每服三丸當發日清晨溫酒一盞面東吞下一方用桃仁一味不犯水入黃丹研丸五月五日合服一方截瘧神效常山末二錢烏梅肉四個研爛酒調臨發日服一方治五般瘧疾用夜明砂一錢冷茶調下一方用何首烏為末酒調下三錢臨發日先服一方治老瘧痰瘧用雄黃瓜蒂赤小豆等分為末每服半錢調用溫水下以吐為度一方不問新久瘧用常山一兩銼碎以好酒浸一宿瓦器煮乾為末每服二錢水一盞煎半盞去滓停冷五更服之不吐不瀉效一方用隔年全歷日端午日午時燒灰糊丸如豆大發日早以無根水送下一丸一方治瘧神效用蒜不拘多少研極爛和黃丹少許以聚為度丸如芡實大候乾每服一丸新汲水面東吞下子母祕録用百草霜黃丹等分細研每服二錢於發日空心米飲調服不過兩服愈一方治鬼瘧進退不定用猢孫頭骨一枚燒灰為末空心酒調一錢臨發溫服一方治久患癆瘧瘴瘧用鱉甲三兩酥炙令黃去裙為末臨發時酒調下三錢一方用驢脂和烏梅肉為丸未發先服三十丸即止醫方大成用狗蠅一個去頭翅以蠟圓一丸當發日冷酒吞下灸法大椎第一骨節盡處灸三壯立愈三椎骨節灸亦可愈間使二穴在手掌後二指兩筋中間是穴可灸
