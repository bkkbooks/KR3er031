body:
  text: 卷之三十一水腫門病機內經敘論水脹篇帝曰水脹何如岐伯對曰水始起也目窠上微腫如新臥起之狀其頸脈動時咳陰股間寒足脛脹腹乃大其水已成矣以手按其膚隨手而起如裹水之狀此其候也帝曰膚脹何如岐伯曰膚脹者寒氣客於皮中鼓之空然不堅腹身大盡腫皮厚按其腹窅而不起腹色不變此其候也經曰腎者至陰也至陰者盛水也肺者太陰也少陰者冬脈也故其本在腎其末在肺皆積水也帝曰腎何以能聚水而生病岐伯曰腎者胃之關也關門不利故聚水而從其類也上下溢於皮膚故為膚腫膚腫者聚水而生病也故水病下為胕腫大腹上為喘呼不得臥也標本俱病故肺為喘呼腎為水腫肺為逆不得臥又曰肺移寒於腎名曰湧水如溢囊裹里漿或遍身腫滿按腹不堅疾行則濯濯有聲或喘咳不定諸有水氣者微腫先見於目下也經曰下焦溢為水王注下焦為分水之所氣窒不瀉則溢而為水水腫病源於濕熱原病式曰或云水腫者由脾虛而不能制其腎水則水氣妄行而脾主四肢故水氣遊走四肢身面俱腫者似是而實非也夫治水腫腹脹以辛苦寒藥為君而大利其大小便也經曰中滿者治之於內然則豈為脾土之虛也此説正與素問相反經曰諸濕腫滿皆屬於脾又云太陰所主胕腫又曰濕勝則濡泄甚則水閉胕腫皆所謂太陰脾土濕氣之實甚也又曰諸腹脹大皆屬於熱又曰諸胕腫疼酸皆所謂心火實熱安得言脾虛不能制腎水之實甚乎故諸水腫者濕熱之相兼也如六月濕熱太甚而庶物隆盛水腫之象明可見矣故古人制以辛苦寒藥治之蓋以辛散結而苦燥濕以寒除熱而隨其利濕去結散熱退氣和而已所以妄謂脾虛不能制其腎水者但謂數下致之又多水液故也豈知巴豆熱毒耗損腎水陰氣則心火脾土自盛濕熱相摶則怫鬱痞隔小便不利而水腫也更宜下之者以其辛苦寒藥能除濕熱怫鬱痞隔故也亦由傷寒下之太早而熱入以成結胸者更宜陷胸湯丸寒藥下之又如傷寒誤用巴豆熱毒下之而熱勢轉甚更宜調胃承氣湯寒藥下之者也若夫世傳銀粉之藥以治水腫而愈者以其善開怫鬱痞隔故也甚不可過度而加害耳況銀粉亦能傷牙齒者謂毒氣感於腸胃而精神氣血水穀能勝其毒故毒氣循經上行而至齒齦嫩薄之分則為害也上下齒縫者手足陽明胃之經也凡用此藥當先固濟或云陰水遍身而又惡寒止是寒者非也水腫由脾虛所致盧氏醫鏡以水腫隸於腎肝胃三經而不及脾下文繼以肺金盛生水水溢妄行之説豈理也哉夫脾土受病肺為之子焉固不能自盛而生水然肺金氣清而能生水則滋長腎陰奉行降令為生化之源何病腫之有今為腫之水乃腐濁之氣滲透經絡流注溪谷灌入隧道血亦因之而化水欲藉脾土以制之導腎氣以利之殊不知脾病則金氣衰木寡於畏而來侮土脾欲不病不可得矣治法宜清心經之火補養脾土全運化之職肺氣下降滲道開通敗濁之氣其稍清者復回而為氣為血為津液其濁者在上為汗在下為溺以漸而分消矣盧不明言而更曰制木燥水得非白圭以鄰為壑乎直指云賈洛陽以病腫不治必為痼疾雖有扁鵲亦莫能為則知腫之危惡非他病比也夫人所以得存其性命者水與谷而已水則腎主之谷則脾主之惟腎虛不能行水惟脾虛不能制水胃與脾合氣胃為水穀之海因虛而不能傳化故腎水泛濫反得以浸漬脾土於是三焦停滯經絡壅塞水滲於皮膚注於肌肉而發腫矣其狀目胞上下微起肢體重著咳喘怔忡股間清冷小便澀黃皮薄而光手按成窟舉手即滿是也水腫最要分陰水陽水之異丹溪曰陽水者遍身腫煩渴小便赤澀大便祕治以五皮散或四磨飲添磨生枳殼重則疏鑿飲陰水者遍身腫不煩渴大便溏小便少不澀赤治以實脾飲或木香流氣飲仲景治法謂身腰以上腫者宜發汗身腰以下腫者宜利小便此即陰水陽水之治法也辨疑謂陽水為病在上風濕之成陰水為病在下寒濕之所致治宜汗利上下分消其濕也其説亦通水腫有十證不同金匱千金論曰水腫十證其名不同一曰青水二曰赤水三曰黃水四曰白水五曰黑水六曰玄水七曰風水八曰石水九曰里水十曰氣水青水根於肝先從面腫漸行周身赤水根於心先從胸腫而起黃水起於脾腫從腹起白水起於肺先從腳腫而喘嗽上氣也黑水起於腎亦從足起玄水起於膽先從頭面而致足脛腫風水起於胃先自四肢腫而致通身石水根於膀胱其狀起於臍下而腹獨大者是也里水起於小腸先小腹而漸致腫也氣水起於大腸其狀乍來乍去乍盛乍虛此其候也大抵上下不通陰陽不利而致之也又有正水皮水五臟水之屬不可不審正水者其脈沉遲外證自喘皮水者其脈亦浮外證胕腫按之沒指不惡風其腹如鼓不渴當發其汗又云皮水之為病四肢腫水氣在皮膚中四肢聶聶動者防己茯苓湯主之黃汗風者其脈自浮外證骨節疼痛惡風寸口脈沉滑者中有水氣面目腫大有熱或身體反重而酸或惡風一身悉腫脈浮不渴續自汗出而無大熱者皆為風水石水其脈自沉外證腹滿不喘里水一身面目黃腫其脈沉小便不利故令病水也心水者其身腫而少氣不得臥煩而躁其陰大腫肝水者其腹大不能轉側脅下腹中痛時時津液肺水者其身腫小便難時時鴨溏脾水者其腹大四肢苦重津液不生但苦少氣小便難腎水者臍腹大腫腰痛不得溺陰下濕如牛鼻上汗其足逆冷面瘦以上諸證見於脈經大抵水腫之證雖多般其要不出東垣仲景治法身腰以上宜汗之身腰以下宜利小水此得內經所謂開鬼門潔淨府之義也通身腫者先須汗利之使上下分消是也丹溪云風腫者皮粗麻木不仁走注疼痛是也氣腫者皮厚四肢瘦削腹脅脹膨是也血腫者皮間有血縷赤痕者是也婦人懷妊亦有氣遏水道而虛腫者此但順氣安脾飲食無阻既産而腫自消所謂子腫是也婦人又有腸覃石瘕之證乃是血證別載癥瘕之門脈候丹溪曰水腫脈多沉伏病陽水兼陽證脈必沉數病陰水兼陰證脈必沉遲脈沉而滑為風水脈浮而遲弦而緊者皆為腫也水病脈洪大者可治微細者不可治水病脹閉其脈浮大輕者生沉細虛小者死水腫腹大如鼓脈實者生虛者死洪大者生微細者死中惡腹大四肢滿脈大而緩者生浮而緊者死腹脹便血脈大時絶劇脈小疾者死腫脈緊而榮衛俱絶面浮腫者死水腫危候大凡水腫先起於腹而後散四肢者可治先起於四肢而後歸於腹者不治掌腫無紋者死大便滑瀉水腫不消者死唇黑唇腫齒焦者死臍腫突出者死缺盆平者死陰囊及莖俱腫者死脈絶口張足腫者死足胕腫膝如斗者死肚上青筋見瀉後腹腫者死男從身下腫上女從身上腫下皆難治治法內經治水腫法湯液醪醴論篇帝曰其有不從毫毛生而五臟陽以竭也津液充郭其魄獨居孤精於內氣耗於外形不可與衣相保此四極亟而動中是氣拒於內而形施於外治之奈何岐伯對曰平治於權衡去莞陳莝是以微動四極溫衣繆刺其處以復其形開鬼門潔淨府內經要旨注明與下參看不從皮毛生謂病生於內者陰氣內盛陽氣竭絶不得入於腹中故言五臟陽以竭也津液者水也充郭皮中陰蓄於內水氣脹滿上攻於肺肺氣孤危魄者肺神腎為水害子不救母故云其魄獨居也夫陰精損削於內陽氣耗減於外則三焦閉溢水道不通水滿皮膚身體浮腫故云形不可與衣相保也凡此類者皆四肢脈數急而內鼓動於肺中也肺動者謂氣急而咳也如是者皆水氣格拒於腹膜之內浮腫施脹於身形之外又窮標本其可得乎平治權衡謂察脈浮沉脈浮為在表脈沉為在裡在裡者泄之在表者汗之故云開鬼神潔淨府也去莞陳莝謂去積久之水物猶如草莝之不可久留於身中也故耳玉機微義云鬼門者幽玄之謂有毛竅而不見其開闔邪氣感入邪與正相搏毛竅閉塞而寒熱作焉病客於表故宜發汗遣邪氣以門也此亦發汗之別稱發泄諸病在表之通例也淨府者謂膀胱內無入孔而外有出竅為清淨津液之府逢腎氣臟氣化水穀之精而滲入脬中氣約成溺出也夫腎主下焦司開闔關竅二陰肺脾之氣通調水道下輸膀胱氣化水行而自清淨否則便澀或濁或淋為水氣溢於腠理為胕腫諸病若莞屈陳莝壅滯於身中當泄去是物而清淨宜此二法在表者汗之在裡者泄之權衡於治也雖然經云水病本之於肺腎二經而古今方論並不以治水濁瀉腎氣為説者何蓋腎陰奉行降令為生化之源而常不足至陰精損削於內生氣不能運化至為胕腫其索矣況肺弱而母氣孤危者乎故東垣曰若治以甘淡滲泄陽藥獨陽無陰其欲化得乎此深擷以上治例之妙也如積飲留飲傷脾若土之於雨中則為泥矣或因七情所致手足太陰則病身面浮腫似水氣者用燥脾導氣之劑即愈一則若泥土之得和風暖日水濕去而陽化自然萬物生長一則肺氣開泄滲導通利水氣不滯於脾矣此正諸濕腫滿皆屬脾土諸氣憤郁皆屬於肺而與陰陽為病水氣機之不同故亦不待開鬼門潔淨府而已也水腫繆刺法內經曰經脈滿則絡脈溢絡脈溢則繆刺之以調其經脈使形容如舊而不腫故曰繆刺其處以復其形也玉機云繆刺謂不分其隊穴而刺之也故此水熱穴論無刺水穴分大法水溢於表或腹脹或四肢雖腫而氣稍實脈浮洪者宜行此至病氣孤危脈微弱而四肢水氣盛實者今人往往繆刺之禍不旋踵蓋不審經言脈滿絡溢宜繆刺之理也治水腫以利小便為標以實脾土為本水腫本因脾虛不能制水水漬妄行當以參朮補脾使脾氣得實則自健運自能升降運動其樞機則水自行大抵只宜補中行濕利小便切不可下用二陳湯加人參蒼白朮為主佐以黃芩麥門冬炒梔子制肝木若腹脹少佐以厚朴氣不運加木香木通氣若陷下加升麻柴胡提之隨病加減必須補中行濕二陳治濕加升提之藥能使大便潤而小便長産後必須大補産後必須大補氣血為主少佐蒼朮茯苓使水自降用大劑白朮補脾若壅滿用半夏陳皮香附兼之有熱當清肺金有熱當清肺金麥門冬黃芩之屬南北易地之人不服水土而腫者宜用胃苓湯或因飲食所傷而腫者宜以消導散或因氣鬱濕熱而腫者宜用清熱分氣飲遇仙丹木香檳榔丸因瘡洗逼毒歸內而腫者當以消風敗毒散此數條為有餘之證治法當發汗利二便以治標或因瀉痢後而腫者宜以白朮散或因病後久瘧服藥過度而腫者宜以四苓五皮飲或因産後敗血而腫者宜以分氣補心湯以上皆為不足之證宜分氣養脾脾實自能攝養腎水其腫自消諸家治水腫只知導濕利小便之説執此一途用諸去水之藥往往多死又用導水丸舟車丸神祐丸之類大下之此速死之兆蓋脾極虛而腫愈下愈虛雖劫目前之快而陰損正氣禍亦不旋踵而至大法只宜補中宮為主看所挾加減不爾則死當以嚴氏實脾散加減要知從治塞因塞用之理然後可以語水腫之治耳有久病氣虛而浮手足皆腫是虛氣妄行有産後與經事過多者皆血虛也兼脈虛弱者宜調補氣血凡水腫初病傷於酒濕面熱之類未經攻下消導亦可以三聖散牽牛枳實蘿蔔子三味看大小虛實與之實者三花神祐丸舟車丸禹功散選用之大忌羊肉其性極補水腫食之百人不愈水腫朝寬暮急者血虛暮寬朝急者氣虛朝暮急者氣血俱虛今人不論氣血陰陽只行利藥利之再三而愈甚者多見其不知陰陽妙用也治案子和治一人因道中渴飲水過多漸成腫滿或用三花神祐丸憚其太峻或用五苓散分利水道又太緩淹延數多終無一效蓋粗工之技止於此耳其後手足與腎皆腫大小便皆祕澀常仲明求治於戴人戴人令仲明敷藥未及至而歿戴人曰病水人甚者勢如長川泛溢欲以杯杓取之難矣必以神禹決水之法斯愈又治一人病湧水面黃而喘兩足皆腫按之陷而復起行則濯濯有聲常欲飲水不能睡臥戴人令上湧去痰而汗之次以舟車丸浚川散下之以益腎散復下之以分陰陽利水道之劑復下之水盡瘥戴人治案皆初病而實元虛未虛者當如此治今人蓋謂子和之法不善豈理也哉集成治一人能大飧食肉必泄忽腫頭目甚目不能開膈滿如築足麻至膝惡風陰器挺長脈左沉重取不應右短澀令單煮白朮湯空心服探吐之後以白朮二錢麻黃川芎各五分防風三分作湯下保和丸五十丸吐中得汗上截居多腫遂退眼開氣順食進以前方去麻黃防風加白朮三錢木通通草各五分煎下保和丸五十丸五日而安又治一婦人素多怒因食燒肉面腫不食身倦脈沉澀左豁大此體虛有痰氣為痰所隔不得下降當補虛利痰為主每早以二陳湯加參朮大劑與之後探出藥辰時後用三和湯三倍術睡後以神祐丸七丸撓其痰一月而安藥方赤小豆燥濕利小便最效人但忽略之土狗身黃腰細前二爪如鋸居土中焙乾為末治水腫用上半身即消上身之水下半身即消下身之水分兩邊左可以消左右可以消右方士用此特奇以詐利耳香薷治水腫甚捷有徹上徹下之功肺得之則清化行而水自下用大葉者煎成膏丸服可治水腫水腫發表諸劑金匱麻黃甘草湯治腰以上水腫者宜此汗之麻黃一兩甘草五錢上咀作二服每服水二盞先煮麻黃三四沸去沫入甘草再煎至八分食遠熱服取汗有人患氣喘積久不瘥遂成水腫服此效金匱越婢湯治風水惡風一身悉腫脈浮不渴續自汗出無大熱麻黃石膏各四錢生薑二錢甘草一錢大棗二枚上咀水煎服惡風加附子古今録驗加白朮金匱麻黃附子湯治水腫其脈沉細屬少陰麻黃三錢附子甘草各二錢上作一帖水煎服金匱防己茯苓湯治水病四肢腫水氣在皮膚中四肢聶聶動防己黃耆桂枝各三錢茯苓六錢甘草一錢上咀作二服水煎金匱黃耆芍藥桂枝苦酒湯治黃汗之為病身體腫發熱汗出而渴狀如風水脈自沉黃耆四錢芍藥桂枝各二錢上咀作一服水煎入苦酒相和服和劑小續命湯治風腫麵皮粗麻木不仁加麻黃有熱去附子法宜先服三和散方見氣門一二服後用此續命湯方見風門和劑香蘇散治上氣咳喘面目俱浮水腫分利諸劑和劑五苓散治腫脹濕熱小便不利方見濕門淡寮五皮散治面目虛浮四肢腫滿心腹脹上氣喘急陳皮桑白皮大腹皮茯苓皮生薑皮各等分上咀每服五錢水煎經驗大橘皮湯治濕熱內甚心腹脹水腫小便不利大便滑泄陳皮二錢滑石一兩木香二分檳榔六分白朮茯苓豬苓澤瀉各一錢官桂甘草各四分上咀作二服每服水二盞薑三片煎八分食遠溫服藥院葶藶木香散治濕熱傷脾水腫腹脹小便赤大便滑葶藶木香茯苓肉桂豬苓澤瀉木通各一錢滑石五錢白朮二錢甘草上作一服水二盞煎食前服宣明白朮木香散治喘嗽腫滿欲成水病不能臥不能食小便祕白朮赤茯苓豬苓澤瀉甘草木香檳榔各一錢陳皮二錢官桂五分滑石五錢上咀作二服每服水盞半薑三片煎八分通口溫服濟生疏鑿飲子治水氣遍身浮腫喘呼氣急煩渴大小便不利澤瀉赤小豆炒商陸羌活大腹皮椒目木通秦艽檳榔茯苓皮等分上咀每服七錢水二盞薑五片煎服丹溪加味五皮散治遍身腫滿不分陰水陽水皆可服陳皮桑白皮赤茯苓皮生薑皮大腹皮各一錢薑黃木瓜各一錢上作一服水煎一方去陳皮用五加皮地骨皮三因消腫丸治水腫喘滿小便不利滑石木通白朮黑牽牛炒茯苓茯神半夏制通草陳皮各二錢半木香一錢瞿麥丁香各半兩上為末酒糊丸梧桐子大每服五十丸食前燈心麥門冬湯下良方木香分氣湯治四肢浮腫腹脹中滿脅肋膨虛氣留滯上衝小便臭濁木香檳榔赤茯苓豬苓澤瀉半夏制枳殼麩炒紫蘇子各等分上咀每服七錢水二盞薑三片煎八分入燈心麝少許食遠服濟生赤小豆湯治氣血俱熱遂生瘡疥變為腫滿或煩或渴赤小豆炒當歸商陸澤瀉桑白皮連翹赤芍藥漢防己豬苓各五分上咀水盞半薑三片煎八分食遠服熱甚加犀角經驗茯苓散治諸般氣腫芫花醋拌炒澤瀉郁李仁甜葶藶漢防己藁本各三錢半陳皮去白白茯苓白檳榔瞿麥各半兩滑石大戟各七錢半上為細末每服二錢桑白皮煎湯空心調下取下碧緑水如爛羊脂為度忌鹽食百日醫林白朮澤瀉散治痰病化為水氣傳變水鼓不能食白朮澤瀉陳皮去白木香檳榔茯苓各等分痞加枳實腫加牽牛上咀每服七錢水二盞薑三片煎八分食前服拔萃導氣通經湯治脾氣有餘氣不宣通面目手足浮腫陳皮去白桑白皮白朮木香茯苓各一兩雨水時加澤瀉上咀每服八錢水二盞煎一盞通口服直指蘿蔔子飲治水病浮腫蘿蔔子生半兩赤茯苓牽牛末炒葶藶炒甘草半夏制川芎檳榔青木香辣官桂青皮陳皮白商陸各三錢上咀每服三錢水盞半薑四片煎服集成導水飲子治水飲腫脹吳茱萸三錢黃連茯苓蒼朮各一兩滑石七錢半上為細末滴水丸每服七十丸食前車前子燈心湯下良方人參木香散治水氣腫病人參木香茯苓白朮滑石豬苓澤瀉甘草檳榔琥珀各等分上為末每服五錢水盞半薑三片煎七分不拘時日進三服拔萃楮實子丸治水氣鼓脹潔淨府楮實子一斗五升膏白丁香一兩白茯苓二兩上二味為末用膏子為丸梧桐子大服至小便清利及腹脹消為度後服補中調養藥病機白茯苓湯治變水白茯苓澤瀉各二兩郁李仁二錢上咀作二服每服水盞半煎七分常服從少至多或煎熟入薑汁和麵或作粥飯常服五七日後脹下再與白朮散病機白朮散白朮澤