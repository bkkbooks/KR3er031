方木香塌腫散治水腫二便祕澀方見脹滿門玉機大戟散治水腫腹大如鼓或遍身俱腫大戟白牽牛木香各等分上為細末每服三錢以豬腰子一對批開擦藥在內燒熟空心食之如食左腰子左臂塌消食右消右如腫不盡於腹繞塗甘遂末飲甘草水少許其腫自消神助木香散治二十四脹鼓病木香沉香各二錢砂仁葶藶益智仁連翹各三錢桑白皮白牽牛半炒陳皮枳殼木通黑牽牛半炒椒目青皮澤瀉大黃各半兩檳榔胡椒各一錢甘遂四錢上為細末米醋糊為丸如梧桐子大每服五錢空心五更嚼蔥白湯下消上次服橘皮湯下消中三服桑白皮湯下消下倘有餘腫沉香湯下忌鹽醬大腹皮散治風水身體浮腫發歇不定上氣喘急肢節疼大腹皮桑白皮川芎漢防己羌活青皮大黃檳榔各七分桂心甘草各三分上咀作一服水盞半薑三片煎六分不拘時溫服仲景十棗湯治水氣四肢浮腫上氣喘急大小便不通方可為丸三花神祐丸治前症舟車丸浚川散四方並見痰飲門聖惠牽牛湯治腹中濕熱足脛微腫中滿氣急咳嗽喘息小便不利牽牛頭末一兩厚朴薑製五錢上為細末每服二錢薑棗湯調下或水丸服聖惠順氣丸一名氣寶丸治腰脅俱病如抱一甕肌膚堅硬按之如鼓腳腫不能屈伸脊瘦露骨四肢無力木香茴香炒羌活檳榔木瓜川芎當歸酒浸各一兩黑牽牛青皮陳皮各一兩大黃兩半皂角四兩上為細末熬皂角膏丸如梧桐子大每服五六十丸溫湯下楊氏十水丸治十種水腫四肢脹滿面目虛浮以手按之少時方起喘急不得臥小便赤澀遠志石菖蒲椒目羌活大戟肉豆蔻麵包煨各一兩澤瀉豬苓胡葶藶炒白牽牛炒各半兩上為末麵糊丸如梧桐子大每服三十丸米飲下良方半邊散治諸般水腫芫花醋浸焙乾甘遂大戟大黃各三錢土狗七枚五月內取細腰能飛者上先以蔥搗爛馬餅攤新瓦上將土狗攤蔥上焙乾去翅嘴每個剪作兩片分左右成對記之再焙乾為末欲退左邊腫即以左七片為末入前藥二錢調服右邊如之淡竹葉天門冬煎湯調五更服候左邊退至四日服右邊如或未動只以大黃三錢煎至一半助之如不動茶清助之良方神助丸又名葶藶丸治十種水氣面目四肢遍身俱腫大戟一青水先從左脅腫起根在肝葶藶二赤水舌根腫起一云腳跟腫起根在心甘遂三黃水腰腹腫起根在脾桑白皮四白水從腳腫起根在肺連翹五黑水從外腎腫起根在腎羌花醋炒六玄水從面腫起根在膽澤瀉七風水從四肢腫起根在胃藁本八石水從臍腫起根在膀胱巴豆去油九里水從小腹腫起根在小腸赤小豆十氣水或盛或衰根在大腸上十味用所主藥一兩余者各半兩研為細末煉蜜為丸梧桐子大每服十丸茯苓湯下一日三服忌鹽百日及魚蝦麵食一切毒物房事半年病愈後更服鴨頭丸濟生鴨頭丸治濕熱遍身悉腫腹脹喘急二便祕澀甜葶藶微炒豬苓防己各一兩上為細末取緑頭鴨血和丸梧桐子大每服七十丸食前白湯送下雄黃神金散治十種水腫證候桑白皮雄黃芫花醋炒甘遂大戟茯苓澤瀉葶藶椒目巴戟上為細末所主藥加倍余各等分每服二三錢空心用井水調服以利為度量人虛實加減法如前良方防己湯治膜外氣水病不限年月深淺浮腫大喘防己大戟木香赤茯苓海蛤椒目白朮犀角屑葶藶防風木通訶子肉陳皮牽牛檳榔郁李仁桑白皮紫蘇各一兩大黃二兩麝香少許湯擂去腳上咀分作二劑以水三升隔宿浸明日五更用文火煎減去一升攪取飲可三盞平旦空心先飲一盞如人行五里又服一盞至第三服如藥冷用重湯暖之不可冷服若久病腹中虛服至第三盞則微汗三兩行若腹中實者至日午即轉瀉宜用盆盛驗之必有汙濁黃水或青黑之物出三五升並氣化為之瀉若不甚濁困倦切勿止之必自住若覺力乏即服漿粥補之後隔三五日又服一劑仍依此法服之按徒都先生云服第一劑則病減半至第二劑則去根本前後歷試重者朝及二劑而暮已瘥根本深者服藥即腫消能起但覺小腹內有塊結則須後劑其藥滓慎勿拋棄布囊盛懸於風中他日或有微覺發動則更煎可更治兩人徒都先生云人家有此藥滓懸於戶上一家終不患疫氣此飲不獨治水氣凡是氣病皆治之若患肺氣不限年月深淺於此十二味中減去大黃及訶子加貝母人參以童便煎每日空心服之當去病根有患肺氣困重者因逢患水氣人服此藥偶得一盞服之水瘥有人患腳氣時時衝心服此亦除根本以此推之但是氣病皆治不獨治水氣而已婦人有孕服之亦無妨小兒老人隨意增減良方退腫集腎丸治諸腫商陸豬苓漢防己苦葶藶椒目滑石海金沙黑牽牛大腹皮赤茯苓各一兩巴豆二十七粒去油黃連淨一兩上為細末煨蒜搗爛為丸梧桐子大每服二十五丸五更溫服兩日一次初服商陸湯下次服赤豆湯下三服木瓜湯下雄黃木香散治男婦八十種水氣取水法大鯽魚一尾去鱗肚入大戟甘遂各二錢半雄黃另研黑牽牛木香各半兩土狗一枚另研上以大戟甘遂一半入魚內煨令焦取出焙乾同衆藥研為末每服二三錢冷水調下宣明牽牛丸治一切濕熱腫滿等疾黑牽牛黃芩大黃大椒滑石各等分上為末酒煮麵糊丸梧桐子大每服五丸至七丸薑湯下聖惠牛郎丸治諸水腫檳榔枳殼黑牽牛白牽牛半生熟上各等分為細末水丸梧桐子大每服五六十丸商陸湯下良方奪命丸治水氣腫病大戟麩炒甘遂炒各一分苦葶藶五錢半生半炒澤瀉一分半上為細末煮棗肉為丸梧桐子大若四肢腫者名為順水溫漿水下三丸星月上時服至天曉利下惡物若四肢瘦腹腫者名為逆水以苦葫蘆子陳面煎湯下二便頻快是效商陸赤豆湯生商陸切如豆大赤小豆各等分鯽魚二尾去腸肚留鱗上將二味實裝魚腹中線縛水三升慢火煮豆爛去魚取二味空心食之以魚汁送下甚者過二日再為之不過三劑瘥醫林溫白丸治一切積聚腹中有塊久久不治變成腫脹川烏制二兩半皂角去皮子炙巴豆炒去油各五分厚朴薑炒吳茱萸泡紫菀茯苓人參桔梗菖蒲柴胡乾薑炮肉桂川椒炒出汗黃連各五分上除巴豆另研外余為末入巴和勻煉蜜丸梧桐子大每服七丸食遠薑湯下治氣腫水腫腹中有塊用木香木瓜檳榔商陸磨湯下血腫者有赤紫紋用蘇木桃仁赤小豆煎湯下直指行水丸治前證葫蘆巴炒破故紙炒砂仁蓽澄茄川椒淨炒出汗烏梅肉各二錢半牽牛炒各半兩巴豆略去油錢半上為末麵糊丸緑豆大每服五丸食後薑湯下塗臍膏治腫滿小便少地龍豬苓針砂各等分上為末蔥涎調內臍中寸高以帛束之灸法水分一穴在臍上一寸灸七壯療腹腫不能食若是水病宜灸神闕一穴當臍中灸三壯主水腫鼓脹腸鳴如流水之聲極效石門一穴在臍下二寸灸七壯主水脹水氣行皮中小便黃氣滿腫三里二穴在膝下三寸胻外廉兩筋間灸七壯主水腹脹皮腫水溝一名人中在鼻下灸三壯主一切水腫人中平滿證水腫證惟得針水溝若針余穴水盡即死此明堂銅人所戒也庸醫多為人針分水誤人多矣若其他穴或有針得瘥者特幸焉耳大抵水腫禁針不可為法易簡諸方一方治水腫用黑豆一升水五升煮三升去滓入酒五升更煎取三升分溫三服未瘥再服一方用鯉魚一個極大者去頭尾及骨惟取肉以水二斗赤小豆一升合煮取二升以上用生布絞去滓頓服盡如不盡分三服利盡即瘥一方治十種水腫用鯉魚和冬瓜蔥白作羹食之一方治水腫氣脹不消食用香薷不拘多少細咀入釜中水浸上數寸煮使味盡去滓澄清熬稠丸如梧桐子大每服五丸日三服漸增以小便利為度一方治身體手足卒腫用蚯蚓糞為末臘醋調塗患處愈一方治遍黃腫用瓜蒂三四錢焙乾為末用半字吹鼻內日一度吹三四日如不愈後用黃芩末五錢煎湯下兵部手集治水病初得危急冬瓜不拘多少白水熟煮任意食之神效無比又方治前症以烏牛尿不拘多少每日服一盞頻用效肘後方治遍身卒腫用皂角刺炒黃色銼三升酒十盞煎四盞每服一盞日二服效又方治前證甘遂一分為末豬腎一枚分為七臠滲甘遂入內以慢火炙熟作一服食之覺腹脅鳴二便利為驗又方菟絲子一升酒五碗漬三宿去滓每服一盞溫服日二進千金髓方治水病肚脹四肢腫用黃瓜一根切開勿去子以醋煮一半水煮一半俱爛空心頓服又方用棗子一斗放鍋入水淹四指用大戟連根苗放在上煮熟去大戟時時吃之棗盡即愈又方治男子婦人積年腳氣腫痛及肚腹蠱脹商陸不拘多少切碎無灰酒煮熟連渣吃如鼓腫同米煮粥服忌鹽醬又方以杏仁去皮尖研碎同粳米煮粥食之外臺祕要治一切水腫用紅花二兩杵爛入水半盞取汁服之不過三服便愈又方治水腫用苦葫蘆子炒為末每服二錢陳皮木通煎湯下又方治酒腫脾虛發腫用醋煮香附子焙乾為末醋糊丸梧桐子大每服五十丸白湯下又方治腳氣水腫頭面俱腫心腹滿小便不利以馬齒莧一握和少粳米醬汁煮食之太平聖惠方治十種水病腫滿喘促不得臥以蛄螻五枚曬乾為末用食前白湯下五分匕或至一錢小便通為效又方治水氣遍身浮腫氣促坐臥不得用牽牛一兩微炒搗為末用烏牛尿三盞浸一宿平旦一服蔥白一握煎十餘沸去滓空心分為三服從小便中利下梅師方治水腫不能坐臥頭面遍身悉腫取蒴藋根刮去皮搗汁一合空心熱服當微吐即愈又方治前症用東引花桑枝燒灰一升淋汁煮赤小豆一升空心食令飽飢則食之不可飲湯又方治水腫不能服藥商陸二兩銼羊肉六兩以水五升熬取二碗極爛去商陸留肉用蔥豉作脯如常食之又方治水腫用續隨子一兩去殼研以紙裹出油研為末分作七服男溫酒下女荊芥湯下三服得利即止忌鹽醬百日崔氏方治水氣用葶藶三兩以物盛甑上蒸令熟即搗萬杵成膏丸如梧桐子大每服二十丸漸加至三十丸食遠薑湯下微利則愈不可多服令人飲食不美若氣喘亦服之若氣下即止此方治水氣無比經驗方治水病用樟柳根去粗皮薄切曬乾為末用黃顙魚三頭大蒜三瓣緑豆一合以水一大碗同者煮豆爛為度將豆任意先吃了卻以汁調藥末一錢匕其水化為清氣散去附陰腫門病機夫陰腫者皆由膀胱蘊熱風濕相乘或濕熱水腫流注或疝氣攻作或暴風客熱及小兒啼叫怒氣結聚或蟲蟻吹毒所致詳其所因施以方治藥方三白散治膀胱蘊熱風濕相乘陰囊腫脹二便不利白醜二兩桑白皮白朮木通陳皮各半兩上為末每服二錢空心薑湯調下小兒服五分地龍膏治大人小兒外腎腫或疝氣風熱暴腫及陰瘡腫生乾地龍不拘多少為末先以蔥椒湯無風處洗用津調敷外腎或用熱雞子清調敷或加牡蠣末尤佳桃仁丸治小兒啼叫怒氣閉於下結聚陰腫不散桃仁去皮尖炒三錢官桂牽牛炒為末白蒺藜牡丹皮大黃各三錢上為末煉蜜丸如梧桐子大每服五七十丸不拘時用青皮木通蔥白鹽少許同煎湯送下或煎木香流氣飲方見氣門牡蠣散治小兒陰莖腫通明牡蠣粉為細末先用津調塗次以粉擦之桃仁研膏津調敷蟬蛻散治脬囊腫小兒坐地為風濕所襲或蟻蚓所吹蟬蛻五錢上水一盞煎湯洗再溫再洗仍以五苓散加燈心煎易簡諸方集驗方治外腎腫脹用小茴穿山甲俱炒木香各等分為末每服二錢空心酒調下痛止立效又方治陰腎腫疼用萵苣子一合為末水一盞煎五分去滓溫服不拘時三服大驗又方治陰腫鐵精粉敷患處又方治男子婦人陰腫大如升核痛人所不能治者用此神效馬鞭草爛搗絞汁塗之遇仙方治小兒外腎焮赤腫痛日夜呻吟退皮殼愈了又發用老杉木燒灰入膩粉香油調敷又方用蔥園內蚯蚓糞甘草煎汁調塗生薄荷汁敷亦可又方用荊芥穗一兩朴硝二兩蘿蔔子兩半蔥白同煎湯淋洗子母祕録治婦人陰腫堅痛枳實半斤咀炒熱帛裹尉冷易之梅師方治卒外腎腫痛大黃末和醋塗之干即易之又方治卒陰腎痛牛糞燒為末和酒敷之干即易又方治男子陰腫如斗及核痛人所不能治者用蕪菁根搗爛敷之立愈
