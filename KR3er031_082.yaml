body:
  text: 卷之八十二婦科心鏡上婦人之疾惟調經胎産為至要固有大異於丈夫只言婦科者恐先工此也其餘雜病多與男子同茲專集胎産須知一卷於前分析雜症二卷於後俾檢閲者知所先後重輕焉極一方總論夫天地造端於夫婦乾坤配合於陰陽雖清濁動靜之不同而成象效法之有類原茲婦人之病與男子不同者亦有數焉古方以婦人之病比男子十倍難治不亦言之深乎但三十六病産蓐一門兒子無之此集以胎産別編一門名胎産須知其餘外傷風寒暑濕內積喜怒憂思飲食房勞虛實寒熱悉與丈夫一同也處治大法亦同宜加詳察不可因其男女而頓有殊也産寶方論古者治婦人別著方論者以其胎妊生産崩傷之異況婦人之病比之男子十分難療蓋女子嗜欲過於丈夫感病倍於男子加之慈戀愛憎嫉妒憂恚染著堅牢性情窒郁所以為病情思偏僻蒂固根深治之難愈況於妊娠而挾病也豈不難矣不特避其毒藥仍須審其實虛冷熱而調治之無使妄投湯劑以致實實虛虛之誤也博濟方論夫人將攝順理則血氣調和風寒暑濕不能為害若勞傷血氣則風冷乘虛而干之或作之於經絡或循入腹中內受邪傷脾胃虛弱故不能消飲食食既不充榮衛凝滯肌膚黃燥面不光澤若大腸氣虛則變為下利若流入關元致絶子嗣隨其所傷而變成疾矣醫經曰凡婦人三十六種病皆由子臟冷熱勞損而挾帶下起於胞內也是故衝任之脈為十二經之會海婦人之病皆見手少陰太陽之經而候之寇宗奭論治婦人雖有別科然亦有不能盡聖人之法者今豪貴之家居奧室之中處惟幔之內復以綿幪手臂既不能行望色之神又不能盡切脈之巧四者有二闕焉黃帝曰凡治病察其形氣色澤形氣相得謂之可治也色澤已浮滑之易已形氣相失謂之難治色夭不澤謂之難已又曰診病之道觀人勇怯骨肉皮膚能知其虛實以為診法若婦人脈病不相應既不得見其形醫惟據脈供藥其可得乎如此言之豈能盡其術也此世之通患醫者不免盡理質問病家見所問繁逮為醫學不精往往得藥不信似此甚多扁鵲見齊侯之色尚不之信況其不得見者乎嗚呼可謂難也已脈候脈經曰寸口脈微而澀微則衛氣不足澀則榮氣無餘衛不足其息短其形躁血不足其形逆榮衛俱虛言語乏力趺陽脈微而澀微則胃氣虛虛則短氣咽燥而口苦澀則失液少陰脈微而遲微則無精遲則陰中寒澀則血不流而經閉此為居經或三月一來脈微血氣俱虛年少者亡血也乳子不下者此為居經亦三月一來脈微弱而澀年少得此為無子中年得此為絶産六脈沉弦細數者其病己成元氣榮衛俱虛雖藥弗效通用方論遠用方者婦科之通用也一方可以治數證不可入於專門皆是名賢所立世人常用有效之方雖曰通用亦不可執一泥之而不知加減之權宜也惟應病裁處方為神妙局方四物湯雖云治婦人衆病惟血病者用之若兼脾胃虛弱者亦難用也何則芍藥酸寒能伐殺生之氣生地甘滯凝膈壅胸而脾胃虛者益加損弱血脈不行而經愈塞矣若脾胃虛甚單用四君子湯以健脾脾稍健方可合二方為八物服之庶不偏誤昔張聲道用四物湯治婦人百病加吳茱萸煎服若陽臟之人少加茱萸若陰臟人多加茱萸此善用四物湯者若得茱萸則芍藥地黃之寒滯不能害脾胃也豈不善夫當歸二錢白芍藥一錢川芎七分生地黃養生方用熟和劑亦然本草云男子宜熟女子宜生以其行血合用生者上煎法及加減法並見螽斯廣育卷中局方四君子湯治脾胃虛弱氣不運行以至經血不調不得純用四物宜以四君子湯合之名曰八物湯加吳茱萸煎服虛甚者加黃耆肉桂名曰十全大補湯人參二錢白朮一錢茯苓八分炙甘草五分加薑棗煎服丹參散良方云丹參一味其治頗類四物湯能破宿血補新血安生胎落死胎止崩中帶下調經下産後惡血兼治冷熱勞腰脊痛骨節煩疼丹參酒洗去土晾乾切上為細末每服二錢溫酒調下經脈不調食前服冷熱癆不拘時服南嶽夫人濟陰丹治婦人血氣久冷陰虛及數經墮胎皆因衝任血脈虛損經水不時暴下不止月內再行不時崩漏三十六疾積聚癖瘕臍下冷痛小便白濁凡有上疾不成孕育産後百日內常服除宿血生新血令人有孕生子充實亦治男子亡血諸疾秦艽石斛去根酒浸焙藁本甘草炙蠶布燒灰存性桔梗各二兩京墨煅醋淬茯苓各一兩人參二兩桃仁去皮尖炒木香各一兩熟地黃酒洗香附子炒澤蘭各四兩當歸酒洗肉桂乾薑炮細辛川芎牡丹皮各兩半山藥炒川椒去目各半兩蒼朮制八兩大豆黃卷炒半升糯米炒一升上為細末煉蜜和成劑每兩作六丸每服一丸細嚼空心食前溫酒送下琥珀丸治婦人或老或少産前産後百病及療三十六種諸病七疝八瘕心腹刺痛卒中癱瘓半身不遂八風十二痹手足痠疼乳中毒結懷胎驚動傷犯不安死胎不下並治琥珀辰砂各另研沉香阿膠碎炒肉桂石斛去根附子制五味子川芎各半兩牛膝酒浸當歸肉灰蓉酒洗曬乾人參續斷沒藥熟地黃木香各一兩上為細末煉蜜和丸如彈子大每服一丸空心溫酒化開服午晚食前服能生精血去惡血腹脅疼痛繞臍如刀刺及嘔逆上氣築心痰毒不思飲食用薑汁少許和酒化服諸痢及赤白帶下血冷崩中漏胎下血生薑與艾銼炒令赤色入酒同煎數沸去渣化服諸淋及便澀煎通草燈心湯化服遍身虛腫水氣煎赤小豆湯化服血暈不知人事當歸酒化服泄瀉不止陳米飲化服産內二毒傷寒及中風角弓反張身如板硬煎麻黃湯服出汗月經不通或間雜五色頻並而下斷續不止飲食無味肌膚瘦怯面赤唇焦乍寒乍熱四肢煩疼五心躁熱黑皯遍身血斑赤腫走疰及血風勞傷無力用童便入薑汁少許化服常服以小便為妙若恐噁心和以半酒孕婦臨月一日一服至産下不覺疼痛或病人服至五服十服日倍飲食其功不可盡述服之者當自覺矣三因烏雞煎丸治婦人百病良薑乾薑炮吳茱萸醋炒當歸赤芍藥玄胡索破故紙炒川椒炒劉寄奴生地黃陳皮青皮川芎莪朮煨各一兩荷葉灰四兩熟蘄艾二兩制如法烏骨白雞一隻制如法骨肉俱焙燥為末汁和醋打糊為丸如梧桐子大每服五十丸月水不通紅花蘇木酒下白帶牡蠣粉調酒下子宮下元久冷吳茱萸湯下心頭痛菖蒲湯下頭風藁本湯下腰腳疼當歸湯下咳嗽桑白皮湯下常服酒湯下祕方烏雞煎丸治婦人百病血氣虛勞赤白帶下人參二兩黃耆六兩茯苓三兩當歸六兩生地黃熟地黃香附子各四兩地骨皮官桂各二兩上用烏骨白雞一隻男用雌女用雄籠住將黃耆末和炒麵丸雞頭子大餵雞二七日吊死去腸肚干撏毛淨槌碎骨入前藥末於內縫密用酒醋各一瓶煮一宿取去骨焙枯研用汁打糊丸如梧桐子大每服五十丸鹽湯下和劑熟乾地黃丸治婦人風虛勞冷胃弱水殼不化或腸虛受冷大便時泄或月水不調淋瀝不止或經閉不通結聚癥瘕久不成胎一切諸虛之證並皆治之熟乾地黃酒洗五味子柏子仁芎藭各兩半澤蘭葉二兩禹餘糧煅紅醋淬三遍細研防風肉蓯蓉酒浸白茯苓厚朴薑汁炒白芷乾薑炮山藥石斛卷柏去梗各二兩當歸酒洗藁本細辛川椒去目微炒人參牛膝酒浸甘草炙各一兩蛇床子炒蕪荑炒杜仲薑炒續斷赤石脂煅醋淬石膏煅各一兩肉桂艾葉白朮各二兩二分紫石英煅醋淬飛三兩上為細末煉蜜丸梧桐子大每服三十丸空心溫酒或米飲下常服養血補氣調和榮衛充實肌膚駐顏令人有子溫平不熱無毒妊婦不宜服勝金丹治婦人月水過期不通久無子息血癖氣痛四肢浮腫嘔逆心痛虛煩鬱悶面色痿黃崩漏帶下寒熱蒸勞頰痛齒疼血下無度産前安胎臨産催生下瘀血血氣結塊腹中刺痛手足頑麻産後諸疾並治牡丹皮藁本人參白朮白茯苓當歸川芎白芍藥赤石脂玄胡索肉桂白薇各一兩沉香甘草炙各等分上為細末煉蜜為丸彈子大每服一丸空心溫酒下凡妊娠臨月服此五六丸即易産如無子息服二十日當月有好並治血風半身不遂種種疾病不問年深月久皆療神效大聖散治婦人血海虛冷久無子息及産後敗血衝心中風口噤子死腹中灌得藥入須臾生下並治墮胎腹中刺痛橫生逆産胎衣不下血崩血暈血滯及傷寒吐逆寒熱往來赤白帶下室女經脈不通並宜服之澤蘭葉石膏另研各二兩卷柏白茯苓防風厚朴薑製細辛柏子仁炒桔梗吳茱萸各一兩五味子人參黃耆白朮川烏炮去皮臍藁本乾薑炮川椒微炒出汗丹參白芷各三分蕪荑微炒赤甘草炙川芎當歸白薇阿膠炒成珠芍藥各一兩肉桂半兩生地黃兩半上為細末每服二錢空心臨臥用溫酒調下若急疾有患不拘時服日三次大效內補丸治婦人稟氣虛弱及五勞七傷臟腑積冷痃癖癥塊虛脹或經脈不調亦白帶下口苦舌乾面色痿黃心煩驚悸頭目旋暈飲食不美痰涎黏盛百節疼痛無力肌肉消瘦子息不生服藥一月必有妊百病皆愈川萆薢四兩牛膝五加皮白朮各二兩川烏炮枳實丹參各一兩上為細末煉蜜丸如梧桐子大溫酒下二十丸空心日午晚食前各進一服中風門與前證參看病機婦人中風角弓反張風痹手足不隨偏枯口噤口眼喎斜風眩頭痛血風心神驚悸癲狂骨節痛風血風走注瘙癢癮疹風痰腳氣腰痛諸疾以上諸證雖各有方論亦要先明其大體察脈之虛實辨證之冷熱相人之強弱入臟入腑在絡在經首以局方調治未可孟浪處施今之治法先宜順氣然後治風萬不失一蓋有中風中寒中暍中痰中氣皆能令人涎潮昏塞所謂朱紫相臨玉石不分醫者不可不詳也如中風若作中氣治之十愈八九中氣若作中風治之十無一生所以疑惑之間不問中風中氣首以蘇合香丸麝香煎五積散如中痰則有參蘇飲如中寒則有理中湯如中暍有白虎湯的然中風如三生飲木香煮散排風續命風引大小竹瀝大八風湯至寶丹牛黃清心丸辨其冷熱虛實而投之未有不安者也然此疾積襲之久非一日所能致今人服藥二三服便欲責無效多見其不知量也須宜大劑久服方可奏功孟子曰七年之病求三年之艾也信夫藥方至寶丹蘇合丸五積散牛黃清心丸並見前中風門和劑排風湯治男子婦人風虛濕冷邪氣入臟狂言妄語精神錯亂及風入五臟等白蘚皮白朮白芍藥桂心川芎當歸防風杏仁去皮尖麩炒甘草各二兩白茯苓麻黃獨活各三兩上咀每服五錢水盞半薑四片煎八分不拘時服三生散治卒中昏不知人口眼喎斜半身不遂咽喉作聲痰氣上壅無問外感風寒內傷喜怒或六脈沉伏或指下浮盛並宜服之兼治痰厥及氣虛眩暈悉有神效生南星一兩生川烏去皮尖生附子去皮臍各半兩木香一分上咀每服半兩水二盞薑十片煎六分溫服或口噤不省人事者用北細辛皂角各少許為細末或只用半夏為細末少許用蘆管吹入鼻中俟噴嚏其人少蘇然後進溫藥如氣盛人只用南星半兩木香一錢生薑十四片煎兩服飲之名星香飲參蘇飲治痰飲停積胸中中脘閉塞嘔吐痰涎眩暈嘈雜忪悸噦逆及痰氣中人停留關節手足嚲曳口眼喎斜半身不遂食已即嘔頭疼發熱狀如傷寒附子理中湯治五臟中寒四肢強直失音不語昔有武將守邊大雪出帳觀瞻忽然卒倒時有隨行醫官灌以此藥兩劑遂蘇二方見傷寒門加減小續命湯治卒暴中風不管人事遂覺半身不遂口眼喎斜手足戰掉語言謇澀肢體麻痹神思昏亂頭目眩重筋脈拘攣骨節煩疼及治諸風服之皆驗若治腳氣緩弱久服得瘥久病風人每遇天色陰晦節候變更宜預服之以防喑啞方見中風門木香煮散治左癱右瘓並素有風濕此藥調氣進食寬中羌活麻黃各一兩防風三分白朮陳皮白茯苓當歸川芎牛膝黑附子炮木香檳榔人參大川烏炮草豆蔻連皮炮杏仁去皮尖麩炒甘草桂心各半兩上咀每服四錢水盞半薑五片煎八分熱服大便不通加大黃心腹脹加苦葶藶滑石膈上壅滯咳嗽氣促加半夏川升麻天門冬知母小風引湯防風獨活細辛川芎北五味子白茯苓人參白芍藥白朮甘草各等分上咀每服三錢水一盞薑三片杏仁五枚去皮尖槌碎同煎至七分去渣溫服大風引子即此方加麻黃蓯蓉附子當歸羚羊角五味子烏藥順氣散治男子婦人一切風氣攻注四肢骨節疼痛遍身頑麻凡卒中風手足癱瘓言語謇澀者皆宜先服此藥以疏氣道後隨證投以風藥方見風門神仙解語丹治心脾二經受風言語謇澀舌強不轉及淫邪搏陰神內鬱塞心脈閉滯暴不能言白附子炮石菖蒲遠志去心甘草煎水煮過十沸天麻全蠍去毒炒羌活白殭蠶炒牛膽南星各一兩木香半兩上為細末糊丸梧桐子大量入辰砂為衣每服二十丸至三十丸不拘時薄荷湯送下三痹湯治婦人血氣凝滯手足拘攣風痹氣痹等疾皆療川續斷杜仲薑汁炒防風桂心華陰細辛人參白茯苓當歸白芍藥甘草秦艽生地黃川芎川獨活各半兩黃耆川牛膝各一兩上咀為末每服五錢水二盞薑三片棗一枚煎一盞去渣熱服無時但腹稍飢服之有人病左臂不隨後已痊平而手指不便無力服此遂安五痹湯治婦人風寒濕氣客留肌膚手足緩弱麻痹不仁片子薑黃羌活白朮防風甘草炙各一兩上咀每服四錢薑七片煎病在上食後服病在下食前服續命煮散防風湯舒經湯茯苓丸獨活寄生湯上方並見風門血風癮疹瘙癢門病機婦人體虛為風邪氣客於皮膚復逢風寒相折則起風瘙癮疹若赤疹者由涼濕折於肌肌中之極熱結成赤疹也得天熱則劇取冷則瘥白疹者由風氣折於肌中肌中熱熱與風相搏即為白疹得天陰雨冷則劇出風中亦劇得晴暖則減著衣暖亦瘥也脈當浮洪浮即為風洪即為氣風氣相搏則為癮疹身休為癢凡人汗出不可露臥及浴使人振寒熱生風疹也局方治婦人時發遍身瘙癢赤腫癮疹五心煩熱血風攻注者人參荊芥散消風散四物湯加荊芥煎或人參當歸散或逍遙散或服導赤丸如不通者食後服皂角丸氣虛老人不可久服如服皂角丸不效者此凝滯熱甚宜先服青木香丸以開氣道卻服前藥則效藥方何首烏散治婦人血風皮膚瘙癢心神煩悶及血風遊走不定何首烏防風白蒺藜枳殼天麻殭蠶胡麻茺蔚子蔓荊子各等分上為細末每服二錢茵陳煎湯不拘時調服張氏附子酒治婦人痛風血風身上瘙癢生附子不去皮重一兩皂角刺二十一枚黑豆一合上咀分為兩處用好酒兩瓶入上件藥慢火輝候乾過半兩瓶合作一瓶密封泥頭經兩宿每服一盞溫服無時病愈則止聖惠蒼耳散治女人風癢癮疹不止蒼耳花葉子各等分上為細末用豆汁酒調下二錢白蜜酒治癮疹白蜜不拘多少上調好酒熱服已試有效初虞世方治皮膚有風熱遍身生癮疹牛蒡子水煮一兩淨熬干炒令香浮萍蒸過焙乾等分上為細末每服三錢食遠蔥湯調服取微汗本草蟬蛻散治風客於皮膚搔之不已蟬蛻洗淨大葉薄荷各等分為末無時溫酒調下方寸匕蛇蛻散治同前露蜂房洗過蜜炙焦蛇蛻洗炙焦等分為細末溫酒調下一錢日二服頭目眩暈門病機婦人虛風頭目眩暈及心眩是體虛受風上入於腦也諸臟腑之精皆上注於目其血氣與脈並上屬於腦也循脈引於目系目系急故令眩也其眩不止風邪甚變成癲疾藥方本事鉤藤散治肝厥頭暈鉤藤陳皮半夏麥門冬去心茯苓茯神人參甘菊花防風各半兩甘草二錢石膏一兩上咀每服四錢水盞半加薑七片煎八分去渣熱服許叔微方治婦人患頭風者十居八九每發必掉眩如在車舟上蓋因血虛肝有風邪襲之耳余常處此方以治人甚效川芎一兩羌活半兩當歸三錢旋覆花細辛防風蔓荊子石膏藁本半夏曲荊芥穗乾地黃甘草各半兩上咀每服三錢水盞半薑三片煎七分溫服頭痛連齒時發時止連年不已此由風寒中於骨髓留而不去腦為髓海故頭痛齒亦痛謂之厥逆頭痛宜白附子散若血虛氣虛宜從丹溪方法並見頭痛門白附子散麻黃連根節烏頭泡去皮南星泡各半兩白附子泡一兩全蠍炒五枚辰砂研一分麝香研一分白薑一分上為細末酒調一字服訖去枕臥少時追風散治年深日近偏正頭疼又治肝經久虛血氣衰弱風毒之氣上攻頭痛頭眩目暈心悸煩熱百節痠疼腦昏目痛鼻塞聲重項背拘急皮膚瘙癢面上遊風狀若蟲行及一切頭風兼治婦人血風攻注頭目昏痛皆治川烏炮去皮尖防風石膏煅川芎甘草炙荊芥穗白殭蠶炒各一錢天麻南星泡羌活地龍白芷白附子泡全蠍去尾各半兩草烏泡去皮尖雄黃研各一分沒藥研乳香研各一分上為細末每服五分入好茶少許同調食後臨臥服常服清頭目利咽膈消風化痰都梁丸治諸風頭目眩暈感冒傷風頭痛白芷杭州大塊新色者用沸湯洗三四次曬乾上為細末煉蜜丸如彈子大每服一丸多用荊芥點臘茶細嚼下食後常服只干嚼下亦可乾血氣癆候病機凡婦人室女月經暫來忽去遲早無期此則癆瘵之漸機也智者不可以其近淺而忽之其始由於失期其終遂至閉絶午後發熱咳嗽吐紅或乾咳嗽或咳痰飲煩躁不寧不能平睡二便不利六脈細數此皆不可救之證也今見室女十五六步以上者天癸初至數月半年或至或斷忽然不通發熱咳嗽飲食無味速用調理養血和脾庶可獲愈今醫不察竟用破血通經辛熱之藥及耗氣血益火傷脾遂無痊日此證蓋起於脾臟思慮感傷氣血失度所以經至不能如期也甚至不通是由內火蒸爍元氣亦耗則必死矣善醫者當先調脾以養血切勿竟用辛燥助火之味如香附須些少佐之撫芎亦不敢多用薑桂香砂玄胡莪朮烏藥菖蒲等破耗之藥不可輕用如犯此類多致不救為良醫者其深察之藥方集驗調衛養榮湯治婦人室女一切月經不調或先或後或絶閉不通憎寒壯熱口苦無味飲食少思連聲咳嗽煩躁頭眩漸成癆證者此藥主之陳皮白朮當歸生地黃沙參麥門冬各一錢牡丹皮地骨皮各八分桔梗柴胡梢各五分穀芽一錢甘草四分上水煎加蓮子薑棗痰中見血加側柏枝煎早晚服煩躁口乾者加炒山梔倍麥門冬脅下脹疼加青皮川芎胸膈滿悶加黃連薑炒枳實去麥冬地骨夜出盜汗加黃連黃耆去柴胡桔梗大便閉結加桃仁倍當歸咳嗽不已加栝蔞阿膠頭眩頭痛加天麻川芎小水不利加木通茯苓煩渴不利加滑石倍麥門冬局方瓊玉膏治月經不通煩熱咳嗽良方當歸膏治月經不調血虛煩熱後期而至方見咳嗽門加味八珍湯歸神湯並治前證方見夢交門癆擦候病機夫骨蒸殗殜復連尸疰癆疰蟲疰熱疰冷疰食疰鬼疰等皆曰傳尸以疰者注也病自上疰下與前人相似故曰疰其變有二十二種或三十六種或九十九種大略令人寒熱盜汗夢與鬼交遺泄白濁發乾而聳或腹中有塊或腦後兩邊有小核連數個或聚或散沉沉默默咳嗽痰涎或咳嗽膿血如肺痿肺癰之狀或腹下利羸瘦困乏不自勝持積月纍年以至於死死後乃疰易傍人以致滅門者是也更有飛尸遁尸寒尸喪尸尸疰等謂之五尸大小附著等證不的知其所苦無處不惡乃挾諸鬼邪而害人以三因考之內非七情所忤外非四氣所襲雖若麗乎不內外因奈其證多端傳變遷移難以推測故自古及今愈此病者十不得一所謂貍骨獺肝天靈蓋銅鑑鼻徒有其説未嘗見效唯膏肓俞崔氏四花穴早灸之愈否幾半緩亦不能濟也其謂五臟之癆二十四種蒸病則皆不出前瘵門外也當參詳考究用方處治亦大同焉藥方阿膠丸治婦人癆嗽並嗽血唾咯血阿膠炒生地黃卷柏葉山藥大蘇根五味子雞蘇各一兩柏子仁微炒人參防風麥門冬去心各半兩上為細末煉蜜丸彈子大每服一丸細嚼麥門冬湯或浮小麥濃煎湯下清金散治癆嗽甘草黃芩桑白皮防風各一兩杏仁去皮尖二十七粒人參茯神各半兩麥門冬一兩以前五味用米泔浸一宿曬乾次入人參茯神麥冬三味同為細末每服二錢水一盞黃蠟一豆大煎八分食後服蛤蚧散治肌瘦咯血肺痿等疾蛤蚧一全對酒浸酥炙知母貝母去心人參甘草杏仁去皮尖麩炒枇杷葉拭去毛炒鹿角膠粉炒各等分上為末每服三錢水盞半加桑白皮煎八分溫服日三夜二服補肺湯治癆嗽肺虛者桑白皮熟地黃人參紫菀茸黃耆川五味子各一兩上為末每服三錢水一盞煎七分入蜜少許食後溫服鱉甲煎專治婦人癆嗽雄鱉一枚重一斤杏仁去皮尖北柴胡貝母去心知母各四兩上除鱉外諸藥細銼以好酒五升入鍋內將活鱉在中以藥和停圍定上用板子石壓令鱉在藥內吃酒藥候來日卻以慢火煮候酒盡為度卻取鱉令患人吃盡次將鱉甲用醋煮黃入在前項諸藥內焙乾為細末用酒煮麵糊為丸如梧桐子大不拘時米飲送下三十丸子芩散涼心肺解勞除熱調和榮衛黃耆一兩白芍藥子芩人參白茯苓麥門冬苦桔梗乾生地黃各半兩上為粗未先用竹葉一握小麥七十粒水三盞薑三片煎一盞半入藥末三錢煎至七分溫服豬肚丸治骨蒸癆熱唇紅氣粗口乾遍身壯熱或多虛汗飲食不進大腸祕澀小便赤並效青蒿鱉甲醋炙北柴胡木香生乾地黃各一兩青皮宣黃連二兩上為末以豬肚一個洗淨入藥在內系定蒸令極爛研如泥為丸如緑豆大每服三十丸空心日午臨晚各一服湯下忌濕熱面毒物加味四君子湯治癆嗽尤妙人參白朮茯苓甘草秦艽黃蠟各等分上咀每服半兩水煎服藥後止可食淡煮豬蹄肉仍須先煮熟肉去原汁再以白湯熟煮仍忌房勞一切生冷魚腥咸毒醃藏等物無不痊愈修合藥及煎藥俱勿使患人知之大有效驗黃耆丸治婦人骨蒸煩熱四肢羸瘦疼痛口乾心燥不眠臥黃耆麥門冬去心茯神北柴胡甘草生乾地黃各一兩酸棗仁炒郁李仁杏仁去皮尖枸杞子人參黃芩各三分百合枳殼赤芍藥知母各半兩鱉甲二兩制上為細末煉蜜丸梧桐子大每服三十丸不拘時米飲下華他地黃煎丸解勞生肌進食活血養心生地黃汁杏仁汁生薑汁藕汁各五升薄荷汁鵝梨汁各一升法酒二升沙蜜四升上以慢火煮成膏入後藥北柴胡三兩木香人參茯苓山藥柏子仁遠志枳實白朮各一兩秦艽桔梗各三兩麝香五分熟地黃酒洗四兩上為末以前膏子和丸如梧桐子大食後甘草湯下二十丸地仙散治骨蒸肌熱一切勞熱煩躁能生津液地骨皮二兩防風麥門冬各兩甘草炙半兩上銼每服三錢薑三片水煎溫服婦人夢與鬼交候病機人稟五行秀氣而生承五臟神氣而養若陰陽調和則臟腑強盛風邪鬼魅不能傷之若失調理氣血虛衰則風邪乘其虛鬼邪干其正然婦人與鬼交通者由臟腑虛神不守故鬼氣得為病也其狀不欲見人如有對語時獨言笑或時悲泣是也脈息遲伏或如雀啄皆鬼邪為病也又脈來綿綿不知度數顏色不變此其候也春甫按良方治婦人鬼交多用僻邪之藥此非所以治本也既雲氣血臟腑元神俱虛則神不守舍故有夢交實非邪魅有所幹也則如男子之夢遺其機一也凡婦人患此證者甚多但不肯直言耳診其脈沉弦無力乍疏乍數面帶桃紅四肢無力倦怠嗜臥飲食少進靜躁不常月經不調皆血虛也法當健脾胃養氣血以固其本兼之安神氣清痰火以治其標早為治之庶幾存濟失調理者三年之後氣血浸衰脈必緊數肉脫身不起者定死矣藥方集驗加味八珍湯治婦人思慮過傷飲食日減氣血兩虛月經不調夜夢交感或出盜汗浸成癆瘵人參白朮茯苓炙甘草四分當歸生地黃各一錢黃耆川芎白芍藥軟柴胡各五分牡丹皮香附米制各八分上水盞半大棗一枚煎七分食前服集驗麥冬二陳湯治婦人肺火咳嗽嘔吐痰飲麥門冬陳皮半夏白茯苓白朮當歸身各一錢黃芩薑炒八分甘草炙四分上水盞半生薑一片煎七分食遠服集驗歸神湯治婦人盜汗夢交心神恍惚四肢乏力飲食減少人參白朮白茯神當歸身各錢酸棗仁陳皮各八分圓眼肉七個去核甘草四分羚羊角末琥珀末各五分上羚羊琥珀不煎余藥煎熟去渣入二末和勻食前服良方茯神散治婦人氣虛與鬼交通妄有所見聞言語雜亂茯神錢半茯苓人參石菖蒲各一錢赤小豆四十九粒上咀水盞半煎七分食前溫服良方辟邪丹治婦人與鬼交通虎頭骨二兩硃砂雄黃雌黃鬼臼皂角蕪荑鬼箭藜蘆各一兩上為末煉蜜為丸如彈子大囊盛一丸男左女右係臂上再用一丸當病人戶前燒之一切鬼邪不敢近蘇合香丸治前證方見風門妙香散八毒赤丸並治前證方見邪祟門五心煩熱候藥方逍遙散治婦人血虛勞倦五心煩熱肢體疼痛頭目昏重心悸頰赤口燥咽乾發熱盜汗減食嗜臥及血熱漏下月水不調臍腹脹痛寒熱如瘧又治室女血弱陰虛榮衛不和痰嗽潮熱肢體羸瘦漸成骨蒸白茯苓白朮當歸酒洗各一兩甘草炙半兩白芍藥柴胡各一兩上咀每服三錢水盞半煨薑一塊切片煎七分熱服無時經驗秦艽散治月經有熱血脈凝滯五心煩倦麥門冬秦艽生地黃當歸各半兩地骨皮鬱金蘇木各一分上為末每服二錢水一盞紅花少許同煎七分溫服參蘇飲加黃芩麥冬並治五心煩熱手足掌心熱甚者方見傷寒門婦人客熱候客熱者是體虛而將溫過度外熱加之非臟腑自生故云客熱其為狀上焦胸膈之間虛熱口燥心煩手足壯熱是也麥門冬散治婦人客熱四肢煩悶疼痛不思飲食麥門冬柴胡赤茯苓羚羊角赤芍藥桑白皮黃耆各三分生地黃甘草各五分上咀水盞半薑三片煎六分不拘時服犀角飲治婦人客熱心胸壅閉肢節煩疼不思飲食甘草五分犀角屑半兩生地黃黃耆各一兩栝蔞仁黃芩各五分人參茯神各三分上為末每服水盞半淡竹葉五片煎七分溫服無時婦人惡寒候夫惡寒之候亦有陰陽二證發熱而惡寒者發於陽也無熱而惡寒者發於陰也發於陽者宜解表脈必浮數發於陰者宜溫里脈必沉細又有汗後利後惡寒及背惡寒以上疾證尤詳著傷寒惡寒例中可審治之一婦人但惡寒別無他證六脈平靜遂用敗毒散而安此藥能去表中風邪故也經云惡寒家慎不可倍常覆衣被及近火氣寒熱相抗脈道沉伏愈令病人寒不可遏但去被撤火兼以和表之藥自然不惡寒矣婦人惡寒尤不可近火寒氣入腹血室結聚針藥所以不能治矣麻黃桂枝各半湯敗毒散並治惡寒甚效方俱見傷寒門惡寒發熱似瘧非瘧候病機凡婦人室女乍寒乍熱有類瘧疾久則成癆診其左關肝脈獨弦上出寸口某者上魚際究其病源是皆思欲不遂以致於陰陽交爭時寒時熱惟倉公深知此證多是僧尼寡婦經通室女有之許學士知之其有夫婦人病此者乃熱入血室也此又自是一治法固非寡婦室女之比也藥方啓脾湯治寡婦室女思欲不遂以致傷脾飲食少思寒熱如瘧面上或紅或黃用此最效白朮當歸各錢半人參川芎香附子柴胡梢玄胡索鬱金甘草梢青皮各五分上咀作一服水煎服良方黃芩參蘇飲治前證即參蘇飲加黃芩學士生地黃丸治寡婦室女患惡風體倦乍寒乍熱面赤心煩肝脈弦長宜服此抑陰等藥乾生地黃三兩赤芍藥一兩北柴胡黃芩秦艽各半兩上為細末煉蜜丸小豆大白湯送下三四十丸婦人傷寒候古人治病先論其所主男子調其氣婦人調其血血室不蓄則二氣諧和血室凝結則水火相刑婦人左關浮緊不可下當發其汗以救血室榮衛得和津液自通浹然汗出而解仲景云婦人傷寒經水適斷晝日明瞭暮則譫語如見鬼狀此為熱入血室無犯胃氣及上二焦無犯胃氣者言不可下也小柴胡湯主之若行湯遲則熱入胃今津燥中焦上焦不榮成血結胸狀須當刺期門也世有婦人傷寒書稱仲景所撰與男子治法不同此大謬也豫嘗改之不過云男子先調其氣婦人先調其血此大略之異耳要知脈緊無汗名傷寒脈緩有汗為傷風熱病脈洪大中暑沉細其證一也假如中暍用白虎湯胃實用承氣湯豈必調血而後行湯耶仲景傷寒論所以不分婦人者良亦無以甚異也若妊婦傷寒藥性須涼慎不可行桂枝半夏桃仁等藥小柴胡去半夏名黃龍湯特為妊婦而去也大抵産前先安胎産後先補益次服傷寒藥若病稍退即止藥不可盡劑此為大法故黃帝問婦人重身毒之奈何岐伯曰有故無隕亦無殞也大積大聚其可犯者衰其大半而已桂枝紅花湯治婦人傷寒發熱惡寒四肢拘急口乾舌燥經肺凝滯不得往來宜服桂枝芍藥甘草各一錢紅花八分上咀水盞半薑二片棗二枚煎七分溫服良久汗出解黃芩芍藥湯治婦人傷寒口燥咽乾腹滿不思飲食黃芩白芍藥白朮生乾地黃各一錢上咀水盞半煎七分溫服寒加生薑嘗歸湯治婦人傷寒喘急煩躁或戰而作寒陰陽俱虛不可下宜服此藥柴胡白朮各一錢人參甘草赤芍藥當歸各七分五味子木通各半分上咀水盞半薑三片棗二枚煎八分稍熱服乾地黃湯治婦人傷寒疾後猶有餘氣不去謂之遺熱乾地黃一錢大黃黃連黃芩柴胡白芍藥甘草各七分上咀水一盞煎七分溫服取溏利汗出解燒裩散男子病新瘥婦人與之交合得病名曰陽易其證裡急腰胯及腹內痛身重宜服此男子裩襠燒灰為末以水調方寸匕服之即愈青竹茹湯治婦人病未平復因有所動致熱氣上衝胸膈手足拘急搐搦如中風狀栝蔞根二兩淡竹茹葉半斤上水二升半煮一半作三服熱入血室候小柴胡湯治婦人傷寒發熱經水適來白日明瞭夜則譫語如見鬼狀此為熱入血室無犯胃氣及上二焦宜服方見傷寒門乾薑柴胡湯治婦人傷寒經脈方來初斷寒熱如瘧狂言見鬼乾薑甘草牡蠣各五分桂枝六分柴胡一錢半栝蔞根一錢上咀水盞半煎七分溫服初服微煩再出汗出而愈刺期門穴法婦人傷風發熱惡寒經水適來七八日熱除脈遲身涼和胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門穴隨其虛實而取之期門穴在乳直下肋骨近腹處是也凡婦人病當刺期門不用行子午法恐纏臟膜引氣上但下針令病人吸五吸停針良久隨徐出針此是平瀉法也凡刺期門必瀉勿補肥人刺深二寸瘦人深半寸活人書云期門穴婦人屈乳頭向下盡處是穴丈夫及乳小者以一指為率陷中動脈是咳嗽候病機婦人咳嗽大法與丈夫同其風寒濕熱皆有成方暫起者易治若夫嗽久脾虛發熱脈數面時發紅身熱者為可慮凡此不易治也大抵嗽不宜久久則成癆婦人咳嗽之證亦為第一候也善醫者須早圖治久而身熱蓋不可用瀉肺破氣燥劫苦寒之藥須從溫補消息之為美局方五拗湯治傷風咳嗽聲啞氣喘不能睡臥胸膈板脹氣不相接年交秋便發服此一帖即愈神效華蓋散金沸草散並治前證以上方並見咳嗽門雲林金不換散治男婦肺胃虛寒久嗽不已喘促滿悶咳嗽涎盛及腹脅脹滿腰背倦痛或虛勞冷嗽咳唾紅痰及遠年近日一切喘嗽之疾諸藥不救者並治之罌粟殼制半兩杏仁制甘草枳殼各三錢上每服三錢水盞半薑三片烏梅半個煎八分臨臥熱服本事貝母湯治諸嗽久不瘥貝母生薑汁浸半日北柴胡黃芩乾薑陳皮各一兩半夏桑白皮桂心五味子各半兩木香甘草各一錢上為粗末每服半兩水盞半杏仁七枚去皮尖打碎薑二片煎七分熱服宗奭含化丸治婦人肺熱久嗽身如炙肌瘦將成肺癆服之即愈枇杷葉去毛桑白皮款冬花木通紫菀杏仁等分大黃減半上為細末煉蜜丸如櫻桃大食後夜臥含化一丸和劑定喘湯治丈夫婦人遠近咳嗽上氣喘急喉中涎聲胸滿氣逆坐臥不安飲食不下及治肺感寒邪咳嗽聲重語音不出鼻塞頭昏並皆治之半夏曲阿膠炒甘草各七分罌粟殼二錢制北五味子桑白皮麻黃人參各三分上水盞半薑三片烏梅半個煎七分食後臨臥徐徐各一服滄州補肺湯治前證一名清金湯罌粟殼二兩制人參粉草各半兩陳皮茯苓杏仁白朮阿膠炒北五味子桑白皮薏苡仁紫蘇梗各一兩上為粗未每服三錢水盞半毫三片棗二枚烏梅半個煎一盞臨臥溫服良方加百合貝母半夏曲款冬花尤效凡婦人久嗽成癆體瘦發熱脈數者當詳癆瘵門治之婦人霍亂吐利候嘔吐而下利者霍亂也原疾之由皆因腸胃虛冷飲食過度觸冒風冷使陰陽不和清濁相干致令揮霍變亂也或先心痛而吐者或先腹痛而利者或吐利俱作者或頭痛身體壯熱而脈浮洪者或陽氣暴絶而手足逆冷而脈息微絶者治之當分陰陽察虛實辨其冷熱觀其脈息熱者涼之冷者溫之以平為期百問云凡霍亂吐利熱多而渴者五苓散寒多不飲水者理中丸吐利已汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯夏月中暑霍亂大煩渴四肢逆冷冷汗出腳轉筋者香茹散濃煎沉冷服即效凡霍亂之脈浮洪者易治微而遲並氣短者難治局方香薷散治中暑霍亂先因臟腑不調飲食不節或食腥鱠生冷過度或起居不節或露臥濕地或當風取涼致令脾胃不和邪氣相干便致吐利心痠疼痛虛煩轉筋拘急四肢逆冷脈微欲絶或煩悶昏塞欲死者及妊婦霍亂吐利者此藥悉能主之香薷葉四錢白扁豆炒厚朴制各二錢上水二盞煎一盞井中浸冰冷無時頓服連並三服神效一方有黃連千金四順湯治霍亂吐利腹痛手足逆冷脈微欲絶方見本門理中丸治前證方見本門胡椒散治霍亂吐利甚妙胡椒四十九粒緑豆一百四十七粒為細末木瓜煎湯調下二錢婦人嘔吐候夫嘔吐之證由脾胃有邪冷穀氣不理所為也胃氣水穀之海其氣不調而有風冷乘之冷搏於胃胃氣逆則令嘔吐也按良方嘔吐之疾非特脾胃虛冷而嘔吐也亦有胃熱而嘔者亦有胃中冷胃口熱而吐者亦有痰盛而嘔者亦有血弱而嘔者經云無陰則嘔是也不可一概用藥非徒無益而反害之胃冷而嘔吐者宜用人參丁香散理中丸半夏丸人參七味丸胃熱而嘔吐者小柴胡湯蘆根湯竹茹湯之屬胃中冷胃口熱而嘔吐者霍香正氣散加薑棗煎沉冷服即止痰盛嘔吐者二陳湯半夏茯苓湯妊娠惡阻者茯苓丸更詳本門施治血不歸原而嘔吐者十全大補湯加陳皮半夏藿香薑棗煎服有腳氣而嘔吐者宜審本門人參丁香散治婦人臟腑虛冷脾胃氣弱食即嘔吐水穀不消人參一錢白朮丁香砂仁草果各三分當歸白豆蔻藿香葉甘草各五分橘皮神麯訶子各三分上為細末每服二錢薑棗煎湯調下仁齋半夏丸治胃冷積嘔逆不下食半夏一升皮硝水泡七次為末薑汁搜和干白麵一升上羅半夏為細末以水搜面丸如彈子大以白水煮令浮起則熟初吃四丸日二服漸加至十五丸旋煮旋服似覺病漸減又重合一料尤佳忌羊肉服二料之後若病根未盡除去再不可合半夏丸宜服人參七味丸與半夏相間服亦可人參七味丸與半夏相間服亦可人參白朮各五兩厚朴薑汁炒細辛各四兩生薑八兩末陳皮三兩桂心二兩上為細末煉蜜丸如梧桐子大飲湯下十五丸漸加二十丸忌桃李雀肉生冷理中丸治胃寒嘔吐方見脾胃門五苓散治男子婦人一切嘔吐除桂加半夏制每服一錢以生薑自然汁調和如面候半時久再以白湯一小盞調開溫服竹茹湯治胃熱嘔吐乾葛三兩半夏湯泡七次薑汁半盞水半盞煮乾用一兩甘草三錢上咀每服半兩水盞半薑三片竹茹一丸棗一枚煎一盞溫服一人傷寒得汗後身涼數日忽嘔吐藥與飲食俱不能下醫進丁香藿香滑石等藥下咽即吐許學士云此正汗後餘熱留胃院竹茹湯相當亟治與之即時愈婦人翻胃吐食候婦人翻胃多由氣鬱血虛胃口枯稿脾氣不行而致朝食暮吐暮食朝吐故曰翻胃太倉丸治婦人氣鬱脾胃虛弱不進飲食翻胃嘔吐白豆蔻砂仁各二兩丁香一兩陳倉米淨土一升炒上末薑汁打老米糊丸梧桐子大每服七十丸食後薑湯下白芷散治婦人翻胃吐食白芷杭州不蛀者熱湯泡切片新瓦上焙令黃上為細末用豬血二十文切片以沸湯泡七次將血蘸藥吃七片如剩藥末留後次用白堊散治婦人翻胃吐食千金方云不特治婦人男子亦可治白堊土以米醋一升煅白土令赤入醋浸冷再煅再浸以醋乾為度取一兩研細末乾薑炮一錢上和研勻每服一錢飲湯調下甚者二錢服一斤以上為妙丁香煮散青金丹五苓散並治翻胃有效俱見本門牡丹煎治婦人血嗝牡丹皮苦參貝母玄胡索赤芍藥各等分為末煉蜜丸梧桐子大米飲吞下二十丸抽刀散治婦人血風血氣血嗝等疾五靈脂炒一兩莪朮桂心蕓薹子炒各半兩上為末每服二錢酒半盞水一盞煎八分疾作時熱服
