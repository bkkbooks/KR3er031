body:
  text: 卷之八十三婦科心鏡下痃癖諸氣候痃癖之病多因邪氣積聚而成痃者腹內左右各有一條作痛大者如臂次者如指因氣而成如弦之狀名曰痃氣也癖者如僻側在兩肋之間有時而痛故曰癖也夫痃之與癖皆陰陽不和經絡痞隔飲食停滯不得宣流邪冷之氣搏結不散得冷則發作疼痛故曰痃癖是也麝香丸治婦人痃癖冷氣兼疰氣心腹痛不可忍麝香五分阿魏一分麵包煨面熟去面五靈脂桃仁三稜各三分芫花醋炒檳榔莪朮桂心沒藥木香當歸各半兩上為細末入麝香和勻用梗米軟飯為丸如梧桐子大每服十丸無時淡醋湯下蔥白散治婦人一切冷氣不和攻衝疼痛大治婦人胎前産後腹痛胎不安及血臟宿冷百節倦疼肌體怯弱勞傷痃癖久服盡除但婦人一切疾病皆宜服此當歸川芎芍藥熟地黃枳殼厚朴桂心乾薑舶上茴香青皮苦楝子木香人參茯苓三稜莪朮神麯麥芽各等分上為細末每服三錢水一盞連根蔥白二寸掐破鹽五分煎七分溫服內大黃訶子宜度病狀加之如大便不利入大黃卻不入鹽如大便自利入訶子桂枝桃仁湯治婦人血癖經行過期小腹下痛桂枝芍藥生地黃各一錢桃仁五枚甘草五分上咀水二盞姜三片棗一枚煎一盞空心溫服積氣丸丁香丸並治婦人痃癖諸氣甚妙方見氣門婦人癥瘕候婦人癥瘕之病多由七情不節所傷飲食寒溫不調氣血勞傷臟腑虛弱凝滯不通而成癥瘕癥者徵也臟氣結聚推之不移病形可驗故曰癥瘕者假也結聚浮假而痛推遷乃動故曰瘕其發動腹痛氣壅結滯於胞鉻則月經不行久則成癥瘕之疾也乾漆散治婦人經脈不通久則成瘕兩脅煩悶心腹疼痛黃瘦乾漆木香芫花醋炒赤芍藥桂心當歸川芎琥珀各半兩大黃牛膝三錢桃仁一兩麝香一分上為細末每服一錢無時溫酒調下巴豆丸治婦人血氣疼痛一切癥瘕巴豆仁去心醋煮一分大黃炒一兩五靈脂桃仁各三錢木香半兩為末煉蜜丸緑豆大空心淡醋湯或酒下五丸良方黑神丸治前證神麯茴香各四兩木香花椒炒去汗丁香各半兩檳榔四枚乾漆六兩半生半用重湯煮半日炒令香上除椒漆餘五味皆半生半炒為細末用煎生熟漆和丸如彈子大別用茴香末十二兩鋪陰地蔭干候外干並茴香末收器中待極干去茴香大治腎氣小腸疝氣膀胱痃癖五膈血崩産後諸血漏下並以一丸分四服死胎用綿灰酒調一丸難産用炒葵子四十九粒打碎煎酒下一丸諸疾不過三服痃氣十服膈氣癥瘕五服血瘕三服瘥大硝石丸治婦人七癥八瘕結聚痞塊及婦人帶下絶産腹中有癥瘕者當先以此藥下之此藥雖下但去癥瘕不令人困硝石三兩大黃四兩人參甘草各一兩上為末以三年苦酒三升置銅石器中先納大黃微火熬數沸常攪不住至七分內余藥復熬成膏至可丸即丸如梧桐子大每服三十丸米飲下三日用一服婦人服此或下雞肝塊或下米泔赤黑等物二三升病即愈忌風冷生物房事本事桃仁煎治婦人血瘕血積經候不通桃仁大黃各一兩虻蟲炒黑半兩淨朴硝一兩上四味為末以醇醋二升半銀石器中慢火熬取一升五合下大黃虻蟲桃仁等不住手攪欲下手丸下朴硝更不住手攪良久出之丸如梧桐子大前一日不用晚飯五更初用溫酒吞下五丸日午取下如赤豆汁或如雞肝蝦蟆之狀未下再服如鮮血來即止續以調血氣藥補之蟠蔥散治婦人脾胃虛冷氣滯不行攻刺心腹痛連胸膈脅肋膀胱小腸疝氣及血氣癥瘕方見氣門穿山甲散治婦人癥瘕痞塊及惡血攻心脅腹疼痛面無顏色四肢瘦弱穿山甲灰炒燥鱉甲醋炙赤芍藥大黃炒乾漆炒令煙盡桂心各一兩川芎芫花醋炒當歸各半兩麝香一分上為細末入麝香停勻每服一錢熱酒下無時蓬莪朮丸治婦人癥瘕痞塊腹脅妨疼令人體瘦不思飲食莪朮半兩當歸桂心赤芍藥檳榔枳殼木香昆布琥珀各三錢桃仁鱉甲大黃各一兩上為末煉蜜丸梧桐子大每服二十丸食前米飲下選奇三稜煎治婦人血癥血瘕食積痰滯三稜莪朮各二兩青皮半夏制麥芽炒各一兩上用好醋六升煮乾焙為末醋糊丸梧桐子大每服三十丸多至五十丸淡醋湯下痰積薑湯下血氣心腹疼痛候心腹痛者皆由臟腑虛弱血氣不調兼以七情動於中六淫襲於外邪氣干之而作痛隨氣上下或上衝於心下攻於腹皆邪正之相擊而使然也乾漆丸治婦人積年癥瘕血氣痞塊或攻心腹疼痛四肢不和面無血色飲食減少乾漆炒令煙盡大黃蒸各一兩琥珀硇砂研硝石研莪朮各三錢紅花桂心各半兩膩粉一錢巴豆三七粒去皮心研去油用漿水二盞煎如餳上為細末用棗肉和丸如梧桐子大每服五丸於日未出時煎蘇木湯吞下量患人輕重加減服之烏藥散治婦人血氣攻心腹脅疼痛發歇不定烏藥莪朮桂心當歸桃仁青皮木香各等分上為細末每服二錢熱酒調下無時難舌香散治男子婦人九種心疼一切冷氣良薑細銼米粒大香油炒桂心赤芍藥等分上為細末每服二錢水一盞入鹽木瓜三片同煎七分溫服鹽湯點亦可血出疝瘕疼痛用熟醋湯調下忌生冷延胡索散治婦人血氣攻注心腹痛延胡索當歸川芎桂心各五分木香磨汁枳殼赤芍藥桃仁各一錢上咀水盞半姜三片棗一枚煎七分熱服當歸延胡散治婦人血氣不和經水不調心腹走痛飲食減少面色黃瘦及産後諸病當歸延胡索三稜莪朮人參各等分為末每服二錢酒下或加童便一杯同服沒藥散治一切血氣臍腹撮痛及産後惡露不行兒枕塊痛血竭沒藥並細研桂心當歸蒲黃紅花木香延胡索乾漆炒赤芍藥各等分上為細末食前熱酒調下二錢鬱金散治婦人血氣撮痛月水不通預先嘔吐疼痛及腰腹脹片薑黃一錢牡丹皮莪朮紅花當歸赤芍藥川芎桂心延胡索各七分上咀水盞半酒半盞煎八分溫服日三次蠲痛散治婦人血氣刺痛荔枝核燒存性半兩香附米炒一兩上為細末鹽湯米飲調下二錢無時服又沒藥散治婦人血氣疼痛不可忍者沒藥紅花當歸延胡索炒各等分上為末每服二錢童便酒各半盞同煎至六分熱服只用稱鍾燒紅淬過調藥下亦可衛生牡丹皮散治婦人久虛羸瘦血塊走注心腹疼痛不思飲食牡丹皮桂心當歸延胡索各五分莪朮牛膝赤芍藥各一錢京三稜八分上水一盞煎半盞加酒半盞同煎七分溫服延胡索湯治婦人室女七情傷感遂使血氣並心腹作痛或連腰脅或引背膂上下攻刺經候不調但一切氣血心腹疼痛並可治之當歸酒浸延胡索蒲黃赤芍藥官桂各半兩片薑黃乳香沒藥木香各三錢甘草炙二錢上為粗末每服四錢水一盞姜七片煎六分食前溫服吐逆加半夏陳皮各半兩手拈散治氣血心腹疼痛草果玄胡索五靈脂沒藥等分上為末每服二錢酒調下檳榔散治婦人脾胃虛冷心腹脹滿不欲飲食檳榔前胡川芎青皮四分赤芍藥枳殼大黃苦梗木香桂心各錢半甘草二分上水盞半姜三片煎六分溫服血氣凝寒小腹痛候病機婦人小腹為衝任之海血氣用事凡遇寒冷則血氣凝結為之擊搏故作痛得溫暖則氣和通而痛已也又有胞絡之間陰戶之中房事所傷或為外寒鬱遏亦令疼痛凡用熱物烙之及炒鹽尉貼皆可止者是也藥方集驗吳茱萸湯治婦人室女小腹痛不可忍內外著寒尤效吳茱萸湯泡延胡索各一錢官桂木香各五分上為細末每服一錢空心或食前滾湯一杯調沖酒二杯調服未痊再服永不發良方威靈仙散治前證威靈仙當歸各一錢木香沒藥桂心各五分上為細末每服一錢酒調祕方茴香橘皮酒治同前兼治心腹痛八角茴香一兩紅橘皮二兩白豆蔻半兩上為粗未每服三錢酒一盞煎數十沸濾去渣服婦人心胸嘈雜候病機心胸嘈雜婦人多有之皆因火動其痰也或云是血嘈多用豬心紫血炒食之即愈此亦血導血歸源耳已恰如鹽梅下涎之義不若許學士旋覆花湯治心腹中脘痰水冷氣心下汪洋嘈雜腸鳴口吐清水或自出脅肋脹急不欲食此胃氣虛冷所致其脈沉遲弦細是其證也學士旋覆花湯治嘈雜旋覆花北細辛橘紅桂心人參甘草苦梗白芍藥半夏各五分赤茯苓三分水盞半姜七片煎八分食遠服茱萸四物湯治血嘈吞酸吐酸水吳茱萸泡當歸川芎芍藥生地黃姜炒各等分上咀每服半兩水盞半煎七分溫服婦人吐血候病機夫血外行於經絡內榮於臟腑若氣血損傷經絡則虛血行失於常理氣逆者吐血又怒則氣逆甚則嘔血然憂思驚恐內傷氣逆火載血上錯經妄行皆吐血也與男子吐血門參看處治用藥則一也茲惟切要數方而已藥方雞蘇散治婦人吐血煩心昏悶雞蘇葉一錢阿膠刺蘇生地黃各一錢黃耆羚羊角屑茜根甘草伏龍肝麥門冬當歸黃芩各五分上咀水盞半姜三片竹茹一彈丸煎七分溫服雞蘇煎治婦人虛損氣逆不止雞蘇葉黃芩各八分當歸赤芍藥各五分伏龍肝阿膠各一錢上咀水煎服五汁煎治婦人熱毒上攻吐血不止生藕汁刺蘇汁生地黃汁各三兩生薑汁白蜜一合上和勻煎數沸無時以小盞調炒麵塵一錢服養生方治婦人虛勞吐血衄血下白自汗黃耆白芍藥甘草各一錢熟地黃三錢上咀水酒各一盞煎七分食前溫服四生丸治吐血衄血陽乘於陰血熱妄行宜服此藥生荷葉生艾葉生柏葉生地黃各等分上爛研丸如雞子大每服一丸水三盞煎一盞無時服犀角地黃湯治內有瘀血鼻衄吐血面黃大便黑乾薑甘草湯治陰乘於陽嘔血服涼血藥不效用此二方並見前吐血門青餅子治咯血青黛一兩杏仁一兩以牡蠣粉炒去皮尖用上一處同研成膏熔黃蠟和作三十餅子各服一餅用乾柿半個夾定以濕紙包煨令香同嚼粥飲下無時千金方治吐血百藥不效此方如神地黃汁半升生大黃末方寸匕上煎地黃汁三五服調大黃末令作三服龍肝散治同前伏龍肝即灶心土研極細每服二錢新汲水調下頻服取效以上方皆治熱甚者婦人衄血候病機婦人鼻衄亦由氣血傷動而作也凡氣血調和則循環表裡經絡澀則不散若勞傷損動因而生熱氣逆流溢入於鼻者則成鼻衄也産後見衄者不可治刺蘇散治婦人鼻衄不止刺蘇生地黃各二兩桑耳發灰艾葉炒蒲黃炒各一兩為細末每服二錢無時米飲調下千金伏龍肝散治男婦五臟結熱衄血吐血並皆治之伏龍肝生地黃竹茹一彈丸芍藥當歸黃芩各一錢川芎甘草各五分上咀水盞半煎一盞溫服百問茅花湯治鼻衄立止白茅花濃煎汁飲之一方搗茅根取汁一合飲之即止局方犀角地黃湯四生丸雞蘇散四物湯加側柏葉山梔仁並治鼻衄極效方見前婦人大便下血候病機臟腑損傷風邪易入凡熱氣在內令人下血風氣在內大便血色如豆汁腹中疼痛婦人面無血色時有寒熱而脈浮弱按之絶者為下血也藥方加減四物湯治婦人腸風下血不已側柏葉生地黃當歸川芎各一錢枳殼荊芥槐花甘草各五分上咀水盞半姜三片棗一枚煎七分空心溫服腸風黑散治酒色太過或食生冷炙爆積毒腸間致使脾虛糟粕不聚臍腹痛大便鮮血裡急後重或肛門脫出或久患酒痢大便頻並並可治之敗棕燒存性木饅頭燒烏梅肉粉草炙各等分上為細末每服二錢水一盞煎七分空心連渣溫服地榆湯治陰結便血地榆半兩甘草一錢砂仁十粒上咀分二服每服水盞半煎七分空心服防風如神散治婦人風虛大便後時時下血防風枳殼各等分上咀每服三錢水盞半煎七分空心服冬青子煎酒蒸黃連丸消風散並治下血方並見血證門灸法令患人平立量脊骨中與臍平處灸七壯立止婦人尿血候由膀胱積熱房事損傷者多患血尿當大忌房室戒酒葷薄滋味庶可治療而得痊也不守禁者十不救一也小薊湯地膚汁並治尿血方見本門車前汁飲治尿血不止車前草大葉者洗淨晾乾搗爛絞汁一盞蜜一合上二味和勻重湯溫空心連服三朝愈乾生地黃散治婦人尿血不止乾生地黃二錢柏葉黃芩各一錢阿膠炒八分上水盞半姜三片煎七分溫服當歸散治前證當歸羚羊角屑赤芍藥各一錢生地黃一錢刺蘇葉三分水盞半煎七分空心服當歸鹿茸散治婦人勞損虛弱尿血當歸鹿茸熟地黃葵子蒲黃續斷各等分上為末酒調二錢日三服婦人小便頻數候腎與膀胱二經俱虛而有熱乘之則小便澀虛則小便數也桑螵蛸散治婦人虛冷小便數桑螵蛸三十枚炒鹿茸牡蠣粉甘草各一兩黃耆半兩上為末酒調二錢日三服鹿茸散治婦人虛冷小便日夜三五十行鹿茸烏賊骨桑寄生龍骨各一兩白芍藥當歸附子各三分桑螵蛸半兩上為細末食前溫酒調下二錢縮泉丸治脬氣不足小便頻數方見前小便門婦人轉脬不得小便候轉脬之病由脬為熱所迫或忍小便俱令水氣迫於脬屈闢不得充暢外水應入不得入內溲應出不得出內外壅滯脹滿不通故為脬轉其狀小腹急痛不得小便甚者致死不可治也有孕婦或因登高取物亦致轉脬須依前法則復故生産難因老嫗手探以致轉脬者有之服藥後宜坦臥用手法治之無不愈者千金滑石散治男婦轉脬小便數日不通滑石寒水石各一兩葵子一合上為末以水一斗煮取五升時時服一升即利箬葉散治前症裹粽箬葉燒灰一兩滑石飛半兩和勻每服二錢沸湯調服指迷石葦湯治同前石葦去毛車前子各等分上為粗未每服半兩水二盞煎一盞食前服葵子散治同前葵子車前子亂髮燒灰各等分上為細末每服二錢茶湯調下益元散紫草末紫菀末紫金皮末皆可用單方一味蔥湯調治轉脬俱效一法用炒鹽半斤囊鹽乘熱尉小腹治轉脬小便不通立愈局方八味丸治婦人轉脬小便不得方見虛損門婦人遺尿失禁候經云膀胱不利為癃不約為遺溺乃心腎之氣傳送失度之所為也故有小便澀而遺者有失禁而出不自知者又婦人産理不順致傷膀胱遺尿無時又有脬寒臟冷遺尿不禁治之宜各詳其類也鹿茸丸治婦人久虛小便白濁滑數不禁鹿茸川椒桂心附子牡蠣制破故紙石斛肉蓯蓉雞䏶胵沉香各一兩桑螵蛸十枚酒炒上為細末酒煮麵糊丸梧桐子大空心溫酒下三十丸千金白薇散治婦人遺尿不禁白薇白芍藥等分上為細末酒調服方寸匕空心日三服祕元丸治內虛自汗小便不禁白龍骨三兩訶子十枚煨去核砂仁一兩去皮上為末糯米粥丸梧桐子大空心溫酒下五十丸牡蠣散治遺尿牡蠣白礬枯各等分為細末米飲調下方寸匕效一方雞䏶胵炙為末空心調二錢酒下一方鹿角屑炒令黃色為細末空心溫酒調下二錢一方豬脬洗淨鐵鏟上炙食之以酒吞下一方桑螵蛸酒炒為細末每服二錢空心薑湯調下一方用糯米糍果一片睡時炙令軟熟啖之仍以酒吞不飲酒者沸湯下多啖愈佳行坐良久待糍下膈心下空則睡最效婦人淋瀝候人凡淋瀝者小便澀數疼痛淋瀝不止是也皆內腎虛及房室太過傷於膀胱而熱甚也膀胱與腎為表裡俱主於水行於脬者為小便有臟腑不調為邪所乘腎氣虛則小便數膀胱熱則小便澀而痛也石葦散治婦人小便卒淋瀝石葦黃芩木通榆白皮葵子瞿麥甘草等分上為粗未每服半兩水盞半姜三片煎七分熱服木通散治婦人五淋木通榆白皮瞿麥火麻仁滑石各七分貝齒葵子白茅根甘草四分水盞半燈心十根煎七分空心服桃膠散治婦人氣淋勞淋桃膠榆白皮各一錢車前子冬瓜子鯉魚齒葵子瞿麥木通各五分枳殼一分上咀水盞半煎八分空心溫服雞蘇散治婦人血淋雞蘇葉木通各一錢生地黃滑石各三錢刺蘇根七分上水盞半淡竹葉三十片煎八分空心服鬱金散治婦人血淋血尿澀痛鬱金蒲黃各一兩生地黃三兩上為末每服三錢車前葉煎湯調下日二服火府丹治小腸熱小便澀及治五淋生地黃二兩木通黃芩各一兩上為細末煉蜜丸梧桐子大木通煎湯下三十丸加甘草咀煎名導赤散許學士火府丹治消渴三服即止海金砂散治淋海金砂草陰乾為末用生甘草煎湯調二錢一方土牛膝根搗細以一合用水五盞煎一盞去渣用麝香乳香少許調下一方真琥珀為極細末每服一錢空心研麝香湯下婦人陰戶腫候陰腫由虛損而受風邪客之者風氣乘於陰與血氣相搏氣血痞澀腠理壅閉不泄越故令腫也有因房勞過度傷損陰戶而致腫者宜節欲而調治之有欲勝而熱甚生蟲以致腫而癢甚者皆宜戒房室速圖治之有邪氣漸盛以至陰戶潰爛不救者失於早治也大菖蒲散治婦人月水澀滯陰戶間腫大而痛菖蒲當歸各一兩秦艽二錢吳茱萸炒半兩上咀每服三錢水盞半蔥白五寸煎六分空心溫服録驗艾葉湯治婦人陰腫痛不可忍艾葉一兩防風六錢大戟半兩上銼水五豌煮三碗去渣熱洗日三次避風冷録驗麻黃湯治婦人陰腫或爛瘡者洗之麻黃黃連防風北艾葉烏梅十個蛇床子各一兩上銼煎水五升如前洗白礬散治婦人陰腫堅痛白礬半兩甘草五分大黃一錢上為細末每用棗大綿裹內陰中日二換肘後方治陰中腫痛枳殼半斤銼炒乘熱以故帛裹尉之外消少裹乘熱內之冷即易熱者不三次愈甘菊湯治陰戶腫甘菊苗葉不以多少搗爛百沸湯淋洗薰腫浸之一方用小麥朴硝礬五倍子蔥白煮水浸洗婦人陰癢候陰癢多是蟲蝕所為始因濕熱不已故生三蟲在於腸胃之間其蟲蝕於陰戶中而作癢也甚則癢痛不已潰爛腫突在室女及寡婦多因欲事不遂思想所淫以致氣血凝於陰間積成濕熱久而不散遂成三蟲則有此疾有婦房室過傷以致熱壅故作腫癢內痛外為便毒莫不皆由欲事傷損而致者也椒茱湯治婦人陰戶癢不可忍惟以熱湯泡洗不能住手者花椒吳茱萸各一兩蛇床子藜蘆陳茶葉一撮煨鹽二兩以水五七升煎乘熱熏洗大黃散治陰癢大黃微炒黃芩黃耆炙各一兩赤芍藥玄參丹參山茱萸蛇床子各半兩上為細末每服二錢食前溫酒調下杏仁膏治婦人陰癢不可忍杏仁燒存性麝香少許上為末用舊帛裹之縛定火上炙熱內陰中三茱丸治陰挺陰癢食茱萸吳茱萸湯泡山茱萸肉微炒桔梗微炒白蒺藜炒去刺青皮舶上茴香炒各一兩五味子海藻焙大腹皮酒洗曬乾川楝子肉玄胡索各兩半上為末酒糊丸梧桐子大每服三十五丸空心木通湯下腹痛腰痛者加桃仁一兩木香七錢椿根皮湯治婦人陰癢突出臭椿皮荊芥穗藿香各等分上銼煎湯熏洗即入即止一方用枯礬萆麻子搗爛攤紙上托入一方治陰腫癢不收用麻黃荊芥茄種皮蛇床子真杉木刺蝟皮燒過研為末敷上或煎湯熏洗蛇蛻散治婦人陰瘡先以荊芥蛇床子湯熏洗挹干敷藥蛇蛻一條燒存性枯礬黃丹萹蓄藁本各一兩硫黃荊芥穗蛇床子各半兩上為細末香油調搽溫則干搽水楊湯治婦人陰中生物癢痛牽引腰腹多由房事太過或因淫欲不遂或因非理所為以致陰戶所傷名曰陰挺金毛狗脊五倍子枯礬魚腥草水楊根川黃連各一兩上為末分四劑用有嘴瓦罐煎熟預以竹筒兩頭去節接罐嘴引熱氣熏入陰中或透挺上湯溫不熱仍用洗沃次服白薇散白薇散治婦人陰挺白薇川芎熟地黃酒洗桂心甘草當歸澤蘭葉蒼朮炒菱霄花牡丹芍藥各等分上咀每服七錢水二盞煎八分食前服一方治陰癢用蛇床子白礬煎水淋洗一方用蒜湯洗之一用枸杞根煎湯洗之録驗炙肝法治婦人陰癢蟲蝕牛肝或豬肝切三寸長如錢大炙熟內陰中蟲附上出盡即愈大貫衆平胃散治婦人陰中生蟲痛癢不定貫衆蒼朮厚朴陳皮甘草各等分上為細末每服二錢熟煮豬肝拌藥末入陰戶內數日愈一方治陰中蟲癢搗桃葉綿裹內陰中日易三四次草烏煎治婦人陰中生蟲凡入九竅有肉突出久而不愈皆成痔疾草烏七個燒存性用小瓦罐盛米醋淬乘熱熏候通手洗之桂心散治婦人交接輒痛出血桂心伏龍肝各等分為末空心酒調服三錢婦人交接陽道違理及他物傷犯血出淋瀝百草霜不以多少用葫蘆取汁調塗一方用發灰並青布灰敷之或刺雞冠血塗之皆效婦人陰冷候婦人衝任虛損風冷客之故陰中冷襲不受胎孕漸不愈令人黃瘦或小腹時痛口中清水如注五加皮酒治婦人陰冷癖瘦五加皮乾薑丹參蛇床子熟地黃杜仲制各三兩天門冬一兩鍾乳粉四兩地骨皮二兩上細銼以生絹袋盛以酒十五升漬二宿每服溫酒數杯空心晚各一服遠志散治婦人陰冷癢澀遠志二分乾薑蓮花蕊各三兩蛇床子五味子各四分為末先以兔尿塗陰中次綿裹一錢內陰中熱為效傳信方治玉戶寬冷硫黃枯礬等分為末煎湯洗海螵蛸散治婦人小戶嫁痛海螵蛸二枚燒研為細末酒調方寸匕日三服冬青葉煎治婦人陰腫小戶嫁痛冬青葉小麥甘草各等分煎水洗之大便不通候大腸屬金其本燥婦人五臟不調七情偏勝則肺金不能生水下滋大腸則大腸燥而大便結矣仲景云婦人經水過多則亡津液亦大便難也玉燭散治婦人血虛大便祕澀當歸川芎芍藥生地黃大黃蒸各一錢水盞半棗一枚蔥白二寸煎七分空心服火麻仁丸治歸人腸胃風結大便常祕火麻仁去殼淨研膏大黃炒各二兩木香檳榔枳殼各一兩為末煉蜜丸梧桐子大空心溫水下二三十丸通神散治婦人大便不通肺實弦大腰腹作痛手不可近大黃芒硝檳榔郁李仁泡去皮微炒桃仁去皮尖各一兩木香半兩為細末空心粥飲調下二錢皂角丸治老婦大腸有風氣血枯槁虛祕不通皂角炙去子枳殼麵炒等分蜜丸梧桐子大空心飲湯下七十丸通氣散治虛人憂怒傷肺肺與大腸為表裡致令祕澀不通或服燥藥過多大便祕亦可用陳皮蘇葉枳殼木通各等分上咀每服四錢水一盞煎七分溫服蘇麻粥順氣滑大便紫蘇子麻仁二味不拘多少研爛水濾汁煮粥食婦人泄瀉候泄瀉之候經中所謂洞泄飧泄溏泄脾泄胃泄大腸泄大瘕泄小腸泄水穀注下其實一也原疾之由因腸胃虛冷而邪氣乘之經云寒甚則泄春傷於風夏生飧泄又云寒則溏熱則垢此得於外也喜怒憂思恐致使臟氣隔絶精神奪散必致溏泄此屬內也如飲食生冷食傷脾胃而泄者屬不內外也寒者溫之熱者涼之滑者澀之濕者燥之治泄之法無是過也五苓散分利六君子湯補脾治中湯溫中平胃散行濕並治泄瀉方見前泄瀉門通用豆蔻分氣飲治臟腑虛寒泄瀉無度瘦弱婦人産後洞瀉危篤藿香葉草豆蔻仁炒青皮各四兩甘草丁香各半兩烏梅三十個肉豆蔻麵包煨十個上咀每服四錢水二盞糯米一撮煎七分溫服木香散治臟腑冷極及久冷傷憊口乾下泄米穀不化飲食無味肌肉瘦悴心多嗔恚婦人産後虛冷下泄及一切水瀉冷痢木香破故紙良薑砂仁厚朴制各三錢赤芍藥陳皮桂心白朮各半兩胡椒吳茱萸泡七次各八分檳榔一個肉豆蔻四個制為細末每服三錢用不經水豬肝四兩去筋膜切薄片重重摻藥以水一碗醋一杯煮肝熟入鹽一錢蔥白三莖細切搗姜五錢同煮水欲盡空心頓食之初服微泄不妨少時自止不可熱吃經年冷利滑泄一服效渴飲粥湯忌生冷油膩固腸丸治男婦久泄不止無逾於此人參蒼朮制茯苓木香訶子肉炮烏梅肉肉豆蔻麵包煨罌粟殼去筋膜各等分上為細末麵糊丸梧桐子大每服四十丸米飲下人參豆蔻散治婦人久泄不止諸藥無效人參肉豆蔻煨乾薑厚朴薑汁炒甘草陳皮川芎桂心訶子北茴香各五分為末水一盞薑棗同煎六分服婦人滯下候古之滯下之病即今之赤白痢疾者是也治此者當審貧富而別病機貧人之婦未有不因外感寒暑燥濕風火之氣而傷於脾胃脾胃既傷而又內傷飲食勞倦不能克化致令積滯而成滯下富家婦女盡是膏粱之變兼受外邪內傷生冷濕熱之邪而成滯下古人云無積不成痢者此也凡滯下多生於秋後何也脾胃久傷飲食之積至夏秋之間復感暑濕之邪觸動而作其始腹痛洞瀉瀉后里急後重欲去不去欲下不下故曰滯下今概云痢世俗之稱也其證或紅或白或紅白雜下甚者一日一夜常行百度其始作者若是貧家不論虛實當先用神朮散發散外感六淫之邪氣次服感應丸承氣湯之類逐其內邪內邪既去再服平胃五苓之類調和中氣未有不效者也若是富室當先用感應丸木香檳榔丸山楂神麯麥芽湯之類消導積滯次用香連丸黃連解毒湯五苓散之類調和中氣亦未有不安者也惟妊娠之婦不可峻下比之常婦減藥之半而下之亦無傷於胎孕也若不微下其積不去而痢終莫能止此又量人之虛實輕重而施之可也凡滯下曾通利消導數次久不已者此為氣虛滑脫經曰下者舉之滑者澀之此時當以升提固澀之劑如補中益氣湯倍加升麻固腸丸之類無不速效醫者以此推治大人小兒亦無逾於此也神朮散治貧婦外感之邪復傷脾胃作痢及傷寒頭痛項背拘急鼻流清涕先用此發散蒼朮半斤藁本川芎各三兩羌活二兩甘草細辛各八錢為末每服三錢水一盞姜二片蔥一根煎七分稍熱服要取微汗六神丸治赤白痢疾神麯麥芽茯苓黃連赤者加倍廣木香枳殼炒各等分為細末神麯糊丸梧桐子大每服五十丸赤痢甘草湯下白痢乾薑湯下赤白兼下甘草乾薑湯下急用時不暇丸煎湯空心服亦可名六神湯感應丸承氣湯並治滯下積宿一服不愈再一服必愈其不愈者用和氣分利藥方見前滯下門香連丸胃苓湯固腸丸斗門散並見前門調中湯治滯下以兼通利消導但似瀉非瀉似痢非痢宜此葛根黃芩白朮桔梗藁本赤芍藥白芍藥甘草炙各等分上咀每服三錢水一盞煎七分服參香散治男婦小兒陰陽不和冷熱相搏積痢赤白日夜無度裡急後重臍腹疼痛水瀉腸鳴久久注下冷氣積滯並可治之罌粟殼制陳皮粉草各一兩厚朴制半兩青皮白姜各一錢上為細末每服二錢空心陳米飲調下忌生冷油膩酒面炙爆豆蔻餅治赤白痢疾臍腹疼痛水瀉腸鳴久而不愈虛寒下脫罌粟殼制白芍藥黃耆二錢陳皮青皮木香訶子肉豆蔻煨人參各錢半羌活當歸各一兩上為末煉蜜丸彈子大每服二丸水一盞煎八分空心溫服石蓮子散治噤口痢如神石蓮子半兩石菖蒲人參各二錢上為細末分作三服不拘時陳米飲調下三黃熟艾湯治傷寒四五日後大下熱痢諸藥不效宜此黃芩黃柏黃連各一錢熟艾一圓核桃大小上水盞半棗一枚煎八分服腰痛候病機婦人腎臟繫於胞絡腎主於腰若腎氣虛弱外感六邪內傷七情皆致腰痛古方亦有五種之說如風腰痛宜小續命湯加桃仁杜仲煎服脾胃氣蔽及寒濕腰痛五積散加桃仁如虛損及五種腰痛青娥丸神應丸皆可氣滯腰痛神保丸加黑醜茴香橘核神效總領如神湯治男子婦女血滯腰痛當歸延胡索桂心等分上為末溫酒調下二錢甚者不過數服獨活寄生湯治腰痛腎虛臥冷濕地當風所得不時速治若流入腳膝為偏枯冷痹或腰痛拘攣腳重痹宜急服之方見腰痛門舒筋湯治腰痛神效閃挫亦良玄胡索杜仲官桂羌活赤芍藥等分為末酒調下骨碎補散治婦人血風氣攻腰腳疼痛腹脅拘急肢節不利骨碎補炒萆薢川牛膝桃仁海桐皮當歸桂心檳榔各一兩赤芍藥附子川芎各三分枳殼半兩上為粗未每服三錢水一盞姜三片棗一枚煎七分食前熱服腳氣候婦人腳氣與丈夫不同男子則腎臟虛弱為風濕所乘女子以胞絡氣虛為風毒所搏故胞絡屬於腎腎主於腰腳又肝脾腎三臟經絡起於十足指若臟腑虛損則風邪先客於腳從下而上動於氣故名腳氣也此皆由體虛或當風取涼久坐卑濕或産後勞損或惱怒傷肝心氣鬱滯致令月信不通因其虛傷風毒搏肌骨則令皮膚不仁筋骨抽痛五緩不遂六急拘攣或即冷痛或即腫滿或兩腳痹弱或舉體轉筋目眩心煩見食則嘔精神昏憒肢節煩痛小便赤大便祕皆其證也婦人腳氣治法與丈夫不同者以其氣血不調懷胎難産崩傷之異故褚尚書療寡婦師尼與妻妾殊別即其義也凡婦人有腳氣之疾者必無生育此可以驗其異也凡治婦人腳氣頭痛身熱肢節痛大便祕或嘔逆而腳屈弱者腳氣也輕者可與香蘇散加木瓜檳榔生薑煎服然後隨證治之要知有腳氣之人先從腳起或緩弱疼痹或行起忽倒或兩脛腫滿或腳膝腫熱或心中忪悸或小腹不仁皮頑不知或舉體轉筋或見食嘔逆惡聞食氣或胸滿氣急或遍體痠疼皆腳氣候黃帝所謂緩風濕痹是也頑弱名緩風疼痛為濕痹寒中三陽所患必冷小續命湯主之暑中三陰所患必熱小續命湯去附子減桂一半主之大煩躁者紫雪最良大腹皮散治婦人風毒腳氣肢節煩疼心神壅悶大腹皮紫蘇木通桑白皮羌活荊芥赤芍藥青皮木瓜獨活各五分枳殼一錢上咀水盞半姜五片蔥七寸煎七分空心服牛膝散治腳氣浮腫心神煩悶月信不通川牛膝羚羊角檳榔大黃炒芒硝各一錢防己桂心牡丹皮赤芍藥甘草各三分桃仁五大枚上咀水盞半煎七分溫服利下惡物為度觀其強弱用之木香散治婦人腳氣卒發衝心悶亂木香五分磨汁郁李仁赤芍藥大腹皮紫雪各一錢桑白皮桂心檳榔茯苓各三分上咀水盞半姜三片煎七分溫服木瓜煎治婦人腳氣衝心悶亂不知人木瓜松節各一錢吳茱萸檳榔紫蘇各錢半陳皮三分水盞半童便三合煎八分溫服紫蘇散治婦人風毒腳氣腹內壅塞不思飲食虛腫腳重紫蘇木通桑白皮茴香根各一錢枳殼羌活獨活荊芥穗木瓜青皮甘草各五分大腹子一個上咀每服水盞半姜二片蔥白一莖煎七分溫服婦人痔漏候婦人患痔病與男子少異多是房勞所傷及酒毒流積而成及長年久坐以攻女工者得之為異耳其餘則皆同於男子而治之可也其五種之狀並載男子痔漏門鱉甲散治婦人房事過多勞傷成痔鱉甲露蜂房蛇蛻刺蝟皮豬後蹄甲以上五味各自燒存性各二錢麝香一分為細末每服一錢空心地黃湯調下若肛門有竅腫痛敷之即愈忌莧菜柿灰散治男子婦人久坐以致血氣流注肛門成痔及腸風臟毒下血腸僻等疾乾柿燒存性為末每服空心米飲調下二三錢婦人脫肛候婦人脫肛與男子同治惟因産時用力努出肛門雖病機不同治法無異升提收澀甚者灸百會穴無不愈文蛤散治脫肛五倍子為末水煎浸洗更入白礬蛇床子尤佳洗用赤石脂末摻在桑葉上或巴蕉葉上托上其長尺余用煎湯在高器候溫浸洗良久自然縮上日逐換洗久則自收其治脫肛服藥堵方皆與男子脫肛門參用補遺方金蓮穩步膏治婦人腳指縫壞痛黃蓮黃柏黃丹荊芥穗各等分上為細末摻患處布扎縛自然平穩不痛柴胡抑肝散治寡居獨陰病人惡寒發熱全類瘧者柴胡錢半赤芍藥酒炒牡丹皮各一錢青皮錢半生地黃地骨皮各五分香附米一錢川芎六分蒼朮連翹山梔仁各八分甘草三分神麯炒上作一服水煎空心服夜再服纍治纍效婦女赤白帶下論凡婦人女子赤白帶下多由脾胃濕熱所致白多為氣虛赤多為血熱久之漸次虛寒面黃體瘦始初須是調胃健脾清熱滲濕如六君子湯五苓散加姜炒黃連之屬人多不以為急延患既久脾胃漸弱至於月經不調甚則淋瀝崩中遂成大患調治費工須方藥合宜庶可獲效如人參黃耆湯補中益氣湯為主加升固之藥是也藥方人參黃耆湯方見螽斯門加醋炒芍藥牡蠣粉禹餘糧補中益氣湯方見脾胃門祕驗方治帶下神效方見捷徑六書明集崩漏方論婦人崩漏最為大病年少之人火熾血熱房事過多經行時而有交感俱致斯疾大都涼血固澀升氣益榮而可愈也中年以上人及高年嫠婦多是憂思過度氣血俱虛此為難治必須大補氣血養脾升固庶保十之二三斯疾若不早治則如頽圮之廈斜倒傾散勢難支撐而使之正又如苗槁而後溉灌何可使之秀耶藥方涼血地黃湯黃芩散阿艾丸七灰散四方並見螽斯門十全大補湯換桂枝加炮黑乾薑阿膠珠方見虛損門祕驗方見捷徑六書明集
