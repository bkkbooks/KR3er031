body:
  text: 卷之九十二奇病續抄太乙散之功交州刺史杜燮中毒藥而死董奉以太乙散和水沃燮口中須臾乃蘇燮自謂初死時有一車門直入一處內燮於土窟中以土塞之俄頃聞太乙使至追杜燮遂開土窟燮得出胸中蟲患廣陵太守陳登患腹煩滿面赤不食使人講華他至曰君腹中有蟲欲成蓋腥物之所為乃與湯藥遂吐蟲三升許蟲頭皆赤半身猶是生膾蛟龍病古有患者飲食如故發則如癲面色青黃小腹脹滿如孕醫者診其脈與證皆異而難明其主療忽有一山叟曰聞開皇六年灞橋有患此病蓋因三月八日水邊食芹菜得之有識者曰此蛟龍病也為龍遊於芹菜之上誤食而病也遂以寒食餳每劑五合服之數服吐出一物雖小而似蛟龍狀有兩頭其病者依此治之獲效瘡破雀飛金州防禦使崔堯封有甥李言吉左目上瞼忽生一小瘡漸大長如鴨卵其根如弦恆偃其目不能開堯封飲之酒令大醉遂與割去瘡既破中有黃雀飛鳴而去人漸縮小世有奇疾終莫能曉昔呂縉叔以制誥知穎州忽得疾但縮小不能醫臨終僅如小兒古人不曾患此疾終無人識視物倒植元末四明呂復別號滄州翁深於醫道臨川道士蕭云泉眼中視物皆倒植請復治問其因曰某嘗大醉盡吐所飲酒熟睡至天明遂得此病復診其脈左關浮促即告之曰傷酒大吐上焦反復致倒其膽腑故視物皆倒植不內外因法當復吐以正其膽遂用藜蘆瓜蒂為粗末水煎使平旦頓服以吐為度吐畢視物如常九靈山房集視直如曲昔有人家一妾視物如曲弓視界尺之直亦如曲鉤俸醫親見藥莫能治嘔物如舌鎮陽有士人嗜酒日飲數斗飲興一發則不遏一夕大醉嘔出一物如舌初視無痕竅至欲飲時眼偏其上矗然而起家人沃之以酒立盡常日所飲之數而止遂投之猛火自出烈為十數片士人自此惡酒不飲消食籠齊諧記云江夏郡安陸縣隆安中有郭坦兄弟三人大兄得天行病後遂大能食一日食鬥米其家給五年貧罄後乞食至一家門前已得飯復乞其後門其家人怒之云前門已飯了又從後門來討那得許多與你彼答云腹中飢甚實不知是後門門園有韭三畦彼就地而啖其二須臾悶臥在地大吐一物如籠因出地漸漸小人持飯與遂不復食將飯著所吐之物上即消化成水此病尋瘥孕婦腹內鐘鳴有貧士於常賣處買得藥方一册其中有一方能治妊婦腹內如鐘鳴用鼠窟前畚士研羅為末每服二錢麝香湯調服其疾即愈婦人異疾一婦異疾每腹脹則腹中有聲如擊鼓遠聞於外人行過門者皆疑其家作樂腹脹消則鼓聲亦止一月一作經百醫皆莫能明其疾産婦腹中癢箭竿及鏃主治婦人産後腹中癢安所臥床席下勿令婦人知産後腸癢針線袋主治婦人産後腸中癢不可忍以袋安所臥褥下勿令人知王氏異疾汾州王氏得病右脅有聲如蝦蟆常欲手按之否則聲聲相接郡醫不能辨聞留陽山人趙巒請診之曰此因驚氣入於臟腑而成與鎮驚硃砂丸吞以蝦蟆衣即車前草湯遂瘥杯中蛇影陳留何解元一日會飲於趙修武宅酒至數杯忽見杯底有似小蛇咽入口亦不覺有物但每每思而疑之日久覺心痛自思蛇入腹為患不淺後復會其宅恰才執杯又見小蛇乃放杯細看乃梁上挂弓一張蛇影乃弓梢之影是也遂解其疑痛即止食挂眉州米思古得疾不能食聞葷腥則嘔惟用大鐺旋煮湯沃淡飯數數食之醫莫能治史載之曰俗輩不讀內經而妄醫人之疾可嘆可駭君之疾正在素問經中名曰食挂凡人之肺六葉舒張而蓋下覆於脾子母氣和則進食一或有戾則肺不能舒脾乃為蔽故不嗜食遂授之一方以清氣潤肺為治服三日病者鼻聞肉味覺香取啖之甚美此宋人載於傳記余考之素問並無食挂之病或記者假託耳土瓜異貌岣嶁神書曰以三月中取壬方土瓜根陰乾為末以漿浸洗面拭乾又以漿調土瓜根末塗面上拂旦以漿水洗之三十日有少容百日白澤故人皆不識兄弟夫妻不能認其臉鴷血留顏岣嶁神書曰鴷血者啄木鳥血也其鳥頭有冠毛面赤如桃花色乃以庚日取其血向西飲之面角如朱顏若童子光彩射人目也玄蟲變發三月三日取水中蝌蚪一合陰乾候桑椹黑時取汁一升漬之盛於瓦器內埋東壁下百日取之其色如黑以塗白髮其發如漆永不再白柳椹堅牙新柳花如椹者收之陰乾為末日以擦牙去其宣疳臭諸風不生明目駐顏黑髮聰耳壯筋力益壽算輕身健體齒堅可咀金石奇效赤莧成鱉五月五日取鱉切如棋子大與莧菜杵如泥丸如彈子大若投水中三日成鱉咒棗治瘧古人有咒棗法向日咒曰吾有一枚棗一心歸大道優化夷優隆夷劈燒念七遍吹棗上與病人食之不再作發不退落用桑白皮一斤火麻子三升同煮五十沸用附子一個入藥內每日午時洗頭少頃梳髮不落龍骨祕精龍骨巴戟天韭子等分為末煉蜜丸梧桐子大每服三五丸空心鹽湯下固精如神一體作兩人一人忽覺自形作兩人並臥不別真假不語問亦無對乃離魂也法用硃砂人參茯神濃煎服真者氣爽假者即化矣鼻中毛出長如線一人鼻中出亳一晝夜長一二尺漸漸粗圓如繩痛不可忍摘去更生此因食豬羊血過多然也法以硇砂乳香飯為丸水下十粒早晚各一服病去乃止皮肉蟹走一人病皮膚之下有蟲如蟹走作聲如兒啼筋肉為火之化法用雷丸雄黃等分為末摻豬上炙而食之即愈灸瘡出血片如蝴蝶一人灸火痂落灸瘡內出鮮血片如蝴蝶騰空飛去痛不可忍此是血肉為火所化用大黃芒硝等分為末水調下微利即愈渾身蝨出一人臥忽然渾身蝨出四五升許血肉俱壞舌尖舌出不止用鹽酷點湯飲十數杯即愈發如銅絲一人眼赤鼻張大喘渾身出斑發如銅鐵絲硬乃目中熱毒氣結於上焦用白礬滑石各一兩水三腕煎一碗半飲盡即效毛如鐵條一白人忽變黑毛直如鐵條雖飲食不語如大醉名血潰肉出如錐一人忽然遍身肉出如錐癢痛不能飲食名血擁用赤皮蔥燒灰水淋汁洗沃內服淡豆豉湯數盞愈眼前常見飛鳥一人眼前常見禽蟲飛躍捉之即無乃肝膽經為疾也用酸棗仁羌活玄明粉青葙子各一兩為末每用二錢水煎和滓服日三次眼珠垂出一人眼珠垂下至鼻大便下血此名肝脹用羌活煎湯服數次而愈飲油快意一人飲油至四五升方始快意乃發入胃血里化為蟲也用雄黃五錢為末水調服蟲自出已成蛇形揩斷蟲出一人患十指斷壞唯有筋連節肉蟲出如燈芯長尺許有緑毛名血餘疾用茯苓胡黃連煎服愈身如波浪聲有患遍身皮底渾渾如波浪之聲癢不可忍抓之出血不止名氣奔疾用人參苦杖青鹽細辛各一兩水兩碗煎一碗飲盡愈白眥俱黑有患眼內白眥俱黑見物依舊毛髮直如鐵條不語如醉名血潰用五靈脂為末二錢酒調服愈齒皆搖動一人忽然氣上喘不能語口中流涎吐逆齒皆搖動氣出轉大即悶絶名傷寒並熱霍亂用大黃人參各五錢水三盞煎一盞服口內肉球有患口內生肉球有根線長五寸余吐球出方可飲食以手輕捏痛徹於心水調生麝香頻頻服之數日根化而愈指甲倒手指甲生長倒刺入肉如錐食葵菜自愈瘡如貓眼一人面上及遍身生瘡似貓兒眼有光彩無膿血冬則近頸名白寒瘡多食魚雞蔥韭而愈脅破腸出一人脅破腸出臭穢急以香油抹腸送入再不出又以人參枸杞子煎湯服又淋破處自合吃豬腎粥羊石脂十日愈氣出不散一人口鼻中氣出盤旋不散凝似黑蓋過十日漸漸至肩與肉相連堅如鐵石無由飲食多因瘧後得之用澤蘭葉水煎日飲三盞五日愈頭面發熱有光有患頭面發熱有光色他人手近如火炙用蒜汁半兩酒調下吐物如蛇遂安渾身生泡如棠梨一人遍身生泡如棠梨子破則出水內有石一片如指甲大其泡復生抽盡肌肉不可治矣急用三稜莪朮各五錢為末分三服酒調下醉吞水蛭有醉人夜飲水誤吞水蛭腹痛黃瘦不進飲食用小死魚三四個豬脂煎溶攪勻入巴豆十粒研爛和田中干泥丸如緑豆大以田中冷水吞下泄下為度小便出糞人患小便中出糞大便中出尿名交腸病用舊幞頭燒灰酒調下五分愈流精不歇有人玉莖堅而不舉流精不歇如針刺捏之肥乃為腎滿漏精用韭子破故紙各一兩為末每服三錢水煎日三次即止面腫如蛇有人頭面肉腫如蛇狀用濕磚上青苔一錢水調塗立消腸中蟲出有人大腸內出蟲續續不斷行坐不得用鶴蝨草為末水調服五錢自愈遍身赤肉有小兒初生遍身無皮俱是赤肉掘土坑臥一宿即長皮又方用白早米粉干撲於上候生皮乃止瘡如櫻桃有項上生瘡如櫻桃有五色瘡破頭皮斷煉逐日飲牛乳而愈肢腫如石擊之有聲有人發寒熱四肢堅硬如石擊之有鐘磬聲日黃瘦用茱萸木香等分水煎一二服愈腸脫大腸下脫雖有醫方鮮得其效一人病此用芝麻油器盛坐之自入飲火麻子汁數升愈鼻中出水成蝦一人鼻患腥臭流水以碗盛視之有鐵色蝦魚如米大走動捉之即化為水此肉壞也食雞肉一日二次月餘愈足底長疔有患兩足心腫破凸起如疔脛骨有碎孔流髓身發寒戰唯思飲酒此肝腎二氣冷熱相吞用川烏炮為末敷之內煎韭菜湯服之愈四肢脫節有四肢脫節但有皮連不能舉動名曰筋解用黃蘆酒浸一宿焙乾為末酒下二錢多服自痊喉間別竅一人咽喉間生肉塊突起有孔竅見臭氣用臭橘葉煎服而愈臍漏一人腹堅如石臍中流水出不止又痛癢之甚濃煎蒼朮湯沃之又以術末加麝調水服眉病一人目瞪不見唯眉毛扇動喚之不應與飲飯能食用蒜三兩取汁酒調服遂愈毫孔出血一人毛竅節次血出少間不出即皮脹如鼓口鼻眼目俱脹名脈溢用薑汁合水各一盞服之即安腦竅一婦人年少腦生一竅凡咳膿血與竅相應而出此肺痿也用參耆歸芍加退熱排膿之劑而愈蛇瘕患蛇瘕乃蛇精液沾菜上誤食之者腹內成蛇或食蛇亦有此其證常飢食之即吐出赤頭蜈蚣一條炙為末作二服酒下龍瘕誤飲龍精而成龍瘕者用寒食飯三升每食五合日三次得吐即愈鱉瘕誤食蛇及鱉而成瘕或因食鱉則痛並用雞糞一升炒黃投酒中浸一宿澄清去貯別器以糞炒乾為末用澄清酒調下一合即愈雞瘕雞瘕有病冷痰者醫曰因食白瀹雞過多故也用蒜煮熟食之二三枚乃吐一物如升大痰涎裹之開而視之一雞卵也再服熟蒜吐十三卵方愈胞漏一婦産後有傷胞破不能小便常常滲漏不幹用生絲絹一一剪碎白牡丹根皮白芨各末一錢水一碗煎至絹爛如餳空心頓服不可聲言即效尸厥人臥奄然死去有腹中走氣如雷名曰尸厥用硫黃一兩焰硝五錢研細分三服好酒煎覺煙起即止溫灌之片晌再服遂醒蛇頭瘡患瘡如蛇頭突出數寸用雄黃硫黃塗之即消人面瘡有患人面瘡多在股上其形似人面有口眼敷藥上即食之無矣與之飲食皆食之無一日將貝母末敷即密口不受遂拉之瘡口數次而痊心漏有患胸前潰竅血液常流二十年餘治之不效一方士教以鹿茸酥炙附子泡鹽花棗肉為丸每服酒下三十丸效心疾見獅有患心疾見物如獅子程伊川教以手直前捕之見其無物久久自愈觀壁皆蓮一婦病熱目視壁上皆是紅蓮花滿壁醫用滾痰下之愈乳懸一婦産後忽然兩乳細小下垂痛甚名曰乳懸用芎歸各二斤內用半斤煎水服余以燒煙燻口鼻二料乃愈水道出線一婦産後水遂中出肉線一條長尺余動之則痛欲絶先服失笑散數服次以帶皮薑三斤研爛入清油二斤煎乾為度用絹兜起肉線屈曲於水道邊以煎薑熏之冷則尉之一日夜縮其大半二日則盡入再服失笑散芎歸湯調理如肉線斷不可治剩骨癰有患腫毒潰時常出一細骨名剩骨癰用生桐油調密陀僧如膏絹攤貼愈灸火出血有人灸火至五壯血出一縷急如溺手冷欲絶以酒炒黃芩一二錢為末酒下止頭皮蛆出一人頭皮內時有蛆出以刀切破皮用絲瓜葉搗汁搽之蛆出盡根絶痘爛生蛆小兒痘爛生蛆以柳條帶葉鋪地將兒臥其上蛆盡出而愈竅有聲如兒啼一人淵疽發於肋下久則潰竅有聲如兒啼灸陽陵泉二七壯即止應聲蟲腹中有蟲作人語隨人言則應名應聲蟲讀本草藥名悉應唯讀雷丸即不應遂服之而蟲聲絶指節斷落人有手指節間痛不可忍漸至斷落以萆麻子去殼二兩碎者不用黃連四兩貯瓶內水二升浸之春夏三日秋冬五日每早向東以此水吞下萆麻子一粒漸加至四五粒微泄無害忌食動風物屢驗耳內鳴如雀聲人患頭風證耳內常鳴如鳥雀啾唧之聲此挾腦風火之聲也用川當歸湯而愈舌出寸余一人傷寒舌出寸余連日不收用梅花冰片搽舌上應手而收重者用三錢方愈舌脹滿口子和治一婦人水舌腫大滿口諸藥罔效以扉針砭之血出腫減三日方平舌出不牧婦人産後舌出不能收以硃砂敷其舌令作産兒之狀以二女扶之壁外潛將瓦器忽然崩墜響聲婦聞而驚舌則收婦人生蟲一婦人忽生蟲一對在地上能行長寸余自後月生一對以苦參加對蟲藥為丸服之又生一對埋於土中過數日發而視之大如拳名子母蟲從此絶根眼中血出一婦人眼中血如射而出或沿鼻流下但出血多時即經不行乃陰虛相火之病遂用當歸生地酒芍加柴胡黃連黃柏知母條芩側柏木通桃仁紅花水煎食前服愈奶頭裂奶頭裂用秋後嫩茄子裂開頭者陰乾燒為末水調服人被鬼擊一人被鬼擊身有青痕作痛以金銀花水煎服愈身紅點一男子每至秋冬遍身發紅點作癢此寒氣收斂腠理陽氣不能發越怫鬱內作也宜用人參敗毒散解表再用補中益氣湯實表而愈身紫泡一人因剝死牛瞀悶遍身俱發紫泡便急刺破泡良久遂收而蘇醒更與敗毒藥愈頭焮如斗人患腦疽面目俱腫頭焮如斗此膀胱濕熱所致用黃連消毒飲二劑次以槐花酒二碗頓退以指下腫虛復起此膿已成也於頭額肩頰各刺一孔去其膿汁頭目始開更以托裡藥加金銀花連翹二十劑全愈紅絲瘤東垣云曾一人生一子一歲後生紅絲瘤而死後四子皆然何也曰汝乃腎中伏火精內有紅絲故也俗名胎瘤汝試以精驗之果然遂以滋腎丸與之令其妻服六味地黃丸乃受胎生子前證不作蛇入人竅蛇入人竅中急以手捻定以刀割破尾以椒或辛辣物置尾中以綿縛之即自出不可拔産後食茶一婦人産後日食茶二十餘碗一月後遍身冰冷數塊人以指按其冷處即從指下上應至心如是者二年諸醫不效以八物湯去地黃加橘紅入薑汁竹瀝一酒杯十服而溫聞雷昏倒七歲小兒聞雷即昏倒以人參當歸身麥門冬少入五味子熬膏盡一斤後聞雷自若別有一喉一人但飲食若別有一喉嚨斜過膈下徑達左脅而作痞悶以手按之則瀝瀝有聲以控涎丹十粒服之少時痞處熱作一聲轉瀉下痰飲二升再飲食正下而達胃矣三陰交血出一婦三陰交無故血出如射將絶以手按其竅縛以布條昏倒不知人以人參一兩煎湯灌之愈項腫與頭相統一人頸項腫與頭相統按之堅硬漏蘆湯一劑服下發癢頃刻消散癢入骨髓一人田間收稻忽然遍身癢入骨髓用食鹽九錢泡湯三碗每進一碗探而吐之三進三探則不癢矣此痰氣也小兒遍體癢一小兒遍身搔癢此火候也以生薑搗爛布包擦之而止從治之也盤腸産盤腸産者於臨産即子腸先出而後産子産子之後其腸不收以醋半盞冷水七分勿令婦知倏然一噴産婦之面三噴之則腸收盡此升提之法也恐即氣上産戶一物如胞丹溪治一婦産戶下一物如胞有尖約重斤余卻喜血不盡虛急與黃耆白朮升麻各五分人參當歸各一錢水煎連服三劑即收愈胸間潰竅一少婦胸潰一竅有膿血與口中所咳相應而出以參耆當歸加退熱排膿等藥而愈玉莖長腫一少年玉莖挺長腫而萎皮塌常潤磨股難行兩腿氣衝上手足倦弱先以小柴胡湯加黃連大劑行其濕熱少加黃柏降其逆上之氣腫漸消莖中硬塊未盡以青皮為君佐以散風之藥為末服外以絲瓜汁調五倍子敷之愈耳內生紫疔一人耳內生疔如棗核大痛不可動用火酒滴耳內令仰上半時以箝取出絶根此名耳痔陰莖腫大一人莖頭腫大如升光如魚泡以二陳湯加升麻青黛牡蠣水煎服二劑愈新婚逆意一少年新婚欲交媾女子阻之乃逆意遂陰痿不舉者五七日以禿筆頭燒灰酒調空心服一錢即起陰戶如石一婦産後因子死經斷不行半年一日小腹忽痛陰戶內有物如石硬塞之而痛不禁群醫不識青林曰此石瘕也用四物湯加桃仁大黃三稜檳榔玄胡索附子澤瀉血竭為湯二劑而愈瘡血如溺一人左手無名指爪角生一小瘡初起麻粒大用小刀挑開瘡頭血出如溺不止一日夜長出肉瘤如菌裹指頂內開一孔如眼目轉動此疔毒也以艾灸四十壯不知痛癢復烙之剪去肉瘤敷收疔散外以膏藥之內服解毒湯七日愈日夜小便百餘次縮泉丸最效脬氣不足小便頻數一日夜共百餘次用益智仁天台烏藥大如臂者等分搗末酒煮山藥打糊為丸如梧桐子大臥時鹽酒送下五七十丸皮生惡物一女十六歲四腕軟皮處生惡物如黃豆大半在肉內紅紫色痛甚諸藥不效方土教買水銀四兩以白紙二張揉熟蘸水銀擦三日自落而愈雞子愈癆有患癆瘵二年一日無肉味腹痛不可忍及危其家恐傳染置之空室待其自終三日無得肉食將雞子自煎食及熟忽打噴嚏有紅線二條長尺許自鼻出入銚遂以碗覆煎之視之即癆蟲也遂愈吐物斷酒一人自幼好酒片時無酒呼叫不絶全不思食日漸羸瘦或執其手縛柱上將酒與看而不與飲即吐一物如豬肝入酒器其人遂安絶不思飲酒鵝蝨入耳一少女近窗做針黹忽患頭疼甚諸藥不效一醫察得窗外養鵝知為鵝蝨飛入耳內咬而痛也以稻稈煎濃汁灌之蝨死而出遂不痛念木瓜愈足患足轉筋者密念木瓜二字七七遍即愈閉耳出蟲一切蟲入耳者如在左耳以手緊閉右耳努氣灌左耳其蟲自出最妙自吹目塵一切塵埃等物眯目自以手撑開眼皮口內盡力啐之數口即出不必請人吹也貓胎治噎貓生子胎衣陰乾煅存性酒調服之治膈噎病極有效嘗聞貓生子即有食胎衣欲取之者必候其生時急令人取可得若稍遲則食矣可久針肉龜一人患腹痛延葛可久診脈謂其家曰腹有肉龜候熟寐吾針之勿使患者知之知即龜藏矣患者問家人誑曰醫云寒氣凝結多飲醇酒則自散矣患者喜引觴劇飲沉酣而臥家人亟報可久以針刺其患處病者驚悟敷以藥餌須臾有物下儼如龜形厥首有穴針所中也病遂愈視正為斜淮安富翁子忽病視正物皆以為斜凡几案書册之類排布整齊必更移令斜自以為正以至書寫尺牘莫不皆然父母甚憂之更歷數醫皆不諳其疾聞鄉有名醫吉老遂攜子往求治既診脈後令父先歸留其子設樂開宴勸酬盡醉乃已扶病者坐轎中使人抬之高下其手常令傾側展轉久之方令登榻而臥達旦酒酸遣之歸家前日斜視之物皆正之父母躍然而喜且問治之之方吉老云此疾因醉中著閃倒肝之一葉搭肺葉故視正物為斜今復飲之劇醉則肺脹展轉之間然復舊歸原矣故視遂正藥餌安能治之哉翁厚酬金帛鄒妻發瘕張子和十形三療云戴人治王宰妻病胸膈不利戴人用痰藥一湧而出雷白蟲一條長五六寸有口鼻牙齒病者忿而斷之中有白髮一莖豫按徽僧病噎者腹中破一物其狀如魚即所謂生瘕也嘉靖初長州鄒妻患小腹下左生一塊形如梅李久之吐出始則腐潰若粒米之狀中則若蜆肉之狀以指捻開即有長髮數條在其內名醫竟不能治遂至不起豫嘗見蛇發等瘕往往載於方書或偶因食物相感假血而成理故有之不可指為妄誕諸腦柔物昔有好食豬羊腦期年手足柔弱不能行遂成癱瘓按內則云豚去腦魚去乙鱉去醜鄭氏云是皆不利於人也左傳云晉候夢楚子伏己而盬其腦子犯曰吉吾且柔之矣杜預注云腦所以柔物令人熟皮必用豬腦欲其柔也乃知內則左傳之言有足徵矣雞卵制蜈蚣一農夫夏天晝臥於地熟寐之間蜈蚣入其口既寤覺喉中介介如梗狀咯不能出咽不能下痛癢不定甚為苦楚一醫用雞卵劈破入酒調勻頓服仍以大黃為末和香油飲之頃刻瀉出蜈蚣尚活動不死蓋蜈蚣被雞卵拘攣其足不能行動以利藥下之故從大便而出雞性好啄蜈蚣亦取相制之意巧治骨哽一富家子弟被雞骨哽喉百方莫能治一叟見云我有功術但用手法取之不勞藥餌急取新綿白糖二物將綿裹糖如梅大其子咽下入喉間留綿一半於外時時以手牽掣待喉中作癢忽然痰涎壅出其骨黏於綿上而出遂愈膽衡錢仲陽以顱囟著名治一産婦因事大恐而病病雖愈唯目張不閉人皆不能曉問於仲陽曰病名膽衡煮郁李仁酒飲之使醉即愈所以然者目系內連肝膽恐則氣結膽衡不下郁李仁可去結隨酒入膽結去膽下目則能閉矣如言而效誤吞線錘有稚子戲以線錘置口中誤吞之有胡僧啖以餳糖半斤即於穀道中隨糞而下僧云凡誤吞五金皆可啖餳也韭可墜金一小兒誤吞金網圈一個或云急用韭菜熟而勿斷與蠶豆同咽之不過二次其金圈從大便出矣
