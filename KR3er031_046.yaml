豉心四十九粒東向桃李桑梅小梢各二莖長七寸生藍青七葉青蒿一小握連須蔥白洗五莖石臼內同杵用井水一碗半煎一盞入童便一盞並藥煎取七分入麝香一字月初旬五更空心溫服即以被覆面恐汗中有細蟲軟帛拭之即焚其帛少時必瀉蟲以淨桶盛急鉗取蟲付烈火中焚之並收入瓷罐中瓦片敷雄黃蓋之埋深山中絶人行處直指虎牙丸治癆瘵咳嗽聲啞肉脫骨痿殺下瘵蟲紫河車一具洗淨用童便酒煮爛聽用麝香五分大川椒去合口並子以黃稈紙二重託之熱爐內烙去汗土地上蓋一宿虎頭關骨酒浸二宿炙焦各一兩半黃狗頭取肉四兩童便並酒煮爛鹿茸酒炙七錢半桃仁水泡去皮尖秦艽洗木香阿膠炒各半兩鱉甲一枚醋浸一宿炙酥安息香生髮紙捻火燒過存性各二錢上為細末以紫河車狗肉杵黏為丸梧桐子大每服七十丸月初五更空心米飲下午時又服如無胞衣以雄豬肚代用直指雄麝丸治癆瘵殺癆蟲下惡物雄黃雌黃青黛代赭石火煅醋淬硃砂研各二錢半干蝦蟆一隻酒炙黃色天靈蓋男子者酥油炙黃色三錢安息香阿魏酒浸研各二錢麝香五分巴豆肥大者十粒略去油上為細末軟粳飯頭揉和杵丸梧桐子大每服二十丸桃仁十四枚去皮尖研煎湯空心五更下三因五枝散取傳尸勞蟲桃枝李枝梅枝桑枝石榴皮並用東向小枝各七莖長三寸青蒿一小握苦楝根白皮七寸生藍青七葉連須蔥白七寸洗上以童便一升半煎至一半去渣入安息香蘇合香阿魏各一錢煎至一盞濾清調硃砂雄黃雷丸枯白礬硫黃末各半錢雞心檳榔未錢半麝香一字分作二服月初五更空心浸一服五更三點又進一服約午後取下瘵蟲淨桶盛急鉗入油銚內煎之仍將油傾罐內埋深山僻處三因神授散治傳尸勞氣殺蟲去毒川椒二斤去子併合口者炒出汗上為細末米渴下一錢必麻痹暈悶少頃如不能禁以酒糊丸梧桐子大空心服五十丸昔嘗一人與病癆婦人交其婦死後其人遂染疾遇一道人云邪氣已入臟遂令急服椒丸二斤病當去如其言服之幾盡大便出一蟲如蛇狀遂安續與人服之獲安者多矣藍汁方殺瘵蟲惡蟲皆化為水生藍青葉搗取自然汁一大碗雄黃枯白礬安息香紅硬降真香各五分麝香少許上以雄黃等同研八藍汁內月初五更空心服此方通治蟲毒及解諸毒青桑枝散取蟲神效青桑枝柳枝桃枝梅枝各七莖長四寸青蒿一小握石榴皮赤箭鬼臼各半兩上用童便一升半蔥白七莖煎至一半去渣另入安息香阿魏各一分煎至一盞去渣調辰砂末五分檳榔未一分麝香一字分二服五更初調下一服須臾又進一服至巳時必取下多紅者可救青黑色者不治見有所下即進軟粥湯飯溫暖將息不可食硬物及生冷等物合時須擇日不得令貓犬孝子穢婦人等見一方無赤箭鬼臼治瘵蟲三方三月四日取桃葉五升熟搗脫衣避風密室中坐其上從旦至暮尸蟲悉出一方空心食棐子百枚諸癆蟲悉化為水一方殺瘵蟲黑貓肝生取曬乾為末月初五更空心醇醋調下或酒後食之青囊取蟲藥追一切癆蟲啄木禽活取一隻如法喂之用硃砂四兩為末精豬肉四兩切作豆大拌和硃砂將禽餓一晝夜方與食之食盡將禽系死用鹽泥固濟炭火煅一夜來日不見太陽取出不得打破埋淨地中一尺許一晝夜取出銀器內為細末以無灰酒作一服空心入麝香少許同調下置病人在帳中四下緊閉用鐵鉗等候待病人口中蟲出即鉗入沸油中煎之沸油須先預備蟲出後進稀粥及服嘉禾散一二帖念咒服藥咒曰唵嚤嗚𫫁哞吽呢青囊釣蟲丸磁石有牆極堅者一兩半膩粉另研龍骨各半兩硇砂研半兩上為末用蠟為丸小櫻桃大每服一丸以藥上用針穿一小孔以青緑線貫之梢頭系一大錢早晨令病人向破方正坐用溫水吞下候藥下咽喉中合口以牙咬定古錢等候噁心便吐出其蟲形狀不一急以滾油煎之如不吐蟲只吐得血絲子或涎一二合皆是安證更服尋常調和諸藥數服決取痊瘥其吐出藥用溫水洗過更可治人若是傳尸勞一丸可活二人青囊釣蟲神效奪命散石燕一枚火煅醋淬七次母丁香錢半酒臘五錢鱉甲一個和殼水磨雄黃二錢上為細末以蠟為丸如緑豆大每服一丸裝釣子上系緋線一條長一丈二尺用雪膏少許丸藥以蠶繭一戳穿於線上蓋之令病人先吃膏後一口連藥吞下良久線動用力拽出有蟲入滾油煎之此藥於端午日日末出時修合先服紙丸次同神仙祕法服之青囊囊服紙丸子法凡醫傳尸當先齊戒誠心對聖焚香服紙丸子以雞蛋清塗紙上令乾剪作錢樣大丸服之後服前件丸藥散藥取傳尸癆蟲鬼哭飲子方見諸蟲門傳尸蟲論道藏經云傳尸蟲瘵不可不知其詳也九蟲之中而六蟲傳代三蟲不傳胃蟲蛔蟲寸白蟲是也或因五臟中毒而生或親戚習染而傳六蟲大率約一旬之中遍行四穴周而復始二日一食五日一退方其作若百體有痛蟲之食也退則還穴醉睡一醉五日其病乍靜俟其退醉之時乃可投符用藥不然蟲熟於符藥之後不能治也一蟲在身占一十二穴六蟲共占七十二穴一月之中上旬十日從心至頭遊四穴蟲頭皆向上中旬十日從心至臍遊四穴蟲頭皆向內下旬十日從臍至足遊四穴蟲頭皆向下若投符用藥可以審此如紫蠶之苗在肝中蓋蟲性用通靈切在精審其或取蟲不補即學淺妄行徒費資財終無去病之理可不悲哉師曰治傳尸勞者先須知正氣與毒並行故臟腑有礙即成蟲狀遇陽日長雄陰月長雌其食臟腑脂膏故其色白五臟六腑一經食損即皮聚毛脫婦人即月信不調血脈皆損不能榮衛五臟六腑也七十日後食人血肉盡故其蟲黃赤損於肌肉故變瘦飲食不為膚筋緩不能收一百二十日外血肉食盡故其蟲紫即食精髓傳於腎中食精故其蟲色黑食髓即骨痿不能起床諸蟲之有三毛毛色雜花鍾孕五臟五行之氣傳之三人即自能飛其形如禽亦多品類傳入腎經不可救治法之所載者能利後其蟲色白可三十日服藥補之其蟲色黃赤可六十日服藥補之其蟲紫黑其疾已極可百二十日服藥補之故經曰六十日內治者十得八九百八十日內治者十得三四過此已往未知全生今以六代所傳蟲狀具後六代尸蟲形狀治法第一代蟲狀病證遊遊食日治法此蟲形如嬰兄長三才背有毛此蟲形如鬼動走臟腑此蟲形如蝦蟆變動臟腑之中凡人受病之後頓覺憔悴令人夢寐顛倒魂魄飛楊精神離散飲食減少形容漸瘦四肢百節疼痛憎寒壯熱背膊拘急口苦舌乾面無顏色鼻流清涕虛汗常多其蟲遇丙丁日食起醉歸心俞穴中四穴輪轉周而復始俟蟲大醉方可醫灸取出蟲後用藥補心宜服守靈散第二代蟲狀病證遊食日治法此蟲形如亂髮長三寸許在人臟腑之中此蟲形如蜈蚣或似守宮在人臟腑之中此蟲形如蝦蟹在人臟腑之中凡癆瘵苦患此蟲令人神色如醉夜夢不祥夢與亡人為侶心胸飽悶四體不和骨節枯稿日漸瘦弱醋心嘔酸咽乾鼻塞背脊痠疼腰膝無力唾吐膿血頭目不利胸膈多痰盜汗發熱等證其蟲遇庚辛日食起醉歸肺俞穴中俟蟲大醉方可醫治取出蟲後補肺則瘥宜服虛成散第三代蟲狀病證遊食日治法此蟲形如蚊蟻類在人臟腑之中此蟲形如螳螂或如血果在人臟腑之中此蟲形如刺蝟或如毛蟲在人臟腑之中癆證若有此蟲令人三焦多昏日常思睡嘔吐苦汁或吐清水黏涎腹脹虛鳴口鼻生瘡唇黑麵青日漸消瘦精神恍惚口燥咽乾目多昏淚其蟲庚寅日食起醉歸厥陰穴中四八俟蟲大醉方可治之取蟲之後補氣即愈第四代蟲狀病證遊食日治法此蟲形如亂絲或如蠐螬蟲者此蟲形如豬肺或作蟬蟲此蟲形如蛇虺往來五臟之中凡病此蟲令人臟腑虛鳴嘔逆腸中痃癖氣塊憎寒壯熱肚大筋青咳嗽氣促口苦舌乾要吃酸鹹之物其蟲遇戊巳日食起醉歸脾俞穴中四穴俟蟲大醉方可治取蟲後補脾即愈服魂停散第五代蟲狀病證治法此蟲形如鼠無毛此蟲有頭無足有足無頭此蟲形如精血片凡患此蟲入肝經而歸腎得血而變更也令人多怒氣遂四肢解散日食減少或面紅潤如平人或時通靈而言未來事或著床枕不起有似中風肢體頑麻腹內多痛其蟲遇壬癸日食起醉臟肝俞穴中四穴俟蟲大醉方可治取蟲後補肝即愈宜服金明散第六代此代蟲有翅足全者千里傳疰所謂飛尸此蟲形如馬尾或有兩條一雌一雄此蟲形如龜鱉在人五臟之中此蟲形如爛面或如飛禽或長或短凡患此蟲令人思食百物身體尪羸腰膝無力眼暗耳鳴喘嗽不定心腹悶亂其蟲遇醜亥日食起醉歸腎前穴四穴俟蟲大醉乃可治之取蟲出補腎填髓愈宜服育嬰散取六代癆蟲後服五補藥方具後以下俱青囊方虛成散補肺臟癆極白茯苓枳實麩炒秦艽芍藥麻黃當歸酒洗茄香炒各半兩甘草炙一分玄胡索半兩上為細末每服二錢水一盞銀環一對蜜五點煎八分通口服金明散補肝臟癆極人參茯苓秦艽知母酒炒石膏煅甘草炙各等分上為細末每服三錢水一盞姜七片蔥白二寸煎八分無時服守靈散補心臟癆極白茯苓一錢丁香五分訶子一錢桔梗一錢二分芍藥八分羌活甘草炙各三分上為細末每服三錢水一盞入銀耳環一隻蔥白三寸煎八分通口服魂停散補脾臟癆極白藥子人參桔梗訶子茯苓各一錢丁香甘草炙各三分上為細末每服三錢水一盞入蜜一匙煎八分通口服育嬰散補腎臟癆極香附子炒黑一錢附子裂個木香白蒺藜去刺各五分白茯苓三錢甘草炙五分上為細末每服二錢水一盞姜七片蔥白三寸煎七分空心服茯神散不問遠年近日取效下蟲紅色便可治肚下黑又瘥肚下白色是食髓也萬無一瘥下蟲之後宜服此藥茯神茯苓人參遠志龍骨肉桂甘草各一兩陳皮當歸五味子各一兩半黃耆一兩大棗五十二枚上咀分八服每服水盞半姜二錢煎一盞趁前藥後吃亦空心服神效此是神人所授靈祕方取癆蟲法灸穴凡取癆蟲可於三節骨上一穴並膏肓二穴每穴灸七壯然後飲食調理方下取蟲藥其蟲或如亂髮或如紅線線者是也四季取蟲宜用之藥春宜用雄黃另研硫黃另研各二分巴豆一粒去油豆豉七粒上同為細末麵糊為丸梧桐子大每服十丸空心童便一合酒一盞溫送下夏宜用蘿蔔子鶴蝨硫黃另研各二分巴豆一粒去油豆豉七粒如前制服秋宜用錫灰雄黃另研緑豆粉各二分巴豆一粒去油豆豉七粒雌黃另研二分如前制服各宜用雌黃雄黃另研用錫灰各二分巴豆去油豆豉各七粒如前制服治傳尸癆追尸蟲明目丹白兔糞中秋夜取四十九粒野中尋者佳硇砂一錢上為細末煉蜜丸梧桐子大每服七丸甘草半兩槌碎以水一盞揉取濃汁若患人瘦弱則用炙甘草五更空心服預戒患人不得心躁冷服不妨小瘥兩日一服下蟲為準藥要上旬日服貫衆丸去三尸五蟲貫衆五分殺伏蟲白藋蘆三分殺大腸蟲蜀漆三分殺白蟲厚朴三分殺肺蟲狼牙子四錢殺肺蟲殭蠶四分殺膈蟲雷丸六分殺赤蟲雄黃三分殺尸蟲蕪荑五分殺差蟲上各制淨為細末煉蜜丸梧桐子大川水下五丸三服可漸加至十丸服之二十日百病皆愈三尸九蟲自滅服者須齊戒恭敬婦人絶孕服之有子桂心丸神仙去三尸九蟲捷效熟地黃三兩乾漆五錢桂心一兩上為細末煉蜜丸梧桐子大每服七丸米飲送下雄黃丸去三尸九蟲雄黃松脂各一兩研上溶脂為丸如芡實大平旦一丸服之七日三尸盡去通神散治尸勞尸蟲附子一枚大黃一兩牛黃五分上為末加桃柳枝青蒿各七握銼用童便半碗浸一宿來日五更煎多沸濾渣調散子一半服了以衣被蓋便睡取下惡物當自止下時用桶子盛之看何物其蟲類有四一頭如馬尾二如亂髮三似蜈蚣四如血果或如亂綿破絮忌食生冷哽物茶蒜炙爆雞鴨蝦蟹油膩醃藏等物後藥服之甘草黃連當歸木香各半兩上將酒二升瓷器內煎取五合傾出煎此四味熬看軟硬和丸梧桐子大空心晚後酒或鹽湯下三十粒神效守庚申法道藏經曰夫人之生於世也上至國王次至大臣下至僧遂庶人多少不定惟有女人此疾尤甚學道之士若不去三尸九蟲以求長生者終不可得也每值庚申日其夜不睡守之至曉體倦方可投睡令人數覺尸蟲自不得去奏事也大帝玄科云六月八日及庚申日北帝開諸生門聽諸法司訟事過滿五日者其人必死宜守庚申振伏三尸凡守庚申三尸長絶令人精神爽快五神恬靜每日叩齒三十六通以左手捧心呼三尸之名上尸彭琚出中尸彭瓆出下尸彭𤩝出輒不得為害常以庚申去手甲丑日去足甲每年七月十六日將所去手足甲燒灰和水服之三尸九蟲皆滅名曰斬三尸遇仙灸癆瘵捷法取癸亥旦二更時六神皆聚解去下衣直身平立用筆於腰上兩旁微陷處點定針家謂之腰眼然後上床合面而臥每灼小艾七壯兩腰眼共十四壯癆蟲或吐出或瀉出即安斷根將蟲入火燒焚後服將軍丸將軍丸治傳尸癆瘵前灸法並此藥皆是異人傳授錦紋大黃制麝香一錢研豬牙皂角醋炙桃枝去皮尖檳榔雷丸各一兩蕪荑半兩鱉甲醋炙黃上為末先將蒿葉二兩東向桃李柳桑葉各七片水一盞煎七分去渣入蜜一大盞再熬成膏入前末藥及麝香安息香末搗丸梧桐子大每服三十丸食前棗湯送下三汁丸灸後亦宜服此生地黃汁青蒿汁薄荷葉汁童便好酒各二升同煎成膏入後項藥柴胡鱉甲醋炙黃秦艽各一兩硃砂麝香各半兩研上為細末調前膏內搗為丸梧桐子大每服十五丸或十丸不拘時溫酒送下忌生冷毒物醫林五蒸湯治骨蒸癆熱甘草炙七錢半茯苓二錢二分半人參一錢半竹葉一錢半生地黃葛根各二錢二分半知母黃芩各一錢半石膏三錢七分半上咀每服八錢水二鍾白梗米錢半煎八分不拘時溫服以小麥煮湯煎藥亦可忌海藻菘菜蕪荑凡二十二蒸證狀治法本方中加藥開例於後肺蒸喘嗽咯血喉干聲嘎鼻塞加天門冬去心麥門冬去心桔梗紫蘇烏梅皮蒸肌膚鱗起毛折發焦加石膏桑白皮氣蒸喘促鼻乾遍身氣熱不自安息加人參黃芩梔子大腸蒸右鼻乾疼大腸隱痛加大黃芒硝心蒸少氣煩悶舌乾口苦或舌生瘡加黃連生地當歸赤芍脈蒸心煩體熱脈緩急不調加生地當歸血蒸毛髮焦枯有時鼻衄或尿血加生地當歸各酒洗童便小腸蒸下唇焦加赤茯苓木通生地黃脾蒸唇焦折或生口瘡加芍藥木瓜苦參肉蒸別人覺熱自覺冷食無味而嘔或煩躁不安加芍藥胃蒸鼻口乾燥肚腹膨脹自汗睡臥不安舌生瘡加石膏梗米大黃芒硝乾薑膽蒸眼目失光睛黃口苦耳聾脅下堅硬而痛加柴胡枯蔞三焦蒸乍寒乍熱中脘膻中時覺煩悶加石膏竹葉肝蒸或時眼前昏暗或眩暈躁怒無時加川芎當歸酒洗前胡筋蒸眼昏脅痛爪甲焦枯加川芎當歸腎蒸耳輪焦枯腰腳痠疼情意不定泄精白濁加生地黃石膏知母寒水石腦蒸頭眩熱悶眼眵口吐熱涎加生地黃防風羌活髓蒸髓沸骨中熱肩背痛骨痠疼倦行加天門冬生地黃當歸骨蒸版齒黑燥大杼痠疼倦行腰痛足逆冷疳蟲食藏加鱉甲炙黃地骨皮當歸酒洗牡丹皮生地黃玉房蒸男子遺溺失精婦人經閉白淫加知母黃柏當歸芍藥脬蒸小便赤黃加澤瀉茯苓生地黃沉香滑石膀胱蒸右耳焦小便凝濁如膏加澤瀉茯苓滑石凡此諸蒸亦有熱病後食肉油膩飲酒房勞犯之而復作久蒸不除變成疳疾即死矣亦有瘧久不愈以致咳嗽調治失宜漸成骨蒸癆瘵之證者多當推標本而治之醫林經驗方治男子婦人骨蒸癆瘵憎寒壯熱青蒿春夏用葉秋冬用子童便浸曬乾二兩白朮地骨皮鱉甲醋炙人參白茯苓粉甘草炙柴胡栝蔞根桑白皮蜜炙各五錢上咀每服七錢水二盞姜三片煎八分不拘時溫服醫林麥煎散治少男室女骨蒸婦人血風攻疰四肢赤茯苓當歸酒洗乾漆鱉甲醋炙常山白朮柴胡大黃煨生地黃石膏各錢半甘草炙七錢半上咀分二帖每帖入小麥百粒水二盞煎八分去渣食後臨臥服有虛汗加麻黃根一錢醫林地骨皮枳殼散治骨蒸壯熱肌肉消瘦少力多困夜盜汗地骨皮枳殼麩炒秦艽柴胡知母當歸酒洗鱉甲醋炙黃上咀各等分每帖七錢水二盞用桃柳枝頭各七莖姜二片烏梅一個煎八分臨臥服團魚丸治骨蒸潮熱咳嗽纍效貝母知母前胡杏仁去皮尖炒柴胡各等分團魚一個去腸肚上用藥同魚煮熟提起去頭取肉連汁食之將藥焙乾就用魚甲及骨煮汁和藥丸梧桐子大每服三十丸黃耆湯食遠下續斷散治骨蒸癆熱潮熱傳尸勞喘嗽氣急身痛煩躁盜汗續斷紫菀桔梗青竹茹五味子各一錢二分生地黃桑白皮蜜炙各二錢甘草炙八分赤小豆四錢上咀作二服每服用小麥五十粒水二盞煎八分食後服兼治咳嗽吐膿血小兒亦可服人參散治邪熱客於經絡肌熱痰嗽五心煩躁頭目昏痛夜有盜汗四肢倦怠婦人虛勞骨蒸尤宜服之人參白朮白茯苓柴胡當歸半夏曲葛根甘草炙赤芍藥各等分上咀每服七錢水二盞姜三片棗一枚煎八分食後服柴胡梅連散治骨蒸癆熱久而不瘥胡黃連柴胡前胡烏梅各三錢上咀每服四錢用童便一盞豬膽一個脊髓一條韭白根半錢同煎至七分不拘時溫服亦治五勞七傷虛弱清肌十全散治男婦骨蒸肌肉消瘦宜服柴胡三錢二分生地黃地骨皮桔梗各一錢二分防風茯苓人參各一錢六分甘草炙當歸秦艽各六分上咀作二服每服水二盞煎八分食遠溫服清神甘露丸治男婦虛勞大骨枯陷並皆治之生地黃汁白藕汁牛乳汁上三味各等分用砂石器內文武火熬成膏用後藥人參白朮黃耆蜜炙黃連五味子胡黃連各等分上為末用前膏子丸梧桐子大每服五十丸食遠人參湯下太上混元丹治虛勞怯弱延年補損久服輕身健體不可盡述紫河車者天地之先陰陽之祖乾坤之橐籥鉛汞之匡廓胚胎符兆九九數足我則載而乘之故謂河車歷驗篇中名之曰混沌皮非金石草木夜露曉霜之所比倫服之不輟誠以返本還元補益之遂誠得其要紫河車一具米泔水洗淨去筋膜入麝香一錢在內縫定放砂鍋內入無灰酒五升慢火熬成膏子入藥沉香另研硃砂另研水飛各一兩人參肉蓯蓉酒浸白茯苓三兩乳香另研安息香酒熬去砂石各二兩上為細末入河車膏和藥末杵千百下丸梧桐子大每服七丸空心沉香湯或溫酒送下若有病之人詳證增加之法具於後男子真陽氣耗榮衛兩虛腰背疼痛白汗怔忡痰多喘咳夢遺白濁潮熱心煩腳膝無力宜加後藥鹿茸酒蒸川巴戟去心鍾乳粉煅陽起石煅附子制黃耆蜜炒各二兩桑寄生如無以續斷代生鹿角鎊龍骨紫菀各一兩婦人血氣虛損榮衛不足多致潮熱心煩口乾喜冷腹脅刺痛腰腿痠疼痰多咳嗽驚惕怔忡經候不調或閉不通宜加當歸酒浸石斛去根紫石英煅醋淬七次水飛柏子仁微炒另研鹿茸酒蒸鱉甲醋炙各二兩卷柏葉一兩川牛膝酒浸一兩嗽多加紫菀二兩犀角紫河車丸治傳尸三月必平復其餘癆證只數服愈紫河車一具用米泔水淨洗過烙干同衆藥磨為細末鱉甲醋炙桔梗胡黃連芍藥大黃敗鼓皮心醋炙貝母龍膽草黃藥子知母各二錢半廣朮犀角末芒硝各錢半硃砂二錢另研上為末煉蜜丸梧桐子大硃砂為衣每服二十丸空心酒下無比丸治傳尸勞服至一月愈其餘勞瘦之疾數服取效紫河車二兩煮醋浸一宿焙乾用芍藥鱉甲醋炙各半兩桔梗胡黃連大黃煨甘草炙甘龍膽苦參黃藥子秋石知母各二錢半貝母豆豉炒蓬朮芒硝犀角屑各二錢上為細末煉蜜丸梧桐子大每服二十丸溫酒送下如腸中熱食前服膈上熱食後服奪命散治前證桃仁二十枚去皮尖麩炒甘草人參各半兩鱉甲知母天靈蓋醋浸宿酥炙各一兩青蒿柴胡阿魏四棗子大蔥白一握上以天靈蓋鱉甲為末次下人參知母柴胡甘草同搗次下蔥白青蒿桃仁阿魏杵成餅子慢火焙乾為末稱二錢用童便二盞煎一盞露一宿至五更三點暖服半盞服了衣被蓋臥天明又暖半盞服之扶病人強行五七步三日勿洗手面指頭候生毛為驗每日早晨先飲白湯投之龍膽丸治積熱勞瘦不食熱壅瘡腫此藥解肌骨之熱散滯毒龍膽草柴胡黃芩鱉甲醋炙各一兩桃仁去皮尖山梔子陳皮當歸酒洗大黃甘草炙各半兩上為細末煉蜜丸如梧桐子大每服二十丸空心白湯送下如小兒減丸數服之天竺黃飲子治癆瘵天竺黃人參茯苓茯神各半兩生地黃遠志去心龍骨防風玄胡索各五錢麥門冬去心二兩大腹子七枚犀角屑二錢上咀每服七錢水二盞煎八分不拘時服忌一切毒物如治久病服此藥先看十指毛色如藕白者可治紫黑色者難治麝香散治婦人室女一切蓄熱骨蒸及室女月經不行肌瘦熱威靈仙四兩乾漆一兩炒令煙盡雄黃麝香各三錢另研上為末每服一大錢水半盞煎四分空心和渣溫服當有惡穢毒物下並是病根此藥難服或以蒸餅糊丸梧桐子大每服十五丸至二十丸茶湯任下次服桃仁散桃仁散桃仁一兩泡去皮尖麩炒黃色赤茯苓一兩芍藥人參各一錢陳皮去白七錢半檳榔七個安息香犀角屑各一錢半麝香二錢上為細末每服二錢水一鍾姜三片煎六分早晚食前服若取下蟲頭赤服天竺黃飲子補護心臟未取蟲須先服護心輕骨散治骨蒸勞熱龍膽草黃連貝母知母鱉甲醋炙烏梅桔梗秦艽柴胡人參甘草炙山梔子仁青蒿酒煮阿膠炒杏仁去皮尖麩炒各等分上為末用好清煙墨一寸以井花水磨調前藥末作餅子如大指頭大透風處陰乾二七日方用每服一餅井花水磨化又用沒藥五錢磨成一盞於五更又用黃柏末二錢同煎數沸卻入盞內頻頻打轉於五更時輕輕起服了便睡令病人仰臥甚者不過三服蛤蚧散治勞瘦白茯苓炒桑白皮酥炙知母二兩醋酥炒貝母同上制杏仁六兩泡去皮尖並雙仁者以單紙入鐺內炒乾入石臼搗為粉用皮紙包捶去油甘草二兩捶碎醋酥炒雌雄蛤蚧一對入醋酥內浸透慢火炙乾又浸五次炙令黃色勿焦黑為妙人參一兩酥醋炒黃色乳酥真者四十文切作骰子塊入銚內成汁再入米醋半斤和勻同炒前藥以干為度上為末每服二錢水一鍾煎七分食遠服忌油膩生冷毒物如久患嗽者初服此藥聞嗽加甚服久則安又方治勞熱補肺損止嗽蛤蚧一對醋酒浸炙黃芩秦艽胡黃連人參青蒿生地黃熟地黃甘草柴胡知母貝母麻黃杏仁去皮尖炒各半兩鱉甲桔梗龍膽草木香各半兩每服七錢水二盞姜三片烏梅一個棗一枚煎八分食遠服鱉甲散補虛勞鱉甲醋炙當歸赤芍藥柴胡桔梗甘草炙人參各一兩麝香五分杏仁去皮尖炒胡黃連二錢官桂半兩去粗皮不見火地骨皮一錢木香半兩宣連一錢真酥三兩白砂蜜三兩上為細末用青蒿一斤童便五升熬青蒿汁約二升濾去渣入酥蜜再熬成膏候冷入藥末搜和為丸梧桐子大每服十五丸溫酒下或米飲亦可日進三服如秋冬時更入桃柳心七個與後柴胡散煎服柴胡散補虛勞柴胡人參茯苓桔梗芍藥當歸酒浸麥門冬青皮桑白皮川芎白朮升麻甘草炙各一兩上為細末每服二錢水一盞煎七分通口連渣服又柴胡散治童稚骨蒸熱及解傷寒後熱柴胡川大黃乾漆炒煙盡秦艽甘草常山各一兩鱉甲三兩醋炙上咀每服一錢水一盞入小麥一撮煎七分不拘時冷服百勞散治骨蒸勞熱等證天仙藤當歸川芎芍藥茯苓人參黃耆知母貝母黃芩五味子地骨皮柴胡甘草白芷桔梗各等分每服一兩水二盞姜三片煎八分食後服一方加秦艽前胡灸法崔氏四花六穴灸法見針灸門專治男婦五勞七傷氣血虛弱骨蒸潮熱形容憔悴咳嗽痰喘五心煩悶四肢困倦如諸風體弱諸氣尫羸久病痼疾形體虛弱者並宜灸之黃帝灸二一種癆圖並序夫人含靈受氣稟於五常攝之乖理降之六疾至若岐黃廣記抑有舊經攻灸單行顯靈斯術骨蒸病者亦名傳尸亦名殗殢亦命伏連亦名無辜丈夫以元氣為根本婦人以血海為根源其病狀也發乾而短或聚或分或腹中有塊或腦門結核或夜臥盜汗夢與鬼交雖目視分明而四肢無力上氣食少漸至尫羸縱延歲月遂至殞滅余昔添任洛州司馬三十日灸活一十三人前後瘥者數過二百至於貍骨獺肝徒聞曩說金牙銅鼻罕見其能未如此方扶危救急非止單攻骨蒸兼亦療風或瘴或癆或邪或僻患狀既廣灸愈亦多不可全録聊述大概又恐傳說訛謬以誤將來令具圖形庶令覽者易於悉使所在流傳頗多家藏未暇外請名醫旁求上藥返魂遠魄何難之有遇斯疾者可不謹哉腎俞二穴在第十四椎下兩旁各一寸半上一隔對是穴治虛勞耳聾腎虛水腫腰痛小便濁好獨臥身冷如冰遺精溺血五勞七傷腳膝痠疼針三分灸三壯大椎一穴在第一椎膈俞二穴在第七椎膽俞二穴在第十一椎三焦俞二穴在第十三椎胃俞二穴在第十椎旋俞二穴在第一十椎養生導引法一法以兩手著頭相叉長氣即吐之坐地緩舒兩腳以兩手外抱腳中疾低頭入膝中兩手交叉頭上十三通愈三尸也一法叩齒二七過取咽氣二七如三百通乃止為之二十日邪氣悉退六十日病小愈百日大病除三尸伏蟲去肌膚光澤易簡諸方聖惠方治虛煩骨蒸不得眠用酸棗仁一兩水二盞研絞汁下米二合煮粥候熟下地黃汁一盞再煮不拘時服又方治虛勞嘔血嗽血吐血用大小薊柏葉荷葉茅根等即十灰散又以山藥五條蓮肉半斤晉棗一百枚霜柿十個四味用水四碗於砂鍋內煮熟擂碎卻下前藥末和勻慢火再熬復下阿膠四兩黃蠟二兩平胃散末四君子湯和知母黃柏末各一兩搜和成劑如硬入蜜置青石上木槌打勻丸梧桐子大每服一百丸棗楊下不拘時此藥不寒不燥治一切虛勞百損神效又方用鹿角霜一斤白茯苓四兩為末就用鹿角膠和丸梧桐子大每服三五十丸空心酒下甚補益又方治虛勞骨蒸用胡黃連蛇床子前胡各三錢犍豬膽一個脊髓一條童便水各一鍾煎八分再煎二次服四劑可愈又方治虛勞瘦熱用青蒿細銼水三升童便五升煎一升半去渣熬成膏丸如梧桐子大空心臥時各以酒吞二十丸或煎服外臺祕要方治骨蒸以生地黃搗取汁一斤入煉蜜四兩空心滾白湯調下三錢以身涼為度若利減一匙一方治蒸病名曰內蒸所以言內者必外寒內熱以手附骨而熱甚者其根在五臟六腑之中必因患後得之肉脫飲食無味皮燥而無光蒸盛之時四肢漸細足趺腫起以石膏十兩研如乳粉法每服一錢不拘時水調以身涼為度一方治癆瘵以赤皰兒俗名王瓜焙乾為末酒調二錢服一方冶骨蒸勞熱以桃仁一百二十枚泡去皮及雙仁者留尖杵為丸平旦井花水頓服盡服訖量性飲酒令醉仍須吃水能多最精隔日又服一劑百十日不許食肉一方冶五蒸平旦涼至晚煩躁飲食無味細喘小氣兩足逆冷手心常熱變疳則蝕人五臟大便或澀用芒硝五兩為末每服三錢滾米飲入煉蜜一匙調下日二服一方用芒硝二兩苦參末二兩蜜丸梧桐子大每服七丸米湯下以身涼為度一方用胡黃連為末每服一錢蜜湯調下崔元亮海上方治癆瘵骨蒸鬼氣取童子小便五大斗澄過青蒿五斗八九月帶籽採來細銼二物相合入大釜中以猛火煎取三斗去渣淨洗釜干再傾汁於釜中以微火煎至二斗取豬膽十枚相合再煎至一斗半除火待冷以新瓷器盛每欲服取甘草二三兩炙熟搗為末調蒿汁膏搗千杵為丸梧桐子大每服二十丸空心米湯下增至三四十丸亦可黃狗肉丸治男子婦人虛勞體熱盜汗四肢倦怠用肥中黃狗一隻去腸臟皮毛用內外腎研入砂鍋內酒醋八分水二分地骨皮一斤前胡黃耆各四兩蓯蓉二兩同狗肉自朝煮至暮將藥去肉再煮一宿至明早去頭骨再煮如泥入石器內細搗入當歸末四兩蓮肉一斤平胃散二斤和狗肉杵千下丸如梧桐子大每服五十丸空心鹽酒送下一方治虛勞用杏仁一斤去皮尖生薑六兩銼碎咳嗽加人參四兩同入砂鍋內河水一斗以文武火熬水盡為度去姜參渣每服杏仁五七枚或二十枚細嚼頻頻服之一方治骨蒸勞熱飲食不為肌肉自汙盜汗日夜俱熱者難治日夜間熱者易愈用羚羊角末二錢溫水調下一方治骨蒸勞及痔漏腸風下蟲血用鰻鱺魚酒醋五味煮食亦治心疼一方治傳尸癆瘵用童便二盞無灰酒一盞以新瓷器盛之取豬腰子一對入瓶內封固瓶口日晚用重湯煮之至中夜止待五更以火溫之乘熱任意飲酒食腰子病危者一月見效平日瘦怯者可服此蓋以血養血勝金石草木之藥也一方用雄黃一兩為末松脂一兩溶化和丸如蓮子大平旦吞一丸七日三尸盡去聲音門病機聲音敘論經曰內奪而厥則為喑俳皆腎虛也俳廢也素問奇病篇帝曰人有重身九月而喑此為何也岐伯曰胞之絡脈絶也帝曰何以言之岐伯曰胞絡者繫於腎少陰之脈貫腎系舌本故不能言帝曰治之奈何岐伯曰無治也當十月復聲音者內關五臟其為病也因於六氣金匱真言論曰東方青色入通於肝其音角其聲呼南方赤色入通於心其音徵其聲笑中央黃色入通於脾其音宮其聲歌西方白色入通於肺其音商其聲哭北方黑色入通於腎其音羽其聲呻此所以聲音通於五臟者也直指云心為聲音之主肺為聲音之門腎為聲音之根此特言其所重者舌為心之苗心病舌不能轉則不能語言暴病者尚可醫治久病者不可治也而心為聲音之主者此也肺者屬金主清肅外司皮腠風寒外感者熱鬱於內則肺金不清咳嗽而聲啞故肺為聲音之門者此也腎者人身之根本元氣發生之主也腎氣一虧則元氣寢弱而語喑者有之經曰言而微終日乃復言者此奪氣也錢氏方小兒吐瀉利小便過多以致脾虛不飲食用益元散作效數日後忽爾不語錢氏知其脾氣已復腎氣尚虛投以地黃丸益腎相繼數劑遂能言於是益信聲音之根出於腎也不誣音喑為火者多原病式曰暴喑冒昧皆屬於火暴喑卒啞也肺屬金而主聲故五行惟金響金應於乾乾為天天為陽為健為動金本燥為涸為收為斂為徑切為剛潔故諸能鳴者無越此也凡緒發語聲者由其形氣之鼓擊也水實制火火不剋金金能鳴也其為物寒則能鳴者此也其或火旺水虧熱乘肺金而神濁氣鬱則暴喑無聲也冒昧昏冒昏暗也氣昏則神濁冒昧火之象也聲音病分三因有內熱痰鬱窒塞肺金而聲啞及不出者及有咳嗽久遠傷氣而散者此內因也有外受風寒腠理閉塞束內郁嗽而聲啞三拗之類此外因也又有忽暴吸風卒然聲不出者亦外因也有因爭競大聲號叫以致失聲或因歌唱傷氣而聲不出此不內外因也養息自愈六淫之氣並干於聲音風寒燥熱致聲不清者人共知之暑濕相干者鮮有知也經曰因於濕首如裹聲如從室中言此中氣之濕也直指風寒暑濕燥火痰氣有干於心肺者病在上脘隨證解之邪氣散則天籟鳴矣惟夫腎虛為病不能納諸氣以歸元故氣奔而上咳嗽痰壅或喘或脹足冷骨痿胸腹百骸俱為之牽掣其嗽愈重其氣愈乏其聲愈干君子當於受病之處圖之可也脈候肺沉澀聲不出者為郁脈浮緊為寒束聲啞洪大為火脈滑為痰脈沉伏久病聲不出者難治治法治暴失音用子和三法速效風寒咳嗽失音者三拗湯主之熱痰壅盛聲不出者鹽湯探吐之大府祕結上下不通聲氣不出者大柴胡湯下之此皆切於病證其效如響應也治久病聲啞宜補元氣自開凡病人久嗽聲啞乃是元氣不足肺氣不滋宜補氣養金潤燥其聲自喨若虛勞之人則宜滋腎水潤肺金為本訶子百藥煎收斂以治其標標本兼治此十全也久病人不語為心氣絶者死藥方通聲發散劑三拗湯治風寒邪郁咳嗽失音方見咳嗽門金沸草散同上二物湯治風寒邪氣留滯失音薄桂二錢石莒蒲一錢上咀新水煎細呷荊蘇湯失音通用荊芥穗紫蘇葉陳皮木通當歸薄桂石菖蒲各等分每服四錢煎服和濟不換金正氣散方見寒門有濕證聲啞加茵陳石菖蒲有寒加薄桂小柴胡湯方見傷寒門治伏暑發熱汗渴水入心胞不語木通湯治諸風失音木通石菖蒲防風羌活全蠍焙桑螵蛸直殭蠶炒炙甘草各一分南星略炒半兩上咀每服三錢姜五片蘇葉五片煎服痰鬱失音諸劑局方二陳湯見痰門加石菖蒲入竹瀝竹茹服或吞白丸子直指姜橘飲治風痰風毒纏喉不語南星略炮半兩生薑四兩橘皮三錢上咀每服三錢紫蘇五葉煎服醫林玉粉丸治冬月寒痰結於咽喉不利語音不出針經云寒氣客於會厭卒如啞宜服此藥桂心草烏各一字半夏泡五錢上為細未薑汁浸蒸餅為丸如雞頭大每服一丸至夜含化多年不愈者亦效竹瀝導痰湯方見痰門治痰盛聲啞用導痰湯煎熟加竹瀝一盞薑汁一匙和勾溫服細呷隱君滾痰丸治證同前臨臥用訶子甘桔湯吞下五六十丸火勝金虧失聲諸劑醫林訶子甘桔湯治火盛失音訶子四個半生半煨桔梗一兩五錢半生半炒甘草二寸半生半炙上咀分兩服每服水一盞童便一盞煎八分食後溫服醫林響勝破笛丸治謳歌動火失音不語者服之神效連翹桔梗甘草各二兩半薄荷葉四兩訶子煨砂仁大黃酒蒸各一兩川芎兩半百藥煎二兩上為細末雞子清和丸彈子大臨臥噙化一丸局方犀角地黃湯治熱入血室心忪不語眩冒迷忘生地黃四兩犀角牡丹皮芍藥各半兩上咀每服四錢入桃仁去皮尖七粒煎服硃砂丸方見血門治跌打驚忤血入心竅不語祕方竹衣麥冬湯治一切痰嗽癆瘵聲啞不可救者服之神效竹衣一錢用金竹鮮者劈開揭取竹內衣膜竹取瀝竹茹一丸彈子大即將取衣竹割取青皮是也竹瀝即將取衣茹金竹依製法取之麥門冬去心二錢甘草五分陳皮去白五分白茯苓桔梗各一錢杏仁去皮尖七粒研上咀水盞半竹葉七個煎七分入竹瀝一杯和勻溫服竹瀝竹茹彈丸大醫林杏仁煎治咳嗽暴重聲音不出杏仁泡去皮尖研如泥冬蜜薑汁砂糖各一盞桑白皮去赤衣炒木通貝母北五味子紫菀茸各一兩石菖蒲半兩款冬花蕊上咀水五升煎半去渣入杏薑糖蜜合和微火煎取一升半每服三合兩日夜服之百合丸治失聲不語百合百藥煎杏仁去皮尖訶子薏苡仁各等分上為末雞子清和丸彈子大臨臥噙化一丸金花散治失聲亦治喉痹槐花新瓦上炒令香熟三重後床上要仰臥隨意食之熱證通用聲即開人參平補湯治腎虛聲不出人參川芎當歸熟地黃酒洗白芍藥白茯苓菟絲子制北五味子杜仲制白朮巴戟去心橘紅半夏曲各半兩牛膝酒浸焙破故紙炒益智仁葫蘆巴炒甘草炙各二錢半石菖蒲錢半上咀每服三錢姜五片棗二枚煎吞山藥丸七十粒方見濁門五更頭腎氣開不得咳唾吉語默然再進土藥功效勝常治䘌桃仁湯治狐惑蟲食其臟上唇瘡其聲啞桃仁炮去皮炒槐花子艾葉各一兩大棗十五枚上水三盞煎一盞半分三次服密陀僧散方見驚悸門治大驚入心痰血窒塞喑不能言亦治喑風三因七氣湯方見氣門加枳殼甘草治氣膈聲沉良方通聲煎治咳嗽氣促胸中滿悶語音不出杏仁一升去皮尖炒另研人參五味子款冬花桂心木通菖蒲竹茹各二升細辛各二兩白蜜生薑汁各二升棗肉酥各二兩上咀水五升煎五七沸內酥蜜薑棗再煎令稀稠得所每服一匙溫酒小盞化下一方不用酒噙化易簡諸方一方治纏喉風聲不出用靛花薄荷葉各等分為細末煉蜜丸如彈子大每服一丸臨睡噙化一方治失聲不出用蘿蔔搗自然汁入薑汁少許時時飲之一方用密陀僧為極細末每服一錢點茶飲之聲即出一方用皂角一條去皮子蘿蔔三枚煎服數次聲則出一方治風冷寒鬱失音用桂心為末頻放舌下漸漸咽汁聲出一方治無故咽喉聲音不出橘皮五兩水三升煮一升頓服效一方治卒啞用杏仁三分去皮煎熬別杵桂一分和搗如泥每用杏核大綿裹噙細細咽之日三夜五
