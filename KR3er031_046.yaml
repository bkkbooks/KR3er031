body:
  text: 卷之四十六癆瘵門病機癆瘵敘論內經曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱又曰陰氣者靜則神藏躁則消亡又云陰虛生內熱小學曰癆瘵陰虛巢氏病源曰夫虛勞者五勞七傷六極是也一曰志勞二曰思勞三曰心勞四曰憂勞五曰瘦勞又曰陰氣者靜則神藏躁則消亡又云陰虛生內熱小學曰癆瘵陰虛巢氏病源曰夫虛勞者五勞七傷六極是也一曰志勞二曰思勞三曰心勞四曰憂勞五曰瘦勞又有肺勞者短氣而面浮鼻不聞香臭肝勞者面目乾黑口苦精神不守恐畏不能獨臥目視不明心勞者忽忽喜忘大便苦難或時鴨溏口內生瘡脾勞者舌本苦直不得咽唾腎勞者背難以俯仰小便不利色赤黃而有餘溺莖內痛陰囊濕生瘡小腹滿急六極者一曰氣極令人內虛五臟不足邪氣多正氣少不欲言二曰血極令人無顏色眉發落墜忽忽喜忘三曰筋極令人數轉筋十指爪甲皆痛苦倦不能久立四曰骨極令人酸削齒苦痛手足煩疼不可以立不欲行動五曰肌極令人羸瘦無潤澤飲食不生肌肉六曰精極令人少氣嗡嗡然內虛五臟氣不足發毛落悲傷喜忘七傷者一曰陰寒二曰陰痿三曰裡急四曰精連連五曰精少陰下濕六曰精清七曰小便苦數臨事不舉又云七傷一曰大飽傷脾脾傷善噫欲臥面黃二曰大怒逆氣傷肝肝傷少氣目喑三曰強力舉重久坐濕地傷腎腎傷少精腰背痛厥逆下冷四曰形寒寒飲傷肺肺傷少氣咳嗽鼻鳴五曰憂愁思慮傷心心傷苦驚喜忘三怒六曰風雨寒暑傷形形傷髮膚枯夭七曰大恐懼不節傷志志傷恍惚不樂愚謂五勞者心肝脾肺腎也勞於心者則神耗而血衰驚悸之疾亦因之而作矣勞於肝者則怒多而火盛淚外泄而目昏或脅刺痛筋憊不能久立遠行勞於肺者因過憂而耗氣則燥勝而液枯乾咳聲啞二便祕澀皆由此而作也勞於脾者勞倦傷脾發熱惡寒嘔吐不食四肢無力好臥惓言漸而致於腎憊陰虛則成怯證勞於腎者色欲過度淋濁遺精陰不上升陽不下降腎水既不升榮心心肺無所蔭咳嗽吐紅咯血之證作也今世之所謂勞者皆無出於此六極者風寒暑濕燥火靡不冒觸極甚而即病之重而不可救者有矣或有醫之愈而終為淫氣所傷一元氣有損莫之能完復也致為終身之損者蓋多矣七傷者喜怒憂思悲恐驚七情過傷是也惟過於思者寢成癆瘵今之癆瘵而多起於脾腎之勞憂思之過者也先哲所謂五勞六極七傷蓋因證而言也袖珍方云癆瘵之證非止一端其始也未有不因氣體虛弱勞傷心腎而得之又有外感風寒暑濕之氣先為瘧疾以致咳嗽寒邪入里失於調治又不能保養過於房勞傷於飲食久而成癆瘵之候其為證也令人肌肉羸瘦皮毛乾枯寒熱盜汗遺泄白濁或腹中有塊或腦後兩邊有小結核或聚或散或咳嗽痰涎或咯唾膿血及傳變為二十四種或三十六種或九十九種又有所謂五尸者曰蜚尸遁尸寒尸喪尸注尸者是也名狀雖不同傳變雖不一其實所傷不過五臟故傳於肝者面白目枯口苦自汗心煩驚怖傳於心者面黑鼻乾口瘡喜忘大便或祕或泄傳於脾者面青唇黃舌強喉哽吐涎體瘦飲食無味傳於肺者面赤鼻白痰吐咯血喘咳毛枯傳於腎者面黃耳枯胸滿腹痛白濁遺溺是也癆瘵骨蒸候巢氏曰夫蒸病有五一曰骨蒸其根在腎旦起體涼曰晚即熱煩躁寢不能安飲食無味小便赤黃忽忽煩亂細喘無力腰疼兩足逆冷手心常熱蒸盛過傷內則變為疳食入五臟二曰脈蒸其根在心日增煩悶擲手出足翕翕思水口唾白沫睡則浪言或驚恐不定脈數若蒸盛之時或變為疳臍下悶或暴利不止三曰皮蒸其根在肺必大喘鼻乾口中無水舌上白小便赤如血蒸盛之時胸滿或自稱得注熱兩脅下脹大嗽徹背連胛疼眠寐不安或蒸毒傷臟口內唾血四曰肉蒸其根在脾體熱如火煩躁無汗心腹鼓脹食即欲嘔小便如血大便祕澀蒸盛之時身腫目赤寢臥不安五曰內蒸亦名血蒸所以名內蒸者必外寒而內熱把手附骨而內熱甚或皮燥而無光蒸盛之時四肢漸細足趺腫起又有二十三蒸之論多因熱病後食牛羊肉及肥膩酒色觸犯而成此疾久蒸不除多變成疳必須先防下部不得輕妄治也二十四種勞蒸候袖珍方曰蒸在心也少氣煩悶舌必焦黑蒸在小腸也腹內雷鳴大腸或祕或泄蒸在肝也目眩昏運躁怒無時蒸在膽也耳聾口苦脅下堅痛蒸在腎也耳輪焦枯腰腿痠痛蒸在右腎也情志不定泄精白絮蒸在肺也喘咳咯血聲音嘶遠蒸在大腸也右鼻乾疼大腸隱痛蒸在脾也唇口乾燥腹脅脹滿畏寒不食蒸在胃也鼻口乾燥腹脹自汗睡臥不寧蒸在膀胱也小便黃赤凝濁如膏蒸在三焦也或寒或熱中脘膻中時覺煩悶蒸在膈也心胸噎塞疼痛不舒蒸在宗筋也筋脈縱緩小腸隱痛陰器自強蒸在回腸也肛門祕澀傳道之時裡急後重蒸在玉房也男子遺精女子白帶蒸在腦也眼眵頭眩口吐濁涎蒸在脾也肌膚鱗起毛折發焦蒸在腎也版齒黑燥大杼痠疼蒸在髓也肩背疼惓行骨痠痛蒸在筋也眼昏脅痛爪甲焦枯蒸在脈也心煩體熱痛刺如針蒸在肉也自覺身熱多不奈何四肢瞤動蒸在血也毛髮焦枯有時鼻衄或復尿血蒸傳諸此其治多難也惟早灸膏肓及崔氏四花穴法內觀自養外投對證之藥庶可逃生失於早圖不能寡欲者必不免於死亡癆瘵起於陰虛丹溪曰癆瘵主乎陰虛痰與血病虞氏曰今也癆瘵嗜欲不節起居無時七情六欲之火時動乎中飲食勞倦之過屢傷乎體漸而至於真水枯竭陰火上炎發為蒸蒸燥熱或寒熱進退似瘧非瘧古方名曰蒸病是也雖然名證不同大抵不過咳嗽發熱咯血吐痰白濁白淫遺精盜汗或心神恍惚夢與鬼交婦人則月閉不通日漸尪羸漸成癆瘵之候其侍奉親密之人同氣連枝蒸陶日久受其惡氣多遭傳染名曰傳尸一人患瘵而後傳注數十百人甚而致於滅門者誠有之矣久癆生瘵蟲虛癆熱毒積久則生異物惡蟲食人臟腑精華變生諸般奇狀誠可驚駭勞傷肝膽者則為毛蟲如刺蝟瓦蛆之狀食人筋膜勞傷於心與小腸者則為羽蟲如燈蛾蚊虻禽鳥之形食人血脈勞傷於脾胃者則為蜾蟲如嬰兒蚯蚓之類食人肌肉勞傷於肺與大腸者則為介蟲如龜鱉蝦蟹之屬食人膚膏勞傷於腎與膀胱者則為鱗蟲如魚龍蛟鯉之形食人骨髓或挾相火之勢亦如羽蟲之酷鴟梟之類為狀不一不可勝紀凡人有此證便宜早治緩則不及事矣治之之法一則補其虛以復其真元一則殺其蟲以絶其根本能殺其蟲則雖不生亦可以絶後人之傳注耳癆瘵九蟲候癆瘵九蟲者一日伏蟲長四寸為群蟲之長二日蛔蟲長一尺貫人心則殺人三曰寸白蟲長一寸子孫生長至四五尺亦能殺人四曰肉蟲狀若爛杏令人煩滿五曰肺蟲狀如蠶令人咳嗽六曰胃蟲狀如蝦蟆令人嘔逆吐噦七曰弱蟲又名膈蟲狀如瓜瓣令人多唾八曰赤蟲狀若生肉令人腸鳴九曰蟯蟲至微細形似菜蟲居回腸多則為痔極則為癩及生癰疽癬疥痿瘑齲齒無不為也凡此諸蟲依人腸胃之間臟腑實則害人臟腑臟腑虛則蝕人臟腑血髓變成諸患至於不療人將氣絶則緣九竅膚腠飛梭而出著於怯弱之人人不能知日久遂成癆瘵之證此所謂傳尸也凡人平日保養元氣愛惜精血瘵不可得而傳惟夫縱欲多淫若不自覺精血內耗邪氣外乘是不特男子有傷女人亦不免矣然而氣虛血痿最不可入癆瘵之門弔喪問疾衣服器用中皆能乘虛而染觸間有婦人入患者之房患人見之思想則其勞氣隨入染患日久莫不化而為蟲故凡親近之人不能回避須要飲食適宜不可著餓體若虛者可服補藥身邊可帶安息香大能殺勞蟲內有麝香尤能避惡醫者不可須臾無也傳尸與尸注則一良方曰尸注者挾外鬼邪之氣流注身體令人寒熱淋瀝沉沉默默不的知所苦或腹痛脹滿喘急氣息上衝心胸旁攻兩脅或纍塊湧起或攣引腰脊或舉身沉重精神錯雜常覺昏憒每節氣更變輒至大惡積月纍年必至於死死後復注旁人乃至滅門故為尸疰觀乎傳疰之說則傳尸之易名可知也外有所謂十注者非尸疰之例也疰者注也注之為言住也今世之人惟知傷寒熱後肢節腫痛名曰傷寒留注言其邪毒未盡而留住關節發為腫毒者是也所謂十注鮮有知之夫十注者皆由陰陽失守經絡空虛而風寒暑濕飲食勞倦一切之邪氣或乍感生死之氣卒感鬼神之邪留住人身變病多端至於三十六種而方書未能顯載惟有十種之證一曰風疰皮膚掣振遊易不定一年之後頭髮墮落頸項掣痛骨拉解鳴兩目痛鼻中酸牙齒蟲蝕變為溫風汗風柔風水風火風絶風顛狂風寄風罩風等病人死三年之後神魂因作風塵著人遂成風病名曰風注風注雖有諸風之候大抵只是風證久而不退即為風注其謂人死三年神魂著人亦謬說也二曰氣注走入人機妄言百日後體皮腫起乍來乍去一年後體滿失色三年後變成惡蟲難治三曰寒注心腹懊疾嘔沫二年後大便去血吐逆青沫心疼腹滿腰脊強痛四曰生人疰心脅痛轉筋無常三日後體中痛移易牽掣沖絞心脅一年後目赤面色青黑二年後咳逆下痢變生惡蟲難治五曰涼疰心下乍熱乍寒一年一復四肢喜臥噫酸體常浮腫往來不時而皮黑羸瘦生癖目黃爪甲及唇口青黑六曰酒注體氣動熱氣從胸中上下無處不痛一年外四肢腫喜噦七曰食注心下痛懊憹徹背一年後羸瘦體腫先從腳起內變黑臍內時痛八曰水注手足腫百日體肉變發落目失明一年後難治三年身腫轉盛體肉生蟲死九曰尸注體痛牽掣七日後體肉變白咽喉吞如有物兩脅痛十曰土注人之五臟配合五行土內主於脾氣為五行五臟之主其所禁忌尤難觸犯人有居住穿鑿地土不擇不禁觸犯土氣與人血氣相感便致疾病其狀土氣流注皮膚連腑臟骨節沉重遍身虛腫自破謂之土疰滑伯仁曰患勞證者有病機之不同有形狀之不一肌膚羸瘦骨熱如蒸服藥無效針灸無功何也曰勞為虛勞是體氣虛弱房勞過傷氣血虛耗諸病蜂生致使陰陽失序寒熱自生陽虛生寒陰虛生熱久虛久熱變為骨蒸久嗽成勞久癆成疰疰有二十四種三十六種九十九種之類種種不同內有勞疰尸疰鬼疰食疰蟲疰毒疰此六者為傳尸之勞甚而致於滅門絶戶神醫莫之能療也患此者當圖治於微病之初莫治於已病之後若正氣既衰邪氣獨盛故醫藥無功也可不慎哉癆極蘇遊論癆瘵至於傳尸之候其證心胸滿悶背膊煩痛兩目不明四肢無力雖欲寢臥睡常不寐脊膂急痛腰膝痠疼多臥少睡起狀如佯病每至早旦精神尚存有如無病日午之後四肢微熱面無顏色或兩頰飛紅喜見人常懷忿怒才不稱意印多嗔恚行立腳軟夜臥盜汗夢與鬼交或見先亡或多驚怖有時氣息有時喘嗽雖思飲食不能多食死在須臾精神尚好或時微利兩脅虛脹口燥鼻乾常多黏唾有時唇赤漸就沉羸猶如涸魚不覺死也又云傳尸之候本起無端莫問老少男女皆有此疾大抵五行相剋而成先內傳毒氣周遍五臟漸至羸瘦而死死後又傳親身一人故曰傳尸亦名傳疰又名殗殜以其初傳半臥半起之候也氣息嗽者名曰肺痿疾肌熱透骨名曰骨蒸內傳五臟名曰伏連不解治療乃至滅戶男女虛弱得之名曰勞極吳楚名曰淋瀝巴蜀亦名勞其源先從腎起初受之氣兩脛痠痛腰背拘急行立腳軟飲食減少兩耳風聲夜夢遺泄盜汗陰痿腎既受訖次傳於心心初受氣夜臥心驚或多恐悸心懸之氣吸吸欲盡夢見亡人亦多盜汗飲食無味口內生瘡心氣煩熱惟欲眠臥朝輕夕重兩頰口唇悉皆紅赤有時手足五心煩熱心受已次傳於肺肺初受病咳嗽氣力微痛有時喘氣臥即更甚鼻口乾燥不聞香臭或喉間腥氣焦氣嘔吐噁心肌膚枯燥或似蟲行皮膚細起狀若麩片肺既受已次傳於肝肝初受病兩目胱胱面無血色尚欲顰眉眼視不遠目常乾澀有時赤痛或復睛黃朝昏懵暮常欲閣眼睡臥不寐肝既受已次傳於脾脾初受病兩脅虛脹食不消化又時瀉利水穀生蟲有時腹痛雷鳴唇口焦乾或生瘡腫毛髮乾聳不潤或時上氣撐肩喘息痢下赤黑汁見者不可治癆瘵諸候患人憎寒壯熱自汗面白目干口苦精神不守恐畏不能獨臥其傳在肝患人寒熱面黑鼻燥忽忽喜忘大便難或清瀉口瘡其傳在心患人憎寒壯熱面青唇黃舌強不語飲食無味四肢羸瘦口吐涎沫其傳在脾患人增寒發熱面赤鼻乾口燥毛折咯嗽喘急時吐白沫或有血絲其傳在肺患人寒熱面黃耳輪焦枯䯒骨損痛小便血濁遺尿其傳在腎脈候巢氏病源曰男子平人脈大為勞極虛亦為勞男子勞之為病其脈浮大手足煩春夏劇秋冬瘥陰寒精自出寸口脈浮而遲浮則為虛遲則為勞虛則衛氣不足勞則榮氣竭脈直上者浮逆虛也脈澀無陽是腎氣少寸關澀無血氣逆冷是大虛脈浮微緩皆為虛緩而大者勞也脈微濡相搏為五勞微弱相搏虛損為七傷脈動而暫止因不能通而復動是脈結也虛勞血氣虛少脈雖乘氣而動血氣虛則不能連屬故脈為之結也豫每診得結脈惟妊婦無妨及見平人痰火之人得之近則半年一年而已遠則三年無不死者若是結脈而又乍疏乍數必速死也虛勞病左手脈細右手浮大徑急而不退者為正氣虛邪氣盛主必死也久勞人脈細而數亦主死而難治脈經曰男子平人脈虛弱微細者喜盜汗出也男子面赤薄白主渴及亡血卒喘心悸其脈浮者裡虛也脈虛沉弦無寒熱短氣裡急小便不利面色白時時目瞑此人喜衄小腹滿此為勞使之然男子脈微弱而澀為無子精氣清冷也失精家小腹強急陰虛頭寒目眶痛一云目眩發落脈極虛芤遲為消穀亡血失精脈得諸芤動微緊男子失精女人夢鬼交通脈沉小遲者名脫氣其人疾行則喘喝手足逆寒腹滿甚則溏泄食不消化脈弦而大按之中空外急此名為革婦人則半産漏下男子則亡血失精治法癆疾須內外交治可獲全功王節齊云人若色欲過度傷損精血必生陰虛火動之病睡中盜汗午後發熱哈哈咳嗽倦怠無力飲食少進甚則痰涎泄血咯唾出血或咳血吐血衄血身熱脈沉數肌肉消瘦此名癆瘵是重難治輕者用藥數十服重者期以歲年然必須病人惜命堅心定志絶房室息妄想戒惱怒節飲食以自培其根此謂內外交治可獲全功十藥神書云夫人之生也稟天地氤氳之氣在乎保養真元固守根本則萬病不生四體康健若曰不養真元不固根本疾病由是生焉且真元根本則氣血津液也葛先生曰萬病莫若癆證最為難治蓋癆之起因人之壯年氣血充聚精液充滿之際不能保養性命惟以酒色是貪日夜耽嗜無有休息以致耗散真元虛敗精液則嘔血吐痰以致骨蒸體熱腎虛精竭面白頰紅口燥咽乾遺精白濁盜汗飲食艱難氣力全無謂之火旺金衰重則半年而斃輕則一載而亡醫者不窮其本或投之以大寒之劑或療之以大熱之藥殊不知大寒則愈虛其中大熱則愈竭其內所以世之治癆者萬無一人葛師用藥治癆如羿之射無不中的十藥次弟之法具後學者詳審之毋惑焉久癆瘵者不能服參耆為不受補肉脫而脈數者必死癆嗽人聲音啞者主死凡癆病者一邊不能睡亦死久癆之人大便泄者死丹溪治義丹溪云虛勞漸瘦屬火陰火銷爍即是積熱而成始可用子和法虛弱者四物湯加炒柏知母童便薑汁竹瀝虛甚者加參朮又云其證臟中有蟲齧心肺名曰瘵疾傳尸癆瘵寒熱交攻久嗽咯血日見羸瘦先與三拗湯與蓮心散煎萬一不失三拗湯蓮心散似難為癆瘵要藥特治其初而淺者可矣若羸備者葛氏十方其庶幾乎氣血虛甚發熱成癆者補天丸加骨蒸藥佐之黃柏知母地骨皮麥門冬秦艽青蒿鱉甲石膏竹葉烏梅之類是也勞極之證五臟必歸重於一經假如足脛痠疼腰背拘急遺精白濁面色黧黑耳輪焦枯脈沉細知其邪在腎也宜以四物湯加知母黃柏五味子麥門冬天門冬澤瀉杜仲肉桂之類煎入童便韭汁竹瀝服之心神驚惕怔忡無時盜汗自汗心煩熱悶口舌生瘡咯血面赤脈洪而數知其邪在心也宜以前方去杜仲澤瀉肉桂之類加茯神胡黃連蓮心遠志菖蒲硃砂之類咳嗽喘促衄血嗽血皮膚枯燥鼻塞聲重時吐痰沫脈微虛而澀數知其邪在肺也以四物湯加沙參麥門冬五味子知母貝母桔梗桑白皮地骨皮冬花紫菀馬兜鈴百合百部之類煎入童便竹瀝薑汁韭汁服之脅痛目赤面青頰赤多怒虛陽不斂夢與鬼交甚則卵縮筋急脈弦而數知其邪在肝也宜以四物湯加竹茹草龍膽柴胡黃芩竹葉青皮之類面色痿黃唇吻焦燥飲食無味腹痛腸鳴瀉痢四肢倦怠脈虛濡而數知其邪在脾也宜以四君子湯加酒炒白芍藥蓮肉薏苡仁白扁豆乾山藥豬苓澤瀉之類骨蒸癆瘵元氣未脫者灸崔氏四花六穴無有不安者也穴法詳見針灸直指經穴發明卷藥方癆瘵通用諸方撥萃地骨皮散治骨蒸壯熱肌肉消瘦困倦夜多盜汗地骨皮秦艽柴胡知母當歸枳殼炒鱉甲酷炙黃上咀等分每服五錢水一盞桃柳枝頭各七個姜三片烏梅一個煎去渣臨臥服經驗清骨散治男子婦人五心煩熱欲成癆瘵生地黃一錢人參五分防風五分北柴一錢薄荷葉秦艽赤茯苓熟地黃各五分胡黃連三分上咀水盞半煎八分溫服患骨熱者先服荊蓬煎丸一服使臟腑微利然後服此荊蓬丸方見積聚門良方麥門冬湯治心中煩熱惟欲露體覆之即悶驚悸心忪面無顏色忘前失後婦人患血風氣者多成此疾乃心蒸之狀麥門冬茯神防風地骨皮各八分人參遠志龍齒羚羊角屑炙甘草石膏石英各三分上咀水盞半棗二枚煎七分去渣溫服未瘥再服以瘥為度其益心力胃經吐血者服之尤佳若畏藥者去紫石英黃耆益損湯治男子婦人童男室女諸虛不足榮衛虛弱五勞七傷骨蒸潮熱腰背拘急百節痠痛夜多盜汗心常驚惕咽燥唇焦少力嗜臥肌膚瘦瘁咳嗽多痰咯吐血絲寒熱往來頰赤神昏全不思食服熱藥則煩躁沖滿上焦服寒藥則膈滿而腹痛及治大病後榮衛不調及婦人産後血氣未足宜服此藥黃耆人參石斛木香白朮當歸肉桂茯苓芍藥川芎熟地黃山藥丹皮麥門冬五味子甘草各等分上咀每服五錢水盞半姜五片棗二枚小麥五十粒烏梅一個煎七分食前服宣明白朮黃耆散治五心煩熱自汗四肢痿弱飲食減少肌瘦昏昧並皆治之白朮黃耆當歸芍藥人參黃芩各五分石膏甘草各一錢川芎寒水石各六分茯苓五分官桂三分上水二盞煎八分食前一日三服宣明當歸地黃湯治咳衄血大小便血或婦人經候不調月水過多咳嗽者當歸川芎生地黃黃芩芍藥各五分染槐子黃藥子甘草各四分白朮白茯苓龍骨各六分上水一盞煎七分食前溫服局方黃耆鱉甲散治虛勞客熱肌肉消瘦四肢煩熱心悸盜汗食少多渴咳嗽有血黃耆蜜炙鱉甲醋浸炙去裙知母桑白皮紫菀桔梗甘草炙各五分地骨皮秦艽柴胡生地黃赤芍藥各七分天門冬白茯苓各八分人參肉桂各四分上水盞半煎八分食後溫服局方秦艽鱉甲散治血氣勞傷四肢倦怠面黃肌瘦骨節煩疼潮熱盜汗咳嗽吐痰山嵐瘴氣並皆治之秦艽鱉甲制荊芥前胡柴胡貝母白芷天仙藤陳皮青皮甘草炙各五分葛根一錢肉桂羌活各二分上水盞半姜三片煎八分熱服局方秦艽扶羸湯治肺痿骨蒸已成勞嗽或寒或熱聲嘎不出體虛自汗四肢怠情秦艽柴胡人參鱉甲制當歸柴菀茸地骨皮甘草各五分上水盞半姜五片大棗烏梅各一枚煎八分食後溫服濟生鱉甲地黃湯治虛勞手足煩熱心下怔忡身體羸瘦鱉甲醋炙熟地黃酒洗柴胡當歸石斛秦艽茯苓麥門冬白朮各一錢人參肉桂炙甘草各六分上水兩盞姜五片烏梅一個煎八分不拘時服濟生黃耆飲子治諸虛癆瘵四肢勞倦潮熱乏力日漸黃瘦胸膈痞塞咳嗽痰多甚則吐血陰虛陽脫者服之黃耆當歸紫菀茸地骨皮人參石斛半夏桑白皮款冬花各五分附子鹿茸酒蒸炙甘草各三分上水盞半姜七片棗一枚煎八分服唾血加阿膠蒲黃各五分衛氣枯燥有熱者減去附子鹿茸旋神飲子治癆瘵憎寒壯熱口乾咽燥自汗煩郁咳嗽聲重唾中血絲瘦劇倦乏人參當歸白芍藥茯神白朮黃耆半夏曲蓮肉桔梗麥門冬熟地黃五味子白茯苓灸甘草各五分上水二盞紅棗一枚烏梅一個煎八分食後服如嗽加阿膠虛極胸滿木香濕紙包炮加沉香亦可如不思食加扁豆直指參耆散治癆瘵喘嗽咯血聲焦潮熱盜汗人參黃耆川芎當歸白茯苓柴胡桔梗貝母杏仁五味子桑白皮紫菀茸阿膠枳殼甘草秦艽防風羌活款冬花鱉甲醋炙各等分上咀每服八錢水二盞姜三片棗一枚煎八分食後服良方潤神散治癆瘵憎寒壯熱口乾咽燥自汗疲劇煩躁人參黃耆麥門冬淡竹葉桔梗炙甘草各等分上為末每服五錢水一盞煎七分不拘時服如自汗入麥同煎服良方薤白散治久患咳嗽肺虛成癆瘵及吐血咯血等證鱉甲醋炙阿膠炒各一兩鹿角霜三錢三分甘草五錢上為末每服三錢水一盞薤白一莖長二寸煎八分食後服先嚼薤次服藥一日三服良方阿膠丸治勞嗽並嗽血唾血阿膠蛤粉炒生地黃卷柏葉雞蘇葉大薊山藥五味子各一兩柏子仁炒另研麥門冬人參防風各半兩上為細末煉蜜丸彈子大每服一丸細嚼濃煎小麥湯或麥門冬湯送下濟生方中有遠志百部茯苓良方青蒿散治虛勞骨蒸咳嗽聲嘎皮毛乾枯四肢倦怠夜多盜汗時作潮熱飲食減少日漸瘦弱青蒿秦艽香附子炒桔梗天仙藤鱉甲醋炙前胡各一兩烏藥半兩川芎二錢半甘草炙一兩半上為末每服三錢水一盞姜三片棗一枚煎六分食後服局方樂令建中湯治臟腑虛損身體瘦弱潮熱自汗將成癆瘵此藥大能退虛熱生氣血前胡細辛當歸白芍藥人參橘紅桂心麥門冬黃耆蜜炙茯苓甘草炙各八分半夏制五分上作一服水二盞姜五片棗一枚煎八分不枸時服劫癆散治心腎俱虛勞嗽時復三四聲潮熱後即盜汗四肢倦怠體瘦惚惚異夢嗽中有血名曰肺痿白芍藥二錢黃耆蜜炙人參白茯苓熟地黃酒洗當歸半夏曲五味子阿膠蛤粉炒甘草炙各一錢上水二盞姜三片棗一枚煎八分食後服良方再生丹治一切癆證黃瘦虛損諸藥不能治者此藥大效大茴香鹽炒小茴香炒木通穿山甲二錢半全蠍微炒通草各一兩沉香八錢半木香檳榔燈草各五錢紅花二錢半上為細末甘草膏和丸梧桐子大每服四十丸空心溫酒送下食乾物壓之生犀散治骨蒸肌瘦頰赤口乾日晚潮熱夜出盜汗五心煩躁及大病瘥後餘毒不解犀角地骨皮秦艽麥門冬柴胡枳殼炒茯苓赤芍藥桑白皮黃耆蜜炙人參鱉甲醋炙知母大黃等分上咀每服二錢入陳青蒿一根煎或桃枝亦可同煎至八分及治小兒疳病熱似骨蒸者或久病後時作潮熱並瘧疾有痰加半夏熱輕者去大黃加黃芩紫菀湯治傳尸骨蒸復連殗殜肺氣咳嗽紫菀桑白皮桔梗生地黃續斷各一錢五味子甘草炙赤小豆上水盞半竹茹一丸彈子大同煎一盞食後溫服良久再服若熱甚加麥門冬石膏各一錢天門冬散治骨蒸心肺煩熱氣息喘促唾不出唇漸加羸瘦天門冬一錢赤茯苓桔梗柴胡百合白前川麻前胡黃芩杏仁制甘草炙各五分桑白皮一錢上咀水盞半姜一片煎七分食後溫服天門冬丸治氣癆咳嗽喘促下焦虛損上焦煩熱四肢無力身羸體弱天門冬麥門冬