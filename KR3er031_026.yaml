body:
  text: 卷之二十六郁證門病機郁證敘論內經曰木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之然調其氣過者折之以其畏也啟玄子曰木鬱達之謂吐之令其條達火鬱發之謂汗之令其疏散土鬱奪之謂下之令無壅礙金鬱泄之謂滲泄解表利小便也水鬱折之謂抑之制其沖逆也滑氏曰木性本條達火性本發揚土性本沖和金性本肅清水性本流通五者一有所郁斯失其性矣達發奪泄折將以治其鬱而遂其性也王安道曰凡病之起多由於郁郁者滯而不通之義或因所乘而為郁或不因所乘本氣自病郁者皆郁也豈惟五運之變能使然哉郁既非五運之變可拘則達之發之奪之泄之折之之法固可擴而充之矣可擴而充其應變不窮之理也歟且夫達者通暢也如肝性急怒氣逆胠脅或脹火時上炎治以苦寒辛散而不愈者則用升發之藥加以厥陰報使而從治之又如久風入中為飧泄及不因外風之入而清氣在下為飧泄則以輕揚之劑舉而散之凡此之類皆達之之法也王氏以吐訓達不能使人無疑以其肺金盛而抑制肝木歟則瀉肝氣舉肝氣可矣不必吐也以為脾胃濁氣下流而少陽清氣不升歟則益胃升陽可矣不必吐也雖然木鬱固有吐之之理今以吐字總該達字則凡木鬱皆當用吐矣其可乎哉至於東垣所謂食塞肺分為金與土旺於上而剋木夫金之剋木五行之常道固不待夫物傷而後能也且為物所傷豈有反旺之理若曰吐去其物以伸木氣乃是反思木鬱而施治非為食傷而施治矣夫食塞胸中而用吐正內經所謂其高者因而越之之義耳不勞引木鬱之說以及之也四郁皆然諸病有郁治之可開戴氏曰郁者結聚不得發越也當升不升當降不降當變化不得變化故傳化失常而鬱病作矣大抵諸病多有兼郁者或郁久而生病或病久而生郁或藥雜亂而成郁故凡病必參郁治郁證大率有六丹溪曰氣血沖和百病不生一有郁怫諸病生焉郁證大率有六曰氣鬱胸脅疼痛脈沉而澀曰濕鬱周身走痛或關節疼痛遇陰而發肺沉而細曰熱鬱瞀悶煩心尿赤脈沉而數曰痰鬱動則喘息脈沉滑曰血鬱四肢無力能食便血脈沉而芤曰食鬱噯酸腹飽不喜飲食左手脈平右手脈緊或七情之邪郁或寒熱之交侵故為九氣怫鬱之候或兩濕之侵凌或酒漿之積聚故為留飲濕鬱之疾又如熱鬱而成痰痰鬱而成癖血鬱而成癥食鬱而成痞滿此必然之理也脈候郁脈多沉伏或結或促或代診家樞要云氣血食積痰飲一有留滯於其間脈必因之而止節矣但當求其有神何害之有夫所謂有神者即經所謂有胃氣也治法經治五郁帝曰郁之甚者治之奈何岐伯曰然調其氣過者折之以其畏也所謂瀉之滑氏云調氣過折以其畏此治郁之法也謂欲調其氣當即其過者而折之以其所畏蓋以郁之為郁也或內或外或在氣或在血必各有因治之之法或汗或下或吐或利各當求其所因而折之夫如是郁豈有不畏乎故下總之曰所謂瀉之之義可見矣不必執以達之為吐發之為汗云也王安道曰如水鬱折之折者制御也伐而銼之也漸殺其盛也如腫脹之病水氣淫溢而滲道以塞夫水之所不能勝者土也今胃氣衰弱不能制之故反受其侮治當實其脾土資其運化俾可以制水而不敢犯則滲道達而後愈或病勢既旺非上法所能遽制則用瀉水之劑伐而銼之或去菀陳莝開鬼門潔淨府三治備舉迭用以漸平之王氏所謂抑之制其沖逆正欲折銼其泛溢之勢也夫實土者守也泄水者攻也兼三治者廣略而決勝也守也攻也廣略也雖俱為治水之法然不審病之虛實久近淺深雜焉而妄施其不傾踣者鮮矣夫五郁之病故有法以治之然邪氣久客正氣必損今邪氣雖去正氣豈能遽乎哉苟不平調正氣使各安其位復其常於治郁之餘則猶未足以盡治法之妙故又曰然調其氣苟調之而其氣猶未服而或過則當益其所不勝以制之如木過者當益金金能制木則木斯服矣所不勝者所畏者也故曰過者折之以其畏也夫制物者物之所欲也制於物者物之所不欲也順其欲則喜逆其欲則惡今逆之以所惡故曰所謂瀉之久病者當兼解鬱諸病久則氣滯血凝而成鬱結治之雖各因其證當兼之以解散固不可不知也鬱滯一開則氣血通暢而諸病各自以其方而易愈也今之病久每每用本病之藥而不奏效者皆其鬱之之故也醫者殊不悟此治之弗效妄變他方愈變愈訛而病劇矣此郁之為治也亦不容以少緩當為醫者之熟知也郁為七情之病故病郁者十有八九何氏曰郁為七情不舒遂成鬱結既郁之久變病多端男子得之或變為虛怯或變嗝噎氣滿腹脹等證婦女得之或為不月或為墮胎崩帶虛勞等證治法必能內養然後郁開按證調理心郁者神氣昏昧心胸微悶主事健忘者是也治心郁者當加黃連菖蒲香連丸之類肝鬱者兩脅微膨或時刺痛噯氣連連有聲者是也治肝鬱者宜用青皮川芎吳茱萸左金丸之屬脾郁者中脘微滿生涎少食倦怠嗜臥四肢無力者是也治脾郁宜用蒼朮半夏砂仁神麯陳皮越鞠丸之屬肺郁者毛皮枯澀燥而不潤欲嗽而無痰者是也治肺郁者桔梗栝蔞杏仁之類腎郁者小腹微硬腰腿重脹精髓虧少淋濁時作不能久立者是也治腎郁者宜用蒼朮茯苓肉桂小茴香青娥丸之類膽郁者口苦身微潮熱往來惕惕然人將捕之是也治膽郁者宜用竹茹生薑溫膽湯之類大抵七情六淫五臟六腑氣血痰濕飲食寒熱無往而不郁也治之宜各求其屬而施之則無不愈者藥方氣鬱用木香青皮香附為君撫芎橘葉為臣檳榔厚朴為佐使血鬱用桃仁牡丹皮索為佐使痰鬱用海石栝蔞為君南星貝母為臣香附陳皮玄明粉為佐使食鬱用神麯砂仁麥芽為君山楂香附為臣陳皮半夏為使生薑甘草為佐濕鬱用蒼朮茯苓為君羌活川芎為臣茵陳豬苓為佐使熱鬱用黃連山梔為君青黛條芩為臣甘草乾葛為佐使諸郁藥春加防風紫蘇夏加苦參黃連秋冬加吳茱萸凡郁在中焦以蒼朮撫芎開提其氣以升之假令食在氣上氣升則食降余仿此婦女諸郁須以川芎香附子蒼朮撫芎香附子總解諸郁香附子氣溫味辛苦能橫行胸臆故能解諸郁必用童便浸焙乾用否則燥撫芎即䕷蕪芎藭苗頭小個是也其氣味辛行榮而上走故能散郁蒼朮善能走散佐以防風藁本能上行佐以香附牛膝能下行故能散郁丹溪六郁湯能解諸郁陳皮去白一錢半夏炮蒼朮撫芎各一錢赤茯苓梔子炒各七分香附子一錢炙甘草五分砂仁研五分上水二盞姜三片煎一盞溫服氣鬱加青皮木香檳榔紫蘇乾薑倍香附砂仁濕鬱加蒼朮白朮熱鬱加黃芩倍梔子痰鬱加南星枳殼小皂莢血鬱加桃仁紅花牡丹皮食鬱加山楂神麯麥芽茭山五郁湯解諸郁香附君川芎青皮臣梔子神麯佐甘草使水盞半姜三片煎八分食遠服對證加藥法如六郁湯丹溪越鞠丸解諸郁神麯炒香附制蒼朮浸芎藭山梔炒各等分上為細末水丸綠豆大每服五七丸溫水下東垣火鬱湯治五心發熱屬火鬱方見火門升陽散火湯治熱鬱方見火門丹溪升麻二陳湯治痰鬱火邪在下焦大小二便不利此藥能使大便潤而小便長陳皮去白撫芎茯苓各一錢半夏一錢半升麻防風甘草柴胡各五分水盞半姜三片煎一盞溫服心統香連丸治久郁心胸不快痞塞煩痛川黃連姜炒香附子制各四兩上為末神麯糊為丸梧桐子大每服五七十丸白湯下集成芍藥香附丸治久病陰虛氣鬱內熱夜甚芍藥炒香附子制各一兩蒼朮五錢片芩三錢甘草二錢上為末蒸餅丸服集成潤喉散治氣鬱夜熱咽乾哽塞桔梗川芎香附子各三錢紫河車四錢百藥煎七錢半甘草三錢上為細末舐服蒼莎丸治氣鬱蒼朮香附子各四兩黃芩一兩木香五錢上為末蒸餅丸薑湯下局方本香檳榔丸治氣鬱食鬱胸膈痞滿大便結滯方見積聚門丹溪加味二陳湯治食鬱痰滯胸膈不快蒼朮米泔浸白朮炒陳皮去白半夏泡茯苓川芎香附子各八分枳殼黃連姜炒甘草各五分水盞半煎八分食前稍熱服左金丸治火鬱方見積門青娥丸治腎郁腰腿足膝無力膀胱不利方見虛損門中渴膽湯治膽郁口苦驚悸健忘不寐方見驚悸門中香連丸治火鬱氣逆腹痛吞酸方見痢門丹溪生韭飲治食鬱久則胃脘有瘀血作痛大能開提氣血生韭搗自然汁一盞溫加酒一二杯同服上先以桃仁速皮細嚼數十枚後以韭汁送下羌活勝濕湯治濕鬱肩背強腰如折方見濕門醫案一男子年三十房後騎馬渡溪遇深淵沉沒復起混衣坐馬行十五里抵家次日憎寒壯熱肢節痠痛如瘧狀醫作虛以補中氣治又作勞治以四物湯加黃柏知母服之反加滿悶不食召予診六脈皆洪緩重按若牢右手為甚作濕鬱處治用平胃散加蒼朮白朮半夏茯苓川芎香附砂仁防風羌活加姜煎服三帖諸病皆減後以茯苓滲濕湯倍加白朮服二十帖全安一室女因忤意鬱結在脾半年不食但日食熟菱棗數枚遇喜亦食饅頭彈子大深惡粥飯此為脾郁非枳實不能散治溫膽湯去竹茹與之數十劑而安一女許婚後夫出二年不歸因不食困臥如癡無他病多向床里坐臥此思想氣結也藥難獨治得喜可解不然令其怒使其木氣升發而脾氣自開木能制土故也俾激之大怒而哭良久令解之與藥一劑遂思食予曰病雖愈得喜方已乃設曰夫回病果不復作一少婦因逆意不食膈滿累月憊甚巳午間發熱面赤酉間退熱小便數而點滴脈沉澀而短經水按月惟數滴而已予曰此氣鬱血虛中宮卻因食滯生痰遂用補瀉兼治參朮為君陳皮茯苓紅花為佐使濃煎食前服少頃藥行吃粥半盞少頃與神祐丸減輕粉牽牛細丸津下十五丸晝夜二藥各進四服食進熱退七日愈
