溫服無時大效一方治熱嗽以紫花梨搗汁服亦止消渴一方治久氣嗽生訶黎一枚噙咽瘥後口無味服檳榔湯一盞知味灸法肺俞在背脊第三椎下兩傍各開寸半是穴灸七壯俞府在距骨下去璇璣傍各二寸陷中仰而取之灸七壯列缺在腕側上半以手交叉頭指末兩筋骨縫中是穴天突穴在胸橫骨上端近咽喉脘中灸七壯愈風門在背上第三椎骨下各開一寸半是穴灸七壯乳根在乳下一寸六分灸三壯立止導引法先以鼻內氣乃閉口咳還復以鼻內氣嗽則愈向晨去枕正偃臥伸臂脛瞑目閉口無息極脹腹兩足再頃間吸腹仰兩足倍拳欲自微息定復為之春三夏五秋七冬十蕩滌五臟津潤六腑又云還向反望倒望不息七通治咳逆胸寒滿熱喘證門病機敘論經曰諸逆衝上皆屬於火又曰諸病喘滿皆屬於熱又曰諸嗽喘嘔皆屬於上又曰諸氣膹郁皆屬肺金痹論曰肺痹者煩滿喘而嘔又曰淫氣喘息痹聚在肺又曰腸痹者數飲而出不得中氣喘爭大奇篇曰肺之壅喘而兩胠滿至真要大論篇曰太陰司天客勝則首面胕腫呼吸氣喘陽明篇曰邪入六腑則身熱不得臥上為喘呼原病式火氣盛為夏熱衰為冬寒故寒病則氣衰而息微病熱則氣甚而息粗又寒為陰主乎遲緩熱火為陽主乎急數故寒則息遲氣微熱則息數氣粗而為喘也運氣為喘經曰歲金太過病甚則咳喘氣逆肩背痛又云金太過曰堅成之紀其病喘喝胸憑仰息治以溫劑是也歲火太過炎暑流行肺金受邪民病少氣喘咳上臨少陰少陽咳喘息鳴又云少陰司天熱淫所勝民病寒熱喘咳甚則腹大肺脹滿而喘嗽又云少陰在泉熱淫所勝民病氣上衝胸喘不能久立治以鹹寒是也喘急與短氣不同喘急者為邪所幹或因內外所傷而作喘急之聲有痰壅喉間聲如拽鋸或如水雞之響者此邪氣實也短氣者似喘而非喘為氣少氣短不能以續俗謂喘促氣急而短或有氣從臍下直衝清道而上實非有氣上衝者是正氣虛也其二者之狀小可相似而所以施治大不同也醫者可不辨其微哉正氣當作宗氣看機要一云喘者促促氣急喝喝氣息數張口抬肩搖身擷肚短氣者呼吸雖難接續似喘而不搖肩似呻吟而不痛楚呼吸雖急而無痰聲逆氣者但氣上而奔急肺壅而不下喘為痰氣所郁丹溪曰喘急者氣為火所鬱而為痰在肺胃間也有痰者有火炎者有陰虛自小腹下起而上逆者有氣虛而致氣短者有水氣乘肺者有肺虛挾寒而喘者有肺實挾熱而喘者有驚憂氣鬱肺脹而喘者有胃絡不和而喘者有腎氣虛損而喘者雖然未有不由痰火而鬱風寒外束而致之者也喘脹之病須分肺脾標本工節齊云喘與脹兩證相因必皆小便不利喘則必生脹脹則必生喘但要識得標本先後先喘而後脹者主於肺先脹而後喘者主於脾何則肺金主降外主皮毛經曰肺朝百脈通調水遂下輸膀胱又曰膀胱者州都之官津液藏焉氣化則能出矣是小便之行由於肺氣之降下而輸化也若肺受邪而上喘則失降下之令故小便漸短以致水溢皮膚而生腫滿此則喘為本而腫為標故當清金降氣為主而行水次之脾土惡濕外主肌肉土能剋水若脾土受傷而不能制水則水濕妄行浸漬肌肉水既上溢則邪反侵肺氣不得降而主喘矣此則脹為本而喘為標治當實水為主而清金次之苟肺病而用燥脾之藥則金得燥而愈喘脾病而用清金之藥則脾得寒而愈脹矣近世治喘脹者但知實脾行水而不知分別肺脾兩證故發明之審狀別證此謂知本戴氏曰痰者凡喘便有痰聲火炎者乍進乍退得食則減食已則喘大概胃中有實火膈上有稠痰得食墜下稠痰喘則少止稍久食已入胃反助其火痰再上升喘反大作俗不知此作胃虛治以燥熱之藥以火濟火也一人患此諸醫作胃虛治之不愈後以導水丸利之而愈此水氣乘肺也若氣短喘急者呼吸急促而無痰聲有胃虛喘者抬肩擷肚喘而不休是也肺主清陽上升之氣居五臟之上而為華蓋喜清虛而不欲窒礙若調攝得宜陰陽升降往來無滯何病之有若內傷七情外感六氣則肺氣不清而喘作矣必須審狀別證各求其本而治之斯效速也病後喘者危凡喘作於大病之後者多危殆上喘咳而下瀉泄者亦然婦人産後因亡血過多榮氣暴竭衛氣無依獨聚於肺故發喘也此名孤陽絶陰為難治身汗如油汗出發潤喘不休者死直視譫語而喘者死脈候喘病脈宜浮遲不宜急疾右寸脈沉實而喘者為氣實左脈大為腎虛右寸脈沉實而緊為肺感寒邪亦有六部俱伏宜發散之則熱退而喘定上氣躁而喘脈浮肺脹欲作風水發汗則愈上氣喘息脈滑手足溫者生脈澀而數四肢寒者死喘逆上氣脈數有熱不得臥者難治上氣面浮肩息脈浮大危寸口脈沉胸中氣短治法治喘須審攻補先後之宜凡喘暴作必須發散攻邪為先喘定之後方可補養久病喘咳未發之前當扶正氣為主已發之時當以攻邪為先若補其既發則喘愈甚此治喘攻補先後之敘不可瘥也喘證作時無痰喘愈後卻吐痰者乃痰於已發之時閉塞不出而為喘治者於發時開其痰路則易安也宜用簡要桔梗湯及枳殼前胡杏仁紫蘇栝蔞實等藥引出其痰俟痰出喘退卻調其虛實虛者補以參耆歸術實者瀉以沉香滾痰丸之類是也治喘嗽遇冷則發凡喘嗽遇天寒則發內外皆寒脈沉而遲者治法以東垣參蘇溫肺湯調中補氣加茱萸湯及丹溪紫金丹以劫去其寒痰者是也有內熱而外逢寒則發脈沉數者謂之寒包熱治法以仲景越婢加半夏湯發表諸方之類及預於八九月間未寒之時用大承氣湯先下其熱至冬寒時無熱可作喘自不發者是也治喘有不宜下證綱目云凡喘而臥不得其脈浮按之虛而澀者為陰虛去死不遠慎勿下之下之必死宜四物湯加童便竹瀝青黛麥門冬五味子枳殼蘇葉服之凡下痰定喘諸方施之形實有痰者神效若陰虛而脈浮大按之澀者不可下下之必反劇而死也治喘條例大概氣喘急甚者不可驟用苦寒藥火氣盛故也諸喘曾用正治攻補之法不止者卻用劫藥一二服則止如椒目沉水者研極細末用一二錢生薑湯調下止之或青金丹用蘿蔔子皂角尖等分姜蜜為丸每服七八十丸噙下止之亦效劫止之後因痰治痰因火治火治哮喘專主於痰宜先用吐法不可驟用涼藥必兼發散凡哮喘者必須薄滋味未發以扶正氣為要已發以攻邪氣為主老弱人久病氣虛而發喘者宜阿膠人參五味子補之少壯新病氣實而喘者宜桑白皮苦葶藶瀉之實人用黃耆過多而喘者三拗湯以瀉之有喘急而痰色清冷者屬風痰用千緡湯之類有陰虛自小腹下火起炎上而喘者當補陰降火凡喘氣虛短氣而促不能相續者宜參耆補之氣虛喘嘔未可服補中者只用調中益氣湯絶妙喘嗽傷肺者須用阿膠元氣虛喘而氣短者宜生脈散喘而不得臥臥則喘心下有水氣上乘於肺肺得水而浮使氣不得通流宜神祕湯食積壅滯氣喘用半夏栝蔞山楂神麯栝蔞穰為丸竹瀝薑湯下藥方發散風寒定喘諸劑五拗湯三拗湯華蓋散杏蘇飲寧肺湯上方並見咳嗽門皆可選用和劑五虎湯治風寒所感喘急痰氣麻黃七分杏仁去皮尖一錢甘草四分細茶八分石膏錢半上水盞半姜三片棗一枚煎服三因神祕湯治上氣喘急不得臥者陳皮桔梗紫蘇各錢半人參一錢五味子十五粒上水盞半煎七分食遠服易簡蘇陳九寶湯治老人小兒素有喘急遇寒暄不常發則連綿不已咳嗽哮吼夜不得臥桑白皮陳皮大腹皮紫蘇杏仁薄荷甘草麻黃官桂各八分上水盞半姜三片烏梅一個煎七分服直指神祕湯治水氣作喘陳皮桔梗紫蘇人參五味子桑白皮半夏檳榔甘草炙五分上水二盞姜三片煎八分食後服和劑人參定喘湯治肺氣上喘哮中有聲坐臥不安胸膈緊痛及治肺感寒邪咳嗽聲重人參麻黃阿膠半夏曲五味子罌粟殼甘草各八分桑白皮錢半上水二盞姜三片煎八分食後服治諸氣逆喘急之劑和劑蘇子降氣湯治虛陽上攻喘嗽不已方見嗽門三因葶藶大棗瀉肺湯治上氣喘急身與面目俱浮鼻塞聲重不聞香臭胸膈脹滿將成肺癰葶藶研細彈大一丸大棗十枚去核水二盞先煎大棗至一盞去棗入葶藶煎八分食後服法令先服小青龍二服方進此直指調降湯治喘嗽枳殼一錢半夏桔梗青皮陳皮檳榔茯苓紫蘇子葶藶隔紙炒各五分砂仁白豆蔻紫蘇葉甘草炙三分上水盞半姜三片煎七分不拘時服選要沉香散定喘止嗽沉香阿膠人參紫蘇陳皮各二錢桑白皮微炒一兩氣虛人減半甘草炙二錢半上為細末每服二錢食後棗湯送下濟生四磨湯治七情鬱結上氣喘急沉香檳榔人參天台烏藥上各濃磨水共取七分盞煎三五沸不拘時服一方無人參有枳殼亦妙集成參朮調中湯瀉熱補氣定喘止嗽人參白朮各五分桑白皮甘草炙各三分麥門冬陳皮青皮地骨皮白茯苓各一錢五味子二十粒上水二盞煎八分食後服醫鈔人參白朮湯人參白朮天門冬麥門冬各一錢五味子二十粒半夏阿膠炒各八分甘草炙五分上水二盞姜三片煎八分通口服治喘通用諸方和劑人參定喘湯方見前大旨黃芩半夏湯專治寒包熱兼治表裡半夏枳殼黃芩酒炒桔梗紫蘇麻黃杏仁甘草等分上水二盞姜三片棗一枚煎八分食遠服天寒加桂枝星半栝蔞丸治痰喘南星半夏栝蔞仁香附子橘皮蘿蔔子炒杏仁皂角灰上為末神麯糊丸梧桐子大每服六七十丸薑湯下醫林定喘陳皮湯治痰喘陳皮去白半斤明礬二兩半銚內飛同陳皮炒香熟甘草炙一兩半夏五兩換水煮過每個切四片用明礬泡湯浸露七日七夜漉去用姜搗成餅慢火焙乾用上為細末每服一二錢薑湯調下不拘時服醫林桑白皮湯治肺氣有餘火炎痰盛作喘桑白皮半夏蘇子杏仁貝母山梔黃芩黃連各八分上水二盞姜三片煎八分通口服濟生葶藶散治過食煎爆飲酒過度傷肺喘不得臥及肺壅咽燥不渴濁唾腥臭甜葶藶桔梗栝蔞仁升麻薏苡仁桑白皮葛根各八分甘草四分上水二盞姜三片煎八分溫服選要玉華散治咳嗽上喘調順肺經清利咽膈安和神氣甜葶藶桑白皮半夏貝母天門冬馬兜鈴杏仁紫菀百合蒸人參各一錢百部甘草炙七分上水二盞姜三片棗二枚煎八分食後服五味子湯治喘促脈伏而數者五味子一錢人參麥門冬杏仁陳皮去白各錢半上水二盞姜三片棗二枚煎八分無時服紫蘇子湯治憂思過度邪傷脾肺心腹膨脹喘促煩悶腸鳴氣走漉漉有聲二便不利脈虛緊澀紫蘇子半夏木通大腹皮各一錢木香三分磨陳皮人參各八分草果仁四粒枳實白朮各七分甘草炙五分厚朴七分上水二盞姜三片棗一枚煎八分不拘時服定肺湯治上氣喘嗽紫菀橘紅杏仁五味子枳殼半夏桑白皮紫蘇甘草炙各一錢上水二盞姜三片蘇葉五片煎八分食後服醫林杏仁煎治喘嗽杏仁去皮尖炒胡桃肉去皮各等分上碾膏煉蜜丸彈子大每服一丸臨臥細嚼薑湯送下一方以胡桃肉三個姜三片臨臥嚼吃飲湯三四口再嚼再飲就臥止嗽無痰人參胡桃湯治喘急不得臥人參錢半胡桃肉五個泡去皮上水盞半姜三片棗一枚煎八分食後溫服濟生二黃丸治停痰在胃喘息不通呼吸欲絶雌黃一錢雄黃二兩上籮極細末熔黃蠟為丸如彈子大每服一丸於半夜時熱煮糯米粥乘熱以藥投在粥內和勻吃定喘丹治患肺氣喘促倚息不得臥䶎齁嗽並治蟬蛻去土頭足翅炒杏仁馬兜鈴各二兩人言明礬煅六錢上為細末蒸棗肉為丸如葵子大每服六七丸臨臥蔥茶湯送下服後忌熱物半日效神應丹治咆哮喘嗽緑豆一合人言一錢上二味入砂鍋內水煮豆爛熟研為糊焙乾再研為末神麯糊丸麻子大大人服三十丸小兒十五丸七歲以下六七丸冷茶臨臥送下忌熱物一日此方神效紫金丹治齁喘信石二錢半研淡豆豉一兩水潤研成膏上共研和勻丸緑豆大每服七丸臨臥冷茶送下只一服或二服服後不可吃一應湯水之物一方用信八分豉一兩每服二十丸又法二件研成膏塗碗內艾煙燻入生珠末丸一婦患喘十年遍求藥不效忽一遂人與此藥一服是夜減半數服頓愈利下治喘諸方大利膈丸治風痰壅實喘滿咳嗽風氣上攻牽牛末二兩青皮檳榔半夏泡各一兩木香二錢半槐角炒五錢皂角炙去皮弦子一兩上為末薑汁糊丸梧桐子大每服五十丸食後薑湯下八仙丸治咳嗽神效天南星一兩炒半夏款冬花小皂角炙去皮弦子白礬枯甘草炙各半兩巴豆七粒包棗內燒煙盡杏仁十五粒泡去皮尖炒上為細末醋煮麵糊丸梧桐子大每服二三十丸食後溫齏湯送下或嚼碎蘿蔔栗子湯下子和導水丸治胃中有實火膈上有稠痰得食則減食已則喘大黃黃芩各二兩牽牛另研取頭末滑石各四兩去濕熱腰痛泄水濕腫滿久則加甘遂一兩去遍身走注疼痛加白芥子一兩退熱散腫毒止痛久則加朴硝一兩散結滯通關節潤腸胃行滯氣通血脈加郁李仁一兩除腳腿沉重加樟柳根一兩上為細末滴水丸梧桐子大每服五十丸臨臥溫水下黑錫丹治喘逆尤妙方見眩運門控涎丹治水氣喘逆浮腫喘嗽氣促方見痰飲門千緡湯治痰飲喘急不能臥人扶而坐一服即安半夏泡七個甘草炙皂角炙各一寸生薑一指大上水盞半煎七分不拘時服萬氏定喘湯治諸喘久不愈白果三七枚去殼切碎炒款冬花桑白皮蜜炒麻黃各三錢蘇子二錢杏仁黃芩微炒各錢半法制半夏三錢上水三盞煎二盞作二次服不拘時徐徐飲歌曰諸病原來有藥方惟愁齁喘最難當麻黃桑杏尋蘇子白果冬花更又良甘草黃芩同半夏水煎百沸不須姜病人遇此仙丹藥服後方知定喘湯易簡諸方一方治痰嗽喘急用桔梗一兩咀童便半升煎四合去滓溫服一方治腹脹喘滿用山豆根為末一錢滾湯調服一方治喘嗽用殭蠶細茶為末等分臨臥調服一方治積年上氣喘促唾膿血不止蘿蔔子一合研水煎食後服其效如神一方治上氣咳嗽喘急唾膿血久而成勞人參為末每服三錢以雞子清調五更初服訖便睡去枕臥一服可愈多年者再服忌一切發物一方治熱嗽喘甚者石膏二兩甘草半兩炙為末每服三錢新水下或姜蜜湯調下聖惠方治肺氣喘急用薤白搗汁飲之一方治遠年近日喘嗽用粟殼蜜炙人參陳皮甘草炙各等分為末每服一錢烏梅湯臨臥服食醫心鑑治氣喘浮腫小便赤澀杏仁二兩炒研和米煮粥食之灸法璇璣在天突下一寸氣海在臍下寸半膻中在兩乳折中期門背中骨節第七椎下穴灸三壯立已喘氣神效治案丹溪治一人六七月喘不得臥主於肺用麻黃石膏各二錢柴胡桑白皮黃芩各一錢甘草五分服之一汗而愈後以人參五味子桑白皮黃芩甘草遂安一人痰多喘急用白朮半夏蒼朮香附子各一兩黃芩杏仁各半兩薑汁麵糊丸服愈滑伯仁治一人肺氣壅滿病得之多飲中積痰涎外受風邪發則喘竭不能自安以清肺泄湧降火潤燥苦辛劑遂安張子和治上喘中滿醋心腹脹時時作聲痞氣上下不能宣暢先用獨聖散吐之訖次用導水丸禹功散輕瀉三四行不愈更以利膈丸瀉之使上下宣通不能壅滯後服平胃散五苓散三和散分理陰陽利水道之藥遂愈
