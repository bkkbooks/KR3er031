body:
  text: 卷之四十四咳嗽門病機內經敘論咳論篇黃帝問曰肺之令人咳何也岐伯對曰五臟六腑皆令人咳非獨肺也帝曰願聞其狀岐伯曰皮毛者肺之合也皮毛先受邪氣邪氣以從其合也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則外內合邪因而客之則為肺咳五臟各以其時受病非其時各傳以與之人與天地相參故五臟各以治時感於寒則受病微則為咳甚則為泄為痛乘秋則肺先受邪乘春則肝先受邪乘夏則心先受邪乘至陰則脾先受邪乘冬則腎先受邪帝曰何以異之岐伯曰肺咳之狀咳而喘息有音甚則唾血心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痹肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿脾咳之狀咳則右脅下痛陰陰引肩背甚則不可以動動則咳劇腎咳之狀咳則腰背相引而痛甚則咳涎帝曰六腑之咳奈何安所受病岐伯曰五臟之久咳乃移於六腑脾咳不已則胃受之胃咳之狀咳則嘔嘔甚則長蟲出肝咳不已則膽受之膽咳之狀咳嘔膽汁肺咳不已則大腸受之大腸咳狀咳而遺矢心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失腎咳不已則膀胱受之膀胱咳狀咳而遺厭久咳不已則三焦受之三焦咳狀咳而腹滿不欲飲食此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也帝曰治之奈何曰治臟者治其俞治腑者治其合浮腫者治其經生氣通天論曰秋傷於濕上逆而咳陰陽應象篇曰秋傷於濕冬生咳嗽五臟生成篇曰咳嗽上氣厥在胸中過在手陽明太陰診要經終篇曰春刺秋分筋攣氣逆煩為咳嗽病不愈令人時驚又且哭示從容篇曰咳嗽煩冤者腎氣之逆也內經有以咳言者有以咳嗽言者如秋傷濕二篇一篇只咳字一篇有嗽字子和謂此則知咳即嗽也明矣玉機分為陰陽氣血亦過鑿矣潔古機要云咳乃無痰有聲嗽乃有痰無聲咳兼嗽乃有聲有痰此為咳嗽之少別然則字義倒說為戾耳咳嗽二字取義辨柏齊何氏曰機要所論咳嗽二證蓋倒說也肺為氣主而聲出焉肺傷寒飲鬱而為痰聲欲上出為痰所隔故相攻而作聲痰出聲乃通利斯謂之咳外感風寒肺管為寒氣所束聲出不利故亦相攻作聲然無物也斯謂之嗽咳字從亥亥者有形之物也故果核草荄皆從亥亥復有隔閡之義嗽字從束從吹此古人制字之妙乃二證之所以分也觀此則機要之說誠倒置歟咳有十證巢氏病源曰千金敘十咳之異一曰風咳欲語因咳言不得竟是也二曰寒咳飲冷食寒入注胃從肺脈上氣內外合因之而咳是也三曰支咳心下堅滿咳則引痛其脈反逆是也四曰肝咳咳而引脅下痛是也五曰心咳咳而唾血引手少陰是也六曰脾咳咳而涎出續續不止引少腹是也七曰肺咳咳而引頭項而唾涎沫是也八曰腎咳咳則耳聾無所聞引腰臍中是也九曰膽咳咳而引頭痛口苦是也十曰厥陰咳咳而引舌本是也嗽分六氣毋拘以寒張子和曰經云皮毛者肺之合也皮毛先受邪指寒邪氣邪氣以從其合也其寒飲食入胃從肺脈上至於肺則肺寒肺寒則內外合邪因而客之則為肺咳後人執是言斷以嗽為寒更不參較他篇豈知六氣皆能為咳經曰一陽發病少氣善咳歲火太過炎暑流行肺金受邪民病咳嗽歲木不及心氣晚治上勝肺金病咳而鼽從革之紀金不及也其病嚏咳堅成之紀金太過也上徵與正商同其病咳少陽司天火氣下臨肺金上從嗽嚏衄少陰司天火淫所勝咳嚏血煩心少陽司天天氣熱鬱於上咳逆嘔吐少陰司天熱氣生於上清氣生於下寒熱凌反而生於中民病咳喘少陰之復燠熱內作氣動於左上行於右咳皮膚痛則入肺咳而鼻淵苦此之煩皆生於火與熱也厥陰司天客勝則耳鳴掉眩甚則咳若此之類乃生於風太陰司天濕淫所勝咳唾則有血太陰之復濕變乃舉飲發於中咳喘有聲若此之類乃生於濕金鬱之發民病咳逆心脅痛歲金太過燥氣流行肝木受邪民病咳喘逆逆甚則嘔血陽明司天金火合德民病咳嗌塞陽明之勝清發於中嗌塞而咳陽明之復清氣大舉咳噦煩心若此之類皆生於燥太陽司天客氣勝則胸中不利出清涕感寒則咳若此之類乃生於寒此六氣皆能咳嗽豈可專為寒乎六咳之狀風乘肺者日夜無度汗出頭痛涎痰不利熱乘肺者急喘而嗽面赤潮熱手足寒乳子亦多有之火乘肺者咳喘上壅涕唾出血甚者七竅血溢燥乘肺者氣壅不利百節內痛頭面汗出寒熱往來皮膚乾枯細瘡濕癢大便祕澀涕唾稠黏寒乘肺者或因形寒飲冷冬月坐臥濕地或冒冷風寒秋冬水中感之咳急而喘濕乘肺者必有脫簡咳嗽分三因陳無擇云傷風嗽者憎寒壯熱自汗惡風口乾煩躁傷寒嗽者憎寒發熱無汗惡風煩躁不渴傷暑咳者節骨煩痛四肢重著灑淅此屬外因五臟咳而不已則六腑受之者此屬內因如咳而發作寒熱引腰背痛或喘滿此因房勞傷腎或中滿腹脹搶心痛不欲食此因飢飽傷脾或咳而左脅偏痛引小腹並膝腕疼此因疲極傷肝或吐白涎口燥聲嘶此因呼叫傷肺或咳而煩熱自汗咽乾咯血此因勞神傷心並屬不內外因也咳嗽主於氣逆巢氏曰肺虛感微寒而成咳咳而氣還聚於肺肺則脹是為咳逆也邪氣與正氣相搏正氣不得宣通但逆上咽喉之間邪伏則氣靜邪動則氣奔上煩悶欲絶故謂咳逆上氣也咳嗽主於濕痰河間曰咳當作嗽也謂無痰而有聲肺氣傷而不清也嗽當作咳也是無聲而有痰脾濕動而為痰也咳嗽二字似反說也或傳寫之訛耳咳嗽謂有痰而有聲蓋因傷於肺氣動於脾濕咳而且嗽也故知嗽為秋傷於濕積於脾經曰秋傷於濕冬必咳嗽大抵素秋之氣宜清肅反動之氣必上衝而咳嗽甚則動於濕而為痰也各隨五臟治之假令濕在肝經謂之風痰濕在心經謂之熱痰濕在脾經謂之濕痰濕在腎經謂之寒痰宜隨證治之無痰者以辛甘潤肺咳而嗽者治痰為先故謂南星半夏勝其痰而咳嗽自愈枳殼陳皮利其氣而痰飲自下呷嗽巢氏曰呷嗽者猶咳嗽也其胸膈痰飲多者嗽則氣動於痰上搏咽喉之間痰氣相搏隨嗽動息呼呷有聲謂之呷嗽仲景丹溪皆云喉中作水雞聲射干麻黃湯之屬是也其與咳嗽大抵雖同至於投藥則應加消痰破飲之物以此為異耳乾咳嗽乾咳嗽者無痰有聲是也此證本於氣澀澀微者連嗽十數聲方有痰出澀甚者雖嗽十數聲亦無痰也是為乾咳嗽乾咳嗽者難治系火鬱之甚乃痰鬱火邪在腎中用苦桔梗以開之下用補陰降火不已則成勞須用倒倉法此證多是不得志者有之咳久成勞戴氏曰久咳嗽午後作寒熱盜汗出或痰唾兼紅則成勞怯主補陰清金詳見癆瘵門咳久肺痿金匱論云熱在上焦咳嗽既久而亡津液或用燥藥過度或用利藥汗藥太多重亡津液故寸口脈數其人咳嗽口中反有濁唾涎沫者為肺痿若口中辟辟燥咳胸中隱隱痛脈反滑數此為肺癰咳唾膿血腥臭者皆為肺痿肺癰詳見本門脈候脈浮為風嗽脈緊為寒嗽脈數為熱嗽脈細為濕嗽以上為外邪之所感脈浮緊則虛寒沉數則實熱弦澀為少血洪滑為多痰以上為內氣之所郁脈經曰關上脈微為咳肺脈微急為咳而唾血咳而脈弦澀為少血細澀而數為房勞雙弦者為寒偏弦者為飲脈沉為留飲咳弦實者宜埕右寸短澀傷肺嗽右關短澀傷脾嗽左關短澀傷肝嗽脈出魚際為逆氣喘嗽咳脈浮直者生浮濡者生脈數有熱氣逆而喘不得臥者難治咳而脫形發熱脈緊浮者不治咳而脈緊者死咳而嘔吐腹脹且泄脈弦急者不治治法治咳嗽以消痰順氣為先河間曰治咳嗽者當以治痰為先治痰者必以順氣為主是以南星半夏勝其痰而咳嗽自愈枳殼陳皮利其氣而痰飲自除痰盛而能食者小承氣湯微下之痰盛而不能食者厚朴湯疏導之無痰而咳嗽者當以辛甘潤其肺如蜜煎生薑湯蜜煎橘皮湯之類是也本草云陳皮味辛理上氣行滯塞青皮味苦理下氣二味俱用散三焦痰氣不可少也治嗽須觀時令夏月嗽而熱者謂之熱嗽以小柴胡湯加石膏知母之屬是也冬月嗽而惡寒謂之寒嗽以小青龍湯加杏仁冬花細辛乾薑之屬是也凡嗽春是春升之氣雜著云宜潤肺抑肝二陳湯加杏仁知母五味子川芎白芍藥麥門冬炒黃芩夏嗽火炎於上用二陳去半夏加五味桔梗桑白皮地骨皮麥門冬黃芩石膏貝母之類秋嗽濕熱傷肺用清熱瀉濕二陳湯去半夏加杏仁天門冬防風桔梗蒼白朮桑白皮梔子仁黃芩之類冬嗽風寒外束用解散二陳湯加麻黃桂枝桔梗杏仁發熱頭痛加川芎藁本前胡柴胡之類治嗽要分虛實新久凡咳嗽之人體氣虛弱者用瀉氣藥多不效間有效者必復作若此者並宜補益而嗽自愈體氣厚者或系外感俱宜發散邪氣破滯氣而嗽自寧新咳嗽者亦是從實者之治也久咳嗽者從補法之治也或用澀藥擊其惰歸九仙散之屬是也治嗽有早晏之殊早晨嗽多者此胃中有食積此時火氣流入肺中上半日嗽多者胃中有火知母石膏降之午後嗽多者屬陰虛四物湯加黃柏知母先降其火黃昏嗽多者火氣浮於肺不宜用涼藥以五味子五倍子降斂之夜嗽並陰分嗽者多屬陰虛腎水不足者六味地黃丸之類治嗽不可先用澀藥凡治咳嗽當先各因其病根伐去邪氣而後以烏梅訶子五味子罌粟殼款冬花之類其性燥澀有收斂劫奪之功亦在所必用可一服而愈慎毋越其先後之權衡也治咳嗽條例丹溪曰咳嗽有風有寒有痰有火有虛有勞有郁有肺脹風寒者主發散行痰二陳湯加麻黃杏仁桔梗之類風寒鬱熱於肺夜嗽者三拗湯脈大而浮有熱加黃芩生薑咳嗽過冬寒則發者此寒包熱也解表熱自除枳殼桔梗麻黃防風陳皮紫蘇木通黃芩嚴寒去黃芩加杏仁感冷則嗽膈上有痰二陳湯加南星枳殼黃芩桔梗蒼朮麻黃木通生薑聲啞為寒宜細辛半夏生薑卒以散之嗽屬火者有聲痰少面赤是也主降火清金化痰海石栝蔞青黛桔梗半夏香附訶子青皮之類蜜丸噙化凡嗽引脅痛宜疏肝氣用青皮枳殼香附實者白芥子陰虛火動而嗽四物湯加黃柏知母合二陳順而下之陰虛咳嗽或吐血者四物湯加黃柏知母五味人參麥門冬桑白皮地骨皮好色之人元氣虛弱咳嗽不已瓊玉膏最捷勞者主補陰清金四物湯加竹瀝薑汁肺虛甚者人參膏以生薑陳皮佐之有痰加痰藥此好色腎虛者有之久嗽勞嗽用貝母知母白芨阿膠麥門冬陳皮人參五味子之類太平丸噙化俱妙久嗽有積痰留肺脘中如膠氣不能升降或挾濕與酒而作用栝蔞海粉半夏神麯香附陳皮之屬食積痰嗽半夏南星為君栝蔞蘿蔔子為臣青黛海石為使薑汁蒸餅為丸服痰嗽氣急二朮香附杏仁茯苓黃芩川芎蘿蔔子為丸服咳嗽聲嘶者乃血虛受熱用青黛蛤粉蜜調服肺脹者主收斂五味子烏梅罌粟殼冬花訶子倍子枯礬之類肺脹抑遏不得眠者難治凡咳嗽肺實有火邪者宜桑白皮片黃芩天花粉杏仁枳殼桔梗之類以瀉之有外感風寒者用五拗湯以發散之凡久嗽肺虛須用人參冬花紫菀馬兜鈴五味子之類補之凡咳嗽不論風寒痰火虛實曾經發散過並服麻黃杏仁防風枳殼之藥病雖已減病根未除者只以二陳加粟殼烏梅訶子五味阿膠之類一服立愈二陳湯加減咳嗽痰證多方用之只除陰虛血虛火盛肺燥乾咳嗽而痰咯嗌不出不可用其餘悉可對證加味而用之傷寒咳嗽二陳湯加杏仁麻黃桔梗乾薑桂枝之類傷風咳嗽二陳湯加枳殼防風荊芥前胡細辛旋覆花之類潤肺止嗽須用阿膠蜂蜜栝蔞仁胡桃仁麻仁之類傷熱咳嗽二陳湯去貝母加黃芩薄荷知母石膏桔梗之類因傷風寒鬱熱久嗽不已欲成勞者二陳加知母貝母冬花紫菀五味子馬兜鈴二門冬當歸生地黃阿膠之類富貴貧賤治例張子和云夫富貴貧賤之人不可一途而治富貴之人一切痰涎咳嗽乃是厚味飲食熱痰之致然也先用獨聖散吐之吐訖可服人參散通聖散加半夏以此止嗽更服大人參半夏丸以化痰也忌酸鹹油膩生硬熱物也貧難之人咳嗽內外感風寒濕之致然也內經曰秋傷於濕冬生咳嗽可服寧神散寧肺散加白朮之類則愈矣忌法同前醫案子和治一婦人病嗽時已十月戴人處方六味陳皮當歸甘草白朮枳殼桔梗其夫疑其不類嗽藥戴人笑曰君怪無烏梅罌粟乎夫冬嗽乃秋之濕也濕上逆而為嗽此方皆散氣除濕解急和經三服帖然效矣一男子年四十病勞嗽咯血唾吐黏臭不可聞秋冬稍緩春夏則甚寒熱往來日晡發作狀如㾬瘧寢汗如水纍服麻黃根敗蒲扇而汗自若又服寧神散寧肺散而嗽自如戴人先以獨聖散湧其痰狀如雞黃汁隨湧出昏憒三日不省時時飲以涼水精神稍開飲食加進又與人參半夏丸桂苓甘露散不數服乃愈衍義有人患氣痰將塞或教以陳皮生薑焙乾神麯等分為末丸梧桐子大食後臨臥以米飲服五十丸兼舊患膀胱氣緣此皆愈一婦人患肺熱久嗽身如炙肌瘦將成勞以枇杷葉木通款冬花紫菀杏仁桑白皮各等分大黃減半為細末蜜丸櫻桃大食後夜臥各噙一丸未終一劑而愈藥方發散諸方和劑華蓋散治肺受風寒頭痛發熱咳嗽痰飲麻黃去節紫蘇子杏仁去皮尖炒桑白皮赤茯苓橘紅各一錢甘草五分上作一服水二盞姜五片棗一枚煎八分食後服參蘇飲治一切風寒咳嗽嘔吐痰沫發熱惡寒頭痛方見傷寒門金沸草散治肺感寒邪鼻塞聲重咳嗽不已憎寒發熱無汗惡風或熱壅膈間唾濁痰甚旋覆花麻黃荊芥各一錢前胡半夏赤芍藥各八分甘草炙五分上水二盞姜三片棗一枚煎八分食遠服濟生橘蘇散治傷寒咳嗽身熱有汗惡風脈浮病人挾熱服杏仁湯不得者此藥穩當橘紅紫蘇葉杏仁五味子半夏桑白皮貝母白朮各一錢二分甘草炙六分上作一服水二盞姜五片煎八分食遠服和劑三拗湯治感冒風寒鼻塞聲重語音不出咳嗽喘急胸滿多痰生甘草麻黃不去節杏仁留皮尖上各咀二錢水二盞姜三片煎八分食遠服若憎寒惡風取汗解加桔梗荊芥名五拗湯治咽痛金匱杏仁湯止咳嗽散風寒逐痰飲杏仁去皮尖人參茯苓細辛半夏制桂枝乾薑芍藥五味子甘草炙各一錢上水二盞姜五片煎八分食遠服和劑消風百解散治咳嗽聲重身熱頭痛方見傷寒門濟生人參荊芥湯治肺感風邪上壅咳嗽頭目不清語言不出咽乾項強鼻流清涕陳皮荊芥穗人參半夏通草麻黃桔梗各一錢杏仁細辛甘草各五分水二盞姜三片棗一枚煎服仲景小青龍湯治表證水氣身熱咳嗽乾嘔怔忡方見傷寒門和劑敗毒散治痰嗽身熱鼻塞柴胡前胡羌活獨活人參茯苓枳殼川芎桔梗各八分甘草四分上水二盞蔥一根棗一枚煎八分不拘時服金匱麻黃杏子湯治咳嗽發熱氣滿頭疼麻黃杏仁紫蘇薄荷陳皮桑白皮大腹皮甘草薄桂各等分上服五錢水二盞姜三片蔥一根煎八分服醫林桑皮散治上焦熱壅咳嗽血腥連聲並氣不得透桑皮炒前胡柴胡紫蘇薄荷枳殼桔梗赤茯苓黃芩甘草炙各等分上咀每服七錢水二盞煎七分食遠溫服仲景小柴胡湯治風寒咳嗽發熱頭疼方見傷寒門火熱咳嗽諸方集驗流金膏治一切痰火痰嗽等症方見痰飲門和劑麥門冬湯治火熱乘肺咳嗽痰唾帶紅梔子仁湯治咳燥熱河間黃連解毒湯治咳而喘急脈洪神芎丸治一切熱嗽清金消痰利咽膈蜜丸彈子大嚼服尤妙五方並見火門濟生瀉白散治肺壅實煩熱咳嗽喘悶大便不利桔梗甘草桑白皮陳皮半夏杏仁栝蔞子地骨皮各等分上咀每服八錢水二盞姜五片煎八分食後服寶鑑加減瀉白散治咳嗽口乾煩熱胸膈不利上氣喘促桑白皮錢半地骨皮陳皮青皮桔梗甘草炙黃芩知母各七分上水二盞煎八分食後溫服易老水煮金花丸治氣痰熱壅心胸煩悶咳嗽小黃丸治熱痰咳嗽口乾煩躁面赤脈洪二方並見痰飲門枳殼湯治久嗽上焦熱胸膈不利枳殼炒桔梗各三兩黃芩二兩上咀每日早用二兩作一服水三盞煎二盞勻作三服午時一服申時一服臨臥時一服盡此一料無不愈雙玉散治痰熱咳嗽喘湧痰涎寒水石石膏各等分上為極細末每服三錢人參煎湯調下食後臨臥服拔萃人參平肺散治心火克肺金傳為肺咳嗽喘嘔痰涎壅盛胸膈痞滿咽嗌不利人參青皮茯苓天門冬去心陳皮地骨皮黃芩各八分五味子二十粒知母一錢桑白皮炒錢半甘草炙五分上水二盞姜三片煎八分食遠服宣明知母茯苓湯治痿咳不已往來寒熱知母白朮各八分茯苓五味子人參半夏柴胡甘草炙各一錢薄荷川芎阿膠各五分款冬花桔梗麥門冬黃芩各七分上水二盞姜三片煎八分食遠服醫林桑白皮散治上焦熱壅血腥煩嗽連聲並氣不得透桑白皮炒桔梗川芎防風薄荷黃芩前胡柴胡紫蘇赤茯苓枳殼甘草各等分上咀每服七錢姜三片棗一枚煎七分食遠服加味枳殼半夏湯治上焦有熱咳嗽黃痰痞滿氣喘枳殼半夏桔梗茯苓苦葶藶微炒防己薄荷紫蘇馬兜鈴桑白皮炒各一錢甘草炙五分上作二服水盞半姜三片煎八分食遠服紫菀膏治肺熱熱嗽久嗽身如炙將成勞枇杷葉去毛木通款冬花紫菀杏仁去皮尖炒桑白皮炙各一兩大黃半兩上為細末煉蜜丸櫻桃大夜間噙化三五丸濟生紫菀茸湯治飲食過度或食煎爆邪熱傷肺咳嗽咽癢痰多唾血喘急脅痛不得臥紫菀茸桑葉經霜炒款冬花百合蒸焙杏仁阿膠蛤粉炒貝母半夏蒲黃炒各一錢犀角鎊人參甘草炙各五分上水盞半姜五片煎八分食後服楊氏寧肺湯治榮衛俱虛發熱自汗咳嗽痰涎肺氣喘急人參當歸白朮熟地黃川芎白芍藥五味子麥門冬桑白皮白茯苓甘