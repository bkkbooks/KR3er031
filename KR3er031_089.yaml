body:
  text: 卷之八十九幼幼彙集中脾胃門第一病機蓋小兒臟腑怯弱乳食過度則傷脾胃貴乎調理得中無有太過不及否則脾胃受傷面恍無色口中涼氣不思乳食嘔吐肌瘦虛弱腹中作痛則當補脾益胃凡人以胃氣為本惟治病亦然胃氣有虛有實虛則有嘔吐不食之證實則有痞滿內熱之證虛者益之實者瀉之欲得其平則可矣平胃散觀音散益黃散之劑皆壯胃之要藥可對證而調治之脈候關脈弦數為食積溫熱傷脾沉微者為冷不思飲食未滿三歲看虎口脈紋治法脾胃虛寒或腹痛不食理中湯主之有傷食腹脹而或痛以消食丸導之有熱者仁齋保和丸之屬藥方平胃散治脾胃不和不思乳食心腹疼痛口苦無味嘔噦噁心噫氣吐酸面色痿黃體弱肌瘦肚腹泄瀉並服之厚朴去皮姜炒陳皮去白各三兩蒼朮五兩浸二日甘草一兩炙上為末每服二錢姜二片棗二枚水煎空心入鹽少許調服常服快氣暖胃化宿食消痰快膈消食丸寬中快膈消乳食正顏色砂仁橘紅三稜煨莪朮神麯炒麥蘖炒各半兩香附子一兩炒上為末麵糊丸綠豆大食後紫蘇湯下二十丸溫脾湯治脾胃不和腹脅虛脹不進乳食困倦無力訶子炮人參七錢半木香桔梗各半兩茯苓藿香洗陳皮黃耆甘草各二錢半白朮半兩上為末每服二錢薑棗煎四君子湯調理脾胃進乳食止泄瀉人參白朮茯苓甘草炙各等分上咀每服二錢薑棗煎加陳皮半夏名六君子湯和中湯治小兒脾胃不和嘔逆噁心冷熱不調減食泄瀉腹痛腸鳴少力嗜臥厚朴白朮乾薑甘草各二錢上為細末每服二錢姜二片水八分煎乳食前溫服仁齋保和丸治小兒食傷發熱欲成疳證常服益脾胃食則不傷白朮五兩茯苓半夏制山楂神麯炒各三兩陳皮連翹蘿蔔子各二兩蒼朮制枳實炒香附子制厚朴制黃芩酒炒黃連酒炒各一兩上為細末薑汁打麵糊為丸如黍米大每服五十丸漸加至七八十丸食後茶湯下加減觀音散調理脾胃常服正顏色消飲食白朮炒人參扁豆炒茯苓麥芽炒黃耆炙甘草山藥神麯炒香附子炒上為末每服一錢空心米飲下調中散治脾胃不和人參茯苓木香白朮甘草炙乾薑煨藿香洗香附子砂仁丁香各等分上為末每服一錢薑棗湯下疳證門第二病機丹溪曰小兒臟腑嬌嫩飽則易傷乳哺飲食一或失常不為疳者鮮矣皆因飲食不調肥甘無節而作也或嬰幼乳缺粥飯太早耗傷形氣則疳之根延及歲月五疳病成錢氏曰疳皆脾胃耗傷亡津液之所作也故小兒臟腑柔脆有疾不可痛擊大下必亡津液凡有可下置量大小虛實而下之則不致為疳也但見目澀或生白膜唇赤身黃喜冷地愛食泥土瀉痢無常肚腹脹滿耳鼻生瘡頭髮作穗腳弱項小極瘦飲水甚至丁奚哺露有曰無辜至於疳證皆其候疳證有五臟寒熱之不同曾氏曰小兒疳證有五心肝脾肺腎是也冷熱者初病尚肥為熱疳久病漸瘦為冷疳心疳者咬牙舒舌舌上生瘡愛飲涼水唇紅面赤喜臥地上是也肝疳者目多眵淚在臉多青或目睛微黃泄瀉清水如苔色是也脾疳者愛吃泥土冷物飲食無度身面俱黃發稀作穗頭大項小腹脹腳軟間或釀瀉肌瘦夜熱不思乳食是也肺疳者鼻下黑爛口有腥氣或作喘嗽右腮光白是也腎疳者兩耳內外生瘡腳如鶴膝頭縫不合或不能行牙齒生遲其縫臭爛傳為走馬牙疳之類是也熱疳多在外鼻下臭爛頭上有瘡繞耳不結痂是也冷疳多在內目腫腹脹痢色無常或瀉清沫削瘦是也脈候啟蒙曰小兒單細為疳勞虎口脈紋色青白色為疳治法凡疳證以加味肥兒丸黃連肥兒丸主之通神丸蚵皮丸之類熱疳以木香丸外疳耳鼻多生瘡者爛香散心疳以茯苓丸錢氏安神丸肝疳以生地黃湯天麻丸脾疳以錢氏益黃散肺疳以清肺飲化䘌丸錢氏阿膠散腎疳以地黃丸各以類而求之不可妄意投藥稍有差殊卒致不救藥方諸疳通用方加味肥兒丸治諸疳身黃肚大痞塊泄瀉瘦弱胡黃連半兩川黃連木香檳榔三稜莪朮煨青皮陳皮神麯炒麥芽炒各一兩使君子去殼浸去皮香附子制蘆薈各半兩上為末以神麯麥芽面打糊為丸綠豆大空心米飲下三四十丸如小兒無熱去胡黃連泄瀉加肉豆蔻人參茯苓大蘆薈丸治疳殺蟲和胃止瀉蘆薈黃連胡黃連木香檳榔蕪荑雷丸白者佳赤者毒青皮各半兩藿香少許另研上為末用豬膽汁丸麻仁大每服十餘丸米飲下五疳保童丸治小兒一切疳證無不保安蟾頭一枚炙令黃色白鱔頭炙焦黃龍膽草蘆薈各二錢黃連胡黃連五倍子苦楝根皮夜明砂天將子各五錢麝香五分青皮五錢熊膽一全雄黃二錢青黛三錢上為細末糯米飯丸麻子大一歲兒二十丸米飲下不拘時日進三服五疳消食丸治小兒五疳八痢肚大青筋療癆疳走馬牙疳唇爛口臭此藥中和大能進食長肌使君子去皮殼蕪荑黃連橘皮麥芽龍膽草各等分上為細末粟米糊丸黍米大每服三十丸空心米飲下通神丸治小兒冷熱疳川黃連胡黃連各二錢蕪荑使君子木香各一錢丁香五分肉豆蔻一錢大蝦蟆酥炙為末上為末飯丸黍米大每服十丸米飲下肥兒丸治諸疳多因少乳吃食太早或因病久胃虛脾弱生蟲日漸黃瘦肚大青筋不能行立發豎發熱口臭牙疳川黃連姜炒神麯炒麥芽炒各半兩檳榔二枚木香二錢肉豆蔻使君子煨各半兩上為末曲糊丸麻子大每服三十丸米飲下心疳劑茯神丸治小兒心疳熱茯神茯苓遠志姜炒黃連炒琥珀各三錢鉤藤蝦蟆煅各二錢菖蒲一錢蘆薈五分麝香二分半上為極細末粟米煮糊丸如黍米大薄荷煎湯下一二十丸安神丸治小兒心疳驚熱方見驚門龍膽丸治小兒心疳頰赤面黃鼻乾心燥口內生瘡驚悸龍膽草赤茯苓川黃連胡黃連硃砂二錢麝香一字上為極細末蒸餅泡為丸黍米大每服二十丸食遠白湯下肝疳劑天麻丸治小兒肝疳風疳疳眼青黛黃連天麻五靈脂川芎夜明砂蘆薈各一錢龍膽草防風蟬蛻去足各錢半全蠍二枚焙麝香少許上為末豬膽汁浸糕丸麻子大每服十丸薄荷湯下生熟地黃湯治前證生乾地黃熟地黃川芎赤茯苓枳殼杏仁黃連半夏曲天麻地骨皮甘草炙各二錢半當歸二錢上咀每服二錢姜三片黑豆十五粒水煎臨臥服脾疳劑靈脂丸治小兒脾疳食疳五靈脂水飛砂仁白豆蔻仁麥芽莪朮青皮使君子陳皮去白蝦蟆炙焦上為細末麵糊丸黍米大每服二十丸米飲下捉疳丸治小兒脾胃受疳面黃腹脹多睡如醉吃生米酒土丁香木香各半兩黃連蕪荑去皮炒蚌粉神麯炒三稜煨青皮各二錢上為細末豬膽汁煮糊丸黍米大食遠米飲下肺疳劑清肺湯治肺疳咳嗽多喘揉鼻咬甲寒熱腹脹桑白皮紫蘇前胡黃芩當歸天門冬連翹防風赤茯苓桔梗生地黃甘草各二錢上咀每服二錢水煎服化䘌丸治前證蕪荑蘆薈青黛白芷梢川芎胡黃連川黃連蝦蟆煅各一錢上為細末豬膽汁浸米糕丸黍米大杏仁煎湯臨臥服腎疳劑地黃丸治小兒腎疳熟地黃四錢半赤茯苓山茱萸肉焙乾牡丹皮山藥炒各三錢使君子略煨當歸川芎川楝子焙各二錢上為末煉蜜丸梧桐子大每服三十丸空心服蛔疳下蟲丸治小兒蛔疳諸蟲新白苦楝根皮酒浸炒綠色貫眾木香桃仁泡去皮尖蕪荑尖檳榔鶴蝨炒各二錢輕粉五分干蝦蟆炙焦二錢使君子肉微炒五十枚上為末糊丸麻子大每服十丸白湯下香蔻丸治小兒疳瀉黃連三錢炒肉豆蔻木香訶子煨茯苓砂仁各一錢上為細末粳米飯為丸麻子大每服十五丸薑湯下癆疳癆疳者潮熱往來五心煩熱盜汗骨蒸咳嗽憔悴或瀉而渴腹硬如石面色如熏此皆不治之證黃耆湯治癆疳黃耆人參當歸川芎芍藥生地黃蝦蟆炙去足鱉甲炙焦各錢半茯苓陳皮半夏曲柴胡使君子煨各一錢上咀姜三片棗一枚煎作三次食前服至聖丸治冷疳時時泄瀉虛汗不止木香丁香各一錢厚朴制三錢使君子二十枚炮肉豆蔻一錢陳皮三錢上為末神麯糊丸麻子大每服七丸食前米飲下蒸雞丸治癆疳骨蒸潮熱面黃肌瘦日夜啼哭多渴少食黃連柴胡使君子丹參秦艽知母蕪荑各一兩鶴蝨半兩上為末以黃雄雞一隻重一斤者以火麻子餵之五七日去毛令淨於肋上開一孔去肚雜淨拭乾入前藥於中以線縫之用黑豆鋪甑底二寸厚安雞於豆上又以豆蓋之蒸之自早至晚候冷取雞肉和藥爛搗如泥如硬入酒糊和之丸如綠豆大每一歲兒服二十丸米飲下二歲三十丸忌食豬肉黃雞肉鱉血煎治小兒癆疳川黃連胡黃連各二兩柴胡川芎各半兩蕪荑三錢使君子煨二十枚人參三錢上用鱉血一杯吳茱萸半兩拌和二連醃一宿次早炒乾只用二連和前藥為末粟米糊丸黍米大米飲下十丸無辜疳無辜疳者腦後及項結核如彈按之活動軟而不痛久則肢體癰瘡便利膿血壯熱黃瘦頭露骨高是也一雲兒衣夜露天空之下無辜鳥羽所染兒著此衣感其惡氣遂成無辜疳證此其說之不近理者君子審之蚵蚾丸一名糞蛆丸一名五穀精治小兒無辜諸疳一服退熱一服止渴一服住瀉蟾蜍一枚則癩蝦蟆六月多在溝渠園地上不跳不鳴腹大身如癩皮投於尿桶中取大糞蛆一杓投入蝦蟆食蛆蛆食蝦蟆久久蛆食之盡然後以布袋或密囊盛蛆於急流水中漂一日取起鋪大石板上於日中曬死乾燥為末入麝少許飯和上搗為丸黍米大每服二三十丸米飲下此方累有活幼之功丁奚哺露第三病機丁奚哺露者皆因脾胃久虛不能克化水穀以榮氣血故肌肉消瘦腎氣不足漸致肉枯骨露亦有胎中受病於母手足極細項小骨高腹大臍突或生谷瘕是為丁奚若往來蒸熱顱囟分開吐乳吐蟲煩渴嘔噦是為哺露此蓋疳證之極而因其形以名之也藥方十全丹治小兒丁奚哺露青皮陳皮莪朮炮川芎五靈脂白豆蔻檳榔蘆薈木香使君子蝦蟆各二錢炙上為末豬膽汁浸膏糊丸麻子大每服二十丸米飲下大蘆薈丸治前證方見疳門嘔吐門第四病機嘔者有聲也吐者吐出乳食也凡小兒乳哺不宜過飽若滿則溢故令嘔吐乳母無知但欲速得兒長更無時度或兒睡著而強乳自此受病之源漸至日深遂成嘔吐甚者宜漸斷乳先令乳母服調氣之劑兒服消食丸化乳壯胃為上蓋吐乳嘔乳證有數般有冷吐有熱吐當辨審之若吐自口角出此是乳多不能消化滿而則溢此非病也當服消乳丸熱吐則頭額溫或有黃涎五心熱小便赤少或唇乾而煩渴多是暑月傷暑成此證乳母服香薷散五苓散兒服香薷湯五苓散冷吐則清涎夾乳吐出小便清而多由乳母當風取涼解脫致令風冷之氣入乳令乳變敗兒飲之則冷氣入胃故嘔吐也乳母宜捏去舊宿乳服理中湯快氣助胃之劑次用釀乳法茯苓半夏湯加減觀音散快胃之藥又有風痰吐者乃是傷風不解吐乳夾痰久必生風宜服青州白丸子半夏散疏風化痰之劑脈候寸口脈沉遲冷吐脈浮洪數者熱吐脈微細不語者難治小兒乳後便嘔吐更兼脈亂無憂慮治法小兒嘔吐難以概舉有冷吐熱吐積吐傷乳吐朱奉議以半夏生薑為主亦有食滯心肺之分為邪食不得下而反出者鄭氏云但吐不瀉為逆吐而有痰發驚者危治之當斷乳但與稀粥食傷乳吐者哺乳後即吐此因乳食無度脾氣弱不能運化故也譬如小器盛物滿則溢更當節乳小兒吐乳身熱而吐乳成片是胃熱積熱恐生風吐乳不化夾清水是胃冷必面青唇白者是也食生冷或傷宿乳不納而出宜溫胃去風寒除宿冷宜理中湯定吐飲如諸藥不效者以參香飲治冷吐者冬月多有感冒風寒由乳母感受寒氣承寒便乳兒冷氣入兒胃中嘔吐喜熱惡寒四肢悽清寒吐必夾清涎吐出以溫中藥服丁香丸藿香正氣散加丁香四君子湯加丁香橘紅乾薑炮生薑棗去核同煎食前服寒極者理中湯加附子炮去皮尖臍量虛實治之熱吐者面赤唇紅吐次少而出多乳片消而色黃遍體熱甚或因暑氣在胃或食熱物精神不快而多煩躁此熱吐也宜去桂五苓散及香薷飲治之又熱吐即似驚吐有黃涎夾乳食成片頭額溫五心熱小便赤少或乾嘔無物夏秋間多有此五苓二陳治之藥方白豆蔻散治小兒脾胃不和憎寒壯熱腹嘔吐熱不納乳食枇杷葉白豆蔻陳皮去白黃耆各半兩炙木瓜人參甘草各二錢半炙川芎一錢上咀每服一錢薑棗煎服量兒大小加減平胃散治吐逆頻並手足心熱不進乳食方見脾胃門加藿香名正氣散通治嘔吐人參散調中和氣止嘔逆遂除煩渴昏困多睡乳食減少及傷寒時氣胃氣不順吐利止後燥渴不解乾薑二兩人參白茯苓各一兩木香甘草炙二錢半藿香二錢半上咀每服一錢水一盞煎服定吐紫金核治男女小兒一切吐神效半夏制人參白朮木香丁香藿香各二錢半上為末薑汁糊丸李核大外用沉香硃砂各一錢研末為衣陰乾每用一丸以膠棗一枚去核入藥在內濕紙包煨熟嚼服與米飯壓之食乳者擂碎米湯加薑湯調服靈砂白丸子治小兒吐乳不止恐成脾風靈砂一粒青州白丸子五粒方見風門上用研末薑湯米飲下吐久虛甚者對停用益黃散治小兒脾胃虛弱腹痛泄利不思乳食嘔吐不止困乏懶心脅膨脹顏色青黃懨懨不醒丁香半兩橘紅二兩甘草炙訶子炮去核青皮各一兩上為細末每服二錢水七分煎五分食前服量大小加減神效消乳丸溫中快膈止嘔消乳食脈沉者傷食不化故也香附子一兩砂仁陳皮甘草炙各半兩神麯炒麥芽炒各一兩上為末麵糊丸黍米大七歲兒丸綠豆大食後薑湯吞下二三十丸可與消食丸參看方見脾胃丁香散治胃虛氣逆嘔吐不定精神不安羸困霍亂人參五分丁香藿香各二錢半洗上咀每服一錢水半盞煎五七沸入乳汁少許熱服半夏散治小兒胃虛嘔吐水穀不化半夏一兩泡七次陳糯米上咀姜五片棗一枚同煎香薷散治臟腑冷熱不調飲食不節風冷之所傷致令真氣相干腸胃虛弱心腹疼痛霍亂氣逆有吐利發熱頭疼或嘔或瀉或轉筋拘急及寒暑香薷一兩厚朴制扁豆各半兩炒上咀每服二錢姜煎一方加黃連治瀉痢一方加芎芷香蘇散治霍亂吐瀉暑月感冒傷暑之證竹茹湯治胃受邪熱心煩喜冷嘔吐不止乾葛七錢半半夏半兩泡甘草一錢每服三錢水一盞竹茹一塊姜五片煎一方加茯苓丁蓮散治吐乳傷食丁香蓮肉去心枇杷葉各等分薑汁塗炙熟上為末每服一錢米飲調下益胃散快膈益脾止嘔進食木香丁香藿香洗陳皮砂仁白豆蔻茯苓甘草各等分上為末每服一錢用生薑棗湯下茯苓半夏湯治諸嘔噦心下堅痞膈間有水痰眩悸半夏制兩半茯苓三兩上為咀每服三錢姜三片煎泄瀉門第五病機泄瀉乃脾胃顓病凡飲食寒熱三者不調此為內因必致泄瀉又經所論春傷風夏飧泄夏傷暑秋傷濕皆為外因亦致泄瀉醫者當於各類求之毋徒用一止瀉之方而云概可施治此則誤兒豈淺云耳若不治本則瀉皆暫止而復瀉耽誤既久脾胃益虛變生他證良醫莫救脈候脈弦者食積瀉脈微小虛寒瀉小兒泄瀉微緩者生洪大急數者危初生及未滿三歲看虎口脈紋治法小兒泄瀉證非一端有冷瀉有熱瀉有傷食瀉有風瀉有驚瀉當詳辨其證而治之冷瀉者脾胃受冷肚痛穀不化小便清大便黃白或如糟粕手足厥冷當服理中湯益黃散人參藿香等散熱瀉者大便黃赤小便赤少口渴煩躁醫者不明但用豆蔻訶子等服之如水澆石用錢氏白朮散去木香五苓散去桂服之熱甚者四逆散黃連丸調中湯去大黃加黃連枳殼治之如挾熱而太陽與少陽合病自下利者黃芩湯嘔加半夏又挾熱瀉痢而小便閉澀赤甚者加減四順清涼飲服之傷食瀉者由乳食過飽坐臥風冷之所傷食油膩之物遂成食瀉宜先服紫霜丸取下其積不可便補經云食瀉重當取疳虛用補虛進食丸感應丸紫霜丸量虛實先取其積盡次以加減益黃散異功散四君子湯調理之驚瀉者由慢驚病後或吐胃虛或氣弱因驚眼白如淡墨大便青黃此瀉宜至聖保命丹鉤藤飲主之或乳隨糞下消乳熱進食丸主之或微渴心脾喘燥狂熱此瀉尤難治硃砂五苓散主之冷者定命飲子服後與溫驚朱君散睡驚太乙丹等藥治之大要散風邪消積滯開胃進食養脾之藥惟傷食泄瀉者必惡食發熱心腹脹痛下酸臭先以疏利其食服消積丸鶴頂丹微疏導不可峻取後消食藥治之食積泄瀉者積聚停飲痞膈中滿脅肋疼痛夜熱晝涼口吐酸水嘔逆注瀉脈實者先利而後補服消積丸鶴頂丹下後服消導藥虛者先補而後下傷風泄瀉者脾臟虛怯也當初若脾實者先解風熱服藿香散風熱已退微熱者參朮散褐丸子脾虛者服醒脾散實脾散假令春月間多有傷風咳嗽泄瀉者表裡俱虛服藿香正氣散倍加茯苓去皮白朮生薑棗去核同煎痰嗽發熱微瀉者服人參羌活散加半夏曲同煎後服加味四君子湯參朮散止瀉治之夏月傷暑泄瀉者其證面垢煩躁作渴飲水漿頭熱嘔吐泄瀉服丁香丸定吐紫金核先定吐後用參朮散發熱渴不止者參朮散加天水散滾白湯調秋月痰嗽泄瀉者六和湯冬月感寒泄瀉者助胃膏益黃散加肉豆蔻生薑棗去核煎服寒極者附子理中湯吐瀉脾胃俱虛欲作慢驚服烏蠍四君子湯生薑棗去核煎服或實脾散全蠍觀音散治之中濕泄瀉者著冷腸鳴肚腹痛手足寒服理中湯大養脾丸藿香正氣散腹痛加桂乾薑伏暑加藿香寒暑同用藥方藿香散治小兒脾胃不調作瀉青黃黑白乳食不消糞中有如雞子清兼瀉如水其證腹痛微熱陳皮藿香洗枳殼炒厚朴制甘草各等分上為末紫蘇湯調下或米湯下亦可如黃白色木瓜湯下如瀉止棗湯下大能和胃進食香橘餅治積瀉冷瀉傷食泄瀉木香青皮炒陳皮各二錢半厚朴神麯炒麥芽炒各半兩上為末煉蜜丸餅或米湯下調中散治傷食瀉先用紫霜丸取積然後服此補之經云食瀉重當取疳虛用補虛良醫明妙理何慮疾難瘳人參茯苓白朮乾薑砂仁木香丁香甘草炙藿香洗香附子炒各等分上為末薑棗煎湯肚腹痛白湯下大小以意加減服錢氏白朮散治泄瀉並吐瀉止渴人參茯苓白朮藿香乾薑炮各三錢甘草炙一錢木香五分上咀每服三錢水一盞姜三片同煎參苓白朮散治脾胃虛弱泄瀉不止及大病後以此養胃人參白朮茯苓甘草炙白扁豆山藥砂仁蓮肉薏苡仁桔梗各一兩上為末每服五分棗湯米湯下六神湯治脾虛吐瀉不進飲食黃耆炙扁豆炒人參白朮茯苓粉草炙各等分加藿香亦可上銼每服二錢薑棗煎或作末薑棗湯調服胃苓湯治泄瀉脾胃不和傷食瀉豬苓澤瀉白朮茯苓厚朴陳皮甘草各等分上為末每服二錢薑燈芯陳米煎湯調服人參安胃散出東垣方治暑熱傷乳損其脾胃吐瀉久恐成慢風人參二錢黃耆四錢生甘草炙甘草各一錢芍藥二錢茯苓陳皮黃連各二錢上咀每服二錢水一盞煎食前溫服全蠍觀音散治吐瀉截風定志恐變成慢驚黃耆炙人參各二錢半木香甘草炙蓮肉去心扁豆一錢茯苓白芷全蠍羌活各一錢防風天麻各一錢上為末每服二錢薑棗湯調服或煎服亦可朱君散治虛弱驚悸吐瀉後有此證並糞青者宜服四君子湯加辰砂麝香末用燈芯鉤藤湯調下豆蔻餅方見痘疹門益黃散方見吐門消食丸方見脾胃黃芩湯方見痢門定命散方見驚門紫霜丸方見變蒸至聖丸方見胎門生薑瀉心湯方見痢門調中湯方見痢門理中湯方見吐瀉以上十方皆治吐泄瀉可對證用霍亂吐瀉門第六病機脾居中州胃為水穀之海乳哺入胃脾能克化然後水穀分其清濁傳變得宜則無吐瀉之患凡小兒上吐不止下瀉不住皆因內外傷侵兼以調護失常乳食不節遂使脾胃虛弱清濁相干蘊作而成有先瀉而後吐者乃脾胃虛冷其候先瀉白水吐亦不多口氣緩而神色慢額前有汗六脈沉濡此為冷也先吐而後瀉者乃脾胃有熱氣促唇紅吐來面赤脈洪而數渴飲水漿此為熱也冷熱之分須要詳審傷風吐瀉身溫乍寒乍熱多氣粗大便黃白色嘔吐乳食完穀不消時咳嗽更五臟兼見證宜先服鉤藤散後用益黃散香樸散主之及有吐瀉身熱多睡能食乳飲水不止吐痰大便黃水皆為胃虛熱渴瀉也當生胃中津液以止其渴後服發散止渴多服白朮散鉤藤散吐瀉身涼吐沫青白色悶亂不渴氣腫露睛當補脾宜加減四君子湯藿香散銀白散主之夏月傷暑吐瀉手足厥冷者理中湯藿香正氣散五順散車前子散不換金正氣散可選而用之如吐瀉之證有風搐欲成慢候可看慢脾方論治之脈候內經云脈浮者霍亂劉宗厚云霍亂脈來浮洪者可治微而遲氣少不語者難治脈訣云小兒乳後輒嘔逆更兼脈亂無憂慮治法錢仲陽云夏至後十日吐瀉身壯熱此熱也蓋小兒臟腑十分中九分熱也或因傷熱乳食不消瀉深黃色玉露散主之大暑節後吐瀉身溫以熱臟腑中六分熱四分冷也嘔吐乳食前少服益黃散食後多服玉露散立秋後七日吐瀉身溫臟腑中三分熱七分冷也不能食乳多睡悶亂哽氣長出氣露睛唇白多噦欲大便不渴食前多服益黃散食後少服玉露散秋分後吐瀉身冷無陽也不能食乳乾噦瀉青水當以補脾益黃散主之鄭氏云小兒吐瀉因外傷風冷內傷乳食或兒啼未定氣息未調以乳飼之氣逆於上則停滯胸膈致令嘔吐氣逆於下則傷脾胃致令泄瀉上下氣逆吐瀉俱作凡小兒只吐不瀉者逆其吐必有痰發驚者十無一生若只瀉不吐或吐瀉俱發者日久不退亦變陰癇治之當暫斷其乳輕者周時重者三日宜頻與稀粥服藥速效十全八九或者不信是言以小兒藉乳為命不肯暫斷然乳固不可斷也殊不知因乳所傷得之者若再以所傷之乳乳之如抱薪救火而暴吐瀉者脾胃俱虛參朮散加薑棗去核煎服以正胃氣大法吐瀉傷冷者理中湯傷熱者五苓散藥方理中湯治脾胃不和心腹攻痛痰逆噁心嘔吐心下虛煩痞滿膈塞不通飲食減少短氣羸困溫中逐水止汗去濕泄瀉注下水穀不分腹中雷鳴霍亂吐瀉手足厥冷並治人參白朮乾薑煨各一兩甘草炙半兩上每服二錢姜三片棗一枚煎腹痛加人參渴加白朮寒加薑附吐多去白朮加生薑瀉多仍用術悸者加茯苓四肢厥冷下利轉筋可加附子為末煉蜜丸名理中丸治厥冷臟寒吐長蟲或胃中虛冷先服理中丸五苓散治傷暑霍亂吐瀉身熱口渴白朮茯苓豬苓澤瀉各一錢官桂三分上水一盞姜三片燈芯十莖煎五分服藿香正氣散治霍亂吐瀉反胃嘔逆噁心腹冷痛臟腑虛鳴山嵐瘴氣瘧疾遍身虛腫小兒疳傷及治傷寒頭疼壯熱止喘咳五勞七傷八般風痰並宜服之大腹皮洗白芷紫蘇茯苓各半兩半夏泡七次白朮陳皮厚朴薑汁炒桔梗各一兩藿香兩半洗甘草炙一兩上咀每服二錢姜三片棗一枚同煎不換金正氣散治山嵐瘴氣寒熱往來霍亂吐瀉臟虛寒厚朴藿香陳皮半夏泡蒼朮甘草各等分薑棗水煎服藿香散治時氣吐瀉退熱藿香厚朴炒半夏泡白朮乾葛甘草炙各等分水姜煎服銀白散治小兒吐瀉壯胃治糞青扁豆炒糯米各一兩藿香洗丁香白朮甘草炙各一錢上末紫蘇湯下加減四君子湯治小兒吐瀉不止調胃進食扁豆炒藿香甘草黃耆炙人參茯苓白朮各一兩上為末每服一錢入鹽點服或用水煎亦可縮脾飲解伏熱除煩渴消暑止吐利霍亂之後服熱藥太多致煩躁者並宜服之砂仁烏梅肉草果炮去皮甘草炙各半兩乾薑白扁豆炒各三錢每服二錢白水煎服參香散治伏熱瀉虛煩悶亂引飲不止人參白朮香薷半夏泡陳皮茯苓扁豆炒水姜煎服痢疾門第七病機小兒痢疾大抵多由脾胃不和飲食過傷停滯不能克化又為乳母恣食生冷熱毒厚味以傳之又為風寒溫熱之邪以干之故有此疾有裡急窘迫急痛者火性急速而能燥物故也或夏末秋初忽有暴寒折於盛熱無所發散客搏肌膚之中發於外則為瘧發於內則為痢內外俱發則為瘧痢凡痢久則令腫滿下焦偏冷上焦熱結則為上實下虛若脾胃濕熱之毒熏蒸清道而上以致胃口閉塞而成噤口之證又有一方一家之內上下傳染長幼相似是疫毒痢也當先推其歲運以平其外察鬱結以調其內審其所傷別其虛實冷熱以治之條然明白不致妄投也脈候內經曰腸澼下血身熱則死寒則生腸澼下白沫脈沉則生浮則死仲景云下痢脈滑而數者有宿食也當下之治法治痢大法與大人同惟劑輕重耳赤痢積熱窘迫者宜通之次用黃連解毒自止如不止用香連丸地榆散之屬秋後痢疾多因夏傷暑宜調中五苓黃連枳殼或下如豆汁如瘀血宜胃風湯噤口不能食宜石蓮香橘之屬治痢生薑助胃為陽茶葉助胃為陰平調陰陽蜜治痢生薑作片好茶各一錢半蜜水煎服蟲毒痢阿膠黃蘗各二錢用水同煎服痢疾不能飲食邪氣疫毒不能發泄傳入臟腑腸胃摺疊以噤口九死一生脾虛胃弱有熱氣關閉胸中噤口服參苓白朮散加石菖蒲枳殼粳米一撮同煎食前服心氣通胃脘開便能食痢疾不治證小兒下痢如塵腐色者死如屋漏水者死肛門如竹筒不斂者死下血如敗血不收者死凡小兒赤白大下而不禁小水無腹疼發熱唇紅舌胎氣促心煩狂躁不安面色變易如妝飲食全不進穀道傾陷者並不治藥方小香連丸治小兒冷熱腹痛痢下水穀木香訶子肉各一兩黃連吳茱萸炒赤色四兩上為末飯丸綠豆大米飲下十丸至三十丸頓服之地榆散治小兒赤痢因大腸停積熱毒得之或點滴鮮紅地榆訶子肉甘草各等分上為末每服一錢米湯調下一方加黃連枳殼芍藥胃風湯治小兒風冷乘虛入客腸胃水穀不化泄瀉注下及腸胃濕毒下痢如豆汁瘀血日夜無度人參白朮白茯苓川芎當歸芍藥桂少許上為粗未每服三錢入粟米數粒同煎食前服百一選方治小兒噤口痢石蓮肉去殼留心研為末每服五分陳米飲調下此是毒氣上衝心腹藉此以通心氣便覺思食香脯治小兒刮腸下痢噤口不食閉口閤眼至重者精豬肉一兩批薄片膩粉上將豬肉於炭火上慢炙旋鋪膩粉勻成脯每以少許與吃如未知吃且放鼻邊自然要吃此方治胃口有毒食之神效小連丸治小兒赤白痢脾胃虛弱糟粕不聚腹脹不食時作陣痛煩渴身熱黃連三兩乾薑炮一錢當歸阿膠炒各兩半上為末阿膠膏丸小豆大三歲三十丸食前米湯化服養臟湯治小兒冷熱不調下痢赤白或如膿血魚腦裡急後重臍腹絞痛脫肛墜下並治之方見大人痢門參香散治嬰兒臟腑氣虛怯冷熱不調積在臟腑作成痢疾或下鮮血或如豆汁魚腦瘀血或下紫黑血或赤白相雜或成五色裡急後重日夜頻並臍腹絞痛甚不可忍及噤口疳蠱時瘟諸痢無問新久人參白扁豆炒去皮木香各四錢肉豆蔻制茯苓八錢陳皮去白罌粟殼去筋蒂炙各二兩四錢上為極細末用米飲調化食前服豆蔻香連丸治小兒乳食不節腸胃虛弱冷熱之氣客於腸間下赤白痢腸內疼痛日夜頻並不飲乳食黃連炒七錢半肉豆蔻二枚麵包煨丁香二錢半木香訶子炮各半兩上未粟米糊丸黍米大三歲服十丸米飲下烏梅散治下痢後津液減少臟腑虛燥煩渴引飲及治諸病後煩渴引飲無度烏梅肉半兩微炒茯苓木瓜各一兩上為粗未每服二錢水一盞姜一片同煎桃花丸治下痢赤白多並泄瀉青水赤石脂乾薑各等分上未糊丸如麻子大空心服二三十丸米飲下茅花湯治吐血下血鼻衄不止兼治血痢黑痢上用茅花一大把水三盞煎一盞分二服無花以根代之寬腸枳殼散順氣止痢甘草六錢炙枳殼二兩四錢炒為末每服一錢空心沸湯調下黃連解毒湯生薑湯黃芩湯調中湯以上四方俱治痢腹痛門第八病機小兒腹痛之病誠為急切凡初生二三個月及一周之內多有腹痛之患無故啼哭不已或夜間啼哭之甚多是腹痛之故大都不外寒熱二因夫因於寒者面白唇青或瀉痢清白以熱綿裹腹而啼少止即是寒也因於熱者面赤唇紅得暖啼甚即是熱也一周之外能吃飲食則有傷食腹痛或瀉或不瀉口渴而臭面黃身熱即是積痛久而不愈必至成疳除此三因之外則如內經舉痛論篇云五臟卒痛寒邪客經其機不可不察也若類萃小兒等方概言寒邪而不及熱與積是則以管窺豹未見其全斑也脈候小兒脾胃脈弦食積痛脈遲微為寒痛陰弦則腹痛弦急小腹痛尺脈緊臍下痛心腹痛不得息脈細小遲者生堅實大者死腹痛脈大而長者死治法腹痛乃邪正交攻相擊而作也挾熱痛者以面赤或壯熱四肢煩手心熱見之挾冷者以面色青白見之冷甚則變證唇口黑爪甲青矣熱證黃芩芍藥湯四順清涼飲冷證理中湯指迷七氣湯加桂煎調蘇合丸錢氏云小兒積痛面黃目白無精光多睡畏食大便酸臭者當用消積丸甚者白餅子下之後和胃凡蟲痛多在心腹口吐清水安蟲散主之藥方理中湯治小兒受寒腹痛人參白朮炙甘草炮乾薑上等分每服三錢水一盞煎五分熱服七氣湯治七氣傷脾結聚大腹痛不能乳食半夏制一兩人參二錢甘草炙桂心各一錢上咀每服二錢薑棗煎食前服指迷七氣湯治陰陽不升降氣滯作痛青皮陳皮桔梗莪朮炮肉桂藿香益智仁香附子制半夏制甘草各等分每服二錢薑棗煎桔梗枳殼湯治諸氣痞悶心腹疼痛桔梗枳殼各等分甘草減半每服二錢姜煎服芍藥甘草湯治熱腹痛小便不通及治痘疹肚痛芍藥一錢甘草五分白水煎加黃芩名黃芩芍藥湯四順清涼飲治小兒血脈壅實臟腑生熱頰赤多渴五心煩躁睡不寧四肢驚掣及因乳哺不時寒溫失度令兒血氣不順脾胃不調或濕吐連滯欲成伏熱或壯熱不飲欲發驚癇又治風熱結核頭面瘡瘍目赤咽痛餘毒一切壅滯並宜服之芍藥當歸甘草大黃各等分上咀三歲兒服一錢水半盞煎服胃風邪加去節麻黃中風體強目上視加獨活平胃保和湯即平胃加山楂麥芽積滯門第九病機活幼心書云小兒所患之證皆因乳哺不節過食生冷堅硬之物脾胃不能克化停積中脘外為風寒所傷或因夜臥失蓋致頭痛面黃身熱眼胞微腫腹痛膨脹足冷肚熱喜睡神昏不思飲食或嘔噦噫氣吞酸大便腥臭此為沉積所傷但凡小兒有積面目黃腫肚熱脹痛好睏惡食小便如漿大便或秘或溏啼哭夜煩便利無禁糞白而酸此皆積證也然有乳積有食積有氣積要當明辨吐乳瀉乳其氣酸臭此由叫啼未已以乳與兒停滯不化是為乳積肚硬帶熱渴瀉或嘔此由飲食無度多餐過飽飽後即睡得之是為食積腹痛啼叫利如蟹沫此因觸忤其氣榮衛不和淹延日久得之是為氣積有時時泄下清水如生草汁是受驚而後有積煩悶啾唧常似生嗔名為驚積小兒醫者亦惟因其重輕虛實而治之可也脈候脈訣云小兒脈沉緩為傷食右手氣口脈大於人迎一二倍為傷食宿食不消即右關脈沉而滑經云脈滑者有宿食也虎口脈紋黃色為脾家有積脈經云小兒脈沉者為乳不消治法小兒諸疾皆由乳食無度過於飽傷以致不能克化留而成積初得之時不問乳積食積氣積並以木香丸消積丸之類其驚積以辰砂膏或青龍丸量輕重而疏導之仍以調氣和胃取愈大抵小兒肚腹或熱或脹或堅硬皆由內實法當疏利之故東垣云食者有形之物傷之則宜損其食其次莫若消導丁香爛飯丸枳朮丸之類主之稍重則攻化三稜消積丸木香見哯丸之類主之尤重或吐或下瓜蒂散備急丸之類主之以平為期不可太過蓋脾已傷又以藥傷鮮有生者蓋青皮一味治小兒積病雖不可無亦不可過多損真氣大能發汗有汗者不可用藥方五珍丸治小兒食積青皮炒黃乾薑炮存性五靈脂莪朮各一兩上為末和勻稱藥末一兩肥巴豆去油稱一錢研拌和粳米飯糊丸麻子大每服三五丸飢時米飲下丁香爛飲丸治小兒飲食所傷丁香皮甘草炙各一錢砂仁益智仁炒甘松各二錢丁香三稜炮木香莪朮炮各一錢香附子半兩上未蒸餅丸綠豆大每服五七丸白湯下三稜消積丸治傷生冷硬心腹脹痛丁皮益智仁各三錢陳皮青皮各半兩茴香炒半兩炒曲廣朮炮三稜炮各七錢巴豆糯米炒去米五錢上未醋糊丸如麻子大每服十丸溫薑湯下食前量虛實加減服平胃散治脾胃不和不思乳食心腹刺痛口苦無味嘔噦噁心噫氣吐酸面色痿黃體弱肌瘦肚腹泄瀉並服之方見脾胃門快膈消食丸寬中消宿食砂仁橘紅三稜煨蓬莪朮神麯炒麥芽炒各半兩香附子一兩炒上未麵糊丸綠豆大食後紫蘇湯下二十丸藿香散治小兒臟腑不調作瀉青黑黃白乳食不消糞中有如雞子清兼瀉如水其證腹痛微熱陳皮藿香洗枳殼炒厚朴薑汁炒甘草各等分上未紫蘇湯調下或米湯下亦可如黃白色木瓜湯下如瀉止用棗湯下大能和胃進食痞癖門第十病機仁齋云痞者塞也結者實也熱氣蘊於胸膈之間留飲聚於腰脅之內於是榮衛不得流行臟腑不得宣通腹滿而致痞結勢使然耳此實熱之證也或發為壯熱是也癖者血膜包水癖側於脅旁時時作痛惟癖為能發潮熱為能生寒熱故瘧脈家中脘多蓄黃水日久而後結癖寒熱之起小兒臟腑和平榮衛調暢則津液自然流通縱使多飲水漿不能為病惟乳哺失調三焦關膈以致水漿停滯腸胃不得宣行冷熱相搏於是結聚而成癖也脈候脈訣云小兒脈伏結為物聚錢氏云小兒脈沉細為癖積脈經云脈來細而附骨來者積也治法錢氏曰腹中有癖不食但飲乳是也當漸用白餅子下之小兒病癖由乳母乳食不消伏在腹中乍涼乍熱相類不早治必成疳以其有癖則令兒不食致脾胃虛而發熱故引飲過多即滌盪腸胃亡失津液脾胃不能傳化水穀其脈沉細益不食脾胃虛衰四肢不舉諸邪遂生而成疳矣輕者用仁齋木香丸重用取癖丸痞結甚者用聖思甘露散主之羅謙甫云一小兒病癖積在左脅下硬如覆手肚大青筋發熱肌瘦咳嗽自汗日晡尤甚牙疳口臭惡宣露出血四肢困倦飲食減少病甚危篤太醫劉仲安先生治之約百日可愈先與沉香海金沙丸一服下穢物兩三行次日合塌氣丸服之十日復以沉香海金砂丸利之又令服塌氣丸如此五換服至月餘其癖減半及百日良愈近年多有此疾愈之者多錄之以救將來之病者也藥方木香檳榔丸疏導三焦寬利胸膈破痰逐飲快氣消食郁李仁去皮皂角去皮炙半夏泡枳殼青皮杏仁去皮尖炒木香檳榔各二錢上為末另將皂角四兩用水一腕熬成膏入煉熟蜜少許丸綠豆大每服十丸食後薑湯下下積丸治食傷積心腹脹滿氣粗壯熱或瀉或嘔丁香砂仁各二十粒使君子五枚烏梅巴豆霜各三個上末橘飯丸麻子大每服三丸陳皮湯下化鐵丹治食積肚硬帶熱渴瀉脾胃不和宿食不化烏梅肉八個巴豆十六粒去油膜青皮去穰陳皮各半兩去白上未醋糊丸麻子大每服七丸米飲下或淡薑湯下三稜莪朮丸治積滯痞塊乳癖莪朮一兩用巴豆三十粒同炒去巴豆川楝子茴香三稜酒浸一宿枳殼各半兩木香三錢丁皮半兩青皮半兩上未醋糊丸綠豆大每服三丸淡薑湯下異香散取積後調理脾胃蓮肉二兩莪朮煨益智仁三稜煨甘草各半兩青皮去穰陳皮各二錢厚朴一兩上咀每服二錢水一盞姜二片棗一枚入鹽少許煎食前服挨癖丸治乳癖谷症腹中塊痛代赭石煅醋淬碎細乳青皮木香莪朮五靈脂北大黃各三錢巴豆去油盡一錢上末醋糊丸麻子大每服二丸食後薑湯下三稜煎丸治小兒飲食過度痞悶疼痛食不消化久而成癖也此藥專治婦人血積血塊尤驗廣朮黑角者佳三稜二味濕紙包煨香為末各一兩大黃半斤為末上大黃銀器內以好醋浸令平滿慢火熬可以二味為丸如梧桐子大或綠豆大每服十丸至十五丸食後溫水下量虛實加減青礞石丸治小兒奶癖硫黃三錢青礞石五靈脂鍋底黑各錢半白丁香一錢上為末米飯丸綠豆大捻作餅子每服二十餅溫水送下鱉甲豬肚丸治小兒癖積發熱柴胡一兩黃連鱉甲九肋者佳醋炙黃色各七錢枳實木香青皮各半兩上入干青蒿七錢同為末以猔豬肚一個去油盛藥蒸熟同搗和為丸梧桐子大每服十丸煎人參湯送下食後服木香丸治吐乳瀉乳其氣腥臭由啼叫不已以乳與兒停滯不化是為乳積肚硬熱吐瀉由飲食無度過飽即睡是為食積腹痛啼叫利如蟹沫忤其氣榮衛不和淹延是為氣積瘧後肚內結塊腹中有癖木香蒼朮砂仁青皮辰砂另研代赭石丁香巴豆霜各錢上末麵糊丸麻子大風乾每服二三丸隨所傷物下腫脹門第十一病機丹溪云脾虛不能制水腎虛不能行水胃與脾合為水穀之海因脾虛而不能傳化腎水氾濫反得以浸漬脾土於是三焦停滯經絡壅塞水滲於皮膚注於肌肉而發腫也其狀自目胞下微起肢體重著咳嗽怔忡股間清冷小便澀黃皮薄而光手按成凹舉手即滿是也古方有十種論證以短氣不得臥為心水兩脅緊痛為肝水大便鴨溏為肺水四肢苦重為脾水腰痛足冷為腎水口苦咽乾為膽水下虛上實為大腸水腹急肢瘦為膀胱水小便秘澀為胃水小腹急滿為小腸水諸家只知治濕多利小便之說執此一途用諸利水之藥往往多死殊不知脾極虛損雖劫目前水氣復來束手待斃大都小兒尤是飲食傷脾不能行水而作脹腫只用實脾為主佐之分證治而得之矣脈候脈經云水病脈洪大者可治微細者不可治水病脹閉其脈大軟者生沉細虛小者死水病腹大如鼓實者生虛者死治法水腫不治證凡水腫先起於四肢而後歸於腹者不治大便滑泄與夫唇黑缺盆平臍突足平背平或肉硬或手掌平或男從腳下腫而上女從身上腫而下並皆不治藥方分氣飲治小兒腫脹作喘氣短而急四肢浮腫桔梗炒赤茯苓陳皮桑白皮大腹皮洗枳殼炒半夏泡甘草炙真蘇子微炒紫蘇各二錢草果一錢煨去殼加木通上咀每服二錢水一盞姜三片棗一枚同煎溫脾散治小兒脾不和虛脹不乳食憎寒壯熱困倦無力訶子肉炮人參各七錢半甘草二錢半炙白朮木香茯苓藿香泡陳皮黃耆桔梗各半兩上未每服二錢薑棗煎服大橘皮湯治濕熱內攻腹脹水腫小便不利大便滑泄陳皮兩半木香二錢半滑石六兩檳榔三錢茯苓一兩豬苓白朮澤瀉肉桂各半兩甘草一錢上咀每服三錢水一盞煎服實脾散治小兒陰水發腫用此先實脾土厚朴姜炒白朮木瓜木香乾薑炮各一兩草果仁大腹皮附子白茯苓甘草炙各半兩上咀每服三錢薑棗水煎服疏鑿飲子治水氣通身浮腫喘呼氣急煩渴大小便不利方見大人門加味五皮飲治小兒四肢腫滿陽水陰水皆可服之茯苓皮咀一錢內加薑黃一錢五加皮地骨皮生薑皮大腹皮木瓜各五分上作一服水煎一方用陳皮桑白皮無五加皮消腫丸治小兒水腫喘滿小便不利滑石木通白朮黑牽牛炒通脫木茯苓茯神半夏陳皮各一兩木香瞿麥穗丁香各半兩上為末酒糊丸梧桐子大每服二十丸空心麥門冬燈芯湯下退腫塌氣散治驚木積水用飲過多停積於脾故四肢浮腫蘿蔔子赤小豆炒陳皮各半兩木香一錢甘草三錢上咀薑棗煎三歲兒每服二錢勻氣散治脾肺氣逆喘嗽面浮小便不利桑白皮炙桔梗炒赤茯苓甘草各半兩陳皮七錢藿香三錢木通二兩上咀每服二錢薑燈芯煎服三稜丸治小兒停積腹脅脹滿乾嘔噁心全不入食三稜炮木香神麯炒陳皮半夏制各一兩丁香桂心各半兩上為末麵糊丸粟米大乳食後薑湯下二十丸蛔蟲門第十二病機脈候蛔蟲者九蟲內之一蟲也長一尺亦長五六寸者蓋因臟腑虛弱而動或因食肥甘而動其動則腹中痛發作腫聚行束上下痛有休止亦攻心痛口喜吐涎及清水貫腸心者即死論其脈腹中痛其脈發當沉弱而弦今反脈大即是蛔蟲也此痛因食物太早受甜怕痛時便高聲啼叫只看人中上鼻頭唇口一時黑色即是治法此證當服使君子丸檳榔散化蟲丸取下便無事仲景云蛔厥者其人當吐蛔今病者靜前後煩此五臟寒烏梅丸主之其蛔蟲穿者用薏苡根煎服即安藥方使君子丸治小兒五疳脾胃不和心腹脹時或疼痛不進乳食漸至羸瘦厚朴陳皮各一兩使君子肉一兩湯泡去黑皮甘草川芎各二錢半加芍藥上未煉蜜丸芡實子大每服一丸空心米飲下化蟲丸治小兒蟲咬心痛來去不定不思乳食鶴蝨檳榔胡粉苦楝根各半兩明礬三錢五分半生半枯上末麵糊丸綠豆大三歲服三十丸熟水入香油二滴吞下食前如有小蟲皆化為水大蟲自利下初服甚效烏梅丸治蛔蟲上入其膈故須臾復上得食而嘔又煩者咽聞食臭服此當自吐蛔又治久痢烏梅二十三枚乾薑兩二錢炮黃連二兩川椒當歸各半兩細辛附子炮去皮臍人參桂枝黃蘗各七錢上為末用酒浸烏梅肉一宿去核蒸飯杵成泥和藥勻丸如麻子大食後服十丸日三服忌生冷物咳嗽門第十三病機內經曰五臟六腑皆令人咳非獨肺也皮毛者肺之合也皮毛先受邪氣邪氣聽從其令也五臟之咳久乃移於六腑始傷肺氣終動脾濕故咳而又嗽也經曰秋傷於濕冬必咳嗽大抵素秋之氣宜清肅及動之則氣上衝而為咳嗽久則動脾濕而為痰也大法與大人同脈候脈經曰關上脈微為嗽脈浮緩者為傷風脈緊者肺寒咳嗽脈浮軟者生弦急者死治法錢氏曰嗽者肺盛微寒八九月肺氣大旺病嗽者其病必實非久病也其證面赤身熱痰盛法當以葶藶丸下之若久者不可下也十一月十二月嗽者傷風嗽也風從背脊第三椎肺俞入也以麻黃湯汗之有熱證面赤便水涎熱咽喉秘者甘桔湯治之若五七日之間其身熱痰盛涕唾稠黏者以褊銀丸下之有肺盛者咳而後喘面腫欲飲水者有不飲水者其身則熱以瀉白散瀉之若傷寒咳嗽五七日無熱證而但嗽者亦葶藶丸主之後用化痰藥而肺虛者咳而哽氣時時長出氣喉中有聲此久病也以阿膠散主之痰盛者先實脾後以褊銀丸下之涎退則補肺為上法有嗽而吐水或清綠水者以百祥丸下之有嗽而吐痰涎乳食者以白餅子下之有嗽而痰咳膿血者乃肺熱食後服甘桔湯久嗽者肺亡津液阿膠散補之咳而痰實不甚喘而面赤時飲水者褊銀丸下之治嗽大法盛則下之久則補之更量虛實以意增減傷風發熱咳嗽者宜先發散其表人參羌活散加麻黃或金沸草散加桑白皮惺惺散參蘇飲皆是發散之藥熱不除解肌湯主之假如表散風邪無別證微嗽者服抱龍丸瀉白散平肺之劑痰涎壅盛玉餅子金星丸下痰熱瀉白散加人參或辰砂半夏丸抱龍丸尤良下後熱不退作驚風之狀宜以薄荷散服感寒發熱咳嗽者服惺惺散加麻黃表散寒邪微嗽杏仁膏人參半夏丸痰嗽半夏茯苓湯久嗽曾經解利肺氣虛寒宜補肺服補肺阿膠散潤肺散肺中風肺受寒久不已灸肺俞穴三壯服百部丸陳皮罌粟殼桑根白皮煎湯研化食後服小兒初生百日內咳嗽肺葉脆弱最為難治平常冷熱邪入肺中無能得出又不堪吐利必明病源消解風寒化痰順氣益肺生津胃開氣壯嗽即漸減不可強攻冷嗽則鼻流清涕面白痰薄日輕夜重或微有邪熱熱嗽則面微紅鼻乾熱痰稠脈浮數胃熱不因風寒而得以兒啼便乳壅結心肺不散即嗽而逆以玉餅子下錢氏治嗽之法先實脾脾母得實肺則和平小兒咳嗽者腠理受風邪感激臉紅喘促辨虛實若見唇縮胸前陷鼻枯乾黑皆為不治藥方參蘇飲治嬰兒感冒風寒發熱頭疼咳嗽痰涎並宜服之人參蘇葉葛根前胡半夏曲茯苓陳皮枳殼桔梗甘草各等分上咀每服三錢薑棗煎服華蓋散金沸草散甘桔湯瀉白散以上方並見大人瀉門阿膠散治小兒久嗽無津液阿膠半兩炒鼠黏子一錢炒馬兜鈴半兩甘草炙一錢杏仁去皮尖七粒糯米一兩上為末每服一字或咀二錢水一盞煎八分食後服葶藶丸治乳食傷脾傷風咳嗽面赤身熱痰盛喘促甜葶藶炒黑豆炒杏仁去皮尖炒另研漢防己各一兩上為末入杏膏蒸陳棗肉和搗成劑丸如麻子大每服五丸至七丸淡薑湯下乳食後或臨臥服量兒加減杏蘇飲治嬰兒痰氣咳嗽不止杏仁去皮尖炒黃蘇子炒陳皮赤茯苓桑白皮炒大腹皮半夏曲甘草炙各一錢上咀姜一片同煎食遠服七寶散治嬰兒清前散熱化痰定喘止嗽大黃麵包煨梔子仁赤茯芩黃芩赤芍藥炒滑石甘草炙各一錢上為極細末用桑皮煎湯喘急氣滿不睡磨刀水澄清溫暖服白餅子治腹中有癖但乳嗽而吐痰涎滑石半夏南星各制一錢輕粉五分巴豆二十四粒去皮水一升煎水盡為度上研勻巴豆後入眾藥以糯米糊丸綠豆大捏作餅子三歲以上五餅子以下三餅子蔥白煎湯臨臥服褊銀丸治風涎瀉上焦實熱及乳食不消腹脹痰喘等疾巴豆去皮心油水銀各半兩好墨八錢火燒醋淬麝香五分研黑鉛二錢半同水銀結成砂子將巴豆黑鉛研勻和入砂子麝香陳米糊丸綠豆大捻褊一歲一丸以歲以上五六丸薄荷湯放冷送下不可多用量虛實增減食後服百部丸治小兒肺寒壅嗽微喘百部麻黃各三錢杏仁四十粒去皮尖以水略煮上和勻煉蜜丸皂角子大溫水下二三丸咳嗽灸法小兒咳嗽不瘥灸肺俞穴在背上第三椎下兩傍各一寸五分瘧疾門第十四病機經曰夏傷於暑秋必痎瘧蓋傷之淺者近而暴傷之重者遠而為痎痎者久瘧也是知夏傷暑氣閉而不能發泄於外邪氣內行至秋而為瘧也良由乳母抱時解脫不避風寒又因觸冒暑溫致令邪氣客於皮膚痎積於臟腑陰陽偏勝邪正相攻而作往來寒熱也陽盛則熱陰盛則寒先寒而後熱者陽不足也先熱而後寒者陰不足也寒多而熱少者陰勝陽也熱多而寒少者陽勝陰也寒熱相半陰陽交攻也寒熱相間陰陽乍離也大抵小兒皆自飲食上得之者為多須用先與消導然後隨其得病所由而調理之斯為良法脈候要略云瘧脈自弦弦數者多熱弦遲者多寒弦小緊者下之弦遲者溫之弦緊者可發汗浮大者可吐之弦數風熱也以飲食消息止之治法明醫雜著云瘧是風暑之邪有一日一發有二日一發有三日一發有間一日連二日發有日與夜各發有汗無汗有上半日發或下半日發有發於夜者治法邪從外入宜發散之然以扶胃氣為本又須分別陽分陰分而用藥邪瘧及暫發者可散可截虛瘧及久者宜補氣血若過服截藥致傷脾胃則必綿延不休凡熱多寒少無汗者桂枝麻黃各半湯有汗多者柴胡桂枝湯汗多而渴者白虎加桂枝湯小便赤熱多寒少者小柴胡湯寒多熱少者清脾養胃湯久未止者鬼哭散止之熱多汗出為瀉腹痛者大柴胡下之久瘧不愈腸下結塊者木香丸鱉甲飲子調之甚則以神祐丸消之煩渴者五苓有小兒瘧疾用藥退熱太早變作浮腫外腎腫大或食傷於脾胃浮腫者脾之外應也宜大腹皮湯草果飲之類藥方清脾飲治癉瘧肺來弦數但熱不寒或熱多寒少膈滿不能食口苦舌乾心煩渴飲水小便黃赤大便不利青皮炒厚朴炒白朮草果煨柴胡茯苓半夏泡黃芩甘草各等分上為粗末每服三錢姜三片煎食前服四獸飲治五臟氣虛喜怒不節勞逸兼併致陰陽相勝結聚痰飲與衛氣相搏發為瘧疾兼治癉瘧最有神效半夏泡茯苓人參白朮草果炮陳皮各半兩甘草二錢半上咀每服三錢烏梅薑棗各一枚煎服養胃湯治外感風寒內傷生冷溫中快膈能闢山嵐瘴氣寒瘧脾胃虛寒嘔逆噁心並宜服之厚朴炒蒼朮半夏泡藿香洗草果炮茯苓人參各半兩甘草二錢半陳皮七錢半上咀每服三錢棗一枚烏梅一個煎熱服白虎加桂枝湯治小兒瘧病石膏知母甘草桂枝上水一盞粳米一撮煎服草果飲治瘧寒多熱少或遍身浮腫厚朴炒青皮炒草果炮藿香洗半夏泡甘草丁皮神麯炒良薑炒各等分上未每服三錢姜棗煎大腹皮湯治小兒瘧疾用藥太早退熱變作浮腫外腎腫大飲食積於脾胃宜服枳殼蒼朮各二兩甘草二錢大腹皮檳榔三稜炮莪朮各一錢上咀每服三錢姜皮蘿蔔子椒目同煎服參苓湯治小兒瘧後面赤黃泄瀉不止乳食不消此乃胃氣虛弱故脾虛則泄胃虛則吐宜服之丁香訶子炮二錢青皮陳皮白朮茯苓人參肉豆蔻煨各三錢甘草炙二錢上未每服二錢陳米一勺姜一片同煎麻黃根湯治小兒瘧疾盜汗寒熱進退麻黃根知母檳榔三稜炮莪朮炮各一錢半半夏三錢白芷貝母五分常山甘草各一錢上咀每服三錢姜二片小麥十五粒煎常山飲治一切瘧疾知母貝母半夏泡甘草茯苓常山人參草果煨厚朴制各等分上咀每服二錢水半盞薑棗煎空心服鬼哭散止瘧疾入不愈者常山大腹皮白茯苓鱉甲甘草上咀每服二錢用桃柳枝各七寸同煎臨發時服略吐出涎不妨只用常山甘草茯苓煎服亦效灸法小兒瘧疾灸大椎百會各隨年壯百會穴在髮際上五寸小兒久瘧不愈灸足大指次指外間陷中各一壯名內庭穴也黃疸門第十五病機錢氏曰凡小兒身皮目皆黃者黃病也身痛膊皆強大小便澀一身皆黃面目指爪皆黃小便如屋塵色著物皆如黃染此黃疸也二證多病於大病後又有一證生下百日及半年不因病後身微黃者胃熱也大人亦同又有面黃腹大食土渴者脾疸也又有自生而身黃者胎疽也經云諸疸皆屬於熱色深黃者是也若淡黃者兼白胃怯胃不和也丹溪云不必分五同是溫熱如盦曲相似此理甚明全嬰方論云夫發黃者皆由寒濕之氣蘊結於脾胃蒸發而成也陽明病無汗小便不利心中熱壅必發黃巢氏曰小兒百日半歲非傷寒疸病而身微黃者亦是脾胃熱不可灸火灸之則熱甚此是將息過度所為微薄其衣欲與除熱丸散投之自歇不得妄與湯劑及灸為害不淺淺也脈候脈經曰脈沉渴欲飲水小便不利者皆發黃凡欲黃寸口無脈鼻氣冷並不可治治法羅謙甫云一小兒季夏身體蒸熱胸膈煩滿皮膚如潰橘之黃眼中白睛亦黃筋骨痿弱不能行立此由季夏之熱加以濕令而蒸熱薄於經絡入於骨髓使臟氣不平故脾遂乘心濕熱相合而成此病蓋心火實則身體蒸熱胸膈煩滿脾濕勝則皮膚如潰橘之黃有餘之氣必乘己所勝而侮所不勝是腎肝受邪而筋骨痿弱不能行立內經言脾熱者色黃而肉蠕動又言濕熱成痿是也藥方茵陳湯治小兒陽明病發熱汗出者此為越熱不能發黃也身無汗劑頸而還小便不利渴欲飲水者此為瘀熱在裡必發黃傷寒七八日身黃如橘色小便不利腹痛者並主之山茵陳梔子仁川大黃各等分右咀水煎加減服日進三服小便當和尿如皂莢汁狀色正赤一宿腹減痛黃隨小便中去也加減瀉黃散此藥退脾土復腎水降心火黃連茵陳各五分黃蘗黃芩茯苓山梔各三分澤瀉二分上咀作一服水一盞煎六分食後熱服一服減半五日再服愈梔子柏皮湯治小兒身黃髮熱梔子仁十枚甘草炙一兩黃蘗二兩上咀水一盞煎六分加減服犀角散治小兒黃疸一身盡黃犀角一兩茵陳栝蔞根升麻龍膽草生地黃各半兩寒水石四錢上咀水一盞煎六分溫服一方治小兒忽發黃面目皮肉盡黃栝蔞汁和蜜服之神效茯苓滲濕湯治小兒黃疸寒熱嘔吐渴欲飲水身面俱黃小便不利不得安臥不思飲食白茯苓五分澤瀉三分茵陳六分豬苓二錢黃芩黃連梔子防己白朮蒼朮陳皮青皮枳殼各錢上咀水一小盞煎六分徐徐溫服丹溪一方治小兒吐瀉黃疸三稜莪朮青皮陳皮神麯麥芽黃連甘草白朮茯苓各等分為末每服一錢溫湯調服傷乳者麥芽湯調時氣用紫蘇湯發熱者薄荷湯茵陳五苓散沸湯調服
