body:
  text: 卷之十六暑證門病機暑證敘論肉經曰夏至後病熱為暑暑當與汗皆出勿止又曰因於暑汗煩喘靜則多言體若燔炭汗出而散又曰脈虛身熱得之傷暑難經云何以知傷暑得之然當惡臭何以言之心主臭自入為焦臭入肝為躁臭入肺為腥臭故知心病傷暑得之當惡臭其病身熱而煩心痛其脈浮大而散戴氏曰夏月卒倒不省人事名曰暑風暑證有中傷感之分戴氏曰暑乃夏月炎暑也有中有傷有感冒三者輕重之分咳嗽而發寒熱汗出不止為元氣內虛肺氣不固暑邪直入內乘金土名曰中暑東垣謂避暑熱於深堂大廈之中得之為中暑身熱頭疼煩躁不寧或身如針刺為傷暑腹痛水瀉或噁心有痰為冒暑有傷暑邪舍於榮衛至秋涼後遇風寒閉固不出發而為瘧有傷暑而即病者則以暑劑雖為霍亂吐瀉之證作亦只治暑為本以人參白虎六和等湯之類是也暑傷五臟證治異同陳無擇云暑熱自病歸心使人噎悶昏不知人入肝則眩運頑痹入脾則昏睡不覺入肺則喘滿痿躄入腎則消渴雖有五臟之殊大抵審虛實加減補益兼以清解二法為治則同也傷暑有八證脈虛自汗身熱背寒面垢煩渴手足微冷體重是也有中暑中熱之異潔古老云靜而得之為中暑亦深堂避暑得之之意同其病多頭痛惡寒身體拘急肢節疼痛而煩肌膚大熱而無汗為房室之陰寒所遏使周身陽氣不得通越故也以大順散主之動而得之為中熱則是農夫行人於日中勞役太過而得之者其病必苦頭痛發躁熱惡熱捫之肌膚大熱大渴引飲或大瀉無力以動者是也以白虎湯主之脈候脈虛身熱得之傷暑脈盛身寒得之傷寒蓋寒傷形而不傷氣所以脈盛熱傷氣而不傷形所以脈虛甲乙經中暑與熱證相似但熱證脈盛中暑者脈虛以此別之耳脈浮自汗或浮大而散或洪大無力或虛而遲中得洪緩皆為傷暑之脈也治法太陽中暍者發熱惡寒身重疼痛其脈弦細芤遲小便利灑灑然毛聳手足逆冷少有勞身即熱口開口扳齒燥若發汗則惡寒甚加溫針發熱甚數下之則淋甚暍即暑也太陽中熱者暍是也其人汗出身熱而暍白虎加人參湯主之活人書謂自汗惡寒身熱而渴面垢手足冷脈微弱無力者中暍也宜人參白虎湯太陽中暍者身熱疼重而脈微弱此亦夏月傷冷水水行皮中所致也一物瓜蒂散主之治暑宜補元氣為主清利次之丹溪云夏火大熱損傷肺金壯火食氣病暑者多是不足之證所以用清暑益氣湯人參白虎湯孫真人生脈散之類足可以審前聖立方之旨矣辨夏月伏陰在內用大順散二者之疑丹溪有夏月伏陰在內之論謂人與天地同一橐籥天地之氣升亦升降亦降浮亦浮沉亦沉子月一陽生寅月三陽生此氣之升也人之氣亦生也巳月六陽生陽盡出於地上矣此氣之浮也人之腹屬地氣於此時亦浮於肌表散於皮毛腹中之陽亦虛矣故夏至後六陽外泄伏陰在內此陰字有虛之義若作虛冷者其誤甚矣前人治暑用大順散桂苓丸等劑蓋因涼亭水閣水泉瓜果之傷故不曰病熱而曰病暑不用辛熱病何由安非為伏陰在內而用之也火令之時流金爍石何陰冷之有世人不察妄謂伏陰而用溫熱為世通弊若謂夏月伏陰在內宜服溫熱劑則冬月陽在內宜服寒涼然則孟子冬日飲湯夏日飲水亦不足信歟藥方東垣清暑益氣湯治夏月暑熱蒸人人感之四肢倦怠胸滿氣促肢節疼或氣高而喘身熱而頓心下痞脹小便黃數大便溏瀉或痢或渴不思飲食自汗體重人參黃耆升麻蒼朮一錢白朮神麯各五分陳皮炙甘草黃柏麥門冬當歸乾葛五味子澤瀉青皮各二分上水煎服內經曰陽氣者衛外而為固也炅則氣泄今暑邪傷衛故身熱自汗以黃耆人參甘草補中益氣為君陳皮歸身甘辛微溫養胃氣和血脈為臣蒼朮白朮澤瀉滲利除濕升麻葛根苦平善解肌熱又以風勝濕也濕盛則食不消而作痞滿故炒曲甘辛青皮辛溫消食快氣腎惡燥急食辛以潤之故以黃柏苦辛寒偕甘味瀉熱補水虛者資其化源以五味子麥門冬酸甘微寒救天暑之傷庚金為佐也此病皆因飲食失節勞倦所傷損其脾胃乘暑天而作也汗大泄者津脫也加五味子十粒炒柏五分知母三分濕熱乘肝腎則痿弱無力加酒蘖知母大瀉祕澀血中伏火也加當歸身生地黃桃仁麻仁各一錢以潤之選方十味香薷飲治伏暑身體倦怠神昏頭重吐利香薷二錢人參黃耆白朮茯苓白扁豆炒去殼陳皮厚朴姜炒各一錢木瓜炙甘草各五分上水二盞煎八分不拘時溫服局方人參白虎湯治脈虛暑熱發渴人參錢半知母二錢石膏五錢甘草一錢上水二盞粳米一合同煎東垣人參益氣湯治暑熱傷氣四肢倦怠嗜臥手指麻木人參一錢二分黃耆二錢白芍藥七分甘草一錢五味子三十粒柴胡六分升麻五分上水煎服生脈散治暑脈微而渴汗孫真人曰夏月必服五味子以補五藏東垣云夏月服生脉散加黃芪甘屮令人氣力湧出人參麥門冬五味子各等分上水煎服竹葉石膏湯治暑熱煩躁石膏一兩半夏二錢人參麥門冬各二錢甘草二錢竹葉二十個揉碎上姜三片水煎服清暑諸劑局方香薷飲治一切暑熱腹痛或霍亂吐利煩心等證香薷一斤厚朴制白扁豆炒各半斤每服五錢水盞半煎八分不拘時溫服黃連香薷飲黃連四兩香薷一斤厚朴半斤每服四錢如前服香連丸方見痢疾門治暑熱泄瀉腹痛後重白虎湯治暑渴石膏五錢知母二錢甘草二錢粳米二錢上作一服水煎加人參名人參白虎湯五物香薷飲驅暑和中香薷二錢厚朴薑製白扁豆炒各二錢白茯苓甘草炙各十分上水煎不拘時服消暑導濕劑益元散五苓散並見瀉泄門辰砂五苓散本方加辰砂通苓散治傷暑潮熱煩渴小便不利麥門冬淡竹葉車前穗燈心上等分水煎服子和桂苓甘露飲治伏暑發渴脈虛水道滯桂一錢茯苓人參澤瀉白朮甘草乾葛石膏寒水石各一兩滑石二兩藿香木香各一錢上為末每服三錢白湯調下宣明桂苓甘露飲茯苓澤瀉各一兩白朮石膏寒水石各二兩滑石飛四兩豬苓桂各五錢上為末每服三錢溫湯調下溫中理脾劑縮脾飲解伏暑除煩渴消暑毒止吐瀉霍亂白扁豆炒乾葛甘草各四兩烏梅肉砂仁草果各二兩上每服四錢水煎冷服冷香飲子治傷暑暍霍亂腹痛煩躁脈沉微或伏附子炮陳皮各一錢草果甘草炙各錢半上水盞半姜十片煎八分去渣井水頓冷服大順散治冒暑伏熱引飲過多脾胃受濕水穀不分清濁相干陰陽氣逆霍亂嘔吐臟腑不調乾薑甘草各五錢杏仁去皮尖桂去粗皮各二錢上先將甘草用沙炒次入姜卻下杏仁炒過篩去沙淨合桂為末每服二三錢湯點服二氣丹治伏暑傷寒二氣交錯中脘痞悶或頭痛惡心硫黃硝石上等分於銀石器內文武火炒令鵝黃色再研細用糯米糊丸梧桐子大每服四十丸不拘時新汲水下消暑丸治伏暑引飲脾胃不和半夏醋煮一兩甘草茯苓各二兩上為末薑汁糊丸梧桐子大每服五十丸食遠白湯下集成姜朴湯治夏秋暑熱過食冷物茶水以傷其內過乘涼風以傷其外致惡寒發熱胸膈飽悶飲食不進或吐瀉此內外俱寒冷也乾薑炮厚朴人參白朮白茯苓各一錢陳皮枳實羌活炙甘草各五分上水二盞姜三片煎服易簡諸方一方以新胡麻一升炒黑取攤冷碾為細末以新汲水調三錢凡著熱不得外以冷物逼得冷即死一方治中暑發昏以新汲水滴入鼻孔用扇扇之重者地漿水灌則醒若與冷水飲即死一方治暑月傷熱用車輪土五錢冷水調澄清服之一方治旅途中暑者移至陰處急就道上掬熱土於臍上作窩令人尿其中冷用生薑大蒜細嚼熱湯送下一方治中暑用小青葉先以井水浸去滓控干入砂糖擂汁灌之立效一方治中暑熱暍渴死者用路上熱土大蒜等分研爛水調去滓用清汁飲之即活
