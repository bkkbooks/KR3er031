body:
  text: 卷之三十五瀉泄門病機敘論經曰春傷於風夏生飧泄邪氣留連乃為洞泄又曰清氣在下則生飧瀉又曰濕勝則濡泄又曰暴注下迫皆屬於熱又曰諸病水液澄徹清冷皆屬於寒又曰一陽發病少氣善咳善瀉此少陽壯火食氣氣虛而瀉泄也又曰脾病者則腸鳴飧泄食不化取其經太陰陽明少陰血者東垣云運氣土令不行水為太過金肅愈嚴木虛明矣木氣既虛火令不及是所生者受病不勝者侮之是以土來木之分故木之清氣不得出外郁在肋下變為飧泄發於夏者以其濕令當權故治用麻黃湯麻黃味苦味之薄者陰中之陽從水中補木而瀉水發顯陽於上也機要云春宜緩形形緩動則肝木乃榮反靜密則是行秋令金能制木風內藏夏至則火盛而金去獨火木旺而脾土損矣輕則飧泄滑泄穀不化重則下利膿血稠黏良方云飧泄者始春之時風木盛行脾土受風木之邪不能運化因成積滯夏以伏陰在內再感暑濕風冷之氣過食生冷復傷脾胃不能克化飲食水穀完出而成飧泄也飧泄是脾氣不輸胃氣下降機要云夫脾胃同濕土之化主腐熟水穀胃氣和平飲食入胃精氣則輸於脾土歸於肺行於百脈而成榮衛若飲食一傷起居不時傷其脾胃則不輸化上升精華之氣反下降是為飧泄久則太陰傳於少陰而為腸澼瀉利要分寒熱臟腑瀉利其證多端大抵從風濕熱論是知寒少熱多寒則不能久也故曰暴瀉非陰久瀉非陽大便完穀而下有寒有熱如熱者脈疾身多動聲響亮暴注下迫此陽也寒者脈沉而細身不動目睛不了了飲食不下鼻準氣息者姜附湯主之若身重四肢不舉木附湯主之原病式曰瀉白為寒青紅黃赤黑為熱大抵瀉利小便清利不澀為寒赤澀者為熱又完穀不化而色不變吐利腥穢澄徹清冷小便清白不澀身涼不渴脈遲細而微者寒也穀雖不化而色變非白煩渴小便赤澀者熱也凡穀消化無問色及他證便為熱也寒瀉而穀消化者未之有也或火性急速傳化失常穀雖不化而飧泄者亦有之矣仲景云邪熱不殺穀然熱得濕則飧泄也瀉因有三陳氏三因云瀉泄一證經中所謂洞泄飧泄溏泄溢泄濡泄所因有內外不內外之殊經云春傷於風夏必飧泄此外因也又云濕勝則濡泄寒甚則為泄暑熱亦為泄至於七情感動臟氣不平亦致溏泄此內因也其餘飲食不節過食生冷而成瀉泄者乃脾胃有傷此不內外因也但停滯瀉泄一證直須積滯已消然後用以斷下藥今人往往便固止之多成滯下治法宜先理中焦次分水道治中不效然後斷下瀉證有五難經云凡瀉有五其名不同有胃泄有脾泄有大腸泄有小腸泄有大瘕泄名曰後重胃泄者飲食不化色黃脾泄者腹脹滿泄注食即嘔吐逆大腸泄者食已窘迫大便色白腸鳴切痛小腸泄者溲而便膿血小腹痛大瘕泄者裡急後重數至圊而不能便莖中痛此五泄之要也腎瀉鶩瀉水瀉洞瀉腎泄者由腎虛每於五更時溏泄一二次而連月經年勿止者是此多腎經濕注飲酒之人多有之鶩瀉者少腹生寒而為此證蓋陰中之至陰脾也脾胃虛弱為風寒所勝則陰氣太盛陰盛則臟寒臟寒則糟粕不化大便黑狀似鶩溏者是也大腸有寒證亦如之水瀉者臟腑虛寒四肢厥冷暴頓洞下者是也有傷暑熱霍亂傾瀉如水者有之洞泄者手足厥冷心腹痛腳轉筋而洞瀉者是也其餘傷食泄瀉失飢傷飽胃不能消則脹滿所下酸臭可驗此證當疏利消導大抵諸瀉泄證各宜以類推求必先分利後實脾土益元氣無不萬全瀉有虛火濕痰食積丹溪曰瀉有氣虛有火有痰有食積戴氏云瀉水而腹不痛者濕也飲食入胃不住完穀不化者氣虛也腹痛瀉水腸鳴痛一陳瀉一陳者火也或瀉或不瀉或多或少者痰也腹痛甚而瀉瀉後痛減者食積也水穀不化而完出者濕兼風也即飧泄是也漸下汙積黏垢者濕兼熱也即溏泄是也所下澄徹清冷小便清白濕兼寒也即鶩泄也體重軟弱瀉下多水濕自甚也即濡泄是也久下不能禁固濕勝氣脫也即滑泄也瀉證病機不同有如此豈可不察所因而能治哉脈候內經曰脈細皮寒少氣泄利前後飲食不入是謂五虛死其漿粥入胃泄注止則虛者活脈經曰泄注脈緩時小結者生浮大數者死又洞泄食不化不得留下膿血脈微小流連者生緊急者死凡瀉而脈沉細者為虛為寒疾而數者為熱為積心脈歇至者驚瀉瀉久而脈洪大急數皆難治治法治瀉分利小水為上策丹溪曰世俗例用澀藥治瀉若瀉而虛者或可行之初得之者必變他證為禍不小殊不知瀉多因濕惟分利小水最為上策治暴瀉屬火之證切勿固澀張子和云夫暴注水瀉不已即內經所謂注下者也注下水利也暴速甚者屬火宜冷水調桂苓甘露飲五苓益元散或以長流水煎放冷服涼膈通聖散亦能治之慎不可驟用罌粟殼乾薑豆蔻之類縱瀉止亦轉生他疾只可分陰陽利水道而已治瀉用子和三法各有所宜經曰下者舉之久瀉下陷者用升陽益胃不效當用吐法以提之也經曰春傷於風夏生飧瀉此則完穀不化宜發汗而愈則當用麻黃桂枝湯仲景柴苓湯之類是也經曰通因通用則因食積濕熱然須因其瀉而瀉之使積滯去盡而瀉自止矣若拘之以三法兼施則執一也而可乎哉子和治一僧臟腑不調三年不效此洞泄也以謀慮不決而成肝主謀慮甚則乘脾脾濕不流乃上湧痰半盆又以舟車丸浚川散下數行仍使澡浴出汗自爾日勝一日常以胃風湯白朮散調養之若斯疾斯治惟子和能之其宜三法並用者萬百一二耳知者審之東垣治瀉法東垣案云豫病脾胃久衰視聽半失此陰盛乘陽加之氣短精神不足此由脈弦令虛多言之過陽氣衰弱不能舒伸伏匿於陰中耳又值淫雨陰寒時人多病泄利此濕多成五泄故也一曰體重肢節痛大便瀉並下者三時小便祕澀思其治法按經云大小便不利無問標本先利大小便又云在下者引而竭之亦是先利小便也又云諸瀉痢小便不利先分利之又云治濕不利小便非其治也皆當利其小便多用淡味滲泄之劑利之是其法也噫聖人之法雖布在方冊其不盡者可以求責耳今客邪寒濕之淫從外而入里以暴加之若從以上法度用淡滲之劑病雖即已是降之又降是益其陰而重竭其陽是陽愈削而精神愈短矣是陰重強而陽重衰反助其邪也故必用升陽風藥以羌活獨活柴胡升麻各一錢防風根截半錢炙甘草根截半錢煎服大法云寒濕之勝助風以平之又曰下者舉之得陽氣升騰而去矣又云客者除之是因曲而為之直也夫聖人之法可以類推舉一而知百也若不達升降浮沉之理而概施治其愈者幸也雜著治瀉法王節齊云泄本屬濕然多因飲食不節致傷脾胃而作須看時令分寒熱新久而施治治法補脾消食燥濕利小便亦有升提下陷之氣用風藥以勝濕亦有久泄腸胃虛滑不禁者宜收澀之脾瀉已久大腸不禁者此脾脫也宜急澀之瀉宜汗解者經云久風為飧泄若保命集用蒼朮麻黃防風之屬是也瀉宜吐痰而愈者格致餘論云夏月患泄百方不效久病而神不瘁小便赤脈滑而頗弦膈悶食減此久積為所郁成濕痰留於肺中宜大腸之不固也導其源則流自清以茱萸等作湯溫服碗許探喉中吐痰半升利減半再吐而安瀉宜逐下而安者若長沙太守言下痢脈滑而數者有宿食也當下之痢已瘥至其時復發者此為下未盡更下之瀉宜補益而愈者若東垣脾胃論言脈弦氣弱自汗四肢發熱大便瀉泄宜黃耆建中湯瀉宜調理脾胃而止春若潔古老言四肢懶倦小便不利大便走泄沉困飲食減少以白朮茯苓芍藥治之有宜升舉而安者若試效方脾濕胃弱不能運行食下即泄助甲膽風勝以克之以升陽之藥羌活獨活升麻防風炙甘草之屬瀉宜燥濕而後愈者若脾胃論言濕土有餘脈緩而怠惰嗜臥四肢不收大便泄瀉從平胃散合二陳湯瀉用寒涼而愈者若張長沙言協熱自利黃芩芍藥主之瀉宜溫補而愈者若長沙言下利脈遲緊痛未止當溫之下利心痛急當救里下利清白水液澄徹清冷可與理中四逆輩主之瀉以分利而愈者若劉河間言濕勝則濡瀉小便不利者五苓散益元散分導之瀉以收澀而愈者若東垣謂寒滑氣泄不固訶子散以澀之之類濕勝而瀉四苓散加二術甚者二術炒為末米飲調服氣虛者用參朮升麻芍藥或以四君子湯加芍藥升麻火宜伐火利小便四苓散加黃芩活石梔子木通痰宜豁痰二陳湯加海石音黛黃芩神麯蛤粉或用吐法食積宜消導之疏滌之用神麯大黃枳實或保和丸泄瀉水多者必用五苓散或用蒼朮厚朴陳皮炒曲澤瀉地榆甘草等分冬加乾薑夏月水瀉桂苓甘露飲脾胃不和傷食者胃苓湯凡治瀉藥宜作丸散服泄瀉注下如水用生料五苓散加蒼朮車前子倍白朮為末米湯調服濕熱甚者瀉下如熱湯四苓散加滑石黃芩梔子木通之類腹中疼痛瀉下清冷喜熱手蕩尉口不燥渴乃寒瀉也五苓散倍桂加肉豆蔻有氣加木香病甚者更加木香附子作丸服之效久瀉穀道不合或脫肛此元氣下陷及大腸不行收令而然用白朮芍藥神麯陳皮肉豆蔻訶子肉五倍子烏梅為丸以四君子湯加防風升麻煎湯送下食積時常腹痛泄瀉先以木香檳榔丸或束垣枳實導滯丸推逐之而後以四苓散加厚朴蒼朮神麯麥芽之類作丸服之以安胃氣瀉水而腹不痛者屬氣虛宜四君子湯倍白朮加黃耆升麻柴胡防風之類補以提之而愈治案滄州翁治一人病下利完穀衆以洞泄中寒服理中四逆輩轉劇脈兩尺寸俱弦長右關浮於左關一倍自外皆如草滋知肝風傳脾因成飧泄非臟寒也以小續命湯損麻黃加白朮服三五升利止續命非止利之藥飲不終劑而利止者以從本治故也又治一夫人病飧泄彌年醫以休息利治之以苦堅卒燥之劑弗效時秋半脈弦而浮曰夫人之病蓋病驚風非飲食勞倦所致也肝主驚故虛風自甚因乘脾而成泄今者金氣正隆尚未至明春則病將益加法官平木之太過扶土之不及而瀉自止夫人曰儂寓南閩時平章燕公以銅符密授因失心懼由是疾作公言信然以黃犉牛肝和以攻風健脾之藥愈張子和治一人瀉利不止如傾衆以為寒治近二十載脈之兩寸皆滑豫不以為寒所以寒者水也以茶調散湧寒水五七升又以無憂散瀉水數十行次以淡劑利水道後愈此通因通用法也丹溪治一老人右手風攣瀉泄百方不效左脈洪滑此太陰經有積肺氣壅遏不能下降大腸虛而作瀉當治上焦用蘿蔔子擂和漿水密探吐大塊膠痰碗許隨愈一老人厚味傷脾常常瀉泄亦是脾瀉用白芍酒炒白朮各二兩神麯山楂各一兩黃芩半兩炒半夏一兩為末荷葉煨飯為丸服一老人稟厚形瘦夏未患瀉利至秋深治不愈神不瘁溺澀少不赤脈澀頗弦膈微滿悶食減因悟曰必多年陳積僻在腸胃詢知嗜鯉魚三年無一日缺豫曰此痰積在肺肺為大腸之臟宜大腸之不固也當澄其源而流自清以茱萸陳皮青蔥鹿苜根生薑濃煎和砂糖飲一碗探吐痰半升加膠利減半再飲而利止與平胃散加白朮黃連調理治一富兒面黃善啖易飢非肉不食瀉泄一月脈大以為濕熱當脾困而食少今反形健而多食不渴此必疳蟲也驗其大便果有蛔治蟲而愈次年夏初復瀉不痛而口乾豫曰昔治蟲而不治疳故也以去疳熱之藥白朮湯下三日而愈後用白朮為君芍藥為臣川芎陳皮黃連胡黃連入蘆薈為丸白朮湯下禁肉防再舉藥方治瀉通用劑術茯車前子湯治一切瀉泄用此為主白朮茯苓車前子澤瀉芍藥陳皮炙甘草各等分上咀每服七錢水盞半加姜三片棗一枚燈心煎七分服傷食泄黃或食積加神麯麥芽山楂子各八分黃連七分以消之腹中窄狹飽悶再加厚朴枳實木香各五分小便赤澀短少加豬苓木通山梔各五錢濕瀉者加茵陳蒼朮各一錢若夏秋之間濕熱大行暴注水瀉加炒黃連蒼朮升麻木通各五分發熱燥渴加乾葛石膏各一錢口渴引飲加葛根人參麥門冬各一錢廾麻烏梅肉各一分暑月瀉泄加香薷厚朴寒月溏瀉清冷腹痛或傷冷食加神麯麥芽乾薑煨各一錢砂仁木香益智各五分勝濕須加防風羌活白芷蒼朮半夏胃氣下陷加人參黃耆升麻柴胡以升清氣久瀉腸胃虛滑不禁加肉蔻煨石脂煅訶子煨木香炒乾姜各五分清晨溏泄加破故紙炒茴香炒肉蔻煨局方胃苓湯治男婦暑濕停飲泄瀉不服水土等證蒼朮制厚朴制陳皮甘草減半白朮茯苓豬苓澤瀉各等分上咀每服五錢水盞半姜三片棗二枚煎七分食遠服局方平胃散治傷濕泄瀉薑棗煎成為末米調皆可良方加味五苓散治伏暑泄瀉發煩渴小水不利豬苓白朮白茯苓澤瀉車前子隔紙炒研一錢肉桂五分上作一服水盞半加姜三片棗一枚煎七分不拘時服局方薷苓湯治夏月暑瀉欲成痢疾香薷黃連薑汁炒厚朴姜炒扁豆炒豬苓澤瀉白朮茯苓各等分上咀每服五六錢水盞半姜三片煎七分服辨疑倍術二陳湯治濕痰瀉泄白朮加倍陳皮半夏制白茯苓各等分甘草減半上咀水盞半加姜三片煎服局方六一散一名益元散治夏傷暑水瀉桂府滑石水飛六兩炙甘草末一兩上和勻每服二錢米飲調下丹溪青六丸去三焦濕熱治泄瀉多與清化丸同用並不單用兼治産後腹痛或自利能補脾裨血亦治血痢六一散七兩紅曲炒二兩上為末飯丸梧桐子大每服七五十丸白湯下丹溪溫六丸泄瀉而嘔吐者神效六一散用生薑湯調服或以末和入七分之一湯調局方戊已丸治胃經受熱瀉痢不止黃連酒炒四兩吳茱萸泡炒二兩白芍藥三兩上為末神麯糊丸梧桐子大每服三十丸米飲食前下祕方既濟丸治一切瀉泄不止黃連切如豆大四兩生薑二兩切成粗絲同黃連炒黃燥上二味為細末醋打硬糊丸梧桐子大每服五十丸白湯下集成脾泄丸治食積酒濕等瀉白朮土炒二兩蒼朮炒半夏制各兩半山楂神麯炒芍藥炒黃芩炒各一兩上為末荷葉煨飯為丸後重者加木香檳榔局方太平丸治瀉泄黃連一味同茱萸炒去萸不用芍藥炒減半上為末老米糊丸同乾薑炒加阿膠一半為丸名駐車丸東垣升麻除濕湯白下而上者引而去之蒼朮一錢柴胡羌活半夏升麻神麯澤瀉防風炙甘草陳皮麥芽曲各五分益智仁三分上咀作一服水盞半煎七分空心服胃寒腸鳴加益智仁半夏曲各五分生薑三片大棗二枚煎非腸鳴勿用東垣茯苓湯治因傷冷飲水泄瀉注下一夜十餘次變作白痢或變赤痢腹中㽲痛食減熱躁四肢沉困無力茯苓豬苓澤瀉各五分當歸生黃芩各錢半白芍藥七分蒼朮生甘草升麻柴胡各一錢炙甘草肉桂各一分半上咀作一服水盞半煎八分溫服草窗白朮芍藥散治痛瀉要方白朮炒芍藥炒各二兩陳皮兩半防風一兩上咀或煎或散或丸皆可服久瀉者加升麻六錢機要白朮芍藥湯治太陰受濕水瀉注下水穀不化不欲飲食困弱無力宜此和之身重暴下大勢來也亦宜和之白朮炒芍藥炒各四錢甘草二錢水煎服機要白朮茯苓湯治濕瀉又治食積濕熱作瀉白朮茯苓各五錢上作一服水煎食前服一方有芍藥三味各等分名白朮散為末米湯調下機要蒼朮芍藥湯治前證蒼朮芍藥二錢半淡桂五分水煎服治風勝泄瀉諸劑良方神朮散治春傷於風夏必飧瀉蒼朮半斤藁本川芎各三兩羌活二兩細辛粉草各八錢上為粗未每服三錢姜三片蔥白三寸煎服出汗良方高良薑湯治腸胃受風久為飧泄下痢嘔逆腹內㽲痛高良薑木香檳榔赤茯苓人參各三分肉豆蔻吳茱萸泡炒陳皮去白縮砂仁五分乾薑一分炮上咀每服五錢水盞半煎七分不拘時日三服良方乾薑丸治腸胃風冷飧泄注下腹痛不止乾薑炮厚朴去皮製當歸阿膠炮成珠龍骨各一兩上為細末煉蜜丸梧桐子大每服三十丸空心棗湯下機要防風芍藥湯治飧泄身熱脈弦腰痛微汗防風芍藥黃芩各二錢水煎空心服機要蒼朮防風湯治泄瀉脈弦頭痛蒼朮防風麻黃各一錢白朮二錢上咀作一服水盞半生薑五片煎八分食前服局方胃風湯治前證及治大人小兒風冷乘虛入客腸胃水穀不化泄瀉注下及久瀉下後如豆汁或下瘀血如魚腦日夜無度久不得愈者三服必愈如神方見胃風門傷暑熱瀉諸劑宣明桂苓甘露飲治水不消暑熱泄瀉嘔吐或下痢方見暑門和劑六和湯治心脾不調氣不升降傷暑霍亂吐瀉寒熱交作小便赤澀方見暑門局方香薷飲治脾泄暑瀉尤宜水酒各一盞煎水中沉冷服仲景五苓散治泄瀉暑熱嘔吐瀉泄煎薑湯調方見傷寒門局方來復丹治正氣不足暑熱霍亂泄瀉硝石硫黃各五錢瓦器內用柳枝攪勻慢火炒如法用五靈脂陳皮青皮各五錢玄精石三錢上各研為細末和勻醋糊丸如豆大每服三十丸不拘時用清米飲下或淡薑湯下易簡云硝石性寒佐以陳皮其性疏快硫黃且能利人苦作暖藥以止瀉誤矣蓋由啖食生冷或胃暑熱之氣中脘閉結揮霍變亂此藥通利三焦分理陰陽服之甚驗丹溪酒蒸黃連丸治一切熱瀉黃連半斤淨酒二斤浸以瓦器置甑上蒸至爛取出曬乾上為末滴水丸梧桐子大每服五十丸食前溫水下虛寒瀉劑局方理中湯治中丸治臟腑停寒泄瀉不已方見傷寒門機要漿水散治暴瀉如水周身汗出一身盡冷脈微而弱氣少不能語甚者加吐此為急病半夏一兩薑製附子半兩制乾薑炮肉桂良薑各二錢半炙甘草五錢上為細末每服三錢漿水盞半煎至半盞和渣熱服機要白朮散治泄瀉白朮炒芍藥炒甘草炙各三錢乾薑炮半兩上如前法煎服甚者加附子三錢百選大藿香散治一切脾胃虛寒嘔吐霍亂心腹撮痛泄瀉不已藿香葉二兩陳皮去白厚朴制青皮木香人參肉豆蔻麵煨良薑炒大麥芽炒研神麯訶子煨去核白茯苓甘草炙各一兩白乾薑半兩上為粗未每服六錢水盞半煨生薑一塊鹽一捻煎服水瀉滑瀉腸風臟毒陳米飲入鹽熱調下赤白痢甘草黑豆湯下脾胃虛冷宿滯酒食痰氣作暈入鹽少許嚼薑棗湯熱服胃氣厄噫生薑自然汁一呷入鹽點服此藥大能消食順氣利膈濟生大輪丸治腸胃虛寒心腹冷痛泄瀉不止乾薑炮附子制肉豆蔻煨上為末每服五十丸米糊丸空心米飲下和劑肉豆蔻丸治脾胃虛弱脹滿水穀不消臟腑滑泄蒼朮制乾薑炮肉豆蔻麵煨厚朴制陳皮各四兩甘草炙茴香炒肉桂川烏炮去皮臍訶子肉各二兩上為末每服三錢水盞半姜三片棗一枚煎八分溫服金鎖正元丹治腎虛泄瀉小便頻數盜汗遺精一切虛證方見虛冷門豆附丸治腸胃虛弱內受風冷水穀不化瀉泄注下肉豆蔻麵煨四兩木香二兩不見火白茯苓四兩乾薑炮肉桂附子制丁香不見火各一兩上為細末薑汁煮糊丸如梧桐子大每服五十丸米飲下良方茱萸斷下丸治臟腑虛寒腹痛不止泄瀉甚效吳茱萸二兩炒赤石脂川薑各兩半艾葉炒縮砂仁肉豆蔻附子制各一分上為細末麵糊丸每服五七十丸食前米飲送下昔趙從簡通判丁母憂食素日久苦瀉不止日七八行歲余每服健中不過一二日復作得此方而愈後數年間遇泄瀉服之即效百選縮脾丸治滑瀉不禁白朮炒赤石脂肉豆蔻麵煨厚朴薑製白姜炮各一兩附子制蓽茇神麯炒上為細末醋糊丸梧桐子大每服五十丸空心米飲下和劑大已寒丸治沉寒痼冷臟腑虛憊心腹㽲痛脅肋脹滿瀉泄腸鳴自利自汗蓽茇肉桂各四兩乾薑高良薑各六兩上為末水煮糊丸梧桐子大每服三十丸空心米飲下治傷食瀉泄諸劑丹溪保和丸治食積瀉泄方見食積門良方調中湯治食滯瀉泄嘔吐不思飲食藿香砂仁蓬朮炮乾薑炮肉桂茴香草果各一錢麥芽炒益智橘紅蒼朮神麯炒桔梗甘草炙各半錢上咀作一服水盞半生薑三片棗一枚煎七分不拘時服脾積丸因食積作瀉青皮陳皮三稜莪朮煨各三錢香附子炒肉果山楂丁香砂仁檳榔薑黃厚朴炒各二錢黃連三錢木香錢半檀香麥芽各二錢蓽茇白豆蔻各一錢上為細末溶蠟為丸如緑豆大每服三十丸溫水下和劑木香檳榔丸治傷食瀉方見積滯門寶藏感應丸治食滯瀉泄將成痢疾木香不見火二兩半肉豆蔻二十個丁香一兩半巴豆二十粒去膜去油杏仁二百四十粒湯泡去皮尖用百草霜另研細二兩乾薑炮一兩上四味為末外入百草霜二兩研與豆杏七味同和勻用好蠟六兩溶化成汁以重絹濾去渣更以好酒一升於銀石器內煮蠟數沸傾出待酒冷其蠟自浮於上取蠟稱用春夏修合用清油一兩銚內熬令香熟次下蠟四兩同化成汁就銚內乘熱拌和前項藥末成劑油紙裹旋丸每服三十丸空心薑湯下治瀉升發諸劑經曰下者舉之是也東垣升陽除濕湯方見前升陽除濕防風湯如大便祕塞或裡急後重數至圊而不能便或有白膿血慎勿利之利之必致重病鬱結而不通也以故舉其陽則陰氣自降蒼朮制四兩防風二錢白朮茯苓白芍藥各一錢上水二盞半先煎蒼朮至二盞內諸藥同煎至一盞食前熱服東垣升陽益胃湯治陽氣下陷泄瀉加桔梗方見脾胃門東垣補中益氣湯加豆蔻訶子治內傷脾胃氣虛下泄方見內傷門祕藏黃耆補胃湯治大便一日三四次溏而不多有時泄腹中鳴當歸身黃耆柴胡益智陳皮各三錢甘草炙二錢升麻二分紅花少許上咀作二帖每帖水盞半煎七分去渣食遠服治瀉收澀諸劑經曰滑者澀之是也發明禹餘糧丸治滑泄脫下禹糧石煨赤石脂煅龍骨煨蓽茇肉豆蔻制訶子煨去核乾薑炮各等分上為細末醋煮米糊丸梧桐子大每服八十丸空心米飲下發明五神丸劫瀉不止肉豆蔻制龍骨煅赤石脂煅南木香川木通各等分上為末為梅肉搗爛丸梧桐子大每服七十丸空心米飲下醫林固腸丸治泄瀉及痢疾日夜無度肉豆蔻制附子制龍骨研阿膠炒赤石脂煨醋淬乾薑炮木香人參各一兩沉香五錢白朮炒二兩訶子肉二兩上為末粳米糊丸梧桐子大每服七十丸米飲下震靈丹治腎泄滑泄不止禹糧石火煅醋淬不計遍次手捻得碎為度代赭石制同上赤石脂煨紫石英各四兩杵碎入乾鍋內以瓦蓋口鹽泥固濟候乾用硬炭火煅通紅為度出火毒二宿研末用滴乳香另研沒藥另研五靈脂各二兩硃砂一兩研上為細末糯米粉糊丸小雞頭大風乾每服三丸用炒故紙入棗煎湯調鍾乳粉少許空心送下良方斂腸丸治久瀉不止木香丁香附子制砂仁訶子肉罌栗殼去筋穰川薑沒石子白龍骨肉豆蔻麵煨赤石脂煅梓州厚朴姜炒禹餘糧醋淬七次各一兩上為細末麵糊為丸梧桐子大每服七十丸食前米飲下良方實腸散治泄瀉不止蒼朮二錢炒訶子炮砂仁肉豆蔻陳皮茯苓各一錢木香甘草炙各五分厚朴薑製一錢上水盞半姜五片棗三枚煎七分食前服治脾瀉腎瀉諸劑良方丸寶飲調理脾胃止泄瀉人參白朮乾薑炮訶子去核茯苓木香藿香去土炙甘草肉豆蔻麵煨各一錢上水盞半薑棗煎食前服訶子皮散治腸胃虛寒泄瀉米穀不化腸鳴腹痛脫肛或作膿血日夜無度訶子皮七分乾薑六分栗殼去筋膜蜜炒橘皮各五分本草十劑云澀可以去脫以粟殼之酸微澀止收固氣去脫主用為君也以訶皮之微酸止收固血治其形脫橘皮微苦溫益真氣升陽為之使以乾薑大辛熱之劑除寒為臣上為細末水盞半煎分和滓熱服空心再服全愈棗肉丸治脾胃虛寒或腸鳴泄瀉腹脅虛脹或胸膈不快宜服破故紙四兩炒木香一兩不見火肉豆蔻二兩麵煨上為細末燈心煮棗肉丸梧桐子大每服七十丸空心薑湯下本事五味子散治腎泄五味子二兩吳茱萸半兩上二味炒香熟為細末每服二錢陳米飲下一人每五更初曉時必溏泄二次名腎泄服此而愈發明白朮中和湯治脾胃虛弱飧泄不化者白朮二兩陳皮一兩半夏八錢訶子肉煨八錢御米殼七錢木香三錢山楂五錢炙甘草七錢白芍藥一兩煨白茯苓半兩乾薑炮半兩上咀每服八錢加姜三片烏梅一個水煎或米糊丸亦可良方橘皮散治脾胃虛寒洞瀉不止腸內雷鳴氣脹膨滿冷氣痛陳皮白朮炒各二兩訶梨勒煨乾薑炮枳殼官桂去皮木香甘草炙人參各一兩檳榔炮一枚草豆蔻煨五枚半夏制三分厚朴薑製各兩半上為細末每服二錢食前薑棗湯調下淡寮四神丸治脾泄腎泄清晨溏瀉肉豆蔻二兩破故紙炒四兩木香半兩茴香炒一兩上為末生薑煮棗肉為丸如梧桐子大鹽湯下本事二神丸治脾胃虛弱不思飲食泄瀉不止肉豆蔻生用二兩破故紙四兩炒上為末以大肥棗四十九枚生薑四兩切同煮棗爛去姜取棗肉研膏入藥和丸梧桐子大每服五十丸鹽湯下易簡諸方祕方治水瀉及婦帶並效風化石灰五錢白茯苓一兩半糊丸梧桐子大每服五六十丸白湯下一方用車前子炒焦為末米飲調下一錢服一方用生薑一塊打破入艾一把同煎湯一盞熱服一方治水瀉不止用黃連厚朴各二錢或四錢以生薑汁拌勻炒乾仍用生薑三片水一盞煎七分服千金方治水瀉無度乾薑末粥飲調一錢服之集效方治吐瀉不止四肢逆厥虛風不省人事服此四肢漸暖神識便省回陽用天南星為末每五錢姜三片棗三枚煎七分溫服未省再服衍義云半夏今人惟知去痰不知益脾止瀉蓋能分水故也脾惡濕濕則濡而困困則不能治水經曰水勝則瀉一男子夜數如廁或教以生薑一兩碎之半夏湯泡大棗各三十枚水一升瓷瓶內慢火燒為熟水時時呷數日便已孫尚藥治虛氣傷冷便作水瀉日夜三二十行泄不止夏月行路暴瀉以此備急名朝真丹用硫黃二兩牛角研令極細枯白礬半兩同研細勻蒸餅丸梧桐子大硃砂為衣每服五十丸鹽湯下蠟礬丸亦能解急止瀉方見癰疽門經驗方治泄驗少進飲食用糯米一升水浸一宿瀝乾慢火炒令極熟磨細羅過如飛面懷慶山藥一兩碾末入米粉內每日清晨用半盞再入砂糖二茶匙川椒末少許將極滾湯調食其味甚佳且不厭人大有資補久服之其精寒不能成孕者亦孕矣蓋有山藥在內故也灸法百會一穴在前頂心上中央旋毛中治久瀉下陷脫滑者灸三壯脾俞二穴在十二椎下兩旁各開寸半治泄瀉灸三壯中脘一穴在上脘下一寸灸七壯關元一穴在臍下三寸治泄不止可灸七壯腎俞二穴在十四椎下兩傍各開一寸半與臍平可灸五壯治洞瀉不止大腸俞一穴在十六椎兩傍各寸半可灸三壯治腸鳴腹脹暴瀉天樞二穴在夾臍中兩旁各二寸陷中氣海一穴在臍下
