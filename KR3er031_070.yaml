body:
  text: 卷之七十夢遺精滑門病機敘諭內經曰精者身之本生氣之源髓之化也又曰陰平陽祕精神乃治陰陽離決精神乃竭又曰腎主受五臟六腑之精而藏之陰陽之要會也是精之藏制則在腎精之主宰又在於心又曰上古之人其知道者法於陰陽和於術數飲食有節起居有常不妄作勞故能形與神懼而盡終其天年恬憺虛無真氣從之精神內守病安從來遺精夢泄惟究心腎二經五臟六腑皆有精氣而腎為都會關司之所而輸泄者又聽命於心焉心為君火腎為相火而相火奉行君火之命令故其病雖在腎而其責本在心心主乎神神有所動則精泄遺精病機有五一曰夢交而遺精者乃心火熾而心神虛也二曰下元虛敗精不禁而遺者乃腎虛精滑故也三曰壯年氣盛久節房欲經絡壅滯而遺者乃曠夫滿而溢也四曰情動於中所願不得而遺者乃為情不遂欲而泄也五曰濕熱鬱滯而夢遺者如綱目用豬苓丸青州白丸子之屬是也夫壯年氣盛情欲動中只舒其情自愈雖不藥餌可也至若夢中交泄則當治其心腎虛精滑則當補其腎此謂知本此謂治之至也夢遺精滑專主乎熱小學云夢遺精滑濕熱之乘熱則流通因熱傷氣血不能固守也戴氏云皆相火所動久則虛而亦無寒也脈候金匱要略云虛勞為病脈浮大手足煩陰寒精自出又云脈弦而大名曰革男子則遺精女子則失血兩尺脈洪數主失精便濁心脈短小因心虛所致必夢遺治法治遺精必先清熱養心丹溪云夢遺精滑專主乎熱熱則流通宜滋陰降火勞神思者安神養心久而虛脫者須兼補藥及收澀之藥無不愈夢遺病有鬱滯壯實者宜疏瀉之鋼目云一壯年夢遺白濁與澀精藥益甚知其鬱滯改用導赤散大劑服之還濁皆止又一中年夢遺與澀藥弗效改與神芎丸下之下後與豬苓丸遂愈丹溪治一人精滑便濁與藥不效後行倒倉法而安此皆有餘鬱滯之證也夢遺白遺治法不同夢遺因心經有火神思不寧所以夢與人交而泄精治當清心安神溫膽加黃連生地人參遠志茯神酸棗仁羚羊角之類自遺乃氣血虛而下脫有因熱而流通當分虛實須得八物湯加龍骨牡蠣樗樹根皮之類有小便後精出不可禁者或不小便而自出或莖中出而癢痛常如欲小便者並宜先服辰砂妙香散或威喜丸或分清飲別以綿裹龍骨同煎加五倍子牡蠣白茯苓五味子之屬煎服法藥兼治醫效通神有神氣消靡怪異橫生風邪乘其虛鬼氣干其正往往與妖魅父通是有厄運之不可曉者也法藥兼治誠有是言藥方夢遺精滑諸劑醫林金鎖匙丹治男婦精滑遺泄不禁夢與鬼交茯苓茯神各二錢遠志龍骨煨各三錢左股牡蠣四錢煆上為末酒糊丸梧桐子大每服四十丸空心鹽湯或酒下直指茯苓丸治心虛夢泄白茯苓去皮為末山藥作糊為丸每服空心米湯或酒送下四錢臨臥又服或只為末散熟水調下四錢亦可和劑茯兔丸治思慮太過心腎虛損真陽不固夢遺精滑小便白濁菟絲子餅五兩白茯苓三兩石蓮子二兩上為末酒糊丸梧桐子大每服五十丸空心鹽湯下直指祕傳龍骨鎖粗丹白龍骨煆二兩半牡蠣煆二兩黃柏六錢知母豬苓各半兩遠志甘草煮半兩人參一兩上為末酒糊丸梧桐子大每服五十丸空心鹽湯或酒下丹溪定志珍珠丸治心虛夢泄人參白茯苓海蛤粉黃柏炒焦色各三兩樗根皮二兩遠志石菖蒲青黛各兩半上為末麵糊丸青黛為衣梧桐子大每服五十丸空心鹽湯下河間祕真丸治思想無窮所願不遂意淫於外入房太甚夢與鬼交精泄流濁並治白龍骨一兩另研訶子五枚砂仁半兩硃砂一兩另研一分為衣上為末糊丸緑豆大每服十丸空心溫酒下多服大祕良方固真散治才睡便夢遺此藥大能澀精固真氣暖下元白龍骨一兩韭子一合為末每服二錢空心酒調服牡蠣散治虛勞夢泄盜汗乏力牡蠣煆二兩蒼朮炒龍骨各三兩桑螵蛸微炒白芍藥棘刺微炒桂心柏子仁車前子甘草炙各一兩為末每服二錢食前粥飲調服桑螵蛸散治虛勞夢泄桑螵蛸一兩微炒韭子二兩微炒為末每服二錢空心溫酒調下珍珠丸治虛勞夢泄鎮精珍珠六兩以牡蠣六兩用水同煮一日去牡蠣取珍珠為末上為細末卻入水於乳鉢內研三五日後寬著水飛過候乾用蒸餅和丸梧桐子大每服二十丸食前溫酒下玉鎮丹治夢遺並白濁敗乾荷葉二兩白茯苓牡蠣左扇煆各一兩龍骨五色者另研三錢上為細末研勾白蠟溶和丸梧桐子大無白蠟以蠟糊代之每服五十丸空心麥門冬湯下日進二服如覺陽道衰小便清夢遺止即住服忌酒熱面如欲陽道旺即以麝香酒解之紫石英丸治虛勞夢與鬼交心氣虛弱紫石英細研水飛桑螵蛸微炒人參柏子仁龍骨各二兩硃砂細研水飛肉蓯蓉酒宿一宿刮去皮炙乾各一兩麝香半兩另研上為細末別研藥令勻煉蜜共和搗三百杵丸如梧桐子大每服二十丸食前溫酒送下丹溪樗樹根丸治夢遺精滑樗根皮一兩半良薑三錢黃柏芍藥燒友存性各二錢上為末神麯糊丸梧桐子大每服三十丸空心茶清送下小菟絲子丸治腎氣虛損目眩耳鳴四肢倦怠夜夢遺精菟絲子制石蓮肉二兩白茯苓二兩山藥二兩分一半作糊丸上為末山藥糊丸梧桐子大每服五十丸空心溫酒鹽湯任下如足膝無力木瓜湯下經驗豬肚丸止夢遺泄精進飲食健肢體甚有效白朮麩炒五兩苦參白者三兩牡蠣左扇者另煆研四兩上為末用雄豬肚一具洗淨盛罐內煮極爛石臼或木臼內搗成泥和藥再加肚汁搗半日丸如小豆大每服四十丸日進三次米湯送下久服自覺身肥而夢遺永止五味膏治夢遺極效北五味子一斤淨洗水浸一宿去核再用溫水將核洗取餘味通置砂鍋內以布濾過入好蜜三斤慢火熬成膏待數日後去火性每服一二匙空心白湯調服火候難於適中先將砂鍋稱定然後稱膏汁大約煮至二斤四兩成膏為度綱目豬苓丸治濕鬱熱滯夢遺精滑半夏一兩木豬苓末四兩上將半夏泡豆大先將豬苓末一半炒半夏色黃不令焦地上去火毒半日將半夏為末糊為丸梧桐子大候乾更用前豬苓末一半微炒同入砂罐貯之空心溫酒下四十丸日晡再服葛玄真人百補交精丸治夢泄精滑不禁熟地黃酒浸一宿竹刀切焙乾四兩山藥二兩五味子六兩杜仲制肉蓯蓉酒洗焙茯神遠志各二兩牛膝酒浸一宿焙澤瀉山茱萸肉巴戟去心石膏煅赤石脂柏子仁微炒另研各一兩上為細末煉蜜丸梧桐子大每服二十丸空心酒下男女可服心勞神虛夢泄諸方集驗柏子養心丸治心勞太過神不守舍閣眼則夢遺泄不常柏子仁鮮白不油熾者以紙包捶去油白茯神酸棗仁各二兩五味子半兩當歸身生地黃各二兩甘草辰砂細研犀角鎊各半兩上為末煉蜜丸如芡實子大金箔為衣午後臨臥津嚼一丸和劑王荊公妙香散安神祕精定心氣白茯苓白茯神各二兩人參遠志各一兩益智仁龍骨五色者各九錢甘草辰砂另研飛各半兩上為細末每服二錢空心臨臥溫酒調下道藏天王補心丹方見虛損門集驗養心湯方見不寐門二方並治神虛夢泄此為固本柏子仁丸治虛勞夢泄柏子仁枸杞子炒各一兩新韭子三兩十月霜後收者極妙酒浸曬乾微炒地膚子兩半上為細末煮棗肉和搗百餘杵丸梧桐子大每服三十丸空心及晚食前以粥飲下腎虛精滑諸劑録驗水陸二仙丹治精脫腎虛夢遺白濁等證金櫻膏一斤製法見備録芡實粉一斤二味和勻得所為丸梧桐子大每服七十丸空心薑鹽湯下丹溪九龍丸治腎虛精滑枸杞子金櫻子山茱萸肉蓮肉佛座須熟地黃芡實子白茯苓當歸各等分為末酒糊丸梧桐子大每服五十丸酒或鹽湯下鎖精丸治精滑不禁川續斷川獨活白茯苓石蓮子干菱米金櫻子穀精草川楝子酥炙蓮花蕊小茴香干藕節艾實子木楮苓錦龍骨各等分上為細末用雞子清為丸如梧桐子大每服四十丸空心鹽湯下食乾物壓之枸杞子丸治腎虛精滑補精氣甘州枸杞子黃精九蒸九曬各等分二味相和搗作餅子焙乾為末煉蜜為丸梧桐子大每服五十九空心溫酒送下良方子午丸治心腎俱虛夢寐驚悸休常自汗面黃肌瘦頭暈耳鳴夢遺精滑赤白濁下皆治方見濁門直指固精丸治心神不安腎虛精滑黃柏酒炒知母酒炒各一兩牡蠣煆龍骨煆蓮花蕊芡實子茯苓遠志山茱萸肉各三錢上為末山藥糊為丸梧桐子大硃砂為衣空心酒下五十丸濟生芡實丸治思慮傷心疲勞傷腎心腎不交精元不固面少顏色驚悸健忘遺精白濁足脛痠疼耳聾目暗口乾腳弱芡實子蓮花蕊各二兩茯神山茱萸肉龍骨生五味子熟地黃肉蓯蓉酒浸韭子炒紫石英煆七次川牛膝酒浸枸杞子各一兩上為末酒煮山藥糊丸小豆大每服七十丸空心鹽湯酒任下仙方固真丹專治精泄不禁禹餘糧石中黃赤石脂紫石英石燕以上並以炭火煆紅醋三升淬干為細末人參各一兩白茯苓四兩青鹽一兩上為細末再研勻用無灰酒煮糊為丸芡實大硃砂為衣每服二三丸空心臨臥溫酒或鹽湯送下玉露丸助元陽祕氣補腦固真不泄與金鎖丹相兼服緊白龍骨菟絲子酒浸焙乾另研韭子新瓦上微炒各三兩上為細末煉蜜丸梧桐子大空心溫酒或鹽湯下初服忌房事金鎖丹肉蓯蓉五兩切作片酒浸研為膏黑附子炮去皮臍巴戟去心各二兩破故紙微炒四兩胡桃仁三十個上三味為末同胡桃仁蓯容膏和勻再入臼內杵七八百下丸梧桐子大每服十丸溫酒送下鎖陽丹治遺精桑螵蛸三兩瓦焙龍骨一兩另研白茯苓一兩上為末糯米糊丸梧桐子大每服七十丸空心茯苓湯下氣虛精滑劑良方固氣丸治精滑自下天雄菟絲子五味子龍骨各兩半桑螵蛸山茱萸肉乾薑巴戟量各一兩韭子二兩上為末煉蜜丸梧桐子大空心酒下三十丸三仙丸治夢遺精滑益智仁二兩用鹽二兩同炒去鹽烏藥兩半炒山藥一兩炒上為末山藥煮糊丸梧桐子大每服七十丸空心茯苓湯送下御藥玉鎖丹治精氣虛滑遺泄不禁龍骨蓮花蕊雞頭子烏梅肉各等分上為末用熟山藥去皮為膏和丸小豆大空心米湯下三十丸祕精丸治元氣不固遺精夢泄大附子制龍骨煆肉蓯蓉油浸一宿牛膝酒浸巴戟去心各一兩上為末煉蜜丸梧桐子大每服三十九空心鹽酒或鹽湯任下直指鹿角散治臟腑久虛夢泄鹿角霜鹿茸去毛酥炙各三兩白茯苓三分人參白茯神桑螵蛸焙芎藭當歸破故紙炒龍骨另研新韭子酒浸一宿焙乾各半兩柏子仁炙甘草各一分上為末每服三錢半薑五片棗三枚粳米百粒食前煎服正傳經驗祕真丹治腎虛遺精夢泄白濁等證菟絲子韭子柏子仁各一兩龍骨牡蠣山茱萸肉赤石脂各半兩破故紙一兩遠志巴戟肉覆盆子枸杞子黃柏鹽酒炒黑色山藥各七錢半芡實子杜仲薑汁炒去絲各一兩金櫻子取黃者去刺核淨以肉焙燥二兩乾薑炒黑一兩鹿角膠半兩炒成珠上為細末煉蜜丸梧桐子大每服一百丸空心薑鹽湯任下博金散治氣虛精脫自遺人參一兩白茯苓絡石各二兩龍骨三兩上為末每服二錢空心米飲調服臨臥再服威喜丸治精氣不固夢遺精滑白濁白茯苓去皮切作塊用豬苓一分同於砂鍋內煮二三十沸取出日乾四兩不用豬苓黃蠟四兩上以茯苓為末溶蠟搜和丸如彈子大每服一丸空心細嚼隨津咽下小便清為度忌食醋丹溪珍珠粉丸治精滑白濁黃柏真蛤粉各一斤珍珠二兩樗根白皮一斤上為末滴水丸梧桐子大每服一百丸空心溫酒下經驗金櫻丸治夢遺精滑小便後遺溺金櫻子芡實子各一兩白蓮花蕊龍骨煆各半兩右為末糊丸梧桐子大每服八十丸空心鹽酒下虛寒精脫劑良方內固丸澀精健陽天雄龍骨鹿茸牡蠣韭子各半兩上為細末酒煮麵糊為丸梧桐子大每服三十丸空心溫酒下三因益智湯治腎經虛寒遺精白濁四肢倦怠時發蒸熱益智仁巴戟肉肉蓯蓉酒洗鹿茸去毛酥炙熟地黃酒浸附子制桂心山茱萸肉白芍藥防風枸杞子牛膝酒浸甘草炙各一錢上水二盞薑三片鹽一捻煎一盞空心服三因安中散治三焦虛寒短氣煩悶精滑便濁熟地黃巴戟肉龍骨各二兩半遠志炒茯苓各三兩蛇床子炒兩半天雄制五味子山藥各二兩半肉蓯蓉酒浸續斷菟絲子制各四兩上為細末每服二錢溫酒送下濟生固精丸治嗜欲太過勞傷腎經精元不固遺精白濁肉蓯蓉酒浸陽起石煆細研飛鹿茸去毛酥炙韭子炒鹿角霜赤石脂煆巴戟肉白茯苓附子制龍骨生各等分上為末酒糊為丸梧桐子大每服七十丸空心酒鹽湯任下簡易心腎丸治水火不既濟心下怔忡夜出盜汗夢遺便赤牛膝酒浸熟地黃肉蓯蓉二兩酒浸去皮菟絲子酒浸三兩鹿茸去毛酥炙附子炙人參黃耆蜜炙五味子茯神山藥炒當歸酒浸龍骨煆遠志甘草水煮去心薑汁炒各一兩上為末酒煮糊為丸梧桐子大每服七十丸空心棗湯下醫林螵蛸丸治下焦虛冷精滑不固遺溺不斷桑螵蛸七個炒附子炮去皮臍五味子龍骨各半兩上為細末糯米糊為丸梧桐子大每服五十丸空心鹽酒下椒腎丸治虛勞內傷腎氣衰冷精氣滑泄漢椒去目併合口者微炒出汗鹿茸去毛酥炙芡實子生用龍骨各一兩肉桂桑螵蛸微炒白礬煆乾薑炮白朮各兩半破故紙微炒一兩上為末入鹽花二兩研勻用獖豬腎十枚切去脂膜研爛以酒三升漸入熬成膏次入藥末和搗二三百杵丸如梧桐子大每服三十丸食前溫酒送下韭子丸治虛勞寒脫漏精韭子炒車前子菟絲子酒煮另搗天雄制龍骨各一兩鹿茸去毛酥炙桑螵蛸炒乾薑炮各三分上為細末煉蜜和丸梧桐子大每服三十丸空心黃耆湯下萬氏祕傳金鎖思仙丹治男子嗜欲太過精氣不固澀以去脫之劑蓮花蕊十兩石蓮子十兩芡實子十兩金櫻子三斤制見備録上以金櫻煎成膏如餳入前二味藥末和丸梧桐子大空心鹽酒下三十丸服久精神完固能成地仙平時忌葵菜車前子易簡諸方衛生方治泄精用未連晚蠶蛾干之為末空心溫酒調服三錢又方治失精久虛漏泄用蓮子心一撮辰砂一分為末每服二錢空心白湯調下又方治元氣虛寒精滑不禁大便瀉手足冷陽起石火煆鍾乳粉各一兩為末酒煮附子末糊丸梧桐子大空心米飲下五十丸又方用車前草搗汁二合服之甚效又方用乳粉一塊拇指大臨臥放口內細嚼含之睡至三更咽下服三五次有效太平聖惠方治虛勞腎損夢中遺精用韭子二兩微炒為末食前酒下二錢陳藏器注云取韭子生吞三十粒空心鹽湯下止夢遺白濁外臺祕要治夢遺以蘇子一升炒為末酒調方寸匕日再服百一方治男女喜夢與鬼交致恍惚者方截鹿角屑三指一撮酒調下日三服祕方治精滑夜夢以旱蓮草焙乾為末空心米湯調下二錢四服效有以蜜酒調久服黑髭發固精極效針灸法命門一穴在背脊中兩腎俞之間與臍相對治遺精不禁者灸五壯立效心俞不宜多灸腎俞中極灸隨年壯白環俞灸五十壯導引法一法半夜子時分陽正興時仰臥瞑目閉口舌頂上齶將腰拱起左手用中指頂住尾閭穴在督脈下行盡處是穴右手用大指頂住無名指根拳著又將兩腿俱伸兩腳十指俱摳提起一口氣心中存想脊背腦後上貫至頂門慢慢直下至丹田方將腰腿腳手從容放下再照前行陽則衰矣如陽未衰再行二三次如初行時陽未興勉強興之方可行夫人之所以有虛疾者因年少欲心太盛房事過多水火不能相濟以致此疾能行此法不惟速去泄精之病久而腎氣上升心火下降則水火既濟永無疾病矣一法治遺精不禁以床鋪安短窄臥如弓彎二膝並臍縮或左或右側臥用手扎陰囊一手伏丹田切須寧心淨臥戒除房室思欲之事固精不泄可保身矣一法側身曲臥戌亥之間一手兜外腎一手搓臍下八十一次然後換手每手各九次兜搓九日見效八十一日成功釋夢門病機諸夢敘論靈樞淫邪發夢篇帝曰願聞淫邪泮衍奈何岐伯曰正邪從外襲內而未有定舍反淫於藏不得定處與榮衛俱行而與魂魄飛揚使人臥不得安而喜夢氣淫於腑則有餘於外不足於內氣淫於臟則有餘於內不足於外帝曰有餘不足有形乎岐伯曰陰氣盛則夢涉大水而恐懼陽氣盛則夢大火而燔焫陰陽俱盛則夢相殺上盛則夢飛下盛則夢墮甚飢則夢取甚飽則夢與肝氣盛則夢怒肺氣盛則夢恐懼哭泣飛揚心氣盛則夢喜笑脾氣盛則夢歌樂身體重不舉腎氣盛則夢腰脊兩解不屬凡此十二盛者至而瀉者立已厥氣客於心則夢見丘山煙火客於肺則夢飛揚見金鐵之奇物客於肝則夢山林樹木客於脾則夢丘陵大澤壞室風雨客於腎則夢臨淵沒居水中客於胃則夢飲食客於大腸則夢田野客於小腸則夢聚邑沖衢客於膽則夢鬥訟客於陰器則夢接內客於項則夢斬首客於陘則夢行走而不能前客於股肱則夢禮拜客於胞䐈則夢溲便凡此數不足者至而補之立已也養生主論王隱君曰痰火客於心肺夜夢鬼交而泄或夢騰空而飛或夢行險而墜或夢兵刃追誅逃避無所誤入人家四壁無路或夢鬥死重傷或夢悲啼忿怒或見枯骨煙焚焦氣撲鼻或夢騎馬郊行忽見天邊日月光耀遍身急急回顧元無所自怪夢多端不可勝紀要皆痰火熾於心肺使之然也周禮春官宗伯掌其歲時觀天地之會辨陰陽之氣以日月星辰占六夢吉凶一曰正夢二曰噩夢三曰思夢四曰寤夢五曰喜夢六曰懼夢夫人不知占釋之理憂思鬱結疑懼成疾者曷可勝言漢藝文志云占卜韭一而夢為大故周有其官而詩載熊羆蛇虺蟲魚旐旟之夢著明大人之占以考吉凶以釋疑惑虛實成夢東萊類説云形接而為事神遇而為夢淫虛則夢飛沉實則夢溺寢藉則夢馬寢帶則夢蛇將陰則夢水將晴則夢火病則夢憂喜則夢樂神虛則夢多神壯則夢稀有夢亦不記故云至人無夢愚者少夢孫真人云欲無惡夢勿食本命所肖之物及龜鱉無鱗之魚勿殺生命勿思淫邪悖逆之事睡必首東受生氣側身而外則安睡而無夢矣浚川雅述夢之説有二感於魄識者有感於思念者何謂魄識之感五臟百骸皆具知覺故氣清而暢則天遊肥滯而濁則身欲飛揚而復墜心豁淨則遊廣漠之野心煩迫則局蹐冥竇而迷蛇之擾我也以帶系雷之震耳也以鼓入飢則取鮑則與熱則火寒則水推此類也五臟魄識之感者著矣何謂思念之感道非至人思擾莫能絶也故首尾一事在未寐之前則為思既寐之後則為夢是夢則思也思即夢也凡舊之所履書之所為入夢也則為緣習之感凡未嘗所見未嘗所聞入夢也則為因衍之感談怪變而鬼神魍象作見臺榭而天闕王宮至懺蟾蜍也以踏前之誤過女子也以瘞骸之思反覆變化忽魚忽人寐覺兩忘夢中説夢推此類也人心思念之感著矣夫夢中之事即世間之事也緣象比類豈無偶合要之漫渙無據靡兆我者多矣夢為神不守舍春甫曰心為棲神之所凡思慮過多則心血虧耗而神遊於外故多夢所謂書之所思夜之所夢神魂依形而至形體未到之處夢亦罕能到也故云夢多舊境夢多故人所以人年四十已後多夢死人蓋其所交遊豈無死者如之何其弗夢耶昔豫師葉光山起貢到京師一夕忽夢窗友黃浦張黨者邀接行遊乃曰故人何棄我之甚耶豫二人於此候之久矣茲既至可以賡歌唱飲勿得思歸須臾夢覺駭汗而起曰斯二人乃豫之先貢而俱亡之於京師者也今夢邀豫甚為不祥馳明束裝南歸心甚驚愕至家逾十五年而赴選兩任縣令者六年歸休林下者迄今又十餘年也計其壽算將未有艾觀此夢胡可以必信哉雖云吉以兆吉凶以兆凶要在夫人正心成德以俟夫自然之天則吉凶消長罔有不得其正者治法修德禳夢傳曰諸侯夢惡則修德大夫夢惡則修官士庶夢惡則修身如是可以轉災而為福矣智人兆夢釋典云四玄判夢一曰無名重習二曰舊識巡遊三曰四大偏增四曰善惡先兆釋者曰顧人自修何如耳又在釋之者急口為兆故曰癡人之前不可説夢祝由科厭夢法黃帝祝由科十二符按十二時以厭惡夢清晨隨日至誠書符面東以水噀之執符而咒曰赫赫陽陽日出東方斷釋惡夢拔除不祥急急如律令一氣念七遍將符帖之吉又咒法清晨沐漱畢以淨水噀東方咒之曰惡夢著草木好夢成珠玉自然吉利藥方養心妄神丸治心虛多夢除亂夢惡夢當歸身白茯神酸棗仁五味子犀角琥珀玄明粉黃連硃砂為衣甘草熬膏各等分為細末甘草膏和煉蜜丸黍米大每服二十丸夜臥時津下久服夢自少間或有夢可兆凶吉養生滾痰丸治一切惡夢怪夢每夜服一錢自然清寐方見痰門凡夢因臟府之虛實而感之如肝氣盛則常夢怒治宜平肝之藥如肺氣盛則常夢哭治宜清肺金如上焦熱則夢飛治宜降火如下部虛則夢墜治宜滋陰之屬是也余可類推遁甲天書有遊仙夢勾婁神書有夢入神機其術可以魂遊而知事情似涉於幻誕故不載入不寐候病機內經敘論靈樞邪客篇帝曰夫邪氣之客人也或令人目不瞑不臥何氣使然伯高曰五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中出於咽喉以貫心脈而行呼吸焉營氣者泌其津液注之於脈化以為血以榮四末內注五臟六腑以應刻數焉衛氣者出其慓氣之悍疾而先行於四末分肉皮膚之間而不休者也晝日行於陽夜行於陰常從足少陰之分間行於五臟六腑則衛氣獨衛其外行於陽不得入於陰陰虛故目不瞑帝曰治之奈何伯高曰補其不足瀉其有餘調其虛實以通其道而去其邪飲以半夏湯一劑陰陽已通其臥立至半夏湯見後口問篇曰陽氣盡陰氣盛則目瞑陰氣盡而陽氣盛則寤矣不寐為痰火思慮所致春甫謂痰火擾亂心神不寧思慮過傷火熾痰鬱而致不眠者多矣有因腎水不足真陰不升而心陽獨亢亦不得眠有脾倦火鬱夜臥遂不疏散每至五更隨氣上升而發燥便不成寐此宜快脾發郁清痰抑火之法也傷寒大病之後多有不寐傷寒書云傷寒瘥後不得眠者何也蓋熱氣與諸陽相併陰氣未復所以不得眠又謂汗下後過亡津液心血虛而神不寧亦不眠脈候不眠脈微澀為血虛寸口浮大有火兼滑為痰兩尺弦大為腎虛相火炎上治法治不眠要分虛實體氣素盛偶不眠為痰火所致宜先用滾痰丸次用安神丸清心涼隔之類體氣素弱或因過勞或因病後此為不足宜養血安神補心之類治病後不眠與尋常不眠者殊異凡病後及婦人産後不得眠者此皆血氣虛而心脾二臟不足雖有痰火亦不宜過於攻治仍當以補養為君而略佐以清痰火之藥其不因病後而不寐者須以痰火處治亦必少佐以養血補虛之藥方為當也治不眠貴知標本凡人勞心思慮太過必至血液耗亡而痰火隨熾所以神不守舍煩敝而不寐也導痰清火以治其標稍得效驗仍須養血收神兼之靜定以治其本則不再復以竭其真也此心元之主神思之病不可不慎每見輕淺視之漸至元神俱竭而不可救者有矣藥方補虛諸劑本集養心湯治體質素弱或兼病後思慮過多而不寐者當歸身生地黃熟地黃茯神各一錢人參麥門冬各錢半五味子十五粒柏子仁酸棗仁各八分甘草炙四分水盞半加燈心蓮子煎八分食遠服酸棗仁湯治大病後氣血俱虛內亡津液煩渴心躁諸虛煩熱不得眠者宜用此藥酸棗仁微炒人參各一錢麥門冬三錢竹茹二錢上水二盞龍眼肉五枚煎七分無時服局方茯苓補心湯治思慮過多心神憒亂煩躁不寐白茯苓白茯神麥門冬生地黃陳皮半夏曲當歸各一錢甘草五分上水竹葉燈心同煎服祕驗琥珀多寐丸治健忘恍惚神虛不寐真琥珀真羚羊角細鎊人參白茯神遠志制甘草各等分上為細末豬心血和蜜丸如芡實子大金箔為衣每服一丸燈心湯嚼下和劑辰砂妙香散治心氣不足精神恍惚虛煩不眠方見虛煩門清痰火諸劑溫膽湯治病虛煩心膽驚怯自汗有痰不寐者方見驚悸門養心滾痰丸治痰火實火無故不寐方見痰飲門調和諸劑靈樞秫米半夏湯靈樞經中有此方世醫鮮用之久病不寐者神效秫米一升半夏五合千里長流水一斗揚之萬遍取清者五升煮秫米數沸炊以葦薪令竭至一升半去秫米半夏取汁飲之每服一小杯日三服其新病者覆杯即臥汗之即已久病者三日三飲而已也東垣安神丸治血虛心火神亂不眠方見驚悸門活人竹葉石膏湯治病後煩躁不眠梔子烏梅湯同前方治局方歸脾湯治病後及思慮心脾兩虛而不寐者道藏天王補心丹治心腎兩虛水火不濟致夜不寐心悸口乾煩躁不定此治本之要藥也二方並見虛損門
