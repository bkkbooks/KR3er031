body:
  text: 卷之六十四舌證門病機舌候敘論陰陽應象大論曰南方生熱熱生火火屬心心生血心主舌心開竅於舌聲為笑色為赤又曰舌為心之苗金匱真言論曰脾開竅於口臟精於脾故病在舌本脾脈上連於舌本診要經終云厥陰終者中熱嗌乾善溺心煩甚則舌卷卵上縮而終矣又云心脈系舌本脾脈絡系舌傍一云肝脈絡舌本傷寒書云風寒中厥陰經則舌縮而不言七情所郁及心經熱壅則舌腫滿不得息心熱則舌裂而瘡肝熱則舌木而硬脾熱則舌滑而胎肺熱則舌強熱甚則舌燥如鋸舌卷囊縮者不治厥陰絶也自齧舌靈樞經帝曰人有齧舌者何氣使然此厥逆走上肺氣背至也少陰氣至則齧舌少陽氣至則齧頰陽明氣至則齧唇治主病也脈候心脈洪大者舌病強而有胎脾脈浮滑者病舌喑治法治心病先要清心豁脾流氣行血為本舌之病本乎心與脾之火熱之致也心脾壅滯氣血失運而舌為之病矣小則擦藥塗藥而愈大則必拔其根本須瀉其心脾二經之鬱火方可愈矣治案張子和治一婦人木舌脹其舌滿口諸藥罔效令以排針砭之五七度腫減血出盈斗三日方平一婦人産子舌出不能收令以硃砂末敷其舌乃令作産子狀一女掖之乃於壁外潛纍盆盎置處墮地作聲婦聞聲而舌收矣一人病喑不能言也右關脈浮滑餘部皆平右關為脾絡系舌本醉臥當風風中經絡而成喑以荊瀝化至寶丹服之遂愈醫說治一人舌腫滿口諸藥不效以梅花冰片末敷之遂消舌下腫出如舌謂之重舌又謂之子舌皆上膈熱壅故也惟砭針刺去血為上法舌腫硬不能出聲者以百草霜鹽醋調敷舌上有白胎語謇澀者用薄荷汁白蜜薑片揩之舌上俞舌出血不止名曰舌衄患此者皆心受熱甚也舌病忽然腫起逡巡間塞悶殺人甚急須要早治或腫起如豬胞或脹硬如木石但看舌下有成蟲形狀如蛄蟻或如臥蠶仔細看頭上少白可燒鐵釘烙其頭上使熱即消急用釜底煤不拘多少以醋調厚敷上下或以瀝清調敷或以井花水調加鹽和成膏敷之脫去更敷須臾即消甚者須急決去血方好血去更敷之立愈王況治一大賈因失驚伸舌出遂不能收經旬食不下咽尫羸日甚國醫不能療其家榜於市曰有能治者酬千金況醫名未著學且未精因檢針經有針法治此疾遂往治之用針舌之底抽針出舌遂伸縮如平時一人舌脹腫出口外無敢醫者一村人云我有此藥歸取二紙捻燈上燒取煙燻隨即消縮衆問之強而後言豫家昔有一人曾患此疾人教以萆麻油蘸紙捻依法治而愈因思治人亦驗上二條出醫說一人舌腫滿口不能出聲醫不能治一叟用藥摻之至晚如舊問其藥乃真正蒲黃一味藥方升麻柴胡湯治心脾虛熱上攻舌上生瘡舌本強二頰腫痛升麻柴胡芍藥梔子木通大青黃芩各一兩石膏二兩上咀每服五錢水煎服甚者口舌生瘡不已須加熟附子三分柳花散治口舌生瘡玄胡索一兩黃柏黃連各半兩青黛密陀僧各二錢上為末每用少許敷瘡有津液吐出再用絳雪治舌上生瘡及口瘡咽喉腫痛咽物不得皆可治之冰片半字硼砂一錢辰砂三錢馬牙硝寒水石研極細水飛各二錢上為細末每用一字摻舌上咽之不妨喉痛者吹入咽中亦可碧雪治一切熱壅舌上生瘡舌根緊強腮頰腫痛口瘡咽腫咽津不得者此皆心肺積熱上攻此藥治之蒲黃青黛硼砂焰硝甘草各等分上為細末每用少許摻舌上細細咽下或飲涼水送下頻用之效或用砂糖丸芡實大每服一丸噙化下咽妙冰柏丸治舌上瘡口瘡黃柏薄荷葉各等分硼砂甚者加冰片上為末生蜜丸彈子大每服一丸噙化升麻散治心脾有熱口唇破裂生瘡方見口門生地黃膏治口舌瘡腫鮮地黃藍青葉各等分上入蜜杵細每服半兩井水煎食後服熟艾湯治心胸蘊熱舌上血出及失血熟艾糯採半合同炒松花粉柏葉炙各半兩上咀每服三錢水一鍾煎七分去滓不拘時服寸金散治心經煩熱血溢妄行舌上血出不止新蒲黃三錢新白麵牛黃研冰片研各五分上為細末每服一錢食後生藕汁調服聖金散治舌上血出不止黃藥子一兩青黛一錢上為細末每服一錢食後新汲水調下日二服金花煎治舌上出血如簪孔黃柏三兩黃連五錢梔子二十枚上咀以酒二升浸一宿煮三服去滓頓服香參丸治心臟熱盛舌上出血人參生蒲黃麥門冬當歸各半兩生地黃一兩焙甘草一錢炙上為細末煉蜜丸小彈子大每服一丸溫水化下日三服戎鹽丸治舌黑有數孔大如箸出血如湧泉此心臟熱病戎鹽黃芩黃柏大黃各五兩人參甘草各二兩桂心少許上為細末煉蜜丸梧桐子大每服十丸米飲送下日三服䗪蟲散治舌腫滿口語言不得䗪蟲五枚炙食鹽半斤上研細末水二鍾煎十沸去滓熱含吐去以瘥為度蛇蠍散治舌腫強硬蛇蛻燒存性全蜴各等分為細末每用少許敷舌上飛礬散治木舌漸腫大滿口若不急治即塞殺人白礬飛百草霜各等分上研細末捻糟茄自然汁調服若口噤灌之妙玄參散治心脾熱壅木舌腫脹玄參升麻大黃犀角各七錢甘草半兩上咀每服五錢水鍾半煎五分不拘時溫服馬牙硝丸治木舌熱腫漸大滿口宜含之馬牙硝細研三分鉛白霜寒水石太陰玄精石大黃炒各半兩麝香少許白礬枯半分甘草炙一分上為細末煉蜜丸小彈子大每服含一丸咽津薄荷煎治舌上生白胎干語言不真鮮薄荷取自然汁白蜜各等分和上以生薑片先蘸水揩洗方用薄荷煎服之加玄明粉更良皂角散治重舌喉痹皂角不蛀者四五錠去皮核炙令乾荊芥穗二錢上研細末以米醋調塗腫處黃藥湯治舌腫及重舌黃藥甘草炙各一兩上咀每服三錢水一鍾煎七分去滓食後溫服含化丸治上焦煩熱頭目不利口舌乾燥石膏半斤細研水飛寒水石半斤細研白蜜半斤上以水四大碗煎取一大碗濾過入蜜同煎令稠丸如雞頭實大常含一丸咽津硼砂丸治口乾舌上生瘡硼砂一兩冰片麝香各一錢牙硝風化四兩寒水石煆十兩甘草膏和丸麻子大不時含化一丸咽津緑雲散治舌上瘡銅緑鉛白霜各等分研極細末每用少許摻舌上升麻飲治膀胱熱不已口舌生瘡咽喉腫痛升麻玄參射干各四兩大青黃柏各三兩薔薇根白皮淨洗四兩上咀水七升煮取一升五合去滓下蜜更煎三沸細細含咽黃柏丸治口舌生瘡腫痛黃柏末一兩蟾酥黃丹各一分上為細末端午日午時用蒸餅和丸如緑豆大綿裹一丸夜間含之有涎吐出貼臍膏治元氣虛浮陽氣上攻口舌生瘡不已吳茱萸醋炒乾薑炮各五錢木鱉子五枚去殼上為細末每用五分用冷水調以紙靨貼臍加味龍石散治口舌生瘡時時血出咽嗌塞痛煩悶甘露飲治舌上生瘡方見口門易簡諸方一方治舌上出血如簪孔以香薷一握濃煎汁服又方治舌腫脹出口外用雄雞冠刺出血瓦盞盛浸舌就咽下即縮又方治重舌用生白礬黃丹飛過五倍子等分為細末蜜調塗舌上少頃以水漱之再塗以瘥為度針法脾經針經曰脾足太陰之脈所生病者舌本痛廉泉治舌下腫難言口瘡舌縱舌根急縮穴名舌本在項下結喉上金津玉液以上二穴各刺出血天突少商齒候門病機齒候敘論經曰腎衰則齒豁精固則齒堅又曰齒者腎之標骨之餘也巢元方云齒者骨之所終髓之所養手陽明之支脈入於齒若髓不足陽明脈虛不能榮於齒則齒病矣東垣曰夫齒者腎之標口者脾之竅諸經多有會於口者其牙齒是也手足陽明之所過上齦隸於坤土乃足陽明胃之脈貫絡也止而不動下齦嚼物動而不休手陽明大腸之脈所貫絡也手陽明惡寒飲而喜熱足陽明喜寒飲而惡熱其病不一牙者腎之標亦喜寒寒者堅牢為病不同熱甚則齒動齦齦袒脫作痛不已故所治療不同也有惡寒冷之物而作痛者有惡熱物而作痛者又有惡寒熱之物而作痛者有惡寒飲少熱飲多而作痛者有惡熱飲少寒飲多而作痛者有牙齒動搖而作痛者有齒袒而為痛者有齒為疳所蝕缺血出而為痛者有脾胃風熱齒齦腫起為痛者有齒疳臭爛穢氣不可近者此火熱之甚也諸齒病皆胃火之故王節齊云牙床腫痛動搖或黑臭脫落世人皆作腎虛殊不知此屬陽明經濕熱蓋齒雖屬腎而生牙床上下屬胃與大腸二陽明經猶木生於土也腸胃日受美酒甘肴膏粱之味致濕熱上攻則牙床不清而為腫為痛或出血或生蟲故齒不安而動搖臭黑脫落宜瀉陽明之濕熱則牙床清寧而齒自安矣大抵齒痛皆屬陽明胃火旺之故且齒者骨之精華骨乃腎之所主外板則為牙內床則為齒人若腎氣強盛則齒自堅衰則齒必為病且手陽明之脈貫頰入於下齒縫中灌注於牙或風寒熱鬱本經既病齒則因之輕者為宣露齦頰浮腫甚者則為疳䘌齲脫之證齒於之病在乎手足陽明二經動搖齦脫是以足少陰腎經主之此三經為齒之所病也病熱則生風病濕則生蟲齒病不過風寒濕熱蟲也齒病多為飲食厚味毒穢積寒為患金丹大全書云令人修養倒置漱齒每以早晨是倒置也凡一日飲食之毒余積於齒縫中當於夜下洗刷使垢穢不藏於齒縫齒自不壞矣故云晨漱不若夜漱此善於養齒者今觀智者每日飯後必漱及晨晚通有五漱則齒至老堅白不壞斯存養之功可見矣走馬牙疳證牙床腐爛一時脫落不救謂之走馬牙疳言其速也此蓋熱毒蘊積既久故令一時發作如火鬱於寵突之中久矣一發而勢焰燎然莫之能御病此者十無一生惟初發之時急以疳藥搽之漱之內瀉陽明胃火庶可愈者脈候左手寸關脈洪數或弦而供腸胃中有風熱齒痛尺脈洪大而虛者腎虛主齒動疏豁相火上炎而痛治法治齒病瀉陽明胃火為先丹溪曰牙齒痛腫或動或血出皆是屬熱宜瀉胃火胃氣實者用調胃承氣湯加黃連石膏升麻白芷防風荊芥薄荷桔梗甘草之類外用四神散加梧桐律擦之或加麝香治老人腎虛齒動當以補腎固齒為本經曰人年四十而陰氣自半又云五八腎氣衰發墮齒槁可見年及四旬急以補腎固齒不可少緩果能於未傷之先固濟則無損壞之理易曰苟得其養無物不長苟失其養無物不消此之謂歟治牙痛有四法聖惠方云熱者怕冷水宜用牙硝薑黃雄黃荊芥等治之冷者怕熱湯宜用乾薑蓽茇等治之不怕冷熱乃風牙以豬牙皂角殭蠶蜂房草烏治之有孔者為蛀牙宜用雄黃石灰砂糖等治之用藥了皆以溫水漱之治齒間肉壅出豫邑宋汪丞相之寵好食厚味一日熱大作齒間擁出有肉漸大脹滿口不能閉水漿不入一醫治之不日而愈法用生地黃汁一碗牙皂角數挺火上炙熱蘸汁令盡為末敷壅肉上隨即消縮齒病外因者不治齒因不知護惜或擊損者或跌撲者或齧堅物而傷者或咬重物而傷者此皆外因非藥之可醫知者不可不慎藥方治齒通用劑和劑清胃散治陽明熱盛齒痛或因服熱藥及引腦痛皆然牡丹皮升麻各一錢當歸生地黃黃連各錢半上作一服水二鍾煎八分食遠溫服經驗玉池散治風蛀牙痛腫癢動搖於齦潰爛宣露出血齦熱臭氣當歸川芎防風白芷藁本細辛升麻地骨皮槐花甘草各等分上咀每服五錢水二盞黑豆二十粒姜三片煎一盞去渣不拘時服漱口吐去咽下亦不妨祕驗清胃飲治一切風熱濕痰牙痛床腫血出動搖當歸生地黃黃芩石膏各一錢升麻五分白芍藥青皮黃連各八分甘草牡丹皮各四分梔子仁蒼朮各一錢細辛藿香荊芥穗各六分上水二鍾煎八分食後緩緩含呷之效東垣神功丸治多食肉人口臭不可近牙齒疳蝕牙齦肉脫血出藿香葉當歸身木香升麻各一錢生地黃酒洗甘草各三錢黃連酒洗縮砂仁各五錢上為細末湯浸蒸餅為丸如緑豆大每服一百丸或加至二百丸白湯食遠服此藥兼治血崩血痢及下血不止血下褐色或紫或黑及腸澼下血空心服米湯下其脈洪大而緩者及治麻木血氣上衝逆氣上行妄聞妄見者皆效立效餅子治一切風牙蟲牙疼痛不可忍良薑草烏川芎蓽茇胡椒各等分上為細末酒糊丸梧桐子大捻作餅子每用一餅咬在患處有涎出立愈㗜鼻藥治諸般牙疼雄黃一錢乳香沒藥各五分上為細末右疼吹左鼻左疼吹右鼻治牙疼有四法用此並無不愈者先用吹藥次用漱藥次擦藥次隨證服藥此為四治並施是也漱牙藥劑追毒散治諸般牙疼貫衆鶴蝨荊芥細辛苦蜂房各等分上為粗末每用三錢加川椒五十粒水一鍾煎七分乘熱漱之薑黃散治牙疼不可忍薑黃白芷細辛各等分上為粗末擦患處須臾吐涎鹽湯漱口面赤腫者去薑黃加川芎立見腫消蓽茇散治牙疼最效蓽茇細辛白芷荊芥穗升麻鬱金當歸各等分上為細末瓦盒貯之緊閉勿令泄氣每用少許擦痛處後以荊芥湯漱之蓽茇湯治齒痛通用蓽茇生地黃當歸尾荊芥穗白芷桑白皮炒蜂房炒赤芍藥薑黃細辛藁本甘草各等分上為粗末每用三錢井水煎漱椒鹽散治牙痛用清涼藥不效及甚者宜從治之以此川椒蓽茇薄荷荊芥穗細辛朝腦清鹽各等分上為末擦痛牙齊峰花椒散治諸牙痛點紅花椒四錢朝腦赤小豆砂仁各二錢明礬枯一錢為末以少許塞患處咽下亦不妨齒痛惟藉花椒麻痹熱證牙痛方經驗升麻散治牙疼腮腫升麻生地黃川芎地骨皮槐子皂角白芷細辛各五錢川椒二兩半為末以少許擦牙有涎吐出用鹽湯漱犀角升麻湯治陽明經風熱之甚口唇頰車連牙腫痛犀角一錢半升麻五分防風羌活各六分川芎白芷黃芩白附子各五分甘草三分水二鍾煎八分食後漱服驅毒飲治熱毒上攻宣露出血牙齦腫痛不可忍屋遊即瓦上清苔不拘多少淨洗水煎湯澄清入鹽一撮頻頻漱之直指立效散治牙疼不可忍痛連頭腦項背微惡寒飲大惡熱飲防風一錢升麻七分甘草炙三分細辛葉一分草龍膽酒製四分上水一鍾煎五分去渣以匙抄在口中炸痛處待少時立止如多惡熱飲更加草龍膽一錢此法不定隨寒熱多少臨時加減若惡風作痛加草豆蔻黃連各五分除去龍膽草纍用得效良方荊槐散治牙宣出血不止疼痛荊芥穗槐花各等分為細末擦牙患處鬱金散治牙齒出血疼痛鬱金白芷細辛各等分上為細末擦牙齦疼處噙少時有涎吐出防風散治牙齒疼痛防風鶴蝨各三錢上水二鍾煎一鍾不拘時噙漱元戎梧桐律散治足陽明經虛風熱所襲流傳牙齒攻蛀於齦則致腫結妨悶甚者與齦間津液相搏化為膿汁宜用此藥梧桐律石膽礬黃礬蘆薈升麻各半兩麝香亂髮各一錢硃砂細辛當歸川芎牛膝各二錢半上為細末先以甘草湯漱口後用藥少許敷之常用擦牙去風熱消腫毒牢固永無牙宣疳血之病石膏升麻散治證同前石膏升麻地骨皮羊脛骨灰上等分為末每用少許頻擦牙齒根上風牙疼痛諸方獨活散治風腫牙疼獨活羌活川芎防風各半兩細辛荊芥薄荷生地黃各一錢上咀每服三錢水鍾半煎七分漱咽細辛散治風牙痛腮頰浮腫細辛荊芥穗各一兩白芷草烏各二兩紅花椒鶴蝨蓽茇牙皂角砂仁硌五錢為末用少許頻擦患處有涎吐之仍用鹽湯漱如神散治風牙蟲牙攻注疼痛牙齒搖動連頰浮腫川椒炒出汗露蜂房炙各等分上為細末每用二錢水煎數沸熱漱即止祕方全蠍散治風牙蟲牙疼痛全竭川椒防風荊芥細辛獨活各等分上咀每服二錢水鍾半煎一鍾乘熱漱之一方為末擦有白芷無獨活川芎石膏散治風牙痛川芎石膏升麻細辛草烏白芷防風羌活上為末擦牙有涎吐出赴筵散治風蟲牙痛良薑草烏細辛荊芥各等分上為末如前擦定痛散治風牙立效細辛半兩白芷川烏各一兩乳香一錢上為細末每用少許擦牙有涎須臾吐出以鹽湯漱灌逡巡散治風牙腫痛亦治腮頰腫痛良薑二寸全蠍一枚焙乾上為細末擦牙令熱須臾吐出涎以鹽湯漱口聖惠蟬蛻散治風蟲牙痛蟬蛻蜂房殭蠶牛膝草烏荊芥細辛地松各等分上咀每服二錢水一鍾煎熱漱牙冷則吐出祕方祛風定痛散治一切風蟲牙疼細辛白芷防風白蒺藜川芎香附子石膏沉香甘松山奈沒石子薄荷葉旱蓮子青鹽各二錢膽礬七分上為末早晚擦患處少時出涎吐出用鹽湯漱濟生香鹽散牢牙去風大香附炒極焦黑三兩青鹽一兩另研上為末如常擦牙乃鐵甕先生良方淡寮雙枝散牢牙去風蟲齲宣露一切齒候並皆治之槐枝柳枝各截四十七莖切碎大皂角不蛀者七條食鹽四兩上件同入瓷瓶內固濟糠火燒一夜候冷取出為末如常擦牙選要芫花散治風蟲諸牙痛芫花細辛川椒蘄艾小麥細茶各等分上咀水一鍾煎七分溫漱口三四次吐涎出即愈草烏頭散治風牙疼痛草烏頭米泔浸一宿去粗皮切作片炒一兩五靈脂高良薑白殭蠶蓽茇細辛去苗各半兩乳香另研一錢上為細末研勻每用一字擦牙合口少時去涎鹽湯漱口救苦散治一切牙齒疼痛及風牙蟲牙並治川烏草烏芫花良薑紅豆細辛各二錢石膏官桂各三錢上為細末每用少許貼牙齦痛處有涎吐出露蜂房散治諸牙疼不可忍川芎白芷當歸赤芍藥細辛防風藁本升麻蜂房炒各一錢川椒十粒作一服水煎乘熱漱冷即吐出大戟散治風蟲諸牙疼痛經驗如神大戟三兩露蜂房炒細辛各一兩防風半兩上咀每服五錢水一鍾煎八分不拘時熱漱蟾酥膏治風蛀諸牙疼痛蟾酥少許巴豆去油研如泥杏仁燒研如泥以綿裹如粟米大如蛀牙扎入蛀處如風牙扎入牙縫中吐涎盡愈香附子散治牙齒疼痛往來不歇香附子四兩細辛五錢上銼每服三錢水一鍾煎八分稍熱漱冷即易之七香散治風蛀於痛及牙宣蔓荊子荊芥穗香附子炒地骨皮白芷防風各一分草烏三枚麝香少許研上咀每服三錢水一大鐘煎八分澄清熱漱寒犯牙痛諸方東垣羌活散治客寒犯腦及風寒湊襲腦痛項筋急牙齒痛動搖齒齦袒脫疼痛藁本香白芷桂枝各三錢蒼朮升麻當歸身六分草豆蔻一錢羌活一錢半羊脛骨灰二錢麻黃去根防風各三錢柴胡五分細辛少許上為細末每以少許擦牙患處有涎吐出白芷散治大寒犯腦牙齒疼痛麻黃草豆蔻各一錢半黃耆升麻各一錢吳茱萸白芷各四錢當歸熟地黃各五分藁本三分桂枝二分半羌活八分上為細末先用溫水漱淨以藥擦之丁香散治寒牙疼草豆蔻白芷細辛草烏丁香蠍梢上為末如前擦用楊氏雄黃定痛膏治諸般風蟲牙齒疼痛盆硝另研一錢雄黃另研一錢大蒜一枚細辛二錢豬牙皂角四定上為末用大蒜一處搗為膏丸如梧桐子大每用一丸以綿裹藥左邊牙疼放左耳右牙疼放右耳良久痛止取出藥可治數人子和牙宣散良薑細辛胡椒蓽茇乳香另研麝香另研雄黃另研青鹽各等分上為細末先以溫水漱淨牙後以末藥擦患處追出涎末吐出漱十餘次痛立止忌油鹽二日蟲蛀牙疼諸方經驗砂糖丸治蛀牙痛礦石灰為細末砂糖丸如黃米大塞蛀孔中雄黃膏治蟲牙疼雄黃二錢乳香沒藥各一錢麝香五分上為細末溶黃蠟和丸入一粒在蛀孔齒中白礬丸治牙齒被蟲蝕有蛀孔疼痛牙根朽爛白礬枯黃丹各一錢蝙蝠糞二十粒巴豆一粒微炒去皮上同細研以軟粟米飯和丸如粟米大曬乾凡有蛀孔疼痛不可忍者以一丸於痛處咬之立效瑞竹堂方治蟲牙疼痛不已天仙子不拘多少燒煙以竹筒抵牙引煙燻之其蟲即死巴豆丸治蟲牙疼蝕孔空虛巴豆一枚花椒五十粒細研上為極細末飯丸黍米大綿包塞蛀孔乳香丸治蟲蛀牙疼乳香一錢另研巴豆三枚上為末以黃蠟溶化丸麻子大每用一丸塞孔中經驗韭葉膏治蟲牙痛韭葉連根洗淨搗爛同人家門限下及地板上細泥和勻擦痛處腮上外用紙貼一時取下有細蟲在於泥上可以除絶病根韭子湯治蟲牙韭菜子一撮用碗足盛之以火燒煙用小竹梗以下截破四開紙糊密如嗩訥樣引煙燻蛀齒下牙蛀以韭子煎濃湯漱蟲自出腎虛牙齒動搖疼痛諸方局方八味丸治腎虛牙痛方見虛損門三因安腎丸治腎虛牙齒腫痛桃仁泡去皮尖麩炒肉蓯蓉酒浸焙破故紙炒乾山藥石斛去根白蒺藜炒去刺川萆薢川烏炮去皮尖巴戟去心白朮各等分為末煉蜜丸空心鹽湯下七十丸元戎麝香間玉散滋腎固齒酸石榴皮訶子各二兩升麻緑礬枯何首烏青鹽百藥煎五倍子沒石子各半兩白茯苓一兩細辛石膽礬各五錢荷葉灰白檀香川芎白芷甘松零陵香沉香茴香藿香豬牙皂角燒灰木鱉子各二錢萆撥青黛各錢半麝香五分上為末用藥後茶清漱大典堅牙散治牙脫落者用此藥栽之如舊熟銅末細辛防風各半兩當歸三分地骨皮兩半共為細末每用少許熱置齒槽中將牙栽上又敷牙上五日勿動漱勿吃硬物一月如舊食療方治牙動及血䘌並效皂角肥者二定食鹽一兩一處煅過為末擦牙一月便堅固經驗良方滋腎固齒旱蓮草連根一斤青鹽四兩為末用七八月取鮮旱蓮草一斤將青鹽四兩醃三宿取出油膩鍋中炒存性時時將原醃水旋加入炒乾為末每日早晨用一錢擦牙連涎咽下堅牙散骨碎補白水洗淨銅刀切片銅鍋內炒用槐枝不住手攪少時退火令冷後又上火炒微枯黑色又住火冷後又炒至老黑色取起研末不時擦牙不獨固齒能補腎益精去筋骨中毒治筋骨疼治牙痛除根不復作痛其效如神槐鹽散治食甘甜過多牙痛食鹽半斤青鹽四兩同上炒乾槐枝半斤銼斷用水五碗煎至一碗去渣將水聽用上入槐湯於鹽鍋中同煮乾取起研末鏗盒盛擦牙固齒最效西獄華峰方固齒黑髮豬牙皂角及生薑西國升麻熟地黃木律旱蓮槐角子細辛荷葉要相當青鹽等分同燒煆研細將來用最良揩齒牢於髭發黑誰知世上有仙方海上方同前三月清明折柳花青鹽等分莫教差擦牙早晚工無間華髮朱顏世可該祕驗加味烏須固齒補腎方當歸全用酒洗川芎熟地黃川牛膝枸杞子香附子旱蓮草梧桐律牙皂角荊芥穗細辛各三兩青鹽六兩上為細末用粳米一升半煮飯將藥末拌勻分作七團陰乾用桑柴火燒存性為細末鏗盒盛之早晚擦牙藥與水咽下年老牙齒不痛不動極妙萬氏青白散固齒治一切牙疼青鹽二兩白鹽四兩川椒四兩煎汁以椒汁拌鹽炒乾為末擦牙永無齒疾以漱水洗面目亦無疾此藥極妙聖濟總録方固牙齒動搖黑鉛一斤用鐵鍋炒化成汁以桑條柳木混炒成砂末候冷以絹羅為末每早晨擦牙溫水漱在掌內洗眼大能明目黑髮祕方青鹽煎治腎不足齒動欲墜嫩槐枝一斤瓦松一斤青鹽一斤上以槐枝瓦松二味切片用清水煮半桶至三四碗許去渣內青鹽煮乾取起研末以瓷瓶收置暖處每日擦牙最效集成芎歸散擦牙去風生血黑髮滋腎川芎當歸生地黃青鹽石膏各一兩細辛半兩為末如常擦牙妙應散牢牙疏風理氣補腎烏鬚髮人參細辛白茯苓香附子炒焦川芎白蒺藜炒去刺砂仁百藥煎白芷石膏煆龍骨研枸杞子各六錢麝香少許上為細末早晨擦牙溫水漱之拜受齒藥固齒極美香附子新大者半斤去皮毛細銼以生薑一斤取汁拌和浸五七日取出去薑汁不用細辛鹽各二兩同以瓦器炒存性為細末每日擦於石膏散治牙黃口臭石膏煆白芷沉香各一兩寒水石二兩升麻藁本細辛各半兩丹砂一分研上為細末以柳枝咬頭令軟蘸藥擦牙宣風牢牙散駐顏補腎牢牙固齒細辛青鹽各七錢川芎當歸酒洗各一兩上為末每用少許清晨擦牙滿口漱之連藥咽下先以溫水漱口淨然後擦藥咽之御前白牙散石膏四兩另研香附子一兩白芷七錢半甘松山奈藿香零陵香沉香川芎各三錢半細辛防風各半兩上為細末先以溫水漱口次擦之妙東垣白牙散升麻四錢羊脛骨灰一錢白芷七分軟石膏三錢麝香少許上為細末先以溫水漱口次擦之妙長齒生矛諸方祕方雄鼠骨散治牙落重生雄鼠骨生打活雄鼠一個剝去皮去肚內物件用鹽水浸一時炭火上炙肉自脫取骨然後炙燥入衆藥內同研為末香附子白芷川芎桑葉地骨皮川椒蒲公英青鹽川槿皮旱蓮草各二錢上為細末擦齒百日復出固齒無不效經驗龍齒散長牙固齒龍齒煅存性人齒煅存性各三錢人參枸杞子破故紙牛膝沉香各一兩石燕一對煅旱蓮草青鹽各二兩小茴香升麻麝香研各半兩花椒三錢當歸七錢半桂枝二錢半上為細末日擦三次良久漱之有津咽下亦不妨矛疳諸方麝礬散治走馬牙疳危惡證候麝香少許膽礬一錢銅緑半兩白礬生用一分上為細末研勻擦牙患處青金膏治走馬牙疳蝕損腐爛青黛二錢砒霜一錢粉霜一錢輕粉麝香少許上為細末少以油旋研如稀糊塗之於夾紙上重疊砑之每用量大小剪貼仍以白紙封護青金散治走馬牙疳蝕損唇舌肉腐臭牙落其效如神銅緑砒霜各等分為細末每用些少敷患處北棗丹治走馬牙疳北棗去核每個內入信一釐燒存性研細每以些少敷患處三仙散治走馬牙疳一時腐爛即死婦人溺桶中垢白者火煅一錢銅緑三分麝香一分上為極細末敷齒上不可太多取牙藥方本事取牙不犯手凡齒不便要取去用此草烏蓽茇各半兩川椒細辛各三兩上為細末每用少許點在患牙內外一時其牙自落又方取牙自落白馬蛆用夏月白馬頭一個候臭腐自蛆以大者四十九條曬乾同藥為末蜈蚣一條良薑細辛草烏蓽茇胡椒各二錢上為細末用少許貼患處內外須臾其牙自落易簡諸方道藏經方治牙齒動搖血出不止用白蒺藜不拘多少搗為細末每日擦牙及患處極效一方治打傷牙動用蒺藜根燒灰貼動牙即固又方治氣蟲牙痛用良薑煨熱咬患牙痛即止又方治風熱上攻牙齒疼痛以豨蘞草霜後收之曬乾為粗末每用三錢以滾湯泡任意漱之醋煎尤妙一方治風蟲牙痛以菖蒲抵牙痛處咬定或塞縫亦可又方霜後老絲瓜燒灰存性為末擦之效千金方治牙疼以蒼耳子不拘多少水煮濃汁熱含漱之莖葉亦可或入鹽亦佳又方治蟲牙痛用藜蘆為末塞牙孔中勿令咽汁有涎即吐出大有神效又方治牙齒疼痛以獨蒜火煨極熱切斷乘熱尉其痛處冷即易之亦治蟲牙尤妙又方治牙齒生蟲江南墓置草葉似白楊大牽蔓採無時取三四錢濃煎湯點眼中須臾引蟲出如三四分發絲長大一二分者有之置水中能動牙痛久者蟲頭黑新者蟲頭紅又方治牙齦宣露每日以鹽末擦牙後用湯漱之愈久後牙堅固外臺祕要治風蟲牙疼用鶴蝨以醋擂爛入鹽少許漱口良久吐出又含又吐其痛即止又方治牙腫痛不可忍及口氣用細辛煮濃汁噙乘熱漱吐之又方治牙齒腐爛用棘針二百枚水二盞煎一盞頻頻噙漱又方治牙齒疼痛用雄黃末蜜丸如棗棘塞齒縫中又方治蟲牙用杏仁燒煙未盡研如膏綿裹塞孔中又方治牙痛諸藥不效用甘草濃煎汁噙漱三五次定愈又方治諸般牙痛用香附子生艾葉等分濃煎湯漱之千金翼方治牙齒痛用鮮李根取白皮細切水煮濃汁半碗漱口含之良久吐出又含痛止絶根又方用莧菜莖燒灰為末擦牙痛處效一方用茄蒂燒灰為末搽患處又方用胡荽子濃煎汁含之廣利方用槐白皮一握銼醋一升煮去渣入鹽少許溫含之日數易之愈又方用貓兒眼草一握搗爛湯泡去滓又方治牙痛用黑豆一撮蔥白三莖艾葉一握川椒數十粒井花水一碗煎七分就熱噙漱又方用良薑一塊全竭一個為末先以酸漿漱牙次以藥末擦之流出水即愈又方治齒痛用青蒿一握水一碗煎半碗溫漱之痛即止又方治食酸物多而齒楚者用胡桃肉細嚼解之丹溪方治齒痛吳茱萸煎酒含之愈固齒極妙每日擦牙用香附子炒熟大黃煨各一兩以橡斗子二十個內取十八個裝滿食鹽於抄器內單擺開瓦蓋燒存性與生橡斗二個並香附子大黃同為末每日擦牙掠髭鬢又方用仙靈脾不拘多少為粗末煎湯漱針灸法上齒痛取足陽明經下齒痛取手陽明經經云大腸手陽明之脈入下齒中是動則病齒痛頭腫視盛虛寒熱陷下取之又云足陽明脈入上齒針灸齒痛病各取之足內踝二尖治上牙痛灸之足三里二穴在足陽明經膝下三寸䯒骨外大筋內陷中灸四十九壯治上齒痛者灸之愈手三間二穴在手大指次指本節後內側陷中手陽明大腸經穴灸七壯治下齒痛者灸之愈列缺二穴一名童玄在手太陰肺經與陽明經相連叉手取穴中手盡處看其浮脈丫叉之間灸七壯痛立止永不再發合谷二穴治齒齲痛灸之內庭治齒下痛針灸皆可陽谷治上牙太淵治風牙肩髃二穴取法見中風門灸七壯隨左右灸之耳垂下盡骨上穴灸三壯痛即止如神一法治一切牙痛以草量手中指至掌後橫紋止將折作四分去二分將一分於橫紋後量臂中灸三壯隨左右痛灸之導引法一法常向本命日櫛發之始叩齒九通陰咒曰大帝散靈五老反真泥丸玄華保精長存左回拘月右引日根六合清練百疾愈因咽唾三過常教行之使齒不痛腦不痛發不白一法向東坐不息四通上下琢齒三十六治齒痛一法凡人覺脊背皆崛強不問時節縮咽膊仰面努膊並向上頭左右兩向按之左右二七一住待血行氣動定然始更用初緩後急不得先急後緩若無病人常欲得旦起午時日沒三辰用之三七遍除寒熱疾脊腰頭項痛風痹口內生瘡牙齒風頭眩終盡除也治案張子和治澤州李結之忽犯牙痛皺眉不語一客見之曰何不樂也曰牙痛客曰豫曾聞戴人云陽明經邪熱有餘也宜大下之乃付舟車丸七十粒服畢為支留飲藥為鹽酒所發吐之吐畢而痛止患者大服曰戴人神仙也不三日復痛再服前藥百丸下數行遂愈不復作丹溪治一婦人年三十餘病齒痛不可忍口吸涼風則暫止閉口則復痛此陽明濕熱為患也用黃連胡桐淚苦寒薄荷荊芥辛涼四味治濕熱為主升麻苦平行陽明經為使牙齒骨之餘以羊䯒骨補之為佐麝香少許為引用共為細末擦之痛減半又以調胃承氣硝加黃連治其本下二三行而止遂不復作
