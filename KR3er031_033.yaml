body:
  text: 卷之三十三積聚門附癥瘕痃癖病機內經敘論素問針經云積者厥氣生足悗足悗生脛寒脛寒則血脈凝澀凝澀則寒氣上入於腸胃則腹脹腹脹則腸外之汁沫迫聚不得散日以成積卒然多飲食則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外有寒汁沫與血相摶則併合凝聚不得散而成積矣或外傷於寒內傷於憂怒則氣上逆氣上逆則六輸不通溫氣不行矣凝血蘊里不散津液澀滲著而不去而皆成積矣又曰思則氣結久成積也奇病篇帝曰病脅下滿氣逆二三歲不已是為何病岐伯曰病名曰息積此不妨於食不可灸刺積為導引服藥藥不能獨治也運氣積塊皆屬濕土經曰土太過曰敦阜之紀其動濡積並搐是也五臟生成篇曰赤脈之至也喘而堅診曰有積氣在中時害於食名曰心痹得之外疾思慮而心虛故邪從之白脈之至也喘而浮上虛下實驚有積氣在胸中喘而虛名曰肺痹寒熱得之醉而使內也青脈之至也長而左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法腰痛足清頭脈緊黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風黑脈之至也上堅而大有積氣在小腹與陰名曰腎痹得之沐浴清而臥難經曰積者陰氣也聚者陽氣也故陽浮而動陰沉而伏氣之所積名曰積氣之所聚名曰聚故積者五臟所生聚者六腑所成也積者陰氣也其始發有常處其痛不離其部上下有所終始左右有所窮處聚者陽氣也其始發無根本上下無所留止其痛無常處謂之聚故以是別知積聚也又曰五臟之積各有名乎肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發咳逆喑瘧連歲不已以季夏戊己日得之何以言之肺病傳肝肝當傳脾脾季夏適王王者不受邪肝復欲還肺肺不肯受故留結為積故知肥氣以季夏戊己日得之甫按積病傳其所勝王氣不受固理也肝積傳自肺金得於季夏亦理也肝欲還肺肺不肯受定於戊己日乾似為太鑿或木氣自病而非由於勝之所傳則亦有也奚必拘於是心之積名曰伏梁起臍上大如臂上至心下久不愈令人煩心脾之積名曰痞氣在胃脘大如覆盤久不愈令人四肢不收發黃疸飲食不為肌膚肺之積名曰息賁在右脅下覆大如杯久不已令人灑淅寒熱喘咳發肺癰腎之積名曰奔豚發於少腹上至心下若豚狀上下無時久不已令人喘逆骨痿少氣原病式曰積聚者由陰陽不知臟腑虛弱或受於風邪搏於臟腑之氣所為也巢氏病源曰積聚痼結者是五臟六腑之氣已積聚於內重因飲食不節寒溫不調邪氣重沓牢痼堅結者也若久即成癥玉機微義曰積聚因飲食及七情而成者多滑氏謂越人之意蓋以五行之道推其理勢之所有者演而成文初不必論其情感亦不必論其還不還與其必然否也讀者但以所勝傳不勝及王者不受邪遂留結為積治之可矣積聚與癥瘕不同痃癖與痞塊亦異積者陰氣也發有常處不離其部上下有所終始聚者陽氣也發無根本上下無所留止痛無常處癥者腹中堅硬按之應手一定不移言其形狀可徵驗也亦由寒溫失節飲食不消聚結於內染漸生長塊段盤牢不移動者是癥也瘕者假也謂虛假可動也病雖結瘕而可推移者也經曰血不流而滯故內結而為瘕也瘕者假物而成形故曰瘕血病也此不言為聚聚者陽氣也小腸移熱於大腸乃為虙瘕大腸移熱於小腸謂兩熱相搏則血移而為伏瘕血不行則月閉此癥瘕之病為婦女得之多也故女科有腸覃石瘕之病詳見本科痃邊旁也海篇云皮厚也此亦氣血凝於肌肉之間而成痃也狀類痞塊之形而尤見著者也癖者僻也飲食之凝滯於一隅而成內癖內傷脾胃外無形跡其人面黃肌瘦四肢困乏而精神憔悴是也今人之所病癖詩癖者其證亦是也痞塊之候自詳本門積與癥也乃堅硬聚與瘕也移散而動痃與痞也堅硬在皮癖之為候病在五內而不可以形狀求也積也聚也癥也瘕也痃也痞塊也皆不外乎飲食氣血之凝滯在醫者以意推之治之量其虛實權其重輕消息之而已矣五積六聚治同郁斷張子和曰積之始成也或因暴怒喜悲思恐之氣或傷酸苦甘辛鹹之味或停溫涼寒熱之飲或受風寒暑濕燥火之邪其初甚微可呼吸按導方寸大而去之故不難矣若久而延之留滯不去遂成五積夫肝積肥氣者不獨氣有餘也中亦有血病也肝藏血故也心積伏梁者火之郁也以熱藥散之則益甚以火灸之則彌聚況伏粱證有二名同而實異不可不詳其一上下左右皆有根在腸胃之外有大膿血與腸癰同其二身體髀股胻皆毒腫環臍而痛即是風根不可動動則為水溺澀之病此二者內經雖言不可動止謂不可太下非謂全不可下恐病去而遺害痞氣者舉世皆言寒則為痞內經以為濕則痞雖因飲冷而得其陽氣為濕所搐以熱攻之則不散以寒攻之則濕去而寒退矣肺積息賁者喘息賁而上行也此舊說也余謂賁者賁門也手太陰之筋結胸裡故貫谷賁下抵季脅其痛支轉筋痛甚則成積氣而為息賁手心主結於臂其病胸痛息賁又云肺下則居賁迫肝善脅下痛肝高則上支賁切脅悗謂息賁若是言之是積氣於賁而不散此靈樞說五臟處言此賁自是多故余發之賁豚者賁與奔同銅人言或因讀書得之未必皆然也腎主骨此積最深難療大忌吐湧以其在下止宜下之故余常以獨聖散吐肥氣揃以木架必燠室中吐兼汗也治肝之積亦嘗湧之續以磨積藥調之治伏梁治痞氣治息奔皆以吐汗下三法兼行此病不可逗遛久則傷人而難治也脈候經曰寸口脈沉而橫曰脅下有積腹中有橫積痛又曰太陰脈澀則病積心腹時滿厥陰澀則病小腹積氣少陰澀則病積溲血陽明澀則病積時善驚太陽澀則病積時善顛疾少陽澀則病積筋急目痛又曰推而內之內而不外有心腹積也巢氏曰脈細沉附骨者積也脈出在左積在左脈出在右積在右脈兩出積在中央各以部處之脈駃而緊積聚也脈浮而牢積聚也脈弦緊而細癥也出寸口癥在心出關上癥在胃脘出足中癥在臍脈橫者脅下有積聚脈來小沉實者胃中有積聚食不下或食吐出肺積脈浮而毛按之辟易心積脈沉而芤上下無常處肝積脈弦而細腎積脈沉而急脾積脈浮大而長脈沉而中散者寒食癥也積聚脈牢強者生虛弱沉者死治法內經正治大積大聚其可犯也衰其大半而已堅者削之留者攻之結者散之客者除之上之下之摩之浴之搏之劫之開之發之適事為故養正則積自除潔古云壯人無積虛人則有之脾胃怯弱氣血兩衰四時有感皆成積若遽以磨堅破結之藥治之疾雖去而人已衰矣乾漆硇砂三稜大黃牽牛之類則暫快藥過則依然氣愈消疾愈大竟何益哉故治積者當先養正則疾自除譬如滿座皆君子縱有一小人自無容地而出令其真氣實胃氣強積自消矣實中有積大毒之劑治之尚不可過況虛而有積者乎此治積之一端也邪正盛衰固宜詳審甫謂養正積除此積之微者也如脾胃失於健運而氣積食積之不疏導者惟養脾胃之正氣而滯積自疏矣若夫大積大聚如五積之久而成癥病堅固不移者若非攻擊悍利之劑豈能推逐之乎惟虛弱之人必用攻補兼施之法也攻邪補正有先後之序經曰留者攻之此積之所以當攻者也然留積既久蒂固根深若不攻奪之豈能自去則傳所謂若藥不瞑眩厥疾不瘳其亦理勢之不容已也凡正氣實而積固不能為殃正如小人潛以伺其君子之隙而遂乘以侮之惟積亦然但正氣稍虛積必為害所以不可不攻也既攻之後尤當扶養正氣而不致擾亂之虞正氣不足必先養正以自固正既固然後由漸而攻邪積自漸削而不能留也故曰攻補有序積非下之不可人之有積則皆為身中之邪氣若君子座中之有小人也惟其正氣盛而真氣運行不失其常則積略攻之而散潰亦或自然消退矣正氣稍虛則積日著而恣其欺罔之勢正氣日漸為之弱矣凡積成而形漸悴速補真氣待榮衛充實方可下之或且攻且補或先補後攻或先攻後補必至於邪去正復而後已然除之不以漸則必致於顛覆之害矣若昔之武氏斫喪唐宗幾於改物尚賴狄張諸君子匡扶之力漸除黨惡興復丕祚惜乎中宗不鑑前轍而留三思馴致韋氏之禍其猶積余之尚在者若不亟下之必將復起恣害亡身者有矣攻積必分新久子和云積之在臟如陳莝之在江河積在臟中多留於脂膜曲折之處區臼之中如陳莝在河亦不中流而在汀灣回迫之地遇江流之隘一漂而去積之在臟理亦如之故豫先用丸藥驅逐新受之食使無梗塞其積已離而未下次以末藥滿胃而下橫江之筏一壅而盡設未盡者以藥調之堅積既久不可遽以此法宜以漸而攻之或三五日一攻或一月數攻後漸以磨積之藥調之無傷正氣此萬全也治積有法許學士云大抵治積或以所惡者攻之或以所喜者誘之則易愈如硇砂水銀治肉積神麯麥芽治酒積水蛭虻蟲治血積木香檳榔治氣積牽牛甘遂治水積雄黃膩粉治涎積礞石海石治痰積巴豆大黃治堅積蓋各從其類也須要認臟腑經絡是何積聚兼見何證然後增減輕重使之如兵法云善攻者敵不知其所守倒倉法丹溪治腸胃中一切痰積膠固及生諸般奇形之蟲食積痰飲痞癖腹痛痞滿噁心嗌氣嘈雜吞酸食瘧黃胖等證行之無不應手取效丹溪此方得於西域之至人凡人於中年行之一二次可以卻疾潤澤枯槁補益虛損亦為養壽之一助也雖然此法惟宜用於元氣實者其餘虛損癆瘵鼓脹反胃大風真病已成六脈無力者皆不可用豫見往往不善用者殺人多矣其法用嫩黃牡牛肉二十斤切成小塊去筋膜長流水煮糜爛以布濾去滓取淨汁再入鍋中慢火熬至琥珀色則成劑矣令病人預先斷欲食淡前一日不食晚飲設密室一間明亮而不通風處行之置穢桶及木瓦盆貯吐下之物置一瓷瓶盛所出之溺令病人入室以汁飲一杯少時又飲一杯積數十杯寒月積重湯溫而飲之任其吐利病在上者欲其吐多病在下者欲其下多病在中者及在上覆在下者欲其吐利俱多全在活法而為之緩急多少也視所出之物必盡病根乃止吐利後必渴甚不得與湯以所出之溺飲之名輪回酒非惟可以止渴抑且可以滌蕩余垢行後倦睡覺飢先與稠米飲次與淡稀粥三日後方可與小菜羹次與略厚粥軟飯調養半月或一月自覺精神煥發形體輕健沉疴悉能痊矣其後須忌牛肉數年夫牛坤土也黃土之色也以順為性而效法乎坤以為功者牡之用也肉者胃之樂也熟而液無形之物也橫散入肉絡由腸胃而滲透肌膚毛竅爪甲無不入也積聚久則形質成依附胃腸回薄曲折處以為棲泊之窠臼阻礙氣血津液熏蒸燔灼成病自非割腸剖骨之神妙可以銖兩丸散窺犯其藩牆戶牖乎肉液之還溢腸胃受之其厚皆倍於前有似乎腫其回薄曲折處肉液充滿流行有如洪水泛漲其浮槎陳朽者皆推遂蕩滌順流而不可停留在表者因吐而汗其清道者自吐而湧濁道者自泄而去凡屬滯礙一洗而盡積因地方而可證丹溪云凡積在中是為痰飲在左為死血在右為食積痰氣其不能作塊或聚或散者氣也塊者乃有形之物痰與會積死血而成治塊當降火消倉積死血塊去須大補治積病不可峻用下藥正氣虛者愈損真氣積又不去必先服補藥數次然後攻之或用磨積藥漸而消除融化可也積塊在皮裡膜外須用補氣香附開之兼二陳加補氣藥先須斷厚味凡積病下之不退當用消積藥融化開則消治案蟯瘕候臨菑女子薄吾病甚危衆醫皆為寒熱當死臣意診其脈曰蟯瘕為病腹大上膚黃粗循之戚戚然臣意飲以芫花一撮即出蟯可數升病已三十日如故蟯得之於寒濕寒濕氣鬱篤不發化為蟲臣意所以知薄吾病者切其脈循其尺其尺索刺粗而毛美奉發是蟲氣也其色澤者中臟無邪氣及重病史記蛇瘕治驗隋有患者嘗飢而吞食則下至胞便即吐出醫作噎疾膈氣翻胃三候治之無驗有老醫任度視之曰非此三疾蓋因食蛇肉不消而致斯疾但揣心腹上有蛇形也病者曰素有大風嘗求蛇肉食風稍愈復患此疾矣遂以芒硝大黃合而治之微泄利則愈醫皆請其驗而知蛇瘕也發瘕治驗徐文伯字德秀篤好醫術宋明帝官人患腰痛牽心發則氣絶諸醫以為肉瘕文伯視之曰此發瘕也以油灌之即吐物如發稍長引之長三尺頭以成蛇又能搖動懸柱上水瀝盡惟餘一發而已遂愈出藏經鱉瘕治驗鱉瘕者謂腹中瘦結如鱉狀是也有食鱉觸冷不消而生者亦有食諸雜肉得冷變化而成者皆由脾胃氣虛弱而遇冷則不能克消所致瘕之為言假也謂其有形假而推移也昔曾有主共奴俱患鱉瘕奴在前死遂破其腹得一白鱉仍故活適有人乘白馬來看白鱉白馬遺尿落鱉上即縮頭乃遂以馬尿灌之鱉化為水其主曰吾將瘥矣即服之果愈巢氏病源京三稜治癥瘕記昔人患癥症死遺言令開腹取之得病塊堅硬如石有文理人謂異物竊取削成刀柄後因以刀割三稜柄消成水知此能療癥瘕子和治案顯慶寺僧有沉積數年雖不臥床枕每於四更後心頭悶硬不能安臥須起行寺中習以為常人莫知為何病以藥請於戴人戴人令湧出膠涎一二升如黑礬水繼出黃緑水又下膿血數升自爾胸中如失巨山飲餌無算果菌劉子平妻腹中有塊如瓢十八年矣經水斷絶諸法不治戴人令一月之內湧四次下六次所去痰約一二桶其中有不化之物如葵菜煮爛魚腸之狀覺病積如割漸漸而平及積既盡塊痕如窪如臼略無少損至是而面有童色經水復行陽夏張主簿之妻病肥氣初如酒杯大每作發寒熱十五餘年後因性悲感病益甚惟心下三指許無病滿腹如石片不能坐臥針灸服藥罔效敬邀戴人既至斷之曰此肥氣也得之季夏在左脅下如覆杯久不愈令人發痎瘧寒熱以瓜蒂散吐之魚膠黃涎一二升至夜繼以舟車丸通經散投之五更黃涎膿血相半五六行凡有積處皆覺痛後用白朮散當歸散和血流經之藥如斯湧泄三四次而方愈此蓋積之久者也藥方積藥條例諸積體虛人不宜直攻宜以蠟匱藥庶腸胃中能黏逐其病五積通用二十四味沉香流氣飲加三稜莪朮並勝紅丸常服仍灸上中脘丹溪附録治積聚不問何經並宜服十味大七氣湯吞下紅丸子又法治積聚用蜀葵根煎湯去渣再人參朮青皮陳皮甘草梢牛膝煎成湯又入細研桃仁玄明粉各少許熱飲之二服當見積塊下如虛人病甚者須補接二三加減再行治積藥必須辛涼兼破血藥方能沖達而積自散脾積食積血積簡易祕方勝紅丸金露丸萬病丸順氣丸秦川剪紅丸感應丸脾積丸食積酸心腹滿大黃牽牛之類甚者礞石之類酒積酒癖口乾目黃乾葛黃連麥芽神麯硼砂雄黃之類甚者用甘遂牽牛氣積噫氣痞塞用木香檳榔之類甚者枳殼牽牛血積瘀血乾漆桃仁牡丹皮榆根皮之類甚者大黃虻蟲水蛭之類瓦楞子能消瘀血次消痰積花蕊石大消瘀血兼氣藥能消血痞人所不知痰積唾涕稠黏半夏栝蔞之類甚者吐之瓜蒂之屬石鹼去痰積滌洗垢膩有功痰癖脅痛厚朴枳實青皮芒硝澤瀉甚者甘遂芫花涎積咽如拽鋸硃砂膩粉明礬甚者瓜蒂水積足脛腫商陸澤瀉甚者甘遂蠍梢水飲癖治用枳殼湯加茯苓神保丸生五苓散下小理中丸茶飲茶癖乾薑吳茱萸川椒薑黃芝麻之類癖積兩脅脹滿刺痛三稜莪朮之類米穀積麥芽神麯砂仁雞內金肉積硇砂阿魏山楂硝石五畜胎子積連白陳皮煎汁豆豉汁薑汁和服之五菜積丁香桂末麝香筍蕨硬物荸薺砂仁三稜莪朮粉面積蘿蔔子姜酒下魚鱉積陳紫蘇橘皮煎湯薑汁磨木香服九蟲積腹中不時作塊痛面青口吐清水用雄黃錫灰蕪荑雷丸石榴根棐子實諸積塊痃癖用海石三稜莪朮香附上藥俱以醋煮桃仁紅花五靈脂之類白朮湯下之痰積食積有塊石灰一物能消化之五臟積方肝積肥氣肝積名肥氣在左脅大如覆杯似有頭足色青兩脅下痛牽引小腹足寒轉筋男為積疝女為瘕聚久不愈令人發咳逆痎瘧連歲不已其脈弦細三因肥氣丸治前證當歸頭蒼朮各兩半青皮一兩炒蛇含石醋煅淬七次三稜莪朮鐵華粉各三兩與稜術同入醋內煮一伏時上為細末醋煮米糊丸緑豆大每服四十丸當歸浸酒下東垣肥氣丸治同前厚朴五錢黃連七錢柴胡一兩川烏頭制一錢二分椒四錢乾薑炮五分皂角去皮弦一錢半白茯苓錢半甘草炙三錢人參廣朮昆布各二錢半巴豆霜五分上件除茯苓皂角巴霜另末外為極細末和勻煉蜜丸梧桐子大初服二丸一日加一丸二日加二丸漸漸加至大便微溏再從二丸加服周而復始積減大半勿服永類方有本事硇砂丸御院助氣丸俱治肥氣積心積伏梁心積名伏梁起於臍上至心下大如臂如梁之橫架腹熱面赤咽乾心色煩赤甚則吐血食少久不愈病煩心髀股皆腫環臍而痛其脈沉而芤三因伏梁丸治前證茯苓去皮厚朴炒人參枳殼炒三稜煨半夏泡白朮各等分上為末麵糊丸梧桐子大每服五十丸食遠米湯送下東垣伏梁丸治前證黃連兩半厚朴炒人參半兩黃芩三錢肉桂一錢乾薑炮石菖蒲紅豆各五分烏頭炮五分茯神丹砂炒各一兩巴豆霜五分上除巴霜外為細末另研巴霜旋入煉蜜為丸梧桐子大服如上永類方有局方溫白丸脾積痞氣脾積名痞氣在胃脘覆大如盤痞塞不通色黃病飢則減飽則見腹滿嘔泄足腫肉削久不愈令人四肢不收發疸飲食不