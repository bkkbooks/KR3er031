傷寒粥飲下本事治癥丸治丈夫婦人小兒年深日近沉積癥塊面色青黃時心搶痛吐水吞酸舌生白胎婦人積年月經不調漸成痞塊血蠱中焦間大如杯腕日久年深瘦瘠寒熱往來一切脾胃不和滯悶之疾並皆治之蓬朮三兩京三稜二兩俱用醋煮透為度丁香皮二兩木香兩半丁香兩半厚朴炒三兩石菖蒲二兩良薑兩半川牛膝一兩薏苡仁一兩使君子三兩取肉石蓮子三兩巴豆五兩去油膜香附子四兩制虻蟲兩半上為細末稀糊丸如小豆大積年癥瘕成塊第一服用熱水下三十丸自後每日三丸五丸量虛實加減與之五日去盡積塊日近脾胃有積者每服五丸米飲吞下一服取效婦人血氣成塊及血瘕每服二十丸用蘇木酒童便各半煎五七沸令溫空心吞下自後每日用溫酒下三丸其血塊遂消從大小便出盡自知小兒腹痛蛻蟲不能忍日夜叫哭百藥不效橘皮湯下五七丸立效諸蟲皆可下常服用薑湯或白湯下三五丸中酒酒積大便鮓臭者及噎塞皆可用之神效和劑溫白丸治心腹積聚癥瘕痞塊大如杯碗胸脅脹滿如有所礙十種水病痞塞心痛並治川烏制二兩皂角炙去皮弦吳茱萸石菖蒲柴胡桔梗厚朴紫菀人參茯苓黃連乾薑肉桂川椒去目炒巴豆去油各五錢上為末入巴豆另研勻蜜丸梧桐子大每服三丸薑湯下潔古治法心積伏粱溫白丸加柴胡川芎肝積肥氣溫白丸加菖蒲黃連桃仁脾積痞氣溫白丸加吳茱萸乾薑肺積息賁溫白丸加人參紫菀腎積奔豚溫白丸加丁香茯苓遠志舟車丸方見水腫門治水積水腫上氣喘急感應丸方見痢疾門治諸積聚丁香脾積丸方見脾胃門治飲食諸積結聚本事硇砂丸治一切積聚痰飲硇砂三稜乾薑白芷巴豆去油各半兩大黃乾漆各一兩木香青皮胡椒各一錢檳榔肉豆蔻各一枚上為末釅醋一二升煮巴豆五七沸復下三稜大黃末同煎五七沸入硇砂煎成膏卻入別藥和勻杵丸如緑豆大每服七丸或五丸薑湯下破積導引丸治積塊堅硬飲食不消心下痞滿木香檳榔青皮陳皮枳殼炒廣朮煨三稜炮半夏泡神麯炒麥芽乾薑炮茯苓澤瀉甘草炙各半兩牽牛頭末六錢巴豆三十粒去油殼淨上為末入巴霜令勻薑汁糊丸梧桐子大每服三十丸薑湯下醫林香稜丸治五積破痰癖消癥瘕冷熱積塊木香丁香各五錢三稜銼酒浸一宿枳殼炒莪朮一兩入去皮巴豆三十粒同炒黃色去豆不用青皮川楝肉茴香炒各二兩上為末醋糊丸梧桐子大硃砂為衣每服三十丸食遠鹽酒下醫林保安丸治症積心腹內結如拳漸上搶心腹及臍腹痛不可忍大黃三兩新水浸一宿蒸過焙乾用乾薑一兩炮大附子制五錢鱉甲一兩半好醋煮一時久酥油炙黃方可用上為細末用三年米醋一升先熬去四五合後和藥丸如梧桐子大每服二十丸空心醋湯或米湯任下取積如魚腸敗血爛肉青泥而下醫林開結妙功丸治怫熱內盛痃癖癥瘕積聚疼痛濕熱腫脹肢體麻痹走注痛三稜茴香炒神麯炒麥芽炒各一兩大黃一兩為末醋半升熬成膏聽用乾薑炮二錢川烏炮四錢半夏五錢官桂二錢巴豆二錢去油牽牛取頭末三兩上為末用大黃膏丸梧桐子大每服十五丸空心薑湯下鄧山感應丸治食積化宿滯沉香木香檀香丁香青皮陳皮黃連砂仁香附子半夏三稜炮莪朮炮各一兩為細末肥烏梅一百個巴豆三百粒白者去衣膜上用瓷器一隻盛巴豆上以烏梅肉蓋之卻用米醋浸過與梅肉平坐於甑中蒸至極熟以巴豆紅色為度卻擂二件為泥用糯米飯和勻搗千百下丸如蘿蔔子大每服十丸白湯下易簡諸方二十二道化鐵丹歌八梅十六豆一豆管三椒青皮各半兩醋打麵糊調每服十五顆是鐵也能消五積丸大肥皂角炙去皮弦灰火煨勿令煙出上為末每兩入巴霜一錢研勻醋糊丸梧桐子大每服三五丸白湯下醉鄉寶屑治酒積如神亦治菜果積平胃散加丁香砂仁芽曲或香蘇散亦可並用薑棗鹽煎服酒積麥芽丸治酒癖不消心腹脹滿噫酸嘔逆脅肋痛神麯炒麥芽炒各一兩黃連五錢銼用巴豆五粒同炒上為末沸湯搜和丸梧桐子大每服五十丸食遠薑湯下魚鱉積用香蘇散多加生薑陳皮煎服鱉瘕用白馬尿一升雞子白三枚煎至二合空心頓服不移時當吐出小鱉而愈又方用新熟赤黍米淘取泔汁生服一升不過三度愈千金方治癥瘕積聚去三尸氛氣延年卻老雄黃二兩研為細末九度水飛過卻入新淨竹筒內以蒸餅一塊塞口蒸七度用好粉脂一兩為丸緑豆大酒下七丸至十丸日三服三年後可以成道不飢又方治腹脹積聚癥瘕葶藶一升炒酒五升浸七日去渣日溫三合不拘時服又方治鱉瘕取藍葉一斤搗水三升絞取汁一升日二服效又方治食鱠及生肉致胸膈不化必成癥瘕馬鞭草搗汁一升入薑汁少許飲之即消又方治肉癥思肉不已食肉訖又復思白馬尿三升空心飲之當吐肉積出吐不出者死又方治小腹堅大如盤胸中滿能食而不消用新安白酒麴炒香熟為細末白水調方寸匕日三服外臺祕要治卒暴瘕腹中有物堅如石痛欲死取蒴藋根一小束洗淨瀝去水細切以酒二斗漬三宿去渣溫服五合至一升日三服欲速服於灰火中煨令藥味出服之此藥無毒大有效又方尉癥法用吳茱萸三升擂碎以酒和煮熟布裹尉瘕上冷則易熱尉之癥移消動乃止又方療心腹之舊癥及新得之癖瘕取硃砂細研飯搜令勻用雄雞一隻先餓二日後以硃砂飯喂之置雞於板上收取糞曝燥為末溫酒調服方寸匕日三服病困者晝夜可六服一雞少更用一雞喂之取足服之愈即止集驗方治鱉瘕及心腹宿瘕卒得癥瘕以白雞屎不拘多少小便和炒焦為末服方寸匕不拘度數瘕愈止勝金方治膜外癥及氣塊痛玄胡索不拘多少為末豬胰一具切作塊子炙熟蘸藥末食之肘後方治腹中冷癖水穀凝結心下停痰兩脅痞滿揉之轉逆妨害飲食取大蟾蛛一枚去皮及腹中物支解之用芒硝一升中人七合弱人五合以水六升煮取四升每服一升後未下更一服得下則九日十日更進一服一方治痃癖癥結及諸蟲並馬毒瘡用馬齒莧和鹽醋煮一碗空心食有蟲盡出汁塗瘡一方治蛇瘕凡蛇精及液黏活菜上人誤食之腹內成蛇或食蛇肉亦作蛇瘕其人常飢食之即吐腹中如蛇狀用赤頭蜈蚣一枚為末分服酒調下一方治積聚痃癖氣塊大小結胸痛不能按南星半夏芫花自然銅生用等分為末醋糊丸梧桐子大每服七丸食前溫湯下一方治男婦遠近陳積氣塊水腫小腸偏墜腳氣蠱毒噎塞返食心氣脾疼喘急咳嗽肺脹吐紅腸風痔漏左癱右瘓丹毒瘡疥紫白血斑癰疽腫毒瀉痢脾黃山嵐瘴氣小兒風癇大黃春冬二斤火炮熟用秋夏一斤二兩生用甘草半斤炙牽牛十二兩檳榔十四三稜木香一兩為末上每服五錢五更初面東溫水一盞調下巳時取大病根青紅赤白或是蛇蟲蝦蟆蜈蚣亂絲血塊不問四季老弱無妨利後用白粥補之孕婦勿服灸法久痞背脊中即命門穴離開四指痞在左灸右在右灸左章門二穴在股大橫紋外直臍季肋端側臥屈下足伸上足舉臂取之灸七壯治一切積聚癖塊期門二穴在乳頭垂下盡處動脈是灸百壯治積氣上奔甚急欲絶氣海一穴在臍下一寸半灸百壯治一切氣塊關元一穴在臍下三寸灸百壯治奔豚痞積癖塊氣逆氣衝心痛不可忍
