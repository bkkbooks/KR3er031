body:
  text: 卷之七十七中蠱門病機蠱毒出於閩廣蠱之為毒中土少見之世傳閩廣深山之人於端午日以蛇虺蜈蚣蝦蟆三物同器盛之任其互相吞啖俟一物獨存者則以為蠱又謂之挑生欲害人密取其蠱於飲食中人中其毒必心腹㽲痛如有蠱齧吐下皆如爛絮若不即治食人五臟而死亦有十餘日而死更有緩者待以歲月氣血羸憊食盡五臟而後死死後亦有傳疰他人名曰蠱疰兩廣山谷間有草曰胡蔓草又名斷腸草若人以急吞之則急死緩水吞之則緩死令見荊楚之地曰鼠莽草人食之則毒死而不可救豫意胡蔓草或亦是歟嶺南人取毒蛇殺之以草覆之以水灑之數日菌生取菌為末酒調以毒人始亦無患再後飲酒則毒作而死其俗淫婦多自臺北人日久情好又不肯逐人歸乃陰以毒投飲食中北人歸則戒之曰子去幾時還若從其言則復以藥解之若過期不往必死矣名曰定年蠱北人至彼宜預防之須備解毒丹之類隨身勿替稍覺飲食之後四大不調即服解藥是亦有備無患誠為切當凡北人入廣跋涉山川不諳水士人畜飲啖誤中其毒若不備識其機按方修劑一時倉卒不救得非橫枉耶重生者宜加慎之遁齊閒覽魚枕驗蠱毒海南魚有石首者蓋魚枕也取其石為器可載飲食如遇蠱毒器必暴裂其效甚著閩人制作尤精人但玩其色而鮮能識其用者又有驗蠱之法唾津在淨水中沉則是浮則非又法口含大豆中蠱者豆即脹皮脫無蠱者豆不脹脫又法煮雞蛋一枚去殼以銀簪一條插入其中並含入口一飲之頃取視簪卵俱黑則為中蠱孫真人云凡中蠱者嚼生黑豆不腥噙白礬而味反甘者皆中蠱也中蠱見證直指云中蠱之候面目青黃力乏身痛唇口焦乾眉須脫落煩躁悶瞀胸腹痞滿肚脹皮堅腹中𩊅𩊅切痛如蟲齧又如蟲行唾吐鮮血小便淋瀝大便膿血雜下病人所食之物皆變而為蟲侵蝕臟腑蝕盡即死死則毒氣流注復染他人所謂蠱疰脈候脈緊數如叉直而吐甚此患蠱毒耳急治之中蠱脈洪大者生微細者死治法防蠱法凡入有蠱之鄉先以犀角攪試有毒則白沫竦起無沫即無毒也自幼時食貓肉則毒不能為害知禁不發中蠱者若能記何物之中中毒終身再不食此物甚不敢復作凡用藥而愈自後飲食永不得吃冷若食冷則蠱毒復生竟不能救治蠱大法有二胸膈痛脹則毒在上宜吐之法以熱水半盞投入膽礬末五分通口服少頃以鵝翎探吐毒物出盡自愈腹痛脹為毒在下宜瀉之法以鬱金末二錢米湯調下空腹取瀉惡毒盡為妙瀉後以四君湯服二三劑調理慎忌口反蠱及主治法衛生云凡入蠱鄉見人家門限屋梁絶無灰塵潔淨者其家必畜蠱當用心防之如不得已吃其飲食即潛地於初下箸時收藏一片在手盡吃不妨少頃卻將手藏之物潛埋於人行十字路下則蠱反於本家作鬧蠱主必反來求或食時讓主人先動箸或明問主人云莫有蠱麼以筋箸桌而後食如是則蠱皆不能為害此皆驗於蟲鄉云欲知蠱主姓名取敗鼓皮少許燒灰飲酒服患人自能呼蠱主姓名咒語破蠱法大藏經典云治蠱毒挑生毒有咒凡人在外飲食先默誦咒七遍其毒不為害咒曰姑蘇琢磨耶吾知蟲毒生四角父是穹窿穹母是舍耶女眷屬百千萬吾今悉知汝摩訶薩摩訶薩凡見飲食上有蛛絲便莫吃又法每遇所到處念藥王萬福七遍亦可避藥方萬病解毒丹一名神仙太乙丹一名玉樞丹大治一切蠱藥毒菰子毒鼠滿毒惡菌菌金石毒吃疫死牛馬諸肉毒河肫魚毒時行瘟疫山嵐瘴瘧毒喉痹喉風諸瘡毒沖冒寒暑或自縊溺水打撲傷損癰疽發背犬鼠蛇虺百蠱所傷男子婦人或中邪祟顛狂走叫鬼胎鬼氣並宜服之凡人居家出外不可無此藥真濟世珍方嶺南宦途商旅水土不服或中食毒稍覺不快便服藥即安行兵興役尤不可無山茨菰南北處處有之俗名金燈籠葉似韭花似金燈籠色白上有黑點結子三稜二月開花三月結子四月初苗枯即挖地得之遲則爛朽難尋與老鴉蒜極相似但蒜無毛茨菰有毛用者宜辨真切去皮洗淨焙乾為末二兩川文蛤一名五倍子淡紅黃色大者佳打碎微炒焙乾為末淨稱四兩紅芽大戟江南俗名勒馬宣江浙紅者為佳江南次之江北白色者太峻利弱人不宜多服去蘆洗焙為末淨兩半千金子一名續隨子去殼揀白色者用紙包捶去油換紙去油盡以色白紙上無油成霜為度淨一兩麝香真正當門子研極細三錢上五味精選真正各自修制焙乾為末俱用新淨器皿淨紙盛包置淨室並不許婦人閒客及不潔之人雞犬等畜室來修合之人必齊沐焚香虔誠製造將各藥相和一處若是端午節日尤妙非此日須擇吉日和合極精篩過二次方用糯米濃飲調和於木臼中搗千餘杵作錠每錠一錢每服一錠白水磨服病勢重者連進兩服通利一二次無妨用溫粥補住治一切諸毒並用涼水磨化一錠頓服之或吐或瀉隨手而愈凡癰疽發背未破時用涼水磨塗患處並磨服痛止覺癢立消陰陽二毒傷寒心悶狂言亂語胸膈壅滯邪毒未發及瘟疫喉痹纏喉風冷水薄荷一小葉研下心氣痛並諸氣淡酒或薑湯磨服赤白痢疾腹中急痛霍亂攪腸痧等證用薄荷湯磨服常帶此藥隨身則妖邪不敢侵犯入瘴地瘟家每服半錠並不畏犯或遇途人中毒危急一切苦疾施與一錠救人命於頃刻陰德之大何可勝言愚敢曰仁人君子當賽於此矣男子婦人急中顛邪喝叫亂走心風失志五種風癇中風緊急口眼喎斜語言謇澀骨節疼痛並用薑湯磨下自縊溺水驚卒鬼迷死未隔宿者酒磨下毒蛇風犬一應惡蟲所傷用涼水磨塗患處另用淡酒磨服小兒驚緊急五疳食積中惡等疾並用蜜水同薄荷葉磨下每一丸量兒大小作三四服牙齒疼酒磨塗及含漱少許良久吐下年深日近頭痛太陽痛薑湯磨紙貼太陽穴上諸蟲腫脹大麥芽煎湯下婦人經水不通腰腹脹痛經滯者紅花煎湯下孕婦不可服凡癆瘵傳尸蠱疰只用此藥磨服不數錠而病愈曾有癆瘵服此藥一次即吐蟲出如蜣螂後服養氣血之藥數劑而痊愈原夫去毒殺蟲無逾於此藥奇怪之病屢用如神醫家大家不可一日無之而夫人亦不可不通知也保寧丹傳百病居士叢談云往時川蜀俗喜行毒而成都故事歲以天中重陽時開大慈寺多聚人物出百貨其間號名醫世者於是有於窗隙間呼貨藥一聲識其意亟投以千錢乃從窗隙度藥一粒號解毒丸一粒可救一人命夫跡既叵測故時多疑出於神仙政和間祐陵以仁聖惠天下嘗即上清寶籙宮之前新作兩亭左曰仁濟主給藥治疾苦右曰輔政主符水除邪鬼因遂詔海內凡藥之治病彰彰有聲者悉索其方書而上之焉於是成都守臣監司奉命相共窮其狀乃得售解毒丸家蓋世世懼行毒者為讎害故匿其跡非有所謂神仙者既據方修治得其合即並藥奏御下殿中省上曰朕自弛天子所服御以濟元元毋煩有司也由是殿中省群醫諸師驗其方則王氏博濟方之保寧丹爾當是時猶子行通領殿中監事故獨得其詳吾落南來用是藥嘗救兩人食胡蔓草毒遂得不死蓋不可不書博濟保寧丹出劉涓子神仙遺論治蠱毒諸毒一切藥毒神效明硃砂一兩細乳山豆根半兩明雄黃黃丹真鉛者各三錢麝香當門子一錢黃藥子續隨子生杵各二錢半巴豆肥者不去油斑蝥各二錢去頭足翅糯米一撮半炒半生赤蜈蚣二條一炒一生上各制研淨稱入鉢內乳極細於端午日重陽誠心修臺勿令婦人雞犬見之用糯米稀糊丸如龍眼核大陰乾瓷瓶收每服一丸清茶吞下不得嚼破須臾病人自覺心頭如拽有聲將次毒物下或自口出或大便瀉下嫩則是血塊老則成鱉毒毒出便瘥如中毒而口禁者即挑開於關以藥灌下則愈若染蛇蠍牛馬諸毒用醋磨敷患處後更忌酒肉毒食一月惟吃淡飯可也若用急用隨時擇吉日合之醫林丹砂丸治蠱毒雄黃另研硃砂另研藜蘆略炒鬼臼巴豆去油各二錢半上為末煉蜜丸梧桐子大每服二丸空心薑湯下當利惡物並蠱毒如煩悶以鴨血為羹食之雄麝散治五種蠱毒明雄黃麝香另研各一字用生羊肺一指大以刀切開安藥在內吞下夷堅志石刻方宋嘉祐中範吏部為福州守日揭一方於石云凡中蠱毒無問年深日久用鴨卵插銀叉試之俱黑者中毒也五倍子二兩雄黃末一錢甘草三錢炙丁香木香麝香輕粉少許糯米一十粒用水一大碗於砂鍋內煮至七分候藥面生皺皮熟絹濾去渣通口服服畢平正仰臥枕令頭高覺腹中有物衝心不得動若吐出以盆盛之如魚鰾之狀乃是惡物吐罷飲茶一盞瀉亦無妨旋煮白粥補之忌生冷油膩醋醬十日服解毒丸三五丸解毒丸治誤會毒物一切惡毒不救必死板藍根乾者四兩貫衆銼去土一兩青黛研生甘草各二兩上為末蒸餅丸梧桐子大別以青黛為衣如誤服諸毒稍覺精神恍惚噁心即是中毒急服十五丸爛啜新汲水下即解叢語泉僧方治金蠶毒才覺中毒先吃白礬味甘而不澀次嚼黑豆不腥是也石榴皮根不拘多少煮汁飲之一二盞即吐出活蟲而愈國老飲治蠱毒白礬甘草等分共為末上每服二錢白水調下或吐黑涎或瀉黑汁皆效五種解毒丹紅芽大戟斑蝥糯米炒去頭足東引桃根白皮火烘各等分共為末上每服水調方寸匕毒即出不出再服酒中酒服食中食服奇效東坡雄黃丸治蠱毒一切蛇虺畜獸毒雄黃白礬等分生研於端午日研末溶黃蠟調和急手為丸梧桐子大每服七丸念藥師王菩薩七遍熟水吞下直指平胃生漆丸治蠱毒正料平胃散末以生漆調和丸梧桐子大每遇毒空腹溫酒下七十丸加至百丸止良方七寶丸治蠱毒敗豉皮蠶蛻紙各燒存性刺蝟皮五倍子炒續隨子硃砂另研雄黃另研各等分上為細末糯米粥丸小豆大每服空心七丸白水下蜜髓煎治中蠱令人腹內堅痛面目青黃病變無常真蜜一碗豬骨髓五兩研同煎熟分作十服日三服即瘥衛生易簡方治挑生蠱毒一方明礬芽茶等分為末涼水調三錢一方糯稻穗濃煎湯涼服一方胡荽絞汁和酒服之立下神效一方治蠱下血刺蝟皮燒為末水調服方寸匕當吐蠱出一方治蠱吐血血如爛肝者苦瓜一枚水二升煮一升服之吐即愈一方栝蔞根搗自燃汁和酒服之一方青藍汁頻頻服半合則解一方石菖蒲為末三錢甘草湯調下一二服病退即止一方石榴皮煎汁飲之當吐出活蟲而愈廣南衛生云胡蔓草其葉如茶其花黃而小凡一葉入口百竅潰血人無復生有愚民私怒茹以自斃人覺之急取抱雞卵不生雞者細研和以麻油挑口灌之乃吐盡惡物而蘇少遲不救中挑生毒案丁志云興化人陳可大知肇慶府肋下忽腫起如生癰節狀頃刻間其大如盤熾者云此中挑生毒也俟五更以緑豆嚼試若香甜即是已而果然乃搗川升麻為細末取冷熟水調二錢連服之遂洞下瀉出生蔥數莖根鬚皆具腫即消縮煎平胃散調補且食白粥後亦無他又雷州民康才妻為蠻巫林公榮用雞肉挑生值商人楊一善醫療與藥服之才食頃吐積肉一塊剖開筋膜中有生肉存已成雞形頭尾嘴翅時肖似康訴於州州捕林置獄而呼楊生令具疾證用藥其略云凡吃魚肉瓜果湯茶皆可挑生初中毒覺胸腹稍痛明日漸加攪刺十日則物生能動騰上則胸痛沉下則腹痛積以瘦悴此其候也在上膈則取之其法用熱茶一甌投膽礬五分於中候礬化盡通口呷服良久以雞翎探喉中即吐出毒物在下膈則瀉之以米飲下郁全末二錢毒即瀉下乃擇人參白朮各半兩研末同無灰酒半升納瓶內慢火熬半日許為度酒熟取溫服之日一盞五日乃止然後飲酒如其故灸法治一切蠱毒兩足小趾盡處各灸三壯即有物出酒中隨酒中飲食中隨飲食出菜中隨菜出屢驗解毒門解諸毒通用方萬病解毒丹見中蠱毒門一方雄黃青黛等分為末新汲水調服一方揀淨土地掘窟用井水攪澄清多飲為愈一方石菖蒲生明礬等分為末新汲水調二錢不愈再服定愈一方晉礬建茶等分為末新汲水調服三錢吐即效不吐再服一方黃連甘草節二味水煎涼服不拘多少一方薺苨黑豆甘草銼每用一兩水二盞煎一盞溫服未效再服一方白扁豆生為末水調服二三錢一方玉簪花根擂涼水服一方藍根或萱草花根擂水俱可服效解中飲食毒方中食牛馬肉毒一方淡豆豉擂人乳服之即解一方粉草擂無灰酒服當吐瀉若渴者不可飲水飲水必死解食善魚龜鱉蝦蟆自死鳥獸諸毒豆豉一合新汲水煎濃溫頓服之可解解食魚膾河肫毒及食狗肉不消脹滿毒蘆柴根鮮者搗汁飲之乾者煎汁出溫涼飲之解食蟹毒紫蘇葉濃煎汁飲之或搗藕汁飲之或搗蒜汁飲之俱可解解食斑鴣毒葛粉二合水調服可解薑湯調亦解解雞子毒好醋飲之瘥未效再服解石斑魚子毒其魚身有紅斑如虎斑樣眼小口細其子不可食食之令人吐而頭眩魚尾草搗汁服少許吐立止此草一名摝木根似黃荊八月開紫花成穗葉似水楊無大樹經冬不凋漁人用以藥魚中食山雞鷓鳩毒南唐書云南唐相馮延巳苦胸中痛纍日不減迎太醫令吳廷紹密詰廚人曰相公平日食何等物件對曰多食山雞鷓鴣廷紹曰吾得之矣投以甘草湯而愈蓋山雞鷓鳩者皆食鳥頭半夏故以此解之中斑鳩毒名醫録載浙人王夫人忽日面上生黑斑數點日久滿面俱黑遍求醫士不效忽遇一醫云夫人中食毒爾某治之一月平復後覺其方止用生薑一片切碎研汁將滓焙乾卻用薑汁煮糊丸問其故云夫人日食斑鳩蓋此物嘗食半夏苗是以中其毒故用生薑以解之老雞有毒清溪暇筆云姑蘇一人出商在外其妻畜雞數只以候其歸凡數年而返一日殺而食之殆盡抵夜其夫死鄰家疑其有外奸首之官婦人不禁考校遂自誣太守姚公疑之乃以情問婦婦以食雞對太守覓老雞數十令死囚遍食之果殺二人獄遂白蓋雞食蜈蚣久而蓄毒故養生家不食老雞中酒毒飲酒中毒者經日不醒是也今人謂之中酒黑豆一升煮取汁溫服一盞不過三盞則愈解中麵食毒及豆腐毒白蘿蔔搗汁服之或生啖之或煎汁飲之俱可解食萵菜毒遁齊閒覽云萵菜出咼國有毒百蟲不敢近蛇虺過其下誤觸之則目瞑不見物人有中其毒者搗生薑汁飲之即解解食芹菜毒餳糖一升盡服之吐蟲出即瘥一用杏仁搗粳米同煮粥服二三碗得吐當有蛟子出解中諸菜毒食後多腹脹者是毒也以醋解之解雜色肉毒以松子仁同肉煮之則無毒杏仁山楂俱可解諸色毒方伏龍肝即灶心土為細末涼水調三四錢水一碗攪動服之吐者再一服香麻油總能解一切飲食諸毒不可不知凡造肴饌必先用真麻油於淨鍋熬熟卻下肉炒過然後入清水煮之並不犯毒今徽州池州地方食牛肉不論春夏無日不食能制之有方也所以鮮有中毒但犯一切飲食毒者隨用香麻油一杯或二杯飲之得吐即毒便釋而無不愈者風俗通曰禽獸自死者俱有毒不可食魚無腮者有毒腮大者有毒鱉肚下有紅藻文者有毒蟹腹下毛有毒煮酒初出火者大有毒江南謂之火頭酒飲之則生痔溢血夏月飲食但過宿即有毒夏月酒在銅錫中過夜有毒銅器蓋熱食氣上蒸滴下食中有毒炊湯過宿飲之有毒盥洗生疥桃杏仁雙仁者毒能殺人果未成核者俱毒令人發瘡節夏月秋果熟落地蟲緣者有毒人食之作漏屋漏水有毒人食之有腹脹而死者用之沐手則生浸淫之疥屢驗死澤中存水有毒飲之令人生瘕湯池中溫泉水不可飲令人脹悶惟可澡沐可以疏風愈疥癩蓋其泉自硫黃中流出而故溫也患疥者宜飽食入浴之連日數次汗透而愈體虛者不可輕浴解諸藥石毒方解中砒毒凡中砒毒者其人煩躁如狂心腹絞痛頭眩嘔吐面色青黑四肢逆冷六脈洪數飲食中得之為易愈若空心酒醋服者難救一方地漿水頓服若吐出又服所謂洗盡腹中毒全憑地上漿一方用緑豆半斤擂新汲水去渣通口服一方用真靛花二錢井花水調下二服一方白扁豆生為末新汲水調服二三錢一方取新鮮羊血鴨血飲之皆可解一方藍根砂糖相和研水服一方地漿調鉛粉服雖進二三碗無妨一方鬱金末二三錢涼水密調勻服一方干犬糞白尖一錢擂水服吐甚者又進涼水多吐可愈解中附子毒大豆汁餳糖棗湯並能解附子毒一方用防風濃煎汁服之愈一方用田螺搗碎調水飲之愈中附子毒說蓋諒郎中之兄詵因感疾醫勸服附子酒每生切大附子二兩浸以汁酒旦起輒飲一杯服之二十年後再為陝西漕使諒自太學歸過南樂縣拉同行途中曉寒詵飲一杯復令溫半杯比酒至覺微醉即與妻飲之行數里妻頭腫如斗唇裂血流下駐路旁呼隨行李職醫告之李使生嚼黑豆緑豆各數合仍且煎湯並飲至曉腫始消誅仍飲不輟到長安數月失明遂致仕方四十二歲出醫說中仙茅毒說鄭長卿資政說少時隨父太宰官懷州一將官服仙茅遇毒舌脹出口漸大與肩齊善醫環視不能治一醫獨曰尚可救少緩無及矣取小刀釐其舌隨破隨合釐致百數始有血一點許醫喜曰無他也舌應時消縮小即命煮大黃朴硝數碗連服之以藥末並摻舌上遂愈出前誤犯狼毒毒醫說王仲禮嗜酒壯歲時瘡㾴發於鼻延於顯心甚惡之服藥不效一僧使服何首烏丸當用二斤適僕人識草藥乃掘得之其法忌鐵器但入砂鉢中藉黑豆蒸熟既成香味可念意謂所蒸水必能去風澄以洗面初覺極熱漸加不仁至晚大腫耳目口鼻渾然無別望之者莫不驚畏王之母曰凡人感風癩非一日積吾兄遇毒何至於是吾聞生薑汁赤小豆能解毒山豆根黑蚌粉能消腫亟命僕搗薑汁以三味為末調敷之半夜腫退到曉如舊先探何首烏擇不淨有狼毒雜其中以致此撓也解諸藥相反中毒蠶蛻燒灰細研一錢涼水調下頓服取效雖面青脈絶腹脹血吐服之即活解巴豆毒芭蕉根葉搗汁飲之利止而安一方黃連甘草煎汁涼飲之解半夏毒生薑搗汁飲之有中半夏毒口不能言倒地將死者速用薑汁灌之須臾自蘇解中漆毒人染之則成紅斑瘡觸目則失明生蟹取黃及汁塗之不數次愈杉木煎汁洗之一方無名異為末敷之解烏頭草烏毒甘草煎濃湯服之或米醋調沙糖俱可解解中鼠莽草毒黑豆煮汁飲之薺苨汁緑豆湯甘草湯皆效解食楓樹上菌毒中此者其人笑而不休地漿水飲之即愈解中斑蝥芫青毒豬脂油和大豆汁飲之解中鉤吻毒薺苨煮汁飲之一方用桂湯效解中鐘乳石毒紫石英為末二錢溫水調下二三服瘥解服丹毒地漿水服之為上一方用蚌肉食之良解射罔毒六畜血皆可生飲即解藍汁或豆汁或麻子汁俱可解解中菌毒忍冬葉生啖之愈或濃煎汁飲之崇寧間蘇州天平山白雲寺五僧行山間得菌一叢甚大摘而食之發吐三人急探鴛鴦草生啖食之即愈二人不甚吐至死此草蔓藤而生對開黃花白花傍水依山俗謂金銀又名鷺鷀花其根名老人須本草名忍冬以其能逐風寒濕熱也解藜蘆毒雄黃為末溫水調服一錢一方煮蔥汁服解雄黃毒漢防己煎湯飲之有用雄黃瘡上搽或以薰瘡陰囊受毒者防已煎湯洗數次愈解蜀椒葵子毒有食花椒氣閉欲絶者涼水飲之解地漿水更妙解芫花毒防風防己煎湯服甘草湯俱可解解大戟毒忌甘草菖蒲濃煎湯服解甘遂毒大豆濃煮汁服之解解狼毒毒杏仁擂汁藍根藍子擂汁俱可解解杏仁毒藍子研水服解解桔梗毒白米粥可解解中箭藥毒交廣俚人以焦銅作箭中人破皮即死糞清飲之立解患處以糞清洗之塗之凡解一切藥毒薺蔥汁白萹豆汁緑豆汁甘草汁餳糖汁米糖汁蠶蛻紙燒灰隨便用之俱能解凡解毒藥湯劑不可熱服宜涼飲之蓋毒得熱而勢愈盛也解諸蟲獸咬傷毒方解虎傷人毒香油飲之一碗無妨葛根湯洗傷處綿拭乾香油塗之以青布作條燃火入竹筒中放煙薰傷處口渴者砂糖調水飲之解風犬咬傷毒儒門事親云一人為犬齧足脛腫如罐堅如柱石毒氣入腹嘔不下食頭痛而重發熱憎寒戴人治以舟車丸百粒通經散二錢服至半時利十餘行腫消病勢稍減直候其流惡水五六日方貼膏藥敷生肌散而愈嗚呼凡畜傷人手足毒入經絡病證若是倉卒遇之不知治者受害而死豈細故云子和舟車丸見水腫門治犬咬傷不可便貼膏藥及生肌類閉毒於也當先用舟車丸禹功散通經散等藥隨便服利十餘次腫減痛止後方敷貼木香檳榔丸搜風順氣丸神芎丸俱可下寶鑑定風散治諸犬傷毒南星生用防風各等分共為末凡被犬咬先以口含漿水洗傷處或小便鹽湯俱可洗淨用棉拭乾方上二藥末不發若以制過南星內可服一二錢用童便調下亦可治傷風凡治犬咬傷遇倉卒無藥處即以小便洗淨百草霜香麻油調敷或以蔥搗爛貼之牛糞敷之蚯蚓糞敷之口嚼杏仁爛敷之皆能急救如少延緩則毒氣傅入經絡卒費調治糯米散大斑蝥二十一個去頭足翅用糯米一撮先將貓七個入米內慢火炒勿令焦去貓再入七個炒令焦色變俱去之又入七個炒米色出赤煙為度去貓不用只將米研為末冷水入香油少許空心調服須臾又進一服以二便利下惡物為度若腹痛急以青靛調涼水解之或先用黃連甘草煎湯待冷服之不可食熱物又涼水調益元散甚妙甚者終身禁食犬肉每見食犬肉而復作者不救又見世人每用斑蝥服而死者有之蓋斑蝥毒之尤者雖以毒而攻毒惟少用之茲用炒米以奪氣猶備青靛黃連解其剽悍而況單服斑蝥豈有不死豫族兄廩生徐學儒天資明敏又好醫一日乃子被風犬所咬病熱頗大即用斑蝥七枚糯米同炒不用米只用貓頓與子服須臾大呻吟謂腹中如刀切急以藥解之弗及不逾時而死族兄惟見醫方云云不察毒藥之悍性豈能頓服七枚古之醫方傳訛不覺今世方書每每去米以貓頓服傳論而惟醫林集要一方去貓用米豫故表而出之以證方書之謬又如小兒方每以一藥兼治急慢驚風如催生兔腦丸謂生兒出手尚握藥殊不知急慢驚風為虛實二證小兒在腹胞膈不通惟藥入胃集氣通經豈有丸藥握手之理方書傳録訛以傳訛君子當準之以理貴乎有格致之功方書詎可盡信孟子所謂盡信書則不如無書誠哉言也一方治風犬傷人急於無風處嗍去瘡口惡血如或無血則以針刺血小便洗淨得真虎骨酥油炙為末敷乾者酥油調上或用香油調雄黃少加麝香敷一方用虀汁加薑汁和之空心服當下惡物如葡萄肉為驗一方白芷蟬蛻等分二錢酒調服瘡口當出黃水為度一方治犬傷處肉腫色黃爛萆麻子去殼五十粒用水研為膏先以鹽湯洗瘡口次數上此藥人咬傷亦以此方治之一方米泔水洗淨砂糖敷之一方杏仁炒黑搗成膏貼之一方拔去病人頂上紅髮再以艾灸傷處三五壯愈闢犬法瑣碎録云凡行道遇惡犬即以左手大拇指掐自寅上起吹氣一口輪至戍上掐之犬即退伏一方治馬咬傷毒氣入心馬齒莧搗爛煎湯服栗子嚼敷患處一方益母草銼搗爛醋調封之又方馬鞭梢燒灰敷解蛇螫人毒雄黃為末細辛白芷各五錢為末上入雄末三五分每服二錢酒調下凡被蛇傷即用針刺傷處出血用雄黃等藥敷仍要中留一孔使毒氣得泄內服解毒藥傷處兩頭俱用繩子扎縛不致毒氣內攻流延經絡一方治一切蛇蟲傷毒五靈脂雄黃等分為末每服二錢酒調敷瘡留口燥干油搽一方玉簪花葉研汁酒和服渣敷傷處一方絲瓜葉搗碎敷一方苦蕒搗爛敷一方半邊蓮草以唾津揉爛敷一方紫花地丁搗爛敷一方貝母為末酒調二錢服用油調敷傷處流水出盡愈肘後方用小蒜搗汁服渣敷傷處易簡方用蒼耳草嫩葉搗爛絞汁服飲酒一杯漱口或加酒入汁飲渣敷傷處又方扁豆葉搗爛敷又以紫蘇葉香油浸貼傷處一以劍面草搗爛敷凡蛇虺所傷倉卒無藥處以藍葉搗汁一碗調雄黃一錢點塗傷處並令細細服其汁神驗如無藍以青黛代之解誤飲蛇交水毒人溪行入山或飲泉水其中有蛇交遺毒人誤飲之則心腹絞痛而不能食醫或只作涼水飲積脾胃病治殊不覺其中毒只以雄黃解毒丸遂愈昔有一人渴飲澗泉得此病諸醫不愈惟一醫投以解毒下之赤小蛇數條尚活即瘥治蛇入口或入七竅割母豬尾滴血於竅中自出易簡方云一人因熱取涼睡園野寤著有蛇入口中挽不出用刀破蛇尾入花椒二三粒裹定須臾自出本草衍義云有人被蛇傷良久已昏困有老僧見之以酒調末藥一二錢灌之遂蘇及以藥渣塗咬處良久復灌一服其苦皆去問之乃五靈脂雄黃二味爾有中一切蛇蟲之傷用之無不驗也雄黃避蛇毒南海地多蛇而廣府尤甚某侍郎為帥聞雄黃能禁制此毒乃買數百兩分貯絹囊掛於寢室四隅經月餘一日臥榻外常有黑汁從上滴下臭甚使人穿承塵窺之則巨蟒橫其上死腐矣於是盡令撤去障蔽蛇死者長丈許大如柱旁又得十數條皆蟠虯成窠宅屋內所驅放者合數百自是官舍清寧山林日用法集驗方云山林人家須備雄黃每出時用梧桐大一丸燒煙起以薰腳布草履袍袖之類有毒不敢侵害百邪遠避治蠍螫毒半夏白礬等分為末以醋和敷傷處蠍怕膽礬蛇怕雄黃又云南方人家不可無雄黃北方人家不可無膽礬豫親見北方人貨蠍螫藥者以活蠍數十枚置囊中為樣取蠍安額上或咬口中逼之螫額舌出血而立腫即用膽礬搓之立消觀者肯買可見膽礬制竭毒第一藥也一方雞口瀝出涎塗之瘥一方南星白礬為末敷傷處治蜈蚣咬人毒鹽搓之鹽湯洗傷處痛止一方吳茱萸嚼爛擦之或取井底泥敷之一方桑葉搗爛或苧葉搗爛敷傷處一方香油點燈熏患處即愈一方桑白皮汁和鹽敷之或雄黃末敷之一法急以手寫寅字於地上臨了一點即撮上土及頭一點上土撮起擦傷處即愈一方雞冠刺熱血滴於傷處愈或乾雞糞末搽之愈一法治竭螫毒以右手食指寫虎字於土地上臨了一勾即用指撮起勾上土擦傷處愈解誤吞蜈蚣方昔有婢用吹火筒吹火不知內有蜈蚣向火一吹蜈蚣驚竄入口不覺下喉求救人無措手適有人云取小雞一隻斷喉取血頓食之復灌以清油取吐蜈蚣隨出治誤吞水蛭昔一人夜間飲水誤吞水蛭入腹經停日久復生小蛭能食人肝血腹痛不可忍面目黃瘦全不進食不治必死方用田中泥一塊小死魚三枚同豬膏溶搗勻用巴豆十粒去油入泥同魚膏四味搗勻丸如緑豆大用田中冷水吞下大人五七丸小兒三丸須臾瀉下水蛭盡卻用八珍湯調理治飛絲毒入口生紫蘇葉細嚼白湯送下無恙解狼煙入口好米醋細細飲之遂解解蜂蠆毒即以小便洗擦拭乾以香油搽塗或以雄黃末搽之或用蜂房末搽之太平御覽魏志曰彭城夫人夜之廁蠆螫其手呻吟無賴華他令溫湯漬手數易常令暖達旦愈蠼螋妖蠱射人毒蠼螋妖蟲也隱於牆壁間尿射人之影令人遍體生瘡如湯火所傷治法用烏雞翅毛燒灰油調敷諸蟲畏雞故能治之壁鏡咬毒壁鏡本草名蜥蜴醋磨大黃塗之愈一方白礬塗之治飛絲入眼即目脹而腫痛不可忍清煙墨磨濃塗入眼內少頃以筆捲之隨筆出治蠶咬人毒蠶咬人毒入肉則令發寒熱苧葉搗敷之汁塗之今治蠶家以苧近蠶則不生髮也治鼠咬傷毒貓毛燒存性入麝香少許香油調敷傷處則不害解蜘蛛咬毒薑汁調胡粉敷瘡口或用清油搽之內用羊乳飲之本草云蜘蛛咬人令人一身生絲惟羊乳飲之解真元十年崔員外從質云目擊有人被蜘蛛咬腹大如孕其家棄之乞食於道一僧遇之教飲羊乳未幾日而平中蚯蚓毒形如大風鬚眉脫落石灰泡熱水涼洗患處浸之久良小兒多受蚯蚓毒則陰莖及囊俱腫如水泡用鴨血塗之或只以鴨口開含少時消以鴨能食此物也一方鹽湯溫洗之效水弩射工溪沙毒溪澗中射工蟲專射行人形影人中之則病如瘧狀若傷寒俗云沙發病中之深者死不治柳宗元嶺南郊行詩云射工巧伺遊人影颶母偏驚旅客船人犯之者急用後方治之豆豉半升蔥白一握葛根二兩升麻二兩上銼每服五錢水煎去渣溫服渣再煎服一方白礬甘草等分為赤每服二錢涼水調下一方雄黃末調酒服之且塗患處名醫録云虎中藥箭自食清泥野豬中箭自豗薺苨而食雉被鷹傷自銜地黃葉貼之鳥獸蟲物猶知解毒何況人乎劉處隱居嘗於齊中見一大蜂黏於蛛網蛛進而搏之為蜂所螫墜地俄頃蛛鼓腹破裂徐徐行入草齧芋梗微破以瘡就齧處磨之良久腹漸消如故自後人有為蜂螫者搗芋梗敷之
