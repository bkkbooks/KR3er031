body:
  text: 卷之二十火證門病機敘論經曰諸熱瞀瘛皆屬於火諸痛瘡癢皆屬於心諸禁鼓慄如喪神守皆屬於火諸逆衝上皆屬於火諸腹脹大皆屬於熱諸燥狂越皆屬於火諸病有聲鼓之如鼓皆屬於熱諸病胕腫疼酸驚駭皆屬於火諸轉反戾水液渾濁皆屬於熱諸嘔吐酸暴注下迫皆屬於熱又曰諸熱瞀瘛暴喑冒昧躁擾狂越罵詈驚駭胕腫疼酸氣逆衝上禁慄如喪神守嚏嘔瘡癢喉痹耳鳴及聾嘔湧溢食不下目昧不明暴注瞤瘛暴病暴死皆屬於火原病武曰瞀昏也瘛動也熱甚則神氣昏心惕跳肉瞤動皆火然也暴喑無聲也金受火邪濁而不鳴也金清則善鳴火盛則金濁難鳴而喑也冒昏冒也昧闇昧也火氣悶熱則神昏暗而不清爽也躁躁動煩悶也擾擾亂也凡火甚則煩心不眠坐臥不寧神志不定是也狂越狂亂而乖越言語錯亂行止失常也罵詈惡聲以辱人也驚駭聞聲則驚惕然而恐駭皆火邪盛正氣無主也胕腫疼酸足附近䯒有肉處熱勝則腫風勝則動疼痛之輕淺痛則疼之甚也酸似疼非疼其間側側然酸髓而似疼痛之意也乃肝木之火故似酸也如醉甚之甚手足股腕皆為之酸髓者是也氣逆衝上火氣炎上也禁慄如要神守戰慄搖動而形體喪失保守之神也嚏嘔鼻中氣癢而作聲也火爍肺金而邪氣出鼻竅故癢礙而噴嚏也瘡瘍為心火之熾於皮膚也喉痹熱客上焦咽喉腫痛吞津有礙而不仁之謂也耳鳴腎水不滋火炎上竅而有聲如聞鐘鼓蟬鳴之類是也嘔湧液食不下火氣炎上胃膈熱甚則傳化失常故嘔溢而上也目昧不明為熱氣鬱癉也平白目無所見皆熱氣鬱之甚也暴注瞤瘛暴注卒然而瀉也熱甚則流通而卒成水瀉之類瞤瘛動跳也暴病暴死火性疾速如熱氣鬱怫之久則一時心神昏悶筋骨不用卒然僵仆倒地而死皆火之為也經曰壯火之氣衰少火之氣壯壯火食氣氣食少火壯火散氣少火生氣壯火食氣故氣得壯火則耗散氣食少火故氣得少火則長生猶言少火滋養其氣也原病式曰五臟之志過度則勞傷本志凡五志所傷皆熱也所謂陽動陰靜故形神勞則燥不寧靜則清平也是故上善若水下愚若火如卒暴匱僕多因五志七情過度而卒病也故善為心火之志病笑者火之甚也五志過極皆為火也火有君相五志之異玉機微義曰火之為病其害甚大其變甚速其勢甚彰其死甚暴何者蓋能燔灼焚燎飛走狂越消爍於物莫能御之遊行於三焦虛實之兩途曰君火也猶人火也曰相火也猶龍火也火性不妄動能不遠於道常以稟位聽命運行造化生存之機矣夫人在氣交之中多動少靜欲不妄動豈可得乎故凡動者皆屬火化火一妄行元氣受傷勢不兩立偏勝則病移害他經事非細故動之極也病則死矣經所謂一水不勝二火夫火出於天造君相之外又有厥陰臟腑之火根於五志之內六慾七情激之其火隨起蓋大怒則火起於肝醉飽則火起於胃房勞則火起於腎悲哀動中則火起於肺心為君主自焚則死矣相火動為諸證丹溪曰太極動而生陽靜而生陰陽動而變陰靜而合而生水火木金土各一其性惟火有二曰君火人火也曰相火天火也火內陰而外陽主乎動者也故凡動皆屬火以名而言形質相生配於五行故謂之君以位而言生於虛無守位稟命因動而見故謂之相天主生物故恆於動人有此生亦恆於動其所以恆於動者皆相火助之為也見於天者出於龍雷則木之氣出於海則水之氣也具於人者寄於肝腎二部肝屬木而腎屬水也膽者肝之腑膀胱者腎之腑心胞絡者腎之配三焦以位言而下焦司肝腎之分皆陰而下者也天非此火不能生物人非此火不能有生天之火雖出於木而皆本乎地故雷非伏龍非蟄海非附地則不能鳴不能飛不能波也鳴也飛也波也動而為火者也腎肝之陰悉具相火人而同乎天也或曰相火天火所動何東垣謂元氣之賊又曰火與元氣不兩立一勝則一負然則如之何則可使之無勝負乎周子曰神發知矣五性感物則萬事出五者之性為物所感不能不動謂之動者即內經五火也相火易起五性厥陰之火相煽則妄動矣火起於妄變化莫測無時不有煎熬真陰陰虛則病陰絕則死君火之氣經以暑與熱言之相火之氣經以火言之蓋表其暴悍酷烈有甚於君火者也故曰相火元氣之賊周子又曰聖人定之以中正仁義而主靜朱子亦曰必使道心常為一身之主而人心每聽命焉此善美乎火者人心聽命於道心而又能主之以靜彼五火將寂然不作而相火者惟有裨補造化而為生生不息之運用耳何賊之有或曰內經相火注言少陰少陽矣未曾言及厥陰太陽而吾子言之何也曰足太陽少陰東垣常言之矣治以炒蘗取其味辛能瀉水中之火是也戴人亦言膽與三焦尋火治肝和胞絡都無異此歷指龍雷之火也予亦備述天之火皆生於動如上文所云者實推廣二公之意或曰內經言火者不一往往於六氣中見之言臟腑者未之見也二公豈他有所據耶子能為我言之乎經曰百病皆生於風寒暑濕燥火之動而為變者岐伯歷舉病機十九條而屬火者五此非相火為病之出於臟腑者乎考諸內經少陽病為瘛瘲太陽病時眩僕少陰病瞀暴喑鬱冒不知人非諸熱瞀瘛之屬火者乎少陽病惡寒鼓慄膽病振寒少陰病灑淅惡寒振慄既陰病灑淅振寒非諸振鼓慄如喪神守之屬火者乎少陰嘔逆厥氣上行膀胱病沖頭痛太陽病厥氣上衝胸少腹控睪引腰脊上衝心少陰病氣上衝胸嘔逆非諸逆衝上之屬火者乎少陽譫妄膀胱病狂顛疾非諸躁狂越之屬火者乎少陽病胕腫善驚少陰病瞀熱以酸胕腫不能久立非諸病胕腫疼酸驚駭之屬火者乎原病式曰諸風掉眩屬於肝火之動也諸氣憤郁屬於肺火之升也諸濕腫滿屬於脾火之盛也諸痛瘡癢屬於心火之用也是皆火之為病出於臟腑者然也註文未之發耳以陳無擇之通達且以暖熾論君火日用之火言相火而又不曾深及宜乎後人之不無聾瞽也悲夫病濕熱相火者多諸病尋痰火痰火生異證因心火為之心者君火也火旺則金燥水虧為火獨存氣有餘便是火非真氣之有餘乃火邪之為氣氣從左邊起者肝火也氣從臍起者陰火也熱從腳下起入腹者虛之極也蓋相火起於九泉之下此病十不救一治法以四物加降火藥服之以附子末津調貼湧泉穴引火下行若壯實人有此證是濕鬱成熱之候或有冒雨途行受濕而得此證者不可誤作陰虛治只宜蒼朮黃柏牛膝防己丸之屬陰虛火動者難治脈數無力者是也飲酒人發熱者難治不飲酒人因酒發熱者亦難治煩躁者氣隨火升也東垣云有元氣虛損而熱有五臟熱有內中外而熱輕手捫之熱在皮毛血脈也重手按之筋骨熱甚者熱在筋骨也不輕不重而熱熱在肌肉也又云晝則發熱夜則安靜是陽氣自熱於陽分也晝則安靜夜則發熱煩躁是陽氣下陷入陰中也名曰熱入血室晝夜不分是重陽無陰也亟瀉其陽峻補其陰兩手大熱為骨厥如在火中灸湧泉穴五壯立愈脈候脈浮大而虛為虛火沉而實大者為實火洪數見於左寸為心火見於右寸為肺火見於左關為肝心火見於右關為脾火見於兩尺為腎經相火男子兩尺洪大者必遺精陰火盛也凡病痰火脈沉細而數者難治病熱有火者可治脈洪是也無火者難治沉細是也無故而脈洪大者必病進也平人脈數者必有瘡瘍作也治法治熱不衰當求其屬經曰有病熱者寒之而熱有病寒者熱之而寒二者皆在新病復起治之奈何曰諸寒之而熱者取之陰諸熱之而寒者取之陽所謂求其屬也王注取之陰陽則壯水之主益火之原是也求其屬者則求水火以取心腎之陰陽是也火有微甚治有逆從經曰微者逆之甚者從之又曰郁發之小熱之氣涼以和之大熱之氣寒以沃之甚熱之氣汗而發之發之不盡則逆取之火有虛實治有補瀉虛火可補參朮生甘草之類謂之虛者正氣虛也實火可瀉黃連解毒之類謂之實者邪氣實也人火正治龍火反治鬱火可發當看在何經風寒外束可發輕者可降重則從其性而升之人壯氣實火盛顛狂者可用正治藥用硝黃冰水之類是也人虛火盛狂者以生薑湯與之若投以冰水之類正治立死凡火盛者不可驟用涼藥必須溫散火急甚者必緩之生甘草兼瀉兼緩參朮亦可補陰則火自降炒黃柏熟地黃之類輕手接之熱甚而烙手重手按之不覺熱此病在肌肉之下宜發之東垣升陽散火湯火鬱湯之類火有君相臟腑分治之宜君火者心火也可以溫伏可以水滅可以直折惟黃連之屬可以制之相火者龍火也不可以水溫折從其性而伏之惟黃柏之屬可以降之噫瀉火之法豈止如此虛實多端不可不察以臟氣司之黃連瀉心火黃芩瀉肺火芍藥瀉脾火柴胡瀉肝火知母瀉腎火此皆苦寒之味能瀉有餘之火耳若飲食勞倦內傷元氣火不兩立陽虛之病以甘劑除之如黃耆人參甘草之屬若陰微陽強相火熾盛以乘陰位日以煎熬為血虛之病以甘寒之劑降之如當歸地黃之屬若心火亢極鬱熱內實為陽強之病以鹹冷之劑折之如大黃朴硝之屬若腎水受傷真陰失守無根之火為陰虛之病以壯水之劑制之如生地黃玄參之屬若右腎衰為陽脫之病以溫熱之劑補之如附子乾薑之屬若胃虛過食生冷物抑遏陽氣於脾土為火鬱之病以升散之劑發之如升麻葛根之屬不明諸此而求火之施治何所依據子和汗吐下三法治積火棠溪李濟之常病目及居省掾每服補肝散以致睛脹但見窗檻橫排幾至喪明令湧瀉五七次繼服涼藥方始如故丹霞朱僧氏張宗出家病三陽蓄熱常居靜室不敢見明明則頭痛如錐每置冰於頭上不能解其熱歷諸醫莫能辨其病後治之七日而愈用汗吐下三法而已後用涼物清鎮之平復如故一人素嗜飲酒得病醫用酒癥丸熱藥後目睹天但見紅色遂成龍火卒不能救治暴熱病在心肺積熱病在腎肝虛熱不能食自汗氣短屬脾虛以甘寒溫而行之實熱能食口乾舌燥便難屬胃實以辛苦大寒之劑下之火鬱為熱乃心火下陷脾土抑而不伸宜用火鬱湯心熱汗之心神煩亂血中伏火蒸蒸然不安宜鎮心火以硃砂安神丸骨蒸勞熱乃五臟齊損病人憔悴發熱盜汗下血宜養陰血肺熱者輕按之瞥瞥見於皮毛日西甚其證喘咳灑淅寒熱輕者瀉白散重者涼膈白虎地骨皮散心熱者微按之熱見於血脈日中甚其證煩心痛掌中熱而死黃連瀉心湯導赤散硃砂安神丸肝熱脅下骨上熱寅卯間熱甚脈弦四肢困熱便難轉筋筋痿瀉青丸柴胡飲子胸中煩熱實者用梔子黃連虛熱用參耆麥門冬茯神芍藥竹葉竹茹若脈堅實而數者神芎丸下之陰虛發熱四物湯加炒蘗知母乃降火補陰之妙劑甚者加龜板兼氣虛加參耆白朮手心熱屬熱鬱宜用火鬱湯或梔子川芎香附神麯丸服平旦潮熱熱在行陽之分肝氣主之白虎湯加黃芩日晡潮熱熱在行陰之分腎氣主之地骨皮牡丹皮知母黃柏潮熱用芩連生甘草辰戍時發熱加羌活午時加連未時加石膏申時加柴胡升麻夜加當歸身有寒加參朮黃耆上焦濕熱須用酒芩瀉肺火如虛熱加知母當歸天冬保肺中焦實熱與痛須黃連以瀉心火中氣脾虛不能轉運有鬱熱者黃芩葛根白朮以代之如胸中煩熱須用梔子實熱者切當若虛煩須用補藥為主人參白朮黃芩芍藥麥冬大棗之類下焦濕熱及膀胱經有火邪者須用漢防己草龍膽黃柏知母或八正散肥白人火藥中必兼痰火藥如白朮茯苓星半滑石之類瘦黑人有熱必兼火藥當歸桃仁牛膝之類藥方黃連瀉心火梔子佐之柴胡瀉肝火川芎佐之黃芩瀉肺火須用片芩用桑白皮佐之若鼠尾條芩止能瀉大腸之火石膏瀉脾中之實火虛者忌之芍藥瀉脾火冬月必須酒炒制其性之寒酸也木通下行瀉小腸火黃芩黃連以豬膽汁炒瀉肝膽之火黃柏知母瀉腎火又退勞骨蒸之火連翹瀉六經之邪火玄參瀉無根之遊火青黛瀉五臟之鬱火人中白瀉肝火黃柏加鬱金大能瀉膀胱之火小便降火極速山梔仁能降火從小便出其性能曲屈下行人所不知局方瀉心湯治心火心經蘊熱川黃連為末或湯或散任服導赤散治心火併小腸火生地黃木通生甘草各等分入竹葉水煎服茯苓散治心經實熱口乾煩渴眠臥不安茯苓麥門冬通草升麻各八分紫菀知母各一錢桂心四分赤石脂淡竹葉十片大棗二枚水二盞煎八分溫服瀉青丸治肝火當歸龍膽草川芎山梔防風大黃羌活各等分上為末煉蜜丸梧桐子大每服五十丸左金丸治肝火黃連吳茱萸各一兩泡浸半時焙乾用上為細末粥丸煎白朮陳皮湯下瀉白散治肺火大腸火桑白皮地骨皮各一兩甘草半兩上為細末水調服清金丸治肺火黃芩炒為末滴水丸白湯下正傳麥門冬湯治病後火熱乘肺咳唾有血胸脅脹滿上氣喘急五心煩熱渴而煩悶麥門冬天門冬桑白皮各七分五味子九粒紫菀茸貝母各六分桔梗甘草各五分生地黃淡竹葉各一錢水盞半姜三片棗一枚煎服集成硃砂涼膈丸治上焦虛熱咽膈有氣如煙搶上黃連梔子各兩人參茯苓各五錢硃砂三錢片腦三分上為末蒸餅丸硃砂為衣水下醫林橘皮湯治肺熱氣喘息賁橘皮麻黃紫蘇各七分柴胡五分母姜杏仁各一錢石膏二錢水煎服生薑瀉腸湯治大腸實熱腹脹不通口舌生瘡生薑橘皮竹茹各五分生地黃錢半白朮茯苓黃芩梔子各一錢朴硝二錢桂心五分水二盞棗一枚煎八分服瀉黃散治脾火山梔一兩藿香七錢石膏五錢防風四錢甘草三錢上為末蜜酒拌略炒服瀉熱湯治脾火面黃目赤季脅痛滿半夏母姜各一錢白朮枳實炒茯苓梔子各七分杏仁細辛芒硝生地黃淡竹葉各八分水煎加姜服石膏丸瀉胃火併食積痰火石膏煅上為細末醋糊丸綠豆大清米飲送下東垣滋腎丸降腎火黃柏二兩酒拌陰乾知母同上肉桂一錢去粗皮上二味氣味俱陰故能補腎以瀉下焦之火桂與火邪同體故以寒因熱用凡諸病在下焦皆不渴也上為細末熟水為丸百沸湯溫下大補丸治陰火補腎水黃柏鹽酒炒褐色為細末粥丸血虛四物湯送下氣虛四君子湯下補陰丸治消渴骨熱補腎水真陰不足六味地黃丸治腎虛憔悴盜汗發熱五臟齊損瘦弱虛煩骨蒸下血二方並見虛損門河間涼膈散瀉三焦六經諸火加黃連名清心湯大黃朴硝甘草各一錢連翹錢半梔子黃芩薄荷各五分上水盞半煎入蜜一匙和勻服三補丸瀉三焦火加大黃去黃連名三黃丸黃芩黃柏黃連為末滴水丸服東垣升陽散火湯治男婦四肢筋骨肌表俱熱如火捫之烙手此因血虛或胃虛食冷物郁遏陽氣於脾土之中火鬱即發之升麻葛根獨活羌活芍藥人參各六分炙甘草一分柴胡三分防風三分生甘草二分水盞半姜三片煎熱服忌生冷瀉陰火升陽湯治肌膚煩熱面赤食少喘咳痰盛上關脈緩弱或弦或浮而數羌活炙甘草黃耆蒼朮各一分升麻八分柴胡錢半人參黃芩各七分黃連酒炒五分石膏五分上水煎服黃連解毒湯治一切火熱毒狂躁煩心口燥舌乾熱勢之甚者及吐下後熱不解而脈洪喘急鄭聲目赤睛痛黃連黃柏黃芩梔子各等分上咀每服五錢水二盞煎八分溫服梔子仁湯治發熱潮熱狂躁面赤咽痛梔子赤芍藥大青知母各一錢升麻柴胡黃芩石膏杏仁甘草各二錢豆豉百粒上水煎溫服宣明防風通聖散治表裡俱熱壅滯躁悶方見風門防風當歸飲子治煩渴發熱虛煩火證柴胡人參黃芩甘草各一兩滑石三兩大黃當歸芍藥防風各五錢上咀每服一兩水二盞姜三片煎一盞通口服如有痰嗽加半夏若瀉減大黃滋陰降火湯養血降火之聖藥也當歸地黃涼血用生補血用熱天門冬去心白芍藥薄荷湯炒白朮各一錢麥門冬去心炙甘草各三錢知母黃柏蜜炙遠志去心陳皮洗川芎各六分上咀姜三片水煎服氣血虛加人參黃耆嗽加五味阿膠痰加栝蔞貝母吐血加丹皮藕節骨蒸熱加地骨皮直指黃芩湯治心肺蘊熱口瘡咽痛膈悶小便淋濁不利澤瀉梔子仁黃芩麥門冬去心木通生地黃黃連甘草各等分上每服一兩水二盞姜三片煎一盞食前溫服桂苓甘露飲方見霍亂門治胃受濕熱頭痛身熱煩渴吐瀉口乾紫雪治內外煩熱不解口中生瘡狂易叫走解諸熱毒藥毒邪熱小兒驚癇百病黃金百兩寒水石磁石石膏滑石各三斤以上五味用水一石煮至四斗去渣入下項藥炙甘草半分羚羊角屑犀角屑青木香沉香各五錢丁香一兩升麻玄參並銼細末各一斤以上再煮至一斗五升入下項藥硝石四升芒硝亦得每升得七兩七錢半朴硝提淨者十斤以上入前藥汁中微火熬柳枝不住手攪候有七升投放水盆中半日欲凝入下項藥攪令勻硃砂研三兩麝香當門子一兩二錢上藥成霜雪紫色每服一錢或二錢冷水調下大人小兒臨時以意加減並食後服大金花丸治中外諸熱寢汗咬牙睡語驚悸溺血淋秘咳血衄血瘦弱頭痛骨蒸肺痿勞嗽去大黃加梔子名梔子金花丸黃連黃柏黃芩大黃梔子等分上為細末滴水丸小豆大每服三十丸涼水下御藥神芎丸治一切熱證常服除痰消飲清頭自利咽膈能令遍身結滯宣通氣利而愈神強體健省病大黃黃芩各二兩牽牛滑石各四兩黃連薄荷川芎各半兩上為末滴水丸小豆大溫水下三十丸當歸龍薈丸治腎水陰氣風熱濕積時發驚悸筋惕搐搦神志不能榮衛壅滯頭目昏眩肌肉瞤瘛咽嗢胸膈不利腸胃燥澀躁擾狂越罵詈驚駭火熱等證當歸龍膽草大梔子黃連黃柏各一兩青黛五錢木香一錢麝香五分黃芩一兩大黃蘆薈各五錢上為細末煉蜜為丸小豆大每服三十丸薑湯送下瓜蒂散三聖散二方並見風門上治一切風熱積熱或火熾者寸口脈滑而有力胸中實滿煩冤氣上而不化面赤痰盛罵詈驚駭並宜吐之調胃承氣湯瀉胃火當歸承氣湯瀉脾胃肝火二方並見傷寒門
