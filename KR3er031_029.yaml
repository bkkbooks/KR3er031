body:
  text: 卷之二十九痞滿門病機痞滿敘論內經曰備化之紀其病痞又云太陰所至馬積飲痞膈原病式云痞與否同不通泰之謂精神榮衛血氣津液出入流行之紋理閉密而為痞也傷寒痞滿要審下痞成無己云傷寒心下痞滿者不經下後則有吐下之殊若下後則有結胸痞氣之別未經汗下而心痞滿者當吐之下之要在隨其邪氣之高下而泄之也若邪氣在表未應下而強下之邪氣乘虛結於心下實者硬滿而痛為結胸虛者滿而不痛為虛痞須審別之而用後之治法痞滿屬血不可專執於氣傷寒痞滿乃因寒傷榮血心主血邪入於本故為心下痞仲景瀉心湯數方皆用黃連以瀉心下之土邪至於酒積雜病下之太過亦作痞滿亦是血證何也蓋下多則亡陰亡陰者則損脾胃謂脾胃水穀之陰亡也故胸中之氣及其血虛而下陷於心之分故致心下痞滿宜理脾胃以血治之若全用氣藥通利則痞益甚而復下之氣愈下降必變為中滿鼓脹非其治也此事難知曰傷寒痞者從血中來從外之內從無形雜病痞者亦從血中來從內之外從有形故無形以苦瀉之有形以辛散之玉機云痞滿之病人皆知氣之不運也獨東垣指以血病言之謂下多則亡陰而損血此前人之未論也世之用氣藥治痞而不效者蓋不知此理故也痞為熱證直格云傷寒里之陰分已受熱邪是病發於陰也或熱微下證未全誤下之早則裡熱除去表熱乘虛入里而作痞也故仲景攻痞多用大黃黃連黃芩寒劑中或加乾薑之類者是以辛熱佐其寒藥欲令開發痞之怫熱結滯也非攻寒耳痞滿乃土邪為病與脹滿不同丹溪曰痞滿與脹滿不同脹滿內脹而外亦形痞則內覺痞悶而外無脹急之形也蓋由陰伏陽蓄氣血不運而成位心下中央䐜滿痞塞皆土邪之所為也有因誤下裡氣虛邪乘虛而入於心之分為痞者有不因誤下而得之如中氣虛弱不能運化精微為痞者有飲食痰積不能施化為痞者有濕士太甚邪著心下為痞者脈候脈經曰痞脈浮堅而下之緊反入里因作痞按之濡其脈上浮或寸沉關浮而弦脈濡弱弱反在關濡反在顛微反在上澀反在下微則陽氣不足澀則無血陽氣反微中風汗出而燥煩澀則無血厥而且寒陽微不可下下則心下痞堅治法治痞滿有虛實補瀉之異玉機云古方治痞用黃芩黃連枳實之苦以泄之厚朴生薑半夏之辛以散之人參白朮之甘溫以補之茯苓澤瀉之鹹淡以滲之隨其病之所在以調之也既痞有濕惟宜上下分消其氣果有內實之證庶可略與疏導世人苦於痞寒喜行利藥以求速效暫時通快痞若再作益以滋甚是皆不察夫所謂下多亡陰之意也如結胸是實邪大陷胸湯主之痞是虛邪須諸瀉心湯散可也諸瀉心湯有標本寒熱之殊保命集云三陰三陽之標本治各不同有因寒藥而為熱痞大黃黃連之類也有因寒熱藥陰與陽不利而痞大黃黃連加附子之類也有因辛熱藥多而寒藥少者陰盛陽虛而痞半夏甘草生薑瀉心三方之類瀉心湯者非瀉心火之熱瀉心下之痞也通而論之其藥陽多陰少蓋病發於陰而得之大黃黃連瀉心湯獨為陰心下痞而脈疾一證桂枝從用從太陽浮弱所變余皆陰陽雜用痞滿治例丹溪曰痞滿之證不一有因傷寒下早而作痞者枳殼桔梗湯小陷胸湯之類是也飲食填塞胸中而作痞者保和丸東垣枳實導滯丸木香化滯湯之類是也飲食後因胃氣寒飲食不消而作痞者宜吳茱萸砂仁藿香草豆蔻之類溫以化之脾氣虛弱轉運不調飲食不化而作痞者宜白朮山楂神麯麥芽之類以消之大病後元氣未復胸滿氣短者補中益氣湯陳皮枳朮丸木香枳朮丸之類傷寒下多則亡陰而痞者四物湯加參苓白朮升麻柴胡少佐以陳皮枳殼之類肥人心下痞滿內有濕痰留飲宜蒼朮半夏砂仁茯苓滑石瘦人心下痞乃鬱熱在上焦宜枳實黃連以導之葛根升麻以發之大凡心下痞滿須以黃連枳實而參以脈證虛實而調之可也痞有痰挾血成窠囊者用桃仁紅花香附大黃之類治之實痞大便祕者厚朴枳殼湯主之虛痞大便利者芍藥陳皮治之飲食倍傷而痞者宜消導之胸中窒塞上逆兀兀欲吐者因而越之治案滑伯仁治一人苦胸中痞滿憒憒若怔忡狀頭目昏痛欲吐不吐忽善忘時一臂偏痹脈之關以上溜而滑沉而有力曰積飲滯痰橫於胸膈蓋得之厚味醇酒肥膩炙爆蓄熱而生濕濕聚而痰涎宿飲皆上甚也王太僕云上甚不已吐而奪之治法宜吐俟春日開明如法治之以物探喉中須臾大吐黑色頑痰如膠餳者三四升一二日更吐之三四次則胸中洞爽矣正傳一人因夏秋勞苦冬間得痞滿證歷數醫皆與疏氣耗散之藥皆不效兩手關脈皆浮洪而弦澀關後脈皆沉伏此膈上有稠痰脾土之氣敦阜肝木鬱而不伸當用吐法木鬱達之之理也值冬月降沉之時未可以行此法且先與豁痰疏肝氣瀉脾胃敦阜之氣用平胃散加半夏茯苓青皮川芎草龍膽香附砂仁柴胡黃連栝蔞等藥病退十有三四待次年二月初旬為行倒倉法而安藥方痞滿通用劑局方七氣湯治七情所傷憂思鬱結臟腑氣不和平心胸痞悶半夏制茯苓各二錢厚朴制錢半紫蘇葉一錢上水盞半姜三片煎八分溫服東垣大消痞丸治一切心下痞滿及年久不愈者乾生薑神麯炒甘草炙各二錢豬苓二錢半澤瀉厚朴制砂仁各三錢半夏制陳皮去白人參各四錢枳實麩炒半兩黃連土炒黃芩土炒各六錢薑黃白朮各一兩上為末湯泡蒸餅丸小豆大每服五十丸至百丸空心白湯下東垣厚朴溫中湯治脾胃虛弱心腹脹滿疼痛時作時止厚朴薑汁炒陳皮去白各一錢茯苓草豆蔻甘草木香各五分乾生薑一錢水煎溫服東垣木香化滯湯一名消痞湯治因憂氣鬱結中脘腹痛心下痞滿不思飲食川歸枳實炒各四分陳皮木香各六分柴胡七分甘草炙草豆蔻各一錢麵包煨半夏錢半紅花一分水二盞姜五片煎八分溫服東垣黃連消痞丸治心下痞滿壅滯不散煩熱喘促不安澤瀉薑黃各一錢乾薑二錢甘草炙茯苓白朮各三錢陳皮半兩豬苓半兩枳實麩炒七錢半夏制九錢黃連一兩木香錢半黃芩二兩炒上為末蒸餅丸梧桐子大每服五十丸白湯下拔萃黃連消痞丸治心下痞滿小便不利黃連炒兩半黃芩炒三錢枳實一兩乾薑二錢茯苓白朮炒甘草炙各半兩豬苓半兩陳皮七錢半澤瀉一錢半夏制一兩三錢薑黃錢半砂仁三錢半厚朴制半兩上為末蒸餅丸梧桐子大每服一百丸白湯送下東垣失笑丸一名枳實消痞丸治右關脈弦心下虛痞惡食倦怠開胃進食乾生薑一錢甘草炙麥芽白茯苓白朮各二錢半夏曲人參各三錢厚朴制四錢枳實曲炒黃連各半兩上為末蒸餅丸梧桐子大每服七八十丸白湯下東垣木香順氣湯治心腹脹滿木香益智陳皮草豆蔻各五分厚朴姜炒青皮各四分茯苓半夏各六分乾薑吳茱萸各三分當歸升麻柴胡各一錢水盞半煎八分溫服東垣黃芩利膈丸除胸熱利膈痰生黃芩炒黃芩各一兩半夏黃連澤瀉各半兩南星枳殼炒陳皮去白各三錢白朮二錢白礬蘿蔔子小皂角各一錢上為末蒸餅丸梧桐子大每服五十丸白湯下忌酒面雞魚肥膩丹溪枳朮丸助胃消食寬中去痞白朮四兩枳實二兩上為末荷葉包燒飯為丸梧桐子大每服五十丸食後白湯下丹溪橘皮枳朮丸治同前橘皮枳實白朮各等分如前法丸服茱連丸治痞滿吳茱萸三兩黃連八兩上為細末米糊為丸梧桐子大每服五十丸食後白湯下治痞滿理氣諸劑活人桔梗枳殼湯治傷寒痞氣胸滿欲絶桔梗枳殼各三兩上咀作三服每服水二盞煎一盞服宣明檳榔散治傷寒陰證下後成痞滿而不痛按之虛軟檳榔枳殼等分為末每服三錢黃連湯調下寶鑑三脘痞氣丸治三焦痞滿水飲停積木香白豆蔻青皮三稜炮各一兩檳榔半兩沉香大腹子陳皮各一兩砂仁沉香各半兩上為末糊丸小豆大每服三十丸加至六十丸陳皮湯下瀉熱散寒治痞諸方仲景大黃黃連瀉心湯治心下痞按之濡關上浮或寸沉關浮而有熱者大黃二兩黃連一兩上銼以沸湯二升漬之須臾絞去渣分溫再服仲景附子瀉心湯治心下痞而復惡寒汗出脈沉遲也大黃二兩黃芩黃連各一兩附子一枚泡去皮另煮上銼以麻沸湯漬之須臾絞去渣內附子汁分溫再服仲景半夏瀉心湯治汗下後身寒痞滿而嘔飲食不下脈徵按之不痛非柴胡證半夏半升洗黃芩乾薑人參各三兩黃連一兩甘草炙二兩大棗十二枚上水一斗煮六升去渣再煮取三升溫服一升日三服仲景生薑瀉心湯治汗下後胃中不利干噎食臭自利腸鳴脅下有水氣而心下痞滿半夏半升泡黃芩人參各三兩黃連一兩甘草炙二兩大棗十二枚乾薑一兩生薑四兩上水一斗煮六升去滓再煮取三升服日三次仲景甘草瀉心湯治下後腹中雷鳴心下痞硬再下之痞益甚此非結熱以其胃中虛客氣上逆也半夏半升泡黃芩甘草各三兩黃連乾薑各一兩大棗十二枚煎法同上仲景大陷胸湯治傷寒下早而成結胸痞滿手不可按小陷胸湯治傷寒小結胸而痞不痛者二方並見傷寒門醫林加味陷胸湯治熱壅痞滿胸膈痛或兩脅痛枳殼麩炒桔梗各四錢半夏泡黃芩栝蔞子黃連各二錢麥門冬去心二錢上咀作二服每服姜五片水二盞煎八分食遠服利下即安凡瘧利病後發熱留滯胸膈及其飲酒過度胸滿結痛亦宜服此神效一法只用小陷胸湯加桔梗枳殼甚效栝蔞實散治胸脅痞滿胸中微痛引背喘急妨悶栝蔞實另研枳殼麩炒半夏泡桔梗各等分上為細末薑汁糊丸小豆大每服五十丸薑湯下煎服亦可破氣湯治婦人氣上逆胸膈作痛滿悶烏藥香附子各錢紫蘇陳皮檀香薑黃砂仁甘草炙各錢半上咀作二服每服水二盞姜三片蔥一莖煎八分去渣入沉香木香末各五分調服金匱栝蔞薤白飲治胸痞之病喘息咳唾短氣寸口脈沉而遲關上下緊數薤白白酒栝蔞飲主之栝蔞實一枚薤白白酒二升上三味同煮一升半分二服食後溫飲醫林開結枳實丸一名木香利膈丸治濕痰痰飲胸膈痞悶時作鳴聲枳實炒白朮半夏制南星泡明礬枯大黃各半兩牽牛頭末二兩皂角炙去皮弦子旋覆花各一兩青皮木香各五錢上為末麵糊丸梧桐子大每服三十五丸米飲下祕藏木香消痞丸因憂氣鬱結中脘腹皮微痛心下痞滿不思飲食正所謂治氣不效須如此藥加當歸紅花方有效也木香乾薑各半兩甘草炙半夏各一兩陳皮歸尾各三錢柴胡四錢紅花五分上為末酒糊丸小豆大每服七十丸韭湯下東垣加味補中益氣湯治內傷心下痞方見虛損內傷門脈緩有痰而痞加半夏黃連脈弦四肢滿硬便難而心下痞加柴胡黃連甘草大便祕燥加黃連桃仁少加大黃當歸身心下痞控悶者加白芍黃連心下痞腹脹加五味子白芍砂仁如天寒少加乾薑或桂心下痞中寒者加附子黃連心下痞嘔逆者加黃連生薑陳皮如天寒加黃連少入丁香藿香能食而心下痞加黃連五分枳實三錢如不能食心下痞不可加只依本方服易簡諸方斗門方治胸膈壅滯去痰開胃酒食所傷用半夏為末以薑汁和作餅子用濕紙包於慢火中煨令香熟水二盞用餅子一塊入鹽五分煎一盞溫服經驗方治涼物過飽不消遂成痞嗝用馬牙硝一兩淬之吳茱萸半升陳者煮取濃汁投硝乘熱服良久未轉更進一服立愈千金方治胸痹氣壅滿心膈不利枳實二兩麩炒為末無時以清粥飲調下二錢唐韋迪獨行方治卒得胸痛瘥而復作者用薤根五斤搗絞汁飲之立止
