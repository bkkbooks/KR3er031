body:
  text: 卷之四十七虛煩門病機虛煩敘論經曰因於暑汗煩則喘喝大聲也靜則多言體若燔炭汗出而散五臟生成篇曰心煩頭痛病在膈中過在手巨陽少陰脈要精微篇曰諸浮不躁者皆在陽則為熱其有躁者在手言熱在手之三陽經玉機真藏篇曰心脈者南方火其氣來不盛去反盛此謂不及病在中則令人煩心上見咳唾下為氣泄又曰數則煩心虛煩病多是正氣不足陰虛火熾得之神珍云虛煩之病非止一端究其大概多是體虛者也攝養有乖榮衛不調使陰陽二氣有所偏勝或陰虛而陽盛或陰盛而陽虛經云陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒此固不易之論而今虛煩之病多是陰虛生內熱所致如虛勞之人腎水有虧心火內蒸其煩必躁吐瀉之後津液枯竭煩而有渴惟傷寒及大病後多有虛煩之證卻無霍亂臨病之際又宜審之治法宜用平和之藥清心實下不可峻用補藥又若婦人産後去血過多虛煩發熱又當以各類求之煩躁甚者內外不安反覆顛倒謂之懊憹詳見傷寒門脈候脈數為煩心大病後煩躁甚脈急數者不治脈沉而急者為虛煩左手脈澀為血少心煩脈浮大而緩者生傷寒脈最詳備煩躁者審之治法治煩躁宜用清淡藥煩躁病有陰有陽有虛有實若峻藥治之則恐助其邪若遽瀉之則反虛其本所以宜乎清平淡滲如五苓散竹葉湯之類則無顛覆之凶而有中行之吉用此而不奏效者又當察其始病與既病先後之虛實而治之效斯得矣煩躁甚者究其已病未病之源治煩躁病用清藥不效必究其未病者多是邪氣相干要分表裡汗下若病後心煩多是虛證宜人參竹茹湯酸棗仁湯之屬已兼吐汗下者有補陽益陰退陰復陽之法當於傷寒門煩躁證內求之萬無一失發熱下利手足厥逆躁而不得臥者五苓散治之不效者必死虛煩證多因病後得須憑脈處治虛煩之證雖屬於腎水竭而心火盛或因寒邪據體或因誤治無端或因煩勞過損或因久病不愈其類不一要皆耗傷真元而虛火炎上故煩熱發於心而躁熱根於腎煩者躁所起躁者煩所生厥冷脈沉反生煩渴者何也內傷元氣外感寒邪故寒邪入臟伏於至陰邪氣相持從善所化津液枯涸故六脈沉遲口苦舌乾反生煩渴治宜乾薑附子之劑復陰回陽苟榮衛失調亢煩復起有症相似而脈沉數大便祕結治宜三承氣湯下之如大患之後厥冷煩躁過甚六脈無應醫難治之有表邪失治變生虛煩何也先因寒邪所折汗未能周妄行攻治致其蓄熱上升而成煩渴之證宜以沖和湯和肌開表次用消煩之劑隨證治之有汗下後大煩渴何也表虛為寒所折本當和解反過汗下故六脈洪數表裡俱熱而不惡寒腠理開疏汗泄不已津液衰少煩渴過甚宜以竹葉石膏湯或梔子升麻湯人參白虎湯選而用之有大熱反惡寒煩渴不已發汗無效治熱無功何也寒邪入臟陰不達陽寒蓄於內熱邪在腑陽不和陰熱鬱於外故陽元則生熱甚則生煩宜以陰旦湯通和表裡次用消渴之劑隨證治之虛勞者寒邪達入誤治諸經真元耗散氣血俱虛身熱煩躁神舍失安不能眠臥以梔子豉湯治之寒邪蓄滯於陰陰不越陽上盛下虛身涼無熱手足微溫大便自利而煩渴以竹葉石膏湯去石膏加附子治寒邪發散未盡肺浮身熱欲喜飲水而成積滯故濕熱上升而反見煩渴以豬苓湯先疏導之以止煩渴而和之虛勞者素多飲酒或傷寒邪積熱膀胱謬為汗利亡其津液小便短少大熱煩躁以青龍湯去半夏重加天花粉通和表裡而解煩躁不可投用五苓散之劑治虛煩證有用寒涼之劑治熱愈熱治煩愈煩何也體弱之人內損元氣外感風寒或由汗下過傷則元氣多虛寒邪內鼓虛火上炎六脈洪數浮而無力舉之有餘按之不足是為陽虛若復用寒涼之藥則脾胃受傷而虛者益虛矣宜以獨參湯和平益氣次用人參黃耆湯調下五苓散清利之熱退陽生虛煩息矣藥方通治虛煩劑和劑五苓散治煩熱而渴方見傷寒門和劑辰砂妙香散治心氣不足精神恍惚虛煩少睡方見健忘門三因淡竹茹湯治心虛煩悶頭痛氣短內熱不解心中擾擾及婦人産後心虛驚悸煩悶麥門年去心小麥炒二錢七分半甘草炙一錢人參白茯苓各二錢半半夏制二錢上咀作二服每服水二盞薑三片棗一枚竹茹一塊煎八分食遠服濟生小草湯治虛勞憂思過度遺精白濁虛煩不安小草黃耆當歸酒浸麥門冬去心酸棗仁石斛各一兩人參甘草炙五錢上咀每服四錢水一盞薑五片煎八分不拘時服三因橘皮湯治動氣在下不可發汗發之反無汗心中煩骨節疼痛目眩惡寒會反嘔逆谷不得入宜服此橘皮一兩半甘草人參二錢半竹茹半兩上咀每服四錢薑三片棗一枚水鍾半煎七分空心服三因人參竹茹湯治胃口有熱嘔吐逆虛煩不安人參半夏竹茹各一兩上咀作六劑每劑水一盞半薑三片煎八分溫服醫林酸棗仁湯治霍亂吐下增劇虛勞煩擾奔氣在胸中不得眠或發寒熱頭痛暈悶酸棗仁一兩炒人參桂心各一錢知母茯苓各三錢石膏煅半兩甘草炙二錢上咀每服七錢水二盞薑三片棗一枚煎八分食前服人參竹葉湯治汗下後表裡虛煩不可攻者竹葉人參甘草各一兩半夏二兩石膏麥門冬各五兩上咀每服四錢水盞半薑五片粳米一撮煎七分空心服竹葉麥門冬湯治大病後表裡俱虛內無津液煩渴心躁及諸虛煩熱與傷寒相似但不惡寒身不痛不可汗宜此淡竹茹麥門冬等分上咀每服七錢水二鍾煎八分不枸時服竹葉石膏湯治前證方見傷寒門溫膽湯方見驚悸門治大病後虛煩不得臥直心經虛怯觸事易驚短氣時悸或復自汗並服之竹葉湯治大病後及霍亂吐瀉後虛煩悶內熱不解竹葉人參麥門冬去心半夏制各二錢半甘草炙五分上咀每服四錢水二盞薑五片煎八分食遠服地仙散治諸病後煩熱不安乃虛勞煩躁地骨皮一兩防風五錢甘草二錢上咀作二服每服水二鍾薑五片煎八分食遠服清心蓮子飲治心中蘊熱虛煩方見遺精門黃連阿膠湯治陰虛邪盛熱煩於內不得眠者扶陰散方見傷寒門乾薑附子甘草湯治煩躁脈沉微而不渴者方見傷寒門易簡諸方聖惠方治夜不得眠酸棗仁半兩炒黃為末酒三合浸汁先以粳米二合煮作粥臨熟下棗仁汁更煮三五沸空心食之效一方治膽虛睡臥不安心中驚悸用棗仁一兩炒香熟搗細為末每服二錢竹葉湯調下不枸時服一方治發汗不得心中大煩骨節疼痛嘔逆谷不入用人參少許陳皮二錢半甘草竹茹各一錢加薑棗水煎空心服一方治男婦虛煩不眠用竹瀝一升水四升茯苓三兩同煎取二升分三服一方治大病後晝夜虛煩不睡心中多驚用酸棗仁榆白皮等分為末煎汁溫服一方治心煩用白朮末水調五分七服一方治煩不睡用榆白皮陰乾為末每日朝夜用水五合末三錢煎如膏服兼治齁五淋肘後方從早夜連時不得眠暮以新布火灸以尉目並蒸大豆更番囊盛枕枕冷後更易熱終夜常枕熱立愈食醫心鏡治心中煩悶此能益氣力止渴苦筍熟煮任意食之又苦竹筍煮食治消渴利水道下氣理風熱腳氣取蒸熟食之
