body:
  text: 卷之二十七咳逆門一名厄逆病機咳逆敘論內經曰諸逆衝上皆屬於火又云歲金太過咳逆金鬱之發咳逆少陰二氣咳逆金匱治咳逆皆指肺金及火為病也千金方云咳逆上氣者為病肺脈數數者是心火刑于肺金也格致餘論云咳逆者俗謂之厄逆是也厄逆病即氣逆自臍下直上出於口而作聲之名也書曰火炎上東垣謂火與元氣不兩立又謂為元氣之賊是也古方悉以胃弱言之而不及火以丁香柿蒂竹茹陳皮等劑治之未審孰為降火孰為補虛況人之陰氣依胃為養胃土傷損則木氣乘之此則土敗木賊也陰為火所乘不得內守木挾火直衝清道而上言胃弱者陰弱之也虛之甚也咳逆厄逆自有所別咳逆乃乾咳之漸進無痰有聲連連不絶其氣自丹田而逆上出於咽喉如有所擊逆而然也亦有咳聲出咽復有還聲吸入咽內此所以為咳逆證也厄逆者即下文云入聲是也有咳厄兼聲擊發連續千萬之聲而不已者服藥不效即用吐法吐出痰涎立已咳厄與噦證不同難知云夫咳逆證活人書斷為噦逆其説似是而實非也蓋噦者乾嘔也若有物直出則為吐嘔物旋出則為嘔無物出則為噦咳逆者則水漬於肺而心痞或連續不已而氣逆或喜笑過多而氣噎或咽飲錯喉而氣搶或急食乾物而氣塞皆能作咳逆之聲連續不絶俗謂之厄忒是也大抵咳逆者不順之義厄忒者差錯之義二者皆氣不得下為火熱托之而上至咽喉噎而止也人或以紙捻鼻嚏之而止或詐冤盜賊因恐而止或鼻熱聞食香調氣而止皆抑之駭之而使氣下也若噦者出聲也噦出其氣噦聲盡然後吸吐噦門中詳言矣厄逆者入聲也氣逆入喉逆聲盡然後呼也出入呼吸其大不同嘔穢者本於胃厄逆者本於肺何難辨哉咳逆非噦故不從寒屬火者多活人書云咳逆仲景所謂噦是也噦為胃寒所生傷寒本虛攻其熱必噦又云傷寒大吐大下之極虛後汗出者因得噦所以然者胃氣虛寒故也宜橘皮乾薑湯羌活附子湯半夏生薑湯退陰散之屬主之此仲景治噦之方也活人書誤以咳為噦故以熱作寒治仲景之言噦非以為咳逆之謂也咳逆從熱而噦從寒活人以咳逆為噦夫安得不用熱藥蓋辨證一差故其用藥必反若非難知力辨其失後學將孰從而知之咳逆噦有手足經標本之分難知云活人書以咳逆為噦謂若可下之宜調胃承氣湯是因邪氣在胃故斷為噦是則然矣抑不思咳逆是足陽明失下傳手太陰活人書言其火之本不言其火之標炎上至極高之分而咳逆也合而觀之噦與咳逆同一熱也分而言之噦為本為膽為胃為中咳逆為標為心為肺為上若標因應見上當其標不必名噦噦不言作噦使後人只見膽胃本而不見心肺標也凡傷寒熱病陽明實過期而失下清氣不得升濁氣不得降以致氣不宣通而發厄者甚多或因飲食太多填塞胸中而氣不得升降者或有痰閉於上火起於下而氣不能伸越者不可不審若此者皆實證也宜詳辨而施治之脈候右關脈弦者木乘土位難治尺脈大為陰火衝上脈微而遲者為寒肺脈散者死脈代者死脈結或促或微可治脈浮而緩者易治弦急而按之不鼓者難治治法治咳逆宜降火順氣為先咳逆證古方多作胃寒故用丁香柿蒂薑附熱劑此亦一偏也咳逆有虛有實有火今其氣自下衝上而作聲非氣而何大抵傷寒雜證汗吐下後過服涼劑胃氣虛寒者或亦有之惟此可從溫補亦不宜用熱劑除此之外就因病後必是發熱失於汗下熱鬱既久以致陰虛雖汗下之亦失其時致火亢極故雖退熱之後尚有火伏陰中而承胃虛沖上連聲逆吸而為咳厄之證也竹茹麥門冬橘皮之類便祕以承氣湯下之治咳逆甚者吐法速效凡有忍氣鬱結積怒之人並不得行其志者多有咳逆之證藥以降火清痰順氣不效者必須吐法以人參蘆煎湯入煨鹽少許飲之少頃探吐膠固痰涎其咳立已實者病傷寒失下大便祕結而咳逆速以寒劑下之若因飲食過傷或因痰飲停宿或因暴怒氣逆而得此證皆為形氣俱實用子和湧法極效人參蘆尤佳咳逆要審有餘不足如丹溪治一老人患滯下後發咳逆用參朮湯下大補丸而愈又治一女子怒後作厄用人參蘆吐之而愈易老云咳逆者火熱奔急上行而肺金不納便祕者大承氣湯下之便軟者瀉心湯主之吐利之後作厄者生薑半夏橘皮竹茹之類虛弱者加人參白朮脈微遲者加薑桂丁香柿蒂無故偶然作厄此緣氣逆宜小半夏茯苓加枳實湯便祕者承氣湯或用蘿蔔子湯調木香調氣散服作厄自利者以滑石甘草黃柏芍藥參朮陳皮竹瀝內傷厄逆用補中益氣湯加丁香痰厄用二陳加枇杷葉薑汁製服之傷寒厄逆舌強短者桃仁承氣湯下之治驗子和吐武篇云凡病在上者皆宜吐然自胸以上大滿大實病如膠漆微湯微散皆兒戲也若非吐法病安能除曾見病之在上者諸醫用藥盡其技而不效余以湧劑少少用之輒獲微效可見吐法必可用於上宜乎其效之速也治一婦人頭重壯熱面紅寒熱往來乾嘔咳逆胸脅痛不能轉側耳鳴食不下先以湧瀉復服益元散加青黛薄荷末調二三服前證俱減戴人診之曰此病常欲痛哭為快婦曰然常有此不知何謂戴人曰少陽相火凌爍肺金金受火制屈無所告肺主悲故欲痛哭而為快也再加歸芍黃連解毒湯數劑全瘥丹溪治一女子性躁味厚暑月因大怒而咳逆發舉身跳動神昏視其形氣俱實曰膈上有痰怒氣連郁痰熱相搏氣不得降非吐不可以人參蘆煎飲大吐頑痰數碗昏睡一日而安人參入手太陰補陽中之陰蘆則反是大瀉太陰之陽女子暴怒氣上肝主怒肺主氣怒則氣逆肝木乘火侮肺故咳逆而神昏今痰盡氣降火息金氣復位胃氣得和而解藥方治咳逆清涼劑橘皮竹茹湯治吐利後胃虛咳逆膈熱者橘皮去白竹茹人參各錢半甘草炙六分水盞半薑五片棗一枚煎八分服小半夏茯苓湯治氣逆而厄大承氣湯治便祕厄逆小柴胡湯加柿蒂治傷寒發熱厄逆以上方並見是寒門麥門冬竹茹湯治胃熱多渴咳逆嘔噦不進食麥門冬竹茹陳皮半夏人參白茯苓各一錢枇杷葉四個去毛炙甘草五分水盞半薑五片煎八分食遠服正瀉心湯治咳逆大便軟黃連解毒湯益元散加青黛薄荷治咳逆作渴小便不利方並見積熱門咳逆溫熱劑嚴氏柿蒂散治胃虛寒厄柿蒂丁香各二錢水盞半薑五片煎八分不拘時服半夏生薑湯治咳逆嘔噦欲死半夏半兩生薑一兩水二盞煎八分作二服橘皮乾薑湯治咳逆不止橘皮通草各一錢乾薑炮肉桂五分人參甘草炙三分水盞半煎八分服三因丁香散治咳逆丁香柿蒂各一錢甘草炙良薑各五分上為細末每服二錢熱湯調不拘時服木香調氣散治氣逆而厄方見氣門理中湯治胃中厄逆方見傷寒門人參白朮湯方見消渴門大補丸方見虛損門羌活附子湯嚴氏治吐利後厄逆四肢逆冷二便清利脈沉而遲方見傷寒門良方丁香柿蒂散治吐利及病後胃中虛寒咳逆至七八聲相連收氣不回者難治丁香柿蒂各五分人參半夏橘皮茯苓各一錢生薑二錢良薑甘草各五分水二盞煎八分乘熱頓服良方丁香湯治咳逆嘔噦丁香柿蒂青皮陳皮各一錢水盞半薑五片煎七分服寶鑑炙甘草湯治中氣虛而厄逆炙甘草五分人參麥門冬各一錢生地黃阿膠各七分生薑五片麻子仁一錢桂枝五分大棗三枚水二盞煎八分服吐劑稀涎散治痰涎膠固喉中咳逆不已半夏十四枚豬牙皂角炙上水盞半薑五片煎七分溫服不能飲者灌之須臾探吐祕方青白散吐咳逆不已青黛白礬烏梅肉焙各等分上為末每服二錢齏湯調服先飲齏湯一杯次服藥探吐人參蘆湯治虛人咳逆吐痰者用此參蘆三錢水一盞煎五七沸溫飲之探吐倉鹽湯治咳逆並一切痰證倉卒用之最妙倉鹽一兩用濕草紙裹煨紅取出用上以河水二碗砂鍋入煨鹽煎五七沸放溫頓飲之少頃探吐易簡諸方一方治咳逆不止用柿蒂十五枚白鹽梅半個水一盞煎六分不拘時溫服一方治寒厄嘔噦用吳茱萸泡過青橘皮去白各二錢水一盞薑三片煎七分服一方用川椒末麵糊丸梧桐子大每服二十丸白湯送下一方治厄逆久不愈連連四五十聲者用生薑搗汁一合加蜜一匙溫熱服一方用陳皮枳殼各二錢煎服嗅法治咳逆服藥不效者用硫黃乳香等分以酒煎令患人以鼻嗅之效一方用雄黃一味煎酒嗅灸法兩乳穴治咳逆立止取穴法婦人以乳頭垂下到處是穴男子及不垂者以乳頭下一指為率與乳頭相直骨間陷處是穴男左女右灸一處艾炷如小麥大火著即咳逆止灸三壯不愈者不可治膻中中脘氣海三里附梅核氣證病機梅核氣者似厄逆而非厄逆系痰氣窒塞於咽喉之間咯之不出咽之不下如梅核之狀故俗謂之梅核氣江南之地比比云之故從而附此蓋濕熱痰氣鬱結而然治法不外開鬱順氣消痰而已治方有用吐法而愈者藥用二陳湯加川芎香附山梔枳殼檳榔厚朴條芩之類仁齋加味二陳湯治梅核氣不能飲食半夏制陳皮茯苓各一錢甘草三分黃芩枳殼蘿蔔子蘇子各八分山梔一錢白豆蔻仁少許上水二盞薑二片煎八分食遠徐徐服祕方法制硝糟湯治梅核氣如神臘糟不下水者一斤朴硝淨者半斤上二味和勻用新瓷罐收貯密封置淨處每遇患者只取二三匙煎湯一盞徐徐飲之自愈不愈再服無不神效嗝噎門病機嗝噎敘論內經曰三陽結謂之嗝又曰少陽所至為嘔湧溢食不下食不得入是有火也巢氏病源云陰陽不和則三焦隔絶三焦隔絶則津液不利故令氣塞不調也是以成噎此由憂思所致憂患則氣結氣結則不宣流使塞而噎噎者噎塞不通也針經云怒氣所至食則氣逆而不下勞氣所至為咽噎喘促思氣所至為中痞三焦閉塞咽嗌不利丹溪曰大率屬血少氣虛有痰血液枯稿則痰涎凝滯咽喉窒塞食不能下或食下則胃脘當心而痛此皆血少痰凝之明驗也嗝噎為神思間病張雞峰云嗝噎是神思間病惟內觀自養者可治此言深中病情嗝病生於血乾丹溪曰嗝噎病屬血虛氣虛有痰有火血屬陰陰主靜內外兩諍則臟腑之火不起而金水二氣滋養陰血自生腸胃津液傳化合宜何噎之有若血乾涸則腸胃枯稿其稿在上近咽之下水飲可行食物難入間或可入入亦不多名曰噎其稿在下與胃為近食雖可入難盡入胃良久復出名曰嗝又曰翻胃所因不同病出一體五嗝五噎總是七情之氣鬱於胃口而成嚴氏云五嗝五噎由喜怒太過七情傷於脾胃鬱而生痰痰與氣搏升而不降飲食不下蓋留於咽嗌者則成五噎結於胸膈者則為五嗝其病令人胸膈痞悶嘔逆噎塞妨礙飲食治法宜調陰陽化痰下氣陰陽平均氣順痰下則病無由作矣嗝噎病多屬火與痰愚謂嗝噎始因酒色過度繼以七情所傷氣血日虧相火漸熾幾何不致於嗝噎夫血液漸虧則火益甚而脾胃皆失其傳化飲食津液凝聚而成痰積於胃口漸而致於妨礙道路食斯不能入而成五嗝噎者是也經曰三陽結謂之嗝三陽者少陽相火也結者凝積而不降散也今夫火積而痰凝是故嗝噎因之而作也故經曰少陽所至為嘔湧噎食不下亦深切也古方多以熱劑治嗝噎不亦誤耶或者以熱治翻胃猶可也殊不知嗝噎之證斷乎無寒或云嗝噎因氣鬱故用辛熱以散之所以不得不用熱劑也豫曰夫氣鬱者氣虛而鬱者也非實也茲因氣虛而鬱熱若用辛熱耗氣則是虛者益虛熱者益熱其何以為救治之道哉病之初作每見悉用辛香燥熱劫之愈而復作愈劫愈深至於危困三因五嗝五噎之分五嗝者思憂喜怒悲也五噎者憂思氣勞食也思嗝則中脘多滿噫則醋心飲食不消大便不利憂嗝則胸中氣結津液不通飲食不下羸瘦短氣喜嗝則五心煩熱口苦生瘡倦甚體痹胸痛引背食少入怒嗝則胸膈逆滿噎塞不通嘔則筋急惡聞食氣悲嗝則心腹脹滿咳嗽氣逆腹中雷鳴繞臍痛不能食憂噎胸中痞悶氣逆時嘔食不下思噎心悸喜忘目視䀮䀮氣噎心下痞噫噦不食胸背痛天陰手足冷不能自溫勞噎氣上嗝胸中塞噎支滿背痛食噎食急多胸中苦痛不得喘息脈候難經曰脈格則吐逆脈經曰緊而滑者吐逆小弱而澀者反胃金匱曰病人肺數數則為熱當消穀引食而反吐者以發其汗今陽微膈氣虛脈乃數數為客熱不能消穀胃中虛冷故也肺弦者虛也胃氣虛寒朝食暮吐變為反胃寒在於上醫反下之今脈反弦故名曰虛趺陽脈浮而澀浮則為虛澀則傷脾脾傷則不磨朝食暮吐暮食朝吐宿穀不化名曰反胃脈緊而澀其病難治沉緩而無力或大而弱為氣虛數而無力或澀小為血虛數而有力為熱寸關沉或伏或大而數滑是痰寸關脈沉而澀是氣緊而滑吐逆千金云寸緊尺澀其人胸滿不能食而吐吐止者為下之故不能食設言未止者此為反胃故尺為微澀也治法治嗝噎當順氣化痰玉機云嗝噎之證皆由氣逆成積自積成痰痰積之久血液俱病以其病在咽膈故以嗝噎名病雖有五嗝五噎之分其為治之理則一嚴氏為治氣痰之説亦治其本之道也夫世多以香燥之藥開胃助脾故有可愈是則治其標而已氣與痰也若之何哉治嗝噎無用燥熱藥嗝噎多因飲食不節痰飲停滯或因七情過用脾胃內虛而古方不察病因悉指為寒用辛燥大熱之藥治之七情之火反有所熾脾胃之陰反有所耗是以藥助病邪日以深痼治此疾也咽嗌閉塞胸膈痞悶此屬氣滯然有服耗氣藥過多中氣不運而致者當補氣而自運大便結燥如羊糞此屬血虛若服通劑過多血液耗竭而愈結法當補血有因火逆上食不得入關脈洪大有力而數者為痰飲阻滯而脈結澀者當清痰退熱其火自降亦有脾胃陽大衰脈沉細而寒者當以辛熱之藥溫其氣仍以益陰之藥養其血斯故合兩全而治之審矣凡食下有礙覺屈曲而下微作痛此必有死血有痰然也宜竹瀝薑汁入藥服張子和治膈上有痰者先以瓜蒂吐之後用大黃皂角黑醜朴硝等分為末粥丸服有因咽塞不寬快項背轉側不便似有嗝噎之證飲食不下先嘔心痛心痛未發一身盡黃先以川芎桔梗山梔細茶薑汁齏汁吃吐痰一二碗後用導痰湯加羌活黃芩紅花人壯可服治嗝噎當潤養津血為主降火散結童便韭汁竹瀝薑汁牛羊乳氣虛入四君子血虛入四物有熱入解毒有痰入二陳切忌香燥之藥宜薄滋味子和云小腸熱結則不善滲大腸熱結則後不通膀胱熱結則津液涸三陽既結則前後閉必反而上行此所以噎食不下縱下而復出也宜先潤養因而治下或痰涎上阻輕用苦酸微微湧之不治證嗝噎證年高者不可治以其氣血俱虛故也余見未滿六旬按法治之而守戒慎者亦愈惟不忌厚味並房勞憂思者必危糞如羊糞者不可治大腸無血故也吐痰如蟹沫者不可治戴氏曰氣血俱虛者則口中多唾沫但見沫大出者必死不治腹中㽱嘈痛如刀割者不治治噎大法用人參黃耆以補元氣御米粟米解毒實胃竹瀝薑汁以清痰散結牛羊乳韭汁以養血潤液蜜汁當歸以潤燥用此數者為主治其餘因證而增損之無不愈者丹溪云凡治嗝噎反胃悉當用二陳湯加薑汁竹瀝童便韭汁之類為主愚謂半夏用之豁痰其性甚燥嗝噎證多因燥氣所成為津液乾稿所致半夏必是痰盛者少少用之無痰不可用嗝噎病肥胖之人鮮有之間病者用二陳加人參白朮之類血虛瘦弱之人用四物合二陳加桃仁紅花韭汁童便牛乳羊乳之類蓋不可缺七情鬱結而成嗝噎二陳合香附撫芎木香檳榔栝蔞砂仁之類嗝噎大便結燥之甚必用大黃乃急則治其標之法也仍用四物湯加桃仁童便韭汁多飲牛羊乳為上策但不可服人乳蓋人乳為飲食厚味烹餌之火及七情之火皆存於中故不可服也飲酒人患嗝噎以二陳加黃連砂仁砂糖驢屎入內服胸膈有熱加土炒黃連黃芩桔梗栝蔞之類朝食暮吐暮食朝吐或食下須臾即吐此為反胃所謂胃可容而脾不能傳送故也或大小腸祕結不通食返而上奔也二陳加桃仁酒蒸大黃以潤之脾不磨者加神麯砂仁麥芽之類以助消導丹溪治一人嗝噎照常法服藥每日仍飲牛乳中加薑汁韭汁日三四次或口乾與甘蔗汁少許而愈又治一人服金石藥而益甚以御米竹瀝作粥送下而不吐復以長流水煮粥少加竹瀝服以四物湯加陳皮益血順氣一人咽膈間常覺有物閉悶飲食妨礙脈澀稍沉形色如常乃飲酒所致以韭汁每服半盞日三服至二升愈一人不能頓食惟頻頓細食一日忽咽膈壅塞大便結燥以四物湯加白朮陳皮桃仁十二粒研煎沸飲之令多食諸血以助藥力至五十帖便潤七十帖而食進不百帖全愈藥方嚴氏五嗝散治五嗝五噎人參半夏桔梗白朮白豆蔻木香沉香乾薑杵頭粳蓽澄茄甘草各三分枇杷葉五個炙去毛上水二盞薑七片煎七分服生薑汁煎治噎食不下咽喉壅塞胸膈煩悶生薑汁白蜜牛酥各五兩人參百合各二兩上藥入銅銚中以慢火熬膏不拘時每用一匙用人參百合湯調下或咽下和劑五嗝寬中散治七情四氣傷於脾胃以致陰陽不和遂成嗝噎一切氣逆並治青皮陳皮各半兩丁香木香砂仁炒白豆蔻各一錢厚朴薑炒香附子童便浸炒甘草各六錢上為細末每服二錢薑鹽湯點服參茯膏治五嗝五噎嘔逆食不下人參陳皮白茯苓生地黃麥門冬五味以水一斗煎成膏入丁香沉香末各二錢蜜半碗薑汁一杯和勻每服二匙粟米飲下有痰加竹瀝沉香散治五嗝五噎嘔逆飲食不進兩服順氣清痰寬中進食沉香三分磨茯苓木通白朮土炒青皮去白陳皮去白大腹皮洗當歸芍藥各六分木香磨紫蘇檳榔白芷甘草炙枳殼各四分水盞半薑五片棗一枚煎七分溫服人參豆蔻湯治嗝噎寬中順氣人參白豆蔻各五分白朮陳皮去白半夏曲各八分藿香丁香各三分厚朴薑炒蘿蔔子炒研當歸各八分甘草炙石菖蒲各五分水盞半薑三片粟米一撮煎七分服春雪膏治五嗝五噎豁痰開結真緑豆粉一斤真薄荷葉六兩同豆粉和勻安於密甑中上以瓦盆蓋密勿令泄氣蒸一時待冷取下以豆粉風辣為佳沉香五錢另研白硼砂五錢冰片五分砂仁五錢另研真柿霜四兩上為極細末不時舌上舐服若然礙滯又服薑蜜湯白蜜煉熟半斤薑汁一合竹瀝一碗和蜜熬二三沸上以瓷瓶收貯窨土地上不時調白水細呷之緑雲散治嗝噎化痰降氣人參當歸天門冬陳皮甘草昆布紫蘇子蘿蔔子丁香各等分水五升煎膏五合入煉蜜五合和勻加青黛四兩和成劑不成劑再加柿霜搜和丸彈子大金箔硃砂各半為衣日服金箔丸夜服硃砂丸不時噙化喉中不清服薑蜜湯枇杷葉煎治五噎立效枇杷葉拭去毛炙陳皮去白各三錢生薑半兩水盞半煎七分作二次溫服五噎散治胸膈痞悶諸氣結聚脅肋脹滿痰逆噁心不進飲食枳殼麩炒青皮大腹皮半夏曲丁香南星制乾薑炮麥芽炒草果白朮各一錢甘草炙五分水盞半薑五片煎七分不拘時服栝蔞實丸治胸膈痞滿而痛喘急妨悶栝蔞實另研枳殼麩炒半夏制桔梗炒各一兩上為末薑汁煮麵糊丸梧桐子大每服五十丸食後淡薑湯下嘉禾散治脾胃不和胸膈痞悶氣逆生痰不進飲食五嗝五噎白茯苓砂仁薏苡仁炒枇杷葉拭去毛薑汁炙桑白皮炒沉香磨汁五味子各五分木香磨汁青皮谷蘖炒藿香杜仲薑汁炒斷絲隨風子石斛酒炒大腹皮洗陳皮半夏曲炒神麯炒檳榔各三分白豆蔻丁香人參白朮甘草炙各五分上水二盞薑三片棗一枚煎八分食遠服五噎入柿幹一個嗝氣吐逆入薤白三寸棗五枚同煎降氣潤下劑發明人參利膈丸治胸中不利痰逆喘滿利脾胃壅滯治嗝噎聖藥人參當歸藿香各一兩木香檳榔各七錢枳實炒甘草各八錢厚朴薑炒大黃酒浸各二兩上為末滴水丸如梧桐子大溫水送下三十丸昆布丸治嗝噎妨塞飲食不下大便祕結昆布洗麥門冬天門冬訶子各兩半木通川大黃微炒川朴硝郁李仁泡去皮微炒桂心百合各一兩羚羊角鎊杏仁泡去皮尖麩炒黑紫蘇子微炒射干各半兩柴胡陳皮去白檳榔各一錢上為末煉蜜和勻搗五百杵梧桐子大每服三十丸不拘時熱酒下夜飯後用綿裹彈子大一丸噙化利膈化痰丸滾痰丸治嗝噎大便結燥二方並見痰門調胃承氣湯治膈逆不大便方見傷寒門化滯丸木香檳榔丸治宿食不化胸膈妨悶噎塞不通一方見積聚門良方導氣散治膈氣噎塞不入飲食虎額王字骨醋炙蓽茇炒人參羚羊角鎊厚朴薑製各等分上為細末每服二錢食後水調令睡服潤腸膏治嗝噎大便結燥飲食良久復出威靈仙鮮者搗汁四兩生薑同上真麻油二兩白砂蜜四兩煎沸去沫上入砂鍋攪勻慢火煎如餳收貯時時以匙挑服之一料未愈再服一料決效奪命回生丹治五嗝五噎翻胃嘔吐不進飲食此藥多有神效丁香川芎白薑炮南木香肉桂人參神麯炒各半兩訶子七枚取肉砂仁二十一粒莪朮粉草炙各七錢大草果二枚取仁巴豆十四枚去殼心膜不去油冷水浸一宿另研如膏留鉢中上日乾為末入乳鉢內和勻巴豆膏再篩過入丸盒內以油紙蓋盒口卻用黃蠟和松脂熔如法封固盒縫每以十二月上辰日或初八黃道生氣天月二德日修合於高地爽處埋土地三尺深至次年六月中伏節擇吉日取向當風處攤去濕氣以不漏丸瓶收貯密封壯人每服半錢臨睡沸湯調半盞頓服仰臥片時徐以溫白粥壓下若弱人只服一字二三服即能進食止嘔吐續以寬中散丁沉透膈湯橘皮煎丸厚朴煎丸等兼進助胃氣忌生冷魚腥黏膩硬物一兩月全愈孕婦不可服紫蘇飲子治嗝噎上氣咳逆因怒未定便夾氣飲食或食飲畢便怒以致食與氣相逆遂成嗝噎之候真蘇子炒訶子煨蘿蔔子微炒杏仁泡去皮尖麩炒木香五分人參各一錢青皮甘草炙各二錢上咀分二服每服水二盞薑三片煎七分服蘇青丸治嗝噎反胃皆效蘇合丸青州白丸子二藥同和薑汁為丸梧桐子大每服二十丸淡薑湯送下選要透膈湯治脾胃不和中脘氣滯胸膈滿悶噎塞不通噫氣吞酸脅肋刺脹嘔逆痰涎飲食不下並皆治之木香白豆蔻砂仁檳榔枳殼麩炒厚朴薑炒半夏制青皮陳皮去白大黃酒蒸朴硝甘草炙各七分上水盞半薑三片棗一枚煎七分食遠服沉香開嗝散治五嗝五噎痞滿嘔吐寒滯心腹刺痛脹滿沉香磨三稜莪朮白豆蔻蓽澄茄砂仁炒草果益智仁白薑丁香為末人參各七錢丁皮五錢木香磨茯苓香附子炒藿香半夏曲青皮陳皮各一兩甘草炙一兩二錢半上為粗末每服五錢水盞半薑三片棗二枚煎七分食遠服十嗝散治十般嗝氣風冷氣熱痰食水憂思喜嗝人參茯苓官桂枳殼麩炒神麯炒麥芽乾薑炮訶子煨三稜炮莪朮炮陳皮甘草白朮各一兩厚朴薑炒檳榔木香磨各半兩上為細末每服二錢入鹽少許白湯調服如脾胃不和腹脹滿悶水一盞薑五片棗一枚鹽少許煎七分服正傳大力奪命丸治嗝噎不下食及翻胃等證杵頭粳牛轉草各半斤糯米一升上為細末取黃母牛口中涎沫為丸如龍眼大入鍋中慢火煮熟食之加砂糖一二兩尤佳直指枳朮二陳湯治痰氣食嗝翻胃嘈雜等證白朮土炒一錢黑枳實麩炒陳皮去白各八分茯苓香附子童便浸炒半夏制黃連薑汁炒檳榔白豆蔻各五分青皮吳茱萸泡甘草各三分水盞半薑三片棗一枚煎八分食遠服氣虛者加人參黃耆血虛者加當歸地黃有郁加神麯撫芎御藥五膈丸治流飲停膈不消胸膈痞塞食不能下木香一兩陳皮二兩大黃酒蒸牽牛各一兩上為末煉蜜丸梧桐子大每服四五十丸溫水送下通中散治五嗝五噎胸中不利臟腑壅滯牽牛微炒一兩半木香一兩檳榔三錢乾薑炮桂心各一錢上為末每服二錢以熱酒調服空心服後續飲熱茶一二鍾投之得利二三行下惡物是效秦川剪紅丸治嗝噎變成翻胃服此吐去瘀血及下血效雄黃另研木香各五錢檳榔三稜炮莪朮陳皮貫衆去毛乾漆各一兩炒煙盡大黃二兩半以上為末麵糊丸梧桐子大每服五十丸白湯下芫花一兩酷煮巴豆二十粒去油甘遂一兩麵包煨以上三味為細末麵糊丸梧桐子大候乾每丸用薄紅羅包住絲扎系定剪斷用前藥五十丸內加一丸五更同服白湯送下婦人醋湯下衛生易簡方一方治嗝氣用大鯽魚一尾自死者可用活者不用割腹去腸雜留鱗用大蒜去淨皮薄切片填入魚腹中仍合定為一尾用濕紙包定以麻皮縛之卻用熟黃泥厚固干以粳火煨熟取出去鱗刺骨將肉入局方平胃散末搗和為丸梧桐子大曬乾收貯勿今泄氣每服三十丸空心米飲下一方治胸中氣噎食不得下喉中如有肉塊用昆布一兩洗去鹹水小麥二合水三盞煎熟小麥爛去渣不拘時每服一小盞仍取淨昆布不住口含之二三片津咽下有效一方治胸膈氣滯食噎不下以手中布包杵頭粳時時拭齒刮舂米杵頭細粳煎湯呷之亦可一方治男婦嗝噎極效用雞嗉子兩個帶宿食用紙裹外用黃泥固濟炭火燒煙盡為度取出去泥嗉子內宿食不可動木香丁香沉香各一錢共為細末用大棗煮熟去皮核研和丸梧桐子大每服三十丸米飲下一方用馬瓠兒燒存性陳米湯送下即野田瓜子北方多有之一方用吳茱萸黃連貝母栝蔞子牛轉草作丸服一方黃連三錢薑汁炒山楂肉二錢保和丸二錢同為末糊丸麻子大胭脂胚為衣人參湯入竹瀝下五十丸一方用隔年炊飯干不拘多少以急流順水煎煮糜爛取濃汁時時飲之待能食後復用調脾胃之藥金匱玉函方治噎心膈氣滯煩悶吐逆不下蘆根五兩銼水三盞煎二盞不拘時溫服時時服之尤效外臺祕要方用羚羊角屑一味不拘多少為末米飲調服方寸匕以角磨水亦佳一方用白豬肚連食烘乾為末每服二三錢酒調下一方治噎食用丁香一錢煉滷梅取肉以下香末為膏噙化愈一方治嗝氣噎食服藥無效巧婦窠燒灰為末每服三錢酒調下一窠可治一人甚驗槿花散用千葉白槿花陰乾為末老米湯調送一錢三五口不轉再將飲調藥送之灸法膏肓二穴在背第四椎兩旁各開三寸是穴灸至百壯以多為佳灸時手搭膊上膻中一穴在兩乳間陷中仰臥取之灸七壯禁針中脘一穴在臍上四寸灸七壯三里二穴在膝下三寸䯒骨外廉兩筋間灸三七壯膈俞二穴在背七椎下各開一寸半灸七壯心俞二穴在背五椎下各二寸半灸七壯為度天府二穴在腋下三寸灸七壯乳根一穴在乳頭下一寸六分灸七壯
