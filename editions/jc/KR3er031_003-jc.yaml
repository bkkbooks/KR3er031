body:
  text: 卷之三翼醫通考上大明會典醫政官制太醫院國初置醫學提舉司後改太醫監又改太醫院設院使同知及典簿等官職專診視疾病修合藥餌等事洪武十四年定為五品等衙門更設太醫院令丞吏目及御醫始依文職授散官二十二年復改院令為院使丞為院判其屬置惠民藥局又於本衙門置生藥庫各設大使副使事例凡本院習業分十三科自御醫以下與醫土醫生各專一科凡本院院使院判御醫日於內府御藥房分兩班輪直供事凡醫士俱以父祖世業代補或令在外訪保醫官醫士以充其精通醫術者本院奏進御藥房供事凡收受四方進貢及諸蓄上用藥品俱於內府收掌供用藥餌國初令醫官就內局修制本院官診視御脈御醫參看校同會內臣就內局合藥將藥貼連名封記具本開瀉本方藥性治證之法於日用之下醫官內臣書名以進置簿歷用中書省印合縫進藥奏本既具隨即附簿年月下書名內臣收掌以憑稽考烹調御藥本院官與內臣監視每二服合為一服候熟分為二器其一器御醫先嚐次院判次內臣其一器進御凡各王府差人請醫視疾本院奉旨差官或醫士往視若文武大臣及外夷酋長有疾亦奉旨往視其治療可否皆具本覆奏或軍中缺醫亦憑總兵巡撫官奏請撥用凡醫家子弟舊例選入本院教習醫術弘治五年奏復行之推堪任教師者二三人教習每季考試三年或五年堂上官一員同醫官二員考試通曉本科者收充醫士食糧當差未通曉者聽令習學一年再試三試不中者黜之若五年考試成材多其教師奏請量加升授凡醫士醫生洪武間各有額數其後增減不一俱於本院修合藥餌若醫官醫士仍差委各處用藥東直房醫士三十六名安樂堂醫官三員醫士三十六名司禮監醫士二名書堂醫士六名乾明門醫士三名浣衣局醫士二名天壽山醫士二名松林靈臺醫士三名團營醫官一員醫士十二名五軍營醫士三名三千營醫士四名錦衣衛醫士三名神機營醫官一員醫士四名府軍前衛醫士三名惠民局醫士三名會同館醫士三名大慈恩寺醫士三名宣府醫士一名紫荊關醫士二名居庸關醫士一名龍門千戶所醫士一名萬全右衛醫士一名懷來衛醫士一名山海關醫士一名廣寧衛醫士二名寺子峪醫士一名開原醫士一名永寧衛醫士一名獨石醫士一名倒馬關醫士一名白羊口醫士一名凡醫士食糧月支七斗醫生月支四斗醫官先年月支二石弘治間照醫士例止支七斗凡各王府缺良醫從本院推舉醫士送吏部選用凡本院取充醫役者洪武以來例免原籍民差弘治二年令御藥房供事者免二丁本院應役者免一丁凡醫官殘疾及年七十以上不堪應役者放免凡天下歲辦藥材俱於出產地方派納永樂以後例共五萬五千四百七十四斤成化以來其數漸增今共計一十六萬三千五百五十七斤有零蜈蚣蛇六十四條蛤蚧天雄二十一對蟲蛀木瓜二十個浙江布政司三萬一千八百五十一斤七兩金箔一百八貼銀箔七十二貼江西布政司七千五百五十六斤一十二兩湖廣布政司四千八百四十九斤七兩七錢二分六釐白花蛇九條烏蛇十條福建布政司二千七百六十五斤一兩九錢一分四川布政司一萬六千四百二十斤八兩天雄四對廣東布政司九千九百二十九斤三兩四錢蛤蚧一十七對廣西布政司九千七百二十三斤一十兩山西布政司八千九百五十五斤四錢五分山東布政司八千七百三十八斤六兩河南布政司八千六百四十九斤四兩陝西布政司一萬一千七百四十四斤七兩遼東都司八百斤應天府三千六百五十八斤八兩鎮江府三千七百一十七斤六兩六錢赤頭蜈蚣四十五條蘇州府一萬八千七十九斤三兩松江府一千四百四十斤徽州府九百四十九斤八兩寧國府四千九百九十四斤一十兩二錢烏爛蟲蛀下木瓜二十個太平府一百八十一斤七兩六錢池州府六百一十三斤鳳陽府二千七斤揚州府七百四十五斤三兩二錢淮安府三千一百二十七斤八兩廬州府八十五斤一十二兩五錢九分安慶府四百五十八斤廣德州六百三十斤滁州一千五百九十二斤一十一兩二錢五分徐州六十三斤和州二百二十三斤一十四兩永平府二百一十五斤慶州七百斤保安州七百斤大名府一千五十斤河間府二千一百七十七斤保定府五十斤真定府七百六十五斤凡天下解納藥材俱貯本院生藥庫以御醫二員與大使一員辨驗收放禮部仍委官一員監收至年終照例造冊二本一留本院備照一送禮部查考凡藥材如丹砂鹿茸等項先因在外鎮守等官額外進貢沿途害人成化二十三年詔禁止勿進凡軍中馬病本院給與藥餌凡天下府州縣舉到醫士堪任醫官者俱從禮部送本院考試仍委該司官一員會考中者送吏部選用不中者發回原籍為民原保官吏治罪凡本院合用紙札俱令府州縣舉到醫士考中者量納應用後不行成化十八年奏准仍照舊例南京太醫院事例凡本院藥餌俱南京禮部收到湖廣等布政司解來藥製造凡南京各營該用藥餌俱撥醫士隨病供應凡醫士醫生俱以世業子弟習學考選分撥各科凡醫士醫生月糧照北太醫院例神農嘗百草論淮南子云神農嘗百草一日遇七十毒予嘗誦其書每至於此未始不嘆夫孟子所謂盡信書則不如無書夫神農立極之大聖也憫生民之不能以無疾故察夫物性之可以愈疾者以貽後人固不待乎物物必嘗而始知如待必嘗而始知則不足謂之生知之聖也以生知之聖言之則雖不嘗亦可知矣設使其所知果有待乎必嘗則愈疾之功非疾不能以知之其神農眾疾俱備而歷試之乎況穢汙之藥不可嘗者其亦嘗乎且味固可以嘗而知其氣其性其分經主治及畏惡反忌之類亦可以嘗而知乎苟嘗其所可嘗而不嘗其所不可嘗不可嘗者既可知而可嘗者亦不必待乎嘗之而後知矣謂其不嘗不可也謂其悉嘗亦不可也然經於諸藥名下不著氣性等字獨以味字冠之者由藥入口唯味為先故也又藥中雖有玉石蟲獸之類其至眾者惟草為然故遂曰嘗百草耳豈獨嘗草哉夫物之有毒嘗而毒焉有矣其中毒者日必七十乎設以其七十毒偶見於一日而記之則毒之小也固不死而可解毒之大也則死矣孰能解之亦孰能復生之乎先正謂淮南子之書多寓言夫豈不信溯洄集亢則害承乃制論予讀內經六微旨論至於亢則害承乃制喟然嘆曰至矣哉其造化之樞紐乎王太僕發之於前劉河間闡之於後聖人之蘊殆靡遺矣然學者尚不能釋然得不猶有未悉之旨也歟謹按內經帝曰願聞地理之應六節氣位何如岐伯曰顯明之右君火之位也君火之右退行一步相火治之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之復行一步君火治之相火之下水氣承之水位之下土氣承之土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下陰精承之帝曰何也岐伯曰亢則害承乃制制生則化外列盛衰害則敗亂生化大病嘗觀夫陰陽五行之在天地間也高者抑之下者舉之強者折之弱者濟之蓋莫或使然而自不能不然也不如是則高者愈高下者愈下強者愈強弱者愈弱而乖亂之政日以極矣天地豈能位乎雖然高也下也弱與強也亦莫或使然而自不能不然也故易也者造化之不可常也惟其不可常故神化莫能以測莫測故不息也可常則息矣亢則害承乃制者其莫或使然而自不能不然者歟夫太僕河間已發揮者茲不贅及其未悉之旨請推而陳之夫自顯明之右止君火治之十五句言六節所治之位也自相火之下止陰精承之十二句言地理之應乎歲氣也亢則害承乃制二句言抑其過也制生則化止生化大病四句言有制之常與無制之變也承猶隨也然不言隨而曰承者以下言之則有承奉之象故曰承雖謂之承而有防之之義存焉亢者過極也害者害物也制者克勝之也然所承也其不亢則隨之而己故雖承而不見既亢則克勝以平之承斯見矣然而迎之不知其所來跡之不知其所止固若有不可必者然可必者常存杳冥恍惚之中而莫之或欺也河間曰己亢過極則反似勝己之化似也者其可以形質求哉故後篇厥陰所至為風生終為濕少陰所至為熱生終為寒之類其為風生為熱生者亢也其為濕為寒者制也又水發而為雹雪土發而為飄驟之類其水發土發者亢也其雹雪飄驟者制也若然者蓋造化之常不能以無亢亦不能以無制焉耳夫前後二篇所主雖有歲氣運氣之殊然亢則害承乃制之道蓋無往而不然也惟其無往而不然故求之於人則五臟更相平也一臟不平所不勝平之五臟更相平非不亢而防之乎一臟不平所不勝平之非既亢而克勝之乎姑以心火而言其不亢則腎水雖心火之所畏亦不過防之而已一或有亢則起而克勝之餘臟皆然制生則化當作制則生化蓋傳瀉之誤而釋之讀之者不覺求之不通遂並遺四句而弗取殊不知上二句言亢而害害而制耳此四句乃害與制之外之餘意也苟或遺之則無以見經旨之周悉矣制則生化正與下文害則敗亂相對辭理俱順不勞曲說而自通制則生化者言有所制則六氣不至於亢而為平平則萬物生生而變化無窮矣化為生之盛故生先於化也外列盛衰者言六氣分布主治迭為盛衰昭然可見故曰外列盛衰害則敗亂生化大病者言既亢為害而無所制則敗壞乖亂之政作矣敗壞乖亂之政行則其變極矣其災甚矣萬物其有不病乎生化指所生所化言謂萬物也以變極而災甚故曰大病上生化以造化之用言下生化以萬物言以人論之制則生化猶元氣周流滋榮一身凡五臟六腑四肢百骸九竅皆藉焉以為動靜云為之主生化大病猶邪氣恣橫正氣耗散凡五臟六腑四肢百骸九竅舉不能遂其運用之常也或以害為自害或以承為承襲或以生為自無而有化為自有而無或以二生化為一意或以大病為喻或者造化之機息此數者皆非也且夫人之氣也固亦有亢而自制者苟亢而不能自制則湯液針石導引之法以為之助若天地之氣其亢而自制者固復於平亢而不制者其孰助哉雖然造化之道苟變至於極則亦終必自反而復其常矣學者能本之太僕河間而參之此論則造化樞紐之詳亦庶矣乎然張戴人治法心要曰假令水為母木為子當春旺之時冬令猶在即水亢也水亢極則木令不至矣木者繼冬而承水也水既亢則害其所承矣所以木無權也木無權則無以制土土既旺則水乃受制也土者繼長夏之令也水受土製熱克其寒也變而為濕此其權也又如火為母土為子當長夏之時暄令猶在即火亢也火既亢極則濕令不至矣濕者繼夏而承火也火既亢則害其所承矣所以濕無權也濕無權則無以制水水既旺則火乃受制也水者嚴冬之令也火受水制寒克其熱也變而為土濕土斯得其權也斯言也推之愈詳而違經愈遠矣或曰心要者他人成之蓋得於所聞之訛耳溯洄集支秉中曰昔孔子謂詩三百以思無邪一言足以蔽之愚讀亢則害承乃制之論亦欲以一平字蔽之夫天之六氣以平為主平則生生化化將無窮矣故岐伯曰制則生化害則敗亂其意謂亢則過而至於害必承之乃可以制之蓋承之一字如承繼相承又承上之意謂以所可勝者承之於後乃能制之使歸於平也以下文相火之下水氣承之一語推之則其義自明矣四氣所傷論素問生氣通天論篇曰春傷於風邪氣留連乃為洞瀉夏傷於暑秋為痎瘧秋傷於濕上逆而咳發為痿厥冬傷於寒春必病溫陰陽應象論篇曰春傷於風夏生飧泄夏傷於暑秋必痎瘧秋傷於濕冬生咳嗽冬傷於寒春必病溫王啟玄注云風中於表則內應於肝肝氣乘脾故洞泄或飧泄夏暑已甚秋熱復收兩熱相攻則為痎瘧秋濕既勝冬水復旺水濕相得肺氣又衰故乘肺而為咳嗽其發為痿厥者蓋濕氣內攻於臟腑則咳逆外散於筋脈故痿弱也厥謂逆氣也冬寒且凝春陽氣發寒不為釋陽怫於中寒怫相持故為溫病傷寒引素問後篇八句成無己注云當春之時風氣大行春傷於風風氣通於肝肝以春適旺風雖入之不能即發至夏肝衰然後始動風淫末疾則當發於四肢夏以陽氣外盛風不能外發故攻內而為飧泄當秋之時濕氣大行秋傷於濕濕則干於肺肺以秋適旺濕雖入之不能即發至冬肺衰然後濕始動也雨淫腹疾則當發為下痢冬以陽氣內固濕氣不能下行故上逆而為咳嗽當夏之時暑氣大行夏傷於暑夏以陰為主內暑雖入之勢未能動及秋陰出而陽為內主然後暑動搏陰而為痎瘧當冬之時寒氣大行冬傷於寒冬以陽為主內寒雖入之勢未能動及春陽出而陰為內主然後寒動搏陽而為溫病王海藏曰木在時為春在人為肝在天為風當春之時發為溫令反為寒折是三春之月行三冬之令也以是知水太過矣水既太過金肅愈嚴是所勝者乘之而妄行也所勝者乘之則木虛明矣木氣既虛火令不及是所生者受病也故所不勝者侮之是以土乘木之分變而為飧泄也所以病發於夏者以木絕於夏而土旺於夏濕本有下行之體故也不病於春者以春時風雖有傷木實當權故也暑季夏也季夏者濕土也君火持權不與之子暑濕之令不行也濕令不行則土虧矣所勝妄行木氣太過少陽旺也所生者受病則肺金不足所不勝者侮之故水得以乘土之分土者坤也坤在申之分申為相火水入於土則水火相干水火相干則陰陽交急故為寒熱兼木氣終見三焦是少陽相火合也少陽在濕土之分故為寒熱肺金不足灑淅寒熱此皆往來未定之氣也故為痎瘧不發於夏而發於秋者以濕熱在酉之分方得其權故也秋者清肅之氣收斂下行之體也為濕所傷是長夏之氣不與秋令也秋令不及所勝妄行故火得以炎上而剋金心火既刑于肺故肺氣逆而為咳所不勝者侮之木氣上行與火同德動而不息者也所生者受病故腎水虧也長夏已亢三焦之氣盛也命門者三焦之合也故迫腎水上行與脾土濕熱相合為疾因咳而動於脾之濕是以咳嗽有聲有涎不發於秋而發於冬者以其六陰之極肅殺始得其氣故也冬傷於寒者是冬行春令也當寒而溫火勝而水虧矣水既已虧則所勝妄行土有餘也所生受病水不足也所不勝者侮之火太過也火土合德濕熱相助故為溫病不病於冬而病於春者以其寒水居卯之分方得其權大寒之令復行於春腠理開泄少陰不藏房室勞傷辛苦之人陽氣泄於外腎水虧於內當春之月時強木長無以滋生化之源故為溫病耳夫春傷於風夏傷於暑冬傷於寒辭理皆順時字傷令字也獨秋傷於濕說作令字傷時字讀者不可疑也此四說皆母所亢而害其所承之子也若說秋字傷濕字其文與上三句相通其理與法不得相通矣大抵理與法通不必拘於文也或謂春傷於風是人為風所傷非也若是則止當頭痛惡風自汗何以言夏為飧泄哉今言春傷於風即是時傷令也明矣愚按此四傷諸家註釋皆不得經旨者蓋由推求太過故也孟子曰道在邇而求諸遠事在易而求諸難此之謂歟但在輕輕平易說去則經旨自明而無穿鑿之患矣何以言之夫風暑濕寒者天地之四氣也其傷於人豈能於未發之前須知其客於何經絡何臟腑何部分而成何病乎及其既發病然後可以診候始知其客於某經絡某臟腑某部分成某病耳註釋者苟悟因病始知其原之理則於此四傷不勞餘力自迎刃而解矣夫洞泄也痎瘧也咳與痿厥也溫病也皆是因其發動之時形診昭著乃逆推之而知其昔日致病之原為傷風傷暑傷濕傷寒耳非是初受傷之時能預定其今日必為此病也且夫傷於四氣有當時發病者有過時發病者有久而後發病者有過時之久自消散而不成病者何哉蓋由邪氣之傳變聚散不常及正氣之虛實不等故也且以傷風言之其當時而發則為惡風發熱頭痛自汗咳嗽喘促等病其過時與久而發則為癘風熱中寒中偏枯五臟之風等病是則洞泄飧泄者乃過時而發之中之一病耳因洞泄飧泄之病生以形診推之則知其為春傷風藏蓄不散而致此也苟洞泄飧泄之病未生孰能知其已傷風於前將發病於後耶假如過時之久自消散而不成病者人亦能知乎世有太素脈法雖或預知死亡之期然亦是因診之昭著而始能知耳夏傷暑為痎瘧冬傷寒為溫病意亦類此但秋傷濕上逆為咳嗽為痿厥其因病知原則與三者同其令行於時則與三者異夫春之風夏之暑冬之寒皆是本時之令也濕乃長夏之令何於秋言之蓋春夏冬每一時各有三月故其令亦各就其本時而行也若長夏則寄旺於六月之一月耳秋雖亦有三月然長夏之濕令每侵過於秋而行故曰秋傷於濕請陳四氣所傷所病之義夫風者春之令也春感之偶不即病而至夏邪既不散則必為疾其所以為洞泄者風蓋天地浩蕩之氣飛揚鼓舞神速不恆人身有此腸胃之職豈能從容傳化泌別而得其常乎故水穀不及分別而並趨下以泄出也其為飧泄亦類此義暑者夏之令也夏感之偶不即發而至秋又傷於風與寒故為痎瘧也寒者冬之令也冬感之偶不即發而至春其身中之陽雖始為寒邪所郁不得順其漸升之性然亦必欲應時而出故發為溫病也若夫秋傷濕其令行於時之義上文已論之矣前篇所謂上逆而咳發為痿厥不言過時似是當時即發者但既與風暑寒三者並言則此豈得獨為即發者乎然經無明文終亦不敢比同後篇便斷然以為冬發病也雖然濕本長夏之令侵過於秋耳縱使即發亦近於過時而發者矣此當只以秋髮病為論濕從下受故干肺為咳謂之上逆夫肺為諸氣之主今既有病則氣不外運又濕滯經絡故四肢痿弱無力而或厥冷也後篇所謂冬生咳嗽既言過時則與前篇之義頗不同矣夫濕氣久客不散至冬而寒氣大行肺惡寒而或受傷故濕氣得以乘虛上侵於肺發為咳嗽也觀者以此意求之經旨其或著乎或者見素問於病溫痎瘧等間以必言之遂視為一定不易之辭而曰此必然之道嗟乎果可必耶果不可必耶素問之或言必或不言必者蓋不可膠為一定故也經中每有似乎一定不易之論而卻不可以為一定不易者如曰熱厥因醉飽入房而得熱中消中者皆富貴人也新沐中風則為首風如此之類豈一一皆然哉讀者當活法勿拘執也夫王啟玄之注雖未免泥於必字及未得經旨然卻不至太遠也若成無己之說則似太遠矣然猶未至於甚也至王海藏立論則推求過極欲異於人殊不知反穿鑿綴緝乖悖經旨有不可勝言者此先儒所謂如大軍遊騎出太遠而無所歸矣姑摭成無己王海藏之說辨其甚者一二夫無已謂風淫末疾則當發於四肢雨淫腹疾則當發為下痢竊謂則當二字決然之辭也春傷風遇夏之陽氣外盛而不能外發故攻內為飧泄此或若可通矣經曰木發無時倘風不傷於春而傷於他時不遇夏之陽氣外盛將外發乎將內攻乎況風屬陽與夏同氣果欲外出則當隨其散越之勢而出安有不能之理乎且風善行數變其為病非一豈獨能為四肢之疾乎所謂雨淫腹疾之義其不通亦如此至若夏傷暑秋為痎瘧者蓋因暑疾藏於皮膚之內腸胃之外復秋感風故疾作耳觀素問瘧論可見其與夏陰主內秋陽內主暑動搏陰何相干哉冬傷寒春為溫病者蓋因寒毒中人肌膚陽受其鬱至春天地之陽氣外發其人身受郁之陽亦不能不出故病作也觀傷寒論可見其與冬陽主內春陰內主寒動搏陽何相干哉乃若海藏則又以春傷風夏傷暑冬傷寒為時傷令秋傷濕為令傷時故於春傷風謂春行冬令而溫為寒折於夏傷暑謂暑者季夏季夏者濕土君火持權不與子而暑濕令不行於秋傷濕謂秋為濕所傷是長夏之氣不與秋令於冬傷寒謂冬行春令火勝水虧大寒之令復行於春陽氣外泄腎水內虧者病又謂溫病為濕熱相助而成又謂四時傷皆母亢而害所承之子籲何支離破碎徒費辭如此乎夫經中所言傷風傷暑之類甚多皆是以人受風暑等所傷為義未嘗有時傷令令傷時之意也若如海藏所言則瘧論所謂夏傷於暑秋傷於風與先傷於風後傷於寒等語其時傷令歟令傷時歟吾固知其不能不屈於此也且暑為夏令孰不知之今以暑為季夏為濕土得不怪哉夫冬果行春令人若感此則成冬溫病矣安得為春溫病歟其謂大寒之令復行於春溫病方作殺是大寒之令不復行於春其溫病當作者遂不作乎況今之春為溫病者比比皆是未嘗見其必由大寒復行於春而後成也經曰亢則害承乃制其義謂己亢極則勝己者來制如火亢則水來制之經所謂相火之下水氣承之水位之下土氣承之之類皆是勝己者為承今以亢為母承為子將求勝於經歟抑未達歟又如制物者為所勝受制者為所不勝與經所謂氣有餘則制己所勝而侮所不勝及傳之於其所勝死於其所不勝之旨全反矣余如因時傷令令傷時之說委曲衍說者固不暇悉辨也嗚呼予非好斥前人之非蓋為其有害大義晦蝕經旨以誤後人故不敢諛順而嘿嘿耳然而僭逾之罪固已自知其不得辭矣但未知觀者以為何如溯洄集支秉中曰春傷風夏傷暑秋傷濕冬傷寒此感疾之由也曰飧泄曰痎瘧曰咳嗽曰病溫此已形之症也蓋人感四時之氣待時傳變推遷則所勝侮其所不勝遂發為前症如人之元氣本實亦有過時而不發者矣辯論已悉愚不敢贅但其所謂時傷令令傷時之說則有間然矣夫春夏秋冬時也溫熱涼寒令也如春宜溫而寒夏宜熱而涼秋宜涼而熱冬宜寒而溫皆反其令之常為氣之變也人觸之遂能成疾豈時令有心於傷人哉若謂時能傷令又謂令能傷時則氣相傷而天下之人將同日而俱病矣有是理乎順氣一日分為四時論帝曰夫百病之所始生者必起於燥濕寒暑風雨陰陽喜怒飲食居處氣合而有形得藏而有名余知其然也夫百病者多以旦慧晝安夕加夜甚何也岐伯曰四時之氣使然曰願聞四時之氣曰春生夏長秋收冬藏是氣之常也人亦應之以一日分為四時朝則為春日中為夏日入為秋夜半為冬朝則人氣始生病氣衰故旦慧日中人氣長長則勝邪故安夕則人氣始衰邪氣始生故加夜半人氣入臟邪氣獨居於身故甚也曰其時有反者何也曰是不應四時之氣臟獨主其病者是必以藏氣之所不勝時者甚以其所勝時者起也曰治之奈何曰順天之時而病可與期順者為工逆者為粗帝曰善不治已病治未病論與其救療於有疾之後不若攝養於無疾之先蓋疾成而後藥者徒勞而已是故已病而後治所以為醫家之法未病而先治所以明攝生之理夫如是則思患而預防之者何患之有哉此聖人不治已病治未病之意也嘗謂備土以防水也苟不以閉塞其涓涓之流則滔天之勢不能遏備水以防火也若不以撲滅其熒熒之光則燎原之焰不能止其水火既盛尚不能止遏況病之已成豈能治歟故宜夜臥早起於發陳之春早起夜臥於蕃秀之夏以之緩形無怒而遂其志以之食涼食寒而養其陽聖人春夏治未病者如此與雞俱興於容平之秋必待日光於閉藏之冬以之斂神匿志而私其意以之食溫食熱而養其陰聖人秋冬治未病者如此或曰見肝之病先實其脾之虛則木邪不能傳見右頰之赤先瀉其肺經之熱則金邪不能盛此乃治未病之法今以順四時調養神志而為治未病者是何意耶蓋保身長全者所以為聖人之道治病十全者所以為上工之術不治已病治未病之說著於四氣調神大論厥有旨哉昔黃帝與天師難疑答問之書未嘗不以攝養為先始論乎天真次論乎調神既以法於陰陽而繼之以調於四氣既曰飲食有節而又繼之以起居有常諄諄然以養生為急務者意欲治未然之病無使至於已病難圖也厥後秦緩達乎此見晉侯病在膏肓語之曰不可為也扁鵲明乎此視齊侯病至骨髓斷之曰不可救也噫惜齊晉之侯不知治未病之理丹溪治病必求其本論將以施其療疾之法當以窮其受病之源蓋疾疢之原不離乎陰陽之二邪也窮此而療之厥疾弗瘳者鮮矣良工知其然謂夫風熱火之病所以屬乎陽邪之所客病既本於陽苟不求其本而治之則陽邪滋蔓而難制濕燥寒之病所以屬手陰邪之所客病既本於陰苟不求其本而治之則陰邪滋蔓而難圖誠能窮原療疾各得其法萬舉萬全之功可坐而致也治病必求其本見於素問陰陽應象大論者如此夫邪氣之機久而傳化其變證不勝其眾也譬如水之有本故能遊至汪洋浩瀚而趨下以漸大木之有本故能薦生莖葉實秀而在上以漸蕃若病之有本變化無窮苟非必求其本而治之欲去深感之患不可得也今夫厥陰為標風木為本其風邪傷於人也掉搖而眩轉瞤動而瘛瘲卒暴強直之病生矣少陰為標君火為本其熱邪傷於人也瘡瘍而痛癢暴注而下迫水液渾濁之病生矣少陽為標相火為本其熱邪傷於人也為熱而瞀瘈躁擾而狂越如喪神守之病生矣善為治者風淫所勝平以辛涼熱淫所勝平以鹹寒火淫所勝平以鹹冷以其病本於陽必求其陽而療之病之不愈者未之有也太陰為標濕土為本其濕邪傷於人也腹滿而身腫按之而沒指諸痙強直之病生矣陽明為標燥金為本其燥邪傷於人也氣滯而膹郁皮膚以皴揭諸澀枯涸之病生矣太陽為標寒水為本其寒邪傷於人也吐利而腥穢水液以澄冷諸寒收引之病生矣善為治者濕淫所勝平以苦熱燥淫所勝平以苦溫寒淫所勝平以辛熱以其病本於陰必求其陰而治之病之不愈者未之有也豈非將以療疾之法當以窮其受病之原者哉抑嘗論之邪氣為病各有其候治之之法各有其要亦豈止於一端而已其在皮毛者汗而發之其入里者下而奪之其在高者因而越之謂可吐也慓悍者按而收之謂按摩也臟寒虛奪者治以灸焫脈病攣痹者治以針刺血實蓄結腫熱者治以砭石氣滯痿厥寒熱者治以導引經絡不通病生於不仁者治以醪醴血氣凝泣病生於筋脈者治以熨藥始焉求其受病之本終焉蠲其為病之邪者無出於此也噫昔黃帝處於法宮之中坐於明堂之上受業於岐伯傳道於雷公曰陰陽者天地之道也綱紀萬物變化生殺之妙蓋有不測之神斡旋宰制於其間也人或受邪生病不離於陰陽也病既本於此為工者豈可他求哉必求於陰陽可也至真要大論曰有者求之無者求之此求其病機之說與夫求於本其理一也丹溪陽有餘陰不足論人受天地之氣以生天之陽氣為氣地之陰氣為血故氣常有餘血常不足何以言之天地為萬物父母天大也為陽而運於地之外地居天之中為陰天之大氣舉之曰實也亦屬陽而運於月之外月缺也屬陰稟日之光以為明者也人身之陰氣其消長若月之盈缺故人之生也男子十六歲而精通女子十四歲而經行是有形之後猶有待於乳哺水穀以養陰氣始成而可與陽氣為配以能成人而為人之父母古人必近三十二十而後嫁娶可見陰氣之難成而古人之善於攝養也禮記注曰惟五十而後養陰者有以加內經曰年至四十陰氣自半而起居衰矣又曰男子六十四歲而精絕女子四十九歲而經斷夫以陰氣之成止供給得三十年之視聽言動已先虧矣人之情欲無涯此難成易虧之陰氣若之何而可以供給也經曰陽者天氣也主外陰者地氣也主內故陽道實陰道虛又曰至陰虛天氣絕至陽盛地氣不足觀虛與盛之所在非予之過論主閉藏者腎也司疏泄者肝也二臟皆有相火而其繫上屬於心心君火也為物所感則易動心動則相火亦動動則精自走相火翕然而起雖不交會亦暗流而疏泄矣所以聖賢只是教人收心養心其旨深矣天地以五行更迭衰旺而成四時人之五臟六腑亦應之而衰旺四月屬巳五月屬午為火大旺火為肺金之夫火旺則金衰六月屬未為土大旺土為水之夫土旺則水衰況腎水常藉肺金為母以補助其不足故內經諄諄於資其化源也古人於夏必獨宿而淡味兢兢業業於愛護也保養金水二臟正嫌火土之旺爾內經曰冬不藏精者春必病溫十月屬亥十一月屬子正火氣閉藏潛伏以養其本然之真而為來春發生升動之本若於此時恣嗜欲以戕賊至春升之際下無根本陽氣輕浮必有溫熱之病夫夏月火土之旺冬月火氣之伏此論一年之虛耳若上弦前下弦後月廓月空亦為一月之虛大風大霧虹霓飛電暴寒暴熱日月薄蝕憂愁忿怒驚恐悲哀醉飽勞倦謀慮勤動又皆為一日之虛若病患初退瘡痍正作尤不止於一日之虛今人多有春末夏初患頭痛腳軟食少體熱仲景謂春夏劇秋冬瘥而脈弦大者正世俗所謂注夏病若犯此四者之虛似難免此夫當壯年便有老態仰事俯育一切隳壞予言至此深可驚懼古人謂不見所欲使心不亂夫以溫柔之盛於體聲音之盛於耳顏色之盛於目馨香之盛於鼻誰是鐵漢心不為之動也善攝生者於此五個月出居於外苟值一月之虛亦惟暫遠帷幕各自珍重保全天和期無負敬身之教幸甚審察病機無失氣宜論邪氣各有所屬也當窮其要於前治法各有所歸也當防其差於後蓋治病之要以窮其所屬為先苟不知法之所歸未免於無差爾是故疾病之生不勝其眾要其所屬不出乎五運六氣而已誠能於此審察而得其機要然後為之治又必使之各應於運氣之宜而不至有一毫差誤之失若然則治病求屬之道庶乎其無愧矣至真要大論曰審察病機無失氣宜意蘊諸此嘗謂醫道有一言可以盡其要者運氣是也天為陽地為陰陰陽二氣各分三品謂之三陰三陽然天非純陽而亦有三陰地非純陰而亦有三陽故天地上下各有風熱火濕燥寒之六氣其斡旋運動乎兩間者而又有木火土金水之五運人生其中臟腑氣穴亦與天地相為流通是知眾疾之作而所屬之機無出乎是也然而醫之為治當何如哉惟當察乎此使勿失其宜而後可若夫諸風掉眩皆屬肝木諸痛瘡癢皆屬心火諸濕腫滿皆屬脾土諸氣膹郁皆屬肺金諸寒收引皆屬腎水此病機屬於五運者也諸暴強直皆屬於風諸嘔吐酸皆屬於熱諸躁擾狂越皆屬於火諸痓強直皆屬於濕諸澀枯涸皆屬於燥諸病水液皆屬於寒此病機屬於六氣者也夫惟病機之察雖曰既審而治病之施亦不可不詳故必別陰陽於疑似之間辨標本於隱微之際有無之殊者求之於有無之所以殊虛實之異者責其虛實之所以異為汗吐下投其所當投寒熱溫涼用其所當用或逆之以制其微或從之以導其甚上焉以遠司氣之犯中焉以辨歲運之化下焉以審南北之宜使大小適中先後合度以是為治又豈有差殊乖亂之失邪又考之內經曰治病必求其本本草曰欲療者先察病機此審病機之意也六元正紀大論曰無失天信無逆氣宜五常政大論曰必先歲氣無伐天和此皆無失氣宜之意也故素問靈樞之經未嘗不以氣運為言既曰先立其言以明其氣復有以戒之曰治病者必明天道地理陰陽更勝既曰不知年之所加氣之盛衰虛實之所起不可以為工矣諄諄然若有不能自已者是豈聖人私憂過計哉以醫道之要悉在乎此也觀乎原病式一書比類物象深明乎氣運造化之妙其於病機氣宜之理不可以有加矣能合色脈可以萬全論欲知其內者當以觀乎外診於外者斯以知其內蓋有諸內者形諸外苟不以相參而斷其病邪之逆順不可得也為工者深燭厥理故望其五色以青黃赤白黑以合於五臟之脈窮其應與不應切其五脈急大緩澀沉以合其五臟之色順與不順誠能察其精微之色診其微妙之脈內外相參而治之則萬舉萬全之功可坐而致矣素問曰能合色脈可以萬全其意如此原夫道之一氣判而為陰陽散而為五行而人之所稟皆備焉夫五脈者人之真行血氣通陰陽以榮於身五色者氣之華應五行合四時以彰於面惟其察色按脈而不偏廢然後察病之機斷之以寒熱歸之以臟腑隨證而療之而獲全濟之效者本於能合色脈而已假令肝色如翠羽之青其脈微弦而急所以為生若浮澀而短色見如草滋者豈能生乎心色如雞冠之赤其脈浮大而散所以為順若沉濡而滑色見如衃血者豈能順乎脾色如蟹腹之黃其脈當中緩而大所以為從若微弦而急色見如枳實者豈能從乎肺色如豕膏之白其脈當浮澀而短所以為吉若浮大而散色見如枯骨者豈能吉乎以至腎色見如烏羽之黑其脈沉濡而滑所以為生或脈來緩而大色見如炲者死死生之理夫惟診視相參既以如此則藥證相對厥疾弗瘳者未之有也抑嘗論之容色所見左右上下各有其部脈息所動寸關尺中皆有其位左頰者肝之部以合左手關位肝膽之分應於風木為初之氣額為心之部以合於左手寸部心主之分應於君火為二之氣鼻為脾之部合於右手關脈脾胃之分應於濕土為四之氣右頰肺之部合於右手寸口肺與大腸之分應於燥金為五之氣頤為腎之部以合於左手尺中腎與膀胱之分應於寒水為終之氣至於相火為三之氣應於右手命門三焦之分也若夫陰陽五行相生相勝之理當以合之於色脈而推之也是故脈要精微論曰色合五行脈合陰陽十三難曰色之與脈當參相應然而治病萬全之功苟非合於色脈者莫能知也五藏生成篇云心之合脈也其榮色也夫脈之大小滑澀沉浮可以指別五色微診可以目察繼之以能合色脈可以萬全謂夫赤脈之至也喘而堅白脈之至也喘而浮青脈之至也長而左右彈黃脈之至也大而虛黑脈之至也上堅而大此先言五色次言五脈欲後之學者望而切之以相合也厥後扁鵲明乎此述之曰望而知之謂之神切脈而知之謂之巧深得內經之理也下迨後世有立方者命之曰神巧萬全厥有旨哉瀉南方補北方論七十五難曰經言東方實西方虛瀉南方補北方何謂也然金木水火土當更相平東方木也西方金也木欲實金當平之火欲實水當平之土欲實木當平之金欲實火當平之水欲實土當平之東方者肝也則知肝實西方者肺也則知肺虛瀉南方火補北方水南方火火者木之子也北方水水者木之母也水勝火子能令母實母能令子虛故瀉火補水欲令金不得平木也經曰不能治其虛何問其餘此之謂也余每讀至此未嘗不嘆夫越人之得經旨也而悼夫後人之失經旨也先哲有言凡讀書不可先看註解且將經文反復而詳味之待自家有新意卻以註解參校庶乎經意昭然而不為他說所蔽若先看註解則被其說橫吾胸中自家竟無新意矣余平生佩服此訓所益甚多且如難經此篇其言周備純正足以為萬世法後人紛紛之論其可憑乎夫實則瀉之虛則補之此常道也實則瀉其子虛則補其母亦常道也人皆知之今肝實肺虛乃不瀉肺而瀉心此則人亦知之至不補肺補脾而補腎此則人不能知惟越人知之耳夫子能令母實母能令子虛以常情觀之則曰心火實致肝木亦實此子能令母實也脾土虛致肺金亦虛此母能令子虛也心火實固由自旺脾土虛乃由肝木製之法當瀉心補脾則肝肺皆平矣越人則不然其子能令母實子謂火母謂木固與常情無異其母能令子虛母謂水子謂木則與常情不同矣故曰水者木之母也子能令母實一句言病因也母能令子虛一句言治法也其意蓋曰火為木之子子助其母使之過分而為病矣今將何以處之惟有補水瀉火之治而已夫補水者何謂也蓋水為木之母若補水之虛使力可勝火火勢退而木勢亦退此則母能虛子之義所謂不治之治也此虛字與精氣奪則虛之不同彼虛謂耗其真而致虛此虛謂抑其過而致虛之也若曰不然則母能令子虛一句將歸之於脾肺乎既歸於脾肺今何不補脾乎夫五行之道其所畏者畏所克耳今火太旺水太虧火何畏乎惟其無畏故愈旺而莫能制苟非滋水以求勝之孰能勝之水勝火三字此越人寓意處當細觀之勿輕忽也雖瀉火補水並言然其要又在於補水耳後人乃曰獨瀉火而不用補水又曰瀉火則是補水得不大違越人與經之意乎若果不用補水經必不言補北方越人必不言補水矣雖然水不虛而火獨暴旺者固不必補水亦可也若先因水虛而致火旺者不補水可乎水虛火旺而不補水則藥至而暫息藥過而復作將積年累月無有窮已安能絕其根哉雖苦寒之藥通為抑陽扶陰不過瀉火邪而已終非腎臟本藥不能以滋養北方之真陰也欲益其陰非地黃黃柏之屬不可也且夫肝之實也其因有二心助肝肝實之一因也肺不能制肝肝實之二因也肺之虛也其因亦有二心克肺肺虛之一因也脾受肝克而不能生肺肺虛之二因也今補水而瀉火火退則木氣削又金不受克而制木東方不實矣金氣得平又土不受克而生金西方不虛矣若以虛則補母言之肺虛則當補脾豈知肝勢正盛剋土之深雖曰補脾安能敵其正盛之勢哉縱使土能生金金受火克亦所得不償所失此所以不補土而補水也或疑木旺補水恐水生木而木愈旺故聞獨瀉火不補水之論欣然而從之殊不知木已旺矣何待生乎況水之虛雖峻補尚不能復其本氣安有餘力生木哉若能生木則能勝火矣或又謂補水者欲其不食於母也不食於母則金氣還矣豈知火剋金土不能生金金之虛已極尚不能自給水雖欲食之何所給乎若如此則金虛不由於火之克土之不生而由於水之食耳豈理也哉縱水不食金金亦未必能復常也金不得平木一句多一不字所以瀉火補水者正欲使余得平木也不字當刪去不能治其虛何問其餘虛指肺虛而言也瀉火補水使金得平木正所謂能治其虛不補土不補金乃瀉火補水使金自平此法之巧而妙者苟不能曉此法而不能治此虛則不須問其他必是無能之人矣故曰不能治其虛何問其餘若夫上文所謂金木水火土更相平之義不勞解而自明茲故弗具也夫越人亞聖也論至於此敢不斂衽但恨說者之斁蝕之故辨積熱沉寒論人之所藉以生者氣也氣者何陰陽是也夫陰與陽可以和而平可以乖而否善攝與否吉凶於是乎歧之夫惟攝之不能以皆善也故偏寒偏熱之病始莫逃於乖否之餘矣雖然寒也熱也苟未至於甚粗工為之而不難設熱積而寒沉良工猶弗能以為計況其下乎奈之何俗尚顓蒙恪恃方藥愈投愈盛迷不知反豈知端本澄源中含至理執其樞要眾妙俱呈且以積熱言之始而涼和次而寒取寒取不愈則因熱而從之從之不愈則技窮矣由是苦寒煩歲而弗停又以沉寒言之始而溫和次而熱取熱聚不愈則因寒而從之從之不愈則技窮矣由是辛熱比年而弗止嗟夫寒涼益深而積熱彌熾辛熱太過而沉寒愈滋苟非大聖慈仁明垂樞要生也孰從而全之經曰寒之而熱者取之陰熱之而寒者取之陽所謂求其屬也屬也者其樞要之所存乎斯旨也王太僕知之故曰益火之源以消陰翳壯水之主以制陽光又曰取心者不必齊以熱取腎者不必齊以寒但益心之陽寒亦通行強腎之陰熱之猶可籲混乎萬言千語之間殆猶和璧之在璞也其寶久湮豈過焉者石之而弗鑿乎余僭得而推衍之夫偏寒偏熱之病其免者固千百之一二而積熱沉寒亦恐未至於數見也然而數見者得非粗工不知求屬之道不能防微杜漸遂至滋蔓難圖以成之歟夫寒之而熱者徒知以寒治熱而不知熱之不衰者由乎真水之不足也熱之而寒者徒知以熱治寒而不知寒之不衰者由乎真火之不足也不知真水火不足泛以寒熱藥治之非惟臟腑習熟藥反見化於其病而有者弗去無者反至矣故取之陰所以益腎水之不足而使其制夫心火之有餘取之陽所以益心火之不足而使其勝夫腎水之有餘也其指水火也屬猶主也謂心腎也求其屬者言水火不足而求之於心腎也火之源者陽氣之根即心是也水之主者陰氣之根即腎是也非謂火為心而原為肝水為腎而主為肺也寒亦益心熱亦強腎此王太僕達至理於規矩準繩之外而非迂士麴生之可以跂及矣彼迂士麴生不明真水火於寒熱之病有必制必勝之道但謂藥未勝病久遠期之是以恪守方藥愈投愈盛卒至殞滅而莫之悟嗚呼甚矣余見積熱沉寒之治每蹈於覆轍也因表而出之以勸春宣論春蠢也陽氣升淨草木萌芽蠢然而動前哲謂春時人氣在頭有病宜吐又曰傷寒大法春宜吐宣之為言揚也謂吐之法自上出也今之世俗往往有瘡痍者有膈滿者有蟲積者以為不於春時宣瀉以毒藥不可愈也醫者遂用牽牛巴豆大黃枳殼防風輩為丸名之曰春宣丸於二月三月服之得下利而止於初瀉之時臟腑得通時暫輕快殊不知氣升在上則在下之陰甚弱而用利藥戕賊其陰其害何可勝言況仲景用承氣湯等下藥必有大滿大實堅有燥糞轉矢氣下迫而無表證者方行此法可下之證未悉具猶須遲以待之泄利之藥其可輕試乎余伯考形肥骨瘦味厚性沉五十歲輕於聽信忽於三月半服春宣丸一帖服之下兩三行每年率以為常至五十三歲時七月初炎熱之甚無病暴死此其非妄認春宣為瀉而致禍耶自上召下曰宣宣之一字吐也明矣張子和已詳論之昔賢豈妄言哉丹溪明醫周漢卿序予聞松陽周君漢卿以醫名者久矣一日予婿鄭叔韡復來青蘿山中述其詳曰周君之醫精甚他固不能知姑即士君子所常道者言之括蒼蔣仲良左目為馬所踢其睛突出懸如桃群工相顧曰是系絡既損法當眢周君笑不答以神膏封之越三日目如初華川陳明遼患瞽者十齡百藥屢嘗而不見效自分為殘人周君視之曰是翳雖在內尚可治用針從眥入睛背掩其翳下之目煥然辨五色陳以為神武城男子病胃痛不可忍嚼齒剌剌作聲或奮擲乞死弗之得他醫用大攻湯汗皆不損周君以藥納鼻竅中俄大吐吐出赤蟲尺余口眼咸具痛即止東白馬氏婦有孕歷十四月不產尫且黑周君脈之曰非孕也乃為妖氣所乘耳以藥下之下一物如金魚疾旋已永康應童嬰腹疾恆痀瘻行久不伸周君解裳視之氣衝起腹間者二其大如臂周君刺其一拍然鳴又刺其一亦如之稍按摩之氣盡解平趨無瘻行長山徐嫗構驚疾初發手足顫掉褫去裳衣臝而奔或歌或哭或牽拽如舞木偶粗工見之吐舌走以為鬼魅所惑周君獨刺其十指端出血已而安虎林黃氏女生瘰癧環頸及腋凡十九竅竅破白沉出右手拘攣不可動體火熱家人咸憂趣匠制棺衾周君為剔竅母長二寸其餘以火次第烙數日成痂痂脫如恆人于越楊翁項有疣其巨類瓜因醉僕階下疣潰血源源流凡疣破血出弗休必殺人他醫辭不進周君用劑糝其穴血即止烏傷陳氏子腹有塊隱起捫之如罌或以為奔豚或以為癥瘕周君曰脈洪且芤癰發於腸也即用燔針如筴者刺入三寸余膿隨針射出其流有聲愈諸暨黃生背善曲杖而行人以風治之周君曰非風也血澀不通也為刺兩足崑崙穴頃之投杖而去其醫之甚精如此縉紳先生宜有以褒之揚之敢以序為請余惟古之神醫一撥見病之應因五臟之輸乃割皮解肌決脈結筋搦髓揲荒爪幕以為治所謂煉精易形者也今則人誰知之其次則湯液醴釃鑱石蹺引按撫毒郁之法耳是法亦絕不傳其僅存於世者往往不能用用或乖戾以致夭札而傷者多矣夫醫者民命所繫一投丸之間一援箴之際則安危由此而分何可不致謹於斯耶昔司馬遷立倉公列傳其所治自齊侍御史而下凡十有餘人皆歷疏其病狀辭雖繁而不殺者其意蓋有見於此也余敢竊取斯義備以叔韡所述序次成文以遺周君又安知他日修史傳者無採余之言哉余耄矣且有脾禍吐涎日二三升曼延將四稔叔韡尚邀周君以起余之疾者乎宋學士文集明醫戴原禮序醫之為道至矣故周官有疾醫視萬民四時之病春之痟首夏之癢疥秋之瘧寒冬之咳嗽上氣皆分而治之驗其狀而制其祿甚為不輕也後世官寖失職故於其術每擇之不精有人於此能合於古者之道豈不猶空谷足音之可喜者乎如吾同縣戴原禮氏是已原禮生儒家習聞詩禮之訓惓惓有志於澤物乃徒步至烏傷從朱先生彥修學醫先生見其穎悟倍常傾心援之原禮自是識日廣學日篤出而治疾往往多奇驗予請得而詳道之原禮從叔仲章六月患大熱面赤口譫語身發紅斑他醫投以大承氣湯而熱愈極原禮脈之曰左右手皆浮虛無力非真熱也張子和云當解表而勿攻裡此證似之法當汗遂用附子乾薑人參白朮為劑烹液冷飲之大汗而愈諸暨方氏子婦瘧後多汗呼媵人易衣不至怒形於色遂昏厥若死狀灌以蘇合香丸而蘇自後聞人步之重雞犬之聲輒厥逆如初原禮曰脈虛甚重取則散是謂汗多亡陽正合經意以黃芩人參日補之其驚漸減至浹旬而安松江朱仲文長夏畏寒身常挾重續食飲必熱如火方下咽微溫則嘔他醫授以胡椒煮伏雌之法日啖雞者三病愈亟原禮曰脈數而大且不弱劉守真云火極似水此之謂矣椒發陰經之火雞能助痰只以益其病爾以大承氣湯下之晝夜行二十餘頓減纊之半復以黃連導痰湯益竹瀝飲之竟瘳姑蘇朱子明之婦病長號數十聲暫止復如前人以為厲所憑莫能療原禮曰此郁病也痰閉於上火鬱於下故長號則氣少舒經云火鬱則發之是已遂用重劑湧之吐痰如膠者無算乃復初樂原忠妻亦蘇人因免乳後病驚身翩翩然如升浮雲之上舉目則重屋旋運持身弗定他醫飲以補虛治驚皆不驗原禮曰左脈雖芤且澀神色不動是因驚致心包絡積汙血耳法宜下之下積血如漆者一斗即愈留守衛吏陸仲容之內子病熱妄見神鬼手足瞤動他醫用黃連清心湯不中原禮視之曰形瘦而色不澤乃虛熱耳法當以李杲甘溫除大熱之法為治即經所謂損者溫之者也服參耆而安他若此者甚眾予備聞賢士大夫恆言之今不能悉數也嗚呼有人於此可不謂之合於古道者乎夫醫之為道本於素問內經其學一壞於開元再壞於大觀習俗相仍絕不知究其微指唯執一定之方類刻舟而求劍者人訾之則曰我之用此不翅足矣又何事內經為宋之錢仲陽獨得其秘於遺經而擴充之金之張劉李諸家又從而衍繹之於是內經之學大明劉之學朱彥修得之最深大江以南醫之道本於內經實自朱發之原禮乃其高弟其用心也篤故造理為特精其傳授有要故察證無不中亦可謂賢也已矣近來京師縉紳家無不敬愛之服其劑沉疴豁然如洗或欲薦為醫官辭不就道賦詩以錢其東還且請余為序昔者司馬遷作倉公傳載其應詔所對凡廿有三書治病之狀甚具予仿此義稍陳原禮療疾奇中者系之首簡並告周官疾醫四時治證之概世之知言君子必有所擇焉宋學士集望聞問切訂春甫謹按望聞問切四字誠為醫之綱領若得四字之旨則於醫學可謂至矣今人惟問一端而已其於望聞亦淺淺耳至於切脈則又謂居三者之末而猶後輕視之故所以卒鮮有精於脈者間有言者亦不過左心小腸之說耳經位不別其何以察虛實生死之幾耶殊不知四者之要則又在乎切之之功也其望其聞其問之三者先以得其病情之端而後總切脈於寸口確乎知始病之源而方今延流於何臟何經若虛若實或死或生准候酌方必有賴於切脈而後可以為圖治之效矣斯其次第之序初近患人光望而聞次問而切固理之不容易也然則切脈果可輕與予故訂之以備知者之取採耳黃帝問於岐伯曰余聞之見其色知其病命曰明接其脈知其病命曰神問其病知其處命曰工余願聞見而知之按而得之問而極之為之奈何岐伯曰夫色脈與尺脈之相應也如桴鼓影響之相應也不得相失也此亦本末根葉之出候也故根死則葉枯矣色脈形肉不得相失也故知一則為二知二則為神知三則神且明矣又曰望而知之謂之神聞而知之謂之聖問而知之謂之工切脈而知之謂之巧六十一難曰望而知之者望見五色以知其病之所處也聞而知之者聞其五音以別其病之所出也問而知之者間其所欲五味以知其病之所起所在也切脈而知之者診其寸口視其虛實以知其病在何臟腑也望而知之謂之神靈樞邪氣臟腑病形篇曰色青者其脈弦赤者其脈鉤也黃者其脈代也白者其脈毛黑者其脈石見其色而不得其脈反得其相勝之脈則死矣得其相生之脈則病已矣又曰先定其五色五脈之應其病乃可別也五色篇帝曰各以其色言其病雷公曰人不病卒死何以知之帝曰大氣入於臟腑者不病而卒死矣雷公曰病小愈而卒死何以知之帝曰赤色出兩頰大如拇指者病雖小愈必卒死黑色出於天庭大如拇指必不病而卒死雷公再拜曰善哉雷公曰官五色奈何黃帝曰青黑為痛黃赤為熱白為寒是謂五官也五臟生成篇曰五色微診可以目察能合色脈可以萬全赤脈之至也喘而堅診曰有積氣在中時害於食名曰心痹得之外疾思慮而心虛故邪從之白脈之至也喘而浮上虛下實兼有積氣在胸喘虛名曰肺痹寒熱得之醉而使內也青脈之至也長而左右彈有積氣在心下支胠名曰肝痹得之寒濕與疝同法腰痛足清頭脈緊黃脈之至也大而虛有積氣在腹中有厥氣名曰厥疝女子同法得之疾使四肢汗出當風黑脈之至也上緊而大有積氣在小腹與陰名曰腎痹脈要精微篇曰夫精明五色者氣之華也赤欲如帛裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼五色稍微象見矣其壽不久也夫五臟者身之強也頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂附筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣得強者生失強者死五臟之氣故色見青如草茲黃如枳實黑如煙煤赤如衃血白如枯骨皆死此五色之見於死也青如翠羽赤如雞冠黃如蟹腹白如豕膏黑如烏羽皆生此五色之見於生也青色見於太陰太陽及魚尾正面口角如大青藍葉怪惡之狀者肝氣絕死若如翠羽柏皮者只是肝邪有驚病風病目病之屬紅色見於口唇及三陰三陽上下如馬肝之色死血之狀者心氣絕主死若如橘紅馬尾色者只是心病有怔仲有驚悸夜臥不寧白色見於鼻準及正面如枯骨及擦殘汗粉者為肺絕丙丁日死若如膩粉梅花白綿者只是肺邪咳嗽之病有孝服之憂黃色見於鼻乾燥若土偶之形為脾氣絕死若如桂花雜以黑暈只是脾病飲食不快四肢倦怠妻妾之累黑色見於耳或輪郭內外命門懸壁若汙水煙煤之狀為腎氣絕則死若如蜘蛛網眼烏羽之澤者只是腎虛火邪乘水之病凡望五色以知其病如面青肝病面赤心病面黃脾病面白肺病面黑腎病此知病之屬也凡相五色之奇脈面黃目青面黃目赤面黃目白面黃目黑者皆不死面青目青面赤目白面青目黑面黑目白面赤目青皆死也凡望病人目睛不了了鼻中呼不出吸不入氣短促而冷者陰病也病人目睛了了鼻中呼吸出入能往而能來口鼻息長而皆熱者陽病也病人及健人黑色若白色起入目及口鼻三日中死久病人耳目及顴骨赤者五日死病人目無精光若土色不受飲食四日死望病人兩目眥有黃色起者將愈病人面目俱黃者不死病人面唇青黑者俱死望建人及病人面如馬肝色望之如青近之如黑者死聞而知之謂之聖聞其五音以別其病如經云言而微終日乃復言者此奪氣也中盛臟滿聲如從室中言此中氣之濕也因於暑汗煩渴而喘靜則多言衣被不斂言語善惡不避親疏者此神明之亂也病人五臟已奪神明不守聲嘶者死病人尋衣縫譫語者不可治內傷飲食勞倦證不欲言縱強言之聲必怯弱而低微內傷不足之驗外傷風寒證言語必前輕而後重其言高其聲壯厲而有力乃有餘之驗也凡聲嗄其言響如從甕中出前輕而後重高揭而有力皆傷風氣盛之驗也痰火咳嗽久而聲嘶啞而漸至不出聲者必死也聞病人言語無力甚不欲言氣難布息者內傷也病人言語有力動言不厭者外傷也病人陰陽俱絕失錯不能言者三日死病人妄言錯亂及不能言不治熱病者可治問而知之謂之工經曰必審問其所始病與今之所方病然後各切循其脈素問疏五過篇曰凡未診病者必問嘗貴後賤雖不中邪病從內生名曰脫營嘗富後貧名曰失精五氣留連病有所並醫工診之不在臟腑不變形軀診之而疑不知病名身體日減氣虛無精病深無氣洒洒然時驚病深者以其外耗於衛內奪於榮良工所失不知病情又曰診有三常必問貴賤封君敗傷及欲侯王靈樞云入國問俗入家問諱上堂問禮臨病人問所便慎之至也又云凡診病者必問飲食起居暴樂暴苦始樂後苦皆傷精氣徵四失篇曰診病不問其始憂患飲食之失節起居之過度或傷於毒不先言此卒持寸口何病能中凡百病問其晝則增劇夜則安靜是陽病有餘乃氣病而血不病也夜則增劇晝則安靜是陰病有餘乃血病而氣不病也問其晝則發熱夜則安靜是陽氣自旺於陽分也晝則安靜夜則發熱煩躁是陽氣下陷入陰中也名曰熱入血室晝則發熱煩躁夜則發熱煩躁是重陽無陰也當亟瀉其陽峻補其陰問其晝則惡寒夜則安靜是陰血自旺於陰分也夜則安靜晝則惡寒是陰氣上溢於陽中也夜則惡寒晝則惡寒是重陰無陽也當亟瀉其陰峻補其陽晝則惡寒夜則煩躁飲食不入病名陰陽交變陰陽交變者死矣閉戶塞牖系之病者數問其情以從其意得神者昌失神者亡甲乙經云所問病者問所思何也所懼何也所欲何也所疑何也問之要察陰陽之虛實辨臟腑之寒熱疾病所生不離陰陽臟腑寒熱虛實辨之分明治無誤矣王海藏曰常人求診拱默唯令切脈試其能知病否且脈人之氣血附於經絡熱勝則脈疾寒勝則脈遲實則有力虛則無力至於得病之由及所傷之物豈能以脈知之乎故醫者不可不問其由病者不可不說其故孫真人云未診先問最為有準蘇東坡云脈之難明古今所患也至虛有盛候大實有羸狀疑似之間便有死生之異士夫多秘所患以驗醫之能否吾平生有疾請療必盡告以所患使醫瞭然知疾之所在虛實寒熱先定於胸中然後診脈疑似不能惑也吾求愈疾而已豈以困醫為事哉婦科產後先問坐草難易惡露多少飲食遲早生子存亡蓋形傷血傷之不同補氣補血之有異飲食失節宜調中生子不存兼開鬱問其所欲以知其病如欲熱者知為寒欲冷者知為熱如好靜惡動者知其為虛煩躁不寧者知其為實惡食知傷食惡風知傷風好食甘為脾虛好食辛者為肺病好食酸者為肝虛好食鹹者為腎弱嗜食苦者為心病此皆順應而易治若乃心病受咸肺傷欲苦脾弱喜酸肝病好辣腎衰嗜甘此為逆候病輕必危危者必死治得其法服藥預防可回生五十一難問病欲得寒欲見人者病在腑也病欲得溫不欲見人者病在臟也東垣內外傷辨問其發熱惡寒寒熱間作蒸蒸燥熱發於肌肉之間者內傷也發熱惡寒寒熱並作拂拂發熱發於皮毛之上者外感也問其口不知味飲食不下手足不和兩脅俱熱者內傷證也問其飲食知味腹中和二便如常筋骨疼痛不能動搖非扶不起外感證也問其惡風居露地大漫風起卻不知惡惟惡窗隙些小賊風是內傷證也問其鼻流清涕頭痛自汗間而有之鼻中氣短少氣不足以息怯不欲言為內傷證也問其小便頻數而不渴初以勞役得之食少小便黃赤大便常難或澀或結或虛坐常有些小如痢非痢或瀉黃糜或溏泄或結而不通皆內傷證也問其心下否或胸中閉塞如刀割之痛二者亦互作而不並出有時胃脘當心而痛上支兩脅痛四肢不收無力以動而懶倦嗜臥皆內傷證也問其臍下相火之氣直上衝胸而不可遏其氣無止息甚則高喘皆內傷也問其頭痛常常有之而不間者外傷也問其積痛不移者血病走痛不常者氣病也問其痛處按之而已者虛病按之而痛愈甚者實病問其走注則為風拘攣則為寒煩渴則為暑重澀則為濕或好於善淫或觸於驚恐或傷於飲食或深居簡出而受暑皆為受病之因所以貴於問也昔人喉間痛癢諸醫不效一醫問其平日好食斑鳩乃知鳩食半夏苗而貽毒治以生薑而愈又如唐汝正治小兒風熱通身俱愈惟頭頂不痊問其因乳母好熱酒知其貽毒本方倍用葛根黃連而遂愈切脈而知之謂之巧切脈於寸口而知病之虛實生死經曰必審其所始病與今之所方病然後各切循其脈視其經絡浮沉上下逆從循之其脈疾者不病其脈遲者病脈不往來者死皮膚著者死察脈候獨小者病獨大者病獨遲者病獨疾者病獨熱者病獨寒者病獨陷者病脈從四時謂之可治脈逆四時為不可治所謂逆四時者春得肺脈夏得腎脈秋得肝脈冬得脾脈其至皆懸絕沉澀命曰逆四時諸過者切之澀者陽氣有餘也滑者陰氣有餘也人一呼脈再動一吸脈再動呼吸定息脈之動閏以太息命曰平人一呼脈一動一吸脈一動曰少氣一呼脈三動一吸脈三動而躁尺熱曰病溫尺不熱脈滑曰病風脈澀曰痹人一呼脈四動以上曰死脈絕不至曰死乍疏乍數曰死脈有陰陽知陽者知陰知陰者知陽凡陽有五五五五陽所謂陽者真臟也見則為敗敗必死也所謂陽者胃脘之陽也別於陽者知病處也別於陰者知死生之期三陽在頭三陰在手所謂一也粗大者陰不足陽有餘為熱中也長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少澀則心痛脈虛身熱得之傷暑脈盛身寒得之傷寒脈盛滑堅者病在外脈實小而堅者病在內脈小弱而澀者謂之久病脈浮滑而疾者謂之新病脈急為疝瘕小腹痛緩而滑曰熱中盛而堅曰脹來疾去徐上實下虛為厥顛疾來徐去疾上虛下實為惡風也寸口之脈中手短者曰頭痛寸口脈中手長者曰足胻痛寸口脈中手促上擊者曰肩背痛寸口脈浮而盛者病在外沉而堅者病在中沉而弱者寒熱帝曰脈從而病反者其診何如曰脈至而從按之不鼓諸陽皆然諸陰之反何如曰脈至而從按之鼓甚而盛也徵其脈小色不奪者新病也徵其脈不奪其色奪者此久病也徵其脈與五色俱奪者亦久病也徵其脈與五色俱不奪者新病也推而內之外而不內身有熱也推而外之內而不外有心腹積也推而上之上而不下腰足清也推而下之下而不上頸項痛也按之至骨脈氣少者腰脊痛而身有痹也病熱而脈靜泄而脈大脫血而脈實病在中必先知經脈然後知病脈根於中者命曰神機神去則機息五色脈變揆度奇常道在於一神轉不回回則不轉乃失其機陰陽之理一以貫之造化之道一陰一陽而已矣陽動陰靜陽明陰晦陽有知陰無知陽無形陰有形陽無體以陰為體陰無用待陽而用二者相合則物生相離則物死微哉微哉通於其說則鬼神之幽人物之著與夫天文地理醫卜方技仙佛之蘊一以貫之而無遺矣造化之蘊水火盡之或曰天地水火恐未足以盡造化之蘊不如以陰陽統之予竊以為陰陽者虛名也天地水火者實體也二而一者也謂天地水火未足以盡造化之蘊此特未之察耳蓋人知水之為水而不知寒涼潤澤者皆水也人知火之為火而不知溫熱光明者皆火也天宰之以神地載之以形水火二者交會變化於其間萬物由之而生由之而死造化之能事畢矣自此之外豈復有餘蘊乎形神之妙太極分之周子所謂太極指神而言神無所不統故為太極神無影故為無極而太極朱子所注亦得其意但不言神而言理故讀者未即悟朱註上天之載蓋指神而言也殊不知太極乃陰陽合而未分者也陰形陽神皆在其中及分為陰陽則陽為天火依舊為神陰為地水依舊為形若太極本體止有神而無形則分後地水之形何從而來哉由此化生人物其心性之神則皆天火之神所為也其血肉之形則皆地水之形所為也此理先聖屢有言者但學者忽而不察耳蓋有形易見而無形難見固無怪其然也調攝之要元精主之造化之要天火之陽下交於地水之陰則化生萬物草木為植物得陰氣之多者也故猶附於地飛走為動物得陽氣之多者也故不附於地天機內運而自為一物人也者動物之至靈者也其神屬天其氣屬火其液屬水其形屬土蓋陰陽之會也陰陽之會其妙在精精也者形液之粹而神氣之所和也其始也精由神氣交化而成其既成也神氣因附於精而不去此人之所以生生不窮也人之始生也固由造化之陰陽而來然稟受有限故其既生也不能不賴造化之陰陽以養飲食入胃以養其中化為元精則神氣不離形液日益蓋所以續陰陽稟受之有限而使之無窮也衣服宮室以養其外則所以防造化陰陽之外邪使不得侵其形而擾其神也至於醫藥則所以祛其邪而扶其正也此攝生之常也而莫不有節焉知者鮮矣善於攝生者則又以清淨養其神以節宣養其形以咽津納氣交和水火養其精精全形固外邪不侵神氣不離則壽矣此調攝之要也仙佛之道亦由此進嗚呼深哉柏齋三書用藥如用兵革車千乘帶甲十萬籌策神機鬼神猜泣奇正萬全歷古如是況良醫之用藥獨不若臨陣之將兵乎奈何世人以鹵莽之浮學應倉卒無窮之疾變其不眩駭顛仆者寡矣苟無妙算深謀成法以統治之則倒戈敗續之不暇尚何勝之可圖哉予從事於患難之場隨病察診據脈立方開之劫之搏之發之以盡其宜吐之伸之汗之下之以極其當攻守不常出沒無定大綱小紀經緯悉陳本數末度條理具設前乎古人之所隱秘深藏或不盡意者不啻胸中自有十萬精銳如太阿之在匣中其輝未嘗耀於外一旦揮之有以恐人之耳目持八陣之奇鋒七擒之利刃其敵可卻其勝可決而其安可圖如此而後已醫壘元戎序四方風土不同服藥亦異丹溪曰西北之地多風寒故患外感者居多東南之地本卑濕故患濕熱者眾蓋北方高阜天不足西北而多風南方卑下地不滿東南而多濕所以方土之候各有不齊而所生之病多隨土著醫者必須因時處治隨地判宜治北人之病宜以攻伐外邪為多治南方之疾宜以保養內氣為本何則北方風氣渾厚稟賦雄壯兼之飲食倍常居室儉素殊少戕賊元氣之患一有疾病輒以疏利之其病如脫而快意通神矣若夫東南之人體質柔脆腠理不密而飲食色欲之過侈與西北之人迥異概以峻劑攻之不幾操刃而殺人乎雖然北方稟氣固厚安能人人皆實南方稟氣雖薄安得人人皆虛當觀其人因其證而施藥之斯無一偏之弊矣醫書皇甫謐黃帝世紀曰黃帝命雷公岐伯教別九針著內外經素問書咸出焉黃帝內傳曰帝升為天子針經脈訣無不備也故金匱甲乙之書皆祖內經內經素問黃帝御極坐明堂之上臨觀八極考建五常以謂人生負陰而抱陽食味而被色寒暑相蕩喜怒交傷乃與岐伯上窮天紀下極地理遠取諸物近取諸身更相問難雷公之倫授業傳之而內經作矣蒼周之興秦和述六氣之論具於左史厥後越人得其一二演述難經西漢倉公傳其舊業東漢仲景撰其遺論晉皇甫謐刺為甲乙隋楊上善纂為太素唐王冰篤好之大為次注林億素問序內經素問世稱黃帝岐伯問答之書及觀其旨意殆非一時之言其所撰述亦非一人之手劉向指為諸韓公子所著程子謂出於戰國之末而其大略正如禮記之萃於漢儒而與孔子子思之言並傳也蓋靈蘭秘典五常政六元正紀等篇無非闡明陰陽五行生制之理配象合德實切於人身其諸色脈病名針刺治要皆推是理以廣之皇甫謐之甲乙楊上善之太素亦皆本之於此按西漢藝文志有內經十八卷之目至隋經籍志始有素問之名而不指為內經唐王冰乃以靈樞九卷率合漢志之數而為之註釋後以陰陽大論托其為師張公所藏以補其亡逸其用心亦勤矣惜乎朱墨混淆玉石相亂訓詁失之於迂疏援引或至於未切至宋林億高若訥等正其誤文而精其缺義頗於冰為有功醫史難經帝王世紀曰黃帝命雷公岐伯論經脈旁通問難八十一為難經楊玄操難經序曰黃帝八十一難經者秦越人所作按黃帝內經二帙帙九卷其義難究越人乃採精要八十一章為難經事物紀原八十一難經乃秦越人扁鵲祖述內經設為問答之辭以示學者所引經言多非靈素本文蓋古有其書而今亡之耳隋時有呂博望注本不傳宋王惟一集五家之說而醇玼相亂惟虞氏粗為可觀紀齊卿注稍密乃附辨楊玄操呂廣王宗正三子之非周仲立李子野張潔古諸家註釋俱無所啟發近代王少卿演繹目曰重玄滑伯仁註釋亦非詁訓大抵切於經旨而為要義者不過數難而已矣傷寒論世傳張仲景用素問熱論之說廣伊尹湯液而為之至晉王叔和始因舊說重為撰次宋成無己復為之註釋其後龐安常朱肱許叔微韓祗和王實之流固亦互有發明而大綱大要無越乎汗吐下溫四法而已蓋一證一藥萬選萬中千載之下如合符節前修指為群方之祖信矣所可憾者審脈時汩王氏之言三陰率多斷簡況張經王傳亦往往反復後先亥豕相雜自非字字句句熟玩而精思之未有能造其閫奧者陳無擇嘗補三陰證藥於三陰論其意蓋可見矣近人徐止善作傷寒補亡恐與先哲之意未盡合也天元玉冊天元玉冊元誥十卷不知何人所作歷漢至唐諸藝文志俱不載錄其文自與內經不類非戰國時書其間有天皇真人昔書其文若道正無為先天有之太易無名先於道生等語皆老氏遺意意必老氏之徒所著大要推原五運六氣上下臨御主客勝復政化淫乘及三元九宮太乙司政之類殊為詳明深足以羽翼內經六微旨五常政等論太玄君扁鵲為之注猶郭象之於南華非新學之所易曉觀其經注一律似出一人之手謂扁鵲為黃帝時人則其書不古謂扁鵲為秦越人則傳中無太玄君之號醫門仿托率多類此玄珠密語玄珠密語十卷乃啟玄子王冰所述其自序謂得遇玄珠子而師事之與我啟蒙故自號啟玄子蓋啟問於玄珠也目曰玄珠密語乃玄珠子密而口授之言也及考王氏素問序乃云辭理秘密難粗論述者別撰玄珠以陳其道二序相戾意者玄珠之名取諸蒙莊子所謂黃帝遺玄珠使罔象得之之語則師事玄珠子而號啟玄者皆妄也宋高保衡等校正內經乃云詳王氏玄珠世無傳者今之玄珠乃後人附托之文耳雖非王氏之書於素問十九卷至二十二四卷頗有發明合素問觀之而密語所述乃六氣之說與高氏所指諸卷全不相侔疑必刊傳者所誤也原其所從蓋捃摭內經六微旨及至真要等五篇洎天元玉冊要言而附會雜說其諸紀述運氣休祥之應未必可徵實偽書也苟啟玄別撰果見於世又豈止運氣一端而已覽者取其長而去其短可也中藏經中藏經八卷少室山鄧處中雲華先生佗遊公宜山古洞值二老人授以療病之法得石床上書一函用以施試甚驗按唐志有吳普集華氏藥方別無中藏之名普其弟子宜有所集竊意諸論非普輩不能作鄧氏特附別方而更今名耳蓋其方有用太平錢並山藥者蓋太平乃宋熙寧初年號薯蕷以避厚陵偏諱而始名山藥其餘可以類推聖濟經聖濟經十卷宋徽宗所作大要祖述內素而引援六經旁及老氏之言以闡軒岐遺旨政和間頒是經於兩學辟雍生吳禔為之解義若達道正紀等篇皆足以裨益治道啟迪眾工者也並出醫史醫貴臨機應變難於執方學士商輅曰醫者意也如對敵之將操舟之工貴乎臨機應變方固難於盡用然非方則古人之心弗傳茫如望洋如捕風必有率意而失之者矣方果可以弗用乎雖然方固良矣然必熟之素問以求其本熟之本草以究其用熟之診視以察其證熟之治療以通其變始於用方而終至於無俟於方夫然後醫之道成矣昔許胤宗謂我善讀仲景書而知其意然未嘗專用其方誠名言哉奇效良方序翼醫通考下醫道古醫十四科古醫十四科中有脾胃科而今亡之矣道藏經中頗有是說自宋元以來止用十三科考醫政其一為風科次傷寒科次大方脈科次小方脈科次婦人胎產科次針灸科次眼科次咽喉口齒科次瘡瘍科即今之外科次正骨科次金鏃科次養生科即今修養家導引按摩咽納是也次祝由科經曰移精變氣者可祝由而已即今符咒禳禱道教是也國朝亦惟取十三科而已其脾胃一科終莫之續元李杲著脾胃論極其精詳但不言十四科之闕此不知其得舊本而加己意抑盡為創著而得上古之同然歟是誠醫道之大幸也甫觀今世醫者多不工於脾胃只用反治之法攻擊疾病以治其標惟知以寒治熱以熱治寒以通治塞以塞治通而已有寒因寒用熱因熱用通因通用塞因塞用必伏其所主而先其所因所謂從治之法則漠然無所知也及致脾胃損傷猶不加察元氣一壞變證多端如脾虛而氣短不能以續變而似喘促醫尚用降氣定喘之藥如脾虛衛氣不行變而為浮腫醫尚用耗氣利水之藥如脾虛鬱滯變而作寒熱醫尚謂外感用發散之藥大段類此虛而益虛直以氣盡身亡始用人參湯附子湯灌之於殞絕之後豈有能生之理乎自今觀之不足者十常八九況其時勢競馳驅於名利之途勞思傷脾而致病者居其大半若體實而竟為風寒暑濕之邪襲則惟攻之而即愈者亦不多見矣此故中醫治之易成功也及遇脾胃虛而致風寒暑濕之邪襲同體實者而施治之則大有間然者矣攻之不已則曰藥不瞑眩厥疾弗瘳必大攻之脾胃益傷而疾愈篤技窮無措則曰難醫時弊如斯曷可勝紀要皆不知本之故也經曰得谷者生失谷者亡又曰有胃氣者生無胃氣者死然則胃氣穀氣得非人身之本歟醫通神明凡為醫者須略通古今粗守仁義絕馳騖利名之心專博施救援之志如此則心識自明神物來相又何慼慼沽名齪齪求利也如不然則曷止姜撫沽譽之慚逮華佗之矜能受戮乎醫藥之難五經四部軍國禮服若講用乖越者止於事蹟非宜耳至於湯藥一物少有乖謬便性命及之千乘之君百金之長可不深思戒慎耶昔許太子侍藥不嘗加以殺君之罪季康子饋藥仲尼有未達之辭知其醫藥之不可輕也晉時才人欲刊正周易及諸藥方先與祖訥共論辯釋經典縱有異同不足以傷風教至於湯藥小小不達便致壽夭所由則後人受弊不少何可輕以裁斷祖之此言可為仁識足為龜鑑矣醫說五難嗚呼醫其難言乎人之生也與天地之氣相為流通養之得其道則百順集百邪去苟失其養內傷於七情外感於六氣而疾生焉醫者從而治之必察其根本枝末其實也從而損之其虛也從而益之陰平陽秘自適厥中粗工或昧乎此實實虛虛損不足而益有餘病之能起者鮮矣此其難一也氣血之運必有以疏載之左右手足各備陰陽者三陽既有太少矣而又有陽明者何取兩陽合明之義也陰既有太少矣而又有厥陰者何取兩陰交盡之義也何經受病宜用何劑治之治之固不難又當知有引經之藥能循此法則無疾弗瘳矣粗工不辨十二經而一概施之譬猶羅雀於江罾魚於林萬一或幸而得之豈理也哉此其難二也歲氣有不同攻治亦異其宜曰升降曰浮沉吾則順而承之曰寒熱曰溫涼吾則逆而反之庶幾能全其天和而不致顛倒錯謬粗工則倀倀然當順則反逆當逆則反順如言人適野不辨乎東西此其難三也病有寒熱熱者當投涼寒者宜劑之以溫此恆理也然寒熱之勢方劇而遽欲反之必扦格而難入熱因熱用寒因寒用其始則同其終則異庶幾能成其功粗工則不察而混治之此其難四也藥性有陰陽而不專於陰陽有所謂陽中之陰陰中之陽差之毫釐謬以千里粗工則不核重輕而妄投之此其難五也宋學士文集良醫物理論曰夫醫者非仁愛之士不可托也非聰明達理不可任也非廉潔淳良不可信也是以古之用醫必選明良其德能仁恕博愛其智能宣暢曲解能知天地神祗之次能明性命吉凶之數處虛實之分定順逆之節原疾病之輕重而量藥劑之多少貫微通幽不失細少如此乃謂良醫豈區區俗學能之哉初學記時醫俗云明醫不如時醫蓋謂時醫雖不讀書明理以其有時運造化亦能僥效常自云趁我十年時有病早來醫又云饒你讀熟王叔和不如我見病證多里諺有云左心小腸肝膽賢時來每日有千錢所謂明醫不如時醫良以此也衛生寶鑑所謂福醫昔人病四肢困倦躁熱自汗氣短飲食少進咳嗽痰涎胸膈不利大便秘形羸一歲更數醫不愈或曰某處有時醫雖不精方書不明脈候看證極多治無不效患者信而延治及至診之曰此病食滯予治之多矣許必效遂灸肺俞藥以蠲飲等丸並消導之劑不數服大便瀉泄加以腹痛飲食不進而死經曰形氣不足病氣不足陰陽俱不足瀉之則重不足此陰陽俱弱血氣皆盡補之惟恐不及反以小毒之劑瀉之虛之又虛損之又損不死何待夫明醫治病先審歲運太過不及察人形氣勇怯之殊病有虛實淺深在臟在腑之別治有緩急反正之異孫真人云凡為大醫先通儒書然後熟解內經素問本草仲景東垣諸書方可以為大醫治療司命如正五音者必取師曠之律呂成方圓者法公輸之規矩五音方圓特末技耳尚取精於事者況醫為人之司命不精則殺人今之患者不達此理委命於時醫亦猶自暴自棄甘於溝壑者何異哉本集名醫醫為司命之寄不可權飾妄造所以醫不三世不服其藥九折臂者乃成良醫蓋謂學功精深故也今之承藉者多恃衒名價不能精心研習京邑諸人皆尚聲譽不取實學聞風競獎其新學該博而名稱未播以為始習多不信用委命虛名良可惜也陶氏序支秉中曰昔越人因魯公扈志強氣弱足於謀而寡於斷趙齊嬰志弱氣強少於慮而傷於專乃飲以藥酒易置二人之心使俱為名士予觀今之求醫者率以有時名者為重初不計其書之讀不讀脈之明不明謂之時醫福醫名醫一承權貴所舉輒憑治療雖殺其身委命無怨故為醫者往往奔走權門諂容卑態以求薦網利沽名知者笑議仁心仁聞毫蔑有也安得飲以藥酒而俱易其心乎隱醫醫之為道由來尚矣原百病之起愈本乎黃帝辨百藥之味性本乎神農湯液則本乎伊尹此三聖人者拯黎元之疾苦贊天地之生育其有功於萬世大矣萬世之下深於此道者是亦聖人之徒也賈誼曰古之至人不居朝廷必隱於醫卜孰謂方技之士豈無豪傑者哉續醫說巫醫論語曰人而無恆不可以作巫醫孔子嘆人不可以無恆而善其言之有理朱子注云巫所以交鬼神醫所以寄死生歧而二之似未當也夫醫之為道始於神農闡於黃帝按某病用某藥著有內經素問所謂聖人墳典之書以援民命安可與巫覡之流同日而語耶但學醫者有精粗不同故名因之有異精於醫者曰明醫善於醫者曰良醫壽君保相曰國醫粗工昧理曰庸醫擊鼓舞趨祈禳疾病曰巫醫以巫而替醫故曰巫醫也是則巫覡之徒不知醫藥之理者也故南人謂之巫醫者此也今世謂之端公太保又稱為夜行卜士北方名之師婆雖是一切虛誕之輩則亦不可以無恆也矧他乎陸宣公裒方書陸宣公在忠州裒方書以度日非特假此以避禍蓋君子之存心無所不用其志也前輩名士往往能醫非止衛生亦可及物而今人反恥言之近時士大夫家藏方或集驗方流布甚廣皆仁人之用心本事單方近已刻於四明及本朝諸公文集雜說中名方尚多未有見類而傳之者予屢欲為之恨藏書不廣倘有能因予言集以傳於人亦濟物之一端也醫說呂誨以醫喻政宋呂誨上神宗疏云臣本無宿疾偶值醫者用術乖方殊不知脈候有虛實陰陽有逆順治療有標本用藥有先後妄投湯劑率意任情差之指下禍延四肢寖危心腹之變雖以身疾喻朝政深切醫之弊也有生而業醫者可不為之戒哉通鑑郁離子論醫治天下其猶醫乎醫切脈以知證審證以為方證有陰陽虛實脈有浮沉細大而方有補瀉針灼湯劑之宜參苓薑桂硝黃之藥隨其人之病而施焉當則生不當則死矣是故知證知脈而不善為方非醫也雖有扁鵲之識徒嘵嘵而無用不知證不知脈道聽途說以為方語人曰我能醫是賊天下者也故治亂證也紀綱脈也道德刑政方與法也人才藥也夏之政尚忠殷乘其弊而救之以質殷之政尚質周乘其弊而救之以文秦用酷刑苛法以箝天下天下苦之而漢乘之以寬大守之以寧壹其方與證對其用藥也無舛天下之病有不瘳者鮮矣又曰一指之寒弗燠則及於手足一手足之寒弗燠則困於四體氣脈之相貫也忽於微而至大故疾病之中人也始於一腠理之不知或知而惑之也遂至於大而不可救以死不亦悲夫噫若郁離子者可謂深得醫之情矣趙從古議儒醫慶曆中有進士沈常為人廉潔方直性寡合後進多有推服未嘗省薦每自嘆曰吾老倒場屋尚未免窮困豈不知天命也乃入京師別謀生計因遊看至東華門偶見數朝士躍馬揮鞭從者雄盛詢之市人何官位也人曰翰林醫官也常又嘆曰吾窮孔聖之道焉得不及知甘草大黃之輩也始有意學醫次見市廛貸藥者巧言艱苦復又恥為疑貳不決與同人共議曰吾輩學則窮達方書師必趨事名公真非常流也是時醫官趙從古為太醫醫師常輒以長書請見從古迎候非謂輕怠常曰此來窮蹇之人因同人相勉令學醫聞君名公也故來師問從古曰醫術比之儒業固其次也蓋動關性命非謂等閒學者若非性好專志難臻其妙足下既言窮蹇是志未得遂復卻學醫深恐鬱滯之性未能精研常慍色曰吾雖窮蹇乃自服儒讀孔孟之書粗識歷代君臣治國之道今徒志學伎術豈為高藝從古曰恐非淺嘗能矣未諭上古三皇醫教且勿論如漢之張仲景晉之葛洪齊之褚澄梁之陶隱居非不服儒有才行輩吾聞儒識禮義醫知損益禮義之不修唯昧孔孟之教損益之不分最害命之至豈可輕哉醫儒一事醫為儒者之一事不知何代而兩途之父母至親者有疾而委之他人俾他人之無親者反操父母之死生一有誤謬則終身不復平日以仁推於人者獨不能以仁推於父母乎故於仁缺朋友以義合故赴其難難雖水火兵革弗顧故周其急急雖金玉粟帛弗吝或疾則曰素不審他者曰甲審遂求甲者渠曰乙審又更乙者紛紛錯擾竟不能辨此徒能周赴於瘡痍而不能攜友于死生也故於義缺己身以愛為主飲食滋味必欲美也衣服玩好必欲佳也嗣上續下不敢輕也疾至而不識任之婦人女子也任之宗戚朋友也任之狂巫瞽卜也至危猶不能辨藥誤病焉也故於知缺夫五常之中三缺而不備故為儒者不可不兼夫醫也故曰醫為儒者之一事原機啟微序醫儒同道金華戴叔能曰醫以活人為務與吾儒道最切近自唐書列之技藝而吾儒不屑為之世之習醫者不過誦一家之成說守一定之方以幸病之偶中不復深探遠索上求聖賢之意以明夫陰陽造化之會歸又不能博極群書採擇眾議以資論治之權變甚者至於屏棄古方附會臆見展轉以相迷而其為患不少矣是豈聖賢慈惠生民之盛意哉九靈山房集一理貫通傷寒內傷婦女小兒皆醫者通習也不知何代而各科之今世指某曰專某科復指某者曰兼某科又指某者曰非某科殊不知古有扁鵲者過邯鄲貴婦女則為女醫過雒陽聞周人愛老人即為耳目痹醫入咸陽聞秦人愛小兒即為小兒醫隨俗為變曾不分異而為治也既曰醫藥則皆一理貫通又云此長彼短亦不善於窮理者也醫貴權變王忠文公云李明之弟子多在中州獨劉守真之學傳之荊山浮圖師師至江南傳之宋中人羅知悌而南方之醫皆宗之矣及國朝天下之言醫者非劉氏之學弗道也劉李之法雖攻補不同會而通之隨證而用之不行其存乎吳中稱良醫師則以能持東垣者謂之王道持張劉者謂之伯道噫堯舜以揖讓湯武以干戈苟合道濟世何必曰同吾嘗病世之專於攻伐者邪氣未退而真氣先縈然矣專於補養者或致氣道壅塞為禍不少正氣未復而邪氣愈熾矣古人有云藥貴合宜法當應變泥其常者人參反以殺人通其變者烏頭可以活命孫真人所謂隨時增損物無定方真知言哉續醫說國朝醫學今世之業醫者挾技以診療則有之矣求其從師以講習者何鮮也我太祖內設太醫院外設府州縣醫學醫而以學為名蓋欲聚其人以斆學既成功而試之然後授以一方衛生之任由是進之為國醫其嘉惠天下生民也至矣某嘗考成周所以謂之醫師國朝所以立為醫學之故精擇使判以上官聚天下習醫者俾其教之養之讀軒岐之書研張李之技試之通而後授之職因其長而專其業稽其事以制其祿則天下之人皆無天閼之患而躋仁壽之域矣是以醫為王政之一端也大學衍義補醫學須會群書之長醫之為道非精不能明其理非博不能至其約是故前人立教必使之先讀儒書明易理素難本草脈經而不少略者何也蓋非四書無以通義理之精微非易無以知陰陽之消長非素問無以識病非本草無以識藥非脈經無以從診候而知寒熱虛實之證矣故前此數者缺一不可且人之生命至重病之變化無窮年有老幼稟有厚薄治分五方令別四時表裡陰陽寒熱須辨臟腑經絡氣血宜分六氣之交傷七情之妄發運氣變遷不常制方緩急尤異更復合其色脈問其起居證有相似治實不同聖賢示人略舉其端而已後學必須會群書之長參所見而施治之然後為可醫學集成針灸藥三者備為醫之良扁鵲有言疾在腠理熨焫之所及疾在血脈針石之所及其在腸胃酒醪之所及是針灸藥三者得兼而後可與言醫可與言醫者斯周官之十全者也曩武謬以活人之術止於藥故棄針與灸而莫之講每遇傷寒熱入血室閃挫諸疾非藥餌所能愈而必俟夫刺者則束手無策自愧技窮因悟治病猶對壘攻守奇正量敵而應者將之良針灸藥因病而施治者醫之良也醫不可用孟浪夫用藥如用刑誤即便隔死生然刑有司鞫成然後議定議定然後書罪蓋人命一死不可復生故須如此詳謹用藥亦然今醫者至病家便以所見用藥若高醫識病知脈藥相當如此即應手作效或庸下之流孟浪亂施湯劑逡巡便至危殆如此殺人何太容易良由病家不善擇醫平日未嘗留心於醫術也可不慎哉本草類方庸妄議醫世間多有病人親友故舊交遊來問疾其人曾不經事未讀方書自騁了了詐作明能談說異端或言是虛或道是實或云是風是云是氣紛紛謬說種種不同破壞病人心意不知孰是遷延未就時不待人焰然致禍各自走散是須好人及好名醫識病深淺探賾方書博覽古今方可倚任不爾太誤人事千金方醫業不精反為夭折相彼天下之人所重者生也生之所繫者醫也醫之所原者理也上古有黃帝岐伯扁鵲華佗蘇死更生醒魂奪命之術以至三代而降學是者疏莽聊略不致精玄時時有賊夫人者何也蓋於陰也而體之以陽陽也而擬之以陰虛也而推之以實實也而度之以虛外也而揣之以內內也而像之以外急也而料之以緩緩也而億之以急進也而窺之以退退也而探之以進孟浪以診其脈浮淺以察其證蒼黃以稽其聲恍惚以徵其色所以顛倒施矇聵之工舛差用跣盲之藥斬綿綿未艾之年絕婉婉方增之齒俾含枉而下世抱屈而歸泉天下之夭折者誠為庶哉嗟嗟醫本活人學之不精反為夭折劉黨二書序庸醫速報醫學貴精不精則害人匪細間有無知輩竊世醫之名抄檢成方略記難經脈訣不過三者盡之自信醫學無難矣此外惟修邊幅飾以衣騎習以口給諂媚豪門巧彰虛譽搖搖自滿適以駭俗一遇識者洞見肺肝掣肘莫能施其巧猶面諛而背誹之又譏同列看書訪學徒自勞苦凡有治療率爾狂誕妄投藥劑偶爾僥效需索百端凡有誤傷則曰盡命俗多習此為套而曰醫學無難豈其然乎於戲而醫日相流於弊矣無怪乎縉紳先生之鄙賤矣欲其有得真醫亦寡矣幸天道好生而惡殺速昭其報施庸橫早亡人皆目擊邇有士人被誤藥而立斃家人訟之法司拘而審律不過笞罪隨釋而馳歸未逾年被賊肢解而死景非天道之報耶小說嘲庸醫早亡詩云不肖誰知假賢良莫識真庸醫不早死誤盡世間人豈非天道惡之耶故甫嘗戒諸子弟醫惟大道之奧性命存焉凡業者必要精心研究以抵於極毋謂易以欺人惟圖僥倖道藝自精必有知者總不謀利於人自有正誼在己易曰積善積惡殃慶各以其類至安得謂不利乎醫僧庸妄治病速死陳汝中嘗病脾胃鬱火之證求治於盛用美診其脈曰如此治可生如彼治即死如此治可以少生如彼治可以速死既而治之汝中遲其效或以浮屠善醫薦者汝中惑其說遂求治飲其藥嘔血一升遂死噫醫以用藥藥以攻病病不能去而反以致死則何以醫藥為哉彼浮屠者乃庸妄人也目不識醫經口不辨藥性指不察脈候人之虛實病之新久一切置之不問而惟毒藥攻擊之其殺人蓋亦多矣予咎汝中之不善擇醫而致速死特書此以為世輕服藥者之戒吳文定公家藏集醫本仁術醫以活人為心故曰醫仁術有疾而求療不啻求救焚溺於水火也醫當仁慈之術須披髮攖冠而往救之可也否則焦濡之禍及寧為仁人之安忍乎切有醫者乘人之急而詐取貨財是則孜孜為利蹠之徒也豈仁術而然哉比之作不善者尤甚也天道豈不報之以殃乎今見醫家後裔多獲餘慶榮擢高科此天道果報之驗奚必計一時之利而戕賊夫仁義之心甚與道術相反背有乖生物之天理也從事者可不鑑哉陸宣公論醫不貪色宣和間有一士人抱病纏年百治不瘥有何澄者善醫其妻召至引入密室告之曰妾以良人抱疾日久典賣殆盡無以供醫藥願以身酬澄正色曰娘子何以出此言但放心當為調治取效切毋以此相汙不有人誅必有鬼神譴責未幾良人疾愈何氏一夕夢入神祠判官語之曰汝醫藥有功不於艱急之際以色欲為貪上帝令賜錢五萬貫官一員未幾月東宮疾國醫不能治有詔召草澤醫澄應詔進劑而愈朝廷賜錢一如夢醫說病證病之所由夫病之所由來雖多端而皆關於邪邪者不正之因謂非人身之常理風寒暑濕飢飽勞逸皆各是邪非濁鬼氣疫癘者矣人生氣中如魚在水水濁則魚瘦氣昏則人病邪氣之傷人最為深重經絡既受此氣傳入臟腑臟腑隨其虛實冷熱結以成病病又相生故流通遂廣精神者本宅身以為用身既受邪精神亦亂神既亂矣則鬼靈斯入鬼力漸強神守漸弱豈得不至於死乎古人譬之植楊斯理當矣但病亦別有先從鬼神來者則宜以祈禱祛之雖曰可祛猶因藥療致益李子豫有赤丸之例是也其藥療無益者是則不可祛晉景公膏肓之例是也大都鬼神之害則多端疾病之源惟種蓋有輕重者爾三說本草病名不同凡古今病名率多不同緩急尋檢常致疑阻若不別判何以示眾自如世人呼陰毒傷寒為劇病實陰易之候命一疾而涉三病以此為治豈不甚遠殊不知陰毒少陰陰易自是三候為治全別古有方證其說甚明今乃混淆害人最急又如腸風臟毒咳逆慢驚遍稽方論無此名稱深窮其狀腸風乃腸痔下血臟毒乃痢之蠱毒咳逆者噦逆之名慢驚者陰癇之病若不知古知今何以為人司命加以古人經方言多雅奧以痢為滯下以蹷為腳氣以淋為癃以實為秘以天行為傷寒以白虎為歷節以膈氣為膏肓以咳嗽為咳逆以強直為痙以不語為喑以緩縱為痱以怔忪為悸以痰為飲以黃為癉諸如此類可不討論況病有數候相類二病同名者哉宜其視傷寒中風熱病瘟疫通曰傷寒膚脹鼓脹腸覃石瘕率為水氣療中風專用乎痰藥指帶下或以為勞疾伏梁不辨乎風根中風不分乎時疾此今天下醫者之公患也是以別白而言之千金方定神為先太史公曰凡人所生者神也所託者形也神大用則傷形大勞則敝形神離則死故聖人重之由是觀之神者生之本也形者生之具也不先建其神而曰我有以治天下何由哉秦漢文固元為本脾土上應於天亦屬濕化所以水穀津液不行即停聚而為痰飲也夫人之病痰火者十之八九老人不宜速降其火虛人不宜盡去其痰攻之太甚則病轉劇而致危殆須以固元氣為本凡病推類而治之亦思過半矣崆峒子耗散真元五勞者五臟之勞皆因動作勉強用力過度曰勞索短新書云受氣貪欲則為勞夫人身之真元根本氣血津液是也世之勞擦之證最為難治蓋因人之壯年恣意酒色以致耗散真元不生津液遂至嘔吐血痰骨蒸體熱腎虛精憊面白頰紅白濁遺精及痰涎痰嗽謂之火乘金候重則半年死輕則一年必危俗醫不究其源更以大寒大熱之藥妄投亂進殊不知大寒則氣愈虛大熱則血愈竭是以世之犯此疾者多不能免於死由醫之不得其人也良可憫哉續醫說外感內傷諸病四時之中有寒暑燥濕風氣相搏善變諸疾須預察之稍失防閒則並能中人又有時行瘟癘瘴瘧等疾遞相傳染者而人之五臟有大小高下堅脆端正偏傾六腑亦有長短薄厚緩急稟賦不同各如其面目有疾恙至少者有終身長抱一疾者其飲食五味禽魚蟲菜果實之屬性有偏嗜者金石草木血肉苦辛之藥素有服餌者又有貴者後賤富者後貧有常富貴者有暴富貴者有暴苦暴樂者有始樂終苦者有離絕蘊結憂恐喜怒者故富者惡勞驕惰情消多事則勞神多語則氣諍多笑則腑傷多恐則志懾多樂則意逸多喜則錯妄多懼則百脈不定多惡則憔悴無歡多好則昏述不定此又非邪所中而得之於內者也良工必精審察其由先知病者臟腑經絡所病又別外感內傷所致則可舉萬全矣醫說痛隨利減辨經曰諸痛為實痛隨利減又曰通則不痛世皆以利為下之者非也假令痛在表者汗之則痛愈在裡者下之則痛愈痛在血脈者散之行之則痛愈豈可以利字只作下之者乎但將利字訓作通字或作導字則可矣是以諸痛為實痛隨利減假汗而通導之則利也下而通導之亦利也散氣行血皆通導而利之也故曰痛隨利減六淫陽淫熱疾則拒熱亦須看虛實以涼之陰淫寒疾則怯寒而身拒須憑溫藥以治之風淫末疾末四肢也必身強直此乃動性不調須和冷熱以平治之在陽則熱在陰則寒故寒則筋攣骨痛熱則萎緩不收兩淫腹疾濡泄濕氣要憑滲燥之方更看冷熱之候晦淫惑疾晦邪所淫精神熒惑當平正氣而可痊明淫心疾狂邪重盛譫妄多言憂愁轉甚此二氣同一皆引心胸之虛邪孫尚藥曰夫風者天地之號令物性之動氣人雖萬物之貴不能撙節觸冒四時乘精氣虛邪而入於腠理積之微末累傷重並滿而大作或不慎味欲所傷又感虛邪實邪以干正氣搏陽經則痿厥而肢體不收襲陰經則筋攣絡急中風之名因茲而起初得小中之候漸作癱瘓之疾故風趨百竅獨聚一肢言語謇澀形若癡人醫者妄令吐瀉用藥躁煩十無一痊致使人手足不仁精神昏亂殊不知內不能通外不能泄致瞀悶形死又不知道泄之藥亦不宜大吐大下似此治療往往五死五生雖其人稟性充實亦為受苦彌甚不幸遂至枉死竊觀自古聖賢治療有法十有九驗夫療病之法必先推四時虛實以詳中風之由依繩墨拯濟乃是解死脫厄之路四時之病春中時風自東而來名曰溫風蓋時不和而傷人也浮而輕淺可汗而解敗毒羌活細辛之類更看發起在陰在陽而得效若其人自虛羸從後而來名曰虛風中人煩悶肢體攣痹不仁便可服續命湯八風湯成劑頓服更加灸法三五日間勢必減退漸漸調和以求生路如從前來名曰實風亦主人瞀悶脈緊浮大宜以茯神湯西州續命湯求效不用大劫自使勢慢須緩治之千金曰風者百病之長又曰治風不以續命湯治之則不為治風所以見聖人之心矣雞峰方脫營內經疏五過論曰嘗貴後賤雖不中邪病從內生名曰脫營啟玄子云神屈故也以其貴之尊榮賤之屈辱心懷慕眷志結憂惶雖不中邪病從內生血脈虛減名曰脫營凡病此者心思鬱結憂慮不已飲食少思精神日減氣血漸衰形容枯槁粗工不察妄投藥餌速死有期故經所論治有五過者是也病不可治有六失病不可治有六失者失於不審失於不信失於過時失於不擇醫失於不知病失於不知藥六失之中有一於此即為難治非止醫家之罪亦病家之罪也矧又醫不慈仁病者猜鄙二理交馳於病何益由是言之醫者不可不慈仁不慈仁則招禍病者不可猜鄙猜鄙亦招禍賢者洞達物情各就安樂亦治病之一說耳千金方引史記云驕恣不論於理一不治輕身重財二不治衣食不能適三不治陰陽並臟氣不定四不治形羸不能服藥五不治信巫不信醫六不治有一於此則重難治也病有自誤病之始起不能早治以其淺薄視之泛常及致日月久淹積小成大乃求醫藥法不及用而勢已盈豈為天命病有變證凡診脈形證相應因與服湯食頃變大吐下腹痛是為變怪或有舊時服藥今乃發作是亦謂之災怪耳大病小愈不守禁忌丹溪云胃氣者純清沖和之氣人之所賴以為生者也若謀慮神勞動作形苦嗜欲無節思想無窮飲食失宜藥餌違法皆能致傷既傷之後須用調和恬不知怪或於病將小愈而乃恣意犯禁舊病未除而新證疊起吾見醫藥將日不暇給而戕賊之胃氣無復完全之望去死近矣愚見患者小愈胃氣才回咸謂以為能食者不死率意恣欲妄投厚味惟其不嗜勝人為憂噫弗思甚也殊不悟厚味助邪古人攝養每以寡嗜欲薄滋味為先況病人傷敗之際而又重傷其不危殆者寡矣又見久病之人少愈而目尚昏腰尚重謂病久鬱抑精閉不通率喻入房以疏鬱結往往一行而病遽起反至不救者多矣飲食不節反輕為重轉安為危者歷歷有之此天下之通弊惟賢者知之直指病機賦醫寄死生斯術之大須資賢智勿信庸愚最要變通不宜固執洞明脈病藥治之理詳悉望聞問切之情藥推寒熱溫涼平和之氣辛甘淡苦酸鹹之味升降浮沉之性宣通補瀉之能脈究浮沉遲數滑澀之形表裡寒熱虛實之應阿阿春柳之和弦鉤毛石之順藥用君臣佐使脈分老幼瘦肥藥乃天地之精藥宜切病脈為氣血之表脈貴有神病有外感內傷風寒暑濕燥火之機治有宣通補瀉輕重滑澀燥濕之劑外感異乎內傷寒證不同熱證外感宜散而內傷宜補寒證可溫而熱證宜清清溫得宜須臾病愈補瀉失度頃刻人亡外感風寒宜分經而解表外感風寒傳變不一宜分經絡散解方可內傷飲食可調胃以消溶內傷飲食只在一處不過調胃消導而已胃陽主氣司納受陽常有餘脾陰主血司運化陰常不足胃乃六腑之本脾為五臟之源胃氣弱則百病生脾陰足而萬邪息調和脾胃為醫中之王道節謹飲食為卻病之良方病多寒冷鬱氣氣鬱發熱或出七情動火火動生痰有因行藏動靜以傷暑邪或是出入雨水以中濕氣亦有飲食失調而生濕熱倘或房勞過度而動相火制伏相火要滋養其真陰祛除濕熱欲燥清其脾胃外濕宜表散內濕宜淡滲陽暑可清熱陰暑可散寒尋火尋痰分多分少而治究表究里或汗或下而施痰因火動治火為先火因氣生理氣為本治火輕者可降重者從其性而升消理氣微則宜調甚則究其源而發散實火可瀉或瀉表而或瀉里指外感也虛火宜補或補陰而或補陽指內傷也暴病之謂火怪病之謂痰寒熱濕燥風五痰有異清涼燥潤散五治不同有因火而生痰有因痰而生火或郁久而成病或病久而成郁金木水火土五郁當分瀉折達發奪五法宜審鬱而生火生痰而成病病則耗氣耗血以致虛病有微甚治有逆從微則逆治甚則從攻病有標本急則治標緩則治本法分攻補虛而用補實而用攻少壯新邪專攻是則老衰久病兼補為規久病兼補虛而兼解鬱陳癥或盪滌而或消溶積在胃腸可下而愈塊居經絡宜消而痊女人氣滯於血宜開血而行氣男子陽多乎陰可補陰以配陽蓯蓉山藥男子之佳珍香附縮砂女人之至寶氣病血病二者宜分陽虛陰虛兩般勿紊陽虛氣病晝重而夜輕血病陰虛晝輕而夜重陽虛生寒寒生濕濕生熱陰虛生火火生熱熱生風陽盛陰虛而生火火逼血而錯經妄行陰盛陽虛則生寒寒滯氣而周身浮腫陰虛生內熱陽虛畏外寒補陽補氣用甘溫之品滋陰滋血以苦寒之流調氣貴用辛涼和血必須辛熱陽氣為陰血之引導陰血為陽氣之依歸陰陽兩虛惟補其陽陽生而陰長氣血俱病只調其氣氣和而血隨藏冰發冰以節陽氣之燔滋水養水以制心火之亢火降水升斯人無恙陰平陽秘我體長春小兒純陽而無陰老人氣多而血少肥人氣虛有痰宜豁痰而補氣瘦人血虛有火宜降火以滋陰膏粱無厭發癰疽燥熱所致淡薄不堪生腫脹寒濕而然北地聳高宜清熱而用燥南方汙下可散濕以溫寒治療治療須法素問凡治病必明天道地理人之強弱必問起居飲食暴樂暴苦病從內而之外者先治其內後治其外病從外而之內者先治其外後治其內內外不相及則治主病急則治其標緩則治其本先其所因而後其所主補上治下制以緩補下治上制以急大毒治病十去其六中毒治病十去其七小毒治病十去其八無毒治病十去其九必養必和俟其來復此皆素問之文而醫家之所當知也不能盡錄姑攝其要以示其概云柏齋三書治病委之庸醫比之不慈不孝夫醫之道大矣自神農黃帝岐伯雷公而下無非聖哲開其源賢智導其流故能拯黎元之疾苦贊天地之生育世道既降士大夫以此為技藝不屑為之而界之凡流是以至精至微之理而出於至卑至賤之思其不能起人之疾反以夭其命者多矣此范文正公所以自謂不為良相則為良醫伊川先生有云治病而委之庸醫比之不慈不孝自昔卓然名家者如和緩扁鵲淳于意張仲景孫真人等其論醫也莫不以保養為先藥石為輔至於察形診脈必致辨於毫芒疑似之末而深痛夫世之醫者苟簡虛憍顧乃以醫之伐病如將之伐敵當用背水陣以決勝是徒見夫華佗之說時出其間至於剖腹續筋之法乃別術所得非神農本草經方條理藥性常道爾今惟仲景一書為眾方之祖學者當取法云醫說序虛實分治夫疾病之生也皆因外感內傷生火生濕濕熱生痰四者而已審其少壯新病是濕則燥之是火則瀉之濕而生熱則燥濕而兼清熱火而生痰則瀉火而兼豁痰無餘蘊矣審其衰老久病又當攻補兼施如氣虛而有濕熱痰火則以四君子湯補氣而兼燥濕清熱豁痰瀉火如血虛而有痰火濕熱則以四物湯補血而兼瀉火豁痰清熱燥濕如此則攻補合宜庶乎可也故曰少壯新病攻邪可審老衰久病補益為先若夫陰虛火動脾胃衰弱真陰者水也脾胃者土也土雖喜燥然太燥則草木枯槁水雖喜潤然太潤則草木濕爛是以補脾滋腎之劑務在潤燥得宜隨證加減焉耳火濕分治肥人氣虛生寒寒生濕濕生痰瘦人血虛生熱熱生火火生燥故肥人多寒濕瘦人多熱燥也夫以人形分寒濕熱燥此得之於外然其中臟腑為病亦有寒濕燥熱之殊不可不知玉匱金鑰曰肝臟由來從火治三焦胞絡都無異脾胃常將濕處求肺與大腸同濕類腎與膀胱心小腸寒熱臨時旋摘議惡寒表熱小腸濕發熱表寒心腎熾十二經中最端的四經屬火四經濕四經有熱有寒時攻裡解表細消息裡熱表寒宜越竭表熱裡寒宜汗釋濕同寒火同熱寒熱到頭無兩說六分分來無熱寒寒熱中停真浪舌寒熱格拒病機深亢則害兮承乃制緊寒數熱脈正邪標本治之真妙訣休治風休治燥治得火時風燥了當解表時莫攻裡當攻裡時莫解表表裡如或兩可攻後先內外分多少治濕無過似決川此個筌蹄最分曉感謝軒岐萬世恩爭奈醯雞笑天小小學三法五治三法者初中末也初治之道法當猛峻所謂用藥勢疾利猛峻也緣病得之新暴感之輕得之重當以疾利猛峻之藥急去之中治之道法當寬猛相濟為病得之非新非久當以緩疾得中養正去邪相兼濟而治之養正去邪者假令如見邪氣多正氣少宜以去邪藥多正氣藥少凡加減之法如此更以臨時對證消息增減用藥仍依時令行之更加針灸其效甚速末治之道法當寬緩寬緩者謂藥性平善廣服無毒惟能安中養血氣蓋為病久邪氣潛伏欲瀉而正氣微治故以善藥養正而邪自去更加針灸其效必速五治者和取從折屬也一治曰和假令小熱之病當以涼藥和之和之不已次用取二治曰取為熱勢稍大當以寒藥取之取之不已次用從三治曰從為勢既甚當以溫藥從之為藥氣溫也味隨所為或以寒因熱用味通所用或寒以溫用或以發汗之不已又再折四治曰折為病勢極甚當以逆制之制之不已當以下奪之下奪不已又用屬五治曰屬為求其屬以衰之緣身熱陷在骨髓無法可出針藥所不能及故求其屬以衰之緣屬之法同聲相應同氣相求經曰陷下者衰之夫衰熱之法所云火衰於戌金衰於辰之類是也或有不已當廣其法而治之醫有八要治病有八要八要不審病不能去非病不去醫無可去之術也故須辨審八要庶不有誤其一曰虛五虛是也脈細皮寒氣少前後瀉泄飲食不進此為五虛二曰實五實是也脈盛皮熱腹脹前後不通悶瞀此五實也三曰冷臟腑受其積冷是也四曰熱臟腑受其積熱是也五曰邪非臟腑正病也六曰正非外邪所中也七曰內病不在外也八曰外病不在內也既先審此八要參之六脈審度所起之源繼以望聞問切何有不可治之疾也本草衍義治療先察其源療病先察其源候其病機五臟未虛六腑未竭血氣未耗精神未散服藥必活若病已成可得半已病勢已過今將難全藥劑百藥自神農始淮南子曰神農嘗百草之滋味當此之時一日而遇七十毒世本曰神農和藥濟人則百藥自神農始也世紀或云伏羲嘗味百草非也梁陶弘景本草序曰神農氏治天下宣藥療疾以拯夭傷高氏小史曰炎帝嘗百藥以治病嘗藥之時百死百生帝王世紀曰炎帝嘗味草木宣藥療疾者本草四卷至梁陶弘景唐李世績等注共二十卷皇朝開寶中重校定仁宗嘉祐中命禹錫等集類諸家雜藥之說為補註本草唐書于志寧傳中志寧云班固唯記黃帝內外經不載本草劑七錄乃稱之世謂神農嘗藥黃帝以前文字不傳以識相付至桐雷乃載篇冊然所載郡縣多漢時張仲景華佗竄語其語梁陶弘景此書應與素問同類其餘與志寧之說同也事物紀原藥有陰陽配合本草云凡天地萬物皆有陰陽大小各有色類尋究其理並有法象故羽毛之類皆生於陽而屬於陰鱗介之類皆生於陰而屬於陽所以空青法木故色青而主肝丹砂法火故色赤而主心雲母法金故色白而主肺雌黃法土故色黃而主脾磁石法水故色黑而主腎余皆以此推之例可知也藥用君臣佐使舊說藥用一君二臣三佐四使之說其意以謂藥雖眾主病者專在一物其他則節級相為用大略相統制如此為宜不必盡然所謂君者主此一方固無定本也藥性論乃以眾藥之和厚者定為君其次為臣為佐有毒者多為使此謬論也設若欲破堅積大黃巴豆輩豈得不為君也良方醫家有謂上藥為君主養命中藥為臣主養性下藥為佐使主治病大抵養命之藥宜多君養性之藥宜多臣治病之藥宜多佐使此固用藥之經然其妙則未盡也大抵藥之治病各有所主主治者君也輔治者臣也與君相反而相助者佐也引經及引治病之藥至於病所者使也如治寒病用熱藥則熱藥君也凡溫熱之藥皆輔君者也臣也然或熱藥之過甚而有害也須少用寒涼藥以監製之使熱藥不至為害此則所謂佐也至於五臟六腑及病之所在各須有引導之藥使藥與病相遇此則所謂使也余病准此此用藥之權也二義素問俱有而讀者不察故特發明之以俟夫智者採云柏齋二一書藥有宣通補瀉藥有宣通補瀉輕重滑澀燥濕十種者是藥之大綱大法而治療無出於此體認十種之用兼之寒熱溫三法足可配孫子兵法十三篇能法十三法者戰無不克醫無不效其異事而同神歟本經未言之後人未深述之故調製湯丸多昧於此今表而出之從事於醫者當體其所屬而法其施悉盡治療之道云用方增減有云古方不可以治今病噫亦過也予謂和劑局方丹溪發揮於前戴元禮祖述於後古方之用亦何負於人哉蓋用之者不得其宜也雖然證與方合其間未必盡然當因其證之旁出而增損其藥味之宜此善之善者也古方胡為不可用而遽必為拒絕乎噫亦過也故云執古方以為治謂之泥舍古方以為治謂之鑿泥也鑿也皆非也而惟隨宜活潑增減用之所謂變而裁之存乎通焉用藥權衡震澤王文恪公云今之醫者祖述李明之朱彥修其處方不出參朮之類所謂醫之王道信之本者矣然病出於變非術參輩所能效者則藥亦不得不變可變而不知變則坐以待亡變而失之毫釐則反促其死均之為不可也故曰可與立未可與權藥而能權可謂妙矣明之彥修未嘗廢權也世醫師其常而不師其變非用權之難乎震澤文集攻擊藥不可峻用傳客有病痞者積於其中伏而不得下自外至者捍而不得納從醫而問之曰非下之不可歸而飲其藥既飲而暴下不終日而向之伏者散而無餘向之捍者柔而不支胸鬲導達呼吸開利快然若愈逾月而痞五作而五下每下輒愈然客之氣一語而三引體不勞而汗股不步而慄膚革無所耗於前而其中榮然莫知其所來嗟夫心痞非下之不可已予從而下之術未爽也榮然獨何如聞楚之南有良醫焉往而問之醫嘆曰子無怪是榮然也凡子之術固如是榮然也坐吾語汝且天下之理有甚快於吾心者其未必有傷求無傷於終者則初無望其快於吾心夫陰伏而陽蓄氣與血不運而為痞橫乎子之胸中者其累大矣擊而去之不須臾而除甚大之累和平之物不能為也必將搏擊振撓而後可夫人之和氣衝然而甚微泊乎其易危擊搏振撓之功未成而子之和蓋已病矣由是觀之則子之痞凡一快者子之和傷矣不終月而快者五子之和平之氣不既索乎故體不勞而汗股不步而慄榮然如不可終日也且將去子之痞而無害於和也子之燕居三月而後與之藥可為也客歸三月齋戒而復請之醫曰子之氣少復矣取藥而授之曰服之三月而疾少平又三月而少康終年而復常且飲藥不得亟進客歸而行其說然其初使人憊然而遲之蓋三服其藥而三反之也然日不見其所攻之效久較則月異而時不同蓋終歲而疾平客謁醫再拜而謝之坐而問其故醫曰是醫國之說也豈特醫之於疾哉子獨不見秦之治民乎悍而不聽令墮而不勤事放而不畏法令之不聽治之不變則秦之民嘗痞矣商君見其痞也厲以刑法威以斬伐悍厲猛摯不貸毫髮痛劃而力鋤之於是乎秦之政如建瓴流通四達無敢或拒而秦之痞嘗快矣自孝公以至二世也凡幾痞而幾快矣頑者已圮強者已柔而秦之民無歡心矣故猛政一快者歡心一已積快不已而秦之四支枵然徒具其物而已民心日離而君孤立於上故匹夫大呼不終日而百疾皆起秦欲運其手足肩膂而癱然不我應故秦之亡者是好為快者之過也昔者先王之民其初亦嘗痞矣先王豈不知砉然擊去之以為速也惟其有傷於終也故不敢求快於吾心優柔而撫存之教以仁義導以禮樂陰解其亂而除去其滯旁視而憊然有之矣然月計之歲察之前歲之俗非今歲之俗也不擊不搏無所忤逆是以日去其戾氣而不嬰其歡心於是政成教達安樂久而無後患矣是以三代之治皆更數聖人歷數百年而後俗成則予之藥終年而愈疾無足怪也故曰天下之理有快於吾心者其末也必有傷求無傷於其終則無望其快吾心雖然豈獨於治天下哉客再拜而傳其說張右丞文集藥須精審不可輕服神仙之事未可全誣但性命在天或難鍾值人生居世觸途牽縶幼少之日既有供養之勤成立之年便增妻孥之累衣食資需公私勞役而望遁跡山林超然麓澤千萬不過一耳加以金玉之費爐鼎所需益非貧士所辦學如牛毛成如麟角華山之下白骨如莽何有可遂之理考之內典縱是得仙終當有死不願汝曹專精於此若其愛養神明調護氣息節慎起臥均適寒暄禁忌飲食將餌藥物遂其所稟不為夭札者吾無間然庾肩吾常服槐實年七十餘目看細字鬚髮猶黑鄴中朝士有專服枸杞黃精朮車前得益者甚多不能一一說耳吾嘗患齒搖動欲落飲食熱冷皆苦疼痛偶見抱朴子牢牙之法早晚叩齒三百下為良行之數日即平愈今行持不輟凡欲藥餌陶隱居太清方中總錄甚備但須精審不可輕服近有王愛洲在鄴學服松脂不得節度腸塞而死為藥所誤者甚多顏氏家訓草藥不可妄服記紹興十九年三月英州僧希賜往州南三十里掃塔有客船自番禺至舟中士人攜一僕病腳弱不能行舟師閔之曰吾有一藥能治腳病如神餌之而瘥者不可勝計因賽廟飲酒頗醉乃入山採藥漬酒授病者令天未明服之如其言藥入口即呻吟云腸胃極痛如刀割截遲明死士人以咎舟師師恚曰何有此即取昨夕所餘藥自漬酒服之不逾時亦死蓋由山中多斷腸草人食之輒死而舟師所取藥為根蔓所纏結醉不擇徑投酒中是以及於禍則知草藥不可妄服也夷堅志甲志一藥不可治眾疾人有貴賤少長病當別論病有新久虛實理當別藥蓋人心如面各各不同惟其心不同臟腑亦異臟腑既異乃以一藥治眾人之病其可得乎故仲景曰又有土地高下不同物理剛柔飧居亦異是故黃帝興四方之問岐伯舉四治之能臨病之功宜須兩審如此則依方合藥一概而用亦以疏矣凡人少長老壯氣血盛衰須當別審決不可忽也本草類說處方貴簡醫者識脈方能識病病與藥對古人惟用一藥治之氣純而功愈速今之人不識病源不辨脈理藥品數多每至十五六味攻補雜施弗能專力故治病難為功也韓天爵醫通云處方正不必多品但看仲景方何等簡任丹溪云東垣用藥如韓信用兵多多益善者蓋諱之也續醫說藥宜預蓄夫高醫以蓄藥為能倉卒之間防不可售者所需也若桑寄生桑螵蛸鹿角霜天靈蓋虎膽蟾酥空青灰臘雪水之類如此甚多不能悉舉唐元澹嘗謂狄仁傑曰下之事上譬富家貯積以自資也脯臘膎胰以供滋味參朮芝桂以防疾病韓退之進學解云玉札丹砂青芝赤箭牛溲馬勃敗鼓之皮俱收並蓄待用無遺醫師之良也下工用藥無據危生羅謙甫云一千戶年七十餘秋間因內傷飲食被淋雨瀉利暴下醫以藥止之不數日又傷又瀉止而復傷傷而又瀉逾數月漸羸困飲食減少腹痛腸鳴一醫以養臟湯治之瀉止添嘔吐又一醫用丁香藿香人參橘皮煎生薑數服而嘔止又逾月終是衰弱食不進數日不大便醫曰氣血衰弱脾胃久虛津液耗少以麻仁丸潤之可也一人曰有牛山人即草澤用方不明道理所謂下工者見證不疑果決用藥治病速愈所以用利藥毒藥以劫病實者速愈求療甚多遂請視之曰此風秘也用搜風丸利之即愈僅用一服利數行而千戶斃嗚呼年高久病虛證復重瀉之安得不死所謂下工用藥無據不據理也危生其山人之謂哉煎製藥餌必親信之人凡煎制湯液丸散藥餌之屬必托親信之人而隱微不可不慎也藥餌既以合正煎制亦須得人不得其人則修制不精雖藥難效每有煎藥托以婢僕不諳事者或用烈火速干而藥汁不出或有沸溢真汁而別加茶湯每制丸藥有不潔淨雜以土灰該用酒漬而以水該用炮炙而用生如此之流咸無取效此特害之細故爾甚有仇奸嫉妒暗藏詭計或誘婢僕加入砒硇或乘空便自投蠱毒每見患家醫家未知加察屢被傷生者不可勝言及至事壞究之悔以噬臍無及故曰煎制必親信之人施藥施方夫人既以五穀養其生而亦藥石伐其病苟無藥石則寒暑勞苦之太過喜怒飢飽之無節時令不常衛生無術身貧而莫求醫藥雖富者或無良劑或客遊半道臥病而無所治療如是而夾者亦多矣且好仁之士有濟物之心或蓄一驗方或有一奇藥計力多寡精加修制廣加施惠使沉疴宿疾苦楚萬狀危惡之候一藥能愈俾呻吟變為和氣雖身貧力危難以修合濟人者誠能得奇效之方隨所治之疾印寫千百本黏之於牆壁道路之間利亦博矣補遺慎疾慎醫春甫曰聖人治未病不治已病非謂已病而不治亦非謂已病而不能治也蓋謂治未病在謹厥始防厥微以治之則成功多而受害少也惟治於始微之際則不至於已著而後治之亦自無已病而後治也今人治已病不治未病蓋謂病形未著不加慎防直待病勢已著而後求醫以治之則其微之不謹以至於著斯可見矣聖人起居動履罔不攝養有方間有幾微隱晦之疾必加意以防之用藥以治之聖人之治未病不治已病有如此論語曰子之所慎齊戰疾釋云齊所以交神明誠至而神格疾為身之生死所關戰為國家存亡所繫然此三慎誠為最大而疾與乎其中得非以身為至重耶康子具藥則曰未達不嘗可見聖人慎疾慎醫之心至且盡矣世之人非惟不知治未病及至已病尚不知謹始初微略恣意無忌釀成大患方急而求醫曾不加擇惟以其風聞或憑其吹薦委之狂愚卒以自壞皆其平日慢不究心於醫至於倉卒不暇擇請殊不知醫藥人人所必用雖聖人有所不免顧在平昔講求稔知其為明醫偶有微疾則速求之以藥治如反掌譬能曲突徙薪豈有焦頭爛額之誚丹溪論之固亦詳矣甫之膚見尤有未悉之意焉續貂之訝誠所不免有志養生者擴而充之亦未必無小補云
