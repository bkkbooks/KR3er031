body:
  text: 卷之八十七老老余編下姜橘湯治老人噎病胸滿塞悶飲食不下生薑二兩切橘皮一兩上水二升煎取一升不拘時漸服之開胃口進飲食白米飲治老人噎食入口即塞澀不下氣壅欲吐白米四合研舂頭細糠米一兩上煮飲熟下糠末調之空心服食尤益蘇煎餅子治老人冷氣塞壅虛弱食不下土蘇二兩白麵半兩以生薑汁二合調之上如常法作之空心常服潤臟腑和中椒面粥老人噎食胸脅逆滿食不下蜀椒末五錢白麵五兩上以苦酒浸椒一宿明旦取出以拌麵中今煮熟空心食之日二服蘇子粥治老人上氣喘逆腳氣不能履紫蘇子一兩熬研細以小投取汁粳白米四合淨淘上煮作粥臨熟時下蘇子汁調之空心食日一服亦溫中制豬肚補老人虛羸之氣豬肚二枚洗如常法人參半兩粳米三合乾薑二錢炮川椒去目及不開者二錢微炒蔥白去莖上諸藥搗細末入米和合入豬肚中縫合水五升鐺中煮熟空心食已飲酒一杯枸杞煎治老人虛弱生枸杞根細銼一斗以水五斗煮至一斗五升澄清白羊脊骨一具銼碎煮去滓用上用枸杞汁煮羊骨水縮至五升乃濾去骨以瓷盒盛每用一合食前溫酒一盞調服制羊頭治老人勞傷虛損白羊頭一具草蹄燒令黃色刮去皮蓽茇各五錢胡椒乾生薑半兩蔥白切豆豉各半升上用水先煮頭蹄半熟入藥更煮令爛去骨空腹任意食之日一具滿七具止禁生冷酷滑肥膩豬雞陳臭物七日羊肝羹方羊肝一具去筋膜脂細切脊𦟘肉二條細切曲末半兩枸杞根五斤銼水一斗五升煮取四升去滓上用枸杞汁煮肝肉令爛入豉一小盞蔥白七莖切碎以五味調和作羹空腹食令飽三日止慎食如上油曲餺飥治老人虛勞生胡麻油一斤粳米泔清者一升上以微火煎泔沸出貯之取合鹽湯和麵作餺飥食之豬肝羹治肝虛弱不能遠視豬肝一具細切去皮膜筋膽雞子一個蔥白一握去須細切上用豉汁煮作羹臨熟下雞子食之羊肝粥羊肝一具去筋膜細切蔥子勺炒熟為末上先用水煮蔥子熟去滓更入水下米煮粥食馬齒實粥治老人青白翳常服明目上以馬齒實一升為末每用一匙煮蔥豉粥攪和食之馬齒菜作羹食亦能明目烏雞肝粥治老人肝虛目暗上以烏雞肝一具細切用豉汁和末作羹粥食之蒼耳子粥治老人目暗上以蒼耳子半兩搗爛用水二升絞濾取淨汁和粳米半升煮粥當服蓮子粥益心神明目聰耳蓮實去殼半兩糯米三合上先以水煮蓮子熟濾出入米煮粥候熟入蓮子攪勻食竹葉粥治老人膈上風熱目赤頭疼視不見物竹葉五十片淨洗石膏三兩砂糖一兩粳子三合上以水三大盞煎竹葉石膏去滓取三盞澄清煮粥熟入糖食磁石豬腎羹治老人耳聾磁石搗碎一斤水淘去赤汁綿裹豬腎一對去脂膜細切上以水五升煮磁石取二升去石入腎以蔥豉薑椒鹽酒調和作羹空腹食作粥亦可鹿腎粥治腎氣虛損耳聾鹿腎一對去筋膜細切粳米三合上以豉汁煮作粥五味和空腹食之或羹或酒皆可鯉腦粥治老人耳聾鯉魚腦粳米上以二味和作粥空腹食之豬腎粥治老人虛耳聾豬腎一對去膜二片蔥白二根去須切薤白七莖切人參二分為末防風一分為末粳米二合上先以米及藥物著水下鍋煮候粥熟鍋中心下豬腎莫打動慢火更煮良久入五味空腹服壯陽暖下藥餅治五勞七傷遺精數溺附子一兩炮去皮弦神麯三兩乾薑三兩炮棗三十枚去皮核桂心五味子菟絲子酒浸一宿曝乾為末肉蓯蓉各一兩酒浸一宿刮去皺皮炙乾蜀椒半兩去目及合口者微炒黃色羊髓三兩酥二兩蜜四兩黃牛乳一升半白麵一升上藥為細末入面用酥髓蜜乳相和入棗熟搜於盆中蓋覆勿令通風半日頃即取出再搜令熟捭作胡餅面上以箸啄入爐𨫼中上下以火爆熱每日空腹食一枚一方入酵醋亦佳雌雞粥治老人五勞七傷益下元壯氣海年少虛損者皆可服黃雌雞一隻去毛臟生薯蕷一兩粳米三合肉蓯蓉酒浸一宿去皮先將雞爛煮去骨取汁下米及肉藥同煮下料空服食羊腎蓯蓉羹治勞傷衰弱羊腎一對去筋膜脂細切肉蓯蓉一兩酒浸二宿刮去皺皮上和作羹煮蔥白鹽如常法煮食雀粥治臟腑虛羸陽氣乏弱雀五枚治如常細切蔥白三莖去根切小米一合上將雀炒入酒一合煮少時入水一大盞半下米作粥欲熟下蔥及五味空腹食骨汁煮餅治虛損昏聾大羊尾骨一條水五大盞煮取一半蔥白五莖去須切荊芥一握陳皮一兩炮去白羊肉四兩細切面三兩上以骨汁煮藥去滓用汁搜面作索餅卻以羊肉入汁煮和以五味食之羊肉粥治羸瘦壯筋骨羊肉二斤黃耆生銼人參茯苓各一兩大棗三個粳米二合上以肉去皮留四兩細切余肉用水五大盞並藥同煮至三盞去滓用汁入米煮粥臨熟下切了生肉更煮入五味調和食之雞子索餅治虛損瘦弱雞子清四兩白麵四兩羊肉四兩炒作臛上以雞子清搜面作索餅於豉汁中煮熟入五味調和食之石英水粥治虛損風濕肢節痹疼白石英二十兩磁石三十兩上並捶碎瓦盛以水二斗浸露天安夜晴則揭去蓋每日取水作粥取一升則加新水一升服之經年氣力強盛顏如童子羊肉餅羊肉四兩白麵六兩生薑汁二合上以薑汁搜面入豉汁煮和以五味以肉作臛一日一食藿菜羹治胃虛不進食上以藿菜四兩鯽魚肉五兩同作羹常食釀豬肚治胃弱食少乏力豬肚一枚人參末橘皮去白半兩飯半碗豬脾一枚細切蔥白半握切上蔥入豬肚中和以椒醬縫合爛蒸空腹服三五料見效曲末索餅治脾虛少食多臥細曲一兩搗如面白麵五兩薑汁羊肉各三兩炒臛上以薑汁搜面並末同作索餅和椒醬每日空腹一食羊脊髓粥治老人胃弱不進飲食羊脊髓一具捶碎青粱米四合上以水五升煎髓取汁二升下米煮粥空腹食之甚效粟米粥治老人胃弱嘔吐不下食漸瘦上以粟米四合淘淨白麵四兩和勻作粥空心食日一食黃雞餛飩治老人胃弱不進飲食痿瘦黃雌雞肉五兩白麵七兩蔥白切細二合上同作餛飩如常法煮食鯽魚熟鱠治老人胃氣不和冷痢鯽魚肉九兩切作鱠豉汁七合乾薑末半兩陳皮末分上以椒醬和豉汁煮沸即下魚煮熟下五味空心食一日一食石脂餺飥治老人虛冷氣痢赤石脂五兩白麵六兩上合和作飥煮熟下蔥椒空心食三四遍則愈雌雞炙治老人脾胃虛冷下痢上以黃雌雞一隻淨如常以椒醬刷炙令熟空心漸食極補臟腑甘草湯治老人冷熱不調下痢赤白腹痛甘草一兩生薑半兩烏豆二合上銼碎以水一升煎取七合去滓空心服不過三日愈薤白粥治老人胃冷瀉泄不分水穀薤白細切一升粳米四合蔥白細切三合上和作羹下五味椒醬姜空腹常食之曲米粥治老人脾虛食不消化泄痢不止神麯炙搗末二兩青粱米四合上和作粥空心食之常服溫中極佳車前粥車前子五合綿包以水二升煎汁一升半青粱米三合上汁煮米作飯空心服日二服枸杞飲治老人煩渴口乾枸杞根白皮一升小麥一升粳米三合研上以水一斗煮前二味取汁七升下米作飲渴即服之大麥湯治老人煩渴寒食殘大麥一升赤餳一合上以水七升煮取五升去滓下餳調之渴即服黃雞羹治老人煩渴小便黃無力黃雌雞一隻治如常粳米二合蔥白一握上項同煮作羹下五味以煮爛空心食之軟豬肚治老人消渴熱中飲水不止小便無度豬肚一具淨洗蔥白一握豉五合綿包上煮爛下五味和空心切漸食之渴飲汁亦佳兔頭飲治老人煩渴飲水不止日漸羸困兔頭一個洗淨豉心五合綿包上以水七升煮取五升治渴煩熱燥悶冬瓜粥冬瓜半個去皮豉心二合綿包蔥白一握上煮作羹下五味和常食作粥尤佳煮鹿頭治老人消渴上以鹿頭一個燎去毛刮淨洗爛煮和五味空心食咽之鯉魚臛治老人水氣病腫脹氣急不食皮膚滿四肢痛不可屈伸鯉魚肉一兩蔥白一握麻子一升細研上以水濾麻子汁和煮作臛入五味椒姜和腹空時徐徐食之煮水牛肉治老人水氣病四肢腫滿喘息不寧上以水牛肉鮮肥者蒸令極熟空心切以薑醋五味調和任意食之麻子粥治老人水氣腫滿肢體疼痛冬麻子一升熬研濾汁鯉魚肉七兩切上取麻子汁下米四合和魚煮作粥以五味蔥椒空心食之煮赤豆治老人水腫急脹赤小豆三升淘淨白樟柳根細切一升上和煮爛空心常食渴即飲汁勿食雜物三服取效郁李仁粥治老人水氣面腫腹脹氣喘身困或疼郁李仁二兩研汁取半薏苡仁五合上以汁作粥空心食日再服桑白皮飲治老人水氣面目浮腫足跋脹滿喘息桑白皮切以水五升煮出汁三升半青粱米四合研細上以汁煮米作飲常服鯉魚煮豆治老人水腫手足俱脹大豆二升白朮一兩鯉魚肉一斤上以水煮令豆爛熟空心常食以汁咽之豬胰酒治老人上氣喘息坐臥不安豬胰三具細切大慄三十個上以酒三升浸秋冬三日夏一日春二日密封以布絞去滓空心溫服忌咸熱物棗煎治老人上氣喘急胸滿飲食不下大棗去核土蘇三兩餳二合上相合以微火溫令消即下棗攪之相合以微火煎令蘇餳泣盡即止每食上即啖一二枚漸漸咽汁忌咸熱炙肉薑糖煎治老人上氣咳嗽氣急煩熱飲食不下食即嘔逆腹內脹滿生薑汁五合砂糖四兩上和微火煎二十沸即止空心每含半匕漸漸咽之桃仁煎治老人上氣熱咳嗽引心腹痛桃仁二兩去皮尖炒末赤餳四合上合微煎三五沸即止空心每含半匕徐徐咽汁鯉魚臛治老人腳氣逆心煩躁鯉魚肉一斤蓴菜四兩服米二合研蔥白一提上切了以蔥和煮臛下五味姜椒調空心常食亦治水氣麻子粥治老人腳氣煩悶吐逆痹弱麻子一升炒研水濾取汁粳米四合上以麻子汁作粥空心日一服烏雞羹治老人腳氣攻胸腹脹滿烏骨雞一隻蔥白一握細切米二合研上煮熟和五味作羹常食之豬腎粥治老人腳氣痹弱不能履地豬腎一個去膜細切粳米四合蔥白半握細切上和煮作粥下五味椒姜空心日一食豉心酒治老人腳氣痹弱煩躁不安豉心二升九蒸九曝酒五升上同浸二日空心任意服制青豆治老人熱淋痛澀青豆二升陳皮二兩麻子汁一升上先以水煮上項熟卻下麻汁空心漸食並飲其汁小麥湯治老人五淋身熱腹滿上以小麥一升通草二兩水三升煮取一升去滓漸漸服愈酥蜜煎治老人淋病小便痛澀藕汁五合白蜜五合生地黃汁一升上和微火煎令如餳空心含半匙漸漸咽之忌熱及炙物蘇粥治老人五淋燥痛小便不通上以青粱米四合煮作粥臨熟下土蘇三兩空心服車前飲治老人淋病小便下血身熱車前子五合綿包煮汁青粱米四合上汁煮米作飲空心食兼能明目去熱毒羊肉索餅治老人胸膈痞塞飲食不下羊肉四兩作臛白麵六兩陳皮末一分上以薑汁搜面作如常法入五味蔥椒鹽薑豉日一食極效黃雞餺飥治老人噎氣病食不下胸滿黃雌雞四兩切作臛茯苓末二兩上以茯苓同面搜作豉汁水煮空腹食之地黃酒生地黃切一升大豆炒一升生牛蒡根切一升上以絹袋盛以酒一斗浸之五六日空心溫服任意多少勿大醉則無益雁脂酒治老人風瘓偏枯不利上以雁脂五兩熬化每日空心溫酒化半合服巨勝酒治老人風痹虛弱四肢乏力骨節疼痛巨勝一升薏苡仁二升乾地黃切半斤上以絹袋盛無灰酒一斗漬之勿令泄氣滿七日空心任意服蒼耳茶治老人風痹筋脈緩急上以蒼耳子炒為末入茶同煎每日常服槐茶治老人熱風下血兼治齒疼明目益氣上以嫩槐苗採來滾水炸之曬乾同茶葉對半煎湯當茶食前食後皆可服以病愈則止鼠粥治水腫腹脹身腫上用肥鼠一個去皮細切入粳米四合煮粥空心服一二度瘥黃雞炙治脾胃氣虛弱腸滑下痢上以黃雌雞一隻治淨炭火炙捶過以鹽醋刷又炙令熱空腹食之雌雞面治赤白痢不下食上用肥雌雞一隻細研作臛煮汁作面或餛飩空心食酥蜜煎治老人氣噎吐逆不能食上以酥油二兩白蜜薑汁各五合和微火煮稠室心服半匙桃仁粥治老人冷氣心痛不食上以桃仁二兩去皮尖研水解濾取汁入青粱米四合煮粥空心食之茱萸飲治老人冷氣心痛腹脅脹滿上用茱萸末二分以水二升煎取一升外將青粱米一合碾碎入作飲日進三服椒面餺飥治老人冷氣心痛嘔吐不下食煩悶上以椒末一兩和白麵五兩搜水煮入蔥白三莖切下五味調和食之鯉魚鱠治老人病痔下血上將鯉魚肉十兩切鱠如常入蒜醋五味每日空心食忌鮓及甜食麻子飲治老人中風頑痹上以麻子五合炒碾細水淘取汁入粳米四合煮作飲常服之大豆酒治中風口噤身體反張上用大豆二升炒令聲絕即以清酒二升投之候一二沸去滓頻服覆臥汗出即瘥口噤者抄開灌之又方兼治陰證急傷寒服之極神效烏雞臛治老人冷氣心痛腹脹胸滿坐臥不安烏骨雞半斤兩切麻子汁五合蔥白半握上煮作臛次下麻子汁五味姜椒空心食之雞腸酒治小便數上以雞腸一具洗如常法銼碎炒作臛以酒著椒蔥五味食之鶩粥治十腫水氣不瘥垂死上用青頭鴨一隻治如法細切煮極熟入粳米和五味作粥食釀蒸鴨治水氣脹滿浮腫小便澀少上以白鴨一隻去內外洗淨用饙飯半斤加薑椒蔥釀腸中縫定爛蒸熟食之野雞餛飩治脾胃氣虛下痢日夜不止上以野雞一隻治如食法細研入椒鹽蔥醬橘皮末調和以面作餛飩煮熟食之野雞湯治消渴舌焦口燥小便煩澀上以野雞一隻治如法入五味煮令極熟取汁二升半渴即飲並其肉食之白鴿煎治消渴飲水不知足上以白鴿一隻治如法切作小塊以土蘇煎含而咽其汁桃仁粥治傳屍鬼氣咳嗽痃癖日漸羸瘦上以桃仁一兩去皮尖槌碎用水三升煮去滓著粳米三合作粥食之杏仁粥治上氣喘促乳腫小便赤澀上以杏仁一兩去皮尖研入水同粳米煮作粥空心每食兩合豆花羹治寒熱泄痢兼治病酒頭痛上以小豆花入豉汁煮以五味和作羹食罌粟粥治翻胃不納飲食白罌慄米二合人參三錢生山芋五寸切上以水一升二合煮六合生薑汁並鹽少許和勻作二次食之蔥子粥治甫暗補虛上以蔥實為末每用一匙以水二升煮取一升半濾去滓入粳米煮食之煮小蒜治心痛不可忍上以小蒜去須及青葉煮頓服取飽勿用鹽久年不瘥者服永不發生粟治老人腎虛腳氣無力困乏以行生慄二斤透風處懸令乾每日空心食十顆極治腳氣有功葵菜羹治老人小便秘澀小便淋瀝煩躁痛楚四肢寒慄葵菜四兩切青粱米三合研蔥白一握上煮作羹下五味椒醬空心食之極治小便不通蒼耳羹治老人中風四肢不仁筋骨乏力蒼耳葉極嫩苗五兩豉二合煎汁上和煮作羹下米粉椒姜調和空心食之尤佳七氣湯治憂氣喜氣寒氣熱氣愁氣或因飲食為膈氣或勞氣內傷五臟不調氣衰少力乾薑黃芩厚朴或用桂心半夏制甘草栝蔞根或用陳皮芍藥乾地黃枳實去穰各二兩人參一兩吳茱萸五合川椒三兩或用桔梗上咀每服四錢水一盞煎七分不拘時溫服日三服麻豆散治衰老脾弱不能食代谷潤燥神妙大豆黃二升即豆豉大麻子三升炒黃上為末每服一合日四五次任意多少以芝麻代麻亦可五子散治衰老腸臟少津及風毒燥澀大便不通火麻仁紫蘇子松子杏仁去皮尖雙仁蔓菁子如無用芝麻代之可上等分搗爛和作一處如法爛研如泥用密器貯每以一彈子大稠蜜水化下粥內食之尤佳每日一二次即不秘秘甚則頻服三次忌燒炙煎爆辛熱等物消食斷下圓治寒冷臟滑者並宜服細曲一升吳茱萸四兩大麥糵一升上為末煉蜜丸如梧桐子每服五十丸薑湯下乾薑散治胃寒不能食乾薑曲豉川椒去目大麥糵各兩上為末每服三錢食後米湯調下日三服能食為度百效丸治痼冷風眩寒中手足冷胃寒臍冷百病五勞七傷第一令人能食二強盛三益氣四有子神驗無比生地黃取汁烏頭一百五十枚大豆三升半上將㕮咀烏頭以酒一斗半和地黃汁浸烏頭至爛絞去滓內豆於二汁中至除日曝之有餘汁更浸至汁盡為度初服二豆起漸服二十豆有病空腹服無病食後服四時合亦得二月制尤美令人能食益氣強盛有子發白反黑齒落更生先病熱人不可服家菊散治諸般頭風大能明目家菊花去蒂石膏水飛牛蒡子上等分為末每服二錢早晚食後茶酒任意調服丹參丸治腰痛及四肢冷痹疼痛丹參杜仲炒牛膝酒浸續斷各二兩桂心乾薑各二兩上為末煉蜜圓梧桐子大各服三十丸紫蘇湯下日二夜一次又腰痛方萆薢杜仲枸杞根去木各一升上咀好酒三斗漬之密封甕口於銅器中煮一日止每日恣飲取醉無節度不換金摩娑囊治遍身風毒燥癢爬不暇隨手熱瘰癧癮疹或藏頭小瘡服一切藥不能卒效者余入思多年偶制此法雖非起死之方實救災疾之窘世間妙法衰老壯年風燥皆可用烏頭附子南星各去皮臍上為末用米飲漬絲瓜穰裡外俱透就於藥末中滾碾令人更揉搦勻遍曝乾收用凡有燥癢但以此穰隨意輕重揩擦一過應手即效他日再癢仍前用之神效無比赤茯苓丸治小便赤濁人參白朮白扁豆去皮蒸各十兩赤茯苓二兩切棋子大白砂蜜浸透蒸過令乾秤兩半防己水豬苓去皮各三錢乾葛各三錢半上咀每服三錢水一盞磨沉香少許同煎食前臨臥服白龍骨丸治小便白濁白龍骨牡蠣大白者火煅赤等分為末酒糊丸如梧桐子大每服十五二十丸赤茯苓湯下不過三五服立效琥珀丸治老人小便不通琥珀赤白好者上不拘多少細研羅過煉蜜丸如梧桐子大每服二十丸赤茯苓湯吞下甚者倍加丸數立通如小便純血只以末三錢煎燈芯湯調下三五服取瘥又方車前子葉根皆可揚自然汁半盞入蜜一匙和飲立通又方治淋瀝疼痛赤茯苓苦杖各半兩㕮咀每服四錢水二碗煎一碗作二次服立通更加赤芍藥尤佳治丈夫婦人胞轉八九日不得小便滑石寒水石葵子各半升上為粗末每服一兩半水一碗煎七分溫服以效為度又方治轉胞不得小便蔥白四七莖阿膠一兩琥珀三兩車前子四兩上每服一兩水一碗煎八分溫服又方阿膠二兩水一碗煎七分服豉五合煎亦得治血淋小便滲痛雞蘇滑石通草各兩竹葉一把生地黃半斤小薊根四兩上咀每服一兩水一碗煎五分去滓溫服日三次又方治前證石葦當歸蒲黃赤芍藥各等分上為末酒服二錢熱壯者水服三次又方白茅根切一兩水煎服日再進又方大豆葉一把煮汁頓服治遺尿小便難澀牡蠣鹿茸各二兩阿膠一兩上咀每服五錢水一盞煎八分服治遺尿失禁出而不覺上以豆醬汁和灶突墨如豆大內尿孔中亦治轉胞治遺尿失禁出不自知灸陰陵泉隨年壯實腸散治虛寒滑泄水穀直瀉不止上用平胃散加肉豆蔻訶子砂仁茯苓薑棗煎如常法頻服又治虛寒滑泄不禁上用大川烏炮去皮臍赤石脂細研胡椒末各半兩乾薑炮末一兩同以糊丸梧桐子大每服三十丸空心米飲下以效為度又治腎泄每到天明必須溏瀉上用五味子二兩炒吳茱萸半兩炒為細末米飲調服極效治老人氣虛淋證人參白朮山梔仁木通上等分為咀水煎食前服治老人氣喘方真蘇子白芥子蘿蔔子各等分上洗淨紙上微炒搗碎每服三錢用絹包之入湯內煎當茶服冬月加生薑二斤二神丸治老人胃冷脾瀉破故紙四兩為末肉豆蔻四兩曲裹煨紙裹捶去油上用小紅棗蒸熟爛搗為丸米湯下治老人氣秘大腑不通紫蘇子麻子仁各等分上研爛水濾取汁煮粥食之秘傳六和丸益老扶羸助脾活血進飲食第一平和之劑熟地黃破故紙菟絲子白茯苓山藥各十兩胡桃五十個上先將熟地黃破故紙菟絲子三味酒浸一宿次早飯甑上蒸日中曝乾九浸九蒸九曝候十分乾次和白茯苓山藥二味杵臼中舂令極細末次用胡桃研爛和五味令勻用酒煮曲糊為丸如梧桐子大每服三十丸空心溫酒鹽湯下此方不犯鐵器所以佳妙神仙不老丸此方非特烏髭發大能溫養榮衛補益五臟和調六腑滋充百脈潤澤三焦活血助氣添精實髓須是節欲使藥力相須乃見功效之速歌曰不老仙方功效殊駐顏全不費工夫人參牛膝川巴戟蜀地當歸杜仲俱一味地黃生熟用菟絲柏子石菖蒲更添枸子皮兼子細末蜜丸桐子如早午臨眠三次服鹽湯溫酒任君須忌食三白並諸血能使須烏髮亦烏人參二兩牛膝去蘆酒洗淨焙乾一兩半川巴戟酒浸洗去心焙炒二兩川當歸酒洗二兩杜仲去皮切麥麩炒斷絲淨一兩半生熟地黃各一兩酒浸一宿竹刀切焙乾為末菟絲子洗去浮者酒浸煮爛作餅焙乾為末二兩柏子仁另研臨時和入眾藥一兩石菖蒲切一兩枸杞子酒浸焙乾稱一兩地骨皮酒洗淨去浮皮切焙乾一兩上十二味選之貴精制之如法不可曬只用慢火焙若大火燥則又失藥氣只八分干即於風前略吹令冷熱相激便十分燥取淨稱分兩磨如細塵煉白蜜以火日搜和入木石臼內搗數百杵丸如梧桐子大每日空心午間臨臥三次服每服七十丸溫酒鹽湯任下忌食蔥白韭白蘿蔔豆粉及藕諸般血藕能破血諸血能解藥力三白令人鬚髮返白耳三仙丹一名長壽丸老人服此飲食倍進錢都年八十須鬢皆黑詢其所以云自三十歲以後日進一服歌曰一烏二術三茴香久服令人壽命長善治耳聾並眼暗尤能補腎與膀胱順氣搜風健腰膝駐顏活血鬢難蒼空心溫酒鹽湯下誰知凡世有仙方川烏頭二兩去皮尖銼作骰子塊用食鹽半兩炒焚焦茴香三兩炒香蒼朮米泔水浸一宿用竹刀刮去皮焙乾切片用蔥白一握共炒黃二兩上為細末酒糊丸如梧桐子大每服五十丸空心食前溫酒或鹽湯下一日二服切忌諸血八仙丹治虛損補精髓壯筋骨益心志安魂魄令人悅澤駐顏輕身健體延年益壽閉固天癸伏火硃砂真磁石赤石脂代赭石石中黃禹餘糧五味並用碾末乳香沒藥各一兩上碾勻為極細末以米濃飲丸如梧桐子大或如豆大每服一粒空心鹽湯下鱠虀散治老人脾胃久弱飲食不進兩服立效王醫繼先進高廟方附子一個炮丁香藿香葉官桂木香各三錢人參五錢上為末每服二錢以尋常辣糊虀半盞熱用匙調服之人參粥治反胃吐酸水人參為末生薑取汁各半兩上水二升煮一升入粟米一合煮稀粥覺飢食之薑黃散治老人脾泄大川黃連一兩切酒洗生薑四兩淨洗和皮切如骰子塊上於淨銅鍋內炒得姜焦黃色去姜以黃連碾為細末臘茶濃煎調下二錢不拘時服脾約丸治老人津液少大便燥小便澀其脾為約方見秘結門磨積丸治老人磨滯積去浮腫厚朴一兩白姜四錢縮砂胡椒各三錢青皮五錢蒼朮麥芽各一兩陳茱萸五錢肉桂三錢上用醋同鹽煮再焙乾為細末酒糊丸如梧桐子大每服十丸日午或臥時香附子煎湯吞下陳皮湯亦得此方老幼常服快脾進食菖蒲酒通血脈調榮衛主風痹治骨痿常服耳目聰明行及奔馬延年益壽久服得與神通菖蒲一斗切蒸熟生術一斗刮皮細切上入絹袋盛用漬酒五斗入瓷甕中盛密封春冬二七秋夏一七日取開每溫飲三杯日三次令人不老面色光澤精神健康菊花酒明目壯筋骨補髓延年益壽耐老家菊五升生地黃五升枸杞根五升上搗碎以水一石煮出汁五斗炊糯米五斗細曲碎拌勻入甕內密封候熟澄清每溫服數杯隨量增減東坡云菊黃中之色香味和正花葉根實皆常生也又云仙婆高潔宜通仙靈枸杞子酒明目駐顏輕身不老堅筋骨耐寒暑療虛羸黃瘦不能食服不兩劑必得肥充枸杞子五升乾者搗生地黃切三升火麻子五升搗碎上先撈麻子令熟攤去熱氣入地黃枸杞子相和得所盛生絹袋中以好酒五斗浸之密封春夏七日秋冬二七日取服多少任意至微薰為妙醉鄉寶屑經進八仙散壯脾進食令人飲酒不醉宣和初華山貢士張老人號為鐵甕居士入山探藥遇道人在石岩坐共酌約有八人手中各出一物亦令張翁坐與少酒飲飲數杯各賜手中之物張翁熟視之乃八味藥也兼求其方名曰八仙銼散乾葛嫩白有粉者白蔻仁砂仁丁香各半兩甘草有粉者用百藥煎各一分木瓜加倍燒鹽一兩上銼細人不能飲酒者只抄一錢細嚼溫酒下即能飲酒醉鄉寶屑方無如此妙丁香餅子解酒進食溫胃去痰寬中和氣仍去積滯不消心腹堅脹痰逆嘔噦噫酢吞酸脅肋刺痛胸膈痞悶反胃噁心等證半夏制二兩丁香半兩白茯苓白朮川薑泡甘草炙橘紅去白薑汁浸白扁豆制各一兩上為末薑汁煮麵糊丸為餅棋子大每服一餅嚼細薑湯下糯米糕治老人小便數用純糯米糕一掌大臨臥炙令軟熟啖之仍以溫酒下不能飲溫湯下坐行良久待胸膈空快便睡蓋糯稻能縮水凡人夜飲酒者是夜輒不尿此糯之力也青娥丸治老人腎氣虛弱腰痛俯仰不利秘精大益陽事老人服此顏色還童少年服此行步如飛破故紙半兩以水淨洗淘過用香油少許炒杜仲五兩麩炒黃色胡桃仁五十個以糯米粥相拌臼內搗五六百下只將此粥為丸上丸如梧桐子大每服三十丸空心鹽湯或酒下此方趙進道從廣州太守處得之久服有神效遂作詩一絕以述其功十年辛苦走邊隅造化功夫信不虛奪得風光歸堂內青娥不笑白髭鬚服椒法陳曄為括歌曰青城山老人服椒得妙訣年過九十餘貌不類期耋再拜而請之忻然為我說蜀椒二斤淨解鹽六兩潔糝鹽慢火煮煮透滾菊末初服十五丸早晚不可輟每月漸漸增累之至二百鹽酒或鹽湯任君意所啜服及半年間胸膈微覺塞每日退十丸還至十五粒俟其無礙時數服如前日當令氣薰蒸否則前功失飲食蔬果等並無所忌節一年效即見容顏頓悅澤目明而耳聰須烏而發黑補腎輕腰身固氣益精血椒溫鹽亦溫菊性去煩熱四旬方可服服之幸無忽逮至數十年功與造化埒耐老更延年不知幾歲月嗜欲若能忘其效尤卓絕我欲世人安作歌故敏切蜀椒揀去梗子及閉口者淨稱三斤用淨鹽六兩糝在椒上用滾湯泡過椒五寸許經宿以銀石器慢火煮止留椒汁半盞掃乾地鋪淨紙傾椒在紙上覆以新盆封以黃土經宿取置盆內將干菊花末六兩拌滾令勻更灑所餘椒汁然後橫於篩子內曬乾菊花須花小色黃葉厚莖紫氣香味甘名曰甘菊可作羹者為真陰乾為末服椒法初服一月早晚各十五粒次月二十粒三月堵十粒至二百粒止服半年後覺胸膈間橫塞如有物礙即每月退十粒退至十五粒止俟其無礙所服仍如前須終始服之令椒氣早晚薰蒸如一日不服則前功俱費矣四旬方可服若四十歲服至老只如四十歲容顏此其驗也牢牙烏須方紹定壬辰江淮趙大使鬼復盱眙時納合行省桐公名買往來金陵予在趙監單廳同會納合年逾七十鬢髮髭皆黑質其所由謂吾國有行臺出典藩鎮髭鬚皓然數載歸朝而鬚髮皆黑人怪其異自序遇一方牢牙烏髭歲久得效因傳其方卻不言分兩續乙巳年會張經歷朝請始得分兩云旱蓮草五兩此草有兩種紫花爐火中用之此種乃白花結遠如蓮蓬故名旱蓮本草中名鯉腸草孫真人方名金陵草而江浙人謂之蓮子草芝麻芉六兩是打過柚麻枯餅子是也訶子四十個並核銼不蛀皂角二定大者晚蠶砂四兩青鹽六兩青鹽遺兩錢以食鹽代之亦可川升麻六兩上為末醋打薄糊為丸彈子大捻作餅子或焙或曬以干為度先用小口瓷罐子將紙筋泥固濟曝乾入藥餅在瓶內糖灰火中燒令煙出若煙淡時藥尚存性急退火以黃泥塞罐口候冷次日出藥旋取數丸旋研為末早晚用以擦牙少時溫湯灌漱久用之其功極大八味丸劉戴花方老人常服健體延年川巴戟兩半酒浸去心用荔枝肉一兩同炒赤色去荔枝肉不用高良薑一兩銼碎用麥門冬一兩半擊心同炒赤色為度去麥冬不用川楝子二兩去核用降真香一兩銼碎同炒油出為度去降不用吳茱萸兩半泡青鹽一兩同炒過去鹽胡蘆巴一兩用水浸過用全蠍二十個炒去全蠍不用山藥兩半同熟地黃炒焦色去地黃不用茯苓一兩用川椒一兩同炒赤色去椒不用香附米一兩酒洗淨同丹皮一兩炒赤色去丹皮上一處研為細末鹽湯煮麵糊丸如梧桐子大每服四五十丸空心食前鹽湯下溫酒亦得此方溫平補肝腎清上實下分清濁二氣補暖丹田接華池真水三車不敗五漏不生熱不留於上焦冷不侵於脾胃令人耳目聰明治積年冷病除累歲沉痾兼治遺精白濁婦人赤白帶下其效如神勝駿丸治老人元氣不足真氣虛弱諸虛寒濕氣進襲手足拳攣屈伸不得筋脈不舒行步不隨常服益精氣壯筋骨潤膚散一切風邪附子一個重八九錢制當歸一兩酒浸天麻酒浸牛膝酒浸酸棗仁炒防風各二兩熟地黃酒浸沒藥另研木香全蠍去嘴足尾梢羌活甘草炙檳榔萆薢炒蓯蓉酒浸破故紙炒巴戟各三兩木瓜四兩麝香二錢半另研乳香半兩另研上除乳香沒藥麝香另研外搗羅為細末用生地三斤淨洗石臼搗爛如泥入無灰酒四升爛煮如膏以前藥拌勻杵令堅每兩分作十丸每服一丸細嚼臨臥酒下服半月見效甚速無事人服此亦壯筋力步行如飛故名勝駿此藥之功專在地黃膏要熬得好惟春夏好合有生地黃也若合半每味藥減半即是地黃粥治老人血燥大腑秘結先將地黃切碎以酥油二合蜜一合同炒令香熟別貯之候粥欲熟乃下同煮取熟空心服有先用生地黃切二合同米下煮再入酥蜜胡麻粥壯顏色潤肌膚潤肺止嗽烏油麻不以多少去皮蒸一炊曝乾再微炒香熟每用白杭米一升胡麻半升如常煮粥法臨熟加蜜糖空心食之香甘極美乳粥補脾滋肺益元氣牛羊乳五合用白晚米五合洗淨控極干乃以乳煎令沸再加煎薑湯一依煮粥法入米煮熟傾起瓷樽中每碗用真酥油半兩令其自溶如油遍覆粥上旋攪食之為美山芋粥薯蕷生於山者名山藥一名山芋山芋取山生者為佳圃種者無味用時去皮細石磨如糊每碗粥用山芋一合酥一合蜜一合同炒令凝以匙挑粥將熟投入攪勻出食之慄粥小慄去殼切如米粒每白米一升慄肉二合用米煮熟更無他法百合粥補肺止嗽生百合一升蜜一兩用水煮熟干投入將熟粥罐中每碗用二合空心食麋角粥健筋骨滋腎氣行步艱難者宜食之妙新麋角制如粉霜即制鹿角霜法極研如粉每用二合入粥同煮少少入鹽攪粥內空心食之枸杞子粥枸杷子先用蜜一匙用水煮爛入鹽少許和入熟粥中食有研取其汁煮粥亦可薺羹俗謂薺為東風菜方言訛而為公爹菜謂可以奉公爹也東坡與彼十三書云今日食薺極美天然之珍雖不甘於五味而有味外之美其法取薺一二升許淨釋入淘子米三合冷水二升生薑槌二兩指大同入釜中澆生油一蜆殼當於羹面上不得觸動動則生油氣不可食不得入鹽醋君若知此味則陸海八珍皆可厭也天生此物以為幽人山居之祿則以奉傳不可忽也羹以物覆則易熟而羹極爛乃佳也本草云薺和肝氣明目凡人夜則血歸於肝為宿血之臟過三更不睡則朝旦而色黃燥意思荒浪以血不得歸故也若肝氣和則血脈流通津液暢潤東坡嘗有詩云時繞麥田求野薺強為僧舍煮山羹陸放翁亦有詩云少著鹽醯助滋味微加薑桂益精神風爐歙缽窮家活妙訣何曾肯授人筍鱖饌蘇東坡回錢穆父書云竹萌蒙佳貺取筍蕈菘心與鱖相和清水煮熟用薑蘿蔔自然汁及酒三物等入少鹽漸漸凝灑之過熟可食不敢獨味此請依法制與老叟共之老人有性喜茹素不忍害物者菽水之奉在家蔬藥菜料理如法殊益於人枸菊芎術等苗嫩時採食之或煮或虀或炒或醃悉用土蘇咸豉汁加鹽下飲甚良蔓菁作整絕妙不斷五辛者春秋嫩韭四時探薤甚益綠豆紫蘇烏麻須宜貯俱能下氣其餘豉醬之徒食所不可少須皆貯蓄肉食心不害但以錢買猶愈於殺第一戒慎勿殺若肉須新鮮少有氣息則不宜倉爛臟損氣切須慎之戒之乳香散治瀉痢和氣止臟毒瀉血腹內疼痛乳香少許訶子皮一錢當歸五錢木香五分上細銼與乳香微炒候當歸干為度杵為末每服二錢用陳米第三度泔六分一碗煎至五分空心午前服此方最妙患及百餘日者服之皆愈勻氣散治老人大小便不通生薑半兩大蔥一莖鹽一錢豉三十粒上搗爛安臍中良久便通香白芷散治老人臟腑冷熱不調裡急後重闌門不和香白芷二錢木香錢茯苓枳殼炒各三錢當歸酒洗三錢上為末每服一錢水半盞生薑少許同煎四分溫服七聖散治老人腳膝疼痛不能履地杜仲牛膝浸酒續斷萆薢防風獨活甘草各一兩上為末每服二錢空心酒調下溫白丸治老人脾胃一切病嘔吐瀉痢及宿食不消半夏一兩制白朮一兩炒丁香一分上為末用薑汁和飛羅面作糊丸如梧桐子大薑湯下十丸空心服腹痛並嘔逆食後服木香人參散老人和脾胃進飲食止痰逆療腹疼木香人參茯苓白朮炒陳皮甘草炙厚朴薑製乾薑泡各半兩肉豆蔻枇杷葉去毛丁香藿香各五分上為末每服二錢水一盞姜一片棗二枚煎六分食後服老人宜常服之鎮心丸養老人心氣令不健忘聰明耳目辰砂另研遠志人參各一兩茯苓二兩麥門冬石菖蒲乾地黃各半兩上為末除辰砂余煉蜜丸梧桐子大硃砂為衣空心薄荷酒吞下十丸至十五丸蓯蓉丸平補下元老人服之明目肉蓯蓉四兩巴戟枸杞子菊花各二兩上為末煉蜜丸梧桐子大每服五十丸鹽湯下青鹽煎治腎臟虛冷肝膈浮熱上衝兩目生翳黑花久不愈青鹽一兩明淨者生研蒼朮一兩米泔浸木賊一兩小便浸上為細末空心熟水調下一錢如大不見物者不過十服小可只二三服木賊散治眼有冷淚木賊木耳燒為黑各一兩上二味同研令勻每用二錢以清米泔煎熟放溫調下食後臨臥各一服磁腎羹治老人久患耳聾養腎臟強骨氣磁石一斤杵碎水淘去赤用綿裹豬腎一對細切去皮上以水五升煮磁石取二升去磁石投腎煮之調和以蔥豉薑椒作羹空腹食之作粥及入酒並可磁石常留起依前法用之金櫻子煎經霜後以竹夾子摘取於木臼中轉杵去刺勿損之劈為兩片去其子以水淘洗過爛搗入大鍋以水煎不得絕火約水耗半取出澄濾過仍重煎似餳每服空心兩匙暖酒一盞調服其效不可具載沈存中雲金櫻子止遺泄取其溫且澀世之用者待紅熟取汁熬膏大誤也十分紅熟失其本性今取半黃採之為妙十月十二月採者為佳茯苓煎白茯苓五斤去黑皮搗篩以熟絹裹盛於三鬥米下蒸之米熟即止曝乾又蒸如此二過乃取牛乳二斗合和著銅器中微火煮如膏取之每食以竹刀割取隨性任飽服之則不飢如炊食先煮葵菜汁飲之任食無害茯苓面東坡與程正輔書云舊苦痔疾二十一年今忽大作百藥不效欲休糧以清淨勝之而未能今斷酒肉與鹽酩醬菜凡有味物皆斷又斷白米飯惟食淡面一味其間更食胡麻茯苓面少許取飽胡麻即黑芝麻也去皮久蒸暴白茯苓去皮入少白蜜為美雜胡麻食之甚美如此服食多日氣力不衰而痔漸退又云既知此面及淡面更不消別藥百病自去此長年之真法也小丹老人服此益壽延年安寧神志魂魄流滋氣血脈鉻開益智慧釋散風濕耳目聰明筋力強壯肌膚悅澤氣孚泰定熟地黃肉蓯蓉酒浸六兩菟絲子酒浸五味子各五兩柏子仁另研石斛巴戟去心天門冬去心蛇床子炒覆盆子各三兩續斷澤瀉人參山藥遠志去心炒焦山茱萸菖蒲桂心白茯苓杜仲銼炒斷絲各二兩天雄制一兩煉成鍾乳粉扶衰三兩續老二兩常服一兩氣完去之上為末煉蜜丸如梧桐子大食前酒服三十丸至五十丸忌五辛生蔥蕪荑餳鯉虛人多起去鍾乳倍地黃多忘倍遠志茯苓少氣神虛倍覆盆子欲光澤倍柏子仁風虛倍天雄虛寒倍桂心小便赤濁三倍茯苓一倍澤瀉吐逆倍人參此方補勞益血去風冷百病諸虛不足老人精枯神耗女子絕傷斷緒並皆治之交感丹俞居易之子通奉云子五十一歲遇鐵甕申先生授以秘術確意行持服食一年大有補益平日所服藥切屏去而飲食嗜好不減壯年此藥之功大矣今年八十有五享天然之壽爰以秘方傳之世人普願群生同登道果後有牙藥可同用之茯苓四兩香附子一斤用新水浸一宿撈起乾炒黃色方用上為細末煉蜜丸如梧桐子大每服一丸早晨細嚼白湯送下揩牙法香附子五兩淨生薑四兩同醃一宿炒令焦黑青鹽一兩研細拌同上藥收上每旦夕以少許揩七實丹治老人一切瀉痢此藥治久患瀉痢諸藥不瘥者服此藥無不瘥若老虎寒脾瀉滑大宜服此附子制當歸陳皮乾薑各一兩吳茱萸泡厚朴薑製南椒舶上硫黃各半兩上細銼以慢火焙過搗為末與硫磺末拌勻煎米醋和作兩劑卻以白麵半斤和令得所亦作兩劑用裹藥如燒餅法文武火煨令面熟為度去面於臼中搗三百下丸如梧桐子大如患諸般瀉痢以米湯下二十丸空心日午服如患氣痛宿食不消姜鹽湯下二十丸空心日午服其效如神
