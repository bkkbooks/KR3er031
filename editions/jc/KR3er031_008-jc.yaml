body:
  text: 卷之八中風門病機中風內經始論黃帝問曰風之傷人也或為寒熱或為熱中或為寒中或為厲風或為偏枯或為風也其病各異其名不同或內至五臟六腑不知其懈願聞其說岐伯對曰風氣藏於皮膚之間內不得通外不得泄風者善行而數變腠理開則灑然寒閉則熱而悶其寒也則衰食飲其熱也則消肌肉故使人佚慄而不能食名曰寒熱風氣與陽明入胃循脈而上至目內眥其人肥則風氣不得外泄則為熱中而目黃人瘦則外泄而寒則為寒中而泣出風氣與太陽俱入行諸肺俞散於分肉之間與衛氣相干其道不利故使肌肉憤䐜而有瘍衛氣有所凝而不行故其肉有不仁也厲者有榮衛熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰厲風或名曰寒熱以春甲乙傷於風者為肝風以夏丙丁傷於風者為心風以季夏戊己傷於邪者為脾風以秋庚辛中於邪者為肺風以冬壬癸中於邪者為腎風風中五臟六腑之俞亦名臟腑之風各入其門戶所中則為偏風風氣循風府而上則為腦風風入目系則為目風眼寒飲酒中風則為漏風入房汗出中風則為內風新沐中風則為首風久風入中則為腸風飧泄外在腠理則為泄風故風者百病之長也至其變化乃為他病也無常方然致有風病也帝曰五臟風之形狀不同者何願聞其診及其病能岐伯曰肺風之狀多汗惡風色皏然白時咳短氣書日則瘥暮則甚診在眉上其色白心風之狀多汗惡風焦絕善怒哧赤色病甚則言不可快診在口其色赤肝風之狀多汗惡風善悲色微蒼嗌乾善怒時憎女子診在目下其色青脾風之狀多汗惡風身體倦惰四肢不欲動色薄微黃不嗜食診在鼻上其色黃腎風之狀多汗惡風面痝然浮腫脊痛不能正立其色炲隱曲不利診在肌上其色黑胃風之狀頸多汗惡風飲食不下鬲塞不通腹善滿失衣則䐜脹食寒則泄診形瘦而腹大首風之狀頭面多汗惡風當先風一日則病甚頭痛不可以出內至其風日則病少愈漏風之狀或多汗常不可單衣食則汗出甚則身汗喘息惡風衣常濡口乾善渴不能勞事泄風之狀多汗汗出泄衣上口乾善渴不能勞事身體盡痛則寒內經風邪系外感之病有內外臟腑虛實寒熱之不同別為癱瘓痿弱卒中不省僵仆喎斜攣縮眩運語澀不語之文後世始與痿證混淆矣要略云風之為病當半身不遂經絡空虛邪賊不瀉或左或右邪氣緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁在經則重不勝邪入腑不識人入臟則難言口吐涎千金云岐伯中風大法有四一曰偏枯半身不遂二曰風痱於身無痛四肢不收三曰風懿奄忽不知人四曰風痹諸痹類風狀後世中風方治皆祖要略巢氏千金之論但不當以外中風邪立名而與內臟痿證混同出治此千古之弊也風分中腑中臟中經之異病機機要云風本為熱熱盛則風動宜以靜勝其燥是養血也治須少汗亦須少下多汗則虛其衛多下則損其榮宜治在經雖有汗下之戒而有中臟中腑之分中腑者多著四肢有表證而脈浮惡風寒拘急不仁中臟者多滯九竅唇緩失音耳聾鼻塞目瞀大便秘結中腑者宜汗之中臟者宜下之表裡已和宜治之在經當以大藥養之發明云中血脈則口眼喎斜中腑則肢節廢中臟則性命危三治俱不同中血脈外有六經之形證則從小續命湯加減中臟內有便溺之阻隔宜三化湯等通之外無六經之形證內無便溺之阻隔宜養血通氣大秦艽湯羌活愈風湯主之氣中論許學士云世言氣中者雖不見方書然暴怒傷陰暴喜傷陽憂愁不已氣多厥逆往往得此疾便覺涎潮昏塞牙關緊急若便作中風用藥多致殺人惟宜蘇合香丸灌之便醒然後隨寒熱虛實而調之無不愈者經曰無故而喑肺不至不治自已謂氣暴逆也氣復則已審如是雖不服藥亦可玉機微義云中氣即七情內火之動氣厥逆由其本虛故也用蘇合香丸通行經絡其決烈之性如摧枯拉朽恐氣血虛者非所宜也後云不治自復之意蓋警用藥之失實勝誤於庸醫之所為也風非外來本氣自病發明云經曰陽之氣以天地之疾風名之此中風者非外來風邪乃本氣病也凡人年逾四旬氣衰之際或因憂喜忿怒傷其氣者多有此疾壯歲之時無有也若肥盛則間有之亦是形盛氣衰而如此治法當和臟腑通經絡便是治風然亦有賊風襲虛傷之者也治法輕重有三見前在經在腑在臟之異濕病似中風元戎云酒濕之為病亦能作痹證口眼喎斜半身不遂渾似中風舌強不正當瀉濕毒不可作風病治之而汗也衍義論甚當易簡與此相同風本於熱河間曰風病多因熱甚俗云風者言末而忘其本也所以中風有癱瘓者非謂肝木之風實甚而卒中風也亦非外中於風良由將息失宜而心火暴甚腎水虛衰不能治之則陰虛陽實而熱氣怫鬱心神昏冒筋骨不用而卒倒無知也多因喜怒悲愁恐五志過極而卒中者皆為熱甚故也若微則但僵仆氣血流通筋脈不攣緩者發過如故或熱氣太甚鬱滯不通陰氣暴絕陽氣後竭而死痰涎由熱甚則水化挾火而生偏枯者由經絡一側不得通左右痹而成癱瘓也口禁筋急者由風熱太甚以勝水濕又津液滯於胸膈以為痰涎則筋太燥然燥金主收斂勁切故也或筋反緩者乃燥之甚血液衰少也諸筋攣易愈諸筋痿難復此皆燥之微甚也內因似中風盧砥鏡曰經云神傷于思慮則肉脫意傷於憂愁則肢廢魂傷於悲哀則筋攣魄傷於喜樂則皮槁志傷於盛怒則腰膝難以俯仰也何侍郎有女適夫夫早世女患十指拳攣臂垂莫舉膚體瘡癢粟粟然搔之麻木飲食頓減幾於半載迎余診之則非風也正乃憂愁悲哀所致爾病屬內因於是療內因藥仍以鹿角膠輩多用麝香熬膏貼痿垂處漸得臂舉指能伸病漸近安經云風之傷人也為病善行而數變變至他證之類故為治不得其病情者往往或以風為他證或以他證為風皆不免乎得失之誚為近代河間東垣丹溪諸先生者出始論他證之作中風治法當異此又盧氏治例可謂深達病情之機者則河間所論五志過極為病之例非真中風也而王安道又曰人有卒暴僵仆或偏枯或四肢不舉或不知人或死或不死者世以中風呼之而方書亦以中風治之因嘗考諸經論風以為諸證其卒暴僵仆不知人四肢不舉者並無所論止有偏枯一語而已及觀千金方則皆引岐伯之旨金匱要略具脈證邪在絡在經入腑入臟之異由是觀之則卒暴僵仆不知人偏枯四肢不舉等證因為因風而致者矣乃用大小續命湯排風八物等諸湯散之類及近代河間東垣丹溪三子者出所論始與昔人有異河間主於火東垣主於氣丹溪主於濕反以風為虛象而大異於昔人矣籲昔人之與三子者果孰非歟果孰非歟若以三子為是則三子未出之前故有從昔人而治愈者矣故不善讀其書者往往不得其奧以予觀之昔人與三子之論皆不可偏廢但三子以類乎中風之病視為中風而立論故使後人狐疑而不能決殊不知因於風者真中風也因火因氣因濕者類中風而非中風三子所論者自是因火因氣因濕而為暴病暴死之證與病何相干哉如內經所謂三陰三陽發病為偏枯痿易四肢不舉亦未嘗必因於風而後能也夫風火氣濕之殊望聞問切之間豈無所辨乎辨之為風則從昔人所治辨之為火氣濕則從二子以治如此則庶乎析理明而用法當矣惟其以因火因氣因濕之證強引風而合論之所謂真偽不分名實相紊若以因火因氣因濕證分而出之則真中風病彰矣所謂西北有中風東南無中風者其然歟否歟斯所辨諸子所論名實相紊而不明真中風之異可謂精切又何疑丹溪東南無中風之語哉夫風者天地之大氣也五運之造化四時之正令耳上下八方無所不至者且人在氣中形虛者即感之傷之中之有輕重不同實八方虛實之異耳矧有痿濕火熱痰氣虛諸證而似中風故今古治例不同是以符先生折中諸經之旨辨以上諸證不得與中風同治中風同治又豈惟三子之論哉然王氏之擴充其例因有是辨亦不害其為叮嚀也余嘗居京州即漢之武威郡也其地高阜四時多風少雨土藝粟麥引泉灌溉天氣常寒人之氣實腠密每見中風或暴死者有之蓋折風燥列之甚也時洪武乙亥秋八月大風起自西北時甘州城外路死者數人余亦始悟經謂西北之折風傷人至暴死者之旨不誣丹溪之言所謂本也人蓋不經其所雖審經意故莫不有疑者也籲醫之不明運氣造化地理病機之微而欲行通變之法者難矣哉四肢不舉有虛有實病機云四肢不舉俗曰癱瘓經謂土太過則令人四肢不舉此真膏粱之疾非肝腎經虛其治則瀉令氣弱陽虛吐平而愈三化湯調胃承氣湯選而用之若脾虛亦令四肢不舉其治可補十全散加減四物去邪留正世俗但見四肢不舉皆以為中風此脾土太過不及皆能致之其可一概用藥乎中風不當與痿證同治丹溪曰今世所謂風病大率與諸痿證混同論治良由局方多以治風之藥通治痿也古聖論風痿各有條目源流不同治法亦異夫風外感善行數變其病多實發表行滯有何不可局方治風之外又歷述魂魄恍忽起便須人手足不隨神氣昏憒癱瘓嚲曳手足筋衰眩暈倒僕半身不遂腳膝軟弱四肢無力顫掉拘攣不語語滯諸痿等證悉皆治之不思諸痿皆起於肺熱傳入五臟散為諸證其昏惑瘛瘲瞀悶瞀昧暴病鬱冒矇昧暴喑瘈昧皆屬於火曰四肢不舉舌本強足痿不收痰涎有聲皆屬於土悉是濕熱之病當作諸痿論治若以外感風邪治之寧免實實虛虛之禍乎若夫岐伯仲景孫思邈之言大意以指外之感劉河間之言風明指內傷熱證實與痿證所言諸痿生於熱相合外感之邪有寒熱虛實而挾寒者多內熱之傷皆是虛證無寒可散無熱當作實可瀉中風之病古方冠諸方首以其為人之大病也夫風乃六淫中之一天之邪氣自外而入者也古人用藥皆是發散表邪通行經絡之劑以其自表而入亦當自表而出也至於東垣分在經在腑在臟而有汗下調養之法可謂詳備精密則又通表裡中三法而治矣若劉河間以為熱甚制金不能平木或濕土過甚反兼木化皆非外中於風乃因內熱而生迥出前古之論丹溪謂數千年得經意者河間一人耳由是觀之若病從外邪而得元氣壯實者當從古方發散之例但用藥不宜小續命湯須分所挾有寒熱溫涼之異受邪有臟腑經絡之殊若病因內熱而生者當從劉河間之論但有用藥不宜如子和專以汗吐下為法蓋病邪有虛有實難一概論又況痿證實與內熱所生相同醫者須宜識此或問外邪之感與內熱之傷何者為多也丹溪曰西北氣寒為風所中誠有之矣東南氣溫而地多濕有風病者非風也皆濕土生痰痰生熱熱生風也經曰亢則害承乃制是也痓證類風痊厥類風屍厥痰厥氣厥血厥酒厥等證亦與中風相似丹溪曰諸痹類風狀治法戴人汗吐下三法治風子和云諸風掉眩皆屬肝木掉搖眩運目喎筋急手搐瘛瘲皆厥陰肝木之用也經云風淫所勝平以辛涼世何以熱藥治風邪予治驚風癇病痿用汗吐下三法隨治愈木鬱達之者吐之令其條達也汗者風隨汗出也下者推陳致新也失音悶亂口眼喎斜可用三聖散吐之如牙關緊急鼻內灌之吐出痰口自開也次用通聖散涼膈散大人參半夏丸甘露飲除熱養液之寒藥推而用之中風先調其氣嚴用和云人之元氣強壯榮衛和平腠理致密外邪焉能為害或因七情飲食勞役致真氣先虛榮衛失度邪氣乘虛而入致此疾若內因七情而得者法當調氣不當治風外因六淫而得之者亦先當調氣然後依所感六氣治之此良法也宜八味順氣散治中風宜先逐痰痰壅盛者口眼喎斜不能言者皆當用吐法一吐不已再吐輕者用瓜蒂散一服或稀涎散或蝦汁以蝦半斤入醬蔥姜等物水煮先吃蝦次飲汁後以鵝翎探引吐痰用蝦者蓋引其風出耳重者用藜蘆半錢或三分加麝香少許齏汁調服吐若口噤昏迷者灌入鼻內吐之虛者不可吐及不能吐痰者不可治治中風不可下發明云治風當通因通用惟宜宣發以散之不可便以苦寒之藥妄下龍麝硃砂牛黃諸鎮墜之藥瀉之若風本外邪惟宜宣散此風在表之時也如傷寒中風傳入於胃亦未嘗不可下論中便字妄字可見其意便者有早與急之義妄者謂有不當下之義治風不可利小便如小便少不可以藥利之既以自汗則津液外亡小便自少若利之使榮衛枯竭無以制火煩熱愈甚當俟熱退汗止小便自行也兼此證乃陽明經大忌利小便丹溪治法中風大率主血虛有痰治痰為先次養血行血或屬虛挾火一作痰與濕又須分氣虛血虛半身不遂大率多痰在左屬死血瘀一作少血在右屬痰與熱並氣虛左以四物湯加桃仁紅花竹瀝薑汁右以二陳湯四君子湯等加竹瀝薑汁氣虛卒倒者用參者補之有痰濃煎參湯加竹瀝薑汁血虛用四物湯俱用薑汁炒恐泥痰故也有痰再加竹瀝薑汁入內服能食者去竹瀝加荊瀝肥白人多濕少用烏頭附子行經凡用烏附必用童便煮過以殺其毒初昏倒急捏人中至醒然後用痰藥以二陳湯四君子湯四物湯加減用瘦人陰虛火熱用四物湯加竹瀝黃芩黃柏有痰者加痰藥治痰氣實而能食用荊瀝氣虛少食用竹瀝此二味開經絡行血氣故也入四物湯必用薑汁助之遺尿屬氣虛以參耆補之筋枯者舉動則痛是無血不能滋養其筋不治也脈訣內言諸不治證口開手撒眼合遺尿吐沫直視喉如鼾睡肉脫筋痛髮直搖頭上竄面亦如妝或頭面青黑汗綴如珠皆不治諸家治證夫案內經以下皆謂外中風邪然地有南北之殊不可一途而論惟劉守真作將息失宜水不能制火極是由今言之西北二方亦有真為風所中者但極少耳東南之人多是濕土生痰痰生熱熱生風也邪之所湊其氣必虛風之傷人在肺臟為多許學士謂氣中者亦由此七情所傷脈微而數或浮而緊緩而遲必也脈遲浮可治大數而極者死若果外中者則東垣所謂中血脈中腑中臟之理其於四肢不舉亦有與痿相類者當細分之局方風痿同治大謬發揮甚詳子和用三法如的系邪風卒中痰盛實熱者可用否則不可風者百病之始善行而數變行者動也風本為熱熱勝則風動宜以靜勝其燥養血是也治須少汁亦宜少下多汗則虛其衛多下則損其榮治其在經雖有汗下之戒而有中臟中腑之分中腑者宜汗之中臟者宜下之此雖合汗下亦不可太過汗多則亡陽下多則亡陰亡陽則損其氣亡陰則損其形初謂表裡不和須汗下之表裡已和是宜治之在經其中腑者而顯五色有表證而脈浮惡風惡寒拘急不仁或中之後身之前身之側皆曰中腑也其治多易中臟者唇吻不收舌不轉而失音鼻不聞香臭耳聾而眼瞀大小便閉結或眼合直視搖頭口開手撒遺尿痰如拽鋸鼻鼾皆曰中臟也中臟者多不治也六腑不和留結為癰五臟不和九竅不通無此仍在經也初證既定宜以大藥養之當順時令而調陰陽安臟腑而和榮衛少有不愈者也風中腑者先以加減續命湯隨證發其表如兼中臟則大便多秘澀宜以三化湯通其滯初證已定別無他變以大藥和治之大抵中腑者多著四肢中臟者多滯九竅中腑者多兼中臟之證至於舌強失音久服大藥自能愈也又因氣中其證與中風相似但風中多痰涎氣中口中無涎治之之法調氣為先經言治風者以理氣氣順則痰消徐理其風庶可收效又有中風言不變志不亂病在分腠之間者只宜溫肝取小汗為可復也凡中風脈多沉伏大法浮遲者吉急實者凶先用麻油調蘇合香丸或用三姜或用白湯調如口噤抉開灌之少蘇則服八味順氣散若痰盛者只以省風導痰湯服之若臥則昏沉不省人事口噤急以生半夏末吹入鼻中或用細辛皂角為末吹之噴嚏則蘇無嚏者不治肥人中者以其氣盛於外而歉於內也肺為氣出入之道肥者氣必急氣急必肺邪盛肺金剋木膽為肝之腑故痰涎壅盛所以治之必先理氣為急中後氣未順痰未除調理之劑惟當以藿香正氣散和星香散煎服此藥非特可治中風之證治中風中惡尤宜尋常止嘔多痰者亦可服之若前證多怒宜小續命湯加羚羊角熱而渴者湯中去附子加秦艽半錢恍惚錯語加茯神遠志各半錢不得睡加酸棗仁半錢不能言加竹瀝一蜆殼許人虛無力者去麻黃加人參如其數若人自蘇能言能食惟身體不遂急則拳攣緩則彈曳經年不愈以加減地仙丹常服若飲食坐臥如常但失音不語只以小續命湯去附子加石菖蒲一錢治風之法初得之即當順氣及日久則當活血此萬古不易之理惟可以四物湯吞活絡丹愈者正是此義若先不順氣化痰遽用烏附又不活血徒用防風天麻羌活輩吾未見能治也又見風中於膚腠輒用腦麝治之者是引風入骨髓也尤為難治深可戒哉如口眼喎斜未正者以蓖麻去殼搗爛右喎塗左左喎塗右或鮮魚血入麝香少許塗之即正噴嚏初卒倒僵仆不知人事急以皂角末或不臥散以鼻內吹之就提頭頂發立蘇若有噴嚏者可治無嚏者不治經曰風從汗泄以可微汗正如解表表實無汗者散之劫之表虛自汗者溫之解之若氣滯者難治宜吐之可下者此因內有便溺之阻隔故里實若三五日不大便者可與機要三化湯或子和搜風丸老人只以潤腸丸理氣者氣滯氣鬱肩膊麻痛之類此七情也宜烏藥順氣八味順氣之類理血者無表裡之急血弱舉發不時者與大秦艽湯羌活愈風湯兼用化痰丸子中風不治之證髮直吐沫搖頭上竄直視口開手撒眼合遺尿不知人或面赤如妝或頭面青黑汗綴如珠聲如鼾睡皆不可治脈候要略云脈微而數中風使然頭痛脈滑者中風風脈虛弱也寸口脈浮而緊肺緩而遲皆中風之證脈經云浮而大者風又浮而緩皮膚不仁風寒入肌肉又滑而浮散者癱瘓陽浮而滑陰濡而弱或浮而滑或沉而滑或微而虛或微而數皆為中風脈浮而遲者易治急大數疾者死藥方通治風證諸劑愈風湯初覺風動服此不致倒僕此乃治未病之聖藥也又治中風證內邪已除外邪已盡當服此藥以行導諸經久服大風悉去縱有微邪只從此藥加減治之然治病之法不可失於通塞或一氣之微汗或一旬之通利如此乃常服之藥也久則清濁自分榮衛自和矣羌活甘草防風當歸蔓荊子川芎細辛黃耆枳殼人參麻黃白芷甘菊薄荷枸杞子知母地骨皮獨活秦艽黃芩芍藥各三兩蒼朮生地黃各四兩肉桂一兩上咀每服一兩水二盞生薑三片煎空心服臨臥滓煎服空心一服吞下二丹丸謂之重劑臨臥一服吞下四白丹九謂之輕劑假令一氣之微汗用愈風湯三兩加麻黃一兩作四服加姜空心服以粥投之得微汗則佳如一旬之通利用愈風湯三兩加大黃一兩亦作四服如前煎臨臥服得利為度此藥常服之不可失四時之輔春將至大寒後本方加半夏人參柴胡謂迎奪少陽之氣也夏將至穀雨後本方加石膏黃芩知母謂迎奪陽明之氣也季夏之月本方加防己白朮茯苓謂勝脾之濕也秋將至大暑後本方加厚朴藿香肉佳謂迎奪太陰之氣也冬將至霜降後本方加附子官桂當歸謂勝少陰之氣也此藥四時加減臨病酌宜誠治風證之聖藥也羌活愈風湯治腎肝筋骨弱語言艱澀精神昏憒風濕內弱風熱體重或瘦而一肢偏枯或肥而半身不遂心不寧勞役則百病生心靜則萬病息此藥能安心養神調陰陽無偏勝羌活人參黃耆炙甘草防風蔓荊子川芎細辛枳殼地骨皮麻黃去節知母杜仲秦艽柴胡枸杞子當歸獨活白芷半夏生薑制厚朴防己芍藥黃芩白茯苓甘菊花薄荷前胡各七分石膏生地黃熟地黃蒼朮各一錢官桂去皮三分上作二付每服水二鍾生薑三片煎一鍾空心服臨臥煎渣服獨活湯治虛風惛憒不自知覺手足瘛瘲坐臥不能或發寒熱血虛不能服發汗藥及中風自汗尤宜服之獨活羌活人參防風當歸酒洗細辛茯神去木半夏湯泡桂心白薇遠志去心菖蒲去尾川芎各五分甘草三分上水二盞生薑三片煎八分食遠溫服續命煮散治體虛中風自汗心中惛憒四肢無力口眼瞤動手足搐栩煩渴飲水此藥扶榮衛養血氣防風獨活當歸酒洗人參細辛葛根芍藥川芎甘草遠志去心荊芥熟地黃各五分官桂三分半夏四分如汗多不止加牡蠣粉上水二盞生薑三片煎至一盞溫服秘傳祛風散羌活獨活山梔子半夏蒼朮蒼耳子甘草茯苓陳皮當歸生地黃防風荊芥防己白芍藥皂角威靈仙各等分上水二盞生薑三片煎至八分不拘時服消風散治諸風上攻頭目昏眩項背拘急鼻嚏聲重耳作蟬鳴及皮膚頑麻瘙癢癮疹婦人血風頭皮腫癢並宜治之荊芥穗炙甘草各一錢半陳皮人參茯苓白殭蠶炒去絲防風川芎霍香葉蟬蛻厚朴羌活各一錢上水二鍾煎一鍾不拘時服或為末每服二錢茶清調下亦可追風如聖散治男子婦人大小諸般風證左癱右瘓半身不遂口眼歪斜腰腿疼痛手足頑麻語言謇澀行步艱難遍身瘡癬上攻頭目耳內蟬鳴痰涎不利皮膚瘙癢偏正頭風無問新舊及破傷風角弓反張蛇犬咬傷金刀所傷出血不止並皆治之川烏草烏蒼朮各四兩川芎五錢石斛一兩白芷細辛當歸防風麻黃荊芥何首烏全蠍天麻藁本各三錢甘草三兩人參三錢兩頭尖二錢即牡鼠糞主風癇上為細末每服半錢臨睡茶清送下溫酒亦可不許多飲酒服藥後忌一切熱物飲食一時恐動藥力服藥覺有麻是效也亦可敷貼搜風順氣丸治三十六種風七十二般氣去上熱下冷腰腿疼痛四肢無力多睡少食漸漸羸瘦顏色不定黃赤惡瘡下疰口苦無味憎寒毛聳積年癥癖氣塊長大陽事斷絕女子久無子息久患寒瘧瀉痢吐逆變成勞疾百節痠疼初生小兒及百歲老人皆可服補精駐顏疏風順氣車前子二兩半白檳榔火麻子微炒去殼牛膝酒浸郁李仁湯泡去皮另研菟絲子制乾山藥各二兩枳殼麩炒防風獨活各一兩大黃五錢半生半熟上為末煉蜜為丸如梧桐子大每服二十丸漸加至四五十丸酒茶米飲任下百無所忌空心臨臥各一服久服去腸中宿滯精神強健耳目聰明腰腳輕健百病皆除老者還少孕婦勿服如服藥覺臟腑微痛以羊肚肺羹補之又治腸風下血中風癱瘓百病不生無病不治人參補氣湯治手指麻木人參黃耆各二錢升麻柴胡芍藥生甘草炙甘草五味子各五分上水一盞煎至五分食遠臨睡服渣再煎天麻丸治中風四肢筋脈拘攣骨節痛少力天麻半兩蠍梢微炒沒藥研丹砂研各一錢半麝香研一錢半麻黃去節地龍去土炒防風去皮乳香研各半兩川烏生用去皮臍自然銅煅醋淬各半兩安息香一兩酒化入蜜熬成膏上除安息香外搗研為末卻入別研藥以安息香膏和劑為丸如梧桐子大每服二十丸不拘時以薄荷酒下忌羊血有人患手臂不隨又有患腿膝無力行步輒倒服之並效素有熱人減川烏一半獨活酒治中風通身冷口噤不知人獨活四兩去蘆好酒四大盞煎至二盞分二三次服天仙膏治卒中風口眼喎斜天南星一個白芨一錢大草烏一個殭蠶十個右為細末用生鱔魚頭血調塗喎處正即洗去正舌散治中風舌本強難轉語不正神效竭梢去毒二七個茯苓一兩上為細末每服一錢食前溫酒調服又擦牙更效愈風丹治諸風證偏正頭痛防風通聖散四物湯黃連解毒湯各加一料羌活細辛甘菊花天麻獨活薄荷何首烏各一兩上為細末煉蜜丸如彈子大每服一丸細嚼茶清下不拘時服御風丹治一切中風