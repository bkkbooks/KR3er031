風湯治中風口噤口眼喎斜筋脈攣急抽掣疼痛風盛痰實防風南星生用各二錢半夏水浸洗淨生用進黃芩甘草生用各一錢上水二盞生薑五片煎至一盞不拘時服此治風挾熱之藥有合導痰湯同服尤妙濟生導痰湯方見痰門治痰涎壅盛或胸膈留飲痞塞此治痰泄痞之藥也和劑大醒風湯治中風痰厥涎潮昏暈半身不遂歷節痛風拘攣南星生用六錢防風三錢獨活附子生全蠍微炒甘草生各一錢半生薑十片上分二帖每帖水二盞煎八分去渣食遠溫服簡易星香湯治中風痰盛服熱藥不得者痰厥氣厥身熱面赤宜服南星八錢木香一錢上作二劑每劑水二盞生薑十片煎七分去渣溫服攝生飲治一切卒中不論中風中寒中暑中濕及痰飲痰厥氣厥初作即用此圓白南星濕紙包煨半夏百沸湯泡南木香各一錢磨汁遼細辛蒼朮生甘草生細節石菖蒲各一錢上咀作二服每服水盞半姜七片煎取其半乘熱調蘇合香丸灌下痰盛加全蠍二枚先以皂角末吹鼻得嚏進藥牙噤者烏梅肉和南星辛半末中指揩牙自開貝母栝蔞散治肥人中風口眼喎斜手足麻木左右俱作痰治貝母栝蔞南星炮荊芥防風羌活黃柏黃芩黃連白朮陳皮半夏湯泡七次薄荷甘草炙威靈仙天花粉各等分上每服水二盞姜三片煎八分至夜服青州白丸子治男子婦人手足癱瘓風痰壅盛嘔吐涎沫及小兒驚風並治白附子二兩生用半夏七兩水浸去衣生南星二兩生川烏去皮臍五錢生上羅為末生絹袋盛於井花水內擺出粉未出者以手揉令出渣再擂再擺以盡為度用瓷盆中日曬夜露每日一換新水攪而復澄春五夏三秋七冬十日去水曬乾如玉片以糯米粉作稀糊丸如綠豆大每服二十丸生薑湯下無時如癱瘓酒下小兒驚風薄荷湯下三五丸歌曰積年痰飲漸成風口眼喎斜語不通蘇合香丸薑汁灌青州丸子有神功千金地黃煎治熱風心煩及脾胃熱壅食不下生地黃汁枸杞子汁各五升真酥生薑汁各三升荊瀝竹瀝各五升人參八兩白茯苓六兩天門冬八兩大黃梔子各四兩上十一味以五味為細末先煎地黃等汁內末藥調服方寸匕再漸加之服以利為度竹瀝湯治四肢不收心神恍忽不知人事口不能言竹瀝二升生葛汁二升生薑汁三合上三汁和勻分三服溫用荊瀝湯治中風多熱痰盛常宜服此荊瀝竹瀝生薑汁減半上三汁和勻每用五合溫服滌痰湯治中風痰迷心竅舌強口不能言南星姜煮半夏泡七次各二錢枳實一錢白茯苓一錢半橘紅一錢石菖蒲八分人參竹茹各七分甘草五分上水二盞生薑五片煎八分食前服治虛寒劑三生飲治卒中風昏不知人口眼歪斜半身不遂痰厥風厥南星一兩生川烏去皮生附子去皮生各半兩南木香二錢半上每服四錢水二盞姜十片煎七分服濟生星附湯治因虛中風痰涎壅塞南木香二錢南星生附子生各半兩上作二服每服水二盞姜五片煎八分食遠服寒甚者用熟星附沉困甚手足厥冷者加川烏名三生飲服未效加天雄名三建湯痰涎壅塞聲如拽鋸服藥不下宜於丹田穴多灸之二香三建湯治男婦中風六脈俱虛舌強不語痰涎壅盛精神如癡手足偏廢不能舉用此等不可攻風只可補虛天雄附子烏頭各二錢去皮臍皆生沉香木香各一錢水磨汁上作二服每服水盞半姜十片煎七分食前服側子湯治中風扶虛手足厥冷肌肉不仁口眼歪斜牙關緊急附子炮乾薑炮各三錢桂心細辛防風人參各一錢上作二服每服水盞半煎七分不拘時服防風湯治中風挾暑卒然暈倒口眼喎斜四肢不收防風桂心乾薑澤瀉杏仁甘草炙各一錢上水盞半煎七分不拘時服資壽解語湯治中風脾緩舌強不語半身不遂防風附子炮天麻酸棗仁各一錢羚羊角鎊官桂各八分羌活甘草各五分上水二盞煎八分入竹瀝二匙薑汁二滴食遠服星附散治中風能言口不歪而手足嚲曳者南星半夏各制茯苓殭蠶炒川烏去皮臍人參黑附子白附各八分上水二盞煎八分食遠熱服得汗愈八風散治風氣上攻頭目昏暈肢體拘急皮膚搔癢癮疹成瘡及寒熱不調鼻塞聲重藿香白芷前胡各五分黃耆人參各一錢甘草羌活防風各錢半上水二盞煎或末薄荷湯調下二錢茶調亦可易簡諸方衍義方治風涎潮塞氣不通皂角炙一兩白礬生半兩輕粉半錢上為末水調一二錢灌之須臾吐涎豨薟丸治中風失音不語偏風口眼喎斜時吐涎水四肢麻痹骨間痠疼腰膝無力豨薟草五月五日六月六日九月九日採之者佳上取洗淨曬乾入甑中層層灑蜜酒蒸之曬乾如此九遍為末煉蜜為丸如梧桐子大每服七十丸空心溫酒下草靈丹治一切風疾取汗紫背浮萍攤於竹篩內下著水盆曬乾羅細末煉蜜丸彈子大每服一丸黑豆煎酒下取汗蒼耳丸治諸風證五月五日採蒼耳草洗淨曬乾為末煉蜜丸梧桐子大每服十丸日三服若有風處或如麻豆粒起此為風毒出也可以針刺黃汁出盡乃愈靈應丹治癱瘓四肢不舉風痹等證麻黃二斤去根節河水五升熬去渣再熬成膏入白芷桑白皮蒼朮甘松浮萍各一兩川芎苦參各二兩為末以膏調為丸彈子大每服一丸溫酒化下臨臥服隔二三日再服手足即時輕快治卒中風涎潮不利蓖麻膏治中風口眼喎斜蓖麻子十四粒巴豆七粒各去皮研如泥加麝少許如左喎塗右手心右喎塗左手心仍以酒調藥托歪處須臾便正去藥蒜塗法治前證橡斗盛蒜泥塗合谷穴右喎合左左喎合右一方治風痓昏迷吐沫不知人事產後中痓通治黑豆炒焦好酒淬淋清汁一盞獨活三錢煎七分溫服再續服以瘥為度聖惠方治喎斜栝蔞汁和大麥面作餅貼手心右灸左左灸右松葉酒治口眼喎斜中風二三年不效者用青松葉一斤細銼木石臼搗令汁出生絹袋盛以清酒一斗浸二宿火煨一宿初服半升漸至一升取頭面汗出即止皂角膏治前證大皂角五兩去皮子為末以三年好米醋調和左貼右右貼左干更塗之青藤膏治諸風證出太平府之荻港二三月間採青藤不拘多少銼入釜內用微火熬七日夜成膏收於瓷器內若用治病先備梳三四枚量病虛實加減服一茶匙溫酒調下不拘時服畢將患人身上拍一掌其後發癢遍身以梳梳之要止飲冷水一口解之癢止病愈一方治卒中風昏憒若醉痰涎壅盛四肢不收砒霜如綠豆大細研末以新汲水調下少時用熱水投之大吐即愈一方治中風煩熱皮膚搔癢醍醐四兩每服一匙酒調下盡四兩而愈仙靈脾酒治遍身手足不隨皮膚不仁仙靈脾一斤銼細生絹袋盛以無灰酒二斗浸之以厚封密春夏三日秋冬五日後開每日溫飲令微醺不可大醉若酒盡再製一服無不效一方治中風頭眩蟬蛻一兩微炒為末酒調下一錢一方治風痰宜多食梨可愈惟正月禁食一方治前證川烏去皮五靈脂當歸骨碎補等分為末酒糊丸每服十丸至十五丸溫酒送下千金方治中風口噤不知人獨活四兩入酒一升煎半升溫服又方蒼朮四兩酒三升煎一升頓服一方治中風失音並一切風疾及小兒客忤男子陰癢女人帶下白殭蠶七枚炒為末酒調服方寸匕立效一方治中風不省人事香油或生薑自然汁灌之即省一方治中風項強不能回顧掘地作坑燒令通赤以水灑之用桃葉鋪其下患人臥之多著桃葉在項下蒸之令汗出瘥一方治風勞腫毒攣痛或牽引及少腹腰痛桃仁一升去皮尖炒令黑煙出熱研搗如泥以酒二升攪勻服取汗三日愈肘後方治中風腹中切痛以食鹽半斤熬令水盡著口中以熱湯吞下得吐痰即愈一方治卒風不省人事痰涎壅急生白礬二錢為末生薑自然汁調斡開口灌下得吐即省一方治中風口噤不開涎潮不吐法用大皂角一條去皮塗豬膽炙令黃色為末每服一錢不拘時如氣實脈盛調二錢如牙關不開用白鹽梅揩齒口開即灌藥以吐出風涎瘥一方治服藥過多不省人事甘草一兩煎湯入生薑汁半杯和服一方治一切風疾渾身搔癢用胡麻威靈仙何首烏甘草石菖蒲等分為細末每服二錢薑湯調下食療云治水腫風疾中風腳軟及風毒腳氣筋攣膝痛大黃豆和甘草煮湯不時服神仙夏禹經菖蒲薄切曬乾三斤絹袋盛之玄水一斗酒也浸懸壇內密封一百日出視如綠菜色以一斗熟黍米納中封十四日開出溫飲治一切三十六種風悉效崔氏海上集云威靈仙治風通十二經脈此藥朝服暮效疏通五臟六腑令出宿水微利不瀉久服四肢輕健手足溫暖專治男婦中風手足不遂口眼喎斜骨節風胎風暗頭風白癜風心風大麻風皮風搔癢手足頑麻言語蹇滯行立不得風疥癬毒濕熱浸淫面黃氣急腹脹腰重陰腫腎冷婦人月水不來動經多日內服威靈仙外用煎湯頻洗無不平愈法用威靈仙一味洗焙為細末用好酒和令微濕入在竹筒內塞口九蒸九曬如干漆以煉蜜和丸梧桐子大每服二十丸酒送下灸法治中風中脈口眼喎斜聽會二穴在耳前陷中動脈宛宛中張口得之頰車二穴在耳下二韭葉陷中地倉二穴在口吻旁四分外近下有脈微微動者是上三穴左患灸右右患灸左灸中風中腑手足不隨等疾百會一穴在頂中央肩髃二穴在兩肩端兩骨間陷處宛宛中舉臂得之曲池二穴在肘外橫紋頭屈肘曲骨取之是穴風市二穴在膝外兩筋間平立舒兩手著腿中指到處是足三里二穴在膝下三寸脛骨外大筋內筋骨之間是絕骨二穴在足外踝上三寸動脈中凡覺手足麻木不仁或痛良久乃止此將中腑之候也不論是風與氣可速灸此六穴在左灸右在右灸左灸風中臟氣塞涎上不語昏危下火立效百會一穴如前風池二穴在項後髮際陷中大椎一穴在項後一椎上項中肩井二穴在缺盆上大骨前寸半以三指按之當中指下陷中是間使二穴在掌後三寸兩筋間陷中足三里二穴如前曲池二穴如前凡覺手足麻痹心中昏亂神思不快此將中腑之候不論是風與氣可速灸此七穴以次第灸之立愈灸中風眼戴不能上視者三椎五椎各灸五七壯齊下火立效附養生導引法一法正坐倚壁不息行氣從頭至足愈疽疝大風偏枯諸風痹一法仰兩足指五息止引腰背偏枯令人耳聞聲常行眼耳諸根無有罣礙一法以正背倚展兩足瞑目從頭上引氣想以下行直抵足心可三七引候掌心似受氣止蓋謂上引泥九下達湧泉是也一法正坐倚壁不息行氣從口令氣至頭始止治疽痹大風偏枯一法一足蹋地不動一足向側相轉身欹勢並手盡急回左右迭三七去脊風冷偏枯不通一法兩手抱左膝鼻給氣七息展右腳除難屈伸拜起脛中痛痿一法兩手抱右膝著膺除下重難屈伸一法踞坐伸右腳兩手抱左膝頭以鼻納氣自極七息右足著外除難屈伸脛中痛痹一法立身上下正直一手上托仰手如似推物一手向下如擦物極勢上下來去換易四七去髆內風兩腋筋脈攣急一法治四肢疼痛及不隨腹內積氣床蓆必須平穩正身仰臥緩解衣帶枕高三寸握固者以兩手各自以四指把手拇指舒臂令去身各五寸兩腳豎指相去五寸安心定意調和氣息徐徐漱王泉以舌豎上待津唾滿口徐徐嚥下以口吐氣鼻引氣入喉須微微緩坐不可卒急調引氣勿令自聞出入之聲每引氣於心心念送之從腳上頭便氣出引氣五息六息一出之為一息自一息數至十息漸漸增至百息病即除不用食生菜及肥肉大飽食後喜怒憂思惟向曉上半日清淨時行之能愈百病
