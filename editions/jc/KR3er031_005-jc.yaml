body:
  text: 卷之五運氣易覽學五運六氣綱領或問五運六氣內經講論諸方所略其理奧妙未易造入願發明焉丹溪曰學醫之初宜須先識病機之變化論人形之處治若便攻於運氣恐流於馬宗素之徒而云某生人某日病於某經用某藥治之之類也或問人之五臟六腑外應天地司氣司運八風動靜之變人氣應焉豈不切當苟不知此為醫未造其理何以調之曰楊太受嘗曰云云五運六氣須每日候之記其風雨晦明而有應時作病者有伏氣後時而病者有故病沖而動者體認純熟久久自然造其至極丁元吉氏撰運氣提綱曰提綱之作一本內經及劉溫舒論奧語約而事義多者復注其下正注不足則旁註易見者但旁註旨深者列為圖名目用墨沫之經論陰之所在則脈不應兼三陰而言非獨指少陰也王太僕於太陰厥陰下注以少陰近其位致然反遺本氣左右不以位取人所向義亦牽合故啟馬宗素諸書皆隨君火所在言之此丹溪所謂失經旨之類今不從運氣易覽序運氣者以十干合而為木火土金水之五運以十二支對而為風寒暑濕燥火之六氣十干合者如甲己二年合為土運乙庚二年合為金運丙辛二年合為水運丁壬二年合為木運戊癸二年合為火運是也十二支對者如子與午對二年俱為君火之氣醜與未對二年俱為濕土之氣寅與申對二年俱為相火之氣卯與酉對二年俱為燥金之氣辰與戌對二年俱為寒水之氣巳與亥對二年俱為風木之氣是也運與氣相交媾干與支相臨遇運五氣六不相偶合蓋君火居尊故不立運而運只有五戊癸火運乃相火之位經曰君火以名相火以位是也故六氣不加於君火是以運則五年一周氣則六期環會六十年間運有太過有不及有平運又有大運主運客運假如甲年陽土為太過陰年己土為不及司天與運同氣為平太過遇司天克之或不及遇年支與之相合名曰歲會值月干與之相符或交初氣日乾時干與之相合名曰干德符皆得謂之平運物生脈應無相先後焉大運者乃當年年干通主一年之運也主運者每年皆以木運從大寒日始以次相生至水而終每運各主七十三日年年常如是者客運者假如甲年即以土起運亦從大寒日始以次相生而終亦每運各主七十三日逐年更替者今醫所用大運而已主運客運不過論其理宜有是耳其六氣有司天有在泉在正化有對化亦有主氣有客氣假如當年年支是子子午皆少陰君火司天子為對化午為正化對司化令之虛正司化令之實其餘支辰例皆仿此又以子午卯酉為一律子午二歲君火司天則必卯酉燥金在泉若卯酉二歲燥金司天則必子午君火在泉其他寅申巳亥為一律辰戌丑未為一律司天在泉例皆同也主氣者每年皆以木氣從大寒日始以次相生至水氣而終每氣各主六十日有奇千載不易客氣者以當年年支第三支起運假如子年子後第三支是戌戌屬水就以水氣從大寒日始為初之氣即在泉左間也木為二之氣即司天右間也火為三之氣即司天火氣也土為四之氣即司天左間也金為五之氣即在泉燥金也水為終之氣即在泉右間也每氣亦各主六十日有奇一年一易故曰客氣以客加主客勝主則從主勝客則逆又曰司天通主上半年在泉通主下半年此客氣之大者加於主氣之上也司天居上在泉居下運氣居中或司天克運生運謂之以上臨下為順順分生克之殊或運克司天生司天謂之以下臨上為逆逆有大小之異其中有司天與運同者名曰天木符如丁巳丁亥之類年支與運合者名曰歲會丁卯丙子之類在泉與運同者名曰同天金符庚子庚午之類運與在泉合者名曰同歲水會辛丑辛未之類司天與運及年支三位相符者名曰太乙天符戊午乙酉己未己丑之類是也蓋午為火氣司天戊為火運而午支又屬火故號太乙尊稱之謂也五者之中天符為執法中執法者其病速而危歲會為行令中行令者其病徐而持太乙天符為貴人中貴人者其病暴而死聖人祥著於經蓋將使人知有所謹而勿為其所中也縱使或為所中亦知其病之因不至於亂投藥劑其惠天下後世何其切哉雖然運氣一書古人啟其端倪而已員機之士其可徒泥其法而不求其法外之遺耶如曰冬有非時之溫夏有非時之寒春有非時之燥秋有非時之暖此四時不正之氣亦能病人也如曰春氣西行秋氣東行夏氣北行冬氣南行卑下之地春氣常存高阜之境冬氣常在天不足西北而多風地不滿東南而多濕又況百里之內晴雨不同千里之邦寒暖各異此方土之候各有不齊所生之病多隨土著烏可皆以運氣相比例哉務須隨機達變因時識宜庶得古人未發之旨而能盡其不言之妙也奈何程德齋馬宗素等妄謂某生人於某日病於某經用某藥某日當汗瘥某日當危殆悖亂經旨愚或醫流莫此為甚後人因視經為繁文置之而弗用者有也又不讀其書玩其理茫然無入頭處遂乃棄去而莫之省者有也是以世醫罕有能解其意者予今搜輯纂為此編名曰運氣易覽論以明其理圖以揭其要歌括以便於記誦其於初學未必無補於萬一然予老年心志昏瞀未免書不盡言言不盡意改而正之尚有望於後之君子云祁門樸里汪機省之序運氣說五運六氣之說不見於儒者之六經而見於醫家之素問夫素問乃先秦古書雖未必皆黃帝岐伯之言然秦火以前春秋戰國之際有如和緩秦越人輩雖甚精於醫其察天地五行之用未能若是精密也則其言雖不盡出於黃帝岐伯其旨亦必有所從授矣且夫寒濕暑燥風火者天之陰陽三陰三陽上奉之木火土金水者地之陰陽生長化收藏下應之而五運行於其間則五之化氣也天數終於五六居之地數終於六七居之戊己土也化氣必以五故甲己化土而居其首土生金故乙庚次之金生水故丙辛次之水生木故丁壬次之木生火故戊癸次之此化氣之序也地之三陰三陽亦五行耳而火獨有二五行之妙理也蓋木旺於東火旺於南金旺於西水旺於北而土旺於四維戊附於戌而在乾己附於辰而在巽而未之對衝在醜故辰戌丑未寄旺之位也未在西南其卦為坤其時為長夏以其處四時之中呂氏月令謂之中央假如太角壬木之化為啟拆而變為摧拉太徵戊火之化為暄燠而變為炎烈正化之為變者然也少角丁木木氣不足清勝而熱復少徵癸火火氣不足寒勝而雨復邪化之為復者然也寒甚而為陽焰是為火鬱熱甚而為悽清是為金鬱抑而不伸者然也水鬱而發則為冰雹土鬱而發則為飄驟鬱而怒起者然也風淫所勝則克太陰熱淫所勝則克陽明凌其所勝者然也相火之下水氣承之濕土之下風氣承之極則有反者然也摧拉之變不應普天悉皆大風炎烈之變不應薄海悉皆燔灼清氣之勝不應宇宙無不明潔雨氣之復不應山澤無不蒸溽郁也發也淫也承也其理皆然凡此者其應非有候則有不時而應者矣其至非有時則有卒然而至者矣是故千里之遠其變相似者有之百里之變其變不同者亦有之即其時當其處隨其變而占焉則吉凶可知況素問所以論天地之氣化者將以觀其變而救民之疾也夫大而天地小而人之一身五行之氣皆在焉天地之氣有常無變則人亦和平而無災天地之氣變而失常則疾癘之所從出也是故木氣勝則肝以實病脾以虛病火氣勝則心以實病肺以虛病此醫者所能致察儒者不得其詳也至於官天地理陰陽順五行使冬無愆陽夏無伏陰秋無苦雨春無悽風和平之氣行於兩間國無水旱之災民無妖孽之疾此儒者所當察醫家未必能知也素問亦略言之矣五行之精是為五緯與運氣相應有歲星有辰星以此察其行之道順而占其吉凶然必曰德者福之過者罪之則是運氣之和平而為休祥有德者召之也運氣之乖戾而為疾眚有過者致之也雖然其說略而未祥吾儒之經則詳矣洪範九疇始於五行終於皇極終於五福六經聖人建極於上以順五行之用是以天下之民有五福而無六極有五福皆可以康寧矣無六極皆免於疾病矣此其道固有行乎運氣之外者是以大舜成周之時嘗見之由庚之詩作而陰陽得由其道華黍之詩作而四序不失其和由儀之詩作而萬物各得其宜此建皇極順五行使民有五福而無六極之驗矣是故素問則方伎之書洪範則聖人經世之大法也知有素問不知有洪範方伎之流也知有洪範不知有素問儒者何病焉論四時氣候六氣終始早晏五運太少盈虛原之以至理考之以至數而垂萬古無有差異也經曰五日一候應之應五行也故三候成一氣即十五日也三氣成一節節謂立春春分立夏夏至立秋秋分立冬冬至此八節也四方二十四氣而分主四時一歲成矣春秋言分者以月氣言之則二月半初氣終而交二之氣八月半四氣盡而交五之氣若以四時之氣言之則陰陽寒暄之氣到此可分之時也晝夜分五十刻亦陰陽之中分也故經曰分則氣異是也冬夏言至者以六氣言之則五月半司天之氣至其所在十一月半在泉之氣至其所在以四時之令言之則陰陽之氣至此極至之時也夏至日長不過六十刻陽至此而極冬至日短不過四十刻陰至此而極皆天候之未變故經曰至則氣同是也天自西而東轉其日月五星循天從東而西轉故白虎通曰天左旋日月星辰右行又曰日為陽月為陰行有分紀周有道理日則晝夜行天之一度一度有百刻即一日月則晝夜行天之十三度有奇者謂復行一度之中作十九分分之得七一度有百刻作十九分分之得七每一分該五刻強五七三十五刻強是月晝夜行天十三度零三十五刻強大率月行疾速終以二十七日月行一周天是將十三度及十九分分之七數總之則二十九日計行天三百八十七度有奇計月行疾之數比日行遲之數則二十九日日方行天二十九度月已先行一周天三百六十五度外又行天之二十二度反少七度而不及日也陰陽家說謂日月之行自有前後遲速不等固無常准則有大小月盡之異也本三百六十五日四分度之一即二十五刻是日行三百六十五日零二十五刻當為一歲矣當為一歲自除歲外之餘即有三百六十日又除小月所少之日六日止有三百五十四日而成一歲通少十一日二十五刻乃盈閏為十二月之制則有立首之氣氣乃三候之至月半示鬥建之方乃十二辰之方也閏月之紀則無立氣建方皆他氣但依歷以八節見之推其所餘乃成閏天度畢矣故經曰立端於始表正於中推余於終而天度畢矣者此之謂也觀天之杳冥豈復有度乎乃日月行一日之處指二十八宿為證而記之曰度故經曰星辰者所以制日月之行也制謂制度也天亦無候以風雨霜露草木之類應期可驗而測之曰候言一候之日亦五運之氣相生而值之即五日也如環無端周而復始書曰期三百六旬有六日以閏月定四時成歲即其義也醫工之流不可不知經曰不知年之所加氣之盛衰虛實之所起不可以為工矣五行生死順逆之圖歌曰木火土金水五行周而復始互相生水火金木土五賊周而復始互相剋干支五行所屬之圖歌曰甲乙寅卯木東藏丙丁巳午火南方庚辛申酉金西屬壬癸子亥水北鄉戊己辰戌丑未土寄旺四季位中央二十四節氣之圖五日謂之候三候成一氣大小月閨月但依歷交之凡四時寒暑溫涼盛於季月然差正位三十日有奇也立春雨水驚蟄節春分清明穀雨時立夏小滿芒種候夏至小暑大暑期立秋處暑白露日秋分寒露霜降隨立冬小雪及大雪冬至小寒大寒推論六十日交氣日刻夫日一晝一夜十二時當均分於一日故上智設銅壺貯水漏下浮箭箭分百刻以度之雖日月晦明終不能逃也是以一日之中有百刻之候也夫六氣通主一歲則一氣主六十日八十七刻半乃知交氣之時有早晏也故此立圖以明之冬夏日有長短之異則晝夜互相推移而日出入時刻不同然終於百刻也其氣交之刻則不能移甲子之歲初之氣始於漏水下一刻寅初終於八十七刻半子正之中也二之氣復始於八十七刻六分終於七十五刻戌正四刻也三之氣復始於七十六刻終於二十六刻半酉正之中也四之氣復始於六十二刻六分終於五十刻未正四刻也五之氣復始於五十一刻終於三十七刻半午正之中也六之氣復始於三十七刻六分終於二十五刻辰正四刻也此之謂一周天之歲度余刻交入乙丑歲之初刻矣如此而轉至戊辰年初之氣復始於漏水下一刻則四歲而一小周也故申子辰氣會同者此也巳酉醜初之氣俱起於二十六刻寅午戌初之氣皆起於五十一刻亥卯未初之氣俱起於七十六刻氣皆起於同刻故謂之三合者義由此也以十五小周為一大周則六十年矣六十年交氣日刻圖歌曰欲知交氣早晏時漏下一刻甲子初六十日終期八十七刻半二氣續此而起歟盡日七十五刻是三氣從茲又繼諸六十二刻半之外四氣始五十刻後五氣居畢於三十七刻半六氣承之廿五除自是轉至戊辰首復與漏下一刻如申子辰初相會合巳酉醜初同刻晝寅午戌初氣不異亥卯未初當共儲四歲一小周義三合六甲交遍良弗虛十五小周為一大周六十年交氣日刻圖自寅順觀至子為甲子歲初氣子至戌為二氣自亥至酉為三氣酉至未為四氣自申至午為五氣午至辰為六氣自巳至卯起乙丑歲初氣餘歲繼此推之則氣起同刻三歲相合義自見矣然晝夜百刻當分算於十二時每一時該八刻零三分愚按六氣每氣主六十日八十七刻半例申子辰年初之氣始於大寒寅初刻至春分日子正之中是初之氣才滿六十日八十七刻半也二之氣即始於是日子時八十七刻六分至小滿日戌正四刻是二之氣才滿六十日八十七刻半也三氣已後並仿此按圖推之所謂八十七刻半者十二時共有日刻甲子年大寒日寅初刻交初之氣至二月半子時五刻才滿六十日八十七刻半乃值子時之五刻也百刻而除八十七刻半剩下十二刻半算入二之氣內仍該找七十五刻湊作八十七刻半自前子時六刻交二之氣數起至七十五刻乃值戌時四刻也百刻而除七十五刻剩下二十五刻算入三之氣內仍該找六十二刻半湊作八十七刻半也自前戌時五刻交三之氣數起至六十二刻半乃值酉時將五刻也百刻而除六十二刻半剩下三十七刻半算入四之氣內仍該找五十刻湊作八十七刻半也自前酉時六刻交四之氣數起至五十刻乃值未之四刻也百刻而除五十刻剩下五十刻算入五之氣內仍該找三十七刻半湊作八十七刻半自前未之五刻交五之氣數起至三十七刻半乃值午時五刻百刻而除三十七刻半剩下六十二刻半算入六之氣內仍該找二十五刻湊作八十七刻半也自前午之六刻交六之氣數起至二十五刻乃值辰之四刻也百刻而除二十五刻剩下七十五刻算入乙丑歲之初氣內矣生成數論聖人立法以推步蓋不能逃其數觀其立數之因亦皆出於自然一曰水二曰火三曰木四曰金五曰土者以水北方子位子者陽生之初一陽數也故水曰一火南方午位午者陰生之初二陰數也故火曰二木居東方東陽也三者奇之數亦陽也故木曰三金居西方西陰也四者偶之數亦陰也故金曰四土應西南長夏五者奇之數亦陽也故土曰五由是論之則數以陰陽而配者也然水生於一天地未分萬物未成之初莫不先見於水以今驗之則草木子實未就人蟲胎卵胚胎皆水也豈不以水為一及其水之聚而形質莫不備陰陽之氣在中而後成故物之小而味苦者火之兆也物熟則甘土之味也甘極則反淡淡本也然人稟父母陰陽生成之化故先生二腎左腎屬水右腎屬火則因水而後見故火次二蓋草木子實大小雖異其中皆有兩以相合者與人腎同亦陰陽之兆是以萬物非陰陽合體則不能生化也既陰陽合體然後有春生而秋成故木次三金次四蓋水有所屬火有所藏木有所發金有所別莫不皆因土而後成故金木水火土之成數皆兼土數五也水六火七木八金九土常以五之生數不可至十者土不待十以成是生成之數皆以合之則萬物豈能逃其數哉三陰三陽正化者從本生數對化者從標成數五運之紀則太過者其數成不及者其數生各取其數之生成多少以占政令氣化勝復之交作蓋明諸用也五行生成數圖歌曰生一六水兮生二七火生三八從來木為佐生四九金鄉土生五窮緣無成數十難坐五運不及生可推若逢太過成必隨六氣生用驗正化成參對化更無疑論交六氣時日經曰顯明日也之右卯位君火之位君火之右辰位退行一步一步六十日八十七刻半相火治主也之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之乃六氣之主位也自十二月中氣大寒日交木之初氣次至二月中氣春分日交君火之二氣即前君火之位次至四月小滿日交相火之三氣即前君火之右退行一步相火治之謂也次至六月中氣大暑日交土之四氣次至八月中氣秋分日交金之五氣次至十月中氣小雪日交水之六氣每氣各主六十日八十七刻半總之三百六十五日二十五刻共周一歲也若若字作除理似順也歲外之餘余者於三百六十五日除去五日作余及小月之日小月者有六日亦除之則不及也除前餘日五日又除小月六日共除十一日止有三百五十四日不及三百六十五日也但推之歷日依節令交氣常為每歲燥濕寒暑風火之主氣乃六氣之常紀此謂地之陰陽靜而止位者也氣應之不同者又有司天在泉左右四間之客氣假如子午二年少陰君火司天則必卯酉陽明燥金在泉子之右間厥陰亥木子之左間太陰醜土卯之右間少陽寅相火卯之左間太陽辰水經曰左右者陰陽之道路此之謂也客氣亦有寒暑燥濕風火之化乃行歲中之天命輪居主氣之上主氣則當只奉客之天命動而不息者也大而言之司天通主上半年在泉通主下半年分而言之每氣各主六十日有奇奇者八十七刻半客勝主則從主勝客則逆二者有勝而無復每年以司天前第三位為在泉第四位為初之氣假如子為少陰君火司天子前第三位卯為陽明燥金在泉第四位辰為初之氣辰與戌對同屬太陽寒水主大寒後至春分六十日有奇辰即卯之左間也次巳為二之氣巳與亥對同屬厥陰木主春分後至小滿六十日有奇巳即午之右間也次午為三之氣午與子對同屬少陰火主小滿後至大暑六十日有奇未即午之左間也次酉為五之氣酉與卯對同屬少陽相火主秋分後至小雪六十日有奇申即酉之右間也次酉為終之氣酉與卯對同屬陽明燥金主小雪後至大寒六十日有奇即在泉氣也按六氣司天者主歲位在南故面北而言左右在泉者位在北故面南而言如丑未歲土司天面北而言左右醜之左間相火寅右間君火子辰戌水在泉面南而言左右辰之左間厥陰巳木右間陽明卯金故曰左厥陰右陽明也是歲客之初氣厥陰亥木二氣少陰子火三氣即司天醜土四氣少陽相火寅五氣陽明卯金終氣即在泉辰水此司天在泉四間客氣四間客氣加於主氣者余皆仿此草廬吳先生澂曰天地陰陽之運往過來續木火土金水始終終始如循斯循六氣相生之序也歲氣起於子中盡於子中故曰冬至子之半天心無改移子午之歲始冬至燥金然後禪於寒水以至相火日各六十者五而小雪以後其日三十復終於燥金丑未之歲始冬至寒水三十日然後禪於風木以至燥金日各六十者五而小雪以後其日三十復終於寒水寅申以下皆然如是六十年至千萬年氣序相生而無間非小寒之末無所於授大寒之初無所於承隔越一氣不相接續而截自大寒為次年初氣之首也此造化之妙內經秘而未發啟玄子闕而未言近代楊子建昉推而得之茲說與經不合然極有理謹附於此俾學者知之六化論夫五行在地成形金木水火土在天為氣而氣有六乃天之元氣然後三陰三陽上奉之少陰君火太陰濕土厥陰風木少陽相火太陽寒水陽明燥金謂之六氣皆有一化木之化風主於春君火之化熱主春末夏初行暄淑之令應君之德相火之化暑主於夏炎暑乃行金之化清與燥主於秋清涼乃行白露清氣也金為庚辛辛為丙婦帶火之氣故燥久雨霖霪西風而晴燥之兆也西風而雨燥濕爭也而乃自晴水之化寒主於冬嚴凜乃行土之化濕與雨主於長夏六月土生於火長在夏中既成而旺土潤溽暑濕化行也經曰地氣上為云天氣下為雨雨出地氣云出天氣則土雨之化見矣凡春溫夏暑秋涼冬寒皆天地之正氣六氣司化之令其客行於主運則自有逆順淫勝之異由是氣候不一豈可一定而論之夫陰陽四時氣候則始於仲月而盛於季月故經曰差三十度而有奇又言氣令盛衰之用其在四維四維者辰戌丑未四季月也蓋春氣始於二月盛溫於三月夏氣始於五月盛暑於六月秋氣始於八月盛涼於九月冬氣始於十一月盛寒於十二月則氣差明矣然五月夏至陰氣生而反大熱十一月冬至陽氣生而反大寒者蓋氣自下生推而上之也故陰生則陽上而愈熱陽生則陰上而愈寒夏井清涼冬井溫和則可驗矣六化圖歌曰君熱金清燥水寒木化風相行炎暑令土濕雨同功論主氣地氣靜而守位故春溫夏暑秋涼冬寒為歲歲之常令四時為六氣之所生也厥陰木為初氣者方春氣之始也木生火故少陰君火少陽相火次之火生土故太陰土次之土生金故陽明金次之金生水故太陽水次之皆相生而布其令莫不咸有緒焉木為初氣主春分前六十日有奇奇八十七刻半自鬥建醜正至卯之中天度至此風氣乃行也君火為二氣主春分後六十日有奇自鬥建卯正至巳之中天度至此暄淑乃行也相火為三氣主夏至前後各三十日有奇自鬥建巳正至未之中天度至此炎熱乃行也土為四氣主秋分前六十日有奇自鬥建未正至酉之中天度至此雲雨乃行濕蒸乃作也金為五氣主秋分後六十日有奇自鬥建酉正至亥之中天度至此清氣乃行萬物皆燥也水為六氣主冬至前後各三十日有奇自鬥建亥正至醜之中天度至此寒氣乃行也六氣旋相以成一歲之主氣也天之六氣客之每歲轉居於其上以行天令者也是故當其時而行變之常也非其時而行變之災也如春行夏秋冬之令冬行春夏秋之令此客加主之變也故有德化政令之常有暴風疾雨迅雷飄電之變冬有爍石之熱夏有悽風之清此無他天地之氣勝復郁發之致也此則五氣麗乎太過不及之徵耳論客氣六氣分上下左右而司天令十二支分節令時令而司地化上下相召而寒暑燥風火與四時之氣不同者蓋相臨不一使然也六氣司於十二支有正對之化厥陰司於巳亥謂厥陰木也木生於亥故正化於亥對化於巳也卯雖為正木之分乃陽明金對化也所謂從生而順於己少陰司於子午謂少陰為君火尊位正得南方離位故正化於午對化於子也太陰司於醜未謂太陰為土土屬中宮寄於坤位西南而居未分故正化於未對化於醜也少陽司於寅申謂少陽相火位卑於君火雖有午位君火居之火生於寅故正化於實對化於申也陽明司於卯酉謂陽明為金酉為西方屬金故正化於酉對化於卯也太陽司於辰戌謂太陽為水雖有子位以為君火對化水乃伏土中即六戊天門戌六巳地戶辰是也故水雖土用正化於戌對化於辰也此天之陰陽合地之十二支動而不息者也但將年律起當年司天相對一氣為在泉餘氣為左右間用在泉後一氣為初之氣主六十日有奇至司天為三之氣主上半年自大寒日後通主上半年至在泉為六氣主下半年自大暑日後通主下半年經曰歲半以前天氣主之歲半以後地氣主之者此也天之六氣客也將此客氣布於地之六氣步位之上則有氣化之異矣經曰上下有位左右有紀者謂司天曰上位在南方則面北立左右乃左西右東也在泉曰下位在北方則面南立左右乃左東右西也故上下異而左右殊經曰少陽之右陽明治之乃南面而立以閱氣之至也非論上下左右之位而與顯明之右君火治之之意同謂南面視之指位而言也起司天在泉並客氣子午少陰地太陰丑未墟寅申少陽屬陽明卯酉歟辰戌太陽配厥陰巳亥居其中主司天乙位依此順數諸進三司地位進四客之初如遇子午歲少陰乃司天除本位數至第三陽明為在泉第四太陽即客氣初氣次厥陰復次少陰自大寒後主上半年次太陰次少陽終陽明自大暑後主下半年每氣六十日八十七刻半布於生氣之上余同主客之圖五運六氣樞要之圖論標本三陰三陽天之六氣標也金木水火土地之五行本也生長化收藏太陰濕土少陽相火為標本同至於少陰君火太陽寒水則陰陽寒熱互相不同何也蓋君火司於子午午者一陰始生之位火本熱而其氣當陰生之初故君火屬少陰也水居北方子子者一陽始生之位水本寒而其氣當陽生之初故寒水屬太陽也此水火之標本所以異者也土者乃西南維未之位應於長夏之月未乃午之次為陰矣故土曰太陰相火司於寅寅乃醜之次為陽矣故相火曰少陽木者位居東方震在人主肝雖陽處膈下居陰之位故屬厥陰也金西方兌在人主肺雖陰臟居膈上處陽之位故屬陽明也經曰少陽太陰從本治少陰太陽從標治陽明厥陰不從標本從乎中治陽明之中太陰也太陰陽明為表裡而相合厥陰之中少陽也厥陰少陽為表裡而相合六氣標本圖六氣之本少陰午太陰未少陽寅陽明酉太陽戌厥陰亥歌曰子君醜土卯金標辰水猶偕巳木調申相亦原茲數內余稽正化本然條論五天五運之氣天分五氣地列五行五氣分流散於其上經於列宿下合方隅則命之以為五運丹天之氣經於牛女奎壁四宿之上下臨戊癸之位立為火運黅天之氣經於心尾角軫四宿之上下臨甲己之位立為土運素天之氣經於亢氐昴畢四宿之上下臨乙庚之位立為金運玄天之氣經於張翼婁胃四宿之上下臨內辛之位立為水運蒼天之氣經於危室柳鬼四宿之上下臨丁壬之位立為木運此五氣所經二十八宿與十二分位相臨灼然可見因此以紀五天而立五運也戊為天門乾之位也己為地戶巽之位也自房至畢十四宿為陽主書自昴至心十四宿為陰主夜通一日也若以月建法論之則立運之因又可見矣蓋內者火之陽建於甲己歲之首正月建丙寅丙火生土故甲己為土運戊者土之陽建於乙庚歲之首正月建戊寅戊土生金故乙庚為金運庚者金之陽建於丙辛歲之首正月建庚寅庚金生水故丙辛為水運甲者木之陽建於戊癸歲之首正月建甲寅甲木生火故戊癸為火運壬者水之陽建於丁壬歲之首正月建壬寅壬水生木故丁壬為木運是五運皆生於正月建干豈非日月歲時相因而制用哉一說自開闢以來五氣乘承元會運世自有氣數天地萬物所不能逃近世當是土運是以人無疾而亦痰此與勝國時多熱不同勝國時火運如俗稱楊梅瘡自南行北人物雷同土濕生黴梅當曰黴瘡讀醫書五運六氣南北二政豈獨止於一年一時而頓忘世會運元之統耶一人旅寓北方夏秋久雨天行咳嗽頭痛用益元散滑石六兩甘草一兩薑蔥湯調服應手取效日發數十斤此蓋甲己土運濕令痰壅肺氣上竅但瀉膀胱下竅而已不在咳嗽例也戊年楚地春瘟人不相吊予以五瘟丹投泉水率童子分給日起數百人五瘟丹乙庚年黃芩為君丁壬年山梔為君丙辛年黃柏為君戊癸年黃連為君甲己年甘草稍為君為君者多一倍也徐四味與香附紫蘇為臣者減半也七味生用為末用大黃三倍煎濃湯去渣熬膏和丸如雞子大硃砂雄黃等分為衣貼金箔每用一丸取泉水浸七碗可服七人歌曰五瘟方以運為君腎柏心連肺用芩脾草肝梔成五運紫蘇香附合為臣大黃三倍煎膏和雞蛋丸兮服七人衣用雄黃硃砂末外加金箔更通靈丹溪曰小兒痘證陳文中用木香散異功散溫熱之藥多因立方之時乃值運氣寒水司天在泉時令又值嚴冬大寒為寒氣鬱遏瘡不紅錠故用辛熱劑發之今人不分時令寒熱一概施治誤矣一人年四十五歲平生瘦弱血少值庚子年歲金太過至秋深燥金用事久晴不雨得燥證皮膚坼裂手足枯燥搔之屑起血出痛楚十指甲厚反而莫能搔癢予制一方名生血潤膚飲用歸耆生熟地天麥二門冬五味片芩栝蔞仁桃仁泥酒紅花升麻煎服十數貼其病如脫大便燥結加麻仁郁李仁後治十數人皆驗經天五運起例之圖五天氣立運五行之氣散流於天之五方紀於五天因此而命名立運歌曰金素亢氐昴畢前水玄張冀婁胃懸木蒼危室柳鬼宿火丹牛女奎壁邊土黅心尾角軫度下臨此是運位上經天十干起運化氣歌甲己土運乙庚金丁壬之歲木當臨丙辛化氣常居水戊癸須將火運尋十干所化五行由五天氣各臨其位而生化或謂十二生肖中惟龍善變屬辰每位自建寅干支數至三遇辰隨所屬化之如甲寅至丙辰化水丙寅至戊辰化火或謂甲剛木克己柔土為夫婦成土乙柔木嫁庚剛金成金丁陰火配壬陽水成木丙陽火娶卒柔金成水戊陽土娶癸陰水成火二說意近似而理非自然論月建夫十二支為十二月則正月寅二月卯是也甲己之歲正月建丙寅乙庚之歲正月建戊寅丙辛之歲正月建庚寅丁壬之歲正月建壬寅戊癸之歲正月建甲寅乃用十干建於寅上觀其法甲子年為首亦因六十甲子內初建者先建之次建者次建之故丙寅為初戊寅為次依先後循而轉之可見也前六十甲子納音圖中立位既終復轉於其上以絡其紀者明矣建時貼用日乾同法若五運陰年不及之歲大寒日交初氣其日時建干與年干合者謂之干德符當為平氣非過與不及也略舉此以明其用而已圖其後月建圖歌日甲己丙為寅餘年更酌斟乙庚當起戊辛丙何處尋戊癸先生甲丁壬復建壬甲己歲正月建丙丙火生甲己土余以類推則立運之理皆相合其逐歲月干德符用此例起論五音建運五音者五行之聲音也土曰宮其位甲己之歲宮土也中和之道無往而不理又總堂室奧階而謂之宮所闈不一蓋土亦以通貫於金木水火主於四季榮於四臟皆總之之意故五運從十干起甲為土也土生金故乙次之金生水故木次之如此五行相生而轉甲為陽乙為陰亦相間而數如環無端在陽年曰太在陰年曰少陽年大過為司天所抑陰年不及為年支所合皆曰平氣金曰商其位乙庚之歲商強也謂金性之堅強也水曰羽其位丙辛之歲羽舒也陽氣將復萬物孳育而舒生也木曰角其位丁壬之歲角觸也象諸陽氣觸動而生也火曰徵其位戊癸之歲徵止也言物盛則止也圖附五音建運圖五音建運歌羽水音兮徵火音土宮角木及商金年干建運陰陽位太是陽兮少是陰論紀運平氣十干之中五陰五陽也立為五運太過不及互相乘之其不及之歲則所勝者來克蓋運之虛故也則其間自有歲會同歲會亦氣之平外有年辰相合及交氣日時干相合則得為己助號曰平氣乃得歲氣之平其物生脈應皆必合期無先後也聖人立名以紀之假令辛亥歲水運當為平氣何也辛為水運陰年遇亥屬北方水相佐則水氣乃平假令癸巳年火運亦曰平氣何也癸為火運陰年巳屬南方火相佐則火氣乃平又每年交初氣於年前大寒日假令丁亥年交司之日遇日朔與壬合名曰干德符符者合也便為平氣若交司之時遇壬亦曰干德符除此交初氣日時之後相遇皆不相濟也余皆仿此所謂合者甲己合乙庚合丙辛合丁壬合戊癸合是也又陰年中若逢月干皆符合相濟若未逢勝而見之干合者亦為平氣若行勝己後行復畢逢月干合者即得正位故平氣之歲不可預紀之十干之下列以陰陽年而紀者此乃大概設此庶易知也平氣紀須以當年之辰日時依法推之是以太角歲曰發生太過少角歲曰委和不及正角歲曰敷和平氣太徵歲曰赫曦太過少徵歲曰伏明不及正徵歲曰升明平氣太宮歲曰敦阜太過少宮歲曰卑監不及正宮歲曰備化平氣太商歲曰堅成太過少商歲曰從革不及正商歲曰審平平氣太羽歲曰流衍太過少羽歲曰涸流不及正羽歲曰靜順平氣各以紀之也氣之平則同正化無過與不及也又詳太過運中有為司天之氣所抑者亦為平氣則赫曦之紀寒水司天二年戊辰戊戌堅成之氣二火司天四年庚子庚午庚寅庚申皆平氣之歲也紀運太過不及平氣之圖歌曰發生委和敷和角赫曦伏明升明徵敦阜卑監備化宮流衍涸流順靜羽堅成從革審平商太過不及平氣紀每句三位初太過次不及末平氣論太少氣運相臨同化其運其氣或太或少乃輪主歲時而更盛更衰也上達於天則有五星倍減之應下推於地則有五蟲耗育之驗其五穀五果五味五色之化豈有一歲而無者惟成熟有多少色味有厚薄耳蓋金木水火土並行其化互有休囚旺相不同遇陽年則氣旺而太過遇陰年則氣衰而不及太過己勝則欲齊其所勝之化不及己弱則勝者來兼其化太過歲謂木壬齊金化金庚齊火化火戊齊水化水丙齊土化土甲齊木化也不及歲謂木丁兼金同化金乙兼火同化火癸兼水同化水辛兼土同化土己兼木同化也其司天與運相臨間有逆順相刑相佐司天則同其正抑運則反其平如是五氣平正則無相凌犯也太過之歲五運各主六年乃五六三十陽年也太角謂六壬年逢子午寅申二火司天壬子壬午壬寅壬申則木運為逆者火居其上也子居父位居其上為逆太徵謂六戊年或逢寒水司天正抑其火乃為平氣之歲上羽與正徵同也戊辰戊戌正徵戊午之類太宮謂六甲年也太商謂六庚年也內逢子午寅申二火司天正抑其金復為平氣之歲上徵與正商同也庚子庚午庚寅庚申正商乙酉之類是也逢辰戌水司天為逆庚辰庚戌水乃金之子也居上為逆太羽謂六丙年也不及歲五運各主六年乃五六三十陰年也少角謂六丁年也逢巳亥木司天為運氣得助上角同正角也丁巳丁亥正角丁卯之類逢卯酉金司天與運兼化上商同正商也丁卯丁酉逢丑未土司天以木不及金兼化則土得其政上宮同正宮也丁丑丁未正宮己未之類少徵謂六癸年也內逢卯酉金司天以火不及水兼化則金得其政上商同正商也癸卯癸酉少宮謂六己年也內逢丑未土司天為運得助上宮同正宮也己丑己未逢巳亥木司天與運兼化上角同正角也己巳己亥少商謂六乙年也內逢卯酉金司天為運得其助上商同正商也乙卯乙酉逢巳亥木司天以金不及火兼化則木得其政上角同正角也乙巳乙亥少羽謂六辛年也逢丑未土司天與運兼化上宮同正宮也辛丑辛未內言上者乃司天之令其五太五少歲所紀不同者蓋遇不遇也如君火相火寒水常為陽年司天濕土燥金風木常為陰年司天然六十年中各有上下臨遇或司天勝運或運勝司天或運當太過不務其德而浮勝其所不勝或運當不及而避其所勝不兼其化其他太乙天符歲會同天符同歲會已具他篇不復贅也經曰氣相得則和乃木火相臨金水相臨水木相臨火土相臨土金相臨皆上生下司天生運故曰相得不相得則病乃木土相臨土水相臨水火相臨火金相臨乃上克下司天克運為不相得則病土臨火火臨木木臨水水臨金金臨土乃運生司天以下臨上為逆故病亦微又如木居金土位火居金水位土居水木位金居火木位乃運克司天或司天克運如是者為不相得故病甚也五運齊化歌五行太過名齊化凡遇陽年即可推勝己若臨逢我旺彼雖克我我齊之齊如木欲齊金是也五運兼化歌五行不及為兼化年值陰兮候用占我氣已衰行正令其間勝己必來兼兼謂強者兼弱而同化如水兼火是也逐年平氣歌平氣細將推非惟不及時陽年天抑運陰運合年支假令戊辰陽年火太過而水司天抑之乃平癸巳陰年火不及而巳屬火得其佐亦平五運太過勝己司天抑平之歌上羽正徵同戊火逢氣水上徵正商同庚金火氣是上徵謂歲逢過不及以本運太少音為正司天音為上或司天勝其正化亦同於正非音有上正也此己太過勝己在上抑乎之故上音與正音同五運不及己所合司天助運歌上角同正角丁運木司天上宮同正宮己運土氣懸上商同正商乙運金氣焉己所合在上助己故上音同音運不及勝己司天兼化歌木氣運逢己上角同正臨土氣運逢辛上宮同正侵金氣運逢丁上商同正尋勝己在上兼化故正音從司天音運不及勝已司天得政歌上角緣何同正角火兼乙化木司時上宮而以同正宮金兼丁化土氣司上商必然同正商水兼癸化金司之己不及復為勝己所制遇不勝己在上得政己全弱故正宮亦從司天五運太少齊同化圖論五行勝復或曰元豐四年歲在辛酉陽明司天為上商少陰在泉為下徵天氣燥地氣熱運得少羽歲水不及所謂涸流之紀而反河決大水何也曰少角之歲木不及侮而乘之者金也金不務德故以燥勝風時則有白露早降收氣早行其變為肅殺其災為蒼隕名為少角而實與太商之歲同少徵之運歲火不及侮而乘之者水也水不務德故以寒勝熱時則寒雰凝慘地積堅冰其變為凜冽其災為霜雹名為少徵而實與太羽之歲同少宮之運歲土不及侮而乘之者木也木不務德故以風勝濕時則有大風飄暴草偃砂飛其變為振發其災為散落名為少宮而實與太角之歲同少商之運歲金不及侮而乘之者火也火不務德故以熱勝燥時則有火炎焦槁炎赫沸騰其變為銷爍其災為燔焫名為少商而實與太徵之歲同少羽之運歲水不及侮而乘之者土也土不務德故以濕勝寒時則有泉湧河衍涸澤生魚其變為驟注其災為霖潰名為少羽而實與太宮之歲同通乎此則知歲在涸流之紀而河決大水則可以類推之也非徒如是而已天地之間或得其沖氣而生或觸其乖氣而夭未有能逃乎五行者也所謂沖氣者不相勝復而已所謂乖氣者勝復更作而已方其乖氣之爭狼戾已形忿怒已萌處乎此而求勝乎彼也雖有強剛勇悍之氣又豈能常勝哉故已有復之者伺乎其後矣是故木勝則金復以救土而名木不榮火勝則水復以救金而冰雹乃零土勝則木復以救水而倮蟲不育金勝則火復以救木而流水不冰水勝則土復以救火而黅谷不登夫暴虐無德者災反及之侮而乘之者侮反受邪出乎爾者反乎爾未有勝而不復者也勝之微者復亦微勝之甚者復亦甚其猶空谷之響乎故曰五運之氣猶權衡也高者抑之下者舉之化者應之勝者復之化者應之氣之平也五氣之相得也勝者復之氣之不平也五氣之相賊也氣平而相得者所以道其常氣不平而相賊者所以觀其變古之明乎此而善攝生者何嘗不消息盈虛以道御神也無失天信無逆氣宜抑其有餘而不翼其勝助其不勝而不讚其復是以喜怒悲憂恐有所一而莫能亂精神魂魄意有所養而莫能傷春風秋雨冬涼夏暑雖天道之屢變如凶荒札瘥豈能成其患哉論勝復運有盛衰氣有虛實更相迎隨以司歲也故經曰有餘而往不足從之不足而往有餘從之者此也故運互有太少勝復之變作矣太過則先天時化以氣勝實故不勝者受邪不及則後天時化以氣衰虛故勝己者來克被克之後必待時而復也行復於所勝則己不可前故待得時則子當旺然後子為母復仇如木運少角歲金清化來勝則子火為復復亦勝也火反勝金故曰勝復同也反熱化勝金也火運少徵歲水寒化來勝則子土為復反濕化勝水也土運少宮歲木風化來勝則子金為復反清化勝木也金運少商歲火熱化來勝則子水為復反寒化勝火也水運少羽歲土濕化來勝則子木為復反風化勝土也故言勝復同者此也玄珠論六氣有正化對化之司若正司化令之實甚則勝而不復對司化令之虛微則勝而有復勝甚則復甚勝微則復微所謂邪氣化日也言六氣勝甚復甚勝微復微如是氣不相得則邪氣中人而疾病矣然天地之氣亦行勝復故經曰初氣終三氣天氣主之勝之常也四氣盡終氣地氣主之復之常也蓋勝至則復復已而勝故無常氣乃上復而不勝則是生氣已絕故曰傷生也又歲氣太過則不勝者受邪若得其實而反欺侮其所不勝己者運不及所勝者來克承氣之虛又為不勝己者凌侮如是終必受邪以原非勝己之氣必自傷也已矣故經曰侮反受邪此之謂也如是不一則在氣候以別之也運氣先後天歌氣有餘先天時而至行化氣不足後天時而至行化運化宜精別其行氣後先後天從不及太過主先天運化勝復同歌勝復同兮不及年運衰勝己必加愆母仇子旺還當復子化隨時反勝焉如丁年木不及金清化來勝則子火為復反熱化勝金余仿此運化勝復同圖論六十年客氣司天在泉四間氣紀步各主六十日八十七刻半客行天令居於主氣之上故有溫涼寒暑矇瞑明晦風雨霜雪電雹雷霆不同之化其春溫夏暑秋涼年寒四時之正令豈能全為運與氣所奪則當其時自有微甚之變矣布此六十客氣列於主位之下者使知其氣之所在之大法也其天符歲會平氣支幹逆順氣與運相生相剋客勝主勝災化分野交時先後淫勝郁復嘉祥災變各各不同而六氣極則過亢災害生矣故氣極則反由是所承之氣居下以乘之經所謂相火之下水氣承之是也又有中見之氣從之經所謂少陽之上火氣治之中見厥陰是也蓋陽極則陰生陰極則陽生斯五行相濟之妙用也其中見者乃手足經六合臟腑相乘之化是也在天地間氣自應之矣論天地六氣五行陰陽之氣以布八方蓋天氣降而下地氣遷而上地之氣靜而常天之氣動而變其六氣之源則同六氣之緒則異何哉蓋天之氣始於少陰而終於厥陰經曰少陰所謂標厥陰所謂終是也地之氣始於厥陰木而終太陽水經曰顯明之右君火之位是也故天之六元氣反合地十二支以五行正化對化為其緒則少陰司子午太陰司丑未少陽司寅申陽明司卯酉太陽司辰戌厥陰司巳亥天氣終始之因如是而已地之六氣反合天之四時風熱暑濕燥寒為緒則厥陰風木主春少陰君火主春末夏初少陽相火主夏太陰濕土主長夏陽明燥金主秋太陽寒水主冬地氣終始之因如是而已經曰天有陰陽地亦有陰陽者乃上下相臨也天氣動而不息故五歲而右遷地氣靜而守位天氣不加於君火則五歲而餘一氣右遷相火之上以君火不立歲故也地之紀五歲一周天之紀六期一備五歲一周則五行之氣遍六期一備則六氣之位周與干加支之緒小同取陰陽相錯上下相乘畢其紀之之意也以五六相合故三十年一紀則六十年矣交六氣時日圖交六氣時日歌厥陰之氣大寒初君火春分二上求小滿少陽三候是太陰大暑四交諸秋分五定陽明位寒暑終於小雪歟六氣正化對化之圖少陰正化午對化子太陰正化未對化醜少陽正化寅對化申陽明正化酉對化卯太陽正化戌對化辰厥陰正化亥對化巳歌曰午火位寅火生同酉金屬未土寄戌水伏天門上亥木生正方由十二支分半余皆正化求六氣遷移加臨之圖客行天命有寒暑燥濕風火之化主當只奉之客勝則從主勝則逆二者自以多少為勝而無復與常勝殊四間氣之圖四間此以客氣論之司天為三氣在泉為終氣余為左右間司天左為四氣右為二氣在泉左為初氣右為五氣歌曰如推四間居何地標準司天與在泉左四天旁同右二左初右五列泉邊六十年主客加臨天氣午子初寒切霜雪冰二風雨蟲三暑烘四雨霪零走雷電五濕風兮燥寒終未醜初蟲二疵疫雷雨電雹三氣中四乃炎沸五涼燥大寒凝冽六之功熱風時氣申寅初是二雨三為災亢攻四風霧露五寒早寒風雨蟲六驗工酉卯初風雨二熱疫三發涼風四雨濛涼風雨蟲五能致蟄出不冰應六宮瘟疫戌辰初濕涼二寒熱冰雹三所通四風雨蟲五濕熱寒雪地濕六不空亥巳初霧昧二雨熱熱風雨蟲三卻同暴雨溽濕熱用四雨五六蟄不冰窮此皆客行天令居上故有是不同之化然平氣至必當其期過不及則先後其候於交氣期各差十三日而應六十年氣運相臨之圖歌曰六十年中紀運歌運克氣者為不和氣如生運為順化運被氣克天刑多小逆見之運生氣氣運合則天符過小逆如己卯歲雖金與土相得然子臨父位為逆論天符司天者司直也主行天之令上之位也歲運者運動也主天地間人物化生之氣中之位也在泉者主地之化行乎地中下之位也一歲之中有此上中下三氣各行化令而氣偶符會而同者則通其化雖無克復之變則有中病徐暴之異是謂當年之中司天之氣與中氣運同者命曰天符符之為言合也天符共十二年中又有與當年十二律五行同者又是歲會命曰太乙天符太乙者尊之之號也謂一者天會二者歲會三者運會止有四年不論陰年陽年皆曰天符為執法歲會為行令太乙天符為貴人邪之中人則執法者其病速而危行令者其病徐而持貴人者其病暴而死蓋以氣令中人則深矣歲會幹律同而非天令言行令者象方伯無執法之權故無速害病但執持而已天符之圖論歲會夫當年十干建運與年神十二律五行相會故曰歲會氣之平也故不以陰年陽年乃是取四時正月之中為四直承歲子午卯酉是也而土無正位各寄旺四季之末一十八日有奇則通論承歲辰戌丑未是也外有四年壬寅皆木庚申皆金是二陽年癸巳皆火辛亥皆水是二陰年是運與年辰相會而不為歲會者謂不當四年正中之令故也除二陽年則癸巳辛亥二陰年雖不名歲會亦上下五行相佐皆為平氣之歲物生脈應皆必合期無先後矣歲會八年中內四年與司天氣同已入太乙天符歲會之圖論同天符同歲會運氣與在泉合其氣化陽年曰同天符陰年曰同歲會故六十年中太乙天符四年天符十二年歲會八年同天符六年同歲會六年五者離而言之共三十六年合而言之止有二十七年經言二十四歲者不言歲會也變行有多少病形有微甚生死有早晏按經推步誠可知也同天符同歲會之圖天符太乙天符歲會同天符同歲會總歌司天與運及年支三位相參太乙符運合年支名歲會土辰四正必同途在泉合運陰同歲陽則同天符可呼惟有天符何意取司天合運是其區符合也太乙尊之之號惟辰戌丑未寄位於子午卯酉四正位主歲會者余不當止中之合故耳邪之中人太乙暴而死歲會徐而持天符速而危干德符無論無圖讀其歌便諳其義故錄於此不及年月干符同未逢行勝氣亦平行勝己後行復畢本氣即得正德位年前大寒交初氣其日乾合年干位交氣時干或合之二者皆為平氣至如丁酉歲木運不及當金行勝正月建壬與丁合此木逢勝己卯歲土不及當木行勝金行復至九月建甲與己合土乃還位此行勝己後亦行復己畢也年日時除交初氣余雖相遇不相齊合謂甲與己合之類是也論手足經經言人五臟十二節皆通乎天氣者乃論手足經三陰三陽也其十二經外循身形內貫臟腑以應十二月即十二節也五臟為陰六腑為陽一陰一陽乃為一合即六合也夫少陰之經主心與腎二臟者蓋心屬火而少陰冬脈其本在腎又君火正司於午對化於子是以腎臟亦少陰主之五臟為陰不可言陽水隨腎至故太陽為腑則手太陽小腸足太陽膀胱也太陰之經主脾與肺二臟者蓋脾屬陰土而太陰陰脈在肺又上生金子隨母居故肺太陰主之金隨肺至故陽明為腑則手陽明大腸足陽明胃也厥陰之經主肝與心包絡二臟者蓋肝屬木又生火子隨母居故心包厥陰主之火隨心包而至故少陽為腑則手少陽三焦足少陽膽也其手足經者乃手經脈自兩手起足經之脈自兩足起也以十二辰言之蓋陰生於午陰上生故曰手經陽生於子陽下生故曰足經所以紀上下也又心肺心包在上屬手經肝脾腎在下屬足經亦其意也臟腑同為手足經乃一合也心包非臟三焦非腑也經曰膻中者臣使之官喜樂出焉在胸主兩乳間為氣之海然心主為君也三焦者決瀆之官水道出焉三焦有名無形上合心主下合於右腎主謁道諸氣名為使者也手足經所屬之圖手足經歌太陽小腸足膀胱陽明大腸足胃當少陽三焦足膽匹太陰肺兮足脾方少陰心經足腎部厥陰包絡足肝鄉臟腑所屬地支歌子腎午心辰膀胱醜脾酉腸戌小腸未肺巳肝亥包絡卯胃中焦寅膽房論六病厥陰所至為裡急筋緩縮急支痛軟戾脅痛嘔泄少陰所至為瘍疹身熱惡寒戰慄驚惑悲笑譫妄衄衊血汙太陰所至為積飲痞隔中滿霍亂吐下身重胕腫肉泥按不起少陽所至為嚏嘔瘡瘍耳鳴嘔湧溢食不下驚躁瞀昧目不明暴注瞤瘈惡病暴死陽明所至為鼽嚏浮虛皴揭尻陰股膝髀腨胻足病太陽所至為屈伸不利腰痛寢汗痙流泄禁止此六氣之為病也按經旨則淫勝郁復主客太少皆至其疾則邪之中人有淺深矣又在人稟受沖冒畏避而已原夫人稟五行之氣生亦從五行之數盡若起居調養而能避邪安正無橫夭殃矣然為七情牽於內六氣干於外由是眾疾作而百病生又況趨逐名利貪迷嗜欲勞役辛苦飢渴醉飽沖涉寒暑凌冒風雨觸犯禁忌殘賊真靈如是論之夭殤之由豈數之盡也歸咎於己而已經曰不知持滿不時御神務快其心逆於生樂者此之謂也蓋天之邪氣感則害人五臟水穀之寒熱感則害人六腑燥濕感則害人皮肉筋脈又喜怒傷氣寒暑傷形是知病生之變亦由乎我也又或乘年之虛失時之和遇月之空則邪甚矣重感於邪則病危矣雖然氣運交相臨遇相得則和不相得則病或瘟疫時氣一州一縣無問大小皆病者斯固氣運使然若我真元氣實起居有時動作無相沖冒縱是瘟疫之作亦微是故聖人有養生修真之術也或者以為天地五運六氣如何人病蓋人之五臟應天地五行陰陽之氣隨其卷舒衰旺故也王冰以為蒼天布氣尚不越於五行人在氣中豈不應於天道故隨氣運陰陽之盛衰亦理之自然也但五運六氣為疾而感之者多矣又經曰冬傷寒春病瘟春傷風夏飧泄夏傷暑秋痎瘧秋傷濕冬咳嗽傷四時之氣皆能為病又有四方之氣不同為病各異故經有異法方宜之論以得病之情者是也又或當歲有病而非歲氣者亦須原其所感形證脈候未必盡為運氣所作在工以明之庶免拘泥運氣也歌曰厥陰筋軟縮裡急軟戾支脅痛嘔泄少陰寒熱慄疹瘍驚惑悲笑譫衄衊太陰積飲否滿中身重胕腫霍亂別少陽喉痹嚏嘔瘍耳鳴湧溢驚躁掣暴注瞀昧目不明瞤瘈惡病暴死滅陽明鼽嚏皴揭浮虛浮尻陰股腨足病切太陽寢汗若屈伸流泄禁止腰痛折論治法主客之氣皆能致其疾下是主氣上是客氣經曰木位之主其瀉以酸其補以辛厥陰之客以辛補之以酸瀉之以甘緩之火位之主其瀉以甘其補以咸少陰之客以甘瀉之以痠軟之少陽之客以咸補之以甘瀉之以咸軟之土位之主其瀉以苦其補以甘太陰之客以甘補之以苦瀉之以甘緩之金位之主其瀉以辛其補以酸陽明之客以酸補之以辛瀉之以苦緩之水位之主其瀉以咸其補以苦太陽之客以苦補之以咸瀉之以苦堅之以辛潤之此六氣主客之補瀉也客勝則瀉客補主主勝則瀉主補客應隨當緩當急以治之也而本經又有六氣司天在泉淫勝之治法有司天在泉反勝之治法有歲運上下所宜藥食之治法如是不一各依疾苦順其運令以藥石五味調治之為工者當明其歲令察其形證診其脈急別其陰陽依經旨以拯救之何患疾之不瘥耶五運之中又有必折其鬱氣先取化源之法玄珠以為太陽司天取九月瀉水之源陽明司天取六月瀉金之源少陰少陽司天取三月瀉火之源太陰司天取五月瀉土之源厥陰司天取年前十二月瀉木之源乃用針迎而取之之法也故曰無失天信無逆氣宜無翼其勝無贊其復是謂主治者此也蓋用藥之制有法存焉然病有久新方有大小有毒無毒而宜其制此用之大法也或者以為歲運太角木旺土衰迎取之當瀉其肝經而益其脾胃此非通論也何哉豈有人人臟腑皆同者假如肝元素虛脾氣太盛遇此太角之運肝木稍實脾氣得平方獲安和若便瀉肝補脾所謂實實虛虛損不足而益有餘如此而死者醫殺之耳是不察其誤反害人增疾尤甚也何則天下事物之理益之則遲而損之則速若服一藥取其效則緩而微若食一發病之物俄頃而應由是觀之成難毀易可不謹哉六氣主客補瀉歌木主酸收瀉辛散補之火主甘取舒緩瀉咸取柔軟補施土主苦取堅燥瀉甘安緩味補金主辛散瀉酸收補為水主咸軟瀉苦堅補是六氣補瀉客後隨辛散補酸收瀉甘苦急緩厥甘瀉酸苦緩收少陰知咸補甘瀉咸軟相甘補苦瀉甘緩脾酸補苦瀉肺經施苦補咸瀉於水推更以苦堅以辛潤同極太陽尤其宜二火之氣雖殊其用則一木用辛補酸瀉經注辛味散故補酸味收故瀉校正云自為一義今未詳法復司氣可犯無犯如夏寒甚則可熱犯熱不甚則不可反五臟所入之味歌酸主收之屬肝臟苦堅入心甘緩脾辛性味散能調肺咸則軟兮於腎宜六氣所宜之味歌鹹寒二火木辛涼甘熱當令治太陽苦折太陰宜苦熱陽明之味苦溫嘗論六脈明陰陽運轉之六氣辨南北歲政之尊卑察主客勝負之由審淫勝郁復之變須在脈候然後為工矣五運不及則所勝者來克五運太過則不勝者受邪天地六氣互相臨遇應則順否則逆氣相得則和不相得則病唯天地勝復之氣不形於證者乃初氣終三氣天之勝四氣盡終氣地之復蓋以氣不以位故不以形證觀察也余則當知六脈故經曰厥陰之至其脈弦少陰之至其脈沉少陽之至其脈大而浮陽明之至其脈短而澀太陽之至其脈大而長至而和則平至而甚則病至而反者病至而不至者病未至而至者病陰陽易者危不當其位者病見於他位也迭易其位者病失守其位者危此之謂也然人之生也雖五行備於一身生氣根於內亦隨天地之氣卷舒也何以明之謂如春脈弦夏脈洪秋脈毛冬脈石是也夫人感運氣而生亦曰感運氣而疾經曰逆之則變生變生則病物生其應世氣脈其應也當立歲氣以診別之平人氣象論曰太陽脈至洪大而長少陽脈至乍數乍疏乍短乍長陽明脈至浮大而短難經引此亦論三陰三陽之脈者乃以陰陽始生之淺深而言之也六脈者蓋言運與氣勝復臨遇正當行令當其司化之時而應故脈之動不相同若交運交氣時日及期而見無相先復不及太甚方謂之平若瘥之者當知其病也論南北政運用十干起則君火不當其運也六氣以君火為尊五運以濕土為尊故甲己上運為南政蓋土以成數貫金木水火位居中央君尊南面而行令餘四位以臣事之北面而受令所以有別也而人脈應之甲己之歲二運南面論脈則寸在南而尺在北少陰司天兩寸不應乃以南為上北為下正如男子面南受氣尺脈當弱女子面北受氣尺脈常盛之理同以其陰氣沉下故不應耳六氣之位則少陰居中而厥陰居右太陰居左此不可易也其少陰則主兩寸尺厥陰司天在泉當在右故右不應太陰司天在泉當在左故左不應依南政兩論尺寸也若覆其手診之則陰沉於下反沉為浮細為大矣又經曰尺寸反者死陰陽交者死先立其年以知其氣左右應見然後乃可言死生之逆順者更在診以別其反詳其交而後造死生之微也歌曰土位居南號曰君火金木水北方臣運須濕土起甲己故當尊位六氣仍先君火論論氣運加臨尺寸脈候不應交反說經曰陰陽交者死謂歲當陽在左脈反見右歲當陰在右脈反見左左右交見是謂交若左獨然或右獨然是不應非交也惟寅申巳亥辰戌丑未八年有之經曰尺寸反者謂歲當陰在寸而脈反見於尺歲當陽在尺而脈反見於寸尺寸俱反方謂之反若尺獨然或寸獨然是不應非反也惟子午卯酉四年有之蓋造化之氣變常則氣血紛擾而為病矣經曰先立其年以知其氣左右應見乃可以言生死之逆順也舉此為例餘歲同法粗工不知呼為寒熱攻寒令熱脈不變而熱疾已生制熱令寒脈如是而寒疾又起欲求其適安可得乎夭枉之因率由此也凡三陰司天在泉上下南北二政或左或右兩手寸尺其脈沉下沉下不相應者覆手則沉為浮細為大矣尺寸交反死脈如太陰司天陰脈歲當見左寸反見右寸其右寸本然陽脈而移左寸曰陰陽交交者死若左獨陰脈不見或右獨不見乃不應陰氣止疾而已尺同惟寅申巳亥辰戌丑未八年有之少陰司天陰脈歲當見兩寸反見兩尺其尺本然陽脈而移兩寸曰尺寸反反者死尺同尺寸獨義因前惟子午卯酉四年有之歌曰左寸交右右交左右尺交左左交右兩寸反移兩尺居兩尺反移兩寸守南北政尺寸脈不應不應謂陰之所在脈乃沉細不應本脈也若覆手診之則沉為浮細為大矣尺寸本無上下今以上下字言之以別南北政司天在泉所主耳南北政尺寸脈不應圖歌曰南政寸上尺居下北政寸上尺下推三陰司天不應上在泉於下不應之太陰須診左寸尺厥陰右手尺寸持少陰脈兼兩寸尺此理微妙誠難知按脈不應專主三陰言然少陰君火也故主兩寸兩尺所以少陰司天兩寸不應少陰在泉兩尺不應子之左醜屬太陰故太陰司天左寸不應太陰在泉左尺不應子之右亥屬厥陰故厥陰司天右寸不應厥陰在泉右尺不應但看三陰所在司天主寸在泉主尺不論南政北政此要法也一人臥病醫診左尺不應以為腎氣絕矣死在旦夕更醫診之察色切脈則面戴陽氣口皆弦而長乃傷寒三陽合病也又方涉海為風濤所驚遂血菀而神懾為熱所搏乃吐血一升許且脅痛煩渴譫語投小柴胡湯減參加生地半劑後俟其胃實以承氣湯下之而愈適是年歲運左尺當不應此天和脈非腎絕也五運主病治例五運所化之圖甲己歲氣土化之圖甲歲土太過是歲泉湧河溢涸澤亦生魚風雨大行歲運黃天至土崩潰鱗見於陸敦阜之紀平氣備化甲歲南政太宮之音歲氣雨濕流行至陰內實物化充成其變震驚飄驟崩潰腎水受邪病則腹痛清厥體重甚則足痿不收腳痛中滿四肢不舉脾土勝腎水木為水之子復能剋土則反溏泄甚則大溪絕者死足內踝後跟骨上動脈中腎脈是也臨辰戌為歲首甲辰甲戌下加太陰為同天符同上己歲土不及歲運黅天甲監之紀平氣備化己歲南政少宮之音歲氣風寒大作雨乃愆期草木秀而不實脾土受邪病即飧泄霍亂體重腹痛肝木克脾土金為土之子復能克肝木則反胸脅暴痛下引小腹臨辰戌丑未為歲會甲辰甲戌己丑己未上見太陰為太乙天符己丑己未下臨厥陰己巳己亥流水不冰蟄蟲來見民乃康乙庚歲氣金化之圖乙歲金不及歲運素天從革之紀平氣審平乙歲北政少商之音歲氣炎火盛行生氣乃用爍石流金涸泉焦草肺金受邪病則肩背瞀重鼽嚏血便注下心火克肺金水為金之子復能克心火則反心痛腦痛延及囟頂發熱口瘡心痛臨酉為太乙天符乙酉為歲會上見陽明為天符乙卯復則水勝火寒雨暴至冰雹雪霜庚歲金太過歲運素天堅成之紀平氣審平庚歲北政太商之音歲氣燥行天氣潔地氣明陽氣隨陰肅殺凋零肝木受邪病則腹痛目赤體重胸痛脅滿引小腹耳無聞甚則喘咳逆氣背肩尻陰股膝髀胻足痛肺金克肝木火為木之子復能反克肺金則反血溢心痛胠脅不可轉側咳逆太衝絕者死臨酉為歲會乙酉下見陽明為同天符庚子庚午丙辛歲氣水化之圖丙歲水太過是歲雨水雪霜不時降濕氣變物歲運玄天流衍之紀平氣靜順丙歲北政太羽之音歲氣天地寒凝其變冰霜雪雹心火受邪病則心身發熱煩躁陰厥中寒甚則腹大脛腫喘咳腎水勝克心火脾為火之子復能克腎反腸鳴溏泄甚則神門絕者死穴在掌後銳骨端心主脈也臨子為歲會丙子上見太陽為天符丙戌丙辰辛歲水不及歲運玄天涸流之紀平氣靜順辛歲北政少羽之音歲氣水泉減草木茂腎水受邪病則身重濡瀉腫滿腰膝痛足痿清厥甚則跗腫腎氣不衡脾土克腎水木為水之子復能克脾則反面色時變肉瞤瘈膈中痛及心腹臨醜為同歲會辛丑辛未上見太陰下見太陽為同歲會則大寒蟄蟲早藏丁壬歲氣木化之圖丁歲木不及是歲天地悽愴日見朦昧雨非雨晴非晴慘然氣象凝斂肅殺之甚歲運蒼天委和之紀平氣敷和丁歲北政少角之音歲氣燥氣乃行生氣失政涼雨時降風雪並興草木晚榮物秀而實肝木受邪病中清胠脅滿少腹痛腸鳴溏瀉肺金勝肝木火為木之子復能剋金則反寒濕瘡癢痤痱腫癰咳血夏生大熱濕變為躁草木槁下體再生上見厥陰為天符丁巳丁亥臨卯為歲會丁卯壬歲木大過歲運蒼天發生之紀平氣敷和壬歲北政太角之音歲氣風氣流行生氣淳化萬物以榮其變震拉摧拔脾土受邪病飧泄食減體重腸鳴腹痛脅滿肝木克脾土金為土之子復能勝木則反脅痛而吐甚則衝陽絕者死臨卯為歲會丁卯下見厥陰為同天符壬申壬寅戊癸歲氣火化之圖戊歲火太過是歲火燔灼水泉涸物焦枯歲運丹天赫曦之紀平氣升明戊歲北政太徵之音歲氣陰氣內化其變則炎烈沸騰肺金受邪病則發瘧少氣喘咳血溢泄瀉胸脅滿痛背膂痛身熱骨痛心火勝肺金水為金之子復能勝火反狂妄泄瀉喘咳血溢甚則手太陰太淵絕者死臨子為太乙天符戊子為天符戊午為太乙天符上見少陰少陽為天符戊午戊子戊寅戊申癸歲火不及歲運丹天伏明之紀平氣升明癸歲北政少徵之音歲氣寒乃盛行火令不政物生不長陽氣屈伏蟄蟲早藏心火受邪病則胸脅膺背痛鬱冒暴喑臂痛腎水勝心火土為火之子復能克腎則反寒腹中腸鳴瀉注攣痹足不任身臨卯酉為同歲會癸酉癸卯下見少陰少陽為同歲會癸卯癸酉癸巳癸亥六氣所化之圖六氣主病治法例風勝燥制火併湯天南星二兩半北桔梗七錢半小梔子一兩取仁上三味入太陰肺經助燥化制其風川黃連八錢半此一味入少陰心經瀉火抑母之甚母者木也此實則瀉其子也青皮二錢半引諸藥至風勝之地防風三錢薄荷一錢上二味散風勢上為粗末每服七錢半水一大盞姜三片煎七分去渣溫服水勝濕制風並湯蒼朮二兩米泔浸一宿炒白朮二兩半麩炒甘草五錢炙上三味入太陰脾經助土以制水甚吳茱萸五錢乾薑五錢七分上二味入厥陰肝經瀉木以抑母甚母者水也此實則瀉其子也附子一錢一字引諸藥至水勝之地上為粗末每服七錢大棗一枚水一盞煎七分去渣溫服火勝寒制溫並湯黃柏二兩半鹽水炒知母一兩上二味入少陰腎經助寒化以制火甚片黃芩五錢酒炒梔子仁四錢二味入太陰脾經助濕化以抑母甚黃連一錢薑汁炒引諸藥至火勝之地上為粗末每服七錢燈芯七根蓮子五枚水一盞煎七分溫服土勝風制燥並湯川芎一兩米醋炒當歸一兩半酒洗上二味入厥陰肝經助風化以制其濕南星一兩湯泡七次桑白皮蜜炙七錢上二味瀉燥奪母大棗五枚引藥至濕感之地川萆薢八錢以散濕上為粗末每服七錢姜五片水一盞煎七分溫服金淫熱制寒並湯肉桂二兩入少陰心經助熱化以制金甚當歸兩半酒洗助木生火以制燥勝澤瀉一兩入少陰腎經瀉寒以抑母獨活六錢與澤瀉頗同桔梗三錢半引諸藥至燥勝所上為粗末每服六錢水一盞煎七分溫服燥易則止火勝陰精製霧漚瀆並湯天門冬去心三兩淨蜜湯浸生地黃二兩半酒洗入陰精助水化以制熱甚柴胡五錢連翹黃芩各二錢二味入霧漚瀆抑甚地骨皮黃柏各二錢二味引諸藥至熱勝之地上為粗末每服七錢燈芯一撮水一盞煎七分溫服五運主方治例凡遇六壬年發生之紀歲木太過風氣流行脾土受邪民病飧泄食減體重煩冤腸鳴脅支滿甚則忽忽善怒眩冒顛疾為金所復則反脅痛而吐甚則衝陽脈絕者死蒼朮湯治脾胃感風飧泄注下腸鳴腹滿四肢重滯忽忽善怒眩冒顛暈或左脅偏疼白茯苓厚朴制白朮青皮去白乾薑炮半夏制草果仁甘草炙各等分上咀每服四錢水一盞姜三片棗一枚煎七分食前服凡遇六戌年赫曦之紀歲火太過炎暑流行肺金受邪民病瘧少氣咳喘血溢泄瀉嗌燥耳聾中熱肩背熱甚則胸中痛脅支滿背髀並兩臂痛身熱骨痛而為浸淫為水所復則反譫妄狂越喘鳴血溢泄瀉不已甚則太淵絕者死麥門冬湯治肺經受熱上氣咳喘咯血痰壅嗌乾耳聾泄瀉胸脅滿痛連肩背兩臂膊痛息高麥門冬香白芷半夏制桑白皮竹葉甘草紫菀茸鍾乳粉人參各等分上咀每服四錢水一盞姜三片棗二枚煎七分食前服凡遇六甲年敦阜之紀歲土太過雨濕流行腎水受邪民病腹痛清厥意不樂體重煩冤甚則足痿不收行善瘈腳下痛中滿食減四肢不舉為風所復則反腹脹溏泄腸鳴甚則太谿絕者死附子山茱萸湯治腎經受濕腹痛寒厥足痿不收腰膝痛行步艱難甚則中滿不下或腸鳴溏泄附子制山茱萸各一錢半夏制五錢丁香一分烏梅半兩乾木瓜肉豆蔻制各三分藿香一分上銼每服四錢水一盞姜七片棗二枚煎七分食前服凡遇六庚年堅成之紀歲金太過燥氣流行肝木受邪民病脅小腹痛目赤背癢耳無聞體重煩冤胸痛引背脅滿引小腹甚則喘咳逆氣背尻陰股膝髀腨胻足痛為火所復則暴痛胠脅不可反側咳逆甚而血溢太衝絕者死牛膝木瓜湯治肝虛遇歲燥脅連小腹拘急疼痛耳聾目赤咳逆肩背連尻陰股膝髀腨胻皆痛悉主之牛膝酒洗木瓜各一兩芍藥杜仲制枸杞子黃柏節菟絲子制天麻各三分甘草炙五錢上咀每服四錢水一盞姜三片棗一枚煎七分食前服凡遇六丙年流衍之紀歲水太過寒氣流行邪害心火民病身熱煩心躁悸上下中寒譫語心痛甚則腹大脛腫喘咳寢汗憎風為土所復則反脹滿腸鳴溏泄食不化渴而妄冒甚則神門絕者不治凡遇六辛年涸流之紀歲水不及濕乃盛行民病肺滿身重濡泄寒瘍腰膕腨股膝痛上便頻足痿清厥腳下痛甚則胕腫腎氣不行為所復則反面色時變筋骨並臂肉瞤瘈目視䀮䀮肌肉發熱並膈中痛於心腹五味子湯治腎氣虛坐臥濕地腰重著疼痛腹脹滿濡瀉無度行步難足痿清厥甚則浮腫面色不常或筋骨並臂肉瞤瘈目視䀮䀮膈中及咽痛五味子附子制巴戟制鹿茸制山茱萸肉熟地黃杜仲制上咀每服四錢水一大盞姜三片鹽少許煎七分食前服凡六壬六戊六甲六庚六丙歲乃木火土金水太過五運先天六癸六丁六己六乙六辛歲乃木火土金水不及為五運後天民病所感治之各以五味所勝調和以平為期五運六氣平治湯審平湯歲金太過不及者用之卯酉之歲陽明司天病者中熱面浮鼻鼽小便黃赤甚則淋或癘氣善暴僕振慄譫妄寒瘧癰腫便血宜用此方以平金氣故曰審平遠志紫檀香各一兩天門冬山茱萸各一分白芍藥白朮甘草生薑各半兩上咀每服四錢水一盞煎七分食前服敷和散歲氣風木司天病者而反右脅下寒耳鳴淚出掉眩燥濕相搏民病黃癉浮腫時作瘟癘宜用此方以氣和而水敷榮也故曰敷和半夏五味子枳殼茯苓訶子皮乾薑橘皮甘草各半兩上咀每服四錢水一盞棗一枚煎七分食前服靜順湯歲氣寒水司天濕土在泉病者身熱頭痛嘔吐氣鬱中滿瞀悶少氣足痿注下赤白肌腠瘡瘍發為癰疽宜用此以正之則水氣自靜而順不致氾濫故云靜順白茯苓乾木瓜附子炮牛膝防風訶子皮甘草炙乾薑炮各半兩上咀每服四錢水一盞煎七分食前服升明湯歲氣少陽相火司天厥陰風木在泉民病氣鬱血熱咳逆頭痛脅滿嘔吐胸臆不利聾瞑煩渴身重瘡瘍宜用此正之火性不致於炎郁故曰升明紫檀香車前子青皮半夏酸棗仁薔𧃲生薑甘草各等分備化湯歲氣太陰濕土司天太陽寒水在泉民病關節不利筋急身重痿弱或瘟癘盛行胸腹滿悶甚則浮腫寒瘧血溢腰痛宜用此以正土氣則燥濕之患而物自生生矣故曰備化熟地黃茯苓附子覆盆子木瓜甘草生薑牛膝各等分上咀每服四錢水一盞煎七分食前服上五方為五行之平氣當其正音平氣之歲不須用此前紀運語之詳矣故木運太角歲曰發生為太過少角歲曰委和為不及惟正角歲曰敷和為平氣云云凡遇太過與不及之年以五平氣湯消息加減用之亦未必無補云正陽湯歲氣少陰君火司天陽明燥金在泉或有太過不及宜用此方以正真陽之火陽火君火也故曰正陽白薇當歸川芎芍藥桑白皮旋覆花玄參甘草上咀每服四錢水一盞半姜一片棗一枚煎七分服論主運大運太少相生運有大運有主運當年年干建運通主一年此為大運或太角或少角俱從大寒日始以次相生至羽而終每運各主七十三日零五刻總五運之數則三百六十五日零二十五刻而成一歲此為主運主運太少皆依大運陽年屬太陰年屬少上生至角而止下生至羽而止上下相生皆須太少相因不可失序假如甲運太宮土也上生太宮者少徵火生少徵者太角木此謂上生至角是也又太宮土下生者少商金金生太羽水此謂下生至羽是也甲與己合己從少宮上下相生焉又如乙運少商金也上生少商者太宮土生太宮土者少徵火生少徵火者太角木此亦謂上生至角也又少商下生者太羽水此亦謂下生至羽也乙與庚合庚從太商上下相生焉又如丙運太羽水也上生太羽者少商金生少商金者太宮土生太宮土者少徵火生少徵火者太角木此謂上生至角也丙與辛合辛從少羽上生焉又如丁運少角木也少角下生者太徵火火生少宮土土生少商金金生少羽水此謂下生至羽也丁與壬合壬從太角下生焉又如戊運太徵火也上生太徵火者少角木也太徵下生者少宮土土生太商金金生少羽水此亦謂上生至角下生至羽也戊與癸合癸從少徵上下相生焉是以逐年主運皆依大運或太角為初則太羽為終或少角為初則少羽為終經於各條大運角下注一初字羽下注一終字又以示人主運角羽之太少初終也甲乙丙壬癸五年皆太角木為初運主七十三日自大寒日起至春分後十三日止也少徵火為二運主七十三日自春分後十三日起至小滿後二十五日止也太宮土為三運主七十三日自小滿後二十五日起至大暑後三十七日止也少商金為四運主七十三日自大暑後三十七日起至秋分後四十九日止也太羽水為終運主七十三日自秋分後四十九日起至大寒而終也戊己庚辛丁五年皆少角木為初運太徵火為