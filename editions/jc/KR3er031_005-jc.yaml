法平以鹹寒佐以苦甘以酸收之歲半之後地氣陽明主之其化不從標本而從太陰之中氣當其時燥濕並行而無偏勝者陽明之化也或燥淫所勝則霿霧清瞑民病善嘔嘔有苦善太息心脅痛不能反側甚則嗌乾面塵身無膏澤足外反熱其法治以苦溫佐以酸辛以苦下之出至真要大論歲土太過是謂敦阜之紀雨濕流行腎水受邪民病腹痛清厥意不樂體重煩冤甚則肌肉痿足痿不收行善瘈腳下痛飲發中滿食減四肢不舉變生得位謂季月也藏氣水氣伏化氣土氣獨治之泉湧河衍涸澤生魚風雨大至土潰鱗見於陸病腹滿溏泄腸鳴反下甚而太谿絕者死不治其治宜以苦熱所謂歲氣之藥食宜之也出氣交變論初之氣始於癸亥歲十二月中氣大寒日寅初終於是年二月終氣春分日子初凡六十日有奇八十七刻半主位太角木客氣太陽水中見太宮土運統之風寒濕三氣奉少陰之政而行春令地氣遷燥將去寒乃始蟄復藏水乃冰霜復降風乃至陽氣鬱民反周密關節禁固腰脽痛炎暑將起中外瘡瘍出六元正紀論宜治太陽之客以苦補之以咸瀉之以苦堅之及辛潤之開發腠理致津液通氣也出至真要大論食丹谷火以全真氣食稷土以闢虛邪雖大寒邪亦不能為害也六元正紀論二之氣自春分日子正至小滿日戌正六十日有奇主位少徵火客氣厥陰木火木同德中見土運以奉少陰行舒榮之化時令至此陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和其病淋目瞑目赤氣鬱於上而熱出六元正紀論宜治厥陰之客以辛補之以酸瀉之以甘緩之出至真要大論食丹谷以全真氣食稻金以闢虛邪雖有風邪不能為害出六元正紀論三之氣自小滿日亥初至大暑日酉初六十日有奇主位少徵火客氣少陰火中見土運天政之所布也時令至此大火行庶類蕃鮮寒氣時至民病氣厥心痛寒熱更作咳喘目赤出六元正紀論宜治少陰之客以咸補之以甘瀉之以酸收之出至真要大論食丹谷以全真氣食豆水以闢虛邪雖有熱邪不能為害出六元正紀論四之氣自大暑日酉正至秋分日未正六十日有奇主位太宮土客氣太陰土運與氣同名為司氣溽暑至大雨時行寒熱互作民病寒熱嗌乾黃癉鼽衄飲發宜治太陰之客以甘補之以苦瀉之以甘緩之食白谷以全真氣食麻木以闢虛邪雖有濕邪不能為害五之氣自秋分日申初至小雪日午初六十日有奇主位少商金客氣少陽火中見土運客火用事畏火臨暑反至陽乃化物乃生榮民乃康其病溫宜治少陽之客以咸補之以甘緩之以咸軟之食白谷以全真氣食豆水以闢虛邪雖有火邪不能為害終之氣自小雪日午正至大寒日辰正六十日有奇主位太羽水客氣陽明金中見土運土能生金金能生水三氣相得而行順化燥令行餘火內格民病腫於上咳喘甚則血溢寒氣數舉則霜霧翳病生皮腠內舍於脅下連少腹而作寒中宜治陽明之客以酸補之以辛瀉之以苦堅之食白谷以全真氣食黍火以避虛邪雖有燥邪不能為害然初氣終三氣天氣主之勝之常也四氣盡終氣地氣主之復之常也出至真要大論若歲半之前少陰之氣勝者必有太陽之復若在泉陽明之氣勝者必有少陽之復其復皆在歲半之後觀其氣勝之早晚以驗復氣之遲疾治之有勝則復無勝則已出至真要大論辛巳年厥陰風木司天少陽相火在泉中見少羽水運歲水不及氣化運行後天天地之氣上見厥陰左間少陰右間太陰故天氣擾而其政撓下見少陽左間陽明右間太陽故地氣正而其令速風生高遠炎熱從之云趨雨府濕化乃行風火同德上應歲星熒惑其谷蒼丹間谷言大者以間氣之大者言其谷太宮太商等所生谷也其耗文角品羽風燥勝復形於中出六元正紀論雨化風化勝復同邪氣化度也風化三寒化一火化七正化度也出六元正紀論風化木為司天苦化火為在泉玄化水為司運柔化土清化金為間氣灼化君火為居氣灼化不曰間氣而曰居氣蓋尊君火無所不居不當間之也出至真要論其在物也毛蟲靜羽蟲育是為歲物所宜介蟲耗寒毒不生是為地氣所制出五常政大論然歲氣天化虛地化盈宜資化源年前大寒十二月迎而取之以助天氣之木化源雖虛水運在中水能生木邪乃微也必贊其運水無使邪勝以辛涼調上以鹹寒調下畏火之氣無妄犯之出六元正紀論歲半之前厥陰主之若風淫所勝則太虛埃昏雲物以擾寒生春氣流水不冰木化民病胃脘當心而痛上支兩脅鬲咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉病本於脾診在足衝陽脈其法平以辛涼佐以苦甘以甘緩之以酸瀉之出至真要大論歲半之後少陽主之若火淫於內則焰明郊野寒熱更至民病注泄赤白少腹痛溺赤甚則血便其法治以鹹冷佐以苦辛以酸收之以苦發之出至真要大論歲運之化水不及紀曰涸流是謂反陽藏令不舉化氣乃昌長氣宣布蟄蟲不藏土潤水泉減草木條茂榮秀滿盛其氣滯其用滲泄其動堅止其發燥槁其主埃郁昏翳其病痿厥堅下出五常政大論其化兼所不勝四維有湍潤埃云之化則不時有和風生髮之應四維發埃昏驟注之變則不時有飄蕩振拉之復其眚北其藏腎其病內舍腰脊骨髓外在溪谷踹膝皆以苦和調中厥陰少陽之政上下無克罪之異治化惟一故不再言同風熱者多寒化異風熱者少寒化出氣交變論初之氣自庚辰年大寒日巳初至是歲春分日卯初六十日有奇主位少角木客氣陽明金中見水運金勝木水運間之寒始肅殺氣方至民病寒於右之下出六元正紀論宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜蒼木間谷命其大也以間氣之大者言其谷也宜黍火出至真要大論二之氣自春分日卯正至小滿日醜初六十日有奇主位太徵火客氣太陽水中見水運氣與運同寒不去華雪水冰殺氣施化霜乃降名草上焦寒雨數至陽復化民病熱於中宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜蒼間谷宜稷土是氣也無犯司氣之寒三之氣自小滿寅初至大暑日子初六十日有奇主位太徵火客氣厥陰木中見水運歲運之水制火而生木故天政布風乃時舉民病泣出耳鳴掉眩宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜蒼間谷宜稻金四之氣自大暑日子正至秋分日戌正六十日有奇立位少宮土客氣少陰火中見水運溽暑濕熱相搏爭於左之上民病黃癉而為胕腫宜治少陰之客以咸補之以甘瀉之以酸收之歲谷宜丹間谷宜豆水五之氣自秋分日亥初至小雪日酉初六十日有奇主位太商金客氣太陰土中見水運土刑運燥濕更勝沉陰乃布寒氣及體風雨乃行宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜丹間谷宜麻木終之氣自小雪日酉正至大寒日未正六十日有奇主位少羽水客氣少陽火中見水運歲運得位而畏火司令陽乃大化蟄蟲出見流水不冰地氣大發草乃生人乃舒其病溫癘宜治少陽之客以咸補之以甘瀉之以咸軟之歲谷宜丹間谷宜豆水此六氣之化也歲氣之交天氣勝者則有陽明之復地氣勝者則有太陽之復觀其勝復各以其法治之甲戌年太乙天符太陽寒水司天太陰濕土在泉中見太宮土運歲土太過氣化運行先天太宮下加太陰太過而加同天符又土運臨戌是謂歲會氣之平也平土之歲命曰備化之紀氣協天休德流四正五化齊修其氣平其性順其用高下其化豐滿其政安靜其候溽蒸其令濕其類土其應長夏其谷稷其果棗其蟲倮其畜牛其物膚其色黃其味甘其音宮其數五其在人也其藏脾其主口其養肉其病否此歲運所主也出五常政論天地之氣上見太陽左間少陽右間少陰故地氣靜而其令徐水土合德上應辰星鎮星其谷玄黅黃寒臨太虛其政大舉陽氣不令澤無陽焰則火發待時少陽中治時雨乃涯止極雨散還於太陰云朝北極濕化乃布澤流萬物寒敷於上雷動於下寒濕之氣持於氣交民病寒濕發肌肉萎足痿不收濡泄血溢出六元正紀論歲半之前天氣太陽主之太陽有本標之化寒政大舉熱氣時應者天氣得中也歲半之後地氣太陰主之太陰之化從本雨濕甚者地氣之應也寒化六濕化五是為正化之日倮蟲育鱗蟲靜是為歲物所宜燥毒不生鱗蟲不成其味鹹地氣熱是為地氣所制平土之氣本不資化源運與地氣臨於戌土氣盛先資化源以助於水所謂抑其運化扶其不勝無使暴過而生其疾也食玄黅之谷以全其真闢歲之虛邪從沖後來之風以安其正以苦熱調上以苦溫調下運土在中亦以苦溫調之運同寒濕化宜燥熱治之常也五常政論六元正紀論相太並初之氣自癸酉年大寒日申初至是年春分日午初六十日有奇主位太角木客氣少陽火中見土運少陽中治以行春令地氣遷氣乃大溫草乃早榮民乃癘溫病乃作身熱頭痛嘔吐肌腠瘡瘍宜治少陽之客以咸補之以甘瀉之以咸軟之歲谷宜玄水間谷宜豆水則火不為邪二之氣自春分日午正至小滿日辰正六十日有奇主位少徵火客氣陽明金中見土運金土相和大涼反至民乃慘草乃遇寒火氣遂抑民病氣鬱中滿寒乃始宜治陽明之客以酸補之以辛瀉之以苦泄之歲谷宜玄間谷宜黍火則燥不為邪三之氣自小滿日巳初至大暑日卯初六十日有奇主位少徵火客氣太陽水中見土運天政布寒氣行雨乃降民病寒反熱中癰疽注下心熱瞀悶不治者死宜治太陽之客以苦補之以咸瀉之以苦堅之以辛潤之歲谷宜玄間谷宜稷土則寒不為邪四之氣自大暑日卯正至秋分日醜正六十日有奇主位太宮土客氣厥陰木中見土運歲土得位風氣居之風濕交爭風化為雨乃長乃化乃成民病大熱少氣肌肉痿足痿注下赤白宜治厥陰之客以辛補之以酸瀉之以甘緩之歲谷宜黅間谷宜稻金則風不為邪五之氣自秋分寅初至小雪日子初六十日有奇主位少商金客氣少陰火中見土運火能生土土能生金氣位相和陽復化草乃長民乃舒宜調少陰之客以咸補之以甘瀉之以酸收之歲谷宜黅間谷宜豆水則熱不為邪終之氣自小雪日子正至大寒日戌正六十日有奇主位太羽水客氣太陰土中見金運氣與運符會地氣正濕令行陰凝太虛埃昏郊野民乃慘淒寒風以至反者孕乃死宜治太陰之客以甘補之以苦瀉之以甘緩之歲谷宜黅間谷宜麻木則濕不為邪是氣也不可犯涼司氣以涼故也歲氣雖平或有邪氣則中執法民有急卒病經曰中執法者其病速而危也丁卯年陽明燥金司天少陰君火在泉中見少角木運歲運不及氣化運行後天木運臨卯是謂歲會氣之平也平氣之歲氣化運行同天命曰敷和之紀木德周行陽舒陰布五化宣平其氣端其性隨其用曲直其化生榮其政發散其候溫和其令風其類草木其應春其谷麻其果李其實核其蟲毛其畜犬其色蒼其味酸其音角其數八其物中堅其在人也其臟肝其主目其養筋其病裡急支滿此歲運之化也出五常政大論天地之氣上見陽明左間太陽右間少陽故天氣急而其政切下見少陰左間太陰右間厥陰故地氣明而其令暴出五運行論陽專其令炎暑盛行物燥以堅淳風乃治風燥橫運流於氣交多陽少陰云趨雨府濕化乃敷燥極而澤清先而勁毛蟲乃死熱後而暴介蟲乃殃金火合德上應太白熒惑其谷白丹間谷命太徵者其耗白甲品羽自邑中蟲多品羽類有羽翼者蟄蟲出見清水不冰清熱之氣持於氣交民病咳嗌塞寒熱發暴振慄癃悶然陽明燥金在上少陰君火在下火能勝金天氣虛地氣盈天氣不足當資化源以助金氣運木既平天氣上商與正商同不必資也歲宜食白丹之谷以安其氣食間氣之谷以去其邪以苦小溫調上以鹹寒調下以辛和調中汗之清之散之運同熱氣宜多天化少角少徵歲同熱用方多以矢清之化治之少商少宮少羽歲同清用方多以地熱之化治之火在地故同清者多地化金在天故同熱者多天化初之氣自丙寅年大寒日亥初終於是年春分日酉初六十日有奇主位少角木客氣太陰土中見木運風濕相遇上應司天之陽明以行春令地氣遷陰始凝氣始肅水乃冰寒雨化民病中熱脹面目浮腫善眠鼽衄嚏欠嘔小便黃赤甚則淋然是歲木運統之又臨木位風木得位其氣和平濕化乃微其病亦少宜調太陰之客以甘補之以苦瀉之以甘緩之食白谷以安其氣食麻以去其邪雖有濕化不能為邪二之氣自春分日酉正至小滿日未正六十日有奇主位太徵火客氣少陽火中見木運木火相得上應陽明陽乃布民乃舒物乃生榮厲大至民善暴死是歲天氣歲運皆平厲疾自微宜調少陽之客以酸補之以甘瀉之以咸軟之食白殼以安其氣食豆以去其邪雖有火化不能為邪三之氣自小滿日申初至大暑午初六十日有奇主位少徵火客氣陽明金中見木運天政布涼乃行燥熱交合燥極而澤民病寒熱宜調陽明之客以酸補之以辛瀉之以苦泄之食白谷以安其氣食黍以去其邪雖有燥化不能為邪四之氣自大暑日午正至秋分日辰正六十日有奇主位少宮土客氣太陽水中見木運寒雨降民病暴僕振慄譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便宜調太陽之客以苦補之以咸瀉之以苦堅之以辛潤之食丹谷以安其氣食稷以去其邪雖有寒化不能為邪五之氣自秋分日巳初至小雪日卯初六十日有奇主位太商金客氣厥陰木中見木運與厥陰相符是謂司氣名曰蒼化時行至此春令反行草乃生榮民氣和自無疾病然厥陰之客宜以辛瀉之以酸泄之以甘緩之歲谷宜丹間谷宜稻雖有風化不能為邪是氣也司氣以濕用濕無犯所謂用濕遠濕也終之氣自小雪日卯正至大寒日醜正六十日有奇主位少羽水客氣少陰火中見木運水能生木木能生火而行順化當陽氣布化候反溫蟄蟲來見流水不冰民乃康平其病溫宜調少陰之客以咸補之以甘瀉之以酸收之食丹谷以安其氣食豆以去其邪雖有熱化不能為邪是歲重遇平氣四時之氣皆德化政令之施而無淫邪勝復之變民乃和物乃舒平之至也論九宮分野此下無繫緊要所以備輯之者使學者得以廣見聞不致為其惑可矣論曰五運不及之歲則有災宮所向之位故不可一概而論災也經云九星懸朗七曜周旋乃天所主之九星分野故少角歲云災三宮東宮震位天衝司也少徵歲云災九宮南室離位天英司也少宮歲云災五宮中室天禽司也寄位二宮坤位少商歲云災七宮西室兌位天柱司也少羽歲云災一宮北室坎位天蓬司也皆以運氣不及之方言之按天元玉冊曰天蓬一水正之宮也天芮二土神之應宮也天衝三木正之宮也天輔四木神之宮也天禽五土正之宮也天心六金神之應也天柱七金正之宮也天任八火神之應宮也天英九火正之宮也下以應九州之分野謂徐冀兗青揚荊像梁雍也災宮歌年逢不及有災宮辛一丁三已五同七數少商即乙並癸九仍將土寄二坤沖二乃土寄位非災宮之數九宮分野圖歌曰五行舉一為例干支陽夫甲子陰妻乙丑甲子能娶乙丑隔八三生金兮假如子之一辰其中而含五音甲金丙水戊火庚土壬木相臨十二支納音干支首甲子陽先陰後甲子陽乙丑陰順輪故陽娶陰甲子娶乙丑同類為妻也生子謂甲子隔八生壬申壬申生庚辰三皆金金即子餘子義同次向戊子火三生至木木三生至水水三生至土土三生終復自甲午金三生至戊午火依序轉畢十二辰各含五音如子之一辰甲子金丙子水戊子火庚子土壬子木是也遍六甲共納六十音隔八非第八若甲子至癸酉通十除前位此名納甲之法運氣則不急為用六氣標本論夫經之立法意溢言表者多矣余嘗觀運氣微旨篇六化圖序及夫少陽之上火氣治之中見厥陰雲云之說經旨既秘而未發而擇者又謬言滋惑但其曰本之下中之見也見之下氣之標也又有從本從標從本從中之治昭然三氣分疊則微旨猶有可究者於是援引經旨參以己見附以標本同異從舍之治未敢自以為是也然亦可為迷心傳注者之一悟也素問六微旨篇帝曰願聞天道六六之節盛衰何也岐伯曰上下有位左右有紀故少陽之右陽明治之陽明之右太陽治之太陽之右厥陰治之厥陰之右少陰治之少陰之右太陰治之太陰之右少陽治之此所謂氣之標蓋南面而待之也故曰因天之序盛衰之時移光定位正立而待之此之謂也少陽之上火氣治之中見厥陰陽明之上燥金治之中見太陰太陽之上寒氣治之中見少陰厥陰之上風氣治之中見少陽少陰之上熱氣治之中見太陽太陰之上濕氣治之中見陽明所謂本也本之下中之見也見之下氣之標也標本不同氣應異象至真要大論篇曰六氣標本所從不同奈何岐伯曰氣有從本者有從標從本者有不從標本者也少陽太陰從本少陰太陽從本從標陽明厥陰不從標本從乎中也故從本者化生於本從標本者有標本之化從中者以中氣為化也王注少陽之本火太陰之本濕本末同故從本也少陰之本熱其標陰太陽之本寒其標陽本末異故從標從本陽明之中太陰厥陰之中少陽本末與中不同故不從標本從乎中也滑注陽明本燥標陽中濕厥陰本風標陰中火惟此二經本未與中不同故治從本宦謂六氣者行乎天地之間而施德化政令者也經曰東方生風風生木其德敷和其化生榮其政舒啟其令風之類是也若夫平氣之歲如丁卯戊午甲辰甲戌己丑己未丙子之類謂之平氣之歲是也物生脈應氣化各得其常若當歲氣有太過不及之差則有勝負郁發淫乘之變人居氣交之中感之而為病焉其治也有從乎本從標從本從中之異其說雖見運氣諸篇而實與經臟證治相為表裡者也考之經以天之六化之氣寒暑燥濕風火為本以三陰三陽之位為標所謂中見者以陰陽表裡之相通者互相取之因天之序盛衰之時移光定位正立而待之其化氣則尊之面南為本而上居以應天其本之下以中見之氣面北而中處以應人其中見之下以標下三陰三陽為標居之於下以應地經於標之一氣未瑩愚竊推之標之位猶有地之六氣應之如初風木二君火三相火四濕土五燥金而終寒水地氣之下應者既異則三陰三陽之加臨亦從其化矣所謂標本不同氣應異象者此也又造化之理陽主進故以九為老陰主退故以六為老故凡本氣之所在必審本位之陰陽而進退之俱由風木而左旋當其見下之一氣以為標之所治則標本中見三才之氣可列矣標本同者從本有互相為標本者則亦互相從標本不同者從乎中焉如少陽之上火氣為本中見厥陰風木以風為中氣而少陽為標則以少陽左位陽明以為地氣風木之所始循次左行至見下標位當其三氣相火應之此標本俱火故從本之火也又如太陰之上濕氣為本中見陽明燥金以燥為中氣而太陰為標則以太陰右位少陰以為地氣風木之所始循次左行至見下標位其四氣濕土應之此標本俱濕故從本之濕也是少陽太陰標本俱同故從化生於本者論也又如少陰之上熱氣為本中見太陽寒水以寒為中氣而少陰為標少陰宜右退而左數之則終氣寒水當標之位而標之少陰亦從寒化矣此本熱而標寒故少陰所至為熱生中為寒治者或從熱而從寒也又如太陽之上寒氣為本中見少陰熱氣以熱為中氣而太陽為標太陽宜左進而順數之則二氣君火當標之位而標之太陽亦從熱化矣此本寒而標熱故太陽所至為寒生中為濕治者或從寒而從熱也是少陰太陽互為標本故有標本之化者論也又如陽明之上燥氣為本中見太陰濕土以濕為中氣而陽明為標從陽明左位太陽數起循次左行至見下標位當其四氣濕土應之則標之陽明亦從濕化矣此本燥而標濕為標本不同故不從標本從乎中之濕也又如厥陰之上風氣為本中見少陽火氣以火為中氣而厥陰為標從厥陰右位太陽數起循次左行至見下標位當其五氣燥金應之則標之厥陰亦從燥化矣此本風而標燥亦為標本不同故不從標本從乎中之火也是陽明厥陰標本不同故以中氣為化者論也此皆有自然之法象存焉而豈人意所可損益者哉概而言之太陰陽明從乎濕也少陰太陽從熱而從寒也厥陰少陽從乎火也今以太陰陽明從濕之治言之有手太陰肺臟受濕而為喘急或聲音如從甕中所出等證治用葶藶木通之類又有足太陰脾臟受濕而為痞滿等證治用大消痞丸之類或為四肢浮腫肉按如泥等證治用胃苓湯之類或為肢體沉重嗜臥等證治用蒼朮羌活之類又有足陽明胃腑因於飲水不散而為胸腹脹滿漱水不咽等證治用五苓散加半夏之類甚者用牽牛甘遂之類又有陽明胃經受濕而為面目浮腫等證治用蒼朮羌活之類又有手陽明濕勝而為濡瀉等證治用五苓散之類此皆太陰陽明從濕之治也又以少陰太陽從熱從寒之治而言之有手少陰心熱而為心神不足不安者治用硃砂安神丸之屬或為瘡瘍或為目中發熱熱見血脈者治用黃連瀉心湯之屬又有胃腑實熱乘心而為譫語者治用大承氣湯之屬又有傷寒下早心臟結熱而為痞滿者治用黃連枳實之屬經曰中滿者瀉之於內者此也若心下痞硬者大承氣湯主之又有少陰心火亢極而為惡寒戰慄者此本熱而標似寒也治用散火之劑又有少陰心臟虛寒而為惡寒者治用人參附子赤石脂之屬王太僕益火之原以消陰翳者此也又有少陰腎熱而為遺精者治用珍珠丸加椿根皮之屬或為躁心者治用知母之屬有傷寒熱傳少陰腎經而為口燥舌乾等證治用桂枝湯之屬又有少陰腎寒而為身體骨節痛手足寒脈沉者治用附子湯之屬經曰脈從而病反者其診何如岐伯曰脈至而從按之不鼓諸陽皆然者此也又有手足太陽小腸膀胱腑寒而為冷淋小便數起不通得寒戰而解者治用生附湯之屬或為小便清白或為小便不禁或為久下滯濁等證治用薑附之屬又有太陽膀胱經虛寒而脈浮自汗微惡寒小便數煩心攣急等證治用桂枝加附子湯之屬又有太陽小腸膀胱腑熱而為溺秘等證治用黃柏知母之屬經曰小腸移熱於膀胱膈腸不便者此也或為熱淋赤濁溺血等證治用黃柏知母梔子經曰胞移熱於膀胱為癃溺血者此也又有太陽膀胱火邪而為足膝紅腫者治用當歸生地黃黃柏龍膽草防己蒼朮紅花之屬又有寒傷足太陽經惡寒發熱頭項強痛傳入膀胱之腑而為小便赤澀者此本寒而標熱也先用麻黃湯解之後用五苓散利之經曰病發而有餘本而標之先治其本後治其標者此也又有足太陽經外邪鬱熱入里傳變瀉利清穀或為腹脹而惡寒發熱頭疼身痛表證猶在者此本熱而標寒也先用姜附湯溫之後用桂枝湯解之經曰病發而不足標而本之先治其標後治其本者此也此皆少陰太陽從熱從寒之治者也又以厥陰少陽從火之治言之有手厥陰經熱而為掌熱者治用柴胡黃芩黃連連翹之屬又有少陽三焦腑熱等證治用三補丸之類又有足厥陰肝熱而為脅痛者治用當歸龍薈丸之類或為熱證左脅起者治用抑青丸之類又有小兒肝受風熱而為驚搐者治用鎮驚丸之類又有足少陰膽熱而為口苦者治用柴胡黃芩之類又曰肝熱者則口苦膽熱而為貪睡者治用生酸棗仁苦茶之類又有手足少陽經鬱熱不散而為耳聾胸脅痛等證治用小柴胡湯之類或為耳鳴治用清氣化痰丸之類或為瘰癧者治用破結散之類或為發斑者治用連翹防風湯之類或為寒熱瘧疾者治用青皮湯之類或為喉痹者治用甘桔湯加防風荊芥梔子紫蘇天花粉之類此皆厥陰少陽從火之治者也故小學云肝膽由來從火治三焦心主都無異脾胃常從濕處求肺與大腸同濕類心腎小腸與膀胱寒熱隨宜毋執滯之類即其義也若夫二子之注隨文釋義而已如標位屬陽者則曰標陽屬陰者則曰標陰殊不知標有風火熱濕燥寒六氣之異乃以陰陽二字統之可乎抑考之經有云明之標本萬舉萬全不知標本是謂妄行蓋標本之說上窮天文下察地理中紀人事其為道也甚大其為理也甚微其取用也無窮其推行也有準明乎此者通天地人三才之道者流也
