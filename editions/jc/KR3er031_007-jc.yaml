body:
  text: 卷之七針灸直指素問針灸方宜始論素間異法方宜論篇帝曰醫之治病也一病而治各不同皆愈何也岐伯對曰地勢使然也故東方之域天地之所始生也魚鹽之地海濱傍水其民食魚而嗜咸皆安其處美其食魚者使人熱中鹽者勝血故其民皆黑色疏理其病皆為癰瘍其治宜砭石故砭石者亦從東方來西方者金玉之域沙石之處天地之所收引也其民陵居而多風水土剛強其民不衣而褐薦其民華食而脂肥故邪不能傷其形體其病生於內其治宜毒藥故毒藥者亦從西方來北方者天地所閉藏之域也其地高陵居風寒冷冽其民樂野處而乳食藏寒生滿病其治宜灸焫故灸焫者亦從北方來南方者天地所長養陽之所盛處也其地下水土弱霧露之所聚也其民嗜酸而食胕故其民皆致理而赤色其病攣痹其治宜微針故九針者亦從南方來中央者其地平以濕天地所以生萬物也眾其民食雜而不勞故其病多痿厥寒熱其治宜導引接蹺故導引按蹺者亦從中央出也故聖人雜合以治各得其所宜故治所以異而病皆愈者得病之情知治之大理也靈樞九針論岐伯曰夫聖人之起天地之數也一而九之故以立九野九而九之九九八十一以起黃鐘數焉以針應數也帝曰以針應九數奈何岐伯曰一者天也天者陽也五臟之應天者肺肺者五臟六腑之蓋也皮者肺之合也人之陽也故為之治針必大其頭而銳其末令毋得深入而陽氣出二者地也人之所以應土者肉也故為之治針必筩其身而圓其末令毋得傷肉分傷則氣得竭三者人也人之所以成生者血肺也故為之治針必大其身而圓其末令可以按肺而勿陷以致其氣令邪氣獨出四者時也時者四時八風之客於經絡之中為瘤病也故為之治針必筩其身而銳其末令深以瀉熱出血而痼病竭五者音也音者冬夏之分分於子午陰與陽別寒與熱爭兩氣相搏合為癰膿者也故為之治針必令其末如劍鋒可以取大膿六者律也律者調陰陽四時而合十二經絡虛邪客於經絡而為暴痹者也故為之治針必令尖如氂且圓且銳中身微大以取暴氣七者星也星者人之七竅邪之所客於經絡而為痛痹舍於經絡者也故為之治針令尖如蚊虻喙靜以徐往微以久留正氣納之真邪俱往出針而養者也八者風也風者人之股肱八節也八正之虛風八風傷人內舍於骨解腰脊節腠理之間為深痹也故為之治針必長其身鋒其末可以深取遠痹九者野也野者人之節解皮膚之間也淫邪流溢於身如風水之狀而溜不能通於機關大節者也故為之治針令尖如梃其鋒微圓以取大氣之不能過於關節者也一天二地三人四時五音六律七星八風九野身形亦應之針有所宜故曰九針人皮應天人肉應地人脈應人人筋應時人聲應音人陰陽合氣應律人齒面目應星人出入氣應風人九竅三百六十五絡應野故一針皮二針肉三針肺四針筋五針骨六針調陰陽七針益精八針除風九針通九竅除三百六十五節氣此之謂有所主也九針式帝曰針之長短有數乎岐伯對曰一曰鑱針取法於巾針頭大末銳去末寸半卒銳之長一寸六分二曰圓針取法於絮針筩其身而卵其鋒針如卵形圓其末長一寸六分三曰鍉針鍉音低取法於黍粟之銳長三寸半四曰鋒針取法於絮針筩其身鋒其末刃三隅長一寸六分五曰鈹針取法於劍鋒末如劍廣二分半長四寸六曰圓利針取法於氂針且圓且銳微大其末反小其身又曰中身微大長一寸六分七曰毫針取法於毫毛尖如蚊虻喙長一寸六分八曰長針取法於綦針鋒利身薄長七寸九曰大針取法於鋒針尖如梃其鋒微圓長四寸針形畢矣此九針之長短也九針圖鑱針平半寸長一寸六分頭大末銳其病熱在頭身宜此今之名箭頭針是也圓針其身圓鋒如卵形長一寸六分肉分氣滿宜此今按摩家用之鍉針其鋒如黍粟之銳長三寸五分脈氣虛少宜此鋒針其刃三隅長一寸六分瀉熱出血宜此今之所謂三稜針者是也䤵針一名鈹針末如斂鋒廣二分半長四寸破癰腫出膿今名劍針是也貝利針尖如毫且圓且利中身微大長一寸六分調陰陽去暴痹飛經走氣今之醫常用之是也毫針法象毫尖如蚊虻喙長三寸六分調經絡去疾病長針鋒如利長七寸痹深居骨解腰脊節腠之間者用之今之名跳針是也火針一名燔針長四寸風虛腫毒解肌排毒用之九針所宜九針之用各有所宜長短大小各有所施刺熱者用鑱針病在皮膚取以鑱針於病所膚白勿取刺寒者用毫針病痹氣通而不去者取以亳針毫針者靜以徐往微以久留而養以取痛痹刺大者用鋒針鋒針者以發痼疾刺小者用圓利針圓利針者以取暴氣病痹氣暴發者取以圓利針刺癰者用鈹針鈹針者以取大膿井榮分俞病為大膿者取以鈹針鑱針出瀉陽氣圓針者揩摩分內間不得傷肌肉以瀉分氣鍉針者主按脈勿陷以致其氣令邪勿陷於病所病在脈氣少當補之者取之鍉針長針者可以致遠痹病在中者取以長針火針者以瀉機關之水水腫不能過關節者取以火針以小治小者其功小以大治大者多害故其以成膿血者其惟砭石鈹針之所取也內經補瀉帝曰余聞刺法有餘者瀉之不足者補之岐伯曰百病之生皆有虛實而補瀉行焉瀉虛補實神去其室致邪失正真不可定粗之所敗謂之夭命補虛瀉實神歸其室久塞其空謂之良工凡用針者隨而瀉之迎而道之虛則實之滿則瀉之菀陳者除之邪勝則虛之徐而疾則實疾而實則虛言實與虛若有若無察後與先若存若亡為虛與實若得若失虛實之要九針最妙補瀉之時以針為之瀉曰必持內之放而出之排陽得針邪氣得泄按而引針是謂內溫血不得散氣不得出也補曰隨之隨之之意若忘若行若按如蚊虻止如留如環去如絃絕令左屬右其氣故止外門已閉中氣乃實必無留血必取誅之刺之而氣不至無問其數刺之而氣至乃去之勿復針針有懸布天下者五黔首共餘食莫之知也一曰治神三曰知養身三曰知毒藥四曰制砭石五曰知五臟血氣之診五法俱立各有所先今末世之刺也虛者實之滿者瀉之此皆眾工所共知也若夫法天則地隨應而動和之者若響隨之者若影道無鬼神獨來獨往帝曰願聞其道岐伯曰凡刺之真必先治神五臟已定九候已備後乃存針眾脈不見眾凶弗聞外內相得無以形先可玩往來乃施於人人有虛實五虛勿近五實勿遠至其當發間不容睫手動若務針耀而勻靜意視義觀適之變是謂冥冥莫知其形見其烏烏見其稷稷從見其飛不知其誰伏如橫弩起如發機刺虛者須其實刺實者須其虛經氣已至慎守勿失深淺在志遠近若一如臨深淵手如握虎神無營於眾物義無邪下必正神小針之要易陳而難入粗守形上守神神乎神客在門未睹其疾惡知其原刺之微在速遲粗守關上守機機之動不離其空空中之機清淨而微其來不可逢其往不可追知機之道者不可掛以發不知機道扣之不發知其往來要與之期粗之暗乎妙哉工獨有之往者為逆來者為順明知逆順正行無問迎而奪之惡得無虛追而濟之惡得無實迎之隨之以意和之針道畢矣凡用針者虛則實之滿則泄之宛陳則除之邪勝則虛之大要曰持針之道堅者為寶正指直刺無針左右神在秋亳屬意病者審視血脈刺之無殆方刺之時必在懸陽及與兩衛神屬勿去知病存亡血脈者在腧橫居視之獨澄切之獨堅刺虛則實之者針下熱也氣實乃熱也滿而泄之者針下寒也菀陳則除之者出惡血也邪盛則虛之者出針勿按徐而疾則實者徐出針而疾按之疾而徐則虛者疾出針而徐按之言實與虛者寒溫氣多少也若無若有者疾不可知也察後與先者知病先後也為虛與實者工勿失其法若得若失者離其法也虛實之要九針最妙者為其各有所宜也補瀉之時者與氣開闔相合也九針之名各不同形者針窮其所當補瀉也刺實須其虛者留針陰氣隆至乃去針也刺虛須其實者陽氣隆至針下熱乃去針也經氣已至慎守勿失者勿變更也淺深在志者知病之內外也近遠如一者淺深其候等也如臨深淵者不敢墮也手如握虎者欲其壯也神無營於眾物者靜志觀病人無左右視也義無邪下者欲端以正也必正其神者欲膽病人目制其神令氣易行也所謂易陳者易言也難入者難著於人也粗守形者守刺法也上守神者守人之血氣有餘不足可補瀉也神客者正邪共會也神者正氣也客者邪氣也在門者邪循正氣之所出入也未睹其疾者先知邪正何經之疾也惡知其原者先知何經之病所取之處也刺之微在數遲者徐疾之意也粗守關者守四肢而不知血氣正邪之往來也上守機者知守氣也機之動不離其空者知氣之虛實用針之徐疾也空中之機清靜以微者針以得氣密意守氣勿失也其來不可逢者氣盛不可補也其往不可追者氣虛不可瀉也不可掛以發者言氣易失也扣之不發者言不知補瀉之意也血氣已盡而氣不下也知其往來者知氣之逆順盛虛也要與之期者知氣之可取之時也粗之暗者冥冥不知氣之微密也妙哉工獨有之者盡知針意也往者為逆者言氣之虛而小小者逆也來者為順者言氣之平平者順也明知逆順正行無問者言知所取之處也迎而奪之者瀉也追而濟之者補也所謂虛則實之者氣口虛而當補之也滿則瀉之者氣口盛而當瀉之也菀陳則除之者去血脈也邪勝則虛之者言諸經有盛皆瀉其邪也徐而疾則實者言徐內而疾出也疾而徐則虛者言疾內而徐出也言實與虛若有若無者言實者有氣虛者無氣也察後與先若亡若存者言氣之虛實補瀉之先後也察其氣之已下與常存也為虛與實若得若失者言補者必然若有得也瀉則恍然若有失也是故工之用針也知氣之所在而守其門戶明於調氣補瀉所在徐疾之意所取之處瀉必用圓切而轉之其氣乃行疾而徐出邪氣乃出伸而逆之搖大其穴氣出乃疾補必用方外引其皮令當其門左引其樞右推其膚微旋而徐推之必端以正安以靜堅心無解欲微以留氣下而疾出之推其皮蓋其外門神氣乃存用針之要無忘其神瀉必用方者以氣方盛也以月方滿也以日方溫也以身方定也以息方吸而納針乃復候其方吸而轉針乃復候其方呼而徐引針故曰瀉補必用圓者圓者行也行者移也刺必中其榮復以吸排針也故圓與方非針也瀉實者氣盛乃內針針與氣俱內以開其門如利其戶針與氣俱出精氣不傷邪氣乃下外門不閉以出其疾搖大其道如利其路是謂大瀉必切而出大氣乃屈持針勿置以定其意候呼內針氣出勿針入針空四塞精無從出方實而疾出針氣入針出熱不得遠閉塞其門邪氣布散精氣乃得存動氣候時近氣不失遠氣乃來是謂追之吸則內針無令氣忤靜以久留無令邪布吸則轉針以得氣為故候呼引針呼盡乃出大氣皆出故命曰瀉捫而循之切而散之推而按之彈而怒之爪而下之通而取之外引其門以閉其神呼盡內針靜以久留以氣至為故如待所貴不知日暮其氣以至適而自護候吸引針氣不得出各在所處推合其門令神氣存大氣留止故命曰補補瀉弗失與天地一經氣以至慎守勿失淺深在志遠近如一如臨深淵手如握虎神無營於眾物持針之道欲端以正安以靜先知虛實向行疾徐左手執骨右手循之無與肉果瀉欲端以正補必閉膚輔針導氣邪得淫泆真氣得居帝曰扞皮開腠理奈何岐伯曰因其分肉左別其膚微內而徐端之適神不散邪氣得去知其氣所在先得其道稀而疏之稍深以留故能徐入之大熱在上推而下之上者引而去之視先痛者常先取之大寒在外留而補之入於中者從合瀉之上氣不足推而揚之下氣不足積而從之寒入於中推而行之夫實者氣入也虛者氣出也氣實者熱也氣虛者寒也入實者左手開針孔也入虛者右手開針孔也形氣不足病氣有餘是邪勝也急瀉之形氣有餘病氣不足急補之形氣不足病氣不足此陰陽俱不足也不可刺刺之則重不足不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絕滅壯者不復矣形氣有餘病氣有餘此謂陰陽俱有餘也急瀉其邪調其虛實故曰有餘者瀉之不足者補之此之謂也故曰刺不知逆順真邪相搏滿而補之則陰陽四溢腸胃充郭肝肺內䐜陰陽相雜虛而瀉之則經脈空虛血氣竭枯腸胃㒤僻皮膚薄著毛腠夭焦予之死期凡用針之類在於調氣氣積於胃以通營衛各行其道宗氣留於海其下者經於氣衝其直者走於息道故厥在於足宗氣不下肺中之血凝而留止弗之火調弗能取之散氣可收取氣可布深居靜處占神往來閉戶塞牖魂魄不散專意一神精氣之分毋聞人聲以收其精必一其神令志在針淺而留之微而浮之以移其神氣至乃休男內女外堅拒勿出謹守勿內是謂得氣刺之而氣不至無問其數刺之而氣至乃去之勿復針針各有所宜各不同形各任其所為刺之要氣至而有效效之信若風之吹雲明乎若見蒼天刺之道畢矣用針者必先察其經絡之虛實切而循之按而彈之視其應動者乃復取之而下之六經調者謂之不病雖病謂之自已一經上實下虛而不通者此必有橫絡盛加於大經令之不通視而瀉之此所謂解結也上寒下熱先刺其項太陽久留之已刺即熨項與肩胛令熱下合乃止此所謂推而上之者也上熱下寒視其脈虛而陷下於經者取之氣下乃止此所謂引而下之者也大熱遍身狂而妄見妄聞妄語視足陽明及大絡取之虛者補之血而實者瀉之因其偃臥居其頭前以兩手四指挾按頭動脈久持之倦而切推下至缺盆中而復止如前熱去乃止此所謂推而散之者也帝曰余聞刺之言曰有餘者瀉之不足者補之何謂有餘何謂不足岐伯曰有餘有五不足亦有五帝欲何問帝曰願盡聞之岐伯曰神有有餘有不足氣有有餘有不足血有有餘有不足形有有餘有不足志有有餘有不足凡此十者其氣不等也帝曰人有精氣津液四肢九竅五臟十六部三百六十五節乃生百病百病之生皆有虛實今夫子乃言有餘有五不足亦有五何以生之乎岐伯曰皆生於五臟也夫心藏神肺藏氣肝臟血脾藏肉腎藏志而此成形志意內通連骨髓而成形五臟六腑之道皆出於經隧以行血氣血氣不和百病乃變化而生是故守經隧焉帝曰神有餘不足何如岐伯曰神有餘則笑不休神不足則悲血氣未並五臟安定邪客於形灑淅起於亳毛未入於經鉻也故命曰神之微帝曰補瀉奈何岐伯曰神有餘則瀉其小絡之血出血勿之深斥無中其大經神氣乃平神不足視其虛絡按而致之刺而利之無出其血無泄其氣以通其經神氣乃平帝曰刺微奈何岐伯曰按摩勿釋著針勿斥移氣於不足氣有餘則喘咳上氣不足則息利少氣血氣不並五臟安定皮膚微病命曰白氣微泄帝曰補瀉奈何岐伯曰氣有餘則泄其經隧無傷其經無出其血無泄其氣不足則補其經隧無出其氣帝曰刺微奈何岐伯曰按摩勿釋出針視之曰我將深之適人必革精氣自伏邪氣散亂無所休息氣泄腠理真氣乃相得帝曰善血有餘不足奈何岐伯曰血有餘則怒不足則恐血氣未並五臟安定孫絡水溢則經有留血帝曰補瀉奈何岐伯曰血有餘則瀉其盛經出其血不足則視其虛經針其脈中久留而視脈大疾出其針無令血瀉帝曰刺留血奈何岐伯曰視其血絡刺出其血無令惡血得入於經以成其疾帝曰善形有餘不足奈何岐伯曰形有餘則腹脹涇溲不利不足則四肢不用血氣未並五臟安定肌肉蠕動命曰微風帝曰補瀉奈何岐伯曰形有餘則瀉其陽經不足則補其陽絡帝曰刺微奈何岐伯曰取分肉間無中其經無傷其絡衛氣得復邪氣乃索帝曰善志有餘不足奈何岐伯曰志有餘則腹脹飧瀉不足則厥血氣未並五臟安定骨節有動帝曰補瀉奈何岐伯曰志有餘則瀉然谷筋血者不足則補其復留帝曰刺未並奈何岐伯曰即取之無中其經邪所乃能立虛血清氣濁疾瀉之則氣竭血濁氣澀疾瀉之則經可通人身左右上下虛實不同刺天不足西北故西北方陰也而人右耳目不如左明也地不滿東南故東南方陽也而人左手足不如右強也東方陽也陽者其精並於上並於上則上明而下虛故使耳目聰明而手足不便也西方陰也陰者其精並於下並於下則下盛而上虛故其耳目不聰而手足便也故俱感於邪其在上則右甚在下則左甚此天地陰陽所不能存也故邪居之故天有精地有形天有八紀地有五里故能為萬物之父母清陽上天濁陰歸地是故天地之動靜神明之綱紀故能以生長收藏終而復始惟賢人上配天以養頭下象地以養足中傍人事以養五臟天氣通於肺地氣通於嗌風氣通於肝雷氣通於心穀氣通於脾雨氣通於腎六經為川腸胃為海九竅為水注之器以天地為之陰陽陽之汗以天地之雨名之陽之氣以天地之疾風名之暴風象雷逆風象陽故治不法天之紀不用地之理則災害至矣故邪風之至疾如風雨故善治者治皮毛其次治肌膚其次治筋脈其次治六腑其次治五臟治五臟者半死半生也故天之邪氣感則害人五臟水穀之寒熱感則害人六腑地之濕氣感則害人皮膚筋脈故善用針者從陰引陽從陽引陰以右治左以左治右以我知彼以表知里以觀過與不及之理見微得過用之不殆人身左右補瀉不同神應經曰人身左邊右手以大指進前捻針為補大指退後捻針為瀉右邊以右手大指退後捻針為補進前捻針為瀉用針十四法進者凡不得氣男外女內及春夏秋冬各有進退之理退者為補瀉欲出針時各先退針一豆許然後卻留針方可出針動者如氣不行將針伸提而已搖者凡瀉時欲出針必須動搖而後出彈者凡補時用指甲輕彈使氣疾行也如瀉不可用捫者凡補者出針時用手捫閉其穴也攝者下針者得氣澀滯隨經絡用大指甲上下切其氣血自得通行也循者凡下針於部分經絡之處用手上下循之使氣血往來經云推之則行引之則止切者凡下針必先用大指甲左右於穴切之令氣血宣散然後下針使不傷於榮衛也按者以手按針無得進退如按切之狀爪者凡下針用手指作力置針有準也盤者如針腹部於穴內輕盤搖而已搓者凡令病人覺熱向外臥針似搓線之狀勿轉太緊治寒面里臥針依前轉法以為搓也捻者以手指捻針也務要記夫左右左為外右為內繆刺繆如紕繆綱紀帝曰予聞繆刺未得其意岐伯曰邪客於皮毛入於孫絡留而不去閉塞不通不得入於經流溢於大絡而生奇疾也夫邪客於大絡者左注右右注左上下左右與經相干而布於四末其氣無常處不得入於經俞命曰繆刺帝曰願聞繆刺以左取右以右取左奈何其與巨刺何以別之曰絡病者其痛與經脈繆處故命曰繆刺邪客於足少陰之絡令人卒心痛暴脹胸脅支滿無積者刺然谷之前出血如食頃而已不已左取右右取左病新發者取五日已邪客於手少陽之絡令人喉痹舌卷口乾心煩臂外廉痛手不及頭刺手中指次指爪甲上去端如韭葉各一痏壯者立已老者有頃已左取右右取左此新病數日已邪客於足厥陰之絡令人卒疝暴痛刺足大指爪甲上與肉交者各一痏男子立已女子有頃已左取右右取左邪客於足太陽之絡令人頭項肩痛刺足大指爪甲上與肉交者各一痏立已不已刺外踝下三痏左取右右取左如食頃已邪客於手陽明之絡令人氣滿胸中喘息支胠胸中熱刺手大指次指爪甲上去端如韭葉各一痏左取右右取左如食頃已邪客於臂掌之間不可得屈刺其踝後先以指按之痛乃刺之以月死生為數月生一日一痏二日二痏十五日十五痏十六日十四痏邪客於足陽蹺之脈令人目痛從內眥始刺外踝之下半寸所各二痏左刺右右刺左如行十里頃而已人有所墮惡血留內腹中滿脹不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡令人脅痛不得息咳而汗出刺足小指次指爪甲上與肉交者各一痏不得息立已汗出立止咳者溫衣飲食一日而已左刺右右刺左病立已不已復刺如法邪客於足少陰之絡令人嗌痛不可肉食無故善怒氣上走賁下刺足下中央之脈各三痏凡六刺立已左刺右右刺左邪客於足太陰之絡令人腰痛引小腹控䏚不可以仰息刺腰尻之解兩脾之上是腰俞以月死生為痏數髮針立已左刺右右刺左邪客於足太陽之絡令人拘攣背急引脅而痛刺之從項始數脊椎俠脊疾按之應手如痛傍刺之三痏立已邪客於足少陽之絡令人留於樞中痛髀不可以舉刺樞中以毫針寒則久留針以月死生為數立已治諸經刺之所過者不病則繆刺之耳聾刺手陽明不已刺其通脈出耳前者齒齲刺手陽明不已刺其肺入齒中者立已邪客於五臟之間其病也肺引而痛時來時止視其病繆刺之於手足爪甲上視其脈出其血間一日一刺一刺不已五刺已繆傳引上齒齒唇寒痛視其手背脈血者出之足陽明中指甲上一痏手大指次指甲上一痏立已左取右右取左邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角五絡俱竭令人身脈皆動而形無知也其狀若屍或曰屍厥刺其足大指內側爪甲上去端如韭葉後刺足心後刺足中指爪甲上各一痏後刺手大指內側去端如韭葉後刺手心主少陰銳骨之端各一痏立已不已以竹管吹其兩耳鬄其左角之發方一寸燔治飲以美酒一杯不能飲者灌之立已有痛而經不痛者繆刺之視其皮部有血絡者盡取之此繆刺之數也身形有病九候莫病則繆刺之巨刺繆刺刺絡脈巨刺刺經脈痛在於左而右脈病者則巨刺之邪客於經左盛則右病右盛則左病亦有移易者左痛未已而右脈先病如此者必巨刺之必中其經非絡肺也經刺岐伯曰夫邪之客於形也必先舍於皮毛留而不去入於孫絡留而不去入於絡脈留而不去入於經脈內連五臟散於腸胃陰陽俱盛五臟乃傷此邪之從皮毛而入極於五臟之次也如此則治其經焉凡刺之數先視其經脈切而從之審其虛實而調之不調者經刺之不盛不虛以經取之刺脈虛實淺深肺實者深刺之以泄其氣脈虛者淺刺之使經氣無得出以養其脈獨出其邪氣刺陰者深而留之刺陽者淺而疾之脈淺者勿刺按其脈乃刺之無令精出獨出其邪氣耳脈之所居深不見者勿按其脈而刺之微納針而久留之以致其孔脈氣也刺宜從時凡刺之法必候日月星辰四時八正之氣氣定乃刺之是故天溫日明則入血淖澤而衛浮故血易瀉氣易行天寒日陰則人血凝澀而衛氣沉月始生則血氣始精衛氣始行月廓滿則血氣實肌肉堅月廓空則肌肉減經絡虛衛氣去形獨居是以因天時而調血氣也是以天寒無刺天溫無凝月生無瀉月滿無補月廓空無治是謂得時而調之也因天之序盛虛之時移光定位正立而待之故日月空而瀉是謂臟虛月滿而補血氣揚波絡有留血命曰重實月廓空而治是謂亂經陰陽相錯真邪不別沉以留止外虛內亂淫邪乃起帝曰星辰八正何候岐伯曰星辰者所以候曰月之行也八正者所以候八風虛邪以時至者也四時者所以分春夏秋冬之氣所在以調之也八正之虛邪避之勿犯也是故春氣在經脈夏氣在孫絡長夏在肌肉秋氣在皮膚冬氣在骨髓中春者天氣始開地氣始泄凍解冰釋水道經通故人氣在脈夏者經滿氣溢孫絡受血皮膚充實長夏者經絡皆盛內溢肌中秋者天氣始收腠理閉塞皮膚引急冬者蓋藏血氣在中內著骨髓通於五臟是故邪氣者常隨四時之氣血而入客也故用針之服者必有法則上視天光下同八正以避奇邪而觀百姓審於虛實無犯其邪是得天之露遇歲之虛救而不勝反受其殃故曰必知天忌乃言針意春刺散俞乃與分理血出而止甚者傳氣間者環也夏刺絡俞見血而止盡氣開環痛必下秋刺皮膚循理上下同法神變而止冬刺俞竅於分理甚者直下間者散下春夏秋冬各有所刺法其所在春者木始治肝氣始生其風疾急經脈常深其氣不能深入故取絡脈分肉間夏者火始治心氣始強脈瘦氣弱陽氣留溢熱熏分腠內至於經故取盛經分胰絕膚而去者邪氣淺也所謂盛經陽脈也秋者金始治肺將收殺金得勝火陽氣在合故陰氣初勝濕氣及體陰氣未盛未能深入故取俞以瀉陰邪取合以虛陽邪陽氣始衰故取於合冬者水始治腎方閉陽氣衰少陰氣堅盛巨陽伏沉陽脈乃去故取井以下陰逆取榮以實陽氣故曰冬敢井榮春不鼽衄正月二月三月人氣在左無刺左足之陽四月五月六月人氣在右無刺右足之陽七月八月九月人氣在右無刺右足之陰十月十一月十二月人氣在左無刺左足之陰甲乙日自乘無刺頭無發蒙於耳內丙丁日自乘無振埃於肩喉廉泉戊己日自乘四季無刺腹去爪瀉水庚辛日自乘無刺關節於股膝壬癸日自乘無刺足脛隨日之長短各以為紀而刺之謹候其時病可與期失時反候者百病不治故曰刺實者刺其來也刺虛者刺其去也些言氣存亡之時以候虛實而刺之候氣之所在而刺之是謂逢時在於三陽必候其氣在於陽而刺之病在三陰必候其氣在於陰而刺之刺逆四時春刺夏分肺亂氣微入淫骨髓病不能愈又且少氣春刺秋分筋攣逆氣環為咳嗽病不愈令人時驚又且哭春刺冬分邪氣著臟令人脹病不愈又且欲言夏刺春分病不愈令人懈惰夏刺秋分病不愈令人慾無言惕惕如人將捕之夏刺冬分病不愈令人少氣時欲怒秋刺春分病不已令人惕然欲有所為起而忘之秋刺夏分病不已令人益嗜臥又且善夢秋刺冬分病不已令人洒洒時寒冬刺春分病不已令人慾臥不能眠眠而有見冬刺夏分病不已令人上氣發為諸痹冬刺秋分病不已令人善瀉春刺絡肺血氣外溢令人少氣春刺肌肉血氣環逆令人上氣春刺筋骨血氣內著令人腹脹夏刺經脈血氣乃竭令人解㑊夏刺肌肉血氣內卻令人善恐夏刺筋骨血氣上逆令人善怒秋刺經脈血氣上逆令人善忘秋刺絡脈氣不外行令人臥不欲動秋刺筋骨血氣內散令人寒慄冬刺經豚血氣皆脫令人目不明冬刺絡脈內氣外泄留為大痹冬刺肌肉陽氣竭絕令人善忘凡此四時刺者大逆之病不可不從也反之則生亂氣相淫病焉刺避凡刺胸腹者必避五臟中心者環死其動為噫中肝者五曰死其動為語中脾者十日死其動為吞中腎者六日死其動為嚏中肺者三日死其動為咳中膽者一日死其動為嘔中膈者皆為傷中其病雖愈不過一歲必死刺避五臟者知逆從也所謂從者膈與脾腎之處不知者反之刺足跗中大肺血出不止者死刺面上中溜脈不幸為盲刺頭中腦戶入腦立死刺舌下中大脈太過血出不止為喑刺足下布絡中脈血出不止為腫刺郄中委中穴也中大脈令人僕脫色刺氣衝中脈血不出為腫鼠僕刺脊間中髓為傴刺乳中中乳房為腫根蝕刺缺盆中內陷氣泄令人喘咳逆刺手魚腹內陷為腫無刺大醉令人氣亂無刺大怒令人氣逆無刺大勞人無刺新飽人無刺大渴人無刺熇熇之熱無刺渾渾之脈無刺漉漉之汗無刺病與脈相逆者新內勿刺已刺勿內已醉勿刺已刺勿醉新怒勿刺已刺勿怒新勞勿刺已刺勿勞已飽勿刺已刺勿飽已飢勿刺已刺勿飢已渴勿刺已刺勿渴乘車來者臥而休之如食頃乃刺之出行來者坐而休之如行十里乃刺之大驚大怒必定其氣乃刺之闚門而刺之者死於家中入門而刺之者死於堂上刺陰股中大脈血出不止死刺客主人內陷中脈為內漏為聾刺膝臏出液為跛刺臂大陰脈出血多立死刺足少陰脈重虛出血為舌難以言刺膺中陷中脈為喘逆仰息刺胕中內陷氣歸之不得屈伸刺陰股下三寸內陷令人遺溺刺腋下脅間內陷令人咳刺小腹中膀胱溺出令人小腹滿刺腨腸內陷為腫刺匡上陷骨中脈為漏為盲刺關節液出不得屈伸五奪不可瀉形容已脫一奪也大脫血之後是三奪也大汗出之後是二奪也大泄之後是四奪也新產大血之後是五奪也此皆不可瀉下針法金針賦云先須爪按重而切之次令咳嗽一聲隨咳下針凡補先呼氣初針刺至皮肉乃曰天才少停進針刺至肉內是曰人才又停進針刺至筋骨之間名曰地才此為極處就當補之再停良久卻須退針至人之分待氣沉緊倒針朝病進退往來飛經走氣盡在其中矣凡瀉者吸氣初針至天少停進針直至於地得氣瀉之再停良久卻須退針復至於人待氣沉緊倒針朝病法同前矣及夫調氣之法下針至地之後復人之分欲氣上行將針右捻欲氣下行將針左捻欲補先呼後吸欲瀉先吸後呼氣不至者以手循攝以爪切掐以針搖動進捻搓彈直待氣至以龍虎升騰之法按之在前使氣在後按之在後使氣在前運氣走之疼痛之所以納氣之法扶針直插復向下納使氣不回若關節阻滯氣不過者以龍虎龜鳳通經接氣大段之法馳而運之仍以循攝爪切無不應矣此通仙之妙先說平針法含針口內溫按揉令氣散掐穴故教深持針安穴上令他嗽一聲隨嗽歸天部停針再至人再停歸地部待氣候針沉氣若不來至指甲切其經次提針向病針退地天人補必隨經刺令他吹氣頻隨吹隨左轉遂歸天地人待氣停針久三彈更熨溫出針口吸氣急急閉其門瀉欲迎經取吸則納其針吸則須右轉他次進天人轉針仍復吸依法再停針出針吹出氣搖動大其門出針法金針賦云病勢既退針氣微松病未退者針氣如根推之不動轉之不移此為邪氣吸拔其針乃真氣未至不可出之出之者其病即復再須補當停以待之直候微松方可出針豆許搖而停之補者吸之去疾其穴急捫瀉者呼之去徐其穴不閉欲令腠密然後吸氣故曰下針貴遲太急傷血出針貴緩太急傷氣劉宗厚曰出針不可猛出必須作三四次徐徐轉而出之則無血若猛出必見血也金針辨義古云金針者貴之也金為五金之總名鋼鐵金銀皆是也本草云馬銜鐵無毒可作針以馬屬午屬火火剋金解鐵毒故以作針煮針法煮針一法素問原無今世用之欲溫而澤也是亦有益而不害故從之危氏書用烏頭巴豆各一兩硫黃麻黃各五錢木鱉子烏梅各十個同引入水用砂鍋內或罐煮一日洗擇之再用止痛藥沒藥乳香當歸花蕊石各半兩又如前水煮一日取出用皂角水洗再於犬肉內煮一日仍用瓦屑打磨淨端直松子油塗之常近人氣為妙火針經曰焠針者以麻油滿盞燈草令多如大指許叢其燈火燒針頭頻以麻油蘸其針燒令通經用方有功若不紅者反損於人不能去病燒時令針頭低下恐油熱傷手先令他人燒針醫者臨時用之以免致手熱才覺針紅醫者取針先以針安穴上自然干針之亦佳凡行針點艾相似以墨記之使針時無差穴道差則無功火針甚難須有臨陣之將心方可行針先以左下按定其穴然後針之切忌太深深則反傷經絡不可太淺淺則治病無功但消息取中也凡大醉之後不可用針不適淺深有害無利凡行火針必先安慰病人令勿驚動較之火針及灸灸則直受艾灼燒過痛則久也火針雖則畏人其針下疾一針便去不入也凡下火針一針之後疾速換去不可久留尋即以左手速按針孔上則疼止不按則疼甚火針不宜針腳氣反加腫痛不能行履火針者宜破癰疽發背潰膿在內外皮無頭者但按毒上軟處以潰膿闊大者按頭尾及中以點記宜下三針決破出膿一針腫上不可按之即以指從兩旁捺之令膿隨手而出或腫大膿多針時須側身迴避恐膿射出汙身針灸節要謂火針之功用甚大凡癥瘕積塊癱瘓癰疽堅瘤並宜火針溫針王節齋曰近有為溫針者灸火之時針其穴謂之溫針古人針則不灸灸則不針夫針而且灸灸而且針此後人俗法也此法行於山野鄙人或無損若行於富貴之人肌膚不任者危害出於頃刻其為終身之害也有矣暖針素問遺篇注云用圓利針長針未刺時先含口內溫針暖而用之又曰亳針於人近體暖針至溫方刺凡暖針刺人經絡氣得暖而易行也暈針金針賦云其或暈針者神氣虛也以針補之以袖掩之口鼻氣回熱湯與之略停少頃依前再施指微賦云醫人深明氣血往來取穴部分不差補瀉得宜必無暈針昏倒之患或慌忙之際畏刺之人多感此壯者氣行自已怯者當速救療假令針肝經感氣暈以補肝經合曲泉穴之絡假令針肝絡血暈以補本經曲泉穴之經針入復甦效如起生余皆仿此劉宗厚曰暈針者奪命穴救之男左女右取之不回卻再取右女亦然此穴正在手膊上側筋骨陷中蝦蟆兒上自肩至肘正在當中濟生拔萃云有隨針而卒者何曰一則不知刺禁如刺中心一日死之類也二則不明脈候如下利其脈忽大者死之類凡針灸者先須審詳脈候觀察病證然後知其刺禁其經絡穴道遠近氣候息數深淺分寸折針本草云醫工針人而針折在肉中不出杵牡鼠肝及腦塗之又象牙主諸針及雜物入肉割取屑細碾入水和敷上立出肘後方針折肉中象牙屑水和敷上立出寶鑑湧針膏取針刺入肉並箭頭不出用鼠糞頭十個螻蛄四十九個土消蟲十個芫青馬肉中蛆醬內蛆俱焙乾蜣螂巴豆信石硇砂夏枯草磁石黃丹蘇木地骨皮各一兩石腦油三兩蒿柴灰汁三升上將灰汁石腦油以文武火熬成膏次下諸藥令勻瓷器內收貯臨時看瘡大小點藥良久自然湧出神聖膏取針入皮膚以車脂不拘多少成膏子好攤紙上如錢大貼之二日一換三五次針自出大有神效烏翎散取針鐵入皮膚烏翎三五枝火灸焦為末好醋調成膏塗瘡上紙蓋一二次其針自出一法以緊磁石引其肉中之針即出刺王公布衣之異帝曰夫王公大人血食之君身體柔脆肌肉軟弱血氣慓悍滑利其刺之淺深疾徐多少何如岐伯曰膏粱藿菽之味何可同也氣滑即疾出氣澀則出遲氣悍則針小而入淺氣澀則針大而入深深則欲留淺則欲疾以此觀之刺布衣者深而留之刺大人者微以徐之此皆因其慓悍滑利也經脈交會八穴歌公孫衝脈胃心胸內關陰維下總同臨泣膽經連帶脈陽維目銳外關逢後谿督脈連背頸申脈蹺絡亦相通列缺肺脈行肺系陰蹺照海膈喉嚨八法合十干八卦歌王申之日公孫乾乙癸坤宮申脈連庚日外關屬震卦丙從艮佐內關便戊日臨泣坎象卦後谿辛日巽宮遷丁日兌官針照海已應列缺與離前八法飛騰手訣歌春夏先深而後淺秋冬前淺而後深隨處按之呼吸輕迎而吸之內關尋補虛瀉實公孫是列缺次當照海深臨位外關和上下後谿申肺用金針先深後淺行陰數前三後二卻是陰先淺後深陽數法前二後三陽數定臨泣公孫腸中病脊頭腰背申脈攻照海咽喉並小腹內關行處治心疼後谿前上外肩背列缺針時脈氣通急按慢提陰氣升急提慢按陽氣降攻陽取陰皆六數達人刺處有奇效薛真人天星十一穴歌三里內庭穴曲池合谷截委中配承山下至崐侖穴環跳及陽陵通里並列缺合擔用法擔合截用法截擔截常記取莫與非人說三百六十五不出十一穴此法少人知金鎖都開澈治病顯奇功有如湯潑雪學者細推尋神功無盡竭十二經脈晝夜流注歌肺寅大卯胃辰經脾巳心午小未中申膀酉腎心胞戌亥三子膽醜肝通古人有不行針要知針理許學士視一婦人熱入血室醫者皆不識用補血藥數日成結胸證學士曰小柴胡湯已遲不可行也可刺期門予不能針請善針者針之如言而愈針灸手宜得其入明目者可使視色聰耳者可使聽音捷辭疾語者可使傳論語徐而安靜手巧而心審諦者可使行針艾理血氣而調緒逆順察陰陽而兼諸方緩節柔筋而心和調者可使導引行氣疾毒言語輕人者可使唾癰咒病爪苦手毒為事善傷者可使按積抑痹各得其能方乃可行其名乃彰不得其人其功不成其師無名故曰得其人乃言非其人勿傳此之謂也手毒者可使按龜置龜於器下而按其上五十日而死矣手甘者復生如故也艾灸方宜北方者天地之所閉藏之域也其地高陵居風寒冰冽其民樂野處而乳食藏寒生滿病其治宜灸焫故灸焫者亦從北方來艾葉本草云艾味苦氣微溫陰中之陽無毒主灸百病三月三日五月五日採曝乾陳久者良避惡殺鬼又採艾之法五月五日灼艾有效制艾先要如法令乾燥入臼搗之以細篩去塵屑每入石臼搗取潔白為上須令焙大燥則灸有力火易燃如潤無功證類本草云出明州圖經云舊不著所出州土但云生田野令在處有之惟蘄州葉厚而干高果氣味之大用之甚效孟子曰七年之病求三年之艾丹溪曰艾性至熱入火灸則上行入藥服則下行艾灸補瀉氣盛則瀉之虛則補之針所不為灸之所宜陰陽皆虛火自當之經陷下者火則當之經絡堅緊火所治之陷下則灸之絡滿經虛灸陰刺陽經滿絡虛刺陰灸陽以火補者毋吹其火須自滅也以火瀉者疾吹其火傳其灸須其火滅也艾炷大小黃帝曰灸不三分是謂徒冤炷務大也小弱乃小作之又曰小兒七日以上周年以還炷如雀糞明堂下經云凡灸欲炷下廣三分若不三分則火氣不達病未能愈則是灸炷欲其大惟頭與四肢欲小耳明堂上經乃曰艾炷依小箸頭作其病脈粗細狀如細線但令當脈灸之雀糞大炷亦能愈疾又有一途如腹脹疝瘕痃癖伏梁氣等須大艾炷故小品曰腹背爛燒四肢但去風而已大宜大炷如巨闕鳩尾灸之不過四七壯炷依竹箸頭大但令正當脈上灸之艾炷若大復灸多其人永無心力如頭上灸多令人失精神背腳灸多令人血脈枯竭四肢細而無力既失精神又加細節令人短壽王節齋云面上灸炷須小手足上猶可粗點艾火明堂下經曰古來灸病忌松柏枳橘榆棗桑竹八木火切宜避之有火珠耀日以艾承之得火為上次有火鏡耀日亦以艾引得火此火皆良諸蕃部用鑌鐵擊階石得火以艾引之凡倉卒難備則不如無木火清麻油點燈上燒艾莖點灸兼滋潤灸瘡至愈不疼用臘燭更佳壯數多少千金云凡言壯數者若丁壯病根深篤可倍於方數老少羸弱可減半扁鵲灸法有至三五百壯千壯此亦太過曹氏灸法有百壯五十壯小品諸方亦然惟明堂本經云針入六分灸三壯更無餘治故後人不準惟以病之輕重而增損之凡灸頭項止於七壯積至七七壯止銅人治風灸上星前頂百會至二百壯腹背灸五百壯若鳩尾巨闕亦不宜多灸灸多則四肢細而無力千金方於足三里穴乃云多至三百壯心俞禁灸苦中風則急灸至百壯皆視其病之輕重而用之不可泥一說而不通其變也灸法千金方云凡灸法坐點穴則坐灸臥點穴則臥灸立點穴則立灸須四體平直毋令傾側若傾側穴不正徒破好肉耳明堂云須得身體平直毋令拳縮坐點毋令俯仰立點毋令傾側炷火先後資生云凡灸當先陽後陰言從頭向左而漸下次從頭向右而漸下先上後下明堂云先灸上後灸下先灸少後灸多皆宜審之王節齋曰灸火須自上而下不可先灸下後灸上灸寒熱灸寒熱之法先灸大椎以年為壯數次灸撅骨以年為壯數視背俞陷者灸之臂肩上陷者灸之兩季脅之間灸之外踝上絕骨之端灸之足小指次指間灸之腨下陷脈灸之外踝後灸之缺盆骨上切之堅動如筋者灸之膺中陷骨間灸之臍下關元三寸灸之毛際動脈灸之膝下三寸分間灸之足陽明跗上動脈灸之巔上一穴灸之灸瘡要發資生云凡著艾得瘡發所患即瘥若不發其病不愈甲乙經云灸瘡不發者故履底灸令熱熨之三日即發令人用赤皮蔥三五莖去青於煻火中煨熱拍破熱熨瘡上十餘遍其瘡三日遂發又以生麻油漬之而發亦有用皂角煎湯候冷頻點之而發亦有恐血氣衰不發服四物湯滋養血氣不可一概而論也有復灸一二壯遂發有會熱炙之物如燒魚煎豆腐羊肉之類而發在人以意取助不可順其自然終不發矣貼灸瘡古人貼灸瘡不用膏藥要得膿出多而疾除資生云春用柳絮夏用竹膜秋用新綿冬用兔腹下白細毛或貓腹毛令人多以膏藥貼之日兩三易而欲其速愈此非治疾之本意也但今世貼膏藥亦取其便不可速易若膏藥不壞惟久久貼之可也若速易即速愈恐病根未盡除也洗灸瘡古人灸艾炷大便用洗法其法以赤皮蔥薄荷煎湯溫洗瘡周圍約一時久令驅逐風邪於瘡口出更令經脈往來不澀自然疾愈苦灸火退痂後用東南桃枝青嫩皮煎湯溫洗能護瘡中諸風若瘡內黑爛加胡荽煎洗若疼不可忍加黃連煎神效灸宜保養灸艾後患者宜於靜室謝事飲食寒溫俱要適宜調養正氣復完邪氣自退而病根除矣今人多不知恬養雖灸艾何益每有近房勞貪厚味此又自增其咎也故因灸而反致害者此也徒責灸艾不效何耶灸忌食物房勞資生云既灸之後當忌食魚膾豬膏熱面生冷生酒動風之物尤忌大怒大勞房室忍飢太飽受熱冒寒非徒無益反得有損不可不慎也避人神論千金云欲行針灸先知行年宜忌及人神所在不與禁忌相應即可故男忌除女忌破男忌戌女忌巳有日神忌有每月忌有十二時忌有四季人神有十二部人神十二部年人神有九部傍通人神有雜忌傍通人神有血支血忌之類凡醫者不能知此避忌若逢病人厄會男女氣怯下手至困通人達士豈拘此哉若遇卒暴急患皆不拘禁忌許希云卒暴之疾須速灸療一日之間止忌一時是也千金云癰疽疔腫喉痹客忤尤為急切凡作湯藥宜速不可避凶又曰凡人卒暴急證並中風卒僕痰厥等證即用針灸治療若論忌神少緩則不可救此所以不可拘泥也若平居從容治病於未形選吉日避人神可也逐日人神所在不宜刺灸初一日在足大趾厥陰分犯之跗踵初二日在足外踝少陽分犯之經筋緩初三日在股內少陰分犯之小腹痛初四日在腰太陽分犯之腰僂無力初五日在口太陰分犯之舌強初六日在兩手陽明分犯之咽喉不利初七日在內踝少陰分犯之陰經筋急初八日在手腕太陽分犯之腕不收初九日在尻厥陰分犯之病結初十日在腰背太陽分犯之腰背僂十一日在鼻柱陽明分犯之齒面腫十二日在髮際少陽分犯之令人耳重十三日在牙齒少陰分犯之氣寒十四日在胃脘陽明分犯之氣腫十五日在遍身不宜補瀉針灸大忌十六日在胸太陽分犯之逆息十七日在氣衝陽明分犯之難息十八日在股內少陰分犯之引陰氣痛十九日在足趺陽明分犯之發腫二十日在內踝少陰分犯之經筋攣二十一日在手小指太陽分犯之不仁二十二日在足外踝少陽分犯之經筋緩二十三日在肝及足厥陰分犯之發轉筋二十四日在手陽明分犯之咽喉中不利二十五日在足陽明分犯之胃氣脹二十六日在胸太陰分犯之令人咳嗽二十七日在膝陽明分犯之足厥逆二十八日在陰少陰分犯之小腹急痛二十九日在膝脛厥陰分犯之筋痿少力三十日在足趺皆忌針灸尻神指訣胡侍郎奏行一歲十歲十九二十八三十七四十六五十五六十四七十三八十二坤管叉踝二歲十一二十二十九三十八四十七五十六六十五七十四八十三震管牙腨三歲十二二十一三十三十九四十八五十七六十六七十五八十四巽管頭口乳四歲十三二十二三十一四十四十九五十八六十七七十六八十五中宮管肩及尾窮骨五歲十四二十三三十二四十一五十五十九六十八七十七八十六幹管背面耳六歲十五二十四三十三四十二五十一六十六十九七十八八十七兌管手膊七歲十六二十五五十四四十三五十二六十一七十七十九八十八艮管腰項八歲十七二十六三十五四十四五十三六十二七十一八十八十九離管胸肋九歲十八二十七三十六四十五五十四六十三七十二八十一九十坎管腳肘肚按尻神者神農之所制也尻為尾底骨之臀尖節要謂人之一身何獨惟臀尖之有神也此理皆不能通且云急病亦不拘此姑錄以俟考訂每月血忌正月醜二月未三月寅四月申五月卯六月酉七月辰八月戌九月巳十月亥十一月午十二月子十二建人神建日在足禁晡時除日在眼禁日入滿日在腹禁黃昏平日在背禁人定定日在心禁夜半執日在手禁雞鳴破日在面禁平旦危日在鼻禁日出成日在唇禁食時收日在頭禁寅中開日在耳禁午時閉日在目禁日昳十二部人神一歲十三二十五三十七四十九六十一七十三八十五人神在心二歲十四二十六三十八五十六十二七十四八十六人神在喉三歲十五二十七三十九五十一六十三七十五八十七人神在頭四歲十六二十八四十五十二六十四七十六八十八人神在頸五歲十七二十九四十一五十三六十五七十七八十九人神在背六歲十八三十四十二五十四六十六七十八九十人神在腰七歲十九三十一四十三五十五六十七七十九九十一人神在腹八歲二十三十二四十四五十六六十八八十九十二人神在項九歲二十一三十三四十五五十七六十九八十一九十三人神在足十歲二十二三十四四十六五十八七十八十二九十四人神在腰十一歲二十三三十五四十七五十九七十一八十三九十五人神在陰十二歲二十四三十六四十八六十七十二八十四九十六人神在股禁針歌禁針穴道要先明腦戶囟會及神庭絡郄玉枕角孫穴顱囟承泣隨承靈神道靈臺膻中忌水分神闕並會陰橫骨氣衝手五里箕門承筋並青靈更加臂上三陽絡二十二穴不可針孕婦不宜針合谷三陰交內亦通倫石門針灸應須忌女子終身無孕娠外有云門並鳩尾缺盆客主人莫深肩井深時人悶倒三里急補人還平禁炙歌禁灸之穴四十五承光啞門及風府天柱素窌臨泣上晴明攢竹迎香數禾窌顴窌絲竹空頭維下關與脊中肩真心俞白環俞天牖人迎共乳中周榮淵液並鳩尾腹哀少商魚際位經渠天府及中衝陽關陽池地五會隱白漏谷陰陵泉條口犢鼻兼陰市伏兔髀閒委中穴殷門申脈承扶忌太乙人神歌立春艮上起天留戊寅己丑左足求春分左脅倉門震乙卯日見定為仇立夏戊辰己巳巽陰絡宮中左手愁夏至上天丙午日正值膺喉離首頭立秋玄委官右手戊申己未坤上游秋分倉果西方兌辛酉還尋右脅謀立冬右足加新絡戊戍己亥乾位收冬至坎方臨葉蟄壬子腰尻下竅流五臟六腑並臍腹招遙諸戊已中州潰治癰疽當須避犯其天忌疾難瘳補瀉雪心歌行針補瀉分寒熱瀉寒補熱須分別捻針向外瀉之方捻針向內補之訣瀉左須將大指前瀉右大指當後拽補左大指向前搓補右大指向下搣何如補瀉有兩般蓋是經絡兩邊發補瀉又要識迎隨隨即為補迎為瀉古人補瀉左右分今人乃為男女別男女經脈一般生晝夜循環無暫歇兩手陽經上走頭陰經胸走手指輒兩足陽經頭走足陰經足走腹中結隨即針頭隨經行迎即針頭迎經奪更有補瀉定呼吸吸瀉呼補真奇絕補則呼出卻入針要知針用三飛法氣至出針吸氣入疾而一退急捫穴瀉則吸氣方入針要知阻氣通身達氣至出針呼氣出徐而三退穴間捺莫向人前容易說天元太乙歌先師秘傳神應經太乙通玄法最靈句句言辭多妙典萬兩黃金學也輕每每不忘多效驗治病如神記在心口內將針多溫暖更觀患者審浮沉陰病用陽陽用陰分明更取陰陽神虛則宜補實宜瀉氣應針時病絕根氣至如擺獨龍尾未至停針宜待氣凡用行針先得訣席弘玄妙分明說氣至兩乳求大淵未應之時列缺針列缺頭痛及偏正重瀉大淵無不應耳聾氣閉喘綿錦欲愈須尋三里中手攣腳背疼難忍合谷仍須瀉太衝曲池主手不如意合谷針時宜仔細心疼手顫少海間欲要除根針陰市若是傷寒兩耳聾耳門聽會疾如風五般肘痛針尺澤冷淵一刺有神功手三里兮足三里食否氣塊兼能治鳩尾獨治五般癇若刺湧泉人不死大凡痃痞最宜針穴法從來著意尋以手按痃無轉動隨深隨淺向中心胃中有積取璇璣三里功深人不知陰陵泉主胸中滿若刺承山飲食宜大椎若連長強取小腸氣滿立可愈氣衝妙手要推尋管取神針人見許委中穴主腰疼痛足膝腫時尋至陰乾溼風毒並滯氣玄機如此更尤深氣攻腰痛不能立橫骨大都宜救急流血攻註解若遲變為風證從此得氣海偏能治五淋若補三里效如神冷熱兩般皆治得便濁痼疾可除根期門穴主傷寒患七日過經亢未汗但於乳下雙肋間刺入四分人力健耳內蟬鳴腰欲折膝下分明三里穴若能補瀉五會中切莫逢人容易說牙風頭痛孰能調二間妙穴莫能逃更有三間神妙穴若治肩背感風勞合谷下針順流注脾內隨針使氣朝冷病還須針合谷只宜腳下瀉陰交背脊俱疼針肩井不瀉三里令人悶兩臂並髀俱疼痛金針一刺如聖神腳膝疼痛委中宜更兼攣急鋒針施陰陵泉穴如尋得輕行健步疾如飛腰腹脹滿治何難三里腨肚針承山更向太衝行補瀉指頭麻木一時安頭皮轉筋魚腹肚又治背疽及便毒再有妙穴陽陵泉腿轉筋急如神取腸中疼痛陰陵沃耳內蟬鳴聽會招更尋妙穴大溪是醫門行瀉實為高浮沉腹脹水分瀉氣喘息粗瀉三里更於膝中陰谷針小便淋漓自消盡環跳能除腿股風冷風膝痹瘧疾同最好風池尋的穴間使雙刺有神功傷寒一日調風府少陽二穴風池取三五七日病過經依此針之無不應心疼嘔吐上脘宜豐隆兩穴更無疑蛔蟲並出傷寒病金針宜刺顯明醫男子痃癖取少商女人血氣陰交當虛盜二汗須宜補委中妙穴可傳揚項強腫痛屈伸難更兼體重腰背癱宜向束骨三里取教君頃刻便開顏閃挫脊膂腰難轉舉步多難行重蹇偏體遊風生虛浮復溜一針人健羨久患腰痛背胛勞但尋中注穴中調行針用心須尋覓管取從今見識高腰背連臍痛不休手中三里穴堪求神針未出急須瀉得氣之時不用留小腹便澼最難醫氣海中極間使宜三里更須明補瀉下針斷不失毫釐玉龍賦扁鵲越人夫參博以為約要輯簡而舍繁總玉龍以成賦信金針以獲安原夫卒暴中風頂門百會腳氣連延里絕三交頭風鼻淵上星可取耳聾腮腫聽會偏高攢竹頭維治目疼頭痛乳根俞府療嗽氣痰哮風市陰市驅腳氣之乏力陰陵陽陵除膝腫之難熬太白醫痔漏間使剿瘧疾大敦去疝氣膏肓補虛勞天井治瘰癧隱疹神門治呆癡笑咷咳嗽風痰大淵列缺宜刺尪羸喘促璇璣氣海當知期門大敦能治堅痃疝氣勞宮大陵可療心悶瘡痍心悸虛煩刺三里時疫㾬瘧尋後谿絕骨三里陰交腳氣宜此睛明太陽魚尾目證憑茲老者便多命門兼腎俞而著艾婦人乳腫少澤與大陽之可推身柱蠲嗽能除膂痛至陽卻疽善治神疲長強承山灸痔最妙豐隆肺俞痰嗽稱奇風門主傷冒寒邪之嗽天樞理感患脾泄之危風池絕骨而療乎傴僂人中曲池可治其委僕期門刺傷寒未解經不再傳鳩尾針癇癲已發慎其妄施陰交水分三里蠱脹宜刺商丘解谿坵墟腳氣堪追尺澤理筋急之不達腕骨療手腕之難移肩脊痛兮五樞兼於背縫肘攣疼兮尺澤合於曲池風濕搏於兩肩肩髃可療壅熱盛於三焦關衝最宜手臂紅腫中注液門要辨脾虛黃疸腕骨中脘何疑傷寒無汗攻復溜宜瀉傷寒有汗取合谷當隨欲調飽滿之氣逆三里可勝要起六脈之沉匿復溜稱神照海支溝通大便之秘內庭臨泣理小腹之脂天突膻中醫喘嗽地倉頰車療口喎迎香攻鼻窒為最肩井除臂痛如拏二間治牙疼中魁理翻胃而即愈百勞止虛汗通里療心驚而不差大小骨空治眼爛能止冷淚左右太陽醫目疼善治血翳心俞腎俞治腰疼腎虛之蘿遺人中委中除腰脊痛悶之難制太谿崐崙申脈最療足腫之迍湧泉關元豐隆為治屍勞之例印堂治其驚搐神庭理乎頭風大陵人中頻瀉口氣全除帶脈關元多灸腎敗堪攻腳腿重疼針髖骨膝眼行步艱楚灸三里中封取內關於照海醫腹疾之塊搐迎香於鼻肉消眼熱之紅肚痛秘結太陵臺外關於支溝腿風濕痛居窌兼環跳於委中上脘中脘治九種之心痛赤帶白帶求中極之異同又若心虛熱壅少衝明於濟奪目昏血溢肝俞辨其實虛要心傳乎玄秘究手法之疾徐或值挫閃痛疼之不定此為難擬定穴之可祛輯管見以便讀幸高明而無哂諸玉龍歌俗以為扁鵲所撰蓋後人托為之者上玉龍賦又總輯其要旨耳標幽賦拯救之法妙用者針察歲時於天道定形氣於予心春夏瘦而刺淺秋冬肥而刺深不窮經絡陰陽多逢刺禁既論臟腑虛實須向經尋原夫起自中焦水初下漏太陰為始至厥陰而方終穴出雲門抵期門而最後正經十二別絡走三百餘支正側偃伏氣血有六百餘候手足三陽手走頭而頭走足手足三陰足走腹而胸走手要識迎隨須明逆順況乎陰陽氣血多少為最厥陰太陽少氣多血太陰少陰少血多氣而又氣多血少者少陽之分氣盛血多者陽明之位先詳多少之宜次察應至之氣輕滑慢而未來沉澀緊而已至既至也量寒熱而留疾未至也據虛實而候氣氣之至也如魚吞釣餌之浮沉氣未至也如閒處幽堂之深邃氣至速而效速氣遲至而不治觀夫九針之法毫針最微七星可應眾穴主持本形金也有蠲邪扶正之道短長水也有決凝開滯之機定刺象木或邪或正口藏比火進陽補羸循機捫而可塞以象土實應五行而可知然是一寸六分包含妙理雖細擬於毫髮同貫多歧可平五臟之寒熱能調六腑之虛實拘攣閉塞追八邪而去矣寒熱痛痹開四關而已之凡刺者使本神朝而後入既刺也使本神定而氣隨神不朝而勿刺神已定而可施定腳處取氣血為主意下手處認水木是根基天地人三才也湧泉同璇璣百會上中下三部也大包與天樞地機陽蹺陽維並督脈主肩背腰腿在表之病陰蹺陰維任沖帶去心腹脅肋在裡之疑二陵二蹺二支似續而交五大兩間兩商兩並相依而列兩支足見取穴之法必有分寸先審目意次觀肉分或伸屈而得之或平直而安定在陽部筋骨之側陷下為真在陰部郄膕之間動脈相應取五穴用一穴而必端取三經用一經而可正頭部與肩部詳分督脈與任脈易定明標與本論刺深刺淺之經住痛移疼取相交相貫之逕豈不聞臟腑病求門海俞募之微經絡滯而求原別交會之道更窮四根三結依標本而刺無不痊但用八法五門分主客而針無不效八脈始終連八會本是紀綱十二經絡十二原是謂樞要一日取六十六穴之法方見幽微一時取十二經之原始知要妙原夫補瀉之法非呼吸而在手指速效之功要交正而識本經交經繆刺左有病而右畔取瀉絡遠針頭有病而腳上針巨刺與繆刺各異微針與妙刺相通觀部分而知經絡之虛實視浮沉而辨臟腑之寒溫且夫先令針耀而慮針損次藏口內而欲針溫目無外視手如握虎心無內慕如待貴人左手重而多按欲令氣散右手輕而徐入不痛之因空心恐怯直立側而多暈背目沉掐坐臥平而沒昏推於十干十變知孔穴之開闔論其五行五臟察時日之旺衰伏如橫弩應若發機陰交陽別而定血暈陰蹺陰維而下胎衣痹厥偏枯迎隨俾經絡接續漏崩帶下溫補使氣血依歸靜以久留停針待之必准處取照海治喉中之閉塞端的處用大鐘治心內之呆癡大抵疼痛實瀉癢麻虛補體重節痛而俞居心下痞滿而井主心脹咽痛針大沖而必除脾冷胃疼瀉公孫而立愈胸滿腹痛刺內關脅疼肋痛針飛虎筋攣骨痛而補魂門體熱勞嗽而瀉魄戶頭風頭痛刺申脈與金門眼癢眼痛瀉光明於地戶瀉陰郄止盜汗治小兒骨蒸刺偏歷利小便醫大人水蠱中風環跳宜刺虛損天樞可取由是午前卯後太陰生血疾溫離左酉南月朔死而速冷循捫彈弩留吸母而堅長爪下伸提疾呼子而噓短動退空歇迎奪右而瀉涼推內進搓隨濟左而補暖大凡危疾色脈不順而莫針寒熱風陰飢飽醉勞而切忌望不補而晦不瀉弦不奪而朔不濟精其心而窮其法無灸艾而壞其皮正其理而求其原免投針而失其位避灸處而和四肢四十有九禁刺處而除六腧二十有二昔聞高皇抱疾未瘥李氏刺巨闕而復甦太子暴死為厥越人針會維而復醒肩井曲池甄權刺臂痛而即射懸鐘環跳華佗刺躄足而立行秋夫針腰俞而鬼兔沉痾王纂針交俞而妖精立出取肝俞與命門使瞽士視秋毫之末刺少陽與交別俾聾夫聽夏蚋之聲嗟夫去聖愈遠此道漸墜或不得意而散其學或愆其能而犯禁忌庸愚知淺難契於玄言至道淵深得之者有幾針經指南為寶漢卿所撰通玄指要賦必欲治病莫如用針巧運神機之妙工開聖理之深外取砭針能蠲邪而輔正中含水火善回陽而倒陰原夫絡別支殊經交錯綜或溝渠溪谷以歧異或山海丘陵而隙共斯流派以難睽在條綱而有統理繁而昧縱補瀉以何功法捷而明自迎隨而得用且如行步難移太衝最奇人中除脊膂之強痛神門去心性之呆癡風傷項急始求於風府頭暈目眩要覓於風池耳閉須聽會而治也眼疼則合谷以推之胸結身黃取湧泉而即可腦昏目赤瀉攢竹以便宜若兩肘之拘攣仗曲池而平掃牙齒痛呂細堪治頸項強承漿可保太白宣道於氣衝陰陵開通於水道腹䐜而脹奪內庭以休遲筋轉而疼瀉承山之在早大抵腳腕痛崐崙解愈胻膝疼陰市能醫癇發顛狂兮憑後谿而料理瘧生寒熱兮仗間使以扶持期門罷胸滿血膨而可已勞宮退胃翻心痛以何疑稽夫大敦去七疝之偏疼王公謂此三里卻五勞之羸瘦華佗言斯腕骨祛黃然谷瀉腎行間治膝腫腰疼尺澤去肘疼筋急目昏不見二間宜取鼻塞無聞迎香可引肩井除兩臂濕痛難任絲竹空療偏頭疼不忍咳嗽寒痰列缺堪憑眵䁾冷淚臨位尤准髖骨將腿疼以祛殘腎俞把腰疼而瀉盡越人治屍厥於會維隨手而蘇文伯瀉死胎於三陰應針而墮所謂諸痛為實諸麻曰虛實則自外而入也虛則自內而出與是故濟母而裨其不足奪子而平其有餘觀二十七之經絡一一明辨據四百四之疾證件件皆除故得夭枉都無躋斯民於壽域幾微已判彰往古之玄書又聞心胸病求掌後之大陵肩背痛責肘前之三里冷痹腎敗取足陽明之土臍連腹痛瀉足少陰之水脊間心後者針中渚而立痊脅下肋邊者刺陽陵而即止頭項痛擬後谿以安然腰腳疼在委中而已矣衛生寶鑑注呂細穴一名大溪為足少陰腎經穴也靈光賦黃帝岐伯針灸訣依他經里分明說三陰三陽十二經更有兩經分八脈靈光典注極幽深偏正頭痛瀉列缺睛明治眼拏肉攀耳聾氣痞聽會間兩鼻齆衄針禾窌鼻窒不聞迎香間治氣上壅足三里天突宛中治喘痰心疼手顫針少海少澤應除心下寒兩足拘攣覓陰市五般腰痛委中安脾俞不動瀉丘墟復溜治腫如神醫犢鼻療治風邪痰住喘腳氣崐崙愈後跟痛在僕參求承山筋轉並久痔足掌下去尋湧泉此法千金莫妄傳此穴多治婦人疾男蠱女孕兩病痊百會鳩尾治痢疾大小腸俞大小便氣海血海療五淋中脘下脘治腹堅傷寒過經期門愈氣刺兩乳求大淵大敦二穴主偏墜水溝間使治邪顛吐血定喘補尺澤地倉能止兩流涎勞宮醫得身勞倦水腫水分灸即安五指不使中渚取頰車可針牙齒愈陰蹺陽蹺兩踝邊腳氣四穴先尋取陰陽陵泉亦主之陰蹺陽蹺與三里諸穴一般治腳氣在腰玄機宜正取膏肓豈止治百病灸則玄功病須愈針灸一穴數病除學者尤宜加仔細悟得明師流注法頭目有病針四肢針有補瀉明呼吸穴應五行順四時悟得人身中造化此歌依舊是筌蹄針灸大全席弘賦凡欲行針須審穴要明補瀉迎隨訣胸背左右不相同呼吸陰陽男女別氣刺兩乳求太淵未應之時瀉列缺列缺頭痛及偏正重瀉太淵無不應耳聾氣痞聽會針迎香穴瀉功如神誰知天突治喉風虛喘須尋三里中手連肩脊痛難忍合谷針時要太衝曲池兩手不如意合谷下針宜仔細心疼手顫少海間若要根除覓陰市但患傷寒兩耳聾金門聽會疾如風五般肘痛尋尺澤太淵針後卻收功手足上下針三里食癖氣魄恁此取鳩尾能治五般癇若下湧泉人不死胃中有積刺璇璣三里功多人不知陰陵泉治心胸滿針到承山飲食思大抒若連長強尋小腸氣痛即行針委中專治腰間痛腳膝腫時尋至陰氣滯腰疼不能立橫骨大都宜救急氣海專能治五淋更針三里隨呼吸期門穴主傷寒患六日經過尤未汗但向乳根二肋間又治婦人生產難耳內蟬鳴腰欲折膝下明存三里穴若能補瀉五會間切莫向人容易說睛明治眼未效時合谷光明安可缺人中治顛功最高十三鬼穴不須饒水鍾水分兼氣海皮內隨針氣自消冷嗽先宜補合谷卻須針瀉三陰交牙疼腰疼並咽痹二間陽谿疾怎逃更有二間腎俞妙善除肩背浮風勞若針肩井須三里不刺之時氣未調最是陽陵泉一穴膝間疼痛用針燒委中腰痛腳攣急取得其經血自調腳疼膝腫針三里懸鐘三陵三陰交更向大沖須引氣指頭麻木自輕飄轉筋目眩針魚腹承山崐崙立便消肚痛須是公孫妙內關相應必然療冷風冷痹疾難愈環跳腰間針與燒風府風池尋得到傷寒百病一時消陽明二日尋風府嘔吐遠須上腕療婦人心痛豐隆穴男子痃癖三里高小便不禁關元好大便閉澀大敦燒髖骨腿疼三里瀉復溜氣滯便離腰從來風府最難針卻用工夫度淺深倘若膀胱氣未散更宜三里穴中尋若是七疝小腹痛照海陰交曲泉針又不應時求氣海關元同瀉效如神小腸氣撮痛連臍速瀉陰交莫在遲良久湧泉針取氣此中玄妙少人知小兒脫肛患多時先灸百會次鳩尾久患傷寒肩背痛但針中注得其宜肩上痛連臍不休手中三里更須求下針麻重即須瀉得氣之時不用留腰連胯痛勢必大急於三里攻其隘下針一瀉三補之氣上攻噎只管在噎不住時氣海灸定瀉一時立便瘥補自卯南轉針高瀉從卯北莫辭勞逼針瀉氣令須吸若補隨呼氣自調左右捻針尋子午抽針行氣自迢迢用針補瀉分明說更用搜窮本與標咽喉最急先百會太衝照海及陰交學者潛心宜熟讀席弘治病最名高針灸大全銅人指要賦行針之士要辨浮沉脈明虛實針別淺深經脈絡脈之別巨刺繆刺之分經絡閉塞須用砭針疏導臟腑寒溫必明淺深補瀉經氣之正自有漏水常數百刻五十度周經絡流注各應其時先脈訣病次穴蠲疴左手掐穴右手置針刺榮無傷衛刺衛無傷榮氣悍則針小而入淺氣澀則針大而入深氣滑則疾氣澀則遲深則欲留淺則入疾候其氣至必辨於針徐而疾者實實而遲者虛虛則實之滿則瀉之菀陳則除之邪勝則虛之刺虛者須其實刺實者須其虛經氣已至慎守勿失謹守其法勿更變也賊邪新客未有定處推之則前引之則止其來不可逢其往不可追損其有餘補其不足先去血脈而後調之無問其病以平為期若有若無若得若失五臟已定九候已備診脈病明行針病愈眾脈不見眾凶不聞外內相得無以形先可玩往來乃施於人手動若務針耀而勻伏如橫弩起如發機見其烏烏見其稷稷從見其飛不知其誰靜意是義觀適之變是謂冥冥莫知其形如臨深淵手如握虎如待所貴不知日暮其氣已至適而自護五虛勿近五實不遠捫而循之切而散之推而按之彈而怒之爪而下之通而取之陰募在腹陽俞在背臟病取原腑病取合肘後歌頭面有疾針至陰腿腳有疾風府尋心胸有病少府瀉臍腹有病曲泉針肩背諸疾中渚下腰膝強痛交信恁脅肋腿叉後谿妙股膝腫起瀉太衝陰核發來如升大百會妙穴真可駭頂心頭痛眼不開湧泉下針定安泰鶴膝腫勞難移步尺澤能舒筋骨疼更有一穴曲池妙根尋源流可調停其患若要便安愈加以風府可用針更有手臂拘攣急尺澤刺深去不仁腰背若患攣急風曲池一寸五分攻五痔原因血熱作承山須下病無蹤哮喘發來寢不得豐隆刺入三寸深狂言盜汗如見鬼惺惺間使便下針骨寒髓冷火來燒靈餌妙穴分明記瘧疾寒熱真可畏須知虛實可用意間使宜透支溝中大狂七壯合聖治連日頻頻發不休金門剌深七分是瘧疾二日得一發先寒後熱無他語寒多熱少取復溜熱多寒少用間使或患傷寒熱未休牙關風壅藥難投項強反張目直視金針用意列缺求傷寒四肢厥逆冷脈氣無時仔細看神奇妙穴真有二復溜半寸順骨行四肢回還脈氣浮須曉陰陽倒換求寒則須補絕骨是熱則絕骨瀉無憂若脈浮洪當瀉解沉細之時補便瘳百合傷寒最難醫妙法神針用意推口噤眼合藥不下合谷一針效甚奇狐惑傷寒滿口瘡須用黃連犀角湯蟲在臟腑食肌肉須要神針刺地倉傷寒腹痛蟲尋食吐蛔烏梅可難攻十日九日必定死中脘回還胃氣通傷寒痞氣結胸中兩目昏黃汗不通湧泉妙穴三分許速使周身汗自通傷寒痞結脅積痛宜用期門見深功當汗不汗合谷瀉自汗發黃復溜恁飛虎一穴通痞氣祛風引氣使安寧剛柔二痓最