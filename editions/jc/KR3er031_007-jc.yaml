並宜灸大椎第一節灸第三節小指尖男左女右灸咳嗽肺俞灸少商行間廉泉宜灸脾俞肝俞上腕隱白宜刺下血隱白宜刺三里灸腎俞灸三十椎下隨年灸淋證三陰交灸小便不禁陰陵泉氣海並宜灸癥瘕氣海內踝腕腕中俱可灸女人灸天樞二穴積聚灸胃脘百壯霍亂臍中納鹽灸氣海翻胃乳根中脘下脘建里三里俱可灸內踝下三指斜向前宜灸七壯卒厥屍厥百會氣海丹田並宜灸水溝針五痔脊中窮骨上並宜灸鼻衄上星百會百勞並宜灸諸氣逆上腹中雷鳴嘔逆煩滿憂思結氣心痛太衝太倉胃脘並宜灸臍下痛關元灸短氣而喘大椎肺俞臍中並宜灸諸氣不足虛弱灸氣海柳公度曰人之生惟元氣為主氣海者元氣之所生也故宜灸喉痹天突合谷豐隆湧泉並宜針頭腫針曲池瘰癧諸瘡肩井曲池大迎肘骨尖並宜灸諸疝大敦三陰交灸小腹上橫紋斜尖灸太衝針外陵歸來灸腳氣足三里灸絕骨灸公孫衝陽並宜針痿證足三里肺俞並宜灸中瀆環跳並宜針喘證中府膻中雲門天府華蓋肺俞天突脊中七節下灸一壯噁心胃俞中府膈俞石門商丘陽關並宜灸嗝噎石關三里胃俞胃脘胃倉膈俞水分並宜灸水腫胃倉石門水溝三里復溜四滿並宜剌鼓脹上脘三里章門期門陰谷關元脾俞承滿宜刺頭眩上星風池天柱並宜刺肩臂痛肩髃曲池並宜針宜灸夢遺中極曲骨膏肓腎俞並宜灸婦人諸病漏下月水不調氣海灸血海灸帶下小腹急痛陰谷灸月水不通會陰灸疝氣臍下冷痛中庭灸小兒諸病急驚小溪針慢驚尺澤灸印堂灸撮口臍風然谷灸驚癇啼叫百會灸癖氣章門脊中並宜灸積聚瀉泄痃癖十一椎下兩旁相去各一寸五分灸七壯吐乳食中庭灸脫肛百會龜尾並宜灸秦承祖灸鬼法鬼哭穴以兩手大指相併縛定用艾柱騎縫灸之令兩甲角後肉四處著火一處無火則不效崔氏四花六穴並辨治男子婦人五勞七傷氣血虛弱骨蒸潮熱咳嗽痰喘五心煩熱四肢困倦形容憔悴並宜治之先二穴令患人平分正直立定取一線繩蠟之勿令展縮於男左女右腳底貼肉堅踏之其繩前與大拇指端齊後頭循當腳根中心向後引繩從腳端肚貼肉直上至膂曲中大橫紋即委中穴截斷次令患人解發分兩邊令見頭縫自囟門平分至腦後腳平身正坐取向所截繩一頭令與鼻端齊引繩向上正循頭縫至腦後貼肉垂下循脊內引繩向下至繩盡處當脊骨中以墨點記之墨點不是灸處又取一繩子令患人合口將繩子按於口上上兩頭至吻卻鈞起繩子中心至鼻柱根下如厶三角樣下二角齊兩吻截斷將此繩令盡處是穴以白圈記之若婦人纏腳短小非自然也若以量腳索子加之於首必不及也今移下於肩髃穴點定引繩向下至中指盡處截斷以代量足之用以上是第一次點二穴次二穴令患人平身正坐稍縮臂膊取一繃繞項向前雙垂頭與鳩尾齊胸前及骨間之盡處是也雙頭齊截斷卻翻雙繩頭向後以繩子中心按於喉嚨結骨上其繩兩頭相垂循脊骨以墨點記之墨點不是灸穴又取一繩令患人合口橫量齊兩吻截斷遠於脊骨上墨點橫量如法繩子兩頭以白圈記之此是灸穴以上是第二次點二穴前四穴同時灸之各三七壯累灸至百壯候灸瘡將瘥又依後法灸二穴又二穴以第二次量口吻繩於第二次雙繩頭盡處墨點上當脊骨直下起點其繩子中心放在墨點上於上下繩頭盡處以白圈記之此是灸處以上是第三次點二穴通前共六穴擇取離日火日灸之百日內宜忌房室勞思將息調養飲食應時寒熱得中未愈者如前再灸一翻無有不愈按資生經灸骨蒸勞瘵取上二穴合五椎兩旁開三寸乃心俞二穴是也心主血勞為血病故灸之崔知悌取四花穴灸勞按其量法節要中備載之先比口吻闊狹樣式度裁紙四方中煎一孔取脊中墨點以紙中孔按上其紙四角平取四花是其膈俞膽俞之四穴也經曰血會膈俞疏曰血病治此蓋骨蒸勞熱血虛火盛故取此以補之膽為肝之腑臟血故亦取之崔氏止言四花不言膈膽俞四穴為粗工告也今世以四花科取其誤也故多不效依平取之然要合三俞穴方准有效今以傳訛春甫一旦釐正恐人不信故載斜穴於前而辨其誤於後知者審而用之幸毋踵其誤焉可也騎竹馬灸治一切癰疽惡瘡發背量法以男左女右臂腕中橫紋起用薄篾一條量至大指齊肉盡處不量爪甲截斷次用薄篾取前同身一寸令患人脫去上下衣服以大竹竿一條跨定兩人隨余扛起足要離地五寸許兩旁更以兩人扶定毋令搖動不穩卻以前長篾貼定竹扛豎起從尾骶骨貼脊量至篾盡處以墨點記之此不是灸穴卻用後取同身寸篾取兩寸平摺中合墨點橫量兩頭各一寸方是灸穴可灸三壯按在督脈脊中至陽筋束二穴中外太陽行背二行膈俞肝俞之內非正當穴也疑必後人傳訛以三寸為二寸耳豈有不按經絡穴道而用針灸者乎故不能無疑也用者審之附錄或悶內經治病湯液醪醴為甚少所載服餌之法才一二而灸者四五其他則明針法無慮十八九厥後方藥之說肆行而針灸之法僅而獲存者何也曰內經上古書也上古之人其知道乎勞而不至倦逸而不至流食不肥鮮以戕其內衣不蘊熱以傷其外起居有常寒暑知避恬淡虛無精神內守病安從生雖有賊風虛邪莫能深入不過湊於皮膚經滯氣鬱而已以針行滯散鬱則病隨已何待於湯液醪醴耶當今之世道德以衰以酒為漿以妄為常縱欲以竭其精多慮以散其真不知持滿不解御神務快其心逆於生樂起居無節寒暑不避故病多從內生外邪亦易中也經曰針刺治其外湯液治其內病既屬內非藉湯液之盪滌其能濟乎此和緩以後方藥盛行而針灸罕用者實由世不古若人非昔比病有深淺治有內外非針灸宜於古而不宜於今非湯液宜於令而不宜於古也經曰上古作湯液為而弗服中古之時服之萬全當今之世必齊毒藥攻其中針灸治其外雖形弊血盡而功不立此之謂也或問經病絡病治有異乎經曰邪之客於形也必先舍於皮毛留而不去入舍於孫絡留而不去入舍於絡脈留而不去入舍於經肺內連五臟散於腸胃陰陽俱感五臟乃傷此邪之從皮毛而入極於五臟之次也如此則治其經焉今邪客於皮毛入舍孫絡留而不去閉塞不通不得入於經流溢於大絡而生奇病也夫邪客大絡者左注右右注左上下左右與經相干而布於四末其氣無常處不入於經俞故曰繆刺或問病有在氣分者在血分者不知針家亦分氣與血否曰氣分血分之病針家亦所當知病在氣分遊行不定病在血分沉著不移以積塊言之腹中或上或下或有或無者是氣分也或在兩脅或在心下或在臍上下左右一定不移以漸而長者是血分也以病風言之或左手移於右手右足移於左足移動不常者氣分也或常在左足或偏在右手著而不走者血分也凡病莫不皆然須知在氣分者上有病下取之下有病上取之在左取右在右取左在血分者隨其血之所在應病取之苟或血病瀉氣氣病瀉血是謂誅伐無過咎將誰歸或問賦言男子之氣早在上而晚在下女子之氣早在下而晚上午前為早午後為晚從腰以上為上從腰以下為下男子早針氣乃上行晚針氣乃下行女子早針氣乃下行晚針氣乃上行其說亦有據乎經曰榮氣行於肺中周身五十度無分晝夜至平旦與衛氣會於手太陰衛氣行於脈外晝行陽二十五度夜行陰二十五度平旦與榮氣會於手太陰是則衛氣之行但分晝夜未聞分上下也男女臟腑經絡氣血往來未嘗不同也今賦所言早晚似涉無稽之說安可以為涉哉或問睛明迎香承泣絲竹空皆禁灸何也曰四穴近目目畏火故禁灸也以是推之則知睛明可灸王注誤也或問迎而奪之隨而濟之此固言補瀉也其義何如曰迎者逢其氣之方來如寅時氣來注於肺卯時氣來注於大腸此時肺大腸氣方盛而奪瀉之也隨者氣之方去如卯時氣去注大腸辰時氣去注於胃肺與大腸此時氣虛而補濟之也余仿此或問窌穴針入幾分留幾呼之說曰愚以為初不如是相拘蓋肌肉有淺深病去有遲速若肌肉厚實處則可深淺薄處則宜淺病去則速出針病滯則久留針為可耳故曰刺虛者須其實刺實者須其虛也或問孫氏以灸為閉門趕賊何如曰夫以火瀉者疾吹其火則火氣與邪氣去矣此內經火瀉法也又胡為而閉其門乎至於氣針雖微妄加無病則氣之瀉若河決下流不可以其微而忽之也孫氏之云特歸重於火針耳要之言不能無弊故曰立言難或問人神隨年歲巡歷於人身尻神逐日坐臨於人若人死此神與之俱死乎抑出於人之身飄流於天地間而失所依乎抑別求人而附之乎若別欲依人則人人自有神矣無人可依神亦離散矣既曰神則靈變莫測者也何必求人而附之乎人之心為君主之官神明出焉胡不驅此神使身安而不為針灸所犯乎曰人神曰尻神後世術家之言素難未有也何足信哉或問十二經絡窌穴各有流注衰旺之時按時補瀉固是今病在各經絡者或按時亦能去病蓋病著於經其經自有虛實補虛瀉實亦自中病也病有一針而愈有數針始愈蓋病有新故淺深新且淺一針可愈若深痼者必屢針可去如服藥然有一二劑病愈有服至四五十劑而愈者今用針一次而病不退則不復針如之何其取效也或問針形至微何以能瀉有餘補不足曰如氣球然方其未有氣也則靨塌不堪蹴踢及從竅吹之則氣滿起胖此虛則補之之義也去其竅之所塞則氣從竅出復靨塌矣此實則瀉之之義也或問銅人千金等書空穴多十四經發揮所載空穴少如風市督俞金津玉液等穴彼有此無不同何也曰十四經發揮據素問骨空篇論及王注若銅人千金纂偏書非黃岐正經也或問經言虛者補之實者瀉之不實不虛以經取之何謂也經曰虛者補其母母能令子實也實者瀉其子子能令母虛也假令肝病虛則補厥陰之合曲泉實則瀉厥陰之滎行間不虛不實以經取之者是正經自病不中他邪當自取其經如井取心滿之類正經自病所謂憂愁思慮則傷心強力入水則傷腎是也不虛不實是諸臟不相乘故云自取其經或問今醫用針動輒以袖覆手暗行指法謂其法之神秘弗輕示人惟恐盜取其法者不知果何法耶曰金針賦十四法與夫青龍擺尾等法可謂已盡之矣舍此而他求法之神秘吾未之信也今若此者不過過為詭妄以欺人耳縱為至巧殆必神亦不佑針亦不靈也奚足尚哉或問有醫置針於穴略不加意或談笑或飲酒半晌之間又將針捻幾捻令呼幾呼仍復登筵以飲然後起針果能愈病否乎曰經云凡刺之真必先治神又云手動若務針耀而勻靜意視義觀適之變又云如臨深淵手如握虎神無營於眾物又云如待所貴不知日暮凡此數說敬乎怠乎又云虛之與實若得若失實之與虛若有若無謂氣來實牢者為得濡虛者為失氣來實牢濡虛以隨濟迎奪而為得失也又曰有見如人有見如出蓋謂入者以左手按穴待氣以至乃下針候其氣盡乃出針也若此者俗工之事也不敬孰甚哉或問用針渾是瀉而無補古今用之所以導氣治之以有餘之病也令人鮮用之或知其無補而不用抑元氣稟賦之簿而不用歟或斫喪之多而用針無益歟抑不善用而不用歟經曰陽不足者溫之以氣精不足者補之以味針乃砭石所制既無氣無味破皮損肉發竅於身氣皆自竅出矣何得為補經曰氣血陰陽俱不足勿取以針和以甘藥是也又曰形氣不足病氣不足此陰陽皆不足也不可刺之刺之重竭其氣老者絕滅壯者不復矣若此語者皆是有瀉而無補也
