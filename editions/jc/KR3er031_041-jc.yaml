body:
  text: 卷之四十一諸氣門病機諸氣敘論經曰諸氣膹郁皆屬於肺天有四時以生寒暑燥濕風火人有五臟五氣以生喜怒憂思悲恐怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結此九氣之為病也又曰喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽厥氣上行滿脈去形喜怒不節寒暑過度生乃不固故重陰必陽重陽必陰陽氣者煩勞則張精絕闢積於夏使人煎厥目盲不可以視耳閉不可以聞潰潰乎若壞都汨汨乎不可止陽氣大怒則形氣絕而血菀於上使人煎厥陽氣者精則養神柔則養筋開闔不得寒氣從之乃生大僂陷脈為痿留連肉腠一陽發病少氣善咳善泄其傳為心掣其傳為鬲因為氣為腫四維相代陽氣乃竭榮氣不從逆於肉裡乃生癰腫氣傷痛形傷腫先痛而後腫者氣傷形也先腫而後痛者形傷氣也清氣在下則生飧泄濁氣在上則生䐜脹九氣動為諸病張子和云九氣之氣如天地之氣常則安變則病而況人稟王地之氣五運迭侵於外七情交戰於中是以聖人嗇氣如持至寶庸人投物而反傷太和此軒岐所以謂諸痛皆因於氣百病皆生於氣遂有九氣不同之說氣本一也因所觸而為九怒喜悲恐寒炅驚思勞也怒則氣逆甚則嘔血及飧泄故氣逆上矣王太僕云怒則陽氣逆上而肝木乘脾故甚則嘔血及飧泄也喜則氣和志達榮衛通利故氣緩矣悲則心系急肺葉舉而上焦不通榮衛不散熱氣在中故氣消矣恐則精卻卻則上焦閉閉則氣逆逆則下焦脹故氣不行矣王太僕云恐則傷精卻上而不下流下焦陰氣亦反逆而不散故聚而脹也然上焦固禁下焦氣還故氣下行也寒則腠理閉氣不行故氣收矣王太僕云身涼則衛氣寒沉故皮膚文理及滲泄之處皆秘密而氣不流行衛氣收斂於中而不散炅則腠理開榮衛通汗大出故氣泄矣王太僕云人在陽則舒在陰則慘故熱則膚腠開發榮衛大通津液隨汗而泄也驚則心無所依神無所歸慮無所定故氣亂矣思則心有所存神有所歸正氣留而不行故氣結矣王太僕云繫心不散故氣亦停留勞則喘息汗出內外皆越故氣耗矣王太僕云疲勞役則氣奔速則陽氣外發故汗出內外皆逾越於常紀故氣耗損也此素問之論九氣其變甚詳其理甚明然論九氣所感之疾則略惟論嘔血及飧泄余皆不言惟靈樞論之盡矣怒氣所致為嘔血為飧泄為煎厥為薄厥為陽厥為胸滿脅痛食則氣逆而不下為喘渴煩心為消癉為肥氣為目暴盲耳暴閉筋緩發於外為癰疽喜氣所致為笑不休為毛革焦為肉病為陽氣不收甚則為狂悲氣所致為陰縮為筋孿為肌痹為肺痿男為數溲血女為血崩為酸鼻辛頞為目昏為少氣不能接息為泣則臂麻恐氣所致為破䐃脫肉為骨酸痿厥為暴下清水為面熱膚急為陰痿為懼而脫頤驚風所致為潮涎為目睘為口噤為癡癇為不省人事為僵仆久則為𤸷痹思氣所致為不眠為嗜臥為昏瞀為中痞三焦閉塞為咽嗌不利為膽痹嘔苦為筋痿為白淫為得後與氣快然而衰為不嗜食寒氣所致為上下所出水液澄澈清冷下利清白炅氣所致為喘嘔吐酸暴注下迫云云氣屬陽動為火原病式曰氣為陽而主輕微諸所動亂勞傷乃為陽火之化神狂氣亂而為病熱者多矣子和云河間治五志獨得言外之意凡見喜怒悲恐恩之證皆以平心火為主至於勞者傷於動動便屬陽驚者駭於心心便屬火二者亦以平心火為主今之醫者不達此旨遂有寒涼之謗脈訣有云冷生氣者高陽生之謬言也氣屬陽無寒之理自覺冷氣自下而上者非真冷也蓋上升之氣自肝而出中挾相火自下而出其熱為甚火極似水陽亢陰微也脈候內經曰粗大者陰不足陽有餘為熱中也長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少澀則心痛諸過者切之澀者陽氣有餘也滑者陰氣有餘也形盛脈細少氣不足以息者危形瘦脈大胸中多氣者死脈經曰脈滑者多血少氣澀者少血多氣大者氣血俱多脈來大而堅者氣血俱實浮而絕者氣闢大而滑中有短氣尺脈澀而堅為血實氣虛尺脈細而微血氣俱不足劉立之脈理玄要曰下手脈沉便知是氣沉極則伏澀弱難治其或沉滑氣兼痰飲治法凡七情九氣當以五行五志相勝治之內經治七情九氣之法皆以五行五志之理制而勝之深中病情之至治也如怒氣甚者以悲勝之以愴惻苦楚之言感之故曰悲可以治怒如喜氣甚者以迫劇死亡之言怖之故曰恐可以治喜如悲甚者以謔浪褻狎之言娛之故曰喜可以治悲如恐氣甚者以慮彼忘此之言奪之故曰思可以治恐如思氣甚者以汙辱欺罔之言觸之故曰怒可以治思寒可以治炅炅可以治寒勞以逸溫之驚以習平之故曰驚者平之平謂常平也夫驚者以惚然而逢之也使習見習聞則不驚矣此內經之治五志七情九氣深為詳切惟其詭譎詐怪或音樂或戲謔制而勝之此所謂治之之法也夫何今人不諳此理不效此法而惟以方藥治之與情志之病殊不相通縱以辛熱之藥愈增邪火誰之咎耶治氣毋用辛熱太過丹溪云治氣一門有曰治一切氣冷氣逆氣上氣用安息香丸丁沉丸大沉香丸紫蘇丸勻氣散如神丸集香丸煨姜丸鹽煎散七氣湯溫白丸生氣湯悉用熱藥夫天地周流於人之一身以為主者氣也陽往則陰來陰往則陽來一升一降無有窮也苟內不傷於七情外不感於六淫其為氣也何病之有今曰滯氣逆氣上氣皆是肺受火邪氣得上炎之化有升無降熏蒸清道甚而至於上焦不納中焦不化下焦不滲遂展轉傳變為嘔為吐為嗝為噎為痰為飲為反胃為吞酸夫治寒以熱治熱以寒此正治之法也治熱用熱治寒用寒此反佐之法也詳味前有既非正治又非反佐此愚之所以不能無疑也觀其微意可表者汗之可下者利之滯者導之郁者揚之熱者清之寒者溫之偏寒偏熱反佐而行之挾濕者淡以滲之挾虛者補以養之何嘗例用辛香燥熱之劑以火濟火實實虛虛咎將誰執辨氣無補法之誤丹溪曰氣無補法世俗之誤也氣實而壅盛者不必補內傷勞役正氣虛者不補而何若正氣虛而不補是虛而益虛則脾胃運化納受皆失其職陰不升而陽不降所謂天地不交之否也經曰虛者補之人參黃耆之屬是也不審虛實悉以破氣之藥與之以致天真元氣耗絕而死者醫殺之耳氣病當審何經分治玉機微義云夫氣疾之起種種不同經言九氣之變未嘗不詳如怒則氣上等證其言治法高者抑之下者舉之寒者熱之熱者寒之驚者平之勞者溫之結者散之喜者以恐勝之悲者以喜勝之九氣之治各有分別何嘗混作寒論而類以香熱之藥通言而治諸氣豈理之謂歟今七情傷氣鬱結不舒悶壅痞塞發為諸病詳所起之因滯於何經上下部分藏氣之不同隨經用藥有寒熱溫涼之異若概以耗氣之藥惟能卻氣之標而不能制氣之本豈可又佐以香燥之藥以火濟火混同謂治諸氣使之常服多服可乎原病式云上氣脈躁而喘者屬肺肺脹欲作風水發汗則愈氣虛卒倒參耆補之氣上逆而喘促面目帶浮腫胸中痞悶者舟車丸下之氣刺痛皆屬火當降火藥中加枳殼稟受素壯而氣刺痛加烏藥氣從左邊起者肝火也瀉青丸加青皮主之氣疾之人多因氣不歸元遂成氣中狀如中風仆倒昏迷牙關緊急只是無痰此為氣中不可誤用風藥及通關利腠等輩先以薑汁泡湯調蘇合香丸次用七氣湯大流氣飲加石菖蒲繼之順氣而蘇即以治中湯加木香以和其中使氣歸當道若更不能調則氣逆而厥又有變證氣滯者滯於胸膈則脹滿滯於手足則浮腫滯於腰間則墜痛而脹用異香散調氣散沉香降氣湯仍與保神丸浮腫用三和散生料五苓散或五皮散吞青木香丸局方流氣飲加赤茯苓枳殼腰痛降氣湯局方七氣湯調氣湯吞青娥丸氣嗝者陰陽不和中脘窒塞五嗝吐噫食不能下用五嗝寬中散劑七氣湯加木香砂仁間以紅丸子佐之水氣浮腫面目俱浮中滿痞塞枳殼散加南木香大流氣飲指迷七氣湯順氣木香散三和散五皮散加半夏茯苓氣鬱用香附蒼朮撫芎因事氣鬱不舒伸而痛者木香調達之逆氣在上者須用達之在中者須用調順在下者須用消導怒氣須用調肝經之藥如青皮芍藥柴胡桔梗枳殼木香之類有痰加半夏白芥子竹茹蘿蔔子七清憂結遂成鬱氣者難治必須自能醒戒服藥方可諸腹脹大須利小便兼理脾氣之藥不可輕用大戟芫花甘遂巴豆牽牛泄瀉耗其正氣則邪氣愈勝病必難治子和治一書生勞苦太過大便結燥咳逆上氣時喝喝然有聲唾嘔鮮血以苦劑解毒湯加木香漢防己煎服時時啜之復以木香檳榔丸瀉其逆氣不月餘而痊又治一婦人久思不眠子和令觸其怒婦果怒是夕困睡捷於影響喘息低仰其脈滑手足溫者生脈澀而四肢寒者死藥方枳殼利肺氣多服損胸中至高之氣青皮瀉肝氣多服損真氣木香調鬱氣行中下焦氣其味辛氣能上升若陰火衝上而用之則反助火邪矣故必用黃柏知母而少用木香佐之香附子能耗鬱氣快滯氣虛者不可多服陳皮能消痰氣泄逆氣厚朴瀉胃氣消脹滿紫蘇專散表氣開滯氣檳榔瀉至高之氣藿香快胃氣沉香升降真氣腦麝能散邪氣三稜莪朮能攻積塊氣通治氣劑和劑七氣湯治七氣所傷痰涎結聚心腹刺痛不能飲食人參一錢半夏曲三錢甘草炙一錢半肉桂五分上水二盞姜五片煎一盞食遠服三因七氣湯一名四七湯治七情九氣結滯成痰狀如破絮或如梅核在咽喉之間咯不出咽不下中脘痞滿氣不舒快或痰飲嘔逆噁心並皆治之半夏茯苓各二錢紫蘇葉厚朴姜炒各二錢上水二盞姜五片煎八分食遠服指迷七氣湯治七情相干陰陽不得升降氣道壅滯作痛宜服香附子制二錢藿香桔梗蓬朮青皮陳皮肉桂甘草各五分益智仁半夏制各一錢上水二盞姜五片煎八分食遠服和劑分心氣飲治一切諸留滯氣胸膈痞悶噎不通紫蘇半夏制枳殼炒各一錢青皮陳皮大腹皮桑白皮赤茯苓麥門冬南木香磨汁厚朴制各八分檳榔桔梗香附子藿香甘草各五分上水二盞姜三片棗二枚煎八分食遠服分氣紫蘇飲治氣促喘急腹脅疼痛陳皮桑白皮桔梗茯苓大腹皮五味子草果仁甘草炙各等分紫蘇葉二錢水煎加薑棗入鹽少許同服藿香正氣散方見寒門治諸氣鬱嘔吐頭疼發熱惡食不快和劑蘇子降氣湯治心腹脹滿喘促短急蘇子淨炒半夏曲前胡當歸陳皮厚朴制各八分桂去皮甘草各三分上咀水二盞姜三片煎七分不拘時服常服消痰飲散滯進食和劑木香流氣飲治諸氣痞塞胸膈膨脹面目浮腫四肢腫滿口苦咽乾大小便閉半夏厚朴白芷人參陳皮香附子各七分紫蘇青皮丁香木香磨汁莪朮白朮木瓜木通檳榔藿香麥門冬大腹皮草果仁各五分赤茯苓石菖蒲各六分肉桂三分上水二盞薑棗同煎稍熱服集成正氣天香湯治諸氣香附子二錢陳皮去白烏藥紫蘇各一錢乾薑甘草各三分上水盞半煎七分不拘時服流氣飲子治三焦氣壅五臟不和胸膈痞滿肩背攻痛嘔吐氣喘痰盛浮腫並皆治之木香磨汁檳榔青皮陳皮去白紫蘇枳殼去穰麩炒芍藥茯苓川芎當歸酒洗半夏制防風黃耆枳實麩炒大腹皮墨豆水洗烏藥甘草桔梗等分上水盞半姜三片棗一枚煎服五嗝寬中散治七氣留滯飲食不下胸膈氣脹通用方見嗝證門醫林小降氣湯治氣不升降上盛下虛痰涎壅盛家紫蘇天台烏藥白芍藥陳皮各二錢甘草炙五分上水盞半姜三片棗一枚煎七分食遠服心統治氣湯枳殼一錢青皮紫蘇半夏制茯苓各八分甘草四分上水盞半姜三片煎服氣鬱作痛加川芎香附厚朴食積氣痛加木香砂仁神麯胸膈飽悶加蘿蔔子香附犯寒痛加吳茱萸良薑附子氣鬱成大加黃連梔子發散氣劑蘇合香丸治一切鬱氣壅滯氣中不省人事方見中風門參蘇飲發散諸氣方見傷寒門紫沉通氣湯治三焦氣滯不能宣通腹脅脹滿便秘紫蘇葉枳殼陳皮赤茯芩甘草檳榔各一錢沉香木香磨汁各四分麥門冬五味子桑白皮黃耆乾生薑薄荷葉荊芥穗枳實麩炒各八分上水二盞煎八分空心溫服補氣諸劑東垣補中益氣湯治氣虛中滿不思飲食方見內傷門調中益氣湯治前證方見前濟生大藿香散治七情傷感氣鬱變成嘔吐或作寒熱痞滿不食藿香葉半夏曲人參白朮茯苓各一錢木香五分磨汁桔梗六分枇杷葉拭去毛十片官桂甘草炙各三分上水二盞加薑棗煎一盞溫服東垣升陽順氣湯治七情所傷及勞役飲食不節滿悶短氣人參一錢黃耆二錢陳皮半夏升麻柴胡當歸黃柏各七分草豆蔻四分神麯炒一錢甘草五分上水盞半姜三片棗一枚煎七分服恐則氣下者尤宜服之消導破氣劑發明分消導氣湯治氣痰壅盛二便不利桔梗枳殼麩炒厚朴薑製青皮香附子制茯苓半夏各八分栝蔞黃連桑白皮檳榔澤瀉川芎麥芽木通各五分甘草梢三分上水盞半姜三片煎七分服或用神麯為丸名分消丸異香散治胃氣不和胸腹膨脹飲食難化噫氣吞酸一切冷氣聚結刺痛並治京三稜炮蓬莪朮煨益智仁炒青皮陳皮厚朴各一錢甘草三分石蓮子八分上水二盞姜三片棗一枚鹽一捻同煎不拘時熱服沉香升降散治一切氣不升降脅肋刺痛胸膈痞塞沉香檳榔各二錢人參大腹皮洗訶子各五錢白朮烏藥香附子炒紫蘇葉厚朴薑汁炒神麯炒麥芽炒各一兩京三稜炮蓬莪朮煨益智仁各一兩陳皮去白薑黃甘草炒各四分上為細末每服二錢食前用沸湯調服楊氏三香王氣散治嘔吐清水胸膈壅滯心下堅痞厥氣刺痛木香丁香各三分香附子陳皮厚朴薑汁炒益智仁縮砂仁甘草各六分烏藥蓬莪朮乾薑炮各四分上水盞半姜三片棗一枚煎七分不拘時服溫氣調中劑局方鹽煎散治男子婦人一切冷氣攻上胸脅刺痛及脾胃虛寒嘔吐瀉泄膀胱小腸氣婦人血氣皆治砂仁甘草炙茯苓草果川芎小茴香炒肉豆蔻蓽澄茄良薑枳殼炒檳榔羌活蒼朮厚朴姜炒陳皮麥芽各等分上水盞半入鹽炒少許煎七分不拘時服勝金散治男婦五臟諸氣搶心切痛不語欲絕天台烏藥酒浸一兩或焙乾或微炒茴香青皮良薑各一兩上為細末每服二錢空心溫酒調服婦人薑湯童便調服直指白豆蔻散治七氣所傷滯於胸膈窒塞咽喉脹痛心下噫氣吞酸不能飲食白豆蔻砂仁各四分蓽澄茄丁香木香各二分香附子制青皮陳皮各八分桂三分厚朴薑製八分甘草三分上水二盞姜三片鹽一捻煎七分不拘時服溫中分氣丸治三焦氣不升降胸膈滿悶南星半夏制各一兩香附子二兩三味同煮薑汁半杯醋半盞水一盞煮乾白朮茯苓各半兩木香青皮陳皮良薑乾薑四味各一分醋半盞水一盞同煮乾上為細末酒打麵糊為丸梧桐子大每服三十丸無時薑湯下半夏湯治上氣嘔逆不能下食半夏制一錢陳皮白朮甘草炙各五分桂心四分人參厚朴姜炒二錢上水盞半姜五片棗三枚煎八分溫服壓氣散治上氣嘔逆疏利太過虛氣上攻短氣煩悶木香人參白茯苓藿香葉陳皮枳殼麩炒甘草炙各一兩附子一枚炮去皮臍上為細末每服二錢煎紫蘇木瓜生薑湯調入銀器內重湯煮五七沸溫服東垣木瓜順氣湯治濁氣在上則生腹脹方見脹滿門破氣攻下劑瑞竹木香檳榔丸疏利三焦胸膈滯氣逐飲破痰消食快氣木香檳榔青皮陳皮莪朮煨黃連枳殼各一兩當歸香附子黃柏大黃各三兩牽牛頭末四兩上為末滴水丸梧桐子大每服五十丸食後薑湯下和劑復元通氣散治氣不宣通腹脅刺痛或成瘡癤並閃挫腰脅作痛不散並治舶上茴香炒穿山甲蛤粉炒去粉各二兩玄胡索兩半白牽牛炒甘草炒陳皮去白一兩木香七錢上為末每服一錢熱酒調病在上食後服病在下食前服楊氏消脹丸快氣寬中除腹脹進飲食木香檳榔牽牛炒取頭末蘿蔔子炒研等分上為末滴水丸梧桐子大每服三十丸生薑湯下御藥分氣丸治胸膈氣痞化痰消食砂仁白豆蔻青皮陳皮京三稜炮蓬莪朮炮蓽澄茄蘿蔔子炒另研枳實麩炒木香各一兩黑牽牛炒取頭末二兩上為末麵糊丸梧桐子大每服七八十丸食後茶清送下三和丸治三焦不和氣不升降心胸痞悶脅肋刺痛枳實檳榔半夏制各二兩木香青皮陳皮丁皮赤茯苓蘿蔔子炒白朮各一兩半三稜煨四兩沉香藿香白豆蔻官桂各一兩牽牛取頭末半斤上為末酒糊丸梧桐子大食遠薑湯下四十丸搜風順氣丸治年高氣弱秘結及腳氣並治方見秘結門百一是齋推氣丸治三焦痞塞氣不升降胸膈脹滿大便秘結陳皮枳實檳榔大黃牽牛各等分上為末蜜丸梧桐子大每服五十丸溫水下湧劑治氣鬱痰鬱氣喘膈悶非吐不達則木鬱達之之意凡諸鬱氣最宜宣導稀涎散瓜蒂散並見中風門易簡諸方四磨飲治諸氣沉香烏藥枳實檳榔等分上四味白湯磨服橘皮一物湯治諸氣攻刺及感受風寒酒食所傷胸膈煩悶陳皮淨洗一味煎服屢效四制枳殼丸治諸氣逆上陳枳殼去穰一分茴香炒一分蒼朮炒一分乾漆炒一分蘿蔔子炒上將枳殼一味為末糊丸梧桐子大每服八十丸白湯下柱靈散治心氣大痛危急甚者良薑炒厚朴五靈脂淨者上為末每服一錢醋湯調下痛立止備急濟人世蓋不可缺也又方治氣不升降脈微欲絕用大附子一枚炮作二服水一盞煎水磨沉香汁臨熟時入藥內熱服一方治氣上壅赤小豆通草煮爛服當下氣無限一方治胸脅虛氣滿蘇子為末陳皮湯調下一方治走氣疼痛粟殼一兩蜜炒虎骨酥炙陳皮各五錢乳香沒藥甘草各二錢半為末每服三錢熱酒調下上疼者食後服下疼者食前服針灸法人中穴在鼻下針入三分治氣卒倒手足微溫胸微熱者可治出針捫穴合谷二穴在手大指食指之歧間治憂死無氣手足冷心腹溫目中神彩不轉口中無涎舌囊不縮用針刺入三分活兌骨二穴為少陽之源在掌後兌骨之端陷中是穴用長針口內溫方剌入三分徐徐出針捫其穴復甦下膿二穴在三里下二寸針入五分治暴驚欲下者其效速如神百會一穴在頂心治悲笑欲死四肢冷氣欲絕身口溫可針入中三分灸百會三壯即蘇氣海一穴在臍下一寸五分治卒厥逆氣上攻兩脅心下痛奄奄欲絕此為奔豚先以熱湯洗兩足浸良久灸百壯關元一穴在臍下三寸灸百壯治小腹冷氣痛甚漸入陰中
