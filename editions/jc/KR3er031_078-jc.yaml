body:
  text: 卷之七十八諸蟲門病機諸蟲敘論內經曰飲食自倍腸胃乃傷惟飲食不節朝傷暮損喜啖腥膾恣食生冷酷嗜麴櫱肥甘厚味以致臟腑自傷成積積久成蟲而諸般奇怪之狀各從五行之氣而化生矣經云人身中有八萬屍蟲若無即人身不成不立此屍蟲與人俱生而生者蓋屍蟲即會蟲是也凡人飲食五味具焉濕熱化焉此蟲即與飲食之糟粕轉化而有生故人身中之所必有也而亦不可絕無也經曰八萬亦過矣諸蟲為濕熱所生飲食之入於胃也非濕與熱則不能腐化化則蟲之隨以有其形而與糟粕俱出於大腸者也歷家月令曰腐草化為螢斯時也濕熱俱盛故腐即化人之飲食可以類推今夫飲食濕熱腐化而為蟲此固理之可有而不可多也惟其不節恣食厚味生冷則邪氣偏盛濕熱太過是以蟲生過多則為害故有腹痛食少嘔吐清水之病生而漸至於羸瘠而危者有矣蟲名大率有九外臺秘要云人腹中生蟲大率有九皆能食人臟腑一曰伏蟲長四寸許二曰蛔蟲長尺許生髮多則貫心而殺人三曰白蟲長寸許子母相生其形轉大而長至四五寸亦殺人四曰肉蟲狀如爛杏食人令人煩滿五曰肺蟲其狀如蠶令人咳嗽六曰胃蟲狀如蝦蟆令人吐嘔咳逆喜噦七曰弱蟲又名膈蟲狀如瓜瓣令人多睡八曰赤蟲狀如生肉令人腸鳴九曰蟯蟲其形至細如菜蟲伏居廣腸多則為痔劇則為癩因人瘡痍即生癰疽癬疥瘻瘑齲蝕無所不至為害匪細凡此諸蟲大則依附臟腑之間小則侵蝕肌膚之內若元氣尚實未為大害稍有虛損遂肆其害甚而至如勞瘵殺人而又傳疰怪如應聲螇鼠之類而非理之可測者有矣業醫者不可以不究其治之法也勞蟲為正氣不足邪氣所成夫勞而生蟲者由人久患血氣俱虛惟其虛火鬱蒸不退漸成骨蒸勞熱九蟲之類惟蛔蝟寸白三蟲不變六蟲既久邪氣變施則為癆瘵致成傳屍其曰蟲疰襲染至親曰屍疰曰鬼疰熱疰毒疰曰殗殜曰復連曰食疰皆曰傳屍甚則至於滅門者真可畏矣蘇遊論曰大抵傳屍之候其病在心胸脅滿悶背膊煩痛兩目昏花四肢無力雖欲寢臥睡而不寐脊膂急痛腰膝痠疼多臥少起狀如徜徉每日早旦精神尚存日午之後四肢發熱而無顏色或如火薰多煩多怒腳弱無力夜臥盜汗夢與鬼交驚悸咳嗽唇赤鼻乾漸就羸瘦其蟲既食病人精血以盡則骨痿不能起於床而死矣其蟲更傳親人傳之三人即自能飛其狀如禽如鱉如虺如蛇如蛀如蟹如鼠如嬰奇形怪狀不可盡迷傷寒熱甚生蟲名曰狐惑傷寒熱病腹中有熱人又食少腸胃空虛三蟲求食蝕人五臟及下部若齒無齦舌上盡白甚者唇里有瘡四肢沉重忽忽喜眠當數看其上唇內有瘡如粟此蟲在上蝕其臟也曰惑是也其下唇有瘡此蟲在下食其肛也曰狐是也今傷寒中有狐惑讓詳焉又曰濕蜃證皆蟲之為害也小兒疳蟲名曰疳䘌小兒疳䘌亦由飲食過傷致成疳積身熱腹大面鼓四肢無力昏睡鼻爛汁臭齒齦生疳或下利黑血皆腹中有蟲故也宜用追蟲丸之類脈候丹溪云䘌蝕陰證脈虛小者生急緊者死又云脈沉實者生虛大者死尺脈沉滑此寸白蟲也外臺云蟲脈當沉弱而弦今反洪大即知蛔蟲甚也治法有蟲當先下蟲積然後補虛凡病氣血雖虛有蟲有積者皆須用追蟲殺蟲等劑下去蟲積及宿澼痰飲酸腥除盡方可以服補藥不爾必不得功效丹溪倒倉之法義可推矣治蟲病要方法兼盡治蟲之方固多而用之者不知其法則亦不能下蟲而徒瀉其虛也如丹溪云蟲頭向下之時必須俟其向上法當行於月半之前也若蟲得食則不食藥亦不能下蟲而徒瀉其虛也故雖有方不知其法而方弗效也凡欲下蟲必先一日不食而使蟲飢次早五更用油煎肉嚼之良久腹內蟲聞肉香頭皆向上而欲食方以雞蛋煎餅和藥嚼而食之須臾服蔥湯或白水少少以助藥力下行不逾時而蟲俱下甚至數升然後以白粥補之隨服補劑調理胃氣斯充而諸疾悉愈五臟之蟲本事方云心蟲曰蛔脾蟲曰寸白腎蟲如寸截絲縷肝蟲如爛杏肺蟲如蠶皆能殺人惟肺蟲為急肺蟲居肺葉之內蝕人肺系故成瘵疾咯血聲嘶藥所不到治之為難有謂道藏中載諸蟲皆頭向下惟自初一至初五前頭上行故用藥者多取月胐以前蓋此也如療寸白用良方錫沙蕪荑檳榔者極佳五更服蟲盡下白粥將息藥用石榴根濃汁半升下散三錢丸五枚蛔蟲治法醫余曰蛔蟲九蟲之數人腹中皆有之小兒失乳而哺早或食甜過多胃虛而熱生蟲令人腹痛噁心口吐清水腹上青筋用火煨使君子與食以殼煎湯送下甚妙然世人多於臨臥服之又無日分多不驗唯月初四五里五更而服之至日午前蟲盡下可用溫平和胃藥調理一二日凡蟲在腹中月上旬頭向上中旬橫之下旬頭向下故中旬下旬用藥則不入蟲口所以不驗也牛馬之生子上旬生者行在母前中旬生者並肩而行下旬生者後隨之貓之食鼠亦然天地自然之理物皆由之而莫知之應聲蟲泊宅編永州通判廳軍員毛景得奇疾每語喉中必有物作聲相應有道人教令誦本草藥名至藍而默然遂取藍捩汁而飲之少頃吐出肉塊長一寸余人形悉具自後無聲陳正敏遯齋閒覽載楊勔勉中年得異疾每發言應答腹中有小聲效之數年間其聲浸大有道人見而驚曰此應聲蟲也久不治延及妻子宜讀本草遇蟲不應者當取服之勔如言讀至雷丸蟲無聲乃頓服之遂愈正敏後至長沙遇一丐者亦有是疾環而觀之甚眾因教使服雷丸丐者亦愈誤吐酒蟲丁志記齊州士曹席進孺招所親張彬秀才為館舍彬嗜酒每夜必置數升於床隅一夕忘設至夜半大渴求之不可得忿悶呼躁俄頃嘔吐一物於地旦起視之見床下肉塊如肝而黃上如蜂窠猶微動取酒沃之唧唧有聲始悟平生酒病根本亟投諸火中後遂不飲柳子厚罵屍蟲柳子厚罵屍蟲文云人皆有三尸蟲處之腹中伺隱微失誤輒籍記日庚申幸其人之昏睡出讒於帝以求饗以是人多謫過疾癘夭死而醫經亦云能與鬼靈相通常接引外邪為患害其發作之狀或沉沉默默不的知其所苦而無處不惡或腹痛脹急或磥塊湧起或攣引腰脊或精神雜錯症變多端其病大同而小異下寸白蟲庚志誌趙子山字景高寓居邵武軍天王寺苦寸白蟲為撓醫者戒云是疾當止酒向以素所躭嗜欲罷不能一夕醉於外舍歸已夜半口乾舌燥倉卒無湯飲適廊廡下有甕水月色下照瑩然可掬即酌而飲之其甘如飴連飲數酌乃就寢迨曉蟲出盈席覺心腹頓寬宿疾遂愈一家皆驚異驗其所由蓋寺僕日織草履浸紅藤根水也藥方丹溪云蟲方惟楝樹根檳榔鶴蝨夏取汁冬濃煎飲之下萬應丸最妙瀉心湯治惑苦參湯洗之治狐惑醫林木香三稜煎治腹中有蟲面色痿黃一切積滯黑牽牛半生半炒二兩三稜煨檳榔二兩雷丸錫灰醋炒莪朮煨木香青皮大黃各一兩上為細末每服三錢空心蜜湯調下或砂糖水化服亦可先嚼燒肉一片吐出了服藥寶鑑化蟲丸治大人小兒蟲病或因臟腑虛弱而動或因食肥甘而動其動則腹中疼痛發作積聚往來上下痛有休止亦攻心痛則哭不休閤眼仰身撲手心神悶亂嘔噦涎沫或吐清水四肢羸困面色青黃飲食雖進不生肌肉或寒或熱沉沉默默不的知病之處其蟲不療則子母相生無有休止若服此藥其蟲大者即下細者盡化為水鶴蝨檳榔苦楝根去浮皮胡粉炒各一兩白礬枯二錢半上為細末水糊丸麻子大空心米飲下十五丸小兒五丸醫林化蟲丸雷丸二粒檳榔二枚使君子七枚鶴蝨一錢輕粉少許上為末分二服當晚用精豬肉一兩切成片以皂角漿泡一宿至五更慢火炙熟用香油拭肉上候溫取一服藥擦肉上略烘過食之至巳時蟲下了乃進飲食寶鑑補金散治諸般蟲病鶴蝨生用雷丸澱粉錫灰上為末每服三錢空心白湯加油二三滴調下又用豬肉一兩炙熟摻藥在上細嚼亦可一方用甘遂末一錢同服蟲速下寶鑑雷金散治蟲病雷丸八分鬱金七分黑牽牛一錢半上為細末以生油調下二三匙吃飯壓之集效方丸治因臟腑虛弱多食肥甘致蛔蟲動作心腹㽲痛往來上下痛有休止腹中煩熱口吐涎沫則是蟲咬宜服此藥又療下部有蟲痔漏癢痛木香檳榔蕪荑炒研鶴蝨炒附子制乾薑炮訶子煨去核各七錢大黃炒兩半上為末煉蜜丸梧桐子大空心陳皮湯下三十丸婦人醋湯下烏梅丸治臟寒蛔蟲動作上入膈中煩悶嘔吐時發時止得食即嘔常自吐蛔有此證候謂之蛔厥此藥主之又治久痢烏梅三十枚黃柏炙細辛肉桂附子如法制人參各六錢乾薑炮一兩當歸四錢川椒去合口者四錢黃連一兩六錢上各搗篩以醋浸烏梅一宿去核蒸搗成泥余藥為細末和勻入蜜杵二千餘下丸梧桐子大每服二十丸食前米飲下萬應丸下諸蟲檳榔五兩大黃半斤黑醜四兩以上為細末皂角不蛀者十定苦楝根皮一斤上先以皂角苦楝皮二味用水二大碗熬成膏子一處搜和前三味為丸梧桐子大前用沉香末為衣後用雷丸木香為衣各約五六錢作末每服三丸四更時用砂糖水送下紫檳榔煎取寸白蟲紫檳榔十枚向陽石榴皮七片上銼水煎露一宿空心飲之以下蟲為度萬靈丸取蟲宣積黑牽牛一兩大腹子末七兩三稜泡五兩莪朮三兩雷丸炮南木香各五兩上為末皂角半斤去皮弦切碎用水二大碗浸一宿冬二宿去渣砂鍋熬膏待冷和藥每服三十丸約三四錢砂糖湯五更送下待取去蟲積了白粥補之忌生冷硬物貫眾酒治寸白蟲貫眾三錢煎酒一盞頭晚先煎備五更前嚼香肉一片勿吞下蟲聞肉香其頭向上吐出肉嚼使君子三枚煨熟者以輕粉一字調貫眾酒送下解毒雄黃丸七粒即瀉下寸白蟲酒蠟膏殺諸蟲醇酒一盞蜜一合白蠟三錢蜀漆一兩上於銅銚內慢火同熬可丸即丸彈子大每服一丸五更服遇仙丹追蟲逐積消澼利痰萬病可除四時宜間一服之妙檳榔牽牛末各一斤大黃半斤三稜莪朮各四兩醋煮木香二兩上為末皂角膏丸梧桐子大每服四十丸壯弱加減茶清五更初下如未通再吃溫茶助之下蟲積惡物盡了白粥補之妙應丸一名剪紅丸大黃檳榔牽牛頭末各三兩雷丸錫灰各半兩大戟三錢鶴蝨使君子煨茴香貫眾各二錢半輕粉少許苦楝根一兩上為細末用皂角膏丸服依前法琥珀萬安丸治男婦酒食諸蟲先服青木香丸見脹滿三四服若腫勢未退可服此檳榔四兩白醜頭末二兩黑醜同雷丸大黃貫眾各一兩蕪荑八錢沉香木香各半兩上為末每服四錢五更時先嚼生薑一片次用隔宿湯露一夜次早調藥服取下黃黑赤白蟲積病根直候日晡吃白粥補之或用水丸每服約四錢集成取蟲丸治小兒肚大青筋有蟲牽牛末三錢檳榔錫灰各半兩大黃六錢滴水丸捂桐子大楝根使君子湯下五丸以下蟲為度直指蕪荑散取諸蟲雞心檳榔三錢蕪荑二錢木香一錢上末作一服當晚先煎酸石榴根湯五更先嚼炙肉引蟲向上以石榴根湯溫暖調藥服蟲自軟而下本香檳榔丸殺下諸蟲檳榔一兩木香鶴蝨貫眾錫灰乾漆燒煙盡使君子肉半兩輕粉一錢雷丸巴豆肉各二錢半上為細末麵糊為丸麻子大每服二十丸五更粥飲下或菖蒲石榴煎湯下化蟲消毒丸腹中時痛者宜服檳榔酸榴皮根焙各一兩真紅丹炒雷丸貫眾如雞頭大者甘草炙使君子各二錢枳殼大黃各半兩上為末清油打薄雞子餅抄藥末一錢於上空心卷而食之小兒糯米糊丸粟米大每服二十七丸以雞汁空心吞下良方竹節丸治三蟲燒竹節雷丸各三錢錫灰二錢橘皮一錢上為細末煉蜜和丸梧桐子大每服八丸白湯送下日三服檳榔湯治三蟲並寸白蟲檳榔三個火煨過為粗末水三盞煎盞半去渣分三服空心日午近夜各一服其蟲盡下或和白鹽豉同煮飲之化寸自蟲為水方榧子檳榔蕪荑各等分上為細末每服二錢溫酒調服先燒牛肉脯食後服藥榧子煎治寸白蟲化為水榧子四十九枚去殼上以砂糖水半盞砂鍋煮乾熟食之每月上旬平旦空心服七枚七日服盡蟲化為水永瘥一方以百枚食盡佳不能食者盡五十枚經宿蟲消自下並治三尸聖效方治寸白蟲神效檳榔半兩南木香二錢上為細末每服三錢濃米飲調下五更空心先嚼炙肉只咽汁下咽吐出肉便服藥辰巳間蟲下盡去病根此方簡易屢驗活人治䘌桃仁湯治傷寒狐惑唇肉生瘡桃仁槐角子艾各半兩大棗十五枚水二盞半煎盞半分二服雄黃銳散治同前雄黃青葙子苦參黃連各一錢桃仁一枚上為末搗新艾汁和藥捻作小指大內穀道中消蟲食其肛也外臺茱萸根湯治癆熱內有白蟲食脾為病同前茱萸根東引者一錢大麻子八錢陳皮七分水煎服或下蟲或下黃汁凡合藥時禁聲勿語蟲覺弗效外臺五膈下氣丸治肺癆熱瘦損內有肺蟲在肺為病令人空逆氣喘或謂憂忿氣隔寒熱皆從勞之所生名曰膏盲疾針灸不著麥門冬五兩川椒炒出汗一兩遠志附子乾生薑甘草細辛各半兩桂心二錢人參黃耆白朮百部各七錢杏仁二十四粒上為末煉蜜丸彈子大每服一丸徐徐噙化忌豬肉雀肉桃李冷水菘菜生蔥等物外臺千金散治腎勞熱四肢腫燒蟲生於腎中為病貫眾三兩炒乾漆二兩炒煙盡蕪荑胡粉槐白皮各一兩吳茱萸五十粒杏仁四十五粒上為細末平旦汲井花水調服方寸匕外臺三聖飲子治勞熱生蟲在肺為病茱萸根東引者五兩桑白皮一升狼芽子三兩上咀以酒七升煮取一升半平旦服盡外臺五鳳丸治肝勞熱蟲在肝為病令人恐畏不安烏雞卵五枚去黃茱萸根東引者二升黃蠟三兩乾漆四兩炒煙盡粳米粉半斤上以茱萸根乾漆為細末和銅銚中溶臘丸小豆大隔宿勿食清晨米飲下一百丸小兒五十丸蟲盡爛外臺雷公丸治心勞發熱心有長蟲名曰蠱蟲長一尺許貫心即死雷丸炒五枚陳皮桃仁各一兩二乾漆一兩燒煙盡殭蠶炒十四枚亂髮一彈丸瓶內燒存性貫眾無荑青葙子各一兩上為末煉蜜丸小豆大空心溫酒下二十丸日二服外臺苦楝湯治蛔蟲苦楝根東引不出土者刮去皮土取內白皮二兩水三碗煎一碗半去渣以晚米三合煮糜粥空心先以炙肉一片嚼之引蟲向上次吃藥粥一二口少頃又吃些漸漸加至一碗其蟲下盡而愈正傳經驗檳榔丸治大人小兒疳病積氣塊痛腹大有蟲等症三稜醋炒莪朮醋炒青皮炒陳皮雷丸乾漆炒煙盡麥芽炒神麯炒黃色各半兩檳榔一兩蕪荑二錢半鶴蝨木香砂仁炙甘草胡黃連炒各三錢良薑土炒二錢上為細末醋米糊丸梧桐子大每服三四十丸空心薑湯下今方中加使君子五錢尤妙青囊取傳屍蟲鬼哭飲子天靈蓋酥炙黃色鱉甲醋炙黃色柴胡二錢半木香一錢二分桃仁二十一枚另研鼓心醋炙黃青蒿半握阿魏一錢貫眾二錢半安息香甘草各一錢上咀杵為粗末先以童便二升隔夜浸露至四更時煎至八分去渣分作三服每服調後散子一帖五更初溫服即穩臥至三點時又進一服至日出時覺腹中欲利如未利又進一服已利勿服散子方用檳榔二錢半辰砂一錢二分麝香一錢另研蜈蚣一條薑汁浸烏雞屎先將雞五日前用火麻子喂之五日後則用其糞為細末分作三帖各入前煎湯內服凡合上藥擇六甲建日除日合之服後利下惡物並蟲其最奇怪者則必傳疰後人必置之烈火或油煎之以絕後患青囊經驗天靈蓋散取傅屍勞蟲天靈蓋二指大用白檀香煎湯洗酥油炙黃色用檳榔五枚阿魏二錢辰砂一錢另研麝香一錢另研甘遂二錢安息香三分上七味各碾極細和勻每服三錢後湯調下韭白十個莖青蒿二握甘草五寸蔥白十四寸桃枝柳枝桑枝梅枝酸石榴枝以上俱向東南者各七寸上用童便於砂鍋內文武火煎至一升去渣分作三盞調前末藥五更初服一盞服後如覺欲吐以白梅肉止之五更盡覺臟腑鳴須轉下蟲及惡物黃水若一服未下如人行五七里又進一服至天明又進一服如瀉不止用龍骨黃連等分為末熟水調下五錢或吃白粥補之此藥男病女煎女病男煎不可令病人知及孝人僧人雞犬見青囊取屍蟲神仙秘方桃枝梅枝酸石榴枝柳枝桑枝皆東向者各七寸青蒿一握蔥白七莖阿魏一錢另研安息香一錢另研上除阿魏息香二味外余用童便一升半煎七分將藥汁入阿魏息香再煎十沸分二服調辰砂末檳榔末各半兩麝香少許上三味亦分二服入前湯五更初進一服三點時又進一服至巳午必取下蟲其嘴紅者可治青黑者不可治但可絕後人傳疰調理禁忌俱要依前法青囊神授散此方得之於河南郡王府濟世既久功不可述川椒二斤去合口者略炒出汗上為細末空心米湯調服二錢或酒米粉糊為丸梧桐子大每服三十丸漸增五六十丸如前服或酒送凡人得傳屍癆病血氣未甚虛損者不必多方只以此藥早服無有不愈者一方用花椒二分苦楝根一分丸服如法空心服巳刻蟲盡下青囊秘傳取勞蟲禁方啄木禽一隻用硃砂四兩精豬肉四兩將肉切作片子其硃砂杵如綠豆大塊二味拌勻喂禽一晝夜食肉盡為度將鹽泥固濟其禽在內剛火煅一夜來日不見太陽取出不得打破埋入地中二尺許一晝夜取出去鹽泥石器內研為細末以無灰酒入麝香少許作一服調下置患者在帳中四下緊閉用鐵箝等候其蟲必從口鼻中出即以箝入油鍋中煎殺之蟲出之後用參苓白朮散方見瀉泄門調養之青囊去三尸九蟲貫眾丸貫眾能殺伏屍諸蟲五分白雚蘆能殺屍蟲二分乾漆煅無煙能殺寸白蟲厚朴殺肺蟲各三分狼芽子殺蟲殭蠶殺膈蟲雷丸殺膈蟲各四分雄黃殺屍蟲三分上炒令黃色為細末煉蜜丸梧桐子大新汲水下五丸三服後漸加至十丸服之二十日百病皆愈三尸九蟲盡滅並無傳疰青囊釣蟲丸磁石極紫吸鐵者兩半膩粉另研龍骨各半兩硇砂麝香各一錢上溶蠟丸芡實子大每服一丸針穿藥青紅線貫之梢頭系一大錢早晨令病人面東正坐溫水吞下候藥下咽喉中合口以牙咬定古錢等候噁心便吐出其蟲不一急以沸油煎之如無蟲出若得血絲與綿涎一二合皆是安證更服理中和氣之藥調養數日痊其治過藥用溫水洗淨尚可再治青囊追屍蟲白兔丸白兔糞中秋夜取四十丸硇砂五分上為細末煉蜜丸梧桐子大每服七丸甘草五錢生槌碎水一盞揉取濃汁若患人瘦弱即用炙過甘草五更空心服預戒患人不得心躁冷服不妨小瘥兩日再服下蟲藥一次為妙雄黃丸殺三尸九蟲雄黃松脂各一兩另研上溶松脂入雄丸如蓮子大平旦吞一丸服七日三尸盡去梅師方治蛔蟲攻心腹痛龍膽草一兩去頭切上水二盞煎一盞平旦頓服隔宿不可食物次早服藥為妙葛氏方生艾搗取汁一升許先隔宿不可食次早平旦取香脯嚼咽津然後飲艾汁少刻下蟲易簡諸方一方雷丸水泡軟去皮切焙乾為末每服一錢飲湯調先嚼肉後服藥一方金櫻子東行根銼二兩糯米三十粒水二升煎五合空心服須臾瀉下一方鶴蝨草三兩為末蜜丸梧桐子大平旦服二十丸即瘥一方治一切諸蟲雞子二枚麻油一合芒硝一兩和勻煎餅食之即下一方治臟腑有蟲心腹脹滿不能食羊肝煮熟蒜韭如常煮空心食之一二升少頃下蟲寸寸皆是不復作口內生瘡服之亦愈一方治胸膈間覺有蟲上下聞蔥豉則動作此是發蟲可用油炒蔥豉令香先一日不食將蔥豉含口中漸退口外邊蟲聞香漸出隨而嘔之出又方黑牽牛取頭末每用三錢空心以豬肉四兩切薄片炙熟摻藥末於上盡食之其蟲俱下又方用檳榔末三錢蔥湯調下空心頓服一方治脾胃有蟲食即痛面黃無色痛作無時用蕪荑二兩和麵炒黃為末空心米飲調下二錢
