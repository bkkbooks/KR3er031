body:
  text: 卷之七十三便癃證即小水不通病機便癃敘論內經曰胞移熱於膀胱則癮溺血膀胱不利則癮不約為遺溺注曰膀胱為津液之府水注由之然足三焦脈實約下焦而不通則不得小便足三焦脈虛不約下焦則遺溺也靈樞經曰足三焦者太陽之別也並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺丹溪曰小便閉有氣虛有血虛有痰有實熱有濕有氣結其有痰氣閉塞皆宜吐以提其氣氣升則水自降蓋氣乘載其水也譬如滴水之器必上竅通而下竅之水出氣不利故不通經曰膀胱者州都之官津液藏焉氣化則能出矣又經小腸為氣化氣不化故不通也小便癃閉之病多因熱邪易老云寒在胸中遏塞不入熱在下焦填塞不便須用感北方寒水之化氣味俱陰之藥以除其熱泄其閉塞內經云無陽則陰無以生無陰則陽無以化若服淡滲之藥其性乃陽中之陰非純陽之劑陽無以化何以補重陰之不足也須用感地之水運而生火苦之味感天之寒氣而生大寒之藥此氣味俱和乃陰中之陰也大寒之氣人感之生膀胱寒水之運此藥能補腎與膀胱受陽中之陽熱火之邪而閉其下焦使小便不通也夫用大苦寒之藥治法當寒因熱用必伏其所主而先其所因其始則同其終則異脈候同淋濁門相參看大抵小便不通脈多澀數治法治小便不通須知理氣丹溪附錄云腎主水膀胱為之府水瀦於膀胱而泄於小腸實相通也然則小腸獨應於心者何哉蓋陰不可以無陽水不可以無火水火既濟上下相交此榮衛所以流行而水竇開闔所以不失其司耳惟夫心腎不濟陰陽不調故內外關格而水道澀傳送失度而水道滑熱則不通冷則不禁其熱盛者小便閉而絕無其熱微者小便難而僅有腎與膀胱俱虛客熱乘之故不能制水水挾熱而行澀是以數起而溺有餘瀝腎與膀胱俱冷內氣不充故胞中自滑所出多而色白為是以遇夜陰盛愈多矣小便澀滑又當調適其氣與便癃氣閉當用吐法氣虛用升麻參耆等先服後吐或參耆藥中探吐之血虛用四物湯先服後吐或芎歸湯中探吐之亦可痰多用二陳先服後吐若痰氣閉塞二陳湯加木通香附探吐之以提其氣實熱者當利之先砂糖湯調牽牛末二三分或山梔之類有熱有濕有氣結於下宜清宜燥宜升有妊之婦多患小便不通胞被胎壓下故也轉胞論用四物湯加參朮半夏陳皮甘草薑棗煎湯空心服一婦人脾痛後患大小便不通此是痰隔中焦氣滯於下焦以二陳湯加木通初吃後煎渣服即探吐集成云實熱者利之宜用八正散大便動則小便自通因熱鬱不通者用赤茯苓黃芩澤瀉車前子麥門冬滑石木通甘草梢氣加木香黃耆淋痛加黃柏生地黃夏月調益元散氣血兩虛八物湯加黃柏知母東垣治一人病小便不利目睛突出腹脹如鼓膝以上堅硬皮膚欲裂飲食不下服甘淡滲泄之藥皆不效予曰疾急矣非精思不能處思半夜曰吾得之矣經曰膀胱者津液之腑必氣化而能出焉多服滲利之藥而痛益甚是氣不化也啟玄子云無陽則陰無以生無陰則陽無以化甘淡氣薄皆陽藥獨陽無陰欲化得乎遂以滋腎丸群陰之劑投之再服愈丹溪治一妊婦小便不通脈細弱乃氣血虛弱胎壓膀胱下口用補藥升起誠恐效遲反加急滿令穩婆以香油抹手入產門托起其胎溺出如注卻以參耆升麻大劑服之或少有急滿如前再托纂要云將妊婦倒豎起胎自運其溺濺出勝於手托遠矣又治大小便不通醫用利藥反劇脈右手弦滑此積痰在肺肺為上焦膀胱為下焦上焦閉則下焦塞如滴水之器上竅通而下竅之水出以藥大吐之病如失一法治小便不通諸藥不效或轉至死危困此法用之小便自出而愈用豬尿胞一個底頭出個小竅兒著翎筒通過放在竅內根底用細線扎定口細杖子堵定上用黃臘封尿胞口頭吹滿氣七分系定了再用手捻定翎筒根頭放了黃蠟堵塞其翎筒放在小便頭放開翎筒根頭手捻其氣透里自然小便即出大有神效藥方膚肺飲子治渴而小便閉熱在氣分也滋腎丸治不渴而小便閉熱在血分也八正散治實熱小便不通以上方並見淋證門東垣導氣除濕湯治小便癃閉不通乃血澀致氣不運而竅澀也茯苓滑石各一錢知母酒浸炒澤瀉各一錢半黃柏二錢酒炒上水二盞煎一盞空心稍熱服茯苓湯治胃疸陽明積熱食已輒飢面色黃瘦胸脅脹小便澀赤茯苓陳皮澤瀉桑白皮各二分赤芍藥白朮人參官桂各二分石膏八分痛甚者加大黃朴硝各一錢上水二盞姜五片煎一盞食前溫服河間倒換散無問新久癃閉大小便不通小腹急痛肛門腫大黃小便不通減半用荊芥穗大便不通減半用上各等分別研為細末每服二錢溫水調下臨時加減服葵子散治小便不通黃蜀葵子研細赤茯苓各二錢水一盞煎五七沸食前服局方牛膝膏治小便癃牛膝細切一合以新汲水煎五碗煎至一碗入麝少許空心服外臺廣濟雞蘇飲子治小便不通雞蘇一握生地黃白通草各四兩淨滑石杏仁去皮尖各二兩冬葵子一兩半好石葦炙去毛一兩上咀水六升煎二升半分二服空心一服過少時又進一服必通葵子茅根湯治同前冬葵子滑石各三兩通草赤茯苓各一兩茅根二兩半芒硝一兩半每服半兩水煎空心服石葦散集驗方通治小便閉癮不利作痛方並見淋證門蔥白湯治小便卒暴不通小腹脹急氣上衝心悶絕欲死此由暴氣乘膀胱或驚憂無所伸鬱閉迫沖脬氣致此陳皮三兩葵子一兩每服半兩蔥白三莖水煎服琥珀散治氣虛小便不通琥珀一味為末用人參萱草根空心煎湯調下二錢附子散治小便不通兩尺脈俱沉微乃陰虛故也曾服通利之藥不效者宜服此附子制一個澤瀉一兩上咀分四服每服水二盞燈心二十莖煎八分食遠服易簡諸方道藏經方治小便不通用烏桕木皮煎湯調下五苓散二錢空心服立通如無藥處只以柏皮煎湯服可一方筆頭灰年久者主治小便不通小便數陰腫中惡脫肛淋瀝燒灰水調服一方小便不通車前草搗汁一盞入蜜一杯和空心服立效經驗方治小便不通朴硝為末每服二錢空心煎茴香湯下一方以萵苣菜搗如泥貼臍或用鹽填臍中灸一方用蚯蚓杵以涼水濾過濃服半碗立通大解熱疾不知人事欲死服之甚效一方治小腹脹滿痛不得小便用雄黃細研蜜丸如棗放納溺孔中及療天行時病一方用酸草搗汁一盞入砂糖水調服一方用蔥三斤慢火炒香熟熨臍下即通或用鹽炒熱帛包熨冷即易之須臾通一方治卒不得小便杏仁二七枚去皮尖炒黃米飲服之立效一方治小便不通雞卵黃一枚服之不過三次愈一方治小便閉用豬膽汁納熱酒中服之亦治大便秘一方治小便不通生煎象牙末小便多象牙末燒灰服飲湯下一方治小便難腹脹滿不急療之即死用秦艽一兩去苗以水一大盞煎七分服食後分二服一方治小便不通及胞轉取粱上塵二指撮以水服之遺溺證附小便不禁病機遺溺敘論內經曰膀胱不約為遺溺又曰督脈生病為遺溺又云肝脈生病亦遺溺二經循陰器系廷孔病則榮衛不至氣血虛勞不能約束水道之竅故遺失不禁也玉機微義云遺溺為病本於經虛亦有過服寒涼之劑而致者如東垣曰立夏前誤服白虎湯過多致遺溺者宜溫藥升陽以解之是也故用藥者當審誅罰無過之戒董氏云人之漩溺藉心腎二氣之所傳送蓋心與小腸為表裡腎與膀胱為表裡若心腎氣衰陽道不運則傳送失度必有遺溺失禁之患故經云膀胱不利為癃不約為遺溺是也遺溺為三焦不足之病三焦氣虛皆足以致遺溺肺從上焦通調水道下輸膀胱腎上連肺故兩臟更是子母臟也母虛子亦虛肺屬金腎與膀胱屬水所以金乃水之源膀胱乃滲泄之腑腎者主之此則三焦不足可知矣遺溺與小使不禁略有分辨遺者如睡中遺出而不自知日間遺出而方知也不禁者時常欲解而不能自禁止也由是皆為虛候而病機莫不皆同但不禁者為少差而遺溺者猶甚也脈候傷寒論脈法曰寸口脈微而澀微者胃氣不行澀者榮氣不足榮衛不能調則三焦無所伸而歸其部上焦不歸噯氣吞酸中焦不歸不能消穀下焦不歸則遺溺失禁也左尺脈微澀主遺溺尺脈懸絕者不治治法治遺溺以補榮衛為主遺溺不禁為陰陽不調水火不濟必先用補中益氣以治本調榮衛者此也後用秘元丹以治標拾遺者此也若不先調榮衛而俾其正氣衝和運用各行其道據以澀藥收之而暫息隨作未見其能奏功也故曰調和榮衛為主治本之謂也補血瀉火節齋云小便不禁或頻數古方多以為寒而用溫澀之藥殊不知屬熱者為多蓋膀胱火邪妄動水不得寧故不能禁而頻數來也故老人多頻數者是膀胱血少陽火偏旺也治宜補膀胱陰血瀉火邪為主而佐以收澀之劑如牡蠣山茱萸五味之類不可用溫藥也病本屬熱故宜瀉火因水不足故火動而致小便多小便多水益虛矣故宜補血瀉火治其本也收之澀之治其標也治遺溺要審虛熱虛寒或曰小便不禁有虛熱虛寒之分虛寒自汗者秘元丹三因韭子丸大菟絲子丸豬胞煎湯下內虛濕熱者六味地黃丸或八味丸加杜仲石脂五味減澤瀉大抵遺溺宜補下元必是清心寡慾又有產蓐不順致傷膀胱及小兒胞冷皆有遺溺失禁當隨證施治藥方縮泉丸治脬氣不足小便頻數天台烏藥去木益智仁各等分上末酒山藥糊丸梧桐子大每服五十丸空心鹽湯或酒下三因家韭子丸治少長遺尿不禁白濁夢遺精滑補元氣進飲食家韭子炒鹿茸酥炙四兩半肉蓯蓉酒浸牛膝酒浸熟地黃當歸酒浸菟絲子制各二兩巴戟天去心杜仲炒石斛桂心乾薑各一兩上末酒糊丸梧桐子大每服五十丸空心鹽湯或酒下御藥秘元丹治腎虛脫氣小便不禁自汗時出龍骨三兩訶子肉砂仁各一兩靈砂二兩上為細末煮糯米糊丸梧桐子大每服五十丸空心鹽湯下三因二苓丸治心腎俱虛神志不守小便不禁赤茯苓白茯苓另研人參另研丹參另研各等分上末先將二茯苓以新汲水挼洗澄去新沫控干復研末別取地黃汁與好酒同於銀石器內熬成膏搜和丸彈子大硃砂為衣每服一丸細嚼空心鹽酒送下雞腸散治腎中膀胱虛損不能約制故遺尿失禁肉桂龍骨各錢半雞腸燒存性牡蠣粉白茯苓桑螵蛸各三錢上咀作二服每服水二盞姜三片棗一枚煎八分空心溫服雞內金散治遺尿失禁雞䏶胵一具並腸洗淨焙乾燒存性男用雌雞女用雄雞為末作一服空心溫酒調下一方用豬脬一個燒存性為末加入前藥內服效桑螵蛸散治遺尿失禁方見濁門阿膠飲治遺失不禁阿膠三兩炒牡蠣炒成灰鹿茸酥炙各四兩上咀每服四錢水一盞煎七分空心服或為細末米飲調服二錢亦可一方加桑螵蛸作丸服極效集要四神丸治稟賦虛弱小便頻數不禁五味子四兩熟地黃六兩肉蓯蓉一斤免絲子餅二兩上末酒煮山藥糊丸梧桐子大每服五十丸空心鹽湯下白芷丸治夜多小便老人虛人多有此症白芷一兩糯米半兩炒黑色上末糯米糊丸梧桐子大每服五十丸用木饅頭或根煎湯下濟生菟絲子丸治小便多或致失禁菟絲子制二兩牡蠣粉附子制五味子鹿茸酒製各一錢肉蓯蓉酒浸一兩雞䏶胵炙桑螵蛸酒炙二兩上末酒糊丸如梧桐子大每服七十丸空心鹽湯酒任下和劑二氣丹治虛寒積冷小便不禁老人虛人尺脈微弱者有此硫黃炙細研肉桂各二錢半乾薑炮為末硃砂研為衣各二錢附子制半兩上以麵糊丸梧桐子大每服二十丸空心鹽湯下固脬丸治遺尿不覺小便不禁菟絲子制二兩茴香一兩附子制桑螵蛸炙各半兩戎鹽一錢上末酒煮麵糊丸每服三十丸空心米飲下牡蠣丸治小便不禁牡蠣三兩盛瓷器盒子內更用鹽末一兩蓋頭鋪底以炭火約五斤燒半日取出研赤石脂三兩搗碎醋拌勻濕於生鐵銚子內慢火炒令乾研如粉上同碾勻酒煮糊丸如梧桐子大每服五十丸空心鹽湯下雞肝丸治小兒睡中遺尿不自覺雄雞肝桂心各等分上以桂末同肝搗爛如泥丸小豆大每服十丸酒送日三服暖腎丸治腎虛多溺不禁而濁葫蘆巴破故紙炒川楝子用牡蠣粉同炒去牡蠣熟地黃益智鹿茸山茱萸肉代赭石醋淬七次赤石脂各七錢半龍骨海螵蛸熟艾醋糊拌丁香沉香乳香各半兩禹餘糧醋淬八錢上為末糯米粥糊丸梧桐子大每服五十丸空心菖蒲湯下小菟絲子丸治小便多而不禁菟絲子五兩石蓮子白茯苓山藥五味子各一兩上末山藥糊丸梧桐子大每服五十丸酒下凡人有大喜致小便多無度乃喜極傷心心與小腸為表裡宜用分清飲四七湯各半煎服仍以辰砂妙香散吞下菟絲子丸心統茴香益智丸治老人陽虛失禁及房勞傷腎遺溺小茴香鹽炒益智仁炒故紙炒烏藥川烏炮各一兩上末山藥糊丸梧桐子大每服八十丸鹽湯下易簡諸方千金方治遺尿用羊脬一個盛水令滿系兩頭煮熟開取兩頭服之愈一方治遺尿失禁以茯苓四兩為末白麵一斤水和捏作餅燒熟空心食之效一方用小茴香淨一錢入花椒五七粒鹽少許同炒為末臨晚炙糯米果蘸藥末食之當晚飯吃溫酒數杯送為妙一方用豬脬一個以糯米浸洗白淨入椒鹽於內煮爛切碎食蘸茴香末吃以好酒送下空心臨臥各吃一服當飯為妙一方用鹿角霜一味酒糊丸每服五十丸空心酒下腎虛不禁者用之神效一方治小便多或不禁用雞喉嚨及䏶胵內黃皮燒為末大麥飲調服之效一方治小兒睡遺尿不覺用燕窩中草燒黑為末水調方寸匕一方用益智一兩半酒一盞煎七分去滓服一方用白紙一張鋪在睡席下待遺尿於上日乾燒存性酒下一方用烏藥為末二錢酒調下日二服一方用薔薇根細研好酒調服附轉脬病治案夫轉脬病多得於孕婦及勞力負重委曲作事之人治法多用吐法使其氣正而後愈丹溪治一婦人轉脬小便閉不通孕婦稟受弱憂悶多性急燥食味厚皆能致之古方用清利疏導藥解有效因思胞為胎所壓展在一邊胞系了戾不通若胎得疏水道自行以八珍湯加陳皮半夏加姜煎服探吐之遂通此恐偶中後治數人皆效藥方一方治孕婦轉脬小便不通及男子轉脬皆效冬葵子山梔子各半兩炒研木通三錢滑石半兩上作一服水盞半煎八分溫服外以冬葵子滑石梔子末調用螺肉搗膏或生蔥汁調貼臍中立通補脬飲治婦人生產傷脾損破不能小便但漏濕不幹宜服黃絲絹一尺剪碎白牡丹皮白芨末各一錢上用水一碗煮至絹爛如餳空心頓服一時不可作聲發灰散治婦人轉脬不尿及血淋莖衄亂髮不拘多少燒灰存性為末每服二錢醋點湯調下交腸病交腸為大小便易位而出故曰交腸或曰因氣不循故道所以清濁混淆宜五苓散調氣散各一錢阿膠五分湯下或黃連木香阿膠末亦用前藥送下調氣散白豆蔻丁香檀香木香各一兩藿香甘草各四兩桃仁二兩上為末二錢湯下五苓散見濕門黃連阿膠丸治二便交錯阿膠二兩黃連三兩茯苓二兩上為末阿膠丸梧桐子大米飲下二十丸丹溪治一人嗜酒痛飲不醉忽糟粕出前竅尿溺出後竅脈沉澀與四物湯加海金沙木香檳榔木通桃仁八帖而安又治一婦人患此破漆帽燒灰米飲下愈
