body:
  text: 卷之十五中寒門病機敘論經曰冬三月此謂閉臟水冰地坼無擾乎陽早臥晚起必待日光使志若伏若匿若有私意若已有得去寒就溫無泄皮膚使氣亟奪此冬氣之應養臟之道也逆之即傷腎春為痿厥奉生者少又曰陽虛生外寒者陽受氣於上焦以溫皮膚分肉之間今寒氣在外上焦不通上焦不通則寒氣獨留於外故寒慄陰盛生內寒者因厥氣上逆寒氣積於胸中而不泄不泄則溫氣去寒獨留留則血凝血凝則脈不通其脈盛大以澀故中寒又曰寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒然而痛因重中於寒則痛久矣寒氣客於脈外則脈寒脈寒則縮蜷縮蜷則脈絀急絀急則外引小絡故卒然而痛得熱則痛立止寒氣上及小腹血泣在下相引故腹痛引陰股寒氣客於小腸膜原之間絡血之中血泣不得注於大經血氣積留不得行故宿昔而成積寒氣客於五臟厥逆上出陰氣竭陽氣未入故卒然痛死不知人氣得復反則生矣寒氣客於腸胃厥逆上出故痛而嘔也寒氣客於小腸小腸不得成聚故後泄腹痛原病式曰諸病上下所出水液澄澈清冷下利清白吐利腥穢食已不飢堅痞腹滿急痛癥瘕癲疝屈伸不便厥逆禁固皆屬於寒中寒本元氣太虛中寒候世俗所謂陰證傷寒悉以房中受寒傷冷而歸患家患家本無房事堅不肯認陰證中寒之劑固拒不肯服惟任他證處之則樂從之嗚呼每每誤死者不可勝紀殊不知中寒之候先由五臟不足元氣太虛寒邪冒中直入陰經而為中寒之候即為陰證是也拘於房室豈不誤哉中寒與傷寒不同玉機微義云中寒則倉卒受病邪氣直入於三陰急痛拘攣戰慄強直昏迷厥冷口噤失音此中寒也以溫中散寒為主傷寒之人因其舊有鬱熱風寒外來肌腠自密鬱而為熱寒邪客於經絡先頭痛身熱惡寒此傷寒也當以仲景例治之中寒候絕無發熱之證中寒候因寒邪乘其膚腠疏豁直入腎經不循經絡無熱可發故卒暴厥冷口噤腹痛唇青昏危如中風之狀若治稍緩則必死矣脈候脈經曰遲緊為寒遲澀沉細為寒脈堅弦或沉細皆中寒也中寒脈散者死尺脈遲滯寒在下焦治法中寒誤作中風治者必死寒中三陰一時暴卒昏不知人口噤失音四肢強直攣急疼痛亦似中風若以風藥治之即死急以附子理中湯若厥逆唇青囊縮無脈者用蔥熨法仍灸氣海關元二三十壯脈漸出手足漸溫乃可生也寒中三陰治法各異寒中太陰則中脘疼痛治宜理中湯寒中少陰則臍腹疼痛治宜五積散加茱萸寒中厥陰則少腹疼痛治宜四逆湯加茱萸倍加附子溫中要兼溫血溫腎禦寒如乾薑附子川烏天雄輩佐之以養正靈砂丹然寒傷榮血徒知溫腎不知溫血恐未必有十全之功是則官桂當歸為溫血之上藥也韓祗和溫中深得中寒之旨韓氏著三陰經方立溫中例雖不言中寒而深得中寒之旨所以有急用薑附溫中救里之法大有見焉藥方附子理中湯治五臟中寒口噤強直失音不語手足厥冷熟附子人參乾薑炮白朮炙甘草各一錢上咀水盞半煎八分口噤者灌之韓氏溫中湯凡病人兩手脈沉遲或緊皆是胃中寒也若寸脈短少及力少於關尺者此陰盛陽虛也或胸膈滿悶腹中脹滿身體拘急手足厥冷急溫之丁皮丁香各五分厚朴乾薑陳皮白朮各一錢上水盞半蔥白荊芥穗同煎良方薑桂散溫中散寒乾薑良薑各錢半辣桂木香半夏曲甘草各一錢上水二盞姜五片棗二枚煎八分不拘時服沉附湯治虛寒無陽胃弱乾嘔熟附子乾姜炮各一錢沉香五分白朮甘草各錢半水盞半姜五片煎八分食前服附於散治中寒陰證唇青面黑身背強直四肢厥冷諸虛沉寒熟附子三錢官桂當歸白朮乾薑炮半夏曲各一錢上咀每服五錢水盞半姜五片棗二枚煎八分食前服發明參薑湯治氣血兩虛而中寒者人參錢半乾薑一錢當歸五分薄荷二分炙甘草二分上水一盞姜三片棗一枚煎七分熱服茱萸四逆湯治厥陰中寒小腹痛甚吳茱萸泡附子炮乾薑各二錢炙甘草錢半上水盞半煎七分熱服朮附湯治中寒中氣四肢逆冷口噤牙關緊急痰盛脈弱白朮一錢附子炮二錢甘草二錢上作二服每服姜三片煎七分化蘇合香丸並連進三服有功或氣短頭暈手足厥逆未退者可進養正丹三十粒至百粒效養正丹方見頭暈門人參養胃湯治外感內傷諸寒虛證人參蒼朮厚朴薑製半夏泡各三錢陳皮茯苓藿香草果各三分炙甘草三分上水二盞姜七片烏梅一個煎七分不拘時服生料五積散治感冒寒邪頭疼身痛項背拘急惡寒嘔吐肚腹疼痛外感風寒及寒濕客於經絡腰腳痠髓並皆治之白芷七分陳皮一錢厚朴制八分桔梗五分枳殼八分川芎炙甘草茯苓各五分蒼朮當歸麻黃各一錢肉桂三分芍藥乾薑炮各八分半夏炮一分上水二盞姜三片蔥白三莖煎一盞不拘時服治中湯治脾胃虛寒嘔逆霍亂痞滿方見脾胃門沉香桂附丸治中寒心腹疼痛霍亂轉筋等證沉香附子炮乾薑炮良薑炒桂去粗皮茴香炒川烏炮吳茱萸湯泡炒上各一兩為細末用好醋煮麵糊丸梧桐子大每服五七十丸米飲送下空心食前日進二服忌生冷硬物易簡方一方用黑豆二臺炒熟以酒烹入滾數沸去豆取酒服二碗即愈一方以胡椒擂用滾酒泡服外用蔥鹽熨法一方用活雄雞一隻以刀破腹乘熱合臍上效熨法用食鹽一斤炒乾大熱用布二層盛裹熨臍冷即易熱者上陽回即已一法用吳茱萸一升酒略炒煮濕以絹袋盛之蒸極熱熨心腹及手足心候氣通暢則止屢效一法治中寒不省人事氣虛陽脫腹痛唇青以蔥一握束縛如餅切去根葉惟存二寸白許先以火烙一遍令通熱勿灼著病人臍上下以熨斗熨之令蔥熱氣透入腹內更作三四餅一餅壞不堪熨又易之候患人手足溫有汗乃止更作蔥湯一盛服良灸法氣海一穴在臍下一寸五分厥陰脈微灸二十壯石門一穴在臍下二寸關元一穴在臍下三寸治臟結不可攻者及陰汗不止腹脹腸鳴面黑手指青者宜灸百餘壯惡寒候病機經曰陽虛生外寒蓋陽氣不能外衛所以惡寒宜用參耆之類甚者加附子病久而惡寒者亦宜解鬱丹溪云惡寒非寒明是熱證亦有久服熱藥而得者河間謂火極似水熱甚而反覺自冷實非寒也有用解熱劑而少愈者蓋辛能散鬱火暫開耳丹溪醫案治一壯年惡寒自用附子藥多用吐痰法及養血清熱而愈又治一飲酒人惡寒顫慄濕熱內郁以黃耆二兩乾葛一兩煎飲之大汗而愈
