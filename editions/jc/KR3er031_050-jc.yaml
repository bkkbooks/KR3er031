body:
  text: 卷之五十驚悸門病機經曰陽氣與陰氣相搏水火相惡故惕然而驚也陰氣少陽氣入陰陽相搏故恐也又曰痛酸驚駭皆屬於火又曰二陰一陽發病主驚駭背痛聞鐘鼓之聲卻不畏聞木聲而驚者陽明也陽明者胃土也胃土虛則畏木而驚也驚悸為心血不足人之所主者心心之所主者血心血一虧神氣不守此驚悸之所肇端也驚者恐也悸者怖也血不足則神不守神不守則驚恐悸怖之證作矣怔仲證與驚悸不同怔忡證心中惕惕搖動而不得安靜無時而作者是也驚悸者驀然而跳躍忽聞聲而即驚或觸事而即悸有時而僕者是也其為證雖少異其為治則大同皆不外乎心肝膽過勞傷觸而致者也脈候內經大奇論曰肝脈急暴有所驚駭脈數致使人暴驚二陽急為驚寸口脈動而弱動為驚弱為悸寸口脈緊趺陽脈浮胃氣則虛為悸治法驚悸屬虛不外養血安神清痰三法治驚悸必先以養心安神之劑隨後豁痰或用吐法大便結而脈實者以硃砂滾痰丸下之一服不愈再服之無不愈者丹溪曰驚悸多屬血虛有慮便動則虛也時作時止者痰因火動瘦人多是血少肥人只是痰多時覺心跳者亦是血虛怔忡無時驚悸有時而作治驚悸有從肝膽二經肝出謀慮遊魂散守惡動而驚重治於肝經膽為決斷屬志不伸觸事而驚重治於膽腑有因怒氣傷肝有因驚氣入膽母能令子虛因而心血不足又或嗜欲繁冗思想無窮則心神耗散而心君不寧此其所以有從肝膽出治也郁痰留飲積於心包胃口而致驚悸怔忡者有之此又不可概以虛而治也醫者當參究脈候立方處治速能奏功經曰驚者平之平者平常也以其平常則不驚也病機賦云一人聞聲即驚醫者令患人坐於堂上使兩人扶之醫首下堂以小凳木槌手擊而口云吾擊凳亦常事耳爾何必驚且擊且言患者視之久而驚遂定此深得平之之法也藥方通治驚悸怔忡劑平驚通聖散治一切驚悸怔忡健忘等證當歸人參黃連茯神遠志甘草炙各三錢石菖蒲硃砂另研各二錢上為細末竹葉煎湯調二錢食後臨臥服十四友丸治驚悸怔忡酸棗仁泡去皮隔紙炒遠志茯神紫石英生地黃當歸薄荷人參黃耆茯苓阿膠炒龍齒硃砂各一兩上為細末煉蜜丸梧桐子大每服五十丸食後臨臥棗湯下養心湯治心虛血少驚悸不寧當歸川芎茯神遠志各一錢人參黃耆茯苓半夏曲各五分官桂一分柏子仁酸棗仁北五味子九粒甘草三分上水盞半棗一枚蓮子七個煎七分溫服寧志丸治驚悸人參茯苓茯神柏子仁琥珀當歸酸棗仁酒浸去殼石菖蒲遠志酒浸去心各五錢乳香硃砂各二錢上為細末煉蜜丸梧桐子大每服三十丸食後棗湯下茯苓飲子治痰迷心竅怔忡不止茯苓茯神半夏陳皮麥門冬各錢半沉香甘草各五分上水盞半姜五片煎服硃砂消痰飲治心氣痰迷心竅驚悸牛膽南星半兩硃砂減半另研麝香二分另研上為末臨臥薑汁湯調服一錢寧志膏治因驚失志人參酸棗仁泡去皮隔紙炒辰砂各半兩滴乳香一錢乳缽研細上為末煉蜜丸彈子大每服一丸薄荷湯下加味四七湯治心氣鬱滯豁痰定驚半夏茯苓茯神遠志去心各一錢紫蘇甘草石菖蒲各五分上水盞半姜五片棗二枚煎八分服溫膽湯治心膽虛怯怔忡多驚半夏制枳實白茯苓陳皮各一錢甘草五分竹茹一丸遠志一錢上水盞半姜三片棗一枚煎七分服硃砂安神丸治心神昏亂驚悸怔忡夜臥不安硃砂另研黃連各半兩生地黃三錢當歸甘草各二錢上為細末酒泡蒸餅丸如麻子大硃砂為衣每服三十丸臥時津液下朱雀丸治心病怔忡不止白茯神二兩沉香半兩上為細末煉蜜丸綠豆大每服三十丸人參湯下薑朮湯治心下停飲怔忡白姜白朮白茯苓半夏曲各一錢官桂三分甘草五分上水盞半薑棗煎服平補鎮心丹方見虛損門治驚悸益榮湯治思慮過度心血耗傷怔忡恍惚此湯主之當歸茯神人參黃耆各一錢芍藥紫石英酸棗仁柏子仁各五分小草木香甘草各三分上水盞半姜三片棗一枚煎八分服衛生易簡方治思慮過度心脾所傷驚悸怔忡茯苓二錢人參白朮各一錢木香五分甘草四分上水盞半姜一片棗一枚煎七分服遠志丸治因事有所大驚夜夢不祥心神不安驚悸怔忡遠志去心石菖蒲一兩茯神茯苓人參龍齒各半兩辰砂另研為衣上為細末煉蜜丸辰砂為衣每服七十丸熟水臨臥服八物遠志丸平補心氣安神鎮驚除膈間痰熱等證遠志去皮心石菖蒲麥門冬茯神白茯苓各一兩白朮人參各半兩牛黃二錢上為末煉蜜丸梧桐子大硃砂為衣每服二十丸白湯送下白石英硃砂各一兩上為細末每服五分金銀湯調下下劑硃砂滾痰丸治膈間痰飲及肥盛人宜此則滾痰丸以硃砂為衣每服五七十丸白湯下方見痰飲門吐劑瓜蒂散三聖散俱治痰盛驚悸二方見中風門易簡方一方治驚悸九竅溢血用新屠羊血熱飲二升愈一方治卒驚九竅出血以井花水噀面即止健忘門病機論大惑論帝曰人之善忘者何氣使然岐伯曰上氣不足下氣有餘腸胃實而心氣虛則榮衛留於下久之不以時上故善忘也健忘病主於心脾病源云健忘者謂事有始無終言談不知首尾又健忘者陡然而忘其事也此證皆由憂思過度損其心胞以致神舍不清遇事多忘然過思傷脾亦能令人健忘治之須兼理心脾神凝意定其證能自除矣脈候脈澀為血少滑主有痰在膈間心脈洪大而散主有火宜清之脾胃脈或微而澀或弦細皆不足也治法治健忘以養血安神理脾舒滯為主健忘由勞心血耗神不內守故卒然而遂忘宜養血則心氣自足而神自安何健忘之有過思傷脾痰涎鬱滯慮愈深而忘愈健宜理脾寡欲則痰涎既豁而神斯清何健忘之有藥方通治健忘諸劑歸脾湯治思慮過度勞傷心脾健忘怔忡人參黃耆蜜炙茯神白朮各一錢酸棗仁泡去皮八分木香三分甘草三分上水盞半龍眼肉七枚燈心二十根煎七分食後服定志丸治心氣不足脾思過度恍惚健忘驚悸怔忡無時服此益心強志令人不忘人參白茯苓各二兩遠志去心石菖蒲各二兩上為末煉蜜丸彈子大硃砂為衣每服三四十丸臨臥米飯下加味茯苓湯治傷脾涎滯痰迷心竅失事健忘半夏曲陳皮各八分甘草五分白茯苓人參各一錢益智仁香附子炒各五分上水盞半姜三片烏梅一個煎八分食遠溫服二丹丸治健忘安神定志和血丹砂丹參茯苓遠志人參各半兩甘草天門冬麥門冬熟地黃各一兩上為細末煉蜜丸梧桐子大每服三十丸至五十丸米湯下賽心湯寧志膏朱雀丸並治健忘三方俱見驚悸門聖惠人參遠志丸治神思不定健忘驚悸人參遠志白茯苓天門冬黃耆酸棗仁石菖蒲桔梗各一兩丹砂半兩官桂二錢上為末煉蜜丸綠豆大每服二十丸至三十丸米湯下大歸神丹治健忘鎮心安神人參當歸酸棗仁白茯苓遠志薑汁炒各一兩龍齒半兩琥珀半兩金銀箔各二十片上為細末酒煮稀糊丸如小豆大每服二十丸日用麥門冬湯下夜以酸棗仁湯下壽星丸治痰迷心竅健忘驚悸天南星一斤每個打作三四塊先以炭火二十斤燒地坑通紅取出火以酒五升傾坑內候酒盡下南星於內以盆覆之勿令走氣次日取出南星研末硃砂三兩另研琥珀一兩另研上末和勻薑汁打糊丸小豆大每服三十丸人參湯下讀書丸治健忘能除百病日記萬言人參遠志石菖蒲菟絲子生地黃地骨皮五味子酸棗仁當歸川芎各等分上為細末煉蜜丸梧桐子大每服三十丸空心棗湯下三神散治健忘不記事者白茯神遠志制石菖蒲去毛各三兩上為細末每服四錢食後空心各一服水一盞煎八分和渣服十日後則不忘久久服之能日記千言巴戟天丸治健忘服此令人聰明善記巴戟天去心半兩石菖蒲地骨皮白茯苓為末作糊遠志制白茯神各一兩人參三錢上為末黏米粉同茯苓末作糊以菖蒲湯調為丸梧桐子大每服三十丸酒白湯任下日三服丹參飲子治健忘辛苦勤讀之士宜服此丹參當歸酒洗白朮炒天門冬去心麥門冬去心各一錢半貝母陳皮知母甘草各七分石菖蒲一錢黃連薑汁炒五分五味子九粒上水盞半姜一片煎八分不拘時溫服易簡方一方治健忘以遠志菖蒲煎湯常當茶吃千金方用益智遠志等分為末食後酒調服聖惠方用戊子日取東引桃枝二寸置枕中令人聰明不忘一方五月五日寅時取東向桃枝三寸著衣帶上令人不忘一方益精神強志意聰明耳目以雞頭實為粉同粳米煮粥空心食之良一方治健忘補中益心志聰明耳目以蓮子泡去心皮為粉先以粳米二合煮粥候冷入蓮子粉攪勻再煮二三沸食之一方治健忘久服聰明益智龍骨遠志等分為末食後酒調方寸匕日三服兼治白濁一方七月七日取蜘蛛網著衣領中勿令人知永則不忘一方以甲子日或七月七日取石菖蒲為末酒調方寸匕日三服能聰明益志一方用吉祥草為末調服方寸匕補心不忘書房中栽養使人明目強記人家堂屋中有之闢忘恐候病機恐分臟腑有四經曰腎在志為恐恐傷腎思勝恐又曰精氣並於腎則恐此屬腎也又曰肝藏血血不足則恐蓋肝膽實則怒而勇敢肝膽虛則善恐而不敢也子和曰膽者敢也驚怕甚則膽傷矣此恐之屬肝膽也又曰胃為恐又曰心怵惕思慮則傷脾脾傷則恐懼自失也此恐之屬心脾胃也恐屬肝木之虛運氣云木不及曰委和委和之紀其病搖動主恐是也恐與驚不同子和曰驚者為自不知故也恐者為自知也蓋驚者聞響則驚恐者自知如人將捕之狀及不能獨自坐臥須得同伴方不恐懼或夜必用燈燭苦無燈燭則恐者是也治案丹溪治一人形氣俱實因大恐心不安如有將捕捉之狀夜臥不安兩耳後兼見火光炎上飲食能進而不知味口乾而不欲食以人參白朮當歸身為君陳皮為佐加鹽炒黃柏炙玄參各以少許煎服月餘而安所謂恐傷腎此補腎經之藥也藥方本事人參散治膽虛常多畏恐不能獨居如人將捕頭目不利人參枳殼五味子桂心各三錢柏子仁熟地黃各一兩甘菊花枸杞子各二錢茯神山茱萸肉各半兩上為細末溫酒調服二錢茯神散治膽虛目眩頭痛心神恐懼不敢自臥茯神二兩遠志防風細辛白朮前胡人參桂心甘菊花熟地黃枳殼各二兩上為細末每服三錢水盞半姜三片棗一枚煎六分溫服怒候病機陰陽應象論曰東方生風風生木木生酸酸生肝在臟為肝在聲為呼在志為怒怒傷肝悲勝怒又曰陰出之陽則怒又云血並於上氣並於下心煩惋善怒怒在陰之陽則陰閉遏其陽而陽不得伸故怒也怒為肝木太過運氣篇曰木太過曰發生發生之紀其病怒又云木氣太過風氣流行甚則忽忽善怒又云歲土不及風乃大行民病善怒是也岐伯曰陽氣者大怒則形氣絕而血宛於上使人暴厥又曰暴怒傷陽又曰怒則氣逆甚則嘔血及陰泄是也藥方丹溪香附甘草散治怒氣香附米六兩甘草一兩上為細末每服二錢白湯調下立消喜笑不休病機陰陽應象篇曰在臟為心在聲為笑在志為喜又曰心藏神神有餘則笑不休也又云精氣並於心則喜喜笑皆屬於心火之過運氣篇曰火太過為赫曦赫曦之紀其病笑發狂妄又云少陰所至為喜笑者也原病式曰笑蕃茂鮮淑舒榮彰顯火之化也故喜為心之志也喜極而笑者猶燔爍火喜而鳴笑之象也故病笑者心火之甚也治法戴人張子和路逢一婦人喜笑不休半年矣諸醫治之術盡矣戴人見之曰此易治也以食鹽二兩成塊燒令通紅放冷研細以河水一大碗同煎至三五沸放溫分三次啜之須臾以釵探於喉中吐去熱痰五升次服大劑黃連解毒湯不數日而笑止矣藥方黃連解毒湯方見熱門加半夏竹瀝薑汁服能治喜笑不休極效
