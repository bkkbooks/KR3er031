body:
  text: 卷之十二歷節風門病機歷節風因虛而得病源云歷節風是氣血虛由飲酒腠理開汗出當風所致或因調護之不謹以致風寒濕之邪氣偏歷關節與氣血相搏而痛非常或如虎之齧故有白虎之名歷節風有痰氣阻礙歷節風因風寒濕襲於關節者多亦或有濕痰流注痛楚惟夜甚而晝稍輕者為風寒勝也痛楚無分晝夜皆劇者為濕痰也痰濕勝者則惡飲食而時作嘔吐者是也治法歷節風審風寒濕痰流注分治風寒搏於筋則不能屈伸手指攣曲關節疼痛不可忍或腫如瓠或痛如掣或遍身走癢四肢不舉此皆風寒濕之邪宜辛溫解表以逐風寒羌活湯應效酒之屬是也濕痰壅滯日夜不已者宜勝濕導痰如二陳湯羌活勝濕湯愈風化痰丸之屬是也脈候脈浮大者為風寒之邪勝弦細是濕勝滑多者是痰藥方通治白虎歷節風劑羌活續斷湯治一切白虎歷節風手足肢節腫痛如錐羌活川續斷牛膝酒洗防風當歸酒洗川芎各一錢薄桂三分秦艽川烏各五分蒼朮米泔浸炒麻黃甘草節枳殼麩炒穿山甲各七分上水二盞姜三片蔥一根煎一盞不拘時服取汗海桐皮散治歷節走注骨節疼痛海桐皮獨活萆薢鹽水浸焙虎脛骨酥油炙當歸川芎天麻防風麻黃枳殼芍藥甘草川烏炮去皮臍薄桂桃仁泡去皮尖杜仲薑汁炒松節麝香炒許另研牛膝酒洗上咀每劑五錢水二盞姜三片棗二枚煎服虎骨散治白虎肢節痛不可忍虎骨酥炙一兩白花蛇酒浸取肉天麻防風當歸牛膝酒洗桂心各一兩全蠍去足五錢甘草炙五分白殭蠶炒去絲嘴乳香另研二錢麝香另研五分上為細末每服二錢酒調下豆淋酒尤妙沒藥散治白虎歷節流注筋骨疼痛沒藥五錢獨活防風蔓荊子當歸川芎桂心晚蠶砂赤芍藥各七錢虎脛骨一兩酥炙上為末每服二錢食前溫酒調下蠲痛丸一名麝香丸治諸風歷節痛手足不測疼痛腫滿無貴賤苦之此是風之毒害者也川烏一個生用黑豆十七粒去皮生全蠍十四枚去毒地龍去土五錢麝香五分另研上為末酒糊丸梧桐子大每服十五丸臨睡空心冷酒下微汗攝風酒治白虎歷節風諸風濕流注鶴膝腿風一切風痰證烏藥尋風藤五錢五加皮一兩虎脛骨石楠藤三角楓青木香骨碎補當歸蒼朮川續斷威靈仙羌活北細辛各二錢青藤根一根清乳香二錢川牛膝防風甘草節蘇木五錢南木香二錢石薜荔五錢川烏頭一個只用一分生薑一兩上咀以絹袋盛之以無灰酒一罈入藥於內固封壇口入滾水慢火煮一時取起放地上三日開服日三次隨量飲夏月只煮半料酒一小壇金刀如聖散治三十六種一切口眼喎斜半身不遂遍體遊風白虎歷節疼痛立效川烏炮草烏炮各二兩防風荊芥麻黃天麻蒼朮何首烏當歸川芎細辛石斛人參甘草各三錢全蠍硃砂雄黃各二錢上為細末每服五分臥時溫茶下如久病者初服三分隨加至五分看虛實加減青龍妙應丸治諸風拘急遍體遊走疼痛無時百藥不效穿山甲十五片石灰炒全蠍三十枚去毒地龍去土一兩蜈蚣十條生用草烏一兩生殭蠶炒五錢五靈脂五錢沒藥五錢另研乳香五錢另研上為末酒糊丸綠豆大青黛為衣每服二十丸空心鹽湯下一粒金丹治腰膝走注痛如虎齧草烏五靈脂各一兩白膠香半斤木鱉子去殼地龍去土各二兩好墨當歸各一兩乳香沒藥各五錢麝香五分上為末再同研勻米粉糊丸梧桐子大每服三十丸溫酒下微汗與鐵彈丸大同小異無白芷防風獨活寄生湯治白虎歷節風並治腳氣最效方見腰痛門驅風散寒諸劑羌活湯治白虎歷節風毒注骨疼痛不定羌活一錢附子炮秦艽骨碎補桂心木香川芎當歸牛膝酒洗桃仁泡去皮尖防風各五分甘草炙三分上水二盞姜五片煎溫服烏頭湯治歷節風痛不可屈伸川烏一枚蜜四合煮二合去烏甘草炙麻黃芍藥黃耆各等分上水煎蜜一合再煎至八分去渣空心服最治腳氣不屈伸滲濕逐痰諸劑二陳湯方見痰門羌活勝濕湯方見濕門燥濕化痰丸治歷節風濕痰壅滯晝夜疼痛無休者羌涪獨活防風防己川烏全蠍南星半夏殭蠶炒天麻陳皮去白豬牙皂角瓦炒當歸酒洗生地黃木香沉香各五錢白朮炒蒼朮米泔水浸杜仲薑汁炒各二兩巴戟天炒薏苡仁牛膝酒洗川芎破故紙炒各一兩上為末酒糊丸梧桐子大每服一百丸空心食前酒送下日二次食乾物壓之諸風應效酒治白虎歷節風一切諸風癱瘓寒濕痹肢節疼痛腳氣及紫白癜風神效當歸川芎白朮各三錢蒼朮五錢白芷苦參各二錢川烏一錢何首烏木瓜牛膝各二錢木香一錢五加皮石楠藤殭蠶白芍藥各三錢細辛黃柏知母大楓子薏苡仁生地黃各二錢穿山甲紫荊皮羌活獨活威靈仙藁本防風各錢半上為粗末好酒一罈將絹袋盛於壇內密封口文武火重湯煮一時取出去火毒過三日飲之又煮酒方治一切白虎歷節疼痛當歸五錢川芎二錢白朮蒼朮各一兩白芍藥生地黃枳殼各三錢五加皮五錢陳皮半夏羌活獨活各三錢烏藥茯苓甘草桑寄生各一兩牛膝黃芩木通薏苡仁木瓜各二錢海風藤五錢紫蘇葉木香一錢麻黃金銀花防己各三錢上煮法同前易簡諸方松節酒治歷風四肢痛如解一方治風毒歷風三年釅醋五升熱煎三五沸切蔥白二三斤入醋內煮一沸取出布帛熱裹患處熨之瘥一方治歷節風痛不可忍竹節羌活獨活等分酒煮過每日空心服一杯圖經方治歷節諸風晝夜苦痛虎脛骨酥炙黃三兩乳香沒藥各五錢另研細末和虎骨末每日用二錢溫酒調服千金方治歷節風松葉搗爛一升酒三斗和浸之七日每服一合日三服一方治歷節風骨節間痛不可忍蓖麻子二兩去皮黃連一兩以新水二升於甕器內浸二藥密封七日取出面東以浸藥水吞蓖麻子一粒七日後添二粒微利不妨以療大風亦效追命再造散治歷節風痛並厲風多有蟲故也錦紋大黃一兩獨生皂角刺一兩半上為細末每服二錢臨夜冷酒調下以淨桶伺候泄蟲蟲嘴黑色乃是多年蟲嘴不黑是近日所成越三日又進一服值候無蟲則絕根也忌醋硫黃酒治諸風疼痛肢體癮疹明硫黃每用三錢研極細入醇酒再研澄清空心飲清酒渣又入酒研澄清飲之連日飲之硫黃殺惡蟲自隨便下咒法治白虎歷節不已將雞子揩患處咒三遍願送糞堆頭行勿反顧蓋古云白虎是糞神愛吃雞子故也病人以黃腳雞下飯為妙亦可用哺雞來壓之其痛自止家人掃糞置門下故多患此疾聖惠方治歷節風痛用羊蹄根於生鐵上以好醋磨旋刮取漿塗患處愈如不愈入硫黃末塗之附鶴膝風肘膝腫痛臂䯒細小名曰鶴膝風以其象鶴膝之形而名之也或止有兩膝腫大皮膚拘攣不能屈伸䯒腿枯細俗謂之鼓槌風要皆不過風寒濕之流注而為病也藥方和劑大防風湯治寒濕冷氣兩膝腫痛不能屈伸及治痢後腳膝軟痛不能履名曰痢風此藥祛風順氣活血壯筋骨行履如故防風羌活白朮人參熟地黃黃耆當歸白芍藥牛膝川芎甘草附子杜仲薑汁炒上水二盞姜七片棗一枚煎八分溫服伊祁丸治鶴膝風腰膝風縮之疾伊祁全者一對桃仁生白附子阿魏白芷桂心各一兩乳香沒藥各七錢安息香桃仁研一兩上九味同童便酒二升炒熟放冷處漏蘆當歸芍藥牛膝羌活地骨皮威靈仙各一兩上連前藥一處研細末煉蜜丸彈子大每服一丸酒化下郁李丸治痢後手足不能屈伸或麻豆症傳變手足筋脈急郁李仁枳殼獨活鱉甲醋炙等分上為末酒糊丸梧桐子大每服五十丸煎木瓜湯或酒下加味小續命湯治鶴膝風行履不得者小續命加萆薢川楝子獨活乾木瓜不用生薑水煎碗底洗放麝香少許將藥衝入和勻服數十帖後加五積散同煎服瘥易簡方一方紫荊皮用老酒煎候溫常服專治鶴膝風攣一方治痢後手腳背腫不能行履用川烏芍藥蒼朮等分酒浸為末酒糊丸引同上歌曰痢後偏生痛腳風局方五積自能攻就中除卻麻黃藥酒煮多多服見功
