body:
  text: 卷之八十五胎產須知胎養古說胎妊十月其說見於古書有不同者多矣按巢氏云妊娠一月名始胎足厥陰脈養之二月名始膏足少陽脈養之三月名始胚當此之時血不流行形象始化未有定儀見物而變欲子端正賢良當今母見貴不可見狀貌醜惡之人欲生男宜操弓矢欲生女著珮環欲子美玩白璧觀孔雀欲子腎看詩書務和雅手心脈養之四月始受水精以成血脈手少陽脈養之五月始受火精以成其氣足太陰脈養之六月始受金精以成其筋足陽明脈養之七月始受木精以成其骨手太陰脈養之八月始受土精以成膚革手陽明脈養之九月始受石精以成毛髮足少陰脈養之十月五臟六腑關節人神皆備此其大略也又五臟論有稱耆婆者論一月如珠露二月如桃花三月男女分四月形象具五月筋骨成六月毛髮生七月遊其魂兒能動左手八月遊其魄兒能動右手九月三轉身十月受氣足又顱囟經云一月為胎胞精血凝也二月為胎形始成胚也三月陽神為三魂四月陰靈為七魄五月五行分五臟六月六律定六腑也七月精開竅通光明也八月元神具降真靈也九月宮室羅布以定生人也十月受氣足萬像成也按顱囟經三卷中古巫方所撰隋人巢氏方亦嘗序之今巢氏論婦人妊娠乃不見言之聖濟經原化篇亦獨取顱囟經更不言巢氏論者何哉嬰產寶鑑集云小兒方論起自巫方黃帝云吾不能察幼小賴世有巫方能知小兒之壽夭耳及觀巢氏論小兒候亦云中古有巫方立小兒顱囟經以占壽夭世所相傳者有少小方焉是巢氏論小兒則取於顱囟經論妊娠至三月始胎之時欲令見貴不是醜惡操弓矢施珮環觀孔雀讀詩書之類豈非胎教之理乎有謂天一生水小兒初胚先生兩腎次生其心次生其肝肺脾皆天一生水地二生火之理也至巢氏論十二經之養始於肝經亦應四時之令始於春木所以一月二月手心胞絡之脈也余仿此至十月子於母腹之中受足諸臟氣脈所養然後待時而生此論奧微而有至理余書所論不能及也後世論胎養更莫能外巢氏之說也胎教古論夫至精才化一氣方凝始受胞胎漸成形質子在腹中隨母聽聞自妊娠之後則須行坐端嚴情性和悅常處靜室多聽美言聆人講讀詩書陳禮說樂耳不聽淫聲目不視惡色如此則生子形容端正忠孝賢明此所謂因外象而內胎感應驗君子曰胎教產圖之書不可謂之迂而不加信觀夫巨室文獻之家世有閨教婦道敦篤莊嚴懷妊自不造次生子自然清俊又觀動履起居飲食之際感應如響雖鄰家有所興修亦且犯其胎氣如犯刃者形必傷如犯泥者竅必塞打擊者色青黯繫縛者相拘攣食羊睛者目必白食兔肉者必缺唇如此之類驗如反掌及其福善禍淫殆不可不信也形氣相感天地者形之大也陰陽者氣之大也性形與氣相資而立未始偏廢男女媾精萬物化生天地陰陽之形氣寓焉語七八之數七少陽也八少陰也相感而流通故女子二七天癸至男子二八精氣盛則陰陽交合而兆始故也語九十之數九老陽也十老陰也相包而賦形故陰窮於九女能方之則以陰陽相生而成終故也元氣孕毓皆始於子自子推之男左旋積歲三十而至巳女右旋積歲二十而至巳巳為正陽陰實從之自巳懷任男左旋十月而生於寅女右旋十月而生於申申為三陰寅為三陽而生育之時著矣其稟賦也體有剛柔脈有強弱氣有多寡血有盛衰皆一定而不可易也以至分野異域則所產有多寡之宜是故荊揚薄壤多女雍冀厚壤多男吉事有祥則所夢各應其類熊羆為男之祥蛇虺為女之兆是皆理之可推者也至於胎化之法有所謂轉女為男者亦皆理之自然如食牡雞取陽精之存於天者帶雄黃取陽精之存於地者操弓矢藉斧斤取剛物之見於人事者氣類潛通造化密移必於三月形兆之先蓋方儀則未具形氣藉母神而變化陽可以陰而動靜之所以相感也觀夫螟蛉之化又可知矣物類且然況於人乎轉女為男法博物志曰婦人妊身三月未滿著婿衣冠平旦繞井三匝映水視影勿反顧必生男有陳成者生十女其妻繞井三匝咒曰女為陰男為陽女多災男多祥鎮井三日不汲果生一男一云孕婦二月後將及三個月平旦著夫衣冠繞淨水池盆三匝照影自視主生男必於甲丙戊庚壬陽日作之效凡妊娠未滿三月形象未著男女未定宜用方術可以生男其法取明雄黃一兩一塊者用絳囊盛之佩於孕婦身左又以弓弦同貯佩之或萱花同佩所以謂之宜男草又常張弓於其父懸弧以視母又用鋮戈斧斤密置床蓆之下勿令人知常誦詩書之聲以上等法皆可轉女為男其實未形而變者也故古人立胎教能令生子良善長壽忠孝仁義聰明無病十月之內常觀好境象遠邪僻真良教也驗男女法遣妊婦面南行走急呼之左回首者是男右回首者是女又驗丈夫左乳房有核是男右乳房有核是女丈夫脈左寸洪盛者是男右寸洪盛者為女辨脈法經云陰搏陽別謂之有子搏者近也陰脈逼近於下陽脈別出於上陰中見陽即滑脈是也脈滑而動是為陽施陰化法當有子又少陰脈動甚者孕子也手少陰屬心足少陰屬腎心主血腎主精精血交會投識於其間則有妊又三部脈沉正等無病而經不至者妊也脈經云左手尺部浮洪者男胎也右手尺部浮洪者女胎也兩手尺部俱洪者為兩男俱沉實者為兩女又云中指一跳一止者一月胎二止者二月胎也脈訣云肝為血兮肺為氣血為榮兮氣為衛陰陽配偶不參差兩臟通和皆類例血衰氣旺定無孕血旺氣衰應有胎寸微關滑尺帶數流利往來並雀啄小兒之脈已現形數月懷耽猶未覺左疾為男右為女流利相通速來去兩手關脈大相應已形亦在前應語左手帶縱兩個兒右手帶橫一雙女左手脈逆生三男右手脈順遠三女寸關尺部皆相應一男一女分形證有時子死母身存或是母亡存子命往來三部通流利滑數相參皆替替有力也陽實陰虛脈得明遍滿胸膛皆逆氣左手太陽浮大男右手太陰浮大女諸陽為男諸陰女指下分明長記取三部沉正等無絕尺內不止真胎婦夫乘妻兮縱氣霧妻秉夫兮橫氣助子乘母兮逆氣參母乘子兮順氣護小兒日足胎成聚身熱脈亂無所苦汗出不食吐逆時精神結備其中住滑疾不散胎三月但疾不散五月母弦緊牢強滑者安沉細而微歸泉路欲產之婦肺離經沉細而滑也同名夜半覺痛應分誕來日日午定知生質疑謂離經之脈即歇至之脈是也啟蒙曰欲產之婦脈離經離經之脈分明認其來大小不調勻或如雀啄屋漏應皆歇至之脈也腰痛腹痛眼生花產在須臾卻非病妊娠服藥禁蚖斑水蛭䗪虻蟲烏頭附子側天雄野葛水銀䕡巴豆牛膝薏苡蝟蜈蚣三稜代赭芫花麝大戟蟬蛻黃雌雄硝黃鬼箭牡丹欓槐子紅花桃仁同牽牛皂角狼星半瞿麥乾薑乾漆通硇砂蟹甲螻蛄蜴地膽蠐螬皂莢同躑躅芫青亭長喙藜蘆虎掌飛生蟲雄黃雌黃水銀粉錫麝香朴硝芒硝芫花大戟牛黃巴豆野葛牛膝桂心牡丹皮藜蘆皂莢䕡茹躑躅鬼箭槐子薏苡瞿麥附子烏頭側子天雄烏喙蜈蚣地膽斑貓芫青亭長水蛭虻蟲䗪蟲螻蛄蠐螬蝟皮蜥蜴蟬蛻蛇蛻蟹甲半夏南星欓根菵草牽牛虎掌代赭狼芽蕘花生鼠溲疏飛生蟲大黃木鱉紅花蘇木甘遂妊娠飲食忌食螃蟹主橫生豆醬與藿葵同食主墜胎食兔肉主兒缺唇鴨子合桑椹同食主倒生食羊肝主子多厄食鱠鯉同雞子主子生疳多瘡食羊眼主子白睛食雞肉合糯米主子生寸白蟲食犬肉主子無聲食鱉肉主子項短食雀肉與飲酒主子多淫食鱔魚田雞令子喑食雀腦主子雀目食茨菰消胎氣食驢馬肉主過月難產食菌主子多風食椒姜蒜辣之物主傷胎食無鱗魚主難產食蝦主難產飲燒酒主子驚癇食楊梅李子主子多疥安胎論胎有不安而腰腹痛甚則至於下墜者未必不由氣血虛無所榮養而使之然也夫胎之在腹如果之在枝枝枯則果落固理之自然婦人性偏恣欲火動於中亦能致胎不安而墜者也大抵不外乎屬虛屬火二者之間清熱養血之治盡之矣此外二因而動胎者又不可不知也有因母病動胎但療母病則胎自穩有因觸傷而動當以安胎藥二三劑而胎自安安胎方法十條一胎痛乃少血四物湯加童便制過香附子共為末每服三錢紫蘇湯調下一有所傷觸動而痛者用芎歸湯獨聖散神效一無事胎動因火盛逼之故也四物湯加條芩之類若逆上作喘加香附同煎一胎動不安及腹痛下血宜服集驗方寄生散牡蠣之屬藥方安胎飲治妊娠胎氣不安腰腹微痛飲食少進白朮白芍藥熟地黃當歸各一錢人參川芎條芩陳皮各五分甘草砂仁紫蘇各三分上水盞半煎八分不拘時服下血者加阿膠甚者加艾葉腹痛甚者倍加芍藥固胎飲治妊娠氣血俱虛三個月內慣要墜胎先用此方以固之不墜人參黃耆白朮條芩各二錢當歸一錢川芎芍藥各七分熟地黃陳皮各五分黃連升麻柴胡糯米八十一粒上為細末晚米粥為丸如梧桐子大每服五十丸清米飲送下探胎飲婦人經水不來三月疑似用此驗胎有無川芎不見火不拘多少為細末空心煎艾湯調下方寸匕覺腹中動則有胎也臍之下動者乃血瘕也不動者血凝也病也芎歸湯治一切胎氣不安川芎當歸酒洗上咀等分每服五錢以好酒一盞煎至將干入水一盞再煎五七沸去渣溫服獨聖散治妊娠有所傷觸激動胎元腹痛下血極效砂仁不拘多少帶皮同炒勿令焦黑去皮取仁為末熟酒調服不飲酒者米湯調下亦可上此一味實妊婦之要也以其有安胎易產導滯之功四聖散治漏胎下血條芩白朮砂仁阿膠各等分上為細末每服二錢艾湯調下金銀煎治胎無故而動作痛欲下者金銀各一兩煎湯調砂仁末一錢服之即安集驗方治胎動不安下血阿膠炒成珠艾葉川芎當歸各一錢上水二鍾煎一鍾分二服寄生散治同前桑寄生當歸川續斷白朮土炒川芎阿膠珠茯神香附子制人參各一錢甘草五分上水二鍾煎一鍾溫服罩胎飲治妊娠身發痘疹服此不致損胎如胎不安宜獨聖散安胎飲赤茯苓白朮當歸白芍藥赤芍藥條芩乾葛人參桔梗柴胡防風陳皮荊芥枳殼紫草阿膠糯米白芷甘草川芎縮砂仁各三分上作一服水二鍾煎加乾柿蒂七個野茅根七寸煎八分服參橘散治妊娠噁心飲食少進益胃和中人參橘皮白朮厚朴姜炒白茯苓各一錢麥門冬炙甘草各五分上水二鍾加竹茹一丸彈子大生薑三片煎八分溫服白朮枳殼湯治同煎白朮土炒二錢枳殼條芩各一錢水鍾半煎服妊娠惡阻竹茹湯治孕婦嘔吐不止噁心少食服此止嘔清痰竹茹彈子大一丸陳皮白茯苓半夏各錢半生薑二錢上水鍾半粳米一撮煎七分溫服忌羊肉雞魚麵食烏附湯治孕婦噁心阻食養胃調和元氣烏藥香附子制白朮土炒陳皮各一錢人參炙甘草各八分上水鍾半姜三片煎七分吐甚者加丁香砂仁各七粒妊娠子腫白朮散治妊娠四肢浮腫或遍身面目俱浮謂之子腫白朮一兩生薑皮陳皮大腹皮洗白茯苓各五錢上為細末每服二錢米飲調下木通散治同前木通條芩各八分木香各分磨汁入檳榔紫蘇枳殼白朮白茯苓各七分上水鍾半姜二片煎七分溫服妊娠子煩竹葉湯治孕婦煩悶不安謂之子煩竹葉二十個揉防風黃芩梔子仁各八分白茯苓當歸各一錢麥門冬去心錢半上水煎服外臺方有竹瀝二合無竹葉麥門冬飲麥門冬二錢人參一錢生地黃一錢茯神一錢黃芩一錢甘草四分犀角屑一錢上水鍾半蓮子五個煎七分不拘時服妊娠子滿澤瀉散治妊婦喘急胸滿小水不利謂之子滿澤瀉木通赤茯苓各一錢枳殼炒桑白皮檳榔各八分上水煎加姜三片順氣散治妊娠胸膈滿氣壅喘嗽飲食不下陳皮一錢枳殼檳榔大腹皮各七分紫蘇莖葉八分白朮一錢赤茯苓一錢甘草三分桑白皮八分上水鍾半煎服一方有訶梨勒妊娠子淋車前散治妊婦小便頻澀作痛下焦有熱謂之子淋車前子一錢微炒研赤茯苓赤芍藥木通各五分石葦炙去毛陳皮檳榔川芎各四分滑石當歸梔子枳殼各八分甘草節四分水鍾半加燈心同煎空心溫服一方用生地黃鮮者搗汁加蜜二匙服能治子淋一方用生膚草四兩水二鍾空心服二次立愈一法搗取自然汁服治子淋諸淋皆有神效妊娠子癇羚羊角散治妊婦忽然胸悶不省人事四肢魚弓反張言語謇滯痰涎壅盛狀若中風謂之子癇羚羊角散銼川芎當歸各一錢酸棗仁五加皮薏苡仁防風茯神杏仁各五分木香二分甘草三分上水鍾半姜三片煎八分服竹瀝飲一名防己湯防己防風桑寄生人參當歸川芎獨活竹瀝茯苓甘草上水煎服產寶百問方有乾葛妊娠子懸紫蘇飲治妊娠胎氣不和上湊心腹脹滿疼痛謂之子懸紫蘇葉大腹皮各八分當歸香附子各三錢陳皮芍藥各五分川芎甘草各三分上水煎服當歸湯治妊娠胎動衝心悶絕煩躁口乾上衝下築迷悶唇口青黑手足厥冷產科名保安散產寶方有川芎當歸人參阿膠各二錢甘草一錢連根蔥白一握上水鍾半煎七分連要二劑速效又方用蔥白二七莖濃煎汁飲之即安若胎已死服之即出未效再服四聖散治妊娠不能飲食衝心欲死遍身疼痛黃芩白朮白芍藥各一兩砂仁五每服水鍾半煎七分服不時用一帖易產用局方藿香正氣散皆妙妊娠不語素問奇病篇曰人有重身九月而喑此為何也岐伯對曰胞之絡脈絕也胞絡者繫於腎少陰之脈貫腎系舌本故不能言當十月而後十月胎產胞絡復通不治而語音自出也鯉魚湯治妊娠腹脹遍身浮腫小便不利或胎死腹中皆效當歸白芍藥各一錢白朮二錢白茯苓一錢五分橘紅五分鯉魚一尾不拘大小上作一服將鯉魚去鱗臟白水煮熟去魚用汁鍾半生薑五片煎一鍾空心服當見胎水下如水未盡胎死腹中脹悶未除再製一服水盡脹消乃已達生散妊娠八九個月宜扶正氣散祲氣若虛人尤宜大腹皮酒洗白朮芍藥當歸人參陳皮紫蘇各五分甘草四分上水鍾半煎春加川芎防風夏加黃芩五味子秋加澤瀉冬加砂仁或通加枳殼砂仁胎動加金銀湯野苧根上氣加紫蘇性急多怒加柴胡芩連少食加砂仁神麯渴加麥門冬葛根能食加黃楊如有痰加半夏黃芩束胎丸懷妊八月內恐胎氣展大難產用此扶母氣束兒胎易產條黃芩冬月一兩夏月五錢用酒炒過不可太熟白朮三兩白茯苓七錢五分陳皮二兩上為末粥糊丸梧桐子大每服五十丸白湯下枳殼散臨月服之順氣易產枳殼三兩炒粉草兩半炙香附子炒一兩上為細末每服二錢空心滾白湯調下故日三服良方等書悉謂此方順氣易產故日三服愚意此皆耗氣之藥若服過多恐損真氣但於臨產之月間日服之可以降氣破氣而已庶幾胎氣順而易產也救生散治妊娠稟受虛弱胎元不盛勿服枳殼散破氣之劑此方益氣安胎易產甚妙人參白朮炒神麯炒麥芽炒訶子煨取肉橘紅上等分為末每服三錢水一鍾煎七分空心食前服治懷胎慣墮之病凡婦人懷胎二三個月慣要墮落名曰小產此蓋由體弱氣血兩虛臟腑火多血分受熱以致然也醫家又謂安胎多用艾附砂仁熱補尤增禍患而速墮矣殊不知血氣清和無火煎爍則胎自安而固氣虛則提不住血熱則溢妄行欲其不墮得乎香附雖云快氣開鬱多用則損正氣砂仁快脾氣多用亦耗真氣況香燥之性氣血兩傷求以安胎適又損胎而反墮也今惟千金保孕丸泰山磐石散二方能奪化工之妙百發百效萬無一失甫故表而出之以為好生君子共知也千金保孕丸治婦人有孕慣要小產服此則免墮胎之患杜仲四兩同糯米炒斷絲川續斷酒洗二兩上為末山藥煮糊為丸如梧桐子大每服八十五丸空心米飲下忌酒醋戒惱怒泰山磐石方治婦人氣血兩虛身體素弱或肥而不實或瘦而血熱或脾胃少食四肢倦息素有墜胎之患此方平和兼補氣血脾胃覺有熱者倍加黃芩少用砂仁覺胃弱者多加砂仁少用黃芩更宜戒欲惱遠酒酸辛熱之味永保無墮人參黃耆各二錢白朮炙甘草五分當歸一錢川芎白芍藥熟地黃各八分續斷一錢糯米一操黃芩一錢砂仁五分上水鍾半煎七分食遠服但覺有孕三五日常用一服四月之後方無慮也產前餘論妊娠之婦大宜寡欲為先其於婦人或未諳此然則男子亦有所不諳者豈不愚哉至於壞妊猶有房事殊不知情欲一動血氣皆燔臟腑皆為之不寧胎息因之而弗安者矣不特此也寡欲二字義甚擴充凡所謂起居食息七情六淫一有遇觸冒則火隨之而燔俱是欲也寧不皆寡而節合於中乎故妊娠但當清熱養血為主藥以四物湯加白朮條芩其有雜證用此增減治之以至臨產之月不宜登高涉險貪睡懷憂須要時常行步以運動之庶得血氣暢通而產自易也殆夫生產之難者皆由妊婦未嘗預聞講說生育道理不能臨事無眩至期愴惶用力失宜因有難產之患矣是故有機生者則先露手有逆產者則先露足有坐生者則先露臀此皆用力太早之過當夫臍腹疼痛之初兒身才轉而未順用力一逼遂至橫逆若正產時子如夢覺自能翻身坼胞求路則隨漿水而下此易產之常道也若或胎息體弱猶如夢寐未醒轉頭遲滯不能隨漿而出漿水既涸則子宮乾澀汙血閉塞道路子無所從以致不順當產之際漿水下久而猶不就分解者急服催生之藥遂之慎不可驚慌喧嚷只用歷練老成經慣婦人一二扶持不可急遽便欲為生莽撞下手因而傷早觸逆胎元甚至子母傾危職皆由於此也可不慎哉可不慎哉臨產須知一十四條一臨產宜擇年高得當穩婆及純謹婦人一二扶持凡閒雜一應外來之婦喪服穢濁之人預宜杜絕勿令觸犯胎氣致產不利產後客氣犯小兒亦主為害一妊娠月滿不可占卜問神巫覡之徒哄嚇謀利妄稱凶險不順等辭何如禱神祇保產婦聞之憂疑恐懼夫惟憂慮則氣結氣結則滯而不順必至於難產如犯此類宜服達生散以順其氣方覺腹痛不可便欲為生懷疑巫說驚動太早則舉家霍亂致產不利有之一臨月忽然腹痛或作或止或一二日或三五日胎水已來腹痛不密者名曰弄胎非當產也又有一月前忽然腹痛如欲便生卻不產者名曰試月非當產也凡腹痛胎水來與不來俱不妨事但當寬心候時若果當生痛極不已胎孕偏陷腰間重脹穀道挺迸漿水淋下其兒遂生此乃正產自有其時如瓜熟蒂懸果熟自落之類一初覺腹痛而腰不甚痛者未產也且須熟忍行動不能行者可憑物而立行得又行一將產之時產婦痛甚不肯舒身行動固執曲腰睡臥胎元轉動尋到生門已被遮閉如此再三胎已無力決至難產一初覺微痛且當任意坐臥勉要飲食毋致臨產乏力一產初覺欲生便須惜力調養不可用力妄施兒身方轉竟被用力一逼令兒錯路以致橫逆須待臨至產門用力一逼兒則下生此所以當其用力也若時候未到用力徒然一凡臨產如覺心中煩悶可用白蜜一匙熱水調服一未產之先或煩渴欲飲水者只可與米飲綠豆湯為佳一將產婦如覺飢餓可吃稠軟白粥勿令飢渴以乏氣力不可食硬飯滋粽難化之物產時用力太乏脾虛不能消磨產後恐成傷食之病一產後或服催生符法宜以溫酒溫水服之不可服涼水況血得寒則凝血一凝則胎滯不利反致難產一產婦臨月不可洗頭以免橫生逆產一產婦臨時胞漿未下但只穩守無妨胞漿破後一二時辰不生便宜急服催生之藥夫胞漿乃胞內養兒之水也兒既坼胞其水即來胎亦隨下此為易產若胎元無力轉頭遲慢漿水下盡即汙血閉塞門戶令子無路可通故難產也宜用催生丹滑石散益母丸之類逐去惡血開滑子官庶乎易矣一凡臨產房中不得喧嚷驚慌宜閉戶靜以待生藥方濟陰返魂丹專治橫生逆產胎前產後一切諸證引下於後益母草八兩一名野生麻一名充蔚子方梗葉類火麻對葉而生四五月節間開紫花白花者不是可為丹家之用端午日或小暑日俱可收採連根透置風虎陰乾用時以手摘去根不犯鐵器石臼搗爛磨羅為細末聽用川當歸七錢赤芍藥六錢南木香五錢上為末煉蜜和丸如彈子大每服一丸好酒童便各半化下或丸如梧桐子大酒便各半吞三十丸凡產倉卒未合只生用益母草搗爛絞汁入蜜小許服之其效甚大本草云此草胎前無滯產後無虛故名益母一胎動不安下血不止及腹作痛或作聲者用溫米湯送下一胎前一切難產不順子死腹中脹滿不下心痛心悶酒便化下或炒鹽湯下一月經不調好酒下或四物湯下一臨產併產後各先服一丸童便酒下安魂定魄氣血自調順諸病不生又能破血止痛養脈息調經絡易產如神一產胞衣不下臟腑虛羸五心煩悶躁熱敗血流入衣中脹而難出用好酒化下一產起臥不得眼前黑暗生花或血熱口乾煩躁而渴心神昏亂如見鬼神不思飲食傷風發熱手足麻木百節疼痛不可忍者濃薄荷汁酒便各半送下一產後氣壅喘嗽胸膈不利噁心口吐酸水及四肢浮腫兩脅刺痛舉動無力溫酒送下一產後惡血未盡留滯作塊惡露衝心腰腹作痛大便秘小便澀中風吐逆失音不語不省人事酒便化下一產後寒熱往來蓋因敗血傷心則熱傷脾則寒狀如瘧疾或腹痛溫米湯桂枝湯任下一產後痢疾後重血瀉棗湯下一產崩中下血漏下不止烏梅湯下或糯米秦艽湯下一產赤白帶艾湯下一治奶癰益母末酒調敷或生取爛搗敷亦可一能治小兒疳痢等疾或取葉以砂罐煮粥食之加蜜於汁中飲之皆效益母膏治妊婦一切諸病及產後諸病益母草依前採法不限多少連根莖葉洗淨用大石臼石杵搗爛以布濾取濃汁入砂鍋內文武火熬成膏如黑砂糖色為度入甕罐收貯每服二三匙酒便調下或諸血病湯藥中加一匙服其效尤妙催生丹治橫生逆產兔腦髓臘月取去皮及筋膜研如泥乳香錢半另研麝香錢半另研母丁香二錢為末上三味和勻入兔髓丸如芡實子大陰乾油紙密封臨產服一丸溫酒送下易產經驗滑石散治產難水下胞干胎滯不生用此最效滑石飛過一兩白蜜香油各半盞上將油蜜慢火熬熟三四沸掠去沫調滑石末頓服外以油調於產婦臍腹上下摩之立效牛膝湯治婦人生產不順牛膝酒洗瞿麥各一錢當歸酒洗木通滑石各二錢冬葵子一錢二分炒研如無用黃蜀葵花亦可上水二鍾煎一鍾食前溫服須先制預備至期從容煎為佳豬肝蜜酒治產婦胎水下早干滯難產豬肝白蜜醇酒各一升共煮作二升分三服若難吃隨多少細細吃之催生遇仙方蓖麻子四十九粒去殼蛇蛻一條煅硃砂研末雄黃研末各二錢上為細末晚米粥丸彈子大臨產時先用花椒湯洗臍納藥一丸於臍中仍以厚紙一層覆藥上外用軟帛束之產畢取下一丸可用數次烏金丸治難產催生及產後諸病阿膠炒一兩八錢熟艾淨一兩穀芽曬乾二兩蘇木一兩敗筆即舊筆尖九個火煅過存性龍衣即蛇蛻全者一條新瓦慢火培燥研上為細末煉蜜丸如芡實子大每服一丸童便酒調化下凡制烏金丸擇天德天醫生氣吉日齋戒致誠凝神定慮灑掃淨室忌一切婦人雞犬閒雜不潔之人至夜分寂靜先念淨心咒語方可丸合咒曰天精精地寧寧精精寧寧左朝北斗右朝北辰人逢此藥各保安寧急急如律令烏金丸秘訣歌阿膠十八遇真仙潔淨龍衣只一聯穀麥生芽三寸位文房敗筆數根堅五月五日收熟艾勻勻蘇木分兩全學者若憑依此訣免教產婦入黃泉擇日靜虛修製藥病人此日定安痊柱香散治胎死腹中不下桂心三錢麝香五分上為末作一服酒調下伏龍肝散治產婦橫逆子死腹中伏龍肝即灶心紅土百草霜即鍋底灰白芷各等分上為細末酒便各半調服二錢不下再服效催生用藥時宜夏暑月用五苓散三錢黃蜀葵子半合研煎湯下冬寒月用五積散三錢黃蜀葵子半合研煎湯下催生用藥之義一催生多用滑利迅速之意如兔腦蛇蛻筆尖弩牙急性子之類二催生若是水血先下子道乾澀不能下者如豬脂油蜜酥油蔥白葵子榆白皮滑石牛乳之類三催生如天寒之時稽停勞動之久風冷乘虛入於胞胎使氣血凝滯而不下者如牛膝蔥梗五積順元散之類四催生有觸犯禁忌如符法硃砂乳香之類易簡方十六道一方燒弩牙令赤淬酒內飲之一方下死胎用平胃散一劑加朴硝三四錢泡服即下一方催生用千槌花即鏨柄打披頭者燒灰存性為末酒調下一方催生用槐角子七枚吞下即產一方用魚鰾膠燈上燒灰存性一錢酒調服一法用香油炒焦為末用三錢酒調神效一方用敗筆頭燒灰存性熔蠟丸作一服酒吞下一方用貝母七枚為末酒調下一方用路旁草鞋鼻燒灰存性為末酒調二錢一方用天麻子搗爛貼足心產畢去之一方治難產或有犯觸用明乳香為末酒調一匕一方治胎衣不下用白蒺藜貝母等分為末米飲調下二錢一方用赤小豆炒熟水二升煮一升取汁服立下一方令產婦含自己髮梢於口中噁心即下一方用急性子即金鳳花子女人用染甲煎湯服易產一方用灶心土為末酒調二錢效一方蜾𧕳散泡湯服即人家壁上土蜂窠如蠶繭樣尋之遇雙生女遇單生男極驗甫按催生方劑廣載多繁取其便用故也凡居市居鄉不同急遽倉忙之際一時不備不得於彼必得於此取用之便其庶幾乎產後余諭產後胎衣不下者誠為可懼蓋有惡血填脹衣中阻塞道路急須用藥助下切不可用粗魯之婦以手採取多致損肝傷胃者有之此又不可不慎也丹溪曰產後當大補氣血為主雖有雜證以未治之誠萬世不易之論也原夫妊婦向以元氣養胎而體固不甚厚抑兼產後大耗氣血是則虛而又虛者也夫安得不大補哉雖然此丹溪之言其常也若果因其變證又安得不通其變而治之抑執其常以補之乎易曰化而裁之存乎通神而明之存乎人然胎妊既分而久積之汙血須該盡脫若然未盡腹中硬痛者用滑澀湯黑神散之屬破而行之須要惡露驅盡方用補劑隨以胎衣滌去汙濁修製為丸予僭名為還元丹此方產後服之誠足以補真元也非達造化之至者烏足與知之余如因虛感冒風寒祛風之藥加之補劑可也如傷食發熱者消導之藥加之補劑亦可也余可類推產畢宜先飲童便服返魂丹一丸不得便就平臥宜閉目倚坐須臾堅膝挺胸仰臥令人以手從心按至臍下使血不致凝滯可頻頻喚醒慎勿熟睡而恣情焉三日之內常以乾漆燒煙及淬醋炭令產婦常聞其氣庶無血暈昏迷之狀若未滿月其於憂思喜怒行住坐臥俱取適中不宜太過恣食生冷炙爆黏硬難消之物又慎勿以稍健無虞放心固意不避風寒沐浴費力當時未覺蘊疾在後誠為終身之患不淺矣賢者鑑之產後須知十四條一產畢未可上床且扶住挺坐卻令人從心按至臍下者數次余血皆下雖睡時亦按之俾惡露不滯二三日方已一按產經云婦人非止臨產須憂產後大宜將息切勿以產畢無妨乃恣意從心無所不犯犯時微若秋亳感病重如山嶽一產婦才分娩預燒秤錘或硬炭燒紅淬醋器中使醋氣薰沃房中除血暈解穢厭為妙更以舊漆燒煙時聞之亦妙一產母不可妄食飲食過多及肉餔等物況脾胃虛弱不能運化致成內傷終為脾積之疾非細也產後須臾惟食溫軟白粥一味雖肉糜亦不可多食也一產畢且令先飲童便酒半盞須臾用雞子去殼煮淡酒軟食之一枚不可多不可硬然後食粥一夏月凡燒醋炭皆於房外燒之使其氣入房戶可也一切煮粥煎藥皆不可置火於房內致產婦煩躁一產婦與酒不可多而致醉產前產後醉則乏力而四肢不用產後酒多恐引迸入四肢致後日有四肢無力酸髓之患一產婦房中不宜有隙邪風射入為害臥床四壁宜厚褥圍之一產後七日內不可洗七日外方可溫水洗若沐洗須是一月之外一百二十日內不可作勞一產婦力倦睡時雖著亦要頻頻喚醒為妙一產後昏暈為血暈者多常以醋氣聞之漆煙薰之則止若甚者與黑神散服之一產後有下血過多而虛暈者但神昏煩亂而已宜補血之藥如芎歸羊肉湯當歸健中湯之屬一產後用力太過氣虛發熱眩暈者宜補中益氣如補中益氣湯香附八珍湯之屬一產後氣血虛甚不知人事欲絕不止者極危候宜用清魂散灌之凡暈口噤不開不論血暈虛暈一法以韭菜切搗盛於有嘴瓶內煎滾醋一二碗沃瓶中蓋封瓶口使其氣從瓶嘴出對產婦鼻孔其氣薰入肺竅布散諸經氣血流通即醒產後一十八證惟三證不治其餘皆用黑神散而愈一病熱胎死腹中二難產三胞衣不下四血暈五口乾心悶六乍寒乍熱七虛腫八忽見鬼神九月內不語十腹痛兼瀉更用調中湯參苓白朮散等劑十一遍身疼痛十二血崩虛者更用補劑十三中風從風門治法十四腹脹嘔吐十五傷寒十六口鼻黑色及鼻𪖔不可治十七產後病甚喉中喘急者不可治十八心痛甚者不可治藥方還元丹治產後大虛補氣補血還元返本有回造化之大功真濟世之仙方也兼治一切虛勞紫河車一具即產婦胞衣用米泔洗滌汙濁以新瓦二片合定上下用文武火炕干為未聽用婦性嫌惡勿與知之密將藥於別室中修合與服亦不要言致生疑惑人參上揀一兩半黃耆蜜炙當歸酒洗各一錢白朮土炒芍藥川芎熟地黃白茯苓牡丹皮各八錢肉桂炙甘草各五錢上將熟地黃另搗外余藥共為細末和搗為丸如梧桐子大不成加老米爛飯搗之每服六七十丸酒或湯任下未產之先備制各藥為末候產後便合為妙奪命丸治產婦血寒凝滯胎衣不下牡丹皮八錢乾漆黑附子當歸尾各三錢大黃為末八錢好醋熬膏上為末以大黃膏同雞子白搗勻和丸梧桐子大酒急吞下五十丸即下歸尾牛膝湯治胞衣不下當歸尾二錢川牛膝五錢酒洗木通五錢滑石四錢冬葵子一錢半水煎連服二劑即下三蛻散治胎衣不下蛇蛻一條蠶蛻紙一方蟬蛻四十九個上用瓷罐內燒閉存性研為細末順流水調下花蕊石散治產後敗血未盡惡露攻心子死腹中胎衣不下又能治一切跌打損傷外敷內服大有神效花蕊石兩半研末硫黃四兩研末上二味和勻入固濟罐內燈盞封口百眼爐上前文後武火煉三柱香冷定取下過宿方開取出研為細末小瓷罐盛之塞口每服一錢好酒童便調下黑神散治產後惡血未盡或胎衣不下血氣攻心腹痛不止及血迷血暈等證黑豆炒熟半升熟地黃當歸酒洗肉桂去粗皮赤芍藥乾薑炮炙甘草蒲黃各四兩上為細末每服二錢酒和童便調下清魂散治產後血暈不知人事此藥去瘀血生新血澤蘭葉荊芥穗各四兩川芎二兩人參一兩甘草八錢上為細末每服二錢酒或蔥湯調下滑澀湯治產後血積未絕悶亂氣閉欲絕紅花胚子者一兩上酒二鍾煎一鍾烏梅湯二匙並服口噤灌之當歸赤芍藥各二錢肉桂一錢定痛散治惡血未絕酒水共鍾半姜三片煎八分熱服四物一黃散治產後腹中作痛血積成塊此藥最效當歸酒洗川芎熟地黃白芍藥酒炒半兩蒲黃炒二錢半上為細末每服二錢食前溫酒調下當歸血竭丸治前證當歸酒洗血竭蓬莪朮炮白芍藥酒洗各二錢五靈脂四兩上為細末醋糊為丸梧桐子大每服五六十丸食前溫酒送下一方單用五靈脂半生半炒為末酒下二錢產寶黑龍丹治產後一切血痛危急欲死及胎衣不下但灌藥得下者遂安五靈脂當歸川芎熟地黃高良薑各五錢上咀曬極干以固濟小罐盛之燈盞封口嚴密以文武火煅一柱香放涼處退火毒取出藥如黑糟研細入後藥同丸花蕊石另研二錢琥珀另研一錢乳香另研錢半百草霜五錢共前煅過藥研勻醋糊丸彈子大每服一丸用薑汁好酒章便半盞將藥一丸於炭火中燒淬入酒便內調化頓服立效黑龍丹序仲氏嫂金華君在秦產七日而不食始言頭疼而心痛既而目睛痛如割如是者更作更止相去瞬息間每頭痛甚欲取大石壓食久漸定心痛則以十指抓壁欲死目復痛即欲以手自剜取之如是者旬日國醫三四人郡官中善醫亦數人相顧無以為計且言其藥犯芎可以愈頭痛其藥犯薑黃可以治心痛率皆悠悠不根之言竟不知病根所起病者益困醫者術窮予度疾勢危急非神丹不能愈須進黑龍丹仲氏尚猶豫兩日不食恐不勝任予黃昏進半粒疾少間中夜再進藥下寐如平昔平旦一行三升許如蝗蟲子疾減半巳刻又行如前則頓愈矣遺荊釵輩視之奄殆無氣午後體方涼氣方屬乃微言索飲自此遂平復大抵產後以去汙血為先血滯不快作禍若是世人不諸此理老媼中醫不識疾病之根豈得無夭枉者不遇良醫終抱遺憾今以黑龍丹廣濟施人俾世之人感其效而用之得盡天年非祈於報者所冀救疾苦存性命爾崇寧元年五月五日郭杶序四味湯治產後一切諸疾腹痛頭痛身痛更宜服之產後就吃一服尤妙血不滯疾不作當歸玄胡索血竭沒藥上各等分以血竭沒藥另研為末當歸玄胡另研末和一處每服二錢熱酒童便各半調下八味理中湯治產後氣血俱虛汗出嘔吐百日可服壯氣補虛白朮一兩炒炙甘草七錢人參白茯苓乾薑炒滑石麥芽炒神麯炒各五錢上為細末米糊丸梧桐子大每服三四十丸食前薑湯送下有痰加半夏曲仲景羊肉湯治產婦腹中寒痛血氣不足虛弱甚者及寒月生產寒氣入於產門手不可犯臍下脹滿此為產後之寒證也精羯羊肉半斤當歸陳皮各二兩生薑一兩上水四碗煮至二碗去渣加蔥椒鹽分作二服豬腰飲治產後褥勞寒熱如瘧自汗無力咳嗽頭痛腹痛俱效豬腰一對白芍藥酒炒當歸各一兩上以二味藥用水三碗煎至二碗去渣將豬腰切作骰子大塊入藥湯入晚米一合香豉一錢加蔥椒鹽煮稠粥空心日服一次神效小調經湯治產後敗血凝積令人浮腫不可作水治俱用此藥行其氣血浮腫自消琥珀沒藥桂心當歸芍藥各二錢麝香二分細辛五分上為細末每服錢半薑湯溫酒調下雄漆膏治產後一切血痛兒枕諸痛如神生漆一兩火熬極熟入雄末調勻雄黃一兩研末上以瓷盞熬漆熟入雄末和膏得所以油紙覆之勿染塵每服五分滾酒化開調勻服雄黃湯治產後玉門不斂陰戶突出硫黃一兩菟絲子吳茱萸各七錢蛇床子五錢上研勻每服四錢水一碗煎湯頻洗之自收治案三條一醫宿客店治店婦數日臨產不生下體俱冷無藥甚窘教取椒橙葉茱萸共煎湯一盆令產婦以凳坐盆內薰洗良久小腹皆熱氣溫血行遂產一方產於寒月久久寒冷不產昏悶以紅花煎湯淋洗產門小腹甦醒遂生一方以紫蘇煎湯薰洗大抵遇嚴寒時月產久傷冷氣血必凝此薰洗之法亦要法也外以淋湯內以羊肉湯果效盛暑當產二三日大發熱其脈虛疾而大惡露不行敗血攻心狂言呼叫奔走不可禁者用乾荷葉一個濕透入罐生地黃牡丹皮各三分煎濃湯調下蒲黃二錢一服即定敗血下遂安易簡諸方十六條一方治產後胞衣不下黑豆一合炒熟醋煮之五七沸去豆服醋一盞作三四次飲之以熱手摩產婦小腹順摩即下一法胎衣不下取夫單衣蓋井上立下一方用澤蘭葉浸酒服其酒以錘燒熱淬之方浸為妙一方治產後子官不斂用荊芥藿香椿根白皮煎湯薰洗神效一方治產後百病名二神散用血竭沒藥等分輕手研頻篩再研取盡為度每服二錢童便酒各半用二杯調下產後服之百病不起惡露自通一法產後子腸不收外用枳殼湯訶子五倍子白礬煎湯薰洗若不收再灸頂心百會穴數壯即上一方產後下血不止用石菖蒲煎湯調蒲黃末一錢止一方用百草霜一二錢調酒服即止一方用桑白皮煎湯加薑汁一二匙飲之即止一方治產後血不幹或一月之後水血如灰汁流而不斷久則成滯用竹紙楮皮紙各五七張燒灰荊芥穗一握半夏半錢酒水同煎食前服一方治小產後血不盡用鹿角屑一兩豆豉二合水三升先煮豉五七沸去豉入鹿角屑再煮數沸頓服一方治產婦諸痢疾用韭白多煮羊肉食之一方治產後中風口噤用芥菜子一兩研末溫酒調下二錢效一方用雞乾白屎酒炒煎服一方用獨活甘草乾薑水煎服一方用獨活甘草乾薑水煎服一方用荊芥末黑豆煎酒調下二錢產後褥勞方產後虛羸喘促如瘧名曰褥勞用豬腰一對白糯米三合豆豉五合綿裹蔥白一升人參當歸水三升煎八合作二三服一方用當歸羊肉湯大補產後虛勞產後褥勞虛汗出不止用人參黃耆白朮白茯苓麻黃根牡蠣各三錢用母雞一雙去毛雜淨水六七碗用藥煮至三碗任意服一方治產後血露未絕腹痛用玄胡索為末熱酒調服三錢效一方用五靈脂末二錢熱酒調服一方用醃蟹殼燒灰為末酒調一二錢一方治產後血奔心用熱酒加生地黃汁一杯和勻服一方用鬱金為末酒調二錢產後二十餘日頭大痛不可忍用補中益氣湯方見內傷加川芎細辛藁本蔓荊子水煎服立止產後乳汁方產後血氣虛弱乳汁衰少用豬蹄湯豬蹄一副通草二兩川芎一兩甘草一錢穿山甲十四片炒將豬蹄淨洗依食療法切斷用水六碗同通草等藥煎再加蔥姜約煮至三碗取汁飲之忌冷物要吃羹湯助其氣血乳汁自多要避風寒夏月不可失蓋時用蔥洗乳為佳產婦乳汁不來其原有二一因氣血不足乳汁不來者用豬蹄湯之類是為虛者補之一因肥胖婦人痰氣壅盛乳脈滯塞而不來者漏蘆湯之類是為盛者行之漏蘆湯治肥盛婦人脈滯壅結不行乳汁少用漏蘆二兩蛇蛻一條土瓜根十根切片炒焦共為末酒調下二錢一方用鍾乳粉二錢漏蘆湯調下一方用八物湯加黃耆漏蘆天花粉木通陳皮先煮豬蹄汁煎藥服一方用栝蔞根為末酒調下二錢一方多服萵苣湯並食其菜妙又用萵苣子炒穿山甲煅為末酒調一方用赤小豆煮汁多服之乳如泉流補遺附斷產方法夫斷胎一法非醫家之本心何則天地之大德曰生太上好生而惡殺今而用此方豈仁人之心哉蓋情有不容已者有生育太多母病其難產有娼尼不欲育產即棄之溝中又為仁人之不忍見也若不立法以順人情誠有害母之大均為傷生萬不得已而補方於卷末皆其平和簡易之藥若用虻蛭水銀狼毒等藥並不載入觀者審之千金斷產方四物湯一劑蕓薹子一撮紅花三錢水盞半煎八分行經過後空心服則不成胎小品方斷產墮胎有驗故蠶蛻紙方圓二尺上燒為末空心酒調服終身不受胎廣濟下胎方並下死胎有效天花粉四兩肉桂牛膝豆豉各三兩上咀水七碗煎至二碗半分三服每服後一時遠又進一服小品扶羸方虛弱人慾下胎宜用此人參粉草川芎肉桂乾薑蟹爪黃芩桃仁上等分每服一兩水二鍾煎八分空心服未動再服千金易簡方大麩曲五升漬酒一斗煮二三沸分五服隔宿勿食空心服之以為驗
