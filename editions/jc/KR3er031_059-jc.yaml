body:
  text: 卷之五十九腳氣門病機敘論至真要大論曰太陰之勝大氣內菀流散於外足脛胕腫通評虛實論曰谷入多而氣少濕居下也又云清濕襲虛病起於下又云濕淫於內以苦發之又云當風取涼醉以入房能成此疾異法方宜論曰北方者其地高陵居風寒冰冽其俗飲潼酪而肉食凡飲潼酪者以飲多速飲為能又曰因而大飲則氣逆又曰飲食入於陰行氣為陽乃返陰道是為逆也腳氣總屬脾腎二經寒濕四腳氣腎之外候司於下體者也腎屬水而主寒化寒水傷人腎先受之水濕居下腳先受之飲食入胃脾濕下流注於足而不散皆成腳氣或因外感風寒喜濕之邪注久而成此疾得病之始人便不覺因他病發動或奄然大悶經三兩日方覺之先從腳起或緩弱痛痹行起忽倒或脛腫滿或足膝枯細或心中忪悸小腹不仁小便秘澀或舉體筋骨痠疼或惡聞食氣見食嘔吐或胸滿氣急壯熱憎寒傳足六經外證與傷寒類焉但卒然腳痛為異耳內經名厥病至漢名為緩風宋齊後始謂之腳氣名雖不同其實一也經曰飲食自倍腸胃乃傷夫胃氣不能施行脾氣不能四布故濕下流乘於腎加之醉以入房陰虛勞弱遂成腳氣孫真人云古人少有此疾白永嘉南渡衣冠之人多有之此皆濕鬱於內所致也又云凡四時之中皆不得久坐久立濕冷之地亦不得因酒醉汗出脫衣洗足當風取涼皆成腳氣暑月久坐久立濕地則濕熱之氣蒸入經絡病發必熱而四肢痠疼煩悶胕腫寒熱此皆山野農夫多有久濕傷於外所致也腳氣兼別證最多巢氏病源云凡腳氣病皆因感風毒所致得此病多不即覺或先無他疾而忽得之或因眾病後得之初甚微飲食嬉戲氣力如故當熟察之其狀自膝至腳有不仁或痹或淫淫如蟲所緣或腳膝及脛指洒洒爾或腳屈弱不能行或微腫或酷冷或疼痛或緩縱不隨或攣急或至困能飲食者或有不能者或見飲食而嘔吐惡聞食氣或有物如指發於踹腸逕上衝心氣上者或舉體轉筋或壯熱頭痛或胸心沖悸寢處不欲見明或腹內苦痛而兼下者或言語錯亂有善忘誤者或眼濁精神昏憒者此皆腳氣之兼病也若治之緩便上入腹或腫或不腫胸脅滿氣上便殺人急者不全日緩者或二三月初得此病便宜速治之不同常病又云風毒濕氣初從腳上後轉入腹而乘於氣故氣上也或血氣虛弱受風寒濕毒與血並行膚腠故令痹弱或風濕毒氣與血相搏正氣與邪氣交擊而正氣不宣散故疼痛是名不仁或挾風毒則搏於筋腎氣不能宣通水液不傳於小腸致壅溢臟腑臟腑溉漬於肌膚之間故腫滿也南方腳氣多是外邪所感東垣云千金秘錄總謂南方皆系卑濕霧露所聚之地其實腠理疏陽氣不能外固因而履之則清濕襲虛病起於下此由氣血衰弱受清濕之邪氣與血並行膚腠邪氣盛正氣少故血氣澀澀則痹虛則弱故令痹弱也後人名曰腳氣孫真人所謂立坐濕地而久不覺感受後因他病而作其必南方之人歟北方腳氣多為內郁所因經曰北方者其地高陵居風寒冰冽其俗飲潼酪以肉食凡飲潼酪以飲多速飲為能又云因而大飲則氣逆夫乳酪醇酒為濕熱之物飲之屬也加以奉養太過亦滋其濕水性潤下氣不能呴故下疰於足脛積久而成腫滿疼痛此飲食之濕熱流於下也加之房事勞倦脾腎愈虛而致腳氣當作內因處治其必北方之謂歟江東嶺南腳氣多因瘴毒之氣經曰南方其地下水土弱霧露之所聚也江東嶺南率如此春夏之交山川蒸菀風濕毒氣為甚足或腫痛遂成瘴毒腳氣其候則腳先屈弱漸至痹疼脛微腫小腹微脹頭痛煩心痰氣壅逆晡作寒熱便溲不通甚者攻心而勢迫治之誠不可緩支法存所以留意經方偏善此術者豈非江東嶺表此疾得之多歟腳氣主於水濕辨發明曰腳氣之疾實水濕之所為也蓋濕之害人皮肉筋脈而屬於下然亦有二焉一自外感一自內致其治法自應不同故辨析而論之其為病也有證而無名自晉蘇敬始名之而關中河朔無有也惟南地卑水寒其清濕之氣中於人必自足始故經曰清濕襲虛則病起於下又曰足脛腫曰水太陰所至為胕腫此但言其濕自外感者也所治之法故多辛溫發散之劑自內而致之治法則未有也無怪乎或曰令之北方其地則風甚高寒其人則腠理致密而復多此疾者豈是地之濕氣盛之而為邪且自外感傷於足之六經故其狀如傷寒治從發散其邪也故經治之多以艾焫為佳以導引濕氣出外今言內致其可以六經發散為言治法何以不備答曰自內而致脾濕之下流而注足腳脾屬四肢濕氣下流先從陰也如人之脾虛泄瀉飲食所傷則足太陰脾經先腫而後及於面目身體豈非水濕內溢而然耶腳氣內致亦由是也夫始因脾濕下溢出於經則亦可從發散為治也如小兒痘疹證其因多稟五臟之淫火治法當以托裡而達於表則痘能出而證安矣然則因內而致不可以言表乎大抵因證施治此萬全也因於外者以發散為主因於內者以疏利為主南人亦有因於內致者也安得不從內治耶脈候陳無擇曰腳氣不專主於一氣亦不專在一經故與中風寒暑濕為異耳兼有所雜生諸病未易分別須尋三陰三陽病所在後察脈之虛實為治自汗走疰為風勝無汗攣急掣痛為寒勝腫滿重著為濕勝煩渴躁熱為暑勝四氣兼中者但推其多者為勝分其表裡以施治也脈浮為風緊為寒緩細濡弱為濕洪數者為熱遲澀者為寒沉而弦者亦為風沉而緊者為寒沉細為濕沉數為熱脈浮見於陽者在外宜發散脈沉見於陰者宜疏利腳氣病恍惚妄言嘔吐不食睡臥不安左寸脈乍大乍小乍有乍無者死治法治腳氣以去濕散壅為主腳氣是濕著為病氣滯而成者也楊大受云腳氣是為壅疾當用宣通之劑使氣不能成壅也如羌活導滯湯之類故宜通用蒼白朮防己南星以去濕羌獨活木瓜檳榔行氣利關節以去壅佐以木通牛膝引經當歸生地黃和血此必用之藥也如東垣當歸拈痛湯之類甚健余因證之虛實寒熱表裡輕重而施治之此醫之通變活法也治腳氣發散疏下貴乎得中腳氣之病若非外受寒濕必是內之濕熱下流發散固須用太過則傷衛疏下以去壅太過則傷脾恐氣不能上升反下疰而為病也發散不及則邪氣留連而寒熱不散疏下不及則濕熱壅遏而腫痛不消全在量其勢之輕重而處治也腳氣宜砭刺楊氏云腳氣是為壅疾治當以宣通之劑使氣不能成壅也若壅既成而盛者砭惡血以消腫熱經曰蓄則腫熱砭刺之後以藥治腳氣所當禁活人書云凡腳氣服補藥及用湯渫洗者皆醫之禁也為此洗者其必有當禁有不必禁要在應變而施也補藥之當禁禁其始也發散疏下之後而病屬虛者豈可禁乎渫洗之當禁禁其外感濕氣乘虛襲入為腫者內濕下疰腫痛不能外達豈可禁乎補以資其弱也洗以導其滯也夫何禁之有有當禁於未病之先也如外臺秘要云第一忌嗔嗔則心煩煩則腳氣發又禁大語大語則傷肺肺傷病亦發又不得露足當風入水以冷水洗足兩腳脛尤不宜冷雖暑月當著帛袴至冬寒加綿令兩脛及腿溫暖微汗尤佳依此將息腳氣自消而無邪氣留連之患夏月腠理開不宜當風取涼涼處坐憩須得動勞關節令其氣暢此養生之要拒邪之法也每食後行二五百步疲倦便止腳中惡氣隨即下散雖浮腫氣不止也發明云凡飲酒及乳酪勿使過度過則傷脾下疰於足脛胕腫遂成腳氣甚不可縱欲則發凡飲食之後宜緩行如上法不坐濕地不著濡衣自免腳氣藥方胸氣發表諸劑局方五積散治寒濕流注經絡腳膝腫滿疼痛等證方見寒門東垣羌活勝濕湯治濕註腳腿腫痛寒熱交作不能行步方見濕門三因麻黃左經湯治風寒暑濕流注足太陽經腰足攣痹關節腫痛憎寒發熱無汗惡寒或自汗惡風頭痛惡食麻黃葛根細辛羌活白朮茯苓防風防己肉桂甘草各等分上咀每服五錢薑棗煎食遠服半夏左經湯治足少陽經為風寒暑濕流注發熱連及腰脅痛頭目眩嘔吐不食熱悶煩心腿痹緩縱不隨半夏葛根柴胡細辛各八分白朮茯苓麥門冬桂枝防風甘草黃芩各五分乾薑三分上咀水盞半薑棗煎服熱悶加竹瀝喘急加桑白皮杏仁六物附子湯治四氣流注於足太陰經骨節煩疼四肢拘急自汗短氣小便不利手足或時浮腫附子肉桂防風白朮茯苓甘草炙各七分上咀水盞半薑棗食遠煎服濟生檳榔湯治一切腳氣散氣疏壅檳榔香附子陳皮紫蘇葉木瓜五加皮甘草炙各七分上咀水盞半姜煎八分服大腹皮散治諸腳氣腫痛小便不利大腹皮一錢檳榔荊芥穗烏藥陳皮各七分紫蘇葉蘿蔔子炒各五分沉香五分桑白皮枳殼炒木瓜各八分紫蘇子炒研五分上咀水盞半姜煎八分食遠服澹寮方治腳氣入腹衝心疼痛腫滿大小便秘沉香木香羌活白芍檳榔各五分蘇葉蘇子炒木瓜各七分青皮枳殼撫芎甘草各三分上咀作一服水盞半姜煎食遠服東垣當歸拈痛湯治濕熱腳氣為病肢節煩疼背沉重胸脅不利兼遍身疼痛下注足脛腫痛不可忍人參苦參升麻葛根蒼朮各四分羌活甘草炙黃芩酒炒茵陳酒炒各一錢防風當歸身知母鹽酒炒澤瀉豬苓白朮炒各五分上咀水二盞煎一盞空心溫服局方換腿丸治足三陰經為風寒暑濕之氣所乘發為攣痹緩縱上攻胸脅肩背下至腳膝疼痛足心發熱行步艱辛薏苡仁南星防己石斛檳榔萆薢石楠葉羌活防風木瓜各四兩川牛膝酒浸當歸天麻續斷各一兩黃耆一兩半上為末酒糊丸梧桐子大每服五十丸空心鹽湯下腳氣疏里劑宣明導水丸治腳氣胕腫疼痛或發熱濕熱盛者除濕丹治內傷腳氣腫痛二方見濕門東垣開結導引丸檳榔氣飲食不消必下痞悶白朮茯苓陳皮半夏各一兩神麯炒麥芽炒枳實炒澤瀉各半兩乾薑巴豆霜各二錢上為細末蒸餅丸梧桐子大每服三十丸空心溫水下局方木香檳榔丸治食積氣滯腳氣衝胸心腹飽悶方見氣門三花神佑丸治濕熱流注腳氣浮腫肢節煩疼步重墜方見痰飲門搜風順氣丸治乾澀腳氣方見風門搜風丸治腳氣內壅大黃檳榔枳殼炒各半兩黑牽牛取頭末二兩上為末米糊丸梧桐子大每服五十丸食前米飲下木香行氣散治腳氣風寒濕氣走注及腳生濕瘡此藥止痛去風濕行氣木香二錢半黃耆木通桑白皮白朮各半兩牽牛兩半上為末每服二錢五更初酒調服作丸服亦可胸氣表裡兼用劑三因大黃左經湯治四氣流注足陽明經使腰腳赤腫痛不可行大小便秘或惡聞食氣喘滿自汗細辛茯苓羌活大黃甘草炙前胡枳殼炒厚朴炒黃芩杏仁各五分上水盞半姜三片棗一枚煎七分食遠服加味敗毒散治足三陰經受熱毒氣流注腳踝上焮赤腫痛寒熱如瘧或無汗惡寒自汗惡風羌活獨活前胡柴胡各五分枳殼川芎桔梗甘草人參各四分茯苓大黃煨蒼朮各一錢上水盞半姜三片棗一枚煎八分食遠服東垣羌活導滯湯治腳氣初發一身盡痛或肢節腫痛便溺阻隔先以此藥導之後用當歸拈痛湯羌活獨活漢防己當歸各錢大黃酒蒸一錢枳實五分上水盞半煎七分服腳氣調理氣血諸劑良方雞鳴散治腳氣第一品藥不問男女皆可服如感風濕流注腳痛筋脈腫大痛不可忍其效如神檳榔七枚陳皮木瓜各一兩吳茱萸二錢生薑連皮桔梗各半兩紫蘇三錢上為粗末分作八服隔宿用水三大碗慢火煎至碗半去渣再用水二碗煎一碗以兩次煎汁相合安頓床頭次日五更分二三服只冷服冬月略溫亦得服後用餅餌壓下如服不盡留次日漸漸服亦可服此藥至天明大便當下黑糞一碗許即是原腎家感寒濕毒氣下瀉也至早晚前後痛住腫消是效木瓜湯治腳氣乾木瓜大腹皮紫蘇木香羌活甘草炙各一錢茯苓陳皮各八分上水二盞煎一盞空心服透骨丹專治腳氣川烏炮羌活沉香乳香另研川芎檳榔木瓜各一兩木香兩半白茯苓二兩上為末曲糊丸梧桐子大食前薑湯下六十丸沉香大腹皮散治腳氣腫滿沉重疼痛筋脈不利此證皆由濕氣停滯經絡服之則血氣和平腳輕利為效沉香檳榔烏藥桑白皮炒木通茴香甘草紫蘇子陳皮白茯苓荊芥穗紫蘇葉各一兩棗兒檳榔一兩枳殼炒半兩上咀每服五錢水一盞姜五片蘿蔔五片煎七分食前溫服日進二服十日後日進一服病愈即止如無蘿蔔用卜子一錢炒研如是大便乾燥即服加減神功丸立效散療苦腳氣攻心此方消腫甚效及治暴腫檳榔七枚姜二兩陳皮吳茱萸紫蘇木瓜各一兩上水三升煎一升三合分作二服沉香湯治腳氣攻心煩悶氣促腳痠疼沉香五分赤芍藥錢半木通五分紫蘇一錢檳榔五分吳茱萸三分上水盞半姜三片煎八分不拘時溫服三因神應養真丹治厥陰經為四氣進襲左癱右瘓痰涎半身不遂手足頑麻語言蹇滯腳膝榮氣凝滯遍身疼痛四物湯加羌活天麻為細末蜜丸雞子大每服一丸木瓜菟絲子浸酒下金匱八味丸治足少陰經腳氣入腹腹脹疼痛氣喘腎經虛寒致此證最急以腎乘心水剋火老人病此死不旋踵宜服此方見虛損門加味四斤丸治血少腳氣足痿痠疼方見痰門三因紫蘇湯治腳弱上氣陰陽交錯清濁不分上重下虛中滿喘急嘔吐自汗無復紀律紫蘇子炒半夏制各一錢前胡厚朴薑汁炒甘草炙當歸身各七分陳皮肉桂各四分上水盞半姜三片棗一枚煎七分不拘時服三因獨活寄生湯治肝腎虛弱風濕內攻兩足弱痿痹攣痛方見腰痛門勝駿丸治元氣不足為寒濕之氣所襲腰足攣拳腳面連指走痛無定筋脈不伸行步不隨常服益真氣壯筋骨附子一枚炮當歸酒洗天麻牛膝酒洗木香酸棗仁炒熟地黃防風各二兩木瓜四兩羌活乳香各半兩麝香二錢全蠍炒沒藥甘草各一兩上為末用生地黃三斤研如泥入無灰酒四升煮爛如膏以前藥和勻杵令堅每兩作十丸細嚼臨睡酒下如冬月無地黃煉蜜丸梧桐子大每服五十丸良方紫蘇散治腳氣風毒腳重腫痛紫蘇桑白皮茴香炒木通各七分枳殼錢半羌活獨活荊芥甘草炙青皮木瓜各五分大腹皮六分上水盞半姜三片蔥白一莖煎七分食遠服獨活湯治腳氣獨活麻黃去節川芎熟附子牛膝黃耆蜜炙人參乾薑木香當歸白芍藥白茯苓辣桂杜仲白朮甘草炙各等分上咀每服四錢水二盞姜三片棗二枚煎一盞食前溫服四斤丸治腎經虛寒腳氣攻痛木瓜天麻肉蓯蓉酒洗牛膝酒洗焙各一斤上用無灰酒五升浸春秋各五日夏三日冬十日足取出焙乾再入附子泡去皮臍二兩虎骨酥炙二兩上為末用沒藥酒打糊丸梧桐子大空心煎木瓜酒鹽湯下五十丸常服補虛除濕壯筋骨石南丸治風毒腳弱重墜痛痹脛腫生瘡足心隱痛不能著地腳膝不能屈伸上攻心腹頭面二便秘澀赤芍藥五加皮麻黃陳皮赤小豆牛膝杜仲炒大腹皮川芎各二兩杏仁去皮尖炒黑牽牛石南藤各三兩萆薢獨活木瓜各四兩上為末酒浸蒸餅為丸梧桐子大空心木瓜湯吞下二三十丸茱萸丸治腳氣入腹喘急欲死吳茱萸泡木瓜各等分上為末酒糊為丸梧桐子大每服五十丸至百丸空心酒飲任下或以木瓜蒸爛研膏為丸尤妙此方內加大黃名三將軍丸直指二十四味輕腳丸治腳氣通用當歸酒洗川芎萆薢鹽水煮羌活杜仲制石南藤薏苡仁大檳榔華陰細辛枳殼各一兩蒼朮炒五加皮防風獨活續斷洗牛膝酒浸威靈仙海桐皮木香木瓜麻黃五靈脂沒藥另研各三分滴乳香半兩上為末酒浸糕為丸梧桐子大每服五十丸枳殼木瓜湯下海桐皮酒治風毒腳氣膝脛疼痛海桐皮五加皮川獨活枳殼炒防風杜仲薑製牛膝酒浸薏苡仁炒各兩半生地黃二兩半上為末用綿包以醇酒一斗春浸七日冬浸十四日每日空心溫服一盞午服一盞丹溪防己飲治腳氣白朮木通防己檳榔川芎甘草梢犀角蒼朮鹽水炒生地黃酒浸黃柏酒炒各等分大便實加桃仁小便澀加牛膝有熱加黃芩黃連大熱及時令熱加石膏有痰加竹瀝薑汁如常腫者專主濕熱另有對證方丹溪蒼朮黃柏丸治濕熱食積痰飲流注腳氣蒼朮鹽水炒黃柏鹽水炒防己南星川芎白芷犀角檳榔各等分血虛加牛膝龜板為末酒糊丸服肥人加痰藥健步丸治腳膝無力腫痛難行當歸尾芍藥陳皮蒼朮牛膝各一兩生地黃吳茱萸條芩各半兩桂枝二錢大腹子三個上為末蒸餅丸梧桐子大每服一百丸空心白朮木通湯下丹溪檳榔滑石散治濕痰腳氣大便滑泄蒼朮二兩防風一兩檳榔川芎各六錢香附八錢條芩滑石各四錢甘草三錢上為末或丸或湯皆可服應痛丸治腳氣痛不可忍此為劫劑赤芍藥炮去皮草烏炮去皮尖等分為末酒糊丸空心白湯下十丸丹溪治婦人足脛腫方紅花酒洗蒼朮牛膝生地黃黃柏南星草龍膽川芎有筋動於足大指上至大腿近腰結了乃因奉養厚遇風寒宜四物湯加酒芩紅花蒼朮南星姜煎服集要二神湯治一切風寒濕熱足膝腫痛腳骨作熱痛雖一點能令步履艱辛一切腳氣百用百效蒼朮制黃柏制各三錢半水煎空心服日二次洗藥導氣除濕湯專洗腳腫疼痛威靈仙防風荊芥地骨皮當歸升麻白芍藥朔藋葉上咀各五錢水二斗熬一斗五升去渣乘熱淋洗無時礬石湯治腳氣衝心礬石三兩漿水一斗五升煎三五沸浸腳良良方防風黃耆湯熏洗腳氣防風半兩荊芥黃耆木通蛇床子夢葉各一兩上為粗末濃煎湯閣腿在桶上熏令通手方洗須是露出腳指不要洗鷺鷀湯鷺鷀藤一名忍冬藤即金銀花藤蘇方木上等分入澱粉少許每用一兩水五碗煎數沸先熏候通手洗足踏丸治腳氣腫滿痛連骨髓烏頭三兩炮去皮臍樟腦二兩上為細末釅醋為丸彈子大每置一丸焚於爐中腳踏爐心上衣被壅蓋出汗為妙敷藥丹溪法治腳氣腫痛芥菜子白芷等分上為末薑汁和敷一方白芷蒼朮羌活各半兩細辛二錢半為末薑汁調敷一方治腳氣止痛大皂角豬牙皂角木香各等分上為末醋調先於不腫處塗之截斷毒氣不令上衝次塗下腫留指尖不塗仍削去足爪甲以出毒氣一方草烏白芷防風獨活羌活各等分上為細末生地龍數條研爛米醋調敷單用草烏末調酒敷赤小豆南星末薑汁調貼亦可時吃熟蘿蔔令飽以下氣飛蘿面醋調塗又法以黑牛糞用滾湯調開塗於痛處用布包之暖處蓋之其痛立止椒艾囊治腳氣極效及避一切腳氣風氣毒氣艾葉揉半斤川椒一斤淨草烏為粗末二兩上以三味和裝成套如包袱里足底及足脛不得用履即用火踏踏於上下有微火椒艾得微火自然熱氣入足而寒濕氣諸風毒氣皆疏散矣痛甚者立止痛止後仍要三二日一為之或每夜包之達旦去之用此方法無不效者易簡諸方太平聖惠方治腳氣及風寒濕痹四肢攣拳腳腫不可踐地用紫蘇一兩杵碎水二升研取汁以蘇子汁煮粳米二合作粥和蔥豉姜食之一方治腳氣用鹽炒熱敷患處少時用湯洗外臺秘要治腳氣衝心煩悶以糜稻穰一二斗內釜中多煮濃汁去渣內椒末一升再煎十餘沸置盆中漬腳洗腳三五次瘥衛生方治腳氣用無名異末化牛膠調勻貼痛處一方治腳氣痛不可忍以童便或自者用馬桶一個熱浸二腳桶口以紙單衣被類隔其氣冷則又溫簡要濟眾方治腳氣連腫痛久不瘥黑附子一個去皮臍生用搗為末薑汁調如膏塗腫藥干再調塗之腫消為度一方治腳氣頭面浮腫心腹脹滿小便澀少馬齒莧和小粳米漿汁煮食之肘後方治風毒腳氣若脛已滿捻之浸指取牽牛搗為末蜜丸如小豆大每服三十丸生薑湯服利小便即愈一方治前證脛腫捻之沒指一小民患此服藥無效一道人教以飲牸牛溺勤飲二三升使小便利即愈千金方治嶺南腳氣從足至脛膝腫滿連骨痛者蓖麻葉切蒸熱薄包二三日易之即消又方治前證用朔藋根搗和酒醋共三分根一分合蒸熟敷腫處一二日消亦治不仁枳葉酒枳葉六十斤細銼以水四石煮取四斗九升以釀五斗米如常法另煮枳葉汁漬米並和釀封七日酒出飲之甚效腳跟痛病機丹溪曰腳跟痛有痰有血熱血熱者四物湯加黃柏知母牛膝之類有痰唾者五積散加木瓜舟車丸除濕湯並治腳跟痛方見濕門
