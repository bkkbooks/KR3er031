body:
  text: 卷之二十三脾胃門病機內經敘論經脈別論曰食入於胃散精於肝淫氣於筋食入於胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於府府精神明流於四臟氣歸於權衡權衡以平氣口成寸以決死生飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也平人氣象篇曰人以水穀為本故人絶水穀即死脈無胃氣亦死所謂無胃氣者但得真藏脈不得胃氣也玉機真藏篇岐伯曰五臟者皆稟氣於胃胃者五臟之本也臟氣者不能自至於手太陰必因於胃氣乃至於手太陰也靈蘭祕典篇岐伯曰脾胃者倉稟之官五味出焉六節藏象篇曰脾胃大小腸三焦膀胱者倉廩之本營之居也能化槽粕轉味而出入者也其華在唇四白其充在肌此至陰之類通於土氣谷入於胃脈道乃行水入於經其血乃成安穀則昌絶谷則亡飲食勞倦則傷脾脾傷則內閉九竅外壅肌肉衛氣散解此謂自傷氣之削也藏氣法時論曰脾病者身重善飢肉痿足不收行善瘛腳下痛虛則腹滿腸鳴飧泄食不化取其經太陰陽明少陰血者又曰病在脾愈於秋秋不愈甚於春春不死持於夏起於長夏禁溫食飽食濕地濡衣脾病者日昳慧日出甚下晡靜脾欲緩急食甘以緩之用苦瀉之甘補之東垣論五臟六腑皆主於脾胃脾胃虛則俱病又云脾胃虛則五臟六腑十二經十五絡四肢百骸皆不得營運之氣而百病生焉又云脾胃虛則元氣不足而諸病變生又云脾胃虛則九竅不通春甫讀東垣諸論詳明內經論百病皆由上中下三焦元氣虛憊及形氣兩虛則百病變生東垣發揮脾胃不足而不能充實三焦百病之所由生也故著脾胃論內外傷辨叮嚀懇切以祛千載之惑誠有功於生民發內經之祕開世醫之盲也奈何今之醫者習矣不察惟執成方指病用藥如刻舟求劍何異哉病之疑似虛實懸壤不察元氣不知脾胃致病之源而惟以瞑眩之藥攻病之標反傷元氣甚至脾胃大壞穀氣絶亡恬不知覺而猶謂病之不去是吾憂也殊不憂絶谷則死與病愈之遲速孰為重輕世醫之昏庸學術不工反致誤人之命有如此噫孰從而知之此春甫所以克己用功私淑老人之旨超脫凡俗極登萬仞探本窮源深得脾胃元氣之妙故投之所向無不如意非敢狂妄自矜實有以得其要領者所以發辭不覺自露圭角好生君子幸其鑑諸張仲景者外感傷寒深知脾胃元氣之旨漢張仲景著傷寒論專以外傷為法其中顧盼脾胃元氣之祕世醫鮮有知之觀其少陽證小柴胡湯用人參則防邪氣之入三陰或恐脾胃稍虛邪乘而入必用人參甘草固脾胃以充中氣是外傷未嘗不內因也至於陽毒升麻湯人參敗毒散化斑湯黃連湯知母葛根湯白通湯理中湯炙甘草湯橘皮湯五味子湯栝蔞根湯建中等湯未嘗不用參耆以治外感可見仲景公之立方神化莫測或者只以外傷是其所長而內傷非所知也此減不知公之論也何今世之醫不識元氣之旨惟見王綸雜著戒用人參之謬説執泥不移樂用苦寒攻泄病之標以至誤蒼生死於非命抑何限耶間有病家疑信相半兩弗之從但不速其死耳直以因循俟其元氣自盡終莫之救而斃者可謂知乎況斯世斯時人物劇繁稟氣益薄兼之勞役名利之場甚至蹈水火而不知恤耽酒色以竭其真不謂內傷元氣吾弗信也觀其雜病稍用攻擊而脾胃遂傷甚則絶谷而死者可以類推矣東垣脾胃勝衰論胃中元氣盛則能食而不傷過時而不飢脾胃俱旺則能食而肥脾胃俱虛則不能食而瘦或少食而肥雖肥而四肢不舉蓋脾實而邪氣盛也又有善食而瘦者胃中伏火邪於氣分則能食脾虛則肌肉削即食㑊也叔和云多食亦飢者虛此之謂也夫飲食不節則胃病胃病則氣短精神少而生大熱有時而顯火上行獨燎其面黃帝針經云面熱者足陽明病胃既病則脾無所稟受脾為死陰不主時也故亦從而病焉形體勞役則脾病脾病則怠情嗜臥四肢不收大便泄瀉脾既病則胃不能獨行津液故亦從而病焉大抵脾胃虛弱陽氣不能生長是春夏之令不行五臟之氣不生脾病則下流乘腎土剋水則骨乏無力是為骨蝕令人骨髓空虛足不能履地是陰氣重疊此陰盛陽虛之證大法云汗之則愈下之則死若用辛甘之藥滋胃當升當浮使生長之氣旺言其汗者非正發汗也為助陽也夫胃病其脈緩脾病其脈遲且其人當臍有動氣按之牢若痛若火乘土位其脈洪緩更有身熱心中不便之證此陽氣衰弱不能生髮不當於五臟中用藥法治之當從臟氣法時論中升降浮沉補瀉法用藥耳若脈緩病怠惰嗜臥四肢不收或大便泄瀉此濕勝從平胃散若脈弦氣弱自汗四肢發熱或大便泄瀉或皮毛枯稿發落從黃耆建中湯脈虛血弱於四物湯中摘一味或二味以本顯證中加之或真氣虛弱及氣短脈弱從四君子湯或渴或小便閉澀赤黃多少從五苓散去桂摘二味加正藥中以上五藥當於本證中隨所兼見證加減假令表虛自汗春夏加黃耆秋冬加桂如腹中急縮或脈弦加防風急甚加甘草腹中窄狹或氣短者亦加之腹滿氣不轉者勿加雖氣不轉而脾胃中氣不和者勿去但加厚朴以破滯氣然亦不可多用於甘草五分中加一分可也腹中夯悶此非腹脹乃散而不收可加芍藥收之如肺氣短促或不足者加人參白芍藥中焦用白芍藥則脾中升陽使肝膽之邪不敢犯也腹中窄狹及急縮者去之及諸酸澀藥亦不可用腹中痛者加甘草白芍藥甘草作甘甘者己也曲直作酸酸者甲也甲己化土此仲景妙法也腹痛兼發熱加黃芩惡寒或腹痛覺寒加桂怠惰嗜臥有濕胃虛不能食或沉困或泄瀉加蒼朮自汗加白朮小便不利加茯苓渴亦加之氣弱者加白茯苓人參氣盛者加赤茯苓縮砂仁氣復不能轉運有熱者微加黃連心煩亂亦如之小便少者加豬苓澤瀉汗多津液竭者勿加之是津液還入胃中欲自行也不渴而小便閉塞不通加炒黃柏知母小便澀者加炒滑石小便淋澀者加澤瀉且五苓散治口渴而小便不利無惡寒者不得用桂不渴而小便自利妄見妄聞乃瘀血證用炒黃柏知母以除腎中燥熱竅不利而淋加澤瀉炒滑石只治竅不利者六一散中加木通亦可心臟熱者用錢氏方中導赤散中滿而腹脹者加厚朴氣不順加橘皮氣滯加青皮一橘皮三氣短小便利者四君子湯中去茯苓加黃耆以補之如腹中氣不轉者更加甘草一半腹中刺痛或周身痛者或裡急者腹中不寬快是也或虛坐而大便不得者皆血虛也血虛即裡急或血氣虛弱而目睛痛者皆加當歸身頭痛者加川芎若頭痛加細辛此少陰頭痛也發脫落及臍下痛加熟地黃豫平昔調理脾胃虛弱於此五藥中加減如五臟證中互顯一二證各對證加藥無不驗然終不能使人完復後或有因而再至者亦由督任沖三脈為邪皆胃氣虛弱之所致也法雖依證加減立方料病不依素問法度耳是以檢討素問難經及黃帝針經中説脾胃不足之源乃陽氣不足陰氣有餘當從六氣不足升降浮沉法隨證用藥治之蓋脾胃不足不同餘臟無定體故也其治肝心肺腎有餘不足或補或瀉惟益脾胃之藥為切經言至而不至是為不及所勝妄行所生受病所不勝乘之也至而不至者謂從後來者為虛邪心與小腸來乘脾胃也脾胃肺中見浮大而弦其病或煩躁悶亂或四肢發熱或口苦舌乾咽乾蓋心主火小腸主熱火熱來乘土位乃濕熱相合故煩躁悶亂也四肢者脾胃也火乘之故四肢發熱也飲食不節勞役所傷以致脾胃虛弱乃血所生病主口中津液不行故口乾咽乾也病人自以為渴醫者治以五苓散謂止煩渴而反加渴燥乃重竭津液以致危亡經云虛則補其母當於心與小腸中以補脾胃之根蒂也甘溫之藥為之主以苦寒之藥為之使以酸味為之臣佐以其心苦緩急食酸以收之心火旺則肺金受邪金虛則以酸補之次以甘溫及甘寒之劑於脾胃中瀉心火之亢盛是治其本也所勝妄行者言心火旺能令母實母者肝木也肝木旺則挾火勢無所畏懼而妄行也故脾胃先受之或身體沉重走注疼痛蓋濕熱相搏而風熱鬱而不得伸附著於有形也或多怒者風熱下陷於地中也或目病而生內障者脾裹血胃主血心主脈脈者血之府也或云心主血又云肝主血肝之竅開於目也或妄見妄聞起妄心夜夢亡人四肢滿閉轉筋皆肝木太盛而為邪也或生痿或生痹或生厥或中風或生怒或作腎痿或為上熱下寒為邪不一皆風熱不得升而木火遏於有形中也所生受病者言肺受土火木之邪而清肅之氣傷或胸滿少氣短氣者肺主諸氣五臟之氣皆不足而陽道不行也或咳嗽寒熱者濕熱乘其內也所不勝乘之者水乘木之妄行而反來侮土故邪入心為汗入肝為泣入脾為涎入肺為痰為嗽為涕為嚏為水出鼻也一説下元土盛剋水至督任沖三脈盛火旺煎熬令水沸騰而乘脾肺故痰涎唾出於口也下行為陰汗為外腎冷為足不任身為腳下隱痛或水附木勢而上為眼澀為眵為冷淚此皆由肺金之虛而寡於畏也夫脾胃不足皆為血病是陽氣不足陰氣有餘故九竅不通諸陽氣根於陰血中陰血受火邪則陰盛陰盛則上乘陽分而陽道不行無生髮升騰之氣也夫陽氣走空竅者也陰氣附形質者也如陰附於土陽氣升於天則各安其分也今所立方中有辛甘溫藥者非獨用也復有甘苦大寒之劑亦非獨用也以火酒二製為之使引苦甘寒藥至頂而復入於腎肝之下此所謂升降浮沉之道自偶而奇奇而至偶者也陽分奇陰分偶瀉陰火以諸風藥升發陽氣以滋肝膽之用是令陽氣生上出於陰分末用辛甘溫藥按其升藥使大發散於陽分而令走九竅也且飲食入胃先行陽道而陽道升浮也浮者陽氣散滿毛皮升者充塞頭頂則九竅通利也若飲食不節損其胃氣不能克化散於肝歸於心溢於肺食入則昏冒欲睡得臥則食在一邊氣暫得舒是知升發之氣不行者此也經云飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺病人飲入胃遽覺至臍下便欲小便由精氣不輸於脾不歸於肺則心火上攻使口燥咽乾是陰氣太盛其理甚易知也況脾胃病則當臍有動氣按之牢若痛有是者乃脾胃虛無是則非也亦可作明辨矣東垣述內經仲景所説脾胃論太陰陽明論云太陰陽明為表裡脾胃脈也生病而異者何也岐伯曰陰陽易位更虛更實更逆更從或從內或從外所從不同故病異名也帝曰願聞其異狀也岐伯曰陽者天氣也主外陰者地氣也主內故陽道實陰道虛故犯賊風虛邪者陽受之飲食不節起居不時者陰受之陽受之則入六腑陰受之則入五臟入六腑則身熱不得時臥上為喘呼入五臟則䐜滿閉塞下為飧泄久為腸澼故喉主天氣咽主地氣故陽受風氣陰受濕氣陰氣從足上行至頭而下行從臂至指端陽氣從手上行至頭而下行至足故曰陽病者上行極而下陰病者下行極而上故傷於風者上先受之傷於濕者下先受之帝曰脾病而四肢不用何也岐伯曰四肢皆稟氣於胃而不得至經必因於脾乃得稟也今脾病不能為胃行其津液四肢不得稟水穀氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉帝曰脾不主時何也岐伯曰脾者土也治中央常以四時長四臟各十八日寄治不得獨主於時也脾臟者常著胃土之精也土者生萬物而法天地故上下至頭足不得主時也陰陽應象論曰人有五臟化五氣以生喜怒悲憂恐故喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽厥氣上行滿脈去形喜怒不節寒暑過度生乃不固玉機真藏論曰脾太過則令人四肢不舉其不及則令人九竅不通名曰重強又通評虛實論曰頭痛耳鳴九竅不利腸胃之所生也調經論曰形有餘則腹脹涇溲不利不足則四肢不用又氣交變大論曰歲土太過雨濕流行腎水受邪民病腹痛清厥意不樂體重煩冤甚則肌肉萎足痿不收行善瘈腳下痛飲發中滿食減四肢不舉又云歲土不及風乃大行霍亂體重腹痛筋骨繇復肌肉瞤酸善怒又云咸病寒中復則收政嚴峻胸脅暴痛下引小腹善太息蟲食甘黃氣客於脾民食少失味五常政大論曰有太過不及太過者薄所不勝乘所勝也不及者至而不至是為不及所勝妄行所生受病所不勝乘之也仲景云人受氣於水谷以養神水穀盡而神去故云安穀則昌絶谷則亡水去則榮散衛消神無所依又云水入於經其血乃成谷入於胃脈道乃行故血不可不養衛不可不和血溫衛和得盡天年矣脈侯內經曰脾胃者土也孤臟以灌四傍者也善者不得見惡者可見其來如水之流此謂太過病在外如鳥之啄此謂不及病在中太過則令人四肢不舉不及則令人九竅不通脈不得胃氣者肝不弦腎不石也平人之常氣稟於胃胃者平人之常氣也人無胃氣曰逆逆者死上部有脈下部無脈為食塞胸中宜吐之寸口洪大按之反澀尺脈亦微而澀或寸口緊如轉索左右無常或滑而數者下之或浮而滑凡脈沉病若傷寒者宿酒宜下短疾而滑酒病浮細而滑傷飲氣口緊盛或浮細而滑疾皆傷飲食關沉而滑為食不消上關沉遲為脾胃虛寒右手脈緊盛者傷食兩關弦大者主脾胃飽脹腹飽脹而脈細者危浮大者可治上關脾胃所主其脈緩大為土氣衝和百病不生但有浮沉洪細長短滑澀則各司其病宜按脈對證而調治之如脾胃脈弦而緊者則是木邪刑土脾胃有積或痛或脹宜保和丸中加柴胡川芎骨皮之類制肝木也洪大者則胃中有火治宜瀉黃散承氣湯之類滑大者則是痰飲宜二陳橘半枳朮丸之類氣不利上急者可吐澀者則是氣血兩虛宜八珍湯或異功散加當歸生地黃之類短澀之脈若在前短為外以候胃主胃弱病不思食噁心嘔吐或惡聞食氣者皆是也在後短為內以候脾主脾病胸膈作脹食下不化反泄瀉之類皆是也治法治諸病以胃氣為主主虛則客邪不退百凡治病胃氣實者攻之則去而疾恆易愈胃氣虛者攻之不去蓋為本虛攻之而胃氣益弱反不能行其藥力而病所以自如也非藥不能去病也主氣不行藥力故也若峻攻之則元氣傷而病益甚若不知機攻盡元氣則死矣如虛熱者服寒涼之藥而熱反盛何也經曰服寒而反熱者奈何岐伯曰不味旺味是以反也胃氣實者雖有病不攻自愈故中醫用藥亦嘗效焉觀夫藜藿野人嘗病不藥自愈可知矣故云治病不察脾胃之虛實不足以為太醫治脾胃病兼治各經夫飲食入胃陽氣上行津液與氣入於心貫肺充實皮毛散於百脈脾稟氣於胃而澆灌於四傍榮養氣血者也今飲食損胃勞倦傷脾脾胃虛則火邪乘之而生大熱當先於心病補脾之源蓋土生火兼於脾胃中瀉火之亢甚是先治其標後治其本也且濕熱相合陽氣日以虛陽氣虛則不能上升而脾胃之氣下流並於腎肝是有秋冬而無春夏春主升夏主浮在人則肝心應之弱則陰氣盛故陽氣不得經營經云陽本根於陰惟瀉陰中之火味薄風藥升發以伸陽氣即陰氣不病陽氣生矣傳云履端於始序則不愆正謂此也四氣調神大論云天明則日月不明邪害空竅陽氣者閉塞地氣者冒明雲霧不精則上應白露不下在人則緣胃虛以火乘之脾胃為勞倦所傷則氣耗而心火熾動血脈沸騰則血病而陽氣不治陰火乃獨炎上而走於空竅以致燎於周身反用熱藥以燥脾胃則謬之謬也胃乃脾之剛脾乃胃之柔表裡之謂也飲食不節則胃先病脾無所稟而後病勞倦則脾先病不能為胃行氣而後病其所生病之先後雖異其受邪則一也胃為十二經之海十二經皆稟血氣滋養於身脾受胃之稟行其氣血也脾胃既虛十二經之邪不一而出假令不能食而肌肉削乃本病也其右關脈緩而弱本脈也而本部本證脈中兼見弦脈或見四肢滿閉淋溲便難轉筋一二證此肝之脾胃病也當於本經藥中加風藥以瀉之本部本證脈中兼見洪大或見肌熱煩熱面赤而不能食肌肉消一二證此心之脾胃病也當於本經藥中加瀉心火之藥本部本證脈中兼見浮澀或見氣短氣上喘咳痰盛皮澀一二證此肺之脾胃病也當於本經藥中兼瀉肺之體及補氣之藥本部本證脈中兼見沉細或見善恐欠之證此腎之脾胃病也當於本經藥中加瀉腎水之浮乃瀉陰火伏熾之藥經云病有逆從治有反正除四反治法不須論之其下云惟有陽明厥陰不從標本從乎中其注者以陽明在上中見太陰厥陰在上中見少陽為説豫獨謂不然此中非中外之中也亦非上中之中也乃不定之辭蓋欲人臨病消息酌中用藥耳以手足陽明厥陰者中氣也在卯酉之分天地之門戶也春分秋分以分陰分陽也中有水火之異者也況乎厥陰為十二經之領袖主生化陰陽足陽明為十二經之海主經營之氣諸經皆稟之言陽明厥陰與何經相併而為病酌中以用藥如權之在衡在兩則有兩之中在斤則有斤之中也所以言此者發明脾胃之病不可一例而推之不可一途而取之欲人知百病皆由脾胃衰而生也毫釐之失則災害立生假如時在長夏於長夏之令中立方謂正當主氣衰而客氣旺之時也後之處方者當從此法加時令藥名曰補脾胃瀉陰火升陽湯東垣用藥宜禁論凡治病服藥必知時禁經禁病禁藥禁夫時禁者必本四時升降之理汗下吐利之宜大法春宜吐象萬物之發生耕耨科斫使陽氣之郁者易達也夏宜汗象萬物之浮而有餘也秋宜下象萬物之收成推陳致新而使陽氣易收也冬周密象萬物之閉藏使陽氣不動也夫四時陰陽者與萬物浮沉於生長之門逆其根伐其本壞其真矣又云用溫遠溫用熱遠熱用涼遠涼用寒遠寒無冀其勝也故冬不用白虎夏不用青龍春夏不服桂枝秋冬不服麻黃不失氣宜如春夏而下秋冬而汗是失天信伐天和也有病則從權過則更之經禁者足太陽膀胱經為諸陽之首行於背表之表風寒所傷則宜汗傳入本則宜利小便若下之太早必變證百出此一禁也足陽明胃經行身之前主腹滿脹大便難宜下之蓋陽明化燥火津液不能停禁發汗利小便為重損津液此二禁也足少陽膽經行身之側在太陽陽明之間病則寒熱往來口苦胸膈痛祗宜和解且膽者無出無入又主生髮之氣下則犯太陽汗則犯陽明利小便則使生髮之氣反陷入陰中此三禁也三陰非胃實不當下為三陰無傳本須胃實得下也分經用藥有所據焉病禁者如陽氣不足陰氣有餘之病則凡飲食及藥忌助陰瀉陽諸淡食及淡味之藥瀉升發以助收斂也諸苦味皆沉瀉陽氣之散浮諸薑附官桂辛熱之藥及濕面酒火料物之類助火而瀉元氣生冷硬物損陽氣皆所當禁也如陰火欲衰而退以三焦元氣未盛必口淡如咸物亦所當禁藥禁者如胃氣不行內亡津液而乾涸求渴飲以自救非渴也乃口乾也非溫勝也乃血病也當以辛酸益之而淡滲五苓之類則所當禁也汗多禁利小便小便多禁發汗咽痛禁發汗利小便若大便快利不得更利大便祕澀以當歸桃仁麻子仁郁李仁皂角仁和血潤腸如燥者則所當禁者吐多不得復吐如吐而大便虛軟者此上氣壅滯以薑橘之屬宣之吐而大便不通則利大便上藥則所當禁也諸病惡瘡及小兒斑後大便實者亦當下之而薑橘之類則所當禁也又如脈弦而服平胃散脈緩而服黃耆建中湯乃實實虛虛皆所當禁也人稟天之濕化而生胃也胃之與濕其名雖二其實一也濕能滋養於胃胃濕有餘亦當瀉濕之太過也胃之不足惟濕物能滋養仲景云胃勝思湯餅而胃虛思湯餅者往往增劇濕能助火火旺鬱而不通主大熱初病火旺不可食以助火也察其時辨其脈審其病而後用藥四者不失其宜則善矣飲食所傷論陰陽應象論曰水穀之寒熱感則害人六腑痹論曰陰氣者靜則神臟躁則消亡飲食自倍腸胃乃傷此乃混言之也分之為二飲也食也飲者無形之氣也飲亦不可謂無形也傷飲者當利小便也因而大飲則氣逆形寒飲冷則傷脾病則為喘咳為腫滿為水瀉輕則當發汗利小水使上下分消其濕解酲湯五苓散生薑半夏枳實白朮之類是也如重而蓄積腫滿者芫花大戟甘遂牽牛之屬利下之此其治也食者物也有形之血也食亦不必謂血也消導之使不停也生氣通天論云因而飽食筋脈橫解腸澼為痔又云食傷太陰厥陰寸口大於人迎兩倍三倍者或嘔吐或痞滿或下利腸澼當審寒熱輕重而治之輕則內消枳朮丸保和丸之類是也重則陰下感應丸集香丸之類是也如傷寒物者半夏神麯乾薑三稜廣朮巴豆之類主之如傷熱物者枳實白朮青皮陳皮麥芽黃連大黃之類上之亦有宜吐者陰陽應象論云在上者因而越之瓜蒂散之屬主之然而不可過劑過劑則反傷脾胃蓋先因飲食自傷又加之以藥太過故脾胃復傷而氣不能化食愈難消矣漸至羸困故五常政大論云大毒治病十去其六小毒治病十去其八凡毒治病不可過之此聖人之深戒也飲食所傷當審寒熱虛實治之治飲食傷當問病人從來稟氣盛衰所傷寒物熱物是喜食之耶不可頓服破氣之藥若乘飲困而傷之耶當益胃氣或為人所勉勸強食之宜損血而益氣也損血益氣則消導之而助脾胃之氣診其脈候傷在何臟可與對病之藥豈可妄瀉天真生氣以輕喪身乎且如先食熱物而不傷繼之以寒物因後食致前食亦不消化而傷者當問熱食寒食孰多孰少斟酌與藥無不當矣譬如傷熱物二分寒物一分則當用寒藥二分熱藥一分相合而與之則榮衛之氣必得周流更有或先飲酒而後傷寒冷之食及傷熱食冷水如此不等皆當驗其節次所傷之物約量寒熱之劑對證與之無不取效飲食所傷虛者不可峻用湯劑凡醫者治飲食傷不問虛實遽用集香感應等丸大熱藥之類下之大便下則物去遺留食之熱性藥之熱性重傷元氣則七神不藏經云熱傷寒正此謂也其人必無氣以動而熱困四肢不舉傳變諸病不可勝數使人真氣日以衰矣若傷生冷硬物世醫或用大黃牽牛寒藥投之隨藥下而所傷之物去矣遺留食之寒性藥之寒性重瀉其陽陽去則皮膚筋肉血脈無所依倚便為虛損之證論言及此令人寒心夫辛薄之藥味無故不可亂服非牽牛而已至真要大論云五味入口各先逐其所喜攻攻者克伐瀉也辛味下咽先攻瀉肺之五氣氣者真氣元氣其牽牛之辛辣猛烈傷人尤甚飲食所傷腸胃當以苦瀉其腸胃可也肺與元氣何罪之有用牽牛之罪有五此其一也況胃主血所生病為所傷物者有形之物也皆是血病瀉其氣其罪二也且飲食傷之於中焦止合克化消導其食重瀉上焦肺中已虛之氣其罪三也食傷腸胃當塞因塞用又曰寒因寒用枳實大黃苦寒之物以泄有形是也反以辛辣牽牛散瀉真氣大禁四也殊不知針經有云外來客邪風寒傷人五臟若誤瀉胃氣必死誤補亦死其死也無氣以動故靜若內傷脾胃而反瀉五臟必死誤補亦死其死也陰氣有餘故躁今內傷腸胃是謂六腑不足之病反瀉上焦虛無肺氣肺者五臟之一數也雖不即死若更旬日之間必暗損人壽數謂如人壽應百歲為牽牛之類朝傷暮損其元氣消耗不得終其天年故經云安穀者昌失谷者亡此之謂也傷寒證有似外感病源云宿食不消由臟氣虛弱寒氣在於脾胃之間故使穀不化也宿谷未消新谷又入脾氣既弱不能磨之則經宿不消令人腹脹氣喘噫氣醋心時復憎寒壯熱頭痛如瘧之狀又似外感傷寒寸口脈浮大按之澀尺脈亦微而澀者則宿食不消也傷酒病鬚髮汗利小水二者兼治夫酒者大熱有毒氣味俱陽只宜發散汗出則愈矣此最妙法也其次莫如利小便二者乃上下分消其濕何酒病之有病者往往服酒癥丸大熱之藥下之又有用牽牛大黃下之者是無形元氣受病反下有形陰血乖誤甚矣酒性大熱已傷元氣而復重瀉之況又損腎水真陰及有形陰血俱為不足如此則陰血愈虧真水愈弱陽毒之熱大旺反增其陰火是謂元氣消亡七神何依折人長命不然則虛損之病成矣金匱要略云酒疸下之久久為黑疸慎不可犯此戒無越上下分消其濕葛花解酲湯主之傷食證惟身不痛丹溪曰傷食必惡食氣口脈必緊盛胸膈必痞塞亦有頭痛發熱者但身不痛耳治飲食所傷當各求其類凡飲食停滯不化而發熱者氣口脈即右寸也必緊盛或右關短而滑也痞惡食或噫氣作酸或惡聞食氣或欲吐不吐或噁心或短氣痞塞或胃口作疼或下按之則痛此皆食停之候如停食而又感寒者則兩寸俱大也外證頭痛身熱拘急中脘痞悶或嘔吐或痛者宜藿香正氣散或人參養胃湯加香附砂仁之類若因食肉傷加山楂米麵傷加神麯麥芽生冷肉食果子之類傷加草果砂仁青皮枳實酒食傷加葛根紫蘇砂仁烏梅枳實若憎寒壯熱者用此二方若以發熱無汗必須先解其外以十味芎蘇散汗之身體疼痛發熱者人參羌活湯加葛根蔥白生薑以汗之然後消其食也如食在膈上未入於胃者可吐之如不可吐則消導之待食下入胃變化糟粕外證以解乃可下也宜三物厚朴湯熱多者大柴胡湯加厚朴下之治挾食傷寒不可先攻其食且先發散寒邪次與消導尤宜究其所傷之物分其寒熱輕重而施治如初得上部有脈下部無脈其人當吐不吐者死宜瓜蒂散輕則內消縮砂神麯是也重則下之承氣湯是也寒則溫之半夏乾薑三稜莪朮是也熱則寒之大黃黃連枳實麥芽是也積飲不行或大飲而氣逆或寒冷而傷肺病則喘咳痰涎水腫輕則取汗利小便使上下分消其濕解酲五苓半夏朮殼之類重則蓄積為滿三花神佑之屬須各從其類也惡食者胸中有物宜導痰補胃二陳加白朮川芎蒼朮聞食氣則嘔者二陳加砂仁青皮憂鬱傷脾不思飲食炒黃連酒炒芍藥香附加青緑豆九米薑汁浸炊餅為丸越曲丸治食鬱方見郁門食後感寒宿食不消用丁香砂仁蓽澄茄以溫之食不消須用枳實神麯若壯熱以黃連枳實消導之弱者以白朮陳皮山楂神麯麥芽補而瀉之四臟相乘正治論東垣曰脾胃不足是火不能生土而反拒抗此至而不至是為不及也宜用白朮為君人參黃耆為臣甘草芍藥為佐黃連為使心火亢乘於脾胃之位亦至而不至是為不及也黃連為君黃柏地黃為臣芍藥知母石膏黃芩為佐甘草為使肝木乘脾胃之位脅痛口苦舌乾往來寒熱而嘔多怒四肢滿悶淋溲便難轉筋腹中急痛此所不勝乘之也宜柴胡羌活桂芍藥茯苓豬苓澤瀉黃柏細辛藁本活石肺金受邪由脾胃虛弱不能生肺乃所生受病也故咳嗽氣短氣上皮毛不能御精神少而渴情慘慘而不樂皆陽氣不足陰氣有餘是體有餘而用不足也宜用人參為君黃耆陳皮為臣白朮芍藥桂桑白皮五味子為佐桔梗引用青皮破滯氣甘草木香調和若嗜臥懶語灑淅惡寒者宜補中益氣湯腎水反來侮土所勝者妄行也作涎及清涕唾多溺多而惡寒者是也土火復之及三脈為邪則足不任身足下痛不能踐地骨乏無力喜睡兩丸冷腹陰陰而痛妄見妄聞腰脊背胛皆痛宜乾薑烏附蒼朮合五苓散之屬是也醫案丹溪治一婦人因宿食傷腹大痛連及兩脅以香附末湯調探吐而愈一人好酒每早嘔吐以栝蔞貝母炒山梔石膏煅香附薑製山楂神麯各一兩枳實薑黃蘿蔔子連翹石鹼各半兩升麻二錢半為末薑汁浸炊餅丸白湯下一人因吃麵發熱頭痛咳嗽有痰以蒼朮一錢半陳皮一錢羌活茯苓黃芩川芎甘草各三分薑水煎一人啖馬肉過多腹脹服大黃巴豆益甚脈寸口促二尺脈將絶曰胸有新邪故脈促宜引之上達今反奪之誤矣意以湧劑飲之置堂中座使人環旋頃吐宿會仍以神芎丸服之遂愈藥方東垣藿香安胃散治脾胃虛弱不進飲食嘔吐不快藿香丁香人參各一錢五分橘紅五錢上為細末每服二錢水一盞生薑一片煎七分和渣溫服溫胃湯治服寒藥過多以致脾胃虛弱胃脘痛人參黃耆陳皮厚朴薑製砂仁益智仁甘草炙各五分白豆蔻乾薑澤瀉薑黃各四分上為細末每服三錢水一盞煎至半盞溫和渣服四君子湯理脾胃之主藥補虛進食此其人之本歟人參白朮土炒白茯苓甘草炙上各等分每服五錢水鍾半生薑三片棗一枚煎七分不拘時溫服拔萃方加陳皮一味名異功散快脾利氣最妙六君子湯治脾胃不和不進飲食上燥下寒服熱藥不得者用此最當人參白朮白茯苓甘草陳皮半夏薑製上各等分每服五錢薑三片棗一枚水鍾半煎八分溫服治中湯治脾胃不和嘔逆霍亂中滿虛痞或泄瀉人參白朮炒各一錢甘草炙乾薑炮青皮陳皮各五分上水盞半薑棗煎七分服如嘔甚加半夏丁香名丁香溫中湯理中湯治脾胃虛寒或痛不思飲食惡冷甚者加熟附子一二片煎名附子理中湯方見傷寒門內參苓白朮散治脾胃虛弱飲食不進或嘔吐泄瀉及大病後調助脾胃人參白朮炒茯苓甘草炙山藥炒白扁豆炒各一斤蓮子去皮心砂仁薏苡仁炒桔梗炒各半斤上為細末每服二錢棗湯調服或飲湯亦可三因養胃湯治脾胃虛寒嘔逆噁心腹脅脹疼腸鳴泄瀉或有外感寒熱如瘧骨節煩疼並皆治之藿香厚朴炒半夏制茯苓各錢半草果仁陳皮人參附子制三片白朮炒各一錢甘草炙五分上水二盞薑三片棗二枚煎一盞食遠服千金大養胃丸治脾胃虛弱停寒留飲膈塞氣噎翻胃吐食常服養脾壯氣多進飲食人參白朮炒白萹豆炒陳皮三稜炮砂仁炒甘草炙肉豆蔻麵包煨莪朮炒茴香炒良薑茯苓益智仁胡椒木香藿香薏苡仁炒紅豆丁香山藥炒枳殼麩炒神麯炒麥芽炒桔梗上為細末煉蜜丸如彈子大每服一丸食遠細嚼白湯或酒下三因補脾湯治脾胃虛寒泄瀉腹滿氣逆嘔吐飲食不消人參茯苓陳皮厚朴炒白朮各八分甘草炙乾薑炮草果麥芽炒各五分上水盞半煎七分空心溫服本集大健脾丸又名百穀丸此方健脾養胃滋穀氣除濕熱寬胸膈去痞滿久服強中益氣百病不生元精炯炯長壽之基其在是矣凡人皆因勞倦思慮惱怒飢飽酒色濕熱浸以侵脾則脾不能健運精微之氣而胃失所基則亦因之而遂病矣蓋胃司納受其所以運化飲食之精氣分布四臟充達四肢榮養百骸實脾運之功也若脾臟一虧則胃氣不行縱多納穀終是作脹必至嘔吐泄瀉四臟百骸皆失榮養則諸病變生攻治罔效甚則絶谷而死矣觀此則知脾土為一身之樞機故機息則神去而氣散矣欲長生者何所恃哉亦恃穀氣而已矣故經曰得谷者生失谷者亡豫制大健脾丸以輔東垣補中益氣湯出入服之萬無一損補中益氣因其內傷勞倦即病內外發熱胃氣下陷用以升提胃氣救元氣之已虧是必用之劑也若於平居不甚勞傷胃氣不陷內外不熱只宜服大健脾丸以防護而保助之則自無傷損下陷之病至且便於尋常日用而無煎煮煩難之弊也不有羽冀東垣之功矣乎人參清河者二兩飯上蒸白朮無油者三兩土炒枳實一兩飯上蒸廣陳皮二兩米泔洗青皮一兩米醋炒白茯苓二兩飯上蒸半夏曲一兩炒穀芽一兩六錢炒山楂肉一兩飯上蒸川黃連一兩六錢用吳茱萸半兩浸炒赤色去萸廣木香半兩不見火白豆蔻仁半兩炒上末長流水煮老米荷葉湯滴丸緑豆大每服百丸食前白湯下本事溫脾散溫中開胃進食利氣散寒白朮陳皮砂仁厚朴制各一兩良薑桔梗白芷茴香炒木香麥芽香附子青皮甘草各半兩紅豆乾葛各三錢御藥參苓平胃散治脾胃不和不思飲食心腹脅脹刺痛口苦無味胸滿短氣嘔噦噁心噫氣吞酸面色萎黃肌體瘦弱怠惰嗜臥或自利或霍亂或嗝氣反胃並宜服此蒼朮制半斤厚朴陳皮各五兩甘草人參茯苓各二兩上為細末每服三錢水一盞薑三片棗一枚煎七分不拘時服一方棗肉丸胡椒大每服五十丸薑湯空心下常服一劑和胃調氣化宿滯消痰癖散四時風寒瘴氣最妙選方八味理中丸治脾胃虛寒飲食不化胸膈痞悶或嘔吐泄瀉人參一兩白朮炒四兩白茯苓二兩甘草兩半乾薑炮一兩砂仁炒神麯炒各兩半麥芽炒二兩上為細末煉蜜丸每兩分作十丸空心用一丸薑湯嚼下拔萃木香人參生薑枳朮丸開胃進食木香三錢人參三錢半乾薑錢半枳實八錢白朮兩半陳皮四錢上為細末荷葉燒飯為丸胡椒大每服五十丸溫水下丁香透膈湯治脾胃不和虛寒噁心痰逆或嘔吐飲食不進人參白朮各一錢陳皮半夏制厚朴制甘草炙各六分藿香砂仁炒研肉豆蔻麵包煨白豆蔻丁香木香香附子炒沉香各三分草果三粒神麯炒青皮麥芽各五分上水二盞薑三片棗一枚煎八分不拘時溫服忌生冷八珍湯和脾胃養氣血之要藥人參白朮茯苓各一錢甘草炙當歸八分川芎芍藥砂仁各五分上水盞半薑三片棗一枚煎八分溫服仁齋豆蔻橘紅散溫脾養胃升降陰陽和三焦化宿食白豆蔻人參丁香木香各半兩白朮炒厚朴炒陳皮半夏制各一兩乾薑炮神麯炒藿香甘草炙各半兩上每服三錢水盞半薑三片棗一枚煎七分溫服健脾散通中健胃消食快氣人參白朮炒藿香丁香砂仁炒肉果煨神麯炒甘草各等分上為細末每服二錢不拘時橘皮湯調下人參開胃湯治脾胃不和不思飲食此藥助胃進食人參橘紅丁香木香藿香神麯炒麥芽炒白朮茯苓砂仁蓮肉厚朴炒半夏薑製甘草炙各七分人參啓脾湯治脾胃虛弱不進飲食此藥最效人參白朮各一錢茯苓半夏制藿香砂仁各五分橘紅七分神麯炒麥芽炒黃連微炒甘草炙四分木香三分磨口渴加乾葛一錢頭痛加川芎五分腹脹加蒼朮一錢噁心嘔吐加白豆蔻五分啓脾丸治脾胃不和氣不升降中滿痞塞心腹膨脹腸鳴泄瀉不思飲食服此人參白朮炒青皮陳皮神麯炒麥芽炒砂仁乾薑炮厚朴炒各一兩甘草炙一兩上為細末煉蜜丸如彈子大每服一丸食前細嚼米飲下香砂理中丸治脾胃虛弱感寒停飲心腹卒痛手足厥冷嘔吐清水飲食不進人參白朮炒乾薑炮甘草炙各二兩木香砂仁炒各半兩上為細末煉蜜丸如胡椒大每服七八十丸空心白湯下秦家二十四味養胃丸治風冷寒濕邪氣腹脹痞滿刺痛吐逆吞酸腸鳴泄瀉羸困倦無力不思飲食一切脾胃之疾宜服此丁香沉香木香各錢半附子制六錢陳皮大腹皮神麯炒各半兩麥芽炒肉桂白朮各兩半厚朴炒三錢訶子煨一兩人參茯苓各四錢砂仁八錢蓽澄茄白附子炮良薑油炒紅豆胡椒蓽茇乾薑炮甘草各二錢生薑十四兩切焙乾上為細末煉蜜丸如彈子大每服一丸細嚼白湯下胃愛散治脾胃久虛中焦氣滯壅上或有冷涎上潮或嘔吐噁心或胸腹疼痛不思飲食人參一兩白朮茯苓丁香甘草炙各一錢肉果制三個黃耆乾薑各半兩上用白米二盞同研為細末每服二錢水一盞薑一片煎七分通口服如臟腑不調加丁香十四粒石蓮肉七粒同煎穀神丸健脾消食益氣進美飲食人參青皮香附子炒三稜蓬朮炮砂仁陳皮神麯麥芽炒枳殼炒各等分上為細末老米粉打糊丸如胡椒大每服四十丸空心米飲下東垣白朮丸治傷豆粉濕面酒膩之物白礬枯三分黃芩二錢橘皮七錢神麯炒半夏制白朮炒枳實麩炒各一兩上為細末湯浸熬餅為丸如胡椒大每服三五十丸白湯下素食多用乾薑故加黃芩以瀉之東垣草豆蔻丸治秋冬傷冷物胃脘常心而痛上支兩脅咽膈不通炒鹽五分乾生薑青皮陳皮麥芽炒黃芩冬不用半夏制神麯炒各半兩草豆蔻麵包煨去皮取仁白朮炒枳實炒各一兩上為細末湯浸蒸餅為丸胡椒大每服三五十丸白湯下論枳朮丸易水張潔古常云脾胃虛弱不可用峻利之藥凡用利藥一時稱快病去之後脾胃既損是真氣元氣敗壞促人之壽嘗制一方枳實一兩麩炒黃為度白朮二兩土炒只此二味荷葉包燒飯為丸以白朮甘溫補脾胃之元氣其味苦除胃中之濕熱利腰臍間血故先補脾胃之弱過於枳實克化之藥一倍枳實味苦寒泄心下之痞悶消化胃中所傷此藥下胃不能即消須待一兩時辰許食則消化是先補其虛而後化其所傷則不峻利而損真氣當是之時未悟用荷葉燒飯為丸之理老年味之始得可謂奇矣荷之為物中空象震震者動也運動不息之意也脾胃之氣運動不息而干健之功成矣復何患之有哉甫按枳朮二味亦平劑耳白朮一味健脾尚不能成功又加枳實消導其功益緩今人久服之脾胃終無強健之日脾胃大虛須得補中益氣之劑方能奏續況原方用煨飯作丸且大殊為難消今改以湯滴小丸甚易化也枳朮丸強胃消痞滿化食白朮二兩炒枳實一兩炒上為細末荷葉煮老米飲滴為丸如緑豆大每服百丸不拘時白湯下用白朮之意不敢求速消導令其胃氣強而後食化不復傷也因證加味法開於下東垣加陳皮一兩名橘皮枳朮丸傷冷物者加半夏一兩名橘半枳朮丸元氣素弱飯食難化食多則腹中不和疼痛瀉泄此虛寒也加人參炒芍藥炒神麯炒麥茅各一兩砂仁木香各半兩有痰之人胸膈鬱塞吞酸噎氣及素有吐酸之證或有酒積或瀉或結此皆溫熱也加薑汁炒黃連炒芍藥陳皮各一兩石膏生甘草各半兩砂仁木香各二錢川芎四錢只飲食飽悶痞塞難消者加神麯麥芽山楂各一兩如有食積痞塊在腹者再加黃連厚朴栝蔞各半兩堅硬者再加醋煮莪朮昆布各三錢傷冷食不消腹疼溏泄者加半夏砂仁乾薑神麯麥芽各半兩有惱怒傷食氣滯不通加川芎香附各一兩木香黃連各半兩胸膈不利之人過服辛燥之藥以致上焦受傷胃脘乾稿嘔吐鬲噎反胃者加薑炒黃連炒梔子各半兩白芍藥當歸各一兩桔梗生甘草石膏各半兩胸膈頑痰大便燥結者加芒硝半兩素有痰火濕熱者加半夏陳皮白茯苓各一兩薑炒芩連各半兩能食者但食後飽悶難化此胃火旺脾陰虛也加酒炒白芍藥石膏煅各一兩人參七錢生甘草半兩炒黃連炒香附木香各四錢年高人脾虛血燥易飢易飽大便結燥加白芍藥當歸各一兩人參七錢升麻甘草炙各四錢山楂麥芽桃仁去皮尖各半兩直指加味枳朮丸治脾胃虛弱飲食減少胸膈膨悶酒傷食積氣滯腹滿常服則進食寬中和暢脾胃白朮泔浸土炒二兩枳實麩炒一兩神麯炒麥芽炒杵去皮陳皮山楂香附子炒各一兩砂仁炒半兩如前法丸服枳朮二陳湯治脾胃痰飲胸膈不利枳實炒半兩白朮炒半夏制茯苓陳皮各八分甘草炙五分水盞半薑棗煎溫服凝神散治胃虛燥熱口乾或泄瀉收斂胃氣清肌表人參白朮茯苓各一錢甘草炙五分山藥白扁豆炒各八分梗米一撮淡竹葉十個地骨皮麥門冬生地黃各五分上水盞半薑三片棗一枚煎七分溫服平胃散治脾胃不和嘔吐噁心不思飲食蒼朮制三錢厚朴制陳皮各二錢甘草炙一錢上水二盞薑三片棗二枚煎一盞食遠服一方加草果名草果平胃散或為細末每服二錢鹽湯調下丹溪保和丸消滯寬胸進食虛者煎補脾藥送下山楂二兩蘿蔔子炒半兩半夏制陳皮茯苓神麯炒各一兩連翹三錢上為細末神麯糊丸如胡椒大每服五十丸白湯下加白朮二兩名大安丸仁齋加味保和丸消痰利氣去濕熱扶脾胃進飲食山楂神麯炒半夏制茯苓各三兩陳皮連翹蘿蔔子各二兩白朮炒五兩蒼朮泔浸枳實各一兩香附子酒浸厚朴炒各二兩黃芩去朽酒炒黃連酒炒各一兩上為細末薑汁作麵糊為丸胡椒大每服五十丸漸加至七八十丸食後茶湯任下東垣和中丸治病久虛弱厭厭不能食臟腑或祕或溏此胃氣虛弱也此藥和中理氣消痰去濕熱厚腸胃進飲食白朮炒二兩厚朴制陳皮半夏制各一兩木香檳榔枳實甘草炙各半兩上為細末薑汁和蒸餅為丸如胡椒大每服三五十丸食遠或食前白湯送下安胃丸溫中補氣安胃進食白朮炒二兩茯苓一兩陳皮青皮砂仁炒麥芽炒各半兩木香乾薑炮各二錢上為末湯浸蒸餅丸如胡椒大每服五十丸食前白湯下嘉禾散治脾胃不和胸膈痞悶氣逆生痰不進飲食五嗝五噎並皆治之方見嗝噎門木香啓中湯補脾胃進飲食寬膈順氣木香人參白朮炒茯苓陳皮半夏制枳殼炒香附子炒砂仁白豆蔻甘草炙各七分上咀水盞半薑五片棗一枚煎八分食遠服葛花解酲湯治飲酒太過嘔吐痰逆心神恍惚胸膈不利手足戰搖飲食減少小便澀人參白朮白茯苓白豆蔻葛花砂仁各一錢陳皮青皮豬苓澤瀉各七分神麯炒木香磨各五分上咀水二盞薑五片煎八分食遠稍熱服取微汗酒病去矣或為末薑醋湯調服亦可附子黃耆草果飲治脾胃虛寒嘔吐不思飲食方見反胃嘔吐門丁香煮散治胃虛嘔吐不食方見吐門瀉黃散治脾胃壅滯不食口內生瘡心煩口渴防風藿香石膏煅砂仁山梔仁甘草各七分上水盞半燈心十根棗一枚煎七分食後服胃苓湯治脾胃濕熱小腹脹滿或大便泄瀉小便不利或寒熱不定並皆可服白朮一錢茯苓八分豬苓五分澤瀉七分桂三分蒼朮七分厚朴五分陳皮七分甘草三分水盞半薑二片棗一枚煎七分不拘時服大黃瀉熱湯治脾脈厥逆大腹中熱切痛舌強腹脹身重食不下心疰脾急痛大黃半兩茯苓澤瀉黃芩陳皮細辛芒硝甘草各一錢上除黃硝外水三盞煎二鍾去滓入黃煎三沸再入硝分二服東垣備急丸治脾胃不快胸膈脹滿心腹百病卒痛如錐用此解急氣暴逆者並治大黃一兩為末乾薑五錢炮為末巴豆仁五錢去油研為粉上合一處研勻煉蜜搗末丸黍米大二丸溫水下實者加一丸孕婦勿服如飲食停在胸口作痛而脹兀兀欲吐者探吐之枳實導滯丸治傷濕熱之物不化而作痞滿悶亂枳實白朮神麯各三錢澤瀉二錢大黃一兩黃芩茯苓黃連各五錢上為細末蒸餅丸如胡椒大每服七十丸白湯下凡濕熱飲食傷者枳實導滯丸極效用黃芩黃連以清其熱茯苓澤瀉以行其濕枳實消痞滿化宿食白朮補脾行濕大黃滌蕩攻下又能去熱物之傷故用得效若非東垣之聖烏足以與此何世醫不察所傷寒熱悉皆用之然則寒物所傷者不宜此局方木香檳榔丸治氣滯宿食脹滿方見積門祕方化滯丸理諸氣化諸積奪造化有通塞之功調陰陽有補瀉之妙久堅沉痼磨之自消暴滯積留導之立去南木香丁香青皮陳皮去白黃連各二錢半京三稜莪朮煨各五錢半夏曲二錢上八味曬乾共研為細末巴豆去殼滾湯泡逐一擘開去心膜以圓器盛用好醋浸過一頃慢火熬至醋乾稱六錢重研細將前藥末和之再研令自干後入烏梅肉膏巴豆若干止用梅四錢五分烏梅肉用火焙乾為細末稱五錢重用米酷調略清慢火熬成膏和巴豆粉入藥上通和勻了入白麵八錢重水調得法慢火調糊為丸如粟米大每服五七丸人盛者十丸五更空心用陳皮湯下不欲通者津下但知所積物取本汁冷下停食飽悶枳殼湯下因食吐不止津液咽下即止婦人血氣痛當歸湯下赤痢冷甘草湯下白痢冷乾薑湯下心動石菖蒲湯下諸氣痛生薑陳皮湯下小腸氣茴香酒下若欲推蕩積滯熱薑湯下仍加數丸未利再服利多不止飲冷水一二口即止利此藥得熱即行得冷即止小兒疳積量大小飲湯下妊娠勿服快活丸治宿食不消致傷脾胃大黃生用檳榔陳皮各二兩青皮二兩半三稜醋煮蘿蔔子炒香附子制蓬朮各四兩黑牽牛半斤麥芽半斤用巴豆三錢同炒黃色去巴豆上為細末滴水丸梧桐子大每服五七丸食前淡薑湯下感應丸治宿食積滯腹痛胸膈痞悶方見積利門倦怠嗜臥門病機倦怠嗜臥有久暫之殊胃主生氣脾主運動脾胃一虛則穀氣不充脾愈無所稟脾運四肢既稟氣有虧則四肢倦怠無力以動故困乏而嗜臥也亦有食飽過傷以致脾難運化每食飽後則困倦而瞌睡此則食後暫有之消化之後則不然也若此者當補脾胃而兼之消導可也若是脾胃俱虛飲食少進形氣衰弱常常倦怠者當大補脾胃以滋其化源而克伐消導之劑則又不可輕用輕犯也久久滋補脾胃一健而精神斯足矣何倦怠之有哉丹溪云有因脾胃受濕沉困無力倦怠嗜臥者用二陳蒼白朮六君子湯之類為主本兼虛者升陽除濕湯之屬肥人倦怠多是氣虛有痰宜四君二陳加蒼朮之類及益胃湯瘦人是熱黃芩白朮之類飲食太過轉運不及者宜加味保和丸及和中湯之屬脈候脈沉微無力者為虛倦怠右關脈細濡者屬濕右關脈弦者有食積脈滑大者屬痰火怠惰藥方仁齋加味保和丸治食飽後即倦怠嗜臥方見脾胃門六君子湯二陳湯俱見前東垣益胃湯治頭悶勞動則微痛不喜飲食四肢倦怠煩躁短氣口不知味腸鳴大便微溏黃色身體昏悶口乾不喜飲冷人參黃耆各五分蒼朮白朮各一錢陳皮半夏升麻柴胡各六分當歸黃芩甘草益智仁各五分上水盞半煎八分食前稍熱服忌生冷硬物酒面生薑和中湯治食不下口乾虛渴四肢倦怠人參八分蒼朮白朮各一錢陳皮葛根升麻柴胡藁本羌活各五分生黃芩一錢酒黃五分生甘草炙甘草各三分上水二盞生薑五片棗二枚煎一盞食前稍熱服升陽除濕湯治脾胃虛弱不思飲食腸鳴腹痛泄瀉無度小便黃四肢困倦陳皮半夏茯苓甘草麥芽豬苓澤瀉各五分益智仁神麯防風羌活升麻各三分蒼朮制一錢上水二盞薑三片棗一枚煎一盞空心服內傷門李東垣以飲食勞倦為內傷不足之病謂因飢飽不調傷損脾胃所致蓋人之所藉以生者脾胃為本必賴飲食滋養若調養失宜勞役過傷失其所養則脾胃氣虛不能升達陷郁為熱亦與外感發熱相似人多誤以內傷混作外感處治故東垣著脾胃內傷論制以補中益氣湯非為飲食有餘之立法也王安道謂其不著飲食有餘之傷以為白璧微瑕之誚其亦責備之過也然則內傷專言其虛而胃氣下陷主於升補不可混言飲食有餘之傷可用消導今以有餘之傷別為脾胃一門不得附於勞倦不足中也學者宜於各類求之病機內傷敘論黃帝曰陰虛生內熱奈何岐伯曰有所勞倦穀氣衰少形氣不盛下脘不通上焦不行胃氣熱熱氣蒸胸中故內熱又曰病生於陰者得之飲食居處陰陽喜怒太陰陽明論曰陽者天氣也主外陰者地氣也主內故陽道實陰道虛犯賊風虛邪者陽受之飲食不節起居不時者即內傷也陰受之陽受之則入六腑陰受之則入五臟入六腑則身熱不時臥上為喘呼入五臟則腹滿閉塞下為飧泄久為腸澼此見內傷外感陰陽虛實之不同也豈容不辨內外虛實之證而處治哉平人氣象篇曰人以水穀為本故人絶水穀則死也通評虛實篇曰頭痛耳鳴九竅不利腸胃之所生也又曰陰之所生本在五味陰之五宮傷在五味李束垣曰歷考內經元氣之充足皆由脾胃之氣無所傷而後能滋養元氣若胃氣之本弱飲食自倍則脾胃之氣既傷而元氣亦不能充而諸病由生也內經之旨皎如日星猶恐後人有所未達故靈樞經中復申其説經云水穀入口其味有五各注其海津液各走其道胃者水穀之海其輸上在氣街下至三里水穀之海有餘則腹滿水穀之海不足則飢不受穀食人之所受氣者谷也谷之所注者胃也胃者水穀氣血之海也海之所行雲氣者天下也胃之所出氣血者經隧也經隧者五臟六腑之大絡也又云五穀入於胃也其糟粕津液宗氣分為三隊故宗氣積於胸中上於喉嚨以貫心肺而行呼吸焉榮氣者泌其津液注之於脈化而為血以榮四末內注五臟六腑以應刻數焉衛者出其悍氣之慓疾而行於四末分肉皮膚之間而不休者也又云中焦之所出亦並胃中出上焦之後此所受氣者泌糟粕蒸津液化為精微上注於肺脈乃化而為血以奉生身莫貴乎此聖人諄復其辭而不憚其煩者仁天下後世之心亦倦倦矣故夫飲食失節寒溫不適脾胃乃傷此因喜怒憂恐損耗元氣資助心火火與元氣不兩立火勝則乘其土位此所以病也生氣通天論云蒼天之氣清淨則志意治順之則陽氣固雖有賊邪弗能害也此因時之序故聖人傳精神服天氣而通神明失之則內閉九竅外壅肌肉衛氣散解此謂自傷氣之削也陽氣者煩勞則張精絶闢積於夏使人煎厥目盲不可以視耳閉不可以聞潰潰乎若壞都故蒼天之氣貴清淨陽氣惡煩勞病從脾胃生者一也五常政大論云陰精所奉其人壽陽精所降其人夭陰精所奉謂脾胃既和穀氣上升春夏令行故其人壽陽精所降謂脾胃不和穀氣下流收藏令行故其人夭病從脾胃生者二也六節臟象篇云脾胃大腸小腸三焦膀胱者倉廩之本榮之居也名曰器能化糟粕轉味而出入者也其華在唇四白其充在肌其味甘其色黃此至陰之類通於土氣凡十一臟皆取決於膽也膽者少陽春升之氣春氣升則萬化安故膽氣春升則餘臟從之膽氣不升則飧泄腸僻不一而起矣病從脾胃生者三也經曰天食人以五氣地食人以五味五氣入鼻藏於心肺上使五色修明音聲能彰五味入口藏於脾胃味有所藏以養五氣氣和而生津液相成神乃自生此謂之氣者上焦開發宣五穀味熏膚充身澤毛若霧露之溉氣或乖錯人何以生病從脾胃生者四也豈特四者至於經論天地之邪氣感則害人五臟六腑及形氣俱虛乃受外邪不因虛邪賊邪不能獨傷人諸病從脾胃而生明矣聖人旨意重見疊出詳盡如此且垂戒云法於陰陽和於術數飲食有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲乃去由是言之飲食起居之際可不慎哉內傷病本乎脾胃胃中元氣盛則能食而不傷過時而不飢脾胃俱旺則能食而肥脾胃俱虛則不能食而瘦或少食而肥雖肥而四肢不舉蓋脾實而邪氣盛也又有善食而瘦者胃伏火邪於氣分則能食脾虛則肥肉削即食㑊也叔和云多食亦飢此之謂也夫飲食不節則胃病胃病則氣短神少而生大熱有時火上行獨燎其面黃帝針經云面熱者足陽明病胃既病則脾無所稟受脾為死陰不主時也故亦從而病焉形體勞役則脾病脾病則怠惰嗜臥四肢不收大便瀉泄脾既病則胃不能獨行津液故亦從而病焉大抵脾胃虛弱陽氣不能生長是春夏之令不行五臟之氣不生也此為內傷論內傷悉因飲食勞倦始為熱中古之至人窮於陰陽之化究乎生死之際所著內外經悉言人以胃氣為本蓋人受水穀之氣以生所以清氣榮氣元氣衛氣春升之氣皆胃氣之別稱也夫胃為水穀之海飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也若飲食失節寒溫不適則脾胃乃傷喜怒憂恐損耗元氣既脾胃氣哀元氣不足而心火獨盛心火者陰火也起於下焦其繫系於心心不主令相火代之相火下焦包絡之火元氣之賊也火與元氣不兩立一勝則一負脾胃氣虛則下流於腎陰火得以乘其土位故脾證始得則氣高而喘身熱而煩其脈洪大而頭痛或渴不止其皮膚不任風寒而生寒熱蓋陰火上衝則氣高喘而煩熱為頭痛為渴而脈洪脾胃之氣下流使穀氣不得升浮是春升之令不得行則無陽以護其榮衛則不任風寒乃生寒熱此皆脾胃之氣不足所致也然而與外感風寒所得之證頗同而實異內傷脾胃乃傷其氣外感風寒乃傷其形傷其外為有餘有餘者瀉之傷其內為不足不足者補之內傷不足之證苟誤認作外感有餘而反瀉之則虛其虛也實實虛虛如此死者醫殺之耳然則奈何惟當以辛甘溫之劑補其中而升其陽甘寒以瀉其火則愈矣經曰勞者溫之損者益之又云溫能除大熱大忌苦寒之藥損其脾胃脾胃之證始得則熱中故制補中益氣湯而除中熱也其義詳著在後論勞倦傷脾則兼胃為病四十九難曰適飲食勞倦則傷脾又云飲食有節起居有常是養生之道也若飲食不節勞役過度是致脾有傷也夫脾者為胃行其津液磨胃中之谷主五味也脾既虛則轉輸失職而飲食不磨食不磨則胃必因而病故有心腹痞滿兀兀欲吐不吐而惡食或飧泄或為腸澼口不知味四肢倦怠發熱憎寒可見脾傷胃亦傷此蓋穀氣相通而事同一體者也內傷元氣不足諸病所生夫飲食勞倦內傷脾胃皆自汗乃足陽明也燥火津液不能停故汗出小便數也邪之大者莫若中風風者百病之長善行而數變雖然無虛邪則風寒不能獨傷人必先中虛賊邪得入矣至於痿厥逆皆由汗出而得之也且冬陽氣伏藏於水士之下如非常泄精陽氣已竭則春令何從而得萬化俱失所矣在人則飲食勞役汗下時出諸病遂生豫所以諄諄如此者蓋亦欲人知所慎也辨內傷諸證與外感不同甚哉陰陽之證不可不詳也遍觀內經中所説變化百病其源皆由喜怒過度飲食失節寒溫不適勞役所傷而然夫元氣穀氣榮氣清氣衛氣生髮諸陽上升之氣此六者皆飲食入胃穀氣上行胃氣之異名其實一也既脾胃有傷則中氣不足中氣不足則六腑之氣皆絶於外故經言五臟之氣已絶於外者是六腑之元氣病也氣傷臟乃病臟病則形乃應是五臟六腑真氣皆不足也惟陰火獨旺上乘陽分故榮衛失守諸病生焉其中變化皆由中氣不足乃生髮耳後有脾胃已受勞役之疾飲食又復失節耽病日久事息心安飽食太甚病乃大作暨其外傷風寒六淫客邪皆有餘之病當瀉不當補飲食失節中氣不足之病當補不當瀉舉世醫者皆以飲食失節勞役所傷中氣不足當補之證認作外感傷寒有餘客邪之病重瀉其表使榮衛之氣外絶其死只在旬日之間所謂差之毫釐謬以千里可不詳辨乎按陰陽應象論曰天之邪氣感則害人五臟是八益之邪乃風邪傷人筋骨風從上受之風傷筋寒傷骨蓋有形質之物受病也系在下焦肝腎是也肝腎者地之氣難經云肝腎之氣已絶於內以其肝主筋腎主骨故風邪感人則筋骨疼痛筋骨之絶則肝腎之本亦絶矣乃有餘之證也又云水穀之寒熱感則害人六腑是七損之病乃內傷飲食也黃帝針經解云飲食不節勞役所傷濕從下受之謂脾胃之氣不足而反下行極則衝脈之火逆而上是無形質之元氣受病也系在上焦心肺是也心肺者天之氣故難經解云心肺之氣已絶於外以其心主榮肺主衛榮者血也脈者血之府神之所居也衛者元氣也神之別名衛護周身在於毛皮之間者肺絶故皮毛先絶神無所依故內傷飲食則亦惡風寒是榮衛失所皮膚間無陽以滋養不能任風寒也皮毛之絶則心肺之本亦絶矣蓋胃氣不升元氣不生無以滋養心肺乃不足之證也謂受病之人飲食失節勞役所傷因而飽食內傷者極多外感者間而有之世俗不知往往將元氣不足之證便作外傷風寒表實之證而反瀉心肺是重絶其表也安得不死乎古人所謂實實虛虛醫殺之耳若曰不然請以衆人之耳目聞見者證之嚮者壬辰改元京師戒嚴逮三月受敵者凡半月圍解之後都人之不受病者萬無一二既而病死者繼踵不絶部門十有二所每日各門所送多者二千少者不下一千似此者幾三月此百萬人豈俱感風寒外傷者耶大抵人在圍城中飲食不節乃勞役所傷不待言而知由其起居不時寒溫失所動經兩三月胃氣虧之久矣一旦飽食太過感而傷人而又調治失宜其死也無疑矣非唯大梁為然遠在真祐興定間如東平如太康如鳳翔解圍之後病傷而死無不然者余在大梁凡所親見有發表者有以巴豆推之者有以承氣下之者俄而變結胸發黃又以陷胸湯及茵陳湯下之無不死者蓋初非傷寒實內傷也故著內外傷辨推明前哲之餘篇歷舉近世之變故庶幾同志者審其中觸類而長之免後人橫夭耳東垣辨寒熱外傷寒邪之證與飲食失節勞役形質之病不同及內傷飲食俱有寒熱舉世盡將內傷飲食失節勞役不足之病作外傷寒邪有餘表實之證反瀉其表枉死者豈勝言哉皆由不別其寒熱耳今細為分解之外傷寒邪發熱惡寒寒熱並作其熱也翕翕發熱又為之拂拂發熱發於皮毛之上如毛羽之拂明其熱在表也是寒邪犯高之高者也皮膚毛腠陽之分也是胃之元氣所滋養之分也以寒邪乘之郁遏陽分陽不得升故發熱也其面赤鼻氣壅塞不通心中煩悶稍以袒露其皮膚已不能禁其寒矣其表上虛熱止此而已其惡寒也雖重衣下幕逼近烈火終不能御其寒一時一日增加愈甚必待邪傳入里作下證乃罷其寒熱齊作無有間斷者也內傷飲食不節或勞役所傷亦有頭痛項強腰痛與太陽表證微有相似余皆不同論中以辨之矣內傷不足之病表上無陽不能御風寒也此則常常有之其躁熱發於胃間者間而有之與外中寒邪略不相似其惡寒也蓋脾胃不足榮氣下流而乘腎肝此痿厥氣逆之漸也若胃氣平常飲食入胃其榮氣上行以舒於心肺以滋養上焦之皮膚腠理之元氣也既下流其心肺無所稟受皮膚無陽失其榮衛之外護故陽分皮毛之間虛弱但見風寒或居陰無日處便惡之也此常常有之無間斷也但避風寒及溫暖處或添衣蓋溫養其皮膚所惡風寒便不見矣是熱也非表傷寒邪皮毛間發熱也乃腎間受脾胃下流之濕氣閉塞其下致陰火上衝作蒸而燥熱上徹頭頂傍徹皮膚渾身燥熱作須待袒衣露居近寒涼處即已或熱極而汗出亦解彼外傷惡寒發熱豈有汗出者乎若得汗則外傷愈矣以此辨之豈不如黑白之易見乎當內虛而傷之者躁熱也或因口吸風寒之氣郁其陰火使咽嗌不通其吸入之氣欲入為膈上衝脈之火所拒使氣不得入其胸中之氣為外風寒所遏而不得伸令人口閉目瞪極則聲發於外氣不得上下塞於咽中而氣欲絶又或因噦因嘔因吐而躁熱發必有所因方見此證其表虛惡風寒之證復見矣表虛弱又為陰火所乘躁發須臾而過其表虛無陽不任風寒復見矣是表虛無陽常常有之其躁熱則間而有之此二者不齊作躁作寒已寒作躁已非如外傷之寒熱齊作無有間斷也百病俱有身熱又謂之肌熱又謂之皮膚間熱以手捫之方知者是也乃肌體有形之熱也亦須皆待陰陽既和汗出則愈矣慎不可於此上辨之以其虛實內外病皆有之故難辨耳只依先説病人自覺發熱惡寒之熱及躁作之熱上辨之為準矣辨外感八風之邪或有飲食勞倦所傷之重者三二日特與外傷風者相似其餘證有特異者若不將兩證重別分解猶恐將內傷不足之證誤作有餘外感風邪雖辭理有重復處但欲病者易辨醫者易治耳外感八風之邪乃有餘證也內傷飲食不節勞役所傷皆不足之病也其內傷亦惡風自汗若在溫暖無風處則不惡矣與外傷鼻流清涕頭痛自汗頗相似分之特異耳外感風邪其惡風自汗頭痛鼻流清涕常常有之一日一夜增加愈甚直傳入里作下證乃罷語聲重濁高厲有力鼻塞不通能飲食腹中和口知味大小便如常筋骨痛不能動搖便著床枕非扶不能起內傷與飲食不節勞役所傷然亦惡風居露地中遇漫風起卻不惡也惟惡窗隙些小賊風鼻流清涕頭痛自汗間而有之鼻中氣短少氣不足以息語則氣短而怯弱妨食或食不下或不飲食三者互有之腹中不和或腹中急而不能伸口不知五穀之味小便頻數而不渴初勞役得病食少小便赤黃大便常難或祕或結或虛坐只見些小白膿時有下氣或泄黃如糜或溏泄色白或結而不通若心下痞或胸中閉塞如刀蠡之痛二者亦互作不並出也有時胃脘當心而痛上支兩脅痛必臍下相火之勢如巨川之水不可遏而上行陽明之經逆行亂於胸中其氣無止息甚則高喘熱傷元氣令四肢不收無氣以動而懶倦嗜臥其外感風寒俱無此證故易別耳辨口鼻以分內外內傷勞役飲食所傷其證之顯必在口夫口者坤土也脾氣通於口飲食失節勞役所傷必口不知穀味亦不知五味傷食必惡食腹中不和不欲言縱勉強對答聲必怯弱口沃沫多唾鼻中清涕或有或無即陰證也外傷風寒其證必顯在鼻經曰鼻者肺之外候肺氣通於天外傷風寒則鼻為之不利聲濁不清其言壅盛有力口中知味而和傷寒則面赤鼻壅塞而干傷風則鼻流清涕而已辨手背手心內傷及勞役飲食不節之病手心熱手背不熱外傷風寒之病則手背熱而手心不熱內傷挾外傷者則手背手心俱熱辨氣少氣盛內傷飲食勞倦者心肺之氣先損熱既傷氣四肢無力以動故口鼻中皆短氣少氣不足以息或喘懶語人有所問十不欲對其一縱言之亦怯而無力其聲低微此其內傷氣少不足之驗也外感風寒者心肺元氣初無減損又添邪氣助之使鼻氣壅塞不利氣不能出並從口出但發一言必前輕而後重其言高厲而有力傷寒則鼻乾面赤傷風則鼻流清涕其聲嗄其言雖響如從甕中出亦前輕後重而有力此皆外傷氣盛有餘之驗也辨頭痛內傷頭痛有時而作有時而止外傷頭痛常常有之直須傳裡方罷辨筋骨四肢內傷等病是心肺之氣已不衛外必怠惰嗜臥四肢沉困不收此乃熱傷元氣脾主四肢既為熱所乘無氣以動經云熱傷氣又云熱則骨消筋緩此之謂也外傷風寒是腎肝之氣已鬱於內腎主骨為寒肝主筋為風故中風傷之病便著床枕非扶不起筋骨為之疼痛不能搖動乃形質之傷經云寒傷形又云筋攣骨痛此之謂也辨渴與不渴內傷勞役初病傷重者必渴以其心火熾上克於肺金故渴也內傷病久必不渴是邪氣在血脈中有濕故不渴也外感風寒之邪三日已外谷消水化邪氣傳裡始有渴也辨惡食與不惡食內傷勞役及飲食失節寒溫不適三者俱惡食口不知五味五穀以其內傷於脾故也外感傷寒中風俱能食而不惡食口中和以其無內傷則心氣和脾氣通故也脈候右寸脈大於左寸為內傷右寸氣口急大而數時一代而澀澀者肺之本脈代者元氣不相接續此飲食失節勞役過甚大虛脈也右關脾脈大而數數中顯緩時一代也此不甚勞役之脈也右關胃脈損弱甚則隱而不見但內顯脾脈之大數微緩時一代此飲食不節寒溫失所之脈也右關脈沉而滑此宿食不消脈也東垣曰古人以脈上辨內外傷於人迎氣口人迎脈大於氣口為外傷氣口脈大於人迎為內傷此辨固是但其説有所未盡耳愚按脈辨內外傷以人迎氣口誠是也何則人迎為胃之動脈當主內傷氣口為肺之動脈當主外傷外傷風寒風寒傷皮皮腠司於肺故氣口主之內傷脾胃脾胃主乎中氣故人迎主之古有人迎氣口之辨即胃脈與肺脈而主於內傷外感各指其所司也若只以氣口手脈辨之惟以兩關之脈辨之可也右關脾胃以主內傷左關肝木以主外傷外傷風寒內應肝木內傷元氣內應脾胃只以左右氣口辨之斯為至理外感風寒皆有餘之證是從前客邪來也其病必見於左手左手主表乃行陽二十五度內傷飲食及飲食不節勞役所傷皆不足之病也必見於右手右手主裡乃行陰二十五度故外感風寒則獨左寸人迎脈浮緊按之洪大緊者急甚於弦是足太陽寒水之脈按之洪大而有力中見手少陰心火之脈丁與壬合內顯洪大乃傷寒脈也若外感風寒則人迎脈緩而大或大於氣口一倍或兩倍三倍內傷飲食則右寸氣口脈大於人迎一倍傷之重者過在少陰則兩倍太陰則三倍此內傷飲食之脈若飲食不節勞役過甚則心脈變見於氣口是心火刑肺其肝木挾心火之勢薄肺經曰侮所不勝寡於畏者是也故氣口脈急大而數時一代而澀也澀者肺之本脈代者元氣不相接脾胃不及之脈洪大而數者心脈刑肺也急者肝木挾心火而反克肺金也若不甚勞役惟右關脾脈大而數謂獨大於五脈數中顯緩時一代如飲食不節寒溫失所則先右關胃脈損弱甚則隱而不見惟內顯脾脈之大數微緩時一代也如飲食不節寒溫失所則先右關胃脈損弱甚則隱而不見惟內顯脾脈之大數微緩時一代也宿食不消則獨右關脈沉而滑經曰脈滑者有宿食也治法勞役受病表虛證不可作表實治之或因勞役腎間陰火沸騰事間之際於陰涼處解脫衣服更有新沐浴於背陰處坐臥其陰火下行還歸腎間皮膚腠理極虛無陽為寒涼所遏表虛不任風寒自認外感風寒求醫解表以重絶元氣取禍如反掌苟幸而兔者致虛勞氣血皆弱其表虛之人為風所遏亦是虛邪犯表始病一二日之間特與外中賊邪有餘之症頗相似處故致疑惑請醫者只於氣少氣盛上辨之其外傷賊邪必語聲高厲而有力若是勞役所傷飲食不節表虛不足之病必短氣氣促懶語其聲困弱而無力亦易見也內傷飲食用藥所宜所禁內傷飲食付藥者受藥者皆以為瑣末細事是以所當重者為輕利害非細殊不思胃氣者榮氣也衛氣也穀氣也清氣也資少陽生髮之氣也人之真氣衰旺皆在飲食入胃胃和則穀氣上升穀氣者升騰之氣也乃足少陽膽手少陽元氣始發生長萬化之別名也飲食一傷若消導物的對其所傷之物既消則胃氣愈旺五穀之精華上騰乃清氣為天者也精氣神氣皆強盛七神衛護生氣不乏精益大旺氣血周流則百病不能侵雖有大風苛毒弗能害也此一藥之用其利溥哉易水張先生嘗戒不可用峻利食藥食藥下咽未免藥丸施化其標皮之力始開便言空快也所傷之物已去若更待一兩時辰許藥盡化開其峻藥必有悍性病去之後脾胃安得不損乎脾胃既損是真氣元氣敗壞促人之壽當時用枳朮丸一藥清化胃中所傷下胃不能即去須待一兩時辰許食則消化是先補而後化其所傷則不峻利矣因用荷葉燒飯為丸荷葉一物中央空虛象震卦之體震者動也人感之生足少陽甲膽也甲膽者風也生化萬物之根蒂也左傳云履端於始序則不愆人之飲食入胃榮氣上行即少陽甲膽之氣也其手少陽三焦經人之元氣也手足同法便是少陽元氣生髮也胃氣穀氣元氣甲膽上升之氣一也異名雖多止是胃氣上升者也若內傷脾胃以辛熱之物酒肉之類自覺不快覓藥於醫者此風習以為常醫者亦不問所傷付之以集香丸巴豆大熱藥之類下之大便下則物去遺留食之熱性藥之熱性重傷元氣七神不熾經云熱傷氣正謂此也其人必無氣以動而熱困四肢不舉傳變諸疾不可勝數使人真氣自此衰矣若傷生冷硬物世醫或用大黃牽牛二味大寒藥投之物隨藥下所傷去矣遺留食之寒性藥之寒性重瀉其陽陽去則皮膚筋肉血脈無所依倚便為虛損之證論言及此令人寒心夫辛辣氣薄之藥無故不可亂服非止牽牛而已至真要大論云五味入口各先逐其所喜攻攻者克伐瀉也辛味下咽先攻瀉肺之正氣正氣者真氣元氣也其牽牛之辛辣猛烈奪人尤甚飲食所傷脾胃受邪當以苦味瀉其腸胃可也肺與元氣何罪之有夫牽牛不可用者有五此其一也況胃主血為物所傷物者有形之物也皆血病血病瀉氣此其二也且飲食傷於中焦止合克化消導其食重瀉上焦肺中已虛之氣此其三也食傷腸胃當塞因塞用又寒因寒用枳實大黃苦寒之物以治有形是也反以辛辣牽牛散瀉真氣犯大禁四也殊不知針經有云外來客邪風寒傷人五臟若誤瀉胃氣必死誤補亦死其死也無氣以動故靜若內傷脾胃反瀉五臟必死誤補亦死其死也陰氣有餘故躁今內傷腸胃是謂六腑不足之病反瀉上焦虛無肺氣肺者五臟之一數也為牽牛之類朝損暮損其元氣消耗此乃暗中折人壽數犯大禁五也良可哀哉又曰胃惡熱而喜清大腸惡清冷而喜熱兩者不和何以調之岐伯曰調此者衣服飲食亦有適宜寒無悽愴暑無出汗飲食者熱無灼灼寒無滄滄寒溫中適故氣將持乃不致邪辟詳見本經是必有因用豈可用俱寒俱熱之食藥致損者歟經云內傷者其氣口脈反大於人迎一倍二倍三倍分經用藥又曰上部有脈下部無脈其人當吐不吐者死如但食不納噁心欲吐者不問一倍二倍不當止與瓜蒂散吐之但以指或以物探去之若所傷之物去不盡者更診其脈問其所傷以食藥去之以應塞因塞用又謂之寒因寒用瀉而下降乃應太陰之用其中更加升發之藥令其元氣上升塞因塞用因曲而為之直何為曲內傷胃氣是也何為直而生髮胃氣是也因治其飲食之內傷而使生氣增益胃氣完復此乃因曲而為之直也若依分經用藥其所傷之物寒熱溫涼生硬柔軟所傷不一難立定法只隨所傷之物不同各立治法臨時加減用之其用藥又當問諸病人從來稟氣盛衰所傷寒物熱物是喜食而食之耶不可服破氣藥若乘飢困而食之耶當益胃氣或為人所勉勸強食之宜損血而益氣也診其脈候傷在何臟方可與對病之藥豈可妄泄天真生氣以輕喪身寶乎且如先食熱而不傷繼之以寒物因後食致前食亦不消化而傷者當問熱食寒食孰多孰少則藥亦宜合其寒熱而與之則榮衛之氣必得周流但凡一一對證與之無不取驗丹溪曰世之病內傷為多但有挾痰者有挾外邪者有熱鬱於內而發者皆當以補元氣為主看所挾而兼用藥如虛氣甚者補中益氣湯少加附子以行參耆之功挾痰者補中益氣加半夏更以竹瀝薑汁傳送戴氏曰凡內外兼證或內傷重而外感輕者為內傷挾外感證治宜先補益而後散邪或以補中益氣湯為主治加散邪藥當以六經脈證參究加本經藥各治之或外感重而內傷輕者為外感挾內傷證治法宜先散邪而後補益或以辛涼等解散藥為君而以參朮茯苓芎歸等藥為臣使是其治也有內傷發斑因胃虛熱甚虛火遊行於外亦有痰者火則補而降之痰熱則微汗而散之切不可下內傷煩躁因血少不能潤理宜養陰煩躁不得眠者六一散加牛黃似傷寒煩躁不絶聲汗後復熱脈細數五七日不睡補中益氣湯倍人參用竹葉同煎甚者加麥門冬五味子知母似傷寒至五七日汗後煩躁吃水者補中益氣加附子似傷寒三戰後勞乏煩躁昏倦四君子湯加當歸黃耆知母麥門冬五味子甚者脈細數無序三更後吃水至天明此乃元氣虛加竹瀝大劑服之內傷病舌黑燥便泄食在大腸煩躁夜不安宜防風當歸飲下之內傷病退後煩渴不解者有餘熱在肺參苓甘草少加薑汁冷服虛甚者用人參湯藥方東垣補中益氣湯治內傷勞役元氣下陷發熱一切內虛口不知味四肢無力倦怠嗜臥蒸蒸發熱者服一二劑氣利微汗而愈黃耆熱甚者一錢人參一錢白朮當歸各七分陳皮甘草炙各五分升麻柴胡各二分上咀水二盞煎一盞去渣溫服傷重者二服而愈按東垣立方本旨云夫脾胃虛者因飲食勞倦心火亢甚而乘其土位其次肺氣受邪須用黃耆最多人參甘草次之脾胃一虛肺氣先絶故用黃耆以益皮毛而閉腠理不令自汗上喘氣短損其元氣人參以補之心火乘脾炙甘草之甘溫以瀉火熱而補脾胃中元氣若脾胃急痛腹中急縮者宜多用之經云急者緩之白朮甘草甘溫除胃中熱利腰臍間血胃中清氣在下升麻柴胡以引之黃耆甘草甘溫之氣味上升能補衛氣之散解而實其表也又緩帶脈之縮急二味苦幹味之薄者陰中之陽引清氣上升也氣亂於胸中為清濁相干用去白陳皮以理之又能助陽氣上升以散滯氣助諸甘辛為用也脾胃氣虛不能升浮為陰火傷其生髮之氣榮血大虧榮氣不營陰火熾盛是血中伏火日漸煎熬血氣日減心主血血減則心無所養致使心亂而煩病名曰悗悗者心惑而煩悶不安也故加辛甘微溫之劑生陽氣陽旺則能生陰血更以當歸和之少加黃柏以救腎水能瀉陰中之伏火如煩不止少加生地黃補腎水水旺而心火自降如氣浮心亂以硃砂安神丸固之則愈頭痛加蔓荊子三分痛甚加川芎五分頂痛腦痛加藁本五分細辛三分諸頭痛並用此四味足矣頭痛有痰沉重惰倦者乃太陰痰厥頭痛加半夏五分生薑三分耳鳴目黃頰頷腫頸肩臑肘臂外後膁痛面赤脈洪大者以羌活一錢防風七分藁本五分甘草五分益元氣而瀉火邪若更煩亂如腹中或周身有刺痛皆血澀不足加當歸身五分精神短少加人參五分五味子二十粒嗌痛項腫脈洪大面赤者加黃芩甘草各三分桔梗七分口乾咽乾者加乾葛五分升引胃氣上行以潤之夏月咳嗽者加五味子二十五粒麥門冬五分冬月咳嗽加不去根節麻黃五分秋涼亦加之夏月天溫咳嗽加佛耳草款冬花各五分久病痰嗽肺中伏火去人參黃耆以防痰嗽增益耳食不下乃胸中胃上有痰或氣澀加青皮木香各三分陳皮五分此三味為法冬月加益智仁草豆蔻各五分夏月加黃芩黃連各五分春初猶寒少加辛熱之劑以補春氣之不足為風藥之佐益智仁草豆蔻是也心下痞悶加枳實黃連各一錢腹中痞加枳實木香砂仁各五分厚朴七分如天寒少加乾薑或桂能食而心痞者加黃連枳實各三分脈緩有痰而痞加半夏黃連各八分脈弦四肢滿便難而心下痞加黃連五分柴胡七分甘草三分腹中痛加白芍藥五分甘草三分如惡寒冷痛加中桂五分夏月腹痛不惡寒惡熱者加黃芩甘草各五分芍藥一錢以治時熱也如腹痛在寒涼時加半夏益智草豆蔻之類腹中痛惡寒而脈弦者是木來剋土也小建中湯主之如脈沉細腹中痛是水來侮土也以理中湯主之如脈緩體重節痛腹脹自利米穀不化是濕勝以平胃散主之蒼朮苦辛能瀉濕乾薑辛熱能於土中瀉水芍藥味酸能於土中瀉木脅下痛或脅下急縮俱加柴胡三分甚加五分甘草三分臍下痛加熟地黃五分如不已乃大寒也加肉桂五分硃砂安神丸治內傷虛火上熾心神不寧夜不得寐硃砂五錢另研水飛為衣用甘草五錢五分黃連酒洗六錢當歸二錢半生地黃二錢上除硃砂四件共為細末湯泡蒸餅丸如黍米大硃砂為衣每服十五丸或草丸津咽下食後或溫水涼水少許送下內經曰熱淫所勝治以甘寒以苦瀉之以黃連之苦寒去心煩除濕熱為君以甘草生地黃之甘寒瀉火補氣滋生陰血為臣以當歸身補其血不足硃砂納浮溜之火而安神明也調中益氣湯其脈弦洪緩而沉按之中之下得一澀其證四肢倦怠肢節煩痛難以屈伸身體沉重煩心不安忽肥忽瘦口失滋味大小便清利而數或飲下便瀉或大便澀滯不行一二日一見夏月飧泄米穀不化或便後見血見白膿胸滿短氣膈咽不通或痰嗽稠黏口中沃沫耳鳴耳聾目中溜火熱擁頭目不得安臥嗜臥無力不思飲食人參五分黃耆一錢蒼朮甘草各五分柴胡此味為上氣不足胃氣與脾氣下溜乃補從陰養陽也升麻橘紅如腹中氣不得轉運更加一分木香各二分上咀作一服水二盞煎一盞空心溫服寧心絶思藥必神效蓋病在四肢血脈空腹在旦也時顯熱躁乃下元陰火蒸蒸發熱加生地黃二分黃柏三分大便虛坐不得或了而不了腹中逼迫血虛血澀也加當歸身三分身體沉重雖小便數多亦加茯苓二分蒼朮一錢澤瀉五分黃柏三分胃氣不和加半夏五分生薑三片有痰加生地黃二分以製半夏之毒痰厥頭痛非半夏不能除此足太陰脾經所作也兼躁熱加黃柏生地黃各二分如無以上證只服前藥春夏腹痛加白芍藥三分惡熱而渴或腹痛者便加芍藥五分生黃芩二分如惡寒腹中痛加桂心三分去黃芩名桂枝芍藥湯冬月腹痛不可用芍藥蓋其性大寒也只加乾薑二分或加半夏五七分以生薑制之秋冬之月胃脈四道為衝脈所逆並脅下少陽脈二道而反上行病名厥逆內經曰逆氣上行滿脈去形明七神昏絶離去其形而死矣其證氣上衝咽不得息而喘息有音不得臥加吳茱萸五分夏月有此證為大熱也蓋此病隨四時為寒熱溫涼宜以酒蘗酒連酒知母等分為細末熱湯為丸每服二百丸空心白湯送下仍多飲熱湯服畢少時便以美膳壓之使不令胃中停留直至下焦以瀉衝脈之邪也大抵治飲食勞倦所得之病乃虛勞七損證也當用溫平甘多辛少之藥治之是其本法也升陽順氣湯因飲食不節勞役所傷腹脅滿悶短氣遇春即口淡無味遇夏雖熱猶有惡寒飢則常如飽不喜食冷物人參三分黃耆一錢半夏六分甘草炙二分草豆蔻四分神麯炒升麻柴胡各三分當歸身陳皮黃柏各四分上水二鍾薑三片煎一鍾去渣食前溫服夫脾胃不足之證須用升麻柴胡苦平味之薄者陰中之陽引脾胃中清氣行於陽道及諸經生髮陰陽之氣以滋春氣之和也又引參耆甘草甘溫之氣味上行充實腠理使陽氣得衛外而為固也凡治脾胃之藥多以升陽補氣名之者此也升陽補氣湯治飲食不時飢飽勞役胃氣不足脾氣下溜氣短無力不能寒熱早飯後轉增昏悶頻要眠睡怠惰四肢不收懶倦動作五心煩熱厚朴薑炒三分升麻羌活白芍藥獨活防風甘草炙澤瀉各五分柴胡一錢二分生地黃七分半上咀作一服水一盞薑三片棗一枚煎一盞去渣食前溫服腹脹及腹中窄狹加厚朴一倍腹中似硬加砂仁三分升陽益胃湯治脾胃虛則怠惰嗜臥四肢不收時直秋燥令行濕熱少退體重節痛口燥舌乾飲食無味大便不調小便頻數食不消兼見肺病灑淅惡寒慘慘不樂面色惡而不和乃陽氣不升故也當以升陽益胃主之羌活獨活防風各三分以秋旺故以辛溫之藥瀉之柴胡白朮茯苓渴者不用澤瀉各四分黃耆錢半人參半夏制甘草炙各六分黃連二分陳皮白芍藥各五分何故秋旺用人參白朮芍藥之類反補肺蓋為脾胃虛則肺最受邪故因時而補易為力也上咀作一服水一鍾薑三片棗一枚煎一鍾去渣溫服服藥後如小便罷而病加增劇是不宜利小便當去茯苓澤瀉如方喜食一二日不可飽食恐胃再傷以藥力尚少脾胃之氣不得轉運升發也須薄滋味之食或美食助其藥力益升浮之氣而滋其胃氣慎不可淡食以損藥力而助邪氣之降沉也可以少役形體使胃與藥得轉運升發慎毋勞役使氣復傷若胃氣稍強少食加果以助藥力經云五果為助是也參朮調中湯瀉熱補氣止嗽定喘和脾胃進飲食白朮五分黃耆四分桑白皮陳皮去白人參各二分麥門冬青皮去穰甘草炙地骨皮白茯苓各二分五味子十二粒上咀作一服水二鍾煎一鍾溫服早飯後忌勞役多言雙和散治虛勞少力補血益氣川芎當歸熟地黃各一兩芍藥二兩黃耆一兩官桂甘草各七錢上為粗末每服四錢水二鍾薑三片棗二枚煎八分溫服當歸補血湯治肌膚燥熱因渴引飲目赤面紅晝夜不息脈洪大而虛重按全無經曰脈虛血虛又云血虛發熱證象白虎湯證惟脈不長實為辨耳誤服白虎湯必死此病得之勞役黃耆一兩當歸二錢酒浸上咀作一服水鍾半煎八分食前溫服節齋雜著方治勞苦用力過多預服數帖防後發熱人參黃耆炙各錢半陳皮白朮各一錢麥門冬去心五分五味子二十粒甘草炙七分甚者加附子四分上作一服水鍾半加薑棗煎八分溫服茯神湯治勞心思慮傷損精神頭眩目昏心虛氣短驚悸煩熱茯神去心酸棗仁炒研人參當歸各一錢麥門冬去心八分五味子十五粒芍藥生地黃川芎陳皮山梔仁炒甘草各六分上水鍾半薑三片煎八分溫服東垣門冬清肺飲治脾胃虛弱喘促精神少或衄血吐血宜服此紫菀茸一錢人參黃耆當歸芍藥麥門冬各七分甘草五分五味子九粒上作一服水鍾半煎八分食後溫服寬中喜食無厭丸一名寬中進食丸滋形氣喜飲食白朮炒神麯麥蘖麵炒黃一兩半夏制豬苓各七錢澤瀉白茯苓橘紅各三錢草豆蔻濕麵裹煨砂仁人參乾薑甘草炙各三錢青皮枳實各一錢木香一錢上為細末湯浸蒸餅丸如小豆大每服三十丸食後米飲下
