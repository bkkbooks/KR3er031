body:
  text: 卷之四十痿證門病機痿證敘論黃帝問曰五臟使人痿何也岐伯對曰肺主身之皮毛心主身之血脈肝主身之筋膜脾主身之肌肉腎主身之骨髓故肺熱葉焦則皮毛虛弱急薄著則生痿躄也又曰濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿痿因肺熱相傳經曰肺者臟之長也為心之蓋也五臟因肺熱發為痿躄此之謂也五臟受熱各為痿證經曰肺熱葉焦五臟因而受之發為痿躄心氣熱則生脈痿樞折挈脛縱而不任地也肝氣熱則膽泄口苦筋脈干則筋急而攣發為筋痿脾氣熱則胃干而渴肌肉不仁發為肉痿腎氣熱則腰腎不舉骨枯而髓減發為骨痿故足不任身治痿之法獨取陽明陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也云云故陽明熱則宗筋縱帶脈不引故足痿不用也痿為內臟不足所致陳無擇云人身以皮毛血脈筋脈肌肉骨髓以成其形內有五臟以主之若外隨情妄用喜怒勞佚以致內臟精血耗散使血脈筋骨肌肉痿弱無力以運動故致痿躄狀與柔風腳氣相類柔風腳氣皆外因風寒正氣與邪氣相搏故作腫而苦痛為邪實痿則內臟不足所致但不為任用更無痛楚此血氣之虛痿為血少原病式曰病痿皆屬肺金大抵肺主氣病則氣膹郁至於手足痿弱不能收持由肺金本燥燥則血液衰少不能榮養百骸故也脈候脈經曰肺痿脈必浮而弱其人欲咳不得咳咳則出干沫久久則小便不利寸口脈不出則反為發汗陽脈早索陰脈不澀三焦踟蹰入而不出陰脈不澀身體反冷其內反煩多唾唇燥小便反難此為痿傷於津液便如爛瓜亦如豚膏但因誤發汗故也脈浮而大為痿脈微而細者為虛陽明太陽脈盛為熱甚治法治痿當補脾清肺為要經曰痿因肺熱葉焦五臟因而受之發為痿躄又曰諸痿皆屬於土又曰四肢不舉舌本強足痿不收痰涎有聲皆屬於土又曰東方實西方虛瀉南方補北方肺金畏火脾土畏木嗜欲無節則水失所養火寡於畏而侮所勝肺得火邪而熱矣肺受火邪則金失所養木寡於畏而侮所勝脾得木邪而傷矣肺熱則不能營攝一身脾虛則四肢不能為用而諸痿之病作瀉南方則肺金清而東方不實何脾傷之有補北方則心火降而西方不虛何脾熱之有故陽明實則宗筋潤能束骨而利機關矣治痿之法無出於此治痿與治風痹不同張子和云痿因肺熱相傳四臟今人見其所患略與風痹腳氣相似便作風寒濕痹腳氣治之驟用燥熱之藥針灸燔灼不思痿為燥熱而成若作寒治是殺之也痿證當養血補氣則脾實而肺清丹溪曰痿證切不可用發散之劑痿為氣血虛主於補養補其氣以實脾土則四肢運用而筋有所滋則肺清養其血以潤燥則宗筋束骨而利機關何痿病之有有濕熱有痰有氣虛有血虛有死血者有食積妨礙者東垣取黃柏為君黃耆等補藥為輔佐以治諸痿無一定之方有兼痰積者有濕多者有熱多者有濕熱相半者有挾氣者臨病制方其善於治痿者乎因濕熱者用東垣健步丸加燥濕藥降火之劑黃柏黃芩蒼朮之類或用二陳湯加蒼白朮黃柏黃芩入竹瀝薑汁血虛用四物湯加蒼朮黃柏吞補陰丸氣虛用四君子湯加參朮黃芩黃柏虎潛丸補腎丸黃柏蒼朮皆治痿之要藥也藥方通治痿證劑東垣清燥湯治溫熱成痿以燥金受溫熱之邪是絶寒水化生之源則腎虧痿厥之病作身腰以下痿弱癱瘓不能動履黃耆人參各一錢蒼朮白朮各八分升麻柴胡各三分陳皮白茯苓豬苓曲末各五分五味子九粒麥門冬去心澤瀉黃柏末黃連甘草各三分當歸身生地黃一錢上水盞半煎空心熱服藿香養胃湯治脾胃虛弱四肢痿躄行立不能由陽明虛宗筋無所養遂成痿躄藿香人參白朮白茯苓陳皮各一錢半夏曲一錢白芍藥縮砂仁神麯甘草各五分薏苡仁炒一錢上水二盞薑三片棗一枚煎八分不拘時服八珍湯方見虛損門治痿證氣血兩虛東垣健步丸治膝中無力屈伸不得腰背腿腳沉重行步艱難酒防己一兩防風澤瀉各三錢川烏炮去皮酒苦參各一錢肉桂滑石炒栝蔞根酒洗柴胡羌活甘草炙各半錢上為細末酒糊丸梧桐子大每服七十丸食前溫酒送下正傳加味四物湯治諸痿四肢軟弱不能舉動當歸身一錢熟地黃三錢白芍藥川芎各七分五味子九粒麥門冬一錢人參五分黃柏一錢黃連五分知母三分杜仲七分半牛膝三分足不軟者不用蒼朮一錢上咀作一服水二鍾煎一鍾空心溫服酒糊為丸服亦可虎脛骨丸治兩足痿弱軟痛或如火焙從足踝下上衝腿胯等證因濕熱而成者蒼朮制黃柏制各四兩牛膝制二兩龜板酥炙虎骨酥炙防己各一兩當歸尾二兩上為細末麵糊為丸梧桐子大每服七十丸或一百丸空心鹽湯送下神效鹿角膠丸治血氣弱兩足痿弱不能行動久臥床褥鹿角膠一斤鹿角霜熟地黃各半斤川牛膝白茯苓菟絲子人參各二兩當歸身四兩白朮杜仲各二兩虎脛骨酥炙龜板酥炙各一兩上為細末另將鹿角膠用無灰酒二盞溶化丸梧桐子大每服百丸空心鹽薑湯下加味四斤丸治腎虛肺熱熱淫於內致筋骨痿弱不能勝持肉蓯蓉酒洗牛膝酒洗天麻乾木瓜鹿茸去毛酥炙熟地黃五味子酒浸菟絲子制上為末煉蜜丸梧桐子大每服五十丸食前溫酒或米飲送下易簡方金剛丸治腎損骨痿不能起床宜服此益精萆薢杜仲薑汁炒肉蓯蓉酒浸菟絲子制上為細末酒煮豬腰子搗爛和丸梧桐子大每服五七十丸空心溫酒送下補肝丸治前證陰如冰冷並陰汗兩腳痿弱無力黃耆一錢炙人參葛根白茯苓豬苓升麻各一錢柴胡當歸身羌活連翹黃柏澤瀉陳皮神麯知母防風蒼朮甘草炙各五分上水二盞煎一盞空心熱服忌酒濕面溫腎湯治面色萎黃腳軟弱無力陰汗出蒼朮白朮各一錢柴胡升麻麻黃豬苓澤瀉各五分酒黃柏防風白茯苓各一錢上水二盞煎一盞食前溫服一時久方可飲食麻木證兼風痹門治世俗謂之麻痹是也麻木者即痹證中之不仁者也病機麻木敘論內經以風寒濕三氣雜至合而為痹其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹其不痛不仁者為麻痹是也今夫麻木之證正經謂其不痛不仁病久入深榮衛之行澀經絡時疏故不痛皮膚不榮故不仁如繩扎縛初解之狀河間云留著不去即四肢麻木拘攣也丹溪曰麻是氣虛木是濕痰死血或有氣血俱虛但麻而不木者有虛感濕麻木兼作者有因虛風寒濕三氣乘之故周身掣痛兼麻木並作者若此其甚宜先汗而後補有痰滯四肢或一指麻木逾年而中風之病作此皆氣血先虛之兆也若此者須預調之脈候寸口脈浮濡屬氣虛麻在上體尺浮而濡麻在下體脈浮而緩屬濕為麻痹脈浮而緊屬寒為痛痹脈澀而芤屬死血為麻木不知痛癢治法治麻木以疏導鬱滯為先凡坐臥及倚靠之久而致經絡氣血不通即麻而木可見其鬱滯也凡麻木多屬四肢及手足之指者此則四末氣血充榮不到故多麻木也丹溪謂此當用附子行經則此意也十指麻木者胃中多有濕痰死血宜二陳湯加蒼白朮桃仁紅花之類藥方桂枝五物湯薏苡仁湯並見痹證門治氣血鬱滯四肢麻木不仁東垣麻黃桂枝升麻湯治飲食減少身體沉重渾身麻木腹中氣悶不能轉運麻黃桂枝升麻各三分人參黃耆白朮陳皮半夏薑製茯苓炙甘草各五分木香草豆蔻黑附子炮去皮臍厚朴生薑各三分黃柏澤瀉各四分上咀作一服水二盞煎八分食遠服人參益氣湯治兩千指麻木四肢困倦怠惰嗜臥熱傷元氣人參生甘草各一錢二分黃耆二錢炙甘草升麻各五分五味子三十粒柴胡白芍藥各七分上水二盞薑一片棗一枚煎八分熱服天麻黃耆湯治表有風證因連日醉飲其證復來右口角並眼牽引側視及左手足腳腿麻木疼痛天麻芍藥神麯羌活肢節疼加不疼減去茯苓各三分人參黃連各四分當歸各五分黃耆甘草升麻葛根黃柏蒼朮各六分澤瀉柴胡各七分上水二盞煎八分溫服沖和補氣湯治閣眼則麻木開則不麻四肢無力痿厥醋心目昏頭眩服此神效羌活獨活川歸黃柏各三分柴胡神麯木香草豆蔻各一分人參白朮澤瀉豬苓各一錢甘草升麻各五分芍藥黃耆二錢蒼朮陳皮各一錢黃連麻黃二分上作二服每服水二盞煎一盞溫服神效黃耆湯治遍身麻木不仁或頭面手足胕背腿腳麻木並治及兩目怕日羞明隱澀難開視物昏花睛痛亦治黃耆一錢陳皮五分人參八分炙甘草四分白芍藥一錢蔓荊子二分上作一服水盞半煎八分臨臥稍熱服如麻木不仁雖有熱宜加黃柏只加黃耆一錢通作三錢如麻木甚者加芍藥一錢小便淋澀加澤瀉五分如有大熱加酒黃柏三分補氣湯治皮膚麻木黃耆陳皮甘草各一錢二分澤瀉六分芍藥八分上一服水盞半煎八分溫服導氣湯治腿麻木沉重黃耆二錢甘草錢半青皮一錢升麻柴胡當歸梢澤瀉各五分陳皮紅花少許五味子三十粒上水二盞煎八分溫服虞氏三妙丸治濕熱下流兩腳麻木如火烙之熱黃柏酒炒四兩蒼朮制四兩川牛膝酒洗二兩上為細末麵糊丸如梧桐子大每服五七十丸空心鹽薑湯下忌魚腥蕎麥熱面煎炒等物易簡方治遍身麻痹黃耆一兩人參白芍藥各五錢附子炮一枚當歸三錢上為末煉蜜丸梧桐子大每服三五十丸酒下又方治十指疼痛麻木不仁用附子三錢煎熟廣木香一錢磨汁入內服又方治皮膚麻痹瘙癢用莽草煎湯洗浴效
