body:
  text: 卷之十九燥證門病機敘論經曰諸澀枯涸幹勁揭皴皆屬於燥又曰燥勝則乾又曰二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治原病式曰澀物濕則滑澤干則澀滯燥濕相反故也如人身中外澀澀皆屬燥金之化也故秋脈澀澀燥也或麻者亦由澀也枯不榮旺也涸無水液也干不滋潤也勁不柔和也春秋相反燥濕不同故也燥以風熱為原經曰風熱火同陽也寒燥濕同陰也又燥濕小異也然燥金雖屬秋陰而異於寒濕故反同其風熱也故火熱盛則金衰而風生緣風能勝濕熱能耗液而反寒陽實陰虛則風熱勝於水濕而為燥也凡人風病多因熱甚而風燥者為其兼化以熱為主也然陽實陰虛而風熱太甚以勝水濕金受火制因而成燥燥因血少腎水不足燥乃二陽陽明燥金肺與大腸之氣之為病也夫金為陰之主為水之源因受火熱則為燥氣之化寒水生化之源竭絕於上而不能下滋腎水灌溉周身充榮血脈則內外燥氣之化而為病皆由此也有因火病克伐太過有因吐利而亡津液或預防養生誤食金石或房勞致虛補塞燥劑有食味過厚辛熱太多醇酒炙肉皆助火而損真陰日漸煎熬血液衰耗使燥熱轉深而燥病偏作在外則皮膚皴揭在上則咽鼻焦乾在中則水液衰少而煩躁在下則腸胃枯澀津不潤而便難在手足則為痿弱無力在脈則澀而微此皆陰血為火熱所傷而腎水失生化之源也劉河間分大便秘結或消渴之類為燥病之裡證身熱皮膚燥澀乾疥爪枯之類為燥病之表證而於陽結陰結氣盛血少痰鬱風熱可得而悉大法身表熱為燥在表渴飲水為熱在裡肝氣自甚則風勝加之燥熱則病筋脈勁強緊急而口噤也燥熱太甚而脾胃乾涸則成消渴詳見本方風熱燥並郁甚於里故煩滿而或秘結詳見秘結門風熱燥甚而筋緩不收為痿痹脈候脈緊而澀為燥或浮而弦為風燥或芤而虛為血少而燥治法治燥以滋陰養血為本經曰手得血而能握足得血而能步夫燥之為病皆由血液衰少腎水不充故諸賁郁病痿皆屬肺金燥氣之化也夫秋深火熱火行物燥甚則木葉萎落故治法當以甘寒滋潤之劑能生血勝熱陰得滋而火得制液能潤而燥能除源泉下降精血上榮如是則氣液宣通內神茂而外色澤矣經云燥者潤之非滋陰血之謂歟經曰東方實西方虛瀉南方補北方則滋陰養血治燥之意也治燥用風熱藥不可太過燥病雖為風熱之化施治當審輕重之分以養血潤燥為主加佐辛涼可也若或純用辛涼驅風苦寒泄熱不無逐末而忘本世多此弊而燥愈增丹溪云皮膚皴揭坼裂血出大痛或肌膚燥癢皆火爍肺金燥之甚也宜以四物湯去川芎加麥門冬人參天花粉黃柏五味子之類治之藥方養血潤燥劑虞氏生血潤膚飲治燥證皮膚坼裂手足枯燥搔之屑起血出痛楚十指甲厚反而莫能搔癢又或歲金太過或秋深燥金用事久晴不雨皆為燥並患燥病服悉愈川當歸酒洗生地黃同上熟地黃黃芩一錢天門冬錢半麥門冬一錢五味子九粒黃耆一錢栝蔞仁五分桃仁泥五分酒紅花一分升麻二分上水二盞煎一盞食後溫服如大便結燥加麻仁郁李仁各一錢東垣導滯通幽湯治大便結燥幽門不通上衝吸門不開噎塞不便氣不得下治在幽門以辛潤之當歸生地黃桃仁各一錢另研紅花三分升麻熟地黃各五分炙甘草三分上水煎調檳榔末五分服加大黃名當歸潤燥湯元戎桃仁四物湯治血澀秘結不通桃仁當歸川芎生地黃白芍藥大黃各等分上水煎或丸服俱可拔萃六味地黃丸治下焦燥熱小便短數陰虛火旺燥熱勞瘦並治丹溪大補陰丸治燥熱二方並見火門清氣化痰生津甘露丸治咽乾燥渴多痰而咳天門冬去心麥門冬同上橘皮鹽水拌天花粉各二兩人參一兩知母鹽水炒一兩二錢枯梗一兩粉草五錢臞仙瓊脂膏治血虛皮膚枯燥消渴等證生地黃鮮者二十斤洗淨細搗取真汁去渣鹿角膠真酥油各一斤白砂蜜二斤煎一二沸掠去面上末生薑二兩搗取真汁先以文武火熬地黃汁數沸以絹濾取淨汁又煎二十沸下鹿角膠次下酥油及蜜同煎良久候棝如餳以瓷器取貯每服二三匙空心溫酒調下瓊玉膏治證同前及肺熱咳嗽燥甚方見咳嗽門天門冬膏治血虛肺燥皮膚坼裂及肺痿咳血天門冬鮮者不拘多少上洗淨去皮心細搗絞取汁澄清以布濾去渣用砂鍋慢火熬成膏每用一二匙空心溫酒調下地仙膏治諸燥證山藥一斤為末杏仁一升去皮尖牛乳二升上以杏仁搗細入牛乳山藥拌勻絞汁用新甕瓶密封重湯煮一日每服一二匙空心溫酒或湯下證治活血潤燥生津飲麥門冬天門冬生地黃熟地黃天花粉當歸栝蔞仁麻仁泥粉草各等分上咀水煎溫服治風燥劑東垣潤腸丸治脾胃中伏火大便秘澀或乾燥不通全不思食乃風燥血秘以此潤燥和血疏風自然通矣麻子仁桃仁各一兩去皮尖另研羌活當歸尾大黃煨皂角仁秦艽各半兩上為細末煉蜜和勻丸梧桐子大每服四十丸空心白湯下麻仁丸郁李仁麻子仁各六兩大黃二兩各生半炒山藥防風枳殼炒各七錢半檳榔羌活木香各半兩上為細末煉蜜丸梧桐子大每服三四十丸溫白湯下機要秦艽丸治血弱筋燥陰虛不能養榮手足不能潤動爪甲乾燥風熱甚方見風門子和脾約丸治風燥秘結方見本門東垣生液甘露飲一名清涼飲子治消中能食而瘦口舌乾燥自汗大便結燥小便頻數和血益氣湯治口燥便秘舌上赤脈此藥生津除燥長肌辛潤緩肌湯治肌裂皮膚諸燥澀不潤澤三方並見消渴門活血潤燥丸治風秘血秘常常結燥潤腸丸治結燥二方並見秘結門
