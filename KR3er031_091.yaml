body:
  text: 卷之九十一痘疹泄祕病機痘疹二證表裡不同痘之與疹雖皆中於胎毒其原雖同其證則異厚孕成之初先有臟而後有腑臟乃積受之地腑乃傳送之所臟屬陰為里故其受毒為最深而痘所以久熱而難出腑屬陽為表故其受毒淺而疹所以暴熱而易生痘瘡出於臟故在肌肉血脈之間必先出紅斑而後漸起如痘故名曰痘疹子出於腑故在皮膚之下而出皮膚之上其形如麻一出而役俗名曰麻痘自里而出於臟故重疹自表而出於腑故輕痘證早晨身微熱午後大熱眼睛色黃兩脅下吸吸然動甚則發驚搐此屬心臟病稍有失治或裡虛則青陷入而不能救疹證早晨微熱午後亦大熱眼白珠赤色而不黃手足冷而吐逆此屬肺臟病隨熱發散則易生易沒而愈為不難甫按痘難疹易之說此則自其世俗常情而言之其有所感入深胃氣原弱又或因瀉痢而出之不快或發之未透而隨現隨隱久之邪氣漸入於胃必瀉不已而復發加之喘促為必死矣若此者亦不可以易易言之耳所以疹證又何可以輕視之耶凡覺出疹略見虛弱當先補養脾胃欲出不出急宜托裡發表以助之首尾俱不可瀉一如痘證同也支氏曰疹證之發多在天行癘氣傳染之時沿門比屋相傳輕重相等發熱之間或咳嗽噴嚏鼻流清涕眼胞浮腫面腫腮赤或覺淚汪汪或噁心嘔噦即是疹候便宜用解毒發散之藥依時令輕重催發出外不使停留於中自無後患然其所發但以六時即收為度乃陽生陰成陰生陽成造化自然之妙如午後出者子後收之類若一出即收者失之太速或出之後連延三四日不收者此毒太甚外發未盡內有餘邪所致須與化斑解毒等湯如玄參石膏之屬又有疹既收回餘毒未盡三日之外又復發出至五六次不已者此因發熱之時不避風寒邪氣鬱於肌肉之間留連不散雖得前解發之劑終不舒暢若出疹之際有雜證亦當隨證而治之凡疹證發熱之時或嘔吐或自利或滯下者皆火邪內迫毒氣所行之地而隨病也吐者竹茹石膏湯自利者升麻澤瀉湯滯下者黃芩勺藥湯加黃連枳殼實者少加大黃微下之虛者通加人參以佐之痘夾疹痘瘡之發常觸於天行時氣疹之發多中於時氣風寒本非尋常併發者或有齊發並出此謂之兩感歲氣臟腑擊動表裡交徵皆為不順之候如痘稀疏可用升麻湯解之疹散豆出隨證調治若痘太盛其疹雖解氣血重傷至於收斂脫落終難痊妥惟以保養脾胃調和氣血庶幾能濟發熱透解散多痘疹必輕凡小兒感時行發熱當用解毒發表之劑為第一法若能於發熱之初用力則痘疹自稀或稠亦勢輕也何則不知此義失於解散或一熱即出此痘多危蓋邪毒在中未嘗少敗縱是正氣充完亦終為之纍世謂服藥預先防之則終身不出斯亦理之所必無也蓋疽毒為人身所必有謂之所感有淺深所發有遲早固勢然也於其感發之際解散毒邪痘疹自輕而得吉如傷寒證治失於其時則有胃爛發斑春瘟證治失於其時則有溫毒發斑由此而知發熱之初若早為解散不致鬱於內而成痘疹有矣若謂預防用藥終身不出豈其理乎凡小兒發熱如瘧狀熱作有時者為潮熱發熱倍能飲食唇紅面赤大小便祕脅下有汗者為風熱發熱面赤鼻流清涕手足煩躁左額青筋自汗惡寒者為傷風熱發熱而手足微冷面色青慘耳鼻冷腮寒無汗左額有青紋者是傷寒熱發熱眼胞微腫右額有青筋頭熱肚熱胸滿惡食而腹脹者是食積熱發熱眉心有青紋手心有汗時發驚惕者為驚熱發熱多渴欲飲腹上有青筋或脹或瀉者為疳熱發熱唇上下汗出唇中間起白泡耳陰皆冷者為變蒸熱變蒸之中偶有時行寒疫者則耳與陰反熱此為異氣熱發熱目閉面色赤者為胎熱惟痘疹發熱隨天氣而蒸出如冬月應寒而反溫謂之冬溫有隨春氣暄暖而蒸出有因他病發熱不已而蒸出者此皆外熱而感動其中熱為痘疹也夫痘疹正作之時其發熱也與傷寒相似蒸蒸壯熱咳嗽痰涎唾涕鼻吸或作寒作熱或心痛頭痛或腹痛惡心或兼五臟之證明其熱自內而出也面赤唇紅煩悶噴嚏呵缺惟耳與尻及手足指冷此欲發痘疹也蓋耳尻為腎之外候原腎不受火邪而無痘毒故發熱不幹腎之經也耳雖不熱亦有紅脈見於耳後方為痘疹如不渴不瀉不煩亂二便如常此為吉證不須用藥痘本於胎毒錢氏曰小兒痘疹蓋由受胎之感血穢液毒十月有生之後必感外邪而發一次故謂之百歲瘡又謂之天瘡其狀如豆故曰痘瘡魏氏曰痘之為證根於精血之初成於淫火之後男女交媾無欲不行無火不動欲因火生火因欲熾精施血就何莫而非火之所為二五妙合精血成形亦必集火以熔冶也支氏曰受胎之初假父精母血交媾而成形不無欲火熾於其中至於兒在母胎十月藉其氣血以長養為母者多不能節房欲戒厚味日積月纍感於胞胎及兒臟腑謂之胎毒降生之後必感運氣勝復之邪沖搏原受胎毒相激而遂出痘其遲早之不同則歲運之乘否輕重之同異則毒氣之淺深此理之可測勢之必然也痘發於心經內經曰諸痛瘡瘍皆屬心火痘即瘡也非心火則不發故每發熱心火熾甚未出痘先多有驚搐可見發於心矣況父母交媾之初一皆心火熔治而精血始得成胎當此火毒之餘亦感通於兒之心臟是蓋以類而相從也降生以來此火之蘊雖寂然不動有感而應故遇歲氣外觸而後出也未出之先而發驚搐者為吉既出之後而驚搐者非宜何則痘既出矣心臟之蘊火亦宜疏散矣今尚驚搐則是心之蘊火未盡出也實為可憂未發痘疹之先宜用四制辰砂丸抱龍鎮心丸皆為要藥既出之後熱甚紅紫色而煩渴者宜用犀角地黃湯亦皆解乎心火之熾也始於解毒一皆主乎心繼於養胃所以調達氣血而痘疹之治法斯順而吉也歌曰五指梢當冷驚來不可當若逢中指熱必定是傷寒中指獨自冷麻痘證相關男左女右手分明仔細看出痘辨吉凶發熱三五日而痘出者吉也發熱一日而即痘出者凶也痘出作三日先後出者吉也一齊盡出痘遍周身者凶也痘初出報於鼻準口腮年壽印堂如粟粒如黍米淡紅色者吉也初報於承漿及兩顴右鬢際如蚊咬或如紫黑斑者凶也胸背手足五心無痘者吉也有曰不怕五心有痘只怕原瘡泄漏原瘡乃是未痘之先有瘡泄去膿血斯為凶也不然五心稀有亦不妨事痘出稀疏圓粒高起得數者吉也出如蠶種稠密平塌者凶也痘出圓粒高起根窠紅滑頭頂光潤腳有線者吉也痘出不起低塌陷頂白色或如茱萸或如血癮者凶也痘出安靜飲食二便如常者吉也出後煩躁猶發大熱喘渴或瀉或驚氣促腹脹不思飲食者凶也痘瘡不用服藥例凡瘡始出之時及未出之先大便稠黃小便如常或發驚或不發驚渾身壯熱或進退溫熱三兩次其瘡透快根紅頭臘色次第肥滿自見痘為始三日出齊六日灌漿齊九日黝齊十二日結痂齊十五日續續落痂別無他候不必服藥痘瘡合用服藥例痘瘡將出忽然泄瀉或因發熱誤服發汗藥或清涼解利藥或不因誤服諸藥但將出至已出已出至退剝始終如有癢塌搖頭咬牙腹脹氣促渴瀉寒戰及瘡出不透快或正出忽然平隱不發或灰色或過三日後不能灌漿灌漿完不能幹漿干漿後不能結痂或膿或血或熱或寒九竅不利皆有表裡虛實之分並宜急急依時對證選方用藥救治不可少緩稍有遲誤恐難濟事驚搐發熱之時痘未出而發驚者乃毒氣出於心經此亦為順不可妄投驚藥若熱甚而復發搐者可用發散毒氣如惺惺散消毒散紅綿散導赤散升麻湯兼與快氣利小便祛風之劑痘出必輕心火熱甚則肺金受克不能制肝肝旺則脾土受克於中上下氣不循環五行之氣無以相制故心獨大熱氣擊動心神不安則發驚搐治宜瀉肝利小便瀉肝則風去利小便則熱除風熱既平驚自愈矣若過服寒藥則其氣斂毒反陷伏痘出不透多致不救痘出之後而發驚搐此是熱毒留於心經痘出不盡發數次不寧喉中有痰聲者不治嘔吐痘瘡嘔吐要分虛實寒熱有脾胃虛弱不思飲食二便清利不煩渴而作嘔吐要分虛寒也宜服理中湯六君子湯加減異功散有胃火壅滯大便不通煩渴而作嘔吐者實熱也宜用清胃散竹葉石膏湯黃連橘皮湯大便不通者微下之以小承氣湯五苓散泄瀉痘瘡泄瀉惟在未出之前發熱大甚泄瀉二三行無妨為泄去熱毒亦不宜久瀉若瀉久恐虛其內而痘反不能發越既出之後並不宜瀉若瀉多內耗元氣津液虧涸氣血不榮其瘡雖出難起發雖起發亦難結痂若見熱盛壅實瀉二行無妨若非熱實皆不宜見瀉出痘後作瀉者急服四君子湯豆蔻丸異功散之類如瀉不止喘渴腹脹咬牙者不救喘渴痘瘡出後喘渴是火爍肺金肺氣所傷往來不能通暢夫火盛則氣耗而液衰故喘而渴也宜用人參麥門冬湯生津益氣甚者用石膏人參湯有腹脹大便黑煩躁喘渴此為瘀血在裡宜犀角地黃湯之屬或當炎夏觸冒暑邪喘渴昏迷者用竹葉石膏湯人參白虎湯之屬有因虛火不生津液而渴者宜保元湯加麥門冬五味子之類有因陰虛水不足而渴者其治多難有以六味地黃丸加五味子治之亦有中效脹祕痘瘡初出已出若有腹脹大小便祕之證此蓋毒氣內蓄不能發出宜用四聖散若十分不通須微下之無妨有外感寒而內傷冷有陰陽不和熱被冷激相摶於裡不能發外令人脹喘痘色白而無血宜用溫中藥則冷氣散而脹消矣如傷冷者腹中虛鳴宜理中湯異功散之類毒氣陷伏入里亦令人脹滿大小便祕宜用解毒快氣之劑如人參散活血散之類若便血糞黑沉睡不醒則用犀角地黃湯白塌痘瘡出不紅潤灰白而頂陷者此血氣兩虛也宜用保元湯加肉桂之類有痘出五六日之間偶因吐瀉脾胃內虛或誤服涼藥以致變壞謂陷伏俱宜溫中暖胃並用保元湯合胃愛散理中湯之類有因外感風寒觸犯穢惡而變陷者謂之倒靨宜溫肌發散托裡如異功散人牙散四聖散之類黑陷痘黑陷陳氏謂之變黑歸腎為毒氣入於腎經難治汪氏理辨以血載毒上參陽位陽不足陰往乘之故也又血與氣交而不偶不能復歸本位因元氣虛弱不能續其衛氣以制其血乃自失其政而然且血順氣而蓄血亦為之不榮故致枯萎而黑陷此理之必然也宜用保元湯加芎桂提補其氣氣旺則諸毒自發黑者將轉而為黃矣有外感風寒變黑陷者宜溫散人牙散有毒氣太盛復入攻裡黑陷宜解毒利小便用消毒飲導赤散陽氣虛不應者宜溫補托裡保元湯合紫草散有觸穢惡而黑陷與倒靨同治宜焚蒼朮及胡荽酒之類黑陷之證故為逆候但能理脾胃之氣氣充發亦可以保其無危也癢痘瘡發癢多是氣血不足故曰諸癢為虛宜保元湯加芎桂十全大補湯之屬有因氣虛陰血上行氣分血味鹹醃螫皮肉而為癢宜保元湯倍加黃耆以助表少加芍藥以制血則癢自止有因不忌飲食以致作癢用蟬蛻一物湯或實癢者因大便不通熱壅而癢當通大便輕者用蜂湯調滑石末以羽掃瘡上痛痘瘡作痛有實有虛或曰諸痛為實此一偏之說也大便祕結煩躁不寧喘渴作痛此實痛也若二便清利衛氣不充脾氣不行榮而作痛者非虛而何虛則以保元湯實則以解毒湯之屬痘疔痘瘡最毒者名痘疔其疔獨黑而或陷或大獨紫或痛或脹若不速治十不救一法用銀簪挑破其疔將四聖散點入疔內即變紅蠟色而獲安斑疹冬月溫暖而溫毒發斑疹如錦紋者又有冬月觸寒毒至春始發病初在表或已發汗或未發汗表證未罷而毒不散故發斑以黑膏主之又有冬月溫暖人感乖戾非節之氣冬未即散至春或被寒折毒不得泄遇天暄暖毒氣始發即肌膚斑爛癮疹如錦紋咳嗽心悶嘔吐清汁葛根橘皮湯主之醫者辨作胃寒治之轉加悶亂狀若驚癇遂生他疾楊氏曰毒氣入胃令人發斑其證昏聵關前脈大多見於胸腹輕則如疹子重則如錦紋咳嗽易治黑者難治斑爛痘瘡既靨遍身皮肉斑爛者由於不當發散而誤用發散之藥使毒熱暴出於肌膚皆為斑瘡以致潰爛故名斑爛若再生者乃因靨後失於解利毒氣留滯於肌肉之間而致然也甚者用干黃土為末敷之敗草散貼之有因誤爪成瘡則用百花膏有疳蝕瘡則用硝膽膏綿繭散生肌散之屬聲啞水嗆痘出而聲音不出此為形氣俱病心之氣舉擊出於肺而為聲其喉之竅若管籥焉金受火制之使然也故宜清金用涼膈散去硝黃痘之發氣拘血載奔行四肢百脈因風邪阻塞腠理痰唾稠黏有礙氣道其毒不能盡行於肌表因成咽啞者痘出氣喉初甚細小不覺若微露其機者用甘桔湯預防及至肌表之痘成漿內亦成漿其痘壅盛則氣出管籥窄狹所以氣與擊出之聲不清也不清者肺金之所害也水嗆者毒壅會厭門也然是門飲食所進之處如飲水湯則毒礙其門不易進納而乃溢入氣喉氣喉者不受物之處故發於嗆也或進穀食而不嗆者蓋食有渣自然有其門而非如水之溢不犯氣道故也七日前聲啞咽嗆併為逆證七日之後而有者不待醫而自愈外痘結痂豈有內痘不痊哉故先腎服甘桔湯用於已發未發之前蓋所以清其氣道不使毒之有犯此預治之法也不可忽若待證成而治之可謂不通矣寒戰咬牙夫寒戰者陰凝於陽陽分虛則陰入氣道而𣯶毛象作寒不待練而自戰也咬牙者陽陷於陰陰分虛則陽入血道而兩相銼作聲不待力而自鬥也七日前見寒戰者表虛也鬥牙者內虛也七日後見寒戰者氣虛極也氣虛者以保元湯加桂以溫陽分血虛者保元湯加芎歸以益陰分有獨寒戰者有獨咬牙者非一體治之面目發腫理辨曰其痘起發五六日之際有面目先腫光亮者是陽乘陰分毒不能發也何則血乃氣之本血有不足根本以失去矣氣乃血之標將見虛陽動作其氣妄行肉分區區不足之血亦何能乘載其毒而出耶七日之後傳經已足氣退毒陷陰陽各失其正尚何可治之有哉治者不可不預為之調攝氣血以保重之至此則難治矣晝夜啼哭小兒蘊熱毒為瘡疹因外未得出內不得散則神不安以致然耳當此察其蘊毒在表在裡若發而渴面赤小便赤宜微表令出可也若外無熱大便祕腹脹滿者當令大便通則無壅滯之氣榮衛通行神魂泰然癢瘡出亦快矣或以為心熱為痰聚而用下藥良由不知其本云不乳食痘瘡不乳食有虛實二證或吐或利面青目睛青黑色者為虛寒宜溫之若大小二便如常面赤而氣壅或渴或睡中驚或咬牙目白睛黃或赤氣喘身熱此實熟中滿不乳食也痘瘡入目心熱生肝風肝主目熱毒沖之故為患宜涼肝丸密蒙花散服之秦皮湯洗之痘後而目傷者蓋因目中生痘或食發物或毒熱太甚上蒸肝膈故也切不可用點藥但以穀精散人參牛蒡子散菊花散羌活防風散治之外用秦皮湯洗之痘瘡平復與雞鴨蛋食之則傷神效若腫脹不能開者用雞蛋清調黃連末塗兩太陽穴並足心以引熱毒不灌漿痘至灌漿之次宜因先後以漸滿其不灌者有二因一則氣血不足一則熱毒太盛澆涸精液其不足者用保元湯加薑桂連服二三劑或木香散之類其熱盛者用起膿散攻毒散之類瘡壞無膿者不治不結痂膿泡既充當期結痂結痂而愈自痘出而至十日十一十二日當從口唇頭面以漸收靨自上而下為順自下而上為逆當結不結是謂難靨乃毒氣太盛內外鬱蒸無陰氣以斂之若不速解毒入攻心為害極大法用豬尾膏犀角散解之或里宣風散導利之使熱不壅脹必結痂矣皆須十日以後用之切戒大早初覺難靨可燒紅棗於房內令其氣蒸亦得收結不落痂痘瘡得結過期而痂瘡不脫落者由熱盛氣血不足故不應期而落也內服犀角散八珍渴外塗脂蜜無有不落瘢痕凹凸痘瘡在結膿之時未成痂疕便爬去之則成瘢痕矣欲無瘢痕不可早爬不可見風早不可觸穢惡氣不犯三者則無瘢痕肌膚凹凸之患若見瘢者宜用硼砂酒豬胰白蜜之類痘後癰癤痘後發癰癤者乃痘毒之氣留於經絡未盡去故壅於肢筋間而發者也亦有既平之後失於解利而生惟小柴胡湯加生地黃最妙或清涼欲子大連翹飲消毒飲犀角地黃湯皆可痘後餘熱痘瘡既平餘熱不除者當量其輕重而治之大熱則利小便小熱則宜解毒蓋利小水使心有所導引雖不用涼藥而其餘熱自無容留矣小熱解毒者蓋小熱不解大熱必生利用導赤散解用犀角地黃湯切不可峻下痘後胃氣一虛而反變生癰腫別病若身熱血他證者用六味柴胡麥門散咽喉口舌生瘡不能吮乳者用如聖麥門冬湯觀候形證輕重痘瘡觀其形證則知輕重輕者不必服藥重者寧不早圖而救治乎凡痘瘡已出未出大便祕小便赤澀發熱口渴為裡熱可用涼血解毒潤便利水消毒飲四聖散之類凡先後吐瀉不食初見須速調之若稍延緩致令元氣虛憊必致難救其有實證輕順俱不必服保元湯諸補藥若裡實而用補劑後必結癰餘毒表實而用補劑則必斑爛潰痛輕證作三四次出頭目胸腹稀少眼中無大小不等肥滿光澤裡外肥紅根腳紅頭臘色重證一齊並出密如蠶種身溫腹脹頭溫足冷皮膚赤色吐利五內七竅皆有瘡黑點或如茱萸外白內黑灰白色半輕半重外黑內赤痘瘡夾疹輕變重痘出妄汗妄下誤服升麻湯大黃等藥不忌口過飽失飢食生冷飲酒多信巫不信醫犯房室觸穢氣冒風寒首尾可畏不食多渴渴飲不食益黃散白朮散戛齒噤牙有虛有實能令陷伏憎寒困倦令瘡陷入是脾虛也煩躁體熱搖頭者欲生風吐逆泄瀉食不化而出並痘後大便膿血瘡作黑陷內無膿血或作黑泡或先瘡跡作黑孔死大小便澀三黃丸癰塊壅腫痘毒變瘡口臭蝕唇口鼻牙落者死喘急痰盛聲啞氣噎或正出或痘後有此證者多死咽藥食腸中鳴者死以上俱是危證首尾可畏也除此之外皆不妨內犯二者若飲食如舊雖困重醫治可生如飲食減平日之半者死飲食如舊內犯三四件者亦死蠟紅白黑四色辨痘瘡有蠟紅白黑四色為吉凶晦吝之主甚不可不辨也何則蠟色即蒼而黃為中央之正色痘見蠟色者斯為吉兆也紅色者南方火心之象也火盛則色紅晦之道也則當解乎心熱如涼血犀角地黃湯之類是也白色者西方金肺之象也肺氣虛則色白虛甚則兼陷伏痘見白色而陷中吝之道也則當大補氣血如保元湯加薑桂附子之類是也黑色者北方水腎之象也腎水不足以制火邪火極變黑而似水也俗調變黑歸腎痘見黑而陷凶之道也則當解毒如久閉者用百祥丸小承氣湯下之有虛之甚者保元湯加桂芎從其熱而用之之類也汪氏理辨曰五色者五行之精華也正則光而明衰則慘而暗五臟榮枯於此可見矣故痘毒之出於臟惟利乎明不利乎暗光明者氣血旺也慘暗者氣血衰也氣位旺而血得其令氣位衰而血被其囚血非氣則毒不收氣非血則毒不化信乎痘毒必氣血而後可以終始成功且夫色之紅者毒始出也白者毒未散也黃者毒將解也干黃者毒盡解也灰白者血衰而氣滯也黑者毒滯而血乾也焦竭者血氣枯也如紅變白白變黃者吉紅變紫紫變黑者凶之兆也且毒出乎五臟而非獨一臟前人言五臟各主色固有之又不載各臟治法錢氏陳氏所論變黑歸腎此皆過於理也春甫調五色合五臟此至當之理然辨云毒出五臟非獨一臟正所以五臟之中而一臟之病甚則其一臟之象著見也又云錢氏陳氏變黑歸腎之論皆過於理是辨之未詳辨也凡變黑者乃火之劇而腎水浸衰不能制火故色黑也其責安得不歸於腎乎調其未載五臟之方則可矣謂其謬論辨亦未知思也豫每參合五臟立方罔不應驗故録其方法於四色辨中以備全論醫者審之順逆險候三大要順候春夏為順先發驚搐而後出痘者順先發熱熱歇出痘順飲食如常順二便如常順逆候秋冬為逆春膿泡金剋木夏黑陷水剋火秋髮斑火剋金冬發疹土剋水便血或利乳食不化脾虛正出吐利風攻頤頷項睫或胸高突面腫鼻陷閉目咬牙或鼻有黑氣肌肉黑面色青黑或因吐利內虛陷伏已出妄汗而成斑爛或冒風邪成倒靨不起發也泄瀉不止瘡成餅塌燥渴小便澀聲啞飲藥錯喉喘息不休瘡盡爪破臭爛不可近目閉黑暗濛昧無魂頭面腫足冷至膝不時努力如用大便之狀瘡與肉色不分已出身熱足熱不解已出煩躁悶亂瘥後驚搐痘瘡未該靨結卒然焦黑青紫惡候痘出而復不出忽大瀉而渴已出譫語不止或黑紫色隱在肌內里其毒重甚者五臟咽喉中有痘其瘡不成粒如凝血而痛黑靨不生膿血者死或見是證以藥解之而毒反沒者死目開腹脹口中作臭氣者不治大小便祕肌黑目閉聲啞者死胃熱發黃身如橘色下利者死順逆險按期候法痘瘡始出一二日間順候初出血點淡紅潤色一二日如粟如黍出於口鼻腮耳年壽之間先發三兩點淡紅潤色者順之兆也順者不藥自愈為氣得其正血得其行其毒不甚不得妄行肆其虐也逆候形如蠶種一片如麻布紅黑疹初出於天庭司空太陽印堂方廣之處逆之兆也逆者不治此為元氣本虛血氣凝滯毒邪太盛妄參陽位無以當其勢險候圈暈成形乾紅少潤痘出雖稠尚紅潤而成粒者險也險者毒雖盛元氣尚充未可為虞宜用補元氣之中少加解毒之藥須防毒盛正氣有所傷也痘瘡圓混二三日間順候氣溢血附飽滿光潔三四日間根窠圓混元氣之充滿也氣充則血附而各得其道為順順者不治自愈逆候氣澀血凝枯槁不澤根窠無暈氣離血散為逆逆者氣血交會不足致毒乘機而犯內也險候頂陷不滿光潔有神根窠尚圓惟頂有陷氣血難充為險以保元湯加芎桂助脾胃氣血可保無虞痘瘡形色候四五日間順候氣滿血榮鮮明光澤則知血氣之旺受毒之淺其形光潤大小不一等此氣和血就為順不治自愈逆候四五日來綿密如泡紫黑乾紅或如蠶種或黑陷紫泡皆逆也逆者難治為氣血乖離邪毒內攻也險候四五日間根窠雖起色慘不明為險血雖好氣分弱些交會缺分明宜用保元湯加朮芎助衛和榮色自光明矣痘瘡起發圓滿候順候五六日間氣盛血榮於內痘當圓滿起發於外斯為順也不須用藥而自愈逆候五六日痘尚乾枯綿密不起陷頂灰白色或紫黑或為水泡癢塌為逆此氣血衰弱致毒內陷而外剝也皆不可治險候五六日之間痘瘡雖起但色白不榮為險此氣盈血虧保元湯加芎歸桂芍則痊愈矣痘瘡漿滿七八日間順候七八日痘瘡漿足圓滿青黃光澤則毒消而氣血之功成矣此為順候不須用藥逆候七八日漿不足此氣血衰盡之時不能用藥為逆險候八九日紅黃色潤漿略不足此氣弱而為險也以保元薑術充而助之則老足矣痘瘡血盡漿回十一二日間順候十二三日痘瘡氣調血盡毒解漿回光色漸斂此自然之順候也逆候十二三日血淡而漿薄血凝而氣滯則毒不散漿不回枯朽剝極為逆之候可懼也險候十二三日血盡漿老濕潤不斂為內虛為險宜用保元加苓術助其收斂而結痂也痘瘡結痂候十三四日間順候十三四日氣血歸原毒氣消散漿老結痂此為神化十全為順逆候十三四日毒未脫形雖結痂而諸邪仍作為逆險候十三四日內漿老結痂之際尚有雜證相仍此要臨時酌量消息調和不可輕妄為妙痘瘡還原候十四五日間順候十四五日氣血十全痂脫瘢明神清氣爽此為順也逆候十四五日痂未易落譫語狂煩咬於寒戰疔腫雜病並仍此無生意為逆險候十四五日痂落而少食口渴煩熱此餘毒也為險宜用四君子加黃連鼠黏子連翹解毒湯之屬治之可愈治法解熱稀痘小兒痘疹始作與傷寒相似乍寒乍熱咳嗽嚏噴足稍冷面頰赤呵缺煩悶者則當解毒發散可用惺惺散參蘇飲人參敗毒散甚至驚搐大便不通宜與保龍丸解毒藥中少加熟大黃疏利之使其熱邪不滯發出自順而無逆證凡遇冬月溫暖或一時痘疹盛行皆可服三豆飲稀痘丹以防之至於初發熱時便宜表散毒氣分消則痘出必稀熱壯盛者痘出必重解散熱輕痘出亦輕此必然也解表以三酥餅敗毒散犀角地黃湯安神清熱疏里以辰砂六一散紫草飲祕甚者大黃丸少少與之使熱毒疏通自無後患始終調攝痘瘡始終調攝之法不可不慎自發熱而至落痂皆要隨時觀證早為治療則無焦頭爛額之客則凡用藥惟以中和不可猛浪其始如解表發散之劑且與參蘇飲一二服熱猶甚復用三酥劑微汗之如內熱驚搐者且與犀角湯辰砂益元散若猶甚者方可與大黃丸微利之始宜中和不可妄汗妄下次宜因時審證調理之風寒及飲食謹忌防杜惡氣忌防即父母房室外人不潔不可近身在惡氣則動廁食蒜飲酒之類皆要道也解表解表一法為痘疹之要未出之前解表之劑固為先鋒至有已出之際或被風寒所感卻不能出或發熱或狂言或風搐或遍身青紫皆當發散與惺惺散殭蠶散正出之時被天氣寒冷所折毒氣反伏而不出者其證精神昏冒面青發熱或譫語妄言宜解肌表出之藥與活血散調解發散參蘇飲治外為風寒所折內為食氣所遏大小二便不利若出不快二便自調知其在表不在裡也當解表藥宜用升麻乾葛湯加味四聖散紫草飲子快斑湯絲瓜湯之類雖是表虛衛氣不足縱有保元湯必兼之解表方得快出故解表一法始之必用安得不為先鋒攻裡攻裡一法為痘變用如背水陳之類是也當因證而施相時而動一劑回生是攻裡之法亦有奪造化之功也今世但知保元湯為化工之藥而不知大黃湯亦為化工之藥何則如前左水澤者為陳之善韓信背水陳又豈不為善之善者也噫非陳之善也必得將而後善非藥之功也必得醫而後功王安道曰識病機者則烏頭可以活人昧證候者則人參可以殞命保元湯與大黃湯亦若是也保元湯助氣血為治痘之常大黃湯攻內里為治痘之變如痘出太盛喘促煩滿手足心脅下有汗譫語狂言小便赤大便祕痘紅而漸變於黑躁渴不寧者必可以用保元乎豫見如此等證服保元湯而死者亦多矣服承氣湯而諸病如失頓然回生亦不可不謂奪造化之功也豫見今醫例用保元湯因謂人曰吾用王道可保無虞至於內毒肆凶危亦危矣而猶執以保元如契丹入寇猶自閉門修齊而已保元之誤不既多乎故曰非藥之罪醫之罪也茲以救里之變表而出之甚欲其無膠柱而鼓瑟也化機之妙必在於活潑潑地圓神而不依焉者乎托裡托裡一法為痘之關鍵始終不可不用也如諸瘡毒惟以內托不致邪氣內攻則自無傷生之害也惟痘亦然痘之證最可懼者不過難出而至於不漿內陷倒靨不結痂不脫落余癰毒等證皆其惡候內伏所以致命而顧托裡之劑安可少緩耶此數證者皆在內托之功而自免於內陷致凶之患也甫用補中益氣湯為托裡藥百發百中熱毒深者加黃連牛蒡子虛寒者加薑桂只此一法左之右之無不宜之庶幾王遂之常法也若夫邪毒內陷而不以辛甘之劑惟用保元一味甘溫內邪恣虐緩則不及事矣辛甘之劑不可無乎養胃痘瘡養胃者所以養其正而固其本也書曰養正能避諸邪此之謂也所以痘疹無故泄瀉凶之兆也大抵調脾胃節飲食中氣足邪氣消胃氣弱者以四君子湯為主隨證加減苦或作瀉者急治之以豆蔻丸參茯散之類故泄瀉一證最可當憂中氣稍虛邪氣闞之乘機內陷其危矣乎痘疹當分輕重緩急治之病深藥淺不能去病病淺藥深真氣受弊用藥之法當看輕重緩急輕者重治有傷正氣重者輕治邪氣不能除緩者急治恐有過傷急者緩治有誤大節如痘不快之輕者當以參蘇飲微解助之若重用酥餅麻黃之類發之如痘裡虛表實或被風寒折重而不能出者當以三酥麻黃之重劑發之若用輕劑發之不透邪氣留連恐復為患如痘瘡飲食稍減之緩病或大便微溏瀉則胃氣內虛宜用溫補強加飲食反有過傷如內邪太盛驚搐煩悶一刻不安喘咳逆壅二便不通之急證當急用承氣湯或百祥丸利之可生若是猶豫且進清涼緩藥必致死亡此所以輕重緩急亦不可不熟玩也首尾十二日證治條例發熱三朝證治門一發熱之初急宜表解使臟腑胎毒及外感不正之氣俱宜發散則痘出必快而亦稀也解表之藥必在紅點未見之前如發熱壯盛者邪毒必重宜敗毒散調三酥餅之類常用參蘇飲之類一熱盛發狂譫語煩渴者宜煎敗毒散調辰砂六一散解之一發之初憎寒壯熱鼻流清涕咳嗽痰涎此有風寒所幹宜以參蘇飲調紫草膏表之一熱盛發驚雖為順候常用紅綿散調辰砂六一散解之涎痰壅盛昏悶不省者薄荷湯化下抱龍丸二便祕塞不通者敗毒承氣湯微利之一熱盛吐衄糞黑結祕者用犀角地黃湯加大黃下之一發熱腹中作痛及膨脹者由毒相搏欲出而不得出者宜敗毒散加大黃微利使毒疏通表裡分解是也一有胃弱胃寒腹痛泄瀉嘔吐清冷者用六君子合理中湯瀉止後而嘔吐不止者藿香正氣散煎服一熱毒大盛解散藥中減去參耆當加紫草殭蠶蟬蛻蔥姜泄瀉者加豬苓澤瀉分利小水及微汗之出痘三朝證治門一出痘才發熱一日而便出者為邪毒太盛一發熱即出不待久而蒸出也此所以為邪毒甚必重三日後出者為吉四五日後身涼乃見報點於口鼻腮耳之前年壽之間如粟如黍淡紅潤色者為輕而吉也一忽然遍身發出紅點如蚊蚤所咬之狀者決非痘也乃熱毒被風寒所遏不能發越而變斑也可用發熱門例托裡散敗毒散表解微汗不妨身涼紅斑自退再越一日出痘反輕矣一出痘必作三日報出先報先出後報後起大小不一等色象光潤無他證候不用服藥一痘出稠密如蠶種根雖潤頂面白平摸不礙指中有清水者此由熱毒熏蒸皮膚而為疹子大者曰水痘非痘瘡也宜以升麻葛根湯疹自沒矣一痘出速一日齊出者為痘盛根紅頂圓摸之礙指亦得其正色宜散毒化斑等湯加紫草蟬蛻涼血解毒可也若一齊速出稠密紅赤成片此毒之甚不久紫黑髮斑而死一出痘灰白不紅綻或灰黑陷頂二便清涼氣冷不渴不食食不化此表裡虛寒也急宜溫脾胃益氣血宜用十全大補湯異功散之屬蓋脾土一溫胃氣隨暢而無內虛伏陷之憂氣血既盛則毒得發出而無表虛癢塌之患失此不治必不能灌漿收靨十日後發癢爪破而死一痘出紅紫根窠成片近黑焦陷大便祕結小便赤澀身熱口氣熱渴而引飲此表裡皆熱盛也急宜解毒若發驚狂譫語者紫草燈芯湯磨犀角汁調辰砂六一散之屬解毒之後痘頂不紅根窠紅潤小便清利大便如常能食不渴此表裡皆清勿再解毒宜以保元湯溫補氣血以助灌漿收靨否則變成癢塌而不能結痂矣一痘出熱盛發紅斑如錦紋者宜以化毒湯加紅花黃芩喉痛者加玄參犀角傷寒陽毒發斑加喊之法用玄參升麻湯之屬是也若見黑斑死不終日一痘出時忽然瀉泄大便黃小便赤口氣熱而渴此為熱瀉宜去桂以五苓散調六一散加木通車前子燈芯煎湯送如清利瀉口氣冷不渴為寒瀉五苓散加肉豆蔻理中湯異功散之屬一痘出只看根腳紅滑此生意也雖陷伏灰白紫黑皆可調治一痘出雖稀根窠全白無色者三四日雖起脹按之虛突此名賊痘氣血太虛至灌漿時變成水泡大如葡萄內皆清水皮薄若紙爪破即死一痘出三日內每在半表半裡最要斟酌妄汗則成斑爛妄下則成陷伏峻寒之藥傷正峻熱之藥助邪虛寒不補則陷伏癢塌熱盛不解則變黑歸腎稍若一違生死立判醫者寧不於此而容心哉灌漿三朝證治門一痘出三日後當漸起脹灌漿先出者先灌後出者後灌至第六七日起滿已齊毒氣已盡出於表根窠紅活肥滿光明潤澤頂如蠟色者不須服藥此為貞吉之象也一痘當起脹而不起脹根腳不紅白色而頂陷者此氣血兩虛之證也急宜保元湯合內托散或異功散丁香薑桂紫草膏之屬若灰黑陷伏宜調無價散一痘不起脹紅紫色為大盛血熱津液枯涸然也宜用內托散去桂加紫草紅甚熱甚加芩連紫黑陷伏獨聖散熱種黑陷有痰者閉結者四聖散調無比散無價散至寶丹可選用一痘灌漿時毒盡在表須要裡實托載苟略泄瀉則中氣虛弱毒氣乘虛內陷宜速救里熱瀉去桂五苓散冷瀉胃虛腹痛者加丁香肉桂或內托散加乾薑丁香豆蔻若泄瀉腹脹口渴氣促痘色灰白者可用木香散送下豆蔻丸一痘灌漿時發癢若氣血不足者內托散去桂加白芷黃耆參歸木香虛癢塌者木香散加丁香救里官桂救表表裡皆實自不癢一痘起脹時其中有黑色而獨大者名曰痘疔若不去之一身之痘皆變黑而死若疔少者可治用銀簪挑破疔口吮去黑血將四聖丹點入疔內即變紅滑仍服解毒藥一二劑若疔多胸背心前皆有者不治一有裡熱壅盛脹滿便祕虛弱不可通利者宜用蜜皂丸導之一痘灌漿三日已滿痘皆滿頂紅紫色者凶及面目腫者凶一痘灌漿已完於中有痘不滿者終變虛寒癢塌之證宜用內托散倍參耆歸桂必須灌滿再無陷伏之患矣一痘因虛發癢遍身爪破膿血淋漓不能坐臥者宜內托散去桂倍白芷當歸木香氣和血順其癢自止外以敗草散敷之庶免破肉受黏不便若遍抓破並無膿血清水皮白殼如豆殼者死一痘因惡氣觸犯發癢爪破者宜內托散加減服之外以乳香蒼朮焚燒以卻邪氣回漿三朝證治門一痘灌漿日足至九日後當要回漿收斂次第作三日乾盡江南謂之痘黝小黑色也至期若不黝者此氣血兩虛而不運行故漿不幹無氣血主宰之功所以不收必發癢抓破而死一痘回漿過期有未盡回者為氣血虛也宜用八珍湯返魂湯之屬若有幾顆不回終作癢痛抓破而得生者寡矣一痘收後惟數顆深陷臭爛不收口者硝膽膏塗之若收不回遍抓破氣急煩悶痰上者死一收時因犯惡氣不黝作癢欲抓者宜異功散保元湯選用之結靨三朝證治門一痘至十二日後當結痂而漸靨靨自上而下為順自下而上為逆其遍身靨矣而有數顆不靨難以求生猶蛇蛻雖一節被傷不能蛻亦是死也一痘結痂從唇上頭面次第收靨至足者不須服藥為順而吉也若有他證照後治之一痘當靨不靨泄瀉寒戰咬牙爪破此虛寒也宜用異功散保元湯觸穢冒寒黑陷不靨發癢者前湯調下無價散外用祛穢散熏之一因服辛熱藥太過以致熱毒猖狂氣血泛濫痘爛不靨者內服小柴胡豬尾膏解之外用敗草散敷之一痘自前報起灌漿回漿俱各應候至收靨時或犯穢惡以致斑爛癢塌不靨者但服異功散外塗豬髓膏自愈須憂也若皆收靨惟數顆臭爛深坎不收口者用硝膽膏塗之痘瘡治例一痘瘡未出而先驚搐者名曰先驚痘不治自愈一痘瘡初出次第高起紅光磊落顆顆如粒者名曰珠子痘吉一痘出上身多下身少者吉反是者險一痘稀少而夾疹子者名曰麻夾豆主輕若痘稠密而夾疹子者重宜解散為先內托次之一痘瘡紅甚而引飲渴不止者名曰燥痘宜用犀角地黃湯之屬一痘瘡出後白塌泄瀉者名內虛急服異功保元理中溫補之劑一痘瘡潰爛臭不可聞曰爛痘間亦收靨無事只要胃氣不衰飲食如故不作煩躁者可治宜用八珍湯消毒飲外敷敗草散一胡荽酒雖能避邪氣惟在未出之前及初報之際用之既出之後及越脹了即不宜用酒氣觸肌多致作癢出後或被觸而發者宜用石乳熏之為佳或馬牙速燃之熏被衣一治痘瘡在喉則咽嗌不利飲食穩塞不便內服牛蒡桔甘湯外看身上痘之最大者為毒相關宜用香油燈草燃而淬之一淬即愈或用手摘破用痘疔藥塗之預防痘疹法並辨汪氏理辨曰人傳有藥預投兒服則終身不出痘疹豈理也哉痘中於有生之初寂然不動感而遂通此得人身之大造化也人有三百六十五骨節應期變蒸諸骨十有三次五臟六腑始能浚通脈絡行運氣血於身其熱之時臟腑無不振動變易之際又或有傷寒風熱而泄六陽等證諸汗瘡瘍一身之間無不發泄其痘毒尚不能解又何藥可以解此毒耶今特録其法少慰父母愛子之心而足是書全備云耳然而當其時行天氣先以解毒發散之劑防之庶幾不致於大甚而邪氣稍減輕則可矣若謂終身不出有是理乎一法七八月間收胡蘆蔓連根留置十二月三十夜取蔓絲煎湯浴小兒則終身不出痘疹一法取絲瓜近蒂三寸連皮子燒灰存性為末砂糖拌干吃入硃砂末尤妙服之多者能少重者能輕冬月應寒而反溫暖前人推度至春陽氣發生與冬之伏熱相搏必發痘疹故於冬月見兒頭髮干立飲食稍減此伏熱之兆便宜預服生油劑或升麻湯三痘飲子消毒飲子以防之又云或有伏熱痘疹未出四肢微熱飲食似減或時額上微熱宜服生油劑最佳一或遇天時溫熱恐發痘疹用犀角玳瑁二味磨汁服或用茜草煎汁飲之未發者令內消已發者亦能解利使毒氣不致太盛痘瘡護眼法痘瘡初出欲使不入眼耳可用胡荽酒塗於耳目邊傍或黃柏末水調敷兩目又法抱兒令自投緑豆七粒於並中皆令痘不入目也忌食醬醋五味牛雞鵝鴨卵及諸卵之氣熏襲兒目但令食淡不能淡者宜少入鹽一法用干胭脂蜜調塗眼眶則痘不入眼內痘瘡蘊非常之熱熏發肌腠為痘疹順其熱則出而毒散但過於熱則又損目抑之以涼則為陷伏黑靨故善治者使陽不致虧盈陰不致潛伏調適中和而已苟為不然陽勝則熱盛而生風肝應於目無不害目者陰勝則土無燥氣腎水反勝為黑靨陷伏則夭傷者多矣此痘之毒氣自里而達於外故有目害治宜活血解毒而已活血不至熱解毒不致於涼得其血活毒散則睛不壅血不鬱而免凹凸之患矣似非點藥可取效也蓋點藥非毒則冷必相攻擊反以為害古人所不取也治痘護目古方用胭脂塗不如錢氏黃柏膏好從耳前眼皮面上並塗日三五度若用之早則頭面無痘用之遲縱使出亦稀通聖散治痘入目生翳白菊花緑豆皮穀精草去根各五錢為末每服一錢米泔水一盞同乾柿一枚煎候米泔盡只吃乾柿餅一日三服一方加豬肝同煮只食肝一方將浮萍以竹節盛水盆上曬乾為末隨兒大小每服一錢以羊肝半具木石器內擂爛投水半盞濾取肝汁調服食後痘瘡傷眼必用山梔決明赤芍歸尾芩連防風連翹升麻桔梗作小劑末調服如眼無光過百日後血氣復自明一法痘瘡發熱時便用牛蒡子為末貼囟門可免眼疾首尾不可汗下辨前人論曰痘瘡首尾不可汗下蓋是戒慎恐懼之意若痘本輕不必倉慌妄藥而致求全之毀如易云勿藥有喜言其剛健中正本為無妄故象曰無妄之藥不可試也故人所謂首尾不可汗下者亦言本無汗下必用之證惟恐執以汗下則反有傷正氣之過矣正如無妄之藥不可試也云古云首尾不可汗甫按古人戒汗之意痘瘡本稀出至足上有者為出齊不可謂出不快而故表之若本稀少又無邪鬱而強表之正云誅伐無過之地反有斑爛倒靨耗散元氣不能起脹者矣謂首不可汗者此也痘當黝靨有熱而脫遲前路俱正今雖遲緩終無憂也若強汗之必反損其真氣而瘡爛潰不能收斂者矣謂尾不可汗者此也古云首尾不可下甫嘗考其為斑未見於表下則邪氣不得伸越此脈證有表無里故禁首不可下也斑毒已見於外內無根蒂大便不實並無里證若下虛其里則反陷伏故禁尾不可下也表實當汗裡實當下此不易之理也要當隨時應變審證而施當汗則汗當下則下而何有於首尾之禁當汗不汗則表邪不解而瘡有難出陷伏之患當下不下則內毒不除而痘有變黑歸腎之厄故汗下二法要須詳審如痘疹未出發熱之初非微汗則表不解有身熱頭痛鼻塞咽喉不利咳嗽毛焦皮膚緊痛此皆熱極痘瘡雖出而毒亦不輕宜微汗解散痘出輕矣若此者安得亦禁而不汗乎如斑未出毒在臟腑大便不通固宜下之以瀉其毒至有痘出太盛喘促腹滿小便赤手足心並脅下有汗或妄言大便祕亦宜下之如痘已出足而結膿窠尚有熱證見者當利二便恐餘毒在裡未盡因而生疾若此者首尾皆宜下也何可禁哉痘瘡避忌李東垣云痘瘡宜避一切穢惡氣及外人入房遠行勞汗腋下狐臭氣房中淫液氣麝香臊膻氣婦人經候諸血腥臭氣硫黃蚊煙氣廁缸便桶氣誤燒頭髮氣吹滅燈燭氣雞毛魚骨氣蔥蒜韭薤氣以上皆不可犯須要時常焚燒乳香蒼朮黃芩甘香之氣微襲聞臭則榮衛氣暢而無倒靨陷伏之患矣不可治證例一痘發熱之甚驚搐不止日發三五次若至九次者一出如蠶種即死一痘瘡初出紫色成片者曰紫雲痘四日死一痘瘡出如麻子無縫者兼紫色者定死一痘痘初出當頂紅者過六七日死一痘瘡凡見聲啞氣急若痘色不正定死一痘瘡初出作瀉服藥不能止者死一出瘡後猶發驚者死一痘瘡面目俱腫而痘反黑陷者死一痘瘡閉目昏視舌卷囊縮飲食嗆喉躁哭不寧者皆死一痘瘡四圍灰白頂黑而陷者七日死一痘瘡多有紫黑疔挑去黑血擦藥不變仍復黑色者死一痘瘡初出狀如蚊蚤所咬三日後反不見者曰反關痘五日死一痘瘡焦黑不灌膿者三日死一痘瘡起脹清水白色頂陷者三日後爪破而死一痘瘡隨脹隨沒內躁發喘死一痘瘡癢塌寒戰不止者死一痘瘡不食腹脹喘渴不寧者死一痘瘡黑色大小便不通目閉聲啞者死一痘瘡發黃狀如橘色下利氣促者即死一頭溫足冷悶亂飲水者死一痘瘡身體通腫如冬瓜腹脹如鼓氣喘即死一痘瘡忽然瀉血如豆汁雞肝爛肺者主死藥方痘藥正品人參味甘氣溫益元氣和中生津液發痘起脹收結始終必用之黃書味甘氣溫補元氣固腠理內托陷下皆用之當歸味甘辛氣溫能生血止血活血養血治痘賴以助血歸附氣位以芍藥佐川芎味辛氣溫能助清氣升頭角佐參耆以助元陽治痘漸為引導上行之使芍藥味酸平性寒可升可降治痘血散不歸賴以收之而附氣瀉脾火止腹痛官桂味甘辛性熱治痘瘡榮衛不充用以鼓舞上行引導氣血達表散寒甘草味甘平氣溫治痘解毒瀉火和中益脾胃佐理陰陽之正白朮味甘辛氣溫健脾利水升降陰陽能發痘灌漿止瀉茯苓味甘淡氣溫益脾止瀉利小便除煩熱止渴生津陽中之陰降也痘中不宜多服陳皮味辛氣溫和脾胃達陰陽暢氣散痰可升可降生地黃味苦甘氣微寒行血涼血陰中之陽治痘瘡血熱鼻衄紫黑皆用犀角味甘淡氣寒解心火治痘熱熾驚搐煩躁不寧用此鎮解麥門冬味甘豐氣微寒生津止渴清肺煩解痘熱黃連味苦氣寒解諸熱毒瀉心火厚腸胃用以解痘毒木香味苦辛氣溫調諸氣和胃避毒行滯止瀉不可多用多用耗真氣肉豆蔻味辛氣溫治痘瘡寒瀉能救中氣止冷瀉紫草味苦氣溫能補中氣而制諸邪散痘毒利九竅生薑味辛氣熱避諸惡氣開脾胃和榮衛溫中散寒柴胡味苦辛氣微寒發散熱邪瀉肝火並升麻能升正氣治痘毒寒熱不平升麻味苦辛氣溫升陽氣於至陰益脾氣發腠表桔梗味苦甘氣微寒瀉火升散載諸藥上行治痘瘡入喉解毒愈喉痹鼠帖子味辛氣溫潤肺散氣利咽退腫治痘毒專解不可缺滑石淡性寒利清道下降疏導六腑之熱利小水蟬蛻味辛淡氣微溫能散風解熱痘瘡用之疏散邪氣退毒風糯米味甘氣溫滋養脾胃益中氣使痘毒不致內攻山楂味甘酸氣溫平益脾消食快氣解利宿滯開導參耆蜜糖味甘氣溫益脾生津潤燥治痘不結痂荊芥穗味辛平氣溫除風熱消瘡毒利肌表退腫清頭目咽膈防風味辛甘氣溫散風熱利表邪領黃耆行表解毒托裡有功乾葛味淡甘氣平解肌清表熱止渴發散表邪薄荷味辛甘氣溫散風熱利頭目咽喉痘毒可散玄參味苦平氣微寒能散表上之風火驅痘毒出表散斑疹硃砂味淡平性寒能鎮心神除熱毒驚悸治痘毒入心為驚昏亂用之珍珠味甘淡氣微寒能除痘毒琥珀味淡平氣溫安神寧志除驚利陰陽通治諸方發熱三朝門劑參蘇飲治小兒發熱憎寒咳嗽或遇天時或感風寒異氣疑似之間最宜服此發散人參紫蘇桔梗前胡陳皮半夏茯苓甘草枳殼乾葛上水一盞姜三片棗一枚煎五分服無時惺惺散治小兒風寒時氣發熱必作痘疹宜服此人參白朮白茯苓苦桔梗細辛栝蔞根甘草各等分為細末每服一錢水一盞薄荷三片同煎去滓溫服無時要和氣入姜煎升麻湯治大小人時氣瘟疫頭痛足冷脈數發熱肢體煩疼及瘡疹疑二之間或未經解利而瘡毒已發又云痘疹大便如常者並宜服之升麻葛根芍藥甘草等分上為粗末每服一錢水一盞煎至半盞去滓溫服無時亦可為細末調湯煩熱者則溫服寒多者則熱服敗毒散治痘瘡壯熱已出未快咽喉腫痛胸膈不利人參桔梗甘草柴胡荊芥防風陳皮等分牛蒡子加倍上為粗末每服一錢水一盞煎四分去滓食後溫服消毒飲治痘熱盛毒氣壅遏無問前後皆可服人參甘草黃連牛蒡子各二錢上為粗末每服一錢姜一片水一盞煎四分去滓溫服不拘時三豆飲子治時行瘟疫天行痘疹者預服之黑豆緑豆赤小豆各半升甘草一兩同水九升煮豆熟為度逐日空心任意飲之七日後瘡必發快托裡散治一切痘疹疳瘍或熱或寒發出不快及已出白塌倒陷人參黃耆當歸川芎白朮茯苓甘草芍藥黃芩肉桂等分上為粗末水一盞姜一片棗一枚每服一錢煎四分不時服熱去桂寒去芩此托裡藥乃痘疹之要藥善能用者必無毒氣內陷之憂紅綿散一名天麻散治痘疹身有大熱面赤氣粗無汗為表未散者可服之此藥以天麻麻黃髮表為主有汗者不得服腠理已開不宜再發汗也有汗而熱者則宜惺惺散為和解之藥故仲景論表證有宜發汗者有宜和解者有宜調和榮衛者今有汗而熱則和解為宜虛而熱者則宜調榮衛如和中散之類是也天麻荊芥各一分麻黃去節甘草炙各二錢全竭七個金者上為末每服一錢水半盞薄荷二葉酒四五滴煎二三沸帶熱服之如疹未出再進一服次又一服若是傷風寒證服亦不妨生油劑治小兒臟腑伏熱未成瘡疹四肢微覺有熱食物似減頭髮干立或額多微熱用生油一小盞旋傾入鐵銚內以溫水一小盞和之以杖攪之煎令水盡更攪之令勻如蜜則止夜臥時服每服百日一晬至三歲每服二蜆殼五歲至七歲三蜆殼八歲至十五歲服半合大人一合至二合量大小增減服後良久令臥少時大小便利四肢熱退痘疹不生若已出者不可服三酥餅治初發熱用以表汗解毒稀痘神效辰砂萬山明亮者無夾石鐵屑以絹囊盛之用麻黃升麻紫草荔枝殼煮一日夜研細仍用前湯飛過曬乾再研極細用真蟾酥另調作餅子紫草細末亦蟾酥調作餅子用麻黃去節湯泡過曬乾為極細末亦用蟾酥另作餅蟾酥於端日捉取蟾酥捻前三餅每餅加麝少許炒上方如遇時行痘疹小兒發熱之初每三歲者將三餅各取半分熱酒化下蓋覆出汗不能飲酒敗毒散煎湯化下更好若痘已出滿頂紅紫色為熱毒之盛宜煎紫草紅花湯或化毒湯將辰砂紫草二餅調下少許解之痘出之後不可服麻黃餅子辰砂能解毒紫草涼心火制過又能發痘紫草亦發痘解毒麻黃髮表發痘蟾酥能驅臟腑中毒氣從毛腠中作臭汗出此四藥誠解毒稀痘之神方也抱龍丸治小見一切風熱中暑驚悸痘疹欲出多睡咳嗽痰盛面赤睡中驚不寧首尾見證皆可用牛膽南星臘月用泡過南星為末裝法續入黃牛膽內令乾再為末半斤天竺黃一兩辰砂三錢雄黃三錢麝香三分上為細末甘草煎膏丸如皂角子大竹葉燈芯薄荷湯化下一丸無時辰砂六一散治痘瘡熱毒太盛狂言引飲紅紫黑陷滑石白膩者研細水飛曬乾用六兩粉草頭末細研用六錢辰砂同上水飛三錢冰片三分同砂和勻用上將滑石甘草末一半研勻作六一散治痘疹紅紫黑陷熱渴餘一半加辰砂末名辰砂六一散治驚狂譫語前方敗毒之初即用敗毒散調下解毒稀痘若報痘後紅紫屬熱毒者春用燈芯湯調秋冬亦然夏用新汲水調二三歲者一錢十歲者二錢犀角地黃湯活人書云傷寒及瘟病應發汗而不發汗致鼻衄吐血不盡內有瘀血面黃大便黑此主消化瘀血涼血兼理痘疹太盛犀角一兩磨汁生地黃四兩芍藥一兩牡丹皮一兩銼片每服二三錢水一盞煎五分溫服如狂熱甚者加黃芩紫草膏治痘疹不快或被風寒隱蔽紫草甘草各二兩麻黃去節白附子各一兩殭蠶十個炒全蠍十個上為細末另將紫草一兩銼煎去滓熬成膏又用蜜一兩好酒半杯煉過同紫草膏和攪勻入前末藥丸如皂角子大每服一丸紅紫黑陷用紫草湯化熱輕者溫酒下淡白黑陷虛寒者好酒化下熱服發熱初煎敗毒散化下表汗亦能稀痘風寒者參蘇飲化下發驚者薄荷燈芯湯下此藥兼治風癇痘疹出不快者最穩醫宜常蓄為妙藿香正氣散治痘疹或感風寒頭疼發熱咳嗽噁心惡食嘔吐出不快者此藥發散溫和調中散表藿香白朮前胡厚朴姜炒陳皮半夏紫蘇大腹皮洗桔梗白芷茯苓甘草各等分上為粗末每服一錢水一盞煎五分不拘時服溫熱飲蓋覆微汗加薑棗同煎導赤散治痘疹心經蘊熱煩躁不寧小便不利面赤多渴人參生地黃麥門冬木通甘草各等分上咀每服一二錢水一盞煎五分溫服加竹葉同煎更妙茜根汁治時行痘疹正作預煎汁入酒飲之則不患痘屢用有驗本草云茜味苦治一切血病痔瘻癰癤排膿牛蒡子散疏風解毒小兒冬有非時之暖春月天氣暄暖或肥甘厚味大過重衣厚帛太多傷皮膚蒸血脈瘡瘍發黃宜常服之牛蒡子炒為末每服一錢水煎服稀痘散治痘疹未出之時服之能稀痘而陷伏之後服之即起天靈蓋小兒者佳用米泔湯洗過淨以麝香塗之炙黃用辰砂四制者飛過復研極細上以辰砂二錢天靈一錢共研勻未發之前以敗毒散煎湯調下三分或五分看兒大小出而伏陷者升麻湯或保元湯調下麻黃湯主治痘疹傷寒煩喘甚者麻黃去節杏仁去皮尖甘草桑白皮蜜炙上銼為散每藥一錢用水七分煎四分溫服五積散治傷寒勞役內傷生冷者痘瘡本蘊熱毒小兒熱盛渴則飲冷熱則當風致被風寒所伏寒熱相搏面青發熱心煩自利宜此散其內外寒毒然後熱氣上行或汗或瘡痘或癮疹皆愈方見傷寒門五苓散治痘瘡引飲水瀉或小便赤澀並宜服之白朮茯苓豬苓澤瀉各等分肉桂三分上為細末心經蘊熱者加辰砂名辰砂五苓散每服一錢燈芯湯或蜜湯飲湯任下羌活散解熱散毒治風壅欲作痘疹者羌活獨活川芎桔梗蟬蛻前胡柴胡地骨皮栝蔞根甘草炙天麻防風荊芥各等分上為細末每服一錢水一盞煎四分入薄荷葉三片煎溫服奪命散治痘瘡已發未發並宜服之出痘疹熱毒勢甚者服之解蘊熱利小便痘疹初發氣盛亦宜服升麻紫草甘草木通各等分糯米一撮上為散每服一大錢水一盞煎四分溫服痘出三朝門劑保元湯治痘令其內固外護扶助陽氣則氣旺血附氣血無恙一身之元氣可保而無壞亂矣區區痘毒藉此領載則何難出之有惟其有回生起死之功轉危就安之力故曰保元夫保元湯轉補元氣氣載血血載毒則痘自無內陷而為害者矣人參一錢黃耆二錢甘草五分上水一盞加姜一片煎五分不拘時服血虛而燥大便閉澀加當歸川芎痘白灰陷頂者有寒者加肉桂渴煩而燥加麥門冬泄瀉者加白朮茯苓小便不利車前子或合五苓散調入熱甚者加黃芩補中益氣湯治痘疹發熱難出或脾胃虛陷發熱及陷附倒靨此能補中益氣可以為痘疹之內托十分穩當寒熱得中而無太過不及之弊內有參耆以補元氣有當歸可以生血有白朮陳皮以健脾有升麻柴胡以發表托毒不致內陷此正所謂痘疹正藥痘疹家多未之載其功效其亦未能用也歟人參黃耆各一錢當歸白朮各五分陳皮甘草升麻柴胡各三分上水一盞加薑棗煎五分不拘時服寒加肉桂乾薑熱加黃芩黃連血不行者加紫草渴加麥門冬四君子湯治痘疹脾胃虛弱不思飲食氣弱不能載痘頂陷灰白宜用之方見胃門六君子湯治痘疹脾胃虛弱泄瀉不食即四君子加半夏陳皮八珍湯治痘疹氣血兩虛不能載毒故有內陷不起或枯澀不潤或不灌漿或不結靨多是氣血不足故也不拘日期並宜服人參白朮茯苓甘草當歸川芎芍藥地黃上等分每服二錢水一盞煎五分去滓溫服不拘時十全大補湯治證同前但虛之甚則又宜此即八珍湯加黃耆肉桂是也小承氣湯治痘疹熱甚內蘊不出渴喘煩悶手足心並脅下有汗或譫語驚搐二便祕澀者宜用微下之則內毒不留痘亦輕快報點欲出不可服大黃枳實甘草各等分上水一盞加棗三枚煎五分食前溫服化毒湯治痘疹已出未出紫草天麻甘草炙各等分上銼每服一二錢水一盞糯米一百粒煎至五分去滓作數次溫服此方名為化毒至於主治無不切要痘疹欲出渾身壯熱不思飲食服此一劑則安而內消已有一兩顆出則解其半此藥善能解痘疹之毒胡荽酒能通心竅故治痘疹已發未發或痛或癢皆可用之則瘡瘍易出而無壅滯若大便利者不可用胡荽能利大腸故也胡荽連根二三兩細切以酒二大盞煎熱以胡荽沃其中以物蓋密勿泄氣候冷去滓復溫從頭頂面目胸腹背膂微塗之令遍勿多塗面錢氏用胡荽煎酒口噴房中壁上及衣使其氣襲患人而避穢惡之氣而快痘疹不致壅遏稀痘酒最能散毒稀痘麻黃泡去節紫草各二兩上二味細切布囊盛之浸無灰酒一小壇泥封固凡遇天行小兒發熱時與半杯一杯量兒大小服出微汗為佳滑血散治痘疹血虛血滯或出遲或倒靨灰白不紅或黑而焦赤芍藥酒浸炒當歸尾酒炒川芎紫草紅花各三錢血竭一錢上為末每服一錢熱酒調下不飲酒者紫草湯下理辨滑血散只是芍藥一錢為末每服酒調下大抵芍藥主時行寒熱消癰腫故治痘疹行血散毒榮衛得其通暢是之取耳無價散治一切痘陷倒靨黑伏危急人牙豬牙犬牙貓牙上各以炭火燒去煙存性為末等分每服三分白酒熱調下癢塌寒戰泄瀉煎異功散調下一方人牙散只用人牙一味燒灰存性為末酒調無比散治痘黑陷枯焦極熱毒熾惡證硃砂膩粉各二錢牛黃麝香冰片各二分上為末每服四分用新汲水調下人參白朮散治痘生津液止泄瀉理脾胃人參白朮茯苓甘草乾薑各五分藿香木香各二分水一盞煎四分食前溫服豆蔻餅治痘疹瀉泄不止諸藥不效訶子肉赤石脂各三錢半枯白礬二錢木香一錢肉豆蔻五錢麵包煨以面焦為度砂仁白龍骨各三錢上為末糯米糊為丸如芡實子大餅每服米飲磨下一錢甚者木香散異功散調下瀉止為度木香散治痘瘡虛寒泄瀉灰白寒戰不起脹黑陷木香丁香人參官桂陳皮半夏茯苓甘草前胡訶子大腹皮上等分為粗末每服一錢水八分姜二片煎三四分去滓稍熱服瀉止勿服異功散治痘疹虛寒極甚陽氣將絶泄瀉飲食不進四肢冷灰白頂陷不灌不起宜此木香丁香肉豆蔻麵煨官桂附子制煮熟去皮臍當歸人參白朮陳皮半夏茯苓厚朴姜炒上皆等分附子減半共為細末每服一錢水一盞姜二片煎四分溫熱服珍珠膏治痘疔珍珠十五粒豌豆四十九粒發余燒灰不拘多少上為末用干胭脂水調成膏先用銀簪撥開疔口將藥點入疔內即皆變為紅白色矣四順散治痘瘡四五日不大便瘡又盛出卻喘氣急腹脹小便赤澀宜此大黃當歸芍藥甘草各等分上為粗末每服二錢水一盞煎五分去滓溫服無時若得氣通不喘腹不脹止服初覺有赤點大便如常小便澀用此通利令出快也若出而快不須通也秦皮散治大人小兒風毒赤眼痛癢澀皺眵淚羞明秦皮滑石黃連等分湯泡熱洗二日蒺藜散治痘瘡入目腫痛白蒺藜穀精草防風羌活生蛤粉各等分上為細末水調每服二錢即退通神散治痘瘡入目內生翳膜白菊花緑豆粉穀精草等分上為末每服一錢柿餅一個米泔水一盞同煎候水乾只吃柿不拘時日三五次至七日效蟬菊散治痘疹入目或病後生翳障蟬蛻去用淨白菊花等分每服一二錢水八分加蜜少許煎四分食後溫服甘桔湯治痘疹咽喉疼痛生瘡桔梗二兩米泔水浸一宿焙乾用甘草炙二兩上為粗末每服二錢水一盞煎五分食後溫服如聖湯治痘攻咽腫痛桔梗炒甘草炙牛蒡子各一兩麥門冬去心半兩上為細末每服二錢沸湯點細細呷服入竹葉煎亦可黃柏膏凡用胡荽湯噴必先用此膏塗面然後噴之為妙用此塗面目並無痘瘡侵犯黃柏一兩甘草三兩生緑豆粉二兩上搗羅細末以生油調成膏塗面目耳前俱塗四五遍早塗痘出必稀黃芩散治痘出盡恐痘入目極妙黃芩梔子黃丹四分上為細末以牛蒡子葉搗汁調塗頂門參牛散治痘瘡入目人參牛蒡子同為末每服二錢古米薄荷湯調服無妨葡萄酒治痘出不快飲之即出葡萄味甘平利小水取穗出快之義研酒飲之保嬰丹小兒痘瘡未出每遇春分秋分時服一丸其痘毒能漸消散若服三年六次其毒盡消痘出必稀可保無虞纏豆藤一兩五錢八月內收取毛豆梗上纏繞紅黃大者是陰乾用之為君生地黃山楂肉牛蒡子辰砂各一兩水飛另研細黑豆三十粒新升麻七錢五分獨活二錢甘草當歸酒浸赤芍藥黃連桔梗各五錢連翹七錢苦絲瓜二條五寸長者隔年經霜為妙燒灰存性用上各為末和勻淨砂糖為丸如李核大每服一丸濃煎甘草湯化下前項藥須預取精好者遇春秋二分或正月十五日修合務在精誠忌婦人雞犬見之傳春散治痘瘡已出未出陷伏不起或隱在皮膚之間梅花蕊桃花蕊各取陰乾經霜絲瓜硃砂各二錢甘草三錢上為末每服五分或三分煎紫飲下玄參升麻湯治傷風傷寒風寒少食或汗或下後風熱不散表虛里實發熱於外故身斑如錦紋甚則煩躁譫語兼治喉疸腫痛玄參升麻甘草一分上銼每服二錢水一小盞煎五分去滓溫服無時葛根湯治天行熱氣欲發痘疹壯熱作疼宜此解肌出汗葛根麻黃各五錢石膏一兩黃芩芍藥桂枝甘草各二錢上銼每服二錢水一盞煎五分溫服取微汗若自汗者去麻黃化斑湯治小兒斑疹石膏煨冷透知母各一兩人參三錢甘草五分上為極細末熟水調下半錢或調塗唇上去頭痛除昏發泄疹子治小兒瘡斑極妙人參竹葉湯治夏月壯熱煩躁煩心乾渴神思不寧痰壅嘔逆及瘡後餘毒小便赤澀或赤斑兼治中暑虛煩人參淡竹葉當歸天門冬去心半夏泡製上等分為粗末每服二錢水一小盞姜三片煎五分去渣溫服六味人參麥門冬湯治痘疹喘渴不已麥門冬去心人參白朮陳皮去白厚朴姜炒甘草等分上水一盞煎半盞溫服無時犀角散治痘瘡熱盛煩躁多渴小便赤澀或赤斑犀角鎊甘草炙各五錢防風黃芩各一兩上為粗末每服二錢水一小盞煎五分溫服無時玳瑁散治痘疹天行時熱未發可令內消已發解熱不致太盛生玳瑁生犀角各以冷水濃磨汁二合上二汁同攪勻每服半合日二三服為佳一方治痘出黑紫不快水磨玳瑁汁服之理中湯治痘疹脾胃虛寒嘔吐泄瀉腹中微痛服此溫中進飲食人參白朮炒各一錢甘草炙乾薑煨各五分上水一盞姜一片棗一枚煎四分熱服胃愛散痘疹脾胃不快泄瀉嘔吐用此調理髮揚痘出快暢糯米二兩干淡木瓜三分甘草一分藿香葉紫蘇葉各一分丁香十個為細末每服一錢或半錢粟米棗子湯調下通關散治痘疹悶亂煩躁大小便俱不通宜用此以利二便則熱退人參茯苓梔子木通瞿麥車前子滑石大黃萹蓄甘草上為末每服五分水半盞燈草同煎三分若稟受不足只小便不利宜服五苓散導赤散人參白朮散之屬救生散治痘疹危困惡候黑陷此藥治熱毒倒入腹中者不得已而用之獖豬血臘月用新瓷瓶盛掛當風處陰乾聽後用馬牙硝各一兩硃砂牛黃片腦麝香各一錢上同研極細末每服一字新汲水調下大便下惡物瘡轉紅色為度不過再服神驗滑石散治痘疹出遲瘀熱壅盛黑色煩心多渴小便赤澀滑石甘草炙各五錢上為細末每服一錢雞子清酒各半服快毒丹治痘疹血氣相搏出不快宜此木香一分肉豆蔻五錢麵包煨青皮一兩半生半熟黑醜炒一錢上為細末粥丸黍米大每服七丸至十丸濃煎紫草蔥白湯下龍腦丸治痘疹初作未能出盡或已出內外熱毒貫注血泡如痘在肌皮不結痂疕二者皆可用龍腦半字研細上以豬心血旋滴入和為丸黍米大以紫草湯吞下或化下燥或化下煩躁狂悶未省者以溫酒化錢氏用豬尾血取其動意也心血取其歸心片腦涼心皆不過治熱毒大盛者非大盛不敢服此牛黃散治痘疹陽毒入胃日夜便血腹痛啼哭牛黃分鬱金一兩上為末每服五分以漿半盞煎至三分溫服量大小增減日二次南金散治痘瘡已出而隱其熱甚微者服諸藥不效驗者萬無一失紫背荷葉霜後貼水紫色者佳白殭蠶直者炒去絲上為細末每服一錢小者五分研末胡荽酒調下米飲亦可在處印帖施人陰德之廣全活之衆有用龍腦人齒卒未易得惟此為易亦效速也硃砂膏治驚積驚熱病後可以常服硃砂半兩硼砂馬牙硝各三分珍珠末一錢玄明粉二錢以上並研麝香各一分上為末一處拌和以煉蜜為膏諸般驚症只用黃豆大粒金銀薄荷湯化下身熱者甘草湯下紅粉丹治痘臟腑蘊熱瘡出不勻龍腦一字坯子胭脂天竺黃硃砂各兩牛膽南星臘月制者佳上為細末煉蜜為丸如龍眼大每服一丸人參湯下紫金散治痘瘡倒靨痘出不快紫草蛇蛻炒焦牛蒡子炒各半兩上為粗末每服一錢水七分煎四分溫服蛇蛻能治一切惡瘡十年不愈者用之良乳香豬血膏治痘斑不發乳香研細上以豬心血就丸乳香如櫻桃大每服一九水化下脫殼散治痘斑不發倒靨鳳凰即哺雞子殼不以多少新瓦上焙乾研為細末上以好酒調塗兒口唇上令其自舐可或塗風池穴每服一字宣毒膏痘瘡已出不快倒靨急服此藥大效獖豬尾血臘八日取一升新瓦器盛硃砂乳香各一兩甘草馬牙硝各半兩片腦麝香各一分上共為細末豬心血拌勻用竹筒一個留底節裝入在內用紙數層封固掛在大糞缸梁上至清明取出曝乾更入片腦麝香各一錢研勻滴水丸如皂角子大人參湯化下一丸黑陷者即轉紅滑復起如神效清涼飲子治痘毒癰癤驚痰壯熱大黃連翹當歸芍藥羌活防風梔子仁甘草上等分水一盞藥二錢煎五分溫服大連翹飲治同前連翹瞿麥荊芥木通紫草當歸車前子赤芍藥防風梔子柴胡黃苓甘草蟬蛻滑石各等分上每服二錢水一盞煎五分溫服荊防敗毒散治痘疹始終熱毒之甚者荊芥防風羌活獨活柴胡前胡川芎桔梗枳殼天麻地骨皮各等分上水煎初出不快加紫草紫蘇殭蠶蔥白泄瀉加豬苓澤瀉去紫草微汗熱退為佳熱盛譫語煩渴辰砂六一散調服豬髓膏治痘瘡不脫落痂疕不起者塗之立落豬骨髓蜜汁上二味以火熬一二沸退涼用雞瓴掃上即落敗草散治痘瘡糜爛不能穿著褥用此敷之蓋屋或蓋牆多年敗草取其多霜雪雨露感天地陰陽之氣善解痘毒不拘多少干曬為末若痘汁不幹黏衣惹席濕爛不能轉動可用二三攤布上任其睡臥為妙甘露飲治痘瘡熱毒攻牙口腫黃芩生地黃天門冬麥門冬枇杷葉茵陳石斛桔梗甘草枳殼各等分水煎食後服不可吃熱物擦牙散治痘毒牙疳腐爛搽上神效白梅燒存性枯礬各一錢人中白取夜壺中者佳上將人中白煅紅退冷同研一處極細先用韭根茗茗濃煎湯以雞毛洗牙去腐淨見血方可敷藥雖遍糜爛者敷之皆愈罩胎散治孕婦痘瘡最難調治此藥不致傷胎人參白朮茯苓甘草當歸川芎芍藥柴胡乾葛桔梗黃芩陳皮枳殼紫草砂仁各等分上每服五錢水二盞煎一盞溫服無時安胎飲安孕娠出痘不致損胎名曰安胎飲人參當歸黃芩大腹皮川芎芍藥各八分香附子紫蘇各一兩砂仁陳皮甘草各五分上水二盞煎一盞溫服腹痛者加阿膠蜜導法治孕婦痘瘡大便祕結小兒虛羸不敢通利用此導之蜂蜜四兩煉成膏大皂角末三五錢和捻作成棗子樣插入肛門中大便自出避邪丹用燒於房中能避一切惡穢邪氣蒼朮乳香陳真香甘松細辛云香各等分上為末水丸如豆大每一丸熏之良久又焚一丸不可太多只是聊有香氣不斷可也
