body:
  text: 卷之七十五腋氣證病機腋氣敘論腋屬足厥陰肝經之分肝氣鬱熱於內而出於腋其臭如狐又曰狐臭腋之下有竅肝氣盛則竅浸開而其氣泄於外蓋不可近實由肝經邪氣雖外搓以枯礬麝香僅療一時之急不終日而氣復如舊者何耶此皆不知治本也治本者何內以疏其肝臟之邪則氣自息如瀉肝湯龍薈丸之類是也脈侯兩關脈大而數而弦急而實大者主有臟氣脈大實者宜下之脈小者易治藥方龍膽瀉肝湯治氣鬱熱腋氣及腋下多汗龍膽草生地黃當歸酒洗木通車前子澤瀉甘草減半梔子黃芩各一錢上水二盞煎一盞食後溫服當歸龍薈丸治腋氣不可聞方見耳聾門丹溪臟氣神效方密陀僧一兩白礬七錢硇砂麝香各少許上為末先用皂角煎湯洗淨腋後敷藥直指三神散擦腋氣明礬黃丹各一錢麝香少許綱目治腋氣除根方法凡腋氣先用刀剃去腋毛淨用好澱粉水調擦患處六七日後看腋下有一點黑者孔如針大或如簪尖大其氣則此而出也用艾炷如米大灸之三四壯愈永不再發其內邪毒未除者可服後藥青木香三分丁香三分檀香一錢檳榔八分麝香少許真者大黃三錢上水煎以下為度不下再加大黃二錢又服三因蜘蛛散治腋下狐臭不可近大蜘蛛一枚輕粉一字上以黃泥少加赤石脂井鹽杵為窩子包裹蜘蛛於小火中煨乾漸加武火煅通紅候冷取蜘蛛細研入輕粉和米醋調膏臨臥浩洗淨方擦腋下來早洗下黑汁惡物為效宜遠僻處埋之不可染人不可穿舊時衣服其舊衣俱重浣洗過經驗田螺散治體氣大田螺清水養之一枚俟靨開以巴豆肉一粒針挑內螺口中仰放盞內夏月過宿冬月五七宿自然成水取水搽腋下永絕其根效蒸餅方治體氣以素熟蒸餅一個切作兩半各摻密陀僧少許急夾在腋下睡少時俟冷擲之除根一方用夜明沙為末絞汁調敷腋下附腋漏兩腋下並手足心陰股及囊常如汗濕汙衣名曰腋漏醫林六物湯干枸杞根干薔薇根甘草各二兩商陸根胡粉滑石各一兩上為末醋少許和塗之微汗出易衣更塗之三次愈或次年又發依法再治愈又方用絡石一名木饅頭煎湯洗腋及手足陰處再以密陀僧末敷之三日愈
