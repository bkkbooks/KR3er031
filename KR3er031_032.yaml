body:
  text: 卷之三十二蠱證門病機蠱證敘論易以上下乖隔不通為蠱夫子繫辭以為蠱壞之極先哲以蠱名其病證正謂氣血虛極陰陽不通上下不相升降先由內傷脾胃而運用失常遂成中滿痞塞之疾漸而虛極上下不通氣血留積堅聚成形必為蠱證藥不能攻斯壞之極而不可救生氣通天論曰病久則傳化上下不並不通也良醫弗為其蠱證之謂歟知命者是必慎其將壞之初而必謹其履霜之戒當於痞滿腫脹之時求良醫以圖治安則無終蠱堅冰之患也甫見今病蠱者皆弗究其將壞之初而惟求治於既壞之後醫者不思蠱邪固如磐石豈一擘能移雖用利藥攻之是欲速其死也果何益之有哉醫書多以蠱證附鼓脹脹滿門中所以不知蠱之為病深重也今別立一門俾患者醫者各知其所慎不敢因循而致於壞極雖良醫弗能救而況其下者乎治法凡單腹脹腫屢經利下而不愈者必成蠱證治法宜於痞滿脹滿水腫三法中求治其初則不致於壞極成蠱一至成蠱不能治矣藥方中滿分消丸治氣蠱腹脹如鼓俗呼為梭子氣又謂之單腹脹皆因脾虛所致且胃為水穀之海水穀入胃脾主運化今胃虛不能運化氣塊然不動致水浸漬於脾則為之脹滿不有生意肌肉消瘦獨腹腫脹其硬如鐵將見臍下無紋針所不入藥所不救坐以待斃矣方見脹滿門簡易四炒枳殼丸治氣血凝滯腹內蠱脹枳殼四兩去穰咀分四制一分用蒼朮一兩同炒一分用蘿蔔子一合同炒一分用乾漆一兩同炒一分用小茴香一兩同炒上各炒枳殼黃色為度揀出為細末卻將蒼朮等四味用水二碗煎至半碗去滓以汁攪麵糊為丸梧桐子大每服三十丸食遠米飲下萬金丸治諸般氣血積或食積欲成蠱症者石菖蒲細銼八兩斑蝥八兩去翅足同菖蒲炒焦黃色揀去蝥用粗布袋盛起兩手牽拽去斑蝥背上衣殼淨用入菖蒲上將菖蒲為末醋糊丸如緑豆大每服三五十丸食遠溫酒或白湯送下如蠱將成用香附米一二錢煎湯下良方遇仙如意丸治諸蠱脹虛弱白茯苓青皮陳皮各一錢白豆蔻石菖蒲人參丁香三稜炮白朮砂仁官桂莪朮炮遠志木香各三錢山藥半兩香附炒五兩牽牛取頭末八兩甘草五分上為細末醋糊為丸如梧桐子大每服一百二十丸臨臥溫白湯下看老幼虛實加減服忌一切生冷硬物氣蠱水蠱每服三百丸立消婦人月水不調産後腹中有惡物並宜服之服後利三四行飲水一口即止利後脹消可服甘露飲補之甘露散人參白朮茯苓豬苓各半兩滑石六兩澤瀉半兩甘草三錢上為細末每服三錢食後滾白湯調下神效木香散治二十四種蠱證方見水腫門廣朮潰堅湯治中滿腹脹內有積塊堅硬如石生臥不安寢成蠱脹面色痿黃方見積聚門祕方七聖君子散治一切氣血水食蠱證皆治如患人面色青黑者肝死兩眉凸者肺死臍中突出脾死兩手無絞心死下注腳腫腎死此五證內顯一證者不可治白樟柳枝葛根桑白皮甘遂續隨子各等分上為末每服三錢重者五錢緑豆湯調下看大小虛實用之忌一切生冷油膩葷腥鹽醬麵食魚肉等發病之物及房室一百日宜服白粥米食淡物服藥取惡物如蟲如魚腦血塊者即去根歌曰蠱藥七聖君子芳名著在煙霞白皮甘遂與乾葛商陸檳榔配合葶藶牽牛等分休將各物爭差豆湯調服勝丹砂蠱脹諸膨消下聖惠檳榔丸治水蠱檳榔郁李仁各一兩甘遂續隨子各半兩䕡茹商陸黑醜大黃各一兩木通海金沙各五錢滑石一兩上為細末麵糊丸梧桐子大每服三十丸酒下如瀉白粥補之常服止吃十丸至十五丸忌鹽醬生冷油膩麵食宣明雞屎醴散治蠱脹痞滿能旦食不能暮食大黃桃仁去皮尖雞屎醴乾者炒上等分為末每服一錢薑湯調食後臨臥服瑞竹香棗丸治十種蠱病苦丁香為細末煮棗肉丸如梧桐子大每服三十丸空心棗湯下三服立效百選水蠱商陸根治水蠱商陸根赤者搗爛貼臍心以帛縛定水從小便出正傳經驗雞屎醴治蠱脹氣脹水脹等疾羯雞屎乾者一升炒焦色為末出火毒再研細百沸湯三升淋汁每服一大盞調木香檳榔末各一錢日三服空心服以平為期經驗桃奴丸治婦人室女且經不通漸成脹滿及男子墜馬跌撲損傷以致瘀血停積將成血蠱並皆治之桃奴桃樹上干朽嫩桃十二月取用猳鼠糞兩頭尖者是雄鼠屎也玄胡索肉桂香附子五靈脂砂仁桃仁去皮尖各等分上為細末每服三錢溫酒調下河間二氣散治水氣蠱脹白醜黑醜各二錢上為細末外用大麥面四兩同一處拌勻做燒餅臨臥用茶清一盞下降氣為驗河間三花神祐丸治諸蠱證方見前腫門直指木香二皮丸治水腫氣蠱木香檳榔青皮陳皮去白大戟甘遂肉豆蔻各二錢半牽牛末一兩半上為細末水丸或商陸汁丸如緑豆大每服五十丸空心白湯下直指水蛭丸治血蠱氣蠱腹硬如石三稜炮莪朮炮乾漆炒煙盡牛膝酒洗虻蟲糯米炒琥珀肉桂硇砂水蛭石灰炒赤色大黃各等分上為末用生地黃自然汁和米醋調勻丸梧桐子大每服十丸空心溫酒或童便送下直指敷蠱法治腹硬如石或陰腫大先用甘草煎湯一盞服之後用此藥敷之大戟芫花甘遂海藻各等分上為末醋糊和敷腫處祕方保命丹治諸蠱肉蓯蓉三兩皂礬一斤紅棗一斤煮熟去核大麥芽炒一斤半香附子一斤蓯蓉皂礬二味入罐火煅姻盡上為細末麵糊丸如梧桐子大每服二十丸好酒下食後服日進三服量大小虛實與之人參定喘湯治氣蠱有喘人參一兩杏仁去皮尖炒一兩陳皮甘草木香三錢上為末每服三錢食遠蘇木湯調下三服喘止集成泄蠱丸治一切水腫氣脹甘遂黑醜大黃茯苓澤瀉各半兩丁香滑石枳殼木香一掃仙沉香各二錢續隨子三錢上為細末醋糊丸如梧桐子大雄黃為衣集成尊重丸治蠱證水腫氣腫喘急小便赤澀大便祕結不通一切中滿單腹脹人參沉香丁香木香檳榔車前子葶藶各四錢胡椒蠍梢滑石海金沙赤茯苓白豆蔻錢半蘿蔔子六錢郁李仁一兩一錢上為末薑汁糊丸梧桐子大每服三丸薑湯下日三次醫林沉香廣聖散治十種蠱氣木通大戟商陸各半兩芫花醋浸一宿炒半兩甘遂二錢麵煨上為細末每服二錢空心蜜水調下醫林愈蠱散瞿麥葛根甘遂各五錢牽牛芫花滑石葶藶胡椒各三錢上為細末每服一錢加至二錢空心好酒調服易簡諸方一方治蠱脹身乾黑瘦多渴煩悶用馬鞭草細銼曬乾勿見火以酒或水同煮味出去渣溫服無時六月中旬雷鳴時採有效又方治水蠱不問年月深者用大戟當歸陳皮各一兩細銼水二升煮七分頓服利二三斗物怪至重不通再服
