body:
  text: 卷之五十七腹痛門病機敘論黃帝間曰予聞善言天者必有驗於人善言古者必有合於今善言人者必有正於己如此則道不惑而要數極所謂明明者今余問於夫子令言而可知視而可見捫而可得令驗於己如發蒙解惑可得而聞乎岐伯再拜稽首對曰何道之問也帝曰願聞人之五臟卒痛何氣使然岐伯對曰經脈流行不止環周不休寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通效卒然而痛帝曰其痛或卒然而止者或痛甚不休者或痛甚不可按者或按之而痛止者或按之無益者或喘動應手者或心與背相引而痛者或脅肋與少腹相引而痛者或腹痛引陰股者或痛宿昔而成積者或卒然痛死不知人少間復生者或痛而嘔者或腹痛而後瀉者或痛而閉不通者凡此諸痛各不同形別之奈何岐伯曰寒氣客於脈外則脈寒脈寒則縮蜷縮蜷則脈絀急絀急則引小絡故卒然而痛得炅則痛止因重中於寒則痛久矣寒氣客於經脈之中與炅氣相薄則脈滿脈滿則痛而不可按也寒氣稽留炅氣在上則脈充大而血氣亂故痛甚不可按也寒氣客於腸胃之間膜原之下血不得散小絡急引故痛按之則氣血散故按之痛止寒氣客於俠脊之脈則深按之不能及故按之無益也寒氣客於衝脈則脈不通脈不通則氣因之故喘動應手矣寒氣客於背俞之脈云云見背痛門寒氣客於厥陰之脈厥陰之脈者絡陰器繫於肝寒氣客於脈中則血泣脈急故脅肋與少腹相引痛矣厥氣客於陰股寒氣上及小腹血泣在下相引故腹痛引陰股寒氣客於小腸膜原之間絡血之中血泣不得注於大經血氣稽留不得行故宿昔而成積矣寒氣客於五臟厥氣上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣寒氣客於腸胃厥逆上出故痛而嘔也寒氣客於小腸小腸不得成聚故後泄腹痛矣熱氣留於小腸腸中痛癉熱焦渴則堅幹不得出故痛而閉不通矣傷寒腹痛成無己云陰寒為邪者則腹滿而吐食不下自利益甚腹中痛太陰證也發汗不解醫反下之因而腹滿時痛者屬太陽也桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之東垣曰腹中諸痛皆因勞役過甚咳食失節中氣不足寒氣乘虛而入客之故卒然而作大痛經言得炅則止炅者以熱治寒治之正也然腹痛有部分臟位有高下治之者宜分之屬熱腹痛原病式曰熱鬱於內而腹滿堅結痛者不可言為寒也故丹溪云積熱死血食積濕痰皆能作腹痛宜於各類求治之戴氏曰綿綿腹痛而無增減者寒也時作時止者熱也痛有常處不走移者死血也痛甚欲大便利後痛減者食積也大抵痛而小便不利或得辛辣熱湯則暫止者痰也痛定則能食時作時止或肚大青筋腫聚往來無有休止涎出嘔吐清水者蟲也血滯腹痛成無己云邪氣聚於下焦則津液不得通血氣不得行或溺或血留滯於下是以脹滿而硬痛也若從心下至少腹硬滿而痛小便利者則是蓄血之證小便不利者則是溺澀之證脈候脈經曰脈細小緊急病速進在腹中刺痛陰弦則腹痛弦急小腹痛尺脈緊臍下痛尺脈伏小腹痛有症疝尺脈實小腹痛當利之腹痛脈反浮大而長者死心腹痛不得息脈細小遲者生脈大而疾者死傷寒脈陽澀陰微腹中急痛里有虛寒治法傷寒腹痛治以三陰此事難知云傷寒中脘痛太陰也理中湯黃耆建中湯之類臍腹痛者少陰也四逆湯真武湯附子湯之類小腹痛者厥陰也重則正陽散回陽丹輕則當歸四逆湯之類若腹痛雜病四物苦楝湯酒煮當歸丸之類夏月腹痛肌熱惡寒脈洪數屬手太陰足陽明黃芩芍藥湯主之四時腹痛芍藥甘草湯主之治腹痛以溫散為主丹溪曰腹痛脈弦者多屬食積宜溫散之如煨乾薑炒蒼朮川芎白芷茱萸香附之類是也不可峻用利藥攻下之蓋食得寒則凝熱則化更兼行氣快氣藥助之無不愈者凡痛必用溫散以其鬱結不行阻氣不運故也脈滑者是痰痰因氣滯宜導痰解鬱二陳湯加臺芎蒼朮香附之類是也腹痛宜下候腹痛以手按之而痛甚者手不可近者皆實也宜大黃芒硝之類下之瘦黑人是實熱宜下之跌撲損傷而痛是瘀血宜桃仁承氣湯加當歸紅花蘇木下之腹大痛脈沉細實附子理中湯合大承氣湯下之飲食過傷而腹痛者宜木香檳榔丸下之壯實與初病之人元氣未虛宜下之虛人與久病者宜升之消散之中氣不足脾胃虛弱之人傷飲食而腹痛宜調補胃氣並消導藥用人參白朮山楂神麯枳實麥芽木香砂仁之類若腹痛不禁下者宜川芎蒼朮湯以治之川芎蒼朮白芷香附子茯苓滑石姜水煎服小腹因寒而痛宜用桂吳茱萸甚者附子湯因寒氣而作腹痛者小建中湯加官桂乾薑臺芎蒼朮白芷或小腹實痛用青皮以行其氣因熱而痛者二陳湯加黃耆黃連梔子痛甚者加炒乾姜從之若腹中常有熱而痛此為積熱宜調胃承氣湯下之腹中鳴聲乃火擊動其水也蓋水欲下火欲上相觸而然用二陳湯加梔子芩連之屬腹痛宜分三陰部分而治中脘太陰臍腹少陰小腹厥陰也肥白人腹痛多是氣虛濕痰宜半夏人參二術芍藥止治血虛腹痛余俱不治以其酸寒收斂而別無溫散之功臍下忽大痛人中黑色者死有卒然心腹大痛欲吐不吐欲瀉不瀉唇青厥逆死在須臾此內因食積外感寒邪名乾霍亂之候也宜急以鹽湯灌之而以鵝翎探吐取涎而愈若夫清痰留滯於胸腹之間食積鬱結於腸胃之內皆能令人腹痛清痰作痛者控涎丹小胃丹之類食積為患者保和丸枳朮丸之類消之枳實導滯丸木香檳榔丸之類下之濁氣在上者湧之清氣在下者提之寒者溫之熱者清之虛者補之實者瀉之結者散之留者行之此治之要也治案一人六月投淵取魚至秋水涼半夜忽小腹痛甚大汗脈沉弦細實重取如循刀刃責責然與大承氣湯加桂二服微利痛止仍連日於酉時復痛每與前藥得微利痛暫止又以前藥加桃仁下紫黑血數升依時腹痛脈雖減而責責然猶在又於前藥加附子下紫黑血如破絮者二升而愈又傷食酉時復痛在臍腹間脈和與小建中湯一服愈一少年自小面微黃夏間腹大痛或與小建中湯加丁香不效加嘔吐清汁又與丁沉透膈湯一帖不食困臥痛無休止不可按又與阿魏丸一粒夜熟不寐左脈沉弦而數關尤甚上右滑數實與大柴胡加甘草四帖下之痛嘔雖減食未進以小柴胡去參苓加芍藥陳皮黃連生甘草二十帖安一婦人腹常痛隱隱常燒磚瓦之物熨之面胸畏火氣六脈和皆微弦苫夜不寐一年久眾人作心病治遂覺氣自下衝上形不瘦予謂肝受病與防風通聖散吐之時寒加桂入薑汁調之日三四次夏稍熱與當歸龍膽丸間枳朮丸服一月愈一人中脘作痛食已口吐血紫霜色二關脈澀乃血病也因跌僕而致以推陳致新之劑吐出血片碗許而安藥方溫散諸劑東垣草豆蔻湯治臍腹虛寒疼痛澤瀉一錢木香三分神麯四分半夏制枳實麩炒草豆蔻黃耆益智仁甘草炙各五分青皮陳皮各六分川歸茯苓各七分上咀水煎服仲景桂枝加芍藥湯治腹滿時痛脈弱理中湯治霍亂頭痛身寒腹痛小建中湯治傷寒陽脈澀陰脈弦腹中急痛真武湯治腹痛下利四肢沉重四逆湯治傷寒下利腹痛四肢逆冷霹靂散治腹痛脈欲絕當歸四逆湯治傷寒小腹急痛以上方並見傷寒門桃花湯治腹痛下利膿血小便不利赤石脂一兩咀乾薑一錢粳米一合水煎食前服東垣厚朴溫中湯治胃虛腹滿疼痛厚朴薑製陳皮各一錢茯苓草豆蔻木香甘草各五分乾薑三分半上咀水盞半姜五片煎八分不拘時熱服益胃散治因服寒藥過多致腹痛不止人參厚朴甘草白豆蔻薑黃乾薑砂仁澤瀉各二分益智六分陳皮七分黃耆七分上咀水盞半姜五片煎八分熱服酒煮當歸丸治小腹寒痛及婦人白帶㿗疝大寒等證茴香半兩黑附子炮良薑各七錢當歸一兩上咀好無灰酒一升半煮酒盡焙乾入後項藥甘草炙苦楝生用丁香各半兩木香升麻各一錢柴胡二錢炒黃鹽全蠍各三錢玄胡索四錢上與前四味同為細末酒煮糊丸梧桐子大每服五七十丸空心淡醋湯下忌油膩冷物酒面和解諸劑芍藥甘草湯治四時腹痛白芍藥炙甘草各等分上咀每服四錢水盞半姜五片煎八分溫服元戎云腹痛脈弦傷氣用本藥脈洪傷金加黃芩脈緩傷水加桂枝脈遲傷火加乾薑膩澀傷血加當歸加減小柴胡湯治寒熱脈弦腹中痛本方去黃芩加芍藥黃芩芍藥湯治腹痛脈洪大黃芩白芍藥甘草各等分水加姜煎服黃連湯治胸中有熱胃中有邪黃連甘草炙乾薑桂枝人參各二錢半夏半合上咀水盞棗二枚煎服元戎四物苦楝湯治臍下虛冷腹痛四物湯二兩玄胡索苦楝各半兩㕮咀水煎服疏下諸劑仲景桂枝加大黃湯治腹滿時痛煩躁桂枝生薑各三錢芍藥六錢大黃一錢甘草二錢上咀水盞半姜三片棗二枚煎服調胃承氣湯大陷胸湯大承氣湯小胃丹並見寒門灸法內關二穴在掌後橫紋三指是穴灸三壯中脘一穴氣海一穴在臍下一寸五分小腹痛欲死者灸之生易簡諸方子母秘錄治腹痛白砂糖一兩以酒三升煮服不過再服即愈圖經云心腹冷氣掬痛者以菖蒲二寸捶碎吳萸煎湯熱飲之古今錄驗範汪方治胸腹痹痛逆氣膈中飲不下小草丹小甘草桂心蜀椒去汗乾薑細辛各三兩附子三分炮六物各搗為末和勻蜜丸彈子大先食米汁下日三丸以不痛為度忌油膩生冷道藏經治卒腹痛舌上寫風字又紙上寫蜈蚣二字相交吞之又方用食鹽炒一大把熱水送下多飲取吐即瘥又方治心腹脹痛短氣欲絕或已絕以梔子十四枚豆豉七合以水二升先煮豉取一升三合絞去渣納梔子更煎取八合又絞去渣服半升而愈不愈者盡服盂詵方治臍下絞痛木瓜一二片桑葉七片大棗三枚打碎以水二升煮取半升頓服即瘥肘後方治心腹俱脹痛短氣欲死或已絕官桂三兩切以水一升二合煮八合去渣頓服無桂用姜亦可食療云治五臟冷痛心腹痛以胡椒二十一粒擂熱酒服脅痛門病機脅痛敘論藏氣法時論曰肝病兩脅痛引少腹善怒何謂夫肝厥陰經脈自足而上環陰器抵少腹又上貫肝膈布脅肋故兩脅下痛引少腹刺熱篇云肝熱亦令脅痛手足燥不得安臥咳論云肝咳之狀則兩脅下痛甚則不可以轉轉則兩腳下滿脾咳亦能右胠下痛陰陰引肩背胠亦脅也與痛論云寒氣客於厥陰之脈故脅引少腹而痛以歲運論之歲木太過金反勝之則脅痛歲火太過水反勝之胸中痛脅支滿痛歲金太過病兩脅下小腹痛木勝金復則胸脅暴痛下引少腹六元正紀曰木鬱之發病胃脘當心而痛上支兩胠脅咽膈不通飲食不下至真要大論曰陽明在泉心脅痛不能反側繆刺篇云邪客於足少陽之絡令人脅痛不得息咳而汗出邪客足太陽之絡令人拘攣背急引脅痛標本論曰心病先心痛一日咳傳肺三日肺傳肝脅支痛而滿肝病頭目眩脅支滿痛也傷寒病脅痛是肝膽之氣仲景論傷寒三日少陽經耳聾脅痛此是肝膽二經之病也治以小柴胡湯脅痛有左右氣血之分肝位於左以藏血也肝血蓄於左脅作塊而痛者為肝積名肥氣肺位於右以行氣也肺氣鬱於右脅痞硬而痛咳喘為肺積名曰息賁也而脾所繫於右其經濕勝故痰飲流注右脅右脅痛者悉是痰氣丹溪云有肝火盛木氣實有死血有痰流注兩脅痛者分內外之因兩脅俱痛當分內外之因內因七情氣結飲食過度冷熱失調顛仆傷形者或痰積流注氣血相搏皆能為痛此內因也傷寒少陽耳聾脅痛風寒所襲而為兩脅作痛此外因也脈候內經曰肝脈搏堅而長色不澤當病墜若搏因血在脅下令人喘逆若軟而散其色澤者當病溢飲者暴渴多飲而溢入於肌膚腸外也肝脈沉之而急浮之亦然若脅下痛有氣支滿引小腹而痛時小便難苦目眩頭腰背痛足為逆寒時癃婦人月水不來時無時有得之少時有墜墮脈雙弦者肝氣有餘兩脅作痛雙弦者兩手俱弦也脅痛脈沉澀是郁細緊或弦者怒氣弦澀者順洪大者逆脈弦而急脅下如刀刺狀如飛屍不死治法治脅痛以順氣和血為主丹溪云治脅痛要分人之肥瘦強弱肥白人氣虛發寒熱而脅下痛用參耆補氣柴胡黃芩退熱木香青皮調氣瘦人寒熱脅痛多怒者必有瘀血宜桃仁紅花柴胡青皮大黃之類行之肝火盛木氣實而脅痛者或因怒氣太逆肝氣鬱甚謀慮不決風中於肝皆使木氣甚火盛則肝急矣經云肝苦急急食辛以散之撫芎蒼朮或小柴胡湯之屬痰積流注厥陰之經亦使脅下痛病則咳急引脅痛有鬱而兼痰者宜用二陳湯加南星半夏蒼朮川芎香附之屬開鬱行痰痰甚者加芥菜子痰在脅下非芥菜子不能除故也肝火盛者用當歸龍薈丸瀉青丸皆要藥死血瘀血惡血停留於肝歸於脅下而痛其病則自汗按之益痛甚宜破血行氣以桃仁不去尖紅花川芎香附玄胡索青皮及復元活血當歸導滯等藥氣弱人脅下痛脈細緊或弦多以勞役怒氣得之宜八物湯加木香青皮或加官桂破滯氣須用青皮青皮乃肝膽二經之藥多怒脅下有積滯者並氣實者因宜若經病久人虛二經不足者皆當用補藥中少加青皮可也右脅痛多屬脾經氣滯而致痰飲流注不行久則成著名曰痞氣必以二陳湯加辛散之藥吳茱萸白豆蔻之屬甚者可用廣朮潰堅湯間服補中益氣湯庶得兩全而無傷也左脅痛以柴胡為君加佐使川芎青皮龍膽草之類當歸龍薈丸亦可用血積者加血藥兩脅走痛者用控涎丹以其有芥菜子之功也發寒熱脅下痛似覺有積塊必是飲食過傷勞力所致宜用龍薈丸痛不得舒伸者亦宜龍薈丸蜜丸服脅下有食積一條槓者起用吳茱萸炒黃連凡脅痛偏於左者皆肝經積滯或中風寒或肝膽實火宜詳虛實而治之右偏痛者皆屬脾肺為食積為痰飲兼咳而有痰是也若脅下鳴而有水聲者飲也咳而先面腥臭氣肺傷也內支滿目眩前後血下肝血也此年少人醉以入房肝傷氣竭皆致脅病如是也藥方脅痛發散諸劑仲景小柴胡湯治傷寒少陽經胸脅痛及耳聾方見傷寒門河間分氣紫蘇飲治腹脅疼痛氣促喘息紫蘇葉桔梗桑白皮蜜炙草果仁陳皮大腹皮酒洗茯苓甘草各三分上咀水盞半姜三片白鹽少許煎七分空心溫服河間葛根湯治脅下疼痛不可忍桂枝川芎細辛葛根防風各八分芍藥枳殼麻黃人參甘草炙各四分上咀水盞半姜三片煎一盞食遠溫服枳殼煮散治悲哀煩惱有傷肝氣致兩脅骨痛筋脈拘急腰腳重滯股脅攣痛四肢不舉大治脅痛防風川芎細辛枳殼炒桔梗各一錢甘草炙五分葛根八分上咀水二盞姜三片煎八分食遠溫服脅痛瀉肝實火劑河間當歸龍薈丸瀉肝火大盛之要藥因內有濕熱兩脅痛甚當歸龍膽草梔子仁黃連大黃酒蒸蘆薈青黛各半兩木香二錢半麝香半兩另研上神麯糊丸梧桐子大每服二十丸薑湯下一方加柴胡青皮丹溪左金丸瀉肝火行濕為熱甚之反佐黃連六錢吳茱萸一錢上為末湯浸蒸餅丸綠豆大每服三十丸滾薑湯下不用茱萸名柳青丸大柴胡湯治脅痛口燥渴飲水痛不可忍宜此方見傷寒門十棗湯治病肝氣實者可用甚效方見痰門木通散治男婦脅肋苦痛木通青皮川楝子取肉一兩用巴豆去殼半兩同炒黃去巴不用蘿蔔子炒莪朮木香滑石各半兩上為細末蔥白湯調食每服三錢煎服即愈甚者不過三服枳殼散治脅痛如有物插枳殼炒二兩半甘草炙七錢半上為末每服三錢食遠蔥白湯調服東垣枳芎散治左脅肋刺痛不可忍枳實炒川芎各六錢甘草炙二錢上咀作二服每服水盞半姜三片棗一枚煎八分食前溫服或為末酒調服東垣異香散治腹脅痞悶莪朮三稜益智仁甘草各錢青皮陳皮各五分石蓮肉厚朴薑製三分上咀水盞半姜三片棗一枚煎七分溫服局方廣朮潰堅湯治右脅作痛有塊連胸引背麻木牽痛方見積聚門局方推氣散治右脅痛甚脹滿不食片薑黃枳殼麩炒桂心各半兩甘草炙三錢上為細末每服二錢薑湯調下流氣飲子治五臟不和三焦氣壅心胸痞悶腹脅脹痛吐嘔不食方見氣門木香檳榔丸治氣積食滯脅痛方見氣門氣針丸治久積風壅心胸築痛兩脅似有針刺疼痛不可忍六脈沉伏按之不可近此藥屢試神效常服疏肝氣止痛木香檳榔青皮陳皮大黃各四兩牽牛炒半生半熟取頭末半斤上為細末煉蜜丸梧桐子大每服三十丸生薑湯送下破血行血劑破血散滯湯治傷損血滯脅下痛防風羌活中雄各一錢蘇木錢半連翹歸尾柴胡各二錢水蛭三錢炒煙盡麝香少許二味另研上作二服每服水一盞酒二盞煎一盞調水蛭麝香末空心服芍藥散治婦人血積脅痛白芍藥玄胡索炒肉桂各一兩香附子二兩半醋一升鹽半兩同煮乾上為極細末每服二錢不拘時白湯調服豁痰諸劑局方加味二陳湯治右脅痰積痛導痰湯治痰積流注二方並見痰門香橘湯治七情所傷中脘不快痰氣香附子炒橘紅半夏制各二三錢甘草各一錢上作一服水盞半姜五片棗一枚煎八分食遠服化氣湯治諸脅痛皆生於氣又治息積癖於脅下偏脹不思飲食痰因氣滯及治心脾痛嘔吐酸水丈夫小腸氣婦人脾血氣砂仁桂心木香各二兩茴香丁香青皮陳皮白姜炮莪朮煨各四兩胡椒沉香各一兩甘草三兩上為細末每服二錢姜蘇鹽湯空心調服貼脅痛用芥菜子水研服或琥珀或吳茱萸醋研敷熨法灰醋炒熱熨之或蔥或艾韭菜皆可熨之灸法治卒脅痛不可忍者以蠟繩橫度兩乳中間屈繩從乳橫以趨痛脅下灸繩盡處三十壯更章門二穴在大橫骨外直季脅端側臥屈上足伸下足舉臂取之各七壯丘墟二穴在外踝下如前陷中去臨泣三寸灸三壯針入五分導引法以手交項上相提自極治脅下痛坐地交兩手著不周遍握當挽久行實身如金剛令息調長如風雲如雷
