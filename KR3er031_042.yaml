血者其來遠先血後便者其來近治法大要當先解散胃中風邪熱毒敗毒散合芎歸湯為必用之劑初以黃連丸槐花散久則須以調和胃氣正氣散理中湯亦所宜施至謂寒冷驟用烏附則亦妄也丹溪云風邪下陷者蓋風傷肝肝主血故也宜升提之凡下血之人用涼藥多而不愈者必須加辛味用辛味而不愈可用溫劑兼升提藥酒浸酒炒始然要去濕熱為主久而虛者當行溫散如四物加升麻炮乾薑之屬是也脈候右尺脈洪數而疾為下血經曰陰結便血一升再結二升三結三升又結在五臟則陰脈不和陰脈不和則血留之結陰之病陰氣內結不得外行無所稟滲入腸間故便血也脈虛澀非腸風臟毒也為中虛宜灸中脘氣海藥方通治下血劑敗毒散治初下血方見瘟疫門芎歸湯總治諸血川芎當歸上等分水煎服地榆散治腸風熱證下血地榆黃芩茜根梔子仁茯苓黃連各等分上為粗未每服三錢韭白五寸同煎食遠溫服加滅四物湯治腸風下血不止側柏葉生地黃當歸川芎各一錢枳殼荊芥穗槐花炒甘草各五分上水二盞薑三片烏梅二枚煎七分空心服滑石散治腸風下血滑石當歸生地黃黃芩蒼朮甘草等分上水煎服子和黃連貫衆散治腸風下血腸中疼痛黃連貫衆大黃雞冠花烏梅肉枳殼荊芥各一兩甘草炙七錢上為末每服二錢食前溫米飲調下芍藥黃連湯治大便後下瘀血腹痛為熱毒芍藥黃連當歸各四錢大黃一錢官桂一錢甘草五分上作二服每服水盞半煎七分空心溫服槐角散治腸胃不調下血不止蒼朮厚朴陳皮當歸枳殼各一錢槐角一錢烏梅三個甘草五分上水盞半煎七分食前服槐花散治同前黃連枳殼各三分槐花一兩上以槐花炒二味藥去花不用只將二味水一盞半煎七分溫心服香連丸治一切腸風下血酒熱臟毒方見痢門臟連丸治遠年近日腸風臟毒下血大鷹爪黃連半斤槐花米二兩枳殼一兩防風粉草槐角香附子豬牙皂角木香各五錢上用陳熟倉米三合同香附一處為末以上藥共為細末用豬大腸約二尺長水洗淨裝入香附倉米縛定口量用水二大碗沙鍋炭火煮乾即添水慢慢煮爛豬腸如泥取起和藥搗如糊再入黃連等末同搗為丸梧桐子大每服空心米飲下八十丸忌面蒜生冷煎炙之物一料病痊蒜連丸獨蒜十枚黃連末二兩上先將蒜煨香熟和連末杵搗爛勻為丸梧桐子大空心米湯下四十丸香槐散治腸風香附子炒槐花炒各一兩枳殼當歸川芎五分甘草三分上水一盞半薑三片棗一枚煎服槐角丸治腸風瀉血脫肛槐角一兩防風地榆當歸枳殼木賊茯神各半兩上為末酒糊丸梧桐子大每服四十丸米湯下黑聖散治腸風臟毒下血痔漏等疾當歸川芎茯苓地榆槐花敗棕炮艾葉燒存性百草霜上等分為末每服二錢食前米湯調下止血劫劑香梅丸治腸風下血服之即止烏梅肉燒存性香白芷百藥煎燒存性等分上為末米糊丸梧桐子大每服五十丸空心米湯下聖金丸治同前百藥煎一味煉蜜丸梧桐子大每服五十丸空心米湯下椿皮丸治同前椿根白皮一味為末醋糊丸梧桐子大每服七十丸空心米湯下溫理脾胃收腸劑理中湯治腸風下血久不愈服諸藥不效方見脾胃門不換金正氣散平胃而腸風自愈血自歸參苓白朮散治同前二方並見瀉門補中益氣湯治腸風虛損血不得升宜服此方見內傷門拔萃結陰丹治腸風臟毒下血枳殼威靈仙黃耆何首烏椿根白皮陳皮荊芥穗各等分上為末酒糊丸梧桐子大每服五十丸空心米飲入醋少許送胃風湯方見胃風門治風熱乘虛入於腸胃下瘀血或如豆汁當歸和血散治大腸濕毒下血槐花青皮當歸身升麻各一錢川芎荊芥穗熟地黃白朮各五分上為末每服三錢米飲調下寶鑑平胃地榆湯治陰結便血蒼朮厚朴乾葛甘草白朮人參陳皮當歸芍藥升麻茯苓地榆神麯乾薑炮香附子各等分上咀每服五錢加薑棗煎空心服拔萃升陽和血湯治腸澼下血作泒其血即出有力而遠射四散如篩春二月中下二行腹中大作痛乃陽明氣衝熱毒所作也當去濕毒取血而愈生地黃梔子生甘草炙甘草牡丹皮黃耆當歸身秦艽蒼朮陳皮升麻芍藥等分肉桂少許上咀每服五錢水盞半煎七分食前服越桃散治下血痢血梔子仁槐花大棗乾薑炮等分上為末每服三錢米飲調下東垣椿皮散治血痢及腸風下血神效椿根白皮二兩槐角子四兩枯白礬二兩炙甘草一兩上為細末每服三錢米飲調下濟生烏梅丸治大便下血如神殭蠶炒一兩烏梅肉一兩半上為細末醋糊丸梧桐子大每服四十五丸空心醋湯下本事槐花散治腸風臟毒下血槐花炒側柏葉杵荊芥穗枳殼麩炒上各等分為末每服二錢空心米飲調下東垣加減四物湯治腸風下血側柏葉生地黃當歸川芎各八分枳殼麩炒荊芥穗槐花炒甘草各一分地榆條芩防風各六分烏梅肥大者二枚上咀作一服水二盞薑三片煎八分空心溫服局方枳殼湯治大便腸風下血枳殼二兩炒黃色大黃連一兩淨同槐花四兩炒焦去槐花不用上水濃煎空心溫服槐花丸治五種腸風下血並痔漏脫肛槐角二兩炒地榆黃芩當歸防風枳殼麩炒上等分為細末酒麵糊丸梧桐子大每服五十丸空心清米飲送下極效伏龍肝散治便血內外有感凝停在胃隨氣下通甘草伏龍肝白朮黃芩阿膠干生地黃各等分上水盞半煎七分食遠服結陰便血生地黃膏生地黃汁小薊汁砂糖熬膏約一大碗阿膠一兩側柏葉地榆各末一兩上用四味汁熬成膏方入柏葉地榆末和勻空心米飲調下三匙許黃連湯治便後下血腹不痛名溫毒下血黃連當歸各二錢甘草五分上水二盞煎八分食遠服聚金丸治酒毒下血大腸蓄熱黃芩防風各二兩黃連四兩半生半酒炒上為末醋糊丸梧桐子大每服七十丸空心米飲下御藥阿膠丸治腸風下血黃連阿膠炒成珠赤茯苓各等分上將連茯為末調阿膠酒熬衆手和丸食前米湯送下三十丸胡桃散治腸風下血老人更宜服胡桃仁去油四兩皂角刺炒焦二兩故紙微炒兩半槐花炒一兩上為末每服二錢米飲或湯調下卷柏丸治臟毒下血神效卷柏生石上老柏為妙取葉用上為丸為末每服二錢空心米飲送下易簡諸方一方治腸風下血用茄科燒存性為末每服二錢米飲調下一方用桑耳一兩炒黑水盞半煎六分空心分三服一方苦楝子炒黃為末煉蜜丸梧桐子大米飲下二十丸一方烏梅燒存性為末醋糊丸梧桐子大空心米飲下七十丸一方百葉煎半炒半生為末米糊丸梧桐子大米飲下五十丸梅師方用山梔子三十枚以手擘破水二盞煎一盞食前溫服一方百草霜米飲調下二錢一方五倍子炒為末空心米飲調下二錢一方椿根白皮銼酒浸曬乾為末棗肉丸梧桐子大每服五十丸空心酒下一方木槿煎服斗門方代赭石一兩火煆紅醋淬數次以碎為度研為細末極細空心米飲調下一錢一服即瘥一方山裡紅果即山楂為細末每服二錢空心米飲調下灸法命門穴在脊骨中與臍對灸七壯即止脊中第二十椎下隨年壯灸之中脘一穴氣海一穴上二穴灸脫血而色白脈濡手足冷飲食少思強食即嘔宜灸之效如神醫案寶鑑一人年四十二歲形瘦因強飲酸酒少時腹痛次傳下痢無度十餘日便後見血或紅或黑腹鳴時痛諸醫以為血熱用芍藥柏皮丸未效仍不欲飲食則嘔酸形愈瘦面色青黃不澤心下痞惡冷物口乾有時煩躁不安脈弦細而微遲手足稍冷經曰結陰者便血一升再結二升三結三升又邪在五臟陰脈不和則血留之陰氣內結不得外行無所稟滲入腸間故便血也其脈虛澀非腸風臟毒也外灸中脘三里氣海等穴內服平胃地榆湯而愈丹溪治一人嗜酒因逃難下血而痔痛脈沉澀似數此陽滯於陰者也以鬱金芎芷蒼朮香附白芍乾葛炒麵生薑半夏湯調服一人虛損大便下血每日三四碗身黃瘦以四物湯加藕節汁一臺紅花蒲黃一錢白芷升麻槐花各五分服之愈一老婦多怒大便下血十餘年食減形困心搖動或如煙燻早起面微浮血或暫止則神思清若忤意則復作百法不治脈左浮大虛甚久取帶澀而不勻右沉澀細弱寸沉欲絶此氣鬱生涎涎郁胸中清氣不升經脈壅遏不降心血絶少不能自養故也非開涎不足以行氣非氣升則血不歸隧道以壯脾之藥為君佐之二陳加酒紅花升麻歸身酒連青皮貝母澤瀉參耆白朮酒芍每帖用附子一片煎服四帖血止後去附子加乾葛牡丹皮梔子而煙燻除乃止所加之藥再加神麯砂仁地黃木香倍參耆白朮月半愈牙宣血有三因一因陽明胃熱一因少陰腎虛一因厥陰風壅非此三者牙不出血也戴氏曰風壅牙宣消風散搽之腎虛者為下虛上盛宜鹽湯下安腎丸用黑錫丹仍用薑鹽炒附米黑色為末揩擦其妙不可言也陽明熱詳見齒門消風散治厥陰風勝牙宣出血方見傷寒門安腎丸治腎虛齒動有血方見水飲門黑錫丹方見痼冷門膕中血呂滄州治一人偶搔膕中瘡出血汨汨如湧泉竟日不止困甚二尺脈如蛛絲他部皆無豫曰夫脈氣血之先也今血妄行故榮氣暴衰二尺尚可按當益榮以瀉陰火以四神湯加防風荊芥連進脈漸出更服十全大補湯遂愈
