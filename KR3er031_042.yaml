body:
  text: 卷之四十二血證門病機血證敘論內經曰陽氣者大怒則形色絶而血菀於上使人煎厥又曰陽明厥逆喘咳身熱善驚衄吐血濕淫汗出為鼽衄脾移熱於肝則為驚衄胞移熱於膀胱則為癃溺血怒則氣逆甚則嘔血故氣上矣結陰者便血一升再結二升三結三升又曰臥則血歸肝肝受血而能視足受血而能步掌受血而能握指受血而能攝又曰心出血肝納血肺出氣腎納氣針經云厥氣生足悗悗生脛寒脛寒則後血原病式云血溢血瀉衄衊汙血皆屬於火吐血候巢氏病源云夫吐血者皆由大虛損及飲酒勞損所致也肺者五臟上蓋心肝又俱主血上焦有邪則傷諸臟臟傷血下入於胃胃得血則悶滿氣逆氣逆故吐血也但吐血有三種一曰內衄二曰肺疽三曰傷胃肉衄者血出如鼻衄但不從鼻孔出是近心肺間津出還流入胃內或如豆汁或如衄血凝停胃裡因滿悶便血或去數升乃至一斛是也肺疽言飲酒之後毒滿便吐吐以後有一合二合或半升一升是也傷胃者是飲食半飽之後胃內冷不能消化則便煩悶強嘔吐之所食之物與共上衝踧因傷損胃口便吐血色鮮正赤是也吐血後虛熱胸中痞口燥候吐血之後臟腑虛竭榮衛不理陰陽隔絶陽虛於上故身體虛熱胸中痞則口燥嘔血候夫心者主血肝者藏血憂愁思慮則傷心恚怒氣逆上而不下則傷肝肝心二臟傷故血流散不止氣逆則嘔而出血唾血候唾血者由傷損肺肺者為五臟上蓋易為傷損若為熱氣所加則唾血唾出如紅縷者此傷肺也脅下痛唾鮮血者此傷肝也舌上出血候心主血脈而候於舌若心臟有熱則舌上出血如湧泉大便下血候此由五臟傷損所為臟氣既傷則風邪易入熱氣在內亦大便下鮮血而復吐冷氣在內亦大便血下其色如小豆汁出時疼而不甚痛前便後下血者血來遠前下血後便者血來近遠近言病在上焦下焦也令人面無血色時寒時熱脈浮弱按之絶者下血小便血候心主於血與小腸合若心家有熱結於小腸故小便血也下部脈急而弦者風邪入於少陰則尿血尺脈微而芤亦尿血九竅四肢出血候凡榮衛大虛腑臟易損血脈空竭因而恚怒失節驚忿過度暴氣逆溢致令腠理開張血脈流散也言九竅出血喘咳而上氣逆其脈數有熱不得臥者死汗血候肝藏血心之液為汗言肝心俱傷於邪故血從膚腠而出也論吐衄血泄皆因火熱所乘原病式曰血溢者上出也心養於血故熱甚則血有餘而妄行或謂嘔吐紫凝血為寒者誤也此非冷凝由熱甚消爍以為稠濁而熱甚則水化制之故赤兼黑而為紫也衄者陽熱怫鬱於足陽明而上熱則血妄行血衄也衄衊血汙血出也汙者濁也心火熱極則血有餘熱氣上甚則為血溢熱勢亢極則燥而汙濁害承乃制則血兼黑而為紫也血泄熱客下焦而大小便血也血證有三因陳無擇云衄者因傷風寒暑濕流傳經鉻湧泄於清氣道中而致者皆外所因積怒傷肝積憂傷肺煩思傷脾失志傷腎是喜傷心皆能動血隨氣上溢清道中而致者屬內因飲食過多啖炙爆辛熱或墜墮車馬傷損所致者為不內外因吐嘔唾血為內傷氣逆所致者多吐血者或因四氣傷於外七情動於內及飲食房室勞役所致勞血積聚膈間滿則吐溢世謂妄行或吐瘀血此名內傷東垣曰經云怒氣逆甚則嘔血暴疸內逆肝肺相搏血溢鼻口取天府穴又足少陰腎之脈從腎上貫肝入肺中循喉嚨其病則飢不欲食面黑如地色咳唾則有血夫氣者陽血者陰也氣主行之血主濡之今血妄行上出於鼻口者皆氣逆也故經言陽明厥逆怒則氣逆暴疸內逆者是也玉機微義云怒氣勞氣皆能致血證但怒氣致血證者則暴甚故經云抑怒以存陰者是矣否則五志之火動甚火載血上錯經妄行也血屬陰難成而易虧丹溪曰經曰人年四十而陰氣自半起居衰矣又曰男子六十四而精絶女子四十九而經斷夫以陰氣之成止供給三十年之運用已先虧矣人之情欲無涯此難成易虧之陰氣若之何而可以縱欲也玉機微義云經曰榮者水穀之精也和調五臟灑陳於六腑乃能入於脈也源源而來生化於脾充於心藏受於肝宣布於肺施泄於腎灌溉一身目得之而能視耳得之而能聽手得之而能攝掌得之而能握足得之而能步髒得之而能液腑得之而能氣是以出入升降濡潤宣通者由此使然也注之於脈少則澀充則實常以飲食日滋故能陽生陰長聚汁變化而赤為血也生化旺則諸經恃此而長養衰耗竭則百脈由此而虛可不謹養哉故曰血者神氣也持之則存失之則亡是知血盛則形盛血弱則形衰神靜則陰生形役則陽亢陽盛則陰必衰又何言陽旺則生陰血也蓋謂血氣之常陰從乎陽隨氣運行於內苟無陰以羈束則氣何以樹立故其致病也易調治也難以其比陽常虧而又損之則陽易亢陰易乏之論可以見矣內經有云陽道實陰道虛陰道常乏陽常有餘陰常不足以人之生也年至十四而經行至四十九而經斷可見陰血之難成易虧如此陰氣一傷所變之證妄行於上則吐衄衰涸於外則虛勞忘反於下則便紅積熱膀胱則癃閉溺血滲透腸間則為腸風陰虛陽搏則為崩中濕蒸熱瘀則為滯下熱極腐化則為膿血火極似水血色紫黑熱勝於陰發為瘡瘍濕滯於血則為痛癢癮疹皮膚則為冷痹蓄之在上則人喜忘蓄之在下則人害狂墮恐跌僕則瘀惡內凝若分部位身半以上同天之陽身半以下同地之陰此特舉其所顯之證者衄血下血有傷寒失於發散熱鬱所致成無己云傷寒衄者為邪氣不得發散壅盛於經逼迫於血則因致衄也蓄血在下焦結聚而不行蓄積而不散者是也血菀於上而吐血者謂之薄厥留於下而瘀者謂之蓄血此由太陽隨經瘀熱在裡血為熱所搏結而不行蓄於下焦之所致經曰太陽病七八日表證仍在脈微而沉反不結胸其人如狂者以熱在下焦少腹當硬滿小便自利者下血乃愈治法詳見傷寒蓄血條下陰結便血非傷寒之比邪在五臟則陰脈不和陰脈不和則血留之結陰之病陰氣內結不得外行無所稟滲入腸間故便血也外灸中脘三里氣海內服平胃地榆湯而愈脈候內經曰脈來如懸鉤為衄血常脈脈至而搏衄血身熱者死腸澼下膿血脈弦絶者死滑大者生血溫身熱者死脈經曰脈得諸澀濡弱為亡血脈來輕輕在肌肉尺中自浮目睛暈黃衄血未止太陽脈大而浮必衄吐血太陰脈芤主下血芤在左尺為小便血病人面無血色無寒熱脈沉弦者衄血脈浮弱手接之絶者下血煩咳者必吐血脈芤為失血澀為少血尺脈澀而疾為血虛脈弦而緊脅痛肝臟傷主有瘀血脈極虛芤遲為清穀亡血失精巢氏病源云寸口脈微而弱血氣俱虛則吐血關上脈微而芤亦吐血關下芤主下血脈沉細者生喘咳上氣脈數浮大者死虞氏云吐血唾血脈滑小弱者生實大者死唾血脈滑濡者生堅強者死治法血證當分上下各經理治凡血證上行或唾或咳或嘔或吐皆逆也若變而下行為惡痢順也上行為逆其治難下行為順其治易無病人忽然下痢其病進今病血證上行而復下行惡痢其邪欲去是知吉也局方發揮云口鼻出血皆為陰虛陽盛有升無降血隨氣上出上竅法當補陰抑陽降氣則血歸經血證雖有上下各經之不同同是熱證但以各經用藥為是嘔吐血出於胃也實者犀魚地黃湯衄血出於肺以犀角升麻梔子黃芩芍藥生地黃紫參丹參阿膠之類主之咯唾血者出於腎痰中帶出血絲是也以天門冬麥門冬貝母知母桔梗百部黃柏遠志熟地黃之類主之痰涎血者出於脾乾葛黃耆當歸芍藥黃連甘草沉香之類主之吐血覺胸中氣塞上吐紫血者桃仁承氣湯下之先吐紅後見痰嗽多是陰虛火動痰不下降四物湯為主兼以痰藥火藥大都吐痰火載血上錯經妄行炒梔子童便薑汁竹瀝溺血者因心腎氣結房勞致傷精氣腎脫陰虛火入膀胱腑而為溺血也有暴吐紫成塊者是熱傷血結於中吐出方好用四物湯加清熱藥調之大全良方四生丸治吐血亦治衄血炒山梔最能清胃脘之血童便二分酒一分擂側柏葉溫飲之大能止血瘀血者須用韭汁咳血者嗽出痰內有血是也屬心熱痰盛用栝蔞仁青黛貝母海石訶子山梔子為末薑汁蜜丸噙化嗽盛者加杏仁後以八物湯加減調理凡諸見血皆是陽盛陰虛君相二火亢甚煎逼其血而出諸竅也悉宜四物湯加知母黃柏補陰降火之劑為主衄吐咳血及痰中血絲皆是肺經火盛宜四物加薄酒芩茅花黃連犀角等藥以瀉肺火嘔血吐血此胃火也四物加石膏知母以瀉胃火唾血咯血及潮熱咳血此血從腎中來也四物加鹽酒炒梔柏更加肉桂一分以瀉腎火小便血出於溺竅中澀數盛淋作痛或雜尿而出者此膀胱火盛也四物加山梔仁瞿麥牛膝滑石之類以瀉膀胱之火如小便血出不痛者此心移熱於小腸故曰血從精竅中出也四物加條芩黃連山梔以瀉本經之火大便血先血後糞為近血來自大腸四物加槐花檳榔枳實條芩之類以瀉大腸之火先糞後血為遠血來自小腸四物加木通梔子黃連之類以瀉小腸之火血出於口鼻及瘀血者宜清之以犀角芩連之類消之以韭汁童便山茶花牡丹皮之類止之以茅花藕節棕櫚灰炒蒲黃之類血出於大便者清之以槐花柏葉條芩之類止之以地榆茅根荊芥白芷黑倍子白椿根皮之類詳見腸風下血門血出於小便清之以梔子麥門冬車前子瞿麥之類止之以大小薊棕灰之類詳見血淋門舌上無故出血如線用槐花炒為末摻之一方用蒲黃炒焦為末敷之極妙大便下血有熱有虛熱用四物加條芩梔子秦艽虛用四物加乾薑阿膠升麻便血有風邪下陷者蓋風傷肝肝主血故也宜升提之四物湯加防風荊芥升麻柴胡秦艽槐花條芩地榆枳殼之類下血傷濕熱者宜行濕消熱用蒼朮白朮黃連黃柏黃芩生地黃膏為丸服婦人經血諸證並見婦科心鏡大凡血證身熱脈大者難治身涼脈靜者易治王節齋云凡酒色過度損傷肺腎真陰咳嗽吐痰衄吐咳咯血等證誤服參耆等甘溫之藥則病日增世人不識往往服之致不救者多矣噫此亦一隅之説非天下之通論甫謂節齋議論多長而獨短於此何則諸失血證因為火盛妄行而不宜於甘溫理固然也其有虛火體氣弱甚者寧有不用參耆者乎葛可久治大吐血後用獨參湯一味服之所以治其虛也經云虛者補之是以臞仙集之以為十藥神書今之治勞怯吐血立有起死回生之效然則彼以獨參湯者何其神歟又如丹溪治一人年五十勞嗽吐血用人參黃耆白朮茯苓百合阿膠白芍藥桑白皮杏仁貝母栝蔞海石五味天門冬而愈又如局方人參飲專治胃弱吐血衄血之證然則彼皆非歟大抵用藥補瀉宜審人之虛實則無施而不當也何甘溫之必不可用哉藥方通治血劑四物湯為治血之總劑而不能治氣虛而不能生血者若脾胃虛而血不生當從仲景之補以人參氣分之藥陽旺則生陰血也此以四物血藥之性例之川芎血中氣藥也通治肝經性味辛散能行血滯於氣也地黃血中血藥也通腎經性味甘寒能生真陰之虛也當歸味辛甘血中之主藥隨佐使而各治其血分之病也如佐以川芎能行血滯於氣佐以地黃能生陰分之血佐以芍藥能使脾陰生血和腹痛芍藥陰分藥也性味酸寒通脾經調血脈治腹痛若四物者獨主血分受傷以氣不虛而用之輔佐之類如行血活血須桃仁紅花蘇木血竭牡丹皮茜草丹參醇酒之屬如止血治崩須百草霜棕櫚灰阿膠地榆藕節茅根黑墨之屬如和血止痛須乳香沒藥五靈脂凌霄花之屬補血養血須人參枸杞子肉蓯蓉牛膝益母草敗龜板之屬如治血燥須乳酪酥油蜂蜜阿膠之屬如涼血須黃連黃芩生地黃苦參之屬如血寒須附子乾薑肉桂鹿茸之屬此血藥之大法也然則各證又當以方類求之吐血諸劑葛氏十灰散治一切失血皆可止花蕊石散止血如神諸藥不能服此立效二方見癆瘵門拔萃犀魚地黃湯治一切失血血熱三焦熱血並治犀角磨汁生地黃各二錢黃連黃芩各一錢大黃三錢上水二盞煎一盞去渣入犀角汁和勻食後溫服生地黃飲子治諸見血無寒吐血衄血下血溺血皆屬熱生地黃熟地黃枸杞子地骨皮黃芩芍藥天門冬黃耆甘草各等分上咀每服七錢水二盞煎八分去渣食遠服如脈微身涼惡風者加桂五分吐血者多如此和劑必勝散治男婦血妄行流溢或吐或咳或衄並治小薊人參蒲黃炒熟地黃酒洗當歸烏梅川芎各一錢上咀作一服水二盞煎一盞不拘時服良方四生丸治吐血衄血陽乘於陰血熱妄行宜服此藥生薄荷葉生艾葉生側柏葉生地黃各等分上爛搗如雞子大丸每服一丸水二盞煎一盞濾去渣服濟生麥門冬湯治思慮傷心吐血衄血麥門冬天門冬遠志各去心甘草煮當歸白芍藥生地黃人參黃耆蛤粉炒阿膠藕節甘草炙各一錢上作二服每服水二盞薑一片煎一盞不拘時服三因茯苓補心湯治心氣虛耗不能藏血以致面色黃悴五心煩熱咳唾血及婦人妊娠惡阻嘔吐亦宜服之白茯苓人參前胡半夏制陳皮枳殼紫蘇白芍藥桔梗乾葛當歸熟地黃川芎甘草上等分每服五錢水三盞薑五片棗一枚煎一盞食前去渣服和劑龍腦雞蘇丸治咳嗽唾血衄血諸淋下血胃熱口臭肺熱喉腥消煩渴涼膈解酒毒除邪熱脾疸口甜膽疸口苦並治銀柴胡銀州者二兩和木通以湯半升浸二宿後取汁入膏生地黃六兩另為末人參黃耆各一兩麥門冬去心四兩阿膠炒蒲黃炒各二兩木通二兩同柴胡浸甘草炙兩半雞蘇薄荷葉一斤上除別研藥外並搗為末將好蜜二斤先煉一二沸然後下生地黃末不住手攪勻取木通銀柴胡汁慢火熬成膏勿令焦然後將其餘藥末同和為丸如豌豆大每服二十丸嚼碎熟水下虛寒煩熱消渴驚悸人參湯下咳嗽吐唾嘔血麥門冬湯下惟諸淋車前子湯下或茅花湯調百草霜末送下濟生大薊散治食啖辛物傷於肺經嘔吐出血名曰肺疽大薊根洗犀角銼升麻桑白皮炒蒲黃炒杏仁去皮尖甘草炙各一錢桔梗錢半上作一服水二盞薑五片煎一盞不拘時服藕汁飲治吐血衄血不止生藕汁生地黃汁大薊汁各三合生蜜一匙上和勻每服一杯不拘時雞蘇散治勞傷肺經唾內有血咽喉不利雞蘇黃耆生地黃阿膠貝母心不用白茅根各一兩桔梗麥門冬甘草炙各五錢上咀每服四錢水盞半薑三片煎七分食遠服救脈散治吐血虛羸脈虛而澀人參黃耆蜜炒當歸芍藥熟地黃蒼朮制各一錢陳皮升麻柴胡蘇木甘草炙各五分上水二盞煎八分食遠溫服拔萃麥門冬飲子治脾胃虛氣促氣弱精神短少衄血吐血麥門冬一錢五味子九粒人參黃耆各八分當歸芍藥紫菀各一錢甘草五分上水二盞煎一盞食後服黃芩芍藥湯治虛熱腹痛不能食衄吐血黃芩芍藥甘草各等分上水盞半煎八分溫服伏龍肝膏治吐血不止伏龍肝一兩為末入汁生地黃汁麥門冬汁小薊汁各三合上入白蜜一匙慢火熬成膏入龍肝調勻每服一匙噙咽五神湯治男婦熱毒上攻吐血不止生藕汁小薊汁生地黃汁各三盞生薑汁半盞白蜜一盞以上藥汁合煎二三沸每用一小盞調炒麵一錢食前服簡易是齋白朮散治積熱吐虛咳血若因飲酒過度負重傷胃而吐血者最宜服之忌濕面煎爆之物白朮一錢人參白茯苓黃耆山藥百合各六分甘草五分柴胡前胡各三分上水盞半薑三片棗一枚煎七分不拘時溫服河間黃連解毒湯三黃丸治積熱吐血咽膈不利二方並見火熱門直指側柏散治內損失血飲酒太過勞傷於內血氣妄行其血如湧泉口鼻皆流須臾不救服此而安又治男婦九竅出血人參荊芥穗燒灰各一兩側柏葉蒸乾一兩五錢上為末每服三錢入飛羅面三錢拌勻汲水調黏啜服團參丸治吐血咳嗽服涼藥不得者人參黃耆飛羅面各一兩上為細末滴水和丸如梧桐子大每服五十丸用茅根湯下栝蔞犀角湯治吐血酒客溫疫中熱乾嘔心煩者犀角鎊栝蔞蒲黃甘草各二兩葛根桑寄生各三兩上為粗未每服一兩水二盞煎一盞不拘時溫服天門冬丸治吐血咯血大能潤肺止嗽天門冬一兩貝母杏仁炒各七錢白茯苓阿膠甘草各半兩上為細末煉蜜丸梧桐子大每噙化一丸津咽下緑雲散治吐血柏葉百合人參阿膠炒成珠各二兩上為細末每服二錢不拘時糯米飲調下云雪散治吐血云雪即寒食麵蒲黃各一兩上俱生研勻每服二錢涼水調下聖惠雙荷散治卒暴吐血藕節七節荷葉頂七個上入蜜一匙擂細水二盞煎八分去渣溫服或為末蜜湯調下二錢效枇杷葉散治暑毒攻心嘔吐鮮血香薷二錢厚朴甘草麥門冬乾木瓜茅根各一錢枇杷葉陳皮丁香各五分上為末每服二錢薑水煎服二茸丸治吐血酒色過度紫菀茸鹿茸枇杷葉款冬花杏仁木通桑白皮各一兩大黃半兩上為末煉蜜為丸彈子大臨臥白湯嚼下地黃煎治吐血憂患絶傷胸膈疼痛及虛勞唾血上用生地黃五斤搗取汁於銀鍋內或沙鍋微火煎一二沸投白蜜一升再煎至三升每服半升日三服主胸痛百病久服佳一方治吐血不止用生蜜調和服之一方用生地黃汁一升生薑汁一合和勻溫服日用三四次一方治虛勞吐血生地黃五斤搗酒五升煮去渣服掌中金治吐血真蒲黃黃藥子各等分上為細末用生麻油調於手心內以舌舐之人參湯治吐血咯血後宜服人參一兩為細末五更時用雞蛋清調如稀糊一匙抄服若服參盡效每服二錢服訖卻臥松花散治吐血久不止松花一兩半生地黃鹿角膠薯蕷各一兩艾葉一錢茜草根白茯苓紫菀茸人參百合甘草炙各