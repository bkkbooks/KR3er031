body:
  text: 卷之八十一外科理例下腦疽腫痛未作膿者宜除濕消毒黃連消毒飲之類大痛或不痛或麻木者毒甚者隔蒜灸之更用解毒藥腫痛便秘者邪在內也宜泄之不甚痛或不作膿者虛也托裡為主不作膿及不潰俱宜托裡膿成而痛者針之更以托裡膿潰而多及不斂者大補氣血煩躁飲冷脈實而痛宜瀉火一人素不慎起居飲食腦焮赤腫痛尺脈洪數以黃連消毒散一劑濕熱頓除惟腫硬作痛以仙方活命飲二劑腫痛悉退但瘡頭不消投十宣去桂加金銀花藁本白朮茯苓陳皮以托裡排膿彼欲全消自制黃連解毒散二服反腫硬不膿仍用十宣加白朮陳皮茯苓腫少退仍去桂又四劑而膿成腫退繼以八珍湯加黃耆五味子麥門冬月餘膿潰而愈一人腦疽腫痛脈數以黃連消毒散二劑少退與仙方活命飲二劑而止再以當歸川芎芍藥金銀花黃柏知母而潰又以托裡藥而愈一人頭項俱痛雖大潰腫痛亦甚兼作瀉煩躁不睡飲食少思其勢可畏診其脈毒尚在與仙方活命飲二劑腫痛退半與二神丸及六君子湯加五味麥門冬酸棗仁四劑諸證少退食頗進睡少安及與參苓白朮散數服而食進又與十全大補湯加金銀花白芷桔梗月餘瘥一婦腦疽左腫痛左鼻出膿年餘不愈時或掉眩如坐舟車許叔微曰肝虛風邪襲之然也以川芎一兩當歸三錢羌活旋覆花細辛防風蔓荊子石膏藁本荊芥穗半夏曲乾葛生地黃甘草各半兩每服一兩姜水煎服一料而愈一人腦疽十餘日面目腫閉頭焮如斗脈洪數煩躁飲冷此膀胱濕熱所致用黃連消毒飲二劑次飲槐角酒二腕頓退以指按下腫則復起此膿已成於頸額肩頰各刺一孔膿並出口目始開更以托裡藥加金銀花連翹三十餘貼愈一人患腦疽勢劇脈實用黃連消毒散不應以金銀藤二兩水二鍾煎一鍾入酒半盞服之勢去三四再服漸退又加黃柏知母栝蔞當歸甘草節數劑而潰止加黃耆川芎白芷桔梗數劑愈一人腦疽其頭數多痛不可忍服消毒藥不應更以金銀花服之即鼾睡覺而勢去半再數劑而消一人膿將成微痛兼渴尺脈大而無力此陰虛火動之證彼謂心經熱毒自服清涼降火藥愈熾復求治乃以四物湯中加知柏五味子麥門冬黃耆及加減八味丸渴止瘡潰更以托裡藥兼前丸而愈一婦年將七十形實性急好酒腦疽作才五日脈緊急又澀急用大黃酒煨細切酒拌炒為末又酒拌人參炒入姜煎調一錢服過兩時再與得臥而上半身汗睡覺病已失此亦內托之意杜碧清亦明醫也自病腦疽療之不愈丹溪往視之曰何不服防風通聖散曰已服數劑丹溪曰合以酒製之碧清乃自悟以為不及鬢疽焮痛發寒熱或拘急者發散表邪不作膿或膿成不潰者並宜托裡作膿焮痛者托裡消毒膿已成作痛者速針之潰而不斂或流清漿者宜峻補一人患鬢疽焮痛作腫發熱以小柴胡湯加連翹金銀花桔梗四劑而愈一人因怒後鬢際腫痛發熱以小柴胡湯加連翹金銀花天花粉四劑根盤俱消惟瘡頭作痛以仙方活命飲二劑痛止膿熟針之更以托裡消毒藥愈一老人患此腫痛發熱膿清作渴脈濡而澀此氣血俱虛也欲補之彼見作渴發熱乃服降火之劑果作嘔少食復求治以六君子湯四劑嘔止食進仍用補藥月餘愈一人膿成焮痛發嘔少食以仙方活命飲一劑而止以六君子加當歸桔梗皂角刺潰而愈一人嗜酒與爆炙年五十餘夏初左絲竹空穴努出一角長短大小如雞距而稍堅予曰此少陽所過氣多血少未易治也須斷肉味先解其食毒針灸以開泄其壅滯彼不聽以大黃朴硝片腦等冷藥盦之一夕豁開如醬蚶徑三寸二日後蚶子濺血高數寸而死因冷外逼氣鬱而得發宜其發之暴也如此一人腫痛寒熱拘急脈浮數以荊防敗毒散二劑表證悉退更以托裡消毒散潰之而安一人焮腫痛甚發寒熱服十宣散愈熾診之脈數而實此表裡俱有邪也以荊防敗毒散加芩連大黃二劑少愈更以荊防敗毒散四劑而消脅疽一人年五十腋下患毒瘡口不合右關脈數而渴此胃火也用竹葉黃耆湯而止再用補氣藥而愈嘗治午後發熱作渴用地骨皮散效一婦因忿鬱脅下結一核二十餘年因怒加腫痛完穀不化飲食少思此腸胃虛也以六君子加砂仁肉桂乾薑肉豆蔻泄雖止而膿清瘡口不合用十全大補湯月餘愈一人年四十夏月腋下患毒潰後不斂膿出清稀皮寒脈弱腸鳴切痛大便溏泄食下即嘔此寒變而陷也宜大辛溫之劑遂以托裡溫中湯一二帖諸證悉退更以六君子加炮乾薑肉桂數劑再以十全大補湯愈一人脅下一塊日久不潰按之微痛脈微而澀此形證俱虛也經曰形氣不足病氣不足當補不當瀉宜用人參養榮湯彼不信乃服流氣飲虛證悉至方服前方月餘少愈但腫尚硬以艾葉炒熱熨患處至十日膿成以火針刺之更灸豆豉餅又服十全大補湯百帖而安一人困勞發熱脅下腫痛脈雖大按之無力此氣虛腠理不密邪氣襲於肉裡而然也當補之以接虛怯之氣以補中益氣湯加羌活四劑少可去羌活又百劑而愈胸瘍一人四十胸患瘡成漏日出膿碗許喜飲食如常用十全大補湯加遠志貝母白斂續斷灸以附子餅膿漸少調護歲余愈一人胸腫一塊半載不消令灸百壯方潰服大補藥不斂灸附子餅而愈一婦性剛多怒胸前作痛肉色不變脈數惡寒經曰洪數脈應發熱反惡寒瘡疽也今脈洪數則膿已成但體豐厚故色不變似乎無膿以痛極始肯針入數寸膿數碗以清肝消毒藥治之愈一少婦胸膺間潰一竅膿血與口中所咳相應而出以參耆當歸加退熱排膿等藥愈背疽凡背疽焮痛或不痛及麻木者邪氣盛也隔蒜灸之痛者灸至不痛不痛者灸至痛毒隨火而散若不痛者須明灸之或用黃連解毒散之類頭痛拘急乃表證用人參敗毒散一二劑服之如焮痛用金銀花散或槐花酒神效托裡散焮痛腫硬脈實者以清涼飲仙方活命飲苦參丸腫硬木悶疼痛發熱煩躁飲冷便秘脈沉實者內疏黃連湯或清涼飲子大便以利欲得作膿用仙方活命飲托裡散蠟礬丸外用神異膏飲食少思用六君子湯加藿香連進三五劑更用雄黃解毒散洗患處每日用烏金膏塗瘡口處候有瘡口即用紙作捻蘸烏金膏紝入瘡內苦有膿為脂膜間隔不出而作脹痛者宜用針引之腐肉堵塞者去之若瘀肉腐動用豬蹄湯洗如膿稠或痛飲食如常瘀肉自腐用消毒與托裡藥相兼服之仍用前二膏塗貼若腐肉已離好肉宜速去之亦用托裡藥若瘀肉不腐或膿清稀不焮痛者急服大補之劑亦用桑柴灸之以補接陽氣解散郁毒大抵氣血壯實或毒輕少者可假藥力或自腐潰怯弱之人熱毒中膈內外不通不行針灸藥無全功然此證若膿已成宜急開之否則重者潰通臟腑腐爛筋骨輕者延潰良肉難於收功因而不斂者多矣一人患此痛甚服消毒藥愈熾以隔蒜灸而止與仙方活命飲二劑頓退以托裡藥潰而愈一人年五十患背疽四五日焮腫大痛赤暈尺余重如負石勢熾當峻攻察其脈又不宜遂先砭赤處出黑血碗許腫痛背重皆去更敷神效散及仙方活命飲二劑瘡口及砭處出黑水而消一人焮腫作痛脈浮數與內托復煎散二劑少退與仙方活命飲四劑痛止而潰再用托裡藥愈一人毒勢熾甚痛不可忍諸藥不應以仙方活命飲二劑諸證悉退又二劑而潰以金銀花散六劑而愈一人厚味氣鬱形實性重年近六十患背疽醫與托藥皆不行惟飲香附末甚快自腫至潰始終只此一味而安此體實而病又實蓋千百而一見也每思香附經不言補惟不老湯乃言有益於老人用片子薑黃甘草香附三味以不老為名且引鐵甕先生與劉君為證夫豈無其故哉蓋於行中有補之理耳天之所以為天健而有常因其不息所以生生無窮正如茺蔚活血行氣有補陰之妙故名益母胎產所恃者氣血也胎前無滯產後無虛以其行中有補也夏枯草治瘰癧亦然此因情性而治也通府患發背十餘日勢危脈大先飲槐花酒二服其勢退再飲敗毒散二劑更飲托裡藥數劑漸潰又用桑柴燃灸患處每日灸良久仍貼膏藥灸至數次膿潰腐脫以托裡散加白朮陳皮月餘而愈一侍御髀胛患毒痛甚服消毒藥不減飲槐花酒一服勢隨退再用托裡消毒藥愈一人患發背甚危取金銀藤五六兩搗爛入熱酒一鍾絞取汁溫服渣罨患處四五服而平彼用此藥治瘡足以養身成家蓋金銀花瘡科聖藥不論已成未成並有回生之功一老人年七十背疽尺余雜服五香湯十宣散數十貼膿血腥穢嘔逆不食旬余病人自言十宣散服之膈中不安且素有淋病三十年今苦淋痛嘔逆及不得睡而已急煎參耆當歸膏以牛膝湯入竹瀝調化與之三日盡藥斤半淋止思食七日盡藥四斤膿自湧出得睡兼旬而安時六七月也一叟六十餘好酒肉背疽見膿嘔逆發熱用十宣散已多醫以嘔逆投嘉禾散加丁香時七月大熱脈洪數有力予曰脈證在潰瘍尤忌然形氣尚可為只與獨參湯加竹瀝藥盡十五六斤竹百竿而安予曰此幸耳不薄味恐再發後因夏月醉坐池中左脅旁生軟塊如餅二年後潰為疽自見脈證如前仍服參耆竹瀝而安一婦發背用托裡消毒藥二十餘劑而潰因怒頓吐血五六碗氣弱脈細此氣血虛極也令服獨參膏斤許少緩更以參耆歸朮陳皮炙甘草三十劑瘡口漸合若投犀角地寒涼之藥其誤也鮮矣一人背瘡如碗大潰見五臟僅隔膜耳自謂必死精要取大鯽魚一枚去腸臟以羯羊糞填實煨令焦黑極燥為末干糝之瘡口遂合累用有效須膿少欲生肌時用之一人年四十發背心脈洪數勢危劇經曰痛癢瘡瘍皆屬心火脈洪數乃心火熾甚心主血心氣滯則血不流故生癰也其竹馬灸其穴是心脈所遊之地急用隔蒜灸以瀉心火拔其毒再用托裡消毒愈一人發背瘡頭甚多腫硬色紫不甚痛不腐潰以艾鋪患處灸之更用大補藥數日死肉脫去而愈一人忽噁心大椎骨甚癢須臾臂不能舉神思甚倦此謂天疽危病也隔蒜灸癢愈甚乃明炙著肉灸也五十壯癢止旬日愈精要云灸有回生之功信矣一人背毒焮痛發熱飲冷多汗便秘譫語以破棺丹二丸而寧再以金銀花四劑而膿成開之更用托裡散愈一太監發背腫痛色紫脈息沉數良甫曰脈數發熱而痛者發於陽也且瘡瘍赤甚則紫火極似水也詢知常服透骨丹半載乃積溫成熱所致遂以內疏黃連湯再服稍半更用排膿消毒藥及豬蹄湯太乙膏而愈腰疽一人年十九腰間腫一塊無頭不痛色不變三月不潰飲食少思肌肉日瘦此氣搏腠理榮衛不行鬱而為腫名曰濕毒流注元戎曰若人飲食疏精神衰氣血弱肌肉消瘦榮衛之氣短促而滯故寒搏腠理閉郁為癰者當補以接虛怯之氣以十全大補湯加香附陳皮三十劑始針出白膿二碗許仍用藥倍加參耆仍灸以豆豉餅漸愈彼惑於連效內服敗毒外貼涼藥反至食少膿清患處色紫復求治喜得氣冷衰仍以前藥加遠志貝母白斂百劑而愈此或久而不愈或膿水清稀當服內塞散及附子餅然後可愈一人年四十患腰疼服流氣飲寄生湯不應以熱手熨之少可其脈沉弦腎虛所致服補腎丸愈一人年二十遍身微痛腰間作腫痛甚以補中益氣湯加羌活四劑少可又去羌活十餘劑而愈臀癰一人臀癰腫硬作痛尺脈浮緊按之無力以內托羌活湯一劑痛止再以金銀花散四劑膿潰而愈一人臀癰腫硬痛甚隔蒜灸之更服仙方活命飲二劑痛止腫消以托裡消毒散加黃柏蒼朮羌活瘡潰而愈一人臀癰不作膿飲食少思先以六君子湯加芎歸黃耆飲食漸進更以托裡散膿潰而愈一人腿癰內潰針之膿出五碗許惡寒畏食脈診如絲此陽氣微也以四君子加炮附子畏寒少止又四劑而安以六君子加桂數劑飲食頗進乃以十全大補及灸附子餅兩月愈一婦腿疽久而不愈瘡口紫陷膿水清稀予謂為虛彼不信乃服攻毒之劑虛證蜂起復求治灸以附子餅服十全大補湯百貼而愈一人腿根近環跳穴痛徹骨外皮如故脈數帶滑此附骨疽膿將成用托裡藥六劑腫起作痛脈滑數膿已成針之膿出碗許再加補劑月餘痊一人腿兼筋攣骨痛脈弦緊以大防風湯六劑筋攣少愈又二劑而腫消但內一處尚作痛脈不弦緊此寒邪已去乃所滯瘀濁之物欲作膿故痛不止用托裡藥數劑腫起脈滑乃膿已成針之用十全大補湯月餘而安一人右腿赤腫焮痛脈沉數用當歸拈痛湯四肢反痛乃濕熱壅遏又沉下部藥力難達非藥不對證遂砭患處去毒血仍用前藥一劑頓減又四劑而消一人先腿痛後又四肢皆痛遊走不定至夜益甚服除濕敗毒之劑不應脈滑而數濕痰濁血為患以二陳湯加蒼朮羌活桃仁紅花牛膝草烏治之而愈凡濕痰濕熱或死血流注關節非辛溫之劑開發腠理流通隧道使氣行血和安能得愈一人腿痛每痛則痰盛或作嘈雜脈滑而數以二陳湯加升麻二朮澤瀉羌活南星治之而安一人素有腳氣脅下作痛發熱頭暈嘔吐腿痹不仁服消毒護心等藥不應左關脈緊右關脈弦此亦腳氣也以半夏左經湯治之愈一人腳軟腫痛發熱飲冷大小便秘右關脈數乃足陽明經濕熱下注也以大黃左經湯治之愈一人兩腿腫痛脈滑而緩此濕所致先以五苓散加蒼朮黃柏二劑少愈再以二陳二朮檳榔紫蘇羌活獨活牛膝黃柏而瘥一人肢節腫痛脈細而數此濕熱之證以荊防敗毒散加麻黃二劑痛減半以檳榔敗毒散四劑腫消更以四物湯加二朮牛膝木瓜數劑而愈一婦兩腿痛脈澀而數此血虛兼濕熱先以蒼朮黃柏知母龍膽草茯苓防風防己羌活數劑腫痛漸愈又以四物加二朮黃柏牛膝木瓜月餘而愈一婦患腿不能伸屈遇風寒痛益甚諸藥不應甚苦先以活絡丹一丸頓退又服而瘳次年復痛仍服一丸亦退大半更以獨活寄生湯四劑愈一婦腿痛兼足脛攣痛服發散藥愈甚脈弦緊此腎肝虛弱風濕內侵也治以獨活寄生湯痛止更以神應養真丹而不攣矣一人腿癰膿成針之出膿二碗許以托裡藥一劑大發熱更用聖愈湯二劑而止翌日惡寒不食脈細如絲以人參一兩熟附三片薑棗煎服而愈但少食不寐更以內補黃耆湯而平一人腿痛發熱惡寒以補中益氣湯治之彼以為緩自服芩連等藥熱愈甚治以人參養榮湯二十劑而潰更以參耆歸朮炙甘草肉桂月餘斂夫火之為病當分虛實芩連苦寒能泄心肺有餘之火若先弱或飲食勞倦而發者此為不足當治以甘溫之劑未嘗有實熱而畏寒虛熱而喜寒者此其驗也一人年二十腿膝腫痛不能屈伸服托裡散不應以人參敗毒散加檳榔木瓜柴胡紫蘇蒼朮黃柏而愈一人五十歲兩腿痛脹或生㾦㿔小便頻而少聲如甕出服五皮散不應診右關沉緩此脾虛濕氣流注而然也非其瘡經曰諸濕腫滿皆屬脾土按之不起皆屬於濕以五苓散加木香倍二術亦不應予意至陰之地關節之間濕氣滯凝且水性下流脾氣既虛安能運散非辛溫之藥開通胰理行經活血邪氣安能發散遂以五積散二劑病減半更以六君子加木香升麻柴胡薏苡仁兩月而愈設使前藥不應更投峻劑虛虛之禍豈能免乎一僧股內患腫一塊不痛不潰以托裡二十餘劑膿成刺之作痛凡腫而潰潰而反痛此血氣虛甚也宜峻補之彼雲氣無補法予曰正氣不足不可不補補之則氣化而痛自除遂以參耆歸朮熟地治之兩月而愈一人年逾四十夏患附骨癰予以火針刺去瘀血更服托裡藥而愈至秋忽不飲食痰氣壅盛勞即口舌生瘡服寒藥腹痛彼疑為瘡脾胃脈輕取似大按之無力此真氣不足虛火炎上也治以八味丸彼不信自服二陳四物幾殆復請治仍以前丸而愈一老人年七十三月間因寒濕地氣得附骨疽於左腿足少陽分微侵足陽明闊六七寸長一尺堅硬漫腫肉色不變皮澤深但行步作痛以指接至骨大痛用內托黃耆湯一服立止再服愈內托黃耆湯黃耆當歸各三錢柴胡鼠黏子連翹各一錢黃柏肉桂甘草各五分升麻七分上咀水一盞酒一盞共煎一盞空心溫服少時以早饍壓之不令大熱上攻犯上中二焦也一人環跳穴息附骨疽彼謂小瘡服敗毒藥外以寒藥敷貼因痛極針之膿瘀血大泄方知為癰其脈右關浮大此胃氣已傷故瘡口開張肉紫下陷捫之不熱彼謂瘡內更覺微冷自謂必成漏矣灸以豆豉餅服六君子湯加藿香砂仁炮姜數劑胃氣漸醒飲食漸進患處漸暖肌肉漸生再以十全大補湯而愈一人腿痛筋攣遍身痠軟方士與痰藥及托裡藥期三日可愈並不應予謂非瘡毒也大筋經短小筋弛長此濕熱為患以人參敗毒散加蒼朮黃柏檳榔木瓜少愈更以清燥湯二十帖愈脫疽凡丁腫生於手足指或足潰而自脫故名脫疽有發於手指者名曰蛀節丁重者腐去本節輕者筋攣焮痛或不痛者急用隔蒜灸更用解毒藥若色黑急刮去速服補劑庶可灸黑延上者不治焮痛者除濕攻毒隔蒜灸至不痛色赤焮痛者托裡消毒更兼灸作渴者滋陰降火色黑者不治一人足指患毒焮痛色赤發熱隔蒜灸之更以人參敗毒散去桔梗加金銀花白芷大黃二劑痛止又十宣散去桔梗官桂加天花粉金銀花數劑愈一人年四十左足大指赤腫焮痛此脾經積毒下注而然名曰脫疽喜色赤而腫以人參敗毒散去人參桔梗加金銀花白芷大黃二劑更以栝蔞金銀花甘草節四劑頓退再以十宣散去桔梗加金銀花防己數劑愈一膏粱之人年五十患足疽色紫黑腳焮痛孫真人云脫疽之證急斬之若毒延入腹必不治色黑不痛亦不治喜其飲食如故動息自寧為瘡善證遂以連翹敗毒六劑更以金銀花栝蔞甘草節二十餘劑患指潰脫更以川芎當歸生地連翹金銀花白芷二十劑而愈次年忽發渴服生津藥愈甚用八味丸而止一蒭蕘左足指患一泡麻木色赤次日指黑五日連足黑冷不知疼痛脈沉細此脾胃受毒所致與飛龍奪命丹一服翌日令割去死黑肉割後始痛可救治以十全大補湯而愈楊梅瘡此瘡乃濕熱邪所成亦瘡之最惡者要看表裡虛實先鬚髮散攻去其邪毒次用調和血氣庶無再作之患瘡形高突而似楊梅故名其名北方名天疱瘡非也表實者宜先解表荊防敗毒散濕勝者宜先導濕羌活蒼朮勝濕湯五苓散裡實者宜先疏里內疏黃連湯表裡俱實宜解表攻裡防風通聖散始然治之須量人虛實用藥輕重解攻之後再調氣血滋補元氣要忌厚味凡此瘡服輕粉水銀等藥反收毒於內以致迭發屢服防風通聖散及敗毒之劑則氣血愈虛而並壞者多矣秘方仙遺糧湯治一切楊梅瘡不拘始終虛實並可取效仙遺糧二兩一名土茯苓一名冷飯糰用鮮者去土淨洗入木石臼捶碎水三碗煎二碗去渣再入下項藥當歸生地黃防風各八分金銀花一錢皂角刺六分黃連連翹各一錢甘草四分木通薏苡仁各八分白朮白蘚皮各七分上咀作一服用遺糧湯二碗煎一碗加燈心二十根煎食遠服捷法治楊梅瘡不論新入及癰毒鵝掌風並效不過旬日而愈伏龍肝二錢水銀一錢枯礬三分白蘚皮七分百草霜一分上為極細末用香油少許調研如膏以水銀不見星為度於無風處將膏少許塗於手足心互相擦磨盡又塗又擦以藥盡為度擦完卻吃熱蔥羹一二碗助汗以綿被重覆出汗汗後卻服解毒散一劑或服內疏黃連湯三日一作為之九日連三次十二日之後漸愈再不必作愈遲再以五日一作並汗愈後可服萆薢八珍湯有熱加芩連薰法雄黃三分銀硃一錢沒藥三分硃砂五分官香一錢棗肉二枚研爛入藥上前五味研為細末以棗肉同研搓作小條用皮紙卷定香油燈盞點火熏置被中口含水陰囊以布裹之不可著煙間日一次盡藥三條愈仍要服三黃解毒湯楊梅癰漏不問年深者並效土萆薢五兩金銀花一兩皂角刺花椒牛蒡子鬱金當歸各半兩黑鉛化三兩入水銀半兩上咀作五帖以鉛乘熱擂成粉分作五處前藥每帖水二盞蔥一根煎一盞去渣再入鉛粉煎至八分食遠服鉛粉用水出收起蓋楊梅癰漏多因服輕粉積毒而成此以水銀黑鉛花椒仍復收引輕粉之毒蓋從類而出也每以五帖為一料初服一帖要取汗先以金銀花一兩防風半兩花椒半兩煎水二斗用席圍住不透風先熏後洗出汗無金銀花有忍冬藤葉更妙二三十年患此只用四料四汗無不全愈忌牛肉燒酒妙方世人珍秘不傳予得之治人一一獲效故詳載以公於天下共起沉疴而廣濟人也萬氏治楊梅瘡筋骨疼痛久不愈者立效土茯苓一兩花椒二錢槐子炒焦二錢魚膘三錢頃炒成珠麻黃茜草細茶各一錢烏藥乳香各一錢水二盞姜三片蔥三根煎一盞通口服甚者數劑愈便毒補遺方為肝經積熱及房勞所成初起者須用龍膽瀉肝湯加大黃朴硝之屬大下之以瀉其毒滯再以敗毒散調理庶無後患神效便毒方治便毒初起者只一帖可消當歸尾二錢甘草節五分木鱉子二個穿山甲一錢炒黃皂角刺五分直殭蠶一錢蜈蚣一條炙去頭足為末調入湯中上酒水各一盞煎至一盞以大黃末三錢朴硝二錢蜈蚣末三味置盞內將熱藥衝入和勻通口空心服用蔥湯漱口再吃蔥湯尤妙辰時服藥巳時必瀉下膿血惡物走十數次方效再服和中解毒湯二帖下疳瘡補遺方病機與便毒所致相同內服亦須龍膽瀉肝湯數帖方可用外藥雞內金一錢輕粉五分冰片三釐綠豆五分上為極細末先用茶鹽洗瘡口拭乾上藥一日二次愈胡黃連散治疳瘡極效胡黃連一錢五倍子五分孩兒茶二分麝二釐上為極細末先洗後上藥天疱瘡北方名薄皮瘡此病多濕熱為源屬表者多脈浮發熱拘急者要發散用荊防敗毒散脈沉二便秘澀者解表兼攻其里防風通聖散碧玉散敷天疱瘡神效青靛黃柏末各二錢滑石末二錢上二味以青靛調如泥用皂角針挑去泡水次敷藥黃金散敷前瘡大黃一兩為末海金砂半兩二味用新汲水調塗瘡上大連翹湯金銀花散並可服量病與之腸癰證此證皆因榮衛不調或瘀血停滯所致若小腹軟痛脈洪數者膿已成也宜托之若小腹硬痛脈遲緊者瘀血也宜下之若患甚者腹脹大轉側作水聲或膿從臍出或從大便出宜蠟礬丸太乙膏及托裡之藥排膿托裡散治腹脹脈數滑或後重下膿薏苡仁湯治腸癰小便不利而腹痛二方見上卷四物玄胡湯治瘀血腸癰當歸一錢川芎芍藥生地黃各一分玄胡索一錢桃仁紅花牛膝各七分上咀作一服煎空心服大便秘結者加大黃石癰凡癰堅硬如石久不作膿是也商陸根爛搗敷上干則易鮮者數易而愈漆瘡因染漆毒而生者只用香油調鐵鏽塗之胃氣盛者內服黃連解毒湯胃氣弱或作嘔飲食少由中氣虛而漆毒侵犯也可用六君子湯加砂仁藿香酒炒芍藥煎服臁瘡神效膏先看瘡大小用綿紙裁成四方塊十二張四角用小紙捻釘住聽用再以好香油二兩銅杓文武火熬下花椒四十九粒煎黑取起次下槐枝一寸長者四十九節煎焦黑取起次下黃蠟一兩輕粉二分枯礬一分溶清卻下前紙浸油內令透不可使焦取起聽用貼時先將槐枝蔥椒煎湯洗瘡令透拭乾將膏紙貼上外面再以油單紙掩護以綿帛縛定一日取下揭去近瘡一張復將煎湯洗淨貼上盡十二張無不愈者又方治臁瘡至簡而效速陳小粉芝麻炒研細茶研細末三味以香油調紙貼上外用油紙掩縛一日一換藥多以瓷罐封貯勿令泄氣隔紙膏治臁瘡神效黃耆末半兩輕粉乳香沒藥各一錢血竭五分銀硃一錢銅綠二分上為細末真香油調成膏攤油紙上再用油單紙一層以布針刺孔數個掩膏藥上貼之一日一易疥瘡有膿窠者屬熱乾疥枯槁者有風兼服疏風涼風藥碎而癢甚者有蟲宜先汗之次擦一掃光一掃光治疥搽上即愈硫黃二錢雄黃一錢水銀二錢花椒五分大風子肉一錢蛇床子枯礬各五分信一分潮腦三分檳榔五分上為細末用柏油調擦瘡上時刻愈瀝油法治諸般疥癩等瘡神效松節黑芝麻黑豆綿花子大風子花椒柏子槐條桃條柳條桑條各切片蛇床子草烏鴿糞臘豬油硫黃外加明礬外加人言外加水銀外加前藥如法入缸內作土坑燒油滴下再入外四味調搽諸瘡苦參散治一切膿疥濕熱瘡瘍苦參為細末檳榔末各等分濕瘡干搽乾疥柏子油搽上諸方論論柞木飲子丹溪曰荷蒂去惡血萱根下水解毒利胞膈柞木有芒刺能驅逐邪氣地榆主下焦血病輕小證候或可以為防托柞木飲子治瘡瘍未成者自消潰者自斂干柞木葉四兩半乾荷葉心蒂干萱草根甘草節地榆各一兩上咀每服半兩水二盞煎一盞早晚各一服論阿膠飲子丹溪曰阿膠牛膠屬金屬土補肺氣實大腸壯胃止瀉黃蠟丸以蠟味甘淡實大陽補而難化國老膏以甘草化毒行經遠志酒忍冬酒皆用之補性歸心歸血用之頗切善用者以之配入腫瘍之散結潰瘍之補虛亦奏捷效精要阿膠飲子明阿膠炒成珠粉草各一兩橘紅半兩上咀作三服每服水一盞煎七分溫服牛膠飲截癰疽惡瘡外塗患處內服之使毒氣不攻於內牛皮膠四兩用好酒一碗入膠內重湯煮溶透攪勻傾出更浸酒隨意飲能飲者少醉為度此法活人甚多論六味車螯散丹溪曰車螯散一以輕粉為佐一以燈心為佐其散毒消腫下積安穩詳輕重大小證候亦可仗之精要車螯散本草云車螯大蛤也一名蜃性冷無毒能攻諸瘡腫毒車螯四個黃泥固濟火煅赤出火毒一宿栝蔞一兩去殼瓦上炒香燈心三十根甘草節二錢上將瓜蔞燈心甘草為粗末作一服酒二盞煎一盞去渣入蜜一大匙和勻調車蝥末二錢膩粉少許空心溫服取下惡物又方車熬一兩制如前生甘草半兩輕粉五分為細末每服四錢濃煎栝蔞酒調下五更服下惡物為度未下再服效論加味十全湯凡治癰疽後補血氣進飲食實為切要蓋膿血出多陰陽兩虛此藥可以回生起死惜其不分經絡時令須在識者觸而長之今醫以腫平痛寬遂以為安漫不加省往往於結痂後兩三月或半年虛證乃見醫者不察而加補養之功因而轉成他病者多矣一人因腳弱詳見後條論五香湯精要云大法癰疽不可舍五香湯丹溪曰吾不知良甫之時有許多大府秘堅病氣鬱塞若是之頑厚可以驟散而大下者耶亦當開陳時之先後證之可否庶乎後人不敢猛浪殺人殊不知些小寒熱或者由其氣血不和而然便以為外感而行表散害人最速論防風通聖散此表裡氣血藥也治一切風毒積熱瘡腫脈候弦洪實數浮緊氣血盛實者不可缺此丹溪曰秘傳以此方加人參黃耆蒼朮赤茯苓金銀花名消腫托裡散雖以參耆為主復云人參無亦可則又不能無疑而難用也且臨症加減須較表裡如表證多者當從此方以辛甘為主散之也里證多者須當從變論大黃精要云大黃宣熱散毒治癰疽要藥癰疽始作皆須大黃等湯亟轉利之排日不廢又曰瘡疽泄利皆是惡候丹溪曰此皆不能使人無疑借曰用大黃恐因大府秘而病體實有積熱沉固者發也止可破結導滯推令轉動而已豈可謂亟轉利之而且排日不廢耶若下利之後又與利藥恐非防微杜漸之意瘡之始作腫在肌肉若非大滿大堅實之證自當行仲景發表之法借五香湯為例散之於外可也何必遽用峻下之藥奪其里哉或曰癰疽用大黃走泄以去毒孫真人常言之良甫祖述其說耳曰孫以盛名行奇術於公卿間者良甫宋人若其交遊亦皆公卿免猛浪之過乎況有心勞而虛者憂怒而虛者強力勞動而虛者大醉飽而虛者皆氣少而澀血少而濁生疽固是難治若大府秘而稍安谷甘淡薄而守戒律猶為可治不免尚費調補苟因旬日半月大府秘實不知亦有其氣不降而然者便以為實而行大黃豈不殺人論白蠟白蠟稟收斂堅凝之氣外科要藥生肌止痛接骨續筋補虛用合歡樹皮同入長肉膏有神效但未試其可服否合歡皮常服之驗論蓖麻子附皂角刺神異膏麥飯石膏蓖麻子性善攻能追膿取毒亦要藥也皂角治癰疽已破未破能贊引至潰處神異膏一說膏藥方甚多神效無出於此麥飯石膏膿潰後圍瘡口一說內冷惡寒不宜用論流氣飲十宣散夫氣血凝滯多因榮衛之氣弱不能運散豈可復用流氣飲以益其虛況各經氣血多少不同心胞絡膀胱小腸肝經多血少氣三焦膽腎心脾肺少血多氣人年四十以上陰血日衰若於血少經分而病癰腫或脈證不足當以補接為主丹溪曰腫瘍內外皆壅宜托裡散為主乃補氣血藥而加之以行散之劑非專攻之謂也或者腫焮痛甚煩躁脈大其辛熱之劑不但腫瘍不可用雖潰瘍亦不可用也凡患者須分經絡血氣地部遠近年歲老幼稟氣虛實及七情所感時令所宜而治之嘗見以流氣十宣散二藥概治結腫之症以致取敗者多矣大抵症有主末治有權宜治其主則末病自退用其權則不拘於時泥於守常必致病勢危甚況雜用攻劑動擾各經故丹溪云凡瘡發於一經只當求責本經不可干擾余經是也論販毒流氣飲凡治瘡瘍不審元氣虛實病在表裡便服敗毒流氣飲等藥蓋敗毒散發表藥也果有表證止宜一二服多則元氣損毒愈盛雖有人參亦莫能補流氣飲耗血藥也果氣結胸滿只宜二三服多則血反致敗雖有芎歸亦難倚仗丹溪曰此不繫膏粱丹毒之變因虛勞氣鬱所致也外科附方十宣散治瘡瘍脈緩澀身倦怠惡寒或脈弦緊細皆宜用之散風寒助陽氣也人參當歸酒洗各八分黃耆鹽水拌炒一錢甘草白芷各五分川芎桔梗炒各一錢厚朴姜炒六分防風肉桂各三分水二盞煎八分服防風通聖散治一切風熱積毒瘡發熱便秘表裡俱實者防風芍藥滑石川芎當歸酒洗桔梗石膏荊芥麻黃各四分薄荷大黃芒硝白朮炒連翹山梔甘草炙黃芩炒各五分上咀水二盞煎八分服荊防敗毒散治一切瘡瘍時毒腫痛發熱左手脈浮數荊芥防風人參羌活獨活前胡柴胡桔梗枳殼茯苓川芎甘草各一錢即人參敗毒散加荊芥防風水二鍾煎八分食後服黃連解毒湯治積熱瘡瘍焮腫作痛煩躁飲冷脈洪數或口舌生瘡或疫毒發狂黃芩黃柏黃連炒山梔各錢半上水二盞煎八分稍熱服內疏黃連湯一名黃連內疏湯治瘡瘍腫硬發熱作嘔大便秘澀煩躁飲冷嘔逆心煩脈沉實此邪在臟也急服此以內疏之使邪不得犯經絡黃連梔子當歸酒洗芍藥木香檳榔黃芩薄荷桔梗連翹大黃甘草各錢上水一盞煎八分食前服散腫潰堅丸知母酒炒黃柏酒炒昆布桔梗各半兩天花粉酒洗廣朮三稜酒炒連翹各三錢升麻六分白芍藥黃連葛根各一錢草龍膽四錢酒浸炒黃芩梢錢半一半生上為末蜜丸梧桐子大每服五十丸白湯送下神效栝蔞散治乳癰毒已成化膿為水未成即消治乳之方雖多獨此神效瘰癧尤妙栝蔞大者二個連殼杵當歸甘草各半兩沒藥另研乳香另研各一錢上作二服用酒三碗煎二碗分三次服更以渣罨患處一切癰疽腫毒便毒並效如數服不消不痛兼服補氣血之藥蠟礬丸治一切癰疽托裡止痛護臟腑神效不問老幼皆可服明礬一兩為末真黃蠟七錢溶化離火入礬末眾手急丸梧桐子大每服十丸漸加至二十丸熱水或溫酒下日二服一法以蠟水煮用匙挑浮水上者和礬末軟則易丸人參敗毒散治一切瘡瘍焮痛發寒熱或拘急頭疼脈數有力人參羌活獨活前胡柴胡桔梗枳殼茯苓川芎甘草各等分上水二盞煎八分食遠服五香連翹湯治諸瘡初覺一二日便厥逆咽喉塞發寒熱沉香木香麝香連翹射干升麻丁香獨活甘草炙桑寄生各一錢大黃便秘者加之黃耆木通乳香各錢半每服五錢水一盞煎八分取利黃連敗毒散治癰疽腫盛外感焮痛或麻木服此更宜蒜灸黃連酒拌羌活獨活黃柏酒炒生地黃酒洗知母酒拌炒黃芩酒炒防風當歸尾酒洗連翹各一錢蘇木藁本防己酒拌桔梗陳皮澤瀉黃耆蜜水拌炒各一錢人參甘草炙各五分上水二盞姜三片煎八分食後服當歸黃耆湯治瘡瘍臟腑已行如痛不能忍者宜和榮衛當歸黃耆生地黃川芎地骨皮芍藥各五分水盞半煎服發熱加黃芩熱躁不能睡臥者加梔子如嘔則是濕氣侵胃倍加白朮飛龍奪命丹一名蟾酥丸治疔瘡發背及惡證不痛或麻木或嘔吐重者昏憒服此即蘇不起發者即發不痛者即痛痛甚者即止嘔吐者即解未成者即消已成者即潰有回生之功乃惡證中至寶也真蟾酥乾者酒化輕粉各五分明礬枯銅綠寒水石炒乳香沒藥麝香各錢硃砂三錢細研蝸牛二十個另研無亦效即螺螄負殼而行者上各研末將蝸牛研爛入藥末搗勻少加酒糊丸如小豆大每服一二丸用生蔥白三五寸病者自嚼爛吐於手心男左女右包藥在內熱酒連蔥送下取汗如人行五七里汗出為效重者再服青囊方加雄黃二錢蜈蚣一條血竭膽礬冰片各三分海藏奪命丹治惡瘡腦疽發背大黃牡蠣各一兩生薑沒藥乳香各半兩上為粗未分作二服每服用好酒一升炭火熬數沸用碗盛之露一宿次早空心溫服之不可亂傳內托復煎散治腫焮於外根盤不深形證在表其脈浮痛在皮肉邪氣盛則必侵於內急須內托以救其里也地骨皮黃耆防風各二錢芍藥黃芩白朮茯苓人參甘草當歸防己各二兩桂半兩上咀先將蒼朮一升用水五升煎至三升去蒼朮渣入前藥十二味煎至三四盞濾絞清汁作三四服終日服之又煎蒼朮渣復煎湯去渣再煎前十二味藥渣服之此除濕散鬱熱使胃氣和平如或未已再行半料服之若大便秘及煩熱少服黃連湯如微利煩熱已退卻服復煎散半料如此使榮衛俱行邪氣不能內侵也精要內托散一名護心散一日至二日之內宜連進數服真綠豆粉一兩明乳香半兩慢火於銀石器中炒手指攪使干急傾出扇冷研細上研令勻每服二三錢濃煎甘草湯調下時時細呷要藥常在胸膈間若毒衝心有嘔逆之證大宜服此如有寒而嘔者當用辛熱之藥托裡消毒散治疽已攻發不消者服此未成即消已成即潰腐肉易去新肉易生有瘡口宜貼膏藥斂則不用切忌早用生肌又治時毒表裡俱解腫肉不消欲其作膿人參黃耆鹽水拌炒當歸酒洗川芎芍藥白朮茯苓各一錢白芷金銀花甘草五分上水二盞煎八分瘡在下或在上分食前食後服東垣內托榮衛湯治風濕鬱熱其手足少陽致血脈凝逆使榮衛周身若元氣稍弱其風熱滯於下其面色必赤而腫硬黯色風木之性上行顏必變色其人多怒其瘡之色亦赤腫硬微帶暗黑其瘡之形勢亦奮然高起結硬而作痛其脈洪緩而弦宜發其汗通其榮衛則邪氣去矣黃耆半兩防風二錢連翹二錢羌活炙甘草人參各一錢黃芩當歸二錢半蒼朮三錢紅花三分桂枝五分柴胡二錢上咀作二服每服水酒各一盞煎八分溫服定痛托裡散治瘡瘍血虛疼痛聖藥也當歸酒洗白芍藥炒川芎各五分乳香沒藥肉桂各一錢粟殼去筋蒂炒二錢上水二盞煎八分溫服內托黃耆湯治潰瘍作痛倦怠少食少睡自汗口乾發熱不愈黃耆麥門冬熟地黃人參白朮炒茯苓各一錢川芎遠志當歸各七分官桂炙甘草各三分上水二盞姜三片棗一枚煎八分食遠服神效托裡散治瘡為寒變而內陷者膿出消解皮涼心痞滿腸鳴切痛大便微溏食則嘔氣短呃逆不絕不得安臥時發昏憒丁香沉香茴香益智仁陳皮木香羌活乾薑炮各一錢甘草附子炮去皮臍各二錢水二盞姜三片煎八分無時服六君子湯治一切脾胃不健或胸膈不利飲食