一兩零五分中品去五痔五漏及翻花瘤氣飲白礬二兩白砒一兩三錢乳香沒藥各三錢下品治瘰癧氣核疔瘡發背腦疽謂之惡證白礬二兩白砒一兩半乳香沒藥各二錢半牛黃二分先將砒末入紫泥罐內次用礬末蓋之炭火煅令煙盡取出研極細糯米糊為錠子如線香陰乾紝瘡內三四次年深五次其根自潰如瘡露在外更用蜜水調搽幹上亦可托裡養榮湯治瘰癧流注及一切不足之證不作膿或不潰或潰後發熱惡寒肌肉消瘦飲食少思睡臥不寧盜汗不止人參黃耆當歸酒洗川芎芍藥白朮各一錢五味子炒研麥門冬甘草各五分生地黃酒洗蒸半日水二盞姜三片煎八分食後服方脈流氣飲治瘰癧流注及鬱結腫塊或走注疼痛或心胸痞悶咽塞不通脅腹膨脹嘔吐不食上氣喘急咳嗽痰或面目四肢俘腫大小便秘紫蘇青皮當歸酒洗芍藥炒烏藥茯苓枳實桔梗半夏川芎黃耆炙防風陳皮去白各一錢炙甘草木香大腹皮檳榔枳殼炒各五分上水二盞姜三片棗一枚煎八分食後服加減八味丸治諸瘡愈後口乾渴甚則舌黃及未患先渴此腎水枯竭不能上潤以致心火上炎水火不能既濟故心煩躁渴小便頻數或白濁陰痿飲食不多肌膚漸削或腿腫膝瘦服此以升腎水降心火諸證頓止五味子二兩山茱萸肉牡丹皮山藥各一兩茯苓澤瀉切片蒸焙桂心各半兩生地二兩酒拌蒸搗膏上為末入地黃膏加煉蜜少許丸如梧桐子大每服六七十丸五更初未語前或空心淡鹽湯下香砂六君子湯治脾胃不健食少作嘔或過服涼藥致傷脾胃六君子湯加藿香砂仁水盞半姜二片棗一枚煎七分食遠服不換金正氣散治瘡瘍脾氣虛弱寒邪相搏痰停胸膈以致發寒熱服此正脾氣則痰自消寒熱不作蒼朮制厚朴炒陳皮各一錢甘草炙五分藿香半夏制各七分上水二盞姜三片棗二枚煎七分食後服消咽利膈湯治積熱咽喉腫痛痰涎壅盛胸膈不利煩躁飲冷大便秘結金銀花防風荊芥薄荷桔梗黃芩黃連炒各錢半連翹各一錢玄參大黃朴硝牛蒡子炒甘草各七錢水二盞煎七分食後服刺少商穴法少商穴在手大指內側去爪甲如韭葉刺入三分許以手自臂勒至刺處血出則消若重者及成膿者須灸刺患處承氣湯治腸胃積熱口舌生瘡或牙齦腫痛大黃朴硝甘草各一錢水盞半煎七分食前服人參固本丸治肺氣燥熱作渴或小便短赤如淋此治虛而有火之聖藥也生地黃酒洗熟地黃酒煮爛天門冬去心酒浸爛麥門冬去心各一兩人參半兩上除人參生地黃為末其餘搗爛成膏入煉蜜少許丸如捂桐子大每服五十丸空心鹽湯或溫酒送下消毒犀角飲子治斑或癮疹瘙癢作痛及風熱瘡毒犀角磨水防風荊芥各錢半牛蒡子二錢甘草五分水盞半煎七分入犀角水徐徐服砭法治小兒丹毒色赤遊走不定用細瓷器擊碎取有鋒芒者一塊以竹箸一根劈開頭寸許夾住鋒針以腺扎定以兩指輕撮箸梢將鋒鋩對患處懸寸許再用筋一根擊之芒刺其毒血出自愈甚者必如是而得痊不然毒入腹者多不能救萆薢湯治楊梅瘡不拘新舊潰爛筋骨作痛並效萆薢俗名土茯苓即土萆薢產於川者名川萆薢鮮者佳每用木石捶碎白者二兩煎水三盞至二盞去渣不拘時徐徐溫服或久服敗毒寒涼攻擊之藥以致脾胃氣血虛者只以此一味為主而加兼證之藥無妨日常以此湯作茶服之尤妙雙解散治便癰內蘊熱毒外挾寒邪或交感強忍以致精氣鬱結疼痛大小便澀宜用通解更隨證調治之杏仁芍藥甘草車前子微炒澤瀉大黃乾薑炮滑石二錢上水二盞煎八分空心服八正散治積熱小便不通淋證脈實大黃酒炒山梔炒甘草桂皮瞿麥萹蓄甘草各一錢滑石二錢上水二盞煎八分食前服導水丸治便癰初起腫痛及下疳大小便秘又治梅瘡初起濕勝之時宜先用此數服以導其邪氣大黃炒黃芩各二錢黑醜炒滑石蝦各四錢上為細末糊丸梧桐子大每服五十丸臥時溫水下托裡當歸湯治潰瘍氣血俱虛發熱及瘰癧諸癰不問腫漬皆宜服之久服能收瘡口當歸黃耆人參熟地黃酒洗川芎芍藥各一錢柴胡炙甘草各五分上水二盞煎八分食後服加減龍膽瀉肝湯治肝經濕熱玉莖患瘡或便毒懸癰小便赤澀或陰囊腫痛或潰爛作痛睪丸懸掛痔漏脹痛並治龍膽草酒洗炒澤瀉各一錢車前子微炒木通黃芩生地黃酒洗歸尾酒洗山梔炒炙甘草各五分上水二盞煎八分食前服濕盛加黃連大便秘加大黃當歸郁李仁湯治痔漏大便結硬肛門下墜苦痛難忍歸尾酒洗郁李仁澤瀉生地黃大黃酒炒枳實蒼朮秦艽各二錢大麻仁錢半皂角一錢研末上水二盞煎八分入皂角末空心服秦艽防風湯治痔漏結燥大便作痛秦艽防風當歸酒洗白茯苓白朮各錢半黃柏陳皮柴胡大黃煨澤瀉各一錢紅花桃仁去皮尖研升麻甘草炙各五分水二盞煎八分空心服加味四君子湯治痔漏下血面色痿黃脾胃虛弱四肢乏力飲食無味中氣下陷不能攝血致便血不禁人參白朮茯苓黃耆白扁豆炒甘草炙各五分為末每服三錢滾白湯調下除濕和血湯治陽明經濕熱便血腸痛生地黃牡丹皮生甘草各五分炙甘草黃耆各一錢芍藥錢半升麻七分當歸身酒洗蒼朮秦艽陳皮肉桂熟地黃酒浸各三分水二盞煎八分空心稍熱服槐花散治腸風臟毒下血槐花生地黃酒洗蒸青皮白朮荊芥穗各六分川芎四分當歸酒洗升麻各一錢上為細末每服三錢空心米飲調下參苓白朮散大病瘡瘍愈後脾胃不和飲食少或吐嘔泄瀉人參茯苓白朮蓮子去皮尖白萹豆姜炒砂仁桔梗山藥炒炙甘草薏苡仁炒各二兩上為細末每服三錢石菖蒲煎湯調下小烏沉湯治氣不調和便血不止烏藥一兩炙甘草二錢香附米四兩醋製上為細末每服二錢食前鹽湯下枳殼散治便血及婦人經候不調手足煩熱夜多盜汗胸膈痞枳殼二錢半夏曲赤芍藥柴胡黃芩各錢半水二盞姜三片棗二枚煎八分食後服連翹飲子治結核不散初起宜服數劑之後不消兼服八珍湯連翹川芎栝蔞仁研皂角刺炒甘草節橘葉青皮去白桃仁各一錢上水二盞煎一盞食後服復元通氣散治乳癰便毒腫痛及一切氣滯腫毒如打撲傷損閃肭作痛及疝氣尤效木香茴香青皮陳皮穿山甲炒白芷甘草漏蘆貝母各等分上為末每服三錢溫酒調下秘傳圍藥鐵井欄敷一切惡毒即收斂消腫神效牛糞灰曬乾燒灰用新瓷罐盛之干處鐵線草草烏五倍子白芨白斂貝母心陳小粉炒極黃色各等分惟牛糞灰加倍用上為末看疽大小用釅醋煎熱調藥如糊敷瘡四圍中流錢孔以出毒氣干則易之瘡勢甚者如惡寒發熱隨用飛龍活命等湯出汗無不平安鐵箍散治一切癰疽腫毒圍之不開走而自消霜後芙蓉葉蒼耳草山慈姑白芷梢川大黃川黃柏醋炙白芨面各等分上用水調敷四圍中留一孔如干以水潤之護心托裡散治諸腫毒疔發曾經汗下毒氣入心迷悶嘔吐服此護心一服不消再服之效滴乳香一兩真綠豆粉四兩上研勻每服三錢不拘時甘草湯調服秘驗白芨散治大小瘡疽敷之即散無錫葉尚書傳白芨八兩烏骨雞焙乾紅藥子四兩雄黃輕粉紅芽大戟各半兩上為末醋調敷患處
