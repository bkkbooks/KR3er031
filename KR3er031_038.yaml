body:
  text: 卷之三十八霍亂門病機霍亂敘論內經曰歲土不及風乃大行民病飧泄霍亂體重腹痛筋骨繇復巢氏病源云霍亂吐瀉皆因溫涼不調陰陽混淆二氣相干致脾胃之間變而為霍亂寒氣客於脾則瀉客於胃則吐亦由飲酒食肉腥膾生冷過度或因坐臥濕地當風取涼使風冷之氣歸於三焦傳於脾胃脾胃得冷水穀不消皆成霍亂霍亂吐下皆屬於熱原病式云三焦為水穀傳化之道路熱氣甚則傳化失常而霍亂吐下之證作火性燥動故也霍亂吐下有屬於濕原病式云霍亂吐下濕為留飲痞隔而傳化失常故甚則霍亂吐瀉也霍亂吐瀉邪在中焦保命集曰霍亂吐瀉不止者邪在中焦或因渴而大飲或因飲而過量或飢飽過甚或濕熱內甚故陰陽不和是為吐瀉仲景曰邪在上焦則吐邪在下焦則瀉邪在中焦則既吐且瀉此為急病也然吐利為急十死其一二如揮霍撩亂而不得吐瀉者此名乾霍亂必死法曰既有其入必有所出今有其入而不得其出者痞也塞也故轉筋吐瀉者其氣有三曰風曰火曰濕吐為暍熱也王氏曰炎熱暴爍心之氣也火能炎上故吐也瀉為濕也叔和云濕多成五瀉經曰濕勝則濡瀉又曰風勝則動筋屬肝而應於風木故腳轉筋燥急也內經諸轉反戾水液渾濁皆屬於熱張仲景治法曰熱多欲飲水五苓散寒多不飲水者理中湯凡覺此證或先五苓益元桂苓甘露飲乃吐瀉之聖藥也慎無與粟米粥湯一入於胃則必死矣霍亂者脾胃極損不能傳化加以粟米如人欲斃更加利刀鋸其首豈有能生者耶如吐瀉多時欲住之後宜微以稀粥漸漸養之以遲為妙霍亂病源傷暑致多霍亂證雖有風寒濕熱之異大抵傷暑居多蓋由夏暑傷內元氣脾胃俱虛必因飲冷停寒酒色所傷外因受涼邪氣所郁不得發越而霍亂之證作矣故此證作多於秋涼之時從可知矣若邪淺而能上下分散得吐瀉為可治深重者上不得吐下不得泄邪恣中焦攪腹顛倒揮霍撩亂立見死亡知醫者惟用鹽湯灌探吐及以益元散五苓湯之類救之庶可回生若無知者謬以滾湯熱粥與之禍不旋踵霍亂分三因陳無擇云霍亂者心腹卒痛嘔吐下利憎寒壯熱頭痛眩暈先心痛則先吐先腹痛則先瀉心腹俱痛吐利並作甚則轉筋入腹則斃霍亂惡證無越於斯蓋陰陽反戾清濁相干陽氣暴升陰氣頓墜陰陽痞隔上下奔逸治之惟宜溫暖更詳別三因以調之外因諸風則惡風有汗傷寒則惡寒無汗胃濕則重著傷暑則熱煩內因九氣所致郁聚痰涎痞隔不通遂致滿悶隨其勝復必作吐利不內外因或諸飽食膾炙恣餐乳酪冰脯寒漿旨酒胃既䐜脹脾臟停凝必內郁發遂成吐利當從不內外因也傷寒霍亂者少傷寒論曰病嘔吐而利名曰霍亂或發熱頭痛身疼惡寒吐利或自吐下又利止復更發熱也皆是霍亂證傷寒其脈微澀者本是霍亂今是傷寒卻四五日至陰經上轉入陰必利本嘔下利者不可治也保命集云傷寒霍亂轉筋身熱脈長陽明本病也脾胃受濕熱中焦氣滯或因冷飲或傷冷水或感濕氣冷熱不調水火相干陰陽相搏上下相離榮衛不能相維故轉筋攣痛經絡亂行暴亂吐瀉中焦胃氣所主也大抵霍亂內多暑熱之邪外因寒氣束鬱而作或內因涼物而致若謂真寒而為病源者絶少獨惟夏秋時病者豈得為傷寒者乎霍亂轉筋候原病式曰轉筋經云反戾也熱氣燥爍於筋則攣瘈而痛火主燔灼燥動故也或以為寒客於筋者誤也蓋寒雖主於收引然止為厥逆禁固屈伸不便安得為轉筋也所謂轉者動也陽動陰靜熱證明矣夫轉筋者多因熱甚霍亂吐瀉所以致脾胃土衰則肝木自甚而熱燥於筋故轉筋也夫發渴則為熱凡霍亂轉筋而不渴者未之有也或有不因吐瀉但外冒於寒而腠理閉塞陽氣鬱結怫熱內作內燥於筋則轉筋也故諸轉筋以湯漬之而使腠理開泄陽氣疏通則愈也因湯漬而愈故俗反疑為寒也陳氏曰轉筋者以陽明養宗筋屬胃與大腸今暴吐下津液頓亡外感四氣內積七情攻閉諸脈枯削於筋宗筋失養必致攣縮甚則卵縮舌卷為難治乾霍亂候陳氏曰乾霍亂者忽然心腹脹滿絞刺疼痛蠱毒煩冤欲吐不吐欲利不利狀若神靈所附頃刻之間便致悶絶亦涉三因或臟虛腸胃或厚故吐利不行霍亂煩渴候陳氏曰煩渴者以陰陽反戾清濁相干水與谷並小便祕澀既走津液腎必枯燥引水自救煩渴必矣脈候內經曰脈伏者霍亂脈微而澀或伏而散或隱而伏或大而虛右關脈滑為霍亂吐瀉霍亂脈多結促皆不可斷以死脈洪者為熱脈弦者為飲氣口弦滑膈間有宿食留飲宜順其性以鹽湯探吐之脈洪大者生脈微弱漸遲氣少不言者死治法治霍亂須分理陰陽霍亂證乃陰陽交錯水火相干邪正不分如寇入境不別良善亂相混擾然也初須用五苓散分利若干霍亂者須以姜鹽湯或吳茱萸湯溫服探吐吐中就有發散之意俟其稍安隨後調理若斯證治一時急迫稍失其治立見傾危此等證候不知治者死於非命何可勝紀每見夏秋之間患此證者忽然吐瀉大作家人不識治法只云吐瀉既虛即以熱粥滾湯與之接濟湯粥入腹其證尤甚而即死者多矣治乾霍亂須用吐法乾霍亂證最難治升降不通死在須臾當以吐法提其氣極是良法急則用鹽湯此係內有物所傷外有邪氣所遏有用吐者則兼發散之意有用溫藥解散者不可用涼藥解散則二陳加川芎蒼朮防風白芷生薑煎服霍亂治例霍亂陽明證宜和中平胃建中輩或四君子湯脈浮自汗四君子加桂主之脈浮無汗四君子加麻黃吐利轉筋脅下痛脈弦者木剋土也故痛甚平胃加木瓜五錢或建中加柴胡木瓜吐利轉筋腹中痛體重脈沉而細者四君子加白芍良薑吐利四肢拘急脈沉而遲此少陰霍亂四君子加薑附厚朴吐利四肢厥冷脈微緩屬厥陰建中加歸附吐利頭痛而身熱熱多欲飲水者五苓散寒多不用水者理中丸主之元戎云太陰證霍亂者理中湯加橘紅名治中湯若吐下必腹作痛手足厥冷理中去白朮加熟附名四順湯若吐利後轉筋者理中加火煅石膏一兩大法生薑理中湯最好不渴者可用如渴者用五苓散欲吐者以二陳湯探吐亦有可下者轉筋者皆屬乎血熱四物湯加酒芩紅花蒼朮南星煎服人於夏月加食瓜果多飲冷乘風以致食留不化因成痞膈上下不通遂成霍亂以六和湯倍加藿香煎服霍亂切不可與米粥湯飲之立死轉筋法男子以手挽其陰女子以手捧兩乳此千金法也針灸法刺委中穴出血或刺十指頭出血皆是良法今北方人凡病悉刺兩手膕中出血謂之打寒此則傷寒熱入血室而用此法也霍亂證亦以此法所謂血去惕出非此二證悉皆用之誤也轉筋十指拘攣不能屈伸灸腳外踝骨尖上七壯霍亂將死者用鹽填臍中灸七壯立愈霍亂吐瀉不止灸天樞氣海中脘四穴立愈天樞二穴在臍心兩旁各開二寸氣海在臍下一寸半中脘穴在臍上四寸藥方治霍亂和解通用劑玉機半夏湯治霍亂轉筋吐瀉不止半夏曲白茯苓白朮各五錢淡桂二錢半炙甘草二錢上為細末每服二錢渴者以涼水調下不渴者以溫水調下河間六和半夏湯治霍亂吐瀉白朮甘草砂仁杏仁人參半夏制各五錢赤茯苓藿香白扁豆薑汁炒木瓜各一錢香薷厚朴薑製各二錢上咀作一服姜三片棗一枚水二盞煎一盞溫服三因木瓜湯治霍亂吐瀉舉筋轉筋入腹則悶絶紫蘇葉十片乾木瓜一兩吳茱萸半兩小茴香炒甘草炙各一錢上咀作二服加薑棗水煎服直指姜鹽湯治乾霍亂欲吐不吐欲瀉不瀉鹽一兩生薑半兩搗上同炒令色變以水一碗煎熱溫服濟生麥門冬湯治外感風寒內傷飲食霍亂轉筋嘔吐瀉泄藿香厚朴白朮茯苓各一錢甘草炙各五分紫蘇大腹皮白芷桔梗半夏陳皮各八分肉桂三分豬苓澤瀉各一錢上咀作一服水二盞姜五片煎八分食遠服局方七氣湯治七情鬱結互相刑剋揮霍撩亂吐利交作半夏制厚朴姜炒芍藥茯苓各一錢肉桂紫蘇橘紅人參各五分上咀作一服水二盞姜七片棗一枚煎一盞不拘時服回生散治霍亂吐瀉但有一點胃氣存者服之回生凍皮去白藿香去土各半兩上作一服水二盞煎八分不拘時服止渴湯治霍亂煩渴人參麥門冬茯苓桔梗栝蔞根葛根澤瀉甘草炙各五錢上為細末每服二錢用白湯下如煩渴加滑石二兩甚者加薑汁續續飲之不拘時服局方四君子湯五苓散胃苓湯二陳湯不換金正氣散建中湯並治霍亂吐利方見傷寒門治傷暑霍亂諸劑選要二香散治暑濕相搏霍亂轉筋煩湯悶亂藿香白朮厚朴陳皮茯苓半夏制紫蘇桔梗白芷香薷黃連白扁豆各一錢大腹皮甘草炙各五分上咀作一服水二鍾姜五片蔥白三寸煎一鍾服集成玉露散治夏月傷暑霍亂吐瀉石膏寒水石生甘草各等分上為末每服二錢白湯調下局方桂苓甘露飲冷香飲子黃連香薷散益元散並治傷暑霍亂方見暑門霍亂溫中散寒諸劑仲景加減理中湯治霍亂吐瀉人參白朮乾薑炮各二錢甘草炙五分上咀作一服水鍾半煎八分不拘時服若為風寒濕所中者加附子一錢名附子理中湯若霍亂吐利者加陳皮青皮各一錢名治中湯乾霍亂心腹作痛先以鹽湯少許頓服候吐出令透然後即進此藥嘔吐者於治中湯內加丁皮半夏各一錢生薑十片煎服泄瀉者加橘紅茯苓各一錢名補中湯溏瀉不已者於補中湯內加附子一錢不喜飲食水穀不化者再加砂仁一錢霍亂嘔吐心腹作痛手足逆冷於本方內去白朮加熟附子二錢名四順湯霍亂後轉筋者理中湯內加煅石膏一錢臍上築者腎氣動也去朮加官桂腎惡燥去朮恐作奔豚故用官桂傷胃吐血以此藥能理中脘分利陰陽安定血脈用本方可也集成冷香湯治夏秋傷暑引飲過食生冷脾胃不和遂成霍亂之證良薑附子制甘草炙檀香各一錢乾薑炮一錢丁香三分草果一錢上作二服水鍾半煎八分去渣貯瓶中沉井內待惡服之效濟生通脈四逆湯治霍亂多寒肉冷脈絶吳茱萸三錢附子制一錢桂心當歸甘草炙各一錢白芍藥木通細辛各五分上咀作一服水二鍾姜七片棗一枚煎八分無時服宣明正胃散治霍亂吐瀉不止枇杷葉拭去毛炙厚朴制陳皮去白各一錢桂五分上咀作一服水鍾半姜三片煎八分無時服選要訶黎勒散治霍亂嘔吐脾胃虛寒氣隔不思飲食訶子炮肉桂澤瀉赤芍藥乾薑炮人參各五分白朮陳皮去白厚朴炒各一錢甘草炙二分半上咀作一服水鍾半姜三片棗一枚煎六分不拘時服人參散治霍亂身體疼痛四肢逆冷服理中四順不效者人參白芍藥當歸高良薑各五分附子制陳皮去白桂心白朮各一錢上咀作一服水鍾半棗三枚煎七分不拘時服活命散治男子婦人小兒霍亂吐瀉不止面色青黑命在須臾宜服此藥防風羌活獨活乾薑細辛各一錢官桂五分草豆蔻肉豆蔻川芎各五錢吳茱萸木瓜各一兩上為細末每服三錢濃煎木瓜湯空心調服選要漿水散治暴瀉如水周身汗出盡冷脈弱不能言語甚者吐逆不止半夏二錢附子乾生薑炙甘草桂心各半錢良薑二分半上咀作一服漿水煎服之活人姜附湯治霍亂吐瀉轉筋手足厥冷多汗乾薑炮附子制各二錢上咀作一服水鍾半煎七分熱服醫林附子粳米湯治霍亂四逆吐少嘔多中附子一枚制半夏兩半大棗十枚粳米五合乾薑甘草各一兩上為粗末每服八錢水鍾半煎米熟去渣服糯米姜水治上吐下瀉心腹㽲痛水食不下糯米一百二十粒生薑一塊上共一處搗細新汲水解服既濟湯治霍亂後虛煩不得眠人參炙甘草淡竹葉炙各口錢麥門冬口錢附子半夏制五分上咀作一服水鍾半姜五片粳米百餘粒煎空心服良方丁香散治霍亂嘔吐不止丁香五分藿香枇杷葉拭去毛各一錢上咀水一鍾半姜一片煎六分熱服四順附子湯治霍亂轉筋吐瀉手足逆冷六脈沉絶氣少不語身冷汗出附子生用白姜炮人參甘草炙各等分上咀每服四錢水鍾半煎七分空心服胡椒湯治霍亂煩悶欲死胡椒三十粒陳皮高良薑桂心各七分麥門冬去心乾木瓜各錢半上咀作一服水鍾半煎六分溫服良方治命散脾元虛損霍亂不吐瀉腹脹膈壅丁香七枚葛根甘草炙生薑各半兩鹽一合上作一服童便鍾半煎一鍾分二次服薤白湯治霍亂乾嘔不止薤白切一握生薑切半兩陳皮絲三錢上水二大鐘煎七分溫服橘皮湯治霍亂嘔噦不止橘皮去白甘草炙各一兩枇杷葉拭去毛炙黃二兩上咀每服三錢水鍾半煎七分溫服良方桃枝湯治中惡霍亂客邪內干正氣使胃中食物不化氣不宣通令人心腹卒痛吐利煩悶甚則精神冒昧靡所知識此之謂鬼氣所作也桃東行嫩枝切一握梔子仁十四粒豆豉一兩吳茱萸一兩桃仁十四粒麝香二分當歸二兩官桂五錢上咀每服四錢水鍾半姜三片煎七分溫服日三次夜一次急救方治心腹絞痛煩悶歇絶此乃陰陽不通名乾霍亂俗謂絞腸痧證急用吐法得免橫枉而死食鹽半盞用熱湯三四碗泡化令患人吃盡後卻以雞翎探吐所吃鹽湯出盡及腹中宿物痰飲俱出其病即愈效如神也洗漬法治霍亂轉筋入腹蘚蓼一束去兩頭煎湯一斗洗足及腿即止食鹽煎湯漬之片時愈易簡諸方一方治霍亂吐瀉用高良薑二兩炒焦銼細酒一升煎三五沸服一方治霍亂不吐不下用丁香十四枚為末以熱湯一盞調服一方治霍亂腹痛吐下用桑葉搗汁一盞服冬月乾者煎汁服一方治霍亂瀉利不止轉筋入腹欲死者用生薑三兩搗爛酒一升煮三四沸頓服一方治霍亂大瀉不止用附子炮製為末每服四錢鹽半盞水二盞煎一盞溫服立正一方治霍亂用厚朴薑汁浸火炙為末新水調二錢服一方治霍亂吐利不止用扁豆末和醋服之下氣一方治痢後轉筋用扁豆葉一握生搗以醋煎汁服之一方治轉筋用赤蓼切三合水三合酒一盞煎八分溫服二次一方治霍亂吐逆不止用糯米以清水研一碗飲之即止一方治霍亂轉筋用香薷濃煮汁服半升立效一方治筋脈攣急不得屈伸者用薏苡仁生為末每服二錢米飲調下無時日進三服勿令間斷為妙一方治足筋急痛用生薑半斤搗如膏貼裹痛處一方治霍亂心痛無汗吐不止用梨汁葉一握水二升煎一升服之神效一方用枯白礬為末每服一錢沸湯泡服一方治霍亂吐瀉不能服藥用緑豆胡椒各四十九粒研碎水煎服如渴甚者新汲水調服一方用胡椒四十粒以飲吞之一方治霍亂吐瀉服藥即吐無法可治此方立效井泉水半碗百沸湯半碗相合服之外臺祕要治霍亂心腹脹滿煩痛短氣未得吐下飲好苦酒三盞少老弱者可飲一二盞一方治心腹脹滿霍亂不吐下小蒜一升水三升煮一升半分服一方治霍亂轉筋用皂角為末吹一豆入鼻中得嚏瘥本草方治霍亂煩躁臥不得安蔥白二十莖大棗二十枚以水二升煎一升以綿濾過去渣頓服一方治霍亂卒熱心煩渴粟米研泔汁數升飲之瘥一方治霍亂不吐不下者丁香十四枚為末沸湯調一盞服一方治痧病發用水紅花根去苗洗淨銼水一碗新瓷瓶內煎至半碗服用新苧麻做頭繩縛髻每年換一次不須藥永不發一方治霍亂吐下不止艾一把水三升煮一升頓服肘後方治霍亂吐下後大渴多飲則殺人黃粱米五升水一斗煮至一升澄清稍稍飲之千金方治霍亂乾嘔不息以薤葉煎一升服三次立止
