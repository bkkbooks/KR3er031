body:
  text: 卷之二十四嘔吐噦門病機內經敘論至真要大論諸逆衝上皆屬於火諸嘔吐酸暴注下迫皆屬於熱經脈篇曰足太陰脾之脈復從胃別上膈注心中是動則病舌本強食則嘔脈解篇曰食則嘔者物盛滿而上溢故也舉痛論曰寒氣客於腸胃厥逆上出故痛而嘔厥陰之病少腹堅滿厥病嘔病食不下入而復出厥甚寒氣入脾食畢而吐靈樞經曰人之噦蓋谷入於胃胃氣上注於肺寒氣邪氣穀氣俱還入胃新故相亂真邪相攻氣並相逆復出於胃故為噦又曰胃氣逆為噦又曰病深者其氣噦劉河間曰胃膈熱甚則為嘔火氣炎上之象也楊仁齋云胃氣不和而嘔吐人所共知然有胃寒有胃熱有痰飲有宿食有風邪入胃有氣逆衝上數種之異可不究其所自來哉丹溪曰嘔為火氣炎上特其一耳有氣逆者有寒氣鬱於胃口者有食滯胃脘而新食不得下而反胃者有胃中有痰而嘔者有久病胃虛不納穀者嘔吐噦總為胃病東垣發明嘔吐噦者俱屬於胃胃者總司也究其三者之源皆因脾胃虛弱或因寒氣客胃加以飲食所傷而致胃氣上逆或嘔或吐或噦者皆陰火之邪上衝而吸入之氣不得入故食不下也邪氣衝之火逆胃中而作者也嘔吐噦病屬於三陽嘔者陽明也陽明多氣多血故有聲有物氣血俱病也仲景云嘔多雖有陽明證不可下之藥以生薑為主或有形質之物為病者因而越之可為上焦氣壅表實而言之非以瀉氣而言之也吐者太陽也太陽多血少氣故有物無聲為血病也有食入即吐以橘紅主之有食已則吐有食久則吐噦者少陽也少陽多氣少血故有聲無物氣病也以薑製半夏主之是也吐分三焦氣積寒機要曰吐有三因氣積寒也皆從三焦論之上焦在胃口上通於天氣主納而不出中焦在中脘上通天氣下通地氣主腐熟水穀下焦在臍下下通地氣主出而不納是故上焦吐者皆從於氣氣者天之陽也其脈浮而洪其證食已即吐渴欲飲水大便結燥氣上衝胸而發痛治當降氣和中中焦吐者皆從於積有陰有陽食與氣相假為積而痛其脈浮而長其證或先痛而後吐或先吐而後痛治以毒藥去其積木香檳榔行其氣下焦吐者皆從於寒地道也其脈沉而遲其證朝食暮吐暮食朝吐小便清利大便秘而不通治以毒藥通其秘塞溫其寒氣大便漸通復以中焦藥和之不令大便秘結而自愈也脈候脈浮而洪者為氣逆沉而遲者為寒趺陽脈浮者胃氣虛嘔而不食寒氣在上噯氣在下二氣相爭但出而不入其人即嘔而不得食恐怖即死寬緩即瘥脈陽緊陰數食已即吐陽浮而數亦然關脈浮大風傷胃關上脈數其人即吐寸口緊為寒芤為虛虛寒相搏脈為陰結而遲其人噎脈弦者虛胃虛無餘朝食暮吐暮食朝吐變為反胃寒在於上反下之令脈反弦故名曰虛寸口脈微而數微則無氣無氣則榮虛榮虛則血不足血不足則胸中冷故痛而吐嘔而脈弱小便複利身有微熱厥者難治治法治嘔吐噦詳虛實寒熱四法胃虛嘔吐惡食不思食兼寒者惡寒或食久還吐或朝食暮吐暮食朝吐脈遲而微澀此皆虛寒者也宜藿香安胃湯理中湯甚者丁香煮散溫補胃中鬱熱飲食積滯而嘔者則惡食惡寒煩悶膈滿或渴喜涼聞食則吐服藥亦吐脈洪大而數此皆實熱者也宜竹茹湯麥門冬湯清之若食積多者用二陳加神麯麥芽黃連保和丸之類消導治嘔吐噦須分新久無病之人卒然而嘔吐定是邪客胃府在長夏暑邪所幹在秋冬風寒所犯干暑者六和湯五苓散之類犯寒者藿香正氣散理中湯五積散之類久病而吐者胃虛不納穀也六君子湯加丁香豆蔻調中益氣湯之類常常噁心嘔吐清水有熱而有痰也宜用二陳湯加蒼朮厚朴黃連生薑之類是也嘔家多服生薑生薑為嘔家之聖藥也朱奉議治嘔吐以生薑橘皮半夏主之有形質之物滯於膈中並膈上有痰者宜先吐之則經所謂其高者因而越之是也丹溪云胃中有熱膈上有痰二陳加炒梔子黃連生薑胃虛嘔吐不能納穀生薑參耆白朮香附之類肝火出胃逆上而嘔者抑清丸夏月嘔吐不止五苓散加薑汁吐蛔而嘔以錫灰檳榔末米飲調下嘔吐而食不得進為胃風也清嘔則愈嘔而心下痞半夏瀉心湯嘔逆上氣者陳皮竹茹湯似嘔不嘔似噦不噦無賴者生薑半夏湯多酒而嘔吐者宜砂仁豆蔻連茱乾葛解酲之類久病吐者胃氣虛不納穀也生薑人參白朮黃耆香附治之凡痞滿短氣而嘔宜補中氣止可用調中益氣湯噁心吐清水者有熱有痰有虛皆用生薑隨證佐藥治之胃中有痰有熱者二陳湯加薑汁炒黃連黃芩挾虛者加人參白朮又云胃虛嘔者二陳湯加砂仁藿香白朮痰飲為患或因多食生冷脾胃不和以致嘔吐噁心或頭眩或胃脘懊憹不快或發寒熱二陳湯加丁香烏梅生薑煎服心下痞而痛者加草豆蔻仁痰熱噁心嘔吐氣盛者導痰湯加砂仁竹茹姜炒黃連女子嘔吐甚者死以其陰在上故也諸大吐渴飲水者死以童便飲之妙凡嘔吐者切不可下逆之故也漏氣嘔者身背皆熱肘臂痠疼氣不續膈間悶食入則先吐而後下名曰漏氣由風邪客腠理經氣失道邪氣內著麥門冬湯主之走哺者下焦實熱小便不通氣逆不續嘔吐不禁名曰走哺人參湯主之藥方通治嘔吐劑藿香安胃散治一切嘔吐不止藿香半夏制陳皮厚朴蒼朮各一錢甘草炙三分水盞半姜七片棗三枚煎七分服藿香安胃湯治胃虛而嘔藿香人參陳皮各一錢丁香五分生薑十片水煎服一物湯治卒吐暴逆虛弱困乏無力及久病人嘔吐飲食入口即吐者黃揀人參一兩擘破水一大碗煎五分服之再以參汁煮粥服之而愈加味二陳湯治嘔吐冷熱不調氣逆衝上陳皮茯苓半夏曲各一錢甘草藿香砂仁各五分白朮神麯人參各七分水二盞姜五片棗一枚煎八分溫服白朮湯治胃虛痰氣嘔吐白朮一錢半夏曲二錢茯苓一錢甘草五分檳榔一錢木香五分水二盞姜五片煎七分服大藿香散治七情傷感氣鬱於中眩運痞悶嘔吐不食藿香洗人參各五分半夏曲白朮各一錢白茯苓陳皮各七分桔梗五分枇杷葉炙去毛五個官桂三分甘草木香各三分水二盞姜五片棗一枚煎八分食遠服加味七氣湯治氣鬱嘔吐半夏厚朴人參茯苓各一錢官桂五分甘草炙五分水盞半姜三片棗一枚煎七分服胃寒嘔吐劑理中湯治脾胃虛寒嘔吐有痰氣加半夏生薑陳皮方見傷寒門治中湯治胃中虛過傷生冷腥膾吐逆不止方見寒門養胃湯治胃虛寒不思飲食反胃嘔吐方見反胃門草豆蔻湯治嘔吐和中調胃草豆蔻藿香各五分陳皮枳殼各七分白朮山藥各一錢桂心丁香各二分水盞半姜五片棗三枚粟米少許煎七分食前溫服三聖散治胃寒嘔逆不食半夏大者七枚先以錐子穿透心用麻繩穿通於井花水內浸七日一日一換為散烘乾用丁香四十九枚胡椒四錢為細末大人用生薑湯調一字小兒箸頭點生薑汁後點藥於口內立愈甚者三次丁香煮散治胃虛寒嘔吐不食丁香紅豆甘草炙乾薑炮青皮陳皮川烏良薑各五錢胡椒七粒益智仁五粒水二盞鹽一捻煎七分空心服丁香半夏丸治胃寒嘔吐吞酸丁香一兩紅豆半夏制各二兩白朮二兩陳皮三兩為末薑汁打糊丸胡椒大每服二十丸薑湯下紫沉香丸治中焦吐食由食積與寒氣相假故吐又痛半夏曲一錢代赭石三錢砂仁烏梅肉丁香檳榔各二錢杏仁沉香木香陳皮白朮各一錢肉豆蔻炮巴霜五分上為末醋糊丸胡椒大每服二十丸薑湯下胃中鬱熱嘔吐劑竹茹湯治胃中邪熱心煩喜冷嘔吐不食葛根二錢半夏三錢炙甘草一錢竹茹一丸彈子大水二盞姜五片棗二枚煎七分細細服手足心熱者和中一人病傷寒得汗身涼數日忽嘔吐藥與飲食俱不下醫者皆進丁香藿香等藥下咽即吐予曰此正汗後餘熱留胃中證與竹茹湯相合亟煎一服與之遂安麥門冬湯治煩熱嘔逆食下即吐麥門冬竹茹茅根生薑人參各一錢甘草五分水盞半煎七分服竹茹二陳湯治胃中有熱膈上有痰嘔吐不已竹茹二錢陳皮半夏白茯苓各一錢甘草炙五分水二盞姜七片煎八分服香茹飲治伏暑嘔吐方見暑門和中枳殼湯治上焦氣熱上衝食已暴吐脈浮而洪枳殼白朮半夏各錢半陳皮茯苓桔梗厚朴各七分水二盞姜五片煎八分調木香檳榔末一錢食遠溫服其功如神荊黃湯治暴嘔吐熱氣逆上者荊芥穗二錢黃芩一錢甘草六分大黃二錢水煎調檳榔末一錢服導痰消食劑調胃承氣湯治胃中熱壅宿滯不行大便秘結嘔吐方見於傷寒門半夏曲芽湯治飲食積滯痰涎壅盛嘔吐不已半夏陳皮茯苓枳殼檳榔神麯麥芽香附子厚朴蒼朮甘草各等分姜五片棗一枚煎玉浮丸治一切嘔吐方見反胃門姜橘湯治病後或虛弱之人一切嘔吐不納藥食橘紅四錢生薑七錢一塊略打破濕紙包煨取出再打碎煎水盞半棗一枚慄米一撮煎七分溫服細細呷完即愈大枳殼丸治酒食所傷胸膈脹滿心腹疼痰逆嘔吐噫氣吞酸茯苓白朮厚朴枳殼人參木香青皮半夏陳皮三稜炮莪朮炮檳榔神麯乾薑炮麥芽大黃各等分上為細末薑汁糊丸胡椒大每服百丸食後薑湯下易簡方食醫心鏡治嘔吐陳粟米一合薑汁一杯水二碗煮熟取飲服肘後方治卒乾嘔不止搗生薑葛根取汁服一升效一方用甘蔗汁溫服半升三服效千金方治乾嘔空心飲羊乳一杯效衍義方治嘔逆食不下以生滑石末溫水調下二錢姜蜜湯治嘔吐取薑汁一盞煎滾收貯白蜜半斤煉熟亦收貯每服薑汁一匙蜜二匙沸湯調服日夜五七次妙蘇合香丸治冷氣嘔吐不止薑湯調下神效方見風門沉香均氣散治嘔吐日久服藥不效人倦少食或間而作吐砂仁炒沉香另研二錢半橘紅五錢紫蘇三錢上為末每服二錢食遠薑湯調下心統云吐屬寒用砂仁豆蔻嘔屬火用薑汁炒黃連加柿蒂痰加竹瀝孫真人食忌治嘔吐白檳榔一枚銼陳皮炙一錢水一盞煎服導引法一法正坐兩手向後捉腕摩肋上下七左右換手亦然除腹冷宿氣積胃口冷飲食進退吐逆不下一偃臥展脛兩手左蹺兩足踵以鼻內氣自極七息除腹中食嘔一坐直舒兩腳以兩手挽兩足自極十二通愈腸胃不能受食吐逆以兩手直叉兩足底腳痛舒以頭枕膝上自極十二通愈腸胃不能受食吐逆灸法中腕一穴在臍上四寸以草度鳩尾至神闕中折是穴炙三七壯治嘔吐不思飲食氣海一穴在臍下一寸五分吞酸門病機吞酸敘論內經曰諸嘔吐酸皆屬於熱又曰少陽之勝嘔酸原病式云酸者肝木之味也由火勝金金不能平木則肝木自甚故為酸也如熱天飲食則易於酸矣是以肝熱則口酸也以吞酸為寒之誤或以吞酸為寒者蓋謂傷生冷硬物而噫氣吞酸故俗醫主於溫和脾胃豈知人之傷於寒也則為病熱蓋寒傷皮毛則腠理閉密陽氣怫鬱而為熱故傷寒熱在表以麻黃湯發散使腠理開通汁泄熱退而愈也凡內傷冷物者或陰勝陽而為病寒或寒熱相搏而致腸胃陽氣怫鬱而為熱亦有內傷冷物而反病熱得汗泄身涼而愈或微而吐為中酸俗謂之醋心法宜溫藥以散之亦猶解表之義耳若久吞酸不已則不宜溫之宜以寒藥下之後以涼藥調之結散熱去則氣和也所以中酸不宜食枯滑油膩者謂令氣鬱不通暢也宜食淡味菜蔬能令氣通暢也所謂從寒治者如斯而已若謂本寒而用熱藥豈不誤耶素問東垣丹溪謂吞酸之同異丹溪曰或云吐酸素問明以為熱東垣又言為寒何也予曰吐酸與吞酸不同吐酸是吐酸水如醋平時津液隨上升之氣鬱積而成郁之既久不能疏散故從火化遂作酸味非熱而何其有鬱積之久不能自湧而出伏於肺胃之間咯之不止咽之不下肌表得風寒則內熱愈郁而酸味刺心肌表溫暖腠理開發或得香熱湯丸津液得行亦可暫解非寒而何素問言熱言其本也東垣言寒言其末也但不言外得風寒而作收氣立說又瀉肺金之實謂寒藥不可治酸而用安胃湯加減二陳湯俱犯丁香且無治濕熱鬱積之法為未合經意脈候脈浮緊為熱鬱於內寒束於外脈微遲者從寒治脈數者熱之甚也洪而數為熱痰在膈時吐酸水欲成反胃也治法久病火鬱吐酸宜辛溫發散經曰木鬱達之火鬱發之夫久病人脾胃虛弱屬郁者多此吐酸宜從東垣安胃之治是則熱因熱用之法也或謂東垣以吐酸寒誠不知東垣者也予觀前人立論如局方以溫熱之劑治酸不能使人不致疑於寒是未審經旨專為熱證也知此熱者惟劉河間一人耳新病吐酸當從寒味丹溪云凡吐酸吞酸皆屬於熱必用吳茱萸順其性而折之炒黃連炒梔子為必用之藥此則火以病酸而出治也故只從寒味須用茱萸亦順其火而折之者也知東垣者其惟丹溪乎吞酸證有火鬱宿食痰飲所因不同故有吐酸吞酸之異食鬱有痰二陳湯加南星黃芩治之藥方辛溫發散劑發明安胃散治脾胃虛弱不進飲食嘔吐酸水不得為熱人參二錢藿香丁香各一錢陳皮八分上為細末每服二錢薑湯調服加減二陳湯治痰飲為患吐酸頭眩或因食生冷脾胃不和丁香九粒半夏薑製茯苓陳皮去白甘草五分水二盞姜五片煎七分服丹溪茱萸丸治吞酸自利吳茱萸一兩泡過為末六一散一兩上以粳米飯丸梧桐子大每服五六十丸白湯下開鬱之劑三因曲末丸治中脘宿食留飲酸蜇心疼口吐清水神麯炒三兩陳皮蒼朮制炒上為細末生薑汁另煮神麯糊丸薑湯下一方有砂仁無神麯治熱作酸方劑連芩茱萸丸治濕熱吐酸黃連一兩炒黃芩炒吳茱萸湯泡各五錢蒼朮泔水浸七錢陳皮一錢上為末神麯糊丸綠豆大津下生料平胃散加神麯麥芽治吞酸宿食不化吐清水證有五因有因濕因痰飲因寒因宿食因蟲明知恣食生冷瓜果而作者為寒濕也胸膈間漉漉有聲者痰飲也飲食後而吐清水者宿食也但犯寒而作者胃寒也心腹時痛而作亦吐清黃水者蟲也宜類辨而治之大抵二陳湯加蒼白朮為必用之主藥二術二陳湯治一切嘔吐清水如注蒼朮土炒白朮土炒半夏滾水泡七次薑製陳皮去皮伏苓各一錢甘草炙五分上水二盞姜三片棗一枚煎八分稍熱服虛寒者加人參煨乾姜痰飲加南星倍半夏宿食加神麯砂仁有蟲者以治蟲法又方治吐清水蒼朮白朮茯苓陳皮滑石炒等分水煎服嘈雜門病機嘈雜為厚味太過內經曰胃為水穀之海無物不受若夫恣食濕面魚腥生冷以及烹飪厚味等物朝傷暮損而成清痰稠飲滯於中官故謂嘈雜噯氣吞酸痞滿漸久而成翻胃膈噎之證是也夫嘈雜之為證也倏爾腹中如火發腔內空空若無一物似辣非辣似飢非飢似痛不痛而有懊憹不自寧之狀得食暫止者是也其證有兼噯氣或兼噁心漸至胃脘作痛而成膈噎此其由也嘈雜乃火動其痰丹溪云有食鬱有熱鬱久熱甚而致於嘈雜乃火動其痰也用二陳湯加薑汁炒黃連炒梔子為必用之藥多加青黛脈候兩寸脈弦滑胸中有留飲寸脈橫者膈上有橫積右關弦急甚者木乘土位將成反胃關脈浮澀者為郁治法嘈雜不外痰火二字總是痰因火動令人心嘈如病飢實非飢也肥人痰多宜多加半夏蒼朮瘦人熱多宜多加姜炒黃連梔子濕痰氣滯不喜食用三補丸加蒼朮香附半夏之類有食鬱而熱二陳湯加神麯香附炒黃連治嘈雜用痰火藥過多不動者須從治之痰火藥中加紅豆蔻黃連多加薑汁炒藥方三聖丸治嘈雜神效白朮炒四兩黃連炒五錢橘紅一兩上為細末神麯糊丸綠豆大每服五十丸薑湯下二陳湯方見痰門三神丸方見虛損門曲末丸治痰飲嘈雜吞酸方見吐酸門香連丸治嘈雜火鬱瘦人尤宜服方見痢門術連丸治嘈雜白朮四兩土炒黃連一兩姜炒上為末神麯糊丸黍米大每服五七十丸薑湯下軟石膏丸治嘈雜噯氣軟石膏煅半夏制南星制香附子炒梔子仁炒各等分上為細末粥丸梧桐子大每服五十丸薑湯下和中湯治虛火嘈雜人參白朮陳皮半夏茯苓各一錢甘草五分黃連錢半姜炒大棗二枚水盞半加粳米一撮煎八分溫服噁心證戴氏云噁心者無聲無物心中欲吐不吐欲嘔不嘔氣至咽而復轉如人畏怕心中兀兀不自寧也雖曰噁心實非心病皆胃口之病也宜用生薑為君生薑大能開胃口豁痰丹溪云噁心證多是胃中有火有痰有虛宜六君子湯加薑汁黃連之類亦有胃受寒而噁心者宜用丁香理中之屬藥方大半夏湯治胃中痰火噁心半夏茯苓陳皮各等分水盞半姜七片煎八分食後服小半夏茯苓湯半夏三錢茯苓二錢水盞半姜七片煎八分或入薑汁和入煎一二沸熱服理中湯治胃中虛寒作惡方見脾胃門噯氣證內經名噫氣俗作噯氣今從之即飽氣有聲出是也病機內經曰心為噫又云太陽所謂上走心為噫者陰盛而上走於陽明陽明絡屬心為噫故曰上走心為噫也又曰二陽一陰發病主驚駭背痛善噫善欠也運氣所致噫氣曰少陰之復噫噦是也此熱傷心之所致也又曰太陽司天寒淫所勝善噫又曰太陽之復唾出清水及為噦噫是也此寒傷心之所致也噯為脾胃之氣不和有痰有火丹溪曰噯氣為胃中有痰有火春甫謂噯氣多是胃氣不和窒塞不通則噯氣何以見之凡人食飽後多有噯氣由飲食飽則胃不舒暢而致然也噫氣苦非食後則為胃虛而不和丹溪謂痰與火特一端耳醫者察之脈候右關弱短左關滑大此脾虛肝盛也寸脈緊而噫者屬寒寒在上焦胸中不得而噫寸口脈弱而緩者陽氣不足趺陽脈微而澀微無胃氣澀則傷脾寒在膈而反下之寒積不消胃微脾傷穀氣不行食已自噫胃氣不通為閉塞之病藥方十味保和湯治胃氣虛而滯作噯人參茯苓陳皮半夏薑製白朮各一錢藿香香附子砂仁各六分木香炙甘草各三分上水二盞姜三片棗二枚煎八分食前溫服本事枳殼散治心下痞悶作痛多噫氣如敗卵枳殼白朮各五分香附子一兩檳榔一錢上為細末每服二錢米飲調下日三服不拘時丹溪半星丸治痰火氣噯半夏制用姜南星同上軟石膏香附子梔子各等分上為末神麯為丸服針灸法脾經穴經云足太陰之脈是動則病腹脹善噫視其盛虛熱寒陷下取之也中脘馨氣證病機馨之邪從口入者宿食也病頭痛惡風憎寒心腹脹滿下利不欲食吞酸噫宿腐氣或四肢浮腫若胃實熱食停滯脈滑數宜下之若脾脈浮大按之反澀尺脈亦微澀宜溫而消之雜著以枳朮丸加姜炒黃連炒芍藥陳皮甘草石膏砂仁木香川芎之類腹中窄狹證病機丹溪云腹中窄狹肥人是濕痰流灌臟腑不升降宜燥濕二陳湯加蒼朮開鬱氣用香附瘦人是熱氣熏蒸臟腑宜二陳加黃連梔子之屬春甫治此用開鬱之藥多效惟痰與火被鬱則窄藥方加味二陳湯治腹中窄狹如縛方見痰門六郁湯加合證之藥最效方見郁門善悲證病機悲屬肺經曰在藏為肺在志為悲又云精氣並於肺則悲是也運氣悲皆屬寒水攻心經曰火不及曰伏明伏明之紀其病昏惑悲忘從水化也又云太陽司天寒氣下臨心氣上從善悲數欠又云太陽司天寒淫所勝善悲時眩僕又云太陽之復甚則入心善恐善悲治以諸熱是也原病式云悲屬金肺之志也金本燥能令燥者火也心火主於熱善痛故悲痛苦惱者心神煩熱肺金燥亂而非清淨也所以悲哭而五液俱出者火熱亢極而反兼水化制之故也藥方甘麥大棗湯治臟躁善悲傷欲哭象如神靈所作數欠申甘草三兩小麥一升大棗十枚上三味以水六升煮取三升分三服亦補脾氣本事方治一婦人數次無故悲泣不止或謂之有祟祈禳請禱備至終不效予記金匱有案云婦人臟躁悲傷欲哭象如神靈數欠申者甘麥湯治之盡劑而愈針灸法心腧穴在背經云邪在心則病心痛善悲時眩僕視有餘不足而調其腧也灸七壯勿飲涼冷厥陰經穴經云厥陰根於大墩結於玉英終於膻中厥陰為闔折則氣絕而善悲取之厥陰視有餘不足妊娠四五個月臟躁善悲傷每晝日慘慼淚下數欠申象如神靈禱與醫皆無效用仲景甘麥大棗湯一投而愈善太息即長舒氣而有聲也漢賈誼謂太息者是也俗謂之嘆息病機內經帝曰人之太息者何氣使然岐伯曰憂思則心系急心系急則氣道約約則不利故太息以伸出之補手少陰心主足少陽留之也又曰膽病者善太息口苦嘔宿汁視足少陽脈之陷下者灸之又云膽足少陽之脈是病則口苦善太息視盛虛熱寒陷下取之運氣善太息皆屬燥邪傷膽經云陽明在泉燥淫所勝病善太息又云陽明之復善太息嘔苦又云少陰司天地乃燥淒滄數至脅痛太息是也針灸法內經云善太息取心膽二經灸刺之甲乙經云色蒼蒼然太息如將死狀振寒溲白大便難中封主之脾虛令人病寒不樂好太息商丘主之凡好太息不嗜多食寒熱汗出病至則善嘔嘔已乃衰取公孫及井腧實則腸中切痛厥頭面腫起煩心狂飲多不嗜臥虛則䐜脹腹中氣滿熱痛不食霍亂公孫主之本集補心通氣散治憂思鬱結長太息人參石菖蒲橘紅米曲當歸姜梔子茯苓各一錢甘草五分香附八分水盞半姜三片煎七分服和劑溫膽湯治驚想得之而太息者方見驚悸門
