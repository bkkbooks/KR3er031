body:
  text: 卷之五十二消渴門病機三消敘論內經陰陽別論曰二陽結謂之消脈要精微論曰疸成為消中逆調論曰心移熱於肺傳為膈消也巢氏病源云夫消渴者渴不止小便多是也由少服五石諸丸散積經年歲石勢結於腎中使人下焦虛熱及至年衰血氣減少不復能制於石石勢獨盛則腎為之燥故引水小便而不禁也其病變多發癰疽此因熱氣留於經絡不引血澀故成癰膿消渴有病口甘者名為何何以得之此五氣之溢也名曰痹疸夫五味入於口藏於胃脾為之行其精氣溢在脾令人口甘此肥美之所發此人必素食甘美而多肥令人內熱甘者令人滿故其氣上溢為消渴厥陰之病消渴重心中疼飢而不欲食甚則欲吐蛔又云五臟六腑皆有津液若臟腑因虛實而生熱者熱氣在內則津液竭少故渴也夫渴數飲其人必眩背寒而嘔者因利虛故也內消候不渴而小便多者是為內消由腎氣虛耗熱之所作亦名腎消消渴由於脾不輸精而肺燥內經曰飲入於胃遊溢精氣上歸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也渴而飲水蓋是脾液不上榮於肺而肺獨燥故多飲易渴消渴有三焦受病之異病機論消渴之疾三焦受病也有上消中消腎消上焦受病多飲水而少食大便如常或小便清利知其燥在上焦屬於肺也又謂之膈消病也中焦受病渴而飲食多小便黃經曰熱能消穀知其熱在中焦屬於胃也又謂之消中下焦受病初發小便淋下如膏油之狀小便濁而有脂甚至面色黎黑形瘦而耳焦知其病在下焦屬於腎也又名腎消諸經皆燥熱為渴惟三焦為甚經云有心肺氣厥而渴者有肝脾而渴者有痹疸而渴者有腎熱而渴者有言胃與大腸熱結而渴者有言小腸疸熱而渴者有因病瘧而渴者有因肥甘美食而渴者有醉飽入房而渴者有因遠行勞倦遇大熱而渴者有因傷寒胃干而渴者有因病風而渴者雖五臟之部分不同而病之所因各異其為燥亡液一也獨三焦為病甚未必不由微而至於漸也易曰履霜堅冰至君子當謹其微也三消之疾為燥熱太過劉河間曰三消之疾本濕寒之陰氣極衰燥熱之陽氣太甚皆因飲食服餌失節腸胃乾涸而氣液不得宣平或耗亂精神過違其度或因大病陰氣損而血液衰虛陽慓悍而燥熱鬱甚或因久嗜咸物恣食炙爆飲食過度亦有年少服助陽金石丸散積久石熱結於下焦精液腎水不滋於上水火不相既濟遂成三消渴而引飲飲水多而小便亦多名曰上消若飲食俱多而不甚渴小便數消瘦者名曰中消若渴而飲水不絶腿消瘦而小便有脂液濁者曰腎消此三消者皆燥熱之亢極者也有消中熱中強中除中之異消渴病總為心火所乘肺金太燥故渴而引飲為氣旺血衰水不制火消中屬脾疸熱而有三者之異有困陰勝陽郁久為熱中經云脈洪大陰不足陽有餘則為熱中多食溲數為消中陰狂興盛不交精泄則為強中病至強中其亦危矣厥而白利食已即飢則為除中病至除中不可治矣消渴病因膏粱肥甘之變消渴雖有數者之不同其為病之肇端則皆膏粱肥甘之變酒色勞傷之過皆富貴人病之而貧賤者鮮有也凡初覺燥渴便當清心寡欲薄滋味減思慮則治可瘳若有一毫不謹縱有名醫良劑必不能有生矣脈候岐伯曰消渴脈實疾久可治脈弦小病久不可治脈經曰緊數相搏則為消渴脈軟而散者富病消渴又曰厥陰之為病消渴氣上衝心心中疼熱飢不欲食食則吐下之不肯止寸口脈浮而遲浮則為虛勞衛氣不足遲則榮氣竭趺陽脈浮而數浮則為氣數則消穀失堅緊數相搏則為消渴男子消渴小便反多以致一斗腎氣丸主之心脈滑為渴滑者陽氣勝心脈微小為消疸脈實大病久可治實堅大者死細而浮短者死治法治消渴養肺降火生血為主經云熱淫所勝治其甘苦以甘瀉之以辛潤之大法用黃連黃芩梔子石膏以瀉火天門冬麥門冬五味子以潤燥當歸地黃芍藥以生血黃柏知母人參枸杞子以補腎水之源天花粉葛根以止渴禁服半夏蒼朮生薑大料厚味更詳三焦分治其有不愈者乎治消渴分上中下三焦上消肺也多飲水而少食大小便如常東垣云膈消者舌上亦裂大渴引飲者是也以白虎加人參湯主之一云上焦渴是心火刑煉肺金所致宜降火清金以蘭香葉白葵花黃柏知母加升麻引清氣上升而渴自止春甫意謂降火潤燥而不效者宜升清氣中消胃也多飲食而小便黃東垣云中消者善食而瘦自汗大便硬小便數叔和云飲水多食疸成消中是也以調胃承氣湯三黃丸之類主之一云中焦渴飲食入胃傳送太急不生津液食已即飢胃中有火宜黃芩石膏主之下消腎也小便淋濁如膠油之狀東垣云下焦者煩躁引火耳輪焦乾小便如膏腎水竭也此為腎消宜六味地黃丸之類消渴屬熱有內外虛實之分夫消渴本乎熱也而熱有內外虛實之分若傳經之熱熱甚液耗而為渴者氣分受邪也當與寒涼淡滲之劑速清其熱熱去而陰生陰生而渴止矣若胃虛亡液陰虧而為渴者血受病也當與甘溫辛酸之劑滋溢其陰陰生而燥除燥除而渴已矣消渴未傳瘡疽中滿論總論所謂末傳能食者必發癰疽背瘡有能食者必傳中滿鼓脹皆為不治之證也東垣云末傳瘡疽者火邪勝也其瘡痛甚而不潰經曰有形而不痛陽之類也急攻其陽無攻其陰治在下焦元氣得強者生失強者死末傳中滿者以寒治熱雖方士不能廢繩墨而更治然臟腑有遠近心肺位近宜制小其服腎肝位遠宜制大其服皆適其至所為故如過與不及皆誅伐無過之地也如膈消中消制之太急速過病所久成中滿之病正謂上消未除中寒復生者也治斯疾者宜審之張潔古分治消渴能食而渴者白虎加人參湯不能食而渴者錢氏白朮散倍加乾葛之屬上中既平不復傳下消矣先哲用藥厥有旨哉治法總要當以白朮散養脾自生津液兼用好粳米煮粥以膂肉切細煮服以養腎則水有所司又用淨黃連末入雄豬肚中密扎於鬥米上蒸爛添些蒸飯臼中杵黏丸如梧桐子大每服百丸食後米飲下可以清心止渴藥方丹溪云三消者多屬血虛不生津液宜四物湯為主上消者本方加五味子人參麥門冬天花粉煎入生藕汁生地黃汁人乳飲酒人加生葛汁中消者本方加知母石膏滑石寒水石以降胃火下消者本方加黃柏知母熟地黃五味子之類以滋腎水當飲澡絲湯代茶消渴通治劑寶鑑麥門冬湯治消渴日夜飲水不止飲下即溲麥門冬黃連干冬瓜各一兩上咀分四劑每服水二盞煎一盞溫服無時當茶湯飲為妙冬瓜如無干者用新者一條重三斤去皮穰分作十二塊為十二服每服一塊日三四次東垣當歸潤燥湯治消渴舌上白乾燥唇乾口乾眼澀黑處見浮雲大便祕澀乾燥結硬喜溫飲陰頭短縮當歸酒洗升麻各錢半柴胡甘草半生半炙各六分黃柏知母石膏桃仁麻仁生地黃酒洗各錢半防風荊芥穗紅花各三分杏仁六枚小椒三粒作一劑水煎服地黃飲子治消渴咽乾面亦煩躁人參生地黃熟地黃天門冬去心麥門冬去心黃耆澤瀉石斛去根枇杷葉炙去毛枳殼炒丹溪無此味甘草炙各等分上咀每服五錢水盞半煎七分食後服河間大黃甘草飲子治男婦一切消渴不能止者大豆先煮二三沸淘去苦水再煮大黃一兩半甘草四兩一指長槌碎上用沸水一桶煎藥同煮三五時如稠強更添水煮豆爛軟為度盛於盆中放冷令病人食豆渴飲湯汁無時候食盡如燥渴止罷藥未止依前再煮食之不過三劑其病悉愈東垣和血益氣湯治口舌乾小便數舌上赤脈此藥生津液除乾燥當歸酒洗生地黃黃連黃柏酒炒升麻各一錢柴胡甘草半生半炙各四分麻黃根知母酒炒漢防己羌活杏仁去皮尖桃仁去皮尖各五分石膏六分紅花少許上水二盞煎一盞溫服忌酒醋濕熱麵食丹溪瓊玉膏治三消最妙方見咳嗽門局方清心蓮子飲治三消小便不清方見熱門局方黃耆六一湯治男婦諸虛不足胸中煩悸時常消渴或先渴而後發瘡或病諸瘡而後發渴者並宜服之方見自汗門宣明麥門冬飲子治膈消胸滿煩心津液少短氣久為消渴麥門冬去心生地黃人參五味子天花粉甘草炙知母茯神乾葛各等分上咀每服五錢入竹葉十四個煎服梅花聚香湯治消渴飲水日至石鬥極病者可服之立愈烏梅肉天花粉枇杷葉麥門冬五味子栝蔞子人參黃耆乾葛各一兩檀香半兩上為粗末每日用一兩煎湯一斗代茶水飲無時神仙減水法治三焦虛熱三消渴疾日夜飲水無度此藥主之人參天花粉知母宣黃連苦參麥門冬浮萍白藕豆黃耆各一兩黃丹一錢上為細末每服二錢新汲水調下妙梅蘇丸治消渴鬲熱能生津液白梅肉紫蘇葉烏梅肉各半兩麥門冬去心七錢百藥煎三兩訶子人參各一錢甘草炙兩半上為末煉黃臘為丸芡實大不拘時噙化一丸津咽路行解渴玉泉丸治煩熱口渴麥門冬人參茯苓黃耆半蜜炙烏梅肉焙甘草各一兩天花粉乾葛各兩半上為末蜜丸彈大每服一丸溫湯嚼下川黃連丸治消渴川黃連五兩天花粉麥門冬去心各二錢半上為末生地黃汁並牛乳和丸梧桐子大每服三十丸米湯下茯兔丸治消渴通用亦治白濁菟絲子制北五味子七兩白茯苓五兩石蓮肉二兩上為細末乾山藥糊丸梧桐子大每服五十丸米湯下丹溪四汁膏治三消止熱渴黃連末天花粉末各二兩牛乳汁藕汁生地黃汁生薑汁少許上以藕汁地黃汁熬膏入前三味搜和佐以薑汁和蜜為膏徐徐留舌上以白湯少許送下能食者加軟石膏天花粉三和甘露飲大治消渴每日進二服小便短澀者宜服之滑石石膏人參知母白朮茯苓豬苓澤瀉甘草各等分每服五錢水二盞煎一盞食遠溫服二消丸治消渴骨蒸宣黃連去毛淨不拘多少為末上取東瓜自然汁和連末成餅陰乾再碾為末用冬瓜汁為丸如梧桐子大每服五十丸用東瓜湯送下或大麥湯下亦可硃砂黃連丸治心虛蘊熱或因飲酒過多發為消渴辰砂一兩宣連三兩生地黃二兩上為細末煉蜜丸梧桐子大每服五十丸食前燈心棗湯下枇杷葉炙去毛栝蔞根黃耆乾葛蓮房甘草炙各一錢上水二盞煎一盞食前服小便不利者加茯苓黃耆湯治諸渴黃耆蜜炙茯苓栝蔞根麥門冬生地黃五味子甘草炙各一錢水煎溫服天花散治消渴天花粉生地黃麥門冬乾葛各二錢五味子甘草各一錢上作二服每服水盞半粳米百粒煎一盞食遠服烏梅五味子湯治消渴生津液烏梅五味子百藥煎巴戟去心酒浸甘草炙各二錢上作二服水二盞煎一盞空心服參耆湯治消渴人參桔梗天花粉甘草各兩半黃耆鹽湯炒白芍藥白茯苓五味子各一兩上咀每服五錢水盞半煎一盞日四進栝蔞散治壯盛時不自謹瓷情縱欲年長腎氣虛弱不能房事多服丹石真氣既盡石氣孤立唇口焦乾津液自泄小便赤黃大便乾實小便日夜百十行當除熱補虛天花粉宣黃連白藕豆白茯苓寒水石甘草節人參白朮石膏豬苓各等分為細末每服二錢白湯調下玉壺丸一名天花丸治消渴引飲無度人參天花粉各等分上為末煉蜜丸梧桐子大每服三十丸棗門冬湯下降心湯治心火上炎腎水不濟煩渴引飲氣血日消天花粉人參當歸遠志去心生薑汁拌焙乾白茯苓黃耆炙川芎北五味子熟地黃甘草炙各五分水二盞棗二枚煎服天王補心丹寧心保神益血固精壯力強志令人不忘清三焦化痰涎祛煩熱療咽乾口燥育養心氣方見虛損門加減三黃丸治消渴及治服丹石毒致成此疾黃芩春四兩夏六兩秋六兩冬三兩黃連春四兩夏七兩秋三兩冬二兩大黃春三兩夏一兩秋二兩冬四兩上為細末煉蜜丸梧桐子