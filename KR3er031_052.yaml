麥門冬熟地黃黃耆五味子雞䏶胵酒炒肉蓯蓉山茱萸肉破故紙炒各七錢半茯苓地骨皮人參玄參牛膝酒浸各兩半上為末煉蜜丸梧桐子大每服三十丸米飲下蓯蓉丸止消渴補心腎黃耆鹽湯拌蓯蓉酒洗巴戟酒浸澤瀉龍骨菟絲子酒煮磁石煅淬茯苓桂心萆薢鹿茸去毛酥炙牛膝熟地黃遠志破故紙少山藥炒杜仲制茯苓石斛五味子山茱萸肉覆盆子各一兩附子炮去皮臍八錢上為末煉蜜丸梧桐子大每服五十丸空心米飲下珍珠粉丸治腎消白液隨溲而下或夢遺精滑黃柏一斤新瓦炒令褐色蛤蚧一對酥炙上為細末水丸梧桐子大每服五十丸食前溫酒下祕方補腎地黃丸降心火補腎水治消渴除骨蒸壯筋骨明目生地黃半斤酒浸二百蒸爛研膏與黃柏拌曬乾黃柏一斤銼細與地黃同拌曬天門冬麥門冬人參枳殼條芩當歸熟地黃甘菊各二兩上為末煉蜜丸梧桐子大每服七十丸空心溫酒下酣飲消渴證烏梅木瓜湯治飲酒積熱酷毒熏蒸五臟津液枯焦血泣小便並多肌肉銷爍好飲冷漿木瓜烏梅打碎不去仁麥芽炒草果甘草各等分每服七錢水二盞姜三片煎八分溫服白豆蔻湯治酒毒消渴黃連葛根天花粉麥門冬各一錢五味子白豆蔻陳皮各五分黃柏甘草各七分上水二盞葉葉二十個煎一盞溫服強中消渴證消爍肌肉如蟲之蝕此乃膏液之滿諸方書謂之強中宜大建中湯治之大建中湯治蠱病小腹急痛便尿失精溲出白液此真精不守黃耆蜜炙遠志去心當歸酒浸澤瀉各一錢人參龍骨甘草炙芍藥各一錢上咀作二服每服水二盞姜三片煎八分食前服此證脾風傳腎名曰疝瘕小腹冤熱而痛出白液一名蠱蠱者事也在蠱卦上艮下巽以少男而惑於長女消爍脂肉如蟲之蝕日見損削乃膏液之消也諸書謂之強中或謂之脾消又謂之消腎其證脾消者飲食入腹如湯潑雪隨小便而出皆旋結而白如脂肌肉日漸消瘦不能起止精神恍惚口舌焦乾若不早治必至虛陽興盛不交而泄是為強中斃不久矣二石薺苨湯治強中多因耽嗜色欲或服丹石真氣既脫致消渴飲水飲食倍常虛陽常興不交自泄乃中焦虛熱注於下焦三消之中最為難治石膏薺苨各一兩半人參茯神磁石煅葛根黃芩栝蔞根知母甘草各一兩上水五盞豬腎一具去脂膜黑豆一合同煮至一半去腎並豆入藥五錢在盞內再煎八分空心服下焦熱夜間服薺苨丸治強中為病虛陽盛舉不交精泄及服丹石致成此疾薺苨大豆茯神栝蔞根人參知母各半兩上為末用豬腎一具煮爛搗和丸梧桐子大每服五十丸空心鹽湯下入少酒糊丸亦好紫蘇湯治消渴後遍身浮腫心膈不利紫蘇桑白皮赤茯苓各一兩郁李仁去皮炒三兩羚羊角檳榔各三錢桂心枳殼麩炒獨活木香各二錢上咀每服四錢水盞半姜三片煎八分溫服瞿麥湯治消渴飲成水氣面目並足膝脛俘腫小便不利瞿麥穗澤瀉滑石各半兩防風三錢黃芩大黃各一錢桑螵蛸炒十四枚上咀每服三錢水一盞煎七分空心溫服良久再服葶藶丸治消渴後成水病浮腫甜葶藶隔紙炒栝蔞仁杏仁炒漢防己各一兩上為末煉蜜丸梧桐子大每服三十丸食前赤茯苓湯下藍葉散治渴痢口乾煩熱背生癰疽赤焮疼痛藍葉升麻玄參麥門冬黃耆葛根沉香赤芍藥犀角屑甘草各一兩大黃二兩微炒上咀每服四錢水一盞煎六分溫服玄參散治渴利煩熱生癰疽發背焮腫疼痛玄參芒硝大黃微炒犀角屑羚羊角屑沉香木香黃耆各一兩甘草三分上為細末每服二錢溫水調下忍冬丸治渴疾愈後預防疽發忍冬草不以多少根莖花葉皆可用一名金銀花一名左纏藤洗浮用上用米麴酒於瓶內浸以糠火煨一宿取出曬乾入甘草少許為末即以所浸酒煮糊為丸如梧桐子大每服五十丸至百丸酒飲任下一方以忍冬草煎服此藤凌冬不調三月開花五出黃白相間微香外科精要不犯鐵器將煮酒久窨取服治一切風疾癰疽惡毒仍可治五腫飛尸五痔諸漏並能止渴真奇效易簡諸方桑椹治渴疾最效桑椹熟時盡意食之牛乳治消渴細細呷之效蘿蔔汁時飲少許澡絲湯治渴神效煮繭絲湯收貯入罐密封罐口埋地中任經數年愈久愈好遇渴疾取飲之頓效家無蓄者旋用絲綿煮湯服天花粉治消渴之聖藥大忌半夏不宜發汗及利小水一方治消渴用糯米二升淘取泔水隨意飲之渴止勿服一方治渴用黃連一雨水一碗煎半碗頓服之立止一方用栝蔞三十斤水一石煮取一斗半去渣以牛脂五合煎水盡以暖酒先服如雞子大日二服效一方用田螺五升水一斗浸經宿飲之每日易食醫心鏡治上焦煩渴和中補脾利大腸解酒毒以甘蔗削去皮截寸長食後嚼之止渴一方用淡豉煮汁任性飲之一方治消渴小便多飲水無度用雉雞一隻去毛細切合鹽豆豉作羹食之效或煮爛取汁二升飲之並食肉尤妙一方治渴不止用白花鴿一隻去毛以蘇煮之飲汁一方治熱渴以甜瓜去皮食後徐徐吃之煮皮作羹亦佳一方用冬瓜搗取汁飲之或煨熟搗尤妙經驗方治消渴下元虛損牛膝五兩細銼同生地黃汁五升夜浸日曝以汁盡為度干為末丸梧桐子大空心溫酒下三十丸久服壯筋骨駐顏黑髮津液自生衍義方用栝蔞實九月十月取穰以乾葛粉拌焙乾砂鍋內慢火炒熟為度研末食後夜臥以沸湯點二錢大治肺燥熱渴濟衆方烏梅肉二兩微炒為末每服二錢水二盞煎一盞入豆豉二百粒煎至半盞臨臥服濟衆獨聖散治消渴出子了蘿蔔二枚淨洗薄切日乾為末每服二錢煮豬肉汁澄清調下食後並夜臥日三服聖惠方治消渴葛粉四兩先以水淘粟米半升濾出與葛粉同拌令勻煮粥食之又方霜降後取葵根皮一握水一斗煮三升服之酒渴傷寒妙一方晚蠶砂為末每服二錢冷水調下肘後方治大渴日飲水數斛小便赤澀者麻子一升水三升煮數沸取汁飲之無限日飲數升效道藏經治消渴用雄牛穿鼻橫木燒炭存性為末酒調一錢不拘時服或挫煎湯一方治消渴不止大豆五升粉草四雨大黃一兩半銼用水一桶煮三五時豆軟盛於盆中放冷令病人食豆渴飲湯汁食盡未已再煮服如前必愈食醫心鏡治消渴凡飲粱米陳粟米麥米煮粥飲食之為妙一方用花梨多食之止渴飲酒人甚佳無病人不宜多食本草云治消渴收百草頭上露水飲之瘥一方治消渴甚重者取市上衆人溺坑水一盞服勿令患人知不過三次瘥唐本注云消渴不止小便急數以羊肺一具用小豆菜一把煮熟不拘時服之良一方止渴利小便苦筍煮熟任意食之崔元亮方治消渴羸瘦小便不禁兔骨和大麥苗煮汁服效經驗方牛肉味甘平無毒止消渴安中益氣養脾胃牛肚醋煮和汁食之主解消渴牛腦子牛乳食之尤良一方用緑豆汁煮飲之止消渴養生導引法凡人睡臥勿張口久成消渴及失血赤松子云臥閉目不息十二通治飲食不消
