者即愈瀉痢者只一服見效惟熱痢熱瀉不用此方木香破故紙良薑砂仁厚朴制各七錢半赤芍藥陳皮官桂白朮各半兩吳茱萸胡椒各一錢半肉豆蔻四個麵包煨檳榔一兩上為細末煮豬肝和藥搜勻仍用此硬糊為丸如梧桐子大每服五七十丸空心米飲下白朮調中丸治脾胃不和心下堅滿脅腹脹痛噫宿腐氣霍亂吐瀉米穀不化久痢赤白膿血相雜多日羸瘦不食白朮神麯炒四兩人參茯苓豬苓澤瀉各三錢木香二錢官桂錢半甘草炙乾薑炮各一兩上為末麵糊丸梧桐子大每服五七十丸空心淡薑湯送下外灸膏治一切虛寒久痢赤白或時腹痛腸滑不禁可用此法木香附子炮蛇床子吳茱萸胡椒川烏各等分上為細末每三錢和麵二錢用生薑汁調作餅貼臍中上以油紙掩定復以衣服帛蓋之以尉斗盛火尉之痢止為度治禁口痢劑百選石蓮散治禁口痢甚妙石蓮子去殼皮不拘多少將肉並心微炒研為細末上每服二錢陳米飲調下便覺思食此疾蓋是毒氣上衝心氣不通所以不食服此藥後心氣通利當頓下而愈一方用乾山藥銼如小豆大一半砂鍋炒一半生用共為細末每服二三錢米飲下治禁口痢如神淡寮敗毒散治禁口痢毒氣上衝心肺者方見前敗毒散末四錢陳倉米二百粒上水盞半姜三片棗一枚煎服丹溪香連蓮肉散治禁口痢胃口熱甚香連丸為末一錢石蓮肉為末一錢上二味用米湯調下參連菖蒲湯治禁口痢但得一呷下咽便愈人參一錢黃連一錢姜炒石菖蒲八分石蓮子一錢上為末水二盞煎一盞終日細細呷之如吐又服但得一呷下咽便好要封臍引熱下行用螺肉搗碎入麝香少許盦臍上一法用木鱉子研雄黃少許貼臍中亦妙一法用東方日照壁土炒陳皮為末每服一錢薑棗煎湯調下一法用芥菜子三錢擂成膏貼臍上集成禁口丹治禁口痢亦治痢瀉而吐食枇杷葉十片蜜炙砂仁十枚上為末熟蜜調抹口上又方白朮半兩肉豆蔻二兩煨木香二錢上為末用白麵二兩和藥末成劑切作細麵條水煮熟蔥白生薑鹽調和之食之妙痢疾雜治方劑丹溪加朮二陳湯痢後腰痛兩腳無力陳皮半夏制白芍藥各一錢二分茯苓蒼朮當歸酒芩各五分白朮甘草各一錢上咀作一服加薑棗煎食前服丹溪蒼朮黃柏丸治痢後腳弱漸細者蒼朮龜板酒炙白芍藥各二兩黃柏酒炒半兩上為末粥丸梧桐子大每服五十丸食前四物陳皮甘草湯下良方茯苓湯治痢後遍身浮腫赤茯苓白朮微炒各一兩防己桑白皮黃芩射干澤瀉各二兩澤漆葉上咀每服五錢七分先以水三盞煮大豆一合取二盞去滓內藥煎取一盞分為二服未瘥頓服兩料良方消痞丸治痢前腹脹陳皮去白青皮去穰各一兩木香二錢蒼朮制炒四兩上為末醋糊丸梧桐子大每服二十丸空心食前溫酒下倉米飲治痢後大渴不止欲飲水陳倉米二合水淨洗上水二盞煎至一盞去滓空心食前晚下各一服茜根散治血痢心神煩熱腹中痛不納食茜根地榆生地黃當歸犀角屑黃芩各一兩梔仁半兩黃連二兩微炒上咀每服五錢水盞半入豉五十粒韭白七寸煎六分去渣服鬱金散治一切熱毒痢疾下血不止川鬱金槐花炒各半兩炙甘草一錢上為細末每服二錢食前豆豉湯調下伏龍肝丸治血痢腹痛四肢羸弱伏龍肝艾葉炒木香地榆阿膠炒珠當歸焙黃連赤芍藥黃芩一兩上為細末蜜丸梧桐子大每服三十丸飲酒下易簡諸方一方治熱毒下血痢久不已用當歸黃連各三錢烏梅五個煎一盞空心服一方治大熱毒純血痢用宣黃連六兩水七升煮三升半夜露星月下平旦空腹頓服一方治赤白痢用艾葉醋煎服或入生薑同煎止一切瀉痢亦止腹痛及五臟痔血瀉一方治瀉痢裡急後重用黃連末一錢乾薑末五分空心米飲調下一方治患痢日久津液枯竭四肢浮腫口乾用冬瓜一枚以黃土泥厚五寸煨令爛熟去土絞汁服之一方治冷熱痢用甜菜絞汁服之又能止血生肌人及禽獸有傷折敷之立愈一方治一切痢並腹痛用馬齒莧切細煮粥食之一方治赤白痢用酸石榴皮炙黃為末棗肉丸如芡實子大空腹吞三丸日二服一方治痢後氣滿不能食用赤小豆煮一頓食之即愈一方治痢用龍骨為末米飲丸每服十丸一方治腸風血痢用鯽魚一個滾白礬燒灰存性為末米飲下一方治下痢有血用柏葉四兩芍藥兩半二味微炒為末每服二錢水一盞煎五分溫服無時日三服一方治白膿痢用白石脂為末用醋糊丸每服十丸米飲下一方治下痢不可禁止諸藥不效殊死者羊子肝一具去脂切作片摻上白礬末緩火炙熟空心食之一方治一切惡痢用白頭翁一名野丈人煎湯服之愈一方治血痢用黑木耳燒灰存性每服二錢冷水調服或以姜醋煮木耳食之亦妙一方治久痢水穀不消者用枳實為末每服二三錢米飲調下日三服療小兒痢疾尤妙一方用枯白礬一兩乳香四錢麝香少許黃丹一兩炒過研細淨黃丹一兩溶開投末藥攪勻丸如梧桐子大每服五七丸空心服紅痢甘草湯下白痢乾薑湯下瀉泄煨生薑湯下一方用枯白礬同五倍子等分為末每服三十丸效一方治血痢用鹽一兩濕紙裹燒透研細作三次粥飲調下一方治痢用雞腸草搗汁入蜜和服一方治禁口痢用紅木槿花去蒂陰乾為末先用面煎餅兩個以末摻上食之先以湯灌開其胃口一方用鹽梅一個去核和好茶末一二錢醋湯調服一方治熱病吐下水及下痢身冷脈微發燥不止附子一枚去皮臍分作八片入鹽一錢水一升煎半升不拘時溫服立效一方治男子惡痢膿血腹痛積熱毒昔有一人患此忽見水浸甜瓜心酷喜之連皮食數枚膿血皆已人言下痢無正形治痢亦無正條也痢疾多因暑濕燥火為原所以甜瓜亦能效也神效散治新舊赤白痢疾用鹽霜梅三個以黃泥包於慢火內煨乾研為細末用米湯調下一方治赤白痢歌曰三片生薑三個棗一個烏梅三寸草更加粟殼與陳皮赤白痢疾一時掃一方治赤白痢歌曰時行赤痢不難醫甘草榴皮並橘皮蜜炙隔年罌粟殼烏梅煎服自能除一方治酒痢歌曰白芷百草霜黃耆建中湯更加白芍藥枳殼去中穰同碾極細末調服用薑湯聖惠方治熱痢不止搗車葉取汁一盞入蜜一合煎分作二服一方治赤白痢疾以蔥一握切和米煮粥空心食之肘後方治下痢積久不瘥腸垢已出以梅實二十個水一盞煎六分去渣食前分為二服又方治赤白痢下水穀不消以曲熬粟米粥食之方寸匕日四五服止又方治赤白痢疾名姜墨丸乾薑好墨各五兩為末以醋糊丸梧桐子大每服三十丸加至四五十丸米飲下日夜五六服妙又方治赤痢熱下久不止用黃連末雞子白丸米飲服十丸二十丸瘥千金方治暴痢小鯉魚一枚燒為末米飲服之立效又方治痢用薤白一握細切煮粥食又方用薤菜根葉燒灰存性為末調服極效經驗方治赤白痢取香椿白皮洗淨日乾為末飲調二錢又方治暴痢用蒜搗爛貼兩足心又方治赤白痢用甘草一尺炙劈破以淡漿水蘸二三度又以慢火炙之生薑去皮半兩二味以漿水一升半煎八合服效集驗方蜀沙門傳水痢以訶梨勒三枚麵裹煨去面取訶藜肉為末飯丸米飲空心下百醫百效葛氏方治重下此即赤白痢也炒豉令小焦搗服一合日三服又豉炒令焦水一升淋取汁令服冷則酒淋日三服效又方治卒腹痛下赤白痢數日不止以雞卵一枚取出黃去白納胡粉令滿殼燒成屑以酒調一錢匕外臺祕要治痢下白膿不止用好麵炒上一味搗篩煮米粥內面方寸匕此療瀉百行師不救者也本草方古磚熱燒之主下部久患白痢膿泄下以物裹上坐之入秋小腹多冷者亦用此古磚煮汁服之楊氏産寶治赤白痢用檾麻子一兩炒令香熟為末以蜜漿下一盞不過再服千金翼方治赤白痢積年不瘥飲調雲母粉方寸匕兩服立效又方用雞子醋煮熟空腹食之治久赤白痢又方用乾薑急於火內燒黑不可成灰放瓷瓶中閉冷為末每服一錢米飲調下又方治暴瀉痢百草霜末米飲調下二錢斗門方治瀉痢用白石脂乾薑二物停搗以百沸湯和麵為稀糊搜勻丸如梧桐子大暴乾飲下三十丸久痢不定更加三十丸霍亂者漿水為使孫真人備急方治久痢臍下痛用吳茱萸一合黑豆湯吞之效孟詵方治赤白痢腹痛用酸石榴一枚並子搗汁頓服之張仲景云治赤痢無問遠近小腹痛不可忍出入無常下重及痛悶每發麵青手足俱變者黃連一兩淨好膠一片手許大蠟如彈子大三味以水一升先煎膠令散次下蠟又煎令散即下連末攪和分三服須要熱吃冷即難吃神效炙雞散治脾胃氣虛腸滑下痢以黃雌雞一隻制如食法以炭火炙之捶了以鹽醋刷之又炙令極熟燥空腹服之阿芙蓉天方國傳治久痢不止及一切虛寒證候打溝陰水種紅罌粟花於畦上勿令水淹頭至七八月間於花卸後三五日其殼即罌粟殼於午後殼上用大針刺開外面青皮裡面硬皮不動或三四處次日早津出用竹刀刮收入瓷器內陰乾每用小豆大一粒空心溫水化下忌蔥韭蒜漿水如熱渴用蜜水解之小兒黃米大一粒虛寒者加後藥如阿芙蓉一錢其藥每味一錢俱為末蜜和丸梧桐子大每服一丸溫水下瓦雀腦蓽茇丁香胡椒草果附子炮胡蘿蔔子肉豆蔻煨醫案丹溪治一人飲水過多腹膨脹瀉痢帶白用蒼朮白朮滑石厚朴茯苓作湯下保和丸而愈一人病甚窘迫正合承氣證豫曰氣口脈虛形雖實而面黃白必平昔過飽傷胃遂以人參白朮陳皮芍藥十餘帖三日後胃氣稍完與承氣湯二帖而安若不先補雖愈未免困憊一人久痢不愈脈急促沉弦細弱右為甚下清涕有紫黑血絲豫曰此瘀血痢也或問瘀血之因豫曰凡飽後疾走或力叫號毆跌多受疼痛大怒不泄補塞太過火酒火肉皆能致之此人因非理受責故也乃以乳香沒藥桃仁滑石佐以木香檳榔丸米湯下百丸再服大下穢物如爛魚腸者二三升愈一人面白脈弦數獨胃脈沉滑因飲白酒作痢下淡水膿血腹痛小便不利裡急後重以參白朮為君甘草滑石木香檳榔蒼朮為佐煎湯下保和丸二十丸次日前證俱減獨小便不利再服益元散數服而愈一人患痢腹微痛所下褐色後重並頻食減或微熱脈弦澀似數而長喜不浮大神氣不減豫曰此憂患所致心血虧脾氣弱耳以參術為君當歸陳皮為臣川芎芍藥茯苓黃連為佐使而愈一人年壯味厚夏秋患痢腹大痛或令單煮乾姜與一帖痛定屢痛屢服屢定八日服乾薑二斤脈弦而稍大似數豫曰必醉飽後吃寒涼太過當作虛寒治之因服乾薑多以四物加參朮陳皮酒紅花茯苓桃仁去地黃煎入薑汁飲之一月而安一人年近五十質弱多怒暑月因大怒患痢口渴自飲蜜水病緩數日後脈稍大不數令以參朮湯調益元散服之痢減數日後倦甚發厄逆之甚久下陰虛令守前藥利尚未止以煉蜜食之衆欲用姜附豫謂陰虛服之必死待前藥力到自愈又四日厄止痢除虞天民治一人年五十夏秋得痢疾月餘服藥少愈穢積已去但食少晝夜五六次如廁兼脫肛諸藥不效用池塘中鱉一個如法制用生薑多加再以米糒作羹入砂糖小塊不用鹽醬煮熟吃一二碗三日不登廁大腸自此實矣此證因用涼藥脾肺俱虛茲因用鱉以裨脾姜辛以補肺大腸亦實而收起也
