body:
  text: 卷之三十六滯下門大便急迫欲出而不通故曰滯下泄俗謂之痢下此反說也故從古病機滯下敘論夫滯下者古之義曰痢疾者今之名內經曰溲當有澀字而便膿血言病機也知氣行而血止也言治法也又曰諸下痢皆屬於濕又曰下痢稠黏皆屬於火又曰下痢膿血滯下皆熱證實證也三因陳氏云痢疾有從外感而得者須分六氣之異外既受傷腸胃結郁遂成赤白等證當從其氣血虛實以調之有因臟氣發動干犯腸胃而得者須察其何臟相乘以平治之有因飲食失節而得者則又審其何物所傷以消克之世之感此疾者其因誠不越乎是三者但其受病之後腸胃怫鬱膿血稠黏裡急後重諸方雖有寒熱虛實之論劉河間則以為熱內經亦以熱多而寒少學者當察其脈證隨變而藥之庶萬全也痢疾是飲食積滯濕熱為源戴氏云痢疾之源皆由腸胃所受飲食之積余不盡行留滯於內濕蒸熱穢鬱結日深伏而不作時逢炎暑大行相火司令又以調攝失宜復感酷熱之毒至秋陽氣始收火氣下降蒸發蓄積而滯下之證作矣瀉痢不可混言其證夫瀉痢不分兩證混言濕熱不利小便非其治也夫瀉者水穀濕熱之象也滯下者垢穢之物同於濕熱而成治分兩歧而藥亦異若淡滲之劑功能散利水道濁流得快使瀉自止此有無之形豈可與滯下混同論治而用導滯可乎其下利出於大腸傳送之道了不幹於胃氣所下有形之物或如魚腦或如豆汁或便白膿或下純血或赤或白或赤白相雜若此者豈可與混同論治而用淡滲利之可乎痢疾以赤白分寒熱之誤原病式曰或言下痢白為寒者誤也若果為寒則不能消穀何由反化為膿也所謂下痢谷反為膿血如世之谷內果菜濕熱甚則自化腐爛潰發而為膿血也其熱為赤屬心火故也其濕為黃屬脾土故也燥郁為白屬肺金故也經曰諸氣憤郁皆屬於肺謂燥金之化也然諸瀉痢皆兼於濕今反言燥者謂濕熱甚於腸胃之內而腸胃怫鬱結而又濕至於否以致氣液不得宣通因以成腸胃之燥使煩渴不止也假如下痢赤白俗言寒熱相兼其說尤誤豈知水火陰陽寒熱者猶權衡也一高則必一下一盛則必一衰豈能寒熱俱盛於腸胃而同為痢乎如熱瘡瘍而出白膿者豈可以白為寒乎其熱之傷於氣分屬肺金故色白也其熱之傷於血分屬心火故赤也脾為黃肝為青腎為黑各隨五臟之部而見五色是其標也本則一出於熱但分淺深而已大法下迫窘痛後重裡急小便赤澀皆屬燥熱而下利白者多有之然則為熱明矣痢疾裡急後重是為氣滯不得宣通機要云裡急後重大腸經氣不宣通也宜用木香檳榔以宣通其氣原病式云裡急後重窘急迫痛也火性急速而能燥物故也玉機微羲云夫裡急後重其證不一有因火熱者所謂火性急速而能燥物是也有因氣滯此大腸經氣壅而不宣通也有因積滯壅盛者是有物結墜也有因氣虛者此大腸氣降而不能升也有血虛者所謂虛坐努責是也治法火熱者寒之清之氣滯者和之積滯者去之氣虛而降者升舉之血虛者補養之宜各察其所因也痢疾腹痛總為不和機要云腹痛者和之如發熱惡寒腹不痛藥加黃芩為主腹痛甚者加當歸倍芍藥玉機微義云泄利腹痛其證甚多有因內氣結滯有因積滯有因寒熱有因血虛亦宜察脈隨證調理惟和之一字可總言之若加當歸芍藥惟血虛可用痢疾厄逆嘔逆候痢疾而嘔吐厄逆者機要以為胃氣不和此特其一也玉機云有因胃火陰火上衝有因胃虛積滯所致丹溪亦以為氣自下衝上屬火之象滯下之久而見此證多是陰火所乘陽虛陰脫不相既濟為難治禁口利是邪熱窒於胃口而然玉機微義云禁口利乃胃中濕熱之毒熏蒸清道而上以致胃口閉塞而成禁口之證亦有誤服澀熱之藥而邪氣停於胃口者時疫作痢當察運氣良方云有一方一家大小傳染所痢相似是疫毒痢也治法須當察運氣之相勝亦不可狎泥當先視其虛實兼運氣而施治斯為兩全而當矣不伏水土而成痢候巢氏病源云四方之氣溫涼不同隨方嗜欲因以成性若移其舊土多不習伏必因飲食以入腸胃腸胃不習便為下痢故名不伏水土痢也即水穀痢是也邪氣相乘而為休息痢候休息痢者乃乍作乍止或因邪氣未曾滌盡遽止而復作者是也有因初愈不禁飲食恣用厚味及妄作勞而復作者是也凡犯此者皆名休息穀道蟲痢候病源穀道蟲者由胃弱腸虛而蟯蟲下乘之也穀道肛門大腸之候蟯蟲者九蟲之內一蟲也在於腸間若腑臟氣實則蟲不妄動胃弱腸虛則蟯蟲乘之輕者或癢或蟲從穀道中溢出蟲狀極細形如蝸蟲重者侵蝕肛門而瘡爛也脈候內經曰腸澼便血身熱則死寒則生又曰腸澼下白沫脈沉則生浮則死腸澼之候身不熱脈不懸絶滑大者生懸澀者死以藏期之又曰陰陽虛脫腸澼死泄而脫血脈沉微手足逆皆難治脈經曰腸澼下膿血脈沉小流連者生數大發熱者死又腸澼筋攣脈細小安靜者生浮大堅者死嚴氏曰凡下痢之脈微小者生浮洪者難治腸澼下膿血滑軟者生弦急者死仲景云下痢脈沉弦者重脈大者為未止脈微弱者為欲自止雖發熱不死下痢手足厥冷無脈者灸之不溫脈不出者死下痢有微熱而渴脈弱者令自愈下痢脈微數有微熱汗出令自愈脈緊未愈下痢脈滑而數者有宿食也宜下之下痢脈微遲痛未止宜溫之治法治痢通因通用之法夫痢疾滯下實由濕熱鬱久食積停滯而後滯下之疾作焉初須通因通用之法以滌去腸胃積滯然後調和胃氣則可愈矣若不疏滌便欲止之雖愈必發此其所以為休息痢者是也治痢要察新久虛實痢疾初起須去邪久而虛者必是滑脫下陷須提升澀脫方可愈也若初疏滌過而邪氣尚未盡除脈猶弦急其人壯健須再下之治痢溫補要合時宜原病武云或曰白痢既非寒病何故服辛熱之藥亦有愈者邪蓋辛熱之藥能開發腸胃鬱結使氣液宣通流濕潤燥氣和而已此特其一端也甚至先曾通瀉或因涼藥太多氣虛下陷脈微沉細四肢厥冷即宜溫補升陽益胃湯乾薑理中湯之屬是也夫治初痢者當以苦寒治之或略加辛藥佐之則可蓋辛能發散開鬱如錢氏香連丸之類是也至云概不可用熱藥亦非治法通變之精妙也故曰治痢溫補要合時宜東垣治痢法機要云後重則宜下腹痛則宜和身重則除濕脈弦則去風膿血稠黏以重劑竭之經云在下者引而竭之如大承氣湯加滑石之類是也身冷自汗以熱藥溫之如通滌太過脾胃虛寒脈微發厥以理中湯加吳茱萸木香之屬風邪內結宜汗之鶩溏而痢宜溫之又云在外發之在裡者下之在上者湧之下陷者舉之小便澀者分利之又云盛者和之去者送之至者止之兵法云避其鋭氣擊其惰歸此之謂也祕藏云假令傷寒飲食䐜脹滿而飧泄者宜溫熱之劑以消導之傷濕熱之物而成膿血者宜苦寒之劑以內收之風邪下陷者升舉之濕氣內勝者分利之裡急者下之後重者除之調之腹痛者和之洞瀉腸鳴無力不及黏衣其脈弦細而弱者溫之收之膿血稠黏至圊而不能便其脈洪大而有力者寒之下之溫澀藥不宜早用仲景云治痢可下者悉用承氣等湯大黃之寒其性善走佐以厚朴之溫善行滯氣緩以甘草之甘飲以湯液灌滌腸胃滋潤輕快積行即止局方用砒丹巴硇類聚成丸其氣凶暴其體滯積氣雖行而毒氣留連縱有劫病之效而腸胃清純之氣寧無損傷之患乎久而可用溫藥者乃用姜附溫之局方例用熱藥為主澀藥為佐甚非理也故云通劑宜早溫澀宜遲此因時制宜之妙用也凡先瀉而後痢者逆也又復通之而不已者虛也脈微遲者宜溫補脈弦數者為逆主死腹痛以白芍甘草為君當歸白朮為佐惡寒者加桂惡熱者加柏皮腹痛因肺金之氣鬱在大腸之間以苦梗發之後用痢藥初痢腹痛切不可驟用溫藥補藥薑桂參術之屬惟久痢氣虛胃弱而後用之可也後重者乃積與氣墮下之故兼升兼消尤當和氣木香檳榔丸保和丸之類身熱挾外感不惡寒者用小柴胡去人參發熱惡寒身首俱痛此為表證宜微汗和解之以蒼朮川芎陳皮芍藥甘草生薑煎服發熱不止者屬陰虛用寒涼藥兼升藥溫脾藥溫熱為痢不渴者建中湯加蒼朮茯苓煎下保和丸濕熱下痢小便澀少煩渴能食脈洪大而緩腹痛後重桂苓甘露飲送下保和丸濕多熱少脾胃不和食少腹痛後重夜多痢下胃苓湯送下保和丸脾胃不和食少腹脹痛後重脈弦緊平胃散加芍藥官桂葛根白朮茯苓煎下保和丸氣虛面色萎黃或枯白色人瘦弱痢頻並痛後重不食脈微細或微汗時出黃耆建中湯肛門痛因熱留於下也木香檳榔芩連加炒乾姜仲景治肛痛一曰溫之一曰清之若病久身冷自汗脈沉細宜溫之理中湯是也初病身熱脈洪大宜清之黃芩芍藥湯是也下血者宜涼血活血當歸黃芩桃仁之類有風邪下陷者宜升提之蓋風傷肝肝主血故也濕熱傷血者宜行濕清熱血痢久不愈者屬陽虛陰脫用八珍湯加升舉之藥甚有陽虛陰脫不能固陳陳自下血手足厥冷脈漸微縮此為元氣欲絶急灸氣海穴用附子理中湯稍遲之則死下痢久而氣血大虛腹痛頻並後重不食或産後得此證用四君子湯加當歸陳皮糯米煎服痢疾下墜異常積中有紫黑血而且痛甚者此為死血證用桃仁細研及滑石行之下痢紅多身熱益元散加木通陳皮炒芍藥白朮湯送下保和丸香連丸之屬下痢白多者用芍藥白朮陳皮甘草湯送下香連丸下痢如豆汁者濕也脾胃為水穀之海無物不受常兼四臟故有如五色之相染當先通利之此迎而奪之之義也如虛者須審之凡痢疾已減十之七八穢積已盡糟粕未實用炒芍藥白朮炙甘草陳皮茯苓湯下固腸丸三四十粒此丸性燥有去濕實腸之功若積滯未盡者不可遽用痢後糟粕未盡或食粥稍多或飢甚方食腹中作痛者以白朮陳皮二味煎服和之自安如氣行血和積少但虛坐努責此為無血證倍用當歸身芍藥生地黃佐之以桃仁泥和之以陳皮血生自安如力倦氣少脾胃虛而惡食此為挾虛證用四君子湯加當芍補之虛回而利自止凡痢疾之證要審患人體氣厚薄曾無通瀉及用攻積苦寒之藥多寡診其脈有力無力及正氣邪氣有餘不足對證施治未為弗效也今醫治痢峻用下劑及苦寒破滯太過鮮不以為後艱況年高與體弱者遂致元氣虛陷反不能支胃氣既虛其痢益甚有脈微陽氣下陷入陰中則脫血陳陳而下者醫尚謂為血痢不已仍用苦寒寢至脈絶四肢厥逆而死者曷可勝紀且今世之人患痢疾者多有脾胃先虛而後積滯通滯下劑亦惟酌量斯可矣稍有過之遂至虛脫難收桑榆之效蓋有由焉久痢體虛氣弱滑脫而痢不止徒知以澀藥止之訶子豆蔻粟殼白礬牡蠣固皆用之亦有不止殊不知元氣下陷當用升提補氣如參耆升麻陳皮沉香佐之以收澀之藥自然奏效甚者速灸氣海天樞百會禁口痢胃口熱甚故也用黃連人參石菖蒲石蓮子煎服如吐強呷之但得一口下咽便好用田螺搗如泥納臍中引火氣下行胃口熱鬱當開以降之切不誤用丁香砂仁辛熱之藥以火濟火小兒痢疾用黃連黃芩大黃甘草煎服赤痢加桃仁紅花白痢加滑石末同煎一小兒八歲下痢純血作食積治蒼朮白朮黃芩芍藥滑石茯苓甘草陳皮神麯煎湯下保和丸凡下痢純血者如塵醬色者如屋漏水者大孔開而不收如竹筒者唇如硃紅者俱死如魚腦髓者身熱脈大者俱半死半生久痢六脈沉弱諸藥不效以十全大補湯加薑棗少入蜜煎服藥方治痢通用諸劑質疑黃連枳殼湯治痢疾初作多由濕熱但下之後即服此湯一二劑並無再作百發百效川黃連一錢枳殼八分當歸八分白芍藥一錢茯苓澤瀉青皮檳榔各七分木香五分磨汁入甘草四分上咀作一服水二鍾姜三片煎一鍾食前溫服濕熱積滯初作熾迫者宜下之加大黃朴硝各二錢血痢加黃芩地榆川芎桃仁各六分白痢加吳茱萸泡五分腹痛者倍芍藥加玄胡索澤蘭葉赤白兼下者加桃仁滑石歸尾陳皮各五分未痢久弱下後來愈去芩連加歸尾芍藥川芎熟地黃白朮阿珠各一錢濕甚小水少加木通澤瀉山梔茯苓各五分下後二便流利惟後重不去此氣陷於下也升麻川芎提之痢久氣血兩虛者八物湯養之痢久滑泄二便流利腹中清加粟殼訶子阿膠之類澀之雜著芩連芍藥湯痢疾只是濕熱食積三者起初只要下之瀉去腸胃中之濕熱開鬱結之氣消化食積之滯無過通因通用而已下後未愈隨證調之久則不可下脾胃虛故也邪氣未去者形氣實雖久亦可下黃芩炒黃連炒各一錢白芍藥錢半芩連芍藥三味乃痢疾必用之藥也枳殼二錢木香檳榔各一錢甘草五分上咀作一服水盞半加燈心棗子煎八分食前空心服腹痛加當歸砂仁各八分再加木香芍藥各五分後重加滑石枳殼檳榔芍藥條芩白痢加白朮白茯苓滑石陳皮各一錢紅痢加芎歸桃仁各一錢紅白相雜加芎歸桃仁以理血滑石蒼朮陳皮以理氣食積加山楂枳實下痢純血加川芎當歸槐花生地黃久不愈減芩連各七分去檳榔枳殼加阿膠側柏葉各錢半黑乾薑一錢白朮一錢陳皮八分痢久後重不減者此大腸下墜去檳榔枳殼用條芩升麻以提之嘔吐加石膏錢半陳皮一錢梔子仁五分入薑汁緩緩呷之以瀉胃口之熱氣血兩虛久痢不已者以四物湯加芩連陳皮阿膠之類補之自止有虛甚下陷而滑脫者更加龍骨赤石脂罌栗殼烏梅肉等藥收澀之初痢可下之加大黃朴硝各三錢河間黃芩芍藥湯治瀉痢腹痛或後重身熱久而不愈脈洪數者及膿血稠黏者黃芩白芍藥各二錢甘草一錢上咀作一服水盞半煎至一盞溫服腹痛甚加桂二分膿血甚者加歸連各一錢河間芍藥湯治痢下血調氣溲而便膿血知氣行而血止也行血則便膿自愈和氣則後重自除此藥是也芍藥二錢當歸黃連黃芩各一錢肉桂五分檳榔一錢炙甘草木香各六分大黃八分上咀作一服水二盞煎一盞空心服初病裡急後重窘迫甚者加朴硝一錢倍大黃煎服腹中痞滿氣不宣通加厚朴枳實各七分下血者加黃柏地榆各八分河間黃連湯治大便後下血腹中不痛謂之濕毒下血黃連當歸各三錢上咀作一服水盞半煎一盞去渣溫服河間芍藥黃連湯治大便後下血腹中痛謂之熱毒下血芍藥川當歸黃連各一錢半大黃三分桂心一分半甘草三分上咀作一服水盞半加燈心煎八分食前服河間益元散治痢疾之聖藥分利陰陽去濕熱調血氣其功甚大桂府滑石飛六兩粉草炙一兩上二味為細末每服三錢白水食前調下子和芍藥柏皮湯治一切濕熱惡痢窘迫痛急無問膿血者芍藥黃柏各一兩當歸黃連各半兩上咀每服五六錢水盞半煎八分食前服或滴水丸服拔萃蒼朮芍藥湯治痢疾痛甚者蒼朮二錢芍藥錢半黃芩一錢官桂五分上咀作一服水盞半煎八分溫服拔萃地榆芍藥湯治痢瀉膿血乃至脫肛蒼朮二錢地榆一錢卷柏芍藥各一錢上咀作一服水盞半煎一盞食前通口服保命加味四物湯治下痢純血川芎當歸白芍藥生地黃槐花黃連罌栗殼各等分上咀每服七錢水盞半煎一鍾空心溫服局方香連丸治冷熱不調下痢赤白膿血相雜裡急後重黃連十兩銼如豆用吳茱萸五兩酒拌同炒赤色去茱萸不用木香不見火三兩四錢上為細末醋糊丸梧桐子大每服七十丸食前空心米飲下祁門加味香連丸治同前黃連去毛淨十兩銼如豆大用吳茱萸五兩泡去苦水煎湯二碗泡黃連食干同茱萸干去萸用連炒赤色又以十兩用好酒炒赤色又以十兩醋炒赤色又以十兩童便炒赤色四制共四十兩淨方入後項藥為末廣木香十兩銼石蓮肉五兩肉豆蔻二兩五錢麵包煨上為細末醋糊為丸梧桐子大每服空心飲湯吞下八十丸局方駐車丸治冷熱不調下痢無問新久赤白日夜無度腹痛後重黃連六兩酒炒阿膠蛤粉炒成珠當歸酒洗乾薑炮各三兩上為細末醋煮米糊為丸梧桐子大每服五十丸加至七十丸空心米飲送下一方就用阿膠醋熬化調和為丸宣明阿膠梅連丸治下痢無問新久赤白青黑痛疼諸證真阿膠炒珠別研末烏梅肉黃連黃柏乾薑炮黑赤茯苓赤芍藥當歸酒洗各等分上為細末入阿膠末和勻滴水丸梧桐子大每服二十丸食前連夜五六服小兒緑豆大丸服選要變通丸治赤白痢疾臍腹疼痛日夜無度膿血相雜裡急後重及腸風下血吳茱萸去梗湯泡炒乾黃連大者銼豆許上二味各等分用好酒拌濕過一宿同炒熟各自揀出研為末各用粟米爛飯為丸梧桐子大每服三十丸如赤白痢下各十五丸用乾薑甘草湯送下紅痢甘草湯送下黃連丸三十丸白痢乾薑湯下茱萸丸三十丸一方為末米飲調下此方乃浙西河山純老以傳蘇韜光數十年救人無數人多求方不敢輕授恐以其藥品之微而忽之洪氏方亦有制惟湯使少異和劑戊己丸治脾經受濕瀉痢不止米穀不化臍腹刺痛黃連炒吳茱萸泡炒白芍藥各五兩上為細末麵糊丸梧桐子大每服七十丸空心食前米飲下仁齊保和丸治脾虛積滯下痢不能下者用此消導之最效方見飲食門丹溪黃連滑石湯治痢疾黃連滑石生地黃白芍藥蒼朮白朮當歸青皮條芩各等分上咀每服七錢水盞半煎一盞食前溫服重急加桃仁檳榔甚者大黃下之嘔者用薑汁半夏丹溪黃連乾薑湯治赤白痢疾日夜無度黃連一錢當歸二錢烏梅三個黃柏一錢乾薑五分上作一服水盞半煎一盞食前服丹溪黃連大黃湯治熱血痢黃連大黃黃芩黃柏枳殼當歸芍藥滑石桃仁甘