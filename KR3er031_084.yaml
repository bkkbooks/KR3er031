body:
  text: 卷之八十四螽斯廣育汪衢序螽斯廣育者孰集之徐氏汝元集而傳之以公於人也汝元余故友襄府典鱔鶴山遺腹子也生質敏穎幼從學於太學生葉光山攻舉子業既而多病復問醫學於余族侄子良子良素以醫術鳴時汝元以儒通醫故其術易精其存心每每以濟人為急務弗規於利良可嘉也頻來於余常以素問脈理病機治法及劉李張朱諸氏之書詰之汝元皆亹亹條析隨問隨對略無凝滯此見汝元醫有所本業有師承非復近時俗醫記本草而療病泥古方而藥人也不侔矣凡醫書自上古軒岐靈素歷漢唐宋而至於我皇明作術之行於世者二百餘家汝元悉究精微敘而集之名曰古今醫統凡有關於醫者靡不博極該詳誠集諸醫之大成者也螽斯廣育卷余披而閲之有原始要終論陰虛論調經諸論尤見生生不息之功多余嘉其有心得之妙鑿鑿有理諄諄懇懇以嗣續為重果能體而行之未必無螽斯之産也其用心亦仁矣哉胡云峰云醫而儒明醫也汝元以之汝元名春甫思鶴號也齡青質穎該博群集而況精義不已誠為鳴世之士云新安韓溪道人汪衢序汪子良序螽斯之集為廣嗣也螽斯一生九十九子而廣嗣之義有取焉其亦淵乎微哉天之生人能啓其機而必待於有相之道以贊之贊之非其道生生之機或息矣蓋合天人以成者能也世之人率意而成者遇也幸乎天而不讚之以人者惑也至有自散其人而責望於在天者妄也吾徒徐汝元有憂之而是合古今而集焉好生之仁可想矣是集也以攝精調經為本兼以胎産須知之助參究脈證虛實寒熱斟酌加減皆其律集古今之祕以成廣嗣之全書而無膠柱刻舟之弊誠足以究聖賢之蘊以贊化育之機者也世之人知所以用之則百斯男螽斯蟄蟄非惟利人於一時咸有以衍宗於百世矣錫祚永之胤終天地之功孰非汝元之功耶是為序邑人心谷汪宦子良序原始要終論大矣哉人之有生也其陰陽造化之妙乎夫陰陽生生不息之德其在於物則本乎乾坤其在於人則根乎精血是故雖具道體之妙而實遇修用之機自其常而觀之雖愚夫愚婦固亦可以知也自其變而言之雖志士仁人亦有所不能焉是故體則陰陽精血也用則陰陽配合也精血盈足配合中時此其常也所謂愚夫愚婦之有知者一自然之理也精血虧缺配合不時此其變也所謂智士仁人之不能者一顛沛之勢也夫以處其常也豫固知其無待形於言矣然而當其變也豈可以弗辨哉達道君子安可不以用變之際而加之意焉者乎是理也先哲神之而愚亦得以及其意矣請詳陳於左易曰天地絪縕萬物化醇男女媾精萬物化生又曰陰陽合德而剛柔有體正所謂獨陽不生獨陰不成是也蓋為人之夫婦猶天地然天地這道陰陽和而後萬物育夫婦之道陰陽和而後男女生苟或父精母血一有不及而謂有胎孕者未之有也是故欲求子者必先審其婦之月經調否經者常也如月月應期而來按期止無易常也故曰月經期有不調者或先或後或一月兩至或間月一來有絶閉不通有頻來不止或先痛而後行者或先行而後痛者有黑色者有紫色者有淡色者有白帶白淫白濁者是皆血氣不調者也諸如此類必按證以藥而調治之及夫男子之病亦在所當知也其有不足者有腎虛精滑有精冷精清或臨事而不堅堅即流而不射有盜汗夢遺有便濁淋澀有腰憊不能轉搖有好色以致陰虛有勞熱者有虛寒者是皆精氣不足者也諸如此類亦必按證施藥而補益之夫男而無以上諸病然後可以獨責乎婦若此者誠男子之責也奈何歸咎於婦哉婦無恙亦未如之何也已矣婦之經脈既調男之真精亦足所謂陰陽和氣血平則百病不生而樂有子乎且壽矣奚艱嗣之有哉既和之以陰陽且按之以方法而人事亦不可不盡也訣曰三十時中兩日半二十八九君須算落紅滿地是佳期金水過期空霍亂霍亂之時枉費工樹頭樹底覺殘紅但解開花能結子何愁丹桂不成叢此蓋婦人月經方止金水初生此時子官正開乃受精結胎之候妙合太和之時宜以人事副之庶不失造化之妙也過此佳期則子宮閉而不受胎矣然男女之別各有要妙存焉月經方過一日三日五日交合者此乾道成男二日四日六日交合者坤道成女又云陰血先至陽精後沖縱氣來乘血開裹精陽內陰外是則精勝其血故陽為之主男形所由以成也若陽精先入陰血後參橫氣來助精開裹血陰內陽外是則血勝其精故陰為之主女形所由以成也欲嗣之廣者必由斯道而得之誠由斯而求之亦由斯而得也其或不然者而亦有之物徼幸於偶然耳然男女抱患而孕者亦有之夷嘗考之雖孕多墮也雖産多難也雖子多病也何以知其然也嘗觀赤子在襁褓之中內無七情之牽擾外無六氣之相侵宜無病之可生也其患曰變蒸曰驚悸曰斑爛曰風癇曰月瘡曰發搐曰痰喘曰痘疹曰火疹曰赤瘤曰解顱曰龜胸曰滯頤曰內吊曰鵝口曰木舌重舌等證豈不皆根父母精血之初與夫妊婦虛弱不能謹節之所致歟又或未滿百日遂與鹹酸之味未至周期輒與肥甘之肴百病由此而生也其患曰丁奚曰哺露曰五疳曰吐逆曰黃疸曰腹脹曰浮腫曰痞癖曰瘧痢曰積聚曰飧瀉曰洞瀉等證豈不皆由飲食過傷調養失宜之所致歟自是觀之大半胎病而小半傷食也一本體弱而稟受不厚又有妊婦情欲動中而胎氣隨熾或好食煎炙而多味辛酸或喜怒暴寒而嗜欲無節殊不知兒在胎內一脈貫通母飢亦飢母飽亦飽動履食息而胎氣隨之故皆足以令子受患也胎前既如古者婦人之妊子寢不側坐不偏立不蹕不食邪味割不正不食席不正不坐目不視邪色耳不聽淫聲夜則令瞽誦詩道正事如此則生子形容端正才過人矣夫何今人愛子無方姑息太過反致傷生兒多枉死正與巖牆桎梏不能盡其正命者何異焉每見溫良之婦妊娠起居皆有節度生子少病痘疹亦稀足可以為師法矣有父母之責者寧不於是而容心哉由是觀之賢愚得失較然矣孟子曰不孝有三無後為大然孝以事親人則知之而孰知孝之大者乃所以善繼其後矣乎慨其知此而不知求子之道也良可惜哉奈何委乎自棄者甘於命過乎慮念者惑於巫忍心害理曷此甚也大抵君子當造命不當委命愚為是論亦理法之准者言之耳豈曰無徵而不信乎陰虛論格致餘論云陽常有餘陰常不足氣常有餘血常不足蓋有餘之陽氣者非直指心經之元陽也諸火之謂也夫火有二心為君火五行正一之火也三焦為相火諸動邪妄之火也凡一有動相火隨之而燔燒爍真陰竭枯精髓經云壯水之主以制陽光此之謂也又曰形不足者溫之以氣精不足者補之以味溫也者溫養其氣而調和之以靜勝夫動也經曰勞者溫之是以味也者藥味也經曰陰之所生本在五味可見補陰一方人人之所必用自壯至老而不可缺焉者也丹溪曰因火而成疾者十有八九不因火而成疾者百無一二故夫火乃無根之物人之一身五臟六腑無所不有惟陰盛可以制伏之趙繼宗謂陰本不足故不必補補不足者而至於有餘則反有太過之害籲趙亦未之思耳助不給補不足理之自然實其實虛其虛醫之深弊危而不持顛而不扶則將焉用彼相矣經曰諸寒之而熱者取之陰所以責其陰之不足則虛火乘之而起精血津液皆為之枯涸而夢遺淋濁虛勞內熱之證作矣治法責其無水當以補陰之劑與夫養血調中滋陰降火之屬又云補腎者不必齊以寒強腎之陰熱之猶可此固未嘗膠於知柏之補陰而當識其有為知柏之君者斯可矣不然多見苦寒傷胃執一無權身且不保而欲望其有子也烏可得乎是則滋陰之劑故雖無恙而亦可以常服矣所謂緩則治其本也兼夫澄心息慮以溫養之多服健干斑龍等劑而於子也殆必欲之則至其如視諸掌乎夫何人多不察妄信輕依頓服辛熱香燥助陽之藥適與以火濟火援石拯溺抱薪救焚斯何異矣高明君子幸其鑑之藥方資生健乾圓按此誠種子之良方寒熱不偏君佐不紊滋補無過丈夫少病而無子悉宜服之無不效者或陽事痿弱精冷精清宜服巨勝丸之屬以扶陽也若水不勝火心旺腎衰熱煩精滑宜服補陰丸之屬以益陰焉秋石四兩製法見製法備考門鹿角霜四兩制見備録人參要揀陳實者佳甘州枸杞子山茱萸肉麥門冬去心天門冬去心杜仲薑汁炒斷絲懷慶生地黃懷慶熟地黃各酒浸二兩上為末老米麵作糊為丸如梧桐子大每服五十丸空心滾白湯下一月後女子月經方過金水正生之時男子空心服車前子湯半盞至夜交會即有孕矣資生順坤方按此方和氣調經養血清熱女人寒少熱多久無子孕服之悉效若血海多寒子官久冷宜服螽斯丸之屬以溫暖之若不甚寒宜用墨附丸之屬以和養之也香附米一斤四制春秋三日夏二日冬七日曬乾為末篩去頭末取中末半斤用川當歸三兩酒浸白朮土炒三兩川芎雀腦者白芍藥熟地黃生地黃白茯苓牡丹皮黃芩去朽炒益母草柴胡臭椿根白皮各二兩上為末醋糊丸梧桐子大空心淡醋湯下六十丸食乾物壓之男子別類經驗諸方巨勝子丸左尺脈微而弱陽虛不舉宜服巨勝子白茯苓何首烏川牛膝熟地黃四兩生地黃肉蓯蓉菟絲子天門冬枸杞子天雄制柏子仁酸棗仁破故紙北五味子巴戟天去心韭子乾山藥楮實子川續斷各一兩覆盆子芡實子川椒去目及合口者葫蘆巴蓮花蕊各五錢南木香二錢半上為末煉蜜丸梧桐子大每服七十丸空心酒下食物壓之端效丸元氣不足腎虛陽脫易痿易泄尺脈俱微服之壯陽益氣補髓添精菟絲子酒製如法研枸杞子破故紙酒洗微炒韭子炒茴香鹽炒川山甲炮金墨燒煙盡遠志去心蓮花蕊紅花蓮肉去皮心母丁香芡實子牛膝酒洗木香各一兩巴戟酒浸去心益智仁川楝肉青鹽沉香五錢上為末酒糊丸梧桐子大每服五十丸空心酒下不飲酒者鹽湯下食乾物壓之還少丹陽事痿弱精氣不射尺脈微細無子者宜服熟地黃枸杞子各兩半川牛膝酒洗遠志肉乾山藥山茱萸肉巴戟天去心白茯苓五味子石菖蒲楮實子肉蓯蓉酒洗去甲杜仲薑汁炒茴香各一兩炒上為末煉蜜和棗肉丸梧桐子大每服五十丸食前溫酒或鹽湯送下日三服大補陰丸左尺脈洪陰虛火動服此降陰火補腎水黃柏鹽酒炒知母同上各四兩熟地黃酒洗烙乾研龜板酥炙各六兩上為末煉蜜和豬脊髓丸梧桐子大空心姜鹽湯送下七十丸補陰丸左尺脈浮洪大虛此藥固精元滋陰降火黃柏鹽酒炒半斤知母同上熟地黃各三兩白芍藥炒川牛膝酒洗陳皮鎖陽當歸各兩半龜板四兩酥炙虎脛骨兩半酥炙上為末酒煮羊肉爛丸如梧桐子大每服五十丸空心鹽湯下冬加乾薑半兩加味虎潛丸腎脈虛數精神短少腰膝無力此藥健筋骨補腎壯精人參黃耆蜜炙白芍藥煨當歸酒洗山藥各一兩鎖陽酥炙虎骨酥炙龜板酥炙菟絲子制如法破故紙炒杜仲薑汁炒斷絲五味子各七錢半牛膝酒浸二兩上為細末煉蜜和豬脊髓丸如梧桐子大每服七十丸空心鹽點湯送下滋陰大補丸腎脈微弱陰陽兩虛與虎潛丸相間服之所謂補陰和陽生益精血潤澤肌膚強筋骨性味清而不寒溫而不熱非達造化之至者未足與議於斯也川牛膝山藥各兩半杜仲酥炙炒斷絲山茱萸肉巴戟肉蓯蓉酒洗去甲新瓦烙干五味子白茯苓茴香炒遠志去心甘草同煮一兩石菖蒲枸杞子各五錢熟地黃二兩上為細末煉蜜和紅棗肉丸如梧桐子大每服七十丸空心酒或鹽湯送下秋石斑龍丸滋陰補腎益嗣延年大有效驗方見虛損門婦人別類經驗方螽斯丸婦人月經不調目昏頭暈子宮久冷此藥溫中益氣有孕神效人參一兩杜仲薑汁炒斷絲桂心防風秦艽厚朴各五錢附子制白茯苓細辛各一兩白薔薇乾薑炮沙參牛膝酒洗半夏各半兩上為細末煉蜜丸梧桐子大每服五十丸空心米飲或酒下已覺有孕便可止服滋血暖宮丸一名百子附歸丸陰陽不利氣血不足服此藥無不孕者香附米十二兩童便透各浸一宿當歸酒洗二兩川芎白芍藥酒炒熟地黃酒洗真阿膠蛤粉炒成珠艾葉醋煮曬乾各二兩上為末醋糊丸梧桐子大每服百丸空心醋點湯下食物壓濟陰丸治婦人血虛挾火子宮乾澀不能攝精久無子服此滋陰養血有孕極效當歸熟地黃生地黃川芎芍藥各一兩香附米八兩人參八錢肉桂七錢黃芩一兩上為末煉蜜為丸如梧桐子大食前米飲或溫酒送下五十丸妙應丸治婦人氣虛痰盛滿溢子宮不能受精肥胖婦人無子服此效蒼朮米泔水浸酒炒人參黃耆蜜炙白朮土炒地黃酒洗陳皮去白半夏制當歸酒洗茯苓各一兩滑石炙甘草各七錢上為末糊丸梧桐子大每服五十丸空心薑湯下附録廣嗣方五子衍宗丸男子服此藥添精補髓疏利腎氣不問下焦虛實寒熱服之自能平祕獨稱古今第一名方有世服此藥子孫蕃衍遂成村落之說故名衍宗甘州枸杞子菟絲子各八兩酒煮搗作餅烙干北五味子車前子各二兩微炒研覆盆子四兩酒洗淨上為末煉蜜為丸如梧桐子大空心服九十丸臨臥服五十丸白沸湯送下修合曰春取丙丁巳午夏取戊己辰戍丑未秋取壬癸亥子冬取甲乙寅卯續嗣降生丹一名授仙方凡婦人稟受氣弱胎臟虛寒服之有子當歸酒洗桂心各一兩防風五錢天台烏藥秦艽杜仲酒洗炒斷絲龍骨吳茱萸益智仁茯神各一兩石菖蒲去毛淨細辛土炒桔梗半夏制川牛膝酒浸白芍藥各五錢乾薑一兩半生半煨川椒一兩去目附子一枚重八錢臍心取竅如皂角子大入硃砂一錢濕紙包裹煨牡蠣漳泉二州大片者將童便浸四十九日每五日一換取出用硫黃一兩為末酒浸塗遍卻將皮紙包用米醋浸溫鹽泥固濟得厚候乾用炭五斤煅每一方只用二兩余收貯再用上為末取附子中硃砂留為衣酒米粉作糊梧桐子大每服三十丸漸加至七十丸空心淡醋湯下或溫酒鹽湯皆可延年益嗣丹滋補元氣益精黑髮人參天門冬酒浸去心烙干麥門冬同上各三兩熟地黃酒浸搗二兩生地黃二兩烙干白茯苓五兩酒浸曬乾地骨皮五兩酒洗淨何首烏鮮者半斤上將首烏以竹刀割去皮切作片乾者用米泔水浸軟割切砂鍋內用黑羊肉一斤黑豆三合量著水上加篦萆上放首烏羊肉爛為度鍋蓋密勿令泄氣取起曬乾為末煉蜜為丸如梧桐子大每服五十丸空心溫酒送下壬子丸此藥要壬日修合白芨白蘞吳茱萸白茯苓各一兩牛膝細辛菖蒲白附子桂心各五錢厚朴人參當歸各四兩乳香二兩沒藥三兩上為細末煉蜜為丸如豆大每服十丸空心溫酒送下大造丸治男子婦人一切虛弱不問老幼稟氣素弱或斫喪太過陽痿面黃倦言倦步氣血虛甚女人月經不調艱於嗣育服此極效紫河車一具用米泔水洗淨新瓦兩片上下合定炕干為末生産初胎尤佳但非初生者而婦人壯盛者亦妙俗必産之初者以為貴殊不知婦人虛弱而氣不足其於初生何益之有哉龜板二兩童便浸三日酥炙黃能補腎去骨蒸健腰膝黃柏兩半鹽酒炒褐色能補腎瀉下焦隱伏之火除痿厥生地黃二兩半肥大者入砂仁六錢白茯苓二兩稀絹盛入砂鍋內煮用好酒約添三四次煮乾去茯苓砂仁用地黃一味能活血涼血除五心煩熱人參一兩能生津液補中益氣安神天門冬去心一兩二錢能保肺氣養肌膚除燥熱夏月加五味子七錢一方加麥門冬一兩婦人加當歸去龜板男子遺精婦人帶下並加牡蠣兩半上以地黃酒浸爛另用石臼搗如泥余為末入地黃泥搗勻酒攪米糊為丸如小豆大每服八九十丸空心鹽湯下冬月酒下還真二七丹壯顏容健筋骨添精補隨烏須黑髮久服通仙何首烏忌鐵器黑椹子生地黃旱蓮草以上四味俱用鮮者以石臼內搗各取汁半斤鹿角膠生薑汁白蜜各半斤黃精九蒸九曬人參白茯苓小茴香枸杞子鹿角霜各四兩秦椒一兩共為末用上除蜜另煉外以諸汁熬將成膏方入蜜攪勻然後下人參等六味末藥又和勻以新瓷瓶收貯隨時以溫熱酒調下二三匙夏月以白湯調歌曰還真二七丹傳得神仙祕氣味補精元造化彌天地無德信難逢有福方能洱黑椹何首烏鹿角膠和蜜生地旱蓮姜皆須八兩汁黃精每半斤服鮮飛升去斑龍頂上珠能補關中髓參朮小茴香秦椒枸杞子以上四兩稱獨椒一兩許和汁製成膏貯以瓷瓶器早晚各三匙溫酒調微醉老當益壯哉白髮翻成漆久服自通仙莫與非人識加味養榮丸此藥能助婦人速孕且無小産之患熟地黃當歸酒洗白朮各三兩白芍藥川芎黃芩炒各兩半人參茯苓香附子陳皮去白麥門冬貝母各一兩阿膠炒成珠七錢炙甘草五錢黑豆四十九粒炒去殼上為末煉蜜丸如梧桐子大每服八十丸食前溫酒或鹽湯下忌食諸血神效墨附丸專治婦人久無孕育月經不調及數墮胎産甚效香附米一斤分四制酒醋童便米泔各浸一宿一日撈起曬乾用綿艾葉去梗四兩用醋二大碗同香附一處煮乾搗爛捻作餅錢大新瓦上烙乾研末上品清煙墨一兩火煨煙盡醋淬熟地黃飯上蒸當歸川芎人參白茯苓南木香各一兩上為末糊丸如梧桐子大每服五六十丸空心溫酒送下鳳雛丸用頭窩烏骨雞雌雄一對放置一處養之勿與群雞相混候生子時將初生子頂顛上畫一圈待子數多抱時將初子照圈開竅用辰砂三錢當歸芍藥川芎熟地黃各二錢為末將子黃傾出調和藥末仍入殼內盛不盡時另又裝一殼俱封之以厚紙於衆子內同抱雞出時將藥子取起去殼用煉蜜和藥丸空心好酒送下三四十丸藥盡有孕何首烏丸何首烏三斤竹刀切作片牛膝一斤酒洗銼上以黑豆一斗淘洗淨用甑一所先以豆薄鋪甑底後薄鋪何首烏又鋪豆次鋪牛膝重重鋪蓋安於釜上蒸豆熟為度去豆以藥曬乾又換豆依法蒸曬曬二次去豆取藥為末蒸棗肉為丸如梧桐子大每服五十丸食前溫酒下忌蘿蔔蔥蒜四制香附丸調經養血順氣有孕香附米一斤如前制當歸酒洗熟地黃酒洗白芍藥酒炒川芎各四兩澤蘭葉白朮陳皮各二兩黃柏酒炒甘草酒炒各一兩上為末酒糊丸如梧桐子大每服七十丸空心白湯送下祕方神效百子丸明淨硫黃一兩用銅銚甘草湯煮一日取出陰乾研如面上以糊丸如梧桐子大約二百粒每遇婦人月經過後空心酒下二十五丸次日下三十五丸三日下四十丸一百丸盡交合則受胎矣次月當不行經如復行經者又如法服前藥一百丸必有孕自後可服清熱養血之劑則胎固孕婦泰也此方百發百中不可以其簡易而略之原夫受胎者要血熱硫黃亦只暖血耳或者云熱而有小毒先以甘草湯煮之所以制其性也孕後又服清熱涼血之劑得非清其源而為治之至也制方如此可謂知道大典正心丸治婦人妒妾誤夫無子美色入室少婦妒之正士入朝小人忌之常服此藥可以正心並免妒忌之病也天門冬去心益智仁各二兩赤黍米去殼微炒薏苡仁炒各四兩茯神去木百合各一兩上為細末煉蜜為丸如梧桐子大婦人常服不妒有子每服九十丸食遠白湯送下大典勝金丸治婦人久虛無子及産前産後一切病患兼治男子下虛無力此藥能安胎催生妊娠臨月服五七丸産時減痛婦人無孕子宮冷如服二十日男女自至又治積年氣血手足麻痹半身不遂赤白帶下血如山崩及治産後腹中結痛吐逆心疼子死腹中繞臍作痛氣滿煩悶汗不出月水不通四肢浮腫無力血勞虛勞小便不禁中風不語口噤産後痢疾消渴見鬼迷暈敗血上衝寒熱頭疼面色痿黃淋瀝諸疾血下無度血痢不止飲食無味産後傷寒虛煩勞悶産後血癖産後羸瘦凡婦人諸疾不問年深日近並宜服之又名不換金丸又名女金丹當歸酒洗芍藥川芎人參白朮炒白茯苓炙甘草白薇酒洗白芷赤石脂牡丹皮玄胡索桂心藁本沒藥各一兩除石脂沒藥二味另研外余皆二處磨羅香附子醋浸三日炒香曬乾為末一十五兩上十六味為末煉蜜和丸如彈子大銀器或瓷器封固收貯每取七丸空心溫酒化下一丸食乾物壓之服至四十九丸為一劑以癸水調平受妊為度妊中三五日服一丸産後二三日服一丸醋湯下尤妙祕驗雞頭粥多子神效方芡實肉一斗淨白粱米二升蓮肉泡去皮心焙乾薏苡仁鮮者懷慶乾山藥為末各一升上為末依分和勻貯一處夏天以芡實三升為主諸末遍減蓋恐久貯失氣故也每早空心將米湯和勻藥粉一二合用銀鍋調勻煮熟如糜粥加白糖二匙在內無銀鍋砂鍋亦可只不用銅鐵鍋或一二碗以代早粥服後不可間斷半年後有驗草石之藥不須再服專理脾胃則土旺能生萬物精氣神皆由脾土而生未有脾土弱而精獨盛也土旺精盛自然有子此方看之珠覺平易諸方俱不能及嘗試有驗雖至老服之精神愈健祕驗多男三鏈法西蜀鄧士魯遇異人所授者士魯四川資縣人城東有臨郭庵讀書其中一日見一道士與之談因言士魯當貴某年于山西某驛中相會後士魯為行人出差山西果於某驛會其人焉士魯詢以生子之法其人贈以此歌云云今士魯已連生十子矣交必胎男生必成育百發百中真仙術也末猶約於建業相會不識士魯後果會否而六鏈九鏈長生飛越之法惜乎其未聞天地閉萬物匝男女祕百嗣發閉祕之法不可傳傳之匪人天必罰閉者閉藏之義在天地如冬時氣化蓄藏不施在人如固閉精氣一不妄泄故萬物百嗣生育之多也此二儀闔闢之機品物流形之妙天人感通生成一道上達自能心悟下士不可言傳左右掌連心心火暗能達分主客各相擦言手心與心脈相通右手掌擦左手心則左為主而右為客左手掌擦右手心則右為主而左為客此乃運火與臍之術心火歸臍與腎相接合和而不走則坎離交媾真元自固而穀神可靈矣夫穀神者虛而能應感而遂通者也穀神靈則劍氣徑穀神弱則劍氣鋒痿此男女相感氣機發動自然之妙數用重陰六十八須知十減四七五此相擦之數也如一遍六十八二遍五十八三遍四十八四遍三十八五遍二十八是擦以十減五遍遞減至四七之數也其遍至七八九遍皆擦二十八遍而止莫教火候過離下離屬心離下則屬腎矣言不可使火太過反動精也一擦一度伏臍間九九老陽互相壓又知九息上增九八十一息純乾卦言擦一次即將手伏壓臍中令熱氣入臍中鼻中呼吸每次九息是息以九增如一遍九息二遍十八三遍二十七九遍漸增至八十一息也干數用九九九則為純乾之卦心火屬陰故擦用重陰腎氣屬陽故息取老陽其法於子後入室盤坐良久心定氣平以左手仰置左膝上用右手心擦之六十八遍即以左手心伏於臍間而以右手壓於左手之上鼻中呼吸九息用意存想使息息歸臍此第一度卻以右手仰至右膝上用左手心擦之減十遍即五十八遍即以右手心伏於臍間而以左手壓於右手之上鼻中呼吸增九息成一十八息亦用意存想使息息歸臍此第二度以後左右換手上下伏壓存想俱同但擦以十減息以九增共九度而足如此四十九日祖氣足方可取鼎春夏秋冬名四時二十四氣尸生化三五七九奪氣機一奪一吸深取之周而復始天不達此房中之術言採奪女之氣之機也三五七九皆陽數言與女交時但至四數皆深入其中上以鼻吸下以脅提而奪取之使女之氣過我也周而復始者三五七九既畢而又再從三起也周天之數三百六十三五七九共二十四數以合二十四氣交時先仰行六遍每遍二十四得數百四十有四後合行九遍每遍亦二十四得二百一十有六共成三百六十以合周天之數此妙理也非仙莫悟仰合即天地否泰男女上下互相迭施之道非夢漫真人不足以語此云坎水常勝離離火易焚滅仙草占先春得陽陰復結濃煎濕注參仙訣離火才欲燃滿口莫入咽漱無聲吐無決暖席取溺壺徐將肝火瀉心慵作曝蟆虛脊凡七跌功成敵萬人真元莫浪泄離火易焚者言男子之精易動待其將動之時即將濃濃溫茗滿口含之緩漱慢吐不可使耳聞之又取夜壺小便以瀉肝火又作蝦蟆仰曝之狀以兩足兩手著床席舉脊向上跌凡七次則精即上升而不走矣要算坎水潮生月信進我退投信遏我進接一二鏈法不可缺更有一言只須說左男右女肩間截言遇女子癸水生時必俟其三日潮退方與之交合一二煉法指奪氣機等法而言左男右女肩間截者此生男之訣也女人懷胎在左為男在右為女男子將泄之精必要向女子偏左射之仍以手向女子左肩立砍一掌即女子左邊氣即上縮精隨入左必胎男矣此是多男三煉法六煉可長生九煉能飛越約爾他年逢建業陰陽妙二氣之運坎離八卦之門天地之大盡於是焉天地生人物之散殊亦盡於是焉故離火易燃坎水易竭陰陽動靜雜揉不齊真元不固穀神不靈矣茲三鏈法易謂天地絪縕萬物化醇非耶天人合一余恐是法將若六鏈九鏈沒沒而無傳也故囑之梓威鳳山人書於三山海上調經論岐伯曰女子二七而天癸至任脈通太衝脈盛月事以時下則有子蓋任主胞胎通以陰道之泰也沖為血海盛則氣血俱盛也婦人腎氣全盛衝任周流如月之虧盈應期行止而有常度曰調遇交合則有子矣否則三五錯蹤皆所謂不調也不調則百病變生甚至不治孕暇言乎經曰二陽之病發心脾有不得隱曲女子不月其傳為風消其傳為息賁者死不治況心屬陽而主血脾裹血以行氣若月經不通未必不由心事不足思慮傷脾有所勞倦穀氣不輸肺金失養腎水無滋經血津液日以枯涸以致三五不調漸至絶閉虛損內熱骨蒸勞瘵之證作而卒至於難治也所以養心則血生健脾則氣布二者胥和則氣暢血行而調經之要斯其至矣復何患之有且夫行經之時亦必保之如産遠房勞戎浴洗毋過於寒熱喜怒一有失中疾病隨起調治之法如氣鬱血虛潮熱黃瘦而經不調者以丹桂散香附丸之類主之氣虛血熱先期而來過多不止者以鎮經湯固經丸之屬治之過期不來腰腹脹痛者以促經湯紅花散之屬行之濕痰麻木者朮附丸燥之至於虛實寒熱更詳脈法抑何有經之不正而孕之不育乎調經方法一經閉絶不通者血枯也四物湯倍當歸加紅花桃仁牛膝熱加黃芩寒加肉桂一經水不及期而行者血熱也四物湯加生地黃黃芩黃連肥人兼痰藥加蒼朮半夏香附子一經水常過期而行者血少也瘦人多是血虛倍四物湯加當歸熟地黃黃芩白朮甘草少佐以紅花桃仁肥人大概氣虛挾痰四物湯去地黃合二陳湯加參耆香附一經過期而色淡者挾虛有痰因水以混之也四物湯倍當歸地黃合二陳湯煎服一經將來腹中作痛者血氣實此血欲行而氣滯也四物湯加香附桃仁紅花玄胡青皮牡丹皮木香甚者加莪朮大黃熱加黃芩柴胡一行經後作痛者血氣虛也八珍湯宜服血虛者倍當歸地黃寒加乾薑氣虛加人參一肥盛婦人月經不通或二月三月一行由痰多軀脂滿閉宜導痰湯加當歸黃連香附蒼白朮之類一有虛熱經少不來或來過多四物湯加黃芩之類一經水或來或斷發熱發寒四物湯合小柴胡煎服一經行三五日後腹中綿綿作痛者蓋血因氣滯而未盡也宜四物湯加木香檳榔之屬一婦人血病以當歸為主肥白者必合參耆瘦黑者必合生地黃香附一婦人之病不可全外於氣蓋血因氣使人鮮知之氣暢則血和一定之理也一帶下赤白帶者因胃中痰積流下滲入膀胱治法宜散濕導痰清熱為主以二陳湯加蒼白朮或加升麻柴胡以升之或用吐法以提之白者屬氣赤者屬血血虛加芎歸氣虛加參朮一瘦人帶下熱之所致如泉本清火熬之即濁宜以滑石樗皮川芎海石青黛之類一血崩證有因虛有因熱虛則下陷熱則流通視其緩急分標本而治之庶得王霸之經權也緩用四物湯加條芩附子急以立效散神效丸之屬一血臟虛冷崩中下血宜四物湯加阿膠黃芩參耆東垣謂崩帶下久有屬於寒不可一途而謂一婦肥盛而無子者由痰多脂膜閉塞子宮宜行濕燥痰之劑更服順坤丹降生丹之類即孕一瘦人無子因血虛子宮乾澀不能配取精氣宜養血滋陰人多不審寒熱悉謂子宮虛冷概以烏附辛熱之藥煎熬氣血愈虧禍不旋踵孕安得乎藥方加減四物湯治婦人血病為主當歸川芎白芍藥熟地黃各等分上水煎服加減於後氣虛頭痛加參耆白朮甘草發熱心煩加芩連梔子骨蒸勞熱加知母黃薑黃芩銀柴胡地骨皮虛勞氣弱咳嗽喘滿加人參麥門冬薑厚朴枳殼煩渴飲水加石膏知母臍下虛冷腰腹痛加玄胡索川楝子血熱煩躁口苦舌乾加天花粉麥門冬黃芩之類風虛眩暈加秦艽羌活嘔吐加白朮人參藿香薑連中濕身重加蒼白朮白茯苓筋骨肢節疼痛加防風羌活血積塊痛加三稜莪朮官桂乾漆蘇木紅花四物湯論甫按四物湯古方為血病而制當歸養血為君熟地為臣芍藥滋陰為佐川芎行血為嚮導之使此立方之本旨固為血之妙劑也後謂女人以血為事則以四物湯主之養血調經胎前産後悉以資用蓋自常而言之誠有不可遺焉者及用之弗效而反加病者有之甚則至於誤死者有之其故何也蓋四物治血雖工用之於脾胃無傷只是血病則四物之功豈復能有過之者今人不察脾胃虛實一概放用以故誤也何則脾胃虛者用之益虛飲食浸減元氣浸衰而血益無資生之地矣不理會者久服不已即脾泄而中滿之證作矣甫見如此而傷生者何限調經養血又烏足以語哉凡用四物治血須審其人脾胃虛者必先用六君子補中益氣之類以養胃然後合四物而用之萬無一失蓋六君子益氣湯亦能益血四物湯不能益氣補脾胃多用之則為脾胃之害所以脾泄中滿之證非四物之害而何殊不知血由脾胃所生依氣而充行經脈書曰血不自行隨氣而至人只氣一耗則血雖獨存而必無能生之理則氣絶而死者血初未常破耗也可見血無氣而不能以獨生人補血而不補氣斯可別矣所以古方女金丹純以香附子一味為君謂能調經開鬱今人用之反致氣血兩虛而經益不調矣苟不知止必病甚而傷生何則香附味辛性燥耗氣燥血止可以開有餘之郁耳今之婦女動以虛弱者多則經不調皆因虛而致也春甫創制八珍益母丸用之者曾不終劑而經正且孕矣何也益母調經為君佐以八珍滋補氣血所以神效者此也知者審諸八珍益母丸專治氣血兩虛脾胃並弱飲食少思四肢無力月經違期或先期而至或腰疼腹脹緩而不至或愆期不收或斷或續或赤白帶下身作寒熱服之罔不獲效一月之後即可受胎虛甚者用藥一斤必能對期受孕益母草四兩不見鐵器止用上半截帶葉者人參去蘆白朮土炒茯苓去皮炙甘草去皮當歸酒洗川芎白芍藥醋炒熟地黃酒洗上為末蜂蜜為丸如彈子大空心蜜湯下一丸如不能嚼者丸以細粒如小豆大每服七八十丸脾胃虛寒者加砂仁一兩薑汁炒腹中脹悶者加山楂一兩淨肉飯上蒸只常多食者加香附子一兩童便制丹桂散治氣血虛損內則經閉不行外則肢體羸瘦潮熱漸成骨蒸牡丹皮桂心蓬莪朮京三稜玄胡索炒八分當歸酒洗錢半陳皮去白赤芍藥甘草各五分乾漆炒沒藥另研紅花蘇木各四分鬼箭三分烏藥各錢上水盞半煎八分不拘時服小溫經湯治經水初來因有感冒風寒身上疼痛寒熱往來陰陽頗虛頭眩煩悶不快或作嘔吐當歸芍藥地黃各七分川芎三分白朮陳皮各六分柴胡黃芩枳殼羌活桂枝香附子各五分砂仁小茴香甘草各三分上水二盞姜三片蔥一莖煎一盞空心熱服逍遙散即柴胡四物湯專治經脈不通脾胃虛弱或寒或熱不喜飲食飽脹嘔吐煩躁服之神效當歸川芎芍藥熟地黃人參半夏制柴胡黃芩陳皮麥門冬甘草等分上水二盞姜三片煎八分空心服嘔吐不能食加砂仁白朮少睡加酸棗仁咳嗽加杏仁五味子腹痛加玄胡索香附八珍湯治經後續來氣血不足者宜服之香附子人參白朮茯苓當歸白芍藥熟地黃川芎甘草各等分水二鍾姜三片棗一枚煎八分服經不調者宜服烏雞丸見婦科門本集八珍益母十全丸資益坤元補養氣血除淋瀝帶下俾羸形體壯坐健調經受孕即如尊俎折衝胎前和氣産後補虛真婦女之聖劑超古今之諸方有室家者不可不知也豫哂斯世之醫惟集古方香附勝金丹為女人開鬱調經之用殊不審古今虛實懸壤之異古人氣實惟有多郁故用香附以開導之香附味辛性燥但能開破而已多用之大耗氣血虛者愈虛病者愈甚而於滋補何有哉今世十婦九虛非補不可再用香附以耗之浸成怯弱之證是辨之不早則危殆而難痊矣益母草五月五日六月六日俱可採陰乾折去下半截用上半截連穗葉石臼杵搗節為極細末八兩人參飲上蒸白朮飯上蒸白茯苓飯上蒸各一兩甘草炙五分當歸身酒浸二兩川芎五分熟地黃酒浸二兩白芍藥醋炒一兩角沉香四錢上各為極細末煉蜜和丸如梧桐子大空心蜜湯送下九十丸食乾果子壓之不善吞者化開服尤效冬月酒下婦女經脈不調者或有氣血兩虛而身體素弱服此以養且調當年而經不通者服一料則通經不調者服一月則調素不孕者服一月即孕胎前間或用一服則胎固而自安凡妊娠微覺胎動隨用一服即安産後用一服以童便酒化開調下則無壅滯血運之候多服之補虛活血又治産後諸病極穩急欲取效以酒調化服通經丸治經閉不通結積成塊其效甚速熟地黃三兩虻蟲去頭翅炒水蛭糯米炒桃仁去皮尖各五十上為末煉蜜丸梧桐子大空心調下五丸漸加七丸以通為度經驗調經湯治月經不調或前或後來多來少或逾月不來或一月兩至服之皆效當歸酒洗一錢阿膠炒成珠半夏制白芍藥酒炒人參牡丹皮川芎麥門冬甘草各七分桂心吳茱萸泡各二分上水鍾半姜三片煎八分空心稍熱服促經湯治月經過期不行腰腹作痛香附子熟地黃白芍藥莪朮木通蘇木各八分當歸一錢川芎紅花甘草五分肉桂桃仁二十粒去皮尖上水鍾半煎八分空心溫服紅花歸尾散治氣虛損或積瘀血不行過期斷續不定時作腹痛室女月經不通並效紅花蘇木紫威牛膝酒洗歸尾甘草各二兩白芷肉桂各兩半劉寄奴五兩赤芍藥九兩上為細末空心熱酒調服三錢食前臨臥再服若久不行經濃煎紅花酒調下鎮經湯治經水先期而來過多不止蓋因腎水陰虛不能鎮守待時相火助行故也當歸錢半白芍藥生地黃黃柏各七分阿膠珠條黃芩知母甘草川芎各五分香附子制薑黃連各八分白芷三分上水盞半煎七分空心服固經丸治經水過多不止樗根白皮七錢半黃芩龜板各一兩白芍藥炒七錢黃柏香附米制三錢半上為末酒糊丸梧桐子大每服七十丸空心白湯送下朮附丸治月經不調臍腹㽲痛肋疼腰脹噁心頭暈或發熱發寒心忪乏力崩中帶下並治蒼朮去土一斤用米泔水浸遂日換新泔春五日夏三日秋七日冬十日切片焙乾分四制一分用茴香一兩鹽一兩同炒術黃為度一分用川烏一個制切片川楝子一兩打碎同術炒黃為度一分用川椒一兩去目及合口者破故紙一兩同術炒黃為度一分用好醋好酒各一盞煮術干焙燥用之香附米一斤分四制酒醋鹽水童便如前分四時各浸日數炒乾上為末老米麵作糊丸梧桐子大每服五十丸空心食前白湯下一方有艾葉當歸四物益母丸治婦人經水不調小腹有塊時痛服此愈而有孕川當歸酒洗熟地黃制各四兩川芎白芍藥炒各一兩益母草不犯鐵器為末半斤香附子制斤吳茱萸酒泡二兩上為末煉蜜丸如彈子大每服一丸空心酒化下如不喜化只作小丸吞服亦可克應丸治婦人赤白帶下熟地黃赤芍藥各二兩當歸二兩半赤石脂煅龍骨牡蠣煅以酒焠茯苓牡丹皮川芎艾葉制研各一兩上為末酷糊丸梧桐子大每服五十丸空心白湯送下東垣固真丸治白帶久下不止臍腹冷痛目中溜火視物昏花齒惡熱飲但喜寒食此皆寒濕秉於胞內肝經陰火上溢故目中溜火其惡熱飲者陽明經中伏火也法當大瀉寒濕以此丸治之黃柏酒炒白芍藥各五分柴胡白石脂各一錢白龍骨當歸酒洗各二錢乾薑三錢炮上除龍骨石脂水飛另研外余共為細末糊丸如芡實子大日乾空心白湯下少時以飯壓是不令熱藥犯胃也忌生冷硬物酒濕麵食人參黃耆湯治婦人氣血俱虛久患白帶瘦弱無力腰脹腿痠身熱面黃飲食無味小便淋澀服此全效當歸茯苓各一錢白朮芍藥地骨皮人參川芎各七分黃耆蜜炙鹿角霜為細末藥煎熟時起入五匙和勻服炙甘草車前子熟地黃各五分上水二盞棗三枚煎八分不拘時服金櫻蓮子散治脾胃虛弱赤白帶下俱效金櫻子冬採乾擦去毛三兩淨炒切破去子淨用蓮子去心頭面各二兩炒白扁豆二兩炒牡荊實即黃荊子也糯米一合炒上為細末每用四錢入熟蜜三匙滾湯調服無不效涼血地黃湯治婦人血崩由陰虛不能制火火激其血故崩下用此王道方黃芩荊芥穗各七分蔓荊子黃柏知母藁本細辛川芎黃連羌活升麻柴胡防風各三分生地黃當歸各八分甘草五分紅花少許上水盞半煎八分空心服龍骨散治血崩不止龍骨煅當歸香附子炒各一兩棕毛灰五錢上為細末每服四錢空心米湯調忌油膩雞魚爆炙物阿艾丸治血崩屢驗老婦尤效白姜鹽酒或米醋炒八錢香附子童便浸炒一兩玄胡索炒六錢真阿膠炒成珠艾葉各一兩製成灸艾用糯米糊作餅瓦上炕干勿令焦研為細末上為末酒糊丸梧桐子大每服三十丸空心鹽酒或鹽湯任下黃芩散治壯熱崩中下血是陽乘陰故經血泛溢宜清之此方最好黃芩不拘多少為細末燒稱錘淬酒食前調三四錢一方有乾薑白芷一方木耳黃芩等分為丸俱效如聖散治血崩三服全愈櫚棕子每服二錢空苡烏梅湯調服烏梅肉乾薑俱燒存性為末各二兩七灰散治血崩神效蓮蓬殼益母草旱蓮草罌粟殼醃蟹殼棕毛葉藕節灰等分燒存性為末空心醋點湯調下三錢東垣升陽除濕湯治崩中下血久不愈乃濕氣下流方見血崩門崩漏脈論詳見心鏡本門此特摘其要耳易簡方一方烏梅肉為末酒調二錢一方棕櫚灰加枯礬末酒調效一方蒼耳草燒存性酒調三錢立效一方荊芥穗香油燈上燒焦為末酒與童便勻調下俱效一方槐花地榆炒焦酒煎飲之效
