生氣之海針八分灸七壯主治下焦冷痛陽虛真氣不足賁豚七疝小腸膀胱癥瘕結塊狀為覆杯臍下冷氣陽脫欲死陰證卵縮四肢厥冷婦人赤白帶下月事不調小兒遺尿陰交一名橫戶在臍下一寸當膀胱上口三焦之募任脈少陰衝脈之會針八分灸百壯主治小腹氣痛引陰中不得小便疝痛陰汗濕癢賁豚腰膝拘攣婦人崩中帶下陰癢神闕一名氣舍當臍中禁針灸三壯主治中風不省人事腹中虛冷腸鳴瀉泄不止水腫鼓脹小兒風癇角弓反張脫肛水分在下脘下一寸臍上一寸穴當小腸下口至是而泌別清濁水液入膀胱滓渣入大腸故曰水分禁針灸七壯主治水病腹堅腫如鼓繞臍痛腸鳴泄瀉小兒陷囟下脘在建里下一寸臍上二寸穴當胃之下口小腸上口水穀於是入焉足太陰任脈之會針八分灸二七壯至百壯主治臍下厥氣腸堅痛寒穀不化癖塊連臍瘦弱少食翻胃建里在中脘下一寸臍上三寸針五分灸五壯主治腹脹身腫心痛上氣腸鳴嘔逆不食中脘一名太倉在上脘下一寸臍上四寸居心蔽骨與臍之中胃之募手太陽少陽足陽明任脈之會針八分灸二七壯至百壯主治五隔五噎翻胃不食腹脹脾疼心積伏梁面黃溫瘧霍亂吐瀉寒熱不已上脘一名胃脘在巨闕下一寸五分去蔽骨三寸臍上五寸上脘中脘屬胃絡脾足陽明手太陽任脈之會針八分灸二七壯至百壯主治腹中雷鳴飲食不化霍亂吐利翻胃嘔吐食不下伏梁積聚黃疸驚悸吐涎沫嘔血巨闕在鳩尾下一寸心之募針六分灸七壯主治上氣咳逆胸滿氣短九種心痛蛔痛痰飲咳嗽霍亂腹脹恍惚發狂黃疸中膈不利煩悶卒心痛尸厥鳩尾蔽骨之端在臆前蔽骨下五分人無蔽骨者從歧骨際下行一寸曰鳩尾禁灸禁針中庭在膻中下一寸六分陷中針三分灸五壯主治胸脅支滿噎塞嘔吐食不下膻中在玉堂下一寸六分橫兩乳間陷中仰而取之禁針灸七壯主治上氣短氣咳逆噎氣隔食喉鳴氣喘肺癰吐沫膿血婦人乳汁少玉堂一名玉英在紫宮下一寸六分陷中針三分灸五壯主治胸膺疼痛心煩咳逆上氣喘急不得息嘔吐寒痰紫宮在華蓋下一寸六分陷中仰而取之針三分灸五壯主治胸脅支滿膺痛食不下咳逆上氣吐血煩心華蓋在璇璣下一寸陷中仰而取之針三分灸五壯主治咳逆喘急上氣哮嗽喉痹水飲不下璇璣在天突下一寸陷中仰面取之針三分灸五壯主治胸脅滿咳逆上氣喉鳴喘不能言水飲不下天突在頸結喉下四寸宛宛中陰維任脈之會針一分灸三壯主治上氣咳逆喘嗽喉痹五噎嘔吐咯膿血咽腫暴喑廉泉一名舌本在頷下結喉上四寸中央仰面取之維脈任脈之會針二分灸三壯主治咳嗽喘息上氣吐沫舌下重難言舌根急縮不食涎出口瘡承漿一名懸漿唇稜下陷中開口取之大腸脈胃脈督脈任脈之會針二分灸三壯主治偏風半身不遂口眼喎斜暴喑不能言任之為病其苦內結男子為七疝女子為瘕聚督脈者為奇經八脈之一脈也起於下極之俞並於脊裡上至風府入腦上巔循額至鼻柱屬陽脈之海也云為海者以其總為陽脈之綱故曰海也行背中行凡二十七穴長強一名氣之陰郤一名撅骨在脊骶骨端計三分伏地取之乃得足少陰少陽結會督脈別走任脈針三分灸五壯主治腸風下血久痔五淋洞泄失精嘔血小兒囟陷驚癇瘛瘲腰俞一名腰柱一名腰戶在二十一椎節下間宛宛中針八分灸七壯主治腰脊痛不得俯仰溫瘧汗不出婦人經閉溺赤陽關在十六椎節下間坐取之針五分灸三壯主治膝痛不可屈伸風痹不仁筋攣不行命門一名屬纍在十四椎節下間伏取之針五分灸二壯主治頭痛如破身熱如火骨蒸汗不出痎瘧腰腹痛懸樞在十三椎下伏取之針三分灸三壯主治腰脊強不得屈伸積氣上下水穀不化瀉痢不止脊中一名神宗一名脊俞在十一椎節下間俯而取之針五分禁灸督脈之圖主治風癇癲邪腹滿不食五痔積聚小兒脫肛筋縮在九椎節下間俯取之針五分灸三壯主治癲疾狂走風癇目上視至陽在七節下間俯取之針五分灸三壯主治腰脊痛胃中寒不食胸脅支滿脛酸四肢重寒熱如解㑊靈臺在六椎節間俯取之諸書俱不主治今俗灸之以治氣喘不能臥火到便愈神道在五椎節下間俯取之針五分灸七壯主治傷寒頭痛寒熱往來痎瘧健忘驚悸牙車急張口不合風癇身柱在三椎節骨下俯取之針五分灸七壯主治腰脊痛癲癇狂走瘛瘲妄言陶道大椎下間俯取之足太陽督脈之會針五分灸五壯主治痎瘧寒熱灑淅脊強煩滿汗不出頭重瘛瘲恍惚不樂大椎在一椎上陷者宛宛中手足三陽督脈之會針五分灸以十為壯主治五勞七傷乏力痎瘧肺脹脅滿嘔吐上氣背膊拘急項頸強不得回顧啞門一名喑門一名厭舌一名舌橫在項後入髮際五分項中央宛宛中仰頭取之督脈陽維之會針三分禁灸灸之令人啞主治舌急不語衄血不止脊強反折瘛瘲癲疾頭重風汗汗不出風府一名舌本在項後入髮際一寸大筋內宛宛中疾言其肉立起言休立下足太陽督脈陽維之會針三分禁灸犯之令人失喑主治中風舌緩不語振寒汗出身重偏風半身不遂頭痛項急不得回顧傷寒發狂腦戶一名合顱在枕骨上強間後一寸半足太陽督脈之會針三分禁灸主治面赤痛頭重腫痛癭瘤強間一名大羽在後頂後一寸半針二分灸五壯主治頭痛目眩腦旋煩心嘔吐項強狂走不臥後頂一名交沖在百會穴後一寸半枕骨上針二分灸五壯主治頸項強急額顱上痛偏頭痛惡風目䀮䀮百會一名三陽五會一名巔上一名天滿在前頂後一寸五分頂中央旋毛中容豆許直兩耳尖至頂中央是穴手足三陽督脈之會針二分灸七壯主治頭風頭痛中風言語謇滯口噤不開偏風半身不遂風癇卒厥角弓反張嘔吐沫心神恍惚健忘痎瘧百病皆治前頂在囟會後一寸半骨間陷中針一分灸三壯主治頭風目眩而赤腫小兒驚癇瘛瘲囟會在上星後一寸陷中針二分灸二壯主治腦虛冷痛飲酒過多頭皮腫生白屑面目暴腫鼻塞不聞上星一名神堂在神庭後入髮際一寸陷中容豆針三分灸五壯主治頭風頭痛頭皮腫面虛惡寒痎瘧寒熱汗不止鼻血不止神庭在鼻上入髮際五分足太陽陽明督脈之會禁針灸三壯主治發狂登高妄走風癇癲疾角弓反張目不識人頭風鼻淵流涕不止頭痛目淚煩滿喘渴素髎一名面正在鼻柱上端準頭禁灸針一分主治鼻中瘜肉不消喘息不利多涕喎噼衄血水溝一名人中在鼻下人中近鼻孔陷中督脈手足陽明之會針三分灸三壯主治中風口噤牙關不開卒中惡邪鬼擊不省人事癲癇卒倒消渴飲水遍身浮腫溫疫口喎噼兌端在唇上端針二分灸三壯主治癲癇吐沫齒齦痛消渴衄血口噤鼓頷斷交在唇內齒上齦縫中任督足陽明之會針三分主治鼻瘜肉不消額頭中痛頸項強目淚多眵牙疳腫痛奇經衝脈衝脈者與任脈皆起於胞中上循脊裡為經絡之海其浮於外者循腹上行會於咽喉別而絡唇口故曰衝脈者起於氣衝並足少陰之經俠臍上行至胸中而散此為病令人逆氣而裡急難經則曰並足陽明之經以穴考之足陽明俠臍左右各二寸而上行足少陰俠臍左右各五分而上行針經所載衝任與督脈同起於會陰其在腹也行乎幽門通谷陰都石關商曲肓俞中柱四滿氣穴大赫橫骨凡二十二穴皆足少陰之分也然則衝脈並足少陰之經明矣幽門巨闕旁通谷上脘兩旁陰都通谷下石關陰都下商曲石關下肓俞商曲下中注肓俞下四滿中注下氣穴四滿下大赫氣穴下橫骨大赫下逆氣裡急者取諸此奇經帶脈帶脈起於季脅回身一周其為病也腰腹縱容如囊水之狀其脈氣所發正名帶脈以其回身一周如帶也又與足少陽會於維道此帶脈所發凡四穴帶脈在季脅下一寸八分維道奇經陽蹺脈陽蹺脈者起於跟中循外踝上行入風池其為病也令人陰緩而陽急兩足蹺脈本太陽之別合於太陽其氣上行氣並相遠則為濡目氣不榮則目不合男子數其陽女子數其陰當數者為經不當數者為絡也蹺脈長八尺所發之穴生於申脈以輔陽為郤本於僕參與足少陽會於居髎又與手陽明會於肩顒及巨骨又與手足太陽陽維會於臑俞與手足陽明會於地倉又與手足陽明會於巨髎又與任脈足陽明會於承泣凡二十穴申脈外踝下屬足太陽經輔陽外踝上僕參跟骨上居髎章門下肩顒肩端巨骨肩端臑俞肩髎後胛骨上廉地倉口吻兩旁巨髎鼻兩旁承泣目下七分奇經陰蹺脈陰蹺脈者亦起於跟中循內踝上行至咽喉交貫衝脈此為病者令人陽緩而陰急故曰蹺脈者少陰之別別於然谷之後上內踝之上直上循陰股入陰上循胸裡入缺盆上出人迎之前入鼻屬目內眥合於太陽女子以之為經男子以之為絡兩足蹺脈長八尺而陰蹺之郤在交信陰蹺病者取此然谷足內踝下交信內踝上奇經陽維脈陽維維於陽其脈起於諸陽之會與陰維皆維絡於身若陽不能維於陽則溶溶不能自收持其脈氣所發別於金門以陽交為郤與手足太陽及蹺脈會於臑俞與手足少陽會於天髎又會於肩井其在頭也與足少陽會於陽白上於本神及臨泣上至正營循於腦空下至風池其與督脈會則在風府及啞門難經云陽維為病苦寒熱此陽維脈氣所發凡二十四穴金門足外踝下陽交外踝上臑俞肩後胛上天髎缺盆上肩井肩頭上陽白眉上本神眉上臨泣眉上正營目窗上腦空缺盆上風池顳顬後風府髮際啞門風府後奇經陰維脈陰維維於陰其脈起於諸陰之交若陰不能維於陰則悵然失志其脈所發者陰維之郤名曰築臏與足太陰會於腹哀大橫又與足太陰厥陰會於府舍期門與任脈會於天突廉泉難經云陰維為病苦心痛此陰脈所發凡十二穴築臏內踝上腹哀日月下大橫腹哀下府舍腹結下期門乳下天突結喉下廉泉結喉上十二井滎俞原經合穴少商肺少衝心大敦肝隱白脾湧泉腎中衝心包絡商陽大腸少澤小腸竅陰膽厲兌胃至陰膀胱關衝三焦魚際肺少府心行間肝大都脾然谷腎勞宮心包二間大腸前谷小腸俠溪膽內庭胃通谷膀胱液門三焦太淵肺神門心太衝肝太白脾太溪腎大陵心包三間大腸後溪小腸臨泣膽陷谷胃束骨膀胱中渚三焦經渠肺靈道心中封肝商丘脾復溜腎間使心包陽溪大腸陽谷小腸陽輔膽解溪胃崑崙膀胱支溝三焦太淵肺神門心太衝肝太白脾太溪腎大陵心包合谷大腸宛骨小腸丘墟膽衝陽胃京骨膀胱陽池三焦尺澤肺少海心曲泉肝陰陵泉脾陰谷腎曲澤心包絡曲池大腸少海小腸陽陵泉膽三里胃委中膀胱天井三焦五臟募俞穴募皆在腹俞皆在背中府肺之募巨闕心之募章門脾之募期門肝之募中脘胃之募肺俞三椎下各寸半心俞五椎下各開寸半肝俞九椎下各開寸半脾俞十一椎下各開寸半腎俞十四椎下各開寸半八會穴中脘府會章門臟會陽陵泉筋會陽輔髓會膈會血會大杼骨會太淵脈會膻中氣會凡經脈丈尺手之六陽從手至頭長五尺五六合三丈手之六陰從胸中至手長三尺五寸三六合一丈八尺五六合三尺共二丈一尺足之六陽從頭至足長八尺六八合四丈八尺足之六陰從足至胸中長六尺五寸六六合三丈六尺五六合三尺共三丈九尺蹺脈從足至目長七尺五寸二脈共一丈五尺任督二脈各長四尺五寸二脈共九尺通共十六丈二尺此氣之大經隧也
