body:
  text: 卷之六經穴發明取穴尺寸圖説人身經脈十四絡脈十五原穴十二誠為一身樞要綱維之大不可以不熟會於胸中至於取法如標幽賦云取五穴用一穴而必端取三經用一經而可正今世之醫惟取中指中節謂之同身寸凡取諸穴悉依之其亦未之思耳殊不知同身之義隨身之大小肥瘦長短隨處分折而取之則自無此長彼短之弊而庶幾乎同身之義有準矣若以中指為法如瘦人指長而身小則背腹之橫寸豈不太闊耶如肥人指短而身大則背腹之橫寸豈不太狹耶古人所以特謂同身寸法者蓋必同其身體隨在而分析之固無肥瘦長短之差訛也如頭部則以前眉中直上至後大杼骨共折一尺八寸眼內眥角至外眥角為一寸頭部直橫寸法悉依此準如背部自大椎下至尾骶共折三尺橫寸第二行連脊分開各二寸第三行連脊分開各三寸半背部直橫寸法悉依此準如腹部天突至膻中折六寸歧骨至臍折八寸臍下至毛際折五寸兩乳對摺八寸腹部直橫寸法悉依此準如四肢尺寸手肘內曲澤穴至經渠為一尺足膝至踝尖為一尺六寸踝尖至地為三寸亦不獨以中指為法也何後世不論背腹概以中指謂之同身簡面是行簡訛而愈訛愚故悉圖背腹總較尺寸以備考取之便倘考有未盡法有未周惟同志者訂之庶斯集之無遺憾也仰人尺寸之圖伏人尺寸之圖背穴圖腹穴圖背部穴俞歌二節大椎風門肺俞厥陰心督肝膈膽脾胃俞三焦腎俞氣海大腸關元小腸膀俞中膂白環上次中下皆窖也膏肓肓門四花六穴腰俞命門穴皆可徹腹部中穴歌天突璇璣華蓋紫宮玉堂膻中中庭鳩尾巨闕上脘中脘建里下脘水分神闕交海石門關元中極曲骨膀門二寸夾臍天樞期章二門不可不知頭部前髮際至後髮際折作十二節為一尺二寸前髮際不明者取眉心直上行三寸後髮際不明者取大椎上行三寸前後俱不明者折作一尺八寸頭部直寸並依此法取眼內眥角至外眥角為一寸頭部橫穴並依此穴寸法神庭穴至曲差穴曲差穴至本神穴本神穴至頭維穴各一寸半自神庭至頭維共四寸半背部大椎穴下尾骶骨穴共計二十一椎通作三尺故謂人為三尺之軀者此也上七椎每椎一寸四分一釐共九寸八分七釐中七椎每椎一寸六分一釐十四椎與臍平共二尺一寸一分四釐下七椎每椎一寸二分六釐共八寸八分二釐第二行夾脊各一寸半除脊一寸共折作四寸分兩傍第三行夾脊各三寸除脊一寸共折作七寸分兩傍腹部膺部腹部橫寸並用對乳間橫折作八寸膺腹橫寸取穴悉依上法直寸取穴依心胸歧骨下至臍共折八寸臍下至毛際橫骨折作五寸天突至膻中折作六寸八分下行一寸六分為中庭上取天突至中庭共折八寸四分手足穴並用中指寸取之謹按同身尺寸頭之大骨圍二尺六寸胸圍四尺五寸腰圍四尺二寸發所覆者顱至項尺二寸發以下至頤長一尺結喉以下至缺盆中長四寸缺盆以下至𩩲骬長九寸過則肺大不滿則肺小𩩲骬以下至天樞長八寸過則胃大不及則胃小天樞以下至橫骨長六寸半過則回腸廣長不滿則短狹橫骨長六寸半橫骨上廉以下至內輔之上廉長一尺八才內輔之上廉以下至下廉長三寸半內輔下廉下至內踝長一尺三寸內踝以下至地長三寸膝膕以下至跗屬長一尺六寸跗屬以下至地長三寸故骨圍大則太過小則不及角以下至柱骨長一尺行腋中不見者長四寸腋以下至季脅長一尺二寸季脅以下至髀樞長六寸髀樞以下至膝中長一尺九寸膝以下至踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸耳後當完骨者廣九寸耳前當耳門者廣一尺三寸兩顴之間相去七寸兩乳之間廣九寸兩髀之間廣六寸半足長一尺二寸廣四寸半肩至肘長一尺七寸肘至腕長一尺二寸半腕至中指本節長四寸至其末節長四寸半項發以下至骨長二寸半膂骨以下至尾骶二十一節長三尺周身經穴隨處而取之則其長短闊狹各合其度而自無過與不及之弊矣今人悉以中指一寸通身取之烏得為之同身當曰同指必其隨所處而取其穴道故曰同身寸十四經脈長短尺寸手之六陽經脈從手至頭長五尺共計五六合三丈手之六陰經脈從胸走手長三尺五寸共計三六一丈八尺五六合三尺合二丈一尺足之六陽經脈從頭走至足長八尺共計六八四丈八尺足之六陰經脈從足走入胸中長六尺五寸共計六六三十六五六當三尺合三丈九尺督脈任脈各長四尺五寸共合九尺兩蹺脈從足至目各長七尺五寸共合一丈五尺十四脈都合十六丈二尺此氣之大經隧也經脈説夫所謂經者以其氣血流行之大經常而不息者謂之脈者以其血理分袤音謀言相去也行體者而言也謂之絡者本經之旁支而別出以聯絡於十二經者也如手太陰經之支者從腕後出次指端而交於陽明經者是也中指同身寸圖凡量四肢穴道必用此中指寸法蓋四肢長短無不同者量身上穴當同身男左女右手中指第二內廷兩橫紋頭相去為一寸取稻稈心量或用薄篾量皆易折而不伸縮為準用繩則伸縮不便故多不準肺臟形手太陰肺經穴圖內經曰西方白色入通於肺開竅於鼻藏精於肺故病在背其味辛其類金其畜馬其谷稻其音商其數九其臭腥其液涕肺主鼻其在天為燥在地為金在體為皮毛在臟為肺在色為白在音為商在聲為哭在變動為咳在竅為鼻在味為辛在志為憂憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛其應四時上為太白星是以知病之在皮毛也肺者氣之本魄之處也其華在毛其充在皮為陽中之太陽通於秋氣肺者相傅之官治節出焉肺之合皮也其榮毛也其主心也肺色白欲如鵝毛不欲如鹽肺氣絶則皮毛焦皮毛焦則津液去津液去則皮節傷皮節傷則皮枯毛折毛折者死不治手太陰肺脈起於中焦下絡大腸還循胃口上膈屬肺從肺系喉嚨是也橫出腋下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端凡十一穴左右共二十二穴經穴歌手太陰十一穴中府雲門天府列俠白尺澤孔最存列缺經渠太淵涉魚際直出大指終絡過陽明大腸接肺經步穴歌太陰肺兮出中府雲門之下一寸許雲門氣戶旁二寸人迎之下二骨數天府腋下三寸求俠白去肘五寸主尺澤肘中約文論孔最腕中七寸許列缺腕側一寸半經渠寸口陷中是太淵掌後橫紋頭魚際節後大指本節後散脈舉少商大指內側端此穴若針疾咸愈中府一名膺俞在雲門下一寸乳上三肋間動脈應手陷中去中行六寸肺之募募猶結募也經氣聚此手足太陰二脈之會針入三分灸五壯埤雅云壯者以壯人為法也主治腹脹食不下四肢腫喘氣胸滿肩背痛嘔啘咳逆上氣肺系急肺寒熱胸悚悚膽熱濁涕風汗出面腫少氣不得臥傷寒胸中熱飛尸遁注癭瘤雲門在巨骨下俠氣戶旁二寸陷中動脈應手舉臂取之去胸中行任脈兩旁相去各六寸針入三分不宜深深則使人氣逆灸五壯主治傷寒四肢熱不已咳逆短氣上衝心胸脅徹背痛喉痹臂不得舉癭氣天府在腋下三寸臂臑內廉動脈陷中以鼻取之銅人針四分灸二七壯至百壯資生云非大急不灸甲乙經禁灸灸之使人逆氣主治暴痹內逆肝脈相搏血溢鼻口鼻衄血不止卒中惡風邪氣泣出喜忘飛尸惡疰鬼語遁下喘不得息瘧寒熱目眩遠視䀮䀮癭氣俠白在天府下去肘五寸動脈中針三分灸五壯主治心痛短氣乾嘔煩滿尺澤在肘中約紋上屈肘橫紋筋骨罅陷中手太陰肺脈所入為合水肺實瀉之針三分灸三壯銅人禁灸素問灸五壯主治肩背痛汗出中風小便數而久溺色變遺失無度面白善嚏悲愁不樂灑淅寒熱風疸臑肘攣手臂不得舉喉痹上氣嘔吐口舌乾咳嗽痎瘧四肢腫臂寒短氣心痛肺積息賁小兒慢驚風孔最去腕上七寸銅人針三分灸五壯主治熱病汗不出咳逆肘臂屈伸難吐血失音咽痛頭痛列缺手太陰別絡走陽明去腕側上一寸五分滑氏以手交叉頭食指末筋罅中是穴銅人針二分灸三壯明堂針三分灸七壯主治偏風口面喎斜手肘無力半身不遂口噤不開寒熱瘧嘔沫咳嗽善笑驚癇妄見面目四肢癰腫肩痹胸背寒栗少氣不足以息尸厥寒厥按素問曰直行者謂之經旁出者謂之絡手太陰之支從腕後直出次指內廉出其端是列缺為太陰別走陽明之絡人或有寸關尺三部脈不見自列缺至陽溪脈見者俗謂反關脈此經脈虛而絡脈滿千金翼謂陽脈逆反大於寸口三倍惜叔和尚未之及而況高陽生哉經渠在寸口陷中針三分禁灸灸傷人神明主治瘧寒熱胸背拘急臌脹喉痹咳逆上氣傷寒熱病汗不出心痛嘔吐太淵一名太泉避唐祖諱在掌後陷中肺脈所注為俞經曰脈會太淵疏曰脈病治此平旦寅時氣血從此始故曰寸口者脈之大要會手太陰之動也針一分灸三壯主治胸痹逆氣善嘔噦飲水咳嗽煩躁不得眠肺脹鼓眼痛眼青生翳赤筋缺盆痛引臂肩背痛寒喘不息氣上逆心痛咳血狂言溺色變遺失無度魚際在大指本節後內側陷中又云散脈中肺脈所溜為滎針一分灸三壯主治酒病身熱惡風寒虛熱舌上黃頭痛咳嗽噦傷寒汗不出痹走胸背痛目眩煩心少氣腹痛不下食肘攣支滿喉中乾燥寒栗溺出嘔血悲恐心痹乳癰少商在大指端內側去爪甲角如菲葉白肉際宛宛中肺脈所出為井木針一分灸一壯主治項腫喉痹煩心善嘔心下滿汗出而煩咳逆痎瘧振寒腹滿唾沫引飲食不下小兒乳鵝唐刺史項腫如升喉中閉塞水粒不下甄權以三稜針刺之微出血而立愈大腸腑形內經曰大腸者傳道之官變化出焉又云大腸為白腸食下則腸實而胃虛故曰實而不滿滿而不實手陽明大腸之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中大指之次指謂食指也凡經脈之道陰脈行手足之裡陽脈行手足之外此經多血多氣循臂上廉入肘外廉上循臑外前廉上肩出髃骨之前廉上出柱骨之會上下入缺盆絡肺下膈屬大腸其支者別從缺盆上頸貫頰入下齒縫中遠出挾口交人中左之右右之左上挾鼻孔凡二十穴左右共四十穴商陽一名絶陽手大指次指內側去爪甲角如韭葉手陽明大腸脈所出為井金針一分灸三壯手陽明大腸經穴圖主治胸中滿氣喘肢腫痛熱病汗不出耳鳴耳聾寒熱痎瘧口乾頤腫齒痛惡寒肩背急相引缺盆中痛目青盲灸三壯右取左左取右如食頃立已二間一名間谷在食指本節前內側陷中手陽明大腸脈所溜為滎水針三分灸五壯主治喉痹頷䪼腫肩背臑痛振寒鼻衄多驚齒痛目黃口乾口喎急食不通傷寒水結三間一名少谷在食指本節後內側陷中手陽明大腸脈所注為俞木針三分灸三壯主治喉痹咽中如梗下齒齲痛嗜臥胸腹滿腸鳴洞泄寒熱瘧唇焦口乾氣喘目眥痛喜驚多唾寒熱結水合谷一名虎口手大指次指歧骨間陷中手陽明大腸脈所過為原針三分灸三壯主治傷寒大渴脈浮在表發熱惡寒頭痛脊強無汗寒熱瘧鼻衄不止熱病汗不出目視不明偏正頭痛腰脊內引痛小兒單乳鵝婦人妊娠補合谷即墮胎陽溪一名中魁腕中上側兩筋間陷中手陽明大腸脈所行為經火針三分灸三壯主治狂言笑喜見鬼熱病煩心目赤爛翳厥逆頭痛胸滿不得息寒熱瘧嘔沫喉痹耳鳴驚掣肘臂不舉痂疥偏歷在腕中後三寸陽明絡脈別走太陰針三分灸三壯主治肩膊肘腕疼目䀮䀮齒痛鼻衄寒熱瘧癲疾多言喉痹耳鳴汗不出利小便溫溜一名逆注一名池頭腕後大士五寸小士六寸明堂腕後五寸六寸間針三分灸三壯主治腸鳴腹