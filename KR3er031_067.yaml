body:
  text: 卷之六十七瘦瘤候病機癭瘤敘論癭瘤之病乃足陽明之經與任脈二經氣血凝滯加以憂鬱之所成也何則陽明為多氣多血之經任脈為陰血之至脈氣滯上焦即血不下流而著於任脈之杪故多著於頸項皮寬處是也外科精義云人之氣血循環一身常欲無滯流之患倘喜怒不節憂思過度調攝失宜以致氣滯血凝而成癭瘤既久血氣寢衰不能攻擊其形堅實無如之何五癭六瘤其狀各異五癭者一曰肉癭其肉色不變軟硬中和二曰筋癭其筋脈露呈三曰血癭其赤脈交結如纏紅絲四曰氣癭憂愁腫甚喜樂漸消隨氣消長五曰石癭其中堅硬如石不能轉移是也瘤病有六者一曰骨瘤二曰脂瘤三曰肉瘤四曰膿瘤五曰血瘤六曰石瘤是也癭瘤二證雖不痛癢誠不美觀治之不得其法者又莫如弗治之為愈也嘗見用針及爛藥決破膿血崩潰滲漏不已而致死者其間肉癭石瘤攻治尤所不可惟氣癭粉瘤之類可以服藥而痊醫此者慎毋輕忽也治法治癭瘤以削堅開鬱行氣為本經曰堅者削之留者攻之結者散之郁者達發奪泄折之是也如海帶昆布之咸以軟堅黃藥子之苦辛以行氣破結散之類是也丹溪云治癭必須斷厚味子和治法一婦人年四十有瘤三瓣戴人令以成吐之一湧二汗三下癭已卡消次服化癭之藥遂大消去夫病在上者皆宜吐亦自有消息之法耳戴人在西華與魏壽之入食肆中見一人病瘤當目上色如灰李下覆目睛不能視物戴人謂壽之曰吾不待食熟主取此瘤魏未之信戴人曰吾與爾取去此瘤何如其人曰人皆不敢割戴人曰吾非用刀割別有一術焉人莫知之乃引入一小室中令俯臥以繩束肘刺委中大出血先令手揉其目瘤上亦刺取雀糞立平出戶壽之大驚戴人曰人之有技可盡窺乎一女子未嫁年十八兩手背有瘤一如雞距一如雀角腕不能釧而明望之如桃膠夫姑欲棄之戴人見之曰在手背者為膠瘤在耳者為粉瘤此膠瘤也以䤵針十字刺破按出黃膠膿三四匙立平更不復作非明者不敢用此法耳藥方破結散治五癭海藻洗龍膽草海蛤通草昆布明礬枯松蘿各三分麥曲四分半夏貝母各二分上為末酒調服日三次忌甘草鯽魚豬肉五辛生冷毒物良方昆布散治癭氣胸膈壅塞頸項漸粗宜服此商陸昆布洗各二兩射干羚羊角鎊木通海藻洗杏仁制炒黃色每味各一錢牛蒡子微炒一錢半上咀分二服每服水盞半姜一片煎六分服昆布丸治一切癭瘤昆布洗海藻洗小麥醋煮乾各一兩上為末煉蜜丸如杏核大每服一丸食後噙化神效開結散治男女項下癭疾不分年歲久遠極有效驗沉香二錢木香三錢陳皮去白四兩珍珠四十九粒泥固火煆豬厭肉子生於豬項圍喉嚨系一枚如棗大微扁色相經收取四十九枚新瓦上焙乾用上為末每服二錢臨臥冷酒調徐徐咽下輕者三五服見效重者一料全愈修合時用除日效忌酸鹹油膩滯氣物直指祕傳木香散治一切癭瘤神效豬醃子七個燈盞火烘過干為細末海螵蛸南木香青木香孩兒茶各半兩雄黃神麯麥芽辰砂各一錢上為細末食後臨臥酒送下即睡再不可言語戒惱怒房室此方纍試無不效驗外臺昆布丸治項下卒結囊漸大欲成癭者昆布酒洗海藻酒洗等分為末煉蜜丸彈子大含化咽津南星膏治皮膚頭面生瘤大者如拳小者如粟或軟或硬不痛不疼無藥可療不可輒用針灸生南星大者一枚細研稠黏如膏上以酒三杯調攤貼如無生者以乾者為末投醋研為膏先以小針輕輕刺令氣透以藥膏攤紙上如瘤大小貼三五次易瘥針砂水專治氣癭針砂不拘多少浸於水缸中平日飲食皆用此水十日一換針砂服之半年自然消散針砂大能去積滯故也蠟礬丸癭瘤通用常服自然縮小消磨方見瘡毒門蜘蛛散治頰下結核不消經效大蜘蛛不計多少以好酒浸過研爛同酒調開澄去滓臨臥服治小瘤方先用甘草煎膏以筆塗瘤四圍干則又塗凡三次之後以大戟芫花甘遂等分為末米醋調別筆妝敷其中不得近著甘草處以日縮小又以甘草膏妝小暈三次中間仍用大戟芫花甘遂如前自然焦縮良方守癭丸治癭瘤結硬通草二兩杏仁去皮尖細研牛蒡子各一合昆布洗射干訶子海藻各四兩上為細末煉蜜丸彈子大每服一丸食後噙化日三服真人黃柏酒治年久癭疾萬州黃藥子半斤須緊重實者為上如輕虛者即是信州者力緩須加一倍以無灰酒一斗投藥在內固濟瓶口用糠火燒一伏時待酒冷即令患者時時飲一杯勿令絶酒氣經三五日常把鏡照若消即停飲不爾令人項細用火時不可多惟燒酒氣香出瓶頭有津即止火不待經宿也此方已驗如神半年忌食毒熱物五癭丸菖蒲二兩海蛤白蘞續斷海藻松蘿桂心倒掛草川椒半夏各一兩神麯羊醃百枚上為細末以牛羊脂髓為丸芡實大每服一丸臨臥噙咽濟生玉壺散治三種毒癭海藻海帶昆布雷丸各一兩廣朮青鹽各半兩上為細末老米飲為丸梧桐子大不拘時噙化五丸子和人參化癭丹人參海藻海帶海蛤昆布以上各用火焙澤瀉炒連翹各一兩豬醃子羊醃子各七枚上為末煉蜜丸芡實大臨臥啖之一丸忌油膩謙甫寶金散治癭氣無不愈豬羊醃子各十枚溫水洗曬乾杵細末海藻海帶各二分丁香木香琥珀麝香各一分珍珠半兩上琥珀麝香珍珠另研極細外余藥為末方入細藥和合再研重羅過每服一錢熱酒一盞調服夜再服子和枯瘤方治癭瘤大有神效雄黃粉霜硇砂各二錢輕粉乳香沒藥各一錢土黃三錢麝香少許上為細末以津調塗瘤頭外邊留一韭葉先花紙貼之上用小黃膏貼之造土黃法用雄黃另末二兩木鱉子半兩去殼巴豆半兩去油硇砂另研末二錢俱同雄黃一處為末但以木鱉子同石腦油和成一塊油紙包定埋於地坑內四十九日取出磁石器內盛劈作小塊子小黃膏黃柏黃芩各等分大黃各等分上為細末以水調為糊比前藥大一遭三日一易至八九上不取直候可取一方止用黃柏末一味亦佳五灰膏點癭瘤神驗桑柴灰棗柴灰黃荊灰桐子殼灰蕎麥杆灰各等分沸湯淋汁五碗澄清入斑蝥四十枚穿山甲五片乳香冰片各三錢煎作二碗用瓷器盛用時再以新出窯石灰入乳香冰片少許調成膏敷瘤上如稠加清水調稀用丹溪治瘤方海藻黃連各一兩為末以少許置掌中時時舐之津咽下如消三分之二須止之針灸法天突治一切癭瘤初起者灸之妙穴在結喉下宛宛中三七壯肩髃左膊骨頭肩端兩骨間陷宛中舉臂取之男左灸十八壯右十七壯女右灸十八壯左十七壯耳後兩髮際亦可灸臑會天府衝陽氣舍以上穴治癭瘤並灸易簡諸方太平聖惠方治癭氣結核㿔㿔腫硬用昆布一兩洗去鹽干搗為末每服一錢綿裹於好醋中浸過含咽津藥味盡再含之肘後方治項下卒結囊欲成癭用海藻一斤洗去鹽浸酒飲之不可間斷須要時時飲二三杯有酒氣方妙深師方治癭氣取鹿醃子以酒浸炙乾內酒中更令香含咽汁味盡更易十具愈外臺祕要治咽用豬肺管上團肉一塊新瓦焙臨臥酒下又方治癭極效用黑牛或犏牛喉內巧舌並咽喉脆骨二寸許一寸連兩邊扇動脆骨或燒或煮熟臨臥仰睡頓服巧舌多嚼多噙一會方咽其人容貌必瘦減而癭自消矣不二三服極效又方用自然銅貯水瓷中逐日飲水皆用甕內之水其癭自消或火燒煙氣久吸亦可又方用琵琶絃勒癭瘤根極效結核門獨形而單核者為結核經曰瘤氣結核皆屬於熱原病式云結核為火氣熱甚則鬱結堅硬如果中核不須潰發但令熱氣散則自消也丹溪云結核在項在臂在身如腫毒者多在皮裡膜外是濕痰流注作核不散若結核在頸項久而不散多成瘰癧必早治之為妙人多忽略致成痼疾久廢調理藥方結核在項間或耳後殭蠶炒大黃酒浸青黛臘膽南星各等分上為末煉蜜丸嚼下又方二陳湯加大黃酒炒連翹桔梗柴胡牛蒡子服結核在臂二陳湯加連翹防風川芎酒芩蒼朮皂角刺殭蠶滾痰丸治結核用鹽蔥湯吞服一錢三夜消無跡方見痰門射干治太陰厥陰之積痰結核用射干磨油服自消甚效
