body:
  text: 卷之三十九痓證門病機內經敘論經曰諸痓項強皆屬於濕王注太陽傷濕又曰諸暴強直皆屬於風王注陽內鬱而陰行於外劉河間云諸痓強直筋徑強直而不柔和也土主安靜故也陰痓曰柔痓陽痓曰剛痓亢則害承乃制故濕過極則反兼風化制之然兼化者虛象而實非風也又云諸暴強直皆屬於風謂筋徑強有力不柔和也然燥金為病緊斂短縮徑急風木為病反見燥金之化由亢則害承乃制也又況風能勝濕而為燥也痓病有剛柔之分仲景云病身熱足寒頸項強急惡寒時頭熱面赤獨頭搖動卒口噤背反張者痓病也又云太陽病發熱無汗而反惡寒名曰剛痓太陽病發熱汗出而不惡寒名曰柔痓痓病因汗多而得之仲景云太陽病發汗太多因致痓瘡家過汗亦致痓風病汗下亦致痓此為汗下之過亡津液之致亦內因也痓由內虛而得之痓證不因汗下之過必是氣血內虛外為風寒濕熱所襲而成痓也觀夫仲景謂傷寒汗下之過與夫産後瘡人多患之斯可見矣陳無擇始謂氣血內虛與仲景之言相臺所謂擴異世而同符者至理而已風搐反張有風火之證張子和醫案有病風搐目眩角弓反張數日不食諸醫皆作驚風暗風風癇治以南星雄黃烏附不效戴人曰諸風掉眩皆屬肝木陽主動陰主靜由火盛制金不能平木肝木茂而自病先湧風痰二三升次以寒劑下之又以䤵針刺百會出血立愈可見風搐與痓不同而痓證屬濕土極必兼風木搖動之化風搐屬木木極必見金燥緊斂之形要之亦可同論故取此條以證痓病不專於風寒濕之外至亦有風火熱之內作者也脈候脈浮緩為有汗肺浮緊為無汗脈沉細渚濕所傷也脈沉伏弦緊陽緩陰急則久久拘攣陰緩陽急則反張強直脈經曰太陽病發熱脈沉而細者曰痓為難治又云痓脈按之緊如弦直上下又云痓家脈皆伏堅直上下治法痓病當分剛柔有汗無汗見證治之古人以強直為痓而項背反張強硬如發癇狀無異要在察其有汗無汗以分剛柔無汗葛根湯主之有汗桂枝加栝蔞湯主之剛痓胸滿口噤腳攣急咬牙當行大承氣湯痓證並屬太陽項強口噤一證例則太陽兼陽明因有陽明故不宜汗而宜用承氣湯下之也痓病宜詳虛實審治仲景云汗下過多為壞證所成如産後因虛致痓惟宜補血降火敦土平木清痰祛濕隨證施治不可概以濕熱內盛郁遏生風而作痓者例用散解風寒而虛虛之誤不可不察也藥方通治痓劑金匱栝蔞桂枝湯治太陽病其證憊身體強𠘧𠘧然脈反沉遲此為痓病栝蔞根桂枝芍藥各錢半甘草五分生薑五片大棗二枚上水盞半煎八分熱服取微汗桂枝加葛根湯治柔痓葛根二錢桂枝芍藥各一錢甘草五分生薑三錢棗二枚上水盞半煎八分溫服二痓皆可用小續命湯加減服若胸滿口噤咬牙腳攣臥不著床者以大承氣湯下之無疑小續命湯方見風門葛根湯方見傷寒門治太陽剛痓無汗小便少氣上衝剛痓加味神術湯治無汗剛痓蒼朮川芎藁本白芷細辛甘草麻黃羌活獨活等分上水盞半姜三片蔥一根煎七分服柔痓桂心白朮湯治有汗厥逆拘急柔痓桂心附子白朮川芎甘草黃耆等分上水盞半棗一枚煎七分服養血疏風劑難知防風當歸散治發汗過多發熱頭面搖卒口噤背反張者防風當歸川芎生地黃等分上咀水盞半煎七分服攻下劑金匱大承氣湯方見傷寒門治痓病內實熱壅胸滿咬牙用此下之厥證門玉太僕曰厥者氣上逆也手足寒則為寒厥手足熱則為熱厥又曰厥逆者則寒厥熱厥氣厥風厥等氣逆上或嘔吐或滿悶或脹或氣急或暴不知人世謂腳氣衝心者是也病機內經厥論黃帝問曰厥之寒熱者何也岐伯對曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥帝曰寒厥何如而然也岐伯曰人質壯以秋冬奪於所用下氣上爭不能復精氣溢下邪氣因從之而上也氣因於中由陽氣衰不能滲榮其經絡陽氣日損陰氣獨在故手足為之寒也又曰熱厥何如而然也岐伯曰酒入於胃則絡滿而經脈虛陰氣虛則氣入精氣竭則不營其四肢此人必數醉入房腎氣獨衰陽氣獨盛故手足為之熱也帝曰厥令人腹滿或令人暴不知人或至半日遠至一日乃知人者何也岐伯曰陰氣盛於上則下虛下虛則腹脹滿陽氣盛於上則下氣重上而邪氣逆逆則陽氣亂則不知人也名曰尸厥厥則暴死氣復至則生不復則死是也厥證寒熱二因內經雖有寒熱六經之分見證不過寒熱二者而已寒厥則因多欲而奪其精故致陽衰陰盛邪在三陰則手足為之厥冷謂之寒厥熱厥則因醉飽入房精虛則熱入故致陰虛陽盛邪在三陽則手足必熱謂之熱厥熱極而成厥逆者陽極而似陰也寒極而成厥逆者獨陰無陽也厥證要分陰陽仲景云熱深厥深故傷寒濕病瘟病皆是熱厥此謂熱極而成厥陽極而似陰也脈雖沉伏按之必數病因積熱為之陽厥陰厥初得之四肢冷脈微沉而不數多惡寒引衣自覆下利清穀四肢逆蜷臥唇青自利不渴小便色白病因沉寒為之陰厥厥證有因氣血痰丹溪云厥者逆也手足逆冷也因氣血逆而冷也有氣虛血虛痰鬱三者而成也故手足麻者氣虛也手足木者濕痰死血也厥有外邪所忤即為飛尸卒厥厥有卒中惡候為外邪所忤因冒犯不正之氣忽然手足厥冷肌膚粟起頭面青黑精神不守或錯妄言牙緊口噤或惛惚不知人事頭旋暈倒此為客忤鬼擊弔喪入廟登冢所致也名飛尸卒厥脈候脈沉微不數者寒厥也脈沉伏而數者熱厥也脈至如喘名曰氣厥者不知人金匱論脈沉細而滑者沉則為寒滑則為氣實寒氣相搏入臟唇青身冷即死其身和汗自出為入腑則生治法辨寒熱陰陽補瀉分治為至要凡厥逆卒暴即與蘇合丸薑湯濃調灌之通其關竅蘇醒後卻辨寒熱陰陽厥證補瀉治之是為至要若陰陽稍差則促死甚易熱深陽厥不可作陰厥用熱藥治之則精絶而死矣急宜大小承氣湯隨其輕重治之沉寒陰厥急以四逆湯理中湯之屬治之甚者仍灸關元神闕百壯方得回陽丹溪分氣血痰蛔處治氣虛者四君子湯為主身冷從八味順氣散調元散兼有痰者四七導痰湯血虛以四物湯為主血因氣滯以白薇湯産後瘀血加桂附主之痰厥以二陳湯為主甚者加薑汁竹瀝寒痰濕痰卒悶壅急者星香姜附湯斟酌用之蛔厥為胃寒所生經曰蛔者長蟲胃寒即吐蛔理中湯加川椒五粒檳榔五分吞烏梅丸效蛔見椒則頭伏故也藥方通關諸劑蘇合丸方見中風門治卒暴厥不知人未辨寒熱風痰先與此藥化姜陽灌之醒後辨脈證用藥分治瓜蒂散方見風門治諸厥禁先用搐鼻陽厥手足俱熱大承氣湯治積熱發厥陽極似陰亦下之小承氣湯白虎湯二方見傷寒門陰厥手足俱寒理中湯治沉寒陰厥四肢逆冷唇青自利脈微遲四逆湯姜附湯並見傷寒門尸厥有外忤邪氣有郁痰火盛挾痰火者從痰厥治仲景云尸厥脈動而無氣氣閉不通故靜而死也調氣平胃散治卒暴尸厥觸犯邪氣昏暈卒倒無所知白豆蔻丁香檀香木香各二錢藿香砂仁各四錢甘草六錢上為末每服二錢入鹽少許點沸湯調服平胃散蒼朮米泔浸一斤厚朴薑汁炒陳皮各十兩甘草炒五兩上為細末每服五錢姜三片棗一枚煎湯入鹽炒少許調服三因追瑰湯治卒厥暴死及客忤鬼擊飛尸奄忽氣絶口噤麻黃三錢去節杏仁二十五粒去皮尖甘草炙一錢上水盞半煎口噤斡開灌之若不下分病人頭髮左右提之引肩臂藥下即蘇氣厥分氣虛氣逆四君子湯方見氣門八味順氣散方見中風門治卒厥氣逆調氣散見上導痰湯四七湯治氣厥兼痰壅盛並見氣門血厥失血及産後得之者多四物湯方見血門白薇湯治血中厥平居忽然如死身不動默默不知人目閉口噤移時方寤此泄汗之過血氣並於陽獨上而不下氣塞而不行故身如死陰陽復通移時方寤可先用倉公散後用白薇湯白薇當歸各二錢人參錢半甘草炙七分上水盞半煎七分溫服倉公散瓜蒂藜蘆明礬煅雄黃等分上為細末每用少許吹入鼻中得嚏此藥能起死回生返魂湯治血逆卒厥併産後血氣昏暈目閉口噤惟婦人多有此病當歸酒洗川芎肉桂乾薑炮亦芍藥甘草黑豆炒去殼紫蘇各等分上水盞半煎或為細末每服二錢酒調灌下痰厥二陳湯導痰湯並見痰門星香湯順元散並見中風門酒厥浩飲好飲酒人是也生薑自然汁治飲酒之卒厥者先以薑汁灌之立蘇後以解酲湯服之愈解酲湯方見內傷門治浩飲過多成厥蛔厥理中湯方見傷寒門治胃虛蛔厥烏梅丸方見心痛門易簡方一方治尸厥石菖蒲去毛為末每用一字吹入兩鼻內仍以桂末著舌下一方治尸厥以附子一枚煎酒溫服一方以灶煤一二錢漿水和飲之不醒者以數人用管吹氣入耳中以梁上塵如豆大著鼻中吹之瘥灸法人中一穴在鼻下灸七壯或針入至齒妙膻中一穴在兩乳間陷中灸二十壯兩乳間婦人宜灸之一法以繩圍臂腕男左女右將繩從大椎上度下至脊中繩頭盡處是穴灸二十壯愈瘛瘲候瘛瘲即搐搦也病機靈樞曰顛癇瘛瘲不知所苦兩蹺之下陽男陰女原病式云瘛動也惕跳動瘛火之體也又云瞤瘛惕跳動也火主動故夏熱則脈洪大而長瞤瘛之象也成無己云瘛者筋肺急也瘲者筋脈緩也急者則引而縮緩者則瘲而伸或縮或伸動而不止者名曰瘛瘲俗謂搐搦者是也運氣瘛瘲有四一曰風木太甚二曰風木氣虛三曰火熱少陽所至為瞤瘛四曰歲土太過濕氣流行則病善瘛肝虛瘛瘲與癇痓不同凡癲癇風虛破傷風三疾皆能瘛瘲但癇瘛瘲則仆地不省而然風痓瘛瘲則角弓反張而然破傷風瘛瘲則有瘡口而然故此三疾各有三門然又有不仆倒不角弓反張又無瘡口而瘛瘲者故另立此瘛瘲一門為肝虛心虛而致然也脈候經曰肝脈小急癇瘛筋攣又云肝脈微澀為瘛瘲筋攣心脈急甚為瘛瘲脾脈急甚為瘛瘲太陽之脈其終也戴眼瘛瘲其色白脈經曰寒熱瘛瘲其脈代絶者死治注治虛人瘛瘲急補其陰河間云精液少筋脈不榮灌而引急及五勞七傷小便數大便難加減建中湯主之又云腎生精液肝主筋心主脈腎精盛則滋育諸筋榮灌諸脈故筋脈柔和今腎中精虧筋脈相引而瘛當滋腎以沃之治汗多亡陽變證瘛瘲一小兒年十三歲伏天戲水得濕精神惛憒怠惰嗜臥頭疼身熱腿腳沉重女醫用和解發散之太過汗出透衾次日尋衣撮空又以承氣湯下之後言語漸不出四肢不能收持有時項強手足瘛瘲搐急而攣目左視而白睛多口唇肌肉瞤動飲食減少形體羸瘦蓋傷濕而過汗也且人之元氣起於臍下腎間動氣周於身遍行百脈今盛暑時大發其汗而亡陽百脈行澀故三焦之氣不能上榮心脈心火旺而肺氣焦陽氣亡而聲不出也又曰陽氣者剛則養神柔則養筋又曰奪血無汗奪汗無血今汗多而血氣損筋無所養故瘛瘲搐急也治當益水之源補其生髮之氣以人參益氣湯主之經曰熱淫所勝治以甘寒以酸收之參耆之甘溫補其不足之氣而緩其急搐故以為君腎惡燥急食辛以潤之生甘草微寒黃柏苦辛寒以救腎水而生津液故以為臣當歸辛溫和血脈陳皮苦辛白朮苦甘炙甘草甘溫益脾胃進飲食肺欲收急食酸以收之白芍藥之酸微寒以收耗散之氣而補肺以為佐升麻柴胡平以升發之氣為使乃從陰引陽之謂也藥方加減建中湯治腎虛津液不能榮筋脈而瘛瘲人參三兩炙甘草一兩官桂白茯苓二兩當歸四兩附子炮厚朴薑製各半兩龍骨一兩黃耆麥門冬去心各三兩白芍藥生地黃各四兩上咀每服三錢水盞半姜五片棗二枚飴少許煎八分溫服人參益氣湯治虛而瘛搐黃耆五錢人參黃柏白芍藥升麻柴胡各三分當歸炙甘草白朮甘草生各二分陳皮三分上咀水二盞先浸一時煎至一盞熱服早飯後午後各一服獨活湯治虛瘛瘲惛憒自汗及中風自汗者尤宜服之續命煮散治體虛自汗口眼瞤動手足瘛瘲此以扶榮衛養血氣極效二方見中風門增損柴胡湯治産後經水適斷感證手足牽搐咬牙昏冒宜服柴胡一錢黃芩四錢人參半夏各三錢石膏四錢知母二錢黃耆半兩甘草一錢上為粗未每服五錢水盞半姜五片棗二枚煎八分不拘時服顫振候顫振與瘛瘲相類但瘛瘲則手足牽引而或屈或伸顫振則但戰栗瞤動而不屈伸是也病機靈樞帝曰人之嚲音躲垂下掉動之貌也者何氣使然岐伯曰胃不實則諸脈虛諸脈虛則筋脈懈惰筋脈懈惰則行陰用力氣不能復故為嚲因其所在補分肉之間又曰人之振寒者何氣使然岐伯曰寒氣客於皮膚陰氣盛陽氣虛故為振寒寒栗補諸陽運氣嚲曳有二經曰木氣太過曰發生發生之紀其動掉眩顛疾是也木不及曰委和委和之紀其病動搖注恐又曰陽明司天燥氣不臨肝氣上為瘲病治法治顫振以參術補虛茯苓半夏行痰飲腎虛者青鹽丸如實熱積滯而顫振者子和之法治之及仲景藜蘆甘草之類仲景云病人常以手指臂動身體瞤瞤者藜蘆甘草湯主之綱目人常抽掣而戰掉至於盞物不舉以治痰茯苓丸服之立愈又治臂痛如神藥方本事星附散治中風能言口不喎斜而手足嚲曳脈虛浮而數宜汗而解之天南星半夏二味切薄片薑汁浸透用黑附子炮白附子川烏白殭蠶沒藥人參白茯苓各等分上為粗末每服二錢酒水各一盞煎八分熱服二三服汗出瘥青鹽丸治腎虛腰膝無力而戰掉小茴香三兩菟絲子末四兩青鹽一兩乾山藥二兩上先將菟絲子洗淨無灰酒浸日中曬七日冬天近火煨之爆干另為末將諸藥為末和勻酒糊丸梧桐子大每服五十丸酒或鹽湯下三因獨活散治氣虛感風或驚恐相乘肝膽受邪使上氣不受正位致手招搖手足顫掉漸成目昏獨活地骨皮細辛芎藭菊花防風炙甘草各等分上為粗末每服三錢水盞半煎八分取青汁入少竹瀝溫服愈風湯治顫振方見中風門治手戰用浮萍搗自然汁和酒空心服立效針灸法內關合谷灸上穴並密語手足掉
