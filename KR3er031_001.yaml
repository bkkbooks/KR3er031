body:
  text: 卷之一歷世聖賢名醫姓氏五帝太昊伏羲氏伏羲氏以木德王風姓蛇首人身生有聖德象日月之明故曰太昊母居於華胥之渚履巨人迹因始有妊生帝都於陳其理天下也仰觀象於天俯觀法於地中觀萬物於人鳥獸之文與地之宜近取諸身遠取諸物始畫八卦以通神明之德以類萬物之情造書契以代結繩之政作二十七絃之琴三十六絃之瑟以修身理性反其天真所以六氣六腑五臟五行陰陽水火升降得以有象百病之理得以類推炎帝因斯嘗百草以制九針以拯夭札矣炎帝神農氏按通鑑帝王世紀及本草序炎帝以火德五生於薑水因而姓薑有聖德始教天下耕種五穀故曰神農味草木之滋察寒熱溫平之性辨君臣佐使之義嘗一日而遇七十二毒神而化之作方書以療民疾立醫道救民夭札著本草四卷至梁陶弘景以名醫別録加之為七卷至唐李績許孝崇等奉詔更復採托去陶氏之乖違辨俗用之紕繆纂修為二十卷於今行焉炎帝救民澤及當時恩垂萬世何休哉黃帝有熊氏按通鑑帝王世紀九鼎丹經黃帝姓公孫諱軒轅有熊國君之子長於姬水故又姓姬生而神靈習用干戈以徵不享見日月星辰之象著星官之書占鬥綱所建始作甲子帝以人之生也負陰而抱陽食味而被色寒暑蕩之於外喜怒攻之於內察五氣立五運洞性命紀陰陽咨於岐伯而作內經覆命俞跗雷公察明堂究息脈巫彭桐君處方餌而人得以盡年受青牛紫府先生三皇天文以效萬神至具適崆洞問廣成子受以自然經登玉闕得玄女九鼎神丹至茅山採禹餘糧烹之得銅還荊山之下鼎湖之上三爐定藥九鼎丹成黃龍下迎黃帝上升群臣從上者七十餘人萬姓仰望故後世因名其處為鼎湖云僦貸季按素問黃帝時人岐伯師也岐伯相為問答著為內經云天師岐伯按內經序岐伯為黃帝之臣帝師之問醫著為素問靈樞總為內經十八卷唐太僕王冰次注為醫之祖書脈理病機治法針經運氣靡不詳盡真天生聖人以贊化育之書也今行世伯高氏黃帝臣未詳其姓佐帝論脈經窮究義理附素問中鬼臾區黃帝臣未詳其姓佐帝發明五行詳論脈經有問對難經究盡義理以為經綸自到於今賴之俞跗黃帝臣也善醫術治病不以湯液醪醴鑱石矯引湯尉一撥見病之應因五臟之輸乃割皮解肌決脈結筋湔浣腸胃漱滌五臟煉精蕩形以去百病少俞黃帝臣俞跗弟也其醫術多與其兄同少師桐君按本草序為黃帝臣撰藥性四卷及採藥録紀其花葉形色論其君臣佐使相須相反及立方處治寒熱之宜至今傳之不泯太乙雷公按素問雷公為黃帝臣姓雷名斆善醫帝燕坐召雷公問之曰汝受術誦書若能覽觀雜學別異比類通合道理務明之可以十全若不能知為世所怨又曰子知醫之道乎誦而頗能解解而未能明明而未能彰足以治群僚不足以治王侯雷公避席再拜曰臣年幼小愚蒙以惑不聞臣受業傳之以教請誦脈經上下篇至於別異比類猶未能以十全又安足以明之云苗父上古神醫以菅為席以芻為狗人有疾求醫但北面而咒十言即愈古祝由科此其由也馬師皇按列仙傳黃帝時醫也善識馬形氣生死治之即愈有龍下向之垂耳張口師皇曰此龍有病我能醫之乃針其唇及口中以甘草湯飲之而愈又數有龍出其陂師造而治之一旦為龍負之而去莫知所之巫咸堯帝時臣以鴻術為堯醫能祝延人之福愈人之病祝樹樹枯祝鳥鳥墜三代商伊尹按通鑑伊尹佐湯伐桀放太甲於桐宮閔生民之疾苦作湯液本草明寒熱溫涼之性酸苦辛甘鹹淡之味輕清重濁陰陽升降走十二經絡表裡之宜今醫言藥性皆祖伊尹著有湯液本草今行世巫彭初作周醫官謂人惟五穀五藥養其病五聲五色視其生觀之以九竅之變參以五臟之動遂用五毒攻之以藥療之出史記矯氏俞氏盧氏以上三人無傳並周之良醫也醫竘未詳其姓春秋時人秦良醫有張子求療背疾謂之曰非吾背任君治之竘醫之即愈必有所委然後有所任治之也出尹子醫和春秋時人未詳其姓晉平公求醫於秦秦使醫和治之曰不可為也公近女室之疾如蠱淫溺惑亂之所生也良臣將死天命不祐淫生大疾過則為災陰淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾君今不節而淫惑不可為也公曰良醫是歲趙文子果卒其後平公亦斃出春秋左傳醫緩春秋時人姓高名緩晉景公病求醫於秦伯秦伯使緩治之未至景公夢二豎子相謂曰緩良醫也我輩將逃之一曰我居育之上汝居膏之下其奈我何緩至視公曰疾不可為也在肓之上膏之下攻之不及藥之不至不可為也公曰良醫厚禮歸之范蠡春秋時越王鉤踐之臣佐越王滅吳遂退身遨遊五湖有服餌之法可以度世並授孔安國等皆成地仙數百歲如童顏醫藥濟人不取利所居處不二年致富棄其所積遷徙別居逾年而富人咸稱為陶朱公問聚財之法惟曰種五穀蓄五牸而已文摯戰國時宋之良醫洞明醫道兼能異術龍叔子有疾文摯令背明而立從後視之曰吾見子之心方寸之地虛矣治之遂愈齊閔五疾召摯視謂太子曰王疾得怒當愈愈後殺摯奈何太子曰吾當與母共保於王不殺摯不解履登王床王怒叱疾即瘳沈義吳郡人學道於蜀中能消災除病以藥救民服者立愈功德感天周赧王十年老君遺節遣使召羲升天子弟求之不知蹤迹鳳綱戰國時漢陽人常採百草花水漬之甕盛泥封自正月始迄九月末又取甕埋之百日煎丸之卒死者以藥丸納口中水下之立活時人稱為神仙云出外傳秦長桑君六國時人當時鮮有識之者扁鵲奇之謹以禮遇長桑君亦知扁鵲非常人乃悉取禁方授之出史記扁鵲姓秦名越人盧國渤海人得素問靈樞之旨著有八十一難經少為舍長舍客長桑君善醫出其禁方傳之飲以上池之水三十日當知物矣鵲如其言飲水果視疾盡見五臟癥結一日見齊桓侯曰君疾在腠理侯曰無疾後五日復見曰君疾在血脈五日又見曰君疾在腸胃又五日曰君疾在骨髓雖司命無奈之何不數日侯疾作扁鵲已逃去矣侯遂死然則治之於輕微者常易愈治之於重著者必難痊學者不可不知太醫令李醯嫉陰殺之安期生琅琊阜鄉人常賣藥於東海邊人稱千歲翁秦始皇東遊請見與語三日夜賜金璧萬數以赤玉舄一量以報曰後數年求我於蓬萊山置之而去始皇遣使徐市等入海訪之不能至而還出列仙傳崔文子泰山人世好黃老自言三百歲賣藥都市後作黃散赤丸民間疫氣死者萬計文子推朱冠與散飲之即活後至蜀中賈藥人望之如神仙云同上李醯為秦太醫令與扁鵲同時自愧醫不若鵲遂陰使人殺之鵲為當時神醫醯嫉殺之而不及罪則秦之紀綱法度頽敗可知矣子陽扁鵲弟子號太子死扁鵲使子陽用厲針砭石以取三陽五會有間太子遂蘇子豹扁鵲弟子虢太子疾死鵲使子豹為五分之尉八減之劑和煮之以尉兩脅下遂能起坐俱出史記壺公不知何許人賣藥於汝南市中懸一壺於肆市罷輒入壺中人莫之見惟長房於樓上見之因攜酒往拜公與俱入壺但見玉堂清麗旨酒甘肴共飲畢而出曰我神仙也子能相隨乎長房遂從公入山求道使獨處群虎中房不恐又使臥空室以朽索懸萬斤之石於心上房亦不移公曰可教也復令食糞房意惡之公曰子幾得道妨於此不成惟與一竹杖曰騎此任所之則自至矣既至可投杖葛陂中房如言視之則龍也遂能驅百鬼漢倉公淳于意姓淳于氏名意齊太倉長臨淄人少好醫方窮道受師同郡元里公乘陽慶醫愈高視疾洞知生死齊後疾召診曰風疸客脬難於大小便意藥一飲溲即通再飲病已所以知後病者診其脈太陰之口濕然風氣也脈大而燥者膀胱氣也燥者中有熱也淮南子劉安性資天成窮格事物之極博覽群書善醫藥謂神農嘗百草日遇七十毒王安道謂淮南子多寓言夫豈不信蘇耽桂陽人也漢文帝時得道人稱蘇仙公公早喪所怙鄉里以仁孝著聞宅在郡城東北距縣治百餘里公與母共食母曰無鮓公即輟箸起身取錢而去須臾以鮓至母曰何所得來公曰縣市母曰去縣道往返二百餘里頃刻而至汝欺我也公曰買鮓時見舅氏約明日至次日舅果至一日云間儀衛降宅公語母曰某受命仙録當違色養母曰我何存活公以兩盤留母需飲食扣小盤需錢帛扣大盤所需皆立至又語母曰明年天下疾疫庭中井水橘樹患疫者與井水一升橘葉一枚飲之立愈後果然求水葉者遠至千里應手而愈出列仙傳公乘陽慶山東人得黃帝扁鵲之脈書診病洞知人生死公孫光淄川唐里人好醫為當時重初淳于意從悉教之以妙方乃曰無以傳人意曰不敢且曰爾後必為國公吾方盡矣山東陽慶方甚奇汝可師之必得也意遂辭光而師慶出史記樓護字君卿父為醫官護少誦經方本草萬言有敏穎資老者咸重之謂之曰以吾子之才何不學宦遂辭父學經官為京兆尹甚有聲譽出漢書秦信不知何郡人少敏有量好經方本草及究黃帝扁鵲之書為當代良醫令王遂不知何郡人習經方工於治療學業精博為齊王侍御醫宋邑臨淄人志性愛人酷尚醫術就齊太倉公淳于意學五診脈論之術為當世良醫並出史記馮信臨淄人為齊太倉長性好醫方精於診治臨淄王猶以其識見未深更令學於淳于意名遂著高期仕濟北王太醫令王以其術未精令就淳于意學經脈及奇絡結俞穴所在定鑱石刺灸之法歲余盡通以此知名王禹為濟北王太醫王亦以其未盡善令就學於淳于意數歲悉通遂名當代唐安臨淄人言貌謙恭風儀溫雅好醫就倉公學乃馬齊醫令杜信不知何郡人謙柔好學悉心於醫受業於倉公教以上下脈經五診之法亦以名知漢代玄俗河間人餌巴豆賣藥都市河間王病瘕服俗藥下蛇數十餘頭而愈王見玄俗立日中無影以女配之俗夜逃去隱於常山中張伯祖南陽人志性沉簡篤好方書精明脈證療病十全當時所重張仲景從而師之張機字仲景南陽人受業張伯祖醫學超群舉孝廉官至長沙太守建安年間病傷寒死者十居其七機按內經傷寒治法存活甚衆著論二十二篇合三百九十七法一百一十三方為諸方之祖凡移治諸證如神後人賴之為醫聖又有金匱方亦其遺意涪翁廣漢人常釣魚於涪水故號涪翁善針愈病應效乃著針經脈法傳於世弟子程高師之年久乃授之高亦隱不出程高廣漢人好醫問道無倦人有一藝長於己者必千里伏膺聞涪翁善醫及針經脈診尋積年乃得之名擅當代為太醫丞郭玉和帝時太醫丞帝令嬖臣美手者雜於女子帷中試玉診脈各一手問其疾玉云左陰右陽脈有男女狀若異人帝嘆息稱善沈建丹陽人父為長史建好道不仕學導引服食延年之法治病有奇效後自絶谷不食煙火行步如飛或去或來如此三百年後絶迹不知所之出列仙傳杜度不知何郡人仲景弟子識見宏敏器宇沖深淡於矯矜尚於救濟得仲景禁方名著當時衛沈仲景弟子知書疏撰四逆三部厥經婦人胎藏經小兒顱囟經行世名著當時魏華他按三國志沛國譙人字元化博學通經舉孝廉不仕好養性之術又精醫方有疾求療數劑而愈視疾有宜針灸者即與針一二處宜灸者即與炙一二處應手而愈有病骨髓湯藥針灸之所不能及與麻藥一服須臾如醉死無所知方破割取病右在腸胃則取湔洗之復縫定膏摩之四五日如故人不苦痛著有內照圖行世後為曹操所殺李當之華他弟子少通醫經得他之傳尤精益著吳普廣陵人華他弟子以醫知名性恬惔善醫藥年九十而耳目聰明齒堅固名著當代樊阿彭城人受業於華他遂為名醫封君達隴西人號青牛道士服黃連五十餘年又入鳥鼠山服汞百歲如童常騎青牛有病殆死者藥之即活後入丘山仙去云韓康京兆人字伯休常採藥名山賣於長安市不二價三十年活人甚多桓帝聘之康逃入灞陵山不仕吳負扃先生不知何許人常磨鏡於市因見疾苦者有紫藥丸與之立愈如此十年後大疫時行負與藥即活不取一錢吳人知其為真人後處吳山絶頂語人曰我還蓬萊山此下出有神水崖汝曹飲之可愈疾果驗董奉字君異侯官人精醫與人治病愈者重則種杏五株輕則一株不數年之間杏樹多十萬蜀唐慎微字審元成都華陽人好醫求治者不論貴賤必往每於經史中得一方一論必録之時尚書左丞蒲公執政擢與一官不受著有經史類證備用本草數十卷蜀主孟昶心性慈孝好方藥母后病屢更太醫不效自制方餌進之遂愈群臣有疾親召診視醫官服其神宋太祖伐蜀孟不忍生民就戮遂走汴降闕下太祖厚封之韓保升蜀人精醫不拘局方詳察藥品釋本草甚功所以深知藥性施藥輒神效李撰字欽仲梓潼涪人通五經諸子該博篤好醫方為庶人遷僕射中散大夫晉王叔和高平人為太醫令博學經方尤精診候洞識攝養之道通曉療病之機探托群論撰成脈經十卷編次張仲景方論三十六卷惜乎脈經誤以小大腸配心肺之候致有高陽生脈訣偽書竊名誤天下之蒼生者此其由也李子豫不知何許人少善醫方當代稱其通神時許永為豫州刺史其弟患心腹痛十餘年殆死忽一日夜間自屏風後有鬼謂腹中鬼曰明日李子豫從此過以赤丸殺汝汝其死矣腹中鬼對曰吾不畏之於是使人候子豫豫果至未入門患者自聞腹中有呻吟聲及子豫入視鬼病也遂出八毒赤丸與服須臾腹中雷鳴彭轉大利數行遂愈今八毒丸方是也出搜神記皇甫謐字士安安定朝那人號玄晏先生沉淨寡欲是有高尚之志以著述為務自得風痹疾因而學醫集覽經方手不釋卷遂盡其妙所著甲乙經及針經行世張苗不知何郡人雅好醫術善消息診處為時所重陳廩丘的得疾連服藥特發汗不出或曰汗不出者死苗教以燒地加桃葉於上蒸之即得大汗而愈張華字茂先范陽方城人學業優博辭藻溫麗精於經方本草診論工奇理療多效晉書宮泰不知何郡人好醫術有一藝長於己者必千里求之善診諸病療上氣尤異奇制三物散方治喘咳氣逆最效世所貴云劉德彭城人少以醫方自達長以才術知名攻治衆疾隨手而愈官至太醫院校尉史脫不知何郡人氣性沉毅志行敦簡善診候明消息多辨論治疸證為最高官拜太醫院校尉出史記靳邵不知何郡人性聰明有才術本草經方誦覽無不通究裁方治療有出衆見制五石散礬石散等方晉朝士夫無不敬服阮侃字德如陳留尉氏人以秀才為郎遊心博學方技無不通會於本草經方治療之法尤所耽尚官至河內太守裴頠字逸民河東人多學術善醫經診處通明方藥精富於時名臣碩學咸敬服之官至尚書僕射許遜字敬之為旌陽縣令時郡民患疫十死八九敬之以神方拯濟符咒所及皆登時愈至於沉疴亦無不愈者傳聞於他郡有疾者連路而求療日以千計敬之於是標竹於郭外十里之江置符於中令飲皆愈老稚羸憊之不能至者汲水歸以飲之皆獲痊愈積功成道白日飛升葛洪字稚川丹陽人自號抱朴子廣覽群書諸子百家之言下至雜文誦記萬卷好神仙導引之法煉丹以期遐年所著有神仙良史集五經諸史百家之言金匱方肘後方百卷年八十餘人言尸解仙云範汪字玄平潁陽人少孤依外家新野庾氏廬於園中布衣蔬食燃薪寫書寫畢誦讀亦遍遂博通百家之言性仁愛善醫術嘗以診恤為事凡有疾不以貴賤皆治之所活十愈八九撰方書百餘卷蔡謨字道明不知何郡人以儒道自達治蒞知名性有道風耽尚醫學嘗覽本草經方手不釋卷及授揚州刺史渡江食蟹誤中彭蜞毒殆死乃嘆曰讀爾雅不熟為俗學所誤焉殷仲堪陳郡人祖吏部尚書父驃騎參軍堪能清言善屬文每云三日不讀道德經便覺舌本強父母疾衣不解帶躬學醫術究其精微以孝聞武帝召為太子中庶程據不知何郡人志性沉毅雅有度量少以醫術知名為太醫令出晉書支法存嶺表僧人少以聰惠入道醫術擅名自永嘉南渡晉朝士夫不襲水土所患皆腳弱惟法存能拯濟之出千金方南北朝宋徐熙字仲融東海人性好黃老隱太望山有道士過之求飲因留一葫蘆遺之曰君習之子孫當以道救世位至二千石熙開視乃扁鵲鏡經一卷因精心學之名振海內仕至濮陽太守子秋夫彌工其術徐秋夫熙之子為射陽令常夜聞有鬼呻吟聲甚悽苦秋夫云汝是鬼何所須答曰我姓斛名斯家在東陽患腰痛死今雖為鬼而疾痛不止聞君善醫術願相救濟秋夫曰汝鬼無形云何濟治鬼曰君但縛芻為人索孔穴針之秋夫如其言為針腰俞及針肩井各二處設祭而埋之明日鬼謝云蒙君療治腰疼已愈當代稱其神醫長子道度次子叔向皆神其術徐道度秋夫長子器宇深宏節行清敏少精醫術長有父風位至蘭陵太守徐叔向秋夫次子志性溫恭敏而好學究心醫術官至太山太守徐文伯字德秀道度之子精醫有學行宋孝武路太后病衆醫不識文伯診之曰此石搏小腸耳乃為水劑消石湯病即愈除鄱陽王常侍遺以千金由此名知當代子雄亦以傳業徐嗣伯叔向之子少負奇才雅有異術經方診訣占候靡不詳練悉心拯救不限貴賤多獲奇效時為當代所稱並出宋書羊欣字敬元好文藝敦方藥蒞事詳審治痰精能以拯濟奇功纍遷中散大夫義興太守宋書薛伯宗善以禁氣治疾公孫泰患發背伯宗為氣封之置齋前柳樹上明日癰消樹上便起一瘤旬日瘤破膿出升許樹為之萎損焉秦承祖不知何郡人性耿介而精於方藥不分貴賤咸治療之如一出宋書僧深齊宋間道人少以醫術鳴療腳軟腳氣之疾當時所服撰録支法存等書諸家舊方三十卷經用多效時人號曰深師方劉涓子不知何郡人晉末于丹陽郊外射獵忽有物高二丈許因射而中之走如電激聲如風雨夜不敢走明日率弟子數十人尋其蹤迹至山下見一小兒云主人昨夜為劉涓子所射取水以洗瘡因問小兒主人為誰答曰是黃老鬼乃窺小兒還將至聞搗藥聲遙見三人一人臥一人開書一人搗藥即齊聲叫突而前三人並走止遺一帙癰疽方並一臼藥時涓子得之從宋武帝北征有被金瘡者以藥塗之隨手而愈論者謂聖人作事天必助之天以此方授武帝也演為十卷號曰鬼遺方云齊褚澄字彥通河南陽翟人博學經方善醫術初齊高帝愛子豫章王嶷自江陵赴都得疾日臻帝憂形於色召澄治之立愈帝嘉其能擢尚書職今有褚氐遺書謂女人脈反男子以心肺候兩尺此其妄謬疑後人託名以欺人也學者審之徐審字成伯丹陽人與兄文伯等皆善醫魏孝文遷洛除中散大夫侍御寵加鴻臚卿轉光祿大夫而卒徐雄謇之子為員外散騎侍郎醫術為江左所稱至雄子之才俱盛精太常卿徐之才字士茂雄之子八歲能通經義年十二為太學生長善醫術有機辨武帝時封昌安縣侯武定四年自散騎常侍轉祕書監武明皇太后不豫之才進藥立愈肅宗召賜同坐令太皇子拜之贈帛千段錦四百匹車馬衣服上利田園千畝官至金紫光祿大夫開府儀同三司尚書令西陽郡王出齊書徐之範之才之弟儀同大將軍亦以醫名至襲兄爵為西陽王齊滅入周後周書徐敏齊太常卿之範之子工醫博覽多藝開皇贈朝散大夫張子信河內人好文學以醫名大寧中徵為尚藥典御馬嗣明河內人少好經方為人診脈知生死針藥有異常之效武平中官為通直散騎常侍王顯字世榮陽平樂平人以醫術鳴時文昭太后懷宣武夢日化龍繞身後寤而驚遂成心疾諸醫不識惟顯診脈言非心疾將是懷妊生男之象果如其言侍御藥出入內禁纍遷御史中尉出魏書李修字思祖父兄以醫學顯修於文明太后治藥有功遷中侍撰方書一百卷日華子陳氏北齊雁門人深察藥性極辨其微本草經方多由注疏至今賴之云周淡京兆人善醫為太醫令神瑞二年京師朝議遷都於鄴淡與祭酒崔浩進言不可明元帝從之詔賜淡浩侍妾各一人張遠遊齊人以醫道知名尋有詔徵令與術士同合九轉金丹丹成顯祖置之玉匣曰貪人間之樂不能上天待我臨死方可服齊書李元忠趙郡人初以母病集方術擅名求療無分貴賤輒盡心官至驃騎大將軍兼中書令李密字希雍平棘人性方直有志行母疾集經方遂盡其妙多所全獲由是知名官至殿中尚書濟州刺史安城縣侯食邑四百戶崔季舒字叔正博陵安平人少孤有敏識涉歷經史精醫術知名並出齊書祖珽字孝徵范陽酋人博學善文尤長於醫術當時稱良鄧宣文不知何郡人少以醫術名性方直除太醫尚藥典御梁陶弘景字通明號隱居一號貞白先生丹陽人母郝氏夢兩天人手執香爐來其所既而有孕生景幼而敏慧博學通經有志養生集醫方專拯濟高帝擢為侍讀年八十五卒詔贈中散大夫諡曰貞白先生撰神農本草經三卷出梁書陳藏器注本草甚工有功於醫多矣言藥性今皆宗之宋俠不知何郡人性明敏有學術於經方本草有所敦尚以醫知名姚僧垣字衛法吳興武康人因父疾留心醫藥梁武帝召與討論醫術言多合意仕梁為太醫正兼中書舍人梁元帝病心腹諸醫不效僧垣診之曰脈洪實宜大黃劑帝從之果下宿食而愈賜錢十萬貫有集驗方十二卷行記三卷並行於世隋甄權許州扶溝人以母病與弟立言專集醫方遂深究其妙仕隋為祕書省擢朝散大夫撰脈經針方明堂等圖行於世甄立言權之弟以母病專心醫術遂盡其妙武德中纍遷太常丞御史大夫杜安患風毒發腫太宗令言診之既而奏曰更二十一日午時死果如其言撰有本草音義七卷古今録驗方五十卷行於世莫君錫不知何郡人大業中為太醫煬帝晚年尤迷於色方士進大丹帝服之而陽過盛燥日飲水百杯而渴不止君錫奏為置冰於帝前日夕望之而渴遂止巢元方不知何郡人大業中為太醫博士奏詔撰諸病源候論五十卷罔不該集今行世為巢氏病源楊上善不知何郡人大業中為太醫侍御名著當代稱神診療出奇能起沉疴篤疾不拘局方述內經為太素知休咎今世之云太素脈皆宗之鮮有得其妙者全元起以醫鳴晉其實不在巢楊之下一時縉紳慕之如神患者仰之得則生舍則死其醫悉祖內經所著內經訓解行世許智藏高陽人以母疾博覽醫方遂成名醫仕陳為散騎侍郎陳滅隋文帝以為員外散騎侍郎煬帝即位之明年有疾令中使輿迎入便殿登御床醫之輒有奇效唐孫思邈京兆華原人七歲日誦千言及長盛談百家莊老之説精究醫方隋文帝徵為國子博士不就唐高宗召拜諫議大夫著有千金方三十卷脈經一卷今行世王冰寶應中為太僕令號啓玄子篤好醫方得先師所藏太素及全元起者大為次注素問合八十一篇二十四卷又著玄珠十卷昭明隱旨三卷韋慈藏姓韋名訊道號慈藏善醫術常帶黑犬隨行施藥濟人玄宗重之擢官不受世仰為藥王王方慶太原人博學多文雅有才度篤好經方精於醫藥出唐史張文仲洛陽人以醫名則天時為侍御醫尤善療風疾則天令撰療精方奏曰風有一百二十種春末夏初秋暮得通泄則不至困劇許胤宗常州宜興人初仕陳為新蔡王外兵參軍時柳太后感風不能言脈益沉而禁胤宗曰口不下藥宜以湯藥蒸令藥氣入腠周時可瘥遂制黃耆防風湯數十斛置於床下氣如煙霧如其言便得語拜義興太守或勸其著言貽後世者答曰醫特意耳思慮精則得之脈之候幽而難明吾意所解口莫能宣也古之上醫要在視脈病乃可識病與藥值惟用一物攻之氣純而愈速今之人不善為脈以情度病多其物以幸其功譬獵不知兔廣絡原野冀一人獲之術亦疏矣一藥偶得他味相制不能專力此難愈之驗也脈之妙處不可傳虛著方劑終無益於世此吾所以不著書也元珠先生不知何郡人洞明素問極究微奧時太僕令王冰識其為異人乃師事之遂以妙旨授冰冰由是大注素問今行世秦鳴鶴不知何郡人為唐高宗時太醫侍御孟詵汝州人舉進士垂拱初纍遷鳳閣舍人少好醫方惟以濟人為事撰補養生必效方行世並出唐書劉元賓號通真子精醫撰有通真子脈訣行於世李世績以醫鳴唐注本草藥性為有功狄仁傑字懷英太原人好醫方尤妙針術為唐名臣位極宰相顯慶中應制入關路逢富室有小兒鼻端生贅如拳綴鼻根如箸痛楚危急公為腦後下針疣贅應手而落父母輦千縑酬奉公不顧而去紀朋唐玄宗時能觀顏色談笑便知人病深淺玄太后召入掖重之王伯彥荊州人為道士善醫尤精診候知生死一公子暴病諸醫不識延伯彥診之良久曰無疾煮散數味入口而愈或問其狀伯彥曰中無腮鯉魚毒耳子因食膾而得或者不信乃以膾與左右食之其病悉同醫者莫不驚服劉禹錫字夢得彭城人唐貞元間舉進士篤好醫方濟人甚衆詔修本草經方集有傳信方行世五代李云卿不知何郡人博通經史善醫隱廬山以濟人為心千里之外來求療病者如市後唐同光二年八月白日飛升宋劉翰滄州臨津人世習醫業初攝護國軍節度巡官後周顯德初詣闕獻經用方書三十卷全體治世論二十卷世宗嘉之宋太宗詔詳定本草翰與道士馬志醫官翟煦張景吳復圭王光佑陳昭遇等同修集上之吳復圭淳化間為太宗侍御醫與劉翰齊鳴太宗召修本草及太平聖惠方書中多其所集行世王光佑太平興國間為太醫奉詔同修本草裒集方書廣心醫學馬志初為道士得海上方深察藥性治療輒效太宗時奉詔同修本草為御醫名著當代陳昭遇嶺南人善醫太宗時為翰林醫官治療病多效奉敕同修本草經方洪蘊潭州人初出家集方技之書遊京師以醫鳴太祖召見賜紫服袍號廣利太師後太宗召講醫方蘊録祕方以獻之馮文智並州人世以方技為業太宗召為醫官鹹平三年太后不豫文智侍藥既愈遷尚藥御醫賜金紫衣纍遷翰林醫正王懷隱睢陽人初為道士好醫藥太宗召歸俗命為尚藥御醫遷翰林醫官太宗常留意醫方藏有名方千首至是詔翰林醫官等俱各出家傳驗方以獻又有萬首命懷隱與副使王佑鄭奇醫官陳昭遇參對編類每證以巢元方病源冠首而本方附後共成一百卷帝親制序賜名太平聖惠方刊布天下趙自化德州人徙居洛陽業醫淳化中從兄自正遊京師以醫鳴俱受醫官纍遷翰林醫副許希開封府以醫鳴徵太醫院仁宗不豫侍御數藥不效希診曰針心下胞絡可立愈左右為不可諸黃門以身試無害遂進針帝即愈命為翰林醫御之官賜衣魚著神應針經要訣行世錢乙字仲陽上世錢塘人曾祖徙北家於鄆幼業醫神宗時元豐中醫公主有功授翰林醫官遷太醫丞賜紫衣緋魚治療有奇效所著傷寒指微嬰孩論若干卷高保衡熙寧間為國子博士校正醫書深明方藥病機神宗詔修內經有功賜緋魚加上騎都尉林億熙寧間為光祿卿直祕閣同高保衡校正內經醫名大著龐安常蘄水人性敏穎好學精於醫讀素問靈樞甲乙深達奧妙著書立言發前人之未發表述人迎氣口之脈在手在喉上下齊等引繩曰平過勝即病而有三陰三陽之分甚是詳切僧智緣徐州人善醫嘉祐中召至京師診父母脈能知子之吉凶時王安石王圭俱在翰林圭疑古無此安石曰昔醫和診晉侯而知其良臣將死視父知子又何足怪哉孫用和不知何郡人性識明敏通經學精醫方理得黃岐之祕治平間為奉御太醫令範九思不知何郡人業醫善針沉疴悉能起一人患喉內生蛾諸醫不能愈且畏針範與末藥計以筆搽之遂暗針於內刺之即愈矣許叔微字知可白沙人舉紹興壬子鄉試篤好醫方遂造其妙有患奇怪疾者能療取平生治效集成一書名本事方又撰傷寒歌仲景脈法圖行世僧道廣西蜀人好醫得不傳之祕乾德中有人病肌瘦如癆唯好食米闕之則口吐清水食米則快諸醫不辨道廣以雞屎及白米各半合炒末以水調頓服良久吐出如米形遂愈病源謂米瘕者是也吳源字德信新安休陽人宋孝宗時以詩文醫學著名遇道人傳以金匱玉函之祕尤能起死回生人稱其神醫後徵為翰林醫官楊文修字仲理諸暨人幼以孝聞因母疾究醫造其妙朱晦翁聞其名就見與談通夕所著有醫術地理撥沙圖吳廷紹為太醫令烈祖好食飴喉中噎國醫莫能治廷紹獨謂當進楮實湯服之果愈或叩之答曰咽因甘起故以楮實湯江嘉字明遠新安婺源人以醫鳴世十五代至嘉以儒通醫活人尤著宋理宗不豫召至一進藥遂安初虞世為宋朝醫有超見論病源皆深究素難之理所著有養生必用蘇澄宋良醫人病應聲者求療澄云古無此方惟以本草藥名盡呼之每呼一聲腹中輒應唯一藥即不應再三呼之無聲即此藥為主治之痊愈朱肱號無求子吳興人善醫尤邃於傷寒潛心數十年窮經義之要而成活人書奏進道君朝授奉議郎醫學博士張擴字子充新安古歙人精研醫學聞有長於己者雖千里求之不憚時聞蘄水龐安常醫名遂往從之又聞蜀中王朴太素脈亦往師之得其祕而歸術益高而名益著江右縉紳士夫咸往就診裴宗元以醫名越專用成方及丹溪出而悟曰操古方以治今病其勢不能以盡合故其方書遂不盛行也陳師文為越名醫與裴宗元一時齊著其用方亦大同所定大觀二百九十七方謝復古為宋翰林學士籍醫藥尤工於傷寒發仲景之奧音張季明名杲新安人世業醫術有名至杲尤誠確精粹博該諸書所得輒採録成醫説十卷錢聞禮不知何郡人宋紹興中為建寧府判好醫方尤精於傷寒作傷寒百證歌行世陳文中字子季宿州人明大小方脈尤精心於小兒痘疹濟困持危多收奇效淳祐中為侍郎翰林醫正與鄭惠卿同編幼幼新書小兒病源方行世陳自明字良甫號臨川建康人宋嘉熙為太醫諭世業醫至自明益精妙有超世活人之志著有婦人良方行世楊士瀛名登父號仁齋世業醫學至父尤精每以活人為心集有直指方論二十八卷行世孫兆用和之子以儒集父醫尤有心得之妙超邁尋常治療輒效存活甚多官為殿中丞尚侍御醫王纂海陵人習覽經方尤工針石遠近知其名所療多效初嘉祐中有女人被妖惑纂為針妖狐即從女衾中逃竄女病遂愈張鋭字子剛鄭州人官為團練使篤好醫方遂得精妙聲名遠著凡有求療雖及細民亦用意為治一婦産後患大泄喉痹諸醫謂兩證不能並治以為必死公視之與藥十餘粒使吞之咽通而瀉止人異之公曰理中丸裹紫雪耳喉痹非寒藥不可泄非理中不止紫雪下咽則消釋無餘得至腹中附子也夫何異皇甫坦西蜀人善醫術高宗召醫太后目疾有奇效因問治身答曰心無為則身安人主無為則天下治帝厚賜復召問以長生久視之術坦對先禁諸欲勿令放逸丹經萬卷不如守一上嘉而寵之每稱皇甫先生而不名王克明字彥昭湖州烏程人紹興間為名醫深究素難工針石起死良多試禮部中選醫官纍遷翰林醫正賜金紫服宋道方字毅叔以醫名天下一日郡守母疾召診守云若不能痊當治罪叔曰容為診視曰尚可活處以丹劑遂愈守酬以金帛送歸叔歸則全家遁避守母復死蓋病已在膏肓毅叔懼罪己而姑與良劑暫存活之耳直魯古吐谷渾人善醫馬上視疾能知標本生死太宗時為太醫令侍御醫集有脈訣針灸等書耶律敵魯字撒不腕其先本五院之族魯精於醫察形色即知病源雖不診有十全功前二人特夷類而尚精醫況中國業醫者有不精寧不為二夷罪人也史載之名堪登進士善醫為郡守一少年病不食聞葷腥之氣輒嘔吐諸醫不效求載之治視之曰汝病只在素問經中名曰食挂授以一方三服則聞肉有香氣食之無苦著有指南方三卷分為三十二門程約字孟博新安婺源人世業醫至約尤著而更得針砭之妙著有醫方圖説行世唐與正不知何郡人善醫凡人有奇疾以意療之無不效一小女患風痹赤腫諸醫以風熱治之不效唐診視云肝肺之風熱故治之遂愈惟頂上高腫寸許詢其乳母好飲熱酒唐遂悟前劑倍加葛根數服而消趙巒晉陽人善醫術精診候一人病脅有聲如蛙以手按之即止否則連聲不絶諸醫不能辨巒診之曰右關脈伏結因驚氣入臟腑而成此疾患人告因野行忽有蝦蟆高躍叫聲被驚便覺脅痛作聲如蛙巒與六神丹瀉之立愈王貺字子亨為南京宋毅叔之壻得傳醫之旨一人失驚吐舌遂不能收諸醫莫治貺針舌底遂伸縮如故後為宣和中朝散大夫著全生指迷論楊介號吉老泗州人世醫名聞四方有郡守病喉癰成流注久不愈召介治知其嗜食所致惟與生薑一味啖之食至一斤始知辛辣而癰愈守異而問之答曰公好食鷦鷯鷦鷯好食半夏遺毒於喉間非薑無以釋半夏之毒用之遂愈郝兌博陵人精於醫術治療有神效人以為神授診脈預知生死推測運氣如四方之疾當預告人使其慎而防之纍驗金竇漢卿為金太師善醫妙於針有死去經日者若胸前稍溫輒針立活著有針經指南標幽賦誠為古今之軌範成無己世習儒醫無己尤該博群書有敏質祖述仲景傷寒辨析表裡虛實極其旨趣著有傷寒論明理論凡數十卷行世劉守真名完素河間人遂號河間洞徹醫方詳明內經熱論多病於火所著運氣要旨精要宣明等論素問玄機原病式行於世張元素字潔古易州人今稱易老八歲善屬文舉進士好醫方夜夢神人鑿開胸腹納書於中自是洞徹病源活潑施藥不泥古方其言運氣不齊古今易轍舊方新病難相合附所貴因時制宜之妙耳張璧元素之子得父業號云岐子名著當時有脈談行世元張子和名從正字子和睢州人精於醫法河間之方邃素問之旨著有汗下吐三法用之當者如神立可以回生起死世人不知病源不察脈候妄施其法不能用其當然之妙而反謗其法之不善此大可笑者也麻九疇字知幾莫州人三歲識字七歲能書長通經史因疾從子和學醫遂盡得其妙濟活甚多李杲字明之號東垣幼明敏性好醫聞易老張元素以醫鳴攜千金往從之數年盡得其妙而謂病因脾胃所生者良多故主內虛則諸邪併入著脾胃論補中益氣等方為王道之本而實為醫家之宗主王好古字進之號海藏古趙人性明敏通經史好醫方師李明之所著醫壘元戎十二卷醫家大法三卷仲景詳辨活人節要歌湯液本草此事難知斑疹論光明論標本論傷寒辨惑論等書行世羅天益字謙甫真定人東垣弟子潛心苦學真積力久居束垣門下十餘年盡得其妙著有衛生寶鑑二十四卷行世吳恕號蒙齋圖述傷寒指掌李慶嗣洛陽人少舉進士不第遂業醫學洞徹玄機活人甚多所著傷寒類證訂活人書及針經範益燕京人醫甚精尤神於脈年七十時有老嫗居西山請診其女益以倦騎乘為辭嫗出頃之攜二少女至益診而詰之曰此非人脈乃妖質耳嫗跪告曰妾本狐類久住世間得日月之精氣故能變幻人形二女偶患疾苦知君仁厚存活為心故敢求藥君既洞察詎敢欺乎益遂與藥隨扣其所以往來禁城如入無人之境何也嫗曰此時真主已在濠梁京城諸神俱已往彼是故得以出入也逾年太祖果克燕京元帝北遁若益者真神醫也潘璟不知何郡人善醫診視有異見一婦懷孕二歲一婦孕十四月俱不産璟診視曰非孕也疾也作劑飲之孕二歲者下肉塊百餘孕十四月者下大蛇二婦俱得活紀天錫字齊卿泰安人業醫有活人之妙注難經五卷泰定上其書授醫學博士王圭字均章號中陽老人吳郡人志行高潔見道真明尤邃於醫學屏世慮隱居吳之虞山人稱隱君所著方書超出群表自幼及壯至老調攝有序論證有旨至於諸痰諸飲挾火為患悉究精詳制有滾痰丸最神效名泰定養生主論許國禎字進之為元祖翰海留守掌醫藥醫邁常人藥有奇效世祖足疾進藥味苦不飲禎曰良藥苦口利於病忠言逆耳利於行世祖然之遂飲藥而愈羅知悌字子敬世稱太無先生精於醫術得金劉完素之傳旁通張從正李杲二家之書有異見惟好靜僻厭與人接惟丹溪為得意弟子遂儘教以其所學云朱震亨字彥修號丹溪浙之義烏人自幼好學日記千言業舉子講道八華山拜許文懿公一日公謂以己疾久之非精於醫者弗能起子多敏穎其遊藝於醫而濟人乎於是丹溪復致力於醫方既而悟曰執古方以療今病其勢難全必也參之以素難活潑權衡乃能濟世遂出遊求師渡浙走吳歷南徐建業皆無所遇及還武林聞太無先生往拜之數謁弗得接求見愈篤先生始接之以劉張李三家之書為之敷揚其旨彥修受教而醫益神名益著四方求療者輻輳於道按證施方録為醫案可考又著格致餘論發其祕云滑壽字伯仁號櫻寧生父官江南居儀真而生生幼敏穎日記萬言操筆為文有思致師王居中求醫學居中教以黃岐素問之旨公遂論次分理脈候病能臟象經度針刺運氣別類抄而讀之居中曰善哉子學之得其道也自是生學日進益參張仲景李明之劉守真三家之祕所療無不神效又著十四經發揮診家樞要本草會韻等書凡若干卷行世徐文中字用和宣州人工醫藥有符咒治療捷效人稱神醫葛應雷字震父姑蘇人工於醫嘗著醫學會同二十卷推五運六氣之標本察陰陽升降之左右以定五臟六腑之虛實會經脈氣血之流注愈病回生率與他醫異由平江醫學教授擢江浙醫學提舉葛可久名乾孫震父之子醫實跨灶甚仁厚求療不分貴賤輒盡心藥之無有不效著有醫學啓蒙論十二經絡十藥神書行世醫史王履崑山人字安道學究天人文章冠世極探醫源直窮奧妙推演東垣之旨謂其不著有餘之傷故著內傷余義名曰溯洄集又備常與變作傷寒立法考醫史補傳有百病釣玄二十卷醫韻統書一百卷所存者惟傷寒溯洄而已鉤玄韻統則未之見也使二書俱存其有補於醫道又豈小哉顧其真書淪沒而脈訣鈐法等偽書行世豈天不欲後世斯民躋於壽域也耶噫趙良字以德號云居江浦人丹溪弟子有高致精醫術張士誠據吳召不往挈家隱華亭鄉中以活人為心醫造閫奧沉疴悉能起著有醫學宗旨金匱衍義等書行世倪維德字仲賢號敕山老人吳郡人少涉經書尤究軒岐之旨活人甚多乃訂新安張季明醫説演靈樞素問原機啓微等論行於世呂復字元膺號滄州翁四明人博學精醫有異見凡有奇病輒以奇方治之無不愈時一人兩目視物皆倒植求療於翁詢其由大醉後得大吐須臾而目視則倒翁診其脈左關浮促知其飲酒大吐上焦反復以致膽腑顛倒視物則然法當復吐以正其氣遂用藜蘆瓜蒂散以湧之後則復正戴同父名起宗建業人任儒學教授文學以作聖為己功謂醫為性命之學遂潛心以究內經之祕撰五運六氣之旨刊脈訣之誤辟邪説正本源誠有功於醫者也皇明誠意伯姓劉氏諱基字伯溫江浙人天資博學文武全材上窮天道下極人文三教九流百技之書過目不忘識天子於塵俗中佐太祖開基有大勳不在張良諸葛之下封國公食祿二千石辭改封誠意伯常謂民生日用之書先五倫次醫方次易數三者為民立身立命之本蓋不可以不敷教而廣其傳也集有經效醫方多能鄙事行世戴原禮丹溪弟子博學精醫洪武中徵為太醫院使眼界無人及薦蔣用文入院會談大喜曰吾儒而為醫茲來共昌吾道乃國家民命之大幸也所著有訂證丹溪金匱勾玄三卷證治要法證治類方若干卷行世王仲光吳郡人有學不仕資師於原禮留心於醫藥不以勢利郡守往訪避之而弗見盛啓東名寅姑蘇吳縣人少習舉業弗利遂攻醫受業厚禮得祕傳治病奇效醫名大振永樂徵為太醫院御醫太宗召入宮診母后奏六脈離經將近分解果得一太子嘉遷太醫院使蔣用文名武生句容人少明敏及長博覽經籍精醫學而造其妙治療異效名著四方事母至孝永樂間遷太醫院判仁宗皇帝問保和之要對曰在養正氣正氣旺邪氣無由而入是亦王道之説也所著有治效方書劉純字宗厚關中人博覽群書尤精醫學父受業于丹溪之門及純醫名大著所纂傷寒治例玉機微義醫經小學行世何彥徵名淵丹徒人家世業醫受淵尤精永樂間徵為太醫院使沈繹字誠莊吳郡人聰明好學善醫方洪武中肅王疾召診問知平日嗜乳酪只烹濃茶飲之而愈王問對曰茶能滌膈中之膩故也王神其術遂奏授本府良醫云臞仙太祖高皇帝子封寧獻王幼性敏穎有過人之資博涉經史諸子百氏之書無不該覽過目輒解奧旨而各造其妙誠哉宗室之白眉也尤以生物為心獨精於醫方嘗謂人與物均稟化於大君榮悴之理則一人之有身也七情交激於內六淫相蕩於外而疾生焉苟不濟以醫藥則猶顛危而不知扶持也其可乎哉所著活人心方乾坤生意肘後等方行於世飛霞道人姓韓名懋西蜀武辨世家道人心存仁愛好讀詩書上慕太古高尚之風精究醫藥活人之術所著痰火等論二卷有以發先聖之蘊世傳韓氏醫通云祝仲寧號橘泉四明人世業醫仲寧益精其術按證用藥有超見多獲奇效永樂間召至太醫院京師縉紳諸公咸敬服之豫郡篁墩程尚書為之傳黃孝子名濟字世仁餘姚人景泰以孝行聞業醫術盡其妙詔旌其門黃㻞字楚祥少孤承母訓業儒既而曰醫者仁術也苟精之上可以事君親下可以濟人物遂深究素難之旨以醫名淮揚正統初徵為太醫景泰間院使董宿薦於上侍藥奏功廣收四方明士聚闕下務以保和聖躬為己任成化中遷南京太醫院判張養正吳下人醫造精微弘治間一教諭羸疾諸醫議三白湯證以用之罔效復求養正治之亦用三白湯只投熟附子二三片即瘥陶華字尚文號節庵餘杭人幼讀儒書長精醫學邃究傷寒著有瑣言殺車槌一提金明理論可謂用心之勤庶為初學規範者矣胡濙字源潔混陵人登永樂間進士官侍近奉命四方其耳目所遇有可利民者多奏而行之然未足以充其志兼用意於醫得一藥一方之良自録之所集既富名曰衛生易簡方具表以進之刊行於世官至禮部尚書王綸字汝言號節齋浙之慈溪人擢成化進士篤好醫方而有心得今人治痰例用二陳湯綸則不然謂半夏辛燥惟可以療風濕之痰飲而已若老痰痰火則非所宜而反致其害故制老痰丸方深得痰火之旨惜乎過謂人參殺人勞怯斷不可用以致今之人固執虛虛之誤曷可勝言劉敏字德美號益齋長洲人幼孤業儒究精醫道士夫薦於朝雖功不自衒嘗慕古人開卷有益之言書屏以自警鄒福字魯濟甌寧人善醫察脈逆知生死立方簡當不多品而效愈奇所集驗效良方十卷行於世顧俊字時雍長洲人早以孝友聞博學精醫有心得之妙不泥陳言董宿四明人正統間為太醫院使深察藥性博究醫書治療立方輒有奇效故輯奇效良方七十卷今行於世郁震字鼎文蘇州常熟人纍世業醫至震尤讀書尚氣節初以明醫徵至京復以才武從偏師經略西域諸國者三以功賜三品服世授蘇州府醫學正科著醫書纂要等集弟性字鼎志醫學該博人稱二難今為太倉人許諶字元孚太倉人少從王安道遊博通儒書深造醫道自號婁愚有婁愚稿野情集蓋醫之白眉也陶浩字巨源太倉人以儒攻醫數起奇症有藥案藏於家周禎字子棋其先道州人徙居太倉世業醫有名嘗注疏洪武正韻十六卷行世唐椿字尚齡號恕齋嘉定人世為醫官至椿尤博極群書念醫學浩瀚後學者有望洋之嘆因搜集諸家精要附以己意編集成帙名原病集要二十卷人多宗之唐熇字德明號東谷以字行恕齋之侄天資明敏能繼其先世之業尤精於脈理察虛實決死生如執左契一時稱明醫者必曰唐德明唐德明年既耄而迎者無虛日戶外履常滿其侄欽訓繼之察脈用藥綽有叔風盧志字宗尹號凡谷太倉人自曾祖佐以下俱隸太醫院至君業尤精專為時所宗歷官院判常奉旨纂修本草並著醫學百問脈家典要及增定醫學綱目等書沈谷字善卿嘉定人世為太醫判局後得闕將仕家傳遂業小兒醫擅一時之譽弟穟字秀卿讀書好禮與兄齊名而精敏過之周文採興府良醫得內經之要旨該究諸氏方書治療盡效睿宗獻皇帝命選經效奇方編次成書共捐民瘼世宗繼念生氏疾若復梓頒行天下名醫方選要許警庵名紳字大章別號警庵順天人公性資敏慧少習儒既成棄去究心醫術深契軒岐奧旨漢唐以下諸名家論説罔不參互考訂以求至當故診視輒有奇效上嘉悅之纍升禮部尚書贈太子太保恩封三代卒諡恭僖薛立齋名己字新甫號立齋吳郡人性質敏穎見識聰明於醫極精故謂十三科要皆一理因見外科之醫固執局方不循表裡虛實經絡之宜而誤人者衆遂大發所蘊皆以內外合一之道對證處方隨手而愈嘉靖初徵為太醫院使著有外科心法發揮精義等書凡十餘種誠明時名醫之冠而有功於先哲後昆者也務外科者不可不知何柏齋河內人名塘學究天人擢弘治康海榜進士入翰林歷升都御史守身之潔一介不取蹈道之堅終日不待性天悃愊了無外慕方書調攝尤究心焉蓋以醫道切於養生且可寓濟物之仁也遂燭精微發前聖之未發開後學之晦盲觀其著傷寒三陽咳嗽相火等論可知矣嘗謂士君子平居略不留意於醫一旦有疾乃委死生於庸醫之手豈不誤載其集曰柏齋三書程介新安槐塘人號松崖登成化甲辰科李旻榜進士為人愷悌性好醫方心存仁濟所著有松崖醫徑四卷玉華子姓盛名端明號玉華子潮陽人登弘治壬戌進士性好醫方有求療不分貴賤即與藥官至禮部尚書著有醫抄百四十卷並撮要等書顧惠岩名可學號惠岩無錫人登弘治乙丑進士篤好醫方遇疾不分貴賤輒施藥以醫方選要並秋石紅鉛進上擢禮部尚書壽八十餘髭鬢未白孫東谷名應奎號東谷洛陽人登正德辛巳進士好醫方以活人為心有疾者不限高卑即與方藥官至戶部尚書著有醫家大法大旨必用等書若干卷虞搏字天民號恆德老人浙之義烏人世業醫搏幼穎悟承家傳之學深究素問治效益高晚年八旬著有醫學正傳今行世陸彥功新安古歙人世以醫鳴至彥功益著遐邇求療日益效衆朝廷聞而徵官太醫院辭歸編述傷寒類證便覽十卷今行世方廣字約之號古庵新安休陽人博學精醫常遊河洛寓陳留名著中原所集丹溪心法附余脈藥證治傷寒地理等書行世程明祐字良吉號岩泉新安岩鎮人精醫極深遂造其妙所治無不活者不許治者必死立方立言悉契內經之要旨濟衆良多傅滋字時澤號水愛川浙之義烏人敏穎博學下問謙恭醫術甚精且不自足活人不伐著醫學集成古朴先生姓汪氏名渭字以望人稱古朴先生新安祁門人少習儒業精醫學存心濟物志不在名活人甚多石山居士姓汪氏名機字省之渭之子業春秋補邑庠生習父醫尤得其精妙郡人求治多效日益衆居士弗容辭既而曰仕不至相則其澤之所及不若醫之博也遂棄儒就醫大肆力於素難諸書罔不考訂曆紀所療為石山醫案編次素問鈔運氣易覽推求師意痘治理辨本草會編等數十卷行世徐杏莊名偉號杏莊其先姑蘇人世業儒醫從龍北上屢世官太醫院至公尤精顯存心以仁忠孝兼盡侍世宗皇帝用藥輒建天和簡擢銀臺通政使大小臣工有疾求藥無不刻期獲愈性行純厚謙和極至有因七情而感疾者諸醫不能治公先慰之以善言次投之以藥餌而陳痼久疾罔不即愈如釋其嘉言善行殆非此所能盡書自有巨卿為之椽傳王典字邦貢號意庵新安祁門人篤志學古肆力詩文究素問諸子之書得醫之奧治療輒有神效存濟甚多嘉靖中擢太醫院入聖濟殿醫太子有功升御醫名益著汪宦字子良號心谷新安祁門人機之族彥幼從兄宇習舉子業穎敏夙成後棄儒就醫潛心內素有神領心得之妙證王氏之謬注如分鱗介於深泉淨瀅之中誠有功於軒岐啓迪天下後世醫學如瞽復明質疑尺寸等論可見矣為人質實不以有學自矜從遊者甚多所著醫學質疑統屬脈法證治要略等書行世梅孤子姓高名武四明人精醫藥尤工於針灸所學悉宗素問故其醫療效而所言皆正著有素問捷徑針灸節要聚英等書行於世殷渠字度卿號方山真州人世業醫至渠尤精叩疑於潘者大年老醫實精妙深究軒岐之祕門無問病者憤然以其所得於古先聖賢之旨盡以授渠渠遂診疾如響應云陳景字叔旦號鬥岩真州人早以孝友聞篤好醫遂精妙遐邇求療者景以南北異宜治之輒效人咸敬服之皇甫中號云洲杭州仁和人世業儒醫至中尤顯所著明醫指掌十卷有謂審八脈以明八要可為後學之指南方一誠號長塘新安古歙人醫有真見用方簡當求療者甚衆年雖耄視疾製劑極其精妙吳顯忠字用良號雪窗休陽人家世業儒忠性好醫以戴人汗吐下法而補之以利溫和方足以盡其醫道之妙名曰醫學權衡行世採托諸書漢書醫經十一家二百七十四卷隋志醫方二百五十六部四千五百一十二卷唐志醫術六十四家一百二十部四千四十六卷宋中興志醫術一百七十九家二百九部一千二百五十九卷黃帝內經索問十八卷黃帝岐伯問答墳典之書為醫書之祖唐寶應中太僕卿王冰注為二十四卷隋志全元起注內經八卷宋仁宗嘉祐中光祿卿林億國子博士高保衡等承詔校補多用元起注定為八十一篇今亡刺法本病二篇漢藝文志曰黃帝內經十八卷素問即其經之九卷兼靈樞九卷乃其數焉冰云醫經之傳於世者多矣原百病之起愈者本乎黃帝辨百藥之性味者本乎神農湯液則稱伊尹三人皆古聖人也憫世疾苦親著書以垂後而世之君子不察乃以為賤技而恥習之是故今之醫者多庸人治之失理以生為死甚衆激者至云有病不治常得中醫豈其然乎黃帝內經靈樞經九卷八十一篇合素問九卷為十八卷宋林億等校正類分十二卷今從之甲乙經十卷皇甫謐撰祖述內經多推明運氣之説陰符經二卷黃帝著道德經五千言老子撰其謂深根固蒂長生久視之道則為醫之未形河上公為之注解而增以吐故納新按摩導引之術有謂常善救人故無棄人常善救物故無棄物此言皆深契於醫道黃庭經三十六卷題云扶桑大帝作又敘謂老子作與法貼載晉王羲之所書本同而文句頗異其所有間居作七言解説身形及諸神兩句且改淵如泉改治為理疑唐人附益之崇文總目云記天皇氏至帝嚳受道得仙事今本無之太始天元玉册元誥十卷不載何人所作歷漢至唐諸藝文志俱不載録其文與內經不類非戰國時書其間有天皇真人書其文若道正無為先天有之太易無名先於道生等語皆老氏遺意意者老氏之徒所著大要推元五運六氣及三元九宮太乙司政之類殊為詳明深足以羽翼內經六微旨五常政等論太玄君扁鵲為之注此扁鵲號太玄君為黃帝時人後秦越人醫術之神人稱之曰扁鵲天元玉册三十卷啓玄子王冰述元誥內經之意益之以五運六氣之變五經注疏中有關於醫藥者左傳居多明陰陽之理惟易為最故云不知易者不足以為太醫史書十九史二十一史史載歷朝明醫實録今據之採其出處附名氏之下為小傳云子書老莊楊列文中淮南等子書中有紀醫法之祕者今採之爾雅二卷晉郭璞注埤雅二十卷宋開國公陸佃撰大明會典醫政官制及天下各處歲輸藥材斤兩無不畢載今採附通考之前可見醫道誠國家之大政也學者勉之素書六篇凡一千三百六言黃石公圯橋以授子房之書是也人言三略誤也其書簡而意深俱定國安邦之至道雖堯舜禹文傳説周孔老聃亦無以出於此子房得之以興漢業善終其分而不辱可見深得是書之旨矣有云博文切問所以廣知推古驗今所以不惑根枯枝朽足寒傷心誠為學之要資生之本始也有身者其知所務道藏經五千四百二十卷三教九流靡不畢具山海經十三篇不知何傳周穆王遊山海而作其首云泛覽周王傳流觀山海圖有十八卷郭璞注中藏經八卷少室山鄧處中雲華他得異人授以石函中按唐志有吳普集華氏方而無中藏之名普為他弟子宜有所集竊意諸論非普輩不能作鄧氏特附別方而更今名耳蓋其方有用太平錢並山藥者蓋太平乃宋熙陵初年號薯蕷以避宋英宗厚陵偏諱而始更名山藥其他可以類推然脈要及察聲色形證等説必出元化遺意覽者審之太玄經漢楊雄子云撰中言陰陽五行之理及清淨淵默之説大概養生當始於醫學度人經三卷元始天尊説唐志云有元始天尊者生於太元之先姓樂名靜信常存不滅每天地開闢則以祕道授諸仙謂之開劫度人受其道者漸至長生或白日升天其學有授籙之法名曰齋有拜章之儀名曰醮又有符咒以攝治鬼神服餌以蠲穢濁至於存想之方導引之訣烹煉變化之術其類甚衆大觀證類本草舊稱神農本草經三卷漢藝文志未嘗録至陶隱居始尊信而表章之謂此書應與素問同類但後人多更修飾之耳所出州郡乃後漢時載疑張仲景華元化所記舊經之藥止三百六十五種陶氏進名醫別録亦三百六十五種因而注釋分為七卷唐李英公世績與蘇恭參考得失又增一百一十四種分為二十卷世謂之唐本草宋劉翰等又附益醫家常用者一百二十種蜀王孟昶亦命其臣韓保升等以唐本圖經參比增廣世謂蜀本草至宋掌禹錫等補注新舊藥合一千八十二種定以白字為神農所説黑字為名醫所傳草石之品可謂大備他若雷公以下蔡雍徐大山秦承祖王季璞鄭虔諸家所撰名本草者凡二十九部三百五十卷雖顯晦不齊無非補翼舊然焉耳近代陳衍作本草折衷王好古作湯液本草亦刪繁之意也舊記州郡古今沿革不同一物而根苗異名及同名而異質主治互見如草豆蔻即今之草果今人遂謂本草亡草果之名又在因時而考審之也今行世者惟唐慎微撰大觀及證類二本合為一書參同契漢魏伯陽撰按神仙傳伯陽會稽上虞人通貫詩律文辭膽博修真養志約易經而作此書其曰二用無爻位周流行六虛有曰以金為堤防水入乃優遊又曰巨勝尚延年還丹可入口金性不敗朽故為萬物寶術土伏食之壽命得長久此言皆真切至道會通者可以仙矣悟真篇紫陽真人張伯端撰律詩絶句詞語整潔文理具至之書疑有道者之作也養生者究心其間亦能卻病而盡其天年也玄珠密語十卷啓玄子王冰撰自序謂得玄珠子而師事之與我啓蒙故號啓玄子目曰玄珠密語乃玄珠子密而口授之言也啓玄素問序云辭理祕密難粗論述者別撰玄珠以陳其道二敘自相背戾則師事玄珠而號啓玄者妄也宋高保衡等校正內經詳考王氏玄珠世無傅者今之玄珠乃後人附托之文而實非啓玄之書也其於素問十九卷二十四卷頗有發明原其所從蓋攟托內經六微旨及至真要等五篇天元玉册要語而附會雜説其紀運休祥未果徵驗觀者審之昭明隱旨三卷啓玄子撰其義與玉册大同顱囟經巫方撰小兒方書始於此經自後作者繼而述之也聖濟經十卷宋徽宗採內素而作原性命天人之理究七八之盛衰辨逆順之虛實為書十卷政和間頒是經於兩學辟雍生吳禔為之解義若達道正紀等篇皆是以裨益治道啓迪衆工余如孕元在本制字命物二三章釋諸字義似乎穿鑿玉函經一卷四明張尹著金匱玉函要略漢張仲景撰王叔和集設問答上卷論傷寒中卷論雜病下卷載婦科其方合二百六十二道又著脈經五臟論評病要方藝文志咸裁其目而書未之見也今所傳者惟傷寒論金匱略耳産寶經二卷唐咱殷撰難經六卷八十一篇盧國扁鵲撰姓秦名越人述內經設為問答撰難經八十一篇為十卷所引經言多非靈素本文蓋後人之託辭也或古有其書而今亡之矣漢志但有扁鵲內外經而隋志始有難經唐志又屬之越人皆不可考通考有吳太醫呂廣注唐楊玄操演醫史有隋呂博望注本不傳宋王惟一集五家之説而醇玼相亂惟虞氏粗為可觀紀齊卿注稍密乃辨呂楊王三子之非周仲立頗加訂易而考證未明李子野為之句解而無所啓發嘉祐中丁德用繪圖釋義頗為精詳近代張潔古注後附藥殊非經意今皆未之見也惟正統間熊宗立俗解相傳愈失其義如五十九難云顛狂之脈陰陽俱盛俗解分陰分陽與本文畔諸如此類甚多寢使後學晦盲是故國朝醫政壞於難經脈訣二書之偽也素問鈔元攖寧生滑壽伯仁集生初從京口王居中學醫居中授以內經素問令其熟玩生既終卷乃進請於師曰素問為説備矣篇次無緒錯簡不無遂分臟象經度脈候病能攝生論治色診針剌陰陽標本運氣匯萃凡十二類鈔而讀之何如師曰甚矣子之善學也而子之學得其道也續素問鈔新安汪機集滑氏謂王注多誤故削而鈔之不用其注機意謂無其注則是非無所分別復續之以俟知者之取捨云內經補正溫州太守京口丁瓚著內經類鈔明洛陽孫應奎集素問捷徑二卷明浙人高士著靈樞摘注明浙人高士著圖經本草宋蘇頌等撰先詔禹錫林億等校神農本草書成又詔各州郡詳圖所産藥本重編於是頌再與禹錫等裒集衆説類聚銓次嘉祐六年上本草衍義元朱丹溪撰本草補遺宋龐安常撰本草發揮徐用誠集湯液本草王好古著本草會編汪機集本草集要節齋王綸集救荒本草周王殿下著日食本草益府長史著食性本草陳士良著雷公炮製三卷宋雷斆撰胡源重定藥性珍珠囊東垣著其辭簡其義淺不足以盡藥性之旨疑後人之託名也華他內照圖五臟六腑之形象十四經發揮三卷滑壽撰傷寒論十卷後漢張仲景撰按內經熱論分六經傳變廣伊尹湯液而為之治合三百九十七法一百一十三方古今傷寒未有出其左者或云是書有大人之病而無小兒之患有北方之藥而無南方之治此其所闕陳蔡以南不可用柴胡白虎二湯此非至論晉王叔和重為撰述宋成無己復為注釋其後龐安常朱肱許叔微韓祗和王實等互有開發而大綱大法不越乎汗吐下溫四者而已蓋一證一藥萬選萬中千載之下如合符節前修指為群方之祖信矣所可憾者審脈時及王氏之言三陰率多斷簡況張經王傳往往反覆後先亥豕相雜自非字字句句熟玩而精思之未有能造其閫奧者傷寒明理論宋成無己撰龐安常校黃山谷為後序傷寒補亡論元人徐止善著傷寒類證黃仲理著新安陸彥功重編又名曰類證便覽傷寒類證要略二卷汴人王堯卿撰皆仲景之舊也亦別未有發明傷寒發明傷寒蘊奧明太醫院判錢塘吳綬集南陽活人書二十卷宋朱肱無求子撰自序謂仲景傷寒論其言雅奧非精於經絡者不能曉會頃因投間設為問答計九萬一千三百六十六字傷寒指微論五卷宋錢乙撰宋史記神宗元豐中長公主女有疾召乙治有功皇子儀國公病瘛瘲國醫未能治召乙治進黃土湯而愈所著傷寒指微論五卷嬰孺論百篇文獻通考云不著作者之名序言元佑丙寅必當時明醫蓋亦未知詳考耳元豐為神宗末年號元佑為哲宗初年號不越五七年間正錢乙之所撰明矣傷寒直格二卷劉完素撰傷寒六書六卷明臨川陶華尚文著號節庵六書名瑣言家祕殺車槌一提金截江網續論是也惜其不能發仲景之旨傷寒治例四卷陶華著述直格六書而作之其論雷同而別無方法其實一書而為三書矣傷寒百問三卷無求子大觀初所著傷寒指掌元吳恕號蒙齋圖述傷寒百證歌錢聞禮紹興間著傷寒證治三卷宋王實編龐安常高弟也傷寒會要傷寒一掌金傷寒鈐法馬宗素程德齋撰述按日時受病為治法與仲景不同實非至理用之者不徙無益而反加害也姑存其名以備顧問耳傷寒金鏡録清碧學士杜先生著千金方三十卷唐孫真人思邈撰自序云千金備急之要方千金翼方三十卷前人著千金方之後復掇遺軼以羽翼其書成一家之言林億等校謂深有旨意及禁術用之多驗溥濟方五卷宋王袞撰慶曆間因官暇出家藏方為此書且云草還丹治大風太乙丹治鬼胎尤奇驗普濟方一百二十卷太平聖惠方一百卷宋太宗在潛邸日多蓄名方異術太平興國內出親驗方千餘首詔醫局各上家傳方成集成書自制序名太平聖惠方外臺祕要方四十卷唐王燾撰在臺閣二十年久知弘文館得古書方數千百卷因述病證附以方藥符禁灼灸之法凡一千一百四門天寶中出守大寧故以外臺名其書燾謂針能殺人而不能生人故取灸而不取針人譏其弊孫兆獨以其言為然和劑局方十卷元豐中詔天下高醫各以得效祕方奏進下太醫院驗試刊行世蘇學士方東坡蘇公著初虞世方十六卷即養生必用方序謂古人醫書行世者亦多矣無如此方其證易詳其法易用虞世為一時文士後削髮為僧永類鈐方二十二卷元棲碧李仲南著青囊方魏華他得異人授受今亡之青囊雜纂八卷元陽趙真人著傳信方劉禹錫著梅師方隋廣陵僧人號文梅善療瘴癘醫雜證悉説單方其效甚速人咸集相傳曰梅師方云深師方齊宋間道人僧深撰肘後方三卷晉葛洪撰斗門方本事方十卷維揚許叔微知可撰宋紹興三年進士以藥餌陰功見於夢寐事載夷堅志範汪方五卷西晉穎陽人撰方書共百餘卷今普濟主多采之衛生易簡方明尚書胡濙集嶺南續衛生方四卷夔州太守楊琇集近效方必效方三卷孟詵著試效方東垣著鬼遺方宋武帝時劉涓子著大全方奇效良方明太醫院使方賢集經驗方明大方伯希齋陳士賢著袖珍方四卷明滇陽王府集刊其方多簡當可用誠博而約之者雞峰方一卷太醫教授張鋭撰簡要濟衆方五卷皇佑中仁宗謂輔臣外無良醫民有疾苦或不能救療詔太醫簡聖惠方之要者頒行諸道婦人良方二十卷元臨川陳自明撰三因方五卷括蒼陳無擇撰三因謂內因外因不內外因其説出金匱要略其方皆述古書本草單方二十五卷宛丘王碩父撰工部侍郎時暇取本草所載單方以門類編之凡四千二百六方集驗方明鄒福集濟生方百一選方三十卷山陰王實齋孟玉撰百一言選方極精也拔萃方治奇疾方夏子益撰凡三十八道皆奇形怪證世所未見者御藥院方宋太宗朝元名氏集靈祕十八方河間劉守真集加減十三方不著名氏亦十八方簡成者萬氏積善方明參將萬氏集萬氏家抄方前人指南方二卷蜀人史載之撰指迷方三卷考城子王貺撰方外奇方韓飛霞道人集活人心方二卷明宗室寧王撰小兒袖診方錢氏小兒方八卷宋錢乙字仲陽精治小兒著此書並小兒藥證直訣閻孝忠集編頗附以己説宣和元年成陳氏小兒方宋陳文中著保嬰得效方幼幼全書全幼心鑑四卷嵩陽寇平衡美集幼幼新書五十卷直龍圖閣知豫州劉昉撰陳文中編集活幼心書曾世榮撰活幼口議子母祕録嬰童寶鑑十卷棲真子撰不著名氏嬰童百問魯伯嗣撰明嘉靖中閣下嚴嵩奏進上命刊布天下幼科類萃二十八卷不著作者名氏方論頗為詳切中引丹溪説語必是國初所撰者博愛心鑑蕭山魏直桂岩著其書以保元湯一方為主以保元氣而托其里亦為痘疹之要治也特不為全書耳痘疹八十一論聞人氏集痘疹經驗祕方四卷銅壁山人黃廉著正骨續斷方醫經續方避水集方四卷董炳集攝生衆妙方浙兵部尚書張時徹集海上仙方無名氏亦簡易方中摘成者救急方十三卷唐張文仲著武則天時侍御醫與韋慈藏齊鳴原病式燕薊劉河間撰素問玄機保命集前人巢氏病源隋巢元方撰時為太醫博士惟論病源不載方藥千金方論多本此書吳氏病源吳景賢撰今不傳醫門玉髓十卷不知何人所作述皆為歌括論五臟六腑相傳之理抱朴子內篇並外篇四十卷晉葛洪稚川撰自號抱朴子博聞深洽江左絶倫著書甚富內篇言黃白之事長生之道謂素醪芳醴亂性者也紅華素質伐命者也謂朱草莖如珊瑚刻之流汁如血以金投汁中化之曰金漿以玉投之曰玉醴服之長生又謂肉芝是萬歲蟾蜍頭上有丹書八字人以五月五日取之以足畫地則成河以左手則避乓又謂行山中見小兒乘車馬長七八寸者肉芝也服之成仙此事非可以理測而亦超出凡塵也神仙傳即稚川弟子之所撰者前秦阮所記數百人又劉向所記七十餘人並集之以傳如蘇耽董奉皆在列也搜神記不著作者名氏天寶遺事不著作者名氏太平廣記五百卷宋太平興國初詔李昉等取古今小説編纂成書同太平御覽進中集醫方有超出凡庸之表文獻通考二百四十八卷宋儒馬端臨撰二百二十卷中備載醫書之源今採之以附書目之下談子化書六卷五代時南唐談景升撰意為天地之間化而已矣非化無以顯道非道無以生化故人稟中和之氣化而為人物稟駁雜之氣化而為物知此化者可以治身可以濟物豈徒為窺陰陽化育之哉時為宋齊丘竊名今辨白天下後世皆知為談子化書云白虎通二卷序云漢司馬班固撰章帝建初四年詔諸儒會白虎觀議五經同異固撰次其書上之故曰白虎通云固九歲能文博冠群書有古良史之才朱子嘗品之遷書疏爽固書密塞討論明經實為巨典學者欲見而不可得下卷性情壽命二章發醫經之未發誠為養生大道云風俗通漢靈帝時人姓應名劭中有養生方候之宜草木子二卷國初括蒼葉子奇世傑撰夷堅志四百二十卷宋學士洪邁景盧撰中集醫方多奇異者博物志十卷晉司空張華著楚辭一名離騷楚屈原撰門人宋玉續撰名曰楚辭韓柳歐蘇文集其論醫之奧韓蘇為多韻府群玉四十卷青田包瑜撰瑜中景泰庚午科鄉試歷建寧臨淄進賢浮梁四學教諭荊楚歲時記不著名氏輟耕録三十卷元陶宗儀九成著東垣十書十集脾胃論內外傷辨蘭室祕藏湯液本草四集俱東垣著溯洄集王履著格致餘論局方發揮丹溪著此事難知王好古著外科精義齊德之著脈訣張紫陽著醫學發明九卷東垣著玉機微義五十卷劉純宗厚著醫學綱目四十卷浙人樓英全善撰食醫心鏡龍木論三卷佛經禪師龍樹大士著能治眼疾假其説集七十二種目病之方宣明論河間劉守真撰養生主論元王隱君著滾痰丸固為治實痰火之一端而所論童幼養老等篇甚於資生有助也原機啓微論斂山老人著王氏脈經十卷晉王叔和撰述內經三部九候五臟六腑十二經脈然則左心小腸右肺大腸乃其失也脈訣機要三卷通真子撰不著名氏熙寧以後人謂叔和脈訣有臲卼鄙俗實非叔和之作乃為歌百篇按經著又集傷寒括要六十篇其書未之見也診家樞要一卷滑伯仁撰運氣奧論宋劉溫舒撰以素問運氣撮為治病之要有三十論二十七圖運氣全書前人運氣易覽明新安汪機集銅人針灸圖三卷宋王惟德撰仁宗詔德考究針灸之法鑄銅人為式分十二經旁注俞穴刻題其名並主治療之法明堂針灸圖三卷雷公問道黃帝授之故名明堂資生針灸神應針經要訣二卷宋許希撰竇太師針灸一名針灸指南名傑字漢卿為金太師針灸聚英明高武集徐氏針灸明浙人徐廷鳳著儒門事親十四卷睢州戴人張從正子和撰醫壘元戎十二卷王好古撰衛生寶鑑二十四卷羅天益謙甫撰醫説十卷宋新安張杲撰續醫説十卷明姑蘇俞子容約齋撰醫史十卷浚儀李濂著醫雋醫開褚氏遺書北齊尚書褚澄撰滑氏方脈攖寧生滑壽撰韓氏醫通二卷西蜀瀘州飛霞道人韓懋撰程氏醫抄八十卷丹溪脈法丹溪心法纂要丹溪醫案金匱鉤玄以上四書俱丹溪著醫林集要二十卷明成化中都督王璽撰仁齋直指二十六卷三山楊士瀛登父集醫方選要八卷興府良醫周文採集醫經正本一卷進賢知縣程迥著專論傷寒無傳染以救薄俗骨肉相棄絶之弊明醫雜著明進士慈溪王綸撰醫學大全醫學宗旨宋趙良著宋學士文集明學士諱景濂有贈醫周漢卿張仁齋戴元禮等序皆備載醫案文潞公藥準文彥博荊川公史纂明會元唐順之集柏齋三書懷慶府何塘巡撫撰其謂咳嗽之證消渴之治黑神散之於産後等論非達造化神明之極至者烏足以語此雅述三篇山東浚川王廷相撰令氣能化液正如雨雪為雲氣之所化故能閉息伏氣可以不食云四十家小説二部皆吳下好事者裒集諸名公筆語類刻為四十家云顏氏家訓二卷北齊黃門侍郎顏之推撰謂醫難到精妙不可輕學以誤人其亦知醫之至者事林廣記西穎陳元靜編居家必用十集不著述者名氏飲膳正要元忽思慧著醫學正傳浙虞博天民著醫學集成淅義烏傅滋著醫學啓蒙姑蘇葛可久著醫林摘要醫方大成元人無名氏集醫家大法洛陽東谷孫應奎集醫經小學六卷明劉純著醫方捷徑王宗顯著醫家必用洛陽東谷孫應奎著時為戶部尚書醫學碎金新安王典集醫學三要明巴郡劉起宗集醫學權衡新安吳顯忠著醫學權輿傅滋著醫學源流元許國禎著醫方便覽醫學指南四明高銘著脈訣刊誤元龍興路教授戴起宗同父撰病機藥性賦明柯城劉全備撰乾坤生意四卷臞仙撰壽域神方四卷前人十藥神書一卷傳云葛可久撰今姑蘇志載可久著醫學啓蒙而無十藥神書則此為託名耳金丹正要大全上陽子張致虛著金丹直指三元纂贊元李鵬飛著養生類纂元周守忠著家孰事親明郭晟景陽集養老奉親書宋元豐中泰州興化懸令陳宜撰壽親養老新書四卷宋大德中敬直老人鄒鉉著修真十書正陽真人鍾離祖師著大成金書宋林靈素著安老懷幼四卷明山西副使河南穎川劉宇集醫學質疑統屬診法證治要略俱新安汪宦撰立齋外科四書明院判薛己撰理風衡尺食治通説月令通纂虞氏醫鏡咽喉風科石山醫案痘治理辨外科理例針灸問答俱新安汪機集松崖醫徑四卷松崖程介著新安槐塘人中成化中進士精醫學述內經五臟六腑部證以虛實為治卒未梓行今折肱録即其本書也産寶百問胎産須知二卷江陰高賓著廣嗣要語明嘉靖初無名氏著三煉歌明西蜀鄧士魯著發明證治何太英集活人心統諸證辨疑俱浙人吳球集辨疑中謂六月傷寒冬月傷暑尤為妄謬以欺人也此其失云醫經大旨四卷浙人賀嶽集明醫指掌十卷杭州仁和皇甫中集保嬰直指四卷痘疹玄機四卷太倉支秉中著
