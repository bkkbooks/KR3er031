body:
  text: 卷之四十五肺痿證病機論金匱論曰熱在上焦者因咳為肺痿得之或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故寸口脈數其人咳口中有濁唾涎沫者為肺痿肺數虛者亦是大抵咳久傷肺元氣漸虛其人有寒熱往來自汗濈濈者即成肺痿證治法宜補血調肺氣清金虛者用人參清肺湯之類脈候寸口脈數而虛者為肺痿脈數實為肺癰為咳傷肺而成癰也藥方人參平胃散治火克肺金傳為肺痿咳嗽喘嘔痰涎壅盛胸膈痞滿咽嗌不利知母茯苓湯治肺痿咳嗽不已往來寒熱自汗海藏紫菀散治咳嗽唾中有膿血欲成虛勞肺痿肺癰三方見咳嗽門葛氏保和丸治勞嗽成肺痿方見癆瘵門潤肺膏治久咳肺燥成痿羊肺一具杏仁去皮尖淨研柿霜真酥真粉各一兩白蜜二兩上將羊肺洗淨次將藥入水攪勻黏灌入肺中白水煮熟服千金生薑甘草湯治肺痿咳唾涎痰不止咽燥而渴生薑二兩人參一兩甘草兩半大棗十五枚上水四碗煮二碗分三服甘草乾薑湯治肺痿吐涎沫不能咳者其人不渴必遺溺小便數所以然者以上虛不能制下故也此為肺中冷必眩運甘草炙二兩乾薑一兩水四升煮一升半熱服桂枝皂角湯治肺痿桂枝一兩甘草半兩大棗十二枚去核皂角四條炙去皮弦上作三服水煎肺癰證病機論巢氏曰肺癰者由風寒傷於肺其氣結聚所成也肺主氣候皮毛勞傷血氣腠理開而受邪氣虛者邪乘虛傷肺寒搏於血蘊結成癰積熱不散敗血為膿其人咳胸內滿隱隱痛而戰咽乾口內辟辟燥不渴時時出濁唾腥臭久久吐膿如米粥者難治又云風中於衛呼氣不入數過於榮吸而不出風傷皮毛熱傷血脈風舍於肺其人則嘔口乾喘滿咽燥不渴唾而濁沫時時戰寒熱之所過血為凝滯蓄結癰膜吐如米粒始萌可救膿成則死肺症證口中辟辟燥咳則胸中隱隱痛脈反滑數或數實者此為肺癰也肺癰有膿血而嘔者不須治其嘔膿止自愈肺癰已破風入者不治肺癰不覺但發寒熱咳亦微須要按其右脅而痛者是也張子和治一小兒久發寒熱咳亦微骨蒸治之半年病甚戴人診之兩手寸尺脈皆潮於關關脈獨大戴人曰肺癰也去兒衣舉其兩手按右脅兒則避縮有痛按左脅則不避故知有肺癰者右脅必痛也脈候肺部脈緊為肺癱寸口脈數而實者為肺癰寸口脈微而數微則為風數者為熱肺癰脈緊數為膿未成其脈緊去但數膿已成肺癰病身常有熱咳嗽短氣吐出膿血其脈當短澀而反浮大其色當白而反赤者此火之剋金大逆不治也治法要略治肺癰先用小青龍湯一劑以解表之風寒然後以大棗瀉肺湯桔梗湯之類次第選用肺癰用太乙膏丸服或用搜風湯元戎方吐之藥方濟生桔梗湯治肺癱咳嗽膿血咽乾多渴大便難小便赤澀桔梗貝母薏苡仁各七分百合蒸五分當歸枳殼栝蔞仁桑白皮各七分黃耆一錢甘草節杏仁炒去皮尖防己七分上水二盞姜五片煎八分食遠服大便秘加大黃和濟團參飲子治七情飢飽失宜致傷脾肺咳唾膿血漸成肺癰癆瘵之證方見咳嗽門金匱葶藶大棗瀉肺湯治肺癰喘急不得臥方見喘門葶藶散治肺癰氣急睡臥不安心胸脹滿甜葶藶一兩隔紙炒百合白附子北五味子甘草節人參款冬花百藥煎紫菀半兩硃砂二錢半另研上為細末每服三錢食後燈心湯調下升麻湯治肺癰吐膿血作臭氣升麻苦桔梗薏苡仁地榆黃芩牡丹皮芍藥各錢半生甘草三錢上咀分兩服每服水二盞姜三片煎八分食後溫服理肺膏治肺癰咳唾不利胸膈迫塞訶子肉百藥煎五味子人參紫菀杏仁去皮尖炒款冬花甜葶藶炒知母百合生甘草各半兩上為末用茅根洗淨三斤搗自然汁入瓦器中熬成膏更入好蜜二兩再熬候冷和藥丸梧桐子大每服五十丸白湯送下棗膏丸治肺積在右脅下如杯發為癰陳皮苦桔梗甜葶藶炒上等分為末煮棗肉為丸梧桐子大每服五十丸米飲下黃昏湯治咳有微熱煩滿心胸甲錯是為肺癰黃昏皮手掌大一片銼咀水三碗煎一碗分三服黃昏即合昏皮如聖湯即甘桔湯治肺癰咳嗽唾膿血胸滿振寒咽乾不渴時出濁沫氣息腥臭久久吐狀如米粥多服之效排膿散治肺癰吐膿以此排膿補肺黃耆生用一兩銼咀水二盞煎八分食後溫服消膿飲治肺癰膿腥氣上衝嘔而咳嗽南星制半夏制知母貝母生地黃阿膠炒川芎桑白皮防風射干桔梗甘草天門冬杏仁薄荷紫蘇白芷白芨烏梅各五分上水二盞姜三片棗二枚煎八分食後溫服五味湯紫菀散葶藶大棗瀉肺湯並治肺痿肺癰嗽膿血年久不愈者效方見前咳嗽門醫說白芨散治肺癰咳唾膿血及肺破不愈最效方見咳嗽門易簡方中易簡諸方一方治肺癰心胸甲錯用葦葉煎湯時時呷服當茶飲妙一方治肺癰久不斂口用合歡樹皮即槿樹皮一名夜合白蘞二味煎服
