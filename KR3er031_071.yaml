body:
  text: 卷之七十一淋證門病機淋證敘論內經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也此見膀胱者以肺金為母而資其化也肺金清肅則水道通調而滲於下耳然肺金又藉脾土健旺以資化源而清氣得以上升歸於肺而運行也故經又曰清陽出上竅濁陰出下竅故清陽不升則濁陰不降而淋閉之患斯成矣巢氏病源云諸淋者由腎虛而膀胱熱故也膀胱與腎為表裡俱主水水入小腸行於胞為溲便也腎氣通於陰津液下流之道也若飲食不節喜怒不常虛實不調則臟腑不和致腎虛而膀胱津液之府熱則小水下澀而且數不利故謂之淋其狀小便出少起數小腹弦急痛引於臍淋證皆屬於熱內經曰血泄淋閉皆屬於熱原病式曰淋小便澀痛也熱客膀胱鬱結不能滲泄故也或曰小便澀而不通為熱遺尿不禁為冷豈知熱甚客於腎部干於足厥陰之經鬱結極甚而氣血不能宣通則痿痹而神無所用故液滲入膀胱而旋溺遺失不能收禁也淋為熱證明矣既曰冷淋復用黃芩黃柏梔子榆皮瞿麥茯苓通草滑石車前子之類寒藥治之而已其説雖妄其方則是或曰有患淋而服茴香益智醇酒溫藥而愈者然則非冷歟殊不知此皆利小便之要藥也蓋醇酒益智之性雖熱而茴香之性溫滑石之性寒所以能開發鬱結使氣液宣通熱散而愈也淋有三因陳無擇云淋證古謂之癮名稱不同也癮者罷也淋者濁也古方皆云心腎氣鬱致小腸膀胱不利復有冷淋熱淋濕淋皆屬外因既言心腎氣鬱與夫驚憂恐思皆內所因況食啖冷熱房勞致傷及乘急忍溺此皆不內外因也淋有五證嚴氏曰淋五證氣石血膏勞是也氣淋為病小便澀常有餘溺是也石淋莖中痛尿不得卒出膏淋尿似膏出勞淋勞倦則發痛引氣衝血淋遇熱則發甚則溺血候其鼻頭黃赤色小便難也大抵此證多由心腎不交積蘊熱毒或酒後房勞嗜食燥熱七情鬱結所致癃閉淋閉為一類也淋證為寒之誤或謂淋證為寒誤也殊不知溲下淋瀝疼痛忍之身必戰栗而憎寒故有似乎冷遂以為冷此不明夫運氣變化之機亢則害承乃制戰栗似寒經屬於火反兼水化之象乃熱甚而鬱結不開或熱出沙石者或如脂膏者亦非冷凝也是皆熱在脬中煎熬日積輕則凝如脂膏甚則結如沙石且如湯瓶煎煉日久熬成湯咸又如清水煎湯熱甚則沸溢自然渾濁也甫見間有寒者不過為淋之變證也始初因熱或服寒涼通利之藥過多以致脾氣下陷膀胱之氣因而凝滯不清變成白濁並無痛楚此用溫暖升提如縮泉丸補藥升陽湯之屬是也非此而言寒者誤也淋證屬膀胱經病多主於氣經曰膀胱者州都之官津液藏焉氣化則能出矣此見膀胱津液出入皆以氣為本氣行而水自化也知熱病而不知氣病者不足語於神也然則知清心蓮子飲之制者其氣之謂乎知機其神乎脈候脈經曰少陰脈數婦人則陰中生瘡男子則為氣淋脈細而數熱結下焦則令人淋閉不通淋之為病小便數如粟狀小腹弦急痛引臍中左尺脈數為淋閉脈芤為血淋淋證脈盛而實大者生虛細而澀者死治法治淋病有氣血之分東垣云淋證當分在氣在血而治之以渴與不渴而辨之如渴而小便不利熱在上焦氣分肺金主之宜用淡滲之藥以茯苓澤瀉琥珀燈心通草車前子瞿麥萹蓄之類而清肺金之氣瀉其火以滋水之上源也不渴而小便不利者熱在下焦血分腎與膀胱主之宜用氣味俱陰之藥知母黃柏滋腎丸是也除其熱泄其閉塞以滋膀胱腎水之下元也治淋證要審新久虛實淋證初作者主於實熱當利之八正散之屬是也既利之而不愈久久而氣下陷者虛也宜升其氣氣升而水自下升而不愈必用吐法吐之而氣自升也痰多者用二陳湯先服後吐痰氣閉塞者二陳加木通香附探吐丹溪治一男子病小便不通醫用通利藥而反劇丹溪曰此積痰也痰積在肺肺為上焦膀胱為下焦上焦閉則下焦塞譬如滴水之器必上竅通而後下竅之水出焉乃以吐法大吐之吐已病如失然此可見癃淋又不獨主於經病也治鄭憲使之子年十六生七個月後得淋病五七日必一作其發則大痛水道下如漆如粟者一盞方定脈之輕則澀重則弦視其形瘦而長色青而蒼意其必因其父服下部熱藥熱在胎留於子之命門而然遂以紫雪和黃柏末丸梧桐子大曬乾熱湯下百丸半日又下二百丸食物壓之又半日痛大作連腰腹水道乃行下漆如粟者碗許痛減十之八後與陳皮一兩桔梗木通各半兩又下一合許而安父得燥熱尚能病子況母得之者乎治一年老人因疝痛多服烏附患淋十餘年又服硝黃諸淋藥不效項發一大疽淋痛愈甚叫號困憊脈短澀左微似弦皆毒所致凝積滯血滿膀胱脈澀為敗血短為血耗忍痛傷血叫號傷氣知其溺後有如敗膿者詢驗果然多取土牛膝濃煎湯並四物湯大劑與之三日後痛愈敗膿漸減淋止瘡勢亦定蓋四物能生陰血也治一産婦因收生者不謹損破尿胞而致淋瀝因思肌肉傷破尚可補完脈之虛甚並難産皆是氣血虛産後又虛試與峻補以參術為君芎歸為臣桃仁陳皮黃耆茯苓為佐煎豬羊胞湯令極餓飲之一月而安蓋是氣血驟長其胞恐稍遲亦難成功一人年四十口乾溺數春末得之夏求治脈俱澀右略數而不弦重取似大而稍有力左稍沉略弱而不強然澀卻多於右喜二尺皆不甚起當作飲食厚味生熱此謂之痰熱禁其厚味降火以清金抑肝而補脾三補丸二十一粒玄明粉五粒阿膠五粒薑湯吞下一日六次又以四物湯加參朮陳皮生甘草五味麥門冬煎服一日三次與丸藥間服之一二日自覺清快小便減三之二口不幹止渴未消頭運眼花久坐則腰疼遂以摩腰丹治腰痛仍以四物減川芎加參耆白朮牛膝五味炒柏麥門冬煎調六一散反覺便多遂去六一散仍服丸藥丹溪云淋雖有五皆屬於熱小便滴瀝澀痛者為淋急脹不痛者謂之閉也治宜解熱利水炒山梔子之類不可發汗汗之必便血便血不痛者養血尿尿血而痛者為血淋也血淋一證須看血色若血鮮者心與小腸實熱若色瘀為積敗之血也丹溪心法附録云色瘀者乃腎與膀胱虛冷誤也服漢椒根意蓋因瘀積特用辛味行其凝滯之瘀血耳若謂虛冷而用熱藥豈理也哉此其熱因熱用之義也丹溪既云五淋皆熱附録者何相戾焉有瘀血作淋者用牛膝膏淋證有血因火燥下焦血氣不得升降而滲泄之令不行也宜補陰降火四物湯加知母黃柏或用四物湯下滋腎丸痰熱隔滯中焦淋澀不通二陳湯煎頓服探吐之以提其氣小便熱鬱成淋不通用赤茯苓黃芩澤瀉車前子麥門冬肉桂木通甘草梢氣虛者加黃耆木香淋痛加黃柏生地黃夏月煎調益元散陰莖痛乃厥陰氣滯兼熱用甘草梢蓋欲緩其氣耳有腎虛極而淋者當補腎精而利小便不可便用利水藥老人氣虛淋閉參術中帶木通梔子之屬淋證用諸通利藥而不通者用木香流氣飲即通或別用通氣香劑才愈者此乃氣淋出於冷熱淋之外也熱極成淋服藥不效者宜減桂五苓散加木通滑石燈心瞿麥各少許為末蜜水調服傷寒後脫陽小便不通用生薑自然汁調茴香末敷小腹上又服益智茴香丸調益元散送下藥方通治五淋諸方局方石葦散治膀胱有熱水道不通淋瀝澀不出臍腹急痛有時或倦則發或尿如豆汁或出砂石芍藥白朮滑石葵子當歸瞿麥各三錢石葦木通各二錢甘草王不留行各一錢上為末每服二錢空心小麥湯送下或煎服亦可濟生地膚子散治諸病後體虛觸熱熱結下焦遂成淋病小便赤澀地膚子豬苓通草瞿麥知母黃芩海藻枳實炒升麻葵子等分上咀每服五錢水盞半燈心十根薑三片煎八分空心服局方五淋散治膀胱有熱水道不行淋瀝不止臍腹急痛或尿如豆汁或如沙石膏淋尿血並皆治之山茵陳淡竹葉木通滑石甘草炙各一錢山梔仁炒赤芍藥赤茯苓各二錢上咀作一服水二盞煎一盞食前服車前子散治諸淋小便痛不可忍車前子淡竹葉赤茯苓荊芥穗各二錢上以新汲水二盞燈心二十莖煎一盞食前服車前滑石散治諸淋閉澀不通大抵諸淋由腎與膀胱熱也腎膀胱為表裡俱屬於水水入小腸下脬中行於陰為小便也腎氣不通於陰水液之道路不利膀胱為津液之腑津液內涸流於腎水道不通停積於脬腎熱而氣澀故水道不利小便淋澀故謂之淋其狀小便數而出以小腹引臍中痛又有氣淋石淋血淋形證殊異治療不同今以治之車前子滑石各一兩為末每服一錢食前米飲調日三服通草湯治諸淋通草葵子茅根王不留行蒲黃炒桃膠瞿麥滑石各一錢甘草炙五分上水二盞煎一盞食前服金沙五苓散治五淋痛澀海金沙肉桂甘草炙各二錢赤茯苓豬苓白朮芍藥各三錢澤瀉半兩滑石七錢石葦一錢上為細末每服三錢水一盞燈心三十莖煎七分空心服葵子茯苓湯治小便不通葵子茯苓去皮各一錢水二盞煎一盞食前服葵子石葦散能利小便葵子半斤地榆三兩滑石二兩石葦去毛石楠葉通草各一兩為細末飲調方寸匕日三服清肺飲子治渴而小便不利邪熱在上焦氣分也茯苓豬苓澤瀉各一錢半車前子琥珀木通瞿麥萹蓄各一錢通草燈心各五分水二盞煎一盞食遠服木通湯治小便不通小腹痛不可忍木通滑石各半兩牽牛頭末二錢半上作一服水二盞燈心二十莖蔥白一根煎一盞食前服二神散治諸淋急痛海金沙七錢滑石五錢為細末每服二錢半用燈心木通麥門冬用新汲水煎入蜜少許食前調服淡竹葉湯治諸淋淡竹葉車前子大棗烏豆炒去殼燈心甘草各一錢水二盞煎七分食前服聖惠蒲黃散治心腎有熱小便不通蒲黃生用木通荊芥車前子桑白皮滑石燈心赤芍藥赤茯苓甘草炙各等分為細末每服二錢食前蔥白湯調服瞑眩膏治諸淋疼痛不可忍及沙石淋皆治大蘿蔔切一指厚四五片以好白蜜二兩浸少時安淨鐵鏟上慢火炙乾再蘸蜜再炙番覆炙令香軟勿令焦待蜜盡為度候溫細嚼以鹽湯一盞送下效地髓湯治五淋小便不利莖中痛欲死牛膝不拘多少濃煎汁飲之效酒煎亦可一方以根煮服之一方捶碎一兩用水二盞煎一盞去渣日三服一人患血淋流下小便盆內凝聚如蒟蒻久而有變如鼠但無足耳百治不瘥遇一明醫言服此藥雖未愈而血色漸淡久乃復舊後十年其病又作又服此藥即愈後數人息淋血及莖中痛者服之悉愈及觀本草載之治小便不利及莖中痛欲死故附醫案表其神效云參苓琥珀湯治小便淋瀝莖中痛不可忍引脅下痛人參五分茯苓四分琥珀當歸身柴胡澤瀉各二分玄胡索各七分川楝子去核炒甘草各一錢上長流水二盞煎一盞食前服博濟方治五淋赤芍藥一兩檳榔一枚麵包煨為末每服一錢水煎空心服透膈散治諸淋硝石一兩細研末勞淋勞倦虛損則發用葵子末煎湯調二錢血淋熱淋井花水調服氣淋木通湯調服石淋研藥末入銚子內隔紙炒至紙焦再碾細同溫水調下小便不通小麥湯調服諸淋並空心冷水調亦可熱淋諸方局方八正散治大人小兒心經蘊熱臟腑閉結小便赤澀癃閉不通及熱淋血淋並宜服之車前子瞿麥萹蓄滑石另研飛山梔子炒木通大黃煨甘草各等分上咀每服五錢水二盞燈心二十莖煎七分食前溫服導赤散治心經蘊熱淋證方見熱門和劑清心蓮子散治上盛下虛心火炎上口苦咽乾煩渴微熱小便赤澀或欲成淋並皆服之石蓮子人參黃耆蜜炙麥門冬赤茯苓各一錢車前子黃芩地骨皮甘草各五分水二盞煎一盞食前服本事火腑丹治心經蘊熱五淋疼痛木通黃芩各一兩生地黃二兩上為末煉蜜丸梧桐子大每服五十丸米湯下祕方鬱金黃連丸治心火上炎腎水不升使水火不得相濟火獨炎上水不既濟膀胱受火制而成諸淋俱是熱證此藥悉治之鬱金黃連務一兩黃芩琥珀研大黃酒蒸各二兩白茯苓滑石各四兩黑牽牛頭末二兩上為末水糊丸梧桐子大每服五十丸空心沸湯下琥珀茯苓丸治膀胱積熱以致小便癃閉淋瀝琥珀赤茯苓川木通知母黃柏蛤粉赤芍藥當歸澤瀉各二兩人參桂府滑石山梔子黃連大黃蒸黃芩白朮瞿麥萹蓄豬苓各一兩木香半兩上為細末和勻滴水丸梧桐子大每服四十丸早晨白湯下瞿麥湯治心經蘊熱小便淋澀赤痛瞿麥穗三錢冬瓜子茅根各半兩黃芩六錢木通一錢竹葉一握葵子二合滑石二兩研末分四服上除滑石外粗搗分四劑每服水二盞煎一盞食前服麥門冬飲治心熱氣滯成淋臍下妨悶麥門冬去心木通赤芍藥葵子滑石二兩芒硝兩半上每服四錢水一盞薑一片蔥白二莖煎六分食前服四汁飲治熱淋小便赤澀疼痛葡萄汁生藕汁生地黃汁白蜜各五合上和勻每服七分一盞銀石器內慢火熬沸食前服王不留行散治熱淋不止疼痛即通草散方見前螺泥膏治熱淋小便不通大田螺不拘多少以淨水器盛養待螺吐出泥澄去上面清水以底下濃泥入膩粉五分塗臍上尿立通將螺放生白茅煎治熱淋痛白茅根切四斤上水一斗五升煮取五升每服一升日三服夜二服盡劑而愈氣淋諸方沉香散治氣淋臍下妨悶痛不可忍沉香石葦去毛滑石當歸王不留行瞿麥各半兩葵子赤芍藥白朮各三錢甘草一錢上為細末每服二錢食前大麥煎湯調服以利為度檳榔散治氣淋小腸急痛檳榔木香當歸炒各半兩母丁香桂心各一錢冰片一錢細研豬苓去黑皮一兩上為細末每服一錢食前生薑蔥湯調服沉香琥珀散氣淋諸淋不通皆可服沉香不見火琥珀各三錢通草忘憂草根萹蓄小茴香炒木通血竭滑石海金沙木香不見火各半兩上為粗散每服十兩水二盞燈心二十根竹葉十個連根蔥白三莖煎七分空心服如硬塊加大黃五錢水道澀滯加車前子半兩血淋加生地黃一兩用長流水煎極效木香湯治冷氣凝滯小便淋瀝作痛木香檳榔木通舶上茴香焙當歸青皮澤瀉赤芍藥官桂橘皮甘草炙各五分上作一服水二盞薑三片煎一盞食前服瞿麥湯治氣淋滯澀瞿麥黃連大黃蒸枳殼去穰炒當歸羌活木通牽牛延胡索桔梗大腹皮射干各兩半桂心半兩上咀每服四錢水盞半薑三片煎八分食前服石葦散治氣壅不通小便淋滯臍下疼痛石葦去毛赤芍藥各半兩白茅根木通瞿麥川芒硝葵子木香各一兩滑石二兩上咀每服四錢水一盞煎六分食前服澤瀉散治氣淋小便澀痛脹滿澤瀉雞蘇石葦去毛炙赤茯苓去皮蒲黃當歸切焙琥珀另研檳榔枳殼去穰麩炒桑螵蛸炒各半兩官桂去粗皮五分上為細末每服二錢用冬葵子或木通煎湯調服茴香益元散治氣滯尿淋疼痛茴香二錢微炒黃色益元散三錢為末水盞半煎八分食前服血淋諸方濟生小薊飲子治下焦結熱尿血成淋小薊根蒲黃生地黃藕節梔子仁木通滑石甘草當歸淡竹葉各咀等分每服半兩水煎空心服羚羊角飲治血淋小便澀痛羚羊角屑梔子仁葵子各一兩青葙子紅藍花炒麥門冬去心大青大黃炒各半兩上為粗末每服三錢水一盞煎七分食前服琥珀散治五淋痛澀小便膿血琥珀海金沙沒藥蒲黃各等分上為末每服三錢食前通草湯調服柿蒂散治血淋以乾柿蒂燒灰存性為末每服二錢糧米飲空心調下雞蘇飲子治血淋不絶雞蘇一握切石膏八分竹葉一握生地黃一升蜀葵子四分為末除葵子外先將四味以水煮取二升去渣下葵子末和勻作二服如人行五七里久再進二服忌蕪荑蒜面黃金散治小便血淋疼痛大黃煨人參蛤粉黃蜀葵花焙上各等分為細末每服一錢燈心煎湯調服日三次生車前草飲治小腸有熱血淋急痛鮮車前草不拘多少洗淨搗爛少入井水調攪取汁食前飲一盞若沙淋加寒水石末一錢調發灰散治血淋若單單小便出如尿亂髮燒灰入麝香少許每服一錢用米泔溫湯調下治淋以葵子等分為末調犀角地黃湯治小腸淋瀝血出疼痛難忍及治心血妄行鮮血等症方見血症門如神散治心臟有熱乘於血分血滲小腸故尿血也阿膠蛤粉炒二兩山梔仁車前子黃芩甘草各二錢上為細末每服一錢井花水調下日三次當歸一物湯治小便血極效川當歸四兩銼上以酒三升煮取一升空心頓服亦治小便澀鹿茸散治小便血尿日夜不止鹿茸酒洗去毛酥炙黃生地黃酒洗當歸酒洗蒲黃一合冬葵子炒四兩上為極細末每服三錢空心溫酒調服一方煉蜜丸如梧桐子大每服二錢食前鹽湯下石淋諸方神效琥珀散治石淋水道澀痛頻下沙石琥珀桂心滑石大黃微炒葵子膩粉木通木香磨汁磁石煅酒淬七次細研水飛各半兩為細末每服二錢食前燈心煎湯調服如聖散治沙淋馬蘭花麥門冬去心白茅根車前子甜葶藶苦葶藶檀香連翹各等分上為末每服四錢水煎服如渴加黃芩臨熟入鹽少許石燕丸治石淋多因憂鬱氣滯下焦結熱令人小便不通石燕燒紅水中淬二次搗研極細水飛焙石葦去毛瞿麥穗滑石各一兩上為細末麵糊丸梧桐子大每服十丸食前瞿麥湯送下日三服仍用石葦瞿麥木通各四錢陳皮茯苓各三錢為末每服三錢水一盞煎七分服獨聖散治沙石淋蜀葵花子炒一兩為末食前米飲調下一錢鱉甲散治沙石淋九肋鱉甲一個酥炙黃為細末每服一匙酒調下以去沙石為效麻黃牽牛湯治石淋水道不通頭痛昏悶先宜服此麻黃去節羌活射干荊芥穗紫菀茸防風知母蔓荊子牽牛各一錢半夏二錢為末每服二錢水一盞煎熱服膏淋諸方五淋二赤散治諸淋或如豆汁沙石或血尿如膏赤芍藥二錢赤茯苓去皮山梔子各半兩甘草當歸酒浸各三錢二分作二服每服水盞半燈心草莖煎空心服沉香丸治膏淋沉香肉蓯蓉酒浸荊芥穗磁石火煅醋淬七次黃耆滑石各一兩上為細末煉蜜和丸梧桐子大每服三十丸不拘時溫酒送下鹿角霜丸治淋閉黃赤白黯如脂膏鹿角霜白茯苓秋石各等分上為末麵糊丸梧桐子大每服五十丸空心白湯下磁石丸治膏淋小便如膏磁石煅醋淬七次澤瀉肉蓯蓉湯洗焙滑石各一兩上為細末煉蜜為丸梧桐子大每服三十丸食前溫酒下菟絲子丸治膏淋菟絲子制桑螵蛸炙各半兩澤瀉三錢蜜為丸如前服海金沙散治膏淋海金沙滑石末各一兩甘草二錢半上為細末每服二錢燈心湯空心調下勞淋諸方補中益氣湯治勞淋傷損元氣下陷方見內傷門茯苓調血湯治酒色過度傷損成淋赤茯苓赤芍藥川芎半夏曲各一錢前胡柴胡青皮桑白皮枳殼炒桔梗甘草白茅根燈心各一錢二分上作二服水二盞薑三片煎八分空心服鹿角膠丸治房勞傷損小便血尿鹿角膠半兩油發灰沒藥另研各三錢上為末茅根煎汁打糊丸梧桐子大每服五十丸空心鹽湯下虛淋諸方地黃丸治腎氣虛憊膀胱淋澀生地黃焙黃耆各半兩防風遠志制茯神去木鹿茸酥炙去毛黃芩栝蔞各一兩人參石葦去毛當歸各半兩赤芍藥四錢上為細末每服二錢食前米飲調下肉蓯蓉丸治稟賦虛弱小便淋數或不禁肉蓯蓉八兩熟地黃六兩五味子四兩菟絲子搗餅二兩上為細末酒煮山藥糊為丸梧桐子大每服七十丸空心酒下經驗琥珀散治老人虛人小便不通淋澀琥珀為末人參煎湯空心以人參湯調服琥珀末一錢八味丸六味地黃丸俱治腎虛淋證二方見虛損門易簡諸方五苓散合益元散治一切淋證小便不利二方見傷寒門道藏經方治淋取土牛膝淨洗一握水五盞煎一盞去渣入麝香乳香各少許空心和勻服一方治淋用黑豆二百粒粉草二寸銼新水二盞煎八分去渣乘熱入滑石末一錢調空心服修真祕旨治淋用赤小豆三合慢火炒熟為細末每服二錢蔥花酒熱調空心服一方治淋取雞肫內黃皮五錢取去沙石陰乾燒存性為末作一服白湯調立愈肘後方治諸淋下血用火麻根十根咀水三鍾煎一鍾空心服外臺祕要治淋取生續斷即馬薊根絞汁每服空心半盞一方治血尿升麻一兩銼水二盞煎一盞空心溫服集驗方治血淋用竹茹五錢水二盞煎一盞空心溫服諸失血效一方治血淋以生地黃絞汁一盞入生薑自然汁半杯和勻服不愈再服必效一方用虎杖根為末每服一錢米飲調下食前服一方治石淋用石首魚頭中石枕磨水服或燒灰米飲調下一方治諸淋老人小便不利用核桃肉一升細米煮漿粥一升相合空心頓服即瘥一方治諸淋小便赤澀遺瀝疼痛用三葉酸漿草搗取自然汁一合酒一合和勻蕩熱空心服立通一方入蜜少許同服一方治五淋用船底清苔一丸如雞卵大水一盞煎五分溫服一方治淋用鱘魚煮汁多飲之愈養生導引法一法仰臥令兩足膝頭斜踵置尻口內氣振腹鼻出氣去淋數小便一法蹲踞高一尺許以兩手從外屈膝內入至足趺上急手握足五指極力一通令內曲入利腰髖治淋一法偃臥令兩足膝頭斜踵置尻口內氣振腹鼻出氣去石淋莖中痛一法以兩足踵布膝除癃氣淋一法偃臥令兩足布膝頭取踵置尻下以口內氣腹脹自極以鼻出氣七息除氣癃小便數莖中痛陰以下濕小腹痛膝不隨也
