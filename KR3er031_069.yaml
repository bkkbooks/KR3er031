body:
  text: 卷之六十九祕結候病機敘論內經曰北方黑色通入於腎開竅於二陰藏精於腎腎主五液故腎實則津液足而大便潤腎虛則津液竭而大便燥腎惡燥急食辛以潤之食苦以泄之祕結多由陰虛血少火盛水虧凡人大便祕結皆由房勞過度飲食失節或恣飲酒漿過會辛熱飲食之火起於脾胃淫欲之火起於命門以致陰虛血耗火盛人虧津液不生故傳道失常漸成燥結之證有年高血少津液枯涸或因有所脫血津液暴竭新産之婦氣血虛耗以致腸胃枯澀體虛之人攝養乖方三焦氣澀運掉不行而腸胃壅滯遂成祕結諸若此惟當養血滋陰滑澀潤燥不可妄用通利之藥恐傷元氣耗散真液祕結愈甚也祕結日深漸成嗝噎七衝門唇為飛門齒為戶門會厭為吸門胃為賁門太倉下口則為幽門大腸小腸會為闌門下極為魄門此為七衝門也蓋陰不可以無陽水不可以無火水火既濟上下相交榮衛流行自然潤澤若而幽門不通則上衝吸門不開則噎塞故云燥祕不便氣不得上下者治在幽門祕結之證其名有五有風祕氣祕熱祕寒祕濕祕風祕者風痰燥結不通也氣祕者氣滯煩悶不通也熱祕者內府積熱消耗津液大便結燥不通也寒祕者年高臟冷及痃癖冷氣結滯大便不利也濕祕者濕熱鬱結津液不行而祕澀也所以病證不同難以一例而施治也脈候祕結脈多沉伏而結陽結脈沉實而數陰結脈伏而遲或結老人虛人便結脈雀啄者不治治法治祕結要分西北東南之殊在西北多為風燥所成以疏風潤燥為主搜風順氣丸是也在東南多為濕熱所致以開結清熱為要木香檳榔丸是也大抵審其人之虛實察其脈之強弱參而治之罔有不當治祕結以潤燥通幽為本凡病實熱初然祕結者脈實大而有力宜以塞因通用之法承氣等湯通之可也其病之久者老人虛人及亡津之後悉皆以潤燥通幽之劑緩而圖之庶不有誤如潤腸丸通幽湯之屬是也結燥之人不可發汗血虛之人大便結燥脈大如蔥管而身發熱切不可發汗汗之則重亡津液結燥愈甚而致死者有之卒以巴豆牽牛峻劑攻下暫得通快必然再結愈甚卒不能調則亦重竭津液之過也丹溪所謂古方通大便皆用降氣品劑蓋肺氣不降則大腸難傳送用杏仁枳殼沉香訶子是也又老人虛人風人津液少而祕者宜藥以滑之用麻仁胡麻阿膠之屬是也如投以快藥利之津液走氣血耗雖暫通而即祕矣更生他病何可勝言治脾約證須清金氣以滋化源活人書謂脾約證乃胃強脾弱約束津液不得四布但輸膀胱故小便數而大便難用脾約丸以下脾之結燥使津流入胃腸潤結化而愈丹溪曰既云脾約必陰血枯稿內火燔爍熱傷元氣故肺受火邪而津竭必竅母氣以自救夫金衰則上受木邪脾失轉輸肺失傳化宜其大便祕而難小便數而無藏蓄也理宜滋養陰血使陽火不熾金行清化脾土旺健津液既潤大小腸何祕結之有東垣云注夏大便澀者為血少血中伏火也人參黃耆湯加生地黃當歸身桃仁泥麻仁之類是也許學士治年老虛人便祕只用火麻仁蘇子仁各半研取汁服之更煮粥食之不必服藥而祕愈食傷太陰腸滿食不化腹響然不能大便者以苦泄之凡臟腑祕結有虛實治療當審之如實祕者能飲食小便赤澀以搜風順氣丸三黃丸推氣丸千金丸七宣丸七聖丸之類下之胃虛而祕者不能飲食小便清利厚朴湯主之蓋實祕物也虛祕氣也藥方桃仁麻仁潤血燥杏仁郁李仁治氣燥皂角仁治風燥清潤燥澀諸劑東垣導滯通幽湯治大便難幽門不通上衝吸門不開噎塞不便燥結而祕氣不得不治在幽門以辛潤之當歸升麻桃仁泥各一錢生地黃熟地黃各五分紅花炙甘草各一分上咀水二盞煎八分去滓調檳榔末五分稍熱服衛生潤腸湯治大便結燥不通生地黃生甘草大黃煨熟地黃當歸尾各五分升麻桃仁麻子仁各一錢紅花四分上作一服水二盞煎一盞空心服治血潤腸丸治大便風祕血祕不通常常結燥當歸大黃煨各一兩防風羌活各半兩麻仁二兩半皂角仁燒灰存性去皮研一兩其性得濕則潤去濕則燥枯用者勿誤桃仁二兩上除桃仁麻仁另研如泥外為細末煉蜜為丸梧桐子大每服五十丸三兩服後大便不能燥結也楊氏滋腸五仁丸桃仁杏仁各炒去皮尖一兩松子一錢二分柏子仁半兩郁李仁炒一錢陳皮四兩為末上五仁研勻為膏入陳皮和勻煉蜜丸梧桐子大每服五十丸空心米飲下直指潤腸丸治大便祕澀不通杏仁炒去皮尖枳殼麩炒麻仁另研陳皮各半兩阿膠炒防風各二錢半上為末煉蜜丸梧桐子大每服五十丸空心蘇子荊芥湯下膠蜜湯治老人虛人大便祕澀連根蔥白三寸新水煎去蔥入阿膠二錢蜜二匙溶化食遠服楊氏潤腸丸治大便祕澀旬日不通桃仁炒去皮尖研如泥荊芥穗各一兩火麻仁盞半細研水浸取濃汁芝麻半盞略炒研水浸取濃汁上入鹽少許同荊芥穗煎食遠每服一盞代茶飲之以利為度加味四物湯治大腸結燥而祕澀當歸熟地黃川芎赤芍藥大黃煨桃仁研各一錢水二盞煎八分食遠服濟生蘇子麻仁粥能順氣滑大便紫蘇子麻子仁各不拘多少研爛水浸濾取汁煮粥食之良方三仁丸治大腸有熱津液竭燥大便祕澀柏子仁松子仁火麻仁各一兩上研令勾用黃蠟半兩溶化和丸梧桐子大每服二十丸食前米飲下未快加上丸數服之積熱祕結諸劑局方三黃丸治積熱閉結不通方見熱門千金丸治臟腑壅滯氣結積熱不通或內有癥瘕疳蛔心腹俱痛及腳氣腫滿休息熱痢並風痰瘡疥結核等疾大黃十兩木香半兩上為末醋糊丸梧桐子大每服二三十丸食遠白湯送下倒換散無問新久癃閉不通小腹急痛肛門腫脹大黃大便不通用一兩小便不通用半兩荊芥大便不通用半兩小便不通用一兩上為細末每服二錢食遠白湯調服濟生檳榔丸治大腸積熱氣壅不通心腹滿大便祕結大黃蒸黃芩枳實麩炒火麻仁炒去殼另研牽牛炒檳榔羌活杏仁炒去皮尖研白芷各一兩人參半兩上為細末煉蜜丸小豆大每服五十丸空心白湯下拔萃牛黃散治三焦積熱臟腑祕結白牽牛取頭末半兩大黃一兩上為末每服三錢厥冷溫酒調服手足煩者蜜水調服聖惠大黃飲子治身熱煩躁大便不通大黃煨二錢杏仁炒去皮尖研枳殼梔子仁各錢半川升麻一錢生地黃酒洗錢半人參七分黃芩八分甘草炙五分上水二盞薑五片豆豉二十一粒烏梅一個煎一盞不拘時服和劑脾約丸治腸胃燥熱大便祕結麻仁另研五兩大黃一斤蒸厚朴薑汁炒枳實麩炒芍藥各八兩杏仁去皮尖五兩半上為末煉蜜丸梧桐子大每服二十丸臨臥白湯下便利止服論脾約丸成無己曰約者結約也又約束也胃強脾弱約束津液不得四布但輸膀胱故小便數而大便硬故曰脾約此丸以下脾之結燥腸潤結化津液入胃大便利小便少而愈矣愚竊有疑何者既曰約脾弱不能運也脾弱則土虧是必脾氣之散脾氣耗原其所由久病大下大汗之後陰血枯稿內火蟠灼熱傷元氣又傷於脾而成此證傷元氣者肺金受火氣無所攝傷脾者肺為脾之子肺耗則津竭必竊母氣以自救金耗則木寡於畏土欲不傷不可得也脾失轉輸之令肺失傳受之自宜大便祕而下難小便數而無藏蓄也理宜滋養陰血使孤陽之火不熾而金行清化木邪自止脾土清健運行津液乃能入胃則腸潤而通矣今以大黃為君枳實厚朴為臣雖有芍藥之養血麻仁杏仁之溫為之使用之熱甚而氣熱者無有不安愚恐西方地氣高厚人稟旺實者可用若用之於東南之人與熱雖甚而血氣不實者雖得暫通將見脾愈弱而燥矣後之用此方須知在西北以開結為主在東南以潤燥為主慎勿膠柱而調瑟潔古云臟腑祕結有虛有實胃實而祕者能飲食而小便赤當以麻仁丸七宣丸之類主之消毒麻仁丸芝麻四兩研取汁杏仁二兩去皮尖研如泥大黃五兩山梔十兩上為末煉蜜入麻汁和丸梧桐子大每服五十丸食前白湯下氣閉不通諸劑和劑三和散治七情氣結脾胃不和心腹痞滿大便祕澀羌活紫蘇葉宣木瓜大腹皮沉香各一錢檳榔木香陳皮白朮川芎炙甘草各七錢半上咀分二服每服水一盞煎六分不拘時服濟生橘杏丸治老人氣閉大腑不通橘紅取末杏仁去皮尖各等分上為末煉蜜丸梧桐子大每服五十丸食遠米飲下良方六磨湯治氣澀腹悶大便祕澀沉香木香檳榔烏藥枳殼大黃各等分上用白湯俱磨濃汁空心溫服枳殼丸治三焦痞塞氣不升降大便閉小便澀枳殼麩炒皂角炙去皮弦大黃羌活木香陳皮桑白皮白芷各等分上為末煉蜜丸梧桐子大每服七十丸空心米飲送下小通氣散治虛悲傷之甚致令祕澀或服燥藥太過陳皮去白嫩紫蘇枳殼木通各等分上咀每服八錢水二盞煎八分食遠溫服本香逐氣丸治食積氣滯大便閉兼治腳氣小腸氣攻刺痛陳皮青皮檳榔各半兩木香二錢巴豆霜錢半上為末薑汁調神麯糊為丸梧桐子大每服十丸食遠薑湯送下氣攻腹痛枳殼木瓜湯下直指寬快湯治氣不下降大便閉澀香附子制二兩天台烏藥枳殼制各半兩砂仁炒六錢蘇子炒半兩青木香三錢甘草炙七錢半上為細末每服二錢陳皮煎湯調下降氣湯治氣不降大便不通加枳殼杏仁煎服方見腳氣門桔梗枳殼湯治氣不下降而閉加紫蘇煎服方見氣門河間枳殼丸治二焦結約大小便不通穀氣不得下行枳殼二兩陳皮一兩檳榔半兩木香二錢半黑牽牛四兩半生半炒取頭末一兩半上為細末煉蜜為丸梧桐子大每服十五丸薑湯下宣明導氣枳殼丸治氣結不散心胸痞滿逆氣上攻大便祕澀枳殼木通青皮陳皮桑白皮炒蘿蔔子微炒白醜炒黑醜炒茴香炒莪朮炮京三稜炒各等分上為末生薑汁打糊為丸梧桐子大每服二十丸煎陳皮湯下老人風祕諸劑和劑搜風順氣丸治風氣腳氣老人小兒虛弱人大便閉結宜服車前子兩半白檳榔火麻仁微炒去殼郁李仁泡去皮研菟絲子酒浸焙乾牛膝酒浸乾山藥各一兩枳殼炒防風獨活各八錢大黃半生半熟半兩上為末煉蜜丸小豆大每服五十丸茶酒湯任下早晚各一服疏風散治風毒祕結大便不通防風枳殼羌活獨活蘇子仁炒另研杏仁炒去皮尖甘草炙威靈仙檳榔白芷白蒺藜炒各八分上咀水二盞薑五片蜜一匙煎八分空心服皂角丸治大腸有風大便閉結皂角炙去皮弦子枳實麩炒等分上為末煉蜜丸或飯飲丸小豆大每服七十丸空心米飲下七宣丸治風氣結聚宿食不消兼沙石皮毛在腹及積年腰腳疼痛冷如冰石腳氣衝心煩憒悶亂頭旋運倒肩背重痛心腹脹滿胸膈痞塞風毒腫氣連及頭面大便祕澀小便時數脾胃氣壅不能飲食腳轉筋掣痛攣急心神恍惚睡臥不安柴胡枳實木香訶子肉各五兩桃仁炒去皮尖六兩炙甘草四兩大黃蒸十五兩上為末煉蜜丸梧桐子大每服二十丸食遠米飲下漸加至四五十丸以利為度覺病勢退愈止服七聖丸治風氣壅盛痰熱結搏頭目昏重心煩面赤涕唾稠黏咽乾口燥精神不爽夜臥不安肩背拘急胸膈脹滿腹脅痞悶腰膝沉重大便閉結小便赤澀木香檳榔川芎肉桂羌活各半兩郁李仁泡去皮大黃半生半熟各一兩上末煉蜜丸小豆大每服十五丸至二十丸食後臨臥白湯下和劑半硫丸治年高人風冷虛祕及痃癖冷氣半夏制生硫黃細研上等分薑汁打糊為丸小豆大每服五十丸空心溫酒下威靈仙丸治老人腸胃虛弱風冷氣閉威靈仙黃耆蜜炙各一兩枳實麩炒半兩上為末煉蜜丸梧桐子大每服七十丸空心米飲下大黃芍藥湯治大人小兒風與血滯留蓄上焦胸膈高起大便不通大黃芍藥枳殼桔梗各一錢木香甘草炙各五分水二盞薑三片煎八分食遠服臟腑積滯祕結諸劑丁香脾積九治積閉感應丸治積滯閉結方並見積聚門莪朮脾積丸治飲食停滯腹脹痛悶嘔惡吞酸大便祕結莪朮二兩三稜二兩良薑半兩以上用米醋一斤於瓷瓶內煮乾乘熱切碎焙青皮一兩木香各半兩皂角不蛀者三大條燒存性百草霜鄉村鍋底者為佳三匙為細末巴豆半兩去殼研如泥漸入藥末研和得所麵糊丸麻子大每服五丸加至十丸陳皮湯下二香丸治積滯氣閉心腹刺痛中滿壅逆木香丁香青皮橘紅草果仁肉豆蔻生用白豆蔻五靈脂各半兩莪朮炮砂仁各七錢半上為細末加巴豆肉半兩研如泥漸入藥末研勻和稀麵糊丸如麻子大每服五丸加至七八丸薑湯下瑞竹本香三稜丸治腹中有蟲面色黃瘦一切積滯閉結黑牽牛半生半炒四兩大腹子四兩檳榔雷丸木香錫灰三稜大黃蒸莪朮炮各二兩上為細末每服三錢空心蜜湯調下或沙糖水亦可先將燒肉一片口中嚼之良久吐出肉後服藥醫林厚朴湯治不能飲食胃虛而祕者厚朴湯主之凡虛祕者小便清利實祕者能飲食小便赤澀不可不辨厚朴薑製二錢六分白朮四錢半夏曲一錢八分枳殼錢半陳皮二錢炙甘草二錢上咀分二服每服水二盞薑三片煎八分食遠服稍實服之不通加大黃一錢東垣麻黃白朮湯治大便不通五日一次小便黃赤遍身腫滿上及腹尤甚其色黃麻木身重如山沉困無力四肢痿弱不能舉動喘促不安青皮黃連酒炒各二兩黃耆人參桂皮白朮黃柏酒炒柴胡蒼朮豬苓各四分厚朴薑製陳皮去白甘草半生半炙升麻各三分吳茱萸白茯苓澤瀉各五分白豆蔻神麯炒各六分麻黃一錢杏仁四粒上咀分二服每服水二盞先煎麻黃令沸掠去沫入諸藥同煎至一盞食遠稍熱服東垣升麻瀉熱湯治嗝噎不通逆氣裡急大便不行青皮槐子各二分生地黃熟地黃黃柏各三分當歸身甘草梢四分蒼朮五分升麻七分黃耆一錢桃仁十粒去皮尖另研上咀水二盞入桃仁泥煎一盞食前熱服東垣枳實導滯丸治傷熱物大便不行氣滯胸腹作痛方見內傷門直指掩臍法治大小便不通用連根蔥一枝帶土不洗以生薑一塊淡豆豉二十粒入鹽一匙同研極細搜作餅烘熱掩臍中以帛縛定良久氣自通又法治祕結極困昏不知人用生大田螺一二枚以鹽一匕連殼生搗碎置患人臍下一寸三分用帛緊縛之違時便通仲景蜜導煎法凡祕結虛羸之人服藥不得通利者宜用此法以導之用蜜四兩銅器中微火熬之滴水成珠以手捻作棗子樣約大拇指許二寸長候稍熱內穀道以手急抱欲大便可去之海藏霹靂煎蜜導用鹽合入亦可皂角末或草烏末皆可鹽則軟堅潤燥皂角消結草烏化寒可隨證宜用一法以豬膽汁灌入皆可聖惠提盆散治大便結燥服藥久不通食鹽三錢灶突煤一錢上研末每用一錢竹筒吹入肛門寸深許立效本事宣積掌握丸治大便不通握藥在手便通巴豆乾薑棐子良薑硫黃甘遂白檳榔各等分上為末飯丸彈子大早朝椒湯洗手麻油塗掌心握藥一丸少時便瀉欲止即以涼水洗手易簡諸方經驗方治大小便俱不通用生明礬研末令患人仰臥置礬末於臍中滿以新汲水滴之候患人冷透腹內即自然通行如曾灸臍孔者即於灸瘢上用面作圈一指高置礬於中依法滴水外臺祕書方治下部祕澀不通用蒴藋根一把搗爛入水和絞去渣強者服一升數用並治腳氣簡要濟衆方治卒然關格大小便不通支滿欲死用葵子一升水四升煮取一升頓服內服豬脂如彈子一丸尤佳又方治大便不通用牽牛半生半炒搗末每服二錢薑湯調下未通再服以熱茶調下聖惠方治大便不通用羊蹄根一兩咀水一盞煎六分空心服肘後方治大便祕結用麻子和米煮粥食之滑腸自通妙治案一婦人身瘦大便燥結不通飲食少進小腹作痛六脈沉伏而結澀作血虛治用四物湯加桃仁麻黃煨大黃等藥數服不通反增飽悶與枳實導滯丸備急丸下咽便吐出蓋胃氣弱而不能納性速之藥耳遂以備急大黃丸外以黃蠟包之又以細針穿一孔令服三丸以蠟匱者為其不犯胃氣故得出幽門達大腸取效也越二時下燥糞一升許繼以四物湯加減及潤腸丸間服調理月餘大便如常一小兒因出痘自始出至痘愈二十五日不通大便肛門連大腸痛楚號叫日甚用蜜導法及服大小承氣湯導滯備急等丸皆不效計無所施後惟以香油令人含口中用竹管灌入肛門內約半杯許病者自覺油上行如蠕然須臾下燥糞一二升立安運氣便祕有三一曰熱經云熱至則淋閉又云少陰之復膈腸不便是也二曰寒經云太陽所至為流泄禁止是也三曰濕經云太陰司天濕淫所勝病大便難是也針灸法照海灸三壯瀉之章門參二七壯太白灸三壯瀉之氣海刺三里刺
