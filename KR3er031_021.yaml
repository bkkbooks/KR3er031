body:
  text: 卷之二十一積熱門病機敘論至真要大論篇帝曰願聞病機岐伯對曰諸嘔吐酸暴注下迫皆屬於熱諸病喘逆轉筋反戾小便渾濁諸腹脹大諸病有聲鼓之如鼓癰疽瘍疹瘤氣結核吐下霍亂瞀郁腫脹鼻塞鼽衄血溢血泄淋閟身熱惡寒戰栗驚惑悲笑譫妄衄蔑血汗皆屬於熱嘔吐酸者肝之味也由火盛制金金不能平木則肝氣自甚故為酸也如飲食熱則易於酸矣暴注卒暴注泄也腸胃熱甚而傳化失常火性疾速故如是也下迫後重裡急窘迫急痛也火性急速而能燥物故也喘逆火氣逆上也病熱則氣甚而息粗熱火為陽主乎急數熱則息數氣粗而為喘也轉筋反戾由熱氣燥爍於筋則攣瘛轉縮而痛火主燔灼燥動故也或以為寒客於筋者誤也大抵內熱甚而外被風寒禁固則內熱愈郁不得疏散而反轉戾者有矣故轉筋以帛包裹得暖即止甚則以熱湯漬之而使腠理開泄陽氣疏散則愈而俗反疑為寒者此也夫筋骨多因熱甚霍亂吐瀉所以致脾胃土衰則肝木自甚而熱燥於筋故轉戾也小便渾濁天氣熱水渾濁寒則水清水體清而火濁故也又如清水以火煎之自然濁也諸腹脹大有聲鼓之如鼓熱為陽氣發動充脹如鼓寒主收斂陽氣熱盛故如是也癰淺而大也疽深惡也瘍頭小瘡也疹浮癮點也皆熱勝血鬱於膚腠者然也瘤氣赤瘤丹毒熱盛氣也結核火氣熱甚則鬱結堅硬如果核不必潰發但令熱氣散則自消也吐下霍亂三焦為水穀傳化之道路熱氣甚則傳化失常而致霍亂吐瀉火性燥動故也或云吐瀉屬寒若寒者不渴而脈沉遲熱者必渴而脈急數故犯暑熱而作吐瀉者多也瞀昏也熱氣甚則濁亂昏昧也郁怫鬱也結滯壅塞而氣不通暢所謂熱甚則膚腠閉密而鬱結也腫脹熱勝於內則氣鬱而為腫也陽熱氣盛則腫脹也鼻塞窒塞而不通利也火主䐜膹腫脹故熱客陽明而鼻中䐜脹則窒塞也或謂寒主閉藏而鼻塞為傷風寒而然也殊不知由內熱甚外受風寒則熱鬱結不通故為窒塞而流清涕火熱亢極則反兼水化制之故也鼽鼻出清涕也蓋金熱極反化水液如心熱極而反汗出也衄為陽熱怫鬱於足陽明而上熱盛則血妄行為鼻衄也血溢血上出也心養於血故熱甚則血湧而妄行血泄為熱客下焦而大小便出血也淋小便澀痛也熱客膀胱鬱結不能滲泄故也閟大便澀滯也熱耗其液則糞堅結而大腸燥澀故也身熱惡寒此熱在表也邪熱在表而淺邪畏其正故病熱而反惡寒也如熱甚生癰腫瘡瘍而惡寒者亦由邪熱在於表也戰栗搖動也火之象也或言戰栗亦有寒者蓋寒栗亦由火甚似水實非寒也驚心卒動而不能也火在於動故心火熱甚也惑疑惑猶豫濁亂而志不一也象火參差而惑亂也志者腎水之神也悲肺金之志也金本燥能令燥者火也所以悲哭而五液俱出者火激動而兼水化也笑為心之志也喜極而笑者猶燔灼火喜而鳴笑之象也故病笑者火之甚也譫多言也言為心之聲猶火燔而聲鳴也故心熱則多言而不自知也妄虛妄也火為陽故外清明而內濁昧其手動亂故心火熱甚則腎水衰而志不精一虛妄見聞而自為問答則神志失常如見鬼神是也衄蔑血汗血出而汗濁也熱氣上甚則血溢亢極則燥而汗濁害承乃制則色黑而為紫也經曰陽勝則熱熱勝則腫陽勝則外熱陰虛則內熱內外皆熱則喘而渴故欲飲冷也陽盛則身熱腠理閉喘粗為之俯仰汗不出而熱齒乾以煩冤腹滿死能冬不能夏有四肢熱逢風寒如炙於火者是人陰氣虛陽氣盛當內爍也又曰人身非常熱熱而煩滿者陰氣少而陽氣勝故熱而煩滿也三陽之病發寒熱病熱而有所痛者是三陽之動也人數醉若能以入房氣聚於脾中不得散熱氣與穀氣相搏或熱盛於中故熱遍於身內熱而溺赤也夫酒氣盛而慓悍腎氣日衰陽氣獨勝故手足為之熱也評熱病論曰邪之所湊其氣必虛陰虛者陽必湊之故少氣時熱而汗出也小水黃者少腹中有熱也經有內熱外熱之異內經曰陰虛生內熱者因有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱陽盛則外熱者因上焦不通利則皮膚緻密腠理閉塞玄府不通衛氣不泄故外熱熱有在氣在血之分東垣曰晝則發熱夜則安靜是陽氣自旺於陽分也晝則安靜夜則發熱煩躁是陽氣下陷入陰中也名曰熱入血室晝則發熱煩躁夜亦然是重陽而無陰也當亟瀉其陽峻補其陰熱證病機不外三家之旨卒病發熱而惡寒者發於陽也其脈浮緊而澀為風寒客於榮衛六經傳變之異此皆自外而入故張仲景主於內經所言人之傷於寒也則為病熱此傷寒論之所由作也自外而入內熱者然也有所勞倦穀氣衰少脾氣下陷頭痛發熱其或發熱惡寒寒熱間作或蒸蒸燥熱發於肌肉之間始得之氣高而喘身熱而煩其脈洪大而頭痛或渴不止皮膚不仁風寒而生寒熱亦與傷寒相似此李明之主於內經勞倦形氣不足脾胃論之所由作也自內而之外熱者然也陽氣怫鬱為諸熱經云喘嘔吐酸暴注下迫轉筋反戾水液渾濁腹脹有聲鼓之如鼓鬱結轉甚而惡寒如戰栗驚駭之類此劉守真主於內經病機著為原病式非內非外專為鬱結積熱者然也積熱有漸董氏曰積熱者熱毒蘊內非一朝一夕之故也夫人之生也陰平陽祕神氣以寧而自無熱之可積蓋昧者徇情縱欲因致積熱皆出於心熱甚則傷血或有體氣素實一時感觸熱毒之氣鬱積臟腑之間或在心肺之內令人口苦咽乾涎唾稠黏眼澀多眵心氣通於舌脾氣通於口熱燥相合故口舌生瘡小便祕澀此積聚之熱非傷寒傷風之熱證也有嗜酒面煎炙雄附峻補皆能有熱謂之積熱有積溫成熱遂成前證不可不察王安道曰人之所賴以生者氣也氣者何陰陽是也夫陰與陽可以和而平可以乖而否善攝與否吉凶於是乎分不能善攝者故偏寒偏熱之病莫逃乎乖否之餘雖然寒也熱也粗工為之而弗難設積熱沉寒良工猶不能以為計且以積熱言之始而涼和次而寒取寒取不愈則因熱而從之從之不愈則技窮矣故王太僕曰益火之原以消陰翳壯水之主以制陽光又曰取心者不必齊以熱取腎者不必齊以寒此治積熱之本之論也內經曰身熱脈數或燥而不惡寒者疸瘧也瘧門一身盡痛發熱日晡所劇者此名風濕中濕門汗出而身熱者風也傷風門要略曰發熱身痛而身如熏黃者濕也疸證門發熱惡寒脈來浮數者瘟病也身熱頭痛自汗多眠陽脈浮滑陰脈弱風溫也傷寒門脈虛身熱得之傷暑暑門四肢發熱者或口舌燥而身熱咽乾蓋心生火大小腸主熱火熱來乘土位乃濕熱相合故煩躁悶亂也四肢者脾土也火乘之故四肢發熱也或身熱體重走注疼痛蓋濕熱相搏風熱鬱而不得伸也脈候內經曰粗大者陰不足陽有餘為熱中也諸浮不躁者在陽則為熱其有躁者在手岐伯曰脈至而從按之不鼓諸陽皆然王注云病熱而脈數按之不鼓乃寒盛格陽而致之非熱也形證是寒按之而脈氣鼓擊於指下盛者是為熱盛拒陰而生病非寒也平人氣象篇曰病熱而脈靜泄而脈大脫血而脈實病在中脈虛病在外脈澀堅者皆難治大奇論曰脈至而搏血衄身熱者死推而內之外而不內身有熱也脈經曰大熱病氣熱脈滿是謂重實尺寸脈俱虛是謂重虛脈經陰數多熱數為熱極數脈為虛為熱數洪熱煩脈來如懸鉤浮為熱滑數心下結熱盛緊而數寒熱俱作沉細滑疾者熱脈數盛滑緊者病在外熱脈沉而緊上焦有熱下寒寸口脈浮大而病者名曰陽中之陽病苦煩滿身熱頭痛腹中熱寸口脈實熱在脾肺數為吐為熱在胃口關脈滑數胃中有客熱緩而滑為熱中難經曰病熱之脈陰陽俱浮浮之滑沉之散澀發熱惡寒脈浮數者瘟病也身熱頭痛自汗多眠陽脈浮滑陰脈濡弱者風溫也活人書云中脘有痰令人憎寒壯熱惡風自汗寸口脈浮胸痞滿有類傷寒但頭不痛項不強為異熱病已得汗而脈尚躁盛此陰脈之極也死熱病不得汗而脈躁盛者此陽脈之極也死脈浮而澀澀而身有熱者死治法治熱有表裡之分病機機要曰有表而熱者謂之表熱無表而熱者謂之裡熱有暴熱而為熱者乃久不宣通而致也有服溫藥而為熱者有惡寒戰栗熱者及其治也小熱之氣涼以取之大熱之氣寒以取之甚熱之氣以汗發之發之不盡則逆制之制之不盡求其屬以衰之苦者治臟臟屬陰而居內辛者治腑腑屬陽而在外故內音下之外者發之又宜養血益陰其熱自愈治熱有補血補氣之宜東垣曰發熱惡熱大渴不止煩躁肌熱不欲近衣其脈洪大按之無力者或無目痛鼻乾者非白虎湯證也此血虛發躁當以當歸補血湯主之又有火鬱而熱者如不能食而熱自汗氣短者虛也以甘寒之劑瀉熱補氣非如能食而熱口舌乾燥大便難者以辛苦大寒之劑下之非瀉熱補水之比當細分之不可概論如言煩躁虛煩亦與實煩不同如傷寒煩者為真陽內郁陰中伏陽之證與陰虛燥熱病本亦異虛熱發汗之戒東垣曰仲景論內外不足發熱自汗之證大禁發汗若飲食勞倦雜病發熱身汗表虛之證認作有餘便用發汗則表益虛也五臟熱治心熱者微按至皮膚之下肌肉之上輕手乃得微按至皮毛之下熱少加力按之則全不熱是熱在血脈也其證心煩心痛掌中熱而噦以黃連瀉心湯導赤散實則瀉心湯虛則硃砂安神丸肺熱者輕手乃得微按全無日西熱甚乃皮毛之熱其證必見喘咳寒熱輕者瀉白散實則涼膈散虛則人參白虎湯肝熱者重按之肌肉之下至骨之上乃肝之熱當寅卯間尤甚其脈弦四肢滿悶便難轉筋多怒多驚四肢困熱筋痿不能起於床者瀉青丸實則柴胡飲子脾熱者輕手捫之不熱重按至筋骨又不熱不輕不重在輕手重手之間熱在肌肉過夜尤甚其證必怠情嗜臥四肢不收無氣以動瀉黃散實則調胃承氣湯虛則人參黃耆散腎熱者輕手重手俱不熱如重手按至骨分其蒸熱手如火其人骨蘇蘇如蟲蝕其骨困熱不任亦不能起於床實則滋腎丸本滋陰法也無實不可瀉氣實脈盛身熱煩擾宜三一承氣湯涼膈散等藥下之熱在中四順清涼飲在下八正之類夜熱多或有汗或鼻衄身熱而便難四物去芎加黃連生地地骨皮之類日熱多熱在氣分柴胡飲子白虎湯有輕手按之熱甚重手取之不甚熱此熱在肌表宜清之竹茹竹葉地骨皮麥門冬之類有神氣怫鬱而熱宜清神散熱在上而陰水不升陰火騰沸宜升陽瀉火法虛者補之初病陽證而失於下至變似陰而不可用白虎湯之類有食傷太陰而熱或停食而下之痰液不散鬱結成熱宜導開之因積滯而蓄熱當先損積而熱自退有丹毒熱腫氣鬱結滯並可解散隨證用藥此候欲發瘡毒分六淫治墜浮留之火須紫雪硃砂琥珀犀角之類陰虛精滑元氣脫者用滋陰藥燥者潤之方法見燥門有蓄血證者宜下之汗下後元氣虛而下陷陰陽之氣揭薄而不起為虛熱宜與來復丹靈砂丹之類汗下後脈燥身熱大渴飲水不已者先掘井泉取水飲之有鬱冒諸風為熱宜防風通聖散川芎石膏之類有肺燥鬱熱或火乘之者宜清之白虎湯加地骨皮元氣不足胃氣下陷為熱宜補中益氣湯血虛者加血藥從治藥使酒煎或濕熱為佐使反治蜜煎鳥頭之類其候欲發斑疹身熱者升麻湯之類發之丹溪治義陰虛發熱者難治飲酒人發熱難治手足心熱屬熱火鬱湯脈數而無力者便是陰虛也四物湯加炒黃柏黃芩龜板兼氣虛加人參黃耆黃芩白朮藥方通治諸經積熱之劑涼膈散治三焦六經積熱加黃連名清心湯黃連解毒湯治熱毒煩悶口燥呻吟蓄熱內甚諸不能退大金花丸治一切熱證中外諸熱寢汗咬牙睡語驚悸溺血淋祕衄血瘦弱頭痛骨蒸肺痿咳嗽去大黃加梔子名梔子金花丸神芎丸治心經積熱風痰壅滯頭目赤腫咽膈不利大小便閟澀一切風熱之證並宜服此黃芩湯治心肺蘊熱口瘡咽瘡膈悶小便不利瀉心湯治心經蘊熱茯苓散治心經實熱口乾煩渴眠臥不安瀉白散治肺熱瀉青丸治脾經鬱熱瀉黃散治脾經熱口臭咽乾上方並見火門人參瀉肺湯治肺經積熱上喘咳嗽胸膈脹滿痰多大便澀人參黃芩梔子仁枳殼炒薄荷甘草連翹杏仁去皮尖桑白皮大黃桔梗各等分每服七錢水二盞煎八分食後通口服天門冬散治肺壅腦熱鼻乾煩躁大便祕澀天門冬去心桑白皮升麻大黃枳殼麩炒甘草各八分荊芥一錢水二盞煎八分食後溫服半夏湯治膽腑實熱精神不守熱瀉病半夏曲黃芩軍薑炮遠志去心茯苓生地黃各八分黍米一合酸棗仁微炒研八分長流水二盞煎八分食後溫服赤茯苓湯治膀胱實熱小便不通口苦幹咽腫不利赤茯苓豬苓葵子枳實瞿麥木通黃芩車前子滑石甘草各等分水二盞薑三片煎八分食前服三黃湯治積熱結滯大便祕澀心膈煩躁黃連黃芩大黃煨各十兩上咀每服四錢水盞半煎八分空心服龍腦雞蘇丸除煩熱鬱熱肺熱咳嗽吐血鼻衄血崩下血熱脈消渴驚悸解酒毒膈熱口臭口瘡清心明目薄荷葉一兩六錢生地黃六錢麥門冬四錢蒲黃炒阿膠炒各二錢黃耆一錢人參木通各二錢銀柴胡同木通浸二日取汁入膏甘草錢半上為末用蜜三兩煉過後下地黃汁等藥熬成膏丸如梧桐子大每服二十丸嚼湯送下利膈散治脾肺有熱虛煩上壅咽喉生瘡雞蘇葉荊芥穗防風桔梗牛蒡子炒人參甘草各一兩上為末每服二錢不拘時沸湯點服咽痛口瘡甚加殭蠶一兩三黃丸治三焦積熱咽喉腫閉心膈煩躁小便赤澀大便祕結黃連黃芩大黃各十兩上為細末煉蜜為丸梧桐子大每服四十丸熱水送下既濟清神散益腎水降心火清上實下桔梗黃芩川芎山梔當歸羌活白朮茯苓各七分知母甘草薄荷各五分上水盞半煎七分入蜜二匙調勻服地黃煎治積熱地黃汗四升三合茯神知母各四兩葳蕤四兩栝蔞根生薑汁生地骨皮生麥冬汁白蜜各二升石膏八兩竹瀝三合上咀以水一斗二升先煮諸藥取汁三升去渣下竹瀝地黃麥門冬汁慢火煎四五沸下蜜薑汁微火煎至出六升初服四合日三服夜一服加至五七合四五月作散服之玄明粉治三焦邪熱臟腑祕澀方見製法備録篇香連丸治膈熱並大腸熱解酒毒厚腸胃方見痢疾門良方碧雪治一切積熱咽喉口舌生瘡心中煩躁咽物妨悶或咽閉壅塞及天行時熱發強昏憒芒硝朴硝硝石馬牙硝青黛石膏煅飛過寒水石水研飛甘草各等分上將甘草煎湯二升去渣卻入諸藥再煎用柳木篦不住手攪令消溶得所卻入青黛和勻傾入砂盆內候冷結凝成霜研為細末每用少許含化津咽不拘時候如覺喉壅閉塞不能吞物者即以小竹筒吹藥入喉中即愈頻吹之消毒犀角飲治大人小兒內蘊邪熱痰涎壅盛腮項結核口舌生瘡遍生瘡癤已潰未潰並宜服之犀角磨汁防風各一錢鼠黏子炒二錢荊芥穗一錢甘草炙錢水二盞煎一盞食後溫服解表熱劑人參敗毒散參蘇飲葛根解肌湯九味羌活湯以上方通治傷風傷寒發熱解肌方見傷寒門河間六神通解散治發熱頭痛身熱脈洪無汗麻黃一錢甘草一錢黃芩蒼朮各一錢石膏滑石各錢半水二盞薑蔥同煎一盞溫服攻裡熱諸劑大金花丸方見火門調胃承氣湯三一承氣湯方見傷寒門當歸承氣湯治燥熱裡熱鬱熱為病或皮膚枯燥咽乾鼻乾或便溺結祕俱效當歸大黃各三錢芒硝甘草各一錢水二盞薑一片煎服宣明四生丸治一切積熱痰熱風祕積熱常服順肌膚耐老大黃牽牛各一兩芒硝五錢皂角六錢上為末丸梧桐子大每服三十丸食後白湯下袖珍積熱金花丸治三焦積熱煩躁臟腑祕結大黃一兩牽牛五錢上為末薄荷湯丸梧桐子大每服五十丸食後白湯下八正散治熱臟腑膀胱熱痛淋澀不通方見淋濁門兼退表裡熱諸劑宣明雙解散小柴胡湯大柴胡湯防風通聖散方並見傷寒門柴胡飲子治一切積熱肌骨蒸熱往來寒熱及傷寒發熱汗不解骨蒸肺痿喘嗽婦人余疾經水不通皆治柴胡人參黃芩甘草當歸芍藥大黃各等分上咀每服七錢水二盞煎一盞食後服防風當歸飲子治脾腎真陰虛損肝心風熱鬱甚陽盛陰衰一切虛熱壅滯悉能宣通氣血調順飲食防風當歸柴胡大黃各一錢人參黃芩芍藥滑石甘草各七分水二盞薑三片煎八分食後服洗心散治風熱痰滯心經積熱口苦唇燥眼澀大便澀小便赤當歸芍藥白朮各一錢防風荊芥麻黃大黃甘草各七分水二盞薑三片煎八分不拘時溫服清氣分熱劑人參白虎湯方見傷寒門清心蓮子飲方見淋症門良方清氣散治風熱壅盛上膈煩悶川芎羌活柴胡前胡茯苓各八分人參獨活青皮白朮枳殼甘草各七分上水二盞薑三片煎八分溫服涼血分熱劑元戎四物二連湯治血虛虛勞發熱五心煩熱晝則了明夜則發熱當歸生地黃白芍藥各一錢川芎黃連胡黃連各八分水盞半加薑煎宣明四順清涼飲子治血熱壅實面赤蘊結煩悶大黃蒸赤芍藥當歸甘草各一錢水盞半煎八分食後通口服清鎮安神劑硃砂安神丸方見驚悸門至寶丹方見中風門牛黃膏治熱入血室發狂心熱不認人者牛黃一錢硃砂鬱金各三錢腦子五分甘草牡丹皮各二錢上為末煉蜜丸皂角子大新汲水化下內傷虛熱劑東垣補中益氣湯方見內傷門治內虛脾胃下陷食不知味五心煩熱升陽益胃湯同上十全大補丸方見虛門滋陰退熱劑東垣滋腎丸方見火門補陰丸六味地黃丸治腎虛發熱新久憔悴骨蒸盜汗五臟不足黃瘦脫血三方並見虛損門黃連香薷飲治暑熱方見暑門七情鬱結而熱者火鬱湯方見暑門衛生易簡方聖惠方治熱煩滿悶不能食用豨蘞草生搗汁服三四合效一方治心經留熱煩躁用梨汁頓服一碗即止一方治發熱口乾小便澀用甘蔗搗汁飲之一方治熱毒用雞蛋清三個蜜一合和服之愈一方治五臟伏熱如火煩悶而煩用凝水石為末極細每服挑一錢水調下橫理者為凝水石順理者為寒水石食醫心鏡治熱攻心煩躁恍惚牛蒡根搗汁一升食後分三服一方治時熱毒心神煩躁用藍靛一匙以新汲水一盞調服一方治胸中燥熱或渴而躁用葛粉四兩先以粟米半升水浸一宿漉去濕拌勻煮粥食之一方治諸熱用六月雪煎湯日三服
