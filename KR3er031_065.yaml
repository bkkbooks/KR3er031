body:
  text: 卷之六十五咽喉門病機咽喉敘論內經曰一陰一陽結謂之喉痹一陰是厥陰風木一陽是少陽相火風火結郁咽喉不散則成痹矣又曰咽喉者水穀之道也喉嚨者氣之所以上下者也會厭者音聲之戶也足之少陰上繫於舌絡於橫骨終於會厭兩瀉其血脈濁氣乃闢原病式曰喉痹不仁也俗作閉猶閉塞也火主腫脹故熱客上焦而咽嗌腫脹也李東垣曰火與元氣不兩立一勝則一負蓋元氣一虛則相火隨起而喉等異病作矣咽喉之與會厭內經謂之吸門咽以納氣喉以納食會厭管乎其上以司開闔掩其食下不掩之則喉錯必舌抵上齶則會厭能閉其咽通主飲食司呼吸升降為人身之橐籥緊關之門戶也若夫卒然漿水不入言語不通死在須臾誠可驚駭俗謂雙乳蛾單乳蛾古方通謂之喉痹皆相火沖逆耳咽喉一十八證皆是火熱成之張子和曰咽喉諸病一言可了者相火是也學者各詳其狀別名一十八證一曰單乳蛾其形圓如小箸頭生於咽喉關上或左或右生於關下者難治二曰雙乳蛾其形亦如箸頭大生兩個在喉關兩邊生關下者亦難治三曰蟬舌風又名子舌自舌下再生今人謂之重舌是四曰牙蜞風牙齦上腫盛聚毒成瘡者是也五曰木舌風其形腫大如木不能轉動是也六曰舌黃舌上腫痛色黃者是也七曰咬牙噤口風其狀牙盡作胃口噤不開是也八曰魚口風如魚吸水者不治九曰聚毒塞喉風喉關聚毒涎唾稠黏咯吐難出十曰懸蜞蠱毒風一喉腫食而不能咽水外形腫如雞卵者是也十一曰搶食風又名飛絲毒口中因食肥膩膾炙之惡物發泡十二曰獵頰風其證牙床痛連腮頰俱腫是也十三曰纏喉風風自頤邊過頭下赤色發寒熱者危十四曰松子風口內滿喉赤如豬肝張口吞物則氣逆飲食不能喉響者難治十五曰崩砂脫口風上下齦舌下腫赤口內作臖如陽熱甚者牙根爛齒脫十六曰連珠風舌下起泡一個須臾又起一個或連起五七個如貫珠者十七曰蜂子毒或在腮臉洋爛或在喉關舌不作臖其色黃如蜂十八曰走注瘰癧風其狀頸項結核皮膚亦腫惡寒發熱狀若傷寒是也此十八證外有喉痹暴發暴死者名曰走馬喉風又曰鎖喉風雖其名狀不同要皆熱甚生風風火急變自然疾速故暴發而暴死也尸咽谷賊懸癰三者為咽喉之急證十八證之外又有尸咽證此為陰陽不和脾肺壅盛風熱毒氣不能宣通故令尸蟲發動上蝕於喉或癢或痛如𧈟之候也谷賊者稻芒強澀藏於米而誤食之滯於咽間不能傳化故風熱並聚與血氣搏遂令腫刺如咽嗌之生谷刺也有齶積聚毒腫謂之懸癰甚有腫大塞咽不能下食是亦咽喉急證若不速治皆能殺人抑亦暴疾熱氣使之然也學者不可不知喉痹之病屬痰屬火屬風三者而已喉為飲食之關所繫病喉痹多起飲酒太過辛辣肥甘之毒鬱積壅滯為痰生熱熱生風嘔吐咯咳傷咽系枯稿飲食不下甚者痰塞不通聲而速死故曰鎖喉傷寒熱病喉痹治各不同龐氏曰經云伏氣之病古方謂之腎傷寒謂非時有暴寒中人伏毒氣於少陰經始初不病旬月乃發脈微弱法當以傷寒治非喉痹之病也次必下利一種天行時瘟咽痛項腫名曰蝦蟆瘟又名鸕鷀瘟此證亦甚凶惡十不救一二凡此宜於各類求之東垣有普濟消毒飲治瘟喉痹百發百中速效陰證下虛亦令喉痹經曰陰病極有虛火喉痹此多不治治法即蜜附子是也脈侯兩寸脈浮洪而溢者喉痹脈微而伏者不治喉痹脈沉者為陰浮者為陽右手關上脈陰陽俱實者是喉痹之候也亦令人壯熱而惡寒七八日不治則死治法治喉痹大概降火清痰子和云喉痹病大概痰火所致急者宜吐痰後復下之上下分消而愈又甚者以針刺去血然後用藥吐下此為治之上策若人畏委曲旁求瞬息喪命治喉痹之火與救火同不容少待內經云火鬱發之發散也故云吐中有發散之義出血者亦發散之端也治斯疾者毋執緩方小方而藥之曰吾藥乃王道不動臟腑又如於出血若幸遇疾之輕者而獲愈疾之重者循死矣豈非誤殺也耶吐法治喉痹最效凡喉痹甚者重者宜用吐法或用桐油或燈油腳以鵝翎探吐之輕者用新取園中李實根煎湯噙之更研爛敷頂上本草有云李實根治喉痹或用射干搗逆流水吐之纏喉急證皆屬痰熱又宜探吐之白礬膽礬吹入喉中吐痰極速喉痹微者以痠軟之甚者以辛散之痰結者吐之甚而急者砭出血之人火以涼治之龍火以火逐之涼劑熱服是也治案醫説一人攜二僕入京其一忽患喉風脹滿氣塞不通命在須臾詢諸郡人云有李家世醫喉痹即令僕往就醫李駭曰證候甚危猶幸來此不然即死何疑乃於笥中取一紙捻用火點著才煙起吹滅之令僕張口刺於喉間俄吐出紫血半合即時氣寬能言及啖粥飲摻藥敷之立愈其人神其藥竊訪其祕蓋預以巴豆油塗紙故施火即著藉其毒氣徑赴病處一人患咽喉腫痛下食不得身熱頭疼大便不通衆醫之論紛然皆以為熱當服涼藥一善醫云脈緊數是感寒所致衆醫不從善醫者曰我有法驗得寒熱室中生火用炒蔥湯淋浴若是熱病則此暖處必有汗而咽喉痛不減若是感寒雖浴無汗患者信其言遂入浴洗而無汗就浴室中服麻黃湯一服須臾大汗出大便通即時無事衆醫服其神凡辨熱病感寒用此法最妙張子和治一男子纏喉風表裡皆作藥不能下豫以涼藥灌入鼻中下十餘行外以拔毒散敷陽起石燒赤與伏龍肝等分為末新水掃百遍三日熱始退腫消一貴婦人喉痹蓋龍火也須用涼劑而不可冷服為龍宜以火逐之人火者烹飪之火是也乃是暴烈是至令於高堂之上侍婢攜火爐坐藥銚於上使藥常微熱不至大沸適口時時呷之百餘次龍火自散此法以熱行寒不為熱病扞格故也咽喉痛以甘桔湯為主加荊芥穗薄荷葉當歸溫漱服更宜刺少商穴出血喉乾燥痛甘桔四物湯加荊芥知柏黃芩枳殼喉瘡咽痛屬虛火遊行無制人參黃柏蜜炙荊芥穗實熱用黃連荊芥薄荷硝石蜜薑汁丸噙化虛火用人參竹葉竹瀝血虛加四物湯服之喉痹心腹腰脅痛者多難治喉痹用馬藺草葉入香油少許杵汁點喉中即退喉痹用消梨汁頻頻飲之如患人自能嚼咽亦可此物大解熱毒南方梨少之處以好蘿蔔杵汁加入玄明粉飲之有效谷賊喉中癢刺欲嗽名曰谷賊此因誤吞谷芒刺在咽而癢癢痛痛凡谷賊屬咽馬喉風屬喉不可不分辨用芝麻炒為末細細呷咽之藥方通治喉痹劑和劑甘桔湯治一切風熱上壅咽喉腫痛吞吐如有所礙甘草二錢桔梗四錢加荊芥穗三錢尤效速上咀作一服水二盞煎八分食後服拔萃甘桔湯治熱腫喉痹桔梗甘草薄荷梔子連翹黃芩各等分上咀每服六錢加竹葉煎服淡寮牛蒡子湯治風熱上壅咽喉腫痛或生乳蛾牛莠子研玄參升麻桔梗犀角黃芩木通甘草上咀等分每服半兩入薑一片水煎服局方龍腦雞蘇丸治上焦熱咽腫嗌痛方見熱門涼膈散方治同上三因玉鑰匙治風熱喉痹及纏喉風焰硝兩半硼砂兩半冰片一字白殭蠶一錢上研每用五分竹管吹入喉中立愈或加雄黃二錢名金鑰匙良方如聖湯治咽喉有痰咽物作痛及嗽咯唾血氣促並小兒瘡疹毒攻咽喉腫痛麥門冬半兩牛蒡子炒桔梗生甘草各一兩上為細末沸湯調細細服入竹葉煎尤妙山豆根湯治熱喉痹山豆根升麻射干各等分上咀每服三錢水二盞煎七分去渣通口時時呷之祕方奪命散治急喉風白礬枯殭蠶炒硼砂皂角炙去皮弦各等分上為細末每用少許吹喉中痰出即愈祕方三黃丸治喉痹絶妙大黃黃芩黃連各二兩黃藥子白藥子各兩半山豆根黃柏苦參各一兩硼砂京墨各三錢冰片一錢麝香少許上為細末豬膽調甑內蒸二次後入片麝硼砂為丸豆大噙化津咽日夜常噙不止藥味妙三因解毒雄黃丸治纏喉風及上膈熱壅痰涎不利咽喉腫痛雄黃鬱金各二分半巴豆去皮油一粒上為末醋糊丸緑豆大每服七丸茶清下吐出頑痛即愈三因如聖散治風痰壅盛咽喉腫痛水穀不下牙關緊急雄黃乳細枯白礬藜蘆厚者去皮心不可生用豬牙皂角去皮炙黃為末用一字吹入鼻內吐痰為愈濟生二聖散治纏喉風急喉痹膽礬二錢半白殭蠶炒浮半兩為細末以少許吹入喉中濟生治急喉痹白明礬三錢巴豆二個去殼作六瓣以礬於銚內慢火熬化為水置巴豆於內候乾去巴豆取礬研為末每用少許吹入喉中立愈本事利膈湯治脾肺有熱虛煩上壅咽喉瘡腫薄荷葉荊芥穗防風桔梗人參牛蒡子甘草各等分上咀每服半兩食後水煎服御藥碧玉丸治心肺積熱上攻咽喉腫痛閉塞水漿不下重舌木舌喉瘡口瘡並宜服之青黛盆硝蒲黃甘草末各一兩上為末以砂糖每兩作五十丸每服一丸噙化或用干藥末吹入喉內亦可加硼砂為末名碧雪良方清心利膈湯治咽喉腫痛痰涎壅盛防風荊芥薄荷桔梗黃芩黃連各錢半山梔連翹各一錢玄參大黃朴硝牛蒡子甘草各七分上作一服水二盞煎一盞食遠服良方玄參散治懸癰喉痛不可忍玄參升麻射干大黃各一錢半甘草一錢作一服水二盞煎一盞不拘時徐徐服上清丸治口舌生瘡咽喉腫痛止嗽清音潤肺寬膈化氣極效蘇州薄荷葉一斤百藥煎半斤砂仁一兩硼砂二兩冰片二錢桔梗一兩甘草玄明粉訶子各半兩為極細末煉蜜丸如芡實子大每服一丸臨睡噙化或為小丸茶清送下亦可玄霜治喉痹薄荷梗燒存性末四兩硼砂盆硝膽礬各二錢上為末以油二三點入水上調點患處良方奪命無憂散治纏喉風咽喉腫痛口舌生瘡心腹脹滿脾積症塊小兒奶癖誤吞骨屑哽塞不下熱盛喉痹氣急悶亂寒水石三兩煅玄參管仲砂仁滑石飛黃連茯苓山豆根荊芥穗甘草炙各兩半硼砂三錢上為細末每服一錢乾摻舌上後以新水咽下不拘時任是百毒硬物可以除化如吃著杏仁巴豆辛辣薑桂胡椒燥毒蔥韭蒜等物及諸藥毒火毒亦可用此藥能潤三焦去三尸殺八邪除九蟲趕瘟疫一切要疾其效如神龍腦丸治咽喉連頰頷腫日數深遠咽津液痛發渴龍腦研升麻黃耆馬牙硝大黃銼石膏麝香研甘草各等分玄明粉研三分生地黃二兩絞取汁上除地黃汁外研為細末以地黃汁和如干更入煉蜜少許為丸小彈子大每用一丸以綿裹含化咽津日三四次不拘時牛膽膏治鎖喉風青黛一錢殭蠶半兩炒朴硝一兩研甘草二錢半生用上為細末用臘月黃牛膽入藥在內當風挂百日取出再入研麝香少許同研細末每服五分用井花水調服或吹入喉中聖惠硼砂散治咽喉瘡腫閉塞不通硼砂殭蠶百藥煎川芎各三錢山豆根盆硝薄荷紫河車各半兩青黛一錢上為末用五分吹入喉中水調亦可局方如聖勝金錠治咽喉急閉雙單乳蛾重舌木舌並皆治之硫黃研川芎臘茶薄荷葉川烏炮硝石研生地黃各二兩上為末取生蔥汁搜和為錠子每服先用新汲水灌漱次嚼生薄荷葉五七片卻用藥一錠同嚼極爛以井水咽下甚者連進三服外以一錠安患處其病隨藥便消醫林祛毒牛黃丸治咽喉腫痛舌本強硬口內生瘡胸膈不利牛黃三錢硼砂桔梗生地黃犀角屑人參琥珀研各半兩寒水石煅去火毒二兩鉛白霜冰片雄黃各一兩蛤粉飛四兩玄參升麻各三錢硃砂研七錢上為細末研勻煉蜜丸彈子大金箔為衣瓷罐收貯每服一丸濃煎薄花湯化下或新汲水下日進三服噙化亦可麝香硃砂丸治咽喉腫痛閉塞不通舌根脹痛或生瘡癤麝香二錢硃砂二兩半硼砂三兩寒水石煆四兩馬牙硝鉛白霜片腦各三錢甘草上為末甘草膏和丸梧桐子大硃砂為衣不拘時噙化二丸七寶散治喉痹及纏喉風直殭蠶十個硼砂雄黃全蠍全者十個去毒明礬豬牙皂角炙去子弦皮各一錢膽礬五分上為細末每用一字吹入喉中即愈防風散治咽喉疼痛虛者少用實者多用防風一兩羌活殭蠶大藥子蜜炙硼砂荊芥黃藥子大黃濕紙包煨令香熟細辛川芎紅內消山豆根鬱金甘草以上各半兩牙硝三錢蘇州薄荷半斤上為細末研薄荷汁同蜜少許調每服一匙不拘時服醫林透天一塊水治一切風熱喉痹口舌生瘡頭目不清痰涎壅盛黃連一錢冰片硼砂薄荷葉檳榔蒲黃甘草各錢荊芥穗黃柏各五分白砂糖半兩上為細末煉蜜為丸如芡實大每服一丸噙化消毒犀角飲子治內蘊邪熱咽膈不利腮項腫痛結核風疹痹毒荊芥四錢防風一錢甘草二錢牛蒡子一錢上作一服水二盞煎八分食遠服東垣通關飲治喉痹腫痛不能言但可進藥無不愈此從治之法也人參白朮茯苓各一錢炙甘草錢半桔梗二錢防風七分荊芥薄荷乾薑炮或加熟附子各五分水二盞煎七分徐徐與之三因蜜附子治腑寒咽閉吞吐不通大附子一個去皮臍切作大片蜜塗炙令黃以口含之咽津甘味盡再塗蜜炙用祕方立效散治喉痹卒不能言水漿不入白礬為末淨朴硝為末各五分土牛膝根洗淨搗汁半盞入二末和勾咽嗽吐出有物即隨汁出可以開喉二三次愈通關散治咽喉腫痛水穀不下青鹽三錢枯礬二錢硇砂一錢上為末以藥少許吹入喉內有涎吐出一二次腫立消一提金治咽喉腫痛老黃瓜一條去子用好皮硝填滿陰乾為末每用少許吹入喉內即愈經驗冰梅丸治十八種喉痹俱效大南星二十五個鮮者大半夏二十五個鮮者桔梗二兩各切片皂角炙丟皮弦食鹽白礬防風朴硝各四兩七分黃熟大梅子一百個先將硝鹽水浸一周時然後將各藥研細入水拌勻以梅置水浸過三指為度七日取出曬乾又浸又曬候藥水盡為度將梅子入瓷罐中密封如霜衣起尤妙要用時以薄綿裹之噙在口內咽津液徐徐下痰出為愈經驗青梅煎五月五日製治喉痹青梅二十個五月初一用鹽十兩醃至初五取梅汁和藥白芷羌活防風桔梗各二兩明礬三兩豬牙皂角三十條上為細末以梅汁拌和勾用瓷罐收貯如前法噙之易簡諸方肘後方治喉痹腫痛臘月豬膽一枚入白礬末令滿吊於無煙處干為末吹入喉效又方山豆根清水浸少頃口含咽苦水愈又方用鴨嘴膽礬入青魚膽內陰乾為末吹入喉中便宜方治喉痹用豆豉煮汁含咽一方以黃荊葉絞取汁含服一方治急喉風牙關緊閉以巴豆去殼紙包去油在紙上捻作紙捻點火吹滅以煙燻入鼻中即時口鼻流涎牙關遂開外臺祕要治走馬喉痹並毒氣壅塞用桔梗二兩去蘆頭淨銼咀以水四盞煎至一盞去渣不拘時分二服效一方用枯礬和鹽研末以箸頭點入喉乾摻懸癰腫痛處良靈苑方治急喉痹逡巡不救用皂角去皮子生用半兩為末以筋頭點少許於痛處更以醋調藥敷項下須臾便破血出愈又方治喉痹並毒氣以生薑二升搗取汁一升入好蜜五合慢火熬至八分每服一合日三五次集驗方治纏喉風及喉痹走馬牙疳用蠶蛻紙不拘多少燒存性為末煉蜜丸芡實大無時含化一丸咽津效牙宣者揩牙上又方治喉中乳蛾用大鮮魚膽汁搜和官粉藏之每用少許箸頭點喉中蛾即退又方治纏喉風以生白礬研細末冷水調下二錢又方治喉項腫不下食以生韭細搗敷項上效本草方治喉痹初起腫痛用硼砂含咽津效又方治熱痰喉痹用蘿蔔汁和皂角漿水飲吐之愈針灸法喉痹內經灸刺有二今以經脈所過咽喉取之驗者及他病相干而致喉痹取之者通有六經也喉前痛取手足陽明脈喉痹不能言取足陽明曰足陽明胃脈從人迎前下人迎附喉嚨所生病者頭腫喉痹視盛虛寒熱陷下取之又曰足陽明之別名曰豐隆去踝八寸別走太陰其病氣逆則喉痹卒喑取之所別也喉痹能言取手陽明經曰大腸手陽明脈所生病者喉痹視盛虛寒熱陷下取之喉痹取手少陽經曰三焦手少陽之脈上項系耳後是動則病咽腫喉痹視盛虛寒熱陷下取之又云邪客於少陽之絡令人喉痹刺手中指次指爪甲去指端如韭葉壯者立已老者有頃已左取右右取左肝足厥陰之脈循喉嚨之後故喉之後痛者取之纍驗也腎足少陰之脈上貫肝膈循喉嚨竇漢卿謂必準者取照海治喉中之痹塞是也些二經脈所過咽喉之地者也太陵穴因他病相干致喉痹者取之經云心咳之狀喉中介介梗狀甚則咽腫喉痹取心之俞則太陵是也喉痛取足少陰腎經曰腎足少陰之脈所生病者咽腫上氣嗌乾舌痛又云嗌中痛不能納唾時不能出唾者刺然谷之前出血立已左刺右右刺左嗌痛取手太陽小腸經云小腸手太陽之脈是動則病嗌痛頷腫視虛實寒熱陷下取之也天柱天突上穴並治喉腫喉痛不能言三間治喉痹咽如梗行間治喉痹氣逆咽如扼狀少産治喉痹三稜針剌出血立愈其穴在兩手大指內側去爪甲角如韭合谷治喉痹針五分立愈陽谷手大指甲後第一節或灸三狂或刺出血治喉痹男灸左女灸右導引法治喉痹就令患人將手大拇指第二節屈蜷急令張口勤勤堅咬其氣通暢血絲自散腫亦消矣諸物哽喉陳無擇云治哽之法皆以類從如顱鷀豺獺治魚骨哽磁石治針鐵哽發灰治發哽貍虎治諸骨哽亦各從其類也治哽用吐法最妙凡物哽者蓋以食入喉而物不順致物刺住而不能下推之以理反而上出則為順焉為治者即當湧吐乘其飲食之出而上送此其順而易為如拔刺之法也若刺之深者必欲推下非惟理勢不能延遲日久則咽喉漸腫其刺愈深腹中飲食消盡雖欲湧吐而無推送之物矣欲食而不能下如此因循多致不救骨哽諸方一方治骨哽不得出砂仁甘草為末綿裹含徐徐咽津久隨痰出古今祕驗方治骨哽橫喉中六七日不出取鯉魚鱗皮燒為末以水調之即出末出再服一方治魚骨哽小嚼韭白令柔以細繩系口中吞韭到哽處引之哽骨即隨出驗一方治魚骨哽用水一盞自默從左眼睛於水中書龍字服之不過二盞則下小兒遇哽大人如前書水中服之妙一方用山栗紅果獨根向下者取來與玉簪花根同搗自然汁用竹管灌入喉中不可著牙著牙則牙化山栗果則山楂是也一方誤食魚骨久而不出以皂角末吹入鼻中得嚏而哽出陳氏方治雞骨哽以雞汁化哽藥下或食餳糖一大塊滿吞下又方用貍骨燒灰調下少許效一方治魚刺哽用獺爪爬喉嚨下其骨自下或用獺骨含口中即下有用金鳳花子嚼爛噙下無子用根搗爛絞汁下一法用魚骨頂在頭上咳聲則出又法用本魚骨左右手反覆擲背後立出外臺祕要治魚骨哽口念鸕鷀七遍用水嗌下又方用萱草根搗取汁吞之立下又方用薔薇根為末水調方寸匕又方治諸骨哽以野苧根搗爛如泥用龍眼肉大化下如被雞骨哽者以雞羹化下如魚骨哽者以魚羹化下又方用楮實子搗汁服衍義方治魚骨哽用橄欖味澀食久味甘嚼汁咽下斗門方治骨哽用鹿角為末含咽津下又方治發哽用舊木梳燒灰酒調下丹溪方食魚骨下肚內刺痛煎吳茱萸湯一盞飲之骨軟而出或用好米醋飲半盞亦軟而痛止一方治誤食麥芒刺入喉中將鵝倒提口流涎以碗盛之飲少許即隨涎而下一方治蔑刺入喉用多年竹籬棍急流水煎湯服錢哽諸方山居溪食吞銅錢在喉用生茨菰搗汁呷飲外臺方治誤吞錢並金銀物在喉以胡粉一兩搗硝石少許服作二服如吞金銀在腹中服此俱消下又方治錢哽艾一把水五升煎一升頓服便下錢氏方治誤吞錢百部根四兩酒一升浸一宿溫服一升葛氏方洽誤吞叉取韭黃曬令萎黃煮熟勿切食一大束即下一方治魚骨竹木等物哽咽不下用象牙屑為末水調一錢服符咒法道藏經咒法咒曰吾請老君東流順水老君奉敕攝攝攝法毒水吾託大帝尊不到稱吾者各各現帝身急急如律令奉敕攝一氣念遍又以左手屈中指無名指作三山印上坐淨水一碗右手掐卯文作金槍印左手在下右手在上左手象地右手象天虛挽虛車九次為定左足橫右足堅作丁字立如法作望日月燈火取氣一口吹在盞內此法百無禁忌用法之時以正神氣是也神方咒法治骨哽急無藥處用新汲水一盞咒曰吾順東流豈毒業一氣念七遍急急如律令攝望日月燈光收氣吹入水中令患人大吃三口水須臾即下九龍入洞法左手掐三山訣捧淨水一盞向東右手掐劍訣寫雲龍鬼三字於水內念咒云此盞化為東洋大海咽喉化作萬丈深潭九龍入洞之法吾奉太上老君急急如律令敕吞法水一口哽隨化令人每用寸長竿竹九節置口中如法吞若無物凡治哽所傷之物下咽不可便與米湯米飯吃恐米粒入瘡口中且吃羹數日為羹前咒能治一切諸物諸骨並絲絲髮纏喉不下內經曰不因氣動而生病於外者用藏經咒法治之是也治案醫説一兒誤吞釣魚鉤在喉諸醫不能措手一人偶見吞鉤雖在喉鉤線幸在外遂以意療用數珠子穿在鉤線上逐個送喉中以數珠底鉤頂其利嘴一掣而鉤上出遂獲安此亦意見也子和治一兄誤吞錢在喉不下諸醫不能取戴人思得一策以淨白表紙卷實如箸以刀從橫亂割其端用作鬅鬙之狀又別取一箸縛針鉤於其端令不可脫先下咽中輕提輕抑一探之覺鉤入其錢竅然後以紙卷納之咽中與鈞尖相底一掣而出
