body:
  text: 卷之六十疝氣門病機內經敘論內經曰任脈為病男子內結七疝女子帶下瘕聚又曰肝脈大急沉皆為疝又曰小腹控睪引腰脊上衝心唾出清水及為噦噫甚則入心善忘善悲甲乙經曰邪在小腹也小腸病者小腹痛引腰脊貫肝肺其經虛不足則風冷乘間而入邪氣既入則上衝肝肺客冷散於胸結於臍控引睪丸上而不下痛而入腹甚則衝於心胸蓋其經絡所繫屬也啓玄子曰控引也睪丸陰丸也靈樞經曰邪在小腸連睪系屬腎貫肝絡肺繫心氣盛厥氣上衝也又曰疝㿗者陰連小腹急痛也巢氏病源云諸疝者陰氣積於內復為寒氣所加使榮衛不調氣血虛弱故風冷入其腹內而成疝也疝者痛也或少腹痛不得大小便或手足厥冷繞臍痛自汗或冷氣逆上搶心腹令心痛或裡急而腹痛此諸候非一故云諸疝也難經曰任之為病其內苦結男子為七疝原病式曰㿗疝少腹控卵腫急絞痛也寒主拘縮故也寒極而土化制之故腫滿也經言丈夫㿗疝謂陰氣連小腹急痛也故言婦人少腹腫皆足厥陰之脈也經注曰寒氣聚而為疝也疝病有寒有熱經曰三陽為病發寒熱下為壅腫及為痿厥腨㾓其傳為索澤其傳為㿗疝夫熱在外寒在內則纍垂此九夏之氣也寒在外熱在內則卵縮此三冬之氣也足太陽膀胱之脈逆上迎手太陽小腸之脈下行至足厥陰肝之脈不得伸其任脈並厥陰之脈逆則如巨川之水致陽氣下墜是風寒濕熱下出囊中致而睪腫大謂之曰疝大甚則為㿗足厥陰肝之木與太陽膀胱寒水之脈同至前陰之末傷寒家說足厥陰肝經為病煩滿囊縮急下之宜大承氣湯以瀉大熱玉機微義云以平康不病之人論之夏暑大熱囊卵纍垂冬天大寒急縮收上與前三說若不同也乖耶否耶答曰傷寒家囊卵縮大熱在內宜承氣湯急下之與經筋說囊卵縮大寒在外亦是熱在內與傷寒家同故再引平康之人以證之冬天陽氣在內陰氣在外人亦應之故寒在外則皮急皮急則囊縮夏月陰氣在內陽氣在外人亦應之故熱在外則皮緩皮緩則囊垂此㿗疝之象也三文殊皆一理也原病式云㿗疝少腹控卵腫急絞痛也寒主拘縮故也寒極而土化制之故腫滿也經言丈夫㿗疝謂陰器連少腹急痛也故言婦人少腹腫皆足厥陰肝之脈也經注曰寒氣聚而為疝也又按經言五臟皆主疝但脈急也注言脈急者寒之象也然寒則脈當短小而遲今言急者非急數而洪也斯從寒也如疝脈緊急洪數則為熱痛經言脾傳之腎病名曰疝瘕少腹煩冤而痛出白蠱注言少腹痛溲出白液也一作客熱內結銷爍脂肉如蠱之食故名曰蠱也然經之復言熱為疝瘕則亦不止言為寒當以脈證辨之南方疝氣屬濕熱者多丹溪曰疝痛甚者睪丸連小腹急痛也或有形或無形或有聲或無聲自素問以下皆以為寒蓋經絡得寒收引不行所以作痛世有得寒而無疝者又必有說以通之可也亦有踢冰涉溺不病疝者以其素無熱也因而思之疝病始於濕熱在經遏至久又感外寒濕熱收鬱而作痛若只作寒論恐有未備或曰此證多客厥陰一經濕熱之積何由而致曰夫勞則火起於筋醉飽則火起於胃房勞則火起於腎大怒則火起於本經火鬱之久濕氣便成濁液凝聚併入血隧流於厥陰肝屬木惟速急火性暴為寒束宜其痛甚而暴也古方以烏頭梔子等分作湯用其效亦速後因此方隨形證加減無有不應又須分濕熱多少而治之但腫多為濕㿗是也卻有水氣而腫又有挾虛而發者當以參朮為君而佐以疏導診其脈沉緊而豁大是也若不以補瀉兼施但行決裂之法禍不旋踵辨疑録云每見男子小腸疝氣痛不可忍陰曩腫大或偏墜一邊發作之時小腸捫之聲如青蛙狀如桃李木瓜衝上則面黑墜下則仆地病者不勝痛苦諸醫治療莫測其機有云疝本肝經與腎經絶無相干恐為未備之說原夫疝氣肝經屬本心腎屬標疝者多濕熱怒氣傷肝房勞過傷心腎胞絡鬱結小腸皮裡膜外氣聚而無出以致如斯或曰以心腎為標今以房勞過傷是獨言其腎也譬如小兒偏墜無房勞斯疾何由而作也曰小兒因稟父母濕熱氣鬱小腸而成遍墜皆不作疼痛至於中房勞過度戕其真氣胞絡氣虛腎邪衝上往來疼痛故發作無度今世俗作寒氣或作鬱結而治每用香燥及用大黃牽牛巴霜利其大便元氣轉傷而病愈甚余考小腸多氣少血之經心氣鬱結則腑受邪肝氣一盛則子亦盛矣故二氣攻入小腸膀胱而痛病者但手捫之可忍殊不知皮膜漸寬其氣愈熾服藥不能避忌年遠根深故難治救每用五苓散內加行氣之藥獲效者多不利小便出邪愈者鮮矣按藥性豬苓澤瀉分理陰陽以和心與小腸之氣白朮調脾並利臍腰間濕及死血茯苓淡利膀胱水桂能伐肝邪茴香善治小腸之氣金鈴子橘核去膀胱之氣檳榔下氣少加木通以為導引小腸之火出也屢用屢驗疝有七疝五疝三因之不同古有七疝曰厥症寒盤氣附狼也其厥逆心痛足寒諸飲食吐不下曰厥疝腹中氣乍滿心下盡痛氣積如腎曰症疝因寒飲食即脅下腹中盡痛曰寒疝腹中乍滿乍減而痛曰氣疝其痛在臍傍曰盤疝腹中臍下有積聚曰附疝小便與陰相引大便難曰狼疝其證發時則可驗又有石疝血疝陰疝氣疝妒疝此五者有名而無形也外有心疝寒疝肌疝疝癖數者其名不同病則大同小異世俗呼為小腸氣膀胱氣奔豚氣蟠腸氣橫弦豎弦偏墜木腎腎余陰腫由疝之為病其名別也至於張子和論七疝曰寒水筋血氣狐㿗七者是也寒疝者囊冷結硬如石陰莖不舉或不舉或控睪丸而痛得之於坐臥濕地或寒月涉水或值雨雪或坐臥風冷內多房事宜溫劑下之久則無子水疝者其狀腎囊腫痛陰汗時出或囊腫狀如水晶或囊癢而搔出黃水或小腹按之作水聲得之於飲水醉酒使內亦勞汗出而遇風寒濕之氣聚於囊中故水冷令人為卒疝宜以逐水之劑下之筋疝者其狀陰莖腫脹或潰膿或痛而裡急筋縮或莖中痛痛極則癢或挺縱不收或有白物隨溲而下久而得於房室勞傷及邪術所使宜以降心之劑下之血疝者其狀如黃瓜在少腹兩傍橫骨兩端約中俗云便癰得於重感春夏大燠勞於內使氣血流溢滲入脬囊留而不去結成癰腫膿少血多宜以和血之劑下之氣疝者其狀上連腎區下及陰囊或因號哭忿怒則氣鬱脹怒哭既罷則氣散者是也有一治法以針出氣而愈者然針有得失宜以散氣之藥下之或小兒亦有此疾俗曰偏氣得於父已年老或年少病陰痿精怯強力入房因而有子胎中病也此疝不治惟築賓一穴灸之狐疝者其狀如丸臥則入小腹行立則出小腹入囊中狐則晝出穴而溺夜則入穴而不溺此疝出入上下往來正與狐相類也亦與氣疝大同小異令人帶鉤鈴是也宜以逐經流氣之藥下之㿗疝者其狀陰囊大如升斗不癢不痛者是也得之地氣卑濕所生故江淮之間多有之宜以去濕之劑下之女子陰戶突出雖亦此類乃熱則不禁固也不可便認為虛寒而溫之補之本名曰瘕宜以苦藥下之以苦堅之雖然疝之名不同大抵不過寒濕熱之邪氣分三因盡之矣稟生於胎氣者此不內外因也冒寒涉濕而得者外因也酷好酒面內濕下著者內因也總不外此三因法也脈候內經曰肝脈急大沉皆為疝心脈滑搏急為心疝肺脈沉搏急為肺疝三陽急為瘕疝三陰急為脾疝三陰脾脈則病脾風疝陽明脈滑則病心風疝太陽脈浮則病腎風疝少陽脈浮則病肝風疝寸口脈弦而緊弦緊相搏則為寒疝趺陽脈虛遲為寒疝繞臍痛若發則自汗出手足厥冷治法治疝不宜先補許學士云疝疾雖因虛而得之不可以虛而驟補經云邪之所湊其氣必虛留而不行其病則實故必先滌所蓄之邪然後補益斯其治也疝本肝經宜通勿塞靈樞經治疝必曰取厥陰以下之言足厥陰肝經病則遺溺癃閉狐疝主腎與膀胱小腸三經則不言疝是受疝之處乃肝之部分且內經男子宗筋為束骨之會而肝主筋睪者乃囊中之丸雖主外腎非厥陰環而引之與玉莖無由伸縮在女子則為篡戶其內外為二其一曰廷孔其二曰窈漏此是厥陰與衝任督之所會也靈樞言足厥陰之經筋聚於陰器其病疝傷於寒則陰縮傷於熱則縱挺不收治在行臥溫陰器故陽明與太陰厥陰之筋皆會於陰器惟厥陰主筋故為疝者必本諸厥陰丹溪曰疝氣者睪丸連小腹急痛也有痛在睪丸者有痛在五樞穴邊者皆足厥陰之經也有云肝為相火者有瀉無補肝只有余腎只不足有以龍膽瀉肝湯治疝而效甚速者可知矣或曰自素問以下皆為寒治何也大抵此證始於濕熱在經郁之既久又得寒氣外束不得疏散故所以作痛若只作寒論恐為末備今世用烏頭梔子作湯服之甚效甚捷是亦以烏頭疏通寒邪梔子利其濕熱亦通之之法豈必用硝黃巴牽之類而方謂之通乎夫寒也熱也濕也故皆宜於通也疏散分利針灸者皆通之法也善醫者宜擴充之丹溪云凡七疝多用熱藥而獲效者則內經從治之法耳須用寒涼藥監製之不可純用大熱之劑如用烏附之類令人久服多服必變劇不可治矣但宜以二陳湯加枳實山楂橘核梔子等藥煎入薑湯汁熱辣飲之諸疝發時用海石香附二味為末薑汁入湯調服亦治心痛因清痰而作痛者凡疝氣挾虛者必以參術為君佐以疏導之藥川楝子小茴香枳實山楂梔子之類諸疝定痛速效枳實山楂各炒濕盛者加荔枝核炒為末丸服或用長流水調末空心服一二錢一本有川楝肉陽明經受濕熱傳入大腸惡寒發熱小腸連毛際結核悶痛不可忍用山梔枳實桃仁山楂等分入薑汁煎熱服肥人疝腫作痛惡寒發熱五苓散加茴香煎服神驗木腎是濕熱頑痹結硬如痰核之類反不痛是也治宜溫散利逐之㿗疝有四一云不痛者是㿗三因論腸㿗因房室過度原臟虛冷腸邊膋系不收墜入㿗中上下難治氣疝因七情臟氣下墜陰㿗腫脹急痛易治卵㿗因勞役坐馬致卵核腫脹或偏有大小上下無常此難治也外有婦人陰門挺出名曰㿗病但治不同耳凡㿗非斷房事與厚味不可用藥㿗不痛者以蒼朮神麯白芷山楂川芎枳實半夏之屬治七疝須先灸三陰交大敦穴然後服藥無不愈者灸疝法三陰交二穴在內踝上三寸骨傍陷中灸三壯治七疝大敦二穴在足大母指端去爪甲如韭葉及三毛中灸三壯千金云足大指聚毛中乃足厥陰肝經歸來二穴關元一穴在臍下三寸名丹田灸百壯主陰卵偏大㿗病氣海一穴在臍下一寸半中脹一穴章門二穴闌門二穴在陰莖根兩傍各開三寸是穴針一寸半灸二七壯治偏墜木腎腫一法治小兒偏墜午時令兒坐土上灸卵下偏墜處七壯治諸氣心腹痛小腸氣外腎痛一法治疝氣小腹急痛不可忍足大姆指次指下中節橫紋當中灸五壯男左女右效一法用細小繩一節量患人口角為一折如此三折或一角如此樣以一角安臍心兩角在臍下兩傍盡處是穴灸二七壯治一切狐疝水聲上下外陵二穴在臍左右各去一寸半灸疝立效永不再發屢用驗風市治疝氣外腎腫小腸氣痛腹內虛鳴治案丹溪治一人舊有疳積後因山行飢甚遇橘芋食之即上丸腫大寒熱先服平胃劑一二帖次早神思清氣至下焦嘔逆覺積動復吐後和胃氣疏通經絡而愈一人虛損潮熱偏墜小腸氣四物加小茴香吳茱萸胡蘆巴各五分枳實青皮山楂漸愈滑伯仁治一婦病寒致疝自臍下上心皆脹攻痛而脅尤甚嘔吐煩悶不進飲食診其脈二手沉結不調曰由此寒在下焦急攻之與灸章門氣海中脘服玄胡桂川楝茴香木香青皮白朮茯苓等一日一服溫利丸藥聚而散之也一老人病臍腹㽲痛醫以溫中散寒無驗視之脈兩尺搏堅而沉者曰此大寒由外入也寒在外故為疝治宜在下加沉降之劑引入下焦數服而愈一人病氣在濟下築築漸至心下嘔湧痛滿手足皆青喉中淫淫而癢眉末痠疼口不欲食頭不欲舉神昏欲睡而不寐惡食氣睪丸控痛小便數而缺年未三十尫瘠尤甚人劣劣不自持脈沉弦而澀曰是得憂鬱憤怒寒濕風雨乘之為肝疝也張從正云諸疝皆屬肝經且肝欲急以辛散之遂以吳茱萸佐以薑桂及治氣引藥兼以茴楝等丸每日一服利之三月安藥方疝㿗通用諸劑發明茴香四神散治諸疝痛小茴香南木香穿山甲炮全蠍微炒各等分上為粗末每服半兩酒水各半盞煎服丹溪山楂橘核丸治諸疝痛山楂四兩橘核炒茴香炒山梔炒各二兩柴胡牡丹皮桃仁炒大茴香炒各一兩吳茱萸泡半兩上為末酒糊丸梧桐子大空心鹽湯下十丸丹溪腎氣丸治前證小茴香炒破故紙炒吳茱萸鹽炒各半兩葫蘆巴七錢半木香三錢半上為末蘿蔔汁丸梧桐子大鹽湯下五十丸丹溪五葉湯治疝氣腫痛極效枇杷葉野蘇葉椒葉蒼耳葉葡萄葉上以水煎熏洗丹溪積疝丸治諸疝山楂炒一兩茴香炒半兩牡丹皮柴胡各三錢上為末酒糊丸梧桐子大每服五六十丸鹽湯下丹溪蒼朮附子湯治疝作痛蒼朮鹽水炒香附子鹽水炒黃柏酒炒各一錢青皮玄胡索益智桃仁各七分茴香炒附子鹽炒甘草各五分上為末作湯服後一痛過更不再作局方香殼散治小腸疝腹㽲痛筋急陰股中痛昏悶不省人事舶上茴香鹽炒枳殼麩炒各一兩沒藥半兩上為末每服一錢溫酒調下不拘時並進二三服效寶鑑楝實丸治陰疝痛不可忍及小腸氣痛川楝子炒茴香炒山茱萸肉食茱萸炒吳茱萸青皮陳皮芫花酷煮減半馬藺花各等分上末醋煮糊丸梧桐子大每服三十丸溫酒下寶鑑天台烏藥散治小腸疝氣卒引臍腹疼痛烏藥木香茴香炒青皮良薑炒各半兩檳榔二個川楝子十個巴豆七十粒上先以巴豆微打破用川楝子麩炒黑去麩及巴豆不用其餘藥同為細末每服一錢溫酒下甚者姜酒下寶鑑川楝散治諸疝氣小腸氣川楝子一兩用巴豆十五粒打破同炒黃去巴豆南木香小茴香鹽炒各一兩上為末空心酒下二錢集成薈陳紫蘇飲治小腸氣腎核作痛蒼朮陳皮紫蘇葉川楝子各二錢蔥白五根甘草五分上水盞半姜五片煎八分空心溫服局方聚香飲子治七疝心腹及腰脅背脹疼痛皆效局方蟠蔥散治男子脾胃虛弱氣滯不行攻刺心腹連腰背脅痛膀胱小腹諸疝氣及婦人血氣刺痛二方並見氣門局方五積散加鹽炒吳茱萸小茴香各一錢姜五片蔥白五寸煎空心熱服治一切腸疝氣痛不可忍方見寒門治疝氣濕熱清利諸劑元戎加味五苓散治濕熱疝氣及偏墜腫痛本方加川楝子一分為末空心米飲調下二錢和劑莪朮丸治疝氣腹內塊痛走痛積氣痛莪朮三稜南星各一兩山楂二兩香附子炒各二錢黃連同吳茱萸炒去茱萸不用淨連五錢桃仁山梔橘核炒各半兩上為末薑汁浸餅為丸如梧桐子大每服五十丸空心鹽湯下良方加味通心飲治諸疝脹痛及小便不利木通梔子去殼黃芩瞿麥連翹枳殼川楝子甘草各等分上咀每服五錢水盞半燈心二十根車前草五莖煎七分溫服濟生葵子湯治膀胱實熱腹脹小便不通口舌乾燥葵子微炒豬苓赤茯苓枳實瞿麥木通黃芩車前子滑石各錢甘草五分上水盞半薑蔥煎空心服集成蒼朮半夏丸治濕熱疝痛蒼朮半夏南星黃柏炒山楂白芷神麯昆布滑石吳茱萸各等分上為末酒糊丸梧桐子大每服七十丸空心鹽湯下守效丸治㿗疝之要藥不痛蒼朮南星半夏白芷川芎枳實山楂各等分上為末薑汁糊丸梧桐子大每服七十丸鹽湯下集成參朮湯治虛疝脈豁大者死人參蒼朮梔子香附子白朮各等分上咀每服半兩水盞半煎八分空心服寒疝諸劑金匱烏頭桂枝湯治寒疝腹中痛逆冷手足不仁及身疼痛灸刺諸藥不效者烏頭大者五枚炮去皮尖不㕮咀桂枝煎湯五合以蜜一斤煎減半去渣以桂枝湯五合解之令得一升每服二合不知即服三合其知者如醉狀得吐為中病若自汗出脈沉弦者止用烏頭煎三因烏頭桂枝湯治風寒疝氣腹中刺痛手足不仁身體拘急不得轉側或致陰縮大烏頭五枚去皮尖蜜煎過洗切桂心白芍藥各三錢甘草一錢上咀每服四錢加薑棗煎服三因補腎湯治寒疝大腹小腹疼痛時復泄瀉胸膈痞滿人參黃耆茯苓白朮附子炮各一錢沉香四分木瓜一錢羌活五分紫蘇川芎甘草炙各二分上咀作一服水盞半加薑棗煎服百選十補丸治小腸寒疝附子一大枚用防風銼墨豆一合同煮附子去皮尖胡蘆巴木香巴戟天川楝肉玄胡索官桂茄舶上茴香破故紙炒各一兩上末糯米粉酒打糊丸梧桐子大硃砂為衣空心酒下五十丸百選葫蘆巴丸治小腸氣蟠腸氣奔豚疝氣偏墜陰腫小腹有形卵上下來去痛不可忍或絞經繞臍攻刺嘔吐者胡蘆巴炒半斤巴戟天炒三兩川楝子炒九兩川烏炮三兩茴香炒十兩吳茱萸炮五兩炒上為末酒糊為丸梧桐子大每服十五丸至二十丸空心酒下寶鑑沉香桂附丸治中氣虛弱脾胃虛寒臟腑積冷心腹㽲痛手足厥逆便利無度七疝引痛不可忍喜熱尉少緩者沉香附子炮官桂乾薑炮良薑川烏炮茴香炒吳茱萸湯泡各一兩上末好醋糊丸梧桐子大空心米飲下五十丸漸加七八十丸東垣丁香楝實丸治寒疝氣血留滯當歸酒洗附子炮川楝肉茴香各一兩上銼好酒三升同煮酒盡焙乾為末入沒藥丁香木香各五分全蠍十三枚玄胡索半兩為末酒糊丸酒下集成神應散治寒疝諸疝心腹痛不可忍散氣開鬱玄胡索胡椒小茴香各等分上為末每服二錢酒調下集成牡丹丸治寒疝心腹氣血刺痛牡丹皮四兩一淨川烏炮去皮尖桃仁同上桂枝青皮各等分上末煉蜜丸梧桐子大每服五十丸空心酒下集成橘核散治同前橘核桃仁梔子仁川烏炮吳茱萸泡各一兩上水盞半煎七分溫服集成硫黃丸治疝氣甚至手足厥冷上衝心腹欲死者二三服除根硫黃熔化即投水中去毒研為末陳皮荔枝核為粗末炒焦黃上等分為末飯丸梧桐子大每服四五丸酒下立止甚者只用六丸不可多服集成桃仁湯治㿗疝寒氣凝結桃仁吳茱萸桂枝白蒺藜青皮茯苓檳榔各七分木香三分磨汁海藻枳殼三稜莪朮各五分上咀作一服水煎空心服局方奪命丹治遠年近日小腸疝氣偏墜搐痛臍下撮痛以致悶亂及生腎硬日漸澀長陰間濕癢成瘡吳茱萸淨一斤四兩用酒醋湯童便各浸一宿焙乾用澤瀉二兩上為細末酒煮麵糊丸梧桐子大每服五十丸空心鹽湯下局方茱萸內消丸治腎經虛弱膀胱為邪氣所搏結成寒疝陰㿗偏大吳茱萸山茱萸去核肉桂馬藺花陳皮木香山藥川楝子青皮茴香炒各等分上為末酒糊丸梧桐子大每服五十丸空心溫酒下局方鹽煎散治冷疝寒氣卒痛草果砂仁檳榔厚朴薑製羌活蒼朮陳皮肉蔻煨蓽澄茄枳殼良薑茯苓茴香川芎麥芽甘草各四分上咀作一服水煎入鹽少許空心服醫林金鈴散治疝氣作痛時先曲腳腰啼哭唇乾額汗或外腎釣上陰囊偏大治小兒疝氣極效金鈴子半兩砂仁七錢半蓽澄茄木香各半兩上為末鹽湯或酒調下二錢醫林四神丸治疝氣脹痛不已吳茱萸淨一兩半酒浸拌醋浸香附子淨一兩蓽澄茄木香各半兩上為末糊丸梧桐子大每服七十丸空心鹽湯乳香蔥湯任下醫林金鈴丸治膀胱腫痛並小腸陰囊腫毛間出水金鈴子五兩馬藺花炒茴香炒海蛤煆破故紙菟絲子制海帶各二兩木香丁香各一兩上為末糊丸梧桐子大每服三十丸空心酒下醫林香蠍散治疝膀胱小腸氣痛不可忍乳香蠍梢各一錢川烏去皮尖生用三錢上為末每服一錢鹽湯少許空心調下三因蔥白散治一切寒疝作痛當歸川芎枳殼炒厚朴制官桂青皮乾薑炮茴香炒茯苓川楝肉麥芽炒神麯炒三稜炮莪朮煨熟地黃白芍藥木香人參各等分上咀每服五錢蔥白三莖鹽少許水煎空心溫服良方蜀椒散治寒疝心痛如刺繞臍腹中痛自汗出氣欲絶川椒一錢去目及合口者微炒出汗附子制乾薑炒半夏制桂心甘草炙各半兩上咀每服五錢水一盞粳米半合姜三片棗三枚煎六分溫服良方吳茱萸丸治寒疝心腹痛面目青黃不思飲食縱食嘔逆肌體羸瘦吳茱萸湯泡當歸赤茯苓甘草炙各半兩白朮乾薑炮半夏制赤芍藥前胡桂心陳皮川椒去目炒附子制人參木香各一兩上為末煉蜜丸梧桐子大每服二十丸薑湯送下日三服良方三增茴香丸治腎與膀胱俱虛為邪氣搏結遂成寒疝伏留不散臍腹痛陰核偏大膚囊壅腫重墜瘡瘍時出黃水或長怪肉纍治不痊致令腎經閉結陰陽不通外腎腫脹冷硬如石漸大皆由頻服熱藥內攻或因兜取以致如此用藥溫導陽氣漸退寒邪補虛消散疝氣能使復元一應寒疝之疾久新不過三料第一料藥用舶上茴香用鹽半兩同炒焦黃和鹽川楝肉炒沙參洗木香各一兩上為細末米糊為丸梧桐子大每服二十丸空心溫酒鹽湯下日三服小病此一料可安才盡便可服第二料藥第二料藥加下項藥蓽茇一兩檳榔五錢又加入前藥內通共六味重五兩半為細末如前丸服若病未愈便服第三料藥第三料藥又加下項藥白茯苓四兩黑附子半兩泡去皮臍上共前藥重十兩如前丸服加至三十丸新久大病三料愈小腸氣發頻三十年者寒疝氣至如栲栳大者皆可消散神效良方木香導氣丸治一切小腸疝氣腹下痛氣積下元冷脾胃不和並宜服之神效木香乳香丁香川楝子大茴香香附子破故紙炒葫蘆巴炒三稜杜仲姜炒去絲甘草各一兩上為細末酒糊丸梧桐子大每服三十丸加至五十丸空心溫酒或鹽湯下日進三服治疝攻下諸劑良方芫花丸治寒疝積聚動搖大者如鱉小者如杯乍來乍去在於小腹及腸胃間或大腑不通腸鳴寒氣上搶胸脅滿悶芫花二兩醋炒川椒炒川大黃炒川烏頭制細辛赤芍藥桂心赤茯苓木香各一兩吳茱萸湯泡微炒半夏泡桔梗半兩上末楝蜜丸梧桐子大酒送下七丸日進三服下物如泥良方茴香楝實丸治諸疝痛小茴香川楝子各兩半吳茱萸二兩海藻酒洗青皮各一兩木香澤瀉各半兩青鹽三錢三稜醋炒莪朮酷炒各七錢半黑牽牛七錢半生半炒上將川楝茴香茱萸用酒醋童便各浸半日又用巴豆去皮斑蝥去翅足各二十五個以川楝茴香青皮同炒得所去豆蝥不用余為細末糊丸梧桐子大每服十丸加至十五丸鹽湯下良方海藻丸治奔豚疝氣膀胱小腸氣㿗疝木腎小兒偏墜海藻洗焙木香檳榔川椒去目炒甘遂各半兩川烏半兩炮小兒不用老人用一錢吳茱萸四錢炒茴香炒澤瀉各二錢豬苓去皮三錢白牽牛黑牽牛各取頭末半兩上為末滴水丸梧桐子大空心溫酒或鹽湯下五十丸加至百丸利下黃涎為效十五歲以下者服二十五丸至五十丸此藥不特利大便亦利小便服藥後忌甘草相反局方三白散治膀胱濕熱相乘陰囊腫大小便不利白牽牛二兩桑白皮炒白朮炒陳皮各半兩上為末每服二錢空心薑湯調下局方復元通氣散治前證舶上茴香穿山甲蛤粉炒各二兩牽牛頭末玄胡索陳皮木香甘草炙各一兩上為細末每服一錢食前熱酒調下子和禹功散治同前黑牽牛頭末四兩茴香炒一兩為末薑汁點湯臨睡調服二錢本事立效散治同前川芎川楝子青皮舶上茴香牽牛炒桃仁各一兩上為末每服二錢無灰酒一盞煎食前溫服良方宣胞丸治外腎腫痛黑牽牛頭末半生半熟青木香一兩斑蝥七個同炒去蝥不用川木通炒各一兩上為末酒糊丸梧桐子大每服三十丸溫酒或鹽湯送下良方神效丸治腎囊腫大黑牽牛一兩炒黃色香熟為度舶上硫黃研為末拌牽牛五錢上二味和極勻將牽牛紙襯於地上一宿研末用蒸餅糊為丸梧桐子大每服三十丸空心鹽湯下良方川楝子丸治諸疝氣一切下部之疾腫痛悉皆治之川楝子肉淨一斤分作四分制一分用麩一合斑蝥四十九個同炒麩黃色去麩蝥不用一分用麩一合巴豆四十九粒同炒麩黃色去麩巴不用一分用鹽一兩茴香一合同炒黃色為度去鹽茴香不用一分用麩一合巴戟一兩同炒麩黃色去麩戟不用青木香破故紙炒香各一兩上為末酒糊丸梧桐子大每服五十丸鹽湯下甚者日進三次食前服醫林青木香丸治寒濕疝氣結硬如石或控睪丸而痛得於坐臥濕地房勞過度宜此溫利極效黑牽牛頭末一錢二分破故紙炒香各一兩蓽澄茄木香各三錢檳榔酸粟米飯裹之紙包煨令紙焦去飯四錢上共為細末滴水丸緑豆大每服二十丸白水下醫林蕩疝丹治疝氣痛外腎腫墜川楝肉炒小茴香炒破故紙炒牽牛頭末各一兩青皮陳皮各三錢廣朮木香各四錢上為末酒糊丸梧桐子大每服五十丸空心酒下醫林當歸散治疝氣大便祕或因血氣凝滯引小腹撮痛唇青者不治官桂牽牛頭末各半兩當歸大黃桃仁去皮尖焙各二錢半全蠍錢半上咀每服二錢用蜜二匙煎溫服以後藥煎服調和胃氣陳皮青皮木香砂仁茯苓甘草生薑上等分水煎服百選桃仁膏治氣血凝滯疝氣膀胱小腸氣痛不可忍桃仁炒去皮尖研茴香炒各一兩上為末每服二錢蔥白二寸煨熟蘸藥細嚼空心熱酒下局方玉燭散治血疝四物湯加大黃朴硝枳實厚朴煎服敷尉法牡蠣粉炒良薑銼各一兩為末津調敷偏處須臾如火痛即安淋洗方治陰疝腫痛不能忍及陰腫大雄黃研甘草各一兩白礬研二兩為細末每用一兩熱湯五升通手洗腫處良久再暖洗之候汗出瘥嚴氏鹽尉法用食鹽半斤炒極熱以故帛包尉痛處一法用布帛扎圈置臍上用鹽填入一寸厚用尉斗尉之或上鋪艾灼之妙易簡諸方經驗蒼朮散治下元虛損偏墜腎莖痛楚茅山蒼朮六斤一斤老米泔水浸二日夜一斤酒浸三日夜切作片曬乾一斤斗子青鹽半斤同炒黃色不用鹽一斤小茴香四兩同炒黃色去茴不用一斤桑椹二斤取汁制過曬乾上共為細末每服三錢空心酒下一方絲瓜架上初結者直待滿架結盡葉落方取下燒灰存性為末煉蜜調臨晚好酒調下一匙如病右則右睡病左則左睡一方治小兒偏墜用雙蒂茄子懸於房門上出入用目視之茄淹其患亦淹茄干亦干矣又云用雙茄懸門上每日抱兒視之二三次鐵釘於上十餘日消太平聖惠方治小腸氣臍腹緩痛陰中疼悶不省人事用小茴香鹽炒枳殼麩炒各一兩沒藥半兩為末每服一錢熱酒調下又方治寒疝陰中引痛汗出欲死丹參一兩為散熱酒調服二錢又方治寒疝心痛四肢逆全不思食用桂枝二兩去皮搗羅為散不計時候每服一錢熱酒調下肘後方治小腸氣痛不可忍者用烏藥搗碎酒浸一宿良薑茴香青皮各一兩為末每服二錢發時熱酒調下又方五靈脂蒲黃炒各等分為末每服二錢先以醋一盞將藥熬為膏水一盞煎服亦治婦人血痛本事方治疝氣痛有盜汗用延胡索小茴胡椒等分為末煉蜜為丸梧桐子大每服二十丸蔥白煎酒食前下又方茴香乳香豬苓桔梗木通甘草等分燈心淡竹葉各一握水盞半煎七分食前服又方用苦楝子炒黃為末每服二錢熱酒下外臺祕要治多年疝氣諸藥不效者用臘月八日活麻雀一個肚中割一小孔填白礬令滿用線縫合以筒瓦合定鹽泥固濟炭火內煆存性取出為末每服二錢空心酒調服甚效一方用蕪荑搗和鹽末二物等分以綿裹如棗大內下部去惡水汁並效導引法一法坐舒兩腳以兩手捉大拇指使足上頭下極挽五息止引腹中氣周行身體去疝瘕病利諸竅往來易行久行清爽聰明修長一法以兩手合搓一二百回以熱掌捻大子久久自消而痛亦止前陰十證病機經脈所屬有四內經骨空論云督脈者起於少腹以下骨中央女子入系廷孔其孔溺孔之端也其絡循陰器合篡間繞篡後男子循陰下至篡與女子等皆督脈所主也靈樞經脈篇云肝足厥陰脈循陰股入毛中過陰器經筋篇云足太陰之筋上循陰股結於髀聚於陰器足少陰之筋並足太陰之筋而上循陰股結於陰器由是知前陰為四經屬也陰縮陰縱陰縮謂前陰受寒縮入腹內也陰縱謂前陰受熱挺長不收也靈樞云足厥陰之傷於寒則陰縮入傷於熱則縱挺不收治在行水清陰氣是也又云足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者經脛上睪結於莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所別也陰痿陰腫靈樞云足厥陰之筋結於陰氣絡諸筋陰器不用傷於內則不起是也凡陰痿之疾皆耗散太過傷於肝筋所致也又云腎脈大甚為陰痿又云太陰司天濕氣下臨腎氣上從陰痿氣大衰而不起是也陰莖腫或堅而痛皆是濕熱積注而然亦有房事過多所致針法取中極太溪三陰交復溜陰痛陰癢潔古云男子陰頭痛女人陰中痛宜灸刺大敦怪穴陰中濕癢外腎生瘡灸瀉海底在浮囊海底十字健中陰濕陰寒男子陰囊冷女子陰中寒歸來穴灸之東垣云前陰濕癢盡為酒色之過補肝湯溫腎湯固真湯之類選用丹溪吳茱萸湯千金大蘇根汁皆妙陰臊陰吹仲景云陰吹為胃氣下泄此穀氣之實也以膏發煎導之東垣云一人問前陰間常悶臊臭又因連日飲酒腹中不和豫曰夫前陰者足厥陰之脈絡陰器出其梃末夫臭者心之所屬散屬五方為五臭入肝為臊臭此其一也當於肝經中瀉其行間是治其本後於心經中瀉少衝乃治其標如惡針當用藥除之治法當求其本連日飲灑夫酒氣味俱厚能生里濕熱是風濕熱合於下焦為邪故經云下焦如瀆又云在下焦者引而竭之酒者是濕熱之水宜亦決前陰以去之是合下焦二證之治十證諸方仲景附子理中湯治三陰寒證腹痛陰縮承氣湯治厥陰煩滿囊縮毒氣入腹尺寸脈俱沉而短者陰挺腫而痛脈數而實者俱用此方以下之二方並見寒門正陽散治陰縮囊縮大小便俱通地道不塞不渴不飲邪不在裡宜溫之灸之外相接以復陽氣附子一兩炮去皮臍治諸風寒利九竅療腹滿及囊結縮乾薑炒甘草炙各二錢半皂角一兩酥炙去皮核麝香一錢研極細上為細末每服二錢水一盞煎五分不拘時合渣溫服八味丸治陽事多痿不振夏減桂附一半春秋三分減一痿去精通全減只服六味地黃丸方見虛損門丹溪治一人年二十歲玉莖挺長腫而痿疲塌常潤磨股不能行兩脅氣上手足倦弱先以小柴胡加黃連大劑行其大熱次又略加黃柏降其逆上之氣其挺腫漸收漸減及半但莖中有一堅塊未消遂以青皮一味為君佐以散風之劑服之外用絲瓜汁調五倍子抹之而愈龍膽瀉肝湯治溺黃臊臭淋瀝雨丸如冰汗浸雨胯陰頭亦冷值十二月天寒霜雪交集寒之極矣龍膽草八分升麻柴胡各三分羌活根酒黃柏各一錢防風根麻黃根各二錢蒼朮五分豬苓澤瀉各三分藁本紅花當歸各二分黃芩五分炙甘草三分上咀作一服水二盞煎稍熱服忌酒面固真湯治兩丸冷前陰痿弱陰汗如水小便後有余滴臊氣尻臀並前陰冷惡寒而喜熱足膝亦冷溫腎湯治面色萎黃身黃腳軟無力陰汗陰莖有火色麻黃六分防風一錢半白朮蒼朮各一錢豬苓澤瀉白茯苓酒黃柏升麻各八分柴胡梢六分上作二服每服水二盞煎一盞食前稍熱服柴胡勝濕湯治外腎冷兩髀陰汗前陰痿弱陰囊濕癢臊氣柴胡升麻羌活澤瀉各一錢甘草龍膽草酒黃柏各八分麻黃根當歸尾防己茯苓各七分紅花少許五味子十二粒上水二盞煎一盞稍熱服食前忌酒面房事清震湯治陰部時常濕癢臊臭當歸尾三錢柴胡木通澤瀉各五分車前子一錢草龍膽生地黃各四分上水二盞煎一盞空心稍熱服以美膳壓之此藥用當歸滋肝血之不足用柴胡入肝為引車前木通淡滲小便之邪以去臊是在下者引而竭之也生地膽草以去濕熱酒面之邪毒椒粉散治前陰兩丸濕癢秋冬尤甚夏月減麻黃一錢黑狗脊五分斑蝥二個豬苓三分肉桂一分當歸尾三分輕粉少許紅花少許蛇床子半兩小椒三分上為末乾摻上避風濕冷處坐臥丹溪吳茱萸煎治腎囊濕癢吳茱萸半兩寒水石三錢黃柏三錢蛇床子半兩樟腦硫黃白礬檳榔各三錢輕粉一錢上為末乾摻先用吳茱萸煎湯洗過即用此摻祕方牡蠣散治陰囊濕癢搔之則汁水流珠用此極效醋牡蠣一兩枯礬硫黃各二錢雄黃一錢苦參二錢蛇床子二錢上為細末先用蒼朮椒鹽水煎湯洗過後用此藥摻上蒸洗法治一切陰囊濕癢陳茶一撮蒼朮二錢花椒蛇床子各一錢蒼耳草量入煨鹽半兩皮硝三錢白礬一錢上水四碗煎汁去渣入鹽硝礬泡化先蒸後洗三四次絶癢
