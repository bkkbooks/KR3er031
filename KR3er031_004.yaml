body:
  text: 卷之四內經脈候脈訣辨妄脈自內經以下歷周秦漢鮮有得其旨緒者至晉王叔和氏以脈鳴時撰有脈經可謂詳切惜其謬以大小腸候之兩寸致有後人乘訛集為脈訣遂致脈經幾隱晦也至宋龐安常氏始得經意而有人迎氣口之辨嗣後論脈未能或之先也脈為醫之關鍵醫不察脈則無以別證證不別則無以措治醫惟明脈則誠良醫診候不明則為庸妄脈其可以弗辨乎哉況醫道之創制始於神農而闡於軒岐先賢論脈必本乎內經內經為軒岐問答之書貫徹天人該博義理所謂三墳之書者是也夫何六朝高陽生竊晉王叔和氏之名撰為脈訣以左心小腸肝膽腎右肺大腸脾胃命為歌成帙謂淺近易習致使後學樂從訛承惑固而不知覺蔡西山戴同父氏力為之辨而辨之未盡辨也右尺命門三焦並無經臟可候之理由辨而知其非者僅千百之一二小大腸候之兩寸就以王氏脈經誠為妄謬又況脈訣之妄以誣人乎分以七表八里九道之名夫何為也以表言之則實脈非表也以裡言之則遲脈非里也而道更不知為何道也此其所以為妄者一也又以脈狀圖之以示人而弦脈固可圖也而數脈遲脈促脈結脈皆以至數為狀而可以圖之乎此其為妄者二也夫以言而傳之者亦下學之事耳上達者以神領以心悟而後得其妙焉彼以左寸心與小腸同候不知其祖述何聖抑不知其祖述何經既不祖述必據以理之可準義之可通而固可宗也以理言之則大小腸皆居下部之地今乃越中部候之寸上謂理之可準乎抑義之可通乎又謂左寸浮以候小腸之脈設只單浮則心脈無矣經曰心脈絶死不治心脈可以一日無乎豫逆推其小腸配於左寸之誤也彼蓋因夫手少陰心經與手太陽小腸經為表裡誤移於寸口合而診之其大腸配於右寸之誤也因夫手太陰肺經與手陽明大腸經為表裡誤移于寸口合而候之殊不知經絡相為表裡診候自有異同內經以心配膻中肺配胸中以肝配膈以脾配胃兩尺外以候腎內候腹中大腸小腸膀胱三腑盡屬腹中下部之位故三部寸關尺之配診則冬因其臟腑之位焉何嘗泥於經絡而候之也況且命門並無經臟三焦亦非一腑而何可以候之右尺耶原夫大小腸居小腹之下部今而逆候寸口之上部惡乎宜乎經絡表裡部位診候各有所屬豈容強合以亂經位此其為妄者三也吾之浮以候表主於外心部之表候者目眥汗腠之所屬也沉以候里主於內心部之裡候者精神氣血之所屬也又謂女人與男子脈相反悖致後人有以左尺候心右尺候肺者殊不知男女之異者不過氣血之少異尺寸之強弱耳五臟六腑定位固亦可以異乎此其為妄者四也豫其容已弗辨乎哉今述內經脈候統屬診法質疑刊誤以正其非君子觀之當自覺矣內經氣口診候經脈別論篇曰食入於胃散精於肝淫氣於筋食入於胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於腑府精神明留於四臟氣歸於權衡權衡以平氣口成寸以決死生此氣口通謂兩手而言之非獨指一右手也飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也五臟六腑氣口成寸圖內經三部九候脈法三部九候論篇帝曰願聞天地之至數合於人形血氣通決死生為之奈何岐伯曰天地之至數始於一終於九焉一者天二者地三者人因而三之三三者九以應九野故人有三部部有三候以決死生以處百病以調虛實而除邪疾帝曰何謂三部岐伯曰有上部有中部有下部部各有三候三候者有天有地有人也必指而導之乃以為真上部天兩額之動脈王注在額兩傍動應於手上部地兩頰之動脈在鼻孔下兩傍近於巨髎之分動應於手上部人耳前之動脈在耳前陷者中動應於手中部天手太陰也在掌後寸口中是謂經渠動應於手中部地手陽明也在手大指次指歧骨間合谷之分動應於手中部人手少陰也在掌後兌骨之端神門之分動應於手下部天足厥陰也在足大指本節後二寸陷中太衝之分下部地足少陰也在足內踝後跟骨上陷中太溪之分動應於手下部人足太陰也在魚腹越筋間直五里箕門之分沉取動應於手候胃氣者當取足跗之上衝陽之分動應於手故下部之天以候肝地以候腎人以候脾胃之氣中部天以候肺地以候胸中之氣人以候心上部天以候頭角之氣地以候口齒之氣人以候耳目之氣九候之相應也上下若一不得相失一候後則病二候後則病甚三候後則病危所謂後者應不俱也脈要精微篇曰尺內兩傍則季脅也季脅在脅骨之下帶脈上一寸八分是其候也尺外以候腎尺裡以候腹中兩尺脈也兩尺外候腎部內候腹裡大小腸膀胱腑俱在中也附上兩關部也左外以候肝內以候鬲經曰鬲為中焦血之原也右外以候胃內以候脾上附上兩寸部也右外以候肺內以候胸中經曰胸為上焦氣之源也左外以候心內以候膻中經曰膻中者臣使之官喜樂出焉是為氣海前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝胻足中事也此結上文而總言之也此內經寸關尺三部候法至難經脈訣易之以大小腸配於心肺而此竟鮮有能究之者然則三部孰有準於是哉今世言脈之三部則是而其內外之候法若非心谷汪先生質疑之著其孰從而知之質疑曰內外每部有前後半部之分也脈之上至應前半部為外屬陽脈之下至應後半部為內屬陰上至者自後而進於前陽生於陰也下至者自前而退於後陰生於陽也概而言之臟腑近背之陽位者以前半部候之近腹之陰位者以後半部候之細而分之如兩尺內外前後兩傍之交猶夫季脅之位界腰腹以分內外者也兩尺前之半部以候腎附腰脊之陽位者兩尺後之半部以候腹中之陰位者自尺而附上為關在左則前以候肝之居於左脅近背之陽位後以候膈之當胃口之陰位者在右則前以候胃之近脊之陽位後以候脾之居於右脅近腹之陰位者又上自關而附上為寸在右則肺居上右之陽位胸中居膻中穴上之陰位也故於茲前後分而候之至若前以候前後以候後云者則申上意而概言之也以自關中溢寸候胸至頭之事以自關中盡尺候臍至足之事則承上意而廣言之也此其為尺寸前後內外之候也夫心肝脾肺俱各候惟腎一臟而當兩尺之候何哉此陽一陰二之理也夫心肝脾肺居於膈上陽位其數奇故各一形一候惟腎居於膈下陰位其數偶故形如豇豆兩枚對附腰脊之右左而分候兩尺此水潤下之理也脈經及刊誤並以兩尺候腎者得此意也難經脈訣乃以左尺候腎屬水右尺候手厥陰配之命門少陽三焦相火失之矣夫命門者銅人以背脊十四椎下一穴謂之命門據此內無正臟外無正經何以例部且手厥陰經之臟命名不一有以心包絡言者有以七節之傍中有小心言者有以代心主病言者有以兩腎靜水動火言者皆無稽之言也考之金匱真言篇曰肝心脾肺腎五臟為陰膽胃大腸小腸膀胱三焦六腑為陽此以十一臟而配十二經則手厥陰一經無臟之可配矣考之靈蘭祕典篇岐伯對黃帝十二臟之間曰心者君主之官神明出焉肺者相傳之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉膻中者臣使之官喜樂出焉脾胃者倉廩之官五味出焉大腸者傳導之官變化出焉小腸者受盛之官化物出焉腎者作強之官伎巧出焉三焦者決瀆之官水道出焉膀胱者州都之官津液臟焉氣化則能出矣觀此膻中足十二臟之數以備十二官之用然則配手厥陰之經者不在膻中與誠以膻中乃心前空虛之處與心同志為喜喜笑者火之司也則知司火以為心火之相應者也常藏氤氳之氣靈樞謂之宗氣又謂之氣海其氣之餘淫於胸之上焦由肺布於一身以為生生不息之運用經謂少火生氣是也苟一失常則外暑內熱而燔灼臟腑謂之相火龍火經謂壯火食氣是也是知膻中者手厥陰心主相火之臟也故本文以配心臟君火分外內而同候左寸此火炎上之理也原手厥陰之經起於胸中絡之三焦由腋上行臂手之內終於手之中指然經與臟俱值身之上部當候於寸而以右尺候之可乎又三焦者手少陰之府上下通焉者也靈樞云上焦如霧中焦如漚下焦如瀆此以胸為上焦氣之原也膈為中焦血之原也腹為下焦水之原也位分不同而主治亦異此本文所以有胸膈腹中之異候原手少陽之經起手無名指端行肘臂外循肩上頭一支下絡膻中屬於胸膈腹之三焦則非下焦之可得而專者而專以右尺候之可乎且府不及膽者何也則於肝寄之矣府不及小腸大腸膀胱者何也於腹中統之矣抑是三府者皆居腹之下宜以兩尺後半部而分左右候之小腸從心例左大腸從肺例右膀胱與小腸相通而同其候則是也難經等書舍其臟腑高低拘之外經表裡以左寸候心小腸右寸候肺大腸則非也考之樞要等書亦多以左尺主小腸膀胱前陰之病右尺主大腸後陰之病今以經候前後外內之法言之常診一部之中上下之至軟滑應時合位者謂之中和之脈為平前後上下之至有太過不及失時反位者謂反常之脈為病然必察上至下至脈狀同異而分統屬之候蓋因屬之五行氣同則合上升惟水潤下氣異俱有升降以分陰陽故上下之至同者以統斷之寸關病在前候兩尺病在後候上下之至異者以屬斷之上至病在前候下至病在後候上下互見和乖和主平而乖病也上下相同同中之有異者主異者之候而為病也上下相同強弱之有尤者主尤者之候為病也澀滑長短洪細芤遲八脈有之大法統屬兼審浮沉虛實陰陽溢覆浮以候表通主皮毛經脈頭項腰脊肢節筋肉之屬也沉以候里通主臟腑骨髓咽喉二便之屬也虛者不及以為癢麻痿泄之證也實者太過以為脹壅疼祕之證也上至為陽以候上升之病也下至為陰以候下降之病也上至出部為溢下至出部為覆所候同前且以澀之不及一脈例之如兩尺前之上至此腎之所候也診得浮澀主耳聾蓋腎藏精而寄竅于耳耳得腎之精氣上榮而能聰聽今浮而澀為腎不足不能上榮于耳則耳聾矣沉澀主腰痛蓋腎附脊而外候於腰腰得腎之精氣內滋而能轉搖今沉而澀為腎不足不能內滋於腰則腰痛矣左尺後之下至此腹中小腸膀胱之所候也浮澀主足膝冷麻蓋腹中下焦之位也陽氣不足不能外溫於足膝故足膝為之冷麻矣沉澀男主遺精女主帶下腹中水精之候也陽氣不足不能內固前陰故精帶而滑下矣右尺後之下至此腹中大腸之所候也浮澀與左同斷沉澀主大便難腹中為大腸之原也大腸本多氣多血之經今沉而澀為大腸氣血不足則氣滯血燥而大便難矣左關前之上至以候肝浮澀則主肝血不能上榮而目昏沉澀則主肝氣內鬱而脅脹左關後之下至以候膈浮澀則主中宮之濕滲入囊中故睪丸偏大兼急而為痛沉澀則主中焦之氣不能榮精於心肺故滯於膈為脹甚為痛也右關前之上至浮澀主惡吐沉澀主少食此候胃陽以司納受者也右關後之下至浮澀主四肢惡寒沉澀主飲食難化此候脾陰以司運化者也右寸前之上至所以候肺浮澀主頭痛肺輸氣之臟也其氣宜充而不宜減今浮兼澀為肺之氣不足不能上充於頭故頭無所滋稟而為虛痛耳沉澀主痰滯肺通氣之臟也其氣宜利而不宜滯今沉兼澀為肺之氣不利滯而為痰或由痰遏肺竅而為咳嗽耳右寸後之下至所以候胸中浮澀兩膺刺痛兩膺俱胸之傍也今沉兼澀為胸中之氣不足不能外充兩膺故兩膺氣滯而刺痛耳沉澀主短氣胸為上焦氣之原也今沉兼澀為胸中之氣不足不能給肺之輸送故氣短而不相續耳夫心候諸左寸前之上至浮澀主頭眩以心血不能外榮於頭故火因之煽動而頭眩耳沉澀主虛汗以心血不足則火因之內蒸而為汗耳膻中候諸左寸後之下至浮澀主兩臑惡寒臑乃膻中手厥陰經過之分也外經氣不足則腠理失衛邪因外襲故近臑之處惡寒耳沉澀主驚膻中宗氣之臟也膻中之氣不足則火耗心血神不內守故驚悸而不寧耳此舉澀脈以見例余可類推矣診候有三上古診法有三者其一診十二經動脈分天地人三部九候以調虛實其二以喉傍人迎與手寸口參診取四時若引繩大小齊等曰平偏盛曰病其三獨取氣口分寸關尺外內以候臟腑吉凶今廢其二惟氣口之診行於世而且失其真噫可勝惜哉內經三部診候圖脈狀奇偶統屬診法求脈之狀奇偶而已奇者單求偶者對舉單求無配代牢之類對舉反證浮表沉里浮脈浮體泛泛皮毛之位輕按便得漂木之義沉脈沉輕按無重乃應指深按有力猶石沉水遲脈遲脈來徐呼吸三至數脈數脈來亟呼吸六至滑脈滑體圓淨往來流利荷上水珠圓神不倚澀脈音澀澀又名澀遲短蹇滯來急去散至至帶止三五不調刮竹相似實脈實乃充實舉按有力虛脈虛乃空虛舉按無力洪脈洪者倍常大而滿指細脈細者減常一線之比緊脈緊者緊急堅而搏指如轉索狀則弦有力緩脈緩謂縱緩中軟不急如絲在經則弦無力長脈長為修長如弦之直越於本位兩頭出指短脈短為短縮不及本位喻之如龜縮頭藏尾促脈促為催促數中暫止結脈結為交結遲中暫止代脈代為更代動而中止不能自遠良久復至止數有常非暫之比牢脈牢本堅牢沉弦大實不上不下牢守其位革脈革為皮革浮弦大虛如按鼓皮內虛外急弦脈弦如琴絃初中末直其來挺然而不搏指動脈動乃搖動短滑數備上下不分連動中位散脈散者不斂浮而滿指按則分散而不團聚亦類解索散無統紀有或二條三條而至者伏脈伏為埋伏骨外筋里三按俱無三按者言浮中沉也推筋而取芤脈芤乃革名浮大無力因按而知中空傍實濡脈音軟濡者不堅浮大無力按隨指下減去頭尾微脈微為微眇較細不及似有似無蛛絲相類弱脈弱軟沉細比虛不及全無起伏扶持不起諸脈主病歌浮風虛暑滑多痰實壅弦勞遲主寒洪數熱多芤失血澀為血少緩膚頑緊疼沉里濡多汗促結伏皆痰鬱看短是氣虛長是積動驚牢弱骨疼酸革崩半産細傷濕散為氣耗代將亡龐安常脈論察脈之要莫急於人迎寸口是二脈相應如兩引繩陰陽均則繩之大小等凡平人之脈人迎大於春夏寸口大於秋冬何謂人迎喉傍取之內經所謂別於陽者也越人不盡取諸穴之脈但取手太陰之行度魚際後一寸九分以配陰陽之數而得關格之脈然不先求喉手引繩之義則昧尺寸陰陽關格之所起寸口倍於尺則上魚而為溢故言溢者寸倍尺極矣溢之脈一名外關一名內格一名陰乘之脈曰外關者自關以上外脈也陰拒陽而出故曰外格陰生於陽寸動於尺今自關以上溢於魚際而關以後脈伏行是為陰壯乘陽而陽竭陽竭則死脈有是者死矣此所謂寸口四倍於人迎為關陰之脈者也關以後脈當一寸而沉過者謂尺中倍寸口至三倍則入寸而為覆故言寸者尺倍寸極矣覆之脈一名內關一名外格一名陽乘之脈內關者關以下內脈也外格者陽拒陰而內入也陽生於陰尺動於寸今自關以下覆入尺澤而關以下脈伏行則為陽亢乘陰而陰竭亦死脈有是者死矣此所謂人迎四倍於寸口為格陽之脈也經曰人迎與寸口皆盛過四倍則為關格關格之脈羸不能極天地之精氣而死所謂關格者覆溢是也雖然獨覆獨溢則補瀉以生之尺部一盛瀉足少陽補足厥陰二盛瀉足太陰補足少陰三盛瀉足陽明補足太陰皆二瀉而一補之四盛則三極導之以針當盡取少陽太陰陽明之穴脈弱者取三陽於足脈數者取於手少陽二當補於陰一至寸而反之脈有九候者寓浮沉於寸關尺也且越人不取十二經者穴直以二經配合於手太陰行度自尺至寸九分之位復分三部部中有浮中沉以配天地人也又曰中風木傷寒金濕水熱火溫病起於濕濕則土病土病而諸臟受害其本生於金木水火四臟之變也陽浮陰微為風濕陽數陰實為溫毒陽濡陰急為濕溫陰陽俱盛為溫瘧其治也風濕取足厥陰木手少陽火溫毒專取少陰火傷寒取手太陰金木手少陰火濕溫取足少陰水鄉人皆為我能與傷寒語我察傷寒與四溫變辨其疑似而不可亂也故定陰陽於喉手配覆溢於寸尺寓九候於浮沉分四溫於傷寒此皆扁鵲略聞其端而余參以內經諸書可究而得其説審而用之順而治之病不得逃焉張佑史方持脈總論帝曰診法何如診法常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂故乃可診有過之脈切脈動靜而視精明察五色觀五臟有餘不足六腑強弱形之盛衰以此參伍定死生之分是故診脈有道虛靜為保遇倉卒病患不在此論但自澄神靜虛調息凝視精明察五色聽聲音問所由方始按寸尺別浮沉復視患人身形長短肥瘦老少男女性情例各不同故曰形氣相得者生三五不調者病又如室女尼姑當濡而弱嬰兒孺子之脈疾三四歲者呼吸之間脈當七至而鄙夫常人特不同耳大抵男子先診左手女人先診右手男子左脈大則順女人右脈大則順大凡診脈先以中指揣按掌後高骨上為關得其關位然後齊下名食二指若臂長人疏排其指若臂短人密排其指三指停穩先診上指曰寸口浮按消息之中按消息之重按消息之上竟消息之下竟消息之推而外之消息之推而內之消息之然後先關後尺消息一一類此若診得三部之中浮沉滑澀遲疾不調何病所主外觀形色內察脈候參詳處治以忠告之不可輕言談笑亂説是非左右瞻望舉上忽略此庸下之醫也脈分三部五臟脈有三部曰寸曰關曰尺寸部法天關部法人尺部法地寸部候上自胸膈心肺咽喉頭目之有疾也關部候中自胸膈以下至小腹之有疾也脾胃肝膽皆在中也尺部候下自少腹腰腎膝胻足也大腸小腸膀胱皆在下也皆內經所謂上以候上下以候下而理勢之所不容間也其候豈不易驗哉脈有七診九候七診者診宜平旦一也陰氣未動二也陽氣未散三也飲食未進四也經脈未盛五也絡脈調勻六也氣血未亂七也故乃可診有過之脈也九候者三部各有浮中沉三候三三為九候也浮以候表頭面皮毛汗腠之屬也沉以候里臟腑二便骨髓之屬也中者無過不及非表非里而無疾之可議中庸所謂天下之正道者也反此者病診脈三要滑氏診脈之要有三曰舉曰按曰尋輕手得之曰舉重手取之曰按不輕不重委曲求之曰尋初持脈輕手候之脈見皮毛之間者陽也腑也亦心肺之應也重手按之脈伏於肉下者陰也臟也亦肝腎之應也不輕不重而取之其脈應乎血肉之間者陰陽相適中和之應脾胃之候也若浮中沉之不見則委曲而求之若隱若見則陰陽伏匿之脈也六部皆然脈察六字上下來去至止六字為脈之神機也不明六字則陰陽虛實不別也上者為陽來者為陽至者為陽下者為陰去者為陰止者為陰上者自尺部上於寸口陽生於陰也下者自寸口下於尺部陰生於陽也來者自骨肉之分而出於皮毛之際氣之升也去者自皮膚之際而還於骨肉之分氣之降也應曰至息曰止脈明表裡虛實表裡虛實四字脈之綱也表陽也腑也凡六淫之邪襲於經絡而未入於胃腑及臟者皆屬於表也里陰也臟也凡七情之氣鬱於心肺之間不能越散飲食五味之傷留於臟腑之間不能消泄皆屬於里也虛者元氣之自虛精神耗散氣力衰竭也實者邪賊之氣實由正氣之本虛邪得乘之非元氣之自實也故虛者補正氣實者瀉邪氣內經所謂邪氣盛則實精氣奪則虛此大法也神門命門人迎辨經脈別論篇曰食入於胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於腑府精神明留於四臟氣歸於權衡權衡以平氣口成寸以決死生又曰氣口者亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口蓋以氣口包括五臟六腑之總名也此氣口之所為寸口而人迎命門神門之脈又各有其經也氣口成寸之位烏可以容三脈之紊而三脈自有本位豈可以容牽合也哉脈要精微論篇有尺而附上上附上之分自是三部寸關尺之議本於此也脈經謂左手關前一分為人迎誤也愚嘗考之內經人迎診候乃是陽明胃脈位在結喉兩傍動脈是也靈樞五色篇曰人迎盛堅者傷於寒氣口盛堅者傷於食綱目釋謂氣口脈在兩手掌後手太陰之脈也人迎脈在結喉兩傍足陽明之脈也蓋謂胃為六腑之源故與氣口配診以知疾病之端龐安常論之詳矣茲不復贅考之神門脈內經有曰神門絶死不治神門為手少陰心經之動脈穴在掌後側寸之分與太淵相對脈經謂兩手尺前為神門誤也又以右尺為命門抑常考之命門在督脈十四椎下陷中兩腎之間與臍相對固為真元之根本性命之所關腎雖屬水而實有相火寓於其中太極所謂動者靜之基則是靜而生水者本也動而挾火者標也虞天民謂命門象門中棖闑司開闔之象惟其靜而闔涵養乎一陰之真水動而開鼓舞乎龍雷之相火水為常而火為變也可謂深得命門相火之旨者矣王氏牽合以配三焦之過而遂失其大經弊延後世無復覺焉豫自業醫問師心谷汪先生首以此語初尚未知深契深潛於茲二十餘年方有定見淵乎至哉經義昭然但學者不加察耳傳弊日久乖訛弗覺今驟語之而不入也故著脈訣辨妄以救之惟其釐革故習以沐新盤端有仗於同志君子人迎神門脈圖命門脈圖四時脈候玉機真藏篇曰脈從四時謂之可治脈弱以滑是有胃氣命曰易治取之以時春脈者肝也東方木也萬物之所以始生也故其氣來軟弱輕虛而滑端直以長曰弦反此者病其氣來實而強此謂太過病在外其氣來不實而微此謂不及病在中太過則令人善怒忽忽眩冒而巔疾不及則令人胸痛引背下則兩胠滿春以胃氣為本春胃微弦曰平弦多胃少曰肝病但弦無胃曰死胃而有毛曰秋病毛甚曰今病夏脈者心也南方火也萬物之所以盛長也故其氣來盛去衰曰鉤反此者病其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病在中太過則令人身熱膚痛為浸淫不及則令人煩心上見咳唾下為氣泄夏以胃氣為本夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死胃而有石曰冬病石甚曰今病秋脈者肺也西方金也萬物之所以收成也其氣來輕虛以浮來急去散曰毛反此者病其氣來毛而中央堅兩傍虛此謂太過病在外其氣來毛而微此謂不及病在中太過則令人逆氣而背痛不及則令人喘呼吸少氣而咳上氣出血下聞病音秋以胃氣為本秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死胃而有弦曰春病弦甚曰今病冬脈者腎也北方水也萬物之所以合藏也其氣來沉而搏曰石反此者病其氣來如彈石此謂太過病在外其去如數此謂不及病在中太過則令人解㑊脊痛而少氣不欲言不及則令人心懸如病飢䏚中清脊中痛少腹滿小便變冬以胃氣為本冬胃微石曰平石多胃少曰腎病但石無胃曰死石而有鉤曰夏病鉤甚曰今病脾脈者土也孤藏以灌四傍者也平脾脈來如雞踐地和柔相離其來如水之流此謂太過病在外如鳥之啄此謂不及病在中太過則令人四肢不舉不及則令人九竅不通長夏以胃氣為本胃惟軟弱曰平弱多胃少曰脾病但代無胃曰死軟弱有石曰冬病石甚曰今病脈逆四時為不可治必察四難而明告之所謂逆四時者春得肺脈夏得腎脈秋得心脈冬得脾脈其至皆懸絶沉澀者命曰逆四時未有臟形於春夏而脈沉澀秋冬而脈洪大名曰逆四時也凡脈順四時者謂春弦夏洪秋毛冬石中有和氣軟滑而長乃是不病之人也得病則易為治療蓋從和氣而生也用法萬痊如氣反脈逆形氣相失名曰不可治是形盛氣虛形虛氣盛故不可治也凡人形氣俱虛安穀者過期而死不安穀者不過期而死安穀謂飲食且進期是八節之氣候也雞峰方二十六脈主病浮脈主表證為風為虛為暑浮而散者心也浮而短澀者肺也浮而數者熱也浮數之脈應發熱反惡寒者瘡疽也左寸浮傷風發熱頭痛目眩左關浮腹脹左尺浮膀胱風熱小便赤澀右寸浮傷風喘咳清涕右關浮脾虛中滿右尺浮風燥下焦大腸祕結沉脈主裡證邪氣在臟也沉細為少氣沉滑為宿食沉而遲者為痼冷為寒氣痛也寸沉胸中停冷飲關沉脅痛尺沉腰寒足痛瘡疽得沉脈為邪氣深也難治潰後稍可治遲脈主氣血不足之證為寒為虛新病得之則正氣虛甚久病得之可治寸遲為氣短關遲為脾胃虛寒不食尺遲男子為腎虛便濁女子不月總為臟寒瀉泄小腹痛腰足重數主熱為火為瘡疽為煩渴為燥結浮數為表熱沉數為裡熱數而有力為實熱數而無力為燥數脈見於無病之時主有瘡毒寸數頭目之火關數為脾熱口臭胃火嘔逆目熱肝火所致尺數小便黃大便祕滑脈主痰氣痰嘔痰逆之證婦人太陰脈滑主有胎孕嘔吐平人脈滑以弱是有胃氣無病澀脈主不足之證為虛為傷精為敗血為耗氣寸澀為陽虛頭痛關澀為腹痛脾氣不運行而飲食不化尺澀為腳痹腰膝沉困無力以行女子脈澀無孕主血少有孕主胎痛虛為不足之脈血氣俱弱為飲食少為四肢倦為自汗盜汗寸虛為驚怖恍惚之證關虛為脾胃不食尺虛為腎水不足精滑之病實為有餘之脈實脈主氣壅食積內痛伏陽在內燥糞狂言平人脈大實主有痢疾來宜先下之平人脈實者不病病人脈實為邪氣盛經曰邪氣盛則實久病脈實者凶瘡疽人脈實者急下之以邪氣在裡故也洪脈主血實積熱之證為瘡瘍為燥熱為火盛為口乾渴大小便難平人脈洪大為病至宜先清利之細脈為不足之證為元氣虛為濡瀉為脫精為骨痿寒濕痰火病人脈細數者凶長脈主氣有餘為內實為身熱有汗傷寒得長脈欲汗而自解也長而緩者百病皆愈短脈主氣血不足為內虛為氣短不足以息為宿食壅滯為胃氣弱短則氣病諸病脈短皆難治為真氣不足故也緊脈主邪氣盛為諸痛浮緊身痛可汗之沉緊腹痛可下之緊亦主癖積凡緊多是痛與積緩脈為胃氣之脈主安和無病浮緩為風邪皮膚不仁中緩為胃氣平和凡病見緩脈為不治自愈諸病脈緩者將愈為胃氣回也促脈為陽獨盛而陰不能相和也為火熾為痰塞為怫鬱為血氣不疏通不已為瘡瘍發斑疹促為陽盛故也退者佳不退者危結脈為陰盛而陽不能入也為思慮過多為脾氣不充為宿食積滯為四肢不快為氣所妨陰凝則結代脈為一臟之氣絶不能動每至本臟一歇而餘臟代動此為元氣絶為必死之人也妊娠亦有代脈者此必二月餘之胎也痛甚之脈得之者不可準也牢脈沉而有力動而不移之名牢為元氣將絶者凶為氣喘息促為皮膚著腫為七情六極牢而疾為發熱牢而遲為發寒遲疾不常寒熱往來見牢脈者危弦脈為邪盛弦緩者平脈也弦緊者痛也弦脈主瘧主積寸弦為頭痛關弦為脅痛腹痛尺弦為疝痛革脈為不足沉伏實大如鼓皮曰革革易常度也為陰陽不交之否為崩為陷有妊為墜為脹滿為下脫為中風感濕之疾芤脈為不足為失血寸芤主吐衄血病關芤嘔血尺芤下血微脈為氣血不足久病人脈微易治平人脈微為虛微脈見者可補益寸微心虛少氣惡寒關微脾胃虛食少四肢乏力尺微為瀉泄少精崩漏弱脈為氣血不足猶愈於微脈弱脈見者亦宜補形氣盛而脈弱者危不爾為殃二脈皆不足也為虛之甚動脈為神氣不安主驚恐悸怖為脫血虛勞伏脈為積癖氣不通暢為宿食痞氣女人為癥瘕為真氣不行邪氣積伏濡脈為血氣不足之證為表虛多汗氣怯力乏濡瀉為傷濕寸濡驚悸關濡少食尺濡為泄下元氣虛憊統屬診法候病候病所在逐部診視合位應時軟滑者吉合位如肺應皮毛心應血脈脾應肌肉肝筋腎骨之類是也應時如春弦夏鉤秋毛冬石四季軟滑是也軟滑如經云脈弱以滑是有胃氣也病脈反之大小獨異上下之至異同候分統屬為式六部脈屬五臟應乎五行之氣氣同則合上達惟水不趨氣異俱有陰陽升降之義如左寸主心屬火氣同則合上炎氣異則分陰陽右寸主肺屬金氣同則合上光氣異則分明暗左關主肝屬木氣同則合上達氣異則分春秋右關主脾屬土氣同則合上升氣異則分寒溫兩尺主腎屬水氣同則合下流氣異則分溢覆故脈前後狀同統候兼主其一寸關病在前候兩尺病在後取如左寸前以候心後候膻中右寸前以候肺後候胸中左關前候肝膽後以候膈右關前以候胃後候脾宮兩尺前以候腎後候腹中之類是也前後之狀異者屬候歧之為二上至病在前候下至病在後位前後互見和乖乖病和平前後同中有異異者病擬如上下之至俱弦或弦兼澀則取兼澀之候為病前後強弱相同尤者之候病及前陽後陰候病陰降陽升前溢後覆出部升降仿此洪細長短濡芤滑澀統中未詳屬相出入統屬兼審浮沉虛實浮表經脈皮毛腠理四肢百節頭面背膂沉里口舌咽喉骨髓五臟六腑大便小水兩傍外內亦分表裡侵外身熱侵內積滯經云推而內之外而不內身有熱也推而外之內而不外有心腹積也是已虛為不足癢麻瀉痿實為有餘脹壅痛祕統常屬變法稽經旨附以管窺條陳大意汪氏診候統候浮以候表諸陽之位浮實為邪浮虛少氣浮盛按衰裡虛表實浮有按無無根之喻平人壽夭患者不起心肺浮盛風寒外郁左關脈浮腹脹溲澀右關脈浮胃虛停食肝腎並浮則為風水其脈自沉外證腹滿不喘曰石水沉以候里諸陰之位沉實為積沉虛少氣寸沉氣鬱尺沉本位喘嗽肺浮轉陷不吉肝腎並沉則為石水寸口脈沉滑者中有水氣面目腫大有熱或身體反腫而或惡風一身悉腫脈浮不渴續自汗出而無大熱者皆曰風水遲為陰盛氣血凝泣遲實為疼遲虛寒滯消中夏月沉遲俱忌寸遲少氣尺血不給數為陽盛氣血燔灼數實為熱數虛為躁浮數有力寒傷經絡浮數無力傷風痰嗽浮數振寒或脈時數身有痛處皆主癰作沉數有力實火內爍沉數無力虛勞為惡雜病初逢多宜補藥病退數存未足為樂數退證危真元以脫數按不鼓虛寒相搏微數禁灸洪數為火乍數乍疏魂歸岱嶽細數而虛虛勞陰弱兼沉骨蒸兼浮喘作加之嗽汗喉疼俱惡數候多凶勻健猶可惟宜小兒傷寒孕瘧左寸數兮惡吐頭疼數緊頭痛數虛口瘡數止腫毒數健為狂短數心痛洪數心煩右寸數兮肺金火爍數緊喉痛數滑喘嗽沉滑骨蒸夏逢難保左關數緊脅痛數止多因怒過數長渾身壯熱數弦則是肝火右關數兮口臭浮數易飢易飽左尺數而或止俱主赤尿淋濁數虛下部生瘡右尺數臨糞燥滑為血聚為妊為痰宿食水飲積熱食溢洪滑熱痰咳喘眩運一二部逢女妊可決但滑而散三月之胎短滑酒傷或為水逆脈弱以滑是有胃氣滑雜大小霍亂吐瀉秋逢浮滑兒扶易瘥沉滑反時逢冬永決滑數痰多肌消死例左寸短滑尺澀女人血崩右尺和滑為妊間滑阻月澀為血少敗血惡寒滯下遺精瀉利汗泄浮澀而短肺之本體浮澀惡寒沉澀腹疼緊澀為痹弦澀少血澀甚痰多最難扶濟數更細澀虛勞永決寸澀尺弦腹痛可決寸脈浮數尺澀下利血清沉弦細澀腹疼陰證之例實為氣壅脹痛嘔吐脈實而滿四逆頭熱春夏為順秋冬為逆左寸逢實心熱咽乾右寸逢實氣壅痰厥左關腹脹脅疼右關食難化克左尺小便澀難右尺熱凝糞結虛為虛候氣血耗散驚悸恍惚倦痿汗出虛大陽虛病屬內傷夏虛傷暑身熱汗泄輕按見虛隨位而別左寸昏運右寸下血左關眼花右關倦泄左尺陰痿右尺瀉作尺虛寸搏血崩可決肝腎並虛則死不治虛候宜補右氣左血浮陽沉陰尺寸仿例洪為熱候隨宜而制浮洪無力虛火宜益沉洪有力實火宜瀉洪緊癰疽洪長壯熱洪澀而弦謂之三克加以浮沉隨位而決浮洪沉小表強里怯浮細沉洪反推洪轉細兮病退砒傷洪數暴吐氣弱暮洪朝細服藥有效脈形今昨細洪互變老人六脈浮洪兩寸洪盛俱逆一部獨洪病推少壯逢洪可濟心微而肺洪盛左脅一點之疼心肝浮弦沉洪肩背痛因提挈肺脾浮洪沉澀食少腹膨浮細沉洪睡中汗出細為少氣不足之候前細後大氣短前大後細脫血六脈勻細男平而女懷胎洪細不調病忌瀉兼厥逆浮沉細為氣虛不足偏宜虛怯緊為疼候寒邪搏擊浮緊或澀兼之俱屬傷寒之始無汗寒熱鼻乾頭背俱疼強直左寸浮緊傷寒沉緊則為心氣右寸浮緊頭疼兼大痰鳴喘急沉緊滑為咳痰沉洪緊為喉痹左關浮緊筋疼沉緊脅疼寒鬱右關浮緊腹膨沉緊腹疼吐食尺逢浮緊䯒痛按澀則為耳閉沉緊溲澀腹疼細緊小腸疝氣緩為風熱膚頑痿痹洪緩濕熱細緩寒濕小兒風熱緩生急死浮緩傷風兼大同議自汗寒熱而鼽頭背俱疼而急寸逢浮緩左右俱主傷風左逢沉緩健忘右為短氣左關浮緩風運沉緩氣虛右關浮緩腹膨沉緩少食從容和緩為平尺逢浮緩足痿左尺沉緩溲頻月水多來右尺沉緩泄瀉腸風入胃長為氣治兼諸濡滑為平心長神全尺長期頤可卜老逢長濡壽悠急為胃氣不足浮洪而長顛狂熱深傷寒熱長陽明熱伏沉細而長為積高下須分左寸胸膈虛脹右寸痰鬱左關肝氣脅疼右關則屬脾胃兼洪傷於肉葷兼滑傷於酒冰兼澀雞腐所傷兼弦菜果之滯兼濡酒傷則瀉兼急腹疼左尺經水愆期右尺疝氣短為氣虛脹疼虛吐上短下長痛在頭頊下短上充清在腰足促為陽盛為狂為怒五積於中脈因而阻漸退則生漸進不救病後得之幽期甚速結為陰盛陽無所附浮結四肢浮腫沉結大便下紅一結一升再結二升浮沉結而侵內多陰少陽為蠱傷寒結代心悸虛故代為氣衰其死可卜宜於風家痛極妊婦牢為裡實胃氣不足脅痛疲癆脹滿氣促革為虛寒半産崩漏虛瀉失血精氣不固暴病可生久病命殂弦為氣斂癆瘧拘急積飲寒熱陰虛冷痹浮弦無力外傷風邪弦緊為寒弦緩為濕弦滑為痰弦細少氣春病無弦失主非宜秋深弦盛金虛木實弦狀多同土逢木抑弦急而散雜病不吉大抵十人九弦兼之濡滑為胃兼急則為疼痛兼洪則為火熾弦多胃少曰病但弦無胃曰死左浮弦澀夏與秋逢為瘧按之即滑熱多寒少奚疑弦兼洪盛先宜解邪散熱左關虛弱邪輕補劑方施左浮弦濡氣虛脊痛浮沉弦澀痰盛榮虧沉小弦澀虛汗無分盜自右洪弦急陰虛火旺難醫左寸浮弦沉大心氣之痛浮弦而大按澀癇發如癡右寸浮弦沉大病因痰火所為浮大虛為鼻窒兼弦頭痛有時左關逢弦須審浮沉之異浮陽沉陰內寒外熱之持浮陰沉陽寒熱及之右關浮弦胸膨噫氣浮弦按澀易飽易飢弦細倦眠浮弦急為砂發弦細而急肝之真臧形脾尺浮弦急下部為痛沉弦細澀陰證寒羈雙弦為飲並出而細左寸稀涎上溢關尺脅痛而推動為體疼勞驚崩瀉在陽出汗在陰發熱散為血耗表強里怯浮洪兼散夏月本體傷寒逢散證忌咳逆尋常散多非宜産後解索宜益伏因有積脈藏不出伏細少氣伏數熱厥左寸脈伏神不守舍右寸逢伏毒發寅午戌年關尺伏逢為積或因痛極芤為失血之候審位高低而出在上吐衄痰紅在下崩漏下血濡為氣虛之候表虛少氣為原左寸心驚噫氣左關體弱目昏左尺傷精陰痿小水頻數血崩右寸虛汗或為痔漏下血右關食積右尺虛瀉未寧微為血少之候不能沖灌其經六脈俱微産絶肝腎俱微同評左寸微盜汗右寸微惡寒左關微脅脹女微後患崩右關微積食尺微澀崩漏浮洪按微眇病者入幽冥在左遺精崩帶在右虛瀉腸鳴弱為虛候內傷血氣老人為宜少壯為忌左寸逢弱盜汗心悸右寸逢弱身疼短氣左關弱兮筋痿右關弱兮停食左尺逢弱骨髓浮頻右尺逢弱臨晚熱至汪氏診法屬候左寸前候乎心心司血脈汗舌其診浮滑頭痛眩運多痰浮滑而洪女子懷孕可決浮短浮洪浮弦細急頭痛浮澀頭運惡寒兼而同例浮兼三克三克見洪條下余並同頭運有痰沉濡澀弦憂氣鬱結沉洪口渴沉滑心熱痰涎沉細溢前心膈虛膨宜益沉澀或兼之弦沉短與芤汗出沉短大澀虛煩不眠三克而沉口乾上熱左寸後候膻中宗氣浮澀或並其弦臂臑惡寒浮遲三克臂疼沉逢心惕沉澀或並其弦或短或芤驚悸沉滑沉洪掌心熱鬱右寸前以候肺皮腠氣喉背鼻診之浮滑頭目眩運多痰浮澀兼弦頭痛惡寒同擬浮洪或溢頭疼痰火升騰浮弦溢前氣少背肩脹急浮兼三克鼻崩浮短頭疼虛議浮洪而緊牙痛按虛下紅年高咳逆肺洪其死可必頭痛浮細而堅虛汗浮細無力沉洪痰熱沉細而滑骨蒸三克兼沉咳嗽痰紅火熾沉滑兼短兼洪沉澀或弦參入沉短俱主咳痰惟短兼諸少氣右寸後候胸中上焦輸氣之位診之浮澀或弦胸膺劃痛沉短或兼諸滑沉澀短氣沉弦洪澀為痰沉洪足熱糞祕左關前位肝膽血筋目脅之司脈常見澀日後患風預決春逢浮澀秋來為病先知浮洪或參弦澀俱為目疼浮洪長為壯熱肝火之熙溢主頭疼目眩女懷淫欲之思浮澀或兼弦浮洪無力浮兼滑小短六候弦推浮細澀弦急膝髓強直沉滑或弦雜眩運奚疑沉澀或弦並至俱為脅脹沉弦細澀麻木作於四肢沉洪體疼浮熱細長左積無疑左關後以候膈中焦生髮之機浮澀或弦並至俱為偏墜沉澀或弦並至膈脹有時沉澀洪弦膈熱沉短膈脹虛推右關前候胃府納受飲食之職其脈浮兼有六溢短洪細滑澀加之浮小澀弦惡噦須分虛實浮澀弦大面熱浮滑按澀食滯沉澀或參乎弦沉短與之弱澀沉小食少嘔吐沉短口淡無味沉短滑為酒傷芤見吐紅傷胃浮弦沉大喜飢洪虛晚熱來去沉澀弦大所兼有異兼虛腹脹兼實消食沉短澀微胃口積疼沉小澀弦噫氣胸痞右關後候乃脾之使脾司運化四肢血氣其脈浮弦細澀寒傷於脾浮澀或並其弦惡寒失衛小澀弱易飢飽沉洪實易消食沉小虛弦體熱沉短氣之不給沉澀弦大食泄芤為痰紅甚則利崩下缺因虛瀉注兩尺前以候腎腰耳瞳精骨髓其應浮澀浮弦而澀耳無聞浮短脛清浮滑而弦腰膝直沉弦大或兼澀洪虛口乾飲水沉急沉澀腰疼緩細腰重傷濕弱短弱澀耳鳴芤見不能久視兩尺後之浮位以候下部足䯒應指浮澀或弦兼足清麻木浮弦小急或浮緊俱為膝疼浮弦滿澀腳氣浮短足難遠行右逢浮小短澀肛門痔漏為急左尺後沉候腹下焦小膀前陰應指沉短沉澀間參弦至遺精白帶老人小水頻頻妊逢沉澀則為胎漏芤為莖衄弱滑陰疼至於沉滑沉大或兼弦澀微為尿赤甚為小便濁淋沉細陰囊濕癢小水頻數兼耎偏墜兼之長覆經凝短弱小便後小腹虛疼沉弦澀侵內小腹血瘕右尺後沉候腹後陰大府之關指下沉澀而或兼弦兼大沉洪而健俱為大便燥艱沉小或兼弦俱為糞溏沉弦洪無力溏結相參沉澀無力虛瀉宜固沉逢三克瀉因食傷沉滑洪滑熱利初興宜下沉短而澀久痢宜補脾鄉沉短短滑與微俱為下血長覆為疝弱澀失氣亡陽統屬更僕難盡姑且舉其二三診家常變之要幸勿視為迂談汪氏診法脈分三部主病夫診脈之道醫者之難精也若非燈下苦心勤於記誦參師訪友晝夜不遑造次顛沛寤寐俯仰存心於此安能知神聖之妙哉古人曰按其脈知其疾命曰神其探賾索隱之妙也又曰切其脈治其病謂之巧以明其指別之功也蓋三指相去毫釐之近主病若千里之遠觀夫指別之功也世人固以為難命曰神豈容易可至哉常睹於經脈有三部寸關尺也從魚際至高骨卻行一寸曰寸從寸一分曰魚際從寸至尺曰尺澤尺前寸後為關關前為陽則寸口也關後為陰則尺脈也陰入陽出以關為界寸主上焦頭首皮毛關主中焦脅腹及腰尺主下焦小腹及足此三部所主之大略也左手關前心之部也左手當關肝之部也左手關後腎之部也右手關前肺之部也右手關上脾之部也右手關後亦腎部也此六部原與脈訣臟腑配診相同今遵內經診候故刪其府之配也六部脈候各按四時而有胃氣命曰平人平人者不病之謂也蓋平人之常氣稟於胃胃者平人之常氣也所以人常稟氣於胃故脈以胃氣為本也蔡西山曰有胃氣之脈不大不小不長不短不滑不澀不浮不沉不遲不疾意思欣欣難以名狀此胃氣之脈也反此者病經曰察色按脈先別陰陽蓋陰陽者天地之道也是以治病者必求其本本為陰陽四時寒暑五臟之根也以脈言之則浮沉也以部言之則尺寸也故經六脈者陰陽之法以應五臟是謂呼出心與肺吸入腎與肝呼吸之間脾受穀味其脈在中也以浮沉論之則曰浮者陽也沉者陰也在臟腑則浮而大散者心也浮而短澀者肺也所以心肺俱浮也牢而長者肝也按之而大舉指來實者腎也所以肝腎俱沉也遲緩而長者脾也脾為中州所以脈在中也仲景曰脈浮數動滑皆陽也沉澀弱弦微皆陰也陽者熱也陰者寒也所以寒則脈來遲而沉熱則脈來浮而數故曰諸數為熱諸遲為寒無如此驗也脈經曰諸浮為風諸緊為痛諸伏為聚諸弦為飲芤者失血長則氣治短則氣病數則煩心大則病進浮為在表沉為在裡遲為諸寒數為諸熱形壯脈細少氣不足以息者危形瘦脈大胸中多氣者死形氣相得者生三五不調者病三部九候皆相失者死此先聖診脈之大法故曰凡治病則察其形氣色澤治之無失其時也所以形氣相得者生色澤以浮者病易已脈從四時者可治脈弱以滑者是有胃氣此皆易治也若形色相失色不澤及脈逆四時或脈實益堅皆不可治所謂必察四難而明告之又若病熱脈靜瀉而脈大脫血而脈實汗後脈躁此皆難治也若瘡疽之人膿血大瀉脈滑數者難治也若患肺癰喘咳膿血脈見洪滑治之難痊脈洪數應當發熱而反惡寒頭項拘急四肢煩痛或復戰栗渴甚者但有痛處必發瘡腫也精義脈形氣逆順大凡診脈先定四時之脈便取太過不及虛實冷熱寒溫至數損益陰陽盛衰五行生剋臟腑所屬以為大法然後取其人之形神長短肥瘦氣候虛實盛衰性氣高下布衣血食老幼強弱但順形神四時五行氣候無過者生之本其形氣與五行相反者危脈有懸絶者死不治肥人脈細小如絲欲絶者死羸人得躁脈者死人身澀而脈往來滑者死人身滑而脈往來澀者死人身小而脈往來大者死人身大而脈往來小者死人身短而脈往來長者死人身長而脈往來短者死脈病逆順岐伯曰凡人形瘦脈大胸中多氣者死形盛脈細少氣不足以息者危形氣相得者生三五不調者病人有強弱盛衰之不等而脈實應焉脈有陰陽虛實之不同而病實應焉脈病形證相應而不相反每萬舉而萬全少有乖張良工不能施其巧矣故脈之於病各有所宜有宜大宜小宜浮宜沉有不宜大不宜小不宜浮不宜沉為醫不可以不早辨也仁齋直指左有病而右痛右有病而左痛上有病而下痛下有病而上痛此為逆逆者死不可治腹脹病脈浮大者生沉小者死壯熱脈浮大者生沉微者死癲癇脈亦然譫語脈洪大者生厥逆而脈微者死暴忤脈實大者生而虛弱伏細者死中毒脈洪大緊急者生微細而不齊者危頭痛脈浮大者安短澀者危痢疾脈微細者生洪大者死吐血發熱脈洪大者生細微者死不發熱細小者生洪大者危傷寒發熱後脈沉靜者安洪大而躁者危自汗脈虛細者安躁盛者危厥逆之脈沉澀者生浮大者危諸失血脈小弱者生洪大者危久病脈細軟者生洪大者危瀉泄脈微細者生浮大者危産後脈微小者生洪大而數者危中風口噤脈浮遲而靜者生洪數而氣粗者死上氣喘急面目俱浮脈浮滑手足溫者生脈澀而四肢厥者死瘡疽脈洪大者生沉細者危既潰脈靜者安潰後洪大者危陽病得陰脈陰病得陽脈皆死消渴脈數大者生虛細者死霍亂之脈浮洪者生虛細者死六部平脈浮大而散心之平弦而長肝之平按至骨舉指來疾而實者腎之平也肺平浮而澀脾胃平緩而滿指凡診脈下指本部不平便可尋詳病情矣醫通脈有陰陽乘伏難經云脈有伏匿然謂陰陽更相乘更相伏也脈居陰部而反陽脈見者為陽乘陰也脈雖時沉澀而短此為陽中伏陰也脈居陽部而反陰脈見者為陰乘陽也脈雖時浮滑而長此謂陰中伏陽脈有重陰重陽脫陰脫陽難經云顛狂之脈三部陰陽俱盛是也又云重陽者狂重陰者顛脫陽者見鬼脫陰者目盲重陰重陽是寸愈盛而尺愈盛脫陰脫陽是寸至微而尺至微奇經八脈為病兩手脈浮之俱有陽沉之俱有陰陰陽皆實盛者此為沖督之脈也沖督之脈者十二經之道路也沖督用事則十二經不復朝於寸口其人皆若恍惚狐疑不省必當猶豫而兩心也兩手陽脈浮而細微綿綿不可知俱有陰脈亦復細綿綿此為陰蹺陽蹺之脈也此人曾有病鬼魅風死若恍惚亡人為禍也尺寸脈俱浮直上直下此為督脈腰背強直不得俯仰大人顛病小兒風癇疾尺寸脈俱牢直上直下此為衝脈胸中有病寒疝也二十九難曰奇經為病何如而然陽維維於陽陰維維於陰陰陽不能自相維則悵然失志溶溶不能自收持陰蹺為病陽緩而陰急陽蹺為病陰緩而陽急沖之為病逆氣而裡急督脈為病脊強而厥任之為病其內苦結男子為七疝女子為瘕聚帶之為病腹滿腰溶溶若坐水中陽維為病苦寒熱陰維為病苦心痛此奇經八脈之為病也促結代脈辨仲景云脈來緩緩當作遲時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還此動而中止復來代也得此脈者必難治自還者此動而中止復來數於前動也不能自還者動而中止復來如前動同而不數也故有結脈者有促脈者有代脈者結者陰也陰盛則結脈來緩時一止復來曰結主胸滿煩躁促者陽也陽盛則促脈來數時一止復來曰促主積聚氣痞憂思所成大抵結促之脈雖時一止為病脈非死也惟代者真死矣往來緩動中止不能自還周而復動名曰代也代者死也仲景傷寒論云脈促代心悸動炙甘草湯主之高陽生脈訣假名高陽生五代時人著脈訣歌括托為王氏叔和而今本雜以潔古傷寒脈入式歌又被熊宗立妄注大為俗學之惑叔和晉人也自有脈經尚復抵牾大段古書難盡信也脈家書甚多當以內經為主滑氏診家樞要以浮沉遲數滑澀六者為提綱余補以有力無力二者丹溪以血氣痰火為病之提綱則脈滑在血分而有餘為痰凡有形者從之澀在氣分而有餘為火凡無形者從之浮在表沉在裡遲為寒數為熱有力為實無力為虛執此提綱脈可得而明矣醫通脈大必痛進説內經脈要精微篇曰脈大則病進丹溪云脈血之所為屬陰大洪之名火之象屬陽其病得之於內傷者陰虛為陽所乘故脈大當作虛治之其病得於外傷者邪客於經脈亦大當作邪勝治之合二者觀之皆病證方長之勢也謂之病進不亦宜乎格致餘論甫按脈大則病進脈之大者乃邪氣之盛也邪氣盛則正氣虛可知矣先是正氣虛弱然後邪氣得以乘之而恣其盛大之勢脈為氣血之精華果無邪氣相干則自雍容和緩如蔡西山之所謂意思欣欣難以名狀今脈之大者謂其大而過於尋常疇昔之時故知其為邪氣所乘也人雖病之未形而邪已形於脈中所以逆知病之必進也為治之計當先急則治其標發散邪氣隨後調其正氣庶幾可矣丹溪謂內傷者陽所乘外感者邪客經似以既病而言非為未病而進之謂也又謂脈血之所為屬陰經曰濁氣歸心淫精於脈舉要云脈不自行隨氣而至可見脈亦不可外氣而為言也王海藏云君兼臣權尤其曲説丹溪醫之哲也甫何敢辨姑言之以俟知者脈法部位表裡虛實主病提綱浮以候表沉以候里虛則病虛實則邪實各部所司病宜分治寸脈候上心肺之位關脈候中肝脾之地尺脈候下膀胱腎水大腸小腸皆在於內左寸脈候表虛主病浮而無力主表虛自汗腠理不固寒氣不衛惡寒寒戰惡風表實主病浮而有力主表邪盛頭痛發熱目眥赤澀身疼或口乾裡虛主病沉而無力主裡虛悸怖驚恐惡人聲精神恍惚健忘夜不寐裡實主病沉而有力為裡實心煩而躁內熱夢遺惡熱口渴顛狂譫語左關脈候表虛主病浮而無力主表證目視不明目生花表實主病浮而有力表邪證主脅痛腹脹目痛目脹裡虛主病沉而無力主裡虛為驚恐為血痹為多疑為猶豫裡實主病沉而有力里邪實主肥氣主多怒為筋急或疝痛左尺脈候表虛主病浮而無力主表虛為盜汗為耳聾膀胱癃小便短表實主病浮而有力表邪實為淋瀝小便難便赤便濁裡虛主病沉而無力裡虛證為精冷不固為足寒為腰冷腰重裡實主病沉而有力裡實證為腎氣盛陰旺腰痛膝痹疝痛左睪丸偏大右寸脈候表虛主病浮而無力表虛證自汗惡寒惡風皮膚瘙癢背惡寒噴嚏流清涕表實主病浮而有力表實邪盛為發熱頭痛頭風眩運裡虛主病沉而無力主裡虛為氣短不續為寒嗽虛喘吐清痰裡實主病沉而有力里邪盛咳嗽有痰積老痰咳吐不出氣壅喘甚右關脈候表虛主病浮而無力主表虛四肢不舉倦怠嗜臥或面目浮腫表實主病浮而有力主表實主腹脹胸膈痞滿裡虛主病沉而無力主裡虛胃寒惡食泄瀉噁心嘔吐翻胃裡實主病沉而有力里邪盛寒積宿食有陳積右尺脈候表虛主病浮而無力與左同表實主病浮而有力主腸風風痹耳鳴裡虛主病沉而無力主腎虛腰重如帶五千錢腎水不足腰痹不能轉搖裡實主病沉而有力主寒疝痛腰痛或為痢積七情脈七情之脈內傷五志喜則脈緩悲短憂澀思結恐沉驚動怒急七脈宜先審而處妊娠脈妊脈緊滑見於右關或吐傷損他部相參診之左脈或一部或二部之洪滑六脈相等或尺旺或中衝而悠洋男女之別須審陰陽右肺盛陰狀多俱主弄瓦左尺盛陽狀多俱主弄璋右關微弱與數胎防有損胎漏若逢右革必墮堪傷欲産脈歇至或洪或細臨生右關弱宜施補湯脈證相反脈證相反醫不可治春夏浮澀秋冬浮大老人太過少壯不及心痛脾疼失血瀉痢中惡金瘡浮洪俱忌傷寒熱病腹滿水氣中毒發狂沉細不吉産後潰癰俱嫌洪實咳嗽沉伏虛痛搏指喘急細微痿痹緊急中病脈堅外病脈澀汗出脈盛頭痛短澀虛勞心數風家脾緩霍亂吐瀉脈微而澀人瘦脈大有喘形盛脈微短氣更有傷寒陽病而脈逢陰二周寸陷厥利而脈不至脈微厥冷煩躁脈遲而反消食脈證似反脈證似反非反因之而變無傷極實而有羸狀寒濕痓脈沉細極虛而有盛候虛脈大而無常病虛脈細因服寒涼而搏指陰虛出汗誤服參耆而脈強傷寒糞祕脈遲胃實宜下痛風兼祕何妨人脈不應人脈不應以證參詳人病而無惡證脈和終吉人安而有惡脈病屬膏肓各部不勝脈各部不勝藏屬求之左關浮澀左尺沉微右寸洪數尺中緩遲右關弦急本病非宜勝負扶抑脈概論不勝春弦澀欺澀弦氣等病作秋時無弦春病無氣死推更有兼其所勝春弦而緩相持氣多為平氣少長夏為病無弦春病無氣可知死期春弦鉤扶易愈春弦滑抑退遲勝負扶抑偶舉可知平人止脈平人脈止年支參究年支三合猶立鼎足申子辰水土為之附巳酉醜金亥卯未水寅午戌火五行四局次審年支三合所屬屬部逢止是臟不足死於不勝之年月支不勝有五假如申年腎止子年六月不祿真臟止脈真臟止脈斯為不及大衍數推死期有異蓋脈之動五臟之氣應之合乎先天五行生數之序法以水一火二木三金四土五五至為臟一周十周大衍數備五十無止臟氣俱平五十中止一臟無氣止數有常死期可擬數止之法從止數起凡五為周不及求止當其數而止者所應之臟氣衰至於自旺日乾不能自旺而死無脈侯無脈之候所因不一久病無脈氣絶者死暴病無脈氣鬱可治傷寒痛風痰積經閉憂驚所傷關格吐利氣運不應斯皆勿忌南北政脈不應南北之政先立其年干分五運支立司天土運甲己金運乙庚水運丙辛木運丁壬火運戊癸土君余臣司天分例六化圖推少陽之右陽明治之陽明之右太陽治之太陽之右厥陰治之厥陰之右少陰治之少陰之右太陰治之子午之上少陰治之丑未之上太陰治之寅申之上少陽治之卯酉之上陽明治之辰戌之上太陽治之巳亥之上厥陰治之當歲年支司天移當中位為基南政司天在寸北政司天在尺南政甲己土運喻君位坎面離少陰司天兩寸不應少陰在泉兩尺不應三陰在左則左不應三陰在右則右不應左右尺寸少陰為定北政乙庚丙辛丁壬戊癸喻之臣輔位南面北居卑少陰司天兩尺不應少陰在泉兩寸不應左右同前之應脈無沉細俱宜諸脈不應反診較之經文諸不應反其診則見矣王注反診謂覆手診之以沉為浮以大為細非其理也尺寸反死歲當陰脈在寸反見於尺尺之陽脈而移於寸歲當陰脈在尺反見於寸寸之陽脈而移於尺尺寸相反主死子午卯酉四年有之陰陽交危歲當陰脈在左反見於右右之陽脈而移於左歲當陰脈在右反見於左左之陽脈而移於右左右相交主死寅申巳亥辰戌丑未八年有之歌曰南政寸上尺居下北政尺上寸下推三陰司天不應上在泉於下不應之太陰須診左寸尺厥陰右手尺寸持少陰脈兼兩寸尺此理微妙誠難知南北政脈不應須參看運氣易覽為詳明矣天氣六化之圖南北政圖五逆脈靈樞五禁篇曰熱病脈靜汗已出脈盛躁是一逆也病泄脈洪大是二逆也著痹不移䐃肉破身熱脈偏絶是三道也淫而奪形身熱色夭然白及後下血衃血衃篤重是四逆也寒熱奪形脈堅搏是謂五逆也犯五逆者為不治玉版篇曰腹脹身熱脈大是一逆也腹鳴而滿四肢清泄其脈大是二逆也衄而不止脈大是三逆也咳且溲血脫形其脈小徑是四逆也咳而脫形身熱脈小以疾是謂五逆如是者不過十五日而死矣其腹大脹四末清脫形泄甚是一逆也腹脹便血其脈大時絶是二逆也咳溲血形肉脫脈搏是三逆也嘔血胸滿引背脈小而疾是四逆也咳嘔腹脹且飧泄其脈絶是五逆也如是者不及一時而死矣工不察此者而刺之是謂逆治六絶脈其經病其脈絶者死衝陽絶死不治足陽明胃經脈在足大指後陷中有動脈應指是也尺澤絶死不治手太陰肺經脈在手臂曲紋陷中有動脈應指是也天府絶死不治手太陰肺經脈在手臂內肩顒下有動脈應指是也太衝絶死不治足厥陰肝經脈在足內大指後二寸動脈應指是神門絶死不治手少陰心經脈在手掌內側有動脈應指是也太溪絶死不治足少陰腎經脈在足內踝骨下有動脈應指者是也七死脈彈石脈在筋肉間按舉劈劈然腎絶也雀啄脈如雀之啄食連連湊指忽然止絶良久復來屋漏脈如殘漏之下良久一滴濺起無力啄漏二脈皆脾胃衰弱之絶脈也解索脈指下散亂無復次序蝦遊脈在皮膚始則冉冉不動少焉而去久之倏而復來魚翔脈其脈本不動而未強搖釜沸脈在皮膚有出無入湧湧如羹上之波皆死脈也至脈損脈死期脈候脈經云熱病脈四至三日死矣脈四至無病人一至病人脈四至也熱病脈五至一日死矣時一大至半日死矣忽忽悶亂者死熱病脈六至半日死矣急疾大至有頃死熱病脈四損三日死所謂四損無病人四至病人脈一至名曰四損熱病脈五損一日死所謂五損無病人脈五至病人脈一至名曰五損熱病脈六損一時死所謂六損無病人脈六至病人一至名曰六損若絶不至或久乃至立死久病死期候久病反候春沉夏微秋洪冬浮過時命終尺脈上不至關陰絶死於春夏寸脈下不至關陽絶死於秋冬虛數死期候細數無力虛勞非宜數而有間月斷死期獨審盛衰三合相欺三合見前如心獨盛申子辰危數而無間日斷死期旬余之內如月而推死脈總類帝曰見真藏曰死何也岐伯曰五臟皆稟氣於胃胃者五臟之本也藏氣者不能自致於手太陰必因於胃氣乃致於手太陰也故五臟各以其時自為而致於手太陰也故邪勝者精氣衰也故病甚者胃氣不能與之俱致於手太陰故真藏之氣獨見者病勝藏也故曰死人以水穀為本故人絶水穀則死脈無胃氣者死所謂無胃氣者但得真藏脈不見胃氣也所謂陰者真藏也見則為敗敗必死也凡持真脈之藏脈者肝至懸絶急十八日死心至懸絶九日死肺至懸絶十二日死腎至懸絶七日死脾至懸絶四日死三陰俱搏二十日夜半死二陰俱搏十三日夕時死一陰俱搏十日平旦死所謂真藏脈見皆死也真肝脈至中外急如循刀刃責責然如按琴瑟弦色青白不澤毛折乃死真心脈至堅而搏如循薏苡子纍纍然色赤黑不澤毛折乃死真脾脈至弱而乍疏乍數色黃青不澤毛折乃死真肺脈至大而虛如以毛羽中人膚色白赤不澤毛折乃死真腎脈至搏而絶如指彈石辟辟然色黃黑不澤毛折乃死諸真藏脈見皆死不治也玉機真藏篇曰五臟受氣於其所生傳之於其所勝氣舍於其所生死於其所不勝病之且死必先傳行至其所不勝病乃死此氣之逆行也故死肝受氣於心傳之於脾氣舍於腎至肺而死緩者秋死急者庚辛日及日脯死也心受氣於脾傳之於肺氣舍於肝至腎而死緩者冬死急者壬癸日及夜半死也脾受氣於肺傳之於腎氣舍於心至肝而死緩者春死急者甲乙日及朝死也肺受氣於腎傳之於肝氣舍於脾至心而死緩者夏死急者丙丁日及日中死也腎受氣於肝傳之於心氣舍於肺至脾而死緩者長夏死急者戊己日及辰戌丑未日死也此皆逆死也一日一夜五分之此所以占生死之早暮也大骨枯稿大肉陷下胸中氣滿喘息不便內痛引肩項期一月死真藏見乃豫之期日大骨枯稿大肉陷下胸中氣滿喘息不便內痛引肩項身熱脫肉破䐃真藏見十月之內死大骨枯稿大肉陷下肩髓肉消動作益衰真藏來見期一歲死大骨枯稿大肉陷下胸中氣滿心中不便肩項身熱破䐃肉脫目眶陷真藏見目不見人立死其見人者至其所不勝之時則死急虛身中卒至五臟絶閉脈道不通氣不往來譬於墮溺不可為期其脈絶不來若人一息五六至其形肉不脫真藏雖不見猶死也三部九候皆相失者死上下左右之脈相應如參舂者病甚上下左右之脈相失不可數者死中部之候雖獨調衆臟相失者死中部之候相減者死目眶內陷者死肉脫身不去者死乍疏乍數者死真藏見形者勝死形氣相得者生三五不調者病以左手足上上去踝五寸按之庶右手足當踝而彈之其應過五寸以上蠕蠕然者不病其應疾中手渾渾然者病中手徐徐然者病其應上不能至五寸彈之不應者死形肉已脫九候雖調猶死形盛脈細少氣不足以息者危形瘦脈大胸中多氣者死脈無胃氣曰逆逆則死肝見庚辛死心見壬癸死肺見丙丁死腎見戊己死脾見甲乙死渾渾革至如湧泉病進而色弊綿綿其去如弦絶者死脈如轉豆者死脈如偃刀者死脈湧湧不去者死脈忽去忽來暫止復來者死脈中侈者死脈分絶者死轉豆者為心真藏脈偃刀者為肝真藏脈忽去忽來者為脾真藏脈也三部脈如釜中湯沸朝得暮死半夜得日中死日中得半夜死九候之脈皆沉細懸絶者為陰主冬故以夜半死盛躁喘數者為陽主夏故以日中死寒熱病者以平旦死熱中及熱病者以日中死病風者以日夕死病水者以夜半死其脈乍疏乍數乍遲乍疾日乘四季者死脈浮而滑身汗如油喘息不休水漿不入身體不仁乍靜乍喘者死汗出發潤喘不休肺氣絶也主死陽病獨留體如煙燻直視搖頭口不能言心先絶也唇吻青四肢濈濈汗出肝先絶也環口黧黑虛汗發黃脾先絶也身熱喘粗見陰而多躁者死頭目痛卒視無見者死三部脈緊盛大汗出不解者死陰陽尺寸俱虛者死溫病汗不出出不至足者死溫病禳禳大熱脈細小者死咳而脫形發熱脈堅急者死皮肉著骨者死髮直如麻者死口臭不可近者死熱病七八日當汗不得汗脈絶者死面無光牙齒黑者死舌卷卵縮者死目不回直視一日死陰結陽絶目精脫恍惚者死陰陽竭絶目眶陷者死遺尿不知者死口如魚口不能閉而氣出多不及者死肛門如竹筒大便不禁不知者死病人臥有邊不寧者死吐痰如蟹沫者死面腫色蒼黑者死表裡俱病者死病已汗身體不涼加喘瀉者死病久妄言及不能言者不治熱病者可治病人陰陽俱絶撮空摸衣者死汗出不流舌卷黑者死發與肩衝起者死病人爪甲青者死病人爪甲白者不治病人脈絶口張足腫者五日死病人足跗上腫兩膝大如斗者十日死病人陰囊及莖腫者死病人爪甲及肉黑者八日死
