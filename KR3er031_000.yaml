front:
  text: 序予嘗謂造化者萬物之司命君人者三才之司命典校者文章之司命將帥者三軍之司命而醫也者又自天子以至庶人者之司命也其所關係豈淺鮮哉故先儒有云不明五運六氣檢遍方書何濟不明十二經絡開口動手便錯而孫思邈亦曰不明陰陽者不足謂之太醫旨哉斯言誠業是業者所當深切究心者也予獨怪今時之醫始無見理之明終無應變之巧務奇詭者或遠慕而近遺局方書者或舉一而廢百此虛實損益之間不免毫釐千里之謬而醫之禍人不為少矣亶其然者則考索未精體玩未熟與聞見之未廣耳新安徐東皋氏潛心斯道者殆三十年其活人不可以千萬計嘗謂予曰醫之精髓奧竅內經一書備之嗣是人殊代異門徑雖多要不能出乎此譬諸峙者皆山而泰岳則其宗也流者皆水而滄溟則其元也然自非綜博千古參伍諸家旁搜曲證又烏知內經有兼總條貫之妙耶此醫統之編所以不容已也予取而讀之見其條分縷析隨論折衷如綱之在網如領之在裘俾學子一舉而免顛倒紊亂之弊題之曰古今醫統是真能會百家之異同接軒岐之正脈雖謂此書之外無醫可也昔仲尼集群聖之大成朱子集諸儒之大成若徐君亦可謂集醫家之大成矣所以登斯世斯民於春臺壽域之中厥功固不偉歟雖然下學可以言傳上達必由心悟徐君以明醫重京師齊驅襄扁奴僕劉張無險夷難易隨試而輒效者則運用之妙存乎一心而醫統又其緒餘也是在學者之自得焉耳知言者以為何如欽差提督漕運鎮守淮安地方總兵官太子太保靈璧侯古濠湯世隆撰序古今醫統四十帙釐為百卷祁徐君春甫所裒輯上自太昊炎黃迄於我明本原醫經藥品禁方諸名家論著旁及經史國典諸雜家言凡二百七十餘家二百八十餘部區別類從鉅纖畢舉斯已勤矣徐君為人誠一長者操術慎而用志精其為醫先調護而後攻伐不捷出以為奇不亟效以為快遨遊諸公卿間雖綿疴沉痼能終任之迄以無害庶幾哉孔子所謂有恆者乎故其博考遠稽折衷辨正若斯之勤也余讀諸史藝文志醫家者流為書無慮數百種蓋其詳哉然古經微義逸者過半而新義鑿說日益多始學眩亂莫適為準又古文玄奧驟難句讀於是竊取晚近以偶幸一中而軒岐諸書往往束而不觀即號稱名醫間叩以運氣脈候及俞穴所居輒愕眙口噤夫醫非小道也立生民之命贊天地之功其惟醫乎古聖代作辨百藥性味自神農原百病起愈自軒帝制湯液匕劑自伊尹乃其傳自內經內經衍於秦越人為八十一難漢興倉公傳其學史稱脈書即內經藥論者本草也下及南陽仲景益著蓋徐君有言譬之儒家內經尚矣斯醫之六經乎本草其爾雅也南陽河間東垣其四子書也惟是六七家言是謂本業儒不習本業不可為儒醫不習本業不可為醫今世祖難經脈訣與內經等宗高平義烏與南陽諸家等徐君不然獨違眾而發其謬謂今醫學壞於難經脈訣難經所引多非素問靈樞本文而意旨相矛盾脈訣誤以大小腸屬兩寸而下部臟脈乃越關而上此皆後人所託名甚非秦越人王叔和之本書然脈訣之謬本叔和脈經啟之夫脈誤則證治未有不誤者故世宗高平非也彥修誦法南陽河間東垣能讀三家書而不知合變蓋其用藥執泥如士人用帖括耳故世泥義烏亦非也大都徐君上下數千載一準於內經以律諸名家合經者宗之悖經者斥之故其書首內經要旨次羽冀內經者次脈候次運氣次經穴次針灸然後及內外諸證治婦女老弱奇病秘方為說甚具而以本草集略及養生家言終焉要在明內經之旨正炎黃之統使軒岐問答千古如存其他解肌搦髓揲荒爪幕浣胃滌臟神術也存而不論巫祝馬鈐楮書高訣趙要彭編異說也削而不錄總統百家以歸內經此徐君醫統之所為作也蓋有恆者之效也賜進士詹事府詹事兼翰林院侍讀學士前太常寺卿兩京國子監祭酒司經局洗馬經筵日講官知起居注同修國史會典副總裁郡人穎陽許國書序天下之治方術者亦異於古之道矣古者人專師師專法累功而就業歷試而嘗效故挾策寡而取用宏彼精於己無藉於外也乃後世不然矣臨病而考治按方而索功彼之不效而此之是求嗟嗟以余觀於今天下盡然而獨醫乎古者人專師師專法師秘而不忍傳學者久而後可得然且齋戒以將之盟誓以信之誠而聽之終而守之其治人也一意攝志罔敢二三故病者之聽夫醫猶聽神明正反從逆惟其所用至割皮解肌浣腸刳骨不惜醫誠良而聽之誠是也今醫師遍天下而不攻學者亟求食而不能盡其術病者疑信半而姑聽命焉而又以好全惡危之心待之病非在皮膚而效求於旦夕旦不效旦更夕不效夕更而醫不敢聚毒以盡其技況敢言割皮解肌浣腸刳骨之難乎故天下不尊醫而醫亦不自尊急而求醫醫亦急而求術夫然後貴於蓄方曰吾其方非吾方上古聖人之方故病者即不信醫信上古聖人而醫亦不至妄投一劑以禍天下故古之藝精而試今之藝試而精古之人法治病今之人病合法古之法宜簡今之法宜繁亦勢然已徐君之作醫統也上自黃帝岐伯俞跗和緩倉扁和佗叔和仲景之書下逮曲巷小師之技裒稸欲盡一病而狀百變一藥而效百試此之一法而又有彼之一法者存使天下之治方術者就資而就給精思而慎發借無十全亦寡失耳故余謂徐君有功於今也徐君新安人名春甫合為太醫之官太師成國朱公客之公卿皆名其術始徐君行四方挾書多其在京師會國家有大編摩公卿得觀秘書故聚方滋富然徐君所治病有妙巧病已輒自紀所以治滿幾合矣而未嘗膠方此長安所以名徐君哉賜進士翰林院國史檢討纂修世宗實錄從仕郎句甬蛟門沈一貫撰序余蓋讀黃帝書云若窺深淵而迎浮雲一何難究哉夫人之所病病疾多醫之所病病道少古人屬意甚微窮力甚久其術洞鬼神含造化至精矣猶然噤咍睢盱蓋其慎也周之時醫師隸於塚宰歲終有稽十而失一即次其食未必人鏡於道乃斤斤守法論究經脈五診奇胲不敢以墮有足尚焉後之業醫者較視之何如哉靈蘭石版既未有能名其說專家授受者藥性脈理病機治法尚芒如而乃肆炮縱合以規偶中之利又未有以稽其失者師無所承憲無所畏以眇微幽窅不可致思之術而滅裂若此為籲其可慨矣吾邑東皋徐君少時學儒去學醫攻探研極究尋諸名家謂淳于意以醫狀王叔和以脈經錢乙以五臟方楊士瀛以直指論劉完素以原病式羅天益以衛生寶鑑類不可勝數然人各師其見家各顓其方辭說叢衍則譯導難簡牘浩汗則裒稸難機指甲乙則審諦難針石離合則該驗難欲以提綜五行參緯十二候啟玄命之秘而施弘濟之功何由哉乃遠稽古哲近述名流宗旨必存小技兼錄纂成一書名曰古今醫統紀眾術之所從則河濟殊派窮萬畢之攸致則溟瀚同趣使讀之者如籠挫韜略掄算無遺或張旗整列而接刃廣原或銜枚循間而決驟頃刻雖奇正不常要之皆足制勝何也其法具也余又聞法之示人跡耳已至乎不以湯液醴灑而湔浣腸胃不以鑱石扤熨而解搦筋脈非通於神明者不能與幾徐君以法公諸人而其所治病則神在秋毫每遺外而自得故從治逆治罔不輒效其於聲稱甚著蓋又以用法而不膠於法也賜進士及第翰林院國史編修纂修會典文林郎新都余孟麟撰序新安徐君春甫者余聞之且久其人少通儒學博綜群籍性高邁爽愷言論亹亹不倦有古逸士風晚精軒岐家書日夕揣摩其理即一診一視一方一藥必窮其要領而後乃用且治今居藥京師里中凡幾何年活人已莫可計戶外履常滿即人不持錢來病而有疑且難眾人莫可誰何又有亟且殆醫師過而卻走君以次應之鮮有誤傳謂撓之不濁澄之不清蓋不特如其人又如其術矣君子故嘗與之並論然又無他術要之惟得乎要領焉耳君嘗謂病所憑者醫也醫可恃者方書也今之書不為不侈且盛然多支離蔓延淵源莫究或執用己私而失於商略寶陳言者燕石十襲誇世傳者敝帚千金披書於席不啻聚訟挾藝乎市鮮克奏功是則何以見往聖贊化成能康濟元元之道於是盡取其書自炎帝以還訖於我明凡大聖名賢哲流高技玄編異帙奧言隱論一一為之綱分目析考異同之說祛乖戾之見參之實識驗乎經效未盡厥理者則衍之以會其通隱僻不斷者則伸之以見其旨使議論有源治療有法勒成一書號曰醫統一開卷而其道燦然大明譬之行者手挽指南之車即失路於遐荒僻壤蓋有不必謀之道旁而無有乎倒行逆施之患也君子曰由是而可以見徐君之用心矣始君以一人之身行於一方以為未足乃必使其道傳之人人俾五方之人相與終受其濟焉較之過邯鄲為帶下入雒陽為耳目居咸陽為小兒則大有間矣書凡百卷梓之者太師成國朱公公博古好善以謄寫訛舛則不無誤人此則公梓之之意賜進士及第翰林院編修文林郎實錄纂修官婺州瀫陽趙志皋撰序醫統一書新安徐君所編次者徐君自言其少時喜攻醫術即古今方書裒輯甚備即未備輒又遍歷坊肆間訪文獻大家求之矣以是博精諸方伎為人已病奇驗行遊京師諸貴人飭輿馬迎君者踵相屬也往歲吾鄉侍御少泉郝公疾予過而問焉其僕為予言昨朝出無恙比暮之客所與客語未竟忽自仆地及持歸即患左臂不和又時作眩狀疾呼弗省也予私心危之屬醫數輩至治皆弗驗乃往迎徐君徐君視諸醫所為治則笑曰夫茲病郁也煩懣而不宣其發必遽紜緣於陽絡為臂痹逆攻於上必作眩諸君以風治之左矣乃為清痰發郁之劑飲之有頃少泉公目微瞬噓唏服臆淚淫淫承睫呼兒以泣眾驚問其故有客曰少泉公性至孝即京邸寧獨居不以攜家曰留侍太夫人爾以故公子卒且數月不及聞既聞意其拊擗忉怛顧避左右無以盡哀則含悲貯慟而止兼為太夫人慮恐以其孫毀奈何不鬱而為疾徐君言是也於是眾皆撟舌相視奇徐君術為神不數日少泉公愈乃持徐君所集醫統一書示王子王子曰嗟乎靈樞素問玄藐矣上池奇刻青囊金匱之術載籍所不傳後學者罕通其說倉公陽慶東垣仲景諸人揚鑣分軌各自名家顧知其孰為方書之六經醫宗之孔孟也予特善徐君近述遠稽泛遊廣涉即上下數千年間聖儒哲匠絕伎殊方綜考殆盡可不謂博雅者哉夫聞見富故智意充品驚精故運用妙以能決嫌疑定可治隨試輒驗安可謂無所本也世醫問證而厲針按方而投匕猶尚茫然寡效矣矧夫疾痛幽暖閟結心曲有左右所不及知者而望氣察色頃刻立斷即阻垣見物曷以加焉然則徐君玄識洞解之妙固不在方書間特籍方書以為筌蹄云爾遂書其卷端歸之隆慶庚午夏六月望日賜進士出身翰林院編修纂修國史雲中對南王家屏拜書序昔者上古之世洪濛未鑿民不夭札厥後風氣漸開情竇日啟疾病生焉黃帝惻憫濟以醫藥而內經作矣後世因之迨自秦漢唐宋以下代不乏人載之簡篇汗牛充楝咸以神其術妙其用而躋天下後世於仁壽之域者也春甫家世業儒恆讀素問諸書頗探索其醫之賾隱然而義理微茫精滲錯別甲可乙否莫之適從所以憚浩繁者撮拾殘言謂之捷徑致使本源根核無所稽考其不淆聖經而殘民生者幾希予不自慚愚陋以平素按內經治驗諸子折衷及搜求歷世聖賢之旨合群書而不遺析諸方而不紊舍非取是類聚條分共釐百卷目曰古今醫統蓋援上古之法以迨歷世之良而兼總於今日統集異同井然區別匯成編帙燦乎可觀庶幾厭繁者有所歸趨簡者無少失一開卷而醫之法制權衡始終本末如視諸掌其於養生不無小補若謂全書曰非闕典則猶俟於賢知者焉嘉靖丙辰仲冬長至日新安徐春甫序內經要旨序予嘗謂操舟必資於剡木而射者必以彀醫之有道古也自神農氏開其天黃帝氏繼天創始與其臣岐伯著內經靈素為萬世醫學之鼻祖邈乎不可尚已嗣是而下代有作者如張機以熱論著傷寒李杲以穀氣著脾胃守真以運氣著原病式鹹得內素之旨迄今闡聖濟民傳之永永諸賢之功不可誣也何後世之業是者惟執方以待病不胗候以裁方有定之見牢不可破無窮之病懵不加察上溯正反從逆之治法虛實補瀉之權衡蔑如也且率用己意別立門牆如王之脈訣七表八里九道朱之纂要指病泥方學者樂趨捷逕而寢失其大道寥寥數百載卒莫有釐而正之者豈不由真經之晦塞他歧之滋惑歟有唐及宋屢詔名家校正徒勤而真傳靡獲方書種種汗牛充楝奚益哉甫本庸愚輒不自忖乃敢因滑氏之鈔目而益以諸賢之勾玄提注詳明辨釋條達僭名曰內經要旨而於黃岐之神聖歷代之精英雖不足以窺其閫奧而宏綱大旨似有得其門而入者通方大哲幸鑑管蠡之見云嘉靖丁巳仲春既望新安後學徐春甫序
