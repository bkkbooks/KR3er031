body:
  text: 跋古今醫統之於醫書也猶河海之於細流也醫經之類悉以靡不載於茲便一披卷則古今之群書粲然可見然近世所將來之唐本幾希而志於醫者大率索之弗能輒得不可以無遺憾故今二三氏胥共命工欲壽之梓以廣其傳其用心原雖不殊龍斷求利矢人函人豈齊論哉茲書遍行於世則宿病頓愈沉疴可起斯亦可謂濟民之一助而眾庶之幸者也於是予竊聚數本與精於此業二先生俱分帙檢閱焉脫簡衍字已不少也各窺瞰之所及粗雖加點竄尚恐有風葉在矣然中間或一字或二三字有相磨滅難通曉者闕以俟來者庶識者考之云明歷三祀龍集丁酉年十月壬辰立野春節書於蓬生巷凡例一是書之編目曰古今醫統撰取歷代醫源肇自羲皇流於斯世翰衍相承其來尚矣凡聖賢立法制方足為天下後世準繩者今悉考其事蹟例於卷首俾後學得以溯流窮源云一諸名醫史書所載及出各家文集學本內經方法醇正者錄之無闕若涉於幻誕理法之外如晉書所載佛圖澄單道開金之馬宗素程德齋之流不敢悉錄其有名如矯氏俞氏輩皆醫之宗雖無傳亦錄之一纂是書以黃帝內素為宗及史書諸子之集凡有一節之所長可以羽冀醫學者悉探而附之其畔經背理如馬宗素之鈐法高陽生之脈訣趙氏之精要彭氏之類編則反滋醫之惑也並不載錄然古今醫書天下廣博殆非一人所能遍睹若會其極而該其全則有俟於博雅君子一內經素問為醫書之祖誠古先聖人立言立法之准者也其後諸賢悉宗其義而發明之未有舍內經而成良醫者自唐太僕啟玄子註釋得失相半嗣以滑氏鈔而陳之尚未足以盡善今纂其要旨集為一卷俾業醫者熟誦玩味自有以契其玄而凡臨病諸說之同異故不能亂其真也一先哲立論切於證治之可法者廣博兼該而非一隅之說如王安道朱彥修輩本草衍義病治八要奇效良方藥用君臣等論則凡可以翼醫者通考附前便於觀覽一醫道以脈為先苟不明脈則無以別證今世醫言脈者多以脈訣七表八里九道為名左心小腸為宗部位錯亂而診候必不準矣今辨叔和脈訣之謬取內經診候之法合為一卷一病證各分門類首論病源一主內經素問次以脈候較以王氏脈經滑氏樞要次以治法歷取名家之所長次以藥方精選經史之必效出自某集紀別各條之下庶有所據而知其本云一病機祖內經述巢氏區別表裡虛實寒熱之源則類藥方亦按表裡虛實寒熱繼之於後庶對證檢方如方圓之就規矩自有不容少戾者一各病宜於針灸其經穴隨附本證之後古人針灸並書卷首以其有神速功今人畏而不用為醫殆亦鮮精竟不知奇功偉績立可起死回生對證取穴無不應手獲效豈小補哉一凡不可治證醫所當知病有一臟之氣絕者藥必不能以強生如黑色見於耳及命門懸壁間如煙煤是腎氣以絕死肉脫身不去者死脈無胃氣者死皆其元氣絕亡斷不可治今人不工望聞問切而惟以問之一端多有不識死候而藥之此醫之大弊也扁鵲之於齊桓醫緩之於晉景皆莫能生之證今以死候類編脈法之後例之無惑一論養生導引誠古人治未病之方今人惟待病而求藥殊不知善攝生者譬猶曲突徙薪自無焚燎之患矣故選修真道藏之可法者並附焉一藥性最為要務本草故為備悉茲亦附探節齋集要並周王救荒本草合為二卷其庶乎大觀捷目云一運氣為天地陰陽造化之常變而凡民病莫不因之醫家不知運氣則亦眇而能視不足與有明也至於馬宗素之流多見其為穿鑿也今若此並刪之而惟以內經運氣為主詳釋圖說集成全書以備治療驗證稽考之易耳一凡出奇治法並秘驗藥方及平日聞見於四方之說而可以為規鑑者竊附卷後不敢同例於前賢也一婦人門悉纂婦人良方之要者胎產之病尤為至要備選產寶程氏等書奇效之方而並附焉一凡老人血氣既衰投藥亦異王隱君之論一著而後養老奉親等書嗣而集焉茲錄表端固不敢略其所以平居食養疾病方宜無不具備然則孝弟也者其可不知此云一小兒病機悉尊錢氏陳氏至於痘疹驚疳此又急證諸名家辨論病源經驗奇方悉備採錄以成全書俾學者無遺憾也一凡服藥忌宜製藥法例並引經新久人多以為不緊而忽之殊不知行遠升高必由卑且近者及之耳故錄之無闕助梓縉紳諸公氏號太師兼太子太師成國公朱諱希忠號葵亭直隸鳳陽人太子太保恭順侯吳諱繼爵號松川陝西涼州人中軍都督府管府事臨淮侯李諱言恭號秀岩直隸盱眙人太子太保漕運總兵平江伯陳諱王謨號萬峰直隸合肥人戶部尚書王諱國光號疏庵山西陽城人禮部尚書陸諱樹聲號平泉直隸松江人太子少保都察院掌院事刑部尚書葛諱守禮號與川山東德平人太子少保工部尚書朱諱衡號鎮山江西萬安人兵部右侍郎梁諱夢龍號鳴泉直隸真定人都察院右副都御史陳諱省號幼溪福建長樂人右春坊右諭德翰林院侍讀何諱洛文號震川河南信陽人翰林院修撰趙諱志皋號瀫陽浙江蘭溪人大理寺左少卿前兵科都給事中李諱巳號月賓河南磁州人太常寺少卿前戶科都給事中賈諱三近號石葵山東澤縣人太僕寺少卿前吏科都給事中劉諱不息號觀海山東滋陽人大理寺寺丞前提督校學監察御史傅諱孟春號仁泉江西高安縣人錦衣衛管衛事後軍都督府右都督黃諱浦號澗川河南洛陽人錦衣衛南鎮撫司管司事指揮使馮諱邦寧號後谿直隸深州人錦衣衛南鎮撫司管司事指揮僉事史諱繼書號云津應天溧陽人錦衣衛提督象房都指揮僉事朱諱希慎號修直隸鳳陽人分守燕河副總兵陳諱文治號膺溪浙江秀水人吏部考功司郎中戚諱傑號肖湖直隸泗州人吏部驗封司郎中鄭諱汝壁號昆岩浙江縉雲人吏部文選司員外蔣諱遵箴號松屏廣西全州人吏部驗封司員外徐諱元太號華陽直隸宣城人吏部文選司主事趙諱國璧號全吾直隸東明人吏部文選司主事王諱城號四槐順天文安人吏部考功司主事黃諱克念號思軒河南寧陵人吏部驗封司主事徐諱一檟號賓吾浙江西安人戶科都給事中光諱懋號吾山山東陽信人工科都給事中侯諱於趙號葵所河南杞縣人刑科左給事中周諱良寅號象林福建晉江人戶科給事中張諱孫繩號約齋廣西臨桂人江西道監察御史雷諱嘉祥號震宇四川井研人湖廣道監察御史王諱民順號如水江西金谿人太僕寺寺丞葛諱昕號龍池山東德平人左軍都督府經歷周諱寶號龍津直隸吳江人順天府治中劉諱巡號水山河南鄢陵人
