body:
  text: 卷之九十九養生余録上總論養生篇夫人稟二儀之氣成四大之形愚智貴賤則別養生惜命皆同貧乏者力微而不逮富貴者侮傲而難持性愚者未悟而全生智識者或先於名利自非至真之士何能達保養之理哉其有厚薄之倫亦有矯情冒俗口誦其事行已違之設能有行者不逾晦朔即希長壽此亦難矣是以達人知富貴之矯傲故屈迹而下人知名利之敗身故割情而去欲知酒色之傷命故量事而撙節知喜怒之損性故豁情以寬心知思慮之銷神故損情而自守知語煩之侵氣故閉口而忘言知哀樂之損壽故抑之而不有知情欲之竊命故忍之而不為若加之寒溫適時起居有節滋味無爽調息有方精氣補於泥丸魂魄守於臟腑和神保氣吐故納新嗜欲無以干其心邪淫不能惑其性此則持身之上品安有不延年者哉形者氣之函也氣虛則形羸神者精之成也精虛則神悴形者人也為萬物之最靈神者生也是天地之大德最靈者萬物之首大德者為天地之宗萬物以停育為事天地以清淨是務故君子養其形而愛其神敬其人而重其生莫不稟於自然從於自本不過勞其形不妄役其神夫人只知養形不知養神不知愛神只知愛身殊不知形者載神之車也神去則人死車散則馬奔自然之至理也五色重而天下爽珠玉貴而天下勞幣帛通而天下傾是故五色者陷目之錐五音者塞耳之推五味者截舌之斧華他善養生弟子廣陵吳普彭城樊阿受術於他他語普曰人體欲得勞動但不當使極耳人身常搖動則穀氣消血脈流通病不生譬猶戶樞不朽是也人所以得全其生命者以元氣屬陽陽為衛以血脈屬陰陰為榮榮衛常流所以常生矣又曰榮衛即榮華氣脈如樹木芳榮也榮衛臟腑愛護神氣得以經榮保於生路又云清者為衛濁者為榮榮行脈中衛行脈外晝行於身夜行於臟一百刻五十周至平旦大會兩手寸關尺陰陽相貫常流如循其環始終不絶則人生故當運用調理愛惜保重使榮衛周流神氣不竭可與天地同壽矣樹衰培土陽衰陰補含育元氣慎莫失度注云無情若草木至衰朽即塵土培之尚得再榮又見嫩枝接續老樹亦得長生卻為芳嫩用意推理陽衰陰補是以宜之衰陽以少陰補而不失取其元氣津液引於我身即顏復童矣童女少女正氣未散元和才一遇之修煉其百倍切忌自己元氣流奔也出羅公三峰歌人之情性為利欲之所敗如冰雪之曝日草木之沾霜皆不移時而消壞矣冰雪以不消為體而盛暑移其真草木以不凋為質而大寒奪其性人有久視之命而嗜欲減其壽若能導引盡理則長生罔極保聖纂要神者魂也降之於天鬼者魄也經之於地是以神能服氣形能食味氣清則神爽形勞則魄濁服氣者綿綿而不死身飛於天食味者混混而往往形歸於地理之自然也專精養神不為物雜謂之清反神服氣安而不動謂之靜割念以定志靜身以安神保氣以存精思慮兼亡瞑想內視則身神並一身神並一則近真矣有者因無而生形者須神而立故有為無之功形者神之宅莫不全宅以安生修神以養神若氣散歸空遊魂為變火之於燭燭靡則火不居水之於堤堤壞則水不存魂勞神散氣竭命終矣我命在我不在於天但愚人不能知此道為生命之要所以致百病風邪者皆由恣意極情不知自惜故損生也譬如枯朽之木遇風則折將崩之岸值水先頽今若不能服藥但知愛精節神亦得一二百年壽也夫稟氣含靈惟人為貴人所貴者蓋貴於生生者神之本形者神之具神大用則竭形大勞則斃若能遊心虛靜息慮無為候元氣於子時道引於間室攝養無虧兼服良藥則有年耆壽是常分也如恣意以耽聲色役智而圖富貴得喪榮於懷抱躁撓未能自遺不拘禮度飲食無節如斯之流寧免夭傷之患也養生延年録序人生而命有長短者非自然也皆由持身不謹飲食過差淫快無度忤逆陰陽魂神不守精竭命衰百病萌生故不終其壽養生延年録五穀充飢體而不能益壽百藥療疾延年而不能甘口充飢甘口者俗人之所珍苦口延年者道士之所寶百病橫夭多由飲食飲食之患過於聲色聲色可絶而逾飲食不可廢一日為益亦多為患亦多體欲常勞食欲常少勞無過極少無過虛去肥濃節鹹酸減思慮損怒氣除馳逐慎房室武氏行之有效人受氣雖不知方術但養之得理常壽一百二十歲不得此者皆傷之也少復曉道可得二百四十歲復微加藥物可得四百八十歲養壽之法但莫傷之而已夫冬溫夏涼不失四時之和所以適身也重衣厚褥體不堪苦以致風寒之疾厚味脯臘醉飽厭飫以致聚結之疾美色妖厭嬪妾盈房以致虛損之禍淫聲哀音怡心悅耳以致荒耽之惑馳騁遊觀弋獵廣野以致狂蕩之失謀得戰勝兼弱取亂以致驕逸之敗蓋聖賢誠究其理也然養生之具譬如水火不可缺過反為害喜怒損志哀戚損性榮華惑德陰陽竭精皆學道之忌仙法之所疾也雖還精胎息僅而補之內虛已徹猶非本真真誥曰善攝生者臥起有四時早晚與居有至和之常制筋骨有偃仰之方間居有吞吐之術流行榮衛有補瀉之法節宣勞逸有與奪之要忍怒以養陰氣抑喜以養陽氣然後先將草木以救虧缺服金丹以定不窮養性之道盡於此矣食能排邪而安臟腑神能爽志以資血氣攝生者氣正則味順味順則神氣清神氣清則含真之靈全靈全則五邪百病不能幹也故曰水濁魚瘦氣昏人病夫神者生之本本者生之具大用則神勞大勞則神疲也食谷者智慧聰明食石者肥澤不老謂煉五色石也食芝者延年不死食元氣者地不能埋天不能殺是故食藥者與天地相配日月並例少不勤行壯不競時反而安貧老而寡欲間心緩形養生之方也或疑者云始同起於無外終受氣於陰陽載形魄於天地資生長於食息而有愚有智有強有弱有壽有夭天耶人耶解者曰夫形生愚智天也強弱壽夭人也天道自然人道自己始而胎氣充實生而乳食有餘反而滋味不過壯而聲色有節者強而壽始而胎氣虛耗生而乳食不足長而滋味有餘壯而聲色自放者弱而夭生長全足加之導養年未可量夫神者生之本形者生之具也神大用則竭形大勞則敝神形早衰欲與天地常久非所聞也故人所以生者神也神之所託者形也神形離別則死死者不可復生離者不可復返故乃聖人重之夫養之道有都領大歸未能具其會者但思悔與俗反則暗踐勝輒獲過半之功矣有心之徒可不察歟太史公司馬論世人不終耆壽咸多夭歿者皆由不自愛惜忿爭盡意邀名射利聚毒攻神內傷骨髓外乏筋肉血氣將無經脈便壅內里空疏惟招衆疾正氣日衰邪氣日盛矣不易舉滄波以熄炷火頽華嶽以斷涓流語其易也甚於茲矣名醫敘病論盡無事者夜不張道人年幾十旬甚翹壯也云養性之道莫久行久坐久臥久聽莫強飲食莫大醉飽莫大憂愁莫大悲思此所謂能中和能中和者必久壽也天下莫我知也無謂幽冥天知人情無謂暗昧神見人心微言小語鬼聞人聲犯禁滿千地收人形人為陽善正人報知人為陰善鬼神報知人為陽惡正人治之人為陰惡鬼神殛之故天不欺人依以向養生延命壽氣者身之根也魚離水必死人失道豈存是以保生者務修於氣受氣者務保於精精氣兩存是名保真延陵君修養大略修身之法保身之道因氣養精因精養神神不離身乃常健太上老君説內丹經眼多視則貪資口多言則犯難身多動則淫賊心多飾則奢侈未有用此四多而天下成治者也五色令人目盲五音令人耳聾五味令人口爽馳騁田獵令人心發狂難得之貨令人行妨是以聖人為腹不為目故去彼取此然至道之精窅窅冥冥至道之極昏昏默默無視無聽抱神以靜形將自正必靜必清無勞汝形無搖汝精乃可以長生目無所見耳無所聞心無所知汝神將守形形乃長生莊子聖人休休焉則平易矣平易則恬惔矣平易恬惔則憂患不能入邪氣不能襲故其德全而神不虧養志者忘形養形者忘利致道者忘心矣目欲視色耳欲聽聲口欲蜜味志氣欲盅人上壽百歲中壽八十下壽六十除病哀死喪憂患其中開口笑者一月之中不過四五日而已矣天與地無窮人死者有時操有時之具而托與無窮之間忽然無異騏驥之馳過隙也不能悅其志意養其壽命者皆非通道者也凝心虛形內觀洞房抱玄念神專守真一者則頭髮不白未有以百思纏胸寒熱破神營此官務常此風塵口言吉凶之會身排得失之門衆憂若是萬慮若此雖有真心以之不篤抱道不行握寶不用而自然望頭不白者亦希聞也眼者身之鏡耳者體之牖視多則鏡昏聽衆則牖閉面者神之庭發者齒之華心悲則面焦腦減則發素所以示神內喪真精損極也禮年七十懸車懸車者以年至虞淵如日之昏體氣就損神候方落不可復勞形體於風塵役方寸於外物矣夫學生之道當先治病不使體有虛邪及血少腦減津液凝滯也不先治病雖服食行氣無益於身心欲安靜慮欲深遠心安靜則神策生慮深遠則計謀成心不欲躁慮不欲淺心躁則精神滑慮淺則百務傾全汝形抱汝生無使汝思慮營營若此緒年或可以及此言出亢倉子注云螢營動不息也緒終也全形抱生不運思慮心氣冥寂道自居之若此永年可及此言也水之性清吐者扣之故不得清人之性壽物者扣之故不得壽夫香美脆味厚酒肥肉甘口而疾形曼理皓齒悅情而損精故云去甚去泰身乃無害韓非子夫喜怒音道之衰也憂悲者德之失也好憎者心之過也嗜欲者生之纍也人大怒破陰大喜墜陽暴氣發喑驚怖為狂憂悲焦心疾病乃成人能除此五者即合神明神明者得其內得其內者五臟寧思慮平耳目聰明筋骨徑強學道之人聊且均調喜怒之情雖有喜勿至蕩動湛然之性雖有怒勿至結滯浩然之氣遣妄情如刀伐木非一斧可倒求真理如食之充腸非一口可飽修道積功大率如此灌園所以養蔬也驅禽所以養果也養生之士豈不如養蔬養果之人乎較其理之輕重何如哉養生大要一曰嗇神二曰愛氣三曰養形四曰導引五曰言語六曰飲食七曰房室八曰反俗九曰醫藥十曰禁忌過此以往義可略焉人不欲使樂樂人不壽但當勉強為力所不任舉重引強掘地若此倦而不息以致筋骨疲竭耳然勞勝於逸樂也能從朝至暮常有所為使之不息乃快但覺極當息息復為之此與導引無異也夫流水不腐戶樞不朽者以其勞動數故也飽食不用坐與臥欲得行步務作以散之不爾使人得積聚不消之疾及手足痹蹶面目黧皺必損年壽也先除欲以養情後禁食以存命是知食胎氣飲靈元不死之道返童遠年此蓋聖人之所重也我命在我保精愛氣壽無極也無勞爾形無搖爾精歸心靜默可以長生一陰一陽之謂道三元二合謂之丹逆流補腦謂之還精化為氣謂之轉一轉一易一益每轉延一紀之二九轉延一百八歲陰陽之道精液為寶謹而守之後天為老子欲長生當由所生之門遊處得中進退得所動靜以法去留以度可以延年而愈疾矣以金理金是為真金以人理人是為真人人常失道非道失人人常去生非生去人要常養神勿失生道長使道與生相保神與生相保則形神俱久矣故性命之根誠有極也嗜欲之性固無窮也以有極之性命逐無窮之嗜欲亦自斃之而己矣德以形為車道以氣為馬魂以精為根魄以氣為戶形勞則德散氣越則道叛精消魂散氣動魄微是以靜形愛氣全精寶視道德凝密魂魄固守夫長生久視未有不愛精保氣能致之陰丹內御之道世莫得知雖務於氣而不解絶情欲亦未免殃矣天地以生成為德有生所甚重者身也身以安樂為本安樂所以致者以保養為本世之必本其本則本必固本必固疾病何由而生夭橫何由而至此攝生之道無逮於此夫草木無知尤假灌溉矧人為萬物之靈豈不資以保養然保養之義其理萬計約而言之其術有三一養神二惜氣三堤疾忘情去智恬惔虛無離事全真內外無寄如是則神不內耗境不外惑真一不雜神自寧矣此養神也抱一元之本根固歸真之精氣三焦定位六賊忘形識界既空大同斯契則氣自定矣此惜氣也飲食適時溫涼合度出處無犯於八邪寢寐不可以勉強則身自安矣此堤疾也三者甚易行然人自謂難行而不肯行如此雖有長生之法人罕敦尚遂至永謝是以疾病交攻天和頓失聖人憫之夫安樂之道在能保養者得之況招來和氣之藥少攻伐之藥多不可不察也是知人之生須假保養無犯和氣以資生命緣失養護便致病生苟或處治乖方旋見顛越防患須在間日故曰安不忘危此聖人之預戒也攝養之道莫若守中守中則無過與不及之害經曰春秋冬夏四時陰陽生病起於過用蓋不適其性而強云為逐強處則病生五臟受氣蓋有常分用之過耗是以病生善養生者既無過耗之弊又能保守真元何患乎外邪所害也故善服藥不若善保養世有不善保養又不善服藥倉卒病生而歸咎於神天噫是亦未嘗思也夫未聞道者放逸其心逆於生樂以精神徇智巧以憂畏徇得失以勞苦徇理節以身世徇財利四徇不去心為之病矣極力勞形躁暴氣逆當風縱酒食嗜辛鹹肝為之病矣恣食生冷溫涼失度久坐久臥大飽大飢脾為之病矣呼叫過常辨爭陪答冒犯寒暄好食鹹辛肺為之病矣久坐濕地強力入水縱欲勞形三田漏溢腎為之病矣五病既作故未老而羸未羸而病病至則重重則必斃嗚呼是皆弗思而自取之也衛生之士須謹此五者可致終身無苦經曰不治已病治未病正為此矣夫善養生者養內不善養生者義外養外者實外以充快悅澤貪欲恣情為務殊不知外實則內虛也善養內者實內使臟腑安和三焦各守其位飲食常適其宜故莊周曰人之可畏者衽席飲食之間而不知為戒者也若能常如是畏謹疾病何緣而起壽考焉得不長賢者造形而悟愚者臨病不知誠可畏也黃帝問岐伯曰余聞上古之人春秋皆度百歲而動作不衰今時之人年至半百而動作皆衰者時世畏耶人將失之耶岐伯對曰上古之人其知道者法於陰陽和於術數飲食有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲乃去今時之人不然也以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰也夫四時五行以生長收藏以生寒暑燥濕風人有五臟化為五氣以生喜怒悲憂恐故喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽厥氣上行滿脈去形喜怒不節寒暑過度生乃不固故重陽亡陽重陰亡陰故曰冬傷於寒春必病溫春傷於風夏必泄瀉夏傷於暑秋必病瘧秋傷於濕冬必咳嗽王充年漸七十乃作養生之書凡十六篇香氣自守閉明塞聰受補自精服藥導引庶幾獲道太上養神其次養形神清意平百節皆寧養生之本也肥肌膚充腹腸開嗜欲養生之末也凡生之長也順之也使生不順者欲也故聖人必先適欲適節也室大則多陰臺高則多陽多陰則蹶多陽則痿蹶者逆寒疾也痿躄不能行刈陰陽不適之患也是故先王不處大室不為高臺味不衆珍衣不燀熱燀熱則理塞脈則閉結理塞則氣不達味衆珍則胃充胃充則中大鞔中大鞔則氣不達以此求長生者其可得乎天生陰陽寒暑四時之化萬物之變莫不為利莫不為害聖人察之以便生故精安乎形而年壽長焉長也者非短而續之者也畢其數也畢數之務在去乎害何謂去害大甘大酸大苦大辛大咸五者充形則生害矣大喜大怒大憂大恐大哀五者接神則生害矣大寒大熱大燥大濕大風大霧六者動精則生害矣諸言大者皆謂過制故凡養生莫若知本知本則疾無由至矣勞者勞於神氣傷者傷於形容飢飽過度則傷脾思慮過度則傷心色欲過度則傷腎起居過度則傷肝喜怒悲愁過度則傷肺又風寒暑濕則傷於外飢飽勞役則敗於內晝感之則病榮夜感之則病衛經行內外交運而各從其晝夜始勞於一一起為二二傳於三三通於四四遷於五五復返一一至於五邪乃深藏真氣大失使人肌肉消神氣弱飲食減行步難及其如此則雖有命亦不能生也夫人稟天地陰陽而生者蓋天有六氣人有三陰三陽而上奉之地有五行人以五臟六腑而下應之於是資生皮肉筋骨精髓血脈四肢九竅毛髮齒牙唇舌總而成體外則氣血循環流注經絡喜傷六淫內則精神魂魄志意思喜傷七情六淫者寒暑燥濕風熱是七情者喜怒悲思驚若持護得宜怡然安太役冒非理百疴生焉物之最靈唯其人也身者乃神化之本精於人也若水浮航氣於人也如風楊塵神於人也似野馬聚空水涸則航止風息則塵靜野馬散而火空長有精能固無氣能盛物精氣神三者心可不動其變化也外忘其形內養其神是謂登真之路嗜欲縱乎心孰能久去哀樂傷乎志孰能久忘思慮役乎神孰能久無利祿勞乎身孰能久舍五味敗乎精孰能久節酒醴亂乎情孰能久絶食佳肴飲旨酒顧以姝麗聽以淫聲雖精強而反禍於身耳目快而致亂於神有百端之敗道夫一介而希真安有養身之驗耳夫學道者外則意不逐物移內則意不隨心亂湛然保於虛寂造化清淨之域譬如起屋之勞假一息之形氣尚蘇神歸其清而況契於道保真丹所哉彭祖曰養壽之道但莫傷之而已夫冬溫夏涼不失四時之和所以適身也美色淑姿幽間娛樂不致思欲之惑所以通神也車服威儀知足無甚所以一志也八音五色以悅視聽所以導心也凡此皆以養壽而不能斟酌之者反以速患古之至人恐下才之子不識事宜流遁不還故絶其源故有上士別床中士異被服藥百裹不如獨臥五音使人耳聾五味令人口爽苟能節宣其宜適抑揚其通塞者不減年算而得益凡此之類譬猶水火用之過當不為害也不知其經脈損傷血氣不足內里空疏髓腦不實體已先病故為外物犯風寒酒色以發之耳若本充實豈有病也夫遠思強記傷人憂愁悲哀傷人喜樂過差傷人忿怒不解傷人汲汲所願傷人陰陽不順傷人有所傷者甚衆而獨戒於房中豈不惑哉男女相成猶天地相生也所以導養神氣使人不失其和天地得交接之道故無終竟之限人失交接之道故有殘傷之期能避衆傷之事得陰陽之術則不死之道也天地晝分而夜合一歲三百六十日而精氣和合故能生産萬物而不窮人能則之可以長存次有服氣得其道則邪氣不得入治身之本要余吐納導引之術及念體中萬神有含影守形之事皆非真道人能愛精養體服氣煉形則萬神自守其真不然者則榮衛枯悴萬神日逝非思念所留者也夫道者藏精於內棲神於心靜漠恬惔悅穆胸中廓然無形寂然無聲靜漠恬惔所以養生也和愈虛無所以據德也外不亂內即性得其宜靜不動和則德安其位養生以經世抱德以終年可謂能體道矣能尊生雖富貴不以養傷身雖貧賤不以利纍形神善於氣氣會於神神氣不散是謂修真喜怒損性哀樂傷神性損則害生故養精以全氣保神以安心氣全體平心安神逸此全生之訣也晉道成自號祟真子其論長生養性之旨曰其要在於存三抱元守一三者精氣神其名曰三寶抱元者抱守元陽真氣也守一神靈也神在心心有性屬陽是為南方丙丁之火也腎者能生元陽為真氣其泄為精是為北方壬癸之水水為命命繫於陰也此之謂性命為三一之道在於存想入下丹田抱守元陽逾三五年自然神定氣和神既定則釋其四大而無執焉坦然修頤其真功滿行畢其道成矣玄牝既立猶瓜有蒂暗注母氣呼即呼吸即吸綿綿十月氣足形圓心是氣之主氣是形之根形是氣之宅神是氣之真神用氣養氣因神住神行則氣行神住則氣住此經要妙之義也陽精魂主陰精魄成二精相搏而成神明神以形用形以神生神去則形斃神全形可延神以道全形以術延耳骨肉以精血為根靈識以元氣為木神氣乃性命之本也神為氣之子氣為神之母子母不可以斯須離也元氣湛然止於丹田則變化成矣神能御氣氣能留形出息微微入息綿綿深根固蒂長生久視之道也故曰天門常開地戶密閉呼至於根吸徹於蒂謂之丹田謂之氣海如抱雞卵如魚生水法就聖胎自然蟬蛻煉精者煉元精非淫泆所感之精煉氣者煉元氣非口鼻呼吸之氣煉神者煉元神非心意會慮之神故此神氣精者與天地同其根與萬物同其體得之則生失之則死以陽火煉之則化成陽氣以陰符養之則結成陰精見之不可用用之不可見也發宜多梳齒宜多叩液宜常咽氣宜精煉手宜在面五者所謂子欲不死修崑崙耳養耳力者常塞養目力者常瞑養臂指者常屈信養股趾者常步履精者神之本氣者神之主形者氣之宅故形大用則羸精大用則竭氣大勞則絶是以人之生者神也形之託者氣也若氣衰則神托而得長生者未之聞也夫有者因無而生焉形須神而立焉有者無之館也形者神之宅也倘不全宅以安生修身以養神則不免氣散歸空遊魂為變仿之於燭燭虛則火不居焉譬之於堤堤壞則水不存焉身勞則形散氣勞則命終形疲則神斃神斃則精靈遊矣已遊者無返期既朽者無生理故神者魂也魄者陰也神能復氣形能食味氣清則神爽形勞則氣濁服氣者千百不死故身飛於天食谷者千百皆死故形歸於地人之死也魂飛於天魄落於泉水火分散各歸本源生則同體死則相捐飛沉各異稟之自然何者譬如焚之木以火焚之煙則上升灰則下沉亦自然之理也夫神明者生死之本也精氣者萬物之體也全其形則生養其精氣神則性命長生矣養生有五難名利不滅此一難也喜怒不除此二難也聲色不去此三難也滋味不絶此四難也神慮精散此五難也五者必存雖心希難老口誦至言咀嚼英華呼吸太陽不能不夭其年也五者無於胸中則信順日深玄德日全不祈喜而自福不求壽而自延此養生大理所歸也聖人一度循軌不變其宜不易其常放準修繩曲因其當夫喜怒者道之邪也憂悲者德之失也好憎者心之過也嗜欲者性之偏也人大怒傷陰大喜墜陽暴氣發喑驚怖為狂憂悲多患痛乃成積好憎繁多禍乃相隨故心不憂樂德之至也通而不變靜之至也嗜欲不載虛之至也無所愛憎平之至也不與物散粹之至也能此五者則通於神明通於神明者得其內者也夫孔竅者精神之戶牖也而氣志者五臟之使佐也耳目淫於聲色之樂則五臟搖動而不定也五臟搖動而不定則血氣滔蕩而不休氣血滔蕩而不休則精神馳聘於外而不守矣精神馳騁於外而不守則禍福之至雖如丘山無由識之矣使耳目精明玄達而無誘慕氣志虛靜恬愈而省嗜欲五臟定寧充盈而不泄精神內守形骸而不外越至望於往世之前而視於來世之後猶足為也豈直禍福之間哉故曰其出彌遠其知彌少以言夫精神之不可使外淫也故五色亂目使目不明五聲訛耳使耳不聰五味亂口使口爽傷趨舍滑心使行飛揚此四者天下之所養性也然皆人纍也故曰嗜欲者使人之氣越而好憎者使人之心勞弗疾去則志氣日耗矣夫人之所以不能終其壽命而中道夭於刑戮者何也以其生生之厚夫惟能無以生為者則所以修得生也凡夫不徒不知益之為益乃又不知損之為損也夫損易知而速焉益難知而遲焉而尚不悟其易亦安能熾其難哉夫損之者如燈火之消脂莫之見也而忽盡矣益者如禾苗之播殖莫之覺也而忽茂矣故治身養性務謹其細不可以小益為不平而不修不可以小損為無傷而不防凡聚小所以就大損一所以至億也若能愛之於微成之於著者則當乎知道矣養生以不傷為本此要言也且才所不逮而困思之傷也力所不勝而強舉之傷也悲哀憔悴傷也喜樂過差傷也汲汲所欲傷也戚戚所患傷也久談言笑傷也寢息失時傷也挽弓引弩傷也沉醉嘔吐傷也跳走喘乏傷也歡呼笑泣傷也陰陽不交傷也是以養性之方唾不及遠行不疾步耳不極聽目不極視坐不至久臥不及疲先寒而衣先熱而解不欲極飢而食食不可過飽不欲極渴而飲飲不可過多凡食多則結積聚過飲則成痰癖也不欲甚勞甚逸不欲起晚不欲汗流不欲多睡不欲奔車走馬不欲極目遠望不欲多食生冷不欲飲酒當風不欲數數沐浴不欲廣志遠願不欲規造異巧冬不欲極溫夏不欲極涼不欲露臥星下不欲眠中見扇大寒大熱大風大霧皆不欲冒之五味入口不欲偏多故酸多傷脾若多傷肺辛多傷肝咸多傷心甘多傷腎此五行自然之理也凡言傷者亦不便覺也謂久則損壽耳古之知道者築壘以防邪疏源以育真深居靜處不為物攖動息與神氣俱魂魄守謹防室兌專一不分真氣乃存上下灌注氣乃流通如水之流如日月之行而不休陰營其臟陽固其腑流源泏泏滿而不溢充而不盈夫是之謂久生里語有之人在世間日失一日如牽羊以就諸屠所每進一步而去死轉近此譬雖醜而實理也達人所以不愁死者非不欲求生亦固不知所以免死之術而空自煎愁無益於事故云樂天知命故不憂耳非不欲久生也且夫深入九泉之下長空罔極始為螻蟻之糧終與塵埃合體令怛然心熱不覺咄嗟若心有求生之志何不屏置不急之事以修玄妙也哉世人不察惟五欲是嗜聲色是耽目惑玄黃耳務淫哇滋味煎其臟腑醴醪煮其腸胃香芬腐其骨髓喜怒悖其正氣思慮消其精神哀樂殃其平粹夫以蕞爾之軀攻之非一途易竭之身而瓜分受敵身非木石其能久乎大凡住生先調元氣身有四氣人多不明四氣之中各主生死一曰乾元之氣化為精精反為氣精者連於神精益則神明精固則神暢神暢則生健苦精散則神疲精竭則神去神去則死二曰坤元之氣化為血血復為氣氣血者通為內外血壯則體豐血固則顏盛顏盛則生合若血衰則發變血敗則腦空腦空則死三曰庶氣庶氣者一元交氣氣化為津津復為氣氣運於生生托於氣陰陽動息滋潤形體氣通則生氣乏則死四曰衆氣衆氣者穀氣也谷濟於生終誤於命食谷雖生蘊穀氣還死精能附血氣能附生當使循環即身永固乾元之陽陽居陰立臍下氣海是也坤元之陰陰居陽位腦中血海是也生者屬陽陽貫五臟喘息之氣是也死者屬陰陰納五味穢惡之氣是也氣海之氣以壯精神以填骨髓血海之氣以補肌膚以流血脈喘息之氣以通六腑以扶四肢穢惡之氣以亂身神以腐五臟形者生之氣也心者形之主也神者心之寶也故神靜而心和心和而形全神躁則心蕩心蕩則形傷將全其形也先在理神故恬和養神則自安於內清虛棲心神則不誘於外神恬心清則形無纍矣虛室生白人心苦空虛則純白不濁吉祥至矣人不照於昧爽而照於瑩鏡者以瑩能朗也不鑑於流波而鑑於靜水者以靜能清也鏡水以清明之性故能照物之形由此觀之神照則垢滅形靜而神清垢滅則內欲永盡神清則外纍不入今清歌奏而心樂悲聲發而心哀夫七竅者精神之戶牖也志氣者五臟之候也耳目誘於聲色鼻口之於芳味四體之於安適其情一也則精神馳驚而不守志氣繫於趨舍則五臟滔蕩而不安嗜欲之歸於外心腑壅塞於內曼衍於荒滔之波留連於是非之境而不敗德傷生者蓋亦寡矣是以聖人清目而不視聰耳而不聽閉口而不言棄心而不慮貴身而忘賤故尊勢不能動樂道而忘貧故厚利不能傾容身以怡情而遊一氣活然純白於衷故形不養而自全者不勞而道自至也身之有欲如樹之有蠍樹抱蠍則遠自鑿人抱欲而反自害故蠍盛則木枯欲熾而身亡將收情欲先斂五關五關者情欲之路嗜欲之府也目愛彩色命曰伐性之斧耳樂淫聲命曰攻心之鼓口貪滋味命曰腐臟之藥鼻悅芳馨命曰熏喉之煙身安輿駟命曰召蹶之機此五者所以養生亦以傷生耳目之於聲色鼻口之於芳味肌體之於安適其情一也然亦以之生或為賢智或為癡愚由於處之異也養生主論甚哉墳素之書以心為身中君主之官神明出焉以此養生則壽而齒不殆主不明則道閉塞而不通形乃大傷以此養生則殃故莊子有養生主篇蓋有心者必有身故人我交相而物欲蔽其明也昔者太王之去國也召其耆老而告之曰君子不以其所以養人者害人故逾梁山而遷岐山之下養生之為道莫大如此而身外瑣瑣又何足以纍吾之靈府哉是則人心之病如面不同混厚之辭難為通治故述方內之道以正其心方外之道以廣其志百氏之言以返其流遊談之説以攻其蔽或因激怒而憤悱或因隨喜而投機使其各有所入則庶不溺於常見也試請論之夫一心萬慮其義有三有天理有人情有五行仁者夢金革此五行之所役也甚飢夢取甚飽夢與非人情之使然乎夫天理者何一言而蔽之曰上帝臨汝毋二爾心故由仁義行非行仁義也不獲己者如達摩大師云外息諸緣內心無惴莊子云宇宙者發乎天光故黃帝赤水求玄珠非罔象無由得之此道甚易人自為難從淺而言唯息奔競默聰明涵智慧而已是故余嘗有言曰世人不必聰明不必愚魯是必愚魯者下愚也是必聰明者上智也其餘察察皆系禍福之門故嵇康從孫登三年登未嘗出一言康欲辭去登乃曰子識火乎火生而有光而不用其光果在於用光人生而有才而不用其才果在於用才故用光在乎得薪所以保其耀用才在乎識真所以保其年今子才多識寡難乎免於今之世矣子無求乎康不能用果遭非命乃作幽憤詩曰昔慚柳下今愧孫登如莊子寓言祖習老列證引孔顏偽仁義而顯仁義出世間而居世間故非明論莊政之言實出諸子百氏之表下學者竊取文華而為筆力誦其汗漫而為高談中才以上者紬繹之如人之美食美器可以味能虛心實腹上達者觀之則如程孔目擊而已矣故太乙真人破迷歌云道傍逢一魚猶能掉紅尾子若欲救之急須送於水道傍逢一人性命將淪委子若欲救之急須與道理黃帝陰符經云上有神仙抱一之道中有富國安民之法下有強兵戰勝之術故以身為國以心為君精氣為民抱一守中心不妄用故精充氣住則如物阜民繁然後陰虎陽龍烹煉三尸而戰退百邪丹田有寶四大輕安修之不已內功外行乃證真仙再歷真空果位無修可修則與佛同體故名萬法之尊心之靈妙有若是者上為三界諸天之祖下為六道四生之源然則何為然而霄壤之間乎所謂天理也人情也五行也五行人情交戰於物欲之私者小人也故有刑災異類之差人情天理相符於顯微之機者君子也故無寵辱若驚之患若夫仰鑽瞻忽之道顏子心齋日至孟子浩然難言必也還源之士超出乎理路之表者強名曰佛亦名大覺金仙此非一曲之士之所知再請敷露夫用天之道因地之利謹身節用以養父母此孔子已嘗許為庶人之孝也既孝矣又何加焉故當體認喜怒哀樂未發之先毫髮無間之地此則心君之實相號曰本來面目以是了了嘗知言之不可及故神而明之存乎其人倘居上而驕為下而亂在醜而爭思無不邪言必縱欲竊仲尼之冠佩掩盜跖之忍殘苟僥幸而免於刑戮則欣災危昏夢之間遊魂為變之際意光業鏡心事閻王不待六審三推自然依款承伏故沉而為地獄餓鬼從而為胎卵濕化惡趨將盡次因緣再託人身而又私計人我殘賊天真報緣既盡新業已成復入輪回備償夙債不失人身則幸矣余嘗有曰天地熔金作一爐鼎鍾盂鑑總由吾他年要識方圓器各自而今觀造模其有志趣不凡者因而步入道環則朝市山林空手把鋤頭步行騎水牛而遊戲三昧也天元之壽精氣不耗者得之男女居室人之大倫獨陽不生獨陰不成人道有不可廢者莊周乃曰人之可畏者衽席之間不知戒者過也蓋此身與造化同流左為腎屬水右為命門屬火陽生於子火實藏之猶北方之有龜蛇也膀胱為左腎之府三焦有脂膜如掌大正與膀胱相對有二白脈由中而出夾脊而上貫於腦上焦在膻中內應心中焦在中脘內應脾下焦在臍下即腎間動氣分布人身方其湛寂欲念不興精氣散於三焦榮華百脈及欲想一起欲火熾然翕撮三焦精氣流溢並從命門輸瀉而去可畏哉嗟夫元氣有限人欲無涯火生於木火發必克尾閭不禁滄海以竭少之時血氣未定既不能守夫子在色之戒及其老也則當寡欲間心又不能明列子養生之方吾不知其可也麻衣道人曰天地人等列三才人得中道可以學聖賢可以學神仙況人之數多於天地萬物之數但人之不修人道貪愛嗜欲其消減只與物同也所以有老病夭傷之患鑑乎此必知所自重而可以得天元之壽矣欲不可絶黃帝曰一陰一陽之謂道偏陰偏陽之謂疾又曰兩者不和若春無秋若冬無夏因而和之是謂聖度聖人和合之道但貴於閉密以寄天真也素女曰人年二十者四日一泄三十者八日一泄四十者十六日一泄五十者二十日一泄此法語也所稟者厚食飲多精力健或少過其度譬之井焉源深流長雖隨汲隨滿不懼其竭也若所稟者薄元氣本弱又食減清耗願強而為之是怯夫而試馮婦之術也適以投虎牙耳道弱者亦須禁止不可依此施泄素女曰人年十六者當閉精勿泄若氣力尚壯盛者亦不可強忍久而不泄致生癰疾彭祖曰男不可無女女不可無男若念頭真正無可思者大佳長年也又曰人能一月再泄精一歲止二十四泄得壽一百歲名醫論曰思欲無窮所願不得意淫於外為白淫而下因是入房太甚宗筋縱弛書云男子以精為主女人以血為主故精盛則思室血盛則懷胎若孤陽絶陰獨陰無陽欲心熾而不遂則陰陽交爭乍寒乍熱久而為勞富貴家子唐靖瘡發於陰至爛道人周守真曰病得之欲泄而不可泄也史記濟北王侍人韓女病腰背寒熱倉公曰病得之欲男子而不可得也欲不可早齊大夫褚澄曰羸女則養血宜及時而嫁弱男則飾色宜待壯而婚又云男破陽太早則傷其精氣女破陰太早則傷其血脈又云精未通而御女以通其精則五髓有不滿之處異日有難狀之疾又云未笄之女天癸始至已近男色陰氣早泄未完而傷又云童男室女積想在心思慮過常多致苛損男則神色先敗女則月水先閉欲不可縱黃帝經曰長生至慎房中急何為死作靈神位彭祖曰上士易床中士易被又云易被不如易床易床不如易房服藥千鍾不如獨臥老君曰情欲出於五內魂定魄靜生也情欲出於胸臆精散神惑死也彭祖曰美色妖嚴嬌妾盈房以致虛損之禍烏可以長生陰符經曰淫聲美色破骨之斧鋸也世之人若不能秉靈燭以照幽情持慧劍以割愛欲則流浪生死之海害生於恩也全元起曰樂色不飾則精耗輕用不止則精敗聖人愛精重施髓滿骨堅書云年高之時血氣既弱覺陽事輕盛必慎而抑之不可縱心竭意一度不泄一度火滅一度火滅一度增油不制而縱情則是膏火將滅更去其油莊子曰嗜欲深者其天機淺春秋秦醫和視晉侯之疾曰是為近女室非鬼非食惑以喪志公曰女不可近乎對曰節之玄樞曰元氣者腎間動氣也右腎為命門精神之所舍愛惜保重榮衛周流神氣不竭可與天地同壽元氣論曰嗜欲之性固無窮也以有極之性命逐無涯之嗜欲神自斃之甚矣仙經云無勞爾形無搖爾精歸心靜默可以長生理頌云道以精為寶寶持宜祕密施人則生人留己則生己結嬰尚未可何況空廢棄棄損不覺多衰老而命墜仙書云陰陽之道精液為寶謹而守之後天而老書云聲色動蕩於中情愛牽纏心有念動晝想夜夢馳逐於無涯之欲百靈疲而消散宅舍無寶而傾頽恣意極情不知自惜虛損生也譬如枯朽之木遇風則折將潰之崖值水先頽荀能愛惜節情亦得常壽也腎陰內屬於耳膀胱脈出於目眥目盲所視耳閉厥聽斯乃房之為患人壽夭在於撙節若將息得所長生不死恣其情則命同朝露欲多則損精人可保者命可惜者身可重者精肝精不固目眩無光肺精不交肌肉消瘦腎精不固神氣減少脾精不固齒髮浮落若耗散真精疾病隨生死亡隨至神仙可惜許歌曰可惜許可惜許可惜元氣宮無主一點既隨濃色妒百神位送精光去三尸喜七魄怒血敗氣衰將何補赤宅丹田屬別人玉爐丹灶阿誰主勸世人休戀色戀色貪淫神必敗精神一去百神離百神去後人不知幾度待説説不得臨臨下以泄天機欲不可強素問曰因而強力腎氣乃傷高骨乃壞注云強力入房也強力入房則精耗精耗則腎傷腎傷則髓氣內枯腰痛不能俯仰黃帝經云急守精室勿妄泄閉而保之可長活書云陰痿不能快欲強服丹石以助陽腎水枯竭心火如焚五臟乾燥消渴至近訥曰少水不能滅盛火或為瘡瘍強勉房勞者成精極體瘦尪羸驚悸夢遺便濁陰痿裡急面黑耳聾真人曰養性之道莫強所不能堪爾抱朴子曰才不逮強思之力不勝強舉之傷也甚矣強之一字真戕生伐壽之本夫飲食所以養生者也然使醉而強酒飽而強食未有不疾以害其身況欲乎欲而強元精去神氣散戒之欲有所忌書云飽食過度房室勞損血氣流溢滲入大腸時下清血腹痛病名腸澼大醉入房氣竭肝傷丈夫則精液衰少陰痿不起女子則月事衰微惡血淹留生惡瘡燃燈燭行房終身之忌忿怒中盡力房事精虛氣損發為癰疽恐懼中入房陰陽偏虛發厥自汗盜汗積而成勞遠行疲乏入房為五勞虛損月事未絶而交接生白駁又冷氣入內身面痿黃不産金瘡未瘥而交會動於血氣令瘡敗壞忍小便入房者得淋莖中痛面失血色或致胞轉臍下急痛死或新病可而行房或少年而迷或老人而不能節減妙藥不能頓服因而致患歲月將深直待肉盡骨消返冤神鬼故曰油盡燈滅髓竭人亡添油補髓勉強何干鬼魅來侵總是自招其禍交接輸瀉必動三焦心脾腎也動則熱而欲火熾因入水致中焦熱鬱發黃下焦氣盛額黑上焦血走隨瘀熱行於大便黑溏男女同室而浴者多病此服腦麝入房者關竅開通真氣走散重則虛眩輕則腹瀉本草云多食葫入房傷肝面黑無光葫即蒜也書云入房汗出中以勞風赤目當忌房事免內障時病未復犯者舌出數寸死三國志子獻病已瘥華陀視脈曰尚虛未復勿為勞事色復即死死當舌出數寸其妻從百里外省之止宿交接三曰病發一如陀言可畏哉欲有所避孫真人云大寒與大熱且莫貪色欲書云凡大風大雨大霧雷電霹靂日月薄蝕虹霓地動天地昏冥日月星辰之下神廟寺觀之中井灶圍廁之側環墓尸柩之傍皆所不可犯淫則損人壽命若此時受胎非止百倍損於父母生子不仁不孝多疾不壽保命訣云人勿犯長命及諸神降日犯淫者促壽朔日減一紀望日減十年晦日減一年初八日上弦二十三日下弦三元減五年庚申甲子本命減一年正月初三日萬神皆會十四十六日三宮降二月二日萬神會四立日二分日二至日二社日俱不可犯三月初九日牛鬼神降犯者百日中惡四月初四日萬神善化犯之失音初八日善惡童子降犯者血死五月三個五日六日七日為九毒日犯者不過三年十月初一日夜西天王降犯之一年死十一月二十五日掠剩大夫降犯之短命十二月初七日夜犯之惡病死二十日天河相交行道犯之促壽每月二十八日人神在陰四月十日陰陽純用事以上日辰犯淫且不可況婚姻乎按庚申論曰古人多盡天數今人不終天年何則以其罔知避慎肆情恣色暗犯禁忌陰司減其齡算能及百歲者幾何人哉蜀主孟昶納張麗華於觀側一夕迅雷電火張氏殞道士李若衝於上元夜見殿上有朱履衣冠之士北面而立廊下羅列罪人有女人甚若白其師唐洞卿師曰此張麗華也昔寵幸於此褻瀆高真所致由是觀之天地間禁忌不可犯也地元之壽起居有常者得之人之身仙方以屋子名之耳眼口鼻其窗門戶也手足肢節其楝梁榱桷也毛髮體膚其壁牖垣牆也曰氣樞曰血室曰意舍曰倉廩玄府曰泥丸幽宮曰紫房玉闕曰十二重樓曰賁門曰飛門曰玄牝等門蓋不一也而有主之者焉今夫屋或為暴風疾雨之所飄搖蟲蟻蠢之所侵蝕或又為鼠竊狗盜之所損壞苟聽其自如而不知檢則日積月纍東傾西頽而不可處矣蓋身者屋也心者居星之主人也主人能常為之主則所為窗戶楝榱垣壁皆完且固而地元之壽可得矣養生之道老子曰人生大期百歲為限節護之者可至千歲如膏之小炷與大炷耳衆人大言而我小語衆人多煩而我小記衆人悸暴而我不怒不以人事纍意淡然無為神氣自滿以為不死之藥莊子曰能尊生者雖富貴不以養傷身雖貧賤不以利纍形今世之人居高年尊爵者皆重失之孫真人銘曰怒甚偏傷氣思多大損神神疲心易役氣弱病相縈勿使悲歡極當令飲食均再三防夜醉第一戒晨醺夜寢鳴金鼓晨興漱玉津妖邪雖犯己精氣自全身若要無諸病常當節五辛安神宜悅樂惜氣保和純壽夭休論命修行本在人若能遵此理平地可朝真書云未聞道者放逆其心逆於生樂以精神徇智巧以憂畏徇得失以勞苦徇禮節以身世徇財利四徇不置心為之病矣陶隱居云萬物為人靈且貴百歲光陰如旅寄自非留念修養中未免疾苦為身纍喜樂書云喜樂無極極則傷魄魄傷則狂狂者意不存皮革焦喜怒不節生乃不固和喜怒以安居處邪僻不至長生久視喜怒不測陰氣不足陽氣有餘榮衛不行發為癰疽聚書云喜則氣和性達榮衛通行然太喜傷心積傷損神故少喜則神不勞淮南子云大喜墜陽唐柳公度善攝生年八十餘步履輕健或求其術曰吾無術但未嘗以元氣佐喜怒氣海常溫耳東坡發語曰心喜則陽氣散是故抑之以養陽氣忿怒書云忿怒則氣逆甚則嘔血少怒則形佚悁悁忿恨則損壽怒目久視日月則損明大怒傷肝血不榮於筋而氣激矣氣激上逆嘔血食泄目暗使人薄厥切切忿怒當止之盛而不止至為之傷喜忘前言腰背隱痛不可以俯仰屈伸多怒則百脈不定又大怒則鬢髮焦筋血為勞卒不死俟五臟傳遍終死矣藥力不及苟能戒心易志可以得生隱居云道家更有頤生旨第一令人少嗔書云當食暴嗔令人神驚夜夢飛揚淮南子大怒破陰先賢詩曰怒氣劇炎火焚和徒自傷觸來勿與競事過心清涼人有所怒氣血未定因以交合令人生癰疽悲哀書云悲哀憔悴哭泣喘乏陰陽不交傷也故吊死問病則喜神散悲哀動中則傷魂魂傷則狂妄不精久而陰縮拘攣兩脅痛不舉悲哀太甚則胞絡傷而陽氣內動發則心下漬溲數血也大悲伐性悲則心系急肺葉舉上焦不通榮衛不舒熱氣在中而氣消又云悲哀則傷志毛悴色夭竭絶失意生納云肺出氣因悲而氣耗不行所以心系急而消矣夫心主志腎藏因悲哀則失精陰縮因悲而心不樂水火俱一而神精散亡矣思慮黃帝曰外不勞形於事內無思想之患以恬愈為務以自得為功形體不敝精神不散可壽百數矣彭祖曰凡人不可無思慮當漸漸除之身虛無但有遊氣氣息得理百病不生又曰道不在煩但能不思衣不思食不思聲色不思勝負不思得失不思榮辱心不勞神不極但爾可得千歲庚桑楚曰全汝形抱汝生無使汝思慮營營靈樞曰思慮怵惕則傷神神傷則恐懼自失皮爛脫肉毛悴色夭書云思慮過度恐慮無時鬱而生涎涎遂轉升而不降為憂氣勞思五噎之病思慮則心虛外邪從之而積氣在中時減於食又云思慮傷心為吐衄為發焦謀為過當飲食不敵養生之大患也諸葛亮遣使至司馬不問戎事但以飲食及事之繁簡為問使曰諸葛公夙興夜寐罰二十以上皆親覽焉飲食不數升懿曰孔明食少事煩其能久乎後果然張丞節云勞經言瘵證有蟲患者相繼誠有是理只譬如俗談不娩事人害相思也與一女人情密勿經別離念念不捨失寢忘餐便覺形容瘦悴不償所願竟為沉痾士人有觀書忘食一日有紫衣立前曰公不可久思思則我死矣問其何人曰我穀神也於是絶思而食是故蓋思則氣結伏熱不散久而血氣俱虛疾至夭枉也憂愁靈樞曰內傷於憂怒則氣上逆上逆則六腑不通溫氣不行凝血蘊里而不散津液澀滲著而不去積遂成矣書云憂傷肺氣閉塞而不行又云遇事而憂不止遂成肺勞胸膈逆滿氣從胸達背隱痛不己憂愁不解則傷意恍惚不寧四肢不耐當食而憂神為之驚寐不安女人憂思哭泣令陰陽氣結月水少時多內熱若渴不已肌體枯黑深憂重恚寢息失時傷也驚恐書云因事而有大驚恐不能自遣膽氣不壯神魂不安心虛煩悶自汗體浮飲食無味恐懼不解則精傷骨酸瘛瘲精時自下五臟失守氣虛不固驚則心無所倚神無所歸慮無所定氣乃亂矣大恐傷腎恐不除則志傷恍惚不樂非長生之道驚恐憂思內傷臟腑氣逆於上則吐血也恐則精怯怯則上焦閉閉則氣逆逆則下焦脹氣乃不行有婦人纍月不産以坐草太早恐懼氣結而然遂與紫蘇藥破氣方得下臨危冒險則魂飛戲狂禽異獸則神恐淮南子云大怖生狂有朝貴坐寺中須臾雷擊坐後柱且碎而神色不動又有使高麗者遇風檣折舟人大恐其人恬然讀書如在齋閣苟非所守如此則其為戒當何耶憎愛老子曰甚愛必大費多藏必厚亡知足不辱知止不殆可以長久甚愛色費精神甚愛則遇禍患所愛者少所費者多惟知足知止則身可不辱不危也故可長久憎愛損性傷神心有所憎不用深憎常運心於物平等心有所愛不用深愛如覺頗偏尋即改正不然損性傷神多好則專迷不理多惡則憔悴無惟戕生之斧也淮南子曰好憎者使人心勞弗疾去則志氣日耗故不能終其壽視聽老子曰五色令人目盲五音令人耳聾彭祖曰淫聲哀音怡心悅耳以致荒耽之禍如此何以長生孔子非禮勿視非禮勿聽孟子曰伯夷目不視惡色耳不聽淫聲孫真人曰生食五辛節熟食飲極目遠視夜讀注疏久居煙火博奕不休飲酒不已熱餐麵食抄寫多年雕鏤細巧房室不節泣淚過多月下觀書夜視星月刺頭出血多日沒後讀書數向日月輪看極目遠視山川草木馳騁田獵冒涉風霜迎風追獸日夜不息皆喪明之由慎之慎之書云心之神發乎目久視則傷心腎之精發乎耳久聽則傷腎耳聽淫聲目好色美口嗜滋味則五臟擂動而不定血氣流蕩而不安精神飛越而不守正氣既散淫邪之氣乘此生疾敘書曰久視日月星辰損目路井莫顧損壽故井汲水沸勿塞令人目盲耳聾玩殺看鬥則氣結五色皆損目惟皂湖屏風可助目力淮南子曰五色亂目使目不明五聲訛耳使耳不聰又曰耳目曷能久動勞而不息乎有年八十餘眸子瞭然夜讀蠅頭字云別不服藥但小不食畜獸肝人以本草羊肝明目而疑之余曰羊肝明目性也他肝不然畜獸臨宰之時忿氣聚於肝肝主血不宜於目明矣疑惑書云疑惑不已心無所主正氣不行外邪干之失寢忘餐沉沉默默氣血以虛漸為虛勞春秋晉侯有疾秦醫和視之曰不可為也疾如蠱趙孟曰何為蠱對曰淫溺惑亂之所生於文皿蟲為蠱在易女惑男風落山謂之蠱其卦巽下艮上巽為長女為風艮為少男為山少男而悅長女非匹故惑山木得風而落也三國史補云常疑必為心疾李蟠常疑遇毒鎖井而飲心火府也為外物所中終身不痊多疑惑病之本也昔有客飲酒館者壁有雕弓影落杯中客疑其蛇也歸而疾作復再飲其地始知其為弓也遂愈又僧入暗室踏破生茄疑為物損命念念不釋中夜有扣門索命者僧約明日薦祓天明視之茄也疑之為害如此談笑老子塞其兌閉其門終身不勤開其兌濟其事終身不救謂目不妄視口不妄言終身不勤苦目視情欲不益其事則沒身不可救矣書云談笑以借籍氣為本多笑則腎轉腰痛多笑則神傷神傷則悒悒不樂恍惚不寧多笑則臟傷臟傷則臍腹痛久為氣損真人曰人若不會將理者只是多説話戒多言損氣以全其壽也書云呼叫過當辨爭問答冒犯寒暄恣食鹹苦肺為之病矣行語令人失氣語多須住乃語津唾真人曰常習不唾地蓋口中津液是金漿玉醴能終日不唾常含而咽之令人精氣常流面目有光書云養性者唾不至遠遠則精氣俱損久成肺病手足重皮毛粗澀脊痛咳嗽故曰遠唾不如近唾近唾不如不唾唾液為醴泉聚流為華池散為津液降為甘露溉臟潤身宣通百脈化養萬神肢節毛髮堅固長春人骨節中有涎所以轉動滑利中風則涎上潮咽喉滾響以藥壓下俾歸骨節可也若唾其涎時間快意枯人手足縱活亦為廢人小兒驚風亦不可唾涎也風涎急塞有人喜唾液乾而體枯遇至人教以回津之法久而體復潤蓋人身以津液為本在皮為汗在心為血在腎為精在口為津伏脾為痰在眼為淚曰汗曰血曰淚曰精出則皆不可回唯津唾則獨可回則生意又續矣津液者吾身之寶金丹訣曰寶聚則為富家翁寶散則為孤貧客起居廣成子曰無勞爾形無搖爾精乃可以長生所謂無勞者非若飽食坐臥兀然不動使經絡不通血氣凝滯但不必提重執輕矻矻終日無致精力疲極則妙矣莊周曰人有畏影惡迹而走舉足愈多走愈疾而影不離身自為尚遲疾走不休絶力而死不知處陰以休影處靜以息迹愚亦甚矣書云勇於敢則殺勇於不敢則活蓋敢於有為則殺身不敢有為則活其身也起居不節用力過度則脈絡傷傷陽則衄傷陰則下起居不時飲食不節者陰受之而入五臟填滿抇塞為飧泄為腸澼疾風虛邪者陽受之而入六腑身熱不得臥上為喘呼精者神之本氣者神之主形者氣之宅神太用則歇精太用則竭氣太勞則絶甚勞則喘息汗出損血耗氣行立久行傷筋勞於肝久立傷骨損於腎養生云行不疾步坐不至疲立不背日奔走及走馬動其氣逆於膈未散而又飲水水搏於氣為上氣行汗勿跂床懸腳久則血痹足痛腰疼真人曰夜行常叩齒殺鬼邪沈存中筆談草間有黃花蜘蛛名天蛇遭其螫仍濡露則病如癩通身潰爛露涉者慎之書云大霧不宜遠行行宜飲少酒以御霧瘴昔有早行者三人一食粥而病一空腸而死一飲酒而健酒能壯氣闢霧瘴也坐臥書云久坐傷肉久臥傷氣坐勿背日臥勿當風坐臥於墳墓之傍精神自散臥出而風吹之血凝於膚為痹凝於腠為血汗為利凝於足為厥燃燭而臥神魂不安臥宜側身屈膝不損心氣覺宜舒足精神不散舒臥招邪魅寢不得言語五臟如懸磬不懸不可發聲臥勿以腳懸踏高處久成腎水損膝足冷臥不可戲將筆墨畫其面魂不歸伏臥魘不語是魂魄外遊為邪所執宜暗喚忌以火照照則神魂不入乃至死燈前魘者本由明出不忌火並不宜近喚及急喚亦恐失神魂也臥處頭邊勿安火爐日久火氣頭重目赤鼻乾發腦癰瘡癤臥習閉口氣不失邪不入若張口久或用渴失色又夜臥勿覆頭得長壽濯足而臥四肢無冷病又臥冷當風使人發喑醉臥黍穰中發瘡患大風眉脫又雷鳴時仰臥星月下當風醉臥以人扇之皆惹風疾隱居云臥處須當防虛隙烘焙衣衾常損人飽食即臥久成氣病腰疼百疴不消成積聚汗出不可露臥及浴使人身振寒熱發疹坐臥處有隙風急避之尤不宜體虛年老之人有人三代不壽問彭祖祖觀其寢處果有一穴當其腦戶令塞之遂得其壽蓋隙風入耳吹腦則陽氣散頭者諸陽所聚以主生也沐浴洗面書云頻沐者氣壅於腦滯於中令形瘦體重久而經絡不通暢常以朔日沐晦日浴則吉沐浴不可同日飽食沐發冷水洗頭飲水沐頭熱泔洗頭冷水濯足皆損人新沐發勿令當風縈髻勿濕頭臥令人頭風眩悶及生白屑發禿面黑齒痛耳聾女人月事來不可洗頭或因感疾終不可治沐浴漬水而臥積氣在小腹與陰成腎痹炊湯經宿洗體成癬洗面無光作甑哇瘡頻浴者血凝而氣散體雖澤而氣自損故有癰疽之疾者氣不勝血神不勝形也時病新愈冷水洗浴損心胞自汗入水即成骨痹昔有名醫將入蜀見負薪者猛汗河浴醫曰此人必死隨而救之其人入店中取大蒜細切面澆之食之汗出如雨醫曰貧下人且知藥況於富貴者乎遂不入蜀書云盛暑沖熱冷水洗手尚令五臟乾枯況沐浴乎遠行觸熱逢河勿洗面生烏皯間覽云目疾且忌浴令人目盲白彥良壯歲常患赤目道人曰能不浴頭則不病此彥良記之七十餘更無眼疾櫛發真人曰櫛發去風明目不死之道也又曰頭髮梳百度不可輕以沐陶隱居云飽則沐浴飢則梳梳多浴少益心目故道家晨梳常一百二十為數沐浴或月一度而已真人曰發宜多櫛手宜在面齒宜數叩津宜常咽氣以精煉此五者所謂子欲不朽修崑崙耳安樂詩云發是血之餘一日一次梳通血脈散風濕瑣碎録云亂髮藏臥房壁中久招不祥書云發落飲食中食之成瘕宋明帝宮人腰痛引心發則氣絶徐文伯曰發瘕也以油灌之吐物長二尺頭已成蛇懸柱上水瀝盡唯余發唐甄立言為太常時有人病心腹煩滿彌瘴診曰誤食發而然令餌雄黃吐一蛇如拇指無目燒之有發氣若頭尾全食人心死大小府書云忍尿不便成五淋膝冷成痹忍大便成五痔努小便足膝腳氣努大便腰痛目澀或飲食或走馬或疾步或為寒熱所迫令胞轉臍下痛胞屈闢不小便致死大小二事勿強閉過忍又忽失度或澀或泄皆傷氣害生為禍甚速劉惟簡至乾寧軍有人獻金花丸以縮小便藥犯砒蠟服二日小便極少至霸舟肢體通腫蓋閉關卻水道水溢妄行不遇盧昶幾為所誤蓋水泉不止者膀胱不藏也宜服暖劑以攝水其可強止之耶瑣碎録云對三光便溺及向西北並損人年壽衣著書云春冰未泮衣欲下厚上薄養陽收陰繼世長生春天不可薄衣傷寒霍亂食不消頭痛大汗能易衣佳或急洗亦好濕衣汗衣不可久著發瘡及風疹二府不利大汗偏脫衣得偏風半身不遂醉酒汗出脫衣靴襪當風取涼成腳氣冬時綿衣氈褥之類急寒急著急換急脫陶隱居云綿衣不用頓加添稍暖又宜時暫脫瑣碎録云若要安樂不脫不著北方語也若要安樂煩脫頻著南方語也天時避忌內經云陽出則出陽入則入無擾筋骨無見霧露違此一時形乃困薄經云大寒大熱大風大霧勿冒之天之邪氣感則傷人五臟水穀寒熱感則害人六腑地之濕氣感之害人皮肉筋脈先賢云人以一握元氣豈可與大造化敵康節有四不出之訓書云犯大寒而寒至骨髓主腦逆頭痛齒亦痛又云不遠熱而熱至則頭痛身熱肉痛生矣真人曰在家在外忽逢大風暴雨震雷昏霧皆是諸龍鬼神經過宜入室燒香靜坐以避之過後不出吉不爾殺人書忌云朔不可哭晦不可歌招凶四時調攝內經云春三月此謂發陳夜臥早起生而勿殺逆之則傷肝夏為寒變奉長者少又曰春傷於風夏必飧泄有云春夏之交陰雨卑濕或引飲過多令患風濕自汗體重轉側難小便不利作他治必不效惟五苓散最佳內經云夏三月此謂蕃秀夜臥早起使志無怒使氣得泄逆之則傷心秋為痎瘧奉收者少陶隱居六四時惟夏難將息伏陰在內腹冷滑補腎之劑不可無食物稍冷休哺啜書云夏之一季是人脫神之時心旺腎衰化為水至秋而凝冬始堅當不問老少皆食暖物則不患霍亂腹暖百病不生夏冰止可隱映飲食不可打碎食之腹冷熱相搏成疾夏以後乃秋分須慎肥膩餅腫油酥之屬此物與酒漿瓜果極理相妨所以多疾者為此也陶隱居云冷枕冷床心勿喜凡枕冷物大損人目書云夏不用露臥令皮膚成癬或作面風暑月日曬處有石不可便坐熱生瘡冷成疝盛熱戴汗當風不宜太過自日中來勿用冷水沃面成目疾伏熱者未得飲水返以冷物迫之殺人五月六月澤中停水多有魚鱉飲成瘕內經曰秋三月此謂容平早臥早起使志安寧逆之則傷肺冬為飧泄奉藏者少書云秋傷於濕上逆而咳發為痿厥又立秋日勿浴令皮膚粗燥因生白屑又八月一日後微火暖足勿令下冷內經曰冬三月此謂閉藏水冰地坼無擾乎陽早臥晚起必待日光去寒就溫毋泄皮膚逆之則傷腎春為痿厥奉生者少書云冬時忽大熱勿受之患時病由此又曰冬傷於寒春必病溫冬時天地閉氣藏作勞不宜汗出冷背冬寒雖近火不可令火氣聚不須於火上烘炙若炙手暖則已不已損血令五心熱手足應於心也大雪中跣足又不可便以熱湯洗或隨飲熱酒足隨墮又觸寒來寒未解勿便飲湯食熱物四氣調神論曰夫四時陰陽者萬物之根本也所以聖人春夏養陽秋冬養陰與萬物浮沉於生長之門逆其根則伐其本壤其真矣故陰陽四時者萬物之終始死生之本也逆之則災害生從之則苛疾不起是謂得道故天真論曰有賢人者逆從陰陽分別四時將從古今同於一道亦可使益壽而有極時也旦暮避忌書云早出含煨生薑少許闢瘴開胃又旦起空腹不宜見尸臭氣入鼻舌上白起口臭欲見之宜以少酒飲之真人曰平明欲起時下床先左腳一日無災著去邪兼避惡如能七星步令人壽長樂清旦常言善事聞惡事則向所來方三唾之吉又旦勿嗔怒暮無大醉勿遠行經曰平旦人氣生日中陽氣隆日西陽氣已虛氣門乃閉是故暮而收拒無擾筋骨無見霧露違此三時形乃困薄夜行用手掠發則精邪不敢近常啄齒殺鬼邪又夜臥二足伸屈不並無夢泄真人云夜夢惡不須説旦以水面東噀之咒曰惡夢著草木好夢成珠玉吉有教入廣者曰朝不可虛暮不可實令候不齊不獨入廣也雜忌書云忽見光怪變異之物強抑勿怪吉伊川宦廨多妖有報曰鬼使扇曰他熱故爾又報曰鬼打鼓曰以槌與之范文正公讀書夜坐有大面之怪近之範以筆書其面曰汝面非常大難欺范仲淹二公不以怪處之而怪自滅可為法脂油點燈人神不在血光之下凡刀刃所傷切勿飲水令血不止而死若血不止急以布蘸熱湯盦之或冷水浸之嚼蘇葉止血妙瑣碎録云蕭管挂壁取之勿便吹恐有蜈蚣祖師劉福真赴召早起見店婦臥地號叫可畏但見吹火蕭在傍劉知其蜈蚣入腹刺豬血灌之吐出蜈蚣而愈凡古井及深穿中多毒氣不可輒入且六月最甚先下鵝鴨毛試之若旋轉不下是有毒便不可入又云山有孔穴採寶者惟二月九月余月山閉氣交死也
