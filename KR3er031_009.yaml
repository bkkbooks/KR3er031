body:
  text: 卷之九傷風門病機敘論經云風為百病之長善行而數變又曰傷於風者上先受之又曰虛邪賊風陽先受之傷風亦有六經傳變陳無擇云經曰春傷於風乃四時之序也風循經絡以日傳變與傷寒無異但寒泣血故無汗惡寒風散氣故有汗惡風為不同仲景太陽經分傷寒傷風不同後人纂集不分門類但以風寒暑濕時氣瘟疫凡太陽病皆謂之傷寒今立傷風一門分別無混傷風之證有二因風為天地浩蕩之氣四時八風之變未嘗無也間有傷者皆因不能法道清淨腠理不密表上陽虛所致一因也有挾虛痰熱其氣拂鬱風邪易於外束二因也經曰清淨則內腠閉拒雖有大風苛毒弗之能害是也治法傷風表虛當固衛氣若表虛受風專行發散之藥必致汗多亡陽若內挾痰熱而傷風者宜內外交治不可專以解表腠理疏泄不覺易感者耳固衛氣兼散風邪如桂枝湯之屬是也陳無擇分六經用藥例足太陽膀胱經桂枝湯足陽明胃經杏子湯足少陽膽經柴胡加桂湯足太陰脾經桂枝芍藥湯足少陰腎經桂附湯足厥陰肝經八物湯前方皆以桂枝湯三味加以各經藥皆是立溫解散之劑脈候豚經云脈浮而大者為風權輿云浮緩為傷風鼻塞藥方六經分治例仲景桂枝湯治太陽經傷風自汗桂枝芍藥各二錢甘草一錢上水二盞姜三片棗一枚煎服桂枝芍藥湯柴胡加桂湯杏子湯桂附湯以上四方見傷寒門八物湯見虛損門辛溫解表劑局方神朮散治傷風頭痛鼻塞聲重蒼朮藁本白芷細辛羌活川芎甘草炙各五分上水盞半姜三片蔥白三寸煎服川芎茶調散治傷風上攻頭目昏痛鼻塞聲重薄荷葉四兩川芎二兩羌活甘草一兩荊芥二兩白芷一兩防風七錢細辛五錢上為末每服二錢食後茶清調下辛平解表劑和劑參蘇飲治傷風感冒發熱頭痛咳嗽涕唾稠黏此藥大解肌熱寬中快膈虛實疑似往來潮熱並皆治之人參紫蘇葉乾葛半夏制前胡桔梗枳殼陳皮茯苓甘草炙等分木香磨一分上水盞半姜五片棗一枚煎七分不拘時服消風百解散治四時感冒傷風發熱惡寒頭痛鼻塞咳嗽聲重蒼朮麻黃荊芥白芷陳皮各一錢甘草各五分上水盞半姜三片蔥一根煎七分不拘時服消風散治諸風上攻頭目昏眩項背拘急鼻塞聲重皮膚搔癢癮疹頑麻婦人血風頭痛腫癢皆治人參茯苓防風荊芥穗甘草芎藭羌活白殭蠶薄荷葉蟬蛻各一兩厚朴陳皮各五錢上為細末每服一錢茶清調下遍身癢者酒調下簡易沖和散治感冒風濕頭目不清鼻塞聲重倦怠缺伸出淚蒼朮四兩荊芥兩半甘草八錢薑湯調服二錢金沸草散治秋令肺經受風頭目昏痛咳嗽聲重唾涕稠黏及治時行疫氣壯熱惡風旋覆花去梗麻黃前胡各七分荊芥穗一錢半夏制赤芍藥甘草各五分上水盞半姜三片棗一枚煎八分熱服人參敗毒散治傷風頭痛壯熱惡寒及風痰咳嗽鼻塞聲重如心經蘊熱口舌乾燥加黃芩人參羌活桔梗柴胡前胡獨活枳殼川芎茯苓甘草等分水盞半姜三片薄荷少許煎辛涼解表劑和劑羌活散治風邪壅滯頭目昏眩遍身拘急肢節煩痛鼻塞聲重天陰愈覺不安羌活防風麻黃枳殼菊花細辛川芎蔓荊子白茯苓石膏黃芩甘草炙前胡各等分上水盞半姜三片煎柴胡升麻湯治感冒頭痛惡寒身痛鼻塞咳嗽唾涕稠黏柴胡前胡升麻桑白皮赤芍藥乾葛黃芩石膏荊芥上水盞半姜三片淡豆豉二十粒煎七分服解表攻裡劑宣明防風通聖散方見中風門治傷風邪傳入里內熱鬱結祕塞壅悶錢氏大黃丸治傷風內挾痰熱宜下之大黃黃芩等分上為末滴水丸服破傷風門病機破傷風證有四因病機云破傷風者有因卒暴傷風邪襲之傳播經絡致使寒熱更作身體反張口噤不開甚者邪氣入臟則死矣有因諸瘡不瘥榮衛虛不生肌肉瘡口不合風邪亦能外入為破傷風之候二者皆外因也有諸瘡不瘥舉世皆言著灸為上是謂熱瘡而不知火熱客毒逐經變病不可勝言微則發熱甚則生風而搐或角弓反張口噤目斜此不內外因也有破傷風不灸而病此者因瘡著白痂瘡口閉塞氣難通泄故陽熱鬱結熱甚生風或病已十分安全而忽有此病皆由內氣虛損風熱鬱於內臟而得之者此皆內因也劉河間論破傷風合傷寒三法古方以破傷風與中風混同論治故不另立門戶也惟河間分表裡中三法與傷寒同治用藥甚詳其言病因有外傷於風有因灸火內熱所作特與中風相似也但中風之人尚可淹延歲月而破傷風犯之多致不救蓋中風有在經在腑在臟之異獨入臟者最難治破傷風或始而出血過多瘡口早閉瘀血停滯俱是血受病血屬陰五臟所主故破傷風始雖在表隨即傳臟故多死也破傷風分表裡中三治破傷風同傷寒法通治分別表裡陰陽有在表在裡有在半表半裡者在表者宜汗之在裡者宜下之在半表半裡者宜和解之不可過其治也凡瘡愈或未愈始因風邪襲入或因閉塞鬱熱生風下已則表傳入里氣尚平者惟善伸缺筋脈攣急惡寒或筋惕而搐脈則浮數而弦宜以辛熱開沖鬱結如傷寒以麻黃湯發散是也凡用辛熱發散然是寒藥佐之則凡風熱之勝亦如傷寒麻黃桂枝加黃芩石膏知母之類是則在表之治法然也風邪在表不已漸於裡而未深入者是謂半表半裡亦猶傷寒小柴胡湯和解之也此中治之法然也邪氣入里病勢特深而舌強口噤項背反張驚惕搐搦涎唾稠黏胸臆滿塞而或便溺閉或時汗出脈則弦大而數然汗出者風熱鬱甚於里而表熱少罷則腠理疏泄而心熱甚故汗出也宜以芎黃湯之屬下之復以退風熱劑和之此治里之法然也脈候脈浮而無力為太陽虛也脈長而有力為陽明實也脈浮而弦小者少陽也脈洪實弦數邪入於裡也宜下之藥方通治破傷風劑靈砂丹治破傷風一切諸風威靈仙牽牛取頭末蒼朮各五錢何首烏香附子六錢川烏去皮尖乳香沒藥各三錢硃砂二錢為衣皂角去皮弦炙黃上為末皂角打碎用酒二升半春秋三日夏二日冬七日取汁打糊丸每服五丸酒下急風散治新久諸瘡破傷中風項強背直口噤不語手足抽搐眼目上視喉中拽鋸及取箭頭丹砂一兩草烏二兩半生半熟燒存性米醋淬冷烏頭生二錢半與草烏同研末麝香二錢另研上為細末和勻每服五分以酒下血止痛定如神若出箭頭先進一服次以藥敷箭頭上玉真散治破傷風手足打撲損傷南星防風各等分上為末生薑汁同酒調服一錢傷處以此藥敷之牙關緊急角弓反張童便酒調服二錢風藥一字散蒼朮四兩川烏二兩草烏白芷各一兩防風川芎各五錢天麻細辛各二錢半全蠍一錢上為極細末金瘡皮破血出藥到即止以帛縛之破傷風才發用藥一錢熱酒調服被蓋出汗即愈如無汗亦效未效再一服頭風茶調服偏頭風口含水搐鼻傷風熱茶調一服出汗安惡瘡無時不愈口含水洗瘡拭乾擦之立效蛇傷犬咬蠍螫口含鹽水洗之敷上效杖瘡有血干敷之奪命丹治破傷風角弓反張搐搦牙緊急不省人事川烏草烏天麻各半兩雄黃上為末每服五分用連須蔥二莖水一盞煎三五沸去蔥入溫酒服如重車行五里煎蔥湯米粥熱服有汗出覺身體微麻為妙不愈再服寶鑑方酒糊丸梧桐子大每服十五丸如聖散治破傷風止血定痛蒼朮三兩川烏頭炮去皮臍草烏頭炮各一兩蠍梢微炒二錢半天麻細辛川芎兩頭尖炮去皮白芷各七錢防風一兩雄黃二錢半乳香二錢炙上為細末每服一錢不拘時酒調服獨聖散治破傷風五七日未愈已至角弓反張牙關緊急立效蟬蛻淨五錢上為末用好酒一盞煎滾服之立蘇金棗兒治一切破傷風諸風等證白朮一兩半蒼朮六兩麻黃二兩兩頭尖全蠍去毒川烏各二兩川芎細辛防風白芷天麻各二兩五錢雄黃五錢辰砂二錢上為細末糯米糊丸如小棗兒大金箔為衣每服一枚或半枚量病人輕重用酒磨用或茶湯薑湯任服之專治一切惡瘡無名腫毒風癬疥癩及婦人吹乳瘋狗咬傷諸風皆用新汲水磨汁一盞塗瘡上一半服之牙痛先用漿水漱口次用豌豆大一粒咬定痛處立止白朮湯治破傷風大汗不止筋攣搐搦白朮葛根升麻黃芩各錢半芍藥二錢甘草一錢上水煎服無時蜈蚣全蠍散治破傷風搐搦蜈蚣一條炙去毒全蠍一對炒去毒上為細末如發時用一字或二字擦牙縫或吹鼻中治表諸劑拔萃羌活防風湯治破傷風邪初在表羌活防風川芎藁本當歸芍藥地榆細辛甘草等分水盞半煎八分服大便祕加大豆三錢防風湯治破傷風未傳入里急宜服此防風羌活獨活川芎上水煎調蜈蚣散服大效蜈蚣散蜈蚣一條炙去毒魚螵三錢炒上為細末每服五分防風湯調下如解表不已轉覺入里白朮防風湯服前藥過多汗出不止白朮防風黃耆各二錢上水二盞煎八分不拘時服破傷風大府祕小水赤自汗故知無寒也宜速下之先用芎黃湯二服次用大芎黃湯下之疏里諸劑拔萃芎黃湯川芎一錢黃芩三錢甘草五分上水盞半煎七分服二劑即服下藥大芎黃湯川芎黃芩各二錢羌活一錢大黃三錢上水煎服以利為度江螵丸治破傷風發搐臟腑祕澀江螵銼炒野鴿糞炒即左盤龍白殭蠶各五錢雄黃一兩蜈蚣二條天麻一兩上為末分作三份以一份用燒飯丸梧桐子大硃砂為衣以一份加巴豆霜二錢亦以硃砂為衣各包為記每服前朱丸三十粒加巴豆丸一粒第二次服加二粒加至利為度口服前朱丸左龍丸治直視在裡者左盤龍白江螵白殭蠶各五錢雄黃一錢上為細末蒸餅為丸梧桐子大每服十五丸溫酒下如里證不已當於左盤龍丸中入巴豆霜半錢如江螵丸三分製法加一粒服半表半裡和解諸劑羌活湯治破傷風在半表半裡羌活防風麻黃細辛川芎枳殼石膏蔓荊子黃芩甘草前胡白芷薄荷菊花白茯苓各等分上水二盞姜五片煎八分服地榆防風散治前證頭有微汗身無汗不可發表者地榆防風地丁草馬齒莧等分上為細末每服三錢米湯調下防風通聖散方見風門倍加荊芥穗大黃煎調全蠍殭蠶末服之養血諸劑當歸地黃湯治前證日久人虛宜養血當歸川芎芍藥地黃防風白芷藁本細辛等分上水煎服易簡諸方一方用蜈蚣一條為末擦牙吐出涎立瘥一方治破傷血身腫牙關不開用白殭蠶直者炒為末以薑汁調五分灌之又以薑汁多調以雞翎掃於瘡口上勿令乾一方用草烏為末每服二字酒調汗出為度一方治破傷風歌曰半兩當歸蠍二錢合來捶碎酒同煎直須軟爛和渣嚼一切傷瘡保萬全蠍梢散蠍梢七個為細末熱酒調服又方治破傷風歌曰魚膠能治破傷風先煎一錢瘡口封余別燒灰調酒服麝香少許立成功經驗方黑豆一撮炒熟煮酒三四杯三五沸調硃砂末一字服又方治破傷風欲死用川烏半夏南星皆生用天麻等分為末每服一錢黑豆淋酒服次用酒二杯投之厲風門病機內經敘論經曰風氣與太陽俱入行諸脈俞散於分肉之間與衛氣相干其道不利故使肌肉膹䐜而有瘍衛氣有所凝而不行故其肉不仁也厲者有榮衛熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰厲風厲風最為酷悍惡疾厲風證則今之所謂大風又謂之癩風實受天地間殺物之風古人謂之厲者以其酷烈暴悍可畏矣厲風所因三因經所載即風論所謂惡疾是也雖名曰風未必皆因風大率多嗜欲勞動氣血鬱熱或發汗泄不避風邪冷濕使淫氣與衛氣相干致肌肉皮膚瘍潰鼻梁崩塌千金所謂自作不仁極猥之業雖有悔言而無悔心良得其情然亦有傳染者原其所因有不涉內外亦有傳染而成者治之須推其所因凡因風寒濕熱兼勞役飲食與夫傳染迥燃不同若例作厲風治之則誤矣傳染之因亦惟內熱積毒者受之所謂燥以逢火則先焚矣亦不可不謂之風也厲風分五種厲風有五種黃風生黃蟲青風生青蟲赤風生赤蟲白風生白蟲黑風生黑蟲惟黑蟲不可治其蟲在於病軀去來無數甚入骨髓食人肝則眉脫食人肺則鼻柱崩食人脾則語音變散食人腎則耳鳴如雷若食其心則諸痛瘡瘍心實司之心受觸則死矣厲風為肺臟生蟲肝木風勝血熱之過然此病非止肺臟有之以其病發於鼻俗呼為肺風也鼻腫准赤脹大而成瘡乃血隨氣化也氣既不施則血為之聚血既聚則肉壞爛而生蟲也蟲者厥陰主之厥陰為風木主生五蟲蓋三焦相火熱甚而制金金衰則木邪勝侮金宜宣泄火邪利氣之劑蟲自不生也故此病為血熱明矣初作當疏泄煎局方升麻湯下錢氏瀉青丸余病各隨經治厲風有上下之分此證須分上下看其斑疹疙瘩與瘡上先見者上體多者在上也下先見者下體多者在下也上下同得者在上覆在下也雖有上下道路之殊然不外乎陽明一經陽明胃與大腸之經無物不受此風之入人也氣受之則在上多血受之則在下多氣血俱受者甚重自非醫者神手病者鐵心罕有免者夫或從上或從下以漸而來者皆可治病人見其病勢之緩多忽之失於早治及至勢極鮮能為矣良可嘆哉治法子和汗吐下三法治癩極效戴人張子和云內經論癩風針二百日眉毛再生針同發汗也但無藥者用針一汗可抵千針故高供奉嘗採萍治癱瘓風出汗張主簿病癱十餘年戴人曰足有汗者可治之當發汗其汗出當臭其涎當腥乃置燠室中以三聖散吐之汗出周身如臥水中其汗果臭其痰皆腥如魚涎足心微有汗次以舟車丸浚川散下五七行如此數次乃瘳患人身上癢甚蓋為風邪氣鬱血不榮服宜四物湯加黃芩白芷調浮萍末服發汗而愈大風發汗尤為至治經曰汗之則瘡已況癩之為風尤瘡之最惡者故曰厲風諸瘡熱入熱則生風又況厲風尤染肅殺之風而成者若非汗法何以去其厲風所以汗之一法治厲之最要者其餘諸方次第用之可也治厲風宜針刺出血內經曰大風骨節重鬚眉墮名曰厲風刺肌肉為故汗出百日主泄衛氣之怫熱刺骨髓汗出百日泄榮衛之怫熱凡二百日鬚眉生而止針怫熱屏退陰陽氣內復故多汗出鬚眉生也靈樞云厲風者素剌其腫上已刺以鋭針針其處按出其惡氣腫盡乃止常食方食勿食他食以犯其病一人病風面黑爬癢不已眉毛脫落刺其面大出血如墨刺三次血變紅色每刺自額至頤排針上下隔日一刺至十餘日已凡病在上者以醉仙散取臭涎惡血於齒縫中出在下者以通天再造散取惡物陳蟲於穀道中出凡大風初起頭面搔癢便有紅紫疹塊起者即可服防風通聖散加苦參天麻蟬蛻數十帖外用七珍湯洗浴發汗則易愈惡忌五辛葷腥厚味半年必不再作灸法治厲先服樺皮散自少至多服五七日灸承漿穴七壯灸瘡愈後再灸之凡三灸之後服二聖散泄熱祛血中之風邪時更以升麻湯送下瀉青丸為佳尚年深日久即以愈風丹換骨散等方詳而用之厲風首尾當謹守禁忌人有斯疾大率熱邪皆其嗜欲不謹所致患斯疾者當斷戒葷腥鹽醬一切厚味只宜清心寡欲絶色忘慮幽隱甘泉屏棄世務早早救療庶幾可活稍不守禁每見愈而復作一致危亡莫能再救孫真人云嘗治數百人終無一人免於死者蓋無一人能守禁忌故耳惟一婦人病愈外又服加減四物湯百餘劑半年之上方得月經行十分安愈丹溪治五人中間亦惟一婦人得免死而全愈以其貧甚且寡無物可吃也餘三四人越二三年皆復作而死脈候仲景曰肺浮而大浮為風虛大為氣強風氣相搏必成隱疹身體癢者名泄風久久而為痂癩藥方通治厲風諸劑局方樺皮散治肺臟風毒遍身瘡疥隱疹搔癢又治面上風刺粉刺樺皮四兩燒灰杏仁二兩去皮尖用水一碗於銀銚內烹之候水減半取起放冷乾用枳殼四兩去穰用火燒存性取出於濕紙上令冷用荊芥穗二兩甘草炙半兩右除杏仁外余藥為末將杏仁另研細次入諸藥細合勻瓷器內收之每服二錢食後溫酒調下胡麻散治風氣挾熱癮疹搔癢胡麻子十二兩苦參荊芥穗何首烏各八兩威靈仙防風石菖蒲牛蒡子炒菊花蔓荊子白蒺藜炒去刺甘草炙各六兩上為末每服二錢食後薄荷湯服茶清亦可升麻湯治諸風熱癩肌肉極熱體上如鼠走口反綻皮色皆變升麻茯神人參防風犀角鎊羚羊角鎊羌活各一錢肉桂五分上水二盞姜三片入竹瀝少許煎八分不拘時服加減大造苦參丸治大風諸風紫白癜風苦參一斤防風荊芥蒼耳子胡麻子半生半熟用皂角刺各十兩蔓荊子牛蒡子炒黃荊子枸杞子何首烏生地黃一兩蛇床子各三兩香白芷兩半薄荷一兩上為細末用大皂角搗爛熬膏入前藥勻丸如梧桐子大每服五十丸茶酒任下白花蛇膏治諸風癩疾遍身生瘡白花蛇肉四兩酒浸天麻七錢荊芥薄荷葉各三錢上為細末好酒二升蜜四兩銀石器內熬成膏每服一酒杯溫服日三次煎餅壓下於暖處發汗效換肌散治大風年久不愈眉毛脫落鼻梁崩壞額顱腫破服此不逾月取效白花蛇烏蛇各一兩酒浸一宿地龍去土二兩當歸細辛白芷天麻蔓荊子威靈仙荊芥穗各一兩甘菊花苦參沙參木賊不灰木石菖蒲甘草炙何首烏赤芍藥沙苑蒺藜胡麻炒黃天門冬川芎定風草即草烏莖蒼朮草烏頭木鱉子各二兩上為極細末每服五錢食後酒調下余飲數杯尤妙換骨丹治大麻風九肋鱉甲二兩大蜈蚣五錢上以鹽泥固濟候乾火煅存性二分為末用巴豆五錢去皮順手取膠棗七枚去核入巴豆在膠棗中火燒令焦存巴豆五分性將棗巴豆研爛如泥入前二味研勻醋糊丸緑豆大每服七丸虛人四五丸溫齏汁下下利惡穢未利再加三丸次服遇仙丹遇仙丹人參紫參各一兩苦參白殭蠶各二兩上為細末糊丸梧桐子大每服三十丸食前溫鹽湯送下直指方治大風苦參酒浸一宿皂角一兩龜板一個酥炙殭蠶炒一錢全蠍去毒一錢輕粉三分鵝毛一付鍋內炒化放地下出火毒共為末每服一錢酒調下早晚各一服皂角丸治大風諸癩肥大皂角二十條炙透去皮弦上以皂角肉用酒慢火煎得稠糊濾去清稠者候冷入香白糕杵為丸梧桐子大每服五十丸半飢酒送下愈風丹治大風肥皂角一斤去皮弦切作四指許用無灰酒浸一宿灑出用新汲水一碗擦作濃汁濾去渣以砂鍋慢火熬膏苦參四兩為末烏梢蛇二兩上二味末以皂角膏丸梧桐子大每服七十丸空心用防風通聖散湯送下日二服間日一浴發汗重者一料輕者半料而愈烏雞丸治大風烏梢蛇三條洗刷淨上以蛇煮熟去骨取肉焙乾為細末用蒸餅丸如米大以喂烏雞待雞食盡蛇肉後卻以雞煮取肉為末或丸或散酒服之丸時仍要加蒸餅每服五十丸甚者不過五雞而愈二聖散皂角刺三斤炭火燒存性上為細末每服二錢大黃湯調下河間治法早服樺皮散午服升麻湯下瀉青丸晚服二聖散此數藥皆是緩劑疏泄脈中之風熱也寶鑑醉仙散治大風疾遍身癮疹搔癢麻木胡麻子牛蒡子枸杞子蔓荊子各一兩炒白蒺藜苦參防風天花粉各五錢上為末每十五錢入輕粉一錢拌勻每服一錢茶清調下晨午夕各一服後五七日先於牙縫內出臭黃涎渾身疼痛昏悶如醉次後利下膿血惡氣病根乃除丹溪方輕粉二錢藥八味各半兩前四味為粗末炒紫色為度量人大小虛實與之證候重而急者須先與再造散下之候補養得還復與此藥服此藥須斷鹽醋油醬諸般魚肉椒料果實煨燒煿爆物止可服淡粥熟時菜亦須淡食茄亦不可食惟諸般蛇肉以淡煮熟可食也大風丸治疥癩大風子一斤全蠍兩半蟬蛻二錢半當歸尾五錢白殭蠶二錢半苦參防風羌活各二兩獨活大黃制芥川芎各一兩烏蛇肉二兩上為細末白米爛飯搗和丸梧桐子大每服五十丸茶清下發表諸劑子和浮萍散治風癬疥癩浮萍四錢荊芥川芎甘草麻黃去節當歸赤芍藥各一錢上每帖水二盞蔥二莖豆豉一撮煎服無時汗出為度神效第一方治厲風惡疾鼻梁崩塌遍身潰爛桑枝灰一斗熱湯淋取汁洗頭面次用大豆及緑豆漿添熱水三日一浴一日一洗面卻用側柏葉蒸曝乾白膠香各等分為細末滴水丸不拘時溫水送下五七粒一日三服八葉湯淋洗大風癩自愈桑葉蒻葉生地黃葉皂角葉藕葉蒼耳葉菖蒲葉何首烏葉上以八葉曬乾等分燒存性為細末用洗手面身體微汗為妙如聖散治大風洗澡苦參玄參紫參沙參陳皮厚朴蔓荊子荊芥穗麻黃防風白芷威靈仙上為末每用三錢桃柳枝各一握水五升煎湯臨睡時熱浴直指方治大風瘡洗浴苦參荊芥防風白芷獨活羌活各一兩洛陽花三兩用燒酒噴過一宿藁本一兩上作三次煎水洗汗出祕方七珍湯治大風洗澡青蒿蘄艾忍冬藤蒼耳子桑條桃條柳條三味以石捶碎同四藥煎湯洗澡於密室出汗上煎水一桶入炒鹽半斤間日一洗浴密室中以簟席圍之洗出汗為妙不過十次愈烏頭湯治大麻風癩紫白癜風草烏頭麻黃根地骨皮朴硝各一兩上為粗末用水一桶椒一合蔥三十根艾葉一兩同煎數十沸用醋一鍾和勻渣坐密室中圍壅自用手巾搭四肢候湯可浴即浴令汗透面上如珠出或坐或臥片時汗乾方可著衣避風五日再浴如此三五次每浴後更服換骨丹防風通聖散治大風初作方見風門攻裡諸劑通天再造散治大風內實熱壅用此攻之鬱金兩半大黃一兩炮皂角刺一兩炒白醜取頭末六錢半生用上為細末每服五錢日未出面東以無灰酒調下儘量為度晚利下黑頭小蟲病輕者只利如魚腸臭穢之物忌食葷腥厚味半年如犯之再作不可救此藥三五次而愈本事神效追命散治大風北大黃七錢半川鬱金五錢大皂角刺一兩上為細末每服二錢用真大風子油同好酒臨睡時溫調服隔二日再服直候瀉下無蟲方瘥皂角散治大風皂角刺燒存性二錢北大黃一錢輕粉五分上為末空心酒調下取出惡物服藥數日齒血毒血甚臭解毒丸治大風疾內熱積毒天花粉三兩大黃三錢朴硝二錢甘草炒五錢上為細末麵糊丸如緑豆大每服二十丸至三十丸白湯下祛風養血劑易老祛風丸治癩風經云脈風成疾則癩也黃耆枳殼防風枸杞子芍藥甘草地骨皮生地黃熟地黃等分上為末木臼杵為細末煉蜜丸梧桐子大白湯下五十丸東坡四神丹醫未有傳此四味者久服可愈大風羌活玄參當歸生地黃或煎或丸俱可服取蟲諸劑明硫黃酒殺癩風諸蟲明硫黃乳鉢研極細上入酒調空心飲清汁明日添硫黃再研入酒如前或添好大風子油更妙黑虎丹治大風諸癩惡瘡內蝕形骸變壞天靈蓋三兩干蝦蟆二個燒存性去頭足人中白桃仁泡去皮尖各二兩麝香五分穿山甲炒老皂角刺燒存性各半兩輕粉二錢上為末煉蜜丸梧桐子大每服三十丸月首五更米飲連日服取蟲盡即愈殺癆蟲通用烏蛇丸治癩風殺蟲烏蛇肉酒浸焙乾蜂房炙各一兩桃仁炮去皮尖曬乾白蒺藜炒去刺皂角刺炒貫衆各七錢胡麻子四兩雄黃苦參各七錢蕪夷五錢獨活七錢檳榔硫黃各五錢硃砂雷丸五錢干蝦蟆一個去頭足炙上為細末以長皂角十條水三升煎成膏和藥末丸梧桐子大每服三十丸空心溫酒送下雷丸散取大風蟲雷丸阿魏貫衆末各二錢麝香五分水銀硫黃雄黃各二錢半用乳鉢研入醋少許令水銀盡為度上為細末每服一錢天明溫酒送下敷藥方蛇床子根燒灰存佳雄黃硫黃白礬草烏等分上為末用香油或蜜調敷患處易簡方圖經方治瘡疹最多用亦可治癩風其法用苦參五斤切以好酒三斗量二十日每飲一合日服不絶若覺痹即瘥一方治大風令眉毛再生用側柏葉九蒸九曬羅為末煉蜜丸梧桐子大每服三十丸白滾湯送下日二服夜一服一方治風癩引脅牽痛發作即吐耳如蟬鳴用天門冬搗如末每服三錢酒調食遠服若人久服亦能長生附癜風證白癜風者麵皮頸項身體皮膚色變為白與肉色不同亦不癢痛謂之曰白癜此亦風邪搏於皮膚之間氣血不和所生也紫癜風者多在四肢或身上或紫疙瘩如赤豆疔狀是也此為風熱壅結而然治法赤白癜風並同一方也追風散治赤白癜風蒼朮米泔水浸焙乾苦參何首烏荊芥穗各等分上為末將皂角三斤去皮於瓷器內熬膏和丸如梧桐子大或服五六十丸空心好酒送下加減大造苦參丸方見厲風門胡麻散方見風疹門二方俱治癜風效烏蛇浸酒方治紫白癜風烏蛇六兩酒浸去皮骨炙微黃防風桂心各二兩白蒺藜炒杵去刺二兩牛膝枳殼麩炒天麻羌活各三兩五加皮二兩熟地黃四兩上銼碎以生絹袋盛藥以無灰酒二斗於瓷甕中浸密封七日後開每日二度溫飲一小盞忌魚雞豬鵝煎炒物四神散治紫白癜風雄黃硫黃雌黃白礬上各等分研為細末每用時洗浴令遍身出汗次以生薑蘸藥擦患處良久以熱湯洗之當日色淡五日除根蒼耳丸治諸風癮疹紫白癜風五月五日採取蒼耳子葉洗淨曬乾為末煉蜜丸梧桐子大每服十丸日三服若身體有風處或如麻豆粒此為風毒出也可用針刺黃水出盡乃愈草靈丹治一切風瘡及癮疹痛風風痹採紫背浮萍攤於竹篩內下著水曬乾為細末煉蜜丸如彈子大每服一九用黑兄淋酒化下治腳打撲渾身麻痹七珍湯治癜風方見厲風門諸風應效酒治紫白諸風方見歷節風門八白丸治一切黑白斑點諸般瘡疹令人面色好白芷白芨白蘞白附子白殭蠶白蒺藜白丁香白薇草烏杏仁泡去皮尖甘松藁本山楂豆粉鷹條豬牙皂角各一兩兒茶三錢輕粉三錢樟腦五錢密陀僧五錢豬胰三兩去膜肥皂水煮乾去裡外筋皮上為末先將肥皂搗爛用雞蛋清豬胰煉蜜調和然後下末藥和搗丸如彈子大日三次洗擦之易簡方一方以硫黃為極細末用雞蛋清一枚調勻生布一塊釘板上以藥塗上自不縮反覆刷藥曬乾收起凡動作出汗用布擦患處歌曰紫癜白癜一般風附子硫黃最有功薑汁調勻茄蒂擦若經三度永無蹤又曰紫癜白癜兩般風水銀輕粉最成功搗取生薑自然汁只當一擦便無蹤又方治紫白癜汗斑等風雄黃硫黃黃丹密陀僧南星各等分上為末先用姜擦患處次用姜蘸末藥擦後漸黑次日再擦黑散則無事矣
