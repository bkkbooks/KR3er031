body:
  text: 卷之二十五瘟疫門病機瘟疫敘論經曰冬傷於寒春必病溫瘟疫當推運氣所發巢氏病源云春氣溫和夏氣暑熱秋氣清涼冬氣冰寒此四時正氣之敘也冬時嚴寒萬物深藏君子固密則不傷於寒觸冒之而即病者為傷寒不即病者為寒毒藏於肌膚中至春變為瘟病至夏為熱病是以辛苦之人春夏必有瘟病者皆由冬時觸冒之所致也凡病傷寒而成瘟者先夏至日為病瘟後夏至日為病暑其冬復有非節之暖是為冬瘟冬瘟為病非其時而有其氣者冬氣嚴寒君子當閉密而反發泄於外者為冬不藏精春必病瘟丹溪云眾人病一般此天行時疫瘟病者春時天道和暖患壯熱口渴而不惡寒者是也瘟疫病者其病與時氣瘟熱等證相類皆由歲之內節氣不和寒暑乖候或有暴風疾雨霧露不散則民多瘟疫病無少長率皆相似如有鬼厲之氣故云瘟癘病黃瘟者由邪氣鬱結不散或失於汗解或汗後不解猶邪熱深鬱於胃中小便不利舉發為黃遍身如橘枳故曰黃病瘟疫傳經與傷寒證同一日太陽受病邪在皮膚故頭項強腰脊強二日陽明受病邪在肌肉故身熱鼻乾不得眠三日少陽受病故胸脅痛而耳聾四日太陰受病故咽乾腹滿五日少陰受病故口熱舌乾而引飲六日厥陰受病故煩滿而陰陷七日六經傳變法當愈其不愈者邪氣未除而欲再傳經重受病也病瘟勞役者難治巢氏云凡瘟毒病新瘥脾胃尚虛穀氣未復若作勞妄動傷力並食豬羊雞犬魚膾炙爆肥膩生果麵食硬澀難消之物停積腸胃膈悶腹脹便秘或大吐大下重複發熱病作不可救也溫病陰陽交者不治評熱論篇帝曰有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何岐伯對曰病名陰陽交交者死不治此陰陽交錯而血氣不循亂經妄走而熱所以不息也故死瘟病陰陽易者不治陰陽易病者是男子婦人瘟病新瘥未平復而相交合因而病復者名為陰陽易也男子病新瘥未平復而婦人與之交接得病者名陽易婦人病新瘥未平復男子與之交接得病者名陰易若二男二女並不相易所以呼為易者陰陽相感動其毒度著與人如換易也其證身熱頭重四肢拘急小腹㽲痛者即死其病勢緩者違歲月亦死脈候太陽脈大陽明脈弦長少陽脈弦數太陰脈弦細少陰脈沉厥陰脈微緩脈陽濡弱陰弦緊更遇溫氣變為瘟疫病瘟而脈洪大者可治脈洪而數者危兩寸浮大按之無力者宜補兼表大熱而脈沉澀細小足冷者不治瘟病四五日體熱腹滿而吐脈來細而強十二日死瘟病二三日頭痛腹滿飲食如故脈直而疾八日死瘟病八九日頭身不痛目不赤色不變而反利脈不牒牒按之不鼓手時大心下堅十七日死瘟病汗不出出不至足者死厥逆汗自出脈堅強急者生虛軟者死瘟病下利腹中痛甚者死治法瘟病發汗與傷寒不同瘟因春時溫氣而發初非傷寒於表也此因鬱熱自內而發於外故宜辛平之劑以發散之況時令已暖更不可用麻黃所以與傷寒發表不同也瘟病用三因治法權輕重用方最效凡瘟病發於三陽者多而三陰者少脈浮頭痛發熱者太陽也宜人參羌活散加葛根蔥白生薑紫蘇汗之自汗身痛者九味羌活湯脈尺寸俱長鼻乾不眠而躁者陽明也宜葛根解肌湯十味參飲汗之脈尺寸俱弦數胸脅痛而耳聾少陽也小柴胡湯主之大頭瘟候大頭瘟為天行邪氣客於太陽陽明少陽之經頭目俱腫而為病也太陽病發於頭上並腦後下項及目後赤腫者是也治宜荊防敗毒散羌活藁本行經陽明病發於鼻額並二目不開及面部者是也或熱氣喘口乾舌燥咽喉腫痛不利脈數大者普濟消毒飲若內實熱者防風通聖散間服之少陽病發於耳之上下前後並頭角紅腫者是也若肌熱日晡潮熱或寒熱往來口苦咽乾目痛胸脅滿悶小柴胡湯加消毒之藥三陽經俱受邪併發於頭面耳鼻者以普濟消毒飲或通聖散消毒散外用清涼救苦散敷之治大頭瘟不宜速攻則邪氣不伏反攻於內而傷人也且頭空虛之分既著空虛則無所不至也所以治法當先緩而後急則邪伏也緩治以清熱消毒虛者兼益元氣胃虛食少者兼助胃氣內實熱盛者大便秘結以酒浸大黃下之乃宣熱而泄其毒也此為先緩後急之法若先從鼻腫次腫於目又次腫於耳至頭上絡腦後結塊則止不散必出膿而後愈蝦蟆瘟候蝦蟆瘟天行邪氣客於少陽頸項並腮俱腫大如蝦蟆樣者故名蝦蟆瘟宜用風熱藥解毒丸間下之外以側柏汁調蚯蚓糞敷之大頭蝦蟆之候盡因風熱溫邪在於高顛之上宜敗毒散加羌活黃芩酒浸大黃隨病加減不可峻用降藥雖有硝黃之劑必細細呷之大抵攻之太峻則邪在上自如無過之地及受其害也疫病發狂妄語身大熱而赤者調胃承氣湯下之疫病發熱頭痛身疼見風惡寒脈浮數者必得大汗而後愈用以羌活神術湯方見傷寒門天氣溫暖加麻黃葛根煩躁加石膏秋月感瘟疫者宜白虎湯加蒼朮疫病頭汗出而發黃者五苓散倍加茵陳汗下後餘熱不解不可復攻惟以柴胡清之煩躁而渴者宜白虎湯水漬法陶尚文治疫只在少陽者小柴胡加防風羌活微發之而愈經陽明者柴根二方合服之若見太陽證大便泄者以小柴胡湯去黃芩對五苓散尤當看脈寒熱若無寒去桂留芩小便不利是膀胱本病小柴胡加五苓散去桂用入太陰無熱證見者用理中湯此證必腹痛而瀉明日瀉止痛止仍用小柴胡和之入少陰厥陰之經用陰證傷寒傳經法治如看疫病未知端的且先以敗毒散治之看歸何經再隨經施治無不效者春感清氣無汗惡寒發熱為瘟疫通用升麻葛根湯春感清氣發熱而渴不惡寒解肌湯葛根黃芩芍藥麻黃桂枝甘草大棗煎服春瘟發熱身痛咳嗽口渴脈浮洪而熱甚者小柴胡湯加桂枝治嗽加五味子渴去半夏加天花粉人參脈實渴宜大柴胡湯下之渴加知母石膏瘟病尺寸脈俱浮素傷於風因而傷熱風熱相搏其證四肢不收身熱自汗頭痛喘息發渴昏睡或體重不仁慎勿發汗汗之則譫語煩躁目昧無精光病在少陰厥陰二經宜萎蕤湯人參敗毒散葛根龍膽湯小柴胡湯甚者栝蔞葛根湯脈浮身腫汗出者漢防己湯誤汗者防己黃耆湯四時傷寒疫癘或傷風有汗或風溫身腫體痛惡風口乾日晡潮熱脈實並用人參敗毒散夏因熱而反感寒夏及秋初而為暴寒折於盛暑熱結四肢則壯熱頭痛宜金沸散治之瘟疫六七日不解以致熱入血室反發黃身如煙燻目如金色口燥而熱結以砭針刺曲池出惡血仍以通聖散兼散兼下如汗如黃水糞如黑膏者而速愈凡瘟疫病八九日而熱不退發斑發黃及氣飽逆上等證雖大便通而脈不甚浮緊者率可以承氣五苓合服而下之瘟疫病發狂不知人大柴胡湯加當歸泄者三黃石膏湯柴苓湯疫病胸膈滿悶小柴胡加枳實橘紅黃連大便不通大柴胡湯微利之不可峻下作渴者小柴胡加石膏知母濕溫加蒼朮白虎湯發黃者柴苓湯去桂用未退用茯苓滲濕湯藥方治疫證有三法宜補宜散宜降用大黃黃連黃芩桔梗蒼朮防風滑石香附子人中黃等分為末神麯糊丸每服五七十丸氣虛四君子血虛四物痰二陳湯送下熱甚加童便一方用人中黃一味飯丸白湯下六七十丸多效制人中黃法俗多謂人中黃人糞是也人多有以糞汁清頓服二三碗而病隨愈但恐穢臭特甚不能下咽故丹溪制此人中黃法冬月以竹筒一段割去青兩頭留節一頭打通一竅以大甘草為末內竹筒中以木塞其孔周密投糞缸中浸二三月取出曬乾收貯待用大能治瘟疫毒瘟疫通治劑敗毒散治四時瘟疫羌活獨活前胡柴胡川芎枳殼桔梗白茯苓人參各等分甘草減半上咀每服五錢水盞半姜三片煎一盞溫服或為細末沸湯點服此藥治傷寒瘟疫風溫風眩四肢痛憎寒壯熱項強睛痛不問老人小兒皆可服或嶺南煙瘴之地或瘟疫時行或人多風痰或處卑濕之地腳氣痿弱此藥不可缺日三服以效為度活人心統方蒼朮米泔浸一宿麻黃黃芩乾葛川芎升麻甘草各等分蔥白上水二盞姜三片煎八分食前服春加柴胡防風薄荷夏加石膏滑石黃連秋加羌活前胡枳殼冬加薑桂白芷細辛藿香正氣散治時行瘟疫頭痛發熱噁心不快九味羌活湯治同前方並見傷寒門凡瘟疫初起之時用正氣羌活二湯皆可服未病之先覺有時行或三四日服一帖則邪氣自不犯六神通解散通治疫病甚有奇功蒼朮二錢麻黃黃芩石膏滑石各一錢甘草五分豆豉十粒水二盞姜七片蔥頭二個煎服雜著方治嶺南春秋時月人感山嵐毒氣發熱惡寒膈滿不思食此毒氣從鼻口入內當清上焦解內毒行氣降痰不宜發散黃連薑汁炒升麻蒼朮鹽水炒錢半厚朴姜炒黃芩酒炒木香枳實半夏泡七次桔梗柴胡木通各一錢生甘草五分水二盞姜五片煎七分食前熱服羌活升麻湯治溫暑之月時行瘟熱病宜清熱解毒兼治內外羌活升麻葛根白芍藥人參黃芩各一錢黃連石膏甘草生地黃知母各七分水二盞姜三片棗一枚煎八分溫服羌活柴胡湯治一切時行感冒疫氣嶺南瘴瘧羌活一錢柴胡蒼朮黃芩陳皮半夏枳實甘草炙川芎各七分水盞半姜三片煎七分食前稍熱服取微汗十神湯治時令不正瘟疫妄行升麻葛根湯治大人小兒時氣瘟疫發熱頭痛柴胡升麻湯治時行瘟疫壯熱惡風體痛頭疼鼻咽乾咳嗽吐涕稠黏並見傷寒門聖散子治冬行瘟疫方見瘴氣門運氣五瘟丹黃芩黃柏黃連山梔香附子紫蘇甘草梢大黃上七味生為末將大黃三倍煎滾湯去渣和丸藥如雞子大硃砂雄黃為衣金箔貼每一丸取泉水七碗浸化可服七人前藥乙庚年黃芩為君丁壬山梔為君丙辛黃柏為君戊癸黃連為君甲巳甘草梢為君為君者多一倍也餘四味與香附紫蘇為臣者減半也東垣普濟消毒飲子元泰和二年四月民多疫癘初覺憎寒壯熱體重次傳頭面腫盛目不能開上喘咽喉不利口乾舌燥俗云大頭傷寒諸藥難治終莫能愈漸至危篤東垣曰身半以上天之氣也邪熱客於心肺之間上攻頭面而為腫耳須用下項藥共為細末半用湯調時時服之半用蜜丸噙化服盡良愈活者甚眾時人皆曰天方謂天仙所制也遂刻諸石以傳永久黃芩半兩酒炒黃連半兩酒炒人參三錢陳皮去白一錢甘草二錢連翹一錢玄參二錢殭蠶七分炒升麻七分柴胡八分桔梗板藍根馬勃各一錢鼠黏子一錢上為末服如上法或加防風川芎薄荷當歸細辛水二盞煎一盞食遠稍熱服如大便硬加酒煎大黃一錢或二錢以利之腫熱甚以砭針刺之蘊要荊防敗毒散治天行時疫發散瘟邪荊芥防風羌活獨活前胡枳殼人參茯苓薄荷甘草川芎牛蒡子桔梗各等分水煎服內熱加黃連渴加天花粉活人生庵金汁治時疫熱病傷寒發狂譫語晦昧並治中蠱惡毒疔瘡毒氣入腹欲死者服之即愈冬月內用好人糞置篾囊中其囊約大可盛糞一桶先於囊中安紙五七層紙上加細黃土約二寸厚方可加糞於囊中囊懸置於缸上俟其糞滴清汁於缸內瀝月餘將清汁收貯瓷壇中約有一斗加入蜂蜜一斤和勻密封壇口外以箬裹埋於土地中以土蓋之約入土一尺許次年二三月取用治熱病瘟病神效每用一碗頓服之如擦惡瘡將雞翎掃之醮汁瘡上即消發表方治瘟疫初作必先服心統方升麻柴胡湯六神通解等湯熱服被覆取汗如不汗再一服有汗為度如難汗可用麻黃一握煎沸湯一盆令病人仰臥曲膝將沸湯盆放曲膝下空處卻將夾被連頭覆之汗即出俟周身透足底濈濈然為度三黃石膏湯治疫癘大熱而躁石膏生三錢黃芩黃柏黃連豆豉半合麻黃八分梔子五枚打碎水二盞煎一盞連進三四盞則愈太無神朮散治四時瘟疫頭痛項強寒熱身痛專主山嵐瘴氣蒼朮厚朴陳皮甘草石菖蒲藿香各一錢水盞半姜三片棗一枚煎八分服減菖蒲加香附名神朮散氣散黃連解毒湯治時疫以經汗解或因飲食復劇大熱煩悶乾嘔口燥呻吟錯語不睡方見火門竹葉石膏湯治時病傷寒疫癘表裡俱虛發熱心煩已得汗解內無津液少氣欲吐方見暑門瘟毒發斑劑升麻葛根湯升麻芍藥葛根甘草各等分上水煎甚加玄參去芍藥葛根名升麻湯人參白虎湯治熱毒疫深內外結熱舌卷鼻黑如煤狂言面赤發斑如錦五日可治六七日不可治宜陽毒升麻湯方見傷寒門瘟毒發斑身無熱煩渴大便實者宜調胃承氣湯方見傷寒門黑奴丸治陽毒發斑煩躁大渴時瘟疫六七日未得汗脈洪大或數面赤目脹身疼熱躁狂言欲走口噤難言為壞傷寒醫所不識棄為死人心前溫暖灌下即活麻黃黃芩釜底煤灶突墨梁上塵小麥奴大黃芒硝各等分上為末蜜丸彈子大新汲水化開服飲水盡足當發寒寒已汗出乃瘥若時頃不出汗再服一丸須見微利若不大渴不可服瘟疫發黃劑亦可與傷寒發黃方參用雜著茵陳梔子湯時氣發熱變為黃病所謂瘟黃宜瀉濕利水茵陳梔子炒黃芩炒白朮白茯苓白芍藥厚朴葛根木通各錢半木香人參各一錢加姜水煎服良方茵陳散治熱病發黃目如金色小便如血心煩悶口苦幹頭痛茵陳梔子木通天花粉柴胡秦艽麥門冬甘草各等分水盞半竹葉十個煎七分溫服茵陳五苓散治瘟疫熱鬱發黃身如煙燻眼珠皆黃小水不利宜用此大便秘結加大黃脈浮弦身體痛往來寒熱時有咳嗽鼻乾脅痛無汗嗜臥身目悉黃小水短者用小柴胡加梔子主之本方調益元散亦可以上諸方見傷寒門疫癘攻下劑大柴胡湯治瘟疫內熱大便難病後五六日不惡寒反惡熱大承氣湯治瘟熱五六日不大便腹痛煩滿少陰口乾舌燥調胃承氣湯治太陽陽明不惡寒反惡熱嘔噦譫語三方見傷寒門直指大青丸治時行瘟疫發熱上膈結熱薄荷梔子黃芩黃連甘草各三錢連翹六錢大黃玄明粉各八錢上為細末用青蒿自然汁為丸綠豆大雄黃為衣治雜病發熱者硃砂青黛為衣每服五六十丸白滾湯送下子和浚川散治濕熱發黃大小便不通聖惠舟車丸二方見積聚門大頭瘟附方東垣二黃湯治大頭天行時疫黃芩酒炒黃連酒炒生甘草各等分每服五錢水盞半煎八分溫服徐徐呷之如未退加鼠黏子芒硝煎時時細服毋令飲食後未已再服取大便邪氣已即止前方宜加引經藥陽明渴加石膏少陽渴加栝蔞根陽明行經升麻芍藥葛根甘草太陽行經甘草荊芥防風並與上藥相合用或云頭痛酒芩口渴葛根身痛羌活防風芍藥俱宜加之集成通聖消毒散治時行疫癘頭面腫盛目不能開鼻塞口乾舌燥內外有熱或咽喉腫痛不利或內實大便不利煩躁脈洪數防風荊芥牛蒡子甘草川芎當歸芍藥黃芩薄荷梔子桔梗滑石麻黃憎寒拘急無汗脈浮數者用之連翹芒硝便實者加之大黃酒浸之能上行內實大便堅硬用內虛便溏者不可用上水煎溫服細呷之漏蘆湯治時毒頭面紅腫咽嗌堵塞水藥不下若臟腑素有積熱發為腫毒疙瘩一切紅腫惡毒漏蘆二錢升麻錢半大黃酒浸量輕重用之黃芩酒洗五分生甘草一錢藍葉如無用青黛黑玄參牛蒡子炒研苦梗連翹各一錢水煎服大利結者加芒硝清涼救苦散治大頭瘟腫甚者以此藥敷之芙蓉葉霜桑葉白蘞白芨大黃金線重樓黃連黃芩黃柏白芷雄黃芒硝山茨菰赤小豆南星等分上為末蜜水調敷腫處以翎頻掃之萬病解毒丸方見中毒門生薄荷汁磨服半錠半錠磨敷腫處綠散治疫病咽喉腫痛青黛硼砂山豆根消石冰片紫河車玄明粉等分為末吹入喉甘桔湯治冬溫咽喉腫痛方見咽喉門萎蕤散治冬溫頭面腫萎蕤二錢半麻黃杏仁白薇各一錢石膏錢半川芎羌活甘草甘菊花各一錢青木香五分水二盞煎一盞日三服石葦散治瘟疫小便不通石葦去毛瞿麥各一兩木通甘草炙條黃芩各半兩葵子三合加燈心水煎空心溫服雞子清飲治熱病五六日壯熱之甚狂言欲走雞子二枚取清芒硝細研寒水石細研各上先新汲水一盞調芒硝等末次下雞子清攪勻分二服易簡方一方瘟熱八九日後已兼汗下熱不退口渴咽乾欲飲水者即以六一泥即蚯蚓糞不拘多少擂新水飲之又方以晚蠶砂擂水濾清與飲之熱甚者以青布涼水浸過略掐干置患人胸上以兩手心按之良久布熱易之須臾當汗如水出皆涼汗也而或患人作戰皆欲汗欲愈若寒戰以被覆之汗出後則不戰而愈一方治天行疫癘宜東引桃枝葉銼煎湯浴澡以席圍出汗一方治天行時氣宅舍怪異降真香燒焚大避邪氣屢驗亦能召鶴小兒帶之能避惡邪一方治疫癘時行用赤少豆以新布囊盛之置井中三日夜取起舉家用井水面東立男子吞下三十粒女人吞下二十粒連服三日止而疫不敢染治瘟疫咒法並治邪病用棗一枚咒曰華表柱念七遍望天罡取氣一口吹棗上令病人嚼吃湯水任下此三字鬼之祖名也宣聖避瘟丹孔平仲云邪氣氤氳未嘗不流行而為病故軫念世人設此方以濟世使趨吉避凶不致夭橫孔氏繼今六十餘代用之法以臘月二十四日五更初取井花水在平旦第一汲盛淨器中量人口多少漫乳香至歲旦五更令溫暖從小至大每人以乳香湯飲之香一小豆塊吞下則一年不患時疫
