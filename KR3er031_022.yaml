body:
  text: 卷之二十二痼冷門病機敘論帝曰陰盛生內寒奈何曰厥氣上逆寒氣積於胸中而不散不散則溫氣去寒獨留則血凝血凝則脈不通其脈盛大以澀故中寒陰陽應象論曰陰盛則身寒汗出身常清數栗而寒寒則厥厥則腹滿死能夏不能冬故曰陰氣有餘為多汗身寒舉痛論曰寒氣入經而稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒然而痛帝曰其痛或卒然而止者或痛甚不休者或痛甚不可按者或按之而痛止者或按之無益者或喘動應手者或心與背相引而痛者或脅肋與少腹相引痛者或腹痛引陰股者或痛夙昔而成積者或卒然痛死不知人少間復生者或痛而嘔者或腹痛而後泄者或痛而悶不通者凡此諸痛各不同形別之奈何岐伯曰寒氣客於脈外則脈寒脈寒則縮蜷縮蜷則脈絀急絀急則引小絡故卒然而痛得熱則痛立止因重中於寒則痛久矣寒氣客於經脈之中與炅氣相搏則脈滿滿則痛甚不休也寒氣稽留熱氣從上則脈充大而血氣亂故痛甚不可按也寒氣客於腸胃之間膜原之下血不得散小絡急引故痛按之則血氣散故按之而痛止寒氣客於俠脊之脈則深按之不能故按之無益也寒氣客於衝脈起於關元隨腹直上寒氣客則脈不通脈不通則氣因之故喘動應手矣寒氣客於背俞之脈則血脈泣脈泣則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至熱氣至則痛止矣按之則熱氣至即按而摩之而使之熱則熱氣至也導引是矣寒氣客於厥陰之脈厥陰之脈者絡陰器繫於肝寒氣客於脈中則血泣脈急故脅肋與少腹相引痛矣厥氣客於陰股寒氣上及少腹血泣在下相引故腹痛引陰股寒氣客於小腸膜原之間絡血之中血泣不得注於大經血氣稽留不得行故夙昔而成積矣寒氣客於五臟厥逆上泄陰氣竭陽氣未入故卒然痛死不知人氣復反則生矣寒氣客於腸胃厥逆上出故痛而嘔也寒氣客於小腸小腸不得成聚故後泄腹痛矣原病式曰諸病上下所出水液澄徹清冷癥瘕㿗疝堅痞腹滿急痛下利清白食已不飢吐利腥穢屈伸不便厥逆禁固皆屬於寒水液澄徹情冷吐利水液清冷而不渾濁此為病寒則水穀不化故吐利清冷也癥為腹硬堅按之應手謂之癥也寒則血氣凝故也故削堅積非辛熱藥不能除瘕為腹中雖硬忽聚忽散無有常準以其病瘕未成癥也血不流而寒博故成瘕也㿗疝少腹控卵腫急絞痛也寒主拘縮故也寒極而土化制之故腫滿也經言丈夫㿗疝謂陰氣連少腹急痛也故言婦人少腹腫脹肝經足厥陰之脈也經注曰寒氣聚而為疝也堅痞腹滿急病寒主拘縮故急痛也寒極則血凝泣而反兼土化制之故堅痞而腹滿也有熱腹滿堅痞者當從熱制之也下利清白水寒則清淨也食已不飢胃熱則消穀善飢故病寒者食雖已而不飢也胃膈潤澤而無燥熱故也吐利腥穢腸胃大寒而傳化失常金寒則水冷故吐利腥穢也熱則酸臭寒則腥穢理之常也屈伸不便厥逆禁固陰水上於清淨故病寒則四肢逆冷而禁止堅固舒捲不便利也痼冷為陽氣衰弱而脾胃虛人身貴乎陰陽和平而無偏勝則無偏疾沉寒痼冷之證乃是真陽耗散脾胃虛弱失於調理以致胃寒又啖生冷黏膩難化之物經年纍月積久而成痼冷漸傷脾胃因而漬積臟腑以成痼疾但有寒冷觸犯速然而作以致手足厥冷畏冷憎寒飲食不化或嘔吐涎沫或大便洞泄米穀不消或小便頻數或肚腹絞痛或逢寒咳嗽或㿗疝大作皆其證也痼冷證多吐瀉而飲食不化東垣云脾胃不足勞役形體中焦不能營運傳為寒中故吐利清穀宜附子理中湯之類以蔥白煎羊肉湯服之愈凡真氣衰微胃氣不實不可食生冷寒涼若食寒涼愈至腸胃虛寒嘔吐涎沫水穀不化腸胃常痛腹冷如冰皆陽虛陰盛之所為也張仲景有陰毒雖不曰痼冷即寒冷所傷手足冷臍腹痛嘔吐下利身如被杖脈微欲絶此由腎氣虛寒脾家傷冷內外皆陰陽氣不守遂成陰毒至於唇口手足俱青寒氣衝心煩躁悶亂精神如失脈沉而伏匿多不治也脈候脈沉而遲者為臟寒痼冷微而澀者為血虛寸脈微遲者陽乏久而不起必成痼冷尺肺沉遲者腎氣虛寒主腰足清冷如冰痼冷病脈絶不至者死痼冷病脈微遲心中煩躁者死治法寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之寒淫所勝平以辛熱佐以苦甘以咸瀉之反治之法寒者熱之陽虛生外寒者從丹溪治法丹溪云陽虛則惡寒用參耆之類甚者加附子以行參耆之功虛勞冬月惡寒之甚氣實者宜利宜解表柴胡乾葛之類腎經積冷下元虛憊者宜安腎丸之類痼冷者貴乎溫補不可太剛仁齋直指曰苟得其養無物不長苟失其養無物不消人之處世飲食為上湯藥次之惟其口腹不充嗜欲無節所以臟中停寒而成沉痼男子流精女人下帶骨寒腦冷氣乏血衰嘔吐噁心久泄注下皆其證耳治療之法惟貴乎溫補不宜太剛養氣血之劑佐以薑桂甚加附子為愈若夫熱劑剛燥急欲回陽吾恐腎水易涸虛火燭炎難保其生知者審之藥方附子理中湯薑附湯沉附湯真武湯並治痼冷陽虛腹痛吐利寒戰方並見傷寒門十全大補湯治諸虛百損人參白朮茯苓甘草當歸川芎芍藥地黃黃耆肉桂各五分上水二盞薑三片棗二枚煎八分空心服甚者加附子五分八味丸治下元冷憊腰腳痠重虛勞消渴熟地黃四兩山藥山茱萸各二兩肉桂熟附子各一兩澤瀉牡丹皮白茯苓各兩半上為末煉蜜丸梧桐子大每服三四十丸食前鹽湯下淡寮附子茴香散治氣虛積冷心腹絞痛泄瀉食少人參白朮白茯苓炙甘草各七分乾薑炮附子制各五分肉豆蔻茴香各四分木香三分丁香五粒水盞半鹽少許煎七分空心服和劑沉香蓽澄茄散治內挾積冷臍急痛引腰背面色萎黃臟腑自利小便滑數小腸氣痛並治之附子制蓽澄茄茴香葫蘆巴木香補骨脂肉桂巴戟天川烏桃仁川楝子沉香各等分和劑三建湯除痼冷接元氣椒附丸治積冷臍腹引痛時有盜汗二方並見諸虛門濟生復陽丹治陽虛陰盛手足厥冷暴吐大下脈細羸瘦傷寒陰證川烏制附子炮天雄制鍾乳粉各一兩陽起石煅四兩硃砂另研一兩上為末酒煮神麯糊丸梧桐子大每服五十丸空心鹽湯下麝香鹿茸丸治真元虛憊精血耗少熟地黃山藥各三兩杜仲炒鹿茸酒炙各兩半五味子肉蓯蓉牛膝酒洗沉香半兩麝香五分上為末煉蜜丸梧桐子大食前鹽湯下四十丸耆附湯治氣虛陽弱虛汗不止肢體倦怠黃耆蜜炙半兩附子制三錢水二盞薑十片煎一盞服附參湯治真陽不足上氣喘急自汗盜汗氣短眩暈但是陽虛氣弱之證並宜服之人參三錢附子制二錢水二盞薑十片煎一盞無時服茸附湯治精血俱虛榮衛耗損潮熱自汗怔仲驚悸肢體倦乏鹿茸去毛酒炙附子制各二錢水二盞薑十片煎八分食前服黑鉛丹治真元虛憊陽氣不固三焦不和冷氣刺痛飲食無味腰背沉重膀胱久冷夜多小便女人血海久冷赤白帶下及陰證陰毒四肢厥冷不省人事急用棗湯吞二百粒即便回陽此藥大能升降陰陽補虛益元墜痰除濕破癖方見頭痛門養正丹升降水火接助元陽治咳逆翻胃痰結頭眩腹痛腰疼霍亂吐瀉方見頭暈門金鎖正元丹治真氣不足元陽虛冷遺精白濁嘔吐腹痛足膝無力痠疼拘急面黃神倦一切虛弱並宜治之方見瀉泄門來復丹此藥合二儀配陰陽奪天地衝和之氣乃水火既濟之方可冷可熱可緩可急善治榮衛不交滋養心腎能升能降上實下虛氣閉痰逆心腹冷痛臟腑虛滑不問男婦老幼危急之證但有胃氣無不獲安補損扶衰救陰助陽神功不可盡述舶上硫黃透明者佳一兩太陰玄精石一兩研細水飛青皮二錢硝石一兩同硫黃為末入碟內以微火溫炒用柳木篦子不住手攪令陰陽氣相入不可太過恐傷藥再研極細方入藥陳皮去白五靈脂研細水飛各二錢上五靈脂為末入青皮陳皮末和勻又次入玄精硝黃和勻好酒醋煮糊丸豌豆大每服三十丸空心酒送下小兒驚風欲絶研碎米湯調下大小伏暑悶亂紫蘇湯下婦人産後血暈惡露不止醋湯下赤白帶小腹痛男子疝氣諸痛不辨陰陽之證悉宜服之安腎丸治腎經積冷下元虛憊目暗耳鳴四肢無力夜夢遺精小便頻數常服壯元陽益腎水桃仁去皮炒四十八兩肉桂去粗皮十六兩白蒺藜炒巴戟天去心肉蓯蓉酒浸炙破故紙炒茯苓白朮石斛萆薢各四十八兩川烏制十六兩上為末煉蜜丸梧桐子大每服三十丸空心溫酒鹽湯任下接真湯治陰病手足厥冷腰腹疼痛真氣不足衰憊欲絶沉香二錢丁香一錢麝香五分附子制三錢水二盞薑七片棗一枚煎七分去渣空心溫服靈砂治諸虛痼冷厥冷神效水銀三兩硫黃一兩煉硃砂作水銀即此砂也就於市肆贖之研為末糯米糊丸麻子大每服五七丸加至十五丸空心人參棗湯下或鹽湯下疝氣偏墜木腎腫疼炒茴香入酒煎溫下虛勞咳嗽入薑烏梅紫蘇煎湯下盜汗小便多牡蠣入鹽湯下嘔逆翻胃丁香木香湯下痎瘧不已桃柳枝煎湯下腹滿腰痛莪朮湯下遺精白濁茯苓湯下走注遍身風嚼蔥白酒下婦人血氣痛延胡索煎湯下小兒驚風人參薄荷湯下百一雄朱丹治宿寒痼冷飲食嘔逆久則羸弱變為勞瘵雄黃硃砂各二兩用瓷盒一個先以牡丹皮二兩燒煙內外熏黃入雄砂於內以釅醋和臘茶作餅封盒口以赤石脂固濟盒縫又用赤石脂和泥又固一重外用鹽泥紙筋又固一層用粳火慢煨令乾次以炭火煅通紅為度退火埋土地中過宿去火毒取研入後藥丁香蓽茇赤石脂胡椒附子白朮各一兩乳香與石脂同研官桂木香各五錢上為細末和前藥又研勻以清酒二升二分熬去一分入附子末煮糊丸梧桐子大每服十丸空心溫酒或鹽湯送下祕方兜肚方治腹中寒積痼冷不散用之神效兼丹田神闕令人有子男婦皆可用有孕勿用檀香排草各一兩沉香丁香各五錢丁皮廣零陵香馬蹄辛白芷各六錢甘松附子乳香各二錢麝香九分上十二味為末和揉艾鋪綿中用帛做成兜肚以線釘定勿令移動外又紬夾裹肚及小腹初裹一夜日去之漸漸至二夜一去又漸五夜一去方可常裹保真膏治一切虛冷證及無子腎衰陽事不舉不固貼丹田及腎命門穴久久貼之大有功效方見祕驗門良方落洗法治下元虛寒一切冷病腰腹冷痛崩漏帶下椒目川烏細辛乾薑官桂上等分為粗末煎湯熱洗下部為妙灸法治腎與膀胱俱虛痼冷灸百壯愈妙胃俞二穴在命門穴對臍各開一寸五分是穴三陰交二穴在足內踝踝上四指當足胻中是穴氣海一穴在臍下易簡方一方治一切冷氣胡椒三十七粒擂酒服之一方治下元虛冷以胡椒破故紙等分為末蜜丸如梧桐子大每服三十丸空心溫酒下一方治心腹冷氣痛用大菖蒲二三寸捶碎同吳茱萸煎湯下之或細嚼菖蒲三寸熱酒下亦效一方治冷氣少腹常痛以艾葉乾薑等分為末蜜丸豌豆大每服三十丸酒吞下一立治冷疝少腹寒痛引入陰囊漸腫用花椒炒碎承以帛裹囊一寸厚須臾熱氣通而愈不熱易之一方治婦人少腹寒痛用川烏為末好醋攤絹上貼之
