body:
  text: 卷之四十九癲狂門病機癲狂敘論內經帝曰癲疾厥狂久逆之所生也脈解篇曰陽氣太上甚則狂癲陽盡在上而陰氣從下下虛上實故癲狂疾也又曰陰陽復爭則欲登高而歌棄衣而走也生氣通天論曰陰不勝其陽則脈流薄疾並乃狂靈樞云癲癇瘛瘲不知所苦兩蹺之下陽男陰女又如狂始生先自悲也喜忘善怒善恐者得之憂飢治之取手太陰陽明血變而止及取足太陰陽明狂始發少臥不飢自高賢也自辨智也自尊貴也善罵詈日夜不休治之取手陽明太陽太陰舌下少陰視之盛者皆取之不盛釋之也狂言驚駭善笑好歌樂妄行不休者得之大恐論癲狂病有同異之分癲狂病俗名心風蓋謂心神壞亂而有風邪故也丹溪謂癲屬陰狂屬陽癲多喜狂多怒又云重陰者癲重陽者狂由此觀之則是陰陽寒熱冰炭不牟安得概以一藥治之而何可以同日而語也又曰大概是熱癲者神不守舍狂者如有所見斯得病之情狀而理之不容易也春甫曰癲狂之病總為心火所乘神不守舍一言盡矣巔者至高也火性炎上正如經云陽氣太上則狂巔狂則孔子所謂狂狷者之狂也靈樞經曰狂病始發少臥不飢自高賢也自辨智也自尊貴也故曰狂者進取志大而大言者也前謂狂言如有所見斯得之矣蓋心火暴熾言語善惡不避親疏此神明之亂也此之所謂狂也蓋謂火熾之甚陽氣太上則病人亦乘陽火之上炎故棄衣而登高由狂而又癲此則聖人命名之義而有同中之異耳癲狂病因有二戴人謂肝屢謀膽屢不決屈無所伸怒無所泄肝木膽火隨炎入心心火熾亢神不守舍久逆而成癲狂一因也有思慮過多脾傷失職心之官亦主思甚則火熾心血日涸脾液不行痰迷心竅以致癲狂二因也癲與癇混同之誤古方每以癲癇並治出方乃大誤也蓋癲為心病而屬實者多癇為五臟兼病而屬虛者多蓋因靈樞一云癲癇瘛瘲不知所苦後人不察遂認為一證殊不知靈樞自以兩證而言不知所苦皆言不能自知其病之所苦也玉機微義始分別之而亦未嘗白靈樞之旨也脈候脈大堅實者癲狂脈虛弦為驚沉數為痰熱脈大而滑者自已沉小急實者死虛而弦急者死寸口脈沉大而滑沉則為實滑則為氣實氣相搏入臟則死入腑則愈丹溪曰癲狂脈虛易治實者難治治法癲與狂治有所分登高棄衣引重致遠者為癲乃痰火亢熾之甚而然治宜降下之劑滾痰丸之屬是也自高辨智妄語狂言神明失守為狂治宜鎮心安神清上之劑牛黃硃砂丸之屬是也治癲狂用吐下法速效張子和治癲狂令患人於燠室中先湧痰二三升後與承氣湯一二升頓服大下二十行而病即寧藥方清鎮諸劑清心湯治心受熱邪狂言叫罵動屐失常黃連黃芩薄荷連翹梔子甘草大黃芒硝各等分上水盞半竹葉十個煎八分溫服局方牛黃清心丸治心志不足神氣不定驚恐癲狂語言譫妄虛煩少睡甚至棄衣登高逾牆上屋等證羚羊角鎊一兩人參二兩半白茯苓川芎防風各半兩阿膠炒七錢半乾薑炮七錢白朮兩半牛黃各兩半麝香半兩犀角鎊二兩雄黃研飛八錢梅花冰片五錢金箔一千四百片白芍藥柴胡各兩半甘草炒五兩山藥七兩麥門冬去心枯黃芩各兩半杏仁泡去皮尖及雙仁者麵炒黃色另研用桔梗各二兩二錢神麯二兩半大棗一百枚蒸熟去皮核另研成膏白蘞七錢半蒲黃炒二兩半大豆黃卷一兩七錢半微炒當歸酒洗肉桂去皮各一兩七錢上除棗杏仁金箔二角及牛黃腦麝雄黃四味為末入藥和勻煉蜜同棗膏和丸每兩分作十丸將前金箔除四百片為衣每服一丸食後溫水化下朱雄丸治男女驚憂失志思慮過多痰迷心竅以致叫呼奔走此藥安魂定魄辰砂明雄黃各二錢半研白附子一錢上研末豬心血丸金箔為衣每服三丸人參菖蒲煎湯下抱膽丸治男女一切癲狂風癇及婦人産後驚氣入心室女經行驚氣蘊結頓服此藥屢效硃砂二兩水銀一兩黑鉛兩半乳香一兩細研上將鉛入銚內下水銀結成砂子下乳香乘熱用柳木捶擂勻丸如雞頭子大每服一丸空心井花水吞下得睡切莫驚動覺來則安再進一丸可除根引神歸舍丹治癲狂心風心氣不足硃砂膽南星各一兩白附子半兩上為細末豬心血泡蒸餅為丸梧桐子子大每服十五丸五膽丸治癲狂風癇妄走羊膽豬膽狗膽雞膽鯉魚膽各一枚傾汁作一處蛇黃五兩煆紅食膽汁盡為度上為末另以膽汁和丸緑豆大硃砂為衣每服十五丸食後以磨刀汁吞下或用末以磨刀水調服滾痰丸治癲狂熱盛不識人方見痰門奪命散治癲癇痰盛青礞石每兩用火硝一兩和同煉如金色研末每服一錢薄荷自然汁加蜜調下良久其藥自裹痰下墜甚者三服愈牛黃丸治癲狂風癇心風邪氣驚心神不守舍時發無常仆地吐涎不自知覺牛黃珍珠麝香各五分硃砂龍齒各另研犀角琥珀各二錢天門冬去心人參茯苓各四錢水銀五分麥門冬去心四錢防風黃芩知母龍膽草石菖蒲白芍藥全蠍甘草各半兩露蜂房三錢金箔銀箔各七十片上除另研藥外余為細末共和勻入煉蜜和搗千杵丸如梧桐子大每服十五丸食後臨夜新竹葉湯下鬱金丸治癲狂多年不愈痰迷心竅驚憂得之蟬肚鬱金真蜀地者六兩明礬三兩共為細末上為薄糊丸梧桐子大每服五十丸白湯下黃石散治心風發狂狗肝一具硝石黃丹各一錢半上以狗肝切開二藥為末擦肝內麻縛住水一升煮熟嚼津咽三黃丸方見火門以硃砂為衣常服治癲狂癇一醉散治心風發狂無灰酒二碗麻油四兩上二味和勻於鍋內慢火熬以柳條二十根攪百下如膏至八分灌病人飲盡令熟睡或吐或不吐覺來自定牛黃瀉心湯治心經邪熱狂言妄語心神不安牛黃另研冰片另研各一錢硃砂另研二錢大黃生用一兩上為細末和勻每服三錢涼生薑湯蜜水調下吐劑子和瓜蒂散治忽然心風癲狂不止三聖散治同上二方並見中風門局方碧霞丹治痰涎壅塞牙關緊急目睛上視癲癇狂妄等證石緑研九度飛五錢附子尖烏頭蠍梢各二十個上為末入石緑共和勻麵糊丸雞頭子大每服一丸薄荷汁化下更飲溫酒半合須臾吐出痰涎然後隨證以他藥治之如噤口擀開灌之下劑大承氣湯方見傷寒門治癲狂熱壅大便祕結控涎丹方見痰飲門治痰迷心竅狂言妄語如有所見甘遂散治癲癇及婦人心風邪祟甘遂麵包煨一錢用豬心取管血三條和藥末將心切開將血藥入內縛定溫紙包煨焦研末入硃砂二錢分作四丸每服一丸豬心煮湯下烏巴丸治癲狂熱結亂叫不止烏梅五個巴豆五粒去油成粉二味同研粥丸如黍米大硃砂為衣大人三五丸臨臥白湯送諒下三四行白粥止之易簡諸方芝麻仁湯治癲風麻仁四升水六升猛火煮令芽生去滓煎取七合空心服以手摩手足心自定凡進三劑愈一方苦參為末蜜丸梧桐子大每服二十丸白湯下一方用鯉魚一尾制淨切成塊以明礬四兩為末醃二日煎吃其疾必愈一方以鐵漿服之一方治癲狂大叫奔走用蝦蟆一隻去腹中物洗淨將腸胃復入腹中入罐固濟煅紅土掩定隔日取出入麝香一分同研極細每服一錢新汲水下千金方治癲狂不識人以人糞灰調酒服又方治暴狂言以硃砂末酒調服方寸匕日三次一方治邪入心經如見神鬼燒蠶紙酒調服方寸匕灸法間使二穴在掌外橫紋後三寸兩筋陷中灸五壯治癲狂人中一穴在鼻下小炷灸之治癲狂卒倒兩手足大拇指甲甲肉之半處灸七壯其法以二指並縛一處灸之四處著火心風門病機論春甫考心風病諸書鮮有載之而多附癲癇門候混同論治心風雖出於世俗之稱深中病情誠為切當古人謂風善行而數變風痹為不仁此曰心風者非若外風入中甚言其變常無定恍惚不仁而心之病誠若風之魔也此皆七情五志久逆所生而與癲癇則又不同矣癲狂癇證主於火熾風痰之盛而寢延及於心屬實者多心風則由七情五志久逆不遂戴人所謂肝屢謀膽屢不決屈無所申怒無所泄心之官則思甚則心血日涸脾液不行痰迷心竅則成心風屬虛者多治法須以七情相勝五志遂心養血豁痰引神歸舍標本兼治此疾可愈矣致若混同癲癇攻治是謂虛虛而速其死也噫脈候脈寸關微間而歇至者死微而滑者生浮而澀者難治乃血氣不足而神蕩於外弦大者可攻之虛而無力者宜補滑疾者痰甚在寸宜吐之關滑可下治法治心風病要分新久心風初作多屬虛候何則思慮傷脾則穀氣浸少血液日虧則心神慢散神不守舍卒成心風故知其始皆屬虛也歸脾湯養心湯定志丸之類至於病久則心志變而美惡不知無思無慮飲食如故殺氣頗增病根已固郁痰不解者可用子和法治之隨證調理無不愈也心風病有貴賤之難易貴者為難膏粱素積耗散良多一經病作則正氣虛而邪氣盛所以難賤者為易素甘淡薄稟受頗厚雖是病此則正氣實而邪氣輕所以易治心風以五志誘之然後藥之取效易五志誘之者如求利而遂病者則誘之金銀或詐以惠之或詭以遺之而先定其心志然後濟之以藥是得治之要也藥方正心湯治七情五志久逆心風妄言妄笑不知所苦人參茯神當歸酒洗生地黃酒洗各一錢羚羊角鎊甘草炙酸棗仁炒研遠志去心各八分上咀水二盞蓮子七枚煎七分去渣入羚羊角末麝香一分和勾食後臨臥服歸脾湯治思慮傷脾心神出舍怔忡健忘妄言等證養心湯治心血虛少七情郁逆怔忡健忘驚悸不識人事定志丸治心氣不足五志不遂妄笑狂言三方並見健忘門清心丸治心受邪氣精神恍惚狂言呼叫睡臥不安人參生地黃酒洗鬱金天麻各一錢硃砂二錢牛膽南星二錢上為末蒸餅丸黍米大硃砂為衣每服三十丸人參湯下鬱金丸治久病心風痰迷心竅多年不愈鬱金明礬各等分上為末蒸餅為丸梧桐子大每服五十丸食遠白湯下來蘇膏治遠年近日心風卒倒悶狂風癇中風痰潮牙關緊閉及破傷風並治皂莢肥大不蛀者去皮子淨一斤切碎用酸漿水二大碗春浸三日夏浸二日冬浸七日揉取淨漿去渣上以淨漿入砂鍋內文武火熬以槐柳枝條攪熬如膏取出攤在紙上陰乾用時取手大一塊溫漿水化在盞內扶病人坐定用竹筒盛藥水吹在病人左右鼻內良久涎出效欲要涎止以溫鹽湯服一二口便止忌雞魚生冷面蒜等物牛黃清心丸治心風怔忡神氣不定妄言失志方見癲狂門壽星丸治心風神不守舍妄笑妄言如有所見方見中風門引神歸舍丹治心氣不足並治心風方見癲狂門平補鋪心丹治前證方見虛損門金銀定志湯治心風失志妄行妄語當歸酒浸人參益智仁各一錢甘草石菖蒲茯神各七分五味子十五粒琥珀另研羚羊角鎊各五分上以琥珀羚羊角另放余水二盞金銀各一兩同煎至八分去滓入珀角二末調勾服琥珀茯苓膏治精神失守漸成心風人參一兩陳皮半兩當歸二兩酒浸銼三味熬稀膏一碗白茯苓二兩為末琥珀半兩另為末上將人參膏加琥珀茯苓末調勾如稠甚加蜜汁調之得所每服二三匙嚼咽下不時及臨睡服之妙寧志膏治心風方見驚悸門易簡諸方經驗方治心風水銀一兩藕節八個先研藕節令細次入水銀同研成砂子丸如雞頭子大每服二丸磨刀水下二服瘥外臺祕要治心風風癇引脅牽痛發作則吐耳內蟬鳴天門冬去心曝乾為末酒調方寸匕若人久服亦能長生一方治卒心風狂言妄語用硃砂為末酒調方寸匕日三服一方治心風癲癇不眠妄行不休自尊自智白雄雞一隻制淨煮熟五味調和作羹粥食之一方治發狂欲走或自高自貴或呻吟或邪祟以蠶紙作灰酒調或水調任下亦療風癲邪祟門病機邪祟敘論內經曰邪氣盛則實正氣奪則虛夫經之所謂邪者風寒暑濕燥火有餘之淫邪耳非若世俗所謂鬼神之妖怪也病有心虛驚惕如醉如癡如有邪鬼所附或陽明內實以致登高而歌棄衣而走皆痰火之所為實非妖邪祟之所迷也古雖有禁咒一科及龍樹咒法之治皆移精變氣之術但可解疑釋惑以使心神之歸正耳何邪祟之可祛哉丹溪曰俗云沖惡者謂沖斥邪惡鬼祟而病也如病此者未有不因氣血先虧而致者氣血者心之神也神既衰之邪因而入理或有之血氣兩虛痰塞心胸妨礙升降不得運行以致十二官各失其職視聽言動皆為虛妄以邪治之其人必死邪祟皆自心生凡山谷幽陰處所或有魍魎魑魅狐精貍怪及人間多年雞犬亦間有成妖縱使迷人則不過近於氣血虛而正氣弱者正氣弱即心邪心邪則妄見妄聞妄言妄走無非邪也惟邪見邪故有之矣正人無病者皆不得見從可審矣惟此心一正則百邪俱避何邪祟之疑哉脈候乍疏乍數乍大乍小或促或結皆邪脈也脈緊而急為遁尸脈滑者為鬼疰治法素問五邪刺法秦承祖灸鬼法治一切驚狂譫妄逾垣上屋罵詈不避親疏等證以病人兩手大拇指用細麻繩縛定以大艾炷置於其中兩爪甲及兩指角內四處著火一處不著則無效炙七壯神驗禁咒服藥兼治治邪祟病雖禁咒以釋其疑服藥必詳虛實痰火輕重調治則內外合一其病速愈若只務巫而不用藥其病不能去必無可愈之理若只服藥而不用巫以釋其疑雖愈效遲是故內外兼治斯速效矣此祝由之所由設也藥方正心湯方見心風門治邪祟見鬼不省人事蘇合丸方見風門治諸邪病還魂丹治中惡卒死麻黃三錢桂枝二錢杏仁十二粒水煎灌下即蘇李豫八毒赤丸治一切邪祟鬼疰服之即愈雄黃硃砂礬石附子炮藜蘆牡丹皮巴豆各一兩蜈蚣一條上為末煉蜜丸如小豆大每服五七丸無時涼水送下衛生寶鑑云信副使許可道到雄州諸豫看脈診之脈中乍大乍小乍短乍長此乃血氣不勻邪氣傷正本官說在路宿邯鄲驛中夜夢一婦人著青衣不見面目以手於脅下打一拳遂一點痛往來不止兼之寒熱而不能食乃鬼擊也豫曰可服八毒赤丸本官嘗讀名醫録中見李子豫八毒赤丸為殺鬼杖子遂與藥三粒臥時服明旦下清水二斗效又陳慶玉第三子因晝臥於水仙廟中夢得一餅食之心懷憂思心腹痞滿飲食減少約一載余漸漸瘦弱腹脹如鼓屢易醫藥及巫師禱之皆不效又不同安臥召余診之問其病始末因思此疾既非外感風寒又非內傷生冷將何據治豫思李子豫八毒赤丸頗與相當遂與五七丸服之下清黃涎鬥余漸漸氣調而以別藥理之數月良愈不一年體壯實如故因録之此藥可謂如神治時宜齊戒沐浴淨室正心修合戊午秋甫在杭城過遇飯店一婦年三十頗姿因往神廟燒香被熱途中飲涼水一碗歸而腹脹不食漸覺昏悶遂至妄言妄見皆云附邪巫禱不效余帶有八毒赤丸因與七粒令服之遂下黑汁一桶其婦遂軟而伏臥不言復進四君子湯一劑而愈桃奴丸治心氣虛怯有熱尸疰魘夢驚癇等證桃奴即桃樹上不落干桃十二月收七枚辰砂半兩桃仁十四兩玳瑁一兩鎊琥珀三錢烏犀角半兩水石上磨牛黃麝香冰片各一錢雄黃桃葉煮水飛三錢安息香無灰酒研飛上各另研以安息香同桃仁琥珀共熬成膏和諸藥末為丸雞頭子大陰乾每服一丸人參湯化下鹿角散治一切邪祟男婦夢與鬼交妖魅迷惑不肯實言鹿角為末水調服方寸匕日三服效與不效用東引桃枝煎湯下辟邪丹治沖惡怪疾及山谷間九尾狐精為狀作患人參茯神遠志鬼箭羽石菖蒲白朮蒼朮當歸各一錢桃奴焙乾雄黃辰砂各三錢各另研牛黃一錢另研金箔二十片或加麝香一錢上為細末硃砂雄黃牛黃三末和勻酒調米糊為丸龍眼大金箔為衣臨臥木香湯化下一丸諸邪遠避以絳紗囊盛五七粒懸床帳中尤妙易簡方一方治魘死不還用半夏末吹入中即蘇一方治鬼疰心腹痛不可忍取東引桃枝削去青皮取白皮一握水二升煎半升令服盡瘥不效再服一方治鬼疰尸疰抱朴子云是五尸之一疰其病變動挾諸鬼邪為害乃有二十六種至九十九種大略使人寒熱淋瀝沉沉默默然不的知其所苦而無處不惡纍年積月漸就頓滯以至於死後復傳旁人乃至滅門覺知此候當宜急治用桃仁一升搗碎水煮取汁四升一服盡當吐吐不盡弗愈三兩日再一服一方治前證以獺肝一具陰乾為末水調方寸匕日三服瘥一方治魘不悟以伏龍肝為末吹鼻一方治卒中五尸頓尸其狀腹脹氣急衝心或有塊青腫或牽腰脊以雞蛋一枚取白吞之困者搖頓令下又云雞味辛補一方治五尸飛尸遊走皮膚穿臟腑變化無常聞笑哀便作風尸者淫濯四肢不知痛楚每發昏迷遇風雪便作沉尸疰纏骨衝心舉身沉重精神錯亂常覺昏廢每遇節氣輒至以忍冬藤銼數斛煮取濃汁煎成膏每服半酒杯酒一杯下一方治一切邪祟鬼疰惡氣尸疰腹痛虎骨酥炙黃為末每服一錢酒調下得虎頭骨尤妙以虎頭骨作枕避一切鬼魘瘧鬼溫鬼等疾一方治尸疰鬼疰用鸛骨炙黃為末酒調方寸匕空心服一方治一切邪祟鬼疰用冬葵子炒為末酒調服徐長卿殺邪一方治鬼疰痃癖咳嗽日漸黃瘦用桃仁去皮尖打碎以水煮汁去渣入米煮粥空心食之一方治女子邪魅迷交用雄黃一兩松脂二兩溶化和桃枝攪勻丸如彈子大焚之用焙籠令女坐於上以被蓋之止留頭面在外不過三丸其邪自斷一方殺惡邪妖魅能禁不祥用桃奴桃蠧為末酒調下一方治邪祟百病諸藥不效以桃膠不拘多少桑柴灰淋汁漬一宿日乾為末煉蜜丸梧桐子大每服五七丸酒下立效或以桃花漬酒飲之兼好顏色最妙一方治邪氣百病輕身延年用明礬一斤以水一斗二升漬一宿礬石消化置銅器中炭火上熬大沸從旦至午或至一升許引以舉上如懸絲形加入白鹽一勺蜜半升攪勻候凝丸如梧桐子大每服五丸日三服醫案丹經云虛病痰病有似邪祟蓋血氣者身之神也神既衰乏邪因而入理或有之若夫血氣兩虧痰客中焦妨礙升降不得運用以致十二官各失其職視聽言動皆為虛妄以邪治之其人必死一少年人暑月因大勞而渴恣飲梅漿又連得大驚三四次妄言妄見病似鬼邪脈兩手皆虛弦而沉數豫曰數為熱虛弦為驚又梅酸之漿鬱於中脘補虛清熱導去痰滯病乃可安遂與參朮陳皮茯苓芩連等藥濃煎湯入竹瀝薑汁旬日未效聚皆尤藥之不對豫脈之知其虛未復痰未降也仍令前方入荊瀝服旬日而安一人醉飽後妄見如祟詢之系亡兄附體言出前事甚的乃叔在旁叱之曰非邪食魚腥與酒太過痰所為耳灌鹽湯一二碗吐痰一二升汗大作睡一宿而安卒中暴死病機靈樞雷公曰人不病而卒死何以知之帝曰火氣入於臟腑者不病而卒死矣雷公曰病少愈而卒死者何以知之帝曰赤色出於兩顴大如拇指者病雖少愈必卒死黑色出於庭大如拇指必不病而卒死卒中者卒然不省人事全如死尸但氣不絶脈動如故或脈無倫序或乍大乍小或微細不絶而心胸厥者是也玉機真藏篇曰急虛身中卒至五臟絶閉脈道不通氣不往來譬如墜溺不可為期其脈絶不來若人一息五六至其形肉不脫真藏雖不見猶死也治法治魘魅卒諸暴絶證用半夏洗泡七次為末每用少許吹入鼻內有嚏心頭溫者可治倉卒無藥急於人中穴灸兩壯大拇指離甲一韭葉許各灸三五壯即生扁鵲肘後方中惡與卒死鬼擊亦相類為治皆參取而用之已死搗鮮菖蒲根絞汁灌之立瘥卒中尸厥鬱冒中風中暑之類皆當發表仲景云鬱冒欲解必大汗出故返魂湯用麻黃桂枝清魂湯用荊芥及諸卒中用皂角半夏搐鼻取嚏用藜蘆砒霜揩齒取痰皆所以開發上焦使表邪流通也中暑急涼水恐閉腠經亦此意也山居中惡客忤卒死者灸臍中百壯皂角末吹鼻或韭汁灌耳中本事方云世言氣中者雖不見於方書然暴喜傷陽暴怒傷陰憂愁失意氣多厥逆往往多得此疾便覺涎潮昏塞牙關緊急若概作中風用藥非止不相為宜而反致殺人者多矣元祐庚午豫母氏親遭此禍至今飲恨母氏素稟氣血羸弱因先子捐館憂惱忽一日氣厥牙緊涎潮里醫便作中風大下數行一夕而死豫因言恨至今每見此證急化蘇合丸灌之便蘇然後隨其寒熱而調治之無有不愈者丹溪治一人年近六十而奉養太過陽先虧而暴厥者仲夏久患滯下又犯房勞忽一夕登廁兩手疏放兩眼開而無光尿自出汗如雨喉如拽鋸呼吸甚微其脈大而無倫次急令煎人參膏先與灸氣海穴八十壯遂能動人參膏亦成遂與錢半夜再與盡三斤方能言而索粥用十斤而利止幾二十斤而全安卒中仆地半身不遂者為中風治見中風門條內卒中仆地口吐涎沫者為癲癇治見本門驚怖卒死者以溫酒灌之蘇藥方局方蘇合香丸方見中風門治卒中惡忤痓厥等證還魂湯治卒死客忤暴厥麻黃一兩去節杏仁三十五枚炙甘草半兩千金有桂上三味水四升煮升半去渣令隨咽之通治諸感卒中忤暴鬼擊飛尸諸魘鬼忽氣絶而復覺或已無脈口噤拗不開湯入口不下者分病人發左右提擒肩引之藥下復進一服須臾蘇本事雄黃解毒丸方見中毒門治卒中仆地不知人事仲景備急丸方見傷寒門治諸卒暴中惡客忤心腹脹滿卒痛如錐刺氣急口噤停尸卒死者以溫水或苦酒服三丸或不下抬頭起灌令下咽須臾當瘥未效再服三丸腹中鳴即吐下便瘥回生法方見中風門治中惡卒死者尤妙黃龍丸治中暑卒死不知人或身熱惡寒頭痛狀如傷寒或往來寒熱煩渴嘔吐泄瀉常服去暑毒分陰陽硫黃硝石各一兩雄黃明者滑石白礬各半兩各研細末寒食麵四兩滴水丸新汲水下五丸漸加至二十丸口噤者水化灌下中暑忌冷此藥冷水下者乃熱因寒用附子理中湯方見寒門治中寒卒厥口噤以此灌之二劑遂愈破棺散一名散生散治卒死中惡諸暴絶死及石木所壓溺水自縊一切橫死但心口溫者並皆治之半夏泡七次為末以大豆許吹入鼻中得嚏即活硃砂丸治卒中惡垂死硃砂細研附子炮去皮臍雄黃明者細研各一兩麝香一分研巴豆二十粒取仁捶去油上研勻煉蜜和搗丸麻子大每服三丸不拘時粥飲下如不利更加三丸至七丸以利為度朱犀散治卒中惡氣鬼邪或因暮夜如廁或出郊野或遊空室或人所不至之地忽然見鬼物鼻口吸著惡氣卒然仆倒四肢厥冷兩手握奉口鼻出清血性命逡巡須臾不救此則尸厥相同但腹不鳴心脅俱暖切勿移動即令人圍繞焚爇麝香或安息香乳香蒼朮之類候醒方可移歸大硃砂麝香各一兩研犀角半兩鎊研末上為細末研勻每服二錢井花水調灌服硃砂符治卒中惡氣絶硃砂書舌作鬼字額上書之良仲景韭根茱萸湯救卒死韭根一把吳茱萸八兩炒烏梅十四個以水一斗檳榔七個煮三沸檳榔浮者生沉者死死者取三升去滓分飲之易簡諸方一方治卒死心頭微熱用百草花曝乾水漬封埋百日砂鍋內連水熬稠丸皂角子大令患人口含一丸須臾即活大妙一方治中鬼氣卒死口鼻出血用雄黃末一錢桃葉煎湯下一方治中惡客忤垂死用麝香一錢研合醋二合灌之即蘇一方治尸厥奄然死去腹中氣鳴用生薑汁半盞和酒煮沸灌之仍灸丹田百會氣海穴飛尸鬼疰與邪祟門參看病機本事方云飛尸者遊走皮膚穿臟腑每發刺痛變作無常通尸附骨入肉攻鑿血脈每不可得近見尸喪聞哀哭便發風尸者淫濯四肢不知痛之所在每發昏沉得風雪便作沉尸纏骨結臟衝心脅每發絞切遇寒便作主尸者舉身沉重精神錯雜常覺昏廢每遇節候輒變大惡皆用忍冬汁太乙精神丹蘇合香丸雄朱散隨治卒中惡者脹滿吐利為鬼疰邪氣卒患心腹脹滿吐利不息或不得吐利狀如干霍亂證世謂中惡是也由人精神不全心志多恐遂為鬼邪所附沉沉默默或寢言譫語誹謗罵罟訐露人事不避譏嫌口中好言未然禍福及至其時毫髮無失人有起心已知其兆登高陟險如履平地或悲泣呻吟不欲見人如醉如狂其狀萬端但隨方俗考驗治之藥方千金五邪湯治邪鬼尸氣或歌笑啼哭禹餘糧防風桂心芍藥獨活甘草白朮人參石膏牡蠣秦艽各二兩防己菖蒲茯神雄黃蛇蛻各一兩上咀每服五錢水二盞煎七分無時服茯神湯治五邪鬼氣入人體中見鬼妄言如有所聞見心神恍惚茯神人參石菖蒲茯苓各三兩赤小豆四十粒上咀每服五錢水二盞煎七分服雄朱散治感尸氣鬼疰遇憂悲寒熱變動則發雄黃硃砂當歸羌活川烏鬼箭犀角升麻川芎龍齒虎頭骨酥炙白殭蠶炒莽草南星泡檳榔二個陳皮麻黃白朮木香紫蘇子炒各一錢蜈蚣炙去頭足二條山梔七枚共為細末每服三錢酒調下日三服忍冬煎治一切飛尸鬼疰風邪等證忍冬藤葉不拘多少一石愈佳搗爛以水煮取濃汁去渣煎濃服如雞子大一丸日進二服其疾自除殺鬼五邪丸治邪氣鬼疰魘魅所持妄言恍惚不知人丹砂明者研雄黃明者研龍骨鬼臼去毛炙赤小豆各一兩半桃仁去皮尖五十粒鬼箭羽兩半芫青二十枚炒去翅上為細末研勻溶蠟和丸彈子大囊盛之男左女右縛於臂上小兒繫於頭上又將前末蜜丸梧桐子大每服一丸米湯下制此藥須於淨室雞犬不聞之所八毒赤丸方見邪祟門治一切飛尸鬼疰魘魅所持忽不省人事易簡諸方一方被鬼擊用伏龍肝為末新汲水調下二錢一方治尸魘如死脈動如故用灶突煤即百草霜如彈子大一丸漿水和飲之一方治弱人恍惚見鬼狂妄用平胃散加辰砂末棗湯調服二錢日二服愈即止
