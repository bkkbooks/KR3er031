body:
  text: 卷之十風癇門病機癇證內經始論靈樞云暴攣癇眩足不任身取天柱天柱穴在足太陽經又云癲癇瘛瘲不知所苦兩蹺之下男陽女陰潔古云晝發灸陽蹺夜發灸陰蹺各二七壯陽蹺起於跟中循外踝上行入風池申脈穴也陰蹺起於跟中循內踝上行至咽喉交貫衝脈照海穴也癲與癇不當並論按內經言癲而不言癇古方以癲癇並言誤也或言風癲或言風癇或言癲狂所指不一蓋癇證歸於五臟癲病屬之於心故今以風癇另立一門癲狂又別合一門也癇與痓要別異同辨癇病與痓病略相類而實不同其病發身軟時醒者謂之癇也身強直反張如弓不時醒者謂之痓也癇病隨其痰之潮作故有時而醒痓病比癇為甚而有挾虛者故因其昏冒而遂至亡者多矣癇病所因三因云癲癇病皆由驚動使臟氣不平鬱而生涎閉塞諸經厥而乃成或在胎中受驚或感風寒暑濕或飲食不節逆於臟腑而成或忤氣得之外驚恐得之內飲食屬不內外三因不同忤氣則一論三癇證治法千金方云水兒癇疾有三曰風癇驚癇食癇蓋風癇緣衣暖汗出風因入也初時先屈指如數乃作癇也驚癇起於驚怖大啼乃作癇也食癇先不哺乳吐而變熱後發癇也然風癇驚癇時時有之千個之中未有一二凡是先寒後熱者皆食癇也驚癇皆按圖灸之風癇當與豬心湯食癇當下乃愈紫霜丸之屬是也論五癇別録有五癇之證一曰馬癇作馬嘶鳴以馬屬午手少陰君火主之故其病生於心二曰羊癇作羊叫聲以羊屬未足太陰濕土主之應乎脾三曰雞癇作雞叫聲以雞屬酉足陽明燥金主之應乎胃四曰豬癇作豬叫聲以豬屬亥厥陰心包主之應乎右腎五曰牛癇作牛吼聲以牛屬醜手太陰濕土主之應乎肺此五癇應乎五畜五畜應乎五臟也發則旋暈顛倒口眼相引目睛上視手足搐搦背脊強直食頃乃蘇各隨所感施以治法凡五癇證重者多死病作後甚者亦多死惟輕者用五色丸主之病癇有陰陽之分千金方云病先身熱掣瘲驚啼叫喚後後發癇脈浮者為陽癇病在六腑外在肌肉猶易治也病先身冷不驚掣不啼呼而發病時脈沉者為陰癇病在五臟內在骨髓為難治也癇證由於痰熱原病武云風癇之發作者由熱甚而生風痰而風燥為其兼化涎溢胸膈而氣瘀昏冒僵仆也治法治癇證用汗吐下三法有效子和云夫癇病不至於目瞪如愚者用三聖投之更用火盆於暖室中令汗吐下三法並行次服通聖散百日則愈矣至於目瞪愚者不可治經曰神不得守謂神亂也癇證多是肝經風熱之過大凡癇病多是肝經風火之勝痰鬱膈間故先吐之汗之次服瀉青丸下之再次服東垣安神丸守真龍薈丸之類不獨防風通聖散瀉青丸而已治癇分脈藥寒溫不同難知云治洪長伏三脈風癇驚癇發狂惡人與火灸第三第九椎服局方妙香丸以針投眼子透冷水內浸少時服之如本方法治弦細緩三脈諸癇似狂服李和南五生丸癇證多本風熱而謂有陰陽寒熱之殊蓋由病之遠近故有虛實寒熱之分病之近者可以涼劑吐利之治也病之久者先是涼藥之過不免有虛實寒者當審之而可以施溫平補胃之劑而去病之根端不外吐痰之大法耳丹溪治義大率行痰為主用芩連南星半夏栝蔞尋火尋痰分多分少治之無不愈者分痰與熱有熱以涼劑清其心有痰必用吐法吐後平肝用青黛柴胡川芎之類龍薈丸並宜治之脈候浮者為陽癇在六腑沉者為陰癇在五臟微細為虛其治多難滑大者為實其治易藥方通治五癇諸劑楊氏五癇神應丹治癇證發作不問新久並宜治之南星半夏各炮二兩烏蛇肉一兩酒浸一宿去皮骨焙乾用蜈蚣半條炙去頭足全蠍二錢炒去足生白礬二兩白殭蠶半兩炒去絲硃砂雄黃各另研一錢麝香五分另研白附子半兩炒皂角四錢捶碎水半升浸汁與白礬一同熬乾研上為末薑汁煮糊丸梧桐子大每服三十丸薑湯下龍腦安神丸治男子婦人五癇無問遠近發作無時茯神人參地骨皮麥門冬去心甘草各二兩桑白皮犀角末各一兩馬牙硝二錢另研龍腦牛黃硃砂各一錢麝香五分上為末煉蜜丸彈子大金箔三十五片為衣冬月溫水化下夏月涼水化下大人日進二服小兒一丸作二服亦治虛癆發熱續命湯治癇作頓悶無知口出涎四肢反張目上視口噤不言竹瀝一升二合生地黃汁防己附子各一兩防風升麻各二兩龍齒三錢生薑二兩石膏官桂各五錢上十味水一斗煮至三升分二服有氣加紫蘇陳皮參蘇丸治癇病大有神效人參蛤粉硃砂各等分上為末將豬心血為丸梧桐子大每服三十丸金銀湯下寶鑑琥珀壽星丸天南星一斤地下挖坑用火煅燒坑紅出炭火淨入好酒一升潑入火坑中乘熱放南星於內蓋穴以泥土壅之勿令通氣一宿取出南星焙乾為末琥珀二兩硃砂一兩以半為衣上為末豬心血薑汁糊丸緑豆大每服五十丸參湯送下日三服錢氏五色丸治五癇神效硃砂五錢研水銀一錢雄黃七錢珍珠末一兩黑鉛二兩上為極細末煉蜜丸麻子大每服三四十丸薄荷湯送下三因六珍丹治風癇欲死或作五畜聲掣瘲吐沫久而方蘇丹砂五錢水銀三錢黑鉛一兩炒末雄黃雌黃珍珠各二錢無孔者上各研極細末和勻麵糊丸緑豆大每服三五丸薑棗湯送下須搗二萬杵方可丸歸神丹治五癇諸風痰壅驚悸神不守舍人參當歸白茯苓酸棗仁各二兩硃砂大塊的琥珀遠志薑製龍齒各一兩金箔銀箔各二十片上為末酒糊丸梧桐子大每服三十丸麥門冬湯下鬱金丹治五癇川芎防己鬱金豬牙皂角明礬各一兩蜈蚣二條炙去頭足上為末蒸餅丸梧桐子大每服十五丸空心茶下神應丹治諸癇證辰砂不拘多少研末以豬心血和之外以蒸餅裹之再蒸熟取出就丸如梧桐子大臨臥時人參湯送下一丸季氏五生丸治風癇脈弦細而緩者南星半夏川烏白附子大豆去皮各一兩上為末滴水丸每服三五丸至七丸薑湯下硃砂滾涎丸治五癇硃砂明礬赤石脂硝石各等分上為細末研蒜汁為丸如緑豆大每服三十丸食後荊芥湯下祛痰丸治諸癇風證防風天麻白殭蠶白附子炮各一兩全蠍炒去足木香五錢硃砂豬牙皂角一兩炒白礬五錢半夏湯泡七次研為末稱六兩作二份一份生薑汁作面一份皂角洗漿作面南星三兩一半水泡白礬浸一半皂角漿浸一宿上為末薑汁糊丸梧桐子大每服七十丸食遠薑湯下東垣安神丸黃連一錢五分酒洗硃砂飛生地黃酒浸當歸身酒洗甘草炙五分上除硃砂水飛外四味為末湯化蒸餅丸如黍米大每服十五丸津下食後或臨臥各一服寧神丹治癇證清熱養血不時潮作者可服之天麻人參陳皮白朮茯神荊芥穗殭蠶炒當歸身獨活遠志去心犀角鎊麥門冬去心辰砂各五錢另研南星半夏炮七次石膏各一兩甘草炙川芎鬱金白附子生地黃黃連各五錢牛黃珍珠各三錢酸棗仁炒五錢上為末酒糊丸金箔衣每服五十丸空心白湯下疏散風寒劑勝金丸治風癇不時旋暈忽然卒倒潮搐吐沫不省人事南星殭蠶細辛烏蛇生用川烏生皂角炙黃白礬桔梗川芎草烏何首烏荊芥穗威靈仙各一兩上為末酒糊丸緑豆大每服十五丸溫酒下元戎小靈寶丹附子炮一個天麻全蠍白殭蠶炒南星炮藿香葉白附子麩包煨各五錢上為末酒糊丸小豆大每服十五丸溫酒下導痰攻下劑虎睛丸治癇痰發無時恍惚搐搦虎睛一對炙犀角鎊大黃各一兩梔子仁炒遠志各半兩上為末煉蜜丸緑豆大食後酒下二十丸控涎散治諸癇久不愈頑涎聚結發作無時川烏生半夏殭蠶銼薑汁浸各五錢全蠍七枚鐵粉三錢甘遂三錢半上為細末薑汁糊丸緑豆大硃砂為衣每服十五丸食後薑湯下忌甘草拔萃妙香丸治五癇時熱積熱風痰及小兒一切驚熱病辰砂四兩半龍腦麝香各三錢牛黃二錢金箔四十五片巴豆一百五十粒去油上合研勻煉蜜去蠟淨又入白砂蜜五七錢同煉勻為丸每兩作三十九米飲調下一丸瀉青丸方見火門專治癇風驚搐滾痰丸方見痰門治癇下痰三因控涎丹方見痰門治五癇痰飲祕積而作錢氏白餅子方見痰飲門治同上當歸龍薈丸龍膽湯二方並見火門並治邪自肝經風火為患吐劑仲景瓜蒂散專治五癇風痰有效稀涎散二方見中風門子和三聖散治癇證痰壅中風等疾瓜蒂炒微黃研粗末防風各一兩藜蘆去苗去心二兩上為粗末每服五錢以齏湯三茶盞先用二盞煎三五沸去齏汁次入一盞煎三沸卻將原二盞同一處又煎三沸去渣澄清放溫徐徐服之不必盡劑以吐為度千金瓜蒂散瓜蒂炒黃另研末赤小豆各等分上為細末和勻每服一錢用豆豉煎湯頓服不吐再加得吐乃止投溫齏湯亦可助吐吐過後可飲涼水解碧霞丹治五癇痰壅牙關緊急目睛上視時作搐搦石緑飛七次一兩蠍梢七枚附子尖七個烏頭尖七個上為末入石緑和勻糊丸如芡實大每服一丸薄荷湯化下便飲酒半盞須臾吐出痰涎後隨證牙關緊者灌之元戎勝金丸治五癇痰壅非此不能除根薄荷葉瓜蒂末各四兩藜蘆末五錢硃砂三錢另研豬牙皂角一兩上將牙皂捶碎水半升與薄荷葉一處揉取汁熬成膏將三味研細和勻入膏子丸如龍眼大硃砂為衣溫酒化下二丸以吐為度得吐而省人事者愈不省人事者不可救易簡諸方逐痰丸天南星九蒸九曬為末薑汁糊丸梧桐子大每服二十丸人參湯麥冬湯任下一方治癇證不拘遠近皆可治萆麻子一兩黃連一兩銼同入砂鍋內水一碗煮二三兩夜水乾添水煮日足為度只用萆麻子仁陰乾不見日用竹刀切每粒切四段每服五粒作二十段食後用荊芥湯吞下日二服終身勿食豆若犯之則腹脹而死一方代赭石一兩明礬二兩為末糊丸梧桐子大每服三十丸水下古三癇丸荊芥一兩明礬一兩為末糊丸黍米大硃砂為衣每服二十丸薑湯送下灸法神庭穴在鼻梁上髮際中灸三壯治風癇吐舌角弓反張少衝穴在兩手小指內臁之側去爪甲一韭葉灸二壯前頂穴在囟會後一寸陷中灸三壯治小兒一切驚癇證天井二穴在外肘大骨之後一寸兩筋間陷中屈肘得之少海二穴在肘大骨外肘端五分陷中屈肘得之灸五壯長強一穴在脊骨端中灸七壯治諸驚癇兩手大姆指縛緊用艾炷安甲肉四著處灸三壯
