body:
  text: 卷之一百養生余録下人元之壽飲食有度者得之黃帝內經曰陰之所生本在五味陰之五宮傷在五味扁鵲曰安身之要必資於食不知食宜者不足以存生鄉黨一篇具在聖人飲食之節為甚詳後之人奔走於名利而飢飽失宜沉酣於富貴而肥甘是務不順四時不知五味而疾生焉戒乎此則人元之壽可得矣五味內經曰謹和五味骨正筋柔氣血以勝腠理以密長有天命淮南子曰五味亂口使口爽傷病也陶隱居云五味偏多不益人恐隨臟腑成殃咎五味稍薄令人神爽若稍偏多損傷臟腑此五行自然之理初則不覺久則為患也酸多傷脾肉皺而唇揭故春七十二日省酸增甘以養脾氣曲直作酸屬木脾主肉屬土木剋土也酸過食損胃氣及肌膚筋骨不益男子損顏色不與蛤同食相背也有云飲少熱醋闢勝酒黃戩云自幼不食醋今逾八十九尤能傳神又心色亦宜食酸小豆犬肉李韭皆酸咸多可傷心血凝泣而變色故冬七十二日省咸增苦以養心氣潤下作咸屬水心主血屬火水剋火也鹽過於咸則傷肺兼損筋力西北人食不耐咸多壽東南人食多欲咸少壽病嗽及水氣者全宜禁之晉桃源避世之人鹽味不通多壽後五味通而壽齒損矣又脾色黃宜食鹹大豆豕肉粟藿皆咸甘多傷腎骨痛而齒落故季月各十八日省甘增咸以養腎氣稼穡作甘屬土腎主骨屬水土剋水也又肝色青宜食甘粳米牛肉棗葵皆甘苦多傷肺皮槁而毛落故夏七十二日省苦增辛以養肺氣炎上作苦屬火肺主皮毛屬金火剋金也又肺色白宜食苦麥羊肉杏薤皆苦辛多傷肝筋急而爪枯故秋七十二日省辛增酸以養肝氣從革作辛屬金肝主筋屬木金剋木也胡椒和氣過多損肺金吐血細椒久食失明乏氣合口者害人十月勿食椒損人心傷血脈多忘除濕溫中益婦人又腎色黑宜食辛黃黍雞肉桃蔥皆辛飲食書云善養生者先渴而飲飲不過多冬則損氣渴則傷血先飢而食食不過飽飽則傷神飢則傷胃飲食務益人者仍節儉為佳若過多覺彭亨短氣便成疾飲食於露天飛絲墮其中食之咽喉生泡飲食收器中宜下小而上大若覆之不密蟲鼠欲盜食而不可得環器隨涎入食有誤食通身如蠍針藥不療飲食以銅器蓋之汗若入內食者發惡瘡肉疽飲食生冷北人土厚水深稟賦堅實不損脾胃久居南方宜忌之土薄水淺稟賦多虛不宜脾胃久居北方者尤宜忌之切忌空心茶宜戒卯時酒申後飯欲減極飢而食且過飽多結積聚渴而飲且過多必成痰癖日沒後訖便勿飲酒不乾嘔太宗謂宰相曰朕每日所為必有常節飲食不過度行之已久甚覺有力老子云我命在我不在天全在人之調攝卿等亦當加意毋自輕攝養也陶隱居云何必餐霞服大藥妄意延年等龜鶴但於飲食嗜欲中去其甚者將安樂甚於酒色者多夭壽甚於厚味者生奇疾漿水按本草味甘酸微溫無毒調中引氣開胃止渴強力通絡治霍亂瀉利消宿食解煩去睡調理臟腑治嘔噦白人肌體如繒帛為人常用故不齒其功世之所用熟水品目甚多貴如沉香則燥脾木犀則耗氣蜜則滯胃麥門冬則體寒如此之類皆有所損紫蘇湯令人朝暮飲之無益也芳草致豪貴之疾此有一焉宋仁宗命翰林院定熟水奏曰紫蘇第一沉香第二麥門冬第三以蘇能下胸膈浮味殊不知久則泄人氣令人不覺本草云酒飲之軟體神昏是其有毒也損益兼行扁鵲云久飲常過腐腸爛胃潰髓蒸筋傷神損壽有客訪周顗顗出美色酒兩石顗飲八斗次明起無所苦酒量慣也客已死矣觀之客腸已出腸已出非量過而犯扁鵲之戒歟飲白酒食牛肉生蟲酒漿照人無影不可飲不可合乳汁飲令人氣結祭酒白耗者殺人酒後食辛辣物多則暖人筋骨臥黍穰食豬肉患大風凡中藥毒及大毒從酒得者難治酒性行血脈流遍身體也飲酒醉未醒大渴飲冷水又茶被酒引入腎臟為停毒之水腰腳腿重膀胱冷痛兼患水腫消渴攣痹酒醉當風以扇扇之成風又醉酒吐罷便飲水作消渴神仙不禁酒以能行氣壯神然不過飲也本草茶飲者宜熱宜少不飲尤佳多食去人脂令人瘦下焦虛冷惟飽食後一二盞不妨消渴與飢尤不宜令人不眠同韭食重身將鹽點茶引賊入家恐傷腎也東坡茶說煩去膩世固不可無茶然暗中損人不少吾有一法常自修之輒以濃茶漱口於食後煩膩既少而脾胃自和凡肉之在齒者得茶漱滌乃不覺脫不煩挑剔也蓋齒性便緣此漸牢而齒蠹且日去矣飲多則肺布葉舉氣逆上有陰池流泉六月行路勿飲之發瘧飲宴於聖像之側魂魄不安飲水勿急下咽久成氣病形寒飲冷則傷肺上氣咳嗽鼻鳴粥後飲白湯為淋為停濕陶隱居云食戒欲粗並欲速寧可少餐相接續莫教一飽頻充腸損氣傷心非爾福又云食炙爆宜待冷不然傷血脈損齒又云食畢漱口數通齒不齲口不臭漱口忌熱湯損牙食茅屋漏水墮脯肉成癥瘕生惡瘡人汗入肉食之作疔瘡食諸獸自死肉生疔瘡六甲日勿食鱗甲之肉隱居云生冷黏膩筋韌物自死生牢皆勿食饅頭閉氣莫過多生膾偏招脾胃疾鮮醬胎卵無油膩陳臭淹藏盡陰類老人朝暮更餐之是藉寇兵無以異瑣碎録云饅頭閉氣羊血湯以開之包子閉氣好醋以破之食物以象牙金銀為匙箸可以試毒周禮云樂以消食蓋脾喜音聲夜食則脾不磨為音響絶也夏月夜短尤宜忌之物之無益而有損者常人猶不可多食況病人當避忌者乎此書所載凡物之有益而無損者不書或損益相半者則書其損而不書益果實生棗令人熱渴氣脹寒熱羸瘦者彌不可多動臟腑損脾元與蜜同食損五臟軟棗令動宿疾發嗽與蟹相忌梅子壤齒生龍眼半沸湯內炸過不動脾生荔枝性熱多食發虛熱煩渴口乾衄血櫻桃寒熱病不可多食發暗風傷筋骨嘔吐小兒多食作熱性熱也橘柚多食口爽不知五味楊梅多食發熱損齒及筋杏實多食損筋骨杏酥生熟吃俱得半生半熟者殺人杏仁久服目盲眉發須落動宿疾雙仁者殺人可研細治大傷桃實發丹石毒損胃多食有熱食桃仁水浴成淋桃杏仁花本五出而六出者必雙仁能殺人者天常故也李子平發瘧疾多令虛熱白蜜合食傷人五內不可臨水上啖之及與雀肉同食李不可沉水沉水者毒仁和雞子食內結不消梨寒乳鵝梨紫花梨治心熱此外俱不益人多食寒中産婦金瘡人勿食令萎因其性益齒而損脾胃正月勿食佳有人家生一梨大如斗送之朝貴食者皆死考之樹下有大蛇聚毒於此不常為妖也他仿此宜忌之林擒多食熱澀氣好睡發冷疾生瘡癤脈閉不行子不可食令人煩石榴多食損肺及齒山石榴多食無益澀氣栗子溫生治腰腳生則發氣宜曬乾蒸炒食多即氣壅患風水氣人不宜食生栗可與灰中煨令汗出殺其水氣勿通熟小兒食生者多難化熟者多滯氣柿子寒日乾者性冷多食腹痛生者彌冷紅柿與蟹同食吐紅飲酒食紅柿心痛至死亦易醉不解酒毒椑子性尤冷與蟹同食腹痛大瀉蒲萄酒過多昏人眼架下飲酒防蟲屎傷人白果生引疳解酒熟食益人然不可多多食腹滿有云滿一千個者死此物二更開花三更結子當是陰毒之物有人艱糴取白果以為飰飽食次日皆死菱芰也冷臟多利損陽令陰萎不益脾難化令腹滿姜酒解之七月食生菱作蟯蟲茨菰大寒動宿疾冷氣腹脹滿小兒秋食之臍下痛孕不可食吳人常食患腳氣癱瘓損齒失顏色荸薺性與茨菰同芡實生食動風令氣損脾難消卻益精幼兒多食久則侏儒不長藕多食冷中能去疫氣産後惟此不同生冷忌者破血故也甜瓜動痼疾多食陰下溫癢生瘡發虛熱破腹令人惙惙弱腳手無力少食則可不中暑多食未有不下泄夏日多食深秋下痢難治損陽故也患腳氣食此永不除五月甜瓜沉水殺人多食發黃疸動氣解藥力雙蒂者殺人與油餅同食發病防州太守陳逢厚避暑食瓜至秋忽腰腿不能舉動遇商助教療之更生西瓜甚解暑毒北人稟厚食慣南方稟薄不宜多食動腸胃冷病木瓜溫皮薄微赤黃香甘酸不澀向里頭尖面方是真益脾而頗損齒甘蔗多食衄血燒其渣煙入目則眼暗沙糖寒多食心痛鯽同食成疳葵同食生流癖筍同食成瘕身重不能行小兒多食損齒及生蟯蟲榲桲子不可多食損齒傷筋松子多食發熱毒胡桃平多食利小便脫人眉動風動痰噁心嘔吐與酒同食過多咯血五月實未成果核發癰癤寒熱秋夏果落地惡蟲緣食之患九漏生果停留多日有損處食之傷人一切果核雙仁者害人治諸果毒燒豬骨過為末水服方寸匕米穀粳米生者冷燔者熱生不益脾過熟則佳蒼耳同食卒心痛馬肉同食發痼疾稻米糯米也妊娠與雜肉食之不利其子生寸白久食身軟緩筋故也性寒壅經氣使人四肢不收昏悶多睡發風動氣可少食秫米似黍而小亦可造酒動風不可常食黍米發宿疾久食昏五臟好睡小兒食不能行緩人筋骨絶血脈白黍久食多熱令人煩赤黍不可合蜜雖可作糜不可為飯粒著難解五種黍米合葵食之成痼疾於臟腑中食之閉氣肺病有宜此生米戲食久為米瘕肌疲如勞缺米則口吐清水飴糖進食健胃多食則動脾風麥占四時秋種夏收西北多霜雪面無毒南方少雪有毒小麥性壅熱小動風氣食麵後覺中毒以酒咽漢椒三五粒不為疾大麥久食宜人帶生則冷損人麥蘖久食消腎不可多穬麥西川多種山東河北人正月方種先患冷氣人不宜食蕎麥性寒難消久食動風頭眩和豬肉食八九次患熱風脫眉須粟米食後勿食杏仁令人吐瀉人米穄也發三十六種病八谷之中最為下不可同川附子服陳廩粟米粳米陳者性皆冷頻食之自利緑豆治病則皮不可去去皮食少壅氣赤小豆行小便久食虛人令人黑瘦枯燥逐津液體重赤白豆合魚鮓食之成消渴赤小豆一名胡豆合鯉魚鮓食之肝黃五年成乾消黑白黃褐豆大小豆作豉極冷黃卷及醬皆平多食體重服大豆末者忌豬肉炒豆於一歲以上十歲以下食之即啖豬肉久當壅氣死人有好食豆腐中毒不能治更醫至中途遇作腐人家相爭因問妻誤將萊蔔湯置鍋中腐更不成得其說以萊蔔湯下藥而愈萊蔔蘿蔔也醬當是豆為者令以面麥為者食之多殺藥力夫子云不得其醬不食欲五臟悅而愛之此亦安樂之端芝麻炒熟乘熱壓出生油但可點燈煎炒方謂熟油可食油發冷疾滑骨髓困脾臟經宿即氣動牙齒脾疾人不宜陳油飲食須逐日熬熟黑芝麻炒食之不生風疾風人日食之則步履端正語言不謇即胡麻也又名巨勝子白芝麻滑腸胃行風氣通血脈陳久者發霍亂久食抽人肌肉麻仁多食損血脈痿陽滑精發女人帶疾菜蔬葵為五菜主秋種早者至春作子名冬葵其心有毒傷人性冷熱食之亦冷熱悶甚動風氣葵凍者生食之動五種瘤飲甚則吐水和鯉魚食之害人四季勿食生葵不化發人一切宿疾百藥忌食之發狂犬咬吳葵一名蜀葵不可食鈍人志性被犬咬食之永不瘥戌葵並鳥肉食無顏色生蔥食之即啖蜜下痢食燒蔥啖蜜壅氣死雜白犬肉食之九竅出血患病者多發氣上充五臟閉絶虛人胃開骨節正月食之發麵上游風大抵功在發汗多則昏人神胡蔥久食傷神損性多忘損目發痼疾胡臭䘌齒人食之愈甚青魚合食生蟲韭俗呼草鍾乳病人可食然多食昏神暗目酒後尤忌不可與蜜同食未出土為韭黃不益人氣花動風過清明勿食不利病人心腹痼冷者加劇霜韭不可食動宿飲必吐水五月食之損人滋味乏氣力不可共牛肉食成熱病後十日不可食發困蔥亦不宜薤肥健人生食引涕唾與牛肉食作瘕四月勿食薤三冬生食多涕吐葫大蒜也久食傷肝損目弱陽煮以合青魚鮮發黃作齏啖鱠伐命惟生食不中煮暑毒爛嚼下咽即愈仍禁冷水四月八月食之傷神損膽氣喘氣急腹內生瘡瘍腫成疝瘕多食葫行房傷肝面無光北方人稟厚食慣病少小蒜不可常食食而啖生魚奪氣陰核疼欲死三月勿食傷志時病瘥後與一切食竟入房病發必死胡荽蕎子也久食令人多忘胡臭口氣䘌齒腳氣加劇根發痼疾蓼子是水浸令生芽而食之者多食令人吐水損陽少精心痛寒熱損骨二月食之傷腎和生魚食奪陰氣核子痛欲死萱草一名忘憂嫩時取為荒食之動風令人昏昏然終日如醉因得其名菘發諸風冷有熱人之不發病性也冷芩多食動風氣發丹石與兔肉同食成惡病蕪青蔓青也根不可多食令人氣脹子作油塗頭能潤髮萊蔔力弱人不宜多食生者滲人血生青菜時病瘥後食之手青腫一切菜五月五日勿食之發百病一切菜煮熟食之凡檐溜滴著者有毒十月霜萎菜食者面無光目澀腰疼心瘧發時足十指爪青萎困薺菜不宜同麵食令人瞀悶發病凡用甘草皆忌此及海藻莧菜多食動氣煩悶冷中損腹共蕨及鱉食生瘕蓳菜不宜久食令身重多腫只可一二頓藝臺菜患腰腳人多食加劇損陽氣發口瘡齒痛生蟲胡臭人忌之鹿角菜久食發宿疾損經絡少顏色菠菱菜北人食之肉面即平南人食魚米即冷大小腸久食腳冷腰痛蓴菜多食性滑發痔引疫氣上有水銀故也七月蠟蟲著上令霍亂勿食之芹菜生高田者宜人黑滑地名水芹赤色者害人性寒和醋食生損齒春秋龍帶精入芹中偶食之手青肚滿痛不可忍服沙糖三二斤吐出蜥蜴便愈苦蕒日日食之以益心蠶婦忌食之萵苣久食人目昏白萵苣冷氣人食之腹冷産後不可食寒中共飴食生蟲苦苣不可與蜜同食莙薘多食動氣冷氣人食之必破腹苜蓿利大小腸蜜食下痢多食瘦人蕨久食腳弱無力黃瓜本名胡瓜不益人患腳氣虛腫者毒水不除越瓜色白動氣發瘡腳弱不益小兒時病後勿食與乳酪鮓及空心食心痛青瓜令人多忘冬瓜多食陰濕生瘡發黃疸九月勿食被霜瓜向冬發血寒熱及惡病初食吐倉竟心下停水或為翻胃有冷者食之瘦瓜能暗人目尤不宜老人中其毒至秋為瘧痢一切瓜苦者有毒兩蒂兩鼻者害人瓠子冷氣人食之病甚大耗食患腳氣虛腫人食之毒永不除葫蘆多食令吐芋名土芝有紫有白冬月食不發病他月人不可食薯預亦有紫白頗勝芋有小而名山藥者佳蒟蒻冷氣人少食之曾有患瘵自謂無生是物不忌鄰家除蒟蒻求食之美遂多食竟愈有病腮癰者數人豫教多食此面愈竹筍多食動氣發冷瘕茭筍滑中不宜多食生薑九月九日勿食之傷神損壽乾薑妊多食內消椿芽多食神昏榆仁多食發熱心痛菌地生為菌木生為糯而木耳為菌新菌有毛者下無紋者佼有光者煮不熟者欲爛無蟲者煮乾照人無影者春夏有惡蟲毒蛇經過者皆殺人誤食毒菌往往笑不止而死惟掘地為坎投水攪取清者飲之菌楮槐榆柳桑五木之耳可食冬春無毒木習亦不宜多食如前所云者皆殺人又赤色仰而不覆者及生野田中者皆毒又發冷氣風痔多睡無力甘露子不宜生食不可多食生寸白與魚同食生翻胃病萸六七月食之傷神氣茵蒿多食氣滿蒔蘿根曾有食者殺人攝生要義存想攝生之要莫大乎存想存謂存我之神想謂想我之身閉目見自己之收心見自己之身不離我身不傷我神則存想之漸也調氣天地虛空中皆氣人身虛空中皆氣故呼出濁氣身中之氣也吸入清氣天地之氣也人在氣中如魚游水中魚腹中不得水出入則死人腹中不得氣出入亦死同其理也善攝生者必明於氣之故矣欲修調氣之術者常得早食閉戶安床暖席枕高二寸許正身偃臥冥目握固兩足間相去五寸兩臂與體相去亦各五寸先謂閉氣以鼻吸入漸漸腹滿乃閉之及不可忍乃從口細細吐出不可一呼則盡氣定復如前閉之始而十息或二十息不可忍漸熟漸多但能閉至八十息以上則臟腑胸膈之間皆清氣之布護矣至於純熟當其氣閉之時鼻中唯有短息一寸余所閉之氣在中如火蒸潤肺宮一繞則身如委蛇神在外其快其美有不可言之狀蓋一氣流通表裡上下徹達故也其所閉之氣漸消則恍然復舊此道以多為功但能於日夜間得此以兩度久久耳目聰明精神完固體健身輕則百疾消滅凡調氣之初務要體安氣和無與意爭若不安和且止後和乃為之久而弗倦則善矣閉氣如降龍伏虎須達其神理胸膈常宜虛空不可飽滿若氣有結滯不得宣流覺之便當用吐法以除之如吹噓呵嘻呬噫呼之類是也不然泉源壅遏必至逆流瘡瘍中滿之患作矣又蘇氏養生訣云每夜自三更至五更以未昧上擁被盤足面東南叩齒三十六遍握固冥目以兩手拄腰腹間閉息想心為炎火光明洞徹下入丹田待腹滿氣極則徐出氣不得令耳聞復以舌抵齒取華池水滿口低頭咽下送入丹田用意精猛令津與氣谷谷然有聲徑至丹田畢再依前為之凡久閉息三咽津而止然後以兩手摩熱摩兩腳心則湧泉穴及腰脊兩傍即腎堂皆令熱徹次以兩手摩尉眼面耳項皆盡極熱仍按提鼻梁左右七下梳頭百梳而臥熟睡至明或問養生煉氣之道曰養生者節制之常也煉氣則術也何以言之人生元氣所稟各有長短自有知以來為貪愛侵剝暴戾蠹蝕故長者短短者促不得盡天年而終是以聖智之人有養生之論大要不出少思慮寡嗜欲節飲食慎起居順時候和氣體利關節而已矣能由是而行則六氣不能致傷而諸疾不作可以盡其天界元始之氣而以壽終矣使非有節安能如是故曰節制之常至於煉氣之術亦有至理大抵造化之妙陰陽配合而道化生焉人之得生本諸精氣呼吸升降之間而運動往來無滯故吸則氣升遂以意引之注於極上呼則氣降遂以意引之注於極下久之極上則髓海盈溢遍達於諸骸極下則氣海充滿透徹於諸脈此亦造化自然之機發如此使非陰陽得類配合虛無之氣雖能升降流轉亦不成化故曰偏陽不生孤陰不育又曰一陰一陽之謂道是已然則氣無形質何以交化曰氣以虛通類同則感譬之磁石引針隔關潛達燈頭有煙火光自趨天機自然非由人耳是道也自下而上由上而下往來運轉如環無端與天符合故曰觀天之道執天之行盜天之機豈非術乎服食之法何如曰參同契龍虎經石函記皆已言之蓋疏達腠理堅固體質之義也蝨處頭而黑麝食柏而香頸處漢而癭齒居晉而黃乃所食氣蒸性煉形故不期而變此亦至理存也但伏鍊金石反以戕生矣雨雪者雲氣所化人之氣亦能化液故閉息伏氣可以不食龜以吞氣而壽即此今之醫動以補陰滋陰為益氣之妙方不知血必籍氣而後生乃為真血其水穀藥味之所滲入者終非元氣之精也血必待氣而後運氣不能運血滯脈理而諸熱諸瘍之病作矣故古之養生者只以調氣為先使陽為一身之主攝而陰自生化真異乎世醫之見矣雅述按摩夫存想者以意御氣之道自內而達外者也按摩者開關利氣之道自外而達內者也故醫家行之以佐宣通而攝生者貴之以泄壅滯凡有行者當在子後午前之時平坐東向以兩手大指按拭兩目過耳門使兩掌交會於項後如此三九遍次存想目中各有紫青絳三色氣如雲霞郁浮出面前再依前按拭三九遍復存想面前雲氣暉暉霍霍灌入瞳子咽咽華池之液二十口乃開目以為常坐起皆可行之不必拘時一年許耳目便聰明久為之徹視數里聰於絶響也面上常欲得兩手摩拭使熱則氣常流行作時先將兩手摩熱然後以掌摩拭面目高下隨形皆使極匝如此三五過卻度手於項後及兩鬢更互發如櫛頭之狀亦數十過令人面有光澤皺斑不生發不白脈不浮外久行五年不輟色如少女所謂山川行氣常盈不涸而木石榮潤是也耳欲得數按抑其左右令人聰徹鼻亦欲按其左右無數令人氣平又常以兩手按鼻及兩目之背上下按之無數閉氣為之氣通則上吐而復始亦三九遍能恆為之鼻聞百步眼乃洞觀黃庭經曰天中之嶽精謹修靈宅既清玉帝遊通利通路無終休此之謂也凡人小有不快即須按摩按捺令百節用力泄其邪氣凡人無問無事有事須日要一度令人自首至足但系關節處用手按擦各數十次謂之大度關先百會穴次頭四周次兩眉外次目眥次鼻準次兩耳孔及耳後皆按之次風池次項左右皆揉之次兩肩胛次臂骨縫次腕次手十指皆捻之次脊背或按之或槌震之次腰及腎堂皆搓之次胸乳次腹皆揉之無數次股捶之次兩膝次小腿次足踝次十指次足心皆兩手捻之若常能行此則風氣時去不住腠理是謂泄風又常向腎堂及兩足心臨臥時令童子用手搓摩各以熱透表裡為度摩腎堂熱則腎氣透而易於生精摩足心熱則湧泉穴透而血不下滯導引莊子曰吹噓呼吸吐故納新熊經鳥伸為壽而已矣此導引之士養形之人彭祖壽考者之所好也由是論之導引之術傳自上世其來久矣故曰彭祖之所好其來自修養家醫家所談無慮數百今取其要約切當者十六條參之諸論大概備矣凡行導引法常以夜半及平旦將起之時為之此時氣清腹虛行之益人先閉目握固冥心靜坐叩齒三十六通即以兩手抱項左右宛轉二十四此可以去腎脅積聚風邪復以兩手相叉虛空托天抑手按項二十四此可以除胸膈間邪氣復以兩手心掩兩耳卻以第二指壓第三指彈擊腦後二十四此可除風池邪氣復以兩手相促按左膝左捩身接右膝右捩身二十四此可以去肝家風邪復以左手一向前一向後如挽五石弓狀二十四此可以去腎腋積邪復大坐展兩手紐項左右反顧肩膊二十四此可以去脾家積邪復兩手握固並拄兩肋擺撼兩肩二十四此可以去腰肋間風邪復以兩手大捶臂及膊反捶背上連腰股各二十四此可以去四肢胸臆之邪復大坐斜身偏倚兩手齊向上如托天狀二十四此可以去肺間積聚之邪復大坐伸腳以兩手向前低頭攀腳二十次卻鉤所伸腳屈在膝上按摩之二十四此可以去心胞絡邪氣復以兩手據地縮身曲脊向上十三舉此可以去心肝積邪復起立據床拔身向背後視左右二十四此可以去腎間風熱邪復起立徐行兩手握固左足前蹈左手擺向前右手擺向後右足前蹈右手擺向前左手擺向後二十四此可以去兩肩俞之邪復以手向背上相捉低身徐徐宛轉二十四此可以去兩脅之邪復以足相紐而行前進十數步後退十數步復高坐伸腿將兩足紐向內復紐向外各二十四以上二條可以去兩膝及兩足間風邪行此十六節訖復端坐閉月握固冥心以舌拄上齶攪取津液滿口漱三十六次作谷谷聲咽之復閉氣想丹田火自下而上遍燒身體內外蒸熱乃止按老子導引二十四勢婆羅門導引十二勢赤松子導引法十八勢鍾離導引法十八勢胡見素五臟導引法十二勢在諸法中頗為妙解然撮其切要不過於此學者能日行一二遍久久體健身輕百邪皆除走及奔馬不復疲之矣形景臟腑內景各有區別達以行術養生之要參稽古論述此明徵凡人咽喉二竅同出一脘異塗施化喉在前主出納咽在後主吞咽喉系堅空連接肺管為氣息之路呼吸出入下通心肝之竅以激諸脈行氣之巨海也咽系柔空下接胃本為飲食之路水食同下並歸胃中乃水穀之海也二道並行各不相犯蓋飲食必歷氣口而下氣口有形謂之會厭當飲食方咽會厭則垂厥口乃閉故水穀下咽了不犯喉言語呼吸則會厭開張當食言語則水穀乘氣送入喉脘遂戕刺而咳矣喉之下為肺兩葉白瑩謂為華蓋以覆諸臟虛如蜂窠下無透竅故吸之則滿呼之則虛一呼一吸消息自然無有窮已乃清濁之交運人身之橐籥也肺之下為心心有系絡上屬於肺肺受清氣下乃灌注外有胞絡裹赤黃脂其象尖長圓扁其色黑青赤黃其中竅數多寡各異迥不相同上通於舌下無透竅惟旁有系一脈下連於腎而注氣焉心之下有膈膜與脊脅周回相著遮蔽濁氣使不得上熏心肺所謂膻中也膈膜之下有肝肝有獨葉者有二三葉者其系亦上絡心肺為血之海上通於目下亦無竅肝短葉下有膽膽有汁藏而不泄此喉之一竅施氣運化蒸熏流行以成脈絡者如此咽至胃長一尺六寸通謂之咽門咽下有膈膜膈膜之下有胃盛受飲食而腐熟之其右有脾與胃同膜而附其上其色如馬肝赤紫其形如刀鐮聞聲則動動則磨胃食乃消化胃之下左有小腸後附脊膂左環回周疊積其注於回腸者外附臍上共盤十六曲右有大腸即回腸當臍左環回周疊積而下亦盤十六曲廣腸附脊以受回腸左環疊積下闢乃出滓穢之路廣腸左側為膀胱乃津液之府五味入胃其液上升化為血以成骨髓津液之餘流入下部得血海之氣施行小腸滲出膀胱滲入而溲便注泄矣凡胃中腐熟水穀其精氣自胃之上口曰賁門傳於肺肺播於諸脈其渣穢自胃之下口曰幽門傳於小腸至小腸下口闌門泌別其汁清者滲出小腸而滲入膀胱滓穢之濁則轉入大腸膀胱赤白瑩淨外無所入之竅全假氣化施行氣不能行則膈不通而為病矣三焦有名無形主持諸氣以像三才故呼吸升降水穀往來皆從此通達上焦出於胃上口並咽以上貫膈而布胸中走腋循太陰之分而行傳胃中谷味之精氣於肺肺播於諸臟中焦在胃中脘不上不下主腐熟水穀泌槽粕蒸津液化其精微上注於肺脈乃化而為血以奉生身莫貴於此故獨得行於經隧命曰營氣下焦如瀆其氣起於胃下脘別回腸注於膀胱主出而不納此脾胃大小腸三焦乃咽之一竅資生血氣轉化槽粕而入出如此腎有二精所舍也生於脊膂十四椎下兩旁各一寸五分形似豇豆相併而曲附於脊外有黃脂包裹里白外黑各有帶二條上條繫於心下條過屏翳穴後趨脊骨下有大骨任脊骨之端如半寸許中有兩穴是腎帶經過處上行夾脊至腦中髓海五臟之真惟腎為根上下有竅穀味之液化而為精人乃久生腎虛精絶其生乃滅凡人腎虛水不足也補以燥藥以火煉水其精乃灼攝生者觀於腎之神理則夭壽之消息亦思過半矣日食人知飲食所以養生不知飲食失調亦所以害生故能消息使適其宜是以賢哲悟未病凡人飲食無論四時常欲溫暖夏月伏陰在內暖食尤宜不欲苦飽飽則筋脈橫解腸澼為痔因而大飲則氣暴逆養生之道不欲食後便臥及於終日穩坐皆能凝結氣血久則損壽食後常以手摩腹數百遍仰面呵氣數百口越趄緩行數百步謂之消食食後便臥令人患肺氣頭風中痞病蓋榮衛不通氣血凝滯故爾故食訖當行步躊躇有所修為佳語曰流水不腐戶樞不蠹以其動然也食飽不得速步走馬登高涉險氣滿而激致傷臟腑不欲夜食脾好音聲聞聲即動而磨食日入之後萬響都絶脾乃不磨食之即不易消不消即損胃損胃即不受穀氣氣不受則多吐多吐則轉為反胃之疾矣食欲少而數不欲頓而多常欲令飽中飢飢中飽為善爾食熱物後不宜再食冷物食冷物後不宜再食熱物冷熱相激必患牙齒瓜果不時禽獸自死及生鮓煎火之肉與夫多膩難消粉粥冷淘之物皆能生痰生瘡瘍生瘕癖並不宜食五味入口不宜偏多多則隨其臟腑各有所損故咸多傷心甘多傷腎辛多傷肝苦多傷肺酸多傷脾內經曰多食鹹則脈凝澀而變色多食苦則皮槁毛拔多食辛則筋急而爪枯多食酸則肉皺而唇揭多食甘則骨肉痛而發落偏之為害如此故上者淡泊其次中和飲食之大節也酒飲少則益人過多則損人氣暢而止可也飲少則能引滯氣導藥力潤肌膚益顏色通榮衛闢穢惡過多而醉則肝浮橫諸脈衝激由之敗腎毀筋腐骨消胃久之神散魄冥不能飲食獨與酒宜去死無日矣飽食之後尤宜忌之飲覺過多吐之為妙飲酒後不可飲冷水冷茶被酒引入腎中停為冷毒多時必腰膝沉重膀胱冷痛水腫消渴攣躄之疾作矣酒後勿當風坐臥袒肉操扇此時毛孔盡開風邪易入感之令人四肢不遂不欲飢而食食不可過飽不欲渴而飲飲不可過多食過則結積飲過多則成痰癖故曰大渴不大飲大飢不大食恐血氣失常卒然不救也荒年餓莩飽食即死可驗也嗟乎善養生者養內不善養生者養外養內者安恬臟腑調順血脈以一身之氣流行沖和百病不作養外者恣口腹之欲極滋味之美惡飲食之藥雖肌體充腴容色悅懌而酷烈之氣內蝕臟腑形神虛矣安能保合太和以臻遐齡莊子曰人之可畏者衽席飲食之間而不知為之戒過也其此之謂乎居高者壽左傳曰土厚水深居之不疾淮南子曰堅土人剛弱土人肥垢土人大沙土人細息土人美耗土人醜山氣多男澤氣多女風氣多聾林氣多癃木氣多傴濕氣多腫石氣多力陰氣多癭暑氣多夭寒氣多壽穀氣多痹丘氣多狂野氣多仁陵氣多貧輕土人利重土人遲清水音小濁水音大湍水人輕遲水人重中土多聖素問五常政大篇曰天不足西北左寒而右涼地不滿東南右熱而左溫其故何也岐伯曰東南方陽也其精降於下西北方陰也其精奉於上是以地有高下氣有溫涼高者氣寒下者氣熱帝曰其夭壽何如岐伯曰陰精所奉其人壽陽精所降其人夭帝曰一州之氣生化壽夭不同其故何也岐伯曰高下之理地勢使然也崇高則陰氣治之汙下則陽氣治之高者其氣壽下者其氣夭由是觀之人之壽夭美惡由於水土之氣如此善養生者擇地而居此為至要或曰古者巢居穴處而人多壽何也曰古人淳朴寡於嗜欲此實壽本況巢居則高迥而多寒穴則固密而無風濕之患豈不得壽今之居處當何如曰由水深土厚陰精所奉之說觀之居處高聳於生乃宜曰生之所寓人有定區高山峻土惡乎能舉曰有山阜則就山阜臨漫則起樓臺庶乎日襲陰氣而不為陽泄矣古之仙人好樓居得非以是乎哉雖然坐臥之處必須固密若值細隙之風毒中人尤甚久之成半身不遂或角弓反張或言語謇澀蓋身既中風鬼邪易入衆病總集遂致夭其天年耳是故窪下之地不可處慎其濕也疏漏之地不可處慎其風也久閒之室不可處慎其土氣之惡也幽冥之處不可處慎其陰風雨之毒也四者皆能病人養生之士尤宜避之也房中節度天地氤氳萬物化醇男女媾精萬物化生此造化之源性命之根本也故人之大欲亦莫切於此嗜而不知禁則侵克年齡蠶食精魄喑然弗覺而元神真氣去矣豈不可哀惟知道之士禁其嗜縱不至杜絶雖美色在前不過悅目暢志而已決不肯恣其情欲以伐性命或問抱朴子曰傷生者豈非色欲之間乎抱朴子曰然長生之要其在房中上士知之可以延年卻病其次不以自伐下愚縱欲損壽而是以古人於此恆恆有節度二十以前二日復二十以後三日復三十以後十日復四十以後月復五十以後三月復六十以後七月復又六十閉戶故時加撙節保惜真元以為一身之主命不然雖勤於吐納導引服餌之術而根本不固亦終無益內經曰能知七損八益七者女子之血八者男子之精則血氣精氣二者可調不知用此則早衰之節也故年四十而陰氣自半也起居衰矣年五十體重耳目不聰明矣年六十陰痿氣大衰九竅不利下虛上實涕泣俱出矣故曰知之則強不知則老智者有餘自性而先行故有餘愚者不足察行而後學故不足有餘則耳目聰明身體輕強老者益壯壯者益治蓋謂男精女血若能使之有餘則形氣不衰而壽命可保矣不然竅漏無度中乾以死非精離人人自離精也可不戒哉養生之士忌其人者有九或年高大或唇薄鼻大或齒疏發黃或痼疾或情性不和或有苗強硬或聲雄或肉澀肢體不膏或性悍妒忌皆能損人並不宜犯之忌其時者十有一醉酒飽食遠行疲乏喜怒未定女人月潮沖冒寒暑疾患未平大小便訖新沐浴後犯畢出行無情強為皆能使人神氣昏憒心力不足四體虛羸腎臟怯弱六情不均萬病乃作特宜慎之至於天地晦冥日月薄蝕疾風甚雨雷電震怒此陰陽大變六氣失時之常犯之不惟致疾且褻汙神明倘成子女形必不周雖生而不育矣嗟乎幃箔之情易綰而難斷不可不以智慧決也佛書曰諸苦所因貪欲為本貪欲不滅苦亦不滅苦不滅則生滅矣養生者惡可不以智慧決哉四時凡人呼吸出入皆天地之氣故風寒暑濕之暴戾偶一中人人不勝天則留而為病故隨時加攝使陰陽中度是謂先幾防於未病春月陽氣閉藏於冬者漸發於外故宜發散以暢陽氣內經云春三月此謂發陳天地俱生萬物以榮夜臥早起廣步於庭披髮緩形以使志生生而勿殺豫而勿奪賞而勿罰此春氣之應養生之道也逆之則傷肝夏為寒變故人當二月一來摘取東引桃枝並葉各一握水三升煎取二升以來早朝空心服之即吐卻心膈痰飲宿熱則不為害春深稍宜和平將息綿衣晚脫不可令背寒寒即傷肺鼻塞咳嗽但覺熱則去之覺冷即加之加減俱要早起之時若於食後日中恐致感冒風寒春不可衣薄令人傷寒霍亂消渴頭痛春凍未泮衣欲下厚而上薄夏月人身陽氣發引伏陰在內是人脫精神之時特忌下利以泄陰氣內經云夏三月此謂蕃秀天地氣交萬物華實夜臥早起無厭於日使志無怒使華英成秀使氣得泄若所愛在外此夏氣之應養長之道也逆之則傷心秋為痎瘧故人常宜晏居靜坐節減嗜欲調和心志此時心王力衰其真精化為水至秋乃凝尤須保嗇以固陰氣常食熱物使腹中溫暖生瓜果茄冰水冷淘粉粥蜂蜜尤不可食食多秋時必患痢瘧勿以冷水沐浴洗手面淋皆使人得虛熱眼暗筋厥逆霍亂轉筋陰黃之疾勿當風臥勿睡中使人揮扇汗體毛孔開展風邪易入犯之使人患風痹不仁手足不遂言語謇澀之疾年壯雖不即為害亦種病根氣衰之人如桴鼓應聲矣醉中尤宜忌之秋月當時陽氣收斂不為吐及發汗犯之令人臟腑消爍內經云秋三月此謂容平天氣以急地氣以明早臥早起與雞俱興使志安寧以緩秋刑收斂神氣使秋氣平無外其志使肺氣清此秋氣之應養收之道也逆之則傷肺冬為飧泄若能知夏時多食冷物及生瓜果稍多即宜以童子小便二升並大腹檳榔五顆細切煎取八合下生薑汁一合和臘雪三分早為空心分為二服瀉二三行夏月所食冷物及膀胱宿水悉為驅逐而出即不為患此藥是乘氣湯雖老年之人亦宜服之瀉後兩三日以薤白粥加羊腎空心服之勝服補藥冬月天地閉塞血氣藏伏陽在內心膈心熱但忌發汗以泄陽氣內經曰冬三月謂之閉藏水冰地坼無擾乎陽早臥晚起必待日光使志若伏若匿若有私意若己有得去寒就溫無泄皮膚使氣亟奪此冬氣之應養藏之道也逆之則傷腎春為痿厥故人當時服浸酒之藥以迎陽氣雖然亦不可過愛綿衣當脫著使漸漸加厚雖大寒不得向火烘炙損人目精且手足能引火氣入心使人心臟燥熱小衣亦不宜大炙極暖冬月天寒陽氣在內已自鬱熱若更加之炙衣重裘近火醉酒即陽氣太甚若遇春寒閉塞之久不即發散至春夏之交陰氣既入不能攝陽氣必致有時行熱疾甚者狂走妄語切宜忌之故寒熱適中此為至要凡冬不欲極溫夏不欲極涼不欲臥星下不欲眠中操扇大寒大熱大風大雨皆不欲冒之秋冬溫足凍腦春夏腦足俱凍故曰天有四時五行以生寒暑燥濕風人有五臟五氣以生喜怒悲憂恐故喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽喜怒不節寒暑過度生乃不固此之謂也雜忌夫養生者臥起有四時早晚飲食有至和之常制利關節有導引之方流行榮衛有吐納之術忍喜怒以養陰陽之氣節嗜欲以固真元之精保形延命可謂備矣使禁忌之理知有未周雖云小節之常亦有大道之要故食有侵性不可不慎者古語云一日之忌暮無飽食一月之忌暮無大醉一歲之忌暮無遠行終身之忌暮常護氣蓋謂暮乃偃息之時人若飽食則腹中空虛之地少而氣之居內以養形者寡癖瘕壅滯之患作矣故暮當忌飽食謂之一日蓋日日慎之也酒毒酷悍飲之大醉則毒氣必壞正氣況暮醉而臥氣溢形止腸外由之腐爛經絡以之措解一時不覺久乃成疾雖少壯之人不可使一月之內有此一醉也況中年以往之人乎暮而遠行不惟有外觸之虞山川嵐霧之氣冒之亦能損人真氣故皆宜忌之以上三者不行則真氣常保無失是終身能獲真氣矣又久視傷血久臥傷氣久立傷骨久行傷筋久坐傷肉大抵人之形氣時動時靜其機運而不滯久於動靜未免有傷也睡不厭踧覺不厭舒踧者曲膝蜷股以左右肋側臥修養家所謂獅子眠是也如此則氣海深滿丹田常暖腎水易生益人弘多舒體而臥則氣直而寡蓄神散而不潛故臥惟覺時可舒體耳凡人覺大小便即行勿忍之忍小便則膝冷成痹忍大便則成氣痔小便勿努努則令人兩膝冷痛大便勿努努則令人腰痛目昏氣逆急故也並宜任其自然凡人大勞則力乏絶大飢則臟腑脈絡有竭大飽則腠理氣溢大渴則經脈蹶亂大醉則精神散亂大熱則陰氣解脫大寒則血脈凝結並能致疾凡心有愛不用深愛凡心有憎不用深憎凡喜至而心不蕩凡怒過而情不留並能養神益壽學道之功至此乃至人對景忘情之妙聖人養心定性之學修養之術不足以盡之凡夜非調氣之時常習閉口而睡為佳口開則失真氣且邪從口入使牙齒為出入之氣所觸後必病齒凡睡而張口者牙齒無不早落可以驗之濕衣及汗衣且不可久著能傷人心肺之系及發瘡瘍十步直牆下勿得順臥風峻利能令人發顛及體重凡大汗及新浴出勿赤體勿即脫衣當風風入腠理則成半身不遂夜臥當耳處勿令有孔隙令人風吹耳聾頭項亦如之夜臥勿覆其頭得長壽以常有天地之清氣入腹中也古之善撮生者居常少思慮忍嗜欲平喜怒寡憂樂淡好惡世之美麗貴重物事舉不足以入其心由是志意舒暢形體安和血氣順利度百歲而後去矣寇氏曰人之未聞道者放逸其心迷於生樂以精神徇智巧以憂畏徇得失以勞苦徇禮節以身世徇財利四徇不置心為之疾矣極力勞形躁暴氣逆當風縱酒食嗜辛鹹肝為之病矣飲食生冷溫涼失度久坐久臥太飽太飢脾為之疾矣呼叫過常辨爭陪答冒犯寒暄恣食鹹苦肺為之病矣久坐濕地強力入房縱欲勞形三田漏溢腎為之病矣五病既作故未老而羸未羸而病病至則重重則必斃嗚呼是皆弗思妄行而自取之也衛生之士能慎此五者可以終身無苦矣經曰不治已病治未病其此之謂歟服餌服日月太上玄真訣服日月法東卿司命君曰先師王君昔見授太上明堂玄真上經清齊休糧存日月在口中晝存日夜存月令大如環日赤色有紫光九芒月黃色有白光十芒存咽服光芒之液常密行之無數若不修存時日月住面明堂中日居左月居右二景與日童氣合通也此道所以攝運生精理鬼神六丁奉侍天兵衛護此上真道也大都口訣止如此服日月之精華者欲得常食竹筍者日華之胎也一名大明又欲常食鳥脯者月胎之羽鳥也一名月鷺欲服日月當食此物氣感運之太虛真人曰鴻者羽族之總名也其鵠雁鵝鷗皆曰鴻鷺也服日月氣服日氣法以平旦採日華以夜半存之去面前九寸令萬景照我泥丸下及五臟洞徹一形引氣入口光色蔚明良久乃畢則常得長生矣又法夜半生氣時若雞鳴時正臥閉目從左目中出日右目中出月並徑九寸在兩耳之上兩耳之上名為六合高窗也令日月使照一身內徹泥丸下照五臟腸胃之中皆覺見了洞徹內外令一身與日月光合良久畢叩齒九通咽液九過乃微祝曰太山玄一九皇吐精三五七遍洞觀幽冥日月垂光下徹神庭使照六合太乙黃寧帝君命簡金書不傾五老奉符天地試同使我不死以致真靈卻過萬邪禍害滅中上朝天皇返老還嬰太上有制百神敬聽畢乃開明為日月練根三元技魂以制御用神闢諸鬼氣之來侵使長生不死多存之矣又法又存左目為日右目為月共合神夜之中卻上入於明堂死生黃英之體下流口中九咽以哺太乙常以生氣時存之畢微祝曰日月上精黃水月華太乙來飲神光高羅使我長生天地同柯五日以行之口中舌上為神庭存日月既畢因動舌覺有黃泉如紫金色從舌上出流卻入明堂為黃英之醴也存思之時常閉目施念服日精吞日精者用日出卯時坐西面看東想日如車輪形象而吞之七十二口亦如河車拗掏起昂頭搬運入項後為枕枕之如小乘人有圓光也每日吞之七十二口畢方吞月華龍虎大丹服月華吞月華者須是過上弦八日晚後背日向月坐想月華入於口八十一咽至二十三日下弦即罷之至後月八日依前法吞之龍虎大丹喻月精丸月初出時月中時月入時向月正立不一八通仰頭喻月精八咽之令陰氣長歸人喻之陰精益成子道通吸月光精歸人至四十九以上還生子斷緒者即有子久行不已即成仙矣服五星存五星當按八素以五星為始存以生氣時若不王星先出者故宜不先存五星也至於視星入室任意唯以勤感為上耳亦不必須都見星然後速通也視之益審耳清寧君告存想要法當覺目觀五星於方面並乘芒而下行俄然後依五星而存主星但吞咽一芒畢又當鎮星又存鎮星良久總五星各一芒使俱入口而咽之如鎮星星過數也服三氣範幼仲恆服三氣三氣之法存青氣白氣赤氣各如綿從東方日下來入口中挹之九十過自飽便止為之十年身中自有三色氣遂得神仙此高元君太素內景法旦旦為之臨日施行視日益佳服木芝木芝者松柄脂淪入地千歲化為茯苓萬歲其上生小木名曰木威喜芝夜視有光持之甚滑燒之不燃帶之闢兵以帶雞而雜以他雞十二頭共籠之去之十二步射十二箭他雞皆傷帶威喜芝終不傷也從生門上採之於六甲陰乾之百日末服方寸匕日三服盡一枚則三千歲服松子神仙餌松實丹七月取松實過時即落難採去木皮搗如膏每服如雞子大日三服如服及百日身輕三百日日行五百里絶谷久服升仙渴即飲水亦可以煉了松脂同服之七月七日採松子過時即落不得治服方寸匕日三四服一云服三合百日身輕三百日日行五百里絶谷久服升仙渴飲水亦可和脂服之若丸如梧桐子大服十丸服松脂松脂以真定者為良細布袋或以清水百沸湯煮浮水面者以新𥵙籬掠取投新水中久煮不出者皆棄不用入生白茯苓末不制但刮去皮搗羅為細末拌勻每旦服三錢匕著口中用少熟水撩漱更以脂點如常法揩牙揩畢用少熟水咽之仍濯漱如常法大能牢牙駐顏烏髭也百鍊松脂下篩以蜜和內桶中勿令通風日服如博棋一枚博棋長二寸方一寸日三服漸漸月別服一斤不飢延年亦可醇酒和白蜜如餳日服一二兩至半斤凡取松脂老松皮自有聚脂者最第一其根下有傷折處不見日月得之名曰陰脂彌良惟衡山東行五百里大松皆三四十圍乃多脂又法五月刻大松陽面使向下二十四株株可得半升亦煮老節根處有脂得用仙經云常以三月入衡山之陰取不見日月松脂煉而餌之即不多而自來服之百日耐寒暑二百日五臟益補服之五年即見西王母仙經又云諸石所生三百六十五山其可食者滿谷陰懷土中松脂耳其谷正從衡山嶺直東四百八十里當橫捷正在橫嶺東北行過其南入谷五十里窮穴有石城曰鶴其方有大石四十餘丈秋如白松松下二丈有小穴東入山有丹石砂可食其南方陰中有大松大三十餘圍有三十餘株不見日月皆可取服之服松脂法欲絶谷服三兩飢腹更服取飽而止可至一斤不絶谷者服食一兩常先食須藥力盡乃餘食錯者即食不安而吐也久服延年百病除又方松脂十斤松實三斤柏實三斤菊花五斤四味下篩蜜和服之如桐子大三十丸分為三服一百日以上不復飢服之一年百歲如三十四十者久服不死又方以夏至日取松脂日食一升無食他物飲水自欲令人長服可以終身河南汝室山取陰處斷之置器沖蒸之膏自流出煉出去苦氣白蜜相和食日一升二月後服如彈丸渴飲水令人不老取無時又方松脂五斤羊脂三斤上二味先煉松脂令消納羊脂日服博棋一枚不飢久服神仙又方白松脂七斤三遍煉白蠟五斤白蜜三斤茯苓粉三斤上三味合蒸一石鬥頃服如梧桐子大十丸飢腹取日一丸不得食一切物得飲酒一過一合齊戒㕮咀五香以水煮一沸去滓以藥投沸中欲致神女者取茅根治取汁以和之蒸服之神女至矣
