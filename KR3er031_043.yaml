body:
  text: 卷之四十三痰飲門稠濁者為痰清稀者為飲一為火燥一為寒濕今醫不分混同出治所以鮮能取效病機痰飲敘論經曰諸痙強直積飲痞膈中滿霍亂吐下體重胕腫肉如泥按之不起皆屬於濕此是太陰濕土乃脾胃之氣為病也張子和論痰有五曰風痰曰濕痰曰食痰火痰酒痰是也風痰多帶涎沫因形寒飲冷或因感風而發或因風熱拂鬱而致則痰清白濕痰因停飲不散而成熱痰為火盛制金飲食辛辣重裀厚褥所致酒痰因浩飲所得食痰因厚味炙爆過多痰證因於熱玉機微義云痰之為病誠多也何則人之血氣流行無一息之間斷才有壅滯津液凝積鬱而成熱痰遂生焉因證而觀痰則火之變出也未有痰病而不因火而成者也間有寒痰為病者亦千百中之一二也甫謂寒痰之說非也飲則有寒有熱不同痰則一因於熱而已加之寒字不得所以痰脈多滑大明知停冷成痰亦遂鬱而為熱藥惟以橘皮半夏神麯之辛以散之行之亦不敢用熱藥也陳無擇云飲脈多沉弦微細始可以言寒治以理中二陳之屬是也性理所謂有溫泉而無寒火不其然歟飲專主於濕原病式曰積飲留飲積蓄而不散也水得於燥則消散得濕則不消以為積飲土濕主病故也大略要分濕熱寒濕之因運氣濕土太過痰飲為病經曰太陰在泉濕淫所勝民病飲積又云歲土太過雨濕流行甚則飲發中滿又云土鬱之發飲發又太陰之復皆病飲發於中治水諸熱劑是也痰飲病有三因陳無擇云人之有痰飲者由榮衛不清氣血濁敗凝結而成也內則七情汨亂臟氣不行鬱而生涎涎結為飲為內所因外則六淫侵冒玄府不通當汗不泄蓄而為飲為外所因或飲食過傷色欲無度運動失宜津液不行聚而為飲為不內外因其為病也為喘為咳為嘔為泄為眩運嘈雜煩心忪悸愪㦜寒熱疼痛腫滿攣癖癃閉如風如癲未有不由痰飲所致仲景舉痰飲證有四目有痰飲有懸飲有溢飲有支飲其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲又云痰飲者心下冷極以溫藥和之大甘草湯是也飲後水流在脅下咳唾引痛謂之懸飲又云懸飲者法當下之十棗湯是也飲水流於四肢當汗出而不汗出身體重痛謂之溢飲病溢飲者當發其汗大青龍湯是也咳逆倚息短氣不得臥其形如腫謂之支飲又云病支飲者多屬濕故其形如腫眼下如臥蠶者宜分利之仲景五苓散澤瀉湯是也古方有五飲六證之說即四飲加以伏飲留飲二證是也留飲者背寒如掌大其人短氣而渴四肢無力歷節痛脅下痛引缺盆咳嗽則轉甚伏飲者膈滿嘔吐喘咳發則寒熱腰背痛目淚出其人振振惡寒身瞤惕者為伏飲百病皆生於痰王隱君曰痰證古今未詳素問雖載鼻鼽辛頞喘滿為熱而無治法方書雖有五飲諸痰之異而莫知其致病之源或頭風目運如坐車舟精神恍惚口眼瞤動眉稜耳輪俱癢或腮頰四肢遊風腫硬似痛非痛或渾身燥癢搔之則癮疹隨生皮毛烘熱色如錦斑用盡風藥而無效或齒頰似痛而痛無定所纍謁齒科未能奏功或噫氣吞酸鼻聞焦臭喉間豆腥心煩鼻塞咽喉不利咯之不出咽之不下或因噴嚏而出或因舉動而唾其痰似墨有如破絮或似桃膠或如蜆肉服四七湯如水投石其聚也心下如停冰鐵閉滯妨悶噯逆連聲狀如嗝氣降氣湯丁香五套丸之屬其病自若至若寢寐常夢刑戮劍戟或夢入人家四壁圍繞暫得一竇百計透出則失記何所或夢燒人地上四面枯骨煙焦撲鼻不得其路或觸憤而怒號哭悲啼或騎馬郊行急急回顧原無所自往往問醫師之達者皆知為肺病驗方處藥罕投其機或足膝痠軟或腰腿卒痛或四肢肌骨之間痛如擊截即痛即止並無常所乃至不時手麻臂痛狀若風濕百藥不效夏臥光滑竹簟如臥芒刺不安或逢陰暗交變則胸痞背脹不時齒癢咽疼口糜舌爛及其奮然而發則噴嚏連聲始則唾涕稠黏次則清水如注眼前黑暗腦後風聲耳內蟬鳴眼瞤肉惕每於靜室默然熟察病勢之來則於胸腹間如有二氣交紐遂噎塞煩郁有如煙火上衝頭面烘熱眼花耳鳴痰涎涕淚沸然湧起凜然毛豎噴嚏千百連聲然後遍身煩躁大寒之時則盡去衣衾裸體一凍則稍止片時或春和乍涼之時則多加衣衾亦暫少緩或頓飲冰水而勢定或痛飲一醉而頗寧或時失志甚欲癲狂或心下怔忡如畏人捕或嘔吐冷涎緑水黑汁婦人則月經不通忽成癆瘵荏苒之疾內外為病非止百端其狀不同難以盡述嘗用一藥愈止痰疾不計萬數即滾痰丸是也今用詩括以傳於世共為饒益之事云痰清痰濁辨王隱君曰世論痰清白者為寒黃濁者為熱誤也殊不知始則清白久則黃濁清白稀薄漬於上黃濁稠黏凝於下咳而易出者清而白咳而難出者黃濁結滯也若咯唾日久濕熱所郁上下凝結皆無清白者也甚至帶血血敗則黑痰為關格異病人所不識又清白者氣味淡久之漸成惡味酸鹹腥臭焦苦不一總是濕熱為源而云寒因熱用乃大誤也甫謂清痰則飲是也間亦有因於寒濁痰則不可言寒也察色知痰病痰者眼皮及眼下必如灰煙黑色舉目便知不待診脈眼堂黑而面頰赤者熱痰也如大黃色者熱痰也心下煩滿口乾思冷飲大便祕結小便赤久必生風或眩運耳鳴眼花多虛證誤以熱藥治之服久脈大實發大熱甚至中風此宜急下之凡眼黑而行步呻吟舉動注骨者入骨痰也其證骨髓痛眼面俱黑四肢冷痹屈伸不能此風濕也眼黑而氣短心驚恐氣痰也痰飲之病總屬於脾諸書論痰飲有因氣脈閉塞津液不通水飲停留結成痰者有胃氣虛弱不能運行水穀成痰者有因酒後飲水停滯於脾成痰者有風寒濕邪入脾相搏成痰者此證之所感不同難以類舉今脾胃為倉廩以納穀因脾弱而不能運行致氣血失於滋養故不周流氣道壅滯中焦不能腐谷遂停滯為痰為飲變則為寒為熱為喘為嗽為嘔吐為反胃為腫滿為眩運為風癇為噯氣為吞酸嘈雜為嗝噎為怔忡為疼痛之類不可盡狀皆痰之變而病其源出於脾濕不流水穀津液停滯之所致也痰證條録痰者津液之異名血氣和平聯絡調暢則津液流通而無痰患至若氣脈窒塞關竅凝滯則津液停聚而成痰涎痰之所以發動者豈無自而然哉大抵飲食酸寒辛辣炙爆腥膻生冷醇酒濕熱蒸鬱而成痰者最多其次為七情久鬱而致者亦有矣凡治痰病須審其因有痰而生熱者有因熱而生痰音有因氣鬱有因風火而成痰者有因積飲有因傷宿酒而成痰者所宜審別而施治也熱痰則多煩熱咳吐頗難間有口乾濕痰者多倦怠軟弱或面浮腹脹因停飲不散所致風痰多稀白或成癱瘓奇證因形寒飲冷所致驚痰發則心痛或為癲疾恐怖食積痰多成痞塊癖滿因過食厚味及脾虛所致酒痰飲酒過多不得消導次日又吐漸成反胃氣痰攻刺走注不定或時一點如刺或時一掌如冰皆為氣痰丹溪云痰之為物隨氣升降無處不到是也臂不能動是痰凡人手臂或動不得或骨節遍身疼痛坐臥不安此痰入骨也有人腳氣病久骨節痛與腳氣藥不愈此痰病也嘈雜是痰凡人胸膈一時如火烘炙似痛非痛忽然飢甚北人呼為心刺此火動其痰也詳見本門眩運是痰頭目眩運眼前黑暗如坐舟車𠮾𠮾欲吐者痰也詳見本門煩躁是痰凡人似熱非熱似寒非寒似病無病坐臥不寧心中焦躁欲哭欲叫者痰病也審其人之虛實從痰治之立愈顛狂是痰凡人忽然發狂語言錯亂棄衣登高此痰病也痰在膈上使人顛狂或健忘詳見本門顛仆是痰凡人卒然跌倒不省人事痰病也雖氣虛治痰為先中風不語是痰雖曰中風亦以治痰為先詳見本門小兒驚風是痰詳見本門婦人驚痰最多十有八九蓋因産後因乳孩兒因月事方行驚因虛而入結而成塊者為驚痰或常有一塊在腹如身孕轉動跳躍痛不可忍者是也活人書云中脘有痰亦令人憎寒發熱惡風自汗胸膈痞滿有類傷寒但頭不痛項不強為異脈候脈要精微篇曰肝脈耎而散色澤者當病溢飲溢飲者渴暴多飲而溢入肌皮腸胃之外也巢氏云偏弦為飲浮而滑為飲仲景云脈雙弦者寒飲也或大下後善虛脈偏弦者飲也肺飲不弦但苦喘短氣脈浮而細滑者傷飲脈沉而弦者懸飲內痛其人短氣四肢歷節痛肝脈澀甚為溢飲沉者為留飲脈弦數有寒飲冬夏難治脈經云病人一臂疼痛一時又移在一臂其人脈沉細非風也必有飲在上焦陳無擇云飲脈皆弦微沉滑或云左右關脈大實者膈上有痰也可吐之病人百藥不效關上肺浮而大者痰也眼胞及眼下如炭煙燻黑者亦痰也丹溪曰久得澀脈痰飲膠固脈道阻滯也卒難得開必費調理治法治痰飲以實脾燥濕為本春甫謂百病中多有兼痰世鮮知也古人用二陳湯治痰所以實脾土燥脾濕是其本之治也脾實而濕燥則痰自清而飲自散何變病之有王節齊謂二陳為實脾燥濕以治其標則誤也夫痰因脾濕為病之源久則變而為頑痰老痰之類當因其形證觀其緩急而分治之是則諸方皆以治標而後立者逐痰理氣有所先後嚴氏曰人之氣順則津液流通決無痰患古方治痰多用汗下溫利之法不若以順氣為先分導次之氣順痰飲亦順而下出矣此則嚴氏亦有所見而云然也玉機微義云順氣特一法耳要觀痰之淺深有痰積膠固氣道因之而不得順宜先逐去積痰然後氣可得順豈可專主理氣一法愚謂有理氣而痰自順者治其微也有逐痰而氣方暢者治其甚也二者皆治痰之要也不可偏廢者也但看痰與氣孰輕而孰重故施治有可急而可緩故曰逐痰理氣有所先後張子和吐法論痰在胸膈之上大滿大實非吐安能得出仲景曰大法春宜吐蓋春時陽氣在上人氣與邪氣亦在上故宜吐也湧吐之藥或丸或散中病即止不必盡劑過則傷人然則四時有急吐者不必直待春時也但仲景言其大法耳今人不得此法遂廢而不行試以名方所記者略數之如仲景傷寒論中以蔥白豆豉湯吐頭痛梔子厚朴湯吐懊憹瓜蒂散吐傷寒六七日因下後腹滿無汗而喘者本事方稀涎散吐膈實中滿痰嗽失音牙關緊閉如喪神守萬全方以鬱金散吐頭痛眩運頭風噁心普濟方以追風散吐口噤不開不省人事以皂角散吐涎潮總録方以常山吐瘧孫尚方以三聖散吐狂神驗方吐舌不正內經名言高者越之王啓玄上盛不已奪而吐之仲景曰宿食在上脘者當吐之又如宿飲酒積在上脘者亦當吐之又曰病人手足厥冷兩手脈乍結以客氣在胸中心下滿而煩欲食不能食者知病在胸中當吐之豫今用吐法皆是仲景方用瓜蒂散吐傷寒頭痛用蔥白豆豉湯以吐雜病頭痛或單瓜蒂散名獨聖加茶末少許以吐痰飲加全蠍梢以吐兩脅肋刺痛濯濯有聲者內經所謂濕在上者以苦吐之其是之謂歟今人亦有竊豫之法者然終非口授或中或否或湧而不能出或出而不能止豈知上湧之法名曰撩痰撩之一字自有擒縱卷舒近有醫工吐一婦人半月不止涎至數斗命懸須臾倉惶失計求豫解之豫煎麝香湯下咽立止或問麝香何如止吐豫謂之曰瓜苗聞麝即死今吐瓜蒂所以立解也如藜蘆吐不止者解以蔥白湯石藥吐不止者解以甘草貫衆湯惟草木吐者解以麝香考之本草吐藥之苦寒者有豆豉瓜蒂茶葉梔子黃連苦參大黃辛苦而寒者有鬱金常山藜蘆甘苦而寒者有地黃汁苦而溫者有木香遠志厚朴辛苦而溫者有薄荷芫花辛而溫者有穀精草蔥根鬚辛而寒者有輕粉辛甘而溫者有烏頭附子尖酸而寒者有晉礬緑礬齏汁酸而平者有銅緑甘酸而平者有赤豆酸而溫者有飯漿酸辛而寒者有膽礬酸而寒者有白米飲辛鹹而溫者有皂角甚咸而寒者有食鹽青鹽甘而寒者有牙硝甘而微溫者有參蘆甘辛而熱者有蠍梢凡此三十六味惟常山膽礬瓜蒂有小毒藜蘆芫花輕粉烏頭尖有大毒外二十六味皆吐藥之無毒者各對證擢而用之此法宜先少服不湧漸次加之余之撩痰者以叉股雞翎探引不出以齏汁投之投之不出再探之且投且探無不出者吐至昏眩頭痛者飲以冰水立解如無冰水新汲水亦可飲壯者一吐而安弱者可三四次吐之庶無損也吐之次日有頓快者有轉甚者蓋吐之傷而未平也俟數日再當湧之如覺渴者新水瓜梨及涼物皆不禁惟禁食飽厚饌干餔難化之物心火既降中脘沖和陰道必強大禁房勞大憂大怒謹守禁忌不信浮言真知病證決可吐者然後吐之庶萬全也不可吐例病人性行剛暴好怒善淫不可吐病人左右多雜之言不可吐病人頗讀醫書實非深明其理疑而不決不可吐主病者不能辨邪正之說不可吐病人無定見妄言妄從反覆不定者不可吐病勢巇危老弱衰朽者不可吐自吐不止亡陽血虛者不可吐諸吐血嘔血咯血衄血嗽血崩血失血者皆不可吐吐則轉劇治飲證當上下分消水濕子和云留飲一證也古人有五飲六證之分皆觀病之形狀而定名也豫詳飲之所得其來有五有憤鬱而得之者有困乏而得之者有思慮而得之者有痛飲而得之者有熱而傷冷得之者飲證雖多其因無出於此夫水陰物也但積水則成痰成飲在左脅者同肥氣也在右脅者同息賁也入肺則嗽入腸則泄入腎則為湧水入脾則為腫滿故在上則面浮在下則胕腫在中者為支滿痞隔痰逆在陽不去者久則化氣病在陰不去者久則成形著今之用方例以飲為寒積皆用溫熱之劑補之燥之水濕未除反增大熱豈知內經云留者攻之導水丸禹功散十棗湯三花神佑丸之類是也昔有病數年不愈子和診之左手皆微小右手皆滑而大微小為寒滑大為燥以瓜蒂散湧其寒痰數升汗出如沃次以導水丸禹功散去腸中燥垢亦數升其人半愈然後以淡劑流濕降火開其胃口不逾月而瘥燥熱藥治痰之誤丹溪曰氣之初病其端甚微或因飲食不謹或外觸風雨寒暑或內因七情或食味過厚偏助陽氣蘊為膈熱或資稟充實表密無汗津液不行清濁相干氣之為病或痞或痛或不思食或噫腐氣或吞酸或嘈雜或膨滿不求病源便認為寒處以辛香燥熱之劑投之數服時暫得快以為神方厚味依前不節七情又復相仍舊病被劫暫開濁液易於攢聚或半月一月前證復作如此延蔓自氣成積自積成痰此為痰為飲為吞酸之由也醫猶不察復以香燥之藥久服過多血液俱耗胃脘枯攪漸成痞痛膈噎之證此燥熱之誤也若夫用熱藥其必挾虛寒之證或為外束風寒痰氣內郁可以溫散或先疏導痰滯必當攻補兼施要在臨病制方隨時增減河間子和丹溪諸家治法靡不精詳或熱或寒或攻或補究其所屬合其所宜無施不當矣何熱藥之誤哉半夏南星治痰辨世人泥用二陳湯治痰不論風寒濕熱一概施治凡兼痰字堅執二陳雖彌年不效亦不敢更變甚至佐之南星其誤何可勝言也自王節齊氏雜著之論出而後醫者聞之其差知亦未必盡知之也其曰痰者病名也人之一身氣血清順則津液流通何痰之有惟夫氣血濁逆則津液不清蒸熏成聚而變為痰焉痰之本水也源於腎痰之動濕也主於脾古人用二陳湯為治痰通用者所以實脾燥濕治其標也標當作本然以之而治濕痰寒痰痰飲痰涎則固是矣若夫痰因火動肺氣不清咳嗽時作及老痰鬱痰結成黏塊凝滯喉間吐咯難出此等之痰皆因火邪炎上熏於上焦肺氣被郁故其津液隨氣而升卒為火鬱凝結而成歲月積久根深蒂固名曰老痰又曰郁痰而其源即火邪病在上焦心肺之分咽喉之間非中焦脾胃濕痰冷痰痰飲痰涎之比故湯藥難治亦非半夏南星茯苓蒼朮枳殼等藥所能治也惟在開其鬱降其火清潤肺金而消化凝結之痰緩以治之庶可效耳故制老痰丸用黃芩海粉桔梗栝蔞天門冬之類則二陳湯輩豈能觀效於萬一哉由此觀之半夏非但不能效於老痰若用之必反劇者大抵執泥丹溪有云二陳湯總治一身之痰之句竟不察夫新久寒熱每有用之痰結成膠聲不清咳不出者半夏之過也或者憾其辨之不早豫觀今之例執半夏南星而治痰者猶不少矣治痰條例痰在表者汗之在裡者下之挾濕者則分利之痰在經絡中非吐不可吐中就有發散之義吐則有汗故曰發散痰在膈上必用吐法瀉亦不去稠痰膠固者必用吐脈浮者亦必用吐氣實痰熱結在上者吐難得出痰在腸胃間可下而愈凡用吐藥宜升提其氣便吐也如防風山梔川芎桔梗芽茶生薑齏汁之類中焦有痰食積胃氣亦賴所養卒不可峻用攻之攻盡則虛矣凡治痰用利藥過多致脾胃虛則痰反易生而多矣治痰病久滯不通狀若寒凝不用溫藥導引必有拒格之患況有風寒外束痰氣內郁者不用溫散亦何以開鬱行滯也亦有峻用利藥過多則脾氣愈虛津液不運痰反易生法當補脾胃清中氣則痰自運下治痰用寒涼攻擊藥過多而痰不去此必脾氣虛而不運行也亦須佐以溫補肥人氣虛有痰宜二陳參術瘦人血虛有火當歸黃芩礞石丸之屬痰成塊吐咯不出氣鬱者難治治痰藥味各有所能痰在四肢非竹瀝不能達痰在脅下非芥子不能除痰在皮裡膜外非薑汁竹瀝不能導達熱痰火痰用青黛黃芩黃連天花粉實者滾痰丸最效老痰用海石栝蔞貝母老痰丸之類風痰用南星白附子濕痰用白朮蒼朮半夏食積痰用神麯山楂麥芽酒痰用天花粉黃連白朮神麯痰因火盛逆上者治火為先白朮黃芩石膏之類中氣不足加參術痰結核在咽喉咯唾不出化痰藥加咸能軟堅之味栝蔞仁杏仁海石連翹佐以朴硝薑汁二陳湯丹溪謂一身之痰都管治如要下行加引下藥要上行加引上行藥噫斯言過矣按二陳不過治輕小飲食之濕痰耳痰勢甚者宜各從其門戶如火炎上者用流金膏滾痰丸膠固者老痰丸飲積者小胃丹之類是也如此對證尚有不去況二陳乎潤下丸降痰最妙可以常服小胃丹治痰飲必用之藥實者用之亦二三服而已虛者便不宜多用滾痰丸治火痰必用之藥亦不宜多用竹瀝導痰非薑汁不能行經絡荊瀝治痰速效能食者用之二瀝佐以薑汁治經絡中痰最效痰中帶血者加齏汁效海粉熱痰能清濕痰能燥堅痰能軟頑痰能消可入丸藥亦可入煎藥南星治風痰濕痰半夏油炒大治濕痰喘氣心痰石膏墜痰火極效黃芩治熱痰假其下火也枳實去痰有沖牆倒壁之功五倍子能治老痰人鮮知之天花粉治熱痰酒痰最效又云大治膈上熱痰玄明粉治熱痰老痰速效能降火軟堅故也硝石礞石大能消痰結降痰火研細末和白糖置手心舌舐服甚效蒼朮治痰飲成窠囊行痰極效即神術丸又治痰挾瘀血成窠囊醫案虞摶治一婦人因多食青梅得痰飲病日間胸膈中痛如刀割至晚胸中痛止而膝䯊大痛蓋痰飲隨氣升降故也醫作胃寒治用乾薑良薑官桂烏附丁沉輩病日劇加之口渴小水淋瀝虞診六脈洪數而滑作痰治與竹瀝服三日口不湯小水利但胸中與膝立痛如舊用蘿蔔子汁研與半碗吐痰升許至夜痛尤甚丹溪所謂引動其猖狂之勢耳次日用參蘆一兩逆流水煎服不吐又次日以苦參湯服又不吐又與附子尖桔梗蘆皆不吐一日清晨用藜蘆末一錢麝少許酸漿水調服始得大吐半日得頑痰及飲約一小桶其痛如脫後以薄粥將理而安摶治一人遍身作塊子如腫毒即痰也以二陳湯加白芥子姜炒黃連服數劑遂消春甫治一婦人年二十身頗肥性急因氣惱後得痰咳嘔逆用二陳加順氣降火開鬱利痰之劑如水投石漸次咳逆怪聲哈哈日夜不絶如縷昔人所謂咳逆連連五七十聲方已或三五十聲而已者此之謂咳逆也茲日夜連聲不息無乃死證歟脈浮而微洪沉按小滑復以滾痰丸下之亦如故豫意痰鬱滯胃脘胸膈之間而氣不得宣通咳逆而後能出非吐之不可遂以瓜蒂散酸漿水調鵝翎探吐得痰碗許而咳逆遂止寂然無聲而其效苦神也逾二日因食麵及肉汁又復咳逆與清痰順氣藥不效豫意前日吐痰不多尚有未盡再吐之又得痰半碗許即愈治一丈夫年四十餘身肥素耽勞神有痰火一日先惡寒後發熱頭微痛眩多如不勝其重躁熱不退自用參蘇飲發汗不愈請豫治診其脈沉洪而滑豫謂痰火鬱積無疑矣以二陳加芩連天麻神麯之類復以滾痰丸下之三逾日反躁熱不退咳唾痰涎不止此正丹溪云痰在膈上非吐不可瀉之亦不去復用瓜蒂散探吐之得痰半碗許彼畏苦而止豫意痰少不能效躁熱如舊但以人參白虎湯五苓散合服亦不愈豫謂鬱滯重吐難得出分利亦不去宜以散郁之劑仍用二陳加前胡柴胡葛根桔梗蒼朮川芎薑汁炒芩梔三劑遂愈藥方通治脾胃痰飲諸方海藏五飲湯一留飲在心下二僻飲在脅下三痰飲在胃中四溢飲在膈上五留飲在腸間凡此五飲酒後飲冷過多所致旋覆花人參陳皮去白炒枳實茯苓澤瀉厚朴薑汁炒半夏豬苓白朮各八分前胡桂心芍藥炙甘草各五分上水二盞姜十片煎八分不拘時服飲酒傷者加葛根砂仁祕方五飲丸治一切停痰留飲理脾順氣消食寬胸青皮陳皮去白各一兩半夏制南星制各二兩枳實炒茯苓各一兩白朮炒二兩香附子真蘇子山楂肉神麯炒各半兩白礬一兩皂角生薑各二兩搗上以南星半夏同皂角白礬生薑煮南星無白點為度以南星半夏焙乾同前藥為末竹瀝薑汁作糊為丸如梧桐子大每服五七十丸食後或臨臥白湯送下和劑二陳湯治痰飲為患或嘔吐噁心或頭眩心悸或中脘不快或因生冷飲酒過多脾胃不和此效橘紅半夏制各三錢白茯苓二錢炙甘草一錢上作一服水二盞姜三片棗一枚煎八分食遠服二賢湯治一切痰飲橘紅用真正廣陳皮刮去白一斤炙甘草食鹽各四兩上水五碗慢火煮焙乾搗為細末白湯點服一方橘紅四兩甘草一兩為細末點服治痰極有效世人但知用南星半夏枳實茯苓之類何足語此有人腹滿堅痛服此利下物數塊如彈子臭惡不可近腹滿疾豁然頓愈和劑導痰湯治一切痰涎壅盛或胸膈留飲痞塞不通陳皮茯苓甘草半夏南星枳殼炒各等分上咀每服六錢水二盞姜十片煎七分食後服王隱豁痰湯治一切痰疾此方與滾痰丸相副蓋以小柴胡湯為主合前胡半夏南星枳殼紫蘇陳朴之屬出入加減素抱痰疾及肺氣壅塞者以柴胡為主余者並去柴胡以前胡為主柴胡半夏各二錢枯芩人參脈盛有力者不用甘草紫蘇陳皮厚朴南星薄荷葉枳殼羌活各五分上水二盞姜五片煎八分不拘時服中風者加獨活胸膈不利者加枳實內外無熱者去黃芩治一切痰氣最效宣明橘皮半夏湯治痰壅涎嗽久不已者常服潤燥解肌熱止嗽陳皮半兩半夏制二錢半上為末作二服水盞半姜十片煎七分溫服御藥大半夏湯治痰飲及脾胃不和半夏陳皮白茯苓各二錢上水二盞姜五片煎八分溫服有熱加甘草拔萃白朮湯治胃中虛損及吐痰者半夏曲半兩白朮木香甘草各一錢茯苓二錢檳榔二錢半上為細末每服一錢生薑湯調下食前服濟生茯苓飲子治痰飲蓄於心膈怔忡不已赤茯苓茯神半夏麥門冬陳皮各一兩沉香檳榔甘草各三錢上咀每服八錢生薑五片煎八分食後溫服指迷茯苓丸治人有臂痛不能舉手足或左右時復轉移因伏痰在內中脘停滯脾氣不流行上與氣搏四肢屬脾脾滯而氣不下故上行攻臂其脈沉細者是也但治痰則臂痛自止及婦人産後發喘四肢浮腫者用此則愈半夏制二兩茯苓一兩枳殼炒半兩風化硝三錢半上為細末薑汁煮麵糊丸梧桐子大每服三十丸薑湯下纍有人為痰所苦夜間兩臂常覺如有人抽掣兩手戰