兩沉香五錢上為細末滴水丸梧桐子大每服三五十丸量人強弱加減隱括其方詩曰甑里翻身甲掛金於今頭戴草堂深相逢二八求斤正硝煅青礞倍若沉十七兩中零半兩水丸桐子意常真千般怪證如神效水瀉雙身卻不任凡服滾痰丸之法必須臨睡就床用熟水一口許只送過咽即便仰臥令藥在咽膈間徐徐而下如日間病出不測疼不可忍乾嘔噁心必即徐瘥者須是一依臨睡服法多半日不可飲食湯水及不可以起身坐行言語直俟藥氣除逐上焦痰滯惡物過膈入腹然後動作方能中病每次須連進兩夜所服次日痰物既下三五次者夜減十丸下一二次者仍服前數下五七次或只下二三次而病勢頓已者次夜減二十丸頭夜所服並不下惡物者次夜加十丸壯人病實者多至百丸雖狂痰動實及暴卒惡候多服無妨大抵服罷仰臥咽喉稠黏壅塞不利者乃痰氣泛上藥病相攻故也少頃藥力既勝自然寧貼往往痰病日久結實於肺胃間或只暴病餘無泛溢者服藥下咽即仰臥頓然百骸安靜五臟清寧夢寐佳境如遊華胥氏之國和悅何可云喻大抵次早先去大便一次其餘遍次皆是痰涕惡物亦有看是溏糞用水攪之盡系痰片黏涎或百中有一稍稍腹痛腰背拘急者蓋有一種頑痰滯祕裡急後重狀如痢疾片時即已若其痰涎易下者其為快利不可勝言頓然滿口生津百竅爽快間有片時倦怠者蓋為病苦不安一時為藥所勝體氣暫和似醉初醒如浴方出如睡初起則非虛倦也此藥並不洞瀉元氣但能取痰積惡物次第穿鑿而下腹中槽粕並不相傷非比神佑丸小胃丹之毒藥慓悍多服必傷人也服者當自知之一切新久失志喪心或癲或狂等證每服百丸人壯氣盛能食狂甚者一百二十丸以效為度一切中風癱瘓痰涎壅塞大便或通或結者每服八九十丸壯實者加之常服二三十丸則無大便祕結之患自然上清下潤一切陽證風毒遍身遊走疼痛每服八九十丸未愈再加一切無病之人遍身筋骨平日疼痛不能名狀者每服七八十丸未效加之以效為度一切頭痛又非頭風牙痛或腫或癢每服八十丸一切噎氣吞酸致於噯逆膈氣及胸痞腹中氣塊衝上嘔吐涎飲狀如翻胃者每七八十丸未效再服一切心下怔忡如畏人捕怵惕不安陰陽關隔變生怪證每服七八十丸甚者加之一切新久痰氣喘嗽或嘔吐痰沫或痰結實熱或頭運目眩每服七八十丸老人虛弱者四五十丸未效加服一切急慢喉閉赤眼每服八九十丸腮頰腫硬繞項結核若瘰癧之狀正宜服之口糜舌爛咽喉生瘡者每以五六十丸同蜜少許一處嚼碎噙睡徐徐咽下些少口瘡等證只以二三十丸如前噙嚼二三夜即瘥一切荏苒之疾男子婦人之患非傷寒內外之證或酒色吐血或月水愆期心煩志亂或腹滿脅痛或背脹腰疼耳聵鼻乾痠疼燥熱乾嘔噁心諸般疼痛百藥不效病者不能喻其狀方書未曾載其疾醫者難以別其證並依前法加減服之無不全愈拔萃蠲飲枳實丸逐飲消痰導滯清膈枳實炒半夏制陳皮去白黑牽牛取頭末各三兩上為末糊丸梧桐子大每服五十丸薑湯下御藥滌痰丸治三焦滯氣胸膈痞滿咳唾稠黏面上赤熱肢體倦怠不思飲食此藥下痰飲消食快膈木香二錢檳榔半夏制三稜各半兩青皮陳皮枳殼各三錢大黃一兩黑牽牛二兩炒上為細末麵糊丸梧桐子大每服三十丸食遠薑湯下開結枳實丸宣導滯氣消化痰飲專治嘔逆噁心宿酲不醒宿物停滯兩脅膨脹咽嗌不利上氣咳嗽等疾枳實炒白朮炒半夏制南星制白礬枯苦葶藶炒青皮大黃各五錢木香三錢黑醜頭末二兩大皂角炙去皮弦旋覆花各一兩上為細末薑汁煮糊丸梧桐子大每服五十丸薑湯下婦人乾嘔嗝氣滿悶或面目浮腫小便不利薑蔥湯下子和濬川丸即濬川散治一切痰飲十種水脹甘遂麵包煨芒硝各二錢郁李仁一錢大黃三錢牽牛末二錢上為末滴水丸梧桐子大每服五十丸溫水下聖惠舟車丸治五飲痰積腫脹甘遂大戟醋炒芫花醋炒各一兩大黃二兩木香檳榔青皮陳皮去白各五錢牽牛頭末四兩輕粉一錢上為末水糊丸梧桐子大每服五十丸臨臥溫水下以利為度醫林烏巴丸治胸膈久為頑痰所害積成痰氣面目清白色腫浮不思食遍身痛夜間氣壅不得睡往來寒熱手足冷痛不得轉側屢用南星半夏黑錫靈砂墜之不下取之不出此是頑痰堅滯宜此藥利下頑痰如魚腦則愈未利再服烏梅肉二兩巴豆五粒研去油上用水兩碗砂銚內將烏梅肉煮爛候水稍干入巴豆將竹片攪候如稠糊取出搗爛丸梧桐子大每服七丸九丸十丸十一丸或十五丸薑湯下不拘時玉機透羅丹治痰實咳嗽胸膈不利皂角酥炙去皮弦一兩黑醜微炒半夏大黃各一兩巴豆去油另研杏仁去皮尖炒各一錢上為細末薑汁為丸梧桐子大每服三十丸食後薑湯下醫林墜痰丸治痰飲風痰等證黑醜頭未二兩枳實枳殼半兩白礬枯朴硝風化豬牙皂角各三錢炒上為細末蘿蔔汁和丸緑豆大每服五十丸平旦時服初下糞次下痰瑞竹神仙墜痰丸大皂角炙去皮弦子一兩六錢白礬一兩二錢黑醜取頭末四兩上為細末滴水丸梧桐子大每服五十丸空心溫酒下醫林破痰丸治痰飲心腹痛立效蓽茇胡椒丁香木香砂仁蠍梢烏梅肉青皮巴豆去殼各等分上以青皮同巴豆入漿水內浸一宿次日同炒青皮焦去豆為末水浸烏梅肉湯炮蒸餅碾和成膏入藥和勻丸緑豆大每服十丸至十五丸不拘時薑湯下祕方沉香和中丸治一切痰氣壅盛陳皮青皮枳殼黃芩各一兩木香礞石制各半兩大黃黑醜頭末各一兩二錢檳榔一兩沉香二錢滑石二兩上為細末滴水丸梧桐子大每服五十丸臨臥茶清下易簡諸方御藥方治胸中有痰瘀癖者白礬一兩水二升煮一升入蜜一合更煮少時溫服須臾即吐如未吐再飲熟水一盞吐痰為效一方治膈壅風痰以半夏洗淨為末薑汁和為餅子濕紙包煨熟水二盞餅子一塊彈子大入鹽五分煎一盞食遠溫服一方治痰涎隔塞以檳榔為末每服食後白湯調下二錢一方治痰飲流注疼痛以大半夏二兩洗淨為末風化硝一兩薑汁打糊丸梧桐子大薑湯下十五丸痛在上臨臥服在下空心服千金翼方治痰飲吐水用赤石脂一斤為細末每服方寸匕酒飲任下漸加至三匕服盡終身不吐痰水又不下痢按本草赤石脂補五臟令人肥健有人痰飲吐清汁諸藥不效用此遂愈一方治頑痰不化以石青一兩石緑半兩俱水飛末曲糊丸梧桐子大空心白湯下四十丸五日十日一服輕者半月一服一方治冷痰寒飲噁心用蓽茇一兩為末食前用清米飲調下五分勝金方治風痰白殭蠶七條細研以薑汁一匙溫水調灌又方治風痰蘿蔔子末溫水調一匙良久吐涎沫愈一方消痰潤燥以貝母為末和砂糖為丸龍眼大嚼下能止嗽經驗方治胸膈氣滯煩悶痰飲不利頭目不清生南星刮去皮半夏湯泡七次各五兩為末以薑汁和為餅以楮葉蓋之今發黃色曬乾須五六月內做合時用香附子一兩制如常法以成曲二兩共為末水糊丸梧桐子大每服四十丸食後薑湯下一方治痰飲上氣不思飲食小便不利頭目昏眩吳茱萸泡焙乾白茯苓等分為末煉蜜丸梧桐子大每服三十丸食遠熟水下一方治風痰食不消化大便祕澀訶子三枚搗調酒服三五度良一方治風痰用鬱金一分藜蘆十分為末每服一字用溫漿水一盞先以少漿水調下余水漱口都服便食物壓之一方治痰暈用白礬枯為末薑湯調下吐之即愈一方回生丹治痰厥氣絶心頭溫者取古塔上陳石灰一合水一盞煎滾去水再用清水一盞煎極滾澄清鑿口灌之痰下自蘇一方化痰丸用天絡絲即絲瓜也通條燒存性為細末棗肉為丸彈子大每服一丸好酒化下立可化痰一方治風痰壅塞大便祕滯用蜣螂大者一枚小者一對新瓦上烙干存性為末好酒調下不能飲酒者以滾水各半服大便即通其效如神蜣螂名推糞蟲以其性能推糞下行通塞故也一方治痰飲奇效以瓦楞子殼即海蚶子不拘多少炭火煅研末候栝蔞黃熟時正搗和瓦粉作餅子曬乾為末用蜜湯調一錢或入諸藥為丸其效過於海粉多矣造蛤粉法此可代海粉用能化酒痰頑痰有謂此粉即海粉非也泰州紫口蛤蜊以炭火煅成粉候栝蔞熟時同粉搗爛作餅子竹囊懸風處陰乾次年聽用入丸藥為極細末入煎藥為咀道引法左右側臥不息十通治痰飲不消右邊飲積左側臥左邊飲積右側臥又有不消氣排之左右各十有二息治痰飲也
