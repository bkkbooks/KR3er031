body:
  text: 卷之五十六心痛門病機心痛敘論經曰真心痛者寒邪傷其君也手足青至節甚則旦發夕死夕發旦死厥心痛者乃寒邪客於心胞絡也舉痛論云寒氣客於背俞之脈則血脈泣脈泣則血虛血虛則痛其俞注於心故相引而痛按之則熱氣至則痛止矣重感於寒則痛久矣針經曰足太陰之脈其支者復從胃別上膈注心中是動則病舌根強食則嘔胃脘痛腹脹善噫心中急痛胃病者腹䐜脹胃脘當心而痛上支兩脅膈咽不通脈經曰憂愁思慮則傷心則苦驚喜忘善怒心傷者其人勞倦則頭面赤而下重心中痛徹背其脈弦此心臟傷所致也心痛有熱厥寒厥不同病機機要曰諸心痛者皆少陰厥陰氣上衝也有熱厥心痛者身熱足寒痛甚則煩躁而吐額自汗出知為熱也其脈浮大而洪當灸太溪及崑崙謂表裡俱瀉之是謂熱病汗不出引熱下利表汗通身而出者愈也灸畢服金鈴子散則愈痛止服枳朮丸去其餘邪也有火實心中痛者因氣而食卒然發痛大便或祕久則注悶心胸高起按之愈痛不能飲食急可利之利後以藁本湯去其餘邪也有寒厥心痛者手足逆而通身冷汗出便溺清利或大便利而不渴氣微力弱急以朮附湯溫之寒厥暴痛非久病也旦發夕死急當救之是知久病無熱暴病非寒也此寒熱厥痛與夫大實心痛者治法已詳又有久病氣血虛損及素作勞羸弱之人患心痛者皆虛痛也故錢氏心虛者炒鹽補之圖經衍義中牡蠣治心痛則蠣粉與鹽實得之矣心痛病分三因陳無擇云十二經絡各感六淫則其氣閉塞鬱於中焦氣與邪爭發為疼痛足厥陰心痛兩脅急引小腹連陰股相引痛手心主痛徹背心煩掌中熱咽乾目黃赤脅滿足太陰心痛肚腹脹滿澀澀然大便不利膈閉咽塞手太陰心痛短氣不足以息季脅空痛遺矢無度胸滿煩心足少陰心痛煩劇面黑心懸若飢胸滿腰脊痛引背腧諸經心痛心與背相引心痛徹背背痛徹心諸府心痛難以俯仰小腹上衝卒不知人嘔吐泄瀉此皆諸經諸俞諸府涉邪所致病屬外因五臟內動沮以七情則其氣痞結聚於膻中經曰膻中者臣使之官喜樂出焉與厥陰心胞絡之經同一機也每每云心痛皆是此經之病世人鮮有言之者又中脘氣與血搏為疼痛此為胃脘痛肝心痛者色蒼蒼如死狀終日不得太息真心痛者寒邪傷其君也手足青至節甚則旦發夕死夕發旦死脾心痛者如針錐刺其心腹蘊蘊然氣滿肺心痛者若從心間起動作痛益甚色則不變腎心痛者與背相引善瘈如物從後觸其心身傴僂胃心痛者腹脹滿不下食食則不消皆臟氣不平喜怒憂鬱所致屬內因飲食勞逸觸忤非類使臟氣不平痞隔於中食飲遁積變亂腸胃發為疼痛或飲啖生冷果實中冷不能消散結而為積遇食還發名積心痛及其臟寒生蛔致心痛者所謂九種心痛曰飲曰食曰風曰冷曰熱曰悸曰蟲曰疰曰去來痛者除風熱寒屬外所因余皆不內外因又婦人惡血入心脾經發作疼痛尤甚於諸痛更有卒中客忤鬼擊尸疰使人心痛亦屬不內外因心痛非真心痛即胃脘胞絡脾絡相似丹溪曰心痛即胃脘痛也雖日數多不吃食不死若痛方止便吃物還痛必須三五服藥後方吃物痛甚者脈必伏用溫藥附子之類不可用參術楊仁齋曰紫之奪朱相去一間耳而毫釐疑似實霄壤焉夫心為五官之主百骸之所聽命者也心之正經果為風冷邪氣所幹果為氣血痰火所犯則其痛徹背脅脹胸煩咽乾兩目赤黃手足俱青至節朝發而暮殂矣然心之胞絡與胃口相應往往脾痛連心或陽虛陰厥亦令心下急痛或他臟之邪亦有客乘於心者是則心之別脈受焉爾真心之痛豈容比之如是乎脈候脈經曰脈短而數者心痛澀則心痛脈陰弦為心痛心脈微急為痛心脈微大為心痹引背痛甚者脈必伏心痛脈俘大弦長者死沉細而遲者生治法治心痛須分新久寒熱凡心痛明知身受寒氣口傷寒物於初得之時宜用溫散或溫利之藥如豆蔻丸之類稍久則成鬱熱原病式中備言之矣若久病鬱熱者欲行溫散寧無助火為病乎由是古方多以山梔為主加熱藥為嚮導則邪易伏病易退正氣復而愈矣用山梔十五枚去皮炒濃煎佐以薑汁令辣服之或加川芎一錢或以二陳加川芎蒼朮倍山梔煎服甚者加乾薑輕者以麻黃桂枝之類散之或以桔梗韭汁開提之重者加石鹼因平日喜食熱物以致死血留於胃口而痛者宜桃仁承氣湯下之或玄胡索一兩半桂滑石紅花面各半兩桃仁三十枚蒸餅丸服有勞役太甚飲食失節中氣不足或寒邪乘虛而客或久不散鬱而生熱或素有熱虛熱相搏結於胃口而痛或食積痰或乘氣而食相郁不散停結胃口而痛也心痛有蟲痛者蟲痛者面上白斑唇紅有痛後便能食時作時止者是也上半月蟲頭向上易治下半月向下難治先用肉汁及蜜吃下引蟲頭向上然後用打蟲藥苦楝根錫灰之類治之或痛而坐臥不安自按心腹時大叫或青或黃唇緩口吐清水目無光彩者蟲痛也取蟲九安蟲散並見蟲門心膈大痛攻走胸背發厥諸藥不納者就吐中以鵝翎探吐之出積痰碗許而痛立止凡用純寒熱之藥必以甘草緩其寒熱之勢凡心痛用梔子並劫藥止之後又發者前藥必不效以玄明粉一服立止氣實者用牡蠣粉一二錢酒下客寒犯胃者白朮附子湯溫飲響聲而痛者小胃丹下之食積急痛者備急丸藥方心痛通用劑濟生加味七氣湯治喜怒憂思悲恐驚七氣為病發則心腹刺痛不可忍者或外感風寒濕氣作痛亦宜服之半夏制錢半桂心玄胡索炒去皮各一錢二分人參乳香甘草各五分上水盞半薑五片棗一枚煎八分食遠服愈痛散治急心痛胃痛五靈脂炒去石玄胡索炒莪朮炮當歸酒洗良薑炒各等分上為細末每服四錢熱醋湯調下無時七氣湯治七情之氣鬱結心腹痛不可忍方見氣門玄胡索散治卒心痛久不愈者玄胡索一兩甘草炙二錢上水二盞煎一盞服如吐逆者分作三五次服勝金散治卒心痛桂枝玄胡索炒五靈脂當歸各半兩上為末煉蜜丸梧桐子大每服二十丸食前陳皮湯送下良方鐵刷散治心脾積痛婦人血氣刺痛久病噁心腸滑泄瀉良薑炒二兩茴香七錢炒蒼朮制甘草炙各二兩八錢上為末每服二錢空心薑鹽湯調下局方沉香降氣湯治陰陽不和心腹刺痛方見氣門局方蘇合香丸治卒心痛用生薑陳皮湯調下方見中風門家祕祛痛散治諸般心氣痛或氣滯不行攻刺心腹痛連胸脅小腸吊疝及婦人血氣刺痛立有神效青皮五靈脂去石川楝子穿山甲各二錢良薑香油炒玄胡索沒藥各一錢半沉香一錢大茴香二錢檳榔錢半木香一錢二分砂仁少許上咀用木鱉子去殼一錢二分同前藥炒令香焦燥去木鱉不用共為細末每服一錢加鹽一星用酒或滾水送下此方屢用無不應驗故附於後直指落盞湯治急心痛陳皮香附子良薑吳茱萸石菖蒲各等分上咀每服五錢水煎熟先以香油三五點在盞內將藥淋下服犯寒心痛劑桂枝四七湯治風冷寒邪客搏心腹作痛桂枝白芍藥半夏制各一兩白茯苓厚朴枳殼甘草各半兩炙人參紫蘇各一錢上咀每服四錢薑七片棗二枚煎食前服大沉香丸治冷氣攻衝心腹刺痛亦治卒暴心痛沉香乾薑炮薑黃辣桂檀香各二兩白豆蔻仁一兩白芷甘草炙甘松洗焙天台烏藥各四兩香附半斤炒上為末煉蜜丸彈子大每服一丸食前薑湯嚼下或薑煎服薑桂飲治心腹刺痛良薑辣桂各等分上為細末每服二錢熱米飲調下卻痛散治心氣冷痛不可忍五靈脂淨炒蒲黃各一錢肉桂石菖蒲當歸木香胡椒各錢半川烏炮二錢上作一服水盞半煎一盞入鹽米醋少許食前服朮附湯治寒厥心痛手足逆冷通身冷汗脈微氣弱白朮九錢附子四錢半甘草炙錢半上咀作二服每服水盞半薑二片煎食前服神捷丸治急心痛不可忍渾身手足厥冷嘔吐冷沫吳茱萸湯泡乾薑炮肉桂去皮蓬朮煨附子炮去皮臍川芎各等分上為細末醋煮糊丸梧桐子大每服五十丸食前醋湯送下二胡散治冷氣心痛及疝氣心腹痛玄胡索胡椒各等分上為細末每服二錢食前溫酒調服四制良薑丸治冷氣心痛良薑四兩分作四分制一分用陳壁土同炒黃去土一分用斑蝥三十四個同炒黃去斑描一分用巴豆三十四個去殼同炒黃去豆一分用陳倉米四合同炒黃去米吳茱萸一兩揀淨酒浸一宿上將吳茱萸同制良薑再炒碾為細末用浸茱萸酒煮麵糊丸梧桐子大每服五十丸更看病人腹中冷熱加減空心薑湯下蜜附湯治冒涉風邪入腹拘急疼痛或吐或瀉狀如霍亂附子一個去皮臍切作片以蜜炙令熟以附黃色為度以湯洗去蜜切片桂心芍藥各一錢炙甘草五分上作一服水盞半薑五片棗一枚煎食前溫服熱邪乘心作痛劑金鈴子散治熱厥心痛或發或止久不愈者金鈴子肉玄胡索各兩上為細末每服二錢溫酒調下白湯亦可靈脂酒治熱氣乘心作痛五靈脂去石玄胡索沒藥各等分上為細末每服二錢溫酒調下連茱丸治熱乘心痛黃連炒山梔炒滑石吳茱萸泡各五錢荔枝核燒存性三錢上為末薑汁糊丸梧桐子大每服五十丸白湯下山梔丸治前證山梔子仁炒黃色為末三湯調粥糊丸挾加草豆蔻仁炊餅丸服白朮半夏丸治氣血痰熱心痛白朮半兩半夏砂仁白芍藥當歸各三錢桃仁黃連神麯炒陳皮各一錢吳茱萸錢半殭蠶人參甘草各一錢上為末蒸餅丸梧桐子大每服五十丸薑湯下白朮白芍藥丸治同前白朮三錢半白芍藥陳皮當歸尾各二錢半人參黃連炒錢半吳茱萸五分為末如前法服山梔香附丸治氣實心痛山梔子炒焦六錢香附子一錢吳茱萸湯泡一錢上為末蒸餅丸小豆大生地黃薑煎湯送下五十丸蟲咬心痛劑與蟲門參看蕪荑散治大人小兒蟲咬心痛經云蟲貫心則殺人欲驗之大痛不可忍或吐青黃緑水涎沫或吐蟲出發有休止此則蟲心痛也宜速療之蕪荑雷丸各半兩乾漆捶碎炒煙盡一兩上為細末每服三錢溫水調服不拘時甚者不過三服小兒每服五分御藥妙應丸治九種心痛積年癥瘕癖塊或大或小或因傷寒疼痛發作無時或心堅結上衝胸痞氣攻兩脅嘔逆苦水或喉癢煩悶吐蛇蟲京三稜石三稜雞爪三稜青皮厚朴硇砂另研肉豆蔻白豆蔻檳榔各一兩木香乾漆炒各六錢巴豆霜研五錢上除巴霜硇砂外同為細末入霜硇研勻以原浸藥醋打糊丸梧桐子大每服三四丸食後醋湯下煮黃丸治大實心痛心胸高起按之愈痛雄黃研半兩巴豆去皮油研半兩上入白麵二兩研勻水丸梧桐子大漿水煮十二丸熟漉起入冷漿水內令沉每一時用浸藥冷漿下一丸日盡十二丸如得利不可再進宜服藁本湯藁本湯去餘邪治大實心痛服煮黃丸後用此藁本半兩蒼朮米泔水浸炒一兩為咀分二帖水煎服雷丸鶴蝨散治心痛三十年不瘥每月上旬日服殺蟲效雷丸鶴蝨貫衆狼牙桂心當歸檳榔各八分上為末空心煮蜜水半雞子許服方寸匕日二服若重不過三服瘥忌生蔥生冷油膩豬魚小豆大蒜等物血攻心痛劑丹溪玄桂丸治死血留胃脘當心作痛玄胡索兩半滑石紅花官桂紅曲各半兩桃仁三十粒上為細末湯浸蒸餅為丸緑豆大每服四十丸薑湯下立應散治婦人血刺心痛玄胡索一兩炒為細末每服二錢用熱酒調服米飲亦可易簡諸方外臺方治卒心痛乾薑為末米飲調服一錢一方用明礬石榴皮末各五分白湯調下不拘時聖惠方治心痛一時無藥用伏龍肝即灶心土為末每服一錢冷痛酒調熱痛水調服又方用東引桃枝銼一搗酒一升煎半升頓服治諸般心痛用玄胡索草果五靈脂沒藥等分為末酒調服方寸匕不拘時肘後方治心痛嫩槐枝一握銼水二盞煎一盞分二次熱服又方用枯礬為末煉蜜丸梧桐子大每服二三十丸白湯下有蟲者次用苦參一撮以無灰酒煎服千金方治心痛用桃仁七枚去皮尖生為末水調服又方用檳榔二兩陳皮二兩為末空心蜜湯調服方寸匕又方治卒心痛用麋角截破炙黃為末酒調服又方用菖蒲三寸切煎湯擂胡椒末七粒服之立止又方治心痛諸藥不效用萱草根一寸磨醋一杯溫服止傳信方蟲咬心痛用白熟艾一升水三升煎一升去渣頓服若有蟲當吐出又方治前證用香油鹽調熱服一盞一方用楝根皮煎濃湯一盞服一方治心痛用乾雞屎炒焦為末又入乾薑片同炒將焦研為末每服一錢酒調下一方治蟲咬心痛面青口中沫出臨死者用萹蓄十斤水一石煎去渣再煎如飴空心服蟲自下重者再服須通宿勿食兵部手集方治久心痛十年五年者隨手效小蒜用釅醋煮頓服此後再不發脾痛候病機脾痛敘論大抵人病胸膈心腹疼痛動輒飲食勞倦所傷則脾氣為之鬱滯或犯寒暑濕熱及食積痰氣脾受之而作心痛此脾痛也非心也心痛門具九種之痛從可審矣凡脾家作痛每每停聚不散或滿或脹或不思食膈間水聲食物相觸則作疼痛其有乍作乍止來去無定嘔吐清水面白無常者蟲痛也雖云知其脾家作痛亦當察其所傷之殊而分治之痛止之後尤當調養脾胃正氣節慎起居飲食不使復傷可謂標本兼該而不遺矣直指云療病如瀚衣必去其垢汙而後可以加漿飾斯言得之矣治法脾虛積黃而痛胃苓湯胃虛感冷而痛理中湯內傷發熱不食胃口作痛補中益氣加草豆蔻熱痛加梔子肥子心脾中脘當心痛或痞氣不食用草蔻炒三稜白朮各一兩白豆蔻仁桂枝小草遠志莪朮丁香木香藿香炊餅丸梧桐子大薑湯下三十丸實痛者手不可近六脈沉細甚有汗大承氣加桂強壯痛甚者加桃仁附子小腹虛作痛小建中湯寒熱嘔吐而痛脈沉弦大柴胡湯脾胃不和而痛大安丸冬寒停飲桂黃散咳逆上氣痰飲心痛海蛤粉煅栝蔞仁蒂等分研細和勻米麵糊為丸服丹溪治脾痛用海粉佐以香附末用川芎山梔生薑汁煎辣湯調服為佳有脾痛大小便不通者此是痰隔中焦氣聚下焦用草蔻丸多治氣餒弱人心脾痛妙藥方調痛散治脾痛氣膈木香丁香檀香大香附天台烏藥莪朮辣桂片薑黃白生薑白豆蔻仁砂仁甘草炙各等分上咀每服二錢半紫蘇四葉煎湯服東垣草豆蔻丸治客寒侵犯心脾作痛宜此止可一二服草豆蔻麵包煨去皮一錢四分益智橘皮殭蠶人參黃耆吳茶萸泡各八分生甘草三分炙甘草當歸青皮各六分神麯薑黃四分澤瀉一錢小便數者減一半桃仁七個去皮尖另研麥芽炒錢半柴胡四分詳脅下加減半夏制上除桃仁另研余為末浸蒸餅丸梧桐子大每服三十丸空心白湯食遠旋斟酌多少用之和劑抽刀散治脾胃積冷中滿疼痛川白薑五兩咀入巴豆肉一錢同炒至巴黑去巴石菖蒲五兩半糯米六兩一分炒黃色良薑五兩咀入斑蝥二十五個同炒黑去斑蝥上為末每服二錢空心溫酒調服良薑拈痛湯治脾疼甚妙良薑切大片先用吳茱萸慢火炒少頃次入東壁日曬土須不著者同炒次以好米醋同炒至茱萸黑色為度上為末每服一錢溫米飲調空心服桂花散治脾積氣痛香附五兩炒去毛莪朮醋煮焙乾良薑甘草炙各三兩桂花一兩上為末每服二錢鹽一點食前沸湯調熱服沉香降氣湯治食積脾痛方見氣門薑桂飲治風冷入脾作痛方見心痛門二物湯治脾痛雞心檳榔良薑等分上咀每服三錢入水盞半陳米百粒煎服濟生燒脾散治飲啖生冷果菜停留中焦心脾冷痛乾薑炮厚朴草果砂仁甘草炙神麯麥芽陳皮良薑炮各等分上為末每服三錢熱鹽湯點服不拘時和劑蟠蔥散千金五套丸丁香半夏丸並治脾氣虛寒而痛以上方見氣門及痰飲門良方遊山方治心脾痛此藥極奇葉石林遊山見一小寺頗整潔師徒亦從問僧所以仰給者答云素無田産亦不苦求於人只貨數藥以贍其間脾疼藥最流布有詩云草果玄胡索靈脂並沒藥酒調一二錢一似手拈卻上各等分為細末每服三錢不拘時溫酒調下出百一選方選方薑橘丸治中酒惡心心脾痛嘔逆生薑一斤青鹽一兩淹一宿青皮砂仁木香各三分莪朮一兩甘草炙陳皮兩半上為末煉蜜丸櫻桃大每服一丸鹽湯下錢觀文方治心脾痛當歸四兩白朮一兩為末每服二錢沸湯點服參朮散治虛弱人脾疼人參白朮乾薑白豆蔻砂仁丁香陳皮甘草炙各等分上咀每服四錢水盞半薑三片煎七分調炒過真蛤粉一錢並服神效散治遠年近日一切脾疼或寒引入背膂最效木香青皮陳皮枳殼麥芽炒神麯炒三稜煨莪朮炮芍藥甘草白芷官桂玄胡索破故紙各一錢蓽澄茄丁香各四分上作二劑每服水盞半薑三片棗一枚煎八分空心臨臥各服小降氣湯脾氣痛多有傷損而成者每因失飢遽成過飽胃弱並難克化其候心腹脹心下痞塞吐酸水不能食脅背皆痛治當先服小降氣湯後消積次定痛紫蘇梗烏藥陳皮白芍藥各一錢甘草炙五分上咀水盞半薑五片棗一枚煎八分服丁香止痛散治心脾痛不可忍丁香半兩良薑五兩茴香炒甘草各兩半上為細末每服二錢不拘時沸湯點服水甲散治心脾痛效田螺殼溪間者亦可用上用松柴薄片層層疊上火燒之取殼灰為細末入調氣散烏沉湯寬中散茴香湯之類調服食遠甚效方見氣門訶子散治心腹冷痛一服即效又治九種痛霍亂吐利訶子煨去核炙甘草厚朴制乾薑煨草果陳皮良薑茯苓神麯炒麥芽炒各一錢上咀分二服每服水盞半入鹽少許煎八分食遠溫服易簡諸方經驗方治脾元氣弱發渴痛不可忍用茱萸一兩桃仁一兩和炒令茱萸焦黑後去茱取桃仁去皮尖研細蔥白三十莖煨熱以酒浸溫分三服千金方治心脾痛用高良薑咀微炒搗為末米飲調下一錢效聖惠方治因食冰水過多或飲冷漿積於胃以致脾痛者胡椒二十五粒漿水浸一宿取出用鹽湯下其病則脫永不再發也治脾痛三方歌腹脹脾疼怎抵當椒薑之外有丁香三般等分羅為末調入白鹽與白湯水磨烏藥治脾疼每服須教一盞濃一片陳皮一蘇葉再煎溫服有神功心與脾疼有妙方良薑切碎等檳榔兩般同炒研為末米飲同調服亦良胃脘痛俗呼心痛與心痛門參看病機論內經曰木鬱之發民病胃脘當心而痛上支兩脅痛膈噎不通飲食不下蓋木氣被郁發則太過故民病有土敗木賊之候也夫胃為脾之腑陽先於陰故臟未病而腑先病也甚而致於脅下如刀劙之痛已連及於臟矣古方名為脾痛者是也胃之上口名曰賁門賁門與心相連故經所謂胃脘當心而痛今俗呼為心痛者未達此義耳雖曰運氣之勝復未有不由清痰食積鬱於中七情九氣觸於內之所致焉是以清陽不升濁陰不降而肝木之邪得以乘機侵侮而為病矣更原厥初致病之由多因縱恣口腹喜好辛酸酷飲熱酒煎爆復食生冷朝餐暮損日積月深白郁成積自積成痰痰火煎熬血液妄行痰血相雜妨礙升降故胃脘疼痛吞酸噯氣嘈雜噁心膈噎反胃之漸者也俗醫不究其源例以辛香燥熱之劑治之以火濟火遂成危遽良可痛哉脈候脈經曰陽數陰弦則胸痹而痛責其虛也陽虛知在上焦所以胸痹心痛者以其脈弦故也胸之病喘息咳唾胸痹痛知氣寸口脈沉而遲關上小緊而數治法胃脘疼須分新久已見心痛門丹溪曰心痛即胃脘須分新久若明知身犯寒氣口食寒物而病於初得之時當用溫散利藥若病久而成郁矣鬱則成熱惟原病式中備言之矣若欲行溫散溫利寧無助火添病耶又云中宮有食積瘀痰而生病者胃氣亦賴所養卒不可攻盡雖日數多不食不死若痛方止則吃物病必復作而難治也須是愈後再服數劑漸而少食方獲全安胃脘痛初得之者可用子和三法治胃脘當心而痛及頭痛背脹痛之輕者以麻黃桂枝之類微汗發散之或以韭汁開提之重者加石鹼心膈大痛攻走背脅發厥嘔吐諸藥不效者就吐中以鵝翎探之出痰積碗許而痛即止脈實堅大便或痛甚而脈伏皆可以感應丸化滯丸之類下之平日好食熱物以致死血流於胃口而作痛者以桃仁承氣之類下之用溫熱發散藥又用山梔等藥止後復作只用玄明粉一錢白湯調下效無藥處以鹽置刀頭上燒紅淬入水中乘熱飲丸吐痰立愈此法治絞腸痧病大病幾死者神效凡胃脘痛始用攻擊滌蕩疏散之劑愈而復作再三用之隨止隨作或漸甚而脈浮大者此為虛候當量其邪正虛實多寡正氣虛多則多用養正之藥而少佐以除邪或正氣不甚虛當攻養平半用之可也又有純用養正之藥脾氣已得運行而鬱痛遂止藥方東垣木香化滯湯治因憂食濕面結於胃脘腹皮抵痛心下硬微滿不思飲食常常痞氣不安木香白檀香藿香陳皮大腹子白豆蔻白茯苓桔梗各二分砂仁人參青皮檳榔甘草炙薑黃白朮各四分上咀作一服水盞半煎一盞不拘時溫服三因倉卒散治氣自腰腹間空心痛不可忍腹中冰冷自汗如洗手足攣急厥冷梔子大者四十九枚連殼打碎炒焦附子一枚炮去皮臍上為粗末每服二錢煎八分溫服丹溪連附六一湯治胃脘痛甚諸藥不效者寒因熱用方也黃連六錢附子去皮臍一錢上咀水盞半薑三片棗一枚煎一盞熱服東垣麻黃豆蔻丸治客寒犯胃心頭大痛麻黃一錢草豆蔻一錢木香青皮紅花厚朴制各二錢蘇木三分蓽澄茄四分升麻半夏制陳皮砂仁黃耆白朮麥芽柴胡甘草炙吳茱萸當歸身各五分益智仁六分上為細末湯浸蒸餅丸梧桐子大每服五十丸白湯下或細嚼湯送下尤妙草豆蔻丸治客寒犯胃作痛及心痛氣痛或因濕熱鬱結氣滯等痛並效方見脾痛門草豆蔻一味性溫能散滯氣利膈上痰若胃脘果因寒而作痛用之如鼓應桴若濕痰鬱結成痛者服之多效苦因熱鬱而痛者理固不當用此但宜以涼藥監製如芩連梔子之屬其功尤效或用東垣草豆蔻丸寒熱心痛俱獲其功但因熱者不可多服多服恐有積溫成熱之患耳若久病鬱熱已膠固者斷不可用此味也胃中苦有流飲清痰作痛胸中漉漉有聲及手足攻痛或腰膝脊脅抽掣作痛者用小胃丹或三花神佑丸控涎丹漸漸服之能徹去病根即止丹溪白螺丸治痰積白螺螄殼煆滑石蒼朮梔子仁香附子童便浸南星制枳殼炒黃色青皮木香半夏制砂仁各半兩上為末春加川芎夏加黃連秋冬加吳茱萸用生薑汁浸炊餅丸緑豆大每服五十丸玄胡索丸治胃脘死血作痛方見痹痛門河間金鈴子散治熱厥心痛金鈴子玄胡索各一兩為末溫酒調下二錢白水下亦可河間神聖代針散治心腹胃脘刺痛乳香沒藥當歸白芷川芎各半兩蚖青一兩去足炒上為細末每服一字病甚者五分先點好茶一盞次摻藥末在茶上不得吹攪細細呷之心痛欲死者服之立效小腸氣搐角弓膀胱腫硬一切氣刺虛痛並婦人血癖血運血刺痛衝心胎衣不下難産但是一切因血之痛服之神效活人朮附湯治寒厥暴痛脈微氣弱方見心脾痛門治案一男子三十胃脘作痛久矣黃瘦食少而胸中常常如食飽與加味枳朮丸服之不效日漸大痛叫號聲聞四鄰欲自盡與桃仁承氣湯作劑與之連二服大下瘀血四五腕許困倦不能言者三日教以稀粥少食漸漸調理病全安松野匡掌科夫人年三十餘歲病胃脘連胸脅痛日輕夜甚兩寸關脈弦滑且有力其始請醫咸以積滯凝寒用發散及攻下劑皆不效繼用鐵刷散四磨飲等方並莫應及用湯水皆吐而不納經月不食痛益甚豫謂其證為痰鬱明矣但痛久弱甚不敢行吐法奈何偶一醫謂五靈脂沒藥素用有效衆皆哂之此藥前用之多矣豫謂再用之亦無妨何哂之有彼用酒調病者到口便吐隨吐緑痰兩碗許痛即止遂納飲食此蓋痰在膈上攻下之不去必得吐法而後愈經曰有故無殞此之謂歟
