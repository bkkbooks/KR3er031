body:
  text: 卷之七十四痔漏門病機痔漏敘論素問生氣通天論曰因而飽食筋脈橫解腸澼為痔注云飽甚則腸胃橫滿陽胃滿則筋脈解而不屬故腸澼而為痔也痔病之源在此痹論曰飲食自倍腸胃乃傷觀乎此則痔病於飲食太過大腸受傷益信矣醉飽房勞所得巢氏病源云痔有五種曰牡痔日牝痔曰脈痔曰腸痔曰血痔也又有酒痔肛門生瘡或有血出又有氣痔大便難而血出亦有肛出其外良久不肯入者皆由醉飽房勞擾動氣血而經脈流溢滲漏腸間沖發下部名為諸痔久而不愈必變為漏牡痔肛邊發起肉珠如鼠奶時時出膿血者是也牝痔肛邊生瘡腫痛突出如㿔而出血者牝痔也脈痔肛邊生瘡癢而復痛血出淋瀝者脈痔也腸痔肛邊腫核發寒熱往來而血出或肛脫者腸痔也血痔因大便而清血隨出者血痔也酒痔其人酷飲而成每遇飲酒即發腫痛而血流者是也氣痔凡遇憂鬱恐怒立見腫痛或血出是也李東垣曰飽食用力房勞脾胃濕熱之氣下迫大腸至澼裂努出其肉如櫻桃雞心等狀贅於肛門而成痔蓋為病者皆是濕熱風燥四氣所傷而熱為最多也四氣者非六淫之邪乃五臟之氣擾動內發而作成也如飲食勞倦動乎脾憂恐動乎肺恚怒動乎肝諸動屬火故熱多也其腫而後重者濕兼熱也大便結者燥兼熱也久痔成漏仁齊直指云內蘊熱毒醉飽勞役多欲自戕以致氣血下墜結聚肛門宿滯不散而衝突為痔也經云諸痛瘡瘍皆屬於心心主血熱而下迫於大腸所以為痔也諸痔出血肛門別有小竅下血如線不與大便同道痔久不愈必至穿穴瘡口不臺漏無已時此則變而為瘻矣痔漏總為濕熱風燥四氣所成初生肛門成㿔不破者為痔久而破潰膿血黃水浸淫淋瀝不止者曰漏此疾者皆由濕熱風燥四氣相合而致之也蓋因人之縱欲恣飲喜怒無常臟腑抑鬱飲食自倍腸胃乃傷陰陽不和關格壅滯熱毒下注血滲大腸而為腸澼痔漏之患矣腸風下血乃痔漏之源大便下血先哲有糞前糞後遠近之說此一端也大抵此則大腸已受濕熱之傷而但未形外也此其所以為內痔者是也人不知覺悉謂腸風復齊論深得病情可謂詳切著明矣忍精不泄而成痔漏若人醉飽行房精氣脫泄其脈空虛酒熱之毒流著於脈或因醉飽淫極而強忍泄或因用藥固精弗泄停積於脈歸注大腸以致木乘火勢而侮燥金以火就燥則大腸閉而痔漏作矣痔漏有謂肝筋為病靈樞經云足太陽膀胱之脈及筋皆抵腰中入絡腎其支者貫臀足故主筋為病則生此疾由是推之足厥陰之脈環繞前後兩陰故亦能為痔矣每見患痔發則色清痛甚謂筋苦急而然也痔漏病久致有蟲生則為蟲痔直指云痔漏患久歲月積纍淫蝕腸頭濕爛可畏此果何物致然哉蟲是也其間用劑又當為之化蟲不然古方何以謂之蟲痔脈候腸澼下白沫脈沉者生脈浮者死下膿血脈滑大者生脈懸絶則死腸澼脾脈外鼓沉久自已肝脈小緩易治腎脈搏沉身熱則死脈沉小實者易治浮洪而軟弱者難愈治法治痔漏大法以瀉火涼血流濕潤燥為主東垣云痔病皆濕熱風燥四氣為病其腫而後重者濕兼熱也大便結者燥兼熱也腸頭成塊者濕也大痛者風熱也此皆臟氣為病而顯其形也治宜行氣和血瀉火疏風流濕澗燥以調其內淹洗塗敷以治其外腫痛雖定而痔猶存也若不去其根本遇觸即發以枯藥消去其痔而絶其源亦須調飲食戒房勞慎憂怒內觀自養使火不起可保全安否則雖服良藥難復效也不飲酒人痔瘡易治丹溪云痔漏因風濕燥熱歸於大腸金失所養木寡於畏其為變見名狀種種不同曰牛奶曰鼠奶曰雞心曰雞肝曰蓮花曰翻花曰峰窩曰穿腸曰外痔雖名狀不一而其因亦同焉以苦寒瀉火芩連梔子槐花之類以辛溫和血當歸川芎桃仁之類風邪下陷以秦艽荊防升麻之類燥熱鬱怫以枳殼麻仁桃仁大黃之類不飲酒人庶幾易治痔與漏治法不同丹溪云治痔必須治血為主大法用條芩涼大腸人參黃連生地黃槐角子生血涼血當歸和血升麻川芎枳殼寬腸漏瘡須服補藥以生氣血參耆歸術主之外以附子為末作餅子如錢厚以艾灸之隨漏大小令微熱不可令痛干則易之再和再灸如困且止直至肉平為度或用補氣血藥作膏貼之愈痔要戒酒色勞苦經云脈陷為漏留連肉腠先陷血脈次陷肌肉腠理是氣不能榮運遂作死肌經久不愈瘡口不收風寒襲之血脈內膿水漸成鵝管之狀大抵漏瘡多生於肛門之畔始起如豆忽便腫疼長如梅李五六日濃膿而止稍可而不收口過半月或一月復腫而痛潰膿發歇無定後漸膿水不幹終不能愈集驗治法或灸百壯令開或用針開之一日三次藥不耐疼者一日二次敷之取去死肌鵝管令盡次用兔毛松香燒煙薰之艾葉煎湯洗之取香膏貼之生肌散敷之即愈矣須要戒酒勞苦則不復作病深者又不同也用稻草心頂替針丸探入鵝管屈曲處再用火針開之或替針丸咬開次用稻草葉捻紝之取去死肌鵝管路尚未斷又依前法以鵝管死肌去盡為度穿腸者治之亦愈但穿處不能完補耳春甫每用治漏之法無出濕熱之方病機誠如東垣丹溪之論大抵輕淺者瀉火流濕潤燥疏風悉可以愈致於成漏穿腸串臀支分節派中有鵝管年久深遠者卒未可以易窺也雖有三品錠子潰爛生肌亦皆治其近淺之漏耳其深遠者必是永類鈐方掛線治法庶可通達而除根矣豫郡程復齊深得此法之妙誠所謂拔本塞源治無不愈茲並求其方法之詳附録以公天下庶患斯疾者之有拔也復齊治論生氣通天論云因而飽食筋脈橫解腸痔為痔東垣以為飽食用力房勞以致脾胃濕熱氣下迫大腸澼裂又云飽食負重婦人難産小兒痢疾皆苦用力亦致腸澼此實受病之源故澼之淺者則大陽半破濕熱之氣滲歸腸之半表半裡留連下陷結核肛內形如葡萄蓬蓮阻塞穀道臨廁脫肛良久方收名曰翻花若因風熱糞燥便難糞未下而痔先破血出者有之糞以下而痔後破血出者有之此皆內痔所為因糞難易血出不同又何有腸風下血遠近前後之理故澼之深者則大腸全破濕熱之氣滲出腸外留連肉腠橫流肛外結核如櫻桃牛奶雞冠或串陰或串陽為囊癰為懸癰或串臀為臀癰膿水流久內結鵝管珊瑚譬猶山洞之水涓滴日久結為鍾乳鵝管枝幹蕃生瘡孔散出形如蜂窩爛瓜膚殘肌陷久成痼疾此皆外痔所致故痔雖有內外腸澼淺深不同治者不思拔本塞源但見大便結實為燥兼熱瘡腫後重腸頭成塊為濕兼熱大痛為風兼熱蟲蝕為木侮金蓋木先朽而後生蠹腸已澼而毒始流先正立方行氣和血瀉火疏風以調其內又用砒捻紝瘡爛去鵝管死肌以治其外觀此不過治標緩急而已若澼處迫近肛門死肌既去腸頭肉長此幸收功而已澼處幽遠如以杖通陰溝澼處反大是以旁瘡雖愈正孔處迫近不久復作咎歸病人豫患此疾一十七年遍覽群書悉遵古法治療無功幾中砒毒不拘數瘡上用草探一孔引線系腸外墜鉛錘懸取速效衆流俱涸有何汛濫線落日期在瘡遠近或旬日半月出二旬線既過肛如錘脫落以藥生肌百治百中若治內痔則用敷藥不犯砒硇或用藥翻肛或候自脫以藥日敷黃水既干內痔焦黑七八日間黑肉脫去以藥生肌腸收如舊縱有熱毒皆隨糞下後患再無譬如夾洲既去水歸中流何有旁通壅滯之患今因浙衢魯秋泉專門痔漏線裹蛛網每瘡紝砒亦頗收功但其用藥狼虎高索謝資目擊心傷所得方理不敢自私因書膚見系諸方首公之天下永除斯疾云藥方東垣秦艽蒼朮湯治痔核已破謂之痔漏大便祕澀必作大痛此濕熱風燥四氣合而為病故大陽頭成塊者濕也作大痛者風也大便結燥兼受火邪也其西方肺金主氣其體收下亦能助病為邪須當用破氣藥兼之其效如神秦艽桃仁去皮尖另研皂角仁燒存性各一錢蒼朮米泔浸防風七分黃柏酒洗五分當歸尾酒浸澤瀉各三分檳榔二分另研大黃少許雖大便祕澀亦不可多用上件除檳榔皂角仁桃仁三味另研外余藥細切作一服水三盞煎至一盞二分去渣入檳榔等三味末子再上火煎至一盞空心熱服少時以美膳壓之不犯胃氣也服藥日忌生冷硬物及酒面大料椒姜等物若犯之其藥無效有膿者加白葵花頭五朵去萼心青皮五分入正藥中同煎木香三分細末同檳榔末入古人治此病多以歲月待除之惟此藥一服即愈東垣秦艽當歸湯治痔漏大便結燥痛甚大黃煨四錢秦艽枳實各一錢澤瀉當歸尾皂角仁白朮各五分紅花少許桃仁二十枚去皮尖水二盞煎一盞食前服忌如前秦艽羌活湯治痔漏成塊下垂不任其癢秦艽羌活黃耆防風各八分升麻甘草炙麻黃柴胡各五分藁本三分細辛紅花少許上水二盞煎八分服忌風寒房事紅花桃仁湯治因而飽食筋脈橫解腸澼為痔當補北方寫中央黃柏生地黃一錢澤瀉八分蒼朮六分當歸尾漢防己防風梢豬苓各五分麻仁二分紅花少許桃仁十枚上咀作一帖煎服忌同前清心丸治諸痔素問云諸痛瘡瘍皆屬於心心主血熱諸痔受病之源也此藥主之黃連淨一兩茯神去木微赤茯苓各半兩上為末煉蜜丸梧桐子大每服一百丸食前米飲下患痔漏者只吃白米粥疏其腸胃薄滋味為妙清涼飲治諸痔熱證大便祕結當歸赤芍藥甘草炙大黃蒸各等分上咀每服三錢新汲水煎服槐角丸治諸痔及腸風下血脫肛槐角子一兩防風地榆枳殼麩炒當歸黃芩各半兩上為細末酒糊丸梧桐子大每服五十丸空心米飲下雞峰烏金散治痔漏穿山甲刺刺蝟皮黃牛角心豬牙皂角槐子皂角刺枳殼貫衆阿膠各等分再夾和牛角上以蝟皮穿甲同炒另研為末和入一處每服一錢半用胡桃肉研爛調酒食前服漏血不止當歸煎湯調下芎歸丸治痔下血不止川芎當歸神麯炒槐花炒黃耆地榆各半兩荊芥穗亂髮燒存性木賊阿膠各一兩上為細末煉蜜丸梧桐子大每服五十丸食前米飲下濟生蝟皮丸治諸痔漏年高虛弱之人不宜多服豬左懸蹄黃牛角腮蝟皮一個同上燒灰存性防風貫衆槐角子炒鱉甲醋煮枳殼雞冠花槐花炒黃耆雷丸黃連白芷當歸酒浸油發灰玄參各半兩麝香另研五分上為末米糊丸梧桐子大每服百丸空心米飲下危氏黑丸子專治年久痔漏下血用之纍驗乾薑百草霜各一兩木饅頭二兩烏梅敗棕柏葉油發各半兩俱要燒灰存性入後藥桂心三錢白芷半兩上為末醋糊丸梧桐子大空心米飲下三十丸宣明雞冠散治痔漏腸風下血不止雞冠花黃連貫衆川大黃烏梅各一兩甘草七錢半為末每服三錢米飲調日二服乾葛湯治酒痔乾葛枳殼半夏炙生地黃茯苓杏仁黃芩甘草炙各五分上水二盞黑豆百粒姜五片白梅十個煎一盞食前服橘皮湯治氣痔橘皮枳殼炒槐花炒川芎桃仁去皮尖木香檳榔紫蘇香附子甘草炙各一錢上水二盞姜三片棗二枚煎一盞食前服荊枳湯治氣滯發痔荊芥穗枳殼炒槐花紫蘇香附子甘草炙各等分為末每服二錢空心米湯調下逐瘀湯通利大小腸取下惡物凡痔熱證俱用有瘀作痛神效川芎白芷赤芍藥乾地黃枳殼阿膠茯苓五靈脂莪朮茯神木通甘草生各三錢桃仁去皮尖炒大黃各錢半上作二服每服水二盞姜三片蜜三匙煎一盞食前服利為度寬腸丸治內外痔枳殼黃連百藥煎各等分上為細末水糊丸梧桐子大每服三十丸食前米飲下椿皮丸治痔漏下血疼痛東行椿根白皮不拘多少上為細末醋糊丸梧桐子大每服七十丸空心米飲下樗皮丸治痔漏下血及膿不止臭樗皮微炒酸石榴皮黃連阿膠炒各一兩艾葉三分微炒如前丸服直指收痔丸治諸痔通用好阿膠炒黃連貫衆各半兩尺長皂角去弦醋炙蝟皮炙焦蜂房炒焦蛇皮略燒皂角刺略燒穿山甲微火燒令焦當歸川芎槐花豬後蹄垂甲燒存性用各二錢半上醋糊丸梧桐子大每服七十丸空心荊芥湯下皂角刺丸治痔痛而復癢皂角刺二兩燒存性防風槐花各七錢半蛇床子白礬枯白蒺藜炒去刺槐角子各三錢羌活各半兩蜂房炒焦五倍子各五分枳殼炒上為末醋調緑豆粉煮糊為丸如梧桐子大每服五十丸空心以苦楝根煎湯下仍用熱童便入白礬末澆洗肛門代赭石丸治痔變瘻膿血不止代赭石煅醋淬研磁石煅煮米醋數沸淬七次研白礬枯牡蠣灰龍骨研蝟皮炙焦皂角刺炒焦豬後蹄垂甲燒各存性為末赤石脂川椒焙木賊焙蜂房炒各等分上細末神麯糊丸小豆大每服五十丸空心艾湯下地黃丸治五痔滋陰必用之藥地黃酒蒸一兩半槐花炒黃柏炒杜仲炒白芷各一兩山藥山茱萸肉獨活各八錢澤瀉牡丹皮各六錢茯苓七錢黃耆一兩半白附子二錢上末煉蜜丸梧桐子大每服五十丸空心米飲下祕方無比丸治一切痔漏象牙屑血竭各半兩沒藥乳香明雄黃另研明硃砂各三錢二分蜂房炒蟬蛻牙皂莢去皮弦各三錢上為末用好黃蠟二兩溶化布濾淨再入酒內煮化冷定取起蠟化開和前藥急手為丸如梧桐子大每服空心熱酒浸一錢五分嚼下本酒吞送七日全效東谷孫尚書方南京戶部傳制驗治痔漏有效明硃砂明雄黃各另妍上二味再合乳極細聽用川皮硝淨一斤犍豬大腸頭二尺去油淨洗以皮硝一斤盡裝入腸內兩頭縛定入甑蒸熟取出連腸埋土地中一七日取起去腸將硝收貯淨瓷瓶中每服用硝七分半雄砂二分半共一錢再搗勻熱酒沖空心服之七日全愈三因五灰散治五種痔瘡不問內外並宜服之鱉甲治牝痔蝟皮治牡痔蜂房治脈痔蟬蛻治氣痔豬左足懸蹄治腸痔各等分上各燒存性隨證倍用一分為末空心臨臥酒調二錢服豬臟丸治痔漏下血豬臟頭一條長二尺許洗淨控干槐花炒為末裝入腸內兩頭線縛定砂鍋醋煮爛慢火煮上共搗爛丸梧桐子大每服五十丸空心當歸酒下薰洗諸方心統茄柯湯洗痔極效茄柯槐花各用陳者尤佳冬瓜皮枳殼各等分上煎湯先薰後洗卻敷後項藥愈敷藥外痔收如蓮實鼠奶疼痛之甚掃上即止真熊膽不拘多少以新水調成漿雞翎掃之經驗方薰痔最效韭菜不拘多少先薰熱湯以盆盛湯在內盆上用器具蓋之留一竅卻以韭菜投於湯中泡之以穀道坐竅之令熱氣薰之候溫用韭洗瘡不數次腫消血止祕方全蠍五十枚燒煙置瓶中薰痔頃時痛癢立止又方萆麻子連殼天南星防風各半兩為粗末瓶內燒煙薰聖惠蓮房枳殼湯洗痔極效干蓮房荊芥各一兩枳殼薄荷朴硝各半兩上為粗末水三碗煎二碗半熱薰洗又方東瓜皮煎湯洗效直指方五倍子燒煙如前法置盆桶中坐薰患處自然收縮或用倍子一兩打碎煎湯二碗熱薰洗亦效一方治痔痛不可忍以枸杞根杵爛煎湯薰洗痛立止一方用槐花艾葉荊芥枳殼水煎入白礬末打勻薰洗一方用木鱉子七枚明礬二錢煎水薰洗一方用藩籬草根煎湯薰洗其花開稍似芙蓉一方用馬齒莧煎湯薰洗若肛門腫甚者加皮硝尤效良方薰洗法諸痔流血皆效槐花半兩蓮房一個荊芥三錢五倍子半兩地榆半兩為末每用半兩水二碗煎入明礬三錢如法薰洗側柏葉湯薰洗諸痔側柏葉一兩槐枝一握鏡面草蚵蚾草各一把黃連黃芩荊芥蛇床子各一兩上作四次新汲水煎放桶中如法薰洗七物湯薰痔效皂莢三錠銼艾一把鱉甲一枚銼干蝦蟆一個銼草烏二枚雄黃半兩麝香五分上末拌勻穿地上一穴置炭火在內上用蓋密惟留一孔旋入藥末一撮在上薰蔥青散治痔漏用蔥青內刮涎對停入蜜調先以木鱉子煎湯薰洗然後敷藥其冷如水唐仲舉云嘗有一吏人苦此渠族弟親合與之早飯前敷午後來謝於庭下云疾已安神效散洗痔凡富貴之人多因嗜欲飲酒過度喜怒不常致生痔漏或如鼠奶連珠或肛門腸腫流膿漏血其痛如割不可忍者但是諸腫痔漏及腸風下血此藥治之無有不效苦參川椒苦葫蘆芫荽子槐花枳殼荊芥金銀花白芷連翹獨活小茴香麻黃牡蠣煅威靈仙椿樹皮各二兩上咀每用半兩水五碗蔥白三莖煎五七沸去渣以盆盛之坐上薰洗甚效一方加老黃茄子二個尤妙復齊葉線治法治外痔並漏囊癰懸癰臀癰芫花入土根不拘多少搗自然汁於銅銚內慢火熬成膏以生絲線入膏再熬良久膏濃為度線陰乾膏留後用一治外痔有頭者以藥線系之候痔焦黑落下再用綿裹豬鬃蘸藥當納於竅中永不發一漏並三癰不論瘡孔數十但擇近肛者以馬蓮草探之若一孔通腸者先將銀條曲轉探入穀道鉤出草頭將線六七寸一頭挽成活套扣以不挽線頭系草上引過大腸解線頭穿活扣內出寸長系三錢四五分鉛錘懸空墜之坐臥方便使不黏衣可取速效每日早將線洗淨約日長五分仍要收上止留一寸線穿七日線下三寸之餘僻處補完源頭既塞未穿漏孔及三癰膿水再無鵝管化盡俱先平復瘡近肛十日半月線過肛門即下瘡隔遠者二十日後即落若七日及落線後旁瘡有未乾此原腸澼非止一口仍要再穿若穿不動者以紙捻蘸代針散頂至痛即曲折處三二次通即穿線其線落下再用生肌散生肌散龍骨一兩火煅訶子炮取肉二錢上為細末加輕粉三錢和勻先洗瘡拭乾敷上日二次銀鉤套式馬蓮草即北方刷鍋刷帚也敷藥治內痔並因痔腫脫肛豬胰半斤將大雄雞一隻籠餓一日移淨地以胰子喂之取糞曬乾四兩之上為末晉礬朴硝各一兩千葉雌黃雄黃各六錢緑膽礬半兩上各為末以寬砂鍋盛之先下雞屎一兩次下晉礬一兩次雌黃次硝次雄再加晉礬雞屎以新瓦蓋鍋瓦上簇火以青煙去盡為度冷定取出加乳香沒藥各半兩為極細末或用脫肛散脫出肛門或候自脫將藥少許吐津調和以新筆蘸敷瘡上患者側臥縮一腳恁瘡流去黃水日上五次夜上二次逐次水洗拭乾方可上藥至三日後瘡已焦黑頻用防風荊芥連翹苦參倍子煎湯洗之黑肉既落上前生肌散瘡去平復腸收神效此方不用砒硇不作便閉常用以治內痔之聖藥也復齊脫肛散磁石軍姜各一錢枯礬五分上為極細末以蔥涎調以綿絮蘸塞肛內其瘡自翻出瘡既愈後內須服補中益氣之劑六味丸八味丸敷塗諸藥心統消痔千金散搽大便諸痔腫疼不已孩兒茶五分冰片半分熊膽二分甘草三分赤石脂黃連各三分寒水石五分硼砂一分上為細末豬膽汁調搽或入膽內以竹管內以線縛口緊插入肛門內捽之自然痔病愈半夏散治痔初生急以此藥治之半夏生搗末先以生薑自然汁洗肛門後以半夏末泡湯洗之不過三五日自愈龍腦散治痔漏熱痛鯽魚一枚破開去腸雜入穀精草填滿用麻皮縛定以泥固糠火煅存性上為細末入龍腦少許蜜調敷之熊膽膏治痔極效熊膽五分冰片一分上細研井花水調雞翎掃痔上水銀棗子膏治蟲痔癢痛不止水銀一兩棗肉二兩上和研水銀不見星捻如棗核狀薄綿片里內肛門中明日蟲出若痛加韶粉三分丸內之豬膽膏治痔豬膽七枚取汁用粗碗盛炭火熬成膏以單紙攤敷先用槐根白皮煎湯洗痔後敷藥拔毒散敷痔腫痛大黃黃柏白芨石膏黃芩黃連白蘞梔子朴硝為末以井水調塗患處蝸牛膏敷痔極效蝸牛一枚負殼有角者冰片麝香各少許上同研末以瓷器盛次早取汁敷痔上水澄膏凡枯痔必用此護肉白芨鬱金各等分為細末以湯洗痔淨側臥用新水和蜜盞內調勻卻入藥末調敷肛門四邊好肉上留痔頭在外用紙蓋藥仍用筆蘸水塗紙令常潤卻用枯藥枯葉方明礬四兩白砒二錢半硃砂一錢研上各研先用砒末安在鍋內底次用明礬末蓋砒上用火煅令煙盡其砒盡隨煙去止借砒氣在白礬中取出為細末先看痔瘡大小多少將礬末抄在掌心上加硃砂末少許以唾津調勻用篦子點塗痔上周通令遍日三次上須是看痔頭顏色欲其轉焦黑色乃取落之漸至夜有黃水流出以多為妙此乃惡毒水切勿他疑次日看痔頭有縮一半若更止藥一二日為好若年高人因外腎牽引疼痛可用人以手火烘熱於大小便尉之其痛自定如換時用新瓦器盛新水或溫湯在痔邊以筆頭醮水或輕輕刷洗舊藥去卻上新藥仍用護藥直至痔頭焦枯方可住也次用洗藥集成護肛膏白莖石膏煅黃連各等分為末上以雞子清調如膏搽上剪油紙如月樣圈痔護四旁好肉一次洗一次換藥翻痔藥治內痔必先以翻痔藥取出腸頭方可用枯藥草烏不拘多少為末津調敷肛門內其痔即翻出金寶膏漏瘡用之能去腐肉而不傷良肉桑柴灰五碗用沸湯十碗淋汁用草紙一層皮紙二層放箕底次放灰上面淋洗穿山甲二兩信一錢另研杏仁去皮七枚同末研塗穿山甲辰砂一字粉霜一錢半上將灰汁澄清下鍋煎滾下甲末候煎乾一半下麝次下粉霜干及九分下辰砂候成膏下石灰以成塊為則密罐收勿見風三品錠子去十八種痔漏其效如神方見外科理例下危氏五灰膏治臟腑一切蘊毒發為痔瘡不問遠年近日形似雞冠梅核牛乳或內或外並皆治之此方親傳之劉叔茂纍試極驗蕎麥灰半鬥許荊柴老杉枝山白竹雜硬柴各截二尺長劈成片各取一束曬乾火燒成炭置密壇內自死上炭以水煮取炭汁又用酒漏以布帛實其竅置蕎灰於酒漏內以炭汁淋之然後取汁於鍋內慢火熬約有一小碗候冷入石灰國丹調成膏以瓷罐貯之上用石灰敷之勿令泄氣臨用時去石灰以冷水調開令病人洗淨痔瘡仰臥搭起一足先以濕紙於瘡四圍貼護卻用竹篦挑藥塗痔上須臾痛息用紙揩去藥再塗如此三四次要痔瘡如墨樣黑方止以水洗淨每日常置冷水一盆以蔥湯和之日洗三五次六七日後膿穢出盡其瘡自消祕方玉紅散治諸痔硇砂二兩先燒在鍋內次用明礬放硇上火煅枯以煙盡為度用礬為末明礬二兩硃砂四錢另研上為極細末敷痔干用津調貼濕干敷上辰砂膏瓜蒂為末三錢密陀僧二錢另研硃砂五分冰片少許上為末干以唾調敷代針膏枳殼二錢大者去穰巴豆半兩去皮上將巴豆裝在枳殼內合縛定放罐內醋煮乾將二味曬乾研末用絲綿蘸濕展藥敷瘡上及根底痔去再不可用只用生肌散如頑漏日久以津調敷瘡口敗肉自去易簡諸方濟衆方治痔瘡如蟲齒以刺蝟皮燒末以香油和敷之又方治痔血不瘥以刺蝟皮為末空心米飲調下方寸匕一方治五痔下血不止用杏仁去皮尖水一升研濾汁煎減半投米煮粥溫空心食之一方治腸痔大便常血赤小豆一升苦酒五升煮豆熟出干復內酒中候酒盡為末酒調方寸匕日三服聖惠方治翻花痔用馬齒莧一斤燒灰細研豬脂調敷一方用乾木瓜為末鱔魚身上涎調敷以紙搭之一方用枇杷葉蜜塗炙燥為末烏梅肉焙燥為末和勻先以痔洗淨次以藥敷之肘後方治漏用蜂房炒令黃為細末每用一錢臘月豬油調敷瘡上千金方治痔用臘月牛血脾一具煮熟食瘳忌鹽醬未瘳再食一方治五痔五月五日採蒼耳葉陰乾為末空心米飲調服方寸匕一方治痔漏膿血不止棕櫚花曬乾為末空心米飲調下三錢食醫心鏡治痔瘻瘡鴛鴦一隻煮熟細切以五味鹽醋調和食之或空心和羹食尤妙一方治雞冠痔下血用嫩槐葉一斤蒸如茶法研末空心調下二錢一方用鯉魚膾和姜虀煮汁食忌冷物又方用鯽魚作羹食一方用羊蹄根葉一碗爛蒸油鹽調食之一方治五痔不以年月久新用枳殼為末煉蜜丸梧桐子大空心米飲下二十丸一方用河邊水漂楊柳根上赤須不以多少煎湯洗極效一方用大甘草八寸以長流水一碗蘸炙盡一碗水乾為度銼酒水各一盞煎一盞空心溫服一方用蒼耳子焙乾為末空心蜜湯調下二錢一方治痔漏用蒼朮地榆各二兩皂角去皮弦一兩為末水糊丸梧桐子大每服五六十丸空心細嚼糟姜溫酒送下經驗方治痔瘻有頭芫花入土根洗淨木臼搗少以水和絞汁於銅銚內慢火熬成膏將絲線於膏內渡過系痔系時微痛候心躁痔落時以紙捻入膏藥於竅內永除根一方治痔漏凡患此者常食棐子妙一方用豆豉槐花炒等分為末水煎一碗服或作丸子服亦好一方用鳳眼草赤皮蔥花椒搗碎漿水煎滾置盆中令熱氣薰痔溫時洗不過數次愈一方用黑白牽牛共一合炒黃為末豬肉四兩切細炒熟與末拌勻只一次服盡白米飲半碗會壓之下白蟲為效一方治痔或癢或痛用甘草白芷荊芥槐花煎湯薰洗養生導引法氣血下墜衝突馬痔既不能坐又不能行立惟導引之法可愈矣一法高枕偃臥心氣氣定其腫自收一法兩手抱足頭不動足向口受氣衆節氣散來去三七欲得捉左右側身各急挽腰不動去四肢腰上下氣血凝滯髓內冷血冷筋急痔漏腫痛一法兩足相蹈向陰端急蹙將兩手捧膝頭兩向極勢捧之二七竟身側兩向取勢二七前後努腰七去心勞痔病一法踞坐合兩膝張兩足不息兩通治五痔一法一足蹈地一足屈膝兩手抱犢鼻下急挽向身極勢左右換易四七去痔五勞三里氣不下灸法命門一穴在脊中與臍相對灸七壯治五種痔漏長強一穴在尾骶上隨年壯灸之治五痔便血最效一灸法治痔疾大如胡瓜貫於腸頭發則僵仆以荊芥湯洗之次以艾灸其上三五壯若覺一道熱氣入腸中大瀉鮮紅血穢一時許痛甚後其疾乃愈一治痔初起痛癢不止以舊布鞋底烘熱頻頻尉之痛癢處冷則再烘尉其癢立止脫肛候病機丹溪云屬氣虛與熱子和云此大腸熱甚或用潤瀉及用力過多認兒叫呼並丸藥大下及久痢努出腸頭故致脫肛之病也治各有方不可執一肺與大腸為表裡故肺經蘊熱則肛門閉結肺經虛寒則肛門脫出久則下陷而滑脫也治法內經曰下者舉之滑者澀之此治脫肛之意也故丹溪每治此證以人參黃耆芎歸升麻之類以升之補之以五倍子訶子之類以澀之未有不愈者藥方東垣補中益氣湯治久久瀉痢及産後氣虛下脫而肛出者方見內傷門釣腸湯治腸脫風寒虛滑方見痔門集成釣腸丸治脫肛白朮黃連甘草白芍藥桔梗人參白茯苓各等分上為末醋糊丸梧桐子大每服五十丸空心米飲下三因蝟皮散治肛門脫出或因洞瀉用力太過蝟皮一個燒存性磁石煅各一兩桂心半兩上末每服二錢空心米飲下肘後方加鱉頭一枚燒灰入香荊散治大人小兒脫肛不收香附子荊芥穗各等分上為末每用三五錢水二碗煎五七沸熱淋洗一方用五倍子末三錢明礬末二錢水二碗煎沸熱洗立收一方治脫肛出三五寸者先用倍礬湯洗過次用赤石脂為細末以油紙托上四圍皆摻之妙百一紫蕺膏治臟熱肛門脫出紫背蕺一大把一名魚腥草搗如泥先用朴硝水洗次用此藥坐肛門下一方用槐花槐角等分為末以豬膘去皮蘸藥炙而食之三因聖散子治脫肛不收用浮萍草為細末干敷上易簡諸方道藏經治脫肛用烏龍尾即梁上倒掛塵同鼠糞為末燒煙於桶內令患人坐上薰之數次即愈一方用龍骨木賊灰二味和勻為末托上一方用桑葉桃葉煎湯入礬末洗之愈頂心上以萆麻搗膏貼之再不下脫聖惠方治脫肛用虎骨燒為末湯調方寸匕日三服一方用蓮蓬殼一對橡碗二十個搗碎煎水數沸入朴硝熱淋洗乘閒方名黑聖散治脫肛疼痛用大蜘蛛一個瓠葉重裹線系定盒子內燒令黑色存性取出細研入黃丹少許同研每用蔥椒湯入礬煎洗淨拭乾後將末藥摻軟帛上托入妙一方用石灰炒熱以帛包裹令患人坐其上冷即易之集驗方治脫肛年久不愈以生鐵二斤水一斗煮取五升去鐵以汁洗之日再洗灸法長弦穴炙三壯愈臍中隨年灸百會一穴在頂中灸三壯治小兒脫肛
