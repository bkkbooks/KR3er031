body:
  text: 卷之十七濕證門病機內經敘論經曰諸濕腫滿皆屬脾土又曰濕熱傷脾諸頸項強皆屬於濕因於濕首如裹濕熱不攘大筋緛短小筋弛長緛短為拘弛長為痿因於氣為腫四維相代陽氣乃竭風寒濕三氣雜至合而為痹又曰地之濕氣感則害人皮膚筋脈濕盛則濡泄濕氣甚者為著痹聲如從室中言此中氣之濕也原病式曰諸徑強直積飲痞膈中滿下體重胕腫肉如泥而按之不起皆屬於濕要略曰太陽病關節疼痛而煩脈沉細者此名中濕亦曰濕痹其候小便不利大便反快當利其小便一身盡痛發熱日晡所劇者此名風濕此病傷於汗出當風或久傷冷所致也風濕脈浮身重汗出惡風風濕相搏身體疼煩不能轉側不嘔不渴脈浮虛而澀風濕相搏骨節疼煩掣痛不能屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫也濕家之為病一身盡痛發熱身色如熏黃也濕家病身疼發熱面黃而喘頭痛鼻塞其脈大自能飲食腹中和病在頭中寒濕故鼻塞納藥鼻中即愈濕病多為脾虛所致陳無擇云脾虛多病濕內因酒面積多過飲湯液停滯膩物燒炙膏粱過度氣熱熏蒸濁液不行湧溢於中此濕從內作外因坐臥濕地霧露陰雨所客澡浴為風所關涉水為濕所郁鬱於表腠則發黃故經云地之濕氣感則害人皮膚筋脈此濕從外生可見內外所感皆由脾氣虛弱而濕邪乘而襲之故曰壯者氣行則愈怯者著而為病濕證要分表裡上下四證濕邪自外而感者為表邪鬱熱故發寒熱身如熏黃皮膚著痹清濕襲虛而上為頭痛鼻塞而煩入骨節為重痛足趺浮腫脈浮緩濕邪由內作者為里結滯故霍亂吐利重則發痙強直輕則痞膈中滿怠惰嗜臥沉重無力流濫關節則煩痛注於經絡屈伸不得氣不能統則發腫肉如泥按之不起其脈多沉經曰因於濕首如裹聲如從室中言濕熱不已熏蒸於上則頭重目黃而鼻塞也故東垣云濕淫所勝助風以平之為濕邪之襲於上者也經曰傷於濕者下先受之故足胕腫而膝重無力以行腿腳麻痹腰腿為之不利也又曰腰重如帶五千錢皆濕邪之著於下者也脈候脈經曰沉而緩沉而細微緩者皆中濕脈浮為風濕浮而緩濕在表也沉而緩濕在裡也脈沉細遲微為寒濕為濕痹脈滑疾身熱煩喘胸滿口燥發黃者為濕熱洪而緩者皆濕熱自甚而痛也治法治濕以理脾清熱分利小便為主經云諸濕腫滿皆屬脾土濕病本不自生因脾熱內虛怫鬱不能宣行故停滯而生濕也況脾氣虛弱之人易於感冒豈但水不流而後為濕故人只知風寒之威嚴不知暑濕之炎暄感人於冥冥之中也故治濕之法宜理脾清熱利小便為上故曰治濕不利小便非其治也經曰濕淫於內以苦燥之以淡泄之宜桂苓甘露木香葶藶木通治之又云葶藶木香散下神芎丸下水濕消腫脹理脾胃無出乎此也治濕不宜太汗及熱藥經曰因於濕首如裹又云濕熱不攘此蓋濕鬱為熱故身體疼痛而煩肢節強直而腫或脈浮者名曰風濕當微微發汗使風濕俱從汗出若大發汗則風去而濕尚存兩脛逆冷胸腹滿頭目痛多汗妄言脈陽濡弱陰急小是名濕溫因傷濕而復傷暑也濕熱相搏而成此疾不可發汗汗則必不能言及耳聾不知痛癢乃是重暍濕證雖有寒熱然濕熱證多濕寒證少故不宜驟用薑附大熱之藥戴人論濕證而以濕熱為原風寒為兼深得內經之旨也丹溪亦云六氣之中濕熱為病十居八九濕證不可作中風治有脾胃素弱內蓄痰飲外冒風露相搏上衝心胸令人涎潮壅塞口眼喎斜半身不遂昏不知人與中風相似但脈沉澀或沉而細不可作中風治謂其脾土好乾惡濕而被濕熱相干則有是疾若作中風治之脾元愈虛痰濕愈甚必致危篤因證裁方濕從外入者宜汗散濕在上者亦宜汗散濕從中起者宜疏利二便分輕重用之在下者宜淡滲以利小便腹脹腳腫甚者舟車丸下之濕熱內深發黃茵陳湯下之或佐以防己黃耆一身盡腫痛或無汗是濕流關節邪氣在表宜五苓散加桂蒼朮微汗之不可大汗若自汗出多熱燥津液少內水不利切勿利之重損津液也宜防風白朮甘草湯主之濕鬱者越曲丸主之肥人多濕二陳湯加酒炒黃芩羌活散風行濕最妙蒼朮治濕為必用之藥上下部皆可用身如被杖濕傷熱血分也局方用燥劑為散濕鬱也濕得燥則豁然而收燥濕宜羌活勝濕湯平胃散濕勝氣實者宜神佑丸舟車丸虛者桑白皮茯苓人參葶藶木香白朮之類去濕與熱須用黃芩梔子為主下焦濕腫及痛膀胱有火邪者酒防己黃柏知母梔子草龍膽蒼朮之類濕病外不熱內不渴小便自利者朮附湯主之濕病脈緩弱昏迷腫痛身重自汗失音下痢不禁用白虎湯蔥白乾薑附子白朮肥白人沉困怠情者多虛宜參耆二朮二陳厚朴之類黑瘦人多熱宜芩連白朮茵陳濕氣勝者為著痹詳見風痹門濕盛則濡泄見瀉泄門濕注生痰見痰飲門濕為痰瘧見瘧門濕鬱為疸證見疸門濕熱成痿見痿門濕為腳氣見腳氣門藥方通治濕劑二術四苓湯治諸濕腫滿一身盡痛發熱煩悶二便不利白朮蒼朮茯苓豬苓澤瀉黃芩羌活芍藥梔子仁甘草各等分水三盞姜三片燈心一撮煎服金匱防己黃耆湯治風濕脈浮身重汗出惡風或痛防己黃耆各二錢白朮一錢半甘草五分上水二盞姜三片棗二枚煎八分胃氣不和加芍藥喘加麻黃上水沖加桂枝下寒加細辛除濕湯治中濕身體重著腰腿痠疼大便溏小便或澀或利半夏曲蒼朮厚朴茯苓各錢半陳皮七分藿香炙甘草各五分上水二盞姜七片棗二枚煎八分食遠服大橘皮湯濕熱內甚心腹脹滿水瀉小便不利橘皮五分木香磨汁滑石二錢檳榔五分茯苓豬苓澤瀉白朮各二錢官桂甘草各三分水二盞姜三片煎八分食前服平胃散治脾胃不和濕氣停滯蒼朮厚朴陳皮各等分甘草減半上為末每服二錢清利諸劑局方五苓散治濕邪鬱滯小便不利豬苓澤瀉白朮茯苓各一錢肉桂上為末湯調服茵陳五苓散治濕熱發黃本方加茵陳一倍煎元戎加味五苓散治濕熱身痛葶藶木香散葶藶一兩木香五錢茯苓豬苓澤瀉白朮各五錢木通三錢滑石二兩桂枝甘草各三錢上為細末每服三錢白湯調下宣明桂苓甘露飲治濕熱內甚煩渴瀉利小便澀大便急霍亂吐下頭痛口乾方見暑門東垣清燥湯治濕熱太甚肺金受邪寒水生化之源絶則腎虧痿厥之證作腰以下痿弱不能行走或踝膝皆腫口乾瀉利方見痿證門表散升上劑羌活勝濕湯治脊痛項強腰如折項如拔上衝頭痛此足太陽經不行此藥主之羌活獨活各錢藁本防風各錢半荊子川芎炙甘草各四分上水二盞煎八分食後溫服麻黃白朮湯治濕勝身煩痛麻黃二錢白朮桂枝各一錢杏仁七枚炙甘草五分水煎服金匱減桂加薏苡名麻黃杏仁薏苡湯局方五積散治濕外傷或冒風寒郁為濕熱身體重痛方見中寒門東垣升陽除濕湯治感濕作瀉小便不利身有有升陽除濕防風湯治風濕相搏一分痛二方並見瀉泄門除風濕羌活湯治同前羌活五分防風升麻柴胡藁本蒼朮各一錢水二盞煎服越曲丸治濕鬱方見郁門溫散諸劑金匱桂枝附子湯治風濕相搏身痛不能轉側煩而不渴不嘔脈虛浮而澀桂枝生薑各二錢附子一錢甘草炙錢半上水煎服小便自利去桂加白朮服後其人如冒狀勿驚怪和劑滲濕湯治坐臥濕地雨露所襲身重腳弱關節疼痛發熱惡寒小便不利大便溏紲人參白朮茯苓甘草附子炮乾薑炮桂枝芍藥等分上水二盞姜三片棗一枚煎八分不拘時服羌附湯治風濕相搏身微腫手足掣痛不能屈伸羌活附子炮白朮甘草等分上水煎不拘時服生附湯治受濕腰痛附子生乾薑厚朴白朮蒼朮酒浸茯苓各一錢牛膝杜仲制各錢半炙甘草五分水二盞姜三片棗一枚煎八分食遠服疏里攻下劑神佑丸方見痰飲門治濕鬱喘悶二便祕澀舟車丸治諸濕腫滿導水丸二方並見水腫門子和濬川散治濕痰留注二便不利身腫氣高大黃煨郁李仁各二兩芒硝甘遂各半兩黑醜取頭末四兩上為末薑湯調下五分空心臨臥服易簡諸方白朮酒治中風口噤不知人白朮一兩酒二盞煎一盞服不飲酒者水煎搐鼻法治傷濕鼻塞煩痛黃腫瓜蒂一味為末口含水吹一字入鼻中鼻流出黃水效一方治一切風濕痹四肢拘攣疼痛用蒼耳子去刺為末三兩水二盞半煮二盞去渣呷服無時一方治風濕用樟木皮屑煎水洗效一方白檳榔為末每服一錢蜜湯調下日三服一方治濕入腎經腰痛不能伸以鮮五加皮同三白草根搗爛煎酒空心服三次而愈一方治濕熱小便不利茵陳蒿同木通煎服一方治濕煮赤小豆食一日禁飲食服豆與湯即通利而濕去一方治寒濕氣疼痛不已用薑汁半碗米醋一盞水膠四兩熬成稠入肉桂末花椒末皂角末各二兩攪成膏以絹攤貼患處附身重證病機內經曰肝虛腎虛脾虛皆令體重煩冤運氣身重一曰濕制腎虛而重又云太陽所至為身重又云太陰之從體重中滿又云歲土太過濕氣流行民病體重煩冤又云土鬱之發民病身重是也二曰濕熱少陽司天之政四之氣炎暑間化民病滿身重是也三曰寒濕太陰司天之政三之氣感於寒濕民病身重是也四曰風木製脾虛而腫歲木太過風氣流行民病體重煩冤又歲土不及風乃大行民病體重煩冤又云厥陰在泉風淫所勝病身體皆重是也五曰金燥肝虛而重歲金太過燥氣流行民病體重煩冤是也治法治身重除濕為本仲景云夏月中風濕身重如山不能轉側宜除風勝濕去熱之藥治之又云風濕脈浮身重汗出惡風者防己黃耆湯主之又云腎著之病其人身體重腹中冷如在水中形如冰狀反側不得小便自行飲食如故病屬下焦身勞汗出衣里冷濕久始得之腰以下如帶五千錢甘姜苓朮湯主之東垣云身重者濕也補中益氣湯加去桂五苓散主之夜臥不能謂之濕身重是也小柴胡湯黃耆芍藥湯主之藥方東垣參朮湯治脾腎虛弱元氣不能充暢四肢沉重食後昏悶黃耆一錢人參炙甘草陳皮青皮各五分當歸酒黃柏升麻柴胡各三分神麯七分上水二盞燈心十根棗一枚煎八分食前熱服甘姜苓朮湯治腎冷濕腰重不能起甘草乾薑各五錢白朮茯苓各一兩上咀以水五盞煎至三盞作三服防己黃耆湯小柴胡湯黃耆芍藥湯並見傷寒門局方五積散治濕盛身重方見濕門針灸法經云脾病者身重肉痿取其經太陰陽明少陰血者又云脾病者身重寢汗出憎風取其經少陽太陰血者盜汗也
