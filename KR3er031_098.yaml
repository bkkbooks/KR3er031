body:
  text: 卷之九十八通用諸方藥品類第一醫如制敵之將藥如退敵之兵醫之用藥猶將之用兵也善制勝者煉兵於平時善養生者蓄藥於未病故曰治不忘亂安不忘危有備無患此之謂也孟子曰七年之病求三年之艾苟為不蓄終身不得韓昌黎曰玉札丹砂青芝赤箭牛溲馬勃敗鼓之皮俱收並蓄待用無遺者醫師之良也凡人之有生也內犯七情外觸六氣雖大聖大賢不能必其無病故神農氏嘗藥品以療之為醫流者固當並蓄而無遺也君子有志養生者不可不知藥之性而蓄焉收焉以應倉卒之索亦濟利之一端也盈天地間無物而非藥亦無適而非醫故藥者非徒泥藥之為藥亦非徒泥於市肆而求之家園玩植花卉菜果莫不為之藥焉素問曰靜則神全史記曰若言藥也即起居言語莫不為之藥焉予故圖花葯園亭及集仁道雜著之類以輔醫統庶為一隅之舉而有見於醫藥之佐者又所以卻病養生則無適而非醫藥隨在而各充其用也園亭玩適則有花卉之藥也飢飽適宜則有飲食之藥也嗜欲中節則有起居之藥也寒溫通所則有衣服之藥也至論清談則有言語之藥也人事交接則有雜著之藥也春甫之所以集附十篇亦未必無小補云爾花葯園記今世士大夫人家多植花卉其中雜植藥品倉卒可以救人何其方便如葵花可以催生止痢菊花可以明目清心罌粟可以止瀉寧嗽芙蓉可以消毒潰堅諸如此類不可勝紀凡園中與花卉並植一則可以清玩次則可以捐疴急救博施惠而不費濟人利物不亦仁乎春甫記紫蘇與莧菜同時下子一畦兩傍沿邊可撒蘇子中間盡撒菜子菜出而蘇亦長糞菜則及其蘇盛長時連根收之每莖作一束如欲收子先剪取葉仍留莖帶子收治病凡遇外感風寒以紫蘇葉一味煎湯熱服二碗則周身通快孕婦腹痛用莖葉各半煎湯服一盞即止萱花一名宜男花一名忘憂草其草嚴冬用稻草覆其根則來春易發春上分栽葉可煮食婦人懷孕二三個月內宜置萱花於絳囊佩身左則生男故曰宜男治病以其根磨醋服立止心痛嫩葉可作菜食利胸膈消痞悶玉簪花栽植之時亦如萱花治病其根搗汁吞入喉治骨哽吞時不可沾牙沾牙即落葵花正月下子糞土蓋二寸厚五月開花收之十月收子開黃花其葉有叉者為蜀葵隔年八九月種子次年易長便開花正月種者當年不能開花治病其花赤者治赤痢白者治白痢蜀葵能催生無花時取子一合半生半炒研末酒調服立產經水不通者服之亦通菊花夏間分栽不宜太密密則花頭小宜栽黃白二種可入藥秋後開花者尤佳家庭中植之甚有逸趣且兆吉祥以其晚節凌霜之操非群花之可得而斑也種菊花有六要一要向陽遮護冰雪冬養其根春苗乃茁二要高其畦寬其溝歲易其地加新土去舊土三要治其苗用小竹扦立其傍以草寬縛之其莖不曲法云未種菊先扦竹四要培乾土於久雨防爛其根五要削榜枝以植正干六要朝灌清水沃其根而後用糞澆培以厚本治病明目清心之要藥用干菊花築枕大能聰明耳目芙蓉花與菊同時分植葉盛時從下剪逐漸收之治病其葉鮮搗敷金瘡腫毒即時消散外科鐵箍散用之為君罌粟花一名亞芙蓉九月九日或中秋夜種之花必大子必滿種訖以竹帚掃之花乃千瓣兩手重疊撒種則重疊開花治病粟子或殼作散或入湯用止久瀉久嗽其效如神百合花春取根大者擘瓣五寸地一科種之先掘深五六寸著雞糞一層次加土然後以瓣安土上蓋之二三月鋤之灌清糞逾二年如盞大煮熟食之補人紅花者名山丹不堪食治病其根擘破用沸湯中炸過曬乾收貯入藥能補肺止嗽治肺癰咳吐膿血百部最宜多種取其汗浣衣自然潔白勝用皂角鹼水之類仍不生蝨子為佳治病用竹刀劈開去皮心砂鍋煮爛淡食之治嗽順氣清肺火空心食之補腎殺蛔蟲草決明北方名望江南春取子畦中種上糞下水葉生時可食明目花陰乾亦可食至秋成嫩莢點荼食尤妙古詩云雨中百草秋爛死階下決明顏色鮮治病決明子微炒研細入藥明目止淚除昏退翳必用之藥小茴香宜廣種其性清香烹飪用之良治病凡下部氣痛腰疼冷氣痛並宜服之川芎宜多種葉名蘼蕪清香可愛川芎煎茶飲之清頭目去頭風治病詳見本草蘄艾宜多種五月五日收之梁間經年久者尤良治病煎湯洗諸風濕熱瘡毒灸火必用之澤蘭葉一名醒頭香春分種多用水濯近澤畔尤發生葉可食頭髮熾結有此草可解故名醒頭香治病產後惡血凝滯不行者用莖葉煎酒服即通瘀血且痛止氣和藥方中多用之市肆中鮮有真者虎掌草石砌花盆栽之有生意葉厚如錢形如虎掌蔓延若虎鬚窗草石栽於庭能避百邪治病小兒口乾舌盡搗爛以帛裹揩之愈慎火草俗名掛壁青用盆栽置房屋上能避火故名慎火四季長青可愛治病將莖葉爛搗敷火丹亦遊火疹極效地膚草一名鐵掃帚此草一種一干而百枝葉細而青俊可玩秋後結子名地膚子霜後葉調枝梗可為掃帚故名鐵掃帚治病採嫩枝葉搗汁空心飲之治血淋無葉用子煎湯服孕婦子淋小便不通用地膚草一味最效蓮花一名荷花春取藕梢頭插積泥池中至夏便發荷葉若種蓮子卒難長生且不成藕五六月初開花蕊名曰菡萏其花心收之名曰佛座須周濂溪愛蓮說云出淤泥而不染濯清漣而不妖中通外直不蔓不枝香遠益清亭亭淨直此所謂蓮花之君子者也大夫之庭不可無之治病其葉鮮搗煎湯止吐血四生丸枳朮丸皆用其葉花心大能澀精補腎荷葉收乾者燒灰存性止諸失血十灰散中用之千瓣石榴花家庭植之最宜供玩有明目之祥五月五日戴之一歲無暗目之病治病其花瓣塞鼻中止衄紫威花類萱花其花上有黑點子不可去之收其花陰乾入藥治病花能治婦人經水不通雞冠花秋後收子春間種與莧菜子同時撒搗如立而撒子則高株始開花若坐而撒子則低株矮如扇或女人裙撒子亦如之以手撒子花細如指子名青葙子白者入藥治病子能明目花用煎湯洗痔最效石菖蒲用石泉及天雨水不可用河水井水如無油膩塵垢不必易水夜移露天旦則收之不可見日曬自然青久鮮明此草生於山澗石溜之間並不見日歌云上品九節通仙靈此物舜廊當共登人家有此亦清氣不俗又能避邪治病根陰乾通心竅令人不忘聰明耳目利諸郁讀書人用之日記千言芸草本草名蕓薹書多名芸香北京甚奇之名香菜貴人餚饌雜少許取其清香莖葉類醒頭香古人用以收書不生蠹魚今人鮮用之故書篋中每為蠹魚之害治病連根搗爛敷乳癰最效又敷風火丹毒破產後血積癥瘕枸杞取其根連莖銼之四寸許束如羹碗大以草索束之每畦分作四五行如韭畦掘坑深七八寸令寬可容束中安糞及土每坑相去三寸糞畢下束豎立種之別和糞土壅之與坑平然後灌水不久自生大科生葉甚肥嫩其葉如剪韭法滾水炸油鹽拌食作菜能明目清心子名枸杞子生甘肅州者大補精髓南方生者其味苦辛止去濕熱而已滋補少功根名地骨皮治病見本草白扁豆清明前取水浸豆將發芽下土種之白者良煮食止瀉理胃其花煎湯服解宿酲其莢半嫩摘下以線穿過通風處陰乾勿日曬其色不改冬月煮熟如鮮治病詳見本草黃精土名野生薑擇葉參差者為真劈破長二寸許種之過一年後極稠子亦得取根淨洗用砂鍋煮熟曬乾仍蒸過才不麻辣九蒸九曬者尤妙作果食之甘美治病補精髓滋陰補腎黑髭發美顏容久服輕身延年商陸取根白者切如棗大帶皮肥地種之其大如瓠蒸熟食之佳治病其根爛搗洗澄粉收之空心蜜水調服利水止瀉止淋消腫地黃三月初種宜沙軟地取根斷寸許種畦中上糞下水一年後滿畦摘去傍葉糞土壅之若取根種肥士蓋二三寸厚仍用經冬爛穰草覆之候芽出以火燒其草令燒去其苗再生者葉盛而根大自春至秋五六耘之勿鋤八九月收根春不用再種有餘根明年自發但耨耘而已生薑亦如地黃種法二三月取小塊有芽種畦中一尺許闊畦溝要深尺許出苗時要搭日蓬遮蓋怕日怕水傍根既生可以取出母姜秋後又收其新者薯蕷取根白色上有如米白粒者預收作種掘大坑下鋪磚磚上填沙沙上加糞土四傍高尺許以子種之搭架以引其蔓一年可掘取用治病見本草牛膝秋取其子至春如種菜法宜濕肥地水糞灌之苗生可食剪苗了即上糞根入藥秋成先收其子後鋤其根治病取根生搗酒煎服破血下胎產後瘀血治喉痹乳蛾用鮮汁入明礬末少許漱喉吐痰而愈收藥為濟人之先務凡物之至賤為人之所遺棄者尚有愈疾之大功為醫者不可不察也果食之而棄其子核如橘橄荔枝椒子之屬是也菜食之而棄其皮根如茄薑東瓜瓜蒂之屬是也物之至賤人不著意收留過時用之遍處需求而不可得若非平昔收藏者何有哉君子擴而充之則不可勝用也蔥須曬乾用煎湯發汗治時行感冒頭痛納酸酒缸中可止酸回甘茄根八九月收通風處陰乾治風濕腳氣煎湯洗之及洗一切瘡疥史國公浸酒方中用之絲瓜蒂食瓜時切近蒂三寸留之用線穿掛通風處為末酒調方寸匕與小兒服之稀痘子干為末酒調治疝氣痛乾柿蒂用線掛留之能止咳逆燒灰存性酒調服藕節鮮者搗汁止吐血曬乾收用入煎藥或燒灰存性酒調服止血枇杷葉粗布拭去毛線穿風乾乾大疏脾經滯氣或入煎藥或為散皆可石榴皮收酸者陰乾為末對明礬末調水服五七分止心痛瀉痢染須方中多用之核桃皮日乾為末用染須鬢止瀉橘核曬乾收能治七疝去濕溫腎氣荔枝核燒灰存性酒調服治心氣痛疝氣皆可服橄欖核燒灰存性酒調服治心痛羊脛骨大能堅牙白齒燒灰存性擦牙生薑皮曬乾收溫而不熱大能理脾和氣五脾散中用之今醫不收無則舍之所以五皮散之功緩矣葫蘆蔓經霜後收通風處陰乾歲除夜煎湯浴兒出痘稀疏果驗東瓜皮曬乾收煎湯洗足及陰囊濕腫子穰曬乾收之能利皮膚水腫甜瓜子干為末酒調治心疼及疝氣痛蓮房陰乾燒灰存性能止血及血崩方中多用之澡絲湯用淨瓷罐盛之埋土地中二尺許可逾數年消渴證止服一杯少頃又進不數杯而渴止吳茱萸年久者愈佳寒腹痛煎熱湯服一盞立止吞酸藥中加之速效茶葉十餘年者尤妙能解百毒或煎吃或為末滾水調服洗瘡斂口花椒子利水定喘下氣為末米湯調下五七分花木類第二牡丹花爾雅云牡丹為花中之王色備五彩冬至夜撥開根腳下土取水缸中石衣壅之再加肥土則盛芍藥花爾雅云芍藥為花中之佐春上分栽則根大傍根少者其莖大而花盛花白根白花紅根赤瑞香花用浣衣灰汁澆去蚯蚓或以漆渣壅根撏雞鵝水澆之皆盛長此花惡濕畏日不可露根海棠花垂絲者為上品冬至日以糟水灌其根則來歲花茂茉莉花以雞糞壅之則盛又將撏雞毛並湯沃之冬至放暖房不見風煙則不死此物畏寒喜日一云不可安床頭引蜈蚣石榴取其直枝大如拇指長尺許栽土中出枝頭二寸水澆之即生有叢生者傍枝攀倒地以土壓之來年生根截分另栽又云截枝用火燒二寸插入土即生河陰石榴名三十八者其中只有三十六粒子銀杏雌者二稜雄者三稜合種乃生臨池而種照影亦能結實此樹不花而果人謂頃刻開花不能得見又云夜間開花一開便結似理可信枇杷尋常以淋過灰湯淡濕灰壅之根頭花多實大柑橘十月將橘樹有枝柯者埋土中尺深以枝幹在外不可倒置待來春芽長傍掘坑澆糞水至十二月內橘根四圍澆大糞三次至春用水澆二次花實俱茂梅宜多栽池邊溪逕壠頭牆角有水坑處則多實梅樹接桃則脆移大梅去其枝梢大其根盤沃以溝泥無不活者梅花初放時收之陰乾治小兒痘疹不出不起者泡湯與之速出速起臘梅花嗅之令人生鼻痔桃八九月桃熟時牆角頭寬深作坑先將濕牛糞內坑中上加土取好核淨洗尖頭向下厚土蓋尺許春深生芽和泥移栽肥土接杏李尤妙桃為五行之精能闢百鬼謂之仙木桃花漬酒服益顏色除百病桃實太繁則多墜以刀橫斫其干數下乃止社日令人舂桃樹下則結實牢不墜凡果皆然女子豔妝種之他日花豔色而桃離核李杏李宜稀可南北行杏勿密宜近人家者盛桃三年便結實五年盛七年衰十年死至六年以刀砍其皮令膠流出可多活五年桃樹接李枝則桃紅而甘柿樹接桃則為金桃李樹接桃枝則為桃李梨春分日將梨條作拐樣斫下兩頭以火燒又燒紅鐵烙烙定津脈栽之入地二尺只春分一日可栽桑樹接梨枝則脆而甘葡萄最易蔓盛宜濕地米泔澆之作架引蔓根傍以草束雄避蛇蟲怕麝香一法種近棗樹春鑽棗樹作一孔引葡萄枝從孔中過伺其大塞滿棗樹核成一家即砍去其後截使托棗生實大而甘美花椒以帶目未開口者用碎土拌和入淨瓶中密封口倒置地上於南檐有日色處曬著至春初撒畦中則粒粒皆出桑椹熟時揀取魯桑葉大椹稀者栽之白桑葉大而無子蠶食之繭厚絲堅而喑常取枝壓熟地著糞如種菜法作畦種之高一尺糞一次逾年當高四五尺春初移之根下著糞至秋又掘根下著糞以土培之又云撒子種桑不若壓條而分根莖過千日不宜鋤園先椹而後葉者葉必少椹熟食之黑髭鬢根皮浸水洗目良槐人家庭院門徑並宜栽之修剪圓齊不數年長盛如蓋夏月綠陰可愛滿院清芬其花未開者收之染黃色結實名槐角霜後收之入藥又云槐為虛星之精能致百祥人服之長生方見修真門竹正月中砍取西南引根並莖芟去梢葉於園中東北角栽之要深二尺不宜多澆水多水則淹死勿令風搖動當年生芽則踐殺之次年稍大又踐殺之後年則成竹矣又云種竹無時但連陰種之皆活竹性愛向西南歌云種竹無時雨過便移多留宿土記取南枝竹多年則生米而死初見一根生米則截去止留利地三尺通去節灌入大糞則余竹不生米也花木之異凡花木雖自生成造化之妙亦存乎人耳如苦楝樹上接梅枝則花開如墨名曰墨梅黃白二菊各去其半乾而合之則花開黃白相半蓮萌投淨甕中經年移種則發花碧色芙蓉先一夕以靛水調以紙蘸花蕊上用只裹之來日開花亦成碧色張約齊種花果法注云春分和氣盡接不得夏至陰氣盛種不得立春正月中旬宜接木樨櫻桃黃薔薇正月下旬宜接桃梅杏李半枝紅臘梅梨棗慄柿楊柳紫薔薇二月上旬可接橙橘以上種接於十二月間沃以糞穰至春花果自然結實立秋後可接林檎川海棠寒球黃海棠以上接法並要按時將頭與木身皮對皮骨對骨用麻皮扎縛緊緊上用箬葉寬覆之如萌出稍長即取去箬葉無有不茂也催花法凡花用馬糞浸水澆之則速開治花避麝法凡花果俱忌麝香衣香諸香之氣宜栽蒜韭可以避之有觸香則奄弱急用雄黃和艾葉於上風燒之即解江南花園中近門處栽避麝草則不犯種果法凡種果宜望前上旬日種則多子果實凡經數次接者則果大而核小但其核不可種柿樹接及三次則全無核凡種果須候肉爛和核種之否則不類其種鑿果樹納鍾乳粉少許則果多且美又樹老以鍾乳末泥於根上揭去皮抹之復茂盛治果不結實諸果實茂盛不結實者元日五更或除夜以斧砍之即結實一云辰日將斧砍果樹結子不落治果生蟲法凡百果樹生蟲其蟲孔用杉木作釘釘之即絕又法元旦雞鳴時以火把燃照果樹上下則不生蟲種穀倍生法用麻姑十分炭灰二十分硫黃一分為末和勻栽秧時以根蘸點些微入土成日倍收種菱法八九月收老黑子撒池中自生凡種水果只以牛糞大忌桐油若將桐油瓶罐投池中即水果絕死收藏果物法栗子經霜後取老栗子用水泛去浮者沉者撈出日曬乾令全無水氣以新壇先入炒過涼沙將慄裝入一層沙一層慄約九分滿以沙蓋上用箬一層蓋之竹片十字按定掃淨地覆壇口於地上以黃土封之逐漸取用不得近酒可留至夏又法連外刺皮曬乾置淨缸中覆淨地不壞栗子與橄欖同食作梅花香榛子子瓜仁之類以燈芯碎剪雜和盛瓷器罐中安燥處不熾榧子以舊茶甕盛之不壞新榧子以豬油炒過則黑皮不著肉瓜茄取茶房淋過灰曬乾以瓜茄埋其中至冬加新東瓜置芥菜子中不壞石榴連枝摘下用新瓦罐安排在內用紙十餘重密封之又法取未裂者以米泔煮沸炸過數枚逐枚排籃中勿用相挨掛當風處可經夏紅棗以大缸一隻洗淨拭乾燒熟米醋潑缸內蕩令勻拭乾用熟香油擦缸口於缸底鋪粟杆一層下棗一層中心四圍亦以杆蓋密但凡生乾棗曬乾須於甑中略炊蓋棗蟲在內炊之則死然後又曬乾貯新壇久留生棗侵晨摘入瓷壇中逐層蓋竹枝葉裝八分滿用古錢數文白礬少許新汲水浸平密封壇口懸之井中可留經年如同鮮者諸般青果用十二月收貯淨壇中下臘水入些小銅青末密封久留青色不變凡有青梅枇杷林檎葡萄小棗橄欖菱芡橙瓜李柰之類皆收如此橄欖用錫盒收擇充好收滿紙封其縫置淨地上至五六月不損梨取不空心大蘿蔔揀不損大梨以柄插入紙包放暖處春深不壞帶枝柑橘收同法鮮筍未出土者取日曬去濕水勿去殼逐個切去老根蠟封之置新缸中以根向上煮秈米稀粥飲漉去米糝每鬥米粥入炒鹽半兩枯礬末三錢和勻澆浸令滿溶蓋面以油紙厚箬封之石灰塗放淨燥不見日處至秋冬取出如新鮮茄擇肥美者亭午摘不去蒂溶蠟蘸蒂去處先於密籃中用箬藉底厚鋪灰二層灰上放茄茄上放灰層層放滿用箬蓋面以油只厚箬封之石灰塗置淨燥處至冬如新乾荔枝以新瓷壇貯每放一層用白鹽以箬包如粽三五個置其中密封壇口至交新不蛀壞陳荔枝膠棗淨洗焙乾蒸之荔枝幹變者用針於殼上刺十餘孔然後以蜜水浸之銀器盛於湯罐頭上蒸透即肉滿桃取未大熟者用小麥磨碎連麩煮粥入鹽少許候冷傾入新缸以桃內中密封缸口至冬如新桃李杏用生大竹鑿一孔以鮮果投入不可傷破皮以木塞孔泥封之久留不壞林檎每百顆內取十顆椎碎入水煎候冷內缸中浸滿為度密封缸口久留佳柑橘橙鋪干棕或干松毛間疊包裹置不近酒處不壞又法藏綠豆中不近酒米亦不壞又法置銀錫器中以麻油浸之佳又用橘葉層層相間收之入土壅之久不壞干柑橘久留其中乾者以針刺十許孔取沸湯化蜜候冷浸一宿如新金橘藏於綠豆中經年不變梨蘋柑橘等果取大缸實以井水和泥撒綠豆於上用竹篦安缸內空泥二寸以果安篦上密蓋缸口封之豆芽長果經年如新紅林未熟者以冷鹽湯浸之可經周年江茶用硫黃小塊安在中間則不蒸亦不藥氣小麥曬乾簸了入缸中或桶櫃以乾蓼蓋密不生蛾松子仁之屬油熾者攤竹紙上焙之還好榧子陳者水浸一宿以烈火烘皮皆貼殼食之如新蜜煎果經酸者置器埋於濕沙中則味自正西瓜要懸高處收之不壞若當掃帚風則壞東瓜亦然西瓜吃時欲冷以指甲掐破打開曬日中少時則安陰處其冷如水炒栗子銀杏不爆炒時拳一枚在手中則不爆勿令人知又法炒栗子只以一枚咬破蘸香汕同眾慄入鍋炒之皆不爆天時類第三天積陽而成天以覆萬物至公無私故聖人以天地為心人能積得純陽則成天仙與之俱久而能飛昇以其類相從也聖人畏天命勿怨天敬天者存順天者昌天高十萬八千里或曰何以知之爾雅云大鵬每飛當天之半又云大鵬一飛九萬里以是知之天門開人見之主大發達天門即天之華至秋最清而精華髮現清夜見之不久遂散皆氣之為也如朝暮之霞襲日之於光皆氣之變化也豈能久乎日月日為陽精月為陰精久視之令人損目西山記云對日月溺令人損壽勿指日以為誓勿對月而貪淫皆能損壽小兒勿指月指月則兩耳後生瘡名月食瘡不可指螮蝀詩曰螮蝀在東莫之敢指日暈主雨月暈主風星辰露下視星辰令人損目又云勿唾星夜觀星象認取北斗中一星則一生無眼疾鬥中有四星名天理星不甚明明則天下昌昧則亂俗云識大人星不病瘧星光閃不定主有風風雨大雨大風不可出日必閉戶夜必興衣服冠而坐孔子云遇暴風雷兩雖夜必興云云所以敬天之怒也感應篇云不可呵風罵雨中藏經云當風取涼冒雨而行成疾千金要方云凡在家及在外行卒逢飄風暴雨皆是龍神所過宜趨避之梅雨本草云梅雨水洗瘡疥滅瘢入醬令易熱沾衣便腐以梅葉湯洗之則脫霧露博物志云昔三人冒霧行一人飲酒一人食粥一人不飲食其後飲酒者無恙食粥者病不飲食者死本草云旦行大霧中宜飲酒以避邪也千金方云陰霧之中不可遠行凡重霧三日必有大雨雨未降不可冒霧行百花頭上露水令人好顏色柏葉上露主明目百草頭秋露水主明目治百病令人輕身不飢肌膚悅澤凌霜花上露水能損人目繁露是秋露繁濃時也用瓷盤以收之石蜜調食久服延年不飢淨瓶封固埋地中年久者愈佳可以止消渴霜雪本草云冬霜寒無毒能解傷寒鼻塞酒後諸熱面赤者大雪中行人不可便以熱湯濯足及飲熱酒足指隨墮臘月雪以淨瓶貯之埋地中五六月取以止渴消解酒熱一云臘月雪水調寒食麵為糊裱背書畫不生蠹雹正醬味本草云醬味不正當時取一二升內醬甕中即還本味雷除蚤蝨風俗通云雷初鳴打床薦則除蚤蝨雷不蓋醬俗云食之令人腹中雷鳴雷鳴勿仰臥雪雷雪中有雷主陰雨百日夜雷東州人云一夜起雷三日雨言雷自夜起必連日陰雨南北雹雨諺云南閃千年北閃眼前言南閃無雨北閃便雨魚鱗云諺云滿天大片魚鱗障日出曬殺老和尚又云云行東車馬通此春云無雨也烏雲接日諺云烏雲接日明日不如今日又云日落云漫不雨定寒又云日落云里走雨在半夜後以上皆正雨此言一朵烏雲潮謂之風潮古人名之曰颶風言其具四方之風故曰颶風有此風必有霖淫大雨同作甚則拔木偃禾壞房屋決堤堰其先必有如斷虹之狀者見名曰颶母航海人見此別又名破帆風五更雨雨打五更日中必晴晏雨不晴最驗快雨諺云快雨快晴道德經云飄風不終朝驟雨不終日雨釘一點雨似個釘落到明朝也不晴一點雨似個波下到明朝未得了晴霞朝霞暮霞無水煎茶主旱言久晴之霞也雨霞朝霞不出市暮霞走千里此言雨後之霞也月令攝養正月元日平旦吞鹽豆豉七粒終歲不誤食蠅子元日用自己小便洗腋氣即除有效小赤豆煎元旦以赤小豆煮熟入蜜和汁空心舉家食之一年無疾元日用嫩槐枝七寸紫蘇一束入酒煎一家旦起各飲一杯則一年無患正月甲子拔白令髭鬢不白二月丁亥日取桃杏花陰乾為末戊子日和井花水服方寸匕療婦人無子大驗飲社酒開聾社詩云為寄治聾酒一杯二月庚寅日勿食魚大惡千金方二月八日黃昏時沐浴令人輕健是日拔白髮為神仙良日二月上寅日取土泥蠶屋宜蠶二旦二日取枸杞菜煎湯沐浴令人光澤不癢不老三月三月三日取桃花末收之至七月取烏雞血和塗面光白潤色如玉三月二日取桃葉曬乾為末治心痛每服一錢酒調下三月十三日拔白髮永不再生交清明節時取井水淨器貯制眼藥大能明目寒食日以細袋盛面掛當風處中暑者以井水調一錢許服謂之寒食麵三月三日收苦楝花或葉鋪席下避蚤蝨四月四月七日沐令人大富八日取枸杞苗煮湯沐浴令人光澤不老九日日沒時沐浴令人長命四月勿食雞肉勿食生韭四月十六日拔白即生黑髮五月五月五日午時採百草嫩苗搗汁和石灰作餅陰乾收貯凡遇金瘡跌打取末敷之而愈是日以熨斗乘火燒棗子一二枚於床下避蚊是日午時用硃砂寫茶字倒貼門枋避蛇蠍是日午時望太陽書白字倒貼柱腳上四處則無蠅子又法書儀方二字倒貼是日收葵子炒為本治淋疾每服一錢調酒下是日日未出時採東向桃枝作三寸置衣領中令人不忘是日取明礬一塊自早曬至晚收之凡百蟲所齧敷之即愈五日午時採艾治百病五日收鱉爪著衣領中令人不忘午日作赤靈符著心前主避五兵二十五日宜拔白五月戊辰日用豬頭祭社令人百事通泰六月六月六日取青梅葉搗末用井水瓷盆曬之干貯瓷瓶注水洗目是日齊戒沐浴絕其營俗是日勿動土六月七日八日二十一日浴令人去疾穰災六日可以飲烏梅漿止渴其造梅漿法用烏梅肉搗以沙蜜浸之內湯調飲十九日拔白永不生二十四日老子拔白日七月七月七日取烏雞血和三月三日桃花塗面瑩白如玉是日取赤小豆男吞一七粒女吞二七粒畢歲無疾是日曬衣無蟲曬書無蠹七日採守宮陰乾合以井花水和塗女身有文章以丹塗之不去者不淫去者有奸七夕日取烏雞點血塗手面如玉敷身上亦然三日以溫湯浴之七夕夜取螢火蟲二七枚拈發自黑七夕日取蜘蛛一枚著衣領中令人不忘二十五日浴令人長壽二十八日拔白終身不白八月七日沐令人聰明十日以朱貼小兒頭上名曰天灸以厭疾也辰日可施錢一文倍利八月勿食生蒜神不安可食韭並食露葵勿食生果令人多瘡八月十九日拔白永不生九月九日採菊花釀酒甚香且治頭風明目九日佩茱萸飲菊花酒令人長壽九日收枸杞浸酒飲之不老發不白兼去風疾二十日宜齋戒沐浴大吉十六日老子拔白日十月並不得入房以避純陰用事十月初一日宜沐浴吉十日宜拔白十三日老子拔白日十四日取枸杞煎湯沐浴令人光澤不病不老十八日雞鳴時沐浴令人長壽上巳日採槐子服之槐為虛星之精去百病通神明十一月冬至日寅時宜起坐面東受生氣七日咽入丹田令人長壽十日十一日拔白永不生白髮十一日取枸杞煎湯沐浴令人光澤不老十六日沐浴吉冬至日於北壁下厚鋪草臥受元氣至日勿多事多言一陽方生不可大用至後第三戌為臘臘前番雪謂之臘前三白大宜菜麥諺云若要麥見三白又云臘雪是被春雪是鬼又云臘雪殺蝗蟲一寸雪入土一尺一尺雪入土一丈十二月二日宜沐浴吉臘月打芝麻油收之久留不壞點燈明目作膏有效婦人抹頭黑髮而潤且不熾不生蝨垢除夜焚安息香拜蒼朮來歲無疫七日拔白永不生白髮十五日沐浴去災二十四日床底點燈謂之照虛耗十二月癸丑日造門賊不敢來除夜以花椒三七粒投井中除瘟疫臘後遇除日取鼠頭燒灰於子時土地埋之永無耗臘月好合藥餌經久不餲臘月收青魚膽陰乾如患喉痹及骨哽以膽少許含咽津下即愈歲暮日閤家各人拔髮一根投井中咒曰敕使某閤家清眷一年不患傷寒瘟疫除夜收家中所不用藥焚庭中以避疫氣除夜宜積薪於庭中焚之避邪而助陽氣除夜於神前及各房中皆明燈達旦主家宅光明除夜默於富家田內取補灶主招財除夜五更取麻子赤小豆各二十七粒投井中終歲不遭疫病除夜戒怒罵奴婢及家人並破損器物仍不可大醉除夜宜安靜為吉諺云除夜犬不吠新年無瘟癘四時調攝四時陰陽者萬物之根本也所以聖人春夏養陽秋冬養陰與萬物浮沉於生長之門朝不可虛暮不可實朔不可哭晦不可歌春夏之交陰雨早濕不可引飲過多令人風濕自汗體重夏以後迄秋分須慎肥膩餅炙油酥之屬此物與酒漿瓜果極相妨所以食麵犯之者有霍亂吐瀉及卒死之患年寒雖近火不可令火氣太過受熱不已令人損血五心熱躁冬時天地閉藏不宜作勞及汗泄冬至後有九九氣候人所通知立春定在六九頭夏至後亦有九九氣候人所鮮知諺云一九二九扇子弗離手三九二十七冰水甘如蜜四九三十六出汗如出浴五九四十五頭戴秋葉舞六九五十四乘涼不入寺七九六十三上床尋被單八九七十二思量蓋夾被九九八十一家家打炭罊月候解禮記春蠢也物蠢生乃動運立春正月節立者建也九十日之氣往者過而來者續故謂之立立夏立秋立冬同雨水正月中天一生水人物之生皆始於水春屬木木生於水立春後繼以雨水然驚蟄二月節夏小正曰正月啟蟄言始發蟄也萬物出乎震震為雷故曰驚蟄春分二月中分者半也九十日之半故謂之分秋分同清明三月節按國語四時有八風歷獨指清明風為三月節此風寓異故也萬物齊乎巽巽曰潔齊清明乃取明濕之義也穀雨三月中自雨水后土膏則動今又雨其谷於水也如雨我公田遂且我私之雨蓋谷以此時播種自上而下也今讀為上聲非也正月日在營室昏參中旦尾中律中太簇日月會於娵訾之次東風解凍凍結於冬遇春風而淅解也蟄蟲始振振動也藏於密者咸振起而動魚陟負冰陟升也潛於深者咸躍而上升獺祭魚祭魚者祭之於天知報本也漁者因以為取魚之候候雁北雁以北方為居自北而南則為之來自南而北則謂之去草木萌動天地之氣交而為泰故草木萌生發動於其時二月日在奎昏狐中旦建星中律中夾鍾日月會於降婁之次桃始華桃果名也花色紅是月始開也倉庚鳴庚與鶊同黃鸝也所謂有鳴倉庚也鷹化為鳩鳩布穀也化者反歸舊形之謂凡言化者同生育氣盛故鷙鳥感之而變化也玄鳥至燕也至以陽中也雷乃發聲始雷陰陽相搏為雷激陽為電三月日在胃昏七星中旦牽牛中律中姑洗日月會於大梁之次桐始華桐木名花色白是月開花田鼠化為鴽鴽鸇鶉之屬鼠陰類鴽陽類蓋陰為陽所化虹始見虹陽氣之動也虹攻也純陽攻陰之氣也一名螮蝀萍始生藻也無根浮水而生陰物浮以承陽者也鳴鳩拂其羽鳩即鷹所化者拂羽而飛以冀拍身氣使之然也戴勝降於桑一名戴鵀頭上有勝此時恆在桑言降者重之若自天而下亦氣候使之然也夏假也物假火乃宣乎立夏解見立春小滿四月中四月乾之初謂之滿者豕初羸謂其小今躅謂其滿易言於一陰既生之後歷言於一陰方萌之初慮之深防之豫也故有小滿無大滿芒種五月節芒音亡種上聲謂之種有芒者黍也今讀芒為忙種去聲非矣夏至五月中陽極之至陰氣始至日北至日長之至日影短至故曰夏至小暑六月節陰極生陽乃為暑小者未至於極大暑六月中大者炎蒸之極也四月日在畢昏翼中旦婺女中律中仲呂日月會於實沉之次螻蟈鳴蛙屬陰而伏者乘陽而鳴也蚯蚓出一名曲蟺陰而屈者乘陽而伸也王瓜生菜名也亦感火之色而生本草作菝葜謂之瓜者以根之似也亦可釀酒苦菜秀蔬菜之屬味苦一名荼感火之味而生糜草死草之枝葉糜細者類陰遇陽盛則死麥秋至秋者百穀成熟之期此時雖夏於麥則秋故云五月日在東井昏亢中旦危中律中蕤賓日月會於鶉首之次螳螂生一名蚚父一名未為陰類也感陰而生鵙始鳴即博勞也亦陰類感微陰而鳴反舌無聲百舌鳥其鳴也感陽中而發故感微陰而無聲鹿角解陽類也感陰生而角脫蜩始鳴蜩蟬也感陰氣而先鳴半夏生藥名居夏之半而生六月日在柳昏火中旦奎中律中林中日月會於鶉火之次溫風至至極也其風溫厚之極蟋蟀在壁一名促織生於土中此時羽翼狥未能遠飛但居其穴壁鷹始摯摯折傷也殺氣未肅而摯猛之鳥已習於擊迎殺氣之微也腐草為螢一名丹良一名丹鳥離門之極故幽類化為明類不言化不再複本形之謂後凡言為同土潤溽暑大雨時行濕濕也土之氣潤故蒸鬱而為濕暑大雨亦以之而時行秋揫也物揫斂而成熟立秋七月節解見立春處暑七月中處止也謂暑氣將於此時止也白露八月秋屬金金色白白者露之色而氣始寒也秋分八月中解見春分寒露九月節寒者露之氣先白而寒因有漸也霜降九月中氣肅而霜降陰始凝也周語曰駟見而隕霜七月日在冀昏建星中旦畢中律中夷則日月會於鶉尾之次涼風至溫變而涼氣始肅也周語曰火見而清風戒寒白露降陰乘陽而其候交矣寒蟬鳴物之生於暑者其聲變矣鷹乃祭鳥鷹欲食鳥之時先殺鳥而不食似人之食而祭先代為食之人也於是可設罻羅矣天地始肅秋者陰之始故曰天地始肅不可以嬴禾乃登禾者谷連藁秸之總名又稻秣瓜粱之屬皆禾也成熟曰登八月日在角昏牽牛中旦觜觿中律中南呂日月會於壽星之次鴻雁來鴻雁之大者自北而來南也不謂之來南非其居也玄鳥歸燕至以陽中歸以陰中也群鳥養羞羞者所養之食養羞者藏之以備冬月之養也雷始收聲雷八月天地百八十日入則萬物入蟄蟲坯戶壞益其蟄穴之戶使通明處稍小至寒甚乃墐塞之水始涸涸干也秋冬氣返故涸也周語天根見而水涸九月日在房昏虛中旦柳中律中無射日月會於大火之次鴻雁來賓雁以中秋先至者為主季秋後至為實雀入水化為蛤雀鳥名蛤蚌屬飛物化為潛物也菊有黃華菊花名一名曰精草木皆華於陽獨菊花於陰故物言有桃桐之華皆不言色獨菊言色者其色正夜陰之盛故也豺乃祭獸豺狼屬祭獸者祭之於天知報本也獵者因取以為獵獸之候草木黃落色黃而搖落也蟄蟲咸俯咸皆也俯垂頭也冬終也物終藏乃可稱立冬十月節解見立春小雪十月中雨下而為寒氣所薄故凝而為雪小者未盛之辭大雪十一月節大者已盛之辭由小至大固有漸也冬至十一月中陰極之至陽氣始至日南至日短之至日影長至故曰冬至小寒十二月節陽極生陰乃為寒小者未至於極也大寒十二月節大者栗烈之極也十月日在尾昏危中旦七星中律中應鐘日月會於析木之次水始冰水面初凝未至於堅地始凍土氣凝寒未至於坼雉入水為蜃雉野雞蜃蛟屬此亦飛物化潛物也虹藏不見陰陽極故虹伏虹非有質而曰藏亦言其氣下伏耳天氣上升地氣下降閉塞而成冬天地辨而各正其位不交則不通不通則閉塞而時之所以為冬者亦天地之氣閉塞而成之耳十一月日在鬥昏東壁中旦軫中律中黃鐘日月會於星紀之次鶡鴠不鳴鶡鴠夜鳴求旦之鳥感微陽之生而不鳴以得所求故也虎始交虎陰物感陽之生而交荔挺生香卓感陽方長而出蚯蚓結結屈也微陽雖生而形猶未解糜角解麋陰類也感陽生而角脫水泉動陽生而動言枯涸者漸滋而發動也十二月日在婺女昏婁中旦氐中律中大呂日月會於玄枵之次雁北鄉鄉音向順陽而復也鵲始巢喜鵲一名乾鵲善為巢是月鴽之春乃成雉雊雊鳴也雉火畜也感於陽而後有聲雞乳育也雞木畜也麗於陽而後有形徵鳥厲疾鷹隼之屬以其善擊故曰徵厲疾也水澤腹堅腹無內也徹上徹下皆凝故曰腹堅俗節歷所不載者附後社曰清明臘八解見前元日正月為端月一日為上日又曰正旦一名天臘人日正月初七日曰人日上元正月十五日元宵正月十五夜中和節二月朔花朝二月十五日春序正中百花競放故名上巳古者以三月上巳日修禊巳祉也拔除邪疾以祈介祉魏以後但用三日不復用巳故今以三月三日為上巳也寒食去冬至一百五十日即有疾風甚雨謂之寒食一名冷節一名禁菸節元介子推焚綿山故事至今名之四月八俗名佛節釋家尚之端午一名端陽一名天中節一名地臘七夕七月七日名道德臘中元七月十五日云地官赦罪中秋八月十五日重陽九月九日亦曰重九十月朝十月初一日一名民歲臘下元十月十五日小年夜俗云十二月二十四日為小年夜是夜犯空神除夕十二月終又名除夜仁道類第四仁壽子曰仁者靜靜者壽又曰仁者必得其壽又曰民之於仁也甚於水火水火吾見蹈而死者矣未見蹈仁而死者也仁友子曰居是邦也友其士之仁者不仁而可與言則何亡國敗家之有仁術醫業曰仁術以其有活人之心也善降百祥書曰作善降之百祥作不善降之百殃易曰積善之家必有餘慶積不善之家必有餘殃陰德不死邴吉盡心匡衛宣帝之微時無所不至宣帝即位眾莫克知吉亦不言后帝聞之將封之會吉病篤上使人加敬於身而受封太子太傅夏侯勝曰此未死也臣聞有陰德者必享其樂以及子孫今吉未獲樂而病篤不足慮也後病果愈封為博陽侯終享其樂仁者愛人兼能愛物宋曹彬堂室傾壞子弟請加修葺公曰時方隆冬牆壁瓦石之間百蟲所蟄不可傷其生其仁心愛物如此乎凡一念之仁百善所生惟善以為寶惟仁親以為寶故君子樂與人為善司馬溫公家訓積金以遺子孫子孫未必能守積書以遺子孫子孫未必能讀不如積陰德於冥冥之中以為子孫長久之計言行要留好樣與兒孫心術要不得罪於天地仁獸虎狼存父子之仁蜂蟻有君臣之義蟲蓋有時而仁也今人仁不如虎狼而虐如之義不如蜂蟻而毒如之是人亦有時而蟲矣然蟲之人也進也人之蟲也退也人之不如蟲也哀夫中道彩色所以養目亦所以病目聲音所以養耳亦所以病耳耳目之視聽所以養心亦所以病心中則養過則病道化譚景升化書曰道之委也虛化神神化氣氣化形形生而萬物所以塞也道之用也形化氣氣化神神化虛虛明而萬物所以通也是以古聖人窮通塞之端得造化之源忘形以養氣忘氣以養神忘神以養虛虛實相通是謂大同故藏之為元精用之為萬靈舍之為太乙放之為太清是以坎離消長於一身風雲發泄於七竅真氣薰蒸而時無寒暑其純陽流注而民無死生是謂神化之道也道蟄物有善於蟄藏者或可以御大寒或可以去大飢或可以萬歲不死以其心冥冥兮無所知神怡怡兮無所之氣熙熙兮無所為萬慮不能感求全不可得是大人體物知身體身知神體神知真是謂吉人之津道虛鬼之神可以御龍之變可以役蛇虺可以不能螫戈矛可以不能擊惟無心者火不能燒水不能溺兵刃不能加天命不能死其故何志於樂者猶忘飢志於憂者猶忘痛志於虛無者可以忘生死飲食類第五飲食為養生要務貴精而不貴多飢飽得中不可太過不及忍飢則傷胃過飽則傷脾況脾胃為人身之基本脾胃一傷百病由出所以君子養生先要慎調脾胃飲食淡薄神智自清厚味多者不惟神智昏濁又且動火生痰善攝生者不可不加意以節慎也至有醉後入房飽甚作怒其害漸積而成大病雖良醫弗為金湯木樨香茶九月桂花盛開清晨以布單鋪樹下以杖打下花頭收起約用茶葉一斤和露桂花一兩用厚皮紙作袋裝之封口以微火籠內反復烘之一日夜量花茶干則住火不可開封收貯竹囊中用時取出置瓶中以沸湯沖之少頃飲則如新桂馨香茉莉香茶其法亦如桂花茶樣制同若茉莉開花時下午摘花投淨器中以淨水浸過宿次早以水衝入茶滷中清香可美腦子茶以好茶用涼沸湯細噴之微潤收起裝皮紙袋中以好冰片用薄紙包置茶葉中封袋二宿則有腦子香氣極妙蘭膏茶上等細茶研細一兩為率先將好酥一兩溶化傾入茶末內不住手攪夏月漸漸添水攪不可多添只一二匙足矣頻添無妨務要攪勻直至雪白為度冬月漸添滾湯攪春秋添溫湯入鹽些少酥簽茶好真酥於銀石器內溶化傾入細茶末攪勻漸添湯攪成稀膏散在盞內卻以滾湯澆供之四時皆用湯造冬月造在風爐火上擂茶芽茶用湯浸軟脂麻炒熟去皮同搐極細入川椒末酥鹽油餅再擂如干旋添浸茶湯無油餅則以乾麵代之入鍋煎熟隨意入松子胡桃栗子皆可枸杞茶深秋採紅枸杞子同乾麵拌和成劑捏作餅曬乾研細每末二兩用細茶一兩和勻入煉化酥油三兩旋添湯攪成稠膏入鹽少許下鍋煎熟飲之久用明目甘州枸杞用滾湯泡爛搗尢佳枸杞菊花茶甘枸杞四兩淨甘菊花一兩淨川椒二錢半淨砂仁一兩半淨細茶五兩甘草炙一兩芝麻炒熟去皮一升五合白米一升炒作粉上為細末拌勻煎成再點湯用天香湯白木梅花盛開時收揀淨用石臼搗爛如泥每一斤入鹽一兩炒甘草炙為末拌勻放瓶中密封曬七日沸湯點服暗香湯梅花將開時清旦摘取半開花蕊連蒂置瓶內每一兩用炒鹽一兩灑之不可以手觸壞用厚紙數重封固置陰處次年取時先置蜜於盞內然後取花頭二三個內於中滾湯一泡自開如新杏湯杏仁三兩用百沸湯二升浸蓋之候冷去皮尖又換沸湯泡五次為度控乾研細用蜜一斤煉五六沸候冷旋傾入杏器中又研如是旋研旋添研極細點湯鳳髓湯能理肺氣松子仁胡桃仁泡去衣各一兩煉蜜半斤上將二味研爛入蜜和勻沸湯點服醍醐湯烏梅一斤捶碎四碗水煎一碗澄清去渣不犯鐵器聽用砂仁半斤研白檀香二錢麝香一字蜜五斤上梅水和蜜砂仁於銀器內熬赤為度冷入二香和勻點湯香橙湯大橙皮鮮者三斤鮮生薑五斤甘草末二兩檀香末半兩上將橙姜各搗爛絹濾取細膏入甘草檀香末和勻作餅曬乾用時研細入鹽湯點服熟梅湯黃梅肉十斤鹽一斤青椒四兩甘草末六兩薑汁一碗上拌勻日曬半月收之又法黃梅不拘多少先將二三十枚於砂鍋內煮令滷汁出逐漸添梅不添水只干煮熟淨罐收之不犯銅鐵器用時旋切細薑絲花椒甘草鹽隨意入蜜棗湯大棗一斤去核生薑汁和蜜聽用先將棗用水五升熬濾去皮核取膏合薑蜜和調嘗味得中收貯沸湯點服造香水沉香水用淨瓦片燒微紅置平地上焙香以瓶器蓋定約香氣竭即翻瓶以沸湯傾入蓋之一法用丁香五個竹葉七片炙同投沸湯中密封片時可用之白豆蔻水同法紫蘇水取紫蘇葉用紙包焙勿翻候香泡一次急傾再泡合和之凡造香水先須傾百沸湯在瓶內然後以所用之香投入密封其口若先投香以湯泡之則不甚香酒醋造酒總法要相時寒暖寒甚則熱拌飯熱甚則冷拌飯此大法也蜜酒方真蜜二斤半以水一斗慢火熬百沸湯麵上起沫以雞翎掠去再熬再掠以無為度桂心胡椒良薑紅豆砂仁等分為細末先於器內下藥八錢次下干曲末四兩後下蜜水用油紙封箬扎四五重密封固冬二七日春秋十日夏七日熟地黃酒方肥地黃竹刀切碎一大升搗爛白糯米五升熟炒面一大升須六月六日造三味於盆中熟揉令勻納不津器中泥封春夏三七日秋冬五七日滿開有一盞綠水是其精英宜先飲之余以生布絞取汁貯之若稀餳極甘美常服之大補益百花香酒凡有香之花如木樨梅桂荼䕷蓮菊之類皆可摘下曬乾每清酒一斗用花頭二兩生絹袋盛懸於酒面約離一指許密封瓶口經宿去花其酒清香甚美又蜜酒方蜜一斤煉過糯米一升蒸飯以水五升白麵四兩同入淨器中密封之五七日可取極醇美又方以蜜和水拌飯造酒極甘美雞鳴酒方先將糯米三升淘洗淨用水六升同下鍋煮成稠粥夏攤冷春秋溫冬微熱用細面半斤酵曲二兩麥芽一撮搗細用餳稀三兩同下在粥內拌冬五日春秋三日夏二日成酒或加桂心胡椒良薑細辛甘草川芎丁香同酵曲一處和粥亦可煮酒法將窨下清酒裝滿瓶以箬扎口封緊鍋內湯止浸瓶三分之一其瓶須以物閣起勿著鍋底四邊頂口以物襯壓定勿令透氣瓶口上先放隔夜浸過糯米一撮然後燃火但米熟為度或只揭其所蓋之物一起即瓶就乾是其候也退火起瓶乘熱用黃蠟一小塊放瓶內泥封口酒冷蠟自凝面上味重而清新安官料面糵方要三伏中造制砂仁紅豆草果益智丁香各半兩良薑官桂白芷細辛獨活各二兩黃柏紅陳皮甘草石膏滑石蒼木各四兩上件俱要道地暴乾為末用新秈米粉一斗五升和藥末拌勻以大馬蓼汁調和為丸如鵝卵大即以絕干稻草層層鋪蓋三日夜大熱略退草半日又蓋覆盦干收起以篾籃盛貯造酒時每米一斗用曲二兩為末拌飯滿殿香酒麴方白麵一百斤糯米粉五十斤甜瓜一百枚香熟者去皮穰搗取汁蓮花搗取汁白朮十兩白檀香縮砂仁藿香甘草各五兩木香半兩零陵香丁香白芷各三兩上藥九味為細末同麵粉瓜汁和勻踏作片如細曲樣以紙裹掛風處五十日每米一斗以曲一斤夏閉甕冬月待微發時作糯米稀粥一碗溫投之止酸酒法酒一罈用生雞子一個石膏一兩粗搗砂仁杏仁各十枚浸二日便佳又法用錫炙熱投酒中酸味去錫取起七醋方黃陳倉米五斗為率不淘淨浸七日每日換水一次至十日做為熟飯乘熱入甕按平封閉勿令泄氣第三日翻動至第七日開再翻轉傾入井花水三擔又封七日再攪再封至三七日成好醋此法簡妙三黃醋方三伏中用陳倉米一斗淘淨蒸硬飯攤勻候冷飯面上以楮葉蓋蒼耳青蒿皆可盦至黃衣上去蓋翻轉至次日曬乾簸去黃衣再用陳米一斗如前做飯曬收至秋社日又以陳米一斗做飯與上件飯黃幹一處拌勻下水面上約四指高器上以紗帛蓋至四十九日方熟甚勿動著待其自熟麥黃醋法小麥不拘多少淘淨以清水浸三日漉出干蒸熟於暖處攤開放蘆蓆上楮葉蓋三五日黃衣上去葉曬乾疑淨入缸用水拌勻平之面可一拳高水閉七七日則熟大麥醋法大麥米二斗內將一斗炒令黃色水浸一日夜炊飯以白麵六斤拌和於淨室中鋪席攤勻楮葉蓋七日黃衣上曬乾將余麥一斗炒黃浸一宿炊飯攤溫同麥黃拌勻捺入缸內以水六斗攪密蓋二十一日可熟糟醋法臘糟一石用水泡粗糠三斗麥麩二斗和勻溫暖處放罨蓋勤拌捺待其氣香嘗有醋味依常法淋之按四時添減春秋糠四斗半麩二斗半夏以本數冬用糠五斗麩三斗看天氣冷暖加減用之棗醋法紅棗煮爛連湯放冷入造酒麴酵少許或用陳紅米炊做飯投之拌勻入甕甕面留一小竅曬日中候香熟用之乾醋法用烏梅肉一升以釅醋五升浸曬乾食醋盡為度研末收貯欲用醋時取少許投水中即如醋千里醋法以蒸餅曬乾投醋中浸透再曬再浸大約多浸醋曬燥收每以少許水研用醋肉治疽米醋罈中結成肉蓋取出以鹽醃之復化為醋可用調末藥敷癰疽發背等毒黃熟醬方以黃豆炒熟去皮磨細每末一斗入面三斤湯和勻作果切片如掌大蒸熟攤席上用荊葉或蒼耳青蒿盦三四日發熱上黃衣了翻轉烈日曬乾久曬愈好每干黃末一斤用鹽四兩紫蘇湯打下高於黃一拳曬之小麥甜醬小麥不拘多少水洗浸一日夜撈起蒸熟飯放大盆內以荊葉密蓋五七日上黃衣退半日涼再蓋盦七日干取出曬之待極干香磨細每黃一斤用淨鹽四兩用紫蘇湯和勻如稀粥曬缸中日攪五七次曬兩月醬濃黑色方收入壇內任藏年久愈佳一方用白晚米亦如蒸曬法作醬妙造醬油法三月間造起為妙用大黃豆二斗煮爛去湯將豆置大盤內以白麵拌和得過為度以乾草鋪板上草上鋪席將拌過豆鋪席上二寸厚豆上蓋荊葉蒿草之類盦之二三七起黃衣白毛取出曬乾每斤入好淨鹽四兩水量入缸內曬早午攪二次曬至五六月將油取出別以缸盛曬豆醬已干別用竹套套下盡取其油將豆磨為醬再加紫蘇涼湯曬成醬用菜蔬諸藥苗作菜枸杞地黃青葙牛膝甘菊萱花槐芽椿芽黃精白朮車前商陸決明黃連樹芽之類皆可為菜凡藥苗只取漱心炸之漿水澤過以鹽汁拌捏去汁曬乾收於竹器中以紙包之勿著風塵用時暖湯浸令溫透去本汁更以別湯煮熟任以調和食之菜脯鹽齏菜去梗用葉鋪開如薄餅大用料物摻之料用陳皮杏仁砂仁甘草蒔蘿茴香川椒炒同為細末撒菜上更鋪菜一重又撒料物如此鋪撒五重以平石壓之用甑蒸過切作小塊調豆粉稠水蘸之入油炸熟冷定瓷器收之乾菜大科菘菜芥菜洗淨略曬沸湯內炸五六分熟曬乾用鹽醬蒔蘿茴香花椒陳皮沙糖同煮熟曬乾再蒸少時收貯用時少入油醋拌飯上蒸食香瓜將瓜用鹽滷浸一宿渡起用原滷煎滾炸過曬乾用好醋煎滾候冷調砂糖薑絲紫蘇蒔蘿茴香拌勻用瓷器貯用糟菜瓜菜瓜用石灰白礬煎滾冷浸一伏時用煮酒泡糟鹽入銅錢百餘文拌勻醃十日取出拭乾別無好糟入鹽適中煮酒泡再拌入壇收貯箬扎口泥封糟瓜稍瓜每五斤用鹽七兩和糟勻醃用古錢五十文逐層頓十餘月取出去錢並舊糟換好糟依前醃之入甕收貯瓜齏甜瓜生者用竹籤穿透每瓜十枚用鹽四兩醃一宿瀝去瓜水令乾用醬十兩拌勻烈日曬翻轉又曬乾入新瓷器內收之蒜冬瓜冬瓜大者留至冬至前後去皮切作一指闊條以明礬湯炸過控干每一斤用鹽二兩蒜瓣三兩同搗碎拌勻入罐極好醋浸之醬瓜茄黃瓜茄不拘多少先用麵醬黃鋪在缸內次以鮮瓜茄鋪一層灑鹽一層又下醬黃一層瓜茄一層鹽一層如此層層相醃五七宿烈日曬之欲作干瓜取出曝之不必用水糖醋茄新嫩茄切三角沸湯炸過粗布包壓干鹽醃一宿曬乾用薑絲陳皮絲紫蘇葉碎切拌勻煎滾糖醋澆曬乾收貯糖糟茄八九月嫩茄線扎去蒂用活水煎湯冷定糟鹽拌勻入壇泥封固每茄一斤糟一斤鹽三兩鵪鶉茄嫩茄切兩半以刀鏤細勿令透沸湯炸過控干用鹽醬花椒蒔蘿茴香甘草陳皮杏仁紅豆細研抹入鏤縫中曬乾蒸過用時以沸湯蘸過香油炸蒜醋茄秋深小茄摘去蒂拭淨用常醋一碗入水同煎微沸將茄炸過控干搗蒜並鹽和冷定醋水以浸著為度內瓶中小黃瓜如上造芥末茄嫩茄切作條不須洗便曬乾多著油鍋內加鹽炒熟入瓷盆中攤開候冷用干芥末摻拌勻新罐牧貯燒茄乾鍋內燒香油三兩茄子去蒂十個盆蓋發火燒候軟如泥研鹽醬料物麻香泥蒜酪食醬姜嫩鮮姜刮去皮洗淨控干捶破每一斤用鹽二兩醃一宿取起曬乾待冷入稀甜醬中浸曬二七日新罐收之醋姜嫩姜不拘多少炒鹽鹽一宿用滷入米醋同煮數沸候冷入姜及沙糖隨入多少箬扎泥封固糟姜嫩姜天晴時收陰乾五日以麻香拭去紅皮每姜一斤用鹽二兩糟二斤醃七日取出再拭別用鹽三十兩拌姜勻法糟五斤拌之隨意盛作幾罐先以核桃二枚捶碎安下底然後入姜平糟面以小熟末摻上如常法泥封固如要色紅入牽牛花拌糟慄末則姜無渣胡桃則姜不辣五美姜嫩姜一斤切薄片用白梅半斤打碎去仁入炒鹽二兩拌勻曬三日取出用甘松三錢甘草半兩檀香二錢拌勻曬三日後收貯胞姜嫩生薑去皮以甘草白芷零陵香少許同煮熟切片食之美香蘿蔔揀實蘿蔔切骰子大塊鹽醃一宿日中曬乾用薑橘絲蒔蘿茴香拌勻煎滾醋澆瓦器盛曬乾收之胡蘿蔔鮮者切片略炸過控干入蔥丁蒔蘿茴香川椒紅豆研爛並鹽拌勻醃一時食蘿蔔齏蘿蔔切作片萵苣條或嫩蔓青白菜切大小同各以鹽醃良久沸湯炸過入新水中次煎酸醬泡之以碗蓋入瓶中浸冷蘿蔔乾以蘿蔔切作骰子大曬乾收候醃芥菜滷水煮加川椒蒔蘿拌勻曬乾收貯久留不壞味極美糖瓜生甜瓜一個切小塊鹽七錢醃一宿撈起以汁煎滾候冷入瓜拌透又曬乾再用糖四兩醋一碗瓷器浸了再入小茴香砂仁花椒紫蘇薑絲少許干齏菜大芥菜每一百斤用鹽二十二兩摻撈得勻以盆或缸疊疊放定上用大石壓醃十數日出水浸過石撈起曬乾後以本汁滷煮滾半熟再曬乾收貯若復蒸過則黑而軟置淨干甕中藏封任留數年不壞出路作菜極便六月伏天用炒過干復同齏菜炒放旬日不腐凡六月天熱饌不堪留只以干齏同炒不要入湯水放冷再收起可放經旬不氣息極妙若醃芥鹽汁煮黃豆及干蘿蔔丁曬乾收貯經年可食乾菜不拘青菜苦蕒等俱以滾湯炸過曬乾收起冬月應用干筍去殼煮熟切片控乾鹽醃過宿曬乾貯食干蕨嫩蕨沸湯炸過撈起曬乾收用以滾湯浸軟料物拌食干蒜臺鹽醃三日曬乾元滷煎滾炸過又曬乾蒸熟瓷罐盛之久留不壞醋蒜淨蒜瓣一斤用石灰滾湯焯過晾乾用鹽三錢醃一宿漉出再晾乾用鹽七錢炒乾以頭醋投入炒鹽內煎一二沸候冷入罐泥封經年不壞糟蒜每一斤石灰湯炸過晾去水乾鹽兩半糟一斤拌勻入罐內泥封兩月後可食糟茄茄子天晴日亭午摘去蒂用麥麩煮粥浸一宿取出以軟帛拭乾每十斤用鹽二十兩飛過白礬末稱一兩法糟十斤拌勻如常收之久而茄色愈黃透不黑糟藏之法凡糟藏先用鹽糟過十數日取起盡去舊糟淨拭乾別用一項好糟此為妙大抵花醭多因初糟醃出宿水之故必換一次好糟自無可壞鹽韭霜前肥韭淨洗控乾於瓷缽內鋪韭一層撒鹽一層醃二三宿翻數次裝入罐用元滷加些香油浸之醃韭花韭花半結子時收摘去蒂梗每一斤用鹽三兩同搗爛入罐中或就中醃小茄小黃瓜先別用鹽醃去水晾三日入韭花中拌勻用銅錢三四文著瓶底卻入韭花妙法制柏枝嫩柏枝洗淨控乾入梅滷曬乾甘草桂心為細末用淨瓷器中一層藥一層柏枝緊封藏之久不開則上鹽花上小碂一枝可玩可食香蘇紫蘇嫩心長三寸許採來勿見水約三斤用鹽二兩醃一宿用梅滷浸三日曬乾入甘草甘松白芷末拌勻摻收之法制白姜制姜之法先須釀花其法隔宿煎沸湯八升入鹽三斤打勻次早別取清水以白梅半斤捶碎和浸同前鹽水和合貯頓放遂日採牽牛花去白蒂隨多少投水中候水深濃盡去其花取嫩姜十斤拭去紅衣隨意切塊片先用白鹽五兩白礬五兩沸湯五碗化開澄清以姜浸之微向日影中晾二日將姜撈出晾乾再入小鹽拌勻和置烈日中曬必待白鹽凝燥為度入器收貯十香菜京師靈濟宮道士制黃豆一斗煮爛去湯撈起用面四斤拌勻盦二寸厚用乾蘆蓆上鋪包蓋密二七候冷取出曬乾聽用菜瓜出時用二十斤切丁鹽一斤醃一宿取出晾乾加薑絲二三斤陳皮絲半斤杏仁三升杏仁須走五七次去澀水每黃豉一升醃瓜水三碗加好酒一瓶拌勻再加料物花椒四兩大小茴香各二兩甘松三奈白芷蒔蘿各半兩拌勻以淨壇盛之滿箬扎口泥封外寫東西南北四字每日轉移曬一向三七後可用脯鮮肉脯法諸般肉每一斤切十六條好酒一大盞醋一小盞鹽一兩椒片蒔蘿各少許慢火煮酒醋乾收之六月尤宜制臘肉法肉三斤一塊用鹽三兩擦令勻入缸醃數日每日翻兩次卻入酒醋中停再醃三五日日翻三四次取出晾乾先備百沸湯一鍋真麻油一器將肉逐塊略入湯蘸即提起趁熱以油刷上掛煙筒上薰之須日夜不斷煙薰十日方好諸肉並依此法四時臘肉臘月醃肉滷汁淨壇收泥封口要用時取一碗入鹽三兩和勻將肉去骨切三指厚五寸闊用鹽料勻醃半日入滷汁內浸一宿次日臘味與臘月者同夏月作臘肉法用半精豬肉一斤一條以鹽水煎滾置壇中將肉乘熱浸於內半日取起懸煙筒上薰一日再煮熟香美如臘肉夏月收肉法諸般肉大片薄批每斤用鹽二兩香料拌勻醃半日頻翻轉榨去血水以油抹過懸日中曬乾收之夏月收熟肉法熟肉不拘大小塊每一斤加鹽半兩醃片時入陳皮川椒蒔蘿酒醋醬少許同煮至酒醋乾以竹器盛穀殼煙薰之極干收貯或日曬乾亦可醃牛肉冬肉用後腿牛肉直切半斤一塊每斤肉用炒鹽二兩灑勻層層鋪放不可用手摩動醃五日取起穿懸煙突上燒煙薰之半月極干收起用時以水煮熟取起候涼捶碎絲如絨充盤鮮紅香美可羨穰豬肚肥豬肚一個洗淨用上熟糯米淘洗以溫水浸一宿撈起拌臘肉絲鮮肉丁栗子棗子去核及筍片等物鹽椒片鬆鬆入於肚內扎口煮熟壓實候冷切片充盤逡巡肉鮓諸般肉皆可制俱要取淨肉薄切入圓椒杏仁蒔蘿生薑橘葉鹽米粉紅曲末拌勻用箬裹入甑蒸半熟取出以醋少許鍋內炒過可用時制肉脯豬牛等肉切作薄片每斤用鹽一兩醃一日去滷水再加大料拌勻及香油拌過鋪蘆蓆上曬乾收用時蒸熟食之徽州炒牛肉法嫩牛肉二斤為率直切成條復橫切成薄片用醬拌令勻先燒鐵鍋極熱澆香油半杯煎滾方下牛肉炒爆待本汁煮乾再加熟水一碗酒醋半碗煮乾入椒末或薑絲再炒食松香味美南京炒甘白腸法取豬小腸用泔水洗過仍以鹽擦之極淨沸湯炸過控極干無水氣切寸長燒紅鐵鍋入豬油少許化盡下腸炒熟不可入水少入醬水椒片炒乾用即無腸氣洗諸腸肚法以茶鹽少許洗之無氣息切豬油汙手以豬耳尖洗手油自去凡煮老肉不爛入山楂子數十枚同煮之易爛楂子一名山裡果鵝鮓肥鵝撏淨細切每五斤入鹽三兩酒一碗醃過宿去滷用蔥花二兩薑絲四兩陳皮一兩椒皮三錢蒔蘿小茴各少許紅曲末一合好酒半碗拌勻入罐拉實箬扎口泥固春夏日曬秋冬火煨五日熟可食豬羊肉精者皆可如法制魚鮓十月間魚大小不拘去鱗並肚雜尾翅大者切如棋子塊小者不切用淨水洗浣五七次極白無些血水以細篾筐盛之用板石壓二日極干取出每十斤用鹽一斤和拌入缸加糯米飯三升紅曲末二兩撒上花椒瓣姜蒜絲陳皮絲和勻按緊四傍用箬貼缸面上用箬蓋密箬上加碗大河澇石壓緊一尺高臘月取開可用極妙滷水溢起以杓取之煮菜腐尤佳風魚臘月鯉魚或鯽魚一斤者不去鱗只去腸雜拭乾炒鹽一兩連麟內外擦過醃四五日砍碎蔥椒蒔蘿小茴香好酒拌勻釀在魚腹內皮紙包裹麻皮扎定掛當風處用時慢火炙熟食煎雞子鴨子餅調時少入冷水煎不枯焦糟魚好白鮮魚大者洗淨曬一日乾切作一掌大以好糟不下水者每一斤入鹽二兩椒片小茴薑絲蒔蘿拌勻香油芝麻煎過一杯用淨罐層層糟魚間疊以箬封口泥固數年不壞粉骨魚鯉魚治淨勿切碎以鹽醃得所魚腹中納蔥花薑絲細料物鍋內著水入酒半盞放下魚摻楮實三分盆蓋定勿走氣慢火養半日或一夜放冷其骨皆爛如粉酥骨魚鯽魚二斤治淨鹽醃半日控乾次以栝蔞穰末入魚腹煎令皮焦放冷用水一大碗蒔蘿川椒陳皮絲薑絲各一錢糖一兩鹽一兩油二兩豉二錢蔥一掬醬一匙楮實末半兩拌勻鍋內用箬鋪底魚放箬上又用箬蓋傾下料物水浸沒盆蓋封密慢火養熟其骨皆酥蒸鰣魚法以魚去腸勿去鱗洗淨錫盆盛先鋪乾筍或馬蘭或韭菜酒醋鹽醬椒薑大料和勻放盆內入滾湯中頓熟豬油切成骰子塊同蒸妙醃玳瑁蛋法清明前後收鴨子或雞子則不缺頂每彈一百個柴炭灰一斗要乾而不受潮濕者新出窯破灰一升炒鹽十兩熱飲湯調和如泥先用極熱水浸了使內外俱熱取起曬日中無日籠內烘之旋裹鹽灰得勻乘熱貯壇中以糠撒之使不相黏過一七日則變矣三七日盡成玳瑁色過一伏不須烹煮自然堅熟可食善變者上有花藻可愛醬鴨子用子略敲破殼用醬鹽醋茴香花椒末皆乘罐內越旬日煮熟其味佳方鴨子將鴨子用好熱醋浸一日夜以小匣放子在內扎住煮熟便是方者雞子線薄酒鍋中煮沸了以雞子開竅入鹽少許箸攪勻旋傾令如線入酒醃蟹法八九月肥蟹一百隻醬半斤鹽二斤花椒末一兩茴香末一兩和鹽醬勻每蟹臍中入一匙許細麻縛住仰疊之壓件入好酒封之泥固多者用小壇貯逐壇開用尤妙酒鰍法大蝦不去頭每斤鹽半兩醃半日控乾入瓶內一層蝦入椒十餘粒尤不怕多層層下訖用好酒更化鹽一兩半攪之密封泥固五七日則熟冬十絲日夏月加鹽二兩蟛蜞勿食海邊有蟛蜞擁出似蟛螖而大似蟹而小不可食蔡謨初度江不識而食之幾死嘆曰讀爾雅不熟幾為所誤煮蛤蜊法用枇杷核仁數粒同煮則殼自脫煮蟹色青用柿蒂數個同煮色青如鮮酪酥取酥法羊脂一斤豬油四兩慢火熬濾去渣雪梨一個去皮心薄切慄肉十個薄切紅棗十五個去核切燈芯一小把皂角一寸銼碎栝蔞子少許熬至梨乾為度再濾收之北酥法豬羊二脂同煎蜜二兩雪梨二個油一兩不蛀皂角一條銼碎同熬密絹濾去渣候冷再熬欲似北酥則以鬱金梔子搭色北酥乃用駝脂煎今南方用諸獸骨髓作之尤佳造酪法取牛乳不拘多少鍋中慢火熬之緊火則底焦爆牛馬糞火為上常以杓攪揚勿令溢出時復徹底縱橫摝之勿圓攪喜斷勿用口吹吹則解散候四五沸便止傾入盆中勿揚動待少冷掠去浮皮著別器中乃真酥也余者用生絹袋濾在乾淨瓶中收之凡酪酥須用火炙乾則無潤氣亦不斷若酪斷不成必是屋內有蛇及蝦蟆之故燒頭髮及牛羊角以避之其熟乳待溫如人體為度若熱入則酸冷又難成濾了先以甜酪為酵大率熟乳一升用甜酪半匙著杓中以匙極攪開散入熟乳中仍以杓攪勻以氈絮之類覆瓶令暖良久換生單布蓋之明旦酪成或無舊甜酪則用漿水一合代之不可多六七月造者只令如人體置於冷地勿蓋臘冬月造者令熱於人體造乳餅牛乳一斗為率絹袋濾入鍋煎三五沸水解醋點入乳內漸漸結成漉出布裹以石壓之酥蜜餅面十斤蜜四兩羊脂春四夏六秋冬三兩豬油春半斤夏六兩秋冬九兩溶開入蜜和勻澆面搜勻任意即造入爐熬紙襯底慢火爆熟冷食肉油餅白麵一斤熟油二兩豬油四兩擂碎酒一小盞與面同和如硬入豬羊骨髓分作十劑各捍開包餡用模子即入爐爆熟火不可太緊蜜果餡糯米粉一升面五合豬油一盞蜜四兩和勻和麵若硬再加熱水和成劑彈子大內果核桃仁一豆許圓成入去殼芝麻中為衣入香油鍋煎浮即撈起涼食甘美五香糕上白糯米二升粳米六升芡實粉一升人參白朮白茯苓蓮肉共一升為末白糖滾湯拌和上甑鬆糕陳粳米一斗砂糖三斤米淘淨控乾和糖拌勻入臼舂成粉或純粉或和蜜任意製造凡蒸糕須候湯濟漸漸上粉要不須湯氣即上不可外泄不可中阻其鋪底布要稀疏生糖糕粳米四升糯米五合春秋浸一日舂粉蒸時用糖和粉捏作碎塊排布籠內候熟揉成劑切作片南京花糕作法即此作法蒸熟復重卷作花亦成段黃白香糕蘇州製法最妙熬糖法糯米一斗大麥芽二斤先將米作如酒飯次入麥芽末拌勻良久下溫湯六七碗泡一時久淋取清汁鍋內慢火熬之不住手攪得所而止若再慢火熬稠取出拔白即為糖也大料方良薑乾薑蒔蘿小茴香胡椒川椒砂仁大茴香陳皮蓽茇官桂益智仁等分為末用省力大料方花胡椒薑桂茴香蒔蘿為末滴水為丸用時隨意研入饌食物相反黍米不可與葵菜同食牛肉不可與韭同食李子不可與雞子同食豆不可與魚同食梅子楊梅不與蔥同食菱角不與蜜同食苦苣不與酪同食梨柿不與蟹同食芥菜不與兔肉同食兔肉與姜同食成霍亂雀肉不與李子同食蔥不可與蜜同食黃魚明礬不可與蕎麥麵同食鴨肉不可與鱉同食鱉肉不可與莧菜同食豬肉不與生薑同食令人發風疾果煎蜜煎諸果法凡果酸者用朴硝泡水大段硬酸者用滾湯泡化朴硝冷浸去酸味漉出淘過控乾煉蜜放冷水再入舊蜜煎如琥珀色卻收去淨器中煉蜜養之若果軟耎者只煉蜜放冷澆淹一宿換蜜煎不用鐵器蜜梅杏同梅子青者或去核或不去核或鏤花或切片皆可先用鹽水浸一宿次日漉乾用蜜浸之日中以盆貯曬日愈烈愈佳但嘗蜜酸苦即換以甜為度收之至來年換蜜又曬或經一兩月開看但覺略有動變即換蜜曬收久藏彌佳有用銅青入蜜浸者色雖青而味不美不必用也椒梅黃梅一百個為率用盆硝少許焯過漉出控乾捶碎入生薑絲一斤甘草四兩川椒皮一兩瓷盆拌勻又入炒鹽半斤同曬如欲作梅湯曬放稀欲作餅子曬放乾曬時兩三日攪一次糖椒梅梅子半青黃者捶碎核以鹽醃一日淨瓦罐中鋪梅一層入砂糖用薑絲椒片和勻一層層重重鋪罐內八分滿以物蓋蒸一遍再用生紗蒙罐口曬十日可用糖醋梅用青梅但核已堅硬便可雖苦亦不妨只不可用黃熟切去兩頭以刀直利作細路每個用胡粉少許手指揩切處不要多以糖和醋每梅一百個用糖一斤半極可久住周年一換糖醋半年一開視之略有動作便換糖醋不動作不必換糖燒李子李一斗鹽二兩糖三斤先將李用鹽水浸一宿曬乾先以鹽泥固罐四圍炙令乾入糖拌李在內以瓦片蓋泥封用糠皮火燒一宿開收之糖燒栗子慄肉一斗鹽水浸一宿曬乾入新甕內用白蜜五斤花椒一兩文武火燒一夜明日早收入糖二斤再燒候冷別器收燒木瓜木瓜去皮穰紫草少許作色控乾入罐以糖層層間放微火燒一宿收之糖蘇木瓜木瓜大者一對去皮切作瓣白鹽一兩新紫蘇葉二兩曬乾切細用醃小時入生薑絲四兩糖二十兩拌勻瓷器貯日中曝之時時抄勻以乾為度藕煎大藕五斤切二寸長又碎切之日曬出水氣以沙糖五斤甘草末一兩拌勻入瓷罐內又入蜜一斤用泥封罐口慢火煮一伏時待冷開用姜煎社前嫩姜不令見水用生粗布拭淨用蜜煎去頭水換蜜煎令金色淨器收之糖橘洞庭塘南橘一百個寬湯煮過令酸味十去六七皮上劃開四五刀捻去核壓乾留下所壓汁和糖二斤鹽少許沒其橘重湯頓之日曬直至滷乾為度乃收貯薰橘用鹽少許甘草末和湯浸橘少時火上薰之脆梅好梅子一斤肉多核小圓者佳飛鹽一兩明礬半兩量以水調勻下缸浸梅子沒至背五六日梅黃漉起出以清水淋去鹽礬氣味盡控乾每個切去核再下白水浸一宿令味淡若嘗有酸味再換水浸至淡滾湯焯過瀝乾滾湯漿候溫浸一宿漉出再將糖漿滾熱焯過瀝乾待梅並糖漿溫再浸梅在漿內如漿濃則可久留溫則梅不皺須如此再浸再漉三四次佳白梅梅子擇肥大紅臉者摘下勿掐每一百個用鹽汁三四碗浸過兩宿漉出控乾別用鹽一百兩重滾湯浥開薄紙濾取清汁寬浸日中曬之候鹽汁凝霜為熟又不如爐灰浸一宿洗曬乾汁為度楊梅煎梅三斤為率用鹽一兩醃半日沸湯浸一宿控乾糖二斤輕手拌勻日曬汁乾收水楊梅先和鹽水浸梅於盆鹽多則浮鹽少則沉著中則味佳留之若要妙不損將瓶貯水於樹上摘入瓶中浸甚妙金橘煎金橘以刀勻釐細路法酒煮候冷以針挑去核瑾扁酒汁盡每一斤用蜜半斤煎去酸苦水再以蜜半斤煎入器收之木瓜煎取初收木瓜於湯內炸過令白色取出放冷於頭上開蓋尖刀取出穰淨便入鹽一小匙候水出即入白芷細辛藁本藿香川芎胡椒砂仁等分為末瓜一枚內一小匙以瓜內鹽水調勻日曬候木瓜乾入熟蜜令滿又曬蜜乾為度橄欖煎用水於瓦上擦去厚皮銅刀界破入蜜一半沸湯浸了煮一伏時自然去核候乾煉蜜再煎數沸收貯炒慄栗子不拘多少用砂銚或熨斗中入油紙捻一個同炒妙或先於眾慄中擇二慄方平可作合者卻以一枚用香油塗濕一枚用水塗濕仍以作合置鍋底然後取眾慄逐旋蓋加二慄之上雖多至一二斗亦不妨卻蓋鍋密火燒一飯頓取出其慄顆顆有油且不黏殼又酥爛至妙法制杏仁杏仁一斤用滾灰水炸過曬乾用麵炒熟煉蜜拌勻下後項藥拌之砂仁陳皮茴香薄荷白豆蔻檀香各二錢甘草三錢炙同為細末用拌杏仁食之治肺氣喘促心腹脹悶燒杏仁杏仁以香油炸焦黃色為度用鐵線絡杓撈起候冷定食之極肥美東瓜煎經霜老瓜去青皮以近青赤肉切片沸湯炸過放冷以石灰湯浸一宿去灰水以蜜放瓷器內熬熟下瓜片煎數沸漉出別用蜜煎候瓜色微黃傾出待冷以瓷器收煉蜜養之又東瓜煎東瓜去皮切作片於滾湯炸過鹽醋同生芥菜拌勻同醃一日漉出東瓜控乾入熬熟冷蜜和入瓶緊封口十日可吃筍煎筍新米和殼煮七分熟去皮隨意雕切每十斤以蜜半斤浸半日漉乾即用三斤煎成收之衣服類第六寢衣即今之禪衣似也論語記孔子必有寢衣長一身有半上如衣領有肩坎下闊如輪以殺縫之長八尺闊一丈約用梭布六丈外青里褐用花約四斤用綿只二斤尤輕妙內用逕尺綿團一個隨身攜帶冬天早晚披衣而坐閉目定息凝神片刻誠為至要士商家不可不備也龍虎衣修養家有龍虎衣夜臥必用以固濟丹田腎堂玉道實為外護要法甫謂凡人必用之衣蓋日夜不可須臾離也其法用帛三尺三寸逕五寸內用熟艾葉摻以花椒茴香檀香為末薄鋪用線釘縫自後循前以丁荅幅往上插貼丹田此為人身元氣根本之地不可以不慎也寒衣熱解抱朴子云先寒而衣先熱而解春天不可薄衣令人傷寒頭痛食不消濕衣發瘡千金方云濕衣及汗衣皆不可久著令人發瘡及風搔大汗不可偏袒乘風令人偏風半身不遂汗衣宜急易衣里不宜黃色詩云綠衣黃裡心之悲矣黃為中央之正色為君之服色而反以為里則是陰陽顛倒故弗宜也詩人引喻貴妾而賤妻亦室家之索也紅紫不以為褻服意亦如此反衣順吉凡人旦起著衣反者便順反而著之吉衣勤浣身數沐沈存中志云衣服勤浣洗以香沾之身數沐浴令潔淨則神安道勝也不與人同齊人千金月令曰衣服巾櫛枕鏡不宜與人同也衣服不宜買故衣恐衣不祥衣香有喜凡衣服忽聞香氣主有喜慶忽聞臭穢即知疾凶衣忽生斑衣服忽生斑痕忽染脂粉及有孔穴者並不祥入綿無珠伏中裝綿人衣則無珠秋冬裝綿則有珠法以燈芯少許鋪綿上則無珠出也絹衣布里凡絹衣用木綿布為里以杏仁或銀杏擂漿漿者不吃絹米泔浣潔白衣服用洗白米泔浣之一日自潔白熱白飲湯浣之亦潔白雞糞練絹北絹黃色者以雞糞煮之即白洗油汙衣用面撲之或以水調面敷之一日夜盡脫又法滑石天花粉不拘多少為末將汙處以炭火烘熱以末糝振之未盡再烘再糝甚者不過五度一方以蚌粉厚糝汙處以熨斗坐糝處則去一法以炭火熨之或以蘿蔔湯洗之洗墨汙衣用杏仁細嚼擦之自去再以熱湯一洗盡去無跡一方嚼棗肉洗之墨汙絹以牛膠塗之候乾揭起膠墨則落一方以白梅捶爛洗之一方用飯擦以水洗之血汙衣以蘿蔔搓之自去又以淨水逐口漱過洗之自去酒漿醋汙衣以藕擦之無跡漆汙衣杏仁川椒等分爛研揩汙處淨洗之蟹黃汙衣用蟹腮揩之即去又法用橙子穰擦之自去濕洗墨油法皂角一枚去皮弦棗子五枚滑石半兩豆豉一兩末以杏仁搗和乾收之遇有油墨汙以水蘸濕用洗苧布法梅葉搗取汁以水和浸布後用清水漂之帶水鋪淨地上曬乾未白再浸再曬洗葛布法用米泔浸二日取起摺貼用板夾之水盡晾乾汙自去勿搓糨則用漿水入山梔湯和極稀浸一時亦摺夾之盡用熨斗熨之平直如新洗竹布法不可揉揉則隨手破摺須摺疊以隔宿米泔浸半日卻用溫水淋以手按或以板夾垢自去洗蕉葛法清水揉梅葉洗其衣不脆或以葉搗泡湯濾洗之亦可洗糨鐵驪布法松子肉砲細和糨中不脆又法用茶濃汁入香油一二滴糨之亦佳洗白衣煮蘿葡汁洗之垢去爛搗汁洗之亦淨洗毛衣及氈法豬蹄爪煎湯乘熱洗之汙自去洗羅絹法凡羅絹衣稍有垢便摺之桶中以皂角湯溫泡之以手拍洗頻翻之又浸且拍垢膩盡出卻過淨器以溫湯浸之又拍勿展開逕搭竹竿上候水滴盡乃展開穿晾不漿不熨候乾摺洗彩色凡彩色垢衣先用牛膠水浸半日溫湯洗之練絹法先用便桑殊湯煮熟了然後用豬胰煉絹之法須候灰湯大滾下帛候沸不住手攪提轉勿過熟過熟則爛勿夾生夾生則脆驗生熟法煮絹時就手扭些隨手散則未熟再煮數沸候扭住不散為度用胰法豬胰一具同淨灰搗成餅陰乾用時量綿多少剪用稻草一條摺作四指長條搓湯浸帛如無胰只用栝蔞去皮取穰搗碎入湯化開浸帛尤好洗梅衣凡梅蒸衣服成斑跡以枇杷核捶碎為末泡湯洗之自去蚊蠅糞汙衣以燈芯蘸水擦之則去茶褐衣梅跡凡茶褐衣服發白花斑點者以烏梅煎濃湯用筆塗跡上立還原色紙被紙被舊而毛起將破者用黃蜀葵梗五七莖捶碎水浸涎刷之則如新或以木槿針葉搗水刷之亦妙芝麻萁燒煙薰紙被不作聲洗油汙書畫法海螵蛸滑石各二錢龍骨白堊土各一錢共為末用鋪油汙之上以熨斗熨之大凡油汙多時已乾者仍以油漬大透不妨否則以水浸濕半乾上藥亦可洗葛衣用梅葉或杏葉揉水洗之不脆洗油布肉案上抹油布以熱漿水加入豬膽汁洗之油自去染蘆花色以帛二十兩為則用土紅為細末四兩先擂和水三碗成漿然用熱湯一斗入缸盆中攙和勻再入明礬末一兩滾湯泡入用帛入揉良久扭起將原水澆滾少入皂礬又將帛入其內揉之則成蘆褐色皂礬多則黑皂少則紅要看淺深著色尤妙有用蘇木煎湯勝於土紅染油綠色先將帛染作深藍色再入槐花湯入明礬染之則成油綠如要深色再用槐花湯染起居類第七警身之要人身元神出入目中五臟精華亦聚於目故陰符經曰機在目道德經曰不見可欲而心不亂是以內養之法常要兩目垂簾返觀內照降心火于丹田使神氣相抱故太玄養初一曰藏心於淵美厥靈根測曰藏心於淵神不外也心牽於事火動於中有動於中必搖其精心調則息自調靜久則息自定息機以死心死心以養氣精氣神為內三寶耳目口為外三寶常使內三寶不逐物而流外三寶不誘中而擾呼吸要綿綿深入丹田常要使呼吸為夫婦神氣為夫婦蓋夫婦云者欲其相合而不相離者也毋勞爾形毋搖爾精毋使爾思毋慮營營寡思慮以養神寡嗜欲以養精寡言語以養氣久視傷心損血久坐傷脾損肉久立傷腎損骨久臥傷肺損氣久行傷肝損筋坐處不可太明太明則傷魂不可太暗太暗則傷魄尤忌濕氣心有所愛不可深愛心有所憎不可深憎發多梳則令人明目去風體多浴令人傷氣倦怠春夏宜早起秋冬宜晏眠晏忌日出後早忌雞鳴前凡大小便宜緊閉口齒目上視使氣不泄遇小疾可行八段錦或用六字氣法每夜以手擦湧泉穴左右各三百遍甚益下元五味淡薄令人神爽氣清少病酸多傷脾咸多傷心苦多傷腎辛多傷肝尤忌生冷硬物飲食不可過多亦不可太速切忌空心茶卯時酒黃昏飯夜深不可醉不可飽不可遠行怒後不可便食食後不可發怒軟蒸飯爛煮肉少飲酒獨自宿此養生之妙法也飯後徐徐行數十步以手摩面及脅及腹仰面呵氣四五口能去飲食之毒凡早行飲酒一甌以御霧露之毒無酒嚼姜一片亦可傷食飽脹可緊閉口齒聳肩上視提氣至咽喉少頃後降入丹田如此升降四五次則消化矣臨睡用石膏花椒青鹽末擦齒以好茶漱之叩齒數遍一日飲食之毒不留齒間終身無齒疾求免自警慎則免侮謙則免妒默則免惡忍則免禍勤則免誤此五者廢一焉求免不可得也養生四印忍默直平也所謂百戰百勝不如一忍萬言萬當不如一默無可揀擇眼界平不藏秋毫心地直勤有三益蓋民生在勤勤則不匱一夫不耕則受其飢一婦不蠶則受其寒是勤可以免飢寒也農民晝則力作夜則頹然甘寢故非心淫念無從而生是勤可以遠淫僻也戶樞不蠹流水不腐周公論三宗文王之壽必歸之無逸呂城公釋之曰主靜則攸存博厚自強則堅實精明操存則血氣循軌而不亂收斂則精神內守而不浮是勤可以致壽考也房室之戒多矣而天變為尤月令先雷三日奮木鐸以令兆民曰雷將發聲有不戒其容止者生子不備必有凶災謂其瀆天威也今之生子而形殊體缺者又安知不犯斯禁也凡起居見怪不可驚怪但宜鎮之以靜如桓公見紫衣之神周南見怪鼠之語李叔堅不殺戴冠之犬公亮大書入窗之手是皆能以氣勝之也夫怪其能傷人所患者不能持守乃自傷耳彭祖曰男不可無女女不可無男若念頭真正無所思者大能延年也又曰人能一月再泄一歲二十四泄得壽一百歲上士異床中士異被服藥千朝不如獨宿飽食過度房室勞損血氣流溢滲入大腸時便清血腹痛病名腸瘕忿怒中盡力房事精虛氣節發為癰疽恐懼中入房陰陽偏虛發厥自汗盜汗積而成勞遠行疲乏人入房為五勞虛損廣成子曰無勞爾形無搖爾精可以長生勇於敢則殺勇於不敢則活蓋敢於有為則殺身不敢有為則活其身也起居不節用力過度則脈絡傷傷陽則衄傷陰則下行不遠步立不至疲坐勿背日夜行常啄齒能殺鬼邪以手掠發則邪不敢近燈燭而臥魂魄不安燈燭行房壽命不長臥處頭邊勿安火爐日久引火氣頭重目赤鼻乾發腦疽瘡瘍遠行觸熱逢河勿洗面令人面生䵟亂髮藏臥房壁中招不祥過神廟勿輕入簫管掛壁取之勿便吹恐有蜈蚣在內枕中安決明子最能明目菊花不可多放枕中久之令人腦冷暮臥先讀黃庭內景玉經一遍乃臥使人魂魄自然精煉常行此法二十八年成仙莊子曰嗜欲深者其天機淺春秋秦醫和視晉侯之疾曰是謂近女室非鬼非食惑以喪志公曰女不可近乎對曰節之仙書曰人壽夭在於撙節若將息得所長生不死恣其情欲則命同朝露若要安樂不脫不著北方語也苦要安樂頻脫頻著南方語也黃帝曰外不勞形於事內無思想之患以恬愉為務以自得為功形體不敝精神不損壽百數也彭祖曰凡人不可無思當漸漸除之人身虛無但有遊氣氣息得理百病不生又曰道不在煩但能不思衣不思食不思聲色不思勝負不思得失不思榮辱心不勞神不極可得千歲昔有士人觀書忘食一日有衣紫人立前曰汝再不食吾其死矣問其何人曰我穀神也於是絕思而食如故蓋思則氣結伏熱不散久而氣血俱虛疾至夭枉也飲玉泉者令人延年除百病玉泉者腎間液也雞鳴平旦晡時黃昏半夜一旦一夕凡七漱玉泉飲之每飲輒滿口咽之延年遠唾損氣多唾損神又云遠唾不如近唾近唾不如不唾汗出毛孔開勿令人扇涼亦為外所中食後以紙拈打噴嚏數次氣通則目自明疾自化設席避蠅用竹葉一束懸壁間噀酒於上蠅盡逐飛竹葉上並不來席上宅中取窖凡宅中陰處深鑿一窖取如房屋天窗通亮冬暖夏涼遇秋收鮮果瓜菜之屬如法安頓待冬用之夏月安置酒饌等物可避暑蟲若蓄水尤妙又冬夏極冷熱之時可於內釀酒冬不凍瓶水冬月欲不凍水好燒酒攙入則不凍也晨月可成冰用寒水石一兩為末煎湯密封罐內墜井底則成冰取起破罐用之池水澄清用瓶盛糞以箬扎口投池中則水清澄清水法凡遇梅雨及淫雨大水溪井汲水俱渾水缸中擂搗黃豆或杏仁十數枚入缸攪片時候定自清池塘不漏用馬糞和石灰泥池塘能長春苔使其不漏又不死魚牛骨注池水崇寧年間西部內苑中池水易涸或云置牛骨於池中則不涸置之果然今人用之皆驗魚塘大者九畝或七畝深丈許以磚石堆砌屹崛作十洲三島其魚晝夜五方遊走自然生長朝遊東方作十洲堆砌在水中不可出面更宜深凹日中游南方可挖三窟如井狀謂三島日晡魚遊西方水止深三尺多栽蒲柳之類使魚馳騁於其影間黃昏魚北遊可深五六尺多留萍藻魚止於此夜半居中深三四尺作明水其魚朝星斗池中築一臺方丈許立一突如烽燧狀藏狗骨毛草相間積於突中或有疾風暴雨點燒草骨臭煙起使龍不至戲否則鯉魚皆飛去塘中有鱉名曰神守則魚不去文房收書不蠢芸草藏書即芸香也古人窗前必栽此草以備收書故芸窗今北方香菜是也莖葉並似醒頭香南方亦多有之本草名芸臺置書帙中不生蠹魚置席下則除蚤蝨葉類豌豆作小叢南方謂之十里香此草在數十步外便聞香氣今不得芸香用朝腦置書箱中亦免蠹魚糊屏相畫打糊入白芨明礬則不蛀入蘿蔔汁少許則不瓦絹書絹布上寫字用薑汁磨墨及粉則不滲開油紙書用肥皂浸水磨墨洗油紙不麻肥皂湯調顏料可畫燭上法寫銷金字牛膠一兩水溶化如漆稀用藤黃為末不拘多少調入以色黃為度夏月膠易乾入蜜一錢半冬月一錢春秋約用蜜少許取真難乾而易上金也制銅代泥金法黃銅細末半斤搗荸薺半斤同拌水調盦三日成如泥取出淘去荸薺將銅和膠水研如金任用礬紙法大字紙用水膠一兩明礬八錢水五碗煎化羊毛刷刷上中字紙水膠一兩礬四錢水三碗小字紙膠一兩礬三錢水三碗凡煎水時用水一碗泡化明礬水二碗以膠溶化停當二水俱要冷熱相勻方合用冬月寫字不凍硯凍用燒酒磨墨寫字則不凍去錯字蔓荊子二錢龍骨一錢葙子霜半錢同為末先點白水在字上以藥末摻之候乾即拂去寶鑑起字方硇砂瓦粉木賊白龍骨密陀僧白石脂桑柴灰各等分信石少許為細末先用清水濕字後上藥以熨斗熨之乾即落造印色法真香油一兩天麻子一兩同入銅銚內熬熟入好黃蠟一錢和勻乘熱拌熟艾如泥然後入朱隨意多少色紅為度不須用絹襯隔自然不塞印文則又不生白醭久而不熾一法用真蜜少許久而愈鮮如無蓖麻子油只用香油二兩蓖麻子肥者四十粒去殼入油內煎焦去之用油則一也讀書燈燈油用大麻子油無煙不損目但易乾每斤入桐油二兩和之則難乾又避鼠耗其餘香油豆油皆同上以炒鹽少許置燈盞中亦省油以生薑擦盞邊不生滓暈桐油盞不垢法點桐油燈盞以姜擦之令乾入桐油點燈不垢書窗明紙須用油紙糊窗則明亮又堅雨灑訣云桐三麻四不須煎十五蓖麻去殼研定粉一分和合了太陽一照便光鮮調朱點書用白芨水勝如膠膠多有氣臭貯筆法川椒一錢黃柏五分煎湯一杯蘸筆頭曬乾收年久不蛀洗硯法凡硯磨墨日久不免有塵灰積駐寫字必不光且又壞筆須常洗之用枯蓮房蘸水洗之則垢易去不傷硯凡硯池邊斑駁墨跡切不可磨去此名古硯文調朱書碑石法凡就石書丹須用皂角煎湯調銀硃方寫得上書套紙匣打骨用糊法糯米浸軟擂碎濾出漿去渣頭用淨漿再入豆粉石灰少許打成糊表紙骨做器匣外面裝裹仍用麵糊敷乾處勿令發蒸一年後其堅如石極妙器物類第八古鐘鼎彝器辨三代之制夏尚忠商尚質周尚文其制器亦然商器質質素無文周器雕篆細密此固一定不易之論而夏器獨不然余常見夏琱戈於銅上鑲嵌以金其細如髮夏器大抵皆然歲久金脫則成陰竅以其刻畫處成凹也鑲嵌金俗訛為商嵌追逐其章金玉其相水土傳世三等古銅器銅器入土千年純青如鋪翠其色後稍淡午後乘陰翠潤欲滴間有土蝕處或穿或剝並如蝸篆自然或有斧鑿痕則偽也銅器墮水千年則純綠色而瑩如玉朱及千年綠而不瑩其蝕處如前今人皆以此二品體輕者為古殊不知器大而厚者銅性卒未盡其重止減三分之一或減半器小而薄者銅性為水土蒸淘易盡至有鋤擊破處並不見銅色惟翠綠徹骨或其中有一線紅色如丹然尚有銅聲傳世古則不曾入水土惟傳人間色紫褐而有硃砂斑甚者其斑突起如上頂辰砂入釜以沸湯煮之良久斑愈見偽者以漆調朱為之易辨銅醒三等古銅並無醒氣惟土古新出土尚帶土氣久則否若偽作者熱摩手心以擦之銅腥觸鼻可畏識文夏用鳥跡篆商用蟲魚篆周用蟲魚大篆秦用大小篆漢以小篆隸書三國用隸書晉宋以來用楷書唐秦用楷隸三代用陰識謂之偃囊字其字凹入也漠以來或用陰識其字凹間有凹者或用刀刻如鐫碑蓋陰識難鐫陽識易成陽識決非古物也款文識款篆字以為功所謂銘書鐘鼎款乃花紋以易識古器款居外而凸識居內而凹夏周器有款有識商器多無款無識款識真偽古人作事心精緻工人預四民之列非若後世賤丈夫之事故古器款必細如髮而勻整分曉無纖毫模糊識文筆畫宛宛如仰瓦而欲深淺如一亦明淨分曉無纖毫模糊此蓋用銅之精者並無砂類一也良工精妙二也不吝工夫非一朝夕所謂三設有古器所識精成模糊必是偽造其體質顏色臭味亦自不同偽古銅器其法以水銀雜錫末即今磨鏡藥是也先上在新銅器上令勻然後以釅醋硇砂末蘸勻上候如蠟茶色急入新汲水浸即成蠟茶色候如漆色急入新水浸即成漆色浸稍緩則變色矣若不入水即成純翠色三者並以新布擦令光澤其銅腥為水銀所匱並不發露然古銅聲微而清新銅聲洪而濁難逃識者之見古銅靈異古銅器入土年久受土氣深以之養花色鮮明如枝頭開速而謝遲或謝則就瓶結實若水秀傳世古則爾陶器入水千年亦然古銅多能避祟人家宜蓄之蓋山精水魅之能為祟以歷年多耳三代鍾鼎彝器歷年又過之所以能避祟范文正公家有古鏡背具十二時如博棋子每至時辰則博棋中明如月循環不休又有士人家藏十二時鐘能應時自鳴此皆古器之靈也古琴辨古琴以斷紋為證蓋琴不愈五百歲不斷愈久則斷愈多然斷有數等有蛇腹斷有紋橫截琴相去或一寸或二寸節節相似如蛇腹下紋有細紋斷如發千百條亦停勻多在琴之兩傍而近岳處則無之有面與底皆斷者又有梅花斷其絞如梅花頭此為極古非千餘載不能有也一應漆器無斷絞而琴獨有之者蓋他器用布漆琴則不用他器安閒而琴日夜為弦所激又歲久桐腐而漆相離破斷紋隱處雖腐磨礪至再重加光漆其紋愈見然真斷紋如劍鋒偽則否偽作斷紋用信州薄連紙光漆一層於上加灰紙斷則有效或於冬日以猛火烘琴熱用雪罨激烈迸或用刀刻畫於上雖可眩俗眼然決無劍鋒亦易辨古硯辨世之論硯者皆曰多用歙石蓋未知有端溪殊不知歷世以來皆採端溪至南唐李主時端溪舊坑已竭故不得已而取其次歙乃端之次其失一也近時好事者作硯譜惟分端溪上中下三岩而不知下岩有舊坑無新坑上中二岩則皆有新舊坑於歙亦然其失二也世之論端溪者惟貴紫色而不知下岩舊沆惟有漆黑青花種初未嘗紫色無他耳未曾睹古硯其失三也余慮世人貴直鑑而無心賞故述古硯辨為說端歙二溪而不他及端歙或強以為硯寧不羞見子墨客卿乎是說非古於硯者其孰知乎古畫辨古人遠矣曹丕與吳道子近世人耳猶不復見一筆況顧陸之徒其可得見之哉是故論畫當以目見者為準若還指古人曰此顧也此陸也不獨欺人實自欺耳故言山水則當以李成范寬花果則趙昌王友花竹翎毛則徐熙王筌崔日崔順之流馬則韓伯時牛則屬範二道士仙佛則孫太古神怪則石恪貓犬則何尊師周炤得此數家以為奇妙士大夫家或有收其妙跡者價亦千金矣何必遠求太古之上耳目所不及者哉辨名畫人物顧盼語言花草迎風帶露飛禽走獸精神如真山水林泉清澗幽曠屋廬深邃橋路往來山腳入水陸明水源來歷分曉有此數端雖不知名定妙手乎磨古劍勿用水及粗石用香油就細石上慢磨去鏽卻用打鐵爐邊打下鐵花三兩入木炭一兩水銀一錢同研細末摻劍上以布片蘸油擦久磨令光綿拭淨以酥塗掛壁點銅斑法硇砂寒水石各半兩金絲礬二錢膽礬三錢上為細末以清鹽水調先將銅器用綠礬和鹽水塗一次火上燒塗二次了卻上藥令乾再上掘地作一坑炭火燒令紅用醋以沃之乃入銅器於內以醋糟蓋其上乃掩以土半月出之洗乾用黃蠟揩自有諸般顏色硃砂斑先以古銅器於火上燒去油汙用好米醋塗之再燒去油卻以白礬硼砂等分為末醋和亂點銅用火燒之微紅以風木炭打磨色如胭脂甚好洗古銅先將銅器以水洗淨拭乾用搗羅過極細灰末遍擦以硬靴刷刷之然後用綿揩擦出色磨鏡白礬六錢水銀一錢白錫一錢鹿角灰一錢上將白錫入水銀和研如泥淘白入鹿角灰及明礬研極細末用如色青再洗令白畫寫鏡法雌黃一錢粉霜硇砂各一分上細研以膠水調任意於鏡上描畫人物花草故事候乾火燒片時以磨鏡藥磨去其畫自見藏鐵器不鏽以櫃子油塗之或白蠟磨之藏石灰中皆經久不鏽刀鏽以木賊草擦之自去收鐵針不鏽用烰炭末即杉木炭收之不上鏽又法以核桃殼燒灰和收之不鏽鐵鏽以木炭磨之鈍以烰炭擦之則快洗錫器以撏雞毛熱水擦之其垢盡去硬錫錫器以硇砂白礬砒霜鹽水煮之其硬如銀銅器盛酒久服之殺人不多時者無害鉛盒擦牙擦牙散置鉛盒內盛之擦牙能烏鬚髮磁石盆枕用磁石為盆枕至老而目不昏洗乳缽乳缽研乳沒兒茶之類欲洗淨以雪水洗之則淨夏月用碎冰洗之或以泥土入鹽洗之則淨漆器不可盛蓴菜雖堅漆亦壞漆上洗朱漆器上有硃紅字以鹽擦之則成紅水洗下洗琉璃用醬湯洗之油自去釜鳴釜不炊爨而自鳴者為異若然炊爨而有聲此火激其水水氣蔽於甑激發之有聲此理之常也何足異哉予乙卯歲寓南京大中橋其鄰肆以蒸餅為業每早炊爨釜湯一遍其鳴如龍嗡嗡若聞遠鍾聲大而清亮聞數里可愛連鳴數十早其餘有聞之者皆細聲而已磨刀石泥瓦用火煅過作磨刀石能起鋒磚瓦松者亦妙染花梨木蘇木二兩銼碾水二十盞煎一盞以下渣入鐵漿三兩同熬少時瓷器收用柘木變烏柘木以酒醋調礦石灰塗之一宿則作間道烏木玉石膏芸香入油熬化入蛤粉末和成膏黏玉石永不解漆桌蕩跡熱碗足蕩漆桌成跡者以錫器盛沸湯沖之其跡自去碗盞口上有垢跡者以鹽擦之自去柴灰擦之亦可篦膠以牛皮膠化開入乾白麵和調黏篦子釜底煤並灶災煤煤厚欲去不須以物刮只以皂角數條於釜底燒煙其煤自落琉璃蓋用新鍋一口水一桶入明礬晉礬各一斤煮化煮好素淨瓷器不拘多少放礬水內煮三炷香聽用外用紅花一斤洗膏六七碗硇砂五錢同膏熬將煎煮器陰乾入膏內翻動煮紅為度牧養類第九孟子曰雞豚狗彘之畜無失其時以此為王道之始則知牧養之道誠養生之大端食用之先務而況牛資之以耕馬資之以戰尤有國有家者所當知也昔陶朱公畜五牸而致富信乎牧養不可以無方矣茲取切要者編為一篇亦養生之一助也養雞法二月內先耕地一二畝令熟造秫粥灑之以稻草蓋其上則自生蟲四圍打牆高丈許棘遮其上中打一路牆平分其地每邊蓋屋數椽屋下懸筐令雞宿抱於內左邊蟲盡驅而之右右邊先為之制而漁養之右邊蟲盡復驅之左養雞生子不絕方雞生卵後食內雜以麻子喂之則常生不絕不抱生雞欲不走初來時便以清水濯足放之不走雞卵討雄法無雄雞之家母雞生蛋畢則將其蛋至灶前云雞蛋無雄灶公討雄即以其蛋擦灶突上煤一指許收之其子再抱出雞皆雄而黑屢驗若以鐵斧置雞抱蛋處其雛出盡是雄雞雞抱雛以十二月為上正月次之不失時則長成過正月半者多不育也雞生卵晨則雄暮則雌日中生子亦雄棧雞易肥香油和麵捻成指尖大塊日與十數枚食之復以土硫黃每次用末五分拌飯喂之不數日便肥亦須寨住勿令走宦雞時人謂之線雞以線縫者常相隨不離雞知子午而唳黃昏時雞啼主有天恩喜事惟一更深啼者為不祥二更啼者近子時陽將動而聲氣所感亦無妨也雌雞作雄雞啼亦為不祥易曰牝雞之晨惟家之索言其婦奪夫權而家必不興也烏骨雞其舌烏即骨烏舌不烏者但肉烏而已不去為藥倒翅雞雛雞未翅者以苕帚捍之則翅毛倒生竹雞避蟻野山雞而小者名竹雞養之可避壁蝨並白蟻聞其聲則絕影哮雞雞食辛鹹而作哮者以鼠糞香油灌之則愈或以冬瓜葉喂之解凡雞病以麻油灌之愈瘟雞病以豬肉切細喂之愈又法以雄黃拌飯喂之愈雄雞屎治陰證凡陰證脹痛四肢厥冷急無藥治可取乾雄雞糞鐵鍋炒極焦烹以醇酒滾十餘沸以絹布濾清酒乘熱飲盡量服痛即止而手足寢熱蓋雞屎性熱而能回陽也雞內金即雞腹內黃皮能愈諸疥生肌斂口大有奇效人家不以為意並不收留若知此而收之遇疥病者用之勝於乳沒兒茶養鵝鴨法鵝鴨宜過藏再伏者為種大率鵝三雌一雄鴨五雌一雄抱皆一月雞出出時四五日勿震響大鵝十子大鴨二十子小者減之相鵝鴨法鵝鴨母頭欲小口上吃有小珠滿五個多生子二個次之鵝鴨俱以生硫黃少許拌飯喂之極肥棧鵝易肥法作小屋置鵝於中惟令頭出勿令轉身將稻子煮熟任其飽食勿住口肥則自不食矣大小麥皆須煮熟不須與水鴿避邪養鴿窠坐向東南自旺以鹽水浸米食之則不投別人家乾鴿亦治陰證傷寒法與雞屎同鶴避邪而致祥養鶴要苑圃樹亭夜宿其下得風露之清氣其聲亮而肯鳴詩曰鳴鶴在陰其子和之我有好爵吾與爾彌之觀鶴不可逼近性嗜魚恐啄人目鶴病以鼠屎喂之愈燕來窠主家興諺云燕窠長主吉昌燕壘窠不乾淨主田內草多鵲窠鵲做窠於人家屋前樹上主其吉窠低主水窠高主旱鵲噪接接連聲主有遠客至喜事來故云乾鵲知來而不知往養鹿常喂豌豆則無病鹿病用鹽拌豆料喂之愈鹿尾血凡遇小兒豆疥不出用刺活鹿尾血少許於熱酒中與兒飲之則出養馬馬性惡濕而宜居高地仲春放淫順其性也季春必啖藥盛夏浸之水啗以豬脂及犬膽汁煮粥與食則肥喂料要好新草細切谷豆要淨若熱料須用冷水淘冷方可拌食每一夜須三四次起拌草料喂水有三時一曰朝飲宜少與次曰晝飲酌其中三曰暮飲必任其意凡飲水須用新水切忌宿水不潔水冬月飲訖亦須騎驟喂水不謹則成病夏月汗冬寒甚皆宜節飲卻鞍最忌當風每晨昏相其口色以知冷熱之候相馬訣馬腦欲闊臆欲平食䐬欲寬下唇欲寬口叉欲深上唇欲方鼻欲寬大眼下欲有肉面欲如剝兔眼如垂鈴胸骨欲圓耳欲如削筒頰骨欲圓鬃欲細鬐欲高項欲長細而彎排鞍欲厚脊梁欲平腰欲短促硯骨欲平脅骨欲密腹欲平汗溝欲深尾欲端尾骨欲短外腎欲小腿欲如琵琶尾欲茸細後腳欲曲曲池欲深鹿節欲曲脛骨欲細蹬肉欲厚前腳欲直蹄欲圓掌欲高馬從額上白入口害主白馬四蹄黑者凶馬目不四滿下唇急目赤睫亂者皆咬人反視馬善奔傷人目小多邪直視畏物善驚駒出生無毛者能行千里馬之良者曰騏驥即千里馬也蹄趼日騉爾雅云騉蹄趼善升陞甗郭璞注曰騉蹄如趼而健上山秦時有騉蹄苑赤曰騮青曰騏馬金畜也其蹄圓其疾臥起先前足牛土畜也其蹄坼其疾立臥先前足造化權輿云夫乾為馬坤為牛乾陽物也馬蹄故圓坤陰物也牛蹄故坼陽病則陰勝故馬病則臥陰病則陽勝故牛病則立馬陽物故起先前足牛陰物故起先後足臥先前足馬瘦瘠方貫眾每煮料取二枚同煮食之瘦蟲自出而馬肥馬傷水中結一切病方川烏草烏白芷瓜蒂豬牙皂角胡椒麝香少許馬疫病腹脹欲死方鹽汁井花水各一升和勻灌之汗出可活當用治馬藥品鬱金大黃黃連黃柏黃芩白藥子桔梗甘草山梔貝母知母各等分上為細末每服二兩酒蜜調和灌之養牛買牛宜擇項長身短胸大頭小膝低臉毛不長分脊高起立足齊者良牛角仰角短方大仰弓角紋精為上相角圓紋細者滯鈍舌紅齒白者益主舌青黑者害主前帶抱喉者凶前後無帶者吉牛袋深隱急橫出者凶牛陰逆堅凶牛尾稍長吉耳角近促不用管束耳角去遠千里不轉面短者命促牛鼻有橫理者凶脊欲尖斂臀欲厚重者吉分毛向前吉向後命短凶大足大尾大肚吉前足闊後足近吉生子臥面相曏者吉牛退齒人不得知見其齒脫得之者吉造牛欄用松慄木吉地形乾高連醜亥方吉牛忽腹脹狂走觸人方大黃皮硝黃連各為末半兩雞子清一個酒一斗和灌之牛瘴氣方用石南藤同芭蕉葉搗自然汁灌之水牛氣脹方白芷茴香桔梗官桂各一兩蒼朮細辛芍藥各一兩三錢陳皮九錢上為細末每服一兩用生薑一兩鹽一兩調水二升同煮溫灌水牛溫熱病方防風桔梗黃芩黃柏黃連芍藥知母貝母栝蔞仁鬱金明礬各二兩大黃二兩四錢上為細末每服二兩蜜一兩砂糖二兩生薑半兩水二升同灌之愈牛疥癩方用蕎麥稈灰綠礬末以香油調塗之又方以蕎麥稈疥淋汁洗之愈養羊羊性惡濕喜高燥作棧宜高常除惡穢巳時放未時收不宜早放食露水則生瘡凡羊以臘月正月生者良十一月二月生者次之大率十口三羝羝少不孕多則亂群羯羊肉補虛湯液本草云虛者補之人參羊肉之類烏羊肝明目明目羊肝丸取其肝以補肝蓋肝虛則目暗羊肝尤能大補也羊肉補虛肝可知也養犬黃色為上黑色次之不宜高大高者上桌上灶不宜養白犬年久作祟秋生者夜知覺冬生者夜多寐黑犬四足白者凶前二足白者吉青灰犬黃者吉犬生一子其家必興旺諺云犬生一子家富貴六月六日河中洗犬不生蠅犬肥大者可食犬肉性溫熱所以能補人故名地羊老人尤宜食之治犬蝨用朝腦塗皮毛上以箱合之時刻蝨俱落地養豬餵豬多用酒糟麥麩煮管仲末食之十日大肥人家養一母豬則一歲不須市肉諺云小豬放大豬棧言其小豬放走而速長大大豬棧喂多睡而易肥南方花豬俗云食之惹風疾發故疾北方花豬食之甜美其價倍於烏豬試之果然豬首能發上焦風熱痰疾如神頭面素有風火者切忌之豬蹄湯下乳最效產婦無乳宜用蔥花椒料烹食治豬發瘟皂角為末一二錢兩人有力者按倒病豬用角末吹入兩鼻孔任其打嚏出汗方止不愈者再用皮硝水煮糠食之愈又法用白蘿蔔連菜喂之愈養貓初乞小貓歸與豬肝一二片攜貓出門外用細竹枝鞭之放回家再與肝二片如此數次永不走貓黑黃者為上玳瑁次之其餘如常喂貓勿用鹹味恐生癩相貓法歌曰貓兒身短最為良眼用金銀尾用長面似虎威聲用喊老鼠聞之急避藏又曰露爪能翻瓦身長會走家嘴尖雞絕種尾大懶如蛇一法看貓口內上齶有九坎者善捉鼠八坎者次之七坎者又次之五坎者不捕鼠治貓瘦不吃飯用陳皮末四五分米湯調喂之吐出痰便愈貓生癩用柏子油塗之二三次即愈貓忌豬肉恐生癩貓生蝨蚤用桃葉搗爛擦其皮毛仍置瓶中薰之貓頭露出瓶外又法以朝腦擦之自落貓在灶突及火邊睡用豬腸入些硫黃末煨熟喂之不近火貓生一子亦吉貓睛午則豎暮則圓西陽雜俎曰貓目睛旦暮圓午則豎斂如線雜著類第十霞外雜俎嘉靖丁酉初予有蜀臺之役一日泊舟空舲灘上以候風色乃野服登岸眺望由曲徑窈窕入平林度石梁又鬥折而西行數百步見峭壁攢峰如屏如玦中有石潭水色幽幽可鑑鬚眉潭上有石筍駢立勢欲墜有泉出石竇若噴雪花潺潺落潭中傍有盤石如席石傍有古松三株虯枝奇崛綠陰葳蕤予欣然會心乃小甜石上以觀泉流俄有一翁曳杖而來癯然山人之婆似有道氣者予揖而與之坐款語移時因問翁知攝生之要乎翁曰吾每日只服一劑快活無憂散或遇事不如意則服一劑和氣湯又問翁居閒處獨亦觀書杏翁曰吾壯服膺九字經今耄矣慚負此經多矣又問翁於世亦有求乎翁曰人生分定機關計較都不濟事俟命而已吾何求乎已而蒼然暮色自回山而出予遂與翁別翁袖中探此書授予且告曰此鐵腳道人所纂也敢以為上客之壽予返而登舟取所授書閱之翁石上所語者般般在焉連日三複愛其言簡易警策若終身行之受用不了因命人楷書數通以寄鄉關親友東谷居士敖英書於瞿塘峽口舟中快活無憂散除煩惱斷妄想上二味等分為極細末用清淨湯調下此方藥味雖少奏功極大且藥性不寒不熱不苦不辛不必遠求產藥之區自我求之自我得之雖神農本草所未載東垣丹溪所未論及自是人間一種妙藥苟能日服一劑勝服四君子湯百劑也凡合此藥先要灑掃一淨室窗欞虛明前列小檻栽花種竹貯水養魚室中設一幾一榻一蒲圓每日踟趺而靜瞑目調息服其前藥至二三炷香任意所適或散步空庭迎風弄月或展玩法帖名畫或歌古詩數首倦時則啜苦茶一甌就枕偃臥久久覺神氣清爽天君泰然不知人間有煩惱不見我心有煩惱則效可睹矣和氣湯專治一切客氣怒氣怨氣抑鬱不平之氣先用一個忍字後用一個忘字上二味和勻用不語唾嚥下此方先之以忍可免一朝之忿也繼之以忘可無終身之憾也服後更飲醇酒五七杯半酣尤佳九字經勿欺心謹言語守廉恥此經字約而義博知之甚易行之甚難能實踐之可為君子孔子沽酒市脯不食鄭康成訓沽為榷沽之沽朱夫子曰沽市皆買也蓋從鄭注詩云無酒沽我毛氏注謂一宿酒曰沽蓋三代無沽酒者至漢武帝時方有榷沽則沽酒似以一宿酒為是通用諸方補遺八白散治勞汗當風寒薄郁痤䵟點之類白丁香白芨白殭蠶白牽牛杜蒺藜新升麻內白者佳三奈白茯苓白附子白芷白蘞各半兩上為細末至夜津調塗面明旦以瑩肌如玉散洗之瑩肌如玉散治䵟點粉刺之類並去垢膩潤澤肌膚楮實子五兩白莖一兩升麻內白者半兩甘松七錢白丁香砂仁連皮各半兩糯米一升二合為末三奈三錢綠豆五兩研為末肥皂角三斤水濕炙乾再濕再炙去皮及子得二斤為末另篩入藥上六味為末入糯米粉綠豆末皂角末同和勻擦面面油摩風膏麻黃三錢升麻防風白蘞各二錢白芨羌活各一錢香油半斤上六味入檀香當歸各一錢用綿包定入油中熬之用銀石器熬得所澄清去渣入黃蠟一兩溶化提起入麝少許香身丸治人身汗氣惡氣口齒氣零陵香藿香各二兩白芷丁香香附子當歸檳榔益智仁各一兩甘松官桂各半兩白豆蔻三錢麝香三分上為末煉蜜丸如豆大噙化久則透體皆香烏雲煎治女人發黃不潤用此妙不可言香油二斤柏子油二兩另貯訶子半兩沒石子六枚百藥煎三兩倍子炒黑一兩酸石榴皮旱蓮草各半兩豬膽二枚另貯膽礬一錢上為粗末先將香油鍋內熬數沸然後將藥末下入油內熬少時傾出汕入罐內微冷入柏油攪勻漸冷下後項細料藥甘松三奈白芷藁本零陵香藿香各三錢為粗末絹囊盛之入油浸每日攪三次如此十日後先一日以灰湯洗髮淨次日捺油不數日其發黑紺潤澤香美永不惹灰更不須再洗香肥皂北京本司方肥皂不拘多少劈作兩邊用清水煮乾取起曬半乾切碎曬極干為末檀香真排草甘松三奈白芷細辛辛夷藁本獨活丁香廣零陵各半兩為末等分同肥皂末對半煉蜜為丸用去雀斑加鷹條白丁白蒺藜木賊密陀僧福建香茶餅醒宿酒利疾順氣生津檀香沉香各末二錢孩兒茶一兩白豆蔻細茶甘草各末半兩冰片二分煉蜜糯米糊丸粟米大噙化合香南京回回方真排草檀香各四兩牙香二兩沉香三錢藿香單枝者二兩廣木香二錢丁香甘松各半兩酥合油一兩廣零陵一兩麝香一錢為末和勻衣香解汗氣甘松三奈白芷各一錢細辛藁本獨活各兩陳皮官桂辛夷花川芎黃芩大黃上為粗末日久再研細末尤香北京上科香肥皂五分一丸肥皂十斤檀香一斤排草一斤沉香半斤丁香三兩黃煙一兩零陵香二兩甘松三奈各二兩白芷四兩藿香二兩官桂二兩細辛辛夷花天花粉藁本各一兩梅桂花四兩片腦半兩白丁香鷹條各半兩麝香一兩白芨面二斤半煉蜜五斤約和勻作八百丸香肥皂白芷朝腦甘松三奈細辛藿香熟棗各一兩豬胰另搗如泥肥皂半斤煮乾為末上為末煉蜜丸彈子大用玉容丸白芨白附子石榴皮東瓜仁大棗去皮核各一兩以好酒浸三日早起洗面畢洗之如玉八仙茶粳米黃粟米黃豆赤小豆綠豆五件各炒香各一斤為末細茶一斤芝麻五合花椒一合小茴香一合白乾薑一兩炮白鹽炒一兩以上十一味俱為細末和合一處白麵炒黃色與十一味等分拌勻與後項點湯服胡桃松子棗子瓜仁白砂糖之類任意加之每服二三匙白湯點用上料安息香方北京本司製法檀香八斤排草四斤沉香一斤丁香乳香黃煙蘭苔木香各十兩麝香三兩酥合油一斤安息香五兩欖油二斤白芨面蜂蜜五斤上各為細末以酥欖息香和蜜熬化漸漸下香末調和得所作柄上陰晾一日曬乾收中料安息香檀香四斤排草牙香各三斤零陵香上草青遠皮各一斤丁香蘭苔乳香黃煙木香各六兩麝香一兩六錢酥合油半斤欖油二斤白芨面蜂蜜各四斤外加沉速一斤為上中料製法同前下料安息香千香料十斤芸香五斤紅柏面六斤茅香面四斤半牙香七斤青遠皮二斤零陵香二斤上草即馬細辛蘭苔各二斤白芨面四斤半欖油四斤蜂蜜四斤製法同前龍掛香餅料檀香沉香各二斤排草一斤乳香木香丁香蘭苔各四兩黃煙六兩麝香八錢炭末半斤酥合油十二兩欖油六斤蜜六斤上和法如前扇墜香檀香沉香各二斤排草半斤零陵香丁香酥合油各半兩桂枝黃板即黃速甘松三奈白芷各四兩麝香一兩冰片半兩白芨面一斤蜜四斤調和得所做之乾燈乳香硫黃松香乾漆各一兩黑豆末四兩硝石半斤上為末生漆為丸如皂角子大鐵板上點燒一丸一晝夜不滅水燈硝石滑石枯礬硫黃枇杷葉各等分上為末先將油水各一碗慢火以槐枝攪勻次入藥末半兩又攪勻點燈焰高如法不滅風前點燈乾漆石硫黃硝石各一兩瀝清黑豆末黃蠟各三兩上為末先將瀝清蠟化成汁入藥末用布條子蘸作燭點在風前不滅燈光虹貫白項蚯蚓二條以午上楊枝貫之浸香油內過三七日後用點燈兩虹光相貫可愛造獸灰硬灰末鐵屎末各十斤生芙蓉三斤上為末合搗入精米膠和捏作獸形曬乾以燃炭燒亦停三日不滅如不用以冷灰消之難消灰烰炭為末塊子石灰焠水攪取濃汁上將灰汁和炭末用竹筒作兩半合定實炭成條脫出曬乾燒用終日不消欲作獸形任意為之湘子煮袍鞋茯苓管仲天仙子狼毒五靈脂草烏白礬各一兩上為末水一桶同藥下鍋煮袍一領鞋一雙汁盡曬乾不透風寒夏涼不漏水跌打傷重滅瘢痕法熟麻油半碗黃酒一碗桃仁去皮尖研三錢沒藥五分上同煎數沸服畢臥火燒熱地上一夜疼止腫消無痕跡救荒法黑豆一升管仲一斤以管仲細銼同豆相拌煮熟去管仲曬豆乾有餘汁又入豆食盡又曬豆乾收之每用五七粒空心嚼服任食百草枝葉松柏尤美可味可飽避難止小兒啼以綿為小球隨兒大小為之甘草濃煎汁或煮膠棗浸過有甜味隨身帶之臨時以唾津潤透置兒口中過則去之
