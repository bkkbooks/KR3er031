body:
  text: 卷之四十八虛損門病機虛損敘論上古天真論篇帝曰余聞上古之人春秋皆度百歲而動作不衰今時之人年半百而動作皆衰者時世異耶人將失之耶岐伯對曰上古之人其知道者法於陰陽和於術數飲食有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲乃去今時之人不然以酒為漿以妄為常醉以入房以欲竭其精以耗散其真不知持滿不時御神務快其心逆於生樂起居無節故半百而衰也夫上古聖人之教下也皆謂虛邪賊風避之有時恬淡虛無真氣從之精神內守病安從來又曰年至四十而陰氣自半起居衰矣又曰男子盡八八而精絶女子盡七七而經斷矣夫以陰氣之成止供給得三十年之運用已先虧矣人之情欲無涯此難成易虧之陰氣若之何而可以縱欲也又曰飲食飽甚汗出於胃驚而奪精汗出於心持重行遠汗出於腎疾走恐懼汗出於肝搖體苦勞汗出於脾又曰久視傷血入臥傷氣久坐傷肉久立傷骨久行傷筋若夫七情五心之火飛越男女聲色之欲過淫是虛損之所由也難經云因虛而致五損一損損於皮毛皮聚而毛落二損損於血脈血脈虛少不能榮於五臟六腑三損損於肌肉肌肉消瘦飲食不為肌膚四損損於筋筋緩不能自收持五損損於骨骨痿不能起於床反此者至脈之病也從上下者骨痿不能起於床者死從下上者皮聚而毛落者死損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精機要曰虛損之疾寒熱因虛而感也感寒則損陽陽虛則陰盛自上而下治之宜以辛甘淡過於胃則不可治也感熱則損陰陰虛則陽盛故損自下而上治之宜以苦酸鹹過於脾則不可治也自上而損者一損損於肺皮聚而毛落二損損於心血脈虛少不榮於臟腑婦人月水不通三損損於胃飲食不為肌膚自下而損者一損損於腎骨痿不能起於床二損損於肝筋緩不能自收持三損損於脾飲食不能消克論曰心肺損而色蔽腎肝損而形痿谷不能化而脾損感此病者皆損之病也漸漬之深皆虛勞之疾也虛為勞傷中氣此陽氣之虛也從東垣補法經曰陰虛生內熱云云又曰勞則氣耗勞則喘且汗出內外皆熱故氣耗矣夫喜怒不節起居不常有所勞傷皆損其氣氣衰則火旺火旺則乘其脾土土主四肢故困熱無氣以動懶於言語動作喘乏表熱自汗心煩不安當病之時宜安心靜坐以養其氣以甘寒瀉其火熱以酸味收其散氣以甘溫補其中氣經云勞者溫之損者益之是也精奪為虛內經通評虛實論曰精氣奪則虛謂精氣奪去而減少也玉機謂人稟中和之氣而生有三曰元精曰元氣曰元神三者本身中之真精真氣真脈也夫精乃臟腑之真元非榮血之比故曰天癸氣乃臟腑之大經為動靜之主故曰神機脈為天真委和之一氣經謂其名有三命之本氣之神形之道其機運用升降皆隨氣而動因血而榮精氣資始相生不失以養一身司命形質之體用也至若精不足則氣失資化氣不足則血失所榮血不足則氣無所附天真散亂則精氣神無所稟命矣是以相生長養之道精化氣氣生神而皆稟乎身中臟腑之真也夫氣血從乎榮衛榮衛又系乎經隧者胃之水穀氣化此經隧不能不生榮衛榮衛不能不散而養經脈經脈不能不順而資天真為生養涵容造化形質理之然也凡人之視聽言動壯壽皆此理之常也疾病盲聵關格夭折皆此理之失也故有精神氣血不足則病天真散亂則死者皆由平日攝養之過與不及動止之不循常度也經云出入廢則神機化滅升降息則氣力孤危然房勞甚則精氣竭而神無所依氣無所附則忽致暴絶也竊常第究先哲經義濟生微旨益氣補肺補精滋腎皆滋化其源也蓋人之精血常不足加之數奪其真資化失則榮氣乃虛虛則衛氣不固精滑脫腎氣竭而陰微不能與胃氣上升以接清陽之氣故病多頭重或痛氣弱而食少元氣下陷脈即微弱外散欲絶而虛洪或見損脈此實元精不足之所致非有外感賊邪之病也虛為陰氣不足此陰血之虛也從丹溪補法丹溪曰人受天地之氣以生天之陽氣為氣地之陰氣為血故氣常有餘血常不足何以言之天地為萬物父母天大也為陽而運於地之外地居天之中為陰天之大氣舉之日實也屬陽而運於月之外月缺也屬陰稟日之光以為明故人身之陰陽其消長亦視月之盈虧焉夫人之生也男子十六歲而精通女子十四歲而經行是有形之後猶有待於乳哺水穀之養陰氣始成而可與陽氣為配以能成人而為人父母古人必待三十二十而後嫁娶可見陰氣之難於成而古人之善於保養也錢仲陽所謂腎有補而無瀉正是此意又按禮記注曰惟五十然後養陰者有以加經曰年至四十陰氣自半而起居衰矣又曰男子六十四而精絶女子四十九而經斷又曰陽者天氣也主外陰者地氣也主內故陽道實陰道虛非吾之過論也或曰仰觀俯察乎天地日月既若是之不同何寒暑溫涼之見於四季者又如此之相等而無降殺也曰動極復靜靜極復動猶人之呼吸也寒者吸之極氣之沉也熱者噓之極氣之浮也溫者噓之微氣之升也涼者吸之微氣之降也一噓一吸所乘之機有以似之宜其相等而無降殺此以流行之用而言前以大小虛實言者蓋其對偶之體也或曰遠取諸天地日月近取諸男女之身曰有餘曰不足吾知之矣人在氣交之中令欲順陰陽之理而為攝養之法如之何則可曰主閉藏者腎司疏瀉者肝也二臟皆有相火而其繫上屬於心心君火也為物所感則易動於心心動則相火翕然而隨雖不交會亦暗流而滲泄癸所以聖人只是教人收心養性其旨深矣天地以五行更迭衰旺而成四時人之五臟六腑亦應之而衰旺四月屬巳五月屬午為火大旺火為肺金之夫火旺則金衰六月屬未屬土大旺土為水之夫土旺則水衰況腎水常藉肺為母以補助其不足故內經諄諄然資其化源也古人以夏月必獨宿而淡味兢兢業業於愛謹保養金水二臟正嫌火土之旺爾又曰藏精者春不病溫十月屬亥十一月屬子正火氣潛伏閉藏以養其本然之真而為來春升動發生之本苦於此而不恣欲以自戕至春升之際根本壯實氣不輕浮焉有溫熱之病夫夏月火土之旺冬月火氣之伏此論一年之虛耳若上弦前下弦後月廓空亦為一月之虛大風大霧虹電飛雹暴寒暴熱日月薄蝕憂愁忿怒驚恐悲哀醉飽滿倦謀慮勤動又皆為一日之虛若病患初退瘡痍正作又不止於一日之虛令人多有春末夏初患頭痛腳軟食少體熱仲景謂春夏劇秋冬瘥而肺弦大者正世俗謂注夏病也若犯此四者之虛似難免此夫當壯年便有老態仰事俯育一切墮廢興言至此深可驚懊古人謂不見可欲使心不亂夫以溫柔之感於體聲音之感於耳顏色之感於目馨香之感於鼻誰是鐵心漢不為之動善養生者於此五個月內出居於外苟值一月之虛一日之虛亦宜暫遠帷幄各自珍重保全天和庶可滋助化源水得所養陰無虧欠與陽平齊然後陽得所附而無飛越之尤遂成地天之泰何病之可言願相與遵守期無負敬身之教幸甚虛損病多由貪酒嗜欲致之虛損之證多由色欲過度喜怒不節起居不時飲食恣欲有所勞傷皆損其氣氣衰則火旺火旺則乘其脾土而胃氣散解不能滋營百脈灌注臟腑衛護周身故虛損之證生焉病則百肺煩痛腰腳疼軟胸滿氣短心煩不安耳鳴目眩咳嗽寒熱夜作盜汗遺精白濁飧泄食少無味不為肌膚或睡中驚悸午後發熱倦怠無力此皆虛損之候也脈候脈經曰脈來軟者為虛緩者為虛微者為虛弱者為虛弦者為虛脈來細而微者血氣俱虛脈小者血氣俱少要略曰脈芤者為血虛脈沉遲而小者脫氣脈大如蔥管血虛即陰虛而火鼓上是也又云大而無力為陽虛脈大而芤者脫血平人脈大為虛脈微細者盜汗數而無力陰虛尺弱軟澀為下虛寸弱而軟為上虛尺軟滑疾為血虛兩關沉細為虛脈微弱骨肉相失聲嘶嘔血陽事不舉晝涼夜熱者死治法經曰形不足者溫之以氣精不足者補之以味虞氏謂味陰味也補精以陰求其本也然味乃如谷粟菜果出於天賦自然沖和之味故有養人補陰之功非醯醬烹飪之厚味出於人為者經曰陰之所生本在五味非天賦之味乎曰陰之五宮傷在五味非人為之味乎善攝生者不可以味為補精而遂恣於口腹以自速其禍也謂溫之以氣溫存以養使氣自充則形完矣曰補曰溫各有其旨局方悉以溫熱藥佐輔名曰溫補豈理也哉又曰人年老或虛損精血俱耗陰不足以配陽孤陽幾於飛越天生胃氣尚爾留連又藉水穀之陰故羈縻而定耳局方用溫劑劫虛蓋脾得溫而食進故亦暫可夫質有厚薄病有淺深設或失手何以取救吾寧稍遲計出萬全溫劑補虛決不敢用補腎滋陰要識養脾之助甫見世人補腎者悉以補陰丸黃柏知母龜板地黃滋陰補血者悉以四物湯黃柏知母之屬服之經年屢歲而陰愈虛血愈弱甚而致於羸劣發熱氣喘胸滿而死者何也蓋徒知其養血滋陰之標四物補陰丸之類是也殊不知養血滋陰之本則非四物補陰之藥也經云飲入於胃遊溢精氣上歸於脾脾氣散精上歸於肺肺朝百脈輸精於脾毛毛脈合精行氣於府府精神明流於四臟氣歸於權衡由此觀之則血生化之本源腎水溉灌之也不有賴於脾氣乎故服四物湯而血不盈者脾氣之不化生也服補陰丸而陰不濟者亦脾氣之不輸升也此之謂不知本其何以能養血滋陰矣乎不但陰血之不能滋若久服不已必致損脾陽亦因之而憊也胃氣一衰死期追矣奚暇謂陰血哉虛損不治浸變成勞虛損肉消咳嗽有熱遷延日久六脈弦數則成勞證至若勞證一成雖有智者莫能為矣易曰履霜堅冰至所謂君子當謹其微也為醫流者尤宜審之熱藥補虛之失局方例用辛香燥熱之劑補虛是以火濟火不無實實虛虛之禍若菟絲子丸之治腎虛金叉石斛丸之治氣不足茴香丸之治腎臟虛冷玉霜丸之治氣虛養正丹之治諸虛薑附丸之治脾虛弱接氣丹之治真元虛四神丹之治五臟虛蓯蓉大補丸之治元臟虛鍾乳白澤丸之治諸虛三建湯之治氣不足甚者內聚丹劑悉曰補脾胃補腎補五臟補血氣而方各條之下曰口苦面黃曰氣促喘急曰口淡舌澀曰噫酸曰舌乾曰溺數曰水道澀痛曰唇口乾燥悉是明其熱證如何類聚燥熱而謂可以健脾溫胃而滋腎補氣乎骨碎補丸治肝腎風虛乳香宣經丸治體虛換腿丸治足三陰經虛或因感風而虛或因虛而感寒既曰體虛肝腎虛足三陰經虛病非輕小理宜補養而自然銅半夏威靈仙荊芥地龍川楝烏藥防風牽牛靈芝草烏羌活石南天麻南星檳榔等疏通燥疾之藥俱補劑之大半果可以補虛乎地仙丹既曰補腎而滋補之藥僭燥走竄之藥相半用之腎惡燥而謂可以補腎乎假曰足少陰經非附子輩不能自達八味丸仲景腎經藥也八兩地黃以一兩附子佐之觀此則是非可得而定矣用滋補藥不過鹿角膠霜乳酪參歸之類詳見斑龍論中或者妄施伏火金石附子燥熱等輩以致血氣乾涸心腎不交故火炎上為痰咳為咯血為口乾為五心煩熱水走於下為腳軟為遺精為赤白濁為小便滑數誤矣哉虛勞脈大抵多弦或浮大或數皆虛損之候也大者易治血氣未定可飲而止弦者難治血氣已耗未易補之若帶雙弦則為賊邪侵脾為尤難治加脈數則殆矣丹溪治老人虛損但覺小水短少即是病進宜以人參白朮為君牛膝芍藥為臣陳皮茯苓為佐春加川芎夏加黃芩麥門冬秋冬加當歸倍生薑一日一帖小水長如舊乃止此老人養生捷法也少年人虛損多是酒色無度耗散太過凡覺五心熱夜出盜汗略見咳嗽便宜滋陰之藥遠房室脾胃弱者清補脾胃心腎交養決無後患不可峻用寒涼亦不可峻用辛熱鎖陽鹿茸之類人年四十以後陰氣弱者脈不洪大庶可以用溫暖如五精丸八味丸之類未登四十之人不可輕服有誤用之反耗真陰變生他病而不能救矣知命者慎之藥方補氣補陽諸方局方四君子湯治諸氣虛脾弱無力或泄瀉飲食少方加減見氣門人參白朮炒各二錢白茯苓一錢炙甘草五分上水二盞生薑三片大棗二枚粳米百粒煎七分不拘時服六君子湯即四君子湯加陳皮半夏各一錢胸膈飽悶嘔吐加之附子理中湯治胃弱氣虛腹痛或瀉方見脾胃門東垣補中益氣湯方見內傷門治勞倦傷脾胃氣下陷發熱不退飲食無味四肢無力以動言語懶發升陽益胃湯方見內傷門治脫血益氣古聖之法也先補胃氣以助生髮之氣故曰陽生陰長諸甘藥為之先務舉世惟知其補氣殊不知甘能生血此陽生陰長之理故先理胃氣人身中之陰陽百脈皆以穀氣為本經云失谷則亡從可知矣金匱小建中湯治虛勞裡急腹痛失精四肢痠疼煩熱咽乾口燥桂枝錢半芍藥三錢炙甘草一錢大棗二枚生薑一錢阿膠半合上咀水煎服黃耆建中湯治虛勞裡急諸不足即小建中加黃耆一錢煎服十味人參散人參黃耆散二方並見熱門並治氣虛發熱嚴氏耆附湯治氣虛陽弱虛汗不止肢體倦怠黃耆蜜炙附子制各等分上咀每服四錢加薑水煎服參附湯治陽不足上氣喘急自汗盜汗氣短頭暈人參附子制各等分上咀每服四錢加薑煎服瑞竹補氣湯治氣虛脈浮而弱怔忡無力自汗黃耆三兩蜜水炒人參甘草炙各半兩麥門冬桔梗各一兩上咀每服四錢薑三片煎服濟生茯神湯治脈虛咳則心痛喉中介或腫人參黃耆茯神遠志麥門冬通草桔梗甘草各等分上咀每服五錢加薑三片煎服和劑養氣丹治諸虛百損真陽不固氣不升降或發喘促一切體弱氣虛之人並宜服此禹餘糧石紫石英赤石脂代赭石磁石以上各煅法見制門附子肉蓯蓉當歸茴香破故紙木香丁香肉桂肉豆蔻巴戟山藥鹿茸白茯苓沉香遠志乳香沒藥五靈脂硃砂製法並見本門陽起石煅鍾乳粉俱另研各一兩上為細末糯米糊丸梧桐子大每服四十丸白湯下三建湯治元陽素虛寒邪外攻手足厥冷六脈沉微大小便數滑凡中風潮涎不省人事傷寒陰證皆可服之大附子大川烏天雄各要制過三錢上水二盞薑十片煎一盞不拘時服自汗加桂浮小麥氣逆者加沉香胃冷加丁香胡椒復陽丹治陽虛手足厥冷暴大下脈細陰證並可服接陽丹治陰寒手足厥冷腰腹疼痛真氣不足衰憊欲絶沉香蓽澄茄散附子茴香散二方見痼冷門黑錫丹養正丹二方見頭暈門並能接元陽升降水火一切吐逆霍亂腹痛參苓白朮散治脾胃虛弱不進飲食及久瀉方見脾胃門補血補陰諸劑局方四物湯治血虛榮弱一切血病以此為主當歸熟地黃川芎芍藥各等分上咀每服六錢水盞半煎服當歸補血湯滋理榮血不足方見熱門青囊仙傳斑龍丸壯精神除百病養氣血補百損大有奇效老人虛人常服延年益壽昔蜀中有道人酣歌酒肆曰尾閭不禁滄海竭九轉金丹都慢説惟有斑龍頂上珠能補玉堂關下血真人仲源索方傳世鹿角霜鹿角膠菟絲子製法並見備録柏子仁熟地黃各半斤白茯苓補骨脂各四兩上將膠先溶化量入無灰酒打糊丸梧桐子大每服六七十丸空心鹽湯酒任下斑龍二至丸鹿角霜鹿角膠各一斤川黃柏知母各酒炒半斤生地黃熟地黃酒浸各四兩天門冬酒浸去心麥門冬同上各四兩何首烏去皮搗如彈子大乳汁拌蒸曬乾又拌九次止當歸白茯苓上為細末煉蜜丸梧桐子大空心鹽酒下精方太極丸人之五臟配天地之五行一有不和是以為病藥有五味各主五臟常以適調因配合諸味使人神氣神心肺腎保和無遺生化之源既清邪不能入矣故曰太極黃柏屬水滋賢味苦以堅精去皮鹽酒炒勻至褐色取淨末三兩六錢知母屬金主潤肺苦以降火佐黃柏為水金相生去毛淨酒浸宿微炒取淨末三兩六錢破故紙屬火收斂神明能使心包之火與命門之火相通故元陽堅固骨髓充實澀以治胞新瓦炒香淨羅二兩八錢胡桃仁屬木潤血血惡燥故潤之佐故紙為木火相生古書謂黃柏無知母故紙無胡桃皆不成功去皮研三兩二錢砂仁屬土醒脾開胃引諸藥歸宿丹田和五臟中和之氣如天以土為中氣也一兩分二處以一處同花椒五錢炒去椒上為細末煉蜜丸梧桐子大每服五七十丸早晚沸湯茶酒任下服至三年百病消除終身服之無間可以成地仙矣丹溪大補陰丸降陰火補腎水黃柏鹽酒炒褐色知母制同上各四兩熟地黃酒洗焙乾搗爛龜板酥炙黃各六兩上為細末豬脊髓和煉蜜為丸梧桐子大每服五六十丸空心薑鹽湯送下補陰丸治同前一名虎潛丸黃柏制知母制熟地黃酒洗各三兩龜板酥炙四兩白芍藥煨當歸牛膝各二兩虎脛骨酥炙鎖陽酥炙陳皮各一兩半上為細末酒煮羯肉為丸梧桐子大冬加乾薑半兩每服五十丸薑鹽湯或酒下加味虎潛丸治諸虛不足腰腿疼痛行步無力壯元陽滋腎水熟地黃酒洗八兩黃柏蜜炒褐色人參黃耆蜜炙當歸酒洗破故紙炒鎖陽酒洗龜板酥炙茯苓杜仲酥炙斷絲牛膝酒洗菟絲子制知母酒炒虎骨酥炙各二兩山藥炒枸杞子各二兩上為細末煉蜜和豬脊髓丸如梧桐子大每服五六十丸空心鹽湯或酒任下食乾物壓之滋陰大補丸治同前牛膝酒洗山藥各兩半杜仲制巴戟去心山茱萸肉肉蓯蓉酒洗新瓦焙乾五味子白茯苓小茴香炒遠志甘草同煮去心各一兩石菖蒲枸杞子各半兩熟地黃二兩上為細末紅棗肉和煉蜜丸梧桐子大每服七十丸空心淡鹽湯或溫酒任下與虎潛丸間服之佳所謂補陰和陽生血益精潤肌膚強筋骨性味清而不