十丸空心臨臥時薑湯鹽湯沸湯任下冬月溫酒送下祕方雀卵菟絲丸助陽固精最為奇效此方純正久服有益無損視之桂附麝沉等藥助陽取效一時久則致火大有間矣菟絲子二斤重湯酒煮三日夜干用石臼杵搗為泥塊作餅子炕干為細末酒糊丸作餅子曬乾雀卵一百枚去黃用白和菟絲淨末一斤上煉蜜為丸梧桐子大空心酒下七十丸祕方御米酒方壯筋骨暢經絡養精元益神氣久服行步如飛延年益嗣有通仙之妙真薏苡米酒十斗即一百斤霜茄根切片真桑寄生銼五加皮切蒼耳子炒去刺各半斤甘州枸杞子淨川牛膝去蘆各一斤上各制淨稱分兩每味分四劑合為一劑酒一百斤亦分四壇各入藥煮三炷香取放土地上退火性一七可飲久窨尤佳早晚隨量飲微醺為度此藥雖平易有奇效不可以其簡而忽之局方大造丸此方久服耳目聰明鬚髮烏黑延年益壽有奪造化之大功故名大造丸亦治心風失志虛勞危絶可以回生男婦無子者服之生男其效具下紫河車一具或云男用男胎女用女胎一云用初胎佳以米泔洗淨新瓦上焙乾或用砂鍋銀鍋重湯煮爛搗夫紫河車者天地之先陰陽之祖乾坤之橐籥鉛汞之匡郭胚腪將兆九九數足我則載而乘故謂河車歷驗篇中名曰混沌皮釋氏書謂袈裟制服有接命之功男瘦女弱素無孕育者服此成胎延壽咸有左驗養生書云病蛾無能繭之蠶蕊破無結實之果蓋無藉此以返本還元以人補人之意非金石草木夜霜曉露之比丹溪云河車者父精母血相合而成乃造化自然生成之物真元氣也用此栽接至理存焉故治虛勞甚者用之但非可常得之物且或有所嫌忌故人不知用耳敗龜板年久自死者童便浸三日酥炙二兩黃柏鹽酒炒褐色一兩五錢邪火止能動欲不能生物俗醫用藥峻補無益有損些二味滋陰除相火為河車之佐沖和而無弊也杜仲酥炙斷絲一兩半主腎虧精損腰痛余溺牛膝酒洗一兩二錢滋陰壯陽益精填髓引下為使以上四味足少陰經腎藥古方加陳皮名補腎丸配河車名補天丸懷慶熟地黃肥實者二兩半入砂仁末六錢白茯苓二兩一塊稀絹包同入銀鍋好酒煮七次去茯苓不用蓋地黃得茯苓砂仁黃柏則入足少陰腎經名天乙生水天門冬去心一兩二錢麥門冬去心一兩二錢夏加五味子七錢以上四味手少陰肺經藥二冬保肺氣不受火刑降肺火生腎水其性有降無升得參一兩則補而降本草云主多生子以此也二地二冬人參名固本丸麥冬五味人參名生脈散處方配合要之有道大抵以金水二臟為生化之源用補肺腎二藥及人參補氣地黃補血合河車以成大造丸上除地黃另用石木臼舂一日余共為末和地黃膏再加酒米糊丸小豆大每服八十丸空心臨臥鹽湯沸湯薑湯任下冬月好酒下婦人加當歸二兩去龜板男子遺精赤白濁婦人帶下並加牡蠣兩半一人稟弱陽事痿因以此味配他藥為一方服之不二料體貌頓異嗣生數子一婦人年近六十衰憊日侵用此味加補血藥作丸服亦效自後自制常服壽至九十強健如壯一人大病後久不能作聲服此藥數次呼聲頓出一人足痿不任地者半年服此一料病去其半用自産者尤妙豈其本所自出而各從其類也若多女少男夫婦咸服輒更多男病革垂死一服可更延一二日大抵補益妙用百發百中自有不期然而然者矣久服卻病延年功奪造化豈日小補云乎故以大造名之配合諸藥亦有至理並注各味之下還元丹一名延年益壽不老丹此藥大補元氣服一月自覺異常功效不可盡述何首烏鮮者一斤用竹刀割去皮乾者米泔水浸軟刮皮分四制忌鐵器惟以砂鍋瓦器盛酒芝麻蒸一次曬乾羊肉一斤蒸一次曬乾酒拌過蒸一次曬乾黑豆蒸一次曬乾一方黑羊肉一斤黑豆三合量用水上加竹炊篦置藥蓋蒸熟曬乾生地黃熟地黃各以酒浸焙乾各取三兩淨末天門冬麥門冬各以米泔水浸去心各取淨末兩人參取末五錢白茯苓三兩酒浸曬乾地骨皮三兩童便浸曬乾各取末一兩俱忌鐵器上取乳汁六兩白蜜十兩同煉一器中合前末為膏瓷器貯勿泄氣不拘時服一二服沸湯漱七珍至寶丹補益之功甚大莫能盡述與延壽丹差二味何首烏赤白一斤酒浸竹刀刮去皮同牛膝蒸破故紙半斤炒香為末菟絲子半斤如法制川牛膝去蘆半斤淨用何首烏黑豆三升入甑重層安甑內蒸熟取出去豆共塢如泥當歸四兩酒浸焙乾赤茯苓一斤用牛乳五升煮乳干為度白茯苓一斤人乳五升煮乾為度俱用銀鍋枸杞子四兩上如法制為細末同煉蜜和勻搗極熟丸如雞頭子大每服一丸日進三服空心溫酒午後薑湯臨臥鹽湯服初服三四日後小便多或雜色是五臟中雜病出二七日後唇紅生津液再不夜起若後有腹痛勿懼是搜病也三七日後身體輕便兩乳間紅潤一月鼻覺辛酸是諸風百痛皆出四十九日補血生精瀉火益水強筋骨黑鬚發三月大存奇效加味坎離丸生精養血升水降火王道之劑也川黃柏八兩二兩酒浸二兩鹽水浸二兩人乳浸二兩蜜水浸曬乾炒褐色知母八兩鹽酒浸炒當歸川芎白芍藥各四兩酒浸一日曬乾熟地黃八兩用白茯苓四兩打碎砂仁二兩三味同人絹袋中好酒二瓶煮乾去茯苓陂仁止用地黃上銼勻鋪筐中日曬夜露三日為度白蜜一斤半重湯煉成珠和藥末搗丸如梧桐子大每服八十丸空心鹽湯下冬月酒下柏子養心丸寧心保神益血固精祛煩熱除驚悸聰明不忘柏子仁搗用紙略去油枸杞子生地黃酒洗蒸曬乾又酒拌蒸五次為度茯神去木麥門冬去心玄參各二兩當歸身酒洗三兩石菖蒲去毛甘草各半兩上為細末除柏子仁地黃搗如泥余藥和入加煉蜜丸如梧桐子大每服五十丸睡時白湯下少睡不成寐加酸棗仁一兩健忘者加遠志肉一兩萬氏烏雞丸治童子室女身熱吐紅痰血盜汗食少四肢乏力大人同人參黃耆當歸白朮生地黃白芍藥麥門冬五味子柴胡前胡秦艽地骨皮陳皮桑白皮銀柴胡胡黃連黃芩黃柏知母貝母各兩上各制銼為細末用烏骨白毛雞一隻耳有緑色腦有金色者為佳麻子餵七日縛死干撏去毛並雜納藥於雞肚中用緑兄一升五合浸濕鋪入小甑內三寸厚又將青蒿四兩襯之放雞在上仍以緑豆蓋之蒸爛將雞拆碎同藥曬乾磨細末骨用酥炙黃研末湯泡蒸餅為丸梧桐子大每服七十丸空心米湯下仙茅丸壯筋骨益精神明目黑髭發仙茅二斤米泔浸五日去赤子用銅刀銼夏浸三日陰乾淨稱一兩車前子十二兩微炒蒼朮二斤米泔浸五日刮去皮焙乾淨一斤枸杞子一斤柏子仁微炒另研白茯苓小茴香炒各八兩生地黃酒洗熟地黃酒浸各四兩上為細末酒煮糊丸梧桐子大每服五十丸漸加至八十丸空心食前溫酒送下良方加味青蛾丸補諸虛不足滋益陰陽美顏容健腰膝止腰痛尤效杜仲三兩薑汁炒破故紙炒小茴香鹽炒胡盧巴炒各四兩蓮花蕊一兩穿山甲酥炙三錢半青鹽半兩煆胡桃肉二十五個去衣上以胡桃肉先搗爛余為細末酒煮麵糊和丸如梧桐子大每服三十丸空心溫酒下食乾物壓之祕驗斑龍二至百補丸此藥固本保元生精養血培復天真大補虛損益五內而除骨蒸壯元陽而多子嗣充血脈強健筋骸美顏色增延齡算聰明耳目玄潤髭鬚真乃王道奇品之方難盡述其功效之妙也鹿角五十兩為則新取連腦骨者佳鋸作二寸長段長流水洗米泔浸一宿刷洗淨吹曬乾同後藥和入瓷壇煮膠黃精八兩甘州枸杞子四兩懷熟地黃四兩菟絲子四兩熱水淘淨金櫻子四兩去毛子淨天門冬去心二兩麥門冬去心二兩川牛膝二兩酒洗龍眼肉一兩楮實子二兩熱水洗以上十味同角和勻入淨好金華壇內層層放實用新汲淡水注壇中平肩以密梭布四層封口以新磚壓之置大鍋中井字架上以木甑蓋好重湯煮三日夜毋得間斷火候旁用小鍋燒滾水不時添注壇內並鍋內勿使乾涸日足取起濾去渣將汁同羅底絹絞出入淨砂鍋內文火熬成膏約一斤半再煉蜜二斤滴水成珠攙入調和後項藥杵爛為丸鹿角霜十兩人參五兩黃耆蜜炒四兩雞頭粉四兩白茯苓去皮四兩懷山藥四兩炒山茱萸肉連核者一斤鹽水洗過取肉四兩懷生地黃四兩酒洗掐斷絹包飯上蒸過知母四兩鹽水炒五味子一兩去梗夏月加川黃柏四兩炒褐色以上十味為細末用前膏和勻成塊石臼木杵杵千餘下為丸如梧桐子大空心淡鹽湯送下八十丸隨用煮熟蓮子肉或曬乾棗數枚以壓之俾納丹田也
