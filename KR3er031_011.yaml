body:
  text: 卷之十一痹證門病機五痹病機內經敘論黃帝問曰痹之安生岐伯對曰風寒濕三氣雜至合而為痹也其風勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹帝曰其有五者何也岐伯曰以冬遇此者為骨痹以春遇此者為筋痹以夏遇此者為脈痹以至陰六月也遇此者為肌痹以秋遇此者為皮痹又曰血凝於膚者為痹靈樞周痹篇曰周痹之在身上下移徙隨脈左右相應間不容空願聞此痛在血脈之中邪在分肉之間乎何以致是其痛之移也間不及下針其痛之時不及定治而痛已止何道使然岐伯曰此衆痹也非周痹也凡衆痹各在其處更發更止更居更起以右應左以左應右非能周也更發更休也周痹者在於血脈之中隨脈上下不能左右各當其所風寒濕氣客於外分肉之間迫切而為沫沫得寒則聚聚則排分肉而分裂也分裂則痛此內不在臟而外未發於皮獨居分肉之間真氣不能周命曰周痹五痹五臟證因不同岐伯曰凡痹之客於五臟者皆有合病久而不去者內舍於其合也故骨痹不已復感於邪內舍於腎筋痹不已復感於邪內舍於肝脈痹不已復感於邪內舍於心肌痹不已復感於邪內舍於脾皮痹不已復感於邪內舍於肺所謂邪者皆風寒濕之三氣也重感於肺者則皮無所知煩滿喘而嘔感於心者則血脈不通心下鼓暴上氣逆喘嗌乾善噫感於肝者則筋攣夜臥驚恐飲多而小便數感於腎者則骨重不可舉善脹尻以代踵脊以代頭感於脾者則四肢倦怠發咳嘔汁上為大塞痹證有感於六腑之異五痹之外有腸痹胞痹血痹熱痹證候之異腸痹者其病數飲中氣喘滿時作飧泄小便不通胞痹者少腹膀胱按之內痛若沃以湯澀於小便血痹者邪入於陰血之分其狀體常如被風吹骨弱勞瘦汗出臥則不時搖動熱痹者蓋臟腑積熱復遇風寒濕三氣而客於經絡留而不行陽遇其陰故為熱痹翕然而悶也肌肉極熱體上如鼠走之狀皮膚色變痹證不出風寒濕三氣所因帝曰痹證或痛或不痛或不仁或寒或熱或燥或濕其故何也岐伯曰痛者寒氣多也有寒故痛也其不痛不仁者病久入深榮衛之行澀經絡時疏故不痛皮膚不營故不仁其寒者陽氣少陰氣多與病相益故寒也熱者陽氣多陰氣少病氣勝陽遭陰為痹熱多汗濡者此逢濕甚也陽氣少陰氣勝兩氣相感故汗出而濡也痹之為病寒多則痛風多則行濕多則著在骨則重而不舉在筋則屈而不伸在肉則不仁在脈則血凝而不流在皮則寒此五者則不痛也凡痹逢寒則急逢熱則縱治法風痿痹三證相類治法不同痹之為證有筋攣不伸肌肉不仁與風證相似故世俗多類於風痿痹之證混同通治此千古之弊也大抵固當分其所因風則陽受之痹為風寒濕所感則陰受之為病多重著沉痛痿因血少氣虛火盛剋金肺葉燥枯宗筋不潤肝木乘勝脾土受傷飲食少四肢倦為精血虛耗故筋骨痿而不用治宜潤燥養血滋陰非若痹之氣血凝滯留而不行或痛而手足為之麻木不仁治以行氣勝濕為主三證雖大略相似而所以施治迥然不同執事者其辨諸治痹當審虛實淺深痹因虛而感風寒濕之邪氣有在肌膚血脈淺深之異入腑者多死昔人經論雖詳而方未盡其變今悉考證區別具眼者識之脈候脈經曰肺澀而緊者為痹痛嚴氏曰其脈大而澀為痹脈來急亦為痹寸口關上脈緊宜針引陽氣令脈和緊去則愈藥方五痹通用諸劑濟生五痹湯治風寒濕三氣客留肌體手足緩麻痹不仁羌活白朮防己片薑黃各一錢甘草一錢水盞半薑五片煎八分食前服濟生蠲痹湯治手足冷痹腰痛沉重及身體煩痛背項拘急當歸酒浸赤芍藥黃耆片薑黃羌活各二錢甘草五分上水盞半薑五片紅棗一枚煎八分不拘時服一方加防風三痹湯治血氣凝滯手足拘攣風痹等疾皆治人參黃耆當歸川芎白芍藥生地黃杜仲薑汁炒川續斷防風桂心細辛白茯苓秦艽川牛膝川獨活甘草各等分上水三盞生薑三片棗一枚煎五分不拘時服活絡丹治風濕痹痛諸藥不效白朮當歸羌活獨活川芎各一錢甘草五分水盞半薑五片煎七分服舒經湯治氣血凝滯經絡不行臂痛不可忍羌活白朮當歸各一錢片薑黃二錢甘草赤芍藥五分海桐皮一錢上水煎服烏藥順氣散方見風門治五痹乳香定痛丸治諸痹風濕流注骨節疼痛麻痹蒼朮五兩米坩浸五靈脂二兩草烏五兩去皮自然銅二兩火煅醋淬乳香兩半沒藥羌活當歸尾各一兩兩頭尖去皮生用五錢上為末酒糊丸小豆大每服十五丸至二十丸溫酒下仙傳史國公浸酒方治諸風五痹左癱右瘓口眼喎斜四肢疼痛七十二般風二十四般氣其效不可盡述當歸虎脛骨酥油炙川羌活川萆薢防風各二兩秦艽四兩鱉甲一兩醋炙川牛膝酒浸松節晚蠶砂炒各二兩枸杞子五兩干茄根八兩飯上蒸熟蒼耳子四兩炒捶碎一方加白花蛇一條一方加尋風藤二兩上十四味用無灰酒一大壇將絹袋盛藥懸於酒內密封固候十四日後開壇取酒取酒時不可面對壇口恐藥氣衝人面目每飲一盞毋令藥力斷絶飲盡病痊將藥渣曬為末米糊丸梧桐子大每服八十丸空心溫酒下忌食動風辛熱之物此藥可以常服五加皮浸酒方治一切風濕相搏腰腿疼痛並風痹四肢攣急皮膚搔癢大補五勞七傷和氣生血久服神效五加皮五兩南木香二兩上為粗末用生絹袋盛之以好酒一罈浸用篛裹封口入鍋內煮一時取出浸二七日開壇空心臨臥隨意飲二杯黃耆酒治風濕痹身體頑麻皮膚搔癢筋脈拘急言語謇澀黃耆防風天麻官桂當歸白朮虎骨雲母粉木香仙靈皮甘草炙茵子葉白芍藥川續斷萆薢石斛去根各一兩上用絹袋盛以好酒一升浸之春五夏二秋七冬十日每服一盞溫暖服之常令酒氣相續為佳萬病無憂酒除百病理風濕烏鬚髮健腰膝快脾胃進飲食治傷損補虛怯消積滯滋血養氣明目清心防風白芷五靈脂川牛膝臺芎荊芥穗甘草天台烏藥八角茴香木瓜地骨皮各一兩乳香沒藥南木香羌活各五錢赤芍藥二兩五加皮兩半故紙炒自然銅制威靈仙各二兩當歸二兩紫荊皮杜仲制各半兩黑小豆二兩炒去皮上㕮咀生絹袋盛之以無灰酒一大壇入藥在內密封壇口春秋浸五日夏三日冬十日後開壇取酒溫飲之或晨昏午後隨量常飲不絶去風活血和氣大有神效祕傳藥酒方治男子婦人風濕相搏腰膝痛或因坐臥濕地雨露所襲遍身骨節痛風濕腳氣並皆治之麻黃白芷桔梗芍藥當歸川芎肉桂半夏防己甘草各一兩陳皮厚朴枳殼烏藥各二兩蒼朮檳榔兩半川牛膝二兩川木瓜獨活各兩半杜仲制二兩上銼粗末以絹袋盛之用無灰酒三斗浸於壇內密封壇口鍋內重湯煮一時然後取出過三日開取酒飲之量飲一日三次渣曬乾為末酒糊丸梧桐子大每服七十丸空心酒下發表諸劑神應丹治風痹四肢不舉手足麻木麻黃去根節二斤用河水一斗熬膏用甘松蒼朮桑白皮白芷萍葉七月半採苦參川芎各一兩上末以膏和彈子大臨臥溫酒化一丸於暖室出汗三日再汗通氣防風湯治諸痹肩背痛不可回顧脊痛項強羌活獨活各一錢防風甘草炙藁本各五分川芎蔓荊子各一錢上水鍾半煎七分熱服出汗薏苡仁湯治手足流注疼痛麻木不仁難以屈伸薏苡仁當歸芍藥桂心麻黃各一錢甘草五分蒼朮米坩浸一宿炒二錢上水二鍾薑五片煎八分食前服有汗去麻黃有熱去桂如意通聖散治風濕注痹走痛麻黃防風川芎各一錢罌粟殼當歸丁香甘草各五分水二盞煎八分去渣入乳沒少許再煎一沸熱服出汗茯苓湯治風寒濕痹留著不去四肢麻痹拘攣急痛赤茯苓防己川芎桑白皮各一錢官桂五分芍藥麻黃去根節先煎掠去沫方入衆藥當歸甘草炙八分水二鍾棗三枚煎一鍾空心睡時各一服食薑粥取汗出良方通痹散治腰以下至足風寒濕三氣合而成痹兩足至膝冷如冰不能自舉或因酒熱立冷水中久成此疾天麻獨活當歸川芎白朮藁本等分上為細末每服二錢食前熱酒調下靈樞尉汗法治大人寒痹刺而尉之周痹衆痹尤宜用此醇酒二十斤蜀椒一斤乾薑一斤桂心一斤上三味咀片浸酒中用綿絮一斤白綿布四丈並納酒中泥封壇口勿泄氣將壇煨馬糞火中五日夜取出布絮曬乾復入酒中漬之又曬又漬酒盡為度渣亦曬乾並絮填入布內以布為夾復如小褥覆成用桑炭火炙復熱裹刺痹處令熱入於病所寒復炙之熱以尉之三十遍而止汗出以復拭身亦三十遍而止起步內中勿出見風每刺必尉如此則痹痛愈矣熏蒸方治腎氣衰弱脾腎肝三經受風寒濕停於腿膝使經絡散而不行變成腳痹故疼痛此藥和榮衛通經絡治痹證之法小椒一撮蔥三大莖細切鹽一把小麥麩約四五升酒一盞醋不枸多少拌和前件麩子至潤為度上放銅器內炒令極熱攤臥褥下所患腿腳就於熏蒸上蓋衣被臥一時要汗出為妙勿見風桂枝五物湯黃耆桂枝芍藥各二錢生薑五片大棗三枚上水二盞煎服溫經勝濕諸劑治寒氣勝者為痛痹芎附散治五種痛痹白腿臂間發作不定者小川芎附子泡去皮臍黃耆防風白朮當歸酒洗熟地黃桂心甘草炙柴胡各等分上水二盞薑三片棗一枚煎八分空心服三因附子湯治骨節疼痛皮膚不仁肌肉重著四肢縱緩遍體痠疼附子生二錢官桂人參白芍藥各一錢白朮茯苓甘草炙各八分上水二盞薑三片煎八分食遠溫服十味銼散治中風血弱臂痛連及筋骨舉動難支附子炮黃耆當歸白芍藥各一錢川芎防風白朮各七錢茯苓肉桂五分熟地黃酒洗焙乾二錢上水二盞舊三片棗二枚食後臨臥服續斷丸川續斷川萆薢當歸川芎各一兩乳香沒藥各五錢天麻附子炮防風各一兩上為末煉蜜丸小豆大每服四十丸溫酒下神效左經丸治諸風寒濕痹麻木不仁肢體手足疼痛極效蒼朮米泔浸草烏去皮蔥白乾薑各四兩上四味搗爛裝入瓶內按實密封瓶口安於暖處三日取出曬乾入後藥金毛狗脊二兩破故紙酒浸焙乾藁本白芷撫芎小茴香炒穿山甲炮川牛膝酒浸各二兩川烏炮木瓜白附子虎脛骨酥油炙乳香炙沒藥炙各一兩另研上為末酒打糊丸小豆大每服二三十丸空心酒下烏頭湯治風寒濕痹流注經絡筋脈拘攣不能轉側亦治腳氣烏頭附子細辛桂枝秦艽官桂甘草白芍藥各七分防風乾薑當歸白茯苓獨活各一錢上水盞半棗二枚煎八分空心服凡中風及風痹等疾皆積宿之久非一日所能攻可大劑久而服之取效加以灸法無不愈者唐書載王太后中風喑默不語醫者煎黃耆湯數斛以熏之得瘥皆此類也今人服之五劑便欲責效可怪也乳香宣經丸治風寒濕痹四肢拘攣筋骨疼痛行步艱難乳香另細研八錢萆薢四兩木香八錢五靈脂一兩黑豆三合生用二兩附子制八錢川楝子小茴香炒各二兩防風草烏炒黑牽牛生威靈仙烏藥陳皮各四錢上為細末酒糊丸梧桐子大空心溫酒下三十丸漸加五十丸烏頭粥治風寒濕麻木不仁烏頭不拘多少生研為末上每用香熟白晚米二合入藥末四錢同米以砂罐煮作稀粥不可太稠下生薑汁一匙白蜜三匙攪勻空心溫啜之為佳如中濕多更入薏苡仁末二錢服此粥大治手足四肢不隨及腫痛不能舉者有此預防之左氏云風淫四末謂四肢為四末也脾主四肢風邪客於肝則淫脾脾為肝克故病在四末滋穀味引風濕之藥徑入脾經以祛邪養正故四肢得安此劑極功豫常制此方以授人服良效治痹疏痰諸劑茯苓湯治肢體手足麻痹多唾眩冒赤茯苓半夏制橘紅各一錢枳實麩炒桔梗甘草各五分上水盞半生薑七片煎服芎活湯治水飲停留高注入經絡背痛皆因脾土有虧平日多飲水漿不能傳化所致川芎獨活半夏陳皮去白茯苓甘草炙枳殼白朮各一錢上水二盞薑七片煎八分半飢溫服茯苓丸治痹痛兩臂不能舉左右時復轉移由伏痰飲在內中脘停滯脾氣不行上與氣搏四肢不用茯苓二兩半夏四兩枳殼麩炒一兩風化朴硝三錢上為末薑汁糊丸梧桐子大每服五十丸薑湯下控涎丹治人忽患胸背手腳腰胯痛不可忍連筋骨牽引釣痛坐臥不寧時時走易不定意謂走注是風用藥針灸皆無效又疑風毒欲結癰疽亂以藥敷亦非也此乃是痰涎伏在胸膈上下變為此疾或令人頭痛不可舉或神意昏倦多睡或飲食無味痰唾稠黏夜臥喉中如鋸聲口角流涎手腳重腿冷痹氣脈不通誤認為癱瘓亦非也但以此藥不過數服其病如失甘遂大戟白芥子上等分為末糊丸食後臨臥薑湯下五七丸或十丸量人用血痹防風湯治血痹皮膚不仁防風一錢半獨活當歸川芎秦艽赤芍藥黃芩各七分甘草炙五分細辛杏仁各一錢上水二盞生薑五片煎服萆薢丸治血痹手足𤸷麻不仁遊走無定風痹等症萆薢炙山芋牛膝酒洗山茱萸去核熟地黃焙澤瀉各一兩狗脊去毛地膚子炒白朮各五錢乾漆炒煙盡天雄炮去皮臍車前子蠐螬各三錢茵芋去皮臍一錢上除蠐螬生研外搗為細末和勻煉蜜丸梧桐子大每服十丸至十五丸空心溫酒下黃耆酒一名小黃耆酒治血及諸痹甚者四肢不遂風寒濕痹舉體腫滿疼痛不仁兼治風虛痰癖四肢偏枯兩腳軟弱手不能上頭或小腸縮痛脅下攣急心下有伏水脅下有積飲夜夢悲愁不樂恍忽善忘由風虛五臟受邪或久坐腰痛耳聾率起眼眩頭重或舉體腫痛胸中痰滿心下寒疝及治婦人産後余疾並治黃耆獨活防風細辛牛膝川芎附子炮去皮臍甘草炙川椒去目併合口者炒出汗各三兩川烏炮去皮臍山茱萸肉秦艽乾葛各二兩官桂去粗皮當歸各二兩半大黃生銼白朮乾薑炮各一兩上㕮咀以生絹袋盛之清酒一斗浸春秋五日夏三日冬十日初服二合日二次夜一次漸增以微醉為度虛者加肉蓯蓉二兩多忘加石斛菖蒲紫石英各一兩下痢加女蕤仁二兩心下多忘加人參遠志茯苓二兩酒儘可更以酒二斗重浸服之渣曬乾為末酒調二錢脈痹導痹湯治脈痹血道壅塞半夏炮官桂各五分黃耆白茯苓當歸遠志去心龍齒人參甘草炙各七分茯神去木枳實麩炒桔梗各五錢上水二盞先煮粳米一合將熟去米入藥生薑五片棗二枚煎一盞不拘時溫服人參丸治脈痹通行血脈人參麥門冬去心茯神去木赤石脂龍齒石菖蒲遠志黃耆各一兩熟地黃二兩上為末煉蜜和搗五百杵為丸梧桐子大每服三十丸食遠清米飲送下胸痹利膈散人參白朮陳皮赤茯苓前胡各一錢乾薑桂心訶子甘草各三分水二盞薑五片煎七分頻頻服之效半夏湯治胸痹心下堅痞痛連背脊短氣煩悶半夏制栝蔞仁各二錢薤白切二合上水二盞薑五片煎一盞食前溫服每日二服豆蔻湯治胸痹心下堅痞白豆蔻仁打碎官桂木香人參各五分京三稜陳皮神麯麥芽各八分乾薑炮甘草炙各三分上水二盞薑三片鹽少許煎七分食前溫服枳實散治胸痹心下堅痞胸背拘急心腹不利枳實麩炒赤芍藥陳皮去白前胡各一錢木香五分磨水盞半薑三片煎食前溫服胞痹腎瀝湯治胞痹小腹急痛小便赤澀麥門冬五加皮犀角鎊各一錢杜仲桔梗赤芍藥木通各五分桑螵蛸上水盞半加入羊腎一隻去脂膜切細竹瀝少許同煎一盞去渣空心頓服日再服一方有桑皮無螵蛸腸痹吳茱萸散治腸痹寒濕內搏腹痛滿氣急大便飧泄吳茱萸湯泡焙乾乾薑炮甘草炙肉豆蔻各五錢砂仁神麯白朮各一兩厚朴薑汁炒陳皮良薑上為末每服一錢食前米飲下筋痹羚羊角散治筋痹肢節束痛羚羊角薄荷附子獨活白芍藥防風川芎各等分上水蓋半薑三片煎七分服舒筋丸治筋骨不能屈伸海桐皮沒藥血竭木香各二錢肉桂牛膝虎骨防風木瓜天麻各二錢半乳香三錢甜瓜仁五錢沉香楮實子各一錢半當歸自然銅各一錢上為細末煉蜜丸如彈子大每服一丸細嚼用溫酒下未眼藥先飲酒半盞後服藥皮痹羌活湯治皮痹皮如蟲走腹脅脹滿大腸不利語不出聲羌活細辛附子炮去皮臍沙參羚羊角鎊白朮五加皮生地黃官桂枳殼麩炒麻黃去節白蒺藜杏仁炮去皮尖五錢丹參萆薢五味子石菖蒲木通檳榔郁李仁泡去皮赤茯苓等分上水盞半薑五片煎七分不拘時溫服熱痹升麻湯治熱痹肌肉熱極體上如鼠走唇口反縮皮色變紅黑升麻茯神人參防風犀角鎊羚羊角鎊羌活官桂上水二盞薑三片竹瀝少許煎服防風湯丸治熱痹防風羌活茯神五加皮枳實牛膝桂心麥門冬人參玄參薏苡仁生地黃芍藥丹參各一兩檳榔二兩磁石四兩火煅醋淬大黃松子仁木香上為末煉蜜丸梧桐子大每服三十丸空心溫酒下冷痹巴戟天湯治冷痹腳膝疼痛行步艱難巴戟天去心一錢附子制五加皮七分川牛膝酒洗一錢石斛甘草炙萆薢白茯苓防風防己各五分水二盞薑二片煎八分空心服心痹犀角散治心痹神恍惚恐畏悶亂不得睡志氣不寧語言錯犀角羚羊角人參沙參防風天麻天竺黃茯神升麻獨活遠志麥門冬甘草各一錢龍齒丹參各五分牛黃麝香龍腦各一分上為末和諸藥重研令極細每服錢半不拘時麥門冬湯調下肝痹人參散治肝痹氣逆胸膈引痛睡臥多驚筋脈攣急此藥鎮邪人參黃耆杜仲酒炒酸棗仁微炒茯神五味子細辛熟地黃芎藭秦艽羌活各一兩丹砂五錢另研上為極細末入丹砂再研勻每服一錢不拘時調下日二服脾痹溫中法曲丸治脾痹發咳嘔涎法曲炒麥芽炒各一兩人參五錢白茯苓陳皮去白厚朴制枳實麩炒一兩吳茱萸湯泡三錢細辛甘草當歸酒洗焙附子制乾薑炮桔梗各五錢上為細末煉蜜丸梧桐子大每服七八十丸食前熱水送下肺痹紫蘇湯治肺痹心膈病塞上氣不下紫蘇子炒半夏制陳皮去白各一錢桂心人參白朮各五分甘草二分上水盞半薑五片棗二枚煎七分不拘時溫服腎痹牛膝酒治腎痹虛冷復感寒濕為痹牛膝秦艽川芎白茯苓防己官桂獨活各二兩五加皮四兩丹參薏苡仁火麻仁炒麥門冬石斛杜仲炒各一兩附子制地骨皮乾薑炮五錢上㕮咀生絹袋盛之好酒一斗浸春秋五日夏三日冬十日每服半盞空心食前服日二服易簡諸方一方治風濕痹筋脈拘攣久風骨中邪氣利腸胃消水腫薏苡仁一升搗熟每服一合煮作粥空心服聖惠方治走注風痹疼痛小芥菜子為末和雞子白調敷患處以帛裹之日一易劉禹錫方治腳轉筋兼暴風通身冰冷如癱瘓黃臘半兩溶化入香油少許攪勻乘熱攤帛上裹痛處冷即易之食醫心鏡治一切風濕痹四肢拘攣蒼耳子三兩搗末以水一升煎五合去渣呷之御藥院方治腳氣風濕虛汗少力多痛及陰汗枯白郁二匙投沸湯淋洗痛處附導引法一法以右踵拘左足拇指除風痹以左踵拘右足拇指除厥痹以兩手更引足趺至膝上除體痹一法踞坐伸腰兩手引兩踵鼻納氣自極七息布兩膝頭除痹一法凡人常覺腰脊拘急手足舉動不遂以左右手朝拱迎面呵氣三口足立直蹬七數踞坐左右手抱膝搖二七遍納氣七息愈周身之痹
