body:
  text: 卷之八十六老老余編上孟子曰老吾老以及人之老大學傳曰孝弟慈三者修身齊家治國之本也夫孝以事親移於君為忠於長為弟於幼為慈於衆人則仁也莫不總於斯道斯理擴而充之者也夫子答孟武伯之問孝父母惟其疾之憂故曰為人子者不可不知醫也此豫特編一帙表而出之俾為子者知所慎重而有所取也弟長慈幼方餌之權衡可以類推矣即吾醫尤當洞燭攝養之方以副人子之孝心端在是矣春甫引保養論養老新書云安樂之道惟善保養者得之孟子曰我善養吾浩然之氣太乙真人曰一者少言語養內氣二者戒色欲養精氣三者薄滋味養血氣四者咽津液養臟氣五者莫嗔怒養肝氣六者美飲食養胃氣七者少思慮養心氣人由氣生氣由神住養氣全神可得真道凡在萬形之中所保者莫先於元氣攝養之道莫若守中實內以陶和將護之方雖在閒日安不忘危聖人預戒老人尤不可不慎也春夏秋冬四時陰陽生病起於過用五臟受氣蓋有常分不適其性而強云為用之過耗是以病生善養生者保守真元外卻客氣不得而干之至於藥餌往往招來真氣之藥少攻伐和氣之藥多故善服藥者不如善保養康節先生詩云爽口物多終作疾快心事過必為殃與其病後能求藥不若病前能自防郭康伯遇神人授一保身衛生之術云但有四句偈耳須是在處守持偈云自身有病自心知身病還將心自醫心境靜時心亦靜心生還是病生時郭信用其言知自護愛康強倍常年幾百歲服藥例常見世人治年高之人疾患將同年少亂投湯藥妄行針灸以攻其疾務欲速愈殊不知上壽之人血氣已衰精神減耗危若風燭百病易攻至於視聽不至聰明手足舉動不隨其身體勞倦頭目昏眩風氣不順宿疾時發或祕或泄或冷或熟此皆老人之常態也不順治之緊用針藥務求痊瘥往往因此別緻危殆且攻病之藥或吐或汗或解或利緣衰老之人不同年少真氣壯盛雖汗吐轉利未至危困其衰弱之人若汗之則陽氣泄吐之則胃氣逆瀉之則陽氣脫立致不虞此養老之大忌也大抵老人藥餌止是扶持之法只可用溫平順氣進食補虛中和之藥不可用市肆贖賣他人惠迭不知方味及狼虎之藥臾之服餌切宜審詳若有宿疾或時發動則隨疾勢用中和湯藥調治三朝五日自然無事然後調停飲食依食療之法隨食性變饌此最為良法也老人腎虛膀胱氣弱夜多小水此蓋腎水虛而火不下故足痿心火上乘肺而不入脬胞故夜多小水若峻補之火益上行脬亦寒矣老人臟腑結大便祕可頻吃豬羊血或葵菜血臟羹皆能疏利老人常服芝麻湯及杏仁湯又嚼麻子俱能潤利集方法凡人少壯及老年其氣血有盛衰不等岐伯曰少火之氣壯壯火之氣衰蓋少火生氣壯火食氣況復衰火不可不知也故治法亦當分別其等少年壯年自是區分不同陳令尹集方俱為老人備用今所續編亦皆據其對證輕重處方而品列之也護持禁忌人萬物中一物也不能逃天地之數若天癸數窮則精血耗竭神氣浮弱如同小兒全假護持以助衰養若遇水火兵寇非橫驚怖之事必先扶持老人於安穩處避之不可喧忙驚動年高之人一遭大驚便致冒昧因生余疾凡喪葬凶禍不可令吊疾病危困不可令驚悲哀憂愁不可令人預報穢惡臭敗不可令食黏硬毒物不可令飧敝漏卑濕不可令居卒風暴寒不可令冒煩暑懊熱不可令中動作行步不可令勞暮夜之食不可令飽陰霧晦冥不可令飢假借鞍馬不可令乘偏僻藥洱不可令服廢宅敧宇不可令人墳園冢墓不可令遊危險之地不可令行澗淵之水不可令渡間昧之室不可令居凶禍遠報不可令聞輕薄婢使不可令親家緣冗事不可令管若此事類頗多不克備舉但人子悉意深慮過為之防稍不便於老人者皆宜忌之以保長年四時調攝四氣調神論曰陰陽四時者萬物終始死生之本也逆之則災害生從之則奇疾不起是謂得道春溫以生之夏熱以長之秋涼以收之冬寒以藏之若氣反於時則皆為疾厲此天之常道也順之則生逆之則病經曰觀天之道執天之行盡矣人能執天道生殺之理法四時運用而行自然疾病不生長年可保其黃髮之人五臟氣虛精神耗竭若稍失節宣即動成危瘵蓋老人倦惰不能自調在人資養以延遐算為人子者深宜察其寒溫審其饘藥依四時攝養之方順五行休王之氣恭恪奉親慎無懈怠形證脈候上古天真論曰女子之數七丈夫之數八女子七七四十九任脈虛衝脈衰天癸竭地道不通丈夫八八六十四五臟皆衰筋骨解墮精氣盡脈弱形枯女子過六十之期丈夫逾七十之年越天常數上壽之人若衣食豐備子孫勤養承順慈親恭行孝道能調其飲食適其寒溫上合神靈下契人理此順天之道也高年之人形羸氣弱理自當然其丈夫女子年逾七十面色紅潤形氣康強飲食不退尚多祕熱者此常理哉且年老之人痿瘁為常今反此者非真陽血海氣壯也但診左右手脈須大緊數此老人延永之兆也老人真氣已衰此得虛陽氣盛充於肌體則兩手脈大飲食倍進雙臉常紅精神強健此皆虛陽氣所助也雖時有煩躁膈熱大腑祕結但隨時以常平湯藥微微消解三五日間自然平復常得虛陽氣存自然飲食得進此天假其壽也切不得為有小熱頻用轉瀉通利苦冷之藥疏解若虛陽氣退復歸真體則形氣虺羸臟腑衰弱多生冷疾無由補復若是從來無虛陽之氣一向憊乏之人全在斟酌湯劑常加溫補調停饘粥以為養治此養老之先也宴處起居凡人衰晚之年心力倦怠精神耗短百事懶於施為蓋氣血筋力之使然也全藉子孫孝養竭力將護以免非橫之虞凡行住坐臥宴處起居皆須巧立制度以助娛樂棲息之室必常雅潔夏則虛敞冬則溫密其寢寐床榻不須高廣比常之制三分減一低則易於升降狹則不容漫風裀褥厚藉務在軟平三面設屏以防風冷其枕宜用夾熟色帛為之實以菊花制在低長低則寢無隙風長則轉不落枕其所在坐之椅宜作矮卑床樣坐可垂足履地易於興居左右置欄面前設幾緣老人多困坐則成眠有所欄圍免閃側之傷其衣服制度不須寬長長則多有蹴絆寬則衣不著身緣老人骨肉疏冷風寒易中若窄衣貼身暖氣著體自然氣血流利四肢和暢雖遇盛夏亦不可令袒露其頸後連項常用紫軟夾帛自頸後巾幘垂下著肉入衣領中至背脊間以護腠理老年人肌瘦腠理開疏若風傷腠理便成大患深宜慎之性氣好嗜眉壽之人形氣雖衰心亦自壯但不能隨時人事遂其所欲雖居溫給但亦常不足故多咨煎饒舌等閒喜怒性氣不定止如小兒全在承奉顏色故夫子答子夏問孝曰色難答懿子問孝曰無違隨其所欲嚴戒婢使子孫不令違背若憤怒一作血氣虛弱中氣不順因而飲食便成疾患深意體悉當令人隨侍左右不可令孤坐獨寢緣老人孤癖易於傷感才覺孤寂便生鬱悶養老之法凡人平生為性各有好嗜之事見則喜之有好書畫者有好琴棋者有好博奕者有好珍奇者有好藥餌者有好禽馬者有好古物者有好佛事者有好丹灶者人之僻好不能備舉但以其平生偏嗜之物時為尋求擇其精絶者布於左右使其喜愛玩悅不已老人衰倦無所用心若只令守家孤坐自成滯悶今見所好之物自然用心於物上日自看承戲玩自以為樂雖有勞倦咨煎性氣自然可滅貧富禍福經曰自天子至於庶人孝無終始而患不及者未之有也人子以純孝之心竭力事親無終始不及之理惟供養之有厚薄由貧富之有分限人居富貴有奉於己而薄於親者人所不録天所不容雖處富貴而即貧賤也人雖處貧賤能約於己而豐於親者人所推仰天所助與雖處貧賤而即富貴也百善莫大於孝孝感於天故天與之福所以雖貧賤而即富貴也罪莫大於不孝不孝感於天故天與之禍所以雖富貴而即貧賤也善惡之報其猶響應為人子者可不信乎奉親之道亦不在日用二牲但能承順父母顏色盡其孝心隨其所有此順天之理也其溫厚之家不可慢於老者盡依養老之方勵力行之其有貧乏之家養老之法雖有奉行之心而無奉行之力但隨家豐儉竭力於親約禮設具使老者知其罄力事奉而止將見孝心感格陰靈默祐如姜詩之躍鯉孟宗之泣筍無非孝感所致此行孝之明驗也慮孝子順孫有窘乏不能此法者意有不足故立此貧富禍福之說以齊之太上玉軸六字氣訣道藏有玉軸經言五臟六腑之氣因五味熏灼不和六欲七情積久生疾內傷臟腑外攻九竅以至百骸受病輕則痼癖甚則盲廢又重則喪凶故太上憫之以六字氣訣治五臟六腑之病其法以呼而自瀉出臟腑之毒氣以吸而自探天地之清氣當日小驗旬日大驗年後萬病不生延年益算衛生之寶非人勿傳呼有六曰呵呼呬噓嘻吹也吸則一而已呼有六者以呵字治心氣以呼字治脾氣以呬字治肺氣以噓字治肝氣以嘻字治膽氣以吹字治腎氣此六字氣訣分主五臟六腑也凡天地之氣自子至巳為六陽時自午至亥為六陰時如陽時則對東方勿盡閉窗戶然忌風入乃解帶正坐叩齒三十六以定神先攪口中濁津漱煉二三百下候口中成清水即低頭向左而咽之以意送下候拍拍至腹間即低頭開口先念呵字以吐心中毒氣念時耳不得聞呵字聲聞即氣粗及損心氣也念畢仰頭閉口以鼻徐徐吸天地之清氣以補心氣吸時耳亦不得聞吸聲聞即氣貧亦損心氣也但呵時令短吸時令長即吐少納多也吸訖即又低頭念呵字耳復不得聞呵字聲呵訖又仰頭以鼻徐徐吸清氣以補心亦不可聞吸聲如此吸者六次即心之毒氣漸散又以天地之清氣補之心之元氣亦漸復夫再又依此式念呼字耳亦不聞呼聲又吸以補脾耳亦不可聞吸聲如此者六所以散脾毒而補脾元也次又念呬字以瀉肺毒以吸而補肺元亦須六次次念噓字以瀉肝毒以吸而補肝元嘻以瀉膽毒吸以補膽元吹以瀉腎毒吸以補腎元如此並各六次是謂小周小周者六六三十六也三十六而六氣遍臟腑之毒氣漸消病根漸除膽氣漸完矣以看是何臟腑受病如眼病即又念嘻噓二字各十八遍仍每次以吸補之總之為三十六訖是為中周中周者第二次三十六通為七十二也次又再依前呵呼呬噓嘻吹六字法各為六次並須呼以瀉之吸以補之愈當精處不可怠廢此第三次三十六也是為大周即總之為一百單八次是謂百八訣也午時屬陰時有病即對南方為之南方屬火所以卻陰毒也然又不若子後巳前面東之為陽時也如早起床上面東將六字各為六次是為小周亦可治眼病也凡眼中諸證惟此訣能去之他病亦然神乎神乎此太上之慈旨也略見玉軸真經而詳則得之師授也如病重者每字作五十次凡三百而六臟周矣乃漱煉咽液叩齒訖復為之又三百次訖復漱煉咽液叩齒如初如此者三即通為九百次無不愈祕之祕之非人勿傳食後將息法平旦點心訖即自以熱手摩腹出門庭行五六步消息之中食後還以熱手摩腹行一二百步緩緩行勿令氣急行訖還床僕臥顆蘇煎棗啜半升以下人參茯苓甘草等飲量性將理食飽不宜急行不宜大語嗔喜睡覺食散後隨其所業不宜勞心力腹空即須索食不宜忍飢生硬黏滑等物多致霍亂秋冬間暖裹腹上中微似不安即服厚朴生薑等飲如此將息必無橫疾養老新書鈔文公家禮曰子事父母婦事舅姑天欲明咸起盥漱櫛總具冠帶昧爽適父母舅姑之所省問父母舅姑起子供湯藥婦具晨羞供具畢乃退各從其事內則曰子事父母婦事舅姑雞初鳴適父母舅姑之所及所下氣怡聲問衣懊寒疾痛疴癢而敬抑搔之怡悅也疴瘡也抑按也搔摩也溫公曰丈夫作揖婦人隨小拜問侍者夜來安否何如侍曰安乃退其或不安節則侍者以告此即禮之晨省之道也出則或先或後而敬扶持之先後隨時更也進盥少者捧盤長者捧水請沃盥上卒授巾盤承盥水者問所欲而敬進之所欲如下文饘𨠑之類柔色以溫之溫和也承尊者必和顏色也饘𩛆粥也稠者為饘而稀者為𩛆酒醴厚者為酒薄者為醴芼羹魚肉為羹芼之為菜菽麥蕡稻黍粱秫菽大豆也蕡麻也稻黍粱秫皆米也唯所欲隨所愛棗栗飴蜜以甘之飴餳也四者味皆甘堇荁枌榆免薨滫瀡以滑之堇與荁相類枌與榆相類四物新者日免乾者曰薨滫溲也瀡滑也數者性甘滑脂膏以澤之脂膏亦類也角者曰脂無魚者曰膏二者皆脂而澤者也父母舅姑必嘗之而後退尊長舉箸子婦乃各退就食溫公曰藥物乃關身之切務人子當始自檢數調煮供進不可但委婢僕脫若有誤即其禍不測晨羞俗謂點心易曰在中饋詩早惟酒食是議凡烹調飲膳婦人之職也近年婦女驕倨皆不肯入庖廚今縱不親執刀尺亦當檢校監視務令精潔劉氏曰問其意之所欲食者則敬順其心以進之和柔其色以溫之芬芳其意以奉之庶其親喜而不厭也孝子之事其親必養其志常使欣欣樂其子之能養曲禮曰凡為人子之禮冬溫而夏清昏定而晨省定安其床薦也省問其定否何如溫公曰父母舅姑將寢則安置而退丈夫作揖婦人小拜安置此即禮之昏定也老萊子少以孝行食親年七十父母俱存著五色斑爛之衣為嬰兒戲於親之側言不稱老為親取食上堂足跌而偃困臥地為嬰兒啼或弄雛於親側欲親之喜身老壽而雙親俱慶亙古今鮮儷者也東漢黃香事父竭力致養暑則扇床枕寒則以身溫席晉王延事親色養夏則扇枕席冬則以身溫被隆冬盛寒體常無全衣而親極滋味二人孝行甚相類也陳太丘詣荀朗陵貧儉無僕役乃使元方將車季方持杖從後長文尚少載之車上既至荀使淑慈應門慈明行酒餘六龍下食文若亦小坐著膝前於時奏真人東行兩家父子會聚之樂至矣哉陳實字仲弓為太丘長荀淑舉方正補朗陵候相紀字元方實長子至德絶俗與實高名並著而弟諶又配之每宰府辟召羔雁成群世號三君諶字季方淑有八子時曰高陽氏有才子八人署其里為高陽里號曰八龍於時德星聚太史奏上五百里有賢人樂也有客詣陳太丘談鋒甚敏太丘令元方季方炊飯太丘問炊飲遲元方長跪曰君與客語乃俱竊聽炊忘著簞今皆成糜太丘曰爾頗有所識否二子長跪俱記言無遺失太丘曰如此俱成糜自可何必飯耶柳玭曰崔山南昆弟子孫之盛鄉族罕比山南曾祖王母長孫夫人年高無齒祖母唐夫人事姑孝每日櫛縱笄拜於階下即升堂乳其姑長孫夫人不粒食數年而康寧一日疾病長幼咸萃宣言無以報新婦恩願新婦有子有孫皆如新婦孝敬則崔之門安得不昌乎東漢姜詩事母至孝妻奉順尤篤母好飲江水水去舍六七里妻常溯流而汲姑嗜魚鱠又不能獨食夫婦常力作供鱠呼鄰母共之舍側忽有湧泉味如江水每旦輒出雙鯉魚常以供二母之膳子婦同心竭力以致其養不易得也節孝徐先生事母謹嚴非有大故未嘗去其側日具太夫人所嗜或不獲即奔走闤市若有所亡人或慕其純孝損直以售之親戚故人或致甘膬誠不至禮不恭弗受也所奉饌皆手自調味太夫人飲食時先生率家人在左上為兒戲或謳歌以悅之故太夫人雖在窮巷而奉養與富貴家等無須臾不快也任元受事母盡孝母老多疾病未嘗離左右元受自言老母有疾其得疾之由或以飲食或以燥濕或以語話稍多或以愛喜稍過盡言皆朝暮候之無毫髮不盡五臟六腑中事皆洞見曲折不待切脈而後知故用藥必效雖名醫不逮也張魏公作都督欲闢之入幕元受力辭曰盡言方養親使得一神丹可以長生必持以遺母不以獻公也況能捨母而與公軍事邪魏公太息而許之程明道先生曰為人子者不可以不知醫陸放翁曰先公守南都時直祕閣張山者開封人判留司御史臺事年八十餘矣視聽步履飲食悉如少壯或問何術至此曰吾無他術但頃嘗遇異人授一藥服之數年未嘗一日輟耳其方用香附子薑黃甘草三物同未之沸湯點晨起空心服二三錢名降氣湯以為人所以多疾病者多由火起不降放下虛而上實此藥能導之使歸下耳鄉人有效之者或返致虛弱蓋香附薑黃瀉氣太甚而然不知山南何以獨能取效如此意其別有他術特記此藥以語人耳及渡江見一武官王升者亦七十餘矣康健無病問何所服藥則與山南相同而後知人之於藥各有所宜不可強也吳隱之事母孝謹與太常韓康伯鄰居康伯母賢明婦人也謂康伯曰汝若居銓衡當舉如此某人及康伯為吏部隱之遂階清級古人以孝行取人賢明之婦亦知此義呂侍講言孝子事親須事事躬親不可委之使令也嘗說穀梁言天子親耕以供粢盛王后親蠶以供祭服國非無良農工女也以為人之所盡事祖彌不若以己所自親者也此說最盡事親之道又說為人子者聽於無聲視於無形未嘗頃刻離親也事親如天頃刻離親則有時而違天天不可得而遠也呂侍講字原明申國正獻公公著之長子正獻公居家簡重寡默不以事物輕心而申國夫人性嚴有法度雖甚愛公然教公事事循蹈規矩甫七歲祁寒暑雨侍立終日不命坐不敢坐也日必冠帶以見長者平居雖盛熱在父母長者之側不得去巾襪縛袴衣服唯謹行步出入無得入茶肆酒肆市井裡巷之語鄭衛之音未嘗一經於可內則正獻公與申國夫人數訓之嚴外有焦先生千之字伯強化導之篤故公德器成就大異衆人公常言人生內無賢父兄外無嚴師友而能有成者少矣司馬溫公曰凡諸卑幼事無大小毋得專行必咨稟於家長又曰凡子受父母之命必藉記而佩之時省而速行之事畢則返命焉或所命有所不可行者則和色柔聲具是非利害而白之待父母之許然後改之若不許苟於事無大害者亦當曲從若以父母之命為非而直行己志雖所執皆善猶為不順之子況未必是乎司馬溫公與其兄伯康友愛尤篤伯康年將八十公奉之如嚴父保之如嬰兒每食少頃則問曰得無飢乎天少冷則拊背曰衣得無薄乎範忠宣知襄城縣承事伯兄照管湯藥飲食居處衣服必躬必親如孝子之事嚴父事親從兄仁義之實敬愛之理與生俱生仁之至義之盡也唐伸俊年八十五六極康寧自言少時因讀千字文有所悟謂心動神疲四字也平生遇事未嘗動心故老而不衰太醫孫君昉字景初自號四休居士山谷問其說四休笑曰粗茶淡飯飽即休補破遮寒暖即休三平二滿過即休不貪不妒老即休山谷曰此安樂之法也夫少欲者不替之家也知足者極樂之國也四休家有三畝園花木鬱郁客來煮茗談上都貴遊人閒可喜事或茗寒酒冷賓主皆忘其居與余相望暇則步草徑相尋故作小詩遺家僮歌之以侑酒茗詩曰太醫診得人間病安樂延年萬事休又曰無求不著看人面有酒可以留人嬉欲知四休安樂法聽取山谷老人詩山谷四印云我提養生之四印君家所有更贈君百戰百勝不如一忍萬言萬富不如一默無可簡擇眼界平不藏秋毫心地直我肱三折得此醫自覺兩踵生光輝團蒲日靜鳥吟時爐薰一炷試觀之四休四印老少富貧普同受用東坡云舊說南陽有菊水水甘而清居民三十餘家飲其水皆壽或至百二三十歲蜀青城山老人村有見五世孫者道極險遠生不識鹽發而溪中多枸杞根如龍蛇飲其水故壽道人中往往多有耆壽者陸放翁云青城山人巢居食松面年九十矣人有謁之者但粲然一笑有所請問則託言病聵一語不肯答豫嘗見之於丈人觀道院忽自語養生曰為國家致太平與長生不死皆非常人所能且當守國使不亂以待奇才之出衛生使不夭以須異人之至不亂不夭皆不待異術惟謹而已豫大喜從而叩之則已復言聵矣論衰老少壯既往歲不我與孔子曰及其老也血氣既衰戒之在得蓋因馬念車因車念蓋未得之慮得之既得之慮失之趑趄囁嚅而未決寤寐驚悸而不安夫二五之精妙合而凝兩腎中間白膜之內一點動氣大如箸頭鼓舞變化開闔周身薰蒸三焦消化水穀外御六淫內當萬慮晝夜無停八面受攻由是神隨物化氣逐神消榮衛告衰七竅反常啼號無淚笑如雨流鼻不嚏而出涕耳無聲而蟬鳴吃食口乾寐則涎溢溲不利而自遺便不通而或泄由是真陰妄行脈絡疏澀晝則對人瞌睡夜則獨臥惺惺故使之導引按摩以通徹滯固漱津咽液以灌溉焦枯若扣齒集神而不能斂念一曝十寒而徒延歲月雖云老者非肉不飽肥則生風非帛不暖暖則多淫僥幸補藥者如油盡剔燈焰高而速滅老子云以其厚生所以傷生也況有明修禮貌暗伏奸雄萌蘖腐其腸胃脂粉惑其清真孤陽獨盛水穀易消自恃飲啖過人恣造欺天之罪宿緣既盡惡報臨頭其或厭妖沉酣身居勤儉志益貪婪方聚龜毛之氈忽作女子之夢宋齊丘化書云慳貪者化為狗暴勇者化為虎雖然身未遷謝業已成行矣先賢詩云克己工夫未肯加吝驕封閉縮如蝸試於靜夜深思省剖破藩籬即大家先賢戒曰積金以遺子孫子孫未必能保積書以遺子孫子孫未必能讀不如積陰隲於冥冥之中以為子孫無窮之計龐居士詩云北宅南莊不足誇好兒好女眼前花一朝身沒一丘土又屬張三李四家張紫陽詩云人生須有百年期壽夭窮通莫預知昨日街頭方走馬今朝棺內已眠尸妻財遺下非君有罪業將行難自欺大藥不求爭得遇遇之不煉更迷癡蓋年老養生之道不貴求其充當以前賢破幻之詩洗滌胸中憂結而名利不苟求喜怒不妄發聲色不因循滋味不耽嗜神慮不邪思無益之書莫讀不急之務莫勞三綱五常現成規模貧富安危且據見定邵康節云美酒飲教微醉後好花須看半開時又云爽口物多終作疾快心事過必為殃與其病後求良藥孰若病前能自防又詩云慮少夢自少言稀過亦稀簾垂知日永柳靜覺風微但看花開謝不言人是非何須尋洞府度世也應遲龐居士云但願空諸所有慎勿實諸所無余亦有詩云世人用盡機關只為貪生怕死我有安樂法門直須顛倒於此晉有祁孔賓夜間讀書忽聞窗外云祁孔賓隱去來修飾人間事甚苦不堪偕所得未毫銖所喪如山崖朝文元公法藏碎金云衆所好者虛名客氣見利羡財豫所好者天機道眼法要度門又云觀身無物從幻化緣生觀心無物從顛倒想生又云身有安全敗壞者事之報也即世而可見性有超升淪墜者行之報也異世而不知譬如形聲之有影響必然之理也又云人有疾苦或多偶爾非固所作無如之何歷觀紀化之軀而有甚於此者能推此理足以自覺又云仕宦之間暗觸禍機衽席之上密涉畏途輪回之中枉入諸趣古人云心死形方活心強身即亡金剛經云何降伏其心川老子頌云你喜我不喜雁飛思塞北鶯憶舊窠歸秋月春花無限意箇中只許自家知虛淨天師云靈臺皎潔似冰壺只許元神裡面居若向此中留一物平生便是不清虛老子云虛其心實其腹是皆融智慧黜聰明而宅天和以卻百邪者也豈比夫三千六百傍門小法加之於萬境煎熬之心而頭上安頭又以金石草木剛烈之劑餌之於喪津枯涸之體而求補益哉歷觀前人以不仁成家以仁而保家者有之矣如以不仁而得復以不仁而守者禍不旋踵也晉書傳云石季龍僭稱帝號發近郡男女十六萬車十萬乘運土築華林園揚州送黃鵠雛五頸長一丈聲聞十餘里泛舟於玄武池命子石宣祈于山川因而遊獵乘大輅羽葆華蓋建天子旌旗十有六軍戎卒十八萬出自金明門季龍從其後官升凌霄觀望之嘆曰我家父子如是自非天崩地陷當復何愁但抱子弄孫日為樂耳宣所過三州十五郡資儲靡有孑遺季龍覆命子石韜亦如之出自並州遊於秦晉宣素惡韜寵是行也嫉之彌甚於是相圖之計起矣俄而宣使刺客殺於佛舍又欲謀不軌事發季龍殺之季龍既死其後殲焉嗚呼季龍之富貴而不足恃而今之碌碌者十百之帑又奚足以作威福而造業因哉余雖枯槁幽棲而衣冠出處未嘗用餿餡故事以孔子之性與天道不可得而聞也故托佛以言性耳佛云一切山河大地皆從如來性流出然則佛之一字乃一切有情之覺靈也實為大羅空劫先天之祖氣即元始天尊是也人人皆抱此靈而不自覺故佛經云一切衆生本來成佛以不覺故名曰衆生以覺故名曰佛今之地獄變相乃唐太宗以入冥境界命宰相閻立本圖畫以示人余少年滑稽之時未嘗不在笑淡之下一日在外因病困極恍惚所見與吾家骨肉所夢同日境界因緣無有少異遂絶口不敢戲謔後讀史傳語録文字始知近代以來王公卿士於佛書中獲大安樂者不可枚舉故韓昌黎排之至甚而終得法於大乘歐陽文忠公惡之如讎敵而又號為六一居士豈非自有所得而翻然而改者歟悲夫世人不明佛心而溺於佛事故粱武帝之禍侯景至而不知秦始皇欲仙徐福去而不返況夫瑣瑣勝事而能勝其業障乎夫業障之心以酒為漿以妄為常念念遷謝晝夜呼吸一萬三千五百息一息脈行三寸元氣周身脈行八百一十丈寒來暑往之誘物迷神明流之遠矣養生之士以此為主則是認賊為子豈不謬哉故岐伯曰出入廢則神機化滅升降息則氣立孤危易曰精氣為物遊魂為變是也昔有二人就余以辨生死事大者一曰人之有生也賦性於天養命於地百年之身仁義而已及其終也清魂歸天濁魄歸地夫復何疑一曰人之生也以生為我以得為強以妄為常蟲穢之倉愁慮之囊或為之讓或為之攘均為之孳孳一名殘忍一名忠良拘之則心目外寇縱之則血氣內戕欲持其要莫知所長業識茫茫一息不來烏知其何往余各以一詩遺之其一曰原始要終理不訛四非莊敬怕蹉跎平生不踐中庸地一曲陽關沒奈何其二曰超凡一句絶商量說破教君笑斷腸一切順為生死事莫令厭戀作心王有人能如此便見養生主也大抵桑榆之景勞逸不同蓋勞心者甚於勞力者耳善為心主者勞亦如是逸亦如是如魚飲水冷暖自知也人生五十者精力將衰大法當二十日一次施泄六十者當閉固勿泄也如不能持者一月一次施泄過此皆常情也不足為法凡肥盛強厚者自壯至老衣食與藥並用疏爽肉雖多不使勝食氣果宜棗柿藕菜宜韭與蘿蔔飲食飢時先進熱物然後並宜溫涼及時勿恣食黏滑燒炙煎爆辛辣燥熱之味防有內郁風痰外發癰疽之證雖清瘦而素稟強實兼有痰證者與此同法清癯虛弱者自壯至老衣服與藥皆宜溫厚性寒傷胃腥膻鱠炙生冷油膩並宜少食如肥而素稟滑泄虛寒易感者與此同法其餘扶衰潤槁之方各類於後養老編孔子曰父母之年不可不知聖言所包自廣若必待親終然後盡於大事亦非聖賢之意君子曰曾元養小體曾子豈安養小或因貧富豐儉之不同或偶因珍奇之一事人子父母之奉不在富奢雖一橘亦可奉親故諺曰人能以愛子之心愛親孝矣若非理之奉亦不為孝古人有對客烹雞已而供母者今人卻不能然父母之言或有差錯人子不可對人質正待後言之如不害事亦不必言凡百家事人子必須與親商榷然後行之庶免乖忤若親意堅執小有未善亦當勉從父母賢明自是均一或有所偏向財帛不均為子者必自解曰此財帛父母之物也若初不有此奈何有或遇水火盜賊失去又將奈何其不才之子必怨對其親或至終身不相見者有之尚得謂之人子乎何其卑弱之甚也人各有所偏偏處最明善道君親者必自明處傍引正之人子諫親知其必不肯從必厚結親之摯友或所親信之人於其不意之中解之必致其情起居編老人火衰必自多寒又不勝衣當以熟絹軟布為之所套花綿年換新者父母送終之具五十以後即當漸備常以夏月為懼春時遇天氣頓暖不可頓減綿衣緣老人氣弱骨疏風冷易傷才透春時但多令夾衣遇暖之時一重重漸減即不致暴傷也老不耐風非不耐風也只當調氣爾少不耐勞非不耐勞也只當調脾爾六十忌入房戶所以輔衰故重性命也人年五十以上皆常大便不利或成苦下痢有斯二疾常須預防若祕澀則宜數食葵菜等滑物如其下痢宜與姜韭溫熱之菜老人於四時之中常宜溫食不得輕之養老之要耳無妄聽口無妄言身無妄動心無妄念此皆有益於老人也又當愛心每有誦念無令耳聞此為要妙耳老人之道常念善無念惡常念生無念殺常念信無念欺無作博戲強用氣力無舉重無疾行無喜怒無極視無極聽無大用意無大思虎無吁嗟無叫喚無歌嘯無啼泣無悲愁無哀慟無慶弔無接對賓客能如此者可無至病長壽斯必也老人常避大風大雨大寒大暑大霧霜霰雪旋風惡氣能不觸冒者是大吉祥也老人所居之室必須大周密無致風隙也老人須知服食將息調身按摩搖動肢節導引行氣不得對面殺生以奉養也藥餌編丹溪云人生至六十七十之後精血俱耗平居無事已有熱證何者頭傾目眩肌癢溺數鼻涕牙落涎多寐少足弱耳聵健忘眩暈腸燥面垢發白眼花久坐兀睡未風先寒食則易飢笑則易淚但老境無不有此或曰局方用烏附丹劑多與老人為宜豈非以年老氣弱下虛理宜用溫補今皆以為熱烏附丹劑將不可施之老人耶曰奚止烏附丹劑不可妄與至於好酒膩肉濕面肉汁燒炙煨爆辛辣甜滑皆在所慎或者又曰甘旨養老經訓具在為子與婦一有不及孝道便虧而吾子之言若是其將有說以通之乎曰正所謂道並行而不相悖者請詳言之古者井田之法行鄉閭之教興人知禮讓比屋可封肉食不及幼壯五十方才食肉當時之人血氣充和筋骨堅凝腸胃清厚甘旨養老何由致病今則不然幼小食肉強壯恣叨比及五十疾巳蜂起氣耗血竭筋柔骨痿腸胃壅閼涎沫充溢而況人身之陰難成易虧六七十之後陰不足以配陽孤陽幾欲飛越因天生胃氣尚爾留連又藉水穀之陰稽縻而不走耳所陳前證皆是血少經曰腎惡燥烏附丹劑非燥而何夫血少之人若防風半夏蒼朮香附俱是燥劑且不敢多況烏附丹劑乎或者又曰一部局方悉是溫熱養陽吾子之言無乃謬妄乎子曰局方用燥劑為劫濕病也濕得燥則豁然而收局方用暖劑為補虛病也補腎不如補脾得暖則易化而食進下雖暫虛亦可少回內經治法亦許用劫正是此意蓋為質厚而病淺者設也此亦儒者用權之意若以為經常之法豈不太誤彼年老者質雖厚此時亦近平薄病雖淺其本亦易於發而可劫藥以取遠效乎若夫形肥者血多形瘦者氣實間或有可劫者設或失手何以收救吾寧稍遲可以計出萬全豈不美乎烏附丹劑其不可輕試也明矣至於飲食尤當謹節夫老人內虛脾弱陰虧性急內虛胃熱則易飢而思食脾弱難化則食已而再飢陰虧難降則氣鬱而成痰至於視聽言動皆成廢懶百不如意怒火易熾雖有孝子孝孫亦是動輒扼腕況未必孝順乎所以物性之熱者炭火製作者氣之辛辣者味之甘膩者其不可食也明矣雖然腸胃堅厚神氣深壯者世俗觀之何妨奉養從口固快一時積久必為患害由是觀之多不如少少不如絶爽口多疾厚味措毒前哲格言猶在人耳可不慎歟或曰如子之言殆將絶而不與於汝安乎豫曰君子愛人以德小人愛人以姑息況施於所尊者哉惟飲與食將以養生不以致疾若以所養轉為所害恐非君子之所謂孝與敬也然則如之何則可曰好生惡死好安惡病人之常情為子為孫必先聞之以義理曉之以物性旁譬曲喻陳說利害意誠辭確一切以敬慎行之又次以身先之必將有所感悟而無扦格之逆矣吾子所謂絶而不與施於有病之時尤是孝道無病之時量酌可否以時而進某物不食某物代之又何傷於孝道乎若夫平居閒話素無開導誘掖之言及至飢腸已鳴饞涎已動飲食在前馨香撲鼻其可禁乎經曰以飲食中養之中之一字恐與此意合請勿易看過愚謂然而醫書內經曰陰陽之妙變化無窮造化皆出於此如秦越人演八十一難止得內經中一二仲景取其傷寒一節劉守真以熱論變仲景之法李明之以飲食勞役立論恐先仲景書者以傷寒為主恐誤內傷作外感先明之之書者以胃氣為主恐誤外感為內傷先守真書者以熱為主恐誤以寒為熱不若先主於內經則自然活潑潑地或曰今之醫但看脈訣以為診視閲諸方書便可治病似為簡便先生之教讀內經雖識病無方可據脈經千條萬緒難以撫尋曰只欲如此人之生命至重非積歲月之功豈可便視人之疾前人立論制方有與內經意合者有穿鑿者立意偏者有因病人之虛實形氣脈證而制方有病之變化無窮人之形志苦樂不一有地土所宜證有相似治有不同不讀內經便與據方施治若有差誤死不復生人雖不知於心安乎脈理精微通陰陽造化之理千變萬化聖人尚論其端緒祕其蘊奧善為脈者從而推廣豈高陽生數語之脈訣能盡無窮之病耶斯為醫之可法然事親者固當知醫之事亦不可不知醫之為事醫士果良則親疾可托也司馬溫公曰父母有疾專當以迎醫驗方合藥為務則知醫豈非人子之事哉程子曰病臥於床委之庸醫比之不慈不孝事親者亦不可不知醫然委之庸醫是不知醫之為事也噫大抵醫藥之道奚可草草而為哉二子之言良有以也高年之人多有宿疾積氣所攻則精神昏倦宿患發動又復經冬已來擁爐熏衾啖炙飲熱至春成積多所發泄致體熱頭昏膈壅涎漱四肢勞倦腰腳不任皆天所發之疾也常宜體候若稍覺微疾不可復行疏利恐傷臟腑別生余疾俱只用消積和氣涼膈化痰之藥消解而已夏月老人尤宜保扶若檐下故道穿隙破窗皆不可納涼此為賊風中人暴毒宜居虛堂靜室水次木陰潔淨之處自有清涼每日侵晨進溫平暖氣湯散一服飲食溫軟不令太飽但時復進之渴用飲粟米溫飲豆蔻熱水生冷肥膩尤宜戒之緣老人氣弱當夏之時納陰在內以陰弱之腹當冷肥之物則多成滑泄一傷真氣卒難補復若是氣弱老人夏至以後宜服不燥熱平補腎氣暖藥三二十服以助元氣若蓯蓉丸八味丸之類無妨冬月最宜養老密室溫淨衾服調其飲食適其寒溫大寒之日山藥酒肉時進一杯以扶衰弱以禦寒氣不可遠出觸冒嚴風緣老人血氣虛怯真陽氣少若感寒邪便成疾患多為嗽逆麻痹昏眩之疾炙爆燥毒之物尤切戒之若食炙爆燥熱之物故多有壅噎痰嗽咽目之疾亦不宜澡沐陽氣內蘊之時若加湯火所逼須出大汗高年之人陽氣發泄骨肉疏薄易為傷動多感外疾惟早眠晚起以避霜威朝宜欲少醇酒然後進粥臨臥宜服快脾消化藥一服飲食編凡老人有患宜先以食治食治未愈然後命藥此養老人大要之法也新登五穀老人不宜多食動一切宿疾夫善養老者非其書勿讀非其聲勿聽非其務勿行非其食勿食非其食者所謂豬豚雞魚蒜鱠生菜生肉白酒大酢大咸也常學淡食至於黃米小豆此等非老者所宜食常宜輕清甜淡之物大小麥面等為佳又忌強用力咬齧堅硬脯肉反至折齒破齦之弊常不飢不飽不寒不熱善行作坐臥言談語笑寢食造次之間能行不妄失者則可延年益壽矣養老之道食必忌雜雜則五味相撓食之作患是以食取鮮之務令簡少飲食當今節儉若貪味傷多老人腸胃皮薄多則不消膨脹短氣必致霍亂夏至以後秋分以前勿進肥濃羡膗酥油酪等則無他矣夫老人所以多疾者皆因少時春夏取涼過多飲食太冷故其魚鱠生菜生肉腥冷物多損於人宜當斷之惟乳酪酥蜜常宜溫而食之此大利益老年雖然卒多食之亦令人腹脹泄痢人年五十始衰脾胃虛薄食飲不多易飢易飽不得日限三餐察其情而漸加之人年七十以後血氣虛憊全賴飲食扶持且脾胃漸弱容受漸少隨飽又飢故須夜間飲食亦不可缺若干糕熟棗面粟之類常置臥側砂銚銅罐常在爐邊庶不有失老人吃食大要十分軟爛易得消化醇酒每進數杯助其血氣不得過多若生冷硬物酸老之酒切莫近之恐乘快進用致有後悔吾先封君享年八十有九上食曾經知之
