body:
  text: 卷之九十七製法備録醫之治疾製藥以待用正如將之制敵練兵於平時倉卒急用所以收奇續而成全功也今見醫者救急之際切以知方顧無成藥奈何可以濟困而持危亦惟束手待斃而已可謂醫師之良乎韓文公曰青芝赤箭玉札丹砂敗鼓之皮牛溲馬勃蓄用無遺者醫師之良也甫謂蓄藥頗易製藥為難市纏坊肆惟有生藥而凡制練之精要者為尤難得若非醫家從容制煉以備倉卒之需又安能解倒懸之厄耶不然則如臨陳用兵總非素煉曷以取勝春甫目擊斯弊故悉考製法裒集成帙以為好生者共焉藥劑丸散湯膏各有所宜不得違制藥有宜丸者宜散者宜水者宜酒漬者宜煎膏者亦有一物兼宜者亦有不可入湯酒者並隨藥性不可過越湯者蕩也煎成清汁是也去大病用之散者散也研成細末是也去急病用之膏者熬成稠膏也液者搗鮮藥而絞自然真汁是也丸者緩也作成圓粒也不能速去病舒緩而治之也漬酒者以酒浸藥也有宜酒浸以助其力如當歸地黃黃柏知母陰寒之氣味假酒力而行氣血也有用藥細銼如法煮酒密封早晚頻飲以行經絡或補或攻漸以取效是也稱劑分兩輕重多少皆須甄別若用得其宜與病相合入口必愈若冷熱乖戾分兩違舛湯丸失度當差又劇喻如宰夫以鱔鱉與專羹食之更足成疾豈充飢之可望乎故仲景云如此死者醫殺之耳仲景言銼如麻豆大者與㕮咀同意夫㕮咀古之制也古人無鐵刀以口咬細今如麻豆為粗藥煎之使藥水清飲於腸中則易升易散今人以刀銼如麻豆大此㕮咀之易成也㕮咀之取其煎熬得出藥汁易行經絡若至高之病加酒煎去濕以生薑補元氣發散風寒以蔥白去膈上痰以蜜開痰結以生薑汁凡諸湯用酒臨熟加之細末者不循經絡止去胃中及臟腑之積及治肺疾咳嗽為宜氣味厚者白湯調氣味薄者煎之和渣服凡藥去下部之病者極大而尖且圓治中焦者次之治上焦者極小麵糊丸取其遲化直至下焦或酒或醋取其收斂凡半夏南星欲去濕者以生薑汁稀糊丸取其易化也湯泡蒸餅又易化滴水尤易化煉蜜丸者取其遲化而氣循經絡也臘丸者取其難化而遲取效也凡修丸藥用蜜只用蜜用餳只用餳勿交雜用且如丸藥用臘取其能固護藥之氣味勢力全備以過關膈而作效也今若投蜜相合雖易為丸然下咽亦易散化如何得到臟中若其更有毒藥則便與人作病豈徒無益而又害之全非用臘之本意凡煉蜜皆先掠去沫令熬色微黃拭水不散再熬二三沸每用蜜一斤加清水一酒杯又熬一二沸作丸則收潮氣而不黏成塊也冬月煉蜜成時要加二杯水為妙衍義云每蜜一斤只煉得十二兩是其度數也和藥末要乘極滾蜜和之臼內用搗千百杵自然軟熟容易作條好丸也凡丸散藥亦先細切曝燥乃搗之有各搗者有合搗者其潤濕之藥如天門冬地黃輩皆先切曝之獨搗或以新瓦慢火炕燥退冷搗之則為細末若入衆藥隨以和之少停回潤則和之不均也又濕藥欲燥皆蝕耗當增分兩稱之凡篩丸藥用密綃令細若篩散藥尤宜精細苦搗丸必於臼中搗數百過色理和同為佳凡藥漬酒皆須切細生絹袋盛之乃入酒密封隨寒暑日數視其濃烈便可漉出不須待酒盡也渣則曝燥微搗更漬飲之亦一散服之凡合膏或以醋或酒或水或油漬令淹浹密覆至煮膏時當三上三下以泄其熱勢令藥味得出上之使匝匝沸下之要沸靜良久乃上之如有薤白在中者以兩段漸焦黃為度如有白芷附子者亦令小黃為度絞膏要以新布若是可服之膏滓亦可以酒煮飲之可藥之膏渣亦則宜以敷病處此蓋欲悉盡其藥力也凡湯酒膏中內諸石藥皆細搗之以新絹裹之內中衍義云石藥入散如鍾乳粉之屬用水研末極細必要二三日乃已以水漂澄極細方可服餌豈但搗細以絹裹之為例耶凡煎膏中有脂先須揭去革脂子方可用之如豬脂勿令經水臘月者彌佳凡膏中有雄硃砂輩皆當另搗研如面俟膏畢乃投入以物杖攪之不爾沉聚在下不勻也凡草藥燒灰為末如荷葉柏葉茅根薊根十灰散之類必燒焦枯用器蓋覆以存性若如燒燃柴薪煅成死灰性亦不存而罔效矣凡諸膏膩藥如桃仁麻仁輩皆另搗如膏乃以內成散中旋次下臼合研搗令消散藥劑分兩古之藥劑錙銖分兩與今不同云一升者即今之一茶盞也云兩銖者六銖即二錢半二十四銖為一兩也云三兩者即今之二兩也云一兩者即今之六錢半也凡散藥有云刀圭者有云方寸匕者有云一字者刀圭者十分方寸匕之一准方寸匕者作匕方正一寸抄散取不落紙為度一撮者四刀圭也十撮為一勺一字者即今之二分半也如一錢有四字之義二字者即今半錢為五分也凡丸藥云如細麻者即胡麻也如黍粟亦然以十六黍為一大豆如大麻子者准三細麻也如胡豆大者即今青斑豆也以二大麻子准之如小豆者今赤小豆是也如大豆者以二小豆准之如梧桐子大者以一大豆准之可也煎藥則例凡煎湯劑必先以主治之為君藥先煮數沸然後余藥文火緩緩熬之得所勿揭蓋連罐取起坐涼水中候溫熱服之庶氣味不泄若遽乘熱揭封傾出則氣泄而性不全矣煎時不宜烈火其湯騰沸耗蝕而速涸藥性未盡出而氣味不純人家多有此病而反責藥不效咎將誰歸發汗藥先煎麻黃二三沸後入余藥同煎止汗藥先煎桂枝二三沸後下衆藥同煎和解藥先煎柴胡後下衆藥至於溫藥先煎乾姜行血藥先煎桃仁利水藥先煎豬苓止瀉藥先煎白朮茯苓止渴藥先煎天花粉乾葛去濕藥先煎蒼朮防己去黃藥先煎茵陳嘔吐藥先煎半夏生薑風藥先煎防風羌活暑藥先煎香薷熱藥先煎黃連凡諸治劑必有主治為君之藥俱宜先煎則效自奏也凡湯用麻黃去節令通理碎銼如豆大先另煮二三沸掠去上沫更益水如本數乃內余劑不爾令人煩凡用大黃不須細銼先以酒浸令淹浹密覆一宿明旦煮湯臨熟乃內揚中煮二三沸便起則勢力猛易得快利丸藥中微蒸之恐寒傷胃也凡湯中用阿膠飴糖芒硝皆須待湯熟起去渣只內淨汁中煮兩三沸溶化盡仍傾盞內服凡用干棗蓮子烏梅仁決明子皆擘破研碎入藥煎凡用砂仁豆寇丁香之類皆須打碎遲後入藥煎數沸則起不爾久久煎之其香氣消散也是以效少凡湯中用犀角羚羊角一概末如粉臨服內湯中然入藥法生磨汁煮亦通凡諸藥子仁皆用湯泡去皮尖及雙仁者亦有炒令黃色者生用者並搗碎入劑煎方得汁出凡用沉香木香乳沒一切香末藥味須研極細待湯熱先傾汁盞調香末服訖然後盡飲湯藥凡煎湯藥初欲微火令小沸其水數依方多少大略藥二十四兩用水一斗煮取四升以此為準然利湯欲生少水而多取汁補湯欲熟多水而小取汁服湯宜小沸熱則易下冷則嘔湧服藥序次病在胸膈以上者先食後服藥病在心腹以下者先服藥而後食病在四肢血脈及下部宜空腹而在旦病在頭目骨髓宜飽滿而在夜雖食前食後亦停少頃然後服藥食不宜與藥並行則藥力稍為混滯故也湯液云藥氣與食氣不欲相逢食氣稍消則服藥藥氣稍消則進食所謂食先食後蓋有義在其中也又有酒服者飲服者冷服者暖服者服湯有疏有數者煮湯有生有熟者各有次第並宜詳審而勿略焉清熱湯宜涼服如三黃湯之類消暑藥宜冷服如香薷飲之類散寒藥宜熱服如麻黃湯之類溫中藥宜熟而熱補中藥皆然利下藥宜生而溫如承氣湯之類病在上者不厭頻而少病在下者不厭頓而多少服則滋榮於上多服則峻補於下凡云分再服三服者要令勢力相及並視人之強弱羸瘦病之輕重為之進退增減不必局於方說則活潑潑地也云晬時周時也從今旦至明旦亦有止一宿者服藥禁忌服柴胡忌牛肉服茯苓忌醋服黃連桔梗忌豬肉服乳石忌參朮犯者死服丹石不可食蛤蜊腹中結痛大黃巴豆同服反不瀉人服皂礬忌蕎麥麵服半夏菖蒲忌飴糖羊肉服白朮蒼朮忌雀肉胡荽大蒜服天門冬忌鯉魚服牡丹皮忌胡荽服常山忌蔥服鱉中忌莧菜服商陸忌犬肉服地黃忌蘿蔔服細辛忌生菜服甘草忌菘菜服粟殼忌醋服芫花甘遂忌鹽忌甘草服荊芥忌驢肉黃顙魚服柿蒂忌蟹犯者木香湯能解服巴豆忌蘆筍服諸藥未消化不可食河肫魚食魚後服藥者口鼻流血而死醫說服藜蘆忌狐貍肉服蜜及蜜煎果忌鮓瘡毒未愈不可食生薑雞子犯之則肉長突出作塊而白當禁不禁犯禁必死張子和云病腫脹既平當節飲食忌鹽血房室犯禁者病再作乃死不救病癆嗽忌房室膏粱犯者死子和案云一小兒病痢用車載數十里就某寺調理入門而則死痢疾下墜病也以車載之藥而又下墜也所謂落井而又下石安得不死乎病人遠行不宜以車載馬馱病已擾矣甚者多死不救一人為犬所齧大痛不可忍偏癢燥自云載至家二十里一夕而死時人皆不知車之誤也擾動則邪氣益盛是以死也傷寒之後忌葷肉房事犯之者不救水腫之後忌油鹽肚脾胃傷者節飲食滑瀉之後忌油膩此數者決不可輕犯也唐堯臣浙東人在北吏部當該緣家富平素嗜膏粱數傷脾胃時長夏因過食傷脾作瀉而腹滿求豫治以補中氣兼消導而悉愈隨即速欲食肉類食復傷又脹而瀉子治之又愈竟數日斷葷切欲食肉命家人烹牛肉和酒食之惟飽悶而煩躁求豫消導之不愈自云數日不大便恐後閉所致欲通之豫以屢傷脾胃元氣未復何敢通道不信別求醫通利不一日口乾躁心煩而死原病傷食而又犯之原病下泄今又犯之犯之又犯其死必矣時病新差食蒜鱠者病發必致大困時病新愈食犬羊肉者必作骨蒸熱時病新愈食生棗及羊肉必作脂上熱蒸時病新愈食生菜令人顏色終身不平復病人新愈飲酒食韭病必復作不必忌而忌之過張子和曰臟毒酒毒下血嘔血婦人三十以下血閉六七月間紅痢婦初得孕擇食者以上皆不禁口凡久病之人胃氣虛弱者忽思嘗茹亦當少少與之圖引漿粥穀氣入胃此權變之道也若專以淡粥責之則病不悅而食減不進胃氣斯所以難復病所以難痊此忌之之過也智者通之因時用藥例內經曰必先歲氣無伐天和又曰升降浮沉則順之寒熱溫涼則迎之凡用藥須看時令如常用調理藥春加川芎夏加黃芩秋加茯苓冬加乾薑如解肌發表春溫月用辛涼藥川芎防風荊芥柴胡紫蘇薄荷之類夏暑月用甘辛寒藥乾葛石膏甘草薄荷升麻柴胡之類秋涼月用辛溫藥羌活防風蒼朮荊芥之類冬寒月用辛熱藥麻黃桂枝乾薑附子之類若病與時違勿拘此例如溫暑月治熱病疫癘病不可用辛溫熱藥宜溫涼辛甘苦寒之藥升麻柴胡乾葛薄荷石膏黃芩黃連甘草芍藥之類治咳嗽春多上升之氣用川芎芍藥半夏黃芩之類夏多火炎逼肺用黃芩山梔桑白皮石膏知母之類秋多濕熱傷肺用蒼朮桑白皮黃芩防風之類冬多風寒外來用麻黃桂枝乾薑半夏防風羌活之類若病與時違不拘此例如治瀉泄冬寒月用辛苦溫藥乾薑砂仁陳皮厚朴之類夏暑月暴注水瀉用苦寒酸寒藥黃連山梔茵陳芍藥之類若病與時違不拘此例如傷冷食腹痛或霍亂吐瀉雖夏暑月可用辛熱溫中藥乾薑茱萸砂仁厚朴之類如酒客病或素有熱證雖在寒涼月可用清涼藥芩連乾葛之類凡用藥若不本四時以順為逆四時者是春升夏浮秋降冬沉乃天地之升降浮沉化化者脾土中造化也是為四時之宜但言補之以辛甘溫熱之劑及味之薄者諸風藥是也此助春夏之升浮者也此便是瀉秋收冬藏之藥也在人之身乃肝心也但言之以酸苦寒涼之劑並淡味滲瀉之藥此助秋冬之降沉者也在人之身乃肺腎也用藥者因此法度則生逆之則死其不死者必危困矣炮製十七法雷公藥性論藥之有方猶樂之有調也樂備衆調始和其音藥備衆方始和其劑方劑十七法如曰炮曰爁曰爆曰炙曰煨曰炒曰蝦曰煉曰制曰度曰飛曰伏曰鎊曰摋曰㬠曰曝曰露是也然則用者各盡其宜諸藥製法白朮去皮梗去濕利水用麩炒微黃色補中用淨土炒黃色補脾胃制水其味甘而氣厚利水燥濕宜用各處山術其味淡而能滲醫不可不審也蒼朮去皮用米泔水浸一宿切片曝乾淡淡鹽水微炒黃色再曝乾貯之久而不吐霜汁可美鹽水制過其慓燥之烈性頗純不傷真液出茅山緊小沉重為佳陳皮消痰理氣用福州紅色者謂之橘紅其味辛而性燥要去白穰淨而力愈大若和中補脾胃不必去白惟去粗穰而已用廣州者宜其味甘辛而性溫和所以善和中而益脾也今觀廣皮厚和軟潤福皮薄而剛燥從可知矣炒則氣耗而力微青皮溫水浸一時去穰切片用麩炒疏肝氣積泠用醋炒枳殼熱水浸一時取起殼干慢火煨透然即起切片用破至高之氣消食去積滯用麩炒不爾氣剛恐傷元氣半夏用滾水入明礬或皮硝同泡泡之時勿得動一俟湯冷又易滾湯泡之泡五七次者為佳切片仍以生薑搗汁拌微炒過用去風痰濕痰皆用此若理脾止瀉加六君子湯中用者宜半夏曲曲之性不甚燥而得中和故也其造法在後天南星用陳久者滾湯明礬同泡如半夏例亦以薑汁拌和其驚風風痰小兒方中用者以泡過者為末裝入臘月黃牛膽汁中透風處陰乾用之人參去蘆其蘆能上湧吐痰無制惟用黃亮結實者其力大鬆放輕虛者無力遼東本地名清河者最取好參黃耆北地如箭乾者佳削皮劈開用蜜水塗之慢火炙過用補中益氣如是苦實腠理以固表須酒炒當歸去土劈開用酒浸洗曬乾切片生地黃用無灰酒洗過曬乾用鮮地黃搗汁熬膏用木石臼忌鐵器胃弱者用薑汁炒脾氣滯而膈間痞悶不能服陰藥者須用之以砂仁水濕同生地黃炒則皆無礙也熟地黃用無灰酒洗曬乾用若作丸以酒浸爛木石臼中搗如泥若蜜丸先以和蜜勻然後入衆藥則不患不均矣芍藥熱水泡半日切片酒炒過則不患酸寒伐生氣行血分得酒製尤力大脾胃不足嘔噦者有用姜炒茯苓無制惟揀雲南結實而雪白者為佳去皮淨若清浮腫水腫腫病不必去皮五皮散單用茯苓皮是也四君子湯中用必須南苓五苓散中用必須西苓方可論淡滲西苓尤速也豬苓鋒刀削去黑皮一水泡透用槌打實切之成片澤瀉削去毛熱水浸半時切片黃連酒炒去頭目之火薑汁炒去痰火胃火不傷脾胃去實火三黃解毒湯中用不必制只要去毛淨黃芩治頭目疾須酒炒去肺火生用去虛痰火薑汁炒治上病用片芩治下病用條芩黃柏酒炒腎家用鹽水炒梔子破微炒去浮火連殼用瀉小腸火獨用仁炒過研破煎得味出凡仁入煎俱要碎知母治嗽酒炒入腎鹽水炒去毛皮淨牛膝去蘆酒洗干切杜仲去粗皮切薑汁炒斷絲其絲不斷又復炒孕娠用糯米同炒之破故紙微炒香巴戟天煮水泡透以木槌打碎擘去心小茴香微炒入煎藥研碎滑石揀去粗者擇細膩者研為極細末水飛入藥今粗入煎湯皆不作效石膏研極細調入藥尤效作散者煆熟入煎劑半生半熟麥門冬熟水泡一時透去心用如不去心服反令人心煩躁悶天門冬制同麥門年入丸藥酒浸極爛搗如泥調和衆藥厚朴去粗皮切片薑汁炒白扁豆炒熟去殼微搗碎用薏苡仁炒微黃色桃仁泡去皮尖及雙仁者云雙仁能殺人縱不殺人必有毒杏仁制同上入煎劑研如泥用栝蔞仁打去殼取仁研碎入煎大黃陝西莊南衛者有力不作腹痛川者力遲而痛瀉實者生用虛弱者酒蒸熟用朴硝冬天度一次者尤妙未度擇淨定分兩入盞以熱水泡之同入煎衆藥渣中滲去而力不全葶藶紙炒研碎入煎車前子微炒研碎入煎海藻海帶昆布海粉青鹽之類俱熱水洗冷曬乾入藥木香不得見火惟為末入煎磨汁內熟湯中服沉香檀香同上法丁香砂仁白豆蔻俱宜為末調入湯煎劑必待煎半熟方可入也不爾香氣皆泄散去所以不作效三稜熱水泡浸一時慢火煨透切莪朮制同上何首烏乾者米泔水浸透竹刀刮去皮切片用黑豆以水浸透同首烏蒸之豆熟為度九次者佳白蒺藜炒研去刺研碎入煎山茱萸熱湯泡軟剝去核吳茱萸熱湯泡去頭水曬乾用巴豆去油淨本草云生溫有毒熟寒無毒今之去油生用為避寒也殊不知寒不足避當避其大毒況本經全無去油之製法陶氏煮令黃黑然亦太過不如去其心膜者五度換水各煮一沸為佳局方化滯丸而巴豆不去油只以巴豆煮熟用之深得其性也牽牛微炒搗取頭末有力斑蝥去頭足同糯炒令黃有以牡蠣同炒之穿山甲同蛤粉炒黃色研末調入藥蜈蚣慢火炙去頭足研末入湯桑螵蛸當中破慢火炙之甘遂麵包煨熟去面阿膠打碎如豆大用蛤粉同炒成珠用入湯藥不可衆藥同煎必藥熟起去渣復以同阿膠入淨湯中化清服膃肭臍內滾水泡去毛淨切片新瓦上下慢火炕乾入藥紫河車用熱米泔水洗淨然後用麝香湯洗上下新瓦炕乾入藥有鮮煮食必用椒姜使君子慢火煨香熟用肉豆蔻麵包煨去油熟切入藥茯神去木研細水飛過用陽起石用火煅透紅研極細面入藥硫黃用芭蕉搗汁煮之後以甘草湯煮之方無毒牡礪火煆淬醋盤中又煅又淬五七次為佳蠶白微炒研末入藥皂角去皮弦慢火炙黃用藿香洗去土淨曬乾用乾漆用新瓦上下合定火煅黑煙盡方可用以其性氣大悍服之大傷血氣若去煙而用之止破瘀血而不傷元血若血暈不醒人事者即燒煙燻之立蘇足可以見其悍也砒霜凡入藥劑如齁喘丸三品丸斬兒丹亦不能捨之不用也用之者不知制度其不殺人者幾希每將砒石一兩打碎用明礬一兩為末蓋砒上貯罐中入明火一煅以礬枯為度砒之悍氣隨煙而去駐形於礬中者庶幾無毒用之不傷也凡用砒霜即用礬霜是也黃丹凡用丹入藥如生肌膏生肌散皆必用之緣丹性寒得火煉形而陰中之陽有坎離之義集之生肌去毒者也今市肆售利牽假河沙混之其不飛澄沙石用之必然無效凡丹須冷器以水飛過仍炒乾用入劑桑白皮刮去紅皮切碎用酒炒微黃色為度常山用酒浸過宿切用則不吐大腹皮擘去垢黑用溫水洗淨又用酒洗用有用大豆汁洗方可用孫真人云鳩鳥多棲此樹遺屎在皮上不淨恐有毒今人用之不制曾有人服之而致死者其可忽諸青鹽溫水洗去塵土火煅過用蛤蚧用酒洗溫淨慢火炙熟研入藥白硼砂用口含過得溫用爐甘石用傾銀罐煆紅傾出在三黃湯內三五七尤佳然後用三黃湯懸飴煮乾露一夜焙乾用珍珠豆腐內蒸過鐵臼內搗末研用有用火煆非其制也一說入目貴乎生用瑪瑙犬肉內煮之火煆紅醋淬用琥珀用細布包內豆腐鍋中煮之然後灰火略煨過一雲安心神俱宜生搗入目制過用血竭用燈草同研則成粉磁石火煆淬過硇砂成塊者槌碎乳汁浸一宿瓦器烙干乳用石蟹火煨醋淬過白丁香入目者三黃湯煮干焙用針粉用隔紙有用火煆黃色石燕火煆醋淬用石決明火煆童便淬龍膽水化開點目焙乾研為末入散龍骨火煆巴豆去油淨成粉用白絹包甘草水煮焙乾用方可入目海螵蛸用濕紙包煨過方用鷹條用三黃湯飛甘草湯煮一次焙乾用罌粟殼用熱水泡軟擘去筋膜切成絲用蜜水微炒曬乾用忌蒜醋胡椒蕤仁去衣綿紙包研去油花蜘蛛醋浸死瓦上烙干去足用翠白用傾銀罐煆如膏醋中淬焙乾香附子舂去毛用淨米童便浸一宿取起用淨水洗過炒乾用婦科以醋復燥之玄參用酒洗去塵土切片曬乾用玄參行表治浮游無根之火得酒氣而力愈健運翹擇去枝根及心研碎火煎蔓荊子舂以酒炒過入煎今人往往不研不炒而用之多不作效決明子蘿蔔子芥子蘇子韭子青葙子凡藥中用子者俱要炒過研碎入煎方得味出若不碎如米之在殼雖煮之終日米味豈能出哉乾薑生用發表汗炒過溫脾而守中胃間熱虛甚者如補中益氣湯中加之當慢火煨焦黑紫菀茸用酒洗去土曬乾用桂有謂肉桂則厚桂以滋腎者也當刮去粗皮惟存其肉而用之故曰肉桂其餘行血循經止用薄桂違志熱水泡浸一時破肉去梗和甘草煮半伏時去草不用枇杷葉治咳嗽去毛不淨反令人嗽本草云四月採葉曝乾用時須火炙以布拭去毛去毛不盡以栗稈作刷刷之令盡有用甘草湯洗有用薑湯洗有以酥塗炙用初採濕者一葉重一兩干則三葉重一兩方好石斛用酒洗炙乾或蒸過焙乾用俱可甘草涼藥中生用溫以補脾必須炙熟仙茅糯米泔水浸三宿用竹刀刮去皮木砧上切片陰乾用續斷酒浸一宿捶碎去筋膜曬乾用松香用明淨者名瀝清入滾水煮三炷香撈起放涼水缸中拔之一時復入鍋煮三炷香次入涼水拔如此七次微入灰湯並酒量水一石入灰湯酒各一斗煮之再拔便曬乾聽用此藥最要製法極精稍有不精服之殺人續醫說有人制造不精服之腸塞而死然則製藥之法可不慎哉秋石陰陽二煉法陰煉之法用童便不拘多少每一石用缸一隻盛之攙入清水一石和之用皂莢煎湯一盞加入以竹杖攪之數百回為止候其澄靜片時傾出上面清的一石又加淨水一石如前攪之澄傾之法一次一次其澄下者漸濃必至十次之後如澄樣凝結成霜雪乃已去水以布帛上加紙灰食干收起秋石曝乾再研或加男乳調和日曝夜露七七任用或散或丸服之一年堵壽一紀此陰煉之法雖滌去鹹味凡質固脫所謂先天之氣混泄固不能無化痰降火之功亦不能若鹹味之疾速也補益之功可以並言今人多有彼此優劣之議豫故有陰陽之辨陽煉之法備新缸數只採取童便十餘石採法惟於童蒙學堂中用一人看守藥缸另置一小缸於藥之傍童生來便先試其色之赤白始出色赤蓋有火邪以混之棄而勿用惟清白者取之積有十石移置僻處用大鍋煮煉干則加添必盡十石俱完乾枯為度收起如鐵如石謂之丕胎將此丕胎入士釜明爐火煅黑煙穢氣去盡為度謂之退陰符取出用小銀鍋將新汲泉水煮之無銀鍋銅鍋可溶化無形瀘過滴下淨藥如淨泉復入銀鍋熬干則成白雪潔瀅無埃任加乳汁紅鉛散服丸藥無不宜也若將白雪之藥入鼎明爐用火煅煉清溶霞光燜土結成靈丹如璧如玉於此可見人身之寶不誣矣服者得無效乎秋石陰陽二煉辨秋石陰陽二煉之法不可以優劣加之夫何世不燭理有謂陽煉鹹味不去凡性猶存有謂陰煉清陽混泄正氣不足是二者之議皆過也殊不知二法蓋由鹹味取捨之施理勢之必不可偏廢也然欲存其味者必陽煉乃陽中之陰欲去其味者必陰煉乃陰中之陽苟舍二法不可以成秋石也何則陽煉用火存形其味鹹其質重除病之效速集其鹹味重體而有化痰降火滋腎生水之功則如藥性所用海石青鹽一理也陰煉以水滌體其味淡其質輕益養之功純集其淡味輕體而有還精補腦助氣調神之績則如藥性所用茯神琥珀一理也又謂陽中之陰以象離陰中之陽以象坎有必合兩家之作而並用之以為坎離交媾之義則優劣之辨昭然矣豫故並將陰陽二煉之法録入於集以備養世者之取正云耳制玄明粉法冬月可制用明淨川皮硝十斤水一斗蘿蔔四斤切片同煮爛為度去卜硝水用紙濾瓷樽中露一夜次早另傾浮水置一器中塊沉底者取起復以蘿蔔清水量入同煮如前露澄又次日取起用防風二兩甘草二兩煎湯十碗用玄明粉煮化濾過露一夜次一日傾出甘防湯同煎二次蘿蔔湯煮一沸露一夜余硝俱澄同前硝風吹乾入罐升打火如秋石法任用按制旨蓋硝味特咸以蘿蔔制解之其性善降下若下頭目之火恐或不能達上而降以防風導引上行甘草和緩為佐懼其寒涼久服傷胃故以火煅則得陽長陰消之義而無寒襲脾胃之傷有掣上掣下之功制鹿角膠霜法取新打大鹿角或一二幅以米泔水浸三日夜以瓷片刮去黑垢鋸為寸半長截用新砂鍋以流水浸沒鹿角炭火或桑柴火三日夜另置一罐燒熟水不時頻加鍋內勿使鍋干鹿角露炭火要勻鍋中蟹沸為度夜間須要添水火候足撈起角曬乾收貯其角汁不退火量加麥門冬熟地黃入內烹至三分過二之干濾去二藥將膠傾取淨器內若不甚稠再熬少刻置土地上一日夜去火毒任用衆妙方中加桑白皮黃臘不過欲其成膏然不若門冬地黃為愈也煅青礞石法雲南青礞石有金星鬆放者打碎如豆大每一斤用火硝半斤和勾入罐封口置百眼爐上先文後武煉二炷香煅得透里通紅住火冷定取下和硝研為末用時乳極細和藥為佳制鐘乳粉法鐘乳石取明潔長四五寸者中空光潤輕鬆為佳每八兩用沉香藿香零陵香甘松白茅各一兩以水煮過一伏時煉出又用甘草紫貝天葵各二兩再煮一伏時漉出拭乾緩火枯之搗篩仍用水飛澄以絹籠之曬乾又研萬遍瓷器收貯用苦煉研不精服之令人成淋升陽起石法揀選真正好陽起石打碎用好燒酒浸一宿撈起每兩入樟腦二錢同研一處入固濟陽城罐內上用燈盞封口牢密入百眼爐上用水注盞先文後武打火二炷香冷定取開升盞者可用沉重在底者勿用煉青金法水銀一斤用淨硫黃四兩先入鍋內溶汁即傾水銀入汁內急以棒攪勻如飯以鐵鏟剷起冷則成青土塊收用鎮墜藥之最有力者如靈丹以之墜痰顛病以之鎮祟蓋不可無也打靈砂法用青金或一斤或二斤入固濟罐中量有半罐上用鐵燈盞坐口存一口如筋大出煙先用文火漸加武火盞內著水煉一日住火次日取開靈砂盡結燈盞之下一餅明如硃砂是為靈砂煉銀硃法用靈砂鉢內乳細入膠水同乳飛在羅底絹內不過絹者復入乳之久又飛入絹內直以過盡為度煎烏梅湯乘滾泡入朱中則澄而紅去水成朱炒黃丹法用黑鉛十斤鍋內化開炒成粉再入焰硝一斤同炒極紅則成丹升輕粉法用水銀一斤明礬焰硝皂礬食鹽各二兩同研一處以不見汞星為度用烏瓷盆二個以藥鋪盆內上用一盆合定以鹽泥石膏蜜醋調封盆口勿令泄氣下盆底用鐵釘三腳支住四五寸高用炭火先文後武蒸半日次日冷定輕輕取起上盆則輕粉盡騰於上以鵝翎掃下聽用此為真正輕粉生肌立效市肆便攙寒水石銀母石石膏之僞物而獲利計真正僅有十分之一分如之何而求效哉造雷火針法用豬牙皂角威靈仙細辛羌活白芷川芎草烏白蒺藜藁本天麻蒼朮獨活良薑官桂雄黃乳香沒藥麝香少許余各等分為末用熟艾薄鋪綿紙上少以藥末摻艾上卷作條子如筋大長五寸遇痛針痛其效如神女人隔衣衣上用紙三層將火針燈上燒燃竟就紙上蒸之良久火息痛止不欲發泄只蒸一壯欲發泄者任蒸三壯五壯自然藥氣衝入經絡如著肉灸火一同制金銀屑法用金銀銼為細末以水銀少許研成泥制風化硝法川皮硝十斤蘿蔔四斤水一斗同煮過取起卜用水置瓷樽中澄之過宿去清水以沉下硝濾起風乾則成霜粉是為風化硝煅花蕊石法花蕊石黃淡色者打碎每十兩用硫黃二兩和之以土罐大火煅如粉研極細用敷金瘡神效葛可久治吐血用之止血能化血為水效果神速取竹瀝荊瀝法用取新鮮金竹鋸尺許中留節兩頭去節劈兩開不拘多少用磚二塊架定竹兩頭出磚二寸許各以瓷盤置於下候其瀝滴其中用烈火熏逼則兩頭濈濈滴瀝於盤中竹將自然瀝則盡矣就將滴過瀝竹為薪又架新竹於磚上如前燒逼任取多少荊瀝法如竹瀝法同但荊條要大者去枝用大條截作一樣長排架磚上下亦烈火兩頭滴瀝升粉霜法用水銀二兩鹽一兩明礬一兩皂礬一兩硝五錢共研一處以水銀不見星為度用固濟罐一個裝入前藥罐口用鐵燈盞固封密鐵線纏緊安百眼爐上先文後武火煉三炷香燈盞注水冷定取下升在盞下者掃下為粉霜墜下者可以洗瘡毒敷腫毒炒鉛粉法鉛不拘多少入鐵鍋炒化鉛下烈火鉛化用木柴炒之久則成灰以無活鉛卻用大火燒鍋紅枯鉛又炒百度退火冷再研極細熬膏妙制玉露霜法用好真正干豆粉以指捻之𠿠𠿠聲者又羅過每粉一斤用真蘇州薄荷葉半斤略噴微濕與豆粉和勻裝瓷瓶中鬆鬆勿實密封瓶口坐湯中煮一飯時過宿開取擇去薄荷將淨粉加白糖半斤研勻服取蟠桃酒法凡女人十六歲以上而天癸至者俟其癸至先十日與通乳飲空心煎服後用小兒口咂兩乳久之乳汁自來取法宜於未經來之先不宜既經之後乳至每日以豬蹄煮爛作糜食之不時飲蔥椒湯可服酒汁不可飲茶及食煎炙物忌房事通乳飲並治養子婦人無乳者可服及未行經可以反經作乳川當歸一錢半王不留行一錢半川芎八分穿山甲七片炒研末木通一錢漏蘆一錢升麻一錢甘草節一錢上水二盞姜三片棗一枚煎一盞稍熱服隨飲酒數杯以助藥取紅鉛法用清俊體厚室女將行經時以橐籥收之有謂惟取初經再經不用此亦難也蓋初經為先天一氣而後經亦後天之元亦未可謂殊無用也凡取此藥在擇鼎器調和之功而先後天皆可用也催鉛方補氣和血凡經過期者服之牡丹皮紅花當歸各一錢肉桂檳榔沉香磨汁乳香末調入青皮各五分丁香七粒麝香一分調入上水鍾半煎八分空心稍熱服前後尖彎深約一寸長約四寸外用細帛緝護於邊沿兩頭繫帶取蟾酥法長夏時捉取癩大蝦蟆用蛤蜊殼未離帶者合蟆眉上用力一捻則酥出於殼內收在油明紙上干收貯用蝦蟆仍活放去之而酥復生收秋露水法交白露節先日未時將田禾以淨水潑過次日寅時以洗白布拖展禾頭露水攪下用新瓷瓶收貯久留不壞香甘止渴治諸熱燥最佳養道家謂之無為油服食以甕盆置方諸於中取之收臘雪水臘月以淨瓶收貯淨雪築實密封瓶口置於陰室中不見日色暑天遇煩躁熱渴取飲之甚解熱毒尤勝涼藥凡人家不可不收也收澡絲湯法煮蠶繭絲湯以瓷瓶收密封埋淨土地中任經數年久而愈妙大能治瘟疫及熱病消渴不能止者涼飲數次即止熬金櫻膏法霜降後採金櫻子不拘多少以粗器微搗去毛刺淨復搗破去子約有一斗用水二斗煮之一飯時漉起清汁又入白水煮之又漉起又入白水煮三次之後其滓淡而無味去之止將淨汁復以細密絹濾過淨鍋熬之如飴乃止收貯瓷樽中坐涼水內一宿用其膏大能固精良方二仙丹即此膏加入芡實粉至於止嗽止瀉補脾補腎非醫不知造百藥煎法用文蛤不拘多少為末每一斤用糯米粉三合和勻用溫水拌得所捻作餅子以黃荊葉盦之三日退去涼一日復盒干收用止嗽生津其功甚速造時要六月為妙又法六月間用文蛤每五斤芽茶二兩磨細為末不必羅用新木桶一個將二味入其中用涼水浸過一掌為度上用木蓋固之一七月水乾面上長出白毛用木杵搗爛又蓋住數日後用手捻無滓方好捻作餅子曬乾聽用造半夏曲法半夏不拘多少用滾湯泡過宿搗爛每一斗入生薑一斤同搗之作餅子用干稻稈或粟麥稈盦之如盦曲法干久收取用造神麯法六月六日為諸神集會之晨故名神麯如過此日造者非神麯也法用白虎白麵一百斤勾陳蒼耳自然汁三升騰蛇野蓼自然汁四升青龍青蒿自然汁三升玄武杏仁四升泡去皮尖搗爛入面朱雀赤小豆三升煮熟去皮湯搗爛禾曲一處勻一如造酒麴法又三伏中甲寅戊寅庚寅乃三奇也制艾葉法用糯米濃飲揉艾葉成餅曬乾或瓦炕干一研成粉款冬花佛耳草製法同上制燈芯法將燈芯用瓦礫同研細清水泛之浮者燈芯曬乾用又法與艾葉製法同制黃精法黃精鮮者用水煮勿動蓋直煮爛熟濾起曬乾復蒸之久曬若果九蒸九曬食之可以延年久服令人飛升制菟絲子法用菟絲子溫水淘去砂土淨用酒煮一日夜搗作餅曬乾然後復研方細一法以白紙剪條同研易細制鐵砂法每鐵砂一兩加辰砂一錢同研即如粉研犀角法時法用水磨之甚費力又銍屑入藥其汁終粗古法鋸成小塊如豆極薄紙包內懷中貼肉頃時乘暖急投臼中搗之應手如粉制乳香沒藥法先將乳沒為粗末以箬炙之去油冷定用紙包內壁縫中良久研如粉一法以燈芯同研一法研時口念玄胡索即成末製附子法生附子天雄之類久收必用石灰同罐不腐制熟須用童便一時去皮臍順切成片復又黃連甘草各錢許同煮數沸曬乾收則久留不壞粉銅法用荸薺胡椒和銅研銅能成粉以死茈入水同煮則銅可雕刻粉鐵法用鐵末同辰砂肥皂角荔枝同研鐵成粉粉錫法錫溶化入水銀同擂錫為末死硝法用深砂鍋盛硝先滴水數合於爐火中便放硝鍋於上瓦蓋口不令灰入頃刻成水卻用甘草截長一寸投入有焰無煙絶則硝死出之死鹽法用砂鍋一個安杏仁一個在底卻入鹽八分按實瓦蓋大火溶作汁傾入鐵槽成錠死砒法用砒硝各一兩為末入鍋大火作汁瓦口候無煙傾入槽淨有一兩五錢制硫黃法硫半斤用龍尾蒿紫背天葵二味不拘多少取二碗再加東流水二碗入鍋煮乾為度再用百部甘草各一兩煎湯入硫復煮乾為度取出研萬匝入劑取鐵華粉法用鋼鐵作片藏於鹽醋中日久取出自然生華用刀割下為鐵華粉大能強志治健忘破結癥痃癖及敷竹木刺其功優於鐵粉多矣制古銅錢法古錢其形碎而爛者是用火煅微紅淬醋中用之人目者磨用入散者同胡桃研成粉治心腹痛五淋口瘡皆神效目科用古錢以醋淬七次方用取人中黃法其法春分日用大貓竹鋸段兩頭留節批去青皮一頭取孔容一指入單枝甘草去皮五寸長內孔中仍以木屑屑緊用臘封密系磚沉廁中至來春取起於長流水中浸一日夜復埋淨地凡遇時熱發狂大渴大熱者涼與之一服而渴止熱退極效若於廁二三年者尤佳其甘草即名人中黃制亞芙蓉法取鮮罌栗殼不拘多少搗爛以淨水砂鍋內熬漉起汁又入水熬之榨極干渣不用只以二汁慢火熬干如膏加入炒黑文蛤末調和成餅陰乾凡遇久嗽吐血脫泄崩中久瀉不止用之如神世人不知有謂粟殼之藥劫病而已殊不知久瀉而諸藥不效至於待斃命在須臾非粟殼一劫之功其孰能解千鈞一髮之危也醫之用藥正猶時之常變而行道者宜用之以經權一理也然則劫藥亦猶管仲之於霸也寧不與於夫子乎造烏梅法四月間取青梅或一石或五斗微拌因煤盦一二日稍軟磚炕上用柴或草燒熏二晝夜乾溼得所收起鋪折上冷向日中暴乾即成烏梅其物怕水怕濕即發熱如火而焚焦枯惟光核而已如有一簍若著半杯水則一簍俱焚而無用矣緣烏梅之在藥有生津止渴止嗽收汗止瀉止痢之功或不可以無焉造淡豆豉法大黑豆不拘多少甑蒸香熟為度取出攤置笊籃中乘溫熱放在無風處四圍上下用黃荊葉或青穰緊護之數日取開豆上生黃衣已遍取出曬一日次日溫水洗過或用紫蘇葉切碎和之烈日曝十分乾瓷器收貯密封江西淡豆豉法六月六日用黑豆水浸一宿蒸熟攤席上以簸扁蓋之三日一看黃衣遍曬乾簸去其黃衣再用水拌得所入瓶內築實桑葉塞口泥封口日中曬七日開曝一時又以水拌入瓶內如此七次再蒸映去火氣仍入瓶築實泥封則成矣桑白皮二寸半土瓜根三寸大棗七枚同研為細膏早起化湯洗面及手大去皺紋又法以黑豆煮爛撈起鋪樓板上三寸厚乾草密蓋二七盦幹盡起黃衣揭去草取豆餅干七日然後用六月六日五更時用河水洗去黃衣乘溫入木桶內盦之盦五日取出曬極干再以淨器貯之任用造楂糕法用大山楂蒸熟杵去子加錠粳米粉砂糖量加搗和成劑作餅子不拘寺壬意當果子食之能去積消食消痰飲造枯蔞餅法用黃熟栝蔞取穰和子置石臼中用蛤蜊蜆殼煅如粉和入栝蔞穰中得斫連子搗成餅曬半乾細切過復搗勻作餅子曬乾收用或為散為丸止嗽清痰其功甚速於仁也取清明水制明目膏法先清明節制下眼藥諸劑按清明交接時刻取東方上井泉水煮藥煎膏如紫金錠黃連膏碧雲膏之類誠心精製無不神效有節日不暇製藥只按節汲水貯淨瓶中密封瓶口塗以泥頭埋淨地中暇日取清明水修制是亦同也收青魚膽法臘月取青魚膽用鴨嘴膽礬為末裝入魚膽內懸風處乾每遇喉痹咽痛單雙乳蛾取膽礬為末用蘆管吹半分許入喉即愈制旱蓮椹子膏四月桑椹黑熟先採旱蓮草不拘多少用大者去根莖葉洗淨曬乾用瓷樽微撒鹽醃半日曬乾入甑內蒸熟曝乾搗末或三五升然後取桑椹汁和之作餅暴乾再研細末每晨用酒調三錢空心服大固精神滋陰補腎黑鬚發尤效若修補丸中任意加入
