body:
  text: 卷之六十一眼科病機內經敘論內經曰諸脈者皆屬於目目得血而能視針經曰五臟六腑注於目而為之睛睛之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精則為約束裹擷筋骨血氣之精而與脈併為系上屬於腦後出於項中故邪中於項因逢其身之虛其入深則隨眼系入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪中其情則精所中不相比也則精散精散則視歧故目者五臟六腑之精榮衛魂魄之所常營也神氣之所主也故神勞則魂魄散志意亂是故瞳子黑眼發於陰白眼赤脈發於陽故陰陽合傳而精明也目者心之使也心者神之舍也故精神亂而不轉卒然見非常之處精神魂魄散不相得故曰惑也目主肝心二臟為最要內經曰東方青色入通於肝開竅於目藏精於肝又云人臥血歸於肝肝受血而能視又云肝氣通於目肝和則目能辨五色而明矣又云心合脈諸脈皆屬於目也目榮脾臟東垣曰夫十二經脈三百六十五絡其血氣皆上走於面而走空竅其清陽氣上散於目而為明其氣走於耳而為聽因心煩事冗飲食失節勞役過度致脾胃虛弱心火太盛則百脈沸騰血脈逆行邪害空竅天明則日月不明矣夫五臟六腑之精氣皆稟受於脾上貫於目脾者諸陰之首也目者血脈之宗也故脾虛則五臟之精氣皆失所司不能歸明於目矣心者君火也主人之神宜靜而安相火化行其令相火者絡也主百脈皆榮於目既勞役運動勢乃妄行又因邪氣所並而損血脈故諸病主焉凡醫者不理脾胃乃養血安神治標不治本是不明正理也龍木禪師論人有雙眸如天之有兩曜乃一身之至寶聚五臟之精華其五輪者應五行八廓者象八卦凡所患者或因過食五辛多啖炙爆熱飧麵食飲酒不已房室無節極目遠視數看日月頻撓心火夜讀細字月下觀書抄寫多能雕鏤細作博奕不休久被煙火位淚過多刺頭出血多若此者俱散明之本復有馳騁田獵沖冒塵沙日夜不息者亦傷目之由又於少壯之時不自保惜逮至四十以漸昏蒙故善衛養者才至中年無事常須瞑目勿使他視非有要事勿宜輒開則雖老而視不衰大抵榮衛順則斯疾無由而生榮衛衰則致病多矣且傷風冷則淚出虛煩則昏蒙勞力則眥赤白腫則肺家受毒生瘡則風熱侵肺黃乃酒傷於脾血灌瞳仁及赤色俱是心家有熱羞明見紅花為肝邪黑花則腎虛青花膽有寒五色花為腎虛有熱不可一概為治若虛不補而實不瀉亦難收救然上虛乃肝虛下虛乃腎虛肝虛則頭暈耳聾目眩腎虛則虛壅生花耳作蟬鳴大宜補肝益腎其有熱淚交流兩瞼赤痛乃肝之極熱迎風有淚為腎虛客熱涼肝瀉腎必得其宜至於五臟各以類推虛則生寒實則生熱補瀉之用須在參詳亳釐之差千里之謬余則無非有所觸動或大病之後所患不一至於暴赤一證多因泛熱衝上或眠食失時飽食近火得之加以勞役失於調攝過食毒物變成惡證醫者不原本始但知暴赤屬陽或以散血之劑或以涼心之藥縱使退散遂至脾經受寒飲食不進頭目虛煩五臟既虛因成內障亦有見其不進飲食俾更服熱藥遂致暴燥熱氣上攻昏澀眵淚或犯盛怒辛苦重勞遂生胬肉心氣不寧風熱交併變為攀睛證狀不一是為外障又若讀書博奕等勞過度名曰肝勞不可但投以治肝之劑及作他證治之卒於罔效惟須閉目珍護不及遠視庶乎疾瘳若夫患風疹者必多眼暗先攻其風則暗自去婦人胎前產後用藥亦須避忌小兒所患切宜善治惟略加淋洗鈹鐮針灸端不可施尤戒其用手頻揉或因茲睛壞至於莫救以上諸證專是科者宜留意焉楊仁齋論眼者五臟六腑之精華如日月麗天著明而不可掩者也其首尾赤眥屬心其滿眼白睛屬肺其烏睛圓大屬肝其上下臉胞屬脾而中黑瞳一點如漆者腎實主之是雖五臟各有證應然論其所主則瞳子之關係重焉何以言之目者肝之外候也肝取木腎取水水能生木子肝母腎焉有子母而能相離者哉故肝腎之氣充則精彩光明肝腎之氣乏則昏蒙暈眩烏輪赤暈刺痛浮漿此肝熱也瞼生清淚枯黃繞睛此肝虛也瞳人開大淡白偏斜此腎虛也瞳人焦小或帶微黃此腎熱也一虛一實以此驗之然人知肝腎之氣相依而行孰知心者神之舍又所以為肝腎之副焉所謂一而二二而一者也何則心主血肝藏血血熱沖發於目者皆當清心涼肝又不可固執水生木之說夫眼者輕膜裹水照徹四方溯源反本非天一生水又果孰為之主宰乎析而論之則拘急牽颼瞳青胞白癢而清淚不赤不痛是之謂風眼烏輪突起胞硬腫紅眵淚濕漿裡熱刺痛是之謂熱眼眼渾而淚胞腫而軟上壅朦朧酸澀微赤是之謂氣眼其或風與熱並則癢而浮赤風與氣得則癢澀昏沉血熱交聚故生淫膚粟肉紅縷偷針之類氣血不至故有眇視胞垂雀眼盲障之形淡紫而隱紅者為虛熱鮮紅而紫赤者為實熱兩眥呈露生胬肉者此心熱血旺白睛紅膜如傘紙者此氣滯血凝熱證瞳人內湧白睛帶赤冷證瞳人青綠白睛枯槁氣沉而濁也眼熱經久復為風冷所乘則赤爛眼中不赤但為痰飲所注則作痛肝氣不順而挾熱所以羞明熱氣蓄聚而傷胞所以胞合籲此外證之大概然爾五臟不可闕一脾與肺獨無預何耶曰白睛帶赤或紅筋者其熱在肺上胞下胞或目唇間如疥點者其熱在脾脾主味也五味之秀養諸中則精華髮見於其外肺主氣也水火升降榮衛流轉非氣孰能使之前所謂五臟各有證應者於此又可推矣雖然眼之為患多生於熱其間用藥大抵以清心涼肝調血順氣為先有如腎家惡燥設遇虛證亦不過以當歸地黃輩潤養之輕用溫藥不可也況夫肺能發燥肝亦好潤古方率用杏仁柿干飴糖砂蜜為佐果非潤益之意乎至於退翳一節尤關利害凡翳起於肺家受熱輕則朦朧重則生翳珍珠翳狀如碎米者易散梅花翳狀如梅花瓣者難消雖翳自熱生然治法先退翳而後退熱者謂熱極生翳若先去赤熱則血為之冰而翳不能去其有赤眼與之涼藥過多又且滌之以水不反掌而冰凝眼特一團水耳水性清澄尤不可規規於點洗喜怒失節嗜欲無度窮役目力泣涕過傷凌霧衝風當暑冒日不避煙火飲啖熱多此皆患生於臟腑者也專事點洗可乎哉有能靜坐澄神愛護目力放懷息慮心逸日休調和飲食以養之斟酌藥餌以平之明察秋毫斷可必矣目病無非屬火論內經曰諸熱瞀瘛冒昧氣逆衝上目昧不明諸痛瘡癢皆屬於火河間云目昧不明目赤腫痛翳膜眥瘍皆為熱也及目膜俗謂之眼黑亦為熱也然平白目無所見者熱氣鬱之甚也或言目味為肝腎虛冷者誤也是以謂肝主於目腎主於瞳子故妄言目昧為虛冷也然腎水冬陰也虛則當熱肝木春陽也虛則當涼腎陰肝陽豈能同虛而為冷者歟或通言肝腎之中陰實陽虛而無由昧俗妄謂肝腎之氣衰少而不能至於目也不知經言熱翳目冥眼黑也豈由寒爾又如仲景言傷寒病熱極則不識人乃目盲也正理曰由熱甚怫鬱於目而致之然也然皮膚之汗孔者謂氣液之孔竅也一名氣門謂泄氣之門也一名腠理謂氣液出行之腠道文理也一名鬼門者謂幽冥之門也一名玄府者謂玄微之府也然玄府者無物不有出入升降之道路門戶也經曰出入廢則神機化滅升降息則氣立孤危故非出入則無以生長化收藏是以升降出入無器不有人之眼耳口鼻一身神識能為用者皆由升降出入之通利也有所閉塞者不能為用也若目無所見耳無所聞鼻不聞臭舌不知味筋痿骨痹齒腐毛墮皮膚不仁腸不能滲泄者悉由熱氣怫鬱玄府閉密而致氣液血脈榮衛精神不能升降出入故也各隨鬱結微甚而察病之輕重也故知熱鬱於目無所見也故目微昏者至近則轉難辨物由目之玄府閉小也如隔縑視物之象也或視如蠅翼者玄府有所閉合者也或目昏而見黑花者由熱氣甚而發之於目亢則害承乃制而反出其泣氣液昧之以其至近故雖視而亦見如黑花也衝風泣出而目暗者由熱甚而水化制之也故經言厥則目無所見夫人厥則陽氣並於上陰氣並於下陽氣並於上則火獨光也陰氣並於下則足獨冷也夫一水不勝五火故目昧而盲是以衝風泣下而不止風之中於目也陽氣內守於睛是火氣燔目故見風泣下也目痛有二曰陰曰陽一曰目眥白眼痛屬陽故痛晝甚而夜輕點苦寒藥服辛苦發散之劑則效經所謂白眼赤脈法於陽故也陽主散陽虛則眼楞急而為倒睫拳毛一曰目珠黑眼痛屬陰故痛夜甚而晝輕點苦寒藥服發散劑則反劇經所謂瞳子黑眼法於陰故也陰主斂陰虛不斂則瞳子散大而為目昏眼暗運氣有三能致目赤一曰風助火鬱於上經云少陰司天之政二之氣陽氣布風乃行寒氣時至民病目瞑目赤氣鬱於上而熱又云少陽司天之政初之氣風勝乃搖候乃大溫其病氣幹上目赤是也二曰火盛經曰火太過曰赫曦之紀其病目赤又云火鬱之發民病目赤心熱又云少陽司天之政三之氣炎暑至民病熱中聾瞑目赤又云少陽之勝目赤是也三曰燥邪傷肝經云歲金太過燥氣流行民病目赤又云陽明司天火燥氣下臨肝氣下從脅痛目赤是也外障內障須要分辨外障在睛外有翳遮睛如目痛赤脈從上而下者太陽病之類須是隨證施治如鼓應桴內障在睛里無翳而昏暗與不患之眼相似惟瞳人里隱隱青白無隱青白者亦有之也此為內障屬氣血虛宜從補法詳見治法條綱目謂內障先患一目次第相牽兩目俱損者皆有翳在黑睛內遮瞳子而然今詳通黑睛之脈者目系也目系屬足厥陰足太陽手少陰三經蓋此三經臟腑中虛則邪乘虛入中鬱結睫目系入黑睛內為翳龍木論所謂腦脂流下作翳者為足太陽之邪也所謂肝風衝上成翳者即足厥陰之邪也故法以針言之則當取三經之俞次如天柱風府太衝通里等穴是也其有妙手巧心審諦者用針於黑眼裡撥過其翳為效尤捷以藥言之則當於補中疏通此三經之鬱結使邪不得入目系而愈龍木論內障根源歌不疼不痛漸昏朦薄霧輕煙漸漸濃或見蠅飛花亂出或如懸蟢在虛空此般狀樣因何得肝臟停留熱與風大叫大啼驚與怒腦脂流入黑睛中初時一眼先昏暗次第相牽與一同苦口何須陳逆耳只緣肝氣不相通此時服藥宜銷定將息多乖即廢功日久既應全黑暗時名內障障雙瞳名字隨形分十六龍師聖者會難窮靈藥這回難得效金針一撥自當空強修將息依言說莫遺仍前病覆宗歧視亂見靈樞經曰目之上系屬於腦後出於項中邪中於項因逢身之虛其入深則隨目系入於腦入於腦則轉轉則目系急目系急則目眩以轉邪中其精所中者不相比也則精散精散則歧視故見一物為兩也東垣益氣聰明湯加驅風之藥是也亂視者乃精神惑亂故卒然非常經所謂精神魂魄散不相得故惑亂也又曰夫精明者所以視萬物辨白黑審長短若視長為短視白為黑如是則精衰矣藥與歧視大同睛目直視睛目者目睛邪側不正也俗謂邪視小兒謂三通睛此亦胎氣得之者藥無治法惟甲乙經針灸水溝為主直視者視物而目睛不轉動者是也若目睛轉動者非直視也傷寒直視者邪氣壅盛冒其正氣使神氣不慧藏睛之氣不上榮於目則目為之直視傷寒證至於直視為邪氣極證候逆多難治經曰衄家不可發汗發汗則額上陷脈緊急直視不能不能眠以肝受血而能視亡血家肝氣虛目氣弱又復亡陽則陰陽俱虛所致也大抵病危直視皆為臟氣脫絕邪盛而正氣衰也目閉不開綱目云足太陽之筋為目上綱足陽明之筋為下綱熱則筋縱故目不開也五輪歌曰血輪四眥屬心經氣輪白肺黑風輪肉輪上下瞼脾胃水輪屬腎主瞳人眼目之圖五輪之圖八廓歌曰關泉小腸水穀金肺陰會屬腎胞陽門命門傳道大腸清淨膽津液膀胱養化林肝肺屬白珠為氣輪肝屬黑珠為風輪脾胃屬上下瞼皮為肉輪心屬四眥為血輪腎屬瞳人為水輪風輪病因喜怒不常作勞用心晝凝視遠物夜勤讀細書眼力既勞風輪內損其候眥頭尤澀睛內偏疼視物不明胞弦緊急宜去風之藥血輪病因憂愁思慮悲喜房勞內動於心外攻於目其候赤筋纏眥白瘴侵睛胞腫難開昏暮多澀日久下淚失明愈深洗心涼血之藥肉輪病因多食熱物好吃五辛遠遂奔馳注睛聚騎食飽耽眠積風痰壅其候胞弦赤腫暴赤昏朦眼眵常盈倒睫澀痛瘀血侵睛宜疏肝醒脾之藥氣輪病因凌寒冒暑愛飲寒漿肌體虛疏寒邪入內或痛或昏傳在白睛筋多腫赤視日如隔霧觀物似生煙日久不治變成白膜黑暗難開宜祛寒清熱宣肺藥水輪病因勞役不止嗜欲無厭大驚傷神大怒傷志加之多食酒面好啖鹹辛因動腎經通於黑水冷淚鎮流於瞼上飛花相趁於眼前積氣風虛或澀或癢結成翳障多暗多昏宜補腎之藥八廓天廓傳道肺大腸風廓養化肝地廓水穀脾胃雷廓關泉小腸火廓胞陽心命門山廓清淨膽水廓會陰腎澤廓津液膀胱八廓之圖天廓病因雲中射雁月下看書多食腥膻侵冒寒暑致天廓有病內動視物生煙眥痛難開不能辨認地廓病因濕漬頭上冷灌睛眸眼弦緊急瘀血生瘡火廓病因心神恐怖赤病侵眥血灌瞳人熱淚如傾其證瞼紅睛內偏痛熱淚難開水廓病因努力爭鬥開弓力強致令生病昏暗淚風廓病因窗穴臨頭有風吹腦坐臥當之腦中邪風攻於風廓以致黑暗多癢兩瞼常爛或昏多淚雷廓病因失枕臥睡酒後行房血脈溢滿精宣閉滯風虛內聚上攻故令眥赤瞼內生瘡山廓病因撞刺磕損致肉生兩瞼翳閉雙睛若不早治永成昏暗瘀血侵睛澤廊病因春不宣解冬聚陽毒多吃脂胞過食熱物致令腦脂凝聚血淚攻潮有如霧籠復見飛蜂繚繞黑花常滿難於膽視五輪病證血輪病因心經火熱驚恐所生宜瀉心涼肝所病大小眥赤爛多生浮翳血灌瞳人大眥先赤小眥左眼先病傳右眼皆屬心氣輪病因肺熱白睛紅腫多生瘀肉有淚白膜侵睛名曰氣障而亦因侵冒寒暑憂思所生宜宣肺補心風輪病因肝經積熱怒氣太盛所生病則昏暗黑花頭痛流浪宜瀉肝補肺肉輪病因脾胃勞倦飲食不節熱毒厚味所生病則上下瞼澀眼胞腫起胬肉侵睛外生小塊在廓名曰輪針倒睫拳毛皆屬於脾宜瀉肝清脾水輪病因腎經虛弱酒色太過相火所成病則眼目青暗頭痛冷淚觀人物若煙視太陽若水久而失治青盲內障宜補腎補肝八廓病證關泉廓屬小腸經病主瘀肉侵睛水穀廓屬脾經病主額頭常痛眵淚多黑花會陰廓屬腎經病主昏暗淚生睛痛胞陽廓屬命門病主瞼肉赤腫睛痛多瘀血清淨廓屬膽經病主兩眥癢痛淚出傳道廓屬大腸經病主昏朦多淚津液廓屬膀胱經病主血系侵睛胬肉生瞼養化廓屬肝經主赤筋拳毛倒睫八廓辨經云眼屬五臟六腑百脈之精而具明故五輪之說有所本也八廓之說無義可據綱目所以刪之甫考八廓乃後世龍木禪師論五行八卦配合之意於義不切奈何傳誤既久俗習一辭遽爾釐刪似為脫簡夫何世謂眼科開口五輪八廓若遺言者即謂弗工姑存而辨之以俟漸杜七十二證歌圓冰滑澀散浮沉白翳黃心橫翳新棗花黑偃兼風變驚振雷頭雀目生綠烏青黑黃風障胎患傷寒熱後昏肝經積熱混睛膜胬肉攀睛兩眼黏黑翳如珠花翳陷冰霞深翳入水輪釘翳根深浮玉翳偶然遂順忽然成雞冠蜆肉瞼生粟胞內凝脂與漏睛蟹睛突起迎風淚倒睫拳毛碧翳分鵑眼凝睛神祟痛旋螺突起轆轤形打傷撞損風牽瞼血灌瞳人昧目塵天行赤眼暴赤翳胎風赤弦客熱侵瞼硬睛冷痛如刺瞳人幹缺癢難任黃膜上衝赤膜下瞼中生贅與通睛疳眼斑瘡青膜障青盲起坐更生星血翳包睛女子逆早晨午後有其因痛極憎寒與傷損七十二候此分明七十二證候圓翳內障一圓翳初起如薄霧輕煙不痛不癢漸而失明名曰內障或先病一目後則俱病此是腦脂流下肝風充上宜以金針撥之服防風散冰翳內障二冰翳初患頭額眉瞼遍痛眼中赤澀此由肝臟積熱久成內障其翳如冰瞳人漸大宜服還睛丸滑翳內障三滑翳初患不癢不痛先病一目後乃相牽漸漸失明有翳如水銀珠子亦由腦脂流下肝風上衝宜決明散澀翳內障四澀翳先病一目後兩目俱病如雲霧朦罩不見三光陰看則大陽看則小瞳人慾散宜還睛丸散翳內障五散翳初因風熱上攻久而生翳漸而失明其翳如雲霧布散太空滿如帛朦物遂成內障宜服蟬花無比丸浮翳內障六浮翳初患一目久則俱病亦因肝風上衝腦脂流下翳如銀色宜服墜翳丸沉翳內障七此因肝臟勞熱常見黑花年久凝結成翳色青白瞳人中若沉如在水中宜還睛丸白翳黃心八此由勞傷太過虛熱上攻有時昏朦不能辨物久成內障白翳中黃宜服參茯還睛丸橫翳內障九此證瞳人有膜青白色其翳上下皆平中有如橫劍之狀宜服還睛丸棗花內障十此證頭旋腦熱痛癢不休眼前常見黃黑花眼中有翳參差如棗花宜服參茯還睛丸黑圓翳內障十一此證頭旋腦熱眼黑生花肝膽積熱風上衝腦凝結成翳如煙色隱隱深沉如水之中不能視物宜服瀉肝散偃月翳內障十二此證為肝腎俱勞致生翳障如偃月白色不能辨物服墜翳丸五風變化內障十三此證乃是虛勞內熱嘔吐傷睛腦熱生風今目失明初覺宜服除風湯後服補腎丸驚振內障十四此因五臟虛勞肝氣內促熱上充腦毒氣流下眼中而成白翳故成內障宜服鎮肝丸雷頭風內障十五此因熱毒上衝頭及面目頸項俱腫故曰雷頭風久而毒氣入目致令失明瞳人漸大宜服瀉肝散高風雀目十六此因臟腑熱極腎水不滋金不制木肝氣損目久則變為青昏不見宜服瀉肝散綠風內障十七此證頭旋額痛眼內多赤常見紅黑不定皆因肝風熱盛致令瞳人綠開久則無見宜服還睛丸烏風內障十八此證不痛不癢漸漸昏暗是由氣澀使然真如烏風宜服補肝丸青盲內障十九此證多因酒色太過內傷腎氣不痛不癢漸失其明眼目俱不傷損有似常人只因一點腎氣不充故無所見有謂瞳人反背有謂翳膜遮朦皆非也宜服還睛滋腎之藥黑風內障二十此證頭旋腦痛眼澀生花往來黑暈乃是肝臟虛勞致使失明瞳人漸小宜補肝丸黃風內障二十一此證多因胃火太盛上衝頭目初病痛澀久則昏花如霧漫天紅焰黃黃漸致失明宜瀉胃散決明散胎患內障二十二此證因母懷孕之時太過酸甘酒色不禁移毒於胎致生目疾或赤或爛或膜或翳宜服清涼散傷寒熱後昏內障二十三此因熱病愈後臟氣未痊餘熱未盡或多食毒味致令眼前黑暗瞳人開大視物不明宜服熊膽丸肝經積熱內障二十四此因肝經熱甚毒氣入腦下注於目赤澀生翳或聚或散初輕而漸重宜服酒調散瀉肝散混精內障二十五此證初起不痛不癢漸覺昏朦亦因勞神太過熱熾生風肝邪為翳而成內障久則失明宜養血瀉肝散胬肉攀睛二十六此因心肺二經火邪沖目至有內眥肉息漸起攀睛久而不退必定失明宜服洗心瀉肺湯外點老膜散及用手法去之瞼生風粟二十七此因脾胃積熱肝木生風致使兩瞼內生風粟如粟子磨搽目珠痛成翳障久久漸昏流浪不止宜先以燈草去粟去血後服清脾退熱除風之藥黑翳如珠二十八此因肝經積熱勞作腎虛致使冷痛出淚烏睛上邊黑翳凸起如珠宜服除風湯後服補腎丸花翳白陷二十九此證初患頭痛腫澀淚出難開眼中白翳如碎米或如魚鱗陷凹為肝風太盛血氣俱虛宜用疏風活血外點熊膽膏冰霞深翳三十此因肺熱肝風致令黑睛生白翳如冰霞之象不宜鉤割宜服茺蔚子散膜入水輪三十一此證虛勞之過肝臟風熱年久烏睛變為白翳漸入水輪若有血根血筋者難治宜服活血湯鎮心丸釘翳外障三十二此因心火肝風上炎入目致使赤腫有淚怕日羞明疼痛太甚生翳如釘高突如粟宜服除熱瀉心湯後服定志丸玉翳浮睛三十三此因熱鬱不退使生白膜如玉凝睛或痛或腫久則滿睛失明宜服退翳湯逆順生翳三十四此因五臟虛勞風熱壅蔽時常赤腫致漸生翳或從上生或從下生上下交貫甚則厚如駑肉侵及瞳人白睛紅者先服知母飲後服補虛人參丸雞冠蜆肉三十五此因脾胃積熱毒氣入腦而流於目以致目生肉翳如雞冠蜆肉之狀鉤割可去宜服茺蔚子丸搜風湯兩瞼黏濃三十六此因脾胃熱毒壅於目致使兩瞼澀赤多眵如膿或眼皮翻出眥角不開宜服涼血活血湯外用消風湯洗胞肉凝脂三十七此因脾胃伏熱風邪上衝久則眼胞內生肉翳如粟米破爛如桃膠之象雖內服藥必先去余肉及瘀血點退毒膏方可拳毛倒睫三十八此因脾肺熱壅致令眼弦癢澀日以手揩以致倒睫有因勞倦思慮太過致令脾氣下陷而睫倒則拳毛反內眼珠受害漸生翳膜久而不起必致失明宜以方法健起眼皮先服細辛湯後服補脾藥碧翳內障三十九此因風熱久亢而生碧翳淡青色於黑睛上下不痛不癢久則失明宜服退翳散體眼凝睛四十此因五臟風熱結積而然所患眼目忽然疼痛眼珠脹硬轉回不隨血氣凝滯不能榮轉宜針合谷諸穴以引氣血通流後用摩風膏塗之宜服搜風湯神祟痛四十一此因心火積鬱血熱為病或日輕夜重或好惡不常久久延患謂之邪祟宜服安心丸養心補血湯旋螺尖起四十二此因腎水不足肝火有餘上注目中初覺脹痛漸生翳子起至黑睛高突如旋螺宜服瀉肝散補腎丸轆轤展睛四十三此因臟腑壅毒致目之患兩瞼上下各開翻反不相遮蔽睛出狀如轆轤惟直視不能轉動急服瀉肝散麥門冬湯打撞傷損四十四若因打跌傷損積血注目者宜敷血藥內宜行血當歸川芎湯其或物傷眼珠突出可從容以手輕輕托進緩交揉定不可洗面及目若有汙血在面上可用熱酒淋絹封貼面上少時取下血自去宜地黃酒除風湯迎風冷淚四十五此證肝風入目陽氣內伏外面迎風則淚隨出內風以應外風亦各從其類也至夏月陽氣在外則不出淚則風亦在外故也若久而肝虛夏月亦有淚也宜服細辛茺蔚子散白膜侵睛四十六此證肝虛肺盛故有白膜侵上黑睛白珠多赤亦肺有火邪先服瀉肺散後服蒙花散青膜內障四十七此為肝風太過入目生青膜蔽睛如霧如煙此因熱久生風致有此障久而不退必致失明宜點八寶散服瀉肝養金之藥羞明怕日四十八此蓋因脾經濕熱鬱目中瞼不能開疼痛流淚怕日羞明此則內火所惡外火而然也宜服瀉脾散及去水穀地廓三焦濕熱小兒痘瘡四十九此因痘毒末盡餘熱在目故目害只宜清涼解毒不須點藥漏睛膿血五十初因五臟積熱毒郁不散以致目內生瘡膿血泛流久則清漿因而成漏甚則破陷失明宜服黃耆湯蟹睛突起五十一此因五臟熱毒所攻至令烏睛上有黑翳突起如蟹睛之狀初起急服桔梗飲後服補睛丸有用小針刺蟹睛上流出清水以藥點之而愈風牽出瞼五十二此因脾胃積熱肝經風盛致患赤瞼相牽甚則眼胞掉出治宜刺去瘀血烙以燈燧宜服黃耆湯血灌瞳人五十三此因觸傷外物不曾散行敗血以致血灌瞳人或腫或脹疼痛難開不治則失明宜服止痛沒藥散復用活血散點以七寶膏眜目飛塵五十四此因飛塵入目黏貼瞼皮睛上疼痛摻澀難開不能睹物治須翻出眼皮用綿拭淨方點藥宜服寧心丸天行赤眼暴翳五十五此因運氣所患風火淫郁大概患眼赤腫淚出而痛或致頭額俱疼漸生翳障遮蔽瞳人紅紫不散必有瘀血宜去之可服瀉肝散鎮心丸天行赤眼五十六亦因運氣流行忽然疼痛淚出鼻塞不利初患一目後復相仍或二七後亦愈不宜去血宜服瀉肝兼散邪外用洗藥爛弦風瞼五十七此因脾胃積熱風邪相干致患眼弦赤爛小兒皆因胎氣風熱之毒宜用碧雲膏塗之後服黃耆湯暴風客熱五十八此因三焦積熱久則攻目忽然白睛紅腫壅護烏睛痛癢不一淚出難開先用洗肝散後服補肝丸瞼硬睛疼五十九此因風熱凝滯鬱結不散久則生翳不能視物宜以煨鹽煎洗點以紫金膏服活血清熱疏風之劑痛如針刺六十此證先惟頭痛淚出漸至痛如針刺此是心經伏火鬱蒸太過久則翳膜蔽睛急宜洗心涼膈瞳人幹缺六十一此因腎虛肝熱致令瞳人幹缺上下常長斜偏不正久而損目失明宜洗肝後補腎風癢難任六十二皆因風熱太盛所以癢澀難任或有迎風便癢久則雨瞼赤爛宜去瘀血洗以鹽煎服補肝湯黃膜上衝六十三此證初患赤澀淚出漸而白睛下邊黃膜衝上烏睛遮蔽瞳人皆因肝風胃熱所致則宜點文推云服瀉脾散赤膜下垂六十四此證赤痛發歇年久漸至黑睛上邊生有赤膜垂下如紅霞之狀俗云倒垂蓮翳則宜點武推云服清涼散瞼中生贅六十五此證脾胃積久而發出以致瞼生肉贅如粟如黍或有血塊俱以手法去瘀血服活血清熱而愈血翳包睛六十六此證多因心經熱壅肝臟虛勞致有赤脈侵睛赤肉擁簇黑睛如橡斗包裹之狀有因上下瞼有粟而致有瘀血者先去臉內瘀血服活血湯及退雲散小兒疳眼六十七此證多是飲食炙爆甘辛積熱以致脾胃成疳上攻眼目赤澀烏珠有翳久漸變白宜速治療若不是除多成痼疾初服清熱飲次服五疳丸早晨疼痛六十八此因虛陽上攻頭風注目早晨血氣皆從上行故虛陽及風火而勢益盛故疼痛也宜服芎藭散及白蒺藜散午後昏朦六十九此因陰血不足滯而不行血致午後則斂而氣不充其血故也此皆陰虛腎弱先服回陽養血湯後服滋腎丸女人血氣逆流七十此證因經血不通氣血逆行而上攻於目故目每害之滿眼紅筋或如血翳包睛之狀甚者血灌瞳人治此者但只通經而目隨愈宜服破血通經之藥痛極憎寒七十一此證目痛憎寒乃為陽虛而生外寒宜固衛氣兼治目痛若或發熱而憎寒者必有外感宜用羌活湯發散之不須治目而目痛自愈今專是科者但見憎寒輒用附子此之謂不知本起坐生花七十二此證眼前黑花簇飛而不疼不痛無眵無淚蓋是腎肝虛憊氣不充周以致視有如無睹無若有氣血不足水木不榮此皆不宜點藥可服補湯及羊肝丸益腎丸之屬甫按七十二證古者有之茲綠之以成全書至於論治則又不可執於是而昧法之大綱也夫大綱者標本也氣血也風火也知此三者目病其庶幾乎治法詳悉於下原機啟微論淫熱反克之病膏粱之變滋味過也氣血之盛稟受厚也元陽上炎陰不濟也邪入經絡內無御也因生而化因化而熱熱為火火性上炎足厥陰肝為木木生火母妊子子以淫勝火發反克而肝開竅於目故肝受克而目亦受病也其病眵多眊矂緊澀赤脈貫睛臟腑秘結者為重重者芍藥清肝散主之通氣利中丸主之眵多眊臊緊澀赤脈貫睛臟腑不秘結者為輕輕者減去硝黃芍藥清肝散主之黃連天花粉丸主之火盛服通氣利中丸目眶爛者內服上藥外以黃連爐甘石散收其爛處兼以點眼春雪膏龍腦黃連膏㗜鼻碧雲散攻其淫熱此治淫熱反克之法也非膏粱之變非氣血之盛非亢陽上炎非邪入經絡毋用此也用此則寒涼傷胃生意不上升反為所害病豈不治而已也噫審諸風熱不制之病風動物而生於熱譬如烈火焰而必吹此物類感召而不能違間者也因熱而召是為外來久熱不散感而自生是為內發內外為邪惟病則一淫熱之禍條已如前益以風邪為害豈纖乎風加頭痛風加鼻塞風加腫脹風加涕淚風加腦巔沉重風加眉骨痠疼有一於此羌活勝風湯主之風加癢則以杏仁龍膽草泡散洗之病者有此數證或不服藥或誤服藥翳必隨之而生翳如雲霧翳如絲縷翳如秤星翳如秤星者或一點或三四點而至數十點翳如螺蓋者為病久不去治不如法至極而至也為服寒涼藥過多脾胃受傷生意不能上升漸而至也然必要明經絡庶能應手翳凡自內眥而出為手太陽足太陽受邪治在小腸膀胱經加蔓荊子蒼朮羌活勝風湯主之自銳眥客主人而入者為足少陽手少陽手太陽受邪治在膽與三焦小腸經加龍膽草藁本少加人參羌活勝風湯主之自目系而下者為足厥陰手少陰受邪治在肝經心經加黃連倍加柴胡羌活勝風湯主之自抵過而上者為手太陽受邪治在小腸經加木通五味子羌活勝風湯主之熱甚者兼用治淫熱之藥㗜鼻碧雲散俱治已上之證大抵如開鍋蓋法㗜之隨效然力少而銳宜不時用之以聚其力雖然早者易而久者難漸而復漸復而又復可也急於復者即不治今世醫用磨翳藥者有之用手法揭翳者有之噫翳猶瘡也奚斯愈乎庸者用此非徒無益增害尤甚愚者受此欣然而不悟可嘆也哉故置風熱不制之病治法七情五賊勞役飢飽之病陰陽應象大論曰天有四時以生長收藏以生寒暑燥濕風寒暑燥濕風之發耶發而皆宜時則萬物俱生寒暑燥濕風之發耶發而皆不宜時則萬物俱死故曰生於四時死於四時又曰人有五臟化為五氣以生喜怒憂悲恐喜怒憂悲恐之發耶發而皆中節則九竅俱生喜怒憂悲恐之發耶發皆不中節則九竅俱死故曰生於五臟死於五臟目竅之一也光明視見納山川之大及亳芒之細悉雲霄之高盡泉沙之深至於鑑無窮而有窮而有窮又不能為窮反而聚之則乍張乍斂乍動乍靜為一泓一點之微者豈力為強致而能此乎是皆生生自然之道也或因七情內傷五賊外攘飢飽不節勞役異常足陽明胃之脈足太陰脾之脈為戊己二土生生之原也七情五賊總傷二脈飢飽傷胃勞役傷脾戊己既病則生生自然之體不能為生生自然之用故致其病曰七情五賊勞役飢飽之病其病紅赤睛珠痛痛如刺應太陽眼睫無力常欲垂閉不敢久視久視則痠疼生翳皆成陷下所陷者或圓或方或長或短或如點或如縷或如錐或如鑿證有印此者柴胡復生湯主之黃連羊肝丸主之痛睛甚者當歸養榮湯主之助陽活血湯主之加減地黃丸主之決明益陰丸主之加當歸黃連羊肝丸主之龍腦黃連膏主之以上數方皆群隊升發陽氣之藥其中有用黃連黃芩之類者去五賊也㗜鼻碧雲散亦可兼用最忌大黃芒硝牽牛石膏梔子之劑犯所忌則病愈振血為邪勝凝而不行之病血陰物類地之水泉性本靜行其勢也行為陽是陰中之陽乃坎中有火之象陰外陽內故行也純陰故不行也不行則凝凝則經絡不通經曰足陽明胃之脈常多氣多血又曰足陽明胃之脈常生氣生血手太陽小腸之脈斜絡於目眥足太陽膀胱之脈起於目內眥二經皆多血少氣血病不行血多易凝靈蘭秘典論曰脾胃者倉廩之官五味出焉五味淫則傷胃胃傷血病是為五味之邪從本生也又曰小腸者受盛之官化物出焉遇寒則阻其化又曰膀胱者州都之官津液藏焉遇風則散其藏一阻一散血亦病焉是為風寒之邪從末生也凡是邪勝血病不行不行漸滯滯則易凝凝則病始外見以其斜絡目眥耶以其起於目內眥耶故病環目青黭如被物傷狀重者白睛亦黭輕者或成斑點然不痛不癢無淚眵眊矂羞澀之證是曰血為邪勝凝而不行之病此病初起之時大抵與傷寒證相似一二日則顯此病也川芎行經散主之消凝大眥丸主之睛痛者更以當歸養榮湯主之如此則凝復不滯滯復能行不行復行邪消病除血復如故志此無所不愈也不志於此無所愈也氣為怒傷散而不聚之病氣陽物類天之雲霧性本動聚其體也聚為陰是陽中之陰乃離中有水之象陽外陰內故聚也純陽故不聚也不聚則散散則經絡不收經曰足陽明胃之脈常多氣多血又曰足陽明胃之脈常生氣生血七情內傷脾胃先病怒七情之一也胃病脾病氣亦病焉陰陽應象大論曰足厥陰肝主目在志為怒怒甚傷肝傷脾胃則氣不聚傷肝則神水散何則神水亦氣聚也其病無眵淚痛癢羞明緊澀之證初但昏如霧露中行漸空中有黑花又漸睹物成二體久則光不收遂為廢疾蓋其神水漸散而又散終而盡散故也初漸之次宜以千金磁朱丸主之鎮墜藥也石斛夜光丸主之羨補藥也益陰腎氣丸主之壯水藥也有熱者滋陰地黃丸主之此病最難治餌服上藥必要積以歲月必要無飢飽勞役必要驅七情五賊必要德性純粹庶幾易效不然必廢廢則終不復治久病光不收者亦不復治一證因為暴怒神水隨散光遂不收都無初漸之次此一得永不復治之證也又一證為物所擊神水散如暴怒之證亦不復治俗名為青盲者是也世病者多不為審概曰目昏無傷始不經意及成世醫亦不識直曰熱致竟以涼藥投殊不知涼藥又傷胃況不知涼為秋為金肝為春為木涼藥又傷肝往往致廢而然後已病者猶不以藥非而委之曰命也醫者猶不自悟其藥而贅之曰病拙籲二者俱此誰其罪乎予累見也故兼陳涼藥之誤血氣不分混而遂結之病輕清圓健者為天故首象天重濁方厚者為地故足象地飄騰往來者為云故氣象云過流循環者為水故血象水天降地升云騰水流各宜其性故萬物生而無窮陽平陰秘氣行血隨各得其調故百骸理而有餘反此則天地不降升雲水不騰流各不宜其性矣反此則陰陽不平秘氣血不行隨各不得其調矣故曰人身者小天地也難經曰血為榮氣為衛榮行脈中氣行脈外此血氣分而不混行而不阻也明矣故如雲騰水流之不相雜也大抵血氣如此不欲相混混則為阻阻則成結結則無所去還故隱起於皮膚之中遂為疣病然各隨經絡而見疣病自上眼睫而起者乃手少陰心脈足厥陰肝脈血氣混結而成也初起時但如豆許血氣衰者遂止不復長亦有久止而復長者盛者則漸長長而不已如杯如盞如碗如斗皆自豆許致也凡治在初須擇人神不犯之日大要令病者食飽不飢先汲冷井水洗眼如冰勿使氣血得行然後以左手持銅筋按眼睫上右手翻眼皮令轉轉則疣肉已突換以左手大指按之弗令得動移復以右手持小眉刀尖略破病處更以兩手大指甲捻之令出則所出者如豆許小黃脂也恐出而根不能斷宜更以眉刀尖斷之以井水再洗洗後則無恙要在手疾為巧事畢須投以防風散結湯數服即愈此病非手法則不能去何則為血氣初混時藥自可及病者則不知其為血氣混也比結則藥不能及矣故必用手法去去畢必又以升發之藥散之藥手皆至庶幾了事熱積必潰之病積者重疊不解之貌熱為陽陽平為常陽淫為邪常邪則行行則病易見易見則易治此則前篇淫熱之病也深邪則不行不行積伏因伏而又伏日漸月聚勢不得不為積也積已久久則必潰潰始病見病見則難治難治者非不治也為邪積久比潰已深何則潰猶敗也知敗者庶可以救其病隱澀不自在稍覺眊矂視物微昏內眥穴開竅如針目按之則沁沁膿出有兩目俱病者有一目獨病者目屬肝內胱屬膀胱此蓋二經積邪之所致也故曰熱積必潰之病又曰漏睛眼者是也竹葉瀉經湯主之大便不硬者滅大黃為用蜜劑解毒丸主之不然藥誤病久終為枯害陽衰不能抗陰之病或問曰人有晝視通明夜視罔見雖有火光月色終為不能睹物者何也答曰此陽衰不能抗陰之病諺所謂雀盲者也問曰何以知之答曰黃帝生氣通天論曰自古通天者生之本本於陰陽天地之間六合之內其氣九州九竅五臟十二節皆通乎天氣又曰陽氣者一日而主外平旦人氣生日中而陽氣隆日西而陽氣已虛氣門乃閉又曰陽不勝其陰則五臟氣爭九竅不通故知也問曰陽果何物耶答曰凡人之氣應之四時者春夏為陽也應之一日者平旦至昏為陽也應之五臟六腑者六腑為陽也間曰陽何為而不能抗陰也答曰人之有生以脾胃中州為主也靈蘭秘典曰脾胃者倉廩之官在五行為土土生萬物故為陽氣之原其性好生惡殺遇春夏乃生長遇秋冬則收藏或有憂思恐怒勞役飢飽之類過而不節皆能傷動脾胃脾胃受傷則陽氣下陷陽氣下陷則於四時一日五臟六腑之中陽氣皆衰陽氣既衰則於四時一日五臟六腑之中陰氣獨盛陰氣既盛故陽不能抗也問曰何故夜視罔見答曰目為肝肝為足厥陰也神水為腎腎為足少陰也肝為木腎為水水生木蓋亦相生而成也況怒傷肝恐傷腎肝腎所傷亦不能生也晝為陽天之陽也晝為陽人亦應之也雖受憂思恐怒勞役飢飽之傷而陽氣下陷遇天之陽盛陰衰之時我之陽氣雖衰不得不應之而升也故猶能晝視通明夜為陰天之陰也夜為陰人亦應之也既受憂思恐怒勞役飢飽之傷而陽氣下陷遇天陰盛陽衰之時我之陽氣既衰不得不應之而伏也故夜視罔所見也問曰何以為治答曰鎮陰升陽之藥決明夜靈散主之問曰病見富貴乎貧賤者乎答曰憂思恐怒勞役飢飽富貴者甚乎惟其貧賤者不能免甚也問者稱善陰弱不能配陽之病五臟無偏勝虛陽無補法六腑有調候弱陰有強理心肝脾肺腎各有所滋生一臟或有餘四臟俱不足此五臟無偏勝也或浮或為散是曰陽無根益之欲令實翻致不能禁此虛陽無補法也膀胱大小腸三焦膽包絡俾之各有主平秘永不危此六腑有調候也衰弱不能濟遂使陽無御反而欲匹之要以方術盛此弱陰有強理也精微論曰心者五臟之專精目者為其竅也又為肝之竅腎生骨骨之精為神水故肝木不平內挾心火為勢妄行火炎不制神水受傷上為內障此五臟病也勞役過多心不行事相火代之五臟生成論曰諸脈皆屬於目相火者心包絡也主百脈上榮於目火盛則百脈沸騰上為內障此虛陽病也膀胱小腸三焦膽脈俱循於目其精氣亦皆上注而為目之精精之窠為眼四府一衰則精氣盡敗邪火乘之上為內障此六腑病也神水黑眼皆法於陰白眼赤脈皆法於陽陰齊陽侔故能為視陰微不立陽盛即淫陰陽應象大論曰壯火食氣壯火散氣上為內障此弱陰病也其病初起時視覺微昏常見空中有黑花神水淡綠色次則視歧睹一成兩視神水淡白色可為沖和養胃湯主之益氣聰明湯主之千金磁朱丸主之石斛夜明丸主之有熱者以瀉熱黃連湯主之久則不睹神水絕白色永為廢疾也然廢疾亦有治法先令病者以冷水洗眼如冰氣血不得流行為度用左手大指次指按定眼珠不令轉動次用右手持鴨舌針去黑睛如米許針之令入白睛甚厚欲入甚難必要手准力完重針則破然後斜回針首以針刀刮之障落則明有落而復起者起則重刮刮之有至再三者皆為洗不甚冷氣血不凝故也障落之後以棉裹黑豆數枚令如杏核樣使病目垂閉覆眼皮上用軟帛纏之睛珠不得動移為度如是五七日才許開視視勿勞也亦須服上藥庶幾無失此法治者五六不治者亦四五五臟之病虛陽之病六腑之病弱陰之病此四者皆為陰弱不能配陽也噫學者慎之心火乘金水衰反制之病天有六邪風寒暑濕燥火也人有七情喜怒憂思悲恐驚也七情內召六邪外從從而不休隨召見病此心火乘金水衰反制之病也世病目赤為熱人所共知者也然不審其赤分數等各治不同有白睛純赤如火熱氣炙人者乃淫熱反克之病也治如淫熱反克之病有白睛赤而腫脹外睫虛浮者乃風熱不制之病也治如風熱不制之病有白睛淡赤而細脈深紅縱橫錯貫者乃七情五賊勞役飢飽之病有白睛不腫不脹忽如血貫者乃血為邪勝凝而不行之病也治如血為邪勝凝而不行之病有白睛微變青色黑睛稍帶白色白黑之間赤環如帶謂之抱輪紅者此邪火乘金水衰反制之病也此病或因目病時內多房勞皆能內傷元氣元氣一虛心火亢盛故火能剋金金乃手太陰肺白睛屬肺水乃足少陰腎黑睛屬腎水本剋火水衰不能克反受火制故視物不明昏如霧露中或睛珠高低不平其色如死甚不光澤赤帶抱輪而紅也口乾舌苦眵多羞澀稍有熱者還陰救苦湯主之黃連羊肝丸主之川芎決明散主之無口乾舌苦眵多羞澀者助陽活血湯主之神驗錦鳩丸主之萬應蟬花散主之有熱無熱俱服千金磁朱丸鎮墜心火滋益腎水榮養元氣自然獲愈也噫天之六邪未必能害人也惟人以七情召之而致也七情匿召六邪安從反此者豈止能避而已哉猶當役之而後已也內急外弛之病陰陽以和為本過與不及病皆生焉急者緊縮不解也弛者寬縱不收也緊縮屬陽寬縱屬陰不解不收皆為病也手太陰肺為辛為金也主一身皮毛而目之上下睫之外者亦其屬也手少陰心為丁手太陽小腸為丙丙丁為火故為表裡故分上下而目之上下睫之內者亦其屬也足厥陰肝為乙乙為木其脈循上睫之內火其子也故與心合心肝小腸三經受邪則陽火內盛故上下睫之內緊縮而不解也肺金為火克受克者必衰衰則陰氣外行故目之上下睫之外者寬縱而不收也上下睫既內急外弛故睫毛皆倒而刺里睛既受刺則深赤生翳者睛受損也故目所病者皆具如羞明沙澀畏風怕日沁爛或痛或癢生眵流浪之證俱見有用藥夾於上睫之外者欲弛者急急者弛而睫毛無倒刺之患者非其治也此徒能解厄於目前而終復其病也何則為不審過與不及也為不能除其原病也治法當攀出內瞼向外速以三稜針亂刺出血以左手大指甲迎其針鋒後以黃耆防風飲子主之無比蔓荊子湯主之決明益陰丸主之菊花決明散主之㗜鼻碧雲散亦宜兼用如是則緊縮自弛寬縱漸急或過不及皆復為和藥夾之治忍勿施也徒為苦耳智者宜審此奇經客邪之病人之有五臟者猶天地之有五嶽也六腑者猶天地之有四瀆也奇經者猶四瀆之外別有江河也奇經客邪非十二經之治也十二經之外別有治奇經之法也繆刺論曰邪客於足陽蹺之脈令人目痛從內眥始啟玄子王冰注曰以其脈起於足上行至頭而屬目內眥故病令人目痛從內眥始也針經曰陰蹺脈入鼽屬目內眥合於太陽陽蹺而上行故陽蹺受邪者內眥即赤生脈如縷縷根生瘀肉瘀肉生黃赤脂脂橫侵黑睛漸蝕神水此陽蹺為病之次第也或兼銳眥而病者以其合於太陽故也銳眥者手太陽小腸之脈也銳眥之病必輕於內眥者蓋枝蔓所傳者少而正受者必多也俗呼為攀睛則其病也還陰救苦湯主之撥雲退翳丸主之梔子勝奇散主之萬應蟬花散主之磨障靈光膏主之消翳復明膏主之朴硝黃連爐甘石泡散主之病多藥不能及者宜治以手法先用冷水洗如針內障眼法以左手按定勿令得動移略施小眉刀尖剔去脂肉復以冷水洗淨仍作前藥餌之此治奇經客邪之法也故並置其經絡病始為物所傷之病志於固者則八風無以窺其隙本於密者則五臟何以受其邪故生之者天也召之者人也雖生弗召莫能害也為害不已召之甚也生氣通天論曰風者百病之始也清淨則肉腠閉拒雖有大風苛毒弗之能害陰陽應象大論曰邪風之至疾如風雨故善治者治皮毛夫肉腠固皮毛密所以為害者安從其來也今為物之所傷則皮毛肉腠之間為隙必甚所傷之際豈無七情內移而為衛氣衰憊之原二者俱召風安不從故傷於目之上下左右者則目之上下左右俱病當總作除風益損湯主之傷於眉骨者病自目系而下以其手少陰有隙也加黃連除風益損湯主之傷於額者病自抵過而上傷於耳中者病自銳眥而入以其手太陽有隙也加柴胡除風益損湯主之傷於額交巔耳上角及腦者病自內眥而出以其足太陽有隙也加蒼朮除風益損湯主之傷於耳後耳角耳前者病自客主人斜下傷於頰者病自銳眥而入以其手少陽有隙也加枳殼除風益損湯主之傷於頭角耳前後及目銳眥後者病自銳眥而入以其足少陽有隙也加龍膽草除風益損湯主之傷於額角及巔者病自目系而下以其足厥陰有隙也加五味子除風益損湯主之諸有熱者更當加黃芩兼服加減地黃丸傷甚者須從權倍大黃瀉其敗血六節藏象論曰肝受血而能視此蓋滋血復血之藥也此治其本也又有為物暴震神水遂散更不復治故並識之於此傷寒愈後之病傷寒病愈後或有目復大病者以其清陽之氣不升而餘邪上走空竅也其病隱澀赤脹生翳羞明頭腦骨痛宜作群隊升發之劑餌之數服斯愈傷寒論曰冬時嚴寒萬類深藏君子固密不傷於寒觸冒之者乃名傷寒其傷於四時之氣者皆能為病又生氣通天論曰四時之氣更傷五臟五臟六腑一病則濁陰之氣不得下清陽之氣不得上今傷寒時病雖愈濁陰清陽之氣猶未來復故餘邪尚熾不休故其走上而為目之害也是以一日而愈者餘邪在太陽二日而愈者餘邪在陽明三日而愈者餘邪在少陽四日而愈者餘邪在太陰五日而愈者餘邪在少陰六日而愈者餘邪在厥陰七日而復是皆清陽不能出上竅而復受其所害也當為助清陽上出則治以人參補陽湯主之羌活勝風湯主之加減地黃丸主之㗜鼻碧雲散亦宜用也忌大黃芒硝苦寒通利之劑用之必不治強陽搏實陰之病強者盛而有力也實者堅而內充也故有力者強而欲搏內充者實而自收是以陰陽無兩強亦無兩實惟強與實以偏則病內搏於身上見於虛竅也足少陰腎為水腎之精上為神水手厥陰心包絡為相火火強搏水水實而自收其病神水緊小漸小而又小積漸之至竟如菜子許又有神水外圍相類蟲蝕者然皆能睹而不昏但微覺眊矂羞澀耳是皆陽氣強盛而搏陰陰氣堅實而有御雖受所搏終止於邊鄙皮膚也內無所傷動治法當抑陽緩陰則愈以其強耶故可抑以其實耶惟可緩而弗宜助助之則反勝抑陽酒連散主之大抵強者則不易入故以酒為之導引欲其氣味投合入則可展其長此反治也還陰救苦湯主之療相火藥也亦宜用㗜鼻碧雲散然病世亦間見醫者要當識之亡血過多之病六節藏象論曰肝受血而能視宣明五氣篇曰久視傷血氣厥論曰膽移熱於腦則辛頞鼻淵傳為衄衊瞑目繆刺論曰冬刺經脈血氣皆脫令人目不明由此推之目之為血所養者明矣手少陰心生血血榮於目足厥陰肝開竅於目肝亦多血故血亡目病男子衄血便血婦人產後崩漏亡之過多者皆能病焉其為病睛珠痛珠痛不能視羞明隱澀眼睫無力眉骨太陽因為痠疼當作芎歸補血湯主之當歸養榮湯主之除風益損湯主之滋陰地黃丸主之諸有熱者加黃芩婦人產漏者加阿膠脾胃不諧噁心不進食者加生薑復其血使有所養則愈然要忌咸物宣明五氣篇又曰咸走血血病無多食鹹是忌斑疹餘毒之病東垣李明之曰諸斑疹皆從寒水逆流而作也子以初生也在母腹中母呼亦呼母吸亦吸呼吸者陽也而動作生焉飢食母血渴飲母血飲食者陰也而形質生焉陰具陽足十月而降口中惡血因啼即下卻歸男子生精之所女子結胎之處命宗所謂玄牝玄關者也此血僻伏而不時發或因乳食內傷或因濕熱下溜營氣不從逆於肉理所僻伏者乃為所發初則膀胱壬水夾脊逆流而克小腸丙火故頸項以上先見也次則腎經癸水又克心火故胸腹已上次見也終則二火熾盛反制寒水故胸腹以下後見也至此則五臟六腑皆疾也七日齊七日盛七日謝三七二十一日而愈者為火數故也愈後或有病疽病瘡者是皆餘毒尚在不去者今其病目者亦然所害者與風熱不制之病稍同而異總以羚羊角散主之便不硬者減硝黃未滿二十一日而病作者消毒化斑湯主之此藥功非濁能於目蓋專於癍者之藥也不問初起已著服之便令消化稀者則不復出方隨四時加減深疳為害之病衛氣少而寒氣乘之也元氣微而飲食傷之也外乘內傷釀而成之也父母以其純陽耶故深冬不為裳父母以其惡風那故盛夏不解衣父母以其數飢耶故飼後強食之父母以其或渴耶故乳後更飲之有愚戇而為父母者又不審其寒暑飲食也故寒而不為暖暑而不能涼飲而不至渴食而不及飢而小兒幽玄銜默抱疾而不能自言故外乘內傷因循積漸釀而成疳也渴而易飢食而瘦腹脹下利作嘶嘶聲日遠不治遂生目病其病生翳睫閉不能開眵淚如糊久而膿流竟枯兩目何則為陽氣下走也為陰氣反上也治法當如陰陽應象大論曰清陽出上竅濁陰出下竅清陽發腠理濁陰走五臟清陽實四肢濁陰歸六腑各遠其原不反其常是其治也當作升陽降陰之劑茯苓瀉濕湯主之升麻龍膽草飲子主之此藥非專於目並治以上數證然勿後後則危也為父母者其審諸脈候左寸脈洪數心火炎上也關弦而洪肝火盛也右寸脈關脈俱弦而洪肝木挾相火之勢而先侮所不勝之金而制己所勝之土也尺脈微弱腎水不升而火在上尺脈洪數為相火邪火上炎挾肝木之邪而爍目也治法行血一法治目病之綱經曰目得血而能視故血為目之主血病則目病血凝則目脹血少則目澀血熱則目腫所以古人治目惟取神庭上星囟會前頂百會血之翳者可使立退痛者可使立已昧者可使立明腫者可使立消令人亦有去血之法惟可施於暴熱暴腫又不宜以為法之常也何則令人多是七情之鬱火氣血之耗損故去血太多而目愈槁無所滋榮病益熾矣所以彌年不愈終久失明也為今治者只以活血涼血為上策而滋陰降火以收功此蓋治目之大綱固無所損而必可以收十全之功醫者不可以不審也散熱一方治目病之要劉河間曰世人視目之病而不知病之理豈知目病悉因於火而為病乎何以言之白輪變赤火乘肺也瞼皮赤腫火乘脾也黑水神光被翳火乘肝與腎也赤脈貫目火自甚也善治火者一句了故內經曰熱勝則腫凡目暴赤腫起羞明隱澀淚出不止暴翳目蒙皆火熱之所為也治火之法藥用鹹寒吐之下之可使立愈甫按目病屬火固其理也病之始起可以峻用寒涼或兼七情鬱滯氣血停凝以致熱壅而為目病者則當於苦寒劑中而加之以辛溫之藥而發散之導滯開鬱而氣血風火豈不從而發散者乎甫故曰散熱為要亦表裡之意也備於下云治目須識表裡河間曰在腑為表當除風散熱在臟為里當養血安神如暴病昏澀翳膜眵淚斑熱入眼皆表病風熱宜表散以去之如久病昏弱不欲視物內障見黑花瞳散皆里也血少神勞腎虛也宜補養以安神除風散熱者瀉青丸主之養血安神者定志丸主之婦人熟地丸主之有體肥氣盛風熱上行眼目昏澀槐子散主之有因目疾服藥過多致損氣血久之眼漸昏弱乍明乍暗不能視物此則失血之驗也熟乾地黃清氣定志丸相須而養之或有視物不明見黑花之會也而反閉之此風邪內滿常有不測之疾也用藥內外不同明醫雜著眼痛赤腫古方用藥不同當分內外在內湯散用苦寒辛涼之藥以瀉其火在外點洗則用辛熱辛涼之藥以散其邪故點藥莫要於冰片而冰片大辛熱以其辛性急故藉以拔出火邪而散其熱氣古方用燒酒洗目或用乾薑末生薑汁點眼者皆此意也蓋火眼是火邪上攻於目故內治用苦寒藥治其本也然火邪既客於目從內出外若外用寒涼以阻逆則鬱火內攻不得散矣故點藥用辛熱而洗眼用熱湯是火鬱即發之因而散之從治法也世人不知冰片為劫藥而誤認為寒常用點眼遂至積熱入目而漸昏暗翳障故云眼不點不瞎者此也又不知外治寒涼而妄將冷水冷物冷藥挹法當致昏暗者有之目病發率腫兩瞼如桃合而為一痛不可忍者宜用防風通聖散下之立愈血氣壅痛四物湯加龍膽草防己防風羌活之屬實熱上衝而痛黃連瀉火當歸補血心煩加梔子便秘加大黃久病目昏當用八珍湯加羌活防風甘菊佐之不可服寒涼之藥肥人風熱上壅目痛防風羌活荊芥酒芩以散濕熱瘦人血少血熱用養血涼血藥少加風藥宜生地四物湯芩連荊芥菊花防風之類勞役飲食不節內障昏暗蔓荊子湯瞳子散大瞳子散大由食辛熱之物太甚故也所謂辛主散熱則助火上乘於腦中故精散而視物亦散大也夫睛明所以視萬物者也令視物不真則精衰矣蓋火之與氣勢不兩立故經曰壯火食氣壯火散氣手少陰足厥陰所主風熱連目系邪入中人各從其類故循此道而攻頭目腫悶瞳子散大皆血虛陰弱故也當除風熱涼血益血以收耗散之氣則愈矣拳毛倒睫拳毛倒睫之病為脾受木邪風火糜害故兩瞼受傷外緩內急之所致也蓋內復熱致陰氣外行當去內熱併火邪眼皮內緩則睫不倒拳毛立出翳膜立退治用手法掉出內瞼向外以三稜去血左手爪甲迎其針鋒立愈目眶赤爛目眶歲久赤爛俗名為赤瞎是也當以三稜針刺目眶外以瀉濕熱而愈不能近視能遠視不能近視陽氣有餘陰氣不足也乃血虛氣盛蓋血虛氣盛者火有餘元氣不足也火為元氣之賊元氣來也徐而和細細如絲邪氣來也緊而強如巨川之水不可遏也海藏云目能遠視責其有火不能近視責其無水宜東垣地芝丸主之不能遠視能近視不能遠視者陽氣不足陰氣有餘也氣虛而血盛也血盛者陰火有餘氣虛者氣弱也海藏云目能近視責其有水不能遠視責其無火東垣定志丸主之辨赤脈始起治以分經目痛赤脈從上而下者太陽也從下而上者陽明也從外眥走內者少陽也太陽病宜溫之散之陽明病宜下之寒之少陽病宜和解之子和治一子年十餘歲目赤多淚眾工無效戴人見之曰此子目病得之母腹中被驚其父曰孕時在臨清被兵恐戴人令服瓜蒂散加鬱金上湧下瀉各去涎沫數升人皆嘆之其母亦曰兒腹中無病何以吐瀉如此至明日其目輝然爽明安善趙君玉目暴赤腫點洗不退偶思戴人有言曰凡病在上者皆宜吐乃以茶調散湧之一湧而目愈君玉嘆曰法之妙其效如此乃知法不遠人人自遠法也孫真人在仁廟朝治衛才人患眼疼眾醫不能療或用寒藥或用補藥加之臟腑不安上召孫孫曰臣非眼科乞不全責於臣降旨有功無過孫乃診之肝脈弦滑非壅熱也乃才人年壯血盛肝血並不通遂問宮人月經已三月不通矣遂用通經藥經既通不日目疾愈上賜孫三十萬緡宮人謠曰神醫不來雙睛難開子和嘗自病目或腫或翳羞明隱澀百餘日不愈忽眼科張仲安云宜刺上星百會攢竹絲空諸穴上血出及以草莖內兩鼻中出血約升許來日愈大半三日平復如故此則血實宜破之之法也藥方芍藥清肝散治眵多眊矂緊澀羞明赤脈貫睛臟腑秘結白朮甘草川芎防風荊芥桔梗羌活芍藥柴胡前胡薄荷黃芩山梔知母各五分滑石石膏大黃芒硝各八分水二盞煎一盞食後熱服洗肝散治風毒上攻暴作目腫痛澀難開眵淚不絕川當歸羌活薄荷梔子芎藭生地黃防風大黃龍膽草甘草各等分為末每服三錢白湯調服平肝散治迎風冷淚川芎當歸赤芍藥防風荊芥柴胡羌活蟬蛻菊花蔓荊子白芷各五分生地黃膽草各八分夏枯草一錢甘草三分上水二盞煎一盞去渣加酒一杯同服洗心散治心經積熱四眥赤澀痛淚黃連生地黃各一錢菊花當歸各八分木通梔子各七分甘草四分水二盞煎一盞食後溫服防風通聖散治時行暴熱風腫火眼腫痛難開或頭面俱腫防風荊芥當歸川芎赤芍藥麻黃薄荷桔梗黃芩梔子石膏白朮連翹大黃朴硝各等分每服五錢水二盞煎食遠溫服涼膈散治膈上積熱攻頭目腫痛赤澀黃芩梔子薄荷甘草大黃連翹朴硝各等分上為細末每服三錢白湯調下食遠服明目流氣飲治肝經虛邪風熱上攻眼目昏花當風多淚怕日羞明赤澀難開或生翳障倒睫拳毛眼弦赤爛及婦人風暴赤眼包眥黑應作眼疾皆效大黃川芎大力子炒菊花防風細辛白蒺藜炒去刺梔子黃芩玄參蔓荊子草決明炒荊芥木賊蒼朮各等分甘草上為末每服二錢臥時飲湯或酒下蟬花無比散治大人小兒遠年近日一切風眼氣眼攻注昏暗瞼生風粟或痛或癢漸生翳膜或久患頭風牽搐兩目漸漸細小眼眶赤爛並宜治之若常服此祛風退翳明目蛇蛻炒一兩蟬蛻去頭翅一兩羌活當歸石決明鹽水煮一時川芎各二兩白蒺藜炒去刺八兩蒼朮防風芍藥茯苓甘草各三兩上為末每服三錢食後米泔調服還陰救苦湯治目久病白睛微變青色黑睛稍帶白色黑白之間赤如帶謂之包輪紅視物不明昏如霧露中睛面高低不平其色如死甚不光澤口乾舌苦眵多羞澀上焦有熱升麻蒼朮甘草知母防風羌活川芎各半兩柴胡細辛二錢藁本酒洗四錢紅花一錢桔梗半兩黃連黃芩黃柏歸尾各七錢連翹生地黃膽草各半兩上為粗末每服六錢水二盞煎一盞熱服菊花決明散治風熱毒攻卒生翳膜赤脈貫睛羞明多淚漸成內障暴發客熱並宜服之草決明炒石決明制羌活甘菊花蔓荊子川芎黃芩木賊石膏甘草各等分上為細末每服二錢水一盞煎七分連末服東垣當歸龍膽湯治眼中白翳防風石膏柴胡羌活五味子升麻各三分甘草黃連黃耆各五分黃芩酒炒黃柏炒芍藥龍膽草酒洗歸身各八分上水二盞煎一盞去渣入酒杯餘熱服瀉熱黃連湯治內障眵淚眊矂黃連酒炒黃芩酒炒生地黃酒洗龍膽草酒洗各一兩柴胡升麻各半兩上為粗末每服三錢水一盞煎八分午後熱服萬應蟬花散治一切眼疾眵多怕日上焦邪熱蟬蛻蛇蛻各三錢川芎防風羌活炙甘草蒼朮赤芍藥當歸白茯苓各一兩石決明制半兩上為細末每服二錢食後臨臥米飲調下無比蔓荊子湯治眼稜緊急以致倒睫拳毛損睛生翳及上下瞼眥赤爛羞澀難開眵淚稠黏蔓荊子當歸葛根防風各五分人參黃耆各一錢細辛甘草各三分黃連柴胡各一錢水二盞煎一盞食遠熱服助陽活血湯治眼睫無力常欲垂閉或痛或昏黃耆蜜炙甘草水浸炙當歸酒洗各五分白芷四分蔓荊子炒防風升麻酒洗各五分柴胡七分上作一服水二鍾煎一鍾食遠稍熱服當歸養榮湯治眼珠痛甚血少枯澀當歸川芎芍藥熟地黃防風白芷羌活各八分上水二盞煎一盞食後熱服羌活勝風湯治眵多眊躁緊澀羞明赤脈貫睛頭痛鼻塞腫脹涕淚腦顛沉重眉骨痠痛外翳如雲霧絲縷秤星螺蓋白朮枳殼羌活川芎白芷獨活防風前胡桔梗薄荷葉荊芥穗甘草柴胡黃芩酒洗各五分水二盞煎一盞熱服柴胡復明湯治一切風熱赤澀多淚疼痛翳陷藁本蔓荊子川芎白芍藥羌活獨活白芷柴胡炙甘草五味子薄荷葉桔梗蒼朮米泔浸茯苓黃芩酒洗各五分上水二盞煎一盞食後溫服沖和養胃湯治內障初起視覺微昏空中有黑花神水變淡綠色次則視歧睹一成二柴胡白茯苓當歸各八分五味子九粒白芍藥黃耆羌活炙甘草防風各五分人參白朮升麻乾葛各一錢乾薑上水三盞煎二盞入黃芩黃連各一錢苒煎一盞食後稍熱服梔子勝奇散治一切赤脈縷睛風熱痛癢胬肉攀睛眵多淚澀羞明怕日蟬蛻草決明川芎荊芥穗蒺藜穀精草菊花防風羌活密蒙花甘草蔓荊子木賊山梔子黃芩等分上製為細末每服二錢食後臥時熱茶調下龍膽草散治上焦風熱目赤羞明近風多淚胬肉攀睛瘀肉隱痛並皆治之川芎香附子四兩龍膽草甘草草決明炒木賊淨菊花各二兩上為細末每服二錢麥門冬薄荷湯加砂糖一匙同調食後臨臥服瀉白散治風熱翳膜血筋一切肺熱外障黃芩梔子當歸生地黃赤芍藥各等分每服三錢為散為湯任服蟬花散治一切內外障蟬花穀精草白蒺藜菊花密蒙花防風羌活黃芩梔子甘草川芎木賊草決明蔓荊子荊芥穗等分上為細末每服二錢清茶或荊芥湯調下食後臨臥服豬肝枸杞酒治肝虛迎風有淚甘州枸杞子肥者二升搗碎絹袋盛之內一斗酒中浸封固密三七日後每朝夕飲之任情勿醉豬肝炙熟薄切以花椒鹽醬蘸食之用前枸杞酒壓之只飲二三杯勿醉竹葉瀉肝湯治眼目癮澀稍覺眊矂視物不明內眥開竅如針孔按之稍痛浸浸膿出柴胡梔子羌活升麻炙甘草赤芍藥草決明澤瀉白茯苓各五分車前子黃芩黃連大黃酒洗各七分青竹葉十片上水二盞煎一盞食後稍熱服光明夜靈散治目至夜便昏雖有燈月亦不能視石決明煅復煮夜明砂另研各二錢豬肝一兩生用如不食豬以白羯羊肝代之亦可上二味和勻以竹刀切肝作二片以藥鋪一片以一片合之用皮紙包住又用麻皮纏定勿令藥出淘米泔水一大碗貯瓷罐內不犯鐵器入肝藥於中煮至小半碗臨臥連肝藥並汁服盡明目細辛湯治兩目發赤微痛羞明畏日怯風惡燈火多眵隱澀鼻塞流涕津唾稠黏大便微硬麻黃羌活防風藁本川芎細辛白茯苓蔓荊子荊芥穗各四分歸尾生地黃酒洗各八分花椒七粒上水二盞煎八分食後臨臥稍熱服神效明目湯治眼稜緊急拳毛倒睫兩瞼赤爛疼痛昏澀夜則難開眵淚滿眼乾葛黃連黃芩各五分蔓荊子防風甘草各四分細辛三分水盞半蔥一根煎七分臨臥稍熱服補肝散治肝風內障不痛不癢眼前常見五色黃白黑赤花或視一物二形難辨羚羊角防風各二兩羌活人參車前子白茯苓細辛玄參黃芩各一兩上為細末每服二錢米飲調下明目清涼飲治一切熱眼痛淚羞明當歸川芎黃連赤芍藥防風荊芥蔓荊子連翹生地黃柴胡膽草各六分桔梗蟬蛻薄荷甘草各三分水二盞煎一盞食後臨臥服瀉脾散治眼目腫痛如桃蓋是脾經濕熱壅鬱上攻於目以致瞼皮腫脹內搓目睛宜服一貼即愈蒼朮枳殼赤芍藥歸尾川芎黃連柴胡香附子甘草各五分大黃二錢朴硝一錢上水一盞煎一盞內硝黃再煎二三沸半飢溫服東垣試效方治腦痛瞳子散大熟地黃八錢生地黃當歸身黃柏茺蔚子炒研柴胡各半兩芍藥一兩二錢川芎防風酒洗知母各三錢牡丹皮寒水石丹參各二錢羌活黑附子童便入鹽煮熟去皮臍一錢上為細末煉蜜丸每服七十丸白湯下隨以物壓之忌多語密蒙花散治小兒痘疹及諸熱毒害眼密蒙花一錢半青葙子一錢決明子炒車前子炒各五分上為末羊肝一片破開摻藥在內仍合之濕紙數層包裹灰火煨熟空心食之二草散治小兒疳眼疼並赤眼腫痛甘草龍膽草當歸各一錢細辛淨五分上為細末每服一錢水一蓋煎五分食後入砂糖三匙溫和服又三黃丸亦治疳眼每日服一次為佳合明散治小兒雀目至夜不見物石決明夜明砂蛤粉甘草各等分上為細末三歲者每服五分煮豬肝汁辰後調服謙甫還睛散治翳膜遮睛昏澀淚出瘀血胬肉攀睛川芎龍膽草草決明石決明荊芥穗甘菊花茺蔚子楮實子白茯苓各一兩甘草木賊白蒺藜各七錢炒川椒去子炒出汗一錢上為細末每服二錢食後茶清調下日三服忌一切雞魚厚味及蕎麥麵熱物雀目方治大人小兒雀目蒼朮末每服一錢用羊子肝一個竹刀批破摻藥在內麻繩纏定以粟米泔水一大碗煮熟令患眼對瓶口熏之藥氣少溫即吃之如此三五次必效簡要補肝散治肝虛目痛冷淚不止怕日羞明夏枯草七錢香附子童便浸透洗淨搗碎曬乾再研為末一兩上為細末每服一錢臘茶調下上夏枯草治目珠疼至夜尤甚者神效或有點上苦寒眼藥則痛甚者亦神效蓋目珠連目本目本又名目系屬厥陰之經夜甚及點苦寒藥反甚者夜與寒並陰故也丹溪云夏枯草有補養厥陰血脈之功其草三月開花遇夏即枯蓋稟純陽之氣也至哉斯言故治厥陰目痛如神者以陽治陰也予嘗治目珠痛及連眉稜骨痛並頭半邊腫痛遇夜則反甚用黃連膏子點上則又大痛百藥不效灸厥陰少陽則痛隨止半月又灸又止者月餘遂以夏枯草二兩香附子二兩甘草四錢同為細末清茶調下一錢半須臾減痛大半至四五日良愈又男子年六十亦目珠連眉稜骨痛夜甚用苦寒藥點亦甚與前證皆同但有白翳二點在黑目及外是為異耳藥皆不效亦以此藥應手而愈羚羊角飲治綠翳內障頭旋痛眼內痛澀羚羊角防風知母人參白茯苓玄參桔梗各半兩細辛黃芩車前子各二錢上為粗末每服半兩水煎溫服羚羊角湯治清翳內障勞倦頭旋腦疼目痛羚羊角人參玄參地骨皮羌活車前子去沙隔紙炒各一兩上為粗末每服二錢水煎食後下保命拈痛散治目痛並頭額俱痛兩目赤腫時見黑花脈弦欲作內障得之於飢飽勞倦柴胡甘草天花粉當歸生地黃各一兩黃芩二兩酒浸半炒半曬上為粗末每服三錢水盞半姜一片棗一枚煎八分稍熱服本事菊花散治肝腎風毒上衝眼痛甘菊花牛蒡子炒防風各二兩甘草白蒺藜各一兩上為細末每服二錢熟水調下食後臨臥服防風飲子治拳毛倒睫人參黃耆炙甘草當歸各八分防風葛根五分細辛蔓荊子各三分上水盞半煎七分食後溫服避風寒八味還睛散治肝肺相傳停留風熱翳膜遮睛痛澀眵淚白蒺藜炒去刺防風甘草木賊山梔仁各七錢草決明一兩炒青葙子二錢半炒蟬蛻二錢去土上為細末每服二錢食後麥門冬煎湯調服經效散治眼因撞刺生翳疼痛無時經久不安覆被物擊兼為風熱所攻轉加痛楚不能見物大黃當歸赤芍藥各一錢柴胡甘草連翹各五分犀