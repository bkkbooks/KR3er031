研為末就將藥水淘飛浮清者以淨器盛俘水安靜室勿動以物覆器上毋使塵垢入內俟其澄清傾去藥水以蟹粉曝乾取用配後諸藥石蟹坯子各五錢熊膽膽礬硼砂各二錢硃砂銀硃蘇仁制輕粉各一錢川椒胡黃連夜明砂牛黃珍珠鷹條各五分血竭巴豆霜金墨各二分上各依製法合乳一日極細無聲瓷罐貯之聽用名曰丹頭隨病輕重加減點眼其效如神輕號丹頭五分大冰片一分麝香三釐坯子一錢上共碾極細專治一切風熱暴赤爛弦迎風冷淚怕日羞明或兼半年一發或一年一發歇作無時悉以輕劑點之不可輕用重藥病輕藥重反受其害內服合病之劑為助次輕號丹頭六分冰片一分麝香三釐坯子一錢上專治久患不瘥珠上必生薄翳或有紅筋赤脈悉以此次輕藥點之日三五次若見退減日點二次愈則勿點重號丹頭七分冰片一分麝香三釐坯子一錢上治眼患頗重或翳障垂簾或赤帶痛澀用此吹點日三四次目漸好即止吹藥點數亦減內服本經藥為愈至重號丹頭九分冰片一分麝香三釐坯子一錢上專治重眼厚膜遮睛銀疔白翳昏盲無見方點此藥日點五次漸愈漸減點翳散心紅一錢枯礬三分麝香半分上乳極細無聲收密點翳上三次即沒局方老膜散硇砂五分上下瓦合定泥固文火煅枯龍骨煅三錢巴豆去油三釐甘草水煮白丁香三分飛上為極細末點歌曰老膜經年不放光浮雲蔽日有何妨巴豆去油甘草煮硇砂龍骨白丁香立消膏治浮醫宿翳霧膜遮睛雪白鹽淨器中生研如塵少許上以大燈草蘸鹽輕手指定浮翳就點上凡三次即沒不疼痛治胬肉瘀突硼砂一分冰片三釐合研極細如粉以燈草蘸藥點之收淚散治風淚不止綠爐甘石一錢海螵蛸五分冰片少許上乳極細末點大眥角淚即收二藥以燥片腦辛散之春水散治風眼除瘀熱枯礬青鹽各三錢黃丹水飛二錢雄黃二分冰片三分盆硝鍋內煅白一兩上合碾極細點眼正傳光明丹治一切風熱上壅兩目赤腫澀痛風弦爛眼及內外翳障制甘石一兩辰砂一錢硼砂二錢輕粉五分冰片三分麝香一分以上常用乳極細收貯為君如赤眼腫痛加乳香沒藥各五分內外眥障加珍珠五分膽礬二分爛弦風眼加銅青五分黃丹五分或以諸藥合一以治諸般眼疾上各研為細末一處再碾二日無聲以瓷器密收勿令泄氣點眼絕妙白龍散退翳明目馬牙硝明淨者用厚紙裹令實外以稜布囊之帶在懷內著肉處養一百二十日取出碾如粉入冰片少許同碾點眼不論年深日久眼生翳膜漸昏不能遠視但瞳人不散點可復明每用黍米許點內眥日夜各一度甚者各二度簡易不繁奏效甚大良方捲簾散治新久病眼昏澀難開翳膜遮睛或成胬肉連瞼赤爛常多冷淚或暴發赤眼腫痛制甘石四兩膩粉另研半兩硇砂另研一錢白礬半生二錢黃連粉五錢銅青一兩白丁香乳香鉛白霜青鹽膽礬各五分上各乳極細無聲密罐收貯點眥角內東陽升煉靈光藥治一切風熱翳障水銀入鉛中結砂黑鉛各五錢結成砂枯礬皂礬火硝煅紅食鹽上為極細末入固濟陽城罐內鐵燈盞封口以鐵條扎固鹽泥石脂密封入百眼爐文武火升打燈盞內常常搽水三炷香盡退火任冷取燈盞下雪白靈藥掃下有五錢收貯入後藥制甘石一兩靈藥三分冰片一分上合研一日無聲點目敷眼藥守陽碧雲膏箍眼最妙治倒睫及腫爛弦風鉛粉銅綠各一兩乳香沒藥各一錢冰片一分上為細末大黃熬膏作錠子用日乾以井水磨下新筆塗眼四圍不得入目搜風散箍風熱眼及腫痛黃連大黃朴硝黃丹各等分上為末以苦參同煎湯外加煉過白蜜同調敷眼四弦甚妙拜堂散敷風赤倒睫爛弦五倍子不拘多少為末蜜水調敷患處摩風散治風牽眼目喎偏外障木香當歸白芷黑附子防風細辛藁本骨碎補各一兩烏頭芍藥肉桂各兩半豬脂六兩上為細末以麻油半斤浸一日夜文武火熬如膏為度塗摩之專治赤目腫痛白姜為水調貼腳掌心直指敷眼方治赤腫閉合淨土末二兩爛石膏一兩為細末入蜜和新汲水調如膏敷眼四圍及太陽內服流氣飲瀉肝散等劑為妙類症敷腫立消法治眼胞腫大痛不可忍母生薑連皮搗取淨汁枯礬三錢以薑汁調作膏貼眼胞上勿令入目敷火眼痛眼風熱眼南星赤小豆等分為末以生薑自然汁調貼太陽穴即止又方桑葉大黃荊芥穗朴硝各等分為末蜜調貼太陽穴敷爛弦風眼二方一方治爛弦風最良銅青白蟮粉五倍子等分上為末熱湯泡三五分閉以軟絹沃洗眼弦極效又方治一切風赤眼眼皮搔癢赤爛久治不效其功不可盡述臘月豬脂半兩先溶白蜜少許漸入豬油內化白蠟三錢入油蜜內同化輕粉一錢入油蠟中攪勻上不時搽眼赤皮上敷目歌眼熱睛昏末朴硝車前葉搗蜜來調臨臥塗敷眼胞上便得清涼過一霄敷爛絃歌爛弦百藥煎為奇研細湯澄渣去之熬物稀膏入輕粉鹽湯洗了敷之宜吹鼻藥搐鼻散吹一切火眼及內障黃丹牙硝各一兩雄黃三錢沒藥五分上為細末以管吹入鼻中先令患人口含溫水然後吹入左目病則吹左鼻右目病則吹右鼻久患眼疾而甚者不可吹退翳散吹一切翳膜人蛻蟬蛻蛇蛻炒鳳蛻焙各五分木通木賊各二錢麝香一分上為細末浮翳者可用吹之即翳膜自起燈心捲去三五次以盡為度落翳神應方鵝不食草一錢芎藭一個躑躅花二分干為細末吹入鼻中三四次即落一方鵝不食草一味沖鼻中少時翳即落又方治一切翳膜甚者外用推雲散點之羌活細辛白芷川芎各三錢薄荷葉牙皂角各一錢躑躅花甘草各三分上為細末口含清水吹入鼻中衝倒睫拳毛法木鱉子去毛搗爛上將搗爛木鱉子用綿包捻成條子塞鼻中左病塞右鼻右病塞左鼻其毛自分上下每日三次青火金針治火眼赤腫及頭痛牙疼者焰硝一兩青黛薄荷葉川芎各半兩上為細末令患人口含水以管吹入鼻內濁涕熱淚去淨為愈赤火金針治赤眼頭風冷淚鼻塞耳鳴牙疼焰硝一兩川芎雄黃乳香沒藥石膏各一錢上為細末每用二分如前搐鼻三次愈洗眼藥萬金膏洗一切目疾黃連黃芩黃柏梔子防風連翹白芷當歸薄荷朴硝各等分上為細末煉蜜為丸如芡實子大每用一丸滾水泡化熱洗眼洗爛弦風赤眼方其效如神此藥人家不可少無目病則以施人價廉工省濟人甚大五倍子黃連去毛淨荊芥穗防風各二兩苦參四錢銅綠五分上為細末外以薄荷煎湯丸彈子大臨時用以熱水化開洗眼日三次立愈神效桑艾煎治一切火眼熱眼爛弦風眼俱效大桑葉十個大艾葉十個黃連三錢倍子二錢朴硝二錢上銼水一大盞煎去渣加銅綠末三四分攪勻以綿蘸溫水洗如非爛弦減去銅綠良方熏洗法治一切時氣熱眼風眼爛弦自外而得之者黃連川芎荊芥穗蔓荊子各錢半五倍子三錢打碎炒赤色放地上出火毒煎上銼分三服每服用生絹一小方洗淨入藥絹包裹以線扎定入罐水煎仍以紙糊罐口勿令氣出卻於撫風處就瓶口熏之氣溫傾出用淨絹蘸洗如此三次為驗仍避風三四日冬青湯洗諸害眼冬青葉濃煎湯入鹽熱洗之東垣點鹽法明目去昏翳大利老眼得補法之良海鹽二斤揀淨以百沸湯泡瀘取清汁於銀古器內熬取雪花鹽用新瓦器盛貯每早用一大錢擦牙以水漱口細細用左右手指背遞互以口內鹽津洗兩眼大小眥內閉目良久卻用水洗面名洞視千里明目堅齒極妙之法蘇東坡手錄目赤不明昏花老眼惟宜此法大效洗眼光明湯治眼目昏暗取桑園老桑皮燒灰用水煎至七分澄清去渣洗一周年眼明如童子洗眼日期於後正月初八日二月初十日三月初五日四月初八日五月初八日六月初七日七月初七日八月初三日九月初十日十月初九日十一月初十日十二月二十二日又方用朴硝六錢水一盞煎至八分候冷澄清溫洗每月洗至一年眼如童子正月初一日二月初八日三月初四日四月初五日五月初五日六月初四日七月初五日八月初一日九月十三日十月十三日十一月十六日十二月初五日秦皮散治大人小兒風毒赤眼腫痛癢澀眵淚昏暗並痘毒入眼秦皮滑石黃連各等分上為細末每用半錢沸湯泡去渣乘熱洗目洗眼法治冷淚昏眼開元古錢一百文甘草三錢青鹽一兩明淨者用無根水一大碗浸七日每日著一杯洗目十日約添甘草青鹽日洗三次忌五辛煎炙滌風散治風毒攻眼赤腫癢痛黃連去毛淨蔓荊子各半兩五倍子三錢上銼分三服新水煎濾清汁以洗沃效一方秦皮一兩水浸夏一日冬三日有碧色洗目去赤腫解風熱毒一方槐樹皮不拘多少煎湯澄清去渣入黃連浸之以帛隔之沃洗兩目去風止淚良明目第一方此方始於上陽子以授魯東門左丘明杜子夏左太衝凡此諸賢皆有目疾得此方皆愈夜省看書一要減思慮二專內視三簡外視四晨興遲五夜眠早六凡此六物熬以神火下以氣飲蘊於胸中七日然後納諸方寸修之一時近能數其目睫遠視天棰之餘長服不已非但明目亦可延年一法節其酒色冬夜臥暖睡醒開目轉睛四十九遍永無眼疾易簡諸方姜液膏治眼風弦冷淚癢澀有蟲母生薑一塊以銀筋插入即拔出點眼眥效洞見碧霄鷹眼一對炙乾為末研令極細以人乳汁再研每以銅箸取少許點於瞳人上日夜三度可以夜見物或取臘月鴝鵒眼依上法用效三日能見霄中物忌菸熏桑條煎治內障外翳及赤脈昏澀桑條二三月間採嫩條曝乾淨器燒過令火自滅成白灰每用三錢用滾水一大碗泡打轉候澄清傾清汁於別處以新綿洗目於重湯內令熱每日洗一度諸病目者皆效鎮肝明目方治肝虛或當風淚下牯牛膽臘月取用黑豆不拘多少裝入內百日後方可取食之每服三七粒食後酒下二百味花草膏治一切眼疾羯羊膽一具飯上蒸熟石蜜煉成珠入膽汁研成膏硃砂末少許同研食後臨臥每挑一掠如豆大口中含咽外點內眥角一方治熱眼痛以雞子一枚打竅去黃留清仍封竅以大蘿蔔一個剜空入雞子在內閉竅固住仍種在上後取出雞子清點眼極效一方治風淚赤眼甩秋黃瓜一枚切去近蒂一寸剜去子穰勿得破損以焰硝裝在瓜內以澀蓋之懸背陰處下用淨瓷器接滴下硝水及瓜上掃下白霜俱以瓷器盛貯細研點眼極效一方治積年目疾昏澀不明用決明子炒為末每服一錢食後飲湯調下亦治青盲白膜赤痛淚出肝熱取葉作菜食之良一方用覆盆子葉搗汁滴目中有蟲出如絲便效治赤眼尤效以此汁合膏塗發不白一方治雀目才日落則不見物用雄鼠膽汁點大眥內自明補肝散三十目病服此復明白蒺藜七月七日採陰乾炒去刺為末每服方寸匕白湯調下指甲散去翳治諸物入目法用男左女右手指甲洗淨用刀割輕輕起屑以燈草頭濕蘸其屑點翳上三四次即去羊膽膏治一切眼疾用羊膽一枚入蜜一錢線扎定入砂鍋內水一碗煮熟再入涼水內浸冷取起候水乾開膽傾汁入瓷罐收之點眼角眥妙元亮蔓青散治一切青盲瞳子不壞十愈八九蔓青子六升一味蒸之看氣遍合飯以下釜中熱湯淋之乃曝乾又蒸又淋如此三次為細末食後清酒調方寸匕夜再服石肝點眼極明生水中山溪多有之收如肝黑澤而有赤紋出水即干蒸胡麻散能明目洞視明察秋毫胡麻一石蒸過三十遍搗末每日調服盡一升一方治塵灰入目不出用書中白魚為末乳汁調注目中一方治麥芒入目即煮大麥汁洗之效一方治人至夜則目澀好睡取鼠目一枚燒為末水和注目中不睡取目以囊盛佩之終不夜寐一方治熱病後毒氣入目露蜂房半兩水二升煎一升濾清汁洗目三四次愈夜能見妖魁不能遁形用慈烏眼睛汁注目中則可見妖物神道目法用此針灸法大骨空穴在手大指第二節尖灸九壯以口吹火滅小骨空穴在手小指第二節尖灸七壯以口吹火滅上二穴能治迎風冷淚風眼爛弦等證睛明風池太陽刺出血期門灸四穴治胬肉攀睛水溝在鼻下一名人中針灸治目睛直視二門灸合谷宜針灸治迎風冷淚神庭上星囟會百會前頂上五穴宜用三稜針刺出血以鹽塗之專治雀目不能夜視肝俞二穴在背脊九椎兩旁各開二寸半是穴灸七壯治肝風客熱迎風冷淚雀目亦治合谷二穴在手虎口旁歧骨下灸七壯治陽明熱鬱翳障赤腫大抵目疾多宜灸此穴永不再發也攢竹絲竹空凡近目之穴禁灸惟刺之血出而已翳風一穴在曲宛下三寸內旁半寸灸七壯治赤白翳膜目不明足三里能明目俗云三十歲以上不灸足三里濁氣在上故目不明若灸三里亦令火氣下降是理也昔戴人治女僮目忽暴盲不見物曰此相火也太陽陽明氣血俱盛乃刺其鼻中並攢竹穴出血目立明承泣承漿治遠視䀮䀮夜不見目瞤項口牽引商陽偏歷手三里灸左取右右取左目窗上關承光上穴皆治目瞑眩目視䀮䀮命門肝俞見前八關大刺治眼痛欲出不可忍者須刺十指縫中出血愈目門別類藥例退熱藥黃連黃芩黃柏梔子石膏連翹玄參赤芍藥玄明粉地骨皮牛蒡子龍膽草柴胡大黃硃砂犀角甘草朴硝散風藥蜂房蟬蛻荊芥防風薄荷菊花白芷升麻細辛獨活皂角天麻羌活藁本蔓荊子紫蘇夏枯草涼血藥當歸生地黃鬱金黃連地骨皮牡丹皮羚羊角犀角赤芍藥黃芩行血散血藥川芎牛膝丹參紫草赤芍藥當歸尾紅花蘇木牡丹皮玄胡索茺蔚子大黃桃仁香附子夏枯草朴硝青皮肉桂退翳藥白蒺藜木賊密蒙花蛇蛻青葙子石決明草決明蟬蛻夜明砂明目藥菊花青葙子菟絲子草決明穀精草玄明粉茺蔚子夜明砂石決明枸杞子羚羊角消腫藥大黃玄明粉朴硝枳殼檳榔香附子赤芍藥桑白皮止淚藥夏枯草五倍子青鹽食鹽蒼朮龍膽草香附子枯礬皮硝訶子止痛藥乳香沒藥上二味總為定痛之藥要兼審其痛之由源而佐之以乳沒則其效速也如有風而痛者用散風藥中加乳香沒藥則痛可止如血滯而痛者當用行血藥中加乳沒而痛即止如熱鬱而痛者當用清熱藥中加乳沒而痛即止今人不工於此而惟恃乳沒定痛服之而痛不止者不知治痛之所由也乳香沒藥其能奈之何哉而徒嗟其藥之不效弗思甚歟眼科正品合用藥味並製法諸服藥黃連味苦性寒去毛酒拌能瀉心火清心明目止目痛去腸胃之濕熱為治目之君藥內服外點古方多用之菊花味甘苦性涼去梗淨曬乾清心明目疏熱散風防風味辛苦性涼散風邪明目荊芥味辛苦性平散風熱止太陽頭痛明目薄荷味辛性溫清六陽風火解毒散邪蔓荊子味苦性涼炒去皮研破用清頭目止痛疏風除肝邪淚川芎味幸甘性溫行血生新血開鬱止太陽頭目痛楚川當歸味辛甘性平溫酒浸過用養血生血為血之君藥連芩佐之則涼血薑桂佐之則熱血桃仁紅花佐之則行血破血藕節茅花佐之即止血芍藥味酸苦性寒酒炒或煨用生地黃味辛苦性寒酒洗用熟地黃味甘性溫酒洗生血養血治血虛目昏藁本味辛性溫散至高之風寒客熱止頭目痛及頂顛痛細辛味辛性溫散太陽風寒客邪止肝風目淚羌活味辛性溫發散三陽客邪利頭目止太陽頭痛黃芩味苦性涼酒炒清陽明經火瀉肺熱治頭目熱壅白睛紅痛羚羊角味甘性寒鎊末入藥清頭目鎮心肝風熱犀角性味同上鎊末入藥解心熱安神明目除昏膜翳障連翹味苦性溫瀉六經之邪火涼目清血玄參味苦性涼瀉無根之邪火上熏頭目或腫疼者大黃味苦性下行沉而不浮性寒上行用酒拌過破諸經之積火治頭目腫壅積熱痛楚如針刺惟大黃有解圍破陣救急之大勳一服諸火下降而痛立止腫立消龍膽草味苦性寒酒洗瀉肝火除目痛並黑睛白翳昏盲止熱淚柴胡味辛苦性寒瀉肝火發散風熱為厥陰頭目痛之使藥車前子味苦辛性涼平利太陽膀胱之熱能使頭目清明梔子味苦辛性涼平炒研瀉小腸熱佐黃連瀉心火去鬱熱清目黃柏味苦性寒去皮蜜炙或酒炒瀉腎火滋陰補水以鎮陽光使相火不起而目自明夏枯草味苦辛性涼酒洗用能散鬱火清六陽熱結退翳除風止淚明目地膚子味苦辛性涼砂研用涼血利膀胱府熱則目自清久服聰耳明目蔓青子味苦甘性症氣溫炒研用或蒸為末酒調服下氣利五臟通中明目青葙子味苦性涼微炒明目退翳障決明子味苦鹹性涼炒搗碎除熱去翳明目主肝熱清盲作枕無目疾石決明味酸鹹性溫平火煅研碎墜翳膜明目除昏密蒙花味甘性寒平酒洗入藥主治青盲翳障赤澀多眵消目中赤脈治小兒疳眼痘毒入目白蒺藜味甘辛性溫寒炒研去刺破瘀血癥結風壅退翳明目川木賊味甘苦性微寒酒浸破積結益肝退翳明目旋覆花味甘鹹性溫平去五臟風熱清頭目鬱滯茺蔚子味辛甘氣溫平行血退熱明目除昏穀精草味辛性溫酒洗除風熱治陽明熱齒痛除翳障明目石膏味淡性寒火煅瀉胃火除陽明頭目熱壅脹痛磁石味酸鹹性寒平火煅醋淬為末入藥滋陰益腎水降火明目人參味甘性溫平補諸虛不足氣虛內障陷翳不起或服破氣過多兩目愈昏宜多服久服則目復明黃耆味甘性溫蜜炙佐人參同功枸杞子味甘性溫滋腎水不足益陰明目五味子味辛酸性溫益氣強陰除熱滋腎水上榮於目柏子仁味甘性溫去油用同血藥磨能益心腎安神明目久服不老楮實子味甘性寒焙乾能益氣補腎榮肌膚明目久服輕身不老楮白皮味辛甘性平為繩曬乾燒灰點目用菟絲子味辛甘平酒者作餅烙乾用補陰益精氣榮肌膚明目久服輕身覆盆子味甘性溫炒研用益精補腎滋榮於目肉蓯蓉味鹹性溫酒洗去甲焙用滋腎不足補陰壯水明目除昏茯神味甘淡性平去木研末水飛用安神明目鎮心沉香味辛甘性溫能升能降和氣明目為末入藥不見火五倍子味酸鹹性微溫微炒研末泡湯洗眼除風止淚收爛弦退翳川椒目味辛苦性溫平除濕熱治盜汗利滲有功所以濕熱下行目自明川椒味辛性熱炒去汗研滋腎氣年高氣弱腎不上榮目昏者可用東垣云用之於上退兩目之翳膜用之於下除六腑之沉寒槐角子味苦性寒為太陰虛星之精入豬膽汁內浸七日吞服明目槐枝味苦性平煎湯洗目除風淚明目秦皮味苦性微寒煎湯洗目去風毒除翳膜收爛弦冷淚桑葉味苦甘性寒浸水洗目去風熱止淚除昏明目艾葉味苦辛性溫或煎湯或熏藥能去風邪收爛弦止冷淚凍青葉味口性口浸湯洗目去風熱收爛弦止冷淚羊肝味甘性溫炙燥為末入藥或煮爛搗如泥和眾藥能補肝明目羊膽味苦性寒取汁熬膏明目除昏翳豬膽味苦性寒或作膏或調藥治如上豬膽皮青魚膽味苦性寒取汁作膏點目有用制甘石裝入有用黃連末裝入候作散點去熱明目雞膽汁味苦性寒取甘石末和汁曬乾研點目除風障鼠膽汁無制取汁滴目內眥治雀目熊膽用水化開拌甘石焙乾研人藥再研明目去熱退翳石膽汁點石煅用其汁點目立時復明其石煅末能退翳障除老膜治青盲但世所難得蚺蛇膽味甘鹹有小毒用井水研點目眥止痛塗外皮消腫蛇蛻瓦上焙乾研末除風退翳膜蟬蛻去頭足土明目散風除障膜蠶蛻紙火炙燥研退翳除昏夜明砂研水飛過治雀目但至黃昏則目不見是也白蜜煉如法明目止痛青鹽明者洗淨曬乾去風住癢止淚食鹽淨者煅如雪研能散血住癢止淚除風明目膽礬研末入藥再和研除風去翳膜明礬明者研末入藥除風止淚開翳膜明目收爛弦用枯過者空青火煅醋淬研末去翳障除青盲老膜明目金精石火煅研水飛用治效同上牛黃無制鎮心明目冰片味辛性熱能散風熱除翳障止風淚不可多用琥珀研細末入藥有以微火煨非也明目去翳障珍珠鐵器中為末研極細今人有入豆腐內煮此其鑿也珠本清明光潔取以明目以火制煮良不失其良性乎青礞石製法見備錄詳能降火去翳膜明目古銅錢火煅醋淬為細末鎮肝磨翳膜止淚甘泉石煅過研末去翳膜明目花蜘蛛醋浸新瓦焙乾去頭足為末用除翳障愈爛弦去風止淚明目鎮肝黃丹飛過入藥明目除昏去翳障焰硝火煅雪白放土地上一宿止風淚住癢除翳朴硝吹鼻洗目用之能散風止淚息癢玄明粉味辛鹹性寒要好明淨者製法見製法備錄點目能光明去熱散血洗眼能消風息癢止淚服則降火清心為眼科之要藥爐甘石火煅紅淬入三黃湯內淬五七次尤佳復用防風通聖散湯懸胎砂罐煮乾露一夜焙乾研如塵凡點眼藥以此為君其餘因證加減主退翳膜明目白硼砂明亮者研明目清熱退火硃砂性寒要萬山有神氣者佳細研水飛過入藥又研能鎮瞳人退火消翳障硇砂揀明亮潔白刺舌者打碎乳汁浸一夜瓦器焙乾入藥研極細去多年老膜胬肉攀睛以其有爛肉之功用之者戒勿多用銅綠乳汁浸焙乾研末除翳障愈爛弦去風止淚明目鎮肝蕤仁去衣綿紙裹入眾藥再研極細除翳膜開內障治目為要乳香明淨滴珠者打碎箸炙去油研末用有加清水研如漿澄下曬乾入藥研止痛和氣散風熱沒藥製法功效並同乳香雄黃鮮明者研細末搐鼻以解風熱散翳開障目暴病者用之鉛粉真者火煅黃色入藥退翳除昏止淚瑪瑙犬肉內煮過火煅醋淬焙乾研細末入藥再研除翳膜明目珊瑚無制研極細末入藥再研除翳明目麝香無制極真者自開當門子為佳市肆賣者多攙大黃及五靈脂蜜陀僧之類亦有偽造復裝入賣者須要辨真如不真者必須加倍入研極細庶不損目能通關竅開翳膜疏風熱貝齒粉火煅研極細無聲入藥用除翳膜久障用之蛤粉煅如灰研水飛再研除翳膜收風淚龍骨末火煅研極細無聲去老膜止風淚玄精石火煅研水飛輕浮者再研鮮有真者只用水精為佳明目退翳去障除昏雲母石研一日水飛焙乾再研入眾藥同研極勻為末明目除障輕粉一名膩粉無制惟要真正者必須自制佳如不自制須親看其掃盆者真不然市賣者多攙雪母石膏蚌粉之類和眾研極勻明目除昏收淚不宜多用石蟹製法功用與石燕同石燕火煅紅入醋淬五七次用焙乾研水飛過入藥再研去翳膜除昏止淚海螵蛸惟研極細去翳膜收淚血竭燈心同研成粉入藥再研極勻散血明目白丁香即麻雀糞白而成粒者佳黑頭不用取白者用三黃煮過淨水飛過取輕浮者曬乾其性能爛肉不宜用多去胬肉攀睛多年翳膜鷹條出山谷石崖穴鷹哺雛時即有糞條取來三黃湯煮過再入清水飛輕細者曬乾用尤毒於白丁香大去翳膜鴉翅用微火燃焦為末和藥研翳膜久障用之金錫即蜜陀僧金色者研如塵飛過復研同眾藥又研勻同前翠白即上料細瓷器碎如豆大缸片盛之入明爐火煅紅如瓷膠候冷即青翠為末研極細能摩翳膜巴豆霜味辛性熱有毒取肉用紙細包捶去油換紙無油為度用淨白紙包過一宿以紙不油為妙方和眾藥研極勻有爛肉去老膜除翳障之功姜粉味辛性熱將生加細切石臼搗絞汁汁濃沉底者曬成粉能散結熱疏風散瘀血斑鳩肉味甘平無毒主明目多食其肉益氣利陰陽附眉稜骨痛候病機眉痛論丹溪曰眉稜骨痛厲風熱與痰類頭風痛作風痰處或云眉骨痛有二眼屬肝有肝虛而痛才見光明則眉骨痛甚宜服生地黃丸有眉稜痛目不能開晝靜夜劇宜導痰丸湯之類入茅茶二陳湯吞青州白丸子亦效甫見眉骨痛者多是肝火上炎怒氣甚者多有此病其謂風證亦火之所致熱甚生風是也大抵抑肝火有風痰則兼而治之藥方洗肝散治眉稜眼眶骨痛不可忍方見目門二陳湯方見痰門東垣選奇方治眉骨痛甚防風羌活黃芩甘草各一錢上水盞半煎八分食後溫服防風羌活湯治眉稜痛而風寒痰濕宜此防風羌活細辛黃芩南星半夏白朮甘草上等分為粗末每服四錢水盞半煎八分溫服丹溪黃芩白芷散治眉稜風熱痛黃芩酒洗二錢白芷一錢上為細末食後臨臥清茶調下二烏散治眉稜骨痛兼有風病亦此川烏草烏俱用童便浸炒去毒細辛羌活黃芩甘草各等分上為細末每服二錢茶清調下
