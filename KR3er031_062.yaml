body:
  text: 卷之六十二鼻證門病機鼻病敘論經曰鼻者肺之外候又曰西方白色入通於肺開竅於鼻又曰膽移熱於腦則辛頞鼻淵又曰鼻熱甚出濁涕又曰心肺有病而鼻為之不利也巢氏病源曰肺開竅於鼻熱乘於血則氣亦熱也血氣俱熱血隨氣發出於鼻為鼻衄甚則大衄而口耳皆出血也又云肺臟調和則鼻氣通利而知香臭若邪乘於太陰之經其氣蘊積於鼻者則津液壅塞鼻氣不得宣調故不知香臭而為齆也至於生瘡變成瘜肉或窒塞或流涕皆是肺經之邪壅滯也原病式曰肺熱則出涕熱甚怫鬱於足陽明胃經血妄上行出於鼻名曰衄鼻出清涕名曰鼽夫五行之理微則當其本化甚則兼其鬼賊故經曰亢則害承乃制也易曰燥萬物者莫熯乎火以火鍊金熱極而反化為水及身熱極則反汗出也水體柔順而極則反冰如地也土主濕陰雲雨安靜土濕過極則反為驟注烈風雨淫潰也木主溫和而生榮風極則反涼而毀折也金主清涼秋涼極而萬物反燥也皆所謂過極則反兼鬼賊之化制其甚也由是肝熱甚則出泣心熱甚則出汗脾熱甚則出涎肺熱甚則出涕腎熱甚則出唾也凡痰涎唾涕稠濁者火熱極甚消爍致之然也或言鼽為肺寒誤也彼但見鼽嚏鼻窒冒寒則甚遂以為然豈知寒傷皮毛則腠理閉塞熱氣鬱怫而病愈甚也鼻之病總屬於火鼻中癢而氣噴作於聲為嚏夫癢為火化心火邪熱干於陽明發於鼻則癢而嚏也有故以物擾之而嚏有視日而嚏者蓋太陽真火耀於目而擾於心則火熱衝上鼻中癢而嚏也有風熱上攻頭鼻壅塞有因嚏而痛者雖證候之不同同為熱也凡為病不同邪熱所乘之經有異故也鼻窒與嚏癢者熱客陽明胃之經也鼽涕者熱客太陰肺之經也蓋鼻者足陽明胃經所主陽明脈左右相交注於鼻孔又鼻者肺之竅故肺氣通於鼻其邪熱干於二經發於鼻而為窒塞鼽涕之證故經曰心肺有病而鼻為之不利也鼻癰瘜肉邪氣結成肺氣通於鼻清氣出入之道肺臟熱邪壅滯上焦鬱結伏留不散而成癰瘜之患矣鼻赤酒齄血熱入肺丹溪曰酒齄鼻多是飲酒之人酒氣邪熱熏蒸面鼻血熱壅滯而成鼻齄赤色者也或有肺經素有風熱雖不因酒亦自紅黑而生齄也脈候右寸脈浮洪而數為鼻衄鼻齄左寸脈浮緩為傷風鼻塞鼻流清涕治法治鼻竅不利宜辛散苦瀉心肺有熱而鼻為之不利也或外傷風寒內熱愈窒築塞不聞或流清涕或癢而涕者宜麻黃桂枝細辛辛荑之辛味以散不因外感而惟內熱煮宜芩連梔子之苦味以瀉之二法為治鼻之大綱也鼻多濁涕治宜清金清痰雜著云鼻多濁涕平素鬱熱壅塞不聞香臭者當作肺熱治之宜清金瀉火清痰或丸藥噙化或末藥輕調緩服久服無不效矣此余所親見而屢驗者其平時原無鼻病今忽一時偶感風寒而致窒塞聲重或流清涕者作風寒治之鼻熱生瘡色紅內無壅塞此為血熱宜用生地黃四物湯加酒製片芩酒拌紅花生甘草麥門冬天門冬之類鼻淵鼻淵經曰膽移熱於腦則辛頞鼻淵劉河間用防風通聖散加薄荷黃連各二錢水煎服鼻酸鼻癢鼻酸乃痰火之所為也宜涼膈散加荊芥穗苦桔梗之類鼻癢乃熱則生風故也故防風通聖散加白附子殭蠶之類藥方衊衄證方生地黃湯麥門冬散川芎三黃散黃芩芍藥湯犀角地黃湯以上方並可治鼻衄見血證門定命散治膽受胃熱循脈而止於腦血溢妄行衊衄血汗硃砂水銀麝香各等分右為細末每服五分食遠新汲水調下鼻塞不通方局方防風通聖散治肺經風熱壅塞鼻窒不通不聞香臭或感風寒熱來濁涕皆可服方見風門直指通聖散治肺氣不清鼻塞不利鼠黏子桔梗紫菀桑白皮荊芥穗各二錢甘草六分水盞半姜五片煎八分食遠服濟生辛荑湯治肺氣不利頭目昏眩鼻塞聲重咯吐稠黏辛荑川芎白芷甘菊花前胡石膏白朮生地黃薄荷赤茯苓陳皮去白各一兩甘草炙二兩上咀每服五錢水盞半煎一盞食遠溫服濟生辛荑散治肺虛為四氣所幹鼻內壅塞涕出不已或氣不通不聞香臭辛荑川芎木通細辛淨防風羌活藁本升麻白芷甘草炙各等分為末每服二錢食後茶清調下河間麗澤通氣散治鼻不聞香臭黃耆八分蒼朮羌活獨活防風升麻葛根各六分炙甘草四分麻黃冬月加川椒白芷各二分上咀作一服姜三片棗二枚蔥白三寸水二盞煎一盞食遠溫服忌一切冷物勿於風寒之處坐臥良方防風湯治鼻塞不聞香臭防風梔子七枚升麻石膏二兩麻黃半兩官桂去皮半兩木通二兩上咀每服五錢水一盞煎七分空心溫服御藥菖蒲散治鼻內窒塞不通不得喘息菖蒲皂角等分上為細末每用一錢綿裹塞鼻中仰臥片時良方禦寒湯治寒氣風邪傷於皮毛令人鼻塞黃耆陳皮人參升麻各五分蒼朮七分款冬花黃連各一分佛耳草白芷防風羌活甘草炙各二分黃柏二分水二盞煎八分食遠稍熱服良方雙芎散治傷風鼻塞聲重川芍一兩撫芎兩半細辛半兩薄荷葉兩半川烏一兩白芷甘草各二兩上為細末每服一錢蔥茶調下良方芎藭散治鼻塞為癰芎藭檳榔肉桂麻黃防己木通細辛石菖蒲白芷各一分木香川椒甘草炙各半分上咀每服三錢水二盞姜三片紫蘇葉少許煎八分食遠服醫林川芎散治傷寒鼻塞蒼朮米泔浸五兩藁本白芷細辛羌活川芎甘草炙各一兩上咀每服三錢水一盞姜三片蔥白三寸煎七分溫服南星飲治鼻窒塞不通風邪入腦宿冷不消鼻內結硬南星不拘多少湯泡二次切片焙乾為細末每服二錢用棗七枚甘草少許食後三四服其硬物自出腦氣流轉濁涕自收仍用大蒜蓽茇杵作餅紗襯炙熱貼囟門熨斗熨透瘥人參散治肺氣不通鼻塞上壅人參白茯苓陳皮黃芩麻黃羌活川椒去目及合口者炒出汗各半兩上咀每服五錢水盞半煎七分食後溫服蓽澄茄丸治鼻塞不通蓽澄茄半兩薄荷葉三錢荊芥穗二錢半上為末煉蜜丸如櫻桃大每服一丸臨臥噙化津嚥下南木香膏治鼻塞不利南木香川當歸川芎通草細辛蕤仁去殼白芷各等分上咀和羊髓熬白芷色黃去渣為丸豆大一粒塞鼻內立通通關散治腦風鼻息不通不聞香臭或流清涕多嚏肩項拘急頭目昏痛風府怯寒原蠶蛾瓦上焙黃白附子炮益智仁白蒺藜薄荷苦參各一兩為細末每服三錢溫酒調下和劑通頂散治鼻塞不聞香臭胡黃連研滑石研各一分瓜蒂七枚研麝香一錢蟾酥半錢研上研勾每用少許吹入鼻內即瘥瓜蒂散治鼻塞不聞香臭瓜蒂藜蘆各等分為細末每用一錢綿裹塞鼻中鼻淵鼻鼽清涕方防風湯黃芩人參甘草川芎麥門冬去心防風兩半上為細末每服一錢沸湯調服食後日三次川椒散治鼻流濁涕川點椒炒出汗訶子煨去核白姜川芎官桂細辛白朮各等分上為細末每服二錢食後酒調服三因蒼耳散治鼻流濁涕不止名曰鼻淵蒼耳子二錢半炒辛荑仁五錢薄荷葉五錢白芷一兩右為細末每服二錢蔥湯或茶清食後調下瑞竹千金辛荑膏治鼻塞腦冷清涕常出黑附子炮去皮川椒去目炒川芎細辛吳茱萸乾薑各錢半桂心三錢皂角屑錢半上用豬脂二兩煎油先一宿以米醋浸煎八味藥取入豬油內同煎以附子色黃為度用綿蘸藥塞鼻中瘥神愈散治肺熱鼻流濁涕窒塞不通細辛白芷與防風羌活當歸半夏芎桔梗陳皮茯苓輩十般等分銼和同三錢薄荷姜煎服氣息調勻鼻貫通細辛散治肺傷風冷鼻流清涕頭目疼痛胸膈不利細辛一兩附子炮去皮尖白朮訶子六枚蔓荊子芎藭桂心各二分枳殼麩炒甘草炙各半兩上咀每服五錢水盞半姜三片煎六分食後溫服鼻柱膏治鼻常有清涕桂心細辛乾薑炮川椒去目淨者炒出汗皂莢一分上各五錢為細末羊脂和成膏棗核大綿裹塞鼻孔鼻齆瘜肉諸方易簡白黃散治鼻齆瘜肉鼻痔等症白礬雄黃細辛瓜蒂各一錢上為細末以雄犬膽汁為劑如棗核塞鼻中御藥辛荑膏治鼻生瘜肉窒塞不通有時疼痛辛荑葉二兩細辛木通木香杏仁泡去皮尖研如泥白芷各五錢上用羊髓豬脂二兩和藥於石器內慢火熬成膏取赤黃色放冷入片腦麝香一錢為丸綿裹塞鼻中數日肉脫即愈三因羊肺散治肺虛上壅鼻生瘜肉不聞香臭羊肺一具洗白朮四兩木通肉蓯蓉川芎各一兩乾薑炮八錢上為末以水調稀稠得所灌入肺中煮熟細切焙乾為末每服二錢食後米飲送直指通頂散治鼻癰瓜蒂藜蘆各一分皂角半分麝香少許上為末吹此入鼻雄黃丸治同前亦治瘜肉雄黃五分瓜蒂二個綠礬一錢麝香少許上為末吹入鼻中千金瘜肉方一名瓜丁散瓜蒂華陰細辛等分為末綿包少許塞鼻丹溪方治鼻瘜肉胃中有食積熱痰流注治本當消食積蝴蝶礬二錢細辛一錢白芷半錢為末內鼻中良方山茱萸丸治鼻癰山茱萸大黃酒炒菊花各一兩一分朴硝一兩附子炮去皮臍獨活各二分秦艽一兩半蔓荊子去白皮梔子仁炒防風甘草炙各一兩上為細末煉蜜丸如梧桐子大每服三十丸空心溫酒送下老人亦宜服之妊婦去附子加細辛半分二丁散治鼻中瘜肉苦丁香丁香粟米赤小豆各七粒石膏少許上為細末吹入鼻中如不聞香臭及偏頭風皆效地龍散治息內地龍去土炒一分豬牙皂角一枚煆存性研為末先洗鼻內淨以蜜塗之敷藥少許於內流出清水盡則瘜肉自除通草膏治鼻癰有瘜肉不聞香臭通草附子炒細辛各等分上為細末蜜丸如棗核大綿裹塞鼻內鼻痛鼻瘡諸方局方人參順氣散方見風門藿香正氣散方見嘔吐門皆可治鼻痛直指杏仁細辛膏治鼻痛杏仁去皮尖細辛白芷各一錢全竭兩枚焙上為末油調敷局方甘露飲方見積熱門黃連阿膠丸方見嗽門並治鼻瘡直指革丹散治一切酒齄並鼻上贅肉面生粉刺雀癍黃革丹二錢半硇砂五分巴豆肉十個去油酒餅藥一錢半上件同入罐子中以慢火熬三四沸取下續入研細石灰三錢雞子清和勻畢凡酒齄鼻以鵝毛蘸掃紅處日一次粉刺雀癍小竹杖挑藥點才見微腫便洗去鼻上肉贅敷之半月取出膿血自成痂落矣和劑白龍丸治酒齄鼻面上肺風瘡白龍丸末逐日洗面如澡豆法更醃少時方以湯洗去食後常服龍虎丹一帖亦見和劑半月瑩潔良方蓖麻子膏治酒齄鼻肺風面赤生瘡蓖麻子去殼研輕粉研瀝青研硫黃研黃蠟各二錢麻油一兩上熬成膏以瓷盒盛每用少許擦於患處荊芥散治肺風齄疱荊芥穗四兩防風杏仁去皮尖白蒺藜炒去刺殭蠶炒甘草炙各一兩為末每服二錢食後茶清調下椿根湯治疳食口鼻椿根去皮切一升蔥白細切半升豆豉半升鹽半合川椒去目併合口者炒出汗一合上合和以醋及清泔各三升煎十數沸約一升分作三服有惡物下即效小兒量大小加減地黃煎治鼻生瘡癢痛不止生地黃汁生薑汁各一合苦參一兩銼酥三合鹽花二錢後入上將地黃汁生薑汁浸苦參一宿以酥和於銅石器中煎至半卻入鹽花候汁入酥盡去渣傾入盒中每用少許滴於瘡上諸風熱瘡亦皆治之梔子仁丸治肺熱鼻發赤瘰名曰酒齄鼻梔子仁不拘多少微炒上為末溶黃蠟為丸梧桐子大每服三十丸食後茶酒任下天柏茶治肺火鼻紅年久服諸藥不效天門冬去心側柏葉細茶各一兩上三味和搗一處每日用一撮於罐中以滾水衝入閉氣勿泄少時用湯當茶吃日五七次一月全愈白礬散治肺風酒齄鼻等疾白礬硫黃乳香各等分為末綿裹塞鼻中硫黃散治酒齄鼻生黑粉刺硫黃輕粉各一錢杏仁十四個去皮尖上為細末唾津調臨臥時塗鼻上早晨洗去醫林大風油治酒齄鼻草烏尖七個麝香少許為細末研勻入大風油以瓦盒盛火上調勻先以姜擦日三次專治肺風鼻面赤二神散治赤鼻久不瘥大黃朴硝各等分為末津調塗鼻上易簡諸方葫蘆酒治鼻塞眼昏疼痛腦悶用葫蘆子打碎醇酒半升浸之春三夏一秋五冬七日少少內鼻中有以童便浸亦效脂膏方治卒食物從鼻中縮入腦中介介痛不出用牛脂或羊脂如指大內鼻中以鼻吸取脂入須臾脂消則物逐脂俱出也雁鴨脂亦可用鼻塞不通用小薊一把水二升煮一升去滓分服又方用蓽澄茄五錢薄荷葉三錢荊芥穗一錢為末煉蜜丸如櫻桃大每服一丸噙化津咽又方治鼻癰腦塞用青甜瓜莖為末吹鼻中亦治瘜肉又方用皂角炙為末如小豆大以竹管吹入鼻中又方用乾薑末蜜和塞鼻中治鼻中瘜肉用枯白礬為末面脂和綿裹塞鼻中數日肉隨落治久患鼻瘡膿血臭者用百草霜研細冷水調服三錢治鼻中外齄瘤膿血出用蜂房炙為末酒調方寸匕日七服治鼻面酒齄疱用鷓鷀屎一合研以臘月豬脂和每夜敷之治鼻疳及鼻中生瘡用黑牛耳內垢敷之又方用橘核微炒為末每服一錢研胡桃肉一個同酒調服一方治鼻窒塞不通用槐葉五兩水五盞煎取二盞量下蔥三莖豉一撮再煎一二沸分二服聖惠方治鼻塞多年不聞香臭水出不止以蒺藜二握當道車研過以水一大盞煎取半盞仰臥先滿口飲食以汁一合灌鼻中不過再灌之嚏出一兩個瘜肉似赤蛹蟲即瘥肘後方治鼻病酒齄以馬藺子並花杵爛敷之佳又方治鼻塞燒麻鞋灰吹鼻中立通經驗方治酒齄鼻以新銀杏嚼爛敷於鼻上不過五七次如故一方治鼻淵腦瀉用生附子為末煨蔥涎和如泥夜間塗湧泉穴自愈導引法一法東向坐不息三通手捻鼻兩孔治鼻中患交腳踑坐治鼻中患通腳癰瘡去其涕唾令鼻道通得聞香臭久行徹聞十方一法踞坐合兩膝張兩足不息五通治鼻瘡一法端坐伸腰徐徐以鼻內氣以右手捻鼻除目暗淚苦出徐徐閉目吐氣去鼻中瘜肉耳聾除傷寒頭痛詵詵皆以汗出為度灸法囟會一穴在上星後一寸五分是穴灸七壯治鼻癰鼻痔上星一穴在髮際上二寸灸三七壯治鼻流清涕濁涕通天二穴在承光後一寸灸七壯後鼻中必出臭積一塊方愈人中風府百會風池大椎以上穴皆可治前證曲差合谷上二穴並治鼻流臭穢迎香治鼻窒塞不通多涕鼽衄耳證門病機耳病敘論內經曰腎開竅於耳耳為腎之外候又曰腎者作強之官技巧出焉又云脫精者則耳聾又曰心通竅於耳陽氣上甚而躍故耳鳴也巢氏曰腎為足少陰之經而藏精氣通於耳耳宗脈之所聚也若精氣調和腎脈強盛耳聞五音若勞傷血氣兼受風邪損於腎臟則精脫精脫者耳聾然五臟六腑十二經脈有絡於耳者其陰陽經氣有相併時並則腎臟氣逆名之為厥厥氣相搏入於耳之脈則令耳聾其腎病脫精耳聾者其候頰顴色黑手少陽之脈動而氣厥逆而耳聾者其候耳內煇煇焞焞也手太陽厥而聾者其候聾而耳內氣滿保命集云耳者以竅言之水也以聲言之金也以經言之手足少陽俱會其中也有從內不能聽者主也有從外不能入者經也有若蟬鳴者有若鐘鳴者有若火熇熇狀者各隨經見之其間虛實不可不察也假令耳聾者何謂治肺肺主聲鼻塞者肺也何謂治心心主臭如推是法皆從受氣之始腎受氣於巳心受氣於亥肝受氣於申肺受氣於寅脾受氣於四季此治法皆長生之道也耳聾有六候諸書論聾證有六候有氣聾熱聾風聾厥聾勞聾陰聾又有耵耳膿耳大抵耳屬足少陰之腎經腎寄竅於耳也腎通乎耳所主者精精氣調和腎氣充足則耳聞而聰若勞傷血氣精脫腎憊必主耳聾且十二經脈上絡於耳其陰陽諸經適有交併則臟氣入於耳而為厥是為厥聾必有眩運相兼耳者宗脈之所附脈虛而風邪乘之經氣痞而不宣謂之風聾必有頭痛之證勞役傷於氣血淫欲耗其精元瘦瘁力疲昏昏聵聵而哄哄然者是謂勞聾必兼虛怯等證此好色腎虛者有之有痰火上升鬱於耳中而鳴有熱乘虛隨脈入耳結為膿汁謂之膿耳或耳間有津液風熱搏之結硬成核塞耳亦令暴聾此為耵耳前是數者皆當推其腎脈風則浮盛熱則洪大虛則澀而微風者散之熱者清之腎虛者補益之痰火者涼而降之各隨其宜而治之豈有不聰聽者也耳聾耳鳴屬熱者多原病式曰聾之為病俗醫卒以慓悍燥烈之藥制之往往謂水虛冷故也夫豈知水火之陰陽心腎之寒熱榮衛之盛衰猶權衡也一上則必一下是故高者抑之下者舉之此平治之道也夫心火本熱虛則寒矣腎水本寒衰則熱矣腎水既少豈能反為寒耶世俗又云老人多是虛冷而無熱此世之誤也凡老人之氣衰多病頭目昏眩耳鳴或聾上氣喘咳涎唾稠黏口苦舌乾筋痿脈促二便秘結此皆陰虛陽實之證故經云年四十而陰氣自半惟是孤陽獨盛見證皆火又以熱藥與之是以益火也大寒之藥故不可服而惟以溫平調理計出萬全耳鳴有聲非妄聞也耳為腎竅交會於手太陽少陽足厥陰少陰少陽之經若水虛火實而熱上甚客其經絡衝於耳中則鼓其聽戶隨其脈氣微甚而作諸聲音也丹溪云耳聾屬熱少陽厥陰熱多有氣秘者亦是為熱氣秘者耳不鳴痰火怒甚以致耳鳴王節齋云耳鳴證或鳴甚如蟬或左或右或秘塞世人多作腎虛治不效殊不知此是痰火上升鬱於耳中而為鳴郁甚則壅閉矣遇此證當審平昔飲酒厚味上焦素有痰火只作清痰降火治之大抵此證多因先有痰火在上又兼惱怒得者最多怒則氣上少陽之火客於耳若腎虛而鳴者其鳴不甚人必多怒當見勞怯證氣虛耳聾當見於大病之後凡人大病之後而耳聾者多是氣虛若老人耳聽漸重亦是氣虛重而兼鳴者亦有痰不宜峻補脈候兩寸脈洪大痰火耳鳴腎脈洪盛為腎火心脈微澀為耳癲痰腎脈濡澀為虛短而微者陰虛左心洪數心火上炎兩尺洪數相火上炎其人必夢遺耳鳴或聾耳聾脈緩大而澀者死治法治耳聾者當以通氣開鬱為主耳聾證乃氣道不通痰火鬱結壅塞而成聾也凡用清痰降火之藥須兼味辛行氣通竅之藥方得治法之要古方用酒浸針砂一日至晚去針砂將酒含口中用緊磁石一塊綿裹塞耳左聾塞左右聾塞右此欲導其氣而通其閉也有峻用痰火藥則反傷脾胃亦不能開其塞有急補氣虛則火愈上而亦不能開惟以前法痰火藥中佐以辛溫之味細細平治自然痊愈予見攻之太過反傷正氣變生他疾者有之此又不可不察也耳聾治法宜瀉南方補北方憂愁思慮則傷心心虛血耗必致耳聾耳鳴房勞過度則傷腎腎虛精竭亦必致耳聾耳鳴藥宜瀉南方補北方滋陰降火為主心虛當寧心順氣宜辰砂妙香散平補鎮心丹選用之腎虛者宜益精補腎肉蓯蓉丸丹溪治法大病後耳聾及陰虛火動而聾者宜補陰降火四物湯加黃柏主之又云耳鳴耳聾皆是陰虛火動補腎丸虎潛丸滋陰大補丸之類皆好耳聾屬少陽厥陰熱多當用開痰散風熱防風通聖散主之滾痰丸之類四物湯吞當歸龍薈丸降火間用復元通氣散調其氣以大補丸治耳欲聾用黃柏一味不拘多少細切鹽酒拌新瓦上炒褐色為細末滴水丸梧桐子大每服一百丸氣虛以四君子湯煎湯送下血虛以四物湯下耳鳴甚當歸龍薈丸多飲酒人宜木香檳榔丸一法治耳聾以茱萸草烏尖大黃三味為末津調貼湧泉穴以引火下行一法治耳聾用蓖麻子四十九粒棗肉十枚人人乳搗膏石上曬乾丸如梧桐子大綿縛塞耳中又方用雄鼠膽汁滴入耳中妙仍開痰散風熱一方治聤耳膿出桑螵蛸一個炙麝二分為末摻之或胭脂不爾礬枯吹之一方治耳痛以白礬枯吹入耳中及青礬燒灰吹之皆效一方治諸蟲入耳用香油滴入耳中其蟲即出或死耳內或用驢牛乳或雞冠血滴入皆好又方治諸蟲入耳用桃葉卷作筒角子切齊其頭內入耳中其蟲從角中走出藥方上焦痰火耳聾諸劑局方涼膈散方見積熱門防風通聖散方見風門流金膏方見火咳嗽門滾痰丸方見痰門神芎丸方見積熱門木香檳榔丸方見氣門龍薈丸方見脅痛門濟生犀角飲子治風熱上壅兩耳聾閉內外腫痛膿水流出犀角銼菖蒲木通玄參赤芍藥赤小豆各一兩炒甘菊花去梗一兩甘草炙半兩上咀每服五錢水鍾半姜三片煎七分食後溫服東垣蔓荊子散治上焦火熱耳鳴耳聾及出膿汁蔓荊子一錢升麻六分木通赤茯苓桑白皮蜜炙麥門冬生地黃前胡甘菊花赤芍藥各八分炙甘草三分上咀作一服水鍾半姜三片棗一枚煎一鍾去渣食後服選要茯神散治上焦風熱耳鳴及聾四肢滿急昏悶不利茯神去木一錢羌活防風蔓荊子黃耆石菖蒲薏苡仁各五分甘草炙三分麥門冬去心一錢柴胡薄荷荊芥各三分上咀作一服水二鍾姜三片煎八分食後溫服丹溪鼠黏子湯治耳痛生瘡鼠黏子蘇木生甘草昆布龍膽草連翹蒲黃黃芩當歸梢各五分紅花少許桔梗錢半生地黃柴胡黃耆各四分黃連三分桃仁三粒去皮尖另研上水二鍾煎一鍾食後稍熱服忌寒藥利大便解倉飲子治氣熱壅閉失音冒暑耳聾或痛流膿血白芍藥當歸甘草炙大黃木鱉子去殼各二錢上咀作二服每服水鍾半煎八分食遠服直指清神散治風熱上壅頭目不清耳常重聽殭蠶炒去絲嘴甘菊花各一兩荊芥穗羌活木通川芎防風各五錢木香一錢石菖蒲甘草各三錢上為末每服三錢食後臨臥茶清送下透水丹治人耳癢一日一作可畏直挑剔出血稍愈此乃腎虛浮毒上攻宜服此藥大黃益智仁茯苓茯神山梔子蔓荊子天麻威靈仙白芷香墨燒醋淬研麝另研各一錢仙靈脾葉五錢川烏河水浸半月三日一換水切片曬乾鹽一兩烏一兩同炒去鹽用烏上為末煉蜜和麥飯相似以酥塗杵臼搗萬杵和成劑每服旋丸梧桐子大三丸會後茶湯下忌面蔥蒜韭酒雞鵝豬魚一月芍藥散治熱壅生風耳內痛與頭相連膿血流出赤芍藥白芍藥川芎木鱉子當歸大黃甘草各錢半上水二鍾煎一鍾食後服犀角散治風熱上壅胸中痰滯兩耳虛聾頭重耳眩犀角屑前胡甘菊花石菖蒲枳殼生地黃澤瀉木通羌活各半兩麥門冬去心一兩甘草炙一錢上咀每服三錢水鍾半煎五分去滓食後溫服磁石散治暴熱耳聾心膈壅悶磁石木通桑白皮生地黃防風各一兩枳殼三錢麩炒上咀每服五錢水一鍾煎五分空心溫服耳聾通氣開塞諸劑良方芎芷散治風邪入耳壅塞虛鳴川芎白芷蒼朮石菖蒲細辛厚朴半夏制紫蘇莖葉辣桂木通甘草炙陳皮各一錢上水二鍾姜五片蔥白一根煎一鍾食後服桂星散治風虛耳聾辣桂川芎當歸石菖蒲細辛木通木香白蒺藜炒去刺麻黃去節甘草白芷梢天南星煨制各錢半上水二鍾蔥白二根姜五片蘇五葉煎一鍾食後服和劑流氣飲治氣閉耳聾皆當調氣本方加石菖蒲生薑煎服良方追風散治耳聾閉塞不通藜蘆雄黃川芎石菖蒲全竭白芷藿香鵝不食草薄荷苦丁香麝香少許上為細末每用些少吹入鼻中如無鵝不食草加冰片少許醫林塞耳丹治耳聾石菖蒲肥巴豆一粒去殼全蜴一個去毒上為細末蔥涎為丸如棗核綿裹塞耳中即通或用生川烏為末綿裹入耳內亦效千金通耳法治耳聾久不聞者緊磁石如大豆一塊穿山甲燒存性為末一字上二味用新綿裹塞耳內口中銜少生鐵覺耳內如風聲即愈千金通耳筒治耳聾耳鳴如風聲或如鐘聲鉦聲椒目巴豆去油菖蒲松香各五分上為末以臘溶化和調乘熱攤薄紙上候冷卷作筒子塞耳內一日一易有效良方通氣散治耳聾氣閉不通茴香木香全竭玄胡索陳皮石菖蒲各一錢羌活殭蠶川芎蟬蛻各五分穿山甲二錢甘草錢半上為細末每服三錢不拘時溫酒調服菖蒲散治耳聾石菖蒲十兩蒼朮五兩上銼成塊置於瓶內以米泔浸七日取出去蒼朮只將菖蒲於甑上蒸三時取出焙乾為細末每服二錢糯米飲調服日進三服或將蒸熟者作指頂大塊食後置口中時時嚼動津咽亦可磁石浸酒方治風邪之氣干於腦或入於耳久而不散經絡痞塞不能宣利使人耳中悾悾然或作旋運磁石五兩搗水淘去赤汁山茱萸天雄泡去皮尖各二兩防風木通山藥菖蒲遠志去心芎藭細辛蔓荊子白茯苓乾薑炮肉桂甘菊花各一兩熟地黃是細銼以生絹袋和勻盛貯以酒二斗浸七日後每日任飲之以瘥為度腎虛耳聾劑三因補腎丸治腎虛耳聾耳鳴山茱萸芍藥乾薑炮巴戟去心澤瀉桂心菟絲子酒浸遠志酒浸黃耆細辛石斛乾地黃附子炮蛇床子酒浸當歸牡丹皮肉蓯蓉酒浸人參各二兩菖蒲一兩羊腎二枚防風半兩茯苓一兩甘草半兩上為末以羊腎研細酒糊丸梧桐子大每服五十丸鹽酒下集成益腎丸治腎虛耳聾磁石煆巴戟去心川椒炒各一兩沉香石菖蒲各半兩上為末每用二錢以豬腎一枚細切和以蔥白少鹽並藥濕紙包煨熟空心細嚼酒送下地黃丸治勞損耳聾川歸川芎芍藥地黃辣桂菟絲子川椒炒破故紙炒白蒺藜炒去刺杜仲姜炒斷絲胡蘆巴白芷石菖蒲各三錢磁石火煆醋淬七次三錢上為末煉蜜丸梧桐子大酒下五十丸聖惠鹿腎糜治腎氣虛損耳聾鹿腎一對去脂膜切細入豉汁中以粳米二合和煮粥入椒料如法調和空腹食之作羹及下酒並可濟生蓯蓉丸治腎虛耳聾風邪入於經絡耳內虛鳴肉蓯蓉酒浸焙乾山茱萸肉石龍芮石菖蒲菟絲子酒蒸羌活鹿茸酒浸蒸石斛磁石煆酒淬七次附子炮去皮臍各一兩全蠍十個去毒麝一字另研旋入上為末煉蜜為丸梧桐子大每服七十丸空心鹽酒送下本事黃耆丸治腎虛耳鳴夜夜睡著如打戰鼓黃耆一兩羌活白蒺藜炒去刺各五錢黑附子一個炮羯羊腎一對切片焙乾右為末酒糊丸梧桐子大每服七十丸食後煨蔥煎湯送下澹寮蠟彈丸治兩耳虛聾白茯苓二兩山藥炒三兩杏仁炒去皮尖兩半黃蠟一兩另溶上為末溶蠟為丸彈子大每服一丸空心細嚼鹽湯送下三因菖蒲丸治腎虛耳聾重聽過於思慮則其病尤甚此藥主之石菖蒲蜀椒去目併合口者炒出汗各三分蔥子炒五錢皂莢一錠火炙去皮弦子羊腎一對以酒一升煮乾取出切作片子曬乾上為細末煉蜜和丸梧桐子大每服三十丸空心溫酒下日三服凡欲服此藥臨睡時先安鐵物所患耳邊口中以牙齒咬定卻以磁石一小塊安耳內覺氣微動此能聽聲然後服藥千金煨腎丸治腎虛耳聾川椒去目併合口者炒出汗一錢附子炮去皮臍巴戟去心各五錢磁石煆酷淬七次細研水飛過上為細末每服用豬腎一枚去筋膜細切蔥白薤白各分切入藥一錢鹽花一字和攪令勾以十重濕紙裹於溏灰火內煨熟空心細嚼用酒解薄粥送下十日大效平胃鎮心丹治男婦心氣不足志意不定精神恍惚夜多異夢驚悸煩郁及腎氣傷敗血少氣多四肢倦怠足膝痠疼睡臥不安夢寐遺精時有白濁漸至羸以致耳聾熟地黃生地黃乾山藥天門冬去心麥門冬去心柏子仁茯神各四兩辰砂另研為末苦梗炒各一兩石菖蒲一斤遠志甘草水煮去心七兩當歸六兩龍骨一兩上為細末煉蜜丸如梧桐子大每服三十丸空心飲湯下溫酒亦可漸加至五十丸辰砂妙香丸方見虛損門用石菖蒲煎湯送下專治氣厥虛損耳聾勞役耳聾劑益氣聰明湯治飲食不節勞役形體脾胃不足得受內障耳聾之患服此令人精神過倍元氣自益輕身健體耳目聰明黃柏酒炒芍藥各五分蔓荊子一錢升麻葛根各錢半人參黃耆甘草各二錢半上水二盞煎一盞臨臥服羊腎附子丸治勞役耳聾附子制肉蓯蓉酒浸去皮遠志去心菟絲子制牛膝酒洗磁石煆令赤醋淬七次細研水飛各一兩上為細末用羊腎五對去脂膜細切爛研入灑三升於銀鍋內微煎如膏然後入末藥和搗三五百杵丸如梧桐子大每服五七十丸空心溫酒下或鹽湯下亦可良方肉蓯蓉丸治勞聾腎臟虛損腰腳無力面黑體瘦小便澀數肉蓯蓉酒浸去皮石菖蒲附子制磁石制巴戟鹿茸菟絲子制石斛杜仲制牡蠣制破故紙炒桑螵蛸微炒五錢熟地黃桂心各兩半上為細末煉蜜和搗五七百杵丸如梧桐子大每服三五十丸空心溫酒下臨晚再服蒲黃膏治卒耳聾蒲黃細辛各一分杏仁去皮尖曲末各三分右為末同杏仁搗如膏和捻如棗核大綿裹塞耳中一日一易聤耳諸方勞熱聚於耳則生膿汁所謂聤耳干胭脂散治聤耳干胭脂枯礬各等分上件研勾先用綿杖子纏去膿別以淨綿杖引藥入耳明礬散治熱壅氣滯或沐浴水入耳中為膿枯礬龍骨研各二錢黃丹飛錢半干胭脂七分麝香少許上為末先用錦杖拭淨次蘸藥末入耳中補遺雜治耳病諸方良方勝金透關散多年耳聾不可治者用此十日見效除根川烏頭一個炮去皮臍細辛各一錢膽礬五分活鼠一隻湯泡死刮取膽上為細末用鼠膽調和勻再焙令乾研細卻入麝香半字用鵝毛管吹入耳中吹時口含清水待少時龍齒散治腎虛熱毒乘虛攻入耳致耳常鳴如蟬不可專服補藥宜用此方龍骨人參白茯苓麥門冬去心焙遠志去心各半兩丹砂研鐵粉研龍腦研牛黃研麝香研各分上為細末研勻每服五分食後沸湯調服日三次病愈即已百蟲入耳諸方一方治蜒蚰入耳以地龍一條鹽少許摻在地龍上內蔥園間蔥葉內仍以線縛葉口候一宿摘蔥葉劈破溜其汁入耳中其蚰即出或以牛酪灌入耳中令滿自出或入腹空腹食好酪一升即化為水如未出再加神效一方治蜒蚰及諸蟲入耳以小雞一隻去毛足用香油煎熟筋穿作孔枕之或用胡麻炒熟以葛囊盛枕之蟲聞其香即出一方治蟲蟻入耳用獖豬肉一指許炙令香置耳邊即出蜈蚣亦出又方治蟲入耳中以雞冠血滴入耳中其蟲自出又方治百蟲入耳用桃葉揉碎入耳又用桃葉枕頭蟲自鼻出又方用小蒜取汁滴入耳中即出又方用香油滴入耳中即出又方諸惡蟲入耳用蔥涕灌入耳活者即自出本事方治諸蟲入耳白膠香一味燒煙燻耳中暖蟲自出又方用好醋滴入耳中卻起行自出千金續方用漢椒一錢浸醋半鍾滴入耳尤妙又方用藍汁滴入耳中少頃蟲自出又方治耳及蜈蚣入耳用鮮姜取汁灌入耳中即出韭汁亦可雞冠血滴入亦可又方治飛蛾入耳用醬汁滴入耳中即出又方治蒼蠅入耳用皂角子研爛生鱔魚血調灌入耳中千金耳凍成瘡方柏葉三兩微炒為末亂髮兩雞子大食鹽細研乳香細研半兩黃蠟半兩清油一斤杏仁四十九枚去皮尖研成膏上先煎油令沸即下亂髮以消盡為度次下諸藥煎令焦黃濾去滓更以重綿濾過再以慢火煎之後下乳香黃蠟等攪令稀稠得所瓷器盛每用鵝翎旋取塗之黃馬散治耳內外惡瘡及頭瘡口邊肥瘡瘑瘡黃柏五錢馬齒莧乾者一兩上為細末每用小豆許綿裹內耳中外敷之羊腦煎治凍耳成瘡柏白皮榆白皮桑白皮杏仁去皮尖各一兩甘草一兩羊腦髓半斤上細銼以羊腦髓煎令黃濾去滓瓷器盛每用以鵝翎蘸藥塗又方橄欖核燒灰清油調敷雀腦亦佳羊矢散治耳內臭爛羊矢一個焙乾干胭脂少許上二味研勾用竹筒輕吹入耳內日三次效耳痛方用鹽炒熱重綿包熨一方以杏仁炒焦研細綿包塞耳又方治耳內極痛用鬱金研細末每用一字以淨水調傾入耳卻急傾出又方用穿山甲二片土狗二個士狗夾在穿山甲內同爆焦色為度入麝少許同研細末吹一字於耳內愈亦治耳聾治蠶蝨入耳作痛用菖蒲為末炒乘熱以綿裹著耳邊石菖蒲十兩蒼朮五兩上銼成塊置瓶內以米泔浸七日取出去蒼朮只將菖蒲以甑蒸兩三時取出焙乾搗為細末每服三錢糯米飲調服日進三次或將蒸者作指頂大塊子食後置口中時時嚼動嗽津亦可白鹽方治卒得風痰覺耳恍恍卒痛者用白鹽五升甑內蒸熟以絹囊盛之以痛耳枕其上冷則易之或以軟帛包熨患耳亦可耳聾灸法一法用蒼朮一塊長七分將一頭削尖一頭截平將尖頭插耳內平頭上安箸頭大艾炷灸之輕者灸七壯重者灸十四壯覺耳內有熱氣者效一法用蠟紙一張剪作四片每一片於箸上緊卷抽去箸以蠟紙卷子安耳中燃之待火欲至耳急除去當有惡物出在殘紙上日一片用了以蠟塞定灸暴耳聾法用雞心檳榔一個以刀從臍剜取一竅如錢眼大實以麝香坐於所患耳內從上以艾炷灸之不過二三次效聽會二穴在耳微前陷中上關下一寸動脈宛宛中張口得之灸五壯治耳聾耳鳴翳風二穴在耳後陷中按之引耳中是灸七壯治耳聾痛上星一穴在前髮際上二寸是穴灸二七壯治風聾外關治耳聾焞焞渾渾無所聞合谷灸七壯治耳聾不通內經治耳聾針灸經穴法針經云耳聾取小指次指甲爪上與肉交者先取手後取足又云手少陽三焦之脈是動則病耳聾渾渾焞焞視盛虛寒熱陷下取之也又云聾而不痛者取足少陽聾而痛者取足陽明又云耳聾刺手陽明不已刺其通脈出其前者此取手足少陽經穴及手陽明經穴是也又云手之別名曰偏歷去腕三寸別入太陰實則齲聾取之所別也又云邪客手陽明之絡令人耳聾時不聞者刺手大指次指爪甲上去端如韭葉各一壯立聞不已刺中指爪甲上與肉交者立聞其不時聞者不可刺也左刺右右刺左此取手陽明絡又云手太陽之脈所生病者耳聾目黃頰腫視盛虛寒熱陷下調之也又云耳聾無聞取耳中是也此取手太陽經又云肝虛則目䀮䀮無所見且無所聞善恐取其經厥陰少陽氣逆則頭痛耳聾不聰頰腫取血者是也此取肝經又云肺虛則少氣不能報息耳聾嗌乾取其經太陰是太陽之外厥陰內血者是也此取肺經耳有膿者禁刺經云耳痛不可刺者耳中有膿若有干耵聹耳無聞也易簡諸方外臺秘要治耳聾用芥菜子搗碎以人乳調和綿裹塞耳數易即聞聲一方治耳聾用雄黃硫黃等分為末綿裹塞耳一方用全蠍四十九個去躉泡洗以糯米半升於大瓦上鋪平將蠍鋪於米上焙令米黃為度去米不用又切生薑四十九片每片放蠍再焙姜焦為度去姜不用將竭研為細末三五日前每日先服黑錫丹蠍末三服空心酒調臨服藥時夜飯只半飽看人酒量勿令大醉令其熟睡切勿叫醒待久卻輕喚如不聽得濃煎蔥白湯一碗令飲耳即聞一方用蓖麻子五十個去皮與熟棗十枚同搗丸如小豆大更入小兒乳汁就和每用一丸綿裹內耳中覺熱為度一日一易如藥難丸日中曝少時即易丸千金方治耳聾久不效用大蒜一瓣中剜一孔以巴豆一粒去皮膜慢火炮極熟入蒜內用新綿包定塞耳中三次效又方用骨碎補削作條火炮乘熱塞耳又方治耳鳴如流水聲久則成聲久則成聲用生烏頭一枚乘濕削為棗核大塞耳日一易夜一易三日愈又方治耳聾用驢生脂與生薑熟搗綿里塞耳中用數次有效漸久聞聲又方用醇醋以微火煎附子軟削令尖塞耳效又方用龜溺點耳中即聞取龜溺法用龜一枚安於合上荷葉上養之專看葉上有溺收取滴耳中效一法用秦龜雄者置瓷盤內以鏡鑑龜既有鏡中影往往淫怯其溺自出以物收之滴耳中又方治耳聾用巴豆一粒去心皮斑蝥一枚去翅足二物合搗膏綿裹塞耳中再易甚驗又方治腎虛耳鳴以嫩雄雞約一斤重者以常法治用無灰酒煮極爛入椒鹽空心熱食之如此食過三五隻見效又方治耳痛耳聾用鱔魚斬尾滴血入耳中又膿耳經年不絕者亦愈又方治耳聾及膿用香附子為細末以鍋煎蘿蔔種湯飯後臨臥服二錢干蘿蔔亦可莫見鐵器秘方治耳大痛或如有蟲奔走或有血水流出或干痛不可忍用蛇蛻皮燒灰存性細研以鵝翎管吹入耳中立愈又方用川椒巴豆菖蒲松香以蠟溶為個子內耳中治耳鳴如風水如鐘鼓之聲卒聾者一日一易效經驗方用巴豆一粒蠟裹以針刺孔令透塞耳中導引法令患人坐地交叉兩腳以兩手從曲腳中入低頭叉項上治耳重數次效又法腳著項上不息十通必愈
