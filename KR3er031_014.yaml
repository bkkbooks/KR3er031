body:
  text: 卷之十四傷寒門下小便不利膀胱主分津液熱蓄於內津液不下行故不利也有邪氣結於下焦聚而不散則小腹硬滿而痛小便所以不利也凡不利者宜導而滲泄之若引飲過多下焦蓄熱或中濕發黃水飲停留皆先利小便有汗下後亡津液胃中干竭則有利小便之戒有小便不利而頭出汗者乃為陰脫關革之疾也和解傷寒五六日已汗復下小便不利心煩桂枝湯小柴胡湯分利太陽汗後脈浮小便不利微熱而渴五苓散渴甚者豬苓湯清利傷寒七八日身黃如橘小便不利腹微滿者頭汗出小便不利渴飲水漿瘀熱在內必發黃並用茵陳蒿湯攻下小便不利大便乍難乍易微熱胃中有燥糞也大承氣湯選用有潮熱兼大便泄小便不利柴苓湯溫風濕自汗身重不利者陰氣也甘草附子湯尉法小便不通其因有二熱鬱不通用田螺搗朴硝少加麝香如泥貼臍上自通寒凝小水不利者用炒鹽尉臍下當通然則寒熱不可不詳審也灸陰寒甚而小便不通陰囊縮入腹痛欲死灸石門穴仍服四逆湯小便自利傷寒小便自利正因不當利而反自利也如太陽陽明自汗者不應利小便而反自利者寒為膀胱不禁熱為蓄血使然是亦傷寒之一證也津液竭則病危矣夫安得不有治乎和太陽病小便自利以飲水多心下悸桂枝茯苓甘草湯血太陽身黃小便當不利今反自利其人如狂為下焦蓄血抵當湯傷寒有熱小腹滿應小便不利今反自利為有血也抵當丸尿血玄胡散大便閉小便自利知其熱在內微用承氣湯下之溫大便自通小便清利知其內虛寒也四逆湯真武湯去茯苓用蜜導陽明自汗應小便不利而反利津液內竭也糞雖硬不可攻宜蜜導豬膽汁法小便數傷寒小便數者乃小便頻來而短少也腎與膀胱俱虛客熱乘之虛不能制水也又有膀胱積熱則水行澀澀則小便不快故澀淋而數起也若大便難小便數是為脾約約者儉也脾主為胃行其津液今胃強脾弱約束不行致小便數而大便難也下太陽汗吐下後小便數而胃不和譫語者少與調胃承氣湯大便硬者小承氣湯小便數大便堅脾約丸溫太陽自汗四肢拘急難以屈伸心煩微惡寒腳攣急小便數者不可行桂枝宜與甘草乾薑湯芍藥甘草湯發黃傷寒發黃證通身面目皆知如熏黃如梅如橘是因當汗不汗而生黃也當利小便卻不利小便亦生黃也瘀熱在裡身必發黃胸中水穀不消太陰脾土應於肌肉濕熱所蒸而致肌黃治須泄熱滲濕為先有頭汗出齊頸而還渴飲水漿者蓄血也大抵不外表里鬱熱所致其風寒所郁者間而有之傷寒至於發黃為病之已甚也是以不治者多矣寸口近掌無脈鼻氣冷者不治形體如煙燻直視搖頭者為心絶死環口黧黑柔汗發黃為脾絶死發汗發熱一身盡痛面目俱黃太陽中濕麻黃湯連翹赤小豆湯脈浮而緊發黃者不可下麻黃各半湯身熱不去瘀血在裡而黃小便微利麻黃連翹赤小豆湯和解往來寒熱一分盡疼小柴胡加梔子湯脈浮弦咳嗽短氣無汗脅痛鼻乾嗜臥一身及面目盡潮熱小便不利柴苓湯分利發熱頭汗渴欲飲水小便利大反快而黃者五苓散加茵陳湯小便不利四肢沉重似瘧不欲飲茵陳五苓散服此而小便如皂莢汁則黃從小便出也陰黃當溫傷冷中寒脈弱氣虛小便如常變為陰黃理中加茵陳湯韓祇和云因下太過脾胃虛津液竭飲水自傷此陰濕傷脾變黃茵陳茯苓湯茯苓橘皮湯小茵陳湯茵陳四逆湯茵陳茱萸湯搐鼻初覺發黃以瓜蒂散吹鼻內口噙水搐之鼻中出黃水驗發斑傷寒發斑熱甚而傷血血熱不散裡實表虛熱氣乘虛出於皮膚而為斑也輕則疹子甚則如錦紋或病本屬陽誤投熱藥或當汗不汗當下不下或汗下未解皆能至此有下之太早熱氣乘虛入胃故發斑下之太遲熱留胃中亦發斑陽證熱藥過多胃熱焦爛亦皆發斑也有表虛里實熱毒不散所以不可輕發汗不可輕下陽毒發斑者若熱毒深入斑發紫黑是毒陷於內不可治也斑赤者逆黑者十死一生消散陽毒已深內外結熱舌卷焦黑鼻如煙煤狂言見鬼面赤斑如錦紋五日可治六七日不可治陽毒升麻湯人參白虎湯始用熱熾發為赤斑或咽痛玄參升麻湯表證多者防風通聖散去硝黃解利溫毒發斑而嘔者葛根橘皮湯嘔吐清汁眼赤口瘡下痢黃連橘皮湯解熱傷寒五六日斑出豬膽雞子湯兼咽痛紫雪細細咽之發赤斑大青四物湯發斑通用升麻湯犀角地黃湯熱多玄參升麻湯黃連四物湯青木香一物湯涼血溫毒發斑冬月大暖人受不正之氣至春發為斑爛癮疹如錦紋謂之溫毒陽脈浮數陰脈實大黑膏化毒丹下溫毒身無大熱渴煩大便實腹痛有赤斑癮疹者調胃承氣湯斑見無大熱脈虛祕悶當歸丸清補汗下後胃虛極而發斑者此火遊於外所致白虎加人參白朮狐惑傷寒不發汗變為狐惑狐惑二字取其進退猶豫不決之意也因胃內食少腸胃空虛三蟲求食齧人五臟故唇口生瘡上唇生瘡蟲食其臟為惑下唇生瘡蟲食其肛為狐其候齒燥聲啞惡飲食面目乍赤乍白乍黑舌上白胎唇黑有瘡四肢沉重喜眠其咽乾口瘡甚者死清熱黃連犀角湯涼血唇瘡聲啞桃仁湯殺蟲雄黃鋭散為膏納穀道中多眠凡病者多不得眠傷寒反多眠者其説有四一太陽病欲解則多眠此神將復也一少陰病脈沉細但欲寐此神昏也一風溫為病當不了了亦多眠也一狐惑病四肢沉重喜睡上下唇有瘡此神恍惚也大抵陽氣虛陰氣盛則目瞑故多眠乃邪氣傳於陰而不在陽也昏昏閉目者陰司闔也默默不言者陰主靜也和解太陽病脈細多眠外已解也小柴胡湯溫少陰尺寸脈俱沉細但欲寐者少陰證也四逆湯風溫陽脈浮滑陰脈濡弱多汗或發汗後身猶灼熱喘息多眠風溫也葳蕤湯不得眠陽盛陰虛則晝夜不得眠蓋夜以陰為主陰氣盛則目閉而臥安若陰為陽所勝故終夜煩擾而不得眠也所謂陰虛則與夜爭是也大抵傷寒不眠者蓋熱也諸陽相併陰陽未復所以不眠有大熱而神不清亦不眠有大下而動血心主血亦不眠瘥後熱氣與諸陽並陰氣未復亦不眠和解吐下後晝夜不眠酸棗仁湯吐下後心中懊儂虛煩不眠者梔子豉湯清熱大熱乾嘔錯語不眠黃連解毒湯少陰病二三日以上心煩不眠黃連雞子湯與水太陽大汗出胃中干不得眠欲飲水者少少與之分利下後而渴不眠豬苓湯脈浮小便不利不眠者五苓散溫下後復發汗不得眠無表證脈沉乾薑附子湯短氣短氣者呼吸短促而不能相續也千金方云少氣不足以息是也似喘而不搖肩似呻吟而無痛者短氣也心腹脹滿邪在裡而為實心腹喘滿邪在表而為虛有停水心下亦有短氣隨證攻治無不愈矣更汗短氣但坐以汗出不徹故也更發汗則愈葛根加人參湯兩解有短氣腹滿而喘有潮熱者此短氣之實也大柴胡湯溫經腹濡滿而短氣者邪在表而為虛也趺陽脈浮而緊緊則為痛微則為虛相搏則為短氣之虛也風濕相搏汗出短氣小便不利惡風不欲去衣甘草附子湯分利水停心下短氣五苓散下乾嘔短氣汗出不惡寒此表解里未和十棗湯太陽病下之早心下硬為結胸大陷胸湯蛔厥蛔厥者食即吐蛔此為臟寒蛔上入膈故時或發煩須臾復止得食而嘔又煩又煩者蛔聞會氣其人當自吐蛔或因發汗胃中冷故長蟲出又有胃氣困乏雖飢不能食食到口蛔聞食氣而上虛寒並於胸中所以食與蛔並吐而出也仲景止用烏梅丸溫活人書謂吐蛔為胃中虛冷先用理中丸或四逆湯利渴吐蛔理中加大黃入蜜以利之水氣水氣為水飲也水為至陰其性寒有內熱得水則消身熱內寒得水兩寒相搏故水停心下兩解表不解心下有水氣乾嘔發熱喘喝或利或小便不利少腹滿小青龍湯心下有水氣喘而咳熱不渴服湯已渴者此寒去欲解小青龍湯分利中風傷寒六七日渴欲飲水水入即吐有表裡證名水逆五苓散下結胸無大熱此水結在脅但頭汗出大陷胸湯溫少陰腹痛小便不利四肢疼痛下利此有水氣或咳嘔或小便利真武湯厥而心下悸宜先治水茯苓甘草湯百合病百脈一宗舉身皆受病無經絡之狀大抵病後虛勞臟腑不平變而成此其病似寒無寒似熱不熱欲食不食欲臥不臥欲行不行似寒非寒似熱非熱默默不知所苦服藥即吐有如見鬼小便赤此為百合但因病中失調餘證在陰則攻陽反下之在陽則攻陰反汗之此為逆各不得解故成百病和通用小柴胡湯加百合知母粳米生薑清涼血百合知母湯百合地黃湯洗浴一月不解變成渴者用百合一升水一斗漬一宿暖溫洗身陰陽易男子病新瘥婦人與之交曰陽易婦人病新瘥男子與之交曰陰易此則正氣將復卻被淫欲之邪動易也故曰易其候身重氣乏腹中絞痛頭不能舉足不能立四肢拘急百節解散熱上衝胸眼中生花男子則陰腫腹內攻刺婦人則裡急腰胯連腹內痛若手足拳拳其脈離經皆不可治或榮衛虛精髓竭翕翕少氣手足不能舉動者引歲月而死此外傷六氣又動七情其害若此豈不慎哉其不易自病者名女勞復謂之陽脫邪盛亦不可治通治陶云其證有寒熱不若寒病用燒裩散入熱藥中調下熱病用燒裩散入寒藥中調下緣此通治易證以為切當導陰氣燒裩散猳鼠橘皮湯利小便不利五苓散溫當歸白朮揚乾薑湯勞復凡病將愈為勞動而病復作者謂之勞復非但強力持重若梳沐動氣憂愁思慮則勞神皆復也解新瘥後津液未復氣血尚虛少勞之則生熱而病復作脈浮者微汗以解之枳殼梔子湯鼠矢豉湯猳鼠矢湯當歸白朮湯乾薑湯和勞役復發熱者沖和湯清瘥後渴熱竹葉石膏湯勞復發熱欲絶麥門冬湯食復病後新瘥胃氣未完但得少食糜粥常令稍飢不可過飽若恣所欲頓食至飽或食肥膩膾炙果品等稍不消化則邪氣乘機而復作發熱煩躁而病愈甚謂之食復吐宿食未克者枳實梔子豉湯吐之消導腹滿煩熱二陳湯加山楂麥芽砂仁神麯下飲食稍多經數日不愈脈沉實熱甚便祕譫語大柴胡湯枳實大黃湯補消導後熱不退者補中益氣湯過經不解傷寒十餘日過經不解胸滿而嘔日晡潮熱大便微利本大柴胡證醫以丸藥下之非其治也傷寒法以十一日愈十二日不愈者再傳所謂過經是也解有潮熱者實也先與小柴胡湯以解外後服柴胡加芒硝太陽過經十餘日下之後四五日柴胡證在與小柴胡湯嘔不止心下微煩為未解大柴胡湯下傷寒十三日過經不解譫語以有熱也當以湯下之內實者調胃承氣湯太陽過經十餘日心下欲吐胸痛大便反溏腹微滿微煩若不經吐下者當與柴胡湯若曾經吐下者則邪氣乘虛入胃為實調胃承氣湯汗後不解汗後而病不解寒熱如舊或表邪未盡或邪傳裡或邪氣乘虛內客宜各因其證而治之汗曾服麻黃桂枝若脈洪大形為瘧狀再發汗必解麻黃湯表裡兼解發熱汗出不解心下痞硬嘔吐下利大柴胡湯清服桂枝大汗出大渴煩不解脈洪大白虎加人參湯下發汗後不惡寒但惡熱及蒸蒸發熱者實也調胃承氣湯發汗後不可更行桂枝汗出而喘無大熱者麻黃杏仁石膏甘草湯分利太陽病發汗後大汗出胃中乾燥不得眠欲飲水者少少與之令胃氣和則愈若脈浮小便不利微熱消渴五苓散發汗已脈洪數煩渴五苓散和中汗後腹脹滿厚朴生薑半夏甘草人參湯汗過多心下悸欲得發顫桂枝甘草湯溫經發汗後病不解反惡寒者表虛也芍藥甘草附子湯脈細身倦者方可服太陽病發汗汗出不解仍發熱心中悸身瞤動振欲劈地真武湯發汗後身疼痛脈沉者桂枝加芍藥人參湯太陽發汗遂漏不止其人惡風小便難四肢拘急難以屈伸桂枝加附子湯大汗出熱不去內拘急四肢疼下利惡寒四逆湯發汗後臍下悸欲作奔豚茯苓桂枝甘草大棗湯下後不解身熱不去利不止胸腹滿渴煩活人去傷寒之邪不過汗吐下之三法也三法得當病勢易衰則愈矣倘三法失宜加以病勢危惡則傳變不已誠可慮也況發汗吐下後邪氣乘虛而未解或壅窒而未盡則當量其虛實以治之先賢謂知邪氣之虛實發汗吐下之不瘥溫補針灸之適當則十全之功可自得矣吐傷寒五六日大下後身熱不去心中結痛未欲解也梔子豉湯下後心煩腹滿臥起不安梔子厚朴湯清熱太陽桂枝證醫反下之利遂不止脈促者表未解喘而汗出者葛根黃連黃芩湯下陽明下之心下懊憹而煩梔子豉湯有燥屎者大承氣湯溫太陽下後脈促胸滿桂枝去芍藥湯微寒去芍藥加附子丸藥下之身熱不去微煩梔子乾薑湯解錯離之邪六七日大下後寸沉而遲手足厥逆下利脈不至咽喉不利唾膿血瀉利不止為難治麻黃升麻湯下後熱下後有熱血氣虛也太陽陽明之故也仲景云大發其汗使陽氣微又下之使陰氣弱其人亡血病當寒後乃發熱無休止陰陽既虛氣血俱弱故其熱不可止息所用葶藶梔子亦酸苦湧泄之義也吐陽明下之仍發熱心下懊憹飢不能食頭汗出梔子豉湯利服桂枝湯或下之仍頭項強無汗翕翕發熱心下滿微痛小便不利桂枝湯去桂加茯苓白朮湯壯陰大下後則傷血故脈澀葶藶苦酒湯汗後惡寒汗後惡寒但表解未盡則為輕證法當再汗之若陽微於外寒積於內厥逆自利則用四逆湯若陽微於外熱伏於內大便實者下之若汗後脈不為汗衰比前躁疾者此名陰陽交交者死此篇可與不得汗及前惡寒兼看發表汗後惡寒表未解者汗之麻黃湯兩解汗後熱不退大便宜微惡寒者先解表表解後用大柴胡湯小承氣湯溫汗後陽微惡寒大便不實者芍藥附子甘草湯汗後惡寒自利厥逆者四逆湯汗吐下不解三法俱用之後而病不愈者其有虛實之故也若非餘邪未盡必是陰陽兩虛於斯時也當斟酌審之或可瀉則瀉可補則補庶不殺人也和五六日已發汗復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩為未解柴胡桂薑湯太陽汗吐下解後心下痞硬噫氣不除旋覆代赭石湯解太陽先發汗不解而復下之脈浮者則知病在外當須解外桂枝湯清吐下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上干煩飲水者白虎加人參湯溫汗下之後病仍不解躁煩不得眠茯苓四逆湯大汗若大利而厥者四逆湯下後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱乾薑附子湯下後復發汗脈微細而振寒者此內外俱虛也吐下之後食入口即吐乾薑黃連黃芩人參湯吐發汗吐下後虛煩不眠劇者反覆顛倒心中懊憹梔子豉湯發汗若下之煩熱胸中窒梔子豉湯下吐下後不大便五六日至十餘日日晡發潮熱不惡寒獨誤如見鬼循衣摸床脈弦者生澀者死但發熱譫語大承氣湯吐下後腹脹者邪熱入胃也調胃承氣湯太陽吐下後微煩小便數大便硬小承氣湯和經益陽吐下後心下逆滿氣上衝胸頭眩脈沉緊發汗則動經身為振搖茯苓桂枝白朮甘草湯急下急溫夫傷寒急下急溫者病勢已迫將有變也故稱急者非若他證尚可緩也少陰屬腎主水口燥咽乾乃熱邪內炎腎水將竭故當急下如腹脹不大便土勝水也亦當急下陽明屬胃土汗多熱盛急下以存津液腹滿痛為土實急當下之熱病目不明熱不已者死今目睛不和證亦危矣須急下少陰急溫二證內寒已甚急溫無疑也下少陰病得之二三日口燥咽乾者急下之大承氣場少陰病自利純清水心下必痛口燥咽乾者急下之方同上少陰病六七日腹脹不大便急下之方同上陽明發熱汗多者急下之方同上傷寒六七日目中不了了睛不和無表裡證大便難身微熱急下之方同上發熱不解腹滿痛急下之方同上溫少陰脈沉急溫之四逆湯少陰膈上有寒飲乾嘔不可吐急溫之四逆湯傷寒見風外證是傷寒診其脈是傷風脈浮而緩也故曰傷寒見風見風脈也外證寒多熱少不煩手足微厥是也解表傷寒見風風則傷衛寒則傷榮衛傷者桂枝湯榮傷者麻黃湯榮衛俱傷大青龍湯煩躁者用不煩躁者桂枝麻黃各半湯傷風見寒外證是傷風診其脈則是傷寒脈浮而緊者是也其證惡風發熱多煩或手足微溫解表傷風見寒脈似桂枝而無汗病似麻黃而反煩躁是也大青龍湯脈若緩而有汗者桂枝湯脈緊不煩躁者麻黃湯類傷寒四證痰證食積虛煩腳氣痰證似傷寒證憎寒壯熱惡風自汗胸滿氣上衝咽不得息此中脘有痰但頭不痛項不強為異若痰涎盛者亦隱隱頭疼寸口脈浮若有脈伏以意參之二陳湯柴胡半夏湯大半夏湯金沸草湯氣上衝者瓜蒂散食積似傷寒發熱惡寒吐逆頭疼但身不痛為異左手脈平和右手脈緊盛是以知其傷食也食在上脘胸滿嘔吐者宜吐之瓜蒂散心腹滿痛大柴胡湯下之或用治中湯五積散吞下木香檳榔丸虛煩惟煩熱與傷寒相似不惡寒不頭痛不身疼為異此煩熱者蓋虛也表既虛不可汗里不實不可下若攻之者多死惟宜竹葉石膏湯虛煩不止者梔子升麻湯白虎湯嘔吐者大半夏加陳皮湯內寒外熱者陰旦湯驚悸痰盛虛煩者溫膽湯傷寒汗吐下後虛煩不得眠者梔子豉湯上盛下虛虛煩自利者竹葉湯去石膏加附子若既濟湯婦人挾血虛而煩者四物湯加人參麥門冬竹葉甘草腳氣似傷寒頭痛身熱大便祕肢節痛嘔但兼腳弱為異或始因足腫疼痹或緩弱小腹不仁或心悸轉筋食則吐胸滿此病多因寒濕傷足毒邪衝心發則類傷寒足膝必難動便寒傷三陽所患必冷越婢湯小續命入薑汁暑中三陰所患必熱小續命湯去附加桂腳腫者木瓜散檳榔散大便祕者脾約丸三陽合病傷寒合病者或兩經三經齊病不傳者為合病三陽合病腹滿身重難以轉側口中不仁譫語遺尿皆不可汗下清熱和表裡白虎湯合病太陽陽明合病脈浮而長大便硬小便利其脾為約脾約丸惡寒者升麻葛根根不惡寒反惡熱大便不祕者白虎湯不惡寒反惡熱大便祕或譫語者調胃承氣湯喘而胸滿者不可下麻黃湯但嘔而不下利葛根加半夏湯太陽少陽合病脈浮而弦脅下硬滿往來寒熱及有餘證者並與小柴胡湯自下利者黃芩湯嘔者黃芩加半夏生薑湯少陽陽明合病脈弦而長因發汗因利小便已而胃中燥實大便難也調胃承氣湯脈長自利者為順脈滑而數者為負負者克賊脈滑而數者有宿食大承氣湯並病傷寒並病者一經先病又過一經之傳者為並病又始初二陽合病後則一陽氣盛一陽病衰歸併於一經也故曰並病太陽陽明並病太陽病發汗汗出不徹轉屬陽明續自微汗出不惡寒若面色怫鬱痛無常處是陽明覆並回太陽當再汗之愈麻黃湯太陽證未罷桂枝麻黃各半湯微汗之太陽證罷但陽明證者下之宜大承氣湯太陽少陽並病心下痞而眩少陽也頸項太陽也若頭痛眩冒時結胸心下痞硬當刺肺俞肝俞大椎慎勿下太陽不勝陽明不負木相剋為順負者失也少陽脈勝陽明脈負是鬼賊相剋為逆熱病夏月傷寒是為熱病發熱頭痛肢體重痛惡寒惡熱其脈洪盛用藥不可太溫如桂枝麻黃青龍其性頗熱須加芩連涼劑不然則有黃斑之變也惟九味羌活湯最當凡熱病脈三日後仍數邪充在經宜用桂枝石膏湯或值淫雨或病人有濕蒼朮白虎湯夏至後謂之脫髮梔子升麻湯溫病發於春三月及夏至以前是也發熱咳嗽頭痛身痛口渴脈來浮數溫病當分治解肌熱甚者升麻葛根湯解肌湯和不渴者小柴胡湯加桂咳者小柴胡加五味子渴者去半夏加栝蔞根人參虛煩者竹葉石膏湯下發渴煩躁大便祕大柴胡湯利之溫瘧重感於寒變為溫瘧脈尺寸俱盛兼弦而數和解先熱後寒小柴胡湯或白虎加桂湯清熱但熱不寒止用白虎湯溫毒陰脈實大陽脈洪數發熱發斑隱疹咳兼心悶清熱玄參升麻湯涼血黑膏風溫發汗敗毒散獨活湯許氏用續命湯減麻黃附子解肌柴胡桂枝湯白朮湯清熱汗後發熱無下證知母石膏湯疏風頭目昏眩四肢煩痛荊芥散金匱引風湯濕溫其人傷濕因而中暑名曰濕溫發熱頭疼胸間多汗兩脛冷妄言脈陽濡而弱陰小而急病類傷寒不可發汗汗出必不能言耳聾不知痛在身青面色變名曰重暍必死清暑熱東垣清暑益氣湯白虎加蒼朮湯分利五苓散溫冷香飲子茯苓白朮湯降痰消暑丸橘皮湯中濕中濕證脈沉緩一身盡痛及身黃大便反快小便澀是也利五苓散溫小便自利術苓附子湯小便不利大便反快甘草附子湯中暍夏月自汗煩渴為中暍面垢背寒身不痛外證大率似熱病中暑有四證可審自汗一也煩渴二也脈虛三也面垢四也但不惡寒不身痛為中暍手足雖冷脈雖虛不可用熱藥當以清暑之劑及利小便為佳清暑香薷飲中暍手足微冷煩渴四肢不痛白虎湯中暑發熱不惡寒竹葉石膏湯中暍身熱惡寒汗出而渴及太陽中暍發熱惡寒身重脈弦細小便已灑然毛聳手足冷勞則熱手足汗口爛而燥俱宜白虎加人參湯分利發熱頭痛小便不利色赤頭痛惡寒心煩躁心下不快五苓散益元散和發熱頭痛煩躁小柴胡湯豁痰痰逆惡寒者橘皮湯降火熱甚者黃連解毒湯加香薷尉法昏憒不省人事蔥餅尉臍臟結臟結之候其狀如結胸飲食如故時時自下利舌上白胎臍痛引陰筋不往來寒熱云寒而不熱其人反靜此臟結也仲景謂病脅下素有痞連在臍旁痛引小腹入陰筋者此名臟結死蓋昔宿積之結於脅為痞今因傷寒邪氣入里與宿積相合使真臟之氣結而不通致連在臍旁痛引小腹入陰筋而死仲景無治法舌上白胎者不可攻和小柴胡湯針關元穴舌上胎傷寒三四日以後舌上有膜白滑如胎甚者或澀或黃或黑皆熱氣之淺深也邪氣在表者舌上則無胎邪氣傳裡津液搏拮則舌上生胎也寒邪初傳未全成熱在半表半裡或丹田有熱胸上有寒邪初傳入里也惡寒者必欲嘔也腹中痛者必欲利也和陽明病脅下硬滿而喘發熱汗出不大便而嘔舌上白胎者小柴胡湯脈陰陽俱緊舌上滑胎小柴胡去半夏加人參栝蔞湯腹痛理中湯吐陽明脈浮緊咽燥腹滿而喘發熱汗出惡熱心中懊憹舌上胎者梔子豉湯下若熱聚於胃則舌為之黃是熱已深也金匱曰舌黃未下者下之黃自去黑滑皆然經曰若舌黑者反為熱之極也又曰熱病口乾舌黑者死清熱七八日不解熱結在裡表裡俱熱時時惡風大渴舌乾燥而煩欲飲水數升者白虎湯加人參杜學士三十六般辨視舌色法清碧學士杜先生曰凡傷寒熱病傳經之邪比雜病不同必須以脈與證及舌三者並看表裡汗下之法方免無瘥不誤人命且如脈者血之府也屬陰人初得病之時邪與正氣相搏未讓脈必滑而有力也病久熱甚氣衰脈必微細無力方數甚也只可好養陰退陽此議脈之妙也又如證者初病有惡寒發熱後必有渴欲水燥熱之類也或有逆厥而狂者此熱證傳經之邪也始終熱證實熱故無寒也傷寒為病初頭痛必有發熱而惡寒渴水之證一病便不逆泄利但寒而無發熱此寒證也且如識證之妙者如火者本心之官也竅於舌心屬火主熱象離明人初得病在表則舌自紅而無白胎等色表邪入於半表半里之間其舌色變為白胎而滑見也切不可不明表證故邪傳之間其舌色初為白胎邪入於裡舌必見黃色乃胃邪之象宜調胃承氣湯下之胎黃自去而疾安矣若醫不以次第而誤用湯丸失於遲下其胎必黑變為舛證此為難治若見胎如黑漆之光者十死一生此心火與邪熱二火相乘亢極變為黑色如火之炎物極則焦而形黑也乃臟腑皆受邪毒日深胃中積熱之極宜速下之瀉去胃中實火庶幾回生若下之遲死期必矣今撰三十六舌法於左並方法源流可決死生之妙也三十六舌法白胎舌治宜小柴胡湯或梔子豉湯火烙舌宜涼膈散或大柴胡湯下之紅星舌將發黃宜茵陳蒿湯生斑舌宜玄參升麻湯或化斑湯黑炭舌宜竹葉石膏湯大熱宜調胃承氣湯下之黑圈舌過經未解宜大承氣湯下之人裂舌宜涼膈散加黃連主之蟲碎舌宜小承氣湯下之厥陰舌宜理中丸或四逆湯主之里黑舌調胃承氣湯下之或解毒湯調之瘟毒舌黑色者主死死蜆舌白者無活主死無疑凡見舌尖白根黃此為表證未解須宜解表然後可攻之如大便祕者宜涼膈散泡硝黃熱服小便澀者宜五苓散加木通合益元散入薑汁白湯調下舌見弦白心黑脈沉微者難治脈見浮滑者可汗沉實者可下若初病見此者危急調胃承氣湯下之舌見尖上白胎二分根下黑一分必有惡寒身疼如飲水者五苓散自汗渴者白虎湯下痢者解毒湯此亦危證舌見白胎中有小黑點亂生當有表證其病之來雖惡宜服涼膈散微表之退即下之用承氣湯舌見兩弦灰色中有黑暈痕二條此熱乘腎當急下之用解毒湯加酒泡大黃為末調服舌見微黃色者初病則得之不自白而變黃者必見譫語此由失汗表邪入里也必用汗下兼以雙解毒湯舌見白胎帶黃色者必泄宜服解毒湯惡寒者五苓散舌見醬黃色肥光者必表未解宜小柴胡湯合天水散可下者大柴胡湯舌中見黑胎者同上治舌見黃色者必先見白胎變黃色也此為表而傳裡也熱已入胃急下之調胃承氣湯若不早下必至黑色而不可救白中見黑胎者同治舌見白胎而自汗出者不可下宜白虎湯加人參舌見白胎滑者脈在肌肉為邪在半表半裡必往來寒熱宜小柴胡湯和之舌見白而胎滑者時時自下利小腹痛引陰筋此名臟結之證為邪併入臟深為難治舌見四圈白而中有黃者必作煩渴嘔吐之證兼見表者五苓散合益元散服之黃盡方可下之舌見黃而有小黑點者熱必深也邪傳六腑將入五臟急下之調胃承氣湯次進解毒湯亦為十存四五也舌見根黃尖白表少里多宜天水散一合涼膈散二合和而服之如嫌未散防風通聖散主之舌見干而澀者膈邪傳胃並毒極深必煩渴急宜下之大承氣湯若見發黃茵陳蒿湯血證抵當湯表有水腫在脅內十棗湯結胸者大陷胸湯痞滿者大黃瀉心湯舌見四邊微紅中央成黑灰色行路痕者此由失下熱退可愈須四五下之方退大承氣湯五次下之而胎色不退者不治舌見黃而中有黑點亂生者其證必渴譫語脈滑者生脈澀者死循衣摸床者死下之見黑糞者死大承氣舌見黃而中有黑至尖者熱毒邪氣已深兩感者下之十有九死宜用九味羌活湯不惡寒下利調胃承氣湯舌見弦紅心黑者傷風表未解也宜雙解毒散加雙解毒湯微汗之表證罷可下之如結胸煩躁目直視者下之非結胸不可下舌見根黑尖黃微隱隱不見如黑灰色根黑尖黃雖有黑行其脈實宜下之大承氣湯脈浮而渴者涼膈散其能活者十有三四舌見灰色無惡寒惡風雖脈浮者亦可下之若惡風寒雙解毒湯下之見黑糞者不可治舌見根黑尖黃脈滑者可下之脈浮者養陰退陽若惡風寒者微汗之雙解毒散下之不成利者用解毒湯舌見大黑而有亂紋者脈滑實急下之十得一生脈浮數無力者不治傷寒補遺晝夜偏劇熱入血室為陰虛則夜不寧而病劇汗下過多為亡陽陽虛則晝不安和解婦人傷寒發熱晝則明瞭暮則譫語為熱入血室以陰虛而熱邪乘虛而入故暮譫晝了小柴胡加牡丹皮湯溫下之後復發汗晝則煩躁不得眠夜而安靜不嘔不渴無表裡證脈沉微身無大熱者乾薑附子湯為下而復汗以亡陽故晝煩而夜靜飲酒復劇傷寒時證汗後和平身涼安靜卻因飲酒復劇發熱煩悶乾嘔呻吟錯語不得臥黃連解毒湯瘥後昏沉傷寒瘥後十數日或半月二十日終不惺惺常昏沉如失精神言語錯謬似鬼祟似風非風或無寒熱或潮熱有寒熱如瘧皆緣發汗未盡餘毒在心包絡所致知母麻黃湯出汗不均為汗不流是汗出蓋覆不周則汗出不均致腰背手足搐搦或冷或熱牛蒡根散水氣大病瘥後從腰以下有水氣者牡蠣澤瀉散壞證傷寒病中又感寒暑燥濕風熱異氣而成壞證或經汗吐下溫針仍不解小柴胡湯證罷亦成壞證況病已過經熱留臟腑證候多變久而不瘥陰陽舛亂無復紀綱大率以表證多者知母麻黃湯若諸藥不效者用鱉甲散若柴胡證在則不為逆不仁謂不柔和則痛癢寒熱屈伸灸刺皆不自知皮膚不榮謂之不仁經曰虛邪乘寒則為鬱冒不仁蓋其血氣虛少不能周流於身是為邪氣所伏故肌體頑麻不知痛癢又因少陰腎氣微精血少氣逆心下陽氣退熱歸陰與陰相動令身不仁此為尸厥其乘寒之厥鬱冒不仁即此尸厥可知矣若脈浮而洪身汗如油喘而不仁水漿不入即體不仁此為命絶溫直指方用甘草乾薑湯桂枝芍藥加乾薑各半湯灸中極穴一名玉泉針昔越人入虢太子病尸厥以鬱冒不仁為可治刺之而得痊火邪火邪者謂其不當用火而用之故謂之火邪凡傷寒汗不出服發汗藥至於再三而汗不行此津液內涸也其證故危若尋常汗證藥未至切而汗不行遽以火迫於床榻之下劫奪取汗炎氣熏灼熱邪交併變為驚狂等證實者則煩躁不已虛者真陽脫亡當量其虛實而解散之太陽汗下心下痞表裡俱虛復加燒刺胸煩面青膚瞤者難治色黃手足溫者可治太陽中風以火劫之因火熱兩陽相結熏灼發熱於外身必發黃熱搏於內則小便難火熱大甚則手足躁擾循衣摸床為難治小便利者火氣未劇尚可治也涼血太陽病以火熏之不得汗發燥不解必下清血必為火邪犀角地黃湯發汗脈浮宜以汗解用火炙之邪無從出病從腰以下必重而痹名為火逆麻黃杏子薏苡甘草湯循衣摸床傷寒若吐不解不大便五六日以上至十餘日日晡潮熱不惡寒獨語如見鬼狀劇者則不識人循衣摸床惕而不安微喘直視若微者發熱譫語大承氣湯若一服而利即止復看脈弦者生澀者死仲景云循衣摸床者不可治下大承氣湯小承氣湯可選而用之直視直視者目睛不能轉動也水精為志火精為神心使之也傷寒直視為邪氣壅勝冒其真氣使神志不衛於心精氣不榮於目則為直視多不治也衄家不可汗汗則額上脈緊直視不能動狂言直視則為腎絶搖頭直視則為心絶皆臟氣已脫也直視喘滿不知人下反循衣摸床者直視者死下其或目中不了了睛不和無表裡證大便難身微熱者非直視乃內實也急下之大柴胡湯大承氣湯選用之遺尿仲景云溲便遺失狂言反目直視者此腎絶也風溫被下必失溲三陽合病一焦氣絶不歸其部不可汗下溫陰陽俱虛下焦脫用附子清三陽合病腹滿身重難以轉側身不仁譫語遺尿發汗則譫語下之則額上生汗手足厥冷自汗而熱白虎加人參湯下膿血陽病下利便膿血協熱也少陰下利便膿血協寒也膿為陳積血為新積熱則清寒則固此為治之大略也清下後脈數不解下利不止必協熱而便膿血犀角地黃湯固少陰下利不止腹痛便膿血桃花湯傷寒十勸李子建傷寒十勸不可不知醫家病家知此十勸則不致誤所益非輕況傷寒之病與雜證不同投藥一差生死立判一傷寒頭痛及身熱便是陽證不可服熱藥傷寒病傳三陽三陰共六經內太陰病頭不疼身不熱少陰病有反發熱而無頭疼厥陰病有頭疼而無發熱故知頭疼身熱即是陽證若妄投熱藥決致死亡二傷寒必須且攻毒氣不可補益邪氣在經絡中即隨證早攻之只三日四日痊安若妄補正氣使毒氣流熾多致殺人三傷寒不思飲食不可服溫睥胄藥傷寒不思飲食自是常事不知邪氣在胃故亦不飢雖不飲食亦不死如理中丸人參黃耆之類不可輕服若陽病服之熱邪增重多致不救丁香巴豆之藥尤不可服四傷寒腹疼亦有熱證不可輕服溫暖藥仲景論腹滿時痛之證有曰痛甚者加大黃夫痛甚而加大黃意可見也於身冷厥逆而腹痛者方是陰證須消息之每見腹痛便投熱藥多致殺人五傷寒自利當看陰陽證不可例服補藥熱藥止瀉藥自利惟身不熱手足溫者屬太陰身冷四逆者屬少陰厥陰其餘身熱下利皆屬陽隨證依仲景法治之若陽證誤投熱藥者多不治六傷寒胸脅痛及腹脹滿不可妄用艾灸常見村落間病傷寒無藥便用艾灼多致毒氣隨火而盛膨脹發喘而死不知胸脅痛自屬少陽腹脹雖屬太陰仲景以為當下之證此外惟寒厥陰證可灸之七傷寒手足厥冷當看陰陽不可例作陰證傷寒有陽厥陰厥醫者少能分辨陽厥若投熱藥殺人速於用刃蓋陽病不至於極熱者不能發厥仲景所謂熱深厥亦深又與熱藥寧復生乎但看初得病而身熱至三四日後熱氣已深大便祕小便赤或譫語昏憒及別有熱證而發厥必是陽厥急用承氣湯下之若初得病身不熱大便不祕自引衣蓋身或利小便數不見熱證而厥逆即是陰厥方可用四逆湯之類二厥所以使人疑者緣為其脈皆沉然陽厥脈沉而滑陰厥脈沉而弱又陽厥指爪時溫或時發熱陰厥則常冷此為可別八傷寒病已在裡即不可用發汗藥傷寒證須看表里如發熱惡寒則是在表宜發汗如不惡寒反惡熱即是里證若一例發汗則所出之汗不是邪氣乃泄真氣邪氣未除真氣先泄死者必矣又別有半表半裡之證及無表裡之證皆不可下亦皆不可汗但隨證治之九傷寒飲水為欲愈不可令其恣飲過度凡病人大渴欲飲水當與之以消熱氣故仲景以飲水為欲愈人見此説遂令病人縱飲因而為嘔為喘為咳逆為下利為腫為悸為水結胸為小便不利者多矣且如病人欲飲一碗只與半碗常令不足為善十傷寒病初安不可過飽及勞動或食羊肉行房諸厚味飲酒病方愈不必再服藥脾胃才復不可過食不能消化病即再作謂之食復病方愈氣血尚虛勞動太早病即再來謂之勞復若食羊肉及行房者犯之必死食諸厚味並飲酒者再作必重傷寒禁忌傷寒病服藥中病即已不必盡劑千金方云傷寒新瘥後食豬肉羊血魚膾肥膩等味必大下利若食餅餌煎爆瓜果等物胃氣尚虛不能克化必更作熱皆難治也又云新病瘥後但得少食糜粥常令稍飢不可過飽不可恣欲妄食雖思勿與也又忌大肉諸般骨汁本草注羊肉熱病瘥後食之發熱殺人又新差後當靜臥切勿早起梳沐勞動多言用心使意此皆令勞復又新瘥後未滿百日氣力未平復而犯房室者皆再熱作而死不治此新愈後之大禁也陶氏傷寒十四法一傷寒發狂奔走人難制伏先於病人房內著火一盆用醋一碗傾於火上其醋氣入鼻內即安方可察其陽狂虛實用藥無差若病初起頭痛發熱惡寒方除已後登高而歌棄衣而走逾牆上屋罵罯叫喊大渴欲死脈來有力乃因邪傳入里陽盛發狂當用寒藥下之凡見舌卷囊縮者不治若病初起無頭痛身微熱面赤戴陽煩躁脈來沉微無力欲坐臥涼水中乃因寒極而發躁即是陰證似陽當用熱藥溫之此為陰躁凡見厥冷下利譫語者不治若醫者不察其脈以虛陽上膈而躁誤為實熱反與涼藥使渴盛躁急則氣消而成大害矣須察脈來有力無力此為良法一傷寒腹中痛甚將涼水一碗與患者飲之其痛稍可者屬熱痛當用涼藥清之清之不已而或繞臍硬痛大便結實煩渴屬燥糞痛急用寒藥下之若食積痛者同治若小腹硬痛小水自利大便黑身目黃者屬蓄血痛亦用寒劑加行血藥下盡黑物則愈此三者皆痛隨利減之法也若飲水痛甚者屬寒當用溫藥和之和之不已而成四肢厥冷腹痛嘔吐瀉利急用溫藥投之須察脈來有力無力此為良法一傷寒直中陰經真寒證甚重而無脈或吐瀉脫元氣而無脈將好酒薑汁各半盞與病人服之其脈來者可治當察其陰用藥不拘脈之浮沉大小但指下出見者生如用此法脈不至者必死又當問病人身有痛處要知痛甚者脈必伏不為凶如無痛證用此法而脈不至者凶又問病人平素原有出部位之脈當覆手取之有脈者無事若原不出部今覆取而有之亦為陰陽之錯亂也宜和陰陽正取覆取俱無脈者必死一傷寒舌上生胎不拘滑白黃黑俱用井水浸青布片於舌上洗淨後用生薑片子時時浸水刮之其胎自退凡見舌上黑胎芒刺者必死此熱毒入深腎水克心火也此謂腎水克心火恐誤也既云熱毒入深或腎水不能制火邪也若發黃者用生薑時時周身擦之其黃自退若心胸脅下有邪氣結實滿悶硬痛又法用生薑一斤搗渣去汁炒微燥帶潤用絹包於患處疑疑尉之稍可又將渣和勻前汁炒乾再尉良久豁然寬快一傷寒鼻衄成流久不止者將山梔炒黑色為細末吹入鼻內外將水濕草紙搭於鼻沖其血自止若滴點不成流者其邪在經未解照後祕方用藥不在此法一傷寒熱邪傳裡服藥後用鹽炒麩皮一升將絹包於病人腹上款款尉之使藥氣得熱則行大便易通矣一傷寒吐血不止用韭汁磨京墨呷之其血見黑必止如無韭汁用雞子清亦可正謂赤屬火而黑屬水也故有相制之理焉一傷寒直中陰經真寒證或陰毒證身如被杖腹中絞痛嘔逆沉重不知人事四體冷如冰石指甲唇青藥不得入口六脈沉細或無脈欲絶者將蔥束縛一握切去根葉留白三寸許搗如餅先將麝香半分填於臍中後加蔥餅於上以火尉之爛則易之換二三餅稍醒灌入生薑汁煎服回陽救急湯如不醒再灸關元穴氣海穴二三十壯使熱氣通其內邪氣出於外以回陽氣於至陰之中用此法手足溫和汗出即醒者為有生也如用此法手足不溫汗不出不省人事者必死也一傷寒熱病熱邪傳裡亢極無解用黃連煎水一盞放井中頓冷浸青布搭於胸上稍熱則易之待熱勢稍退則除不可久漬夏用此法冬不宜用一傷寒服藥吐出不納者隨用竹管重捺內關後將生薑自然汁半盞熱飲其吐即止大凡服寒藥熱飲服熱藥寒飲中和之劑溫和服之如要取汗雖辛甘之劑亦宜熱服如要止汗雖辛甘溫劑亦宜溫服一中風痰厥昏迷卒倒不省人事欲絶者先用皂莢末捻紙燒煙衝入鼻中有嚏可治隨用吐痰法將皂莢末五分半夏白礬各三分為細末薑汁調服探吐後服導痰湯加減治之無嚏者不可治一治乾霍亂不得吐者用滾湯一碗入皂莢末三分鹽一撮調服探吐莫與米湯設與即死是穀氣反助邪氣也一中寒卒倒昏迷不省者先用熱酒薑汁各半盞灌下稍省後服加味理中飲為效如不飲酒者只用薑汁灌之依法調治此證臘月甚有之余月幾希矣一傷寒若兼十餘日以上尚有表證宜汗者羌活沖和湯微汗之十餘日若有里證宜下者可與大柴胡湯下之蓋傷寒過經正氣多虛恐麻黃承氣其湯太峻誤用麻黃令人亡陽誤用承氣令人不禁故有此戒若表證尚未除而里證又急不得不下者只得以大柴胡湯通表裡而緩治之又老弱及氣血兩虛之人有下證者亦用大柴胡下之不傷元氣如其年盛氣壯者不在禁例當隨酌宜而治之傷寒死候凡看傷寒要識死證死脈親切一一理會免致臨病疑惑但見死證須以脈參之如果不治切莫下藥倘有銼失咎將誰歸汗後熱退脈靜者瘥陰陽諸證脈平吉陽證見陰脈者死陰陽毒過六七日者不治脈浮而滑身汗如油喘息不休水漿不入身體不仁乍靜乍喘者死傷寒咳逆上氣脈散者凶陽反獨留體如煙燻直視搖頭心先絶也汗後發潤喘不休者肺先絶唇吻反青四肢濈濈汗出肝氣先絶也環口黎黑虛汗發黃脾氣絶三部緊盛大汗出不解者死陰陽尺寸俱虛熱不止者死身熱喘粗見陽脈而躁者死汗後微熱不解未可言死如轉索者即日死也譫語微熱脈浮大手足溫欲汗出脈暴出者死陰衰欲絶而陽暴獨勝則脈出一曰陰氣先絶陽氣後竭死逆冷脈沉細者一日死赤斑者五死五生黑斑者十死一生兩感傷寒者死大發濕家汗則成痓又曰熱而痓者死發少陽汗則譫語發少陰汗則動血者死名下厥上竭發動氣汗者死發風溫汗者死汗後為愈今汗不為汗衰謂之陰陽交交者死不得汗者死發熱脈躁疾狂言不能食謂之三死咳逆不止者死臟結者死結胸證而舌上有白胎者是也厥陰舌卷囊縮者死脈代者死少陰吐利煩躁四逆者死結胸證悉具煩躁者死發厥至七八日膚冷而躁無時暫安者曰臟厥不治陰陽頭痛重眼花四肢拘急小腹絞痛手足攣者死厥而下利當不能食者曰除中不治少陰病厥逆無脈與白通豬膽湯脈暴出者死微續者生若病人寒熱而厥面色不澤冒昧兩手忽無脈或一手無脈必是正汗出多用綿被蓋覆包手足溫暖急投五味子湯服之晬時必大汗而解矣投藥無汗脈不至者死死者雖多凡至危極處皆是死也傷寒刺灸保命集傷寒三陽頭痛何法刺之答曰手之三陽足之三陽皆會於頭者謂諸陽之會其受邪伏留而不去故曰三陽頭痛視其色脈知在何經如脈浮而緊過在足太陽宜刺腕骨火京骨水如脈浮而長過在手陽明宜刺合谷衝陽土脈浮而弦過在手足少陽宜刺陽池丘虛風府風池傷寒邪在三陰內不得通以為腹痛手足三陰皆會於腹如脈弦而腹痛過在足厥陰肝經手太陰肺經宜刺太衝木太淵金太陵如脈沉而腹痛過在足少陰腎經手厥陰心包絡經宜刺太溪大陵脈沉細而腹痛過在足太陰脾經手太陰心經宜刺太白神門三陰交傷寒下後結胸痞氣者足三陰之終手三陰之始胸中結痞過在少陰腎經手厥陰包絡宜刺兩經之井原以瀉胸中之氣如心中結痞過在足太陰脾經手少陰心經宜刺兩經之井原以瀉心中之氣胃中痞結過在足厥陰肝經手太陰肺經宜刺兩經之井原以瀉胃中之氣或上中下三脘應痞結而瀉之灸法惟直中陰經真寒證四肢厥冷腹痛唇青指甲青下利清俱宜灸氣海關元二穴在臍下隨灸其一穴陽氣回止其餘三陽證候俱不宜灸傷寒諸證所屬頭痛項強太陽頭搖里痛頭汗瘀血在裡獨頭面搖痓病額汗風溫面戴陽面赤色下虛也面怫鬱表未解面慘不光傷寒面光不慘中風面乍黑乍白乍赤狐惑面斑斑如錦紋陽毒面垢中暑又肝病目痛陽明目睛黑小腸熱目中生花陰易目中不了了邪氣勝有內實睛不和內未解目直視不能瞬將發衄欲汗解目脈赤將痊耳聾少陽鼻乾陽明鼻中燥必衄鼻如煙煤陽毒熱極鼻鼾風溫口苦少陽口禁痓病口燥少陰口難言榮不足口破唇赤應下而反汗熱上行也唇瘡狐惑舌黑熱極懊憹胃虛聞食氣胃虛叉手摸心汗多虛故也耳必聾喜忘如狂蓄血漱水不欲咽必作衄筋跳肉瞤汗下虛也灑然毛聳惡寒溫暑身痛如被杖陰毒一身盡痛風濕身微腫風濕身重多睡風濕身黃小水不利熱鬱身上如蟲行表虛身癢陽虛汗未盡背惡寒陰勝陽腹脹氣不和飢不能食邪在胸中多眠神倦風濕不眠神虛蜷臥內寒手足溫可治逆冷者不可治也手足瘛瘲痓病搐搦也坐而伏短氣也下利清穀內寒腸垢熱也鴨溏寒也咽中瘡上實下虛怔忡即心下悸汗多或水逆而然咽痛少陰譫語邪氣盛而神識昏舌上芒刺熱結甚也聲啞狐惑鄭聲精氣奪而神不全咽乾腎虛燥不可汗咳逆水寒相搏傷寒藥方傷寒藥方評評麻黃桂枝二湯活人書云服麻黃湯發煩目眩者必衄服桂枝湯吐者其後必吐膿血頭痛發熱無汗惡風宜麻黃湯是應解表而用麻黃者頭疼發熱汗出惡風宜桂枝湯是應解散而用桂枝者二者均為解散正分輕重不可不察也仲景云無汗不得服桂枝有汗不得服麻黃古人有汗者當解肌無汗者當發汗是太陽一經尚有差別又況不分陰陽而用藥乎當汗而下即死當下而汗亦死所以云桂枝下咽陽盛則斃謂當下而反汗也陽盛者內熱而邪在裡故當下也設投桂枝發汗是陽盛即斃也承氣入胃陰盛乃亡謂當汗而反下也陰盛者惡寒而邪在表故當汗也誤投承氣攻下是陰盛而亡也可見麻黃桂枝承氣者死生之系業醫者可不慎哉評桂枝石膏湯傷寒三四日外服諸湯不瘥身熱脈數邪氣猶在經絡未入臟腑者桂枝石膏湯主之此方夏至後可代桂枝湯用若加麻黃可代麻黃湯青龍湯用有汗脈緩為桂枝證無汗脈緊為麻黃青龍證評白虎湯證治論云白虎湯性涼惟夏至後用之謂如土地七八月猶熱處有壯熱為病相度尚可用白虎湯服之自然汗解然白虎湯用石膏故亦治傷寒不專於治暍也或問曰夏月若果見麻黃桂枝證亦豈得不用而固用白虎湯也曰此説尤妙但臨時看證用之假如虛弱人老人不可用白虎也蓋白虎性涼若下利腹痛者勿服當改服小柴胡湯或問夏至後皆可用白虎湯耶答曰白虎治中暍並汗後一解表藥耳非正傷寒藥也今之醫者見六月中病多雲中暍不辨熱病用藥太涼況夏月陰氣在內尤宜戒之證治論云白虎亦治傷寒不專治暍活人書云白虎治中暑並汗後一解表藥耳其二説雖頗異大抵隨時審證當用即用不可執一説也評小柴胡湯傷寒五六日嘔而發熱者小柴胡湯證具卻以他藥下之柴胡證仍在者復以小柴胡湯與之此雖已下不為逆若得小柴胡湯必蒸蒸而振發熱汗出而解難為汗下者必用小柴胡故又名三禁湯今見傷寒多用小柴胡不問陰陽表裡皆與之豈不為害也不知小柴為少陽表裡和解之藥惟嘔噁心寒熱怕風惡寒在表親切傷寒但嘔便屬少陽止用小柴胡湯和解蓋少陽邪未入里而在表裡之間是邪欲入胃氣充而不納故嘔出若邪稍入里氣未和當用大柴胡湯微下之自然熱退身涼何有壞證若只邪在皮膚惡寒熱作脈浮而促則當解表用九味羌活湯所以有謂解表未開不得攻裡表氣尚存攻之為逆評大柴胡湯或問傷寒有表復有里證用大柴胡湯之緩劑下之何如答曰大柴胡湯傷寒下藥與三承氣湯之次也其間應下尚有表證多或虛弱易動者宜用大柴胡湯緩方為至穩若血虛人更加當歸虛弱用之穩為其有人參甘草和中故也傷寒發熱汗出不解心下痞硬嘔吐而利非大柴胡湯不可也此非是有陽明嘔吐又非霍亂吐利謂之太陽大柴胡證也故緩以下之為穩也評三承氣湯或問曰承氣湯既有三等之殊治之必有淺深緩急次第可得聞乎曰太陽傳於陽明者自表之裡無形傳至有形故用大承氣湯急下之以其硝黃猛烈故也少陽傳於陽明為逆傳來者陽明居太少之中故從乎中治宜小承氣湯之緩也若夫正陽陽明為本經傳於有形故用調胃承氣湯之緩劑無太少二氣之傳故不用厚朴枳實燥藥所謂有緩急次第之用者此也大承氣湯下藥之最急者大柴胡湯下藥之最緩者調胃承氣湯急之次者小承氣湯緩之次者春甫按大承氣湯治三焦俱實否滿燥堅全故用厚朴枳實苦寒瀉滿芒硝咸以除堅大黃之苦以瀉實熱此為胃實不大便發熱狂言譫語三焦俱實而用之者也小承氣湯治上焦積熱而成否實以厚朴枳實去痞大黃瀉實熱不用芒硝則不傷下焦血分之真陰此為上焦實熱而用之者也調胃承氣湯治邪在中焦則有燥實堅三證故用甘草調胃和中芒硝潤燥大黃瀉實不用朴實以傷上焦之元氣也桃仁承氣湯治中焦於血積熱經曰中焦如漚血之源也中焦熱甚則血瘀凝故有腹痛不可接又有譫語則以調胃承氣加桃仁肉桂以破之亦不用朴實以傷上焦此則諸承氣因證立方而不容以不易名也上文謂無形有形緩急次第惟見其大略焉耳豈若直以三焦證治而論不亦深切著明也哉傷寒論潮熱條云設當行大承氣湯亦須先與小承氣湯不轉矢氣者不可攻也仲景云陽明病不大便六七日恐有燥糞欲行攻法少與小承氣湯腹中轉矢氣者此有燥糞也乃可以大承氣攻之若不轉矢者此先硬後溏也切不可攻之攻之必腹脹不能食也凡傷寒攻熱邪皆用湯液滌蕩熱積不可用圓子藥攻不可不知也評大青龍湯大青龍湯治病與麻黃湯證相似但病尤重而又加煩躁者用大青龍湯也以其中風並傷寒俱盛故青龍湯添麻黃合桂枝湯藥味在內更加百膏所以為緊此治榮衛俱病者也大抵感外風者為傷風感寒冷者為傷寒故風則傷榮寒則傷衛桂枝主傷衛麻黃主傷榮故大青龍主榮衛俱傷者此也李先知云脈緩有汗為桂枝湯證脈緊不煩為麻黃湯證大青龍湯證脈似桂枝反無汗似麻黃反煩躁是也若不審證誤用青龍發汗傷人多矣故仲景云脈微弱汗出惡風者不可服青龍服之則厥逆筋惕肉瞤此為逆也宜服真武湯仲景特設此藥以救之評十棗湯十棗湯治身涼乾嘔短氣筋痛者當行須是表證已罷方可用之表未解者不可行也以其藥性太猛切戒輕用里有水證條云身涼表證罷咳而脅下痛者十棗湯痞證條云脅下痛乾嘔短氣身涼不惡寒汗出無表證者十棗湯乾嘔證條云身涼汗出乾嘔脅痛不惡寒此表證已解里未和也十棗湯主之可見十棗湯非敢輕用必審表證罷惟身涼脅痛乾嘔有水氣而里未和者方用之以棗十枚為君消水藥不過一錢不敢輕用可知矣評九味羌活湯易老九味羌活湯為解利兩感傷寒而設經曰兩感於寒者死不治以其一日太陽與少陰俱病則頭痛口乾而煩滿二日陽明與太陰俱病則腹滿身熱不欲食譫語三日少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人此為臟腑俱虛內外俱病欲表之則有里欲下之則有表故云兩感者不治然所感有淺深虛實之異虛而感之深者必死實而感之淺者猶或可治故易老有九味羌活湯之制也其黃芩生地為裡熱之藥羌活細辛為解表之藥亦和平表里之輕劑耳然非正傷寒之主藥也陶氏謂其可代麻黃桂枝青龍三方之用噫亦過矣但用之於傷風見寒傷寒見風頭身疼痛惡寒發熱而兼有里證者宜用之大抵終是輕劑若果當發汗必用麻黃而羌活防風豈可比也若表虛有汗則用桂枝若有汗而煩必用青龍羌活豈可代也非即病正傷寒而九味羌活用於春秋之時比之麻黃青龍則又穩也知者審諸評九味羌活湯易老九味羌活湯為解利兩感傷寒而設經曰兩感於寒者死不治以其一日太陽與少陰俱病則頭痛口乾而煩滿二日陽明與太陰俱病則腹滿身熱不欲食譫語三日少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人此為臟腑俱虛內外俱病欲表之則有里欲下之則有表故云兩感者不治然所感有淺深虛實之異虛而感之深者必死實而感之淺者猶或可治故易老有九味羌活湯之制也其黃芩生地為裡熱之藥羌活細辛為解表之藥亦和平表里之輕劑耳然非正傷寒之主藥也陶氏謂其可代麻黃桂枝青龍三方之用噫亦過矣但用之於傷風見寒傷寒見風頭身疼痛惡寒發熱而兼有里證者宜用之大抵終是輕劑若果當發汗必用麻黃而羌活防風豈可比也若表虛有汗則用桂枝若有汗而煩必用青龍羌活豈可代也非即病正傷寒而九味羌活用於春秋之時比之麻黃青龍則又穩也知者審諸六法方鈔六法者汗吐下利溫和也治法蓋不出此六字之外傷寒並雜病知此六法其庶乎得仲景丹溪之旨也汗法桂枝湯麻黃湯雙解散升麻湯參蘇飲香蘇飲小柴胡湯余法加連須蔥桃葉蒸法出汗凡邪之在表者宜汗之而愈吐法梔子豉湯大瓜蒂散人參蘆鹽湯余法加三山丸合解毒散煎凡病之在胸膈者宜吐之下法小承氣湯大承氣湯調胃承氣湯濬川散舟車丸破棺丹余法加牽牛丸甘遂末凡病之在裡而邪實於腸胃者宜下之利法五苓散天水散余法用田螺麝香敷臍凡患小便赤澀陰陽不分者利之而愈溫法理中湯五積散四逆湯薑附湯三建湯余法用硫黃丸燒酒煎服凡病陰證虛寒脈沉遲者必溫之和法小柴胡湯建中湯凡病非表非里不寒不熱不可汗下者宜和之傷寒藥制煎煮法製藥法傷寒門藥之最要者莫如麻黃大黃附子茱萸之屬其製法不比泛常是故不可不附於後也麻黃去節先以滾醋湯略泡片時撈起放干備用庶免太發如冬月嚴寒腠理致密當生用不必制大黃須錦紋者佳切片用酒拌勻燥干備用不傷陰血如年壯人實熱者生用不必制附子頂正圓平大者佳去皮臍先用鹽水薑汁各半盞用砂鍋煮五七沸後入黃連甘草各半兩再加童便半盞煮七八沸住火良久撈起瓷器盛貯伏地氣一晝夜取出曬乾備用庶無毒茱萸用半熟鹽湯泡片時炒燥備用庶無小毒豬膚傷寒咽痛下利而煩者用之和蜜粉煮羹本草中未載今人用之不審通用厚皮而尚連肉在上者有之若帶肉於上則反作殃所謂膚者惟削薄皮面一層而已其皮肉之皮亦不可用方為膚也甘瀾水取水一斗置大盆內以杓揚之上有水砂數千顆相聚一團取用之潦水行潦之水取其急流而有聲亦通達之義也大青要莖葉兼用飴糖即米與麥共熬者如蜜樣佳解藥法傷寒治法無非汗下溫涼有汗之而不止者即用麻黃而不得其法也有下之而不止者即用大黃之不得其法也有溫之而至燥熱者用附子之不得其法也凡犯此者必知其解救之法庶可矣用麻黃後汗出不止者將病人頭髮披水盆中足露出外用炒糯米半升龍骨牡蠣防風各一兩研為細末周身撲之隨後祕方用藥免致亡陽之禍用大黃後瀉泄不止者以烏梅二個炒粳米一撮乾薑三錢人參白朮炒各半兩生附皮一錢甘草一錢升麻少許燈心一握水煎去渣入炒陳壁土一撮調服即止土氣以助胃氣也用附子後身自紅者乃附毒也用蘿蔔搗水二盞入黃連甘草各半兩煎至八分去渣入犀角磨汁三錢飲之解其附毒紅即退而愈每見不知解法遲延既久耳目口鼻出血而死如無蘿蔔汁用子研汁無子用地漿水澄清用煎藥法凡煎藥者必以主治為君先煎一二沸後入諸藥且如用發汗藥先煎麻黃一二沸後入衆藥同煎用止汗藥先煎桂枝用和解藥先煎柴胡用下藥先煎滾水入枳實用溫藥先煎乾薑用血藥先煎當歸用破血藥先煎桃仁用利水藥先煎豬苓用止瀉藥先煎白朮用止渴藥先煎栝蔞根用止腹痛藥先煎芍藥用退黃藥先煎茵陳用化斑藥先煎石膏用止嘔吐藥先煎半夏用勞傷藥先煎黃耆用解藥先煎羌活用消暑藥先煎香需用痓藥先煎防風用濕藥先煎蒼朮
