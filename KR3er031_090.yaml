body:
  text: 卷之九十幼幼彙集下陰腫疝氣第十六病機小兒陰腫者足少陰為腎之經其氣下通於陰或有少陰之經虛而受風邪者氣衝於陰氣與血搏結則陰腫也然兒有大小壯弱起止中節可也苟腎氣虛或坐石不起冷氣凝之或近地經久風邪濕氣傷之不為陰腫幾希矣間有啼叫怒氣閉擊於下結聚不散加以水竇不行亦能發為此疾治法小兒外腎腫大宜牡蠣不拘多少研極細以津唾塗腫處敷蠣於其上或雞子清調塗亦佳又有疝氣名偏墜腫大蓋小兒生下如此者不疼痛不須攻擊不治自愈若腫痛甚則急服藥宜五苓散青木香丸並疏氣藥服之濟生方用牡丹皮防風為末酒調服極效五苓散內加防風牡丹皮亦效熱者三黃丸服藥方勻氣散治嬰兒調補通利後及冷疝腹痛氣滯不和桔梗一兩炒陳皮去白半兩砂仁茴香各二錢白薑炮錢半甘草炙二錢上為細末滾白湯調下冷疝腹痛燒鹽湯下食前服烏梅散治嬰兒腹痛初生臍下冷痛疝氣烏梅一個去核延胡索甘草半生半炙各二錢半乳香沒藥鉤藤各一錢半上咀水煎食前服金茱丸治嬰兒冷疝氣痛及脬囊浮腫金鈴子肉半兩吳茱萸二錢半上末酒煮糊丸黍米大食前鹽湯下二七丸青木香丸寬中快膈腹痛心下堅痞腸中水聲及陰腫黑豆炒一兩半木香破故紙炒蓽澄茄檳榔各四錢上先將檳榔粟飯包濕紙包裹煨焦去飯用檳榔同前藥為末滴水丸緑豆大每服十丸空心白湯下敷藥方治小兒外腎腫大光明牡蠣灰二錢乾地龍一錢為末津唾調塗熱者雞子清調蟬蛻散治小兒陰腫或坐濕地或風寒或蟲蚓吹者用蟬蛻半兩水二碗煎湯洗腫處則消再溫再洗又服五苓燈芯湯則愈又方用蔥園內蚓泥甘草湯調敷腫上亦消腫止痛地龍膏治小兒疝氣腫痛及陰瘡先以蔥椒湯洗次用地龍末雞子清調敷又方研桃仁泥唾調敷盤腸氣第十七病機治法小兒盤腸氣者痛則腰曲乾啼額上有汗是小腸為冷氣所搏然耳其證口閉腳冷上唇乾者是也此是生下洗遲感受風冷或大便青色不實宜服鉤藤膏魏香散蘇合香丸當歸散乳母服烏沉湯或沉香降氣湯藥方乳香散治盤腸氣凡有此證急煎蔥湯淋洗其腹揉其蔥尉臍腹間良久尿自湧出其疼自止服此藥乳香沒藥各等分為末木香湯調下或煎數沸亦可當歸散凡小兒夜啼者寒而腹痛也面青手冷不吃乳者是盤腸氣也宜服之當歸芍藥人參各一錢炙甘草五分桔梗陳皮各一錢上未每服二錢水煎有熱痛啼哭不止面赤唇焦小水黃宜三黃丸人參湯下鉤藤膏方見天釣門諸汗門第十八病機夫汗者心之所藏在內為血發外者為汗蓋汗乃心之液故人之氣血平則寧偏則病經云陰虛陽必輳則發熱而自汗陽虛而陰必乘則發厥而自汗皆由陰陽偏勝而致也小兒氣血嫩弱膚腠未密若厚衣太暖臟腑生熱搏心為邪所勝津液不能內藏蒸出肌膚而為汗也又或傷於冷熱陰陽不和津液發泄亦令睡中汗出其有虛者諸病後汗出多血氣弱潮熱自汗或寒熱發過之後身涼自汗日久令兒黃瘦失治則變骨蒸疳癆是也盜汗乃熟睡時溱溱然汗以覺則止而不復出矣是亦心虛宜斂心氣益腎水使陰陽調和水火升降其汗自止錢氏云上至頭下至項謂之六陽虛汗不須治之治法錢氏云小兒睡而自汗出者肌肉虛也止汗散主之遍身汗出者香瓜丸主之上至胸下至臍此胃虛也當補脾益黃散主之有實證自汗外因感冒風邪發熱無間昏醒浸浸汗出或厚衣臥而額汗出也當救表解肌用百解散止汗散主之小見無疾但睡中汗出如水覺而經久不幹此名積證盜汗脾冷所致宜三稜散次益黃散主之有時時冷汗漸出髮根如貫珠面額上濈濈然此為驚汗宜鎮驚丸琥珀抱龍丸及茯苓湯加麻黃根取效有病困睡寐中而身體汗流此因陽虛所致久不已令人瘦瘠心氣不足津液妄出故也用茯神湯加黃耆主之藥方團參湯治小兒虛汗或心血液盛亦發為汗此藥收斂心氣揀人參川當歸各三錢咀用豬心一枚切三片每服二錢豬心一片井水二盞煎六七分食前作二次服撲汗方黃連牡蠣粉貝母各二兩米粉一升敷上為細末以絹囊盛撲牡蠣散治血虛自汗或病後暴虛津液不固自汗牡蠣二兩黃耆生地黃各一兩上末每服二錢或加小麥煎止汗散治小兒睡汗用故蒲扇燒灰撲身上如無扇故蒲亦可通神丸治小兒夜間通身多汗草龍膽不拘多少為末醋糊丸緑豆大每服五七丸米飲下又方治睡中汗出用酸棗仁人參茯苓各等分為末每服二錢食前米飲調服諸淋候第十九病機小兒諸淋者腎與膀胱也膀胱與腎為表裡俱主水水入小腸下於胞行於陰為小便也膀胱津液內郁水道不通停積於胞熱則澀故令水道不利小便淋瀝故謂之淋其狀小便出少小腹急痛引臍是也有石淋氣淋血淋名雖有五總屬於熱治法治淋之法金沙散立效五苓散木通散八正散導赤散等劑服之亦與大方脈相參用藥藥方葵子散治小兒諸淋小便不通葵子車前子木通瞿麥赤伏苓桑白皮梔子甘草炙各等分上咀每服二錢蔥白二寸煎乳食前服八正散治心經蘊熱遺於小腸口燥咽乾五淋之證方見大人門導赤散治小兒血淋方見熱門冬葵子散治小兒小腹急悶小便淋漓冬葵子一兩木通半兩為末每服二錢燈芯一束煎服車前子散治小水不利茯苓豬苓香薷車前子人參各等分上末每服二錢燈芯湯下尿血方生蒲黃生地黃赤茯苓甘草各等分上咀每服一錢煎調發灰食前服金沙散治小便淋瀝不通鬱金海金沙滑石甘草各等分上末每服二錢煎木通燈芯湯下或冬瓜湯下亦可局方五淋散治諸淋小便血尿如豆汁如膏方見大人門白濁門第二十病機小兒尿白者由乳母乳哺失節過傷於脾故使清濁不分而尿白如米泔也久則成疳亦心膈伏熱而得之宜實脾土消食化積通利小便也茯苓散三稜散分清飲子可選而用之藥方茯苓散治小兒尿白狀如米泔三稜莪朮砂仁赤茯苓各半兩青皮陳皮滑石甘草各二錢半上為末每服一錢麥門冬湯調下或加燈芯煎三稜散治小兒尿白久而成疳此藥實脾土消食化疳積三稜炮莪朮炮各一兩益智仁甘草炙神麯炒麥芽炒陳皮各半兩上末每服二錢燈芯湯調下分清飲通心氣補漏精治小便余溺赤白濁益智仁川萆薢石菖蒲烏藥各等分上咀每服二錢燈芯煎可加茯苓白芍各等分遺尿門第二十一病機小兒遺尿者此由膀胱有冷不能約於水故也夫腎主水腎氣下通於陰小便者津液之餘也膀胱為津液之府腎與膀胱俱虛而冷氣乘之衰弱故不能約制其水出而不禁故遺尿也又有尿床者亦由膀胱冷夜屬陰小便不禁胞里自出謂之尿床也宜破故紙散益智仁散雞腸散服藥方雞腸散治小兒遺尿床雞腸牡蠣白茯苓肉桂龍骨各二錢半桑螵蛸炒各半兩為末每服二錢薑黃湯調服雞䏶胵散治小兒遺尿雞䏶胵一具雞腸燒豬胞炙焦上為末每用一錢酒調服男雌女雄又方破故紙一兩炒為末每服一錢熱湯下一方益智仁白茯苓等分為末每服一錢空心米湯下一方五倍子半生半炒為末米糕丸空心白湯下一錢大小便不通候第二十二病機小兒大便不通者乃是肺家有熱在裡流入大腸以致祕結不通乃實熱也當以四順清涼飲加柴胡或神芎丸大柴胡湯以流利之小便不通者皆因心經不順或伏熱或驚起心火上炎不能降濟腎水不上升故使心經愈熱而小腸與心合所以小便不通也宜木通散主之甚者八正散服之小便不通臍腹妨悶心神煩熱宜梔子散主之又有傷寒體熱頭目昏沉不思飲食夾驚夾食寒熱大小便皆閉澀不通煩躁作渴冷汗妄流變積傷滯膈滿脹急青黃體瘦日夜大熱及傷風傷暑驚癇客忤筋骨腎臟疳氣等熱大小便不通者並宜脫甲散大連翹飲加大黃神芎丸皆可服之小兒驚風積熱大小便閉澀用掩臍法以連須蔥不洗帶土生薑塊淡豉二十一粒鹽二匙同研爛作餅䂪子烘熱掩臍中以綿條札定良久氣通自利不然再換一劑如不通服藥藥方木通湯治小兒小便不通木通滑石各一兩黑豆炒半兩上咀燈芯蔥白煎服量大小以意加減梔子仁散治小兒小便不通臍腹妨悶心神煩躁梔子五枚茅根冬葵子各半兩甘草上咀每服二錢不拘時煎服掩臍法海獅四十九個黑豆七粒蔥根七個鹽少許上爛搗細作餅烘熱著於臍上八正散方見淋門便血臟毒第二十三病機論曰小兒初生七日內大小便有血出者此由胎氣熱盛所致也母食酒面炙爆熱物流入心肺兒在胎內稟受熱毒亦傳心肺且女子熱入於心故小便有之男子熱入於肺故大腸有之血出淡淡有水胚紅色盛則其血鮮凡有此證不可以他藥只以生地黃取自然汁入蜜少許和勻溫服自愈男女皆效甘露飲兼服茅根及茅花湯煎濃服亦好犀角地黃湯可服臟毒聚金丸地黃丸主之瘀血桃仁承氣湯主之藥方甘露飲治小兒胃中客熱牙宣口氣齒齦腫爛時出膿血或肌煩不欲飲食及赤目腫痛不住涼藥口舌生瘡咽喉腫痛及治身面皆黃肢體腫大便不調小便澀黃並治熟地黃麥門冬去心枳殼炒甘草炙茵陳枇杷葉拭去毛石斛黃芩生地黃天門冬去心各等分上咀每服二錢水煎食後服聚金丸治大便下血發熱煩躁腹中熱痛作渴脈來弦數或驚熱目赤昏澀或有酒毒去血並治之黃連一兩水浸曬乾一兩炒一兩泡一兩生用黃芩防風各一兩上末麵糊丸緑豆大每服五十丸白湯下千金地黃丸治心熱腸風臟毒去血生地黃半斤研取汁連渣二味拌勻曬乾黃連四兩上未煉蜜丸緑豆大每服二十丸食後麥門冬湯下脫肛痔證候第二十四病機小兒蛻肛者皆因久患瀉痢得之大腸頭自糞門出宜用蔥湯熏洗令軟送上先服止瀉藥然後服槐角等藥又用五倍子煎湯入明礬末熏洗而縮上有兼痔證腫痛此為乳母所傷厚味爆煿感之而得者治法宜用丹石散勝雪膏等塗之腫處甚佳服黃連解毒湯苦參湯洗又用防風荊芥等煎湯洗或用密陀僧白礬冰片末敷上亦妙又用萆麻子研成膏貼頂上腸即入急洗萆麻子去之及用苦參湯洗亦效凡腸頭作癢即有蟲可用生艾川楝根煎湯熏洗藥方龍骨散治嬰兒大腸虛肛門脫出龍骨二錢半訶子肉煨沒石子二枚赤石脂罌粟殼去筋醋炒各二錢為末米飲調化食前服澀腸散治小兒久痢大腸頭脫出不收訶子肉煨赤石脂龍骨各等分為末茶少許和藥摻腸頭上以帛揉入治痢木通湯調下丹石散治外痔如神黃丹滑石各等分為末新汲水調塗日上五次勝雪膏治墜腸翻花等痔熱痛不可忍或已成瘡者並治腦子鉛霜各少許以好醋研成膏塗之愈苦參湯治脫肛並痔枳殼黃連大黃甘草荊芥苦參芍藥黃芩各等分上咀每劑半兩車前子茅草同煎熏洗灸法小兒脫肛灸百會穴在頂心旋毛間灸三炷如小麥大立止五軟五硬候第二十五病機五軟證名曰胎怯良由父精不足母血氣衰而得有因母血氣弱而孕者有受胎而母多疾者或其父母貪色體氣虛弱或年紀已邁而復見子有日月不足而生者或服墜胎之劑不去而竟成胎者耗傷真氣及降生之後精氣不充筋骨痿弱肌肉虛瘦神色昏慢致使頭項手足身體軟弱名為五軟歌曰稟氣元虛髓不充六淫之氣易來攻頭兼手足身羸弱此證名為五軟同五硬證頭哽不能俯視氣壅胸膈手足心冷如冰而硬名曰五硬又有肚大青筋而不寬宜去積之劑心腹硬者亦是藥方瀉青丸治五軟五硬方見前貼項散貼五軟附子制南星制各二錢為末薑汁調攤貼患處五加皮散治項軟三歲不能行五加皮為末酒調敷頭骨上以酒服治行遲虎骨丸治腳軟行遲虎脛骨酥炙生地黃酸棗仁茯苓防風川芎牛膝肉桂各等分上為末煉蜜丸如麻子大每服十丸酒送下或木瓜湯下牛膝散治小兒三歲不能行五加皮六錢牛膝木瓜半兩上為末每服一錢米飲調次入酒二三滴服白虎證第二十六病機小兒有白虎一病不可不察據統天曆遊年圖云白虎在太歲前一辰也假如太歲在巳則為白虎在辰太歲在申則白虎在未余仿此其神所值之方小兒不知禁忌出入居處稍有觸冒便能為病其狀身微熱有時少冷啼叫屈指為數物手足不瘛瘲是也藥方集香散治白虎病絳真香沉香乳香檀香安息香人參茯神甘草炙酸棗仁各等分上咀水煎麝一字調入不拘時服藥渣房內燒鬾病證第二十七病機鬾小鬼也小兒所以有鬾病因其母未及周年即有胎孕小兒乳之故曰鬾病其證令兒寒熱黃瘦骨空發落日漸羸瘦是也治法速與斷其乳溫平胃氣調和血脈自然而愈藥方龍膽湯治小兒鬾病龍膽草鉤藤柴胡桔梗芍藥川芎茯苓甘草炙各一錢人參五分大黃蒸錢半上咀每服二錢用井水煎食前服仍夜用紅紗袋盛夜明砂與佩之吉龜胸龜背證第二十八病機胸高腫突其狀如龜此肺受邪喘久所致亦有乳母多食五辛有感於兒背高傴僂此為風寒客入脊骨或坐早而然多成痼疾間有灼艾收功藥方百合丹治小兒龜胸高起百合天門冬杏仁木通桑白皮甜葶藶炒石膏大黃三分焙上末煉蜜丸緑豆大每服五丸食後臨臥熟水化下枳殼防風丸治客風入背而高聳枳殼防風獨活前胡麻黃當歸大黃煨各一錢上為末麵糊丸黍米大食後米飲下灸法肺俞膈俞小兒中指中節灸艾如小麥炷三壯治龜背語遲候第二十九病機保幼須知云言心之聲也小兒在胎時其母卒有驚怖邪氣乘心故兒感受母氣心宮不守舌本不通四五歲而不能言者菖蒲丸藥方菖蒲丸石菖蒲人參麥門冬遠志當歸川芎各三錢乳香硃砂各二錢上為末煉蜜丸麻子大每服十丸粳米飲下齒遲候第三十病機聶氏云稟受腎氣不足者則齒生而遲齒乃骨之餘骨乃腎之候腎不足故骨不長而齒生遲也藥方芎黃散治齒遲川芎半兩當歸白芍藥生地黃山藥炙甘草各二錢上未白湯調以末摻齒根行遲候第三十一病機聶氏云兒生至周歲三百六十日膝骨成乃能行也近世小兒多因父母氣血虛弱故胎氣不強骨髓軟弱故不能行也藥方五加皮散治行遲腳軟五加皮川牛膝宣木瓜各等分為細末上米飲調服入酒一二滴虎骨丸小兒骨弱不能行者方見前鶴膝候第三十二病機小兒稟受不足氣血不充故肌肉瘦薄骨節呈露狀如鶴膝抑亦腎虛得之腎虛則精髓內耗膚革不榮易為邪氣所襲日就枯悴其殆鶴膝之節乎藥方加味地黃丸治小兒鶴膝熟地黃煮爛搗四兩山茱萸肉山藥各二兩澤瀉一兩牡丹皮白茯苓各半兩鹿茸酥炙牛膝各二錢上為末麵糊丸如黍米大三歲兒以上與十五丸發斑候第三十三病機小兒發斑有二有溫毒發斑有胃爛發斑溫毒發斑者冬月溫暖人感乖戾之氣未即病至春或被積寒所折毒氣不能泄至天氣暄熱溫毒始發則肌肉斑爛疹如錦紋治法用葛根橘皮湯黃連橘皮湯主之若胃爛發斑者傷寒未下即發斑下早亦發斑蓋不當下而下之熱乘虛而入胃當下而失下則胃熱不得泄所以皆發斑不可用表藥蓋表虛里實若發其汗重令升泄更增斑爛表虛故也玄參升麻湯化斑湯主之傷寒發斑只是熱在臟腑先攻腸胃里蘊成瘡方發出外赤者易冶黑者難治蓋毒氣入胃之深故也羌活散見傷寒加蟬蛻治赤斑藥方葛根橘皮湯治小兒發斑癮疹如錦紋嘔吐清汁發熱葛根橘皮杏仁麻黃知母黃芩甘草各等分上咀每服二錢白水煎有熱不吐去陳皮不熱去黃芩知母黃連橘皮湯溫毒發斑兼治麻證泄瀉並去血黃連陳皮杏仁去皮尖枳實炒麻黃葛根各半兩厚朴炒甘草炙各錢半上咀每服二錢白水煎服玄參升麻湯治傷寒汗下後毒氣不散表虛里實身發錦斑甚則煩躁譫語玄參升麻甘草各等分每服二錢水煎服化斑湯方見傷寒門赤遊丹毒第三十四病機小兒丹毒赤遊腫者蓋熱毒客於腠理搏於血氣發於外皮上赤如丹砂熱毒與血相擊而風乘之所以赤腫遊走遍身也此由乳母食酒面煎炙等物過度與夫烘衣與兒不候冷即著多成此疾或發於手足或發於頭面胸背令兒燥悶腹脹如火其痛不可言有入腹之證便不可救仍小兒一周之內皮毛肌肉筋骨髓腦五臟六腑榮衛皆未堅固譬如草木茸芽之狀未經寒暑即嬌嫩不堅故小兒一周之內不可頻頻洗浴恐濕熱之氣鬱蒸不散遂成赤遊腫或片片如胭脂塗染皆腫而壯熱若毒入腹中者則腹脹硬多致不救凡此證候皆洗浴脫著而得之也赤遊丹腫者急用蜞針法刺之使吮其惡血而毒解矣次服水黃散葛根白朮散五和散皆可選而用之及丹熱實熱龍帶熱者並用大連翹湯加大燈心煎服敗毒散解毒丸並宜服之藥方犀角解毒散治小兒赤白丹瘤壯熱狂躁睡臥不安胸膈痞悶咽喉腫痛遍身丹毒牛蒡子炒兩半荊芥半兩防風甘草各二錢半犀角錢半上咀每服三錢竹葉煎食遠服防風升麻湯治小兒丹瘤赤腫防風升麻山梔麥門冬木通甘草各一錢上咀竹葉煎服碧緑散緑豆粉半兩大黃末二錢和勻薑汁薄荷汁蜜調塗患處冰黃散治小兒赤瘤丹毒芒硝半兩大黃一錢為細末新汲水調塗患處拂毒散治小兒諸風熱陰毒腫核已結未潰半夏一兩貝母大黃朴硝五倍子各半兩上末醇醋調塗患處干再塗仍服疏風化毒劑白玉散治赤遊丹毒滑石寒水石各一兩上為末米醋調塗腫處或腫至外腎有破處只用水調五和湯治赤遊腫當歸茯苓大黃各七錢甘草半兩枳殼七錢半上咀每服三錢水煎服升麻散治五種丹毒升麻鬱金桔梗甘草葛根天花粉各等分為末薄荷湯入蜜少許調下蜞針法治赤遊丹毒一切腫痛先用濕紙搭毒上看其腫處一點先干即是正頂以大筆管一個安於頂上卻以水蜞一條於管中頻頻以冷水灌之吮其膿血出其毒自散如毒甚可用三四條方見功更蜞要脫大即吮其血吮其正穴其蜞必死若不吮其惡血十無一生如血不止以藕節泥塗之即止一方治赤遊丹腫用青黛五味為末井水入蜜調敷一方治赤丹急發一時無藥恐其入腹以瓷器打碎以鋒刺紅腫處其毒血出即愈急救方治小兒丹毒用灶心土研細新汲水調塗干則易上敗毒散清毒飲並治丹腫方見傷寒門癰毒腫癤第三十五病機小兒癰毒腫癤四證者皆因血氣凝滯而有熱毒之氣乘之故結聚成癰癤腫毒也始初微見頭紅㿔起疼者急用不語唾夜半頻頻塗之即消如不退用萬病解毒丸磨塗並服立效若已成當用天烏散貼凡小兒諸癰瘡毒皆可服漏蘆湯熱甚者解毒丸四順清涼飲加防風連翹玄參之劑五福化毒丹連翹湯之類藥方天烏散塗一切腫毒天南星草烏赤小豆黃蘗各等分上為末生薑自然汁調貼患處或用米醋亦佳解毒丸治小兒一切瘡腫毒癤丹毒赤遊腫玄參連翹升麻黃芩芍藥各三錢當歸羌活防風生地黃荊芥甘草各一錢上末煉蜜丸如雞頭子大以青黛為衣燈芯薄荷湯下五福化毒丹治小兒蘊積熱毒口舌生瘡身體多疥玄參桔梗各半兩茯苓二兩人參牙硝青黛各半兩甘草七錢麝香一字金銀箔各十片上末煉蜜丸芡實大一歲兒服一丸分四服薄荷湯化下及治痘疹後痘毒上攻口齒涎血臭氣仍以雞翎掃藥於口內玄參劑解諸熱消瘡毒玄參生地黃各一兩大黃半兩煨為末煉蜜丸燈芯淡竹葉湯下或入砂糖少許有加防風羌活赤芍連翹漏蘆湯治小兒癰瘡及丹毒瘡癤漏蘆麻黃去節連翹升麻黃芩甘草芒硝各二錢大黃一兩白蘞七錢上咀每服一錢白水煎量大小加減青解丸治小兒五臟積熱毒氣上攻胸腫咽喉痛頭面發熱唇口乾燥兩頰生瘡驚風潮熱痰壅寒水石石膏各四兩青黛一兩上未蒸餅丸芡實大每服一丸新汲水磨下一方治軟癤久不愈用出窯新磚為末醋調敷一方用大枳殼一枚去穰於空地上磨令口平以調麵糊搭四圍黏在癤上自破膿出盡更無痕迹懸癱候第三十六病機小兒初生口內血氣凝結上齶及舌上有泡如癤或如蘆蘀樣名曰懸癰一名垂癰凡有此急宜以針用綿纏裹惟留針鋒如粟米許刺泡上泄出黃赤血汁用鹽湯洗用蜜調一字散如聖散鵝翎蘸刷之一刺不消次日再刺不過數次自消盡藥方一字散硃砂硼砂各五分冰片少許上為細末蜜調少許鵝翎刷入口內咽下無妨如聖散真鉛粉一錢牛黃辰砂太陰玄精石上各等分為細末摻入口內患處瘰癧候第三十七病機小兒瘰癧是臟腑久伏積熱而頸項筋宛之中及項下有核如梅李初生漸次而多謂之瘰癧瘰癧者結核是也或在耳後或在耳前或在耳下連及頤項或在頸下連缺盆皆謂瘰癧或胸前及胸側或在兩脅是為馬刀瘡手足少陽經主之藥方散癧湯小兒結核成癧先用此方連翹桔梗梢甘草梢貝母天花粉黃蘗大黃玄參青皮赤芍藥各等分上咀每服四錢水盞半燈芯二十根煎六分食後臨晚臥服槲皮散小兒瘰癧痛以此洗之槲皮去粗皮此木在處有之即包益槲葉木是也不拘多少切碎水煎溫湯頻洗白芨散治瘰癧已潰膿汁出不幹白芨貝母各半兩輕粉一錢上為細末先以槲皮散洗過後用清油調敷其餘瘰癧治法與大人大同惟在量其大小虛實加減耳諸瘡癬疥候第三十八經曰諸痛癢瘡瘍皆屬心火小兒臟腑本是火多況有失調外受風寒鬱而為熱內襲母乳五味七情之火發於內者則為內驚發於皮膚之間則為瘡癬癤毒治法當先清其乳母謹忌食味次調和小兒氣血不可峻用攻發之劑當緩以和之得其治道也月蝕瘡小兒勿指月耳後生瘡名曰月蝕用蝦蟆末敷薔薇散治小兒月蝕瘡薔薇根四錢地榆皮二錢輕粉五分上為細末先用鹽湯洗過後敷之眉瘡小兒眉間生瘡名曰鏈銀瘡金銀散煅金銀鍋一個輕粉五分為細末麻油調敷鼻瘡小兒熱壅傷肺肺開竅於鼻故鼻上生瘡紅點集集名曰肺風或鼻下兩傍及人中濕爛癢潰名曰鼻𧈟其瘡有不痛者瘡汁流處卻又成瘡名淫瀝瘡後方神效祕驗方治黃水浸濕流汁成瘡枯礬海螵蛸各一錢赤石脂鉛粉各二錢雄黃一錢黃丹二錢輕粉孩兒茶各五分上為末干搽上不黏者香油調敷清金散敷鼻下爛瘡銅青白礬各一錢為末敷患處一方用熊膽泡汁湯以雞翎掃上澤瀉散小兒肺經積熱鼻上生瘡及鼻下赤爛澤瀉鬱金山梔仁甘草上為細末用甘草煎湯食後調服量大小與之聤耳耳者腎之外候小兒腎經氣實其熱上衝於耳遂使津液壅滯為稠膿為精汁者此也亦有沐浴水入耳中水濕停留傳於氣血釀成耳膿久不瘥變成耳重龍骨散治耳膿枯礬一錢龍骨煅一錢半黃丹胭脂各一錢麝香少許共為細末上先用綿杖子捻出耳中膿水次用鵝翎管吹入耳中一字麝香散治前證蜘蛛一枚胭脂坯子五分麝香一字為細末吹入耳耳瘡方黃連蛇床子各一錢輕粉一字為末搽瘡或吹入耳白禿瘡頭為諸陽之首多有胎熱及熱毒上攻於頭故頭上成瘡不絶若散而片片白痂燥癢又類白屑此因積熱而生名曰白禿又有厚痂黃汁汁流又成瘡者名肥瘡若不早治漸成滿頭其勢遍延久而難變成光禿並不生髮俗名臘梨不可不早治也祕驗方治一切白禿多有不愈瀝青一兩苦參末半兩杏仁泥百草霜各三錢川椒末水銀各五錢以柏子油調研如糊不見水銀為好先用大苦茶煎濃熱洗剃去發痂即塗上三次愈忌發物連床散治小兒滿頭如癩瘡毒及手足身上陰器膚囊癢則爪爛黃水汁淋漓燥痛黃連淨半兩蛇床子二錢半五倍子一錢二分輕粉一錢上為細末先以荊芥蔥同煎湯洗拭乾後用清油調敷一方楝根皮燒灰存性豬油調敷鯽魚方治小兒白禿鯽魚一尾重三四兩者去腸肚以亂髮填滿濕紙包燒存性為末加雄黃少許麻油調敷先以薺水洗拭後用藥癬瘡用羊蹄根明礬少許同搗爛以絹帛包搓瘡上三次盡愈一方用川槿皮末醋調和水銀不見星摻瘡上效漏瘡瘭瘡方治卒得瘭瘡赤爛牛糞燒存性敷魚臍瘡瘡頭黑深破之黃水出四畔淳漿用蛇蛻皮燒存性細研雞子漬調敷諸瘡久不瘥白膠香半兩輕粉二錢同調豬膏或豬骨髓敷之小兒灸法第三十九明堂灸經曰小兒之患詳悉幽玄默而抱疾自不能言也故曰啞科或胎中受病或生後傷風動發無時寒溫各異證候多端治療之法皆有憑於灸艾然諸家穴法不同則治法亦多舛謬今按明堂之內精選小兒應驗七十二穴曾是並經用治纍驗神功大抵穴法與大人無異艾炷大小之別耳凡兒灸艾其小如麥炷許今附穴法於下云小兒驚癇者先驚悸啼叫後乃發也灸頂上旋中三壯及耳後青絡脈炷如小麥大小兒慢驚風灸尺澤各一壯在肘下橫紋約上動脈中小兒風癇先屈指如數物乃發病也灸鼻柱上髮際宛宛中三壯小兒二三歲忽發兩眼大小眥俱赤灸手大指次指間後一寸五分陷中各三壯小兒囟門不合灸臍上臍下各五分二穴各三壯灸瘡未發囟門先合最效小兒夜啼上燈啼雞鳴止者灸中指甲後一分中衝一壯小兒喉中鳴咽乳不利灸璇璣一穴三壯在天突下一寸陷中癇病者小兒惡疾也呼吸之間不及求師致困者不少諺云國無良醫枉死者半小兒豬癇病如口穢吐沫灸巨闕穴三壯在鳩尾下一寸陷中小兒睡中驚目不合灸屈肘橫紋中上三分各一壯小兒口有瘡蝕齦臭穢氣衝人灸勞宮二穴各一壯在手心中以名指屈指尖到處是也小兒雞癇驚搐自搖灸手少陰三壯在掌後去腕半寸小兒久瘧不愈者灸足大指次指外間陷中各一壯小兒身強角弓反張灸鼻上入髮際三分三壯次灸大椎下節間小兒龜胸緣肺熱脹滿攻胸膈所生又緣乳母過食五辛之致灸兩乳前各一寸半上兩行三骨罅間六處各三壯小兒疳眼灸合谷二穴各一壯在手大指次指兩骨間陷中灸三壯小兒秋後冷痢不止者灸臍下二寸三寸間動脈中小兒驚癇灸鬼祿穴在上唇內中央弦上以快剪斷更佳小兒水腫腹大灸臍上一寸三壯名水分穴小兒熱毒風盛眼睛疼痛灸手中指本節頭三壯名拳尖也小兒龜背初生時被客風吹著脊骨所致肺俞心俞膈俞各三壯取法肺俞在三椎下兩旁各開一寸五分心俞在五椎下兩旁各開一寸五分膈俞七惟下兩旁一寸半小兒臍腫灸腰節臍骨間灸三壯名命門穴小兒急驚風灸前頂一穴三壯取法在百會前一寸若不愈須灸兩眉頭及鼻下人中一穴小兒風癇治不瘥灸耳上入髮際一寸五分嚼而取之名率谷也小兒嘔吐乳汁灸中庭一穴一壯在膻中穴下一寸陷中小兒目澀怕明狀如青盲灸中渚二穴各一壯在手小指次指大節後陷中小兒雀目夜不見物灸手大指甲後一寸內節橫紋頭白肉際各一壯小兒睡中驚掣灸足大指次指之端去甲如韭葉各一壯小兒多疳者是腦門被風拍著及肺寒也灸囟會一穴二壯在上星上一寸直鼻上小兒急喉痹天突一穴灸一壯在結喉下三寸耳骨間小兒食癇者前發熱灑淅乃惡發也灸鳩尾上五分灸三壯小兒牛癇目直視腹脹乃欲發也鳩尾一穴灸二壯小兒馬癇張口搖頭身反張馬鳴也僕參二穴灸各三壯在足跟骨下白肉際陷中拱足取之小兒陰腫灸內崑崙二穴各三壯在內踝後五分筋骨間陷中小兒脫肛瀉血每廁臟腑撮痛不可忍灸百會一穴三壯在顛中旋毛間小兒初生三四日七日內噤不吮奶多啼者是客風中臍循流至心脾二經遂舌強唇痓灸承漿一穴七壯在下唇宛宛中次灸頰車二穴在耳下曲頰骨後小兒三五歲兩眼每至春秋忽生白翳遮瞳子疼痛不可忍灸九椎上一壯小兒五六歲不語者心氣不足舌本無力發轉難灸心俞穴三壯在五椎下兩傍各一寸半陷中小兒痢下赤白秋末脫肛灸十二椎下節間名接脊穴灸一壯黃帝療小兒疳痢脫肛體瘦渴飲形容憔悴諸醫不效者灸尾骨上三寸陷中三壯岐伯云兼三伏時內用柳柳水浴孩子午正時當日灸之後用青帛拭兼有似見疳蟲子隨汗出也此法神效小兒脫肛瀉血不愈灸龜尾一壯脊端窮骨也小兒斑瘡入眼灸大椎二穴項後第一椎下兩傍各一寸半小兒奶避目不明者灸肩中俞二穴各一壯在肩甲內廉去脊二寸陷中小兒羊癇目瞪吐舌羊鳴灸第九椎下節間小兒飲水不歇面目黃者灸陽剛二穴各一壯在十四椎下兩傍各開一寸陷中小兒稟胎疝卵偏腫者灸囊下十字縫中三壯春灸夏效冬灸春效小兒羸瘦飲食少進不生肌肉灸胃俞二穴各一壯在十二椎下兩傍各開一寸半陷中
