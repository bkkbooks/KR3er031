body:
  text: 卷之六十三口病門病機口病敘論內經曰中央黃色入通於脾開竅於口藏精於脾故病在口奇病論帝曰有病口甘者病名為何何以得之岐伯曰此五氣之溢也名曰脾癉熱也夫五味入口藏於胃脾為之行其精氣津液在脾故令人口甘也此肥美之所發也有病口苦取陽陵泉病名為何何以得之曰病名膽癉又經云胃足陽明之脈挾口下交承漿大腸手陽明之脈挾口交人中此胃與大腸之脈所挾於口也巢氐病源云脾氣通於口口和能知五味矣蓋五味入口藏於胃脾為之運化津液以養五臟節宣微爽五臟之氣偏勝由是諸疾生焉又云臟腑熱盛熱乘心脾氣衝於口故令人口苦生瘡口咸則為寒咸挾苦或燥為熱酸則停滯澀則因燥淡則由虛苦則為熱熱甚則甘也凡口甘及乾燥患癰疽之後者多有之口病屬於五臟胃熱則口臭脾熱則口甜心熱則口燥膽熱則口苦肺熱則喉腥肝熱則口酸肺虛則口辛腎熱則口咸胃虛則口淡口病關於七情謀慮不決肝移熱於膽而口苦者思慮煩惱氣鬱於胸膈及心脾蘊熱沖發於口亦令人口臭也脾氣凝滯風熱加之則發口瘡也脾胃氣弱木乘土位而口酸也口臭口糜總是心脾多熱或問口臭一證曰臟腑熱氣燥腐蘊積於胸膈之間沖發於口則口氣臭也膀胱移熱於小腸膈腸不便上為口糜而爛也又云少陰之脈火氣內發上為口糜治以苦寒是也口瘡者乃脾氣凝滯風熱加之則發口瘡小兒將養太過溫暖心臟客熱其口亦瘡傷寒狐惑之證上唇生瘡蟲食其臟下唇生瘡蟲食其肛此口瘡內應臟腑之邪熱然也脈候左寸脈浮而數者口生瘡洪數心熱口苦右寸脈浮數肺熱口辛左關弦數而虛膽虛口苦甚左關洪而實肝熱口酸右關沉實脾胃有熱口甘兼洪數者口瘡或為重舌木舌脈虛者中氣不足口瘡服涼藥不愈宜理中湯治法口瘡有虛實之熱實熱口瘡新發者用涼膈散甘桔湯之類皆可愈西瓜漿水徐徐飲妙冬月無瓜以燒灰噙之酒色過度之人服涼藥久而不愈者乃中氣不足虛火泛上無制用理中湯反治之而愈甚者加附子或用官桂噙之亦妙肝膽有實熱令人口酸而苦小柴胡湯加甘草龍膽草青皮之類甚者當歸龍薈丸龍膽瀉肝湯若謀慮不決肝膽虛而口苦者人參遠志茯神甘草為君柴胡龍膽草為佐使甚者錢氏地黃丸所謂虛者補其母也心熱而口苦或口舌生瘡黃連瀉心湯牛黃清心丸涼膈散之類主之脾熱而口甜者三黃丸平胃散之類肺熱而口辛者以甘桔湯瀉白散金沸草散之類口舌生瘡皆上焦熱壅所致如聖湯甘桔湯加芩連仍擦以柳花散口糜好飲酒人多有此疾易老用五苓散導赤散合服效有下頷不收者乃骨脫令患人坐定用手揉臉百十遍令患人張口用兩大拇指入患人口內拿定牙外用兩手指將下往上兜則入臼矣陰陽散等方數口瘡立愈不可不知藥方口瘡通治諸劑千金甘露飲治男婦小兒胃中客熱牙宣氣牙齦腫爛時出膿血口舌生瘡咽喉腫痛又療脾胃受濕瘀熱在裡或醉飽多勞濕熱相搏致生膽病身面皆黃或時身熱而腫大小便不調枇杷葉拭去毛生地黃熟地黃天門冬麥門冬枳殼炒茵陳石斛黃芩各一錢甘草炙五分上作一服水一鍾煎七分食後服本事方無麥門冬茵陳加山豆根犀角屑大有神效升麻湯治膈上有熱口舌生瘡咽喉腫痛升麻葛根赤芍藥甘草各一錢半人參二分桔梗二錢上咀分二服每服水二鍾姜三片煎八分食後溫服局方三黃丸治脾熱口疳口氣兼治五勞七傷消渴不生肌肉黃芩春四夏秋六冬三兩黃連春四夏五秋三冬二大黃春三秋二夏一冬五上為末煉蜜丸梧桐子大每服十丸加至二十丸日三服一月病愈久服行如奔馬河間益膽湯治謀慮不決肝膽虛氣上溢則口苦黃芩去朽甘草炙人參各一錢官桂五分苦參茯神各三分遠志七分上咀作一服水鍾半煎一鍾溫服東垣柴胡地骨皮湯治膀胱移熱於小腸膈腸不便上為口糜生瘡潰爛心胃壅熱水穀不化等證柴胡地骨皮各等分上咀每服五錢水鍾半煎一鍾食後溫服如病人大段實者加大黃朴硝以利之良方龍膽湯治熱口苦名曰膽癉龍膽草黃連各四分人參天門冬知母黃芩各七分柴胡一錢山梔子麥門冬五味子甘草各五分上銼每服五錢水鍾半煎七分不拘時溫服良方玄參散治滿口並舌生瘡連齒齦爛痛玄參升麻獨活麥門冬去心黃芩黃柏大黃炒梔子仁前胡犀角屑甘草炙各三分上為末每服五錢水鍾半煎五分不拘時溫服升麻煎治膀胱熱不已口舌生瘡咽喉腫痛升麻玄參射干各四兩大青黃柏各三兩薔薇根白皮四兩上咀水七升煮一升五合去滓下蜜更煎二三沸取起冷咽之直指升麻散治心脾有熱口舌破裂生瘡升麻玄參川芎生地黃酒洗麥門冬去心各五錢大黃赤芍藥黃連枯黃芩甘草焙各三錢為末每服五錢薑棗煎食遠服生地黃膏治口舌瘡腫生地黃藍青葉各等分上入蜜杵細每服五錢井水煎食後服增損如聖散治上焦熱壅口舌生瘡桔梗二兩甘草炙兩半防風五錢枳殼制三錢片黃芩一兩上為粗末每服三錢水煎食後服濟生瀉黃飲子治風熱蘊於脾經口瘡唇燥坼裂白芷升麻枳殼黃芩防風半夏石斛各一兩甘草炙五錢上咀每服五錢水一盞姜五片煎七分溫服洗心散治心熱口瘡四順清涼飲治脾熱口瘡甘露飲黃連阿膠丸涼膈散以上諸方通治上焦諸熱口瘡方並見積熱門集成黑參丸治口舌生瘡久不愈天門冬去心麥門冬去心黑參各等分上為細末煉蜜丸彈子大噙化津咽良方冰柏丸治口瘡冰片一分黃柏硼砂研薄荷葉蘇州者各二錢上為細末研勻煉蜜和丸龍眼大每服一丸津液化下良方牛黃丸治心脾熱壅口舌乾燥及煩渴牛黃三分細研黃連大黃酒蒸各二兩麥門冬去心兩半硃砂半兩細研水飛麝香少許山梔子馬牙硝芎藭黃芩甘草炙各一兩上為細末煉蜜丸彈子大每服一丸食後竹葉煎湯化下栝蔞根散治風熱口中乾燥舌上生瘡栝蔞根胡黃連黃芩各三兩白殭蠶炒白蘚皮大黃炒各五錢牛黃研少許滑石二錢上為細末每服二錢竹葉湯調服甘露丸解熱毒退風熱治口舌乾燥寒水石二斤煆土地上放一宿去火毒馬牙硝三兩細研鉛霜細研龍腦細研甘草炙各三分上為細末以糯米飲和丸彈子大每服半丸食後新汲水磨化服杏仁散治心胃中客熱唇口乾燥或生瘡杏仁泡去皮尖麩炒微黃黃連麥門冬赤茯苓地骨皮黃芩山桅仁薔薇根大黃炒各一兩犀角屑三分甘草炙五錢上咀每服三錢水一鍾淡竹葉十四片煎六分去渣食後服含化丸治上焦煩熱口舌乾燥神思不清頭目不利石膏半斤細研水飛寒水石同上白蜜半斤以水四大鐘煎取鍾半綿濾過入蜜同煎稠丸如芡實子大常含化一丸津咽硼砂散治口瘡硼砂青黛龍腦石膏煆各等分上為極細末每用少許臨臥敷口中赴筵散一名陰陽散治口瘡極效黃連一兩乾薑炒黑三錢為細末乾摻口瘡上涎出即愈柳花散治口舌生瘡玄胡索一兩黃柏黃連各五錢蜜陀僧青黛各二錢上為細末貼口瘡上有津即咽黃連朴硝散治口瘡絕妙黃連朴硝白礬各五錢薄荷葉一兩上為粗末用臘月黃牛膽將藥入膽內風頭掛兩月取下如有口瘡旋將藥研細入於口瘡上去其熱涎即愈紫金霜治大人小兒積熱口內生瘡黃柏蜜炙紫色為末一錢訶子一枚麵包煨膩粉麝香各少許上為細末每用少許敷瘡上丹蜜煎治滿口爛瘡黃丹一兩白蜜一兩瓷甌內和勻坐飯上蒸鵝翎刷瘡上白綠散治口舌瘡不能食白芷銅綠各等分為細末摻舌上以溫醋漱之立效綠雲散治口瘡爛臭久不愈黃柏蜜灸研末青黛各等分上為細末臨臥用少許摻舌咽津妙一方用黃柏細辛為末敷胡黃連散治口糜生瘡胡黃連五分川黃連三錢細辛藿香各一錢上為細末每用少許敷瘡上涎出愈一方用黃連細辛為末摻效秘效方治口糜明礬大黃各等分為細末臨臥乾摻涎盡漱之愈五味散治口舌瘡五味子滑石飛黃柏蜜炙各等分為末搽瘡上愈丹溪鹽白梅散治口內生瘡鹽白梅燒存性明礬枯黃丹炒各一錢人中白煆五分麝香少許另研為末乾摻甚者加硼砂五分冰片一分碧雪治口瘡及咽喉腫痛神效為極細末用管吹入咽方見舌門白礬散治赤口瘡白礬枯沒藥乳香銅綠上等分為細末摻之雄黃散治白口瘡雄黃沒藥乳香各一錢輕粉少許上為細末摻之本方有巴豆霜恐誤也有人用之而口皆腫不能救解故此減之一方用焰焇硼砂含口內勿開外以南星為末醋調貼足心湧泉上神效良方貼臍散治元氣虛而浮陽上攻口舌生瘡不已吳茱萸醋炒乾薑炮各五錢木鱉子五枚去殼上為細末每用五分冷水調以紙靨貼臍蟾酥線治口舌生瘡爛痛蟾酥取時以線乘溫染之曬乾用時剪半寸含之有涎即吐出黃柏白蠶散治口糜黃柏蜜炙退火毒白殭蠶直者新瓦上烙干斷絲去火毒上為細末少許敷瘡上吐涎檳粉散治口吻邊生瘡浸淫不愈檳榔燒存性輕粉少許上為細末少許敷口瘡上立愈一方飯甑上汗調敷之加味龍石散治口舌生瘡時時血出咽嗌腫塞疼痛煩悶寒水石煅四兩硃砂研飛二錢馬牙硝風化一錢龍腦錢半鉛白霜硼砂各五分甘草研末二錢上為細末少許摻患處吐津出若誤嚥下亦不妨口熱口臭諸劑升麻黃連丸治多食肉口臭不欲聞其穢惡升麻半兩生薑黃連黃芩酒炒檀香甘草各二錢青皮半兩上為細末湯泡蒸餅丸彈子大每服一丸不拘時細嚼白湯下地骨皮丸治肺熱口臭口中如膠咽乾發渴小便多地骨皮黃耆桑白皮山梔仁馬兜鈴各等分為末甘草膏和丸芡實大每服一丸食後噙化生地黃煎治脾熱唇焦生地黃汁鮮天冬汁各半升麥門冬去心葳蕤各二兩黃耆升麻各半兩細辛川芎白朮生甘草各一兩細銼上綿裹酒浸一宿以豬脂二斤煎藥焦色錦濾去渣內鍋中後下地黃天冬汁熬令稠瓷器盛每服半匙不拘時嚥下合香丸治口臭去熱毒氣調和臟腑雞舌香芎藭各一兩藿香甘松當歸桂花桂心白芷各半兩零陵香木香各三分肉豆蔻白檳榔各五枚丁香麝香少許上為細末煉蜜丸如芡實大常含一丸津嚥下丁香丸治口臭穢丁香三錢芎藭二錢白芷五分甘草炙一錢上為細末煉蜜丸彈子大綿裹一丸噙化益智散治心氣不足口臭益智仁半兩甘草一錢上為細末時時干舐咽之更沸湯調服立效生香膏治氣熱口臭干甜瓜子去殼細研煉蜜和成膏食後含化或敷齒上尤炒一方空心洗漱訖含化一丸如棗核大芎芷膏治口氣熱臭白芷川芎各等分上為末煉蜜丸彈子大每服一丸食後噙化神芎丸治食肉多口臭藿香木香各一錢當歸一錢升麻二錢生地黃酒洗生甘草各三錢黃連炒砂仁各半兩上為末蒸餅丸綠豆大湯下一百丸四神散治噤口風牙關不開雄黃食鹽炒川椒各一錢獨子皂角子一枚燒灰為末吹在大牙根上立愈易簡諸方一方治口內生瘡用朴硝一錢寒水石煅一兩硃砂少許同研如桃花色敷患處咽不妨一方治口瘡用巴豆三枚去殼不用油黃丹五分同研如泥塗葉上如棋子大貼眉間須臾四圍瘡如蚤子去藥大效一方用澱粉巴豆同研如泥如上法貼眉間亦效又方治口瘡用牛膝浸酒含漱不用者牛膝搗汁漱亦佳又方用五倍子末摻之便可飲食又方用薔薇根避風打去土煮濃汁溫含冷則易又方治口瘡翻白用桑樹汁先以發拭口次以汁敷之又方治口瘡久不愈用亂髮霜蜂房蛇蛻皮各燒存性為末每用一錢酒調服一方治唇上生瘡年久不愈用八月藍葉一斤搗汁洗三日瘥又方治口舌生瘡胸膈疼痛用豆豉炒焦為末含一宿瘥孫真人方治口瘡吻瘡用白楊枝漿水煎和鹽含之或用嫩枝蕊於鐵上繞作灰和脂敷之孫真人食忌治口瘡用朴硝含之甚良千金方治口臭用香薷一把以水一斗煮取三升稍稍含咽之又方治口瘡用甘草白礬各等分為末摻口內佳勝金方治口瘡用膽礬半兩入銀鍋子內火煆通赤置地上出火毒一夜細研每服少許敷瘡上吐酸水清涎甚者一兩即瘥聖惠方治口臭穢及䘌齒腫痛用細辛一兩煮取濃汁熱漱冷即吐之立效導引法一法凡人覺脊背屈強不問時節縮咽膊仰面努膊上回頭左右兩向按之左右二七遍氣血行動定然始更用先緩後急不得先急後緩若無病人常欲得旦起午時日沒三辰如用辰別二七除寒熱病腰脊頸項痛風痹口內生瘡牙齒風頭眩盡除也附唇病門病機經曰脾胃大腸小腸三焦膀胱者倉廩之本榮之居也其華在唇四白又云胃足陽明之脈挾口環唇又云衝脈任脈別而絡唇折衷方云脾臟應唇通口氣脾與胃為合足陽明胃之經其脈夾口環唇故脾胃受邪則唇為之病風則動寒則緊燥則干熱則裂氣鬱則生瘡血少則色白治法內對證清理脾胃外敷以藥無有不愈者唇緊候撮口不能開飲食難進名曰緊唇又曰瀋唇若不急治則有死矣藥方瀉黃飲子治風熱積於脾經唇燥燔裂無血色方見前獨活散治唇生惡核由脾胃熱壅獨活升麻桑寄生真犀屑沉香連翹漢防己川大黃炒各三分甘草炙五錢上咀每服三錢水一鍾煎六分去滓溫服薏苡仁湯治風熱在脾唇瞤動或結核或浮腫薏苡仁炒防已赤小豆甘草炙各等分上咀每服七錢水二鍾姜三片煎八分食遠溫服五福化毒丹治唇舌腫痛生瘡煩渴玄參桔梗各二兩人參茯神各半兩馬牙硝風化青黛各一兩麝香一字甘草七錢半上為細末研勾煉蜜丸如皂角子大以金銀箔各四十片為衣每服一二九薄荷湯化下如口臭地黃汁化下食後服松脂散治唇生腫核松脂半兩大黃白蘞赤小豆胡粉各一分上為極細末以雞子清調塗唇上白燈散治緊唇白布一塊纏作燈炷如指天燃安斧刃上令刃上有汗出拭取敷唇上日三度愈舊青布亦佳一方青布燒灰豬脂調敷黃柏煎治繭唇黃柏二兩以五倍子二錢密陀僧乙錢甘草少許為末水調塗柏上炙乾再塗再炙藥盡將柏剖成片子貼唇上消毒散治口唇腫裂口舌生瘡晚蠶蛾五倍子密陀僧各一錢上為細末每用少許敷患處橄欖散治唇燥裂生瘡橄欖燒灰為末以豬脂和塗唇上一方將荷花瓣貼乾者亦可易簡方一方治口吻燥痛橄欖核仁研敷愈一方治唇緊口小不能開以生採馬齒莧濃煎汁洗之冬月以乾者濃煎湯用一方以蠐螬焙乾為末豬脂調敷唇上良傷寒類要方治口唇緊用鱉甲及頭燒灰為末敷之灸法合谷治唇緊不能關口灸合谷男左女右手灸三壯承漿穴在下唇之下宛宛中灸三壯陽陵泉治膽熱口苦善太息膽募膽俞附蟲物入口方治飛絲入口用紫蘇葉細嚼白湯送下即無恙治狼煙入口用好醋飲少許解之治蛇入口不出因乘睡著蛇入口挽不出用刀破蛇尾入生椒二三粒裹定須臾自出
