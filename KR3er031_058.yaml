body:
  text: 卷之五十八腰痛門病機內經敘論內經曰足太陽脈令人腰痛引項脊尻背如重狀少陽令人腰痛如以針刺其皮中循循然不可以俯仰不可以顧陽明令人腰痛不可以顧如有見者善悲足少陰令人腰痛引脊內廉厥陰之脈令人腰痛腰中如張弓弩弦太陰腰痛下如有橫木居其中甚則遺溺又曰太陽所至為腰痛巨陽虛則腰背頭項痛是動則項如拔挾脊痛腰似折髀不可以曲腰者腎之府轉搖不能腎將憊矣脈經曰凡有所用力舉重若入房過度汗出如浴水則傷腎腎脹者腹滿引背怏怏然腰痹痛腎著之為病從腰以下冷腰重如帶五千錢腰痛有五所感不同腰痛所感有五一曰陽氣不足少陰腎衰是以痛也二曰風痹風寒濕著腰痛三曰腎虛勞役傷腎而憊四曰墜墮險地傷腰而痛五曰寢臥濕地腰痛腰痛有三因陳無擇云六經腰痛皆外因大抵太陽少陰多中寒少陽厥陰多中風熱太陰陽明多燥濕以類推之失志傷腎鬱怒傷肝憂思傷脾皆致腰痛者以肝腎同系脾胃表裡脾滯胃閉最致腰痛其證虛羸不足面目黧黑遠行久立不能盡失志所為也腹急脅脹目視䀮䀮所祈不得意淫於外宗筋弛縱及為白淫鬱怒所為也肌肉濡漬痹而不仁飲食不化腸胃脹滿閉墜腰脅憂思所為也此屬內因腎著腰痛腰冷如冰身重不渴小便自利飲食如故腰以下冷重如帶五千錢因作勞汗出衣里冷濕久久得之臀腰傴僂腫重引季脅痛因於墜墮惡血流滯及房勞疲力耗竭精氣致痛此屬不內外因腰痛諸候總為虛起腰者腎之外候一身所恃以轉移闔闢者也蓋諸脈皆貫於腎而絡於腰脊腎氣一虛腰必痛矣除墜傷之外不涉於虛其於風寒濕熱雖有外邪多有乘虛相犯而驅邪之中又當有以究其本也舉世之人每每醉以入房欲竭其精耗散其真務快其心恬不知養其不虛者幾希豫見房室勞傷腎氣腰脊兼痛久則髓減骨枯發為骨痿者有矣豈直腰痛已哉養生君子不可以不慎於斯也甫年少時常有腰痛及閃挫之病每服補腎湯丸僅得不甚而易愈尚不知房室之害也豫稟性淡於欲事自壬子以來多遊江湖間欲漸稀而腰痛亦稀至辛酉之後集此書兼視病家外不少遑而欲益寡腰覺強健而絶無痛作之因可見寡欲之功而優於補劑多矣並書於此為君子告焉脈候脈經曰腰痛時時失精飲食減少其脈沉滑而遲此為可治病源云尺脈沉遲主腰背痛寸口脈弱腰背痛尺寸俱浮直下此為督脈腰強痛劉立之曰腰痛之脈皆沉而弦沉弦而緊者為寒沉弦而浮者為風沉而濡細者為濕沉弦而實者為閃肭丹溪曰尺脈大者腎虛有火沉者為滯緩者為濕澀者瘀血或滑或伏為痰治法治腰痛以補虛為主攻邪次之大抵腰痛未嘗不由腎虛而致以內經推足三陰三陽十二經脈有貫絡於腰脊而痛者則經中各有刺法治之或風寒濕蓄熱與失志房勞及墜傷閃肭氣滯血滯而痛者當於五種三因而推之不過從其所由用汗下補瀉之法凡攻補之劑常要相因標痛甚者攻擊之後須是補養以固其本庶無復作之患也初治腰痛當察其所因戴氏曰日夜悠悠痛而不已者腎虛也宜鹿茸丸煨腎丸青娥丸之類日輕夜重者瘀血也宜如神湯元戎加味四物湯遇天陰或久坐而痛者濕也獨活寄生湯羌活湯之類四肢緩足寒逆腰冷如冰冷汗精滑腰痛者濕熱也蒼朮湯拈痛湯之類又有六氣乘虛而外入七情所感而內傷如失志傷腎鬱怒傷肝或負重傷損瘀血蓄而不行皆使氣停血滯宜當審分其所因而治之腰痛有宜刺經曰腰痛上寒不可顧取足太陽陽明腰痛上熱取足厥陰不可以俯仰取足少陽東垣云足之三陽從頭走足足之三陰從足入腹經所過處皆能為痛治之者當審其何經所過分野循其空穴而刺之審其寒熱而藥之假令足太陽令人腰痛引項脊尻背如重狀刺其郤中太陽二經出血余仿此腰痛有宜下子和云腰者腎之腑為大關節血氣不行則沉痛不能轉側及氣挫血瘀濕熱甚者用補藥不效須用舟車丸神佑丸之類下之大瀉其濕熱行其滯積方可補助丹溪治法虛者補之杜仲牛膝續斷當歸菟絲子肉桂枸杞子之類風者散之麻黃防風川烏羌活獨活之類寒者溫之肉桂乾薑附子鹿茸之類挫閃者行之當歸蘇桃仁紅花之類瘀血者逐之大黃牽牛桃仁水蛭虻蟲之類有刺委中出血以其血滯於下也濕痰流注者消導之蒼朮撫芎香附白芷橘皮半夏茯苓之類痰藥須用南星半夏必以快氣藥佐之使痰隨氣運腰曲不能屈伸者刺人中立愈腎著證其體重腰冷如冰飲食如故小便自利腰以下冷痛而重治宜疏濕兼用溫藥腰痛甚者不宜補氣亦禁寒涼治案東垣治一人露宿寒濕之地腰痛不能轉側兩脅搐急作痛月餘腰痛論云皆足太陽足少陰血絡有凝血作痛兼有一二證屬少陽膽經外絡脈病皆去血絡之凝乃愈經云冬三月禁針只宜用溫藥通其經絡破血絡中敗血以漢防己防風各三分炒曲獨活各五分川芎柴胡肉桂當歸炙甘草蒼朮各一錢羌活錢半桃仁七粒作一劑酒煎服遂愈藥方腎虛腰痛諸補劑局方青娥丸治腎虛腰痛或風寒乘之血氣相搏為痛杜仲薑炒一斤破故紙炒八兩胡桃肉二十兩上為末蒜四兩為膏和丸如梧桐子大每服三十丸空心溫酒送下一法酒糊丸不用蒜局方煨腎丸治腎虛腰痛杜仲以薑汁炒斷系花椒炒出汗食鹽少許上為末以豬腰子一隻薄批作五七片以椒鹽淹去腥水摻杜仲末三錢在肉以荷葉包外加濕紙二三層煨熟食之酒下丹溪補腎丸治腎虛腰痛局方黃耆建中湯治男女諸虛不足身重短氣腰背強痛二方並見虛損門三因安腎丸治腎虛腰痛破故紙炒胡蘆巴炒茴香炒川楝子炒續斷炒各三兩桃仁炒杏仁炒山藥茯苓各二兩上為末煉蜜丸梧桐子大每服五十丸空心鹽湯下百一補髓丸治老人虛弱腎傷腰痛不可屈伸破故紙用芝麻五兩同炒以芝麻黑色無聲為度篩去芝麻不用十兩杜仲十兩炒鹿茸一兩燎去毛浸炙上為末用胡桃肉三十個浸去皮杵為膏入面少許煮糊為丸梧桐子大每服百丸溫酒鹽湯任下濟生二至丸治老人虛弱腎氣虛損腰痛不可屈伸附子炮去皮臍桂心杜仲制補骨脂炒各一兩鹿角霜鹿角鎊鹿茸酒炙青鹽另研各半兩上為細末酒煮糊丸梧桐子大每服七十丸空心用胡桃肉細嚼鹽湯或鹽酒送下如惡熱藥者去附子加肉蓯蓉立安散治腰痛杜仲薑製橘核仁炒各等分上為末空心鹽酒調服三錢腰痛風寒諸劑三因獨活寄生湯治腎虛臥冷寒濕當風所得獨活三錢桑寄生杜仲炒細辛牛膝秦艽茯苓芍藥桂心川芎防風甘草炙人參當歸熟地黃各五分上咀水盞半薑三片煎七分空心服局方小續命湯五積散並治感寒風濕腰痛方見風門東垣川芎肉桂湯治冬月露臥感寒濕腰痛兼行瘀血羌活錢半柴胡肉桂桃仁當歸尾蒼朮甘草炙川芎各八分獨活神麯炒防風防己酒製各三分上酒三盞煎一盞食前暖室溫服麻黃蒼朮湯治寒濕所客身體沉重腰痛面色痿黃麻黃澤瀉白茯苓炒曲陳皮各一錢蒼朮二錢杏仁十個桂枝草豆蔻半夏豬苓各五分黃耆炙甘草炙各三分上水盞半煎七分食遠溫服牛膝酒治腎受風毒攻刺腰痛不可忍者牛膝地骨皮五加皮薏苡仁川芎羌活甘草炙各一錢海桐皮生地黃十兩上咀用綿包藥入無灰酒一斗裝入壇內浸春五夏三秋七冬十日每服一盞一日三四次長令酒氣不絶一方加杜仲萆薢酒治五種腰痛連腳膝筋脈拘急痠疼萆薢牛膝各三兩羌活附子制狗脊杜仲制桂心桑寄生各二兩上咀絹袋盛以酒二斗浸密封七日後開食前溫服神應丸治腎經足膝風冷乘之腰痛如折痛引背膂俯仰不得或勞役傷腎或寢濕地或墜傷損風寒客搏皆令腰痛威靈仙桂心當歸各二兩上為細末酒煮麵糊丸梧桐子大每服三十丸食前溫水下濟生朮附湯治寒濕腰痛重冷小便自利附子白朮各一兩杜仲炒半兩上咀每服四錢入薑煎腰痛濕熱諸劑東垣獨活湯治因勞役濕熱自甚腰痛如折沉重如山獨活防風羌活肉桂大黃煨澤瀉各二錢甘草炙一錢當歸連翹各半兩黃柏酒炒一兩防己同上桃仁三十粒上咀每服五錢水酒各半盞煎空心熱服蒼朮湯治濕熱腰腿疼痛蒼朮三錢柴胡二錢黃柏防風各一錢上作一劑水煎空心服撥萃當歸拈痛湯治濕熱為病肢節煩疼腰背沉重胸膈不利及遍身疼痛下注於足脛腫痛不可忍當歸身羌活甘草炙黃芩酒洗茵陳酒洗各半兩人參升麻苦參酒洗茯苓澤瀉豬苓白朮各三錢上咀每服一兩水二盞煎一盞空心溫服東垣健步丸治下虛濕腰腿疼痛方見痿門行氣破血攻下諸劑易簡枳殼湯治腰背氣動發痛枳殼半兩甘草一錢上為細末蔥白湯調下二錢服訖即臥少時局方小七香丸治七情內傷傷損挫閃一切氣滯腰痛丁皮香附子甘草各一兩蓬朮砂仁各二錢甘忪八錢益智六錢上為末蒸餅丸緑豆大每服二三十丸米飲送下三因如神湯治閃挫腰痛甚者不過三服即平川歸肉桂玄胡索各等分上為細末每服二錢食前熱酒調下或咀酒煎元戎加味四物湯治瘀血腰痛四物湯桃仁泥紅花酒拌六味同煎空心熱服東垣地龍丸治打撲傷損從高墜下惡血在太陽經中令人腰脊或脛腨臂股中痛鼻塞不通中桂四分桃仁六個羌活錢半獨活黃柏各七分麻黃當歸尾地龍蘇木甘草各五分上咀水煎服為丸彈子大臨時煎濟生菴䕡丸治墜墮閃肭氣血凝滯腰痛菴䕡子半兩沒藥乳香各二錢破故紙炒威靈仙杜仲炒桂枝當歸各半兩上為末酒糊丸如梧桐子大每服七十丸空心鹽酒或湯任下三因熟大黃湯治墜墮閃挫腰痛不能屈伸大黃炒生薑各半兩水煎滾浸一宿五更去渣溫服子和益腎丸甘遂為末三錢以獖豬腰子批開用鹽椒醃去水摻藥三錢於內荷葉包文火燒熟細嚼酒送下楊氏牽牛丸治冷氣流注腰痛不可俯仰玄胡索炒破故紙炒黑牽牛另研末各一兩煨蒜搗膏丸梧桐子大每服五十丸空心蔥酒鹽湯任下經驗羌活桃仁湯治墜墮閃挫氣血凝滯攻刺腰痛神效羌活桃仁紅花牛膝酒洗玄胡索大黃酒拌各等分上咀每服五錢水二盞蔥一根煎七分食前服良方杜仲木香散治腰痛行氣血立愈杜仲制三錢木香官桂各一錢上為細末每服二錢空心溫酒調下易簡諸方太平聖惠方治風冷寒痹腰痛川烏頭三個生搗羅末鹽調塗於故紙軟帛上敷痛處須臾止又方治卒患腰腳疼痛杜仲一兩制水二盞煎一盞用羊腎二對細切去脂膜入藥湯煮次入韭白七莖鹽花椒薑醋醬作羹空腹食之二三次腰腳倍健又方治風濕痹腰腳痛牛膝葉一斤切以米三合入豆豉汁中相合煮粥熱入鹽醬空心食易簡方治一人舉手攀高轉其腸疼痛不能伸腰者就令患人依舊舉手攀其原所盡飲溫蜜水三四腕其腸自順又方治卒腰痛暫轉不得鹿角一枚長五寸酒二升燒角令紅內酒中浸一宿空心飲之肘後方治卒腰痛不能俯仰鱉甲炙為末空心酒調一錢又方治積年久病腰痛有時發動六七月收地膚子干為末酒調服方才匕日三服斗門方治腰重痛檳榔末食遠酒調一錢經驗祕方治腎虛腰腳無力生栗子用絹袋懸風乾每日平明吃十餘顆次用豬腰煮粥吃瘥又方治急引腰脊痛白蒺藜為末蜜丸如芡實子大每服二丸日進二服一月後腰腳輕健正元廣利丸治丈夫腰腳痹軟行履不穩者以萆薢十四分杜仲八分為末每服二錢空心熱酒調服加至五六錢忌牛肉續千金方治腰膝痛用鹿茸酥炙紫色為末酒調服一錢玉紅散治腰痛紅曲炒為末每服一錢熱酒調下針灸法灸腰痛不可俯仰令患人正立以竹杖拄地度至臍用黑點記乃以度背脊灸點處隨年壯灸之訖可藏竹勿令人知灸腎俞亦可與臍平在十四椎下各開寸半灸三壯或七壯崑崙二穴在外踝後跟骨上陷中灸三壯治腰尻痛委中二穴在腳膕中央約文刺出血治腰腳腫痛雷火針法五月五日東引桃枝削去皮尖兩頭如雞子樣長寸用尖針時以針向燈上點著隨後念咒三遍用紙三層或五層貼在患處以針按紙上患深者再燃立愈咒曰天火地火三昧真火針天天開針地地裂針鬼鬼滅針人人得長生百病消除萬病消滅吾奉太上老君急急如律令腰軟候病機丹溪云腰軟者乃腎肝二經伏熱宜用黃柏防己如補陰丸之類可審虛實宜選腰痛門方用之腎著候病機陳無擇三因方云腎著候其體重腰冷如冰飲食如故小便自利腰以下冷重如帶五千錢治宜流濕兼用溫散藥藥方三因腎著丸治腎虛為病身重腰冷如冰不渴小便自利食如故腰以下重痛如帶五千錢白朮茯苓各四兩乾薑甘草炙各一兩上咀每服四錢水煎空心冷服滲濕湯亦治腎著方見濕門三因摩腰膏治寒濕腰痛附子烏頭尖南星各三錢半乾薑一錢雄黃朝腦丁香錢半麝香五分上為細末煉蜜丸如彈子大每用一丸生薑汁化開如厚粥樣烘熱置掌中摩腰上令盡黏肉烘綿衣縛定腰熱如火間三日用一丸或加吳茱萸桂皮
