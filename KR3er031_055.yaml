body:
  text: 卷之五十五皮膚候病機皮部論曰凡十二經絡脈者皮之部也是故百病之始生也必先於皮毛邪中之則腠理開開則入客於絡脈留而不去傳人於經留而不去傳入於府廩於腸胃又曰皮者脈之部也邪客於皮則腠理開開則邪入客於絡脈絡脈滿則注經脈經脈滿則入舍於腑臟也故皮者有分部不與而生大病也帝曰善肺主皮毛經曰肺之合皮也其榮毛也又云肺主皮毛在臟為肺在體為皮毛是也又云手太陰者沖氣溫於皮毛者也氣不榮則皮毛焦皮毛焦則津液去皮焦津液去者則爪枯毛折而死皮膚痛屬心火剋金經曰夏脈者心也夏脈太過則病身熱膚痛為浸淫又云少陰在泉熱淫所勝病寒熱皮膚痛又云少陰司天火淫所勝皮膚痛皮膚索澤為肺燥經曰三陽為病發寒熱其傳為索澤又云陽明在泉燥淫所勝病身無膏澤治以苦溫是也皮膚索澤即仲景所謂皮膚甲錯蓋皮滯而不清澤者是也藥方生血潤膚飲方見燥門治皮膚索澤枯燥搔之有白屑升麻湯治皮膚痛不可以手按升麻五分白芷六分乾葛柴胡玄參各一錢黃連黃芩當歸生地黃麥門冬各錢半甘草四分上水二盞薑三片蔥一寸煎八分食遠服取微汗澤膚膏治皮膚枯燥如魚鱗牛骨髓真酥油各等分上二味合煉一處以淨瓷罐貯之每日空心用三匙熱酒調服不飲酒者蜜湯調七日肌膚潤澤久服滋陰養血止嗽榮筋皮風搔癢門有熱有寒有虛有實鬱熱生風作癢者宜清熱疏風涼血子和法妙經曰諸癢為虛肺主氣司布皮毛肺氣不通而癢者宜防風參耆白朮之類補之衛陽腠實閉固熱鬱衛氣不和為之實宜調氣和血散郁之劑玄參升麻湯治皮風搔癢不能忍玄參升麻白芷各一錢蟬蛻防風甘草黃耆各七分蔥一寸水煎服消風散蘇州薄荷葉蟬蛻去頭足土淨各等分為末食遠溫酒調下二錢防風通聖散治皮風搔癢服後隨吃熱羹得汗為妙加味補中益氣湯治中氣不足衛氣不舒以致搔癢人參黃耆當歸白朮各一錢陳皮甘草升麻柴胡防風白芷川芎各五分加薑棗煎服澡洗湯治一切風疾篷乾荷葉藁本甘松白芷威靈仙蒼耳草忍冬藤煨鹽每用三兩煎水一桶去滓浴數次自愈史國公浸酒仙方治皮風撥癢日服數次自愈方見風門諸風應效酒方見歷節風門荻港青藤膏每服酒調三匙臨臥服風痹癮疹門風氣挾熱鬱於腠理無從發散起於皮膚不紅不腫惟有顆粒高起而作癢者痹也略有形迹見於皮膚者癮疹也要皆風熱之所為郁不散而成也或因浴有湊風汗出脫解而得之者為挾暑溫久而不退必亦為瘡疹丹毒自微至著不可不知加味羌活散治風寒濕熱外搏肌膚發為癮疹羌活前胡各一錢人參桔梗天麻蟬蛻薄荷川芎各七分枳殼柴胡茯苓甘草三分上水二盞薑三片煎八分食遠溫服胡麻散治脾肺風毒鬱滯皮膚或如蟲行結成痹疹搔癢無時胡麻荊芥穗苦參何首烏成靈仙各等分甘草炙減半為末薄荷湯或酒調下三錢得汗妙天麻散治風熱癮疹天麻川芎升麻半夏防風細辛羌活荊芥穗蟬蛻甘草各等分上水二盞薑三片煎服挾寒加桂挾暑加黃芩柴胡挾濕加茯苓蒼朮大胡麻散治風熱癮疹搔癢胡麻子二兩苦參荊芥何首烏威靈仙防風石菖蒲牛蒡子菊花蔓荊子白蒺藜甘草各七錢上為細末每服二錢薄荷湯調下助以熱蔥湯出汗殭蠶散治癮疹白殭蠶直者去嘴炒黃為末薑湯調下一錢玄參升麻湯方見皮風門治癮疹搔癢消風散同上犀角消毒飲治大人小兒風鬱結遍身瘡疹搔癢或項下結核及小兄痘疹已出未出熱毒不解急可服此防風鼠黏子二錢炒研荊芥一錢甘草八分犀角磨汁上每服三錢水煎食後溫服斑丹火毒門熱邪積久鬱於皮膚輕則發為小斑重則發為丹毒平人發斑如錦紋或赤色大便結心中煩躁總為熱鬱甚則防風通聖散輕則解毒防風湯疏風清熱涼血或汗或下隨治可愈至於傷寒發斑又非尋常之比或因下之太早汗之太遲有表裡俱虛有溫毒熱毒不可汗下惟可以化斑湯升麻湯之類若熱毒深入斑發紫黑多不可救也丹毒則有火邪結熾挾風而作由熱毒搏於榮血而風乘之所以赤浮肌肉而為之走注也火與血皆主於心丹毒自內而出遊走於四肢易治自四肢而走於身入於心腹者難治甚則肌肉糜爛大可畏也敷之不散宜用扉針砭刺出血無不愈防風通聖散治實熱鬱結發為錦斑方見風門解毒防風湯治斑疹癢痛防風地骨皮黃耆芍藥荊芥枳殼牛蒡子各等分水煎溫服治陽毒梔子湯治傷寒壯熱百節痛而發斑升麻梔子仁黃芩芍藥石膏知母杏仁柴胡甘草上水二盞薑三片豆豉百粒煎服犀角消毒飲治風熱發斑方見癮疹門玄參升麻湯治傷寒吐下後發斑甚則煩躁玄參升麻各一錢甘草一錢水煎服人參白虎湯一名化斑湯治傷寒汗下失期以致發斑急服此人參一錢石膏三錢知母錢半甘草六分上水盞半加粳米一合煎八分不拘時服消毒飲治一切赤丹火丹牛蒡子荊芥各一錢甘草防風各六分升麻五分犀角磨一錢麥門冬桔梗各八分朴硝錢半上水煎服藍葉散治諸丹赤腫白芷川芎柴胡赤芍藥升麻各五分乾葛生地黃山梔仁石膏各八分甘草杏仁知母各六分藍葉黃芩玄參各一錢上水煎服上青散治一切丹毒藍青知母甘草杏仁各六分黃芩升麻各八分柴胡石膏寒水石各一錢山梔仁赤芍藥羚羊角磨各八分上水煎服易簡敷藥方一方寒水石石膏黃柏甘草為末芭蕉汁調敷一方大黃朴硝土蜂窩為末水調敷一方伏龍肝一錢豆豉五分為末麻油調敷一方赤豆為末雞蛋清調敷一方慎火草搗爛敷干則易鮮者佳慎火草一名挂壁青人家多栽於房上則隔火風癬門巢氏病源云有乾癬濕癬白癬頑癬諸候皆因風熱邪客於腠理復值邪氣與血氣相搏發為此疾皮肉癮疹如錢文漸漸增長或圓或斜有匡廓癢痛不一匡內生蟲搔癢出汁久久延及遍身則成頑痹故為頑癬除癬湯防風白芷連翹黃連柴胡甘草蟬蛻當歸生地黃赤芍藥各等分上水二鍾加蔥白三寸煎八分食遠溫服出汗除濕散治一切風癬狀如頑癩苦參何首烏荊芥穗蔓荊子薄荷各一兩白芷天麻川芎防風並生用烏蛇酒浸一宿焙各半兩為細末每服三錢茶酒調下不拘時日進三服五日一治令汗出血氣宣通一月膚澤如故苦參丸治遍身搔癢癬疥瘡瘍苦參四兩玄參黃連大黃獨活枳殼防風各二兩黃芩梔子菊花各一兩上為末煉蜜丸梧桐子大食後茶酒任下三十丸日三服一掃散治癬疥防風荊芥苦參地骨皮薄荷各等分甘草減半上為細末煉蜜丸梧桐子大每服五七十丸半飢茶清送下或為散蜜水調三錢不過三五服淨八寶散治一切風癬乾癬濕癬神效水銀七分枯礬三分蠍梢一枚大風子五枚胡粉雄黃硫黃檳榔各五分上為末同大風子一處研如泥再加陳豬油調要先用羊蹄根和鹽醋捶之擦破然後以此藥搽上一日一次不過三次愈獨聖散治一切癬瘡如錢如豆者即以此藥神效斑蝥二三枚去翅足浸醋內用針刺於燈上燒存性為末醋調如妮以手略爪動搽上藥一時起泡出汗而愈永不再發一方用好石灰調鹼水搽上妙只一次而愈附汗斑證濕熱鬱於皮膚久而不散發而為斑黑白相雜遍身花藻甚者變而為紫白癜風雖無疾痛害事不可以不防微而杜漸也防風通聖散治汗斑內外挾熱方見風門玄參升麻湯治同方見斑丹門一方用白茄切段蘸硫黃白附子擦之三次愈初次變黑二次三次則白而愈一方用生薑片蘸信末陀僧二味擦之良久小便洗過用清水洗之三次愈
