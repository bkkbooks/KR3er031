body:
  text: 卷之二十八翻胃門病機翻胃敘論巢氏病源云榮衛俱虛氣血不足停水積飲在胃脘則臟冷臟冷則脾不磨脾不磨則宿穀不化其氣逆而成反胃也則朝食暮吐暮食朝吐心下牢大如杯往來寒熱甚者食已即吐其脈緊而弦緊則為寒弦則為虛虛寒相搏故食已則吐名為反胃金匱云病人脈數數則為熱當消穀引食而反吐者以發其汗令陽微膈氣虛肺乃數數為客熱不能消穀胃中虛冷故也脈弦者虛也胃氣無餘朝食暮吐變為反胃寒在於上醫反下之令脈反弦故名曰虛玉機微義云反胃之證其始也或由飲食不節痰飲停滯或因七情過用脾胃內虛而作古方不察病因悉指為寒用香燥大熱之藥治之夫此藥止能散寒邪行滯氣其於飲食痰積勿能祛逐七情之火反有所熾脾胃之陰反有所耗是以藥助病邪日以深痼脾氣漸虛不能運化故食久而復出有即時吐出皆為正氣不完辛香之藥盡是治標當扶助正氣健脾和胃是為治本而疾可瘳翻胃病先因濕熱後變虛寒凡浩飲過食生果冷水或飲食失度脾胃有濕熱之傷漸漸運化失職此為翻胃之所自來也其始則皆濕熱鬱滯或吐或利以致血液乾枯則大便祕澀甚則閉結不通必反上行脾困既久變而虛寒者有矣不察新久概言胃寒峻用烏附辛熱之劑烏乎宜乎脈候難經云脈革則吐逆金匱云趺陽脈浮而澀浮則為虛澀則傷脾脾傷則不磨故朝食暮吐暮食朝吐宿食不化名曰反胃脈緊而澀其治難千金云寸緊尺澀其人胸滿不能食而吐吐止者為下之故不食設言未止者此為反胃故尺為微澀脈經云緊而滑者吐逆小弱而澀反胃治法治翻胃先調氣養胃翻胃病多是損傷胃氣不能納穀故食入即吐有思慮頓食並浩飲傷脾不司運化故朝食暮吐暮食朝吐皆原物之完出故有脾胃二經分治此又不可不察也夫脾胃之氣不充則陰陽失其升降所以濁氣在上則生䐜脹而邪氣逆上則嘔而吐是為反胃故調氣養胃則陰升陽降傳化合時則無反胃之患致於朝食暮吐暮食朝吐此又以健脾消導兼治之也反胃之病治法不外於斯矣治翻胃有寒熱之辨夫翻胃病其始皆成於濕熱既久或吐下相延寢成虛寒者理固所有也食畢即吐脈洪大或數此為熱也宜清胃金匱甘草湯荊黃湯之類朝食暮吐暮食朝吐脈遲而沉或澀而微此為中寒宜養胃湯安脾散之類或胃中飲食不消導惟宜辛熱遂不察其熱候概以熱助熱而卒莫之能救豈非藥之誤耶藥方金匱大半夏湯治反胃嘔吐不受飲食食入即吐半夏二升人參三兩白蜜一斤白朮四兩薑汁半盞水一斗二升和蜜揚之二百四十遍煮藥取升半溫服大黃甘草湯治食已即吐者大黃四兩甘草一兩水三升煮取一升分溫再服病機荊黃湯治暴吐者上焦熱氣所逆也脈浮而洪荊芥穗一兩人參半兩甘草二錢半大黃三錢上作二服水煎調檳榔末二錢空心服青鎮丸治上焦吐頭痛有汗脈弦柴胡二兩黃芩七錢半甘草兩半人參五分青黛二錢半上為末薑汁浸蒸餅丸梧桐子大每服五十丸薑湯食後下金花丸治吐食而脈弦者由肝乘於脾而吐宜治風安脾半夏制二兩檳榔二錢雄黃二錢半上為細末如上法丸薑湯下從少至多漸次服之和中桔梗湯治上焦氣熱上衝食已即吐脈浮而洪桔梗兩半半夏曲二兩陳皮去白一兩白朮兩半枳實炒白茯苓厚朴薑炒各一兩上咀每服一兩煎取清湯調木香散二錢隔夜空腹三服之後氣漸下吐漸止然後去木香末每料中加芍藥二兩黃耆一兩半服之病愈即已如大便燥硬食不盡下以大承氣湯去硝微下之少利為度再服前藥補之木香散木香檳榔各等分為末茯苓澤瀉湯治反胃吐而渴欲飲水白茯苓半斤澤瀉四兩甘草桂枝各二兩白朮三兩生薑四兩上水一斗煮取三升納澤瀉再煮取二升半溫服八合日三服外臺方有小麥一升發明利膈丸治胸膈不利喘滿氣逆而作吐嘔方見嗝噎門謂胃承氣湯方見傷寒門滾痰丸方見痰門並治熱壅嘔吐反胃大便不通養胃湯治脾胃虛寒反胃吐逆不思食白豆蔻人參丁香砂仁肉豆蔻附子泡甘草沉香橘紅麥芽炒神麯炒各二錢半上為極細末每服二錢薑鹽湯調下不拘時濟生太倉丸治脾胃虛弱不進飲食翻胃吐逆白豆蔻砂仁各二兩陳倉米一升用黃土炒去土不用上為末薑汁和丸小豆大每服百丸食後淡薑湯下百選安脾散治胃氣先逆飲食過傷憂思蓄怨宿食痼癖積聚冷痰動擾脾胃不能消磨穀食致成斯疾女人得之皆由血氣虛損男子得之多因下元虛憊有食罷即吐有朝食暮吐暮食朝吐所吐醋水臭惡或吐黃水凡有斯矣乃是脾敗惟當速治遲則發煩渴大便祕水飲不得入口不旋踵而斃矣高良薑一兩以百年壁上土三合搗碎用水二碗煮乾薄切成片南木香磨汁草果麵煨陳皮去白人參茯苓白朮胡椒丁香甘草炙各兩半上咀每服五錢水盞半入鹽少許煎七分食遠溫服或為細末每服二錢用鹽米湯調下丁香煮散治翻胃嘔吐丁香十四枚石蓮肉十四枚生薑七片膠棗七枚去核黃黍米半合淘淨水碗半先煎藥熟去渣次入黃米煮稀粥食之薤白粥治翻胃無問新久冷熱皆效薤白十莖雞蛋三枚去黃上揀人參一兩水一升煎三合白粟米三合上除人參湯三味同煮熟攪勻然後溫熱人參湯相和調不拘時頓服如惡食即與粟米粥飲漸加粳米和之罌粟粥治翻胃不能下食白罌粟米二合人參為末一錢生山茱五寸細切水鍾半煎六分入生薑自然汁及鹽花少許攪勻分二服不拘時食之亦不妨別物湯丸千轉丹治翻胃吐食等病牛涎半斤蜂蜜半斤木鱉子三十枚去殼油研上共一處入砂鍋內用慢火熬以槐條七根攪成膏為度每和白粥二匙日進三服甘露湯治翻胃嘔吐不止飲食減少常服快利胸膈調養脾胃進飲食常州一富人病翻胃往京口甘露寺設水陸泊舟岸下夢一僧持湯一碗與之飲罷猶記其香味便覺胸膈少快早入寺知客供湯乃是夢中所飲者胸膈尤快遂求其方合數十服後疾遂瘥名曰觀音應夢散豫得之常以待賓易名甘露湯又在臨汀療一人旋愈甚勿忽之干餳糟頭榨者用六分生薑四分上和勻搗爛作餅子或焙或曬乾每十兩入炙甘草二兩同研為末每服二錢用沸湯入鹽少許調不拘時服大效散治翻胃吐逆田螺殼黃蜆殼二件不以多少在土中多年者尤佳各令燒成白灰細研上每料用螺殼灰二兩蜆殼灰一兩用白梅肉四兩同搜和作團以砂罐合定鹽泥固濟發頂火煅令焦黑存性冷定取出研細每服二錢人參砂仁煎湯調下陳米飲下亦可化鐵丸治結腸翻胃兼治蠱脹緊急如鼓妨悶氣促不能坐臥飲食頓減手足枯瘦纍治不效者此妙五靈脂去砂石青皮陳皮各一兩陳秫米一合巴豆三十五粒去殼膜上咀先炒五靈脂香透次下青皮炒候色變又下陳皮又炒色變卻下秫米巴豆炒黃色取出以紙攤在地上出火毒揀去巴豆不用留三五粒亦可研為細末用好醋浸蒸餅丸緑豆大每服十五丸加至二十丸蔥湯或茶湯送下婦人醋湯下丁香餅子治脾胃虛寒痰逆嘔吐十嗝五噎反胃吐逆丁香木香各一兩白豆蔻半夏曲神麯各半兩白朮白薑陳皮各兩半人參蓽澄茄各三錢肉豆蔻半兩甘草二錢上為細末用薑汁煮糊和作餅子如棋子大每服一餅空心嚼細薑湯送下奪命回生散紫蘇飲子蘇青丸秦川剪紅丸玉浮丸並見嗝噎門治反胃吐逆病機紫沉丸治中焦吐由食積與寒相假故吐而痛半夏曲代赭石砂仁各三錢杏仁沉香木香白朮各一錢丁香烏梅仁檳榔各一錢陳皮五錢草果五分巴豆霜五分另研上為末入巴豆霜令勻醋糊為丸秫米大每服五十粒食後柿霜湯下吐愈即止玉機厚朴丸治翻胃吐逆飲食噎塞氣上衝心腹中結疾厚朴薑汁炒黃連薑炒各二兩半吳茱萸湯泡紫菀菖蒲柴胡桔梗茯苓皂角炙桂心乾薑炮人參川椒炒出汗巴豆霜各半兩川烏二兩制上為細末入巴豆霜令勻煉蜜丸梧桐子大每服三丸漸次加之以利為度薑湯下春夏加黃連二兩秋冬加厚朴二兩良方加味清金丹治清濁不分中焦氣痞心下牢大如杯或有寒熱朝食暮吐暮食朝吐關脈弦緊弦則為虛緊則為寒虛寒相搏名曰關格是為反胃水銀一兩硫黃木香另研丁香另研各半兩上先以硫黃熔化在鐵杓內入水銀和勻成劑冷研為末次下木香丁香研勻薑汁煮糊丸梧桐子大每服十五丸食前米飲下直指半夏厚朴湯治翻胃吐痰氣逆不下食胸滿肋痛嘈雜半夏制厚朴薑製山梔仁炒黑黃連薑炒陳皮去白八分茯苓八分甘草三分黑枳實麩炒一錢蒼朮制八分澤瀉香附子青皮各五分當歸白豆蔻各六分上水二鍾薑三片煎八分服心統沉香不二丹治翻胃轉食膈氣沉香木香丁香蓽茇官桂厚朴薑汁炒桔梗枳殼乾薑各三錢陳皮青皮砂仁白豆蔻草果神麯各半兩巴豆四錢去油上為末老米飯丸櫻桃大每服一丸將棗一枚去核將藥包棗內煨過臨臥細嚼米飲送下靈砂玄明散治翻胃膈食腸結嘔吐靈砂一錢玄明粉三錢上為細末每服五分拌豆腐吃下畢飲酒一杯濟生入藥靈砂丸治翻胃嘔吐飲食不下靈砂丁香木香胡椒各等分上為末煮棗肉杵丸梧桐子大食遠薑汁點米飲下五十丸青金丹治一切吐逆水銀八錢硫黃二錢二味結成砂研為細末用角粽杵和丸緑豆大每服三十丸薑橘煎湯下醫林參橘湯治翻胃人參橘紅石蓮肉各半兩明乳香錢半上為細末每服二錢薑湯點服和劑撞氣阿魏丸治翻胃嗝噎方見氣門敵痰丸治翻胃嘔逆半夏曲枯礬各一兩大皂角炙去皮弦黑醜取頭末各二兩上為細末蘿蔔煮熟搗爛和丸梧桐子大每服五十丸薑湯下衛生易簡方丁附散治翻胃嘔逆粥藥不下大附子一枚坐於磚石四面著火漸漸逼熱淬入生薑汁中浸少時如法再淬約盡薑汁半碗許為度去皮焙乾為末丁香二錢研二味和勻每服二錢水一盞粟米少許煎七分服一方治反胃諸藥不效惟用驢尿熱服日二合食後惟吐一半晡時又服二合吐便定唐貞觀中大內中五六人患此奏知同服皆愈病深者七日此藥稍有毒不可多服一方治反胃欲發時以鸕鷀嘴噙口中遂下一方用狼結喉暴乾為末每日五分於米飲中食之妙一方甘蔗二分薑汁一分和勻每服一碗日三服則不吐一方治反胃粥湯入胃即吐垂死用人參二兩水一升煮四合熱頓服日再進兼以人參煮粥遂不吐一方白粱米汁二合生薑汁一合和服之一方治反胃嘔逆出食有不化者用米粉半升搜和成劑丸如梧桐子大煮熟點鹽少許空心和汁吞下掌中金治反胃極虛寒者用大附子一枚薑汁一碗煮乾母丁香一個共為細末以少許安掌中不時舐服正胃散用白水牛喉去兩頭節並筋膜脂肉節節取下如阿膠片以好米醋一大盞浸微火翻勻炙乾再蘸再炙醋盡為度存性不見日為末每服一錢米飲下一方用明信煅紅去煙止用明信為末每服二釐溫水下用黑驢尿尤效一方治反胃飲食不下用地龍屎一兩南木香半兩為細末神麯糊丸梧桐子大每服五十丸陳皮薑湯送下一方用真蛤粉薑汁米飲食後調下一錢一方乾柿餅燒灰存性為末好酒調下每服一錢不數次即愈兵部手集方治反胃食不下羸弱不能動用母薑二斤搗取汁煮薄粥食之作粥熟時加蛤粉三錢和之煮三五沸吃一方用粟米粉作糊和粉丸梧桐子大白水熟煮放細醋中過任吞之半杯原湯點醋飲之亦妙千金方治反胃用小苓子為末酒調方寸匕一方治吐逆反胃暴急有火者用田螺不拘多少用新水瓷盆養之待吐泥出去螺將泥澄下去清水傾泥於紙上只下放灰食干稠即丸梧桐子大每服五十丸食遠藿香湯送下燒針丸專治吐逆此為清鎮之劑黃丹不拘多少碾細用去皮小棗肉丸如芡實子大每用針簽於燈上燒灰為末乳汁下棗肉平胃散治反胃開理脾胃王道之劑用制就平胃散一料加紅棗肉生薑各等分焙乾為末每服二錢空心鹽湯點服一方治翻胃積飲用益元散生薑自然汁澄下白腳搜和成丸如緑豆大不時服效灸法上脘一穴在臍上五寸灸二七壯治反胃中脘一穴在臍上四寸灸二七壯治反胃下脘一穴在臍上二寸灸二七壯治反胃天樞二穴在臍二旁各開二寸灸三七壯
