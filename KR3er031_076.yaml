body:
  text: 卷之七十六瘴氣門病機瘴氣出自東南山嵐濕氣東南山澤濕氣鬱蒸不散中人猶夫傷寒者則亦不可不謹也惟濕鬱而為熱所以東南之地冬不甚寒霧多風少陽氣不固冬不藏精人因虛而感其邪則病身熱頭痛口乾腹滿嘔逆狀如傷寒熱證雖雲山嵐瘴氣其實內因而得之者也瘴氣惟中氣不足者受之閩廣嶺南之地雖有瘴氣其不病者居多而所以感之者乃因正氣內虛外邪乘虛而入也不然則東南之人當一一病瘴而奚有暇他病耶故治先調其內而後治其外是之謂知本大梁李待詔瘴瘧論嶺南既號炎方而又瀕海地卑而土薄炎方土薄故陽燠之氣常泄瀕海地卑故陰濕之氣常盛二氣相搏此寒熱之氣所由作也陽氣泄故冬無霜雪四時放花人居其地氣多上壅膚多汗出腠理不密蓋陽不反本而然陰氣盛故晨夕霧昏春夏淫雨一歲之間蒸濕過半三伏之內反不甚熱盛夏連雨即復淒寒飲食衣服藥物之類往往生醭人居其間類多中濕肢體重倦又多腳氣之疾蓋陰常偏勝而然陰陽之氣既偏而相搏故人亦因之而感受其寒熱不齊之病也又陽燠既泄則使人本氣不堅陽不下降常浮而上故病者多上脘鬱悶胸中虛煩陰濕既盛則使人下體多寒陰不上升常沉而下故病者多腰膝重疼腿足寒厥豫觀嶺南瘴疾證候雖或不一大抵陰陽各不升降上熱下寒者十有八九況人一身上本屬陽下本屬陰茲又感此陽燠陰濕不和之氣自多上熱下寒之證也得病之因正以陽氣不固每發寒熱身必大汗又復投之以麻黃金沸青龍等湯發表則旋踵受斃甚者又以胸中痞悶用利藥下之病人下體既冷下之者十無一生若此者醫害之也其年餘染瘴疾全家特甚余悉用溫中固下升降陰陽正氣之藥十治十愈二僕皆病胸中痞悶煩躁昏不知人一云願得涼藥清膈余審其證上熱下寒皆以生薑附子湯冷溫服之即日皆醒自言胸膈清涼得涼藥而然也實不知附子也翌日各與丹朱丸一粒令空心服之遂能食粥然後用正氣平胃等藥自爾遂得平安更治十數人皆安蓋附子用生薑煎既能發散以熱攻熱又能導虛熱向下焦除宿冷又能固接元氣若煩悶者放冷服之若病煩躁不好飲水反畏冷不能飲者皆其虛熱非真熱也宜服姜附湯沈存中治瘴用七棗湯正與此同亦一服而愈有用朮附湯而病愈甚蓋朮附相濟能固熱氣不能發散惟附子一味為最妙或有脈證實非上熱下寒面目黃赤不可用附子脈若浮供而數寒熱往來無汗乃小柴胡湯證若審證可疑寒熱不辨宜服嘉禾散若熱多者冷服之嘉禾散能調中氣升降陰陽治下虛中滿療四時瘟疫傷寒使無變動雖傷暑及陽證傷寒服之亦解若或寒多服之尤宜服二三日即寒熱之證自判然後隨證調治之無不愈大抵嶺南之地卑濕又人食檳榔多氣疏而不實四時汗出不宜更用汗藥此理甚明亦有當汗下者終不多也明者察之指迷方瘴瘧論新安王棐棐讀書之餘留意醫學幸得其傳頗識方脈就闢入南研究此證謂南人凡病皆謂之瘴卒不服藥惟事鬼神夫瘴之為病猶傷寒之病也豈可坐視而不藥耶為中醫每每荏苒而致不救者有之人過桂林以南無醫藥且居南方之人往往多汗上盈下空不可用汗吐下三法其業醫者既鮮又庸或妄汗吐下是謂虛虛方書皆謂南方天氣溫暑地氣鬱蒸陰多閉固陽多發泄草木水泉皆稟惡氣人生其間元氣不固感而為病是為之瘴輕者寒熱往來正類痎瘧謂之冷瘴重者蘊熱沉沉晝夜如臥灰火中謂之熱瘴最重者一病便失音莫知其所以然謂之啞瘴冷瘴必不死熱瘴久而死啞瘴無不死此方書之說也然以愚意觀之所謂啞瘴非傷寒失音之證乎又豈中風失語之證乎治得其道間亦可生安得謂之無不死耶若夫熱瘴乃是盛夏初秋茅生狹道人行其間熱氣蒸郁無林木以蔽日無水泉以解渴伏暑至重因而感疾或有飲酒而不節者或有食煎炙而積熱者偶成此證其熱晝夜不止稍遲二三日不治則血凝而不可救矣南方謂之中箭亦謂之中草子然挑草子法乃以針刺頭額及上下唇仍以楮葉擦舌皆令出血徐以草藥解其內熱應手而愈安得謂之久而死耶至於冷瘴或寒多而熱少或寒少而熱多亦有疊間日之作及其愈也瘡發於唇驗其證即是外方之瘧本非重病每因誤而致禍亦不可以必不死而忽之但診其脈息極微見其元氣果虛即與附子湯而愈若誤投寒藥所謂承氣入胃陰盛乃亡若脈洪盛證候實熱且服和解藥而徐治之若誤投熱藥所謂桂枝下咽陽盛則斃要在切脈審證之虛實寒熱治之無不愈也人謂嶺南水泉草木地氣之毒則凡往來嶺南之人及宦而至者無不病瘴而至危殆者也又謂土人生長其間與水土之氣相諳外人入南必一病但有輕重之異若久而與之俱化則免矣說固有理但備之以將養之法解之以平易之藥決保無病縱病亦易愈矣且瘴之為病土人反重外人反輕者多蓋土人淫而下元虛又浴於溪而多感冒恣食生冷酒饌全不知節所以重也然則病瘴不可全咎風土之殊皆人自失節養有以致之耳君子之居是邦也當慎起居節飲食適寒溫晨酒夜食切忌太過間稍身上不快即服正氣一二劑則脾胃自壯氣血通暢微邪速散何瘴之有故下文有云瘴氣惟染勞役傷飢之人夫勞役傷飢則內傷不足者也所謂邪氣傷虛不傷實同一理也然則居斯土者可不知所慎哉每每病此則未必非勞役而得之故衛生方云北人寓居廣之地者往來廣之途者俱有陰陽相搏之患居者十病二三途者十病八九蓋居者安靜途者勞傷正活人三昧論瘴瘧云飲食有節起居有常邪氣不能為害然道路崎嶇人煙疏闊水漿不潔酒炙多腥飲食起居未免乖度況復有陰陽相搏之氣乎故曰瘴氣惟染勞役傷飢之人者此也嶺表十說吳興章傑述嶺表之俗食檳榔甚者日至十數枚蓋瘴瘧之作率因飲食過度氣滯痰結而檳榔最能下氣消食去痰故人狃於近利而暗於遠患此頗類北人之食酪酥故膚理縝密一旦病疫當汗則塞塞而不得出嶺南地熱食檳榔故臟氣疏泄然一旦病瘴當攻發則虛羸而本不能堪所以土人多瘠而色黃豈全是氣候所致蓋亦檳榔為患殆弗思耳本草載三人晨行觸霧飲酒者獨不病故北人度嶺率相勉以飲酒且遷客羈士往往醺酣以自適而嶺外酒價尤廉敗伕役卒俱得肆飲咸謂可以闢瘴殊不知少則益而多則滋瘴之源也何以言之南土暑濕嗜酒則多中暑毒兼瘴瘧之作率因上膈痰飲而酒尤能聚痰嶺外諺云莫飲卯時酒莫食申時飯誠攝生之要也可見酒一物能闢瘴以生人能滋瘴以害人然則生也害也非酒也顧在人也廣南海以暑毒為患音蓋一歲之間暑熱過半使人難闢而易犯起居飲食少失節度則為暑毒所中道途之間多有冒暑故土人暑相戒勿出且遐荒之境道路崎嶇傳世飲食皆不如欲自化初至皆云不習水土而病既還則又謂之回頭瘴大率得之道途間冒犯暑氣與夫飲食居處失度也寒暑之候不常尤難於調攝凡居人與在路者冬夏之衣皆不可缺隨其氣候速宜增減緩則能致病又嶺外海風異常稍中人則為病坐臥易衣當慎之也嶺外雖以多暑為病而四時亦有傷寒瘟疫之疾其類不一土人不問何疾悉謂之瘴治療多誤或有一歲盛寒近類中州而土俗素無蠶績冬不衣綿居室疏漏戶扃不固忽遭歲寒則次年瘟疫必興醫者之治瘟疫當以本法治之而隨其風土氣候與夫人之強弱出入可也瘴瘧之作多因伏暑傷冷所致縱非飲食冷物即寒邪感於外飲食傷於內也大抵伏暑淺而寒多者易治伏暑深而熱多者難治近時北醫至此用大柴胡湯治熱瘴須是本氣壯實者乃能堪如土人久服檳榔臟氣既虛往往不能服寒藥然土人才見發黃便為不治疾良可哀也北人之來嶺南婢僕多病瘴氣蓋勞役之人飲食乖度晝日冒暑夜多臥地又凡事不能避忌故先受其斃既與之同休戚宜加意戒之俚俗有病必召巫覡而祭鬼神士夫咸笑其信巫不信醫愚謂此殆可憫惻而不可以笑也夫民雖至愚而孰不能趨利避害況性命所繫曉然易見若醫者能愈人疾彼何苦不用蓋嶺外良醫甚鮮藥類尤乏況山谷海嶼之民何從而得醫藥所以不免而信巫也豈得已哉瘴病不一而土人以啞瘴最為危急其狀初得之即失音不過一二日不救醫家多言極熱所致或云蘊熱而感寒所激近見北醫有用煎生附子一味愈此疾者得非以熱治熱或是發散寒氣耶豫觀有謂飲溪澗水中毒令人失音則知凡失音者未必皆瘴也溪澗水毒灼然有之道路多無井泉而瀕江之民與夫山行者皆飲溪澗之水豈無邂逅遇毒者故途人所以多病得非是歟嶺外多毒草彘食之而人食其肉者亦毒人所以北人度嶺多戒食彘然則嶺外能致瘴疾者非一端順泉云嶺南之彘在市井者食豆酒糟在鄉村食糠並粹米芋苗未有食草者即此牛馬羊畜之肉悉皆不可食也可乎此其所以不足信也回頭瘴說舊傳出嶺有回頭瘴者大概與在廣而發瘴及方入廣而不伏水土者不異蓋南方陽氣常泄陰氣常盛二氣相搏四時悉有寒熱之氣人感之而作寒熱之疾寒則戰栗熱則怫鬱多由得汗而解此廣瘴之寒熱也今所謂回頭瘴及方入廣而不伏水土者亦不過陰陽相搏氣候不調而感疾也嶺南天氣冬無霜雪春寒秋熱氣候不齊或一日而忽更變與外方天氣大不相侔今回頭瘴者蓋是先染廣中之氣復感外方之氣冷熱相忤寒暄不調遂作陰陽相搏之疾須度時之寒熱量元氣之厚薄如出嶺於孟冬時者廣尚多暄而必寒或轉北風間有暴冷若屆途之際宜服和解散神朮散之類和脾胃逐風邪及至外方則天寒地凍將及境之際可服正氣散養胃湯之類絶舊瘴御時寒然則四藥特筌蹄耳其實在保躬調養酌序消詳切不可以得出煙瘴為恣欲此病之所由作也故所謂回頭瘴者豈虛言哉脈候兩關脈洪大者熱瘴脈浮而緊者宜解表脈浮緩者為傷風主病輕脈弦而緊者為瘴瘧脈數者為熱瘴脈數者按之不實為陽浮陰閉脈沉微而遲為寒治法闢瘴氣先戒勞役居嶺南者必慎起居節飲食寡欲清心雖有嵐邪勿能害也惟內境不出外境不入理之自然其感而病者皆不知其所慎入瘴煙之地宜預藥以防居瘴地者雖曰節慎起居而防病之藥不可不為之備如解毒丹蘇合丸正氣散之類蓋不可須臾離也從宦於茲土而政事多繁上下交際為商往來經營貿易其勢不容於自逸稍覺不快則先如法服藥以解之微邪易伏固不致病也惟其不能防微而勢必至於漸盛故曰不治已病治未病此之謂也治瘴續說繼洪曰豫寓嶺既久愈知瘴疾不易用藥病人身熱而復寒謂之冷瘴不換金正氣散主之身熱胸痞或嘔或噎大便不利嘉禾散病輕而覺有食積兼進些少感應丸無積者不可服病積重便不可妄為轉利當溫中固下冬末春初因寒而作大熱愚魯湯柴胡可減夏月因暑氣者六和湯若身極熱而頭極痛脈數者為熱瘴宜用南人挑草子法亦不可不服藥第此證病深而最難治蓋涼藥多不可用熱須得法以用之附子湯冷服之非極工巧以處之則不可如身熱汗不多頭痛未解且與和解散如腰以上極熱腰以下稍涼胸膈煩渴腰腿重疼或大便稀滑其脈多數按之不實則陽浮陰閉也李待詔生附子湯最妙然而初病則生薑附子能發散耳既病經日去汗愈多虛煩潮上則惟恐其不斂不降又加熟附乾薑沉香用乾薑須冷服便利不宜沉香煩甚少加竹茹渴甚多加人參北五味咳逆加丁香淡竹葉若煩躁而有異象眩惑夜不安寢可略與溫膽湯大便利者不可服若煩渴大作蜜砂丹參砂丹破證奪命散既濟湯乃局方竹葉石膏湯去石膏加熟附子冷湯加人參附子宜選用若煩熱大便自利小便亦多不可以赤為熱膝脛以下稍涼乃病邪激其氣血俱虛表熱無以養中故外熱而內虛也可急服姜附湯養氣丹及灸氣海足三里若至於四肢厥冷兩足冷甚頭額虛汗或時咳逆脈數而促其證多危惟以硃砂丹三建湯能斂心液能壯真陽可以更生也又有啞瘴即熱瘴之甚者醫書謂血得寒凝泣得熱則淖溢故熱瘴面赤心熱舌破鼻衄皆瘴熱沸其血湧上所致故宜用挑草子法甚則血上塞其心竅故昏不能言或但噫噫作聲即啞瘴也治之當散其血黑神散立見神效其或涎迷心竅及舌強者有之卻非正啞瘴及兼風痰之證者當審察而後用治瘴病愈後將息法大率瘴病不發後三日方可洗手七日後可洗面半月後可略梳頭一兩月後謹戒房事能戒百日尤好瘴不發後乃吃素粥三日經五日後方以豬脾熟煮羹吃軟飯十月後略吃些酒吃些肉羹但不可食諸般骨汁若犯之則再發凡羊肉豬犬雞諸骨汁須並忌一月或兩月尤佳凡再發者多困篤藥方闢瘴飲子治瘴時行無事之時宜先服此則不感染陳皮七分半夏一錢制茯苓厚朴薑製各七分人參枳殼炒砂仁炒各五分甘草炙三分上水二鍾姜三片棗二枚煎一鍾服檳榔煎治山嵐瘴氣寒熱嘔吐腹滿不思飲食檳榔蒼朮厚朴薑製陳皮草果各五分甘草一寸生薑一塊濕紙包煨上水二鍾棗三枚煎八分食遠熱服和解散治瘴病初作胸腹滿悶頭眩發熱蒼朮半斤米泔水浸一宿厚朴二兩薑汁炒陳皮二兩甘草四兩藁本桔梗各三兩上為粗末每服三錢水鍾半姜三片棗二枚煎七分熱服日三服夜一服此藥不拘傷風傷寒初作未分證候任服大能助胃驅邪和解百病不可不服黑豆飲治房勞感風小腹痛黑豆五合炒香熟好酒淬之乘熱氣薰病人微覆出汗而愈生薑煎治瘴如瘧憎寒壯熱老生薑一大塊打破紙包煨水一鍾煎半鍾熱服微汗附子湯治瘴瘧脾寒寒振熱少面色青白飲食少進四肢厥大小便清宜服附子一枚制草果五粒水二鍾煎一鍾分二服生薑附子湯治嶺南瘴厲內虛發熱或寒熱往來痰嘔吐逆頭疼身痛或汗多煩躁引飲或自利小便赤兼主卒中風附子一枚如法制作四服每服水一鍾姜十片煎六分微溫服乾薑附子湯治瘴毒陰候發熱或煩躁手足冷鼻尖涼身體疼痛重舌上苔生引飲煩渴或自利嘔吐汗出惡風大附子一枚制分四服每服炮乾薑二錢同煎溫服熱甚者冷服冷湯治瘴毒內寒外熱咽嗌間煩躁不解人參半兩大附子一錢甘草炙三寸淡竹葉十四個大棗五枚水煎溫服不換金正氣散善解一切山嵐瘴氣八般瘧疾四時傷寒五種膈氣和脾胃止吐瀉溫中下痰飲止腹痛脹滿吞酸噫氣噎塞乾嘔噁心內受寒濕外感風邪頭痛頭眩鼻塞不分陰陽尤宜多服及一切霍亂時氣諸疾妊婦胎前産後並不礙忌四方不伏水土凡入嶺南此藥不可不備厚朴姜炒蒼朮米泔水泡陳皮去白半夏制藿香葉淨甘草炙各一錢草果五分水二盞姜三片棗二枚煎溫服參蘇飲子羌活沖和散二方治同前並見傷寒門聖散子治一切山嵐瘴氣時行瘟疫傷寒風濕等疾有非常之功如李待詔所謂內寒外熱上實下虛者此藥尤效通神宋嘉祐中黃州民病疫瘴大行得此藥痊活者不可勝紀蘇東坡撰文勒石以廣其傳聖散子益著吾徽鄭尚賓在金陵用此方治傷寒活人甚衆豫故知其大能發散寒濕驅除瘴瘧實超凡之效也蒼朮制防風厚朴姜炒豬苓去黑皮澤瀉煨各二兩白芷川芎赤芍藥藿香去土柴胡各兩半麻黃升麻吳茱萸泡羌活枳殼獨活茯苓藁本細辛各七錢良薑大附子一枚草豆蔻石菖蒲各八錢甘草二兩半上碾為粗末每服三錢水二鍾棗一枚煎八分稍熱服嘉禾散一名穀神散治瘴瘧陰陽表裡不分五膈五噎脾胃不和胸膈滿悶等疾方見膈噎門神朮散治傷寒頭痛身熱等證蒼朮二錢川芎甘草藁本各一錢上水二鍾姜三片煎一鍾不拘時服平胃散治感山嵐瘴氣濕熱等疾補中益氣湯治內傷勞倦時疫發熱二方見脾胃門養胃湯治外感風寒內傷生冷憎寒壯熱頭目昏疼肢體拘急能避山嵐瘴氣四時疫厲脾寒痰瘧因飲食者吞下化滯丸甘草五分厚朴薑汁炒半夏蒼朮米泔浸人參茯苓陳皮藿香各七分草果五分水一盞姜五片烏梅一個煎一盞熱服保和湯治中瘴氣發熱嘔吐腹滿不食厚朴薑製大腹皮黑豆水洗半夏制陳皮去白各八分柴胡枳殼甘草各五分生薑三錢煨水煎溫服十味芎蘇散發散瘴瘧傷寒方見傷寒門奪命散治傷寒證瘴疾陰陽不明或誤投藥致病愈困煩躁發渴及婦人胎前産後受熱瘴疾上黨人參七錢水二鍾煎一鍾去渣連罐沉新汲水取冷一服而盡若鼻上有汗滴尤妙蘇合香丸治瘴氣寒熱兀兀欲吐不吐者胸膈痞悶用生薑煎湯熱調服取微汗方見風門萬病解毒丸一名玉樞丹一名神仙太乙丹治一切山嵐瘴氣中蠱解毒如神時行瘟疫俱可治每服水磨一錠酒調取汗則解方見解毒門福建香茶餅能闢一切瘴氣時疫傷寒不時噙口中邪氣不入沉香檀香各一兩孩兒茶二兩粉草五錢麝香五分冰片三分上為極細末糯米調飲湯為丸黍米大噙化七棗湯或因感冒風寒或是五臟氣虛陰陽相搏作為瘴瘧寒多熱少或但寒不熱皆可服大附子一枚如法制分四服水二鍾姜七片棗七枚煎一鍾當發日早晨空心溫服仍吃棗子三五枚忌如常三因方謂良方中用烏頭兼不用鹽水浸不惟服僭燥亦不能分利陰陽其說有理用者識之沉附湯治瘴疾上熱下寒腿足寒厥沉香磨汁附子制各三錢水盞半生薑三片煎八分去渣入沉香汁放冷服此藥主上熱下寒全集沉水鐵角真正沉香此香齧之其味甘辛者為美辛辣者性熱附子降氣斂陽治陰毒冷瘴只一服而回生起死真可以奪化功攝生方治啞瘴銅青半兩石緑三錢上為末水調生面糊丸如芡實子大每服一丸新汲水磨下冷香湯治夏秋水濕恣食生冷遂成霍亂陰陽相干臍腹刺痛脅肋脹滿煩躁引飲無度感瘴虛熱胸膈不利或嘔或泄並宜良薑檀香各一錢丁香七粒草豆蔻麵包煨附子制甘草各五分水鍾半煎一鍾以瓶沉井水浸冷飲五苓散治傷寒瘴瘧感暑中濕小便不利頭疼身熱煩躁發渴夏月主治尤多下虛者不宜多服方見傷寒門草果飲治瘴瘧頭痛脈弦四獸飲治陰陽相搏飲食勞倦發為瘴瘧二方見瘧門溫膽湯治瘴疾久病後心氣虛煩夜不得眠夢中驚惚心膽氣怯然也宜此服藥方見驚悸門異功散瘴瘧後調胃進食順氣和中極效人參白朮茯苓甘草陳皮各一錢水盞半姜三片棗一枚煎八分食遠溫服虛寒有痰飲作嘔噦者加薑製半夏一錢名六君子湯感應丸治瘴病食積所傷胸腹飽悶方見積滯門化滯丸破諸滯氣消宿積調陰陽奪造化瘴病食積者胸膈飽悶尤宜服之方見脾胃積食門理中湯調理脾胃感寒之藥方見脾胃門六和湯廣南夏月瘴疾冷熱未分煩躁口渴並宜服之人參半夏制茯苓甘草各六分厚朴薑製一錢砂仁藿香各五分香薷木瓜各七分杏仁七粒白扁豆十五粒水二鍾姜三片棗一枚煎一鍾溫服躁熱冷服椒囊法闢一切瘴疾時氣風寒邪氣點紅川椒去閉口者不用以絳紗囊貯椒兩許懸佩身旁近裡衣則一切邪氣不能侵犯屠酥酒闢山嵐瘴氣瘟疫等氣麻黃川椒去合口者細辛防風蒼朮制乾薑桔梗肉桂去粗皮各等分上為粗末絹囊浸酒中密封瓶口三日後可服每日空心服二三杯冒露遠行闢諸邪氣但不宜多飲至醉降椒酒闢一切瘴氣尋常宜飲之降真香二兩細銼川椒一兩去梗及合口者上絹囊貯浸無灰酒中約二斗每日飲數杯百邪皆不能犯兼治風濕腳氣疝氣冷氣及背面惡寒風疾有效氣漸辟邪法入瘴疫之家使邪氣不能侵犯法見傷寒門後
