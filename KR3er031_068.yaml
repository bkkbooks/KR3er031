body:
  text: 卷之六十八關格候病機內經敘論脈要精微篇曰陰陽不相應病名曰關格王注陽脈而反應之不足陰脈而反應之有餘故曰陰陽不相應病名曰關格關主不得便溺格主吐逆上下俱病是也難經曰五臟之氣於何發起通於何許可曉以否然五臟者當上關於九竅也故肺氣通於鼻肺和則知香臭矣肝氣通於目肝和則知黑白矣脾氣通於口脾和則知穀味矣心氣通於舌心和則知五味矣腎氣通於耳腎和則知五音矣五臟不和則九竅不通六府不和則留結為癰邪在六府則陽脈不和陽脈不和則氣留之氣留之則陽脈盛矣邪在五臟則陰脈不和陰脈不和則血留之血留之則陰脈盛矣陰氣太盛則陽氣不得相榮也故曰格陽氣太盛則陰氣不得相榮也故曰關陰陽俱盛不得相榮也故曰關格關格者不得盡其命而死矣經言氣獨行於五臟不榮於六腑者何也夫氣之所行也如水之流而不息也故陰脈榮於五臟陽脈榮於六腑如環無端莫知其紀終而復始而不覆溢人氣內溫於臟腑外濡於腠理戴氏曰關格者謂膈中覺有所礙欲升而不升欲降而不降欲食不能食此為氣之橫格也關格病為陰陽寒熱抗拒不通潔古云關則不得小便格則吐逆關者甚熱之氣格者甚寒之氣是關無出之由故曰關也格者無入之理故曰格也寒在胸中遏絶不入熱在下焦填塞不便云岐子云陰陽易位病名關格胸膈以上陽氣常在熱則為主病身半以下陰氣常在寒則為主病寒在胸中舌上白胎而水漿不下故曰格格則吐逆熱在丹田小便不通故曰關關則不得小便胸中寒者以熱藥治胸中之寒丹田有熱以寒藥治丹田之熱胸中有寒丹田有熱上下之法治主當緩治客當急脈候經曰陽盛陰不得榮故人迎大三倍於寸口曰關陰盛陽不得榮故氣口大四倍於人迎曰格尺寸反者陰陽交者為關格主死寒在上熱在下脈兩寸俱盛四倍以上仲景云寸口脈浮而大浮為虛大為實此為格陳氏曰腑有邪則陽脈盛臟有邪則陰脈盛陰脈盛者陰氣關於下陽脈盛者陽氣格於上然而未至於死陰陽俱盛則既關且格格則吐而食不下關則一陰閉不得大小便而死矣若臟腑氣和而相榮陰不覆陽不溢又何關格之有治法治關格必用吐法以提其氣丹溪云關格必用吐提其氣之橫格不必在出痰也有痰宜吐者二陳湯吐之吐中便有降有中虛氣不運者補氣藥中升降一婦人忽吐逆大小便不通煩亂四肢漸冷無脈凡一日與大承氣湯一劑至夜半大便通脈漸安復次日愈此關格之病極難治今見愈者惟此一人耳一婦人心脾痛後大小便不通皆是痰隔中焦氣滯於下焦二陳湯加木通初吃後煎滓探吐藥方局方六君子湯加升麻枳實栝蔞仁煎服氣虛脾胃弱而得關格之證宜服丹溪二陳木通湯治關格飲食不下二便不通陳皮一錢半夏八分茯苓八分甘草四分木通滑石各一錢人參蘆錢半上咀水二盞姜三片棗一枚煎八分食遠服再煎探吐
